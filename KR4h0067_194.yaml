body:
  text: 兩宋名賢小集卷一百九十四宋陳思編元陳世隆補劉爚字晦伯建陽人與弟韜仲受學於朱熹吕祖謙第進士歷知閩縣治以清簡庭無滯訟興利去害知無不為以憂去偽學禁興爚從熹武夷山講道讀書築雲莊山房為終老之計調贛州坑冶司主管文字差知德慶府入奏言前者北伐之役執事者不度事勢貽陛下憂今雖從和議願益恐懼修省開言路以廣忠益振公道以進人才飭邊備以防敵患提舉廣東常平召入奏事首論公道明則人心自一朝廷自尊雖危可安也公道廢則人心自二朝廷自輕雖安易危也寧宗嘉奬纍遷國子司業言於丞相史彌逺請以熹所著論語中庸大學孟子之説以備勸講正君定國慰天下學士大夫之心奏乞罷偽學之詔又請以熹白鹿洞規頒示太學取熹四書集注刋行之兼國史院編修官實録院檢討進國子祭酒兼侍立修注官論貢舉五弊纍官權刑部侍郎兼國子祭酒兼太子左諭德升同修國史實録院同修撰時廷臣爭務容默爚奏乞明詔大臣奬忠讜以作士氣戒諛佞以肅具僚冬雷爚奏遴選監司以考察貪吏為先又兼工部侍郎試刑部侍郎夏旱應詔上封事大略謂上既開不諱之門下必有盡言之士然或者以為好名要譽而陛下聽之則苦言必棄之而不恤甘言必受之而不覺矣前封男爵至是進封子權工部尚書加兼右庶子每講讀經史至聲色嗜欲之戒輒懇切再三敷陳之進讀詩之説詹事戴溪讀之為之吐舌卒贈光祿大夫諡文簡所著有奏議詩藁經筵故事東宫詩解禮記解講堂故事雲莊外藁題李立父髙遊樓君家百尺樓近在環堵室室處豈不佳暑溽厭煩鬱著腳躡層梯心眼便超軼好風天外來佳月雲端出清明湛空濶洞視了纎悉豈徒快登臨抑可驗學術大哉天地心昭然本無物世人卑且隘動以私見窒未能脫塵凡底處識微密羡君有斯樓發以靜春筆知崇與禮卑二義貫於一燭理要髙明復道貴乎實庶幾足目具不但窺髣佛工夫妙方寸豈假身外役此憤未昭融此屋空突兀君看希聖徒陋室暗蓬蓽上陳縣尹舊尹龔熊負令名至今天日共清明案頭未有人稱屈村裏全無吏敢行滿院茶香敲句穩一簾花影韻琴清後之學者誰其似又説陳公政有聲金國賀正旦使人到闕紫宸殿宴榆關玉塞靜無塵嘉定于今第四春兩國交馳通好使八方國祚太平人翠鼉鼓奏娛嘉客白獸樽浮賞諫臣聖厯從兹天共逺年年玉帛會楓宸瑞慶聖節集英殿宴皇家卜世過周唐天啓真人應運翔抱日預占恭邸夢飛龍曽報皖山祥翠雲影外來金母紅霧香中擁玉皇樂府賦工無以祝願將金鑑代珠囊送王子文宰昭武百鍊成繞指粹白俄成緇有初諒非難其難在終之道心渺然粟易為羣物移不有精一功誰能勝安危願言保令德嵗晏以為期平時州縣間上下意若異善書肘後掣有志奚由遂子今得所從展布有餘地兩賢更戮力萬物應吐氣相期召杜功奕奕昭來世東宫春帖子鶴駕通宵入問安龍墀清曉狎朝班天顔喜見重輪月春色先回萬嵗山皇帝閣端午帖子當寧求賢軫慮長每因佳節憶沉湘不須五色紉成線自有忠言補舜裳兩宋名賢小集卷一百九十四
