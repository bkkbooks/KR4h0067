body:
  text: 兩宋名賢小集卷二百四宋陳思編元陳世隆補文溪集李昴英字俊明番禺人寶慶丙戌廷對第三淳祐初官吏部郎纍擢龍圖閣待制吏部侍郎歸隱文溪卒諡忠簡有文溪集送廣帥趙平齋汝暨解印趨朝海瀕老同年五載依宇下春風舞蓑笠愛日曝田舍喜無撞搪吏追逐欵段馬劇談許絛褐得趂公餘暇達官來三徑小隊鄰翁詫明公傑俊人麟族稱大雅典型式諸老胸次郁醖藉西𣲖溯其源境物入陶寫才高事無難隻手擘泰華乘軺始踰嶺風采賢使者堂堂開大閫部屬肅鞾帕臺端有老蜮闖影含沙射孤忠冕旒知還許河內借鈴齋安獨處冷淡間僧夏例錢推不受金貝視土苴首祠酌泉翁坐使叨俗化葭萌細摩拊生意被原野循良渤海遂平理潁川霸威風戢偷竊德意消詭詐能令颶母伏默禱雨師灑開倉散窮閭儉嵗低粒價貢場宏敞拓芘士千間厦歷觀古賢牧美政公其亞讒夫真枉屈有識共唾罵君子竟何傷徽譽愈膾炙詔還九棘班明發不俟駕傾城送津亭牽纜不忍捨老夫前致辭再拜進杯斚立朝要敢言切勿效喑啞此行衆所望磐石鞏宗社久住白雲呈鎮長老桑下戒三宿我此尚留戀曹溪晤一夕我復無知見鎮公房遜客所須如執劵園丁曉供茹行者夜灌硯飯奴更芻馬紙帳費香篆主人真好事答應了無倦欲歸興未闌坐享伊蒲饌觀定堂梵宫慿水建蓬荻費芟除岸破羣魚出枝危獨鶴居定鐘僧睡蚤揮麈客談虛月滿龕燈小風停幡影疏供槃多佛果僧飯飽園蔬惟有開山老清高閉草廬送鄭雪屋歸里征衣點落紅君去與春同貧到歸時見吟多醉後工不應冠尚鶡自許氣如虹急拭看山眼飛帆吸快風武夷觀間乘石罅船又到浙江邊回向初心地皈依古洞天成丹呼鶴駕噴酒起龍眠雨意偏留客茶瓜定宿緣建倉解歸詩復徐意吏擎雙印出便覺此身輕物我忘恩怨漁樵寄姓名笛聲黃犢背詩興白鷗盟故舊休相訝無書到帝城景泰寺樹合疑山盡攀緣有路通逺鴉追夕照低鴈壓西風瀑勢雷虛壑松聲浪半空憑闌僧指似漲霧是城中觀穫負郭平田濶秋深穫課勤短鎌行缺月多稼剪黃雲舊臘占三白今年稔十分太平村舍裏墮穗飽雞羣雲泉亭絶頂鬱其前寒崖噴玉泉亭成山補闕境勝我才先樹杪江天接榕根石磴懸賞心遂連日合為智仙傳别陳霆正喜論文子遽歸扶胥江口訪韓碑吟篇佳處南遊得行李輕如始至時石友秉心終可托山翁具眼逺相期勉旃辦取蘭闈捷四六供官且放遲白雲登閣白雲峯擁到危巔傑閣翬飛倚半天谷響頗疑吟木客潮回坐見變桑田幾重山隔幾重水一日身間一日仙真樂無如會心處林花野鳥亦欣然雲關觀月山間未晚先得月料想城中見較遲海吐銀蟾漸呈露林埀翠影已參差孤輪涵澗安禪處明鏡當空沉籟時夜半哀翁猶獨坐清光吸盡入詩脾登峽山疾雷甚雨長風吹裂碧雲堆捲取銀河㵼下來雨攪犀潭千尺浪煙遮龍壑一聲雷松枝偃蓋岩隈立猿女穿蘿洞裏回舊事蘭亭好拈出婆娑溪曲共流杯西樵岩巨石卷阿駕半夭樵山風景豈虛傳水簾不捲四時雨丹竈空凝萬古煙印石尚存烏利迹問誰曽識紫姑仙我來遊遍登雲谷更借山僧半榻眠碧霄未到白雲先碧霄瘦藤支吾上山腰煙橫逺樹醉眸豁竹引清泉塵慮消酒滴松根如露飲茶烹石鼎抱茅燒平生不被名利鎖半掩柴扉聽晚樵送泊使孫叔諧東歸蓴鱸高興趂新秋帆腹吞風湧去舟萬寶集登天子庫諸蠻遮泣海山樓世間顛倒是非夢達者逍遙得失侯歸到家林定重九團欒杯酒菊花浮宴鳴珮亭和趙漕韻數尺飛泉漏隔城寒巖砌處落琮琤懸知勝境無塵到却訝晴天作雨聲一歃不容貪者飲兩峯冝著醉翁行此泉千載因人重曾識光風霽月清蒲澗滴水岩觀瀑與可人遊四五并快風吹面洗炎蒸鹿巡夾道千章木猿挂垂岩百尺藤石室橫琴清振玉壺瓢酌水冷調冰瀑簾雨後籠山濶不許塵埃俗耳聽送鑒師住靈洲寺少年芹泮頂儒冠猛志緇袍出世難孤島一燈開佛屋長身七尺占僧單鐘鳴魚叩隨緣過棹舞鷗飛取次看亭下聽經人在否石闌搖影碧波寒贈海珠湛老也曾參破動風幡坐得形枯鬢早斑衲子指為真鐡漢江神幻出小金山華亭浪急翻船入蔥嶺雲深挈履還香燼未寒行道處蕭森翠柏護禪關羅浮洞長寶谷王寧素送藥瓢久矣深山煉鶴形聞呼洞長又逃名斷崖怪木人稀迹亂石奔泉水有聲劍定通神收古匣奕聊供玩戲紋枰藥瓢解贈寧無意重到孤庵論養生蒲澗和東坡韻四時氷柱濕風前絶頂飛來一𣲖泉瘦蔓相牽根太古蒼崖特立倚長天竈荒孤鶴尋遺迹寺老幽禽闖坐禪間日頻遊歸復夢結廬曽許躡坡仙四月十五日遊僧寺今日快逢僧結夏不妨乘興叩禪扉山垂逺瀑溪聲急風捲癡雲雨腳稀囊錦詩成僧借看紋楸棋落鳥驚飛此來莫訝憑闌久傑閣新成拂翠微送泊使周申堂堂山立舊朝簮久屈清流督獻琛風送連艘出獅國浪吹殘句到雞林平生不隔同年面中歲難禁惜别心歸見耆英定相問只言閉户萬山深弋陽鄭氏翠麓亭管領寒溪揖怪峯徑穿叢竹緑陰濃幽人去後無猿鶴冷落亭臺濕蘚封雪封寺征輿六月渡梅關大地清涼樹影班行客不須梅止渴流泉到耳冷潺潺挽鈍齋先生許象州家學存齋授淵源自晦菴魁文行海內師道重天南銜得氷條一州才刀夢三芳名却千載爼豆拜祠龕義重人誰及高風有古人已田分友子黎事保羈臣抱負耕莘志依稀陋巷仁丹青遺像在難寫道心真丈席即之溫終身佩一言棟梁失安定山斗慘韓門慟矣心喪重凄然手澤存江聲助悲些莫返大夫魂送族子春叟遊西廣鳯出丹山定九苞桂林要揀一枝巢久聞嵓竇須幽討不是人豪莫泛交鶴髮頻將安問寄螢忩勤把舊書鈔功名到底還堅志崛起新豐一草茅重遊鬱孤臺和坐客韻座上多俊人竒崛角拔犀追風飇館遊鼉鳴玉龍嘶夕陽催歸鞭更酌樽重携懷開鉤鉤簾語合印印泥似與花神期拈出糕字題壯哉千尺臺虎踞巢之西平看十萬家一日城市低乘風巾可嬌取月箸可梯豪氣壓崆洞雙月照虹溪響山慨懷古妙句吾家雞邦人趁遨頭壺榼山之溪最喜秋事成千畝黃雲齊戲題羅浮梁彌仙寫真八十童顔雙眼明浪遊湖海一身輕莫將啖肉先生比箇是羅浮老樹精羅浮何君祐甫相訪惠詩又出所作水墨魚戲題卷末山頭釣引千鈞魚鐡橋曽逢稚川奴風波平地誤點額戲取墨汁翻糢糊縱觀濠上契妙趣浩浩胸次涵江湖墨雲忽從硯池起撥剌跳出形模殊大魚騰驤撼風雨小魚瑣碎遊荇蒲技如元放幾許竒金盤一個松江鱸試張亭前漲波影舂鉏飛下傍睢盱世間畫史少活筆描寫終類鮒肆枯文溪一灣浮釣徒欠得龍眠為嚴瀨羊裘圖題東坡竹葉葉枝枝各標緻密密疏疏總風味筆為化工壁為地頃刻種成此君子雖然月影水影寫真似安得千年尚生意兩宋名賢小集卷二百四
