body:
  text: 兩宋名賢小集巻二百四宋陳思編元陳世隆補文溪集李昴英字俊明番禺人寳慶丙戌廷對第三淳祐初官吏部郎累擢龍圖閣待制吏部侍郎歸隱文溪卒諡忠簡有文溪集送廣帥趙平齋汝暨解印趨朝海瀕老同年五載依宇下春風舞蓑笠愛日曝田舍喜無撞搪吏追逐欵段馬劇談許絛褐得趂公餘暇達官來三徑小隊隣翁詫明公傑俊人麟族稱大雅典型式諸老胸次郁醖藉西𣲖溯其源境物入陶冩才高事無難隻手擘泰華乘軺始踰嶺風采賢使者堂堂開大閫部屬肅鞾帕臺端有老蜮闖影含沙射孤忠冕旒知還許河内借鈴齋安獨處冷淡閒僧夏例錢推不受金貝視土苴首祠酌泉翁坐使饕俗化葭萌細摩拊生意被原野循良渤海遂平理潁川霸威風戢偷竊徳意消詭詐能令颶母伏黙禱雨師洒開倉散窮閭儉嵗低粒價貢場宏敞拓芘士千間厦歴觀古賢牧美政公其亞讒夫真枉屈有識共唾罵君子竟何傷徽譽愈膾炙詔還九棘班明發不俟駕傾城送津亭牽䌫不忍捨老夫前致辭再拜進杯斚立朝要敢言切勿效喑啞此行衆所望磐石鞏宗社久住白雲呈鎮長老桑下戒三宿我此尚留戀曹溪晤一夕我復無知見鎮公房遜客所須如執劵園丁曉供茹行者夜灌硯飯奴更芻馬紙帳費香篆主人真好事答應了無倦欲歸興未闌坐享伊蒲饌觀定堂梵宫慿水建蓬荻費芟除岸破羣魚出枝危獨鶴居定鐘僧睡蚤揮麈客談虛月滿龕燈小風停幡影疎供槃多佛菓僧飯飽園䔫惟有開山老清高閉草廬送鄭雪屋歸里征衣㸃落紅君去與春同貧到歸時見吟多醉後工不應冠尚鶡自許氣如虹急拭看山眼飛帆吸快風武夷觀閒乘石罅船又到浙江邊回向初心地皈依古洞天成丹呼鶴駕噴酒起龍眠雨意偏留客茶𤓰定宿縁建倉解歸詩復徐意吏擎雙印出便覺此身輕物我忘恩怨漁樵寄姓名笛聲黄犢背詩興白鷗盟故舊休相訝無書到帝城景泰寺樹合疑山盡攀縁有路通逺鴉追夕照低鴈壓西風瀑勢雷虛壑松聲浪半空凭闌僧指似漲霧是城中觀穫負郭平田濶秋深穫課勤短鎌行缺月多稼剪黄雲舊臘占三白今年稔十分太平村舍裏堕穂飽鷄羣雲泉亭絶頂鬰其前寒崖噴玉泉亭成山補闕境勝我纔先樹杪江天接榕根石磴懸賞心遂連日合為智仙傳别陳霆正喜論文子遽歸扶胥江口訪韓碑吟篇佳處南遊得行李輕如始至時石友秉心終可托山翁具眼逺相期勉旃辦取蘭闈㨗四六供官且放遲白雲登閣白雲峯擁到危巔傑閣翬飛倚半天谷響頗疑吟木客潮回坐見變桑田幾重山隔幾重水一日身閒一日仙真樂無如㑹心處林花野鳥亦欣然雲闗觀月山間未晚先得月料想城中見較遲海吐銀蟾漸呈露林埀翠影已參差孤輪涵澗安禅處明鏡當空沉籟時夜半哀翁猶獨坐清光吸盡入詩脾登峽山疾雷甚雨長風吹裂碧雲堆捲取銀河㵼下來雨攪犀潭千尺浪烟遮龍壑一聲雷松枝偃盖岩隈立猿女穿蘿洞裏回舊事蘭亭好拈出婆娑溪曲共流杯西樵岩巨石卷阿駕半夭樵山風景豈虚傳水簾不捲四時雨丹竈空凝萬古煙印石尚存烏利跡問誰曽識紫姑仙我來遊徧登雲谷更借山僧半榻眠碧霄未到白雲先碧霄瘦藤支吾上山腰烟横逺樹醉眸豁竹引清泉塵慮消酒滴松根如露飲茶烹石鼎抱茅燒平生不被名利鎻半掩柴扉聽晚樵送泊使孫叔諧東歸蓴鱸高興趂新秋帆腹吞風湧去舟萬寳集登天子庫諸蠻遮泣海山樓世間顛倒是非夢達者逍遥得失侯歸到家林定重九團欒杯酒菊花浮宴鳴珮亭和趙漕韻數尺飛泉漏隔城寒巖砌處落琮琤懸知勝境無塵到却訝晴天作雨聲一㰱不容貪者飲兩峯冝著醉翁行此泉千載因人重曾識光風霽月清蒲澗滴水岩觀瀑與可人遊四五并快風吹面洗炎蒸鹿廵夾道千章木猿挂垂岩百尺藤石室横琴清振玉壺瓢酌水冷調冰瀑簾雨後籠山濶不許塵埃俗耳聽送鍳師住靈洲寺少年芹泮頂儒冠猛志緇袍出世難孤島一燈開佛屋長身七尺占僧单鐘鳴魚叩随縁過棹舞鷗飛取次㸔亭下聽經人在否石闌揺影碧波寒贈海珠湛老也曾參破動風旛坐得形枯鬢早斑衲子指為真鐡漢江神幻出小金山華亭浪急翻船入葱嶺雲深挈履還香燼未寒行道處蕭森翠柏䕶禅闗羅浮洞長寳谷王寧素送藥瓢久矣深山煉鶴形聞呼洞長又逃名㫁崖怪木人稀跡亂石奔泉水有聲劍定通神收古匣奕聊供玩戱紋枰藥瓢解贈寧無意重到孤庵論養生蒲澗和東坡韻四時氷柱濕風前絶頂飛來一𣲖泉瘦蔓相牽根太古蒼崖特立倚長天竈荒孤鶴㝷遺跡寺老幽禽闖坐禅閒日頻遊歸復夢結廬曽許躡坡仙四月十五日遊僧寺今日快逢僧結夏不妨乘興叩禅扉山垂逺瀑溪聲急風捲癡雲雨脚稀嚢錦詩成僧借看紋楸棋落鳥驚飛此来莫訝凭闌乆傑閣新成拂翠微送泊使周申堂堂山立舊朝簮久屈清流督獻琛風送連艘出獅國浪吹殘句到雞林平生不隔同年面中歲難禁惜别心歸見耆英定相問只言閉户萬山深弋陽鄭氏翠麓亭管領寒溪揖怪峯徑穿叢竹緑陰濃幽人去後無猿鶴冷落亭臺濕蘚封雪封寺征輿六月渡梅闗大地清凉樹影班行客不須梅止渇流泉到耳冷潺潺挽鈍齋先生許象州家學存齋授淵源自晦菴魁文行海内師道重天南銜得氷條一州纔刀夢三芳名却千載爼豆拜祠龕義重人誰及高風有古人已田分友子黎亊保羈臣抱負耕莘志依稀陋巷仁丹青遺像在難冩道心真丈席即之温終身佩一言棟梁失安定山斗慘韓門慟矣心䘮重凄然手澤存江聲助悲些莫返大夫魂送族子春叟遊西廣鳯出丹山定九苞桂林要揀一枝巢久聞嵓竇須幽討不是人豪莫汎交鶴髪頻將安問寄螢忩勤把舊書鈔功名到底還堅志崛起新豐一草茅重遊鬰孤臺和坐客韻座上多俊人竒崛角㧞犀追風飇館遊鼉鳴玉龍嘶夕陽催歸鞭更酌樽重携懐開鉤鉤簾語合印印泥似與花神期拈出糕字題壯哉千尺臺虎踞巢之西平看十萬家一日城市低乘風巾可撟取月箸可梯豪氣壓崆峒雙月照虹溪響山慨懐古妙句吾家鷄邦人趁遨頭壺榼山之溪最喜秋事成千畝黄雲齊戯題羅浮梁彌仙冩真八十童顔雙眼明浪遊湖海一身輕莫將啖肉先生比箇是羅浮老樹精羅浮何君祐甫相訪惠詩又出所作水墨魚戱題巻末山頭釣引千鈞魚鐡橋曽逢稚川奴風波平地誤㸃額戱取墨汁翻糢糊縱觀濠上契妙趣浩浩胸次涵江湖墨雲忽從硯池起撥剌跳出形模殊大魚騰驤撼風雨小魚𤨏碎遊荇蒲技如元放幾許竒金盤一个松江鱸試張亭前漲波影舂鉏飛下傍睢盱世間畫史少活筆描冩終類鮒肆枯文溪一灣浮釣徒欠得龍眠為嚴瀨羊裘圖題東坡竹葉葉枝枝各標緻宻宻疎疎總風味筆為化工壁為地頃刻種成此君子雖然月影水影冩真似安得千年尚生意兩宋名賢小集巻二百四
