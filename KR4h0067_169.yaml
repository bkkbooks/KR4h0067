body:
  text: 兩宋名賢小集卷一百六十九宋陳思編元陳世隆補李文簡詩集李燾字仁甫蜀之丹稜人唐宗室曹王臯之後紹興進士歷官祕閣修撰同修國史以雷震建言上嘉其讜直賜金紫拜禮部侍郎除敷文閣學士致仕卒贈太師諡文簡性剛大特立獨任張南軒嘗曰李仁甫如霜松雪柏著有資治通鑑長編一百八卷從何使君父子遊墨池分韻得名字蜀學擅天下馬王先得名簧如巧言語於是蓋小成子雲最後出振䇿思遐征斯文大一統歘使聖域清富貴盡在我紱冕非所榮旁皇天祿閣聊亦觀我生懷哉不能歸舊宅荒榛荆寂寞竟誰顧正路今莫行使君蓬萊仙盼節歸赤城門無俗賔客家有賢父兄慨念此耆老不登漢公卿臨池一樽酒尚友千載英拜呼嚴與李月旦共細評區區可無憾彼重適我輕朅來成都市塵土汚冠纓古人不可見見此眼自明請為懷古詩玉振而金聲題籠鵠山房已作清時鳥倦飛杜鵑更勸阿誰歸似嫌住處猶城郭不解攜家隱翠微客懷寂寞三秋節淒涼萬里風關河盡形勝人物幾英雄秦葉隨流水周禾滿故宫此心懸象闕夢繞浙西東久客厭塵土幽居懷翠微只餘清夜夢長作故山歸菊已開三徑松應長十圍晨鐘忽驚覺猶有露沾衣壯矣府中縣索如城外村墨池今掃迹石筍舊餘根風急漢絃斷雨多秦鏡昏新秋一懷古情緒若為論靈雲巖路轉層岡十里餘武陵傳者亦難如昔年煉藥仙人室今日餐霞道士居洞外蟠花開錦繡巖前石溜潄瓊琚猗歟靈氣為時雨可惜圖經闕不書兩宋名賢小集卷一百六十九
