body:
  text: 兩宋名賢小集卷十宋陳思編元陳世隆補冦萊公集述懷吾家嗣儒業奕世盛冠裳桂籍冠倫輩天下知聲光有才無其命不得步玉堂余亦好古者詩禮承餘芳赴義忘白刃奮莭凌秋霜垂衣遇聖主射䇿遭時昌十九中髙第弱冠司國章棘寺陪法吏奉使安殊方薄才難變俗賤節惟勤王務簡忽興念不覺心倣徨慈親違萬里瘴雨悲南荒端居增浩歎離恨銷剛腸木落多異感蟬鳴非故鄉長思千萬乘奉職升周行步武親王陛獻納肩忠良功成自髙退散髮逰滄浪古别意水螢光淡晚色寒庭除索寞星河殘清樽酒盡艷歌闋離人欲去肝腸絶露荷香散西風驚征車漸逺聞雞鳴深閨從此泣秋扇夢魂長在遼陽城江南春波渺渺栁依依孤村芳草逺斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸追思栁惲汀洲之詠尚有遺妍因書一絶杳杳煙波隔千里白蘋香散東風起日落汀洲一望時愁情不斷如春水逺恨敗葉亂如雨暮蟬聲似哭感物悲昔心佳期悵難卜雲山雖阻歎韶華若在目深情染綵箋密密空盈幅邉瘴雁不來逰魚隱深谷羽鱗孰可憑音書安可復焚灰寄長風字滅魂亦逐雜言我徒曠逹由胸臆恥學鯫生事文墨蛟龍長欲趂風雷騏驥焉能制銜勒鏘金佩玉良有時丐色諛言盡虛飾功名富貴非偶然揚子草玄徒默默楚蘭罷秀足蓬蒿青松委幹多荆棘爭如一醉度流年免使悲歡蕩情域秋興呈裴李二同年秋興逐涼吹颷然驅煩襟人悲故鄉逺葉落空山深楚俗傷去恨秦城稀來音何當返煙渭自樂于國林嵗晚亂山外野望誰能同寒沙明夕照敗葉驚西風孤煙暝汀樹霜氣髙秋空徘徊念前事旅恨良難窮暇日逰建平三閭故里廟貌荒涼慘動耳目噫賢者之祠世不絶享郡無正人遺棄若是感事傷俗因留斯句人生苦逺逰多是悲登眺况復念三閭遺蹤良可弔道直出章華才髙逐邉徼寃聲噴夜江愁色迷煙嶠斷碑沒敗莎古木吟荒廟祠正少來奠岸峻稀停棹神容漬老苔壞壁通殘照舊徑失朱門空庭起寒燒餘基雖索寞清問長光耀旌賢誰再興勿使過者誚水閣晨起板閣常晏眠偶獨起清旦月落簷鳥語煙開客船散長江色自澄汀樹聲空亂羣動又復然勞勞可長嘆晚望有感出門望寒野四顧惟椒坡憶昔楚大夫還此情如何殘陽半明雨水落西風多因同下蔡恨不覺增悲歌庚辰嵗將命至巴東時已秋序霜荷索然偶賦是章用遣幽恨乘軺偶將命撫俗煙江湄地僻接窮峽務簡稀公期秋信任無趣野懷良自宜月白夜蟬響池暗風荷衰溪雲入破牖山菊開疏籬貰酒不能醉鄉國空結悲徘徊凝望逺目極長天涯成安感懷蟬噪木葉下逺客忽驚秋凝恨悲晚候萬緒皆如抽芳時同夢幻急景如奔流今吾何為者年來生百憂貧居負勝事壯嵗傷羇逰臨民慚墨綬垂釣思滄洲達則濟天下窮當守一丘胡能效時輩靦冒隨沉浮感興憶昔金門初射䇿一日聲華喧九陌少年得意出風塵自為青雲無所隔主上掄才登桂堂神京進秩奔殊方墨綬銅章竟何用巴雲瘴雨徒荒涼有時扼腕生憂端儒書讀盡猶飢寒丈夫意氣到如此搔首空歌行路難暇日紅樓晝靜春隂變日午簾空飛乳燕帆稀客散野岸空隱隱遙峰望中見郵亭落日多飛絮枇杷葉重江春暮坐久凝眸欲斷腸梅雨如煙暝村樹南浦春色入垂楊煙波漲南浦落日動離魂江花泣微雨長郊雨餘逺樹減翠新蟬忽鳴激耳嘹喨久客孤坐情如何哉形之於文聊以自遣遙山夏雨歇逺樹涼風至憑欄偶開襟新蟬動秋思沙溪潔細流庭木驚疏翠莭侯又復然幽憂斯所萃芳嵗若奔流羲光不停轡感物悼前期誰知此時意雪霽池上雪霽池上亭晴光羽泉石暖覺岸氷消靜聞簷溜滴務簡身暫間景幽心自適極目望南山圭峯露微碧有寄金陵煙草緑玉露霜天白萬里隔關山年來斷消息應製賞花御苑經春雨宸逰屬盛時花光籠寶檻栁色暗龍池瀲灔雕觴滿融和暖日遲共歌成至樂千載播聲詩兩宋名賢小集卷十
