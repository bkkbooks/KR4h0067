body:
  text: 兩宋名賢小集卷一百八宋陳思編元陳世隆補玩鷗檻詩稿蔡確字持正晉江人嘉祐四年進士歷知制誥御史中丞參知政事元豐五年拜尚書右僕射兼中書侍郎哲宗立轉左僕射元祐中罷知陳州奪職徙安州又徙鄧州坐譏訕責英州别駕新州安置咏絮楊花三月暮撩亂送春歸盡日間相逐無風亦自飛輕輕攔乳燕故故撲征衣莫上髙樓望徘徊滿落暉有感鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸蔡謫新州侍兒琵琶從焉嘗養一鸚鵡持正每呼琵琶即一扣響板鸚鵡傳言呼之琵琶逝後誤觸響板猶傳呼之持正感傷賦此不久遂終熙寧六年一作元年有司言四月一日當日蝕上為徹樂避正殿一夕微雨不見日食是日有皇子之慶因獻此詩昨夜薰風入舜韶君王方避正衙朝陽暉已得前星助隂沴潛隨夜雨銷夏日登車蓋亭十首公事無多客亦稀朱衣小吏不須隨溪潭直上虛亭裏卧展柴桑處士詩一川佳景疏簾外四面涼風曲檻頭緑野平流來逺棹青天白雨起靈湫一作秋靜中自足勝炎蒸入眼兼無俗物憎何處機心驚白鳥誰人怒劒逐青蠅紙屏石枕竹方牀手倦拋書午夢長睡起莞然成獨笑數聲漁笛在滄浪西方髣佛見松筠日日來看色轉新聞説桃花巖石畔讀書曾有謫仙人風搖熟果時聞落雨滴餘花亦自香葉底出巢黃口閙波間逐隊小魚忙來結芳廬向翠微自持杯酒對青暉水趨夢澤悠悠過雲抱西山冉冉飛矯矯名臣郝甑山忠言直節上元間古人不見清風在歎息思公俯碧灣溪中曾有戈船士溪上今無佩犢人病守翛然唯坐嘯白鷗紅鶴伴間身喧豗六月浩無津行見沙洲束兩濵如帶溪流何足道沉沉滄海會揚塵蔡確以弟碩贓敗謫守安州夏日登車蓋亭作此十絶時吳處厚知漢陽軍箋注以聞其略云五篇涉譏諷何處機心驚白鳥誰人怒劍逐青蠅以譏讒譛之人葉底出巢黃口閙波間逐隊小魚忙譏新進用事之人睡起莞然成獨笑方今朝廷清明不知確笑何事矯矯名臣郝甑山忠言直節上元間按郝處俊封甑山公唐髙宗欲遜位天后處俊上疏諫此事正在上元三年今皇太后垂簾遵用章獻明肅故事確指武后以比太后沉沉滄海會揚塵謂人夀幾何尤非佳語宣仁盛怒令確分晰終不自明遂貶新州題王維江行初雪畫吳兒龜手網寒川急雪鳴蓑浪拍船青弋渡頭曽卧看令人却憶十年前觀燕公山水畫後有王荆公題詩相君開卷憶江東髣佛鍾山與此同今日還為一居士翛然身在畫圖中兩宋名賢小集卷一百八
