body:
  text: 兩宋名賢小集巻一百五十三宋陳思編元陳世隆補方舟詩集李石字知㡬資縣人負文學有盛名於蜀紹興間為校官乾道中為郎歴秉旄節趙雄不善石以是晩益困有方舟集七十巻禮殿蜀侯作頖錦水湄先聖先師同此室巍然夫子據此座殿以周公名自昔聖人兩兩如一家均是周人先後出東家想見終夜夢猶與公孫同衮舄斯文授受乃闗天不為漢唐加損益我時來視豆爼事重是漢人斤斧迹漢宫制度九天上散落人間此其一多因豐屋起戎心獨此數椽綿嵗厯規模􅰕嵲東魯似氣象縹緲西岷敵竹松猶是斯干詩風雨方知棟隆吉雖然漢獻來至今閲時已多駒過隙中間豈無鳥䑕慮妙斲不知難輒易工師不揆亂如麻敢向殿門言匠石詩書譬彼尚闕文後學如何補遺逸祖龍非意竊登牀蝌蚪有心來壞壁舊章僅在命如絲誰勒吾詩勝丹漆左右生題名蜀地雖逺天之涯蜀人只隔一水巴自從文翁建此學此俗化為齊魯家頖林春風桑椹熟集鼓坎坎聞晨撾諸生堂奥分左右相比以立如排衙九牧之金充嵗貢缺松下吟哦幾唱酬却攜螃蟹餞監州穏挑書擔去環碧頻寄詩簡來雪州異姓弟兄千里月故山泉石一天秋葛峰隐者如相問為道𤓰侯已白頭題環碧亭十里漣漪陸瑁湖一亭幽絶重先居雲根數朶排青闥泉沬雙流濺綠裾竹鎖斷橋飛雁鶩荷侵凉檻蔭龜魚洛園還許人同樂時向林間望小車兩宋名賢小集巻一百五十三
