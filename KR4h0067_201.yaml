body:
  text: 兩宋名賢小集卷二百一宋陳思編元陳世隆補北山集一程俱字致道衢之開化人以外祖鄧潤甫恩補官坐上書論紹述罷歸宣政間進頌賜上舍出身歷官禮部郎建炎直祕閣知秀州南渡航海趨行在紹興初為祕書少監擢中書舍人兼侍講旋除徽猷閣待制晚病風痺秦檜薦領史事不至卒年六十七雜興十首一日復一日百年如此耳那將千百計來日何窮己逝者不可追來者安可知正恐聞道晚勿言功用遲誤點成駁牛妙技有餘賞作意畫蛇足至今猶撫掌君看人間事類此或往往浩歎可奈何悠然起遐想中夜忽自省昔我今是非音聲故如昨齒長鬚滿頥有人夢中言子念無乃癡今猶昔人耳昔人安在兹濯濯簷下溜刁刁樹間鳴蟲號百鳥閙小大各有聲聲多不留礙響振元無形何殊百千炬光影各自明胡葵向晨照日引一尺長松栽四五年擢幹未出墻漙漙露方晞借此顔色芳各留一寸心試待九月霜春鳩一何拙社燕一何巧天隂逐其婦飲啄聊自了銜泥亦綢繆記此華厦好物生固有分巧拙均一飽毶毶新稿桔補此茒屋漏問云力田人嵗事苦耘耨終年手足胝得此以自覆香粳一過眼粳核餘滿竇昔年過吳江戀戀不忍去臨江客思盡廓若掃翳霧兹為三年留己厭波濤怒乃知常人情趨新方捨故軋軋田邊車卷卷不得休出之一寸痕益以幾尺流扶提暴中野強作田間謳車聲真哭聲天逺將誰尤少小思振竒頗恨身不成身成益多纍信與憂俱生回思二紀間浪使倐忽爭誰能補黥劓反我孩與嬰吳縣遊靈巖春物己如許放舟出橫塘扶橈漾緑漲逮此白日長草木有佳色欣欣㺯浮陽幽禽靜相呼乘和自翻翔春風不著人浩浩吹我裳終年思煩促於此興未央捨舟得平地陟彼萬仞岡明霞墮山西夜氣鬱己蒼豈無從我遊夾道鬚髯張風來得好語落落隨低昻幽堂掃禪榻靜對燈燭光身輕浴新出寂境慮欲忘虛忩忽含曉睡起日照梁羣山發春姿秀碧淡以芳晨光晞薄露草樹滋幽香徜徉尋昔遊步屧循長廊振衣一長嘯寸目了八荒上嗟百世基竟坐一笑亡見劉禹錫詩當時館娃地今作選佛場乃知諸夢境遁化豈有常飄然咏歸與此適頃未嘗重來會有興肯使墮渺茫旁人挽豫言借問身間忙吾方有公事子去無相妨過方子通惟深白日苦未晚我懷多隱憂憂思劇春浸浩漫不可收出門欲有適舉步且復休塵中等膠擾念此將焉投駕言城東北閻閭即岩丘是中有幽人厲志凌霜秋寸田荆棘盡不假斤斧修門無雜車馬一飯乃見留虛堂芝术香下有百尺虬蒼隂匝平地老幹森下樛堂中羅酒漿耿耿燈燭幽四天黮無光萬籟肅以揫炯然坐相向更僕語益遒我身動乖忤夢寐喬松遊常恐在泥滓永為天所囚會當從之子濯足萬里流夜半聞橫管秋風夜攪浮雲起幽夢歸來渡寒水一聲寒玉靜穿雲響振疏林葉空委曲終時引斷腸聲中有千秋萬古情金谷草生無限思樓邊斜月為誰明讀神仙傳騎龍上天入太清繼世而往在我盈握鈴而呼大司命主非使者走折脛乃知神仙非智巧積功纍行如邠鎬専懷邪辟祈長年誰言淮南雞犬飛上天鯉魚腹中有隱符白魚腹中有素書鞭靈走石才一戲騎麟上天亦徒爾誰能解衣涿水中使人呼指赤鯶公莫作龍眉山頭客三百年來不得直故應未辦作李公投身百斛旨酒中鼓琴先生有怒色有愛終當為物役江都王勿預人事倮蟲膏血使誰從汝索胥門著蔡經市門著梅福我為松江吏與汝相望亦相逐高冠長劍衛士從有口底事使蠟封此身况不為陳尉就公蠟封三尺喙不能擲米作硃為狡獪古釣臺歌送阮閲休美成沿檄浙東餓夫一往西山空攫金胠篋清晝同東方作矣事何若玉匣未解裙襦中排肩炙手日卓午暮夜掉臂目送西飛鴻謂言氷壺不受汚正似馬耳經東風我思一人去我千載乃在浙水之東富春瀨山﨑嶇兮矗雲漢溪流喧豗白石亂瀨聲盡處萬尋碧蟠蜿蜒兮守斯人之故宅旁人指山名釣臺下視九土氛黃埃投竿百犗何足道直拂三珠挂瑤草彼一人兮皎獨立清風為神氷為骨珮瓊蕤兮結明月紉蘅蘭兮以薦枕兮服龍淵之無缺羊裘蒙茸溪水旁大勝被袞升明堂劉秀發兵誅不道氣壓昆陽才一掃登牀撫腹坐太息始信赤符非至寶君房素癡定不癡致位鼎足何其危阿諛順旨腰領絶安知直言身見殺我昔客新安挂帆七里灘整冠拜祠下岩岩千仞層臺巔神遊八極髣佛聆其語但覺萬古松風寒滔滔舉世無不可正是喪我非無我嚴灘水清山翠微貪亷懦立歸來兮奎蹄絮縫不可以久棲即事戲作四首老烏作巢一何拙栁條垂絲今秃缺銜枝復墮苦饒舌編條作巢枝錯節老烏栁好汝弗傷藏烏待得春葉長安巢令汝著哺母密葉更能庇風雨黃雀黃雀飛相逐相呼門前啄遺粟啄粟飽即休有人挾帚掃泥待作粥鶴唳固有似云何啄泥取蚯蚓蚯蚓食泉曽不惡鰌鱔蜿蜒尤不忍何如忍飢向芝田腥涎混爾不得飛上天烏啼未必惡麾去恨不早鵲噪兩耳聾主人亦言好安知一喙鳴喜戚自顛倒朝來羣鵲噪不己童稚無知助我喜羣鵲自與烏爭巢慎勿喜歡真誤爾和虞長洲遊虎丘尋壑復經丘人看李郭舟菱花多昔日桐葉最知秋虎去藜藿盡龍歸蛙黽愁振衣臨石壁未羡習池遊和友人陳傳道師仲司録遣興之作急景去不返宦遊心易闌死生交道絶冷暖世情看道俗須多可隨緣亦大難一年還欲盡三界直無安高郵夜泊書懷寄淮東提舉蔡成甫觀兼呈鄭使君弇三首久客頗自厭長歌胡不歸束書方有適捧檄定焉依塵裏音客改山中信息稀十年長漫浪深覺負荷衣命矣周南滯時哉冀北空居無刮目視動有轉喉窮泛宅如蠻蛋淫書伴蠧蟲飄蓬故人念賴有繡衣公長夏熱欲死迎秋氣己清蚊蠅任來往螟螣尚縱橫行止厭人問栖遲直自驚使君高義在解榻見深情觀王君玉侍郎集有酒胡詩次韻簿領青州掾風姿麯秀才長煩拍浮手持贈合歡杯屢舞回風息傳籌白羽催深慙偃師氏端為破愁來癸巳除夕誦孟浩然歸終南舊隱詩有感戲效沈休文八詠體作説將且不暇干時真自疏深慙叔孫子未辦茂陵書正自飢欲死敢言終有餘平生畝畎志本不羡嚴徐右北闕休上書故廬今茂草新構羡茒茨久負泉石約空令猿鶴悲一塵端可共三徑復誰期會結忘年友耕雲茹紫芝右南山歸敝廬沃壤有多稼良工無廢才固知時不棄正坐老無媒病驥終難駕寒花不易開古來天下士取次沒蒿萊右不才明主棄雁足慵難寄雞栖出厭頻路長時有夢人逺遽如新膠漆唯窮士雲泥隔要津囂囂亦何病懶放任天真右多病故人疏轉眼過三紀搔頭見二毛先秋同栁弱早白誤山高種種從渠落青青竟莫逃形骸姑置此痛飲讀離騷右白髮催年老憔悴身仍健峥嶸嵗又窮天寒春未應臘盡雪初融萬化豈有極一生常轉蓬誰知原不動日月自西東右青陽逼嵗除腷膊南枝鵲鏗轟半夜鐘遼遼數寒漏唧唧類吟蛩馬革思強仕牛衣慕老農此身何處是輾轉聽朝舂右永懷愁不寐透隙風號屋翻簷雪灑窗遙知迷九澤似欲卷三江引睡翻書帙澆愁泥酒缸無因踏松月癡坐對青釭右松月夜窗虛避冦村舍再脫兵戈裏全家走路塵百年同是客萬事不如人幻境終歸盡生涯正要貧故人知在否魂斷楚江濵沙塞松江三江既入今何有萬化無端去莫留蟹蚌失波枯斥岸蛟龍移窟見沙洲水窮范蠡扁舟返海變麻姑兩鬢秋通塞正應天數在荷蓑持鍤直堪愁曉起霜林一望極空寒曉鼓催人覺夢殘黃霧帶晴江渺渺徑風翻影露溥漙香消引篆新添火髮密勝簮漫整冠藏拙懶便惟少事興來間借逺山看餘杭法喜院荆文公書堂文公康定讀書于此鍾山太守起從龍鼓動風雷指顧中未見圖形求傅野豈知徒步客新豐青鞋曽訪餐芝老白首惟餘搗藥童藏壁故應留斷簡至今山鬼動悲風送蔣主簿入都赴試東南貢吏紫髯郎一馬駸駸客路長袖裏山林洗塵霧腹中文字了縑緗流年過我長如許樂事知君正未央行恐飢來驅我去也遮西日上河梁罷吏客郡城己數月滯留忽已嵗暮浩然興歎作一首一行作吏向吳城五見娵隅上薄氷魏顗三章堪自約殷源百尺敢言登揶揄只送人為郡噎媢初非我負丞鞅掌栖遲俱害性不知鬚鬢欲侵凌寒夜遣懷強醉重雲欲散鹽三更飛霰忽驚簾大呼何與癡人事此意多應俗士嫌出户仰看天漫漫持杯愁作夜厭厭消除心事多無處下盡中軍三百籖人日書懷兼寄吳中二三友東西南北走紅塵又見江淮草木薰小謝篇章成畫餅卧龍功略付浮雲栖遲枳棘今如許嘯傲氷霜賴此君俯仰折腰成底事故交千里漫離羣許主簿見和過有推借再作奉呈身謀自昔須三窟世味端能敗一薰醉裏間愁濃似酒春來歸思亂于雲松栽咫尺傳廬老棗實方將訪許君却喜雲孫共來往扁舟時入白鷗羣用前韻作招許主簿風騷無復見黃初尚想應劉載後車病骨不知緣底瘦愁眉時得為君舒動人春色來隨燕入眼溪流靜見魚祗有此中多好句可來茅閣試憑虛適軒厭苦常從樂未央不如腰足兩俱忘當飢糲食遺三鼎便體綈袍勝五章夜雪扁舟千嶂靜午風高枕一窗涼飄然自適非人適肯受轅駒六尺韁謝江仲舉惠酒山城無物可忘憂但有平原病督郵知我囊中無白水煩君若下出青州芳甘未謝三年醖傲兀能消萬古愁會待東郊春意動鳴鞭乘興草堂遊次韻張祠部見示大滌先生不諱貧鬢髯雖白臉長春三江魚美東曹後二栁泉甘慧曉鄰懷組歸來無長物挂冠誰復並清塵自憐出處俱違性旋結衡茅寄此身謝人惠硯帝鴻墨海世不見近愛端溪青紫硯溪流見底寒且清光凝淺紺淵之精斧柯千古遺仙局雲暗半山含紫玉割雲鑱玉巧如神龍尾銅臺可奴僕君來自南數千里不載珠璣如薏苡芊芊蹊草裹石硯文字之祥直送喜明窗大几墨花春爐山吐蘭千穗雲虛中含默靜相對那復草玄驚世人穹窿葬事回邑有感生别萬里餘會面終有期死别不轉眸一朝千古非白日光在天玄隂閟泉扉盈盈閨中秀土化成枯胔冠笄共甘苦謂見素髮垂那知死生變不待桑蔭移室有病時菌篋有嫁時衣了了眼中事間糚靚容儀垂楊手曽折為我當春稀迅流無回波落英無還枝空房閴無迹新墳草離離傷心北門道同來不同歸過劉姓園居負郭三頃稻並田五畝園人生如此足安用華其軒親戚居南陌交遊在東村有酒輒共醉傾翰見情言三徑雜桃李九畦蒔蘭蓀黃柑百頭奴碧梧萬枝孫山供景無盡石映溪不渾桑麻中饋任布刈鄰翁論下以活妻孥上以奉凊溫時從赤松子亦訪吳市門嗟我抱此志十年若朝昏家山眇天末松菊豈復存兹園臨官道坐笑車馬奔前山復場圃疏築隨坳墩我來適春穠亂眼紅青紛恍然動鄉思夢寄東飛雲題海會寺萬杉堆青沒山骨雲埋七峰時出沒飛泉拂石㵼哀湍下有萬古蛟龍窟藏頭睡熟呼不起地坼三年蝗蝻出千山脈理漬清甘一罅涓涓流石液同遊况與惠詢輩納屐振衣何勃窣大門當前新築道跨水曲欄欹突兀舂鳴轣轆趁朝炊水甽懸流機械發搘笻對此自三歎抱甕老人長搰搰却坐幽堂忽浩歌回首己失西山日望九華船發大雲倉五十里許顧江南衆山中有數峰竒爽特異一見即知其為九華問篙人果然因知禇季野於廣坐中識孟萬年正應如此作詩一首卷簾對坐江南山掠眼送青來亹亹雲泉肺腸久厭飫拄頰悠然聊復爾竒峰逺淡忽四五爽秀駸駸逼窗几平生九華盛名下一見定知真是矣非關目力觀天奧正覺羣山如聚米好山如人有高韻不獨江州孟公子直緣佳處無仕徑落寞道邊同苦李大是忘年耐久交藜杖青鞋結終始山中對酒秋容淡青山爽秀雨皆足清溪照千仭空翠疑可掬何年顧窟桂子墮山腹老香散深林屑玉綴黃粟朝來客衣動一葉下空谷客心如棼絲日月共煩促胸中尚磊塊陶寫賴新緑要當酒千鍾澆我愁萬斛顧有獨醒人翛然倚枯木二月二日富陽城東一春何許最佳處栁色初勻思殺人風繅雨練不可觸明緑映空顔色新舊雨來時花未齊今雨一過花團枝明朝試踏城西路己復可憐枝上稀桐廬道中書事一星熠熠初尚微俄傾滿天如灼龜溪流黯黮西山黑怒芒當空唯太白舉頭仰書天漫漫飛星縱橫絶河漢新月未高不可見終夜起坐發三歎題張太丞明園亭京華真陸海聲利之所闤向來山林士往往去不還濡足未肯已沒身何足歎張侯翰林客金龜著朝班生平用一指談笑起廢殘紛紛多俗子名譽莫敢攀五十未云老幡然歸故山歸來謝奔走治此五畝園養樹如養生斤斧不浪干醫花如醫疾察標見其源上有十圍木蓊然午隂寬下有百步荷紅鮮映清瀾爽氣日夕佳西山挂簷端安能九衢內髀肉磨韀鞍我今坐竒窮進退坎井間違己恨紆轡長飢思抱關當時彭澤令四壁唯瓢簞折腰未為辱徑去曽無難而我亦何者栖栖猶強顔即事雲裏琤淙十九泉茅茨深寄白雲邊何年斷取仇池鏡擲過荆吳萬里天太湖沿檄西原道即事三首司空山頭早出雲西源渡口十里隂煙中雞唱未及午白雨作泥泥己深上崖下谷鳥道中前屩後巾魚貫從西山路暗光己夕東山山頭餘日紅道旁甕盎如汝陽石間電雹如吕梁不知身世在何許舉頭四山鬱蒼蒼送崔間歸廬山琅琊山中水韻入三尺桐琅然醉翁操發自玉澗翁流泉不成音寫寄十二宫醉翁不可見妙語聊形容嘗聞三峽泉上與天漢通請君記餘響相彼玉佩風此聲倘可繼那復有此公吾友胡少汲結廬皖公城灊山有小隱背負紫翠屏前臨一溪水可以濯吾纓欲分青山半留我谷口耕信美非吾鄉翩然遂宵征聞君草堂處亦復占地靈虛簷倚蒼崖下有玉澗鳴樂哉不可到因君懷友生有美一人有美一人在昭君藕絲為衣蘭作裙君初顧言淑且真直欲載以黃金輪人心變化如浮雲明糚覺暗笑且顰何當還之承華茵令君宴寢凝清芬有美一人在煙汀朱顔朝滌玉壺氷素手暮理朱絲繩語言窈窕丹鳳鳴坐持紈扇睇秋螢何當還之翡翠屏為君把鏡整襟纓有美一人在南浦月明採珠光照渚瑶衣被體金索縷獨抱幽寒沐煙雨何當置之白玉宇為君歌陽春激楚時鄒志完在昭州曽子開在汀州陳瑩中在合浦賦長興錢圃翁詩學書要不成學圃苦不早向來執戟郎何似於陵老我無拏雲意所念在一飽閉門種蕪菁抱甕澤枯稿荒畦財一席嚙嚼到春草頗聞長城翁八十顔色好城西有寬間終嵗常却掃安得五畝園如翁一生了遊善權寺放舟荆溪上溪水清且徐雲中離墨山慘淡初有無捨舟並松麓下直浮屠居朅來東軒上爽氣已有餘飛來定何年無乃與此俱奔流潄庭下比竹梁寒渠山深絶迒徑物物清以臞靜森倚岩秀夭矯懸崖枯幽禽發寒唳響振高林疏我行亦良苦却步計己迂解衣卧清晝慰我千里劬善權洞嘗聞包山境中有林屋天旁通號地脈嶽瀆潛鈎連兹山豈其類􅐓洞皆中穿二岩岌山足琤淙激奔泉牛羊走大石吐受無窮年金堂下石液雪積如烹煎從來米鹽稱浪播俚俗傳一洞改山腹穹窿亦聨綿誰題九斗字大篆仍深鐫中藏丈五石屹若龍騰淵回頭問主人我輩定不凡云何逐官牒常得我所耽向來共幽討九鎖藏芝岩而我自林屋翩然遊皖灊洪崖倘可俯不在南山南白馬洞披榛不知疲詰屈岩下路俄然見深窽偊步入岩户一泓窈而澄百步清以鶩人言紫髯仙白馬從此渡磊磊盡赤石丹竈遺滓汙收藏已兒啼效適勝麻護因知世盲聾荒怪雜疑誤虛空如許大長嘯可平步胡為萬山底躑躅向煙霧章僕射山林王子池臺迹己荒年來華構壓高岡長林不礙千山月老幹猶含九夏霜便覺平泉冠東洛還依緑水寄南唐蝸廬却喜通幽徑岸幘時來一嘯長次韻張祠部敏叔遊滄浪蘇子美故園醉倒春風載酒人蒼然猶恐見長身試尋遺址名空在却歎張羅事己陳稍置曲欄穿徑竹别開高閣俯汀蘋拏舟更欲陪清賞要看毫端藻繪春次韻鄭大夫半隱亭脫屣歸來稅兩轓信知塵世有蕭關幽亭似近郎君谷捷徑知非少室山嵗月優遊真得計風埃憔悴獨何顔園林日涉仍多趣坐看雲飛鳥倦還哦詩夜坐瓶罍久空無以勞寄吳興趙司録江兵曹詩成不直一杯水年大常懷千嵗憂何須中令能強記正要將軍為破愁故人久負丘壑志公子欲尋梁宋遊相逢倘有葡萄緑肯向西涼博一州九日寫懷節物驚心兩鬢華東籬空繞未開花百年將半仕三己五畝就荒天一涯豈有白衣來到啄亦從烏帽自欹斜真成獨坐空搔首門栁蕭蕭噪暮鴉次韻葉翰林見寄雅望清班亦醉翁暫令槐閣曳鈴空更憑他日歸賢守畫諾何人稱治中便合追鋒來就日已知投牒有成風貽詩千里兼金意俎豆長憐斷尾雄相望千古一涪翁還向江湖四壁空病木自甘桃李後野麀難著鳳麟中未成下澤還鄉里且寄窮閻庇雨風舉世知音常契濶悲歌沉抑為誰雄傅國華從使遼東己事還朝拙詩送别夫君胸次有天遊笑指滄溟寄一漚正使叩舷歌小海不妨安席咏洪流翩翩聊試千金學刺刺應慙萬里侯歸袖飄然望華闕獨留珠玉照遐幽向來南北歎流年十載相逢走道邊作佛頓慙靈運後著鞭尤恐祖生先彈冠豈欲誇三組負耒還思受一廛默計此身端未了别懷撩亂故依然國華造道益深而豫蹇淺滋甚故有天遊作佛之句窮居苦雨漫膚便腹轉踈慵睡足茅簷自過鴻墨客綴令三尺喙木奴何似十年功門前羅雀非吾病竈底生蛙不世同舊雨未乾新雨漲可憐愁絶力田翁謝張敏叔餉陸子泉接輿叩木狂歌處猶有清泉出翠微不學癡人供水遞肯分餘潤及柴扉七甌己辦煎茶厄三咽能忘啜菽飢身寄吳門聲利窟更思氷洞濯塵衣張敏叔得請謝事欽仰高躅謹成口號富貴紛紛有底難乘時如探槖中丸高人不啻雲華見晚節誰為趙璧完且喜芝蘭俱發秀不嫌松桂愈清寒他年側席思耆舊矍鑠猶能一據鞍晚雨菊異質寧當雜衆芳故應寒頴度微霜三山未必分靈樹九畹何能擅國香不惜繁英供夕餌肯持佳色媚朝陽徑須移奉華堂宴路草多應愧缺妨登富陽觀山亭橋公宅中木參天孫郎山前春燒煙大橋不向五湖去建康宫深空嵗年送林德祖致仕東歸壯而仕老而歸理也士溺於仕故困而知返病而能休老而知止者世則猶然貴之若德祖於斯三者無一焉然去官如脫屣是乃真可貴矣德祖方未仕以學行有盛名四十起家至為部刺史所歷皆儒官入糾天府於今為要地年始登六十茹蔬飲水神幹儼如也一朝浩然有歸志退自府舍不謀於朋友不告於妻子夜半狀上府晨朝可命下斯亦竒矣豫行道南徐過故人蘇承祖出許振叔書道德祖挂冠勇決之狀豫時冒初暑向逺途忽忽煩憒聞之灑然如挹寒流而逐清風也而或者疑焉豫曰子無異也士溺於仕久矣其視爵祿猶飢者之羡膏粱渴者之赴水泉寒者之陽而暍者之隂也意若攀垂綆而上千仭不可須臾置也今乃有不負通博之才居軒冕之會非有宜去之年不得己之事也然且一朝去之彼以誇競之心計之是豈不可駭而疑哉且仕不仕何常之有德祖非為亢者也非要利者也徒曰適吾之適以遂吾之性而已雖然自砥節勵行之詔屢下所以愧責貪競者之辭實深聖主之所望士大夫之恥也今觀德祖之去就重輕亦足以振士風矣夫仕者畢心力以奉所職處者先亷退以風士類是皆有益於時者也德祖豈不賢逺於人矣哉既遇諸淮隂舟翩然東使人有冥鴻之歎因為詩以附諸公之末云浩浩聲利間靜躁同一區排肩日中市有類逐獸趨中朝尺寸地衆睇咸睢盱安知大雲客出與飛雲俱翛然棄之去初不計卷舒紛紛軒裳士瞪目口為呿茫然更歎息不間賢與愚乃知楊少尹未足繼兩疏時當老而傳不失仕且居非同會稽史苦誓困簡書不比狂季真索身憂病餘耆老了無事方當騁亨衢投簮逸湖海沛若縱壑魚雖無揮金事日者誰公如清風激多士故是明時須恨無采詩氏倘有東歸圖戲題郭慎求所寄書尾老罷歸來寄一廛交親南北散如煙誦君雪暗天涯句離合升沉二十年題叔問燕文貴雪景一壑回環十二峯茅茨送老白雲封如今塵裏看圖畫却愧當年邴曼容新作紙屏隆師為作山水筆墨略到而逺意有餘戲題此句末句蓋取所謂柴門鳥雀噪遊子千里至也時守秀州屢乞宫觀歸山居未遂急雨初收山吐雲清溪曲曲抱煙村拋書午枕無人喚歸夢真疑鶴噪門會稽喜得家書黃耳東來一破顔宜從松竹報平安遙知雲頂峯前住霜鬛風篁六月寒偶作三首薰風寂寂動林光紫翠隂中草木香山鳥一聲清晝永白雲深處北窗涼老向甘泉補侍臣歸來還作卧雲人一重一崦藏煙塢三沐三薰屏世塵誰遣生駒玉作鞍春來苜蓿遍春山自知不入黃麾仗振鬛長鳴出帝關神魚泓是日與諸公流杯水中如西丘故事栁州固竒士戲好亦幽絶逺懷西丘飲千古清興發徜徉恨無所盤桓對羈紲聊為五里行邂逅一壺挈神魚伏山根渟湛初一穴侵侵決寒溜沙石助清越披莎得盤石離坐若天設實觴競乘流眩轉亦飄瞥爭持或三釂遇坎時一蹶歡來朱碧亂笑罷巾帽脫相望西丘遊詎易議優劣張公洞昔年京江夜飛夢投雲山仍追謫仙老嘯咏層崖顛左盼俯無地蒼巒生紫煙當時賦幽賞妙境竟莫宣今我來自東扶橈漾荆川飽聞張公洞怪絶駭所傳聊從二三子一結青山緣北靈敞竒觀下矚壺中天恍然驚昨夢了了墮我前仄徑繚危棧重扃護靈淵竒礓或岋倚側洞時鈎穿初疑天台聚納此一室間夸娥運神化不隘亦不顛又疑清都客翩然下雲軿幢旄儼行立導從森蟬聨丹梯香霧溫玉室珠瓔懸撑虛一柱屹戴重三能鶱鉛竈久己冷青騾那可鞭香壇望八景東晨開五便坡陀忽度險宛轉漫無邊或深如列厦或迮才容肩高躋乍捫頂偊步欲墊泉不知行逺近一步九目遷噫嘻此天設端在太古先恨無少陵手寫之黃絹篇聊書夢中夢投筆一粲然借居毗陵東門四首客去不能寐翛然清夜闌樓居俯長川仰視天宇寬長川濯雲漢錯落星宿寒青燈故可親且還對塵編其人骨己朽千載與我言掩卷三太息虛簷清露漙急景不可挽吾生豈無涯吳中十年舊鬚鬢亦己華嗟我壯且老方知失林鴉欲歸巷無廬欲駕途無車而子亦羇滯心事如蓬麻人生無巧拙命定將如何猗猗隔河樹羃羃緣階草時當長養候顔色豈不好萌芒忽柯葉茂大旋枯稿滔滔不自知但見壯而老人生亦草木萬化迭侵擾朱顔日夜變素抱豈自保借居臨官道堂隂俯長河前車接來軫後棹紛相拏我獨居其間超然嘯而歌頗從故人語安用高軒過旁有五畝圍不知主誰何時能曳履往豈異吾山阿和栁子厚讀書事賤反多暇居卑適無虞人間不爭地聊此謝畏途豈無營營子熟視付一吁廛中亦何有坐聽日月逾展卷閲千古置書忘萬殊不妨權子母亦復商有無平生僅識字乃與憂患俱持此遊學海層臺漸積蘇年來但遮眼頗覺心恬愈囊錢足自飽肯怖騶朱儒起卧一榻間兀如橛株拘涼風北窗下不減愚溪愚誰能三萬卷懸頭苦劬劬小極正當寐睡魔不須驅兩宋名賢小集卷二百一
