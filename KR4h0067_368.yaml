body:
  text: 兩宋名賢小集巻三百六十八宋陳思編元陳世隆補雪磯叢稿三謝楊孟溪縣丞惠以章墨白首侯芭蜀江邊曽向君家傳太𤣥射熊草賦留殘墨相應當日還渠得飄零瀟洒幾世孫解得膠法舂𤣥雲物理往來元莫測後世子雲還舊壁君家所有更贈君君還贈我何殷勤感君殷勤復三歎努力西窗磨鐵硯太𤣥艱深吾不為願冩誠齋易傳探𤣥機佳人兩章寄許東溪衡之山鬱蒼蒼我有佳人在水之陽木難為珮兮雲錦為裳愛而不見兮我心憂傷安得為鵾鵬凌風置君旁衡之山欝蒼蒼其一衡之江清且漪我有佳人在江之湄朝飡菭蘠兮夕饌江蘺欲往從之兮我馬虺隤安得為琴髙沿波與君隨衡之江清且漪其二登濓溪太極樓岑樓跨層崖灌木翳頺沼曠哉宇宙心况兹展遐眺前哲日以逺川麓被文藻芳甸馥荃蘅江渚雜鳧鳥亭亭沼中蓮冉冉庭下草扣寂參太極撫化領衆妙俗薄神理乖力柔聖途杳英英考亭翁反心㑹天奥萬里粲良言一誠貫元造朂哉登樓人畢景盡此道深根復深根篤行以為寳醉中偶成醉敲茶臼嘯秋烟苦欠髙陽買酒錢擬入亂山飡柏葉石牀閒對麝香眠送友人逰昭川呈陳謙之僉判閬仙去補荔支譜梅谷歸呈飛鶩篇惟有𤓰坡共君在馬蹄何苦又昭川道鄉牽損衮龍衣謫墮天涯咏楚蘺莫放蹇驢逰别處拾青閣下有殘碑鵬運堂前話别愁菭蘠三度楚江秋近懐莫向元龍道問舍求田是缺頭夏日偶書蜾蠃銜蟲入破窗枕書一垜竹方牀家童偶見草頭字誤認離騷是藥方秋日行村路兒童籬落帶斜陽豆莢薑芽社内香一路稻花誰是主紅蜻蜓伴緑螳螂新淦偶成飛飛絲鳯挂梅梢猶記來時雪擁袍今日歸舟新淦路街頭稚子賣櫻桃贈吳季詩燕子樓頭春色深曽騎驕馬擲黄金如今世事漫頭雪破屋孤燈忍凍吟演教寺弔樓居朱漕羅帶江頭蛻繡衣人歸香草謝家池祗今玉樹埋何處惆悵僧房認得詩穿塚難酧地下知逢人多說項斯詩今朝痛洒西州泪萬里梅花欲放時延真道院滄流翠竹接仙扃靈菜丹虬供上真擬就元翁分半榻閒聴秋雨守庚申訪趙愚齋不遇謁者云扺晚方歸因成一絶奉寄雪片梅花滿研池芙蓉幕裏客歸遲今朝解了公家事儘聴轅門報酉時到衡岳呈弟山長間依禹柏繫征驄猿鳥應猶怪賤踪正擬開雲訪韓愈可能避雨識茅容朱陵洞裏秋呼鶴紫盖峰前曉聴鐘欲踏青霞尋勝趣倦逰應許借吟笻許介之館僕于東溪臨發贈别洗耳泉頭漱晚凉西風衣袂水花香酒邊豪氣横荆楚燈下清談雜晉唐天地毎窮真俊杰山林偏有好文章試提孤劍同君舞後夜聞鷄月滿牀下第歸後李白輝李景魏索近詩吟徧吳頭楚尾春多慙才客問征塵振衣天目尋黄獨濯足湘江咏白蘋宋五已慚稱進士陳三何用作詩人錦囊元屬君家有今買漁經理釣綸題李湛溪詩集後楚砧岷葛飽清逰金節銀莬照幾州詩句多如姚少監行程還似杜參謀黄陵夜誦虞妃泣白帝春吟杜宇愁擬問湛溪何處是夢隨閩國弄漁舟寄姚雪篷使君湘鱗六六寄相思踈栁新蟬想别時今夜各聴三楚雁秋風又老一年詩梅花且補離騷闕薏苡應為史筆知剪竹疑峰新製笛待衝霜月訪桓伊謁山齋先生易尚書淳熙人物到嘉熙聴説山齋亦白髭文字盡傳融水後精神如戰辟雝時靈椿終不孚朝菌蓍草難堪養夀龜細撚梅花㸔總義只應姬老是相知送桂帥鍾尚書超召老依牙纛撚吟髭又折梅花話别思五嶺不遮鸞鳯詔四方俱誦鱒魴詩人才晉魏凋零後國事江淮倥偬時頼有老臣經濟在快呼桂醑餞篙師題鍾尚書北征詩藁野雉江鷗滿故都秋風禾黍撚吟鬚六千里外驅旃斾五十篇中見版圖金鉉尚期扶日御玉衡終令正天衢書生亦有中原志那得君王丈二殳呈廣西張提刑陸續城邊按部歸梅花隨處撲征騑溪山有助吟題徧獄市無寃訟牒稀竹屋呼猿眠碎月莎庭引鶴步斜暉莫嫌瘴霧侵湘客滿路風霜冷枲衣罪言愁殺瀟濵蟣虱臣亂山斜照獨含情人才不似深衣古國勢如何楮幣輕石燕未蘓湘國旱木牛那濟蜀州兵幸無杜老流離苦切莫吟詩到北征送程營道官滿赴闕髙旻振爽籟蒼雁鳴芳洲傾城餞茂宰鄉耋羅藻舟茂宰藴淵道厥源溯伊流宇甿振仁策範俗惇聖猷夷心灼理要政簡吏統周芳風被儒肄恵澤淪農疇魯封有馴翟張庭無訟牛慨兹戒徂兩離衷鬱綢繆贈我茂叔蓮紉君晏子裘慶霄眎鳯躍神囿瞻麟遊世道日以隘民瘼誰克瘳厲志抗遐棄吹萬溥九州揆予忝皇鑒敷文免征愁行行重行行夷庚無駐舟次韻李監丞月夕閔雨穜稑旱欲槁蒺藜秋向榮哲匠軫民瘵慨此夜魄明蓐收正秋斂肥遺何縱横仰霄眎蟾曜聆垤佇鸛鳴彼美玩華光芳樽酌麴生崇榭歌窈窕秀質羅輜軿節序孰不歡宅生念匪輕同袍正焦灼對酒何忍傾恤喜限惽智同兹感隂晴淰淰山雲起策䇿林飇驚企彼天瓢潤弭此農橰聲崇情發翰墨賞心謝籌觥溥澤乃夙念穹爵豈所營榮賤有異分感兹反岩畊次韻李監丞城西紀游叫舜問寥濶咏濓滌塵囂駕言城西游慨彼往哲遥儀鳯不可呼鴐鵞浴清瀟懐或光風杳蕙若吹凉飇蒼梧隴雲愁廬阜太缺彫豈無人希周亦有文規姚佔畢末學陋俗薄神理銷沿流浮伊洛泝源窺羲堯執中與太極萬古魁瞻杓察㣲篤强力賢聖諒匪遼舜宫翳灌木濓塾棲叢苕觀乎紀㳺作悟彼進學條蘭巵娱才彦豈謂磊塊澆得深清賞愜理勝英藻超揆予果何為農野勸耕穮景迫昧見道曷奉徳化昭雨夜讀陸放翁集爐冷重吹火山房夜黯然濕薪添茭爇苦茗滯芋煎燈暗瀟江雨詩吟望澤烟老仙何處去搔首弔塵編送黄天河天河那可到山頂翠參差邨屋煎黄蠟官爐焙荔支地蠻遊宦少縣小迓賔遲鼻祖曽吟處荒苔想滿碑呈趙叔愚司理澗户垂楊句江湖半世㸔不應求五嶺却自建孤壇浙社朋逰盡缺詩氣象寒今朝流水調只向子期彈閒居自遣雨積桑樞長昔邪誰能載酒訪揚家漢廷用少臣今老魯俗皆冠我獨髟憂國苦無蠲忿草㸔書喜對決明花衰頺懶作江湖夢擬斸三椏養鬢華許由溪上小屠蘓紅樹蒼山對一臞白髪功名惟劒在青山活計并鐘無誰言荆楚多竒士却笑乾坤一腐儒桐帽貂冠俱有分寄言兒輩莫揶揄寄樓居朱漕住近江心古寺邊幅巾應伴浙僧閒官銜自管金陵觀冠缺多依鴈蕩山出處皆留青史看功名且逐白雲還殷勤為祝樓居月好照横舟送碧灣史主簿以授菴習稿見示敬題其後并寄張宗瑞姜䕫荒塚白蘋深鸑鷟無聲結緑沈擬向鄱陽尋後社只招張叟聴君吟吟了南樓到庫樓塞雲邊月困雕鎪只今南北無詩禁曽有新編過韃不次韻熊雲瀑秋夜見寄叫徹蒼梧望八荒暮雲秋客各凄凉此情未許旁人㑹愁絶中庭月一方兩宋名賢小集巻三百六十八
