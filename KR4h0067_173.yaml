body:
  text: 兩宋名賢小集巻一百七十三宋陳思編元陳世隆補太倉􅲤米集一周紫芝字少隠宣城人紹興中登第歴官樞密院編修右司知興國軍自號竹坡居士有太倉􅲤米集及竹坡詩話晚遊戒珠寺寺王逸少舊宅寺僧秉燭觀王右軍畫像出訪鵞墨二池歸已三更悠悠倦徂征忽忽厭羈旅出門復風埃况乃廹煩暑兹遊愜初心突兀見精宇髙人昔所廬樹木亦竒古㣲風入冠裳林影散廊廡僧窓靜無塵燈火照眉宇閲此坦腹姿鬚髪稀可數樂死固不虛顔色如處女平池渺清泉淅瀝過新雨誰言臨池上至技本天與鵞羣久已空團扇復何許興盡且當歸夜半月方吐逰麻姑觀清秋禾黍罷南畆幽事少凌晨有佳興振䇿事輕矯㣲蹤躡飛猱雄跳髙木杪上有仙子祠棟宇頗傾橈騰虚想雲軿遺像空鳥爪黄冠三四輩生意良草草更欲問丹爐雲山遂窮討道人笑不言此意未遽曉但云須趣轅山靜虎出早勝踐良獨難仙事亦杳眇了知世俗人塵凡隔蓬島越臺夜雨夜暗秦淮雨燈昏越女祠寒窓歸夢短秋枕客情知鳧雁初何定雞蟲事亦卑明朝江上去重理釣魚絲食𤓰二首鄼侯昔㣲時刀筆一小吏起依日月光勛業髙百世道大元不容功髙亦為累所以韓彭徒纍纍就庖胾蕭何于是時身任天下寄坐安劉季心賴有東陵計東陵固明哲避地有深意此物元不凡世俗豈知味此味當自知不可語兒輩元和數才子倒指到元白香山詆中奄進寸輙退尺元侯躐要途崔子實卵翼兩公賢與愚何啻白與黒二武有直氣譏評恣呵斥蒼蝇從何來汙我盤中食想像懐昔人撫几三歎息秋晚凉月初欣薄露天井梧吹葉又凄然牆根可笑無名草依倚秋風翹碧鮮月向寒林欲上時露從秋後已沾衣㣲螢不自知時晚猶抱餘光照水飛和人摘茶陸鴻漸茶經云葉如梔子花如白薔薇皮日休茶塢詩云好是初夏時白花滿煙雨乃用茶經語也葢茶至著花則晚矣結廬聞是輞川家更趂東風摘露芽短夢喚回春正好枯腸搜盡句方佳酪奴語陋真堪笑瑞草名髙豈復加明嵗莫教烟雨裏白薔薇秀小岩花次韻姑谿興國寺晚眺禪房花木有殘紅此地還因曲徑通竹影看揺金𤨏碎風鈴解語玉丁東人來白鳥横空處山在先生倚杖中絶唱未酧才已盡夜燈搔首鬢如蓬與松林道人求竹栽人生殊臭味不異蕕與薫嵗晚期金蘭矯矯惟此君緬懐古招提修竹如雲屯道人淡無與所居竹為羣餘隂滿窗户肯惜為我分他年蝸牛廬淨几横清芬踈踈便可意靄靄亦可欣千畆不作侯萬夫寜是軍客問有何好仰屋不必言幽徑倘可開遲子日欵門次韻沈彦述官舍書事二絶幕中從事最能詩恐是當年杜牧之渠為秋娘方覔句莫將公事惱痴兒晚得休文一解顔識君曽是畫圖間陽春白雪無由和句有雌霓誦亦難題趙侯滄江逺岫圖公子風流絶代無名髙當與大年俱自從剪得吳江水不愛滕王蛺蜨圖次韻吳思道贈姑谿道人殘生擬覔山中伴萬事厭從兒輩談笑我擕家常作客羡君買地已成菴早將遼海千年夢換得曹溪一滴甘聞與道人新結社懶雲今不是常參次韻次卿近書二首故國人空老三吳信不通客猶如社燕書或寄賔鴻鬢髪風埃裏林廬夢寐中西歸如有意一笑復誰同白水彭門道秋風古戰塲人應思故國樓更在斜陽消息慿魚素逰從問草堂蘭芽知已茁何日見諸郎晚霽翠葉看成幄濃春喚不回愁今連落絮雨欲到黄梅埽地花狼籍開門燕往來晴峰數㸃出暝色一禽催過張參軍故居曲肱亭舊居在焉山谷老人名亭且有詩所謂鄰雞呼不起擁將出京畿老恨愁千斛饑須粟一囊遂成遲去魯還作薄逰梁客思風塵惡鄉音道路長何時秣歸馬看我理晨裝遊醉翁亭醉翁詩裏識滁山早嵗神遊只夢間雲外淺寒欺短帽馬頭深秀得煙鬟時擕妓女人猶說倒著接䍦誰與還文物風流今埽地亂泉空繞玉孱顔次韻次卿寄姑谿時欲問舍宛陵吾亦平生欲執鞭拜公眉宇記當年泰和人物真圖畫李白風流是列仙雪裏已無回棹意文中新有卜居篇幅巾還作谿堂夢何日相從句水邊河魨三絶水沒江村不見沙河魨吹絮荻生芽平生所欠但一死可更杯中論鏌鎁釣蓑常恨此盟寒兩嵗珍庖屢入盤細雨春江從此逝不應猶棄季鷹官一飽欣然下箸餘庾郎鮭菜復何如當時獻納堪憐許只解區區說䱥魚次韻李子澤過次卿谿堂二絶溪雨亷纎作晚晴斜川風物喚淵明歸來定有新詩句醉著烏巾一幅輕時人但數李北海惡客敢過元次山笑我不能同一醉也來溪上看烟鬟行邁秋山凄無風木葉寒自萎羈客不得歸行邁日靡靡瘦馬嘶暮途忍饑渡寒水落日晚更明棲鳥驚復起人生各有求誰能異生死行行重行行辛苦那得爾亂石摧前輈旋車亦當止饑寒苦見驅臨風一長喟暮宿朝行繞山麓暮宿投孤村父老頗見招落日猶在門庖煙不滿竈汲水復抱薪為吾炊黄粱一飽裁逡巡百錢得香醪湛湛盈清樽吾雖不解飲亦足濡吾唇濯足捫飽腹燎衣煖餘薫願言息劬勞少浣塵埃昏殷勤戒鳴雞未用呼晨暾次韻次卿鳴琴終日二絶大音固自元無曲緑綺何勞更著絃此調㝡髙人不㑹未知今復為誰傳平生有味在朱弦想得清風入指寒小閣香消簾不捲知君不為俗人彈端午日小雨已而復晴斷雲飛雨過平川吹作團圞碧玉天酒緑强能開病眼絛長那解繫流年閒収艾葉晴窓外忍對榴花白髪邊細葛香羅天上有烏紗白簟北忩眠五月七日南堂見楊花栁深何處可藏鴉忩繞長廊緑暗紗造物惜春知有意薫風時一度楊花五月八夜月色明甚望麻姑招亭二山天髙月白夜漫漫倚杖來看月下山老眼直窮烟霧外諸峰渾在有無間翰林耽酒今何處仙女乘鸞去不還天恐兩山看未足故飛明鏡照孱顔讀林和靖集書其尾泉石膏肓挽不回笑看嵩少仕途開暮年封禪無遺藁平日江湖只釣臺月自黄昏梅已老鶴無消息客誰來吳兒不解髙人意秋菊何當薦一杯次韻劉元亢讀白樂天與劉夢得書香山天下士直道可事君口語作竒禍後來成積薪巨棟雖已捐白璧元自珍百年付春夢千載期斯人可憐肉食子議者反空唇文華一照耀今古無縉紳才髙固不世盛徳終少鄰鹿鹿數餘子𤨏𤨏非公倫豐盈與名譽詎可鍾一身暮年林壑意觴詠全天真君子與小人兩者自此分寄言顔巷徒勿語傷哉貧五月二十四日避暑東寺折柬邀子容不至凉飇呼不來惡熱苦難避城南有佳人相望隔秋水願言倚瓊瑶相擕謝簮履花木通禪房茶𤓰共幽事君方從簿書相仍日填委咫尺如參商况乃在千里日暮殊未來清風為誰起次韻元亢雨中見寄窮巷結蝸廬僅有一席廣風雨不出門山林負清賞悵懐念幽人道阻不得往瀰漫隔江漢契濶異霄壤清風吹句來令我作技癢安得從君逰此意良惘惘題王定父淑問堂平生心笑伯州犂羅織雖工不當威莫採黄金鑄刑鼎要令青草入圜扉于張必大君須記六蓼先忘事恐非聞説堂成已無訟臥看庭樹轉斜暉次韻元素登城暮歸二首天遣劉郎又白頭少年文學似由求朱門華轂聊安命藜杖芒鞋可散憂大隠未成聊小隠濁流誰得置清流賦成凖擬吾先讀王粲秋來正倚樓晚來飛鞚上城頭欲躡華鑣苦末由醉裏有鄉須著屐人間無地可埋憂功名于吾真聊爾人物如君無此流想對青天回白鳥半鈎斜日挂江樓宿蔣山薄逰踐初心寓宿便晚靜山空秋有聲人寂夜更永華鯨催曉色有客動深省焚香禮大士枝䇿上危嶺黄金明窣堵妙音生佛境眼窮天光盡地轉江萬頃緬懐梁武帝問法昔造請識師鳥巢中道契言自領大㑹天龍宫金碧燦絶頂我來修法供汲水具乳茗願同桑下留覽勝畢餘景還從天際歸悠然理煙艇次韻元中芭蕉軒道人悟無生開軒有深意是身如芭蕉妙語良黙契婆娑坐芳藂聊復此遊戲秋風鳴環佩曉露濕蒼翠閒窓得隂多凉簟驚雨細索句清夢餘時能助幽思我亦箇中人平生㑹佳致此樂倘見分杖䇿時一至次韻國師對月見懐老子闗門不著書奄奄真復似曹蜍月來林下苦相憶詩落眼前歡有餘滿挹清光歸酒面小分秋色到吾廬胸中怕塞愁千斛特地煩君一埽除寄徐季長念昔桃始華别君漳水頭相别㡬何時天事司蓐収闕月六度圓相見間何濶百年飛電中能得㡬回别别君㡬何時憶君如飢渇飢渇良有時思君無時節野人苦幽獨相值誰與親流落在蒼莽坎軻一傷神相望參與商相隔雲與泥草木忝臭味笑談極相思相思一何久行行重回首回首征雁行中有來書否送王天民歸雙泉舊聞雙泉居縹緲在寥廓仙人在叢霄遺甃結飛閣廣庭三百步一木可四角刀圭分蒼虬鱗鬛自皴錯至今風雨枝疑有孤棲鶴王郎吹玉簫飛鳬下雙屩時乗三峰雲來遶月城腳人生多乖離未踐繡水約知心念獨君時來慰牢落吾欲從之遊何當解羈縛次韻次卿中秋月下書所見三載彭門夢新年故國秋月當千里共酒要十分酬翠幕知誰捲雙鬟不奈羞寒螿莫相惱啼作曉窓愁題大著肚并引金陵朱世英官長沙或有畫箕踞而坐者號大著肚舊有賛頌皆鄙語朱為題小詩其上以易之其尾云但將貯酒三千鍾莫話容卿數百輩予愛其語有味更作此詩以廣其意平生頗笑王㑹稽坦腹驚動郗家兒暮年羞澀為懐祖計較毫末如兒痴嶔崎更復笑周郎自説空洞終何為逹人大觀無不可無鹽未必非西施了知倚杖清言者外示夷曠中難窺不如此老身如寄萬事􅀈稜真得計掉臂行歌眼看天擁膝長吟腹垂地羞遣家奴捧玉環肯為門生作經笥白肥如瓠君莫輕終年貯酒真酒甖結喉道士倘復見敢託石鼎譏膨脝次韻㡬聖見詒梅花雪後有殘枝留與幽人照夕暉已借水光浮淨几更將山翠染春衣洄中漫叟移舟去月下淵明種荳歸知我短坡無客到肯擕長麈為翁揮坎止流行念已輕常闗雖設是吾扃事如痛定何堪説出為飢驅豈有情滿座自傾鸜鵒舞半巖擬作鳳凰聲醉中深意知誰解付與前身阮歩兵次韻元素對雪十韻雲凍風仍急天低雪未収山寒飛鳥絶江晚一蓑幽曉樹梅初放風簾絮自投孤鶱迷逺鶴痴立看飢鷗櫪馬歸鞍速韝鷹獵羽遒連城埋睥睨千騎冷貔貅何處回蘭棹誰人擁釣裘閉門憐我病得句付君搜上瑞書三白登年在九秋何當明月夜同作廣寒逰甘菊數本舊植之地沮洳湫隘頗有悴色十一月二十三日移植墻下明日小雨數刻欣然便有生意小草偷㣲生崛强沮洳間託根倘失所憔悴無好顔嗟哉一大地寜無尺寸閒造物惜不與無乃亦大慳社櫟豈不惡盤錯未易班下可百牛蔽上可星斗干此物有逺韻何人憫清孱吾移東籬栽往近九畹蘭天心固有在生理似可還小雨喜霡霂低枝濕斕斑春苖已足采落英行可餐為我制頽齡使吾昇飛仙物㣲自有知報君以長年蠟梅六言三首剪蠟枝横隴月醸花蜜滿蜂房誰遣凌寒枝上中含百和花香雲珮風侵玉冷仙裳霧巻羅黄家在蕋珠宫裏衣熏鵲尾爐香桃花占上林薄蘭芷擅離騷經欲弔花中遺逸聊尋世外林坰再賦三首孤根雅宜幽處空明宛似僧房我作蒲團燕坐時參鼻觀㣲香淺俗㣲嫌菊陋粗踈不愛葵黄花裏誰方髙韻人中可比黄香移種定從天上世間那得此香白髪人應羞看鵞兒酒可爭嘗次韻何師與梅花二絶示劉凝逺月姊宫前玉樹春杏花菖葉不同村多情誰道天無意先與梅花雨露恩何人急遣蓬萊使喚得春回江上村誰信廣平心已冷老於花似太無恩兩宋名賢小集巻一百七十三
