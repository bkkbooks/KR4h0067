body:
  text: 兩宋名賢小集巻一百七十七宋陳思編元陳世隆補澹菴詩集胡銓字邦衡廬陵人建炎二年進士甲科紹興五年以賢良方正薦除樞宻院編修官抗疏詆和議累謫吉陽軍孝宗朝歴權中書舍人蒹國子祭酒權兵部侍郎以資政殿學士致仕卒諡忠簡有澹菴集和林和靖八梅用汝南故事禁用體物字感時濺淚㡬時乾顧影伶俜獨立難自恐迹孤無與對誰憐族冷不勝寒未應一世供愁斷長願三更秉燭看雨過花邊行更好猶嫌子美借銀鞍風亭小立夢初殘步步凌空對廣寒照眼雙明清可掬閒情一味澹相㸔曉縈瑞露黏初潤晴映髙雲薄未乾三嗅臨風思無限藥宫遥夜酒初䦨暗裏尋香自不迷照空焉用夜然臍欲危踈朶風吹老太瘦長條雨颭低孤豔㡬時同把盞野香猶記助看題唐人未識髙標在浪自紛紛説李蹊瘦吟幽翫有餘妍更向髙人獨樂園無垢未應經露沐不緇寜信受塵昬春風自識明妃面夜雨能清水部魂挿向膽瓶看更好凛如明水薦靁樽當年曽見鳳城頭入骨貪看興未休小摘欲論千種恨㣲吟先喚一畨愁每嫌俗物薫心醉長願清馨滿意留穠李倚風梨帯雨比方應合面騂羞縞練帨照釵荆霜竹寒松秀色并八詠格髙凌太白千林地迥切西清著枝有味知深意欹屋無言似薄情日暮水邊空悵望渾如湘浦見皇英一年佳處早梅時勾引風情巧釣詩未分霜凌禁瘦朶漸看春入奈愁枝晚尤竒特憐無伴夜欠分明祗自私冷落便須慿酒煖從今鄒律未消吹紛紛紅紫勿相猜自古騷人酷嗜梅皂盖折花憐老杜黄梅時雨憶方囬一生耐冷天憐惜滿世趨炎我獨來桃李爭春身老大急須吟醉莫停杯追和東坡雪詩為瑞應便種麥鴉餘光猶得映書車也知一臘要三白故作六霙先百花授簡才慳慙賦客披蓑句好憶漁家擬酤斗酒聽琴操三百青銅絡畫义過三衢呈劉共父别離如許每領引邂逅㡬何還著鞭㣲服過宋我何敢大國賜秦公不然衰鬢凋零已子後髙名崒嵂方丁年即看手握天下砥山中宰相從雲眠元注予自兵侍罷歸從三衢城外遵陸以兩夫肩籃輿太守劉共父謂予云兩夫肩輿甚似㣲服過宋因作此戲簡用吳體雷州和朱彧秀才詩時欲渡海何人著眼覷征驂賴有新詩作指南螺髻層層明晚照蜃樓隠隠倚晴嵐仲連蹈海徒虚語魯叟乗桴亦漫談爭似澹菴乗興往銀山千疊酒㣲酣紹興十八年戊辰十一月十五日新州編管人胡銓移吉陽軍編管先是廣東經畧使王鈇問知新州張棣曰胡銓何故未過海銓嘗賦詞云欲駕巾車歸去有豺狼當轍棣奏銓倡和毁謗而有是命棣選使臣游崇部送封小項筒過海銓徒步赴貶人皆憐之至雷州守臣王趯捕游崇私茗械治厚餉銓趯後亦得罪澹菴此詩不少屈撓真鐡漢又過於劉器之云丙子年始移衡州和李參政泰發送行韻落網端從一念差崖州前定復何嗟萬山行盡逢黎母雙井渾疑到若耶山鬼可人曽入夢相君談易更名家此行所得誠多矣更願從公北泛槎元註李參政詩云夣裏分明見黎母生前定合到朱崖葢予嘗在新州夢一媪立牀前曰吾黎母也黎姞山在瓊崕儋萬之間子瞻所謂四山環一島是也先是秦檜大書三人姓名於其家格天閣下曰趙鼎李光胡銓所必欲殺者也鼎謫瓊州紹興十七年丁夘卒光字泰發時謫儋州澹菴朱崕之行經過儋州故泰發以詩送之澹菴夙有黎母之夢付諸前定如謫新州時亦謂前定福唐幕中分扇得一畫騎驢人西南行者後新州之命亦若暗合夫不以遷謫介意而付之於分非達人不能也次李參政送行韻答黄舜楊打成大錯一毫差萬里去尋留子嗟㣲管閒思齊仲父使奴長價漢渾邪道窮憐我空憂國句好知君定作家便欲相擕趂帆飽要觀子美賦靈槎遊白龍洞懸崕怪石水潺潺宜有神龍隠此間窮勝不妨歸險洞尋春那止看羣山攀龍行即天邊去躍馬聊同野外還好景良辰適相㑹一樽聊共水雲閒買愁村北往常思聞喜縣南來怕入買愁村區區萬里天涯路野草芳煙正斷魂噴雪亭廬峯潄玉舊傳名今見青原噴雪成兩處山川肯相下洗除塵垢一時清題永興觀連雲宿麥團碧浪綴草落花成錦窠我來欲覔種桃者獵獵空存庭下莎寳氣亭塵容不逐江流淨酒力都從雪壓消斗下只今無劍氣年來牛犢在人腰和王民瞻送行詩巖畊名已震京闕未信終身袖手閒萬巻不移顔氏樂一生無媿伯夷班致君自許唐虞上待我誰能季孟間宗社年來欠元老蒼生拭目看來還擕具賞石渠酴醿用坡韻呈同舍酴醿獨殿春得路未為晚露葉張翠繖月蕊明玉幰洗粧雨亦妍暗麝風更逺唐時真宰相勁氣凌諫苑危言工切劘壁立萬仞巘帝為醸此花以賞碩畫婉清芬濯千古天河豈須挽不妨便醉死聞香定魂返王司業龜齡口占絶句竒甚用韻和呈效吳體南山舊説王隠者北斗今看韓退之不須覔句花照眼行見調羮酸著枝兩宋名賢小集巻一百七十七
