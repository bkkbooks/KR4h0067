body:
  text: 兩宋名賢小集卷二百十三宋陳思編元陳世隆補象山先生集陸九淵字子靜九韶弟乾道八年進士調靖安簿纍官著作丞光宗即位除知荆門軍務卒諡文安嘗結精舍於貴溪之象山學者稱象山先生有集應天山在貴溪縣子靜隱居其中更名象山我家應天山山高數萬丈上開園池美林壑千萬狀山西有龍虎煙霞耿相望寒清漾微波暖翠團層嶂天光入行舟野色隨支杖吾黨二三子幽賞窮清曠引興谷雲邊題名巖石上碧桃吹曉笙白鶴驚春漲一笑詠而歸千載應可尚踈山村靜蛙聲幽林芳鳥聲警山樊紛皓葩隴麥搖青影離恨付西江歸心薄東嶺忽忘飢歉憂翻令發深省送勾熙載赴浙西鹽平分浙江流東境浮海角其民仰魚鹽久矣困征𣙜麥禾與桑麻耕鋤到磽確往歲比不登場圃幾濯濯荒政勞廟謀賑廪開數數飢羸不待飽共感君澤渥仁哉覆育恩所惡吏齷齪教詔彌諄諄聽受秖藐藐何知國與民足己肆貪濁流離且未還己復事椎剝按察殊未曽聖主獨先覺重貽宵旰憂顧盼求卓犖若固岷峨英懷抱富荆璞邇來奏對語朝陽鳴鷟鸑鏘然歷帝聰簡記諒己確外臺適虛席妙選出親擢此節豈輕授委寄重山嶽除音九天下衆論靡瑕馭攬轡首越山青萍方在握送君無雜言當不負所學和鵝湖教授韻墟墓生哀宗廟欽斯人千古不磨心涓流積至滄溟水拳石崇成太華岑易簡工夫終久大支離事業竟浮沉欲知自下升高處真偽先須辨只今一作古今非過普寧寺在玉山縣寺後有武安塔偶扶藜杖過南津野寺長橋發興新暫就清溪照鬚鬢不妨翠霧濕衣巾山縈細棧疑無路樹絡崩崖不壓人朝暮有程常卒卒向因攜酒上嶙峋贈畫梅王文顯子作寒梢己逼真不須向上更稱神由來絶藝知音少只恐今人過古人初夏侍長上郊行分韻得偕字時年十五歲講習豈無樂鑽磨未有涯書非貴口誦學必到心齋酒可陶吾性詩堪述所懷誰言曽點志吾得與之偕題達本菴梁光結廬其親塋名曰達本求言於余敬賦是詩以助孝德孩提無不愛其親不失其心即大人從此勸君休外慕悅親端的在誠身玉芝歌淳熙戊申余居是山夏初與二三子相羊瀑流間得芝草三偶相比如卦畫成華如蘭玉明氷瑩洞徹照眼乃悟芝蘭者非二物也己酉上巳復覩瑤芽迫歸拜掃不及見其華是日訪風練飛雪始得一華方掇至案間時雲菴僧適至且求余言為鄉道余方作是歌因謂之曰當為子書之第持此以往會當有賞音者紹熙元年三月二十八日象山翁書靈華兮英英芝質兮蘭形瓊葩兮瑤實冰葉兮霜莖石室兮宛宛苔菌兮菁菁蔭長松之偃蹇帶飛瀑之琮琤實青端而黃表眇中藏而不矜匪自昭其明德羌無愧兮疇能與僧淨璋自從相見白雲間離聚常多會聚艱兩度逢迎當汝水數年隔濶是曹山客來濯足傍僧怪病不烹茶侍者間不是故人尋舊隱只應終日閉禪關鶯巧囀風臺急管清逾石澗回溪好去枝枝驚夢無人心到遼西子規栁院竹齋茅店雲蕪風樹煙溪聽徹殘陽曉月不論巴蜀東西少時作從來膽大胸膈寬虎豹億萬虬龍千從頭收拾一口吞有時此輩未妥帖哮吼大嚼無毫全朝飲渤澥水暮宿崑崙巔連山以為琴長河為之絃萬古不傳音吾當為君宣聞鸚百喙吟春不暫停長疑春意未丁寧數聲緑樹黃鸝曉始笑從前著意聽曉春出箭溪二首命駕不辭春徑泥少蓬高會帝城西物非吾輩終無賴書笑蒙莊只強齊天人湖光隨廣狹山藏雲氣互高低誰憐極目茭芻裡隱隱蒼龍卧古堤兩宋名賢小集卷二百十三
