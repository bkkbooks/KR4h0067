body:
  text: 兩宋名賢小集卷二百三十三宋陳思編元陳世隆補安晚堂詩集鄭清之林治中鄭廣文以詩來遣魯酒報聘拙語輔行長公本喜飲半入野人腹南州春夢姿亦復開醉目行想晉流麗鱉飲更升木興來索老兵誰謂酌可獨我亦愛客至陶巾時一漉雖有彭澤田種秫若不足頗因病入務瓢棄尚餘緑豈無大雅朋來伴離騷讀廣文粲簷花和靖峙修竹交情如酎醇秀句喜心沃觴政嘗卜夜談闈屢更僕何為闊芝宇但憶頽山玉聊爾遣書瓻安得洗愁斛昔誇聖人中今愧平原督今歲家釀殊未佳杯手助持螯車涎笑逢麴青州豈烏有白衣問黃菊如臯應解顔對酒頗勝俗梅聖俞詩獨坐與婦飲頗勝俗客對何時赤壁遊匏樽笑相屬欲歌鹿鳴三正苦龜藏六飲肯遺公榮雨煩過御叔欣聞麥雨岐况有魚百族小卻揖二豪觥船倒醽醁謝玉泉君黃伯厚和韻卯飲貪引巵夕食不厭腹松醪灔玉池鬱尊傲黃目歸間喜攜幼欣榮對夏木頗笑屈原醒寧甘馬周獨詩固發豪思江月欲戲漉每賡北海詠未羡西鄰足槽規長吉紅蟻玩杜陵緑醉鄉擬續記書眼瞭可讀時康萬户春興到七賢竹筵虛艷姬舞面想宫嬪沃别腸驅藥使健筆命騷僕居然得良朋清辭㵼壺玉習池可聨乘步兵有餘斛步兵厨有酒三百斛誰能酒限拘強效八州督今年小麥好豈屑官廪麴嘉節迫蒲艾早計數茰菊客中真有佳眼前喜無俗賦殷金石聲光粲牛斗屬句在後三三誰能賽六六試編諸賢詩第以伯仲叔共成杜康傳更聚山中族萬事付亡何乾坤一杯醁諸君和篇摩壘致師不容閉壁再繹前韻平生周伯仁耿耿空洞腹翛然猿鶴姿豈辨鳩鷹目僕射不解事居士偶題木種栁僅成五樂園秪可獨皓首愧商隱湛恩沾漢漉城府百無有丘壑一已足詎省醉裙紅安識隊樓緑生經未渠諳酒頌聊喜讀耳熱聞秦聲浪謂肉勝竹髙陽有勍者盛氣和曲沃直須殿上飲撫牀徑呼僕競看碗揮金幾欲斗撞玉方丈食萬錢娉婷珠一斛豈復堪束帶靡徙揖郡督耆壽祝老叨嘉名艷春麴乃知梁州萄大勝伯始菊相逢作青眼洗去爾許俗泠然曲寡和尚有騎能屬元和一漁翁喜共學士六吳歈間雅奏楚優效孫叔石鼎夜未央春空雲已族何當一會期清歡溢寒醁邴原解劇飲雅名稱龍腹季倫殺為嬉席妓敢嗔目有酒何容辭恐射蔣濟木但當攜酒去闕名賞幽獨年秫未足了孔羣聖米猶可漉杜倧愛屐憐猩魂奪巵笑蛇足桂漿有餘芳桑落見重緑諌逺衢尊投法置酺飲讀籌觥進蔌肴流觴屏絲竹未憂瓶罌罄但費匜盥沃勝事在園林家務付兒僕陶淵明傳釀羔截肪乳炮鳳泣脂玉鍊句丹九轉摛文泉萬斛競詆酒中賢秪堪帳下督穿幘俯前案障面厭方麴楊譜語魯漫漢事吹不落眼花樂天詩歸去來籬菊華胥國遨遊無懷氏風俗登詩壇爭長破愁城相屬二簋用坎四三客敬需六共樂時方清誰言世之叔相從孟公座寧别輔氏族謂鄭廣文也一笑祝諸賢行釂天家醁今內醖上尊扁以醽醁再和戲黃玉泉黃公辭酒壚經笥捧便腹讀書飢鳶聲了了崇文目陂澄萬頃波巢寄一枝木戲題百姓眼自笑孤館獨轍涸聊相濡神液未容漉嘯歌匪彈劒悁隘殊躄足文織犧尊黃句弦綺琴緑不見蟹杯持徒費爾雅讀坐對罌卧墻空有葉映竹枯腸但茶搜燥吻遲膏沃主人如馬瘦酒使欠猩僕封溪令事思折酤醖券欲訪義漿玉喟兹鯨吸量眇矣龍驤斛靈根日灌溉詩課自程督試當閲醫經薄釀借神麴共醉靈均闕未問長房菊飲興非有期衣曬寧免俗村勺雖不勝嘔泄聽隨屬懶疊陽春三肯競梟博六不飲但麥豆頗勝劉文叔醉騎黃犢孫歸玩墨君族子為評酒名擬號安晚醁謝葺芷和韻無詩不言酒荆公謂李白無一詩不言酒作賦真誑腹未破公子慳况與佳人目壯心思擊壺聖杯賡啄木樂天啄木曲不如飲此神聖杯袖想胡旋雙糚託搖手獨見陳陶獨搖手行賔筵乏酬獻醴齊催泲漉禰衡辨撾鼓元崇方病足曽無列屋粉空韻梳鬟緑百篇謫仙詠十軸蒙溪讀見顧雲池陽醉歌有美建安璩競爽淇園竹芒端寒燠轉胸次古今沃卧甕嗤舍郎祭酒可令僕漢僕射中興改祭酒時陳南北洗頗醉東西玉雖微醖五斗端有才一斛詩壇長齋盟筆陳嚴總督方將喝銀雲未肯平封麴李賀酒酣喝月使倒行銀雲櫛櫛搖殿明陸龜蒙中酒賦拔酒樹平麴封宮宴看傳柑帝歌須和菊德宗作黃菊歌翰林學士韋綬奉和牛心固異饌犢鼻且同俗尊酒日相逢我歌君為屬歡期踐三五釀頃戲十六樂府庾信對酒人生一百年歡笑惟三五王續有田十六頃悉以釀酒酣暢嗟阮修飲狂謝裴叔裴叔則語石崇云飲人以狂藥責人以正禮窪尊留古製長勺分魯族居然同老襟淺斟醽水醁湘東有醽水故酒得名謝鄭廣文和韻鱣堂心醉經精神應滿腹溫飽無所志飲食不以目溫公謂今人以耳而衣以目而食説詩稱解頥善問待攻木頗愁百斛量孔庭惟立獨爼豆答衛問筐瓷欠鄒漉見鄒陽酒賦曽子非養口漆園且尊足時於清夜分酌以翠勺緑緑尊翠勺為君斟酌聊澆磊磈胸不廢吾伊讀每篇亦作句來詩每篇必有亦作語如對紀書竹相逢蓋初傾一别桑重沃融尊慙坐滿魯餽疏拜僕衛生不自寶抑首新患玉囊無諛墓金米乏佳傳斛厨煙㸑人清蔬課園夫督粟瓶收秫田黍釀用隂麴解同杜陵襟期醉昌黎菊赤手當縳莵來詩有白戰之語白眼漫嗔俗莊虛左氏晏觴肯西子屬坡賦屬此觴於西子酒債負尋常會期遭百六要須中聖賢庶以展伯叔謂宗盟也醉入無功鄉醒豈屈原族漢徙屈昭景大族岸幘一笑粲共賦醽酒醁晉張載有醽酒賦雨中即事簡二友怒蛙頻作灌夫罵老鸛惟聞莊舄吟麥熟只應呼快活林間欠此一聲禽舉頭但覺雲頭暗移腳何曽雨腳乾衣夾未便時衣褐薄寒渾作晚秋看鳩能喚雨復呼晴日日長從屋角鳴晴雨不應關汝事強饒脣舌效君卿五月炎天正及時輕絲扇子未曽持殷勤寄語班姬道只恐秋深却夢伊籜龍厭俗託孫兒鄰竹過墻隔砌相過人不知借宅敲門太多事匡牀竟日對漪漪鶯聲求雨亂繅車兀坐翻思二客佳乞得晚晴紅照水南坡東畔月侵階客有誦袁蒙齋得雨酬倡之什轍賡元韻志喜也呈虛齋使君雷伯四月瘖無聲鳴鳩呼婦鳬浴晴星如榝沙燈吐焰羲和駕鞭乘赤明稚秧針水未入種秀麥浪畦猶督耕香車不動百龍蟄轉漉如織千蛇橫愛民太守心語口癲我以旱寧無生川靈有知龜亦許異物蜿蜒歸掌撫一雨果從方寸來此念端誠本天與但看父老歌豐年不用兒童學皇舞弭災肯效欒巴噀哺民無異紫芝乳一年事在阿堵中四封笑溢迎門語我州瀦野同淮徐公方有意六輔渠上天下澤鍾惠施千里波及皆君餘蒙齋詩成虛齋和我樂賦之如遂初坐對聨珠飽官粟但有歡喜無欷歔秪今快續二賢詠不須乞米與顔書又媧石補天玻璃聲遇坎為雨離為晴金烏玉兔旁午出百二十官稱常明下土臣敢再拜問誰主風雨催民耕天江津河尾北見玉井水漿參左橫何為湯旱龜土坼何為堯水魚頭生孰令赤地星丈許吭扼雷公仍背撫孰令河鼓塞銀潢勺水線流不輕與孰令捲舌自張翕孰令天雞自飛舞雲師族聚曷遽散電母兒號奚不乳黑豬渡河去無迹蒼龍銜珠噤弗語朱鳥崛強王偃徐烏龜縮頸老沮渠夫君箋天帝馮怒旱魃磔死不問餘天街清潤聨珠璧不為乾封為太初一雨三日誰力歟更唱迭和忘欷歔歸之太守不肯有欸乃聊代志喜書又豢龍作醢龍吞聲天公憤憤迷雨晴玉脂泣烹足媚嫵苦酒五色生光明龍雖神物畏饞吻攜朋去作天田耕稚禾婉婉魚薧立髙原庚庚龜兆橫漢家燮調豈無術隂陽縱閉歸董生闕我貧自笑一瓢許瓶粟屢空慙釜與彭澤從無種秫資沂水聊助詠雩舞頗怪吹雲讀風頌浪愁淅米翻危語清時何事洪羊烹善政端無寧虎乳仁人拯溺非姑徐亟挽天漢如決渠我知造物識君意十日一雨焉取餘願君展此作霖手蘇民旱從扶黃初在在京坁賦髙廪坐令歌頌笑欷歔病坡作計羮玉糝辟穀寧羡黃石書湖上口占賣葑千艘底處藏媧天濯熱卧湖光山雲既雨猶相逐水草無花亦自香野徑遍穿人借問僧茶旋點客先嘗翻思舉世趨炎者誰識蘋風五月涼戲續前韻簡幕掾林治中梅林妬日強遮藏西雨東邉漏隟光黃口禽鳴應乳臭白花梔坼似荷香排根荷出憐嵇紹遁迹蓴肥哂孟嘗後湖之後荷蓴間有在者間處便成清境界底須沂水羡雩涼煮白酒送林治中長門思客薦寒泉浪讀松醪桂酒篇數米釀來成玉液傳家方祕出金川白飛瓊斝應歸重紅滴珠槽敢忌前聊遣朋壺共一笑平分風月晚涼天偶成呈林鄭二友兩絶人才百年能幾見俗子一揖已纍人元溫亦知有此客德操未省誰為賓聲名谷口我宗秀風調西湖我輩人自是山巖著不得天教暫此伴間身旌德觀􅌡丈移從弱水間君恩泮奐得躋攀茗香壺酒成三事巾褐枝笻占獨班境勝亦能充道勝官間何似在家間元都猶有桃花在更向西湖訪好山緑蓑青笠慣孤蒲錯認東湖處士居舟尾笑迎車後客渡頭催買網中魚水程趣戍半規日山意論交千卷書歸去重樓試凝望恍曽雲氣矗凌虛又半生東甬數間屋一日西湖十首詩回首風光少年客春山擁翠作蛾眉賜第登樓避俗懶成癖登樓睡失魔忘機鷗自下開檻蝶相過髙處景差勝靜中春更多君恩欲以報歸夢欲如何又桃李漫山不是春紛紛蜂蝶趂遊人梅花已帶春歸了分付垂楊浥露塵病思歸心走兔迒自嗤幻境未渠忘并州便作咸陽看説若乾桑亦故鄉觀王導傳作江東老子惠之和九錫牛車愠蔡婆不殺伯仁君信否淡然推分意如何間中偶成病覺身名小間知日月忙篆香雲四合盆篠竹千章慧性乾成障愁懷弱未張何如莊宇定虛室自天光春過日初永睡餘日未忺露花心翼翼風葉喜沾沾殿後蜂尋穴懷歸燕語簷隨陽在何處落絮點疏簾兩宋名賢小集卷二百三十三
