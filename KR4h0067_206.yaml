body:
  text: 兩宋名賢小集卷二百六宋陳思編元陳世隆補觀我軒集方信孺字孚若莆田人有雋材未冠能文周必大楊萬里見而異之以父廕補番禺縣尉韓托胄舉恢復之謀朝廷尋悔金人亦厭兵時方有和議近臣薦信孺可使自蕭山丞召赴都命以使事還言敵所欲者五事割兩淮一增嵗幣二犒軍三索歸正等人四其五未敢言托胄再三問至厲聲詰之信孺徐曰欲得太師頭耳托胄大怒奪三秩臨江軍居住信孺自春至秋使金三往返以口舌折強敵已而王楠出便定和議增幣函首皆前信孺所持不可者通判肇慶府洞冦竊發同廖德眀措置收捕就命知韶州至郡即封崇張九齡余靖墓擒赤水洞賊戮之轉承議郎知道州尋提點廣東刑獄奏縱不決之訟數千人遷淮東轉運判官知真州即北山匱水築石堤袤二十里人莫知其所為後金人薄儀真守將決水匱以卻敵城乃獲全山東初內附信孺言冝選威望重臣將精兵數萬開幕府以彈壓之坐責降再奉祠信孺性豪爽揮金如糞土所至賔客常滿其使北時年甫三十既齟齬歸築室巖竇自放於詩酒後資用竭賔客益落信儒尋亦死矣虞山西風攪桂樹落日明楓林遊子懷歸期豫悲渺登臨虞山一何高湘水一何深英皇僅枯冡寂寞薰兮琴我欲奏古曲俗耳更窪淫古器不可見聊作相思吟相思長相思相思無古今一歌衆鳥聽再歌萬籟喑推手君勿歌有酒且孤斟落落此時意寥寥千載心五絃毋容絶四海誰知音龍隱岩石門元不鎖岩屋本無基九夏花猶在千年樹倒垂僧間方定起客到每歸遲甚欲眠蓬葉沿崕讀斷碑灕山雲崖軒不用窮探費杖藜隱然林壑挾城陴曾遵月洞千岩上更著雲崖一段竒拂拭軒窗容爼豆發揮泉石借聲詩瞿曇頗似知人意已約梅花帶雪移西山鑿池種白蓮作池開新白遍天涯未許東風擅一家蒼桂叢中蒼桂樹碧蓮峯裏碧蓮花波光分破湖千頃雲影斜飛水一窪待著欄干橫淺緑浮萍開處見魚蝦咏西山海棠真珠幾顆最深紅點綴偏方造化工好事何年移蜀種美人清曉出吳宫妖嬈能得幾時賞零落才消一夜風自有生香人不識繡衾全覆錦熏籠清秀山尋遍洞天三十六蒼靈獨閉此嵓扉旋除野草開新徑遮莫寒藤刺客衣嵗月偶同題壁字煙霞似不放人歸把茅欲作開山主已落瞿曇第二機還珠洞歸舟多載小江春重訪東巖舊屐痕插水峭崕猶有路垂天怪石本無根金華仙伯真知己薏苡將軍足斷魂安得北山公可作倩渠移取向家園題龍隱岩愛山那惜走千回生怕前驅後騎催石上參差鱗甲動眼中在處畫圖開彩鸞未辦乘風去浮鷁何妨載雨來人事百年俱變滅秪應題字不塵埃雨腳初收魚尾霞滿溪流水半溪花尋源曽識武陵洞泛宅如浮苕霅家但得嵌空元有路何如峭絶不容車道人辛苦經雲水成塔從來是劫沙慶逺龍隱洞南山山北北山南一洞中分路口三飛鶴叫雲聲自逺懶龍慳雨睡方酣襄公淡墨留蒼壁太史高風拂翠嵐百尺岩前清絶處道人先我著茅菴龍隱岩曾傍武夷九曲何如桂嶺七星水石小容螭隱煙雲長帶龍腥越王臺萬山滚滚盡東來高處猶存百尺臺回首舊時張樂地一杯重與酹蒼苔石門吕嘉積石浪相傳雙闕天開尚宛然成敗古今俱一夢千秋何似老樓船金鎖潭西來異獸路應迷金鎖何年落此溪不比李侯心似水歸舟猶擲石門西題龍隱岩春波飽微緑斗柄函空明方舟貫巖腹鵝鸛相酬鳴仰窺穹窿頂宛轉百怪呈僅餘鱗甲碎不見頭角獰下闖清泠淵演迤萬頃澄但同魚鳥參勿遣蛟龍驚抉苔橅竒篆倚棹看題名三將標殊勳自與山不傾誰歟贅小築正恐嗔山靈南澗更幽絶山佛依崢嶸太虛可為室豈復資欒楹乳泉助茗碗中有氷雪清何須參鸞去此即白玉京鼎來不速客抱琴忽遲迎愛此無絃曲巖溜同一聲為君洗塵耳喚我詩魂醒祗愁白衣到好句無繇成兩宋名賢小集卷二百六
