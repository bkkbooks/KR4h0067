body:
  text: 兩宋名賢小集卷八十三宋陳思編元陳世隆補古靈集陳襄字述古侯官人少孤能自立出遊鄉校與陳烈周希孟鄭穆為友相與倡道海濱聞者皆笑且驚守之不變卒從而化謂之四先生襄第進士調浦城簿攝令事民有失物者捕偷兒至數輩相撑拄襄語之曰某廟鐘能辨盜犯者捫之輒有聲乃率同列詣鐘所祭禱隂塗以墨而以帷蔽之一人手無所汙遂服罪知河陽縣始教民種稻富弼為郡守禮遇之襄留意教事進縣子弟於學或讒之於弼襄講説不少懈弼入相薦為祕閣校理判祠部厯知諌院改侍御史知雜事論青苖法乃管商之術非聖世所宜行望貶斥王安石吕惠卿以謝天下又乞罷韓絳政府以杜大臣爭利而進者且言韓維不當為中丞皆不聼召試知制誥以言不行辭補外安石欲以為陜西轉運使帝特留修起居注襄懇辭手詔諭之乃就職踰年知制誥安石乂欲出之帝不許尋直學士院安石益忌之摘書詔小失出知陳州徙杭州以樞密直學士知通進銀臺司兼侍讀判尚書都省卒年六十四贈給事中襄蒞官以興學為先平居以講求民間利病為急既亡篋有手書數十幅盈紙細書大抵皆民事也神宗嘗訪人材可用者襄以司馬光韓維吕公著蘇頌范純仁蘇軾至於鄭俠三十三人對謂光維公著不當久外謂俠竄瘴癘使得生還帝不能盡用洛陽曲有客頓征轡暮宿洛陽堤洛陽繁華地慨然心傷悲憶昔季倫家朱門鼎貴時錦步四十里冠蓋相追隨寵移百琲珠醉擊珊瑚枝一旦委溝壑身隨朝露晞綺樓日顛仆金谷無人歸緑珠千古魂散作香塵飛荒榛塞中道惟有寒螿啼嗟哉百世後驕奢徒爾為幽菊有幽斯菊濯濯其芳蒸爾髦士惟其修兮有美于鄉照余無以説兮惟醴之觴有幽斯菊煜煜其華蒸爾髦士惟其施兮有顯于家往余無以將兮惟古之嗟送關都官致仕鴻鴈于飛歸戾于澤君子于田亦適惟則旅力不愆曷云其極庶民之髦職自為愚君子之耋其德有濡旅力不愆曷云其劬有堅松柏君子斧之有實秠稷農夫有之天子有老曷其與歸野有白駒來食我牟君子之往胡為不留我心悠悠為天子憂樓上曲金徒抱箭寒更起寂寞孤城一千里嫦娥擎出月華來白玉樓臺瑩如水上有佳人紅粉粧妙年學得吹霓裳呼兒將出紫玉笛一聲天外流宫商宫商欲盡何幽咽曲調不成聲斷絶羅衣掩淚愁向天手把瑤華歌一闋寒蟾出兮眀星稀良人阻兮天一涯憑軒遙望兮心傷悲願隨鴻鵠兮髙飛荔枝歌畨禺地僻嵐煙鎖萬樹纍纍産嘉果漢宫墜落金莖露秦城散起驪山火炎炎六月朱眀天映日仙枝紅欲然自古清芬不能遏留得嘉名為椹仙上皇西去揚妃死巒海迢迢千萬里華清宫闕閴無人南來不見紅塵起至今榮植遍閩州離離朱實繁星稠一日為君宜變色千里憑誰速置郵可憐錦幄神仙侶為飲凝漿滌煩暑綺筵不惜十千錢酩酊秦樓桂花醑秦樓女子繡羅裳鳯簫嗚咽流宫商醉歌一曲荔枝香席上少年皆斷腸古靈山試茶歌乳源淺淺交寒石松花墮粉愁無色眀星玉女跨神雲鬬剪輕羅縷殘碧我聞巒山二月春方歸苦霧迷天新雪飛仙鼠潭邊蘭草齊霧鴉吸盡香龍脂轆轤繩細井花暖香塵散碧琉璃捥玉川氷骨照人寒深入千盤與萬盤瑟瑟祥風滿眼前紫屏冷落沈水煙山月堂軒金鴨眠麻姑癡煮丹巒泉不識人間有神仙遊冝興法藏院觀杜紫菊花山茶花開菊花紫青桂重重立花裏柔枝翠幹已可憐更傍幽叢看花蘂山僧揖我臨階坐眼到闌邊心即喜便欲攜歸種郡齋忍令此地風煙埋晚景晚崿殘霞斷晴空宿靄收緑蕪天共逺眀月水同流落葉填秋望孤砧答旅愁提壺伴詩筆獨醉庾公樓幽齋幽徑絶塵蹤莓苔上粉墉秋聲連夜雨寒色一溪松學有書千卷歡無酒萬鍾雲屏孤夢斷寂寞掩巫峯金華山人幽居倚翠巒塵事不相干天地醉來小琴碁靜裡歡雨苔春徑緑風竹夜窗寒若問長生術金爐有寶丹和鄭閎中仙居我愛仙居好園池日退居馴禽來鶴鶴野水進徐徐草樹通樵採桑麻有老鋤猶言民未樂更待寢刑書墨崖道中作隂山沙漠外六月苦行人水迸金蓮曉湯回鐡腳春馬飢思漢草僕病卧邊塵夜夢金華阻披衣望北辰水口贈别大吉祖師長老直向此間眀縱橫語論精山中嘗入定世上未知名一雨春溪漲千峰曉雪晴臨分無别説相送水邊行舟次巴峽江流何險阻次第入三巴崕斷時無路山深更有家鄰蔬饒竹笋鄉果足枇杷况有荆州釀淹留不用嗟觀海天柱支南極蓬山壓巨鼇雲崩石道險潮落海門髙客館聞鼉鼓秋風憶蟹螯倚闌望鄉野千里楚江臯九日與浦城縣學諸生遊南峰院九日黃花節新尊緑蟻浮投壺鳴魯鼓歌者似商謳諸子衣冠盛先儒禮樂修西巖山景好為爾作陽秋送别探得南字謫宦情牢落窮通理更諳讀書不廢事道古亦何慙昔喜鄰州守嘗陪後乘驂西湖遊未厭北海飲方酣躡屐扳雲嶠捫蘿訪竹庵鷺濤干頃雪鷲嶺萬堆藍聲價時難一睽離嵗忽三陪京方接畛歸省會同參士子文宗愈朝廷禮問聃好留君左右俄領郡東南嵗旱錢仍貴民飢命不堪下車寬賦役露冕訓田蠶畫舸乘春别新書卜日覃牙旗風發發瑞節虎耽耽龍鳯吳王骨煙霞古佛龕荷香輕泛浦桂子靜飄嵐草澤行吟苦蘭陔奉養甘子文無愠色夷甫足清談物外冥天籟樽前據石楠惟應憐舊尹漁釣負江潭悼古碧城樓角重凝眸迤邐平原接古丘七國戰爭人不見六朝興廢水長流逺煙芳草年年事眀月清天夜夜愁范蠡功成在何處五湖波上一扁舟春日賞林亭把酒春亭覽衆芳水晶簾箔逗山光孤松冷落千年操野槿紛華一日香緑圃煙深迷蛺蝶曲池波暖睡鴛鴦文園莫惜驦裘費買取宜城作醉鄉寄逺飛鵲翩翩暮欲栖楚天新月射璇題袖中己滅三年字心曲唯通一點犀步障影迷金谷路桃花香隔武陵溪瑤華好折無人寄腸斷江樓百尺梯織女眀河清淺曙星稀一夕歡娛一嵗違不是盈盈隔流水多應軋軋廢殘機人間纍鵲經秋會天上奔龍逐曉歸期約黃姑重相見伯勞東翥燕西飛夜意薰爐香燼蕙煙沈凛冽寒生翡翠衾月國音塵千里絶仙山樓閣五雲深離懷暗耿金壺漏獨夢多驚玉女砧騎省中郎才調逸擬將文筆賦秋心和正辭職方以濬河留滯萬衆如雲濬禹溝荀卿橋畔艤行舟珠躔合照賢人聚銀漢無波海客留且作東山攜妓樂未應南浦送君愁辛夷花發春醅熟只俟郊原雨少休依韻和徐郎中毗陵重陽自愴宫車别帝臺寄言籬菊不須開心喪忍到行春浦耳病慵攜遲月杯天色隂沈迷鴈過物華零落暗蛩催却輸小杜憐嘉節酩酊齊山夜始回和郎中九月望日始見菊花月滿霜飛菊始華幽叢冷落帶煙斜籬邊過却重陽酒澤畔誰憐野草花漫學先生歸解組最憐當日老居家皆因晚節無人用隕涕臨風為爾嗟登雄州南門偶書呈知府張皇城城如銀甕萬兵環悵望孤城野蓼間池靣緑隂通易水樓頭青靄見狼山漁舟掩映江南浦使驛差池古北關雅愛六韜名將後塞垣無事虎貔間使還咸熙館道中作土曠人稀使驛賖山中殊不類中華白沙有路鴛鴦泊芳草無情妯娌花氊館夜燈眠漢節石梁秋吹動胡笳歸來覽照看顔色陡覺霜毛兩鬢加重陽閣下和同舍君逢佳節憶還家我亦淹留感嵗華清禁讐書驚白髮故園吹帽負黃花謝安行有登山屐揚子居無載酒車何日得歸溪上隱大收圖史作生涯和程大卿遊鳯池院白雲深處一軒開鳯去池空折野梅山入九龍爭夭嬌路盤千騎久徘徊煙嵐翠入尊前滴水石清從澗底來誰與忘機此栖息笑看林鳥下髙臺東園觀雪風毛雨絮小園東天幕低垂慘淡空蘋浦萬家雲覆瓦花溪千樹玉雕籠穿林已奪春梅早夾隴潛滋夏麥豐獨酌小樓雖可賦豈無捐瘠在溝中古城蘆葦蕭踈天氣清水含山色照重城緑蕪何處管絃地碧落舊時鐘鼓聲三峽橋邊秋雨過六鼇宫裏夜潮生蕭郎秦女無歸約十二樓臺空月眀和子瞻乞得湖山養病身花時曽共憶行春鶯鳴幽谷還遷木觱沸清泉復采芹皂蓋尋芳丘有李綵樓觀戲巷無人錦河公子歸何晚獨念溝中菜色民春隂漠漠燕飛飛可惜春光與子違半嶺煙霞紅斾入滿湖風月畫船歸緱笙一闋人何在遼鶴重來事已非猶憶去年題别處鳥啼花落客沾衣和子瞻牡丹原韻新接枝頭色倍添馬蹄尋處帽欹簷春工别與鉛華麗佛地偏資好相嚴紅蕊欲開丹未渥素香堪掬雪非甜詩翁何事辜真賞無限風光入畫簾常州郡齋使君非是愛山間道在盈虛消息間不見白雲無一事等間為雨却歸山過罨畫溪五雲無處問新亭月裏乘舟半夜行不見藤花相掩映鄉人遙指畫溪名余自白陽馳謁宜都周夢得長官飲于清江亭愛其山水之勝留題於壁丹山西去水東流亭在山南隔蓼洲船繫白楊歸不得清江如畫主人留喜江南梅度支至淡泊交情老更濃為君彈瑟送金鐘苧蘿香徑無人到姑射仙姿是處逢鸞鶴品流慙晚達煙霞門户憶先容公餘莫放西湖景步步蒼苔岸岸松公望當年最得君畫圖城郭喜同羣門前碧浪家家海樓上青山寺寺雲松下玉琴邀鶴聽溪邊苔石共僧分情多景好知難盡且倒金尊任半醺題林和靖水亭城外逋翁宅開亭野水寒冷光浮荇葉靜影浸漁竿吠犬時迎客飢禽忽上闌踈籬僧舍近嘉樹鶴庭寬拂砌煙絲裊侵窗筍戟攢小橋橫落日幽徑轉層巒好景吟何極清歡畫亦難憐君留我意重疊取琴彈初之樂安水逐雲根動山縈馬首青下車蓬繞膝拂几鳥窺屏吏老鶉衣結民貧菜色冥瘡痍傷未起矧忍瀆邦刑宿猿洞幾年營此草堂栖施飾名園百卉齊曽學子真耕谷口今容摩什老山西龍臺日午千峰出雁塔雲生一徑迷知有嶺猿猶在否使君髙卧莫教啼登越王山荔子園林海日邊幽亭更在碧雲巔江山舊是無諸國樓殿今為極樂天五馬定知少暇日一尊何必盡華筵須知白首留連意己有新詩寄北船和程大卿遊升山詩相逢不及荔枝期况值千巖雪灑時南國詩人偏去逺北山逋客獨來遲雲中直有三清路城外都如一局棊聞説引泉堪洗藥未應奪我鳯凰池寄題林迥南華洞梅嶺峯前習隱亭拂衣聊此玩真經四時花木錦繡谷十里江山水墨屏猿鶴只愁空北嶽鵾鵬終待化南溟知君不是榮軒冕未忍鑑鏘去帝庭劉國博命賦假山去年水潦百榖死居民無食食糟粃州之餓者數千人黃巖之民猶倍蓰攜持老少出城郭盡徹牆屋無居止鬻妻棄子人不售價例不復論羊豕白日市井聞叫號夜堆廊廡如蟲豸縣官哀憐發賑救一飯才得一盂爾出門未暇充喉咽已有數十填溝水我時過之不忍顧往往悲咽胸填委豈無智慮禆萬一逺地不得號君耳錢侯作倅忠且仁悲憐餓殍如親子日開官廪與之食又令豪右發儲峙昨日馳書白轉運披陳肝腎獻金矢更乞兵儲二萬斛民之大命方有倚侯從新年作假山自聞民飢不得視非無泉石可行樂人今方瘁何能喜願侯勿遽愛此山念此煢煢存狐蟻天無疫癘五榖熟生者保聚歸田里此山之石堅不堅將與侯德無窮已和鄭閎中仙居我愛仙居好臨民必以誠簿書無日暇獄訟積年生百疾求針補千鈞待凖平嗟豫不如古斯道未能宏我愛仙居好隆儒鮮大方諸生令講義童子俾升堂買地興民學驅車下黨庠三年邑未化官滿意倣徨我愛仙居好公餘日在房憂民極反覆責已未周詳法律行隨手詩書坐滿箱老來須向學多病喜平康題寶嚴院垂雲亭小亭巉絶出雲間萬象升沈不得間莫怪詩翁頭白早時來向此寫湖山兩宋名賢小集卷八十三
