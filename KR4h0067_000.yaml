body:
  text: 兩宋名賢小集總集類提要臣等謹案兩宋名賢小集三百八十卷舊本題宋陳思編元陳世隆補思有寶刻叢編世隆有北軒筆記並已著録是編所録宋人詩集始于楊億終于潘音凡一百五十七家有紹定三年魏了翁序及國朝朱彛尊二跋考所載了翁序與寶刻叢編之序字句不易惟更書名數字其為偽托無疑彛尊跋中謂是書又稱為江湖集刻於寶慶紹定間史彌逺疑有謗已之言牽連逮捕思亦不免詩板遂毁按刋江湖集者乃陳起非陳思且江湖集所載皆南渡以後之人而是書起自楊億宋白二書迥異彛尊牽合為一紕繆殊甚然考彛尊曝書亭集有宋髙菊澗遺稿序中述陳起罹禍之事甚悉未嘗混及陳思而集中亦不載此跋當由近人依托為之未必真出彛尊手又跋內稱陳世隆為思從孫于思所編六十餘家外增輯百四十家稿本散逸曹溶復補綴之今檢編中所録率多漏略如王應麟集雖不傳其遺篇見于四明文獻集者尚多而此編僅以五首為一集溶不應疏略若此則謂曹溶補綴亦不足信也考王士禎居易録曰竹垞輯宋人小集四十餘種自前卷所列江湖詩外如劉翼躔父心遊摘稿林希逸鬳齋十一稿敖陶孫器之臞翁集朱繼芳季實靜住集林尚志潤叟端隱稿劉過改之龍洲集劉仙倫叔擬招山集黃文雷希聲看雲集黃大受德容露香拾稿武容朝宗藏拙稿張藴仁溥斗野集劉翰武子小山集張良臣武子雪忩集趙希㯝誼父抱拙集利登履道骳稿何應龍子翔橘潭稿沈説惟肖庸齋集釋永頤山老雲泉集薛嵎仲止雲泉集俞桂希郤漁隱稿葛天民無懷集姚鏞希聲雪篷集云云是彛尊本有宋人小集四十餘卷或舊稿零落後人得其殘本更掇拾他集合為一集又因其稿本出彛尊遂嫁名偽撰二跋歟然編詩之人雖出贋託而所編之詩則非贋託宋人遺稿頗藉是以薈稡其搜羅亦不謂無功黎邱幻技置之不論可矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀兩宋名賢小集原序豫無他嗜惟書癖殆不可醫臨安鬻書人陳思多為豫收攬散逸扣其書顛末輒對如響一日以其所梓聖宋羣賢小集見寄且求一言蓋屢却而請不已發而視之珠玉琳琅粲然在目嗚呼賈人窺書於世而善其事若此可以為士而不如乎撫卷太息書而歸之紹定三年夏四月鶴山魏了翁按陳思所編羣賢小集當時藝流遊客多挾此以干謁時貴稱為國寶新編又稱為江湖集者是也鐫本已屬希覯近日海內藏書家間有鈔本而現在著名之集率皆不録所以止有六十餘家不等噫假非陳思編輯之力此六十餘家者保無有湮沒勿傳者乎宜一書賈而為大儒所嘉嘆也此外百四十家係其從孫世隆所編秀水後學朱彛尊書思所編羣賢小集皆其同時不甚顯貴之人刻於宋寶慶紹定間史彌逺柄國疑劉過集中有謗已之言牽連逮捕思亦不免詩板遂燬其從孫世隆當元至正之末復合兩宋名人之詩選而梓之甫完數家復遭兵燹其稿本流傳日以散逸吾鄉曹倦圃先生僅得其十之二三率皆糜壞乃補綴成編復汰其近日盛行諸集留得二百餘家選宋詩者當於此中求之彛尊又記欽定四庫全書集部八兩宋名賢小集總目總集類卷一楊億一卷二楊億二卷三楊億三卷四楊億四卷五宋白卷六王操卷七文彥博卷八陳洎卷九冦準一卷十冦準二卷十一冦準三卷十二冦準四卷十三冦準五卷十四冦準六卷十五冦準七卷十六田錫卷十七胡宿卷十八尹洙卷十九魏野一卷二十魏野二卷二十一魏野三卷二十二夏竦卷二十三宋庠卷二十四宋祁卷二十五黃庶一卷二十六黃庶二卷二十七李師中卷二十八蘇頌卷二十九張維卷三十謝逸卷三十一謝薖一卷三十二謝薖二卷三十三謝薖三卷三十四謝薖四卷三十五謝薖五卷三十六謝薖六卷三十七謝薖七卷三十八劉筠卷三十九范鎮卷四十王圭卷四十一劉摯卷四十二司馬光一卷四十三司馬光二卷四十四司馬光三卷四十五司馬光四卷四十六司馬光五卷四十七司馬光六卷四十八張先卷四十九富弼卷五十毛滂卷五十一劉敞一卷五十二劉敞二卷五十三劉敞三卷五十四劉敞四卷五十五劉敞五卷五十六劉敞六卷五十七王琪卷五十八邵雍卷五十九梅摯卷六十唐詢卷六十一王安國卷六十二朱長文一卷六十三朱長文二卷六十四劉攽卷六十五曽鞏卷六十六孫抗卷六十七朝説之卷六十八夏均父卷六十九杜衍卷七十蘇洵卷七十一蔡襄一卷七十二蔡襄二卷七十三華鎮卷七十四蔣之竒卷七十五馮山一卷七十六馮山二卷七十七潘大臨卷七十八許將卷七十九石延年卷八十郭祥正一卷八十一郭祥正二卷八十二葛立方卷八十三陳襄卷八十四劉叔贛卷八十五楊傑卷八十六祖無擇一卷八十七祖無擇二卷八十八祖無擇三卷八十九祖無擇四卷九十舒亶卷九十一朱辨卷九十二周諤卷九十三李之儀一卷九十四李之儀二卷九十五劉弇卷九十六陶弼卷九十七楊時一卷九十八楊時二卷九十九楊時三卷一百陳瓘卷一百一王安中卷一百二吕本中一卷一百三吕本中二卷一百四吕本中三卷一百五黃裳卷一百六張商英卷一百七王亘卷一百八蔡確卷一百九蔡肇卷一百十晏殊卷一百十一饒節一卷一百十二饒節二卷一百十三彭汝礪卷一百十四徐俯卷一百十五李彭卷一百十六洪炎一卷一百十七洪炎二卷一百十八張方平卷一百十九張綱卷一百二十賀鑄一卷一百二十一賀鑄二卷一百二十二賀鑄三卷一百二十三李維卷一百二十四鄭剛中卷一百二十五曽季狸卷一百二十六沈括卷一百二十七李豸卷一百二十八傅察卷一百二十九歐陽徹卷一百三十程皓卷一百三十一遊酢卷一百三十二章楶卷