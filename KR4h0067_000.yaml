body:
  text: 兩宋名賢小集總集類提要臣等謹案兩宋名賢小集三百八十巻舊本題宋陳思編元陳世隆補思有寳刻叢編世隆有北軒筆記並已著録是編所錄宋人詩集始于楊億終于潘音凡一百五十七家有紹定三年魏了翁序及國朝朱彛尊二跋考所載了翁序與寳刻叢編之序字句不易惟更書名數字其為偽托無疑彛尊跋中謂是書又稱為江湖集刻於寳慶紹定間史彌逺疑有謗已之言牽連逮捕思亦不免詩板遂毁按刋江湖集者乃陳起非陳思且江湖集所載皆南渡以後之人而是書起自楊億宋白二書迥異彛尊牽合為一紕繆殊甚然考彛尊曝書亭集有宋髙菊磵遺稿序中述陳起罹禍之事甚悉未嘗混及陳思而集中亦不載此跋當由近人依托為之未必真出彛尊手又跋内稱陳世隆為思從孫于思所編六十餘家外増輯百四十家稿本散逸曹溶復補綴之今檢編中所録率多漏畧如王應麟集雖不傳其遺篇見于四明文獻集者尚多而此編僅以五首為一集溶不應疎畧若此則謂曹溶補綴亦不足信也考王士禎居易録曰竹垞輯宋人小集四十餘種自前巻所列江湖詩外如劉翼躔父心㳺摘稿林希逸鬳齋十一稿敖陶孫器之臞翁集朱繼芳季實静住集林尚志潤叟端隠稿劉過改之龍洲集劉仙倫叔擬招山集黄文雷希聲看雲集黄大受徳容露香拾稿武容朝宗藏拙稿張藴仁溥斗野集劉翰武子小山集張良臣武子雪忩集趙希㯝誼父抱拙集利登履道骳稿何應龍子翔橘潭稿沈説惟肖庸齋集釋永頤山老雲泉集薛嵎仲止雲泉集俞桂希郄漁隠稿葛天民無懐集姚鏞希聲雪篷集云云是彛尊本有宋人小集四十餘巻或舊稿零落後人得其殘本更掇拾他集合為一集又因其稿本出彛尊遂嫁名偽撰二跋歟然編詩之人雖出贋託而所編之詩則非贋託宋人遺稿頗藉是以薈稡其蒐羅亦不謂無功黎邱幻技置之不論可矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀兩宋名賢小集原序予無他嗜惟書癖殆不可醫臨安鬻書人陳思多為予收攬散逸扣其書顛末輒對如響一日以其所梓聖宋羣賢小集見寄且求一言葢屢却而請不已發而眎之珠玉琳瑯粲然在目嗚呼賈人闚書於世而善其事若此可以為士而不如乎撫巻太息書而歸之紹定三年夏四月鶴山魏了翁按陳思所編羣賢小集當時藝流遊客多挾此以干謁時貴稱為國寶新編又稱為江湖集者是也鐫本已屬希覯近日海内藏書家間有鈔本而現在著名之集率皆不録所以止有六十餘家不等噫假非陳思編輯之力此六十餘家者保無有湮没勿傳者乎宜一書賈而為大儒所嘉嘆也此外百四十家係其從孫世隆所編秀水後學朱彛尊書思所編羣賢小集皆其同時不甚顯貴之人刻於宋寶慶紹定間史彌逺柄國疑劉過集中有謗已之言牽連逮捕思亦不免詩板遂燬其從孫世隆當元至正之末復合兩宋名人之詩選而梓之甫完數家復遭兵燹其稿本流傳日以散逸吾鄉曹倦圃先生僅得其十之二三率皆糜壞乃補綴成編復汰其近日盛行諸集留得二百餘家選宋詩者當於此中求之彛尊又記欽定四庫全書集部八兩宋名賢小集總目總集類巻一楊億一巻二楊億二巻三楊億三巻四楊億四巻五宋白巻六王操巻七文彦博巻八陳洎巻九冦準一巻十冦準二巻十一冦準三巻十二冦準四巻十三冦準五巻十四冦準六巻十五冦準七巻十六田錫巻十七胡宿巻十八尹洙巻十九魏野一巻二十魏野二巻二十一魏野三巻二十二夏竦巻二十三宋庠巻二十四宋祁巻二十五黄庶一巻二十六黄庶二巻二十七李師中巻二十八蘇頌巻二十九張維巻三十謝逸巻三十一謝薖一巻三十二謝薖二巻三十三謝薖三巻三十四謝薖四巻三十五謝薖五巻三十六謝薖六巻三十七謝薖七巻三十八劉筠巻三十九范鎮巻四十王珪巻四十一劉摯巻四十二司馬光一巻四十三司馬光二巻四十四司馬光三巻四十五司馬光四巻四十六司馬光五巻四十七司馬光六巻四十八張先巻四十九富弼巻五十毛滂巻五十一劉敞一巻五十二劉敞二巻五十三劉敞三巻五十四劉敞四巻五十五劉敞五巻五十六劉敞六巻五十七王琪巻五十八邵雍巻五十九梅摯巻六十唐詢巻六十一王安國巻六十二朱長文一巻六十三朱長文二巻六十四劉攽巻六十五曽鞏巻六十六孫抗巻六十七晁説之巻六十八夏均父巻六十九杜衍巻七十蘇洵巻七十一蔡襄一巻七十二蔡襄二巻七十三華鎮巻七十四蔣之竒巻七十五馮山一巻七十六馮山二巻七十七潘大臨巻七十八許將巻七十九石延年巻八十郭祥正一巻八十一郭祥正二巻八十二葛立方巻八十三陳襄巻八十四劉叔贛巻八十五楊傑巻八十六祖無擇一巻八十七祖無擇二巻八十八祖無擇三巻八十九祖無擇四巻九十舒亶巻九十一朱弁巻九十二周諤巻九十三李之儀一巻九十四李之儀二巻九十五劉弇巻九十六陶弼巻九十七楊時一巻九十八楊時二巻九十九楊時三巻一百陳瓘巻一百一王安中巻一百二吕本中一巻一百三吕本中二巻一百四吕本中三巻一百五黄裳巻一百六張商英巻一百七王亘巻一百八蔡確巻一百九蔡肇巻一百十晏殊巻一百十一饒節一巻一百十二饒節二巻一百十三彭汝礪巻一百十四徐俯巻一百十五李彭巻一百十六洪炎一巻一百十七洪炎二巻一百十八張方平巻一百十九張綱巻一百二十賀鑄一巻一百二十一賀鑄二巻一百二十二賀鑄三巻一百二十三李維巻一百二十四鄭剛中巻一百二十五曽季狸巻一百二十六沈括巻一百二十七李廌巻一百二十八傅察巻一百二十九歐陽澈巻一百三十程顥巻一百三十一游酢巻一百三十二章楶巻