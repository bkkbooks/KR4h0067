body:
  text: 兩宋名賢小集卷二百六十二宋陳思編元陳世隆補方泉詩集周文璞字晉仙一字野齋穀陽人其母禱於狼山而生少聰慧以能詩稱寧宗時仕為內府守藏史旋以事去官卜居於吳之鳳山山有方泉遂以自號有方泉集三卷臯橋伯鸞出京師慷慨歌五噫豈無濟時心升降與我違有來適吳中舂粱救寒飢吳人臯伯通舍之慰窮棲方志雖或除此橋猶可稽伯鸞號逸民佳傳照緑綈伯通賴有此庶幾與之齊至今閶門外兩冡陪要離纍纍各高大冥冥春草萋古者賢哲人不計鳯與雞焜耀亦偶爾埋沒何凄兮出語賀兩公亦以昌吾詩堯章金銅佛塔歌白石招我入書齋使我速禮金塗塔我疑此塔非世有白石云是錢王禁中物上作如來捨身相飢鷹餓虎分相向拈起靈山受記時龍天帝釋應惆悵形模逺自流沙至鑄出今回更精緻錢王納土歸京師流落多在西湖寺錢王本是英雄人白蓮花現國主身蛇鄉虎落狗腳朕何如紅袍玉帶稱功臣天封坼開即退聽兩浙不聞笳鼓競歸來佛子作護持大師尚父尚書令一枚傳到白石生生今但有能詩聲同袍秦外銛師兄哦詩禮塔作佛事同喫地罏山芋羮何曽薰陸綺牀供但見相輪銅緑明哦詩禮塔猶未畢蘆葉低飛山雨濕初至長子寺雲杪熒熒一塔燈覺皇舍利寶煙凝山門推上三更月似照前朝禮拜僧回次秣陵我行古井邑北風吹倒人旗店語簇簇石路聲轔轔下車得少憩亭午聽司晨豈但田粳香更覺村醪醇懷哉厭王氣契濶毋重陳舊為秣陵尉今為鍾山神哦松夏夜雅頌聲流到楚詞更無人見獨看時池頭五粒初搖動却替幽人説舊時鷓鴣夜聞春雨來濃緑淨於洗有禽自南翥自呼不得巳豈非湘川下或自江左起黃陵見哀妃白下感遊子仍多憂其兄宛轉深樹裏汝兄今何在荆棘日靡靡豈非囚空山或巳投逝水年深桎梏化波冷皮肉死鷓鴣謹勿痛此係造物理吾若破析言汝恨入骨髓風吹慈竹林苔暈上深紫吾亦念故鄉日夜夢鄰里不如各歸休闕月照西鄙懷何月朔星星鬢髮卧林丘詔使東川作郡侯髯叟望公來海嶠癭兵迎守去夔州珍圖想挂茅齋壁巧石應隨竹釘闕教得巴童歌舞好侍郎千萬却歸休瀨上懷古有孟正曜祠堂古寺閟岑鬱空梁懸齋魚神坐既欹仄德容亦飢虛先生貧有命山僧樂無餘長安滿市花匹馬吟九衢寥寥北邙山而誰噫荒墟豈有先生者不如山僧歟盲風振苕華重露落芙蕖何當醉尉歸方坐釣水隅瀨上貞女祠估客征夫上野橋錦褵玉瑱亦蕭條人間多少乘除事到了英雄恨不消銅雀研君王有遺令婢子守空臺遙望西陵下漆燈照鴆杯玉顔闕叉澤松柏生悲哀曽見短歌行想像姦雄才清泉沈金彩古煙凝紫灰零落故瓦在雕鐫若陶坯為人作書研詞章出詼諧上下千載問流轉何悠哉那知墟中人天命不復來齊昏亦披猖增三築崔嵬年年漳河頭野棠如雪開丘慶餘畫家住棲賢雲泉石恣幽討寫出明視孫眉目增媚好卯日行踆踆衣褐坐芳草脫身文字禍見機恨不早仰候月盈縮修眉幾回掃迷離望靈藥青松為三倒山人書姓名欲使好事考夜坐讀書此生無耽嗜獨具愛書癖旁搜固未暇乍見亦略識塵土苦見汙更苦官事逼紙燈既自剪竹牖仍僕織山邑少文獻有亦何自覔隨行五升瓻一歲無滴瀝向來長安市閲之嘗竟夕悵然夢裏去莽莽雲雨側哦此謂寒螿夜漏三十刻春雪崇禧山館似官居二月寒風峭有餘傲吏吟哦空壁下野童放散夜堂初熒熒宿火煨村酒煜煜殘燈鏡道書勿聽打窗聲更急快移銀礫上枯株鶴廟櫻桃花覆地古廟自青春帳裏還丹使山中採藥人風林嘷黑虎雲路列斑麟欲見神君面連朝禮北辰玉晨口占風鳴長史朝天柏草護仙翁瘞劒塋瑞像殿前亡馬迹養龍池上有鼉鳴華道士白胭脂蕭史水銀粉畨女紅藍花狂奴愛風調脂澤遂成家鏡開青峽月衣近赤城霞欲下人間世檞林棲晚鴉杜鵑花雲樹重重和淚吟故宫遺廟有知音秦吳萬里皆芳草染到山花恨最深新栁長條導幽情淨色穿戶牖酸風釅如醋少待濃似酒颭颭金絲垂滿眼遮老醜王道士庵出家才二十小築契初心水浸籬根冷苔封井白深猿啼天慘慘犬吠月隂隂又踞藜牀坐焚香鼓衲琴南華陽洞稽首逰名山駕言入華陽南洞極祕怪松翠泉水香曲几妙𨽻畫殘碣刋靈章俯首試一讀冷風襲綃裳守菴敬愛客暖我紫术湯遺我鵝眼錢云是洞所藏往有尋幽徒入見黃金牆侈心或巳起幾受奇鬼戕身儻獲會過敢恨飛蓬霜更丐一片土小築安間房朝披神芝圖暮試飢飯方金牛洞凌兢下危梯俯傴出深穴回身避雲霧偃面視日月藥苗護谽谺竹節截㠔櫱安知幽蹊下有此大奇絶金牛鏟光景仙諜尚可閲岡頭春巳半枸杞如點血便恐顛風興橫吹石崖裂山行行歌十首受籙壇前雲更長春風漠漠杏花香峯回路轉無人處恰見天書字數行竦立雕珉萬萬層雲頭晃晃現觚稜野人自愛深幽景只是尋常不見僧道院中間沐髮容施來元自贊皇公君能百拜香煙下不怕丹瓊路不通蟲蛀黃連徹夜焚秦謠楚誦少人聞近前欲問新宫信鶴帶靈芝入暮雲帶淺人家隱樹深懶晴天色弄雲隂好風嫋嫋穿林去吹散松花似鬱金遨遊自是不思歸花氣蒸衣氣力微拋棄文書亡俗纍領猿吟後閉山扉天風穩送步虛聲雜和漫山檜柏鳴逺望山腰多白石細看知是野人行中峯道士蘂珠丹曽與神仙玉煉顔見説醉來燒隱訣藥罏蕭瑟卧空山紫陽道院古丹青恨渠猶畫化緣經晚香滅沒人歸後自有天風撼玉鈴砌穴蕭森隔土橋項梁城畔最蕭條羽衣歌些招魂魄直送幡旗上九霄壬戌春日自從憂患長精神兀坐齋房過了春鑿落盞乾官燭暗樗蒱齒齓旅囊貧皇天老眼非塵世白日間愁自替身一段風光好如畫未須全與路行人王荆公墓一丈荒墳上悠悠落日斜子孫來祭後守墓掃松花野老從余話文公在半山蹇驢追不及落日寺深關年少坐談元鍾山直北邊春風吹夢過淚浥舊貂蟬守法曽丞相能文陸左丞風流如未泯應作寺中僧出白下南朝禁籞夕陽明猶與遊人作隊行煙滿天淵池上路菜花黃盡緑隂成遊栖霞四首破曉逗苦霧客鼻何酸辛山中氣候異初日如燭銀田間石獸多知是肉角麟古苔半皴腹化作蒼龜鱗兩柱既岌案衆碑亦嶙峋幽凃得奇觀未敢辭埃塵連年抱離憂百嗟亡一呻花委鬢毛晚草奪袍色春愁中書櫝失夢裏歌鍾陳窮愁著文字屢被同行嗔同行不相知而况悠悠人道中石麟碑柱甚夥吾與空門友相扶歷芳甸天機久深妙梵本與貫穿徐馳得幽欣濟勝愜孤願宿芽發輕苞寒卉抱短艷鹿走風生林僧歸雲入殿寺從齊梁來諸彥題品遍安知千歲後未嘆陵谷變優尼製銅覺欲住女主齡主稱金輪王緑在華嚴經而捨覺富貴愛慕塗椒馨月黯回心院妖魂啼窈冥僧人弗知此獨受一峯青分減儻及我終歲棲林坰府帖昨夕下許奉半月急遂作兹山遊惘恍憂思失古迹墮榛莽久久失修葺南塘石塔好巋然對人立高碣纒蛟龍奇畫耐風日明旦丹陽路萬感當畢集説似石翁婆皆須為余泣再如金陵再踏江東路詞窮不復論江泥沾苦淚津鼓聚歸魂庾信因愁老陶潛為酒存孤蹤雖落魄不敢望明恩道中望茅山有感危亭對名嶽畢景扶鈎欄白鷺伺察過低昻若弓彎去歲負笈逰最佳元符間櫟林帶修竹清𣲖流珊珊離留叫晝靜洞天生春寒偉哉老宗師作屋雲雨端竟為殺蟲蟻不活升龍鸞遺體但解蛻故宫亦燒殘今創巳半舊萬柱扶元壇遂以兩不借一笻履巑岏入宅問玉斧採芝投金環墨沼篆結字丹臺氣成盤將謂便隱遁遽亦羅間關夷甫麈尾墮荀令香爐間再獲望奇秀恍然神觀還如見大仙伯被髮緑映山兩君控鵠從俱著漢小冠俗纍當復馳煮藥鼎欲翻病起寫懷夕陽蔽天涯望望不見家牛斗象緯微咄咄空咨嗟此時將細碎説與枝上花送友人入浙行至王冀公墓上小縣登樓上依稀是去年更闌吹短笛飲散覔歸韉丹葉標寒渡黃花羃野田重來弔古地為拊石羊肩轆轤體野人無事時嘗誦極元詩寫遍千山寺吟行九曲溪誰為補天手同是決雲兒欲去無人問今宵醉似泥金陵懷古六首孫伯陵頭水最悲蔣侯廟內月來遲夜深行客心驚恐猿挂晉朝楓樹枝司馬家兒持酒杯天星亦下澆崔嵬當時若便效牛飲定有孟津師旅來愁看幕府夕陽邊那更雞籠在目前跋扈飛揚只如此登臨那得不酸然杳杳舊蹤尋不得茫茫遺恨有誰窮長安敗績誰憐汝灞上收聲未到公琵琶未盡使人嗟瀟灑華林御苑花今日聞韶無處所雁煙蛩雨屬他家江水無情碧草春北朝留住老詞臣子規啼向青楓樹為爾離鄉去國人江南曲四首露下五更秋雨打三楊愁齊梁才子多埋在青山頭郎與新歡濃儂與舊歡熟懊惱對行人當為歌艷曲孤館聞啼鶯日暮胭脂薄芳醪似泥賤那得不行樂雲認巫山氣江通淫雨情相逢未多時秋花開古城吳中秋日郊原落葉巳離離尚有孤花闖短籬小醉不成憐病後苦吟未了説愁時鬭雞走狗袁絲喜臨水登山宋玉悲豆角巳收無别事待同野老赴襟期野薔薇娟娟籬頭花白白間緑葉明光裁版袴不掩遊子屧餘春背人去乞與弄芳蝶感我萬古心離離不相接我行田野間落魄何所挾猶能自撑拄使氣學漢俠悠哉芳草畔見此放逐妾羅帷未生夢粉面反成怯幽香薰倒人山麝火初熁長亭或相思如見玉蹀躞狼山吾母禱於山生我偃蹇身卅八始入寺所天俱不晨歸人復何之所願清戰塵勿復論銜鈎去作瑞世珍烏夜啼何人彈阮咸故故輕手摘彈作烏夜啼此意我所惻南朝有帝子作牧號侯伯著身疑嫌間生意日逼仄愛妾聞啼聲改鎮頒竹册故云長安吏性命在頃刻小婦聞啼聲赦令敷大澤身雖不肖甚幼小著蒼幘再轉作縣佐欲塞父祖責濡墨決疑訟行求慰寃魄羣凶見之怒極意便刳磔首沮𨽻陽橋公議亦巳格痛掠及庫胥指作盜錢賊胥既恣椎鑿手墮面愈黑書款自誣伏身竟遭刻畫酷毒一如斯誰謂彼無策謗書入外臺遂坐使者劾牽連入冶城五載窮慘礉敶詞呌穹旻哀慟人叵測若無磊落者誰肯為昭白翻思受禍時何但鍛羽翮愁寃傳里巷泣涕到臧獲嫠母偕妻孥惘惘望秋色豈料今日下置酒設豚拍聽此哀絲鳴但呼説不得月明客已去庭宇鳴啞啞世人見慈烏唾笑滿阡陌誰知事乘除禍去反為福蒼蒼上林枝當去作謝客贈趙子野歌與君雖為外兄弟語話尋常見肝肺自從不見半年餘每望吳雲輒流涕蘋溪松柏同一波半年不見當奈何長安市上相尋處弟能起舞兄能歌兄今賜第南薰殿滿戴宫花上林宴弟歸便著逺遊冠他時山中儻相見吳王臺畔楊栁黃吳姬對坐調絲簧阿兄自對吳雲坐呼弟不來應斷腸書來不應寄他物只要秋林一雙笛當使蠻奴日下吹此時此夜須相憶古琴歌山人袖攜古琴來形模拙醜腹破穿上兩金字亦殘漫自云得自十年前十年前宿野店間野店岑寂無炊煙只將百錢乞翁媪回買濕薪煨澗泉老翁持出一木段刀痕鑿痕斧痕滿秀才望見三嘆羡學琴以後何曽見此是成都雷氏為揩摩雷氏分明現持歸修治調曲成曲成他人不肯聞初彈羑里可釋憾再鼓廣陵如雪寃持歸古操次第傳龍入我舟何可憐憶昔憶昔在童初身輕俗纍無雲霞明道服日月綴仙都屑玉三危露泥金一丈符遨遊即閶闔佩帶或昆吾學語窺真誥談玄校易圖竹間時搏拊松下亦摴蒱謫墮歸嵓壑庸凡近僕奴極知方匿景何敢遽搏扶請命書盈紙祈真字迸珠但能覘帝座不恨守天厨譴巨知難逭心安敢自誣相隨有芒屨還欲化雙鳬弔堯章相逢蕭寺巳纍然自詠離騷講太元極目舊遊猶白石傷心孤冢只蒼煙兒從外舍收殘藁客向空山泣斷絃帝所修文與張樂魂兮應是到鈞天遣興望見山櫻媚短岑翻然便悔出家林壞車殺馬空嗟晚裂芰焚荷直到今筍蕨久為歸去計雲煙無復舊來心平生最愛花濃淡看了斜陽看暝隂夜歸還山迫暮夜枕石松下眠夢作童子日采花噀寒泉回身在人世欲去塵網纒永謝歡樂情把袂入紫煙送道友歸浮雲起足下是子欲歸家藏室收藝蠧丹房掃箭砂時聞搗藥鳥啼向款冬花莫使山童去驚飛逐亂鴉黃龍洞一從負圖與負舟天公閟之居靈湫重曈胼手久不作蒼苔古木兩漠漠朝來石磴鱗鱗濕如覺蜿蜒為人出甘霖未蘇焦卷多相候吳雲莫相失歸憩仁王寺重到招提未覺遲鉢單初副夾衣時僧房齋院門門閉梅子枇杷樹樹垂蟻蔭經幢求託化龍纒佛座學慈悲長年無事間來此坐對空山諷小詩下竺靜看唐人刻相連坐石隂鳥啼留客意果熟住山心野水流詩葉天香襲道林雲根有桂子應待月中尋七言雲竺前頭即御園小風斜雨入梅天放歌偃蹇如圓老古貌昻藏若稚川尋得數行天寶字破他一夜草堂眠此生更要窮經論惆悵高人舊石筵過葛天民新居為憶空山雨因嗟短鬢霜幅巾終日仄侍女古時妝烏桕殘林外丹砂舊井旁不留禪月畫只踞淨名牀湖鏡秋容淡雲莊曉露香汲泉須透脈種果便成行使鶴過村店攜孥上野航極知秦外叟全似賀知章對佛稱居士翻經悟法王自將詩檢校猶與竹商量嗟我渾無賴非公不作狂莫移松下石老子要乘涼十月過鳯山舟回入項王祠用前韻墜葉濃於染孤花淨似霜溪山如有待朱粉已施妝勝境如天上雄鳴自帝旁工陳白玉琯人坐紫金牀古兕稱春酒靈虬換夕香風箏猶有韻星辨忽分行念此鋤榛壟頻來渡葦航欲揮終極淚只廢苦吟章慷慨辭歡伯英雄憶憤王逝騅嗟弗及撞斗恨難量起舞何勞短行歌未要狂斷雲將落日千古助哀涼送蜀客都市今重到文園更倦遊依依返窮峽得得上歸舟往事深能憶沈痾久合瘳行經古祠廟應酹舊山丘梁父遺馨在降箋殺氣浮白衣猶肯出黃裏不包羞一聽巴人曲多貽漢璽憂花蒙塵漠漠苑抱水悠悠蠢爾狂童輩俱為滅族囚坤維元自正棧閣未應修管樂誰能並卿雲亦可儔時哉著檮杌聊此畔牢愁硉矹重開險銷沈萬壘秋堂留石室盡歌尚竹枝謳寒􅘪摧逋客啼鵑識故闕屈沱嘗角黍岷嶺看牽牛從此多談宴逢誰共勸酬近前持硯削成列抱箜篌近歲安樞相宣威在益州君歸如訪謁朝論必咨諏列聖方垂統羣公亦好修焚燒已郿塢誅殛皆歡兜虎豹參差束魑魖次第投衣冠通海嶠干羽格蠻陬江寇何勞服淮田亦盡收旌旃仍使傳炮烙任兜鍪元象催天狗昌陵控玉虬嗟嗟几上肉斷斷幄中籌貢錦資藩輔緘辭告帝謀聲名與勳烈應逐漢江流戊辰感事二首久要和平福須寬次第刑諸公善調一熙祚必清寧夾道焚香拜今知病酒醒漫勞雙鬢白何止故山青闕緯朝沈彩非煙夜透扃願同臧獲列齊壽八千齡幕府才方盛軍師意最高何年燕巢木幾處馬騰槽馳騁心方壯指麾身更勞周詩歌勞徠費誓説逋逃行闕占風角穹廬拜羽旄飛騰真有種淡泊正相遭山居書事荼蘼架倒無人架全似老夫狂醉時昨夜一場溪雨橫又漂苔蘚到花枝兩宋名賢小集卷二百六十二
