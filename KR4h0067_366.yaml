body:
  text: 兩宋名賢小集巻三百六十六宋陳思編元陳世隆補雪磯叢稿一樂雷發字聲逺號雪磯江右舂陵人登寳祐癸丑特科廷對第一授館職丙辰以病歸遂不復出雪磯叢藁五巻其友人朱嗣賢何堯卿編校付梓時寶祐丁巳也九疑紫霞洞歌猗與竒哉紫霞之洞真天開千變萬狀不可述恍疑幻出壺中之蓬萊湘濵兩姝不敢到悵望蒼梧雲縹緲爾來三千三百年斑龍空卧金光草我採姹女江華濵是為三十六帝之外臣右持緑玉杖左擕紫金經長歌天上謠一呼開仙扃列炬照深窈懸身事幽討羣仙喜我來驚笑欲絶倒何侯撫我頂偉逺拍我肩緑華贈我金條脫明期分我紅景丹借問此何地指言太虚天翠霞紫雲張寳幄懸瓈結緑盤瓔珞萬叠蒼苔荒石田誰呼青龍畊紫烟虎嶽銅牆未遍識擬開寳藏翻雲帙嵳峩水際披蓑翁應是籛鏗釣神龍仙人仙人何多事驚世駭俗變靈異或跣距足乗天雲或印短趾流沙潯或見姑射處子身粉霞紅綬藕絲帬或示普陀大士形或持簮栁乗寳瓔或挿鏤象管或結火齊珍或琢𤣥圃玉或布祇園金洞中之深不知幾百里但見縈紆屈折一里一澗水人言有路通桂林乘興欲尋日華君吾聞洞中大小洞天三十六帝遣列真分治局上界官府應更多定知此洞今誰屬猗與竒哉紫霞之洞真天開我上㑹稽探禹穴復浮滄海登天台岩谷豈無竒眎此何塵埃摩挲崖石題惡句記我杖屨敲雲來黄涪翁元漫叟目力一生空宇宙澹岩陽華有何竒枉費篇章劖石竇謁李梅亭力抜鯨牙氣貫虹玉堂歸只守文窮世無真魏扶吾道人以乾淳望此翁大地精靈藏筆下國家命脈寄山中緼袍羸駟崇仁路正擬登門聴擊䝉代送徐侍郎赴召大厦誰堪任棟梁試留齋艦問行藏朝廷議論如春雨吳蜀人材似夕陽三漸何曽投砭劑五寒今望起膏肓擬看相業磨崖在却到浯溪話别觴聴友人談蜀道事石棧天梯蕩戰塵誰驅哨馬滿峩岷盡看鳥犬為君子元次山世化篇誰問沙蟲化小人沙塞惟應悲望帝蜀材正自欠吳璘細吟猛虎長蛇句空對西風泪滿巾送廣州劉叔治倅欽州兼守事天涯亭畔擁輜屏丹荔黄蕉滿去程皂盖却迎新别駕碧幢應憶老先生象蹄印雨歸蠻國鯨鬛掀潮撼海城曽是鄉賢分守處試尋醉石共題名余靖韶州人曽守欽逢熊季可暮雲春樹飽相思今共秋風捋白髭北闕未知鸚鵡賦南州空誦鷓鴣詩旗亭尚喜缺能飲客路誰知朔獨飢賴有湘翁生計在且吟九辨擷江蘺送李煥雲超恭城主簿恭城山水接三湘應覺他鄉似故鄉宦况不妨栖枳棘客程還見食檳榔寒暄未定冝加愛事業無窮要自强千古忠魂如可問試吟雛月潄詩腸寄李伯輝石嶙峰下寄吟身靜掩柴樞琢楚珍蘋草青莎招隠士暮雲春樹憶詩人門無車馬多嫌僻家有圖書不似貧擬借大鵬揩老眼何時樽酒得相親舜祠送桂林友人堯山分首舜山逢呼酒旂亭兩鬢蓬客思且須論契濶詩交應不計窮通兒曺冨貴秋烟外前軰風流落葉中明日吟船又何處渡江衣冷荻花風訪伯父幽居對坐如禪舍閒燒石乳香書㸔新講義藥問未傳方僕語梅花裏僧經竹葉旁題詩吾豈敢窗户半吟章桂林懐李景魏陽華雲萬叠無計得相尋所學皆時好何人知爾心莎城百粤逺雪嶠一翁吟已是懐人極天寒漈水深桂林送人之瓊州招捕海冦訾家州畔路别爾苦匆匆説劒令人喜耽吟與我同旌旗楓鬼雨舟楫鱟簰風想到瓊峰頂題詩更紀功與李盤翁知縣登七星山弔石道士叠嶂矗空青躭竒共一尋苔荒碑意古茗苦道情深有興梯蒼壁無才咏玉簮吟仙何處去我軰復登臨次韻史主簿雨夜見寄水長許由溪春寒入竹扉幾人聴夜雨惟我怯單衣樹罅青燈耿籬根白菌肥明朝有忙事推枕問漁磯贈李伯輝家譜詩盪冦將軍泪唐朝李郤家緑華雙薦者况復古今誇趙司法集詩自題近道盖取工部所貽元隠居詩中語也因書二絶和徧陶翁飲酒詩醉籠天地入䲭夷細看官爵成何物肯帶奚囊過九疑浣花騷伯杳難缺世上寧無元隠居讀罷君詩三歎息斷絃緑綺定何如聴廬山胡道士彈離騷廬山道士玉潭仙前世滄浪握楚荃莫道離騷遺響絶孤鈎寡珥尚能傳弔湘誰解薦江蘺忠憤泠泠冩七絲愁絶九疑山下聴重華應許就敶詞題王堯章佇香亭滿池蜀錦照深衣盡日慿䦨課楚詞要識此花香絶處露凉風細雨晴時對花味道興何長好學顔家到坐忘莫與紅塵兒軰道心清正是得真香故園荷屋傍濓溪苦愛蓮花入夢思今日題詩還自笑江湖塵土鬢成絲詠史六首髙祖逝騅走鹿各消磨劍外功臣剰幾多四皓兩生原不聴故鄉枉費大風謌陳勝吳廣假號偷名只可憐枉抛錢鏄弄戈鋋隴頭燕雀應相笑鴻鵠原來是項燕韓信愁看鐘室劈良弓何不當時殺蒯通今日真王成底事只應娥姁是英雄東方朔蜥蜴盤邊解滑稽且分社肉飽蛾眉劉郎最怕秋風冷那得君言換殿帷司馬相如狗監無端薦薄情鸘裘犢鼻帝鄉塵當時最有文君恨不識長門買賦人班固請室寃魂叫不聞神丘隆碣漫遺文平生詞藻誰知已腐䑕狐雛却誤君送董炎震歸攸縣千菊溪頭話别情君行我住兩伶俜山中有酒招元亮石上無禾養伯齡狼尾屋低苔漠漠龍鬚菜長水泠泠故鄉語燕應堪聴莫放扁舟過洞庭贈衡山侯霖家住衡山茗塢深軒轅道士是知音窊樽酒好聊同醉石鼎詩難莫浪吟雨外虺隤寒食路花邊格磔故鄉心却懐世上揚雄少腸斷侯芭何處尋送駱起謁襄帥廣西憲知君無地種江蘺㸔了衡山㸔九疑客路不堪還話别侯門何處可題詩吟青羅帶行離岸唱白銅鞮過習池呼酒試澆征馬足繡臺油幕有相知題豫章宋徳父逰湘詩巻醉呼仙叟共浮湘稇載風烟滿錦囊名似浦雲山雨起詩連沅芷澧蘭香好吟秋月招元結莫賦朝雲惱楚襄英巨老仙今寂寞行人還解識珩璜常寧道中懐許介之雨過池塘露未乾人家桑柘帶春寒野巫豎石為神像稚子搓泥作藥丸栁下兩姝争餉路花邉一犬吠征鞍行吟不得東溪聴借硯邨廬自冩㸔烏烏歌莫讀書莫讀書恵施五車今何如請君為我㷊却離騷賦我亦為君劈碎太極圖朅來相就飲斗酒聴我仰天呼烏烏深衣大帶講唐虞不如長纓繫單于吮毫搦管賦子虚不如快鞭躍的盧君不見前年敵兵破巴渝今年敵兵屠城都風塵澒洞兮虎豹塞途殺人如麻兮流血成湖眉山書院嘶哨馬浣花草堂巢妖狐何人笞中行何人縛可汗何人丸泥封函谷何人三箭定天山大冠若箕兮髙劍拄頥朝談回軻兮夕講濓伊綬若若兮印纍纍九州博大兮君今何之有金須碎作僕姑有鐡須鑄作蒺藜我當贈君以湛盧青萍之劍君當報我以太乙白鵲之旗萬里横行取金印何用區區章句為死諸葛兮能走仲達非孔子兮孰却萊夷噫歌烏烏兮使我不怡莫讀書成書癡寄雪篷姚使君贈君昆吾湛盧之寳劒青雀黄龍之巨航懸黎垂棘之美玉都梁篤耨之名香佳人佳人在何處濯足洞庭望八荒掲車馡馡薜芷緑欲往從之道阻長倚寳劒兮翼軫膠巨航兮沅湘玉以彰君子禦身之徳香以表騷人流世之芳我所思兮隔秋水天吳翕忽琉璃翔佳人偃蹇定誰與愛而不見心䀌傷汴堤栁萬縷春風窣汴堤錦颿何處栁空垂流鶯應有兒孫在問著隋朝總不知讀李羣玉集光順門前繫馬頻𢎞文館裏翠雲春却憐白首河西尉枉作蓬萊獻賦人捐玦江頭弄釣舟菊花杜若滿芳洲如何才子無騷思只詠薔薇與石榴與復古叔讀横渠正䝉書惆悵枯林與晬盤雲横太白夢魂安半生驕吝如蝸縮自把西銘反覆看誰掘驪山起老師竹林燈火共心期年來後學輕前軰看徹臯比罷講時次韻熊雲瀑秋夜見寄吹落秋忩燭灺紅想彈九辨入絲桐荃蘅豈不如葵菽誰繼豳風補楚風題昭州田廷亮書槀後檳榔口裏吐參苓折檻無門九虎深家在道鄉亭畔住定應千古有知音少海無波鶴禁虚滿朝閉口養曹蜍白袍烏帽和寧外却有山人請建儲兩宋名賢小集巻三百六十六
