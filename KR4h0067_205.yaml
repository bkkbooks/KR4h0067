body:
  text: 兩宋名賢小集卷二百五宋陳思編元陳世隆補樂軒集陳藻字元潔福清人從學林網山為及門髙弟僑居橫塘家貧授徒以自給生平備歷艱厄處之夷然扁所居曰樂軒卒年七十有五丹井懷叔達喜稱吾子賦羞道少年時别去休論易愁來欲寄詩夕陽書不到殘月夢相隨晚嵗傷心事松峬獨語誰適武林入延平界作人煙隨山窟家家自生理木杪插秧青泉流仙杵起開邊憶漢皇航海通南鄙黃昏更不愁客舍連甍美歸入古田界作步入溪山勝橋亭古劍風土冝辭荔子村塢盡油桐南店炊初滑西舟石漸窮豈知旬日外便訪去時蹤城山雲霧成佳景天明又幾回忽携詩句入别放畫圖開逺樹沈如立行歌去似來小船衝雨過高柳接湖栽月傍孤青樹名呼怪石臺故園無夢想近擬築岩隈虎溪四圍山木合百磴屋簷重古穴成幽井踈林散曉峰響泉那更月啼鳥此無冬臺上朝朝看天邊有怪松冬日南谷讀書列岫開平野修墻隱密林暗泉聞雨響寒日覺冬深眼底孤村近雲邊小樹侵何須錢買屋空寺足間吟缺題自從弱冠為遊子玉融丹井壺山市哦詩不用著工夫已謫牂牁四千里柳侯未五十羅池作刺史翰苑失詞華蛟龍怨泥滓我今四十貧無官六合飄零到融水來時三宿柳城村再拜前賢我如此才卑何怨嗟且述西征始奔走豈吾心跬步思桑梓江右湖湘抵桂林青山爭獻雙眸美青山縱好興不生萬斛羇愁懷抱裏海口吟按圖自古無人到二百年來户口添架屋上山成市井張官近海課魚鹽估客趂潮撑米入沒人忍凍采蠔粘仲尼有廟塵誰掃寺觀崢嶸香火嚴題融州城樓除却譙樓環廨舍蕭條市井客懷悲高高下下山無數淺淺深深江有時大布紅裙猺女著半規白扇野人持城中昨夜亡羊豕聞得誰家虎入籬客中書事千載蠻風尚有存此來聞見不堪論豬膏澤髮湘南婦牛渤塗門嶺右村行客下牀調瘴藥吏人提甕灌蔬園豈無佳麗堪娛目别有凄涼只斷魂真仙洞洞裏清溪可泛舟入觀洞府出高丘老聃尸解今還在黃帝生前有此不滴乳解添無數幻携燈何用不曾幽乾坤自大人身小拳石空中作勝遊姚晉卿溪閣行南院觀溪心已清縈紆更上閣中行西橫車馬市橋合東眺逺山霞霧生日斜沙石淺可數半夜轟雷驅猛雨農圃嘈嘈春水多誰得身間延客歌醉後下階齊拍手長株矮樹排花柳主人更要雙眸寬去年拄杖尋長安一行一處狂呼去日日芳園大如許買地此多直幾金千屏萬障為墻堵和林子望夫君莫要嘆無官幸有田園在故山滿室春風滿林月人生何事勝於間丘德基七十斯翁千嵗也何愁七十真堪賀禮修多少人間貧病客不貪天地久相留夜宿延平水東浮橋暫折阻狂瀾懶問津船趂往還雙劍廟前酤酒醉水西燈火水東看重陽臨安舟中作小船獨坐看平洋歷歷登高舊事長戲把此身看寂寞今年無酒過重陽十月一日毗陵作聽得常州多菜色到來市井亦安然今朝正值焦糟節車馬翩翩上墓田紅泉明日還福清作獨坐無聊已日西塗經蒜嶺過漁溪一枝何處空歸亟却理行裝羡鳥栖過臨川懷劉氏兄弟臨川幾日到長沙聞道黔南路更賖行見一村籬落好誰家此住憶君家冬日融州絶句四隻漁船叩板門幾家茆屋長兒孫天寒水淺江成路地僻人稀郭賽村過象州都無一物作生涯坊巷蕭條有幾家料得寒梅應悵恨滿城開作寂寥花戲題宏仲飲亭酒肆老去雖貧有酒壚秫田親種暫時沽閨中不解為慳婦間問劉郎燕客無擬卜居向來為客愛塘村幾度天邊入夢魂恰到塘村心已懶不知何處立柴門盧北山元夕社屋相忘鼓笛鳴空村步月興堪乘何須更要鼇山立野燒天邊勝看燈送黃欽之赴廣州鹽稅地氣周遭逐處流五羊漸已似中州海風吹斷山無瘴炎月何妨作宦遊寄吳提幹不見河南二十年若為再拜畫堂前來尋八桂瓜期滿歸訪蒼梧蓮幕遷幸對夫人如母在喜看令子似公賢府僚共約黃花去業已還鄉種薄田融州西樓望山臘月牂牁三十日想見覓句上譙樓遙知今夜柴爐會説我無家更逺遊融州望鄉故國來來八十程登樓迷却桂州城望鄉不分千山隔上趂金烏日裏行余融州生日牂牁相遇説長年一在公堂一洞天清逺使君黃石老西周柱史混元仙過桂平嶺南大半尚鴻荒城壁空堅草芥長忽到潯州江上飲喜他風物近吾鄉别融州兩年為客憶鄉關樽酒何時别此間今日移舟出城市多情却戀眼中山謁羅池廟平生不作羅池夢今日還來謁柳祠忽憶故人曽得句鬼神先我七年知題靜山桂林多洞府疑是館羣仙四野皆平地千峰直上天兩宋名賢小集卷二百五
