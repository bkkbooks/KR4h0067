body:
  text: 兩宋名賢小集巻八十四宋陳思編元陳世隆補題畵集劉叔贛神宗朝中書舍人華山隠者圖六王昔崩蕩秦帝按劔興虎爭四十年方隅為之平豪氣竟未己用民如不勝因河既為池起洮復堅城嘉哉諸老翁攜手西山行避世徃不返逍遥塵外情眀星備洒掃巨靈為友朋饑食玉井蓮手攜三秀英世事一朝變龍蛇復縱横烈火咸陽熾蟻聚成皋争置身青雲上顧視不為驚萬朞乃須㬰安知谷為陵爾來見圖畫真氣猶冥冥世人但蓬蒿安知鴻鵠征桃源迷去路蓬莱浪知名異時三峯遊㑹當慰平生過栢林院贈吉長老有古殿吳道子畫維摩居士又有斷碑等古物靈光嵗乆獨巋然峴首遺碑亦未遷㑹向三生記前佛暫從方丈謝諸天篆香徐剰黄金印梵宇時開具葉篇門外風霜正搖落庭前翠栢自安禪陜西圖三首干戈今日事闗塞此圖㸔白日長安近蒼山壠坂寒由來名百二自古有艱難指以安西道凝情竟據鞍萬里靈州地他年漢朔方山河從割棄闗輔急隄防轉憶豺狼窟堪嗟禮義鄉靖邊須壯士㸔盡意蒼茫河源來碣石天馬涉流沙耳目成千古丹青在一涯荒凉都䕶府㫁絶使臣槎安得山西將收功似漢家山水屏吾家古屏來江南白晝水墨漬烟嵐我行北方未嘗見衆道巫峽兼湘潭山頭老樹長參天水上猿公撐釣船青蓑擁身稚子眠得魚不賣心悠然乆嫌時勢趨向狹頗思種藥依林泉桃源仙家不可到但願屏上山水寘眼前蘓子瞻家畫松圖歌君家圖書皆所見近得此松尤可羡根蟠平石蹙蛟螭幹出青冥超雷電樛枝横斜復㡬尺緑華茸茸鋪繡綫空堂深沉白日寒肅肅似有風吹面此圖剪裂人不知塵土分張數流轉能令神物還相從非君苦心誰與辨更惜良工名不傳可憐世俗多夸衒為君作歌君志之後千百年無復賤和李公擇顯相國寺壞壁山水歌蒼山本是千萬丈怪爾㫁落盈尺中枯松挂崕正矯矯白雲出谷方溶溶昨憶髙秋十日雨百川湧溢騰蛟龍丹青壞刦不可駐金碧拂地都成空人間流落萬餘一掇拾補綴㡬無從當時畫手合衆妙得此誠是第一工松隂行人何草草秃幘小盖馬色驄長途未竟不得息嘯歌正爾來悲風巨靈擘華䟽黄河仙娥移山開漢東海波芥子互出没大雄游戲神與通我今與君未嘗覺指視壁畫將無同新詩飄飄脱俗格得閒㑹復來從容題古畫山水障子時年六嵗應是塵外境不隨陵谷遷江山猶舊日松柏又千年畫雪扇子洒落瑤花溥蒼茫殺氣深因風驚拂靣濯熱幸開襟夜色非闗月朝雲不待隂秋風未應起好在郢中吟畫鶴夙抱烟霞性三年故不飛軒居寧假寵野客㑹忘機燕雀那相笑鳬鷖直自肥蓬莱千萬里正想玉為衣于秘校示郊園棠木連理圖偶題長句偶對名圖欲賦詩野棠并幹上交枝始疑和氣偏回復可是常情悦附離愛樹去思吾豈敢髙門隂德子應知濟南固有終軍辨傳布仍煩老畫師壁畫古槎歌南山大樹楓與樗百年不到生理枯老枝錯落麋奮角病根蟉結龍垂鬍風霜不知春不改古苔懸蔓相縈帶豈知髙堂素壁上畫圖能令觀者愛野夫晨興坐樹邊偶説此樹來上天暫乗西風犯牛斗却㸔東海成桑田次韵酧盛秘丞黒桃二首度索真殊域崑崙豈素封㡬人曽白眼吾子幸先容晦迹煤炱暗含滋沆瀣濃上林求異木詔使㑹尋踪春華各自媚秋實頓能殊悴貌從黧黒丹心固實膚榴花隨使者荔子賜匈奴寄語元都客相疑失味腴同原甫咏秘閣藏古器圖黄占金寳氣天瑞告成功績事今時絶書文自古同問年記巫錦按刻異桓公塵世無由覩崑山䇿府中畫龍南人謁雨爭圖龍畫師放筆為老雄烟雲滿壁奪畫色雷電應手生狂風觀者皆驚爪牙動攫拏意似翻長空吾疑奮迅出户牖何事經時留此中共言葉公初好畫當時亦有神龍下天意為霖非爾能世俗慕真聊事假次韵蘓子瞻韓幹馬贈李伯時韓幹畫馬名獨垂氷紈素幅對客披諸公賦詩邀我和我如鈍錐逢利錐區中纔容三萬里正可騕褭一日馳朝燕暮吳亦其亞幸得夷路無縶羈此間三馬皆國馬瑰姿逸態成崛竒有如秋空見霜鶻下睨衆禽皆伏雌良工苦心為逺到天機杳渺潜得之區區駑駘浪自負直教畫骨不畫皮李侯洒筆定超詣尚有天驥君未知迄今四海皆屬國汗血不敢勞貳師和江鄰㡬梅聖俞同蔡學士觀宋家書中郎石經天下傳江翁説詩當世賢南昌子真亦禄仕讀書養性希神仙雄豪相遇古莫及所至衣冠爭願焉貴公子孫誰是勝廣平家書盈萬千當時交友皆父行賈生論議欺老先開門迎客車結轍而此三士相周旋牙籖挿架塵土絶寳軸出囊瑤玉聫前秦篆籀頗磨滅中世粉墨仍新鮮咨嗟古人不可見但覺能者心意專知音自昔貴一過千嵗相望猶比肩况有清詩紀實事豪壯入耳如哀弦鄙夫觀書識難字目迷五色心茫然要當乗興過君所刮膜一洗頭風痊楊寺丞書畫楊侯古書數十軸草𨽻缺殘猶可讀古書流傳動千嵗書可倣摹古容偽愛君苦心能辨之捐棄千金不為費世嘗售名不售真物可見形難見神重令志士一惆悵念有遺寳隨埃塵東墻西墻畫滿屋琵琶小兒理新曲鄙夫長安交遊少騎馬能來與君熟萬事好惡我自知不肯浮沉易耳目和原父同江鄰㡬過净土院觀古殿吴道子畫楊惠之塑像真賞非俗嗜雅遊知勝縁百身化前佛方丈納諸天工以智自表名由髙益傳吳生擅粉跡楊氏妙鈞埏能事古未盡希聲今亦然伻圖觀省像啟户置鳴絃理㑹均聞見神交遺後先衣冠若對面山水欲忘年釋氏䑓中秘仙翁柱下賢新詩俱絶唱塵土更餘妍兩宋名賢小集巻八十四
