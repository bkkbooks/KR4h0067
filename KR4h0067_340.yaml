body:
  text: 兩宋名賢小集卷三百四十宋陳思編元陳世隆補古梅吟藳四過淮南湖黃塵茫茫北風起黃蘆蕭蕭日色死百萬征夫血怒流點汚淮南一湖水向來失著圖中原一朝此地化為邊養兵百年不用力將軍金印慙空懸南湖南湖君莫渡萬仞山髙鬼門户夜夜青磷照斷蓬訓狐自戴髑髏舞泊真州方山下煙冷隋宫草木秋屏山分翠接江流片雲不隔長蘆寺夜半鐘聲敲客愁有所思乘鸞人去玉簫寒雲斂巫山曉夢殘栁線不堪繫離别自和煙雨搭闌干戊午詔與弟文戰棘闈自慚師衄況有炊臼之夢不能為懷幸故人有薦鄉書魁漕闈者良以自慰霜葉秋風下寒窗著病身乾坤為逆旅嵗月轉車輪白首無賢婦青雲有故人愁懷今日解漫啜甕邊春先曽大父作竹夫人銘北窗蘧蘧偎爾冰肌母徇其名乃邪其思甚有思致余不能道漫作俳優語水沈為骨玉為肌專寵涼臺會有時長得夫人容兩足客星不遣史官知雨宿祁門道中乘驂古渡頭景色十分幽山雨敲詩夢溪流赴客愁寒禽知警夜髙樹故吟秋壯志難磨盡終期汗漫遊登當塗凌髙臺髙臺突兀玉千尋尚想當年翠輦臨坐守夕陽移半塔我吟未了讓蟬吟曉發黃池過寧國簇簇人煙兩岸分暫時挂搭此行程一笻風月無拘束又復挑詩到宛城登宣城郡樓仰謝公翠屏四面敞闌干謝老詩情不説官魂冷青山呼欲醒吟聲滲在石泉間歸途績溪界喜見十里岩策杖前溪去吾鄉此路分雨磨山出色風約水成文歸信憑秋雁思親望白雲碧岩今日見快飲帶微醺自建鄴歸至績溪迂路觀石照誰磨白石如冰鑑勳業安能試一窺但覺秋風上潘鬢半因為客半因詩內丹太極虛空亦有根打開關捩是何人丹田旋轉乾坤槖碧海循環日月輪久矣我前曽有我悠哉身外豈無身分明好箇通天竅只要時人認得真外丹手掇乾坤鐺裏煎神仙肘後有書傳紅鉛黑汞一斤藥陽火隂符六百篇金鼎自凝三素氣玉爐輕散九霞煙玄霜糝入空虛腹一息乘風上碧天對月長空有明月與我良有情遙遙萬里道隨我杖屨行耿耿吟牀間相隨入枕衾而我病風雅長作秋蛩吟吟聲悲入月月色寒入吟月即是天眼照我淚縱橫垂垂草上露盡從月眼傾不為富貴兒只作苦吟人君看朱門邃翠幕圍陽春管絃沸清曉銀燭正熒熒題西湖畫軸丹青誰寫滿湖蓮濯濯西施一段妍汴水百年塵隔斷可無人作畫圖傳登嚴子陵釣臺萬乘從君腳底眠客星便入史官占東都基業隨流水今日斯臺尚姓嚴栽班竹竹母初分種屋頭斑斑淚點帶詩愁他時看取成林玉遙剪湘江一片秋縣尹先伯祖家觀遺書嗟哉吾伯祖文響玉珊珊髙折蟾宫桂卑棲花縣官琴聲流水盡書卷白雲寒尚想伊吾夜髙樓幾倚闌春山晚望糢糊數疊屋前山翠色欺凌詩鬢寒啼鳥一聲泥滑滑晚鐘春雨過林端讀董卓傳巨妖吐毒氣如蒸誰遣腥羶漢帝陵煙斷洛陽殘火在為他吹著點臍燈春日書所見寒雲漠漠暮天低社鼓聲中日欲西隔岸垂楊遮酒店風簾移影照寒溪春懷梨花院落雨初晴小醉醒來睡不成過客光隂易老態故人山色却長情歌喉嚦嚦鳥聲雋舞袖翩翩蝶翅輕好景相看作撻盡閉門不覺了清明昭君怨漢家金屋貯娥眉六宫何啻三千姬中有一姬傾國色可憐不到君王知毛生筆下真少思玉顔黑子迷妍媸君王按圖不入眼出身逺嫁單于妻盈盈淚眼邊月照蕭蕭愁鬢朔風吹不憂死作龍城鬼貞魂長在深宫裏猶勝男兒未貴時咫尺金門如萬里飲馬長城窟漢兵北伐時飲馬長城窟此城何以髙中填戰夫骨此池何以深戰血化為汁秋風吹水腥馬聞亦辟易馬渴可奈何要馬載金戈長安有遊冶走馬燕支坡餞王廣文宦居三載滿嚴駕出山城詩擔梅花白離杯竹葉清更籌催客夢斥堠記行程去去驂鸞鶴長歌上玉京寓興盈盈樓上仙家姝緑波濯濯明芙渠感君恩情玉連鎖羅襦繫君雙明珠青瑣玲瓏春夜永為君間調相思引瓊樹朝新璧月滿琴聲未斷腸先斷剪剪輕寒襲春筍金猊噴香薰袖暖夏日書事東林數間屋長掩竹笆籬檻栁拂棊局瓶花落硯池蝶狂如被酒蟬咽似吟詩脫帽挂岩石淒颸入鬢絲草堂蒼煙落日草堂深淺淺寒侵白玉簮等客不來童睡去自搖修竹和新吟夜吟小院沈沈夜欲闌東風吹月上闌干手撼梅花露研墨醉將吟筆蘸清寒荷花花列千行彩袖葉收萬斛明珠可惜坡仙不在風情絶勝西湖升仙謡衣縹眇佩丁東金莖滴香露玉樹生涼風衝破青冥跨黃鶴身披星斗珍珠絡挽徐縣尹雄筆工褒貶登科年少時青山知宦拙白首尚書癡鶚薦仍歸弟鳳毛喜有兒傳家遺卷在光彩玉離離贈相士萬里煙霞侵鶴骨九天風露注蟬尸君看個人作詩苦梅花細嚼當晨炊春郊即事登臨故故檢春工小立蒼苔數落紅院宇人歸春寂寂秋千間在月明中寄題友梅堂友梅乃竹洲先生孫也公昔洲多竹而孫梅作堂月窗傳瘦影風壑度寒香友也真魚水兄兮可雁行相看動吟興時吐玉琳琅甲子舉中補濫忝前名考官劉簿云已在解選潦漉袁簿批有文字清快老健惜乎正榜之額有限之語奴顔婢膝浪驅馳幾被秋風吹鬢絲百萬博盧空得雉八千兵潰豈因騅功名付我銀鑿落世事從渠鐵蒺藜且跨蹇驢出門去六朝故地要吾詩秦淮二首數里秦淮畫軸開唐人賞後宋人來無邊風月要酬答一處旗亭買一杯歌歇陳宫玉樹春可憐商女亦成塵老成惟有秦淮月往日曽經照古人金陵懷古鍾阜龍蟠勢可竒何年開此帝王基東西日月磨今古南北江山幾合離六代衣冠荒草下中原臺殿白雲涯春風吹落英雄淚立盡斜陽未有詩兩宋名賢小集卷三百四十
