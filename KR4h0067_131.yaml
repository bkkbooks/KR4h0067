body:
  text: 兩宋名賢小集卷一百三十一宋陳思編元陳世隆補荆齋詩集遊酢字定夫建州建陽人也兄醇與酢俱以文行知名酢初受業於程皓皓知扶溝縣以道學為己任酢為掌其事由是學問益進又事程頥頥器之舉進士為蕭山尉除博士僉判泉州召為監察御史尋知河州又知濮陽軍歷舒濠二州卒年七十一歸雁天末驚風急江湖野思長悲鳴愁絶塞接翼冒風霜澤岸多矰弋雲間乏稻粱茫然棲息地飲啄欲何鄉感事世事浮雲薄勞生一夢長散材依櫟社幽意慕濠梁風激鷹鸇迅霜殘草木黃投間如有約早晚問耕桑在潁川寄中立蕭條清潁一茅廬魂夢長懷與子居五里橋西楊栁路至今車馬往來疏逰寶應寺崒嵂三峯帶白灣誰開蘭若翠微間竹牀雲懶禪心定草徑苔荒屐齒斑天入碧嵐成玉宇鳥飛青嶂出塵寰此中即是蕊珠境遮莫間吟一解顔山中即景翠靄光風世界青松緑竹人家天外飛來野鳥澗中流出桃花寶應寺讀書堂成因懷明道先生橋西積雪度新晴卜築茅堂快落成郁郁竒花鋪野趣關關好鳥和書聲春濃嵐色無邉景水淨天花徹底清記得程門忩草緑至今遐想每馳情兩宋名賢小集卷一百三十一
