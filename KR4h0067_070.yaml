body:
  text: 兩宋名賢小集卷七十宋陳思編元陳世隆補老泉集蘇洵字明允眉州眉山人至和中歐陽修薦除校書郎食霸州文安縣主簿祿與姚闢同修太常因革禮書成而卒有嘉祐集雲興于山雲興于山霿霿為霧匪山不仁天實不顧山川我享為我百訴豈不畏天哀此下土斑斑鳲鳩穀穀鳴號天乎未雨余不告勞誰謂山川不如羽毛有驥在野有驥在野百過不呻子不我良豈無他人縶我于廄乃不我駕遇我不終不如在野秃毛于霜寄肉于狼寧彼我傷寧人不我顧無我子忘有觸者犢有觸者犢再箠不却為子已觸安所置角天實畀我子欲已我惡我所為盍奪我有子欲不觸盍索之苙朝日載升朝日載升薨薨伊氓于室有績于野有耕于途有商于邊有征天生斯民相養以寧嗟我何為踽踽無營初孰與我今孰主我我將往問安所處我我客至止我客至止我迎于門來升我堂來飲我樽羞鱉不時詈我不勤求我何多請辭不能客謂主人惟子我然求子之多責子之深期子于賢顔書任君北方來手出邠州碑為是魯公寫遺我我不辭魯公實豪傑慷慨忠義姿憶在天寶末變起漁陽師猛士不敢當儒生橫義旗感激數十郡連衡鬬羌夷新造勢尚弱胡為力未衰用兵竟不勝歎息真數竒杲兄死常山烈士淚滿頥魯公不死敵天下皆熙熙奈何不愛死再使蹈鯨鰭公固不畏死吾實悲當時緬邈念髙誼惜哉生我遲近日見異説不知作者誰云公本不死此事亦已竒或云公尸解雖見殺而實不死大抵天下心人人屬公思加以不死狀慰此苦歎悲我欲哭公墓莽莽不可知愛其平生迹往往或孑遺此字出公手一見減歎咨使公不善書筆墨紛訛癡思其平生事豈忍棄路岐况此字頗怪堂堂偉形儀駿極有深穩骨老成支離點畫乃應和關連不相違有如一人身鼻口耳目眉彼此異狀貌各自相結維離離天上星分如不相持左右自綴會或作斗與箕骨嚴體端重安置無欹危篆鼎兀大腹髙屋無弱楣古器合尺度法物應矩規想其始下筆莊重不自卑虞柳豈不好結束煩馽羈筆法未離俗庸手安敢窺自我見此字得紙無所施一車會百木斤斧所易為團團彼明月欲畫形終非誰知忠義心餘力尚及斯因此數幅紙使我重歎嘻歐陽永叔白兔飛鷹搏平原禽獸亂衰草蒼茫就擒執顛倒莫能保白兔不忍殺歎息愛其老獨生遂長拘野性始驚矯貴人織筠籠馴擾漸可抱誰知山林寬穴處頗自好髙飈動稿葉羣鼠迹如掃異質不自藏照野明皓皓獵夫指之笑自匿苦不早何當騎蟾蜍靈杵手自搗答二任魯人賤夫子名丘指東家當時雖未遇弟子已如麻奈何鄉閭人曾不為歎嗟區區吳越間問骨不憚遐習見反不怪海人等龍蝦嗟我何足道窮居出無車昨者入京洛文章被人誇故舊未肯信聞之笑呀呀獨有兩任子知我有足嘉逺遊苦相念長篇寄芬葩道我亦未爾子得無增加貧窮已衰老短髮垂髿髿重祿無意取思治山中畬往嵗栽苦竹細密如蒹葭庭前三小山本為山中楂當前鑿方池寒泉照谽谺玩此可竟日胡為踏朝衙何當子來會酒食相邀遮願為久相敬終始無疵瑕間居各無事數來飲流霞丙申嵗余在京師鄉人陳景回自南來棄其官得太子中允景回舊有地在蔡今將治園囿于其間以自老余嘗有意于嵩山之下洛水之上買地築室以為休息之館而未果今景回欲余詩遂道此意景回志余言異日可以知余之非戲云爾岷山之陽土如腴江水清滑多鯉魚古人居之富者衆我獨厭倦思移居平川如掌山水蹙恐我後世鄙且愚經行天下愛嵩嶽遂欲買地居一作安妻孥晴原漫漫望不盡山色照野光如濡民生舒緩無天扎衣冠堂堂偉丈夫吾今隱居未有所更後十載不可無聞君厭蜀樂上蔡占地百頃無邉隅草深野濶足狐兔水種陸收一作取身不劬誰知李斯顧秦寵不獲牽犬返黃狐君今南去已足老行看嵩少當吾廬憶山送人少年著竒迹落拓鞍馬間縱目視天下愛此宇宙寬山川看不厭浩然遂忘還岷峨最先見晴光厭西川逺望未及上但愛青若鬟大雪冬沒脛夏秋多蛇蚖乘春乃敢去匍匐攀孱顔有路不容足左右號鹿猿陰崖雪如石迫暖成髙瀾紅日到絶頂目眩手足顛自恐不得下撫膺忽長嘆坐定聊四顧風色非人寰仰面躡雲霞垂手撫百山臨風弄襟袖飄若風中仙朅來遊荆渚談笑登峽船峽山無平岡峽水多悍湍長風送輕帆瞥過難詳觀其間最可愛巫廟十數巔聳聳青玉幹折首不見端其餘亦詭怪土老崖石頑長江渾渾流觸齧不可攔苟非峽山壯浩浩無隅邉恐是造物意特使險且堅江山兩相值後世無水患水行月餘日泊舟事征鞍爛漫走塵土耳囂目眵昏中路逢漢水亂流愛清淵道逢塵土客洗濯無瑕痕振鞭入京師纍嵗不得官悠悠故鄉念中夜成慘然五噫不復留馳車走轘轅自是識嵩嶽蕩蕩容貌尊不入衆山列體如鎮中原幾日至華下秀色碧照天上下數十里映睫青巑巑迤邐見鍾南岸口蟠長安一月看山嶽懷抱斗以騫漸漸大道盡倚山棧夤緣下瞰不測溪石齒交戈鋋虛閣怖馬足險崖摩吾肩左山右絶澗中如一繩慳傲睨駐鞍轡不忍驅以鞭纍纍斬絶峰兀不相屬聫背出或逾峻逺騖如爭先或時度岡嶺下馬步險艱怪事看愈好勤劬變清歡行行上劍閣勉強踵不前矯首望故國漫漫但青煙及下鹿頭坂始見平沙田歸來顧妻子壯抱難留連遂使十餘載此路常周旋又聞吳越中山明水澄鮮百金買駿馬往意不自存投身入廬嶽首挹瀑布源飛下二千尺強烈不可干餘潤散為雨遍作山中寒次入二林寺遂獲髙僧言問以絶勝境導我同躋攀逾月不倦厭岩谷行欲殫下山復南邁不知已南虔五嶺望可見欲往苦不難便擬去登玩因得窺羣巒此意竟不償歸抱愁煎煎到家不再出一頓俄十年昨聞廬山郡太守雷君賢往求與識面復見山欎蟠絶壁橫三方有類大破鐶包裹五六州倚之為長垣大抵蜀山峭巉刻氣不溫不類嵩華背氣象多濃繁吳君潁川秀六載為蜀官簿書苦為纍天鶴囚籠樊岷山青城縣峨眉亦南犍黎雅又可到不見冝悒然有如烹脂牛過眼不得餐始謂泛峽去此約今又愆只有東北山依然送歸軒他山已不見此可著意看上田待制詩日落長空道大野渺荒荒吁嗟秦皇帝安得不富強山大地脈厚小民十尺長耕田破萬頃一稔粟柱梁少年事遊俠皆可荷弩槍勇力不自驕頗能啖乾糧天意此有謂故使連西羌古人遭邉患纍纍鬬兩剛方今正似此猛士強如狼跨馬負弓矢走不擇澗岡脫甲森不顧袒裼搏敵場嗟彼誰治此踧踧不敢當當之負重責無成不朝王田侯本儒生武略今洸洸右手握麈尾指揮據胡牀郡國逺浩浩邉鄙有積倉秦境古何在秦人多戰傷此事久不報此時將何償得此報天子為侯歌此章途次長安上都漕傅諌議丈夫正多念老大不自安居家不能樂忽忽思中原慨然棄鄉廬劫劫道路間窮山多虎狼行路非不難昔者倦奔走閉門事耕田蠶穀聊自給如此已十年緬懷當今人草草無復間堅臥固不起芒背實在肩布衣與食肉幸可交口言默默不以告未可遽罪愆驅車入京洛藩鎮皆逹官長安逢傅侯願得説肺肝貧賤吾老矣不復苦自歎富貴不足愛浮雲過長天中懷邈自念惝恍難自論世俗不見信排斥僅得存昨者東入秦大麥黃滿田秦民可無飢為君喜不眠禁軍幾千萬仰止填其咽西畨久不及老賊非常然士飽可以戰吾寧為之先傅侯君在西天子憂東藩烽火尚未滅何䇿安西邉傅侯君謂何明日將東轅答陳公美少壯事已逺舊交良可懷百年能幾何十載不得偕念昔居鄉里遊處了無猜飲食不相捨談笑久所陪拜君以為兄分密誰能開齒髮俱未老未至衰與頽我子在襁褓君猶無嬰孩君後獨捨去為吏天一涯我又厭奔走逺引不復來嵗月杳難恃區區老吾儕况從與君别多事嵗若排心力不能救衰病侵骨骸二子皆已冠如吾苦無才君亦已有嗣骨肉秀且佳人事知幾變會合終不諧昨者本不出豪傑苦自咍欎欎自不樂誰為子悲哀翻然感其説東走陵巔崖不意君在此得奉笑與詼君顔蔚如故大噱飛塵灰我老應可怪白髮垂兩腮新句辱先贈古詩許見推賢俊非獨步故舊無所乖作詩報嘉貺亦聊以相催又答陳公美三首仲尼魯司冦官職亦已優從祭肉不及載冕奔諸侯當時不之知為肉誠可羞君子意有在衆人但愆尤置之待後世皎皎無足憂仲尼為羣婢一走十四年荀卿老不出五十干諸田顧彼二夫子豈其陷狂顛出處固無定不失稱聖賢彼亦誠自信誰能恤多言公孫苦放逐牧羊滄海濵勉強聽鄉里垂老西遊秦自固未為壯徒為久辛勤君子豈必隱孔孟皆旅人送李才元學士知卭州貧賤羞妻子富貴樂鄉關不見李夫子得意今西還白馬渡涯水紅旗照蜀山歸來未解帶故舊已滿門平生浪遊處何者哀王孫壯士勿齷齪千金報一餐送陸權叔提舉茶稅君家本江湖南行即鄰里稅茶雖冗繁漸喜官資美嗟君本篤學寤寐好文字往年在巴蜀憶見春秋始名家亂如髮棼錯費尋理今來未五嵗新傳兩盈几又言欲治易雜説書萬紙君心不可測日夜湧如水何年重相逢祗益使余畏但恐茶事多亂子易中意茶易兩無妨知君足才思送王吏部知徐州東徐三齊之南鄰夫子豈是三齊人辭囂乞靜得此守走兔入藪魚投津徐州絶勝不須問請問項籍何去秦江山雄豪不相下衣錦遊戲欲及晨霸王事業今已矣但有太守朱兩輪還鄉據勢與古並豈有漢戟窺城闉論安較利乃公勝行矣正及汴水勻藤樽枯藤生幽谷蹙縮似無材不意猶為纍刳中作酒杯君知我好異贈我酌村醅衰意方多感為君當數開藤樽結如螺村酒緑如水開樽自獻酬竟日成野醉青莎可為席白石可為几何當酌清泉永以思君子送任師中任清江吾老尚喜事羡君方少年有如伏櫪馬看彼始及鞍奔騰過吾目蕭條正思邉誰知脫吾羈傲睨登太山君今始得縣翶翔大江干大江多風波渺然天欲翻浩蕩吞九野開闔壯士肝人生患不出局束守一㕓未嘗見文物不識天地寬今君吾鄉秀固已見西川去年作邉吏出入烽火間儒冠雜武辨屢與氊裘言又當適南土大浪泛目前胸中芥蒂心吹盡為平田陳湯喜形勝所至常縱觀吾想君至彼胸膽當豁然送吳待制中復知潭州十年嘗作犍為令四脈嘗聞愍俗詩共歎才髙堪御史果能忠諫致戎麾會稽特欲榮公子馮翊猶將試望之船繫河堤無幾日南公應已怪來遲臺省留身凡幾嵗江湖得郡喜今行臥聽曉鼓朝眠穩行入淮流鄉味生細雨滿村蓴菜長高風吹斾綵船獰到家應有壺觴勞倚賴比鄰不畏卿從叔母楊氏挽詩老人凋喪悲宗黨寒月淒涼葬舊林白髮已知鄰里墓傷懷難盡子孫心幾年贈命涵幽壤當有銘文記德音千里緘詞託哀恨嗚嗚引著涕中吟次韻和縉叔遊仲容西園春入禁城懷舊隱偶來芳圃似還家番番翠蔓纒松上粲粲朱梅入竹花客慢空勞嚴置兕酒多無用早成蛇相公猶有遺書在欲問郎君借五車栽松成徑百餘尺隔徑開堂似兩家厭事共邀終日飲渴春先賞未開花客來庭樹鳴寒鵲酒入肌膚憶冷蛇衰病不勝杯酒困醉歸傾倒欲乘車香搗麝篩檀入範模潤分薇露合雞蘇一絲吐出青煙細半炷燒成玉筯粗道士每占經次第佳人惟驗繡工夫軒窗几席隨宜用不待髙擎鵲尾爐九日和韓魏公晚嵗登門最不才蕭蕭華髮映金罍不堪丞相延東閣間伴諸儒老曲臺佳節已從愁裏過壯心偶傍醉中來暮歸衝雨寒無睡自把新詩百遍開涵虛閣幽居少塵事瀟灑似江村苔蘚深三徑衣冠盛一門嶺雲時聚散湖水自清渾世德書芳史傳家有令孫淨因大覺禪師以閻立本畫水官見遺報之以詩水官騎蒼龍龍行欲上天手攀時且住浩若乘風船不知幾何長足尾猶在淵下有二從臣左右乘魚黿矍鑠相顧視風舉衣袂翻女子侍君側白髮垂雙鬟手執雉尾扇容如未開蓮從者八九人非鬼非戎蠻出水未成列先登揚旗􅎶長刀擁旁牌白羽注長弮雖服甲與裳狀貌猶鯨鱣水獸不得從仰面以手扳空虛走雷霆雨雹晦九川風師黑虎囊面目昏塵煙翼從三神人萬里朝天關我從大覺師得此詭怪編畫者古閻子于今三百年見者誰不愛豫者誠已難在我猶在子此理寧非禪報之以好詞何必畫在前詠菊騷人足以思香草比君子況此霜下傑清芬絶蘭􅉅氣稟金行秀德滿黃中美古來鶴髮翁餐英飲其水但恐蓬藋傷課童加料理與可許惠所畫舒景以詩督之枯松怪石霜竹枝中有可愛知者誰我能知之不能説欲説嘗恐天真非羡君筆端有新意倐忽萬狀成一揮使我忘言惟獨笑意所欲説輒見之問胡為然笑不答無乃君亦難為辭晝行書空夜畫被方其意得尤若癡紛紜落紙不自惜坐客爭奪相謾欺貴豪滿前謝不與獨許見贈憐我衰我當枕簟臥其下暮續膏火朝忘炊門前剝啄不須應老病人誰稱我為兩宋名賢小集卷七十
