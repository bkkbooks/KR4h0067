body:
  text: 兩宋名賢小集卷八十七宋陳思編元陳世隆補祖龍學集暮秋江上逢端州朱使老詩以申餞奕葉清棻逺夫君素履恢人皆推世德我亦愛卿材新命一麾守長途萬里來畫船江雨暗紅斾海風開服嶺先聲浹編氓美化該此行真邂逅幾日共沿洄去矣瞻仙棹依然對酒杯前程如見憶為寄早春梅南康落星寺金碧共玲瓏樓臺浩渺中雨花僧講盛星石寺基雄巖岫廬峰對波瀾蠡澤通微紅看海日逺緑認江楓鷗鳥機心息潮音梵唱同人間羣玉府寺有太宗皇帝御製御書物外廣寒宫雲衲藏多壞塵襟到自融扁舟五湖客長此伴支公廬山瀑布絶巘千尋勢飛泉萬疊䀶寒光涵玉岫靈𣲖析璇源峭壁河流立蒼崖井浪翻猿悲經樹急龍駭落潭渾氣爽諸峯秀聲和衆籟喧功成身退日期此灌中園遊真陽石室皇祐元年十一月丙申任廣東提刑日所作有石刻在英州昔讀到難篇乃聞真陽室亦嘗惟斯人稱道或浮實邈在數千里莫覿煙霞質青山有獨往吾志久已必如何驂俗駕尚此紆朝紱謬分南顧憂惟刑在欽恤孤宦雖云逺勝踐其敢失行行訪雲巖草樹披蒙密呀然一穴開勢欲吞朝日嵐光展障屏乳溜龍蛇屈溪流自清泚松韻何蕭瑟酌酒飲遊客謂言此可述周生誠不誣所紀窮纎悉惜哉非吾土無由寄蓬蓽平生丘壑心與道共湮鬱難進而易退終當守儒術唐周夔作到難篇謂此祠離長安逺故到者難也贈牛仲容吾君旰食念邊陲天下英雄待聘時仁義未行真處士功名不立豈男兒卧龍誰識南陽隱失馬何勞北叟悲牛嘗來薦濟南不利莫向林泉賦長往秋風吹子鬢毛衰張寺丞鳴玉亭書事為憐瀟灑近城闉來往何曾問主人列岫曉昏雲郁郁流泉秋淨石粼粼陸機詩就惟招隱班固文成正答賔愁見西峰日將暮却驅羸馬入埃塵庚辰清明州衙不送新火禁煙故事存遺俗改火平時有舊章縱道齊民皆按堵堪驚烜氏昧修方晨炊已絶供賓饌晚燎兼無瀹茗湯不似前年為客日富鄰猶許借餘光赴任南康將經九江遊二林先寄交代關屯田平生山水有心期今得軍麾慰所思我欲因行訪蓮社君應未許過瓜時若逢勝概終朝住兼領間僧到處隨莫遣迎新吏人至雲間泉畔不相宜送交代關屯田赴闕謝公雅尚廉侯政兼得如君不可加自有袴襦歌道路長驅旌斾訪煙霞林僧解誦松窗句廳吏能封竹檻花今日北園堪健羡清風留與後人誇君僧房留詩公庭種花甚多琵琶亭晚泊湓江半客舟琵琶亭下動間愁霓裳緑么杳何許楓葉荻花空自秋賈賦有才悲鵩鳥楚騷終古怨靈修莫言司馬青衫濕今日行人亦涕流南康春日慚愧東風破臘來一尊清聖為君開無方可使朱顔駐有客相逢白眼回老大漸能知世態踈慵那復計身媒遙憐伊洛氷應泮芳草還荒舊釣臺簡寂觀觀即陸靜修先生所居名郡先生之諡號焉順風能屈帝王尊身後高名與觀存石室深居廣成子布囊薄葬楊王孫流塵羃羃凝丹竈清吹徐徐觸絳幡牢落空山門晝掩羽人亦説絶囂煩梁沈旋碑云止煩曰簡逺囂在寂即義表名也右軍墨池匡廬峯下歸宗寺曾是當年內史居繭紙世傳遺迹後墨池人記作書初秋毫幾老崇山舊法空觀得水魚筆勢圖云先取崇山絶谷中兔毛八九月收之又用筆法云送腳似遊魚得水合頭若景山興雲也珍重僧家能好事朱闌碧甃壯庭除清明日與二三賔客賞花陳判官為推勘他州事不預是會以詩扺豫因次其韻酬之寒食春光正好誇小筵應免負芳華清談且喜文揮麈賭酒何須要畫蛇潑火雨餘微緑潤落花風急亂紅斜幕中有客應惆悵今日全輸太守家秋日天平驛書事孤館無人慰寂寥感時情抱楚旌搖縱橫著物秋聲起早晚連空殺氣消衰鬢已同潘騎省壯心猶羡霍嫖姚誓江義勇吾家事不得提戈靜虜妖吏隱宜春郡詩十首以太常博士直集賢院皇祐五年知袁州吏隱宜春郡年豐獄訟稀餘糧委南畝茂草滿園扉天意憐艱食民心恥盡衣萬家行樂處車馬有光輝吏隱宜春郡溪山若畫圖纎鱗時自躍幽鳥靜相呼曉浪噴寒雨暗嵐鎖緑蕪漁樵本吾事搔首重踟蹰吏隱宜春郡追惟二相賢房琯李德裕節明天寶日業茂會昌年友善曾何纍朋誣亦自煎琯坐與李適之韋堅等善貶宜春太守德裕為王潘李漢等所誣貶為宜春長吏不才非不幸異代若差肩吏隱宜春郡間思應舉時端居若貧賤徒步入京師誤寵乘軒鶴貽憂入廟犧功名在何許雙鬢已垂絲吏隱宜春郡鄉園去路賖間關成客宦荏苒度年華出水魚吞餌辭山鳯在笯誰言千里隔夜夜夢吾家吏隱宜春郡同僚得俊髦純音等疏越餘力劇豪曹器識青雲逺歌詞白雪高遂令遷客意不復賦離騷吏隱宜春郡山城少客過靜中窺物理間外養天和春暖尋花塢宵涼玩月波將迎者誰子勞逸兩如何吏隱宜春郡放懷詩酒間未能慚下俚幾欲效中山杜甫藩籬窄元稹論杜李之優劣云李尚不能歷其藩籬况堂奧乎劉伶幕㡩慳高吟與沈醉榮辱詎相關吏隱宜春郡窮通懶更占矜名遭巧譛晦迹喜深潛昔慕狂為聖今師智養恬優遊無一事不覺歲時淹吏隱宜春郡素餐誠有餘政聲慚遂霸文藻謝嚴徐使節分銅虎仙廬祕石渠君恩殊未報不敢賦歸歟澄清閣在楚州范滂雅志在澄清今日廉車命閣名華榜高標雖具美奈何長是困蒼生贈江州李虛一司户官况蕭條三語掾地居卑濕九江城曾聞午夜開宣室早晚君王召賈生劉仙石在江州太平興國觀神仙不死石長存萬古千秋表洞門人欲求真好修煉莫徒將杖叩苔䀶支機莫問君平肆取履誰修黃石祠深洞自開人不見何須惆悵憶當時交代屯田逺惠書問紙尾批示若就江州至軍兼可腹背遊覽廬阜因成拙句且答佳意廬山在境好行春猶恨竒峯屬半鄰腹背遍遊煩示諭即當先謁樂天真將至南康道中湓江輟棹整驂騑松路揚鞭入翠微好是近郊人候望紛紛羽服與田衣招二三僚友遊廬阜雨餘廬阜連天碧公退鈴齋盡日間為報二三佳客道速須蠟屐共登山遊棲賢偷得沈迷簿領身暫來林下訪幽人雲泉滿眼慵歸去便擬拋官學隱淪題尚書余襄公西園臺閣清風正凛然歸休車騎曲江邊及親已具三牲養負郭新添二頃田萊子長年榮綵服衛公雅意樂平泉官間道在心無悶惟惜光隂事簡編題余尚書山居要術張衡已作歸田賦汜勝仍修種樹書願借山居精要術欲將嵩洛葺吾廬和閻運使以詩見奬吏隱宜春郡詩狂吟何足話風騷和寡甘降郢唱高敢望與言同子夏競推多可似山濤九成豈後虞韶美一字終虛魯史褒自笑潢汙不盈尺猶將學海去滔滔和王元之郎中見寄韻未持雙節去朝元玉陛猶虛侍從班龜浴舊遊天直上雞林新句海中間品流有日歸陶冶隱逸無時奉宴間鶴馭仙遊何處所軒皇冠劍在橋山兩宋名賢小集卷八十七
