body:
  text: 兩宋名賢小集卷一百四十八宋陳思編元陳世隆補盤洲集卷上洪適初名造後更今名字景伯皓長子紹興十二年中博學宏詞科孝宗朝歷尚書右僕射同中書門下平章事兼樞密使提舉太平興國宫卒諡文惠有盤洲集方福州生日行雪風高高雪如許海門潮生浪吞浦郎罷攜行街西東到處歡然聞好語舊日大官多養高民詞獄寄充官曹橫行阡陌喧夜鼓催征關市析秋毫只今事事無長蠧五月政成歌召父尺一方來問鳯儀魁三快刷聨鴛羽三山岌嶪摩曾空便是方丈蓬瀛中他年圖畫凌煙了却向山中訪赤松雪詩用朝無忌韻密雪舞冬晝祁寒友夏炎竹枝低未濕梅萼瑩先霑怯冷昻肩立欣繁矯首聸隨風方北渡際海必東漸軒簸來如糝繽紛勢轉嚴枯荄新點綴曲砌巧增添伺隙花穿户承甍箸插簷高飛迷皎鶴夜影逼清蟾砧淨綃橫石忩虛粉雜奩昆丘千璧碎武庫五兵銛煙徑楊吹絮香蹊蝶奮髯鯨鯢缺骨腐鵠鷺野翎爛白髮秦人遁龎睂漢尉潛漬蠶功孰及平地瑞初占窖卧行人節門扃志士恬已甘穿履困奚避割氊嫌醉慕雙螯畢寒懷五袴亷飄颻疑宓女刻畫謝無鹽河濶凝新浪峯高失舊尖山隂賓欲返淮右冦將殲穆滿三章著桓溫五板兼君恩捐衛粟天意絶齊痁江上蓑堪畫籬間氅可覘客觀眸已眩兒咀手頻拈足沒尋萱履腰間刈藿鎌馬馳毛愈素烏喙首難黔凍折騷人筆光臨纎婦幨螟缺寧待火疫癘詎煩砭甲長寒蔬細根肥宿麥纎年豐雖欲頌神助愧江淹題陳體仁判官休齋翔纓飄組蓋中留緑水芙蕖且漫逰過耳從教千不是處心渾欲一宜休爐中異馥非多愛架上新籖弗外求寂寂掩扉無所事飽聽風竹韻涼秋次韻題謝景思少卿藥寮壯嵗揮金邁二疏眼看餘子伏鹽車芷蘭清馥渾紉佩芝术新苗幾荷鋤剩作好詩傳近體誰言巧宦勝間居北忩睡起琴聲寂便若身登太昊墟蔡聸明寺丞有詩見簡次其韻漱芳傾液飽心胸久矣高名在郢中遂請叢祠方養氣卜居蕭寺且談空結交計入芝蘭室拓隱奚須桑苧翁妙語鼎來驚創見益慙白豕過河東次韻李舉之立春四絶句東皇先遣雪清塵一夜山川眼界新共喜太平今有象更兼歌舞為迎春三冬文史總空虛獨有施行寬大書坐對南牆千箇竹何妨留客煮園蔬雪後疏梅正壓枝春來朝日己暉暉癡兒公事何時了一醉花前心似飛他鄉春日思如何屛去茶甌任睡魔且得小忩成好夢片時江上逐煙蓑次韻陳體仁惠詩并示逰山詩卷人生名利場羈絆無休假沉迷雁鶩行夢寐雞豚社見謂逰子欺更防官長罵何如山中樂私忩肆嘉話陳侯青雲客英聲蜚日下當年金馬門掉鞅示間暇小試芙蓉池未整驪駒駕台嶽十日行樛蘿若相迓來歸探古囊篇篇可圖畫傾耳金石聲鄭衛敢爭霸得舍弟消息倚闌春晝靜花栁自芳香消息三洲逺塵埃兩地忙鵲聲傳近喜鴻影憶初行抄得新書册歸時補墨莊次韻李舉之風雨中書事四絶句挂壁鳴琴久斷絃強翻書帙本相便詞源顧我非流峽藻思如今已掞天雨勢風聲何太雄羣山答響亂賁鏞青奴今夕安用汝玉友此時留得儂怒號通夕攪空虛好夢那能到玉除枕上泰然無一念只愁雨滴架中書向曉登樓憑小欄蕭然歸興在江干癡兒未了公家事且把雲山仔細看宿佛窟寺籃輿登佛窟高閣望中清古木爾許蔭飛泉無限聲雨消今日暑雲作晚來晴獨對青山久相逢如有情題景思水芝亭逺意閟千雲亭幽不受塵來為池上客本是社中人影密龜魚蔭花開鷗鷺馴買山如遂志應許卜比鄰過妙緣寺聽懷上人琴斷澗復危琴紅塵且滿襟疾祛避炎熱小憩得禪林煮茗對清話㺯琴知好音秋風不借便去轍己駸駸懷孫邦求灑開桑落泛觥觩行子驅車恨不留雁塔自是丈人行麟臺更參儒者流官居二年有十月别思一日真三秋氷輪今已可人意何時來賞城東樓摘星嶺披山鑿道何嶮巇上摘星漢摩虹霓七襄終日往曾問一握去天今可躋叱馭已排蘿蔓去下車不復雲煙迷舉頭此際長安逺願借六翮凌丹梯留别縣寮滿城鼓吹出林坰珍重來思此日情共説棲鸞留政迹自憐展驥墜家聲一時官侣推儒雅百里民編樂治平山意川容若相挽不堪整駕問歸程蔡聸明以詩還行邑鄙卷次韻謝之涼秋野趣已蕭騷方駕看山念我曹十日空歸才每下一篇來貺曲彌高詞華若我慚雌霓筆刀唯公掣巨鰲欲作歌詩興協律清朝今日有王褒酬李舉之用前韻見寄閲盡千峯不憚勞歸來文墨厭官曹浮槎問漢秋期近埋劍衝星夜氣高那復精思如吐鳯初無壯志欲乘鰲詩壇軒輊歸題品濫得陽秋一字褒九日官舍種竹獨整陳編對北忩煙雲渾欲助新涼庭前且使竹交翠籬下從他菊自黃逺宦只今同旅泊壯懷誰復問行藏攜壺已失登臨便不待微吟恨夕陽天台道中灘聲因雨急山勢向雲斜橘緑誰能畫楓丹逺似花春鉏懷淺水郭索上寒沙漸聽鳴梭近林中三數家赤城平生幾讀興公賦今日霞標對赤城此是南門入山路山祗乞我一畨晴玉京洞颷輪曾此宅靈仙洞府今稱第六天規往不辭蘿蔓險回看雲物起瓊田國清寺紺宇今方盛名知國已清萬松九里影雙澗四時聲杖䇿將窮覽巾車不計程登堂山更好人去曉猿鳴清音寺久坐俯潺湲流清詩思慳跳珠鳴蘚石淙玉下松關此日耳塵靜幾人心地間抽琴作新曲歸去要怡顔禪林寺振䇿快秋晴伽藍倚翠屏看雲不留瞬對竹已忘形銀地聲千載虹橋拱百靈至今鐘磬響如講淨名經雨中宿萬年寺夢回深夜耿秋燈泉竇爭流一味清過雁不留天外影寒松長送枕邊聲叨風可但久無賴急雨那能便寢行已問瓊臺雙闕路此心何必羡層城間主人覽衆亭籃輿行盡白雲層來款禪居得小亭亂石引泉歸曲澗寒風吹雨過中庭四旁野色朝昏别一覽巖姿逺近青宴坐蒲團作何想光隂不復問堯蓂桐柏觀屹然雙闕峙瓊臺仰見彤雲郁郁開三井窮源知海眼六符乘象應天台松杉滿道欣初過芝术何年得自培更聽鳴泉雜風籟直疑笙鶴紫霄來天台觀芝田環拱碧崔嵬流瀑高從天際來飛沫有風長似雪寒聲無日不如雷巖前八桂人誰折蹊畔千桃路未開便覺仙都清晝永翻愁歸路染黃埃劉阮洞桃花當日未成蹊只有幽禽語翠微楚峽行雲空入夢秦臺鳴鳯要同飛仙家長若三春好人境何知萬事非訪問丘園荒舊迹却應回首悔來歸明巖寺路轉霞標外雲開綬帶前幾層山底屋一線竹間泉洞口石孤聳巖頭峯倒懸故應風雨際行子總回鞭寧國寺幾日山南北端期汗漫遊水痕秋雨過竹色曉煙收宦海何時了僧房為少留却尋歸去路餘興漫回眸得景嚴弟書往年同入洛此日各監州慣見浮雲改相思野水流有書將逺意何處話新愁莫為癡兒事乾螢蒲案頭次韻錢處和連使郡齋晚集風聲止雨嵗云暮雪態兼雲晝欲昏共喜高軒歸别墅肯臨畫戟對清樽埋輪前事空豺路授簡英辭踵園是處梅花寢消息更憑玉藻為招魂寄吳明可正字嵗晚仍多病春來尚異鄉愁城誰與破談壘漫相望體怯山風重心隨驛路長後亭梅若放為寄一枝香憶梅呈曾宏父重憶東城路盈盈十里梅彌旬阻風雪幾處雜塵埃已是春移律何時酒泛杯好花那忍落直待使君來題王氏秀野堂飽聞居處好逺意快心胸樹接高低影山分朝暮容佳時能自適間客幾相從勿訝題詩晚新來百事慵除夜懷景嚴弟并寄景盧逺鄉勞薄宦綵服共思親耿耿胸中事紛紛眼底塵與誰同别嵗到此兩迎春獨有還家夢書忩一笑新次韻曾宏父欲賞山宫梅花黃堂清興動官梅遙望花林首屢回命駕許同狂客往舒殘頻有好詩催空懷月觀橫千影趁取山宫舉一杯為語東皇相假借莫教零亂點蒼苔見招賞梅時范子芬欲行翩翩畫戟對春光命客重登千仞岡坐上行人傾别酒花前小雨伴啼粧雪膚不為輕寒瘦玉骨何如昨夜香麗句競傳新樂府誰誇何遜在維揚添竹添竹果春力期君共嵗寒青青懷特操碌碌愧粗官尚育哦詩日尤朦借宅看他時誰撿校何處報平安送季元衡教授赴調三年淹講席斗酒動離情此去登臺省諸公熟姓名驊騮看地絶鸞鳯為時鳴春日西湖上煩君一寄聲題左遙功秀才桂香齋小齋面蓬瀛昂霄得雙桂黃卷對聖賢欣然有餘地筆端妙言語挾此波瀾勢熒熒百鍊剛自是青萍器衝星不我識鉛刀且爭利於今修月手益振凌雲氣明年廣寒宫聲多郤詵似歸來八桂香浮丘挹仙袂還李舉之太平廣記稗官九百起虞初過眼寧論所失誣午枕黑甜君所賜持還深愧一瓻無次韻向憲見贈三首理財無管晏言利析秋毫吐論千人廢摩空六翮高未簮安世筆先佩吕虔刀楚澤東風徑寧辭攬轡勞四望荒樓觀登高動土思山川相映帶桃李己紛披漢節人重仰黃坡世莫窺三章堆錦繡唐突古西施河東空有賦人不道揚雄貴賤雲泥隔夤緣井邑同平畨依列宿談笑霽威風終賴帡幪力能成尺寸功次韻向憲留題荆門惠泉卒章見及對泉一洗心如水誦詩三歎顙有泚字比渴驥駸駸來文如翠瀲鱗鱗起皇華轍迹環諸道濟物良籌載襟抱雙泉復見等故人竹馬兒童半羸老吾君豐澤要下流慚愧長瀾力不侔一方始此一滴潤千畝長有千鍾收去瘼未盡惠未施可使剜玉生新痍塵埃滿面語甚惡虛辱逢人説項斯喜景徐作小圃因懷東閣二絶句數頃澄湖練有光小亭處處得疏篁夢中春草多佳句一洗塵埃速寄將白白朱朱手自栽兩年憶著滿林開莫教童稚輕攀折惜取濃隂待我來兩宋名賢小集卷一百四十八
