body:
  text: 兩宋名賢小集卷一百六十四宋陳思編元陳世隆補梅溪詩集四次韻梁尉秦碑古風姬嬴遺迹存者希世傳石鼓稽山碑石鼓揄揚得韓子文與二雅爭驅馳秦碑夸大頌功德埋沒草莽無人知或言山頂石猶在上有虎豹龍蛇螭神藏鬼護荆棘蔽崖懸磴絶登無岐廣文好奇穴探禹梅仙喜事僧尋支支遁昔遊越中好山水梁仙宿雲門訪古迹於僧我贊其行要親覩勿受世俗流傳欺望秦秦望兩嶄絶何山壁立東南涯豐碑屹植最高處不知磨滅從何時剔苔掃墨了無有糢糊片紙亦足奇濃雲霮䨴黯將雨古木槎牙蟠老枝歸來走筆出險語訶政叱斯同小兒詩成得得寫寄我詞嚴意偉法退之我聞秦人滅六國酷若犬磔臨江麋先王法為秦所負負秦況有秦有司五經灰飛儒濺血堯舜周孔何能為上蔡獵師妙小篆奴視俗本徒肥皮東封泰山南入越大書深刻光陸離沙丘風腥人事變鬼飢族赤誰嗟咨漢興萬事一掃去惟有篆刻餘型儀磨崖欲作不朽計其如厯數不及期蚩尤五嶽紂漆器人物美惡寧相疵我雖過秦愛遺畫南山入望頻支頤不須嶧陽訪棗刻不用遷史觀雄辭虛堂默坐對此紙閉眼暗想君勿嗤要知秦碑沒字本却類周雅無辭詩祕書省後園修竹可愛胡正字憲有詩次韻不俗更嫌俗風枝時拂牆青青映藜燭細細雜藝香徑節老方見清陰寒欲藏蕭疏似吾輩味向靜中長次韻洪景盧編修省中紅梅不為怕寒貪睡遲東君妙意端可知雪英零落眼界寂放此孤瘦紅南枝蓬萊更向逸逺地園在著廷後草木寧有夭嬈姿冰容戲作桃杏色醉臉雅與神仙宜江兄蠟友已前輩黃生後出非同時丹心獨與徑節侣疏影共浸清漣漪騷人相顧最不惡何用車馬紛蚩蚩典衣莫惜共攜酒對花一展思鄉眉李德逺寺簿敢言勇退今之古人也東嘉王某賦詩以高其行吳山蒼蒼煙靄橫皇都日日春風生利塗捷徑走輪轂古道荆棘惟君行吳江洪濤拍夭泑萬楫千帆日相踵六鰲入釣猶不歸急流知退惟君勇斜川勝事今臨川錦袍風月追謫仙芋魁豆飯吾亦有脫屣有愧君翩然我輩情鍾惜離别為國惜賢情更惡江頭送别春尚寒回首冥鴻已寥廓送胡正字憲分韻得來字胡上書言事得祠還鄉同賦詩者七人以先生早賦歸去來為韻武夷之山高崔嵬武夷先生賢矣哉山中髙卧如孤竹顔蒼節徑清無埃吾君養老過西伯不逺千里歸乎來胸中萬卷可醫國首薦廊廟真人才胡上書薦張和公人言朝奏暮必逐天顔獨為忠言開崇文三館不浪闢端為天下收奇瓌平時論議即涵養富貴豈以三緘媒西京老儒作符命蒼黃投閣良可哀何如皇朝有歐范開口不憚干霆雷文忠文正二公皆以館職言事先生力學到前輩一時盛事光麟臺宸衷宵旰急忠讜佇觀前席延鄒枚先生掉頭竟不住扁舟自載高風回道山遊從盡英雋顧我晚進寧容陪梅花滿枝栁弄色賦詩送别同銜杯吾廬三徑亦荒草松菊怪我何遲徊次韻昌齡至樂齋讀書端慕顔回樂真同陋巷居息心容膝地得趣滿牀書檠短燈宵永窗明日晷舒相看有修竹心為主人虛同錢用明用章遊白石巖謝公好山水得郡古東甌造物借佳境雅志多不酬松蘿蔽鴈蕩煙靄埋龍湫行田徑白石不到仙山頭寥寥數百年天付黃冠流巍然萬仞崖壁立東南州誰將補天手化出白玉樓兩龕藏洞府中有羣仙遊上通尺五天下接三神洲飛泉落巖腰碧澗鳴山陬羣峯真培塿滄海為渠溝隘視人間世萬象同蜉蝣我家鴈山陽崎嶇厭經丘翩翩錢公子呼我尋巖幽初驚小雨密忽掃羣陰浮杖履窮巑岏一洗塵埃眸山林有真樂富貴何足求但願乞二山不願萬戶侯二山白石鴈蕩李少和像少和辛苦學飛仙遺像今猶在洞天都似先生能辟穀何須太守為行田左原詩三十二首東高山左原有四髙山在乙辛丁癸之位術者目為四貴人東山最高上有五峯其一曰宋家尖也峯頭日出已停午山半雲橫疑在天要使名如越山重直須人似謝公賢越之上虞有東山乃謝安石高卧處西高山西高山者數峯稠疊前山如几俗謂西山平最高處謂之杜鵑花尖西山峯巒最多術者謂之旌節山壓頂花枝紅欲燎導前旌節閙如訶倚窗拄頰時時好何止朝來爽氣多南高山山在縣治東北俗呼縣後山夜聞更鼓聲間有地名小鴈蕩山後風來聞縣鼓蕩中秋至集賔鴻我歸種菊東籬下長在悠然眼界中北高山豫家之後山也左原之山惟此山最奇秀翼然如翔舞狀上有尖峯羣山如囿秀回環秀拔羣山是北山我恐山中猿鶴怨移文未至已先還龜山俗呼黃嶼術者謂真得龜形衆山環繞一山橫形似真龜勢欲行不向九江資納錫臨溪曳尾自全生卧虎山在原之水口形如卧虎舊有淫祠俗呼廟山昻然虎踞一原東回首耽耽氣象雄不放衆山隨逝水溪頭高卧自威風梅溪在北高山之陽去孝感井二十步溪至小以井為源豫家其北溪之南有水如帶通謂之梅溪溪名舊矣莫知所自豫植梅以實之我向梅花溪上家幾看清淺浸橫斜手栽木已如人老雪鬢蕭疏對雪花楊溪梅溪東流四十五步合原中數水而為楊溪溪稍大楊氏世居焉故以姓得名一澗泓澄會衆流肱分俄類婺溪頭辛巳秋水分為二臨溪更種青青木故事端同栁栁州戲綵巖原之西山有巖如屏上有尖峯俗曰白巖然巖色爛斑如施五綵故以戲綵易之煙霞屏障列西岑戲綵標名始自今我過巖前每流涕斑衣空有老萊心杜鵑巖在戲綵巖之東巖頂稍平上多杜鵑花故以花得名豫家寒食九日必登是巖遊宦三年樂事違巖花笑我鳥催歸歸來又被巖花笑笑我登巖何太稀杜鵑花一名巖笑豫還家將一載竟未登巖碁盤巖杜鵑巖之北杜鵑巖北一拳石石面平平堪奕碁路僻山深罕人到爛柯仙客未應知撒水巖在戲綵巖之北龍卧靈湫志未伸時時噴水撒行人雖然未救蒼生旱聊欲澄清世上塵松羅巖在原之西北有山隔之四面壁立可梯而登上平北有水可汲能容數百人産松羅木因以得名建炎間有謀避難是巖者豫嘗往觀之非活路也插天萬仞絶攀躋巖頂松羅不是栽廊廟須材作梁棟人間斤斧可能來障巖在戲綵巖之北壁立如障其色青黑有石方而直聳而有稜長者數尺可植庭宇間巖如法吏面清冷石似端人正直方誰解移兹障邊境敵騎安敢肆猖狂人面巖在原之西看盡人間古與今蒼顔一任蘚苔侵豈惟有面如人面更喜無心似獸心天柱巖有二一在三井之北一在松羅巖之側鴈山一柱插雲霄三井松羅柱亦高蓬蓽深懷祀人念擎天端賴柱堅牢幞頭巖在原之西北地名烏石頭田間閙處身宜及早抽山林遲我挂冠遊不須花裏尋腰帶且向田間置幞頭宋家尖在東高山皇恩西被復東漸四海蒼生盡仰聸畎畝微臣猶戴宋結廬長向此峯尖小鴈蕩在原之南山以鴈得名曰小者以别大鴈蕩歸鴈行飛集澗阿不貪江海稻粱多峯頭一蕩雖然小飲啄猶堪避網羅左嶺在原之南山北望吾廬山最好南通蕭寺境逾幽嶺之東南有明慶院白雲夜向原中宿幾度隨人過嶺頭左湖在原之東乂東曰湖邊漁樵欸乃日相呼舟楫生涯在畫圖我與漁樵同隱逸不須乞作自家湖蓴湖在楊溪之南吾鄉無蓴菜獨此有之此詩乃舊日作水晶銀線滿湖中先人詩云莖抽銀線細根結水晶寒遙與吳江氣象同我輩他年厭遊宦思歸應不待秋風南瀑布在南山之下上接小鴈蕩飛瀑來從小鴈蕩靈源頗類大龍湫矩羅尊者不須占乞與山翁取次遊北瀑布在原之西北山腰間俗名主潭兹潭誰主復誰賔清世寧容有隱淪獨我山林養衰病不妨來作主潭人嘶水澗原之南有左嶺水北流入于原中水善嘶晴而嘶則雨雨嘶則霽水忽鳴忽止曰嘶嶺頭寒澗逺無聲夜靜風恬忽自鳴山水有靈人不識老農常用卜陰晴鴈潭原之西南三井山之下吾先人九日常集賔朋于此因命是名九日登臨澗水濱蕩中征鴈亦來賔如今鴈至應相感不見名潭舊主人三井原之西南山路崖險人迹罕到豫宣和辛丑春從先祖先人避冦是山凡三宿見溪潭多遊魚俗傳井舊有龍源泉高似銀河落石井泓然鼎足分聞説井中魚已化定從三級上青雲孝感井豫家有井稍大俗稱大井王家宣和壬寅秋先祖有疾思鯽魚時暑不可致先人釣於井而得之井素無魚蓋孝感也張大猷祕書挽先人詩云玄鯽隨鈎誠養親張後為工部尚書綸竿臨井重欷歔誠感幽潛遂獲魚解道隨鈎得玄鯽祕書好句實堪書白巖庵在白巖之東吾祖捨山歸明慶院而立是庵四山環合形如蟠龍前到南高山形如舞鳳飛鳳吹歸思竹實庵山多竹蟠龍髙卧戀山泉吾家松檟今三世僧舍鐘魚已百年吾高祖母葬庵之虎山腰曽祖葬于青龍首曽祖母葬於庵前平地先妣葬於庵後山賈公庵在南高山之下司理賈公葬其母兄嫂於此築庵命僧守之賈公名如規字元範賈公名德重吾鄉慈母難兄窆此岡手種松楸及因果青山流水共高長如在亭先人葬大父母於東山立亭以寧之有詩云入堂無復見雙親見此來寧似在神先人附葬其側某名其亭曰在采詩中語也東山一到一霑巾記得先人昔念親強把兹亭號如在松悲柏慘見無因如存亭先妣墳亭在白巖庵北堂猶緑舊時萱寒暑無繇復凊溫戲綵巖邊白雲下慈顔倣佛尚如存兩宋名賢小集卷一百六十四
