body:
  text: 兩宋名賢小集卷三百四十四宋陳思編元陳世隆補飲冰詩集宋慶之字元積一字希仁永嘉人咸淳進士有飲氷詩集蘭溪道中朝買蘭溪船暮泊香頭市如何十月天復此連夜雨朔風寒似鐵曉色暗如土道行不見人路哭疑是鬼棲棲逺方士匆忽鄉心起落葉響疏庭空燈照寒被離家能幾時旅况已如此茫茫楚山雲渺渺楚江水屈指計行程此去復萬里開爐日賦筋力已非舊逢寒亦自憐風霜在簷外妻子語燈前紙被添新絮茶甌煮細泉雖云方寸地春意一陶然稽村雪後寒增健貪幽愛路生羣兒燒葉坐一鳥啄氷行山色晴猶慘梅花謝亦榮小輿風割面微醉任攲傾哭趙東閣秋風慘欲割秋月明不發誰令聲名髙竟使夀命折往年失四靈詩道微一髮縞素革織組宫徵節亂聒力排唐未陋意與風雅軋清廟不待陳黃壤詎能沒新篇今寂寞故墨慎無忽項園即事時節飛花盡幽林亦自香間來看新水獨立又斜陽簷角鳥鳴霽樹根魚就涼一春風雨過遊事極相妨次惠上人冷泉夜坐此景寫不盡此懷誰與俱月來林影碎雲去石頭孤萬籟各休息天香乍有無因師寄佳句清夢更勞吾郊行偶成野水連天濶孤舟盡日間會須風雨過一濟諒非難碧雞草堂呈劉後村斯文海內聲名濶猶是乾淳一脈餘須信昌黎曾得謗可憐太史未成書碧雞有地吟詩老金馬無心待詔初甚欲見君三十載春風今日侍巾車寓武昌報恩寺孟宗祠下竹依然借得空房竹樹邊貧寺少逢僧過夏逺鄉多是客經年倩人汲水時煎茗就佛分燈夜照眠家信不來心欲斷明朝又買漢陽船武昌懷古極目平蕪送落暉六朝征戰尚依稀風生戰舸周郎過月落南樓庾老歸秋塞戍間畨馬病春江流下蜀魚肥神州北望知何處父老猶能話嶽飛放翁有五更讀書示子詩豫亦次韻秋風蟋蟀牀下鳴茒茨耿耿秋燈明老夫掩卷發深喟起視河漢初參橫世人飲食幾知味眼底古今復涇渭藩籬是筆屋是書風葉塵埃力空費六籍在天日月存我亦收拾還本根此事兒輩未可論紛紛場屋爭作元兩宋名賢小集卷三百四十四
