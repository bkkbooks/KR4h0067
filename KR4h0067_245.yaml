body:
  text: 兩宋名賢小集卷二百四十五宋陳思編元陳世隆補翠微南征録四華嶽傷春衣袂怯春寒春在江南岸我意正傷春復被春縈絆一雨胭脂濕萬壑氷澌泮撩我惜春心與春傷爛漫栁垂不染絲織成愁一片杏吐無煙火燒碎腸千斷憶昔腰如栁栁腰舒易按憶昔面如花花面嬌難喚人不似春芳隨處得看玩因春憶昔人不見徒扼腕何時醉卧花栁中一笑千金不容換百舌流鶯一去無消息燕怯春寒歸未得緑窗清晝靜無人似把衷情訴知識上苑東風二月春淡黃楊栁初成隂解將一片無情舌學盡百般能巧禽紅英紫萼紛如雪萬姹千嬌總饒舌莫嫌花外太啁啾默默難酬好時節須臾緑暗紅亦稀伯勞杜宇鷹鸇飛更兼獵弋恣羅網卷舌不語全毛衣堪嗟國士徒切直不似幽禽明語默何如鉗口歸山林莫問燕南并越北飲仙閣槽頭壓盡春山緑槽下真珠㵼􅌬醁騷人一笑傾杯盤滿面春風漲紅玉少陵得此不欲言乃指八子為中仙主人傾蓋慕此意一閣新構堂西偏於今世態薄於紙何必勞心問青紫願君醉我金屈巵萬事過耳同風飛醺醺和月上栽竹長嘯一聲歸翠微贈祝跛我生多蹇難事業冷於水外內兩五行醜惡諱人舉武夷有跛者抱術遍荆楚摳衣忽趨隅覿面便相許搖手無所需再拜拂毫楮一詩聊贈行無以壯箱筥他時了功名為結煙霞侣富沙道中述懷敗鼓非全材毁瓦不自牧造物兒未戲逹人火先撲卜不到渭濱人徒嗟海曲彼哉真彼哉伐盡牛山木驟雨牛尾烏雲撥濃墨牛頭風雨翻車軸怒濤頃刻卷沙灘十萬軍聲吼鳴瀑牧童家住溪西曲侵早騎牛牧溪北荒忙冒雨急渡溪雨勢驟晴山又緑冬日述懷寒入肌膚粟已生銀河凍合水無聲梅花漏泄春先到風色商量雪未成有愧何須問天理無求方始合人情男兒未際風雲會辜負胸中十萬兵暮春述懷一年春事已差遲又見楊花貼水飛梁燕不憂驚午枕箔蠶生怕誤春衣景逢佳處須行樂事到難時且式微幸有黃雞并濁酒且和風月醉柴扉幽居十頃平湖一簇山湖山佳處著朱闌分階草色迎春緑潄石泉聲入夜寒不擾自然人事好有為方信世途難如今休説當年事只把心平氣定看謝二劉雁行臨慰暖如春玉粒金包即拜恩周粟不肥清聖肉楚絲難繫直臣魂二生在昔聞孤竹一死於今愧屈原圓簠下頒誠有謂此情兄外更誰論暮春買春無計託花神費盡榆錢不計緡風絮飛成三徑雪雨犂翻動一園春有心報國從招禍無相闕怨貧試問登壇與分社豫何人彼亦何人呈諸同舍洛陽年少不知幾十載南州賦式微三舉不登黃甲去兩庠空笑白丁歸頭長賈昔過三尺腰大臣今徒十圍祗恐金鑾不前席誰云無䇿富王畿寄陳士元郊野英雄不肯收膏粱芻豢有何謀胡兒只怒馬黃弩公子當求狐白裘唐詔屢頒蕡不第漢壇才築信當侯古今得喪同兒戲何必區區嘆白頭貧居貧居不暇理椽茅只倩江山圍一遭林鳥樂時知地僻嶺雲間處覺天高春衫著破重連線臘酒擎乾猶榨糟且把杯盤聊自適不須平地起風濤安分呈李竹齋風雨思君子煙霞憶舊逰一區山水國萬里帝王州臘甕香浮玉春旗雪滿甌安貧隨處樂此外復何求拜茶北苑春將半星楂欲奏功杵鳴千臼雪鎗卷一旗風蓋錦鸚毛翠簽羅象眼紅封成拜玄鶴飛上紫微宫寄趙及父欲邀詩社同蓮社為築將壇并杏壇圖得有才皆命世不隨風月報平安有感千囷未必將軍喜五斗難消令尹愁若使淵明逢魯肅折腰應到腳跟頭桃花紅雨隨風散落霞行人幾誤武陵家牧童若向青簾見應認枝頭作杏花弦月人間離别最堪憐天上嫦娥恐亦然昨夜廣寒分破鏡半奩飛上九重天呈魯功甫拂面東風二月天緑楊芳草暗平川花容著雨鬭翻錦春色惱人催禁煙燈夜雖然君有約花時却恐我無緣直須得暇來相訪當約嫦娥伴醉眠勉馮著明主憂臣辱已難堪國事顛危况未安溺嫂臨淵猶愛手鬭人同室尚纓冠公如不唱從軍樂士亦恐歌行路難麟閣功名總勞苦莫將行役作辛酸藕花惜絲不肯織宫鞋花月仙人謫下來河伯借泥封玉腕風神翻浪沃香腮無房不許蜂留宿有蓋嘗令鷺自開何事寃仇結青女一朝收拾付塵灰自勉世態風波不可論且于間處樂天真肥家無子堪登隴憂國有人休問津顔色雖蒙時借我腳跟那解日隨人客來若問當時事搖手無言對北鄰初夏即事隂晴未判落梅天栁巷無人絮撲氊滌器倒囊尋市醞喚船挑網得溪鮮鳥聲呼夢客千里山色撩人句一聨遐想故人應念我馬蹄何處夕陽邉呈鍾子嚴那條路不通長安莫把心腸獨自剜有釀何須兒索飲無肴徒勸客加餐千金不賞思歸楚萬户無封願識韓大抵利名些子耳幾多豪傑被縈絆寄楊渭夫自愧材猷不足觀獨於忠義死難干二陵風雨應歸漢萬里山河誰報韓眼到北盟常揾血髮當南渡始衝冠如何一代名人傑稽首稱藩鼻不酸幽居瀟灑幽居屋一重入門花栁間青紅簾常礙月鈎常挂酒不逢花盞不空畏愛難全公子日雌雄誰識大王風且將酒貨遷詩料休問𣙜場通未通呈王君庸主人意重出霓裳客子愁多欲斷腸睂黛暗傳春去恨臉紅猶帶夜來糚竹根稚子肌膚滑葉底荷花語笑香多少英雄在巫峽漫將詩思惱襄王寄西山宫牆無地可穿窬猶幸先人有敝廬仕版可羞寧毁瓦儒冠曽誤枉收書供柴我合同收炭寄食君當自辦蔬此理曉然明似鏡何須足下肆耕鋤呈李朝舉一片忠肝照日明濟時無䇿苦傷情聱牙撫几悔南渡和淚挑燈編北盟漢用檄招三十郡楚因歌散八千兵太平若鬭生靈肉何用生靈望太平白面渡繫船白面問溪翁名不虛傳説未通祗恐當年溪上女浣沙時節懶勻紅邸食責庖者陋邸已無味庖人更不材盫吹全做粥燒鮝半成灰添醋酸綿齒研椒辣木腮何時聳堂臠香靄霧樽罍秋意木剪空山瘦西風掃落黃荷殘簮失蓋菊老餅還香詩盡闕尤濶愁多夜更長悶懷無處著隨雁落瀟湘慰吳吉甫縣尉子針如京師一室膏鼎臠兄室雖被戕一妻猶可免伯奢事行役八子俱蹂踐兄家禍雖劇一女特婉孌女死固可傷殊未敵冠冕妻在固全軀喪女憂莫遣大厦既灰飛豐儲皆席卷鶺鴒起嘆嗟鸞鳳徒輾轉我昔以難勤荷兄垂勸勉况今以難告倍覺淚淟涊泛觀天之理禍福嘗相反有難既不死他時非淺淺去兄一牛鳴為地良非逺不能具兄慰面目實有靦自料吾與兄氣量及者鮮胡為蒼者天與子獨羈蹇送倪尚書歸霅川筆麟圖鳳久無聲何事權輿復見今魯祭不因夫子肉齊卿難奪孟軻心我公去就何為重吾道興亡所繫深安得斯文天未喪載歌狼跋繼遺音兩宋名賢小集卷二百四十五
