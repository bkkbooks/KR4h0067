body:
  text: 兩宋名賢小集巻二十三宋陳思編元陳世隆補元獻詩藁宋庠字公序安陸人舉進士開封試禮部皆第一歴官左正言郭皇后廢庠與御史伏閣争論坐罰金久之知制誥累遷翰林學士帝遇庠厚且大用矣庠初名郊李淑恐其先已以竒中之言曰宋受命之號郊交也合姓名為不祥帝弗為意他日以諭之因改名庠寶元中以右諫議大夫參知政事庠為相儒雅練習故事與吕夷簡論數不同凡庠與善者皆指為朋黨如鄭戩葉清臣等悉出之乃以庠知揚州未幾以資政殿學士徙鄆州進給事中慶厯中范仲淹去位帝問宰相章得象誰可代者得象薦其弟祁帝雅意在庠復召為參知政事帝嘗召二府對資政殿出手詔䇿以時事庠曰兩漢對䇿本延巖穴草萊之士今備位政府而比諸生非所以尊朝廷請至中書合議條奏時陳執中不學少文故夏竦為帝畫此謀意欲困執中也論者以庠為知體明年除尚書工部侍郎充樞密使皇祐初拜兵部侍郎同中書門下平章事集賢殿大學士饗明堂遷工部尚書三年諫官包拯奏庠不戢子弟又言在政府無建明乃以刑部尚書觀文殿大學士知河南府後徙許州又徙河陽遷檢校太尉同平章事充樞密使封莒國公御史言庠昏惰乃以河陽三城節度同平章事判鄭州徙相州以疾召還英宗即位移鎮武康軍封鄭國公以老請出判亳州庠所至以慎静為治及再登用沈浮自安晚愛信㓜子多與小人㳺御史吕誨請敕庠不得以二子隨以司空致仕卒年七十一贈太尉兼侍中諡元獻帝為篆碑曰忠規德範之碑庠自應舉時與祁俱以文學名擅天下儉約不好聲色讀書至老不倦善正訛謬嘗校定國語撰補音三巻又輯紀年通譜區别正閠為十二巻掖垣叢志三巻尊號録一巻别集四十巻天資忠厚嘗曰逆詐恃明殘人矜才吾終身弗為也二月二月尋芳已有期横來風雨固難知潤添水榭千波凝寒勒林花下日遲曉匣氣昬鸞不舞寶絃聲縱夜頻移傷春遺恨君須會重煖山爐釂玉巵重展西湖緑鴨東陂已可憐更因雲竇注西田鑿開魚鳥忘情地展盡江湖極目天向夕舊灘多浸月過寒新樹便留煙使君直欲稱漁叟願賜閒州不計年寄子京八年三郡駕朱輪更沗鴻樞對國鈞老去師丹多忘事少來之武不如人車中顧馬空能數海上浮一作逢鷗想見親惟有弟兄歸隠志一作去共將畊鑿報堯仁閠十二月望日立春禁中作閏厯先春破臘寒綵花金勝寵千官氷從太液池邊動桞向靈和殿裏看瑞氣因風生禁仗暖暉依日上仙盤須知聖運隨生殖萬國年年共此歡落花一夜春風拂苑濇歸來何處剰凄凉漢臯佩冷臨江失金谷樓危到地香淚臉補痕煩獺髓舞臺收影費鸞腸南朝樂府休賡曲桃葉桃根盡可傷答葉清臣紙尾何勞問姓名禁林依舊玷華纓欲知七畧稱臣向便是當年劉更生玉蘂花唐昌觀中樹曾降九天人鸞馭今何許雲英如舊春豈無遺佩者來效捧心顰歳晏出沐感事内訟山海有完士希世無良籌偶穿東郭履遂别野人舟不取篆刻賦來肩英俊游私智甚鳬短塵容若鴟愁備員太史氏補屬富人侯姑學了官事何嘗分主憂日貪斗食利歳感星躔周中都富才彦方駕若龍虬茂先善史漢平津治春秋高文用司馬格五寵吾丘間濶路逢葛繽紛人召鄒桑羊興賈豎安國出縲囚汲鄭貴交盛徐陳英藻遒况乃天下樞雄雌來九州衣冠徑複道鼓吹出長楸席上萬錢箸橋邊八列騶雍容紱魯玦意氣拂吳鈎咨余良不韙瓴甓厠琳璆吹竽昔已濫在梁今可尤臺閣魏舒被風霜蘇季裘有志謝軒鶴無機防海鷗㳟竢杜陵課誅茅歸故疇有將獨鶴行都市道上者左右奔迫野態憔悴因成短韻明心本霄漢此路極喧埃何意鳴臯罷翻同舞市來波臣憂轍涸海鳥避風災寄語昻昻質非君羽獨摧春夕暄色蔽孤齋空軒向夕開花低應露下月暗覺雲來燭牖輕蛾聚風枝倦鳥猜無言聊隠几萬境一靈臺府齋歲晏節物感人輙成拙詩上寄昭文相公樞密太尉處世何常盡值才虚名高位自驚猜千重浪裏隨流出百尺竿頭試險回衰鬢不徒欺曉雪孤心兼欲伴寒灰嵩陽潁曲風煙接已仗歸雲作隠媒兩宋名賢小集巻二十三
