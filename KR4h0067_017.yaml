body:
  text: 兩宋名賢小集卷十七宋陳思編元陳世隆補胡文恭集胡宿字武平晉陵人天聖中登第纍官通判宣州既而知湖州前守滕宗諒大興學校費錢數十萬宗諒去僚吏疑其欺不肯書厯宿曰滕候有過曷不早正去而非之豈昔人分謗意乎僚吏大慙時議謂士大夫七十當致仕其不知止者令有司案舉宿謂非優老之義武吏苐察其任事與否勿斷以年文吏當使得自陳而全其節唐介貶嶺南帝遣中使監護宿言介如道死陛下得無受殺直臣之名乎帝悟追還中使拜樞密副使曽公亮任趙滋興兵治界河事宿言於英宗曰南北通好幾六十載近遽來界上不過侵越尺寸城寨之吏力能辨詰何至興甲兵哉居母喪三年不至私室雖貴達常如布衣時卒諡文恭塞上漢家神箭定天山煙火相望萬里間契利請盟金匕酒將軍歸卧玉門關雲沉老上妖氛斷雪照回中深騎間五餌已行王道勝絶無刁斗至闐顔飛將曽從嫖姚立戰功邊人猶畏紫髯翁雕戈夜統千廬會緹騎秋畋五柞宫後殿拜恩金印重北堂開宴玉壺空從來敵國威名大麾下多稱黑相公過桐廬兩岸山花中有溪山花紅白遍髙低靈源忽若乘槎到仙洞還同採藥迷二月辛夷猶未落五更鴉臼最先啼茶煙漁火遙堪畫一片人家在水西公子北第當衢戟有衣巾惟鮮媚僕如犀萬錢共筯鳴鐘沸三組垂腰佩玉低座上賦鸚窮處士樓前盤馬小征西去天尺五城南路此去青雲别有梯津亭津亭歌闋戒棠舟五兩風來不暫留西北浮雲連魏闕東南初日滿秦樓層城渺渺人傷别芳草萋萋客倦逰平樂舊歡收不得更憑飛夢到瀛洲沖虛觀五粒青松護翠苔石門岑寂斷纎埃水浮花片知仙路風遞鸞聲認嘯臺桐井曉寒千乳斂茗園春嫩一旗開馳煙未勒山亭字可是英靈許再來淮南發運趙邢州被詔歸闕天臺封詔紫泥馨馬首前瞻北斗城人在函關先望氣帝于京兆最知名一區東第趨晨近數刻西廂接晝榮正是兩宫栽化日百金雙璧拜虞卿芙蓉湖小湖香豔戰芙蓉碧葉田田擁釣篷嵐氣欲飛山隔岸秋光不定水搖空翩翻雪鳥爭投浦撥剌霜鱗對擲風正是滄浪濯纓日一竿多謝紫溪翁橫山此地橫青嶂當年勒紫氛將軍精爽在可解勒遺文函谷關二首天開函谷北關中萬古驚塵向北空望氣竟能知老子棄繻何不識終童漫持白馬先生論未抵鳴雞下客功符命已歸如掌地一丸曽誤隗生東寂寞函關鎖未開田文車馬出秦來朱門不養三千客誰謂雞鳴得放回寄昭潭王中立髙絃一弄武溪深六幕天空萬里心吳苑歌驪成逺别楚峯回雁好歸音十千美酒花期隔三百枯碁奕思沉莫上孤城頻送目浮雲西北是家林太湖石海岱鉛松妄得名洞庭山腳失寒瓊潄成一朵孤雲勢費盡千年白浪聲誰向機邉逢織女直疑巖下見初平年來賞物多成病日向蒼苔幾遍行華陽逋客小隱華陽客山居不記年酒中常有聖棊下更無仙技得廣陵散注成秋水篇吾纓今未濯慚愧舊林泉兩宋名賢小集卷十七
