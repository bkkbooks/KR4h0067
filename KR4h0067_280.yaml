body:
  text: 兩宋名賢小集卷二百八十宋陳思編元陳世隆補端平詩雋春怨極浦蘋花白空壕蘭蕚紅傷心城上燕飛入館娃宫送客欲知行逺近細數杜鵑聲暗入蒼山去千聞是一程冷泉幽憩水源窮不盡垢膩生春襪未敢輒揭流且向幽亭歇落梅玉樹分明照夕流粉痕翻為碧苔留三更枝上玲瓏雨亂浦寒香一夜愁回山僧書就題書尾憶昔同行題落葉寺前枯樹鵲巢邊不知今度苔枝上多少秋蟲巳化蟬逢僧文禮二首空山落日又逢僧雨雜塵灰滿帽紋但憶來時門不掩麝香偷卧石牀雲師説古香寮舊開鮑昭曽為惠休來至今猿鶴猶知敬靜對寒星禮碧苔秋夜山門半掩浮雲闕古道人稀芳草歇夜深零露滳秋香幽人獨步青蘿月寄雲泉僧水頥二首書來只説往髙峯不記松林第幾重欲㨂青巒問茅舍秋山一樣白雲封頌罷南華誰得聞兩川寒玉一禪身松邊彈舌低聲念莫引龍來變作人贈從古上人山僧袖出新詩卷字字馨香撲人靣清晨何處展看來捲得梅花兩三片野廟野廟荒蕪倒掩扉寂寥香火客來稀年年歸燕相看覷空滴春泥損畫衣真娘墓青鳥傳書渡海遲亂山衰草葬蛾眉錦囊消歇餘香在狼籍春風豆䓻枝女墳湖石龜無語對東風海鶴曽迷曉市中三十六鱗朝夜月玉叉人在水晶宫顯應觀桃花白雲隨鶴乘將去深碧桃花滿故宫三十六簧明月夜不知何處吸春風四聖觀小園寬占一山孤别有墻遮古觀居到了思波攔不住水窗遊出放生魚蠟梅愛花偏倩獵人尋殘雪偷春上棘林山岸有誰先得見冷香疏亞辟寒金詠史二首一曲呼凰下九霄石臺春動海山遙周秦戰血縱橫盡猶卧白雲吹洞簫碧樹重重蔭屋廬分明青蓋畫龍車南陽病叟成何事便謂枯池活得魚送人遊西山三首昔人深夜看星斗鎮壓重壇尚有符偷寫只應蒼鼠慣幾行丹篆繞春蕪鎖斷寒蛟亦有神冷波寒水病殘身誰收匙鑰權相借略放天池洗白鱗抽鉛點汞舊臺荒何處搜尋舊草堂誰見洪崖最深處一坑泥護石中黃出關偶題一曲長歌浙水寒綈袍空往又空還咸陽若有山東志莫放蘇秦又出關吳門送同行者之毗陵布帆何處定逢春身是歸人又送君明日隔城回首望冷花寒月滿秋雲西湖初夏花飛春減緑隂成不住風光繞禁城山寺曉晴蟬欲噪柳林猶囀數聲鶯送曲江友人南歸憐君歸槖路迢迢到得茅齋轉寂寥應歎藥欄經雨爛土肥抽盡縮砂苗客樓水國秋清潮半生越王臺殿鎖荒城西樓一夜思歸客斜倚朱欄獨聼笙夜深虛堂人靜不聞更獨坐書帷對夜燈門外不知春雪霽半峯殘月一溪氷胥門蘆葦蕭蕭生曉潮伍員何地更吹簫夕陽自逐寒鴉去萬片宫花共寂寥送人還姑蘇别十三年返故居可憐世業半空虛布囊惟有焦琴在乞與秋風葬闔閭題僧子溫畫水墨蒲萄裊裊多應半熟時落斜髙挂冷攢枝分明記得山窗下一架寒藤帶雨垂望太湖二首獨立瀰漫灝氣中倍饒雲霧杳重重直西一道孤光起指點人看是白龍眼力難窮逺即昏縱晴惟只兩三分今朝林屋人皆見不似峯巒只似雲收家信渺渺秋風生白波故鄉歸夢隔山河可憐一紙平安信不及衡陽鴈字多聞友人過吳詩囊挂在船蓬上吟過江楓落葉中為恐吳箋題不盡秋風先噪數堆紅彩雲橋斷橋流水兩無期殘日輕雲處處疑乞與行人自沽酒滿旗風雨豆花籬龍井道中雜記二首白髮宫人頻笑謔羅衣昔對君王著夜驚春雨洗桃花夢魂猶挂鞦韆索老僧病久聲嘶喝屢説紫衣勝短褐莫嫌兩手漸拘攣曽把御前供奉鈸山崦早梅晴逼寒笆春滿鄰漢奩芳額漸輕勻東風未放全消息兩蕚愁香不見人青陽驛悄悄如秋麥氣涼山風吹透濕衣裳小爐深幌枯松火一夜寒香繞客牀舟次黃鶴磯俯為江山特地來勢須時暫走塵埃稍間便著攜官酒一醉吳王舊釣臺聞鴈此是衡陽第幾羣寂寥偏雜雨聲聞如今逺道多矰繳莫厭髙飛入暮雲風惡偶成二首柔櫓雙隨下水船亂帆輕柁遞相先無端繫著山村岸髙枕蘆芽對雨眠三日要行還止住冷沙寒水暗消春一千四百蕪湖路怨雨愁風多少人溧陽桃花見説謫仙曽到此東風千樹鎖雕墻遊人偏向花間酹雨濕春泥噴酒香延山渡解帆登岸作山遊林木茅茨共一丘數日驟寒消不盡尚餘殘雪護松瘤蕭山縣下遇雨二首年來沙漲卒難消更覺西興渡口遙冷坐看他騎馬客半鞍泥水踏春潮悠悠心厭出江沙過得丘亭轉落斜村店自知行客倦勸嘗新酒賣甜瓜太洲湖人居澤國勝居陵十月陂塘未結氷殘葦亂菱收拾後斷筐分曬折腰菱道間偶成彎彎田角路周遭摘盡柔桑露淺蒿無限寂寥門半掩一車偏建夕陽繅早春連朝微雪暖消凝始覺春風逐旋增今早畫簷遍有意數條吹折曬殘氷送人之漢上舊來邉塞自多塵瘦草寒花強作春見説連年更悽愴亂螢隨趂鬼迷人思歸四首閙裏看山不識真偶來軒檻振衣塵諸峯便覺移相就分付春風欲去人點點楊花飛滿洲只應催促送行舟非關向晚傷心事自怯春寒不肯留畫日慿欄客興濃山雖西繞水還東便乘春暮家園去猶及棠梨滿徑風自覺才疏久願歸敢將山色便相依漢家事業雖全盛亦放梁鴻一箇飛贈野逸二首時康難售賈生醫諫鼓無聲對落暉又報一年花信了滿山鶗鴂送春歸悠悠行路雪侵頭擬出重關洗敝裘堤上忽逢憔悴客背花停酒説通州下渚秋暮淺灘近渚沙相接水落漁人朝暮涉摵摵風鳴若雨來繞堤吹散乾荷葉秋日馬上本無謀略強談兵每愧臨邉病未能筋力豈知猶可喜一鞍千里到江陵許市罩魚網邉分得尾纎纎腥却蓴絲莫厭嫌自有野人相料理柳隂茅店一包鹽嵗除思歸三首六言山棲書到多日野渡舟橫幾回想見溪邉亭上故人待我銜杯春風氷斷千尺曉霽雲開百重何處溪橋爭渡誰家山寺聞鐘野屋定堆落葉山徑應鋪石蕪一别經秋不到隔籬黃犬誰呼兩宋名賢小集卷二百八十
