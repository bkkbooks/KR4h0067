body:
  text: 兩宋名賢小集卷五十三宋陳思編元陳世隆補公是集三小雨春城頻過雨一望一增新欲晚雲成錦初晴草似茵和聲散喧鳥芳意屬遊人向晚車馬息東風飛暗塵送人之洛逢人問嵩少千里駕征軒倦馬夜未寢鳴蟬秋尚繁風煙新洛邑冠蓋上東門合有西賓問歸時許共論夏晚閏餘時候早夏晚似新秋月出空堂靜蟬鳴深樹幽健逢鷹學習喜見火傾流早晚涼颷起重修白罽裘聽鐘陋巷客回轍夕陽鐘送秋寒聲漏空谷暝色下高樓斗逐悲風起微兼逺角投旅懷傷急景聽此愧淹留軍捷捷報蒼龍闕書從白豹城賊中城名大軍所至關河開地利雷雨肅天兵氣懾千山動威加萬里平獻俘多寶玉效首悉長鯨社稷靈何逺巖廊䇿自精餘妖暫詬沫壯士待龔行天馬來西域貂裘實上京遙知舞干羽冠劍賀公卿編杜子美外集少陵詩筆捷懸河亂後流傳簡䇿訛樂自戴公全廢壞書從魯壁幸增多斯文未喪微而顯吾道猶存嘯也歌病肺悲秋情自失苦吟時復望江沱子美詩云病肺卧江沱豫亦有此疾于司録東園辟疆園圃壓城闉聞道池臺事事新自置一樽消永日别留磐石待幽人雨添菊色迷三徑風散花香入四鄰亦欲肩輿乘興去主公何必舊相親城樓晚望長夏淮天却似秋居人未解白貂裘雲起岱山時漲雨風迎滄海欲橫流日邊渴問長安使天際頻沾賈客舟自是七哀宜寫望不關非土故登樓芙蓉池緑華青蓋滿方塘雨灑風吹著處香淨掃釣磯雙樹下醉攲涼枕弄秋光觀城上梅花憶和城頭梅樹花初發每到花前憶剡中白水碧山應有伴與君攜手過春風清明後鴈留滯江南久今來萬里歸春風稍和暖作意入雲飛西戎乞降南國傳消息西戎送好音懷柔知帝力啓佑亦天心御酒蒲桃逺離宫苜蓿深仍聞編舊禮五嶽望君臨西浦阻雨黑雲連海面急雨漲淮潮稍稍洲渚沒昏昏城郭遙畏塗仗忠信高舉幸扶搖不作圖南興誰當慰寂寥金山寺水面塵土少山頭炎景微蛟龍能護法魚鳥各忘機山有龍穴及山禽巨龜之屬皆馴空寂見佛事幽間滯客歸蓬萊似咫尺擬縱海帆飛江行寄隱直自念復遠適與君仍解攜天文鶉首尾地勢陜東西江漢饒風雨關山盛鼓鼙離憂各易老秋意欲淒淒憶和楚澤茫茫白芷生春風紅樹語流鶯高樓不見千巖路落日空含萬里情雨後登坐嘯亭風捲高花舞成雪雨滋芳草緑侵雲層軒獨立時惆悵淮北春光過五分黃薔薇緑葉黃花相映深水邊臺畔結浮陰何人解賞傾城態一笑春風與萬金始秋秋色忽已改旅程殊未央水雲含變態山雨送淒涼杳杳青楓暮菲菲白芷香多才悲屈宋搖落近滄浪山寺野竹檀欒翠孤峰杳靄青山樓隨詰曲石路上青冥雲色移時合鐘聲隔寺聽似聞堪避世遊子未嘗經琵琶亭江頭明月琵琶亭一曲悲歌萬古情欲識當時斷腸處只應江水是遺聲野望江水不可越扁舟浮夕陽高秋露寥落逺樹出毫芒澗水清兼淺山苖緑映黃漁翁豈招隱何待唱滄浪西域請平西域請都護崆洞獻凱歌兩階曾羽籥萬里肅山河甲第旃裘小春宫苜蓿多雌雄雙匣劍棄置欲如何禦戎傳上䇿不戰屈人兵遂斷胸奴臂何須萬里城出車非逺略高枕得升平戰骨翻空死吁嗟壯士名單于貪漢物中國避天驕賜豫金銀貴行來玉帛遙悲傷賈太傅感慨霍嫖姚慟哭將辭第英雄未可招棕櫚纛影毿㲚竿影直雪中霜裏伴松筠可憐憔悴凌雲色還是昂藏獨立人觀南戍士卒作樂簫鼓軍中樂旌旗嵗晚過激昂雙劍舞慷慨萬人歌睥睨荆衡小騰凌虎兕多北風隨殺氣橫絶洞庭波風雨寄張野人風雨初開泰雲雷未厭屯泥深長閉戶謀拙苦憂貧狼籍千株雪空亡一半春仍愁三徑裏草色斷幽人張好周易陰陽之説故詩有泰屯狼籍空亡之語雜詩二首鑿井取泉飲上山採薇食豈不信憔悴所願皆我力泉也非難致薇也不易得志士恥徒飽衆人苟所獲犧牲畏芻豢樊籠害羽翼晤理宜在早無為晚更惑道薄德亦散功名為時須用力世所賢守正衆云愚智者競蒿目小人復邇圖悠悠三季後此風益已渝安知治末病舐痔而多車堯舜無能名越哉已矣夫朱雲志士不忘棄溝壑勇士不忘喪其元伏雞搏貍狗襲虎感激只在精神存漢朝陵替外戚盛五嶽振蕩三辰昏臣強主弱上不悟廷中唯唯誰能言朱生節義埋金石面劾不避師傅尊願求尚方斬馬劍誅一厲百清其源天威振怒不我受利刃接頸雷霆奔當前折檻色不變命在頃刻誰攀援昔時仲尼魯司冦七日行戮端乾坤嗟哉此生志不就冥冥后土埋其寃漢家社稷變王氏張禹虛蒙師保恩卓然先見在物表佞臣貶國誰復論我願乘雲款天閽巫陽掌夢招其魂立朝謇謇辨邪正無復姦諛開幸門小園春日草色初新栁帶長宿煙朝露濕朝陽東山雲起西山碧南舍花開北舍香城南泛舟乘興隨所適出郊聊泛然清波能照髮白鷺巧迎船老樹悲秋雨高風急暮蟬孤城隱不見落日暝浮煙不踏城南陌從春及素秋蕭條非復昔顧盼莽堪愁白露蒹葭老清風蘭桂幽佯狂驚楚俗應識棹夷猶高岸看為谷通波幾覆城檜巢非太古野俗競偷生雨逐行雲過山依返照明楚歌搖落際更動北歸情秋晴西樓中秋清風卷氛翳廣野落秋毫木落山覺瘦雨晴天似高開窗置樽酒看月湧江濤高卧淹湖海非關氣獨豪題送亭别任回北飛鴻鴈南飛燕擾擾俱非自在身莫向孤亭南北望野花江草最愁人獨酌憶和甫開窗一樽酒獨酌靜無言夕陽不可駐流水自東奔野犬迎虛吠舟人爭渡喧悵然此時意不醉已消魂聞聖俞移官霅上以便歸養親老不擇祿此心如古人戴星捐吏事戲綵過鄉鄰若下開新酌汀邊詠白蘋醉吟俱入手亦未負青春晚涼楚山何處雨天氣晚來涼返照原野靜清風松桂香高樓半雲霧遠水入滄浪幽意驚飛動真憑酒散狂城南晚歸高秋變搖落逺水露澄明飛鳥江中墮孤帆木末征逆風吹帽側疏雨逐雲行興盡聊當返途窮眼自驚秋晚西樓微霜欲墮木葉脫積潦已收天宇清皎皎日華映林莽蕭蕭風色閉柴荆正憐戎馬秋防塞何處悲笳暮繞城回首浮雲滿西北七哀還見古人情遣思淮上秋光凝客恨城頭暮色隱斜暉獨醒未必能勝醉逺望由來可當歸觀魚臺落日含古意高臺多逺心魚龍潛凍水蟋蟀有哀音江漢南浮逺關山北望深張衡四愁意歷歷起登臨泛舟雪消泉似漲氷解舟可通操篙不憚冷環渚故無窮歌咏淹留日醉酣輕朔風何須萬乘相始辨鴟夷翁寄王二十先借王杜甫外集會疾未及録近從吳生借本增多王所收因悉抄寫分為五卷又為作序故報之昔借君家杜甫集只緣卧病不曾編近從霅上吳員外復得遺文四百篇夫子刪詩吾豈敢古人同病意相憐子美亦有肺疾也新書不識傳將去悵望秦城北斗邊聞徙關中兵備河東壬午嵗邊兵絶當路戍卒下河源烽火飛狐口旌旗積鴈門和親故下䇿薄伐本中原誰斷胸奴臂非無國士恩雪後登觀風樓雪帶郊原濶城橫碧玉齊夕陽寒似落逺樹望如迷旅鴈晴更急棲烏飢亂啼強歌非郢客竟日戀危梯觀陜西圖三首險固非天意承平厪主憂三年勞將帥萬里問旃裘尚記安西道空悲定逺侯大河知所向日夜正東流憶昨傳消息兵來渭水旁信知秦地險未覺漢兵強青海通西域長城起朔方分明見地里悵望隔要荒乘槎漢使者聚米馬將軍關塞他年阻河山此座分悠悠傷戰骨處處怒妖氛未分儒生老深希筆硯焚聞韓范移軍涇原兼督關中四路癸未涇原非逺略韓范各名卿地盡三秦國身當萬里城指麾沙漠靜談笑鐵山輕報國心如日憂民病若酲終軍材冠世汲黯直知名風雪隨車騎鷹鸇起斾旌年年戰頻衄事事淚堪橫會刷蒼生恥重看鑄劍耕九日時保州軍亂殺守尉河北置烽火夏臺未平關中防秋采采黃華菊飄飄閶闔風醉從紗帽落興與古人同北嶽烽煙隔甘泉候騎通悲歌傷逺目不獨為青楓寄隱直江漢相思山萬重君家少闕定西東年華過去如流水心事差池似老翁一世共爭蝸角上微生分付酒杯中途窮何必多垂淚吾更冥冥笑阮公重傷胡二前寄詩與因甫至而因甫卒使者不能以豫詩送其家遂復持回豫甚恨之作此詩也書云因甫死後其妻生一女故末句及之今日寢門側涕流豫不堪伊人竟長逝回使返空函如覺知音絶深懷挂劍慚仍聞身後事生女不生男梅花澤國春還早山梅臘競花繽紛迷雪意浩蕩逼年華驛使紅塵逺江風短日斜芳菲恐易失愁思亂悲笳至日登樓南極陽生天地新高樓氣色已含春得無鴻鴈翻歸翼應有龍蛇動蟄鱗亦復盡云占楚嵗不辭為壽引湘醇甘泉從祀誰能賦悵望勾陳擁北辰是日上親郊雪後飛塵暫消息春意日沖融野水涓涓緑林梢靡靡紅躍魚輕泮凍鳴鶴舞和風出處驚時節悠悠看嵗窮春陰江上浮雲聚城中暮景兼東風酒味溢小雨客愁添寒色端侵牖斜陽不滿簾滯留成楚老卑濕意無嫌初晴雨餘春更好日出望還新暄鳥啼驚客林花笑向人年華如過鴈世事劇飛塵置酒陶嘉月滔滔醉任真和楊備國博弔屈詩知音不恨遠異代或同聲靈魂自識路幽遇亦含情往記識楊子臨淵悲賈生高文激頽俗會使衆人清楊前嵗中夢作此詩後數日詔除秭歸守既署事過謁屈子廟想見物色如夢中所觀作文祭之刻于石漁翁白頭老翁披敗蓑求魚終日罩淮波波深水濶望不絶網目雖繁能幾何大魚鱣鱏入淵底小魚鯤鯢登網裏手皸足趼吁可憐何不為網大如天兩宋名賢小集卷五十三
