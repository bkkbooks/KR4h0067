body:
  text: 兩宋名賢小集巻四十六宋陳思編元陳世隆補獨樂園稿五立夏呈安之留春春不住昨夜的然歸歡趣何妨少閒遊勿怪稀林鸎欣有託前日始聞鸎叢蝶悵無依窗下忘懷客高眠正掩扉君貺環溪地勝風埃外門深花竹間波光冷扵玉溪勢曲如環榮路回翔厭華軒笑詠閒堪羞謝太傅不復到東山長安送堯夫同年昔嵗瓊林花氣曛今朝長樂栁梢青事隨流水滔滔度鬢結繁霜戢戢新世路飽諳都是夣人生可貴莫如身㑹須築室臨清洛相與攜筇戴葛巾修酴醿架貧家不便構堅木縳竹立架擎酴醿風揺雨漬不耐乆未至三載俱離披往來遂復廢此徑舉頭礙冠行絓衣呼奴改作豈得己抽新換故折四籬來春席地還可飲日色不到春風吹和韓秉國招范景仁飲景仁不至云方作書與光論樂山桃佳李實如拳西湖盡眼鋪芳蓮景仁不從鄉賢飲為此樂論方窮研周衰官失疇人散鍾律要𦕈誰能傳近人欺衆公私意最可閔笑房生顛如光初不辨宫羽是非得失安敢專每煩教諭累百紙頑如鐵石不可鐫王李阮胡相詆毁各執所學何妨偏景仁家居鑄鬴斛欲除民瘼恐未然要須中和育萬物始見大樂之功全送薛水部十丈通判并州十萬貔貅士旌旗晉水陽元戎倚耆碩别乗選才良秀直寒松節精明利劍鋩知君留滯久從此欲騰驤王君貺宣徽垂示嵩山祈雪詩十章合為一篇以酬之今秋少雨冬不雪麥寄浮埃根欲絶聖主焦心憫萬民負扆不怡常膳撤詔書朝下徧九州岳瀆百神俱禱求西都留守䖍君命促駕不敢須臾留嵩高萬仭蟠地中海内衆山無與雄前驅大斾擁千騎波騰雲涌來祠宫牲肥酒香籩豆潔盛服齋明薦毛血有司執事皆肅然寳帳神來風窣穴中出也屑公心猶是九閽遥丹誠不得通青霄分留𨗳從屯林麓别張醮具登山椒山椒迢逓峻無極行挽枯藤蹋危石萬室嗷嗷愁死饑敢憚劬勞愛餘力天門上出俄坦平下視一世塵杳㝠焚香拜手傾懇側左右前後皆列星公今三守三川地咫尺嵩高未嘗至詰朝既畢祠事嚴暫轉鳴珂歴諸寺少林昔為達摩居達摩英靈今有無庾辭流散滿天下競以兩手捫空虚法王魏氏離舊宫玉刻狻猊曏猶有子孫宗廟皆塵灰止見伽藍存不朽㑹善庭隅千嵗松一根二服凌寒空勢如鼎足爭秀出泠泠永夜吟霜風少室先生樂閒暇棄官來家玉峯下昔為浪泊據鞍人今結東陵賣𤓰舍溪上有堂名挂冠四垣重複皆林巒呼兒掃地喜公到隨分絃歌留盡歡周王太子名聞乆相傳羽化緱山首鶴飛笙逺窅無迹遺廟今人空瀝酒公來本不事遨嬉周流閭里詢疲羸親呼令長囑赤子勿貪榮利窮鞭笞境中羣望無不走回轡仍過鑿龍口奉先暮投林日曛浥潤晨征轍氷厚歸來新詩盈一編明珠大貝相屬聨此行雖不從公後歴歴勝逰如目前送魏寺丞廣赴辟秦州判官征西大府開後乗得高才區脫烽烟静渠搜職貢來隴雲低玉帳羌笛奉金罍信美從軍樂修梧茂帝臺送周茂學沅字子真真定安撫使玉帳前矛舉銅魚左契分平生公望著期月政聲聞陌上壺漿溢潭邊花氣曛遥知待新將民物兩欣欣苦雨今春憂亢陽引領望雲族首夏忽滂沱意為蒼生福自爾無虚日高厚亦霑足連年困饑饉此際庻和熟如何渉秋序沈隂仍慘黷長簷㵼潺湲晝夜浩相續喧豗流潦怒突兀壞垣秃駕牛泥没鼻跨馬水平腹瓦攲松漫白道廢草濃緑汚萊閔下田漏濕憐破屋縱横委地麻狼籍卧隴榖怯聞飢嬰啼愁聴寡婦哭閒官雖無責飽食愧有禄世紛久去心物役奈經目鬱陶聊秉筆狂簡己盈幅和子華招潞公暑飲朱門近在府園東杖履過從跬步中避暑連翩投轂晏析酲蕭灑滿襟風閒來高韻渾如鶴醉裏朱顔却變童剪燭添香歡未極但驚銅漏太怱怱伏䝉留守相公賜示陪太師潞公東田宴集詩輒敢屬和舞雩新雨浹公田水滿東溪上下天行逕乍迃初見筍浮舟正好未生蓮絃收裂帛胡琴闋袖結清風楚舞妍相國火城光滿路夜歸不假玉蟾圎景仁將歸頴昌輒為詩二十韻紀贈秀發西南美挺生河嶽靈雕龍蔚文采老鶴瑩儀形落筆高時雋飛緌侍帝庭英聲軼雲漢逺勢擊滄溟苦節專憂國嘉謀每據經温雖比圭璧直不避雷霆道勝軒裳樂神和氣體寜忠誠懷畎畝樂事寄林坰藻鑑評隨月過從徳應星苦吟金出壙確論木銜丁賤子叨流輩高風仰典刑巨川容滴水餘景借流螢久别眉俱白重來眼更青淹留弦與晦逰集醉還醒有酒須相就無歌不共聴竒花喧夕市疊鼓咽春亭揚袂行辭洛回車去望陘許昌北有陘山見來書往還天表雁離合浪間萍異日期同傳景仁嘗言他日與光若得在國史必同傳窮泉約互銘光與景仁約後死者當為先死者作墓銘古今難得事交分保頹齡孫器之奉使淮浙至江為書見寄以詩謝之三首䪍矢迎山驛軺車下帝臺夜㸔牛斗分應有使星來吳釀水蘭春蘚州有水蘭堂酒江鱸白錦鱗玉盤聊下筯初識紫絲蓴岫貼晴天闊舟縁石岸深吳江中石岸長數里遥知作書處䌫裊緑波心三月三十日㣲雨偶成詩二十四韻書懷獻留守開府太尉兼呈真率諸公春盡少歡意昏昏睡思添正憂花意索更用雨聲兼乍語鸎喉澁慵飛栁絮粘落英紅没砌茂草碧侵簾寳相錦鋪架酴醿雪擁簷沼萍浮鈿靨林筍露犀尖坐惜風光駛行愁畏日炎追隨任塵甑歌笑望霜髯落筆詩情放飛觴酒令嚴金丹呼勝彩玉燭耀新籖傲岸冠巾側淋浪襟袖霑饑仍留瘦馬歸必待清蟾筋力雖無幾娛遊亦未厭脱身離簿領適性得閭閻多病非辭貴無才豈養恬清塗誠愧忝㣲禄己傷亷日費須三爵年資仰數縑糇糧粗自足龜筴不須占河洛今為盛圗書昔所潜家家花啟户處處酒飄帘温飽資兼愛安平倚具瞻愚夫猶樂育下客愈撝謙落拓形骸逸優游嵗月淹餘生信多幸狂醉亦無嫌和錢君倚日本刀歌昆吾道逺不復通世傳切玉誰能窮寳刀近出日本圗越賈得之滄海東魚皮裝貼香水鞘黄白間雜鍮與銅賈人云真鑰似金真銅似銀百金傳入好事手佩服可以攘祅凶傳聞其國居大島土壤沃饒風俗好其先徐福詐秦民采藥淹留童丱老百工五種與之俱至今器用皆精巧前朝貢獻屢往來士人往住工辭藻徐福行時書未焚逸書百篇今尚存令嚴不許傳中國舉世無人識古人嗟予乘槎欲往學滄波浩蕩無通津令人感嘆坐流涕鏽澁短刀何足云和運使舍人北園餞别行憩三交僧舍冒雪宿百井闗見寄驪駒北上雪孱顔䪍矢前驅度漢闗僧室松杉青照眼驛亭烟火迥依山馬銜邊草猶枯瘦雁怯行雲冷未還賤子不須回首問鬢毛蕭颯簿書間和韓子華寒食休沐與諸公同㑹趙令園暮歸馬上賦偶成冠葢連翩陌上來風光爛漫擁樓臺玉巵貯酒隨宜飲綺席尋花觸處開小雨前宵先潑火季春明日又吹灰須知勝集人間少惆悵金覊容易迴張元常挽詞二首為吏文無害臨民政不苛渾金生自美古井澹無波方喜風鵬舉旋聞隙駟過善人宜壽考報施定如何秀眉無定驗結轖遽為災鄉曲三年别江山萬里迴林閭飛旐入書劍逐舟來墳草枯還緑重泉不復開送惠思歸錢塘孤岫平湖外禪房老柏隂倦逰諳濁世獨往遂初心夜雨燈窻迥秋苔屐齒深勿鉏山徑草便有俗人尋九月十一日夜雨宿南園韓秉國寄酒兼見招以詩謝之雨多秋草盛濃緑擁寒階吾廬奥且曲退縮如晴蝸小園己自溢欲往泥霑鞋體羸畏風冷室處門常九日古所重負此時節佳緬想使君宴綺席臨高齋肥羜堆玉盤飛觴酒如淮楚舞陵湖波茱萸落金釵神醒鼓吹喧百疊疑傾崖歡餘忽我思牙兵星火差潩泉恥獨醉醇味相與偕我飲雖不多和氣浩無涯梧子拾為果柜桑伐為柴沼中數寸魚烹煎足為鮭吳人謂魚肉為鮭誰言無以侑繞渚多鳴蛙交道乆衰薄巋然見吾儕奈何數舍遥晤語積年乖况乃辱嘉招私心豈不懷轘轅石道澁重以隂雲埋雖有果下馬款段非渥洼臨風徒竦踊志願安能偕狂詩寄一笑聊用當詼俳獨步至洛濵草軟波清沙徑㣲手攜筇竹着深衣白鷗不信忘機久見我猶穿岸栁飛邵堯夫許來石閣久待不至淡日濃雲合復開碧松清洛逺縈迴林端高閣望已久花外小車猶未來和邵堯夫安樂窩中職事吟靈臺無事日休休安樂由來不外求細雨寒風宜獨坐暖天佳景即閒逰松篁亦足開青眼桃李何妨挿白頭我以著書為職業為君偷暇上高樓送冷金牋與興宗蜀山瘦碧玉蜀土膏黄金寒溪潄其間演漾清且深工人剪穉麻擣之白日砧就溪漚為紙瑩若裁璆琳風日常清和小無塵滓侵時逐賈舟來萬里巴江潯王城壓汴流英俊萃如林雄文溢箱篋爭買傾竒琛夫君乃冠冕辭氣尚千尋十載為舉首扵今猶陸沉嗟我蓄此紙才藻不足任願以寫君詩益為人所欽縞帯猶多物足明同好心黄鐘聲如雷豈病無知音請以此為質他年神所臨華軒䇿駟馬慎勿忘遺簮兩宋名賢小集巻四十六
