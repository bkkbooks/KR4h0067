body:
  text: 兩宋名賢小集卷二百七十九宋陳思編元陳世隆補端平詩雋吳山仁王寺山寺慿髙夕未昏上皇曽此定乾坤甌閩散驛緣江島龕赭收潮入海門細雨亂花唐輦道深煙疏桞漢營屯何時汴水東流畔君返宸居臣故園庾樓欲望江山夜轉𡨕胡牀曽此對嘉賔傷心皓月長流水回首清風不見人花落雉樓橫角暮草生鷗渚破船春歸程豈暇頻登覽分付羈愁與白蘋題豫章臺何日遺蹤鎖斷岡更誰曽望舊臺荒百年南渡頻秋雨一片西山幾夕陽石礙老松欹徑險岸隨乾葦出江長斗間可是無佳氣又見飛烏繞去檣題滕王閣髙閣巍峩接水濵興亡才問便傷神鳴鸞東閣知何處跨鶴西山别有人桞映落霞江渚暮草鋪斜日野田春羣鷗亦厭多悲感偏與忘機客最親送友人持節嶺南吳雲迢遞楚雲鮮從此南征路幾千漢使五羊登嶺日魯經三豕渡河年榕穿白草飛蠻雨椒落黃芽起瘴煙待及戌瓜多載石定無畨貨入歸船贈唐棲寺僧山門寂寞唐棲寺别去間居又一年草暗暮田羣鴈逺花明春院一僧禪雲房夕磬浮清雨水殿寒燈宿細煙作得詩成無寄處幾回遙認隔溪船連珠逺望披裘日幾回可堪江上暮寒催雲飛曠野迎風斷雪灑長灘夾雨來馬踏野橋嘶破板烏迷村路立髙桅暫須移向疏籬泊遷就驚春一樹梅行吟獨行沙岸不相攜凖擬沿溪更渡溪藥蔓交加蟲上下桞花撩亂蝶髙低杖頭曉伴春雲石屐齒晴翻夜雨泥詩就隨時為人寫等間抽盡錦中題秀野小作幽園傍宅開只須數畝占樓臺石移林屋秋雲至水帶松江暮雨來徑草散香迎過屐砌花分影蔭流杯人家園圃應無數不似君能日幾回孫伯符墓下木葉蕭蕭暮草長夢魂曽斷九回腸空聞綘帕離章水誰見黃旗入洛陽鴉噪暮園江阪迥龍盤春戌石城荒赤烏不識桑田變猶自悽悽守白楊天津橋裊裊朱欄倚細波緑雲相對間嵯峨中天車駕曽擒敵何日樓船定入河霽桞午隂隨岸逺露桃春色過墻多黃旗應適東南運已辨簫鐃九曲歌雨花臺細蘚桑莎瑣舊堆昔年曽見異僧回如何天上飛靈雨不為人間洗劫灰江接潮頭諸脈應地連岡勢一走來只今不假虛無事别是春風歌舞臺鳳凰臺一徑逶迤草自芳何為不復更翶翔應須舊國還宣武别有髙臺在建章白鷺背花尋塔路赤烏衝桞集宫墻中興不比偏安事且對梧桐薦羽觴鳥衣巷日落憑欄感慨頻長干橋畔冷殘春桑田蕪沒徒多事蘭玉叢生更幾人風暖影翻花外燕雨多痕蝕草間鱗堪嗟羣從成功後不及鍾山一尉神石頭城點點凝煙望未收六朝遺迹遍荒丘自從綘闕雄江靣誰把朱泥染石頭岡斷曉榛雙阜虎岸長春草一灘鷗諸公多少新亭恨不是知心莫上樓浮逺橫障瀰漫恃此丘長江東鶩轉湍流波間去海無多里沙際鋪淮輒數州風勢起花山郭暗潮聲侵樹野田浮無由望徹蒼茫外回首斜陽絶是愁送趙山臺赴江隂匆匆何事解朝衣甫為君王領一麾歷考近來成故事就遷長是未多時寒更夜徹防淮柝曉舶晴翻出海旗不久赫蹄應已到只須略賦練江詩嶽陽樓憑髙望盡寂寥天與我間情共渺然平展暮雲三百里積停春水二千年沙洲橫渡荆江雨石塔遙分嶽麓煙先我未聞飛劍術想須今度遇回仙西湖竹閣寺精舍蕭疏近水涼分明一徑緑沉槍就移山近湖皆隱放出樓髙寺倒藏春透露梢齊曲檻曉翻風籜過修墻長堤花盡人稀少來聼蟬聲伴夕陽採香徑繒甲如茶護此臺玉顔憔悴錦帆來一溪香草無蜂過千里空葭有鴈回響屧蘚埋丹蜴迹縷衣花變粉蛾灰誰知子夜歌殘日樹滿西山似緑苔七里瀨瞬息沿流七里遙感時回纜木蘭橈髙臺未變陵兼谷故國頻更市與朝風散亂雲通去驛雨消殘雪助歸潮漁翁近亦無前輩一箇青銅不肯饒南樓懷古五首昔人有意久經營極望寒蕪逺更平三國斾旌羣鵲散六朝樓閣一鳩鳴雪消晴嶂沉孤壘風打寒朝入廢城多少怨魂銷不盡草根燒斷又還生事久銷沉只等間好將深意遞相參舳艫宵遁誰思忖裙屐春遊自笑談西日瘴回迷漢沔北風波逆上江潭隔城方唱招魂引一拍殷勤至再三茫茫迂曲度平川何處孤村近水邊煙護劉琮殘壁壘雨沉黃祖舊樓船寒沙細擁菰蘆地破隴斜耕苜蓿田見説去年秋潦後更無茅屋起炊煙幸際清時息五兵舌頑無處説縱橫蟻書一夢難分别蝸角千年強鬬爭丹壁郵亭新蜀道白樓烽戌古邾城自知夜半徒興舞移遠寒雞不使鳴夕陽光退杳難慿欲問江鷗只怨憎得意舉帆燒北岸傷心流涕鎖西陵雪消蜀貨千檣下風送吳鹽萬斛增且趂一樽相暖熱自非乘醉莫來登山居春晚索居牢落動關心但覺匆匆歲月侵無夢不因憐書靜有懷多是惜春深草香稚蝶銷胡粉花落蠻鶯變楚金最是不禁芳樹色能消幾日又成隂庭下枯梅有感庭下同栽兩樹梅一株搖落一株開無緣春色相虧曲有分晴光亦往來雲打枯枝愁漢驛雨翻雕鄂夢荆臺綺窗不斷橫斜影猶有東風管碧苔會稽山衣冠從昔化文身峻嶽當天自有神秦帝刻碑三十載越王棲甲五千人江連雲氣分南紀海接星河近北辰必竟興亡誰可料但聞陵谷變飛塵甫里觀陸魯望故居天隨清調何人繼幸有荒村故宅存橘上蠧魚應屢變草間眠鴨尚能言池亭暮雪兼風起籬落春潮帶雨渾人啖菊苗終竟别屠沽猶自不登門陳武帝釣臺路才容馬盡荒茅誰識仙人舊釣鼇流水不隨船影斷亂山猶帶彈痕髙春煙粉黑重生葑暮雨灰紅半拆桃今日故宫何處問東風應長對江濤贈雪林李和甫忽地相逢便解顔況兼終日看青山精神摘桞哦詩際標度尋梅集句間春淡野橋孤艇遠暮寒溪寺一鐘間匆匆又作經旬别兩處東風各閉關道中有感逺程巳過經行處别有逶迤古道存寺已寂寥猶有殿水才窮盡又逢村一林枯木人分路十里飛花客過門必竟悉依生處樂不知何事别家園黃溪匆匆寧不恨飄零轉更分岐過别汀世事總如迂曲路年華都付短長亭冡桃褪蘂無人色社櫟盤根作鬼形心自感傷人豈識回頭猶顧峴山青朱潭消散羈愁益垣然況當初暖欲晴天清溪苔滑重抄紙淺屋柴香正煮綿隔水殺雞祠社土過橋嘶馬入人煙今朝自覺難忘酒應更無人笑謫仙送人之漢上木落千山怨别離自知難駐馬行蹄上書季子窮歸洛獻賦荀卿老向齊驛店破旗秋雨細戍樓殘角夕陽低袖藏祕䇿君門遠應望中原泣鼓鼙荻巷波眼沄沄浪復輕稍蘇羈束過清明倩人覔路先尋酒久客懷鄉始見餳松下紫芽肥野菜竹間青葉帶山櫻自從一别齊安後直到今朝始聼鶯感事書劍悠悠屢變遷老諳多故始知天汗青每愧拋長日髮白無由逐少年暮雨暗消江岸桞曉霜初透野池蓮此心懸解何須語人問惟應一指禪送遷客自謂别離難會面如何此地又相尋往來雲物他鄉意輕薄風塵久客心夜雨泥塗三里郭夕陽煙火數家林送君好去加餐飯莫聼哀猿徹曉吟送人之京口競攜書劍去紛紛誰解登臨對日曛北道荆夔一江下南朝徐兖二州分髙樓角曉鳴秋雨逺戍烽寒起暮雲莫把尋常望瓜步恐驚邊鴈不堪聞留題唐棲寺僧房十日相留戀為怯生寒未到家插岸斷氷妨蕩槳入簷飛雪助煎茶香臺穴碎逃秋蟻古殿巢翻失暮鴉惟有溪梅最禁耐傍籬爭發向陽花送白判官著書不就便相拋逺向襄州謁故交里舍千頭無舊橘客程三脊有荒茅買魚村渡捐孤劍沽酒山城解敝袍雙鬢豈堪禁歲月眼看歸鳦又成巢中和節時節匆忙過隙駒可堪岑寂就船居不禁衰病慵耽酒無益間交懶報書風暖暮田歸海燕雨甜春水上潮魚客中自是光隂速才見新正又月初送人之荆門昔年此路逹王畿荒畬燒煙事巳非山向崤函空北望水隨江漢自東歸淒涼坂路征車逺寂寞郵亭候火稀遙想思鄉怨岐路杜鵑花發鷓鴣飛嚴陵釣臺晴江萬里緑波來惆悵君房去不回秦苑河山歸故國越鄉雲雨庇荒臺春風一道江蘺緑落日千峯杜宇哀欲訪釣船無處所野花如雪滿汀開遊道場山遇雨飄然大作登臨想才遇名山雨亦遊林尾亂聲猶問響枝頭殘滴未全收濯翻野竹從教軃衝落巖花放出流欲把姓名書石上幾回粘筆又成休浣紗秋日五首衣裳單薄鬢蕭騷獨憑危欄首屢搔出壁亂雲分片段隔江飛雨見絲毫庭前斷續蛩爭響簷外輕便蝶鬬髙多少好山俱在眼愧無短屐共遊遨當前灘號西施磧對磧看秋得句清五色懸門秦一尉六經充棟漢諸生石叢細火團荒砌野蔓疏金出廢城目送浣紗人去後又聞街鼓報新晴長江淡淡樹疏疏掃却門庭即故居蟲入暗間頻促織螢穿虛筆屢翻書破除暮色惟荒菊薦送秋華有嫩蔬料得故園分社酒小苞青橘四腮鱸自慚尸素常多暇未放秋風變楚顔一夢别離拋白水三年端的守青山野雞避鶻遮雛去沙翮銜魚趂母還縱有亂愁消遣盡淡雲殘日共人間清溪樓閣暮沉沉不覺登臨夜欲深幾處捲簾催酒笛誰家閉户搗衣砧一朝野霧三朝濕十日江天九日隂暗喜礙人公事少自來收拾送秋吟羅家洲對港近村俱有路扁舟倍覺往來頻入秋破褐惟存線盡日收錢不滿緡逺岸冷沙銜墜葉淺灘寒水卧枯蘋未知行役何時斷縱使更深亦喚人送陳雲崖遊三衢吟得詩成若等間為我開盡錦囊班不專瘦島元和末要敵長城大厯間帆入亂潮隨漲水帽衝殘雪度危山從今便少春遊伴才過新正可得還兩宋名賢小集卷二百七十九
