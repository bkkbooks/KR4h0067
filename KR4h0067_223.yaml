body:
  text: 兩宋名賢小集卷二百二十三宋陳思編元陳世隆補遂初小藁尤袤字延之無錫人入太學以詞賦冠多士尋冠南宫紹興十八年登進士第嘗為泰興令修築外城不為金冠所陷吏民為立生祠注江隂學官需次七年為讀書計從臣以靖退薦召除將作監簿大宗正闕丞人爭求之陳俊卿曰當豫不求者遂除袤復授祕書丞歷著作郎兼太子侍讀初張説自閣門入西府從臣因執奏而去老數十人袤率三館上書諌與郡得台州有毁袤者高宗疑之使人密察民誦其政不絶口乃録其東湖四詩歸奏上歎賞遂以文字受知纍遷樞密院正兼左諭德輪對申言民貧兵怨者甚切夏旱求言袤上封事高宗崩前一日除太常少卿當定廟號袤與禮官定號高宗洪邁獨請號世祖袤率禮官奏謂太上以子繼父不可援光武為比以亂昭穆之序孝宗卒從初議會建議事堂令皇太子參決庶務袤時兼侍讀乃獻書以為儲副之位止於侍膳問安不交外事撫軍監國自漢至今多出權宜乞懇辭以彰殿下之令德進權禮部侍郎兼同修國史侍讀既而兼權中書舍人先是命兼直學士院辭至是復詔兼之辭不允孝宗內禪議已定諭袤曰旦夕制册甚多故處卿以是職袤乃拜命光宗即位開講筵袤歷舉唐太宗不私秦府舊人為戒又數日復論官制謂武臣披堅執鋭者積功纍勞僅得一階權要貴近之臣優遊而歷華要薑特立以為議已言者因以為周必大黨遂與祠紹熙元年起知婺州改太平州召除給事中既就職即昌言曰老矣無所補報凡營求內降小礙法制者必不奉詔所繳奏甚多至為上震怒裂其奏事竟不行除禮部尚書上屢以疾不詣重華宫袤先後奏請駕隨出時上已屬疾國事多舛袤積憂成疾請告不報疾篤乞致仕又不報遂卒年七十贈金紫光祿大夫袤少從喻樗汪應辰遊樗學於楊時時程頥高弟也方乾道淳熙間程氏學稍振忌之者目為道學將攻之袤在掖垣首言夫道學者堯舜所以帝禹湯武所以王周公孔孟所以設教近立此名詆訾士君子故臨財不苟得所謂亷介安貧守分所謂恬退擇言顧行所謂踐履行已有恥所謂名節皆目之為道學此名一立賢人君子欲自見於世一舉足入其中俱無得免此豈盛世所宜有孝宗曰道學豈不美之名正恐假託為姦使真偽相亂爾待付出戒敕之袤死數年托胄擅國於是禁錮道學賢士大夫皆受其禍識者以袤為知言嘗取孫綽遂初賦以自號光宗書扁賜之有遂初小藁六十卷內外制三十卷諡文簡孫焴禮部尚書逰張公洞吾聞荆溪南有地仙所宅十年勞夢想今日著腳歷扁舟下湖洑水漲沒沙磧結纜小橋旁杖藜從此適平岡靣陂陀疊嶂堆襞積行行兩三里夾道喬木植其木幾合抱其高乃千尺風生萬壑響日照四山赤時搖樹林杪忽見屋宇脊宫門何崢嶸古道頗修直長廟景曀曀崩殿人寂寂寥落昔賢題摩娑壁間墨捫蘿上層巔俯瞰得深窟危梯交枝撑鳥道穿詰屈投身乍寬間局步仍逼窄攀援愁顛躋傲睨驚險僻懸崕朵頦頷亂石拱劍戟白雲何時橫乳溢或自滴中空正澒洞了不見天隙𡨕行迷近逺傴僂猶擲埴巉巗豈人工隱軫入地脈窗幽或篝火俯跪僅容席仙壇尚故處丹竈儼遺迹山蟲鳴咿嚘野鼠聲嘖唶傳聞老父語以往真莫測中有白玉堂橫絶巨石塞傍連洞遞野欲去不可極潛窺目先旋縱走膝無力邅回步仄徑突兀出峭壁樅風高枝樛藤蔓青隂羃芳草何芊綿丹花亦狼籍躊躇古亭上俯仰幽澗碧叮噹下流水磊磈欲落石雖云培塿高氣與嵩華敵其南有空穴淡瀩殷幽黑隂風訝谷吐冷氣森噴逼蛟龍久伏藏金玉閟簡册靈蹤信茫昧幻怪紛慘戚將無神物守欲與世壤隔平生丘壑志早歲泉石癖豈不思三山所恨無六翮樂哉兹晨遊逸興潛有激仙翁在何許緑髮尚如昔髣佛笙簫聲徘徊鸞鶴翼俗緣磨不盡塵境坐形役何當築衡茆幽討窮日夕風雲西北起天地忽改色倉皇促歸斾造物豈戲劇良遊易乖忤真賞難再得寄與山中人重來儻相識梅不奈雪埋照可堪風漏香天寒無疹粟日暮有嚴粧桃李羞浮艷松筠共老蒼千山愁絶裏獨自占年芳冷艷天然白寒香分外清稍驚春色早又喚客愁生待索巡簷笑嫌聞出塞聲園林多少樹見爾眼偏明蠟梅破臘驚春意凌寒試曉粧應嫌脂粉白故染麴塵黃綴樹蜂懸室排筝雁著行團酥與凝蠟難學是生香雪睡覺不知雪但驚忩户明飛花厚一尺和月照三更草木淺深白丘塍髙下平飢民莫恣怨第一念邉兵别李德翁長恨古人少斯人今古人二難俱益友兩載覺情親世態深難測心期久益真相看俱半百此别倍酸辛送趙成都蜀道當謀帥維城孰愈公夷陵護江左斜谷顧關中北地紛豺虎南方簇蟻蜂守攻雖有異鎮撫不妨同不但元戎貴仍兼制使雄深沈天與度簡敬學成功人士薰陶內兵民教訓中祗應先郤榖寧復後文翁己亥元日玉厯均調歲啓端東風又逐斗杓還蕭條門巷經過少老病腰支拜起難白髮但能欺稿項青春不解駐朱顔餘齡有幾仍多幸占得山林一味間次韻德翁苦雨十年江國水如淫怕見三秋雨作霖可念農家妨卒歲須煩風伯蕩層隂禾頭昨夜憂生耳木德何時却守心兀坐書窗詩作祟寒蟲鳴咽伴愁吟次韻尹朋梅花江北江南天未春陽和先已到孤根斜枝冷落溪頭路瘦影扶踈竹外村水部未妨時遣興王妃誰復與招魂天寒好伴羅浮醉明月清風許重論梅花竹外籬邉一樹斜可憐芳意自萌芽也知春到先舒蕊入被寒欺不放花索笑幾回驚歲晚相思一夜繞天涯直須待得垂垂發踏月相携過酒家冷蕊踈枝半不禁眼看芳信日駸駸雪霜不管朝天靣風月能知匪石心望逺可無南北使客愁空費短長吟年年凖擬花排恨不道看花恨更深落梅清溪西畔小橋東落月紛紛水映紅五夜客愁花片裏一年春事角聲中歌殘玉樹人何在舞破山香一作香衫曲未終却憶孤山醉歸路馬蹄殘雪襯東風入春半月未有梅花枯樹扶踈水滿池攀翻未見玉團枝應羞無雪教誰伴未肯先春獨探枝幾度杖藜貪看早一年芳訊恨開遲留連東閣空愁絶只誤何郎作好詩德翁有詩再用前韻文章仙伯記仇池每想橫斜竹外枝未放柔柯攢玉雪稍看紅蒂染燕支别來望逺憑誰寄老去尋春只恐遲把酒問花花解語定應催促要新詩次韻渭叟蠟梅快㵼鵝黃若下春要將香色鬪清珍蠟丸暗拆東君信梔貌寧欺我輩人光價未輸何遜早新篇重見豫章新渾金璞玉爭多少要與江梅作近親甲午春前得雪寒聲昨夜響蕭蕭逗曉階庭亦已消殘蠟距春無幾日一年飛雪只今朝微陽欲動梅驚萼餘潤才沾麥放苖天意未能違物意漫留殘白占山腰飛英回旋逐風飄爽氣令人意欲消荏苒流年春送臘殷勤密雪暮連朝冬回庾嶺花無數煙暖藍田玉有苖一飽自今真可望更看南畝麥齊腰凍雲排陳擁山椒待伴還應不肯消皎月氷壺千頃夜冷煙茅屋幾家朝梅枝堆亞難尋萼萱草侵凌不辨苖殘甲敗鱗隨處是被誰敲破玉龍腰正月二十八日夜大雪一冬無雪潤田疇渴井泉源凍不流昨夜忽飛三尺雪今年須兆十分秋占時父老應先喜忍凍飢民莫漫愁晴色已回春氣候晚風搖緑看來年劉屯田墓壯節亭西澗當年卜考槃便于神武挂衣冠後生無復知前輩故老猶能説長官三尺荒墳埋玉冷百年壯節倚天寒表章賴有羣賢力誰把生芻奠一餐送趙子直帥蜀得須字射䇿當年首漠儒去登雲路只欺須飽聞治最誇閩部已有先聲到益都壯略定羌元自許宗英帥蜀舊來無前驅叱馭休辭逺看取東歸上政塗帝念西南在一隅簡求才德應時須羌夷種落誇威令秦隴關河聼指呼自古功名多少壯及今談笑定規摹玉山舊政人誰記應掃棠隂看晝圖海棠盛開兩株芳蕊傍池隂一笑嫣然抵萬金火齊照林光灼灼彤霞射水影沈沈曉粧無力胭脂重春醉方酣酒暈深定自格高難著句不應工部總無心玉簪花一名鷺鷥一種幽花迥出塵孤高耻逐艷陽辰瑶枝巧插青鸞扇玉蘂斜欹白鷺巾難與松筠爭歲晚也同葵藿趂時新西風昨夜驚庭緑滿院清香惱殺人送林景思三年無德及斯民獨喜從遊得此君囊乏一錢窮到骨胸蟠千古氣凌雲論交却恨相逄晚别袂真成不忍分後夜相思眇空闊尺書應許雁知聞送晦菴南歸二年摩手撫瘡痍恩與廬山五老齊合侍玉皇香案側却持華節大江西鼎新白鹿諸生學築就長虹萬丈提待哺飢民偏戀德老翁猶作小兒啼送提舉楊大監解組西歸征轅已動不容攀回首棠隂蔽芾間為郡不知歌舞樂憂民贏得鬢毛斑澄清未展須持節注想方深便賜環從此相思隔煙水夢魂飛不到螺山送吳待制帥襄陽方持紫槖侍西清忽領雄藩向著行誰謂風流貴公子甘為辛苦一書生詞源筆下三千牘武庫胸中十萬兵從此君王寬北顧山南東道得長城欲將盤錯試餘鋒故擁旗麾訖外庸南峴北津形勝地前羊後杜昔賢蹤不妨倒載同民樂自有輕裘折敵衝努力功名歸報國莫思山月與林鐘青山寺崢嶸樓閣插天開門外湖山翠作堆蕩漾煙波迷澤國空濛雲氣認蓬萊香銷龍象輝金碧雨過麒麟剝翠苔二十九年三到此一生知有幾回來聼鶯閣春催金谷曉一望百花齊不作遼西夢從渠著意啼和渭叟梅花不避風霜苦自甘丘壑潛未禁沾額角信好插梳尖春意已張本寒威今解嚴殷勤留客意尚許隔墻覘德翁有詩再用前韻立馬黃昏繞曲池幾回踏雪問南枝不應春到花猶未定恐寒侵力不支隴工已驚傳信晚樽前只想弄粧遲臨風不語空歸去獨立無憀自詠詩嘗記尋芳到習池攀條頻認去年枝曉穿曲徑千林去晚度危槗一木支不避春寒來得得只緣人望故遲遲無錢可辦羅浮醉報答春光只有詩遊閣皂山春山靈草百花香誰識仙家日月長滿院莓苔緑隂匝棋聲何處隔宫牆括署四咏君子堂堂堂文簡公一世夔與臯君子哉若人此言聖所褒遺愛在斯民誰能薦牲牢獨有坐嘯地清風仰彌高節愛堂誰憐窮山民粳籺不自贍紛紛死溝壑往往困征斂夫惟節與愛是謂仁且儉揭兹聖人言聊用自針砭凝思堂失腳隨塵網牒訴障吾懷公庭了官事時來坐幽齋天風肅冷冷山鳥鳴喈喈我思在何許獨對蒼然崕樂山堂草堂有遺基榛莾歲月久我來始經葺挹翠開户牖羣山供笑傲萬象皆奔走所以名樂山欲企仁者壽兩宋名賢小集卷二百二十三
