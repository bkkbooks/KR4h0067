body:
  text: 兩宋名賢小集卷九十五宋陳思編元陳世隆補龍雲小集劉弇字偉明江西安福人登元豐二年進士復中詞科歷官太學博士元符中有事南郊進大禮賦哲宗嘉之除祕書省正字徽宗改著作佐郎實録檢討官卒嘗讀書石廊洞中為辭剷剔瑕纇卓爾不凡有龍雲集三十卷送方絢解元赴試南宫用桂林一枝為韻君王十二間一一登權奇飽之青玉芻絡以黃金羈南宫舊冀北雜遝追風姿驌驦固神物豈病孫陽嗤如聞丹桂約暗滿秋風枝癸酉嵗暮夀春道中有城有城半蕪沒倔強當年開狡窟青韁白馬成底事魏得其狗空凌突清淮不洗叨利腸石白崔嵬化英物據鞍浩嘆為踟躊但見悲風起蓬勃有客有客垢髮鬚羮魁挂鞍無宿儲翹心北闕比寒藿他日南山拋舊廬逆旅丈人真脆意揖我下牀邀踞􅀈悠悠髙門擊鮮子萍匏殊根勿誚渠走筆答郭子隆勾稽春歸幾何時緑樹隂己滿蕭條子雲巷誰借吹噓暖常日雙柴扉深扃類休浣稚燕掠翩翾疏蟬弄淒斷擷芳聊自娛任從食息懶嶷嶷棲鸞郎蝸居間三款兒童憚逢迎應客事謾誕謝絶髙軒榮秪增鼯鼠短賴君不吾靳殷勤接誾侃酸然梅雨天煩襟斗湔浣送李侯朝散還任西山閲今昔章水弄清泚雲陴插天半滕閣中隱起青鴛千萬家湖光豁如洗鍾陵一都會信亦非偶爾君來無幾何所得己倍蓰笑談送白日慷慨拾遐軌成詩殆百篇天籟落凡耳事竣各還朝相送情難己悲歌一再行杯觴覆蒼翠秋標拔孤雲鴻雁思吾子石廊汨君不見仙家三十六洞天西南大半盤蒼巔此外元陽擅嶄絶況有石廊人喜傳碧蓮參差隅地涌徙倚危梯飛􅤔蝀陰陰洞户半空開一縷聨凹愁寄種萬鈞崔嵬挂礧石吁可怪兮若飛動天然湫面尋丈間寒掬初慳媪神捧紫崖蒙茸瑶草秀懸泉涓涓挹天酒淑靈豈即乾坤私窟宅宛是神仙舊飛鳥點影陽光回遊子履深驚殷雷九夏三冬自回幹雨暘寒燠爭喧豗神物奄有似無謂突兀古廟當巖隈鼪鼯笑舞助怪變落日愁絶松風哀瞰臨一方殆天意纍露之疑此其是仙乎仙乎胡不歸忍使秋磷泣陰鬼人日去年人日螺江邊今年人日在通川故家浩蕩五千里客子騷屑心茫然霜蘆盡解故時葉生意陡爾歸蘭荃海風如刀氷寒渡欲航野水雪暗天他鄉信美非吾土香草悅魂真浪傳南冠故聲秪噪楚劉章雅志惟歌田五秉如單費廩粟一囊就盡持飱錢顛毛冉冉不吾與齒根浮動輕于翾小雀誰言畏死鷂未肯屈折同杯棬章貢直西三徑在爾來望眼欲成穿科桑洗竹真吾事孰使齪齪才充員何時解得無拘束歸釣潭頭楓葉騙送邢清臣赴選泊舟梅林浦解纜墨潭灣層波日日生雙槳那得間龎眉青翰客相與春風還江梅吹欲盡岸柳未勝攀無以持贈君對君成強顔官況更新好晚步非間關直北清夢多半落夷門山殷勤尺素語勿謂魚鴻慳宿法藏禪院斜河左界懸朱提冷燼掠天螢糝飛髙梧泣液涼參差前村後村烏夜啼雕甍繡栱絶坤維知自在世張禪扉有睆釋子龎兩眉清梵一聲捎翠微亂我心曲天之涯寂歷故感迎新悲歸與誰是真忘機獨鹿水深愁濁泥憶黃天倪遊絲罥空生别愁我車欲駕羌無輈驚風吹花濺紅雨天腳空隨江水流思君度日倚髙閣時把長懷寄寥廓青春九十行過半白日西住看時落古人不願身後名但願生前一杯酌安得此身生羽翰髙騫便似追飛鶴村南村南行吟踏新場馬乘款段壺懸漿稼如濃雲穟含黃柿葉亞枝收趁霜臘團雞脾盤肴香簫鼓下神巫正狂呼兒往問當壚娘清美何如顧建康安成道中作故家楚尾鄰三湘粗有隙地麻與桑利機未判身輕嘗生涯寄將一葉上歸釣頳尾秋滄浪翠篠娟娟棲暗芳半隱半見誰門牆分曹兒戲嶷雁行今我垂垂老境逼竹馬鳩車憐汝狂夜歎丹鳥白鳥爭吞吐還雲去雲無定度不無夏簟工尉體況有秋螿競扶户一慨三嘆詎如許客思紛紛野煙縷霄明景宴挂斜河叢萱苒蒻團清露有美一人在西方白玉環珮珠兩璫明眸皓齒艷朝陽企豫望汝涕倣皇安得鵲汝羅衣裳畏日畏日慘慘天西隅半規銜山我僕痡招提訪尋數里近牛羊斷續前村孤揚塵動滿垢膩爪好風不借清涼軀目送長雲下崎礒鶩鳦愁對陂陰湖杉溪驛竹巖杉溪道路長道邊古驛開蒼茫分流溪水薄枉渚挨石人家環上方王程星火何時歇霜冬草樹藝其黃去來今昔幾男子姓氏喧傳兩女郎北禪水閣走筆西風涼客衣弭楫滄江潯晚吾事瀟灑聊復此登臨雲容不礙秋清樾有餘陰煩心洗東波寸目明遙岑樊籠脫鳥窟搖落弔蛩吟莽墟閲今昔長慨撫孤鐔故楚冠劒盡物情幾浮沈懷哉嵗將月無為空滯淫持語朱陵翁須以早抽簪感遇㛹娟誰家子粲粲生輝光弄姿俯春蘭臨風振微芳秋水揚清矑白玉雙明璫問渠家何許笑指南山陽去去不輟軌恍若遊雲翔遙看入縹眇明月斷人腸富貴若不常倐忽移易人青門聚瓜客曽是故侯身金鏡失秦家中原駴煙焚屠狗販繒子閭閻排氤氲一逢泗水公濯鱗清滄濵信知天地間虛槖鼓遊塵冥中有神力呼吸旋峨岷小兒善播弄挈故還趨新得失定有寄無為喪吾真疾雷疑車音出門乃知非抱影長自明流螢點霜幃羅帶翦秋水黃金縷春衣持看清夜闌愁非故時輝食葵心知傾茹蠟腸虛肥纂纂棗下歌惜此嵗月違因聲勸語儂勿復遲遲歸秋日儀真即事秋風來從越天末痛洗玻璃出明月雲陴隱起玉龍眠下有舂容萬濤雪獨繭之綸歌一葉半酣老漁棹歌發客心寸許了無多底事臨風吹欲折客從南來一何癯烏紗不屋非縵胡散堆亂帙覘牛䥶穿穴殫殘真蠧魚尋撞雖上亦未計立仗不鳴甘豆芻昔人舉肥我今爾安得外澤如瓠壺持釣艇子悠揚打雨來裊絲越箭青玫瑰昨聞湫古新雨足漲波泛入西溪隈西溪兩岸行人少白鷺對翹佳客陪低雲弄嬌不成去半與枉渚相縈回藻間頳尾厠銀鯽正爾作羣爭曝腮故應沈餌得所置行醉甕間新熟醅宿長山寺蒼山兩蟠虬傑勢分夭矯不緣事幽尋兹地終難到破暝紫煙生寫谷清樾好村長下牛羊雲綻入歸鳥松風卷孤磬夜半秋聲小客懷方未央千里漫白道庭樹一鳥驚愁看楚天曉遊麻姑觀用黃道士韻鳥道參差挂空白雲林曽是飛升迹漫論滄海復揚塵已識秋山老岑寂玉駕班龍飛九色古殿崔巍遺石刻會須揖彼丹丘人掇拾頺年兹偃息蔣沙莊居他日蓬蒿地吾廬瓦數溝井泉甘勝乳庭竹冷先秋村巷時情淡田疇嵗計優荆扉論日掩最喜近松楸黃嶺虹腰抱鼇山負復橫中非避世士稍亦畏時名傍晚澆慵酒尋春濯足行雞雛嬌底死犢子健能生晴屋鳴鳩婦春陂翳雉媒筋頭甘野䔩鉏力到陳荄掠水千艘健橫風一笛哀最憐雙白鳥解事等間來名愧周繁弱村非魯孟勞蛙仍當鼓吹徑任沒蓬蒿紫芋新厨味黃橙馥鱠刀業詩何水部耽酒阮兵曹劉宗墳墓國金水眇縈回颭颭鴉巢覆疏疏槿户開春風持贈柳臘雪試粧梅欲識塵埃少元無俗物來莆田雜詩清樾陂陀外春深四五家叢祠下簫鼓平楚暗桑麻水國潛蚪偃天程去鳥賖仙山仍在目瀟灑送生涯梅雨催農鏄癡風泣海檣魚龍波浪濶燕雀户庭涼鰩柱春刳玉蠔山夜鑿霜家園兩痕浪早晚促吾裝梅井經疏鑿如聞自昔人玉奩深貯月雲乳暖藏春桐葉誰新汲葵芽好問津端堪事杯酌冷汰客襟塵題鴂青春宴鼱鼩白社驕掠風雛燕翼界雨晚虹腰醥醁銀牀瀝芊茸紫澗苗到家幸無苦浦漵有回潮鶴唳歸雲急龍移過雨腥桂清飄月岫槎老臥煙汀洞失壺公舊雩傳妙應靈不緣幽事隔小復理篁箳道東無際海萬水自朝宗沃日才分爝浮天亦蕩胸吐吞何楚越冗長到魚龍好在乘桴客吾安議適從早發赴蒙縣草露垂垂白溪泥腳腳深槿籬藏吠犬桑翳漏棲禽食匕驚浮世鞭梢度寸陰利名無計得寧是死灰心試院次韻奉酬趙達夫記室惜春之什風酣雨軟裊簷絲端負吾人痛飲師使者嶺梅傳信逺王孫芳草怨歸遲釀成紫府無端夢開到朱欄第幾枝欲問東君挽流轉顛狂好在曲江詩清真觀步翠閣飛梯倒插玉螮蝀危欄别刻青芙渠送涼野水舊涵竹借色春山擬滴裾王喬過鳬可坐揖蕭史鳴鳯徒紛如眸子欲酸跂豫望弔世清淚橫方諸九曲池昔帝檣烏下日邊曽留清蹕此蹁躚魚龍窟暗浮春漲鳬雁行低破暝煙星閣摧頺空嵗月蕪城埋沒舊山川後庭一曲陳家破更看當年水調傳江館山川定出書意外魚鳥自間眠對時艇子粘天歸一葉濤頭吹雨落千麾截波尚欲論孤劒應客初慙乏大兒聽得漁郎隔溪語夜來秋色暗江蘺建州試院次韻和林源叔監試鷺袍粉白筆摩秋餘地爭看衆刃遊堅壁賴公専細柳得壺如我愧中流僕姑此日先穿札緑綺何心曉報鏐恰恰豐隆通蟄户論功相與副旁求春日送僉判陽承議春山野思萬千里那更江頭來送公别淚滴流紅杏雨離情搖曳緑楊風一枝易繞南飛鵲隻字難憑北塞鴻惟有感恩情不斷夜深長入夢魂中春日舟中即事倚閭幸有北堂親肯泛孤舟瘴海濵萬里江湖愁去客一春風雨厭行人花朝水國留題懶月夜鄉園入夢頻每被煙波驚破膽却思雲石自由身兩宋名賢小集卷九十五
