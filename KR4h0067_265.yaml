body:
  text: 兩宋名賢小集巻二百六十五宋陳思編元陳世隆補㢲齋小集危稹字逢吉舊名科臨川人淳熙十四年試春官知舉洪公邁稱其文踔厲雅健登乙科授南康軍敎授士經指授文體丕變後知湖州又知漳州為義塚𦵏喪之無主名者二千三百餘建龍江書院奏罷經總制無名錢五千緡與部使者忤請祠歸築屋城南嵩源與鄉老七人為真率㑹自號㢲齋又號驪塘卒年七十四真西山徳秀嘗舉自代至是銘其墓有㢲齋集諸經講義集解史編玉府藥山集皆行于世借詩話於應祥弟有不許㸃抹之約作詩戲之我有詩書癖每喜以筆􅀈抹黄飾句眼施朱表事𣲖此手定權衡衆理析畎澮歴歴燦可觀開卷如繪畫知君篤友于因從借詩話過手有約言不許一筆壞是語落我耳便覺意生拭明朝試靜觀議論頗澎湃讀到㑹意處時㫖欲犯將舉手復止火側禁搔疥技癢無所施閟懷時一噫只可捲還君如此讀不快千駟容可輕君抱亦少隘昨問雞林人尚有此編賣典衣須一收吾炙當痛嘬上隆興趙帥買宅須買千萬隣李雎喜得王僧珎買山百萬復誰與㐮陽節度真主人吾生兀兀鑚蠧簡不肯低頭植資產綴名虎榜二十年依舊酸寒廣文飯緑鬢半作皇皇華豈堪風雨猶無家大鵬小鷃各自適只有鴻雁長汀沙弟昆圑欒雖足樂老屋蕭條不堪著玉堂便是無骨相也合専儂一丘壑近來卜築窮㝠搜十里而近依松楸驪龍塘上鄧家丘半山老人所釣遊半山天下文章伯鄧家聳名亦輝赫斷碑猶在古墻陰好句曽經寫山色買隣得此天所予獨欠山資無覔處平生罵錢作阿堵倉卒呼渠寧肯顧君侯地位髙入雲筆所到處皆成春萬間廣厦兹許逺豈無一室棲貧身王鄧故處為隣曲更得趙侯錢買屋便哦詩句謝山神飲水也勝樽酒緑鶴楚楚雪衣明烟霞徑裡行不官陶令野有節伯夷清一見消塵慮相親長道情秋風著梧葉時作九臯聲王架閣夙有棊癖嘗扵和篇中譏其不工架閣頗諱惡其說復次韻戲之劉伶耽於酒淵明玩於菊君乃癖於文愛棋猶更篤文髙新掌故棊只肯祕讀我昨却莱兵書法謹夾谷不知君諱之䕶名如䕶玉恥鼓趙王瑟欲舉漸離筑明發疾呼予開枰數反覆盛氣欲呑敵厲響亦驚俗失利頳凑頰得隽喜填腹勢固健於常年終弱於僕君名髙天下此時一不足小負毋重爭旁觀有靜矚大明昧於小月固不勝燭切勿罪劉五此筆競所録時涂任伯亦頗短架閣之棊而和篇言不工者實予也架閣乃歸罪於任伯挽同年胡司門期築盟惟舊交承契更深雨聲春共酌燈影夜同吟接武方堯殿招魂遽楚音尤憐哭君日來納惜時金藕花中未開之荷穿葉而出風清晏瑤池正擁萬姬醉忽有青山人穿伏獻封事春日有感三首封彌院中作春入長安百萬家湖邊無日不香車一株栁色吾無分㸔殺庭前薺菜花看書數頁眼花旋推過薫爐去打眠五十壓頭衰白盡書無靈聖事茫然情知老却流鶯了爭奈狂如蛺蝶何尚有紫微紅葉在佳人休唱怨春歌上雷漕破裘芒履晚山前手挽烏桐白玉弦聞道知音在髙處一聲彈入紫微天徑從豐城謁于房州于令侍姬歌舞進酒二首蛾睂對歌舞涼伊舞聲還逐歌聲齊捲花萬段忽進酒鬬髙蝴蝶飛來低更有佳人在空谷能唱春風天上曲何時得上金玉堂一聲飛度龍吟竹送劉帥歸蜀後溪先生也萬水朝東弱水西先生歸去老蛾睂人間那得樓千尺望得峨睂山見時贈書肆陳解元㢲齋幸自少人知飯飽官閒睡轉宜剛被旁人去饒舌刺筒花下客求詩兀坐書林自切磋閱人應似閱書多未知買得君書去不負君書人幾何題吳淑妃真子海靜江澄玉雪腮何年何月下瑤臺卷中不敢端詳㸔曽得君王一笑來春日即事麥風翻隴潑濃緑花露滴枝粘老紅小立樓頭檢春事一絲暖日墜青蟲聞鶯天上金衣侣還能貺草萊風流晉王謝言語漢鄒枚公等久安在今從何處來山禽正嘈襍慰我日徘徊送孫行之出守衡陽日日江頭送客行况聞君去作専城心存臣子無中外身繫朝廷有重輕諌疏滿懷催上道中原萬事想闗情叢葵到底還傾日側耳衡陽來雁聲挽月湖二首天何奪我老先生軒冕叢中王雪清英石數拳歸艇重月湖千頃世縁輕雲山買得無餘俸句法流將不盡名頭白賈生非不遇所言向已略施行詔書屢趣入承明黄閣前頭不肯登若欲歸休同野老本來清淨是禪僧苔生文塔今成古影挂山房喚不譍猶想經行泉石處亭嵓憔悴一枯藤送眺告逺得南康我是康廬舊冷官夢魂今尚憶雲端山將草色到天碧泉帶松聲出谷寒仙觀幾年留鶴隠古潭有日起龍蟠使君肯著詩料理乞我蠻箋半幅看上趙總領趙猶記向來未改之名一見煩公道眼明懸知徹底五湖清豈期天上張公子猶記當年劉更生幾度夜深流水操無心人認斷腸聲平生不面却相識黄鶴樓前今一鳴牽牛花青青柔蔓遶修篁刷翠成花著處芳應是折從河鼓手天孫斜挿鬢雲香接客篇接客接客髙亦接低亦接大兒穩善㑹傳茶小兒踉蹡能作揖家人不用剪髻雲我典唐書充饌設唐書典了猶可贖賔客不來門户俗郭公篇郭公郭公聞爾失國春秋時何事到此猶悲嗁郭公前言亡國故當時只縁臣子誤百年社稷不得歸而今家住柘崗西滿目春風都是恨聲聲說與齊侯知郭亡矣君勉之婦歎記得蕭郎登第時謂言即日鳳凰池而今老等閒官職日欠人錢夜欠詩兩宋名賢小集卷二百六十五
