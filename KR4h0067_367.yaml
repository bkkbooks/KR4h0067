body:
  text: 兩宋名賢小集卷三百六十七宋陳思編元陳世隆補雪磯叢藁二題楊誠齋行湘詩卷仙雲寒鎖碧瑶天突兀吟壇北斗邊試問鳯凰誰得髓竹林聽雪對牀眠叫雲吹玉舜祠邉醉嚼瓊糜潄石泉舊讀離騷今忘却快披秋卷嗅蘭荃題許介之譽文堂端平丙申桂林伯尚書鍾公以遺逸薦東溪先生許侯于朝越明年得旨補初品官衛州户掾其誥詞於始則有夙有譽處且嫻文辭之褒于終則有其以行義教于鄉里之勉州里人士莫不榮之又明年許侯乃于東溪之濵創堂五間以為講道著書之地仍摘天語譽文二字以張其名敬上賜也堂成山齊先生為之記者詳矣當世之名卿大夫又為之賦詠者衆矣願余侯三字非衍疑誤晚生小子何足言詩辱徴俚作不敢固以陋辭敬書二首以記盛事併敘聖天子始終褒勉之意庶得附姓名于不朽云曽佐元戎洗緑林此翁何止擅詩聲久辭驃騎尋瓢飲誰引鳴騶聒耦耕厚禮正羅溫處士浮名還汙阮先生衡茅那識絲綸美尚擬升堂結社盟薑夔劉過竟何依空向江湖老布衣造化忌名從古有詩人得位似君稀聖朝自要求參术吾道何應賤蕨薇晚節黃花須愛護且教湘士挹芳菲濓溪書院弔曽景建太極樓頭霽月寒斷絃緑綺不堪彈窗前自長濓溪草澤畔還枯正則蘭蒼野騷魂惟我弔烏臺詩案倩誰刋傷心空有金陵集留與江湖灑淚看許介之以丞相周益公所書古樂府四篇見寄敬題其後紙上珊瑚間木難曽敲黃閣卸征鞍賞音今有王園否得句堪尋岣嶁刋鸚鵡夜栖金屋冷的盧秋戰玉關寒春風歸雁那知已寄與深宫絶塞看讀繫年録紹興八年以後事婁敬金繒滿去輈便看雷雨潤遐陬諸賢自抗排雲議宰相方深偃月謀湘國乍聞悲鵩鳥秣陵還聽唱符鳩九原晏老今知否搔首青編恨未休櫟􅺯吳大帝廟赤壁濡須事已虛且依櫟􅺯酹芳壺九原尚擬吞銅雀千載今惟記赤烏湘浦有人修舊祀荆州無地展雄圖定知斫案英靈在間對祠前洗湛盧昭陵渡馬伏波廟功名要結後人知馬革何妨死裹尸漢帝可能疑薏苡湘民却解薦江蘺紙錢撩亂王分胙粉壁斕斑客寫詩墮水跕鳶無處問灘頭斜照晒鸕鷀訪蕭太山父子仙桂靈椿各典型飄飄姿韻激天鯨家傳八葉鹽梅種詩接三蘇父子名四海盡將看縣譜一堂那與許文盟塵埃不敢相親炙且汲渝溪濯客纓謁張兵部時守臨江新除湖南倉東皇太乙待新詩共喜新槎泝楚涯父老盡將看鸑鷟使臣應不問狐狸江頭芳杜催行色境內甘棠有去思細讀詔書搔短鬢瓣香那識帝王師蘇瑩中先往新淦過新渝訪之不遇賦詩為寄玉笥山前水拍空知君何處繫吟篷敢輕竒士題凡鳥漫有憂心咏草蟲沅芷澧蘭猶可寄江雲浦樹苦難同門前景物皆詩卷獨倚篔簹嘯晚風胡料院出示車攻圖仍索俚作九壤卧龍呼不起乳臭談兵空滿耳書生未識玉帳經且抱此圖究終始姬家出車咏嬴家小戎詩衛家武剛扞突騎馬家偏廂是羌夷只今車陳無人識天狗橫空灑腥血邊人以鞍馬為家誰馭奔衝展竒䇿豫章先生今孔明胸中森羅萬甲兵天衡地軸妙絶識內陳外陳何縱橫千枝緑沉列虓虎萬臂黃間張白羽人言險野難用車公獨規模掩前古車攻圖車攻説八采眉前曽進徹世人苦謗陳濤斜却向齊門鼓空瑟今朝朱川冨川頭絶江川北瞻神州李綱正要講車戰南渡勛業應可收涇水黃鐵山碎雙輪快碾幽燕地朗誦先生復古篇他時此筆猶難記壺中天歌贈侯明文蓋頭即可居容膝即可安連雲大厦千萬間何如壺中宇宙寬壺中何所有筆牀茶竈葫蘆酒壺中何所為目飛送鴻揮園絲忩前祝融老僧竹壁上九疑狂客詩壺中主人知為誰啖棗仙伯雪鶴姿左攬元微袂笑移砥柱㺯河水右拍長房肩飽餐麟脯傾玉泉蓬萊山在何處勸君且占壺中住不曽上列金馬門也應不識崖州路探禹穴浮沅湘腳下塵土鬢上霜我到壺中如故鄉道中逢老儒由蜀出丙穴魚應好曽經問釣磯干戈今未定城郭是耶非詩社尊黃髮侯門薄布衣乾坤豺虎滿見爾一欷歔時事時事如頺屋誰堪任棟梁國貧僧牒賤邉病檄書忙有分憂宗社無方出舉場未應王謝輩揮淚送斜陽逃户租帖名猶在何人納稅錢燒侵無主墓地占沒官田邊國干戈滿蠻州瘴癘偏不知擕老稚何處就豐年登江華寒亭到此腳跟酸千峰逈不看年深碑字淺日薄樹隂寒石罅巢蜂乳籬根墮鳥殘愛吟還畏冷不敢倚闌干訪表叔李竹齋門庭接豆根吟避市塵喧每愛詩無敵應知學有源雲山供俎豆筆硯長兒孫愧我相過數秋風酒一樽擬長沙訪姚雪篷至永而返賦寄今傍南軒住應知理趣精通書多似易論語不言誠擬欲聽微論猶能慰别情江湖風浪隔腸斷楚鴻聲送蕭太山赴新興令翡翠芙蓉去路荒許渾詩裏認封疆昔聞古佛傳宗印今得吟仙綰縣章魚婢蟹奴供俎豆馬人龍户雜耕桑淡翁應解知心事試汲寒泉薦瓣香訪菊花山人沈莊可網盡珊瑚採盡珠只餐秋菊養詩臞永嘉同社聲名在乾道遺民行輩孤我恨朱門無食客君言青史有窮儒飢寒正用昌吾道且對鈐岡共撚鬚懷二蕭未曽相見已相知楚粵江山棣萼詩每恨乾坤催我老却于湖海識君遲機雲才藻今無幾管鮑襟期話向誰靡靡亂山嘶瘦馬碧雲日暮正相思踈拙越冠齊瑟事皆非踈拙唯甘與世違客路鶯花愁裏看故人煙雨夢中歸采薇有備淮南靜移粟無謀浙右飢納納乾坤須俊傑湘翁只合製荷衣陳東甫酒間舉作歸心只有杜鵑知之句猶未成篇因為續之歸心只有杜鵑知且倚裴亭共撚髭客路秋風吹杜若故園春雨老辛夷家貧未辦間居賦世濁空吟感寓詩邂逅江湖還别去岸花檣燕兩堪悲贈别陳東甫呈鍾尚書洞庭濯足共題詩今聽驪駒話别離泣玉可能悲卞子買金只合鑄鍾期荷盤剪綵須栖鷺缺項分絲補接㒿斗酒彘肩聊自壯古來騷客例寒飢登潭州懷雪篷姚使君賈井裴亭遍短笻紅塵歸騎又匆匆我尋桂樹吟招隱君對蓮花誦易通今日江山勞别夢他年燈火課新功濓溪最念初平老恨聽聨牀話未終下攝市吟到湘潭一葉黃賈胡蹤迹正悲涼抱琴沽酒異鄉客打鼓發船何郡郎楚女越商相雜沓淮鹽浙堵自低昂塵埃市井無人識濯足江頭望八荒無題犬袖裦衣走浙淮何人不識鶴山來只今心印誰傳得自摺通書撥篆灰撫州偶題金柅亭邊栁拂城春風繫馬酒家吟塵埃滿面無人識却得黃鸝作賞音萍鄉病渴犬子無從典驌驦荒村忍渴望瀟湘楚王萍實甜如蜜不許詩人取次嘗甲午社日客桂林巵酒豚蹄客裏歡石尤風緊枲衣單東陽病骨如鸚鵡最怯南州社日寒桂林歲晚憶鍾尚書塵滿湘翁薜荔衣江湖嵗晚鬢成絲桂州楊五今何處雪片梅花枉費詩雲峰寺擬尋岣嶁看蟠螭且解青鞋濯禹溪弔古猶疑九枝柏談禪且問一莖虀虎低崖樹供僧㸑猿摸廊碑認客題應接溪山無好句滿林空羡亂蟬嘶兩宋名賢小集卷三百六十七
