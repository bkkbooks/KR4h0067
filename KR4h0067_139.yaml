body:
  text: 兩宋名賢小集巻一百三十九宋陳思編元陳世隆補梁溪集下次韻和歸去來集字以後自沙陽放還作予初抵沙陽嘗和陶淵明歸去來辭然竊意歸期未可以嵗月計也近聞例許牽復真得歸矣偶讀玉局翁歸去來集字因次其韻簡諸弟七首少負丘壑志誤嬰軒冕榮剛腸難隱忍懶性倦将迎學佛欣自得謫官知物輕悠悠勢利子千古見交情壮志已衰落頹然成懦夫編須休虎穴曳尾且龜塗松菊猶可理田園将欲蕪親朋恱情話濁酒任傾壺軒冕豈足戀田園誠可歡村村自花栁物物寄遊觀舊事不可憶吾生良易安南忩審容膝歸去學鯢桓曠蕩推新澤迀疎念昔非休為賈生賦且治老萊衣報國撫長劍懷親歌式微慿高望吳越千里白雲飛寤寐在親所得歸欣載奔綵衣猶在笥素髪已垂門遣興詩千首忘憂酒一樽歸與理三徑松菊故應存舊隠北山北結廬猶可㝷曽傳種松法當遂採芝心有酒且觴客無弦何用琴一生幾兩屐慎勿廢登臨處世若大夢吾生感行休何須縛軒冕且復傲林丘雲木千巖秀烟波萬里流忘機齊物我魚鳥與君遊奉酬陳之元教授見贈次韻謫官因得窮林泉陶冩聊復資詩篇青岑叠叠山滿眼碧波湛湛溪涵天南連海嶠饒霧雨北望吳越凄風烟感懐觸目還得句但可娛戲那敢傳譬猶候蟲與時鳥自鳴自已真偶然豈知飄落廣文耳飾以妙語煩雕鐫與公平生未相識一見傾心誰與易沙陽百里阻逰從注目寒空暮雲碧朅來邂逅慰所思况得新詩飛霹靂我今歸去隠梁溪逺跡江湖養愚直看公白日上青霄九萬扶揺不勞力題黃亭驛雲山一帶碧崔嵬迎我南遷又北迴嵗籥才周兩經歴此行端爲武夷來武夷行宣和改元之夏予備員左史寓直東省晝寢夢遊武夷山未幾謫官閩中取道山下果符所夢因作賦一篇古律詩近五十首今冬䝉恩北歸復尋舊遊泛逰仙谿登換骨巖致祀十三真君㑹食觀妙堂因盡録前所作遺觀妙法師且别賦一篇以述再遊之意目之曰武夷行憶昨退朝門下省槐隂扶疎清晝永瑣牕一枕夢仙山覺來毛骨猶清冷謫官道出武夷山風景翛然似夢間碧溪九曲山萬疉况值密雲糚烟鬟寛恩今日容歸去笑指洞天㝷舊路霜晴日暖白雲深遥望幔亭天一柱羽人導我遊仙溪翠壁蒼崖晚更竒浩歌快飲縱迴櫂星月耿耿風凄凄曉來换骨巖中看玉潤金堅餘片片三姝駢立映彤霞二水交流縈素練征鞍欲去更從容仙境靈蹤豈易逢他日追思不可到夢魂還過七閩中自分水嶺過江南行盡關山萬屈盤江南形勢陡然寛山平水逺望不盡木落草枯霜始寒醉裏謳吟聊自適夢中往復本非難誰言春信年年早笑指江梅試折看望龜峰饒陽景物猶武夷巖石崛起多瓌竒此峰厥状更詭異舉首曳尾如靈龜穹窿曝甲正霜曉蹣蹶引氣當晴暉故知造化巧凝結欲問所以良難推我疑龍伯釣溟渤六鼇連引背負歸中途遺一尚贔屭直欲赴海冠峩嵬又疑清江使河伯波濤相失留於斯化為巨石峙千古雖欲鑚灼無由施茫茫神怪不可詰但使風景増清輝我來閩嶺厭山水見此還復伸雙眉頗嗟行役不果到側身西望生長思江行七首池陽至銅陵理櫂適江干初欣眼界寛日蒸江氣白風約櫓聲寒蒋詡謀新徑鍾儀只舊冠浮雲休蔽日直北是長安春江徹底清沙尾見潮生朝氣嘘成霧南風戰作晴㟁移看樹逺船穩信波平覧盡江山勝還悲萬古情渺渺春江穩融融午睡腴夢回雙艫急望極片帆孤皺水風還逆維舟日欲晡雲間有行雁冉冉下平蕪春光揺畫鷁江影浸長天浪勢隨潮急渦痕逐艫圓避風依島嶼防冦問人烟深念還愁絶高歌且醉眠朝來問風俗五兩向南飛旅泊愁春恨舟行與願違缻梅空的的岸栁已依依寂寞江南路那知自此歸春江望不極慘淡起層隂烟雨濛濛濕雲濤渺渺深懷家千里意報國一生心嘆息知音少空為梁父吟杳杳楚天濶悠悠江浦清便風帆腹滿順水艪腰輕烟淡山逾碧雲高雨易晴無心問漁父濁酒慰平生銅陵阻風春色到江渚梅花正㫁魂風波留逺櫂烟雨濕寒村雁過傳遺響潮來沒舊痕凄凉一尊酒愁絶與誰論題䕶法寺瑛老黙堂維摩丈室何年設滿目江山自風月道中試露黙中機千偈瀾翻本無説自銅陵行四十里風復作泊江北岸地名散潭屬淮南鏡中漸覺鬢絲多半世勞生可奈何極望不來青足鳥滿江更起白頭波揚帆賈客風前笛撒網漁人月下歌自㫁此生甘寂寞毗耶歸作老維摩夜坐二首春夜沉沉燈影明巻書兀坐忽三更不知船外風多少但聴滿江風浪聲波濤漠漠雨紛紛夜泊江南烟水村慨念平生都不寢可憐心事向誰論次韻和淵明形影神三首形贈影大塊己載我何如未生時氣變芒芴間七竅誰鑿之百骸與九藏假合以成茲與子非故交從我如相期屈伸及動止契合初不思常恐隨物化念此情凄洏我生夢幻中變㓕不復疑安得永相保聴我悲來詞影答紆餘非我妍濩落非我拙與子兩相依生來無間絶俯仰隨願指豈是事容悦因光長周旋處隂暫睽别况復同物化子壞我亦㓕㝠㝠長夜臺念之五情熱願子衛生經無使精腦竭千載永相從彭殤孰優劣神釋人生若大夢積微以成著少壮得老死一念即非故二子異金石松蘿暫依附胡爲羡乆生切切兒女語有形㑹當㓕是影無實處惟我謝客塵妙湛乃常住不入造化機豈堕隂陽數迴光試返照凡聖悉皆具不减亦不増誰毁復誰譽超然外死生卓爾無来去周行萬物表獨立初不懼二子非吾徒安用多憂慮雙鳬雲濤萬頃連天雨波上雙鳬自容與風高江濶烟水寒日暮相将何處去次韻茂載海陵寓居有感三首羣盗休慿險天弧正指狼沙蟲徒跋扈貔虎極精强寓目江山異傷心花草香浙河那得此回首一徬徨江城漂泊久幽徑緑寒莎歎息青春暮悲傷白髪多蒼生端若此狂寇竟如何更起乘槎興滄洲萬里波不謂繁華地還飛戰鬬塵澆愁空泥酒極目更傷春懷古繙書帙論情托友人誰深醫國術吾欲問甘辛贈虞公明察院寓居海陵初欲問道每見輒為碁戰所困此殆曹參陽城醉客以醇酎意臨行作此詩庶㡬發藥嶤岧古城隅下為鳯凰池鳯去不復返池水空漣漪傍有幽人廬松竹森四圍結搆極爽塏借問居者誰先生聞道乆昨自海上歸食棗大如𤓰定曽見安期不知修何術能奪造化機金鼎燦含葩玉池灔生肥顛倒出龍虎騰降分坎離行年五十餘氣貌如嬰兒餘暇分圖史不廢酒與詩高堂㑹賔友落筆風雨馳戲事聊復爾一笑初何為懸知廣成子千嵗形不衰顧我抱迂拙與世真相違徒欲睎驥騄曽未窺籓籬寓居邇函丈數造董公帷願聞衆妙門成此一段竒胡為乆閉拒客至輒圍碁歸隠志已定後會知何時銘心逝相學發藥幸教之他年倘有得同駕雲中螭自海陵泛江歸梁谿作清江湛湛波不興澄江際天如鏡平火雲突兀聳峰岫倒影萬丈揺空明扁舟歸逐落潮急䀨耳但聞雙艪聲乃知長江無六月水氣自與風兼清去年狂寇起歙睦江浙慘淡妖氛凝百年涵養極繁盛一日蕩析屯臊腥衣冠北渡旅淮甸扶老攜幼分縱横王師出討盛貔虎兇渠授首封鯢鯨迨兹浙右稍安定鼓柂復作東南征家山在望已可喜僮僕候我應歡迎平疇戢戢稻秧緑峻嶺靄靄松竹青田園有趣良足樂軒冕無味非所榮蒼生倘有安堵望笑傲可自終餘齡只今餘孽尚充斥弩力廟算宜哀矜裹包兵革不復用坐使四海還康寕次韻上元宰胡俊明蒋山勤老唱和古風竺教流傳入中土以相求之無自可達磨西來直指心擬議之間已蹉過皮髓誰分深淺機祖禰翻貽子孫禍鍾山禪老真可人高唱宗風震江左學流雲集欲何為佛祖要須自心作宰官倥偬牒訟間偷暇相從還作麽也知襟抱素相親更把篇章迭酬和詞嚴義密讀難曉字順文從識皆妥應憐孤陋方杜門亦欲追隨良未果故将佳句寄幽人此意勤渠滋愧荷談空摩詰無一言聴法文殊非兩箇若将情解議真如明眼人前應看破世間萬法互低昂正若旋輪與推磨隨時俯仰乃善謀就中拙者無過我九折羊腸欲著鞭萬里滄溟思縱柁只今行年四十餘已覺衰頽多坐卧平生作具何所施盡已付之一弄火迴光返照黙自參妙湛本然無㸃涴公方齒壮志氣豪正可立功同魏顆胡為亦復味禪那坐視軒裳如縶鏁蓮社荘嚴清净池丈室含容高廣座他時共結香火縁心期耿耿當非頗為余稽首問勤師如師材德誠磊砢釣龍羅鳳大江濵法器誰為語無堕庭前倘有立雪人我欲因風致三賀得吳元中書言近不作詩以所著豳七月詩義見示因成一篇贈之儒生樂事信同風端把前言當鼔鐘公正說詩箋七月我方學易緯羣龍艱難盛業原衣食憂患餘生問吉凶去聖寥寥千載後何時揮麈得從容題伯時明皇蜀道圖君不見開元天寳同一主治亂相翻如手舉掔盈欲惡雖一人變易安危原近輔姚宋已死九齡黜誰使楊釗繼林甫宫中太真專寵私塞外畨酋成跋扈禍胎養就不自知漫向清華遺匕筯漁陽突起破潼關百二山河震金鼓翠華杳杳幸西南赤縣紛紛集冦虜傷心坡下失紅顔堕淚鈴中聞夜雨山青江碧蜀道難棧閣連空㒟相拄旌旂慘淡雲物愁林木隂森猨鳥侶戎装宫女亦善騎皓齒明眸猶笑語老髯奚官驅蹇驢負槖齎糧豈供御九重徼衞復誰勤萬里艱危真自取至尊狼狽尚如此歎息蒼生困豺虎千秋萬嵗不勝悲玉輦金輿盡黃土空令畫手思入神一寫丹青戒今古題邵平種𤓰圖君不見伯成子高讓侯爵在野終年自耕穫下風趨問禮徒勤俋俋田間事無落又不見於陵仲子推相位爲人灌園刈葵藿抱甕區區同漢隂不糝藜羮有餘樂古來賢達有如此志趣未可常情度力辭富貴居賤貧凛若霜風隕輕蘀召平本是侯東陵秦破國除丘一壑當時漢祖疑鄼侯置衛増封意非薄衆賔皆賀平獨弔一言轉禍推先覺以兹智畧佐風雲復取故封何所怍歸來種𤓰青門外灌溉鋤耘甘寂寞長安之東壤尤美翠蔓離離照城郭秋陽正曝爪正肥解衣摘實如俛鶴兒童玉立形骨清挈笠攜筐助操作遂令世美東陵𤓰身後高名動寥廓屠販曽聞封絳灌奴僕後來興衛霍高鳥已盡良弓蔵更有韓彭辱囚縛何如終老守𤓰畦自飽飽他真不惡龍眠也是可憐人畫此端令事如昨世間如畫畫如夢聊為作歌資一噱唐植甫左司許出示所藏紅絲硯輒成短歌奉呈并簡顧子美羲和整御升暘谷赤雲夹日如飛鶩晶光下射東方山石卵含丹孕巖腹誰令巧匠鑿山骨截此頳堅一肪玉琢為巨硯形製竒中有彤雲爛盈目端溪美璞色馬肝黟歙珍胚紋霧縠豈有至寳出嵎夷散綺浮花彩尤縟鳳咮空聞名字佳龍尾苦笑規模俗漫誇眉子鬬嬋娟休認明眸類鸜鵒顧盼幸䝉君子知拂拭自逺塵埃辱火輪炫熀赤烏流墨海奫淪𤣥兎浴千金象管雕鏤精百煉松煤龍麝馥怒猊渴驥縱奔拏春蚓秋蛇相綰束楮生便覺肌理妍毛穎何嘗免冠秃公家三世擅直聲此硯提攜資簡牘力侔天地掌中迴膽落奸䛕筆端戮固宜祕玩不輕示神物䕶持無輒黷忩明几净齋閣深日暖風清靄松竹試將墨妙冩新詩落筆烟雲嘆神速矧公早年曽餌丹龜鶴精神鬢毛緑久卧商山茹紫芝行度天門騎白鹿猗蘭玉樹富堦庭黄巻青緗䞉編軸願言十襲遺雲仍大筆高文永相續次韻子美提舉許雪中見過之作殘臘苦寒情味惡萬里風雲欣雪作夜積端愁坤軸傾曉望却驚天界廓玉龍鱗甲卧羣山氷海波瀾凝巨壑謝家兒女自多才笑詠飛花度羅幙金爐未覺獸炭温錦帳猶訝貂裘薄書生飢甚况復寒坐聴朱弦折臨嶽松孤竹老念山林甲冷戈寒憫沙漠豈思龍尾賀千官且叠琴心舞雙鶴瑶林玉樹粲迴環勿謂軒庭全冷落擁門但作袁安卧命駕誰思子猷樂溪山如畫真自知金玉滿堂端不博煩公攜具款我門注目遥空登晚閣凍吟猶作號寒聲此病欲醫那有藥公家故自富香醪我亦安能辭巨杓醉看萬事雪銷凝妙觀圓成不須學寄毛達可内翰并録送魏公别録迂愚聊復隠清時幽事相闗只自知滿地落花看鶴舞一軒春雨對僧碁閒中日月真銷得物外烟霞漸可期坐致時康頼公等不須深遯採商芝同似表叔易置酒平山堂暫停征櫂此從容嘆息前賢結構雄心眼乍隨天宇濶笑談不覺酒尊空江光隱見軒楹裏山色虚無烟雨中種栁仙翁何處去年年疎翠自春風兩宋名賢小集巻一百三十九
