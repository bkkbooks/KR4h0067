body:
  text: 兩宋名賢小集巻二百二十五宋陳思編元陳世隆補滄浪詩集嚴羽字丹丘一字儀卿邵武人粹温中有竒氣甞問學於包克堂自風騷而下講究精到石屏戴復古深所推敬自號滄浪逋客有滄浪集二巻行于世行子吟行子在江梅飄飄靡常蹤有如芒碭野朔風捲飛蓬朔風無休期飛蓬日千里㪚落天地間寧有復歸理塞雁西北來一呌三徘徊何時别沙漠昨夜宿陽臺同羣一相失羽翮常低摧人物有殊性奈何罹此哀憶昔客逰初結交重豪邁高冠湛盧劒志若輕四海白首悔前圖蹉跎天一隅寒冬劍門道失路空踟蹰深林聚豹虎絶壁號鼪鼯雪深車軸折征馬驚啼呼何當返故處飱黍居田廬淚下不能禁腸轉如轆轤我友逺言邁朔風巻秋樹白日寒無光是時鴻鴈來四野何蒼茫我友逺言邁使我結中腸如何攜手歡一旦成異鄉行旅有期程逰子多悲傷置酒欲高歌淚來沾我裳四座惨相顧征馬亦徬徨未知㑹靣日且復盡兹觴悠悠我行邁悠悠我行邁邈在天一方道路無終極時節異炎涼路逢故里親揮泣問我鄉妻子别離久不知今存亡中原多白骨城邑聚豹狼逺去無僮僕思還絶餱糧寄語家中人逺行良可傷朝日臨高臺朝日臨高臺睠彼芳樹間上有共棲鳥和鳴何闗闗爾乃慕儔侣我何獨不然良友在萬里邈然河與山聚會豈不思歳月倐已殚未必無他人要非心所歡仙逰憶讀玲瓏篇來往虚皇閣空見白芙蓉秋風幾凋落昨逢紫陽君共有丹臺約下視塵埃中冠纓縛猨玃世事行若此悠悠復何託朝别簡寂觀夜行石鏡溪溪光照厓緑月色正相冝石上三道士頎然好丰姿或弄金光草或把珊瑚枝憑風招素手賜我一玉巵歎我事逺逰蕭颯朱顔哀長林孤月落羽蓋何葳蕤垂垂果之去棄我忽若遺明發闃無覩但有青鼯啼瀑布似明月上有石梁横矯首望東海正見蟾蜍生揚輝天漢間下照蓬丘城桂實幾凋落姮娥空聞名咄哉玉斧子不如白兎精靈藥不服食執柯獨何成迢迢彩雲外誰吹白玉笙竦身一長聼予若出寰瀛登豫章城憂來不自得登城望高天寒雲四靣起朔風下長川脫劍且却坐君知心惘然奈何平生志鬰抑江朔間凛凛秋風來茫茫落日晚長憂生白髪沈想忘朝飯向來經濟士本是碌碌人蕭曹刀筆吏樊灌屠販臣徒歩取勲業漢道為光新我今何為者飄飄去鄉國狂歌豫章城醉卧風江碧但取英䧺笑終慙倜儻生名當以德載事恥因人成獨酌還獨酌哀歌還寂寞安得凌風翰為君彿寥邈逰臨江慧力寺舟中望古刹川上移琴樽隱隱林閣見迢迢鐘梵聞列岫不離席驚濤常在門風忛與沙鳥汎汎隨朝昏天高一幡挂室靜衆香焚煙起多近郭鴉歸無逺村松際尚㣲雪經年來暮猨賞惟靜者契法對高僧論安得息塵駕永懐瞻獨園明朝别此去惆悵滿松雲山居即事稍欣入林深已覺煩慮屏霜果垂秋原歸禽度嵐領紛紛葉易積漠漠雲欲盛澗底寂無人松蘿窅然暝惟聞山鳥啼月上柴門靜終歳寡持醪延歡聊煮茗羣書北窓下帙亂誰能整廬陵客館雨霽登樓言懐寄友終日坐汾淟邈然無少欣登樓一周覽始見萬山羣㣲雨洗殘暑青天捲浮雲襟懐兩廓落朗若見夫君見君君何在顧影還獨笑吏非金門逰隱異滄江調江明秋月白山空夜猿嘯徒事百巻文未返一竿釣留滯豈勝愁非君誰與謀水寒終赴海雁逺暫賔秋舉世不可語猶當傲巢由贈君三尺劍永駕五湖舟還山吟日暮望南山悵然歸思發如何山中客屢㸔城頭月城頭月照女蘿秋石磴潺湲㵼碧流岩猿久别應惆悵澗鳥相呼亦共愁城南故人與我好令我忘却歸山道昨夜西窓夢到家忽驚千嶂芝花老朝來舟子促辭君囘首空江語尚聞别後莫嗟難見靣相思只望嶺頭雲思歸引海上之草緑芉芉洞門一閉今幾年仙驥去時留紫鞭掛壁見之心惘然欲歸即歸亦由我不待功成何不可堯舜未能屈巢由自餘王侯何足逰武陵春水緑蕭蕭就中亦有桑麻郊近聞秦人笑相語待我東溪種碧桃夢逰廬山謡示同志昨夜月落西窓隂倦推素枕凭石琴身居紅塵不自覺夢入廬山深復深廬山深處在何許五老仙人邀我語眉如秀雪顔桃花酌酒相酣坐箕踞明河九派倒西來石壁巉崖古道開五公握手向我笑不見刼火揚塵灰獨騎一鹿窮蒙廽窅然醉踏青錦苔松風號嘈何清哀湍飛瀑捲萬壑雷忽然驚起迷所向四坐已失黄崔嵬披衣徬皇還太息我與世途何所屑亂世茫茫飛蠛蠓囊中别有金膏訣須君之行當何時共向丹壑卧松雪别客客鬢風霜晚離亭鼓角聞念君當此去把袂不能分衡霍連秋氣瀟湘合暮雲愁心將落葉向晚共紛紛訪益上人蘭若獨尋青蓮宇行過白沙灘一逕入林雪數峰生暮寒山僧喜客至林閣借人㸔吟罷拂衣去鐘聲雲外殘出塞行將軍救朔邉都䕶上祁連六郡飛傳檄三河聚控弦連營當太白吹角動遥天何日匈奴㓕中原得宴然關山月今夜關山月偏能照馬鞍盧龍征戌客圓缺㡬廽㸔遙想金閨裏應悲玉露寒黄沙三萬里何日是長安江樓夜月懐故山友人昨夜江棲月思君好㫁腸猿聲相應發山色更青蒼楚塞來書逺閩闗隔夢長今朝㸔愁髪為爾半成霜有懐閬風山人把酒忽惆悵君今呉楚間孤雲隨馬首風雨隔河闗心事竟安在此行殊未還空將百年意泣向寳刀環懐南昌舊逰昨在南昌府清逰不可窮杯行江色裏棹進月明中樓笛吹晴雪菱歌漾晚風坐來懐舊迹萬里一飄篷江行暝色蒹葭外蒼茫旅眺情殘雲和鴈㫁新月帶潮生天到水中盡舟隨樹杪行離家今幾宿厭聼棹歌聲塞下鞍馬連年出闗河萬里賖將軍思報國壯士恥還家大漠春無草天山雪作花誰憐李都尉白首没黄沙三衢邂逅周月船臨别賦此戎馬相逢日那知復此間客愁詩莫遣世亊酒相闗江上孤舟在天隅兩鬢班更將憂國淚滿䄂送君還孺子臺吟去年醉與東湖别欲上衡湘泥秋月君家留我却邅廻悵望還成阻修濶西山縹緲翠屏開復憶滕王倒玉杯經過始識洪厓井調笑重登孺子臺臺前呼酒折荷花水淨煙明散落霞舉盃失嘆君何在望㫁行雲空咄嗟故人别後還愁緒北都不是予留處興來目送海邊鴻歸心挂在閩溪樹送戴式之歸天台歌吾聞天台華頂連石橋石橋巉絶横煙霄下有滄溟萬折之洪濤上有赤城千丈之霞標峰懸磴㫁杳莫測中有石屏古僊客吟窺混沌愁天公醉飲扶桑泣龍伯適來何事逰人間飄飄八極尋名山三花樹下一相見笑我蕭颯風沙顔手持玉杯酌我酒付我新詩五百首共結天邉汙漫逰重論方外雲霞友海内詩名今數誰羣賢翕沓爭相推胸襟浩蕩氣蕭爽豁如洞庭笠澤月寒空萬里雲開時人生聚㪚何超忽愁折瑶華贈君别君騎白鹿歸仙山我亦扁舟向呉越明日慿高一望君江花滿眼愁氛氲天長地濶不可見空有相思寄海雲送呉㑹卿再往淮南故人身披紫綺裘腰珮寳玦騎胡騮英風俠氣横四海辭我逺向淮南逰淮南桂樹應猶在八公舉手遥相待明月高懸五兩頭隨君千里過淮流十年鞍馬邉城道又是邉城見春草春草萋萋路入秦長安北望空愁人荆楚竒材多劔客感慨相逢思報國男兒事業早致身青鬢須防霜雪迫我向人間久拂衣白雪相伴掩岩扉調琴鼓罷清商曲愁見孤鴻天際飛臨川逢鄭遐之雲夢天涯十載無窮恨老淚燈前語罷埀明發又為千里别相思應盡一生期洞庭浪波帆開晚雲夢蒹葭鳥去遲世亂音書到何日闗河一望不勝悲將至潯陽途中寄諸昆弟渺渺孤帆去㡬程悠悠天際望湓城一身避亂辭鄉國千里相思隔弟兄猿呌區廬寒暮色鴈過彭蠡帶秋聲江湖此去多飄泊腸㫁風塵逺别情客中别呉季高悠悠逺别半生悲白日相逢又話離海内風塵愁來已天邊消息到何時洞庭旅雁春歸盡瓜歩寒潮夜落遲惆悵孤舟從此去江湖未敢定前期寄郭招甫時在潯陽夢向三江買釣船挂帆西去白雲邉窓開晚色香爐見門落寒聲瀑布懸百年酒興陶彭澤四海詩名孟浩然何日眞尋塵外迹焚香酌茗話先賢送崔九過丹陽郡上荆門省親江國歸心一鴈牽河橋分手數杯傳千崖萬壑秋聲裏匹馬孤帆落照邉牛渚寒波翻極浦荆門晚樹合遥天他時莫枉瑶華問南北相思各渺然楚江晚思旅思遥遥倦向南誰家煙火起晴嵐孤城歸鳥連寒角極浦斜陽帶逺帆楓葉自能悲楚客竹枝何用怨江潭今朝欲冩風波恨千里書成手自緘西陵望西陵終日望不見有歸橈欲去頻囘首寒江起暮潮送友人黯黯離筵夕照收江城𦍑笛起邉愁念君此去三千里何處闗山是楚舟羽林郎貂㡌孤裘塞北装黄鬢年少羽林郎彎弓不怕天山雪生縛名王入建章聞笛江上誰家吹笛聲月明霜白不堪聼孤舟萬里瀟湘客一夜歸心滿洞庭呉中送歸豫章客川程極目𣺌空波送爾歸舟奈别何南國音書須早寄江湖春雁已無多避亂途中囘首兵戈地遺黎見幾人他鄉空白髪故國又青春多難堪長客偷生媿此身本無匡濟畧歎息漫傷神樟樹鎮醉後題吾憐樟樹好取醉欲無還酒壓鵞兒身辭歌雉子斑朱樓當碧水紅日下青山興罷揚鞭去蒼蒼煙霧間天馬山我來陟髙頂俯瞰臨長川隂崖隠落日疊嶂鳴飛泉獨立一世外所思千古前囘首鳥没處茫茫生白煙紫芝岩羽客逍遥地桃源世未尋我來窺異跡高歩越飛岑石帶藤蘿古泉鳴澗壑深紫芝未可采空寄白雲心紫霞樓西樓孤絶倚天青我愛明河對户横露滿碧梧風屢起煙消緑嶠月初生仙人共酌丹霞酒逸侶同吹白玉笙不向此時窮笑傲更從何處豁髙情送上官偉長歳晚長愁緒嗟君更逺行兵戈今日淚江海故人情此别幾時見寒猿一夜鳴致君相許在囘首壯心驚豫章城愛此城髙處囘鞭醉每醒江花兩岸白煙樹一行青雲學山舒態天隨水賦形已多徐孺子獨向此沉㝠閨怨欲作遼陽夢愁多自不成錯嫌烏臼鳥半夜隔牎鳴送趙立道赴闕仍試春官即事感興因成五十韻嗣聖中天日遺氓憶漢時一王新盛禮萬國賀重熈官爵霑寰宇光明冠本支窮冬辭老母吉日赴京師祖廣明斜照寒江結暮澌停杯愁把袂立馬語臨岐草動春前色梅緐雪後枝湖山饒逸興士友重逰嬉菱唱工迎客荷舟穏放維土風珍縞帶呉饌熟蓴絲㙮寺明全碧樓臺漾淼瀰雲連勾踐國江動伍胥祠閶闔春朝早觚棱霽景遲栁迎仙伏輭花簇御樓歌苜蓿來宛馬櫻桃薦寢帷周家千載歴漢服萬年巵駐蹕山川逺櫜弓歳月移天俄憂杞國日冄仰咸池弓創羣臣淚園陵故國悲乾坤開帝統雨露豁宸私蜂蠆何為爾豺狼欲問誰箭流元帥幕城立叛營旗國體存矜恤皇猷務逺綏且從鷹一飽自待虎雙疲復說京西亂愁連蜀道危倉皇分隊伍指㸃䕶藩籬狙詐終榮馭逰魂不足羈幾年腥戰血今日痛瘡痍宗社神靈在邦家德澤遺㑹聞淝水㨗可復雁門踦草詔詞頭切蒲輪禮意車賢良多選㧞社稷在扶持舉動新羣目經綸停一䕫長沙何遽往艱卜竟堪疑莫以朝廷重翻令盗賊窺稍懲鷹隼擊庶使鳯凰儀薪膽方無倦輿圗正入披王孫思報國天府待忠詞世道多為忌波流幸勿隨從容陳古昔感慨論邉陲仕進雖云始平生乃在兹青氊今可復綵服更相宜漂泊㣲軀老蹉跎困翮埀散材元自逸正論竟焉禆誤賞騷人作深慙國士知呌閽時已晚鳴劍志空馳鬰鬰驅浪俗悠悠歎亂離羊裘終隱去魚釣復何之出處從今隔飛騰不可追濟時須俊傑願都中興期酬友人湘江南去少人行瘴雨蠻煙白草生誰念梁園舊詞客桄榔樹下獨聞鸎兩宋名賢小集巻二百二十五
