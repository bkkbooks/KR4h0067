body:
  text: 兩宋名賢小集卷三百七十六宋陳思編元陳世隆補翠寒集宋無字子虛舊以晞顔字行名名世家於晉陵以兵亂遷吳冒朱姓至元辛巳其父國珍領征東萬户案牘適病痿無丐以身代許之入海抵竹島風雹交作隨驚濤上下經髙麗諸山罹沈疴瘦骨柴立未嘗廢吟咏嵗丁亥中丞王西溪舉茂才以奉親辭子虛初侍親西江從歐陽巽齋學壯嵗負氣視富貴漠然卒年八十有一至正庚辰嵗也馮海粟與知最晚一見其翠寒集亟序而鋟之烏夜啼露華洗天天墮水燭光燒雲半空紫西施夜醉芙蓉洲金絲玉簧咽清秋鼙鼓鞭月行春雷洞房花夢酣不回宫中夜夜啼栖烏美人日日歌吳歈吳王國破歌聲絶鬼火青熒生碧血千年壤冢耕狐兔烏銜紙錢挂枯樹髑髏無語滿眼泥曽見吳王歌舞時烏夜啼啼為誰身前歡樂身後悲空留瑟怨傳相思烏夜啼啼别離自君之出矣自君之出矣妾不出閨門懷君不敢恨惟有感君恩又自君之出矣妾自奉尊嫜知君不思妾亦當思故鄉公無渡河九龍爭珠戰淵底洪濤萬丈涌山起鱷魚張口奮靈齒含沙射人毒如矢寧登髙山莫涉水公無渡河公不可止河伯娶婦蛟龍宅公無白璧獻河伯恐公身為泣珠客公無渡河公不然憂公老命沈黃泉公沈黃泉公勿怨天戰城南漢兵鏖戰城南窟雪深馬僵漢城沒凍指控絃指斷折寒膚著鐵膚皸裂軍中七日不火食手劍揮人吞熱血漢懸千金購首級將士銜枚夜深入天愁地黑聲啾啾鞍下髑髏相對泣偏禆背負八十創破旗裹尸橫道旁殘卒忍死哭空城露布獨有都護名公莫舞公莫舞公莫舞鴻門王氣歸真主何人睚眥赤龍子手循玉玦目相語令公莫舞公楚舞劒光射日白虹吐人發殺機天不與撞斗帳中咳亞父霸業明朝棄如土長門怨金壺咽淚蓮花澀銀箭浮遲渴烏泣知更阿監羅襪氷暝對星河玉階立內官唱漏催曉籌芙蓉夢破燕支愁起來粧罷窺繡户三十六院殘燭幽建章風傳鳯吹逺翠華人幸昭儀館箜篌不語心自語愁長如天恨天短紅裀暖踏楊花雪絳縷間封守宫血鸚鵡空猜警蹕聲春寒緊護流蘇結寶劍謡鐵精蒼玉龍景潛萬丈虹孤電走白日老氷立秋空提出天地愁八極來清風未逢龍準帝古匣塵土蒙大蛇當道兮若斷秋蓬嗚呼寶劍兮亦將遇乎英雄枯魚過河泣北溟有鯤噴薄崑崙氣吞積石摧禹門過河河水枯蹤迹困泥塗垂涎向海若能濟涓滴無中流有魴鯉不貸斗升水巨口走噞喁逆遊莫若鮪鯤兮鯤兮爾泣何由龍伯知決雨津倒天池洚水橫行隨鯤所之揚鬐為謝魴與鯉還有桃花春漲時玉津園棄景鐘歌炎精不靈火不德赤熛怒帝喪英魄羿弓射日日無光黃金大鏞破釜色天崩七廟移神虡鬼哭長陵一抔土十二盤傾夜月寒漢銅仙人淚如雨六龍屈曲眠秋草草根蟪蛄語昏曉紫苔滿地愁古春東風吹得乾坤老蝸涎鳥篆銀泥剝烏喙蒲牢戲左角更殘漏斷聲莫聞凡雞司晨尊鐵鐸妾薄命雲母屏琢春氷鮫女織蟬翼輕比妾妾薄命比君君薄情紅錦拭鏡照膽明還疑妾貌非傾城傾城從來有人妒況復君心不如故故人心尚峯九疑新妾那能無故時補天天髙填海海深不食蓮菂不知妾心天馬歌天馬天上龍駒生天漢間兩目夾明月蹄削崑崙山元氣飲沆瀣躍步超人寰天上玉帝老不騎飢食虎豹曉出關滅沒流沙姿剡忽紫電顔黃道三十六萬里日馳周天去復還時乎降精渥窪中龍性變化終難攀天馬來瑞何朝化為龍應童謡騶虞仁獸恥在坰龍亦絶迹歸赤霄風沙豈無大宛種雖有八極安能超天馬來雲霧開天廏騕裊鳴龍媒龍媒不鳴鳴駑駘古硯歌神媧踏雲補天去遺下一團蒼黑天千年萬年乾不得長帶盤古青紫煙玉上剖天天化石石內星精有餘魄雕光發炯成禹璧海王川后輸玄液帝青呵霧坤倪濕匣月不開太隂泣破天殘缺無人補一穴絲絲漏春雨空藏老石磨今古補天何時與天語五雜組五雜組角黍絲往復還借書瓻不得巳居九夷五雜組冠冕纓往復還戍卒更不得巳困平城湖上意晚過鴛鴦浦無心唱採蓮莫嗔蘭槳急為要趂前船江上意朝來暮還去寒潮不曽住江水亦有情佳期幾番誤甘露寺放舶至瓜洲風作天造西來險山回北固形斷崕纒赤日孤柱擘蒼溟此地何能限長江或有靈然犀夜照浪飲馬曉吞星鐵鎖沈寥廓樓船沒杳冥乾坤一衣帶吳楚兩郵亭擊楫人人倦吹笳處處聽海門沙自白瓜步草猶青夢墮浮家樂魂遭捩柁醒計程朝獵地問舍暮漁汀倐忽波濤變匆忙網罟停疾飇吹蚌室暗雨捲龍庭贔屭黿鼉壯谽谺樹石腥危檣連逼仄髙岸失竛竮世事無深測生涯獨未寧愁煩復消釋題詠紀曽經送鄧侍郎歸江西光薦中國衣冠盡孤臣蹈海回秦思魯連操漢憶賈生才天逺文星隱江平畫鷁催人尋芳草去雁到故鄉來山色催行棹波聲送客杯身還蘇武節夢泣李陵臺水落蛟龍縮城空鼓角哀蒼梧雲浩蕩黃屋浪崔嵬夜雨江蘺濕春風杜若開祇令少微動慎莫應三台李翰林墓嗜酒傲明時何因賀監知承恩金馬詔失意玉環詞名與三閭並身將四皓期匡山有書讀應亦嘆歸遲又一騎紫鯨去空掩謝山塋落月今誰弔長庚夜自明乾坤沈秀氣江水帶哀聲天上多官府文章不可輕長相思昨夜相逢處朦朧春夢中遼西書不到莫是戍遼東月上人還西湖南峯歸度夏舊業在煙霏半夜聞清磬一燈明翠微雲蘿尋寺逺猿狖見人稀想到經行處天花繞錫飛次友人春别波流雲散碧天空魚雁沈沈信不通楊栁昏黃晚西月梨花明白夜東風秋千庭院人初下春半園林酒正中背倚欄杆思往事畫樓魂夢可曽同答王子長病後得書頻情知未立身孤燈風雨夜兩處别離人乙鳥歸來社辛夷開過春如逢元白問莫説為詩貧廢宅金谷花開得幾春東風吹逐路旁塵蛙鳴私地為官地燕認新人是故人珠履賣錢豪客散玉叉乘傳舞娥顰獸環一鎖歌鐘斷時有梟聲恐四鄰春愁金雁塵香暗鳯絃紅繩風緊閣秋千園林寂寞無鶯燕一段春愁是杜鵑南峯宴坐僧空嵒稿木形入定掩松扃鵲供銜來果猿看誦罷經雲霞埋衲重苔蘚上鞋青只有樵人識曽因採茯苓訪山中隱者遙聞搗藥聲知有幽人家相尋却無路又隔一溪花别惠上人秋歸虎溪月攜錫入雲松又向深山住還聞古寺鐘出生供野鳥持呪伏潭龍好去東林下吟看五老峯銅陵五松山中樵聲聞逺林流水隔雲深茅屋在何處桃花無路尋身黃松上鼠頭白竹間禽應有仙家住避秦來至今浦口浦口晚潮來佳期那可待浪急打蘭舟蘋花更難採山中書事學道志雲霄自然塵念拋雨寬琴上線風響樹間瓢果熟供猿食松髙任鶴巢看他陳處士終被華山招泰伯廟古者吾夫子曽稱三讓名後來秦失鹿劉項死相爭三髙祠退能合天道隱亦是人豪借問祠前水如今幾個髙金陵送倪水西之江陵楚江江上暮雲東萬里春波去意濃桃葉歌殘秣陵酒梨花夢斷景陽鐘沅湘水落瓊瑶合巴蜀山來錦繡重回雁峯前見歸雁相思何處再相逢戍婦言姑嫜有妾奉征戰蓋郎行早取封侯去封侯妾亦榮送葛鍊師逺遊仙翁去醉碧桃春鶴背風吹萬里身洞裏棋髙饒幾子瓢中詩好寄何人三峯紫翠浮芒屫五嶽煙霞染葛巾歸日定知能縮地莫教青竹化龍鱗雲雨雲雨朝朝暮暮新襄王魂斷楚江春武丁曽有中宵夢惟覔巖前版築人華蓋峰逸人十步九嵒壑結茅無四鄰山中春雨過水上落花新採藥逢毛女焚香對羽人時攜一瓢酒醉著去朝真嶽陽夜泊圖長憶巴陵山水秋老來看畫却成愁箇中無聽猿啼處若聽猿啼更淚流江南思暮雨娥皇廟春風西子城相思行不得更聽鷓鴣聲寄王子長薄宦仍依楚長聞傍酒壚客愁三月盡春夢五更初吟卷看花掩行牀並竹鋪江湖有佳句知我每相於明皇並轡圖三郎沈醉玉環隨不上金輿索馬騎老大獨歸南內裏風流無復並鞍時贈皖山道士世人曽不識頭帶樹皮冠間種藥來賣醉將琴去彈鶴銜仙果下猿竊玉書看莫服丹砂好恐師生羽翰送謝士良之江東謝安遊賞去别酒惜臨分萬里甘為客三春苦送君風帆欹逆水江樹入空雲若過青山下須題李白墳春閨間畫金叉記逺人杜鵑啼血又殘春琵琶絃上無多字近日相思彈不真送僧還天目缶錫亂峯西藤蘿晝掩扉山藏翠微寺僧向白雲歸梵寂風沈磬禪深雲到衣想曽行道處猿鳥共忘機破窗蘚畫蟲絲紙半無雨分錢點入櫺疏秋風吹得春燈滅螢火飛來照讀書寄郴陽廖有大逺宦身安不題書淚幾行千山萬水路一日九回腸鶗鴂懷春語蘼蕪入夢香王孫歸未得歸得早還鄉沙門島孤嶼壓滄海風濤直下危蛟人依蜃市魚女祭龍祠月黑犀牛鬭波紅螮蝀垂登臨有竒觀感慨但言詩漢宫武帝升霞玉殿空金人夜泣月明中三千嬪御無行幸曽費丹砂飼守宫沙上四望無邉際中浮一片沙人家居釣艇官賦種蘆花渚緑紅蒿短江清白鳥斜垂流欲東去萬里寄生涯牆頭杏花紅杏西鄰樹過牆無數花相煩問春色端的屬誰家金陵懷古宫甎賣盡雨崩牆苜蓿秋紅滿夕陽玉樹後庭花不見北人鉏地種茴香墨梅寄因上人寒枝香在天外疏花影流水中梨雲夜深清夢草玄筆底春風又夢覺霜林墮月眼明野水浮枝橫玉不吹春去斷縑間寫相思長信秋長信秋來月自圓夜香猶拜玉階前妾今不願君王寵惟願君王壽萬年句曲王尊師不與俗人接草堂雲自封有時鍊丹去無處覔行蹤樹暖猴捫蝨花香鹿養茸曽期尸解後終隱大茅峰萍風波長不定浪迹在天涯莫怨身輕薄生前是栁花山中僧雪頂霜眉齒半稀跏趺苔石看雲歸山童掃葉鶴飛起狼籍松花滿衲衣唐人四馬卷金銜初脫齒新齊蹄玉無聲赤汗微昨日杏園春宴罷滿身紅雨帶花歸又簇仗回來玉勒間黃門牽向落花間君王不愛長楊獵嘶入春風十二間又霜蹄踏月早朝回尾弄紅絲拂紫苔日暖龍池初洗罷尚方聞進御鞍來又太僕新調試錦韉九重日色照連錢春來興慶池邉路偏稱宫中軟玉鞭宫人斜步搖明月冷無光骨掩春泥草亦芳艷魄不隨紅粉盡化為蝴蝶舞昭陽遊楞伽寺蘿徑入蒼靄鐘聲來翠微招提在何許雲外一僧歸猿巴峽聞聲愁斷腸冷泉照影緑隂涼藤搖亂雨領兒過樹曬斜陽拾蝨忙獻果去尋幽洞逺攀蘿來撼落花香空山月暗無人見啼入白雲深處藏鶴毛骨珊珊白雪清千年世上頂丹成晴飛碧落秋空濶露立瑶臺夜月明仙島雲深歸有信天壇花落步無聲時來華表何人識依舊翻身上玉京遊天姥山欲去不得路自將蘿蔦捫相逢採藥叟偶入落花村晴草鹿眠軟雨潭魚上渾無人動煙火應取曉霞吞寄題無照西園近地棲禪室祇園草木薰鞋香花洞雨衣潤石欄雲松吹和琴雜茶煙到樹分遙知道林輩來此論元文寄斷江上人長江瀉百灘句截斷狂瀾片石青松下孤風白日寒空花隨麈落曉月對棋殘誰共清吟癖嵒扉敞夜闌寄錢翼之作賦擬相如何人誦子虛琴彈中散操扇玩右軍書北闕青雲近南冠白髮疏煩君傳遺逸著我入樵漁揚州即事玉壘開方面金湯控上遊連營驃騎宅重柝雁行樓強弩虛空發飛橋日夜浮煙生烽燧地草死虎貔秋此處兵威震當時國步憂六年襄郡守三䇿藎臣謀大將深圍陷長江萬里休兩淮先按堵孤注獨橫籌破竹才乘勢聞風已置郵乾坤機軸轉海嶽版圖收春變山堂栁波通汴水鷗平坡南下馬逺渡北來舟無復瓊花夢猶餘芍藥愁塵埃何豎子還擁黑貂裘商人婦日日湖頭望望夫夫未回無情春水恨秖送别船來玉環病齒圖一點春寒入瓠犀海棠花下獨頻眉內厨幾日無宣喚不問君王索荔枝琵琶一片相思木聲含古塞秋琵琶是誰製長撥别離愁杜工部祠老病思明主乾坤入苦吟秋風茅屋句春日杜鵑心詩史孤忠在文星萬古沈秖應憶李白到海去相尋山中半嶺松聲樵客分一溪春草鹿成羣採芝人入翠微去丹竈石壇空白雲湘竹杖寄無住采向舜妃江廟前得來賈客木蘭船老宜泉石搘慵態吟稱煙霞倚瘦肩晏坐夜和金錫憩經行春卓紫苔穿知師道價神龍護莫漫騰空去九天老將殺氣消磨暗鐵衣夜看太白劍無輝舊時麾下誰相問半去封侯半不歸老馬瘦蹄生入玉門關病放沙場戰骨間歸齕殘芻應有淚將軍頭白戍天山老農倩搔背癢坐深村愛説前朝賜帛恩縣帖不來尋社長自攤牛契教玄孫老牛草繩穿鼻繫柴扉殘喘無人問是非春雨一犂鞭不動夕陽空送牧兒歸如鏡伐竹架過牆葡萄斷竹插地復生枝葉無住序曰瑞竹余以詩贈之為引寒藤延晚翠試栽碧玉動秋根鳯梢依舊生虛籟龍籜相將添逺孫林月過庭窺斷影茶煙潤色到啼痕湯休麗藻題還遍貝葉應多此處翻無題花影玲瓏滿繡牀自調緑綺背紅窗惆悵佳期學絃線七條哀怨不成雙寄衣曲聞有宫袍賜翻令閨意傷良人在行伍秖待妾衣裳又征衣須早寄遙憶藁砧寒莫訝啼痕少相思淚巳乾贈竺鍊師姓疑乾竺古先生霞外幽栖近四明履斗星移冠劒影步虛風引珮環聲蘂宫夜喚青鸞降花洞朝騎白鹿行長使芝童看藥竈為耽瓊液過蓬瀛鶴傳仙語歸華表魚寄丹書上赤城怪石醉中拈筆畫險棊靜裏按圖爭玉桃竊慣慵留種瑶草尋多盡識名縮地日攜龍作杖卧雲時約鳯吹笙海邉定與安期遇關上當逢尹喜迎我本翠寒山道士相隨便欲採黃精送翟上人聖代容髙尚山林隱去休方知堯舜日亦自有巢由贈日東僧肄業重溟外隨緣大夏中錫飛鯨海靜杯渡蜃樓空音信千峯隔華夷一水通秋深故國夢應與逝川東江山萬里圖咫尺寒流千萬峰湍聲寂寂暮猿空買船欲泛春潮雨楚樹吳雲是畫中江南曲遙天碧蕩蕩逺樹緑愔愔併作相思海春來一樣深蕃釐觀感瓊花后土祠南裔坤維嫓室家國封嚴典禮宫祀尚褒嘉不是神靈異安能眷邇遐應須有玉女到此賞瓊葩麗服從空降明粧倚日斜同揮五雲扇共駐七香車月姊羞調粉風姨罷散花青童回絳節金母屏彤霞故事唐時盛佳名數代誇塵根雖下纍天意在中華雪讓瓏璁巧氷銷刻鏤瑕人間惟獨爾地上更何加萬花殊寥落羣芳避艷邪玫瑰誠執御芍藥等泥沙聖運俄驚輟兵強忽肆拏舛訛難核實真贋遂聱牙雷雨還驚蟄潛藏重發芽旁枝徵舊茁新葉漫榮荂尤品終蕪沒珍㽔逐水涯兩朝成草莽九廟雜龍蛇古殿蘭旗暗殘爐桂燎賒蕣顔愁想像珠樹絶驕奢寂寞無雙譽徘徊但自嗟八仙聊免俗消得寶欄遮送母丘秀才自黔中歸益川黔南萬里地劍外去寧親蜀魄花成血山魈樹隱身竹枝歌峽夜椰子醉蠻春歸訪王孫宅彈琴有故人郊外晚望野曠行人少林荒夕照微煙中一聲笛何處牧兒歸揚州紅橋二十四明月照笙歌若是迷樓在遊人應更多寄山中僧名山舊隱巖巒秀精舍蕭間殿閣虛像禮栴檀千古佛經翻貝葉五天書獸依草座跏趺後禽下花臺施食餘空翠濕衣橫即栗紺泉澄盎涌芙蕖鷲峰夢繞雲中寺鹿苑身栖物外居清梵夜回松月冷孤禪晝起柏煙疏曙鐘寒韻侵虛籟午供春香入野蕪道念有時憐老病塵緣無計問真如逺公若許來同社陶令何妨去結廬便向東林傍尊宿菩提從此發心初遊三茅華陽諸洞冠帶寒星帔剪霞步虛去宴玉晨家醉歸却跨青鸞下衝落碧桃無數花又玉案清香徹夜焚紫煙成蓋覆茅君數聲金磬秋壇霽敲碎遙天一縷雲又書滿琅函閉不開雲窗霧閣鎖青苔門前白鹿將麑過定是避秦人引來又淡染雲霞五色衣杏壇朝罷對花披洞中養隻千年鶴長被仙人來借騎墨梅生意玄煙裏春工毛穎中枝頭兩三蕊開不假東風似到孤山下斜枝入眼中分明幾點雪欲折又成空杭州錦繡波翻太液空一池寒雨落芙蓉內前尚有中官住却聽西蕃寺裏鐘羅嗊曲玉井荷花碧中藏偶意深緑房千萬菂多少可憐心四皓四老本英雄來成羽翼功倘令秦重士未必隱山中子陵乾坤罷戰塵漁釣可藏身何事劉文叔猶來覔故人孔明有心興漢室不意託孤兒帝昔曽三顧臣今表出師淵明心寄羲皇上生逢晉宋時風流千古意只有杜鵑知春歸報道春歸去忙來看落紅豈知春不去還在緑隂中漁父紉草成春服汲湘供晚炊人間風浪險醉裏幾曽知馬塍桃李宫城近偏承雨露恩至今耕種地一半作花園蘇堤漢苑花何處唐陵柏巳空相逢大堤栁令我憶蘇公玉津園御愛花無主長生樹幾時青青輦路草盡屬牧羊兒武穆墳若論將軍勇神京反掌圖中原數千里可惜葬西湖祚德廟祀典當時盛忠曽保趙孤誰知宋祚絶今與廟俱無景靈宫孟月祠原廟都人憶故宫當年駕幸處喬木鳥呼風杭州山勢猶龍鳯行宫巳劫灰北人偏悵望曽見汴京來建業懷古離居迫馳道晨往內西門屏營無顧問偶逢路人言昔有六代宫今為百姓園阿閣餘故基層城但頺垣金鋪失嚴邃玉座變荒原陳昏蚤墮滅隋奢亟崩奔樂極終復悲替興相覆翻結綺徒構恨臨春工埋寃貴嬪艷亦無麗華皆不存髙堧鳥烏集沃壤蓬麻繁梟如拜月魄蝶化尋芳魂草遺舊裙色花泫新啼痕空餘龍津水流入魚藻渾猶涵睿澤在尚感陽和恩孰知涓滴微曽悅萬乘尊坐令芻蕘賤禊飲汙其源念彼禾黍地凄然難具論寵深乃自辱涕下還成吞海上自之罘至成山覽秦皇漢武遺迹霧氣沈坤極濤聲撼北溟雲霞五色水丹碧萬重屏脈絡華夷秀并吞宇宙青石梁橫地户洞構壓風霆砰磕紛鳴鼓漰訇疾建瓴提封思霸主巡守陟遐坰黔首何多難皇居不少寧山驅麟避藪海塞蜃遷庭鹵薄周荒服鱗蟲畏典刑天吳驚象駕精衛泣鑾鈴浪激秦嬴怒崕崩漢武靈空悲祖龍死但覺鮑魚腥采藥終驕妄求仙竟杳冥惟聞傳二世無復享千齡古昔飛騰客能存變化形解交烏兔髓定翳鳯凰翎玉檢微藏旨金丹别有經東華司笇厯南嶽考功銘億劫開元閟三宫護紫扃睿仁斯可冀淫暴詎堪聽漫致安期舄虛邀阿母軿昆池波鼎沸阿閣土花零夜雨蛇升樹春潮蛤上汀茂陵迷亂草禁苑暗流螢奢侈如飄電危亡若炳星明君當至治方士或來停火宅休生棘情河易轉萍願逢清靜化昌運幾時丁憶舊寄金陵馮壽之憶昔江東日離居託孟鄰儒家見君好談席偶情親南斗文昌近西山爽氣新驪珠驚俗眼琪樹倚芳晨大雅今重覩竒才豈易倫珊瑚生海網汙血出天津句滿雞林賈名齊雁塔人傳經心入聖用筆意凝神射䇿應先手藏環定後身巨流思待濟吾道詘當伸落魄傷遲邁依棲笑隱淪三年為倦翼萬里作窮鱗伏枕思霜橘歸溪戀紫蓴鴻稀石城信魚隔太湖濵故宅間多草空船獨採蘋夜吟酬蟋蟀暮景歎麒麟老恐襟期斷悲懷轍迹陳舊峰還似洛淮水想猶秦勝地登臨數殊鄉夢寐頻潮吞李白月花動謝安春有興須相覔無聊漫自呻休疑交契濶尚覺膽輪囷逺物那堪贈佳音欲細詢勞歌因奉寄題罷更沾巾詠石得天字肢脈崑崙析胚胎混沌先靈分元島峙秀聚景雲鮮覆壓風雷窟支撑宇宙穿崚嶒欹篠霧歷棘聳蘿煙嶪嶪棲危壁磷磷過瘦涓雨攻繩眼斷浪擊彈窩圓筆架珊瑚豎屏圍瑪瑙偏骨攢獰鬼竦脊凸老蛟跧劍卓空蒼色矛森紫翠顛醜宜鐫鳥篆剛可利龍泉怪漬潮紋濕頑和地軸連篔簹梢映帶薜荔葉縈纒磊磈蛇身縮崩爭鳯勢偏蘚侵題字處藤絡倚笻邉碎礫鋪文貝尖峰砟黛蓮竇深膏乳滴甃潤土花沿儼若峨冠者昻如峻士焉磴危欺木屐磯滑怯苔氊移恐嵐光動捫嗔野蔓牽衝湍聲類磬謝瀑韻成絃硬性辭斤鑿嵌形欠畫傳鼓歌傷莫續鼎句歎難聫砥礪誠由著磨礲學及遷畜竒希抱璞煉餌詫飛仙寸勢垂千仞嵬胎結幾年巖輝知産玉峽東見奔川織女支機穩山人作枕便隕星沈戰域敲火出魚船異或稱羊化疑應訝虎眠龜埋遺碣下麟仆古塋前屹立中流壯平施大礎堅懷沙嗟放逐凝魄惜嬋娟德必穹碑紀詞當巨硯研險思經灧澦功擬勒燕然嵩岱歸諸掌蓬瀛寄一拳不須填碧海直欲補青天答無住和太初韻見寄寶地人來少柳隂自晚晴片雲依石潤孤磬出花清竹筧分泉細檀香上㲲輕勒銘留水寺應供宿江城適楚濤喧定歸吳雪滯行雨苔粘凍屐廊葉覆間枰琴為蛇紋買書因鳥迹評眼前無佛祖詩癖有山兄句妙唐風在心空漢月明晝禪休樹影夜梵雜松聲夏減遊方興秋添住嶽情何時修白業去結懶殘盟簡翼之碧樹緑蕪空亂雲故人何處隔江村舊書在手再三讀新恨從頭又一番竹幘隨行家具活蘭亭摹出典刑存幾時定訪揚雄宅為問太玄經裏言送陳衡中之越見説會稽郡風流如晉時貧惟將母去清不要人知修竹王猷宅春風夏禹祠到官遊有暇好寄剡中詩蟬髙栁夕陽收繁絃奏未休數聲風露飽一殼古今愁涼思知秦樹哀鳴亂渭流年年離别處幾曲送殘秋上馮集賢忠言如海膽如山趣入端門虎豹間玉笋曉班聨鷺序紫檀春殿對龍顔氣凌百辟星辰動賦就三都造化間豈向長沙淹賈傅淳風會見筆追還送閔思齊浙東帥府椽南越連閩徼東瀛貢百蠻軍營威帥閫記室比官班之子稱時彥羣公譽早攀詩壇堪白戰幕府正朱顔橫槊金飈動談兵玉帳間貨通夷舶富民羡國風還夜柝鯨潛海春旗豹隱山攜琴遊有暇挈榼酒休慳將佐知書貴勳名待詔頒孟堅詞訟作留照汗青間喜馬伯庸待制扈從還京嚴蹕傳聲入建章漢宫趨陛肅鴛行駕回黃道清塵動人在金鑾白日長承詔曉聞天語近賜衣春覺聖恩香馬卿賦獵兼忠諫獨許驂乘錫尚方送陳行之之信州推官漢守曾懸榻家聲復世綸贊亷推士雅列郡重嘉賔昭代詳刑讞賢僚體聖仁袴襦憐故老狴犴念寃人英幹登時望文華異等倫固宜膺寵渥豈但活罷民江左開藩舊風流佐幕新平反須有頌剛決看如神郤鑒初榮養黃香早締姻錦還鄉巳晝綵戲室俄春自補尋山屐誰親墊雨巾拊循恩易洽煦嫗俗當淳曲動陽關疊樽移祖帳陳未能忘手握何得更情親羡爾丹霄貴悲余白髮貧尚期金鼎藥猶客素衣塵巖壑將幽賞煙霞欲隱淪交遊千古事離别百年身楚澤寒多雁吳波暖見鱗相思不相見音問莫辭頻寄翰苑所知多士當文治明良際盛時騷壇先佩印䇿陳巳搴旗西極蹄千里南溟翼四垂疾雷天地破崩嶽鬼神移學過三都賦神超七步詩隂何須大賞鮑謝只平欺尺璧光難掩華鐘響發遲人遊丹桂窟鳯噦碧梧枝漢室方虛席枚臯復擅詞數承恩詔見趨赴重官儀皇閣登清要蒼生息舊疲星辰侵履舄桃李傍階墀珂里豪家逐銅駝樂部隨行歌金騕裊醉舞玉參差杜曲花偏滿蓬壺酒不辭弓開射熊館劍倚化龍陂秀彥居同寀軒車出共馳侯門相雜遝寒素獨吁嘻塵榻應容下仙舟可待追亦慚才莫逮終負志難衰攀附羞蘿蔦倣徨向路岐未酬題柱興徒抱練絲悲幽谷音猶澀鹽車力尚卑泥途淹騄駬荆棘困黃鸝睍睆還求友騰驤却避羈愁吟長鋏伴間夢矮牀知縫掖今誰貴乘桴任所之短章非善頌聊以展吾私尋貞白先生舊居百折􅔦雲嶠千花通水源寒藤垂到地怪石立當門白壤煉丹赤清池磨劍渾曽來經誦處片雨滴苔痕江干暮泊野色隨墟落江臯煙景饒逺村明晚燒髙岸沒春潮覽鏡芳年去援毫藻思銷琴書苦行役不敢問漁樵子陵祠堂一見故人歸去來漁竿不肯博三台漢陵今日無抔土惟獨先生有釣臺己亥秋淮南飢客中懷故里朋遊寄之行李依吳榜飄蓬更楚鄉山川歲云暮風雨夜何長此地從兵革斯民復旱蝗薦飢懷賑粟久渴望攜漿船婦爭遺穗樵童拾棄芒哭喪多藁葬征旅少贏糧豈有災重併而無户損傷一年租幸免衆口飯誰將生晚羞干祿憂時念彼蒼悲歌思請劍頺墮輒椎牀宵枕當寒溜晨梳候曙光牧羊人戢戢放馬草荒荒木落明秋野江空