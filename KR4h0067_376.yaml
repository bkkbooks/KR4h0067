千峯亂水上一榻到應分古像焚香禮寒鐘出定聞瓶離劒池月錫入秣陵雲好去北山住草堂休勒文吳中菊花盛開菊花三百六十種處處名園花不同安得化身千百億一花著取一吟翁悼郭祥卿録判燕臺氣槩汾陽裔赤驥騰驤彩鳯飛吏鞅晚淹彭澤米酒錢春典杜陵衣西山手板情還適東里角巾身不歸空有遺文落人世朱絃聲絶賞音稀題玉環聨轡圖赭袍紅映縷金衣笑並花驄酒力微試問六龍西幸日有人曽侍翠華歸閲張上卿仙遊録漢祖龍飛日真人豹隱中綸音來薊北驛傳起江東聖德深𢎞教玄門厚植功垂衣軒帝治問道廣成風獸夢符坤極鴻門建震宫雨敷皇澤意雪應紫宸衷白玉刋章重黃門範櫑雄制詞天藻疊冠佩露華濃宣室繁釐受髙禖敬祀恭嚴齋迎景祚正念格晨穹宇宙樞機運雷霆寂默通扈驂鑾從近恩賚上方隆裔演留侯系經開柱史蒙五朝膺顯渥百辟仰精忠宗戚勳封盛師生祿秩崇力辭君九錫首邁爵三公第宅仙官府逍遙綺皓翁漆園春未老蓬島藥何窮詔下瑶京鶴神升絳闕虹自期沖舉去誰識壽齡終霄駕煙霞逺星壇杖屨空圖容曽翰苑遺迹漫崆洞太上元無象微謡詎得工獨存清淨化為國致年豐答無住上人隱去看看白髮新草堂資盡篋生塵五陵亦有間相識只把黃金笑買春吳江石橋新成五色何年補泬寥百弓無地駕瓊瑶老龍千尺卧寒玉雌霓半空橫彩綃天路行看星象逼江濤怒息水犀囂騎􅚪便欲超銀漢直踐台階挹斗杓淵明像環堵蕭然瓢屢空不詳姓字一衰翁此身自謂羲皇上却墮間人畫卷中答馬懷秀兄弟見訪移家連晚歲屏迹值春寒舊業遺松徑幽棲逺杏壇數椽容膝易五斗折腰難有客來排闥無人為整冠諷詩稱鮑照卧雪念袁安下里誰余和髙山爾自彈迎門屐齒折扶病帶圍寬乍喜交時彥相尋到冷官鄰驚都騎盛僕出草堂看光價連城璧風流萟苑蘭老嗟傾蓋晚貧覺布衣單午竈添茶具煙蓑罷釣竿傳呼聞杜曲榮耀滿江干文雅多歆艷殷勤少接歡長鯨鈎上掣巨闕匣中蟠筆力千鈞弩襟懷百丈瀾籍通金馬選詔待紫泥乾樂毅曽強趙夷吾遂霸桓貴應聨萬石功定服三韓留取刋彛鼎勳名未汝闌太白扁舟圖錦袍煙艇夜郎西酒思金鑾入直時不道相思杜陵老愁吟落月屋梁詩雨夜懷虛碧共有煙霞疾襟期江海分故人年老别寒雨夜深聞地肺潛通嶽峩眉秀拂雲何時負笈去稽首五千文清明病中少年令節醉花前老病花前服藥眠自檢銅人試榆火午窗燒艾起新煙簡無功種種念余髮垂垂懷老禪公卿既無分巾盎欲隨緣布襪雲門寺銅瓶雪竇泉他年調水牯鼻孔不煩穿春歸釀蜜筒香蜂報衙杏梁泥歇燕成家浮萍斷送春歸去盡向東流載落花漁莊為魏濟民賦彭澤歸來菊未荒便投簮紱弄滄浪一篷煙火蓴鱸興數畝茅茨橘柚香欸乃幾時歌古調籧篨何處避殘陽釣間若枕圖書卧應被人稱是墨莊雪夜有懷雪壓狐裘醉玉京夜聞歌吹到天明寒窗病起今頭白始聽春蠶食葉聲竹枝詞莫折閶門楊栁條帶將離恨過楓橋向道春愁不禁蕩蘭舟長放櫓輕搖唐宫詞補遺海內升平服四夷逺邦貢物盡珍竒近頒手詔俱停罷獨許南方進荔枝又罷朝輕輦駐花邉催喚黃門住靜鞭三十六宫人笑語上前爭索洗兒錢又昭陽仙仗五雲中遙聽笙簫起碧空夜半月明人望幸君王自在廣寒宫又宫娥隨駕蜀山回春日還從內苑來聞道上皇憂寢食御前休報海棠開髮白解嘲吳霜兩鬢早先秋聞道愁多會白頭溪上鷺鷥渾似雪想應無那一身愁大禹祠力平水土勢回天功業三千五百年四海九州皆禹迹獨留陵寢越山邉青衣洞隱者清泉自盥沐丱髮不冠巾看盡世間事爭如林下人嘯雲嵒谷應坐石鹿麋親莫棄茅菴去白桃花又春西湖所見緑闌干護水鱗鱗蘇小門前栁弄春聽得語聲嬌不見隔簾佯喚賣花人貞義女廟貞女浣紗日行人去國悲生前漂母饋身後謫仙詞白月沈魂在黃金報德遲如何孟少府到此不題詩題許山人居葺茅栖碧巘梯路上雲危樹影池搖曲泉聲石礙遲鳥銜丸罷藥猿拾著殘棋見説仙家伴時來覔紫芝江東客中詩人不是欠生涯野性從前懶在家冷眼春來元有分看山看雪看梅花秣陵晚眺天塹鴻流擁積沙石城虎踞漫雄誇山陵青草六朝地巷陌烏衣百姓家紫蓋黃旗消王氣瓊枝璧月弔庭花孤雲更作降幡勢目斷樓船日又斜田間見破屋無茅柱腳斜一農頭白病看家年來水潦秧難蒔却傍湖塍種藕花公子家朱門黃道擁髙槐拂曉鳴騶散乳鴉紅叱撥驕矜匼匝黑崑崙黠解琵琶姬將銀蠟燒明月犬帶金鈴卧落花不信銅駝荆棘裏百年前是五侯家宫詞月照芙蓉水殿秋仙韶一曲奏涼州髙皇尚愛梨園舞宜索當年菊部頭又條脫金寒翠袖氷羊車夢裏轆轤聲薰爐宿得沈香火暖却春纎調玉笙姑蘇臺妖艷分明搆禍胎黃金瓌麗更危臺笙歌夜倚東風醉粉黛春從南國來原草翠迷行輦迹野花紅發舞衣灰豪華肯信今為沼煙水翻令後世哀長卿一病文園渴思深秖應惆悵為鳴琴老來減盡凌雲氣却賦長門易酒金席上贈歌者十匹吳綾賞永新一聲歌歇店梁塵家徒四壁門如水那得明珠換美人垂虹亭秋日遣興滿袖玉皇香案煙綵霓背上俯晴川紅黃霜樹珊瑚海黑白雲花玳瑁天玄圃空離樓十二丹墀罷對字三千吟豪醉蘸吳江水寫與騎鯨李謫仙阿房宫圖千門萬户矗青冥六國脂膏四海兵豈但此中非帝業當時猶更有儒坑送牟都事景陽赴浙東帥幕蜀郡方齊魯文翁邁俊賢箕裘承憲業星宿近台躔宇宙汾陽鼎風雲祖逖鞭閫威分海徼節制控閩川饋餉功曽立亷能迹屢傳儒冠真耀武帥府重芳年參畫旌麾右馳驅將相前豪揮驚草檄燕集見華篇吏牘分占授軍機妙轉旋百蠻元震讋諸校益貞堅訓練羣材進鈞陶衆彥遷栁營兵鎮肅蓮幕紱光鮮除內恩終許安邉詔必憐酒容山簡醉騎想葛強聨日月新堯厯車書舊漢天揚雄兼賦頌嘉什到甘泉騾綱圖劒閣清塵犯屬車綱騾馱得荔枝無却嫌畫史才情少不作承平舞馬圖初夏别業别墅清深無俗人蛛絲窗户網遊塵緑隂鏤日新歡夏紅雨鏖花故惱春病去情懷逢酒惡困來天氣與茶親壁間烏帽長間却肯學陶家戴漉巾燕銜得香泥去花間日午時玉人方睡起莫訝卷簾遲謝僧遺石鎗逺寄竒鎗紫玉形寒翁歡喜欲鐫銘茅峯道士傳茶訣林屋山人送水經崖瀑松風添瑟縮地爐槐火共青熒矮瓶未罄長鑱健且傍雲根飽茯苓荷錢拾來虛費藕絲穿暴富池塘積萬千人世不平如買得夏天那有蓋鷗眠春日野步書田家翳日榿雲翠幄遮葑圍髙下奕枰斜陂塘幾曲深淺水桃李一溪紅白花頳尾自跳魚放子緑頭相並鴨眠沙春郊景物堪圖寫輸與煙樵雨牧家客燕雨懷都門飛雨布袍泥遊子魂銷幾夢歸賦有聲華羞狗監淚無氣槩笑牛衣客愁萬斛添杯量春瘦三分減帶圍不似江南煙艇小栁花如雪荻魚肥寒食十日花時九雨風年年百五病愁中春寒不禁香篝火紅蠟青煙憶漢宫舊內臣家老馬罷直奚官雪滿腮少年曽扈上之回金砧成削蹄多裂玉秣辛酸齒半摧苜蓿地間春草遍葡萄宫廢野花開病嘶破攊秋風夜猶憶先朝較獵來蠶婦繅得新絲白將來織素縑自慙非錦綺尚被舞人嫌端石硯千年嵒璞斬新硎一片琳腴截紫青雲漢帶星來玉匣墨池蒸雨出滄溟煙開霧斂天晶彩海靜江澄地典刑要與陶泓作佳傳老磨松液寫黃庭東風東風吹緑上汀洲染出江南一片愁長到春來問芳草不知何地可忘憂無題效李商隱糚淺顰深憑綺疏小郎新拜執金吾絃中言語分明怨裀上腰肢準擬扶翠履鴛寒慵鬭草紅牙馬暖罷摴蒱無人商略心頭事潛向花間卜紫姑旱鄉田父言疲牛病喘餓桑間碌碡間眠麥地乾殘稅驅將兒子去豆畦却倩草人看雙陸金縷紋桑斫局堅紅雲倒浸一池蓮星環紫極無多點月印銀潢有兩絃行采砧聲鳴素練計籌花片落牙錢箇人慣受卑棲苦長為歸遲罰綺筵秣陵寓居荒園日日涉蓬蒿破屋年年蓋把茅向石側生花倚勢緣墻直上豆攀髙歸兮春草蕪三徑老矣松風有二毛莫笑家貧拙於事長鬚能壓榨頭糟春病起即事壯懷玉具劒空攜老去金門獻賦遲服藥身軀多病日養花天氣半隂時愁鄉塵積瑶琴嶽夢境寒生翠被池春事幾何公事急可憐蝴蝶挂蛛絲孟能靜席上出四物分韻得牙背爬花字詩成贈天女纎纎罷散花嬰兒一掌玉藏瑕寒生鈎弋兩三指春屈柔荑四五芽骸垢有瘡膚起粟臂風無力手長麻老夫技癢煩消遣休忤仙姑打蔡家蘭分向湘山伴野蒿偶并香草入離騷清名悔出羣芳上不入離騷更自髙許山人家桐君種藥隱蘅臯竹祖生孫共養髙茶腳碧雲凝午碗酒聲紅雨滴春槽休糧貌古添清瘦餌术身輕長緑毛仙詔未頒遲拔宅家資猶戀一溪桃答無功嵗暮見寄豆秸灰動擁爐天品字煨殘榾柮煙詩草病多刪枕上眼花書久廢燈前老依蕭寺僧留宿相對蒲團夜不眠筋力漸衰餘習在夢中去趂暗中船書趙集賢詩翰後九天宫闕鬱嵯峨公昔騎龍上大羅文在玉堂多煥爛泪經銅狄一滂沱原陵禾黍悲酆鎬人物風流繼永和今日吳箋拜遺墨只堪哀怨不堪歌兩宋名賢小集卷三百七十六
