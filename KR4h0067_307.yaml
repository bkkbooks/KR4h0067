body:
  text: 兩宋名賢小集巻三百七宋陳思編元陳世隆補漁溪詩藁俞桂字晞郄錢唐人紹興五年舉進士嘗出守海濵政劇民頑桂理之裕如不廢吟咏與菊潭吴惟信芸居陳起詩文相往復有漁溪詩藁三巻雨吟輕輕烟霧失樓臺雨暗吴山鎖不開試與漁翁閒訪問落花幾許汎溪来過湖舟移别岸水紋開日暖風香正落梅山色濛濛横畫軸白鷗飛處帶詩来和葉廣文韻入得春来物物饒翻思湖上短長橋去年寒食閒遊處曾把扁舟繫桞條書齋野草沿庭砌清閒日掩扉晚涼疏雨過落葉覺蟬稀天籟自鳴竹砧聲誰擣衣僧寮不過此何必叩𤣥機閲名勝詩集買得山房數册詩倚篷細讀已移時只貪眼底看冰玉月上荷花更不知書懐僻性止耽書村中謾寓居心惟求事省身合與名疏木葉秋風起蛩吟夜雨初吾生今晚矣不必問何如閨怨鳯幃曉起鬢􅀢鬆枕肉初生酒暈紅一把桞絲挪在手沈吟無語對春風沈吟一作尋思誰憐人去鎖朱樓終日憑闌只帶愁燕子也知人薄倖飛来略不傍簾鉤溪流雲脚纔行又復開一聲隱隱只空雷家僮忽報溪流漲知是前村落雨来初秋火老金柔暑告殘乗涼正好望西山秋聲来處無㝷覔只在忩前竹葉間雜興漫山花發草萋萋楊桞花綿水拍堤况是客懐禁不得那堪杜宇耳邊啼偶吟降伏吾心法無如去外魔苦吟詩愈拙着意字猶訛荏苒青衫舊消磨白髪多不才為世棄徒自詠巻阿雨中遣愁花已開時人正愁花簪頭上使人羞一春可厭無晴日下却珠簾懶凭樓清明朝来閣雨喜新晴枝上綿蠻調好聲佳節莫將虛過了人生贏得幾清明即事陰雲釀雨勒花遲梅已飄殘到杏枝好是池塘清夢處勾吟春草入新詩松江荷葉翻風暑氣微看山露冷濕征衣垂虹夜靜三高月只照漁溪一舸歸惜春春事三分過二分桃花水上覔紅雲遊人浪説春歸去桞外黄鸝尚自吟次吴秋潭韻相逢欵話傍簷西坎止流行事不齊君到白蘋秋正好飽吟風月棹前溪東山東山隨分作生涯即是清高隱者家粗有小園供日涉不愁無地種梅花夏中即事黄梅過了猶慳雨幸有南薰在翠槐燕子亦於貧者薄今年全不見飛来延祥觀御園猶自有逋梅約束遊人莫肯開聽得老兵談舊事幾年不見翠華来虎丘兩寺今為一因秦虎占丘鶴飛王劍化鳥宿古墳愁石與泉流接池通海水浮爭奇多勝槩不及盡追遊家園眺望西山在目中更須寛展竹籬通殘梅尚守清廉節不嫁東君昨夜風首夏槐幄陰陰蔽緑扉池抽荷葉落薔薇梁間紫燕新雛弱来傍簷前旋學飛偶成短髪蕭蕭滿鏡秋家居但覺歲時流兩年不見西湖面笑我寒盟是白鷗月夜江南又見鴈南飛楓葉蕭疎旋覺稀邊塞戍夫天氣冷誰家月夜搗征衣裴墳乗船寄僻徑墳古最幽深山近風常冷松蟠晝亦陰来時無速騎歸路有鳴禽寄語城居者何人肯訪㝷山中剖竹相通澗下泉更邀山色在尊前一鉤明月軒忩上欹枕藤牀獨自眠惠山徑入松闗古秋雲帶樹煙只疑山有雨恰是澗流泉騷客詩留壁遊人岸繫船憑誰招陸羽瀹茗古欄邊秋懐喚醒歸舟是早秋水光雲影兩悠悠西風不管梧桐怨一葉吹来一葉愁農事東作農家處處忙金珠非是療飢方京華只識笙歌樂豈識男耕與女桑甘露寺占斷淮南勢西風入鬢毛一江流不盡多景最為高斜日迷烟樹孤帆送客舠興懐人物少今古等秋毫夏晨偶作蠶事行將了農家刈麥初雨慳林少笋水澁港無魚因病嘗懲酒偷閒懶荅書今年身愈老事事覺全疎贈雲間陸琴士地僻居閒絶可人殷勤過我抱桐君聲中知有遼天鶴彈散華亭一片雲烟霞石壁山深入翠微寺僻掩幽扉景别金仙記人忘塵世機石滋崖雨滴龍出洞雲飛結屋同僧處何須賦式微久雨踰月留京國春光總不知可傷連夜雨好似暮秋時有客来無酒逢人只説詩官中聞閉糴應是細民饑次坦菴兄韻便中蒙賜墨得句勝如書暫爾兩年别俄然春暮餘夢馳情不間心邇迹何踈自省吾今老湖山縛屋居豫章滕閣勝閣昔曾遊今無檻外樓遠山連樹合盡日對江流古石空存記騷人易感愁夜深歌酒處燈火燦漁舟寄書歲月逡巡笑故吾人生南北隔江湖樓頭約取衡陽鴈寄得一行書信無兩宋名賢小集巻三百七
