body:
  text: 兩宋名賢小集巻二百五十一宋陳思編元陳世隆補翠㣲南征録十華岳寄敬甫葉兄嵗次丁夘秋八月既生魄於時謫建安脱去未有䇿忽覩星鳯光慨然陪履舄自謂入閩建閲人幾千百間有知功名所建復邪僻否則茍利禄鄙猥何足責獨我子敬甫挺挺出蠻貊舌端搖戈矛筆下羅疆埸和以軍國秘歴歴有竒畫以此方定交歸心已翰翮送君東郭門握手不忍釋明年入中都首上平戎䇿甫結君相知便念長沙謫細草天子書願置孤臣驛論薦方躊躇倚門重垂白轍環溫凊圍笑言方啞啞去我兩牛鳴恍若闗山隔去年槐花黄郡國書貢籍若以經濟材俯亦從此役白屋寄簮纓青燈聨衽席談笑生風雷議論燦金碧雪香飛梅花歸鞍整南陌别徳殊未幾拳拳在朝夕君腹坦東牀吾身繫西國從此嘆參商蓬瀛非咫尺尺紙雖屢投奥援不我索星次幾一周幸我安且釋嘗觀義與利更相為損益欲論古人交二者請君擇不惟眼獨青且要心同赤此身可虀粉此道不可易自料吾與君造物難棄擲胸次蓬萊山襟懐雲夢澤未説詩書帥休論文章伯堂堂大丈夫豈可虚竹帛但恨不振蹤尚此多扞格在君當先登挽回二千石饑溺切君身推解過疇昔炎涼無異心始終無異迹庶幾吾二人交情可全璧記夢夜漏徹三更夢牛入我屋有角㫁而懸有足折而縮驚覺細思量識有何禍福兆者事之先形者心之屬事既兆於心夢乃形於腹入屋牛有盖為卒事刑獄吾今尚縲囚其應已桎梏體具牢方具無足牢不足不足意無他示予可脱輻去盖只論牛其義尤可録牛足不下垂得一生可續牛角不上横得厶去何速一旦忤君心吾辠當何贖生去氣横秋風馬不相逐下裂輿地圖上應周天宿峥嶸挽萬鈞其始播百穀身雖在籠檻志不經溝瀆甯戚不吾歌丙吉當吾哭安得如齊王過堂憐觳􅑌苦蚊四壁人聲絶榻下蚊烟滅可憐翠㣲翁一夜敲打折上運管張平國十首妙年司釀水邉州浪迹曽陪汗漫逰紅粉夜嫌銀燭短醉和明月下西樓大江南畔五松西潘岳風流夢有詩歸路經從定留挽莫教父老見旌旗雨洗芙蓉沃眼青雪潭澄月照人明銅民指㸃向民説未比當年令尹清霜風十月客辭家廷老相期下九華檢旱不逢陶靖節喚船同過鯉魚沙紫樞黄閣總青氊西掖東華墨尚鮮何事闕業獨公蓮幕任淹延閒將玉斧製羅紈醉引龍蛇競筆端流落闕軸緑窗俱作畫圖看武城三載促公歸自合班行列禁圍計幕暫參知有在野夫乗此便横飛朱顔緑鬢富春秋家世才華三總優不用鶴裘兼映雪天然標格自風流雲衢從此喜通亨鳯閣鸞臺信脚行願把恩風散寰宇盛栽桃李作門生英雄三載謫東南二月東風始放還馬痩尚嫌歸路窄願求屋上一青山秋朝有感十年版築歎勤劬自笑青雲去路迂昨夜高宗聞有夢不知曽到傅岩無聞有薦翠㣲者成二絶二袁吕布漫豺狼孟徳仲謀那易量顧我三逢三顧主空教徐庶下南陽韜鈐鼎鼐本同倫後世人才自淺深相國若能擒項籍漢壇應不屬淮隂有激呈江聖與判院不郊不國不吾廬兀兀騰騰十載餘頸昔已逃三尺劍腹今猶秘九疇書齊牛難爇呉元濟賈鵩何慙董仲舒只合三緘且鉗口一蓑歸去伴樵漁與楞伽老瑛上人勿謂年來世道艱都縁彼此不相參一生知已有千萬十事從人無二三紅杏無壇堪拱北白蓮有社結和南扁舟若有東歸便㫁竹枯松寄一儋呈王子䝉隠者國士還須為國憂肯同兒女作身謀存無補世亡無異生不驚人死不休秦鹿還須屠狗逐楚猴猶為爛羊羞如今若論西都事却與中唐風馬牛夜讀離騷楮衾封冷白凝霜輾轉無眠夜未央風欲送愁先巻帳雨嫌多夢故敲窗自慚鼓瑟投齊好漫接歌輿勸楚狂起把離騷讀幽悶楚詞還似楚江長倪尚書生祠聞説先生入建都一年民樂吏清癯四廂夜月封朱户兩院春風鎖翠廡一旦有書追駟馬萬寃無計徹羣烏焚香再拜祝公夀問有清朝賞罰無秋晚呈薛子長一瓮香膠一曲琴得相尋處且相尋覔寛却怪青山卜座乆不知黄葉深當路星軺已鉗口異鄉風物更闗心何時繫艇秋江上醉卧蘆花雪滿襟雙桂堂月姊親移入慶門廣寒今是並肩人分他蟾窟雌雄種作我螢窗南北隣傲竇雖慳三樹玉比詵翻剰一枝春主人便好鞭黄鵠研取魁梢謝紫宸憶弟妹别來三載客東南始信人生聚首難眼底不聞鴻雁信鼻頭常為鶺鴒酸問天不語語徒厲驀地上心心類剜安得春風吹馬首卧聴行列報平安責逋索逋無術謁公門豈謂公門反愴神令尹幸酧三百索痴兒猶戀一千緡如今束手方知錯自此甘心莫厭貧不是恩波不旁洽五窮無奈苦隨人刳腸植粟餧官牛牛骨成塵粟未酧何事蓮參猶閣筆反憐花縣若虚舟季公素重千金諾膠鬲當貽萬世羞願效相如還趙璧莫教顔色歎牀頭送趙右秋梅花飛雪滿霜洲洲上行人去莫留蠟炬結花催管籥雁聲喚客上蘭舟莫嫌氷炭情難入自是薰蕕味不侔執節從教少知遇勿於世路學沉浮閩藩齊指右參軍玉骨清無半㸃塵一味恤刑常召禍十年逰宦只憂貧圜扉月照金波夜寒谷花開玉樹春客子與君雖素昧一詩聊記子張紳牢城言懐重城不隔世間塵箇裏無花别有春寃鬼夜隨風雨泣病囚時作犬羊呻雷霆不霹欺君賊彗孛偏凌為國人欲問老天天已老料應無説為敷陳贈楞珈老瑛上人無聊㫁梗撥寒灰門掩桑風客自推急下火爐乂手接便將布袋解頭開拂牀展巻呈詩藁炙盞分茶當酒杯别後逢人須問訊楞珈曽倩寄書來謝許判院惠米溝壑膏粱總自招仲尼陳蔡亦囂囂不逢魯肅千囷指空折淵明五斗腰孤竹二饑知我意蒼梧一飽為君謠從今隻手摩挲腹却向顔門問一瓢除夜大雪青帝明朝下玉京先教滕六掩車塵梅花笑我三年臈椒葉争他一夜春烏角觸檐鞭墮玉馬蹄印路椀抛銀何當夜縛呉元濟去作中興社稷臣宿水陸寺蕭寺廊廡濶無人獨自行呉儂非好僻楚客為誰清花落慿風埽燈殘借月明江湖有烟浪且此寄餘生呈魯伯瞻信㫁無青鳥盟來有白鷗悶和詩作首愁聴缺水滴蓮花曉山空桂子秋功名有期㑹教缺浦城買舟㣲雨催行斾西風催客舟菊闕浪激花翻雪山涵影浸秋前灘闕歸興呈呉夢祥魚雁音書少闗山夢寐遙對花思粉面遇闕喜意鵲應報歸心馬更驕西風綽鞭鐙飛闕秋晚即事秋宇清如洗秋宵分外長寒鷄鳴午夜征雁喚重陽楓葉已全赤菊花纔半黄不知秋幾許試與問蘇郎呈李景山居静心常樂愁多鬢不禁買舟和月載把酒對花斟白水有深淺青山無古今從兹得真趣消盡利名心小圃舍北有餘隙平褫作小園花存四五本竹種兩三根風伯倩搖珮月娥煩佐樽誰知方丈裏别有一乾坤流螢誰將殘草曳流螢月黒星昏分外明老眼年來困躔度恍疑流彗入王城前年天狗落京西千里生靈血染衣子夜不知螢電過復憂天外一星飛得金正將書八行黥墨笑金暉今亦提兵上海涯一介問安雖老畧感恩猶勝李申之莫出無事何須出短籬一闗風月足朱扉幾回靸起芒鞋去帶得閒愁無限歸自喻呈趙明甫梁間燕子為喃喃故下珠簾未欲還料得無聲如反舌不應留落在人間惜秋祝融嘘火扇驕陽北陸迎寒釀雪霜安得金風専嵗令四時心地有清涼詩到林頭落葉時眼前秋事已無㡬何當領取秋容去收拾詩囊帶得歸兩宋名賢小集巻二百五十一
