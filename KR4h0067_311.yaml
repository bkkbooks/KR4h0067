body:
  text: 兩宋名賢小集巻三百十一宋陳思編元陳世隆補南岳詩藁劉克莊字潛夫號後邨嘉定二年以恩補宣教郎知建陽縣言官李知孝梁成大摭其所詠落梅詩以為謗訕鄭清之力辨得釋通判潮州改吉州端平二年除樞密院編修官嘉熙元年知袁州坐言濟王事為御史蔣峴所劾與方大琮王邁同罷歸旣而予祠累擢廣東提舉改直華文閣淳祐六年令赴行在奏事道除太府少卿旣至奉御劄劉克莊文名久著史學尤精可特賜同進士出身除秘書少監令與尤焴同任史事兼中書舎人史嵩之服闋御筆除職予祠令克莊行辭克莊奏嵩之有無父之罪四無君之罪七舊相致仕合有誥詞今臣行嵩之之詞未知為褒為貶論奏不已為殿中侍御史章琰劾罷尋移舊職知漳州復除崇政殿説書起居舎人兼侍講力奏不草史宇之答詔十二年除右文殿修撰知建寧府改福建轉運副使以鄭發疏褫職寢新命提舉明道宫景定元年賈似道還朝厯遷權工部尚書兼侍講以年迫堅乞致仕咸淳四年特加龍圖閣學士仍致仕明年卒諡文定克莊學問充積甚有文名真德秀嘗以學貫古今文追騷雅薦之晚年為賈似道一出君子惜焉所著後村居士前後續新四集行於世龍隱洞先賢評桂山推爾居第一豁然碧瑶户夾似雙玊璧中有無底淵黑浪常蕩潏諒當剖判初倍費造化力雷嗔斧山開龍怒裂石出至今絶頂上千丈留尾脊寧論兒女子壯夫股為慄我来欲題名腕弱墨不食摩挲狄季碑文字尚簡質今人未知貴後代加寳惜洑流工駭舟久遊覺蕭瑟嵓室寛如家迴櫂聊愒息贈翁巻非止擅唐風尤於選體工有時千載事祇在一聯中世自輕前輩天猶活此翁江湖不相見纔見又西東芙蓉二絶湖上秋風起櫂歌萬株映桞更依荷老来不作繁華夢一樹池邊已覺多池上秋開一兩叢未妨冷淡伴詩翁而今縱有看花意不愛深紅愛淺紅即事四首買得荒郊五畝餘旋營花木置琴書桞能樊圃猶須種蘭縱當門亦不鋤無力改墻姑覆草多方存井要澆蔬區區才志聊如此誰謂先生懶復疎目為詩客不勝慙喚作園翁定自堪抱甕荷鋤非鄙事栽花移竹似清談野人只識羮芹美相國安知食笋甘晚覺齊民書最要惜無幽士肯同參墻角新開白版扉時尋樵牧弄烟霏代耕豈若收躬稼賜帛何如出自機湖海浪遊今已倦山林獨往未全非百年只願身强健長為慈親負米歸待鑿新池引一灣更規高阜敞三間縮墻恐犯鄰家地減樹圖看屋後山身隱免貽千載笑書成猶要十年閒門前驀有相尋者但説翁今怕往還送葉尚書奉祠先生清夢繞林泉黄紙除書拜地仙報答吾君吾相了徜徉某水某丘邊事光白傅求賢後銜似溫公約史年笑向故山猿鶴説古来晚節幾人全答留通判元崇不見龍驤與驥馳紛紛蟲篆鬭蛛絲君侯傑出南方者老僕終當北面之憶玉樹枝勞遠夢熏薔薇水讀来詩自慙眼力非闗令紫氣浮空懵不知獲硯二硯温如玉琢成信知天地有精英馬肝紫潤尤宜沐鵒眼青圓宛似生未愛潘郎呼作友便教米老拜為兄今年几案多奇獲應是窮儒命漸亨題龍眠十八尊者嘗聞天台境肉身往無從仁夫示此圖恍惚遊其中應真一一若舊識或踞怪石臨飛淙山鬼投牒何敬恭天女問法尤丰茸盆魚鬐鬛等針粟放去夭矯拏空濛山深無人地祗出被服導從侔王公前驅鷙獸後䕫魍徐行殿以一痩笻巉巉蒼壁謖謖松下有老宿眉雪濃石橋滅没雲氣斷似是鬼國非天工層冰融結挾怒瀑毒虺噴薄含腥風至人于此方入定壊衲羃首枯株同等閒一坐六十刼汝技有盡吾無窮書生往往談性命惕以禍福猶兒童倒持手版口勸進對此寧不面發紅我知龍眠筆外意要與濁世鍼盲聾退之云釋善變幻愷之謂畫能神通幻耶神耶兩莫詰與子持叩西山翁丁酉重九日宿順昌步雲閣絶句三首呈未道明府九月南州菊未黄芙蓉取次獻新粧不妨折取繁紅挿四海皆知兩鬢霜只了年年作逐臣衣冠樸素面埃塵偶逢令尹留連我不畏狂生㸃涴人先倩清風掃水軒更呼涼月倒金尊定知明府歸來夜縣郭留燈未閉門送項使君季約二首世有凝香樂君侯總未知清齋燈火夕閉閣荔支時郡小難留住民愚去始思兩年案頭筆一字不容私但見兩眉顰何曾一饌珍節如僧更苦家比郡尤貧琴鶴均為贅蓴鱸頗切身蕩山有来雁莫惜寄身頻北山作骨法枯閒甚惟堪作隱君山行忘路脈夜坐認天文字痩偏題石詩寒半説雲近来仍喜瞶閒事不曾聞黄檗山出縣半程遥松間認粉標峰排神女峡寺創德宗朝鸛老巢高木僧忙雜野樵早知人世淡来住退居寮小寺小寺無蹊徑行時認蘚痕犬寒鳴似豹僧老痩于猿澗水来旋磨山童出閉門城中梅未見已有數株繁蒜嶺到此思家切寒衣半淚痕燒餘山頂秃潮至海波渾僕怕昏無店人言近有村吾生輸野老笑語掩柴門幽居寺相傳有儒者唐李隱兹峯電已收遺藁雲方鎖暮鐘木碑無世次石洞斷人蹤此士何曾死林深不可逢蒜嶺夜行嶺頭無復一人来漁店收燈户不開松氣滿山涼似雨海聲中夜近如雷擬披醉髪横簫去只寄鄉書與劍迥他日有人傳肘後尚堪收拾作詩材别敖器之舊説閩人苦節稀先生獨抱歲寒姿老年綘帳聊開講當日烏臺要勘詩東閣不遊縁有氣草堂未架為無資輕煙小雪孤行路折賸梅花寄一枝答友生讀易參禪事事奇高情已恨挂冠遲清於楚客滋蘭日貧似唐人乞米時家為買琴添舊債厨因養鶴減晨炊君看江表英雄傳何似孤山一巻詩漁梁春泥滑滑雨絲絲一路寒陰少霽時水入陂渠喧似瀑雲從山崦上如炊燎衣去傍田家火炙燭来看野店詩落盡梅花心事惡獨搔蓬鬢遶殘枝小梓人家生来拙性嗜清幽因過山家為小留頂笠兒歸行樹杪提瓶婦去汲溪頭參天老竹當門碧盡日寒泉遶舎流我料草堂猶未架規模已被野人偷送周監門一領青衫似敗荷奈君母老秩卑何三年幕府無人薦千里柴門有客過身畔擔輕藏俸少江頭船重載書多故人若問軍中事為説防秋夜枕戈贈友亦欲尋芳遍九寰不期無意識君顔一生氣誼真湖海四海宗盟重斗山經嵗著書人少見有時入郭俗爭攀何因樵服供薪水得附高名野史間豫章溝溝水泠泠草樹香獨穿支徑入垂楊薺花滿地無人見惟有山蜂度短墻野店蕭蕭掩竹門岸沙猶記去來痕東風枉是吹花急緑盡平蕪却斷魂西山絶頂遥知有隱君飡芝種术鹿為羣多應午竈茶烟起山下看来是白雲秋風黄葉蕭蕭忽滿街獨騎痩馬豫章臺莫將宋玉心中事吹向潘郎鬢畔来歸至武陽渡作夹岸盲風掃楝花高城已近被雲遮遮時留取城西塔篷底歸人要認家出郭江邊一雨洗秋容北郭東郊野意濃老大怕他人檢㸃隔溪隔桞看芙蓉烏石山兒時逃學頻来此一一重尋盡有蹤因漉戲魚羣下水縁敲響石鬭登峯熟知舊事惟鄰叟催去韶華是暮鐘畢竟世間何物壽寺前雷仆百年松葺居兵火間闗鬢欲絲歸来聊卜草堂基架留手澤書堪看㸑有躬耕米可炊畏濕先開通水竇貪明稍斫近簷枝旋移梅樹臨忩下凖􅊀花時要索詩除夕除夕陰寒怕巻簾雨聲斷續下疎簷壁穿自和乾泥補忩損教尋廢紙粘祇有青燈相守定縱無白髮亦生添更殘自算明年事不就君平卦肆占立春二首恰歸舊隱再逢春村巷荒涼草没人犬壊園中門作竇盜窺墳上樹為薪官如巫祝難羞賤家似樵漁敢諱貧聞説鄰醅低價賣病夫一滴未沾脣今歲春盤始住家也勝羈旅走天涯圃晴菜坼經霜甲林暖梅飛徧地花閒有工夫憂世事老無勲業惜年華近来死盡吟詩者得句聊從野叟誇燈夕千炬金梔映玉蕖臺城昨夢又年餘斷無絃索鳴華屋惟見炊煙起草廬兒報瓶空因止酒婢言油盡暫停書蓬忩亦有精勤士何必然藜向石渠方寺丞新第二首幽人卜築翠相環莫笑書生眼力慳地占百方多是水樓無一面不當山荷深似入苕溪路石怪疑行雁蕩間只恐中原方鼎沸天心未遣主人閒一生不畜買田錢華屋何心亦偶然客至多逢僧在坐釣歸惟許鶴隨船庭栽花木皆僚友身主湖山即事權京洛貴人金谷裏安知世上有林泉方寺丞􅖼子初成船成莫厭野人過久欲從公具釣蓑積雨晴来湖面濶殘花落盡樹陰多新營小店皆依栁舊有危亭尚隔荷所恨前峯含暝色不然和月宿烟波偶賦身已深藏畏俗知客来鄰曲善為辭偶彈冠起成何事徑拂衣歸自一奇村飲婦常留燭待山行童亦挟書隨明時學性尤通顯却悔從来業小詩題方武成詩草性僻愛詩如至寳借君詩巻百回看吟来體犯諸家少改定人移一字難束瀑為題猶夭矯吞山入句尚蒼寒嗟余老鈍資磨琢安得同衾語夜䦨書考一首香火精勤閲一朞孤臣無路答鴻私銜如已廢陳人樣俸比初開小學時世上升沈姑付酒考中供狀是吟詩五錢買得羊毛筆自寫年勞送有司穴蟻穴蟻能防患常于未雨移聚如營洛日散似去邠時斷續縁高壁周遭避淺池誰為謀國者見事反傷遲宿千歲庵聽泉因愛庵前一脈泉襆衾来此借房眠驟聞將謂溪當户久聽翻疑屋是船變作怒聲猶壯偉滴成細㸃更清圓君看昔日蘭亭帖亦把湍流替管絃答翁定牢落祠官冷似秋賴詩消遣一襟愁喜延明月常開户貪看青山懶下樓客詫瀑奇邀往看僧誇寺僻約来遊何當與子分峯隱飢嗅巖花渴飲流歲晚書事十首荒苔野蔓上籬笆客至多疑不在家病眼看人殊草草隔林迢遞見梅花踏破儂家一逕苔雙魚去換隻雞囘幸縁不識聱牙字省得閒人載酒来書生元不信禨祥老去無端慮事詳白髪社巫云日吉明朝渫井更苫墻鬱壘鍾馗尚改更青雲變幻幾公卿人間止有章泉叟撲斷衡山了一生細君炊秫婢繅絲綵勝酥花總不知忩下老儒衣露肘挑燈自揀一年詩門冷如冰儘不妨由来富貴屬蒼蒼昨宵却笑癡兒女深夜潛燒祭竈香歲晚郊居苦寂寥日高睡起去城遥深深榕逕苔墻裏忽有銀釵叫賣樵主公晚節治家寛婢慣奴驕號令難圃在屋邊慵種菜井臨砌畔怕澆蘭日日抄書懶出門小忩弄筆到黄昏丫頭婢子忙勻粉不管先生硯水渾丐客鶉衣立户前豈知儂自窘殘年染人酒媪逋猶緩且送添丁上學錢懐保寧聰老秣陵一見歎魁梧毎恨斯人不業儒幾度劇談俱抵掌有時大醉勸留鬚探梅尚憶陪山屐煨芋何因共地爐我已休官師退院肯来林下卓庵無仙遊縣不見層岡百尺嵐眼中空曠似江南煙收緑野連青嶂樹闕朱橋映碧潭丞相無家曾住寺聘君有字尚留庵荒山數畝如堪買徑欲誅茅老一龕燕野老柴門日日開且無欄檻礙飛迴勸君莫入珠簾去羯鼓如雷打出来示兒𤓰芋村邊一畝宫閉門不復問窮通生羞奏伎伶人裏死怕標名狎客中講學有誰明太極吟詩無路和薰風身今老矣空追悔但祝吾兒勿似翁被酒酒户當年頗著聲可堪病起困飛觥醉呼褚令為傖父狂喚桓公作老兵舊有崢嶸皆剷去新無壘塊可澆平投牀懶取騷經看只喚棃花解宿酲贈徐相師許負遺書果是非子憑何處説精微使君豈必如椰大丞相元来要瓠肥袖濶日常籠短刺肩寒春未換單衣半頭布袋挑詩巻也道遊方賣術歸鄰家孔雀初来毛羽錦青蔥今與家雞飲啄同童子有時偷剪翅主人常日少開籠嶠南歲月幽囚裏隴右山川夢寐中因笑世間真贗錯繡身翻得上屏風十月二十二夜同方寺丞宿瀑庵讀劉賔客集瀑山木落霜寒夜共讀吾家夢得詩坐對遺篇忘漏盡手遮殘燭怕風吹森嚴似聽元戎令機警如看國手棋千載愚溪相對壘未應地下友微之崇化麻沙道中經行愛此人煙好面俯清溪背負山半􅖼何妨呼渡去小橋不礙負薪還逺聞清磬来林杪怱有朱闌出竹間深處安知無隱者卜鄰容我設柴闗館頭雨雪蕭蕭驛堠長不堪流潦入車箱撫州城外黄泥路即是人間小太行煙竹鋪野迥村疎起暮寒偶逢廢驛卸征鞍主人家比漁舟小客子房如鶴柵寛燈與鄰通眠未易風從隙入避尤難似聞南去加蕭索一夜披衣坐不安衡永道中二首一舎常分作兩程雪鞭雨袖少逢晴平生不識終南徑来傍湖南堠子行過了衡陽雁北迴鄉書迢遞託誰哉嶽山石鼓皆辭去惟有湘江作伴来黄熊嶺黄茅迷遠近不見一人行信步未知險回頭方可驚路由高頂過雲在半腰生落日無棲止飄飄自問程移居鄰曲無還往何由有别情惟應小忩月長記讀書聲兩宋名賢小集巻三百十一
