body:
  text: 兩宋名賢小集卷一百七十六宋陳思編元陳世隆補東溪集髙登字彥先漳浦人宣和間為太學生與陳東等上書乞斬六賊不報紹興二年廷對極言授富川簿轉古縣令以不肯祠秦檜父胡舜陟誣奏下靜江獄會舜陟以他事下獄死乃得白編管容中卒有東溪集還山招陳希韓乾坤莽回互日月相蕩摩百年才瞬息萬類總么麼是身非我有造物如吾何觸事會心少幽棲發興多眷言意所適樂此山之阿修篁擢新幹老木榮舊柯谷聲傳地籟松韻答天和獨石介而安寒泉淡無波園蔬掇纎嫩名果仍駢羅細蔫著雨花碧卷受風荷隨意坐莓苔絺衣挂薜蘿得酒即酩酊作詩共吟哦嘯長情浩蕩舞短影婆娑妻孥鹿門趣黃綺商山歌﨑嶇路辭遙迢遞誰見過交親憶同調出處矢靡他每憐傷弓禽因感赴燭蛾自覺此身浮相看雙鬢蟠人事何時休歸來勿蹉跎思歸忽忽已秋杪言歸欣有期節物想吾廬青蘂繁東籬流匙白雲子蘸甲黃鵝兒對此憶羈旅多應歌式微喜慰倚門心愁銷舉案眉稚子閙簷隙繞膝牽人衣歸心念如許兼程猶苦遲明朝秋色裏鳥帽風披披冒寒行風雨有感號風撼楛枿凍雨凝路塵乾坤祕日月八荒同一雲遙知沙漠寒黯淡愁殺人天涯望不極流淚滿衣巾杜門故人方謝客為問意如何午枕清風足夜窗明月多易招惟酒聖難遣是詩魔一榻君家事何妨獨我過夢遊故山風際氅披鶴雲根杖䇿鳩幽棲知好在歸夢故難留山放數峯出泉分一派流把茒何日辦縛屋護松楸送元太但得身長健何妨鬢己華胸藏為錦繡筆走是龍蛇作椽只三語讀書空五車卷懷已良計去去卧煙霞水漲謝邑宰送米心知一字不堪煮矻矻窮年黃卷中食粥由來未為拙儲瓶况乃嗟屢空令君好賢嫓韓愈賤子受賜慚盧同春水從教繞舍北癡兒不復啼門東中秋對月繡江再見中秋月去嵗月圓人尚缺相望千里共嬋娟苦恨亭亭照離别今夕一樽誰與同孟光舉案對梁鴻衆雛立侍儼成列以此持杯壽乃翁乃翁看月揩病目手足傾頽頭髮秃但願團欒三十秋不計東西與南北臨别示子不能枉道取富貴是致爾輩愁飢寒頻年别離情更惡兩地狼狽心何安從人數計安否問使吾相思懷抱寬平生竊笑曹家兒臨岐莫墮雙闌干乞米臣飢欲死侏儒飽方朔誰憐是嵗星館下諸生笑豐暖江頭漁父誚獨醒魯公巳作乞米帖陶令旋尋儲粟瓶親舊依然眼相向故應特地為吾青小源欲歸潮類香醪暈醉紅鐙敲歸路勒青驄水涵萬頃曽孫稼月逗盈襟少女風大誤生平緣畫足無聊終夜祗書空擬將方寸難論事直扣天門問化工夜行道中黃茒時節瘴煙濃人在山凹第幾重梁竦負才徒感慨嵇康賦性本踈慵此生自斷天休問吾道當年世不容會脫幘巾還舊隱鹿門妻子慣相從言懷歸去東臯獨荷犂家林書卷有兒持一無可意身將老百不如人心自知夢寐摩挲元結頌經從省憶少陵詩體膚飢盡天難問依舊臞然山澤姿九日塞雁南飛度戍樓一聲天地有餘秋家連滄海難窮目人在蠻荒欲盡頭莫效涓埃禆國計况無毛髮為身謀所須菽水能多少蹤迹飄然不繫舟病中雜興長袖深藏批敇手短笻斜倚作詩肩有時極目睨遼漢興在孤鴻落照邊溶溶瘴霧暗朝暾咫尺關山號鹿門疾病年年不相貸朱顔凋盡赤心存垂老飄零萬里餘肌膚瘦盡鬢毛踈皇恩若許歸山去豆地雖存不解鋤不羡雲霄欲網羅百年人物總相磨死如歸耳生如寄造物從今奈我何九死窮荒一病翁曉來尤怯北窗風誰知葵藿傾心切待到日輪升太空不辭南北任飄零俯仰乾坤一草亭鳶墮水中從跕跕鴻飛天外自冥冥病損腰圍減未休二毛垂領颯先秋夢中那復化為蝶林下不妨聞鬬牛口腹相煎亦可羞飢來欲食飽還憂多藏地下我無用須學留侯辟穀不覔蠧椽雪寒官冷家乏薪炭與舒丞懇令長至劈酒槽孫處可笑亦可憫也顧影低徊秪自憐怕寒時聳作詩肩全家食粥已數日坐客無氈今幾年君劈槽燒當止酒我和琴爨况無絃雪中送炭從來事况寫羇窮覔蠧椽辭餽金頃罷官臨慶士民丐留不果乃相與持金贐行勤勤之意既不可却復不當受因請買書郡庠以遺學者作詩謝之劉君政成俄及瓜闔境歡謡騰載道民不見吏犬無聲持以百錢勤父老嗟我官卑志未伸於人何德人稱好騰牒當途願丏留餽贐交馳雜金寶天涯百指擕空囊號寒啼飢日相惱可取無取未傷亷此念易汚惟皓皓不如賈書惠泮宫聊助賢侯采芹藻别後青襟倘見思窗前黃卷宜探討七夕天道杳難慿人言吁不經佳期轉七夕歡事汚雙星女駭占蛛巧兒癡話鵲靈吾詩非好詆聊與訂頑冥歸途嘆孫吳攄將略申甫翰王家腐儒要底用歸種東陵瓜似春閣一閣寧獨暖萬家方號寒何當放春去和氣滿人間留别丈夫四方志肯作兒女别顧我羌崛強羡君真秀發道義重千鈞利名輕一葉壯風吐虹霓忠義貫日月插劍露肝膽看鏡念勳業何當拔茅茹同在陳力列陳少陽贈官憶昔靖康初厄運會中微嚴警弛邊備長驅鐵馬馳堂堂搗京闕百萬呼鼓鼙天地為改色日月晦晴迷當寧猶未悟聰明遭蔽欺六賊久盤結如山屹莫移故人陳夫子忠義根天資拊髀惜機會禍端良在兹吾儕沐厚澤顛危合扶持不聞王蠋賢絶脰由布衣書成數千言揮翰捷如飛明朝伏闕下儒冠翕相隨种季奪兵權憤痛社稷危抱書再詣闕慟哭聲猶悲天意難遽回人心那惡離時雍恣凶暴縱兵欲屠之馬前森利刃此時命垂絲腰領兩不顧相視情怡怡虎口僅獲脫好爵安能縻俄起故鄉情各歸天一涯壯哉歐陽生舍生誠所宜聖主圖興復忠誠蒙誅夷宸心頃自責疏爵録其遺君乎死不亡泉壤增光輝魂氣鍾慶雲體魄蒸靈芝炎炎英列在昭昭星斗垂蘭死則留芳豹死則留皮男兒倘得死一死甘如飴君死逾生榮我生嘆奚為九原如可作微君誰與歸兩宋名賢小集卷一百七十六
