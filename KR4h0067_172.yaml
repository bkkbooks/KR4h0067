body:
  text: 兩宋名賢小集卷一百七十二宋陳思編元陳世隆補梅山小稿薑特立字邦傑麗水人靖康中父綬死難補承信郎孝宗召試為太子春坊知閣門事纍官浙東總管寧逺軍節度使以詩名有梅山藁六卷續藁十五卷直舍作小砌直廬迫髙墉隙土止尋丈圬人纍殘甓園叟舁新壤方成一簣積已覺寸心爽餘芳分禁掖踈翠眇林莽雖無昆閬趣便有濠濮想繞吟消永日靜對延孤賞聊成兒女劇終契山林往為語平泉公經營無太廣風露亭萬物冒春暉紅紫競芳節惟此玉井蓮迥與衆品别雅受冷風吹復愛露華潔亭亭立波上晚意頗愁絶疑是姑射仙半夜集瑶闕清虛不染塵瀟灑更宜月我慚窮陋質對此氷與雪安得謫仙人超遙俯清徹把酒一髙吟玉色相映發再賦醒心亭小橋枕滄灣一水繞清激橫來莫知源委去無尋迹戲魚時渡淺好鳥忽鳴寂堂砌隱空谾竹樹閟寒碧朝飛溢朱栱倒影泛瑶席仰窺一徑上始覺藏深僻尚憶客中行盤嶠倦登陟峰回路忽下溪館曾休息髙低相掩映景趣無終極朅來坐忘疲欲去或窮夕安得青霞人共此白雲適寄方叔落葉滿滄灣墜露濕踈栁幽人曉無事杖䇿經林阜忽焉若有省懷此山中友便欲借風翰翩翩插雙肘玩月天風忽披拂覺來襟袂清雲片玉鱗薄月華金暈生曽於滄海看浩蕩此時情髣佛見三山洶湧波濤驚晨起東旭曉曈曨照我墻角紅衰意忽開豁衰顔亦丰茸便欲理晨䇿去繞菊花叢惜無會心友一尊清興同暑退喜秋頽齡厭濁暑瘦骨便清秋蓐收方回鑣灝氣橫九州老鶴生精神孤松欎颼飀如飲寒露漿貯以青瑶甌既蠲膏肓疾復洗熱惱憂斟酌楚人賦併作商聲謳賦括蒼郡齋括蒼雲水窟刺史神仙宅窈窕九折通髣佛三山隔千峰欎崔嵬一𣲖繞清激境淨不可唾崖傾誰敢迫崇桃眩春紅積李縞夜月樵唱遞往來漁􅊑時出沒間招鸞鳳侣間訪煙霞客簮玉肌花貌有水光山色使君玩世事愛竒忘寢食不憂槖無金自喜足有力欲具航海舟從公登山屐早晚歸去來飄然謝朝幘李仲永墨梅寫竹如草書患俗不患清畫梅如相馬以骨不以形墨君曩有文夫子蟬腹蛇跗具生意當時一𣲖屬蘇公雨葉風枝略相似花光道人執天機信手掃出孤山姿陳玄幻却西施面此妙俗人那能知近時賞愛楊補之補之嫵媚不足竒李生于梅却有得髙處自與前人敵倒暈疏花出苦心暝雲暗谷藏春色我一見之三嘆息意足不暇形摸索君若欲求之點畫胡不去看江頭千樹白嚴陵釣臺兩山夾青蒼月照江茫茫陶然酌桂醑孤興發滄浪賢哉羊裘翁不肯仕漢光冥鴻已髙鶱弋者應相忘兩宋名賢小集卷一百七十二
