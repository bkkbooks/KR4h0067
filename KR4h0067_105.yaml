body:
  text: 兩宋名賢小集巻一百五宋陳思編元陳世隆補演山集黄裳字冕仲南平人為書生時常有魁天下志博學宏詞尤邃禮經元豐五年廷試第一人政和間知福州嘗為端明殿學士禮部侍郎遷尚書方三舎法行裳謂宜近不宜逺宜少不宜老宜富不宜貧不如遵祖宗科舉之制世以為確言建炎中年八十七卒所著有演山集六十巻送胡君遊洛得䘮紛紛轉羣慾誰及愛嵩三十六有客忽自東南來已為湖山飽雙目逸興不住皇州春天津橋南初酒熟長念花王司馬坂洛陽今寓誰家館已聞香信漏春風嬪御相從水光畔芳容須向盛時吟昔也醉翁長恨晚榖雨且老黄鶯聲急上征鞍望瀍澗送行詩句無纎塵自有交遊在霄漢藜莧腸中何所須但愧銀鉤落香翰簡元輿祠部百花巖上仙人住巖下為州山水聚白頭青塚南北人倒影沈沈獨懷古倚欄把酒與誰同況是使君為獻主應喚漁舟疎葦中旋膾遊鱗落紅縷秘書座上最軒昂能共春雲争態度紅衣帶月今何處幾轉春殘掩朱户飛船送客空㫁腸染塵漫落聲中句虚白亭前湖水間忽為霓裳起思慕出門沙土亂如雨薰風吹夢天南去簡元咎學士北澶車馬來何慕芹茆池邊失歡聚有分共為文字遊却向西郊話今古世俗聰明多澆漓信厚期君中有主職事無塵静相對滿榻詩書香數縷嚴扄如在隂栁中緑幄朱簾細風度紫犀銙破雪花濃石鼎煎聲遶窓户准擬七椀邀盧仝清滌煩襟出新句共笑先生最貧苦誤使簾前客相慕虚名薄利能㡬多裹飯區區來復去寄題妙光亭天邊月下雲初盡江上潮來風已定雨初無情豈有期但見圓光非逺近潮囘月落杏難尋元無此景何須問沙北渡頭人自忙誰向山翁說真性滌除塵垢無少休他日危樓與君凭假山天作乃為真人功故云假堆叠朶竒恠含思亦如畫遙岑出千碧羣岫擁而亞蒼苔把秀骨猶愜時雨灑去來何所人度嶺策贏馬安得無心雲經從㫁復挂日落行且休寒巖峙孤告送滿龍圖守奉化臺省兩稱公郡國三换節海角承重寄螭頭懷逺别俯仰七遷近覺夢一炊熟先生自怡怡浮世誰惙惙暴霖駕西洛華爐指東浙香徑催芰荷豐厨拾魚鱉窺影入賀湖訪古探禹穴未暇登四明方思白華潔親闈悵望時千巖㸔堆雪春霽動潤畢化事清暘却隂翳披雲出寸碧銀色爛盈地芳徑導衆榮頑凍展羣翠雨霽春且老良時固難計好景歸新詩清樽接佳士韶光宜夕陽醉卧莫輕起送林疑獨教授猶憶龍津曾把手閒對雲山一樽酒譚髙稍犯禪師彊遥指青尖露疎牖碧水起人新思濃旁釋竒文到科斗自笑山翁緘黙多來處長疑抱真叟乍喜相逢春色中忽見天機動楊栁覽武夷記武夷山中十三子邂逅相逢良有以太清筵前何事醉一時謫在人間世八百年後還升真武夷真君真主人天台有籍安得知不謁子騫誰與祈紫雲中下龍潭雨猶喜張仙好詩句留題琴軒軒閣競華麗誰肯歇絲管豪華既交歡盛麗亦同翫鳴絃雖侑觴惟宜素纎按聲色方争髙耳目及中亂古意始興懷曲終情已换黄子尋天真開軒名以琴問琴意何在答以琴為心我願聽以目與子為知音無絃之琴聲無聲世間此曲今何人道倫竹閣曾㸔孤山翠微麓囘環閣下千莖竹醉吟先生唐室賢灑落情懷出流俗赤城徳士攀髙風特借嘉名榜山腹雪霜難犯中心虚直節淩雲聳蒼玉月華弄影無纎塵合有丹霄鳳來宿重九遣興佳節歎短晷清爽愜幽抱新故遽相代意思幸長好百年如秋時行行越中道重九雖百囘半百已云老雲淡傾新醅籬花摘靈草但約金巵空何愁玉山倒且趁馬臺道莫管龍山帽燕子樓盼盼初歸樓上時相知燕子長雙飛有才將色世間少況復節義猶堪依將軍一去十餘載玉簫瑶瑟無心解豈不能死空相随以色累公非所知白老曾為賦詩客風裊花枝醉無力後㑹勲郎漢陽驛因語歔欷已成昔走筆還賡美人句猶感白楊堪作柱我來登賞非唐人尚引多情聊愴神人生真書皆為塵百年一餉難留巻髙樓人散誰復親只有燕子年年新中秋日賔興宴九十秋分今夜景銀色界中秋意静獻賢時入帝王州鼔瑟筵開山水境西風勁衫袖冷遙度天香到酒邊中有醉翁吹復醒徘徊態淩亂影怎須行樂慰勞生相得相忘無食頃一年人受此囬圓十分仙桂都開盡自有清光随我身嬉遊寶蠟何須秉次常父著作曝書之韻内閣儒方集先朝事不忘曝書開綺席偃武歛牙璋籖軸陳千古金珠萃一堂日華窺鳥迹氷艷照金觴已掃㫁簡蠧更增東壁光士髙閒粹語天近覽幽香見博思唐庫思新仰舜廊名山纔向曉振鷺已成行官職塵勞少朋從語笑長但慙甘若醴寧恨冷如漿小説誅瀰漫雄文薦煒煌培風誰有志從此好南翔題桃花菊水雲深處尋幽客競把銀瓶飛琥珀坐間玉篆流盃來時伴桃花獻春色塵勞不到清樽前何幸山翁設歌席人在夕陽方醉時囘首雲迷武陵宅送中吳太守華省人間去領麾出關風景正相宜唐虞民物氣和日吳楚江山秋静時語接鄉音猶喜近舟行蓮渚莫嫌遲古云亷吏君知否優孟空歌勸莫為送袁志行户曹十年場屋費才華漫有詩名子可嗟未入儒林升俊造且行春雨到夫家還乘澤國三秋月髙跨天河八月槎道阻且長膽不及空吟霜露滿蒹葭秋雨喜霽陽光方接物隂蔽已開關水落新痕定雲收去影間菊花窺曉日松影撼秋山滯思可乘興開尊為解顔泛湖放船初向白公樓渺𣺌天光簇簇洲緑竹岸邊疑士隠紫煙沒逺恐仙遊賔朋欲散還看月風俗雖忙尚買舟最好四山環繞處一家中占五湖秋初秋偶作火行金候兩猶争擾擾蚊蠅自未平雲滿雨聲蒸地爽日含山色暮天明直須紈扇思情斷始向籬花意態生萬里壁寒無一㸃月明中看雁初横寄清退君章大夫故人閒適地行仙林下邀誰共暮年把酒應思天際客登樓俄上水南船懶看小吏呈朝報静聽髙僧説世緑華髮未輸頭上白更期攜手斂溪邊寄袁思與京華為别各蹉跎猶幸相逢笑與歌風雅長言先進少遊從髙義故人多雖知塵境先忘累猶念元宫未處和行欲超然無一事便當求我向煙蘿觀蓮亭青泥藏化香紅紛看芬芳照水有餘態乗風無限香晚來花氣盛暑後雨聲涼不著故不染走盤珠自忘聞鴈露下多時鴈未鳴數聲雲外此霄征北人書到三秋盡南國弓開一字横孤館有誰驚好夢平蘆何處起寒更想應俎上終須免宜向方塘寄此生山堂有作煙籠雲鎻幾千年流俗尋山豈得先一水中分呉越界四峯前臥漢唐仙間遊東徑窺青海偶住西源翫白蓮却看内遊還有感枝藜看指夕陽天南樓有作呈仲矩舎人莫言風物是窮邉塞北江南此果然蒼壁下粘芳草地垂楊中臥碧塘天人吟夜月波中笛客醉秋荷雨後筵來候朔音棲處好夢常捫斗過幽燕除夜送代倪簽判北風吹雪抺潮頭待過東南第一州去客情生來嵗夢隔江燈照此時愁玉皇謫吏行當復金闕除書即便收言簡氣清終有用臥龍山下自難留觀遊山記感舊寄霍子侔故國别後有餘念舊記重看無限情山倚日中支暑氣水從雲外落秋聲向前世務心猶壯憶昔溪居眼自明攜手逸民今在否杯茶誰與話平生靈壁遊張學士園休説行行且與吟道山官職舊園林石疑六醜黙難問竹類七賢間可尋翠引賔朋三徑逺寒生涯澗一池深隋河堤上人空老誰為蘭皋惜寸隂秋日有感清生明爽静生悲羣動相將却入機物向本根成既老鴈知時節去還歸山人邀飲酒初熟漁叟獻鮮鱸正肥莫管世情多掃盡間來林下看秋輝社日遊雲門山不須扶我自登山脚力能勝十八盤一字雁低頭上過兩城人細掌中看雖知北户縁猶在却笑南柯夢未闌忽見歸雲應是信滿襟先得洞天寒次泠風閣之韻能御泠風入九秋豈愁光景去難留翠揺竹影落猿嶠清逓笛聲來鷺洲兩腋獨秉盧椀興滿襟誰作楚臺遊須知大塊生㣲意豈俟雲邉嘯虎丘次邦彦節推見寄十年譏笑為誰妨灑落思君酒甕旁曉殿雖争多士捷夜窓還對短檠光静憐春草開三徑冷怪朝韲引五漿且喜相逢頭尚黒江湖休更起懐鄉和李學士試院感秋荒庾初得雨幽㸃失凋梧滯思舒千巻髙吟想五湖蛩聲生翠幄酒力借㣲軀襲蹈貽文病猶難望漢儒觀蠶大巧不為蠶上簇機婦飛梭注雙目腹空萬緒徒自縈縑素如山人未足翠筠庵外環碧玉千尋直中起真香一篆清宴坐主人俄出定嵗寒枝上得秋聲次齊守巖去見示東湖之韻共辭蘭省作諸侯更領東藩第一州公事了時尋好景兩崗盤處得寒流觀潮十州基址難淪沒二浙源流且遡洄秋信最宜吳地看雪峯飛向越溪來秋日有感秋來猶寄一涯天䔁䔁秋聲似去年可恨蕭晨長在客不堪孤館更聞蟬幾時能致買山錢便好山中醉暮天有物秋來長引夢鱸魚新到曲江邊延平閣閒望倚闌誰問紫芝翁湘浦幽懐莫我同邂逅秦源人不識扁舟常在水西東舟行兩岸青山一水明溶溶天上客舟輕行人千載誰相望漫掃幽巖記姓名立春奉祠太一九霄香落降龍衣隠隠霓旌下紫㣲十雨九風春意好已知消息曉來歸桐廬縣仙人洞雜題余得此洞十餘載釋老之徒遊寓甚衆多苦寂寞而去崇寧己酉天台惠文來卜以居桐廬人相詒以資之洞于是乎興大觀己丑春余自洞霄南還道出宻巖之下文請為洞中遊因與余言頃有卜者為文占云當有顯官至此度兩弟子由此遂為名利今已度弟子公復來乃其兆乎余與文言頃有異人道余自紫元洞遊人間世子橋之西為余作紫元庵他日于此棲養以度生文喜不日而庵成來求余文余嘗顧洞中物皆出天造非人力所能為若夫池以時而盈虚鳥以時而去來蟾以時而鳴黙出洞之龍坐禪之僧應擊之皷跨空之橋與物合真與天同信皆非人力之所能為者有待乎人而後見于世乃叙卜者之占異人之語作詩絶以貽惠文大觀庚寅正月望日紫元翁記石龍去臥仙源懶未安未牧鱗鬛半身寒何如却起雷雲㑹休作遊人一笑㸔石橋跨越虛中亦自然幾千年度地行仙桃花流水春風好由此東西是洞天青栗枝葉淩雲緑蓋寒亂藤因得到雲端仙家手植無人㑹誰信靈根石上盤泛舟錢塘西湖望湖樓上與雲齊下視銀河一道低好是水邊歌舞後綺羅人在畫欄西俄起谷風斜撼竹驟來時雨碎敲篷囘頭已見煙雲合㸃簡天邊失數峯次致政李大夫郊步之韻垂髫孫子侍閒行只在閒中度此生偏是杜䳌能愜意不如歸去兩三聲自萬松嶺之龍山駸駸車盖與雲叅控景金漿尚未酣穿過竹林何處樂龍山前有集虛庵還鄉有感竹馬兒童已失真且尋春色莫撩人谿山不似當時見只為交遊半是塵將遊苕溪先寄同志長愛苕溪乍入秋有時東去與君遊詩牋酒盞遊何處千里荷花一葉舟送周奉議赴吳江一官方解浚橋南欲試絃歌豈為貪便得洞庭山下去公餘誰共擘霜柑暑中幽懷無處對秋隂數叠雲峰壓翠岑安得水邉開一閣蓮花風信滿衣襟松軒對雨有感田無數畆難回首主少髙風易折腰古往人非秋自老松軒吟對雨瀟瀟湖上閒賦誰家絃管度前汀宛似湘江昔有靈一曲未終船已逺白雲空㸃數峰青徐通直守連州一隅不見古揚州惟有平山尚自留且看江南山色好莫縁花月起閒愁春日有感挑李嬌春總不知風情惟與道相宜堂前楊桞青絲軟吟看無人獨自垂題仁壽閣百年塵外境萬慮静中身終日無他事寒泉照隱人榴花洞蓮社是非外洞天空色中一枝樵客夢兩腋石門風鹿徑蹤何在榴花信可通此縁當邂逅來接紫元翁兩宋名賢小集巻一百五
