body:
  text: 兩宋名賢小集卷三百宋陳思編元陳世隆補竹所吟稿春日訪四聖鄭渭濵訪舊孤山去桃花觀裡春迎香聞道室借酒酌吟人琴操音還古蔬盤味却真斜陽各分散一水隔紅塵擔上木香無奈聲聲杜宇頻木香猶有一分春擔頭分得清香到却謝尋常過路人和趙永巖借宿僧房韻鷗盟鄉國外簮盍把題分旅舍嫌紅日僧房卧白雲茶新翻雪乳硯古帶潮紋黜陟人間事棲心耳不聞中元今朝逢令節依舊客殊鄉禪衲同分席清齋若過堂江茶浮水色野菜帶山香忽憶三秋菊誰鋤小徑荒餞吳西疇東歸吏情寥落若商參誰是如蘭可斷金别去社中懷舊友喜來湖上共新吟好山爭似居家者冷菊難禁在旅心我欲學君歸未得來年竹屋再相尋習懶風撼西窗夕照明習成懶散淡無營頗諳讀易深知命却怕吟詩浪得名欵對山僧開月酒旋蒸湖蟹切秋橙有來歸自江干客為説錢塘潮信平送庵僧歸山微官驅我離家山何日歸休得遂間先隴隂隂松影裡春來草草倩師刪跋竹間僧詩稿借來香墨本相對坐孤檠句似寒梅好夢從春草生逼人禪價重唤我宦情輕一事猶相得此君同比盟嵗律嵗律又侵尋桃符句索吟經年為客夢每日在家心眼老看山慣愁多怯酒深公餘惟讀易世事保浮沉趙紫芝墓晚唐吟𣲖續於誰一脈才昌復已而對月難招青冢魄見梅如揖紫芝眉四靈人物嗟寥落千古風騷意俊竒公去遙遙誰可法少陵終始是吾師落梅春雨敲花逐水流遊蜂催課未知休生來獨冷嫌無雪别去相逢又隔秋紫席窠窠凝酒恨蒼苔點點落詩愁黃昏未覺師雄夢塞管一聲何處樓冷泉亭山逺源深絶市聲許由因此隱方成一生獨喜枕流好萬事何如酌水清野衲洗心滋味淡騷人照影剎名輕軟紅塵裡渾如醉誰識斯泉可濯纓玉岑一抹斜陽挂淺林細聽山鳥説春心千年古寺多竒迹讀了豐碑看玉岑觀音泉巖石留雲裏翠煙古松知厯幾千年淨瓶一滴楊枝水湧作巖前大士泉除夕一嵗驚心忽已除官遊尚自客西湖漫題桃板標茒屋旋買梅花插瓦壺俸薄幸無賖酒債官間却有索詩逋明朝萬事從頭起依舊山肩竹樣癯舟中厭殺人間名利忙我忘名利只詩狂雅陪雲袖三生語分得漁舟半日涼傍水細看鷗鷺浴隔蘆吹過苃荷香從容飽遂清逰勝那似家居卧竹房秋風悲秋風悲秋風悲秋風悲兮落葉飛豪家不識秋風悲杯酒暖熟兒女嬉秋風悲秋風悲秋風悲兮隴穟萎田舍不識秋風悲腰鎌收刈雞豚肥秋風悲秋風悲秋風悲兮塞角吹戍人不識秋風悲只願封侯不顧死棗紅十載忘歸期秋風悲秋風悲秋風最可悲兮江流滔滔禾黍離離為此悲者其知誰訪周伯弜後寄獨坐湖窗水一杯好懷竟日向誰開火雲六月天無夜不為先生定不來書瘦巖僧詩卷後泛湘遊嶽慣風寒怯挂田文半臂衫吐出煙雲氷雪句山肩莫怪瘦巖巖休日招李山房杜北山訪渭濵秋浦於孤山即席用韻凛凛仙風匝葑田徘徊懷古事茫然眼空湖海無塵纍身在蓬萊有宿緣孤䇿遍尋儲鶴地偏提自汲煮茶泉詩家眷屬通詩譜不枉微官客日邊有感華陽暫脫戴朝簮悔被浮雲惹動心世事可驚如雨驟客懷無限併秋深能歸不似天邊燕怯冷愁聞月下砧幾許清髙堪自慰官居賴有竹蕭森舊圓覺雲氣濕香埃門蹊印碧苔金奎今日賜翠輦昔時來禪定琴臺廢詩寒石刻嵬萬斯年勝地不敢肆徘徊清溪不比江湖汘漫流山林冷淡氣涵秋泠泠一𣲖源頭水岸影中間見白鷗獨坐老屋蕭條半欲斜繩床獨坐看蜂衙經年官况渾如客計日安書已到家䇿䇿冷風刪樹葉絲絲暮雨織簷花夢魂不那歸心切小圃堪鋤自種瓜挽孫花翁清氣散乾坤人亡名尚存玉寒埋葛嶺墨淡慘秦村井菊風號冢山花月返魂子孫無處覔吟客酹芳樽餞平洲僧天地一身間袈裟褁亂山聼經離竺寺結制去雲間色重懸詩稿藤枯帶蘚斑西風落荷葉應又向西還雲谷月浸千林萬壑秋聽琴驚起鶴回頭孤雲帶濕藏空谷不逐人間富貴浮北髙峰間處春光淡逢僧共採蒿曲盤山磴嶮直上塔峰髙風露侵衣冷江湖送眼豪近年無隱者空負數株桃靈芝寺梵宇背湖光朱橋度緑楊折藤維小艇拂石坐幽房齋版驚間鷺苔碑卧夕陽都人喧鼓吹未識此徜徉跋吳疇東遊詩卷兩袂熏風過傳廬鷗盟又結向西湖東遊雙幅雲煙句寫出江心雁蕩圖湖上不分雨色共晴光每攬吟魂夢草塘數日不來湖上看西風次第水蒼茫借林可山韻餞蘿屋僧吟卷多題品君齋賈島才聞風知竹瘦載雨過湖來交淡杯中水儒酸葉底梅便辭京口去覔取近詩開抄嵗幾多風月費招邀傳舍侵尋一載僑客久夢魂甘淡泊嵗寒老態厭喧囂情空雪片飄梅瓣冷地春光上桞條世事每從兒戲過門前歌舞又元霄聽雪窗靜擁寒爐逼硯氷凍蠅怪有撲窗聲拋松撒竹清眠思吹滅吟燈坐到明寄懷坐中社友自笑初無作吏能却因作吏逺詩朋與君交訊欠逢雁知我懷人獨是僧客枕夢殘聽夜雨鄉心愁絶對秋燈何時嵗老梅花下石鼎分茶共煮氷黃羽士間披鶴氅紫藤冠帶得林泉骨相寒落魄一身風雪冷飄蓬千里水雲寬素餐洗硯抄詩句清夜敲鐘上醮壇凖擬學仙仙遇否何年煉就九還丹寄詩僧昔日剡溪曽載雪君今訪我以晴期一庭梅雨何時竟吟得詩來舉似誰惜春輕寒側側雨絲絲獨坐吟窗日較遲方此惜春容易老晚風吹落野棠梨酬雲間僧見寄一從湖上别無處問相知幾夜頻馳夢今朝忽寄詩山昏雲過濕院靜鶴歸遲此去秋風近應須動客思謝林可山序詩不枉西湖住兩年窮吟活計又成編生平不得春風力只與梅花結得緣送僧之毗陵無意叢林坐雲飛天四空禪心泡影外客夢櫓聲中勝負機何密窮通算儘工此行應不錯知遇有詩翁雨作薰風入斷籬猶自雨凄凄數日無人過終朝共鶴棲雲濃山寺失水泛板橋低亦有田堪秫何時得荷犂為瘦巖僧題西山爽氣背却殘陽翠欲流一窗長占四時秋逼人風露衣巾脫拄笏朝來獨倚樓紫笑雨濕晴烘乃破慳時聞旖旎度簷間不知失笑緣何事每對薰風自赭顔客懷衣袂半埃塵堪嗟白髮新古今同逆旅湖海未歸人雨霽船爭渡花飛鳥怨春片雲千里逈日日謾烹鱗月夜泛湖買得扁舟載月明喜他蕭鼓已歸城一襟風露清吟骨四望湖山見道情花港採苓供果飣蘋洲擷荇薦杯行此歡不許人多得破曉西村雞大鳴靜中靜中白日十分遲唤起鄉心怯子規客味有如杯水淡官情肯被一塵緇瓶儲餘粟緣供鶴俸乏零金為買書坐久不禁春雨暗誰家樓上笛頻吹午夢篇詩才欠急忙償似有奚奴督和章望斷曉山雲破碎驚回午夢雨淋浪春光一半歸楊桞花事三分屬海棠靜坐小窗人語寂間聽梁燕話行藏蝸牛分岐頭角出於天盤泊委蛇巧並緣到了升髙翻墜失徒然隂地肆垂涎未利菊瑶華細簇翠亷纎耐得籬邊曉露淹晚節清香猶更好雖名未利不趨炎杜北山同石峯僧來訪梅花同伴瘦一疲有誰過嵗事那堪晚心期未易多杯深和月吸硯冷帶氷磨山暝歸鴉急相分獨奈何謝偃溪惠索淘與客敲詩倚古松亂蟬聲裡夕陽春幾年飯顆山頭瘦槐葉今朝得飽供題贈命士富貴功名世競癡清吟往往不趨時請君多算公卿命莫要逢人舉似詩挽靈隱僧珏月窗秋月只清輝窗明人不歸嘔心成宿病蛻骨悟前非書偈辭禪院緘衾寄毋闈猿啼泉石冷客淚為君揮牧溪上人為作戲墨因賦二首宿葦臨流去就輕生平慣與爾同盟相從奚假歸圖盡特盡江湖一假清右鷺峭壁懸崖隱趣深每來洞口費呼尋啼雲嘯月聲難寫只寫山林一片心右猿酬里中友人代簡韻鬢絲冉冉負年華客夢無時不在家吟得新詩三百首却慚籬下見黃花古樂府郎别二十春未報淮頭捷空房守節心羞見雙蝴蝶滴淚寫胭脂欲寄南雁羣恐傷郎客思封了却還焚妾甘奉姑老妾甘育子稚他日盡錦歸願郎無棄置言事讀了南華枕曲肱無端客夢冷偏增官將滿去多逃吏詩不吟來少寄僧亂葉打窗猶上案斜陽過屋鼠窺燈孤山在望何時雪問訊梅花策瘦藤挽李山房吟譽先君者多埋葛嶺傍幾年千里客一夕九原傷琴硯遺兒逺棺衾得友償玉樓天上事應有舊山房鄭渭濵過訪兩社北山諸友繼至惜乎招石峯月溪二禪不來未見南枝與北枝一清誰可話襟期不嫌添客重行酒所欠惟僧共説詩竹影因風和雀動水聲帶雨啓鷗疑黃昏緊閉寒扉坐自展韋編對伏犧采蓮曲朝露濕妾衣暮霞耀妾矚一葉小如瓜去住無拘束兀棹歌採蓮襲襲薰風足蘆葉映港清捉對鴛鴦浴蓮中有苦心欲折手還曲折運恐傷藕藕斷絲難續菊寂寂東籬姿淒彼霜露濕不肯出春風俗眼豈相入世無陶靖節此趣誰收拾蘭淡淡九畹質雅好住山林幽香不求知伯夷叔齊心世道不復古紉佩取騷吟自君之出矣自君之出矣蛾眉不復掃寶鑑委埃塵玉容為誰好堅氷滕六巧呈瑞平白一尺髙霜風凛冽生挾夜聲如號氷澌條玉筯瓦縫鏡銀膏茒屋頓暴富掩映何奢豪晶光動閭里健羡等兒曹此時輕脆資堅為千載牢一旦陽明升消泮蔑纎毫奚獨此為然世事亦滔滔間賦梅花白向鬢根生嵗月蹉跎事欠成讀過故書溫有味借來新絮冷無情未霜山寺昏鐘動欲霽湖亭夕照明多少紅塵留滯客可曽歸去力春耕渡湖漠漠西湖匝野煙夕陽栁下買歸船關心一紙平安報鴈字縱橫寫碧天官舍亭前古梅尋常開晚嵗暮余整歸裝而乃蚤花不容自默爭獰古怪虬龍枝著花傳舍賔嵗晚往往來來幾畨人老大相期疑未諼顧我老眼慣相看嗅花嚼蕊當餐飯橫斜峭拔耐霜雪肯媚陽和齊婉娩把酒邀月共説詩踈影上衣成繾綣朔風吹夢入家山鼓舞倦遊客子返誰謂花先常嵗期徹夜萬葩玉一本花應有心餞我行吐芳非為冬日暖我亦逆知此花意孤潔難與俗人混似嫌托根富貴場不若棲身山林穩惜乎花又不能言一花一心誠懇懇任他世間競酣桃李春花獨與我結交嵗寒逺秋胡行五年行邁兮歸遲遲採桑山隂兮奉親慈氷霜自潔兮清節持有客遺金兮志不移槖有金兮盍専為母馳心悅桑女下車兮入可知庭中見妾兮徒忸怩載思往事兮妾心悲恐君不如妾之有節兮言姑已而君不知孝兮人道衰妾不死兮欲何為賦雪漫天飄瑞壓囂塵一夜西湖幻出銀煎入茶鐺清肺腑吟歸詩句爽精神糝填鶴迹看旋沒封合梅花認不真茅舍竹籬猶富貴長安安得有貧民兩宋名賢小集卷三百
