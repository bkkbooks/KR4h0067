body:
  text: 兩宋名賢小集巻九十二宋陳思編元陳世隆補四休堂詩集周諤字亷彦鄞人生而秀頴十嵗如成人十四入太學力學勤苦登元豐二年進士第益究六籍諸子百氏之説悉論著其本㫖為文踔厲競爽超古作者不以絺章繪句為工言必期于有用旁至天文地理罔不該博初調桐城尉辭不赴迺遊潁昌訪舅氏范忠宣公時文潞公司馬温公富韓公皆在數得請益造詣逺大國子祭酒豐稷給事中范祖禹交薦之後知南雄以言邊事忤時相入黨籍遂退而家居作四林堂日與其弟籃輿野榜徜徉山水間時為詩歌自娛客至具樽爼隨所有殽簌終日談論古今未嘗一語及官事士論髙之萬金樓月湖馮氏建以施藥㡬年江上夢黄鶴意悠悠百尺獨臨水萬金難買秋杵聲喧藥市欄影枕漁舟應有壺中客分身向北遊澄輝閣雄建俯空濶下瞻霄漢浮眼將雲漠漠心寄水悠悠日暖鳥飛鏡月凉魚弄鈎行期分此景家在甬西頭西湖曉鏡初開淑景明使君風味一般清身從菡蓞林中過人在鯨鯢背上行妙舞屢翻紅藥鷰清詞時囀紫薇鶯賡歌乆矣虚前席肯向樽前戀麴生使君修禊與民游千里笙歌水面浮動地雄風塵外起截天雌霓雨中收登䑓已有難并樂擊壤寧無寡和憂却憶内家新賜火海棠無數出墻頭衆樂亭雙虹倒影上簷楹碧水澄空一鏡明野草閒花無限趣短藜幽榜不勝情已知風月隨人意聊為湖山載酒行却訝錦囊賡夢艸坐令詩思繞寰瀛望春山四明罌脰湖西南列羣峰兹山乃獨立勢欲排蒼穹白鶴殿其西丹丘嶼其東怪石卧猛虎靈湫蟄神龍斸雲藥圃潤泛水桃源紅我來凌絶頂倒身丘島中况當清秋時氣候清且融窮幽心宇曠眺望目光窮緬彼滄海人偕我蓬萊宫采芝當永年還丹有𤣥功朗誦招隠篇飛空快埃風棋盤石幽器如盤隠者誰尚傳遺局舊壇基磨苔枰路存纎縷掃葉楸紋露㡬絲屐齒折來初破跡斧柯爛後已忘饑千年故事空相憶惟見春風草緑離芝山乗閒特地抱琴過堪羡名山勝事多近望梅林連雪隖遥觀芝嶺接雲阿時康只聼羣民樂世治那聞四皓歌此景此山㸔不厭愧予衰老奈如何佛蹟巖靈山名大蓬香水靄薝蔔龍祖乆覆䕶雲物翳深谷拂衣向刼中神斧㫁蒼玉至今天人尊靈跡印金粟頗聞開士䜟飛錫隠嵓麓坐令湖海間香供走川陸巍巍䖍報地色相儼金屋緬想舊巾瓶猶能慰心目籃輿訪蓮社一笑欣自足撫事動幽尋疇能念榮辱松檜裊如見餘力付棋局更覺夢中身翛然百無欲兩宋名賢小集巻九十二
