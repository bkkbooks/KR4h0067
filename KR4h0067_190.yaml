body:
  text: 兩宋名賢小集巻一百九十宋陳思編元陳世隆補茶山集曽㡬字吉甫河南人㓜有識度入太學有聲以兄弼恤恩授將仕郎試吏部優等賜上舍出身擢國子正歴校書郎林靈素得幸徽宗朝士爭趨之㡬與李綱傅崧卿皆稱疾不往視久之為應天少尹歴江西提刑兄禮部侍郎開與秦檜力爭和議去位㡬亦罷逾月除廣西轉運副使徙京南路請閒得崇道觀復為廣西運判固辭僑居上饒檜死起為浙西提刑知台州賀允中薦召對以疾辭除直秘閣歸故治未㡬復召對㡬言士氣久不振陛下欲起之於一朝矯枉者必過直雖有折檻斷鞅牽裾還笏若賣直干譽者願加優容時髙宗懲檜擅權方開言路故㡬先事陳之授秘書少監㡬承平時已為館職去三十八年而復至鬚鬢皓白衣冠偉然每㑹同舍多談前輩言行臺閣典章薦紳推重焉權禮部侍郎兄楙開皆為是職人以為榮引年請謝曰臣無補萬一惟進退有禮尚不負陛下㧞擢上閔勞以事提舉玉隆觀後陞至敷文閣待制金犯塞定議親征有欲遣使詣敵求緩師者㡬疏為朝廷計正當嘗膽枕戈専務節儉經武外一切置之且前日詔諸將傳檄數金君臣至同謾罵何辭可與之和耶帝壯之孝宗受禪將召屢請老乃遷通奉大夫致仕卒年八十二諡文清㡬事親孝母死蔬食十五年任嶺表家無南物人稱其亷早從舅氏孔文仲武仲講學文從劉安世胡安國游其學益粹為文純正雅健詩尤工有經説二十巻文集三十巻子逢至司農卿遂終敷文閣待制而逢最以學稱嶺梅蠻煙無處洗梅蘂不勝清顧我已頭白見渠猶眼明折來知韻勝落去得愁生坐入江南夢園林雪正晴鄧帥寄梅併山堂酒甓社湖邊路詩筒得報回舊時雲液酒新嵗雨肥梅不是園官送真成驛使來鬢毛都白盡更著此花催雪中登王正中書閣對雪誰堪語登樓似欲仙人家修月户丈室散花天峰叠鈎簾外江横隠几前寒深落雁渚清集釣魚船解病從摩詰消愁得仲宣展書明細字烹茗濕疎煙月好還同夢詩成已上弦明年倘相憶為一到闗邊喻子才提舉招昌源觀梅倦不克往蘇仁仲有詩次韻問君何許看花回賸説郊坰十里梅樹雜古今他處少枝分南北一齊開昌源已辦行厨去離渚猶煩使節來况復蘭亭公所葺清流九曲要傳杯上元日大雪勾芒整轡浹辰間雪片相隨大可觀挑菜園林有餘潤燒燈庭院不勝寒桞條弄色正爾好梅蘂飄香殊未闌便是落花飛絮去直疑春事併衰殘食笋花事䦨珊竹事初一畨風味殿春蔬龍蛇戢戢風雷後虎豹斑斑霧雨餘但使此君常有子何憂每食歎無魚丁寜下里須留取障日揺風却要渠長至日述懐兼寄十七兄老來逾覺白駒忙眼看重陽又一陽心似死灰飛不起枝如寒日短初長厭看賔客空投謁强對妻孥畧舉觴回首山隂酬勸地應憐鴻雁不成行壬戌嵗除作明朝六十嵗矣禪榻蕭然丈室空薰銷大冷閉門中光隂大似燭見跋問學未如船送風一嵗臨分驚老大五更相守笑兒童休言四十明朝過看取霜髯六十翁嵗盡漏箭更籌日夜催萬牛那挽白駒回梅花雪片嵗除盡萱草桞芽春鼎來病裏詩書原不讀貧中樽爼未曽開年光似此真虚擲請以丹心學死灰自七月二十五日大雨三日秋苖蘇喜而有作一夕驕陽轉作霖夢回凉冷潤衣襟不愁屋漏牀牀濕且喜溪流岸岸深千里稻花應秀色五更桐葉最知音無田似我猶欣舞何况田家望嵗心謝人送壑源絶品云九重所賜也三伏汗如雨終朝霑我裳誰分金掌露來作五溪涼别甑軟炊飯小爐淡炷香麴生何等物不與汝同鄉廸姪屢餉新茶吾家今小阮有使附書頻喚起南柯夢持來北焙春顧予多下駟况復似陳人非爾能分少其誰遣食新敕厨羞煮餅埽地供爐芬湯鼎聊從事茶甌遂䇿勲興來吾不淺送似汝良勤欲作柯山㸃當令阿造分述姪餉日鑄茶寳胯自不乏山芽安可無子能來日鑄吾得具風爐夏木囀黄鳥僧窗行白駒談多思坐睡此味正時須次韻雪中積雪何所待凍雲終未開有時聞㵼竹無路去尋梅只欲闗門卧誰能蕩槳來辟寒須底物正乏麹生才種竹近郊宜竹樹手植滿庭隅餘子不足數此君安可無風來當一笑雪壓要相扶莫作封侯想生成鄙木奴乞筆市上無佳筆營求亦已勞䕶持空雪竹束縛欠霜毫此物藏三穴須公㧞一毛不堪髯主簿取用價能髙巖桂粟玉粘枝細青雲剪葉齊國團巖下桂表表木中犀江樹風蕭瑟園花氣慘淒薫濃不如此何以慰幽棲曽宏父分餉洞庭柑黄柑送似得嘗新坐我松江震澤濵想見霜林三百顆夢成羅帕一雙珍流雲噀霧真成酒帶葉連枝絶可人莫向君家樊素口瓠犀㣲齼逺山顰荔子異方風物鬢成斑荔子嘗新得破顔蘭蕙香浮襟解後雪冰膚薦酒酲間絶知髙韻傾瑤柱未覺豐肌病玉環似是看來終不近寄聲龍目漫追攀郡中禁私釀嚴甚戲作結交歡伯無他腸小槽竊比顧建康此身忽墮禁酒國何路得到無功鄉官酤快甚夏酌水齊釀愜於冬顧湯客來且復置是事北焙薦碗春風香避㓂遷居郭内風雨淒然鄭簡道餉酒煙雨昬昬二月梅全家避㓂寄城隈欲尋碧落侍郎去遽沐青州從事來令我妻孥爭洗盞想公伯仲正傳杯安能鬱鬱久居此且傍茶山松逕囘返魂梅逕菊庭蘭日夜催禪房未合有江梅香全正作依稀似花巧能令頃刻開却笑巫陽真浪下寄聲驛使未須來為君浮動黄昬月挽取林逋句法回瓶中梅小窗氷水碧瑠璃梅花横斜三四枝若非風日不到處安得色香如許時神情蕭散林下氣玉雪清映閨中姿陶泓毛頴果安用疎影寫盡無聲詩雪作卧聞惟霰却無聲起看堦前又不能一夜紙窗明似月多年布被冷於氷履穿過我柴門客笠重歸來竹院僧三白自佳情亦好諸山粉黛見層層送倉部吕治先守齊安齊安剖竹要循良分付吾家坦腹郎賸有江南連赤壁終稀訟獄到黄堂鈴齋晝永宜深念邊鎻秋髙合過防此地元之遺烈在風流容易鬢毛蒼十月一日屋角羲娥轉兩輪今朝水帝又司辰山家嘗稻知良月野徑尋梅見小春一嵗坐看除得盡百年正與死為隣誰能思許無窮事閉閣開爐但飲醇仲夏細雨霡霂無人見芭蕉報客聞潤能添硯滴細欲亂爐薫竹樹驚秋半衾裯愜夜分何當一傾倒趂取未歸雲憫雨梅子黄初徧秧斜緑未抽若無三日雨那復一年秋薄晚看天意今宵破客愁不眠聴竹樹還有好音不郡中吟懐玉山應真請雨未沾足憫雨連三月為霖抵萬金小垂開士手足慰老農心果欲千倉積猶須一尺深病夫渾不寢危坐聴佳音苦雨儘道迎梅雨能無一日晴窗昬愁細字簷暗亂踈更未怪蛙爭席真憂水冒城何由收積潦簫鼓賽西成晚雨蕭瑟度横塘霏㣲映繚墻壓低塵不動灑急土生香聲入楸梧碎清分枕簟涼回頭忽陳迹簷角掛斜陽夕雨屣履行莎徑移牀卧草亭風聲雜溪瀬雨氣挾龍腥曄曄空中電昬昬雲罅星徂年又如許吾鬢得長青雨二首秋冬久不雨氣濁喜雲生麥壠崇朝潤茅簷徹夜聲初來斷幽徑漸宻雜疎更頼有墻隂薺離離已可烹薄晚初霑灑清晨更慘悽魚寒抛餌去鴉濕就簷棲幽澗濺濺溜長堤淺淺泥一杯持自賀吾事在鋤犁雨夜一雨遂過夕安眠失百憂窗扉淡欲曉枕簟冷生秋畫燭爭棋道金樽數酒籌依然錦城夢忘却在南州秋雨排悶十韻今夏久無雨從秋却少晴空濛迷逺望蕭瑟送寒聲衣潤香偏著書蒸蠧欲生壊簷聞瓦墮漲水見堤平溝溢池魚出天低塞雁征螢飛明暗廡蛙閙雜疎更藥物時須焙舟閒任自横永憂荒楚菊直恐敗吳秔夜永燈相守愁深酒細傾浮雲㑹消散鼔笛賽西成寒食日風雨不已年光胡不少留連熟食清明又眼前敢望深宫傳爉燭可堪小市禁炊煙滿城風雨無杯酒故國松楸欠紙錢老病心情冷時節只將書䇿替幽禪乙卯嵗江南大旱七月六日臨川得雨奉呈仲髙侍郎縹緲爐煙上帝閽朝來一洗汗如焚壠頭無復成龜兆水面初看起縠紋正使夏畦炊白玉未妨秋稼刈黄雲使君憫雨心猶在化得邦人不茹葷吳傳朋送惠山泉兩瓶并所書石錫谷寒泉雙玉瓶故人捐惠意非輕疾風驟雨湯聲作淡月疎星茗事成新嵗綱頭須擊拂舊時水逓費經營銀鈎蠆尾増竒麗併得晴窗兩眼明逮子得龍團勝雪茶兩胯以歸予其直萬錢云道人尤物衆談誇持以趨庭意可嘉鮮菜自無三九㮔龍團空取十千茶烹嘗便恐成災怪把玩那能定等差頼有前賢小團例一囊淡貯只傳家李相公餉建溪新茗奉寄一書説盡故人情閩嶺春風入户庭碾處曽看眉上白分時未見眼中青飯羮正晝成空洞枕簟通宵失杳㝠無奈筆端塵俗在更呼活水發銅瓶家釀紅酒美甚戯作麹生竒麗乃如許酒母穠華當若何向人自作醉時面遣我寜不蒼顔酡得非琥珀所成就更有丹砂相盪磨可憐老杜不對汝但愛引頸舟前鵞諸人見和再次韻爉蚷髙花半欲摧斑斑小雨學黄梅有時燕寝香中坐如夢前村雪裏開披拂故令攜袖滿横斜便欲映忩來重簾幽户深深閉亦恐風飄不得回雪後梅花盛開折置燈下滿城桃李望東君破臘江梅未上春忩前數枝逾静好園林一雪倍清新已無妙語形容汝不用幽香觸撥人迨此暇時當舉酒明朝風雨恐傷神十二月六日大雪薄暮蓬山下直餘笑看六出㸃衣裾絮飛簾外無縈絆花落堦前不掃除松鬛垂身全類我竹頭搶地最憐渠短檠便可捐墻角剩有忩光映讀書八月十五夜月二首玉露金波不可孤相瞻今夕定何如氛埃未净雨湔洗隂翳小留風掃除丹桂看來元了了白榆種得許疎疎一杯濁酒非難事未有新詩報答渠雲日晶熒固自佳幽人有待至昏鴉逺分嵒際松楓樹復亂洲前蘆荻花曵履商聲憐此老倚樓長笛問誰家霜螯玉柱姚江上作意三年醉月華癸未八月十四日至十六夜月色皆佳年年嵗嵗望中秋嵗嵗年年霧雨愁涼月風光三夜好老夫懐抱一生休明時諒費銀河洗缺處應須玉斧修京洛風塵滿人眼不知能似浙江不送曽宏父守天台莫作陽闗墮淚聲丹丘勝事要君聴興公賦裏雲霞赤子美詩中島嶼青天近豈無宣室召地偏猶有草堂靈鑾坡飛上勤回首記取來遊舊客星適越留别朱新仲扁舟緑漲漕渠時解釋離懐正用詩管鮑交朋無變態朱陳嫁娶有佳期長洲茂苑著身久秦望鏡湖行脚宜二浙中間方一水短書莫使寄來遲福帥張淵道送荔枝豈無重碧寳瓶罍難得輕紅薦一杯千里人從閩嶺出三年公送荔枝來玉為肌骨涼無汗雲作衣裳皺不開莫訝闗情向尤物厭看緑李與楊梅荔子百年中半飽聞渠名下親承果不虚可愛風流元有種自然富貴乃其餘肯隨妃子紅塵驛甘伴先生白鶴居可惜不經山谷賞照紅鴨緑定何如髙郵無梅求之於揚帥鄧直閣送臘臘垂盡迎春春欲回如何萬家縣不見一枝梅有客幽尋去無人逺寄來揚州何遜在正用小詩催所種竹鞭盛行獨繞篔簹徑令人喜欲顛已持蘇老節更著祖生鞭旁舍應除地新梢擬上天真成時夜卵煨茁想明年榴花樹隂看已合榴朶見初明當夏豈無意避春真有情花雖後文杏實可得瓌橙病叟緣何喜留苔看落英螢火渾忘生朽質直擬慕光輝解燭書帷静能添列宿稀當風方自表帶雨忽成㣲變滅都無理榮枯㑹一歸蛺蝶不遂春風去仍當夏日長一雙還一隻能白或能黄戀戀不能已翩翩空自狂計功歸實用終是愧蜂房聞宼至初去栁州剥啄誰敲户蒼茫獨抱衾只看人似蟻共道賊如林兩岸侔千里扁舟抵萬金病夫桑下戀萬一有佳音李泰發參政得㫖自便將歸以詩迓之苦遭前政墮危機二十餘年詠式㣲天上謫仙皆欲殺海濵大老竟來歸故園松菊猶存否舊日人民果是非最小郎君今弱冠别時聞道不勝衣次韻王元勃問予齒脱齒危但以粥充虚辜負公家夏屋渠政恐麹生真作祟可憐髯簿頓成疎動揺不減韓吏部蹴踏非勤焦校書落勢今年殊未已祗應從此併無餘荔子六言蕉葉定成噲伍梅花應愧盧前金谷危樓魂斷白州舊井名傳張子公召飲靈感院竹輿響肩櫓啞嘔芙蓉城曉六月秋露華猶泫草光合晨氣欲動荷香浮給孤獨園頼君到伊蒲塞供為我修僧忩各自占山色處處熏爐茶一甌南山除夜薫風吹船落江潭日月除盡猶湖南百年忽已度强半十事不能成二三青編中語要細讀蒲團上禪須飽參兒時顔狀聴渠改瀟湘水色深挼藍絶句自公退食入僧定心與香字俱寒灰小兒了不解人意正用此時持事來讀吕居仁舊詩有懐其人作詩寄之學詩如參禪慎勿參死句縱横無不可乃在歡喜處人如學仙子辛苦終不遇忽然毛骨换正用口訣故居仁説活法大意欲人悟常言古作者一一從此路豈惟如是説實亦造佳處其圓如金彈所向若脱兎風吹春空雲頃刻多態度鏘然奏琴筑間以八珍具人誰無口耳寜不起欣慕一編落吾手貪讀不能去嘗疑君胸中食飲但風露經年闕親近方寸滿塵霧足音何時來招喚亦云屢賤子當為君移家七閩住汪彦章内翰除守臨川以詩賀之臨川内史詔除誰里巷傳聞報客知金馬門深曽草制水晶宫冷近題詩行看畫隼旌旗入定把書麟筆札隨若訪毘耶舊居士無人問疾鬢成絲三衢道中梅子黄時日日晴小溪泛盡却山行緑隂不減來時路添得黄鸝四五聲題友直軒友義䘮未久琢磨復誰能金鈎被采緑絶棄朱絲䋲直哉少稷甫一室清於氷危坐對書帙曲几非所凭日暮無人來疎籬上寒藤惟有手種竹挺然得其朋風低與雪重搶地如弗勝正使可斷折此姿諒誰凌物或亂真贋君其别淄澠攘羊而證父是子烏足稱所以貴温潤不令見觚稜要我細商畧此言有師承龍溪新亭不識梯山路今聞架壑橋蛟龍深窟宅松竹半雲霄子成二老由來非一朝崖藤如暫寄還往肯辭遥子猷橋小艇相從本不期剡中雪月並明時不因興盡回舟去那得山隂一段竒法華山布襪青鞵蹋欲無看山看水未成疎十峰雙澗尤竒處萬壑千巖總不如剡溪竹紙三首㑹稽竹箭東南美來伴陶泓住管城可惜不逢韓吏部相從但説楮先生㑹稽竹箭東南美化作經黄紙叠層舊日土毛無用處剡中老却一溪藤㑹稽竹箭東南美研席之間見此君為問溪工底方法殺青書字有前聞謝路憲送蟹從來歎賞内黄侯風味尊前第一流只合蹣跚赴湯鼎不須辛苦上糟丘山谷以竹夫人為竹奴余亦名脚婆為錫奴戯作絶句霧帳桃笙晝寢餘此君那可一朝無秋來冷落同班扇嵗晚温柔是錫奴放猿孤猿鎻檻嵗年深放出城南百丈林緑水任從聮臂飲青山不用斷腸吟過水東出郭市聲逺過溪山色多稻畦春足雨野水晚迎波客自無軒冕今誰在澗阿相逢不相識歸去夢松蘿寄空同山中道士昨夜清霜重念此山中客落葉聚堆牀暗蟲吟敗壁泬漻天宇肅疎林風瑟瑟曳杖挂詩瓢悠然適所適息心歸㝠漠山深萬籟寂散髪排天闥叱咤鞭龍脊何時共采藥相與對晨夕月夜拱洪崖嘯咏鏗金石三霄亭和韻新亭崛起最髙峯無數遥岑翠掃空恐有謝公留屐齒為開摩詰畫屏風倚江楊栁自髙下照水杏花能白紅正欠渭川千畝竹清隂分借頼鄰翁參雲亭大暑不可避㣲涼安可尋雲亭非濁世竹樹有清隂海近風先集山髙日易沉無因見明月螢火亂更深平橋浪說吾邦小清池詩有餘水風涼枕簟荷氣馥衣裾客侣經過少官曹簿領疎良辰不行樂秋水落芙蕖兩宋名賢小集巻一百九十
