  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0067_WYG_056-1a, image: WYG1362/WYG1362-0673a.png}
body:
  text: 兩宋名賢小集巻五十六宋陳思編元陳世隆補公是集六蟻鬬擾擾嗟何急營營若有侵由來穴知雨非爾旱為霖王伯彊并弱興亡古到今願君推達觀安得異機心㣲雨登城雨映寒空半有無重樓閒上倚城隅淺深山色髙低樹一片江南水墨圗中秋見月㣲風送雨江南去凉月銜雲水上來暑氣頓除秋暗入忽疑浮漢弄槎回雨中送孜入京兼寄諸親舊江外五年别齋中三日留何能慰衰疾正足亂羇愁澤國𤓰時雨淮山桂樹秋思歸與招隠一一謝交游珍簟珍簟平鋪水珠簾半捲風勞生髙枕裏多事劇碁中性癖非朝隠民淳賴嵗豐翛然對松菊但覺訟庭空曬書先祖賜書法帖甚多藏書不滿萬幽蠧亦時除上有朝廷副多從秦漢餘山川迷禹穴雲海隔崑墟持此貽清白歸為林下居墨雲屯雲望如墨萬里横空浮白日變𤣥夜朱明成素秋疾風動屋瓦急雨落河流俯仰駭神化精㣲難與謀蟬㣲軀定誰恨清嘯不知勞屈宋悲秋苦夷齊卧隠髙風林含咽絶露葉動蕭騷何必催揺落人今已二毛登揚州城北門予昔侍親寓居此城下驛舍十八年矣愴然感動昔釣城下水今來十八年居人幾能在里巷獨依然手種成喬木躬耕有廢田悲歌顧千騎不覺涕淪漣臨雨亭秋至感人思登臨成惘然浮雲帝鄉外落日古城邊歸燕聲相别幽花色可憐名山負獨往觸物見徂年勸耕亭晚望田家作田廬非一處小徑自相通日下耕釣息林邊言笑同此雖人間俗獨有方外風吾願畢婚嫁還從擊壤翁和少述題虎丘二首吳墟秦燼滅遺蹤誰見千巖鏁梵宫化作樓臺雙樹外密移天地一壺中石形虎踞森相向劍氣龍蟠冷射空羈宦無由蠟山屐因君詩句夢江東崑閬乘沙不可攀蓬萊徙海去無還寜知勝絶神仙境近在青林紺宇間自淮南遷東平移后土廟瓊花植扵灈纓亭此花天下獨一株爾永叔為揚州作無雙亭以賞之彼土人别號八仙花也或云李衛公所賦玉蘂花即此是聊以小詩記其所從來淮海無雙玉蘂花異時來自八仙家魯人來此天中樹乞與春風賞物華谿上避暑滴瀝松下雨清㣲萍際風欣然此時賞我與斯人同倦鳥墮水上游魚翔鑑中不言閲羣動未覺幽興窮王屯田歸望山别墅岱隂宿雨霽汶北秋風過獨往余所慕躬耕人謂何林間雞黍其日暮漁樵歌却望青山郭應知惆悵多樂郊陳漁臺下柏林中結茅作小亭命曰幽素本懿臣刑部之書也結茅更何好列柏自成林素履宜獨往幽人欣宿心炎暉翳羽葢清吹和瑶琴稍與事物逺忽如丘壑深良無山水樂安得契知音董相江東治後守膠西袞袞諸侯等棄之為問平津相天下尚開東閣欲賔誰受詔候代先遣家人南歸後一日寄内年久漸難禁逺别宵長初信有相思天寒展轉不得寐一夜風吹庭樹枝丙申閏月領揚州與京師諸公别戊戌十一月受詔還閣首尾僅三年爾然原叔伯庸隠甫子竒公南清卿之翰昌言八人者皆已徂謝感之愴然作七言寄滑州正臣密學給事冠葢如雲笑别時亦知陳跡易傷悲歸來未似鍾山醉零落多扵鄴下詩人事可憐駒過隙秋風幾許鬢成絲何須更聴山陽笛欲近西州涕自垂汾州有唐大厯中崇㣲公主嫁回鶻時手跡在石壁上李山甫作七言詩并刻之子華永叔内翰皆繼其韻亦同賦本僕固懷恩女託名帝子與解憂事同錦車西去水東流漢節何年送解憂獨上青山自惆悵彊歌黄鵠少淹留遺蹤不逐哀笳斷麗句空增北渚愁君念平城三十萬謀臣竒計已堪羞白登白登計秘自堪羞相印猶歸曲逆侯安用熊羆三十萬平城更遺子孫憂武帝詔曰先帝遺朕平城之憂飲子華家醉翁不來令蘂英彈醉思仙翠眉紅袖拜尊前撩㺯春聲入四絃坐少車公還不樂為君重奏醉思仙鎖宿禮部中夜口號浮雲不動月㣲明錦帳香寒夢易驚猶覺春風花未發獨聞宫漏出重城齋滿二首長日薰風春欲回啼鸎鳴鴂亂相催不嫌栁絮都飛盡惜許酴醿取次開白日不知天上樂殘芳可惜逐東風誰家酴醿花正發走馬平明㸔醉翁集禧齋宫雨後雨餘風露似清秋燈燭愔愔十二樓高枕江湖時獨往巻簾河漢正西流人間浪逐顛㝠客物外初知汗漫游拂露却趨青閣路蓬萊回顧五雲浮是日事畢仍赴早朝同梅二十五飲永叔家觀所抄集近事陶公一畝宅尤愛北窗風心逺地成僻客來樽不空觀書太史氏全性市門翁予亦何為者扵兹清賞同俞氏甥及第後赴壽春尉送别爾門大父行俱是雲霄人諸孫自駿骨高第復青春試吏小山下還家芳桂新當成我宅相寜肯滯埃塵閣下紫㣲花宫中萬年樹天下紫薇垣此地飛塵隔經時絳雪翻幽香通複閣密影半層軒已後陽春節無辭白露繁探花郎送花坐中與隣幾戲作五首兩郎探花如顧山紅紫黄白俱可憐春風過此即掃地爾復碌碌慰眼前兩郎放蕩不自羈春物寂憀寜得知能讀離騷飲美酒頭白衰翁殊復竒春服始成天氣新沂水風起如魚鱗由來舞詠吾與㸃童子與公凡幾人溱洧芍藥堂背萱濃紅柔緑相映繁鄭衛之風久寂寞坐無詩翁誰使言酴醿薔薇香最竒古人不聞今始知世間此軰復可限零落深林方足悲答景彞對月正惜蟾蜍沈夕靄忽傳鐘鼓送秋晴浮雲四巻無餘迹斜漢西流亦自明危檻釣簾吟獨夕薄衾髙枕夢逾清幽蘭佳菊霑新露的的珠華滿翠莖客有遺予注輦國鸚鵡素服黄冠語音甚清慧此國在海西去中州四十一萬里舟行半道過西王母三年乃達畨禺也四十萬里外孤舟天與隣應夸王母使更過越裳人素節宜姑射黄冠即羽民那將隴禽比瀟灑絶埃塵燈花寒燈不及隣花艷競争新重疊芝三秀分明桂半輪東風誰變律芳意自驚春留玩堪通夕長眉莫效顰聴女奴彈胡琴女奴能為馬上曲一彈一彈復一彈我醉已眠都不醒半天落月㣲霜寒鷾鴯巾余率意作之以便當暑其形制如燕也逺思意而子因作鷾鴯巾處世本遺物全生反近人輕凉便肌髪瀟灑外埃塵山林有獨往此亦陶唐民聖俞挽詞孤宦衆人後空名三十年交游一時絶詩筆四方傳歸旐江湖永藏書日月邊應封史通子他日慰窮泉過湖城誦雋不疑傳作一首北闕公卿如堵墻誰持一語判興亡君知京兆人無及正用春秋侍帝傍同河中府僉判劉狀元延平訪華隂雲臺觀陳摶先生故居是日雲霧不盡見諸峯平舒道士望三峯翠出浮雲幾萬重過客仍迷五里霧真人與致二茅龍正月初五日杜城集雪霽春容滿舊都尋春寫鞚杜城隅氷消流水相縈帯日出南山半有無往事廢興悲故老扁舟沿泝想江湖路人應笑山公醉此興由來屬我徒答校書郎孫侔少述金華勸講愧通經銅虎分憂強請行千騎亦知翁子貴一麾誰覺仲容輕西賔落莫空遺俗北斗闌干有舊城欲作歌秦無與語故人高論久盱衡和御製後苑賞花釣魚詩四照繁英拂檻開九重芝蓋賞春來卿雲共和光華旦瑞露偏凝沆瀣杯池藻躍魚波淡蕩林光傾日景徘徊淮陽閉閣頭今白夢遶釣天惜未陪興慶池送客紅蕖千頃合碧樹百年藤長日宜沿泝清風破鬱蒸别離情易惡衰老醉那能還望邯鄲道悲歌不自勝送彭待制知瀛州趙北燕南如掌平定知臺選寄長城雅歌不廢軍中樂緩帯能令塞外清傾葢由來欣意氣著鞭從此想功名灞池送日邯鄲道倚瑟空多惜别聲戲題薄宦遭百舌不如歸去來提壺沽美酒泥滑滑於苔獨行南山半雲雨天氣雜暄寒野興宜獨往春愁無定端鳥聲來静聴栁色入雲㸔却謝芳樽酒悠悠誰與歡晦日是月佳辰勝兹游舊俗同會須陶一醉相與送諸窮江栁參差緑林花㸃染紅春期猶大半作意競東風風雨春光從此半無復強淹留風雨仍何急鸎花各自愁登臨非故士揺落似清秋物物驚人眼應須與醉謀潞河此水自代北來正為潞字疑赤狄嬰兒所居近之飲馬長城行且謡雕鞍金勒映春朝潞河正月氷都盡不惜障泥走度橋立春後逰杜城陳丞相郊園韋杜勝逰誰可尋相君舊隠對雲岑氷渠婉轉蛟龍活霜竹參差孔翠深故老能言卧龍地兒童不用滿籯金郡齋殊負青山郭空挹芳樽慰客心古詩朝離青山郭暮宿青山上青山不可上步步常惆悵謝朓亦云不對芳春酒還望青山郭兩宋名賢小集巻五十六
