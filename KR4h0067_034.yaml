body:
  text: 兩宋名賢小集巻三十四宋陳思編元陳世隆補竹友集次劉世基韻兒時窺豹見一班晚學一枝千金殚齋房芝草不並秀且餐秋菊紉春蘭無心時共白雲出忘機日對沙鷗閒窮人與世各異調敢望一唱仍三歎昨來卜居向巖邑玉川破屋纔數間朝看爽氣出逺岫夜聴遶舍鳴清湍㡬回欲棹酒船去賀老不見空稽山劉郎好事肯過我入門矯矯真翔鸞平生飲客愁腐死望君復來酒今㫖君如止酒要談道同酌寒泉靜無滓哦詩雖復落君後强學猶將效矉里懸知吾廬不落莫有客同盤飯葵藿已呼纎手縫錦囊更遣長鬚且芒屩相攜踏遍翠雲峰得助溪山應有作王摩詰四時山水圖欲知摩詰詩中畫桃紅栁緑皆摹冩更含宿雨帶春烟一段風光生筆下欲觀摩詰畫中詩小幅短短作四時山平水遶含變態是中有句無人知此公盤礴萬物表胷中炯炯秋空曉戯磨淡墨汙絹素世上丹青擅場少何人乞與輞川圖裝成小軸四時俱壁間仍題六字句人言雙絶古今無同陳虚中洪駒父登擬峴臺觀水漲雨聲何浪浪溪流勢洶洶莽蒼兩涘間不辨馬牛風翻疑坤軸裂渺與天河通林杪露寸碧濁浪奔蛟龍櫓揺扁舟下䄂手閒篙工踈烟媚晚霽飛雲帶歸鴻境物復可冩妙手無僧崇登兹百尺臺令人豁竒胷尊開河南守坐有西山洪游目託遠懐平水念禹功視河不治行他日望兩公吾儕何所樂白首卧船篷送邑尉朱登仕告老歸華亭用玉局老仙寄王慶源韻君不見黄冠還鄉乞鑑湖又不見拏舟送米煩胡奴白頭真負平生志妙年毫端敵萬夫向來惡少虎負嵎職當疾走編其鬚袴鞾不是老者事腰間羽箭吾初無揮盃勸飲古寺底日有野老争攜壺頗遭官長勸歸歟婦能右擯兒左扶但令妻病足鹿脯何憂兒寒止熨𥜗蓴絲作羮鹽未下鱸鱠切玉秋不癯華亭自昔傳鶴唳蕙帳後夜聞猿呼不是人間冶容子團圓十五正當壚晏如堂詩并序季智伯渠州使君大夫公之長子也早以學問稱其家兒不幸壯嵗失明不能世其禄洽問強記於書無所不通尤愛淵明詩嘗使細君誦之至㑹意處擊節不能已舊以女家人木蘭隨其後木蘭既辭去常扶杖獨行逍遥自適客至必具酒與之商論古今飲酣興健仰天而歌顧未嘗以貧病攖其胸中也廬山李商老命其所居之堂曰晏如且作銘號智伯晏如先生可謂名稱其實矣智伯求予詩為賦雜言一篇西都執㦸郎田少家無儲雖云貧賤不戚戚著書防患何多虞柴桑避俗翁寢迹安吾廬如何更作貧士詠更賦楚調長嗟吁乃知兩賢蒿目憂世患不如先生無目自晏如朝哦詩千首暮對酒一壺木蘭能歌作行雨但聞龎婆時誦田園居閒擕笻竹自索塗醉或起舞嗔人扶幅巾深衣端可畫每嗟伯時何在無人圖往日山陽徐仲車不聞世事惟躭書使君早興合堂坐誇今弹古定自娱徐能開口論事以難客君當書空作字以曉徐吾知二人可同傳不知細書太史今誰歟題吕隆禮詩後岐山鳯多雛鳴必中律吕乃知忠厚家要作謙退語申公三世後有子筆甚武四公如日月映照萬萬古此郎膽如斗一筆要連拄不知秦陳軰渠欲置何許他年品斯人戰國一豪舉次洪駒父游明水韻薖也學耐辱況負三宜休頗有㓜輿風自許􅊤與丘仙境想方丈山形懐不周如何在眼山未暇著屐游蓊鬱明水峰爽氣常不收遜公釋門老苦節無匹儔食訖自灌畦挈水端若抽到今巾屐在迹勝境亦幽常評左轄賢當從古人求從政獨何有未説賜與由勸耕遍阡陌民謌殖田疇幽尋到山寺弭節聊滯留家賔各文采粲粲五楘輈賦詩雜流麗如栁春映溝何必打兩槳歌舞催莫愁聞風我滋晚尋勝行且謀朝游可暮返豈曰山川悠咏二疏辯如懸河陸大夫不畏嫚罵談詩書歸來分槖養羣雛隨從歌舞樂有餘兩疏高蹈要齊驅長揖儲君歸里閭願為羽翼還商於豈願飛刀鱠生魚揮金延客以自娱子孫勤力舊田廬同時異代多不如高明長遭鬼揶揄平明爭入七香車華屋擬用黄金塗壯心雖在逼桑榆長歌擊碎玉唾壺官成名立盍歸歟江湖之士可胥疏君不見渠家父子並轡出東都於今粉繪冩為圖集菴摩勒園會者十人以他年五君山即席分韻生涯水中萍漂蕩信所之十年糊其口不食故園葵思歸同越鳥長是巢南枝祭竈郭北隅小屋如雞栖園開十肘地草木發華滋紅榴媚夕陽初篁揺輕颸招我賞心舊於焉持酒巵合離如日月果有弦望時詩壇失老將一鼓氣已衰頼我如虎賁典刑猶在兹相歡且盡醉莫詠驪駒詩聞無逸兄下第豐林分首各消魂兄弟傷離況玉昆初謂過都留虎脊又令㸃額向龍門往聞淮北雪花大歸值江南梅雨昏欲寄短書無别語年來花栁自村村李簿家有侍兒妙麗善歌舞諸人惜其死為賦詩予亦賦二首草頭朝立露溥溥樵歌暮歸丘隴寒當時座上客半醉琵琶不許近簾弹郎子風流栖枳鸞枳上单栖泣夜䦨窻前邂逅一笑粲夢中猶作在時看久旱喜雨誰言旱魃虐敢奪雨師權瀰漫溪流漲瀾翻屋霤懸占年豐䆉稏快意滌柈筵疎懶知何幸茅齋穩晝眼植菊憔悴靈均老蕭條子美醒飱英謀自潔摘蘂恨猶青事往成今古人亡尚典刑老夫今白髪頼汝制頺齡有懐如璧道人二首道人詩思㵼江湍乞食侯門鋏屢弹鋪褐卧雲何處去不應投老累儒冠每憶詩人賈䦘仙投冠去學祖師禪塵埃不染心如鏡妙句何妨與世傳寄王立之二首坎壈修門裏蕭條處士廬憎人玉川子憤世竹林書家有來禽帖門無載酒車諸公生死隔不是故人疎舌本初傳强仍聞右臂枯經春一旬卧見客二兒扶吾道何寥閴夫君合洗蘇世無湔浣手藥味且時需贈别董彥速四首人間底處異蘧廬莫莫堂中豈定居我尚滯留君去速荒園三畝夢歸歟多謝清風日掃庭與君同種菊青青開花爛漫君何在莫忘蕭條我獨醒欣同衆鳥託吾廬投杖行當歎索居不是酸寒孟東野吾言能聴果誰歟機事都捐憶大庭茅簷相對眼俱青期君别後文章健往弔沅湘屈子醒次韻無逸兄見示憔悴誰能賤大招㑹將菌桂雜申椒巷南鄰里頻相過水北山人詎可邀細酌敢謀長袖舞苦吟空咏寸岑遥耕耘頼有陶潛婦不美孫郎對大喬次汪信民寄無逸韻詩翁索莫閉門居珍重山陽信不疎但報七言當玉案何須千里駕柴車樂天官滿應歸早楊子家貧只晏如他日往來隨二老共甘盂飯與盤蔬送酥魚頭醬菜與何之忱三首和蜜煎膏學甕酥兒誇甘味比醍醐老夫舌本不知味強解嘲為羊酪奴放浪三江又五湖頭顱見醢亦何辜世無剛者不用覆往侑一觴隨蜜酥甕底寒酥冬作葅春來把酒必時須庾郎鮭菜二十七還得何郎下箸無立夏日作四絶雨脚連雲苦未收曉驚池面日光流田家甑裏封蛛網即漸歌謡麥有秋小簟含風六尺牀竹奴從此合專房吾身瓠落都無用占得山間一味凉熨得絺衣一番新幅巾輕軟最宜人花時氣暖長愁夏竹裏風㣲又勝春學作蒲葵扇未工手揮聊有古人風君王别用機中練定被南來長養功寄劉世基用世基寄之忱韻斵堊誰能鼻不傷虎賁何取似中郎吾人身健間何濶誰日書來喜欲狂華屋不存長念昔用文靖事金蛇雖在莫干梁用劉氏事㡬時燒燭留君語更向東窻置一牀招李商老兄弟時聞權守陳公留之未聴其來十年不見令兄弟眉宇長懐元紫芝栩栩夢魂我獨往翩翩書札慰相思求船貨馬事應速酌醴焚魚吾豈辭政恐孟公投轄飲惜君高論解人頥次劉世基韻孔子已傳三十八諸孫猶自見長身試將後謝追前謝豈料今人愧古人華子岡頭千叠秀劉郎詩律一朝新吾家碧澗紅泉句聊欲煩君作後塵用前韻和董彥速得句可傳千古意搜竒攻苦百年身河梁贈别初無對錦里吟春復有人我已汗顏驚手縮君猶瓊樹賞朝新從今習氣須磨盡二字惟當悟客塵夏日書事二首蒼虬蟠礎濕生雲翠竹揺風水有紋凉卧北窻呼不省蟲飛遶髩夢中聞雲峰矗立駐金雅夢㫁槐宫影未斜屏翳御風游不返南山空轉阿香車余嘗㑹李商老於海昬識吕居仁於符離今已五六年矣偶見二公倡和詩各次其韻二首憶昔逢君夜雪中高談未了酒尊空清漣緑篠今輸我白璧黄金政負公渭水流清終異濁池花變碧舊曾紅欲評此意君何在長是蒼茫立晚風右寄商老維舟濁汴偶相逢弹鋏歸來四壁空耕道十年常九潦謀身一國自三公似聞諷諭能知白豈但詩詞要比紅申國凛然生氣在故知郎子有家風右寄居仁兩宋名賢小集巻三十四
