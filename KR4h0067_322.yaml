body:
  text: 兩宋名賢小集巻三百二十二宋陳思編元陳世隆補臞翁詩集改周晉仙贈丁相士之什張顛許我以神仙薛顛謂予可英傑丁生謂二俱無成世間那得此奇崛麒麟閣上森貂蟬龍虎鼎内飛大丹腰錢跨鶴誰不願只有圮下先吾鞭何如吴松江上住門横釣車屋農具卧看蒼虬擾白雲正午堂堂㧞江去奉寄旌德尉劉申之諸劉兄弟賢一一無可選竹林鋭頭郎風味吾小阮平生天機深善閉得内楗邇来卿何曹不辨折腰本稍傳詩語東朝日照蘭畹伊余戰紛華心斾凡幾偃劃逢君家語雋永初一臠識遺飽新得友勝悟夙損緬懐歌商地蕭瑟松磵遠陰陰蕪菁花碧蝶相與晚是中着高士物意自偃蹇向来白衣宰雲壑論補衮優游濟艱難如以禹代鯀劉郎秀眉宇秋隼立高巘端能謝師匠萬巻自鉏墾時須閲世諦一及城門鍵功名頭上簮日月風中􅎻何時會吴下春動長洲苑送王郎洽車輪何由方草色欲無路晴川媚雙燕及此送將去若人天機深奇服雅自與色温無可飾語妙時一吐相逢大江上為我浣塵土後期豈前料已作千歲語告歸何草草雙水深霧雨稍聞父老舊門户要渠補祗愁模楷地與世作誇詡寧當去樓梯閉置吾叔度翼翼吴齊門大江流日夜别君雖咫尺即是風牛馬君才何如我我拙猶肯借淮人買繡絲布洲市如赭張皇十日飲著公喬松下畫工亦豈學愛玩此粲者人情勿苦拒輿馬幸整暇向来三宿戀取别萬里駕想當雙玉瓶酣歌淚盈把縹緲鴻鵠去吾甘老原野次韻張長公寵賜初度致禱之語何人著書補獲麟竹汗未乾頭已星天上風流張公子散髪滄浪歌獨醒威名徧滿淮草木肯借妙語春㝠靈臞翁之腹無三壬平時貯書纔一丁泥塗斷道學龜曵雲天潑眼慙鸞停亦知封侯下曹掾寧與阿堵高寧馨夢從諸兒坐家塾十年燈火寒青熒分無黄色明天庭獨倚一片藏無形虞翻骨相當自程曲江風度乃不名上閩帥范石湖五首人物于今正渺然欲從江表訪先賢邇来耆舊無新色誰使文章漫兩川利器早能誇頴脱偏師聊復制中權騷人有幾登青竹耐可同時欠執鞭今代論文更是非賞音誰復得牙䕫真從長慶成編日便到先生晚歲詩萬馬蕭蕭閒律令孤峯隱隱出旌旗了知長短三千首收拾餘師即我師丁年口伐真奇事一代詩鳴不救貧大手欲推浯水頌羣酋曾折石湖巾乃今謝傅還初志其奈王陽是故人獨有吾閩欠公句詔書果起釣磻濵此行閩嶠吾能數行盡天南未了青莫倚看山韜墨本要須入界挾圖經西湖楊桞雲生鏡東阜離支錦作屏欲託翁冰烏石篆請公作屋與新銘蚤知吴下多名士身許先生嫡子行他日畧容追李杜斯文何敢望班揚向来流水孤三奏此去飛霞乞一翔牛鐸調宫吾豈敢噓濡萬一借聲光代人壽度支郎中李嘉言李下老人龍作儔談經閲世無春秋一朝函谷占紫氣萬里西極行青牛青蓮居士亦其裔太白淪精来謁帝江東狂客漏神機一號謫仙人得制天人驚世時一斑文采風流有逺孫百年斗酒真細事郡有德政朝功言晉陵坐嘯列城祖一札細書風九土為郎不用漢山錢度支事煩通會府向来供億寛艱虞祗今笏畫通材須裕農足國端有道判花視草皆夷途金魚玉帶公所有太夫人高松栢壽綵衣板輿堪作圖贔屭閬州陳母後人間盛事省見稀王母一笑攘桃兒花明桞暗白日靜鶯穿燕颺青春遲請君酌比西湖水萬歲千秋佐天子清明寒食數日間謹勿抛擲為佳耳登蘇臺用袁憲韻贈兩趙提幹汝積幼聞勝賞多從暇日違眼中朋友欲星稀退休不復思三顧能賦猶堪廣七依遊鹿臺前空逝水栖烏曲裏只斜暉書生懐古真癡絶看盡閒雲入棟飛次韻萍鄉文叔章訪别力田望逢年倚市勝刺繡十年邱里語失火要自捄君行半天下何處得耆舊請從老龎説龍鳳相赴凑全家隱鹿門遺安不求富常時拜牀下大鐘盡徐叩男兒唯一身用在百歲後譬如營屋室宗廟先庫廐不聞買山隱而有居巷陋君看鐘鼎家粱肉或墨痩寧為賣文活一經老學究出身即九折時命乃大繆向来尸裹革口語困逗留居然齒編貝月粟供賃僦何知山澗底鹿豕對飯糗文章忌隨人謹勿誇客右書林無淺植筆耒有深耨紛紛青紫楦後進渠領袖結交兩任昉設客一陰就卑官慚處贈俚語致公壽高郵因師葡萄蘆雁秋𤓰三種漢家士馬知多少晚得蒲萄繞院栽何物支郎能伎倆龍鬚馬乳應時来蒲萄莫話淒涼塞北秋銜蘆避弋使人愁與君細展江南畫水宿沙眠得自由蘆雁子母鈎牽曉露漙行人暍暑慰艱難青門種色今餘箇莫作黄臺秋盡看秋𤓰用香字遺李恭叔我無令君三日香痩鶴為軀龜作腸薄寒中人曵兩縰獨吟猗那遺我將憶從兩脚萬里囘政坐羣兒相謗傷朅来一見老柱史城郭落落巋靈光安得與君壽六龍探借千歲北斗漿却乗斑虯訪月窟盡斫惡樹無留藏天風泠泠吹珮環洞視碧落豁四旁下方應奉正三入閒置可憐青瑣忩再用晨吐字韻寄潘德久舎人賔日姿起居庭燎晨豈惟瑞朝廷薦紳日多聞就如田甲嘲死灰果不然那知碩果剥中有一捻仁稽古得微酬櫑具峩進賢琴為悲風彈茶必活水煎平生轉菴詩小當壽千年忽聞朔方騷更欲腰黄閒向来撲朔豪日者今華顛下客時覘君車茵陽醉吐萬事君不理傳聞拒開户雖然臭味合更覺心貌古書讎嶧山棗羮臛首陽苦坐令府西門平輿平聲説二許君當我輿臺銀艾心已灰尚有西山縁共待石髓開神仙覺易與詩句端難裁却後五百年化鶴吾獨来酬答李學長海門縣學有三忠堂陳了翁任伯雨龔夬兩簿廨負墻甚邇夫子焉不學高朕羅三賢横前一片石教外皆别傳三虎誰最怒未覺相後先渠伊囊中方貴在後者鞭我家一佛堂盎背知廟堧憶昨祠上丁蕡燭初欲燃諸生氣清明人如出雩泉洗爵俯象鼻掩豆高豚肩朱絃張文王繁聲斥師延此時識方屨綦滿青苔錢李公獨鳳儀衆中得何堅惜無補天手轉之上細氊朝来食盤中穉蕨初數拳蒼蒼本難測何由頥真筌自我得此士可以一當千如聞縫掖姿欲重世所捐舂容吐握詩法用春秋全酬贈無玉案三復緇衣篇大風懐林伯農江湖易高風六月寒廪廪中宵會急雨涼意到衾枕顛披蒲葦亂抑壓烏鳶噤禾頭欲生耳樹背各流瀋不謂晡来霞横拖半天錦初疑鴉翻晴旋覺虹投飲晦明信難料暘霽吾誰諗所思隔江水筆力望徐沈十年一葛衣肘見尚整衽想當風雨夕憂國願歲稔淒涼新豐邸避濕幾違寢何由語連牀共破秋風凛醉歌贈鄒孝忠老鄒草檄如吹律能令陰谷回陽春手提赤心獻天子布衫麻鞋驚市人戈船上噓五里霧詔發内府捐金銀進賢冠者不好武歸来結屋看濤雲却囘孤憤與江浪氣壓千人萬人將或時飲就夷門屠亦有撾摻漁陽唱埋名袖手君得辭行宫今在江之湄高帝遊魂正思沛太王有道聊居岐一杯屬君當起舞能令公喜令公怒捽摩青山鬬兩虎捜攪中流鵝鸛語平生未受噲等伍圖中褒鄂爾如許六十小刼敵運去老上單于公手取次韻張宰牡丹羯鼓勿罷弄吾琴無成虧潘桃旣無賴陶桞自不持造物有鑪錘攬之杜拾遺巻簾出傾城一笑不用帷輸心巧當面珍重来如期人為曲江秀花自潛溪移美人欲晞紅鏡中靦東施如聞姚魏風紅紫合折枝常恐砑光帽半倒金屈巵作詩苦留春出吻竟不奇但當闃幽間屬賦歌載馳殷勤禪靈錦丈尺餘邱遲公杯當再行雉邊多小兒上鄭參政四十韻乙亥吾閩天下選人傑聖時蕃佐戴高前牒承家裕後昆海門當劍立洋嶼焱鵬騫氣色来廻互耆明有討論蟠胷三萬巻落筆五千言地芥垂頭拾天瓢信手翻餘陰潤桑梓賸馥到蘭蓀白日騏驎坂青春桃李園揚鬐方澤國挿羽已天閽伊昔昌能諫于今𢎞獨尊夙驚山有虎已騐鹿隨幡帶草書籖麗金華講舌存履聲仍獨上驛置愈爭奔有客迷途甚勞公倒屣煩請先陳失馬次第説投猿漳水頭堪白融峯淚幾吞嵌崎辭故里觚角見修門到遞吳蠶宿留交楚雁畨忽通狂客刺俄返獨縲魂望禄蒲生節隨人桞折圈天高難發口地縮會移跟一昨哄堂暇深知納牖恩印刓聊小靳緼束更能温日者叨堂貼時哉會氣元敢言矜騕褭復自妬嬋媛末學應須授羣經剰欲繙恐因鱣發發復作爰爰光範寛無閾階符紫有垣極知專造化稍許展寒暄國論圖南紀邊防議北轅未將蟊火畀忍使彗旗燔天步曾留跼皇心重改幡房奩非久秘藥籠會深掀豆棧能忘秣樗材儻入掄略容偷廩稍重議洗乾坤舉邑多狺犬深心寓祝㹠老身難矍鑠疾眼久眵昏合浦珠無脛豐城劍有痕事多慚蹇叔議敢及臧孫餘日知安在南村定北村體齋詩為梁谿馮季求作口腹不自主来吟體齋詩三肅齋中人安體安措辭體卑語近拘體高語近欺耳目口鼻形人各師其師要之天地間當以一理推馮侯好兄弟一一清廟姿是家好談道脱畧毛與皮一當春愔愔詩禮相娱嬉但媿遠客塵涴子連理枝雖然參自訣要知不磷緇我車得國工分路有險夷君知魯叟聖妙在物不遺當其作春秋一字如權錘越境惜趙盾斷謂此語非俗儒無已心望道如隔紕閉門畫圓方用世多參差千載堪一咍汝足未及巇馮郎顧我笑坐久爐烟遲黄花粲墻東青山轉墻西吾言亦已費須君浮一巵予客崑山得薦嚴長老時道人散朗閒逺不交人事心甚敬之今来海上復得悟公老成疎練能言吴中山水人物甚詳東軒種竹如雲不問其人可知也一日忽起故山之想予語悟野田荒草在處愁人心目安能復作溈山之牛乎因作一詩言君子出處之大致以告不知者平生庾公塵可涴通州泥朅来海門上日痩氣慘悽春風有相導佚我以闥閨前身定聞法夢作三生猊悟公癡鈍禪迎客忽虎溪招要得半席紙帳春繒綈東軒養蒼雲大似開昔迷計程南山北託宿東院西絶憐維摩牀而置法喜妻是身於虚空了不礙角圭四大師本無客亦何所攜頗聞弁山隅髯松作兒啼山神喝連聲已受三十箆豈知溈山牛未知靶與犂去来同一雲未覺道理睽幸勿使竹歸留與老鳳棲鑿齒恐無對後期當噬臍兩宋名賢小集巻三百二十二
