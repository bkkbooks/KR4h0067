body:
  text: 兩宋名賢小集卷一百三十宋陳思編元陳世隆補明道先生詩集程皓字伯淳其先世居中山曽祖而下葬河南遂為洛陽人父昫神宗朝大中大夫皓生而秀爽舉進士歷鄠上元主簿晉城令専尚德化熙寧初為御史裏行論新法不合去後又知扶溝縣坐獄逸囚責監汝州稅哲宗立召為宗正丞命至而卒以道學鳴世稱明道先生後諡純公封河南伯逰紫金山仙掌逺相招縈紆度石橋暝雲生澗底寒雨下山腰樹色干層亂天形一罅遙吏紛難久住回首羡漁樵題安樂窩打乖非是要安身道大方能混世塵陋巷一生顔氏樂清風千古伯夷貧客來墨妙多攜卷天為詩豪剩借春儘把笑談親俗子德言猶足畏鄉人送吕晦叔赴河陽曉日都門颭斾旌曉風鐃吹入三城知公再為蒼生起不是尋常刺史行修禊事盛集蘭亭舊風流洛社今坐中無俗客水曲有清音香篆來還去花枝泛復沉未須愁日暮天際是輕隂春景雲淡風輕近午天傍花隨栁過前川時人不識豫心樂將謂偷間學少年題淮南寺南去北來休便休白蘋吹盡楚江秋道人不是悲秋客一任晚山相對愁秋日清溪流過碧山頭空水澄鮮一色秋隔斷紅塵三十里白雲紅葉兩悠悠郊外即事芳原緑野恣行時春入遙山碧四圍興逐亂紅穿栁巷困臨流水坐苔磯莫辭杯酒十分勸祗恐風花一片飛况是清明好天氣不妨遊衍莫忘歸秋景間來無事不從容睡覺東窗日已紅萬物靜觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不淫貧賤樂男兒到此是豪雄逰月陂月陂堤上四徘徊北有中天百尺臺萬物已隨秋氣改一樽聊為晚涼開水心雲影間相照林下泉聲靜自來世事無端何足計但逢佳節約重陪雎陽五老圗大道剛明孰肯間拳拳心志尚遺冠飯蔬飲水時行樂定禮刪詩國建桓終身戀闕存忠厚薄味供先表蹇寒鴻鈞幸得循清運餘烈憑人仔細看兩宋名賢小集卷一百三十
