body:
  text: 兩宋名賢小集卷五十九宋陳思編元陳世隆補梅諌議詩集梅摰字公儀成都新繁人舉進士稍遷太常博士知蘇州二浙飢官貸種食已而督償之摰曰貸民所以為惠也反撓民可乎奏請緩期輸之慶厯中為御史權知諫院元昊納款石元孫來歸議者欲援赦釋之摰不可曰元孫不能死行陳今不誅何以厲將臣哉李用和除宣徽南院使不數日又除同平章事摰言國初杜審瓊國舅也官止大將軍李繼隆功臣也晚年方得使相陛下豈可以名器而私外戚哉又言張堯佐緣宫掖以進恐上纍聖德仁宗曰梅摰言事殊有體為三司户部副使以事出知海州徙蘇州入為三司度支副使拜天章閣待制陜西都轉運使遷龍圗閣直學士知滑州州嵗調民以備河民甚困摰以兵代之而民獲休息入知三班院出知杭州仁宗賜詩以寵其行徙江寧府拜右諫議大夫移知河中府卒年六十五摯資性純厚不為矯厲之行平居未嘗問家業云昭潭十愛我愛昭州水湘漓共一源本無泥滓汚去有棹歌喧沃野藤溪道浮琛玉海門有時新雨漲多半是君恩我愛昭州士平居富孰庠興賢尊漢詔論秀美周鄉藝苑蒲開堞書堂縹結囊蟾宫前後進一一手間香我愛昭州觀裁基壓大溪一樓雲駐隱雙表鶴歸迷金剜先朝語鸞驚舊使題皇恩新雨露祈福為蒸黎我愛昭州寺東西占景開門臨九峯列僧自五天來講次花飄席齋餘鳥下臺萬民共行樂終宴首慵回我愛昭州路優遊不險﨑九疑通舜野八桂繞秦祠亭堠相望處漁樵有讓時政無牙虎鬬莫信義山詩我愛昭州角嗚呼右郡衙萬愁縈桂水一曲阻梅花調古湘雲叶聲乾嶺月斜今愁并古恨吹起落誰家我愛昭州月間宵入綺樓涼生荔浦樹冷尉桂江秋朱户千家啓浮雲萬里收誰誇魏公子飛上鄴門逰我愛昭州樂供官不在多薰風齊樂聖淑氣且宣和謁廟知神格鋪筵喜客過聲邉無一事對酒漫高歌我愛昭州酒千家不禁燒縹醪一爵舉瘴霧四時消紅葉和雲踏青簾傍水招化濃民自醉鼓腹日歌堯我愛昭州果西東此擅珍荔枝登宴美桂子薦盤新映樹珠含影承牙玉溜津二行逰宦樂滿腹嶺南春兩宋名賢小集卷五十九
