body:
  text: 兩宋名賢小集巻二百宋陳思編元陳世隆補林泉結契五王質山水友餘辭㜑看蠶色黒似屈陸兒雄者先如云㜑看蠶一百箔絲車輾轉雌者次如云作田作掘又來掘初夏多鳴一百箔二百箔千百箔遍村落官絹不厭厚私絹不厭薄㜑看蠶婆看蠶蒲桶荷包共作田晚豅秋風揺稻髯鶻嘲身全褐觜足皆黒似畫眉而大罕定蹲且䌓鳴聲焦急又號鶻鵰鶻不挾鵰不劂各徜徉毋狨獝一愁撦花裂二愁踏花折鶻嘲鶻嘲相呼竊脂并慱勞同尋念佛婆羅巢銅觜身灰褐腹白觜足皆黄雄者腦黒翅㣲綠正旅立忽隻起人以揺時以石蠟粘取之不銀眉不金翅尋稻粱搬草子啄花蠟觜獰啄粟銅觜紫銅觜銅觜春環春嚶好兄弟春喁自飛莫同隊涴鳴身全綠腹白間黒細㸃花觜足皆黒幸䝉寵聊舂容有水礦無缺筒雪姑擡揌缺巧婦堅正翁涴鳴涴鳴尋花尋栁無山無䌓隂漸合春糢糊黄頭兒身全黄足白或黒腹白夏多鬬秋稍息鏖戰至死不聲以作聲為負山鮑老甘受嘲山婆婆借得驕􅀈子來解腕大頭來間交黄頭兒黄頭兒白黄頭兒有老時鴉線靴頭相伴飛綠毛龜殻褐背生綠毛如青苔甚小菖蒲盆豢之可觀次金線次黒文金線亦小黒文皆常品有絶大者産缺似太平似開元雖垂老不踰錢只愛綠苔淨弗愛金絲鮮綠毛龜綠毛龜三三八八總不知徜徉露蔣風蒲稀秧雞身全黒觜足皆黒似雞而小聲清㣲水滿秧生則多集望水白鴈來黄隔山拖先拖秧夘子何日圓馬牙何日長秧雞秧雞兩濠狹溪成濶溪螺螄蠼子澎澎肥水澇子身褐腹白觜銳尾細長似䑕而小依湖岸或湖草為窠又號湖䑕一種竹䑕全與湖䑕不類多傍竹根為窠獺最黠䑕更㸃知水情識水􅍺荷花不禁掐稻花不禁掇水澇子水澇子鷃濫堆隨江風起自㐲秋莎噆秋水水划蟲身褐腹白四足兩鬢浮水啑草泥輕跳極駛人呼水馬兒足為櫂鬚為橈舴艋子何多勞黒油急旋旋玉掌輕揺揺水划蟲水划蟲鸊鷉鷖鴨同從容寛陂緩波無㸃風水蛾兒身灰白頭黒四􅛺六足如蠶蛾而小掠水啅飛蚊為食任霜葉任霜花啑飛蚊味亦佳浪穏無弩狐波平無鈎蛇水蛾兒水蛾兒石婦春風放盡絲松根共掠蘋花飛刺椿花紫如茱茰莖褐通體皆刺獨樹無旁枝梢短苖從顛生如皂莢芽可食喚春呼恨春呼莫錯呼非茱茰前林迎榆郎後林接榆姑刺椿刺椿㸃禽掐捖餘姑存土卵蕨雞無宿根金櫻子花白葉青實黄如山梔而多刺夏殻韜滿可食深秋尤美冬入藥甚力又號刺梨子薔薇花揾挬實多缺津浥浥椰子亦成酒縮砂亦成蜜金櫻子金櫻子速挽菖蒲出溪水仍招茯苓并逺志甜藤莖淡褐葉青味甘傖人加苦芙雜米為團當初春時多食過上壟即止又號甘藤元姓甘不姓丁引清風含常春雞翁呷甘露祁婆挿金稜甜藤甜藤粥香餳白度清明一片春山快活聲苦菜花黄似野菊葉青如苦苣而小莖淡褐似燈心草而大深春莖葉皆可食又號游冬經寒不萎然不堪食王𤓰後靡草前荼却苦薺却甘缺毋花哆哆龍葵葉團團苦菜苦菜空山自有閒人愛竹筯木瓢越甜缺甜蓷花白葉青樹甚壯秋結實殻黒肌白人呼烏圓子苦者殻褐皆類栗但無刺花成穗子成毬雅相似終非儔毛栗低坡尾缺栗髙岡頭甜蓷甜蓷秋後秋樹倚斜暉苦者擲與看牛兒蓼米花紅莖葉皆青多節花謝子結如粟可食晚秋人多採又有苽米蘆米葭米草木實間有韞米者御米甚佳蛇米不可食無馬纒無蝦鬚羅裙帶色色無願花變流沙願花變穿珠蓼米蓼米秋風易揺入秋水太平中期難屈指水芋頭莖葉皆青葉圓而大春深水生則抽莖可食根如薑芋外褐中白不堪食不粤卵不岷鴟雖沉波堪作魁葧薺葉槎牙芥蒩苗整齊水芋頭水芋頭江湖百年無一愁南灣北灣皆膳羞蔞蒿莖青近山多赤葉亦青杉冬發土取啖多土氣初春抽莖清脆可食盛夏成蒿能辟蚊皤老白角子烏爾未萌我已敷蘆笋茁戢戢荻笋抽氍氍蔞蒿蔞蒿風枝雨葉老蕭蕭草堂黍民不得驕兩宋名賢小集巻二百
