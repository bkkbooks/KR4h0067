body:
  text: 兩宋名賢小集卷二百宋陳思編元陳世隆補林泉結契五王質山水友餘辭婆看蠶色黑似屈陸兒雄者先如云婆看蠶一百箔絲車輾轉雌者次如云作田作掘又來掘初夏多鳴一百箔二百箔千百箔遍村落官絹不厭厚私絹不厭薄婆看蠶婆看蠶蒲桶荷包共作田晚豅秋風搖稻髯鶻嘲身全褐觜足皆黑似畫眉而大罕定蹲且繁鳴聲焦急又號鶻雕鶻不挾雕不劂各徜徉毋狨獝一愁扯花裂二愁踏花折鶻嘲鶻嘲相呼竊脂并慱勞同尋念佛婆羅巢銅觜身灰褐腹白觜足皆黃雄者腦黑翅微緑正旅立忽隻起人以搖時以石蠟粘取之不銀眉不金翅尋稻粱搬草子啄花蠟觜獰啄粟銅觜紫銅觜銅觜春環春嚶好兄弟春喁自飛莫同隊涴鳴身全緑腹白間黑細點花觜足皆黑幸蒙寵聊舂容有水礦無缺筒雪姑擡揌缺巧婦堅正翁涴鳴涴鳴尋花尋栁無山無繁隂漸合春糢糊黃頭兒身全黃足白或黑腹白夏多鬬秋稍息鏖戰至死不聲以作聲為負山鮑老甘受嘲山婆婆借得驕􅀈子來解腕大頭來間交黃頭兒黃頭兒白黃頭兒有老時鴉線靴頭相伴飛緑毛龜殼褐背生緑毛如青苔甚小菖蒲盆豢之可觀次金線次黑文金線亦小黑文皆常品有絶大者産缺似太平似開元雖垂老不踰錢只愛緑苔淨弗愛金絲鮮緑毛龜緑毛龜三三八八總不知徜徉露蔣風蒲稀秧雞身全黑觜足皆黑似雞而小聲清微水滿秧生則多集望水白鴈來黃隔山拖先拖秧卯子何日圓馬牙何日長秧雞秧雞兩濠狹溪成濶溪螺螄蠼子澎澎肥水潦子身褐腹白觜鋭尾細長似鼠而小依湖岸或湖草為窠又號湖鼠一種竹鼠全與湖鼠不類多傍竹根為窠獺最黠鼠更點知水情識水􅍺荷花不禁掐稻花不禁掇水潦子水潦子鷃濫堆隨江風起自伏秋莎噆秋水水划蟲身褐腹白四足兩鬢浮水喋草泥輕跳極駛人呼水馬兒足為棹鬚為橈舴艋子何多勞黑油急旋旋玉掌輕搖搖水划蟲水划蟲鸊鷉鷖鴨同從容寬陂緩波無點風水蛾兒身灰白頭黑四􅛺六足如蠶蛾而小掠水啅飛蚊為食任霜葉任霜花喋飛蚊味亦佳浪穩無弩狐波平無鈎蛇水蛾兒水蛾兒石婦春風放盡絲松根共掠蘋花飛刺椿花紫如茱茰莖褐通體皆刺獨樹無旁枝梢短苖從顛生如皂莢芽可食喚春呼恨春呼莫錯呼非茱茰前林迎榆郎後林接榆姑刺椿刺椿點禽掐捖餘姑存土卵蕨雞無宿根金櫻子花白葉青實黃如山梔而多刺夏殼韜滿可食深秋尤美冬入藥甚力又號刺梨子薔薇花揾挬實多缺津浥浥椰子亦成酒縮砂亦成蜜金櫻子金櫻子速挽菖蒲出溪水仍招茯苓并逺志甜藤莖淡褐葉青味甘傖人加苦芙雜米為團當初春時多食過上壟即止又號甘藤元姓甘不姓丁引清風含常春雞翁呷甘露祁婆插金稜甜藤甜藤粥香餳白度清明一片春山快活聲苦菜花黃似野菊葉青如苦苣而小莖淡褐似燈心草而大深春莖葉皆可食又號遊冬經寒不萎然不堪食王瓜後靡草前荼却苦薺却甘缺毋花哆哆龍葵葉團團苦菜苦菜空山自有間人愛竹筯木瓢越甜缺甜蓷花白葉青樹甚壯秋結實殼黑肌白人呼烏圓子苦者殼褐皆類栗但無刺花成穗子成毬雅相似終非儔毛栗低坡尾缺栗髙岡頭甜蓷甜蓷秋後秋樹倚斜暉苦者擲與看牛兒蓼米花紅莖葉皆青多節花謝子結如粟可食晚秋人多採又有苽米蘆米葭米草木實間有韞米者御米甚佳蛇米不可食無馬纒無蝦鬚羅裙帶色色無願花變流沙願花變穿珠蓼米蓼米秋風易搖入秋水太平中期難屈指水芋頭莖葉皆青葉圓而大春深水生則抽莖可食根如薑芋外褐中白不堪食不粵卵不岷鴟雖沉波堪作魁葧薺葉槎牙芥蒩苗整齊水芋頭水芋頭江湖百年無一愁南灣北灣皆膳羞蔞蒿莖青近山多赤葉亦青杉冬發土取啖多土氣初春抽莖清脆可食盛夏成蒿能辟蚊皤老白角子烏爾未萌我已敷蘆笋茁戢戢荻笋抽氍氍蔞蒿蔞蒿風枝雨葉老蕭蕭草堂黍民不得驕兩宋名賢小集卷二百
