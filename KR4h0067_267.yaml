body:
  text: 兩宋名賢小集卷二百六十七宋陳思編元陳世隆補斗野藁支張藴字仁溥邢州人理宗時為禮部郎官與浮玉施樞往還相善有斗野藁支一巻雲間勌倚柁樓聞鶴唳半生此地一經過機雲故宅荒涼月湖海新秋浩蕩波曉艇紅蓮商客市夜窓白苧女兒歌吟邊冷被沙鷗笑衣化京塵鬢亦皤江湖偉觀隄柳朝朝送酒船一闌山色越帆煙蓬萊雲氣東溟外閶闔星辰北斗前突兀向來無此屋登臨當日有諸賢夕陽過雁慵囘首吟入關河萬里天鳳鶴鵲三題與江社同賦一去朝陽寂不聞西康臺北起寒雲梧花竹實年年事奈此喧啾百鳥羣冰雪精神兩瘦蘆天風入羽思江湖逋仙梅下曽相識千載歸來一語無月樹爭枝影共寒楂楂飛過屋頭山五陵年少多春悶一彈千金落等閒顧遙海水還清淺停杯問二豪雨來江色暝沙長岸容高鞅吏何能脫王程敢憚勞秋風柁樓底短髮不禁搔錢氏東皋百年鐘鼓園林在人物蕭疎更海鄉藤絡邊嵌山解長花移鄴本土猶香棋聲靚晝林隂淡扇影閒秋水氣長莫道官忙行樂少也分物色到奚囊上海夢斷三更鶴蘆邊繫短蓬聽潮看海月坐石受天風物至秋而化年來我亦翁長歌相勞事猶喜此樽同新晴林影熹微曉乍晴老於世故獨關情運烽未撤邊頭戍積潦猶妨隴上畊幾為餉蠶憂濕葉重因漂麥困饑萌龍公多事多勞耳萬里由來要得平録録録録竟何為衣塵日以緇故人閒入夢乆雨頗妨畦燕履登巢息蜂程載蜜虧獨斟蓮葉酒愁絶杏花詩除夕京國逢除夕栖遲鬢欲霜春聲生竹爆歲色動椒香戒睡聽雞早占詩探繭忙燭花頻送喜兒女笑烘堂禱雪天竺由靈鷲過冷泉降香天竺去瀹茗冷泉來新徑石間過危亭木杪開煙山晴若畫桑葉濕如灰㸃檢經行處今年未見梅祀事誤被雞催起閒聽漏鼓稀書檠風展巻香籠火生衣困嗅茶猶病吟飱菊可肥月明天路靚親到帝旁歸西湖清明芳天新霽惠風和軟緑平隄凝不波桃李無言看客慣樓臺如畫占山多游裾匝路填車馬翠榜開筵鬭綺羅寂寂寒煙生水面白鷗奈此月明何酥兼味醍醐外分身乳酪中江南鳴穉犢塞上寄飛鴻乾雨看如幻生鹽訝漸融臈殘猶有待煎取牡丹紅倉蠣次韻芸隱相黏成什伯峯聳若山王史南人呼明駝為山王攻處須犀汁持來出蟹湯梅花霜後味竹色酒邊香坐憶游閩樂今年始得嘗次韻月中聞鶴月明華表語霜清萬籟沈沈靜有聲一自别來璚樹長幾囘飛夢到層城孤影徘徊月旦中流離滿貯酒如空東皇太乙應來下笑指梅花一信通齋宫偶題衆緑扶疎雨氣清柳花吹作小池萍文窓晝寂齋房邃三潄華池誦玉經同寮約遊香林分韻得林字約我當休沐同過香遁林棋邊翻覆手酒外太平心石潄晴湍細猿吟夏木深歸帆帶疎雨涼意滿幽襟春潮偶題忙裏偷閒答物華一官隨分是生涯春風酒棹河堤柳曉月吟韉輦路花報喜忽聞枝上鵲忘機時下屋頭鴉殘年悶鈍今朝盡重對菱花拂帽紗重游大滌洞天澗水冷冷石髮新松花香靚翠崖深雲生不没仙人跡丹化猶啼搗藥禽洗眼人多求聖水醒心吾獨愛清音杖藜更欲過新洞羨爾春空一洗襟東菴與道者語有感瘦策松間日又斜更過南崦喫新茶丹青嶺樹明寒葉水墨江天噪亂鴉付酒一杯真樂事讀書萬巻是愁涯更嘗世故知閒味河水依然鬢自華朱柿慈恩分種遠駢實渥如丹垂野華星燦然雲火樹寒蟹螯微有忌猩血訝難摶七絶雖堪賞無勞把核鑽喜李鶴田至次阮雲心韻兼寄月樹秋來碧幾尋古薌熏徹紫芝吟無因得去陪清賞秪寄山君一寸心澆酒逋梅又幾囘愁吟舊雨獨登臺星星鶴語山窓曉割得雲心古錦來九日細看黄花把一枝東籬猶是昔人非題糕酒外豪心在吹帽風前素髪稀雁叫霜天悲故國鴉翻溪樹背寒暉百年獨有閒居樂可怪東山事竟違道塲山訪碑無古跡丹碧覆嵳峩塔向城中共山從寺右多疎松小溪路遠漊太湖波何處書堂在猶嫌隔翠蘿何山山因人得姓人去佛來居隣有天章墓碑無玉局書幽溪通古閣荒澗入春畬客子吟鬚冷高峯夕照餘月泉紀游小春霜寓曉閒訪古招提何歲齋魚廢初弦顧迷先民堂上像寓客柱間題僧户蜂分小山形虎穴低松青江廟北竹老野橋西親汲聊煎茗深登信杖藜琴師年九十相見手重攜不寐空牀展轉對孤檠寒漏年長更雨聲如此乾坤閒歲月明朝華髪滿頭生寄鶴田鶴向孤山去未歸片雲行雁與心期新詩不著工夫得雪外看花獨立時至後陽生七日騐飛葭袞袞天機歲載華江草未囘青帝夢香雲漏洩與梅花雲川次韻鶴田苕霅雙流合颿檣萬里通連山黄獨雪一雁白蘋風酒户春醅淺魚村晚市同舊遊蕉鹿外未老巳成翁歲晏用趙誼父訪雲心韻以寄看春知幾度元髮故應非世事真猶夢人生瘦勝肥竹邊隨意入梅下得詩歸緬想羊何友湖山樂所依正月二日雪雨送冬雷了如簁墮曉晴縈盈溪樹色騷殺紙窓聲著瓦消還易因風凍不成紛紛門外履猶自賀元正送晏桂山赴高沙郡青衫赴闕巳三遷紅斾臨州不五年舊吏誇榮從事府新民迎擁使君韀牡丹池館春融日蒓葉汀洲水漲天自是邊籌談笑辦歸來仍侍玉皇前接武容臺彼一時溪鄉重幸得追隨鷗前心事滄浪影梅下吟情汗漫期感慨中年無近别徘徊明月有相思殷勤勸醉陽關曉受盡揶揄只自知秋思暑退涼生體氣佳捲簾聽雨感年華西風葉葉梧桐冷開盡庭前白鶴花溪上今夕知何夕吾意亦良適明月滿舩蓬清風動帷席雨過前溪渾停雲半空白衰荷無嬌紅老梧有枯碧頻更燭對棋仍把酒澆石歲行變暄涼朋情慨離索相思日以長孤吟夜方寂露下客衣單草際螢光奕年年修玩心一醉不得惜鶴田還江右欲留雲共住雲去楚天長此日吾猶惜中年别易傷搜吟梅下影睹奕橘中香謹勿移山諾春風入帝鄉歸雁亭青雲影裏自由身幾倚闌干看不真又是江湖春雪盡年年腸斷玉關人午日次韻池襲父小泊蘋香柳下磯重逢佳節感年時束篙偶作人形想采藥須供國手醫江鏡願為明主監楚菰愁賦逐臣詞酒邊聽盡敲蓬雨數日淮南去未遲垂虹四岸俱無只有天煙檣如雨落鷗前不知笠澤翁何許波上青風一萬年憶看前游十四年三高祠下夕陽船無錢買得鱸魚鱠吟就菊花香裏眠姑蘇臺故址畊殘草樹秋無人曽見鹿來遊甬東亦是當時月不照笙歌只照愁虎丘曼陀石上無根樹厯厯生公說法餘劒水一泓清徹底至今人說有龍居惠山石苔滑潤屋連斜第二泉邊古佛家一壑松風聽不了郤留僧坐自煎茶棟花緑樹菲菲紫白香猶堪纒黍弔沈湘江南四月無風訊青草前頭蝶思狂毗陵天慶觀龍殿隂壁老懷仁筆頭角崢嶸春起蟄有時麾斥惠山雲行雨歸來半生濕丹陽道中流寓人累土編茅古制庳官田種秫得沾私自言身徤無徭役猶勝平生江北時京口運河上荒荒永岸水如溝翁仲無言立上頭日日餫舟銜尾去東南民力尚支不多景樓假日此登臨淒涼北望心戍烽孤障杳塔影一江深壯士投鞭想將軍誓檝吟所嗟人事異天險古猶今金山江心臺殿切空雲夜月魚龍影不分八十老僧相引說潮痕不上郭公墳𤓰州如此江濤更有人佛貍竟死不能兵幅巾短櫂鷗前夢未省當時有此城維楊即事牛斗星邊禹貢州東南屏蔽大江流向來明月珠簾夢不信秋風夜柝愁皂角林前野地寛新塘路口草泥乾天乎如此功名事成敗觀人自昔難茅屋蘆門半市坊居民無事亦軍裝愁來莫上城頭望西北浮雲接太陽月明城上韻邊笳一枕三更夢到家不耐楚氛真僻性賦詩酌酒與瓊花土霧如蒸暴暑天燭龍偏駐柳邊船三清觀裏風廊午滿意題詩借榻眠平山堂弔古隔江山色畫圖中故趾荒來與廟通畫地雄添淮海水占星南直斗牛宮試評蜀味長泉在欲唱歐詞古柳空往事茫茫増感慨聊憑戍卒指西東平山和韻鶴田瓊花應自笑南翁白髮栖栖逐斷篷兵後百年城郭是塵間多事古今同孤煙遠堠如常雨五月窮邊尚冷風可待蒓鱸歸盡興長吟且復付杯中道中觀戽水戲書秧馬泥深繭犢閒燭龍顧影桔橰間尋常六月江南雨不比君王帑藏慳兩宋名賢小集巻二百六十七
