body:
  text: 兩宋名賢小集卷二百三十一宋陳思編元陳世隆補安晚堂詩集鄭清之謝虛齋和詩關心穡事恐春遲暫許花風入繡旗翠浪半天岐麥詠玉簮數筯刈蔞詩兄山谷過土山塞詩野亭寄韻追唐什嚴鄭公有寄題野亭見杜集秋菊餐芳敵楚辭早晚催歸漢廷右西湖深處樂天碑和虛齋勸農十詩迢遞層陰曉自開仙舟花底問瀛萊文章太守非遊衍為省春耕特地來熱天妖焰彗初沉朝汲仁賢簡帝心未用鋒車便脂牽小須千里遍春霖蔽日寒雲悄欲秋仁風載路曉光浮田翁攬抱兒孫笑竹馬橫陳未肯休問訊桑麻真郡政按行松菊似家山挽回和氣歸田里只費齋鈴半日間暇日棊書六一翁錦檣絲轡與春逢年時豹尾車中望山色有無知幾重曉夢吟成望帝歸征鞍未許柳絲知笑聽鄮嶺春禽哢去博延英午漏遲酡顔醉客玉西東半濕塵衫上翠空鄒谷雖寒應解黍朱車面面是春風小隊旌旗半道歸松陰緩䇿攬清暉女郎未覺褰帷過笑語相教著嫁衣老黠山靈具六通解將蒼狗護竒峯虛齋自有青囊眼卻笑景純書未工恰好農時踏翠煙睡龍驚起雨公田官程便作乘間看不用扁舟學計然宿翠山箯輿十里見青嶄行盡松陰得翠巖萬壑聲中清磬出一峯髙處白雲緘茶新煮鼎作魚沫僧有可人能麈談自覺靈山緣境熟佛禪重問後三三暖風依日佐山行幾許春隨屐齒生溪舞緑雲苔出沒田翻翠浪麥斜橫間中適意榮三事嵗晚無年式耦耕一靜可能銷幻藥剩開胸次著峥嶸和葺芷應直院送秋蘭韻大椿凌千秋靈芝競三秀書傳遞誇詡垂芳古今宙貴耳但好奇相馬失之瘦誰知楚醒花逺避漢金酎擇交得素節彼哉懷春誘夫君全德馨內美本吾有姑置芝與椿秋蘭嵗相夀南坡口號十八首十日南坡兩日晴晴時不放日華明春光似妬間人占端的春風飽世情天工忽忽度年光料理人間富貴忙間裏何曾關造物一分風景亦收藏誰將春晚作冬看添著綿衣減卻難道是麥寒猶未在願渠麥熟且禁寒休言無地起樓臺十箇花窠沒處裁東近比鄰西近水且教紅白面墻開欲識魚梁試作則箇切看輕拋野淥罩清寒幾回漉起空無物輸殺羣兒下釣竿吾孫宗子喜相過一笑檀欒似樂窩且向尊中陪北海直須間裏識南坡酷愛鳥鳴山更幽牆陰風雨但颼颼筠籠買得春禽語不會憂時也白頭近得白頭翁善鳴管絃不礙登山屐粱肉何妨滿腹書豈是清談愧夷甫為無阿堵繞吾廬試向青池放小鮮洋洋圉圉忽悠然校人真箇知魚樂殺活禪機總是禪分席春畦僅一弓靈根移自石忩東五味子生於四明山饒渠五味誇仙藥爭似鹽梅僅䇿功紛綸兒造信多才果解分風作去來我向南坡一旬雨春陰今曉為誰開小忩白醉篆香遲只有書君伴燕頥料得人間無此樂殷勤獻與定牢辭枝昻挂起一旬強剪剪春風到桞塘白髮不公欺老我偏於間處引春霜記得兒時誦古詩其甘如薺謂吾欺淡交休恨相知晚攜向晶盤笑殺伊曉來兩鵲屋山鳴報喜多應只報晴似為東皇傳好語故留勝賞到清明舊日都城飫子魚一鱗今不到茅廬果然額上通三印盡去侯門代鯉書安晚生涯冷似灰别墅經營半月回誇與兒郎翁驟富詩囊盈握送陳雷紅紅白白共枝榮怪底山茶有寧馨倩得司花來判斷不妨一姓養螟蛉辛丑仲春同黃制屬自延夀雨過禪寂箯輿掠雨到僧門帶得清間一二分素喜堂中無偃月朅來寺裏作穿雲赤心莫逆惟松友青眼相看有竹君燒葉更聫東野句紙忩鑽隙候晴曛病後和黃玉泉韻山扉連月款缺巵擬共還家浣客衣愧失養生收一溉笑擒夢豎竄三危大槐安國休重省兜率陀天尚緩歸樂天詩歸則須歸兜率天一病一衰秋後雨舊語老一病一衰秋一雨一涼孰言之武老能為赤明鑰篆正恢台戲挹雄風滌悶懷病骨喜隨新籜换好詩忽餽寶珠來巨魚未縱王褒壑陋室聊淹禹錫階苔痕上階緑且共理身如理國小須握手詠康哉再和前韻為乏刀圭飲卯巵見魯直語黃庭空想衣朱衣三田未遣三彭去九軌幾成九折危瘦骨可能攴夜永醉鄉那復挽春歸亦知有客真佳甚握手還須笑樂為若時風雨候三台憂國豐年幾入懷執戟未愁方朔死閉門惟喜子桑來人間宰相真如夢事見類説天上羣仙詎可階事業鏤氷何所有之乎者也矣焉哉轅門怒髮彘肩巵計相當年笑解衣誰識英雄千古意肯論性命一絲危伏波卧看飛鳶墮杜曲生憐獨鶴歸自愧此身成濩落空搔種種欲何為遂初惟許賦天台牆月東邊漫古懷雖乏平泉供宴樂幸尋荒徑愜歸來蹣跚愧我無金汞蹀躞看君上玉階傍舍數弓畦藥本聊攴晚嵗亦優哉難追八駿舉瑶巵肯向羅浮闕緑衣敝服真成原憲病枯枝幾賦仲堪危殷仲堪與客戲作危語云百嵗老翁扳枯枝盲人騎馬臨深池忘憂擬問酒中聖覔句懶從天外歸笑傲桑榆知有幾春秋敢以大椿為茂先博物懵星台世味沉酣酷鴆懷風月自為無盡闕湖山誰肯愛間來競知疾下多車乘豈悟幾危踏廩階幸與樂天相伴住休論逹者謂何哉送姚提幹行虛齋鎮東鄞從之南容君我初未之識雍翰傾殷勤修潔以博習秀美而有文玉犀映秋水英辭湧春雲雞距角魯蜀昻然鶴非羣晤言到聖處商也樂所聞最喜直而義壯音駴鼓鼖告子少於孟先䇿養氣勛牛山木信美謹勿容斧斤助苖固得稿可使稗不耘觀子所植立真能張吾軍仁義可效治淵源在河汾詩書自師友芝蘭足膏薰剛風接徑翮去去翔霄旻清時有聞者必也吾子云和德天治中林宗翰雪詩簡黃制卿齋壇將禱肅熊貔一縷忱恂六出竒雲欲商量先警路雨方收卷避催詩氷花肯效梅糚額風絮嫌隨桞獻眉鹽虎玉龍莊語在願光逺業瑞昌時古風一篇簡徐德夫提刑昌黎有名言受恩異知已而况不識面知心詎能幾浮雲日多變交道冷如水擠水遽下石利害毫髮比人情易燥濕灔澦發九軌終然風雨晦雞鳴獨無已世變方下趨特立繄君子山谷未見坡氣味已相似希文非素交永叔甘逺徙敢謂世無人前修可專美我昔聞君名恍如讀青史已乃知同時深心愛敬起端平濫持衡薦賢職當爾亟以聞九重夜半下一紙雅志樂弦歌公車猶尼止賢者固難進奪情辭詔旨知賢未及用上印返田里間居事幽屏黜陟不到耳賓朋有公言聲徽振商徴入則禆國論挺挺中流砥出持皇華節光風汛桃李從容五六載平進付常理乂聞交遊間榮落保終始不負楊臨賀真見其人矣夜夢加晝思髣佛眉宇紫軍將忽打門緘書照忩几風簷屢開闔襟期頓清泚有時嶧陽桐知音發妙旨高情激孤笑新意償宿喜得一夔已足失百參何恥老我豈私賀善類知有恃看君廣厦間大庇天下士簷前蜘蛛如吞吐緯自縈纒出沒無蹤屋漏邊懷毒滿身如蝎大漫張羅網欲漫天安晚軒竹松號大夫交可絶梅為清客志相同英英鳯實卑餘子楚楚龍孫過乃翁晚際一弓櫜素月暑中千斛糶清風小軒政欲供晨坐付女遮闌曉日東安晚園戲占橫塘雨過水初平浪影窺忩一孔明籬下觸羝無鹿角林間反舌百禽聲柳公權可送行客梅子真能寬渴兵誰道夏園無所有蓮花端可傲張卿九日即事安晚間身晚更安蛩宵無夢落金鞍通心白髮誰為染對面青編儘耐看多謝紫萸占老健喜招黃菊伴秋寒江城借闕生輕暖忽有鳴蛙却為官甕畦籬戶小園林獨鶴相陪省一琴老視官年從實録貧依國息寄橫金每從官庫子錢詩盈弓力猶能寸客值騷辰且枉尋楓葉自知酤令緩漂搖醉臉出牆隂童孫競爽祝雞翁點看凡將句讀中戲指大兄誇少壯樂天有張丈殷兄詩懶推庚甲問雌雄窮秋對展三更月迥夜傳呼萬竅風逗曉東窗相管領舉頭灔灔日車紅題偃溪聞長老堯民擊壤圗炊煙萬井著僧居人在康衢畫不如寄語偃溪揮淡墨圗中添我一柴車謝林治中訪别覺際菴野服芒鞋踏蘚斑千峰約飾整雲鬟山行陡覺精神健老去雖貧耳目間步武來尋僧舍舊話言應想夜窗間錢湖難買歸舟駐料得春衫憶素蠻正月晦夕夢中作偈覺但記其首兩句遂於枕上足之録呈慧上人是身本虛妄覓主了無得誰知日用間顛倒由六賊茫茫前後際生滅在空色賊去主人歸渾家不相識因筆記賊入空室頌平生一片癡妄意室中物自言富可待到了貧徹骨一宵入人家百寶認倣佛揀得真金身明處是泥佛乙巳三月出湖口占嵗朝花片落書奩未信春光已屬厭猛省清明今日事家家青桞壓朱櫩又曉日殷勤為著鞭微風逐旋約輕煙東皇景勝渾如舊西子糚濃喜近前檻外客山今對展禊時朋酒占初筵十年重訪蘇堤桞總付春光入畫船兩宋名賢小集卷二百三十一
