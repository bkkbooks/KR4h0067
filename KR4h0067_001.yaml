body:
  text: 兩宋名賢小集卷一宋陳思編元陳世隆補楊文公集楊億字大年建州蒲城人七嵗善屬文雍熙初年十一召試詩賦授祕書省正字淳化中命試翰林賜進士第真宗朝厯官知制誥天禧中拜工部侍郎翰林學士兼史館修撰卒贈禮部尚書諡曰文有括蒼武夷潁隂韓城退居汝陽蓬山辭榮冠鼇等集內外制刀筆奉和御製社日詩仙掌凌空沆瀣秋大田多稼似雲浮天邀霽景芙蓉闕江上殘芳杜若洲東觀羣儒宣宴樂南荆遺俗重嬉逰宸章忽降容瞻覩疑是神龜負九疇奉和御製重陽五七言詩宸居瑞靄重閶闔正來風憀栗驚秋氣豐穰美嵗功曉煙籬菊嫩宵露畹蘭紅重九登髙會歡虞處處同民在華胥正樂康高秋賔鴈指衡陽蒹葭漸見凝清露鶗鴂先驚歇衆芳節值登高真勝會年逢大有是殊祥宸心悅豫流新唱星漢垂文示八方奉和聖製南郊禮畢五言六韻詩燔柴就陽位煙燎達高穹掃地鉶㽅潔嚴更鼓角雄天心侔兊悅皇澤比春融帝享惟馨德民蘇解愠風周郊四祭重漢畤五祠同靈貺昭玄感神光望拜中奉和御製契丹出境將議回鑾五言六韻詩戎輅巡河右天威讋鬼方五營開細栁三令凛飛霜氛祲消千里聲明耀八荒靈旗風助順黃道日呈祥偃草邊關靜回鑾海縣康欣陪從臣末歸蹕奉髙驤奉和御製南郊七言六韻詩潔齋恭已奉蒼旻報本圜壇備物陳酒縮楚茅三獻畢灰飛嶰管一陽新高空瑞氣長隨輦永夕清霜暗濕巾泰畤迎年嚴漢祀六宗祈福盛虞禋鴻恩渙汗霑窮髮睿藻昭回動紫宸庶類熙熙蒙帝力徒知擊壤效堯民奉和御製喜降時雪七言四韻詩一夕香街布玉塵檀欒徑節露貞筠兔園置酒皇歡洽柏殿賡歌睿唱新麥秀原田初望嵗花開苑樹忽驚春豐穰薦瑞民心悅高下還隨帝澤均後苑賞花應制以時字為韻咸平四年三月十八日宫花如錦水連猗翠輦尋芳正是時禁苑定知人未識朱欄除有蝶偷窺艷烘曉日迷天仗香逐輕風落酒巵何幸微臣陪鎬宴蓬壺春漏正遲遲又應制賦射弓詩以弓字為韻水漲芳塘緑花開禁籞紅同瞻萬乘主親御六鈞弓曲應騶虞節春回太皡功還須殪大兕何啻落驚鴻一箭天山定三邊虎穴空潯陽射蛟者寧與此時同後苑賞花應制以春字為韻咸平五年三月雲羅霞綺媚芳辰瓊圃花開爛漫春風遞清香隨鳯輦波涵倒影落龍津仙葩四照烘初日濃艷千苞賜近臣向晚天街戴歸處逰蜂舞蝶自隨人宣召赴龍圗閣觀太宗御書應制五年十月非煙蔥蔚蒼龍闕紫府深沉大帝居羣玉中天開䇿府神龜溫洛薦圗書珠官岑寂經行處金簡熒煌拭目初曾是先朝受恩者因探禹穴涕漣如後苑賞花釣魚應制六年三月十六日宜春小苑斗城傍錫宴羣仙奉紫皇漢沼乳魚偏傍釣青陵舞蝶自尋芳波平鰲背浮崑閬日轉金莖艷赭黃滿酌流霞侍臣醉暖風宫蘂雜爐香别賦賞花一首仙山靈沼五城西曉日花光照彩霓露濯氷蠶鋪瑞錦風吹水麝折香臍芳葩散採添蜂蜜紅片狂飄雜燕泥曾識壺中舊春色桃源重到路猶迷龍圗閣會宴應制册府藏書在紫薇退朝稽古助論思中天召宴衢樽滿乙夜觀文列象垂綵鳯翩翻巢綺閣靈龜夭矯冠金碑大風發唱羣臣和元首康哉庶績熙祕閣賜宴送右諫議大夫种放得假歸終南山應制瑣闈聊輟皂囊封賜告歸尋一畝宫關路蒲輪千里逺巖扉蕙帳幾年空百壺天酒凝甘露二雅宸章掩大風舊隱暫還非久住心期獻可沃堯聰初至郡齋書事地去京華逺年逢旱暵餘羣胥同黠馬比戶甚枯魚煦嫗心空切澄清志莫舒棼絲殊未治錯節詎能除聽訟棠隂密行春栁影疏賔筵求婉畫僧舍問真如踰月窺除目經時絶傳車素餐徒自飽投刃豈曽虛盈耳嫌敲撲堆牀厭簿書故園無數舍長日歎歸歟次韻和十六兄先輩見寄秋風苦憶鱠霜鱗暫剖銅符出紫宸一路雪寒多挾纊幾程山險欲摧輪清香撲鼻梅林近秀色凝眸麥隴新閉閣草玄終寂寞下車為政尚因循尋僧不厭攜笻逺愛客寧辭舉白頻簿領孜孜防黠吏丘園矻矻訪通民魚鹽自與滄溟接雞犬仍將白社鄰官滿會須拋印綬武夷歸去作間人次韻和章子美對雪破臘連空粉絮飄離離一陳長山苖旗亭誰氏來沽酒臺笠何人去採樵背日旋依松澗積迎風先傍藥畦消袁安此際偏無賴獨掩間門對一瓢送章頔歸鄉蕪穢休嗟負郭田蹉跎自過鹿鳴筵荆山玉璞空三獻梁苑風塵已十年疏入禁中猶未報賦成都下早曾傳獨攜書劍歸閩嶺共泛煙波入楚天獵獵酒旗邀舉白招招魚艇勸烹鮮碁枰鬬勝疑成癖砧杵驚愁已廢眠驛路數程煩托乘郡齋終日喜談玄如何棄我還家去相送津亭一黯然郡齋即事書懷十二韻呈諸官長樂疏鐘自厭聞漢庭誰不惜離羣舟浮一水波瀾闊路入千山杳靄分郡閣先憂迷簿領村田聊得問耕耘疲民深喜猶安堵去年小儉幸免流亡黠吏那知便舞文鹽酒案吏陳元凱受賄為姦舞文變法其事已敗照膽求瑕空察察飲氷為政漫云云元臺已分嘲揚子桑野須防誚使君别𣲖東傾連漲海故園西望隔晴氛黛鋪逺岫秋將晚綺散餘霞日欲曛小檻報春梅爛漫滿空呈瑞雪繽紛題詩到處尋紅葉置酒終朝看白雲符竹偶分慙出守櫜鞬暫佩愧從軍石渠舊署頻牽夢室有芝蘭閣有藝郡齋西亭即事十韻招麗水殿丞武功從事郡齋退食復何為縱目西亭景物竒疊嶂雨餘泉眼出澄潭風靜釣絲垂城臨古戍寒蕪闊路轉荒村野彴危幾處唱歌聞白紵誰家酤酒見青旗蝶隨遊屐穿花徑犬吠行人隔槿籬桃李成蹊春盡後魚鹽為市日中時桑麻萬頃晴氛散絲竹千門夕照移吟際嶺雲飛冉冉望中壠麥秀離離煙迷喬木鶯遷早水滿方塘鷺下遲鶴蓋翩然肯相顧主人終宴豈知疲送張彛憲歸鄉處處春波滿稻畦海棠零落子規啼一麾逺郡留方滯十里長亭又解攜後夜灘聲妨客夢初晴雲物入詩題到家為問田園事桃李猶應有舊蹊送韓永錫歸闕永錫業三傳又善小篆縉雲六載掌關征學得陽氷小篆成逋客幾人曾識面高士潁川傳陳高君之執友仙山到處便題名桑郊又是乘軺去鈴閣虛煩解榻迎舊讀春秋究微旨何須苦説不知兵次韻和致仕李殿丞寅見寄之什因以紀贈李公寓居厯陽近遷于洪井鄉國馳名幾十春鳴臯一旦九天聞翔鸞棲棘曾為吏金鼎調梅未致君百里象雷嫌碌碌公嘗權厯陽縣政片言折獄厭云云公任三衢司理數考詩名已是齊康樂筆力何曾減右軍抗表忽然干鳯扆拂衣殊欲謝人羣都緣梁范慵為賦且免鍾山被勒文清夜獨吟牛渚月髙秋時望帝鄉雲鯉庭稟訓門逾盛蘭苑傳芳氣益熏盡室逺依洪井側直鈎猶釣楚江濵西山有藥應須餌待看霓旌入紫氛京師故人有以隴西鸚鵡遺豫者因畜養之去年出守縉雲提挈而至性靈甚慧觸類能言公退玩之常若不足忽遇疾而逝因命瘞于小園作詩一章聊以追悼識者無罪豫以貴畜也隴山秋樹舊巢傾逺向江東逐斾旌去國夢魂應繚繞入春喉舌漸分明一聲警露何愁鶴百囀遷喬肯讓鶯終日雕籠心不戀經年丹觜色猶輕思歸悒悒因成疾顧主依依尚有情死葬小園芳草地夜來經雨緑苔生麗水甄殿丞移疾請告數日不逢黃叔度胸中鄙吝一時生如何民瘼偏能療却是詩魔未得平夏景清和妨命駕元臺寂寞阻飛觥欲親高論無由得須作文殊問疾行威上人五藴已空諸漏盡林間行道十年餘吟成南國碧雲句讀遍西方貝葉書清論彌天居士伏高情出世俗流疏問師心法都無語笑指孤雲在太虛次韻和係郡齋書事之什係今名化竹使貪為郡金門懶上書征途沿木合縉雲有木合嶺若蜀道之棧閣也官舍類樓居郡齋杳在山頂平地甚狹四靣多搆亭榭以翼之密葉藏啼鳥澄潭躍戲魚波光搖島嶼霽色露門閭圃蕙光風拂山苖淑氣噓開樽空愛客函丈孰宗豫清唳頻思鶴長鳴幾厭驢王武子雅好驢鳴豫起所不喜顔貧一瓢足嵇懶尺題疏薄宦無勞説長謡任所如神明定來舍莊室正虛虛次韻和章頔見寄雞忩十載共論文蘭室依然有舊薰雨雪共拋修竹苑煙霞獨訪武夷君隋珠照乘元無類天驥追風定不羣犬子賦成猶未獻飄飄詞氣已凌雲孫及歸吳興生近遊永嘉家在霅溪傍汀蘋繞舍香草玄偏寂寞為客苦恓惶澤國聊傾蓋春闈早擅場陔蘭行可採月桂自應芳稅駕臨滄海回轅指大梁裂裳趨逺道負未及高堂季子裘雖敝安仁鬢未蒼明年杏園裏輒莫負春光己亥年郡中夏旱偏禱羣望喜有甘澤之應旱魃偏為虐陽烏益以驕何曾柱礎潤惟恐土山焦請禱彌增潔隂靈亦孔昭雲興不待族風細欲鳴條隱轔雷車轉霏微雨足飄層雲低匝野鴻霈近連宵庭樹含佳色村田長善苗蘚痕緣屋壁泉脈吐山椒轍鮒那憂涸園蔬豈待澆官渠逗水急客路裛塵銷掾吏階前賀耕夫隴上謡秋成知有幸嵗欲近玄枵寄草徴君水陸都無數舍程魚符龜印苦相縈夢魂長繞龍門坂姓字終懸月旦評鮑室清琴應獨撫融樽緑醑共誰傾春深詩石苔衣駁雨過書齋草帶生鴻寶枕中初得術丹臺籍上已題名清談宛有南臺體嘉遁全忘北闕情金馬深嚴堪避世滄浪清淺未沾纓諸儒正議明堂事軋軋蒲輪即奉迎次韻和衢州席刑部早秋朱火熒熒向夕流林間一葉忽驚秋風來野渡聞漁笛霧斂晴天見蜃樓艷愛芙蓉開幕府香憐杜若老汀洲使君鬢畔多玄髮臨水登山不用愁次韻和席衢州憶洛陽春遊十四韻周漢經營迹未遐山川形勝最堪嘉前瞻關塞千尋出旁逗伊流一𣲖斜子晉鳯笙調夜月宓妃羅襪映朝霞洛神賦云逺而望之皎若太陽升朝霞何人貰酒青樓曉幾處尋春紫陌賖駿足每從金埒試芳叢多展翠帷遮出逢勝境爭飛蓋歸逼殘陽競走車庭竹惹煙披嫩籜臯蘭裛露長新芽嵩峯崷崒疑摩斗洛水清冷欲見沙萬井閭閻真陸海九重宫闕是天家禁林日暖空啼鳥御苑風微自落花關路行人偏絡繹津橋賈客苦喧譁何當獻賦論遷鼎便欲拋官學種瓜江海三年勞夢想田園二項有生涯應知父老沾堯化長挈壺漿望翠華聞道卿途中授計司判官罷東陽得告歸泉州寧覲行至建安而有是命幾年華省冠名曹歸棹夤緣入海濤才奉色難馨夕膳便將心計析秋毫政成婺女生祠在地近明光伏奏勞夜直乍諳綾被暖晨趨頻見露盤高共期晝日承三接莫許秋風長二毛為郡今來最卑屑勸君休更夢懸刀郡齋西亭夜坐涼颸初拂樹皓魄正當軒宿鳥林間定流螢草際翻蒼茫迷野色嘲􅑜辨方言角罷重城掩漁歌别浦喧斷蛩吟壞壁寒杵出遙村樹影成帷密灘聲激箭奔夜長風露冷川逈水煙昏對景都無寐冥心契混元秋晚秋晚彌岑寂天空見泬寥溪流拖白練樹葉剪紅綃露菊英初吐霜鐘韻漸調清光開旭旦爽氣逐驚颷鷹擊秦原逈鴻歸楚水遙星高漢將出膠折塞兵驕元亮田多廢安仁鬢恐凋功名殊未立對景自無憀送溫州聶從事赴闕從事先從此郡移任永嘉佩鞬來海上七見嵗星移務劇操刀割書成插羽馳詩傳百越遍詔下九霄遲束帶朝閶闔歸艎泛渺瀰舊逰聊稅駕雅飲且軒眉鄭驛歡相接牙絃辱所知病驚瓊樹瘦醉露玉峯竒上馬便西笑何須訴酒巵送章安世赴舉螢燭辛勤十載餘藹然高價滿州閭一枝未折仙人桂千里又隨鄉老書梁苑雪花成賦後禹門雷鼓化鱗初山城日日望春榜莫遣南來音信疏偶興芳蘭滋九畹蕭蒿亦旁植威鳯翔丹山鴟梟猶接翼雅琴歌南風蛙鳴不容息驪珠媚清川魚目光激射薰蕕豈同器雲壤自懸隔咄咄來逼人薨薨止于棘發迹由屠沽操心希桀跖天形固殘毁吏曹嘗擯斥狠羊逺刀杌黠馬委銜䇿心同溪壑險惡比丘山積天聽本聰明神道尤正直當用禦魑魅豈令為鬼蜮舂喉魯陽戈鉤頸子雲戟肉委餓虎溪尸投窮髮北飢鷹礪吻啄猰貐磨牙食魂氣縶酆都膏血塗荒磧去草絶本根決疽恣針石所居必汚瀦遺種盡刳剔渠魁已殱殄非類彌怵惕稂莠既芟夷善苗漸滋殖君子益知命視履加平昔小人競革音滅身在漏刻堯民率可封湯網從此釋永躋仁壽期共造華胥域到郡滿嵗自遣迢遞分符竹因循度嵗華地將鯨海接路與鳯城賖觸石雲頻起銜山日易斜潮平聚漁市木落見人家吏隱偏知幸民謡豈敢誇無嫌勾漏僻且得養丹砂已亥年十月十七大雪六出俄承瑞三農始告休兔園陳旨酒金屋御重裘壠麥青猶短臯蘭紫尚稠嚴颷一夕起瑞霰滿空浮林迥瓊花吐峯孤玉笋抽疏鱗鏤屋瓦淨練曵溪流北户寒威盛南方沴氣收時和人冨壽卒嵗好優遊郡中即事書懷海隅為郡真卑屑簿領沉迷箠楚喧王事更逾星火急吏曹何啻米鹽煩甘棠聽訟曾無倦丹筆書刑幸不寃境上送迎慚置驛齋中宴喜懶開樽逢人未免腰如磬議政常防耳屬垣鮑臭恐將羣小化蟲疑難與俗流論却思寂寞棲天祿爭得逍遙似漆園外地粗官如竹葦一麾出守豈堪言次韻和潤州劉度支見寄之什卜隱林泉未有期春田耕事欲慿誰一辭左掖鴛鸞侣兩見南州橘柚垂酌醴不妨留客醉飲氷長是畏人知頒條求瘼無他術深恨期年報政遲郡民以嵗稔刑清相率為齋以報善政永嘉聶從事賦詩紀其事因依韻足成一百言以謝之為郡臨甌越雲泉興未乖歡謡乏襦袴歸思滿荆柴偶遂豐年望潛將樂土偕流民爭襁負凶黨絶椎埋精力姦多露清心政自諧羣生不疵癘比屋已綏懷輒詣金人宇同修香積齋漫勞歌邵父方待拍洪崖治行非尤異傳聞及等儕雕章忽垂贈屬和愧淫哇嵗莫有懷逺辭金虎觀來守縉雲城鳴律行將盡枯荄又向榮匏瓜宣父嘆江海子牟情求瘼曾無術投虛豈有聲帝鄉成久别天吏苦遄征漫貯青霞想惟愁素髮生澄清慵攬轡蕪穢欲歸耕簿領非吾事丹臺有姓名次韻和酬永嘉聶從事除夜之作三百六旬今夜盡寥寥虛室獨凝神蓮城五鼓欲催曉按圗記郡城號蓮花城梅嶺一枝先報春鄒律漸催隂谷暖堯蓂看傍土階新海隅留滯年華長坐對寒缸浩歎頻章徴君見和所寄詩再次本韻酬贈武夷山秀建溪清身隱心間事不縈前古是非為已任故鄉人物與誰評勸農春隴巾頻折逢客秋郊蓋暫傾綵服趨翔娛壽母詩頌曰魯侯燕喜令妻壽母絳帷談論誘諸生潁流洗耳殊非達谷口躬耕亦近名博奕自堪消永日絲桐兼得助高情莫嫌霜雪將侵鬢須嘆塵埃漸滿纓早晚鳴騶催上道聖君虛左欲相迎中春喜雨土膏初脈起東作向農時隱轔雷車轉霏微雨足垂龍蛇爭奮躍桃李漸離披流潤先從葉餘波更及私謳謡耕夫喜滲漉稻畦滋連夜空階滴愁吟水部詩聞北師克捷喜而成詠嵗晏層氷合煙塵起朔陲文昌先命將羽檄便徴師天逈星狼滅宵寒月魄虧前軍臨瀚海後騎縛閼氏薊北胡沙靜河南露版馳遼陽諸父老重覩漢官儀洞溪慶道人歸上都近之厯陽雖久寓縉雲不與郡民接精廬宴坐十經秋瓶鉢近為千里遊又是浮杯過滄海便應飛錫入皇州彌天談論降時彥結社因緣背俗流此去定知諸念息只除魂夢到東甌春郊即事黃鸝百囀宿煙疏近郭行春獨駐車壠上勸耕聊問訊棠隂聽政且躇踟逺林桑盡蠶成繭野水萍開獺趂魚幾處路旁垂苦李遊人不折意何如偶書朱輪逺守未成歡薄宦令人意漸闌郡閣政清慵按吏鄉園路近欲休官梅花繞檻驚春早布水當簷覺夏寒已是三年不聞問何如歸去把漁竿太常李博士史館孫祕丞相繼奉使浙右博士至郡以孫侯詩三章示豫且以致意因次韻和酬時孫不來迅瀨拖舟上危梯躡屐登山光翠欲滴水氣熱如蒸路轉藤蘿暗天開物象澄丘園足逋客應得薦賢能分憂從漢殿捧詔出蕭墻路入三吳逺舟浮一水長詩題石門側夢徹斗城傍清曉見雲物依依認帝鄉北極分憂矚東甌布惠和曾蒙傾蓋分偶得枉帆過鄭驛非常速融樽復幾何孫侯不假道鄙我信為多麗水殿丞手植朱李繁實盈折以貺豫感而成詠五年為邑鬢霜侵吏隱由來得趣深不獨絃歌長滿耳兼聞桃李已成隂晨昏我有南陔戀江海君懷北闕心早晚飛沉俱遂志願將初服敵華簪聞揚州柴給事有弄璋之慶寄詩賀之給事年六十六始有嗣子華堂何夕夢熊羆衛氏如今有一兒三日懸弧應是喜千年結實未為遲預知駟馬門閭盛暗想天麟骨法竒曾忝丘墻攝齋者待看孔鯉學聞詩題張濬所居壁濬余之姻此後自郡歸鄉三張舊族富英髦仙墅重經散鬱陶深喜太丘家法在須知定國里門高分題每日搖雞距合宴常時把蟹螯獨感戴侯恩未報徘徊不覺涕沾袍留題南源院路入藤蘿十里餘松窗瀟灑竹房虛燕巢新舊金人殿蟲網縱橫貝葉書當晝風雷生洞穴欲齋猿鳥下庭除昔年曾此題詩句猶拂流塵認魯魚留題張彞憲池亭彞憲昆仲三人皆好學季弟逝矣瀟灑危亭枕碧池昔年飛蓋此追隨正逢五綵承顔日兼是三荆並秀時夜坐不知銀漢沒春逰長訴玉杯遲如今罷郡重登賞喜見扶風舊白眉别聰道人歸縉雲聰送豫至别墅二年假守括蒼城郡榻惟師即退迎搗藥幾憐春漏永調琴長待夜蟾生心猿已伏都無念海鳥相逢自不驚送别秋郊豈成恨白雲青嶂是歸程題張居士壁疊巘參差翠繞門雕梁賀燕自成羣殺雞日夕期嘉客種竹寒暄對此君且向東臯輸黍稷便應北闕降玄纁子真漫説耕巖石不奈聲名四逺聞留題黃山院禾黍離離一徑通遊人攬轡即過從趂齋幽鳥聞踈磬出定高僧見偃松夜靜龕燈凝古殿雨餘巖溜迸前峰昔年曾此題名處素壁欹斜翠蘚重送章頔寺丞之巴陵涔陽從事有嘉聲外計封章薦姓名再命便為千室宰于飛又出九重城腰懸銅墨才猶屈吟對江山思轉清楚客十年偏遂意秋風滿筯紫蓴羮外弟張湜北遊六年隨我客梁園兩上孤飛徹九門抱璞有瑕惟歎命泣岐無託更銷魂秦關百二聊乘興漢牘三千待呌閽赤日炎風兩京道文章滿腹與誰論章羣下第東歸卓犖修詞有古風計偕西上劇飄蓬梁園失意三春日閩嶺思歸一畝官且喜還家儀舌在莫嗟為客趙囊空九天下詔崇儒術好絶韋編待至公賀資政學士王侍郎瀝懇青規動帝心秋曹月殿寵恩深論思東序清間宴偃息西崑翰墨林私第藏書皆有副公庭種竹待成隂卧龍禁闥應嫌久救旱還須起作霖表弟廷評章得象知信州玉山縣懷玉煙霞接武夷我思祖德淚霑衣縣齋製錦留遺愛庭樹藏鐶長合圍開寶末大父宰是邑豫生于縣齋彭澤公田今已廢遼東邑子半應非津亭送别空搔首籍在金門未得歸梁大諫自鳯翔乞留臺寄詩言志次韻酬之聨飛仙掖舊心朋笑我池籠出未能文陛彯纓空自愧香山臘屐與誰登託身羿彀憂危甚引領黃陂鄙吝增二室風煙莫全占會須攜手躡雲層石殿丞通判濮州龍虎逰從分不疏忽聞新命佐魚符經旬苦雨淹行斾幾曲洪河貫郡圗浮蟻酒濃頻舉白折膠風徑好彎弧賢侯東道歡相得期月民謡待袴𥜗元奉宗宰績溪梁園慶幾春時譽藹天倫家寄蘋汀久名題桂籍新溪鱗清可數澤雉到應馴黟歙非難治民風自古淳李工部江南轉運含香五字客尚齒十年兄舊奏梁園賦新題漢柱名出驅星使傳入佐地官征獻可方前笏分憂又抗旌富饒今澤國佳麗古臺城錯節投刀釋頽綱攬轡清沃心期密啓銜尾待香粳處處江山秀行春莫計程楊日華宰錢塘洛社負才名吾宗占寧馨聞詩趨鯉空集慶墯鱣庭力學窺堂奧孤飛徹杳冥一枝攀緑桂百里應華星漢網何曾密吳歈正好聽油囊滿醇酎半日莫期醒栁紳歸縉雲豫曽典是郡紳依官師相國十餘年東甌别業寄秋雲平昔題橋墨尚存故郡曾登太守榻上都應掃相君門揮毫月殿香盈袖錫宴星津酒滿樽歸去吏民如問我五年書命紫微垣表弟李宗元知桂州陽朔縣桂林陽朔溪山秀莫歎迢迢五嶺南百里字人須敏政千金酌水更懲貪鳴榔下瀨潮程逺曳彩升堂壽宴酣逺地民淳無牒訴縣齋終日好清談高起居知廣州作藩南越古稱雄五管皆歸節制中腰佩金龜三品綬船開畫鷁一帆風橘官手版趨塵逺梅使星車附信通暫阻螭頭夾香案清宵應夢未央宫丁集賢通判餘杭遼東羽客富仙材仙殿飛觴接上台便道歸寧白蘋渚經時賜對柏梁臺里中驅弩先行路膝下斑衣慶壽杯明詔許令過别墅不憂郡閣簡書催吳􅲥赴宜興簿家住武夷峯眉間道氣濃風塵久為客雷火近成龍試吏江城僻寧親嶺路重一㕓期沒齒樂土定相容豫素有陽羡退居之志會當占數于樂郊也十六兄赴韶州從事魏帝臺邉拂戰塵初平山畔彩衣新又攀高栁隋堤暮却寄寒梅庾嶺春韶石間尋張樂地曹溪首訪悟空人男兒平昔四方志莫厭區區走隻輪章頻寄南昌孺亭洪井古南昌曾是梅仙試吏鄉一邑絃歌榮製錦幾程雞犬接維桑年深為客貂裘敝秋晚還家菊徑荒平昔題橋今遂志且斟壽酒獻高堂李廷評昭迪使淝上畫舸西風玉雨斜淮淝命將去程賖衣纓黃閣相君後門巷青春學士家驛路新袍欺草色公筵大白醉榴花謝庭蘭玉多才思休浣裁詩對客誇兩宋名賢小集卷一
