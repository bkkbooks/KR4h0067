body:
  text: 兩宋名賢小集卷一百十七宋陳思編元陳世隆補西渡詩集下遊麻姑山仙都觀浥露出南郭遵塗盼西嶺幽尋不憚逺陟巘造殊境懸瀑㵼天路髙齋跨參井麻姑固神人上下凌倒景逸駕不容迫遺蹤博塵影仙壇獨巋然蘚蝕此山頂古屋鳴鵂鶹汙池育蛙黽葛顔有異聞源委渺難省空餘豐碑字欻若猊驥騁永言賞心遇所樂塵務屏濯纓欲自孔斵鼻還思郢安得斯人徒置論挈裘領聖真豈逺而炯炯金在鑛九淵孕眀月七返悶神鼎至道如可求汲深碩修綆静思院上元日二首麻姑山換越王山憶昨下元今上元老去休驚長客寓春來不擬問田園畏途豺虎中原近挾日風雲四海昏夢遶瀟湘無落處憑誰楚些與招魂欲趨嚴蹕萬重山且酌清尊慶改元穡事何時銷劍㦸賢書不用到丘園傷心華屋燈如晝觸眼荒塗犬吠昏今日江東須管仲可憐窮􆀣尚遊魂雲溪院水竹依山住烟霞並舎分愁添中夜雨冷浸一溪雲滿目千戈地闗心鳥獸羣歸塗如可問猛犬莫狺狺二月十二日偶成金谿東行二十里髙即登山下臨水亂山中斷水横流水際招提對山起丹青像設半泥塗野僧一飯無鐘魚散䇿閒尋筍蕨芽宻林時逢桃李花信州逢寒食客行寒食路春晚上饒城野寺鳥鳥樂山蹊荆棘生人隨乗鴈集地隔一牛鳴俛首征途内官曹何日清題盛彦光丘壑軒盛子卜居南澗濵開軒自比葛天民一丘一􅊤有能事三浴三薫無俗塵閒逐逸人同執射偶逢漁父亦垂綸此軒成毁吾何預畫著岩間恐未真代簡呈信州李使君萬斛誰能破客愁一尊風味乏醇酘中丞自許憐漁父鬲上無端住督郵必使索郎頻有頋也知歡伯解消憂蘇州刺史詩盈卷還憶山僧冷病否曉發鵝湖萬松參嶺路千畝勸春耕不復紅鵝下空餘碧澗横佛扄穿縹緲仙馭鏁峥嶸道釋分殊境籃輿許我行古田縣勾吳於越通舟車南走甌越城百餘鑿山架橋窮奥區班春不行猶一墟此邦自與桃源竝不能深藏即人境五百年間閱戰争淳朴散盡狙詐生次韻和古田縣丞一方景南見恵詩踈慵我似海鷗閒文采君如霧豹斑不省流離思樂土深知鄊往愧高山低飛乳燕聲相接小叩華鯨夢亦還共看圍碁欲終日忘年初在立談間遊石鼓山湧泉院昔聞石鼓鳴今作石鼓遊擊拊久已息甲兵殊未休精廬莊嚴海百室雲霧浮維時當長夏蕭􅴋如凉秋高崖不見日老木枝相樛靈泉發嵌竇下注千仞溝向來經行人頗以名字留俯仰百年内磨鐫遍岩幽石橋可坐卧清絶無等儔衆山合沓來響合相獻酬雖逢㑹心欣未弭當世憂不知稽山上復有勝處否六飛尚東廵狐兎穴中州戈鋋塞河洛冠盖集閩甌墮此吠雪國烈火爛不收炎飈方焚輪赫曦欲停輈微生類焦榖兹焉得依投一乗凌風翰濯纓天漢流初食生荔枝六月寓閩山初逢荔子丹皺紅分顆顆凝日作團團品目誠無限珍甘擬亦難不勞走馬使安坐得加餐獨擅東南美誰如十八娘咲顰俱有味朱粉不迷香璀璨珠生掌清泠露入囊風流須第一飣座毎難忘秋日登萬嵗山平逺臺次糜韻山川信美自愁多嶺海途窮可若何倦客難尋越絶記畸人但唱郢中歌天香不入伊蒲塞佛水猶開優鉢羅還是浮雲韜白日鳳凰臺上一經過戲次韻和了信上座天工下觀戯魚龍分披敦物隳岱宗塵沙欲枯㒺嚮眼酒醴難澆磊塊胸㑹稽之南曰閩海東行萬里因雄風二兒得邑古長樂意擬分治三山中門張羅雀即吾室弔影不識求羊蹤擔簦挾卷者誰氏捉筆言詩有此公紛紛道旁皆杏李辛苦交攻無復理入林初聞薝蔔香知味自覺醍醐美今時社稷見老人它日陽休望吾子我觀蓬萊纔一水桐柏羅浮相對起赤烏銜符得寳書青鳥拂簷來報喜君能無事如懶殘吾兒倘不慙張底次韻許子大李丞相宅牡丹芍藥詩山丹麗質冠年華復有餘容殿百花看取三春如轉影折來一咲是生涯綺羅不妒傾城色蜂蝶難窺上相家京國十年昏病眼可憐風雨落朝霞聞師川諌議至漳州作建除字詩十二韻迓之建武下詔書海嶠識明主除吏得陽城所喜逸民舉滿腹懐經綸筆間含露雨平生相期心中興爾乎取定交自疇昔契濶及再暑執熱子南來五月憩漳浦破啼謀一笑預置風月俎危言倘可陳正學當盡吐成虧在須臾得失宜熟數收功謝王魏取道跡傅吕開兹衆正路慰彼蒼生苦閉闗拒他盗拂席招巢許題團圞圖一老滅塵慮七兒同静縁境超法界觀身作地行仙男女非殊相丹青亦浪傳襄陽聚首話猶是在家禪社日宇文徳和送酒次麋韻羈游苦少澤藏山老境難希藥駐顔日日尋春穿窈窕行行止渇漱潺湲忽逢歡伯來傾盖無數愁城盡斬闗多謝天公愛狂客九衢忙裏獨偷閒次韻許子大王豐父圓明送春之什鶗鴂能愁物外人芳菲聊借夢中身要知瓊刃非凡骨信有金庭不盡春伯雅相将浮鴨緑素娥應共踏蟾銀休驚麗句同仙授王許從來侍帝宸福州程使君止戈堂二首甌山閩海兩高深幕府同開閱古今堂號止戈賢守意郡名長樂聖君心行看賣劍為農器即有飛鴞集泮林比日東南是洙泗喜聞弦頌發清音跳梁山谷有頑民電掃風除一聚塵排闥江山千里眼滿庭桃李四時春定知當宁思龔遂正恐攀輿借㓂恂誰是諸侯老賔客酣歌應許杜陵人坐上呈師川有懐駒父上坡諌議立清班入奉威顔咫尺天仲氏三山乆憔悴徴君五嶺亦迍邅欣逢白寉歸華表更想黄熊出羽淵客舍一尊雙淚落相陪里社復何年師川見和再用元韻河洛中秋已凛然甌閩八月尚炎天方懐許國忠言切不計歸途道里邅子産未能忘季札太阿應必待龍淵樹人樹木有明筭誰謂百年同十年鉛山縣石井院兩年再踏鉛山路今日初嘗石井泉碧玉岩邉瀹湯餅全勝五鼎擊肥鮮初入浙中松竹籠官道牛羊食野田㞯山低送客蕩水逺含天乍聴吳兒語初逢傖父船平生足未歴聊以慰華顛我生豫章汭游宦在京華百粤非吾土三吳亦爾家客星嚴瀨釣西子越溪紗一洗眵昏眼如乗上漢槎山村柿栗熟客舎稻粱秋池足能言鴨蹊多喘月牛如聞息戰鬬剰欲起歌謠鼓楫臨江誓誰為祖豫州立秋日上饒郡偶成二首承明非厭直衰疾自投閒江漢蒸炊内盤㿻㗳哈間層氷萬里夢謁帝九重闗碩借摶風翼追逰物外山平生逃暑飲病著不濡唇熨齒甘𤓰冷流匙香粒勻加餐雖意决對案已眉顰却歎廉頗老猶為善飯人盛彦光次韻見和復用前韻因以自歎星織烏同織鶴閒鷗亦閒問君離俗乆何事落人間末伏秋無雨殘歊晝掩闗寒泉聊洗耳清冷似吾山凉飈将透齒烈火謝燋脣壁織梭梭應簷珠顆顆勻隠憂成獨樂淺笑換深顰更上藐姑射問塗氷雪人夢中作四言用前韻事有怕愛語分忙閒左右前後外内中間青雲干吕紫氣浮闗五星東井微臣北山鶂鶂珍腿猩猩美唇醴齊調適勺藥和勻老商嬉笑西施解顰倦黽若士翳桑餓人再次四言韻執虎入圏縶驥在閑志六合外身十畝間組繫單于泥封函闗樂我叢桂淮南小山魯兄衛弟虞齒虢唇倚伏相因否泰惟勻履兹艱虞慎厥笑顰水清見石天定勝人再次四言韻入聖有域存誠以閑徳不徳上材不村間堂上不糞門設常闗鄙哉丘垤覆簣為山編貝皓齒含朱絳唇甄陶圓熟琢削細勻不笑不言倚席以顰商略有此為若而人秋分日偶成洪崖山下一臞儒碧玉岩邉抱病夫永日翛然無復事人欺憔悴鬼揶揄曽仲共和予春日登滕閣詩盖舊詩也復次韻西江東畔見江樓江月江樓萬斛愁試問海潮應念我為將雙淚到南州䗶梅見江樓下䗶梅花香撲金尊醉落霞獨倚東風如夢覺一枝春色别人家人日開嵗逢人日吾衰不夢周家書生逺恨客舎起離憂朔雪驚南眼江梅哭隴頭誰能結綵勝一為散春愁鍾乳鍾乳宜為粉扶衰老所便緘藏鵝管細治錬玉椎堅石髓誠難值雲腴恐浪傳刀圭聊已疾未敢議真仙葉少藴出示鄭先覺閱駿圖為作長歌丹青得名曹将軍畫馬已來無復人諸生韓幹受其法絶足亦傳沙苑真儒林望郎李公麟曹韓復生能與鄰心胸可納天西極紈素頻空兾北羣鄭生晚識李侯比自許筆端輕萬里山川初出大宛城翰墨猶沾渥洼水汗血歕沙指頋間霧鬛風鬉卷中起戱寫十馬皆龍材前有飛黄後山子葉公好尚有祖風不愛真龍愛畫龍千金不惜市駿骨睥睨神物秋毫中英雄嘗聞妾換馬意氣欲将詩換畫詩工畫玅兩崛竒谷量馬觀未論價公詩自是生驊騮恨公不身親李侯向來曹韓空白頭和曽仲共大風折木歌疾風岌嶪土囊口陽崖中裂隂崖吼南山喬木大百圍頃刻剪伐如斷臼修枝偃蹇擲龍蛇直幹崩山塞岩岫干雲蔽日埽地空掣電奔霆翻覆手山靈掩泣惋惜深匠石含悲涕洟乆折臂而公黥而王精金當鎔玉當剖㫁木刳為浮海航路指銀河上牛斗委餘猶得宫殿材𤨏細亦䝉梁棟取萬斛之舟可勿論大厦帡幪此焉有狂飈卷空欲奚為夀弊金石長不朽天生大才将有用乖逢相因孰先後嗟爾乾風與枯栁摧扤為薪尚誰咎楚州阻水漲懐汪信民吕居仁二十四言大江北理長淮西逝厥隩射陽城邑嶽峙鑿渠而漕首淮江尾舳艫㞹峨連檣千里青雀翩翩彩虹嶷嶷梁跼舟蹐限兹黄水昔我至正得二國士簞瓢相樂汪吕氏子於今幾年乖隔生死梗泛萍飄乃復于此菱花净土鷺羽徐起如欲我留盼睞以喜俯仰山川感念成毁一瞬千古寓非予恥奉送駒父師川二郎中赴召四首火中暑退庚伏在婁赫熾方炎金石在流之二大夫服絲紑紑文昌臺郎祗命是憂中江有舳中涂有輈風檣雨轂長夏為秋白雲在天崒如岩丘倐忽西東不我告謀翩翩者鵠俯瞩魚游将逝復止矯影河洲嗟予去國三葛于休止車生耳永謝鳴騶揮袂江干長嘯林幽遷居從宦三十載故山凡幾歸昔歸尚有屋再歸已傾欹今歸但喬木竹落荆薪扉上為烏鳥都下為犬雞栖相從東北隅三畝以為基積塊與運甓實窪而培卑成兹道傍舎空我槖中貲堂室取即安户牖適所冝嘉樹三四株當忩發華滋馨香入懐䄂似與遷徙期我今六十老豈不知前非咨謀愚見捨就列筋力微竊食奉祠禄永負伐檀詩松楸幸在望鄰曲不見遺葛巾隨里社庶以保期頥次韻公實與用中夜話賢哉鄭圃客去為五漿驚解榻栖雲表開忩納水聲忽逢京國舊相對夜燈明歎息胡証老猶思摘鉄檠玉女峯玉女何時見兹峰獨抱羣古容餘佛坐虚室但罏薫林隠投壺電山藏出岫雲自慚非屈宋欲賦不成文兩宋名賢小集卷一百十七
