body:
  text: 兩宋名賢小集卷二百九十九宋陳思編元陳世隆補竹所吟稿徐集孫字義夫建安人理宗時嘗仕於浙好為詩足迹所至輒有題詠於西湖諸勝處尤多每作一詩甫脫稿人即爭購相為傳誦竹所吟稿二卷林可山為序古意彼美山中桐千古生清風斫削羅徽弦不費膠漆工伊石臺有梅月冷雲空濛一彈彈春江遲日春融融再彈彈招隱霜未吟樵楓三彈彈離騷感慨古道隆太羮元酒味旨趣回顓蒙世無子期年知音未易逢袖手長太息所聽何不同所聼非不同舉世鄭衛聾智果寺觀東坡墨迹參寥泉煮茗評詩嵗月深堂堂遺像篆煙沉數間老屋關興廢一假清名無古今碑斷亂雲封字腳井昏落葉覆泉心斜陽影裏夷猶處仰止髙風不敢吟暇日言事二首雨苔侵徑客來稀官事才間便掩扉欹枕忽生鄉國念夢中喜得一畨歸西風落葉滿庭除隱几清吟獨撚鬚官地莫將私地比蘜苖也種兩三株送葉靖送之維揚竹西亭下路二十四橋迂有志風寒地携家雨雪途杯酣看玉蘂槖重載湖珠寫就烏絲句無妨寄雁奴中秋夜雨兩年客帝畿圓月浸秋輝今夜月圓時風雨打門歸年年此桂魄不照今年客明月應團圓只被浮雲隔觀秋潮八月西風噓沆瀣長江協候肆澎湃錢唐王氣天所鍾非為子胥逞靈怪海門三山縹眇青雙練夾岸奔雷霆蛟龍黿鼉匿形影銀濤雪浪翻滄溟踏浪羣兒慣行險出沒波心旗閃閃須臾瀲灔潮信平蕩漾漁舟千萬點天低暮靄襲人衣遊子興盡各云歸獨有騷翁看不足吟到夜月揚清輝江湖偉觀昔日山中一小亭重新輪奐轉峥嶸著身梯磴千層上到眼江湖兩𣲖明鼎藥丹成仙已去杯泉墨冷水猶清夀星炯炯無今古長照東南王氣生聞蛬獨搔短髮坐更深夜雨書窗半欲隂近日病魔詩思澀一秋清句付蛬吟對蘜未能籬下學悠然慚為微官繫日邊造物自憐清俸少蘜花隨地鑄金錢同杜北山鄭渭濵湖邊小憩與朋看落葉捨棹踏湖西野店傳杯酌殘陽索品題雲隨坡影動山被桞隂迷一點寒鴉過知他何處棲看梅嵗寒氣味少人知一度相逢一度竒不受陽和私點化慣經風雪冷禁持影橫坡老數枝畫香沁逋仙兩句詩相對依依吟未得斜陽歸路不妨遲公無渡河公無渡河公無渡河公必欲渡意如何波濤洶湧何足畏中原未復一身多爭如平地有風波人心之險險於河水樂洞路穿巖竇折羊腸處處亭臺御墨香流水不隨人事去尚餘絲竹舊宫商玉清宫初陽臺守藥胎仙去不來空留山頂煉丹臺明眸炯炯初陽在知隔人間幾劫灰下竺看猿渴泉飲罷過别枝株守山林得便宜伸手攫拏野僧果貴逰玩㺯如兒嬉膏梁恣欲甚邱壑苞苴賸把實囊槖本然無物拋乞與縱有腥羶醫無藥勸汝儔侣只依僧殘齋剩核亦潔澄切勿自照具人面便爾忘却當初洞口呼不譍聞鶴千年華表竟何榮曽結孤山夙世盟午夜露零和月冷一聲風靜仰天鳴既歸蕙帳情何怨不上揚州韻更清未必湖隂人聽得聽來好爵謾營營玉泉看金魚石沼鑿瓊瑶金鱗數百條年深須變化泉潔自逍遙網罟難垂手公卿擬上腰龍宫依梵法翻水雨青霄訪僧不遇特地辱君選佛場行行踏遍古苔荒不因坐石貪搜句何事抽單輟赴堂空榻日移懸錫影别寮風過煮􅖗香忙中我為間來到君本間人為甚忙六一泉惠勤巳蛻老歐仙物逐人非井便乾不是坡翁重到此此泉安得到今寒金沙井修綆垂瓶自汲深水澄沙瑩幾星金分明不與貪泉比莫為金沙起利心乍晴吟情天逺倚闌干聲歇鳴渠雨乍乾只為吳山住官舍却因笋蕨憶家餐燕窠出子春遊懶燈燼開花夜話殘收捨栁綿囊楮被麥秋猶有一畨寒重拜和靖先生墓秋聲爾許悲懷古若為思菊老泉堪薦山孤草亦萎髙風留塑鶴殘雨暗荒碑依舊梅千樹無花香似詩竹閣昔日孤山像重移閣幾春騷名垂句法遺愛稔邦民雨剝一碑古風搖萬竹新來遊興感慨誰繼若而人夜過富春夜船搖兀當乘槎得與僧俱似出家數幅征帆拋草渡一團幽夢繞梅花風傳山縣殘更漏潮練霜江淡月華所恨釣臺眠裡過磯邊不及理漁車清明春風客裏動經年寂寞松楸入夢邊斗酒誰為寒食奠懶將楊桞插門前燕子呢喃不聽一年餘又見雙飛向竹廬翻笈人間湖海客乘來仍占故巢居訪林可山不值尋君每自恨遲遲及扣巖扄誤所期空放山間雲外鶴只吟篷底雪中詩孤燈欹枕勞頻夢樽酒憑欄定幾時獨立小橋回首處籬邊猶喜見橫枝促刺詞促刺復促刺勸織聲轉劇小婦􅀈雨採桑歸大婦煮雪抽絲繹卒勤欲織禦寒衣朝暮惟恐不盈尺織成門外迫摧租不了輸租仍賣綌婦姑對泣兒號寒更無可補兒衣隙帛暖本擬代綌寒賣綌寒來愈無䇿促刺兮促刺兮勸人織兮織何益貯之金屋是何人重重綾錦飭珠璧鷺素狎沙鷗水國盟一生蹤迹任飄零謾誇霜雪精神别難洗蝦魚氣習腥點破青山成曉畫飛來紅蓼稱秋汀江湖出入風波裡比著胎仙欠典刑蟬髙蹈槐梢與栁隂爭鳴直到日西沉初無識見偏客喙不讀詩書却好吟風露細餐雖足飽山林為計更宜深所談幸爾非人事逆耳從來欠賞音贈相士好爵縻人見不休更饒君盡許封侯山林朝市心珠相莫誤平人枉白頭遺僧楮衾練從秋水桂華鄉雅稱分供衲子牀一假溫和雲共軟十分明潔月爭光吟魂有夢圓春草禪骨無因怯曉霜金帳繡衾皆業境此中清趣最深長可賦軒避暑萬籟琅玗爽氣浮何妨暫借著詩流世人奔競長為暑心地清涼即是秋普供茶瓜醒眊矂自携枕簞足夷猶從今只有山林好浮世炎炎卒未休客夢人生總總汩浮榮勘破令人厭宦情竹屋無時勞結夢秫牀何日遂歸耕雨侵藥灶莓苔長秋逺書臺筆硯清漸老鬢毛猶未雪此身應及見升平夜雨夜半倐驚覺狂風攪秋鳴掣電起迅雷驟雨翻盆傾逆知造物意揫斂萬寶成天威不竟夕須臾山月明官舍雙桂翠葉黃金剪綴成幽香不斷襲人清獨披月色連宵看更結秋風來嵗盟好夢偏為蛬呌破吟聲那似蝶飛輕紛紛凡卉誰堪數説與寒梅蚤合并雨中用進退格秋來天氣半晴隂塊坐山窗一欠伸欲睡却思妨宦業怕吟惟恐動鄉心逺書難凖衣仍薄清俸無多槖慣貧箇種關情畦稻熟雨宜時降不宜霪嶽鄂王墓古木號風抱不平百年忠義日爭明墳前人馬空存石何似當時聽用兵喜鵲寺鵲巢不見委空枝透徹機關在險時自後非無禪可問多因險處怕人窺訪詩人得得訪詩仙平湖水接天身輕如鶴羽路逺買漁船日上荷撑蓋春深桞脫綿造門人已出冷潄石山泉湖庭夜坐片葉秋風數日程爭如天籟未秋聲厭居塵境炎威熾來納虛亭夜氣清萬點螢光移醉眼一湖蟾影蕩吟情笙歌寂寂重關掩獨許高僧並臂行即事無端梅潦肆鳴渠宫舍蕭條似蹴居把酒厭談天下事挑燈頻讀故人書吏抄詩孏多訛字僮治餐遲少嫩蔬濁世炎蒸方鬱鬱庭前新草不令除挽北澗本分參禪學吟中透一關清名傳北澗遺像在南山石塔人千古煙梯屋數間詩魂何處覔應伴白雲間石屋路僻鳥關關行吟逐字刪偶來遊石屋却喜見香山閣峭寒雲護巖深野水間坡仙留墨在姓字有無間杯泉一方石甃溜涓涓偏以杯稱萬古傳名利醉人醲似酒誰甘恬淡酌清泉此君軒此君瀟灑翠團欒軒扁佳名墨已乾欲識清風千古在試將石刻句吟看湖西納涼小艇撑過第一橋酌泉橋下擲詩瓢來遊道院分荷供擬拉吟僧遣鶴招暮靄直從漁笛起月華髙過塔燈遙且於靜處偷清福人海驚塵湧似潮寄題潄玉一𣲖潺湲迸石溪直疑寒碧練玻璃百川流去須歸海萬籟喧來有定時橋接丹山橫夜月栁籠碧草拂晴曦吟廬此去雖相近爭似間鷗立渺瀰兩宋名賢小集卷二百九十九
