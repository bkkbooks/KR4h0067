body:
  text: 兩宋名賢小集巻二百九十九宋陳思編元陳世隆補竹所吟稿徐集孫字義夫建安人理宗時嘗仕於浙好為詩足跡所至輙有題詠於西湖諸勝處尤多毎作一詩甫脱稿人即争購相為傳誦竹所吟稿二巻林可山為序古意彼美山中桐千古生清風斵削羅徽弦不費膠漆工伊石臺有梅月冷雲空濛一彈彈春江遲日春融融再彈彈招隱霜未吟樵楓三彈彈離騷感慨古道隆太羮元酒味㫖趣囬顓䝉世無子期年知音未易逢袖手長太息所聽何不同所聼非不同舉世鄭衞聾智果寺觀東坡墨跡参寥泉煮茗評詩嵗月深堂堂遺像篆烟沉數間老屋關興廢一叚清名無古今碑斷亂雲封字脚井昬落葉覆泉心斜陽影裏夷猶處仰止髙風不敢吟暇日言事二首雨苔侵徑客來稀官事纔閒便掩扉欹枕忽生鄉國念夢中喜得一畨歸西風落葉滿庭除隱几清吟獨撚鬚官地莫將私地比蘜苖也種兩三株送葉靖送之維揚竹西亭下路二十四橋迂有志風寒地携家雨雪途杯酣看玉蘂槖重載湖珠冩就烏絲句無妨寄雁奴中秋夜雨兩年客帝畿圓月浸秋輝今夜月圓時風雨打門歸年年此桂魄不照今年客明月應團圓只被浮雲隔觀秋潮八月西風嘘沆瀣長江恊候肆澎湃錢唐王氣天所鍾非為子胥逞靈恠海門三山縹緲青雙練夾岸奔雷霆蛟龍黿鼉匿形影銀濤雪浪翻滄溟踏浪羣兒慣行險出沒波心旗閃閃須㬰㶑灔潮信平蕩漾漁舟千萬㸃天低暮靄襲人衣游子興盡各云歸獨有騷翁看不足吟到夜月揚清輝江湖偉觀昔日山中一小亭重新輪奐轉峥嶸着身梯磴千層上到眼江湖兩𣲖明鼎藥丹成仙已去盃泉墨冷水猶清夀星烱烱無今古長照東南王氣生聞蛬獨搔短髪坐更深夜雨書窓半欲隂近日病魔詩思澁一秋清句付蛬吟對蘜未能籬下學悠然慚為微官繫日邊造物自憐清俸少蘜花隨地鑄金錢同杜北山鄭渭濵湖邊小憇與朋看落葉捨棹踏湖西埜店傳杯酌殘陽索品題雲隨坡影動山被桞隂迷一㸃寒鴉過知他何處棲看梅嵗寒氣味少人知一度相逢一度竒不受陽和私㸃化慣經風雪冷禁持影横坡老數枝畫香沁逋仙兩句詩相對依依吟未得斜陽歸路不妨遲公無渡河公無渡河公無渡河公必欲渡意如何波濤汹湧何足畏中原未復一身多争如平地有風波人心之險險於河水樂洞路穿巖竇折羊腸處處亭臺御墨香流水不隨人事去尚餘絲竹舊宫商玉清宫初陽臺守藥胎仙去不來空留山頂煉丹臺明眸烱烱初陽在知隔人間幾刼灰下竺看猿渴泉飲罷過别枝株守山林得便宜伸手攫拏埜僧菓貴逰玩㺯如兒嬉膏梁恣欲甚邱壑苞苴䞉把實囊槖本然無物抛乞與縱有腥羶醫無藥勸汝儔侣只依僧殘齋剰核亦潔澄切勿自照具人面便爾忘却當初洞口呼不譍聞鶴千年華表竟何榮曽結孤山夙世盟午夜露零和月冷一聲風静仰天鳴既歸蕙帳情何怨不上揚州韻更清未必湖隂人聽得聽來好爵謾營營玉泉看金魚石沼鑿瓊瑶金鱗數百條年深須變化泉潔自逍遥網罟難垂手公卿擬上腰龍宫依梵法翻水雨青霄訪僧不遇特地辱君選佛場行行踏遍古苔荒不因坐石貪捜句何事抽单輟赴堂空榻日移懸錫影别寮風過煮􅖗香忙中我為閒來到君本閒人為甚忙六一泉惠勤巳蜕老歐仙物逐人非井便乾不是坡翁重到此此泉安得到今寒金沙井修綆垂缾自汲深水澄沙瑩幾星金分明不與貪泉比莫為金沙起利心乍晴吟情天逺倚䦨干聲歇鳴渠雨乍乾只為呉山住官舍却因笋蕨憶家餐燕窠出子春遊嬾燈燼開花夜話殘収捨栁綿嚢楮被麥秋猶有一畨寒重拜和靖先生墓秋聲爾許悲懐古若為思菊老泉堪薦山孤草亦萎髙風㽞塑鶴殘雨暗荒碑依舊梅千樹無花香似詩竹閣昔日孤山像重移閣幾春騷名垂句法遺愛稔邦民雨剥一碑古風揺萬竹新來遊興感慨誰繼若而人夜過富春夜船揺兀當乗槎得與僧俱似出家數幅征㠶抛草渡一團幽夢繞梅花風傳山縣殘更漏潮練霜江淡月華所恨釣臺眠裡過磯邊不及理漁車清明春風客裏動經年寂寞松楸入夢邊斗酒誰為寒食奠嬾將楊桞挿門前燕子呢喃不聽一年餘又見雙飛向竹廬翻笈人間湖海客乗來仍占故巢居訪林可山不值尋君毎自恨遲遲及扣巖扄誤所期空放山閒雲外鶴只吟篷底雪中詩孤燈欹枕勞頻夢樽酒凭欄定幾時獨立小橋回首處籬邊猶喜見横枝促刺詞促刺復促刺勸織聲轉劇小婦􅀈雨採桑歸大婦煮雪抽絲繹卒勤欲織禦寒衣朝暮惟恐不盈尺織成門外廹摧租不了輸租仍賣綌婦姑對泣兒號寒更無可補兒衣隙帛暖本擬代綌寒賣綌寒來愈無䇿促刺兮促刺兮勸人織兮織何益貯之金屋是何人重重綾錦飭珠璧鷺素狎沙鷗水國盟一生踪跡任飄零謾誇霜雪精神别難洗蝦魚氣習腥㸃破青山成曉畫飛來紅蓼稱秋汀江湖出入風波裡比着胎仙欠典刑蟬髙蹈槐梢與栁隂争鳴直到日西沉初無識見偏客喙不讀詩書却好吟風露細餐雖足飽山林為計更宜深所談幸爾非人事逆耳從來欠賞音贈相士好爵縻人見不休更饒君盡許封侯山林朝市心珠相莫誤平人枉白頭遺僧楮衾練從秋水桂華鄉雅稱分供衲子牀一叚温和雲共軟十分明潔月争光吟魂有夢圓春草禪骨無因怯曉霜金帳繡衾皆業境此中清趣最深長可賦軒避暑萬籟琅玗爽氣浮何妨暫借著詩流世人奔競長為暑心地清凉即是秋普供茶𤓰醒眊矂自携枕簞足夷猶從今只有山林好浮世炎炎卒未休客夢人生總總汩浮榮勘破令人厭宦情竹屋無時勞結夢秫牀何日遂歸畊雨侵藥灶莓苔長秋逺書臺筆硯清漸老鬢毛猶未雪此身應及見昇平夜雨夜半倐驚覺狂風攪秋鳴掣電起迅雷驟雨翻盆傾逆知造物意揫歛萬寶成天威不竟夕須㬰山月明官舍雙桂翠葉黄金剪綴成幽香不斷襲人清獨披月色連宵看更結秋風來嵗盟好夢偏為蛬呌破吟聲那似蝶飛輕紛紛凡卉誰堪數説與寒梅蚤合并雨中用進退格秋來天氣半晴隂塊坐山窓一欠伸欲睡却思妨宦業怕吟惟恐動鄉心逺書難凖衣仍薄清俸無多槖慣貧箇種關情畦稻熟雨宜時降不宜霪岳鄂王墓古木號風抱不平百年忠義日争明墳前人馬空存石何似當時聽用兵喜鵲寺鵲巢不見委空枝透徹機關在險時自後非無禪可問多因險處怕人窺訪詩人得得訪詩仙平湖水接天身輕如鶴羽路逺買漁船日上荷撑葢春深桞脱綿造門人已出冷潄石山泉湖庭夜坐片葉秋風數日程争如天籟未秋聲厭居塵境炎威熾來納虚亭夜氣清萬㸃螢光移醉眼一湖蟾影蕩吟情笙歌寂寂重關掩獨許高僧並臂行即事無端梅潦肆鳴渠宫舍蕭條似蹴居把酒厭談天下事挑燈頻讀故人書吏抄詩孏多訛字僮治飡遲少嫩蔬濁世炎蒸方欝欝庭前新草不令除挽北磵本分叅禪學吟中透一關清名傳北磵遺像在南山石塔人千古烟梯屋數間詩魂何處覔應伴白雲閒石屋路僻鳥關關行吟逐字刪偶來游石屋却喜見香山閣峭寒雲䕶巖深野水閒坡仙留墨在姓字有無間盃泉一方石甃溜涓涓偏以盃稱萬古傳名利醉人醲似酒誰甘恬澹酌清泉此君軒此君瀟洒翠團欒軒扁佳名墨已乾欲識清風千古在試將石刻句吟看湖西納凉小艇撑過第一橋酌泉橋下擲詩瓢來遊道院分荷供擬拉吟僧遣鶴招暮靄直從漁笛起月華髙過塔燈遥且於静處偷清福人海驚塵湧似潮寄題潄玉一𣲖潺湲迸石溪直疑寒碧練玻璃百川流去須歸海萬籟喧來有定時橋接丹山横夜月栁籠碧草拂晴曦吟廬此去雖相近争似閒鷗立𣺌瀰兩宋名賢小集巻二百九十九
