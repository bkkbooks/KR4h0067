body:
  text: 兩宋名賢小集巻一百六十宋陳思編元陳世隆補南澗小集韓元吉字无咎開封人維之子仕至吏部尚書龍圖閣學士封潁川公嘗師尹焞與朱熹友善又得吕祖謙為壻師傅淵源儒林推重徙居上饒居前有澗水號南澗涉澗而南有園築亭竹間號蒼筤與兄元隆俱登甲科所著有愚戅錄周易繫辭卒葬城東子孫遂為上饒人子曰琥字仲止號澗泉尤有髙節詩與趙昌父並稱於信土雨中聞伯恭至湖上莫嫌鞭馬踏春泥茶鼎詩囊偶共攜山色雨深看更好湖光烟接望還迷連天花絮飛將盡夾道蒲荷長欲齊官事得閒須洗眼蓬壺只在帝城西記建安大水孤城雨脚暮雲平不覺魚龍自滿庭託命已甘同木偶置身端亦似羸瓶浮家却羨鴟夷子弄月常憂太白星當日乗槎便仙去故人應在曲江靈紅梅不隨羣艷競年芳獨自施朱對雪霜越女漫誇天下白夀陽還作醉時粧半依修竹餘真態錯認夭桃有暗香月底瑶臺清夢到霓裳新换舞衣長送陸務觀得倅鎮江還越髙文不試紫雲樓猶得聲名動九州金馬漸登難避世蓬萊已近却回舟燒城赤舌知何事許國丹心惜未酬歸卧鏡湖聊洗眼雨餘層壑正奔流送陸務觀福建提倉觥船相對百分空京口追隨一夢中落紙雲烟君似舊盈巾霜雪我成翁春來茗葉還爭白臘近梅花盡放紅領畧溪山須妙語小迂旌節上凌風隆興甲申嵗閏月游焦山荒村日晴雪猶積繫纜焦公山下石江翻斷崖石破碎瘞鶴千年有遺蹟瘦藤百級躋上方浮玉南北江中央檣竿如林出煙浦酒船逺與帆低昻老鴟盤風舞江面殺氣淮南望中見神龍只合水底眠為洗乾坤起雷電觀音巖前竹十尋大士不死知此心醉歸更喚殷七七剰便好花開鶴林遊靈山嶽鎮古所錄兹山諒真遺憶從西江來恍忽忻見之初疑春雨晴雲物出怪竒稍稍對巖壁森森面嶔嵜紛紜如列障散漫如連帷磅礴千里間衆景皆奔馳頗訝地軸涌未覺天柱虧不知崑崙髙遂使泰華移諸峯七十二磊砢畧可推駢觀擁佛髻逺睇凝婦眉大或覆鐘鼎細亦銛刀錐石匱一何髙梯天此為墀崩騰鐵馬羣中有大將旗身居萬石貴氣壓絫卵危雄傑既莫狀清深亦餘姿蛟螭䕶絶磴草木忘四時定知水晶宫閟藏神所司飛泉瀉餘怒勢作千丈垂葛仙煉丹成空聞龍化陂遺休被山川勝㮣無乃私其東沐金鵞其西曝𤣥龜洞雲倚長空巖月隠半規龍電衛方壇至今傳道師延連葬玉地茸秀尤相宜分明別長㓜次第論崇卑袂將九華接肩與廬阜隨孰云東南傾擎持端在斯㑹當歴其巔不但一管窺雖㣲始皇頌儻有神禹碑南巖一名盧家巖在信州西南官曹簿領無時空一春蹙蹙塵埃中溪南十里巖谷好俗駕屢整無由窮前時相邀雨斷道今時不雨天亦風乃知書生不解事每以慳澀勤天公興來邂逅始一往相與縱轡隨飛鴻野棠着子梅杏老密葉尚帶殘花紅崢嶸屋宇吁可怪無乃開闢煩豐隆却尋危徑山巉絶俯仰曠野迷西東涓涓寒溜滴永雪一酌為我凉一胸山川何曽嵗月計可憐翠阜紛磨礲人生歡笑不易得此㑹幾許誰能同春禽正喧日已暮歎我歸期還匆匆雲洞揮策度窮谷撑空見樓臺丹崖幾千仞中有佛寺開老僧如逺公出門走蒿萊下馬問所適褰衣指崔嵬飛欄倚石磴曠蕩無纎埃坐久意頗愜爽氣生樽罍仙棺是何人白骨藏莓苔舉酒一酌之慨然興我懷丹砂固未就白鶴何時來不若生時樂長嘯銜此盃題武夷九曲櫂歌宛宛溪流疊九灣山猿時下鳥間闗釣磯茶竈山中樂大隠屏邊日月閒兩宋名賢小集巻一百六十
