body:
  text: 兩宋名賢小集巻四十五宋陳思編元陳世隆補獨樂園稿四獨樂園新春春風與汝不相闗何事潛來入我園曲沼揉藍通底澈新梅翦綵壓枝繁短莎乍見殊堪喜鳴鳥初聞未覺喧憑仗東君徐按轡旋添花卉伴芳樽宿石堰聞牧馬者歌太河之曲多寛閒牧田枕倚長堤灣烏栖鵲散隄樹寂析木聲稀夜欲䦨牧兒跨馬乘涼月歴歴繞羣高唱發幽情逸氣生自然徃徃鳴鞘應疎節歌辭難辨野風高似述離憂嗟役勞徘徊不㫁何妨近髣髴如聞已復遥長川冷浸秋雲白露草翻光凝碧色星疎河淡夜初長展轉空亭柰孤客洞簫音律京君明可憐骨朽不更生安得使傳哀怨意為我寫之羌笛聲春日書寄東郡諸同舎滑臺古鎮掲高牙主人賢厚賔友嘉公庭退休射臺飲水沉緑李浮甘瓜清言妙喻間詼謔笑語往返何喧嘩别來汎濫若浮梗塵愁俗累稠於麻提鞭俄葢觸風日慘澁滿眼飛埃沙朱門湛湛果深淺門外日擁千餘車閽人未肯即通剌指彈手版景欲斜就令入見亦何事氣象𣺌邈凌青霞圍棋角智賭勝負拙者理與功名賖捨之歸入户庭隘仰視青天如井蛙後檐數尺地荒穢不翦欲令生薺花當春寂寂但如此意恐至外逢紛華柰何勝友百餘里不可一見如天涯何時更共把巵酒側身北望空咨嗟閒居呈復古閒居雖嬾放未得便無營伐木添山色穿渠擘水聲經霜收芋美帶雨接花成前日鄰翁至柴門埽葉迎奉和大夫同年張兄㑹南園詩徽字伯常露濃秋過半氣爽雨收餘取酒邀嘉客呼兒埽敝廬生涯數畝地官業一軒書竹結垂綸屋泉分入座渠愜心皆樂事容膝即安居梁静栖無燕波澄戲有魚茂林穿繚繞微徑步虚徐果落方知熟莎長不忍除過從常苦遠接待每慚疎不厭茅茨陋時迃長者車和呉冲卿三哀詩江鄰幾梅聖俞韓欽聖天生千萬人中有一儁傑柰何喪三賢前後纔朞月鄰幾任天資浮飾恥澡刷朝市等山林衣冠同布褐外無涇渭分内有淄澠别逢時敢危言慷慨誰能奪聖俞詩七千歴歴盡精絶初無追琢勤氣質禀清潔負兹驚世才未嘗自摽掲鞠躬隨衆後側足畏蹉跌欽聖渥洼駒初生己汗血雖有絶塵蹤不失和鸞節宜為宗廟器儼雅應鍾律衆論誠共然非從友朋出羣材方大來軮軋高下不齊貌扶帝室誰云指顧間聨翩化異物弔縗哭未己病枕氣巳竭同為地下遊攜手不相失紳紱頓蕭條相逢但嗟咄誦君三哀詩終篇涕如雪眉目尚昭晰笑言猶髣髴肅然來悲風四望氣蕭瑟和邵不疑送敵使還道中聞江隣幾梅俞聖長逝作詩哭之昨夕郵吏來叩門致書函呼奴取以入就火開其緘不疑賦長篇發自燕之南痛傷江與梅繼踵良人殱噫嗟知其二尚未知其三請從北轅後覼縷委曲也次序也為君談鄰幾雖久病始不妨朝參飲歠寖衰久厥逆生虚痰逮於易簀辰皮骨餘崆嵌遺書屬清儉終始貞無慚聖俞食寒水外以風邪兼愚醫暴下之結轖候愈添惙惙氣上走不復容鍼砭自言從良友地下心亦甘欽聖體素彊藥石性所諳平居察舉措敢以不壽占一朝蹔歸卧簿領不廢簽訃來衆皆愕未信猶闚覘興言念三子舉袂涕己霑英賢能幾何逝者迹相銜君疑天上才難得帝所貪我疑人間美多取神所嫌茫茫幽明際蓍蔡難窮探憂來不可忘終日心厭厭謝興宗恵草蟲扇呉僧畫團扇㸃綴成微蟲秋毫宛皆具獨竊天地功細者及蛛蝥蜘蛛也大者纔阜螽枯枝擁寒蜩黄蘂粘飛蜂翾然得生意上下相追從徒觀飛動姿莫睹筆墨蹤兒曹取真物細校無不同恐其遂躍去亟取藏箱中乃知藝無小意精神可通不興誤圖蠅能感紫髯翁子猷状蟬雀藏寶傳江東不知古何如此畫今為雄人墓木巳拱其徒頗能工舊法存百一要足超凡庸友人幸為賜物薄意何隆玩之不替手愛重心無窮常如對君子穆穆來清風都下秋懐呈聶之美愚疎强從仕趣尚與時乖朅來遊京邑榮願知誰諧王國冨與竒氣象標巖崖雲鴻送雙目攀援路可階秋風轉枯葉颯颯繞寒齋出門無所之飛塵滿天街夫君宦未達猶得稱我儕解衣換斗酒且盡平生懐送李汝臣同年謫官𨗳江主簿得喪互循環古今昧終始百嵗落其間僅與毫芒似所以達人心身外不復計愁來若亂絲疏解當以理昔君闗外來藉藉聲華起憑案一濡毫萬言俱落紙老生窺其文色若寒灰死閣筆不能下敢有玭瑕指或時抵卿相入門俱倒屣閽夫迎受謁不敢揚眉視解褐吏邊州長途初進跬蛟龍得尺水雙骼方嶷嶷西羌負徳澤飛鏑聳邊鄙添兵十萬餘斗粟無支擬州郡走符檄縱横恣鞭箠閭閻浪愁苦卒食半糠粃上官知君才悉以儲糧委開倉募平糴至者車連軌嚴明束吏手誘諭提民耳留榖受金去若與同儕市弦朔未云周露積丘山比曽無轉運勞坐飽防秋士幕府上其功明詔深嘉美為僚登九寺長人専百里卿用報勤劬未言窮任使何期逢怨讎意外成瘡痏刺骨無文法吹毛出瑕滓清霜五月飛慘烈傷蘭芷鸞鳯失倚梧飄泊還荆枳聖朝方任能大過尚收齒況於濟時具蹔然遭詆訾寧因青蠅惡遂取璵璠毁良工構明堂必不遺杞梓勉哉益自立勿為窮衰止人生難豫期神理無終否庸知今日憂不為後日喜我道誠無虧壈坎安足恥闗山迤邐長百劍連天倚縈紆結危棧迥入雲星裏蜀國富嬉遊花繁春酒㫖莫作弔原文投之岷江水景仁書云去冬因酒病耳病牙遂不入洛以詩寄呈許昌攜手盡時英況復新開甲第成醉裏都將春作達老來不向酒藏情齒疎無廢銜盃趣耳病猶分度曲聲舊友昔遊渾忘却可憐寂寂洛陽城郭氏園送張仲通出刺棣州得朝字名園送嘉客冠葢去傾朝小雨塵微斂餘寒酒易消鴈歸春近塞日上海生潮北道平如掌東風五馬驕河邊曉望高浪崩奔捲白沙悠悠極望入天涯誰能脱落塵中意乘興東遊坐石槎送朱校理寀字亷叔知濰州東國連年水傷稼使君到部即行春茫茫四野潢汙竭鬱鬱萬行桑柘新俗不好奢田器貴獄無留繫吏家貧齊人勿怨歸朝速自是承明侍從臣晚春病起呈擇之治臣風日正和柔身輕喜病瘳嬾抛殘蠧簡暖脱敝貂裘值客開青眼逢花忘白頭家家好春色何處可同遊興宗許菊久之未得邵亢菊栽許送定如何庭下不堪秋草多九日無花更無酒便攜藜杖直相過和伯常見寄誅茅宋玉宅邊人知醉宜城幾甕春細雨短蓑漁向市孤村極浦鼓迎神徧遊七澤身忘倦更賦千篇意轉新不必滄浪羡清泚曏來纓上己無塵參政正肅呉公育挽詩三首皇家近茂異鶚立迥無倫高議誰能奪英才自有真驊騮寧受縶冰鑑不棲塵試為咨清論風流第幾人辭華己獨步政治復無前吏不容三穴民皆戴二天於今知和寡自古愧才偏惆悵棠隂下仁風尚藹然公再牧陜光實陜人知公之政念昔少年日謬登君子堂重言何以稱厚徳不能忘光昔以文請見公答以長歌過有褒嘆玉麈聲容在泉臺嵗月長憑誰寄清淚為我灑松岡和子美河西列岫亭二首秋山對疎牖覊客倦登臨雨後嵐光活晴初落照深素波明别浦赤葉照衰林佇目寂無語何人知此心亭臯資遠矚秋思浩無涯鴈唼牽菱蔓童歌出荻花壟荒猶叱犢枝暗少栖鵶烟靄藏東渚憑軒莫望家送昌言舎人得告還蜀二首迢逓銅渠道凝嚴青瑣闈負書當日去鳴玉此時歸鄉樹迎朱轂江花照錦衣臨邛不足並榮耀古今稀悽愴懐桑梓劬勞咏蓼莪樹風今遠矣鼎食柰悲何劍閣登車近秦闗屈指過騰裝纔首路夕夢己江沱寒食許昌道中寄幕府諸君原上烟蕪淡復濃寂寥佳節思無窮竹林近水半邊緑桃樹連村一片紅盡日解鞍山店雨晚天回首酒旗風遥知幕府清明飲應笑驅馳逆旅中奉和始平公憶東平相印東臨汶水陽兩看春葉與秋霜登山置酒延鄒湛上馬囘鞭問葛强谿竹低垂寒滴翠露荷相倚净交香宵衣深念長城固肯得從容傲醉鄉千巖秀色擁晴川萬頃波光上下天委地魚鹽隨處市蔽空桑柘不容田訟庭虚静官曹樂儒服寛長邑里賢不為從知方負羽獨乘魚艇老風烟和南園真率㑹見贈白頭難入少年塲林下相招莫笑狂緑篠影侵碁局暗黄梅花漬酒巵香任真自媿殽羞薄假寐初便枕簞涼醻應詩豪困牽率從來嬾放似嵇康送光禄王卿周致仕歸荆南九列誰云非顯塗人生已不負為儒拂衣長揖䕫龍貴散髪還為黄綺徒白鶴歸飛心自遠青霞高舉勢何孤千金盡與鄉人費不向江頭買木奴送李侍中柬之西京留臺先公勲烈盛鹽梅清白如聞濟世才華省拂衣辭簿領衰衢囘首謝塵埃嵩峯排户依稀出洛水迎人迤邐來寄語馬前頭白吏何殊昔日李西臺參政尚書文簡丁公度挽辭二首鳯蹕遊汾曲非熊得偉人同臺尤顯重訓誥愈深諄論道參黄閣横經侍紫宸如何天不憖志業未全伸丹闕晨趨退蕭然忘世榮閒齋虚自白永日澹無營脱落簮纓累沈冥丘壑情貪夫誠有激千載素風清和范景仁謝寄西遊行記二首洛川秦鳥鬰相望風物山河舊帝鄉澗底逢人問樵徑松間繫馬宿僧房恨無同好攜三雅共解前聞醉百塲李白詩痛掃鸚鵡洲與君醉百塲歴遍勝遊翻悵望日邊囘首遠烟蒼八水三川路𣺌茫翠微深處白雲鄉目眵懶拭如松液領髪頻抓似栗房林壑不収無用物形骸難入少年塲縁苔躡蔓知多少千里歸來屐齒蒼兩宋名賢小集巻四十五
