body:
  text: 兩宋名賢小集卷三百十宋陳思編元陳世隆補吾竹小藁毛珝字元白柯山人豪於詩有聲端平間吾竹小藁一卷寶祐六年荷澤李龏辨序云柯山元白詩人之秀者也通今達古蓍蔡後生采詩家得其一二如寶肆中犀璧混於螺貝惜其以文自晦不求於時吟藁一帙章不盈百清深雅正迹前事而寫芳襟奚止嘲風弄月而已哉西興蚤暮船爭渡都城隔岸間昔為漁釣地今作利名關潮探塵中事年催客裏顏水仙花又發吾欲老江灣寓池之清夷堂堂靜草侵廊羈懷未易忘近城知郡圃有佛即僧坊惡句書盈壁空樽壘到墻使君臨寵外滿目樹蒼蒼送客遊吳水鄉秋易冷珍重過吳松在旅雖難遣於詩莫厭攻一輪僧寺月半夜客船鐘况有賢州牧知音是舊逢小至九地陽初動披衣起擁爐門前初去馬􅐼外漸啼烏雲色呈金未梅梢破玉無焚香待天曉點易句研朱廬山棲賢寺名重于諸剎前賢舊隱蹤無人知有路隔樹忽聞鐘瀑壯山疑裂雲深寺若封或傳遺藁在三叩昔時松登黃岡清淮門風吹蘆葉江頭路江水江天共秋暮邊淮寒早客行稀只有征鴻向南去征雁自去書不來逺衣未寄憑誰催孤城慘咽暮笳起城下荒榛接淮水種竹山居無力塵居俗有客勸豫惟種竹種成貧家可驟富翠色琅玕繞君屋清晨荷鋤斸溪岸分得溪光入城緑暮年百事課功遲坐待春風滿林玉墨龍真人尸居雷八荒斷磚殘墨生蒼茫鯢伯下􅕉九淵黑神光倒射角與亢平聲明明元氣淋漓迹水底焚槐海波赤周流萬化元無極姑使人心識天則湘江湘江莫道無情水寶瑟聲寒愁帝子安知日月在中天萬古重瞳元不死楚南楚北千里雲持香遙禮雲中君莫起悲風助騷怨蘭枯菊瘁不堪聞東風東風喣嫗如慈乳欲報生成恨無所自拈花片作斑衣起捧春醪勸春舉傍人笑我老如許我亦笑渠將及汝梅花也笑桞都舞君如不飲出童羖浙江白鷴舊事隨波去太極陰陽自吞吐長虹夜貫黑頭船四紀沙迎相公路馮夷作劇真等間五都有客雄其間上林三官浪憂國千年海底生銅山檜瀑媧皇失補天南角一道銀河落君屋又疑元氣是周流不然瀉盡誰能續瀑邊老檜尤可人髯疏骨瘦皮鱗皴崩崖欲壓全不懼夜半潛蛟暗來去富川邂逅戚叔開百蟲壞蟄雁奔忙君從何來兩袂霜大冠如箕盍齊魯此地無乃驚吠厖釣竿曾笑江河窄尺水無容投犗客取羝為君向東軷一聲裂石扶桑白虎丘阿鴻血染吳苔碧氣徹重泉埋不得千年至寶復歸天顛倒海中飛霹靂至今荒怪列虞初罅石千尋駭遊客寺邊别廟是何神月黑伽藍問周易月人言月裏仙人住隱約娑羅樹根兔元霜搗就亦多年不見有人曾得度清光偏照邊城秋城邊白骨胎王侯王侯白骨卒未已龜􅑕吸月獨不死丹陽館渡江第一南來驛幾度華堂延鴈客百年運逐曉雲空愁殺鞮官老無職南徐今日古陽關不斷歌聲祖離席國讐已復事尤多折損年年春桞碧富池廟船頭蜀錦三千尺倒影長虹浸寒碧相逢不是紫髯郎鸚鵡洲邊眼生棘江頭簫鼓雜靈鴉人道陰兵曾護國安知樓下雪千堆不是吞曹氣衝激秋日即事黃花暴日香欲醉黃蜂抱香暖欲睡老夫邂逅亦欣然一段先天畫前意喧喧歸雀聒叢篁夕風欲轉明朝霜花搖蜂醒我亦覺斜陽一片秋茫茫甲午江行百川無敵大江流不與人間洗舊讐殘敵自緣他國廢諸公空負百年憂邊寒戰馬全裝鐵波濶征船半起樓一舉盡收關洛舊不知消得幾分愁寓興國之十詠亭呈諸友斷垣荒棘疑無路忽有幽亭一畝餘不稱郡侯來把酒偏宜野客借觀書臨階汲水防苔滑隔岸看山愛桞疏非有舊交時下顧十分風味落樵漁中年中年已悟昔皆非正學無師更可悲詩道縱能通閫域聖經曾未涉藩籬擬從周子參無極更為東巢續近思適意舞雩時一詠區區何用苦吟為寓泉之定空寺齋鐘聲斷佛香銷間步虛廊轉幾遭濁世自緣君不捨青山豈是俗難逃鳥如留客音聲好松似驕人意氣高因悟夙根元自有栽培功淺長蓬蒿掩卷盈箱積案欲何如誤盡蒼生半屬渠陸贄外誰無負學臯陶前是讀何書鑿開素朴惟三畫斫碎真淳遂五車安得六經行世外民風盡返結繩初謝胡默堂創新小閣畫難成肯借山翁養病身萬事不憂知有命數椽分庇可無人觀書漆几明於鏡欹枕藤牀軟勝茵終恐傍門心未穩敝衣雖敝每馳神寓泉之安溪已恨逢人語不通更堪煙嶺隔千重山城縱是如花好海霧終愁似墨濃逺信斷無鴻可寄故鄉惟有月相逢間於荔緑蕉紅處步屧時留到晚鐘雪無雨無雲曉色乾忽驚瑰璧滿簷端不教聲到窗前覺應恐愁添屋下寒占瑞農官尋玉尺析酲公子索金盤柴門睡起無多事捲上疏簾帶竹看關心關心歲月似驚波少日無成奈老何别久帝京知事少住長客舍識人多典衣沽酒杯難滿借壁題詩字易磨早信出門無遇合故山只合守樵柯通之海山樓落成千尋雉堞一朝興五馬行庖此落成地峻鬼神愁設險樓高星斗聽談兵霞羞綵幟依山斂月鬭金杯出海明更有萬堆飛石在寄聲殘羯盍魂驚鳯凰臺江山依舊昔人非多少興亡問不知雁去又逢重到日鳳歸安得再來時風吹木葉隨漁艇霜壓蘆花出酒旗特地待吟吟未穩數聲昏笛戍樓吹學道學道先須學忍貧緼袍疏食當華珍摳衣所久參前輩開卷猶欣見古人暗坐雨􅐼心似月冷眠雪屋氣如春向來酷意耽吟事今亦相忘越與秦贈碧蜍鳶飛魚躍兩悠悠造物何心莫問休但得一杯長在手不須萬户更封侯人間有夢何非蝶物外忘機即是鷗我亦青鞋行腳者會摩銅狄話重遊人才但得人才即治安不憂外侮敢相干學關世道方為士業曉農家始是官國力在兵堪用少敵情如鬼欲驅難豈無一代奇男子抱膝無言靜處看和張梅深四首幾踏梅花角寸長擔簦羞作老來忙立身早慕千層塔閲世今知百戲場從辟穀來唯嗜酒自栽梅後不燒香人生底為青衫急亦有秋荷可製裳不用悲歌撫鐵長古無人可免身忙存心未必耕無地涉世難忘選有場新别水雲書尚濕舊題松桂筆猶香只緣誤觸神丹走惆悵京塵浣薜裳我䇿曾無一䇿長一生蟻踏厯間忙持經佛寺新投社寄食田家舊築場古劍放教龍逐伴殘書分與蠧餐香不愁死去無名在化作千年老鶴裳鳧鶴都休較短長靜非無用動非忙間將書卷排科甲戲把文科列戰場無地可施行話枘有天須監格心香功名細看時來耳珍重漁簑即衮裳古出塞初説戍漁陽俄傳出定襄朝朝征馬過春草不曾長山月山月共徘徊山泉酌一杯詩成無筆寫畫石記蒼苔書墨竹伯夷有夙世契子猷結千古交煙外三葉五葉雨中一梢兩梢觀星九天有象不虛呈厯厯都關國重輕漢客可無經濟意只將牛女問君平海陵繞城無數菜花黃隔岸蒹葭接大荒不分塞鴻偏得意年年春老未還鄉海陵之褒城四面蒹葭水接天中間一片是人煙相逢盡喜干戈息白鷺飛來立戰船傍城三十里芙蕖怪底繁華浙景無元是近邊農事少全憑蓮藕當官租邊聲籍籍早秋風稻未黃時棗又紅莫厭水鄉遷避苦全家載入緑荷中儀真頻年歲稔少干戈到處人能販五湖只道鹺舟偏輻輳玉杯錦段近年多多旨樓邊古桞斜龍淵寺裏隔荷花清風盡日無人管半屬僧家半妓家販來北棗堪充膳種得西瓜可析酲總是中原舊風物不堪今日是邊城晚涼􅐼前灑地著胡牀浴罷間來坐晚涼更取壁燈移暗處待他月上竹邊墻南山有梅花南山有梅花高者五尺餘半空發清香天人為踟蹰城中三尺本登盆綴流蘇進之畫堂上笑彼何粗疏山中吟七首幽幽山上松泠泠松下井白石當銀牀青蘿作修綆山翁獨酌餘無客可堪評葛洪分煉丹陸羽求煎茗采薇作庭實紉蘭作筐篚持以薦王公謂可蘋藻比王公齲齒謝王門何用此問客姓與名或是孤竹子山中夜讀書山鬼來相試隔􅐼問疑難頗及堯舜事豫非卯金人安能動星緯劃然一推􅐼餘音入空翠山翁不能文亦免時流笑早愛滄浪歌知辭不知調長年水山間所業只耕釣偶得千齡龜遂通八卦兆山花開滿枝山鳥啼無時君胡欲棄此自取塵汚為山猿嚙君履山鹿銜君衣挽君君不留去去君何歸槲葉可以衣松實可療飢騎鹿下山去擬説高人知高人不可得紛紛却語誰曉忩白雲過且自相同歸題箋寄親友早早山中來紫芝既可採蟠桃行當開持書託南風北風復吹回愛之不可見落日令人哀已酉客淮烽燧春尤急人才歎寂寥恨無黃石略難致碧幢招守塹宵仍甲傍城曉未橋又傳經一雪殘哨亦蕭蕭過黃山法華寺積雪滿松岡兹行為悼亡本非求吉地祗欲近禪坊外物心如水流年鬢已霜只應雙卜宅永此禮空王送田耕月遊吳衣笈詩囊外身輕費亦輕不妨船眼窄時上岸頭行橘里逢霜信松江問水城吳中聞歲稔新糴想須平登橋仍問渡迢遞到吳中倩僕挑茶竈移船避釣筒月生林屋洞潮接館娃宫得句人傳去蘇箋價益穹此去姑蘇郡都無五日程仍聞新太守最重舊交情有句梅邊索無田月下耕雙親方待養我亦勉君行湓江遠樹一重重煙村與市通難尋元亮宅遙酹菊花叢濁浪帆檣外廬山几席中何時邊事息來此作漁翁吳門田家十詠去年一潦失冬收逋債於今尚未酬偶為灼龜逢吉兆再供租約賃耕牛竹罾兩兩夾河泥近郭清渠此最肥載得滿船歸插種勝如賈販嶺南歸到處車聲轉水勞東鄉人事獨逍遙一堤灩灩元非雨總是吳江淡水潮今年田事謝蒼蒼儘有瓶罌卒歲藏只恐主家增斛面雙雞先把獻監莊主人租入有常規十月開倉不許違占得頭籌先衆了繞身紅綵送將歸西鄉本是最高鄉今歲收成亦倍常瓦鼓綵亭連日閙誰家不謝白龍王村村鼓笛樂秋成露未凝霜水未冰無賴酒家偏射利隔年早挂上元燈田家少婦最風流白角冠兒皀蓋頭笑問傍人披得稱已遮日色又遮羞長襟侈袖若僧衣間蕩扁舟入郭嬉好是醉歸村舍晚聲聲耳畔阿郎兒主家文榜又闈田田甲科丁各備船下得樁深笆土穩更遷垂桞護圍邊劉寺曾住昭陽殿裏頭何年香骨掩荒丘虛傳碧落歸仙去誰見蒼梧從帝遊鸞閣粉銷塵影暗蜃爐香冷石人愁風前不敢將梅折猶恐君恩寵未休宿廣果寺寺門初掩夜沈沈風逼寒燈檜影深滿屋異香僧入懴一甌新茗客搜吟雲歸古殿聞龍氣月照空池見佛心坐久却眠眠未穩屋頭鐘起鵲驚林金陵虎踞龍蟠在目前依然行闕鎖寒煙津頭鼓角增新戍陌上笙簫減舊年高塔直看淮對境斷碑間憶晉諸賢我來尚喜秋成日魚蟹堪賖滿市邊拄杖數節堅如玉削成幾年出入伴間身扶持衰老非無術變化虛空亦有神藥籠倒挑同入市酒壺斜挂共尋春雖然未作顛危用間指迷津與路人數椽梅有清香竹有陰數椽於此寄幽深舊看飛雁拋孤旅新聽啼螿悔苦吟幾卷書皆先世迹一張琴是古人心柴門未必無知已何必江湖在遠尋陳藏一山房一室焚香即太初萬人如海儘從渠第于心上曾無著何必山中始可居垂箔護花嫌引蝶連筒汲井怕生魚草元政不妨人事問字敲門未可疏元日寓越之三江客裏元正最可憐就他香案禮蒼天懶拈蓍草占新歲頻對菱花憶去年僅有邸翁分席拜不如野老著衣鮮百年草草渾如此且醉殘梅了目前桂天上分來種異常年年花占菊前黃堆將龍麝應難敵隔盡屏帷亦透香此日且饒秋富貴全家疑在月中央明朝酒醒風吹盡贏得黃金滿步廊滄浪亭濯纓人去水空寒事屬明時欲問難日暮客歸園館閉鷺鷥飛上石碁盤兩宋名賢小集卷三百十
