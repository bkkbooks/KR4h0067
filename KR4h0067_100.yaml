body:
  text: 兩宋名賢小集巻一百宋陳思編元陳世隆補了齋詩集陳瓘字瑩中南劎人也舉進士甲科為湖州書記乆之用蔡卞薦召為大學博士遷校書郎章惇蔡卞主紹述之論追貶司馬光上謗宣仁后人不敢輙議瓘因對以謂今日以前既往之迹便為古事道常然而不渝事有弊而必變故堯告舜舜告禹皆曰若稽古若者順而行之稽則考其當否或若或稽必使合於民情所以為帝王之治且論天子之孝與士大夫之孝不同哲宗感悟徽宗即位除右正言論卞修實録増加王安石實録紊神宗大典請改修徽宗欲開言路首還鄒浩而中丞安惇尚縁往事欲格成命瓘再上䟽力言宜召還浩逐惇以明黜陟遷右司諫乂極論蔡卞假託經義倡為繼述重誣神考輕欺先帝倡為國是以行其私卞之所是謂之國是卞之所非謂之流俗尊安石而薄神考不可為國是宜因其請祠許而遣之章惇懷異不忠宜因其辭山陵使罷之乂言惇為山陵使無狀致大昇輿陷于泥淖之中露宿野次宜罷其職乂論修建景靈西宫不當且言建立之地非是又言邢恕反復宜定其罪御史龔夬言蔡京罪朝廷不以夬言為然夬將去位瓘上䟽言紹聖以來七年間五逐言者皆與京異議今夬以言京又將罷去殆非祖宗奬厲言官之意皇太后已歸政瓘上䟽謂外戚向宗良兄弟與侍從希寵之士交通使物議籍籍謂皇太后至今與政也罷監揚州糧料院改知無為軍瓘貴之日方褏䟽論蔡京而命卞于門外繳四奏并明宣仁誣謗修實録建西京寺事徽宗宻遣人賜瓘黄金百兩由是京罷召還除著作郎遷右司員外郎又以書抵曾布論實録及國用事以為尊私史而壓宗廟縁邊費而壞先政布怒罷知秦州尋主管冲佑觀除名編管袁州移廉州又移郴州監中嶽廟坐其子正彚上書逮繫開封獄安置通州始瓘所辨日録事著尊堯集議者以為言多詆誣編置台州移楚州居住以卒年六十五靖康元年贈右諫議大臣瓘篤學有識志不苟合居喪孝初蔡卞知其才待之加禮瓘不肯附麗恬於進取雖諸公交薦迨居言職所䟽姦惡雖所舉不避也嘗曰彼則舉而所知此則為仁由已識者重其言瓘既力言京不可用用之必為腹心患悉如其言瓘有詞辨通易數言天下治忽多驗自號了翁云了齋自警六首本無一字堯夫易八十一篇揚子𤣥今古是非那復辨仲尼尤不廢為編文書難冩伏羲書字外成篇始見渠賜也能分可不可一瓢居士只如愚過時不易始為難執處那知是變遷度盡千山無鳥迹不勞傳語報平安手在何憂弓力强巧窮那得必穿楊太和有味人人飲誰識醒時是醉鄉仲由行行終身誦師也堂堂帶上書五栁却能知此意無弦琴上賦歸與只説為山不説休山成日夜水横流惜哉覆簣成迷復只見當初一掉頭自合浦還清湘寄虚中弟三年已絶生還望一日天恩到海涯路過清湘猶間闊當時何不住長沙行徹天涯萬里山月明方照海珠還瘴鄉來往渾閒事聊為清湘一破顔曽近滄溟看颶風波濤有盡海無窮四年陳迹今何在坐對湘雲豁晚空瘴海只將梅作雪湘山今見麥為春晴空有月當如舊嶺北山南總照人與全州崇寧斷臂和尚少年得髓幾人知想見當年斷臂時此是湘山大知識衡門堪繼㑹昌師和劉太守十洲詩花嶼紅紫商量欲滿枝持春觴豆好攜持便須載酒凌波去底事黄堂獨賦詩芳草洲緑色映波千古恨至今南浦兩依依我今又出江東去多少行人宦未歸栁汀密幹參差籠月影輕波蕩漾蘸煙條暑天要此清凉地欲往何辭度小橋竹嶼霜姿迥出紅塵外只有鵷雛傍水來别岸若尋棲隠處軒窻須為此君開煙嶼靄靄紛紛縁底事故來波上罩晴沙莫教散入滄溟去却恐能迷上漢槎芙蓉洲紅雲可覓無蜂去𣺌𣺌寒波映晚芳未必孤根能耐雪且看秋艶已經霜菊花洲光景不留人易老恨無羽翼出塵埃世間那有飛昇藥且傍汀洲采菊來月島月明偏照海邊洲緑水迴環漾素秋斗轉參横羣動息桂花零落遣誰收雪汀誰把平氊水上開坐看飛絮撲瓊臺酒家耳熱笙歌沸應怪幽人此把來松島影參岸栢童童緑葉蔽汀蘭澹澹香斤斧不來人迹遠養成千尺勢堂堂湖心亭塵境紛紛俗累爭故尋幽徑訪南能湖波浩𣺌無窮緑寺屋髙低不計層詩老新吟工惱客使君餘暇得陪僧碁中得失何時了一局輸贏未可慿兩宋名賢小集巻一百
