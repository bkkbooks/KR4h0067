body:
  text: 兩宋名賢小集卷一百十六宋陳思編元陳世隆補西渡詩集上洪炎字玉父豫章人徽宗朝官中書舎人與兄朋龜父芻駒父弟羽鴻父俱以詩文名時稱四洪己酉嵗十一月二十六日避􆀣至龍潭院十二月十五日作徑轉橋横水林深寺據山鐘魚告閴寂松竹媚孱顔避地欣有託依僧成暫閒東歸路不隔片片隴雲還突兀山椒寺披榛二百年刹從吾祖卜席是里僧傳溪送無盡水林供不斷烟囊中有餘粒假息且安眠潭黒蛟龍宅山青虎豹林隠憂何日了淹泊見冬深薄雪恨還積梅踈冷不禁平生一樽酒衰疾廢孤斟殺氣纒中土妖徵出泰階架橋凌禹穴投䇿暗秦淮匪兕歌何苦非熊碩亦乖申胥雖有淚無地寄予懐宵旰憂雖切咨謀䇿靡長築壇推騎刼假節得糜芳已矣重江險哀哉古豫章蓬茅今在否矯首恨難忘次韻鄭公實見贈二詩鄭侯風㮣似虞薫醉飽初疑對苾芬一日君嘗南浦水六年我踏寳峰雲詩情賦物已聞命山色溪光倘見分羣盗何曽念王粲相逢聊喜見斯文百濯生香真寳薫中泠取水挹清芬素娥影落秋宵月白鶴翎翻春晝雲俗客來依禪客住林花自與雨花分扶傾不假迂儒力敢倚筆端能綴文寳峰讀駒父壁間詩次其韻兎迒通一線筍輿度千尋隔林見潭影迎客有鈴音梵唄出廣殿飛舞來珍禽履此勝絶境一清塵慮心仲氏趣𤣥逺造詣非尺尋誰云干戈際獲覩金玉音七日南山霧一鳴幽谷禽依然拂塵壁愁絶見余心次韻公實感寓求田問舎轉頭空十口無家寄栗蓬失得自憐嬰世網是非都欲問天公綿綿不解溪邉雨淅淅無情松下風頼有詩人排悶作且吟佳句任窮通次韻公實雷雨驚雷勢欲㧞三山急雨聲如倒百川但作竒寒侵客夢若為一震靜烽烟田園荆楚漫流水河洛干戈今幾年擬叩九闗牋帝所人非大手筆非椽次韻公實喜晴二首凍雨連三日春膏過一犁寺橋杯渡水村徑橇行泥燠若生晹谷寒収豈石犀欲窮洪範理夕室有青藜持璧還投鵲鎔金恨作犂行吟乗曉日扶杖入春泥碩學懐文豹終慙秃角犀徒歌無好語野飯只羮藜馮太冲置酒即事用公實韻故人同客寓蕭寺近清明春亊一尊酒夜闌三尺檠風流孔北海文字漢西京苦勸加餐飯年來太瘦生山中聞杜䳌山中二月聞杜䳌百草争芳已消歇緑隂初不待薫風啼鳥區區自流血北忩移燈已三更南山高林時一聲言歸汝亦無歸處何用多言傷我情寳峰筍用公實韻繞寺千株筍高低逐澗丘參差舒鳳尾突兀長猫頭入鼎資甘脆殘林且罷休㑹須堪小艇裁作海乗浮公實示間字韻詩悵然有感次韻奉和三首晴暉生燠雨生寒朱夏陽春季孟間斷雁哀猿金馬客落花流水石門山早知蟻穴成何事欲棹漁舟去不還昭氏有琴無作止虧成都任一機闗輟哭人歌行路難畏人無地出人間欣逢北海孫賔石猶是江南庾子山野草離離隨意緑羣鳬泛泛倦飛還一川烟草村蘿外何處梯雲叩九闗此處非燕南趙北我琴無濮上桑間勞生聊作夢中夢苦語莫酬山復山觸石白雲數峰起照人明月一鈎還徳星已為荀陳聚紫氣休浮函谷闗漢末童謡燕南垂趙北際中央不合大如礪惟有此間可避世載酒邀公實同過西園食枇杷與公實同賦即次其韻有美枇杷子三珍共一時朱櫻梁苑早盧橘蜀都遲載酒寧辭病窺園似好竒酬君要佳句從古未題詩公實再賦枇杷之什次韻二首連雲葱蒨外佳樹枇杷林味極東南美恩知雨露深山夫琢栗玉谷鳥避丸金永日羈棲意兹焉一慰心􅌬醁尊中酒枇杷雲外林甘飡千顆盡軟語一杯深老境宜扶杖交情得斷金遺民伐荻去真處即吾心公實作暴雨詩次其韻民生惟播殖天意在農深一夜盆傾雨千家粒食心知時占聚蟻催種有鳴禽喜是田間語青青刺水鍼次韻即事二首自媿山林士來炊蕭寺烟怨驚寄猿寉飛躍任魚鳶咄咄空中字昏昏醉後眠摛文非孟子何以差狂顛寄榻逢僧夏登塲喜麥秋一風將浹日四月尚重裘去矣吁何及歸歟幸少休雨晴寒自戢桂魄更添愁次韻野歩意行無逺近山徑自横斜烟月生晴嶺風幡接莫霞影歸巢幕燕聲散宿林鴉屣履相隨處僧垣即是家遊都梁山風吹古汳口雲滿都梁山執熱厭偪仄幽尋上孱顔清泉似石乳滴瀝岩竇間乞此一瓢飲為祛千載煩山靈知我意殷然下層巒散空作急雨抉石出甘寒一酌蕩齒頰三咽縈肺肝輕軀變滯骨塵鞅思靈闗來當踏雲至去當御風還再拜謝神休幸汝不我慳四月二十三日晚同太冲表之公實野歩四山矗矗野田存近是人烟逺是村鳥外踈鐘靈隠寺花邉流水武陵源有逢即畫原非筆所見皆詩本不言看挿秧栽欲忘返杖藜徙倚到黄昏野歩散䇿尋溪偶緩行羈棲愁眼忽雙明非烟幕幕平蕪合倒影層層逺翠横鷗鷺低飛映山去江湖一諾百金輕直知己造洞天内身在人間却自驚石門中夏雨寒五年鐵騎躪中原四月江南尚薄寒入月誰能移太白來朝我亦見呼韓灌壇風雨行将戢陋巷簞瓢且自寛紅日再中天地正塗泥不辱漢衣冠次韻即事端居入夏愁更新不數多愁過一春躡虛難同若士去取醉但與索郎親朝天幾日車同軌擊地共唱野無人自許世才非管樂聊将心事比雷陳嘗白酒用麋韻竹葉榴花久擅塲一尊雲液勝椒漿人惟任逹常中聖藥自消憂不作狂滿泛氷甆無别色錯斟瓶水有真香祗應剰醖逡巡酒始耐仙山日月長庚戍嵗六月四日至洪城舊廬無復尺椽悵然感懐用丙午嵗遷居詩韻南州一炬火我歸無所歸六月下驚湍一葉正復欹空城何所有城闕雙闔扉遺甿四五輩􅌓眙蟲鳥栖潭潭大都府灰滅餘空基委重者誰子汝實凡且卑螻蟻輕民命泥沙損國貲犬狼肆噬嚙毆逐乃其宜胡為使羣吠如惡草蔓滋哀哉三萬室鍾此百六期故居不可識将是復疑非階前手種花自憐託根微露草相對泣吟風作悲詩人言城門火魚禍自靡遺我亦無淚哭且復一解頥病間和公實飲酒詩憂毎傷人人亦憂花䝉兩眼雪䝉頭干戈滿地不可觸蓑笠為家何處浮秋入鳴蟬催暑去酒如凝露與清謀冩成庾信江南賦更續相如老倦㳺戲和公實感秋對酒青山愛客長青眼白酒知時泛白雲少日悲歡才一醉中星寒暑又平分稻粱狼籍餘栖畝雀䑕穿窬自立勲一葉已驚秋意早映階黄落更紛紛次韻公實七月一日雨感懐二首平生離俗得閒多素髪驚秋奈老何賔從盤飱唯白石意行供帳有青蘿御風獨往松三徑踏月空歸雪一蓑短布單衣窮至骨醉吟不作飯牛歌日日愁隨萬緒多遣愁不去若愁何文書引睡繙黄卷福地求生訪緑蘿酒厭銀瓶聊注瓦衣辭錦襖却披蓑五更風雨作金石助我貫珠商頌歌韋荘蜀程記入嘉陵道上如行青蘿帳中福地記武陵有緑蘿福地與桃花源相接将去寳峯誦老杜更欲投何處賦五言三首更欲投何處乾坤老病身窮愁但有骨栖泊𣺌無津岩穴探幽藪人烟隔幾秦驅車上九折回首黯傷神更欲投何處窮猿不擇林低囬竹樹語惨戚鐘魚心邑邑出門淚行行渡嶺吟西江如此吸在處海潮音更欲投何處仙山不可窺欲尋吳許跡黙與綺園期裹飯隨妻子清秋問路岐神真有汲引逸駕或容追奕棋絶句二首新秋遣悶只圍棊病不銜盃亦廢詩對局蕭然兩無語箇中君子有爭時鷺落寒江鵶㸃汀晴忩飛雹擊槃聲方圓動靜隨機見清簟踈簾眼倍明又白日惟銷一局棊攬碁還誦李侯詩傍觀不作千年計㑹有局成柯爛時棊局醒心過博局棋聲娛耳勝琴聲少年此戯殊不惡坐隠時聞夜逹明再賦奕棊五言八句五首荆璞玉為子井文楸作枰有求惟别墅不喜得宣城跕跕飛鳶渡丁丁伐木聲破愁逢一咲無地着虧成祗園三日雨碧澗一枰秋試問酒中趣何如林下幽從它着虎口尋我鎮神頭惟悟爭先法當機與手謀不作丹朱戯難禁清晝長敢言白玉局聊取紫羅嚢角道空傳記乗除自有方兒童争畫紙漫學老夫狂眉山非快手奕勝亦欣然變態一翻覆幾微繫後先陶公慮太過雪女慧堪憐張弛誠吾道斯文許爾賢凝神迷逺躅致一有全功皎皎婦姑月𠖇𠖇鴻鵠風置君愚寗子議樂哂温公誰謂商山老飄然到橘中越王山二首朝登萬仞岡夕宿雲霞間越王昔何時稅駕宅此山山顛有石室險絶未可攀烟樹相映帯尚想颷輪還文吳二仙子騰趠跨兩班俯仰五百秋下視悲人寰王室久蕩析世路方孔艱我尋真人居荷鋤支蓬菅林泉依福地樵汲闖靈闗庶以逺兵革返兹後死顔越王名兹山無復車馬跡絶頂有佳處軒然大盤石靈洞閟其中神池蕩其側雲氣朝夕生合散一瞬息吾聞王子搜隠遯辭越國玉輿去不返丹丘鏁荆棘二仙去季世故老猶記識遺蹤落人間不稽傳寳墨我睎伯夷清願作老𥅆役脱身埃壒外捄暍望三益嶺雲吾居半山上繞屋猶峻嶺舉頭即見之坐卧作牆屏忽復不可求澒洞雲萬頃初疑岸谷變身不踐人境俄頃如故常突兀在屋頂隠見須㬰間變態莫記省烟霞成痼疾終日常炯炯早閱金丹訣未辨卜竈井世亂一丘壑斯志或可逞鳴猿落空岩翥寉颺晴影石泉漱芳潤草木皆秀整洞天有歸路來往心已領從寳峰長老惟足求猫頭筍不識猫頭筍還思馬祖山庭蘭生舊茁綳錦換新斑藴玉爭懐寳登盤想飫餐分甘須劖劚逺助一瓢簞食榧子若一作石榴資彭糧榧實伐彭兵三彭穴身中各以尸自名伺隙殘所託睢盱為已榮仙山無凡木榧林髙且清八月實累纍斗量亦嚢盛盈盤得恣食不與汝糧并嗟汝小黠爾安所逃汝生蚤讀黄老書五牙潄琅英雖微玉山果知汝乆已行喪亂食不足長飢病所嬰蟠桃未能致橡栗庶可營作詩頌子榧期子以主盟十月十五日山中下視雲氣自山間岀已而彌漫咫尺不辨岩谷戯成五言一首一嵗下元日千山小雪天雲層生逺壑雨拚割平川放牧虚横吹樵蘇樂靜眠遥知載酒客無路到齋前十月十六日雲氣依然合山蹊舊不通虀塩猶可問牢酪頓能空細檻泉聲外踈籬犬吠中無人披宿霧採藥過龎公南城鄧氏亭小麥青青傷一曲江南千里傷春目旴母江頭喚渡人遥指麻源第三谷裹鹽包飯各怱怱回首烟霞樓觀中詩成更着羊何和猶是前身内史公兩宋名賢小集卷一百十六
