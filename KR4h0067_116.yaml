body:
  text: 兩宋名賢小集卷一百十六宋陳思編元陳世隆補西渡詩集上洪炎字玉父豫章人徽宗朝官中書舍人與兄朋龜父芻駒父弟羽鴻父俱以詩文名時稱四洪己酉嵗十一月二十六日避􆀣至龍潭院十二月十五日作徑轉橋橫水林深寺據山鐘魚告閴寂松竹媚孱顔避地欣有託依僧成暫間東歸路不隔片片隴雲還突兀山椒寺披榛二百年剎從吾祖卜席是里僧傳溪送無盡水林供不斷煙囊中有餘粒假息且安眠潭黑蛟龍宅山青虎豹林隱憂何日了淹泊見冬深薄雪恨還積梅踈冷不禁平生一樽酒衰疾廢孤斟殺氣纒中土妖徵出泰階架橋凌禹穴投䇿暗秦淮匪兕歌何苦非熊碩亦乖申胥雖有淚無地寄豫懷宵旰憂雖切咨謀䇿靡長築壇推騎劫假節得糜芳已矣重江險哀哉古豫章蓬茅今在否矯首恨難忘次韻鄭公實見贈二詩鄭侯風概似虞薰醉飽初疑對苾芬一日君嘗南浦水六年我踏寶峰雲詩情賦物已聞命山色溪光倘見分羣盜何曽念王粲相逢聊喜見斯文百濯生香真寶薰中泠取水挹清芬素娥影落秋宵月白鶴翎翻春晝雲俗客來依禪客住林花自與雨花分扶傾不假迂儒力敢倚筆端能綴文寶峰讀駒父壁間詩次其韻兔迒通一線筍輿度千尋隔林見潭影迎客有鈴音梵唄出廣殿飛舞來珍禽履此勝絶境一清塵慮心仲氏趣玄逺造詣非尺尋誰云干戈際獲覩金玉音七日南山霧一鳴幽谷禽依然拂塵壁愁絶見余心次韻公實感寓求田問舍轉頭空十口無家寄栗蓬失得自憐嬰世網是非都欲問天公綿綿不解溪邉雨淅淅無情松下風賴有詩人排悶作且吟佳句任窮通次韻公實雷雨驚雷勢欲拔三山急雨聲如倒百川但作竒寒侵客夢若為一震靜烽煙田園荆楚漫流水河洛干戈今幾年擬叩九關箋帝所人非大手筆非椽次韻公實喜晴二首凍雨連三日春膏過一犁寺橋杯渡水村徑橇行泥燠若生晹谷寒收豈石犀欲窮洪範理夕室有青藜持璧還投鵲鎔金恨作犂行吟乘曉日扶杖入春泥碩學懷文豹終慙秃角犀徒歌無好語野飯只羮藜馮太沖置酒即事用公實韻故人同客寓蕭寺近清明春事一尊酒夜闌三尺檠風流孔北海文字漢西京苦勸加餐飯年來太瘦生山中聞杜鵑山中二月聞杜鵑百草爭芳已消歇緑隂初不待薰風啼鳥區區自流血北忩移燈已三更南山高林時一聲言歸汝亦無歸處何用多言傷我情寶峰筍用公實韻繞寺千株筍高低逐澗丘參差舒鳳尾突兀長貓頭入鼎資甘脆殘林且罷休會須堪小艇裁作海乘浮公實示間字韻詩悵然有感次韻奉和三首晴暉生燠雨生寒朱夏陽春季孟間斷雁哀猿金馬客落花流水石門山早知蟻穴成何事欲棹漁舟去不還昭氏有琴無作止虧成都任一機關輟哭人歌行路難畏人無地出人間欣逢北海孫賔石猶是江南庾子山野草離離隨意緑羣鳬泛泛倦飛還一川煙草村蘿外何處梯雲叩九關此處非燕南趙北我琴無濮上桑間勞生聊作夢中夢苦語莫酬山復山觸石白雲數峰起照人明月一鈎還德星已為荀陳聚紫氣休浮函谷關漢末童謡燕南垂趙北際中央不合大如礪惟有此間可避世載酒邀公實同過西園食枇杷與公實同賦即次其韻有美枇杷子三珍共一時朱櫻梁苑早盧橘蜀都遲載酒寧辭病窺園似好竒酬君要佳句從古未題詩公實再賦枇杷之什次韻二首連雲蔥蒨外佳樹枇杷林味極東南美恩知雨露深山夫琢栗玉谷鳥避丸金永日羈棲意兹焉一慰心􅌬醁尊中酒枇杷雲外林甘餐千顆盡軟語一杯深老境宜扶杖交情得斷金遺民伐荻去真處即吾心公實作暴雨詩次其韻民生惟播殖天意在農深一夜盆傾雨千家粒食心知時占聚蟻催種有鳴禽喜是田間語青青刺水針次韻即事二首自愧山林士來炊蕭寺煙怨驚寄猿寉飛躍任魚鳶咄咄空中字昏昏醉後眠摛文非孟子何以差狂顛寄榻逢僧夏登場喜麥秋一風將浹日四月尚重裘去矣吁何及歸歟幸少休雨晴寒自戢桂魄更添愁次韻野步意行無逺近山徑自橫斜煙月生晴嶺風幡接莫霞影歸巢幕燕聲散宿林鴉屣履相隨處僧垣即是家遊都梁山風吹古汳口雲滿都梁山執熱厭逼仄幽尋上孱顔清泉似石乳滴瀝岩竇間乞此一瓢飲為祛千載煩山靈知我意殷然下層巒散空作急雨抉石出甘寒一酌蕩齒頰三咽縈肺肝輕軀變滯骨塵鞅思靈關來當踏雲至去當御風還再拜謝神休幸汝不我慳四月二十三日晚同太沖表之公實野步四山矗矗野田存近是人煙逺是村鳥外踈鐘靈隱寺花邉流水武陵源有逢即畫原非筆所見皆詩本不言看插秧栽欲忘返杖藜徙倚到黃昏野步散䇿尋溪偶緩行羈棲愁眼忽雙明非煙幕幕平蕪合倒影層層逺翠橫鷗鷺低飛映山去江湖一諾百金輕直知己造洞天內身在人間却自驚石門中夏雨寒五年鐵騎躪中原四月江南尚薄寒入月誰能移太白來朝我亦見呼韓灌壇風雨行將戢陋巷簞瓢且自寬紅日再中天地正塗泥不辱漢衣冠次韻即事端居入夏愁更新不數多愁過一春躡虛難同若士去取醉但與索郎親朝天幾日車同軌擊地共唱野無人自許世才非管樂聊將心事比雷陳嘗白酒用麋韻竹葉榴花久擅場一尊雲液勝椒漿人惟任逹常中聖藥自消憂不作狂滿泛氷瓷無别色錯斟瓶水有真香祗應剩醖逡巡酒始耐仙山日月長庚戍嵗六月四日至洪城舊廬無復尺椽悵然感懷用丙午嵗遷居詩韻南州一炬火我歸無所歸六月下驚湍一葉正復欹空城何所有城闕雙闔扉遺氓四五輩􅌓眙蟲鳥栖潭潭大都府灰滅餘空基委重者誰子汝實凡且卑螻蟻輕民命泥沙損國資犬狼肆噬嚙毆逐乃其宜胡為使羣吠如惡草蔓滋哀哉三萬室鍾此百六期故居不可識將是復疑非階前手種花自憐託根微露草相對泣吟風作悲詩人言城門火魚禍自靡遺我亦無淚哭且復一解頥病間和公實飲酒詩憂每傷人人亦憂花蒙兩眼雪蒙頭干戈滿地不可觸蓑笠為家何處浮秋入鳴蟬催暑去酒如凝露與清謀寫成庾信江南賦更續相如老倦遊戲和公實感秋對酒青山愛客長青眼白酒知時泛白雲少日悲歡才一醉中星寒暑又平分稻粱狼籍餘栖畝雀鼠穿窬自立勳一葉已驚秋意早映階黃落更紛紛次韻公實七月一日雨感懷二首平生離俗得間多素髮驚秋奈老何賔從盤飱唯白石意行供帳有青蘿御風獨往松三徑踏月空歸雪一蓑短布單衣窮至骨醉吟不作飯牛歌日日愁隨萬緒多遣愁不去若愁何文書引睡翻黃卷福地求生訪緑蘿酒厭銀瓶聊注瓦衣辭錦襖却披蓑五更風雨作金石助我貫珠商頌歌韋莊蜀程記入嘉陵道上如行青蘿帳中福地記武陵有緑蘿福地與桃花源相接將去寶峯誦老杜更欲投何處賦五言三首更欲投何處乾坤老病身窮愁但有骨栖泊渺無津岩穴探幽藪人煙隔幾秦驅車上九折回首黯傷神更欲投何處窮猿不擇林低回竹樹語慘戚鐘魚心邑邑出門淚行行渡嶺吟西江如此吸在處海潮音更欲投何處仙山不可窺欲尋吳許迹默與綺園期裹飯隨妻子清秋問路岐神真有汲引逸駕或容追奕棋絶句二首新秋遣悶只圍棊病不銜杯亦廢詩對局蕭然兩無語箇中君子有爭時鷺落寒江鴉點汀晴忩飛雹擊槃聲方圓動靜隨機見清簟踈簾眼倍明又白日惟銷一局棊攬碁還誦李侯詩傍觀不作千年計會有局成柯爛時棊局醒心過博局棋聲娛耳勝琴聲少年此戲殊不惡坐隱時聞夜逹明再賦奕棊五言八句五首荆璞玉為子井文楸作枰有求惟别墅不喜得宣城跕跕飛鳶渡丁丁伐木聲破愁逢一笑無地著虧成祗園三日雨碧澗一枰秋試問酒中趣何如林下幽從它著虎口尋我鎮神頭惟悟爭先法當機與手謀不作丹朱戲難禁清晝長敢言白玉局聊取紫羅囊角道空傳記乘除自有方兒童爭畫紙漫學老夫狂眉山非快手奕勝亦欣然變態一翻覆幾微繫後先陶公慮太過雪女慧堪憐張弛誠吾道斯文許爾賢凝神迷逺躅致一有全功皎皎婦姑月冥冥鴻鵠風置君愚寧子議樂哂溫公誰謂商山老飄然到橘中越王山二首朝登萬仞岡夕宿雲霞間越王昔何時稅駕宅此山山顛有石室險絶未可攀煙樹相映帶尚想颷輪還文吳二仙子騰趠跨兩班俯仰五百秋下視悲人寰王室久蕩析世路方孔艱我尋真人居荷鋤支蓬菅林泉依福地樵汲闖靈關庶以逺兵革返兹後死顔越王名兹山無復車馬迹絶頂有佳處軒然大盤石靈洞閟其中神池蕩其側雲氣朝夕生合散一瞬息吾聞王子搜隱遁辭越國玉輿去不返丹丘鎖荆棘二仙去季世故老猶記識遺蹤落人間不稽傳寶墨我睎伯夷清願作老𥅆役脫身埃壒外救暍望三益嶺雲吾居半山上繞屋猶峻嶺舉頭即見之坐卧作牆屏忽復不可求澒洞雲萬頃初疑岸谷變身不踐人境俄頃如故常突兀在屋頂隱見須臾間變態莫記省煙霞成痼疾終日常炯炯早閲金丹訣未辨卜竈井世亂一丘壑斯志或可逞鳴猿落空岩翥寉揚晴影石泉漱芳潤草木皆秀整洞天有歸路來往心已領從寶峰長老惟足求貓頭筍不識貓頭筍還思馬祖山庭蘭生舊茁綳錦換新斑藴玉爭懷寶登盤想飫餐分甘須劖劚逺助一瓢簞食棐子若一作石榴資彭糧棐實伐彭兵三彭穴身中各以尸自名伺隙殘所託睢盱為已榮仙山無凡木棐林髙且清八月實纍纍斗量亦囊盛盈盤得恣食不與汝糧并嗟汝小黠爾安所逃汝生蚤讀黃老書五牙潄琅英雖微玉山果知汝久已行喪亂食不足長飢病所嬰蟠桃未能致橡栗庶可營作詩頌子棐期子以主盟十月十五日山中下視雲氣自山間出已而彌漫咫尺不辨岩谷戲成五言一首一嵗下元日千山小雪天雲層生逺壑雨拚割平川放牧虛橫吹樵蘇樂靜眠遙知載酒客無路到齋前十月十六日雲氣依然合山蹊舊不通虀鹽猶可問牢酪頓能空細檻泉聲外踈籬犬吠中無人披宿霧採藥過龎公南城鄧氏亭小麥青青傷一曲江南千里傷春目旴母江頭喚渡人遙指麻源第三谷裹鹽包飯各匆匆回首煙霞樓觀中詩成更著羊何和猶是前身內史公兩宋名賢小集卷一百十六
