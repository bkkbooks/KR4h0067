body:
  text: 兩宋名賢小集巻一百六宋陳思編元陳世隆補友松閣遺稿張商英字天覺號無盡居士蜀之新津人登進士第為章惇所薦紹聖初累擢左司諌工部侍郎大觀中厯尚書右僕射中書侍郎貶衡州復官卒贈少保諡文忠曾入黨籍有無盡集淩雲行麻姑何代仙南城有遺壇雙練飛絶巘天風逼人寒枯螺抱怪石㡬見海水乾清都在何許烟霧不可干宫闕鏤白玉輜軿駕朱鸞念非麄濁質可以超雲端冲虛盡塵滓變化生羽翰悠悠戚施子汲汲營餔餐頎然碩且大軀幹壓馬鞍奉養恐不至齒髪忽已殘呼吸一時絶枯骸積巑岏勝行望碧落霄露零衣冠願聞道之妙不用擲米丹人間寧足樂棄去夫何難過梁口迢迢一水遶千山桑柘隂隂聚落寛好事莫傳江上信漁樵自不識衣冠贈玉巖四圍岩谷上通天岩底幽人抱腹眠不羡莊鵬摶九萬肯随齊客列三千養成白雪髙歌調散盡黄金有簡編野鹿今朝入城市為余有意下林泉睢陽五老圖德政調元向道閒天朝詔許實辭冠丹心耿耿懸象魏青史昭昭照玉桓晚節友賢陽鳳暖老年憂世谷駒寒太平猶自存龜鑑後進儀刑仰慕㸔蔣坊寺賜老僧九十光隂欠五年寒灰枯木老雲泉眼眀尚可穿針鼻齒硬猶能嚼石蓮疑是合知諸佛印果然别得一枝禪不因㸔破真贜物安得囊中出小編香林院瑟瑟松上風㝠㝠竹間露窓虛簟色寒石側蒼苔古長廊寂無人殿閣下鈴語此意兩蕭然徘徊不能去金精山留題秦亡項滅漢罷兵分王宗室皆連城西方女子不用事張氏有婦懷金精吳山之下吳水曲石皷峯巒翠相矗山幽水邃閨閣嚴二八芳年貎如玉呉王聞知心欲狂珠琲繒纊羅千箱若慿青翼致消息陳説富貴誇膏粱玉人冷笑吾當許汝苐為吾開洞府洞成賦詩悲下土悲哉下土人皆苦飄飄仙袂淩上蒼天街昴畢騰輝光使回千里澀進步目極五雲空斷腸吳王悒悒忽不樂入顧後宫情索寞仙凢㑹合竟何年多謝君王鑿洞天孤憤吟二首平津諛武帝堯舜未為聰歸來東閣士稱頌此周公勢利變人心上下交相䝉低顔望眉睫一喜生春風優游卒兹嵗安知朝野空青青一本桑下可百天息泠泠一井泉上有千人汲千里以為郡百里以為邑生齒豈不䌓教化繄爾力何事此窓人歎此徒勞職挽老蘇先生近來天下文章格盡是之人咳唾餘方喜丘園空繐帳何期簫吹咽轜車一生自抱蕭張術萬古空傳楊孟書大志未酬身已沒為君雙淚濕衣裾題關公像月缺不改光劒折不改鋩月缺白易滿劔折尚帶霜勢利尋常事難屈志士腸男兒有死節可殺不可量䕶國寺薄宦區區可歎嗟寂寥寒館過村家神錐豈向囊中出寶劒聊慿醉後誇就禄勉持毛義檄讀書空滿惠生車掩關不識青春好一夜狂風已落花與劉跛子飲市橋遷客湖湘召赴京輪蹄迎迓一何榮争如與子市橋飲且免人間寵辱驚天覺召自荆湖邊劉跛子與客飲市橋聞車騎過甚都起觀之跛子挽丞相衣使且共飲因作此詩逰天平山山在林縣黄華谷南洞天金闕天平爵層􅀈石崖寒玉削突兀雲生縹緲間鬅鬆樹大侵寥廓蒼鹿挨摧北斗魁要猿弄南辰角碑文壓破石鼇頭琅玕爛折玉兔脚背岩松柏碧森森向日雜花紅灼灼遮礙林慮半壁天琢成雲漠千里壑宫宰爐燒延壽香避秦採得長生藥風物依稀紫府宫嵐光繚繞朱陵閣路轉樵人目下迷桃源仙子心無錯千形萬狀天平山剖判𤣥黄天地作題天平山撲豬嶺玉皇不禁上天梯半築臨崖與斗齊昨日我因尋藥到秪疑驚起日中雞五臺山五頂嵳峩接太虛就中偏稱我師居毒龍池畔雲生早猛獸嵓前客過疎氷雪滿山銀㸃綴香花徧地錦舒鋪展開坐具長三尺方佔山河五百餘見山亭簾捲疎煙醉眼開浮雲飛盡見崔嵬苦嗟霖雨遮藏乆深謝晴一作清風列致來丹桂有時眀月滿舊山無路白猿哀禪僧指我真空理心大茫然一夜灰遊青原山所至紛紛簿領堆也須風月洗塵埃明朝相與尋師去况是同行掉臂來華陽洞素虎斑虬躡紫煙㡬㸔滄海變桑田赤城玉笥尋真後又到華陽第八天溳隂亭駕言晨出㵐臺隅溳上登臨酒拍壺不似峴山羊叔子心隨漢水欲呑吳兩宋名賢小集巻一百六
