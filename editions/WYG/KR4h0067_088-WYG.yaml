body:
  text: 兩宋名賢小集巻八十八宋陳思編元陳世隆補祖龍學集景臣作亭於池上予名之曰夢艸賦詩以志新構俯漣漪名標謝客詩窗明溪雨過檻静竹風吹賀厦應容燕巢蓮亦許龜何人倦漂泊此地好追隨兀兀乗籃轝厭厭倒接䍦秋芳正堪賞樽酒莫過時題仰山二十韻維南斗牛下萬仞聳崔嵬日上光先占江盤勢却回一方䝉雨露㡬處對樓臺不逐秦鞭去曽經禹載來雲生峰慘淡氷泮谷喧豗險外煙嵐變深中洞府開巖花春灼爍溪鳥暖毰毸飛瀑含清籟乖龍走疾雷平川蕭廟閟半腹鄧壇摧精藴瑶瑰寶靈鍾杞梓材僧軒冝薜荔樵徑怯莓苔旁眺龍舟橘前瞻庾嶺梅仙經饒地肺賦筆讓天台神物多靈貺農田少旱災隱君須獨行吟咏亦難才何客能依止伊予語敢哉一麾成繫滯四友阻游陪未脱紅塵累徒嗟白髪催夢頻生枕席賞每倒尊罍預恐𤓰時代圖歸作醉媒濟上夜泊寄杜秘校十幅蒲㠶一竹篙隨流逐浪我心勞㡬程煙水秋光逺半夜星河天氣高正想黄陂何淼淼可憐禹瀆更滔滔猶興明發諧相見願奉清言散鬱陶經劍池皇祐元年八月晦日題時以秘書丞為廣東提刑經過巧冶何年百煉金刜鍾芒刃此湮沉氣衝牛斗雖難掩鑒遇張雷始見尋恍惚莫窮神物逺波瀾空在曲池深鉛刀也強思磨拭悵望西山與華隂送春長句呈李㤗伯時在袁州盡日臨風把酒巵宜春臺上送春歸已看緑樹隂隂静猶有殘花帖帖飛嵗月任從隨手過功名未必與心違我縁客宦無常處後㑹如今亦恐稀送潘華陽河陽苗裔有英翹年少聲名動帝朝月桂我欣同賜第澗松人借此沉僚金牛開道秦川險笮馬來賔漢使遥想到刀州遇知已便從平地上煙霄㣲子廟億兆夷人困獨夫惟君先見得良圖為仁始欲扶商祚去國終能啟宋都銕質豈甘因諌死髠鉗仍免作官奴千年廟食應無愧知退知亡即聖徒寺有四絶一曰靈巖予以赴官獲此税鞅因賦拙句用誌其行常想靈蹤得到難因回征轡此盤桓松風逗磬僧齋冷石水環堂客夢寒聖作自同堯典布寺有偃葢松白鶴泉及藏大宗皇帝御製御書古碑猶是魏朝刊最憐山色當樓好欲去重來一凭䦨贈商水連尉同年塲屋相知最有情去年同試便同榮神仙名籍輸梅福典冊文章滯馬卿泣玉淚收休積恨擲金詞在藹新聲公卿好致歸臺閣莫遣徒勞浩歎生次韻和酬張兟秀才見寄傾葢相知分不同逺憑郵置枉緘封題評祗益顯凡品刻畫何曽補陋容綵服侍行君得意朱轓假守我勞悰予方權領郡事論文未遂西齋約早晚重親出匣鋒明水鎮水陸禪院誰卜精藍若畫屏四邊山色與泉聲野僧憎見心應樂俗客偷來骨亦清晚吹乍回香篆破曉雲纔散蠟燈明吏人莫怪徘徊久自得閒情减宦情龍圖范給事以禫服向除修治塋域就山築室因爾書懐俾無擇繼和謹次用其韻采采陔蘭負養親㡬思定省泣晨昏三年已畢先王制盡日將承聖主恩名遂自同周柱史諫違誰記魯臧孫考槃在澗雖云樂祗恐泥書到逺村田四秘丞通判鎮戎軍身紆茜綬朝章貴手把芝涵帝命新方朔上書曽自薦祁奚外舉果知人公前應運籌决勝科今為侍讀李侍郎保任被召試策入等遂領此命往西北用兵運籌暫遂征西將侍橐看歸拱北辰我亦潛心禦戎策羡君抗斾擁朱輪題紀信廟漢祖臨厄日將軍獨奪功一身雖是詐萬古盡言忠樹老風聲澀天寒景色空我來觀廟貌無語對村翁昇州保寧寺鳯凰亭臺舊有亭中廢已久今長老承泰建此鳯臺雖舊趾亭榭斬新開荆棘榛蕪去江山氣象來神君虞氏化賢守次公才遲爾離丹穴飛飛止此臺時龍圖葉起居鎮金陵留題女郎臺女郎臺上寺寺影蘸湖光夜梵星辰近晨齋烏雀忙煙滋楊栁綠風逞芰荷香欲下還慵去憑闌到夕陽春郊即事東方驅曉騎南畝勸春耕試與牧童語因知林鳥名雨前茶正小社後酒猶清可笑豚蹄祝篝車望豈輕送李丞知京兆司録纔從知己薦公近以知己慰薦改官又應辟書行今知府天章孫待制辟公領是任廷尉官聨重軍謀職任清華巖東野秀紫閣晚峯横盡是供吟處歸應新集成送宋寺丞通判卭州半刺侯藩重臨卭驛路賖將經㶚陵樹先看洛陽花土物張公竹民封卓氏家為君傷逺目日日㫁襃斜秋日感懐多病多愁客新秋百感生異鄉違土性孤宦見人情案厭留燈讀田思帶雨耕不堪臨曉鑑潘髩二毛成寄潁州兄川陸一千里炎凉六十旬意通書信少思入夢魂頻身外宦情薄眼前人事新願兄無見念憂道不憂貧舟次張澤阻風舟楫雖佳興風波即畏途我心何所懼世路此無殊銜尾千艘泊爭頭萬怪趨飄然不終日揮手謝淳洿寄題漢州西湖兼簡知郡馬屯田房相留遺愛清風湖水長人思浴池鳯誰識濟川航白雪徽音遣太尉喜子弹琴洪鈞道化光還聞繼高躅新有召公棠歌者李蘇蘇齊州歌妙纍纍若貫珠厯城惟秪數蘇蘇何當更唱陽春曲為爾今宵倒玉壺過渦河揚鞭策羸馬橋上一裴回欲擬臨渦賦慙無八斗才昔曹子建臨渦作賦書於鞭上馬上口占前年躡屩念歸歟今日乗軒類使乎千里行春憂寄重自慙翻羨老潛夫登泰山簡周行日日塵中眼不開暫登蒼翠喜游陪莫辭辛苦經艱險大有人生不到來又游靈巖紅塵滿馬三回到青嶂迎人萬疊開却被野僧相顧笑區區還是舊時來次韻酬陳判官見貽一篇為惠枉瑶封疑得仙文自蘂宫始信夫君才力大居然天地入形籠陸機文賦云籠天地於形内周成職方笑臺賈生太息唐衢哭感事傷時可奈何爭似君當堯舜日臺頭大笑樂天和次歐陽永叔送赴陜韻前日西行别翰林為我開尊飲之酒高冠滿坐皆賢豪談笑喧呼時各有自慙流落䟽游陪十載江湖成浪走主人名重聞四海典冊高文推大手發揮六藝無遺精攻黜百家如拉朽顧我昬冥聞道晚代謝春秋四十九當年擊節傚金注此日強顔同木偶事功未省成尺寸廩禄惟思校升斗㑹須歸去老東陂鼓腹含飴同堯叟九日登袁州宜春臺落㡌佳辰又到來黄花爛漫為誰開已經多嵗衰容改更被無情急景催取次盃盤須盡醉隨宜歌管任頻陪却慙未報君恩厚空向山城養不才兩宋名賢小集巻八十八
