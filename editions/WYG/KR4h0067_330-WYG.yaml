body:
  text: 兩宋名賢小集巻三百三十宋陳思編元陳世隆補菊潭詩集吳惟信字仲孚霅川人居華亭白鶴邨詩名藉甚吳中有老儒靡先生記問該洽惟信客吳遇諸塗叩以近詩因誦傷春一首靡先生屈膝下拜曰子謫仙人也老夫雖欲效顰無可置喙矣與浮玉施樞交善投贈亦最多春閨怨細栁輕煙鎖畫樓樓中人去水長流琵琶聲斷梅花落别是春風一種愁蘇堤清明即事梨花風起正清明游子尋春半出城日暮笙歌收拾去萬株楊柳屬流鶯湖上雨吟濕了荷花雨便休晚風歸栁澹于秋一生不作機心事合轉船頭向白鷗雨後雨後輕雲學水流惜春人痩怕春休梨花却恐難尋夢燕子何曽細説愁賀史守鳳雛滿月玉手歌姬托鳳雛堂前畫額旋調朱春風吳㑹宜男艸試問他人種得無寄東畎曹侍郎結網求魚事已遲却非春艸不歸詩斜陽一片山如畫更把心期付與誰題秋江晚照圖水光只肯淨涵虚分浦通村路却無風日向低鴻雁落釣竿一半出菰蒲曉吟翠帳香消捲碧紗風捎殘雨濕欄牙蜻蜓亦被凉勾引清曉低飛入水花春咏艸堂燕子未歸時香鼎灰蜚入硯池看徹唐人詩一巻夕陽猶在杏花枝贈别上官良史不惜黄花一醉君喚歌催舞語紛紛天涯明月空相憶寒雁無聲入斷雲秋夕西風吹露下秋空鳥鵲無聲占碧桐天氣微凉人好睡䦨干閒在月明中野望閒與蘆花立水邊歸心客思兩茫然夕陽收盡天風急一樹寒鴉落野田辭史侍郎事到依人易策勲合歸收拾北山雲春風入手非閒用種得梅花却寄君春夢謡銷金帳掩水沈煙髻滑金釵落枕邊魂夢不知春已去誤隨蝴蝶過鞦韆拜和靖墓墳艸年年一度青梅花無主自漂零定知魂在梅花上惟有春風喚得醒重拜和靖墓片玉沈山艸亦珍斷碑殘石當麒麟君王别為開門户不欲梅花見路人閨怨病起傷春獨倚門喚人鸚鵡隔簾聞無情最是東風惡痩却梨花一片雲仙興宫殿髙髙在五雲鶴揺松露滴行人洞門不放東風過留得桃花一院春山居春興林雪消寒滴春風入艸廬好山分客看閒地課童鉏竹痩偏宜鶴泉清直見魚邇來因苦咏零亂一牀書寄大使趙清臣擒吳纔了合封侯何止區區古蔡州一著髙時全國體十年危處與心謀山川恢拓春風逺天地清明王氣浮白雪滿頭勲業大不應忘却赤松游寄蔣重珍祕書焚香誦易與天游君命相催不肯休時節固知來則是功名却以得為憂翠蓬雲氣生衣袂金殿陽光動冕旒此際一言能悟主始堪回首舊林丘寄越上髙疎寮便教煙雨畫成圖爭似歸來有賀湖鏡裏精神西晉有詩家標準晚唐無惜花春盡鸎吟苦敲竹風清鶴夢孤世事正多心早懶著書贏得靜工夫立春日即事檢殘玉厯又春來造化無私命轉乖照水莫嫌窮面目看山長有好情懐生期惠逺眠雲過死問林逋借地埋詩到夜寒吟更苦一枝梅雪映書齋送伯氏秋潭謀居朝吳暮楚幾時休未必江湖有白鷗萬事莫如歸去好一椽當為老來謀春天吟思行花徑夜月琴聲坐竹樓但得餘齡無俯仰曽公食粥亦風流送王夢升入道不肯輕迷固有天星冠霞氅竟翩然人能變體方超俗丹到成功即是仙伏洞黒龍聽夜咒傍花白鹿伴春眠哦詩更欲全清致當以彌明作正傳贈史泳烽火窮邊幾度愁亦曽將死博封侯謗興在彼情誰恕事過知君痛自休跨馬甲衣春雪白射雕弓箭曉星流救時正屬英雄者更著工夫必到頭移居即事山移無復昔人賢隨分長安辦一椽掃室敢言天下志閉門儘可雪中眠攜瓶與客同沽酒接綆過鄰自汲泉到此始知閒是福居山未必似居􅆵呈雲麓史侍郎若教縷縷説漂沈却恐無憀老不禁百拙難隨今日巧一貧方識古人心牛羊歸盡荒郊潤猿鶴愁多故國深亦欲以詩為活計世間何許覔知音謀生謀生一事到成功消得湖邊地幾弓韋曲有花留杜老洛陽無客問盧仝春風燕子虛簷外夜雨蛩聲小徑中所立規模雖冷淡絶勝彈鋏舊漂蓬贈越僧意書記一衲冰霜二十年不知妙用自誰傳心能轉物方為佛詩到名家亦是仙喜客稍寛沽酒禁愛閒多結住山縁今冬約我西湖上同看梅花坐釣船自序一劍辭家竟陸沈夢思空向故廬深槎迷河漢千年恨樹隔闗山萬里心衣垢正憐貧未去鏡明忽有老相尋春歸不與人為約青艸催詩亦嬾吟秋夕雨聲雲氣暮蕭蕭羅扇恩疎井樹凋心事暗隨歸夢去壁燈留與可憐宵咏貓弄花撲蝶悔當年喫到殘縻味却鮮不肯春風留業種破氊尋夢佛燈前次王漢和見寄韻扇恩已盡漢宫秋空憶金鞍逺玉樓九辯不歌黄菊老斷煙零雨為誰愁兩宋名賢小集巻三百三十
