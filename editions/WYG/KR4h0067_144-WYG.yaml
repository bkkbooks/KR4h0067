body:
  text: 兩宋名賢小集巻一百四十四宋陳思編元陳世隆補于湖集巻上張孝祥字安國歴陽烏江人父祁與胡寅交善秦檜惡寅羅織及祁并真嶽孝祥年十六領鄉書紹興二十四年廷試考官擬秦塤首選孝祥次之塤檜子也髙宗親自披閲擢孝祥為第一檜忿甚後孝祥詣檜檜問習何書答以習顔書又問學何詩答以杜詩檜佯笑曰好底盡為君占卻也檜死累遷起居舍人歴知撫州平江靜江俱有聲績尋以荆南湖北撫安撫使進顯謨閣直學士致仕卒孝祥精翰墨時稱之曰紫府仙所著有于湖集赭山分韻得成葉字二首昨日一尺雪今朝十分晴㫤日上積雪光若虹氣升江平鏡新磨地迥玉琢成䚂山有令色令我白眼青借馬屋東家喚客踏層氷冒貂挾裘茸石路五里平竹樹紛掩然珠幢間霓旌野僧不慣客倉皇門前迎屋古少完壁堂虛有危燈石上跡宛宛山腰塔亭亭刼火偶不燒百年費支撑我有一尊酒髙處得細傾諒非無事飲憂國空含情長歌𣺌寥廓歸路已載星萬生紛不同宿昔有定業哀哉彼遷民苦事乃稠叠纍纍庭際炊采采澗底葉問渠何為來悲淚不盈睫連年避兵亂生理安可説今年更倉皇芻藁亦焚劫扶攜過江南十口四五活斗米六百錢兼旬又風雪前時詔書下振廩要周浹聖主甚哀矜我曹空感咽願今兵革罷復得理歸楫傳聞菰蒲中相殺血新喋本是耕田農飢寒實毆脅須公語縣吏早與支米帖椰子酒榼矮胡生南方託家碧山崖採擇供貢篚扶持上天街愧此愿慤姿欲售久未諧道旁麯先生風味故自佳逢渠即傾葢輸寫能開懐刮削出光彩䂓繩去攲侅金玉豈足貴膠漆真我儕客來有嘉招二士經必偕婆娑止坐隅供餽煩金釵矮胡雖本强醇徳真無涯虚心實其腹居然外形骸㣲物幸見用棄置理則乖毛頴有封國陶匏薦斂柴大藥起世痾炮燔及根荄願子自洗濯勿受塵埃埋暇日肯相從醉經坐髙齋和何子應賦不欺室韻隆興天子開千齡六龍飛天動潜鱗東嘉先生初召對不欺之論驚廷臣誰令浮雲蔽白日脱幘歸來還堵室巍巍烏府憶霜簡凛凛螭蚴有椽筆魏公眼力無餘子與公周旋豈其死請公細讀不欺銘一字之褒如魯史某頃䝉信陽使君教以邊字韻佳句伏讀降歎病勌答謝甚緩復不能竒仰俟斵削二首風流追數建安年誰遣朱轓並塞邊舉國向來儒服少是邦端有大夫賢須公帷幄収長䇿着我江湖刺釣船池閣最凉肯臨否紅粧翠葢擁三千百謫歸來又一年投身烽火戍樓邊私憂自笑愚無䇿制勝懸知國有賢北去燕然堪勒石西來樊口看燒船中州更有王夫子筆陣猶能獨掃千殿廬偶成簾幙垂垂燕子風宫花春盡翠隂濃日長禁直文章靜寳藝時時一折封蠟梅滿面宫粧淡淡黄綘紗封蠟貯幽香遥憐未識春消息乞與一枝教㫁腸重入昭亭賦二十韻我本山中人對山輒忻然蹉跎落世網欲去常拘牽蒼鷹着珠韝側腦思髙鶱青絲絡奔驥擺脱意乃便抑鬱不自聊沈㝠向誰宣長懐昭亭山積翠摩青天下有千柱宫突兀數百年往者雲中游羣峰玉回旋飛閣出本末下晲春無邊堂中二老人龍象開法筵炯炯月在空浩浩海納川應庵黙無言妙處心已傳如庵説千偈㣲詞諦真詮靜極炷爐熏對牀且安眠更欲捐冠簮一簞寄三椽此志竟不遂緇塵亂歸鞭今朝復何朝卻望山中烟縹緲見樓觀鍾梵聲清圓我攜九節笻飛步雲蘿巔次韻左舉善木樨想見秋光插滿頭遥憐不負此山遊一枝併與詩筒饋氣壓西湖萬斛秋讀中興碑繡綳兒啼思塞酥重林燎香驅羣胡阿環錦韈無尋處一夜驚眠揺帳柱朔方天子神為謀三郎歸來長慶樓樓前拜舞作竒祟中興之功不贖罪日光玉潔十丈碑蛟龍缺拏與天齊北望神皋雙淚落祗今何人老文學子雲壓境先遣詩次韻相風日日問長年蠲首遥知近箇邊別後情親難過我故家人物更誰賢一尊且對荒城酒六月休牽上水船小此淹留待追詔公車歸奏獨三千以茶芽焦坑送周徳友徳友來索賜茶僕無之也帝家好賜矞雲龍祗到調元六七公賴有家山供小草猶堪詩老薦春風即事簡蘇廷藻落日邊書急秋風戰鼔多私憂真過計長算合如何盡斂清淮戍仍收瀚海波棲遲一尊酒幽恨滿闗河罷歸親老難為住恩深許放歸北行湘水闊南望瘴烟㣲兵衛収門㦸征塵上客衣遥知六七月喜氣滿庭闈三墖寺阻雨墖上衆鈴語湖頭三月風蒼山在烟外髙浪與天通市迥薪芻少僧殘像教空不妨留滯好且看夕陽紅王淵亭夜投寳覺寺徑上玉淵亭峽束千㟁水天分一段星神光行熠燿空翠矗青冥雄觀兼幽趣悠然寄獨醒以上善鳴集清虛觀石側疑無路山迴別有天神泉通玉海帝畫麗奎躔紫闥雖重到青瑶卻未鐫只須香案吏為冩白雲篇廬山志黄陵廟百世黄陵廟淒涼屋數間只憐斑楚竹那憶赭湘山訪古韓碑在徵歌缺水閒虞嬪更堯女莫作水仙班長沙志蘄春道中霜凈波平水落灣我行正在畫圖間簾鈎不用怕風日且看江南江北山登馬氏永寧閣和朱漕元順分韻佛宫昔誰營猶挾葢世氣應慚割據醜稍識苦空味重簷隱白屋隆棟湧金地耽耽壁間像尚可將千騎鄉來歌舞處荒棘擁城雉惟此悲願成歴劫更興起横撞鐘萬石妙響驚昏醉憶當風雪晨茲事實經始老僧喜成就膜拜顙有泚喚客饌伊蒲齋房頗深邃空巖才跬步不往獨何謂徑攜雙竹杖腳力勇難制繡衣兩使者風誼我所畏相逢瘴海上此樂豈天恵山林與心㑹風月可回施聊乘簿書隙􅂸此一日費摩挲水邊石勝處欲専美不用濡漆書公詩即行記次江州王知府叔堅韻二首何人列屋閉嬋娟憶對清歌重慨然一笑相憐窮相眼漫撩詩思入愁邊經行有恨是隂雨不見香爐生紫烟安得草堂容一榻聴松聴水日髙眠題張仲欽所藏隆茂宗畫登瀛圖老隆已死畫筆枯畫歸天上人間無公從何處得此圖眼明嶺外三歎吁天䇿上將天為徒指揮羣龍清八區褒鄂英衞供掃除功成告廟金模糊歌童舞女不願渠乃此數士相為娱鐵面苦口談詩書直欲措世如唐虞老隆妙手神所摹蒼頭廬兒亦敷膄祝公即歸承明廬願持此道補帝裾送劉伯同侍開府公入覲相公早勒太常銘康樂當家更典型槍急曽看飛鳥過筆精時作換鵞經極知許國心常赤趂取封侯鬢尚青若到都城見知舊為言江漢有浮萍昭亭食柑一雙分我洞庭秋梨棗旁觀不那羞喚得風霜回齒頰夜尋清夢五湖舟和如庵四首厭聴諸方三昧禪卻思夜雨對牀眠欲知千偈如翻水看取朝來綠漲川不談世法不談禪徹曉齁齁一覺眠個裏神通元不小回風急雨震山川朝供爐香夜供燈閒來落得困瞢騰如庵許我參堂去長作昭亭粥飯僧一燈分作百千燈光徧河沙正鬱騰稽首應庵休採擇直須傳與在家僧再用韻呈仲欽元順今時朱仲欽文字有竒氣潜幽睹天奥雋永得古味袖手閲時紛虛心餘樂地那持瘴野節不從羽林騎埋輪吾宗英補衮五色雉去年對延英御坐再三起憂民甚已溺稽古乃心醉天衢行日月發軔從此始㑹當紀鴻業我筆墨先泚相期並徵詔禁殿直清邃尚憶此追遊班中語相謂我懐江湖去初服反舊制閒游靜成趣岐路險多畏此事屬兩君它年儻終恵長篇起予病妙語充法施調髙和難工初學慚紙費郊原春無數風日極清美已遣具方舟重游更須記送子雲倅荆州二首閲世波流險未涯愛君悃愊靜無譁髙門自惜聫三㦸飛珮何當乞九霞喬木世臣餘故國采蘋齊女甚宜家君王早晚思前席㑹有徵書訪賈嘉荆吴相望各天涯惜别尊前菊未華便放扁舟衝駭浪要看秋日冠輕霞新詩滿路分吾子威業康時是故家好去依劉靜邊瑣䇿勲行即賜褒嘉道間見梅寒女生來不解粧天然玉色照孤芳疎籬茅舍無端恨故有幽人與㫁腸贈江清卿吾友林少頴讀書不記屋抄書手生繭照書眼如燭往時羣玉府上直對牀宿夜半聞吾伊吾睡已再熟此君抱髙節雪栢映霜竹造物乃兒戲卧病在空谷尚能作手書寄我成一束我懶更愧渠終嵗不報復今來見江子少頴儼在目不必不如師惟子肖甚速持身嚴法律自愛比冰玉學官冷徹骨三月食無肉危坐談仁義口吻若布榖時能從我遊騎馬踏溪淥定自我輩人胸次不碌碌惟皇開洪業大厦非一木豈有棟梁姿而今久淹辱願子益寵珍即日馬首北我懐山林去掃跡混樵牧躬耕得薄少持用供水菽稍逺聲利場真勝萬鍾祿但恨與子别醉語成諄複因書寄少頴以寫我心曲題蔡濟忠所模御府米帖生前官職但執㦸身後一字萬金值當時雷霆下収拾世間不復有遺逸上清虛皇手自擇編星為囊雲作級流鈴擲火守䕶密君從何處見真跡知君定通玉帝籍太㣲垣中賜餘墨龍騰虎卧摹不得想君神授五色筆江南鈎鎖腕中力釵折屋漏千態出整整十巻字猶濕光彩激射海為立平生我亦有書癖對此倘怳心若失口呿汗下屢太息十日把玩不得食作牋天公拜稽首乞我此老生時一雙手為君痛飲百斛酒墨池如江筆如帚一掃萬字不停肘枕上聞雪呈趙郭二丈上瑞來寧玉座憂夜聲先到竹窻幽飢腸已作來年飽病眼聊須臈月収髙士清貧無弊履故人狂興阻扁舟却思清曠江邊路鶉兎成車酒自篘楓橋四年忽忽兩經過古㟁依然窣堵波借我繩牀消午暑亂蟬鳴處竹隂多和蔡濟忠天字韻憶我初識君屈指今七年鹽車著騏驥駑蹇紛爭先謂當對清閒帝席半夜前稍使修世官復近尺五天如何尚朱紱亦隨嶺海邊前山春色多佳樹午影圓散䇿履幽徑方舟下長川心目得開明語笑為芳鮮但恨暝色至不得窮攀援尚欲夜燃犀下照蛟龍淵清遊𣺌難繼歸夢蒼山顛須君換鵞帖更叙山隂賢題西湖可賦軒風光獵獵上烏巾不那西湖爛漫春借與繩牀對修竹為君一洗軟紅塵賦王唐卿廬山所得靈壁石湘江竹深韶不傳后夔神禹飛上天泗濱之磬無人編帝敕此寳淪深淵於乎不知幾千年竒形異質鬼所鐫青虬赤虎遭縛纒蹙筋怒爪身拘攣自從邊塵瘴中原神物變化隨霏煙金聲玉振義不辱六丁徙置康廬巔靈臺星官未知處但怪寳氣干霄躔王郎齊居旉淺源飲水泣血天所憐空山無人下羣仙似夢非夢或吿旃捫羅獨上果有得失喜而懼心茫然百夫挽取自包裹解衣更買蠻兒氊緘扃不肯鄉人説知我好古容觀瞻焚香再拜屢歎息安得致之天子前安得致之天子前明堂郊丘備宫懸調和正聲薦上帝消爍羣慝収戈鋋朝廷清明用耆舊一律四海歸陶甄鳯皇來儀獸率舞復古却到虞韶邊是時賦公筆如椽襞牋為草登歌筵湖上晚歸遇雨隂雲靄靄草萋萋晚過東湖雨濕衣細栁含烟凝翠色浮鷗戲水弄晴暉輕舟繫纜斜依㟁釣子収綸欲下磯湖上人家未扃戸兒童蓑笠負薪歸題胡敦約山行圖松行石磴兩﨑嶇此去長安路更迂底個官儂强健在葛巾芒屩自騎驢送紙衾韓中父韓郎香盡諸縁絶壊衲篝燈供佛熏乞與紙衾綿様煖撩教醉裏一作雪夕夢紛紜郡侯遣騎至山中餽名醖輒呈長句用黄宰韻山前山北雨生寒竹樹風烟蒼莽間青壁倚天元未見白衣送酒故相闗共追蓮社公應許稳上籃輿我欲還後日重來􅂸一月細扶藜杖覔巉岏考試呈周茂振舍人陳季陵國正胸中五斗棘厭此十日讀紛然湘羅帕猶作春笋束先生擇法眼一閲不再復探囊得至寶每出輒驚俗孟公更超絶涇渭飽渟滀從容了官事繭紙唾珠玉鄙夫聞道晚衡鑑恐不足㝠搜夜無寐慚愧費官燭何時即三昧屈指社甍熟秋客日夕好應到堂前菊近得一二硯示范達缺笑以為堪支牀也許送端州大硯作詩以堅其約范郎紫玉餘半圭翻手作雲雨雹隨龍蛇起陸孔翠飛雲収雨霽千首詩薦以文錦盤珠璣夜光發屋憐翁知桂州刺史書成癡單車萬里日夜馳囊中已無去年錐欠此石友相娱嬉范郎笑我支牀龜忽遣致我重寳齎金印如斗不願攜愛此直欲忘朝饑君行題曰古端溪溪石醜好紛不齊溪邊之人足漫欺須君眼力為辨之更作萬斛之墨池為君大書十丈碑去年三月三日雪霽入昭亭訪應庵如庵二老今年在臨川追懐昔遊用寄萬庵韻蹇驢衝一作踏雪度松林齧一作漱石溪流有令音旋摘白雲濡燥吻更參黄蘗印初心嵐開複嶺屏千叠凍合浮圖玉數尋一夢經年歸去好宦情全薄此情深將至宣城和壁間韻寄王宣子一笑歸來見在身倒傾江水洗緇塵騎驢緩緩東風裏知有工夫展故人隱靜覔杉株舊聞隱靜庭前栢虎嘯龍吟三十秋我亦經營一丘壑無根樹子却須求題夏氏莊平湖漠漠雨霏霏壓水人家燕子飛欲向湖東問春色杏花無數㸃征衣和子雲白蓮仙人玉步揺佛手白練衣新粧水底明素手風中揮盈盈夜露光灔灔秋江肥寒月分好色朝霞借餘輝遥聞功徳水盡洗幻化非惟此妙花幢坐受諸天圍鄉來孤山游未覺所見稀零落塞草邊相逢故依依結實須及早要令飽霜威采剥登君盤勿嫌此么㣲黄升卿送粽鞋編粽織蒲繩作底輕凉堅密稳稱趾帝廷無復夢絲絇上客還同貺珠履我家江南山水窟日日行山勞屐齒感君投贈欲別時布襪青鞋從此始亨衢知子方着腳直上雲霄三萬里泰階歴盡却歸來赤舄一雙應几几用韻簡天童應庵敬亭松竹古藂林二老風流舊賞音樓閣長開太平像鐘魚能洗祖師心別來黄鵠還千里盟在白鷗當再尋却憶西堂大言客只今髙坐海雲深舟中即事夜行水澁舟難進月白林稀鳥易驚老去不堪霜露力尊中㣲覺似多情小憩孫氏竹軒觀諸公詩兩首開軒種竹仍留客想見此翁强健時借我繩牀小盤薄為君試讀壁間詩種竹主人今白髪題詩客子半青雲北來南去何時了風月依然只此君與趙李二同年夜飲有懐石使君恵叔佳月久不見忽見如故人清風何方來過我孤竹君我有一尊酒政為二子斟㑹此風月宵更覺笑語新北城石先生欲喚不敢頻坐上欠此客長懐𣺌無津南方鳯之徒瑞世五色文鐵石賦梅花一洗瘴海氛臺家須貢珍我欲列九閽且補諫官闕日酌白獸尊贈張欽州張家承平四姓侯門前列㦸金城丘南來清貧家立壁但有萬巻書滿樓雲山極觀半空寫下有花竹秀而野閉門讀易已三年樂天知命忘華顛我行湘中識此老難兄莫年更枯槁從來戚畹須表勸㑹聴鳴珂趂朝早衡陽小隱雖深幽去天尺五君無留貂蟬兜鍪何足道君必不為猿鶴羞奉陪宣守任使君謁昭亭神祠二首緩驅千騎出朝京門名喚得春回眼界青旗腳靈風來廟步馬山蹄雪過昭亭極知太守懐忠款端為君王薦徳馨慚愧去年冬十月軍書徹夜聴鳴鈴豐年已卜稻如京雪盡春從草際青竹裏紅旗行㸃㸃松間白塔見亭亭煖回宿麥開寒色風約疎梅度晚馨却憶宣城李太白也將詩句掣齋鈴太白詩云昨日方為宣城客掣鈴交通二千石王龜齡遣妓送酒賜詩走筆為謝不復襄王夢裏雲紛紛縞袂與青裙鳴鞭枉送齋中釀病徹杯觴欠薄醺與薦福湖上童童百畆隂丹樓碧閣照清深不嫌歌板相喧聒要見桃花印此心豐城觀音院有胡明仲范伯達汪彦章諸公題字中興人物數諸公遺墨凄一作依然野寺中欲訪英靈無處所獨搔蓬鬢立西風入桂林歇滑石驛題碧玉泉百折﨑嶇嶺路頭一環清駛石間流須君盡洗南來眼此去山川勝北州敬謝經畧祕閣餘甘湯二首甘言誤我三折臂良藥為洗五斗腸欲知苦過味方永請試君家肘後方此老才堪上諌坡南州留滯意如何還將苦口劘英主醫國懸知藥籠多寧淵觀極目洪波𣺌轟轟浪接天江心分殿宇勅賜號寧淵日照山如畫雲濃小似烟休尋蓬島地只此水中仙兩宋名賢小集巻一百四十四
