body:
  text: 兩宋名賢小集巻六十七宋陳思編元陳世隆補景迂小集晁說之字以道濟州鉅野人端彦之子自號景迂生元豐五年進士蘇軾以著述科薦元符末與崔鷗同書邪籍靖康初召為著作郎試中書舍人兼東宫詹事建炎初終徽猷閣待制有景迂生集覧古遥岑不娛人蒼莽頗愁絶東南有㫁梁水寒不可涉西闉不欲徃旦暮畏喋䙝歸來坐北堂悠然理書䇿之人阿堵中雖死情不隔周公徂東山仲尼陳蔡厄大儒且不遇小子何足責時命姑置之何為常促廹謝沈次律水枕沈侯筆力鼎可扛左手截取吳松江折流來此一尺枕指麾巨鰐回濤瀧平生性不好長物舉以遺我嗟無雙呼兒快取蘄笛簟掃除塵榻移當窗隨眠置我丘壑裏始信孫郎眞枕水我生不出長安城四十二年塵涴耳領君此枕何瀟然睡起醒心如一洗題六一東坡像二首座右銘何有丹青得若人東坡禅客衲六一醉翁巾先後文章伯安危社稷臣廟堂思潁日海嶠夢鈞辰缺眉山凝間氣渤海識兹人一代執鞭士千秋折角巾髙趨周室輔平處漢廷臣白首齊明易鴻鈞異撫辰參差非所缺契濶自如神不念乞靈者翩然駕白麟和新鄉二十一弟華嚴水亭二首渚蒲淅淅風猶急岸栁纎纎雨尚餘棲鷺宿鷗渾去盡泝溪還有兩三魚荷蓋㸃溪三數葉藤稍遶樹幾千層投閒更與高人約重抱琴來聽廣陵和圓機題草蟲怒劔無煩起逐蠅從教小物此憑陵禮加蛙臂何時用書到蠶頭幾日能半是苔邉徒有感全收芋處肯生憎如椽大筆么麽落憤懣令人終拂膺次韻王立之雪中以酒見餉同雲慘慘驅朝暄龍沙一雪人相憐寒猿哀嘯失山木饑鶴仰唳空無天當年補天眞戯爾不知修月何時已坐煩耆舊說辛卯至遣兒童憂甲子城中米價貴如玉舉家倒廪無斗粟千金狐裘豈易得百結鶉衣不堪鬻我生但識茅與菅何曾過眼逢瑶璠展君新詩問所似欲辯不敢非忘言開壺酌酒澆我胸酒酣起舞顔為紅㑹見東風掃氷雪江梅塞桞煩春工題兩馬圖前馬去駸駸年少意有餘後馬追馳驟喘殺肥髯奴邉鸞雉駭雉丹青人姓邉無花無石自瞿然已能倚壁音聲絶何用蹲飛欲上天自和因思國史燕穆之傳稱其知明州革輕悍鬪爭之俗及今海潮圖作燕公未肯祖虚無悍俗歸仁舉國書莫道邦人都背德壁間猶有海潮圖曹仁熈畫水壁夫子在川上悠然歎所逝見逝不見水身與水不二天維及地軸去矣不可制日月徒勞勞出入丈尺地莫言此身㣲九圍待經濟或指波濤觀姑在蹄涔内後人不及門有口安足議妙得䝉莊周動與呂梁㑹肇公識前波不共後波繫龎公橋柱流奔湍是誰事孰誇觀濤者八月吳儂戯瞪目不敢瞬睫轉蛟鼉噬多謝曹仁熈筆端落妙意欲採甓社珠於此觀燦翠次韻送畫山水扇與張次應五日十日豈為工萬壑千巖自絶蹤在握已能霄漢上更須羣玉占前峰題蜀道圖山鈎樹白何年嵗流瀑可聴下無地行人愁絶却無愁始信宜歌蜀道易次二十一兄季此九日韻清秋九日至晚菊兩三開愁把他鄉酒思登故國臺賜懐朝士寵詩想從臣才向晚能無淚飄飄鴈影來懐濟北弟姪久客思吾子生涯滯故鄉獨擕髙士傳翻憶紫香囊合榻言猶在同堂樂未央翩翩春草夢隨意遶池塘桃花渡今朝旅恨到何處軒窗直到桃花渡桃花渡上風吹雨道人芒屩誰來去鄞江終日一杯終日醉看潮初上看潮回自疑前世陶貞白乗興閒游鄮縣來超然亭少年曾識京華樂老得江山懐抱開風月不談辜此夕恨隨潮去與潮回又秋色日駸駸江亭敞夕隂殘霞沉浦口新月出波心題明皇打毬圖閶闔千門萬戸開三郎沉醉打毬回九齡已老韓休死無復明朝諫疏來題明發所畫訪戴圖渠自有詩扁舟雪夜興千載風流存詩畫能幽絶不似諸王孫興多却易盡一世復何待傖父莫罵予猶且不見戴題景升太尉畫孫登像契濶王孫魂夢勞京華一日重游遨圖書不惜黄金費歌舞何妨瓊珮髙月到南樓臥吹笛花殘曲几醉揮毫如何愛著須臾懶不使蘇門對楚騷題陸大夫畫逸少逺遊道林㑹稽内史勤筆墨逺遊中坐無一物何事支公愛神駿團揭鼻齒映頂足拄杖圓笠如意負蓬髪著巾俱肅肅相向忘年在何許望斷髙山空翠麓再題王許支圖海嶽登臨許逺遊上乗雲氣下扁舟可憐畢竟不聞道妙翰神騅却得留右軍憤世猶懐古何事一朝得支許馬足不動羣奴癡感深絶俗俱無語謝藴文承議陽關圖邂逅故人逃難處王孫氣象獨昇平詩吟摩詰如無味畫到陽關别有情題大年關路逢僧圖關深羇思滿風斷緑隂單一遇空門侶那知行路難予以四韻記陸大夫三髙圖自謂能省句矣復作絶句増畫筆之妙馬解䭾經度碧空便令王許伴支公山童野僕立如石忘却儂曽在㑹中兩宋名賢小集巻六十七
