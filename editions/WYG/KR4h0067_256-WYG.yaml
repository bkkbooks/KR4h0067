body:
  text: 兩宋名賢小集巻二百五十六宋陳思編元陳世隆補西山先生詩集一真徳秀字希元浦城人慶元五年進士中詞科紹定中拜參知政事進資政殿直學士提舉萬夀觀卒諡文忠學者稱西山先生有集登南嶽山煙霞本成癖况復遊名山舉手招白雲欲納懐袖間咄哉亦癡絶有著即名貪振衣遇長風浩浩天地寛題金山江來朱方注之東海潮怒飛日夕相撞舂天将古來義士骨化作狂瀾中央屹立之青峯孤根直下二千尺動影裊窕冲融中黄金側布蘭若地鑿翠面面開窻櫳雙橈伊軋破浪屋怳忽置我髙巃嵸是時千山雪新霽水面月出天清空濤聲四起人籟寂毛髮蕭爽琉璃宫披衣明發躡煙靄决眥俯入歸飛鴻襟前渤澥斂暝色袖裏岷峨吹曉風越南燕北但一氣塵埃野馬何時窮蒼梧虞舜不可叫王事更恨歸怱怱送湯伯紀歸安仁交情世豈乏道合古所難自我得此友清芬襲芝蘭苦語時見箴微言獲同參相従仁義林超出名利闗此樂未渠央忽告整征驂索居可奈何使我喟且嘆至危者人心易汩惟善端茍無直諒友戒謹空杅盤重來勿愆期同盟有青山聖經如杲日羣目仰輝耀利欲滑其中雲霧隔清照正須澄心源乃許窺道妙周程千載學敬静兩言要㡬微察毫芒根本在奥竅持此當弦韋迂矣君莫誚送裘司直得請西歸輕舸龍山頭木蘭作雙櫓飄然裘司直乗向南昌去問君鶴鸞中脱身遽如許棲遲三十年始得官掌故小須上上考豈不登省户自言野心性眯目九衢霧修竹嵗云晚萱艸秋亦暮嗷嗷投林烏猶得反其哺江西父母邦非復昔饒裕蠻煙一腥穢樂嵗且狼顧遺黎空杼軸行旅窘刀布天門窈萬里可望不可籲君今佐元帥精采繫一路瘡痍俟滌濯畫諾歸佽助先聲路人喜髙節懦夫慕遄當再前席一正天子度白鷗沒浩蕩蒼鶻在指呼我亦南陔人扁舟從此具題八君子圖後劉子出西江訪我江之東何人與偕來銜袖八鉅公韓歐開濟姿如晴月生空潞公山嶽重文正霜檜同玉立者坡仙天游匪涪翁一朝參我前毛髮生清風凄其趙韓王小異凌煙中半山執拗面亦得傳無窮趙中令像與今原廟侑食本不同故云題來青館軒窻幽雅主人亦好事不俗遺余二詩頗可喜故書此以遺之客夢成時夜向闌幽泉挾雨響潺潺清魂便覺超塵世何况真栖巖石間泉州貢院舉梁八詠萬間貢宇舊巍巍更闢新楹廣舊規豈為儒生次科計要培宗社太平基雲斤初還日逢甲虹影乍横星值奎天相斯文兆先見不須佳䜟指金雞棘闈曾闢大江東喚起秦淮兩蟄龍况是此邦饒俊彦何愁盛事不重重江東漕司舊無貢院丙子始剏之於清溪秦淮之上方興役間有物蜿蜒如􅔼蜴隠見不常或曰此秦淮小龍也丁魁丑漕闈陳君為省元建康吳君潛為廷明年丹詔下楓宸定有英材起海瀕勉取梁公舊衣鉢従今人說兩庚辰前庚辰梁文靖公魁天下梁脊伊誰姓氏題梅溪去後有苕溪自慙拙守何為者强䇿駑駘繼駃騠憶昔文闈創造初揮毫紀實有鴻樞乃今盛觀重輝赫試問他邦有此無貢院舊記梁文靖公在西府時作今曾公亦以掄魁位樞庭學中士友欲援故事請記故云簪橐聨輝三大老節旄相映四賢侯作成後進須先進引領時流作勝流䇿足巍科亦漫然當知致逺識為先丁寧莫負梅溪祝名節岧蕘共勉旃泉州貢闈慶成維南有州古佛國選佛塲開自疇昔誰歟經始梅溪翁萬桂森森皆手植文風日盛賢才多粉袍立鵠肩相摩萬間庇士豈不欲環視奈無餘地何那知吉壤在咫尺鬼神撝呵天所惜一朝幻出青瑶宫山靈獻卜龍避席昔虞局促今恢舒乗黄騁足騰康衢闢新葺舊兩輝映美哉輪奐雄規橅嵗直金虬大魁出䞉喜慶成逢此日來春甲子又一周天相吾泉真可必蟬聨四坐皆豪英一樽敬為諸君傾浮雲富貴靡定態要看名節留芬馨我今歸作漁樵侣清夢猶馳筍江滸鳯鳴側耳聴朝陽把酒空山為起舞壬午春社之明日請尊老㑹於西山之精舍龎眉皓首奕奕相照真吾邦希濶之盛事輒成口號一首併呈諸耆夀且堅異日早退之約云耆年自是國之珍何間衣冠與隠淪華髮共成千一嵗清樽相對十三人休談洛社遺風舊且頌倦游慶事新三徑未荒宜早退要将夀櫟伴荘椿長沙贈高年陳氏母子陳氏春秋一百一兒女年皆過七十一門慈孝更雍愉四老真堪入畫圖長官申聞太守喜召至階庭加盛禮老萊綵服作兒啼今視古人更過之老萊一身娛嬉耳况有三兒奉甘㫖人言潭俗不古如若看此事天下無一門髙夀何由得慈孝之人天所惜我願湘民胥傚之從此九州皆夀域長沙新第呈諸學士莫清彼瀟江莫峻彼衡嶽澄光挾秀氣日夜相回薄月吸珠含胎虹貫玉生璞子方有苗裔温然粹而慤一童與三何雙鳯兩鸑鷟奮身辭艸萊正論吐諤諤彤庭拜恩歸天香尚盈握良才國之寳一見我心樂平生功名㑹萬里初著脚永肩致主念更勉經世學錙銖分義利毫縷辨純駁相期激清風與俗洗氛濁誰歟指其南是邦有先覺和侍讀祕監餞行嚴韻任參帝里參陪意最親聨鑣忽此為交鄰徐行得接雙飛鳯驟别難留一角麟歸奏已趨天尺五寵光仍待月重輪應憐留滯窮邊客晏嵗嚴霜夜夜申末聨又云衆芳正頼君培植莫忘辛夷與露申送張曜之遂昌張君曜之遊淮東謁予故人陳制參以小詩二絶祖其行風煙千里走淮漘寄語青油幕裏人麟閣功名須有意乃心王室勿謀身譚天之外更譚兵風角孤虚分外精玉帳不妨收拾取絶勝下客著雞鳴㑹長沙十二縣宰從來守令與斯民都是同胞一樣親豈有脂膏供爾禄不思痛癢切吾身此邦秖似唐時古我輩當如漢吏循今夕湘濱一巵酒直煩散作十分春長沙勸耕是州皆有勸農文父老聴來似不聞只為空言難感動須将實意寫殷勤使君元起自鋤犂田野辛勤事總知要為爾民除十害肯容苛政奪三時已看三白兆年豐更喜春來雨澤通従昔楚邦農事早好将人力副天工田裏工夫著得勤翻鋤須熟糞須均插秧更要當時節趂取陽和三月春聞說陂塘處處多併工修築莫蹉跎十分積取盈堤水六月驕陽奈汝何田家拚取一春忙男力菑畬女課桑隴上黄雲機上雪暫時辛苦樂時長鞠育當如父母恩兄弟更合識卑尊孝心盡處通天地善行多時福子孫千金難買是鄉鄰恩意相歡即至親年若少時宜欲老家纔足後合憐貧健訟翻成産禍胎帶刀却是殺身媒争先好勝災偏速退步饒人福自來不教言語太艱深為要人人可諷吟把向田間歌㡬遍兒童也識使君心别湯升伯二十年前忝舊游論交今日始従頭我如潦盡寒潭水君似天空明月秋夜雨㡬時重話舊故山聞早共歸休臨岐贈别無他祝莫忘鄒陳為國憂送林自知自幕中歸常寧始吾與林子周旋大江東子方清且貧簞瓢屢云空勁氣凜不折耿耿如長虹明年擢髙科對䇿大明宫一尉遲五年出入無奴僮再見湘水濵凜凜復昔同招徠元戎幕汎緑依芙蓉小生敢相吏故人儻相従云何嵗未竟失去如霜鴻挽之不可留聊復少従容老我慵且鈍栽培欠深功子進未可量徳業方崇崇永懐昔君子和氣填心胷濓溪霽月朗伊水春風融至今想其人猶為起敬恭天資貴强矯學力無終窮我如石之頑遲子相磨礲子質雖玉瑩可廢他山攻鴈峰毋乆留來思靈麓峰司理弟之官岳陽相别於定王䑓悽然有感為賦五詩以餞其行定王百尺臺長安萬里目昔人思親心山川詎能局於焉共登臨使我增感觸微霜隕陔蘭悲風撼庭木銀山在何許白雲但空谷搔首重徘徊冥冥江樹緑念昔戲綵時歡娛共晨夕天風吹驚鴻一散不並翼相逢重湖南感歎復悽惻王事不可留去指重湖北層樓時悵望茫茫楚天碧數寄平安書老懐庶寛釋憶我将漕年適如子今日於焉四閏餘過眼風雨疾壮彊豈足恃進徳當汲汲永懷古之人聞道在四十我慙已過之因循悼前失子盍猛自鞭聖門本無柅心源本澄静皎月懸晴空利欲一汩之晶明變塵矇擾擾千蟯蚘攅攅萬銛鋒昏冥弗自覺乃與禽犢同一朝發深省妙理仍昭融要須大敵勇鈎援臨崇墉不見簞瓢人四勿收殊功先民不可見懐哉金玉音士雖一命㣲愛物宜存心矧兹圜扉内白日變重陰求情箠楚下寃哉詎能禁謼嘷漫弗省鬼神為悲吟子往􅊩其職朝夕惟欽欽誰刑勿留獄斯語真良箴詩寄淮西王路分壮哉貔虎三千士静掃鯨鯢百萬餘若使人人似淮右笑談真可静千廬兩宋名賢小集巻二百五十六
