body:
  text: 兩宋名賢小集巻二百十宋陳思編元陳世隆補性理吟下仁天地本來生物心先儒特指此為仁五行運轉功歸木四序周流氣属春一膜不通身且痺寸私未去道非純有能克己工夫到腔子中間惻隱真義理有當為道必為事皆審處得其宜富非以道窮寧忍身可成仁死莫辭取予截然分界限是非斷不謬毫釐要知此道觀元化天地凝霜肅殺時禮天澤初分禮已基三千三百特其儀分由父子君臣定恭豈聲音笑貎為理在人心隂有節民知天則犯無思聖門問目皆根柢四勿當先克己私知察慧為明類管窺此惟公是與公非事行無事烏乎鑿知極真知覺自微明德工夫由格物窮神知化可研幾始條理至終條理入聖優於聖域歸信有諸已者若為名道在㕘前與倚衡克是四端非外鑠確然一理與俱生五行主以中央土萬善歸於此意誠實理流通該造化天何言處四時行誠實理根源帝降裏渾然太極其胷中不思不勉聖而化則著則形天者融一性毫釐無矯揉兩間化有妙流通學知未造斯誠地主一工夫要擴充心虚靈知覺本無私物誘其間易轉移理義擴充無限量賢愚異向只毫釐精神收歛歸方寸功用彌綸極兩儀一念稍差微亦顯誰云暗室可容欺又此身有物宰其中虚徹靈臺萬境融歛自至微充則大寂然不動感而通五官本以思為主一竅須防慾外攻不睹不聞穹壤隔盍於謹獨上加功敬進德工夫那處㝷常惺惺地主吾心精神收歛天常在氣象森嚴帝寳臨文若在宫先致肅堯雖至聖尚能欽帝王心法皆由此學者須還用力深性此性凝於二五精天之命我本來純只因氣質分清濁遂使賢愚有等倫誠則踐形須盡力學能克己始為仁盡人盡物皆吾事本本元元祗一真情未發之時皆是性動而感物乃為情欲如可欲仁非逺思或妄思邪易生萬想不揺心正大四端既發善流行隄防意馬如防冦謹獨工夫要講明氣二五之精判混元厥初本體自純全配乎是道生乎義牿則皆人養則天平旦清明常不撓兩儀充塞浩無邊死生禍福誰能攝聽命於心即聖賢志方寸中間徹兩儀規模全在立心時希賢希聖惟吾過行帝行王視所之勇則竟成功易集懦而無立事難為始焉趨向尤當辨舜蹠其徒易背馳命賦予皆原造化功胡為定分杳難窮性根於我元無異氣稟之天有不同道在何須言壽天身修只合任窮通聖賢順受無非正義在當為命在中思方寸中間貫兩儀五官五事本於思憧憧合謹朋從戒亹亹無忘内省時理欲兩端分界限聖狂異向只毫釐思誠若達何思地不問生知與學知意萬事皆從有意生念頭纔起是根萌聖能毋我應先絶學欲正心須自誠百慮經營行此志一幾感發属乎情濓溪不去牕前草此意分明養得成樂紛華掃退性吾情外樂何如内樂真禮義悅心𠂻有得窮通安分道常伸曲肱自得宣尼趣陋巷何嫌顔子貧此意相關禽對語濓溪庭草一般春憂富貴何須分外求樂天知命本無憂事關職分思無曠德在吾身患不修流涕賈生深漢慮攅眉杜老為唐愁困心衡慮終無益療病還須藥必瘳剛鐵壁金城硬脊梁夜深劍氣凜寒芒三軍莫奪匹夫志九殞難摧壯士腸毅若參乎宜有勇慾如棖也豈為剛要須集義工夫到血氣何如志氣强柔温和如玉盎如春義禮薫蒸淑此身粹德常存鄉善士嘉猷巽入國良臣但推寛厚慈祥意肯作脂韋軟媚人張禹孔光何等習巧言令色鮮其仁中正體原從不倚生亭亭當當理分明帝王相授皆惟一夫婦雖愚可與行載在羲經惟二五寓諸麟史即權衡果能此道經斯世天地中間掌樣平權事物稱量易一偏權為善用乃為權一心酬酢中常主萬變縱横理自然不是反經求合道要非膠枉可調弦若將變化參乾道正氣流行四序遷幾萬事根源肇自微當知微者著之㡬安危理亂來除頃禍福機緘倚伏時智者未形先豫料常情已著鮮能知毫芒善利尤當辨舜蹠其徒易背馳道一太極中涵性分六君子者得心傳無形超出流形表不物從來有物先龍負龜屋開妙藴鳶飛魚躍㑹真詮經綸一息無斯道圓蓋方輿特塊然德此德根於此性真四端萬善足吾身出寧似舜天之合敬懋如湯日又新細行不矜圭有玷寸私無累玉其純雲行雨施乾元普宇宙中間物物春四德天德胚胎自渾淪乾分四者可名言元工肇始斯仁普亨道為通庶類蕃利則有華皆就實貞而無物本歸根流行四序周而始試貫其中是本源四端四者本無端可窺一機感發善隨之欲知本體胚胎處著在良心發見時情動始能覘朕兆性初元自有根基火然泉達充而廣此理生生無盡機格物一物中間一理存欲窮是理見須真川流不息應知道榖種能生始驗仁製錦可觀為邑者斲輪能悟讀書人此身有物先須格萬物從來備我身踐形肖貎均之造化功聖惟和順積諸躬聲而為律身為度目自能明耳自聡但見從容時中道何須蹈履上加功物皆各盡天然則一理純乎四體充皇極以極為中義未安示民標凖有相關萬殊本本源源地一理亭亭當當間棟木在中羣木拱辰星居所衆星環九章統㑹歸諸五千古箕疇彞訓頒忠恕内不自欺忠是體推而及物恕行焉人能勉此幾於道聖則純乎動以天探本窮源誠是主視人猶已理同然聖門一貫知誰㑹獨有參乎得正傳中和喜怒未形中固在發而中節乃為和粹然本自性情出舍此其如禮樂何正若固喬淪矯抗柔如光禹失依阿不偏不倚中庸訓理學工夫要琢磨隂陽形而下者謂之器天道無隂不佐陽動則羣生俱發育靜而萬物自歸藏雷方伏處潜歸地冰欲堅時自履霜但使陽明勝隂濁此身先自要平章變化流行造化杳難窺物有推移道不移草木春花秋實際獸禽孳尾氄毛時太虚􅕿息隂晴雨浮世駸㝷壯老衰本體尚存形跡異化焉形跡亦無之夜氣時當嚮晦寂無營是氣分明養得成收歛精神安夢寐流行旦晝亦清明五官泰定邪難入一室中虚善自生存得滿腔天理在從他鼻息響雷鳴謹獨一念根萌自隱微外無形跡可容窺跡雖未動機先動人不能知我自知顔燭夜燃防慾縱震金暮斥敢天期豈知為學求諸内不但幽居暗室時聖胸中何慮亦何思妙在從容中道時自是性之非力强純乎天者豈人為一私不累大而化萬境俱融生則知孰謂神明難遽造惟狂克念聖之基神聖固非人可得為至神尤更杳難知心功黙與天同運道化全無跡可窺隂闔陽開機孰使風行雷厲令如馳無方無體純乎易祸福昭昭自判時人心不是人心與道違先儒特謂此心危氣成形後有知識物誘我前易轉移理欲兩端分界限聖狂一念判毫釐若人無有天戕者物則依然具秉彞道心方寸中存無極真纎毫物慾外難侵至精至粹純乎理無智無愚有是心誠實本來消衆妄陽明原自絶羣隂帝王精一相傳法獨向危微妙處㝷明明德一真洞洞在中扃人不生知必學成克去已私無晦蝕還他本體自光明蕩除泥滓衆斯潔拂拭塵埃鏡乃清性分本來非外得斯明原自内中生止至善丘隅黄鳥咏綿蠻至道光明體艮山物與俱生皆有得德雖至大不踰閑敬仁盡乃君臣分慈孝嚴於父子間知止乃能安汝止明誠學力本相關君道制世非徒勢位尊克艱厥后止於仁九經統㑹先修已萬化綱維在得人政出中書權在我利捐内帑富藏民大公至正無私眤宇宙中間物物春相道金鼎調元贊化工此心端合與天同宗祊大計韓忠獻遐邇清名司馬公造化無私㕘衆論格君有道竭精忠綴衣趣馬皆吾屬不問宫中與府中師道瞶瞶誰開一性真要將斯道覺斯民明如虞舜先敷教聖若宣尼善誘人夜立伊川門外雪風生明道坐中春帝王亦有師承益廣厦羣儒日日新吏道仕非其義仕奚為一命當懐及物思清白居官皆可紀忠勤􅊩職敢求知理財有道唐劉晏用法持平漢釋之硬著脚跟行實地班資何必計崇卑求放心放渠雞犬欲求難内省何須用力艱出入不踰方寸地撡存尤只片時間當知本體皎然在不是良心去復還人患勿思思則得可容旦旦伐牛山絜矩物我由來縂一般四方八面要平看已如欲立人俱立民既相安我亦安異醴只如同體視彼心當即此心觀有能强恕工夫到不信推行是道難干祿顓孫為學太匆匆便欲邀求祿在躬勿向利名中著意曷於言行上加功常將闕處思疑殆毎把其餘慎始終寡悔寡尤牢記取自然有祿在其中兩宋名賢小集巻二百十
