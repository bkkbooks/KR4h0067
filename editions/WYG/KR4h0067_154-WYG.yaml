body:
  text: 兩宋名賢小集巻一百五十四宋陳思編元陳世隆補嘉禾百咏張堯同嘉興人有嘉禾百詠胥山馬革浮屍去君王太忍人此山空廟貌何以勸忠臣殳山丹竈功成後寥寥掩竹扉但聞蟬已脱不見鶴來歸滮湖四境田相接烟瀾自渺瀰客來吟此景無或比滮池鴛鴦湖東西兩湖水相並比鴛鴦湖裏鴛鴦鳥雙雙錦翼長長水古來名未滅人好水還清一讀髙僧疏塵勞悟此生谷水一作許尚詩短棹經行處風披藻荇香中宵孤鶴唳片月在滄浪天星河拍岸浮春渌菰蒲四逺生網羅人不到魚鳥亦忘情穆溪靜練明田外源流笠澤通不因逢嵗旱誰識濟時功韭溪終與雙溪接分流入郭來市橋人影合不解洗塵埃雙溪柔櫓聲相應名齊漢魏收可憐一溪水分作兩塘流秀水好景明於畫長浮五色波一竿吾欲釣來此聽漁歌白龍潭呼吸風雲合飛潛自有時只愁潭底淺頭角被人窺禦兒用此臨吳戰何人為越謀夫差曽不寤亡國始知羞范蠡湖少伯曽居此螺紋吐綵絲一奩秋鏡好猶可照西施梧桐涇落落梧桐樹何年作鳯鳴試看千古翠流盡一溪聲汾湖我是滄浪叟閒來繫釣艭如何一湖水半秀半吳江柘湖神居陰陽䕶尋國捍洪波莫慮蛟龍怒年來畏叱呵馬塘涇疑著風波惡民謡亦畏人築塘成堰後斬馬祭河神杉青堰舊吏家何在空尋古栁隄世情今亦爾莫笑買臣妻鳳凰洲竹秀水色淨忽來雙鳳凰岐周昔鳴瑞今復見文王龍舌頭一吸長川靜烟雲忽有無誰看頷底月誤欲探驪珠月壕入徑深於塢滄波近馬蹄毎尋蓮社友咫尺走東西靈光井玉甃祥光發難藏世上名定多慈䕶力一飲百疴輕幽瀾泉神女鍾靈處真堪療渴羌滿甖秋玉色一酌灑清凉檇李城螳螂方捕楚黄雀遽乗吳交怨終亡國君王到死愚射襄城此地連江海曽經古戰爭干戈今不見空有射襄名四城呉越爭雄日區區在用兵空餘爭戰地無處不高城何城報越心何壯貪齊計已輕忠言殊不聽何用築斯城由拳廢縣故城人不見擊劒淚空霑一絶悲聲逺今猶説孝廉嘉禾墩寂寞黄龍後紛然壠上碑廢興無處問空咏草離離古戰場自昔干戈地城空草自荒漁樵懷舊事何敢議興亡村門口昔日荒閒地今聞市井喧人情看促迫無復似當年宣公橋祗因裴少保功業敗垂成往往橋邊客今猶恨未平五栁橋為懷陶靖節無復見其人誰種橋邊栁猶含舊日春百步橋舊址依然在荒墟未百年還分一橋水流入幾家田跨塘橋路接張涇近塘連谷水長一聲清鶴唳片月在滄浪菩薩橋片雲初出岫南北自飛揚舊日橋邊路猶聞舄履香竹橋腰枕政亭北横斜古渡頭風吹雙淚落恨逐水東流河内亭掾死緣非命兒來哭未休舊時亭下淚疑與水長流嘉禾亭五馬來何暮經營指一彈石碑書近事留與後人看列岫亭吾州風物好惟是欠青山忽有洞庭色來從一笑間水心亭波光磨不盡鏡面絶纎塵照得紅亭子亭亭似美人樂郊亭竹下清風好時來挂幅巾待逢田叟問知是樂郊人㑹景亭有景道不出須來此水濱十分花鳥色團作一亭春南塢㟁回波曲曲城轉草層層忽見桃花落還知到武陵海棠亭蘚砌迎烟渚花開忽滿株春風吹爛漫如展蜀川圖白蓮沼滄波圍四面艷艷玉開花自可除簾幙清香不用遮桃花亭不待東風拆池塘已自春試看原上客猶恐是秦人紅薇逕漸放秋風晩花無爛漫香淺深紅似錦散影在滄浪茶溪茶林那復有零落付樵人舊日溪邊叟空悲二月春仙鶴亭杳杳雲間路重重隔翠林數聲清夜後來伴月邊吟芙蓉塘一發連千丈紅雲出素波秋風吹欲老無奈落花何白苧橋遍隴敷青綠桑麻共幾家滿城羅綺子應笑不栽花漁溆野水連天濶滄波引釣緡寄言溪上叟莫學直鈎人懷蘇亭猶使樽前客常懷沒後名好風吹逺籟如有笑歌聲披雲閣兹樓當勝地高望極崚嶒欲覩青天色還須上一層景龍樓千秋傳異綵百尺䕶雕䦨欲識金龍瑞丹霄試仰看烟雨樓妙手誰烘染梳烟沐雨姿一聲長笛晩人在倚樓時月波樓天濶氷壺淨溪平玉鑑寒巻簾看晩色鷗鳥並闌干真如院田家輕脱屣聊結淨人緣影外香燈寂清風百世傳雪峰庵一語合領悟師承豈在身戲言廬墓客未是報恩人景德禪院白毫光未滅勝事百年中好是傳燈地林泉有古風三墖石匱埋神物靈光照夜多龍歸天上後無復更風波學繡墖孤塔岧嶤立猶傳學繡人五湖如好在針線不勝春水陸院白晝重門寂蒼苔古殿深老僧香火罷松柏夜森森泗洲庵舊寺丘墟後重興嵗月賒莫將間禍福容易託僧伽雲門家舍滿篋藏鋒句家傳世幾何逺孫無悟解却笑葛藤多白蓮上方古屋深于洞門前種白蓮好尋當日社重結此生緣普濟院祗應曽布地往往化為魚一遇丁千騎禪人便結廬兜率寺昔年池滿地今見屋耽耽不結蓮花界龜魚死未甘姜庵不入紅塵市安居三十年至今庵下路芳草碧芊芊惠明堂地僻無人到松風鶴夢清一燈禪榻畔自向暗中明三過堂題詩三過此坡老昔時曽悟得成禪指來為打睡僧寂照庵寂滅跏趺地燈光照四時髙僧穿地脉此意少人知天慶觀寥陽龍已化華表鶴空悲欲問梁朝事惟應老檜知福順廟老屋無丹雘空堦只翠苔遶檐看箭鏃誰記赤眉來昌武廟祗因吳士季千載仰公神欲借驅痁術來臨刻木人楊姑廟孝德襄陵久天然與衆殊坐男不能養應合愧楊姑徐偃王廟王有岐夷德千年貌亦存我懷三刺史誰是後來孫曹使君祠一笑淮兵却功成未易論豈慚顔刺史詩酒在平原髙使君祠一暝移藩日邦人昔被恩步兵碑尚在功業敢經綸寥陽殿人歸天上去空識舊衣冠秘錄藏金匱清風滿殿寒霍將軍廟弼漢功非淺讒夫可奈何海神今亦畏安敢布風波讀書堆一作唐詢詩平林標大道曽是野王居往事將誰語凄凉六代餘簡齋詩老追唐句閒居築簡齋芙蓉寒浦外紅落感秋懷陳賢良隠居發策名猶在回頭事已非池塘春草緑空憶謝公歸徐長者園丹砂猶未就白髪忽成翁却有憐春意栽花向此中趙老園藏書幾萬巻歸老此林泉不為尋蓴鱠于公亦有賢施墓蒼苔侵壞道晩雀散空林莫問人賢否浮生一古今衞墓惆悵黎陽客飄流浙水濱定忘空腹恨知是赤心人劉伶墓荷鍤從吾後叮嚀死便埋人皆譏嗜酒我獨愛忘懷嚴忌墓有子如君少終緣叛國亡家前無後嗣切勿怨張湯朱買臣墓世事春風轉榮枯一夢間繡衣人不見孤冢舊家山周都官墓不識君名字應難問子孫一丘浮水際神怪欲誰論蘇小小墓泉下骨應朽幽魂獨未消㡬畨清夜月孤影度南橋羞墓傷哉負薪子五十始登朝空使埋羞處山花復採樵木紋觀音雙瞳分日月眉際一星懸照見人間苦三辰不在天邦藥王龕父老懷遺愛誰傳肘後方藥囊同日葬空憶紫元香淨相佳李地重因名果如分沆瀣漿傷心吳越戰未敢盡情嘗符姥瑞竹一幅霜縑外青青出自然天機何敢議珍重白衣仙兩宋名賢小集巻一百五十四
