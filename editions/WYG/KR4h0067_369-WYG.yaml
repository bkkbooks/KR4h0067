body:
  text: 兩宋名賢小集巻三百六十九宋陳思編元陳世隆補雪磯叢稿四呈姚雪篷使君祝融應自勝崆峒且讀通書辨聖功事可語人甘受謗詩能名世不嫌窮春邊采藥收湘􅉅月下調弦送楚鴻頼有行人碑尚在棠隂依舊戀東風雪篷見示送趙東嵓詩皇華歌徹酒杯忙澤畔騷翁送范滂琴帶衡雲弦索潤馬飡湘芷轡丝香山中貍豹隨吟斾部内豺狼入按章却笑詩寒吟骨聳愁㸔酬唱挾風霜書蕭千嵒集向來楊陸共崢嶸吟到亭邉趣轉精古似洞庭張雅樂嚴如即墨斂殘兵茵陳終不肥方朔芣苢何堪病冉耕細讀殘編搔白首未應造物忌詩名滕王閣下賦越􅞤蜀艇亂相偎風飽千帆帶雨開閣上鳴鸞今已往江頭飛鶩只堪哀栁汀絮滿河豚賤桃塢花殘石首來應接溪山吾不暇自憐白髪欠詩才宿金灘瀧吏崖翁是賞音江流泯泯對秋吟天蝦撲火檣帆晚水狗捎魚島嶼深千里庭闈雲滿眼十年湖海雁驚心今宵客枕清如許穩讀西山夜氣箴寄許介之贏得詩名遍九州酒徒棋畔半公侯離騷甘隱魚鱗屋樂府多傳鸛鵲樓醉葉幾窠藏菊徑蠧荷三畆護漁舟中原應有樓蘭國空鎖吳鈎到白頭聞邊報寄姚雪篷淮烽蜀燧照邊隅白髪憂時我腐儒楚客汀洲搴杜若齊王沮澤索柴胡耽吟自愛南游好久謫曽謀北事無擬對祝融捫蝨語何時重捋使君鬚寄戴石屏曽到元郎吟處吟雪篷烟艇久相尋鳯鳴道國空詩句雁到衡峯只信音拾橡祠邊寒聴雨紉蘭院裏夜分衾蹇驢倘遂黄花約鴉觜敲烟共掘參戊戌冬僕客桂林雪中趙叔愚司理書張司業逢賈島絶句為寄今冬對雪感而有作朔風桂水浸瓊沙曽共騷翁理釣槎對客又吟瑞木缺論詩還憶欵冬花饑能驅我瓶儲罄老不饒人鏡影華擬喚扁舟尋剡叟嶺梅瀟菊各天涯寄仙巢先生鍾尚書吹香亭上送飛鴻且把行藏寄蜀桐老境只須尋逺志世途還要避沙蟲公行天地初何憾道在丘園固未窮曽是轅門投巻客應憐聴雪卧蕯藭寄蕭太山兄弟梅花好處共心期曽擷天葩寄夢思兄弟自為千古計江湖方誦二蕭詩貪泉定喜逢亷吏倭國何須拜老師蕭頴士事賸擬尋君攀桂樹路途誰肯借驢騎送丁少卿自桂帥移鎮西蜀瓊海收邊玉帳閒又移齋艦泝浯灣三邊形勢全憑蜀四路封疆半是山魏將舊聞侵劍閣漢兵今欲巻函關細傾瑞霧論西事想在元戎指畫間訾家洲竹塢松灣遍履痕斷碑無首野苔昏江山應識前賢事賢哲今存幾世孫島霧海霞留古意春猿秋鶴冷騷魂何人㑹得登臨意閒嚼梅花伴酒樽次韻李監丞同劉玉淵遊七泉世變如流水前喆嗟逝川良牧隆化本訪古漫叟泉念茲名泉意感彼末路偏淵竇與嵌臼杖屨聊回旋不識漫叟心曷誦漫叟篇惻念軫蒼氓溥澤同一天蟻聚與羔跪命義當亦堅回邪乃敗徳毋以已欲專夸士五鼎辱穹爵或自鐫臨流嘆澆風薄言傾酒船浸泉旌我志凍泉存舊傳潓漶涍汸淔銘石昭萬年無缺感發人黜彼敲墨氊歲月亦云乆古跡埋塵烟泉根石巳泐泉上樹欲仙森㦸呼虎士誰能聴潺湲理義著古今貴賤俱荒阡今公七泉㳺陵谷尚未遷勵俗振古道及兹誦惡圓劉侯同襟期賡倡揮彩椽漫叟或有知騎鯨躍層淵彼哉賊君父圓曲工求權厲民恣屠斮巧宦勤攀縁安得激七泉布作化雨宣送絅齋李監丞赴湖南提舉吏統久已紊使選非易為蝎虺何蓁蓁鴻雁何纍纍持節豈不多曠職茍所私緬懐紫陽翁昔使東浙湄陳臬糾官邪揚仁蘓民疲兹道有後先哲儒昭令規絅齋寄瀟牧徳懋灼帝知勵亷肅寮宷反稅驩鄉耆所學藴淵道寛嚴權理冝兹總全楚境歌此皇華詩位穹民言邈壤廣吏螙滋問俗職所重簡僚乃政基視聴貴逺周細㣲在可遺攬轡戒前路豈為好爵縻揆予忝英盼懐徳念别離别離夫何念康濟乃所期懿兹逺大業肇此咨度時朂哉振英采慰我湘民思秋夜感懐溽露沾灌莽華月流髙旻吟笑嘉此夜撫化悲蕭辰蕭辰何所悲逰子多苦辛道窮年力謝業遙壯志湮𤣥鬢日以變豐景豈遂淪堪輿一大宅羲娥為旅人卉木互榮落蛩蟀何吟呻氣隨稚髦變理勝䘏喜均反性樂天爵測化葆道真撫巻慨往哲芳猷藐難親術士醴陵丁夢榮將之舂陵有贈㸔盡槐花買卜人窊樽且認舊碑文只今世上無清惠却恐元郎解笑君緑水池邊舊釣磯何時歸去濯征衣千年城郭應無恙祗怕風塵老令威送歐陽平仲起鬰林教官快把詩書洗瘴茅雕題墨齒盡同胞天涯那得隨衿佩試借叔堂講義鈔古來節婦比忠臣怊悵明珠一窖塵千古綱常君記取題詩煩問墜樓人萍鄉和王堯章韻征衲無人補舊綿蕭條客枕楚萍邊撥殘石炭西窗冷却憶山家榾柮烟慈氏閣崢嶸梵閣碍銀潢且對畦衣問馬王落日斷霞連楚粤缺鐘壊像雜梁唐英豪已往雄圖歇棟字猶存古意荒惆悵石湖題柱在倚欄無句獨悽凉雉山寺宋永初中有僧西顒誦法華經於此白雉聴之而化至唐黄梅五祖弟子喜登告祖乞巡禮五祖應以遇雉即止後至此開山本朝王初寮有留題蘚碑蘿石擁嵓扃獨倚笻枝問大乗白雉苦無千歲種有山空識六朝僧詩傳北岳刋新帖禪接西淮冷舊燈擬鑿氷泓澆凍研禊亭閒借法華謄擬逰長沙至零陵忽動歸興擬尋禹柏過長沙且泊愚溪問酒家歲旱何能飛石燕秋髙還看落天蝦乾坤納納催霜鬢歧路悠悠又菊花惆悵草黄騏驥病歸心依舊繞烟霞袁家渇泊舟往事誰能問水濵停橈仍是薄西曛樵漁空自存袁姓鳬雁何應識栁文釣艇分燈歸客艇嶺雲拖雨接溪雲楩櫚蘭芷今何在空使行人誤舊聞小㰕袁家窠竹居買酒江遶衡門接旅津鯉魚風歇水潾潾湘醨三盞澆吟思瀟碧千竿對老身題壁未能行客醉典琴不用主人貧隔江誰掉扁舟去滿載鸕鷀捉錦鱗餞雲􅊤唐使君赴邕州篻簩竹畔擁雙旌回首江蘺隔楚汀曽向前賢參學問且教逺俗識儀刑安南兵息烽烟冷羅殿馬來蠻草青悵望鈴齋何處是遙瞻朱雀認詩星歸侍石田茅屋野苔春喜對庭闈話苦辛客路本無如意事瘴鄉惟有蚤回身且尋農耒耕湘雨待看天戈洗戰塵門外黄旗邊餉急可憐杯酒各傷神寄吳茂逺蘓公堤畔繫吟驢知在垂楊第幾株學校文章如畫餅朝廷官爵似呼盧春吟應欠梅花在時事曽言楮幣無惆悵湘湄分袂處今看細雨長蘼蕪送史主簿之鄂就辟囊中秋巻逼唐賢門外侯芭問太𤣥才大豈堪栖枳棘官清應只友蘭荃湘行又泛君山月淮績曽衝赤壁烟擬借從君新句看試尋黄帽寄綱船宦途捷徑在三邊且駐吟船贈馬鞭壯士苦無横槊志將軍還用撒花錢韃兵猶未回燕鴨蜀耗何應問杜鵑今日送君無别話㸔隨郤縠洗狼烟送邵𤓰坡試湖南漕舉槐花匝路促湘行閩賦唐詩舊擅聲有志向曽言國事論心何止在科名畢方夜煽杭都火大角秋纒蜀道兵莫教腐儒塲屋話琅玕滿腹正須呈送李公裕逰臨武嶺梅瀟菊兩關情歲晚江湖載酒行客路欲依嚴挺子瘴鄉已老少游兄瓦盆且話田家事肉食誰通鈍漢名惆悵韓張亭畔路雪鞭風帽又東征贈江華熊伯岩堂萱營栁伴吟哦黄綬仙翁鬢未皤對客不矜名第貴論心唯在簡編多江頭魴鯉香晨膳境内鴟梟冷夜窠湘國詩盟人寂寞衰頺猶喜識隂何江華送熊清父遊廣州時予有衡陽之役邂逅陽華且酒壺海鵬衡雁各征途閒身俱被饑寒役老境還堪離别無鄉夢定應思欵段客吟何用説娵隅曽從仙叟參𤣥訣好訪安期采澗蒲喜李景魏就熊岩伯縣尉招長歌白石艸廬深今抱園絲就賞音温飽不為兒輩計行藏端見古人心鱣魚堂上春開帳鸂鶒灘前夜對衾擬挂奚囊梅下聴謫仙應共隱仙吟送友人之辰州覲省跕鳶巢畔瘴雲低山徑如梯去馬遲正則自吟皇樹頌廣㣲惟誦白華詩春風採藥桃花國落日尋碑薏苡祠覔得丹砂能寄否溪亭送客鬢毛衰夢訪劉漫塘魯雪巢二先生前輩風流歇江湖欠賞音向期行古道誰復識予心月浸金壇冷雲歸玉笥深瀟湘風雨夜客夢得相尋青湘逢廷對人歸因問時事南客帝郷歸青袍照緑髭問知當世事解誦聖君詩淮蜀軍書急襄樊邸報遲空傳廷試䇿韋布說邊陲南林寺律院僧應俗庭荒草木刪無碑堪攷古有客自看山竹好惟嫌宻雲多不自閒小溪知最近童浴夜方還兩宋名賢小集巻三百六十九
