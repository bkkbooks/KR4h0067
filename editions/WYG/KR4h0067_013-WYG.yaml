body:
  text: 兩宋名賢小集巻十三宋陳思編元陳世隆補寇萊公集早秋二絶年光苒苒暗推移坐惜流年感舊期獨聽早蟬秋色裡潘安初見二毛時一聴早蟬响坐悲芳嵗闌新秋空索寞前事但心酸秋日武闗道中行塵漠漠起西風來往征軒似轉蓬駐馬幾多愁思苦亂蟬衰栁武闗中早春日暖經水泮潜回律管春初驚栁色重漸見草茅新罇酒留懽少雲溪入夢頻惟應五侯地行樂及芳晨書山館壁秋作西南使千林覆去程四時無日影終夜有猿聲路入雲溪過人穿鳥道行不堪孤驛望風雨動鄉情送趙主簿之任惠安蕭蕭征騎立長亭遥指天涯萬里程尊酒欲闌人欲别夕陽絲管盡離聲秋氣凜然庭木將墜道謙上人有南征之役賦詩祖行洪府多佳致師今欲此行寒山連楚逺白浪浸吳平烟雨經秋迥霜鴻入夜鳴到時春未暮閒聴鷓鴣聲酒醉勝逰惟晏是良圖何必凄凄獨向隅深院酒醒春日晩只聞芳樹語提壺南陽春日水滿池塘花遶城日斜南陌暖風輕千門栁色春烟淡獨依髙樓聞暮鶯春日長安故宛有懐唐室空城有舊基荒凉長使後人悲遥村日暖花空發廢苑春深栁自垂事著簡編猶可念景隨陵谷更何疑入梁朝士無多在誰向秋風詠黍離送人逰邉逺行當嵗暮水繞路難分疋馬陽闗外邉聲落日聞惜花深謝暖風傳馥郁長憂夜雨暗催殘黄昏欲放笙歌散更遶朱欄仔細看㣲凉髙梧深宻間幽篁乳燕聲稀夏日長獨坐水亭風滿袖世間清景是㣲凉帝城秋壁登臨秋向盡千里見王畿過雨山逾翠經霜菊漸稀平原夕靄起髙樹宿禽歸一望闗河道空令詠式㣲禁中偶書所懐呈内翰同年同院二學士朝回内省中黙坐對西風秋色澄寒沼朝陽上古桐龍墀慚近侍魚浦憶疎蓬㑹待酬恩了烟蓑伴釣翁新秋孤吟遶桐砌時莭又西風悵望新秋在歡娱往事空栁條㣲减翠蓼穗已飄紅正是多傷感仍將别恨中春書年長追逰興漸凋况兼巴峽景蕭蕭閒齋為謝楊花到時拂殘書慰寂寥秋日晩晴池上作雨歇南山積翠明淡雲消盡逺天晴漪漣不動秋塘静獨拄寒笻遶岸行夏日離心杳杳思遲遲深院無人栁自垂日暮長廊聞燕語春寒㣲雨麥秋時留題郡樓千里闗河一望閒登臨長到夕陽還欲驅征斾歸朝去更倚髙樓看暮山青州西樓雨中閑坐海上秋添寂寞清萬家烟樹暝重城蕭蕭細雨遥天暮獨向空樓聞笛聲中書秋日有懐青社舊逰因書一首掖垣秋色生雞樹忽憶青丘感舊情曽倚西樓吟暮雨數峯寒碧遶髙城贈寶上人重城蕭寺雖留滯野鶴由來性本閒寒磬終宵鳴竹院虚忩盡日對秋山旋移恠石資吟賞應有孤雲共往還自笑紅塵成底事幽期長是負松闗雨夜許氏第㑹宿各賦四韵雨夜銷煩暑林塘向夕幽庭虚惟欠月冷樹欲生秋河北嗟新别樽前念舊逰若非逢勝㑹何以解離憂水閣夜望書懐水閣中宵動寥寥起逺思秋風生折葦星彩動清漪白社孤前約青雲少舊知苦吟空自嘆風雅道猶疑離京作致君才業本無能懸闕情懐老不勝欲過龍津重回首朣朧初上月觚􅀈洛陽道中感懐文陛初辭咫尺顔思深猶綴補臣班漢庭舊友彫零盡獨擁雙旌入武闗初到長安書懐荐承丹詔撫彫殘適值年豐萬井安舊職尚兼黄閣貴前驅新擁碧幢寒静憐風竹經宵聽老愛山雲盡日看魂夢不知闗塞外有時猶得到金鑾逰花岩寺寺對南山積翠濃水村鷗鷺下遥空層樓望盡樊川景恨不凭欄烟雨中寄京兆向相公九萬鵬霄振翼時與君同折月中枝試思淳化持衡者得到如今更有誰和向相公見寄玉殿登科四十年當時交一作僚友盡英賢嵗寒惟有君兼我頭白猶持将相權送轉運梅學士進邉郡四首悵飲惜離羣窮邉去路分雪深山館夜孤雁背燈聞絶塞程方逺窮隂嵗欲殘石城歸梦斷隴月照人寒水逺沉來信山長叠去愁夜深闗月白休凭驛邉樓夙駕巡邉徼歸程隔亂山長安草木麗春苑待君還春晝偶書白晝偶成芳艸夢起來幽興有誰知風簾不動黄鸝語坐見庭花日影移秋夜懐歸渭水苔磯阻舊逰梦回空館却凝愁一聲江笛巴雲暝半夜山風楚橘秋星落古池孤影動燈遥疎壁冷光幽遲明不寐空搔首蹤跡何由得狎鷗憶洛陽金谷春來栁自黄曉烟晴日映宫牆不堪花下聽歌處却向長安憶洛陽古歌云金谷園中栁春來似舞腰誰堪風景好獨上洛陽橋長安春望感懐灞岸春波逺秦州暮雨㣲凭髙正愁絶烟樹更斜暉春晝午畫花隂静春風數蝶飛坐來生逺思深院燕初歸岐下秋書碧樹㣲凉露氣清感愁懐舊獨含情西樓月下明如水只欠桓伊一笛聲憶岐下小池長憶西園清夜景酒闌無伴獨臨池可憐隴月三更白誰見紅蕖露滴時岐下西園秋日書事務簡羣吏散披襟幽興長松筠經晚莭蘭菊有清香水净澄秋色山髙見夕陽身閒心自泰何必濯滄浪秋懐輕雲不動日㣲隂髙樹無風秋色深獨聼暮蟬臨水坐十年林壑阻歸心秋自古名髙衆毁歸只應身退是知幾林風驚斷西忩夢一夜秋聲憶翠㣲冬日北齋寒風颯䬃響庭槐愛日明忩生北齋閒憶故山歸未得舊逰時展認雲崖秋齋霽景有誰同逺望秋懷無奈只悲歌雲收逺嶠凝嵐翠雨歇空庭敗葉多洛陽有懐岐山舊逰緑鬢年來已漸彫舊逰芳草路迢迢山横逺翠疑歌黛栁拂輕梢認舞腰秦甸夢回空有恨洛城吟㫁獨無憀斜陽更上髙樓望但覺離情一倍饒憶岐下舊逰二年岐下假諸侯事簡民安選勝逰花寺水村時駐馬暮天秋雪獨登樓静眠鈴閣聞羌笛閒酌松醪引越甌别後幾回空有恨葉飛蟬噪動離愁無題金甲珠襦鏁繡扄杜城殘月塟娥英春風侯館花如雪空有鶯傳度曲聲秋日登後樓逺山重叠故闗遥公退乘閒上麗譙今日登臨秋思苦雨荷風葉共蕭蕭早春星紀周天運㣲陽氣侯新郊原初度臘梅栁暗驚春故國無書久孤峯入夢頻年加自多感况復送歸人南陽夏日緑楊隂宻覆回廊深院垂簾晝景長人静獨聞幽鳥語風來時有異花香世間寵辱皆嘗遍身外聲名豈足量聞讀南華真味理片心惟有許䝉莊夏日書懐庭樹隂隂夏景遲閒房愁對暮簾垂因思往嵗陪天仗正是瑶池賜宴時兩宋名賢小集巻十三
