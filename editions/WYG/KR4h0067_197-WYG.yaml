body:
  text: 兩宋名賢小集巻一百九十七宋陳思編元陳世隆補林泉結契二王質水友辭鴛鴦身麻褐雜花㸃如鴨而小稍長夜傍灘岸雌雄交頸即成睡賦性好思鴛鴦鴛鴦一雌一雄春水鄉惟爾所思在何方葡萄顔色桃花香溪南岸溪北岸且住中流莫相伴嗚呼此友兮堪同調煙淨波明影可照鸂􅈃身雜色雌者白毛間黒花如鴨而小尾有毛如船柁夜停巖穴深棲聲清急鸂􅈃鸂􅈑水花蕭踈並花立夜倚巖穴眠野香平穏溪山忘崒嵂春水温秋水寒欹岸側島隂巒巒嗚呼此友兮常相參虚舟横渡人搴帘翡翠兒身粉青背上一縷濃翠觜紅腹白如飛流黄而大小者為翠碧巢先極髙後寖低恐墮其雛翡翠兒翡翠兒幽林淨緑深依歸浮澗凝風香不動翻身一擲碎花飛總無矰總無弋波上沉浮沙上立嗚呼此友兮宜相從晚瀨榜人收水功鷺鷥身全白頂上數縷纎毛如絲嘴足皆黒頸細長寡鳴將宿則多繁聲一種此鷺鷥稍大觜足皆黄標格差低鷺鷥鷺鷥三花兩花乾雪飛荷花淨紅葉淨碧輕來輕去掠寒霏或孤翔或旅立落日横波孤影直嗚呼此友兮彌相敦水衰石老秋容深江鷗身全白觜足皆紅眉黒飛如鷂立如鴿聲㣲緩而清捕魚頗迅於鷺江鷗江鷗茫茫萬波同一湫菰雨蒲風不自由浮世浮生爾更浮一寸白二寸白啄碎波紋聲㶁㶁嗚呼此友兮堪相邀石村沙市江煙遥青樁身青如鵞頸足皆長眉黒腹白觜紅聲差烈而不清亦不迅捷故得樁名青樁青樁樁樁孤影横清江上磯下磯入江腹斜碕亂磧聲淙淙有如癡還不癡波動魚行皎皎知嗚呼此友兮喜同規渚蒲水荇秋風稀野鴨兒身麻褐間斑花如鴨而小亦與鴨同聲雄者頂翅㣲綠寒則聚他時稍稀野鴨兒野鴨兒長蘆短葦風披披不寒不煖天與睡睡足撲漉横斜飛飛劃劃鳴婉婉菰蒲澎浡花欲晚嗚呼此友兮奚可䦨斷岸欹樹連深山紅鶴身白如雞而大背上一路深褐自頭至尾不斷觜足皆黒觜㣲彎而長飛則色紅立則色白紅鶴紅鶴東江飛度西江泊蕭蕭晚煙和夜霜寒魚沉波不可啄轉松根轉松梢孤聲不停魂夢揺嗚呼此友兮宜求與江天能復心相許鸕鷀身全黒眉白如鴨而頸極長能入水捕魚夜則棲林又號水老鴉卵生誤傳口吐鸕鷀鸕鷀江煙渺渺波瀰瀰掠空欲下不肯下投深未飛俄急飛碧中食青中眠風吹亂聲譁滿川嗚呼此友兮良可嘉髙紅低紫無乾花魚鷹身全黒觜足皆黄如鵞而小空中視波間甚的捷於他禽聲清烈魚鷹魚鷹江空谷空同一聲風浪衝磯磯擦過波沸安能遮眼明忽飛上忽飛下碎玉横斜口中掛嗚呼此友兮不厭多看看桑田生白波淘河身蒼白觜足皆黒如青樁而大頥下有嚢如拳可貯水極䕶其觜淺深能令水涸魚露故號淘河又號洿澤淘河淘河江文綷䌨揺江莎岸邊岩石相蕩摩異音同流烝渉波東在梁西在梁繅風織霧無斜陽嗚呼此友兮相與永島影忽翻水聲併鵁鶄身淡青如鴨而足甚髙故其行輕頂有冠多毛白細而長於樹椏生雛稍長則銜其翅而學飛鵁鶄鵁鶄嗢咽秋水騷秋聲石樹􅋾􅋾崖岸傾踏蘋蹴藻輕輕行哺兒饑誨兒痴淋滲䙰褷相挾飛嗚呼此友兮常相存溪子通知魚鳥心魚姑身白間黒花觜足皆黒而長如啄木傍淺水啄細鱗多棲蘆葦間聲焦急魚姑魚姑溪南溪北遥相呼煙深霧重棲不定荒荒秋漢秋星疎要姑活怕姑死姑且閒飛歇深沚嗚呼此友兮真足稱草平樹安波不興魚燕子身全黒腹麻花如燕而加俊聲清急並岸低飛捕小魚最捷魚燕子魚燕子堇飴不下銀花觜荷香芰香溪清泠刷翰啑喋全無腥蒲槌黄菰臺黒波痕蕩揺渚花蝕嗚呼此友兮能相寛天生水資歡水賢水鶯子身灰褐間白斑花色如鴨而小不能入水沿岸啄魚蝦聲細急水鶯子水鶯子不愛林花愛溪水春岸春莎翕習飛波動鬛揺翻身墜䈒入淺罩入深東渚抛綸西拗罾嗚呼此友兮良相宜水光樹光韜暗輝魚烏子身全黒如鴉觜足皆黄晝傍水啄魚夜鳴雌雄相應如云鳴䀨魚烏子魚烏子相喚相挨撥風葦春莎滲子漸成鱗的皪眼光入波底唼草芽啑楊花勃勃春沫吹春莎嗚呼此友兮宜接跡溪氣溪香午猶濕科斗兒身黒頭濶尾銳初邏藍成包藉物寄之多淺瀦暗草發蟄則叢聒漸變為活東又變為蝦蟇其形始全科斗兒科斗兒移移聿聿成攅嬉軟温春水調春宜􅏐深􅏐淺隨髙低傍春草栖春石莫向空中亂澄碧嗚呼此友兮良可觀羽葆鼓吹春風前水鵶鵲身間黒白似鵲而小尾長多巢軟荷育雛則寄菱葉弱弗長者寄搭水荷或暫立少久存聲如鵶而清婉水鵶鵲水鵶鵲軟荷搭水身可泊髙荷修莖難著脚一盤一窩足安樂竈有薪甑有飯蘆人漁子事皆辦嗚呼此友兮宜相依溪風初定水香歸寐卑子身麻褐似鴨而小入水捕魚良捷且能久聲如野鴨多穴桑為巢寐卑子寐卑子春菰秋蒲老煙水一銀飛上一銀飛斜景淨空光陸離戀桃花戀麥黄𤓰蔓荻苖皆故鄉嗚呼此友兮宜同方江風吹子魚花香兩宋名賢小集巻一百九十七
