body:
  text: 兩宋名賢小集巻三百七十九宋陳思編元陳世隆補瑞州小集陳失名東甌人字號行履無考山居白雲䕶危屋遥隔世人家野逕不多竹幽蘭自作花敝衣僧說法枯葉樹成槎門外禽相狎雙雙浴晚沙湘靈鼓瑟蒼梧雲杳杳湘浦月沈沈誰將竹間淚彈成絲上音如怨復如訴可聽不可尋乃知二帝子尚懷千載心君臣等天地死生空古今貧居秋風山木飛秋日獨行時身共衣冠老妻嫌富貴遲自分澆菊水閒寫咏貧詩此意不可說夜牕明月知江心寺誰把袈裟築半峯倚雲樓閣打天鐘東西塔上自分嶼風雨聲中忽見龍隔岸愁吹孤戍角歸鴉寒立夕陽松舊時行殿成荒土烟草萋萋暝色重閩嶠軍中翠華齊擁霍嫖姚却向青山說豹韜兵馬夜行殘月下弓旌寒響朔風髙壺漿故老愁啼血野飯將軍猛茹毛自笑書生隨玉帳也腰刀劍束征袍秋興禾黍離離雨滿村望中兵火幾家存荒城半是征人骨秋月偏驚旅客魂豈意戰塵臨老見不知心事向誰論抱茒蓋得青山屋多種桃花映酒樽王宗起城南溪屋水上小亭清更新綠隂紈扇白綸巾豈無修竹娯佳客却有清風來故人老樹秋聲涼入骨澄江波影玉生鱗讀書偏愛虚牕靜不管門前庾亮塵泉南滿歸過省下呈友人二月泉南驛騎回亂離懷抱為君開雙鳬暫假王喬力百里空淹蔣琬才省幙薇隂遮案靜溪船山色入樓來應知别後遥相憶清夜吹簫月滿臺訪陳彦太不遇每憶可人陳太丘不辭山路逺追遊清霜拂鬢雞聲早白鶴横江月影浮豈為開樽無北海虚聞懸榻待南州題詩興盡空歸去回首梅花百尺樓九日次王善夫韻道路多荆棘塵埃滿客衣西風九日至徃事百年非王粲思何切馮驩嘆未歸只因江漢逺却使雁鴻稀小景山迥雲垂野江空水接天西風陶令宅落日季鷹船愁緒丹心外歸心白雁前如何倦遊客猶是未歸年宋奥寄友落日猶未落青山還自青鳥飛雲外見泉過竹邉聽童子求新汲先生守舊扃相看不相見應註太𤣥經病中聞歌有感伏枕巳三月清明節巳過光隂流水去風雨落花多病久難禁酒愁深懶聽歌門前舟楫動無奈客懷何趙仲瑜小景逺水望不極斷雲低復連青山秋樹屋野渡夕陽船幽思滄洲上歸心白雁前異鄉非隠地聊欲寄林泉老樹依巖壑危橋隔逺村桃花春滿岸雲氣曉當門白鳥來書屋青山落酒樽漁舟忽相過疑是武陵源官舍有感臘近衣方授山深寒愈嚴病將書巻廢愁伏酒杯添故里風塵隔微官嵗月淹思歸歸未得低首愧陶潛王生小景何處佳山水依稀類輞川春風摩詰畫夜月剡溪船雲樹鄉心外鶯花客淚邉不嫌茒屋小應喜是歸年秋夜風雨次韻獨卧苦不寐燈殘知夜深青氊猶是客白髪最闗心遶屋鳥三匝隔江龍一吟誰家催寄逺孤淚滴清砧中秋客邸感懷今夜天邉月誰期海上看家山雖間隔兒女暫團欒露重銀蟾濕風清玉宇寒年年長是客强把一樽歡偶成滑滑春泥塞路途漫漫新水漲江湖出門世路皆行險只好山林聽鷓鴣南山作雨北山雲野哭村歌處處聞淮岱十年多盜賊誰知一半是官軍城南春深草亂飛門前流水沒漁磯百年此地踏青客今嵗從軍猶未歸回回僧秋風響耳環古恠聚人看赤脚行霜地腥身禮月壇儋齋猶買肉掛帛不遮寒亦有西來意相逢欲語難羅浮山在江心寺後世傳秦時浮海而至乾坤未失鹿滄海欲飛灰人已逃時去山猶擇地來寒流清有影恠木老非梅西有龍翔寺禪門徹夜開夜歸青松行未盡林外一鐘聞小雨不傷月西風忽破雲棹歸秋水逺隣語夜燈分稚子能無寐空齋讀古文兩宋名賢小集巻三百七十九
