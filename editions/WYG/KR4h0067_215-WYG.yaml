body:
  text: 兩宋名賢小集巻二百十五宋陳思編元陳世隆補慈湖小集楊簡字敬仲慈溪人乾道五年進士寧宗朝累官將作少監出知温州以寳謨閣學士致仕卒諡文元學者稱慈湖先生有慈湖甲稾撫琴行蕭蕭指下生秋風淅淅幽響颼寒空月明夜氣清人骨何處仙風搖丁東野鶴驚起舞流水咽復鳴一唱三嘆意未己幽幽話出太古情龍吟虎嘯遞神怪千山萬壑風雨晦海濤振盪林木響亂撒金盤氷雹碎和風回春陽縹緲孤鸞翔三江五湖烟水濶波聲飋飋鳴漁榔悲猿臨澗欲渡不敢渡但聞澗底一作下蕭瑟松風長閒雲曳碧落勢去還迴薄神仙恍惚無定所微吟似欲止所作馭風一笑歸蓬瀛猶有餘音遶寥廓送張大著出守衡陽濟濟衆賢俱徐徐五馬驅中司親雁序南岳佩魚符吳楚從今異參辰幸小殊他時羣玉聚相與話踟蹰淨土院擊竹軒在富陽縣我對此君無一事自言幽處直千金古人今己成陳迹猶向當年擊處尋進月堂在富陽縣洪氏浴堂院我有一輪月不圓又不缺更無晝與夜光耀常洞徹縱有茅屋遮亦莫知間絶持此以為燭難作進退説石魚樓多謝天公意己勤四時換景示吾人碧桃紅杏分明了緑艾紅榴㳄第陳秋㕍聲中休鹵莽雪梅枝上莫因循機關踏著元非彼正是吾家固有身箇裡包坤彼括乾精神微動便紛然桃紅栁緑春無迹魚躍鳶飛妙不傳麥浪豈縁風衮衮荷珠不為露涓涓分明是了何言否此事難容鄭氏箋遊樂平明巖西風吹作明巖去石屋高虛滴如乳是誰不是洞中仙無人自信吾為主偶成春入園林種種竒化工施巧太精微山禽説我胸中事烟柳藏他物外機既遣杏桃呈示了又令蜂蝶近前飛如何有眼無人見只解西郊看落暉腳踏和風歩歩春石魚樓上等閒人興來衝口都成句眼去遊山不動塵李白誰知他意思桃紅漏洩我精神忽逢借問難酬對只恐流鶯説得真風雲雨雪自何來我有乾元大矣哉萬景出竒供杖履羣峯環翠供樓臺興來吟咏誰裁剪飯罷遊行自徃回信口道來俱妙義教人尋訪幾枝梅我吟詩處鶯啼處我起行時蝶舞時踏著此機何所似陶然如醉乆如癡兩宋名賢小集巻二百十五
