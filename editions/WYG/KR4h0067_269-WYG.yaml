body:
  text: 兩宋名賢小集卷二百六十九宋陳思編元陳世隆補雪坡小藁二羅與之書感設險重門未足憑民心應自有長城朝廷休戚視田野宗社存亡非甲兵氣實精神寧敝竭本枯枝葉可敷榮古人經理先觀勢兩臂于韓孰重輕蛾眉亭悠悠飛鷺滿汀洲極目蛾眉最上頭對此江山還有月知他世界盡無秋情懐杜老鄜州夜景物坡仙赤壁遊長嘯劃然空谷應風生浪湧不容留動後莫作楊朱泣路岐此心自被利名移車奔寧是駕尼父舟覆應非載伯夷出説難悔吝從來生後日嘯歌元秪在閒時可憐秦晉功成者欲避危機已太遲文到簡編香外雨孤翻翰墨場中春日暄文到工時疑有助道逢極處本無言當年誰可輩任昉後世人方怪屈原勿謂詞章真小技精粗微妙豈殊根臨流習習涼颸起素波臨流解帶小婆娑秋光已共蘆花老夜雨那勝落葉多不覺儒酸同糾纏極知妄想盡消磨笈中班史猶堪質肯作商聲甯戚歌鳳皇臺間眺臺前瞰軍壘有感而賦秋風攜野客杖履鳳皇臺忍見貔貅戌更聞鴻雁來時方憂大厦世豈乏良材何日覽輝至龍文載九垓為言日薄寒濃春意微花鬚栁眼尚依稀為言羯鼓休頻打催得先開即早飛秋林秋晏𤣥雲瞀積陰平蕪氣象極蕭森細看揺落風霜意已見發生天地心畢竟栽傾非外致豈伊培覆自相尋若教宋玉曾聞道九辨悲思未遽深卧疴六塵縁影正堪嗟二豎乗虚勢益加憶昔鼻頭能出火即今眼底已生花婦言伐性多因酒醫戒傷生少試茶悟罷本來安得病角弓誰使認為蛇題采石李太白祠仙翁謫墮岷山下逸氣如虹耿林罅萬言倚馬不為難坐令神鬼皆驚嚇翹翹車乗懸弓旌疇咨時政肝膽明和畨書草金鑾殿清平詞度沈香亭傲睨視漢嫓黄綺寶牀賜食龍顔喜掉頭飇作燕晉遊却笑卿相紆朱紫開元盈盛亦已極屏間山水代無逸未必脱靴恨爾深自是見幾不終日錦袍錯落浮扁舟呼兒買酒盟江鷗天公似悔夜郎禍明月已起煙波愁采石青青三尺墓至今祠祭勤呵護長至書意萬草千花若死灰陽和一氣已潜回莫言舉世無先覺幾處寒梢放野梅商歌三首東風滿天地貧家獨無春負薪花下過燕語似譏人白屋釡生魚青樓行細膾靜思天地間寧有私覆載門前桑柘枝中有千錦機遊人不迴顧桃李獨成蹊却羨貴客寧知拂徽琴郢人漫倚引商音那堪歳月化雙鬢空有悲歡寄寸心囊底有方餐白玉牀頭無術致黄金抗塵走俗曾何補却羨鷦鷯托一林三髙亭灼灼曾暉漸欲西長橋弭棹倚欄時湖光渺漭浮寒鑑山色依稀抹黛眉一舸功成非本志三秋歸思亦何遲始終惟有天隨子笑却旌招理釣絲花下嘆人生何處較窮通天意元難測始終花落花開翻覆手君看同此一春風林深林深氣雜不相闗衆建芳馨兩廡間月榭琴彈新製曲曉窻畫展舊遊山淒涼風滿竹千箇的皪春歸梅一斑可笑野人無繫累機心猶在釣魚灣纔是忍看繁紅委路塵空餘野草緑無垠人生憂樂何終極纔是迎春又送春一夜潦收野水淨雲陣布重陰一夜西風急千山落葉深身猶衣暑服耳已厭寒砧對此無心者還應雪滿簮寄逺詞寒梢蕭索風振林蟪姑切切語欲噤終宵輾轉不能寐遥憶良人戰場裏陽闗一别歸無期翠煙幾度秋螢飛當時手種合歡樹今已蒼蒼雲四垂蜀錦裁書憑雁寄那能道人意中事深秋倘得未移軍猶見幽閨數痕淚居延城外刁斗聲無定河邊霜月明妾身雖老幸未死何日中原賀太平被酒人間笑口信難開十事嘗嗟九不諧忙裏始知閒氣味老來方見少情懐清商憭慄歳無幾𤣥髮蕭疎生有涯誰謂伯倫聞見滅却甘麴蘖自沈埋衞生屏去雞壅與豕零試聽我誦衞生經兩忘寵辱心源靜一掃榮枯眼界明酖毒不令生厚味姦邪寧使出繁聲冥鈞深養靈根固四體調和血氣平瀟湘道中客行適瀟湘淒其歳云晏枯梢風騷勞荒郊雲漶漫槭槭雨聲急皚皚雪花燦紆縈泥途深渺黙山堠逺日暮欲税駕天末叩孤館米盡甑生塵薪濕火不煖此意對三閭似結兩重案人生如空華百歳等抹電那忍聽客塵日夜苦相煎懐安名所敗飽食親孰顯恭承古昔訓險阻寧敢憚信知有此身乃是一大患愁深不能寐歌長未及亂門前車鐸鳴翰音復號旦看葉紅紫飄零草不芳始宜攜杖向池塘看花應不如看葉緑影扶踈意味長談道休將視聽探希微衆妙何嘗間險夷舍一而求非恍惚自三以究豈支離試看瓦礫道寧隠若外筌蹄思益奇熱即取涼寒向火是中消息幾人知己亥中秋此行不負中秋夜采石江頭醉及晨獨御涼風尋古迹驚看明月照今人詩騷寂寞雖云久光景推移豈解陳却怪悲鳴營度處筆端何事竟無神虎溪衝猋吹客襟飄拂虎溪渡逺想三笑時此意固有寓孰知秘宻藏奚聞笑黙語繩繩徹上下綿綿貫今古東林鐘聲幽康廬山色嫮是皆善知識長時相警悟世人自合塵兩耳聾莫覷百千微妙義墮在一毫許我行發深省如重睡忽寤向人欲舉似有舌不能吐黙坐厭調鞍馬佩金壺黙坐空窻氣晏如已覺胸襟無得喪那知花草就榮枯絃何庸絶琴寧有聲未曾銷塵本無此語倘教遊子聽料應笑我一何愚倦倚蟬聲無語細相和池面纔浮㸃㸃荷倦倚闌干消永日葡萄陰薄栁風多此悟遑遑偶偶亦堪悲桀死堯生畢竟齊空羨駝峯烹翠釡漫思鱸鱠拌金虀榮華代謝看荆棘今古推遷望澗溪造化宻移於此悟長歌拾穂任天倪兩宋名賢小集卷二百六十九
