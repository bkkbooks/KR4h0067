body:
  text: 兩宋名賢小集巻四十宋陳思編元陳世隆補王岐公集王珪字禹玉成都華陽人也徙家開封父準為太常博士秘閣校理珪少好學日誦數千言及長博通羣書舉進士廷試第二為大理評事通判揚州召試學士院遷太子中允直集賢院同修起居注改右正言知制誥其文典麗有西漢風嘉祐初為翰林學士初詔以三聖並配于郊温成皇后立廟城南牲幣祼獻登歌設樂同太廟珪曰三后並配欲以致孝也而瀆乎享帝後宫有廟欲以廣恩也而僭乎享親于是郊以太祖専配而改温成廟為祠近世享廟堂上升歌有節鼔而無柷敔珪言柷敔所以著樂之終始八音豈容有闕願詔有司攷古増定之是嵗明堂始置柷敔黜節鼓而用摶拊以備八音仁宗以英宗為皇子珪當草詔明日請對崇政殿曰天下望立皇子久矣果出自陛下意乎仁宗曰朕意決矣珪再拜賀曰陛下誠能為宗廟社稷計天下之福也于是退而草詔英宗即位詔珪撰仁宗諡珪言古者賤不誄貴幼不誄長天子稱天以誄之欲稽舊典先請于郊遂為定制仁宗既祔廟珪以嚴父配天之義請以仁宗専配明堂明年小祥禮官言當以十月祫祭太廟而未終三年之制宜行時饗既禫請行禘祭珪曰神主祔廟已嘗告祭奈何禫畢復行饋食乎詔議濮安懿王典禮珪與禮官合奏宜依先朝封贈期尊稱皇伯濮安懿王三夫人當封大國執政不以為然其後三夫人卒如珪議除端明殿學士遷翰林學士承旨熈寧元年當郊祀神宗疑亮闇珪曰王制喪三年不祭惟祭天地社稷為越紼行事不敢以卑廢尊真宗居明徳皇后之喪既易月而服除明年遂享太廟祀天地于圜丘請如故事其服冕車輅儀物音樂縁事神者皆不可廢從之三年除參知政事九年拜同中書門下平章事集賢殿大學士元豐二年以階易官珪時為禮部侍郎當為正議大夫遂越拜銀青光禄大夫兼門下侍郎同中書門下平章事監脩國史珪嘗薦張璪不用珪曰臣為宰相三薦璪矣而不見用是臣失職也請罷神宗喜曰宰相當如是神宗欲以内侍李憲主兵珪奏非祖宗故事陛下獨不鑒漢唐之亂乎五年拜尚書左僕射兼門下侍郎以蔡確為右僕射初神宗既新官制先謂執政曰官制將行欲新舊人兩用之又曰御史大夫非司馬光不可時珪確相顧失色珪憂甚不知所出確曰陛下久欲收復靈武公能任責則相位可保也珪書謝之自是西師深入靈武之役死者十餘萬葢自西邊用兵神宗嘗持淺攻之議雖一勝一負猶不至大有殺傷至于西邊將帥習知兵事亦無肯言深入者非珪確不歴外任不習邊事無敢開此議者神宗不豫珪奏乞立皇太子請皇太后權同聴政候聖體康復依舊神宗首肯之皇太子既立未幾神宗升遐哲宗即位拜金紫光禄大夫封岐國公薨于位贈太師諡曰文恭有文集百巻號華陽集大饗明堂慶成皇祐更秋律明堂奉帝禋粢盛雖薦徳霜露本懐親於赫朝三后無文秩百神几筵交玉幣重屋近星辰邃幄留飇御清壇墮月津衣冠漢儀舊金石舜韶新受胙開宣室鳴鐘降紫宸羣隂光復旦叶氣斗迴春靈貺叢千祝豐恩滲四垠慙非老詞筆徒學煥堯文呈永叔書事誥書初捧下西廂重棘連催暮鑰忙緑繡珥貂留帝詔紫衣鋪案拜宸香巻如驟雨收聲急筆似飛泉落勢長十五年前出門下最榮今日預東堂依韻恭和聖製上元觀燈雪消華月滿仙臺萬燭當樓寶扇開雙鳯雲中扶輦下六鰲海上駕峰一作山來鎬宫春酒沾周宴汾水秋風陋漢才一曲昇平人盡樂君王又進紫霞杯梅花冷香疑到骨瓊艶幾堪餐半醉臨風折清吟拂曉觀贈春無限意和雪不勝寒桃李有慙色拈枝試並欄遊山寺寒日征驂懶復迴經宵仍喜駐巖隈逕盤幽跡遙知鹿林逗清香定有梅曉影瘦猿窺澗溜夜聲肥羜灹爐灰我心非動亦非静白足禪僧無妄猜依韻恭和聖製龍圖天章閣觀三聖御書半夜傳君召西清閲帝文筆迴丹穴鳯歌起沛中雲御幄金虬轉仙墀羽仗分君王自天縱況復睿心勤和王原叔内翰有懐暮鑰嚴温省宵鈴静浴堂銀花無奈萎瑶草又還芳夢久聞仙笛班清犯曉霜帝閽何所叩一炷祝堯香次韻和元厚之平羌詔收新土鳯林東四百餘年未奏功葱嶺自横秦塞上金城還落漢圖中輕裘坐款無遺䇿解髪來庭有舊風零雨未濛音己㨗不勞歸旅詠周公聞种諤米脂川大㨗神兵十萬忽乘秋西磧妖氛一夕收疋馬不嘶榆塞外長城自起玉闗頭君王别繪凌烟閣将帥今輕定遠侯莫道無入能報國紅旗行去取涼州依韻和呉相公從駕之開寶寺慶壽崇因閣崇因開寶構金碧晝相輝禁蹕隨曦馭層城轉斗機梵音獅子吼妙相鴿王歸洛水浮神篆天花散御衣塔疑從地涌棟擬入雲飛上行乘今果羣超懼昨非慧珠常自照法雨徧成霏但起真如念梯梁不可幾金陵懐古懐鄉訪古事悠悠獨上江城滿目秋一鳥帶烟來别渚數帆和雨下歸舟蕭蕭暮吹驚紅葉慘慘寒雲壓舊樓故國淒涼誰與問人心無復更風流宫詞金鉦畫角警場開天子南郊玉輅來十里青城遥北望綵雲宫殿月樓臺鼓角三聲夜奏嚴夕齋清廟宿重簾殿前太尉横銀仗指㸃金盆御水添鑾輿昨夜宿郊壇月淡風低綵䄂寒密冩銷金紅牓子宫中日日報平安禁籞春來報踏青御池波漾碧漣輕内人争送鞦韆急風隔桃花聞笑聲露井銀牀凍不收深宫花暗曉鶯愁殘紅滿地無人掃一半隨風落御溝昨日龍輿幸寶文宸毫金軸展風雲前朝御印從頭坼重整牙籖甲乙分盤龍新織翠雲裘檢㸃黄封玉匣收防備秋來供御著金箱捧入曝衣樓十三垂髻碧螺鬆學舞經年後苑中近日昭儀抄姓字一時宣撥入東宫内庫從頭賜舞衣一畨時様一畨宜才人特地新裝束生色春衫畫折枝黄金掌上露華飛朝退君王索輦遲到得經筵春講罷海棠花影數甎移焚香重熨赭黄衣恐怕朝陽御進遲禁鼓五更交早直歸來還是立班時素霙飄灑住宵寒一寸金花燭淚殘連夜封香宣兩府平明謝雪到齋壇盡日閒窗賭選仙小娃爭覔倒盆錢上籌誰占蓬萊島一擲乘鸞出洞天麗日祥烟鎖禁林櫻桃初熟杏成隂年年翠輦來遊幸花落春宫一寸深夕宴中秋醉廣寒閬風銀闕鎖三山美人半夜歌明月聲在玉壺天地間新供御馬可曾騎青鬛連錢碧玉蹄每到殿前祗候駕金鞍卸下不聞嘶六龍觀稼奉宸遊齊賀豐年薦麥收後苑宴回卿相出内官金合送來麰大家裝著鬭時宜獨自尋常拂淡眉為染淺黄衫子色金盆添水看鵞兒簾搖翡翠金風晚瓦濕鴛鴦玉露天秋殿曉開重九宴内人争貼菊花鈿崇文殿裏勝蓬萊繡柱扶天祕閣開典籍校讐三閣外圖書多出禁中來六宫春色醉仙葩綺户沈烟望翠華琥珀盤生山芍藥絳紗囊佩木香花花外闌干壓翠簷水邊金閣半垂簾内砧敲月黄昏後坐覺春風一倍添端午生衣進御牀赭黄羅帕覆金箱美人捧入南薫殿玉腕斜封綵縷長選進仙韶第一人才勝羅綺不勝春重教按舞桃花下只踏殘紅作地裀七寶䦨干白玉除新開涼殿幸金輿一溝汎碧流春水四面瓊鈎搭綺疏山樓彩鳯栖寒月宴殿金麟吐御香蜀錦地衣呈隊舞教頭先出拜君王天外明河翻玉浪樓西涼月涌金盆香銷甲乙牀前帳宫鎖玲瓏閉殿門西風敧葉撼宫梧早怯秋寒著繡襦玉宇無人雙燕去一彎新月上金樞夜寒金屋篆烟飛燈燭分明在紫薇漏永禁宫三十六燕囘爭踏月輪歸晚吹翩翩動翠旗爐烟千叠瑞雲飛何人奏對偏移刻御史天香隔繡衣金井秋啼絡緯聲出花宫漏報嚴更不知誰是金鸞直玉宇沉沉夜氣清内庭秋燕玉池東香散荷花水殿風阿監探菱牽錦䌫月明猶在畫船中東宫花燭彩樓新天上仙橋不鎖春徧出六宫歌舞奏姮娥初到月虚輪紗幔薄垂金麥穂簾鈎纎挂玉蔥條樓西别起長春殿香碧紅泥透蜀椒翠華香重玉爐添雙鳯樓頭曉日暹扇掩紅鸞金殿悄一聲清蹕捲珠簾金作盤龍繡作麟壺冰樓閣禁中春君王避暑來遊幸風月横秋氣象新清曉自傾花上露冷侵宫殿玉蟾蜍擘開五色銷金紙碧瑣窻前學草書翠鈿貼靨輕如笑玉鳯雕釵裊欲飛拂曉賀春皇帝閣綵衣金勝近龍衣鎖聲金掣閤門環簾捲真珠十二間别殿春風呼萬嵗中丞新押散朝班雞人報曉傳三唱玉井金牀轉轆轤烟引御爐香繞殿漏籖初刻上銅壺御案横金殿屋紅扇開雲表露天容太常奏備三千曲樂府新調十二鐘宫女熏香進御衣殿門開鎖請金匙朝陽初上黄金屋禁掖春深晝漏遲三月金明栁絮飛岸花堤草弄春時樓船百戲催宣賜御輦今年不上池内人稀見水鞦韆爭擘珠簾帳殿前第一錦標誰奪得右軍輸郤小樓船夜色樓臺月數層金猊烟穂繞觚稜重廊屈折連三殿密上真珠百寶燈天門宴閉九重闗樓倚銀河氣象間一㸃星毬垂絳闕五雲仙仗下蓬山禁裏春濃蝶自飛御蠶眠處弄新絲碧窻盡日教鸚鵡念得君王數首詩鬭草深宫玉檻前春蒲如箭荇如錢不知紅藥䦨干内日暮何人落翠鈿太液波清水殿涼畫船驚起宿鴛鴦翠眉不及池邊栁取次飛花入建章御座垂簾繡額單冰山重叠貯金盤玉清迢逓無塵到殿角東西五月寒春心滴破花邊漏曉夢敲囘禁裏鐘十二楚山何處是御樓曽見兩三峰釣線沉波漾彩舟魚爭芳餌上龍鈎内人急捧金盤接潑剌紅鱗躍未休蕙炷香銷燭影殘御衣熏盡徹更闌歸來困頓眠紅帳一枕西風夢裏寒禁裏宫鶯曉未啼千牛仗下報班齊銀袍五百趨龍尾天子臨軒賜御題洛陽新進牡丹叢種在蓬萊第幾宫壓曉看花傳駕入露苞初坼御袍紅碧桃花下試枰碁誤算籌先一著低輸却鈿釵雙翡翠可勝重勸玉東西侍輦歸來步玉堦試穿金縷鳯頭鞋堦前摘得冝男草笑插黄金十二釵瑤臺夜滴金莖露水殿涼生玉枕風卧看星河歸閣曉月斜疎影轉梧桐臨明一陣梨花雨夢隔珊瑚斗帳明後苑樂聲催引駕春衫初試覺身輕盆山高叠小蓬萊檜栢屏風鳯尾開緑遶金堦春水濶新分一脈御溝來内苑宫人學打毬青絲飛鞚紫花騮朝朝結束防宣喚一様真珠絡轡頭夜深獨倚闌干角玉笛横吹弄月明餘響度雲無處覓人間聞得兩三聲新學琵琶曲破成仙韶第一己知名朱絃未落黄金撥玉腕先聞動釧聲太尉洮岷破虜囘腰垂金帶入闗來殿前獻壽天顔喜花覆千官拱御杯元夕星燈照露臺六宫歌吹出雲來夜深翠輦歸金殿十里迴廊錦帳開後苑歸來月上初天歌吹引六鸞輿春風料峭餘寒重猶索金函覽奏書金雞竿下龍旗動萬國華夷拜冕旒十二門開傳詔急祥雲捧日在樓頭數騎紅糚曉獵還銷金羅襪鏤金鐶佯佯走馬穿花過拂拭雕弓對御彎晚來東殿放笙歌外院池亭得暫過深炷爐香登月榭䦨干西角拜嫦娥中宫晴雪玉成峰滴露堆寒冷照空三十六窻明月夜嫦娥渾在水晶宫兩班齊賀玉闗清新奏熙州曲破成畫鼓連聲催隊進玉人多半未知名沈烟揺碧透金鋪密下珠簾鎮玉壺近賜趙昌花雀陣却嫌崔白芰荷圖内庫新函進御茶龍團春足建溪芽黄封各各題名姓賜入東西兩府家博士當年教玉筝六宫誰敢鬭新聲如今舊曲無心理寶柱一行秋鴈横宫人捧硯臨香案一幅春綃展素霞玉筯彎環題御篆風雲金殿起龍蛇銀盆著水灑毬塲馬嚼銜聲立兩行齊上玉鞍隨仗列粟金腰帶小牌方三殿飛雲禁鑰開風從天上送香來諸番玉帛朝元日齊獻南山萬壽杯黄昏鎖院聴宣除翰長平明趂起居撰就白麻先進草金泥降出内中書魚藻宫中淑景長鴨頭新水御池塘竒花深院門門閉總被春風漏洩香石刻蛟螭扶繡柱金盤龍鳯走雕楹萬年枝上流鶯囀屏掩春山夢不成紅濕春羅染御袍透簾三丈日華高金針百尺穿縫處一對盤龍落剪刀霜明鳷鵲樓邊月風落昭陽殿後梅爐炭灺消香獸暖獨拈香箸撥紅灰花香著蘂藏蜂翅栁影拖金入瑣窻舞鑑曉鶯無柰隻認梁歸燕却成雙玉兎何年上月宫夜深搗藥特無蹤神丹不老嫦娥鬢乞取刀圭駐玉容萱草成窠杏子青夜聞禁漏曉聞鶯吹回一覺昭陽夢帳外春風太薄情翡翠盤龍装繡額真珠雙鳯蹙花毬時聞玉女牽簾笑箭躍銅壺不算籌迢逓金壺漏水長輪更傳㸃報君王諸宫各進時新果堆著龍牀駐夜香殿下排塲擊土牛君王玉仗久遲留外人爭卜宜春喜奪得金泥各自收千年一偶聖人生豈特河清海亦清瑞應固宜流樂府行看絲竹有新聲小雨霏微潤緑苔石欄紅杏傍池開一枝插向金瓶裏捧進君王玉殿來金陵懐古控帶洪流古帝城欲尋舊事半榛荆六朝山色情終在千古江聲恨未平設險丘陵荒蔓草帶城桑柘接新畊十年重到無人問獨立東風一愴情登懸瓠城感呉元濟将軍戈甲從天下丞相旌旗匝地來堪笑怒螳猶强臂不知蟄户欲驚雷咄嗟武相深寃洗指顧山東逆境開吏部聲名千古在㫁碑何處卧蒼苔三鄉懐古清洛東流去不還漢唐遺事有無間廟荒古木連空谷宮廢春蕪入亂山南陌絮飛人寂寂空城花落鳥闗闗登臨幾度遊人老又對東風鬢欲斑登海州樓城外滄溟日夜流城南山直對城樓溪田雨足禾先熟海樹風高葉易秋疏傅里閭詢故老秦皇車甲想東遊客心不待傷千里檻外風烟盡是愁依韻和蔡樞密岷洮恢復部落迎降河湟形勝壓西陲忽覺連營列漢旗天子坐籌星兩兩將軍解佩印纍纍稱觴别殿傳新曲銜璧名王按舊儀江漢一篇猶未美周宣方事伐淮夷五日宫中帖子紫閣曈曨隠曉霞瑶墀九御薦菖華何人又進江心鑑試與君王却衆邪題静照堂身居在城邑趣不落人間門外塵埃滿庭中日月閒風隨朝梵響雨入定衣斑幾欲攜筇去松隂一叩闗新正帖子北地凝隂盡千門淑氣新年年金殿裏寶字貼宜春挽老蘇先生岷峨地僻少人行一日西來譽滿京白首只知聞道勝青衫不及到家榮𤣥猿夜哭銘旌過紫燕朝飛挽鐸迎天禄校書多分薄子雲那得塟鄉城題齋宫鄰雞未動曉驂催又向靈臺飲福杯自笑治聾知不足明年强健更重來邵安簡公輓詞短褐曾陳定羌䇿汗青猶著立儲書春風澤國吟箋落夜雨溪堂燕壘疎兩宋名賢小集巻四十
