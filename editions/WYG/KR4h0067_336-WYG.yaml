body:
  text: 兩宋名賢小集巻三百三十六宋陳思編元陳世隆補皇荂曲鄧林字楚材一字性之自號四清社友福清人年十五即以詩義魁鄉校淳熈中登進士一時名公卿如周益公陳止齋晦翁朱子吕東萊俱引為交游嘗伏闕三上書陳時事得失朝議欲授以中都幹官或曰鄧林若在中都此謗議之府也遂授石城丞其詩有皇荂曲一巻南國有佳人南國有佳人仙姿自蓬島龍綃照明璫鳳釵横貴寳新粧試鸞鏡皎皎顔色好芳年倐已笄君子可偕老奈何行媒弱修言棄中道洞房闇惆悵琦璜結組縞寧作鍾離春勿學姑瑶草劉院鹿車小宇宙據鞍常醉眠風塵澒洞時杯裏全其天伶達故自佳籍放乃無用試看勸進表何似酒德頌東山彭澤乞靈風鶴屐折齒壁後寘人汗如洗樵漁雜沓坐林間蜉蝣塵埃不可攀石頭擾擾柴桑間任彦升鈴懸四角五采旗分明天産真英竒阿堆文章妙一時士林往往推元龜楊梅蜜領仁且慈桃米麥飯清堪師何愁不得中書為半生紆意梅蟲兒陶通明眉疎目朗姿圓通詩書萬巻羅心胷華陽三茅仙洞中鳳笙隠隠和松風薪林園䜟呈梁公朱砂曽青霜雪容服之身體飄輕鴻積金澗泉東復東山中宰相那無功昭陽竟作單于宫緑珠詞涼臺瀟灑臨清波幄翠簾珠明綺羅哀絲豪竹按清歌紅潮素臉春風和至君歡娛美人醉報有無情使車至幾樷蘭麝俱委塵獨指緑珠可當意衆中偏是承恩深妾身雖賤無二心君前判命效一死玉􅐟收聲紅日沈輕裙飄向欄干角花鈿散地金釵落到頭不負齊奴約猶勝識字空投閣玉兒金蓮花上俞􅊂子永壽神仙羅繡綺苑中荆荻市令嚴玉像支離瓦官寺六宫鴨㔅起淫風大白便應懸妲已此身肯許兜鍪夫猛為東昏判一死到今羞殺賣降人去作練兒梁姓臣瓮繭吟有繭大如瓮其來自扶桑繅成白雪絲一縷萬丈長染成備五色妙織雲錦章花文雜經緯紈素無晶光緗纈時所愛輕練貴侯王緇衣不可作此物間篚箱衮職豈無闕終當補虞裳結友四清飄風吹游塵古道少人行涇水化為泥滄江汙我纓嗟余偭工巧世外陶閒情衆芳怨蕪穢不忍葹菉盈庾嶺姿皚皚渭川色青青三閭播秋思九韶鏗樂聲蕭然庭宇中對之成五清滔滔揚波者劍首一吹輕靈修倘見知氷霜憺姱名次韻陳釣甫郊行黄塵敗素意出門愜郊行野菊含冷燄巖松起寒聲髙山唐業崇流水晉時清捨薪歸底用石鼎待彌明闗山月闗山夜月明王褒分彩照戎兵江總將軍擁節起古樂府長戍受降城江總焚烽望别壘陸瓊欲驗盈虚駛張正見塞笳將夜鵲阮卓戰氣今如此徐陵重闗掩暮烟賀力牧雲陣上祁連徐陵思婦髙樓上徐陵遥心萬里懸賀力牧孤山訪鄭渭濵不值寂寞石琴臺香雲撥不開多知騎鶴出自欲買舟來葑岸春回草山亭雨謝梅懐人成悵惘日暮惜空回書懐西風吹羽扇吾道竟淒凉上坂勞騏驥低巢窘鳳皇可求非富貴無用是文章冉冉深林底幽蘭正自香真陽峽滿眼皆吟料歸囊未盡空江波連岸碧野火張天紅髙樹留寒日長蘆轉晚風客心維小艇心已故山中凌江灘灘髙舟去緩閒眺莫江濵竹本沙痕舊茅樷燒色新青裙瓶汲澗白帽斧尋薪渺渺蠻煙起秋風一旅人近况近况只如此深山無見聞二申猶學道三上漫攻文芸葉春繙日梨花曉夢雲添香仍煮茗嚴敬事天君早過劉功父清溪月裏山河大風前草木涼征塵生杖屨香霧濕衣裳古嶺攀栖鶻荒蹊蹴聚蝗白雲看未逺已轉九回腸曲江歸舟只道蓬低礙覔詩眼前物色自多竒千山赭去如秦樣一水清來似晉時漁父豈無縁葦輩樵人恐有負苓師僮奴忽報梅花動春在江頭最北枝村居古來村裏起功名當日南陽亦是耕幾筆逺山仁者靜半橋流水聖之清晚風蟬響勝金奏夜露螢光即火城人得一閒髙一著不須史論更詩評感興竹帛功名九折車栖遲巖野竟何如浣花溪上尋佳句積穀山頭讀異書江左風流空醖藉淮南煙景尚凋疎太平十二河汾策幾欲排雲謁帝居蛟峰先塋獰蛟蟠伏鬛封孤雲黯幽亭日向晡雙柱千年翔化鶴四山半夜泣於莵老天忍挫真英物厚地甘埋大丈夫無計發潛空涕落雨松霜柏照煙蕪賦江郊漁弋占斷江山是一家寄情漁弋當生涯青楓翠竹春屏葉白藕紅菱曉鏡花鴻鵠鵾鵬鵰鶚鶻鱒魴鰷鯉鰋鱨鯊河陽書到君當起弩發千鈞釣五車豫章郡名猶是漢流傳宇宙江山復幾年畫閣倚空家十萬紅粧鬭夜妓三千層城歌舞秋風外故國興亡夕照邊近嵗潯陽成重鎮鎮南烏幕鎖蒼煙贑上思親庭下青萱意自舒起居近日復何如熏香莫遣衣篝潤餌藥從知酒琖疎教婦丁寧惟禮法要孫久逺是詩書手中線在常珍重空寫平安託鯉魚章貢祥符吳道士孏窩早年收得自由身坐斷窩中孏是真日短日長惟守靜雲來雲去不生嗔破除機械鷗盟熟脱畧錙銖鶴料貧舊看黄庭猶忘却應無心力對閒人江湖偉觀世間無盡是天游更出湖山最上頭江面春聲潮巻雪湖心寒影月澄秋海門舟楫雲開見瀛嶼亭臺水載浮不比錢塘歌舞處逺懐西北有神州送徐𣙜院奉户檄之九江諸郡中邊瑩徹似冰壺空盡時情意氣殊已向銅龍梯要路又隨玉駃駕征涂風生湓浦江流急雲滿康廬夜月孤朅到東南無力了一分寛處是規模蘭野客過門呌賣蘭清風便自逼人寒孤根未必靈均種推作離騷行輩看聞雞不因風雨不分明羞殺譙樓打亂更世上公侯多改節無人肯聽丑前鳴晉武帝秋風銅爵曲池平吳王宫娃滿掖庭憑仗皇孫聰慧早不知禍在夕陽亭左太冲辛勤十稔賦三都聞者曽瓿酒瓮書他日洛中添紙價陸家兄弟竟何如朱彦和文如玉海動時流曽以書棊伏隠侯武德閣前消幾語却令梁氏缺金甌任蠻奴千里旌旗已渡江蠻奴苦諫喚蕭郎却持官裏黄金去望拜韓擒石子岡敬微受用廬山水石竒亭亭霞外薜蘿衣侍中􅄼抵蘇門障笑死丹青陸探微鄧郁雲母餱糧五嶽樓繡娃少嫗導仙遊不應輕信雙青鳥便遣東都事業休石崇梓澤神仙第一居爭豪不惜碎珊瑚荆州使客知何罪未必亡身為緑珠張茂先辨精龍肉亦竒才雄匣干將耿不回只守鷦㝠蚊睫賦天星未必折中台王夷甫玉塵消揺吐妙言清流都指作龍門白頭茍活尊前坐夜半排墻未是寃張曲江祠延英幾度獻忠言白羽他時賦感恩自是三郎真贋錯却將天寳換開元貪泉千古遺蹤散曉煙空餘二字寺門前世間貪者滔滔是何必俱曽飲此泉送衡山琴畫張道士二首滿天風月澹消騷三尺孤桐古調髙不敢問君聽别操請彈二十五離騷滿空煙雨澹糢糊三尺霜漁老墨枯不敢問君求别景請描七十二峯圖桂樹剪剪霜風起晚吹一溪流水浸寒暉客衫猶恨吳綿薄不道邊人盡鐵衣利州進馬靈闗玉壘自崔嵬誰向西邊起禍胎萬里望堯通一祝天基御馬利州來過緑野世上今無隠退風地名偶與午橋同往來怕看銅駝陌閒倚柴門憶晉公西湖髙價租船作勝游窮逋􅄼敢鬭風流西湖多少閒春水不洗中原二百州望和靖墓孤山擎出水中央留下梅花代代香滿酌湖波遥一酹問咸平事已荒凉九里松松是山靈一手栽堯天常就棟梁材龍髯怒起春風急似怪遊人喝道來喚渡旋幙半載蓬萊地相攜只是詩心懐丹鳳去夢與白鷗隨俯仰俱無愧勤勞必有知歸舟平似掌天亦念孤危寄里中社友欠作故人書侵尋半載餘窮吟雖自吝入夢不相疎梅蕊通春信霜風促嵗除待余歸故里鷗約復如初題劉功父與耕堂黙耕原不外靈臺何用錢添百屋堆甘雨每從和氣出祥風常自善心來畛畦有害皆除去境界須寛更放開種德欲如多黍稌本仁先且䕶根荄太平國裏青精飯永熟鄉中玉液杯㑹得遺安龎老意力行好事厚栽培兩宋名賢小集巻三百三十六
