body:
  text: 兩宋名賢小集巻二百十一宋陳思編元陳世隆補南軒集張栻字敬夫廣漢人浚子以䕃補官孝宗朝歴左司員外郎除祕閣修撰歴知江陵府荆湖北路安撫使卒嘉定中諡曰宣從祀大成殿有南軒集淳熙四年二月既望靜江守臣張某奉詔勸農于郊乃作熙熙陽春之詩二十四章章四句以示父老俾告於其鄉之人而歌之熙熙陽春既發既舒翼翼南畆是展是圖嗟爾農夫各敬乃事徃利爾器誡爾婦子惟生在勤勤則及時惟時之趨時不爾違祁祁甘雨膏我下土習習谷風和澤乃普徃即爾耕惟力之深拄蒔爾苗勿倦其耘于日于夕自遂自達爾心勿忘彼生孰遏惟天之心矜我下民民不違天使爾有成既穟既實既堅既好爾穫既周先養爾老保爾家室撫爾幼穉既迄有年復思嗣歳嗟爾父老其訓其誡俾務於本惟土物愛不念其本則越其思所思既越害斯百罹嗟爾父老其告其喻爾之有生君實覆汝尊君親上其篤勿妄小心畏忘率于憲章嗟爾父老教之孝悌孰無父母與其同氣反于爾心孰無愛敬即是而推烏徃不順嗟爾父老勿替諄諄其未率從警束其身告以禍患其使知懼無俾蹉跌以蹈罪罟惟國之法曄曄其垂使爾知避豈欲爾施爾成自陷予疚予恫曷使予懐寘于爾衷於赫聖王敷德流澤布宣弗厪時予之責咨爾父老助予念兹豈予之助報國是宜粤以今日勸相于郊乃作此詩以懋爾勞咨爾父老尚演厥義其諷其歌于鄉于里俾一其心服我訓言擊鼔坎坎自古有年七月旦日晚登湘南樓文書稍去眼日夕進微涼高樓一徙倚清風為我長漁父䕃深樾歸人度浮梁仰看河漢明俯視羣山蒼平生會心處於此故難忘舊聞水東勝巖巒發天藏豈無一日暇勇往聊徜徉民瘼未渠補况敢懐樂康天邊雲物佳似復為雨祥秋成倘可明歳曉或自强當從農家鼔一歴水雲鄉送朱元晦君侯起南服意氣凌九州聿登文石陛忠言動宸旒坐令聲利場縮頸仍色羞郤來卧衡門無媿自日休盡收湖海意仰希洙泗遊不逺闗山阻為我再月留遺經得紬繹心事兩綢繆惟兹斷金友出處寧殊謀南山對牀話匪為林壑幽白雲政在望歸袂風颼颼朝來出别語已抱離索憂灕山灕江即湘江濈濈清見石其東列羣峰秋水碧復碧日出霧露收草徑上逼側憑欄舒望眼已足慰疇昔更窺岩穴勝創見為驚惕如何數里間竒觀屢接跡寛同厦屋深劃若巨靈擘日月遞光景風雲變朝夕石橋幾年成乳竇一時滴神龍舊隱處仰視多辟易蛻跡凛猶存隱隱即霜脊下有澄湫深餘波漱蒼壁徃者已仙去來者此其宅薄晚叩松闗風過聲索索聊麾車騎退容我且散䇿郤望訾家洲輕舫渡前磧回首烟樹林已復挂蟾魄宇曠淨餘滓羣物被光澤河洲寄遐思空岩皎虛白清輝猶可窺水色相激射天邊與川上亭亭如合璧居然廣寒遊不用假六翮班坐依微瀾晤賞共佳客與之相千載詎有古今隔簫鼔歸夜䦨觀者燦成陌徃徃羅杯斚班班見殽核諒因年歳豐人意少舒適視爾意少舒于予多忻懌嶽麓書院遊觀不作難呼舟渡清泚新晴宿潦淨羣山政如洗上方凭危欄萬象見根柢寒泉自可㪺况復雜肴醴高談下夕陽邂逅元鑰啟中流發浩歌月色在波底題城南書院招元晦積雨欣始霽清和在此時林葉既敷榮禽聲亦融怡鳴泉永不窮湖風起淪漪西山巻餘雲逾覺秀色滋層林叢緑間愛彼松柏姿青青初不改似與幽人期送楊廷秀昔人忘言處可到不可會還須心眼親未許工雕繢詞章抑為餘子已得其最當知鄒魯傳有在文字外平生風雨夕毎念名節難窮冬百草歇手自種琅玕吾子三十䇿字字起三嘆豈欲求人知正自方寸殫請哦碩人詩匪為樂考槃嶽頂上封寺有懐元晦憶共朱夫子登臨氷雪中劇談無俗調得句有新功别去雁横浦重來月滿空遥憐今夕意清夢倘相同喜聞定叟弟歸吾弟三年别歸舟半月程形容應似舊歡喜過如兄秋日聨鴻影涼窓聽雨聲人間團聚樂身外總云輕黙姪之官黙也相從久吾心念汝多又為江漢别秖覺歳年過氣習須消靡二夫在講磨惟應介如石人事易蹉跎長橋西風吹短􅄠復此渡長橋木落波空濶亭孤影動搖徘徊念今昔領畧到漁樵擬有山中隱憑誰為一招嶽麓書院支笻穿百級把酒問春光喬木依然在幽蘭秖自芳未經湘水滿逾覺橘洲長暝色猶回首天涯話故鄉與弟姪飲梅花下分得香字日夕色愈正春和天與香提攜一樽酒問訊滿園芳嗣歳詩多思懐人心甚長更須多秉燭玉立勝紅粧王長沙約飲縣圃梅花下得梅字平生佳絶處心事付江梅縣圃經年見芳樽薄暮開朗吟空激烈燒燭且徘徊未逐徵書去窮冬尚一來仲春過陽江亭子亭古危臨岸林幽巧近城烟容隨雨住花片著溪清春事已如許客懐誰與傾亭前幾株樹滿意欲敷榮城南雜咏二十首和朱元晦原原錫潭水匯此南城隂岸花有開落水盈無殘深右納湖團團凌風桂宛在水之東月色穿林影郤在碧波中右東渚四序有佳趣今古蓋共兹橋邊獨微吟回首忘所之右詠歸橋窓低蘆葦秋便有江湘思久矣倦垂綸遊魚不須避右船齋長咏伐木篇竚立以望子日暮飛鳥歸門前長春水右麗澤藝蘭北澗側澗曲風紆徐願言植根固芬芳長慰予右蘭澗叠石小崢嶸修篁高下生地偏人迹罕古井轆轤鳴右山齋高樓在林杪中有千載書昔人不可見倚檻竟何如右書樓開軒僅尋丈水竹亦蕭踈臨流會自得豈是為觀魚右蒙軒流水自清瀉觸石短長鳴窮年竹根底和我讀書聲右石瀨雲生山氣佳雲巻山色靜隱几亦何心此意相與永右巻雲亭前年種垂栁已復如許長長條莫攀折留待映滄浪右栁堤危欄明倒景面面湧金波何處無佳月惟應此地多右月榭芙蓉豈不好濯濯清漣漪采之不盈把惆悵暮忘飢右濯清亭繫舟西岸邊幅巾自來去島嶼花木深蟬鳴不知處右西嶼幽谷竹成隂縁流著石清不妨風月夕來此聽琮琤右琮琤谷亭亭堤上梅歴歴波間影歳晚憶夫君寂寞烟渚靜右梅堤風吹渡頭雨摵摵蓮上聲忻然會心處端復與誰評右聽雨舫散策下亭阿水清魚可數郤上采菱舟桑風過南浦右采菱舟湘水接洞庭秋山見遙碧南阜時一登搔首意無斁右南阜送定叟弟官桂幙事業無欲速燕逸不可求速成適多害求逸飜百憂桃花塢花開山與明花落水流去行人欲尋源只在山深處謁陶唐帝廟詞溪交流兮谷幽山作屏兮曽丘木偃蹇兮枝相樛皇何為兮于此留藹冠佩兮充庭潔芳馨兮載陳純衣兮在御東風吹兮物為春皇之仁兮其天四時序兮何言出門兮四顧𣺌宇宙兮茫然風雩亭辭眷麓山之回隩有絃誦之一宫鬱青林兮對起背絶壁之穹㝫獨樵牧之徃來委榛莽其蒙茸試芟夷而郤視翕衆境之來宗櫂連娟之修竹森偃蹇之喬松山靡靡以旁圍谷窈窕而潛通翩兩翼兮前張擁千麾兮後從帶湘江兮浮緑矗逺岫兮横空何地靈之久閟昉經始乎今公悅棟宇之宏開列欄楯之周重撫勝㮣以獨出信兹山之有逢送八兄歸廣漢彌旬積雨木生耳冬壑未渠收潦水圍爐情話正爾佳乃復歸舟行萬里百年懐感卧湘城風急鶺鴒原上情豈無他人意則真毎覺軟語温如春少年鋭意凌八區晚以樂義稱鄉閭聞人有意亦已如天報兩子雙明珠小飲卜築蘭溪邊修篁喬木今參天是非榮辱不到處巻書一枰清晝眠有弟有弟復何為杜門讀書人謂癡故山未遂掃松願江頭獨立送歸時九日與賓佐登龍山曉風獵獵笛横秋澤國山河九日遊萬里烟雲歸老眼千年形勢接中州丘原到處堪懐古茰菊隨時豈解愁此日此心誰共領朝宗江漢自東流和宇文正甫探梅天與孤清逈莫隣秖應空谷伴幽人千林掃跡愁無奈一㸃横梢眼便親顧影莫驚身易老哦詩尚覺句能新幾多生意氷霜裏説與夭桃自在春和友人夢遊西山故人疇昔隱西峯野寺幽房一徑通無復老僧談舊事空餘修竹灑清風夢中尋勝忘南北句裏論心豈異同我欲壁間題唱和他年留得咤南公偶書我愛庭前木葉疎病枝衰蔓手披除從今燕坐無通塞來徃風煙任巻舒嶽麓書院眼看飛雪灑千林更著寒谿水淺深應有梅花連夜發郤煩詩句寫愁襟禊亭一曲清江正可憐隔江新竹露涓涓好風成我曲肱夢起看飛雲度碧天城南書院絶句八首微風習習禽聲樂晴日遲遲花氣深妙理冲融無間斷湖邊佇立此時心花栁芳妍十日晴五更風雨送餘春莫嫌紅紫都吹盡新緑滿園還可人亭畔薰風盡日涼來從水面過新篁悠然但覺盈襟抱千古虞絃意未忘林塘過雨不勝秋萬蓋跳疎㵼碧流倚檻孤吟天欲暮更穿芒屩上方舟山色頓清秋欲低湖光更淨日平西涼風獵獵傾荷蓋歸翼翩翩度栁堤新涼修竹意逾靜初日芙蓉色倍鮮物態直須閒裡見人情多向快中偏四面紅蕖競緑波晚涼奈此野情何憑城更覺看山穩入户還欣得月多拍堤水滿草茸茸盡日野航西復東欲去未須愁日暮月明波面意無窮病起城南書事二首一春風雨水平湖更覺湖心月榭孤坐看百花開落偏依然山色對清癯茒亭泉溜四周遭花木經春一一高郤望西山隔江水徑思一葉泛雲濤春日和陳擇之花落花開總可憐橋南亦復好風烟雨餘起我故園夢漠漠浮鷗水拍天年華冉冉春將半花事怱怱雨滿城想得東郊變新緑未妨攜酒趂初晴日長漸有簡編樂春半已將櫻筍來無數青山相慰藉有時明月共徘徊荔子荔子如今尚典刑秋林圓實著嘉名雖無赬玉南風面郤願筠籠千里行落梅清溪雨伴小橋東落月紛紛水映紅五夜客愁花片裡一年春事角聲中歌殘玉樹人何在舞破香衫曲未終郤憶孤山醉歸路馬蹄殘雪襯東風金山萬頃洪濤裡巍然閱古今雲煙三島接花木四時深亂石維舟住西風倚檻吟朝宗如不斷凄切此時心題南城城頭望西山秋意己如許雲影度江來霏霏半空雨和元晦詠畫壁松杉夾路自清隂溪水根源徃復尋忽見畫圖開四壁悠然端亦慰余心五士遊嶽麓圖閉門六月汗如雨出門褦襶紛塵土文書堆案曲肱卧夢逐征鴻過前浦西山突兀不可忘勇徃政須求快覩朝暾未升起微風中流吚啞挾鳴櫓長林秀色已在望有如出語見肝腑意行愛此松隂直眼明還喜碑字古高低梵釋著幽居深穩仙家開閟宇忽看宫牆高十丈學宫峩峩起鄒魯斯文政倚講磨切石室重新豈無補危梯徑上不作難横欄截出可下俯惟兹翼軫一都會徃事繁華雜歌舞變遷反覆寧重論昔日樓臺連宿莽邇來人物頗還舊豈此十年此生聚衆流涓涓日循除華表何時鶴來語炎氛知不到山林茗盌蒲團對香縷鼎來杖履皆勝友季也亦復同歩武洛陽年少空白頭三閭大夫浪自苦一笑便覺真理存高談豈畏丞卿怒不圖畫僧聖得知貌與兒童作夸詡請君為我添草堂風雨蕭蕭守環堵跋王介甫遊鍾山圖林影溪光靜自如蕭踈短髩獨騎驢可能胸次都無事擬向山中更著書墨梅二首眼明三伏見此畫便覺氷霜抵歳寒喚起生香來不斷故應不作墨花看日暮横斜又一枝水邉記我獨吟時不妨更作江南雨併寫青青葉下垂妙高梅花戲折寒梅畫裡傳便知香爨攪佳眠愛君花木逡巡有就笑春風入暮年光上人送墨梅來求詩還鄉南岳有雲留不住東歸結伴過湘湄解將踈影横斜句來換垂珠的鑠詩曜甚鳶肩寒入畫清於鶴骨老難醫遙知入嶺風煙暮正及追胥餽歳時立春偶成律回歳晚氷霜少春到人間草木知便覺眼前生意滿東風吹水緑差差元日古史書元意義存春秋掲示更分明人心天理初無欠正本端原萬善生采菊亭贈張建安陶靖節人品甚高晉宋諸人所未易及讀其詩見其胸次灑落八窓玲瓏豈野馬遊塵所能棲集前建安丞張君精力未衰即掛冠家於瀏陽有年矣葺小園為亭面南山來求予名予名之曰采菊亭取靖節所謂采菊東籬下悠然見南山嗚呼靖節興寄深逺特可為識者道耳詩曰陶公千載人高標跨餘子豈無濟時念歛䕃獨知止歸來卧衡門無愠復無喜九日天氣佳東籬擷芳蕋舉頭見南山佳處政在此地偏心則逺意得道豈否張侯謝銀艾築室娛燕几小亭纔尋丈景物自新美頗聞方瞳清亦復强歩履不妨數登臨倚杖看雲起高詠悠然篇飛鴻送千里挽劉觀大四首憶昨登廊廟忠言沃帝聰所思惟盡瘁敢復計成功半世江湖上千憂寤寐中汗青誰秉筆請放衆言公國恥臣當死公家三世心忍看巳絶筆誰續斷絃音精爽今如在衣冠恨更深郤嗟胞與志處世漫侵尋平日多竒節中間似富公天從廬墓請人説捄荒功辛苦培邦本雍容遏亂烽人傳遺奏切更過子囊忠曽是南荆地他年竹馬迎旌旂嚴騎士弧矢盛民兵細仿規摹舊還知節制明思公如峴首同我泪縱横挽王詹事二首大節元無玷中心本不欺排奸力扛鼎憂國髩成絲方喜三旌召俄興一鑑悲西風吹涙眼吾豈哭吾私睿主熊飛日如公舊學臣忠言關國計清節映廷紳歳月身多外江湖澤在民當年遺直歎千古更如新送甘甥可大從定叟弟之桂林季也有行役我思獨悠悠親朋非不多子能從之遊挂席上湘水青山挾行舟籃輿問嶺路政爾荔子秋人言桂林好頗復類中州近郊多勝概雉堞冠層樓待渠幙府暇時與同㝠搜吾子有令姿胸中富九流處世多齟齬但當付滄洲超然擴遐思詎可耳目謀願為百錬剛莫非繞指柔昔人不吾欺子盍誠反求預想他年歸此地復綢繆刮目看二子一笑紓百憂望後一日與客自水鄉登湘南月色佳甚翌日用鄉字韻簡㳺誠之一雨五日餘南州三伏涼喚客近方沼笑談引杯長相將復登樓月色在屋梁念我懐百憂忽忽髪變蒼及此少自舒觴詠未可忘孤光凛下照景妙無留藏沙邊數白鷺欲下仍翔徉羣動亦自得如我四體康平生子游子虛白生吉祥官舍並樓居登臨筋力强未可效王粲居然思故鄉清明後七日與客同為水東之游翌朝賦此平生山水癖妙處只自知夙約常寡味邂逅愜心期幅巾與藜杖安歩隨所之朅來坐官府頗覺此願違城頭望羣峰欲往類絆羈三春苦風雨晴日一伸眉沙邊散車騎竹輿從嘔咿獨與三四客野服相追隨亭亭俯空曠洞古探瓌竒懸崖隱日月幽壑蟠蛟螭澗水雜鳴佩松風發清吹興來即傾酒語到亦論詩聊揩簿書眼賞此閒暇時所歴固未厭所感多餘思昔遊木葉下今兹緑隂肥江山雖可識歳月迺如馳素餐豈不念懐安敢云私歸來耿不寐欹枕聽晨雞題榕溪閣寒溪澹容與老木枝相樛其誰合二美名此景物幽太史昔南騖於焉曽少休想當下榻初清與耳目謀品題得要領亦有翰墨留我來訪遺址密竹鳴鈎輈稍令舊觀復還與佳客遊樹影散香篆水光泛茶甌市聲不到耳永日風颼颼所忻簿書隙有此足夷猶平生丘壑願如痼不可瘳雖知等喧寂終覺靜裡優更思濯滄浪榕根浮小舟靜江歸舟中讀書南風駕小雨羣山淨如沐吾歸及新涼所歴慰心目軋軋柔櫓鳴卧見山起伏推枕意悠然還取我書讀平生領解處於焉更三伏老矣百念疎但欲斯境熟向來五嶺游目力半吏牘小心了宦事終覺媿惇獨世路自險夷人情費追逐翩翩孤飛翼息䕃望林麓張子真楊政先吳德夫追路湘源賦此以别驅車出嚴關觸熱歸路長一雨羣物蘇吾行亦清涼灕水自南去湘流正洋洋眷言二三友跋馬勤送將蕭然短長亭每語夜未央張子名家駒千里方騰驤楊郎嶺中彦而能歛鋒鋩延陵舊所熟氣味固難忘向來幕府遊三秀麗齋房居然出别語分袂楚粤鄉人生會有别勿悲參與商獨有贈言意臨岐更平章風俗易移人官途劇羊腸千鈞有不守決去飛鳥翔要當勉自持詩書作金湯他年相會處刮目看増光為謝桂父老無澤留一方惟餘石間字時與洗苔蒼送端臣桂林先生兼簡信叔帥座朱芾驂鸞碧玉林琢句白瓊瑤人間埃􅅽盡星羅數分毫程公列仙長磊落粹露􅀈玉歴發太和泓君同逍遙刻巖栖烏鴉陟巘透紫霄南風無賦鵩即是宣室招堯廟明祀崇千載荒山拱萬靈挿天巉絶壁飛瀑下空庭繪事存淳古真風寄杳㝠蘋蘩何以薦帝德日惟馨送但能之守潯州循吏古猶少嶺民今未蘇丁寧煩詔㫖推擇得吾徒根本誰深念詩書計不迂惟應敦此意豈但應斯須送陳仲思參佐廣右幕府舊説桂林好君今幕府遊江山資暇日梅雪類吾州煮海何多説安邊更預謀政應勤婉畫不用賦離憂寄趙漕想得昭潭上兒童夾道迎皇華今日使竹馬舊時情梅蕊冬前折山光雨後清使君桃李客當為駐車旌和正父游榕溪韻隔岸高低露碧山眼明便作故園看直從榕影度輕舫更傍溪光撫曲欄鴻雁來希空悵望梅花開早朱初寒喜君萬里同情話明月清風足佐歡仲冬朔日登湘南樓復用正父韻歴遍江南處處山嶠南還得倚樓看化工此地無餘巧爽氣窮冬更逼欄官事隨時寧解了書盟平日未應寒相逢自有論文樂只把空杯未礙歡六月二十六日秀青亭初成與客同集亭成勝日好風光佳客攜將共一觴蒼壁挿空千古色高松䕃堤三伏涼網魚縷膾寒氷玉剥蓮煮鼎甘露漿便覺故園渾在眼秖應灕水似瀟湘鹿鳴宴從昔山川誇八桂只今文物盛南州秋風萬里攜書劒春日端門拜冕旒聖世取才先實用儒生報國豈身謀且看廷䇿三千字為寫年時畎畝憂次趙漕贈王昭州韻煌煌金節按江城驛路梅花正小春聞説爭迎來滿道定將何術慰斯民憇棠異日誇南國懐橘歸時拜壽親流澤㑹看均一路要令治象復熈淳送韓宜州頃年未識宜州面己信諸賢品藻公幕下從容逢益友胸中骯髒本家風一麾且與寛彫瘵華髪應無慕勇功從古安邊須自治人情初不間華戎自烏石渡湘思去歳與朱元晦林擇之偕行講論之樂賦此朝來一舸渡湘水山色横秋真可憐忽憶去年聨騎客沙邊搔首意茫然韓廷玉築亭於官舍之旁園中故多梅㑹有飛雪予因題其匾曰梅雪蓋取少陵詩語而劉公貢父送劉長官掌廣西機宜嘗用此事有雪片梅花五嶺春之句今廷王適為此官於以名亭抑其宜也亭邊花木多吾弟定叟舊植故於首章及之城隂一徑自深窈花木成行菊遶籬細説當時始經事夢回春草費相思南州要是梅開早北客巡簷偏眼明一夜飛花來㸃綴新亭喜復得佳名眼底風光正自佳滯留何必歎天涯日長况是文書省且與閒吟對落花嶽麓道旁見穫者腰䥥聲相呼十百南畆穫婦持黍漿饋幼稚走雀躍辛勤既苦為幸此歳不惡王租敢不供大室趨逋約雖云粒米多未辦乃升合姑寛目前飢詎有卒歳樂樂歳尚爾為一歉更何託書生獨多憂何以救民瘼和張晉彦遊嶽麓齋舫臨烟浦雲屏入畫圖日曛花炫晝風定水明湖布穀催春種提壺勸客沽湘中無限景賦咏繼三都橘州小山幽桂叢歲暮藹佳色花落洞庭波秋風𣺌何極題城南書院四首新竹成林蕉葉青隔籬深處有蟬鳴晚涼更覺長堤靜自遶荷花待月明新涼物物有精神靜倚書窓聽雨聲忽憶子綦元未解强令天籟太麄生移得幽蘭幾本來竹籬深處手栽培芬芳不必紉為佩月白風清取次看睡覺西山月正平荷香不斷晚涼生園中雙鶴知人意已作金風警露聲初夏偶書江潭四月熟梅天頃刻隂晴遞變遷掃地焚香清晝永一窓修竹正森然城南即事活泉細引忽盈溝自遶書齋㶁㶁流添得眼前無限思石橋竹塢對清廬枕邉風雨過今春起歩園林己緑隂更向坡頭望湘浦水雲無際遶遙岑次韻范至能峽中見寄合綰絲綸對紫薇郤捫青壁聽猿啼祇應許國心如石蜀道如天亦可梯偶作世情易變如雲葉官事無窮類海潮退食北窓涼意滿卧聽急雨打芭蕉從鄭少嘉求貢綱餘茶貢包餘壁小盤龍獨占人間第一功乞與清風行萬里為君一洗瘴雲空茗亊蕭疎五嶺中修仁但可愈頭風春前龍焙令人憶知與故人風味同益陽南境松杉夾道鬱然父老相傳忠定張公為邑時所植也其間亦有既剪而復生者作詩屬來䕶持之夾道松杉半老蒼前賢餘澤未應忘君看直幹連雲起豈但當年蔽芾棠登山有作上頭壁立起千尋下列群峯次第深兀兀籃輿自吟詠白雲流水此時心賦石廪峰巋然高廪倚晴天獨得佳名自古傳多謝山中出雲氣人間長與作豐年過高臺攜信老詩集蕭然僧榻碧雲端細讀君詩夜未䦨門外蒼松霜雪裡比君佳處讓高寒送李崧歸閩二首歴數勲賢後如君到眼希胸中藴金石筆下出珠璣傾蓋嗟何晚臨流又送歸他年儻相憶尋我釣魚磯公事妨開巻遐征念索居能來數月欵端為百憂紓師友洛川上人才元祐初歸來有新益不惜幾行書除多登仲宣樓懐土昔人志傷時此日心長江霜潦淨故國暮烟深訪古多遺恨憑欄更獨吟細看前浦樹生意己堪尋劉勝因自襄陽過予渚宫於其歸小詩贈别骯髒寧多忤棲遲久倦遊折肱諳世味袖手惜良籌日月隆中晚風烟峴首愁登臨還慷慨還解寄詩不和元晦後洞山口晚賦石裂長蕂瘦山圍野路深寒溪千古思喬木四時隂更得尋幽侣何妨擁鼻吟笑看雲出岫誰是此無心自方廣過高臺兩寺清聞磬羣峰石作城風生雲影亂猿嘯月華明香火逺公社江湖鷗鳥盟是中俱不著俯仰見平生憩清風峽扶踈古木矗危梯開始知經幾攝提還有石橋容客坐仰看蘭若與雲齊風生隂壑方鳴積日烈塵寰正照迷從此上山君努力瘦藤且喜得同攜謝楊文昭主簿寄詩楊之父紹興間倅建康不屈於劇寇而死迺翁詈賊氣如虹千載衣冠起愞庸雙廟已應同卞壼佳兒今喜見甄逢傳郵贈我凌雲句斷簡知君學古胸忠孝可全須力勉䇿勲寧復羨侯封楊公血食金陵政與卞將軍祠相望遊道場山次沈國録韻玻瓈盆外起千鬟路入空濛紫翠間心宇最便天宇逈眼明偏見野雲閒寒泉宰水留千載清磬踈鐘度兩山我亦湘城三徑在湖邊歸去洗塵顔早秋湖亭澤國今年秋氣早湖亭清悦獨徘徊翩翻荷蓋隨風舞蕭瑟松聲帶雨來靜處豈云身計得吟邊但覺歳華催悠悠逺思憑誰寫多病新來罷酒杯雨後同周允升登雪觀一雨端能減百憂肩輿徑上最高樓山容淨洗無窮碧江水新添自在流己覺春隨花片老不應身似賈胡留烟蓑風笠南山下正好歸與看麥秋題邢使君釣隱使君卜築傍芳洲短檻踈籬處處幽風月隨時供燕几笑談終日在中流翩翩影落來宥雁漠漠寒生欲下鷗城市山林俱寓目問君底處足消憂和查仲文雪中即席所賦方帽衝泥有客來九衢俗眼莫驚猜一樽相對十年外兩腳新從萬里回壯志未隨衰鬢改孤懐良為故人開雪中細訪梅花發不用匆匆羯鼔催襄州䕶漕使者張侯寄示所作快目亭記辭多慷慨予讀而壯之且想斯亭觀覽之勝為賦此聞説君家快目亭溢江直上起千尋昔人事業規摹在故國山河草木深世態從渠翻覆手壯圖還我短長吟㑹須一展平戎䇿始稱平生灑落襟次韻周畏知問訊城東梅塢三首城東幽事如許一見定勝百聞苦雨斜風無奈斷橋流水餘芬春意新回庭樹角聲莫起江城更著水仙為伴真成難弟難兄短笻偏歴溪山欵段時尋鄰里遇酒聊一中之得句亦偶然耳和安國送茶官焙蒼雲小卧龍使君分餉自題封打門驚起曲肱夢公案從今又一重登樓風雨經旬只閉門朝來倚檻己春深不知花片飛多少但覺江城滿緑隂兩宋名賢小集巻二百十一
