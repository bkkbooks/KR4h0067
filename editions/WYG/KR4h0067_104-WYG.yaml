body:
  text: 兩宋名賢小集巻一百四宋陳思編元陳世隆補紫薇集簡范信中詩人例窮君不然畫堂繡户羅嬋娟當時乘醉出三峽至今妙句留西川底事新來多退縮梅花滿眼看未熟便期載酒約來冬似要惡詩相抵觸曉來寒凛似中原君忍閉門清晝眠我病猶能相追逐知君心期總不俗但攜二妙喚諸公一醉落花吾亦足再簡范信中益謙呈張仲宗昨日之游樂不樂主人愛客客不惡梅花逺近遍川谷雨凍風揉未全落明日之游復何如城南城北梅更多對酒我不飲把琖君當歌酒肉雖勤主人費且幸我黨頻相過梅花縱落君莫歎與君同往海南㟁花開花落都㡬時君醉我醒人得知相逢一咲俱有詩如何不飲令君嗤連得夏三十一翼兄弟范十五仲容趙十七頴達書相與甚勤作詩寄之閒居病亦侵世務每絶念猶憐二三子從我久未厭書來不改昨意苦辭亦贍問我來何時期我早㑹面我行但謀食欲去復未便要當相就居同止山水縣讀我所傳書亦足滿素願開巻忽有得如飲醇酒釅吾聞古志士學也蓋有慚欲升夫子堂不摘屈宋艷倒籬望青天豈必在窺覘他時倘從容此語子可驗送錢子虛撫幹役洪州赴新任二首君不求時用居然如病夫經過閱嵗月相伴走江湖白玉終無玷寒松保不枯同官多勝士總為致區區老矣吾無用歸歟子未宜端能出竒䇿略為濟斯時悶有書摭眼閒須笏拄頥西山有爽氣當報故人知問乾元珪老問訊乾元老江頭㡬日回還應艤船待不作御風來漫有經旬别頻思一咲開庭前荔子熟尚要著詩催謝宇文漳州送茶暑氣侵人病逾劇空堂坐調出入息漳州太守送茶來玉圭小鳳俱無敵太守憐我病無語故遣此茶相勞苦千金一瓶君未許百金一盞如潑乳其他鬬芽未足數下視紛紛等塵土病夫未飲病先愈坐覺爽氣生肺腑城中車馬閙如雨更有藥善如君否謝楊紹祖惠玉友我來閩中居中熱久斷酒端居苦無事神氣思内守故人憐我病小缸送玉友極知此不凡嶺海見未有感君意則重納約况自牖欣然洗盞嘗不待捧素手空杯貯玉色一洗市沽醜坐令百疾去敢復望升斗從今破酒戒可以入道不聽雨日數歸期似有期故園無語說相思芭蕉葉上三更雨正是愁人睡覺時末利香如含笑全然勝韵比酴醾似更髙所恨海濵出太逺初無名字入風騷夜凉早起尋李貽季陸慶長所惠詩有作夜長忌隂晴忽聽簷雨寂空房閉重門凉氣通枕席欣然欲攬被如覔舊相識那知庚伏内得此睡通夕起尋兩君詩令我生氣力成溪長桃李已自除荆棘逺遊得數士舍此百無益挑燈視皮膚不願蚊齩赤因之不復寐為子増歎息聞大倫與三曽二范聚學并寄夏二十一四首我思臨川居欲往意未慊每懐三千子嵗月多荏苒後生慎所習正是絲在染未須極軒昻且須就收歛舉動思古人此志豈不逺才雖有髙下事亦要強勉願為江海深莫作盆盎淺世人争錙銖未語色已變居然面頸赤自處亦已賤寧知烈士胸渠自有志願一介不妄取萬鍾我亦倦古人有伯夷名冠太史傳見人輙有求所以百慮非但能守簞瓢何事不可為愚夫飽欲死志士固長飢出門萬里塗其亦慎所之莫惜一日勤而忘終身憂農夫力耕作其必嵗有秋目前不鹵莽久亦有倍收小年不努力長大復何求别林氏兄弟二年住閩嶺所閱足青紫那知萬衆中得此數君子相從不我厭但覺嵗月駛髙論脱時俗如風濯煩暑出處雖未同氣味固相似人生有低昻所畏為物使要當啜英華不必計渣滓他年肯相尋在彼不在此將去福州委曲隨人久未甘倐然午枕睡方酣功名到此終無分身世從來百不堪為已功夫今粗曉住山活計久相諳他時不用求三徑投老才須住一菴初秋凉風驚木葉意欲作深秋客病渾如昨囊空却自由因閒得飲酒端坐勝封侯寄語平生友當能為我謀嚴州九日坐上贈胡明仲常子正今年得交舊九日㑹嚴州城角風雲暮天涯景色秋功名有長鋏行李付扁舟苦恨三年别聊因一咲留病添文字懶老耻稻粱謀活世須公等吾生便可休贈了老前年見公滄海上法令堂堂萬騎將今年見公浙河東猶是當時舊老翁送行更有天童老騏驥齊驅獵霜草野狐射牛膽欲破不但獨噴羣鳥倒我衰且病百念絶便得從公不為早忘情遁跡亦未是言與不言俱一掃世人擾擾不歸家公行問渠有何好將發金陵奉懐張彦實老矣君何往翩然我欲歸文章晚未用嵗月事多違江接鄱陽路風吹游子衣不應蘧伯玉獨悟昔年非孫首之短堂孫郎囊空意且滿自謂身長才則短以短名堂堂未成長短是非俱不管嚴州一見鬢蒼浪贈我新詩如夜光何時到君短堂上更話如今歸興長朱成伯秀野堂客愁固多岐我懐亦蕭散連年尋故人見子二水㟁官居少閒暇嵗月忽已換有堂名秀野未入俗眼看得名自君子可當清净觀未能熟桃李且自飽藜莧荒凉城一隅初不越門限脱身少年場念此已熟爛嗟予老病侵閱世蓋多難相逢黙無語自足洗憂患窮冬足雨雪近市乏薪炭時來正堂堂尚得一笑粲次秀亭韵舟車來往閙回環今日陪公得暫閒漸喜著身人迹外勝如隨衆馬蹄間縈紆細數溪頭路蒼翠遥看雨後山正恐朝廷須舊物不容常此面孱顔舟行至桐廬乘舟待潮發一日到桐廬物色寒初甚溪山畫不如往來真是夢親舊不須書猶賸鴟夷在時容託後車示兒忍窮吾有味雕句汝無功客舍囂塵裡春隨浩蕩中初無買山費直與住菴同更想顔回宅簞瓢亦屢空嚴州春曉居閒病常嬰出郭春已老㣲雨净新綠轉覺原野好故人各漂散頗恨來不早尚有壁間詩猶堪冩懐抱將適三衢而七弟欲往臨安臨行作詩奉送弟要題詩别人還勸我留如何南去路更送北行舟處事須逺略擇交當廣求秋風理歸棹為我上衢州擬古樂府髙堂陳八音同聽不同樂狂飈送鴻鵠萬里翔寥廓一去三十年事事非前約當時綠綺琴塵埃無處著時節非不久此意但如昨將往城南觀音寺阻雨未果野寺他年别溪山浪作秋初凉頗宜出小雨故妨游僧老渾無念田荒近不收猶思五更懴清切似蠻謳求趙表之墨超然堂中墨如㦸支撑宗門渠有力參得諸方一味禪以此示人人不識病夫見之喜折屐便欲投詩恐無益主人不吝是家風㑹見琅琅送珪璧陋巷陋巷客自稀短日寒未到感君時一來得以慰懐抱論文有根柢落筆清且奥如歌五絃琴促軫有餘操黄花開正繁薄酒可相勞請君尋此盟妙處同一造聞蔡九弟十四弟到行在苦懐我表弟别久費相思愛客能忘酒長貧不廢詩每䝉高士喜終少貴人知試問游吴興何如在蜀時窮臈有懐氷霜到窮臈伏枕久亦倦思公如和風咫尺未得見人生無賢愚各自有志願但得所趣同公固不我賤何須肱九折始見金百鍊平安望中原棲息各異縣尚欲從公遊衰年保窮健贈人堅卧因循欲過冬故人無復馬牛風得君好句能忘病笑我長饑不諱窮清夢肯嫌齋舍冷破囊常伴酒杯空新正所願長窮健剰作歌詩凖備公夜坐所至留連不計程兩年堅卧厭南征荒城日短溪山静野寺人稀鸛鶴鳴藥裹向人閒自好文書到眼病猶明較量定力差精進夜夜蒲團坐五更簡李巽伯愛酒舊無敵能詩新有聲荒城時過我長句屢尋盟往事十年夢生涯三尺檠却憐陶靖節著意賦閒情官閒贈人自喜閒官不計年月叨㣲俸勝歸田藥囊往往充詩藁米劵時時當酒錢忍病作勞吾不厭對人無語子差賢不須更見盧溪老㑹得安心即是禪病中得舍弟信頻通􅄔女訊兼得㑹稽書嵗月呻吟裡文章因睡餘百年判憔悴萬里付迂疎尚欲身強健相從得定居寄米希真幕下諸侯老㣲言衆不聽祗應有餘論時復注前經郡古疎還逺官閒任醉醒主人鵞可換更為冩黄庭山城雨山城雨雪繁春氣來不早思君如和風未見意已好時䝉枉車騎笑語得傾倒我能知子賢子亦憐我老舊友半鬼録在者跡已掃慨然念平生令人惡懐抱相從飽吃飯此計或未保東游有前約預恐别草草豈無一言贈妙句冩黙藁出户仰髙山猶堪慰枯槁即事經旬困炮煮今夕有㣲風市井囂塵外溪山嘯傲中秋凉亦不逺吾道恐終窮凖擬閩中士今年一笑同宿昔宿昔尚煩暑平生悲逺遊長貧不貰酒雖健嬾登樓晚節勞千慮經年走數州新凉事事好只是廹防秋謝人送詩堅坐少愉樂欲行還滯淫時䝉七字句可慰十年心嵗晚日晷短天寒霜雪侵主人不厭客敢避酒盃深寄京口使君使君鎮京口隠若一長城詩律有同社溪山聊主盟囂塵不掛念鷗鳥自忘情曾記貧交否衰頽判此生再贈􅄔女勝京口公來嵗已秋閒雲出山寺好月掛星樓往事付清話故人多倦游十年浪奔走今日為公留贈友子來已冬深僅得數夕欵寒窓聽談道未厭白日短從來不飲酒萬事付茗盌别去今㡬日荒堦月猶滿游山世味日可厭兹游那得忘稻田疏宿雨木葉犯新霜潦倒交遊在追隨氣味長僧窓有静供茗盌侑爐香江梅江梅消息未真傳㣲露芳心几杖前不信氷霜能作惡要令桃李便争先斜枝似帶千峯雪冷艷偷回二月天凖擬從君出城去竹輿仍勝百花韉夜深歸家聞隣家小兒讀書可喜有作還家更寒三鼓餘鄰家小兒猶讀書王侯將相乃無種紈袴綺繻寧似渠北風颼颼霜被草聽汝讀書聲轉好莫言翁媪惜膏油有児如此可無憂雪窮巷無人對雪小詩自可逃禪看取一年三白喜歡共入新年堅坐正宜養病開門便當幽尋一夜雪深一尺與誰取酒同斟報渾菴春草仰生活春暉常照臨不知欲報徳何以見此心江漢有時竭此心無淺深魏氏有令徳傳家非獨今結菴在山阿日瞻松柏林仁風被逺邇猛獸不敢侵今子守直道意往無﨑􅋂遂令此鄉人得聞金玉音我行時序晚回望西山岑延頸長太息聊為純孝吟雪夜破屋除燈雪自明案頭無用讀書檠老慵已慣跏趺坐昏夢尤便松竹吟知有故人來問道久無佳興與尋盟明年更有閩山興但辦行纒莫計程周仲固尚論齋周侯不出何所為閉門讀書心自知簞瓢陋巷君不厭讀書萬巻能忘飢上叅羲皇下秦漢采取英華饑脫腕是非榮辱姑置之忽若乘舩到彼岸古人之學有傳授君生寂寞千載後問君何以識古人袖手無言坐清晝以此讀書為尚友是事𣺌茫人信否人信不信君不問松柏固難生培塿朝來落葉滿荒城青山照人溪水横往來車馬作塵土想君深夜讀書聲重陽前一日作凉風策策傍江城道路猶寛逺去程秋晚情懐常索莫夜長更漏轉分明未償臍腹三年艾不負膏油二尺檠明日黄花一尊酒苦思親舊與同傾送曽𢎞甫知黄州才過清明日更長竹輿頻出度浮梁雨侵田水連溪白春入山花帶密香數有故人相勞苦不嫌俗事且窮忙今年尚有湖湘興不待秋風便促裝謙上人清湍亭道人結菴殊未就先起小亭山左右不將溪水濯塵埃且以清湍為客夀雲烟映靄作春濃草木堅枯辦秋瘦客來相對兩無語豈有浮辭問時候一生行脚如夢覺天意似於君獨厚我今留滯未得往想像此亭如故舊再三伸紙誦清詩已勝開尊飲醇酎上人録寄彦禮彦冲原仲諸公題詩簞瓢可樂不淡泊蘭菊重生足滋茂他時有暇更分題此遊未落諸公後送詹慥秀才子今來㡬時嵗月忽已晚今當别我去道里初不逺冡山霜正濃馬草寒更短何以奉親懽一咲和氣滿邇來遊學士已見如子罕讀書要躬行俗事不厭簡故鄉多耆儒歸日正可欵時能寄餘論尚足起我懶兩州多便人自可數往反静軒紛紛逐人行擾擾與事競不知一世間能得㡬人静公今黙無語種種以静勝人來漫相接事至聊復應開軒道院旁足以補我病日髙公事散轉與静相稱千載師蓋公此理久已證爐烟裊暗窓松聲韵鐘磬簿書勿勤來公方在禪定秋牕遣興十首造物何繁敷雜然呈萬變潜飛愜㑹心顯藏亦遞見人生事機巧雕鑿失性善碌碌塵寰事輪環走精電蕭散眄庭柯商意集㣲霰晴枝颭小鳥啁啾振毛羽凉颷墮寒花静中有真趣倚檻看浮雲隨時成散聚世變無常境心定自安遇棐几雜圖書幽事能畢具朝擁羣書坐所樂常自足聖賢重出處理本無偏曲志行道合尊安貧未為辱壓架富巻帙縱情無踡跼窮達各有時此意當勉朂東園有喬木翳翳凌霄漢嵗月變虬枝雨露滋霜幹濃隂䕃書屋伴我同昏旦根株視百草秋風已萎爛良材際時用未忍付樵㸑抱璞淪巖阿失懐亦自寶豈無用世心遇合貴得道連城重白珩聲價先傾倒瑕瑜混沙礫莫訝荆山老㑹當遊勲華兀圭賛熈皡旦奭久不作依然三代民一善孚萬端不難風俗淳上士貴抱負修已在立身進退各有據宇宙任屈伸願言勵厥修學以荅君親門外一渠水清清自泠泠濯纓偕素侣鬚髪無遁形春風起層波鵾化失南溟縠紋亂星斗泥沙混窅冥澄清當有志天地還虚靈知者尚明察不為物理宥吾儒任學術精力事研究至人邈難繼得亦瞠乎後庸盲終溟漠全天亦自厚大化無殊途何事朴與秀寒氣生户牖草木變輕黄南郊詢秋畦豐稔薦滌場八口娱妻孥温飽樂嵗康簞瓢亦自得憂樂各相忘所以常忻忻安問無儲糧我生事柔翰中懐異好尚瀟洒逼嵇阮功成薄瑜亮白衣本山人置身豈疎放途逢醉尉呵未具封侯相亭亭千仞松當破萬里浪次韵錢遜叔泛舟虹橋半篙春漲綠平溪二月江城草色齊舟比蜉蝣千頃外身同􅦐鷃一枝栖野橋栁綫斜風軟曲檻花光夕照低却訝探驪人不至清樽畫舫倩分題春暮渡江霽色春江上滄茫一棹通水隨天地濶山入畫圖工薄靄凝新碧輕風墮亂紅片帆迎返照叠嶂路疑窮渡鸎湖至溪上即事宿霧重隂傍晚桴日斜風定渡鸎湖陂塘浩淼水光濶烟寺中流島嶼孤滿眼波濤迷客泛一行雁影帶雲徂到來荒舍未岑寂寒樹依依閙晚烏絡繹蕭蕭徧里門支機嘉事自天孫七襄曉織憐花譜百室春梭饜夕飡誰檢吴闕嵗月猶飛楚縠照軍屯摻摻女手還持作佳麗江南第一論湖水安瀾似鏡明昔年曽向鏡中行侵晨浥露來花市落日流風倚醉楹俯仰繁華餘暮色蕭條高寄但秋聲應知節序猶遷轉撫劍如何教未平紀棲賢山讀書遲日欣欣山景妍攜琴吟咏翠㣲前行厨燒筍粉鋪色髙閣看梅雪白天午罷抛書曳短杖雨來擁巻聽幽泉一春洒落韶光足他日芳懐得復然秋日康山東歸整檝凌晨問所之鄉園迢遞水東遲歸舟但信溪紅蓼别夢還牽山翠眉安穏秋風三徑竹躊躇行李一囊詩解維猶有留題處𤓰葛縈懐不自持中秋雨雲初霽放晴空乍捲珠簾望月宫夜静笙簧何處發玉樓猶記月明中泱泱秋水荻蘆輕徙倚樓頭待月明紅燭燒殘白墮醒秋風颯颯獨闗情長嘯夜泊春烟失晚樹柔櫓翠峰眉埜徑尋山暗艤舟問路岐敲詩吟入甕㸃字黒前池把酒懐前哲蕭條一夕思月夜閒步聞笛挑燈讀易後乘月到溪前野犬聲如豹秋蟲吟似蟬光寒人意静影澹物情妍更聞村笛逺幽意曲中傳遊石筍菴石筍殊峰精舍幽瘦笻踏向碧雲遊天然青茁層崖裡玉版參來㸃石頭夏夜宿乳竇峰峭壁凌空靄氣浮山泉滴茗暗香流炎雲不到氷心静好句峰前一簟秋兩宋名賢小集巻一百四
