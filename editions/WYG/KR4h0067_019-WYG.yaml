body:
  text: 兩宋名賢小集巻十九宋陳思編元陳世隆補草堂集魏野字仲先陜州人母夢引袂於月中承兔而生嗜吟咏不求聞達居州之東郊鑿土屋方丈曰樂天洞彈琴其中歌嘯自得性不喜巾幘見賓客惟紗帽白衣出則跨白驢真宗聞之累徴不起卒年六十詔贈秘書省著作郎上澥梁潘學士十韻盡繼祖風流其如鬢未秋石渠陳表讓山郡折資求舜禹城分界神仙嶽映樓淫祠隨處毁學校逐鄉脩密疏多親寫狂詩少自收通宵營有樂度歲獄無囚酒席圍紅粉鹽池照碧油藥同方士煉壺共野僧投瓦礫今徒獻瓊瑤舊未酧幾多懷抱事欲去復遲留寄逸人陳孟姑射山前住朝昬事若何爐消文火疾琴斷武絃多絶粒身彌健酧盃性轉和相思與僧約春暖杖藜過詠懷道心雖博愛遇物忽難兼樹更因巢惜雲曾為月嫌酒中寧有感詩裏覺無厭漸老成何事踈慵病轉添贈安邑知縣方寺丞尋常少徃還門靜似居山書為傳家秘琴因國忌閒坐衙更鶴氅行樂到禪闗約我休官後隣居竹樹間嵩嶽十四韻東西南北嶽峻極盡難羣有感生賢相無偏象聖君四方觀王氣萬壑絶妖氛影入周公側聲曾漢后聞民居依巨䕃敕祭荅殊勲洞府高低接都城左右分烟蕪巢父水嵐濕許由墳頂濶星難轉巖高日易曛薜蘿藏隠逸瀑布濺耕耘帝籍頒辛讀天香附廟焚石危名啟母村古號將軍獻壽臨雙闕呈祥出五雲將仙存舊跡封禪表遺文終待移家住摩挲不厭勤謝益州同理劉大著寄惠笻竹杖雖勝斑竹與紅藤絶逺羸軀豈易憑爭得化龍歸錦水老身騎去見心明和孫虞部見贈朝客惠詩牌山人愧不才旱田春雨過暗室夜光來燈下吟三復琴中鼓數回性愚非賜也微㫖尚難猜和陳推官見贈白髮朱衣好寫真鶴行佐幕異常倫勘書幾見招閒客斷案常思出罪人棠樹政聲僧説逺蘇臺實録世傳新仍知公退無餘事惟只焚香禮北辰張生示余味菊詩且古之作者遲晚之意頗同體狀之功未盡因書一絶以荅之正當搖落獨芳妍向晚令看露泫然還似六宫人競怨幾多珠淚濕金鈿送薛端公赴石蜀均輸兼呈同理劉大著二首金魚新躍綉衣邊暫委均輸出劔闗九折路危驄馬快一方塵靖木牛閒諸侯迎送威風下赤子歌謠喜氣間更羡錦城劉大著海棠花裏恣追攀旌斾悠悠出陜時白頭人送倍依依蜀川尚憶蒲盧政蠻洞先驚獬豸威祖席香濃花未老行厨味簡笋初肥公餘若薦相如賦郫縣梅山好發揮貽不出院真公閉户頭初剃今來巳白頭五侯堂上見四海定中遊鑿井還臨砌栽松欲映樓人間思慮絶擁衲任經秋别後却寄三門發運卞寺丞兼簡臧推官共泛樓船去臨流羡送君烟中旗不見風裏樂猶聞李郭情堪並荀陳事豈分歸來村路上特地愴離羣送劉大著赴任益州同理金口親除向錦川一般監郡最榮遷從來才巳欺鸚鵡此去寃應雪杜鵑迎接僧攜笻竹杖歌謠民寫浣花箋移風定不妨吟笑絶唱宜磨玉壘鐫晨興夜長乞待得晨興耽睡童猶喚不應燒葉爐中無宿火讀書牕下有殘燈臨堦短髪梳和月傍岸溪雲洗帶氷料得巢禽翻怪訝尋常日午起慵能酧和知制誥孫舍人見寄也知皇宋足名人至論誰教繼後塵巳見世傳元相制將聞詔寫白公真紫薇星宿雖潛望紅藥階除豈易親野客多慚惠佳句强酬應信費心神送紫微孫舍人赴鎮長安長安千古帝王城鎮選詞臣自聖情三字帶來天上貴雙旄擁出世間榮朱衣尚列神仙步紅藥猶吟雅正聲預想前春遊賞處九龍池上百花明和郡侯咏雪時節初過打獵天山河一色曉漫漫梁王宴罷尊猶濕謝傅詩成墨未乾筆硯牕間寧覺夜管絃堂上豈聞寒須知祥瑞同霖雨莫把梅花桞絮看謝孫紫㣲同郡侯石太尉見訪誰共東郊訪懶魁一時文武盡竒才朱衣列到柴門住皂纛隨穿竹徑來乍照兒童戈似雪忽驚猿鶴皷如雷眼看兩地翺翔去溪上無因更接陪詠菊榮雖同雨露晚不怨乾坤五色中偏貴千花後獨尊馨非慚黍稷采合勝蘩蘋蛺蝶寒猶至鷦鷯靜亦存味堪資玉鉉光欲奪金罇帶霧藂猶密經霜艷更繁砌蟲侵有路梁燕識無門薜荔宜求友茱茰好結婚栽培勞婢僕服食教兒孫易犯方先哲難為繼後昆敗莎承亞朶落葉擁纎根雖異皇家瑞寧孤白帝恩延齡仙訣著應候禮經言不與羣芳競還知我避喧上知府石太尉二首陜城天險枕河湄茅土真風勝暫知雲露雖頻沾虎節雪霜全未染虬髭白霓放作軍中練紅袖行為帳下旗公暇不妨遊賞外佐僚時得一篇詩功名早歲立艱難今日堪消費百般婢僕出來皆會樂兒童生下便為官實封萬户應方足密賜千金旋巳殘暫輟坐棠閒豹畧尚嫌拘束動嗟嘆送三門發運辛寺丞赴闕山河仗忠信盡室去安然白浪為行路紅旗認坐船禹門辭有燕隋桞到無蟬豈羡乗槎客風流帶管弦䟽小渠分得前溪水縈紆遶砌流清汵雖可樂嗚咽不闗愁靜稱浮花片閒宜泛酒甌却嫌川上看時復有沈舟寄河中田沃兼呈李瀆徵君未遂去蓬瀛閒居在舜城七絲調似性萬巻記如名下榻留山相敲門認竺卿中條與太華牕裏見崢嶸送唐肅察院赴東川提刑按察東川十四州幾多山水似蓬丘清時應喜無寃雪贏得乗驄到處遊薛田察院洎壽師同宿三門開化院繡衣蕙帶方袍客身計雖殊性共閒同宿河心山頂寺數宵無一事相闗寄王谷推官登科二十載佐幙尚如初官為詩磨折家因酒破除青山應懶補白髪想慵梳别後長相憶何縁得共居值雨宿諤師房信步閒遊處妨歸路豈賖因琴避山雨和鶴宿僧家語直非闗酒眠遲不為茶共論塵世裏夜亦事如麻送王希赴任衢州判官秋江四十有餘程稱作紅蓮泛去情從闕到州堪羡處船中坐卧看山行和江南提刑王國慱見寄欲寫情懷難一一擬尋山水隔千千輸他吳越閒鷗鷺朝夕常親畫舫前送閠上人南遊山水興如燒難留住陜郊五湖携磬去幾夜在船敲犀跡來沙岸蟬聲起樹梢南方未回日何處暫編茅聞王衢王闢登第因有寄賀人間第一榮初得好科名萬乗登樓看三台讓路行搜羅空草澤宴會敵蓬瀛榜眼兼衣鉢偏依野客情衢為榜眼闢為衣鉢送宣筆與成都同理劉大著宣城綵筆真堪愛蜀邑花牋更可誇雅稱風流劉大著閒時題咏海棠花同晦上人遊羡陂羡陂寒水碧溶溶野客江僧望不窮更值晚來風雨歇終南一半浸波中還何學士詩集魏也非商也㣲言豈易窮看雖許朋友寫不倚兒童合在龍圖上難留蝸室中因思持納處還浦與珠同送高僧歸青社去指滄溟畔來辭翠靄間程遙過鳯闕家近見牛山紅葉飄行色清溪照别顔蹇驢看上處拄杖出柴闗聞孟周下第乙巳暮春天端居忽愴然一名傷祖聖三牓作遺賢我自空彈指君誰可比肩何由消此恨獨坐落花前送孫磻西遊貧居勝富貴况復是貧遊前路誰青眼高堂母白頭春山晴望好隴水夜聽愁早作歸寧計歡逢莫滯留詶閠師見贈絶唱和難繼因之久滯淹隔年詶不得終日誦無厭晒曝偏防蠧收藏别着籖偶吟聊報謝遲拙莫相嫌兩宋名賢小集巻十九
