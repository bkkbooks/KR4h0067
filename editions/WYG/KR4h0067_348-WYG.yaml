body:
  text: 兩宋名賢小集巻三百四十八宋陳思編元陳世隆補芸居乙藁陳起字宗之錢唐人寧宗時鄉貢第一時稱陳解元事母至孝開書肆於臨安鬻書以奉母時史彌逺當國起有詩云秋雨梧桐皇子府春風楊栁相公橋哀濟邸而誚彌逺也寳慶初李知孝為言官見之彈事一時江湖之士同獲罪者六人而起坐流配焉尋詔禁士大夫作詩彌逺死禁始解其詩有芸居乙藁一巻安晚先生貺以丹劑四種古調謝之陳子一畝宫居來七十年當其春盛時庭花發幽妍轉􅀈長養天青子垂簷前秋收備百禮冬享意則䖍年來風雨陵垣倒壁四穿上漏下卑濕敗隙遙瞻天三生結施仁覩此殊興憐捨以四條柱俾之撐危巔工師得大木裁製精且專尚欠櫨與楣况復棟與椽再干大檀越結此歡喜縁履齋先生下頒參附往體以謝有客號奚毒西來自赤水外負炎炎氣内存温粹美當年楊天恵夸大不絶齒解后段氏子即之殊可喜郤邪迺素心調中古無比世仰大醫王民瘼咨朝市二子願托身赴湯任驅使興憐維摩老遣前䕶衰毁病魔亟退舎怡然得安壘緬想蓄牛溲陋哉子韓子既非瞑眩劑厥疾無瘳理一念衛生恩百拜額加指友人新息滿月蘭砌惟傳書種子寶刀剃髪月初彌絶憐雅致髙於俗㸃易殘朱抺􅇟兒汎潮紀所遇六橋鶯花春色濃十年情緒藥裹中筆牀茶竈塵土積為君拂拭臨東風可笑衰翁不自忖少年場中分險韵畫舸輕移柳線迎侈此清游逢道韞銖衣飄飄凌緑波翡翠壓領描新荷雍容肯就文字飲烏絲細染還輕哦一盃絶類陽闗酒流水髙山意何厚曲未終兮袂已揚一目歸鴉噪棲栁賀友人絲桐復歸春到牡丹花事闌惜春約客遊湖山烟光萬態屬吟思白石清泉流指間雙成解后蘭舟駐索紙大書春草句成此風流一段竒樂事百年能㡬遇薄暮歸來雨濕衣買舟庇此十三徽小梢愚怮阻人意客散河梁燈火微方將清事夸兒婦桐君羽化無何有一壺千金何處尋愁絶瓠巴無措手要知煩惱所根株以愛布種上聲當芟除趙璧既返懽如初哦詩稱賀敢後歟適安恵糟蟹新酒偉哉無腸公横行占江湖㡬欲肆其雄上山攫於菟無端四五輩懐椒尋酒壚枕藉糟丘下醉魂呼不甦尚想横戈勇胷次與世殊開懐風味佳大丹液膏腴此寳君所儲何為貽老夫麴生挾之前爛然陳座隅當其左持螯不知竭此壺酩酊無何鄉軒冕不闗渠東望歌老饕前溪梅影疎題適安清湖寓居薰風軒檻曉晴開鬱鬱桐隂手自栽二水合流當户過一山分影入樓來琴逢良夜時揮㺯詩欲名家巧剪裁可羨一㕓安所適紛紛車馬汨黄埃燈花戲簡西隣西隣逸韵偕秋清瑶琴曽許月下聴神馳吟境日復日金飈轉矣寒此盟昨夕相逢再有約六花飛時湖上行短檠不密泄此意煇煌粟粟攢金英閧堂一笑前未覩信手閒閲燈花經一主飲席設林麓一主盍簪獲良朋便欲箋天檄滕六銀盃逐馬快此情曉來喜見萬瓦白迺是天宇清霜明得非分去聲薄誤燈花還復燈花戲老兄武兄恵藥昔人饋藥不敢嘗未達寒温良毒㫖朝來剝啄客問病寳劑盈奩意何侈便當三咽答殷勤兒欲先嘗還且止平生結交結以心豈有鴆人羊叔子多君相濟義薄雲友道綫絶今振起緑隂庭院趂清和抖擻精神迎藥喜秋懐又見街頭賣紫茱老懷擾擾類催租客來喜得吳江紙欲寫新吟一字無懐三山友人春前深惜别病後政無詩青又生菱角紅應熟茘枝魚甘賓席暖風逆客帆遲徒結連宵夢郵音負所期寄彭勿庵一片巴江月移輝到庾梅孤山春事早疎影望東回以仁者夀為韵夀侍讀節使鄭少師丙午一氣妙磅礴萬彚屈者伸方寸函太極宇宙皆吾仁端平改化絃真儒手洪鈞厥今扶公道皆昔夾袋人丙午成樂嵗甲午無窮春岧嶤閶闔雲蹀躞繡鞍馬細氈侍珠旒治道談帝者歸來西湖濱㟁幘松蓋下秋渌晚涵山揖以薦琖斝北第何三辭泉石懐緑野賦詩投金瀨俸入猶半有煇煌奉國節一粟迺不受贏副初何心國計要豐阜一丸濟世徳陽報期千夀㑹須煩潞公再與佐元祐枕上病與仇謀酒作成藥爐又復伴深更隣鐘自是常時聴纔到霜天分外清郭聖與黄希聲問侯山有靈芽可㸃金名醫未遇若為尋藥房掩晝情多感竹榻逢秋老不禁座上遍將唐帖掲架中閒取晉詩吟病懐行此相料理更接蘭交問訊音過三橋懐山臺賣花聲裏憑欄處沽酒樓前對雨時景物如初情自老夕陽波上燕差池題玉泉畫像次來軸韵六言鹿隨寒䇿穿雲邂逅靈峯時節含毫誰貌閒情莫盡胷中風月奉酬竹溪陳使君新詩墨梅之貺千里雙魚賁草堂中藏瓌異夜騰光興因東閣増懐想影落前榮不寄香四韵休誇毛穎伎㡬囘曽誤夀陽糚感公意過兼金饋慚乏瓊琚展報襄夀大丞相安晚先生嵯峨補陁山下視海水流風波定以稍穩穩濟川舟皇穹祐炎祚黍稌慶有秋繄誰致此祥上相今伊周赫赫命世賢師道輔前旒暨湯同格天康濟仰廟謀向來三邊塵化作和氣游横戈枕月戍擊壤歌西疇小春明日是泰階射斗牛見説老人星交耀光九州宣勸下紫宸彫盤羅珍羞北禁詔墨香昌熾頌魯侯鯫生戴厚恩一詩何能酬擬辦八千首從今嵗嵗投紙帳送梅屋小詩戲之十幅溪藤皺縠紋梅花夢裏閟氤氲裴航莫作瑤臺想約取希夷共白雲迎月尊酒貪迎月人生醉後嘉夜來窻不掩吹落一瓶花止酒示恚一病杯中物致危翰林何事酷耽之酒經若果神仙道不向青山立斷碑適安有湖山之招病不果赴蘭契蕳以詩金鑑而玉戛招邀訪逋仙劇飲擬投轄事有違人意十常居七八文園病政濃況復泥濘滑老懷欲舒散天心若是恝適安和附人生欲四并其難乎戛戛春工閙花栁春露阨車轄何當載酒歌對舞花十八樹色尤緑秀鶯聲尚圓滑作詩調維摩病安情已恝槐隠和附新篁褪錦衣風玉漸相戛香紅吹成塵春去誰管轄歌酒相留連一笑攜二八敗意林間禽饒舌泥滑滑可人非不來正坐天意恝挽梅屋桐隂吟社憶當年别後攀梅結數椽湖海有聲推逸韵弓旌不至嘆遺賢鬼收殘藳能傳業自誌平生不愧天航便雙魚無復得夾山西望淚潺湲挽林夫人劉後村毋懿徳遐齡世所尊濃薰班馬到諸孫疏榮花詰加宏邑賜第蘭堦侈異恩了了三乘言外趣如如一性定中存魚軒應向西方去知在蓮花第㡬根病中偶成平生謹樽酒投老更齊聖優游接嘉賓能使百憂屏可憐陶士行飲少亦致病豐下改舊容浮采滿青鏡升降氣失常醫經云上盛亟試黄昬湯要期勿藥慶朝來覺清爽臨窗發幽詠薄命薄命畏庚金那逢閹茂臨一尊花下飲半載藥邊吟食味同元酒形骸類槁林但存元氣在㑹見緑成隂消遣夜雨生寒換夾衣形臞貌悴嘆衰遲病中何物能消遣一榻揩摩十載詩題西窗食芹藳曽味西窗藁經年齒頰清細評何物似碧澗一盃羮一念一念無塵雜三更有夢回同他石橋老過水探寒梅買花今早神清覺步輕杖藜聊復到前庭市聲亦有闗情處買得秋花揷小瓶一榻一榻世縁輕毋將事物縈昔人言豈誤慧自静中生同清兄看猿藜杖同僧扣應門野叟閒放他猿摘果莫把白雲闗薄暮寂寥誰作侶耿耿一寒釭薄暮西風急呼童掩却窗秋夜懐康節無眠輾轉聴更殘心緒如絲起萬端煎藥爐邊童夢曉讀書檠下婦紉寒狻猊斷火香猶婉促織催秋袂怯單願子大賢康節語此情於我一般般冷泉凭闌此山泉石勝還思日日登那知三生前不是住山僧冷泉邂逅友人留飯倦叟尋芳藉短筇故人邂逅一樽同明霞浸水疑鋪錦彩閣横溪儼卧虹猿去復歸啼曉嶂僧來相伴立春風雪濤湍激開寒閘滌盡塵襟萬慮空黄路鈐詩來告别玉泉馳一紙八韵有情詩不肯面相别恐成離索悲江聲噴㟁拆潮勢激帆危舊制邊州守方令典轄司適安招遊湯鎮不來赴湯鎮古祠宫招邀及倦翁輕裘乘曉月駿馬逐東風野色觀無分春光病見攻行將迎誕日一瓣擬遙通寄東齋又復逢初度尫羸異昔時預愁臨丙戌所願值天醫剪綵裝茶果裁牋薦夀巵今年都告免湯餅却相宜寒吹寒吹西軒入罘罳設座隅腰圍同沈約指爪類麻姑静卧氊三疊清齋飯一盂曉來香滿室巖桂侈缾罏適安夜訪讀静佳詩巻情同義合亦前縁得此蘭交慰晚年旋爇古香延夜月試他新茗瀹秋泉君停逸駕談何爽客寄吟編句極圓可惜病翁初止酒不能共醉桂花前所適釣鼇東海頭經春醉一舟西溪抝罾入小鮮終日求庚戌秋作甲辰迤邐至今年藥竈殊勞日夕煎血氣任他銷與鑠向來詩骨已成仙耘業許印章四韵叩之近因稚子傳來意知許衰翁兩印章字畫莫教凡手刻形模當取古人長六書今獨行秦嶧三體空聞設漢庠後世陽氷能復古未知何日寄文房婚嫁㛰嫁債羈縻何時是了期每嗟身外累無出女和兒聴漏寒無夢添香夜有詩沉沉澄萬境梅影月初移六言簡耘業露溼螢光愈熾月斜蛩韵尤清微物得時若此人生可不求名束起束起仙翁肘後經且參思邈枕中吟夜來獨卧寒無寐憶殺黄紬舊破衾聞隣寺粥鼓寒釭旋擿動㝠搜泓玉摩研萬象愁鐵版響廊催早粥銅壺添水易新籌一聲鷄唱驚殘夢再聴鴉羣過小樓可惜秋光帷㡩隔料應河漢五更收汪夫人筵上口號今朝王母讌西池葱蒨祥烟靄繡帷坐摘蟠桃華夀席行看丹桂發孫枝魚軒錦轂花千疊鸞誥金鈴絡四垂好是殷勤千嵗祝老萊先酌後門楣翛然向來蓮社本遺忘勾引淵明造道場梵葉翻殘空佛印念珠持久現圓光秋花依約生涼意暑雨微茫送夕陽客退飯餘無箇事翛然一枕到羲皇風雨作無成老見過望望太平歌驚雨愁扃户聞風慮偃禾盃中醇止久瓶底粟無多畎畆憂時切天乎少警何葵窗送酒久藏斗酒謀諸婦婢子倉皇錯授醯邂逅芸居初止酒小厨海錯旋開泥望曉要知筋力衰多少一覺纔囘常了了隣鐘無奈五更何望㫁窗紗不能曉湖上即事波光山色兩盈盈短䇿青鞋信意行葑草烟開遥認路栁條春早未藏鶯誰家艷飲歌初歇有客孤舟笛再横風景無窮吟莫盡且將酩酊樂浮生朝宗餽食且復招飲相親逾骨肉何以結情深下箸覺可口同盤還上心撥灰君句就曝背我寒侵屢有梅窻約行將共晚斟送印寒鄧簿得闕西歸才藻世於家勾朱新職華學能如蓺未春到可生花野店寒吟月輕裝曉度沙君行余止酒一念一興嗟印寒取山谷蓺木印嵗寒句主示急須制作亭當喜成一絶博古圖中無此様繄誰匠意巧肧胎槐堂新送黄封酒便可衝寒暖一杯梅花怨為汪耘業賦庚戌嶸崢嵗事春將至寂寞梅花雪失期獨有垂楊伴幽怨豈堪臨水折長枝舊題隱者壁一絶妻嗔山犬踐園蔬兒釣溪魚餧鶴雛總道村居無外事有人庭下索詩逋酬成賢良莢獻璞無成戲弄環世間得失事相參劉蕡不得言時事半為當時記樸庵同友人汎舟過㫁橋登夀星江湖偉觀歸舟聴客謳清真詞意甚適分得江字奉寄季大著鄉執兼呈真静先生辛亥仲春將徂兮有客踵門曰風日流麗邀余共泛西湖之舽皮江切舽南去而忽西兮昨之折檻今復稀以成杠背蘇堤萬絲之綠隂兮望一簇孤山之青橦傳江切層峰叠嶂巉絶露天巧珠英琪樹發越地之靈一聲何處兮鐘橦篙師告余曰此夀星古刹上有竒觀開宇宙於八窗捨舟䇿枝步步巍峩謝屐殊勞雙回廊曲轉忽軒豁檐飛棟複青緑交輝心開目駭而揖西子之湖子胥之江觀者雜遝儵去鯈來余獨凭欄境與心㑹便欲馭風跨蜿虹胡江切烟雲萬態客擬狀而運思羿今老退且遜鋭逄莊嚴世界合爪讚嘆要使天下名上夸詠者睹此竒偉而心降風寒下山吹欲倒連呼春酒亟開缸簫鼓畫船徒自紛耳目何如美成清絶按新腔詩成肯對俗子哦馳介城南寄老龎舊挽汪隱若汪守泰亨父棲志浮雲小萬鍾帶經髙壟度春風義方莫問當年事十五男兒識阿戎又遺碣鑽辭掩夜臺修文空嘆逞餘才鹿坡明月成惆悵不見髙人自往來静江商宰書來且索鄙語要道其氷雪相看之意古調代書連牆不通問千里迺寄音平生於締交淡泊味最深吳山青神天應同碧玉簪尚憐風馬牛睽若商與參一聲南來雁西風又相尋君其念衰朽余亦懐瑤林一㢘了官事吟外時鳴琴識量萬頃陂文華實南金向來唐相璟疑事問崔琳諸臺貴得賢而肯捨此琛㑹晤喜有期寛此離索襟安晚先生送自贊太上感應篇帙首御題諸惡莫作衆善奉行八字輔以佑聖像一軸兩詩見意云公袞殊相念竒書寄布衣此心纔動處萬善要同歸本㫖詳敷衍奎題重發揮應憐蘧伯玉投老始知非稽首元真像當年助我軍龜蛇俾聖武龍鳳煥奎文劍聳燒空焰旗翻渡海雲上公傳琬琰分恵感殷勤雜言送歙硯廣香與友人有懐楊校書幼度我有龍尾雙槽之硯肌潤而若沐涳濛舊藏古香氤氲來自廣之東多君博雅舉以為贈三嗅而抹月批風要若鎔金加萬佛經上更須滴露㸃四聖書中往昔濃薰懐太史而今一瓣為南豐藜光下照人何在閣下閒花馥舊叢真静饋新茶菰乾黄獨乳酪約葵窗適安共享適安不赴葵窻詩來道謝次韵答之兼呈真静適安千載靖節翁秫向公田種萬鍾於我何肯戀五斗俸長歌歸去來田園聊自奉髙蹈世莫儔器局小管仲嗟余昩於時退思心每痛世人不我知小畦親抱甕唯有竹宫仙時復致一供四清山中珍凡目為之動黄獨前未識勿誚仲宣惷春茗摘新芽秋菰懐舊葑江南貴乳酪此意兼金重得君同下箸詩來再三諷韵意兩相髙文史嘆足用續貂愧狗尾敢與賢者共語奚較工拙年來此心縦軟飽黒甜餘無復春草夢可人招不來屬篇亟持送哭丹池王隱居憶昔相逢初一見即刮目出處雖不齊椒蘭則同馥論心到極處情愛踰骨肉十年傳成癖搰搰閉門讀髙志尊所傳而肯曲從俗抱此竒特操平步可金玉况復同窗友槐庭秉鈞軸事有反所料軒冕笑羈束縉雲邈千里訪道求辟穀食棗懐安期竊桃小方朔平生精進心自可登仙録一着偶失筭九書無復續洞霄有猿號丹池無鶴浴昨病失㑹𦵏生芻東望哭寄汪起潛簽判飛雲起伏龍大鵬運以風風雲一朝㑹前塞今迺通斂莫賢景略時哉使其逢腰錢與騎鶴事或有適同青門瓜吹香緑水蓮泛紅人物王謝家風雅眼底空參畫聳臺府宜䕶碧紗籠鄱江萬折東獨鶴摩蒼穹浮圖快一擲歸騎先賓鴻史記送後村劉秘監兼致欲見之悰昏瞶嗟耳目管絃堂上調世事每相背秋月虚良宵涓吉擬登龍疾雨驚風飄禰刺不得前東睇心旌搖近履傳康强變體筆更饒風響雖時接未若親聞韶憶昔西湖濱别語讀教條囑以馬遷史文貴細字彫名言猶在耳堤栁凡㡬凋兹焉得蜀刻持贈踐久要㑹晤知何時霽色審來朝兩宋名賢小集巻三百四十八
