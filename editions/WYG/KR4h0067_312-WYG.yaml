body:
  text: 兩宋名賢小集巻三百十二宋陳思編元陳世隆補南岳詩藁送陶仁父自古送行情味惡君行快似汎仙槎新班人少先投巻下水船輕易到家南浦不堪看草色西湖尚可及荷花諸公若問栖栖者為説吟詩兩鬢華移竹借居未定先栽竹為愛疎聲與薄陰一日暫無能鄙吝數竿雖小亦蕭森忩閒對了添詩料郭外移来費俸金自笑明年何處在虚簷風至且披襟題許介之詩藁我留鳶跕外君住雁廻邊走僕行千里敲門授一編真妍非粉黛至巧謝雕鑴何必周丞相男兒要自傳郊行薄有西風意郊行得自娱山晴全體出樹老半身枯林轉亭方見江侵路欲無何妨橋纜斷小艇故堪呼老大老大重登聘士臺客懐牢落可曾開臨流往往看鳶墮入署時時見馬来有約青山何日去無根白髪是誰栽自嫌不帶功名骨只合眠沙與坐苔伏波巖懸崖萬仞餘江流遶其趾仰視不見天森秀㧞地起中洞旣深豁旁竇皆奇詭惜哉題識多蒼玊半鑱毁安得巨靈鑿永削崖谷恥緬維兩伏波往事可追記銅柱戍浪泊樓船下湟水時異非一朝地去亦萬里山頭博德廟今為文淵矣謂予詩弗信君請証諸史榕溪閣榕聲竹影一溪風遷客曾来繫短篷我與竹君俱晚出兩榕猶及識涪翁湘中口占船頭吹火盧仝婢馬後肩書頴士奴安得世間名畫手寫予出嶺泛湘圖津吏沙邊立指呼放船出鎖放州符書生行李堪抽㸃薏苡明珠一例無見方雲臺題壁寄書迢遞夢參差毎見留題慰所思不論驛亭僧寺裏有山木處有君詩祁陽道中昨過知岑寂重来况雪天人居雞柵裏路在鳥巢邊草樹開還閉茅山斷復連瀟江清似鏡悔不問歸船真隱寺出郭斜陽已在山夜深乗月到江干奴敲小店牢扃户僧借虚堂徑挂單駭浪急囘因膽薄逆風小住為心寛投牀一枕瀟湘夢無奈霜鐘苦喚殘壽昌山路泥深雪未乾病身初怕浙西寒新年臺厯無人寄且就村翁壁上看杜丞父兄誨我髧髦初老不成名鬢髪疎紙帳鐵檠風雪夜夢中猶誦少時書久客久客長安市人情薄似雲寧為絶交論不著送窮文白髪長千丈黄金盡百斤故山春事動深恐廢耕耘贈陳起陳侯生長紛華地却以芸香自沐薰鍊句豈非林處士鬻書莫是穆參軍雨簷兀坐忘春去雪桉清談至夜分何日我閒君閉肆扁舟同泛北山雲為圃二首屋邊廢地稍平治裝㸃風光要自怡愛敬古梅如宿士護持新筍似嬰兒花窠易敗姑添價亭子難營且築基老矣四科無入處旋鉏小圃學樊遲衰病歸来占把茅譬如僧葺退居寮因存橘樹斜通徑怕礙荷花小著橋古有功名興釣築今無物色到漁樵可憐歲晚閒雙手種罷蕪菁擷菊苖答惠州曾使君韻先賢平易以觀詩不曉尖新與崛奇若似後儒穿鑿説古人字字總堪疑柬陳寺丞築城事變相尋智亦新爛泥堆起石嶙峋斷無餘力謀蒸土頗有旁觀哂寘薪自古虚心容議者即今枵腹役耕民姑尤聊攝皆齊境莫遣郊封有詛人答楊一生忠孝發子詩不為桃根與桞枝棗本流傳容有偽箋家穿鑿苦求奇偶全要領慙輕典虚嘔心肝悔少時澤畔纍臣搔白首孤吟不敢累親知還黄鏞詩巻曾伴靈芝湖上吟當年一悟至如今源流不亂知歸趣篇什無多見苦心貫蝨工夫須切近膾鯨力量要雄深暮年誰可談兹事盎有村醪且自斟題陳遂卿隱居蚤日稱雄翰墨林暮年里巷且浮沈諸君自負遺賢媿處士元無謗國心子佩子衿輸少俊某邱某水揀幽深明時莫作逃堯計忽有弓旌底處尋題白渡方氏聽蛙亭塘水拍隄科斗生想君亭子俯幽清黄梅雨足野田潤牡麴煙收村墅晴莫信人嫌無理閙頗疑渠有不平鳴畫堂方喜聽琴阮誰愛天然律吕聲贈鍾主簿父子旗鈴按迹向西馳丹桂靈椿並一時競説郎君能跨竈頓令老子欲笞兒妙年不患錐無頴前輩曾言木就規國相晏公元楚產何須千里逺求師再獲一硯自和三硯聯翩買券成絶勝玉杵聘雲英拊摩無粟向肌起塗抺有花從筆生韞匵毎愁逢暴客傾囊或笑費方兄古来事業由勤苦不信磨穿道不亨送真西山再鎮溫陵父老香花夹路催朱幡那忍更徘徊弓張至此尤宜弛珠去安知不復囘海上有艘堪致粟洛中無篚勝生財泉人畢竟修何福消得西山兩度来題林户曹寒齋舉世爭馳勢利場君于冷處看人忙不營摩詰散花室只設蘇州聽雨牀種果園林無虎守勘書忩几有螢光真須喚起西堂老来向齋中伴石塘答李泉州元善平生陳無已白首欠吟債未嘗交馬吕况肯見章蔡附熱生可鄙中寒死亦快吾方尚此友巾車與同載前瞻有膺滂却顧有融泰要當堅一壁詎可立兩界恕乎行誼虧希也名節壊史君惠良箴下走敢不拜懐哉道義交異彼姑息愛送趙信州貧者惟言可贈行臨分握手盡交情馬於轡力窮時駭鷗向機心動處驚齊士豈無堪客禮蔡人便遣作牙兵遥知陌上羅敷女競看雙旌出勸耕題趙子固詩巻紫芝仲白俱仙去晚秀惟君擅士林字肖率更親手作詩疑賈島後身吟九成合奏音方􅊀三染為纁色始深老去尤于朋友篤未忘几研琢磨心題廬陵羅生詩巻門巷蕭然人迹少華裾客子袖文過織千機錦非常巧熏一銖香已覺多持贈白雲情厚矣暗投明月愧如何桃花水煖鱸堪膾恨不相攜買短簑桐廬舟中即事車前彎帽同聲散闗外華簪一揖休惟有浙江潮好事肯隨逐客到嚴州送徐鼎夫用廬陵通守博士戴文韻一春風雨郡齋寒荒了麻姑老子壇吏抱文書排闥至客攜詩巻退衙看愁来鏡裏絲難染老去胷中錦已殘若棹扁舟見安道為言歲晚習申韓送趙叔愚赴潯州理掾未奉三雍對聊為五筦行鄉書踰嶺少詩思入湘清遠宦身差穩中州事日生向来幾離别此别最闗情和仲弟二首一春簷溜不曾停滴破空階蘚暈靑便是兒時對牀雨絶憐老大不同聽雁囘杳杳渾無報鵲語啾啾最有憑忽得遠書看百過眼昏自起剔殘燈題趙别駕委齋乍看華扁費尋思徐叩微言極坦夷無可奈何安命者吾非惡此欲逃之萬羊賦禄渠前定二鳥䝉恩彼一時却被委齋參透了不求符竹止求祠同安城不能高甫及肩臨風搔首一懐賢當時矮屋今存否曾著文公住四年潮惠道中春深絶不見妍華極目黄茅際白沙幾樹半天紅似染居人云是木棉花即事四首香火萬家市煙花二月時居人空巷出去賽海神祠東廟小兒隊南風大賈舟不知今廣市何似古揚州𤓰果跽拳祝㬋羅撲賣聲粤人重巧夕燈火到天明吾生分裂後不到舊京遊空作樊樓夢安知有越樓廣州都試自昔畨禺統府雄君恩暫許領元戎不羞短髮垂肩白且愛前旌照眼紅筆久不靈妨草檄臂新無力怯開弓即今超距作梟俊安用輜車載此翁燈夕二首呈劉師士女如雲服珥鮮暫陪獵較亦欣然清于坡老遊杭市儉似乖崖在劍川使指何功煩卜夜遨頭此念可通天粤人擁道千層看不見狨鞍三十年陌上遊人趁管絃豈知君相尚籌邊細聽野老交談處猶記兵端未動前草市收燈如許早端門瞻蹕定何年書生晚抱憂時志歸畫殘灰理舊編送王梅州二首州境與潮鄰徐行止浃旬瘴鄉均一氣監子亦吾民日晏烟嵐斂兵餘户口貧定將田里事閉閣細條陳禍始自三槍菑猶被一方帝將安渤海君肯薄淮陽老手何憂斵新眉尚費粧漢庭褒郡最早晚入為郎辛邜春日甫報弓旌召俄聞彈射攻正如飲甘露又似笑春風雲夢吞伊輩須彌納箇中故山多芧栗不必問狙公送居厚弟堂禀二首俱被光華遣同歸寂寞濵吾灾因抱槧子咎在埋輪記憶煩明主招徕到逺臣要須留晚節他日白先人怕與親朋别那堪送子行天威難俟駕秋暑勿貪程若見知名士為言不慧兄孤危託君相耕釣畢殘生送陳霆之官連州地接湖南境孤城若箇邊茒寮愁問宿峡石善驚船官小無迎吏詩工有續編古人高妙處不過覽山川題小室二首已向深林卓小庵是中僅可着禪龕士師何止三無愠中散居然七不堪一去重華那復得方當盛漢勿多談近来弟子俱行脚誰伴山僧靣壁參阡陌東西山北南半生常帶散人銜何曾雲夢芥八九一任狙公芧四三閤上大夫投欲死甕邊吏部寢方酣可憐子駿無家法下見先人靣有慚送表弟方時父棄置空村飽世情高軒乃肯顧柴荆韓甥殷浩貧親戚李益盧綸外弟兄兩鬢蕭疎驚老大一燈明滅話平生刺桐花下逢予季多致詩人未害清答謝法曹二詩簡澹掃穠華作者幾無以復加璧十五城方定價桃三千歲一開花選騷意度卑唐體晉宋文章讓謝家莫道老夫今耄矣平章此事不應差題方友民詩巻删定實惟曾大父文忠况是老先生力行所學斯無媿偶發於詩亦有聲合止笙鏞成雅奏抉挑草木示微情嗟予公事君歸興不得相從細講明題蔡炷主簿詩巻舊止四人為律體今通天下話頭行誰編宗派應添譜要續傳燈不記名放子一頭嗟我老避君三舎與之平由来作者皆攻苦莫信人言七步成寄韓仲止昨仕京華豪未減脱鞾不問貴遊嗔詩家爭欲推盟主丞相差教作散人門户自為千載計入山又忍十年貧幾思投老從公去背笈攜琴澗水春零陵畫圖曾識零陵郡今日方知畫未如城郭却臨瀟水上山川猶是桞侯餘驛亭幽絶堪垂釣巖室虛明可讀書欲買前溪三畝地手苫茅棟徑移居深溪驛苔滿朱扉半闔開更無人跡獨徘徊湘江臨别如相語早買扁舟出嶺来全州寂寂全州路家家荻竹扉異僧留塔在過客入城稀傳舎臨清泚官亭占翠微沙頭泊船者多自嶺南歸出城二絶日日銅瓶挿數枝瓶空初訝折来稀出城忽見櫻桃熟始信無花可買歸小憩城西賣酒家緑陰深處有啼鴉主人歎息官来晚謝了酴醿一架花兩宋名賢小集巻三百十二
