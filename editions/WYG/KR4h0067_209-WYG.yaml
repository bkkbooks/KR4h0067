body:
  text: 兩宋名賢小集巻二百九宋陳思編元陳世隆補性理吟上朱文公諱熹字元晦一字仲晦徽州婺源人中紹興進士第歴事高孝光寧四朝仕至轉運副使崇政殿說書煥章閣待制致仕年七十一卒理宗贈太師封信國公改徽國天氣體蒼然故曰天其中有理是為乾渾然氣理流行際萬物同根此一原鬼神鬼神即物以為名屈則無形伸有形一屈一伸端莫測可窺二五運無停命妙合之機不暫停自然氣化與流形原於妙合名為命即此而思得性靈又靜思二五生人物新者如源舊者流流自東之源不息始終聚散即斯求性謂之性者無他義只是蒼天命理名論性固當惟論理談空求理又非真心性外初非更有心只於理内别虚靈虛靈妙用由斯出故生吾身統性情情謂之情者無他思只是吾心初動機又把動時分析出人當隨發察其幾意意乃情專所主時志之所向定於斯要須捴騐心情意一發而俱性在兹道如何率性名為道隨事如由大路行欲說道中條理具又將理字别其名中庸過兼不及総非中離却平常豈是庸庸字莫將容易看只斯為道用無窮太極圖性蔽其原學失真異端投隙害彌深推原氣稟由無極只斯一圖傳聖心先天圖不待安排自整齊只緣太極本如斯試將萬事依圖看先後乗除理可推又乾坤復姤自推移動靜之間起至微終日歛襟看不足其中圓處是真機學軻死如何道乏人縁知學字不分明先除功利虚無習盡把聖言身上行體用體用如何是一源用猶枝葉體猶根當於發處原其本體立於斯用乃存西銘人因形異種私根不道其初同一源直自源頭明說下盡將父母屬乾坤仁心無私滓與天同物我乾坤一本中隨分而施無不愛方知仁體合言公又義兼禮智由仁出接物當先主在仁方有四端隨用發譬之四序始於春居敬大哉程子明居敬千聖同符入德門試把工夫横監看總來不出歛斯存又但得心存斯是敬莫於存外更加功殷勤夫子明斯意約禮之時已在中靜心惟動與靜相乘當靜之時乃動源所以功夫先要靜動而無靜體難全又莫專靠靜偏於靜須是深加格物功事到理明隨理去動常有靜在其中致知此心元自有知存氣蔽其明物又昏漸漸剔開昏與蔽一時俱透理窮深克己本體元來只是公自將私意混其中追顔造聖無他事惟在能加克己功又莫道公私未判然自憂一日用功難便隨明處猛分擺志在希顔即是顔成謹恐懼防慾當施禦冦功及於未至丘崇墉常求四者無他法依舊同歸主敬中求放心不察於心重似雞更兼放處只縁私纔知用理維持際不待追求便在兹下學上達學在事時斯是理盍於事上毎㝷思但令下學工夫到上達之機便自知夜氣理則無形氣是乘氣隨夜息理斯存息時無感猶當驗晝不能清夜亦昏體認雖云道本無形象形象原因體認生試驗操存功孰後隱然常覺在中明喚醒為學常思喚此心喚之能熟物難昏纔昏自覺中如失猛省猛求明則存為人辛勤盡作求聞計沽得過情聲譽來自外而觀為可喜此心已失實堪哀三省曽子尚憂三者失自言日致省身功如何後學不深察便欲傳心一唯中又用功事上實根源三省真傳入道門理即是心隨事顯事能盡理始心存十五志學工夫一進十年期斷自聖言當致思豈不欲人躋聖速只縁科級蓋如斯小學洒掃庭堂職是供步趨唯諾飾儀容是中有理今休問敬謹端憑體立功存心工夫但欲存心爾底事存心條緒多直使聖賢更剖析只縁私意費消磨養性性初不假増加力養字元非别用功只要關防并省察莫教私意害其中心之官則思一身胡屬此心微只為能思擇所為底事虚靈成暗塞獨於物欲用其思莫知其鄉此心活動元無定或出他鄉入此鄉猛省不知誰是主只因操舍有存亡又存以公兮亡以私存亡倐忽動時機莫教事過方纔省辨析須嚴念慮微人心道心自從載籍流傳後此是論心第一條剖析精明為訓幼如何心學尚寥寥又因形與理别言心其實隨形有理存纔與理違形獨用便為物欲理皆昏又莫道惟危便為惡只縁衆欲起於形常須急把理來救亦要少從危處行知天命假借立言雖似是知非我出枉勞功苟從立志循而得方信真知味不同故者以利為本論性無非日用間何須虛誕與深艱昭昭萬事皆其理只是工夫欲順難㕘前倚衡理隨心見不曽離苟有斯心便在兹果似有形君信否用心熟後自能知汶上仕非其地寧無仕此事還他德行人彼以勢邀吾自逝丈夫無欲氣常伸山徑之蹊苟能用力可充微一息昏忘功便虧老矣方知深自警幾番茅塞徑之蹊不能使人巧學求入處須師授此外難為盡靠師但向行時無息處追前曲折自能知觀䦨眇然方寸神明舍天下經綸盡此中毎向狂瀾觀不足正如有本出無窮良知孩提自幼良知發此日心䝉尚未開既壯䝉開趨物欲良知反喪亦哀哉動心忍性不當拂處常逢拂不合空時亦至空處順不如常處逆動心忍性始成功又困窮拂窮雖天意如舜何須増不能上知雖明事之理也須親到事中行芻豢悅口食中有味知斯悅知是能加咀嚼功行處心安思處得餘甘常溢齒牙中先難為學須教效自形但專一意使功深哀哉狹隘頻求效仰止仁人後獲心謹獨為學無功由間斷其如間斷廢關防方知謹獨功誠切不則此時心易忘鳶飛魚躍此理充盈宇宙間下窮魚躍上飛鳶飛斯在上躍斯下神化孰尸本自然又神化孰尸本自然盍將此意反而觀試將事上深加察纔著些私便不安勿忘勿助長忘則無功助則私不忘不助正斯時此中體段須當察便是鳶飛魚躍機樂在其中夫子亦將貧對樂只因人苦處貧難苟非天理能攘敵只向私心重處安不改其樂已私既克本心存到處逢源與理行不待有心求樂道此心之樂自然生逝者如斯如何物却能形道只為皆存理一端偶感斯川存動理故言逝者可同觀又岷原萬古只如斯東注曽無間斷時後學不因川上嘆安行體用亦難窺牛山此心此理自天根不待栽培觸處生只要關防又欲伐更須著意察滋萌任重氣無强弱志為先努力便行休放肩捱得一番難境界便添脊骨一番堅萬物皆備於我萬物當須以理觀不離太極是其源雖云萬類皆我具只為中心太極存難言難言非謂不容言謂狀其中體段難須是養成天地塞却將正直及而觀四十五十無聞聖人接物本於仁罕以深言拒絶人不足畏辭嚴且截急將此意省吾身九思人之追學在於思思則能知是與非但得用心純熟後自然發處有思隨辭達而已方識聖門辭達㫖作文之法在其中但將正意由辭出此外徒勞苦用功又因辭可以驗人心心地開明辭必明試把正人文字看何嘗巧異與艱深君子去仁誰云貧賤人難處只為重輕權倒持釣渭耕莘皆往轍聖賢不法我何歸就有道而正差以毫釐丈亂真苟羞就正墮終身不惟枉費窮年力反作滔天禍世人出門如見大賓竦然敬立體斯存容貎常如見大賓此是聖門持守法必須心在可為仁必有鄰德者人心之所同苟能有德類斯從不須閉戸嗟寥落但立誠心自用功浴沂只就吾身本分思相呼童子浴沂歸更無一㸃閒思想正是助忘俱勿時言志莫道車裘事亦輕仲由義勇乃能行欲知共敝為難易試把車裘驗世情斐然成章學須隨器有成形方可裁中設凖繩假借變易無定體縱逢大匠亦何成安仁利仁語利猶能安則難且從利做莫思安懸知等級無他義去盡私心只一般一貫一貫明言忠與恕教人之意已昭然當於用處求其一慎勿懸空想聖賢卓爾顔淵不日趨於化此際寧容未學知細誦師言强思索獨於博約語無疑聞知見固能知聞亦知雖聞如與見時同只縁一本元無二千聖巴亡心在兹絶四在人四者要皆無絶盡聖心天與俱敢爾單提希聖術力除私欲是工夫莫我知也夫心即是天天即理無行不與理相隨故言惟有天知我天豈真如人有知又天怨人尤兩不形欿然下學是工程了無可使人知處盡日相酬理與心又聖心端似涉修溪俛首無言但疾馳學者須常存此意自能過絶為人私予欲無言妙道皆形日用間即斯可見不煩言試將天象明人事希聖工夫萬古存吾無隱乎爾聖道雖云妙莫窺初非恍惚與希夷分明說在吾行處後學無於行外思化春冰融盡絶澌微澈底冰壺燭萬幾靜對春風感形化聖賢體段蓋如斯又從天所欲皆天理具體顔淵罷不能所謂不思并不勉舜由仁義即非行吾知免夫常懐四體昊天息自是冰淵恐懼深一息尚存憂未免死而後已即斯心博約事來身向禮中行事過將心去學文局定更無他罅隙得斯二者老吾身事天皇天命理以為人理有存亡繫我心存養上還天所賦終身履薄與臨深兩宋名賢小集巻二百九
