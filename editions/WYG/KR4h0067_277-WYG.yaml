body:
  text: 兩宋名賢小集巻二百七十七宋陳思編元陳世隆補端平詩雋汶陽周伯强與予同庚生同寓里相與往來論詩三十餘年嘗手刋端平集十二巻行於世伯强十七八時即博聞彊記侍乃翁晉仙已好吟洎長而四十年間宦游吳楚江漢足跡所到所作於七國兩漢三國六朝隋唐之體靡不該備聲騰名振江湖人皆爭先求市但巻帙中有晚學未能曉者稍多予恐有不行之弊滋於古體歌詩五言律七言律并五七言絶句摘其坦然者兼集外所得者近二百首目為端平詩雋俾萬人海中續芸陳君書塾入梓流行庶使同好者便於看誦吾伯强平生心不下人今隔九原聞予此選必不以予為謬寳祐丁巳冬至日荷澤李龏和父述黄鶴樓歌城上危樓髙縹緲城下澄江復相繞有時漾影入中流俯看游魚仰飛鳥近樓多少未行舟滿江落花灑汀洲人同江狎不怕浪登樓對酒弹箜篌大别山頭白雲起金口渡邉雨如洗半鈎新月上孤城還照髙樓與江水晴江依舊㵼潯陽黄鶴無由歸故鄉一聲玉笛起何處燕撲闌千花影長韜光庵谷鳥與我言怨殺白太傳借問何以然攜却山僧去山僧未去時前盤一尾蛇後踞一頭虎吸雲嘯風遶窻户山僧已去了鶴來踏翻藤猿到拗折樹亂篠枯柴塞行路抑將廬于嵩髙之陽温洛之滸諸天㪚花復呵䕶抑將慕羶逐臭亡魂喪魄委枯骸於北邙之狐兎荒臺兮尚存破屋兮如故惟有山僧不知處世間萬事誰始終極目寒江起烟霧牡丹江南牡丹凡有幾德安打頭歙為二金陵舊物間有之池陽吳郡皆居次地近京畿種偏好鄂城栽接不草艸舂土篩泥繞畫欄石甃方壇淨如掃當頭第一帶鞓紅膩紫嬌黄别作叢盤盂追出最迎日碧玉萬片藏春風寶葉絲絲帶縷金錦斑酒暈間攅心翻騰梔茜亂朱粉様各数名分淺深低樹猶髙五六尺重花剛枝反無力逈出層隂轉耐看始悟年深有真色晚添細雪來相簇露醒香䰟冷方浴倚柱黄昏眠倍明頓覺夜闌須秉燭洛水芳林應更多不禁飛雨洗銅駞酥煎送酒有人在草沒故園無奈何莫對餘春起嘆嗟最難保守是繁華君看南渡百年内看到子孫能幾家戴式之埀訪村居故人手持一緘書扁舟清晨造我廬為問舟從何方來欲應未應先長吁長安平旦朱門開曳裾靸履喧春雷獨有詩人貨難售朔雪寒風常滿䄂孤館青燈不自聊短帽鶉衣競相就獬豸峩冠豈無事不觸姦邪觸詩士雖當聖世尚寛容滔滔寕免言為諱軒瑟齊竽本難遇長編巨軸添憂慮松菊荒蕪歸計遲欲向何門誦佳句君不見古者防川不禁口里諺封謡無不有美刺箴規三百篇刪取皆經聖人手漢魏著述充層雲來擷花草香紛紛其間國政最親切世許少陵能愛君交衢謗木求胥誨盛若勛華猶不改風雅遺音儻尚存篇篇遒鐸皆應採小人幾度邪侵正何嘗斷隔無歌詠風雨瀟瀟鷄自鳴誰顧寒莎響蛙黽但恐君詩未工耳工則奚愁强疵毁益藉譏評達九重送起聲名赤霄裏況於時事無交渉倣傚寒山題木葉千齡得失寸心知笑爾隨羣走干謁請君頭上巾為君抖却岐路塵解君身上衣為君拂去京洛緇三濯三洗清泠池一日失機械二日忘是非三日天籟呼吸吹勇捋浸刺付流水開口盡作歡喜辭天臺石橋春巳知别有野鶴相追隨茍欲避世不可遲請君歸君勿疑將適毘陵道中遇居簡上人姑蘇觀下逢居簡㡌子欹斜衣懶㪚自言契闊漫東西雖老猶能青白眠知音不在禪林乆抱刺懐書謹奔走反舌無聲亂草閒回首盡成獅子吼荒蕪野寺孤城外赤葉黄蘆日相對午睡雙鳩喚欲醒起傍生臺炙肩背㺯筆濡毫總蕭索尚餘酒量添於昨語盡横塘笛未終東風滿面楊花落匆匆觧䌫攙程去從此相期更何處一椀官酤般若湯把手同看獨孤樹鄱陽湖鄱陽湖浸東南境有人曽量三十六萬頃我昔乗槎渤澥間𦕈視天溟坎蛙井浪何為而起於青雲之底日何為而碎於泥沙之裏太極初分一物無天水相包若雞子掦瀾可供李白青州杓彭蠡付與盧敖洗龜殻斗大孤山没處藏斸取來搘鼎鐺脚胷中八九吞雲夢似此蹄涔亦何用安得快意大荒之東東復東指麾魚鼈騎蒼龍靈巖上方嵯峨樓觀青山頭昔曽避暑離宮遊吳王旌斾墮㝠漠至今古木涵清秋誰聽白紵歌聲接細撲飛塵石榴葉銀燭吹灰别淚殘夜半虚廊響行屧美人何處凝嬌䰟五色定化蝴蝶翻幾人深閨有餘怨當晝巨櫟號驚猿千年惟見春風在緑草雖存顔色改寂寞欄干繞斷腸滿徑寒香不堪掃朝雲為我光徘徊須臾徑入姑蘇臺遺蹤滅跡竟難望葉落空林歸鳥哀菰菜八分山下灘渚叢穗彌望可愛江邉野灘多老菰抽心作穗秋滿湖拂開細穀芒敷舒中有一株連三捊剖之粒粒皆尖小整齊遠過占城稻不煩舂􅉫即晨炊更勝青精顔色好㝷常艱得此欣逢黙計五升當百叢雨多水長倍加益十里定収三十鍾野人獲之亦自足何用虚糜太倉粟連日秋風思故鄉況復家田有茅屋墜網重腮鱸巳鮮蓴絲牽葉又流涎急歸収穫蘋漢畔細撥蘆花撑釣船海棠海棠最佳須老叢逺及百年花始紅歴看名葩此為盛剛柯硬葉交相映倚石攢青二三丈雨膏倒吸臙脂上髣髴璇霄發曙光細簇蓬萊綉旗仗露欲収珠色轉深香玉萬顆藏春隂輕風欲透紫絲障一片朝霞傾入林鳳城多少栽花處低嫩俱無可觀樹相對令人憶故山年年雕蕚掃朱欄只今惟有溪童在應放髙枝樓白鷴吳王試劍石吳王鑄劍成自謂古難比試之髙山巔石裂斷横理那無昔時人相逢干將里故宫宫中白日長春風野田百草香有誰慷慨不平事被褐踏花推酒缸煙波亭避暑澄江横匹練月洗黄羅扇捲盡白雲衣常星撒沙見天低欲就人夜色凝深澱􅗄吸動㣲光時絣斗間線涼亭逼曠野軒楹敞三靣萬象悉鋪陳隨機互遷變十嵗逃虚空得此方一遍相對坐談𤣥終宵亦無倦只恐駸駸催曉箭湧上東方老銅片須着干求大帝君莫使陽烏眼睛轉禹穴若有藏瘞空山中誰人反閉玊笥峰虎􅙞不得不啓封立石繚之應萬重不知靈變從何發爆然夜半横分裂但留一線與人窺未放白雲全漏泄古木蒼藤閉莫開穴中惟聽是風雷神仙必有便門出得見飊輪自往來題葛稚川移家圖稚川移家入空谷手招白雲守茅屋惟恐人窺錬藥鑪鎻斷青巒㵼垂瀑只留一徑通飛鳥其間想透三仙島野童猶滴鳳交黎村老閒鋤燕胎草又將外物為真物反笑山棲衰草窟玉臼丹成兎欲眠蚯蚓黄蒿幾攅骨此去世間應不逺尚存猶可分苔蘚兩幅生綃若可慿先寄胡麻與雞犬春濃曲雨膏蒸土蘭芽熱粉魂淡艶凝緗纈桞條無力受東風桃葉春江弄花月枕涵墜髪昬眠重綺帳驚寒替花恐屏鎻蟲棲花粉蛾簾甲蜂攅抱殘蛹麥門冬長桑椹結桐輪輾盡棠梨雪門掩車箱銅較閉瓶敲井榦青絲絶君不見楚王宫中樂酣宴嫌怕旁人説春晚玉釵埋遍細腰人章華臺上蒼苔滿陸羽泉擬酌松根泉先酹松下土甌犧副都籃拾薪自煎煮一盃復一盃併酌連四五寄謝山中人腹痛不累汝寓宿黄觀復書堂晨至海棠花下走筆呈蘇召叟春風忽來花滿樹海棠最多繞欄吐客愁纔動不復安兩脚春泥踏春雨髙枝背面辭曉喧低枝濕透渾未乾臙脂深重彩亦殷顔色滑膩脂肉寒五雲忽巻濃粧畢曉來恣態俱已失悔不敲門請君出喫酒忍飢看半日疾呼盃酌傾已遲但驚野雪掃還飛可能就賜醉眠者爛嚼落花聼鳥啼建寕浦城李頻行祠建安梨嶽老梨木刻作唐朝建州牧香爐忽動吹寒灰浦城環翠隂風來嶺頭頑石盡能走澗下奔泉皆倒回猿猱啼兮鬼嘯野六𤣥虬兮四驪馬想須吟遶碧草亭舉手髙翻白雲冩峰為文通名夢筆楊公書堂曽㪚帙麗月鮮霞付與誰煙墅有人還築室田父何所祈贈爾青麰黒桑椹里儒何所求贈爾黄糧布嚢枕萬歳兮千秋旣往兮復留抽蘭心拆椒口簸南箕挹北斗不假竹枝歌何須折楊桞只用秦原妙絶詞傳入神絃薦春酒五雲門外小亭醉中别髙峰揮手謝平野百里伴啼猿一官騎惡馬飛花墮城隅槁葉積亭下從教踐踏去㑹有相逢者夏日泛祕湖朝來泛舟花滿湖亭午返棹風相呼已収波浪入菱芡晚開雲日媚菰蒲羣飛鼓翼数沙鴈一去沒頭雙野鳬少留霽色定堪玩可惜歸程時已晡送覺新上人還越古越多精藍名僧逓相接青林瓶盂聚丹壑樓觀疊今乗秋濤便莫待寒雨渉何處聞鳴蛬虗廊掃黄葉琵琶亭蕭蕭楓林青雜出間椅檟尚忍送行舟繋此木葉下雲開星垂山水蕩月在野江空夜棖棖淚復誰滿把汀洲泥沙換葭葦顔色假變遷斐然殊感慨益以寡黄煙飛髙枝絳雪當道灑餘春去不盡併放湓浦㵼豈無夜深弹寂寞少聼者尚有沙灘人時時説司馬石鍾寺山前削成面山後不露骨何人戀巢居結屋寄突兀多風鎻寒殿頻雨閉石窟筍透獅子傾草蔽鴟吻没髑髏串胡神纓絡纒古佛熹燈影摧殘槁柏香蓬馞丹葉夏猶在緑樹暑未發㘭徑鳴秋蠶閒堦起蒼鶻僧衣莓苔侵齋缽野菜掘梵庋止数巻矧能備巾拂奔波道塗間體倦神屡竭大險阨在前醉夢魂恍惚信陋獲安處不勝塵土汩經房晚棲禅殆亦未易忽鐡鳳終日呌心頗惡此物欲去欲住間征帆已超越喜晴乆客無别望出門惟快晴茅店局促卧村静不打更淅瀝漸有間四簷稍収聲俯身問童僕貪睡語輙驚耳邉嘈囋動鄰房先戒行拂拭弄包裹人徤脚亦輕溪春黄糧響窸掃巨竹傾山路少泥土意想砂礫平捨夢棄衾枕披衣㪚縱横屈指計道里陟覺神思清菜老復命煮小鮮豈足烹旅飯任麤糲苞苴且難成值雨及雷雹一阻三宿程南北互有適後先何必爭東方曉色至隠隠天漸明分手出門去相引行水坑櫻桃花櫻桃未開花遶枝櫻桃巳開紅滿溪花開幾朝今始見人折人攀那得知黄鸝飛來問誰主對面相看隔墻語今日銷魂事可明昨夜東風過雲雨豐年行長田一畆三石収截茅作囤遮水牛馴雞塞籠彘牢滿大兒有親女上頭里胥關門罷輸送晴烏窺簷鼠沿棟瓦盆瓷缶息老身還將孫子看迎神廟前擘紙青竹爆􅄳糕粉魚夜祀竈冬賽行大巫舞袍奉酒尊小巫湔裙進盤彘野風吹樹龍馬歸瓦爐栢根香滿地白衣老鬚撚向前义手大膽不敢言去年田家五分熟更饒三分百事足大繭千棚絲滿窠栗犢兩握角出肉土臺澆酒再拜辭紙錢灰撲遶木枝神語順從杯教吉鼓笛薨薨打三日湘東苑湘東王好開芳甸亭臺環繞朱欄遍就中應教誰最多庾信江淹日􅂬宴七十里園髙木栅花桞燒殘少顔色取次華林建鄴邉奚不移歸帝王宅曽經行處蘋蕪漫賴此名存悉歆羡安知飛來不是舊時鶯舞去都非昔年燕風擘殘桃過短墻更無人管任斜陽惜春猶有傷心者認作徐娘半面粧仲宣樓仲宣徙倚思歸後又復誰傳獨歩名自昔城闉雖尚在至今波浪未嘗平半規赤日沈荒渚一縷黄烟起廢城梅落碎花催塞色葭横響葉弄邉聲驚寒牧馬頻回顧趂暖賔鴻漸北征況乃有懐傷嵗暮登樓那不動鄉情兩宋名賢小集巻二百七十七
