body:
  text: 兩宋名賢小集巻三十六宋陳思編元陳世隆補竹友集讀書吾生後淵明頗亦念黄虞要知千載外所學非殊塗兀坐對聖賢撫巻一長吁彼智自明哲惟狂益昏逾一源同濫觴派别乃差殊我觀載籍中世事何所無癡人不識古謂與古人俱相望何遥遥清都視積蘓咄此不可獻諷誦聊相愉嗟哉子栁子文章葢羣儒速進自貽戚南冠成縶拘天孫不與巧溪神亦為愚讀書雖滿腹何曾捄飢劬乃知伾文輩要路難齊驅飲酒世故不料理萬事付一樽呼賓陳肴蓛乃爾不憚煩秩筵初嚴冷稍稍笑語喧有如鄒子律能囘寒谷温朱顔挽不住雪髩日夜繁人生行樂耳惲也亦至言哀哉獨醒人顦顇拾蘭蓀寧知阿堵中端有妙理存寄題朱氏小隠園吾聞滑稽兒避世向金馬刈艸吉雲鄉探鳳荒城野斯人玩世耳豈必蒿廬下牆東本儈牛君平葢卜者朝市亦堪隠山林實瀟灑君居占深源境物粲可冩老檜上干雲孫桐已拱把雨窻修竹響風磴寒泉瀉此翁少年日巧射如注瓦百金裝寳刀千金買流赭晚歌紫芝曲情性妙陶冶蒲履榖皮巾何取綬若若嗟予亦曠蕩與世自藞苴方期訪桃源更欲結蓮社次韻董之南見贈章甫不入越夏蟲多拘時生無適俗韻舉世誰知之鍾嶸不並世無人識丘遲雖有落花句知為何等詩如逢賀賓客方歎烏棲辭我初出險語俗子争唐嗤俛眉欲從事復恐遭文移亦知適楚車安可從北馳董家名父子平生所懷思雖云識面晚相聞已相知君詩有古意且結皓首期端能啖杞菊時復過天隨陳循中求賦髙麗墨詩為作長句老松收煙琢𤣥玉可試洮州鴨頭緑來從萬里古樂浪傳到麻源第三谷要須岱郡鹿角膠擣成方解土炭嘲請君摩研新詩作一弄潺湲弔康樂竹友軒城北有陳侯眉宇初未識似聞臭味同炯炯見胷臆願言登子軒哦句呼阿客看君隂森下玉潤映連璧龍吟秋夜永卧聴風摵摵或當命柴車獨咏此君側興盡悠然返誰能煖君席讀莊子内篇經春十日雨却掃門無車伏枕夢鳴轂淙琤行溜渠端坐發深省妙香浮素裾盥濯披陳編諷誦臨前除陳編為何誰漆園傲吏書竒辭通諔詭空語極虚無得意榮辱境脫身憂患餘胷中灌頂句身上如意珠逍遥有妙處領畧歸一途塵影閱千世風波連九區畏夏苦執熱開軒除鬱蒸簷前鳥雀喧朝旭上朱甍席間裁函丈詩書浩縱横槃礴環堵間幽獨懐友生古人在黄巻十載使我傾出門窺物變草木各鮮榮青青牆東竹見汝忽眼明愛玩不能忘移根傍軒楹俯仰與竹俱定交見深情不是無朋友此君氷玉清風吹萬籟響寒梢韻竽笙我獨哦其間詩作秋蟲鳴琅玕亦有實期汝向秋成鳳凰何時來翽翽翔我庭貫時軒舊時王子猷愛竹僅成癖斯人向千載論世心莫逆吾軒謐竹友寓意比三益俗士舊雨來今擬定埽迹投足寄其間鼎鼎一何愚倘同蓬蒿鷃勿笑溟海魚陶淵明寫真圖淵明歸去潯陽曲杖藜蒲鞵巾一幅隂隂老樹囀黄鶯艷豔東籬粲霜菊世紛無盡過眼空生事不豐隨意足廟廊之姿老蓬蓽環堵蕭條僅容膝大兒頑鈍懶詩書小兒嬌癡愛梨栗老妻日莫荷鋤歸欣然一笑共蝸室哦詩未遣愁肝腎醉裏呼兒供紙筆時時得句輒寫之五言平淡用一律田家酒熟夜打門頭上自有漉酒巾老農時問桑麻長提壺挈榼來相親一尊徑醉北窗卧蕭然自謂羲皇人此公聞道窮亦樂容貌不枯似丹渥儒林紛紛隨溷濁山林髙義久寂莫假令九原今可作舁公籃輿也不惡斸苓軒萬鍾辭屠羊五鼎貪主父是間多毒腊可茹亦可吐緬懷陶隠居朝服挂神武餌苓期郤老曠蕩適林莽我家城西偏有地一㕓許開軒俯長松倒影廕庭廡嵌空宿龍蛇晻曖蔵霧雨流脂入地脈凝結嵗月古長鑱白木柄生事聊付汝想彼塵外人遲暮肯同煮但當稍兔絲敢望擘麟脯約諸人游羅坊觀陽夏吾鼻祖人物傾九州間擕東山妓文靖極風流屐齒步飛磴快哉康樂游耳孫牛馬走闒惰無匹儔但有愛山趣尚能繼前修頗厭城市塵拘縶如楚囚朅來龍泉上杖履隨沙鷗幽尋風露静江月動金虯青山帶長江佳氣日夕浮旁有列仙家丹闕連飛樓琴書靜無譁竹樹煩更幽約我雲霞交兹游及清秋朱絃蕩塵襟芳樽寫牢愁道士如彌明長頸髙結喉初無石鼎句嶮怪壓劉侯從渠倚壁睡吾属足㝠搜無逸病目以詩戲問六根無牢强萬事有戕敗丹白豈不加能令眼根壞溪堂老居士學道入三昧空花結空果過眼了無礙偶然幻翳侵惱此清淨界道人不易得定為天所愛恐君墮塵刧豫此小懲戒病眸㸃空青勿作兒女態為君禱於天君病當立瘥未忘覷詩書不敢窺粉黛寒日出郊水晴鷗弄影沙軟馬驚塵宻竹斜侵徑幽花亂逼人深行聽格磔倦憇倚輪囷往事悲青塜年年芳草新寄洪鴻父兒時訪道章江上燕雀羣中見阿鴻南浦飛雲看畫棟北忩欹枕颯凉風讀書長憶登山勝作尉聊甘食薺窮想見咏懷非一首鈎章棘句定能工有懷潘子真冲和菴裏潘居士旅食京城久不還玉屑銀鈎長在眼瑶林琪樹未承顔大門曾是鄭嚴輩吾子却居􅆥恵間想見紅塵車馬底夢魂隨鴈過西山食菜道人真是伊蒲塞頓頓園蔬入饌來紫芥寒葅㕘薤韭黄橙苦酒伴鹽梅蒸豚不羡貯人乳飯豆亦能羮芋魁但恐酪奴不解事攪令枵腹轉春雷暮春二首溜渠鳴玉雨成霖春草池塘數尺深後院落花人不到無聊獨下海棠隂晚雨牆東暗緑槐清隂庭院鎖莓苔委堦紅藥將春去貼水青荷與夏來春日黄梅花二首臘梅初雨雪争妍素艷寒香亦可憐政使北風吹得盡一枝金蓓始嫣然傍人如笑不勝妍曽是尋芳向臘前縱使游蜂能拂掠含酸結子為誰圓梅花四首姑射神游閱九闗水精宫殿不勝寒下窺人世生塵想故作梅花與俗看清曉㣲開淡淡黄蕭疎無奈北風凉幽姿不許人窺見故向寒林度暗香薔薇露染玉肌香疎影寒光照野塘長使詩人動幽興不教桃李鬬春粧冷香零亂㸃寒莎眼底愁生萬種多收拾餘芳無處惜只傳佳句似隂何送都仲獻酒曹懐璧蹔投閒俄許朱轓未賜環殿閣凉生應在眼宫門騶唱合趨班鳯凰觀徳翔千仞虎豹窺人礙九闗只恐蒼生傾望久未容投紱老家山寄題長沙髙善時醉月堂亂山岑秀繞湘濆君築茅堂底處村蠻國戈矛真夢幻醉鄉風露别乾坤平生不負南樓興何日能同北海尊聊欲揮毫書楚些憑君招取獨醒魂與江君佑游五福寺觀竹二首老子平生與竹羣清風灑濯勝三熏江都定自興不淺共打僧門看此君小池環插碧琅玕氣韻蕭梢六月寒一夜清霜羣木落獨留孤節與君看呉彩鸞寫真天上鳳凰難獨宿人間翡翠本雙栖丹青不與文簫共誰遣雉東迷雀西戲咏䑕鬚筆編鬚捋取蝟毛磔裁管縛成雞距長誰言䑕輩不足齒也復論功翰墨塲山間四首籬落秋花未得霜嫣然一笑媚秋陽可人風味撩詩興不記姚家宫様黄野老縁岡拾墮樵溪童收網度横橋高懐盡在行歌裏豈信人間有市朝未羡顏生樂一簞一簞懸磬若為歡有田如使揚雄足亦學前賢在澗槃舉案齊眉老孟光隠居無計可須忙殘年但使糟牀注亦付生涯與醉鄉兩宋名賢小集巻三十六
