body:
  text: 兩宋名賢小集巻一百三宋陳思編元陳世隆補紫薇集問晁伯宇物生無榮賤悉是君所見相值有相違誰能滿吾願田園棄荒蕪官居走郵傳誤尋文字盟秣馬當百戰一飯或未飽逢人足嫌怨窮于投林猿窘若巢幕燕忍學少年子羽翼偷絢練百萬買纒頭千金奉娱宴願為匣中玉不作秋後扇丈夫重許與正爾未為倦絶糧有不死酒肉虚健羡古人馬伏波吾猶識君面讀秦碑秦人跨九州欲以傳萬世立石名山傍往往示得意至今見遺刻字體甚雄異壯哉蒼蘚文未改回屈勢風雨所侵蝕中有千丈氣嚴如虬龍蟠深若鐵石利餘威到山鬼謹守敢失墜漢魏能書人亦豈可睥睨未能識籓籬何止趂姿媚初無一日雅但有三舍避文章又竒古遷雄蓋苖裔觀其所著述肯為尊者諱巧言未大失末乃為俗累嗚呼結繩前此又誰與記君臣共無為垂拱天下治春秋紀日月大易垂彖繫嬴氏厭休息動以衡石計斯翁變古文程邈分篆𨽻自此更滋蔓日以趨簡易馳驅千百年漫有紙筆費詎能罷煩文盡掃著天外此書雖見存或以少為貴特此槁木枝我亦甚無愧龔彦承觀軒愛山不能掃常恐山怪責終嵗在行役感動頭已白髙秋強僮僕路過龔掾宅䝉君開南軒除我限界窄白波遶青嶂彷彿見顔色江上飛來峯郤立對君側蕭蕭蒲葦叢不受塵土隔知君有竒趣笑我常偪仄人生無窮已得一乃願百牀頭貯美酒窓下著好客請公但黙然嵗晚當有獲堤上落花吹盡不堪憂只見河堤水漫流晚日強穿城北市春風猶駐驛南樓妻孥獨覺為身累嵗月終難望汝流萬里長江一樽酒故人何處倚偏舟京師新鄭與諸晁兄弟往還前後數詩夜語不嫌久凛然天欲秋客燈吹屢滅細雨落還休未許金張並虚為鄠杜遊江河少歸夢知為故人留我髪日已短公愁安得長墻根春薺老瓶水臘梅香侍立無夭女相隨有漫郎平生湖海興今夜宿連牀髪短各已白眼昏誰復明殘春斷花栁晚日閉柴荆潦倒書常廢驅馳夢或驚尚于團聚樂雖老未忘情令弟窮顔蠋書生老仲舒相招得共處何往更安居嵗月塵埃外桑麻雨露餘送行無别物圮上一編書苦語相留極虚床㑹宿頻山東今出相海内不無人婦女能尊客兒童不厭貧長途有知遇今日倍情親雁雁從何方來云自燕趙北今當何所往暖日近暘谷寒雲墮江漢未見所棲宿朝憂稲粱少暮畏羅網逐惜哉還往頻愈覺嵗月促悔不近籓籬隨羣逐雞鶩羽翰何必好志願亦易足物生有髙下終恐厭摧伏公看滄海頭萬里飛鴻鵠海陵夜作夜長夜長天復霜海陵城中今夜長夜長夜長天向晚海陵城中今夜短路長家逺來信稀水閣山深歸夢斷堂上書生頭已白朔方健兒十年客想渠當此夜長時撫劍雖長酒杯窄明妃愛惜漢宫衣烏孫公子終不歸戚姬去視鴻鵠舉更為君王作楚舞當此夜長誰送迎此月還如今夜明夜長夜短公莫厭寒即重裘熱須簟夜長夜短公莫憂多憂多厭公白頭洞庭嘗聞洞庭湖秋至清皎潔往來八百里長風駕明月中有仙人居容顔若氷雪我願從之遊問渠傳寶訣脫冠養霞佩長與塵世别寄晁以道朝鮮陘山清莫宿頼水綠往來百里間得此意已足吾人少如願夫子更絶俗閉門觀易象未用傷局促使我三日留共此一室獨皎如嶺頭月凛若霜後竹欲為斯文夀以作學者福洛陽佳少年撫事多慟哭此其於聖學何似狗尾續寧知草𤣥翁萬事不掛目深湛而雅澹亦不在反覆吾祖早聞道晚與夫子熟相期千載外未得一世伏深山竄鼯鼬晚日度鴻鵠誰能從公遊嵗月如轉燭近體詩二十韵寄秉之憶昔春將莫分攜桂領邊落花依斷隴飛絮滿長川風急吹殘雨雲開放晚天山光如欲動草木不勝妍沽酒遥村市停驂近郭田臨行思欵曲已别更留連治邑煩游刄編民荷息肩髙才久藏巧篤行衆推賢屢辱銀鈎貺頻更玉律遷故鄉迷藪澤回夢渺雲烟漂泊遥相望窮愁秪自憐愛閒身益懶多病氣仍孱故國因人問新年底事傳秪因升斗戀聊結簿書縁諸老方推轂乘時好著鞭提撕起憔悴騰達動蜿蜒袖有平戎䇿囊無封禪篇功名期萬里富貴屬丁年范蠡終興越田單卒破燕異時歸捆載乞我買隣錢田家樂東家西家蠶上簇南村北村麥白熟小兒腰鐮日早歸大兒去就田間宿斗酒相邀不為薄隣翁相對且斟酌聖主當陽億萬年年年嵗嵗田家樂長葛道中遇周原仲羸馬衝寒驕不駛積雪殘氷雜泥滓長葛縣中日落時舉頭忽見周夫子下馬相看兩驚怪各喜南歸此身在僧房夜語久不眠更摩枵腹償詩債子行四方尚謀食我亦年來倦行役櫪下驊騮世得知海底珊瑚人未識長安公卿富貴客誰能日在子思側洛陽少年未宜輕看子重陳治安䇿贈益謙兄弟范郎走㣲官清固不絶俗家常四壁立腹有萬卷讀邇來所為文深若泉萬斛紆餘風過水宛轉蟲注木諸弟况可人不但好眉目丹穴固出鳳藍田自宜玉行扛九鼎重頓使一世伏聖朝急用士如子尚窮獨乃知徳在躬不必富潤屋我病拙文辭筆鈍如髪秃時逢子兄弟未語心已足長空絶繊埃何處著鳬鶩朝來秋氣清佇看飛鴻鵠寄宣城故舊宣城經嵗無他事尚喜交遊不棄遺叠嶂樓頭納凉處宛陵堂下探梅時君今尚要一嚢粟我去亦無三徑資掃卧雲山更深處因書頻報故人知浮梁道中見小松數寸者極多然皆與蓬蒿雜出不能即長也余傷之作詩寄范四弟青松數寸根意出千丈外如何蓬蒿底此志久未遂朝為牛羊踐莫受塵土翳雖云嵗寒姿當此亦憔悴今年雖小出尚與凡草類㑹須扶其根與作棟梁計大厦千萬間匠石所睥睨世或未盡知慎毋傷汝志題筠州僧房客來無語坐禪房共賞西窓一榻凉山路雨餘新筍出江城春色雜花香烟厨已逐鐘聲逺樹色初隨塔影長敢道閒居便安隠今年更欲下湖湘嶺外懐宣城舊遊中原未敢說歸期却憶宣城近别離叠嶂雨來如畫裡敬亭秋入勝花時每憎卑濕尤多病苦愛風光屢有詩今日衰頽那可説鬢鬚經瘴總成絲山居素飯豆苖可瀹匏可羮僧厨午飯煮香粳道人得此清净供下箸已勝肥羊烹平生為腹不為目偶逢一飽心自足晚菘早韭舊所知五鼎百牢未為福寺居即事二首瘴癘過庚伏庶㡬其少瘳甘心忍殘暑指日是清秋汴水他年别郴江此日留如何理歸夢只見嶺南州因循過嶺表忽復到湖南氣力渾非舊情懐老不堪無錢供痛飲因病廢清談尚有尋書僻窮搜未免貪賀州聞席大光陳去非諸公將至作詩迎之五年避地走窮荒嶺海江湖半是鄉歡喜聞君俱趣召衰頺如我合深藏曉寒已静千山瘴宿霧先吞萬瓦霜日日江頭望行李㡬回驅馬度浮梁次韵王漕見贈并寄曹吉父二首前賢去則逺今代不無人小出已無敵深藏恐未仁兩章知思苦一語見情親徑欲忘衰病如公筆有神曹子往南國端居無所思逃禪不用酒投筆漫成詩敏㨗忘千慮縱横又一竒於中有佳處莫待折肱醫次韵折仲古見贈未有絲毫補縣官㡬年流轉但求安江湖自稱嵇康老故舊空嗟范叔寒頋我初無食肉相喜公復著侍臣冠新詩不忘東山志敢作尋常禁近看永州西亭舊聞西亭勝獨盛湘湖間山秀水亦好千里在慿欄今來乃不然眼境故未寛環城但濁水滿目唯荒山如何栁司馬肯為此解顔始知憂慮久方覺所遇安我從避地來山水日飫觀初不厭嶺嶠况復嫌荆蠻徘徊念昔人亦作故意看所慚二三子來不倦躋攀開軒納㣲凉共享一日閒說詩到雅頌論文叅誥盤快若箭破的圓于珠在盤此樂固可樂此盟安得寒天暑畏道路時危多阻難相逢得少欵莫問何時還何須待杯酒始盡平生歡贈珪公杲公四首北歸住江西塵事日窘束兩公時踵門高誼已絶俗空房擁殘火更許相就宿不厭寒無氊肯厭飯脱粟杲公玉壺氷所至自清净珪公出林鶴肯與雞鶩競吾窮得兩公頗覺意氣盛未能出艱危猶足起衰病杲固昔所熟珪亦舊聞名江西一聚首遂寛南去程掃除文字習追尋香火盟期君向此道隠若一長城堂頭老居士我識蓋自早聲名從少年閉户今却掃公能為少留尚可慰枯槁欲知主人賢但看此二老和邢子堅韵萬里仍歸舊秃翁笑談聊復與君同鷦鷯所願一枝足鼯䑕真成五技窮短髪自梳渾欲白殘爐因客尚能紅正須混迹師元亮未忍低頭學敬通戲呈東林雲間二老㡬年湖嶺費追尋尚喜歸來聽足音禦虎已知我有命問禪方見子無心風塵􅀈懆病如昨嵗月峥嶸窮至今猶覺相逢有餘恨老盆盛酒不同斟余常謂可與共飲者至難得也二公超然之韵可與共飲也而不得共飲為可痛惜曉此語者許伊具一隻眼荅錢遜叔訪戴圖北風吹霜夜如雪江城草木凍欲折病夫袖手無所為一坐臨川已三月忽䝉妙句起衰憊頓覺和氣生毛髪公能忘機我亦倦不待曼殊見摩詰畫圖是非久未解况保長年不磨滅請公置畫莫多求要與時人除愛渇與錢遜叔飲酒分韵得鳥字客遊等浮萍嵗事如過鳥逢公得一笑不厭古寺悄雨聲喧客耳燭影吹半裊宿醒未及解更覺惡韵擾時方足艱虞身未識要妙如何一杯酒便作萬物表别公願一言使我意易了贈别范一哥相送不嫌逺詰朝當語離文詞知子進道路覺吾衰力疾終無補徐行敢厭遲臨分更回首苦語漫成詩與范益謙炳文叔儀步月嵗月忽已過羈窮非獨今稻塍分白水月影上清隂畎畆平生事江湖他日心相過無百步猶覺費追尋竹夫人與君宿昔尚同牀正坐西風一夜凉便學短檠墻角棄不如團扇篋中藏人情易變乃如此世事多虞只自傷却笑班姬與陳后一生辛苦望専房寄題暨尚卿雙蓮亭異畆同頴久未出雙觡共抵復何物今君何以得此花和氣所致無他術雙蓮共蔕中連理相映同心出秋水秋水池塘曉自凉雙蓮中含風露香飛燕姊妹不相妬並騁逸艷來昭陽自然容質見髙韵不必粉黛呈新粧君家孝友聞郡縣故使竒祥眼中見一洗東南戰鬬塵小人知之亦革面我來﨑嶇山嶺間忽聞雙蓮能解顔請君更畫作圖看毋使惡木譏雕殘寄范四弟十弟俗事紛紛如亂麻又扶衰病轉天涯文章老矣思吾弟頭角嶄然勝外家異味㡬回占食指逺書終夕望燈花何時更住城南寺共聽春池兩部蛙游鳳池逺近諸山翠作堆鳳池北望更崔嵬青松夾路攙天去白鳥翻雲傍海來喜有故人同出郭屬因衰病阻銜杯猶憐不赴對牀約獨上籃輿日暮回送笋與何晉之年來念念欲深藏頗覺看書氣味長莫怪嚢空無一物猶能分笋送何郎送林之竒少頴秀才往行朝我為福堂游破屋占城市城中㡬萬户所識一林子蓊然衆木中見此真杞梓未為棟梁具且映風日美子之於為學其志蓋未已上欲窮經書下者百代史發而為文詞一一當俊偉夫豈效鄙夫念彼不念此今來赴行朝學已優則仕窮通决有命所願求諸已聖賢有明訓不在拾青紫丈夫出事君邪正從此始次韵李伯紀園亭昔日翶翔雨露邊已將勲業畫凌烟便尋松菊同元亮不訪丹砂學稚川可但海山勝綠野頗知風物似平泉小園只在虛窓外佳處常當几杖前本無俗事可裝懐藥圃花欄應手裁乘興聊陪野僧坐賞心時許故人來頓令此地成三絶不為他鄉賦七哀鐘鼎山林兩無碍豫章須是棟梁材鄭昻用岑參太白胡僧歌韵作楞伽室老人歌寄杲老楞伽室中絶皂白去天何止三百尺只今更住最髙峯齋無木魚粥無鐘已將虎兕等螻蟻更許蝶蚓同蛟龍聞道說禪通一線為爾不識楞伽面一生強項我所知氣壓霜皮四十圍世人未辯此真偽敢向楞伽論是非諸公固是舊所適鄭髯從之新有得欲將此意向楞伽但道鵠烏同一色贈王周士諸公空房夜氣清落月傍簷明念我平生友相望隔荒城吾老未厭書破窓猶短檠君亦不得閒黙坐數殘更共結香火社同尋文字盟王子潮州來一笑冠欹傾千飯展僧鉢村醪傾客瓶相逢但談道絶口不論兵未免俗眼咲屢遭時軰輕人生各有趣小大俱有程譬彼澗底松難伴池中萍雲鵬與斥鷃已矣兩忘情一洗瘴海耳此言君可聽㑹稽石道叟教授南劍兵火搶攘之餘興治郡學尺椽片瓦皆其所自經營也未期月而學成逺近賴之又祠前軰賢者以風勵多士使遊其間者望之而心化由是而入堯舜之道不難也古之教者蓋多術矣五帝憲三王有乞言憲賢于乞言也道叟知之矣吕本中為作詩叙本未云聖賢道則逺世久學欲絶區區續㣲言未易勝邪説石侯東南秀暏此心欲折分教南劍州意在補忘缺歘令兵火徒復見爼豆設廟貎甚尊嚴上下有區别先生黙無語風化動閩粤斯文自明白如仰見日月坐令穿鑿誤不待湯沃雪不知旁祠誰今代古豪傑孰能與之齊共此嵗寒節入門日在望未返意已竭由來正心術不在費頰舌乃知勲陶功自與聞見别參魯回不愚亦豈有優劣此理尚可求萬古同一轍前軰謂陳了翁也寄内弟并示仲輔諸公江浙音書絶不聞每逢時節嘆離羣一秋多病常嫌客短日無聊只閉門淺學未容窺易象舊書聊復誦𤣥文莫言耆舊彫零盡海内交遊尚數君離洪州渡西江至翠㣲寺紫清宫平明渡西江西山正崔嵬中流欲浪作細雨隨風回促櫂赴前浦頗為風雨催寒沙引細路人家山半隈宻雨䕃修竹久旱無莓苔曉入翠㣲寺諸峯環抱來其西洪崖居百代所仰懐何年蛟龍怒更擊深山開懸瀑㵼洪井噴噫藏風雷客行少休息暫此得徘徊城中二三老咫尺不得陪豈無凌風翰邀致山中台澗水清且寒可以當餘杯獨來不敢久恐為神物猜贈歐陽處士愛君年少便知足今君雖老更無欲閉門不出動經時保此無窮清净福黄衣弟子雜僧徒共住荒郊數椽屋門前山水各有態君但疎籬對修竹直如季路耻有聞清似子推不言祿坐看世事雲變化一任兒曹手反覆上皇龍飛三十春臨軒亦嘗思異人詔書屢下廣搜索當時㡬人能識真君今聲名動天子髙卧不起空逡巡漫收符籙養丹火一旦四海生風塵我來見君斛嶺下識君無營真静者殷勤愛我莫遽行尚肯相從結茅舍時當䘮亂足淹留豺狼恣横空山夜他年有意過匡廬更許淵明結蓮社次韵錢遜叔畫圖西風著人塵滿襟江山縱近難追尋當年冩此數幅妙坐使几案頻登臨斷雲黯慘出古寺逺㟁杳靄連荒岑漁舟蕩漾江路晚烟雲濃籠山店隂已知落筆氣象古一任世間消息沈最憐霜幹倚長石不待嵗久成枯林知公此中興不淺此畫故能留意深只今燕坐一室裡尚費從來長短吟詩成掩巻坐秋晚一唱三歎無遺音次韵李仲輔僉判曉晴破兩却寒天海上風光絶可憐更欲陪公了春事不須乘醉始逃禪贈范信中異時攜客醉公家蠟燼堆盤酒過花萬里溪山隔春事十年風景困塵沙鄭莊好客澤如昨何遜能詩老更佳但得尊前添一笑莫言漂泊在天涯病中貸米供晨炊尚欠數束薪平生甘此味此去未為貧新霜已嚴厲况我病經旬但守是心足無為思古人寄閩中親舊濃隂蔽列日小院有餘凉頓覺枕簟好時聞荷芰香秋成今可必衰疾未相妨徑欲閩中去尋僧不裹糧水仙澹綠衣裳白玉膚近人香欲透衣襦不嫌破屋颼飀甚肯與寒梅作伴無破臘迎春開未遲十分香是苦寒時山瓶尚空無佳對更乞江梅三四枝梅花野水依城竹映沙江梅開處又人家天晴徑欲花前醉只恐衰顔不稱花贈莊季裕老矣莊夫子居閒肯厭貧盛時更讀易憂道不無人記往詩猶在相逢意倍親尚期香火社文字約遺民九日贈曽𢎞甫荼花過雨十分香山後山前已帶霜何事東籬數株菊已將青蕋趂重陽寄劉彦冲兼寄胡原仲劉致中故人别去兩經冬今嵗書來第㡬封正以空踈小製作不因窮約費過從養生漫說終難效學道無心亦未逢若問真歸是何處五更常聽寺樓鐘古意茂陵消渇逺山眉那得閒情到綠絲一曲白頭吟未了廻文字字起新詩兩宋名賢小集巻一百三
