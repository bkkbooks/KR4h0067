body:
  text: 兩宋名賢小集巻一百六十六宋陳思編元陳世隆補梅谿詩集六郡圃栽花公餘吏隱不相賖杖履園林賞物華五栁宅邊誰種栁百花樓畔漫栽花郡圃有百花樓池塘有夢吟春草永嘉有夢草堂屏障無心戀綺霞綺霞亭來嵗游人應話我鴈山深處老桑麻二月朔日同嘉叟藴之訪景盧别墅用郡圃栽花韻即席唱和鄱水芝山四望賖雨餘風物陪光華名園種果仍修果妙手栽花似判花行見晉公開緑野聊從子美酌流霞坐間賓主皆人傑我質如蓬賴倚麻野處名園境界賖夷堅博物似張華景盧作夷堅志參天先種栁州栁園中新植栁照眼兼看花縣花園與縣圃為鄰即席賦詩袍奪錦論文對酒臉生霞自慚衰病陪行樂䇿杖登城腳欲麻還舍復用前韻以寄負郭園林路不賖杕藜徐步賞韶華芹宫地近分流水圍近州學芝嶺風髙送落花園在芝山門范文正芝山詩花落入城東簷外梨枝春帶雨梨花堂城頭桃樹晚蒸霞城上皆種桃行看共掌絲綸美寧復丘中詠有麻舍人兄弟皆掌絲綸和詩有醉傍西岡學種麻景盧嘉叟各和詩五首復用前韻草堂相去不多賖雨後登臨喚革華心喜淵明尊有酒眼驚太白筆生花來看四澤滿時水歸見九光披處霞是早陰雨至晚見日得兩使君詩十首郡齋傳寫費川麻用韻懐何卿送别鄱江日未賖詩人相問憶金華烏衣巷口見歸燕何如金陵萬里橋西思浣花持節要先蘇赤子攝身未用踏蒼霞何頗喜仙行將歸侍玉皇案不比少陵鞋用麻嘉叟和詩至七篇有何時五畆成歸計來作鄰翁伴藝麻之句某鄉心方切復用韻學繼初寮事業賖閉門寧悔讀南華符分興化日烘荔室寓維摩天雨花宗丞寓居僧舍故里君應懐北岳歸心我已到飛霞永嘉有飛霞洞天休休莫莫宜閒處耕有添丁婦織麻玉芝堂范文正公名不是因三秀名堂意自深要居森㦸地毋忘采芝心退思軒㑹得名軒意公餘坐片時退思何及矣未退早須思景盧贈人面竹杖奔走方嗟力不任得公一杖直千金竹能有面如人面人亦虚心似竹心渡水只愁龍欲化入山應與鳳聨吟翰林虞部相酬贈同舍交情復見今退之赤藤杖歌云歸來捧贈同舍子予與洪亦館中同舍也鄉人項服善宰鄱陽有政聲人惜其去用郡圃栽花韻作詩數篇叙别遂和以送之七嵗名師世胄賖雲孫行實副文華仁心馴及魯恭雉和氣種成潘岳花清白見知鄱水月髙明相照楚天霞送君撩我思鄉意遙想吾廬日長麻鄱江同事半年賖直諒何人似去華吏報圜扉多鞠草民歌枯木再生花邑人有枯木再生春之謠暫留蕭寺行逢雨剰作新詩語帶霞褒徳自應侯卓茂清朝知己況如麻江東回首莫雲賖寒食令人感嵗華皎皎丹心惟望日是日祈晴星星短髪不簪花書傳何處山名鴈寄家書酒憶吾鄉水似霞樂清有赤水之名鄉人喜造紅酒故舊相逢如問我為言多病服天麻公真有徳如元令我媿無才似李華話别芝堂傾竹葉送行鄱水漲桃花眼看三匝烏逢月心羨齊飛鶩趂霞他日相期訪劉阮分桃采藥飯胡麻予向年少不自量因讀韓詩輒和數篇未嘗敢出以示人葢二十年矣近因嘉叟見之不能自掩且贈以長篇蒙景盧繼和用韻以謝少小思尚奇薰風琴欲和規模與時背場屋屢摧挫大道窺五原高論讀二過神游京城南南山詩思渺䒱水左竹看金影碎菊擷霜風破論文摩巨刃薦士躬彊笴蕭蘭發秋懐木鴈吟齒墮飛飛雙鳥鳴不數鸝兩箇幽幽十琴操可僕蘭臺些光餘萬丈長照我一牀卧未終三百篇正坐短檠課韓古律詩共三百餘篇初妄意欲盡和之以方作舉業遂止不敢示友朋懼遭泥滓唾文章吉太守臭味夙相荷索我舊詩案贈以千金貨郡齋哦好句豔豔月照坐端如陳琳檄快讀痊轗軻濫把江湖麾謬聲慚日播祁寒兼苦雨怨嗟吾豈柰竊效衡山禱是日祈晴因思鑑湖賀時已乞祠鵬鷃各逍遙溟蓬無巨麽二月十五日祈晴十七日雷雨再作清香一瓣乞晴回凖擬陽光萬里開風伯未吹雲陣破雷公又喚雨聲來補天石爛疇能鍊陷濘車深不易推誰坐黄堂稱太守深慙無術捄天灾喜晴再用前韻天閔斯民意已囘羣陰不掃自應開扶桑曉日曈曈出玉宇清風習習來水緑漁翁聲欸乃月明詩客手敲推秧針刺水麥搖浪定有豐年無後灾徐孺子亭一室不暇掃心期掃天下一榻不妄設所待必賢者南州傑出士林泉事瀟灑閉門謝弓招道合不吾舍誰云性少通得一不為寡豫章豈私交端欲重宗社漢廷無此賢忍使遺在野交章薦天闕聘禮備車馬高人竟不屈清風凜華夏寄聲郭有道一木難支厦肯同樊處士聲名祗虚假鷄酒弔知音韜光老松檟儻令居孔門行藏似回也江西今仲舉吏事飾儒雅神交千載友丹青妙摹寫作亭古東湖鱗鱗萬椽瓦序嗤滕王閣詞逼長沙賈佳客從公游湖光瑩尊斚孺子真可師世途何土苴行矣浙東西鉏犂各歸把易芝山五老亭名曰五峯安國書之因成短篇三秀呈祥處危亭壓衆坡眼驚廬阜近峯類夏雲多喬嶽神咸㑹蒼穹頂共摩紫微新鐵畫輝映楚江波游圓通寺夾徑森森鬱老松烟霞深處忽聞鐘虎溪水隔侯溪水馬耳峯聨石耳峯遺像人猶思後主李後主功徳院有祠堂開山僧不畏先鋒僧言曹先鋒翰下江州至圓通主僧趺坐不懼明朝杖履山南去噴沬飛流看玉龍三峽橋三峽橋邊杖履游此身疑已到夔州題詩欲比真三峽深媿詞源不倒流灩澦瞿塘在眼前便應從此上青天秋風脱葉隨流下疑是千帆出峽船宿栖賢瀑水聲中夜不眠星河影動半秋天誰云灩澦瞿塘逺只在洋瀾左蠡邊獅子吼成方外法獅子山石人㕘得定中禪石人峯住山五老知今古借問曽栖㡬箇賢廬山紀游四十韻我性好山水思向廬山廬五老招我游有約芝山初兹行適所願孰曰非天與入眼庾公樓興已先籃輿雲開聖治峯石扣仙人居太平興國宫有聖治峯劉仙石香爐望烟靄淨社觀芙蕖虎溪聊自笑天池步宜紓天池最髙不及游半月圓通留幽亭樂有餘寺有至樂亭趣如六一翁境似山環滁侯溪煮月泉石耳供巖蔬峯以生石耳得名破戒戲魚酒踏園夢羊猪賢關得家音二兒時在太學一日得兩書天恩拜新除抗章復辭免前辭夔州今辭召對行色仍躊躇遂作南山游首過荆林虚凌雲入康谷臨流清可漁欲飲第一水山深足趦趄湯泉本何來怱從龍口嘘鸞溪尋故家歸宗寺本王右軍宅墨沼波猶瀦石境不可見懸崖照誰梳尋真到簡寂入觀驚丘墟緬懐黄與陸何處飄霞裾簡寂觀乃陸修靜道場有黄石公巖觀今荒廢眼明見飛瀑澗壑鳴瓊琚河落句思李練飛詩陋儒新橋跨虹霓出月明蟾蜍兩州勞五馬同日傳雙魚至開先得唐江州李南康書神光照萬杉飛白留天書遙瞻星子城青山㸃舂鉏我行未及西三峽知何如登樓閲天險奮地轟雷車壯哉五丁力鑿此千尺渠羣峯列耆老深淵蓄璠璵五老諸峯及三峽玉淵並在棲賢古刹依朱砂穿林駭猿狙楞伽在朱砂峯下自棲賢一路穿荆棘而行萬巻已空閣三竹猶扶疎肩輿足繭卒傳詩手疲胥佳境尚無窮雅興良已攄身隨禽往還興逐雲巻舒重尋訥庵老細論無言予節物變炎涼遲留費居諸在路何悠悠歸夢頻蘧蘧秋風鴈還蕩緘封寄鄉閭中秋宿瀼溪驛瑞昌縣半月游廬阜中秋宿瀼溪祠尋元子隠元次山舊隱樹認赤烏棲呉赤烏所見之地坐待雲開月行愁雨作泥鄱人應話我身在九江西題一覽亭在漕臺後山危亭頂鄂渚欲上初不敢肩輿躡崢嶸眼界驚坎窞青山繚江湖烟雨抹濃淡千帆破滄浪萬里照菡萏大澤胸可吞秀色手宜攬形勢控上游天險卦侔坎登臨迫吹帽秋聲在葭菼銜杯情有欣懐古意多感兩雄孫與劉壯志鯨鵬噉赤壁走阿瞞功業炳鈆槧黄鶴去何之靈竹色猶慘樓餘庾公興洲遺正平憾北望舊中原激裂壯士膽何由登太山一快天下覽赤壁之説有四在鄂之蒲圻者是孫權遣周瑜與劉備併力敗曹公於是過金口市江中有渚名鯉魚甲渚上有蘆花連日遇逆風舟以寸進挽舟者行蘆中成四絶江山滿眼似相迎一閧人煙問地名舟過已經金口市水流應到石頭城鯉魚甲露江中渚蘆荻花浮渚上霜檣影落江疑是釣巨鱗驚躍鷺飛忙長江十里渺連空逆水那堪更逆風定是江神憐逺去欲吹船轉浙江東江神不借一帆風急水難收寸進功攲枕高眠真有媿挽舟人在荻花中宿高牙牢落楚天涯䕫門路尚賖落帆驚宿鷺弭榜傍栖鴉有鴉千百羣集於栁風伯聲喧枕漁人水浸家江神阻行色非是戀高牙兩宿亡姊之塟在九月而不得其日十五日讀坡詩至英公燎須事不覺悲涕是日辛酉得非塟日耶詩以寓哀先人六兒女姊長孝且慈徳淑命不淑哀哉止於斯莫年失愛子哭泣鬢成絲年纔五十七一病不可醫姊死我在傍姊塟吾不知初聞卜九月不知日與時丐祠既不遂臨穴竟無期日月為我昏風雨為我悲宦游何所得抱恨渺無涯尚餘英公須未作子厚碑嘗欲作墓志不遂便當回鴈蕩那忍過姊歸姊歸縣在歸州有屈原故宅原既被放流忽然自歸原有賢姊曰女須亦歸喻令自寛離騷所謂女須之嬋媛兮是也袁崧以為姊歸之名始於此宿網步時已入夜猶行舟忽聞犬聲知有人家孤燈一㸃葢漁舍也是夕有月不飲網步知何處維舟日已昬孤燈耿漁舍一犬吠江村問境欣名復在復州界歸心㡬到温遙天有明月惜不照金尊宿金鷄渡曉起鷄未鳴晚宿雞鳴渡鷄鳴又還起扁舟觸烟霧不作田文奔不效劉琨舞孜孜慕舜徒去去官䕫府舟中記所見不向三苗境上過岳州乃三苗故都此身端怯洞庭波浪翁未免敖牙戲漁父時為欸乃歌蟲喜年豐頗擣米鳥憂沙漲自淘河擣米淘河蟲鳥名可無好處如鄉里橘緑橙黄恨不多上大望州鑽天嶺身到猿啼百尺頭百尺坡更言前有鶻孫愁試於大望山頭望望見人間是峽州豆子山前火墨溪迢迢一嶺與天齊肉身安得鑽天手肝膽崔嵬自作梯題諸葛武侯祠八陣圖旁丞相祠風雲慘淡㑹當時功成豈止三分漢才大非惟十倍丕渭上忽傳司馬走蜀中長起卧龍思我來再拜瞻遺像涙滿襟如老杜詩登詩史堂觀少陵畫像萬丈光芒筆有神兩眉猶帶舊酸辛殘杯不復愁肥馬賸馥端能丐後人䕫子江頭吟處景杜鵑聲裏拜時身敬瞻遺像觀詩史一酹雲安麴米春游東坡八絶道大才高世不容堪嗟尺水困神龍空游赤壁英姿發卻向小橋詩思濃出處平生慕樂天東坡名自樂天傳文章均得江山助但覺前賢畏後賢忠州東坡以樂天得名少年下筆已如神文到黄州更絶塵我宋人才盛元祐玉堂人是雪堂人世重元之重竹樓雪堂名更重黄州西山草木尤光彩一一曽經杖屨游再閏黄州正坐詩詩因遷謫更瑰奇讀公赤壁詞并賦如見周郎破賊時供成詩案脱纍囚天遣公來此地游自有胸中雲夢澤更居雲夢澤南州口誦淵明歸去詞岷峨歸去竟無期高安難弟來相訪細説對牀風雨時批風抺月五經年吟盡淮南盡處天獨與元之韓魏國神交千古作三賢兩宋名賢小集巻一百六十六
