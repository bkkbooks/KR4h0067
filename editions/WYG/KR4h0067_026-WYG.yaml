body:
  text: 兩宋名賢小集巻二十六宋陳思編元陳世隆補伐檀集逰石池潭吾家溪潭動百尺坐見遊魚可倒指月明無風水不動釣絲鑑中出朱鯉乗閒具酒席草岸呼經一舉嘗百尾鱠霜炙玉眠鴟夷樹掛落日醉不起幾年手板負青山趂魚舷聲不入耳凉秋九月役吏事瘦馬奔走黄葉裏有酒不得好景飲訪古或問芻牧子指我石池十里近蒼苔畏厓碧無底楚王北遊歎寂寞創竒造幽有遺址舞陽民傳楚襄王遊此臨河以石為池我來徘徊知是否廢興盡可付流水髣髴故溪在吾目濯手潄齒有餘思開罇喜與風景遇蘆花入盃勸人醉漁翁有意助酒巵青竹盡日垂空餌我疑溪靈靳異景不遣紅鱗滿人意人生天地未歸客計較富貴羞犬彘當須醉倒載月歸不信郷夢留不止食鱠秋風蓴魚肥兔罝嚵涎落溪友入晝夢但苦青衫縛落日渡河水食指相悟覺宿夕治鱠具共作泛舟約網罟遮青答疑誤老鱒薦絲臛玉軟飽下筯坐視肴果惡酒薄如疲兵對此得衞霍迴首食五鼎適意均一樂人間軍須後甑釜有藜藿甘鮮豈敢事聊此慰寂寞家僮來持雙井芽數數飲之輙成詩以示同舎我疑醇醲千古味寂寞散在山茶枝雙井名入天下聞建溪春色無光輝吾鄉茶友若敵國糞土尺璧珍刀圭嗟予奔走車馬跡塵埃荆棘生喉頥煮雲為腴不可見青泉緑樹應相嗤長鬚前日千里至百芽包裹林巖姿開緘春風若滿手喜氣收拾人恐知江南陽和夜欲試小齋獨與清風期石鼎泉甘火齊得混沌不死元氣肥詩書坐對為客主一啜已見沆瀣醨通宵安穏睡物外家夢欲遣不肯歸不信試來與君飲洗出正性還肝脾靈井何年清泉眼幾斛涵蒼苔瓮盎日夜至長滿莫可涯天旱不知竭衆流起黄埃淘綆乾未定能使沴氣開大旱淘井竭其水必得雨以為常廟祠失根柢故老奠酒盃井傍有祠或曰衞靈公廟蠶民呪棗栗千斤意徘徊臘月民持蠶紙浴井中必投棗栗呪祝其辭曰齊起齊眠千斤萬斤兒童慣冷煖預知春秋來臨之鑒鬚眉方鑑無煤炲窟穴若喉吭我疑吐雲雷何當鞭蜃螭與國驅旱災過建成侯廟鳴鴟古木末飢鳥啄斧柯下有黄侯宫清風在藤蘿公昔為刺史俗若閨門和德銘潁人心千載不可磨至今奉如生慢侮莫敢過破祠望道路丹簷獨峩峩春秋賽豚肩里巫日婆娑牛童不知此來徃夕陽歌過許由冡在箕山上下臨潁水稷契寧渴死不飲箕潁泉先生獨洗耳不聽天子言清風飽進退千載何悠然孤墳沒荆棘高名争青山嗟我迍邅身一命行十年味薄無辛鹹璞頑廢雕鐫朝行箕山麓暮挹潁水源竹帛何處所搔首熊魚間白雲要閒友尚苦兒女牽丈夫合勇决顧計羞面顔洛陽道中秋風滿巾衣洛水行飲馬山川氣象老身若在古畫嵩雲知客心峯色正掃洒荒草徧丘墟沈吟動舒瀉過少姨廟少室山下隂森老柏少姨廟爐煙蓬勃疑行雲祭盤狼籍山鳥飽巫祝生涯來徃人竹軒小軒與竹事還徃庭下寂寂無客塵開書讀對聖賢語一畆清風為主人賦聞角得德字角本金鼓儔獨主昏曉色日收雲氣黄月斜霜露白征夫朝夕聞淚落甲鎧黒時年腐櫜鞬白首眼不識嚴城重啟閉不廢角人職老農鼓腹聽安識天子德賦小桐小桐纔幾尺氣壓百歳樗雨露意未飽風月韻已孤鳯凰肯寂寞燕雀空踟蹰天地有和氣想為桐之腴我願刳作琴獻上九重居坐使薫風還雖死骨不枯賦轆轤火雲旱風苗欲死曲木直綆寒泉深耕夫淚濕原上土老圃顧盼輕黄金賦古佛樹老枝半死碑斷壁底眠古屋顔色改有佛獨巋然蒼首溜雨足壞臂蔓草纒野老每再拜徃徃報豐年孔祠照四方制度丹雘妍朝夕過其下孰肯為㳟䖍土木兹僅分吾民信益堅佛法入人心誰與斸其根蒼蒼不可問用意或者偏木蠧罪豈大付與啄木權胡不啄佛徒使蠧民之天斷碑得金字古寺得斷碣偃卧敗壁隂莓苔入破字欲讀不易尋姓氏駁難辨展轉風雨侵塵冗夏蛙宿草盛秋蟲吟田夫煆可礪老婦寒可碪伊非浮圖家嵗月徒駸駸予聞岐陽鼓篆法抵萬金存者十止九太息涕泗霪周宣王蒐於岐陽刻石為十鼓今具存者九而已次韻和中伏坐夜萬兵昏雨過暑斗挿雲傾老佞溪蛙静真交海月生遊氛褰幕帟逺籟起莖英清洗塵埃慮幽通造化情酸鹹時味薄寂寞古途亨去象筌真意無形寫天疑誤聲詩疑窺杜子文欲造盤庚身在清風國神逰白玉城希夷乗浩氣沆瀣飲元精坐久忘昏寐迴頭有啟明灸贅疣贅疣在予手累久至三四初視若外物於意不能置居閒或灸灼已沒出復繼贅出與贅沒曾莫生死異天地贅一氣萬物贅天地贅復贅於人小大而已矣人之於為贅作為有大忌至理本無事破真以為偽善惡亂大性賞罰亂大治宫徴亂大聲青黄亂大賁寸尺亂大刑酸鹹亂大味大樸如瘡疸空虚無完理天地不爾仇爾獨贅之計恥指不若人孟子其有謂志小略其大殆非達者意棄火復投艾兩忘吾贅贅賦八月竹我養一軒竹秋來成緑隂萬物有衰意獨懷霜雪心西風嵇叔醉明月白公吟迴首㸔桃李何嘗費百金遊雲門山南山州之屏四時改顔色日夕太守宴供帳减繒帛更求秉燭飲圖寫在四壁煙雲時藏埋景好宜愛惜我官府中塵喜與山相識泉石未還徃愧負苦逋責秋風復杖屨持酒窮勝僻莓苔轉蒼崖郡國在几席廢興賦飛鳥牛羊自朝夕風物摹大句寸薄徒噤嘿唯作酩酊歸山月吐半壁沈吟又慰喜三友添飲客予于署居之南作亭朝夕以與風月徃還名曰三友其南軒與山相值故云耳攜家遊矮松矮松名載四海耳百怪老筆不可傳左妻右兒醉樹下安得白首巢其巔庭樹聨句枝字為韻某王甫婆娑庭中樹老大千年枝某百弓蔽赫日四座生凉颸甫影怪疑龍蛇聲和認塤篪某木被斧斤賞聲辭塵埃欺甫輪囷壯士歎冷淡童子􅅓某盤根得地固挺材本天資甫枌榆謾百尺杞桞徒一圍某節堅費刻畫莫訝繩墨遲甫枝狂躍蛟虬癭怪蹲熊羆有時相摩擊徃徃霹靂飛某篩月碎玉散障日翠幄垂甫腹空嬾龍卧實少飢禽悲敗葉童僕憎清隂兒女嬉堂萱小人態堦藥老婢姿春禽似竽笙夏蜩若羮糜提孩不出户知時如蓍龜某得成孤高狀敢㤀毫末時甫身遭藤蘿蔽心與松柏期某晨煙拂杪起落日侵梢齊甫老蠧病其中啄木為良醫公輸不在世志士空嗟咨某止知楩柟高苦厭樗櫟卑甫大屋必欲構老匠寧終遺某棟梁如採收散材安足知甫斑石枕聨句向宗道某斸得西山骨磨礱露斑駁凝結一何怪宗道形模萬難學直疑彩雲根某又訝紫珉璞中瘦􅀈蛟腹宗道外文灼龜殻冷剖清泉肝某􅖽搘老鼈脚堅方君子性宗道清純聖人樸有氣當補天某無瑕應並殻定漬盤古苔宗道想漏神農藥堪作寢寐寶某尤是炎蒸託眠月病頭愈宗道横風酲肺濯珊瑚侈可唾某陶甄脆堪撲夜静魘鬼驚宗道晝冷詩魔愕首愜無俗夢某心清去煩惡蘄簟方敢友宗道蜀笻良可劇何必檄愈風某何必文驅瘧質任兒女􅅓宗道頑宜僮僕謔枕流固迂誕某籍糟徒落魄潤生審將雨宗道輝發疑有珏髑髏莊生狂某琥珀宋武薄欲鑱中郎銘文章體猶弱欲秘淮南書神仙志非樂宗道我疑混沌鑛誰與礱竅鑿可作甘寢輿華胥詣㝠寞某子道足施為我拙困嬰縛已謀其巾履其巾履當是具巾履行當老嵩霍子其乞我歸終焉卧雲壑宗道嗜好我已癖須求子雖慤氊舊王固惜瓢陋顔不博異時一經子便當千金橐客退獨摩拂卧送山月落當有某字送蘇田司理秦人勇鬬暴獄訟號難理錙銖較罪法闕責莫可避蘓生决曺掾以明縛姦吏我見獄户囚出入有平氣章章三年課已在山公啟六月暑濕衣出汗若炊燹俸㣲迫朝夕衝熱事行李一身不能賙送子腸腑沸送李室長慶州寧覲我愛孟堅文學飽持筆去作將軍客鋪張大漢征北功手攜直上燕然刻千載事掛單于眼至今猶若擒白黒幾年羌夷瘡一方窟穴味疑誤掃北士瘠我生南方長詩書愛國區區肺如炙欲於塞外勒姓名徃徃夜夢賀蘭石一來長安事刀筆駑駘不展芻粟力峩峩李公邦之梓聲載百郡如霹靂今年權佩慶州印上馬威至吞秋色羌夷奔走若奴婢􅋇面童子嗔可革白頭慶民能記數上聲前時太守有隂德君之祖前知慶州試求園中手栽樹邊人應作甘棠惜老㓜事公如父兄妥帖不敢相于極子來别我省塞上霜風漸著邊樹赤塵埃恨絆不得住安得鑽眉生羽翼子今才華筆端富山川去入風雅骨黄雲白草牛羊肥區落雞犬晴歴歴將詩寫作聚米圖歸來為我一指畫和栁子玉官舍十首心適堂一屏一榻無俗塵左置枯琴右周易重門不閉誰徃還明月清風是相識思山齋吳兒心著吳山深終南滿目不自慰有時蟬蜕書几邊夢到五湖千里外君吳人小池清泉數斛闗幽事坐見鏡中魚徃來浮萍蝕盡秋月面霜為一磨如匣開新泉牆根新冽寒泉眼風廊一股來泠泠燈花夜半知我喜恰是舊山穿石聲竹塢笋隨人意踈處生清風如歸自來去雖然不與俗子期隂過隣家亦銷暑土榻一云榻前鼓吹蛙一部榻上古木吟風雨客來相倚曲肱眠免令不解山公語牀前一尺二尺泉牀後三枝五枝樹眼間圖似在家山夢魂不使東南去怪石一云山鬼水怪著薜茘天鹿辟邪眠莓苔釣簾坐對心語口曽見漢唐池館來山阿有人著薜荔庭下縛虎眠莓苔手磨心語知許事曾見漢唐池館來茴香隣家争挿紅紫歸詩人獨行嗅芳草叢邊幽蠧更不凡蝴蝶紛紛逐花老茴香多蠧蜜蜂秋成想見香租入菊露楓膠蜜幾脾日日山僮掃紅葉蜂衙知是主人歸君𣙜酒卯入甲出芭蕉有底春風能好事解將刀尺翦青天知君新得草書法旋巻碧雲供小牋君善草書送楊侍讀自長安之蜀西征七年四方病闗中所向尤瘡痍欲令福星及憔悴千里特輟廊廟姿公如手持天子德家至户到人人施秦俗鬬暴號難理列郡京兆猶鼎沸公來寛假訟訴少杻械顛倒生菌芝神疑公惠入人淺六月巖谷囚雨師雩壇滴酒上未乾霶霈已洗旌旗歸今年夏公三禱雨皆應老農笑呼刺史雨菽粟茂好公所攜闗中自用兵以後踰十年其地未嘗俱大收今年夏秋田高下盡豐民徃徃指菽粟曰此是侍讀帶來幾年軍須俗枯槁老㓜不足蒿與藜薄田今亦夏秋稔竇窖飽滿雞豬肥公之去思甚明白衆口已寫德政辭鐫鑱不要路傍石人心自是長安碑今年夷馬飲瀘水苴土新佩黄金龜公所拜蜀國侯相如才高去諭蜀弩矢故事重光輝公故蜀人雍人欲把㓂恂借益部已歎廉公遲傅巖今屬九折外帝夢即徃西南涯答王甫判官示遊興慶池之作東池十里近遭匝風物飽南山若户屏登臨四時好我初來長安脚擬朝夕到纒綿簿書間拘禁若囚盗一歳無幾至荏苒成吏考夜夜千頃月只供釣魚老平生林泉心探竒欲傾倒咫尺迺尚爾滿意寧可保君官苦近市危坐若林槁偷閒呶呶中躍馬志歊暴登覽足意思滿腹若懷寶歸來成新詩使我愧懷抱依韻和酬雷太簡見貽之什生長詩與書不信世道難出處愧古人章句得一官舌强去聲不肯柔開口誰欣歡十年走塵土蹭蹬苦地寒紆朱非良貴寧較厚與單古心自突兀胸中鬰萬端昔常玩于水今乃知其瀾身世心已灰人事鼻可酸病卧得君詩喜拭昏膜㸔意逺辭淡泊稠重欲相寛以言藥我病吳鱸在秦飡大句牽勉酬韻高語難安謝崔象之示詩稿古樂治情性故使風俗完鄭衛入人耳雅正聲日殫教化走薄惡靡靡如轉丸全音不可見來徃寂寞間我疑至和意獨落詩人肝或以鳴道德或以傷憂患存者三百篇興寄青與丹至今如清風留在高木端敦厚久衰落坐見王澤乾後世其得者或謁道之門失者抱太羮競下鹹與酸最晚李杜出遂將風雅壇内以康心脾睥睨萬物根予早酷愛慕强把屈瓠鑽當食對藜藿誦之若熊蹯崔子我同好韻語抉籬藩其詩長於適意趣猶椑豚巨軸踰百篇抵我輕璵璠得之忘睡眠夜拭瞳朠昏若遊金貂市時見太古冠淡泊路久茀共約鋤榛菅當結明月期與君酌醇源次韻和真長幕中偶書人情歲時登鄉縣自無訟公庭破莓苔日苦黥徒送幕府隠詩書黄堂卧梁棟幾字署紙尾朝夕寧倥偬塵土安止足性情適吟諷收心觀無始静卧憫羣動勞生懵出處欲把清風鞚青山自無價夜夜有歸夢但知陶潛卑寧識賈生慟夜雨誦君詩一盃供費用次韻和酬真長對雪之作西湖主人久未至雪雲為我開吟天偷閒把酒羅膾鯉魚凍難趂煩鳴舷旋求野果向山市僮僕覔路占平川恍然白玉為飲國寒威醉思相翩翾顧盼萬景來筆端濡染欲寫毫已堅初疑萬國會盟散斷蛙破壁盈枯田禽巢一一鶴上下冰殿掃洒迎羣仙又疑水官愛雪桞故把衆庶為飛綿我思江淮有流民徃徃匍匐僵道邊朱門意氣與寒競上馬酒面紅欲燃天將景與富貴買不知一費幾萬錢詩家把筆争造化對此自恨才慳偏徘徊嗅嚼醉還醒來徃但見鞋履穿歸來庭樹玉花落稚子狂走皆華顛擁爐搔首有餘意喜與麰麥為豐年夜闌更欲和月㸔坐久諷誦瓊瑤篇調高白雪古難和思短强被詩魔牽卒章我欲涕淚下連茹固已知君賢喜雨上文相公火神侵官弄胸臆青帝欲滿勾芒慵驕陽暴苗不得秀風俗相顧無顔容我公禆補造化手乞許暫息平姦驄公常乗驄馬西湖景好天子借訟簡朝夕臨青銅忽窺庭民有旱色輟寢廢飯忘巾笻公閒暇常服道巾笻杖徃來湖中訪求雩法得古本若可舒巻隂陽功除壇規土鍤未動精意已與神耳通雷官風師不敢息先時奔走鞭羣龍稚苗霶霈飽哺乳一夕换得千里豐老㓜懽呼相公雨喜氣醞釀為和風一封朝緘萬室意慰减焦思寛九重選牲祀龍益傾倒大宅不滿猶忡忡樸愚幕吏解公意期雨霑足環海中不以一郡喜為喜喜憂天下公之公次韻和象之夏夜作大暑暴虐如惡酒意思頹困不可醒日官我疑借炎熱委輸出火星熒熒霈然一雨醫晚景庭樹洗出蜩螗聲㣲雲掃洒供夜坐造化似解通人情清風明月作三友趣君可買輕連坑恍然身在冲泊域目空萬狀遺骸形此時象之入詩國句句鍜鍊鑪鎚精窮㣲心到混沌側高處意氣捫日星詰朝攜詩示我讀飢腸饞口逢珍烹義幽語險索究解如手捕虎不敢停歸來牽勉拾餘思魚目愧傍蟾蜍明和象之雨後望少室山白雲塵埃奔趨挿手板十年已賣山中閒相逢少室若交舊白雲與我開容顔風驅煙氣去敝幕天覆碧玉無瑕瘢我疑神兵宴天上掃洒伊洛為圖看又疑山鬼有寒税纊絮萬疊輸隂官色如可餐無厭飽頗梨為甑炊琅玕去去還觀不能已一里迴首百據鞍長安許生以畫名閒暇拂拭新素紈能求山高水深趣常恐造化在筆端每觀雲泉得意處擬寫男女家其間今對異景慙首䑕愚若犬彘編槽欄君詩託我有深意明月一盃心徃還席上賦别南宫希元十年眯車塵思歸入夢寐晨興見家山兩目如去翳故人又過我相對有餘意當罇話舊遊强笑復吁欷君名在鄉書捧檄不肯愧高堂去白髪有淚落鞭轡里人獻吉夢四壁衆所義希元應書里人屢獻夢長老以為吉祥我喜先子言在耳若龜筮先子嘗云希元孝而好學必不窮人生老聚散酒薄滿莫避相見意最長强飲不能醉次韻和劉卿材見寄之什風波一相失倒指歳月耗交情見千里文字每教告胸中飽耘鋤勉我穫以道踟蹰竹帛間相期古人到十里走塵土心不勇於躁乃知鐫磨益不必硯席好去聲君屈百里官卓趨而魯蹈不使鞭扑教人情自傾倒訟稀禾黍登醺若飲醇䤖使者席未煖姓名達珪瑁部使者下車必亟薦鄉材未嘗後麒麟踴躍起志逺無近報糞土齪齪者錙銖較稱號青㝠脚可挿泥塗迹將掃寧知西山民靖安帶西山之麓歸車恐君膏我行省板輿假途期問勞理聲如壁隣歎息不可造予道出海昏去靖安纔數舍遙知詩書宰優㳺漆園傲極目西飛雲徒使瞳子眊敢期枉佳作綢繆肺襟奥大句驅老意木古風雨暴驚味無厭已敗者豆籩犒我輙牽勉和徒手大阿冐酌酒持君詩吟哦舌根燥和西湖雪中泛舟之作時安公鎮許冬旱種不入潁人無顔色上輟霖雨姿福此千里窄公來視民憂身若抱病癖霖雨變飛雪萬里如藥石幕府環鄒枚共喜妖沴釋欲有瓊樹春選地得勝僻刺舟敲湖氷坐泛白玉國持酒與寒競醉倒無顧惜餘英入杯斚似解勸飲客而我坐席末斗筲寛一石景值風雅匠萬狀困刀尺鳴鳯相上下獨愧如螻蟈送同年張明逺之興州掾赤髭苦顔貎我怪意氣揚人曰黜文登兹事可降霜歸來卧詩書藜藿甘肉粱乃知吾同升喜此剛肺腸甘脆迫朝夕拂衣莫安遑興山在何處蜀道難且長妻孥客蓬蓽板輿獨徬徨寄其孥青州獨迎母之官朱門腐鼎爼天理何茫茫皇祐五年三月乙巳齊大風海水暴上壽光千乗兩縣民數百家被其災而死者幾半亟相平陽公以同年李君子儀往賑之以詩見寄因而和酬鹽民沒利家海隅奔走末業田園蕪天意似遣陽侯驅巻水沃殺煎海爐怒濤百尺不及逋老㓜十五其為魚耕夫蠶婦來躊躇百金不易箔與鋤齊人言蠶者與箔為數我公偃息哀其愚埋掩尸骼賙惸孤吾黨子儀馳赤駒口齎公惠人人嘘日走百里嫌昳晡不飲不食顔色癯去時萬樹如束枯回首緑暗紅紫踈寄詩百言舉其麤我愧安飽心如苴元伯示清水泊之什因和酬十年不踏故溪上有時夢去千里遊每思魚行鑑中見青衫手板如仇讐秋風鱸肥美無價莫怪張翰不可留前日誦君清水吟胸中突起百尺愁兒牽女嬰走塵土百年一半如棄投清風明月無界畔白首願作山中侯君詩寫出漁者意老景一片在目眸清泉釣舟未入手聊可觀誦忘吾憂次韻和酬隠直憶花見寄之作春工不揀勢厚薄染成庭内花梢紅反拘簿書似機械不得醉倒眠緑叢君時馬上正南走假有樽酒何由同馨香蜂蝶似相讓顔色開落輸東風公餘徘徊獨遶樹空有歎恨不可窮君雖不見紅紫落亦有惆悵環胸中作詩寄我憶花意句老與古争彊雄其間模寫景如畫爛漫一片春顔容乃知詩家有刀尺裁翦自奪隂陽功誦詩酌酒無厭已韻險强續慙非工送劉孟卿遊天台雁蕩二山治源先生高七十山水病僻不可瘳竈無炊煙不顧計窮幽極怪如仇讐有時清風明月對好景霹靂拔却大樹不迴頭四方泉石朝入耳杖屨百里夕已投大笑箕山不敢出走避軒冕豈自由天台鴈蕩潑上心暑焦毛髪不肯留縈紆長淮下平席倒指計日觀怒濤君詩功刻造化骨吳越氣象當先愁古今吟力未到處好句願備幽人收此行詩是圖畫二山筆歸日借我目一遊次韻和伯元南樓避暑遇雨之作城頭歸烏喘搨翼夕陽欄干手可炙長虹如篆報雨來雲脚挿下千里赤南山端正太古屏飛亷掃雲為撥墨安得老筆描寫住白頭許生死堪憶長安許生踰八十以水墨名於時今已死次韻和子儀聞蟬落日挂樹間長我庭下隂園林動秋意高蟬忽㣲吟清風轉餘聲杳若下逺岑㣲物感時節鏗鍧吐商金古樂久破碎兹蟲抱金音荒忽尚偃蹇激起壯士心願為秋蟬操被之朱絲琴和子儀巡捕蝗天子輟霖雨兹來澤東民威聲先公至暴攘走四隣下車坐無事懲勸禆秋春物價以日减囷倉飽新陳俗愚其何知蝗來遏公仁所至不為災羣飛亂煙雲公慮種上聲吾土且為沴氣根計丁立捕法官行勞其勤老㓜千里眉朝蹙夕已伸我知公之德由此碑齊人求郭侍禁水墨樹石塵埃典却林泉間家夢夜夜歸雲端知君弄筆欺造化乞我幾株松石看送元伯西歸飲者為量無大小要於醉焉而已矣乃知一飲一不徒醉鄉欲到無幾爾我幸俸薄飲不多酩酊造次有餘味有時酒伯投客轄斗筲往往衆所鄙近得元伯東海濵飲少好吟性相似山青月白得意時相對觴詠不能已直到千古醉者心名利莫可汚其涘乗興弄筆窺造化混沌竅鑿可倒指須臾椽杵成巨軸更唱迭和若宫徴今公官滿捨我去獨有姓名碑百里踟蹰預恐春風來青草坐見飲地起詩須數寄續百篇無使塵埃昏紙尾同有東秦唱和踰百篇讀君謨黼扆箴常讀賈誼書愛其極理亂言入筆未乾絳灌舌如鑚文帝不肯為萬世為扼腕漢道竟齷齪席莫一日煖今讀君謨箴句句到伊旦窺國見肺肝欲取以手澣何啻可痛哭一一中去聲世患設施有條理如肉以丳貫可作天下藥其應疾和緩非獨起國痿敵頸坐可絆聖賢方相逢辨别洚與灌萬不使斯言以為後世恨疑當作歎兩宋名賢小集巻二十六
