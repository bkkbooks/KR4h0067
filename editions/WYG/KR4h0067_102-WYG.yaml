body:
  text: 兩宋名賢小集巻一百二宋陳思編元陳世隆補紫㣲集吕本中字居仁夀州人好問之子公著之曽孫也㓜敏悟少長從楊時游酢尹焞遊以公著遺表恩授承務郎坐黨事被黜紹興初召見特賜進士累官中書舍人權直學士院忤時相罷奉祠卒賜諡文清學者稱東萊先生符離諸賢詩窮居日荒凉杜門與世絶親故日夜疎詩書固宜缺符離雖陋邦賢士稍羅列徳操青雲器議論軰前哲外貎發英華中心瑩冰雪介然特立士勁氣剛于鐵攘臂辯是非孰能逃區别信民粹而和名利誠難悦汨沒稠人中獨抱雲松節偉哉二三子實乃邦家傑我來從之遊内顧慙疎拙欣然對三益放懐歌數闋已矣不須言渠當為君説徳操充之皆約九月間見過今皆未至扶杖出門悠然有感病著文書懶出門偶扶藜杖看行雲屋頭日在轉花影水面風來散縠紋不厭莫城千嶂合稍令明月萬家分小庭留得清山在已見霜紅未見君萬里江南雨外船長腰秔米縮頭鯿廣文繫馬無由去更有何人贈酒錢嵗晚野竹新開徑疎籬自著行暮寒收雨雪落日散牛羊生事顔公拙才名謝奕狂藥囊無奈汝春到莫相妨晚歩至江上浦口生春綠未酣南山初見碧嶃巖風聲入樹翻歸鳥月影浮江倒客帆破甑不堪充酒劵短蓑真欲換朝衫往來泥雨城南路可見輕鷗定不凡小園小園常在眼春事已天涯雨暗堤前路苔深林外家曲池通小徑宻樹隠殘花長愧鄰翁酒囊空尚可賒謁雍道士雍有古畫甚多盡為郡掾取去雍游貴人門甚熟紛紛乾沒混泥沙不遣塵言挂齒牙妙畫已歸三語掾壯游空記五侯家古壇背日藏芳草小樹留春放晚花能共山翁同活計隔林分聽一池蛙春日即事二首隠几虚堂俗客稀片心真與道相宜風揺栁帶千絲亂雨勒花心十日期瘦病纔蘇休強酒良辰雖好少題詩賈生詞賦常流落歸去來兮在㡬時病起多情白日遲強來庭下探花期雪消池舘初春後人倚欄干欲暮時亂蝶狂蜂俱有意兎葵燕麦自無知池邉垂栁腰肢活折盡長條為寄誰夜作呈諸公風江舞暮帆野樹散歸鳥寒燈上壁角疎星綴林杪歸來静無事獨坐搜黙藁放筆有新功無人與傾倒不知新恨多但覺舊愁少石鼎倚殘爐茶烟看清裊明朝尋酒錢折簡喚諸老知上歗傲軒貪夫九鼎猶不足淵明一軒長有餘人生趣向等天壤䲭嚇腐䑕猜鵷雛中郎妙處世不識風期自與常人殊開軒便有千載韵友葛天民無懐徒坐看松菊換時節兎葵桃樹紛榮枯五年却走各南北千里懐想空煩紆雙魚沉浮久不至三徑寂寞今何如文章潦倒付丘壑疾病蹭蹬思江湖何時共坐北風裡煩君小摘園中蔬新冬西風吹禾黍落日在陋巷杖藜訪新冬霜樹眇空曠人烟村舍西旅店古原上晚山晴更好秀色常在望居閒得真趣日欲就疎放豈惟僧俗徒庶自免嘲謗東隣酒初熟清香亂盆盎徑須騎牆頭挈榼獻窮狀吾生足羈旅久病非少壯銀杯驚羽化布帆保無恙雖非陶潜隠不負徐邈暢廣陵借韻􅃧用文潜體往來六十里各自一江郊栁色團渦㟁春風楊子橋好山當斷㟁野鳥度空巢一任雷塘路暮天風雨號勸張李二君酒張侯好詩如好色不敢為主而為客李侯好酒如好詩心雖甚壯無人知兩侯風味俱不惡如芙蓉與木芍藥午牕留客看筆快曉枕無人猶睡著廣袖漸變天寳粧大字不作元和脚世人譏咲乃其分政是仍叔之子弱病夫坐隠無所求荒簷斷雨鳴春鳩爐烟未盡消百憂恨不緩帶從公游何時清江横小舟與公一醉荻花秋却來宻菴參牧牛登舟夜雨曉猶滴怒風晴更吹已無行役念寧有别離悲舟楫三年路江山一月期東菴舊還往不廢百篇詩贈浹上人一上人君行南山南我在北山北不聞浴鵠白但見染絲黒老境欲垂垂快意須得得孰知百雉堅而有一日克浹如澗底松縱老終不踣一如雲間鶴不復可羈勒我如千里風遇此兩鴻鵠明珠脱氛翳曉日破昏塞宿障不盡除胸次猶筆墨君看説詩口乃是杖山力冷霜卧偃蹇嵗月飽封殖誰能窺藩籬未易得閫閾政當歛光芒不少須緣飾相從無何鄉敗衲依破裓更令好事人妙語添一則秋夜示李十晴鳩不時鳴雨鳩不暫歇相去跬步間屢見屐齒折寒泥擁衰草秋扇罷殘熱今晨好風景稍貸屋頭月清光冷相照玉艷滿金玦喚客坐前牕文字相澡雪殷勤傍詩律未暇了麯蘖瀾翻談經口邂逅如意鐵我歌君輙書字字有行列不須陛枑嚴但要兵衞設譬如南山石瑑齒當井渫真成一戰霸未可三鼓竭人生各涇渭世事亦滕薛髙堂食􅁏人兩馬方踶齧何知緼袍底猶有不安節王氏郊居江山䖏䖏好落日極登臨雨續蔬畦潤風吹柿葉隂客船頻上下水鳥故浮沉尚有南飛雁丁寕可寄音雨後至江上有懐諸子落日滿寒雨長江收夕霏定知聊復爾敢望不相違野鳥晴相喚殘螢晚自飛殷勤兩山口好為放朝暉奉送子之還京師日月老投閒文字今削跡便然腰十圍欲吐喙三尺頗懐平生友相就語肝膈諸江好兄弟夫子眉最白詞林三二公子實門下客布帆千里來許我間賔席階庭出蘭樹户牖照圭璧詩如駕高浪萬頃隨筆力寧為首陽餓不作嬖奚獲乃知工語言要是飽糠覈茫然李杜壇未免陳蔡厄出門觀善陣歛手避勍敵澄江揺夜霜嵗晚見沙石釵頭罥蛛絲即有梁宋役士生多艱虞道逺自古昔相期逍遥游不計天地窄名聲了三黜談笑供百謫别君為此言可當繞朝䇿喜章仲孚朝奉見過十韻苦語不難好舊交今則無但能留客坐已勝折腰趨只有連根煮初非滿眼酤苔痕記柱杖雪影傍跏趺語道我恨晚説詩公不迂丁寧入漢魏委曲上唐虞厯厯有全體怱怱或半塗真當置度外不敢望庭隅日月換新嵗江山非故吾他年佳句在與畫宻菴圖山谷論作詩法當自舜臯陶賡歌及五子之歌以下皆當精攷故予論詩必斷自唐虞以下觀寗子儀所蓄維摩寒山拾得唐畫歌君不見寒山子垢面蓬頭何所似戯拈拄杖喚拾公似是同遊國清寺又不見維摩老結習已空無可道牀頭誰是散花人墮地紛紛不須掃嗚呼妙處雖在不得言尚有丹青傳百年請公著眼落筆前令我琢句逃幽禪異時净社看白蓮莫忘只今香火縁題李伯時維摩畫像圖老松攙天四無壁小菴不旁容一室野竹入户芭蕉色下有無言病摩詰文殊妙對亦無真身如浮雲那得親驚倒同行問話人彼上人者何所云龍眠好事筆有神不避世間狐兎羣掃渠世間千斛塵多口阿師聞不聞伍貟祠伍貟廟前一丈碑上有野鶴雙來棲水雲杳杳凉去逺風雨冥冥秋到遲江花相邇野花發舊燕不隨新燕歸丈夫遺恨竟何許楚越勾吴今是非老松奉君以綠綺琴報我以雙南金盃中琥珀不須盡聽妾一聲行路吟君看庭前老松樹上有杳黙不斷之清隂牆低未礙髯髪古嵗晚不辭霜雪侵東園桃李自研好與君百嵗同此心寄周司理日月走劻勷舟楫卧煩署凉秋在萬里客子安得語周侯磊落人憐我自熬煮殷勤半月留可得一咲許別來今㡬日坐此百里阻清風不時來曉月仍半吐巻簾看新竹忽似對眉宇人生行樂耳舍此皆自苦終期卜隣歸重聽對牀雨雖無嗚嗚歌亦有坎坎鼓山光寺前泊舟值雨輕雷喚小雨憶在白沙時綠酒留連醉江燈取次詩好風那得有凉月自相隨獨上山光寺清歌無栁枝送一上人之京師東風吹雲十日雨卧聽城頭打衙鼓道人逺自山中來共坐南窓濯泥土自然高韵到羲皇豈止㣲言變齊魯萬言回首不震掉一葉横江且掀舞未能入水取蛟蜃尚欲投戈伐貔虎念公守此非一朝木病磈瘣無枝條已盡千峯西嶺雪更夢八月錢塘潮京城塵沙深一尺是中莫留公履迹權門噂􅊱兒女咲我亦思之不能食片帆無事早歸來為公一洗山中石京師贈大有叔尊酒相逢十載前綠髪紅顔俱少年尊酒相逢十載後皮黄肉皺俱白首叔如鴻鵠但高飛姪似麕鼯更深走南來行李初一逢長安舊第氷雪中閉門不識故人面豪氣直欲輕元龍平生為道不為食小少所期皆目擊何時相就過江南同訪曽遊舊泉石同晁季一李天紀過沈宗師北莊因成長韵三年城南居不識城北土但聞王雪郎去作猿寉主今辰籃輿來握手相勞苦勝遊有佳士洗耳聽妙語晴窓背雲壑落日在環堵晚風生白楊想像原野古斷崖懸老木小港聚寒雨却觀城市人努力自熬煮畏途出袵席禍福有未睹杜陵懐壯遊無忌咲豪舉二者覔真是政恐君未許千秋柴桑翁妙句聊一吐斷雲斷雲西南來好風東北去翩然兩無心空中忽相遇化為一尺雪照我庭前路昔者甚可憐今來𣺌無處故人多勌色留我不少住羈愁動中膓疾病増百慮虚庭著明月皎皎如積素不見乘鸞子空懐舊烟霧六月初三日雨後步至城東凉秋生郊原快雨灑庚伏曲肱訪幽睡朝夢不可續開門招此山爽氣滿嵓谷村溪沒衰草古院滿翠木東行得幽亭小徑來已熟下有十里濠暑退萬荷綠恨無沽酒錢一醉起枵腹人生要快意豈止寄幽獨君看後池蛙聲韵故不俗怡然共清歡何必絲與竹歸計未成作詩寄懐萬里田園半有無十年歸夢阻江湖文章謬忝聲名在氣體猶如藥餌扶客路因風滯舟楫水田無雨卧菰蒲青帘白酒斜陽外不與行人滿眼酤與吴廸吉諸人赴晁季一陳塘范園之游因成十韵春風未寂寞頻枉故人車客舍輕寒下村烟宿雨餘曉紅留隠映新綠上扶疎妙墨懸髙榜殘章得舊書即所謂白水滿時雙鷺下蛟龍忽舒巻草木自清虚𣺌𣺌登臨地悠悠水竹居只今那復有本自不闗渠塘水空遺廟塘即陳元龍所開今有元龍廟在上鼉淙亦故墟園西有寺名鼉淙唐武宗時所建寺邊有鼉為水害同行喜佳士所到即吾廬政恐習池飲風流却未如侯嬴游士縱横翻覆手山東諸侯望闗走厯下邯鄲無使來長城易水非燕有大梁賔客舊如雲夷門監者未有聞漫將苦語送公子市井屠兒虚見存後來毫髪争得喪紛紛小兒跨跌宕不知世有公子牟一生放迹江海上古劍歌寒江九日雷殷空落日倒射千山紅江頭樹木半傾倒衮衮不盡洪濤風風中有物如長㦸電光忽來傾霹靂雨罷晴開不復知乃是潜蛟倚長石蒼皮半巻頗飛動澁蘚中開欲跳擲青螢野火下絶水夭矯長烟轉空壁天生神物有時出嵗月飄流為誰得銅花欲盡秋水渾尚有千年妖血痕向來天地亦兒戲俄頃變怪徒紛紜君不見豐城之水亦不久寳氣何為上牛斗夜坐廣陵城中聽夜雨倒牀不寐問更鼓西風萬里巻長河遍與淮山洗塵土淮南米賤魚亦好敢問摧頽歎羇旅重簾複幕嬾相負細字寒燈且如許漫如爾雅注蟲魚更就篇章考齊古粗知俛首受寒餓未暇著意尋豪舉牀頭有酒不敢飲况復閨門畫眉嫵故人此去今㡬時亦有文字相撑拄東明縣前濟陽路每一夢至猶能數少年不憚道里逺平生未省别離苦只今多病鬚已白尚能呼渠醉而舞田園未還君可恨嵗月漸晚我何取饑蟲遶壁不自聊爾獨何情促機杼竹西亭十年走塵土重上竹西亭草木新容態江山舊典型狂風掃毒暑落月伴疎星認取揚州路荒城一抹青春晚郊居栁外樓高綠半遮傷心春色在天涯低迷簾幕家家雨淡蕩園林處處花簷影已飛新社燕水痕初沒去年沙地偏長者無車轍掃地從教草徑斜久雨路絶賔客稀少聞后土祠瓊花盛開亦未果一往也卧聞更鼓濕不鳴曉窓但有摧簷聲雲横不放山入坐風怒欲倒江衝城東家酒熟花爛漫折簡喚客留娉婷街頭泥潦一尺許意雖欲往無由行儒生活計亦不惡蒲團堅坐到日落映窓香穗觸凝塵過眼文書開病膜明朝新晴有佳處穏看小檻翻紅藥無雙亭下一枝春玉潔霜清未寥廓閉門懶出君莫咲看汝多愁吾獨樂故人無事倘能來為君試舉舒州杓己亥上元數同晁季一叔用清坐不出北風凛凛吹月高萬木夜作窮猿號卧聽車馬起塵土愛此一室明秋毫小爐著火晚收稲短檠照坐寒無膏主人忘言客亦懶更煩赤脚送茗盌子雲事業本清浄維摩方丈常蕭散出遊苦畏今日閙歸坐略盡平生欵自知衰病損剛腸只要文書遮病眼公能却掃趂閒暇渠自低頭費牽挽明朝乘興尚能來咫尺吾廬不嫌逺試院中呈工曹惠子澤教授張彦實十日虚房罷送迎不知新雁已南征忍窮有味知詩進處事無心覺累輕殘葉入簾收薄暑破窓留月漏㣲明知公坐穏無他念識我階前拄杖聲雪夜政和六年曹州城南三日雪半夜疾風吹石裂先生睡美喚不聞不信衾幬冷如鐵病妻索火少聲韵稚子吟詩應歌節殘書向人老可愛舊劍空在磨洗缺未能去尋泉石伴未用深藏狐兎穴新正已過今㡬日嵗事嬾復從人説長江略無千里夢故人動有十年别相逢一咲又艱阻所向端坐成癡絶城中諸公不相棄時有妙句扶衰拙頗知晴意在明日泥深不怕車轄折便當脫㡌過君家共放南窓看新月一杯凍酒君莫辭預借炎威洗煩熱雨後數與李仲輔兄弟往來且約十七日同過士特因成長韵隣鷄再三鳴不改風雨晦束裝向前塗恐與泥潦㑹故人時一來共此一室内㣲已久已絶苦語或未遂子孫甚竒古却立有餘地舊從伯氏游則已聞令季斯文倘未逺吾今盡憔悴相期無何鄉獲保清净退藏身稠人中著眼世事外山空倚巖石雪立老杉檜往來相遇難更自少如意旦日過城南把酒公一醉荷珠誰倩亭亭著意擎風中零亂月中明渾無定處光偏潤正值圓時影最清曲檻落江歌一串横塘㸃碧夢三更絶憐蕩漾波心裏添得連宵細雨聲採菱詞烟艇江湖網罟疎石磯風雨釣綸虚碧池漫鑿方通徑鱗冶聊巡供别儲詩客興來堪佐酒埜人夢去却多魚䲭夷聞道曽興越經濟還餘十倍漁栁含烟帶雨過平橋嫋嫋千絲復萬條張令當年緣底事風流才似女兒腰簡寗子儀二絶只愁老去被花惱更欲忘憂須酒澆何似山堂病居士閉門高枕過春朝新晴欲上南樓月栁可藏鴉水蘸墻無限客愁芳草裡不知風雨阻斜陽烹茶水光欲盡琉璃影玉色初浮翡翠斑便覺麴生風味好小爐新火對蒲團山水圖歌君不見南江老龍夜不眠令我破屋開青天千巖倒壁巻角上一榻郤在洪濤前又不見江頭古木一尺圍猿猱接手懸高枝雨中寒蘆披靡去天際風帆先後歸陳生故是可憐人筆雖未到心已親南村北村渇欲死怪此一室無纎塵鄭䖍祁嶽不解竒韓幹畫馬空名肥萬里咫尺君得之更看湘江雷雨垂陳生欲盡湖湘圖即事戯荅季一斜陽著髙栁環堵半黄昏小圃三年旱荒池一尺渾粗知詩有味寜使婦無裩不信晁公子猶招楚些魂季一詩云思與諸公論人物試慿清議賦招魂春風春風隨長江一日行萬里蕭條起岷山歘忽度揚子江南千酒樓春風樓上頭金尊開翠幄青帘吹客愁長堤二月暖寒溪千古流紛紛桃李花處處作芳華不見梁間燕空悲王謝家題淮上亭子亭下長淮百尺深亭前雙樹老侵尋暮雲秋雁且南北斷壟荒園無古今露草欲隨霜草盡歸檣時度去檣隂秋風未免鱸魚興更有江湖萬里心正月十五日試院中烹茶因閱溪碑小爐方鼎蛙蚓鳴那知簾外東風驚亂雲初破盤鳳影缺月半墮春江明已驅簿領出門去更洗肝肺令愁醒大碑石字久寂寞髙堂素壁空崢嶸坐看光㷔掃塵土便覺氷霰臨窓屏文章斷絶聲氣在妙句直欲無蘭亭嶧山野火燒欲盡瘞鶴半在江中陵不知此書更竒古反覆厭飫無譏評山精地神肯愛䕶至今歐虞來乞靈要令石鼓舉吉日不必細字臨黄庭生平訪古少如意對此自足忘經營世間兒女争媚好紙上姓名誰重輕邇來半月得堅坐一室當行千里程南樓燈火漫明滅北里笙竽頻送迎儒生事業了不惡故人浮沉吾嬾聽更闌更自取書讀喚起奴僕尋短檠冬日雜詩白日供多病青山且舊居柴門臨水静風葉舞霜餘老練時情熟貧窮家計疎墻東端可坐炙背飽翻書春景晴乃㬉寒江曉不波雲山明客眼風露净林柯紫塞傳烽急黄池帶劍多蒼生好蘇息天意定如何懐從弟折栁長亭今㡬年一行作吏楚江邊音書頓逐歸鴻斷消息時因過客傳五嶺風温吹瘴雨九疑雲濕巻愁烟每吟春草池塘句尚想詩成夢惠連兩宋名賢小集巻一百二
