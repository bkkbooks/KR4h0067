body:
  text: 兩宋名賢小集巻二宋陳思編元陳世隆補楊文公集戲贈潁州萬壽尉吳待問待問余之故人值雨留憇數日宦途南北最情親歲晏相逢潁水濱舊日青衿同學校暫時黄綬困埃塵樽中滿酌香醪美門外高懸綵棒新雞黍留歡已慵發可堪經雨折紗巾題顯道人壁心似寒灰不復然尋常談論即彌天門臨潁水多年住法自曹溪幾世傳儒士誰同翻貝葉都人長見施金錢翰林詩版分明在曾與吾家有舊縁故侍讀尚書有贈先師詩著之於版史館阮比部知衢州因歸建陽别墅二首比部兄昭濟隠居不仕再入蓬丘席未暖飄飄又建隼旟行朋交莫惜河梁别鄉國初期晝錦榮竹箭波聲隨一棹斧柯山色對雙旌子牟江海心應在頻上高樓望帝京少小鄉闗振大名武夷山翠落門庭郎君近折仙人桂伯氏高分處士星城郭遼東應改易芝蘭謝圃自芬馨吳民正待隨車雨莫苦淹留醉醁􅌬集賢宿直寄中書李梁二舎人耿耿銀缸照直廬西風黄葉滿庭除愁心不忍聞賓雁病眼猶能拾蠧魚欹枕微吟空輾轉遶廊閒步自躊躇銅龍漏滴傳鈎盾玉兔光芒射綺疏薄宦久淹滄海郡故交多入紫垣居洛陽已在拜塵後宣室那逢膝席初投閣寂寥多自愧抱闗憔悴擬何如寧思西掖五花判且補河東三篋書桑梓狂抛萬里外蓬萊試住十年餘釋之不調嵇康嬾終待休官學種蔬翰林王學士奉使兩川萬里征西頻告㨗九重喻蜀正裁書忽聞召對浴堂殿元是親乗使者車井邑凋殘經亂後軍城鼓舞拜恩初銅梁迢遞驅騶騎玉署深嚴鏁直廬星厯更須占李郃雪園應恨欠相如歸來便在三台席轉與交親禮數疎董給事知洪州豫章南國一都會夕拜東臺最上流捧詔暫辭青鎻闥攜家便汎木蘭舟褰帷聽訟民謠洽解榻延賔主禮優只恐徵黄在朝暮西山靈藥未容求梁舍人奉使巴中藥署深嚴纔草詔劍闗迢遞忽乗軺霜天歴歴巴猿苦山路駸駸筰馬驕梁苑寒風吹别袂瞿塘春水送歸橈紫垣遣使非常例應有星文動九霄次韻和族弟日華寄編脩諸學士之什鎻闈漫喜塵通籍蓬巷無人肯顧廬天禄解嘲纔答客集仙置使又修書非烟繚繞縈珠網流水潺湲逗石渠何必銀臺號三昧此中更好味真如次韻和光禄黄少卿學士感恩書事十六韻江夏門風盛東吳族望高才雄吐白鳯志大釣靈鰲昔日參珠履嘗任淮海王記室多年汎碧桃陳琳巧書檄謝客占風騷曲宴飛三雅沈機佐六韜玳筵頻岸幘楯鼻幾揮毫託乗同歸闕臨軒别賜袍未離王儉幕獨得吕䖍刀粉署因揚歴朱門更欝陶淮南荒桂苑騎省泣霜毛此已上並叙少卿昔在淮海府中及感舊之意去國踰千里為郎歴幾曹和鉛兼祕府懸磬寓神臯室静秋生白庭閒雨長蒿禁林俄召試卿寺果垂褒道在心無悶恩深首重搔依前領圖史紬繹肯辭勞次韻和史館盛學士朝退書懷之什金壺待傳㸃瑤墀初辨色闢仗開天閽垂旒操斗極百辟瞻堯眉九州蒙禹力朝政無闕遺諫官慚曠職次韻和盛博士寄贈李四寺丞因以述懷錢郎滿腹貯精神坐上詩成壓倒人相識只從抛竹馬愚初至上都遊歴門館纔十餘歳留歡長是鱠金鱗西園宴喜期清夜曲水追隨約暮春不到門墻欲旬浹已應懸榻滿埃塵次韻和盛博士雪霽之什六花新霽白皚皚爽氣颼颼拂面來梁苑酒濃寒力減謝池風細凍文開天邊幾陣聞歸雁江外千家見早梅此際何人能訪戴剡溪清景好銜杯次韻和太僕錢少卿寄贈編脩主人宋承㫖李舍人之什春官宗伯魯諸生翰苑綸闈占大名一代典謨資潤色滿朝文物仰懸衡分班月殿趨金馬侍宴天池見石鯨即日雲屏應隔坐鄭𢎞五太尉舉第伍倫為司空每見曲躬自卑詔置雲母屏風分隔焉不須東觀待逢迎宋殿丞廣南東路轉運天子憂南越公卿薦陸生九年須富國萬里便揚旌封郡諸蠻接官曹六尚榮交州何日到鼓吹便相迎次韻和中書李舍人勉元氏道宗奉宗兄弟之什二難文彩少人過落筆尋常只患多兔苑暫遊衝霰雪龍門曾上困風波一囊負米猶為客百步穿楊待決科更得詞臣贈詩句機雲入洛擬如何送僧之様州謁王工部雪晴河水正流澌風巻驚蓬滿眼飛客路飄飄攜一錫禪房寂寂掩雙扉曹溪衣鉢何年得廬阜香燈幾日歸賢守相逢膜拜後都人争勸施珠璣次韻和錢少卿早春對景有懷諸學士草樹欣欣暖律迴謝家池沼凍紋開晴天獨向高臺望春色先從上苑來且待郢人歌白雪莫聽羌笛怨殘梅乞逢休沐便須去引滿何曾訴玉杯閣門廖舍人知袁州駸駸五馬動征塵太守風流世絶倫身事漢庭為小相家傳楚國是騷人煙波莫歎重湖逺桑梓仍將别墅鄰麥穗㣲黄稻苗緑朱轓入境便行春次韻和李舍人拜命書懷寄館殿舊僚之什拜命入星垣偏承聖主恩黄扉陪漢相彩筆代堯言佩玉天顔近籝金世望喧下僚今隔品雲路仰高軒上元夜會慎大詹西齋分題得歌字帝里風光上元節烏衣舊巷喜經過樽中酒渌寧辭醉梁上塵飛只欠歌坐聽禁城傳玉漏起㸔河漢轉金波主人愛客清宵永彩筆題詩奈樂何次韻和主人喜諸客見過之什金鴨噴香繞燭臺輕雲散盡月光來三千賔客連宵醉十二城門徹曉開何幸紫㣲容託乗更煩紅袖與傳杯明朝猶自放朝謁心喜當闗不見催坐中朱博士言今荆南張諫議典襄陽日常留意一妓公頗畏内終不得近及移郡荆渚泣别郵亭乃為歌詞流布巴郢予感其事􅆳而成詩駸駸五馬江陵去寂寂雙娥漢水頭一曲歌終眉黛歛十分酒盡淚珠流陽春郢客傳新唱暮雨高堂夢昔遊瓊樹無人敢親近章臺京兆不勝愁次韻和慎詹事述上元宵會之歡寄諸同舍之什休沐忻逢上元節華堂高宴且盤桓峩冠屢舞人多醉刻燭狂吟夜向䦨月上珠簾侵座白霜飛碧瓦透衣寒銅壺滴徹東方曙歸騎紛紛未盡歡次韻和李舍人立秋祠太一宫宿齋書事之什太一祠宫肅齋居薦至誠已將茅縮酒應用麵為牲梁武祭宗用笋脯麵牲月映金天朗風來玉宇清𤣥談知理勝蔬食覺身輕仙馭排雲下空歌遶殿聲仍聞得丹訣簪紱頓忘情同諸公寄閬州隆靈山王處士𤣥晏先生早著書聖朝未降輭輪車滿頭霜雪機心息三徑蓬蒿俗客疎千首好詩傳輦轂一枝仙桂耀門閭其子近年登進士科漢庭得意真知已應為清宵誦子虚今樞密學士陳公山人之執友也送僧之大名府謁長城侍郎上人能琴善詩東吳舊寺寄巖隈駐錫神州久未迴琴曲誰知流水意詩篇自占碧雲才廬峯已結白蓮社鄴下暫尋銅雀臺仙殿主人偏好事春風鈴閣且徘徊次韻和李寺丞寄石同院之作子雲常在草𤣥臺不獨春風滿眼來聞道後車長載酒無因曲水共流杯石渠盡日芸籖擁金谷何時綺席開珍重主人偏愛客乞逢休沐便追陪賀太僕錢少卿直祕閣幾年宿衛向周廬頻貢文章白玉除纔换月卿歸少列又來天禄校中書東吳世胄王孫貴北第門闌太僕居春草題詩欺謝客上林奏賦慕相如石渠講論應重席翠輦巡遊且奉車禁籞風光暮春月彯纓㸔是綴嚴徐次韻和盛博士喜梅大丞授户部判官新來乗傳抵秦川會府須才果峻遷應見流錢從地上時聞聚米向君前聲華南國推高士名姓丹臺綴列仙每話官曹苦拘束歸家長是夕陽天次韻李舍人憶北園尋春之作謝公别墅枕城堙瀟灑都無紫陌塵五色絲綸貪草詔一園桃李阻尋春早朝禁漏猶傳㸃下直殘陽已滿身除是禁烟容洗浴直須偷暇賞芳辰次韻和閣長李舍人喜薛梁二舍人及予同時拜命之什西垣清切本無倫虚薄將何綴侍臣承露盤高雲際曉棲雞樹緑省中春言成綸綍終非稱室藹芝蘭幸得親從此煙霄連步武宸遊長奉屬車塵次韻和承㫖侍郎宿齋太一宫之什北斗城南太一祠羽人多著九霞衣行宫肅穆珠旒拜華表飄颻鶴馭歸遶殿步虚幢影密登壇酌獻珮聲微質明禮畢還臺去廐馬翩翩速似飛十九哥赴舒州太湖簿仍得假歸鄉兩舉進士不第得學究出身初官佐邑少咨嗟且喜鄉闗得告歸松菊門前三徑在煙波江上片帆飛枌榆舊社雖堪戀星火嚴程不可違莫為棲鸞尚卑屑悔將錦襖換蓑衣唐蔡京自進士應學究科當時有此語酬謝光丞四丈見慶新命之什武夷歸路苦迢迢延閣官曹正寂寥彩鳯銜書俄錫命黄金刻印便懸腰紫㣲署近時當制建禮門深日趂朝咫尺天顔曾賜對熒煌台座得為僚鬼神清問憂前席松柏情深見後凋一曲陽春特相寄慚將木李報瓊瑤信道人歸西京道人後唐相國之孫來獻其祖所著五書不報寢丘遺業廢多年衣裓空藏相國篇北闕上書陳祖德上林結社會時賢風塵不肯留京邑龍象重歸啟梵筵聞有道安雖未識定應談論已彌天邵奉禮歸鄉應制曾親白玉除桐君溪畔是幽居未登王子洛賔歳已讀黄香東觀書萬里歸寧承漢詔三牲供膳奉潘輿水衡得俸誠堪喜莫便揮金學二疏史館盛學士以詩相賀因而答之前年出守縉雲城曾枉驪歌慰逺行今日代言青𤨏闥又披郢唱見深情側聆九奏都忘味連得雙金自滿籝紅藥階前試吟嚼胸中鄙吝一時平衢州阮比部學士得假歸鄉見過陋止留題詩什因以謝之干騎駸駸赴郡初曾迂旌斾訪吾廬天邊誰識郎官宿門外空迴長者車勸酒樽罍應引滿題詩屋壁是親書鄉人聞有神仙客逺近争來㸔隼旟致仕朱侍郎歸江陵侍郎自内署休致二年分直浴堂門簪筆垂紳奉至尊日過八甎批漢詔宴開三殿挹堯樽忽聞抗表干君父切要懸車示子孫碧落改官旌舊德黄金加錫見深恩羣公祖道争飛葢故吏沾襟亦戀軒定是遼東嘆城郭肯同彭澤慮田園捧觴莫訴前為壽上馬猶能左屬鞬臨别延英對數刻已應惇史記嘉言朱侍郎致政南歸上特賜宴于玉津園仍詔兩制三館並預其會以伸祖送輙賦詩美之征輪軋軋出皇都行路咨嗟賢大夫天子特令供祖帳國門聊且駐驪駒舊僚送别傾三省御醴分甘倒百壺下詔已聞推異禮乞言猶自渴嘉謨上特詔荆南官吏歳時存問如有章奏附驛以聞馮公不是沈郎署賀老縁何歸鑑湖明主恩深若為捨夢魂應繞博山罏元道宗弟兄東遊王謝江東推世胄機雲洛下振才名忽思油幕從知已去挈幐囊冒暑行高第自須求甲乙嘉招未用赴弓旌待㸔萬里摶羊角即是三秋聽鹿鳴朝彦賦詩争送别蕃侯置驛定相迎不知誰啖牛心炙又見清談一座傾殿院卞侍郎赴淮南轉運莎庭治行推尤異梁苑聲華占上流早是都人避驄馬近陪計相運牙籌東南轉運承新命淮海揚旌到舊遊騎置非時陳密啟壺漿幾處望行舟黄金刻印大如斗白簡飛霜凛若秋歲滿功成來會課多應便拜富人侯省中當直即事書懷兼柬閣長李舍人李公北門之望稍濃兩掖深沈大帝居紫微西省掌泥書天閽啟鑰趨朝後侍史焚香起草初五吏援毫才患少萬錢分膳食無餘鳯池荀令連賔閣騎省潘郎對直廬煙氣霏霏生屋瓦雷聲隠隠度宫車滄波滿壁浮蘭橑修竹當軒䕃綺疏南墻有董羽畫水舍人李程為之贊北軒有竹數百竿性懶無堪過叔夜思遲多病似相如繚垣直北銀臺路拭目㸔君侍玉除中伏日省中當直火雲烘爀臨中伏青𤨏深嚴直右曹吏散階庭時縱步詩成珠玉獨揮毫相烏影轉風微起仙掌隂斜日漸高何處賜氷和郢酒誰人割炙動鸞刀紫泥封詔防稽緩寒水浮𤓰散欝陶丞相憂邊稀出沐延英三刻豈知勞七夕東西燕子伯勞飛新月如鈎玉露垂河鼓天孫性靈匹鵲橋星渚有佳期穿針乞巧徘徊久織素成章報答遲定與黄姑享偕老晉宫休挿柰花枝胡祕丞知潯州蘭臺進秩通閨籍熊軾臨民奉詔條風俗重尋南越志鄉闗猶隔浙江潮懸知坐嘯謳謠洽更想行春意氣饒逺宦逢秋少悲思潘郎𤣥鬢恐先凋次韻和盛太博寄贈閣長宿齋太一宫之什漢武親祈太一壇國朝時祭領祠官羽旗搖曵晨曦上素色凄清夜漏寒駕鶴浮丘應暫下偷桃方朔合留殘齋居數宿偏蔬食定憶中厨政事飡次韻和集賢李博士中元日見寄鳯池容出沐蝸舍喜端居罷草芝泥詔閒看紫素書曲肱銷永晝行樂遶前除鬢換二毛近林凋一葉初香街連甲第席户望朝車暫别同心友還嗟會面疎次韻奉和知府溫尚書送致政朱侍郎十六韻拜章納禄便歸休祕殿親辭十二旒閣筆罷批丹鳯尾拂衣初下六鰲頭非縁荆渚依劉表定欲箕山訪許由北闕子牟終眷戀南朝安石本風流明庭過遇違三接别墅生涯治一丘身健寧煩䇿鳩杖心閒無復夢刀州素風有子堪傳遺禪論將誰共對酬白璧賜多應尚在黄金散盡不須留人欽雅譽芝蘭馥帝憶嘉言水石投祖帳特令開上苑歸帆那肯待高秋侍郎辭日上令待秋涼即程堅請便行幾程郵驛經濃暑千里山川見舊遊已是抛官玉堂署尚思陪宴井幹樓時裁奏牘猶規諫旋寫丹經自校讐鄉里高門表隂德國朝惇史紀嘉猷枌榆舊業須重葺香火前縁莫廢修歲計將何資伏臈龍陽干樹木奴州鄭溥赴汀州判官家近祝融峰登科遇至公悲秋雙鬢改佐幕十年中食蘗心常苦占蓍命未通甌閩路雖逺荆楚俗多同投刃應餘地當樽莫暫空援毫如草檄又足愈頭風次韻和宗人安期見賀恩命之什分班曉入翔鸞闕直閣旁連浴鳯池綵筆閒批五色詔好風時動萬年枝勒移鍾阜慚歸晚稱疾文園恨思遲何事吾宗心倍喜春塘夢徹寄新詩早秋楚客悲秋至庭柯一葉凋鶴天警曉露蘭畹怯涼颷團扇流塵暗單衣爽氣饒江東菰米熟歸夢隔寒潮義門胡生南歸南國烏衣族東京伯始孫一枝須折桂六闕舊旌門歸思鱸魚鱠離筵竹葉樽秋風正搖落楚客莫銷魂首座昇大師赴西京知教門事高論彌天四海聞久為龍象主空門雪峰傳法稱開士麟殿談經奉至尊香滿賜衣歸洛社苔封丈室寄梁園梵書貝葉應攜去齋罷與誰相對翻度支梁諫議請病告以詩寄之經旬不謁未央宫晏坐將誰語笑同蜀郡相如非避事浄名居士欲談空門前賔客窺行馬篋裏方書捨蠧蟲西省舊僚疎會面頓驚鄙吝滿胸中諸公於石氏東齋宴鄭工部有古者會友以文賦詩言志良辰美景胥遇幾稀衘杯漱醪其樂無量矧石氏二君克承堂構孝謹不衰滎陽鄭公傑出士林名聲籍甚以久要之契伸一獻之娛而我閣老昌武與二三大夫退食自公方駕而至乗秋高會卜夜縱談抵掌盱衡樽罍方洽峩冠側弁星漢未斜將何以窮綺席之宴嬉盡金壺之漏刻盍賦一時之事各陳二雅之言物無遁形咸抽祕思朝多君子庶為美談云耳悲秋得浮字楚客登臨處離懷重隠憂二毛初入鬢一葉早驚秋旅雁他鄉思悲笳絶塞愁憑何遣羈緒菊蘂滿杯浮次韻和慎大詹中秋待月寄西掖三舍人之什涼飈送殘暑秋色望中新天逈迷星斗宵寒待月輪境同牛渚上詩寄鳯池人僚友東牀客氷清合許親同舍薜公即其愛壻也合預兹夕之會成都鳯道人遊終南山謁种徵君何年出蜀訪南宗深鎻閒房翠蘚重振錫忽聞遊地肺題門兼得謁人龍供吟一路高秋月投宿斜陽逺寺鐘到日彌天清論罷徧尋紫閣與圭峯何太傅知晉州平明東省發魚書便擁彤襜出上都别酒金英泛籬菊去程黄葉墮闗榆叔孫舊禮妨綿蕝廉范新歌待袴襦滿腹經綸殊未展歸來㸔踐赤墀塗孫寺丞知孝城縣府尹翁尚書即孫之座主又薦賢良方止早得東堂桂一枝凌雲詞賦漢皇知從軍久在紅蓮幕對䇿曾臨白玉墀霰雪陪遊應不晚絃歌為政莫嫌遲春官宗伯大京兆喜見門生趨府時次韻和閣長修書畢退朝下直寄諸學士之什名園甲第接康衢國典新成下直初庭竹碧鮮吟不足盤飱方丈食無餘爐中九轉神仙藥案上百函親故書仍説顔回今飲酒閣長近日日痛飲秋來寧遣宴遊疎威道人歸鄉聞法靈山真佛子馳名南國本詩流二林曾有香燈約一鉢因為輦轂遊塵土化衣慵駐錫江湖收潦憶歸舟何年應制登麟殿犀柄談空對冕旒弟偁歸鄉吾家文雅占闗西五十年來桂兩枝自故侍讀尚書十五翁周顯德中登第至永十六兄纔兩人突弁後生還可畏籝金素業未應衰江湖去為思鱸鱠霧雨還歸養豹姿摩厲詞鋒莫中輟驚人專聽一鳴時史館高司諫紳知華州諫署纔聞滿歲遷分符便見入秦川援毫厭賦梁園雪緩轡閒㸔華嶽蓮竹簡汗青妨約史縑囊封皁且論邊三峰洞穴多靈藥莫便抛官去學仙明德皇太后挽歌詞五首奉敕撰母儀垂二紀坤順翊元功望斷蒼梧野尊歸長樂宫金塗烘曉日椒壁起香風奄忽違塵世攀號泣舜瞳軒星光太極隂教正中圍外戚黄金穴深宫大練衣雀臺愁霧隔駒隙暗塵飛貝闕三山路飄颻仙馭歸德契河洲什心依黄老書濯龍規誡在飛羽豫遊疎復土文園接凝塵丙殿虚蒸䒱天子孝泣血望塗車世載河山誓門無恩澤侯公桑空繭館仙藥阻蓬丘愍册藏幽壤哀笳咽素秋後宫彤管在千古紀徽猷閫範留椒闥神遊返玉清魚燈照𤣥寢騎吹咽重城運迫昇仙日人傷喪妣情宫中舊長御行哭盡吞聲又四首奉敕撰太姒徽音盛長秋命數崇黄圖分丙殿𤣥象應軒宫紀注無窮美聲詩内助功雲陽復土後陵栢自悲風甲族傳仙李遺言在濯龍後宫皆率職外戚早辭封彤管流隂教金根盛國容真遊一何遽罷望九疑峯軒遊雲杳杳舜孝日蒸蒸椒壁還生沴銅臺亦罷登親桑寧復見嘗藥遂無徵拱木𤣥堂閉凄凉烟霧凝外家金穴貴曩日玉衣裳萬壽瑤觴舉三朝複道長小侯親爼豆女史煥縑緗遽厭人間世乗雲歸帝鄉書懷寄劉五風波名路壯心殘三徑荒涼未得還病起東陽衣帶緩近卧病月餘愁多騎省鬢毛斑予行年三十有二五年書命塵西閣千古移文愧北山獨憶瓊林苦霜霰清樽歳晏强酡顔趙殿丞知河縣鼎邑閭閻有古風清談為治自從容官聨騎省通朝籍路過津橋入縣封桞䕃天衢時按轡雲生少室好搘笻龍門舊有題名處石室蒼苔駁幾重祕閣王校理知桞州南越尉陀國羅池子厚神桂林驅傳逺芸閣解嘲頻行槖黄金滿歸程皁葢新一麾愁度嶺五綵喜寧親薏苡偏防疾蒲蘆善化人蓬山直廬在几硯日生塵送僧歸越中林晏坐赤髭繁水月禪心出世間説法音同海潮震隨縁身比嶽雲閒曹溪嫡嗣多參見碧落仙鄉徧往還歸去舊房秋色晚澗松枝偃雨苔斑吳延年宰武義精神滿腹富青春燒尾曾㸔上禹門獻賦多年梁苑客謫仙重世武夷孫武夷君呼鄉人為曾孫一同印綬光初命幾驛桑麻接故園澤國歸程秋欲盡丹楓黄菊動吟魂吳待問之蒙城簿西來赴調合闗繻黄綬風塵厭九衢祖席且同開口笑公庭未色折腰趨長安車馬偏欺客魯國衣冠肯戲儒共憶故園歸計晚舊遊烟樹隔重湖黄少卿惠緑雲湯新甫竒材百尺標秋空高幹拂鵬霄仙經藥品誇難老人世霜天貴後凋千古貞魂愁化實九原荒壠恨為樵誰研露葉和雲液幾宿春酲一啜消靈隠長老歸舊山浮杯心與海鷗親駐錫王城忽過春麟殿九旬談妙法曹溪一滴渡迷津狂翻竹箭波隨棹側布黄金地絶塵白社歡迎猿鳥喜紺園風定雨花新皇甫太博知蘇州長洲連歲得賢君十萬人家煦若春激箭波狂浮畫舸散絲雨細逐朱輪郡齋詩石鋪輕蘚公案歌喉落暗塵未得休官作逋客河梁歸思滿鱸蓴高陪七聖從軒遊帷幄深嚴日運籌口裡雌黄歸品藻盤中薤白想風流珠宫地密防趨謁銅缽聲沈斷唱酬獨喜修書依絳帳時登闕里受春秋從叔郎中知福州藩閩分憂重闗山去路賖含香滯郎署乗驛倦天涯土貢千頭橘神祠萬里沙金碑紀風物寶瑟怨年華粉籜斑文簟雲腴紫笋芽民田兩岐麥郡圃四時花别恨休攀柳歸期待及𤓰鱣庭有遺訓清白自傳家黄刑部之陜西轉運百二秦川四塞寛甘泉烽火報平安泥書雙筆遷郎署粒食千金仰縣官江海半生抛别墅闗山何日解征鞍定將鞭筭資心計流馬功成國史刊史館張學士知婺州鸞掖分符又出麾津亭目送片㠶飛暫隨越鳥棲烟樹重許吳儂見錦衣屬邑行春熊軾穏公堂卜夜蟹螯肥隠侯帶眼㸔成綬雙闕恩深更憶歸答李光丞來書述車駕臨幸修書院之事豹尾森森拂畫簷久留雕輦閲牙籖字分三豕慚該博饌費雙雞媿屬厭濫跡縉紳同北枳草儀封禪待南鶼相門蘭玉裁新句只恐京城紙價添寄并州張給事山河表裏絶狼烟幕府朝朝醉玳筵合樂軍中雄鼓吹傳杯四座艷花鈿行春好駐桑郊騎卜夜雄談雪竇禪梁苑并門杳千里離懷愁對月嬋娟寄劉秀州連典吳中諸郡騎置迢迢阻玉音左魚江海遂初心朱絃道直消浮謗春草愁多動苦吟震澤消酲干樹橘華亭驚夢九臯禽郡樓晴日東西望幾處甘棠接翠隂無為軍王從事奏牘曾䝉乙夜觀擅塲文價在金鑾貂裘歲久京塵暗驛路風高旅翮殘取酒黄金都已盡食魚長鋏更須彈時清水國無書檄誰見揮毫一據鞍兩宋名賢小集巻二
