body:
  text: 兩宋名賢小集巻三百十七宋陳思編元陳世隆補靜佳龍尋稿朱繼芳字季實號靜佳建安人登進士授龍尋令龍尋舊有顔長官仁郁祠長官五代時能撫循其民使不見兵革嘗作詩以道民疾苦其題有十毎題繫以十詩共百篇繼芳晉謁祠下依韻和之題曰靜佳龍尋稿後調桃源令又調宜州教授不赴有詩云瘴海南邊路淺深客愁不待嶺猿吟無人喚得涪翁起分我桄榔橄欖陰同時倡和為錢唐陳起汶陽周伯弜建安張至龍俱有聲江湖間者又自裒所作一巻題曰靜佳乙稿和顔長官百詠并引龍㝷邑東有顏長官仁郁祠長官五代時能撫循其民使不見兵革龍尋志所刻詩百篇皆道民疾苦皇皇不給之狀余生三百年後奉天子字兹邑晉謁祠下因次韻以寄甘棠之思且使来者知我愛桐鄉之意云農桑裹飯驅兒候暖耕塍泥滑滑不堪行如何説得農家苦雨笠風蓑過一生婦饁耕夫日尚長碓聲嗚咽宿舂糧尋思一飯何時飽秧種青青麥未黄淡黄竹紙説蠲逋白紙仍科不稼租努力經營猶恨晚官司那問有錢無編茅為屋荻為簾老小團圞苦樂兼樂歲輸丁猶未了饑年家口更堪添頭白村翁尚把鋤瓶中那復斗升儲午飡減與飢烏食却愧家人問有餘四月官場入納時鄉耆旁午上門追請看貧婦通宵織身上曾無挂一絲腸隨絲斷手生胝羨殺星邊織女機借問輸官零落否兒郎寒冷且無衣農父眉頭百念攢雨愁爛死旱愁乾龍神社鬼燒香遍不到秋成睡得安客户耕田主户收螟蝗水旱百般憂及秋幸有黄雲割債主相煎得自由帶得雞豚趁曉墟荒村牢落數家居一家幸是田園主留與兒孫寫契書朱門紅雨聲乾未作泥繡成十里緑楊堤金杯緩勸玲瓏唱玉勒催歸騕䮍嘶晉代豪華不數家萬錢下筯未為奢客来只是家常飯豆粥萍虀費咄嗟曲池畢竟有平時冷手看他炙手兒十數年間三易主焉知来者復為誰客履三千此託身晚杯狐白暖生春狂来且置興亡事金塢銅陵不解貧天近偏承雨露榮深深庭院鎖清明桞絲風送鞦韆影墻外行人空復情朱門往事若為懐積雨苔痕緑上階幾處敗甎吟蟋蟀主人曾此溜金釵百斛明珠采在倉沈香火底捻銀簧人生行樂那須許多少邊兵未有糧泥金摺損舞衣羅蹙破遥山皓齒歌此曲人間聽不得莫愁人自有愁多中壽知無滿百身暖歌冷舞及青春黄金不買長生藥白髪偏驚快活人長楸走馬却歸来雉挟春驕未應媒不信杏梁雙燕語日長簾幕有風開客路一曲長歌行路難昏鴉歸盡倚䦨干不知楚水巴山地更有高樓鳥外看哀猿啼斷暮雲深摸索牀頭未盡金莫道他鄉千萬里去家三日幾般心兒女傷悲士不為健行童僕遠相依春風日日生芳草未必啼鵑怨不歸侠客千金不稱求途窮相顧問因由臨分脱贈青萍劍莫蕩人間瑣碎讎客裏情懐更晚秋鴈煙蛬語五更頭從前諳盡江湖味不省神州作麽愁身如海燕傍誰門别淚雙垂不見親惟有一條卭竹杖相隨萬里共艱辛是處人家搗練忙天寒日短路偏長蛬聲四壁無時歇不遣羈人夢到鄉送窮不去奈窮何山有荆榛水有波萬物得時人自老梁鴻頭白五噫歌屈指秋風與鴈期陽闗西去到何時側身一望腸堪斷天似穹廬碧四垂高鳥翩翩去未窮行人擾擾復西東何須華表千年鶴城郭重来便不同邊庭年年塞草欲秋時左右紅旗説戰機介胄麄官應有語而今宰相愛吟詩角聲吹裂肺肝愁説與將軍莫逗遛男子生當侯萬里死判馬革海西頭一劍沙場獨苦辛天陰殺氣作黄塵沈思鳥盡弓無用肘後纍纍却顧身探使歸来半信疑帳前相語怕人知沈香霧裏嬌絃暖莫遣邊愁到兩眉征夫戰骨灑桑乾帳下蒼頭自轉官一騎紅塵天外落籌功更説幾多般公主琵琶胡地秋將軍刁斗漢闗愁相逢老病無依卒未説沙場淚已流蒼苔白骨滿黄沙馬汗成冰帶雪花夜夜鞘中長鋏吼教人不得夢還家有客新從塞上囘解包收得戰場灰營家未敢分明哭請看刀痕始欲哀敵退邊方得暫寧棗兒紅近莫休兵漢家錯信和親議不見雛兒與父爭北風吹骨正酸辛白靣書生四角巾戰士總成亡命鬼將軍纔是有功人城市村翁生長在柴門身有丁男犢有孫為了官租纔出市歸家誇説與鄉村雀羅門巷昔趨榮味似餳甜忽變辛説與侯門休謝客朝朝暮暮看人情王孫公子少年遊醉裏摴蒱信采投指㸃某莊還博直明朝酒醒到家求山人只合住山中入得城来調不同滿靣紅塵無處避手攜白羽障西風紫陌㝷春日日過楊花無主奈春何傾城壓酒嬌無力醉裏相扶踏踏歌相班士女狭邪間總把喧啾賣却閒人壽幾何春不再典衣沽酒强追攀春風日日桞年年到老那知稼穡難若見田家秋作苦教人一飯不遑安蕪城懐古最愁人刼火燒殘得此身舞榭歌臺何足道秦宫漢苑尚流塵百人聚處小喧闐析到秋毫似計然見説天公還掠剰鵠形懐寳度饑年身遊城市髪將華眼見人情似槿花惟有梁間雙燕子不嫌貧巷主人家貧女春風有分到兒家也挿花枝表歲華但得作嬪君子室隨宜粧遣不須奢洗盡鉛華淨潔貧嫁衣莫説為他人絶憐父母窮相守不為金多賤却身枯木無枝可作花門前度盡七香車四鄰日日笙歌裏背立東風有幾家他家百兩送于歸成匹鴛鴦作錦機獨守空閨愁不寐一燈明滅補寒衣燈下穿針影伴身懶將心事訴諸親阿婆許嫁無消息芍藥花開又一春卓家人富頗輕財犢鼻堪依不用媒只是儂家貧亦好枯桐那得鳳凰来少年蕩子有黄金投贈明璫結兩心不得良媒終不肯一春風雨洞房深伯鸞不作悵誰從鳳尾香衾翠幔重靜對菱花勻淚粉不知膏沐若為容問天乞巧看銅儀再拜雙星恨不隨塵世未知天上事隔河相望一年期纎手清閒理瑟工高樓半在碧雲中行人豈是知音者小立花陰待曲終負薪三千門館躡珠賔半百還家衣錦身却是吏民私告語十年前是賣薪人薪樗塞破野人居此是餱糧卒歲儲客裏黄金燃桂盡厨無煙火欲何如爛柯人去隔存亡一局棋終愴故鄉想得山中絶煙火松花松子當乾糧破帽籠頭髪半華樵歌一曲勝長嗟雞鳴裹飯登高去日暮天寒未到家有薪可賣未須悲滿百青銅况有奇十指束枯從秃盡不堪棘刺罥人衣天寒氣入鼻中辛竹擔彎彎却戀身賣得錢来回首望蠟烟起處屬何人腰鐮上到白雲邊惆悵長松不盡年近市山山皆有主遠山高削步難前蒸棃炊黍付荆妻指㸃青山澗水西忽聽丁丁雲外斧一聲山鳥背人啼捫蘿縁壁到山頭俯羨鴻飛儘自由風雨蕭蕭黄葉滑未行十步兩三休黄昏樵采早回歸同伴相邀未有期抱子老妻門口望南山有虎悔何追空門閉口銅魚勿復論數間老屋枕雲根曉鐘三板出山去分付獮猴為守門錫杖凌空去復還片雲縹緲伴身閒春風錯種醍醐草引得牛来食雪山人居天地一樊籠撫掌山家四壁空不道今年空得盡且無雀鼠到山中四祖門庭寂寞秋牛頭只是舊牛頭如何一旦風光别花落花開百鳥愁四巻楞伽几上安而今老去懶能看庭前桂樹花開未分别西風信鼻端黄金闌護紫袈裟禁苑恩深賜予奢林下衲僧那有此多年枯木對春華結草為廬萬仞頭人間蟻穴自王侯客来借問窮通理不意僧中有許由白蓮有社一經過會意由来不在多滿目廬山青未了聞鐘歸去意云何我本三生兠率天為差一念又塵縁早知密意無多子不着旁行貝葉邊燈燈相續古猶今怪底門前立雪深衣不得傳闗臂事汝師輕發老婆心山居春到寒荄總向榮藥苗旋種亦初成山翁自幸無人識可要山中宰相名空山薇蕨供清齋世事悠悠不挂懐梅溽得風醒午枕竹陰轉日上南階白雲縹緲野人家生事年来漸有涯不與世人爭歲月却將椿菌勘南華宿雨初乾一杖藜欲呼漁艇訪前溪碧桃花落無尋處惆悵人間日又西半屋雲霞與鹿分兩株古木正當門野花自落東流水坐對青山酒一尊好山當户四無鄰似是秦時採藥人千百年間天地裏不多不少一閒身宿世仙家十二樓誤嬰時網未深愁浮邱輩行如相覔騎却紫雲歸去休種藥千畦手自鋤年来漸喜識人疏等閒旋㸃黄金賣莫訝家無儋石儲矮忩欹枕看朝榮老覺逢迎禮數生来往頗知麋鹿性寒暄不會俗人情擁樹溪雲迷近逺低簷山果亂紅靑莫言身外都無事早晚焚香看道經漁父不踏長安十二門鸕鷀飛處數家村停橈試向灘頭問莫是嚴光末世孫一曲清漪濯晚霞釣竿斜挿白鷗沙傍人借問居何處四海五湖都是家秋風淅淅獵菰蒲如此江山其可孤天與玻瓈三萬頃更添一半夕陽鋪長作絲綸短短牽一池漢水盡南天誰知有客量江面不是漁郎兩板船推起篷忩抱月眠三三兩兩桞邊船不須聽説文王事孤負漁竿八十年傳呼扶柁晚風前一陣驚鴻没遠煙不是吾儂棲泊處却囘别港避官船五湖烟裏我知魚屬玉舂鋤一處居欲到垂虹風作惡幾株官桞向人疎秋聲只在樹中間極浦斜陽更有山巻却􅁝綸呼酒盞鷗邊聊得此身閒舟繫蓬萊淺水旁鼇頭縮盡海生桑百川日夜滔滔去借問人間有底忙璧月滄波上下天秋風揺落四無邊玉龍盡喚眠鷗起兩岸蘆花不見船兩宋名賢小集巻三百十七
