body:
  text: 兩宋名賢小集巻一百三十五宋陳思編元陳世隆補苕溪詩集下方欲相約為孔侯溪上之逰忽辱佳篇復次元韻山色溪烟淡墨成隔溪幽鳥自呼名未妨濁酒陪心賞更借清詩作眼明桃葉不闗今夕恨竹枝猶是古時聲扁舟醉後從漂泊個處應無寵辱驚次韻奉酬元渤見過奕棊小飲及觀館閤題名之作珠玉當年欬唾成元劉何自敢齊名夢回雲海西崑逺春到江村北渚明誰為少陵償酒債更憐侯喜得詩聲杯中賢聖君休問局上光隂我獨驚次韻鄭維心見貽一首身病何因到赤墀眼昏不復下書帷杯觴有限長羞澁故舊無多足别離對白抽黄餘習氣看朱成碧記當時看朱成碧醉中眼施粉太白樽前人此維心舊詩僕初相識時所見也江村投老俱牢落猶喜詩情似拾遺次韻方允迪祕監㑹稽相遇懐吳興舊逰二首故山疇昔奉英逰老去功名失路頭江海一官如許冷田園三載不知秋謝公塘外千峯紫何楷廬邊一徑幽心折少陵存殁句恨無酒力破牢愁舊逰方時敏呉亦虚皆已物故鑑湖列嶂自天開雲色嵐光入酒杯忽遣同逰有陶謝故應交契擬陳雷他鄉日日典衣醉公事時時牽馬來要買扁舟窮勝絶共追樵徑曉風回從謝仲謙乞猫一首昔人蟻動疑鬬牛我家奔䑕如馬羣穿牀撼席不得寐齧噬編簡連帨帉主人瓶粟常挂壁毎飯不肉如廣文誰令作意肆奸孽似怨釡鬵無餘葷君家得猫自拯溺息育幾嵗忘其勤仲謙云水中得棄猫拯救久之乃復活屋頭但怪䑕迹絶不知下有飛將軍他時生囝願聘取青海龍種豈足云歸來堂上看俘馘買魚貫栁酬䇿勛待潮浙江口寄左與言大夫葉元亮學士兼簡呉似之太史今日江頭雪欲作濤怒風豪兩噴薄青鞵黄帽湖海人獨立沙邊如病鶴閒身不待君賜與擬占風烟佳處著如何寸祿晚見招踉蹡欲前還欲却翩翩西湖兩公子胸次峥嶸飽丘壑糟牀夜注喜相報自發清吟侑觴酌我来一笑豈易得十載湖山負佳約間闗百態成底事毛髪星星己非昨人間俯仰變今古總似潮生與潮落㑹須乞取此身健在眼好山俱著脚頗聞神方能却老肯輔衰殘殊不惡因聲更約呉太史石鼎他年煮仙藥舍弟出家作詩貽之在家情已疎出家終不惡不有清浄縁云何脱徽索我昔志一官謂足世味樂顛倒十年間如蠶竟自縛業己無奈何勸汝莫莫莫一漚非全潮起滅皆妄作當知是身浮流浪恐非託伎倆百不好攝念乃初學如病求真醫安知是良藥送鄒徳章教授之官合淝二首晚色溪亭路風帆去莫遮交情寄桑落離恨渺天涯志行今誰及聲名莫漫誇淮人問規範説似道卿家古寺疎烟裏因依孰並㳺攲行如短李邂逅得髯鄒皎月林塘夜清霜雉兔秋從今兩相憶一酌酹儂不次韻沈次律家並蔕芍藥一首習家池館酒如淮為破幽人一日齋前廡芳菲駢蔕萼後堂鶯燕嘯朋儕忽驚暗綠將成幄却喜雙紅欲綴釵草木㑹為門户慶而今蘭玉已當階次韻沈必先尚書見别一首翩翩旗尾破新晴頗似龍駒脱在坰再上封章辭雨露故令髙節煥丹青卿雲媚日懐仙隠白鷺迎舟宿晚汀豫想山齋春酒熟可無殘夢到南屏家姪季髙作詩止酒戲賦二首淵明出從仕務亦計秫田一朝倦束帶唾棄如飄烟無酒毎從人兹事若可憐醉来便逐客卿去我欲眠了知此賢胸醒醉皆超然胡為遽止酒而作止酒篇此身後萬物不使一物偏有偏即是累在性皆非圓我樽可亡酒我琴故無絃攜琴玩空樽唯我樂也天淵明賦止酒子酒未嘗止今朝詩固云從此真止矣我觀他日詩説酒特未己必飲誠有累必止亦非理無如作病何聊用忘憂耳得失定相半随過無彼此胡為我阿威深拒堅壁壘子言故多師烏有與亡是獨此止酒詩字字如信史恐子昧圓通未究真止義常觀諸世間一一等幻戲死生尚云爾何乃較醒醉操觚起相從無為乏吾事方時敏寄和詩復用韻報之并簡季髙理前止酒之語季髙嘗夢蕭相國戒勿飲酒疇昔城南隅蓮葉秋田田從公觴玉醪醉墨看雲烟我乃世背馳公獨肯顧憐追思十年夢僅熟一覺眠念當老扁舟生理師計然不意菰蘆中復見瓊瑤篇筆力如置陣彌縫認先偏從容步武間左右方若圓大如清廟音三嘆聞疏絃安得化為雲追逐飛上天阮籍劉伯倫嗜酒不知止顛狂欲求名此計真陋矣酒中有何好正自未能已愁来得暫驅洞若適妙理我豈沈酣徒公亦聊爾耳世間等夢間未悟彼易此阿髙志特殊家學自中壘􅀈􅀈求獨醒今昨較非是無心窮酒聖有意造詩史自言古酇侯告戒存密義逡巡若神授恍惚類兒戲不須更論酒春夢本如醉我知昴星精不管太白事贈道人王生一首夜來清商入梧桐䇿䇿不已鳴霜風故園一碧萬烟樹慘淡已有傷秋容嗟哉造物本何意安得永賴長養功我獨冷眼閲榮悴心與日出清霜融子奚不求助我喜甕頭春風生麴米人間有酒誰不醉知其天者我與子我身雖無雙羽翰欲將夢到三神山借爾八尺龍須席遽然一覺俱飛還天長道中作飢来驅我去一首寄呈劉盧二御史飢來驅我去去去復何如我飢亦何慙所嘆為此軀明發著征衫薄暮投郊墟烟林號怒風牛背立飢烏境惡夢多悸愁孤鬱難紓念初别鄉邦短檝穿菰蘆眼中兩御史炯炯冰在壺清逰失追攀負此山繞湖我行日已西回首風牽裾兩公飫文章筆端吐新腴願言寄殘膏龜腸正空虚張倅生辰作質龜相鶴二詩為夀神龜異生稟懐抱黑缺月蹣跚守叢缺㳺戲引蓮葉青雲覆其上文字書左脇千年愈堅瘦腹背類璆鐵有如盛徳士秉志厲霜雪不求赫赫名羞作翕翕熱行藏開理亂閲世自明哲時哉此唐虞負圖追往諜黄鶴初出胎骨格已驚衆翩翩謝囂塵颯爽自神縱朝飛出芝田夕飲下雲夢寜知風露質乃係世輕重有如賢達人胸腹抱空洞觀時自隠顯豈待吹嘘送㑹看九臯鳴一一律吕中閲嵗千六百羣飛接鸞鳯千六百年飲而不食與鸞鳯同羣見相鶴經次韻鄭維心貽盧叔才一首朝行轉木未暮返循水涯生長山水間途窮自知歸萬緒更擾擾衆目何睽睽有若脱􅫓牛邂逅得此時坐念盧夫子與世真背馳讀書如董生三載圃不窺清詩見真情觀者豈得疵春風入閭巷爛漫百草菲摩腹忽起行菜茹傷蕨薇平生經綸學無術取世資貧交可相覔叩門兩無疑富貴不汝求我至君勿揮次韻維心赴次律賞芍藥一首巖前紅藥媚深幽更為餘春一笑留疇昔鄒枚俱倦客而今陶謝得同逰真香雨裛來無盡糚艷風熏喜欲浮未羨木奴千户比主人原是醉鄉侯留題吕宣義知命小園一首雖無萬竹等封侯半畝清隂趣自幽菘韭尚能供早晚菊蘭聊欲記春秋歸來久已同彭澤休去寜須問石頭短褐飄零嗟我老他年來往亦風流兩宋名賢小集巻一百三十五
