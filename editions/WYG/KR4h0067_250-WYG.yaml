body:
  text: 兩宋名賢小集巻二百五十宋陳思編元陳世隆補翠㣲南征録九華岳丹青閣未識丹青意慿欄試解嘲烟雲朝起陸汀渚暮生潮山卓數枝筆天横一幅綃霞收紅暈淺溪褪緑痕消箇裏風煙冷於中景物饒飛黄凌翠閣寒碧瞰紅橋酒盡香凝甕詩成錦掣幖朱衣扶客醉翠袖殢人嬌屏帳接千里畫圖連九霄長風來水尾斜日轉山腰赤脚支笻穏蒼頭控馬驕老臣今已矣兒女總金貂春閨雜詠十首溪館供庖獨有魚溪翁日日叩吾廬兒童不問無錢買便拽鈴兒喚小厨午簟風清帳自開日斜雙鼻尚鳴雷不知蝴蝶何方去多少黄鸝喚不回石痕新褪落溪毛應是春流昨夜潮紅雨入簾衣不濕玉人沾作鬢邉嬌睂帶遙山淡拂秋幾多春恨鎖重樓真珠半巻嬌無力須索偎人為上鈎宿酒初醒午夢回不忺梳掠傍妝臺曲肱斜把香腮托却訝荷花藕上開勸罷浮酥酒一巵殢人相伴塑獅兒却將凍手和衣拍笑我金鈴用橘皮紅猊燒盡夜堂寒銀燭生花玉漏殘沉醉歸來渾不記阿誰扶我上雕鞍小罋栽成一把蓮問渠邀價勒三千五人不問成和否移向西窗畫舫前鳯簫吹㫁古梁州獨倚東風十二樓醉把珠簾和露捲恍疑新月是銀鈎不整烏雲不畫睂天然標格自相宜梅花羞對旁人插背倚屏山捻一枝早春十絶自歎身如不繫舟幾年漂泊在南州栁絲只解㺯春色不把紫光絆客愁故山煙靄接層樓樓上離人淚欲流誰謂樓高添望眼一層樓上一層愁雪滿遙山玉作堆幾多花栁望春回出門獨有平坡麥一派生青熨不開夜來不敵楮衾多全勝呉綾與越羅好是玉人春睡起白雲堆裏見姮娥青帘乆不訪文姬樽酒殷懃欵翠㣲沉醉不須籠畫燭自挑明月送郎歸十年不謁五通仙自嘆何時接聖顔此去行祠應不逺白雲深處是梅山詩道風光在水西水西我意未為竒若教南北東溪去更費詩人無限詩尋春不遇欲空歸竹外横斜拾一枝且喜東君有消息隔香應不怕疎籬一書欲冩寄雲鬟更把春衫裹素蠻欲識相思誰最切淚痕今作鷓鴣斑蒼生千里望雲霓何事英雄去路迷見説九重新有夢濟川人在北岩西夜有所聞好風吹月上迴廊花壓䦨干子漏長天籟不鳴天外竹披衣潜起聴鴛鴦挽戚虚中夢裏匡廬興未闌轉頭世事已辛酸肥家有術疑非藥漉酒從人笑不冠雁序向人羣已失鳳雛過眼影何單不堪回首原頭路一塢松楸生暮寒闕題丈夫䇿定在呉鈎浪把橋門作勝逰綵筆誤人隨驥尾錦幖還我占鼇頭闗山夢寐三千里竹帛功名四十秋安得九重容借箸盡將軍國為前籌九日言懐凄凄大氣間炎凉破帽翻風客鬭狂酒味暗消黄蘂辣雁聲喚得菊花香三京昔擬恢同軌九日今猶客異鄉更仗阿誰上沙漠為予申意郭汾陽呈鄱陽趙及甫不學炎涼不自謀動和權勢作仇讐筆鋒帶怒搖山嶽劍氣銜寃射斗牛龍虎榜中當擢第麒麟閣上合封侯功名未入男兒手誰肯甘為郡督郵九日溪樓望逺西風寥落做重陽人在東南水一方地僻阻他鴻雁信天寒撩我菊萸觴江澄素練魚翻赤葉剪紅綃蠏結黄不是倚䦨迷望眼欲慿歸雁問蘇郎訴董寺丞神首羅㬋欲蝕天彎弓直造玉皇前九重不忍誅林甫一札翻令囿馬遷投鼠固知當忌器得魚誰敢便忘筌吾今一死初無憾願把孤忠託孟堅寄小王徐子晉十載長沙路二千歸心日夜在長安居家有譽睂空白戀闕無謀心漫丹獲雁不聞蘇子信沐猴徒笑楚人冠馬蹄恐有唐城便為把功名問二潘獄中作壯士剛腸不受寃髑髏可㫁志難千乾仇未報薪當卧漢賊猶存鋏漫彈情欵不從囚口責炙漿難塞吏腸寛何當盡瀝奸邪血染作衣裳看孟安池亭即事春風恰恰破桃李池館無人一徑深鷗刷㫁翎翻水面蝶抛殘粉出花心詩懐攪我丹心破節物催人白髪侵流水伯牙今已矣世間那復有知音南劍水閣欲向津頭問鏌鎁一潭秋水漫烟霞畫屏對客景藏景芳樹壓溪花照花有䇿廷争慚賈誼無功廟食笑張華夜深霹靂轟雙劔驚起延平十萬家丹青閣閣上闌杆紫翠環閣中身世異塵寰長虹吸月印秋水孤鶩伴霞量晚山萬里風烟屏帳裏一時人物畫圖間凌煙須是男兒事却恐功名未放閒折桂園友人宴牆頭羅綺碧雲濃牆外鞦韆電掣空蝴蝶拍開花靣粉鷓鴣吹落杏腮紅翠裀不巻珠簾月蠟蠋還搖錦袖風醉眼不知塵世有直疑身在廣寒宫夜步水西半靸芒鞋過水西樓臺燈火未多時山羞見我頭頭轉月怕抛人步步隨風月巻愁秋去早溪聲翻笑夜歸遲柴門只解闗烟雨不隔離愁些子兒酒樓秋望西風吹客上闌干萬里無雲宇宙寛秋水碧連天一色暮霞紅映日三竿花搖舞帽枝猶輭酒入詩腸句不寒古徃今來恨多少一時收拾付盃盤臨清閣䦨干古木瑣青葱䦨外簷花灼半空萬里好山春黛碧一溪流水暮霞紅窗疎不礙東西月帆過始知南北風試問支郎一樽酒好天良夜與誰同思故人十載無人問益之誰於欬吐覓珠璣兩三千里家何在三十六峯人未歸將謂抱薪能救燎果然畫餅不充饑東川恐遇連榮祖一笑不須論是非野菜吟芙蓉峯下揚雄宅路入城闉里三百有山無粟養鷄豚有水無人捕魚鼈山翁菜色流清涎齒頰連月無腥羶客來問我何所有手指萬壑烟霞邉青芹不似蘆蒿美石芥防風空剔齒蕨腦纔抽稚子拳蘆芽已迸佳人指兒童不待明朝陽花襟露濕争慌忙㩦籠拍塞貯不盡歸來滿袖春風香攬衣踏破青銅鏡挼動碧雲流一徑漉歸銀鼎作波濤無限春工上盤飣寄許判院八首閒亭無日不相隨稍不相隨恨别離况是一秋無信息可無人寄問安詩自慚兒女總江湖鴻雁不來音信疎且喜北堂珠玉眷團圞環誦道家書天音空洞豈虚傳許我琅函誦半千何事加持功已倍日邉消息尚茫然短牋封罷更重題生怕蒼頭去路迷説與不須多借問葛廬只在白雲西紅猊消盡水生花清夜迢迢玉漏賖環珮不知何處去醉眠應是小卿家毫端風雨走蛟螭人物風流冠一時要向行雲問蹤跡青樓何處没新詞此去于門咫尺間樽罍無計得躋攀㫁魂欲伴行雲去猶恐歌喉誤小蠻錦牋牙軸白雲詞君外知音更有誰一榻何時對風雨與君聨臂話相思漁父江村水落富魚蝦半屬橋邉賣酒家莫訝鬢邉新有雪夜來沉醉宿蘆花寄趙徳夫男兒無路出邯鄲長鋏休從暗裏彈是處有魚堪下釣扁舟何獨子陵灘兩宋名賢小集巻二百五十
