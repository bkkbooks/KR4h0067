body:
  text: 兩宋名賢小集巻二百四十四宋陳思編元陳世隆補翠㣲南征録三華岳後溪蓬窗夜雨短長夢啼鳥喚人新舊愁萬里論文一樽酒醉和明月上扁舟泉聲恰似世情惡山色不如歸興濃自恨十圍無處著何如瘦作束腰蜂楊花一絲不染湖光白萬㸃能回山色青三月金明池上水與予同是一浮萍杜鵑殘月照愁人病酒好風吹夢客思家欲知亡國恨多少紅盡亂山無限花鄰女搔綿吟閒窗日上三竿竹牕下嬌娥整輪輻匆匆未暇理雲鬟半朶青鴉倚紅玉青梢摘盡銀香囊畫欄平倚斑筠筐時將纎手翻雪霜酥胸玉面同光芒捧歸細捲銀成索牽出鬆鬆雲一握珠唇呵挺氣温温鸚觜踏車聲絡絡今年莫恠功績稀阿妳勒繡鴛鴦幃如今織出秋江練十月正好裁新衣客心聞此愁無著一夜清寒動寥寞明朝為問買一端剪做道袍披落魄送商府判比年十月君初來梅花破雪迎君開自從佐劔夀民脈凋山瘵水皆春臺去年七月君開府燕燕鶯鶯為君舞五日盡蟄潭底龍千里應無市中虎今年二月君時歸風牽回栁縈君衣君衣不作回栁轉直上雲端朝紫㣲紫微有館名西掖珠玉羅鈿瞰金碧郎星卿月漫徘徊箇中自是神仙宅紫㣲有山名大坡烏飛豸立冠峩峩一聲霹靂震天地萬里腥血流江湖紫㣲有㫖垂丹册二者於斯請君擇便須東取元化釣談笑從容正疆場君家事業銘冠裳鸞鳳指日鳴朝陽伊洛諸公有政事洙泗諸子無文章禀違輾轉情難處溪上恩波湛今古東風吹帳入長亭零落桃花淚如雨述事心不融明遂啟疑源流本末致交馳谷何嘗響人相笑岸幾曾行舟自移枉直萬端明似鏡是非一著錯如棋磨心拔去誰能轉試問諸公知不知述懐我生不解覔冠裳滿目風波祗自傷楮劵不堪供敵幣沙籌那解足軍糧人情在我隨多寡世態從他自短長只告天公乞安樂百年隨分老農桑寄劉浩然樽酒檠窗鬢髪新别來驚見雪霜侵幾行淚滴風前燭一片心敲月下砧好徳未聞如好色知人安得似知音一書欲寄南來雁江濶天高無處尋知遇淮隂西漢一英雄史氏持衡論亦工不向追亡羨蕭相却于援死著滕公豈知並績三人傑皆是當時一語功後世人材自戕賊炎凉安得古人風和戎納幣求成事已非可堪函首獻戎墀一天共戴心非石九地皆塗血尚泥反漢須知為鼂錯成秦恐不在於期和戎自有和戎䇿却恐諸公未必知别王泰之風神戀行客吹栁纒簮纓傍水鳥多白近山蟬更清别腸雲閣淚歸路月闗情告徳無多日清觴聊一傾遊溪西寺寺覺重遊好僧期後㑹賒青蟲凋病葉白鳥篆平沙水瘦石生齒山寒梅未花功名今有待且謁惠公茶登樓晚望疎雨洗空碧晚晴人倚樓稻花千頃浪楓葉一簾秋逺岸明殘日孤村認小舟溪山如愛我相見亦回頭悶迷雁翎未忍刳丁謂虎口猶期脱蔡京何事姦邪皆倖免洛陽年少却南征有鼎不烹闕肉無刀可㫁佞臣頭男兒此等不平氣空使衝冠射斗牛酒禁將軍愛士民心失太守憂民士氣衰大抵軍民皆赤子如何從此便籓籬贈美人别花臉送愁和露泣鶯聲傳恨向人嬌别情逺去尤難割相送不須離畫橋寄宗上人我為叩閽拘狴犴汝將吟筆換袈裟别來猶記松窗外一掬清泉自㸃茶自寛十事相尋九不諧骨窮更值五行乖人情厚薄且隨分世態炎凉休掛懐家欲自豐無楮幣爨慿諸執有荆釵如今且任眼前過他日功名殊未涯黄氏三層樓瘦笻支我上高寒風露凄清酒力慳千里人邀千里月一重樓見一重山筵前飛雪噴焦遂檻外行雲遏小蠻便好翻身駕黄鶴直將情枉叩天闗幽居莫問門無長者車只圖深巷樂樵漁一園黄落食無限萬壑碧蓑衣有餘雁足北來歸訊杳馬蹄南去故人踈東風看整朝天斾多少功名在故廬賀趙丞登第要與宗盟立紀綱俯從多士較文章人材漏網無踈宻科目搜羅有短長蟾窟一枝分玉樹鳳池三浪出銀潢何當推解延豪杰為復中原萬里疆梅一年無處覔春光杖䇿尋春特地忙牆角數枝偏冷淡江頭千樹欲昏黄梢横波面月搖影花落樽前酒帶香更仗西湖老居士為予收拾付詩囊捉月仙纜解西風拍岸顛雁拖秋色上航船挂帆未作乗風客舉棹先驚捉月仙楚些有淵心石殞賀狂無井眼花眠慇懃為酹一盃酒㫁送西江浪拍天呈甯次翁王謙不是富春侯自是薰蕕味不侔病體隔年留枉獄夢魂連夜逐歸舟可憐商木遷新令欲為韓門復舊讎但得此心無所媿為公一死亦何尤悶成勿憂李廣不封侯廣不封侯未足憂漢鼎不烹曹操肉呉鈎空㫁伍員頭鴻門自昔推屠狗虎帳於今媿沐猴千萬南陽遇徐庶為言豪傑尚縲囚平政橋建水合流三百里直下富沙如撚指溪東披拽纜過西千丈春風怒濤起香輪不解碾清江造舟貫索成河梁年年麥熟梅欲黄連城千里皆波光淳熈太守憂溱洧問津日夜思無計老農乂手願鳩工叠石中流便民濟金珠賣價不計緍鐫瑕㫁梓功方成功成燕雀賀新屋炳然萬棟輝丹青挿天螮蝀横江尾下壓寒潭碧無底市聲不到畫梁間秋色盡歸朱箔裏我行一月無風波今朝醉眼翻青羅金鼇背路客揮鐙玉虹跨浪舟飛梭石唇噴盡寒崕雪雪中電掣金蛇赤兩岸樓頭將相家八州車馬神仙客人言辟人推政平故此特以平政名我聞政事平如水水到不平還作聲贈陳道君不見樵人王翰畫山水一夜風雷揭窗紙又不見長沙洞清畫龍蛇滿軸雲烟翻撚指二子相去數百年筆端妙意誰能傳雙溪道人何所授一見筆法堪齊肩筆一淡輕烟映出垂楊岸逺山依約有還無斜照不紅秋水慢筆一濃黑雲萬叠翻狂風江天日暮暗烟靄天地星斗皆昏朦瀟湘詩人不解語被君吐作無聲句何時覔取一幅綃冩我英姿伴烟雨柴氏節婦一樽酒義士拜而受義士一首詩節婦雙睂皺睂皺意何如有難難相救嘆我廊廟器淹回在汚陋惠我㫖且嘉殷勤推意厚吾今繫閩建家貧喜鄰富青眼到朱扉白屋成華胄吾聞孤竹子周室三緘口又聞杞梁妻秦邦稱烈婦此軰誠間生世代不常有如何天一方同時俱輻湊媿無八品珍草草具籩豆何當再拜摳我衣巵酒恭為兒女夀别館即事十年客裏過春光客裏逢春分外狂半堵碧雲蝸路濕一簾紅雨燕泥香銜山西日辭春閣拍岸東風趁夜航莫向錢塘蘇小説東呉新髻李紅娘武興解舟西風落日楚江頭秋水已平鸚鵡洲烟樹接天迷送斾浪花翻雪噴行舟三盃萬事我已飽一日千里誰能留見説平戎新遣使班超投筆已封侯不遇英雄不遇勿長吁茍遇風雲彼豈拘不向闗中效蕭相便於江左作夷吾當知晉霸非由晉所謂虞亡豈在虞多少英靈費河嶽鍾予不遇獨何歟紀事鉗口刳腸未足彈窮源探本可觀瀾乞醯就謂隣非直反矢須知友必端暴虎欲從頭碎璧沐猴還慮髪衝冠積薪厝火居其上試問賈生安未安兩宋名賢小集巻二百四十四
