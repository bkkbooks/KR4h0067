body:
  text: 兩宋名賢小集巻三十八宋陳思編元陳世隆補肥川小集劉筠字子儀大名人也舉進士為館陶尉入為秘閣校理契丹内冦真宗北巡以筠為大名府觀察判官與修册府元龜書成轉左正言直史館修起居注召試中書遷左司諫知制誥史館修撰出知鄧州徙陳州入為翰林學士初筠草丁謂李迪罷相制既而謂復留命筠草制筠不奉詔謂再相時真宗乆疾謂浸擅權筠請補外遂以右諫議大夫知廬州仁宗即位復召為翰林學士拜御史中丞己而數以疾辭進樞宻直學士知潁州召入復為翰林學士承㫖同修國史兼龍圖閣學士出知廬州卒年六十一筠自景徳以來居文翰之選與楊億齊名當時號為楊劉三入禁林三典貢舉以䇿論升降天下士自筠始也性不苟合於時臨事明達而所治尚簡嚴云淮水暴漲舟中有作行行極目天無柱渺渺横流眼有花客子方思舟下碇隂虬自喜海為家村遥樹列秦川薺岸濶牛分觸氏蝸鳶嘯風髙良可畏此情難論坎中蛙寄靈仙觀舒職方學士石渠仙署久離羣抗迹丹臺世絶倫揚子不甘嘲尚白漆園終許自全真紫煙深處鸞雙舞朱髓成來鳥共伸若向雲中見雞犬可能渾忘姓劉人題林處士肥上新屋壁久厭侯鯖静室來卜居鄰近釣魚臺舊山鶴怨無錢買新竹僧同借宅栽斗酒誰從揚子學扁舟空訪戴逵囘抽毫有汚東陽望但惜明時老澗才南朝詠古華林酒滿勸長星青漆樓髙未稱情麝壁燈迴偏照日雀航波漲欲浮城鐘聲但恐嚴糚晚衣帶那知敵國輕千古風流佳麗地盡賖哀思與蘭成詠唐明王嵗嵗南山見夀星百蠻囘首奉威靈梨園法部兼胡部玉輦長亭復短亭河皷暗期隨日轉馬嵬恨血染塵腥西歸重悔霓裳舞故老相看但涕零漢武漢武天臺接絳河半􅇽飛霧鬰嵯峩桑田準待他年變瓠子先成此日歌夏鼎幾遷空象物秦橋未就己沈波相如作賦徒能諷却助飄飄逸氣多成都鏤膚剽俗恣遊遨或得蹲䲭號富饒井絡共知天與險蠶樷無奈世興妖杜鵑積恨花如血諸葛遺靈柏半燒才似文園何足道一生琴意秪成痟公子油壁香車隔渭橋黄山路逺苦相邀行庖爨蠟雕胡熟廣埒鋪金汗血驕别館横陳張勝婉期門長揖霍嫖姚注鈎握槊曽無憚緑桂膏濃曉未銷始皇利觜由來得擅塲盡遷豪富入咸陽属車夜出迷雲雨峻令朝行劇虎狼前殿建旂臨紫極東門立石見扶桑從臣善頌徒虚美不奈盧生䜟國亡禁中庭樹紫闥分隂地丹條濯秀時髙枝接温樹宻葉覆辛夷夜影瑶光接晨英玉露滋乗春好封植為賦角弓詩夕陽瓊蘂滋晨飲青縑擁夜衾萬年宫省樹五色帝家禽詔草裁藤角熏爐燼水沈浴堂還獨對鳴佩有青音赴郡之初尋属愆亢有議舉舊典取湫水徴巫覡以致禱而涉旬靡應農事方急遣罷去越翊日漸獲優洽優詔將州任視政纔旬時田畯訴炎暵坐虞多稼萎雲將掉頭去波臣涸轍危行部殊未及隨車杳難期徃慙神父化徒令旱母嗤諸曹白事者雩典舉舊規郡北岐棘山上有三湫池衙吏潔齋徃汲水置縹瓷朝服領巫覡詰旦迓諸岐舁以結綵輿奉以五龍祠自是率賓介寅午欵于斯紛敷薦楮鏹浸漬灑楊枝瓦鑪松香髓匏樽黍酌醨四壁繪神變正筵塑靈儀悕若葉公牖怪甚葛仙陂老覡十數輩勃屑頭如魌童巫及伶倡貎寢語嘍囇但多甕盎質曾乏婉孌姿交手操鈴拂合譟屢僛僛喧塵著蓬髪穢汗落粉頥一問且一嘔掩鼻以帨䄜朝隮蔚旋敗成震巽散之巽風暮欲息竅行呼復來叶慢黷固己甚誕妄相憑隨如是者浹日僅得沾服滋嗟予政無狀百拜胡敢辭矧夫民習俗姑用慰齎咨抑聞古人言天鑒本無私神道貴得一何乃托邪師遽俾送湫勺撤役勤蠒絲申明恤刑詔挺重捨輕疑從此四三日油霈洽封圻又聞堯湯世水旱軫君慈振救自有術斂散適所宜元元無菜色九載尚熈熙用禮地官職皇舞雖有祈道經涖天下傷民誠弗為惟神稟聰正逺鬼務肅祇願守有常徳可戒興妖思兩宋名賢小集巻三十八
