body:
  text: 兩宋名賢小集巻一百七十宋陳思編元陳世隆補文杏山房雜藳鄭克已字仁叔青田人淳熙中進士仕至福建提刑司幹官過大浪灘急浪吹飛雪鳴篙破曉灘異鄉人易老行路古來難玉露晨初濕天河夜不乾飄流雙鬢白未有一枝安水閣水閣臨堤晚簾鈎暖翠通睡驚鶯去後夢到蝶邊空春欲從人别花消昨日紅多情湖上浪拍拍戀東風初月初月當樓動風簾倚望斜光虧微有暈桂薄不成花雲淡明林葉溪清印岸沙去年寒露白旅食在京華水國水國烟霞客春來始定居老逢人事懶貧覺舊交疎隙影窺蟾滴芸香散篋書西湖風月好不到一年餘送中書王舍人使北細馬縷金鞍文星使可汗袖中天詔重帳外節毛寒烽火燕城急塵沙朔野寛安邊在大體何必斬樓蘭飄轉飄轉未歸客風帆不夜舟斷雲依水定薄月帶沙流香倚黄花岸心清白露秋林鵶棲未穩飛亂北山頭浙江十六夜對月急槳浮天濶長江得月遲最憐新缺後全勝未圓時夜雪潮千尺秋風桂一枝潛蛟易翻動怨笛莫驚吹架壁架壁珍藏萬古書世間清絶在吾廬縁瓶香破分家釀曲圃雲開剪露蔬白日漸隨秋意短故人盡向老來疎今年種得回蜂菊亂㸃東籬玉不如青衫青衫著破禁中羅楚澤呉江㡬度過仕宦宛如杯水澹朝廷空有故人多漁村疎竹明風斾烟浦斜陽起暮歌欲買田園歸海上此身無奈客愁何過李老隱居南渡中興老幽棲日月長買山供杖履引水到池塘習懶今成癖貪盃剰欲狂相過舊賔客不換野衣裳旅中遇故人雲薄清溪水天寒黄葉風鄉關三載别客路一樽同舊事如昨日問年俱老翁相看今古意淚冷菊花叢别蔣世修傳道賢關客尋山向㑹稽春風千里别花路寸心迷天倚呉江濶雲隨禹穴低蘭亭得遺墨為我好封題繫纜繫纜縈回浪昬林入暮鵶水窮人有路天盡客無家蕉葉浮春蟻魚歌隔浦沙醉眠星斗下尋夢卜年華憶别憶别富公子山桃兩度花人情皆念舊客路不如家野草連天濶重山抱日斜寄書無過鴈愁眼眩飛鴉兩宋名賢小集巻一百七十
