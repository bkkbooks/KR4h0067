body:
  text: 兩宋名賢小集巻一百六十三宋陳思編元陳世隆補梅谿詩集三送王司業元龜守永嘉中興天子初龍翔臨軒䇿士當維揚艱難果見異人出龍虎甲乙俱非常先生大對過晁董指切時務言激昂麟經絶筆二千載收拾紙上生光芒自從曲江到今日勁氣獨得南方强權門用事手可炙申棖亦減平生剛先生閉門玩爻象簸弄日月潮之陽帝憂南國命共理袁連二政俱循良公道方行正人用詔起韓愈師虞庠先生不作進學解直言慷慨投封章一麾出守山水郡十行詔墨加恩光東嘉得賢類京兆前政有張今有王前守張子韶張公到官席未煖猶有遺愛如甘棠先生況是儒宗師斂此大惠施一方入境願問民疾苦下車宜誅吏奸贓首延璆孺坐賢榻無使楊墨登門牆河内借恂豈容久宸衷念賈殊未忘鯫生摳衣恨太晚執經未獲時登堂私心竊喜父母國聖恩特許來龔黄願同何堅首率化歸見潁川鳴鳳凰和符讀書城南示孟甲孟乙性無有不善兹言聞子輿學所以修性揚雄著之書欲知人之生靈臺湛然虛習善裕乃身習惡喪厥初下惠與盜蹠不生兩門閭所㳺一不同相去霄壤如是以吾夫子詩禮教伯魚當時非義方聖門亦蕭疎我似杜陵翁有兒最憐渠徒愛不知教懼如驢與猪詎望登丹霄折桂騎蟾蜍粗令有聞見免為甕中蛆丱角入小學首誦仲尼居要知先孝弟餘力哉乎歟我家素孤寒金玉苦無儲舊業止青箱辛勤二星餘遺爾以清白爾曹宜念且性情乃良田學問為耘鋤勿患逺難致跬步馳蹇驢勿憂年不逢六經有新畬勿隨奔競流伺候人庭除勿學田舍兒黄金買冠裾在我能自修不患無聲譽我久困筆硯退思老山墟拭眼看爾曹庶使愁腸舒詩篇和韓公座右宜書諸青春最堪惜勉矣無躊躇和苦寒羲和錯冬令寒燠常相兼在人為不常時焉作貪廉𤣥㝠當用事如忌還如謙宜寒噤不嘘羣萌誤抽尖既燠俄吹冷夜寐黒不甜水行失其理厥疾不可砭前日當孟冬雷聲震銅蟾三日輒大雪飛花眩觀覘逮此始踰月屢變寒與炎晨起坐東窗陽光快恩霑霜畦秀蔬苗欣焉自腰鎌頃刻變凜冽枯藤怯提拈齒牙戰霜風縮舌疑銜箝架軸紛掀翻誰能正牙籖酒杯覺無力瓶罄勞頻添貂裘尚不煖況無或衣縑兀坐擁黄綢脰作寒龜潛氣血栗肌體涕唾冰鬚髯紅爐熾薪炭旋覺寒星殱靜思天壤間萬類何繁纎路傍泣涷餒海角愁廢淹羽毛有不庇腥血有不燖豈堪當此時可以吾身占殷勤語妻子汝勿多怨嫌破被尚禁絮漏茅可添苫人生苟知足處此意亦恬但願王化行東西俱被漸堯天日舒長有目皆可瞻寒生在陋巷甘心事􅐽鹽何須傍人門炙手随姦憸耽耽王侯宅笙歌下珠簾寒暑止温涼焉知有窮簷否泰送往來禍福相依黏勿用倚彼玉自分安吾廉飽腹日三飯蔽形衣一襜祁寒勿怨咨庶用懲無厭陳大監用賞梅韻以贈依韻酬之潁川丈人賢矣哉青眼喜為清流開詩章翰墨兩奇絶筆下一字無塵埃品題人物奬後進縉紳樂善公為魁東嘉賤子生太晚猶幸識此真人才朅來西游也不惡錦囊所得俱瓊瑰區區科第何足道此行似為詩篇來客中拜貺更重複丙穴魚及郫筒杯大監近以魚水見貺寒鄉故舊問歸槖首言帶得公詩囘大監復贈詩紙尾有留飯語再用韻以謝平生漫學乎歟哉心茅胸棘鋤不開得公新詩一再讀便覺胸宇清無埃銀鉤妙畫發光豔照眼有如參與魁鯫生肺腑非太白公似工部尤憐才旅中屢獲錦繡段但媿欲報無瓊瑰豫章一榻不妄下賢非徐孺安敢來荷公此意最敦篤一笑當奉論文杯鄉心如飛不可遏更為長者遲遲囘謝榮帥薿贈御書孝經用陳大監韻輦轂之下先彈壓兹言雖佳未足法丈人身居彈壓地撫字心勞民自洽神聖當天萬物春王畿共理嘉得人雲漢昭囘賜優渥不特為公端為民聖經一章公獨得黄堂葱鬱生春色賢哉名卿才大夫匪懈事君端可則石刻分餘猶及我榮耀驚聞浙江左從今蔀屋光屬天更有寵褒雲八朶某前日廷對蒙宸翰八字之褒願公勉為不朽傳長如治呉與治川要令列郡法清白了無一吏横索錢陳郎中公説贈韓子蒼集唐宋詩人六七作李杜韓栁歐蘇黄近來江西立宗派妙句更推韓子蒼非坡非谷自一家鼎中一臠曽已嘗丈人珍重贈前集開巻爛然光焰長詩如此公固足貴賜出仁者尤難忘兼金白璧不足道願寳兹集為家藏鯫生幸脱場屋累老境欲入詩門牆古詩三百未能學句法且學今陵陽題天台國清寺十里松聲接澗泉清音入耳夜無眠寺有清音亭宜於四絶中稱絶四絶事見寺碑誰向三賢後更賢豐干寒山拾得寺就已無陳日月寺建于陳而成于隋時清長是宋山川初智者云此寺成國即清矣故號國清真廟時賜號景徳國清明朝杖履尋劉阮不待桃花入洞天臘月望日出郊探春㳺告成觀謁大禹祠酌菲飲泉遂至龍瑞宫觀禹穴薄暮而還禹塟稽山不記年丹青落盡廟依然神文秘在藏書穴儉徳流為菲飲泉龍瑞峯巒高近日鑑湖煙水濶浮天東州佳處畧經眼自笑好奇如馬遷迎春遇雪飛雪送殘臘帶花迎早春西疇農事及媿是不耕人元日冒雪赴天慶觀朝拜既趨府拜表還舍飲屠蘇酒因思去年元日亦不在家感而有作幕府初官媿不才琳宫朝拜獲參陪籃輿去踏攙先雪蓬鬢歸銜最後杯禹穴地幽寒未歇堯天日近暖先回年年元日身為客孤負吾廬溪上梅賀何正言用蔡君謨韻御筆親除直諫官翕然輿論已騰歡正人得路言無諱聖主虚懐聴不難莫厭封章箴袞闕要令奸膽落毫端鯫生雅服陽公徳時把昌黎諫論看題夀樂堂用東坡韻贈楊元賔僉判蓬萊閣下蒼龍古萬壑千巖擁仙府夀樂堂西面卧龍壑月巖風滿窻户蒼松溜雨大十圍緑水浮荷深一股作堂主人久黄壤仁智風猶似鄒魯詩仙騎龍已上天妙句光芒照寰宇青山偃蹇只如昔高處去天無尺五楊侯淮泗老儒學文字撑腸筆風雨朅來贊幕古東州要與青山作盟主虛堂宴坐飽風月此外一毫端不取他日從公物外游貝闕珠宫酌瓊乳與趙安撫乞疏獄小麥青青大麥熟秧老欲移蠶欲簇皇天彌旬作淫雨害及農桑一何酷麥枯秧腐蠶不絲無食無衣豈能育使君今世賢方伯政過龔黄同舜牧僦金蠲放官與私喜氣歡聲傾比屋仁風已慰黎庶心誠感蒼穹理宜速胡為烝泄尚如許陰沴干陽埋日轂豈惟泥濘困牛車更恐魚龍上平陸閭閻競畫指日蠻香火遙祈上天竺傷和無乃有寃民蠧政尚疑多大族使君有術開青天按劾奸贓疏滯獄李資深贈古瓦硯及詩世貴銅雀硯常患偽亂真千金買渇雀虚名何足珍李生心好古身困道不貧得此佳陶泓製由萬道人殷勤持贈我器古詩清新置之窻几間日與毛穎親未能草太𤣥姑用注獲麟羅文及端紫貴幸無比倫屈爾居蓬窗與我同艱辛研磨媚權貴揮染勞精神兹我所不敢銘以書諸紳送黄機宜游四明名子魯游宦東州識老成坐間談笑欲風生人如元祐氣尤直詩不江西語自清雪棹非縁尋舊隠夜牀端欲對難兄行聞太史奏星聚四皓聨珠隠四明黄兄弟四人皆皓首號所居曰橘隠堂次梁尉韻探春連騎入山城更喜梅仙亦㑹盟梁後至文字偶同吾輩飲聖賢滿為使君傾安撫尚書以僚屬游山送酒六十樽諸公自山中回晚集於教授㕔為文字飲詩逢好景天然好山為清流分外清瀟灑宗之最年少我慙叨預八仙名梁最年少和喻叔奇游天衣四十韻稽山高入雲鑑湖濶浮空禹秦有餘迹晉宋多鉅公我來嵗及周夢寐懐清風兹欣天氣佳扶桑欲曈曨駕言天衣游盍簪盡鴛鴻經夕戒行李如期集仙宫早㑹于天長觀聨騎出城南行行指秦峯千巖競吐秀眼界清無窮招提在何許十里松陰濃林端忽鐘磬與客為先容羣簪擁花界雙佩鳴寒空試將比天台大畧如思豐天台國清山水秀絶有思豐堂尤可觀覽首讀邑皓碑妙理開昏䝉細觀元白詩丘壑羅胸中蕭壁尚堪面寺有面壁二大字梁薪㡬經烘寺有梁時薪火見李公塟詩兹宫現有相禪客談無同朝陽最嶄絶白雲抺其胸朝陽峯最奇杜鵑天下無至今映山紅鷄僧始開山道業聞清衷思舉照不起高價傾江東袈裟縷黄金宫女自針工昭明親抱送禮意何太恭白馬忽渡江臺城喪英雄國破遺衣在丹青落塵容寺舊有梁昭明太子畫像我輩皆書生意氣飄如虹蠟屐共尋幽寧求香火功載酒懐賀老招隠思戴顒賦詩效吹臺一飯敢不忠況我賢使君徳宇尤疎通楚醴餉百榼白衣走山中嗟余何為者天資媿倥侗謬與酒中仙偶同蕺山松蕺山有八松同年妙詞章況有山水供古詩如古琴山高水溶溶背囊小奚奴捧硯長鬚僮叔奇題名勝游與佳作二美今具逢品題偏羣英波瀾及孤蹤掬水弄花句比擬何凡庸掬水月在手弄花香滿衣乃于良史游天衣寺詩也兹㑹如蘭亭同行類荀龍盛事在詩史奚用呼畫工秦望閣紙上觀秦尚過秦那堪山作眼中塵為言髙閣登臨者莫作秦人視越人競秀閣憲臺高閣偶躋攀萬壑千巖指顧間山色元來本無競人心自是錯看山鵝池鶂鶂能鳴異衆禽池邊墨客最知音世間都是山陰嫗應恐悞猜君子心次韻周堯夫贈睡香長向風前臘後開要將風味鬬梅魁名從廬阜夢中得根自鄮山嘉處來風折錦囊香不斷日烘寳葢翠成堆定須移向梅溪去栽伴吾廬桂與槐次韻濮十太尉喜雨去嵗秋大水民食方苦艱丁壯尚流離而況白與斑今春又不雨事與安危關使符下列郡呼雩舞童鬟投文責老龍貪睡何癡頑我聞救災術乃在人事間興師古有衛決獄唐稱顔年因弔伐有雨送軺車還嗟此旱魃虐和氣知誰干半嵗幸一雨人心寧不歡麥秀禾可植田里庶少安上紓當宁憂吏責亦稍寛我家蕭峯下山長路漫漫東臯有先業頗亦知艱難歸耕願及早免起將蕪歎次韻濮十太尉題禹穴寰瀛三十六名郡越在東南雄四鎮宛委周回三百里草木山川有光潤秦山鑑水藴秀異人物風流夸漢晉傳聞禹穴自太史好古無人若為問韓退之詩云越俗不好古流傳失其真杖履飄然尋洞天照眼千巖若攅刃細看盤石心愈疑遐思丹書氣猶振禹貢無傳豈其闕遁甲所書何足訓彞倫叙自九疇錫水土平繇五行順洛書六十有五字王業巍巍此途進八巻飛沈天與泉兹説荒唐理難信吾儕去古恨太逺企首難窺禹牆仞穴傍有井清且甘一酌端能洗驕吝女子生日五月十二日吾女何時見薰風欲半時年齡今稍長禮法要須知好讀班姬誡休吟謝女詩萱堂有慈母淑徳可為師泊桐廬分水港何處繫歸舟桐廬舊日游港從分水出亭瞰合江流合江亭疊嶂雲披絮遙天月吐鈎紛紛釣魚者無復見羊裘查元章自成都走書至江陵并貺蜀牋附子芝蘭道山舊邂逅夔江邊㑹合止半載别離又經年君猶滯使軺我忽移霅川東歸不及見西望心悠然尺書走健卒追上江陵船殷勤贈逺意藥百紙以千吾老苦多病得藥年可延靜思苦口味奚止沈痾痊但非造樓手誤辱文房牋待將君詩文傳寫千萬篇書言作二記付與䕫人鐫捍波記修壘濟渇記義泉深慙郡政謬濫託雄文傳君才高輩流君譽藹民編雅志在活人何心肯流錢當宁正念賈諸公咸薦賢定歸玉筍班慷慨旒扆前所陳必堯舜那肯談武宣早趨舍人裝行著祖生鞭我冠儻未掛苕溪遲言旋兩宋名賢小集巻一百六十三
