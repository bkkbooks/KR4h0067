body:
  text: 兩宋名賢小集巻五十二宋陳思編元陳世隆補公是集二涵虚閣玩𤣥猿孔雀清池明夕景高樹含涼風巴猿戲前檻越鳥安深籠悲吟激清漲文繡揮䝉茸弱喪不自非全生或為容兹遊感真樂逺哉濠梁翁過海舟秦王好神仙東上瑯琊臺蛾睂緑髮五千輩去乘長風款蓬萊此時秦人海傍立生别死分不敢泣但見高帆雲中沒野鳥悲鳴為翔集過海舟何時還火焚荆棘空驪山睡起日午吏稍休池上逍遥眠水木澹相映庭户清無喧時有山中禽來鳴高樹巔微風拂衽過會意成翛然有生滯形役萬物安静便愧無淮陽績高卧亦終年和貢甫𤓰步詩江介多悲風川廣不可越畏塗非吾土游子愴明發羣山起楚蜀衆水㑹溟渤地險自始然天塹豈虛設憑陵三國際偃蹇五胡末魏太祖亦嘗至𤓰步所謂白馬飲江水佛狸死卯年非無英雄姿于此智勇竭疑城尚虎踞白馬餘飲窟人謀雖工拙神物有予奪請陳真人翔頗事丹浦伐風雲掃氛埃雷雨救時暍禹功東漸海漢使南哨粤太平自兹始盛徳信貽厥雨霽同聖民登西北樓雨餘暑氣減日出浮雲開高樓極遠目百里無纎埃山形西北鶩江勢東南來舊都尚能記壯觀多可哀微風激清嘯浩霧傾寒杯亦知非吾土聊復樂徘徊采藍寄王深甫采采澤中藍製為金翠衣春風為君舞婉轉有光輝良辰古易失麗色世云希嗟嗟不盈掬日暮空來歸雷陂勸耕作雜言此陂蓋江都宫之地吳王釣臺在其旁先時民耕三十家其後為吏所奪廢不耕者十餘年矣予按地籍悉召還耕者使縣大夫授之地如其舊君不見江都宫昔時何崔嵬下臨雷陂水前踞吳王臺臺傾無餘級水竭空塵埃隋人已曾顧此長嘆息今世更為隋人哀乃知天地間一盛亦一衰但從伏羲以來三十餘萬嵗未有書契勝言哉堯桀是非可兩忘我欲勸人闢草萊種稻水一方藝麻塍四頽爽鳩之樂非我有聊獨翫此坐莓苔未知百年間更復誰當來且欲及閒從賓客省耕訪斂時徘徊李覯以太學助教曾鞏以進士及第歸俱會郡下素聞兩人之賢留飲涵虚閣孤鸞方北游威鳯復南翔邂逅中道遇弄音何鏘鏘太平向百年此固多美祥擾擾都人士争先覿輝光雖無醴泉流江水清且長雖無朝陽桐翠樹茂且芳念將萬里逝願得少徬徨為君附巻阿因以謝楚狂秋興三首微風起閶闔秋意日已滋陰蟲羣悲嗚草木同變衰天道雖茫昧平分為四時功成自當去揺落何獨悲魏侔貴公子沈沒功名間一浮江湖水慘戚頽朱顔魯連揖萬乘蹈海如忘還棄世脱敝屣風流安可攀耿耿秋漢輝中夜西南流牛女永相望婉孌悲素秋安知乘桴翁徑出海外游天路或幽險神仙非所求疊韻圖書如蘧廬吏事累志意招邀聊逍遥醉寐自棄置奉同永叔於劉功曹聴楊直講女奴彈啄木見寄之作空林多風霜霰零啄木朝飢悲長鳴口雖能呼心不平誰彈琵琶象其聲雌雄適直相丁嚶欲飛未飛皆有情琵琶八十有四調此曲獨稱得𤣥妙翠鬟小女眉目殊能承主歡供客娛轉關揮撥意澹如坐人雖多旁若無醉翁引觴不汝餘歌詩彈鋏歸來乎兩君韻高尚如此何況櫪上之馬淵中魚我生不曉世俗樂頃卧江城更寂寞中園有時聞啄木雖有高下無宫角木聲犁然當人心猋氏之風殆可學淵明無絃非無意白髪秋來自少樂得公新詩濯我愁因問楊子更借否我欲醉聴江城樓留城子房廟大風起豐沛海水羣飛揚逐鹿未有歸飛熊猶道旁一見契千載立談開八荒蛟龍不可羈鴻鵠得新翔昔為黄石師智䇿無與雙晚蹈赤松賞功名忽如忘由來神仙流理與天地長陵谷自有遷若人豈復亡我行覽遺跡城邑空蒼蒼感古追逺遊白雲杳何鄉出城八角以東積水江湖壞田甚多居民更以捕魚種蓮芡自給從丙申已來四年矣出城得自便下馬事幽討曠野荒不耕蒺藜生滿道往往逢饑人羣輩掘野草不惟黄頭兒亦有白髪老問之指積水此去殊浩浩室廬久漂蕩樹木多枯槁食魚且賖死堯年亦久澇不能去墓墳更欲依蒲藻昨來計蓮芡頗不減粳稻明年當大種妻子或相保與景仁聖俞飲景彞西園鬢髮今欲白山林未能往每逢負郭趣黙有歸田想置酒松栢下當春更蕭爽欣欣二三子相與留一賞早花何娟娟秀色傾宿莽馴禽聲喧呼永不忘羅網物情樂于適未必在深廣育育井中魚何然困偃仰佳哉主人翁示我以天壤放懐寓一醉益愧鳴佩響園中井有魚數十頭同永叔和介甫昭君曲漢家離宫三十六宫中美女皆勝玉昭君更是第一人自知等輩非其倫耻捐黄金買圖畫不道丹青能亂真别君上馬空反顧胡風吹沙暗長路此時一見還動人可憐怏怏使之去早知傾國難再得不信傍人端自誤黄河入海難却來昭君一去不復回青塚消摧形迹絶惟有琵琶聲正哀燈花火中有芝殊榦連葉頃刻三秀爛其煜煜孰為而生孰為而滋既富且壽君子正之同介甫和聖俞贈狄梁公裔孫陳平智有餘周勃勇無敵兩人相提衡終復漢社稷梁公柱石姿獨力謝羣力存君多直言薦士有深畫既扶將頽運復起未然䇿事業兼二子皓然雪霜白偏材成獨往特達見全徳誰謂十世逺風義猶不隔末孫何支離畎畝有餓色明詔問樂鄉布衣列士籍名垂天壤間氣使懦夫激聞君商聲歌更若出金石送胥元衡通判湖州平生笑山濤非隠復非吏今更欲似之顛瞑老將至羨君負清識于世寡所求能從魏闕下逕取江湖游扁舟駕長風千里破高浪倚檣一清嘯佚氣横雲上碧醴若下酒紅鱗苕溪魚綵衣起為壽此樂天下無誰不慕軒冕顧多困朝市人生難自諧禄仕當若此贈聖從待制君居御街西我居御街東如何百步間十日不相從君非園中植落落千丈松我亦湖海人庶㡬孤飛鴻俱游人世間俛仰豈不同蕭蕭髪向白袞袞嗟轉蓬仕固不期達貧亦不諱窮行當一麾去幸識攖寜翁雨中獨居有懷江梅晨起風雨交蕭蕭秋意寒出門無所詣行道如此難思我平生游相得何日歡興來未嘗約趣合不待言濁酒有與醉孤琴能一彈時時商聲歌磊落摧心肝浮雲歸無期宿草秋向殘獨詠雞鳴詩一唱三四嘆早至涼榭觀芙蕖林深池亦淺日出光晚及粲粲花尚含漙漙露猶濕良魚潛復躍幽鳥翔又集物情況如慕心賞浩難戢誰能贈逺人采采空佇立同諸客飲涪州薛使君佚老亭百尺井底泉激輪作飛流潺湲入庭户宛轉如奔虬主人三署郎持節西南州棄之卧故里富貴安足留却掃長閉門籯金非所求客來坐林下樽酒相獻酬未嘗語朝市餘事良悠悠乃知獨往意不必山林幽衣冠多雋才繼踵公與侯誰能懸其車五十未白頭嗟嗟賢大夫此風可鎮浮為問三輔間何如馬少游曲水臺竹間黙坐杖履不能逺逍遥池上林微風起衆響炎日隔繁陰斐亹激泉流間關語鳴禽放懷在離人寄賞欣會心既謝朝市喧亦忘山谷深雖知非吾室猶以開煩襟野望重陽去寥落小雪逼蒼茫獸起駭枯草鳥歸横夕陽薄雲低引白衰菊暗消黄竚立何為久傖人非故鄉蕪城閒望二首幽尋古城上秋景日凄凄落照映原沒陰蟲當路啼隋宫變蕪蔓楚分失端倪自是傷亡國非關醉眼迷春草忽更緑荒城陰霧滋風存鮑昭賦秋益宋生悲慨想秦兵出傳聞羽檄馳江湖嵗將晚空羨逐鴟夷秋霽望月明蟾此夜新竚立爽精神㡬日隔霖雨相望如故人風生疑折桂雲散欲埋輪應有關山客長歌哭滿巾行詣揚州壽寜寺作周世宗嘗幸此隋宫老荆棘淮地阻山川天子周王狩諸侯楚社遷宿車江水上休甲古城邊清蹕仍過此高臺亦宛然殿空出影響畫古剥丹𤣥缺甃驚跳鮒遺碑失紀年廢興真可感耆舊毎多傳一咏蕪城作斜陽聞暮蟬招友上清宫修竹高松無俗塵全然不似近城闉黄冠習静多藏客野鳥忘機却傍人高閣祥雲銜落日黄庭霏雨濕青珉北窗固有逍遥地來讀離騷戴角巾送張六丈尉新安新安好江水往復似桐廬吏隠應相稱官卑還自如洛塵趨走裏周俗戰爭餘㑹自求知己頻飛一鶚書月下蟾蜍滴露侵石垣松檜吟風如澗泉夕夢未窮山夢逺自疑乘月弄潺湲聞范饒州移疾汲黯亷平漢主知淮陽移病苦清羸偃籓政事應無及伏閣精神定未衰天欲斯人身必乏帝疑飛將數多竒何當半夜開宣室獨使雍容對受釐淮上期龎十一不至淮上稱晨朝晨光滿麗譙有懷空悵望無和獨行謡水色全含鑑林花半隠樵雲煙平宿莽鷗鳥破春苗野俗陽歌麗游人白馬驕先生惟寂寞至樂亦逍遥洙泗風差逺川源景幸饒思君不得見何以助簞瓢城南雜題講武池當日龍船校五兵旋開池沼學昆明邇來封禪和平久舊地分教百姓耕玉津園垂楊冉冉籠清籞細草茸茸覆路沙長閉園門人不入禁渠流出雨殘花短槐在水陸院盤跚不稱三公位偃蹇空妨數畝庭只有老僧偏愛惜借人圖畫入書屏水寺早時風景愛東吳一到京師興益疎偶向城南疑澤國夾川垂栁帶僧居兩宋名賢小集巻五十二
