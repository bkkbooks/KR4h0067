body:
  text: 兩宋名賢小集巻一百三十二宋陳思編元陳世隆補寄亭詩遺章楶字質夫建州浦城人始以世父得象䕃為將作監主簿復舉進士甲科知陳留縣以最擢提舉荆湖北路刑獄稍遷直龍圖閣知慶州明年除知同州紹聖初徙南京改集賢殿修撰知廣州又知渭州至即築二城于石門峽江口好水河之隂二旬有二日而畢賜名平夏城靈平砦方興役夏以其衆乘我師大敗之擢樞密直學士既而環慶鄜延河東熈河皆築城夏人􅌓視不敢動實自涇原始無何夏國主與其母自將數十萬圍平夏不能克一夕遁去戎母慙剺面而還除龍圖閣學士夏國統軍嵬名阿等皆勇悍善戰楶遣折可適郭成間以輕騎夜直入其帳執之盡俘其衆種羌震駭進端明殿學士楶在涇原四凡置州一城砦九夏人自平夏之敗不復能軍屢請命乞朝貢天子赦而聼之乃為寢兵徽宗即位徙知河南入見留提舉中太一宫遂拜同知樞密院事以老授資政殿學士中太一宫使未幾而卒諡曰莊簡運司園亭十詠并序成都轉運司園亭蓋偽蜀時權臣故宅也清曠幽静隨處皆有可樂者輒為十詩足以省憶髣髴云爾山堂古木鬱參天蒼苔下封路幽花無時歇醜石終朝踞水竹散清潤烟雲變晨暮何必憶山林直有山林趣玉溪堂堂因水得名方沿當其後漪蘭蕩榱桷忩户挹花栁蟲魚不避人鷗鷺若相友午枕夏簟凉此樂亦奚有雪峰樓層構壓池塘不僭亦不偪影浮綠水静寒凝雪山色撫檻接修竹連檐引蒼栢注目望長安無奈濃雲隔海棠軒珍葩寄幽島正對孤軒植優柔自俯仰紅綠若組織春酣晴日曛坐乆濃香逼池面净可鑑朝霞罩澄碧月臺蜀地饒夜雨輕隂多蔽天見月月無幾築臺邀嬋娟髙凝桂影近俯視雲幄連顧盼己塵外欲挹瑤宫仙翠錦亭楩楠百尺餘排列拱檐際畏日自成隂隆冬寕滅翠虚曠得寂理懶僻恣濃睡誰知官府中獲此沖漠味潺玉亭傍砌釃小渠回環是流水石蜃吐珠涎清響醒人耳風微竹影碎月皎波光起颯爽無塵囂静適心所喜茅庵竹間搆圓庵所向自瀟灑珍禽㺯巧舌宛是居山野黙坐見真心萬縁盡虚假勿陋尋尺地兹焉息意馬水閣架木浮水中畧彴通孤島扶疎花影反潑剌跳魚小風月所得多經營信云巧隠几寂無人朱蘭萃幽鳥小亭花邉二小亭雙跨清渠上規模雖甚隘幽僻良可賞幸依佳木隂未羡大厦廣不足延賞朋攜筇常獨徃兩宋名賢小集巻一百三十二
