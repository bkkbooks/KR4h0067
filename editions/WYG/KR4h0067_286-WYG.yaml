body:
  text: 兩宋名賢小集巻二百八十六宋陳思編元陳世隆補轉庵集潘檉字徳久永嘉人諸父文饒文孝文禮俱登科文饒字民則學本濓洛尤為多士所宗父虎右科第一檉以父任補右職繼參戎幙召試為閣門舎人久之授福建兵馬鈐轄卒平生喜為詩下筆立成聲名藉甚人莫能儔永嘉言唐詩自檉始有轉庵集遇舊有感人間百寒暑正似須臾期當年同袍子一見雪滿頥不惟形容變亦復聲音移坐定問姓字始省從師時見此發咏嘆勞生果何為不如多飲酒滿腹同鴟夷客舍急雨鳴空壁輕寒上薄幃愁多空被酒夢短不成歸暗想桃花落遥憐燕子飛偷兒欺客寢夜静巻春衣題釣臺蟬冠未必似羊裘出處當時已熟籌但得諸公依日月不妨老子卧林丘英雄陳迹千年在香火空山萬木秋自笑黄塵吹鬢客愛來祠下繫孤舟送友人游金陵酒盡譚餘意轉新北風一舸下寒津遥知白下登樓處正欠黄初着句人徃事省來多歲月舊㳺疎似曉星辰半山斜日荒涼寺更有殘碑待拂塵簡徐判院風誼峥嶸昔未親正懸一榻待髙人當年曽接東萊話今日寧嫌北阮貧世味梅花開野水詩情馬首沒黄塵何時載酒從君去靈鷲峯前借早春出郭酟酒三家市題詩十里塘薄雲鷗外影空翠馬頭香出郭知無事尋僧有底忙終當成野逸小築近滄浪歲莫懐舊白髪將朱顔一去幾時返懐哉不能寐展轉復展轉雀噪曉窗白雞鳴芳歳晚梅花眼中春故情千里逺還自錢塘道中江上青山落照邉江頭歸客木蘭船春鷗自共潮回去一㸃飛來是栁綿自滁陽回至烏衣鎮行人元不恨長途下馬旗亭酒可沽回首瑯琊山不見西風吹起豆田烏鴈蕩道中千丈巖頭一㸃紅春風吹落淺沙中山僧倚杖移時去説似溪邉采藥翁次韻酬陸放翁瘦藤白苧岸烏紗隨分酬春領物華西崦三椽休問舍南湖一帯近栽花眼昏客枕多儲菊肺渇僧庖屢借茶無事閒門便早睡清燈喚起為唫家霅上簡婁舜章鷄頭旋煮蓮新拗簇鳯排花鱠更鮮清夜故人情客到小船載酒大船邉平江道中不載圖書載酒杯姑蘓臺下小徘徊東風不識人心老擺栁吹花一併來書姜䕫昔逰詩後我行半天下未能到瀟湘君詩如畫圖厯厯記所嘗起我逺逰興其如鬚毛霜何以舒此懐轉軫移清商兩宋名賢小集巻二百八十六
