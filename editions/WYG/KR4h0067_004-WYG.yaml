body:
  text: 兩宋名賢小集巻四宋陳思編元陳世隆補楊文公集内直芝泥初熟詔書成紅藥翻階晝景清屋瓦生煙宫漏永時聞幽鳥自呼名讀史效白體易牙昔日曾蒸子翁叔當年亦殺兒史筆是非空自許世情真偽復誰知閨思征夫萬里戍交河塞外蕭條朔氣多古壁暗蛩催夜織朝來一葉下庭柯李御史清曉乗驄出九衢内朝簪筆坐前墀天家御史非凡格曾向崑崙服紫芝王殿丞舉通判桂州科名得玉向崑丘家世長淮入海流通籍殿中鈎盾省頒條嶺外桂林州漢皇前席期清夜楚客歸帆指素秋父老歡聞鄰郡政前知賓州壺漿千里待鳴騶大名温尚書之任窣雲樓堞古銅臺幕府池塘菡萏開畢萬山河千里逈亞夫鐘鼓九天來屬鞬前隊射鵰手載筆初筵倚馬才命將文昌非細事星光昨夜動昭回喜賀梁三入翰林六鰲雲海冠蓬萊玉署深嚴枕斗魁漢殿論兵得頗牧梁園作賦掩鄒枚趨朝御案香盈袖侍宴仙莖露滿杯五色天香看視草懸知獨有長卿才次韻和昭侯立秋見寄雲峯半歛火西流桃簟微涼忽報秋飲露吸風齊女怨登山臨水楚人愁珠喉倚瑟華堂暮桂髓薫衣别院幽美疹已平休沐浴會應投轄一相留弟伋歸寜一夕西風木葉飛長安久客念庭闈去隨塞鴈啣蘆逺歸及家雞啄黍肥負郭生涯同季子澄江詩景屬𤣥暉帝城紫陌多塵土免化輕雲白紵衣景陽諌議赴餘杭浙水東西兩節旄君今于此握戎韜油囊仙姥流霞酒鰌穴靈胥白鷺濤盤石起家傳典訓翹車開幕聘英髦子牟江海終非久剰鱠鱸魚把蟹螯杭州嚴從事栁岸蘭橈片席飛秋風澤國季鷹歸幕中蓮渚紅衣脱江外蓴羮紫線微十部須知從事貴雙魚莫遣尺書稀西陵正接家山路試為因人問釣磯鄱陽皮録事松陵遺集古風騷故國田園沒海濤三世青氊傳舊物三世有集五百巻十年黄綬歎徒勞謝塘春草侵魂夢潘縣秋霜入鬢毛鄱水黄金漫如粟想君終不染脂膏漢書地理志云鄱陽出黄金粟史館楊嵎學士以詩話及空門之事次韻以和之雙樹金言付囑頻閻浮外䕶託王臣誰知天禄草𤣥客曾是靈山受記人諸暨簿張慈閩人有聚書之癖事祖母九十餘新官佐邑近閩隅令伯歡心就養初暫住梁園慵獻賦因經禹穴便探書忘機海國親鷗鳥寄信金華託鯉魚迴日殺青兼兩載想君清俸亦無餘次韻和昭收寄銀臺李舍人之什柱下方書掌事機深嚴侍從接論思歸鞍通徳香街迥前席延英晝漏遲菊徑頓疎陶靖節月樓偏憶庾元規華堂宴集應難去玉斚醇醪滿勸誰送吳航井臼荒涼旅鬢斑經年索米住長安囊中賣賦金都盡衣上悲秋淚不乾客路飄蓬殊未定侯門置醴豈成歡擔簦忽起東遊興庭樹西風昨夜寒并州王諫議瑣闈聊輟皂囊封晝錦還鄉意氣雄别墅揮金延父老近郊騎竹見兒童蒲盧善化終成政蟋蟀深思未變風更待出師平黠虜戎衣獻捷大明宫奉和翰林諸公賀閣長李公領銀臺之任西漢公車主上章官曹秘邃接明光天書時草鳳鳳詔邊奏親開赤白囊咫尺清規頻借筯離披金蘂阻飛觴瀛洲仙侣相期處銅馬門中白玉堂姚起居赴兩浙轉運吳會商功利蓬丘輟史臣同僚供祖帳屬郡望行塵富國催流馬編年廢獲麟槖鞬二千石襦袴幾州人名姓丹臺籍封疆析木津片言空犴獄密啓到鈎陳且運方船粟初嘗千里蓴江山助詩思新詠掩汀蘋集賢劉工部隲知衡州仁里古湘川頒條命雋賢腰垂丈二組身下九重天山水登臨思庭闈喜懼年官曹郎位宿衣袂御爐烟記事成新史賡歌有雅篇為貪驅弩矢不從泛樓船治道山陰卒離羣藏室仙衡陽無過鴈尺素若為傳魏奉禮昭文知吉州龍泉縣故少卿咸熈之子平昔登龍坂因縁識玉人庭中華轂滿膝下綵衣新少列悲先露高堂泣累茵嘉賓碣館閉遺業寢丘貧弓冶傳家久絃歌宰邑頻循良同漢吏恵愛及齊民又出夷門去還臨灨水濱不須輕百里自古應星辰作坊魏使知隰州幾年供奉宣徽殿一旦腰懸刺史魚戚里園林甲京洛將壇家世閲詩書離筵惜别空銀榼官舍思歸夢玉除四十專城誰不美驂驔千騎擁干旟司農欒少卿知洪州大農搜粟漢名卿千里江西擁斾旌腰下金龜三品綬手中銅虎八州兵江西舊管八州屬鞬牧伯趨庭見騎竹兒童塞路迎前任江南轉運使洪井主人今重士肯教懸榻有塵生送邵梁秀才君家罨畫溪嵗晚忽思歸密雪不獻賦流塵空化衣購書藏屋壁温席奉庭闈清世莫招隱垂天待一飛酬秘閣黄少卿因見所作洞霄宫碑且有題記譙郡增嚴李母祠神龜矯首負金碑豆萁己乏不休思虀臼兼無絶妙辭翠琰雄文慙内史隋内史薛道衡有老君祠庭碑黄庭美翰枉羲之翰林裴待詔奉敕書蓬丘麗句偏相許勝得山龍袞服披弟僓歸鄉客兒詩思揜春塘杖䇿來觀上國光舉白萬錢酤酒飲殺青千巻買書藏梁園緑篠將欹雪楚岸蒼葭己變霜躍馬還鄉那隔嵗預應乾鵲報高堂弟伸歸鄉澤國思歸詠采蘭束書攜劍出長安天涯朝暮倚門望嵗晏風霜行路難閩嶺夕嵐鄉樹老楚江寒浪客衣單巖前舊勒移文處到日重須拂蘚看王尚食知鳯翔曾領延安露冕分憂輟近班朝陽鳴鳳古岐山三刀吉夢頻為郡駟馬高車又出關宴客羽觴那有算題詩綵筆莫教閒將壇義府平生事早立邊功奏凱還福州古田宰李堪由來百里應華星何況牛刀乍發硎五栁不須輕印綬七關聊且訪圖經雪天張飲連浮白海縣抄書剰殺青公暇好裁封禪頌聖皇將欲駕云亭黄旦宰江州徳化縣外臺論薦達乗輿花縣絃歌製錦初氣直公車曾諫獵政清官舍舊懸魚二林重結遺民社五栁閒尋靖節居好繼謫仙留絶唱雲屏九叠倚晴虚李白廬山謡有屏風九叠雲錦張之句贈文照大師讀徧龍宫七佛書一塵無念得衣珠金園講席天花滿沙界禪心水月孤擁衲夜霜凝屋瓦閉關春雨長庭蕪公卿半是空門友缾錫因循寄上都慎大詹以吳柑見貺龍陽休説木奴洲震澤黄柑占上流承露玉漿仙掌曙亞霜金顆洞庭秋香黏素手吳娃麗冷滌朝酲楚客愁應是荔支催入貢隨河飛鳥逐鳴騶秘閣舒職方知舒州西崑册府控千廬鉛筆多年校魯魚厭享雙雞大官膳貪乗五馬使君車明光畫省辭青瑣天柱仙壇訪紫書只恐政成抛印綬攜家深入白雲居夜宴玉壺春漏咽銅龍畫棟塵飛曲未終樽酒緑醅和蟻泛牕燈紅焰隔紗烘水沈煙裊風微起霜檜陰圓月正中苦恨當關催夙駕平明入謁未央宫陳大博知建州夢筆山連化劍津兩鄉人看錦衣新北堂滫瀡三牲膳南陌驂驔五馬塵畫角聲殘鈴閣暮露芽香細茗園春甌閩自昔多名士誰是賢侯席上珍再别陳建州因以抒意北闕多年作侍臣一枝烟雨憶南閩留連五鼓趨丹禁近拜章求解職領郡上不允所請健羨雙旌擁畫輪籬畔菊荒環堵宅山中鶴怨未歸人州民刺字空漫滅目斷東方千騎塵梁四諫議知鳳翔府幾日銀臺閲副封岐陽西顧委秦中函關叱馭經天險豳國聞雞接土風雲幕杯盤三省近星郵章奏九門通下車卧理應無事莫遣融樽酒暫空錢易赴蘄春名重星垣試官閒月寺中竹符千里郡花浪一帆風塵隙駒從度霞觴酒莫空公堂封筆塜郵舍遞詩筒騷客休懷楚詞臣各薦雄長庚謫仙骨須入抃鰲宫福州張從事萬人都督古閩州幕府旌門映碧油閫外依蓮滯英俊樽前噉薤占風流犀燈照水窺龍劍鯨沫噴空見蜃楼暇日登高賦滄海添鹽堪為昔賢羞元淨上人之新安謁李學士兼遊廬阜雙闕重城到幾迴兩遊千里忽浮杯黟江春水淺深渌廬岳夏蓮傾倒開謝客同翻貝葉字湯師獨占碧雲才舊房京寺門空閉坐榻凝塵砌長苔京府獄空降詔因寄大尹學士長安惡少罷探丸桴皷聲沈禁網寛三尺舊章閑玉律八行優詔下金鑾帝臨宣室方前席民值唐年恥掛冠終日訟庭無一事早調伊鼎佐湯盤葉秘書温知蜀州江原縣前任嘉州從事自合淝管記授此官秘省丞郎出字人錦江偏好濯纓塵酒壚千古風流地花縣三年爛漫春白羽豫州慵草檄青天蜀道厭摧輪巴猿杜魄驚鄉夢莫遣霜華鬢畔新和酬秘閣錢少卿夜直見寄次韻甘𤓰朱李郢醪濃素綆銀牀蔭碧桐賜第舊連丹鳳闕直廬今在未央宫承雲仙掌延年露轉蕙薰絃解愠風此夕蓬山好逃暑月軒清話恨難同送石枕與參政王給事雄道人所恵者千古碧潭秋水骨琢成孤枕冷如氷因為江外朱輪守得自林間白足僧月幌光寒吞桂魄暑軒氣爽壓梅蒸竒章好尚非流俗願向蕭齋代曲肱黄小著震知興元府南鄭縣藏室仙郎罷屬辭暑天驅傳出京畿流年兩鬢生華髮宰邑全家住翠微九折坂長須叱馭三聲猿苦欲霑衣金門薦鶚知音在政事夕郎太原公嘗抗章稱薦不到𤓰時捧詔歸陳堯拱廷評致仕歸蜀西樞給事之兄也一家今有十朱輪獨憶雲山欲退身天邑繁華行樂厭月曹清要命書新西風躍馬經秦甸東道椎牛讌孟鄰秋稼萬箱僮百指羲皇之上更何人史館趙祠部況通判宿州時被病堅乞外任風流華省含香客籍甚先朝奏賦人竹使三年勞佐郡栁堤千里待行春文園避事心長笑天禄讐書鬢漸新帝念河渠在封郡特縁經義委名臣擇良上人歸天台片席然犀經水府幾程登陸望霞標吟情晚日繁雲合歸路秋風密葉凋行道六時廬岳漏浮杯千里浙江潮舊房晏坐觀空後香積多年飯頓銷表元師歸縉雲有懷故雄闍黎成轉韻六十四句括蒼古名郡生齒三萬家我昔自先殿捧詔臨軍牙清心治期月訟息民無譁雄公真大士晏坐緜嵗華駕言造梵宇室邇驚人遐迎門虎溪屐布地牛頭花庭松偃翠葢澗泉漱金沙坐聞獅子吼歸恨踆烏斜驛召還上都騰裝即脩路别師黄金園贈我碧雲句我歸步赤墀代言紅藥署彈指知苦空觀心得降住藏識慙宿薫輪迴悲晚悟折簡問南宗寄言滿緗素絶念契真如忘筌離文字刦燒雖洞然龍華決同遇師名達宸扆恩詔頒方袍歡喜黑白衆蕭衰霜雪毛毘耶見有疾示身如幻泡雙林忽歸寂人天但哀號堆案遺札在滿鉢香飯銷只應伸臂頃未覺他方遥犀柄掛空壁鴈㙮干層霄七返暫來去四大非堅牢口占成尺題手澤著紙尾親遣上足師浮杯渡江水雲朶揺筆精玉音鏘里耳遺我方石枕斑文剪霞綺諭我求菩提心堅正如此愴然悲夢形汍瀾泪盈眦上足今去歸焚修益勤止當續祖明燈無令蓮社死蘇寺丞維甫知簡州陽安縣兼攜家之任神雞縹碧馬金精西海桑田一掌平苜蓿度關風漸勁莓苔登棧雨新晴琴齋盡室無歸夢錦里當壚奈宿酲麈柄清談且為政莫貪蒟醬學論兵宿齋太一宫答李寺丞次韻泰畤齋居肅梧楸蔭繞垣露葵深得味風鐸自成喧緑髮松喬侣丹經黄老言心期阻良久蝶夢繞朱門建溪十詠太常高博士恵連典建安郡自郵中以所賦詩十題為寄僕桑梓之地耳目熟焉不勝起予因亦繼作武夷山靈嶽標真牒孤峰入紫氛藤蘿暗仙穴猿鳥駭人羣古道千年在懸流萬壑分漢壇秋蘚駁誰祀武夷君北苑焙靈芽呈雀舌北苑雨前春入貢先諸夏分甘及近臣越甌猶借渌䝉頂敢爭新鴻漸茶經在區區不遇真陸羽茶經不述建溪蓋未遇真茶也朗山寺層巒連近郭占勝有招提宿霧昏金象飛泉濺石梯鐘聲空谷答㙮影亂雲齊千騎時來此尋幽獨杖藜陸羽井陸羽不到此標名慕昔賢金瓶垂素綆石甃湛寒泉百汲甘寜竭千金志不遷吳隠之有一飲懷千金之句真茶汎雲液一啜可延年梨山廟李頻也唐季臨兹郡生祠己薦馨聲詩傳樂府廟貌載圖經畫壁流塵暗金碑古蘚青細民時請福撾皷賽遺靈髙士亭危亭壓波面屹若抃靈鰲浮蟻酡顔數飛鴻送目勞吏圍披簿領僧伴話風騷何日登懸榻州民刺有毛大中㙮雞園開淨土鴈㙮倚寒空風鐸和清梵晴幡映彩虹香花傾海國金碧擬天宫絶頂登臨處谿山一掌中仙人洲相傳梅福于此上昇所乗馬還墜後人因號墜馬洲寒潭吞别派孤嶼屹中流昔有驂鸞客因名墜馬洲洪波長赴海碧樹幾經秋城郭何年變空聞鶴語愁延平津積水深無際神龍此屈盤􅆺川珠彩動射斗劍光寒燕脯誰能寄犀燈豈易看負圖當瑞聖何若蟄洪瀾毛竹洞洞門生異竹冉冉接同亭石迸狂鞭怒霜封密葉青實應容鳯食杖欲變龍形逋客歸何日巖阿已勒名因與西㕔參政侍郎奕碁予輸紙筆硯三物以詩見徴屬宣毫適盡但送蜀牋端硯繼以此章多年燥吻蒼苔砌秃盡江南石上毫五色鸞牋猶有剰一拳端硯豈勝勞蕭齋幸與談賓末謝墅深䧏奕思高微物供堂方猶豫丹青筆下枉風騷又以建茶代宣筆别書一絶青管演綸都己竭文楸爭道恨非高輒將北苑先春茗聊代山中墮月毫游王氏東園名園聊得拂塵衣深入春叢一逕微萬樹未饒金谷富百泉猶有漢陰機青蘋風暖天雞出文杏巢乾海燕歸向晚鳴騶九門路栁堤回首獨依依送僧歸蘇州説法雄音敵海潮一棲京寺葉頻凋水田三事衣將敝香積多年飯頓銷忽憶虎丘飛夢到更聞蓮社寄書招好傳祖印歸南土莫遣宗風漸寂寥送僧歸越州舊房嵇嶺鎖春臺猿鶴歡迎振錫迴花雨六時飄講席樵風千里送浮杯一乗了義刳心學三藏真文􅏕手開跡似孤雲本無滯飄飄新到帝鄉來張泌東遊玉籍參差未䇿名東遊聊得拂塵纓長亭酒盡驪歌闋下榻波狂鷁棹輕澤國鱠鱸懸夢想㦸門羅雀㫁逢迎秋期莫到槐花老待聴新文擲地聲喜王虞部賜進士及第時知鄭州奉詔乗馹赴聞喜宴中臺高應列星文千騎驂驔擁畫輪起草己誇雙筆健登科更占一枝春龍津召宴芝泥濕雁㙮題名麝墨新只待甘泉重奏賦彯纓長奉屬車塵送章四十舅翁東歸鄉黨共推賢干名二十年早懷荆岫璞遲下祖生鞭敢諫書無報徒行履欲穿聖朝公道在搔首賦歸田范儀下第東歸君住武夷鄉思歸便促裝溪鱗絲縷細園茗露芽香雷火悲三上金錢困一囊長纓塵土滿會待濯滄浪故比部李郎中挽歌四首隴右華宗貴朝端懿範存哀烏光列宿駟馬慶高門謁帝承明署娛賓金谷園人生忽到此天道亦難論睦俗衣無主傳家鼎有銘沙堤連里巷玉樹接階庭北海樽常滿西山藥不靈肯堂歸棣蕚含笑入泉扃鴈序分臺閣春卿有職司雲屏三殿宴綿蕝一王儀風韻靈和栁襟懷叔度陂善人無復見執紼淚空垂美疢漳濱卧營魂東岱歸故人空漬酒侍史罷薰衣畫像留家廟銘旌出帝畿浮生除壽考享福似君稀南朝五鼓端門漏滴稀夜籖聲斷翠華飛繁星曉埭聞雞渡細雨春塲射雉歸步試金蓮波濺襪歌翻玉樹涕沾衣龍盤王氣鍾三百猶得澄瀾對敞扉漢武蓬萊銀闕浪漫漫弱水回風欲到難光照竹宫勞夜拜露漙金掌費朝餐力通青海求龍種死諱文成食馬肝待詔先生齒編貝那教索米向長安明皇五楪開觀檢未封鬬雞三百逺相從紫雲度曲傳浮世白石標年鑿半峰河朔叛臣驚舞馬渭橋遺老識真龍蓬山鈿合愁通信回首風濤一萬重成都五丁力盡蜀川通千古成都緑樹濃白帝倉空蛙在井青天路險劍為鋒漫傳西漢神祠馬己見南陽起卧龍張載勒銘堪作誡莫矜函谷一丸封書懷寄劉五二首風波名路壯心殘三徑荒涼未得還病起東陽衣帶緩愁多騎省鬢毛斑五年書命塵西閣千古移文愧北山獨憶瓊林苦霜霰清尊嵗晏强酡顔世事悠悠未遽央虚名真意兩相忘休誇失馬曾歸塞未省牽牛解服箱四客高風驚楚漢五君新咏棄山王秋來每有漁樵夢多在箕峰潁水傍無題曲池波暖蕙風泠頭白鴛鴦占緑萍纔斷謌雲成夢雨陡回笑電作嗔霆湘蘭自古傳幽怨秦鳳何年入杳㝠不待萱犀蠲薄怒閒階鬬雀有餘翎合歡蠲忿亦休論夢蝶翩翩逐怨魂祇待傾城終未笑不曾亡國自無言風翻林葉迷歸燕露裛池荷觸戲鴛湘水東流何日竭煙篁千古見啼痕洛意衡臯駐馬獨依依寄恨微波帶減圍淚迸不成雙玉筯身輕誰試六銖衣穿鍼静夜星榆出攬筆清晨雪絮飛目斷風簾舊巢燕新春先傍杏梁歸寄靈仙觀舒職方學士緑髪郎潛不計年却尋丹竈味靈篇華陰學霧全成市彭澤横琴豈要絃曉案秪因餐沆瀣夜灘誰見㺯潺湲須知吏隠金門客待乞刀圭作地仙公子夾道清樓拂彩霓月軒宫袖按前谿錦鱗河伯供烹鯉金距鄰翁逐鬬雞細雨墊巾過栁市輕風側帽上銅鞮珊瑚擊碎牛心熟香草蘭芳客自迷梨繁花如雪早傷春千樹封侯未是貧漢苑漫傳盧橘賦驪山誰識茘支塵九秋青女霜添味五夜方諸月溜津楚客狂醒愁己解水風猶自獵汀蘋次韻和盛博士寄贈虞部李郎中之什門牆日已峻徳望闇然章弟草西垣詔身為南省郎塤篪歡並奏龍虎儼成行宴客牛心炙朝天雞舌香曲池春漲水碧瓦曉飛霜此景知何事留賓汎羽觴次韻和守邦道人寄編修諸學士之什修書何幸佐鉛黄日接羣英道自光署近承明叨謁帝賦成平樂謬為郎孟堅己分酬賓戲嚴助還思佩郡章共憶東林社中客滿池蓮葉吐清香大名夜大安閣主道者上幸魏郡親至其寺面賜紫釋子修行與衆殊銅臺連接起精廬羣公共結一林社萬乘曾迴六尺輿衣惹天香親御座閣成雲構倚晴虚浮生自恨猶貪禄未得同翻貝葉書次韻和盛博士寄許州任從事之什射䇿曾攀郄桂枝從軍又賦仲宣詩陳琳草檄應非久貢禹彈冠素有期任與盛君有推挽之約梁苑勝遊思霰雪潯陽舊隠廢茅茨任寄居星灣多歴年所初筵樽斚不須戀正好公車自薦時題弟晦所居壁今名僓判宅何其巧連山復帶溪芳樽常有酒嘉樹自成蹊學舍祥鱣墮歌梁賀燕迷調琴明月榭繫馬緑楊堤好畤田園美南華物我齊終當解簪組同此味天倪留别桐城主簿早曾苑傳詞賦屈在桐鄉勾簿書薄宦交朋嗟絆驥清貧人吏説懸魚二年領郡睽離久一旦當樽鄙恡袪苦恨秋風動行色徘徊無計駐征車行次潁州值雨留住數日因貽郡守秘閣刁公夢想蒼龍闕盤桓潁水濱郡侯偏愛客秋雨更留人饌盛嘗鱸鱠樽空倒角巾羈愁不能遣惟恐二毛新旅中重陽有懷鄉國嘉節臨重九羇遊託異鄉茰房誰繫臂菊蕋懶浮觴野渡賓鴻急村田晚稻黄悲秋更懷土只恐鬢成霜重陽日憶逺逆旅重陽節窮愁萬里身金英浮酒盞珠淚濕衣巾為客飄蓬逺思家落葉頻只應蝴蝶夢夜夜得相親代答征車苦迢遞節物感愁辛巳入授衣月那經落帽辰金樽難獨酌寳瑟任生塵把菊流雙淚誰知憶逺人兩宋名賢小集巻四
