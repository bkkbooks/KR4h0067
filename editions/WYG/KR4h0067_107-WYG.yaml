body:
  text: 兩宋名賢小集巻一百七宋陳思編元陳世隆補十州閣小集王亘字伯通福州人淳熈間知南恩州蔣家園採蓮橋下路皂盖拂雲來塵壓隨軒雨風生避暑臺酒縁嘉客盡花為使君開共話西溪舊相忘此日杯西湖四明太守愛西湖想像桃源舊日圖不放塵埃生水面為傳風月到皇都花開别嶼千機錦稲熟鄰田萬斛珠聞説兒童騎竹馬至今昂首望通衢和劉郡守十洲詩太守劉户部乗水涸時濬治陻塞因其餘力補葺廢墜而湖上之景為之一新島嶼凡九作一成十隨景命名遂有十洲之詠花嶼傳聞春入水邊枝懊惱行人不暇持任是杜陵歸較晚也須排悶强裁詩芳草洲十步中間水四圍不容紅紫亂相依春風管取青青在莫問愁人歸未歸栁汀不似長安陌上梢只將離恨寄長條臨流繫得虹霓在留作憧憧兩岸橋竹嶼鳳集龍驤未是才獨驚髙節出雲來此君端的吾家舊爭得柴門相向開煙嶼離朱諦視也昏花一疋青縑盖白沙咫尺漁舟㸔不見凡夫何處覔仙槎芙蓉洲須信金行有智囊㑹將秋色賽春芳清宵見白休相拒多是潘郎鬢上霜菊花洲年年重九為人開不染春風一㸃埃湖上蕭騷如栗里虛樽還待白衣來月島夕陽盡處見滄洲一片清光水國秋應是玉真梳洗罷菱花臺上不曾收雪汀玉落風刀細細裁梁王宫裏舊池臺逍遥北地何人可除是氷膚駕鶴來松島誰陪老碧到秋霜賴有黄花隔水香土淺波深難獨立可能移植向公堂十洲閣山川如幻閣長秋一島飛來伴九洲不礙漁樵雙槳過何妨羅綺四時游雲疑泰華分張去水憶蓬瀛散漫浮禁苑未知湖海樂生綃冩取獻中州兩宋名賢小集巻一百七
