body:
  text: 兩宋名賢小集巻二百四十一宋陳思編元陳世隆補蘿軒外集楊備字修之建平人億之弟慶厯中為尚書虞部員外郎分司南京上輕車都尉有姑蘇百題金陵覽古詩烏鵲橋在長洲縣東以烏鵲館得名月滿星移水照天南飛烏鵲影翩翩雖然上屬牽牛分不為牽牛織女填雙蓮堂雙蓮倒影面波光翠蓋風搖紅粉香中有畫船鳴鼓吹瞥然驚起兩鴛鴦金陵覽古雜詠十首汝南灣汝南王昔過江東此地名將汝海同玉斚濯來人易醉有時人面照花紅濛汜池春條拂岸栁如金一鑑澄空照底深傍見龍舟赭袍影分明紅日在池心九日臺甲光如水㦸如霜御酒半浮菊半黄東日西風滿天仗簫韶一部奏清商桃葉渡桃葉桃根栁岸頭獻之才調頗風流相看不語横波急艇子翻成送莫愁幕府山六代繁華一瞬間平蕪逺樹不勝閒倚樓天暝雲如幕知是瑯琊幕府山横塘早潮纔遇晚潮來一一軒窗照水開鑑面無塵風不動分明倒影見樓臺白都山駕鶴驂鸞自古聞䇿名仙籍是真君天邉舊跡無尋處滿目青山空白雲春磵手拖葛屨坐藤牀竹樹蕭然一水旁枕上白雲船下月卜隣東磵勝東岡烏衣巷人物風流往事非空餘陋巷作烏衣舊時簾幙無由覔秪有年年新燕飛白鷺洲春信風生晚汎潮印沙羣鷺立還翹凭高一片迷人眼蘆葦叢邉雪未消陸機宅陸家兄弟頗能文入洛仍將筆硯焚舊宅荆榛狐兎窟機雲無復有昆雲天闕山牛頭天際碧凝嵐王導無稽亦妄談若指逺山為上闕長安應合指終南青溪姑曩不乗龍即跨魚岸旁人復乞靈無栁如睂黛花如面聞説清溪一小姑青溪柵傾城傾國兩妃嬪此地聞名不見人潜想舊時紅粉血落花風裏步香塵江令宅竹木池臺尚儼然歸時頭鬢雪霜寒青溪隠隠朱門處曽屬中書一品官兩宋名賢小集巻二百四十一
