body:
  text: 兩宋名賢小集巻三十七宋陳思編元陳世隆補竹友集題戴崧石鼎聯句圖衡山道士熊豹姿夜過劉生逢說詩止于座隅初莫識口不能言心自知坐中清逸校書郎新有詩聲誰過之豈知老子殊不淺可但逐鬼愁蛟螭須臾指鼎出佳句脫畧凡韻生新竒二生得句不敢吐鳴聲强作秋蟲悲􅌶如窘兔避鷹隼懍如敗將收旌旂借問䑛筆摹者誰定是盤礡真畫師退之斯文有妙處丹青冩盡初無遺彌明學道如不死應在衡山深處栖端能過我挑詩敵與君周旋我敢辭讀葛洪傳葛洪鍊丹砂却老得遐夀鶴髪安在哉巖穴遺井臼勞生亦何為荏苒度昏晝煌煌崑山芝未暇擷三秀寄謝浮丘翁何由挹其袖讀三都賦漢遭陽九運無復見中興不聞黄屋處郊野蔽旂旌三人己成虎况阻三國兵揚塵日月暗喋血郊原腥作都雖云美其如九鼎輕十年翰墨手模冩費丹青人與骨俱朽山川空炳靈吾懐鮑明逺寂寞賦蕪城田父招飲不赴萬錢供食如嚼蠟百壺載酒如飲水要知自古窮達人脫畧世味皆如此經旬不逢南鄰伴曲肱聊寄北忩底田父剥啄扣我門頗應昨夜燈花喜殷勤攬衣謝父老陶令愛酒今朝止伏雌可殺葵可羮他日薄飯招鄰里吾君恭儉似文帝勿為酒醪傷榖米喜雨是日聞改元涉冬無一雨元𡨕阻驕陽上田塵沙飛下田蒲稗荒鋤犁不入土龍具挂壁牆村居巷無井抱甕汲長江汲多恐流絶無以飲牛羊昨宵天意動浮雲霾月光灑然潤物功洗蘓及枯楊先帝劍弓冷小臣涕淚滂属聞建中號謳歌騰路傍雨從膏澤沛風與和氣翔山林獨何幸預喜霑稻粱尚能賦時雨激烈謌阜康余賦野香亭前木犀花二小詩盛稱此花之妙而江迪彛賦梅花詩以反之徃返唱和十數篇二花優劣未决故復長韻示之君不見杜陵布衾冷如鐵朝來米盡炊煙絶偶然乗興江上行無奈被花惱不徹城南陋巷在江涘讀書蒲團生蟣虱吟成少陵七字詩酷愛梅花似氷雪竹友道人端可嗤頷髭如棘手如龜從來口業洗未盡醉吐狂辭歌木犀賞花自是少年事出口未覺吾儕癡我今束縛喙三尺勿與世俗爭妍媸空花遍世不礙眼淡如雲水老禪師寄題王立之賦歸堂小官五斗米達官五鼎食均有懐禄心細大各封殖疾驅挽不還此輩車轂擊王侯生綺紈雅意在山澤頗賦歸去來作堂慰休息似聞一尊酒醉眼分青白何時上君堂酌酒話疇昔和君五字句想望柴桑陌亦愛軒漆園游濠梁得意儵魚樂淵明愛吾廬感彼衆鳥託兩賢俱達道妙處要商畧夫子誰與歸潛也如可作柴桑久無人兹道竟寥落頗能誦其詩尚友亦不惡世路多艱險君軒可槃礴但恐君出游蕭朱綬若若求定齋吾觀大梁城九衢塵暗天蠻觸日交爭䕫蚿互相憐此心如慈幡裊裊風中懸王子閉門卧守心長縛禪能定乃能應如鏡别醜妍吾豈匏𤓰哉孔子有至言君看日月行亦若磨蟻旋涪翁已發藥此句不用傳黄魯直為名此齋并道其名齋之意寄饒次守我初丱角時聞有饒進父次守舊字進父破衣下里舍應書不得舉要是磊落人白眼看法度吹笙彈箜篌餘事能律吕市人惡少年徃徃爭笑侮掉頭出里門徒步大梁去蒯緱謁王公敝貂走風雨十年不還鄉無人問死所客從北方來喜氣滿眉宇探懐出君詩字字粲璣珇筆蹤入顔揚句法窺李杜竒偉可畏人我輩誰比數借問從誰遊一一英俊侣我家阿夷兄詩有春草句說君不離口恨我識君暮帝城十二衢素衣染黄土食貧出無車覊旅亦良苦束書早歸來隻雞祭墳墓况聞霍將軍尚有陳氏母銅山鬱嵯峨其下原膴膴我思結茒舍帶經學農圃他日如買鄰定可連牆住頗聞君卜婚我亦未有婦要如子栁子各娶老農女東市買杯杓西市買筐筥南市買綆缶北市買甑釡生理能稍稍來徃辦雞黍兩家如有子男女互嫁娶從來不識面便作平生語但縁臭味同請君莫訝許讀潘邠老廬山紀行詩杜陵骨已朽潘子今似之欻觀廬山作乃類北征詩是家好男子札翰非凡兒阿耶有新句把筆如畫錐此詩落吾手三復喜可知有才如長卿武帝思同時不令歌天馬亦合賦靈芝何為鬢已凋但作愁苦辭錦囊勿妄發恐為俗子嗤汲古齋人言曲誤周郎顧豈謂周郎真好古長歌短調各風流說盡心招及眉語頗聞汲古用修綆乃知餘事工律吕君軀三尺胆如斗欲窺唐虞探鄒魯頃來長安濶畫眉時人半額相媚嫵天姿潔白惡丹鉛獨有溪頭浣紗語要知學者用心處不追時好乃如許君家有井千尺深容我時攀轆轤否寄李商老所思定何方𣺌然羌山麓别來經一年不寄書一幅憶在元真館與君同飲缸論文久未去夜雪打寒忩明朝欵君門箯輿踏殘雪尊前聴君談意氣排凜冽雪中兩相過把酒俱留連豈同剡溪去興盡囘酒船今年走東吳無復相邂逅遭回行路難歸已三月後逢君所知人頗嘗問君安猶聞卧苫塊毁棘今欒欒君家有嬌兒聞已去懐抱昔我嘗見之瑶環實娟好我歸卧衡門愁苦亦如君淋雨子桑病敝冠原憲貧此懐其誰語思君何能己寄聲勞苦君兼問兩季子移松二首古貎蒼髯十八公巍巍獨出衆材中朝來挽致茅堂下為我商量送好風河出崑崙派九州屹然砥柱立中流蒼松若比丘山重豈但囘頭費萬牛次韻吳民載告别覔酒二首君詩起予者百遍為君開世俗惟何甚予心不可諧獨思南去楚衆欲北之囘何處可休影期君歸去來齊下老從事相逢青眼開有朋方悃欵得汝更詼諧老興此非淺後車君與囘嘉蔬實空甒併遣木奴來偶書二首大儒讀書如播榖小儒據几如王孫道人竟日無一事卧看前江烟雨昏平生蹇吃不解語終日坐忩從客嘲他年若使登要路定被人譏無口匏題陳先生華山髙卧圖落葉開花秋復春睡中榮悴豈闗身那知五起雞三唱亦有寒忩不寐人和董彦光立春日二首梅蕋飛翻栁色新雪泥乾盡已成塵愁看節物獨驚眼醉吐詩詞君可人藜杖應門原憲病鸘裘貰酒茂陵貧朝來似有飛揚意可但無情草木春交情自昔白頭新富貴移人或望塵顧我喜求方外士得君端是眼中人謫仙詩富舊無敵東野囊空今不貧已遣摻撡縫古錦共搜佳句賞新春彦光示詩有釋氏之語復次韻歴眼浮榮逐日新誰知澄寂本非塵吾曹例作區中士此味全輸世外人空裏華生均是病衣中寳在却憂貧是間枯淡君姑置且辦芳樽醉早春何之忱用前韻示詩復次韻楊子牢愁更美新賈生悲鵩在承塵忘懐久已栽萱草行樂尤欣見玉人邂逅題詩聊可意平生嗜酒豈憂貧明年剰作顛茫計劇飲狂歌莫負春從陳妙音覔酒二首雪忩癡坐撥寒灰萬斛清愁掃不開排遣此懐將底物憑君催送麴生來長恐閨人抱頸羞何當更脫鷫鸘裘試煩郎子傾家釀不用平原老督郵次韻董彦孚獨卧逸堂之句遶舍檀欒五月凉嵗寒髙節亦難忘期君鴻鵠應髙舉顧我蚍蜉豈自量索價舊曾睎少室荷鋤猶可繼柴桑虚堂若許連牀卧待看風吹細細香送黄柑與彦孚二首殘臘才經一畨霜青青三寸作金黄故園兄弟懐思我特地分甘到草堂手折竒苞遺細君更思持送逸堂人甘寒定可錦繡口看吐新詩泣鬼神過金山下作揚子江中風浪生小舟如葉任欹傾槳搖齊指金山寺露暗初疑鐵甕城絶頂迥分雙塔秀層樓危立一僧清他年來訪結菴地吾與此江春水盟獨登有美堂龜趺雙跱日星懸讀罷憑闌心浩然繚繞峰巒浮野色參差樓閣起晴煙湖光淨照山間寺江浪遥連海外天安得翰林風月手一時摩寫入詩篇雨中漫成四首東風渾作勒花寒寂莫林塘不受看玉版鶴翎俱未識梨梢空有羽闌干向老逢春懶問花惡風吹雨故斜斜一城桃李應漂盡不到城南韋杜家一樹山礬宫様黄曉風㣲送雨中香鼻端空寂誰知許莫怪雄蜂取次狂纔見花飛掃不開只今青子落莓苔當時一笑氷霜面曾動揚州詩興來送王山人秋風蕭瑟賦歸歟此去懸知食有魚我亦羡君無奪糈長沙終負過秦書兩宋名賢小集巻三十七
