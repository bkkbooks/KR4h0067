body:
  text: 兩宋名賢小集巻一百四十六宋陳思編元陳世隆補于湖集巻下和沈敎授子夀賦雪三首北風吹來燕山雪十萬王師方浴鐵風纒熊虎靈旗靜凍合蛟龍寶刀折何人夜縛吳元濟我欲從之九原隔東南固是王氣勝西北那憂陣雲結豈無祖逖去誓江已有辛毗來仗節今年米貴更風雪破屋荒凉冷於鐵道人三日不出門卧聴攲簷竹枝折髙吟忽送三十韻覿面未覺千里隔此公也是可憐人家徒四壁衣鶉結君不見漢時蘇子卿窖中齧氊終持節天公作劇已三白刮面東風利如鐵只今斗米錢數百更説流民心欲折敵騎打圍涂塘北煙火穹廬一江隔陛下宵衣甚焦勞㣲臣私憂長鬰結爾曹忍凍不足説我輩何時立奇節留題彭澤故縣修真觀五月問修途今日一百里莫投彭澤縣愧此邑中士古觀官道傍借榻暫少憩較彼靖節翁衷情相謬戾不能早投簪一官苦匏繫見人屢折腰奔走徒自蹶聊為奴僕飯明日更蚤起速過栗里去毋遺髙士鄙呈樞密劉恭父鼎席方虚望已隆上㳺那得更煩公敢言兩鎮成交契自是孤根累化工舊弼新開元帥府閒官且領太平宫歸家凈洗如椽筆凖擬燕然勒駿功翁子功湯補之逺送海錯甚珍白彘烏羊未見曽青虵赤蟻當常珍忽驚海物來登座能致南烹有故人萬里漂流憐逐日百年麤糲愧嘗新新篘恰趁來時熟細酌梅花雪片春張仲欽朝陽亭亭在建康便合朝陽作鳯鳴江亭聊此駐修程南瞻御路臨雙闕東望仙家接五城日上白門兵氣靜春歸淮浦暗潮平遥憐幕府文書省時下滄浪自濯纓舟中五首扁舟東去幾時還身寄雲濤泱漭間一夜櫓聲鳴到曉覺來滿眼是他山山圍平逺水浮天目送歸鴻落照邊好趁新年釀雲液歸來猶及牡丹前亂山深崦小溪斜野水㣲茫浸斷霞一笛晚風生碧樹始知林裏有人家南來北去秪紛紛又過荆山一月春笑殺風前桃李樹飄蓬猶作未歸人泊船江口夜深深月傍篷窻照淺斟隔岸漁燈半明滅不眠空有故人心喜雨已晴復雨雨還晴慣閲人間夢不成小立闌干搔短鬢亂雲飛渡夕陽城湘中館雲去月在沙潦淨秋滿川北斗掛落木西風送歸船去年過湘中夜半投馬鞭篝燈洗塵土所見只屋椽雞鳴問前途殘夢兀擔肩那知闌干外有此山水姸㣲㣲清露漙稍稍明河偏孤光更自照靜極欣所便身世兩悠然吾其逐飛仙中隠吾家中隠君才比萬斛泉短小精悍姿一劒當雄邊去年栁州賊俯視衡嶽巔君從襄陽來孤忠作戈鋋談笑百雉安淨洗湖嶺煙謂當醻王勲金印如斗懸言歸遽如許此意誰為宣小隠即居山大隠即居㕓夫君處其中政爾當留連早晚有詔書喚君逺朝天欲為中隠遊更著三十年送張司戸還蜀似向川人有夙縁交游存沒最多賢今年初識張公子六月還尋上水船萬里親庭心已到一杯别酒意空傳西行賸有新詩句寄我應書十様牋廣右道中二首參天古木緑陰合峻極層巒瀑布長啼鳥一聲家萬里依然無語對斜陽觸鼻野花香泛泛勸歸啼鳥意諄諄嶺南三月巳煩暑猶向江頭細問津贈鹿苑信公詩禪二首詩巻隨身四十年忙時參得竹箄禪而今投老湘西寺卧看湘江水拍天句中有眼悟方知悟處還同病著錐一箇機關無兩用烏窠拈起布毛吹聞徳逺與曾裘甫黎師侯㑹飲范周士所三首海棠開後碧桃開寒食人家燕子來一病閉門三十日更無屐齒到蒼苔張飲名園樂有餘奉常何苦但齋居一杯我亦垂涎甚病起無聊只羡渠臞曽句法早知名新築詩壇五字城不要綈袍憐范叔應將石鼎調彌明萍鄉境上有驛傍有老杉餘百本余過而愛之驛無名余名之曰愛直而為之詩又以告邑大夫趙君公廪曰使繼自今為令者幸如君之賢也則此杉長存不然將斧斤斯民以自封植于杉何有此杉已百年林立官道側鬼神所訶䕶斧斤不敢迫愛此遺直姿凛凛有正色未云支大厦聊以䕃行客作詩調令尹為我驛壁刻但使杉長存懸知子清白遊千山觀朝遊七星巖莫上千山觀東西兩奇絶勢畧嶺海半長江寫縑素叠嶂俯杯按中有萬雉城鐵立不可玩伏龍起雲雨老樹舞影亂衝風挾驚電意恐崖谷斷路懸石磴滑衆客紛駭汗嵌空偶自托發若鳥集灌須臾便開霽杲日麗清漢却坐山巔亭容我烏幘岸長懷付樽酒别語不容判㑹須九垓外與子期汗漫麒麟硯滴分韻得文字素王西狩麟筆削昌斯文茂陵一角獸妙語聞終軍壯哉筆硯間英姿欲拏雲名參龜龍瑞威掃狐羣豈獨濡毫端政爾清妖氛㑹當獻君王玉殿春夜分輸寫胸中竒恩波被無垠幽興海涵太陰日西墜畫角一聲城欲閉柴門闗上濯足眠萬事不如髙枕睡睡鄉廣大我能容兀兀騰騰興莫窮推枕起聸河漢近月明庭竹響清風和仲彌性煙霏佳句兼簡二車二首收斂經綸寄一麾戲分風月與煙霏醉餘綵筆三千首老去蒼官四十圍露菊浦秋催落帽蠟花摧夜照更衣登臨縱好難留滯白髪雙親待汝歸引手星辰逼太㣲盪胸雲物散空霏莫山好處青成案秋月明時雪打圍竹洗佳人千㸃淚荷翻仙子六銖衣巖西定有漁翁宿障雨攔風不肯歸庾樓和林黄中韻九月扁舟下水風一尊佳處與君同眼髙四海氛塵外詩在千山紫翠中傾座只驚談麈白踏筵不怕舞衫紅樓頭今古無窮事醉倚胡牀月滿空水仙淨色只應撩處士國香今不落民家江城望斷春消息故遣詩人咏此花賦衡山張氏米帖人物千年海嶽翁筆精墨妙與天通傳聞有帖蔵張姓怪底湘江月貫虹欽夫折贈海桐賦詩定叟晦夫皆和某敬報況童童翠葢擁天香窮巷無人亦自芳能致詩豪四公子不敎辜負好風光勸農以湘波不動楚山碧花壓闌干春晝長為韻得干字積雨已連月長沙尚春寒今朝定何朝喚客來江干問訊湘西寺露重江漫漫聊須萬斛舟湍此千尺湍老松如相迎翠落頭上冠却望城中花寶髻垂珠鬘勸農有故事般樂非所安薄晚㑹春園老稚隨馬鞍彘肩侑尊酒呼喚來同盤從容及鄙事爾汝開心肝我是耕田夫偶然此為官飽不知稼穡愧汝催租瘢願言各努力長年好相看陳仲思以太夫人髙年奉祠便養卜居城東茅屋數間淡如也移花種竹山林丘壑之勝湘中所無食不足而樂有餘謂古之隠君子若仲思者非耶乾道戊子六月某同張欽夫過焉徘徊彌日既莫而忘去欽夫欲専壑買鄰卜居有詩某次韻平生交游中此士故耐久不折為米腰頗袖斵輪手卜居並東郭草草宫一畝日課種樹書箋題徧窻牖花草當妻妾松竹是朋友上堂娛老親家飯隨野韭客至即舉詩興來亦沽酒清溪遶屋角古木老未朽翻翻荷見背戢戢魚駢首幽觀天所蔵勝踐我獨後不因南軒君兹遊幾時有為君便賣鄰溪南好山阜我喜君亦狂呼兒挈尊卣一灑塵埃胸快若苗去莠晚凉佳月出人影散箕斗恨我當先歸君能小留否樞密端明先生寵分新茶將以麗句穆然清風久矣不作感嘆之餘輒敢屬和三首伐山萬鼓震春雷春向家山挽得回定是君王思苦口便同金鼎薦鹽梅先生筆勢挾春雷春色先從筆底回欲笑麤官成漫與望林止渴竟無梅茶為郵卒所竊但詩筒至耳詩腸隠隠轉飢雷一作殷雷一作驚雷春困無人與喚回强續新詩終不似空傳衣鉢向黄梅送慈曼如金山迎印老住大溈傳語金山山下龍乞將上水一帆風道人自有飛空錫只載中泠十丈洪小山書院萬里清江占一灣藂生桂樹㸃幽閒誰人得似劉郎子賦到淮南大小山送邵懷英分魯直詩韵人間風日不到處天上玉堂森寶書得書字將酒澆君車問君行何如初無十萬錢但有一束書往昔千官班渠曽綴簪裾日月九門隔江湖十年餘老榦久凌剥寒灰費吹嘘今者尺一追問津承明廬蓬萊道家山紫極帝所居功名儻來爾步武當徐徐遥岑出疎林淺水行遊魚臨分再三囑音信莫我疎送張定叟戊子嵗二月定叟如南山行李太匆草問君何當還敬展南陽阡永慕涕巳潸畢事却登覽紓子悲悴顔羣峰最髙處眼界窮塵寰紫葢款佛刹黄庭叩𤣥闗夜榻藉雲衲曉窻闖煙鬟野飯薦笋蕨幽尋剪榛菅酒賤可痛飲詩成要重刪勿作賈胡留閨人賦刀環歸時買竹䶉小破行囊慳讀書堂在烏江即唐張文昌讀書處自五代至宋皆世守之渡江後為史氏所有漫有五車書不讀豈似一編勤過目癡兒鬻肆蠧魚書巨富牙籖塵滿屋市南水竹一畝空平生腹笥史長公閉戸却掃得真樂㝠搜萬古窺鴻濛淹留嵗時亦何有䇿勛兹事要持久吾家文昌讀書處好在溪山落君手上方治定登文儒東觀石渠森寶書望公起直承明廬從來海内知名士須讀人間未讀書風雨石首呈同行寄荆州舊僚昨日離筵酒未醒今朝風雨暗江亭近人積水全成緑隔岸荒山夜却青野史衣冠行木偶客船燈火散疎星寛程且作三旬約要看廬山紫翠屏江行再用前韻澤畔行吟我獨醒歸程不計短長亭西風送浪頭頭白芳草隨人段段青昨夜疎蓬猶窘雨今朝嚴鼓欲侵星無人去喚華容宰畫我江行作小屏夜半走筆醻夀翁二首短篷掀舞不得寐忽枉新詩手自開主人留客不作意更送一江風雨來二年塵土堆中坐一到南樓眼暫開風靜江平留不得特教黄鵠送詩來琵琶亭二首江州司馬舊知音流落江湖感更深萬里故人明月夜琵琶不作亦沾襟潯陽江上琵琶月彭澤門前楊栁風兩賢底許不相似哀樂雖殊吾意同朱陵洞黒雲起我趾白雨過山脚却立朱陵洞一望紫虚閣神丹我已祕仙臂真可握試向靜處聴空濛有笙鶴一覽亭城中十萬戸亭脚五千丈小退鴈鶩行却立雲霄上主人心如此坐子鏡中像沙尾是我船煙波更空曠睡起睡起有佳聲蕭蕭竹間雨蒿廬淡無營一榻不受暑㣲颸入牖來喚起香中縷撫巻忽超然空梁走饑鼠去臨川書西津漁家作客臨川又一年却尋歸路淺灘船宦遊到處真聊爾别恨何須更黯然夾道長紅慚父老繞城濃碧記山川無端此地成留滯定自從渠有宿縁上元設醮畢作長句緑簡朱書自叩真馥爐香霧晚絪緼雪花便作茶花白春色還隨月色新江漲不憂堤萬丈年豐何啻粟千囷㣲生只擬休官去拜胙歸來吉夢頻過三塔寺二首湖光㶑灧接天浮風捲銀濤未肯休夜岸繫舟來古塔不妨蹤跡更滯留層巒叠嶂幾重重萬頃烟波浩𣺌中釣艇未歸饒夕照耳邊蘆葦戰寒風玉淵亭靈源直上與天通借路來從五老峯試向闌干敲柱杖為君喚起玉淵龍萬杉寺二首莊田總是昭陵賜更著官船載御書今日殘僧無飯吃却催積欠意何如老樹參天一萬株廬山佳處著浮圖只因買斷山中景破費神龍百斛珠三塔寺寒光亭見南畿梵刹志増亭依三塔占清幽松竹環除翠欲流曉色晴開千丈月波光冷浸一天秋瓊瑶影裏詩僧屋雲錦香中劒客舟風送不知何處笛雁聲驚起荻花洲咏梅次韻二首樓上簫聲欲斷魂仙官分與一枝春旋摧粧額添新樣細撚香鬚數玉塵月下精神宜淡貯雪邊肌體更清勻老來花事無消息只有君詩當寫真天與孤標不受塵生憎桃李鬬芳新詩成名下無虚士花在身邊當麗人只恐素英欺白髪試煩纎手挿烏巾風流今代神仙尉管得河陽縣裏春楞伽寺三絶硃砂峯下楞伽寺白髪僧生乙丑年乞我一杯清淨水為扶脚力上層巔天圍欲盡三千界地險真成百二闗不向中峯最髙處諸君原未識廬山山北山南刼火餘如何留得此僧居一作廬可憐鐘閣三枝竹無復山房萬巻書鸞溪蒼龍翔舞餘千仞瀑水奔流欲百盤定自山靈憐寂寞故敎臨鏡有窺鸞漪瀾堂水漫春洲到處通檣杆無數挿空濛主人只愛堂前木不放廬山入眼中子餘許修草堂遣句勸請蓮社髙人久寂寥草堂風物故蕭蕭追還舊觀須公等喚我它年寄一瓢有懷長沙知識呈欽夫兄弟二首春風花栁又芳姸更接髯郎水竹園小閣横橋俱勝絶只應欠我共開筵召公分陜是東鄰天逺堂中好主人更喜新來黄太史賸􅂸佳句了新春題塔子寺酴醿壓架玉交加深院無人有落花却憶江南田舍樂旋敲生火煑新茶題斷堤寺三首柔桑細麥綠油油雲水烘春爛不收馬上困來尋歇處斷堤寺裏半時留堤邊楊栁密蔵鵶堤上遊人兩髻丫可惜行春來較晚誰家留得碧桃花古寺留春最得多紫㣲花畔海棠窠無人嵗晚同幽獨古栢陰森著薜蘿山居松韻笙竽徑雲容水墨天人行秋色裏鶯語落花邊修竹三間屋清泉二頃田了無官府事鷄犬慕神仙四川總志御選兩宋名賢小集巻一百四十六
