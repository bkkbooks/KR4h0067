body:
  text: 兩宋名賢小集巻三百二十八宋陳思編元陳世隆補端隠吟藳林尚仁字潤叟福州長樂人家貧刻苦攻詩每有所作微不合意輒裂去卜居半邨半郭間手自種竹題曰竹所吟嘯其中自號端隠以示終于遯跡之意吟藳一巻淳祐辛亥陳必復為序稱其詩專以姚合賈島為法而精要深潤過之飲葯房陳户山居分韻得閤字常人厭寂寥隠士畏喧雜山居主人百好無終日哦詩閉書閤我本山中人心事亦頗合杖藜約客行幽深來扣吟扉坐陳榻不叙寒暄説晚唐滿座春風屢傾榼霜晴沙路軟如泥谷鳥相呼聲自答花時不飲空白頭世味由來如嚼蠟秪憐無夢化作蝴蝶飛遶盡百花深處日千匝暑夜松風生晚凉坐久市聲歇客去行獨吟踏石碎明月題蘆鄉思歸圖不畫梅花却畫蘆自言家在箇鄉居當時恨不曽添雁為帶平安一紙書九日登烏回寄鄭渭濵烏回山下寺閒抱一琴游客路黄花晚江城寒露秋持書誰送酒懐古獨凭樓想爾西風裏遶籬吟未休和陳葯房納凉貪凉分石坐野服岸巾紗竹暗鳴風葉溪暄聚水花深村人語靜髙樹鳥飛斜不飲論文酒敲棋煮夜茶贈歌者聲逐嬌雲學鳳鳴王孫幾醉拍欄聽春深莫唱闗情曲多少行人過柳亭新昌道中春紅落盡雨霏霏為怯輕寒尚夾衣村路每于泥處滑鄉音漸與市人非䕶蠶谿女條桑去抱布山翁換米歸世味徧嘗只如此幾畨清夢落漁磯寓華亭下砂鹽場地僻民居少官勤國課優逺程驅痩馬小港礙行舟晴日鹽花晚風潮海氣秋野人因買鶴半月此遲留秋日書懐十年客路歎飄蓬厯盡風霜鬢欲空睡少半疑茶作祟愁多全覺酒無功數蛬厭靜鳴秋雨一葉驚寒落晚風惆悵故園歸未得草荒籬下菊花藂適越留别江亭飲罷起離愁何事西風又越游潮信欲來人欲去夕陽紅蓼滿汀洲此山林僉葯房陳户偕張牧隠暮春晦日載酒相過席上以手揮素絃為韻得絃字春詩敲未穏一醉傍琴眠吟客相過日飛花欲盡天竹隂池水暗樹色島雲連幽鳥可人意數聲清似絃寒夜即事吟苦過于顛吟成亦自憐凍油燈影薄深屋語聲圓分月照歸客避寒移卧氊一冬少閒日不得到梅邊春日偶成未逢知已愧蹉跎又見春風長徑莎杜宇一聲詩思減楊花三月客愁多從人乞米貪如舊借吏鈔書字半譌懶記江湖十年事近來平地亦風波廢寺勅額雖存屋半傾爐香無主佛無靈豪家不管空門事日夜西風語塔鈴自賦學書學劍兩無成天乞梅邊隠姓名未必清閒非盛福縱教富貴亦虛榮百年有限春風老萬事無心夜月明何計莫餐烟火供潄流眠石過今生送林雲岫歸省西風吹客衣束擔出王畿千里莫嫌逺幾人猶未歸山空秋鶴痩天濶暮雲飛料得還家日將詩壽綵闈雨中和張西麓雨聲聽易厭况復事闗心終夜不成寐一春徒費吟委紅花命薄重碧酒杯深何日西湖上移船繫栁隂連雨留宿陳葯房吟所谿水分流急谿雲帶濕飛防飢童乞米畏冷客添衣雨院棊聲潤風窓燭影微終須待晴去踏月夜深歸偶題矮屋過如斗樣寛閨門渾不受春寒海棠睡去梨花痩次第東風到牡丹弔友人墓樹隂雲影暗空山銘石雖存不忍看燒罷紙錢灰未冷落花啼鴂雨聲寒游陽明洞天每箇虛亭坐片時旋尋古蹟上巖梯石含秋色苔痕老洞接雲天樹影低樵客出林驚虎嘯道人臨水聽猿啼吟邊欲記陽明事恐動山靈不敢題清真觀一宫占斷水中央痩竹添丁䕶短墻老鸛聲中松子落遊魚影裏藕花香雲房不雨琴常潤池閣無風榻自凉擬辦隠心終老此便須歸與鶴商量春晚春事又無幾隂晴苦不齊久貧交味薄多病語聲低落絮行風徑歸雲度晚谿故鄉二千里日夜子規啼贈褚雪巖多年林下隠猶帶舊儒酸自説因詩苦還如學易難曉窓花氣潤夜枕雨聲寒又欲名山去應尋勝跡看村居即事外事少曽聞深居似隠君谿明花照影風細水行文蠶室寒初閉蜂房早已分偶因尋藥去踏破一村雲寓舍留别撥盡寒灰雨夜深半窓燈影伴孤吟不眠只有琴知得明日陽闗何處心課伐木手揮樵斧氣如虹幾樹寒煙一餉空午夜無依烏鵲冷數聲應恨月明中懐潘寒巖别後空相憶無書直至今頻年千里客多事半生心卯酒欺人醉春詩帶病吟倚欄政無緒一鳥過花隂余種竹方成扁其室曰竹所友人以詩至用其韻屋老苔荒席久虚近分一榻與雲俱梅花未種招蜂怨竹所雖清欠鶴圖無事看山如對客有時隠几亦忘吾過門除却能吟者不是髙僧即老儒山居帝城花錦地讓與市人居萬事不到耳一貧惟著書掃牀留月宿種藥帶雲鋤未晚多先醉為官恐不如簡許有實閒磨霜刃破銀𤓰沈水香銷日影斜吟客不來情思懶晚風庭院落槐花陳葯房聞人禺谿黄平嶺春日相過分得琴字半生無厚業秪合住山林留客旋沽酒典衣因買琴晴窓行野馬髙樹語春禽彼此知心久相看意轉深過友人幽居門似野人家空園擬種𤓰有僧分石坐無酒問鄰賒獨鶴喜欲舞老梅寒自花此身歸未去猶愧暮林鴉旅懐欲暮西風引客愁十年如夢住他州故交零落誰知已往事淒凉歎白頭一紙音書燈下淚滿城砧杵月明秋早知世路風波險只在山中煮石休懐蒲一菴許紒嵒新營一榻養天和獨喜身閒鬢未皤藥性不諳縁病少花名慣識為吟多移書曬日防留蠧寫帖臨池擬換鵝不到玉峯今兩載故人情味近如何陳藥房舟中分得詩字移舟春岸曉小雨欲晴時煙樹望宜暗水程行較遲推篷山色近得句野鷗知來往無多路歸囊又一詩寄表兄鄭古潭江湖風浪惡飄泊此依依白髪親俱老深春人未歸雲留行李住風遣落花飛强飲桮中物芳心莫易違閒裏閒裏身心得自如春風茅屋燕同居松花滿地谿雲滑一榻晴窓卧看書寄西湖友人湖邊春更好别後費吟思載酒曽游處憶君同醉時面風花落易背日雪消遲早晚攜琴去山中與鶴期送友人别此心偶無事君復叙離情江國多寒色春風幾日程雪添行李重船逐浪花輕後夜應相憶空山月正明送楊巨川游邊此行不必話離愁且舉匏樽醉幾籌天下豈無山可買男兒當與國分憂劍辭星匣邊風凜船駕雲帆海月流莫道讀書無用處讀書方有用兵謀寄鄉友此身拘不得暮楚又朝吳故友幾人在三年一字無天風潮信急江月雁聲孤久不看明鏡年來有白鬚寄吳宗之在家猶苦熱客路足應疲書劍果何地江湖非舊時久晴苗欲雨多病藥如飴憶自分攜後知心更有誰雪中呈社友風雨瀟瀟攪雪飛一寒如此只貪詩酒瓢傾盡囊金少恐被梅花笑不知送陸月湖歸玉峯行李無多半是詩買船兼載鶴同歸思君晚泊吳江冷風捲蘆花幾雁飛喜友人為僧身披雲衲痩伶俜一刺新添得寺名餐供未便趺足坐誦經猶作讀書聲禪窓欲晚聞鍾掩吟履逢秋踏葉行應是千生修得到幾人頭白尚無成贈許紒嵒年齒未三十清名已照人才髙猶苦學俸薄不言貧留客醉終日愛花吟過春自憐閒未得滿眼撲京塵辛亥元日游聞人省菴園和陳葯房韻倚欄吟未穏把酒問溪山今日又添嵗一冬無此閒梅花依竹靜雪意避春慳次第燈期近重逢一解顔賀陳石泉宰華亭歸天下稱繁邑一亷如此希政成人惜去官滿鶴先歸家學傳金管春風入紫薇知音正當路健翼看髙飛夜坐焚香獨坐勘騷經庭樹無風葉不鳴靜入夜深聞鼓吹一池明月亂蛙聲梅雨繁聲不可聽㸃滴似秋霖谿長欲無岸窓低微復隂葛衣涼意重礎石潤痕深欲出愁泥濘依依獨客心訪隠者姓名多已在仙行見説曽傳辟榖方未必詔書徵便起可憐人世老猶忙浴蒲澗冷雲初濕種术山春土亦香何日此身分半隠歸須先製芰荷裳戲友人買侍兒歸幾扣吟窓多不遇識君雖久㑹君稀近聞行李擔書去添得明珠伴劍歸開甕酒香春繞屋倚欄人醉月侵衣野夫别有觀心法不在深山獨掩扉鶴楚楚異凡禽相看痩不禁飢尋芝术晚夢憶海山深華表千年事青天萬里心一聲唳清夜霜月滿疎林雨宋名賢小集巻三百二十八
