body:
  text: 兩宋名賢小集巻三百五十三宋陳思編元陳世隆補東齋吟藁陳峴字夀南温州平陽人淳熙十四年中博學宏詞科賜進士出身官中書舎人直學士院飲翁常之宅分韻得友字杖屨隨春風邂逅得良友行行西域道觸目盡花栁還步過茒茨交歡亦何有東隣頗好事邀我意良厚南窗竹風涼更命新醅酒一醉何足辭期此百年久宿董山寺送客聨鑣歸得得招提宿晚渡滄江口路入青山曲突兀忽在眼一洗奔馳俗然燈遽呼酒僧留供野蔌林髙上明月談聲響空谷坐久夜益深同來或鼾熟明朝返城郭此興真可録雨中偶成雨聲春不絶緑漲與池平久摘花猶好新鋤艸又生閉門惟我獨終日斷人行對酒還憂病裁詩强遣情舟次鄂州蜀江來滾滾楚望意悠悠浩氣髙情曉新寒帶晚秋闗山方北顧烟火又南樓蓬鬢天涯客蕭然一葉舟全州觀風樓江源發蠻荒來與湘灌遇交流趨城隅清映日東注羣山半楚越馳驟若競赴譙門百步南樓堞此雄踞觀風久標名棟宇初改故極目渺塞嶺蔚起矗雲霧千里聳翠碧衆水横練素古寺帶林薄漁艇依野渡村墟互隱見風烟自朝暮東西亘井絡碁分雜營戍偶值豐登年樂此保生聚秋風黄花天良集盛簪屨肴觴固匪䖍藉此山水具登臨方興深諸君幸少駐楚南偉觀樓平生足迹窮遐陬一麾更守湖湘州西接懸崕五溪曲南望渺極蒼梧愁天涯牢落孰慰意千嶂倒影三江流千里脈絡兹要㑹意趣端與江山投羣峰四遶立碧玉帶映林薄如雕鎪虯蟠虎驟互起伏天作地涌非凡儔郊村依約半洲渚逺明天際來歸舟湖南素號清絶地一旦呈露疑神謀作成英竒易舊觀俗化逺與鄒魯侔寄語後來無冺没共保佳致傳千秋郡圃依緑亭修林平沼久荒埃招領春風一笑回掃净莓苔分徑㟁剰添桃李結亭臺時因休吏文書了忽作閒人杖屨來待與邦人同醉樂一樽何惜少徘徊龍隱巖烟蘿深鎖非凡境泉石相逢似故人歸認落花猶恐誤天風為我隔囂塵全州礲巖泉流縈帶戛氷玉石壁深窈寒侵衣開鑿應勞造化力窟宅如待靈仙歸兩宋名賢小集巻三百五十三
