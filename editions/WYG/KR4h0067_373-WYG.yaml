body:
  text: 兩宋名賢小集巻三百七十三宋陳思編元陳世隆補怡雲軒詩集姚孝錫字仲純豐縣人政和四年登進士調代州兵曹元兵入鴈門州將議以城降官屬投死無所孝錫卧牀大鼾畧不為意旋以疾去官時年二十九家五臺善治生亭榭竹木奄有遊觀之勝賔客日盈其門州境歲饑出家所藏粟以賑貧乏鄉人徳之中年後以家事付諸子放情山水詩酒娛樂自號曰醉軒年八十三乃終閒居無客訪衰殘柴門盡日闗躭書真是癖惜酒近成慳苔徑行搜句茅檐卧看山却嫌明鏡裏偏照鬢毛斑次韻秋興老畏年光速愁添旅夢多西風著梧竹歸思入煙波夜永慿詩遣顔衰得酒和故溪千樹栁誰復曬魚蓑謁滕茂實祠本朝蘇鄭共揚䮽不意芝蘭失後凋遺老祗今猶涕淚後生無復識風標西陘雁度霜前塞滹水樵争日暮橋追想平生英偉魄凌雲一嘆豈能招次韻王無兢見寄客懐重寄仲宣樓白草黄雲塞上秋山色不隨塵世改水聲還抱故城流隙中畏境都堪玩鏡裏衰顔祗自羞多愧詩人苦相憶逺傳佳句弔清愁感白髪彈鋏慿誰聴客歌震雷那復化魚梭梳頭白雪驚新有障眼𤣥花比舊多鄉問阻兵猶隔絶羇懐慿酒暫消磨不須更問今朝客門外原無雀可羅溪橋早春輕黄未染栁梢勻連日溪風捲塞塵乍暖乍寒花信晚相呼相喚鳥聲頻少勤漫挾經綸策老懶空餘病患身追憶故園桃李樹年年紅紫為誰新登樓有懐老愧慿欄目力昬百年懐抱向誰論晴空雁起雲邊塞夕照人歸郭外村因憶昔逰驚迅晷暫將離恨付清樽誰人肯似邊居士逺駕朱輪過雀門歲晚懐舎弟少易成歡老易傷壯遊垂白未還鄉煙塵無復音書到魂夢猶疲道路長爆竹又驚新薦歲屠蘓空憶舊傳觴年年此日遥相憶鴻雁何時續斷腸題栁溪别墅雨霽風和不動塵栁邊擕酒賞晴春頻來溪鳥渾相識度水穿花不避人兩宋名賢小集巻三百七十三
