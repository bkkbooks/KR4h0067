body:
  text: 兩宋名賢小集巻二百八宋陳思編元陳世隆補黙堂集陳淵字知黙一字㡬叟南劍州沙縣人了翁瓘之猶子也兒時動止不凡瓘器之謂能任重致逺者後從龜山楊時傳二程之學紹興間以薦知樞密院編修官召對賜進士出身授監察御史歴官宗正少卿迕時宰罷去卒於家有黙堂集二十二巻門人沈度所編也延平江上呈呉國華先生青山如偉人可望不可致屹然瞰洪流龍翔并虎視春風何時來草木舞深翠禽鳥暖相依飛鳴真得意願言斬茒茨結室傍薈蔚且要觀此身功業亦細事次韻欲遊西湖阻雨去年賞西湖薄暑攀躋難同遊幸勝士酒沃衣巾斑今嵗來錢塘臘雨扁舟寒友朋適四集局蹙樊籠間此生分林泉造物猶余慳未為登岳禱且作訪戴還無私本天理敢怨隂雲頑向來旱蝗惡征賦亦未寛寧令風作雪要看麥堆山十五日過許夜雨暴作明日行四十里宿於潁橋又明日晴書狂風撼平野沙礫眯兩目笋輿我與君道逺疲徵逐驚雷一夜發暴雨溢川谷平明泥没趾寸步不容續我生賦窮蹙觸處背天福風雨豈不好行路非所欲中途聊息肩村驛便可宿我勞固其分端恐僵童僕燎爐然濕薪傍舍酒初熟安能浣愁腸但取充飢腹中宵耿不眠明月忽掛屋攬衣起視夜秣馬亦膏轂人情易喜愠天道有翻覆隂霽那可知去去無欲速寄内明月向人圓愛之不忍睡坐久風露寒忽忽心如醉念君一適我所遇無歡意况乃久别離相思到夢寐我生百不堪謬言屠龍技於今半世人升斗亦未遂願有室中友素懐隱居志肯與梁伯鸞扁舟共東逝小軒觀月呈興宗叔茒簷手可攀修竹出簷上寒蟬漏疎明碎影羅屏障情知月色好達覽在虛曠東家富池臺端坐不能訪山林足寓目細大初無相但思人心安景物自清暢霜風中夜作曲沼金翻浪禽鳥斷飛鳴杉松起酬唱燎爐宿殘火尚可温新釀數杯遣沈㝠萬慮一時放登召伯斗野亭落帆新城曲維舟古河右幽㝷得危亭星斗穿戸牖西風掃殘葉庭宇不待箒娟娟雲間月亦復照杯酒明朝又東南汙流映衰栁莫以此時心熾然分淨垢曉登嚴陵釣臺和安止所留詩溪山有底好適契貧士欲敢論生不侯但喜夢非僕千秋釣臺水不濯市朝足而我獨何人得寓塵埃目携笻縱朝步初日穿林麓西風扶兩腋一舉千里鵠越州道中雜咏浮雲作秋隂細雨如朝霧放形山水間意適無艱步忽遇古招提空翠森回互倚杖聽泉鳴悠然不能去宿仙霞聖仙寺呈伯思子靜風物吾鄉似山川地勢分稻畦翻碧浪麥壠布黄雲客舍常爭席山僧獨獻芹茒柴餘瀝在聊餉僕夫勤流長亭江折亂山圍西來素練飛嵐光環石窆潭影漾松扉欲靜風前樹難忘草上暉但期流澤逺長與水東歸自建寧泛江至石首江注天圍盡舟排浪陣輕岸容疎栁色秋氣斷鴻聲風日雖堪好雲煙易動情鱸魚知有興好在未知名季脩舍舟趨諸暨謁劉元成獨泛錢清江有懐其人人逺牛羊暮春深草樹滋野橋低映水浦㟁曲縈籬風雨江湖思乾坤杖屨疑論心竟誰是短棹欲何之和司錄行縣道中偶風雨有感之作吏隱深藏霧天遊更御風分携妨舉目轉盼忽堆紅北去豺狼盡春回雨露同向來相對飲應復念鄰翁蕭山覺苑寺雪後杜門雪融簷溜如秋霖古寺掩關無足音詩書廢放道眼淨鐘鼓杳隔禪房深老僧勸坐媒以火茶鼎靜聽蒼蠅吟胸中激梗造澄徹一念不作千憂沈浮生半日未易得邂逅勝境聊安心明日片帆落何處嵗晚濁醪共誰斟次韻鄧志宏送張思道福唐紛紛涴耳俱宜洗坐遣高人厭丘里迅流蚤自促行舟更有西風滿江葦當年筆陣掃千人今日流輩推能文英辭雄辯灑醉墨倐忽百變春空雲人間萬事秋毫細軒冕儻來誰著意身隨去棹落波間興逐㝠鴻𣺌天際三山便到蓬萊宫卸帆海嶼窺魚龍夜涼横笛弄明月萬頃瑠璃秋色中錢清過堰小風吹樹寒流止始覺西湖潮正起須臾倒巻縠紋來已没㟁痕猶未已江流自下河自高逆上更堪行罔水九牛回首竹索細十丈沙泥拒舟底汝州道中呈遵道青煙漠漠栁依依落日雲中㕍北飛咄咄書空誰獨坐遲遲行道子同歸桑隂蓋地牛羊臥麥秀漫山鳥雀肥向晚未知投宿處敗籬疎屋火煙微承遵道和又用前韻書懐端的荆州得所依羽翰終欲更南飛閩山萬里長牽夢蜀鳥千言只喚歸當日朋儕俱草澤而今兒女自輕肥白雲南望三年客長是尊前誦式微再和李伯紀舍人韻時來將相寧有種衛青故是民家奴懸鶉未用嘆嵗惡濶網近喜除官逋本無得喪任失馬但有言說皆陳蒭從君一飲百壺盡醉倒不知誰謂吾次韻子靜淵明束帶向督郵已覺歸思不可留紛紛朱墨何時休豈待置錐無一丘平生涉世如虛舟明月從人驚暗投胷次已無涇渭流不應罪我縁春秋次韻陸時可嵗暮感懐小橋横截一溪雲隔岸遥通避世人釣艇偶隨秋㕍泊吟窓今見臘梅新煙塵已覺千山靜雨露行看萬國春詩酒暮年生處樂一瓢歸去豈辭貧離紫溪驛小風吹面雨亷纎輕薄衣裳懶更添一線離情裁不絶暮雲將過粤山尖鉛山欲留無計去還悲漸逺閩山物象非家在天南今北首忍看歸鳥背人飛信州禪月院晚眺一覺華胥日又曛晚來愁緒亂紛紛角聲對起重樓近吹動靈山萬叠雲登睦州環峯亭月照空山杜宇啼喚歸漁艇夜天低那堪又是雙溪水獨上危樓十二梯病減枕上二首堦草無期日自生獨餘貧病破元正春風一種含生意誰道年來也世情塵埃子石䝉蛛網殘落霜毫暗蘚紋未把語言為戲劇新年不作送窮文七夕天上銀蟾曲似鈎人間簫鼔萬家浮從來世事俱兒戲不獨秦娥乞巧樓信馬隨車力不勝聊將觴豆樂交朋青樓乞巧憐兒女我亦如今拙未能同魏季修雪中閒步纎纎月色淡黄昏城郭千家雪照人携手望春同茗飲小坊燈火自相親思安常兄凌虚閣下煙波濶升俊坊前草木蒼歸去溪南春正好不應蕭索對松篁月夜江行吏隱飄然在一涯更堪行役送年華多情却有空江月長伴離人夢到家約令德郊行簷竹揺風拂面低麥芽穿雪綠齊齊憑君便作遊春計莫待花繁去路迷通州夏雨長風巻地驅炎暑暴雨翻空送晚涼只此蚊蠅俱掃跡不須迢遞待秋霜延平林力道閣上觀水要看春水拍天流更為溪山一日留誰遣白雲迷眼界坐令歸思入扁舟泊州延平星河不動水東流夜影揺空逼釣舟夢破滄浪歌在耳欲尋溪友向煙洲自浦城放船下建安寄龎㡬先茒柴也解發清狂仰看雲天盡十觴白首嵗寒猶道路自憐無意避風霜寄養䝉兼呈景駿粥魚齋鼓網蛛窠古寺長廊客少過惟有一溪明月在夜寒偏向斷垣多太史溪頭十里間朝陽峯下水涵天青鞋不踏紅塵陌夢斷僧窓又一年自梅花村回道中書壁刺水秧針出已齊雨餘膏澤未全犂道旁牛喘無情問慚愧林間布榖啼邑中諸公見和再用前看盡愁人萬㸃紅曉來雙鬢白於茸他時倘記江南夢畫我黄梅細雨中山寺早梅雲間初日慘無光天外歸鴻豈戀行短景去人如掣電不應留滯野梅花雲母燒香不見烟夜深齋閣閉龍涎此生暇日真難得蕭寺重來已四年次韻李光祖南山偈窓前松竹翠連山窓下弦歌晝掩關雪裏忍看梅欲吐煙中遥認鳥知還錢塘江潮頭駕月衝殘夢水色浮空送峭寒十幅輕蒲連夜發不知身到海門山過錢清江潮來去自有期扁舟閣淺心如飛岸容霜竹青照眼春信梅花香撲衣天寒鄞江道路阻嵗晚錢清風俗非故園回首二千里落日看盡行人歸兩宋名賢小集巻二百八
