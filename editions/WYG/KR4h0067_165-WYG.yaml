body:
  text: 兩宋名賢小集巻一百六十五宋陳思編元陳世隆補梅谿詩集五寳印叔得小假山以長篇模寫進士欽逢辰和之某次韻并簡欽越絶天台温鴈蕩萬壑千巖各形狀錢塘風物更奇絶杕屨年時記曽訪歸來戲闢小園林十里西湖藏甕盎予嘗以甕植蓮有詞云一盤池地十里西湖是悠然入眼皆吾山羅列軒窗一何壯止菴道人真有道種竹蒔花近丘壙何人好事贈假山潛澗新添小屏嶂却疑遷徙從平泉更恐飛來自秦望秦望有飛來山飛來石世間贗物何止此沙佛儒衣龍亦象道人於物意豈留異日從教散天壤花木篇章兩游戲林下高風真可尚來游蓮社有詩人句比昌黎更豪放我休説假復論真真假通同歸一相次韻昌齡西園十首黄楊予歸自武林黄楊稍枯命工去藤蔓苔蘚復有生意黄楊庚甲與吾同樹已蕭疎我亦翁藤蔓稍除苔蘚去嵗寒猶解傲霜風葡萄滿架龍鬚巻復伸堆盤馬乳釀青春潑醅一斗宜延客莫博涼州學漢人修竹至樂齋西碧玉竿清陰時過酒杯寒明年看長纎纎筍解籜當為漢帝冠梅拂雲修竹遶吾家竹裏仍栽第一花好句更同林處士月黄昏後影横斜桃欲留王母盤中核兼採秦人洞裏薪此事渺茫花笑我不如聊賞故園春李長念詩人詠子嗟團欒繞樹日敧斜冰盤行薦炎天實不用東門學種𤓰杉記得先人手自栽森然千尺盡成材翠絲結作思人樹他日兒孫豈忍摧桂丹霄休歎路難通學取燕山種桂叢異日天香滿亭院吾廬當似廣寒宫栁何幸先人有敝廬不妨同種栁千株垂陰覆地寧無日作雪漫天肯似榆菊百花春放菊秋榮霜裏鮮鮮照眼明嵗晚不妨開自笑何須三嗅泣繁英二月二日焚黄天色開霽賔游並集存沒有光悲痛之餘因成鄙語三釡深悲不逮親九天命下賁雙墳痛將淚雜香醪奠忍見衣隨告墨焚漠漠濃隂初閣雨暉暉煖日旋披雲餘生難報劬勞徳猶有孤忠可報君小卜園納涼屏迹丘園世事輕澹然滋味似孤僧平生願學昌黎伯宰相三書獨不能館中三月晦日聞鶯胡邦衡有詩用東坡酴醿韻有君側無讒人發口不須婉句某次韻久傷伐木廢每歎吾生晚黄鳥從何來喬林緑垂幰忽作相呼聲朋來無近逺高翥凌雲煙斜飛集池苑中有幽谷吹遲遲下遙巘羣音巧相和出語獨不婉啞啞如老烏聞者弓欲挽知心有杜鵑勸爾故園返過婺州同年王節推夷仲黄教授萬頃鄉人華主簿子周㑹飲雙溪樓年時嘗泛婺溪舟未上清風八詠樓天為故人償夙願辛巳五月至婺溪夷仲諸同年有登樓之約忽聞欽宗諱遂止水知吾輩喜清流沈郎不為吟詩瘦王粲長懐去國憂明日山川共人逺鄉情年契兩悠悠種蔬歸來日彈鋏食無肉與魚却將種花地町畦毓嘉蔬驕陽每抱甕時雨親荷鋤青青有生意令我顔色舒寧憂饉與饑亦有瓶中儲前身老闍黎或云予前身嚴闍黎也因以戲云蔬氣端未除文字亦宿業復坐魚蠧書蠧書仍食蔬苦澹味有餘況兹清淨根分來自僧居端能納須彌聊爾秀郊墟洗我腥羶腸退之詩云聲名暫羶薌非止為魚肉也襟宇生清虛豈惟陶淵明吾亦愛吾廬荒園涉成趣枯藤當安輿困耽案頭巻饑箸盤中菹孔門陳蔡色借問何如予次韻題寳印叔蘭若堂何處名蘭若依山結草堂花枝法雨潤心地佛燈光浮世囂塵隔空門嵗月長林間有啼鳥聴法亦來翔掃室灑掃學者事陳蕃何不然要令天下淨端自室中先讀書入政慚無學還家更讀書翻同小兒輩相共惜居諸奕碁光景老尤惜忍銷枰奕間娯賔欠絲竹一局戰清閒昌齡欲游白石興盡而止予亦思前年之游遂次其韻前年蠟屐逺尋幽洞府曽經一宿留詩句親題碧雲裏夢魂時到白巖頭風生見説欲飛去興盡何如且罷休他日相呼老兄弟飄然杖屐共翺游張器先和詩復用前韻心欲齊賢媿未齊逺蒙佳句警昏迷音如鼓瑟鏗清廟味似煎茶鬬建溪憂國非同長卿病感時端類少陵題二松豈是淹賢地鳬鶩文書漫抱攜題雙瀑女媧石爛㡬經修天漏猶餘兩派流離合無心元不競朝宗得路却相投干雲寳劔真同氣出蕩神龍不異湫鴈蕩有大小二龍湫何用築門防俗駕林泉自是少人游雙瀑亭壊久矣洪丞命工起廢氣象一新且欲築門以防俗駕故及之家食遇歉有飯不足之憂妻孥相勉以固窮因録其語淵明事高尚瓶中缺儲粟魯公凜名節乞米給饘粥廣文富才名官冷飯不足少陵老風騷橡栗拾山谷嗟予何為者處世真碌碌謀生一何拙甔石無儲蓄三年兩去國囊槖罄水陸還家索租苗不了臘與伏前秋遭􅄓風摧折數間屋今年丁大祲破甑塵可掬絶糧瘦百指告糴走羣僕鄉鄰苟不救定恐填溝瀆家藏千巻書父子忍饑讀一字不堪煮何以充我腹細君笑謂我子命難食肉去嵗官臺省僥倖食君禄有口不三緘月奏知㡬牘聖明儻不容寧免逺竄逐歸來固已幸富貴非爾福東臯二頃田得雨尚可穀子耕我當耘固窮待秋熟郡齋即事追和范文正公韻理郡端如理亂絲范公往矣欲誰師典型猶有堂中像光豔長存壁上詩未報國恩嗟老去不逢人傑恨生遲一尊坐對鄱江月耿耿忠懐祗自知郡齋對雪平生為雪牽詩興今日無詩奈雪何淨几翻書擁爐讀冷齋呵硯帶冰磨寒江獨釣句思栁銀海光搖人憶坡欲兩三杯賀豐嵗却憂疆埸正干戈子應和詩再用前韻江東臘雪為誰多清逼官梅興動何堂坐玉芝勞想像州宅有玉芝堂句工冰柘老研磨賡酬往事思蓬島辛巳春館中唱和最盛災異狂言忤諫坡是嵗上元雷雪併作某嘗論災異諫坡不悦聴取金華新號令要須白戰不持戈閏月三白二首閏月生明後初四日雪作江天未臘時風翻禹門浪花糝月宫枝桂花一秋三放照夜皎珠樹秀庭祥玉芝定知年大有何止麥相宜迎臘雪三白未春花萬株神仙森玉府天象粲台符詞吐水流峽鼎成風擊湖鬢邊絲可織四皓盍添吾和洪景盧用三白韻作四白詩大似佛世界端如玉燭時穆家兄弟味楊氏子孫枝楊震四世為公以清白名家鄞海明瑤柱四明出光瑤柱鄱亭望秀芝鄱江有四望亭北望芝山州宅冇芝秀閣祁寒繇政拙去倍二誠宜楚士照千乘韓梨夸數株舜門紛執玉堯岳衒分符寳結文房友鑑明狂客湖郊圻正多壘兵㑹憶夷吾兵車之㑹四臘盡日又雪洪復作五白詩再和天地俱同數嘉平欲盡時栁飄彭澤絮松壓大夫枝越絶山飛洩越有瀑布名五洩文登石産芝登州海上五島皆生石芝濫騎為郡馬深願穀相宜日掩雲間色李嶠詩雲間五色滿榆栽天上株芳聨仙桂籍窮送舊桃符逺岫明廬阜澄江接帶湖宣麻開晉國入蔡憶金吾裴晉公五拜相金吾謂李祐也不欺室三字㕘政張公書也筆力勁健如端人正士儼然人望而敬之因成古詩八韻雲山老人國大老歴代遺編飫探討餘事游神翰墨問乘興濡毫快揮掃嚴霜烈日如魯公抉石奔泉陋徐浩國朝君謨書第一大字劣於行與草雲山心畫無不長筆力縱時書更好我來求字葢求人不為有官縁有道紫岩之銘雲山筆不欺室中雙至寳玉簫峯下梅花溪願學雲山歸去早送翁東叟教授三十年間舊友生眼青頭白見交情官於湖北況尤冷詩不江西語自清行李少留呉芮國夢魂先到謝公城扁舟便合相隨去薄有田園正可耕送蔡倅白首論文得蔡侯江東尊酒半年游龍頭家世高千佛驥足聲名重一州方喜同僚呉芮國不堪回首仲宣樓送君撩我思鄉意薄有田園歸去休李懐安擁麾入蜀道出鄱江見贈二詩依韻奉酬不肯隨羣慕鶴軒慨然丹陛吐危言坐看蜀道平如地可見忠臣勇似尊駟馬橋邊驅弩矢杜鵑聲裏擁旂旛要須入境詢風俗首訪嚴遵李仲元一麾出守楚東城邂逅論交媿孔程元禮仙舟行色好子猷雪棹去心輕虎符稔服君家世鴈蕩行逃我姓名酒盞詩篇話時事江湖何日更尋盟子應贈蜀中石刻十巻詩以謝之金華石刻滿西州不惜明珠輒暗投詩泣鬼神追雅頌義深君父妙春秋公有答春秋書深取左氏義深君父隨身連軫崔評事插架懸籖李鄴侯掃室焚香讀終巻光芒萬丈照螺洲次韻嘉叟讀和韓詩孔孟乆不作況雄莫能和韓公生有唐力欲拯頹挫文興八代衰學救諸子過佛老蔓中華微公衽其左餘事以詩鳴語險鬼膽破汗瀾高駕天捷敏劇飛笴騎龍歸帝旁玉日人間墮汗流籍湜輩圭璧分半箇栁和辭擬騷郊聨語成些咸知泰山仰誰繼北窗卧我本􅐽鹽生久供筆硯課幽香摘天葩光豔拾珠唾後公三百年杖屨無從荷世無六一翁孰知珍古貨巴詞擬陽春僭竊罪宜坐神交有吾宗涉世同坎軻學繼青箱王詩高碧紗播勉令添和篇才薄知何柰謬同赤效白深媿愈知賀世事置勿論蚊睫蟲容麽元夕次何憲韻火樹銀花遍九衢天移星斗下空虛心憂機婦寒窗士詩句分明似諫書鄱陽燈火類殘星風雨那堪更滿城為郡何如在家好長檠不似短檠明喻叔奇采坡詩一聨云今誰主文字公合把旌旄為韻作十詩見寄某懼不敢和酬以四十韻斯文韓歐蘇天下三大老蘇門六君子如籍湜郊島大匠具明眼一一經選攷豈曰文乎哉葢深於斯道諸公既九原氣象日衰槁山不見泰華水但識行潦詞人巧騈麗義理失探討書生蔽時文習義未易討著述豈無人紛紛漫華藻有如分裂時僭為各城堡同年廣文君所作非小好高吟薄風雅古學窮渾灝讀史正豕亥觀詩辨形夭千篇冰玉清萬字波瀾浩心慕大手筆所恨生不早鄉令門及韓不類端可保賞識遇歐坡當為篋中寳聲名終不掩光豔姑自葆嗟我最不才兀兀首空皓半生槐踏黄晚景葢張皁出守屢及𤓰還家僅嘗稻去六月還家九月赴泉山田園荒淵明江海客張鎬塵埃未能脱憂患苦相惱愁攅卧蠶眉相者謂予眉如卧蠶主多愁苦痛徹伏犀腦近苦頭疼何當歸故山已書下下考鍾筆況久閣盧經徒獨抱古文如金城偏師詎容擣小詩時自遣句法未知造廣文賢關舊聲氣同濕燥食共朝􅐽辛案對夜螢薧䇿杖游西湖尋梅插晴昊鄱留九十日呼酒羅脯棗潯陽三年别心若風中纛書來問寒温仍效世俗禱手寫十新詩價重百磲碯情意何勤勤許與太草草那能把旌旄但可供灑掃何為以西子國色沈嫫媪前言葢戲耳細讀笑絶倒却將寄來詩録附雅戲藳叔奇嘗作雅戲集兩宋名賢小集巻一百六十五
