body:
  text: 兩宋名賢小集巻三百七十二宋陳思編元陳世隆補月洞吟王鎡字介翁括蒼人曽為縣尉元兵陷臨安棄印綬歸隱湖山與尹緑坡虞君集葉招山諸人結社賦詩題所居曰月洞孤迥絶塵有桃源栗里之致焉遺詩一卷曰月洞吟别虞君集瓦甁擔酒去送客石橋東潮過汀沙上船迴島嶼中桃花三月雨楊栁五更風明日思君處渡頭煙水空送黙然上人歸天台孤雲不定心持鉢度寒林野飯青蒲潔客程黄葉深海風潮水發山雨燒烟沈歸到石橋日應㸔瀑布吟錢塘江凉踈萬栁條秋滿石欄橋吳越興亡事晨昏來去潮雲開天日近水接海山遥望到西陵渡風帆穏自飄塞上曲黄雲連白艸萬里有無間霜冷髑髏哭天寒甲胄閒馬嘶經戰地鵰認打圍山移戍腰金印將軍度玉闗買舟赤欄橋上路幾度卜歸期流水無迴日行人有老時潮來江勢逆月出海門遲風順輕舟駛蒲帆盡夜吹早行客程因太早却費一更眠落月已歸海殘星猶在天櫓聲荷葉浦螢火荳花田隔岸誰家起青燈逺樹邊别黄吟隱飲乾分别酒話久未移舟潮水催行客海山生逺愁蟬聲秋浦樹鴈影夕陽樓今夜相思夢蘆花第幾洲秋深風露損衣裙秋深懐故廬僕方談夜夢客至得家書子黒石蓮老柿紅霜葉踈今年籬下菊遥憶少人鋤訪翟梅山諸老彫零盡江湖今有誰半生行客慣多難識君遲花屋春風酒梅山雪夜詩莫為名釣出世事正如棋晚春即事雲氣不分明天隂忽又晴喜凉溪鵲浴知雨樹鳩鳴仙藥黄精飯齋蔬白椹羮惜春吟未就閒踏落花行山中榮枯皆定數枉作送窮吟有色非真畫無絃是古琴青松秦世事黄菊晉人心塵外烟蘿客相尋入逺林避亂柯巖緑坡諸公以詩見寄柯栝地西東音書久不通山河隔今古天地老英雄局敗棋難著愁多酒易中花前多少恨無語寄春風感秋寄白雲趙寺丞囊裏不藏金相隨只破琴毎因㸔月夜長動故人心敗艸闗河路秋風楚越砧愁來不成寐壊壁更蛩吟谿村水路隨山轉谿晴踏軟沙斜陽曬魚網疎竹露人家行蟹上枯岸饑禽銜落花老翁分石坐閒話到桑麻寄友髪影明寒鏡蕭蕭亦自憐故人難㑹面行客又經年晴雪添崖瀑春雲雜燒烟相思有書札冩盡夜燈前寄杜北山倦客蕭蕭兩鬢秋栁絲無力絆歸舟曉風落葉辭髙樹夜月行人在别州千里闗河鄉國夢一江煙浪古今愁鴈聲過盡青天濶却憶同登望海樓暮春寄僊洲舎弟去年妍菊醉重陽今日誰知各異鄉落葉石欄霜信早敗荷池館雨聲凉人情好惡花甘苦世事榮枯艸短長别有駿鵰雙翮健剛風摩透入蒼茫宿香嚴院地爐煨火柏枝香借宿寒寮到上方山近白雲歸古殿風髙黄葉響空廊敲門僧踏梅花月入夜猿啼楓樹霜夢醒不知窗日上時聞清磬出松堂古杭感事國事凋零王氣衰東南豪傑竟何之雲寒廢殿排班石艸卧前朝記事碑沙漲浙江龍去逺天寛北闕鳯歸遲可憐不老吳山月曽照官家寵幸時山居屋頭蘚樹蛻鳴蛩池上溝泉鑿石通香老蒲花春洞影凉生槲葉午窗風泥瓶開酒留樵客篛笠穿雲訪藥翁雖是一貧清似水定無徭役到山中金陵感秋魚書難寄水空流兩袖西風破黒裘客夢蘆花晉城月歸心楓葉浙山秋世情老去諳方熟愁事來時醉便休滿目闗河懐古恨如今何處問孫劉湖山即景次尹緑坡湖山掩映鴈潭秋今古詩人説勝遊緑栁影分騎馬路丹楓葉落釣魚舟前坡風送歸樵笛别墅雲藏賣酒樓長記尋梅氷雪裏氊靴駝帽鷫鸘裘尹緑坡山間吟所苔痕分路見人家犬䕶籬根卧落花一片林塘詩境界四時花菓隱生涯鋤山揀日春栽藥汲水和雲夜煮茶耕録有文須㸃看旋揺松露入硃砂寓龍虎山中示張鍊師蓮盂送别萬峯雲龍虎山前過小春艸屨慣穿枯嶺葉布衣猶帶舊京塵氊寒不見遊仙夢路逺誰憐倦客貧東望海門歸未得北風吹雪滿唐巾春酌酒䦨歌罷翠簾遮月栁驚啼子夜鴉多少斷雲心上事結成香夢是梨花西湖南北髙峰叫杜鵑斜陽浮翠斷橋邊畫船歸盡江湖夢一半樓臺楊栁煙怯暖怯暖新裁白苧衣棋聲深院客來稀春風無力晴絲軟絆住楊花不肯飛秦望山祖龍癡欲望長年却遣君房渡海船枉去蓬山覔丹藥桃源亦自有神仙深春二首夾泥花上燕巢邊翠箔桑空蠶又眠天氣乍晴風候别坐㸔盆藕出雙錢燕子來時春又休暖風吹緑上枝頭繡簾不隔荼蘼月香影無人自入樓采蓮曲羅裠濺濕鬢雲偏揺落香風滿畫船忽憶年來顦顇夢鴛鴦正在藕花邊春閨辭桃吹紅雪上簾鈎楊栁風絲拂畫樓日透欄干人病酒賣花聲過懶梳頭芳庭植上人苔侵坐處石頭青滿屋春雲不用扃入定醒來香印冷一簾花雨濕殘經喜凉吹笛何人在小樓夜深不下玉簾鈎凉風敲落梧桐葉片片飛來盡是秋宿西上竺閒收石上著殘棋山月無聲鶴睡時落葉打窗霜滿屋有僧吟得夜寒詩水居飛鷗貼水水連天一半青山半是烟日暮潮迴漁父醉不知船閣淺沙邊斷橋春望拾翠車閒輦路塵山南山北杜鵑春誰家庭院東風裏吹出桃花不見人湖上晚望酒醒湖光生嫩凉卧船吹笛藕花香遊人盡逐鶯花去一片閒情在夕陽漁父吟竹絲籃裏白魚肥日落江頭換酒歸只恐明朝風雪凍老妻連夜補蓑衣壽光宫井氣蒸雲濕石欄虬鬚道士自燒丹開門風帶琴聲出一陣松花滿醮壇裁衣曲燒罷心香午夜䦨玉纎輕捻剪刀寒衣成恐不如郎意獨試燈前照影㸔花下作字付葉柘山使者花蘚層層潤石牀緑隂多處自生凉閒將筆染荼䕷露冩得春辭滿紙香燈花喜信今宵報與誰玉人曽剪畫雙眉等閒開落銀釭見只閉春風不得知月洞書屋自冩自詩粘壁上何須古畫與名碑隔牆風落閒花片日日飛來入硯池病中鏡裏初疑㸔不真衰顔只恐是他人醫言斷酒方除病母戒觀書亦損神卧久不知黄葉落起來添出白髭新自梳頭髪斜陽下手脱隨風半委塵兩宋名賢小集巻三百七十二
