body:
  text: 兩宋名賢小集巻一百四十二宋陳思編元陳世隆補琴溪詩集李宏字彦恢宣州人博學工文詞建炎中吕好問知宣州得士四人詹友端周紫芝王相如與宏也毎宴集必與俱惜其詩多不傳宏宣和初以左承值郎署涇縣事紹興初李光為守時復檄署縣凡四載後遷轉運使遊金泉觀昔時謝女昇天處此日遺蹤尚宛然蟬蛻舊衣留石室龍飛勝地湧金泉碑書故事封蒼蘚殿冩真容鏁翠烟薄暮松巔聴鶴唳凌空髣髴是神仙鳬山廟并序顯道廟葢晉之隱者不顯其名後世無考時竇子明罷令煉丹陵陽峯與之邂逅遂相與友徃来麻川之望仙絃歌徽水之棲真髙嶺皆有蹟焉廟存古碑具載其事雖刓裂尚可讀政和間賜額鄉人因大其祠以歆朝寵答神貺今碑已徙置樓基下里有裘氏者年八十餘尚能言之乃悉如前所説予懼後人無所考徴輒成長句以記其實庶幾傳信焉詩曰鳬山髙與蒼旻齊根盤八里雄坤維一作輿油然出雲為風雨澤周一境無凶飢重樓複殿據山腹蜿蜒攫䕶神缺威靈如在駭聞聴至今父老能言之斷碑刓缺尚可讀湮埋嵗久人無知髙髙一峯獨秀出上有蟬蜕真仙居似聞嘗任石埭尹化流徳洽真民師持竿戲投白龍餌隱霧深韜𤣥豹姿手披蘂笈校丹篆足躡飛昇一作舄騰紫㣲相逢邂逅一笑粲真將莫逆論心期從兹來徃因無間遺踪所至猶可推絃歌標鄉里猶在望仙紀地名獨垂棲真寄偉曽税駕絶頂尚留丹竈基近鄰眢井數盈九石甃堅深端可窺神既廟食還舊隱仙亦偶坐應禱祈合堂薦享異肴䔩乞靈修敬傾里閭政和天子謹祠祭郡縣有請咸勿違一朝飛章達旈扆往往一夜曽躬披俞音載錫降芝簡寵賁徽名昭典彞神兮仙兮服君賜福庇斯民無已時仙將出遊神速往霓旌絳節相追隨神既來歸仙至止衮衣羽帔瞻光儀繄予頂謁亦云屢淋漓醉墨聊一揮詞雖蕪纇事摭實庶㡬傳信祛羣疑兩宋名賢小集巻一百四十二
