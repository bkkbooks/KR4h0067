body:
  text: 兩宋名賢小集巻一百九宋陳思編元陳世隆補據梧小集蔡肇字天啟丹陽人能文尤長于詩歌初事王安石見器重又從蘇軾遊聲譽益顯第進士元祐中為太學正通判常州召為衛尉寺丞提舉永興路常平徽宗初入為户部貟外郎兼編修國史提舉兩浙刑獄張商英引為禮部貟外進起居郎拜中書舎人未幾罷為顯謨閣待制知明州俄奪職提舉洞霄宫㑹赦復知睦州卒坐黨籍斥不用有丹陽集三十巻弟載字天任工詩句法雅徤嘗為晉陵主簿宣和末以宰相薦改承事郎靖康中李綱辟辦公事建炎中詔宰執薦士董耘以載應詔屢徴皆稱疾不就題申王畫馬圖天寶諸王愛名馬千金争致華軒下當時不獨玉花驄飛電流雲絶瀟灑兩方岐薛寧與申慿陵内廐多清新肉騣汗血盡龍種紫袍玉帶真天人驪山射獵包原隰御前急詔穿圍入揚鞭一蹙破霜蹄萬騎如風不能入雁飛兎走驚絃開翠華按轡從天囘五家錦繡徧山谷百里舄珥遺塵埃青騾蜀棧西超忽髙凖濃蛾散荆棘苜蓿連山鳥自飛五陵佳氣春蕭瑟冬日遊甘露寺漕河膠舟水流咽水關著鍵行者歇大江伏槎卧長劍萬頃濕銀寒不結蓬萊諸仙亦避寒海門冥冥凍欲坼朔風吹晚雁叫空蓬巷松杉崖石裂道人丈室最髙處地爐蒲團穏坐熱我來乗閒不問道方牀相對無言説立春日焦山留宿嵗為兹山一冄登渡頭飛閣獨相凭雲生江海交流處人在松蘿最上層殘雪既能留野客春風先與報山僧慿誰邀上東巖宿更約花時命杖藤題畫授李伯時鴻雁歸時水拍天平岡老木尚依然借君餘地安漁艇乞我寒江聽雨眠汎舟横塘遇雨平野風烟入夢思殷勤作畵更題詩扁舟卧聽横塘雨恰遇江南歸雁時題李世南畫扇野水潺潺平落澗秋風瑟瑟細吹林逢人抱瓮知村近隔塢聞鐘覺寺深過邢惇夫墓下作人物於今歎𣺌然孤墳宿草已生煙日暮行人道傍㑹應逢年少與一作共談𤣥至學省作天啟為博士三年不遷因冄至學省而作此平生擾擾復膠膠學省重來嵗又交騎馬醉遭官長罵讀書慚被學生嘲何為眷戀米三斗便可經營宅一茅好買江干千个竹待㸔煙雨長春梢送洞元法師歸茅山三首絳節飄飄下紫清更叅隠訣制頽齡若逢方丈龎眉叟來愛囊中赤甲經崇寧新閣連雲起天篆浮空寶氣飛帝遣羣龍常䕶守池潭風雨夜深歸一菴疇昔共嶔崟古木垂隂嵗月深恐是三生房次律要隨藤杖去重尋題三茅風雨圖筆間雲氣生毫末紙上松聲聽有無收得三茅風雨様髙堂六月是氷壺􅖘亭山頂白龍穴南山􅕣􅕣天作皷號召諸龍盡行雨惟有秃角最先到潑墨雲中鱗鬛舞兩宋名賢小集巻一百九
