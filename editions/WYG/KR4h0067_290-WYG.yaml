body:
  text: 兩宋名賢小集巻二百九十宋陳思編元陳世隆補梅屋詩稿許棐字忱父海鹽人嘉熙中隠居秦溪種梅數十樹搆屋讀書自號梅屋慕香山東坡畫二像懸室中事之嘗曰四壁天地萬巻春風庾嶺香孤山玉樂而可以忘死著有梅屋集夜泊長河黄㡌貪程夜泊遲市樓燈火歇多時滿懐風月無分付却借漁翁短笛吹訪潘叔明一室寛於飬鶴籠荻簾踈透雪花風怪來几案無顔色春在題詩巻子中明妃漢宫眉嫵息邉塵功壓貔貅百萬人好把香閨舊脂粉艷粧顔色上麒麟醉起午醉醺醺到日晡起呼茶盌炷燻爐隔窗幾㸃敲花雨仔細聽時却又無帕子萬縷縱横如妾恨一方輕薄似郎恩多時不繫纎腰舞却對花前拭淚㾗晚泊臨平晚卸風㠶泊市橋稅亭民屋摠蕭條秦封不到河邉栁送徃迎來枉折腰元夕後懐河上作自從樓閣罷燒燈未有今朝一日晴煖拆葑邉氷翼破寒留山頂雪㾗輕嬌驄已印尋芳跡小妓新翻鬻唱聲毎箇旗亭商一醉也應排日到清明沈子壽郊居屋外猶餘地百弓經鋤知費幾年功栽蔬少似於陵仲種菊多於靖節翁偃屈溪山詩巻裡破除風月酒杯中近來又喜禪機透一顧叢林萬衲空贈葉靖逸借我城居一丈寛五車書向腹中安聲華馥似當風桂氣味清於着露蘭朝士時將餘俸贈鋪家傳得近詩刋回看舊隐西湖上誰伴沙鷗度歲寒鄭介道見訪歩頭楊栁種多年今日方維勝客船掃石共看山色坐枕書同聽雨聲眠溪羮旋煮蓴絲滑野飯新炊芡玉圓不管歸心忙似箭强留吟過菊花天贈龔彦質慈湖分與半窗燈照得襟懐徹底明得一作出明一作清蒲席夜閒猫占卧筍輿春暖鶴隨行爐香欲盡經猶誦研墨才濃句已成歲晚弟兄俱白首一樓風雨話深更題常穆仲蘸碧舫様一亭小依山復靠池毎來分席坐須憶一湖時竹弄當窗影花添蘸水枝人間風浪惡泛宅幾天隨趙叔魯天上除書駱驛飛謫仙何事得來遲旅懐寛似居家日學力高於未第時山帶晴霏横畫軸水流清響入琴絲世間多少王孫貴無我寒泉一句詩秋江漁父小舟輕似一鷗飛戀月隨風慣不歸困卧蘆花深雪裡夜寒添葢舊蓑衣山間越得山間笋蕨春借厨烹煮自炊薪倩誰分我桮羮去寄與中朝食肉人木山父書院占得文房一丈强地幽雖夏亦清涼甁花誤倒水侵案書葉亂掀風滿牀薜長宻藤遮半壁桐分踈影出低墻客來莫道無祗待只啜茶甌却味長蠟梅江梅同瓶苗裔元從庾嶺分兩般標致一般春淡粧西子呈嬌態黄面瞿曇現小身不羡腰金横玉貴來尋嚼蠟飲氷人只愁花謝香狼籍桃李如何接後塵贈畫魚沈秀才冩字摛文不療飢生涯換得頗新竒錦心暗織臨淵網蓬鬢潜繅釣雨絲落筆易於投餌處得錢多似出罾時漁翁枉占烟波濶不及君家小硯池贈北磵天下名山行脚遍依然形影瘦伶俜支吾寒暑袈裟耐變眩烟霞筆硯靈對客敬如堂上佛讀書道似藏中經石頭路滑終難到不是詩禪莫扣扄雪曉臘雪連宵接曉飛錦衾公子未曽知起來攜杖敲梅樹扶得輕盈壓損枝閨怨五首眉鎻從春不暫開懶移心事向妝臺恩情却似殘花片去逐東流不肯迴别後相思瘦玉肌不堪重着看花衣恨君得似梁間燕社日辭家社日歸月引庭花影上窗悶和簮朶卧空牀春寒翠被無人共閒却熏爐一字香離愁一㸃濃如黛强把金箆掃不開新月幾畨呈巧様薄情夫壻未歸來小院東風去住中春愁元不隔簾櫳自家顔色凋零盡却對花枝惜堕紅枯荷萬柄緑荷衰颯盡雨中無可盖眠鷗當時作叠青錢滿肯信池塘有暮秋庭樹今年庭樹看花稀因是耽書失事治何處結巢雙喜鵲却來刪得幾枯枝春晚推過詩編把酒斟挽春幾句讓鶯吟門前却喜無人掃積得殘花一寸深贈臨上人遶湖山叠翠師住最髙層野偈書林葉茶鐺煑澗氷松筠為道友日月是禪燈倘許分峯隠甘為有髪僧客路客路乆驅馳秋深兩鬢知田家投夜宿漁竈寄晨炊契分燈前影生涯槖裡詩遥憐故園菊荒草沒霜枝鍾雋卿見訪荒圃知非延客地漫分苔石坐移時杯中淺注三行酒几上同看數首詩樹未經霜飛葉早菊因潤月放花遲自無景物留君住却恨西山日半䂓題倦庵自扁庵為倦斯名恐未然醉巾頻漉破逰屐几磨穿新種竹多活舊栽花更妍門前春水漲催發孝亷船贈元松軒白髪蕭蕭客帝都故園閒却種𤓰鉏平時不信為儒悞今日方知渉世疎烟浦未尋歸去艇雪窗猶讀借來書詩名壓盡江湖客要在唐人向上居題叔清郊居哦松未了賦歸歟旋買田園結草廬數畆竹隂惟欠鶴半池山影不妨魚舉杯多是沽來酒挿架無非讀過書我已倦為都下客顧君分與把茅居書郭子度壁禁苑精廬是切隣衣巾雖舊不沾塵鐘魚聲裡吟連曉花栁香中醉過春和土重泥燒藥竈買絲新接釣魚綸遶湖十萬人家住如此清閒有幾人㕍字㸃畫分明印碧空迴鸞近鵲勢差同月邉映得銀鈎體雪裡摹成玉箸工斷續似經秦火後悲涼如在楚詞中愁人筆硯俱荒廢倩冩相思寄便風宫詞二首卧聽羊車輥夜雷知從誰處宴酣回蟾光也觧君王意隔箇簾櫳不入來同入宫來幾許人因何遣妾䕶長門雲鬟半晚香腮瘦却愛菱花鏡子昏古墓石人猶自立蒿萊拂讀殘碑字字哀隣塚巳澆寒食酒野風分送紙錢來憶鄭元甫别後黄花兩度殘天涯彼此寄書難幾回雁字斜陽裏聊當平安一紙看贈芸窗能書能畫又能詩除却芸窗别數誰只是霜毫氷蠒紙才經拈起便新竒戍婦詞一首半落缸花午夜閒戌衣裁就寄君難雁來不帯平安字却帶邉風入帳寒贈陳宗之六月長安熱似焚􅆵中清趣摠輸君買書人散桐影晚卧看風行水上紋傷春曲日日望郎郎未歸玉肌寛盡縷金衣春心撩亂強拘束碎剪紅綃補舊枝紅綃才向枝頭住殘花又逐東風去願花飛入笑筵中莫入愁人斷腸處愁人見花人自羞花見愁人花也愁飛花有盡愁無盡栁外一聲黄栗留四時宫詞各一首因見落花心覺悟薄羅襟上淚㾗乾容顔縱是花枝好能得君王幾日看碧玉涼梳落枕邉懶梳雙鬢學新蟬恩情不及班姬扇縱是炎天亦棄捐涼夜誰同玉簟眠湘波冷浸一枝蓮君王不學中秋月處處分身處處圓雪壓長門消未盡夜衾堆盡舊宫羅鴛鴦瓦下垂氷筯未抵相思玉筯多郭評事廷評滿腹貯陽春筆下從來活幾人㕔小似分幽寺住俸輕如在舊山貧堆書教子猶疑少倒屣迎賔不厭頻欲效林宗中角墊自嫌雙鬢有紅塵輓呉春伯入門諸子哭褰衣痛説嚴君屬纊時病重刀圭難作效家貧飯舍不如儀從春屢有登臨約近日方無唱和詩拂拂南屏山下路悲風吹亂緑楊絲輓郭子度連年染患貌梔黄盧扁猶無起死方穉女自敲尸畔磬隣僧來炷佛前香生涯漫有千書巻受用惟存一奠觴聽説茶毗心更苦拭乾清淚又成行寄吳冝之文公徒弟無多在學術應如壽數髙好句先教諸子和墊巾翻被俗人嘲湖邉茶店同誰坐井畔柴扉欠我敲昨夜相思眠不稳月眉斜印落花稍瑛上人十二三時便出家何曽頃刻離烟霞晨持數巻日方上夜梵千聲月未斜洗鉢不經鷗浴水挿瓶嫌採蝶殘花儒冠誤我駸駸老何日蒲團共結跏木芙蓉芙蓉艷金谷秋色錦機中霜樹不知醜葉與花争紅東歸道中芙蓉波面出罾魚亷似城中買擔蔬欲試膾刀還不忍恐傷千里寄人書籬籠禽怨子金新購入雕籠恨在嬌聲斷續中昨夜羈雌何處宿落花殘月故巢空破鏡詞寶鏡一從分破後不堪磨拭炤妝鈿倩誰攜上青雲去補得今宵缺月圓龔彦質恕可二丈兩龔當暑客秦溪旋買黄絺替熟衣想見西湖風月裡藕花凝望載詩歸張聲父城中破屋妻兒住自向招提借小房壁上碑文皆古篆案頭書冊半仙方月嫌碎竹遮窗暗風欵飛花入坐香㸃檢未如僧相處只多髭鬢幾根霜秋齋即事桂香吹過中秋了菊傍重陽未肯開幾日銅瓶無可浸賺他飢蝶入窗來泛剡水濶無風似有風蘆花揺落櫓聲中鷗無一㸃驚猜意認作當時載雪翁醉歸半醉歸來卧不成月華霜彩爛中庭茶鐺凍結香匜冷只把梅花嗅得醒湖上曲新晴旋蠟遊春屐半濕香泥恰好行琢得小詞腔未稳徃來花下怯歌鶯趙野雪載雨駕雷翻覆頃漏星藏月巻舒閒若將雪與詩人比政恐雲無日日閒古硯送趙明府一片端州古硯甎翁孫相授當良田寒梅磵下和氷洗秋桂窗前滴露研學字不工空費紙吟詩雖苦未成編贈君攜去薇花畔草詔閒時枕匣眠戯題花一片落花題一字凑成一句怨春詩縱横貼在窗紗上巧似逥文織錦時寄衣曲蘆花風𦂳雁飛飛便寄邉衣也是遲妾把剪刀猶覺冷况君披甲枕戈時願君百戰圖勲業馘項殱嬴頻獻㨗傳取貂蟬金印歸無負君王無負妾畫眉曲日印花枝欲滿窗旋磨鸞鏡試新籹恩情只似春宵短眉黛空如栁葉長宿閒林歩山禽棲定澗蛙鳴時復鴟梟雜數聲昨夜酒添春睡重幸無憎愛到天明宫女詞妍醜三千衆恩情一例輕妾身雖寂寞天下却升平真珠園芭蕉葉上題詩字雨後來看半不全餘濕未勝濃墨補且攜巵酒到花前湖邉湖邉開到木芙蓉攘盡荷花十里紅紅蓼莫慙顔色淺榮枯同是一秋風讀南嶽春來逰未遍湖山已是風光一半殘細把劉郎詩讀後鶯花雖好不須看花墻頭新露一枝紅壓盡隋人萬彩工香艷便棲雲鬢老也勝飄泊晚西風别友分付離觴莫滿斟酒深還與恨同深自憐不及春江燕一路相隨伴好吟不語僧黙坐蒲龕若塑成客來惟聽小鐘鳴却嫌庭樹無禪力時有風枝雨葉聲孔海翁鑑湖湖上寄閒身好景應同賀監分梅下有船供載雪荷邉無地可鉏雲吟人多倩刪詩稿名士争求作序文畫巻書箋偏藏屋其他生計盡輸君題縣樓呈竹坡令君聊試棟梁材結就譙樓亦壯哉疑是海宫新湧出不然仙府乍移來無人敢帶私心入萬户皆知正道開細數代𤓰能幾日曉籌昏鼓莫相催寄題竹坡郭外移來費俸金幾年擡舉玉成林更無餘地栽他樹儘有髙枝着卧禽寒影似傳東野貌清聲如冩伯夷心呼童少殺青瑶簡染月濡雲寄我吟數椽數椽茅屋傍林塘幽似山僧獨住房夜静只慿猿守宅晝閒時有鶴升堂旋収落葉供茶㸑細搗枯花作印香書冊滿牀詩滿槖别無生計亦無妨送友人為僧知心朋友雲霄裡三尺官綾取不難禪衲乍披身愈瘦儒冠新脱頂㣲寒數編詩稿聊収起一藏經文旋取看惟我塵緣推不去蕭蕭華髪倦漁竿地爐穴地為爐了一寒肉屏氊帳任無緣晨燒樹下沾霜葉夜煮山頭㵼月泉巳借陽和歸故絮更分光焰到殘編百年貧冨灰埃盡荒塚纍纍夜燒邉春雪春風吹雨作花飛寒勒芳程幾日遲惟有庭前老梅樹謝渠添補落殘紅輓沈晏如不信詩人一例窮如公半世又成空湖邉便欠尋梅友籬下應無採菊翁雪片堆平閒藥竈雨聲敲碎舊漁篷墓銘吟稿兒封寄血淚斑斑浣紙紅贈相士澗水溪氷似鏡清自看寒貌已分明煩君别相江湖友來歲誰魁淡墨名陳裕齋墨戯臨帖鈔書外尤深破墨工萬峯千嶂趣片紙尺綃中雲暗孤村月潮生滿樹風自嫌我已老摩硯一無功題吳秋潭隠居圖到處有茅堪盖屋誰家遷槿不成籬秋潭何事經營晚應是無人㑹買詩題摩雲悟師老松隂下訪摩雲仰望青雲隔幾塵不是倚空梯百尺只緣中有道髙人田間田間乆不到草木半蕭踈鷗占沉舟浴蛩分破壁居僕温攜到酒隣送買殘蔬未説催租事黏窗且讀書題埜處數畆家園枕碧波樹桑疎處補花窠簷低不碍儒冠入橋矮才通釣艇過雲笛旋栽門外竹雨衣新織檻前莎有時牛背看書罷一曲春風寗戚歌孫祺卿新居幾年銖累東修錢才向湖邉置一㕓種竹庭深難得月飬魚池小易為泉山呈好畫當書案栁撒輕絲罩釣船酒力半酣詩思倦矮牀相對白鷗眠招髙菊澗時在縣齋歸買秦溪屋一間才如都市僦樓寛門前飬草如花賞壁上黏碑當畫看自改舊時詩未稳獨斟新酒不成歡髯仙只在淵明宅泥濘相邀寸歩難李明甫雪中小閲令君䝉雪教千兵一㸃妖氛不敢生和氣旋回弓力軟寒光㣲映劍光明民居似倚銀城壯海道如鋪玉簟平入蔡歸來方夜半畫堂歌管未収聲西真圖翠水池邉宴早秋雲謠聲裡月西流醉歸不信乗鸞稳却擘蓮花作采舟書北庵門十度來敲九不譍隔籬空見竹青青不知池裏黄金鯽聽講楞伽幾巻經贈術士張痴伶俐不如痴從來吾亦知才吟詩好日便是命窮時䑕笑瓶無粟蝸嫌壁有碑五行修得否髭鬢已絲絲謝毓齋李尚書惠詩序綠野堂邉種藥成已班髭鬢復青青謝庭子弟皆英物漢殿公卿半學生争捧溪藤未妙畫競磨崖石乞新銘如何海角孤吟者文集中間也挂名葉克齊歙浦租船只載詩一亷如此似君希雙親猶道行裝重多帶羅紋一硯歸題趙子固春山上寺圖望得招提見程猶半日間馬嘶曾到處僕指未行山風遞松聲逺雲連草色閒何如添箇我坐石聽潺湲湯婆子一冬專寵道人房不藉華清賜浴湯皤腹却無璋瓦分矮身難稱綺羅妝春生蝴蝶半牀夢暖迫梅花一帳香醉倚肉屏君莫羡北邙多少黒頭郎送冩神李肖巖入道一掣塵緣去學仙鶴程風露漸髙寒白玉樓中逢鼻祖為傳吟貌寄予看寄趙倉麾節交迎出帝城滿朝皆羡板輿榮一川蹔輟春風暖八郡同瞻霽月明吳苑鶯花新管領秦溪桃李舊栽成應憐倦卧寒窗者煮藥爐邉聽雪聲送趙子梁梅福舟行速離觴不暇斟雖然交日淺頗覺别情深宿處雁相伴到時鶯對吟水心新塚下替我一沾襟得閒亭栁風雖小絲絲裊花雨無多㸃㸃香惟有吟毫閒未得染紅濡緑一春忙題錢慶豐醒庵不向杯中物吟邉僅有君自無沉醉分非效獨醒人捲箔進明月開門放宿雲揀茶敲未遍又摘露芽春輓周倅真是分風月歸來無俸錢人皆嗤拙宦天又嗇長年舊宅寒潮外新螢古樹邉一詩哀不盡簷雨對潜然上趙蘭坡身迫雲霄自不知只如師友講論時驅龍駕鳯陽氷字剪月裁霞太白詩兩院炷香熏畫巻晴窗添水浸花枝十年漫走江湖上咫尺蘭坡却到遲上嘉禾趙守邦君一念只寛民真個龔黄見後身和氣蒸為千耒雨煖雲栽作萬襦春座中長有清吟客庭下渾無徤訟人諸郡盡能依此様世間那有一家貧劍鋒朝潤郅支膏暮澤樓蘭血何如塵土中蝕為無用鐵題常宣仲草堂隔市能幾歩幽趣踰山林鑿池小如斗水淺魚自深簷任樹枝礙堦從草色侵不肯一鋤斫恐傷春風心朝出貨仁義暮歸炊古今客來無可欵石鑪添水沉題張俞仲竹屋削成千蠧簡此屋是餘村長有清風至渾無俗客來猿當吟案立鶴趂釣船逥添足歳寒計裁松復種梅李方庵欵梅梅花惆悵三年别香鎻空庭幾風月今年花發主人歸依舊主人貧徹骨小枝分立硯屏邉無酒酬春燭焰寒數葉殘書繙未了喚起山童敲鳯團融春小綴開爐十日併當融春小室為六藏計亂書中得舊稿數紙稿自甲午至己亥詩不滿三十更散失不得傳則與日月俱棄矣倂綴數文為融春小編非千金弊帚誓尺壁餘隂也梅屋許棐題樂府妾心如鏡靣一規秋水清郎心如鏡背磨殺不分明小窗寒燭夜結紐綴郎襟不結尋常紐結郎長逺心郎心如紙鳶斷線隨風去願得上林枝為君縈留住題舒王遊半山圗驢載新詩僕抱書松聲禽語當傳呼不知邂逅耕田者問着青苗免役無題錢叔恭立齋銘後蔣魁作銘拄義撑仁難着脚十人着脚几斜歌此銘不特為君助今古儒家砥柱碑舊漁竿制斷江湖幾線風蓑衣閒掛餌瓢空何因獻入君正手持向磻溪釣太公草屨江湖蓑笠舊交情石滑泥深歩轉輕恰是革靴蹤跡嶮官程髙處越難行贈劉相士滿鏡秋霜鬢影寒此生堪笑復堪憐煩君只相看書眼更對青燈得幾年宗之惠梅窠水玉牋百幅吳氷千蕊雪對吟終日不成詩憶君同在孤山下商畧春風弄筆時月澗惠硯滴梅腦手不題詩已數年硯塼相伴學枯禪為君蘸濕元暉筆冩出江山雪後天踏雪尋梅興未償衣襟頼有隔年香銅匜更炷氷花腦不到孤山也不妨春思嫁得蕭郎不戀家幾年流落在天涯滿懐多少傷春事嫌殺門前呌賣花送趙丞汝䛣竹梢風露松梢月未抵吟丞氣味清笑問兩年何所得錦囊詩重俸囊輕贈墨僧老硯磨穿事不成萬言堆裡鬢星星願隨君去柯山下収拾殘烟冩佛經重陽乏酒黄花冷笑竹籬邉笑我牀頭乏酒錢帶雨折來無用處碎挼金屑和茶煎燭長身夜占銀臺立焰焰光揺頂上珠貪向華堂照歌舞不知灰得寸心無術代者言不聞沸鼎烹夷叔那有雲臺畫四凶自與心君消息了却將甲乙問窮通贈錢相士我貌君容一種寒鷺漂鷗泊廿來年我詩吟就無人買君相公卿煞得錢觀松巖畫巻老屐相隨四十年慣看蒼翠聽潺湲今朝細玩松巖畫猶有行吟未到山吳江道中一别吳松二十秋敗荷枯栁摠新愁白頭交友凋零盡頼有寒江幾個鷗題陸宣公堂一編奏議從頭讀句句氷聫玉綴成不是德宗嫌切直自緣唐室未昇平諂魂盡逐殘星㓕義魄長隨霽月明我亦愛君憂國者歲時來一拜先生送趙蘭坡弟判嘉興藹政聲蘭坡兄又出專城如將天上一蟾影分作人間兩郡明江冷雪隨㠶幅去路晴梅夾轎牕行開藩便􅕥歸班詔也與玉山添重名題趙恕可山臺繞宅無非罨畫山吟臺更對好峯巒錦嚢低掛花梢上玉子輕敲竹􅄻間小硯買來猿觧捧異書編就鶴同看主人出赴功名㑹澗水自清雲自閒小蓑道人滿面瘡痍瘢胸中一泓雪醒吟鶴背風醉卧鷗邉月不費嚇鬼符不試爐金訣笑問舊蓑衣秋來添幾結題丘竹坡新地長安冨貴海十客九倦還君去不著意君歸無愧顔舊圃一二畆新居十數間花尋直樹種竹簡斜枝刪詩句滿筆冩書編到處安冬簷春日煖夏户風晝寒不是時令舛自緣心地寛天下政多事未須牢閉關題雪林畫巻亂洒春霙着紙寒玉成天地片時間有人諳盡江湖冷却愛尋常罨畫山梅屋第三稿己亥至癸夘詩不滿二十首甲辰一春却得四十餘篇疑詩之多寡遲速似有數也天或壽予予詩之數固不止此然當以貪多務速為戒梅屋許棐題蘭花竹底松根慣寂寥肯隨桃李媚兒曹髙名壓盡離騷巻不入離騷更自髙郭南湖見訪却適有出一絶為謝一篷風雨偶歸遲見説君來扣我扉童子困眠梅樹下不曽放過鶴雙飛枯樹幾年柴立荒塍下春雨秋風摠不知一㸃陽和到桃李紅紅白白便盈枝錢謙齋新居住破吳松江上屋杭州城外結新廬未尋陸羽烹茶具先借淵明種菊鉏山入樓中成好句月來牕下伴殘書御街車馬無行處誰肯抽身覔退居上趙克家太守説着嘉興太守賢野梅官栁亦歡然貧民不識重租苦老吏難將一事瞞但有詩書堆几上更無歌舞到樽前凢為郡者皆如此天下何由不治安趙宰瓊花圖祠下靈根無别種凡花誰敢鬭榮枯被君分種鵝溪上從此人間有兩株寄然鏡潭鏡潭烱烱秋無底着一纎雲也是多禪外當無些子事如何猶有作詩魔苿莉荔枝鄉裡玲瓏雪來助長安一夏涼情味於人最濃處夢回猶覺鬢邉香題猗緑堂蕭蕭萬竿玉深䕶讀書堂夢趂秋聲薄詩攙夜色涼敲茶風逓響滴硯露涵香不雜有花樹花紅不乆長趙山臺寄詩集海雁呌將秋色去山臺鈔寄好詩來菊花過了梅花未自有花從筆底開寄題東洋東洋占得江山勝安頓亭臺到處冝夜夜中秋明月影朝朝寒食好花枝長箋短軸真行字舊軸新編倡和詩只隔一朝飛不去悵懐惟有白鷗知寄友已奏春班名字了不妨閒作幾時遊家僮未要裝詩擔見説三髙索唱酬紅梅不堪冷照黄昏月强倚春風作杏粧雖得容顔蹔時好欠他肌骨舊來香迓張宰堯章倦骨畏寒如畏虎可曽一步出柴扉因迎令尹西郊外折得梅花滿把歸謝施雲溪寄詩折得桂花三數枝雲溪又寄幾篇詩詩香入在花香裡韵似龍涎火煖時梅屋第四稿饑梅十日九風雪差見今春寒梅花辦歸計一㸃心欲酸所秉太孤潔有此末路難來年復相見一笑賀平安築城曲日將西杵聲急一聲聲自死腸出城髙不特土累成半是鋪填怨夫骨儒坑戰地骨更多十二金人隨鬼泣烏夜啼丈人屋侵雲馬愛丈夫屋涂人亦愛烏烏聲喜相續屋底間蛾眉環坐理絲竹絲竹無新腔冩汝聲為曲丈人一賞音瓦礫棄珠玉移噪隣翁家聞者皆吐逐馬塍種花翁東塍白髪翁勤樸種花户盆賣有根花價重無人頋西塍年少郎荒嬉度朝暮盆賣無根花價亷争奪去年少傳語翁同業勿相妬賣假不賣真何獨是花樹泥孩兒收瀆一塊泥裝塑恣華侈所恨肌體㣲金殊載不起雙罩紅紗厨嬌立瓶花底少婦初嘗酸一玩一心喜潜乞大士靈生子頋如爾豈知貧家兒呱呱瘦於鬼棄卧橋巷間誰或頋生死人賤不如泥三嘆而已矣染絲上春機染絲上春機春濃絲色淺妾心隨梭飛郎心如軸轉染絲上春機錦成貴無價不忍裁成衣怕剪鴛鴦破長門怨妾身如蓮根沉埋淤泥底雖有白玉姿無人為拈洗妾身如亂絲巻藏箱篋底願上鴛鴦機無人為分理秋風辭颯颯秋風來一葉兩葉墜燕子動歸心薄情知也未颯颯秋風來衣衾愁未整莫作閨中寒且作天涯冷三臺春曲昨夜㣲風細雨今朝薄霽輕寒簷外一聲啼鳥報知花栁平安春是人間過客花隨春不多時人比花尤易老那堪終日相思蝴蝶飛蝴蝶飛蝴蝶飛紅邉迷了紫邉迷粉老香乾何處歸不學蜜蜂做家計勤苦之中有甘味破琴幸逃煮鶴烟枯羸卧烏几向來千萬音今在何人耳舊譜傳不真零落幾張紙瓦缶空雷鳴牙䕫喚不起破硯碌碌礲磑間得此一雋石磨我三十年貌鯬雙鬢白渠亦苦我磨眼穿流淚墨老蟾在傍咲兩窮自相厄對鏡詞煙䕶杏腮寒日襯桃腮煖惟有鏡中花東風都不管織錦詞綵絲愁緒雜春機咿􅥆聲中日又西織到花枝連理處玉􅔕門外一嬌嘶毋忌一别音容歲幾更紙灰飛盡淚猶傾最憐春雨相將足緜上有田誰共耕春思朝來一陣無情雨敲得庭花半欲殘燕子不知人冷落飛來簾底避春寒春雨老來慵把種花鋤片紫纎紅一任無不忍今春孤負雨自収簷水浸菖蒲燕處處亭臺宴好春唱花歌栁調争新梁間不用多言語回耳聽君有幾人石菖蒲一碧生涯水石濵縷風絲雨瘦精神前身恐是巢由輩怕着人間半㸃塵草生長冷階閒砌畔一春知見幾花飛雖霑雨露無多子却到秋來緑轉肥不是東風有愛憎為憐㣲細頗加情胚紅孕紫寧交晚且放青青寸草生池魚深淺生涯足浮沉世念輕莫貪鈎上餌去作鼎中羮栁青青得意春三月撩弄東風舞腰活莫道長條舞得多長條先被行人折小盆花小小盆中花春風隨分足花肥無賸紅葉瘦無欠緑心傾幾㸃香也飽逰蜂腹太盛必易衰荒烟鎻金谷花願未到無生無㓕地聊為春風露紅紫不願隨風趂蝶飛願就枝頭抱香死諭栁不須嬌逞舞腰肢不須巧盡官粧眉只把千絲萬絲結結住情人無别離選官圖排銜累職甚分明除罷皆由采色行縱有黄金無好采也難平白到公卿猗緑惠燭剪剪春生萬巻堂一花知勝幾螢光癡兒不識半行字只觧髙燒照海棠落花落花傳語五更風能旁亭臺幾日紅把似匆匆又飛去不消裁染費春工落梅紅杏枝枝嬌似染緑楊處處宻成圍苦無顔色相追逐自趂東風作雪飛贈壽醫師寓雪峯軒窗開處摠湖光誦罷難經納晚涼雨濺荷香沾古衲月移松影照禪牀燃燈就取燒丹火煮藥先留㵸茗湯二豎三彭都見佛人間無病亦無方陳宗之叠寄書籍小詩為謝江海歸來二十春閉門為學轉辛勤自憐兩鬢空成白猶喜雙眸未肯昏君有新刋須寄我我逢佳處必思君城南昨夜聞秋雨又􅕥新涼到骨恩送趙竹潭已彊詩仙一夜留任教清早放船休恨身不似梅花片飛入寒篷伴逺遊贈僧虚中僧趂雪前到梅花猶恨遲略譚殘歲夢便和早春詩僵雁依船宿寒猿捧硯隨吟單未須捲重見是何時兩宋名賢小集巻二百九十
