body:
  text: 兩宋名賢小集巻三百五十八宋陳思編元陳世隆補玉楮詩藳岳珂夜觀象奕青燈相對夜初闌適意棋枰伴我閒天馬輜車金象國虎龍縞韈寳臺山進趨自可覘成敗倖勝何常不往還一著未容囘逐勢不妨袖手酒杯間唐世有刺郡江表者時宰囑以新淦出筆令製以寄刺史始至召佳手一老父應命百日纔得二管馳貢相府既訝其遲又薄其鮮試之乃絶不堪大怒曰數千里乃寄兩管惡筆來刺史聞之懼欲置老父于罪老父訴曰使君毋草草我所製乃歐褚所用丐先示以相君翰墨容再製茍不稱甘鼎鑊遂示之笑曰如此只消三十錢筆不日獻五十管再使至長安相一試大喜復書乃優賜匠者夜窗偶試昆陵張顥筆戲為之賦世間未必無臯夔九疑虞舜不可追武皇鋭意開絶漠摧鋒乃亦有衛霍嗟哉格物本一理顧人所用何如耳筆工在昔本市傭束毫傅筦求售同誰云進技不進道意匠輒與歐褚通䖍州刺史覔佳筆雙管何堪須百日星馳一騎到長安試手鳯池隨棄擲老奴恂慄丞相嗔能用此筆能㡬人願窺翰墨減工製必使揮毫誇入神斗柄春囘開電笑槖籥果符人所料中山聚族儻未殫束帛那容及年少是知人才用舎識别惟一心臯夔衛霍無古今妍媸能否俱在上所使此筆區區正其比我生識字僅一丁眼前所見徒毘陵未知當年新淦定何若正恐鍾衛二王無合作君不見此老一去知㡬年當時鑒裁無復傳紛紛鵞毛抱筩賣恰費書傭三十錢葡萄當年博望奏邊功異種曽攜苜蓿同摘乳那煩桐馬令引鬚聊愜好龍公頗憐漢地離宫在未許涼州酒甕空囘紇秪今重餧肉清隂彌望滿闗中荷花盛開以病旬餘不至亭上偶成二唐律病襟慵策杖天鏡恰開奩青蓋迷前浦紅糚開曲櫩藻窺知鷺下萍破識魚潛㑹看吳公陣官蛙奏曉嚴好在中孚澤猶横未濟舟擲金隨栁舞跳玉趂蓮謳掃榻方思士鈎簾也覔侯病夫均一笑此意本無求子歸未省松楸將以初秋望前汎湖之龍門巳戒舟艦而連夕雨作不見月因賦天問二章擬放平湖月下船櫂歌中夕發長川蘋風好為雲開幕蘭漿不妨人扣舷猿鶴候迎將曉日魚龍悲嘯未晴天玉川塌額金沙上閶闔封詞漫一牋小心風伯紫宫回眼看銀蟾海上來𤣥豹又成漫谷霧斷虹又作隱山雷便教雨積三時害未信晴無一日開待試平生補天手為君明鏡再安臺秋夜有感二首早嵗驪車擁漢闗憂心耿耿日凋顔秋成正望狼烽急夜枕不禁魚目鰥三仕古猶闗喜慍萬金今不博安閒回思此日一尊酒只合長居木雁間從來難辨是㡬微談者雖多覺者希小隙便須防蟻穴大寒何必泣牛衣無妨掣肘方成事不早抽頭即禍機莫道不才明主棄也曾攖頷觸天威讀劉琨傳古來萬事無真實賴有區區史筆存士雅聞鷄偶同被至今起舞説劉琨送喬江州將漕江右二首獵獵英聲世少雙兩年鄉國望麾幢才猷牛綮硎初試筆力龍文鼎獨扛風節又新唐十道恩波仍浹禹三江澄清何事先經濟尚使尊賢志未降昔日東州看陣圖武昌陸續拜魚書我歸舊齒邦人版公去新乗使者車但願世官居鼎鼐從教野老自犂鋤西風鴻雁方遵渚時有音塵接里廬次韻喬江州琵琶亭詩二首共生壬子兩仙翁不為離情惜斷篷鐵撥鵾絃遺響在繡衣龍節賞音同穆曹技埒名俱勝唐宋詩傳句並工擊節銀箆定誰是茫茫江月思何窮一葉西歸老倦翁髙樓突兀記推篷景隨湓浦江山改人與香山嵗月同異世剖符傳事比出門合轍見詩工我來君去如鴻雁休歎長安目力窮得陳元履家書六言四首病骨經秋易怯人情比日多疎驚起打門軍將傳來置驛家書老病兩無世用謀謨百不如人喜見東牀論事誰言下榻生塵安問經時落落邊聲鎮日揺揺寄賀塞翁馬失決疑天老龜焦窺户㡬回鵲喜繞家一夜蛩吟痛飲正須似舊安居且願如今紫薇花凡卉同資造化工紫薇元不待東風明霞絢爛瓊為蘂曉日離披綺作叢塵境㫁無青瑣隔仙姿元與赤城通最憐耐久堪承露誰道花無百日紅閒居六詠早起五夜玉繩轉雙轤金井寒背人蚊作市欺夢蟈鳴官竹徑風初度松梢月尚團踞龜猶汗漫何許覔乘鸞午睡東日平明際北窗髙卧時五經方坦腹百慮且伸眉蕉覆從疑鹿槐安更獵龜覺來還一莞七椀玉川詩晝閒用闗無用地才與不才間萬法因心起㡬人如我閒牀頭看黄巻屋外儘青山隱几逌然笑何人戰觸蠻晡飲閒居欣少事燕坐覺無營炎暑鏖天陣驅除仗酒兵勿嫌晡日杲自有晚風清堪笑竹中飲終成七子名晚步抱病遊從少居閒醉醒頻心懐喜無事脚力尚隨人野徑經行地園亭自在身不妨歸步晚長趂月華新夜坐一窗涼漫月四壁總聞雷銅漏水成滴金爐香未灰徘徊聴蛩逺熠燿逐人來看劒挑燈久譙城角引梅賀髙中書兼崇政殿説書三首宏議通三府髙名動四聰鳯池仍舊渥虎觀册新功盡日槐方翠秋風棗已紅直須先抗議莫待入雲中日月熙明地風雲際㑹辰紫宫贍象逼丹扆喜情親遜志賢謨在仔肩聖徳新耕莘須負鼎從此學而臣邇聰咨夕訪清問切辰猷博學今中壘遐征古上游齒寒當預計身履即良籌頗牧豈云逺隱憂其有瘳張孝顯晨訪懋忠堂因拉陳升可王囦道同飲徑醉卧小閣醒則晡矣戲呈諸公凌晨有客來欵門盥櫛下榻呼冠巾怪生鵲喜繞庭樹迎客不但填河津清尊湛湛開北牖頤指市奴馭奔走烹鮮煮餅羅朝槃苜蓿闌干豈無有一杯兩杯叱先驅羣羊入夢撞甕菹三杯四杯舌底滑闔座牢辭輒投轄共言夘飲夕不同能使終日長冬烘一朝便廢一日事除却投牀百無技老夫笑倒絶冠纓人生無日無經營經營至竟有底成謹閟此舌君勿評直復大噭五六七不醉不扶毋返室髙眠一枕醉復醒莫管今朝更明日吳季謙侍郎送家釀香泉絶無灰得未曽有戲成報章義豐愛酒憎官壺日長忍渴呼酪奴自言畏灰如畏虎有酒不向官坊酟當家香泉世無比米潔麴甘醇且美釀時不着一㸃灰滿酌寒泉挹清泚小槽滴瀝竹筧承氷渠夜濺真珠明一泓澄澈玉無底滿瓮盎盎春風生釀成不肯飲俗客澆著柴桑舊時宅共此千年醉眠石更將餘瀝走馬軍來注吾家老瓦盆許我自飲不許分老境宦遊環軌轍官酒徧嘗隨地别何曾見灰能作孽飢來一腹大于蟬鯨吞自覺吸百川是灰是酒俱不辨豈問他州并異縣今夕何夕翻露漿和壺一洗灰土腸君不見柴桑于酒特寓意相逢不擇賤與貴要是醇醨均一致汝陽後來帝家子路逢麴車不知味流涎正復何所謂貧為田舎富天宗遇酒隨飲莫適從豈如仙家居義豐無懐自與造化通彼燧人氏初何功酬君三語將無同同不同君信否黄花飄香石耐久明日山行且攜酒珊瑚銅柯凝異質鐵網墜層淵海霧夜涵潤山霞朝欲然緑鬟尚攲枕烏帽稱鳴鞭勿為毛錐子日興靡萬錢無題秋水芙蓉試早糚半軒微雨灑鴛鴦細腰正欠酬金餅奮翼何堪卸玉梁鬢亂釵横人在牖繩低斗轉月侵牀無情花影雲來去却做一天風露涼饅頭㡬年太學飽諸儒餘技猶傳笋蕨厨公子彭生紅縷肉將軍鐵杖白蓮膚芳馨正可資椒實麄澤何妨比瓠壺老去齒牙辜大嚼流涎聊合慰饞奴小墅桂花盛開與客醉樹下因賦二律舊遊曽賦小山篇浪蕊浮葩總遜妍金粟同瞻黄面老玉枝爭擁碧霞仙化身瑞相已百億匝地香風更大千無量眼前金世界倦翁又結醉中縁黄金湧出碧檀欒消得充庭舞廣寒露蕊移將天上種雲階借與月中看扶疎清影立黄鵠匼匝滿庭翔翠鸞吹徹玉笙正涼透香風萬斛夜漫漫雨中觀廬山雨裏觀山夐不同何須九叠看屏風紫觚壇上排蒼壁青步障邊鋪翠茸谷錦未迴晴日照衣綃聊借淡烟籠秪今萬木添紅纈更倩清霜染曉楓半生每負看山眼此日真成帶雨遊攲枕有無疑欲莫成峰横側總宜秋耳喧似厭泉嗚咽腰繫不妨雲去留明日新晴馬蹄放直須三峽看龍湫約吳季謙山行書來問期戲答連朝積雨快新晴雨後青山眼倍明大路岳蓮聊繫馬西園池栁正啼鶯已􅂸一醉從金諾共聴層淵噴玉聲月裏看山儘清絶可憐偏照國西營邵伯温聞見録載范忠宣帥慶陽時總管种詁無故訟于朝上遣御史按治詁停任公亦罷帥至公為樞密副使詁尚停任復薦為永興軍路鈐轄又薦知隰州公每自咎曰先人與种氏上世有契義某不肖為其子孫所訟寧論事之曲直哉予在山中讀書偶見此書而表君不見孔融昔日見李膺百世尚以通家稱又不見孔融後來薦鴻豫卵翼方成比行路北海平生開酒尊未應賓客皆若人儻令同徳更比義華胄肯以遥遙論世間麟鳯雜梟虺人事㑹逢總如此髙平丞相本大賢尺璧那容寸瑕指一朝契家青澗种轉頭不記龍圖公蟈鳴亂聲蠅㸃素丞相襟量滄海同歸來端委廟堂上一眚不捐三世將自言曲直何必言愧死老奴作何様吁嗟此輩何代無髙平堂堂真丈夫卲家聞見訂千古寂寞澗城墳上土已亥八月廿一日除書子拜太平興國宫祠官呈趙季茂世間何物最是閒司諫拂衣歸華山倦來忘記省不得依約此語祥符間終南捷徑本自錯老子新司紫元鑰官家僱我作閒人有酒醉呼端不惡嵗糜廪粟月俸錢豢鶴有料芝有田人生何必待有用我老得此寧非天君不見當年把臂龍圖上司諫放歸元不放又不見倦翁山行醉復醒説着拂衣今亦忘去聲奉寄何正父總幹經旬習懶慣山居不寫城間一字書把菊見山新趣倦汎蓮依水舊交疎無心是處友麋鹿有客寄誰烹鯉魚見説近來軍食足不妨詩巻訪犂鋤設醮太平宫竣事呈偕行諸君九光影裏步虚聲午夜封章叩紫廷雲路鳴琚傳奏簡天街擲火度流螢沈沈玉漏傳三鼓爚爚銀河燦萬星仙仗煙霄正凝想曉光浮動逺山青兩宋名賢小集巻三百五十八
