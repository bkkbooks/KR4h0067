body:
  text: 兩宋名賢小集巻三百二十九宋陳思編元陳世隆補華谷集嚴粲字坦叔一字明卿邵武人羽之族弟也登進士授清湘令嘗著詩緝與朱晦菴詩傳相表裏玉溪雪夜雪霽天夜白月上江空明飲散客就船萬籟沈三更誰家竹籬岸摸索疎枝横不著色與香令我毛骨清醉魂乗沆瀣看舞婆羅城獨往一逕厯紆餘獨往未到處豈曰嵓泉幽心閒即真趣蕭蕭松有聲依依花自開樵翁向我笑問我何從來昭君怨欲洗鉛華淨那須畫手工玉顔翻自誤不似舊圖中送黄炳未盡連牀話忽忽乂語離襟期無限事書寄若為辭昔别已十載重逢還幾時孤舟明夜月何處照相思望彭蠡萬壑氣交㑹今知楚澤雄水明纔辨樹霧合忽迷空逺浦沈初月孤舟亂去鴻䦨干已愁思漁唱入蘋風春晚向來得意在煙霞失脚黄塵負嵗華過却海棠渾不省夢中猶自詠梅花秋入秋入蘋風白浪生癡雲未放楚天晴青山湖外知何處中有斜陽一段明陽闗圖人人腸斷渭城歌誰獨持竿面碧波可是無情如木石祇應此地别離多月夜與張輯論詩凉露初長夜纎雲淨盡時幾人還對月與客共論詩苦思常難穏閒題或更竒不應誇末俗準擬古人知自樂平閲視渡舟取道太陽渡宿地藏院康山問民涉陽渡平地訟朅來招提宿疏峯結飛棟研丹啟囊書㸃勘自成諷佛香觸深悟僧茗來清供陽頽嵐氣生鴻没天宇空向來山中樂忽忽豈其夢盤谷圖聲利爭馳毫末間幾人能得健時閒不須展畫相撩弄昨夜秋風憶故山見梅絶憐生意上寒枝幾度巡簷錯恨遲數㸃疎花人未見窓間早被月明知春歸抵死連宵雨不休今朝晴景莫登樓杜鵑啼得春歸了風裏楊花㸃㸃愁薦福寺即戴叔倫故宅今號戴公堤石徑秋痕苔蘚深誰將清氣潤脩林戴公堤上古時月幾度凉宵照苦吟招提游幽尋愜所適蘭若白石靜天籟鳴松壑古意滿苔徑清泉醒客心啼鳥喚僧定留連不能去翫月歸路永又煩抱忽如遺僧境得清勝花發岩洞幽雲生窓户冷來驂樹隂直歸棹川光暝遺思山蒼蒼半空聞夕磬拾橡亭為黄炳賦世上危機富貴身由來著意鬼神嗔到頭鍾鼎誰消得正要山中拾橡人林和靖祠白雲人已矣古屋自蒼苔林下誤疑鶴水邊空見梅市人攜酒至歌女棹船回檢㸃幽棲處湖光似向來元上人見訪昔子青青佩重逢怪衲衣樊籠留不住雲水靜相依習氣餘詩句枯禪墮佛機東湖自塵外還帶夕陽歸憶張輯畏景如焚客路塵寂寥山店獨吟身多情唯有别時月低傍茅簷巧趂人宿石潭寺寄黄炳昨夜湖心共泊船一天星露宿寒煙朝來極目無洲渚知採蘋花何處邊畫梅蘭竹石正憶吟窓占竹坡風煙觸眼奈愁何梅蘭只作從前痩石上蒼苔别後多春恨馬上東風吹酒醒空將春恨到江亭飛香寂寞無尋處煙映晚山深淺青廬陵黄炳築亭所居侯山扁以赤子松自號赤松亭長之官鄂渚為賦詩仙人遺世不曽愁但欲相期汗漫游亭長祗今閒未得南樓孤嘯望神州霧中早行行人糢糊畫中影髙樹夭矯空際雲樓臺幾處半隠見三島夢斷猶紛紜秋思風落葉間殘㸃雨月窺窓下不眠人秋清一片無誰領併作詩愁入鬢新松雪隂崖未知晴松雪自在白可恨曉風顛飛寒亂苔石次韻宴坐畫圖京塵倦來歸故山喜還壁淡交松桂在昔别猿鶴憶晚知閒味深甘為幽討惑尚念身在山佳處恐未識看山須全境一覽盡目力伊誰有巨軸亭亭掛空碧吾聞古靈匠能事畧翰墨盤礴溟涬初太素含黼飾妙手幹元微錬此石五色天機一呈露真宰惜不得寫出萬古愁蒼茫思何極煙村帶逺市雲樹出峭壁有人閒倚欄飛鳥亦自適俗間重小景局促無竒特五日十日畫大類宋楮刻誰㑹悠然心醉來眠對客酴醿東風暖迸龍蛇起麗日晴烘玉雪香可惜開時春向晚不教桃李見清芳客裏客裏何知度嵗華春風香却一畨花山行轉處聞雞犬楊栁隂隂賣酒家紀夢煙島空濛一鶴飛天風滿袖自吟詩覺來猶似非人世花影欄干月上時送張輯游宣城君撫淵明底樣琴肯于絃上要知音相逢塵事不挂口别去清愁總上心聽雨夜牀孤舊約看雲秋壑想幽尋他年跨鶴相過否應笑浮名雪滿簮道中見茶花朝來露濕欲寒天誰賞幽芳古道邊風味十分留貢焙浮花正自不須妍巧夕添丁書來知有客喜夢應維熊久作庭闈别遥知笑語同充閭非我願釣瀬是家風莫學天孫巧朱愚肖乃翁琵琶洲琵琶古怨猶淒清何年一抺横煙汀人言隨波髙下如浮萍神鼇背負能亭亭不知水仙宫殿碧皎潔玉絃遥映雲錦屏黄沙萬里音塵絶獨與鸚鵡愁青㝠天際歸舟認髣髴江頭寒月傷伶仃悄然夜久天籟起往往恍惚游百靈秋風嫋嫋兮水泠泠俗耳箏笛兮誰能聽我眼如耳耳如鼻妙處不言心獨醒鈞天住奏三千齡石鐘水樂遺林坰豈有寳器終漂零一朝詄蕩開天扃帝命下取呵六丁陶梭共起變化隨雷霆古餘山色空青青池陽道中脱葉舞風過别岸濕雲含雨上晴天脩途喜借晚凉得幽鳥一聲生翠煙挽陳邵武前輩聞如此今人見未多難將通介論不在語言科胄監開華近樵川借撫摩鄉評最期望一夢只南柯夜投荒店戲成喚起吹松火開門問帶嗔隨行曽有未同伴幾何人亂稈鋪添薦殘籬拾作薪夜寒難得酒煩扣隔山鄰樂平至鳴溪渡有山與南豐軍山同名者余昔從嶺菴謝先生夢得游先生子湖畏友也豪于詩悦軍山之峭拔暢其吟懐自昭武徙家于市山築室曰西窓以朝夕對焉嘗命余記之余時從西窓樽酒論文為樂如是者十載今先生已矣感而賦詩江西絶頂挿晴空此地山名偶自同喚起西窓十年夢一樽何處酹詩翁重到地藏院泥濘行良苦青山且眼前題詩如昨日倒指已三年僧榻寒宵雨漁村落照煙薄游聊復爾終擬老林泉寄張輯不見吾張輯新詩何處吟身留江介逺秋入夜凉深燈影還家夢蛬聲倦客心歸來及佳節細把菊花斟建德縣梅山寺公退逢長日清游到寳坊山圍露天小徑遶引溪長苔壁晴雲濕松軒暑月凉鐘聲半歸路回首暮蒼蒼叨第後日者自謂竒中索詩兒時意氣漫騎鯨幾向欄干袖手凭今日逢君成一笑却慙窓下讀書燈風雨宿湖心渺渺平湖四接天孤洲曽繫夜來船持鞭又逐風塵去却憶秋蓬聽雨眠新晴滑路愁騎馬晴天好放船水紋揺倒壁花影弄晴川夢寐驅馳在光隂少壯遷心期猶浩蕩搔首白鷗前舟中夜雪落帆侵夜色客思正悽悽風撼瀟湘覆雲連宇宙低洒篷吹乍急欹枕聽還迷懶惰無清興誰人訪剡溪七夕纎巧逐時新誰將大雅陳天孫古機錦笑殺世間人送戴式之自小尋詩出江湖今白頭應嫌少陵讀不似子長游風雨夜愁枕鶯花春醉樓吟邊消息好懐古問沙鷗茅舍村居逺城市獨木渡塘坳迸筍補籬竹落松添屋茅童歸攜酒榼客至得鹽包隨分山中好低簷燕有巢憩田家晝問田家憩相呼隔短籬負薪髽引犢挑菜跣攜兒沙井和鰕汲村舂夾稻炊老翁評貴糶覼縷舊年時過江東落花時節過江東濃緑山頭間小紅野店日長春寂寂栁隂揺颺酒旗風騎牛圖乃翁騎牛驢䭾兒松間提挈羣僮隨驢逢短橋兒回顧牛背推敲了不知戲友人今朝有清興無處覔詩人寺占房空鎖窓窺榻有塵尋芳知尚早報謁未應頻只在城中醉烟雲滿澹津孤雁一雁度岑寂流空音響哀雲沙天地濶霜雪羽毛摧力小知機早心危見影猜蘆洲迷處所飛遶正徘徊䝉齋先生賦張通守佚老堂次韻拂衣歸共白雲閒佚老堂中天地寛黄髪可教供鞅掌青山聊足對髙寒杖藜行樂春風軟紙帳佳眠曉日團林下未應忘世事併煩寄語謝家安菊寒林色枯槁粲粲籬菊鮮冷艶無俗韻孤芳弄秋妍金晶與髙潔未覺陽和偏豈無兒女花誰能制頽年歐陽道士歸自臨安洞穴雲生窓户凉道人宴坐但焚香向來游遍王侯第還似山林意味長張輯馮去非話别此夕真成别幽懐欲語誰梅花霜月曉獨起咏君詩夜讀晉書南來未省有良圖可更清談傲五胡撫巻興懐千載事一窓風露夜檠孤午憩僧房黄塵吹不到僧房窓紙風翻葉葉凉觸熱行來牽晝夢孤蓬聽雨下瀟湘憶山中山中桂香滿無復向來游官事何時了一年孤負秋即事僧屋藏深塢漁舟帶逺汀誰教雙白鳥來㸃暮山青野興身閒歸未得野興日翛然抱牘無來吏尋詩即散仙盃明松鏬月座引石根泉有客知余意清風三兩絃重九後五日游齊山官癡縛辰酉節物如相負兹游未覺晚黄花落吾手没鷗江自迥晚葉山新痩淒凉千載心西風一搔首湘中千古懐沙恨淒凉何處論坐看宗國事安用一身存落葉西風岸孤舟半夜猿年年江月白為照獨醒魂寓京城和曽左曹韻日日思君君不知京塵染盡帶來衣客心正自傷漂泊更看湖邊花片飛車馬聲中又日斜可堪芳草思天涯來時憶别山中桂今見長安梔子花閒居盡日門前草青青不染塵生書方破巻幽鳥忽啼春失意成髙興多閒信懶身不須憂世事廊廟有經綸觀北來倡優見説中原極可哀更無飛鳥下蒿莱吾儂尚笑倡優拙欲喚新翻歌舞來李賈攜詩巻見訪賈與嚴滄浪游石屏新巻裏曽得見君詩大冊煩來教平生慰夢思髙標去塵逺古調少人知汝與吾宗好風騷更屬誰新竹樹頭不動天無風六月還當日正中唯有滿林新長竹别生凉意襲簾櫳月只道今宵月出遲雲間不覺上多時夜深花影如清晝何處山頭一笛吹二水聞角少日鄉閭不解愁閒聽畫角起譙樓西風依舊䦨干月獨自瀟湘萬里秋軍行野人自説老為農舊識戎裝紙畫中近日軍行渾見慣兒童嬉戲學刀弓子陵灘西風吹雨暮江寒想見當年獨把竿不是君王思故舊何人知有子陵灘一榻從容話嵗寒相忘共作布衣看雲臺諸子成何事萬古清風一釣竿汎湖四邊天共水漫漫身在鴻濛縹緲間忽見浮空清一抹舟中人説是湖山慈湖墨竹先生萬慮晝空時元氣渾淪可得窺還有發生消息在揮毫烟雨一枝枝戲筆偶然成此耳直將造化論錙銖不知茂叔庭前草有此風烟一段無未開梅老樹天機早潛回一㸃春寒梢方蓓蕾痩影已精神冷淡看前輩芳菲總後塵更須香共色未是鑑花人客裏客裏還來此寒燈耿獨吟一官江國夢十載草堂心木落秋聲小蛩孤夜思深驅馳空自許冉冉鬢霜侵戲詩友談仙君期汗漫游不敢問所適贈别亦何有當辦鶴一隻還疑是凡羽不任載仙質乗煙寧假此聊以壯行色淹留非牽俗應未得良日空令施肩吾久待問詩律秋懐秋懐不到夢厯厯數寒更坐得楚天白吟教湘水清殘燈揺壁影片葉墜堦聲起看孤城霧人間事又生初注清湘令寄馮深居去非深居定何處無便寄聲頻舊别芝山月相思楚水春白雲生夢逺華髪折腰新料得今書到看題笑故人上饒界首傷曽殊故人曽此賦梅詩人共梅花一夢非欲喚青山話前事西風吹淚濕征衣秋風門與姑山對溪邊有故廬别來三徑菊閒却一樓書水碓長腰米村船巨口魚秋風歸去好留滯意何如戲友人怪得詩情減一分知君為學有新聞塵中畢竟閒人少獨自開樽對白雲早行脩程避晝炎中夜征夫起蟲聲荒郊迥犬吠衡門閉行行月色淡微霞露天際永懐髙卧人幽夢繞蒼翠西湖何處春晴好西湖元已朝馬嘶堤上路船過柳隂橋敲竹鶴聲起弄泉花影揺坐看游客盡烟水思迢迢閏九前月登髙去猶嫌菊未黄秋風不相負特地再重陽顔范祠堂顔范新祠畨水陽邦人來此識綱常海波澒洞孤峯峭天字清明一鳳翔英蹟重尋餘古帖髙情猶想賦秋香姦諛骨朽今安在三歎前賢死不亡張德慶挽詩擢第家聲在通班宦路亨為親遲受邑未老謝專城活計詩書富嵗寒梅竹清閒中將道眼醉夢笑功名九衮猶身健聮麾見子榮笏牀歡節序鳩杖話平生世久傷零落吾猶及老成酸風吹苦淚一為典刑傾調古調古人能聽眉長世共妍家山夕陽外心事落鷗邊弟妹知何在風塵祗自憐孤燈照危坐不是少林禪道傍木犀路人攀折半成荒何似山中自在芳可耐西風相料理為誰消得許清香示園丁種竹宜疎延夜月澆花須早趂晨隂溪邊釣石勤時掃恐有詩人來醉吟舟中夜酌别鄧均共對船頭月通宵語未終鄉闗幾嵗别筆墨小時同江影髙低樹秋聲斷續鴻相逢渾草草明日又西東發清湘歸棹將秋色三湘是游勝灣回仍小嶼灘過盡平流臨水聞僧磬隈岩隠釣舟江頭每佳處沽酒小夷猶花樹移方活丁寧莫損殘待逢春氣暖開與後人看酒任隨車載詩從就柱刊料應吟賞處説著種時難栽樹未花開其如行色催遥憐今嵗雪誰看一庭梅餘俸刊詩巻歸程賣酒杯輕舟下灘穏鷗鷺莫驚猜繫舟古岸人家少蒼茫此繫舟閨中今夜月江上晚風秋一水縈寒夢雙鴻亂逺愁湘源知不惡吾意肯淹留夜行舟忽報風波息梢人倚柁看開船星斗轉吹笛水雲寒犬吠知村近鳥啼覺夜䦨兒童將白石敲火趂晨餐道中客思曉寒凝初陽樹外昇氣蒸茅屋雪聲裂野池冰倦路行偏逺思山隠未能僕夫愁過嶺遥指最髙層冬日同趙與臻閒過雷園地幽元在郭景好即為春相約同來者能閒有幾人風池行墜葉晴隙走游塵共爾烟霞契交情淡更親寄鄧均題書對殘燭幾日到江濆故里經年别清秋此夜分月昏斜映雨風細慢移雲數雁聲初過知君不寐聞任機宜新圃小劚煙苔地春生一笑間亭邀鄰圃樹臺挹隔城山幽夢壺天曉清時幕府閒旋移花盡活容我醉來攀岳麓寺幾層攀石磴髙寺白雲邊臺舊懐人古泉幽想鶴仙逺帆湘浦樹暮角楚城煙長是登臨處滄洲意惘然吟到湘江倚釣篷秋風日日望空濛偶來上到䦨干處却指孤城夕照中次韻菊花山人沈莊可見過之作借得山中集塵埃一半侵讀來知句好老去向誰吟髙義先投刺忘懐肯抱琴茅齋亦相約尊酒要同斟重過雷園靜處人來少園扉本不闗寒叢淒古徑落日思空山倚樹吟情逺臨池立影閒晚林看更好一抹冷烟還湘川逢故人曽共枌榆社分攜知幾年乍逢如未識相問轉悽然月色秋看白潮聲夜聴圓醉来共鄉語不覺是湘川兵火後還里十載青山幾戰塵還家何處訪親情兒時巷陌今難認却問新移來住人宿澤心自從孤棹背鄉闗幾度麻姑夢裏山此地不知何洞府石間松䕃水潺潺夜發湘城西風吹客衣一舸載書歸肯為身謀便而令心事違艪聲江月碎人影水烟微漸覺寒城逺沈沈擊柝稀雪梅報道梅邊雪未休披衣晨起上簾鈎孤根清健元如許空為花寒一夜愁定王臺觀雪清晨吟思獨凭欄十二樓中白玉寒此地古來風雪裏有人惆悵望長安有客有客翩翩来手攜瘦筇竹傲睨若無人風神動岩谷主人延客入山中酒新熟飲酣出素書古篆不可讀欲問度世訣長嘯振林木軒然别我去舉頭但黄鵠樂齊顔巷當年事同門自少知誰言公子貴心與古人期望栁尋花意吟風弄月時人琴無處問空想考亭詩琴孤松風下絃秋清湘江湛湛湘山青一聲吹入天㝠㝠何處野鶴飛来聴菊秋籬霜露寒獨立爾良難不作過時恨從教耐久看風流沾臘蘂臭味憶騷蘭孤淡逢心賞幽香故未䦨大虎頭灘聞説前灘大虎頭行人愁絶欲回舟世間多有虚名誤不見錢塘海逆流到清湘客裏今年月相逢九處圓行窮湘水際愁到楚雲邊屋内燈明路椽間瓦見天州城何處是遥指隔山烟旋摘盆柑金丸手自摘色味香三絶從來天者全風韻迥然别兩宋名賢小集巻三百二十九
