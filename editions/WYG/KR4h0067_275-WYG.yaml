body:
  text: 兩宋名賢小集卷二百七十五宋陳思編元陳世隆補石屏續集三戴復古九日今日知何日他鄉憶故鄉黄花一杯酒白髮幾重陽日晚鴉爭宿天寒雁叫霜客中無此醉何以敵淒涼郭外翁郭外生涯少城中糴米稀種花無處賣挑菜入籃希風撼傾欹屋寒生藍縷衣此翁何所樂談笑傲輕肥山村野老幽居處成吾一首詩桑枝礙行路𤓰蔓網踈籬牧去牛將犢人來犬護兒生涯雖樸畧氣象自熙熙呉門訪舊孟良夫侍郎有藏春園去此十三秋重來雪滿頭鏡顔加老醜詩骨帶窮愁鳥語新晴樹人尋舊倚樓藏春門下客一半落山丘登祝融秋風吹拄杖直到祝融巔目擊三千界肩摩尺五天扶桑暘谷畔青艸洞庭邊雲氣無遮障分明在眼前山中少憩地僻人稀到山寒氷欲氷聞鐘知有寺見火不逢僧斷隴森喬木頽簷挂古藤清溪照孤影詩骨痩崚嶒鄂州戎治靜憩亭幽亭何處尋巖樹碧森森獨坐生雲石少安經世心伴人雙鶴立多事一蟬吟提劍翻然起中原秋草深趙端行杜子野遊虎丘有詩僕因思舊與趙子野同宿唱和留韻出城十里許有此一山門丘在虎無迹池清劍有痕孤松冠巖頂萬竹繞雲根借問東軒壁舊題存不存杜仲髙髙九萬相㑹杜癖詩無敵髙髯畫絶倫笑談能不朽富貴或成塵今古多奇事乾坤幾怪民相逢不容易一醉楚江濱懐趙徳行學慈湖從趙元道遊所學源流逺澹交滋味長看來渾易與别去自難忘獨客夢千里佳人天一方細觀賓退録亦足慰淒涼鄭南夫雲林隠居一來陪勝踐再到惜蹉跎記得山中景行尋竹外坡天寒梅信早海近雁聲多煙渚蒲州外時聞欵乃歌白鶴觀荒徑行如錯蟠松看轉奇鳥聲人静處山色雨晴時賖得溪翁酒閒尋道士碁箇中有佳趣莫怪下山遲三山宗院趙用父問近時因舉今古一凭欄夕陽山外山兩句未得對用父以利名雙轉轂對上句劉叔安以浮世夢中夢對下句遂足成篇和者頗多僕終未愜意都下㑹李好謙王深道范鳴道相與談詩僕舉此話鳴道以春水渡旁渡為對當時未覺此語為奇江東夏潦無行路逐處打渡而行溧水界上一渡復一渡時夕陽在山分明寫出此一聨詩景恨不得與鳴道共賞之世事真如夢人生不肯閒利名雙轉轂今古一凭欄春水渡旁渡夕陽山外山吟邊思小范共把此詩看一夕夢與邵武守趙用父邵武宰王子文浦城宰陳叔方相㑹甚窽詩以記之鼎足當州縣别來音問稀故人俱顯達吾道亦光輝三鳳夢中見孤鴻天外飛應憐江海客白首未成歸焦山江接海㝠㝠山連島樹青似非人境界宜有佛宫庭藏壓蟠龍宅潮渰瘞鶴銘西巖更清絶心與酒俱醒金山水湧孤峯出波聲日夜聞重巖載華屋雙塔礙行雲天地八窻迥江淮兩岸分登臨多感慨北雁又成羣訪古田劉無競潜夫宰建陽有聲人言自有建陽無此宰前説建陽宰古田今似之難兄與難弟能政更能詩文字定交久江湖識面遲人傳花萼集俱受水心知濠州春日呈趙教授體國栁似眠初起梅雖老可觀氷開春水濶風暖雪泥乾得酒忘為客談詩不論官無人知此意一笑對黄冠自漳州回泉南主僕俱病遣懐雅興難忘酒羈懐不耐秋坐窮思賣劍扶病强登樓適有座中客來從邊上州所談驚老耳身世併成憂舟中九日水澀勞牽纜天寒早雨霜沙頭沽濁酒船上作重陽籬菊一枝痩溪魚三寸長客中成小醉亦可慰淒涼哭㵎泉韓仲止二首雅志不同俗休官二十年隠居溪上宅清酌㵎中泉慷慨傷時事淒涼絶筆篇三編遺稿在當並史書傳忍貧長傲世風節似君稀死後女方嫁峽中兒未歸門人集詩稿故卒服麻衣㵎上梅花發吟魂何處飛江上夜坐懐嚴儀卿李友山江清天影動樓近角聲雄楊栁枝枝月芭蕉葉葉風佳人難再得良夜與誰同别後從何晤新詩句句工兩宋名賢小集卷二百七十五
