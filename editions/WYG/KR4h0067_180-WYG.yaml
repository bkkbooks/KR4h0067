body:
  text: 兩宋名賢小集巻一百八十宋陳思編元陳世隆補葆真居士集折彦質字仲古雲中人父可適知鎮戎軍有武略夏人畏之彦質以䕃起家紹興中累官至僉書樞密院事初趙鼎為相屢薦彦質後秦檜専相以彦質為鼎所引郴州安置自號葆真居士過太平州拜李端叔遺像東來己數月弛擔已渺茫猶喜菑患身獲登先生堂肅衣拜遺像依然雙頰光宛若侍坐側妙語發天藏厄窮出天意人理難度量所幸言不朽與世為文章齎此復何恨私淑良不忘小郎出見我問知雛鳯凰他年起門户塵滓濯秋陽世事㡬變滅人生真黄粱置之不足道感慨涕泪滂我行方有程墳山空相望觀汪丞相所藏崔白畫羅漢山堂漠漠開曉烟何許大士當四筵坐忘黙識形骸外持鉢植杖風露前老龍欲奮屢回首於莵甚馴非畏鞭小兒巳解辨人我抱頭怖走成癡顛豈知畏愛果何物手裏舍利空燭天嗟余耳目更淺陋喜歡獲遇希有縁神明泰定始一笑摩挲粉墨心茫然平生崔白畫常見邂逅入眼多棄捐莫言人物斗竒崛醉裏落筆神助焉汪公昔入魏帥幕嘆息鉅壁圍神仙歸尋十疋好東絹恰有名手能摹傳提擕萬里到嶺表尤物自得髙人憐邇來刦火壊諸有陪都正苦紛戈鋋無力挽河為吹洗披圖感極淚如泉湘山留别寓久渾忘客臨行似别家途窮身更怯秋老鬢先華生計黄茅合歸期碧海賖湘山今夜雨留我意無涯跋浯溪造極圖浯溪未到已登臨筆力能窮造化心我是零陵新逐客披圖一一可追尋跋湘西清絶圖與山分淺正傷神蠟屐明朝陌上塵誰寫湘西清絶景巧移林壑慰行人超然亭超然亭上鬢毛斑浩蕩秋風小立閒豈為詩情堪過海只縁脚力要尋山峭峰斷續天容缺髙壘縈紆地勢慳回首不堪東北望桂林萬里是秦闗濯纓亭澄練正縈檻髙屏近擁門偏宜雲慘澹更好月黄昏兩宋名賢小集巻一百八十
