body:
  text: 兩宋名賢小集巻一百八十四宋陳思編元陳世隆補李敷文詩集李易字順之江都人好學多聞以清素見稱建炎初髙宗駐蹕維揚䇿試進士易為第一以上憂勞辭聞喜宴從之授僉書江隂軍判官㑹金人犯江隂至夏港距城數里守臣胡紡謂易曰吾曹義當死城郭君有母宜亟避之易歸告其母母曰我去則汝必無意堅守死生當與汝同之聞者感泣既而金人疑有備引去紹興元年為太常博士韓世忠辟為參謀轉工部員外郎為太常少卿自建炎維揚之變宗正寺所掌四書曰玉牒曰仙源積慶圖曰宗藩慶系圖曰宗支屬籍皆逸於江滸至是易請編次玉牒從之遷中書舍人改直秘閣知揚州以本貫辭不許官至敷文閣待制提舉江州太平觀以疾請卒於秀州竹西懐古淮南昔繁麗富庶天下稱管弦十萬户夜夜聞喧騰不徒竹西寺歌吹相豪矜一朝烽火急㕓市為溝塍風月無歡場睥睨皆射堋荒荒野月白照地如寒氷自從畫江守嵗嵗輸金繒蕭條閭井間水旱又頻仍我來經故里日暮此一登隋唐倐己往遺跡㡬廢興江山極蒼莽望之涕沾膺居剡寄鄭天和金庭洞在桐栢山山髙一萬八千丈中有神仙不死區郁郁黄雲覆其上透岩流壑繞四旁面勢參差皆意向雞登天姥有時聞鶴在沃洲何待放彩衣大勝宫錦袍白髮奉親仍敬養異才爭出輔清朝爽氣自驚逰碧障古來無位有重名吾家謫仙陸魯望平生願到猶不諧矧復區區走俗狀桃源康樂舊鄉存路接風煙甘逺往渡江正謂九華丹石筍飛泉歸指掌鸞翔鵠浴傳異時列岫方池閒想像剡溪隨處可卜居乗興扁舟正相訪三懸潭在貴門山半泉湧如噴三潭瀦焉上兩潭中有石碐相界下滙一大潭鹿山今是貴門山原名鹿門山朱文公改為貴門盡室携扶萬壑間流水相隨真自悟遥岑一望若為攀風翻竹塢清如洗月過松扉静不闗潭底卧龍煩一起正須霖雨濟塵寰題剡山所見剡中無數野薔薇黄雲爛漫相因依玉杯淺琢承墜露金鐘倒挂揺晨暉斑竹筍行三畆地紅藥花開一尺圍豆角嘗新小麥秀來禽長向櫻桃肥歌舌隨風桞外囀翠花帶水煙中飛魚跳破浪奮赤鬛鶴唳投松翻縞衣鄉闗萬里久無夢巖壑四年今息機叮嚀杜宇往江北為喚故人令早歸卜居獨秀山訪戴溪長近若耶金庭雪對赤城霞沼從鵠舉添蕭索峯似鸞翔解嘆嗟每愛林間百種蝶難忘竹外四時花剡川圖上他年指獨秀山前是我家貴門卜築貴門山在剡縣西南亂後亦擇居筮山山輙許居民百餘家喜甚手欲舞云久聞公名此幸殆天與感兹鄭重意時節共雞黍剡川非沃野地僻民更窶趂時務擷茗餘力工搗楮寡婦念遺秉洿池憐數罟我欲教耦耕盡力循南畆桃杏種連山深居可長處東鄰有節士酒酣乃發語公昔起布衣髙誼掩前古親擢類平津决見逢真主兩宫佇六飛萬乗思一舉交侵正倔强蠭起益旁午浩然公獨歸偶出寜有補黙塞復何言長嘆汗如雨剡溪幽居勝絶剡溪邊巢枝度半年燕回銜落絮魚涌接飛泉丹鼎山頭氣茶爐竹外煙幽居己成趣佳句若為傳咏吐綬鳥昔人仙去斷丹梯憔悴深山吐綬雞百轉和鳴非我事漫將錦服擅幽棲仙人洞雲巘分佳茗風潭矗怪松書疑黄石授税可紫芝供抵玉那驚鵲探珠欲近龍晚來聽近雨乞水濯塵容羅漢石在貴門山數石類僧踞水涯相對危坐故名鐵騎侵淮海龍潭碧始通雲生倚寳刹月出見珠宫瀉澗水噴薄依巖樹鬰葱神交難獨擅吾黨契元同珠溪玉龍劈山開南騖肆奔猛風蕩雪濛濛月流光炯炯壯氣動貴門前驅入蛟井萬籟息中消一區臨絶境奔雷有餘音垂磬得深省白雲何所聞就宿孤峰頂兩宋名賢小集巻一百八十四
