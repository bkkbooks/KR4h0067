body:
  text: 両宋名賢小集巻二十五宋陳思編元陳世隆補伐檀集黄庶字亞父號青社分寧人少嗜學有大志慶厯二年時年二十五以詩賦登進士歴佐一府三州皆為從事生平抱負竒偉卒未一展皇祐五年自編所作詩文二巻題曰伐檀葢取素餐之義以自識愧云子三大臨庭堅叔達偶書此心為地把書耕若問生涯指六經欲語世人真富貴胸中珠玉又無形讀赦書詔書一尺洗寰瀛舒巻雷霆萬物驚天祗無私均雨露地縁强半是榛荆人間疾苦言堪療塞外豺狼腹未盈不是朝廷用桑孔丁寧渾只念蒼生遣懷六載紅蓮客差池又一年無人和白雪有意補青天肝膽論興廢詩書謁聖賢尊中古日月窮達付陶甄山居獨酌山寒未放春消息獨把單醪慰寂寥書對聖賢為客主竹兼風雨似咸韶醉鄉城郭燈前到愁賊戈矛盞厎銷野菜溪魚隨分有不堪回首呌簞瓢春日閒居韁鎻身閒似未名方愚情性被春輕酒教筆硯因花廢路為亭臺與草争野客笋邀煨短茁隣僧茶約煮新萌無時杖屢穿林去真是尋芳户一丁贈山寺僧慵飽浮圖世共憎蓬蒿師獨養牛耕田驅白石年常過林印薪青歳旋生竹似子孫憐笋茁樹添松柏補風聲眉頭怪得春來喜雨起蔬苗粒粒成寄子蒙授常寧令疎率君堪愛無心官又高身思眠白屋人勉著青袍去冬調官京師于銓吏不得意欲致其官而歸予止之號隠疑名福前為寧鄉尉自號吏隠貪歸似姓陶常寧邑雖小應合得牛刀靈竹俗傳孟宗所泣斑竹也今為卾州寺緑隂清韵竹蕭然歴歴當年泣淚㾗千古舜妃湘水底必應憔悴有慚魂山水卧屏林泉生長厭應難更寫方屏幾曲間仕宦東西苦無定此心長似宿山家和劉卿材十咏耕者四海兵今息耕夫未得知黄梁不敢喫盌尚半蒿藜牧豎逐處隨青草生來不識愁旱田乾欲死拍手也須謳紅樹幾樹濃于茜斜陽景最幽忽因風雨盡全减十分秋野廟中國浮圖盛祈禳漸不過吾民非獨困山鬼恨尤多堠子一堠居市㕓百堠居林莾土木若有情山中亦惆悵水鴨憶在山中日溪邊把釣鈎相逢恐驚起招手却回舟溪聲至音不可收今人滯形器欲知古樂心山中此聲是草市衝市柴魚集應山雞犬號問知人苦樂米價不須高龍潭寂寞真龍去雩壇血不乾世情多冷煖對此鼻辛酸溪橋憶得别離日鄉橋桞脚斜讀君詩一轉全似到吾家觀雪疑是天公戯都傾海作鹽松筠知不變丘壑見無厭清為詩家極寒因酒户添冬溫成俗疫得此勝針砭酒千載醇醲意長隨麯蘖新解將今日月轉入古乾坤悶至勝良藥愁來敵故人幾杯聊酩酊五斗趣還均登鄭氏閣林泉無價自由身韁鎻登臨趣未真望處好山俱得力夜應明月不孤人任從心外煩於蟻長對尊中别有春當日若知風物勝定攜雞犬過江濵前山皆秀可愛予家亭閣不能見故云立春此日春方到春心亞舜堯勾芒如稷契大蔟似咸韶衡柄三陽把陶鎔萬物翹家家助和氣剪綵作花飄題人移牡丹林上春來恰恰忙安排顔色與春裝栽培欲報應先發根祗誰移不改芳紅藥便隨心减價黄蜂偷喜蜜添香憑君剰釀㸔花酒待挿花枝滿首嘗探春雪裏猶能醉落梅好營杯具待春來東風便試新刀尺萬葉千花一手栽笻竹杖琴鶴為友朋出入常拂拭生來節便高故有扶危力題東寺柱竹風松月牢於鎻闗閉人心物外情燕雀聞經俱已慣歸來不怕讀書聲教繩權學書偶成文字有縁曾弄墨楚俗子生周一年其日陳食飲硯墨金帛之具從兒戲㺯聚家人觀以為樂繩時先弄墨見來官小免咨嗟喜將筆硯傳生計不失詩書作世家字識姓名能指㸃寫因梨棗不傾斜著鞭莫落時人後三十塵埃監汝爺次韻答王甫判官塵埃蹭蹬落麤官賴有詩書可自安人到聖賢由感激國施鐘鼎為艱難須期燕骨千金價莫動黄陂萬頃瀾窮達功名無早晚好山宜且醉吟㸔致政吳侍郎挽歌詞千里資甘㫖今資政守京兆凄凉一日遺為臣如廣受生子似臯䕫筆硯諸孫哭謳歌幾郡思公屢為二千石秦人失太守翻有怨天辭荆棘二疏路幾人同撇衣仕塗師白髪國老欲疑誤彤幃遺篋詩書滿行旌雨雪飛陜民應淚落不見板輿歸今資政自陜移京兆署中新栽竹移作園亭主栽培霜雪姿不辭桃李笑只待鳯皇知少已留風住踈宜待月篩相㸔時一醉誰道小官卑和題雲臺觀太華疑挨畢昴回欲觀形勝上雲臺雪中地把銀屏立雨後天將畫軸開景好更宜和月㸔客忙常是愛山來我知遊者登臨意常恨西軒落日催都㕔誦書偶成主人調鼎手千里刃迎虗暗使民如堵能容吏似樗莓苔眠杻械雀燕聽詩書刀筆應無補身為白蠧魚題公美庭前蘆長安只説誰花好君把青蘆砌下栽鳴雁也知人好事幾時銜得入闗來和公美季秋書事知君行縣樂經見飽朝昏禾黍富年户牛羊落日村趂雲㸔華沒衝雨渡涇渾頗得詩家助聊應慰旅魂送石都官赴闕為郎四十者堂有二親稀止仰官為養行應淚在衣白雲偏佇立黄犬好頻歸去有山公啟天心正似飢長安賀晏相公生辰衙鼓簮紳動靈椿薦壽醪吾君合堯舜此日降伊臯紫誥文章老丹青事業牢乃疑誤朝尊柱石千里輟鈞陶民即謳歌借霖應夢寐勞秦人下車樂逺邇賦崧高公下車始五日次韻和言懷五常為種耕情性天意寧分有與無史解戮人惟戮古地能埋死只埋愚青雲易把詩書買白髪難停日月驅顧我無才背時俗浮名早晚見歸途和子玉病起遊書齋蕭齋久不往筋力試笻初牕户蝸涎鎻塵埃䑕跡書病魔雖已去詩癖竟難除苔地欣重掃徘徊意有餘依韻和舞陽楊令九日羊川小飲之作青帘白屋得新醅坐待村童買果迴旋撚野花為泛菊更尋山路作登臺世途已把灰心死罇酒聊同笑口開多謝晚禽知客意歌吟來往勸餘杯謝趙太傅遺聚米圖經圖經其子宣事舍人珣所作文武生賢子羌圖帝所多始欣知馬援終嘆失亷頗定川之後宣事死之蒼䑕巢遺藁黄埃鎻舊戈逺人猶偃蹇掩帙淚滂沱哭水丘隨州無逸卧理隋疑隨民欲問安訃郵俄至廢朝餐秦川舊會歡如在漢水新書墨未乾丹旐已歸人寂寞素車徒有淚汍瀾時情冷煖尤無味一臂相知在肺肝席上送韋中舍歸襄陽如君七十少梨栗有堅牙琴杖新行李雲泉舊世家尋求栽樹法拂拭釣魚車獨羡今歸去青衫脱有涯次韻和真長新春偶書東風寂寞掩柴闗時苦删文筆凍乾只把詩情磨世態更憑酒力禦春寒塵埃不必頻彈鋏巖石終期共掛冠歎息長安名利者乾坤未似斗筲寛伊川喜雨尺雨乗春慰望深家家倉廪一年心伊川父老還知否此是隨車傅説霖送真長書記知舞陽塵土淹沈客詩書夢寐身又辭千里幕去布一同春路想多歸户舞陽地薄民多逃亡庭應絶澇民舞陽地下歲大雨河波輙澇青衫莫嗟嘆知己在陶鈞飲張承制園亭百年生計一張琴敝軫枯絃抵萬金世上幾人曾入耳罇前此日是知音清風明月虚無境白雪陽春寂寞心莫訝南薫沈聽久致君基業用功深和陪丞相聽蜀僧琴小園豈是春來晚四月花飛入酒杯都為主人尤好事風光留住不教回八日探菊行遶墻邊菊躊蹰賞物心秋風應有意明日是知音酒惜浮花醉詩留把葉吟兒童欣佳節撚蘂試黄金市得笛竹簟因成詩八尺枯氷簟一筒小軒拂拭趣誰同罇前聲負千杯月牕下光贏一枕風易向曲肱增意舊詩因仰㸔有新功蠧書圍遶高眠處夢與塵埃路不通廬山道中遇黄介夫因寄四十字冷日蒼山下相逢笑又顰文章已膾炙名位尚埃塵昔見纓嘗請今言雉欲馴介夫新授安邑令妖氛滿南郡忍醉解池春次韻和雪霽遊西湖雪會遊人意元朝變物華醉鄉銀作界詩客玉為家魚影紋冰縠禽蹤篆霰沙餘英恐銷盡目斷夕陽霞次韻向元伯春晚有作好花未得千塲醉風雨飄零又一春自是勞生無暇日芳菲何處解孤人次韻居正暮春感事物報春光去已深殘紅滿地緑成隂曉花便好吟詩惜餘景應須載酒尋歡意莫教時節挫窮愁自倚歳寒禁園亭况是登臨勝何必流年動素心次韻元伯西軒桃李李白桃紅氣味奢早須分付醉吟家春風春雨難期信便是無言做落花望春偶書信馬尋春上古原天工一幅繡平川花應笑我將詩句便當遊人費萬錢次韻居正四月牡丹四月殘紅日日稀平陽園檻正芳菲春知東館酣賔客應是陽和未放歸和元伯走馬㸔牡丹城中走馬趂殘春探取紅芳日日新何事有花不吟醉姚黄魏紫屬閒人次韻元伯初夏南洋河即事芳菲已去絶音塵臨水踟蹰景又新應是溪源來最逺落花流水洞中春次韻子儀初夏偶作醉紅方寂寞吟緑又裝成雨急荷宜聽清風簟可迎燕忙諳物態花盡見時情獨有無言意不知枯與榮㸔春牓偶成每㸔春牓獨嗟咨蹭蹬塵埃已十朞韓老有知應笑我歸時無計只癡兒陪丞相遊石子澗賔吏親攜澗底行潺湲風遞似相迎只應山鬼知公意乞雨新添瀑布聲澗下禽魚識上台聽泉履跡徧蒼苔巖邊不欲踟蹰久只恐商王夢逺來次韻和真長四季牧童許昌怯雨宜晴不識愁去隨青草牧春牛無人古路歌兼笑歸去山花挿滿頭曉牧侵星大暑天晝尋芳樹緑隂眠惜牛不使衝殘日歸帶黄昏飲小川角穿黄穗手横笳不省人間有鬢華落日西風歸去路枯桑黄葉兩三家枯笛手持無律吕清風曲調逐時新數竿冬日渾無價暖靠牛眠不教人次韻元伯曉出白門山形雲染翠屏曲溪色練鋪銀漢東樓臺一軸古今本行者往來圖畫中栽竹小檻栽培得此君緑隂踈韻似相親從來風月為三友吟社新添客一人嵩山峩峩鎮中夏峻極萬尋隮突兀磨天頂窈窕入地臍中林興夏雹半壑卧秋霓泉恐連青漢峯疑擁碧圭雲高千里見雨到八方齊渤海㸔如帶青㝠上是梯醉堪捫日月吟可摘婁奎翠葢何時動金為玉檢泥隠真齋庭多怪石小詩求數株曾經禹貢清泉骨禹貢青州岱畎鈆松怪石今是莓苔幾世孫知君突兀滿庭户乞我雨中雲數根和元伯中伏夜雨南洋河水泛雨洗三齊中伏月乖龍連夜起雲門青之南山有穴出雲故曰雲門溪聲斗似銀河落驚斷詩書一夢魂登鄆州谿堂古鄆州有谿堂與州偕廢其地去今治所十五里好事者跡其名為之韓公詩石存焉仁智模來物狀親登臨宜入古圖身慣看韓老詩中景樹色泉聲似故人中秋夜月人間共賞中秋月酒社詩家意味長天上必應霜露早桂叢凋盡飽青光輦上會里人子蒙飲秋風吹客衣歸思入夢寐相逢在千里一飲勝百醉果脯隨分列不减到家味平生金石心顛倒獨莫棄何時不搔首共話醫國計恨未得杞梓欲把斤斧試塵埃鞋履穿各走車馬地唯兹栖栖懷酒椀可以慰探春春色若有價黄金量山丘幾擬把酒吟浪欲開口酬今朝庭桞枝抝折絲已柔東風弄五色漸落草木稠我營賞春資甕盎蟻已浮山川天開盡秪擬酩酊遊對花詩昔甫白在造化困刀尺我生幾年後浪自鐫頑石對花獨把筆好句恨莫得萊陽與采石孤墳沒荆棘幾欲肉白骨再挿風雅翼海為一杯酒地為一領席醉坐吟萬物話出埋霹靂乾坤髓可掬鬼神淚可滴人生貴適意身是天地客糟牀不可乾吟紙須强擘花落若解醫有金費干鎰和白雲菴七首白雲菴白雲無種滿地生有時出山為雨露老僧惆悵望雲歸盡日庵前自來去清風軒老僧栁榻人不知獨與清風自來去朝昏晏坐向軒中此身便是清風主宴坐臺老僧坐見萬物空徃徃終日居此臺破衣兀坐若枯木山鳥不怕行莓苔醒石老僧拂拭待遊者雲骨一片莓苔青塵埃萬事心若醉到此不覺令人醒磬石古樂破散鄭衞起走入萬物不可名山中惆悵莫能到疑是舜時韶一聲明月臺老僧山中嫌月窄夜夜獨上高高臺四邊不肯著間樹故要滿坐清光來白石澗林間旋叠石為路日日自汲澗底泉老僧意趣似童子洗手濯足聽潺湲登扶風王宗元山亭雲收南山頭太白青崔嵬我有泉石夢坐對懷抱開小池數斛水渉鳥來毰毸遺翎與行跡縱横在蒼苔憶得釣磯上到家如一迴蔬畦參差緑採掇助酒杯痛飲不能去遶竹猶徘徊主人林巖癖笑傲蒼煙堆心憂百里病良田正黄埃欲知主人喜雨抱山脚來圖經云太白之半有横雲如瀑布則㴻雨常以為候故語曰南山瀑布非朝即暮時久旱始得雨以為喜故云賦得退之畫像功名已寫後來耳身入人間圖畫㸔嘆息浮圖滿天下猶疑怒髪上衝冠遊石甕寺飛泉自有迎客意聲到山前入人耳泉聲引行不知疲石路磽确折屐齒長安睫滿車馬塵林嵒夜夜來夢寐雲煙郊原鋪古圖心眼開快明如洗渭流屈曲成大篆書破野色為緑紙丘墟沈吟古興廢秋風正入紅樹起折碑斷垣卧荆棘意思紛亂不可理窮幽更下蒼崖根把酒坐聽潺湲醉山花似欲勸苦飲時散清香入人鼻奔走恨不身長遊喜寫姓名藏薜荔喜雪長安雪一尺朝扉失南山生喜疾疫消敢避衣褐單闗中西征後所向饘粥慳去年新錢敝千里成凋殘漫漫豐穰候風俗開容顔秦人飽稼穡共望倉廩寛幕府俸薄少藜藿日滿盤明年麥定好慰喜聊加餐次韻和松逕行人旱亢日共䕃蒼煙姿豈識雪霜心但輕螻蟻皮中為棟梁用莫嘆斧斤遲樗桞盡犧象後凋終不衰登大雲頂區區霸迹欲知小試上大雲孤頂㸔老僧指我日上處鏡靣瀉出黄金盤送黄景㣲西逰晞先生古肝脾久恨不得識唯聞公卿家要作門下客千載卞和淚争磨薦書墨姓名落四海履雜車馬跡塵埃十載衣幾度改顔色紛紛九衢中拭眼見珪璧敝褐埋衆人胸肺無丈尺從來飢渴心既見轉不釋斗酒聽語論今古吐白黒秋入汴桞枝買馬欲西適寇方豺狼驕似漢子弟國予知弱諸侯必得主父策謝劉簿李尉見訪詩書卧篷蓽柴門晝方開邑官劉與李馬蹄破蒼苔林居厭鼃黽喜振敝席埃見此六翮姿茅荆共徘徊我欲駐車轍蔬果傾舊醅山花恨未饒何以助酒杯今古飽夜話痛飲勝百迴春風旌斾滿匏𤓰去難陪送郭評節判磨勘塵埃衣襟改顔色獨洗青衫三十年足跡不入奔走途來徃銓户鞋履穿一時同上青雲人徃徃裨補造化權朝梳滿手見白髪歎息不置齒牙間只言歸田有幾畆種秫欲釀山中泉腰邊即見佩銅墨我喜百里瘡痍痊登見山樓太守終南為客主出入厭倦馬與車與山朝夕欲還徃作樓近在室一隅主人去久山寂寞正值青帝催焦枯我拘簿書甚杻械擺脱步上提酒壺郊原猶未見春色似據水墨長安圖也知好景天更惜高峯常是雲糢糊安得風伯持大篲掃洒百里如屏鋪顯昧萬狀古詩國收拾可秃千毫書我來願作風雅户醉倒坐待明月孤去家若有巖下夢免復夜夜尋歸途和題竹軒小軒移得清風枝知君公退來忘機山禽自識主人慣客到有時驚不飛下碁古人欲寫得喪形萬事畫在方罫内黑白勝負無已時目送孤鴻出雲外暑軒夜坐夜氣入庭樹小軒坐前簷清風動巨箑浮雲捲重簾月遲待友舊蚊噪憎䛕讒輕凉若可買金願量谷巖聞蛙佞舌兒女柔異教蜩螗喧豈能聽蛙黽静枕詩書眠能一作如憶竹亭蓬萊楚山底傍舍竹四圍狂鞭入門户亂筍争牆籬與竹事還徃相對一束書壯長走世路駑駘强鞭笞塵埃客灞滻逺夢夜夜歸小亭久不理漏棟生白芝偶放簿書筆杖履改舊詩呼童誅蒿萊掃洒莓苔基誰庭無花卉憎有兒女姿獨移蒼煙本慰我千里思生生山林趣亭園有光輝免使清風來留在桃李枝月明遶竹步撚脱頤頷髭相向若知己動搖影參差人間欠藥石稚乳驕羗夷青衫汗汙垢寸尺莫可裨忍作倉廪盗寧老詩書饑養筍為釣竿早晚耕蒿藜和白塔寺四首四開亭亭前流水醒客耳亭上白雲開客顔老僧有意厚來徃四開更令㸔好山聽泉五音入耳大聲散情性破碎不可完而今虞舜欲儀鳯願獻泉譜為詔源疑當作韶源芳亭峩峩佛屋遍四海志士歎息傷容顔高僧淳拙有深意獨自結茅山水間水閣山僧聽泉心不足鑿池汲引為蟾泓自言猶欲洗俗耳夜静為聞鼃黽聲和暑雨偶書暑如煎烹欲狂走猛雨如洗沈痾瘳寧知詩書一枕夢便作桃李三春遊蛙蜩呌噪若交舊蛟蠅癡鈍如仇讐今君病起正高卧莊蝶處處宜相求漁家挿屋數竿徑穿籬幾尺船水鄉菱芡足不著免租錢時江南訴旱宿趙屯蘆花一股水弭楫日已暮山間聞雞犬無人見煙樹行逐羊豕跡始識入市路菱芡與魚蟹居人足來去漁家無鄉縣滿船載稚乳鞭笞公私急醉眠聽秋雨此詩與大孤山一首山谷嘗手書刻石于南康府星子灣有跋見别集宿采石李謫仙舊墓秋風宿蒹葭花落若霜雪江山古興廢荆棘壘出沒水收鳬雁聲夜静寒籟發漁舟自來去笑語載明月詩形動筆墨恨乏風雅骨謫仙為黄土冢平名突兀句編天下口千載字不滅人間比興復泉底魂魄悦坐誦姑孰語酌酒當棗栗醉夢若可見好句當須乞謫仙有姑孰十詠擬歐舍人古篆𨽻書滿紙籕文廢字法破碎失本根中間陽冰入篆室下筆日與丞相親㸃畫各得萬物體科蚪筋骨千載新泉銘學語童子知大厯幾字名忽振足知古人自負恃碑峴巨石垂千春篆字堆積天下字晚得紙本如希珍鋪舒牆壁動人眼直木曲鐵若可捫人為黄土久寂寞略不訛缺纔鱗皴我疑山鬼恐漫滅徃徃鐫鑿施斧斤公來醉吟江山國得之愛嘆何慇懃刻詞猶恨紀不足句句與古風雅憐一旦紙貴文字市鬻詩賈篆聲云云蘇梅鸞鳯相上下鄙語燕雀何能羣蘇子美梅聖俞同有此詩大孤山彭蠡百里南國襟萬頃蒼煙挿孤岑不知天星何時落春秋不書不可尋石怪木老鬼所附兹乃與水同浮沈鳴鴟大藤樹下廟祭血不乾年世深軸轤千里不敢越割牲釃酒來獻斟我行不忍隨人後許國肝膽神所歆落帆夜宿白鳥岸睥睨百遶寒藤隂銀山大浪獨去險比干一片崔嵬心宦逰逺去父母國心病若有山水滛江南畫工今誰在拂拭東絹傾千金右與宿趙屯同載石刻汴河汴都峩峩在平地宋恃其固為金湯先帝始初有深意不使子孫生怠荒萬艘北來食京師汴水遂作東南吭甲兵百萬以為命千里天下之腑腸人心愛惜此流水不啻布帛與稻梁漢唐闗中數百年木牛可以腐太倉舟檝利今百於古奈何益見府庫瘡天心正欲醫造化人間豈無針石良窟穴但去錢穀蠧此水何必求桑羊樊侯廟隂森樊侯廟古木澧水傍兹民畏如生奔走豕與羊家家奉侯諱若在父母堂舞陽老㓜以侯名為諱我來憇行役再拜奠公觴􅒺面英雄姿名與此水長風偃衆樹枝擬若怒鬛張隂官有兵師想在賁育行今兹寇敵驕内為府庫瘡安得七尺軀長戰再激昻横行匃奴中庶以康肺膓兩宋名賢小集巻二十五
