body:
  text: 兩宋名賢小集巻一百五十九宋陳思編元陳世隆補説齋小集唐仲友字與政金華人登紹興進士復中宏詞科累官知台州府政聲􅂱然為同官髙文虎所忌譖於提舉刑獄劾罷主管武夷冲道觀所著有六經解九經發題經史難答孝經解愚諸史精義帝王經世圖譜乾道秘府羣書新錄天文地理詳辨故事備要詞料雜錄宣公奏議解説齋文集續八詠雙溪占勝地占勝地勝地難摹寫二水䕶城闉千山帶林野山林鬱蒼蒼千里遥相望括蒼轉曉色九峯含夕陽危欄壓雉堞嘉名寄文章陰晴閲變態晝夜無故常郊平漲潦𣺌滄溟渚迥澄波縈素練霽後遥岑歴歴分霧中疊嶂濛濛見増逺目兮雙明含清輝兮四面奉分星之肸蠁切宸居之眩轉邦人來此意以恭客子臨之遊欲倦神莫覩敬先通言有盡興無窮烟籠野以浮碧浪射霞而湧紅連赤松之佳氣過三洞之剛風仰層閣而跂翼俯浮梁而卧虹數征帆而引興瞻倦翼而省躬聽絃歌之盈耳震鼓角之凌空洪鐘發天半清磬入雲中英靈降被異膏腴生物豐清絶兹樓景佳哉冠江東八詠掞英詞掞英詞英詞有㣲意懷章戀雙闕吟情深六義秋月清可依春風惠無私艸桐感霜露鴻鶴傷羽儀解玉佩去朝㑹駕朱旛張皂葢張葢非不榮解佩難為情青緺矯濁侈錦帳懷休明邦衣未容褫況值佳山水時來一登臨清曠豁千里既為兹土愁亦云兹土美揖林壑俯清淪摛錦繡歌陽春天球鳴兮朱絃奏朱絃奏兮玉律新靈均淵源建安風度參衆體于柏梁接遺聲于楚賦值重光嘆盈闕曳長裾懷散聚想西園兮不復遊典南尉兮未能去薄淮陽之見疎幸浮丘而來顧非流落以為患諒熱中而怨慕景入詠以増輝詩因樓而得趣嗟暗投于拙目指㣲瑕于寳璐髙文一何寥絶境亦難遇子期久云亡蚍蜉秪撼樹千年増舊觀増舊觀舊觀已云美棟宇朱翬飛賢侯為興起昔時兮清賞昔日兮清文揮絃兮歸鴈隠几兮浮雲八篇合綺麗萬古垂芳芬鶴歸城郭幸未改人去典刑猶得聞風流兮代變城隅兮勢逼故迹兮溪山靈祠兮門閾凑香火于庶繁局宇宙於褊側惜經度於無地厭往來於如織重舊貫於改作付流年于未極負吟詠之髙名起登眺之太息侯至懷古賢民樂值豐年謀始規摹壯競辰旌斾遷落成駭不日面勢快瞻前昔人應有待神交臭蘭茝淚碑忽已新革帶儼如在當時屈望郎此意屬真宰樓髙兮山逺野曠兮水長冥冥兮鴻翼𣺌渺兮鷗行客至有永日詩成無短章見聞靡不逮名實非自彰隆昌七百載作者永相望萬象出新竒出新竒新竒震英越經營得要領呈露入軒闥迢迢栝蒼山虬龍南北環中含七邑環下注溪流灣昔樓已據勝今樓與名稱東西倍軒豁髙下増比興極目送朝宗目窮波未窮萬里出寸碧千里來雄風地迥月偏蚤草緜心易忡牕影射朝白簷牙留晚紅村村辨回互樹樹分玲瓏長烟低抹岸逺水靜涵空雲間無迅翼天末識歸篷輪奐覩新作邦人胡不樂憧憧絶紛擾寂寂宜淡泊溪響答棋聲雲影入杯酌守登心自知客至意亦宜哦詩句易得撫檻坐忘疲垂名千古地一朝風景異楹桷壓閭閻丘壑輸胸次清遊未渠央吾民那可忘詞章賁髙閣前後兩甘棠遲日春徧麗春偏麗偏麗兩溪湄三農喜趨事萬物忻逢時伊吾土之洵樂勤甽畝之東作彌隴麥之曠望徧水田之疏瀹抽新緑之桑麻换柔青之林薄缺初遷鶯郊原膏澤晴園花張錦爛堤栁弄絲輕落梅吹香盡芳草連天生遊人自適意客子偏傷情韶華忽云暮簷楹亂飛絮南浦渌波瀾秀野深烟霧魚肥急釣舟沙暖多翹鷺紅殘少踏青日落喧競渡翩翩來去燕芳洲銜泥便弱羽度髙城斜拂㣲和扇物態皆光輝憑髙自忘歸輕雷送夜雨江色含朝暉俗厚異觀洧服成思浴沂所幸癘不作但願年無饑寛書已屢下宣布闗深機薰風夏更宜夏更宜更宜倚欄客扇化養之清㣲布豐美之潤澤空翠幄之桑柘漲黄雲之麰麥掃園囿之落紅溢甽澮之疏白亘東西之入望固髙下之無擇響繅車于林野度牧笛於阡陌銷永晝於樽罍散輕暑於絺綌嘉賓可以娛塵襟可以釋俯檻草芊芊懷人情脉脉黄梅熟兮大霔洪濤漲兮古渡前渚長兮長已沒浮梁斷兮斷無路駐征客之行舟失逺村之芳樹望青林之濟溺慮黄帕之為蠧浪洶湧而未息雲冥漠而猶固幸學海不為逺忽安流已如故赤日照竒峯絶壑石神龍奔雷過車響急雨跳珠容為霖利已溥潑墨收無踪㣲涼入殿閣朝爽開心胸髙明可居君莫厭變化莫測吟可供秋空月皎皎月皎皎皎皎飛明鏡滌風露以孤髙照溪山而清靜協二氣之金精肅萬物之西成巻雲衢之㸃綴廓天路之澄清掃埃􅅽於玉宇流沆瀣於金莖汎林光於逺野轉簷影於髙城蕩金虬兮深浪湧浸玉兎兮長灘平射淵潛兮魚龍動冷巢棲兮烏鵲驚在氷壺兮心腑快吸瓊華兮毛骨輕念逺人兮懷塞北依末光兮思承明顥氣分深淺素魄有虧盈橋成牛女度日沉河漢傾光輝懸半月憂樂殊羣情肅霜漸寒色逺鴈向南征此景皆竒絶兹地獨崢嶸當午夜之寥闃帶逺烟之蒙密認遙山於微㣲分近樹於歴歴急搗衣之寒砧引泊舟之横笛伊心賞之難并對兹焉真無敵佳人兮懷哉參已横兮歸去來冬野雪垂垂雪垂垂迥野望中竒冥迷一色混琢鏤萬般宜嚴風初作意愛日為收曦千山淡若慘萬壑凍無姿同雲忽沍合飛絮漸分披漫天歴亂落灑檻横斜吹粉浸兩溪浪瓊削千林枝素虬橋枕渚氷柱瓦漸澌田種皆雍伯絃絶非子期沙頭鴈影滅城角鳥聲悲烟孤辨村墅天沉迷酒旗愛登樓之縱目忘起粟之侵肌忽愁容以暫開漏朝暉之照矚射積素之峰嶺認㣲波之溪谷燦垂簷之明珠爛開府之羣玉凛暮寒而復凝灑夜聲而相續覩開闔以多端玩朝昏而未足孤松氣猶剛百穀土増沃積陰那可久見睍深所欲白雪與陽春願賡郢中曲兩宋名賢小集巻一百五十九
