body:
  text: 兩宋名賢小集巻三百六十四宋陳思編元陳世隆補雁山吟吕大亨字聲之名字與集互異新昌人與仲弟沖之同師陳傅良友蔡行之在太學齊名然困戹久之乃授宿松尉徙平陽丞時嚴秤提之令大亨上不廢法下不病民民尤便之終昭信軍節度推官所著有沃州雜詠賀太常黄少卿自從朝奏一封逺便整歸裝問故山剰得清名千載重何妨晚節十年閒慣尋夜雪逵溪路却謝春風漢殿班國史舊編加簡討春秋直筆任詩删次新邑錢宰黄丞韻一邑何期獲二賢花開滿縣總翩翩賦詩各出新機錦裕國還饒内府錢槐竹兩行公事辦絲桐三㺯政聲傳作成和氣農家好多稼如雲詠大田過杜潭題曽祖慶源庵横江灝氣欲欺裘木落千林水露洲偶為搜荒投隴畆因而展省到松楸神駒已應當年兆祥筍還為後裔留寄與老僧勤灑掃庭前橘緑桂香浮和張主簿喜雪夜讀書窗未覺貧朝看萬瓦沒魚鱗飄來灞㟁春風絮瀉下瀛洲玉斛塵笑我冗懐多俗事羨君清思獨凝神遥憐夜月山隂道還有扁舟乘興人題南巖寺誰把長竿釣巨魚至今蹲石倚空虚蜂房愛向山崕結鳥跡疑從海島居入座翠嵐生晝寂夾川紅樹照春餘任公此去三千載為看芳碑一嘅吁遊石佛寺金吾不必問行由此去逍遥物外遊半塢白雲藏宿霧一聲横笛下歸牛喜瞻傑閣三生像藐視叢林四海州為寫濯纓疎拙句誰言墨跡至今留題陳巖庵寄諸兄弟地接丹丘姥嶺賒山盤曲折狀如蛇每因過此瞻雙隴何必從旁置萬家孝弟本根時潤澤詩書種子日萌芽到來豈但春秋祀酌水何妨一獻花開禧丁夘重過龍門有懐方文老子翠屋交空結夏隂征鞍亭午喜登臨披開草棘千重路洗出氷壺一片心禪老還尋江浙去詩家誰作楚梁吟須知珠玉元無踵不惜西風惠我音謝張漕薦剡誰人洗甲挽天河玉宇無塵海不波漢使褰帷將命出淮民挾纊被恩多流離豈但身安集凋瘵親曽手拊摩恵利纔施催召亟其如席未及温何賀葉司業兼中書舎人英妙才華四十年山林朝市姓名傳何妨萬斛横江上不礙千帆過目前我肯尾書千木紙人饒首著祖生鞭金鑾何日商風雅伴直能呼孟浩然寄太湖黄縣尉立頃談餘袂輒分乖離數數異朋羣君如天掲行空日我亦風吹過嶺雲不許范張同飯黍空慙李杜共論文睽違動涉經年裏碁壘詩壇要䇿勲與丁撫幹兩年肥水喜相逢託契門墻今已重士有禰衡心肯薦侯如雍齒首先封更㸔謀略稱籌幄㑹見精神坐折衝敗走將堅兵百萬圍棋别墅意從容悼止齋陳先生萬里長江發自岷作興一代有斯人六經疑難言前解千古興亡筆下陳愛向田間看耜耒肯留天上掌絲綸如公到處鐫佳句今日池塘草自春舒城道中還轅天作十分晴瀉出秋光一𣲖清走筆欲題人到跡揚鞭不住馬嘶聲頃禾晚熟黄雲色籬菊朝含白露英得似淵明便歸去候門童稚出歡迎重陽桐城道中萬古長淮一帶流從來戰地不容休間闗千里軍前餉牢落重陽客裏秋悵望白衣來送酒了無黄菊與簪頭何人早斷樓蘭首試解君王宵旰憂九日登資福山呈胡宣教飛屐來登最上峰千山擁翠景無窮遙看雲影參差外静聴泉聲斷續中今日黄花重九約何時青眼一尊同好天風月閒相寄早晚南來有過鴻西寺留題白石孤雲自在閒紅塵一事不相闗寺遮翠靄青蘿外人到落花流水間欲效錦囊收勝槩慚無玉帶鎮名山白蓮喜結當年社未厭朝來暮便還題龍翔觀曽到龍翔不記年兩峰巍壓水中天潮生潮落青蕪外人去人來白鷺邊四接逺遊僧萬笠重新舊觀屋千椽東南送目秋無際隔岸人家問釣船和黄教授山堂招飲鼎彝事業未渠休鷗鷺尋盟暫與儔路入芝巖真絶地客延蓬島盡名流不辭一洗陶巾醉更擬雙飛謝屐遊誰賞洪都髙閣句落霞孤鶩唱漁舟謝石主簿和章多君養就大椿年便腹詩書晝欲眠絳闕當年名藉甚白雲他日迹飄然千軍筆掃人誰敵九轉丹成世莫傳倦眼功名旁袖手剰看月露出新篇詠桂花獨占三秋壓衆芳何誇橘緑與橙黄自從分下月中種果若飄來天際香清影不嫌秋露白新叢偏帶晚烟蒼高枝已折郄生手萬斛竒芬貯錦囊和王子寛韵緑䕃千重竹清流一帶溪子真耕谷口楊震講闗西手摘星辰近名登泰華齊古來公相業誰不起鋤犂春郊勝日遊郊外嵐光入眼新桃花開萬樹又是一年人山行山花雨後紅野草風前緑浩歌歸去來不辱在知足先春梅花不把春光較後先清香自是壓羣妍微酸一㸃功成日桃李從他逞少年雲錦桃花擁盖難遮萬臉紅爛然雲錦直連空更看雨過新糚洗百媚都含一笑中紫霄亭半空烟雨有無間碧玉屏開四面山我欲紫霄亭上望吹笙人去㡬時還未把浮漚閲世間蓬萊一水隔三山試窮千里登臨目望斷青山白鳥還芙蓉楓葉飄林竹隔牆偏于冷淡逞濃粧天教不趁繁華月要是秋來獨耐霜括蒼山行微風吹雨濕欄干薄霧籠晴帶淺寒一樹紅梅牆外發誰家美麗倩人看丹丘道中夜宿溪頭十里村數星漁火照籬門雁山峭絶經行處猶帶烟霞入夢魂縉雲道中縉雲通道入皇都花滿京城水滿湖借問今來丞相府後園人有醉歌無遊石城山秖因尋勝到林泉四抱迴峰萬景連僧過不知山隠寺客來方見洞開天浮圖照水光相映古木依崕影倒懸風露了非人世界濯纓秋後玉壺天過七里瀨懐古七里灘頭訪子陵水光山色見生平欲為臣子定出處知與君王分重輕一介草茅真自負三公軒冕未為榮我來想像髙風在釣石巖前烟浪生兩宋名賢小集巻三百六十四
