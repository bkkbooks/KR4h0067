body:
  text: 兩宋名賢小集巻一百五十五宋陳思編元陳世隆補五峰集胡宏字仁仲文定仲子幼事楊時侯仲良卒傳其父之學紹興中以蔭補右承務郎卒學者稱五峯先生有集題上封寺百年身似客浩蕩世間遊入望青山好夢魂偏我留我家巫山十二峰浮江直過巴陵東瀟湘水與蒼梧通環遶衡嶽青冥中扁舟白雲不可度杖藜臘屐乗春風山光浮動可攬擷雲舒霞巻飛煙虹深巖大壑翠巘巘足力已到心無窮羣峰迤邐勢不競上盡祝融五千仞祝融峰高天更高太空人世如牛毛風雲萬變一瞬息紅塵奔走真徒勞觀建安七子詩作文發妙理經國勵逺圖遊目建安中才子足歡娯西南落漢日楊益奮兩隅山河裂地軸星象分天衢八師遇有姚萬世垂楷模一元均大化五服擁皇都悠悠彼七子流光失其孚飛觴宴婉孌鼔瑟吹笙竽主人敬愛客徒爾相揚揄魏祚竟不長貽謀止斯須逡巡四十年横流被八區所以漢高帝嫚罵輕文儒和江子玉無竒試學居盤谷誰信斷絃膠可續湘天冷落數家村曩時曽枉旌麾沐潺湲堦下碧溪横栁靜風㣲幽意足知君文武濟時才舊時軍律寒生粟文書脱略是人師應有魏昭能换粥我無真樂送芳年悵望顔回屢空腹凄凉指日秋風高願更同來寫心曲西林寺廓然有懷超然峰頭秋氣清廓然堂延秋月明我乗清秋弄明月中有所感思冥冥峰勢凌蒼穹上有烟林封去天不盈尺路斷心忡忡虚名過耳如松風同伯氏還鄉江村沙暖蔞蒿長味比枸杞餘甘香茁茁荻芽生近渚紫花臺菜初未嘗白羊烏狶俱在牧茒舍竹籬真故鄉人生未必須富貴萬事且願身康强徑買官場舊醅酒共醉春風殊未央桃源行北歸已過沅湘渡騎馬東風武陵路山花無限不闗心惟愛桃花古來樹聞説桃花更有源居人共得仙家趣之子漁舟安在哉我欲乗之望源去川源逺近蒸霞開一片隨水從東來及晨徧覽三春色莫使風雨空莓苔題法輪寺春色初收夏氣清路分松檜入崢嶸深盤岣嶁千峰下逺抱瀟湘一綫明大衆總迷身在處三闗除却道方平山林若是有情住何異紅塵爭利名絶句幽人偏愛青山好為是青山青不老山中出雲雨太虚一洗塵埃山更好兩宋名賢小集巻一百五十五
