body:
  text: 兩宋名賢小集巻七十一宋陳思編元陳世隆補蔡忠惠集一蔡襄字君謨其先自光州固始入閩家仙㳺又遷莆田遂為莆田人天聖八年進士累官龍圖閣學士知開封府徙知泉州召為翰林學士乞為杭州拜端明殿學士以往治平四年卒乾道中諡忠恵有集讀樂天閒居篇閒居篇云君看裴相國金紫光照地心苦頭盡白纔年四十四乃知高蓋車乘者多憂畏予感其説因抒鄙章予年四十四髮白成衰翁非有高蓋車曷與賢者同嗟予出寒逺家世常力農十九登科第聖彀㕘英雄十年出吏選校書蓬陼中是年二十九天子誤採拔謂有諫諍風既叨言責地三十二蹇蹇思匪躬竊不自度量語剡奸邪胸一亳抗千鈞擯落無留蹤同時皆驤首金紫班著崇惟予守長樂幸就禄養豐三十四八年江海外再上螭階東四十入西閣宿仇司化工䝉錦設機穽惟頼天聴聰代言逰禁宻侍從多從容尋行京兆事擊斷露銛鋒是職非所好輒以死竭忠願闢大幽都為君囚四㓙願拂西省堂為君延䕫龍願舒泰山雲甘澤成嵗功願囘太清日晴景破隂䝉願躋萬人壽夭扎終不逢願令編户富食衣無困窮羣臣走率職陛下居法宫文采成禮樂籌略羈夷戎意言亦良苦精神庶潛通短歩趨逺道心健力不充早衰髮已華憂傷仍自攻我知古人心生徳貫上穹何為論貴賤貴賤非大公南歸雖云樂此念殊忡忡過皇甫侍郎丈人㡬八十嵗晩益窮經隂陽判九六天地環丙丁初若發泉穴漸已澄滄溟所寳非世有願充天子庭問我久京國鬢髮何星星無乃矜才能吐論生風霆不爾負潔修揚眉自娉婷昬翳本來性憔悴百嵗形子知大方家真精潛杳㝠萬化一相遇起滅如秋螢而於須㬰間計較罍與缾膏消見逺照木燼聞餘馨惟公懇懇誨敢怠拳拳聴追思嚮踐歴媿汗曽未停決然趨所適金刀貴發硎去矣汴流駛薫風送揚舲秋思幽蘭受新霜孤雁叫落月沈憂何由平永夕不可撤將琴鼓憶憐曲名聲急弦屢絶芳華日益逺香澤忽消歇秋風吹石門思君還復訣誰云無生認識此悠悠别湋南十咏龍臺漸看初日照龍臺白玉高堂錦幛開樹色一番逓馬過溪光幾曲抱山來雲歸深洞天形痩風落前村笛弄哀擬結青樓遍題詠思王何吝斗量才城東水閣亭上芳樽惜别人亭前斜日欲歸輪傷心定是丹楓樹拂面空來紫陌塵嵗月暗驚山色古愁情長與草芽新何時此地迴飛蓋寂寞欄干又一春南溪近郭溪光緑好裁雨晴波厎敞樓臺䕃堤佳樹千圍合掠水輕舟一箭開驚釣寒魚拖糝去㤀機閒鳥信潮迴官餘擬欲祛塵意書遍平沙我獨來月滿池亭有客高懐脫世塵碧灣晴檻樂逰頻無心自合波中月照影誰分鑑内人莎砌亂蛙争噪雨杏梁雙燕欲留春長年老厭趨毫末來揖孤雲作上賔西湖湖上山光一抹青佛宫高下裹嵓扃烟收水曲開塵匣春送人家入畫屏竹氣更清初霽雨梅英猶細欲殘星吳船越棹知何處柳拂長堤月滿汀圓山廟風雅遺芬嶽有神此山靈祀越千春彩毫佳句言猶在翠琰新詞意未真絶頂墨林長帶雨曲崕飛磴不留塵瘴雲收盡秋田熟祓境殽漿再拜人陳將軍廟曽憑水栅誓長江報國全軀事不雙力屈已嗟龎悳死勢孤猶笑李陵降宿墳古劍龍腥匣壊壁靈旗獸纒杠神理高高人意近楮錢祈福暗塵牕白雲亭雲擎翬檻翠嵓巔石老松皴不計年舉世覺來空白日㡬人逰去上青天醉看絶壑都無地嘯倚清風只恐仙花晚春殘無限意他時回首定依然齊雲閣繁閣青梯壓翠岑春情秋思共登臨雨嵐供眼横千掌星漢垂簷直半尋忍别朱欄真俗吏獨棲珍樹秖仙禽當年人定多竒尚擬托巖扃息寸心東郊苒惹晴雲釀雨時東城無處不芳菲斜坡草短孤麛卧平壠苗深雙雉飛照塢亂花驚客眼罥空輕絮㸃郎衣年來意氣多羈束無復長楸帯酒歸秋夜書廨中壁遙夜不能寢值茲節物清太空瑩虚碧仰觀澄性情素月若可把浮雲何故生瑤琴且勿弄誰憐希代聲觀宋中道家藏書畫宣獻業文學嘗作調羮鹽藏書百千帙傳世惟清亷東堂得春和花卉晨露霑之君延賔從當晝褰珠簾朱函青錦囊寳軸紅牙籖大令至歐褚屈宋聨鉤鈐草行戰騎合楷正中軍嚴水墨固昏淡骨氣猶深潛江田亦名手農野與鋤鎌桑麻婦女喜饁餉兒童覘烈女自幽閒明眸咽頸纎昔人何遥遥意㑹相披瞻南曹古貎醒博士新詩炎持杯屢屬我謂我毫錐銛煤嫗浮醉鈿研流泣秋蟾放洒雲雷起取餘風浪恬鄙藝豈足多詫語誰能謙因思佐宣獻載檄陪車幨辱公知遇厚表裏曽無嫌間復請筆法指病如鍼砭今朝觀故物撫已悲慙兼層丘恩徳重素髮華年添不能枉尺尋况乃事飛箝壯心久矣衰竒尚顧未厭幸公有令子辭源横江灊劇飲以自慰後慶其人占㳺鼓山靈源洞郡樓瞻東方嵐光瑩人目乘舟逐早湖十里登南麓雲深翳前路樹暗迷幽谷朝雞亂木魚晏日明金屋靈泉注石竇清吹出篁竹飛毫劃峭壁勢力忽驚觸題名石壁捫蘿躋上峰太空延眺矚孤青浮海山長白挂天瀑况逢肥遯人性尚自幽獨西景復向城淹留未云足耕園驛佛桑花溪館初寒似早春寒花相倚醉於人可憐萬木凋零盡獨見繁枝爛漫新清艷夜霑雲表露幽香時過轍中塵名園不肯争顔色的的夭紅野水濵和陳殿丞南州新詠寳坊高閣遍憑欄曽是芳晨得未閒日上天容低接海烟輕湖底倒揺山夜深佛火寒星外春過人煙暗樹間無意孤吟採幽致異時行槖只空還過天津橋日暖溪平冰漸消水聲纔下内前橋山川滿眼閒宫殿樹草迷人舊市朝每向尋春偏有意却成懐古更無聊洛陽平昔多豪傑惆悵埋魂不可招金明池小飲城西禁籞宿烟收霜薄朝寒上􅄢裘佳樹得春生意動平池受日翠光浮十年歌笑驚前世滿眼風華是舊逰從此曲江芳物好定知重到更宜留和御製觀三聖御書聖業存功徳宸毫冠藝文勢開千里浪光動九天雲法駕乘時至仙都與世分皇心欽寳訓求治益精勤溪行秋氣已寥落清溪纔此行船移酒盞側魚得鱠刀鳴日色浮兼動風痕㓕又生從知隠者趣不獨傲榮名西郊曉蓋西郊道春光極太虚村風香晚稻溪日曝寒魚雀噪飢鷹下山空病木疎歸期侵杪嵗東望是我廬三月詣陳逋民振衣凌曉色霽野縱㳺韁莓潤溪雲重春深山露香林幽風更細院静日偏長曾是天皇外相從識酒鄉夏晩南野夏竹侍前楹凉襟析舊酲壘雲封日茜斜雨著虹明魚動池開暈蟬移樹減清葭洲烟向暝鳧鶩自相迎上元進詩臣伏覩法駕特御端闈宣諭臣僚上元觀燈不為逰賞蓋與民共樂也臣職在文字恭惟徳音宣布睿㫖感詩人抒揚盛美輒成短章上干宸覽臣無任惶恐戰越之至疊聳青峰寳炬森端門初晚翠華臨宸逰不為三元夜樂事還同萬衆心天上清光留此夕人間和氣閣春隂要知盡慶華封祝四十年來恵愛深喜歐陽永叔余安道王仲儀除諫官御筆新除三諫官喧然朝野競相歡當年流落丹心在自古忠良得路難必有謀猷俾帝右直須風采動朝端人生萬事皆塵土留取功名久逺看寒食樂詞皇州令節已藏烟帝渥乘時錫廣筵和氣去添春色重恩光來助日華鮮千聲鳯吹朱門裏一道花香榖雨前更喜簪裳嘉宴日親逢干羽治平年送楊殿丞通判睦州蒼崖中斷一溪來迤邐人家向水開盡日烟雲迎斾去滿瀧鐃吹引船迴虚齋晝夢鳴禽下别塢春逰畫角催莫怪杜郎題處少更留佳致待清才宿延平雙溪閣鳴籟蕭森萬木聲濃嵐環合亂峰青樓臺矗處雙溪會雪電交時一劍靈曉市人烟披霽旭夜潭漁火鬭寒星畫屏曽指孤舟看今日孤舟在畫屏春野亭待月有懐淅瀝凉風來空郊生暮寒山氣鬱蒼蒼江流去漫漫闔闗行人稀投棲夕鳥還疎鐘度林際華月吐城端徘徊待遥夜露下明月寛心朋隔萬里獨坐起憂歎碧峰亭虚亭城西隅開檻俯臨北青山正相向萬狀呈峭格落日涵紫翠深春變顔色雲石抱幽致猿鳥自娯適上窮林端寺下見海内國賢侯乘閒來四座揖佳客歌吹侑杯酌筆硯角文墨雄談連古今大笑一歡戚嗟物亦時遇曠久茲乃得從知閩州圖復記新名跡四賢一不肖詩五首中朝鸞鶴何儀儀慷慨大體能者誰之人起家用儒業馳騁古今無所遺當年得從諫官列天庭一露胸中竒失身受責甘如薺沃然華實相葳蕤漢文不見賈生久詔書曉落東南涯歸來俯首文石陛尹以京兆天子毗名都翼翼郡國首里區百萬多占辭豪宗貴倖矜意氣半言主者承其頤昻昻孤立中不倚傅經決訟無牽羈老姦黠吏束其手衆口附和歌且怡日朝黄幄邇天問帝前大畫當今宜文陳疏舉時宻啟此語多秘世莫知傳者籍籍十得一一者已定為良醫一麾出守番君國惜此智慮無所施吾君睿明廣視聴四招英俊隆邦基廷臣諫列復鉗口安得長喙號丹墀畫歌夕寢心如疚咄哉汝憂非汝為右范希文南方之强君子居卓然安道襟韻孤詞科判等屢得雋呀然鼓燄大地爐三年待詔處京邑斗粟不足榮妻孥耳聞心慮朝家事螭頭比奏帝曰都校書計課當序進麗賦集仙來顯塗誥墨未乾尋已奪不奪不為君子儒前日希文坐言事手提勅敎東南趨希文鯁亮素少與失勢誰復能相扶斬然安道生頭角氣虹萬丈横天衢臣靖胸中有屈語舉嗌不避蕭斧誅使臣仲淹在廷列日獻陛下之嘉謨刺史重官雖重寄奈何一郡巻不舒言非由位固當罪隨漕扁舟盡室俱炎陬此去數千里槖中狼籍惟蠧書高冠長佩叢闕下千百其羣訶爾愚吾知萬世更萬世凜凜英風激懦夫右余安道君子道合久以成小人利合久以傾世道下衰交以利遂使周雅稱嚶鳴煌煌大都足軒冕綽有風采為名卿高名重位蓋當世退朝歸舎賔已盈脅肩諂笑不知病指天報遇如要盟一朝勢奪徳未改萬鈞已與毫釐輕畏威䛕上亦隨毁矧復鼓舌加其評逶迤隂拱質氣厚兩豆塞耳心無營嗚呼古人不可見今人可見誰與明章章節義尹師魯飭躬備道為華榮希文被罪激人怒君獨欣慕如平生抗書轂下自論劾惟善與惡宜彚征削官竄逐雖適楚一語不掛離騷經當年亦有大臣逐朋邪隠縮無主名希文果若亊姦險何此吉士同其聲高談本欲悟人主豈獨區區交友情右尹師魯先民至論推天常補衮扶世為儒方圜冠博帯不知本樗櫟安可施青黄帝圖日盛人世出今吾永叔誠有望處心學古貴適用異端莫得窺其牆子年五月范京兆服天子命臨鄱陽二賢拜疏贖其罪勢若止沸反揚湯勅令百執無越位諫垣何以敢封囊哀來激憤抑復奮强食不得下喉吭位卑無路自聞達目視雲闕高蒼茫裁書數幅責司諫落筆騄驥騰康莊刀迎縷析解繞要其間大意可得詳書曰希文有本末學通古今氣果剛始自理官來秘閣不五六嵗為天章上心倚若左右手曰備顧問隣清光苟爾希文實邪佞曷不開口論否臧隂觀被譴始醜詆摧朽拉腐奚為彊倘曰希文實賢士因言被責庸何傷漢殺王章與長倩當時豈曰誅賢良惟時諫官亦結舌不曰可諫曰罪當遂令百世覽前史往往心憤涕泗滂斯言感切固已至讀者不得令激昻豈圖反我為怨府袖書乞憐天子旁謫官一邑固分耳恨不剖腹呈琳瑯我嗟時輩識君淺但推藻翰高文場斯人滿腹有儒術使之得地能弛張皇家太平幾百載正當鑑古修紀綱賢才進用忠言録祖述聖徳垂無疆右歐陽永叔人禀天地中和氣氣之正者為誠明誠明所鍾皆賢傑從容中道無欹傾嘉謨讜論范京兆激姦糾繆揚王庭積羽沈舟毁銷骨正人無徒姦者朋主知膠固未遐棄兩幡五馬猶専城歐陽秘閣官職卑欲雪忠良無路岐累幅長書快幽憤一責司諫心無疑人謂高君如撻市出見縉紳無面皮高君攜書奏天子㳺言容色仍怡怡反謂范文謀疎濶投彼南方誠為宜永叔忤意竄西蜀不免一中讒人機汲黯嘗糾公孫詐𢎞於上前多謝之上待公孫禮益厚當時史官猶刺譏司諫不能自引咎復將已過揚當時四公稱賢爾不肖讒言易入天難欺朝家若有觀風使此語請與封人詩右髙若訥晩色晩色在何處樓高天宇低閒雲無去住歸燕自東西秋日登郡樓落葉隨飛鳥疎砧答暮蟬悠悠戍樓角悽切萬家傳夢中作年十八時入京就進士舉過舒州相城夢中作白玉樓臺第一天琪花風静彩鸞眠誰人得似秦王女吹徹雲簫上紫烟落花何事蒼苔數㸃紅曉來花片落春風可憐春色兼花盡今古幽情無處窮福昌院山前溪上最宜春千樹夭桃一雨新争得扁舟隨去水亂花深處問秦人和丘提刑寄湖南賈度友何處多離感山郵霽野光清吟貫騷雅逺意屬荆湘霜樹呈秋色秋風生晚香使軺偏倚望摛藻寄迴腸嵩陽道中千里動秋意縈迴上古原山樵斵晩日野火著寒雲鐘磬出鄰寺牛羊下逺村振衣歸去好塵事莫知聞送别陳比部祖帳西郊道川原畫閣臨燒痕經雨活樹色過溪深斜日明春態孤雲減客心何人知别意重把酒杯斟題僧希元禪隠堂逰錫遍他方歸休静黙堂孤吟時有得諸念若為㤀删竹減庭翠煮茶生野香雲山莫騰誚心地本清凉正月巡歴部郡侍親還家養親方解郡奉使又還家逺岫鄉闗近前旌父老遮揮金貧自媿舞彩喜仍誇特地延賔友相期詠白華興化軍曹殿丞茘枝厚葉纎枝新絳囊使君分寄驛人忙彩毫封處曽留意翠籠開時不減香風色甚豪應少損路程差近得分嘗閩州縱有千千樹未抵家園氣味長飲薛老亭晩歸終日行山不出城城中山勢與雲平萬家市井魚鹽合千里川原彩畫明坐上潮風醒酒力晩來巖霧盖鐘聲歸時休更燃官燭在處紗燈夾道迎和許寺丞泊釣龍臺見寄釣龍臺下艤行橈獵獵船旗待晚潮萬里征人應悵望一川秋色正蕭條雨雲來處山明滅風浪高低日動揺有志四方男子事莫懐鄉國便魂銷晝寢宴坐軒憶與蘓才翁會别投凉下馬卧僧家遶簟清風巻絳紗脩竹滿前微雨過逺山無際薄雲遮武侯舊隠人應到京西提㸃刑獄廨宇在鄧州粤國孤城日自斜解與塵心消百事更開新焙煮靈芽耕園驛明道中予為漳州軍事判官晩秋嘗至州西耕園驛驛庭有佛桑樹十株開花繁盛念其寒月窮山方自媚好乃作耕園驛佛桑花詩一首既而乘桴東下又作溪行一首慶厯元年予使本路明年夏四月自汀來漳復至是驛花尚仍故追感昔逰因紀前事并載舊篇龕於西壁使軺迢逓到天涯候館遷延感嵗華白髮却攀臨砌樹青條猶放過牆花悲來惟見金城栁醉後曾乘海客槎欲問昔逰無處所晩烟生水日沈沙和杜相公謝寄茶破春龍焙走新茶盡是西溪近社芽纔拆緘封思退傅為留甘㫖減藏家鮮明香色凝雲液清徹神情敵露華却笑虛名陸鴻漸曽無賢相作詩誇遷陽道中奉寄楊正臣同年襄頓首頃者同年秘校楊兄以疾去官退休於家洸洋自適無不如意每念不得一奉從逰之後以觀塵外之趣如何也前嵗復往邑中未始一通問訊懐恨無量今者賜告迎親嵗暮道逺歸心揺揺义不得一造門下顧塵容之人益可愧耳過遷陽路輒書一篇以導企念之思兼伸起居十二月二十八日襄又頓首名第同一籍家園連七閩何為别眉宇於今十四春昔子補一尉扶病走風塵歸來解組綬晏處頤精神架書括遺逸甕酎涵清醇東阡與北陌候問通慇懃或言疾良瘉呼盧氣益振或傳近詩句平淡與古鄰語之天下事塞耳不復聞寜當決引去道固有屈伸嗟予仰寸禄對讐中秘文天子誤採拔指名填諍臣力微責任重百慮加一身列章乞便郡賜告迎慈親窮冬過梨嶺征鞍出幽榛俯深下坎井斗起攀蒼旻水石齧晩沙霜風變朝皴粲粲澗中花孤芳能自珍斑斑雲上鳥朝鳴亦求羣嵗晏時節動天遥客愁新去子無跬歩笑語絶燕秦作此欲招飲翻愧林泉人治吳江寄胡武平遥夜吳江瀕露坐鬚成葆天空不帯雲野迥正收潦徘徊波上月灧漾浮光好清風送炎歊翻覺秋氣早乃問苕溪路舟虞為予道水行至州下樓臺壓烟島浮居譬如仙嘉産極富媪念君鎮雅俗適以資恬浩豈不欲一往驩成寄鳬藻縱逰窮佳賞劇論探幽抱嗟予逺庭幃六年見春草終日諷陔蘭無路羞羊棗何為久去家一慮心如擣今而賜告歸計課免讐討前走奉慈顔敢憚勤輿皁北來尚何時汀洲白蘋老倘得杯酒同為君一醉倒至和雜書五首八月一日淮天過盡入吳渠蘭亭晩日光疎疎金桃傅粉好顔色緑醽泛灧深車渠觥巡屢巻明星出花翹零落隨衣裾么絃不動凝古意春容淺破長眉舒庭院簾帷一齊下紅蠟隂沈霜滿瓦雞頭軟熱七月終舉手分傳玉盈把席前碧甕覆瑶漿一秋愁淚風前洒雲中寳暈萬里高付與輕綃藏氷麝孤城寒柝夜迢遥誰道劉郎有天馬歸來却問東海桑海浪漫漫彩虹挂紅絲縈膾曉刀鳴雙龍笑斷夢中驚莫將團扇掩塵匣曾障清歌十數聲八月二日濃雲瞥過雙鳳飛清顔照射朝日輝畫船南畔烟成障鮮荷掩䕶仙銖衣凝魂杳渺不知處酒醺香破驚新知一聲入耳醉人骨天容牢落星㸃稀海山萬里風濤外扶桑未老成春絲春絲不斷縈成結玉環宛轉無窮時曉簾半上香飄蕙笑指氷壺凝逺淚秦樓後夜鏁孤鸞秋風不動烏龍睡願將瓊樹隔花看一一花房暗相值濁水芙蕖天際雲長時倚望清江濵迎來未語送歸速暮山紫翠含空顰勸君美酒千萬壽情如芳草年年新八月九日曉虹跨江一千尺平浪東西入天碧逰人初覺秋氣凉衣不禁風薄羅窄漁家小艇方醉眠艇底長魚三尺白彩欄北倚數流螢似與流螢舊相識香脂揩盡暗成雲銀甲試絃初未直橋前流水聲潺潺年華一去何時還重來若問桃花路記取斯亭月影間八月十二日高樓中天月色浄玉山禾熟秋雲映草邉水際見流螢流螢獨自尋香徑稜層鴈塔挂千燈宻意雖通語還併城上驚烏飛復啼落泊無依終不定欲下長橋夜漏深燭臺飄灺青梧隂仙人若也乗鸞去彩霧千重是處尋八月十九日潮頭出海巻秋風風豪潮起蒼海空弄潮牙旗出復沒騰身潮上争驍雄沙頭萬木注江水晴雷乾雹來無窮幄外簾旌飛獵獵新醅翠斚行坐中欲作吳歌弄清晝回看滿眼西陽紅六曲屏深映雲母珠盤縷縷青鴉茸山移海轉有變化生緣長短須相逢温成皇后輓詞二首紫極騰軒曜青春委蕣顔雲軿何處去金殿幾時還仗下編簫咽陵中夜燭閒六宫哀送返疑是夢魂間翟彩開新禮金文易大名真逰上僊路故物感皇情月落辭丹禁春前引素旌剛風吹挽鐸不是珮環聲寓居興化轉運廨舎病惱連春夏居閒意味長海風生永晝山雨送微凉書帙梅蒸潤衣巾茘實香塵緣消遣盡物我久相忘西齋秋暑齋居一室静晝永來風微仙棋覆前局女布便輕衣向人顔色强與世心事違且效金門隠詎有田園歸雨晴早出徂秋久不雨霑濡纔此旬新陽净萬物太虛無一塵老稚出曠野鋤犁及清晨愛爾安居樂力作勿辭貧訪天台菴幽人去未還門户和雲閉亭午樹隂圓深冬泉響細寒生羣鳥鳴清徹孤鶴唳寂寞傍山歸寫向滄溟際留别舊居花檻别意起中夕出門風吹衣側月光艷薄餘光香氣微清尊歲相向欲去心有違殘葩勿盡放主人行亦歸題將軍巖赤日正停午解衣巗石下石泉殊甘凉野簌亦瀟灑驚猿度嶺雲遺菓墜庭瓦披軒忽永嘆幽抱不可寫稼村詩帖二首隠居何事可謀生堯舜難周畎畝情若得一犁膏雨足石田茅屋起歌聲布穀聲中雨滿籬催耕不獨野人知荷鋤莫道春耘早正是披蓑叱犢時兩宋名賢小集巻七十一
