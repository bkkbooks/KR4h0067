body:
  text: 兩宋名賢小集卷三百二宋陳思編元陳世隆補竹溪十一稿詩選林希逸字肅翁號鬳齋又號竹溪福清人紹定間進士第四人初為平海軍節度推官淳祐中遷祕書正字景定間擢司農少卿厯中書舍人直寶謨閣卒其詩文集有竹溪十一稿三十巻又續集三十巻及門林式之所編泊舟漁浦望呉山作客子孤舟傍曉沙隔江人説是京華縁山一帶烟籠樹中有王侯百萬家龍灣秋夜旅泊秋將暮行吟夜向中獨星明似月重露冷於風逰厯書何有飛揚醉自雄時聞邊耗近憂憤氣填胸前出塞信陽作淮而如江春漲早獵騎衣歸城未鎻邊頭戍將惜官卑舉鞭怒指平安火後出塞安豐作紫金山前數尺雪三十六洲明似月夜來衝突人不知但見官軍刀帶血信陽道中次陳守韻古嶺纔成徑荒林間有家栁眠腰裊娜桑老骨槎牙野麦三分草出籬一半花挾書來萬里飄泊負生涯安豐作塞北悲笳起淮南古木疎風髙疑唳鶴水落見㳺魚俗僅傳丹鼎人誰問枕書因吟招隱賦乆客自嗟嘘寄書後作幾度題書客未還歸鴻節節度鄉關遥知一紙平安字慈母燈前閣淚看寒食異俗逢鑚燧勞生嘆轉蓬茅簷踈桞月草地落花風故國邱墳在他鄉祭祀同犇馳真左計歸夢海雲東陣陣花風送雨寒心隨風雨到鄉關遥知松柏山前路今日隣人掃墓還舟泊姑蘇城外倚郭維孤舟漠漠見煙渚水宿野鳥歸夜深鄰人語逺客萬斛愁卧聼姑蘇雨宿西興渡作古寺鳴鐘罷髙林宿鳥忙竹明風㺯影荷净露生香月到中天小星過野水長江村人寂寂敗葉響銀牀臨浦秋夜野噪寒枝鵲村歸古寺僧傍階聞落葉隔岸數殘燈月退頻移席潮髙尚倚藤江虚羣籟息人語近漁罾樂軒先師挽歌詞十年燈火若為情一日簫笳有底聲惆悵門前舊時路白頭扶杖夜深行網山遺稿樂軒文已矣今無識子雲千載何人按圖問犀斜南谷兩荒墳晦菴南北象山西道學年來入品題可惜六經真脉絡紅泉三世兩幽棲秋閨怨簾幕低垂夜漏深秋䖝唧唧相悲吟囬紋織罷空彈淚未必君心似妾心午齋即事京庠作晴窓吚唔罷風薄清晝永陳編幾廢興適笑心自領青精飯何味車笠沸塵境佇立共幽懷虚簷疎竹影用韻答友人論詩藝業難精最是詩千差萬别信難知還須倒嶽傾湫手却有驚天動地時鳥跡論書方古雅龍媒入畫始權竒夷然便欲趣平淡此法誰傳我亦疑與陳同含飲三元樓失身杯酒莫追尤爛醉生涯儘自由可倚何湏鸚鵡賦相逢且解驌驦裘今無客入楊雄巷終有人題李白樓却笑三閭太憔悴獨醒猶作畔牢愁癸已再入京宿璜溪寄二弟十日離家只四程白雲何處玉融青溪聲颯颯如風雨獨對銀燈詠鶺鴒黄源嶺半見梅作古嶺森森立萬松一株寒玉笑春風恰如垂釣桐江客盡入雲臺劒珮中有懷乙未西山先生典貢舉僕巻乃公所定開院未及謁而公病矣金蓮學士起持衡玉筍門生僅識名一瓣心香雙淚眼半溪殘月暮雲横七夕七香寶駕靈誰乞雙眼金針俗不存世態如今機巧徧堪將餘技獻天孫千載千載祗如此回頭跡便陳嘘天遺故我問月嘆今人客授長生訣僧談不壞身悼四先生真洪􅀢魏繼淪終天肯憂人國欲空衆口生憎來論學諸賢死不解和戎良圖已付悲歌外舊恨祗㽞奏稿中擬續八哀才思短剰將㕠淚灑松風讀黄詩我生所敬涪江翁知翁不獨俄詩工逍遥頗學漆園吏下筆縱横法畧同自言錦機織錦手與寄毎有離騷風内篇外篇手分别冥捜所到真竒絶頡頏韓桞追莊騷筆意尤工是晚節兩蘇而下秦晁張閉門覔句陳履常當時姓名比明月文莫如蘇詩則黄黔南日月老賔送白頭去作宜川夢官樓家乗誰得之那知珠玉無散遺生前忍苦琢詩句飄泊不憂無死處今人更病語太竒哀公不遇今猶故打馬九折羊腸片紙間機心覿面險於山是非喻馬一儒墨得失争蝸兩觸蠻危似楚兵臨漢塹急如齊客度秦關良圖邂逅何分别莫詑争雄衣錦還晚逰遣興積雨多妨喜晚晴幽禽足足傍簷鳴迎風逺岸松聲近背日隂池樹影明親有餘年方頼禄國無長筭幸渝平此生錯料吾猶可只恐風塵未肯清心王易言不動工夫宻書説惟㣲體叚彰仙漫有方求氣母禪非無見指心王靈根本要行藏在稿木寜於應感妨一語何思千古訓莫言為陸背程張日用頼得人間念已灰省身克己問参回事隨縁法安排去病向根源㸃檢來布韈青鞋資嬾散筆牀茶竈恣徘徊偷忙不住提撕着猛可投機亦俊哉答友人論學逐字箋來學轉難逢人箇箇説曽顔那知剥落皮毛處不在流傳口耳間禪要自参求印可仙湏親煉待丹還賣花檐上看桃李此語吾今憶鶴仙力學力學求心苦未安蓬窓頼得小盤桓醉知义手矜持易過似科頭㸃檢難静定工夫忙裏試和平氣象怒中看亨塗失脚人何限始信顔回樂一簞元扄君從何處叩元扄耳學紛紛莫浪聽剗盡念頭方近道掃空注脚始明經見聞日富祗塵積渉厯年深似酒醒不必但疑禪背理請君細讀信心銘偶成佛言法界惟心造仙説還丹要想成到得氷壺秋月處輕輕拈出是功名讀邸報懷王先生作實齋諱遂字去非當日籌邊事偶蹉追尤未已意云何縱令君寔謀時短不道伊川好處多泊舟箬村有懷老師作昔去京華此艤舟老師含笑别江頭我今重向江頭立宿草傷心二十秋寄林寒齋此是淵明向上人少年早巳謝簮紳談優雅號周禪客意散宜稱謝道民書數苦無多字數嵗時但覺兩情親寒窓欠我煨爐語乆辦青鞋擬乞身内宿丁未臘月二十四日玉宇凌空聳金書照夜明墻深容竹迸石古伴梅横雲接天章路風傳徼道聲非才叨􅀈直愧見壁間名又絶句堂虚􅈝覺暮寒生長樂疎鐘緩轉更對燭已無詞可草擁爐時聽閙皇城次早喜雪竹葉初聞似雨聲禁林未曉已通明朱樓屈曲欄先濕紫殿參差瓦欲平氷硯筆隨花片起風簷慢㸃蕋珠輕堂名不枉人間説此際真如玉琢成入局有懷戊申空飱無補負公家此志雖存鬢已華毎向客懷紅躑躅不貪郎對紫薇花寛心可要流香酒圎夢何湏正焙茶手板便還丞相去吾儕活計只桑麻有感戊申三月少日因貧強覔官于今悔擲釣魚竿宫袍豈似陁尼暖廐馬何如欵叚安凖易莫教元尚白奏篇還要炳於丹得歸須謁嚴陵去夢已先經七里灘得郡後二首戊申六月君王分付為親還班路諠傳忤要官我但得歸他不問從來人道乞身難語戅情知忤要人此心謀國不謀身一麾得請天南去出處應堪白老親登舟喜風頓清秋暑觸暑登途衆共猜好風誰料逐㠶開天公應是憐行客正忤炎官熱屬來和後村明皇按樂圖周昉筆劉工部任泉舶日曽見芙蓉帳暖春覺遲玉笛真人恣荒嬉㺯權宰相楊與李老奴將軍専北司延秋門外目未睹宫中但教霓裳舞薛玉沉醉夀王醒天公自擊催花鼓錦鷄索闘金籠疎寶馬登牀伶走趨只愁海棠睡不足肯信漁陽有反書青娥阿監髪種種海上依然髻斜擁逰魂血汗縱得歸不伴君王行蜀隴周郎此筆妙殊常環臺初見惜匆忙重來把翫轉燭去十年去我春堂堂按圖雅欲談遺事西墅無人誰老異少公錦卷長公題共説少公各揮淚工部後村之弟梅花紛紛塵劫數河沙玉雲風標共幾家可是人間清氣少却疑大半作梅花劭農此禮今於古庶幾龎眉共席意依依兒携竹笠翁藜杖主帶朝冠客布衣飲不盡觴瓢挈去食猶餘胾葉包歸已分鏤本隨人看聞説今年僻字稀憶在憶在雲深處身曽侍紫宸元無講三昧那得筆千鈞分賜茶猶在批依墨尚新汗顔恩莫報竊禄謾娛親馬和之覔句圖以下五首題後村畫巻先生隱几奴煨火斜挿疎枝破瓦尊鶴夢未回更幾轉吟時應是月黄昏石虎禮僧圖父子三人禮佛澄圖眼前立是抱橋尸悔不湔腸背後兒洛度老胡聞血臭汝雖合爪吾攅眉洛度見本傳明皇聽笛圖夀王妃㺯寜王笛對面三郎背老伶却恨馬嵬西去路無人吹出雨霖鈴楊通老移居圖憶昔移居詩在集篇篇好就中語竒絶㝡是渉與島誰歟作此圖題以楊通老行行四五人長短各有荷瓢者帽且髯席者頭不褁或牧而尚髻或負而似跛孟先衣頗寛靈照袖亦拖一兒解持箠一兒纔剪鬢處士獨跨驢牛乃背其媪彼羊驅於前彼猫肩於左琴二荻藍雙生計亦甚夥應嫌俗子知必住深山可低眉得何句手巻豈其稿若逢李十二定復歌飯顆薏似或招讒胡椒能惹禍君子哉若人萬物偹於我石鼎聨句圖盡意不盡形形勝意不足正如九方臯相馬不相肉此筆誰為之繅藉以錦玉一几共三人彌明喜師服􅆳酬夜何其漏箭在銀燭誰知豕腹脹誰作龍頭縮始胡為頡頏末胡為屈伏彼既鼻撩天避席徒局束去者俄翩然二子睡正熟扊户問童奴曉雲棲古木質之昌黎篇叚叚皆寔録用意豈不精或者疑近俗我聞文章家同工而異曲或如駿厯險千里在一蹙或寸歩不遺句句必連屬在詩則樂天在文則永叔畫品恐亦然願言寶此軸毋使歎巧心受嗤於拙目題江貫道人山水四言此畫疋絹作石林簡齋有詩䟦逺山叢叢逺樹濛濛咫尺萬里江行其中短長何岸髙低何峯彼坻彼洔彼瀑彼洪靖嵐乍豁烟靄葱籠或斷或屬且淡且濃爾崒奚寺爾盤奚宫或垣隂醫或梁嵌空有吠者厐有樵者翁危檣落碇短棹掀蓬往來異趣寂動殊容羃翠其庭豈非盧鴻略約而渡豈非龜蒙昔我經行雲山萬重若淮南北與江西東亦簑而雨亦㡌而風乃今追惟夢境相從及此開卷恍然昔同誰居作者造化論功淹㧾其裔熈成是宗聲聞九陛既召而終謂彼樹白貫道盡林木如筭子其身皆白䜟其身窮其然豈然訊之天公此名穹壤疇曰不逢題逹磨渡蘆圖白頭浪中碧眼胡赤脚笑踏鴈啣蘆太平寺主不知我觀音後身誰誑渠是身如幻本來空偶然㳺戯非神通當年渉海向震旦扁舟本與啇胡同君不見壺邱弟子御風飛猶有所待固笑之又不見横抛錫杖渡水僧囬瞻黄檗稱大乗此胡法器更竒在何曽以此為聖解蕭郎不晤義不留却要時人略驚怪異時埋骨寄熊耳萬里西歸提隻履忽從棻嶺遇宋雲雅意依然今日是此圖誰筆面如活客來却詠凌波韈若將底事比渠儂老胡暗中定差殺郡圃偶題鄱陽曲階倚杖行疎影栁花度竹粘衣領臺根三兩落殘梅時見幽禽窺野井正月郡圃偶成慶朔堂梅花落盡桞將舒池水冬深只尺餘亭欠掃除多敗葉園隨髙下長新蔬典刑如在松加愛意思相關草莫鋤慶朔堂前詩一首舊碑元是後來書范文正公有慶朔堂詩手植七松今存者四題宋徳清詩稿和陶宋次道之子詩法如書法臨摹恐未真寜為禪散聖莫作婢夫人士詫門中集君留席上珍苦吟應不厭㑹見乹黄陳讀剛􅉖程公祠堂碑作抗對公何勇留芳泣血編死能名百世生不解千年官豈云無長吾誠恥獨全堂堂英烈在遺像舊江邊晚行鳯逰池邊作冶司為吏長嗟七不堪偷閒時到小池南去來共浴鳬千百髙下相呼鵲二三春放新紅梅㸃㸃霜餘舊緑草毵毵雲邊數陣鴉歸後逺樹如山日半含人世浮世堪嗤似戯場塵編無限記興亡百年不了窓明暗一覺寜論夜短長空谷老天休浩嘆今人古月謾相望眼前翻覆祗如許隱几何妨静炷香夜坐入夜新凉乍滿襟簷前花竹㺯清隂好時好日隨縁住非月非風得趣深書到七篇偏有味詩留千載待知音從來一㸃圓明處不是禪心是本心徐朝奉挽歌詞薤露曲薤露歌人生如露可柰何如公九十鬢皤皤有子百世名不磨排奸直氣貫義娥教忠蜚奏金鑾坡制書内出特㫖褒魚躍白金緋染袍徑阪之門道日髙葵藿園中翁共哦諸孫玉立春正和生事以禮踰牲牢公從諸仙逰爛柯送車千兩山之阿鴻章伐石質参軻百年似此勝人多翁歸如蜕兒悲號團圞一散頃兮俄門人從今廢蓼莪事親無足可柰何事親無足可柰何薤露曲薤露歌虧欠休問閒愁到酒邊眼前虧欠是良縁六王纔畢秦明失二㓂俱平晋社遷月滿一輪湏漸破屋留三瓦莫教全誰名缺减人間世雖道胡僧也自賢自知學問深功要不疑空談長笑晋人痴渠儂眼縱明如月知我何如我自知郊行即事野店相依門向背牧童對語岸東西草枯白見樵成徑木落紅隨葉入溪色有淺深峯逺近影無長短樹髙低眼前好句閒収拾歸到書窓却自題老樹菌生鋪目斷溪泥濕印牛蹄山僧渡水雙擕履野客歸村獨杖藜羣鳥争枝聲上下孤松夾澗影東西行吟注意捜詩料欲近前溪路忽迷偶題生涯莫問要如何且卧牛衣醉濁醪仕已何妨三令尹是非原是一東坡拾遺兒去看魚笱廷尉門荒設雀羅百卉不論紅與紫看花時少葉時多書懷寒窓㺯筆日娛嬉品格髙低問孰知古貌古心空自許散歌散傳不能竒但叅言句禪差是要入文章録却癡誰道二郎吟可學友頥揺膝笑龜兒人間逆境似難堪渉厯﨑㠊我熟諳早已知非如伯玉誤令入閙為圖南寇菜公二娘子酒何妨醉坡别集小厮兒禪只黙忝臨濟試問先生縁底樂坐觀寒月照秋潭世味世味更嘗百念輕眼前何辱又何榮寜教鬼解揶揄汝不許人能駕馭卿躍馬卧龍皆夢事焚香㺯鏡了餘生春殘雨水差沾足却願從今米價平讀程氏遺書浮生長短夢可見幾英雄不有遺編在應隨落葉空中宵門外雪一月坐間風似此難傳處能言孰與同身外身外榮枯時與命眼前好應古猶今不須指擬文章力劉禹錫且要消除人我心白樂天強徤祗添人我心貧甚可無飡玉法閒多好和翫殊吟傳燈録春殘任待花饒笑竹几蒲團味自深自警静退雖知趣味殊終然習氣未令除有無對鏡宜俱遣夢覺何時解一如得力要須生處熟用工最怕宻中疎莫教草草匆匆去却恐從前枉讀書晨興和前韻分劑元無欠與餘化工最巧是乗除壯懷何必風雲入净念須看露電如元在不妨雄拓落詩成自笑甫狂疎新來一事尤堪訝眼已眵昏學草書晴窓放言今日與明朝相尋僅頃刻昨日不可追便如千嵗隔長江汐旦潮孤月明又魄真宰良自勞人生况如客錦衣豈云華藜羮未為嗇俯仰去來今升沉付一啞夘酒六七分武成二三䇿晴窓樂自知一鏡虚中白甲寅十月十九日有感當年瑞節慶虹流冷落如今閲幾秋鼔腹遺民猶詫説攀髯諸老更誰留玉梅枝上春長在金粟堆邊雲止愁明皇陵寢在金粟堆邊杜詩欵陽美人舞劍歌追記鵠袍陪拜日曉風黄繖望宸旒田圃雜咏疇昔多慚世網牽収身幸早賦歸田四科人物皆髙弟只學樊遲也自賢獨立搔頭曉未梳喜看童僕理園蔬漢儒不悟真消息却下簾帷只讀書郊迎猶待一畨風主相那能不愧容縱道東還心事白更須定洛乞明農嵗計溪南數畆中但将風雨祝天公人生何必堂厨飯米渗藜羮一飽同雨過髙低水地平扶犂野老續歌聲憂時莫問簑衣䜟但看烏犍破曉耕䜟語見文公集雜著輪輿盖軫及車弓模冩文竒是考工農具因何却疎略周公於此愧龜䝉笠澤叢書農具説最工題詠近稿拏舟早已向三韓莫放天風觧引還九轉黄芽先白雪千年翠甗後紅斑棊無盡筭仙猶着性要全空佛未閒得路不須愁險絶看他脚力盡時山夢學道渾無力紛紛夢未休誰呼鶖與寂莫定蝶為周因想誠難詰飛揚果自由工夫何處是勤看嬾安牛溪上謡溪上行吟山裏應山邊閒歩溪間影毎因人語識山聲却向溪光見人性溪流自潄溪不喧山鳥相呼山愈静野鷄伏卵似餋丹睡鴨依蘆如入定人生何必學􅋯仙我行自樂疑散聖無人獨賦溪山謡山能逺和溪能聽夢西軒舊事南谷霜松老傷哉一窖塵學遷窮有鬼詩在䕶無神往日同参盡殘年入夢頻遺書誰掛眼衣鉢付何人雲木相叅歌溪翁結草傍溪南近山繞屋青如藍天垂四野雲到地千頃萬頃羅松杉着亭小小寄面勢往來萬象窓中含有時倚􅀈日未吐但看雲木朝相参蒼蒼古木大百圍我醉呼雲雲不飛風和萬竅如塤箎此時此景誰能盡既以名亭聊賦之夢寒齋故人千載隔幽明昨夜躊躇過數更握手不知為已死掀髯猶更話無生海山兠率歸何鄉樂天詩海山不是吾歸處歸則湏歸兠率天漳浦咸陽寤自驚樂天夢徽之詩漳浦老身三度病咸陽宿草八囬秋擁被長吟天未曉滿簷落月淚如傾戊午與諸友同謁犀斜南谷二師墳作來往松間不計年學無進趣負師傳侯芭白髪今能幾知付他誰守太元身前枯槁似山僧𤓰葛雖存亦強名料得九京還自喜但將墳墓付諸生艾軒先生為道難言不著書但知日用是根株當筵自昔傾龍象嗣法何人識馬􅀈六學即今皆勦説一齊孤立可長吁犀斜南谷窮愁骨仙境能談舊事無臂痛六言六十六翁衰乆四百四病更多臂用火攻未可心存水觀如何虞監因書自苦龍眠為畫勞功臂痛與渠相似筆端苦我非工列子肘停杯水呉生臂畫圓光此是病魔饒借莫將妙手誇張莊子口義成逍遥而下是全書漁父諸篇却不如意外形容辭獨至句中脉絡字無虚機鋒頗似禪三昧根極祗求性一初千古濠梁同㑹面子真知我我知魚老子口義成見徹深微字字精五千言在與誰明事因借喻多成謗經不分章况立名數十有三元是一道虚無實始為盈蘇云近佛非知老老説長生佛不生列子口義成莊列源流本一宗微言妙趣不妨同但知絶跡無行地莊子齊物語豈羨輕身可御風二義乖違劉絶識劉向敘中有二義乖背不似一家書之語八篇叅校湛何功今書八篇張湛所叅校就中細細為分别具眼應須許此翁重修考二記口義千金求得自河間此記尤竒似五官文若聱牙精識少物窮纎悉辨名難牙去聲圍以後圖方見口義於今缺不完網山有傳艾軒所講口義今不全矣師説幸然無失墜書成只恨鬢凋殘讀關尹子青牛車後抱關翁師已西㳺道却東著論九篇今獨在合名一字古無同九篇皆一字名不知身老傳誰氏可愛文竒似考工慱大真人莊所敬寥寥千載想宗風題新稿少日無端苦學詩倚樓面壁搃成癡㫁無子美驚人語差似堯天遣興時最上宗風埋沒乆新來家數見聞知吾生恐被師傳誤自比靈雲更不疑至學至學元談理最微員門粗細有誰知蛇生弓影心顛倒馬齕其聲夢轉移須信風幡元不動能如水鏡却無疵咸經四字分明訓截斷憧憧未感時先師樂軒云貞吉悔亡四字今古座右銘也小象以未感害釋之有感有應而後害生未感則無可悔也物理六言以鳥餋鳥盡性惟蟲能蟲知天萬物與我為一反身樂莫大焉羊螘不如魚計鴻鵠豈比鴈謀為問折腰五斗何如散髪扁舟杜鵑前身名字蝴蝶夢境為周至理但觀物化吾心自有天遊醯鷄甕中世界蜘蛛網上天機他心我心壹是大知小知俱非蚯蚓兩頭是性桃花一見不疑了得葛藤三昧却叅芣苡諸詩非魚知魚誰樂夢鹿得鹿誰誣若與子也皆物莊子執而我之則愚關尹子兩宋名賢小集巻三百二
