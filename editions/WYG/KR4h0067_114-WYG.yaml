body:
  text: 兩宋名賢小集卷一百十四宋陳思編元陳世隆補東湖居士集徐俯字師川洪州分寧人以父禧死事授通直郎紹興初賜進士出身累官端明殿學士簽書樞宻院事權參知政事有東湖集題顔魯公畫像公生開元間壯及天寳亂捐軀范陽兵竟死蔡州叛其賢似魏徴天下非貞觀四帝數十年一身逢百難少時讀書史此事心已斷老來鬢髪衰慨歎功名晚嗟哉忠義徒㨗去不可緩初無當年悲只令後世歎一朝絶霖雨南畝常亢旱小人計雖得斯民盖塗炭長歌永君節千載勇夫愞敬書子張紳庶幾古人半滕王閣一日逢王造千年與客遊雲邉梅嶺出坐上贛江流日落迴飛鳥烟深失釣舟蟬聲枯栁外天地晚風秋雲氣浮髙棟波瀾遶古城雨餘山更碧葉下水逾清燕語留秋色鴉聲落晚晴昔王歌舞地㠶急見山行同曽戶部吳縣尉張秀才北山僧房尋梅令客對棋處處已收南畝稻閒閒還看北山梅累觴聊爾酡顔在對局怡然笑口開掃徑似知佳客至杖藜惟可數君來移松種樹鄱陽老章貢風㠶嵗一迴庭中梅花正開用舊韻貽端伯羌笛何勞塞北吹江南何處不寒梅千秋寂寂無人看獨樹亭亭對客開偏為咨嗟惟爾念是誰移種待君來縱留一曲安能唱恰似朝歌墨子迴戊午山間對雪雪中出去雪邉行屋下吹來屋上平積得重重那許重飛來片片又何輕簷間日暖重為雨林下風吹再落晴表裏江山應更好溪山已復不勝清詠史楚漢分爭辨士憂東歸那復割鴻溝鄭君立義不名藉項伯胡顔肯姓劉游潛峯二首昔年會稽探尚書探得六甲開山圖載之潛南天柱山上侵霄漢下淵泉真人秘語世不傳但見絶頂䝉雲烟漢武射蛟浮九江舳艫千里來樅陽築壇祈仙瞻杳茫茂陵檜柱空青蒼石牛一臥叱不起白鹿還歸深洞裏二月靈鶴有來時洞口桃花泛流水久留舒子國慣作北門遊山逺三峯出溪長二水流明皇夜游圖歌吹開元曲鉛華天寳粧苑風翠袖冷宫露赭袍光閨闥連閶闔驊騮從驌驦千門還欲曉九陌乍聞香李賀晚歸圖近代推名畫諸君作薦書皇都開藝學博士是新除高栁長安道亂雲昌谷居丹青聊至此僕馬晚歸歟饒守董尚書令畫史繪釋迦出山相及維摩居士使靈山香火之因不斷復恵臘藥數種皆病夫所欲也作此寄之示病毘耶金粟影出山五祖金仙相神妙通靈顧虎頭白蓮香火空諸妄臘中發藥補衰朽扶杖清風看花栁㨗書政用此時來開顔正爾難忘酒韓門弟子更誰如即今猶有董安于更有承明兩學士與公相對白髭鬚成生山水畫歌畫水不畫濕畫山不畫堅盈尺之紙數寸管便有江湖萬里天成生貎古心亦古造化為工筆端取𤣥冬起雷夏造氷翻手作雲覆手雨嶺外荒山與野水自昔不聞傳畫史只畫瀟湘與洞庭于今却在兵戈裏翠峯碧嶂鬰然來病眼愁心次第開人家浦溆扁舟渡何日真能到一迴次韻可師題于逢辰畫山水二首江漢踰千里隂晴自一川故山黄葉下夢境白鷗前巫峽常雲雨香爐舊紫烟布帆無恙在速上釣魚船席上浮三楚毫端㑹百川名今大年亞意古恵崇前竟日對秋色無時散暝烟知君不浪語一眼認歸船單老畫樹石山水歌老樹筆間生竒石筆下出濃淡高低逺近山隂晴朝暮烟雲沒漠漠江天杳杳空不勞施力自然中便于沙際尋歸路却怪霜林葉不紅畫虎行為吉州假守蘇公作昔日何人畫於菟君家獨有他家無宣城老包骨已朽紛紛俗子尚讙呼大虎蹲踞小虎戲目光注射百歩外名畫多聞内府收人間豈惜千金費巉巉岩岩谷中石老樹穹枝拂秋色銳頭將軍射不得卻挂江南使君壁林間一嘯四山風麏驚狐號鳥墮空不向南山隨李廣只愁東海笑黄公憶昔余頑少小時先生教誦荆公詩只今耆舊無新語賴有廬山病可師再次韻題于生畫豹二首耽酒豐城客子醉畫山崦人家他日營丘伯仲高名逺出長沙彭蠡何限秋鴈此君胷次為家醉裏舉羣飛出著行排立平沙春日登眺遊寳勝諸寺且觀名畫䕶法儼神龍諸天擁梵宫樓臺春日麗海岳畫圖雄浦樹重重緑園花灼灼紅微風吹細雨只在夕陽中次可師韻五湖出畫師手一葉浮漁父家風裏芙蓉野色雨中鴻鴈汀沙白鷺洲金陵與廬陵俱出白鷺洲相望萬里江中同二水流雙廟開元天寳間袞袞見諸公不聞張與許名在臺省中跋韓子蒼代葛亞卿詩夏木隂隂欲放船黄鸝啼了落花天十詩盡説人間事付與風流葛稚川訪鄒道卿故居履霜頗强徤晨興恣所適兩兒休籃輿呼客同䗶屐危橋出隘巷慿髙聊物色蒿然但林莽蕪廢長荆棘井灶那復移江山依舊碧要知千載下懐賢求所歴句平生功名心夜牕短燈檠離鸞只説閨中事䑛犢那知母子情咏慈母溪兩宋名賢小集卷一百十四
