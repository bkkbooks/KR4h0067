body:
  text: 兩宋名賢小集巻一百三十三宋陳思編元陳世隆補幻雲居詩稿鄭獬字毅夫安州安陸人皇祐五年進士第一神宗朝拜翰林學士為王安石所惡出知杭州徙青州提舉鴻慶宫卒有鄖溪集採鳬茨朝攜一筐出暮攜一筐歸十指欲流血且急眼前饑官倉豈無粟粒粒藏珠璣一粒不出倉倉中羣䑕肥蠡中絶句千重越甲夜城圍戰罷君王醉不知若論破呉功第一黄金只合鑄西施逸句東飛江雲北飛燕同寄青春不相見夜來過嶺忽聞雨今日滿溪俱是花挽老蘇先生豐城寶劍忽飛去玉匣靈蹤自此無天外己空丹鳳穴世間還得二龍駒百年飄忽古無奈萬事凋零今己殊惆悵西州文學老一丘空掩蜀山隅恭和御製賞花釣魚二首輦路鮮雲五色開一聲清蹕下天來水光翠繞九重殿花氣濃薰萬夀杯繡幕烟深紅㑹合文竿風引綠徘徊蓬山絶頂無人到詔許羣仙盡日陪禁籞平明帳殿開華芝初下未央來人間綵鳳儀韶曲天上流霞滿御杯花近赭袍偏照爛魚窺仙仗亦徘徊蓬萊絶景何曽到自愧塵踪此一陪奉詔赴瓊林苑燕餞太尉潞國文公出鎮西都都門秋色滿旌旗祖帳容陪醉御巵功業迥髙嘉祐末公至和中首陳建儲之䇿精神如破貝州時白居易獻裴晉公詩云聞説風情筋力在只如初破蔡州時匣中寶劍騰霜鍔海上仙桃壓露枝公之子近有登瀛之命昨日更聞褒詔下别看名姓入烝彞送公闢給事自青州致政歸呉中公闢即程師孟青瑣仙人解玉符秋風一夜滿江湖曽歌郢水非凡曲未掃旄頭負壮圖公昔北使憤然屢抑敵人終日望君天欲盡平生知我世應無扁舟應約元宫保瀟灑蓮涇二丈夫嘉按元宫保即錢塘元章簡公絳盖嘗寓居于蘇州送程公闢給事出守㑹稽兼集賢殿修撰越州太守何瀟灑應為能吟住集仙疑是賢雪急紫濛催玉勒公奉使方歸紫濛敵中館名也日長青瑣聼薫絃一時冠盖傾離席半醉珠璣落彩牋自恨君恩渾未報五湖終負釣魚船寄程公闢念昔都門手一攜春禽幾向苧蘿啼夢回金殿風光别吟到銀河月影低舞急錦腰迎十八酒酣金盞照東西何時得遂扁舟去雪棹同君泛剡溪雪中梅臘梅欺寒飄玉塵早梅鬬巧雪中春更無俗艷能相雜惟有清香可辨真姑射仙人氷作體秦家公主粉為身素娥已自稱佳麗更作廣寒宫裏人垂虹橋在呉江又名利往橋三百闌干鎖畫橋行人波上踏靈鼇挿天􅤔蝀玉腰濶跨海鯨鯢金背髙路直鑿開元氣白影寒壓破大江豪此中自有銀河接不必仙槎八月濤明皇四海不搖草九重藏禍根十年慕一作傲堯舜一笑破乾坤花萼無兄弟豺狼盡子孫潼闗兵己破㑹憶老臣言聞南陽吕諫議誨長逝子文三仕去何頻一卧南陽竟没身明主自應容直道皇天何事殺忠臣柱天力屈空留草貫日心存不化塵黄壤不知人世事為君懶哭楚江濵讀司馬君實撰吕獻可墓誌一讀斯文淚瀉襟磨天直氣萬千尋知君不獨悲忠義又有兼憂天下心罷禁林行次南都遇雨二首雨聲飄㫁忽南去雲勢旋生從北流應料凉風消息近蕭蕭己在樹梢頭榴火燒空未擬休忽驚快雨破新秋晚雲淡淡趂落日只到楚江南岸頭題僧文瑩所居壁守杭日作西湖頻送客綠波舟楫輕春日蘿徑静浪花翻逺晴杭郡閣作雨影横殘虹秋容隂映日寒江帯暮流曉角穿雲出峰藏翠如織宿鳥去無跡封書寄所懐聊托金門翼按玉壺清話云二詩時頗訝其氣象不逺後解杭麾將赴青社以病泊舟楚州而卒其語已先兆矣登第後作文闈數戰奪先鋒變化須知自古同霹靂一聲從地起到頭身是白雲翁公病中常夢浴玉龍池驚見體生鱗角而寤孤山四照閣湖山天下之絶境羣山繞湖千百重碧筍四挿明鏡外此閣正落明鏡中當軒不置忩與檻湖光山翠還相通側耳似聞天仙語接手便欲翻長空省中畫屏蘆雁髙堂傾動長江流黄蘆羣雁滿滄洲掃開長安塵土窟寫出江南烟水秋兩雁斜飛入空濶四雁顧慕横沙頭髙風拉折蒼玉榦蘆花雪盡無人收赤日飛光不敢近但覺爽氣屏間浮常聞畫龍入神變坐馳雲雨天地逰只恐此雁亦飛去瀟湘萬里誰能留遥題明州太守錢君倚衆樂亭使君何所樂樂在南湖濵有亭若孤鯨覆以青玉鱗四面擁荷花花氣搖紅雲使君來游攜芳樽兩邊佳客坐翠茵鄞江鮮魚甲如銀玉盤千里紫絲蓴金壺行酒雙美人小履輕裾不動塵壮年行樂須及辰髙談大笑留青春游人來看使君游芙蓉為楫木蘭舟横簫短笛悲晚景畫簾繡幕翻中流貪歡尋勝意不盡相招却渡白蘋洲日落使君扶醉歸游人散後水烟霏紫鱗跳復戲白鳥落還飛豈徒樂斯民魚鳥亦忘機使君今作螭頭臣游人依舊嵗時新空餘華榜照湖水更作佳篇誇此人檇李亭閒抱琴書檇李逰仙壇古屋一筇留驛橋通市人沽酒湖水依城客放舟葵扇桃笙聊却暑蘋花楓葉已知秋坡翁仙去詩聲在寂寞林塘卧白鷗月波樓古壕鑿出明月具樓閣飛來影中野色更無山隔㫁天光直與水相通溪藏畫舫清紋接人在荷花碧玉叢欲解金魚避殘暑晚雲深處待歸風寄題静照堂招提去山逺還似在山家晚日惟歸鳥春風自落花空談消刼火醉墨灑天葩更欲拏舟去清溪月正華田家數畝低田流水渾一樹髙花明逺村雲隂拂暑風光好却將微雨送黄昏兩宋名賢小集巻一百三十三
