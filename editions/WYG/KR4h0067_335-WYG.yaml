body:
  text: 兩宋名賢小集巻三百三十五宋陳思編元陳世隆補癖齋小集杜旃字仲髙金華人仁翁汝霖之孫陵之子兄伯髙旟弟叔髙斿季髙旞幼髙旝皆有詩聲時稱金華五髙旃有杜詩發微傳于世白雲在南山白雲在南山幽鳥乗風飛鳥飛不能逺雲髙還難依園中亦有菊堂後那無萱游子不得歸銜悲欲何言緑珠行蜀絲殷空金作谷珊瑚成林珠百斛彼姝千花萬花簇明月出胎照波緑鏡中飛鸞掌中身夜月春風看不足悲歡倚伏為禍福西里憐顰東市戮願將舊意奉新人此别他生定難卜君因妾死莫多怨妾死君前君眼見髙樓直下如海深璧玉一碎沙中沈平時感君愛妾貌今日令君知妾心同平父園中即事季冬少寒凜霜薄日色明訪我㑹心友相攜園中行菜甲長疎花梅枝綴初英潛魚戲晴波寒雀暖有聲小步極遐覽閒吟暢幽情語言接繾綣意適體自輕嵗華晚更好景趣靜始并俯仰物態閒聊與同春榮明鏡行明鏡照形不照影明月照影不照心朱絲委地流水咽寳劍挂壁蛟龍吟二桃畫謀恩義絶慘慘嚴霜飛六月銜石海可填鍊石天可補君非食蓮菂安知此心苦上徐子宜侍郎二絶當年金屋誤承恩自倚容華託至尊風外游絲難繫日依然青艸暗長門猿臂將軍戰不休當時部曲亦封侯夜凉忽夢燕山月猶幸君恩晚見收九日懐陳舍人白髪江湖暗青燈几席凉窮途幾半百佳節乂重陽命也吾何奈天乎孰可量元龍樓百尺猶足慰行藏蔗境菴二絶世事多端好備嘗未能悦口勿輕忘結交莫厭初年澹晚節相看味始長美惡初終自不同新人那念舊人容君知食蔗逢佳境不念人間有菲葑别江隂宰魏元長兼望木叔使君荆山抱璞自遭毁漠漠塵沙埋皓齒咸韶正音或出爨下桐千年憤鐵一日變化成蛟龍人生相歡貴知已心不相知異生死豈不見豫讓不報中行氏又不見聶政殺身酬仲子滄海終可填太行竟能移丈夫殺身為感激有恩不報非男兒意氣磨日月感遇由一時齊威九合諸侯盟黄河倒流五岳傾楚茅入貢民冠帶金繩玉檢思告成髙臺已荒曲池既平不見夷吾功但聞鮑叔名賦賢已錄靜觀趙史君喜棊有是録約予賦詩物理因人創神機自古傳揚雄嗟有法孔子嘆猶賢勝負存虛實初終謹後先按圖嚴畫井起數象周天百戰期爭道三隅察守邊開基思漢祖復土想周宣審勢攻無備沈機救未然勝心游碧落幽思及黄泉冒利魚貪餌乗虚雁避弦紛爭忘父子迷惑到神仙守必防重折攻須出萬全妄興侵伐意私擅殺生權紿弄心懐詐包藏智益𤣥甘辭韜甲胄險志匿山川諱忌真情露矜誇小數專怯圍潛却步貪得暗垂涎見逼難思進相持莫敢前蹈危鬚捋虎役志耳鳴蟬意滿渾忘食神馳更廢眠弱形遭毒手短節不空拳悔誤徒批頰矜髙欲比肩禍胎還隠伏陣勢漫綿延詭道非存正羸師合忌堅設心踰虺蜴攫子甚烏鳶造妙羣心妬趨亡衆目憐淺謀徒躁進重地莫輕捐黒白材因見雌黄論豈偏髙人真託興逺見始忘筌鑒戒無忘此防虞葢有焉請看奕棊句何愧鬭雞篇山有狙行山有狙不可馴山有虎不可親狙詐匪懐德虎飢須噬人死生託良馬信厚稱瑞麟野性定難保猛獸終不仁王粲宅春風佳人命多薄深宫井冷梧桐落江邊百尺斷魂樓未比鷦鷯一枝託漢家待士禮意失黨獄淪胥生鼎鑊南山豆萁苦燒焚鸚鵡洲邊埋一鴞丈夫擇木豈無術何爾依劉燕巢幕君不見平時子房侍帷幄一語不投斃文若登樓此日誠可哀亦恐從軍未為樂書懐呈鍾君祿吏部君不見黄河之水能上天白髪一變無由𤣥人生住世無百年倐忽變化空中煙眼前富貴皆年少悲苦長多少歡笑抽絃促柱向君彈宛轉淒凉不成調持心託明月明月照影不照心彈劍發長歌歌長宛轉多苦音瀉水東西南北流昔日年少今白頭欲對君前歌此曲恐君淚下不能收勿除蔓行蔓草君勿除葉蒂相連牽春風共滋長秋露同衰殘庭前梅花樹一種同根生南枝煖北枝寒讀杜詩斐然有作王澤久淪洽正聲皆雅言百川忽西流青黄雜犧樽騷經吹死灰明燭日月昏綺麗兆建安淳古還開元夫子握元氣大音發胚渾明婁失毫芒神羲隘乾坤再變六義彰一日五典惇上該周南風下返湘水魂仲尼不容刪餘子何足吞五季兵戈繁嘲􅑜蟲鳥喧頽波既瀰漫新竒尚西崑吻喙生譏評神鬼懐憤寃王蘇發醯甕黄陳窮河源煌煌百年間後學同推尊時時或嘗鼎往往猶戴盆倣摹惑銅盤箋釋訛金根顧余小子旃獨受柱極恩神融淚交墮思苦心屢捫相望五百載如接顔色温爐冶無停工况復忝諸孫斯文誠儻存庶以起九原紙被一首疎布裹敗綿破碎錯經緯嚴風過强弩終夜縮如蝟剡溪褚夫子益友吾所畏策勲在覆冒周密罕儔彚隠然萬里城可却戎馬氣脉髓盎春温濁酒有醲味直躬免拳跼夜氣益洪毅吳宫鳳花錦伐命可歔欷物微用匪薄道在窮不諱緼袍可終身狐貉不足貴陸務觀赴召四海文章陸放翁百年漁釣兩龜䝉數開天地吾何與老作春秋道未窮李耳守官逾二代張蒼職史到三公坐令嘉泰追周漢此是君王第一功兩宋名賢小集巻三百三十五
