body:
  text: 兩宋名賢小集巻二百二十二宋陳思編元陳世隆補栗齋詩集鞏豐字仲至號栗齋其先鄆州須城人渡江為婺州武義人少㳺吕東萊之門淳熈十一年進士甞知臨安縣稍遷提轄左藏庫卒有東平集曉起甘蔗淵曉起東風惡晴嵐忽變昬船隨山共走霧與水相吞鉦鼓遙知寨桑麻畧辨村雨來無準則容易濕柴門夜雨曉起方覺夜雨鳴簷送五更不驚高臥最多情窗間細視花無恙牆外隨聼屐有聲數把柔絲堤柳嫩一奩方鏡閘波清出門眼界殊明潔但覺春寒處處生晨征靜觀羣動亦勞哉豈獨吾為旅食催雞唱未圓天已曉蛙鳴初㪚雨還來清和入序殊無暑小滿先時政有雷酒賤茶饒新麵熟不妨乘興且徘徊離建旅中多得早朝晴野潤衣襟苦未清時時數㸃雨猶落隱隱一聲雷不驚山入夏來差覺老花從春去久無情長汀又渉來時路麥隴桑村小問程湖嶺下十里是為湆澹灘行者多至此捨舟急流方了又高岡日永周旋未覺忙壁上字多知店老嶺邉松茂喜車涼叢叢亂篠承欹石帖帖新荷戀小塘湆澹惡灘應笑我為虞魚腹犯羊腸寒夜瓦欲飛霜水欲氷蒲團今夜有塵凝爐寒閒取薪添火窗暗時將燭助燈久欲歸田游宦客未能忘肉在家僧於書更覺心情懶病眼愁看細字蠅中旬休日呈巖老近見東郊出土牛燒燈已過又旬休酸風鱗靣慵開眼細雨毛空怯上樓百歳光隂真蟻穴一年寒燠未鴻溝偷閒文字聊遮眼勲業悠悠且掉頭兩宋名賢小集巻二百二十二
