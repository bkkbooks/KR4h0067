body:
  text: 兩宋名賢小集巻二百十四宋陳思編元陳世隆補魯齋詩集王栢字會之金華人初號長嘯後更號魯齋受業何北山之門郡守蔡抗楊棟台守趙景緯相繼聘麗澤上蔡兩書院四方從學者日衆咸亨十年卒賜諡文獻有集赤松即景平生百慮懶尚有丘壑心佳哉二三友同盟時幽尋壯懐豁虛曠元宫窮邃深時方釀薄暑萬緑漲雲岑新篁疑粉翠日影篩碎金瘦笻扶野歩羽扇搖清吟漱齒掬清泚雪瀑開風襟脫巾挂琪樹露頂涵重隂山禽自在語濁醪自在斟物外轉栖碧石險蒼苔侵何時侣麋鹿結茅入深林和葉聖予小桃源韵二仙何如人夫豈古隱士道成遡泬寥羊卧不再起鸞鶴舞松聲蕭騷快心耳金竈清塵生餘丹不輕委我來桃源遊直窮路所止飛蘿搖春烟素雪噴清泚何時架草堂深入此裏翛然逃世慮錬魄繼遐軌送立齋入閩哭久軒雙溪秋氣深送子臨古道古道如掌平四顧行人少行行復行行何日度南嶠故人今己矣轉憶平生好世亊浩無涯愁雲黯江表送希夷之江西小雨斂輕塵秋聲滿亭驛驅車過南浦别懐徒襞積世道斯凌夷為善不自力一朝魯兩生為人作行色誰知離索悲有甚萬鐘失和寛居見懐韻北望戲馬臺荆榛滿中路英氣一何多懐古𣺌難泝山河腥日月虎豹沐雨露纍纍楚猴冠異哉天所賦豈無濟川才淹留秋不暮清風從何來灑灑定吾故贈我金琅玕鑿來雙魚素秋熟西風不力征老火未甘退蟬聲亂耳繁癡蚊健始最一雨從天來不復有故態天序自分明人心其少耐舟中和葉聖予桐江波漸滑霽色午方開香火嚴蘭若烟霞老釣臺崕高微徑險水轉萬山回欲訪先生裔相從買一坏江濶風帆急潮回沙露痕寒林無剩葉茅舍各成村雁落烟波𣺌鴉歸野色昏未知孤客棹今夜泊誰門野興文字飢難煮為農䇿最良興來鉏曉日倦後卧斜陽秋稼連千頃春花醉幾場任他名利客車馬逐康莊和趙師日韻我生無燕頷四壁笑相如門巷堪羅雀燈窓且讀書老來心事懶貧後故人踈尚有多情月時時到敝廬蘭早受樵人貢春蘭訪舊盟謝庭誇瑞物楚澤擷芳名蒼玉裁圭影紫檀含露英奚奴培䕶巧苔蘚日菁菁催雨人世如居甑驕陽不可鉏未聞芻作狗安得夢維魚賦斂民生槁干戈國計虛安危關一飽雨意莫躊躇題定武蘭亭副本玉華末命昭陵土蘭亭神蹟埋千古率更搨本入堅珉徽帝歸裝投定武薛家翻刻愚貴逰舊石宣和龕御府黄塵横空飛渡河中原荆棘穴豺虎維揚蒼茫駕南轅百年文物不堪補紛紛好事競新模傾欹醜俗亡遺矩如今薛本亦罕見髣髴典型猶媚嫵清歡盛會何足傳右軍他帖以千數託言此筆不可再慨然陳迹興懐語今昔相視無己時手掩塵編對舊雨同莊叟遊山小閣重隂一日晴清遊應己愜高情遙知雨後山光好但想雲邊屐齒清素壁雖曾題字舊沉疴不許㰱新盟因知關吏留魚鑰漫遣奚奴候晚程題山橋北山之北兩山齊一逕蜿蜒石作梯腳力倦時山始好芙蓉東畊赤松西石磴斜溪下水隈玉虹鎖雪挂崔嵬雖然只是泉三疊滂湃聲搖萬壑雷重題八詠樓樓壓重城萬井低星從天闕下分輝傷心風月客應瘦滿眼桑麻春又肥山到東南皆獨立水流西北竟同歸倚䦨莫問齊梁事斷石淒涼卧落暉大安中途迷道作此自警未識大安道行行多路岐人言訛近逺山徑倍嶔巇自有康莊處多因便捷移我今知堠子萬里不須疑兩宋名賢小集巻二百十四
