body:
  text: 兩宋名賢小集卷一百十八宋陳思編元陳世隆補樸齋小集張方平字安道宋城人舉茂才異等為校書郎英宗朝累遷禮部尚書出知鄆州神宗即位拜參知政事致仕薨贈司空諡文定有樂全先生集送楊君西安君過嚴陵瀨扁舟入婺溪灘長秋日短山逺亂雲齊未探驪龍頷聊羈駿馬蹄胥江濤正惡鴻雁此東西玉泉觀贈高道士古屋氣象冷蒼崖烟翠中龍歸半天雨虎嘯一巖風露後芝房紫霜餘柏實紅終期把藜杖來伴白雲翁寄汾陽郭先生君家白雲外巖溜響嘈嘈絶壑風烟淡孤峰氷雪髙自能無世累誰見有生勞指我蓬壺路瓊宫隔海濤都下别友人海内故人少市樓新酒醇與君聊一醉分袂此殘春北道邢臺路東洲泗水濵相期復何處京洛舊風塵寄郭誠思華下茅齋舎在世塵外松扉夜不闗心同秋水靜身共野雲閒自得逾三樂誰堪話九還他年玉泉約何以救衰顔初春遊太尉宅東池蓬㠀靈仙宅星河帝女家波光泛金翠樓影動雲霞清淺遊魚過參差垂栁斜移舟更尋勝逺見小桃花暮秋登彭祖樓危樓古城角山色遶蒼蒼寒日下何速清風來甚長烟塵思戰國雲水似江鄉重九登髙近瑎前菊已香秦州後園春讌贈部署劉几閣使栁暗三眠困花繁二月香秦州後園有二月花開最早繁艶甚盛絶有清香情懐當酒盡興味為春長疊鼓漁陽節清謳北里妝階前樂無誤席上有周郎江樓遲客靜外遊神迥望中塵物稀天連逺水盡鳥背夕陽飛木葉初揺落鄉懐動式微興闌不忍去遲子一舠歸夜意羣動已沉響蛩吟時一聲露寒仙掌重月午庾樓清感慨聞雞舞悲凉倚􅅇情幾多塵役者夙駕待鐘行送吳春鄉赴都法座臨軒䇿俊髦同君陛見預旌招疲駑十駕始千里孤鶴一飛先九霄蘭棹秋風行邐迤觚稜旭日勢岧嶤石渠為謝諸儒彦行邁同趨便殿朝蝶遲景融融暖氣浮中園曲宻小庭幽春風故引顛狂甚芳樹相容爛漫逰不慣風流輸楚女嬾將身世問莊周有時􅅗見多情處毎遇王孫盡日留青陽峽竒峰疊巘無重數横澗飛泉㑹一溪老樹藤蘿從古長寒空雲靄與天迷幽中應有神仙住深處惟聞猿鳥啼野性舊多山水癖恨無心賞此相攜謁觀妙宗師值晝寢一枕清風静館深滿庭松檜鬰交隂此時内景人難見月在泥丸日在心送沈生昆弟隨侍之博白炎方景象異中原海氣昏昏雜瘴烟今日蠻荒成雅俗薫風南播自媯絃不須南浦懐消黯好過西山訪隠淪比到嶺時應近臈相思可寄一枝春東連海道徹扶桑北望神􅆏斗柄傍兩處音塵杳難接征鴻嵗只到衡陽夕陽踈葦暮江湄秋色蕭蕭動客思自侍􅃊君領州去豈同騷客滯邉時兩宋名賢小集卷一百十八
