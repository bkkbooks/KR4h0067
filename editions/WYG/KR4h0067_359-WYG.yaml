body:
  text: 兩宋名賢小集巻三百五十九宋陳思編元陳世隆補玉楮詩藳岳珂山中奉寄通判楊宗博二首多病山中客無人傍酒罇與猨分橡子為鹿長禾孫白晝雲歸屋黄昬雨打門忽懐楊司馬烟靄隔重閽步壑斗堪摘登樓雲與齊未應隨日涉猶欠樂天題舊覽開青眼新編寫赫蹏便須聫和軸寄我小山西酬趙季茂遺餉松實鰻鮆柔魚掀天吹浪九夷東維錯分珍意倍濃越井戲沙形酷似秦囊遺算墨猶封色欺金嫩三江鮆實比瓊酥十丈松珍重故人勞問遺為言耕壠正勤農次韻趙季茂寄詩蒹葭道阻長人在水中央鴻筆寫秋思驪珠比夜光律嚴詩格壯鈐廣置郵忙鉅軸注銀水欲題無漢陽九月十三日始就郊墅拜寳謨閣直學士提舉江州太平興國宫之命槐影西清舞翠鸞竹宫髙接五雲環職陪温洛圖書地名在元封卜祝間晝訪未承龍閣問晨香猶厠羽衣班祠官到處無公事且聴松聲老此山茶花盛放滿山花容縝栗露氷膚消得脂韋酪作奴葉底綻葩黄映玉枝間著子碧垂珠潔躬淡薄隱君子苦口森嚴大丈夫便合味言歸雋永移根禁籞比青蒲九月十四日夜月明如晝敬想合宫竣事志喜而作纎塵不動月流空雲繞崑崙想合宫蟬冕侍祠三事列鷄竿肆赦九州同裁儀丙巳尊容典肇祀庚寅識聖功田野老臣察天意夜深頻起候西風將游太平宫小詩呈趙季茂聖治峰前松檜寒舊遊重此解歸鞍着身泉石無心客主掌雲山正額官老去雲居居紫府新來雜壓壓黄冠門東曾有劉仙洞剥蘚攜筇試扣看螃蠏無腸公子郭索君横行湖海劒㦸羣紫髯緑殻琥珀髓以不負腹誇將軍酒船拍浮老子慣咀嚼兩螯仍把玩廬山對此眼倍青願從公子醉復醒聞畫眉鳥聲戲作木杪幽禽巧語新何時曽記得名因様傳京兆成雙嫵人指漁陽開小顰儘稱如簧啼白晝未須對鏡學青春山中有叟答無語短褐龎眉更笑人太平宫遇雨山居五旬晴山行一日雨太平咫尺間千里隔跬步黄泥深三尺風聲更號怒誰語逋客知山靈儻留汝趙季茂有詩來適山間斸池得筍因以遺之併賡韻籬菊初黄楓葉丹蒼筠共此屋三間拂天未帶山雲白斸地已凝湘暈斑玉版有時堪咀嚼石欄何日共躋攀山家聊送清班兆且為屏星識九關葆清菴值雨二首積雨將旬浹都無一日晴簷寒多雀噪路滑少人行雲氣連山暗霜威徹骨清更憐攲枕處終夕聴泉聲松竹鏁靈宅塵埃了不清洞龍隨劍吷檻鶴識琴心路指三峰近山通一徑深壁間少年字陳迹不堪尋予老病倦煩入山兩月頗得静中趣良月六日趙仲南端明朱子明户部曾編摩忽皆専介王囦衜諸人亦來而東老姪自石門至閣皁劉道士又以詩巻為䞇戲成鼓鐘不合嚮鶢鶋人事何因到野廬玉節金臺新貴字寳章琰刻故交書葛冠道士重温巻芝砌郎君亦下車忽憶蘇州風雨夕空山落葉昔何如山居作報書竟夜有感戲成山居踰五旬正以厭煩故誰持故人書剝啄扣我户奩篚旅庭砌缾罍列廊廡啓緘讀風簷盈幅字如縷頗欲從簡易人事正如許厚意來逺方殷勤不容阻遥欲混俗塵又覺初志誤筆研久荒穢肩腕仍旅拒沈沈青燈夜牕牖打風雨聊激懶惰心小出啽囈語霜㕙比鉛觚玉蟲剔釵股隃糜方㺯墨擘繭更伸楮始焉據几案敏捷疑得趣倐爾懐交情恍忽接良晤緘題甫一二手熟漸四五溪毛簡精粗報祝視豐窶札胥謹印蠟僕𨽻治筐筥但知役羣動不覺向五鼔作勞耳屢鳴倦寫目如瞀低頭觸屏風入鼻飲辛霧欠伸忽三喟静念起百慮吾生何太勞窮處尚弗恕仕皆係窮達世豈忘喜怒人以情見憐我獨影相顧謙勤福所基傲放人共惡當年衆楚咻詎止雙蛾妬生雖有逺志我豈惜遐舉偶因囿形質莫與揷翎羽徒誇九垓期姑了一夕苦嗟哉且努力掣肘無單父十一月十五日忽苦舌瘍甚不能飲食憊卧一榻戲成君不見東坡昔步虎溪月夜聴溪聲廣長舌溪聲不㫁流不枯此段磊落真丈夫一生吾伊換喑嗚嗟哉三寸予豈無公子縉紳陳禮法枕麴無思噤如蛤辨士説客談縱横叱牛惟解供力耕爾來更自作竒痛晝苦吟呻夜妨夢伏牀啜粥猶漓浪臠肉持將堪底用太倉受禾三百㕓大官烹羊俱鼎羶瀛州給膳稱學士飽食端居今六年生平元不負此舌欲辦一竒了無説更憎此舌工負予乃復累我七尺軀鴟夷榼載鸕鷀杓向口低眉輒前卻齒牙助桀復搖落誤殺流涎辜快嚼仰天大笑絶冠纓舌兮腹兮誰重輕宿溪聲閣望香爐峰偶成二律閲歴煙巖古琮琤雪澗横海潮秋八月山雨夜三更肯作隨流想難忘漱石情壯懐徒激烈聊復以詩鳴廬峰三萬丈鳥道度嶙峋宿雨留前躅清風絶後塵誰憐石樓客同是玉階人謝屐須乘興千年艸木春寄道士楊休文羽衣來自閤山前見説山中老散仙出岫無心雲傍日歸巢有意澗鳴泉同襟汗漫尋常客掉鞅文章四十年我亦近為猿鶴侶試從香火結前縁己亥明禋恩封鄴侯感愧有作二首静即為方動即圓幼知碁局老饒先封同桑梓一千户蹟逺蓬萊二十年品禄幸猶容後隱榦畬何敢擬前賢只餘築室疑相似三萬牙籖還儼然布衣所願極封留佩飲歸來正倦遊汗馬無功開上郡鑄龜有意顧中流南巡空負黄圖恨北望還興紫陌愁王國不煩謀生父自憐支子亦通侯謝趙季茂海錯二律珍殽惟錯逺持將賴有詩情合得嘗明月擘蚶分瓦礱晴霞浴露珠房鰂烏鮆白螺開靨蚷紫蝦紅鰾挾膓雁㫁閩山歸未得把杯猶憶少年塲苜槃朝日照蓬蒿消得長吟賦老饕喜見監州有螃蠏未須學士議車螯案鮭三九漫青韭斗酒十千無白醪應為近來詩思少故將飲興發風騷二十七日復有㫖除帥江西一旬之間兩奉除音再賦二首披腹忱辭久未呈浹旬兩詔下宸京老臣何路通誠悃聖主無私燭物情鶴隴未渝耕隴志牛衣空換錦衣榮九重自是真知巳莫惜捐縻負此生郊􅆵不隔馬牛風枌梓環隂跬步通湖帶江襟邦畛接雨簾雲棟物華同未須預計荒三徑幸有需章達四聰尚想東湖海棠鬧秪今未改舊時紅香蠃金箱玉質介為裳一騎紅塵自逺方籍掛衆香椒桂國身居大海水雲鄉丁蠃薦醢體猶具煎甲流芳名未亡舉酒便應酬一醉尊前風味試平章昨説箳篁聞有繡帨之醼囘車戲呈季茂慣開嬌小處繞帶覔銀魚授雁定同瑞㺯麞應誤書生朝今日是嘉醼早春初無分陪湯餅到門空返車春晴將游玉淵踐吳季謙待制馮可久武博山行之約先走長句康廬三萬丈下有神龍淵旁聫玉井並仰溯銀河連層厓積氷雪㫁㟁藏風煙崔隤五老峰迸瀉三峽泉鯨鯢碎紫霧螮蝀開青天脈疑海眼近寒入山骨堅澗艸揺秋暉谷花發春妍其間地布金到處題標璇大哉象教尊儼若螺髻仙巍巍南宗栢湛湛西方蓮總持包萬法卓犖棲羣賢慈心鬼神仰顯跡今古傳逺令千聖境容此一席顓我昔宿命通曾結他生縁嘗聞祖師隱上應帝釋躔清宵珠石隕白浪星河邊至今澎湃中常欲光景燃當時初卓錫如昔睨采椽浮雲常抗志立雪思比肩壯懐凌九疊浩氣湧百川山水為髙深志節争後先永言縈俗累兹遊今㡬年猶想謝公屐同整劉琨鞭橋梁識昨徑嵗月驚舊鐫盍簪有耆碩授館許款延牛耳盟屢寒馬頭月方圓便思供糗餈更擬焚蘭荃先尋遺民盟次迹繡佛禪䇿杖掛錢去拂石看山眠歸來廬山南三士同陶然詩成翌日病作未發病中酬趙季茂雪窗病惱獨支頤不解隨人舉酒巵驚辨有時欺白羽解圍無婦蔽青絲驪珠滿袖勾吟興鹿氅看山戀藥糜莫訝牛腰聫未足江州司馬例能詩豫菴三瑞詩環豫菴皆竹也嘉熙庚子三月忽呈三瑞皆前所未覿或者嘉祥有待而出耶䕶以朱欄表以名扁因物有感復系以詩鵷竹雷雨新頭角煙霄舊羽翰聫根方拔象接翼更停鸞紫錦雙翻籜青銅並倚竿摩穹端有待聊復䕶彫欄蟬竹氣並隂陽正仁無雨露偏闔開知有地竒􅀈自潛天雖煥雙紋異仍存一節堅薫風動蟬腹槐緑又鳴絃龍竹夭矯青池近騰拏碧漢遙微風鳴獬管輕霧映鮫綃舞翠槐齊秀蟠青松後凋終須還直道勁節自干霄庚子三月二十七日又易守當塗四月十一日發辭免之牘書懐成二唐律九重旒冕真知已㡬度弓旌憶款門素志不為温飽計赤心未報聖明恩鶴汀雲雨暮應捲牛渚風煙秋欲昏休向長江問陳迹浮梁孤塔不堪論去載西陲夏正初首驚禹閣下除書璇杓導㫖方螭陛珍圉迎釐又見居三見綸音傳詔壐六看棨信到耕鋤秪今又上公車奏何日煙蓑返老漁十二日諏吉受通議大夫告再書述懐二首聖代論思秩中朝博議官尚紆郡邸綬空著侍臣冠嵗月驚馳隙功名儘畫墁髀銷今已復半世愧羢鞍五雲瞻觀闕百印寫綸絲有愧陪豹尾何功復鴈踦精鏐朌紫磨實篚詠緇宜聖徳知難報規銅笑白髭四月二十日被以郡事入奏之命再賦二首五雲堆裏望觚稜二紀周南夢未曾四輩兩年勤詔札九重一念又黎蒸烽臺雖有深秋燧雁塔應無曩日僧預備正須如雍國不妨徳業頌髙昇去年冬暮拜弓招槐夏重承接畫朝錫馬敢期先雨露㝠鴻自愧㸃烟霄沙墀有路瞻唐表瓦缶何堪溷舜韶歸郡定應遲六月却從故迹問凌歊新荷出水貼水初翻紫玉團忽驚矗立傍闌干瑤池七日來青鳥玉鑑孤奩舞翠鸞曉露走盤珠顆瑩晚風颭盖雪衣寒從今十丈開花面大華峰頭更一看舟過庾樓得名元是庾西陽秋夜何關舊踞牀坐上參差雉横堞檻前來往燕歸檣騷人雪月撩新句游子風雲憶故鄉何日君恩粗可報苔磯重此濯滄浪簡吴季謙堅他日柴桑之約時季謙有潭帥之命二首㡬年諸葛卧南陽蠡澤春風詔趣裝丹檢紫泥來四輩碧油紅斾又三湘不闗富貴干旄戀要看功名汗簡香雪汁蓬婆漸秋水好扶西極漢天長君今西土我東馳一醉相從又㡬時星變十年占軫野風寒兩地説江湄憂時有慮慮須早了事欲歸歸未遲年齒官班略相似伴閒頻記樂天詩兩宋名賢小集巻三百五十九
