body:
  text: 兩宋名賢小集巻三百三十九宋陳思編元陳世隆補古梅吟藳三冬夜二首讀罷牀頭一巻易曉風乾盡銅壺滴起傍危䦨嘯一聲月明何處人横笛一屋白雲無鎖鑰酒酣要摘梅花嚼相逢石鼎老彌明吟罷松梢月欲落晚舟泊長河詩客行裝少孤舟一葉輕寒鴉隨日落秋雁破霜鳴山色攅心事江聲咽世情故鄉無百里酤酒話歸程冬夜山中寒入雁聲霜滿地香沈梅影月當崖獨鶴歸來童亦睡微風簌簌落松釵贈詩客梅窓騷人行脚遍天涯何處青山不是家惆悵舊時雲外鶴結巢窓外守梅花樂府四首妾心江岸石千古無變更郎心江上水倐忽風波生瑟瑟涼風來妾身後秋扇安得復炎熱相攜不相厭製衣寄夫壻妾有冰雪段中間連理枝不忍剪教斷殘月小樓西鵑啼思欲迷妾夫在天南何不那邊啼夜興山房靜對碧巉岏與客歌騷夜未䦨客去燈寒眠未穏興隨明月在䦨干辛酉秋在京殊久日一到湖上湖上青山只麽閒未須詩屋近山間客邊有酒身無事日日一來湖上看讀家集先曽大父友堂幼從諸老遊聞道最早與簽判曽伯大父判簿曽伯大父一意刻苦為學棣萼卓然以文名家友堂遺文今所存者書説四十巻易論四十巻史評七巻詩文而已龍翰不學不足以得其箕裘之傳謹識其悲云吾家友堂翁硯影雙鬢寒刻志鑚書史篝燈照夜䦨學術三代上文章兩漢間胸次秋沆瀣詞吐玉琅玕寃哉命壓頭那復博一官二塤策科第亦不到金鑾友堂紛遺稿幾成汲塚殘江東兵燹餘白璧喜重完㑹當乞鴻筆清名期不刋已未試監假道于嚴報謝使君秋試賢闗擲雉盧道經鄰郡拜真儒棠隂日暖鳥聲雋苔跡月明吏影􅋯春野一犂今有犢暮歌五袴昔無襦片帆願借吹噓力一舸清風不用租嚴郡謁烏龍廟遇打碑者何年故處士靈魄此為家古壁填蒼蘚空庭隘落花山墳穿去鶴廟祭下飢鴉巫祝打碑賣神功播海涯春晚萬緑叢中春事䦨楊花如雪滿江干露沾花樹蝶衣重雨著芹泥燕嘴寒愁到吟腸詩綰斷夢依棊局客敲殘何時買得青山住煉就蓬壺換骨丹古岩寺古巖靈蹟異故故兀吟鞍石溜濺棊濕松風沍笛寒露華僧衲重曙色佛燈殘白社開何日談經上石壇見王廣文旅食京華不自謀可堪典盡鷫鸘裘一牀風雨孤燈夜千里江山兩鬢秋笑索寒梅吟苦句醉拈秃筆掃窮愁學人翻笑孫明復强乞希文一㸃頭牛渚山觀大江巨靈劈破蒼山石鞭起九龍入空碧山分兩半合不成夾住長江數千尺九道驚湍相擊撞雷聲怒發誰敢當神蛟出没不可數往往殺氣摩穹蒼嗚呼蜀道行且難劍門險似鐵門闗一夫可敵萬夫勇大開棧道通殽函固知長江當城壁立此天塹限南北東南王氣無窮年此江未必成桑田君不見金亮百萬鼓長風海舟出鬭一掃空書生不能長鎗與大劍只坐帷幄收竒功秋深過田家策杖行行過石橋農家雞黍逺相招田鋪棊局露鴉下山展畫屏煙雨描病骨枯于秋後葉詩懐雄似海東潮一聲老鶴松梢上賸欲乗風到九霄春日松隂小憩痩笻扶我過林端無狀東風掠鬢寒貪數青山不知去松花吹滿石棋盤水邊早梅梅花淡淡著寒烟漏洩春光老屋邊㑹彼清池寫疎影一枝分作兩枝妍繁昌道中江天日暖竹為輿獵獵春風載此臞湊入灞橋成一畫楊花吹雪糝吟鬚讀十七全史嵗久而徹燈火青編結興長可能厯厯記興亡董狐筆底風霜重班馬書邊蘭蕙香往事輸贏棊幾局浮名今古紙千張重重公案休拈起中有靈臺定否臧題國直先伯祖海潮賦後銀山突兀蒼海頭夜半鼓噪萬貔貅爭雄角力轉坤軸旋磨塵世偕浮漚朝朝暮暮自消長誰言于此隨海鰌鴟革裹尸已成土未必怒怨卒未休看公立論屈前輩筆端有力挽萬牛孤峯絶崖氣象古亦復粲粲珊瑚鉤分明掘見隂陽根判斷造化之深幽𤣥機發泄天帝嗔此文正恐雷霆收不然亦似畫鳥跡長夜鬼哭聲啾啾公自騎鯨去不返滿江明月蘆花秋過和州報恩寺唐張籍故居也昔年此地著書人詩骨成塵草木深突兀眼前僧結屋塔鈴風裏替君吟烏江項羽廟葢世英雄只恁休千年遺恨大江流漢提義帝作張本當日君輸第一籌連雪五日有無盡觀平生酷愛雪老我看不足安得走五臺六月漱寒玉無計巢雪山與物結幽獨方輿多竒觀出門欠車轂天公副微願連朝遣滕六寒林振琳琅朔風煽瓊木樓臺炯夜光地靈驚玉局幻成銀世界一旦飽雙目清泠天地氣吸入空洞腹賸欲呼夜舟飄然訪林麓登金陵鍾山絶頂萬仞鍾山著屐登中原今隔幾崚嶒自憐不及天邊雁嵗逐春風到八陵張麗華墓二首金井轆轤春夢殘香魂飛不到長安君王為虜妾為土夜月空分兩地寒結綺臨春跡已塵尚餘抔土鎖娉婷玉顔不及隴頭草嵗嵗春風吹得青王荆公讀書堂六籍紛紛盡可奴翻騰字説乃菑畬可知山半青燈夜只讀商君一巻書登長干寺塔金陵王氣已銷沈幾度凭闌愁滿襟往事僅存南北史傷情空費短長吟龍蟠故國山河壯鳳去荒臺草木深舊物尚餘吳塔在夕陽移影照江心詩境流水環詩境未容塵土侵步迂松逕曲坐占艸堂深秋句蛩分和山杯鳥勸斟好懐無客共相對一瑶琴哭羅潛齋此老古之學文章富石渠宦情雲淡薄吟鬢竹蕭疎未購茂林稿空埋汲冢書北郊相弔處寒日照躊躇漫題放曠疎林下清風吹鬢毛傍梅讀周易對酒歌離騷詩思秋雲淡古懐明月髙五湖天地别烟水綠平篙兩宋名賢小集巻三百三十九
