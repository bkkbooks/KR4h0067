body:
  text: 兩宋名賢小集巻一百六十一宋陳思編元陳世隆補梅谿詩集一王十朋字龜齡樂清人紹興二十七年進士第一孝宗朝累遷起居舍人侍御史改吏部侍郎歴四郡守以龍圖閣學士致仕卒諡忠文有梅谿集甽畝十首甽畝有遺士妄懐葵藿心朝夕傾太陽不耐氛穢侵肝膽有古劔願言決羣陰兹志尚鬱鬱抱膝成悲吟古道日云邈古意誰復知陽春漠無和流水空含悲郢曲變新調鄭聲入朱絲喟然三歎餘黙與羲皇期讀書不知道言語徒自工求道匪云逺近在義命中吾儒有仲尼道徳無比崇傳參十八章入道知其宗後學昧極致徒知授兒童孰識孝與弟理與神明通為臣不知此事上焉能忠仲尼作春秋垂訓千萬年古者父母讐義不共戴天莊同父何在乃與齊侯田魯國無臣子君親義茫然齊紀不並立諸兒得稱賢善惡不可掩筆削至今傳飛飛古帝魂哀哀寄春怨異鄉節物新故國人事變訴亡誰肯憐啼苦血空濺雲安再拜人傷哉不復見彼微雙鶺鴒飛飛同一原急難喻兄弟義著周雅篇周公代武王大義今古傳人孰無兄弟急難斯見焉願懐周公心無愧詩人言竹有君子節青青貫四時桃李媚春光千株弄妖姿世眼悦繁豔疇能賞幽奇君看桃李蹊蹄轂紛爭馳君看竹林下形影誰相隨七賢久淪沒高躅猶可追吾家植千竿風月足自怡豈不競時好聊為嵗寒期兀兀窻下士筆耕志良苦黄巻對聖賢慷慨深自許一朝出干禄得失戰胸宇曲意阿有司諛言徇人主貪榮無百年貽謗有千古丈夫宜自貴清議重刀斧我豈不欲仕時命不我與曷不枉尺求權門正旁午非道吾弗由兹心已先許願言安貧賤順命為出處儒冠誤身世偃蹇二十年豈不懐明主富貴乃在天平生學忠孝自致無由前青燈照夜長感激徒自憐觀國朝故事昔在景徳初契丹犯中原朝廷用萊公決䇿幸澶淵高瓊雖武夫能發忠義言詠詩退敵騎用醜樞相顔鑾輿至北城斷橋示不還一箭斃撻覽夜半却戈鋋至仁不忍殺和好垂百年偉哉澶淵功天子能用賢昔在康定初元昊叛西陲朝廷起韓范節制閫外師二公人中龍材畧超等夷胸中百萬兵對面千里機不比大老子而令敵能欺深期復靈夏重勒燕然碑軍中果興謠西賊心膽隳逆節遂稱臣戰士解甲歸社稷安泰山四海絶瘡痍堂堂寧復有為作思賢詩昔在元祐初朝廷用老臣元惡首竄殛賢雋皆彚征簾幃八年政内外咸清明四夷各自守天下㡬太平紹聖黨論起宵人壊典型二蔡唱繼述曲學尊金陵忠良投海島黨籍編姓名春秋亦獲罪學者専三經心術遂大壊風俗從此傾養成前日禍中原盛甲兵我欲著一書善惡深勸懲姦䛕誅朽骨潛徳發幽馨六賊未足罪禍端首熙寧次韻謙仲見寄湖山藍黛青湖水琉璃碧我時湖邊游山水正秋色詩翁偶乘興來作湖邊客談鋒兩地交意氣已相得詩壇予與盟文㑹公為伯豪詞肆滂沛淡語入幽寂心匠巧雕斵物象窮搜覔壯哉五言城卓爾萬仞壁初疑公腸胃百怪所窟宅吐氣干雲霄直欲鬬霹靂妙奪解牛術奏刀聲砉剨我才寸莛微洪鐘詎能擊又如鳴蟋蟀啾然和金石未窺學籓籬敢語詩奥賾繆為馬慕韓浪作赤效白奬掖非所蒙猖狂固宜責新篇又拜嘉開緘光焰射藏之比明珠長使夜照席惜哉不遇時豈為臧倉隔儒冠五十年世路疲行役操矛赴文場戰藝輒敗北書劒兩無成泥塗困蹤跡龍鍾似東野窮愁攪懐臆空吟三百篇高視古無敵霜風剪林木黄葉滿澤國我思公不見羸馬未能䇿恨無神仙術安得生兩翼因召管城穎免冠加拂拭書帛寄征鴻心目兩俱極答毛唐卿虞卿借昌黎集予少不知學古難學古直欲學到韓奈何韓實不易學但覺晝夜心力殫茫然故步亦已失有類夀陵學邯鄲雖然予心未肯已尚欲勉强求其端跬步不休效駑馬千里未至空長歎羨君兄弟俱早慧家學豈止傳柔温聖經賢傳飫已久百家諸子皆蠧殘學文須要學韓子此外衆説徒曼曼韓子皇皇慕仁義力排佛老囘狂瀾三百年來道益貴泰山北斗世仰觀我生於今望之逺時時開巻相欣懽豈惟廬陵惜舊本我亦惜此祗自看子今欲假敢應命願子寳之同琅玕辛亥九日侍家君同孫子淵子昭子髙登高於家之東山時菊花未開坐客皆以為恨至十月望獨步東籬下見前日青枝已爛漫矣東坡云涼天佳月即中秋菊花開日乃重陽不以日月斷也於是命酒肴呼隣里飲于叢畔云前日重陽日與客同登翫有酒無菊花把盃一長歎良辰苦易失十月今又半緬焉想前㳺獨到東籬畔鮮鮮霜中菊滿地金錢粲我思東坡言隣里乃相喚斬新作重九不以日月斷人生貴適意世俗豈能絆遇酒羣歡樂取醉期爛漫羲和馭白日疾劇走丸彈百年能㡬何不飲乃癡漢湖邊懐劉謙仲湖山如畫水如藍杖履湖邊酒半酣往事蕭條誰共説舊游零落我何堪炎涼世態從他變生死交情祗自諳詩客有魂招不得秋風依舊滿江南寄孫永之名龜年沂州人詠歌沂水舞雩風氣壓當時冠與童人似賈生年更少家傳孫綽賦尤工孤羆傲兀深叢裏一鶚軒昻衆鳥中早取功名寄衣鉢古來相種出山東寄毛虞卿名公弼後改名宏字叔度登乙丑第文㑹今年喜重尋葭姿玉質又同林弟兄並秀如君少朋友相知獨我深一别㡬勞終夜夢相逢更話百年心長卿賦有凌雲志却笑區區蚓竅吟虞卿工賦嘗笑子作詩而不事舉業次韻虞卿送别喜君直諒更多聞共惜光隂寸與分螢照夜窗纔煖席蟬吟秋樹又離羣尊前忍聴陽關曲江上愁看日暮雲别後誰能慰牢落錦囊長帶故人文次韻昝監務早梅羣芳避路放梅開奔走㳺人滿砌苔半樹溪邊衝雪破一枝頭上帶春回月移瘦影供吟興風薦幽香襲酒盃剛被西湖都道盡至今詩客句難裁次韻題曹大夫懐忠閣小閣誰懐畎畝情遙瞻天日眼増明平生憂國丹心在一飯思君血淚横豐沛功臣真有種并汾壯士素蜚聲區區問舍求田者應被元龍一笑輕和方叔見贈二絶相對清談味有餘始知勝讀十年書塵襟不用頻揮塵自有清風為掃除一舍蕭然學有餘窗間遮眼盡文書已將事業盟燈火萬事何煩酒破除次韻李刑曹病起書懐中原回首尚塵飛書劍南來早識機方事高眠學安石却愁多病似王微腸枯漫有書千巻腰瘦難勝帶十圍志士未逢聊爾耳古人何用泣牛衣寄僧覺無象我昔居鹿巖時來潛澗游西坡訪覺老終日為遲留高談窮古今滿坐風生秋令我名利心一聴渾欲休論詩出古律有唱無不酬篇章溢縑素錦繡爛然浮此老豈易得當於前輩求吾生恨太晚見師已白頭儒釋道不同相從苦無由三年游金溪兀坐顔常愀出門無游從獨賦臨清流金溪誠無僧孰是西坡儔深房鎖花木妙供羅珍羞益作潛澗思剛腸如轉輈魂夢不自禁夜夜飛山陬前日遇諸塗一笑忘百憂相視未及語歸袖風颼颼别來能㡬時不覺嵗月遒聞師結蓮社旦莫事真修我狂似靈運此志那能投淫雨春雨無端苦浸淫滿天飛霧日光沈出門蒸潤濡衣重歸路泥塗沒股深欲與陽烏開烈豔試呼風伯掃煩陰明朝㑹見佳天氣只恐春歸無處尋夜雨述懐夜深風雨撼庭芭喚起新愁似亂麻夢覺尚疑身是蝶病蘇方悟影非蛇澆腸竹葉頻生翬照眼銀缸自結花我在故鄉非逆旅不煩杜宇喚歸家送元範赴省清峭霜天振羽翰共觀一鶚氣軒軒願將柱腹書千巻盡作憂時䇿萬言請繫單于同太傳不阿人主異公孫龍頭素是君家物又見傳呼賈狀元國朝賈黯賈安宅皆狀元送劉政孫早嵗聲蜚講舍中漕臺前日始收功辛勤半世􅐽鹽學慷慨平生畎畝忠作佛肯居靈運後登仙更與阮郎同瓊林宴罷游天禄太一然藜定照公詠栁東君於此最鍾情粧㸃村村入畫屏向我無言眉自展與人非故眼猶青縈牽别恨絲千尺斷送春光絮一亭葉底黄鸝音更好隔溪烟雨醉時聴毛虞卿見過故人訪吾廬況是清和節高槐緑成陰芳草碧未歇攜手山間行清興浩然發呼童具雞黍濁酒醅初潑貧居媿荒涼野蔌草羅列盤實飣梅豆蔬餐薦薇蕨主禮雖甚微客色未嘗觖醉翁山水意不為壺觴設蟹眼煎新汲雀舌烹春擷澆君文字腸掉我清談舌人生㑹面難嵗月易飄忽君姑為我留忽忽莫言别戊辰閏八月歸臨安觀舊題修竹黄楊丁香慨然有感復書三絶於後吾家風物富擅欒最愛青青耐嵗寒千里歸來面蒼玉不煩時復報平安同日種松已合抱後來栽栁已參天笑看軒外黄楊樹我亦如君厄閏年蕙蘭憔悴菊萎秋葉底藏春已數頭詩客不知花韻别却言空結雨中愁望天台赤城山感而有作神仙境界無戰爭奚用設此巍巍城吾聞秦皇昔多慾富貴已極貪長生蓬萊方丈欲親到車轍馬迹無時停萬騎南巡適呉越天台咫尺行將登仙山不容肉眼見天為設險藏神靈山中采藥使未返鮑魚已向沙丘腥秦為防胡築紫塞連年不惜生靈害天亦防秦甚防胡赤城高峙烟霞外神仙要非求可得祖龍可笑徒勞役當時劉阮本無心花笑水迎山自闢我向丹丘數往來羣仙杖舄未容陪揮毫欲續孫公賦愧無擲地金聲才日極蒼崖千萬丈世無仙骨那能上直須内外兩丹成駕鶴驂鸞如指掌貧家連嵗蠶荒今年尤甚妻孥有號寒之患每欲以酒自寛酒惡竟不能醉拙於生事殊可笑也表弟萬大年家蠶熟酒醇有足樂者因思舊詩有剰栽桑柘教妻蠶句遂和以寄之年踰四十尚何堪愈老生涯愈不諳何以代耕猶未仕初無可樂誤為男號寒兒訝桑條沃飲酒賔嫌蜜汁甘堪羨通家萬公子細君善釀更能蠶大年和詩再用韻年少如君種種堪文場世事兩俱諳何憂晁錯不高第未怕杜陵無好男大年詩有未禄無男之歎況有田園足耕養好窮水陸奉肥甘更須猛割閨房愛來與荀卿共賦蠶李楰和詩復用前韻維摩老病思何堪藥性從今却漸諳掩巻正思眠大室論文俄喜遇奇男共嗟世路羊腸險剛怕人知䑕口甘聳壑昻霄君未晚吾衰已是食三蠶用前韻寄周光宗炎涼世態可能堪肺腑唯蒙長者諳耐久敢忘二世好同庚況有兩家男孟甲與光宗子同庚我嗟風樹徒悲苦君奉庭闈備㫖甘他日相看兩黄髪願為隣舍話田蠶送陸通判劇郡元非老手便庶民安我貳車賢一年不肯足到邑千里寧容吏索錢坐變池塘成貢宇平分風月上吟篇弟兄不減雲間陸拭目看君日九遷我十年前㳺㑹稽堂名民事寓招提去尋神禹藏書穴歸泝子猷乘興溪萬壑千巖形夢寐十峯雙澗記留題鑑湖倘許知章乞首訪故人尊共攜送潛老赴東禪駐錫清源十五年月明臺靜忽飄然禪心莫為東禪起南北東西總是禪難弟難兄漢二龔袈娑縫掖各清風淵明已就歸田願蓮社行將訪逺公兩宋名賢小集巻一百六十一
