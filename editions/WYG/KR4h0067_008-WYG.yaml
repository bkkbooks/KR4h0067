body:
  text: 兩宋名賢小集巻八宋陳思編元陳世隆補陳副使稿陳洎字亞之彭城人曽知懷州審刑院寶元間為屯田外郎慶厯五年轉吏部外郎加直史館遷度支副使尋調鹽鐵皇祐元年以副使行河還卒其孫師仲師道藏其手書遺詩嘗出以示一時名公如林希司馬光孫覺蘇軾蘇轍徐積錢世雄任希夷李􅌫俱有跋語極為推重離郭店馬上回寄鄉知迴望離亭映楚山慨然西笑入長安貪程野僕擔書引惜别鄉人駐足觀霞襯曙光烘積靄栁和春雨蕩輕寒遥期此地歸來日迎取相如駟馬看黄鵠呼樹止陵陽逢辰下建章竒姿標上瑞正色麗中央昭祀祠壇畔聲歌太液傍鳯教鴻作侣天與菊為裳神雀非靈異流鶯愧采章集汙寜我類一舉戛雲翔過項羽廟八千子弟己投戈夜帳猶聞怨楚歌學敵萬人成底事不思一箇范増多寄寶臣寺丞萬里扶靈宅夀阡謝公純孝是家傳廬開四尺同寒士榱列三圍陋昔賢先域定生連理樹門人多廢蓼莪篇我心罔極君應念露白霜清泣昊天藍溪閒居白鹿原東虎候西結廬岑寂映藍溪露侵僧履蘭三逕春入農歌雨一犂聒枕溜聲疑水宿拂檐山色類嵓棲閉門養拙無人問揭盡陳編日又低開元寺凌虛閣對雪寄解唐卿璚滴琳華一夜凝凌虚雕檻曉來憑眼觀銀色三千界身到瑤臺十二層玉灑砌塵供庾斛粉融檐水妒房陵化人宫好分明在恨不同君把袂登雉媒朱冠袞背一何鮮聲厲情驕目悍然若道物情皆錫類雉媒争似鵷媒賢還劉處士先令公鄩功名録劉公事朱梁當年力戰蕩妖氛十萬雄師四七勲将畧妙欺班定逺家聲髙過李将軍銘圖魏鼎文猶在筆勒燕山跡尚分今日閒披有遺恨可憐生不遇明君讀劉蕡䇿以指斥貴倖不顧忌諱有司知而不取藥石危言治亂箴賈生晁錯是知音可憐當日司文者不畏人言合愧心謝人惠三峯朱柿烏椑珍果益丹名新折紅林蔕尚青漿冷夜凝仙掌露味甘秋割楚江萍圓堆玉盌櫻難並賸薦金樽酒易醒應念茂陵消渴者整籃封貯到雲扃過田文墓當年聞奏雍門琴話著池臺淚滿襟何况今朝陵谷畔池臺無跡可追尋對雪寄崔仲裕時在藍田聞崔在酒舍奪鶴韜霞勢漸濃巻簾庭館好支笻乘查路濶寒凝凍種玉畦平曉被封天上瑤宫當月圃海中銀闕聳鼇峰思君不得同吟賞知在旗亭第幾重南齊曲江歡宴侍華裾舞拍琴歌萟有餘獨有純臣王叔寶解陳封禪一篇書南齊太祖曲江宴羣臣各使效技萟禇淵彈琵琶王僧䖍彈琴沈文季歌張敬兒舞王敬則拍王儉曰臣無所解惟解誦書因跪帝前誦相如封禪書帝笑曰此盛徳之事吾何以堪之湖上逢漁者雨蓑烟笠洞庭秋獨蠒綸輕一葉舟擬共停橈醉天幕緩歌濯足不回頭秋日端居暑退蚊雷静門閒雀到稀露莎蛩自急星樹鵲何依井臼貧雖樂溪山逺未歸時情似秋鴈一一背寒飛讀子虛賦聴辭深悵不同時及到同時位大卑争似唐皇将頗牧禁中言下用無疑兩宋名賢小集巻八
