body:
  text: 兩宋名賢小集卷二百九十五宋陳思編元陳世隆補芸隱勌游稿施樞字知言號芸隱浮玉人紹定初累舉不第從辟入呉攝庾臺幕往來錦溪間富吟咏自為序云余萍汎不羈毎多感賦暇日搜故篋得可意者百篇題曰芸隱勌游稿丙申赴浙漕舟宫旋捧檄東越董築江隄事竣秩滿歸又裒集所作共百二十題嘉熙庚子自序云先正詩野水無人渡孤舟盡日横與樞官業偶同遂命曰芸隱横舟稿世所傳芸隱詩集即二稿之合編也立春雪花風細拂春旗一色雲邊漏暖曦羣吏守文行故典長官書祝致新祠土牛底事遭身碎綵勝隨時把鬢欺爭似野人閒可睡枕邊搔髪自吟詩感春等閒覊旅欲歸難又見蔬盤簇綵幡九十日春從此始萬千心事對誰言梅邊粉墜寒香骨草際青歸野燒痕且把一盃酬好景花風今日已翩翻春前一日雪厯頭只有今朝臘猶雨霏霙滿太虚六出試糚梅欲妬萬花飄絮栁難如雲凝惨送元㝠斾風舞歡迎青帝車始信春工多富貴便堆白玉滿前除春日春到谿山已近旬尋春猶自負深情愛閒長向梅邊立趂煖時從竹下行苦乏詩材無可惜更嫌酒病有餘酲筭來豈是因名利纔有關心便不清贈湖邊栁亂撒鵞黄拂晚晴天涯多少故人情㳺船空逐輕隂轉半屬春風半屬鶯夢遊徑山值雪擁爐賦詩雪天元自冷何况是山中此聨是夢中句雙徑衝寒霧千林戰晚風空中人已定爐内火常紅萬事皆如夢誰知夢亦空次䝉齋至日韻試撿清臺厯黄宫氣已回功名難強致嵗月任渠來雨逕猶存菊烟村可問梅為貪吟有伴到此又徘徊玉泉水蹟無増减從知地有靈羣魚潜異窟一芥納滄溟濟隱新留詠超師舊講經聖時調玉燭龍睡不湏醒老僧念佛身世皆空境知空自不悲何須臨暮日逐急念阿彌裴相安心際維摩懴罪時同歸無有地明月在秋池和菊潭韻題秋潭買山圖後身世如萍漫浪休機心誰遣誤沙鷗從來風月驚人句即是湖山買屋謀訪友定尋雲外寺携壺須上竹邊樓知音自有漁樵侣莫被人稱第一流對雪怪得連隂不放晴直教飛雪試輕盈風回冉冉霓裳舞雲暗紛紛鶴羽明大似梅花饒一出薄於栁絮更多情披衣端為詩催起吟得詩成分外清霸國祠類説中有及臨安縣土地始末者城狐社䑕妄自依慿可愕而怒也及來錦溪因式是祠三肅而薦之以詩瓶笙驚晝睡此意有誰知蛙井成何事鴻圖豈易窺一身雖戮辱萬姓免瘡痍茅土今何在惟存霸國祠早起早起看花露西風把鬢欺心清多在道夢好亦成詩過但思求已生無事皺眉功名縁底事到手却如遲漕闈揭曉後述懷畫眉深淺與時殊肯向堂前怨舅姑自是吾儂多蹇薄可堪爾汝肆揶揄心知不是池中物眼獨羞看屋上烏得䘮搃為身外事不如委命樂樵蘇畫眉事出朱慶餘詩聞鴈飛盡沙田到水鄉年年來往為誰忙只貪夜月蘆花宿不是將身傍稻梁通真觀袁都録自號凝安御書扁其堂舊有桃源洞今蹤跡湮沒不復可考不到凝安二十年丹青一幅尚依然青牛已去仙蹤逺却有山禽下玉田桃源事已成荒幻那更形容學避秦欲訪舊蹤無處覔滿山花落不知春泛月夜歸短艇衝寒泛淺沙滿溪明月浸蘆花忽驚逺㟁燈光發籬落蕭疎一兩家龜溪市橋見月樓臺叠翠遶清溪淺淡雲邊月一眉行到市聲相接處傍橋燈火未多時寄寶藏壁天瑞路轉小橋東羣龍擁梵宫荇花明晚水蓮葉向秋風匠斧應休役禪窓定費功笑他塵俗者客路毎匆匆夜寒有作可怪輕寒薄短衾起來搔首傍燈吟百年易老風前鬢萬事難侵水様心雁呌雲天秋𣺌𣺌蟲鳴露砌夜沉沉朱絲自冩無人識一曲寥寥太古音入京何期又泛玉京船行止於人不偶然寒力勝如前兩夜世情熟似近三年只將興味留詩裏苦乏工夫到酒邊萬事看來忙不得只須委順樂吾天憶孤山孤山不是逺只隔鳯城門争賞詩家句誰招隱士魂秋風林下塚寒月水邊村擬待梅花發長吟酹一尊小樓獨坐用菊潭壁間韻簾捲疎風入小樓夕陽衘鴈欲西流無人細説吟邊事獨有黄花共晚秋别高家店獨抱朱絃識者稀湖山與我獨相知煙迷栁岸經行少月照梅牕做夢遲酒價寒高誰與貫衾綿夜薄自多思歸舟又值商量雪好似清溪訪戴時夢回銀漏迢迢箭緩傳夢回月在早梅邊小池凍合寒蘆折應是鴛鴦夜不眠馬上只為谿山有宿盟兩旬兩度此經行馬嘶險逕霜蹄滑鷗舞平沙雪羽輕豪氣不從塵外减新詩偏向道間成梅花似有相迎意野水籬邊數蕊明讀真西山奏疏人事從來不可憑誰令漢祖議和親連衡休易從㳺説厝火當憂卧積薪黯在淮南謀自寢亮亡司馬志方伸木強始見遐衝折信是經綸直要人新月照雪等是尋常月因添雪更明看他同様白與我一般清睡鶴應難認栖烏亦屢驚梅花仍有意相伴聼寒更雪晴送臘終宵舞知春破曉晴燒痕隨草長霽色映梅清溜滴簷簮折氷開沼鏡明夜窓如對月還又憶輕盈對雪誰使霓裳逞細腰隨風盡日袂飄颻飛花却訝春將遍舞片還驚凍易銷看熟似同鷗過渚興仙剛道鶴冲霄吟成誰與相酬酢賴有疎梅伴寂寥正月十四夜羈㳺偶值上元時蓮艶燒空照錦谿堂上珠簾如水浸庭前鰲架與山齊風傳皷吹春聲閙雨遏笙歌夜語低自笑蓬窓勤苦士何當太乙為燃藜新晴寒窓寂寞度殘冬接得春來雨又風芳思悠悠空自逺清㳺欵欵與誰同林梢淡抹烟初霽菜甲新抽土旋融多謝殷勤簷鵲舞數聲足喜夕陽中分韻春字栁外鶯聲錯喚人小樓吟苦不知春落花飛過鞦韆去一片閒情客裏身緑字韻曉帳香銷閒畫燭夢回山斷屛風曲輕煙細雨客情多南浦草隨新漲緑書事閒時但覺求人易險處方知為已深世事盡隨流水去白雲自識古人心所見齊眉沉醉綺羅叢心事誰知付去鴻不惜千金留粉黛更無一語怨東風閨思簾底臨鸞惜嵗華鬢雲慵掠寶叙斜落梅香斷無消息一樹春風屬杏花湧金門外桞絲舞困起炊煙羅綺相催欲上船貴冶亦知春有夜煖沙還付白鷗眠春夜賦小字岸桐花開春欲老目斷斜陽芳信杳東風不筦客情多杜鵑啼月青山小再行湖上樓臺萬叠照斜暉紅褪園林緑漸肥艶是杏桃開過了春風吹到野薔薇小樓對月京國誰曽念旅㳺閒情芳思兩悠悠却因今夜闌干月引得春風上小樓晚望芳草迢迢客路長栁邊吹絮燕泥香桐花折盡春歸去猶倚危䦨問夕陽再賦酬呉鞠潭酌酒酬春醉晚紅誰知書劍兩無功漁竿冷浸半絲月牛背閒消一笛風仙夢不隨狂蝶亂家書只倩素魚通友聲更擬遷喬去底似人情較異同覧鏡心到無營本勸㳺何期身又客皇州匣藏青鏡閒情薄衣染紅塵滿面羞風月幾曽於我少波濤半是為人憂故山幸自堪耕釣不必生涯足是休牡丹天然貴格鎮羣芳細雨叢中試寶糚肯與亂紅争國色甘同柔緑挽春光玉䦨倚困嬌無力金鴨沉烟不敢香可惜承恩亭北賦苦無妙語告君王留别詩僧家山方繾綣客路復西東自念依明世誰令䇿雋功三盃桑落酒一棹栁花風别後詩應好吟成寄短筒送春相逢九十日彼此惜芳期折栁停閒騎嚼花吟好詩經年行逺别對景起深思日落不知處四山啼子規懷友人錦野重來已秀葽雨肥梅杏粉痕消晚山四面子規呌曉樹一聲婆餅焦耐乆交當如水淡慣㳺身亦似蓬漂老鶯不省春歸乆猶自教雛學徙喬後塢示璧天瑞幾年不到已公齋客裏明知未定家生滅無邊方共語滿山春雨落松花即事暝色分煙上逺峯雨聲斷處又晴風寶屛香冷閒情逺落盡薔薇一架紅簷玉鳴曉窓風細響簷鈴一曲雲璈枕上聞夢斷不知仙路杳鶴銜松露入青雲東天目三潭之下有九溪之隔三潭之上有百尺瀑泉之勝飛橋之險渉深扳縁止到第三池上兩池及飛橋則無計可觀所以限仙凡也又有東西三井石室朝陽三洞黄冠厭人逰覧不肯指引僅披荆莾題名朝陽洞中不辭􅇖險訪龍潭潭底無窮碧似藍亂石鳴灘谿過九飛泉㵼瀑塹分三雖然道士能相引不比樵人得盡諳怊悵飛橋無路到乗風應許御雲驂不謂山行得此晴有名勝處必須經玉田草滿春無極石室人稀夜不扃自料俗情應厭勌誰知幽意在空㝠碧桃却似傳消息一曲瓊歌月滿庭西天目苕水之源出此山地如邾魯始躋扳三池浚澤髙岡上一勺為霖反掌間著脚不知蒼漢近無心直共白雲閒何時結屋枕泉玉滌盡塵根學大還題朝陽洞中東天目一吸龍泉萬慮清更尋古洞入柴荆桃花落盡春無路獨許騎鸞上玉京題至道宫雲巢軒西天目碧霄路底作生涯雲亦何曽定有家月印天池心宇净水鳴環珮出松花别天目東尖森洞穴西目浚淵庭三日若為霽羣龍亦有靈立依松作蓋坐倚石為屛猶恨歸鞍急回頭望逺青聞西山訃音奪到斯人處天心亦杳㝠嘉謀猶未罄直道信無靈四海方思雨中營忽隕星羣賢知孰附客淚欲飄零芍藥雖殊桃李競年芳色相惟應付夢鄉綸閣曽看金縷艶蕊宫初試玉樓糚露凝深淺烟中淚日汎温柔雨後香幸蜀歸來花正好可憐不忍看嬪嬙天女霜刀剪亦難露紅烟紫碧䦨干歩揺衣袂飄霞珮鈿合釵梁間寶冠枝上任他無力笑燈前還作有情看采根若可蘇民病始信無經載牡丹玉蝴蝶花芳意深深掩緑苔粉團香翅自裴回多應又怨春歸早化作飛花滿樹開小瓊花臨安縣齊山花一株四月感開無識之者效樂天昭賢寺花體以小瓊花賦之或謂婆羅花合是孤根在廣庭世間那得此雲英霓裳一曲天香散惆悵瑶堦月自明午寢舊詩零亂滿藤牀緑映簾深一縷香午夢驚回槐國逺浮生消得幾斜陽道間一溪新緑漲晴沙傍岸疎籬八九家桑葉又抽麻正長緑隂深處響縿車再觀錢廟荒碑五丈蘚生花飛鼠巢梁壁綴蝸華胄遥遥天下滿不知誓劵落誰家墻外竹森森新竹亞墻屛籜解餘斑粉淚零幸入詩家窮相眼可能不為此君青題鶴林丈室用俞紫薇韻物我相忘付八還坡詩偶來瓊舘扣霞關玉峯自有三生約玉蕊花事塵世真同一夢間華表風清丹頂去緱山月冷碧笙閒當知象外機無息肯羡黄金繫九環歐詩五到洞霄兼似冲妙多謝名山不厭人五來此地着閒身泉聲帶雨驅煩暑空翠縈風絶㸃塵金鼎火能知應候玉壺花自占長春何時詩證三生約乞借烟霞與卜隣楊蟾川鐵佛普度㑹甲午冬重隂九叠㡬曽開廣布隂功亦異哉八景定中朝十極五雲深處歩三台煙騰緑字鸞初下月照黄壇鶴未來去地一珠如黍米天人競湊鬰羅臺煒煜神光燭素屛苦魂䝉度語堪聽但知實相皆非相自證無形入有形火煉赤爐超上景水流華沼蕩寒庭功成試問誰能似元子真人舊典刑夜泊黄灣移近黄灣泊短篷野雲垂地一溪風渚香吹散荷花雨幾㸃流螢出葦叢夜凉聽雨暑雨沉沉夜正清凉欺客枕夢頻醒雖然未是秋時候滴在梧桐亦厭聽西河桞一把輕纔拂地垂柔梢淺淺抹燕脂絮花吹盡枝方長却恨春風未得知三過垂虹秋來三度過垂虹灝氣横江水接空㠶影輕浮千幅月漁竿冷浸一絲風楓初落葉前村近荷有餘香别浦通笑拍䦨干天地濶鱠鱸尊酒許誰同滄浪長史遺蹤二百年直教名字到今傳渚香細浥蓮須雨野色輕團竹尾烟但得幽情關水石何須隱迹痼林泉客中正有塵纓在來此清遊亦是縁水次秋蚊可畏利觜似花鷹針膚不暫停有生何蠢蠢藏毒在冥冥亂舞迷昏水喧聲接晚汀風威秋晚勁看汝易漂零中秋日虎丘呈庾使東畎先生蹇歩接輶軒於山亦有縁劒鋒遺斷石閣影倒平田紫日穿林暝黄雲共野連清輝無著處月伴使星圓清夜客身隨取止一室冷如氷景逺吟何托情疎夢不曽雨粘初蘚壁風謝欲花燈豈是無家者甘為有髪僧客中雨思細雨粘雲結晚愁黄金垂地菊錢流風來不覺窓聲戰分却覊懷一半秋聞鶴誰家嘹唳九臯聲客夢初回曉帳清華表不知仙路逺剛隨寒角轉殘更秋夜即事斷雨寒雲過暝窓落桐葉葉是凄凉楚山不入清宵夢月影蛩聲滿桂薌對菊欲荒三逕負歸期魂夢何曽到短籬九辯不歌陶令老清香還許入誰詩開爐次夕以不禁離抱來訪宏菴挑燈細語漏促忘歸即事有賦時黄澹翁在焉客裏情懷不自如夜深來訪子雲居挑燈細按新翻曲拂案同看舊架書梧葉敲風蛩砌冷菊香消雨鶴庭虚相逢且與開眉笑莫遣吟邊酒琖疎雪只消頃刻便漫漫人亦求窺造化難栁外情知非絮落梅邊誤作有花看朱門合席持杯煖紫塞分屯坐甲寒慨想英雄當此際肯分事業與袁安和庾使和毛君玉送墨梅韻東風吹上嵗寒枝筆下工夫頗渉竒此撡直應同晚節有香亦合伴氷姿淡於淺水籠蟾夜清似疎籬壓酒時春在小窓横幅裏調羮深意許誰知蠟梅送東畎先生併寓探梅之意澤國寒深未見梅東風何日到南枝玉堂應有新消息恐是人間未得知劒池雨壁煙崖翠蘚長龍泓冷浸斗牛光獨憐有水清無底不洗花池粉膩香生公講臺有㸃頭石千人湊坐雨天花片石雖頑識當家萬境俱空非有相漫留塵跡與人誇寄陳藏一萬人如海亦紛紜還著江湖有限身題葉恨深波影逺嚼花吟苦月痕新羡君朝市情俱薄笑我山林趣未真名勝捜羅能盡否細論何日許相親送同幕劉正父召試合是氷壺寘露寒果然筆札對金鑾雖云經世談何易漫道憂時事轉難正氣必能回壞證中流當與障狂瀾熟知議論平如砥且把清規作様看紹興城隍廟芸隱以東畎先生命來㳺禹㑹旹星夕後一日問宿江干明唤西陵渡忽夢登一山上有祠宇甚偉下瞰數峯奔伏于前面二小峯峯立一塔數水横陳清徹可愛趨後廡見一婦人立于西廂謂余曰公前身乃太湖神仙也回視東壁皆丹砂顆粒鮮明因取十餘塊吞之冷然而悟茫怪荒幻初無足紀適謁東畎令暫止于府貳之南㕔翌日書院諸友携尊慰藉便道訪西園徑城隍廟俯觀卧龍山勢起伏前對秦望下有應天塔庭宇壯觀仿彿夢中經行處因以中元日欵柯下三肅賦詩城隍姓龎諱玉唐人曽鎮此土江頭曽夢見仿彿此山川幻説從何證來㳺即是縁嫗言前世事我是太湖仙神理俱冥漠清香漫致䖍借張憲韻述懷呈東畎先生早起看秋意山前深未深水香飄逺渚晴色上平林風雨一雙鬢江湖萬里心何期來此地時作短長吟初泊世綵紹興南倅㕔不問蕭條傳舍空來欹客枕聼西風一庭明月無人玩秋在梧桐落葉巾早起簷前鳴玉響丁東清夢初囬鶴帳中早起井梧飄一葉方知昨夜是秋風風雨入夏惟憂旱秋來却浸霪風聲連海響山氣與雲深望嵗丹心切憂時白髪侵旅中無别事隱几自長吟禹廟衮服嚴常祀平成萬世功圭璋藏道室弓劒莾幽宫石定音釘今猶在梅梁事莫窮幽尋湏作計多恨雨匆匆髙園入門雖較小中却是壺天委曲松篁逕清新錦繡篇蟠胸有丘壑隨處是林泉更讀鰲峯句風流似謫仙扁名俱不俗難得此規模一鏡荷香冷四圍花逕蕪沼寛魚自樂竹静鶴同孤倣盡東州景何須作畵圖夢前室長夜幾年别傷哉千古心自因縁較淺不是老相侵熊夢如先兆鸞膠豈續琴曉窓秋葉響不覺淚盈襟西興寄呈東畎先生生平未始識東州不謂招邀得漫㳺南鎮門前秦望曉西興浦口浙江秋風搏怒氣潮初落山湧青㝠雨乍収豈為登臨重回首使星只在五雲頭兩宋名賢小集巻二百九十五
