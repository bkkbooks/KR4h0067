body:
  text: 兩宋名賢小集巻三百五宋陳思編元陳世隆補小山集劉翰字武子長沙人紹興間于湖張孝祥石湖范成大方名重一時翰逰於二公之門故詩聲日著乆客都下迄無所就有小山集桂殿秋夀于湖先生青帝子碧蓮宫不駕雲車騎白龍瑤池路逺羽衣濕玉珮泠泠明月中雙玉節到神京碧盃仙露冷如氷一聲金磬千花發洞口天風吹酒醒翠屛曲小亭簾幕垂隂隂梅香入枕春生屛西窓月落翠被冷鳥聲殘夢東風醒三年不唤清溪渡夢裏瀼西春水路江頭女兒雙翠眉能唱劉郎芳草句小宴一曲歌雲勸玉觴歸來斜月恰侵牀小窓細嚼梅花蕋吐出新詩字字香余乆客都城秋風思歸作楚語和呉郎採菱叩舷之音秋風兮凄凄山中兮桂枝彈余冠兮塵隨芳草緑兮未歸家遥遥兮辭楚荆傷去國兮重登臨舞長劍兮増慨復鳴鋏兮成音採中洲兮蘭蕋望美人兮千里我所思兮天一方共明月兮隔秋水種梅凄凉池館欲棲鴉采筆無心賦落霞惆悵後庭風味薄自鋤明月種梅花紅窓怨啼鶯唤起紗窓夢紅日滿簾花影㺯翠屛香字冷薫爐羅衣叠損金泥鳯去年君去燕歸時今日燕來君未歸欲把相思挑錦字夜寒懶上鴛鴦機起來翠袖香羅薄東風滿地桃花落漁父輕舟一葉一輕蓬上有蕭蕭鶴髪翁昨夜不知何處宿月明都在笛聲中春晚呈范石湖風日蕭蕭兩鬢華倦尋銀筆賦餘霞五更枕上無情雨三月風前薄命花春困有時因病酒客懷何日不思家年來事事心情懶惟有歸耕䇿最佳上元小亭靖康詔令文章種桐邑公侯國老家種得人間桃李滿春風無地不開花石頭城離離芳艸滿吳宫緑到臺城舊苑東一夜空江烟水冷石頭明月鴈聲中天上月春氷一片净無瑕萬里清光遍海涯欲與嫦娥移桂樹月明先合種梅花春日沉沉芳酌動金波笑引疎梅泛玉荷幾度天寒歸雁少一畨風雨落花多功名好在知心懶富貴重來柰老何鳥鵲數聲傳喜語梁間燕子亦能歌江南曲我家江南同野老自紡落毛采蘋藻清風滿袖讀離騷半畆幽畦種香草門前流水鳴濺濺日暮歸來自刺船遥山數叠作媚嫵落日斷霞明晚川雨餘汀草漲新緑紅衣濕盡鴛鴦浴採蓮女兒何處來唱我春風湖上曲瓮頭酒熟方新蒭白魚如銀初上鈎呼兒洗杓醉明月酒酣更作商聲謳鴻門宴江東遥遥八千騎大戰小戰七十二劉郎曉鞭天馬來踧踏長安開帝里子嬰已降隆凖公君王置酒鴻門東張良已去玉斗碎三月大照咸陽紅繡衣歸來日將夜可惜雄心天不借當時已失范増謀尚引長戈到垓下刁斗乍急營壘驚夜深旗尾秋風横玉帳佳人不成夢月明四靣聞歌聲㧞劍相看淚如雨我作楚歌君楚舞明朝寶馬一聲嘶江北江東皆漢土玉斗歌漢髙帝真英主也其入關則約三章封府庫子女玉帛畧無所有秦人歸心焉不待白蛇赤帝老嫗夜哭然後知為天命彼姁姁項羽欲扼其㗋而困之難哉鴻門之㑹沛公亦幾危矣項莊舞劍項伯翼蔽沛公得從間道以歸獨使張良謝羽羽受其璧此亞父知其為勇所以慨然碎其玉斗也感之作歌漢兵咸陽未休含楚王長歌到戯下項伯夜入張良營沛公蒼皇出城謝自言戮力共攻秦不意入關成此勲閉關籍民備他盗盡封府庫待將軍項莊㧞劒項伯起漢楚興亡在今爾鴻門壯士斬關來慷慨一巵誰懼死君不見秦亡鹿走驪山傾四方盡起諸侯兵龍顔隆凖泗上長天之所授誰能爭英雄肯落他人手獨遣謀臣談辯口君王間道却歸來滿地秋聲鳴玉斗呉門行呉歌婉婉清如水西風曉自閶門起雙撓艇子採菱來翠荇緑蘋香十里芙蓉影落已知秋濺濕羅衣眉黛愁回聲蕩槳入門去明月家家秋水流客去送客歸來月滿簷梅花微笑隔疎簾酒醒今夜銀屛冷沈水薫爐漸漸添哀友人案成歌舞小春嬌何事君隨艸木凋從此巴江江上月有人和淚獨吹簫聞笛誰將玉笛按凉州吹徹春風不下樓若道聲聲都是恨不知消得幾多愁山亭芳草萋萋怨未歸西池殘夣要題詩緑窓昨夜東風小開遍梅花第幾枝題飛雲閣一笑歸來春尚寒小梅飄盡雪初殘遲遲更待梨花月醉倚飛雲十二欄立秋日亂鴉啼㪚玉屛空一枕新凉一扇風睡起秋聲無覔處滿堦梧葉月明中兩宋名賢小集巻三百五
