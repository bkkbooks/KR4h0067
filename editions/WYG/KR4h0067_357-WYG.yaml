body:
  text: 兩宋名賢小集卷三百五十七宋陳思編元陳世隆補玉楮詩稿岳珂字肅之號倦翁彰徳人霖子紹熙壬子甫十齡隨父帥廣開禧初為鎮江饟幕庾吏乙丑試南宫不售歸官下與劉過辛棄疾相善時有北伐之役奉檄不獲辭遂浮漕河而北塗中所作詩題曰北征嘉定丁夘除守檇李庚午召還中都尋坐誣去官嘉熙初特詔有為卿直前枉之語除户部總饟歴寳謨閣直學士提舉太平興國宫以恩封鄴侯玉楮詩稿八巻自嘉熙戊戌至庚子凡三周嵗所作手編而自序之後移家檇李金陀坊痛其祖武穆為秦檜所陷作籲天辯誣諸書總名金陀粹編五年不治筆硯奉詔起家是日始草辭免奏旋假書吏于郡題寫皆生疎又堂帖趣行三日戒塗偶成二首五年尺牘不牋天一日除書到枕邊感欲宣心筆無語恩慙糊口鼎餘饘説驂尚恐傳音誤書馬還思習札便燭灺燒殘人未寢却輸鈴下愜安眠露封謄奏曉鳴鈴當御應關乙夜呈京兆有裝隨使者陳留無酒憶厨兵故營將鉞談家世老吏公車識姓名塵事看看到書尺更驚三日有王程予控免不獲命恭讀詔書聖訓有朕正欲為卿直前枉之語感激思奮始決小草之謀平生一寸心不為世塗折平生七尺軀擬慕志士烈吾門古喬木毎抱嵗寒節三世秉一心炯炯常不滅雖如卞獻玉自比来嚼鐵閉門著辨誣其事巳合轍及逢明聖知所遇皆夐絶隆興録舊李一誣出奎札嘉熈今詔書復以枉為説人生貴知心萬事等一吷矧以萬古光下比覆盆掲憶昔賈誼謗同舟忽吴越關弓比射羿舍鏃不虛發仍是同功家以豢反得嚙静思誣與枉二字謹區别兩朝寓至鑑四海仰日月蕩誣貴昭昭錯枉豈孑孑此恩無以報蛇雀况微物匪石心可轉襆被計當決塵匣開青萍何時釁妖血予以謬作數種并總所奏藳遺參賛髙紫微聞巳閱讀未及賜報平日正病無人為過目者兹不特餉所有别白半生漫浪筆研間為不虛矣因贈二首夜半軍書尚掣鈴想應敧枕夢難成新涼頗復欺長夜舊事何妨閱短檠人説文衡真有託公于詩巻若為評武襄遺跡今如許試考當時六萬兵渉筆牛腰倦不支餘工那復到新詩殷雷秧綠又期月指日棗紅能㡬時自古兵財無上策于今社稷寄西陲入郛及國均危道勿謂君侯不敢知拙婦吟西風策策黄葉舞茅簷三尺鳴秋雨東家拙婦擁面嗁彊剔孤燈訴愁窶當年採桑陌上歸嬉逰不管春蠺饑千絲萬縷繭白雪便學紅女攀花枝十七十八事機織暗鎖青閨人不識二十三十幽恨長盧家古梁玉為堂四十五十巳老大唧唧鳴蛩欺獨卧尚隨姑嫂作笑嗔一生苦樂由他人君不見昨朝縣吏踏門闑機軸巳空盆盎竭雞豚指柵索飲壺掀釡叫嘑嗤婦拙起来迎門陪笑面不似嬌羞怕人見今年嵗事苦不登且為當家聊一展吏囂不肯怒且訶大兒門東窺飯籮藳砧走藏姑誚罵造䴵無麵知如何蹙金芙蓉戲雙鴛繡牀一倚曽萬錢低頭長歎祗自憐昔者何巧今不然吏呼巳倦里正醉抆淚背人還滌器明朝欲酒姑勿譁正恐突隳驚阿家春波堂小飲懐棠湖舊隠三首平生到處西湖長眼底波光日日新圖在輞川非舊隠夢囘笠澤是前身一江細雨攲青菊萬里雄風起白蘋獨立蒼茫動歸興釣磯須理未垂綸炎暑今年特起竒不妨湖上訪清漪長堤步屧誰堪擬髙閣慿欄我總宜喚客黄鸝穿栁度猜人白鳥映荷窺衰翁病骨難禁熱且倩西風自在吹虛欄四面挹湖光最愛薰風六月涼萬朶芙蓉紅影閙兩行楊栁綠絲長鋪陳雪月晶明態商略隂晴濃淡糚四序清游總如此春波何必獨名堂餞孟運判寺簿赴京三首温純如玉絶纎瑕驚坐何人指孟嘉䇿馬殿軍勞不伐舍魚取義理無差讀碑襄水真為谷守壘房陵忍顧家鄉國不妨動歸興天津八月却隨楂詔書夜下日華門輦路争看使者軒烽火三邊尚勍敵煙塵萬里欠公言不須目睫憂多壘好吐胷懐悟至尊富貴功名分中有勿令仗馬愧廷鵷半生共飲西江水草木由来臭味同交臂便同鴻雁社論心不隔馬牛風君方鳴佩趨雙闕我自燒車送五窮景倩仙塵凝望處為言驛騎莫匆匆九江霜蟹比他處黑膏凝溢名冠食譜久擬遺髙紫微而家僮後期未至以詩道意君不見東来海蟹誇江隂肌如白玉黄如金又不見西来湖蟹到沔鄂玉軟金流不堪斫九江九月秋風髙霜前突兀贍兩螯昆吾欲割不受刀頗有萇碧流𤣥膏平生尊前厭此味更看匡廬拂空翠今年此曹殊未来使我對酒空悠哉舊傳騷人鍊竒句無蠏無山兩孤負不到廬山孤負目不喫螃蟹孤負腹昔人句也老来政欠兩眼青那復前籌虚借箸祇今鄉國巳駿奔軍將日髙應打門流涎便作麴車夢半席又擬鍾山分先生家住岷峨脚屢放清游仍大嚼襟期盡醉何日同試筮太𤣥呼郭索餞髙紫微視師黄岡秋風九月邊城髙千艘夜下宫錦袍文章不特動蠻貊要識金版開六弢孫曹巳矣等陳迹喚起坡仙同赤壁喧闐笳鼓動地歸重把功名光采石後元祐行上辨章喬益公正月二日天氣清六符兩兩三階平閣門催班報麻案珂馬玲玎萬人看押麻參政拆璽封宣詞舍人来殿東鞠躬一聲百寮聴軍國平章喬益公天心果與人心同大哉聖斷天與通本朝太平説元祐五嶽三光渾未剖當年一日三制頒吕范堂堂分左右䖍中大老更魁傑申國勲名比韓富民生是時非漢唐親見至治躋羲皇一塵不起四裔服軌順星躔蕃五穀士皆有造百姓寧官僚徹底清似冰桁楊畢空戈革偃天街鏡浄無欃槍彼何人斯階啓厲九縣囘飈八紘沸髙皇匹馬開東南王業中興今五世窮荒靺鞨何自来中原萬里吹黄埃數殫剥復囘否泰胚腪元氣鍾奇才耆朋夀雋軼千古吕望鷹揚稱尚父便教旦奭居東西穆穆迓衡今再覩官家即日開天章貂冠玉佩游巖廊一都一俞一吁咈四海春風巳披拂聖賢自昔難相逄巨魚縦壑鴻遇風與人歡呼争誦説元祐嘉熙莫分别君不見徂徠處士歌一䕫濃墨大字慶厯詩生民至今受其賜千載萬載生光輝陋儒筆硯久不治安得椽筆摹英辭兩朝慶祐俱盛時衆賢一念猶西陲天心願化光明燭先望分輝照荆蜀至鄂朞年以饟事不給于時巳亥夏五卄有八日始解維雪錦夜宿興唐寺繁星滿天四鼓遂行日初上巳抵滸黄洲㡬百里矣午後南風薄岸舟屹下不能移延緣葭葦間至莫不得去始作紀事十解呈舊幕諸公雪錦亭前水接天晚波如縠放歸船新詩開務從今日此是江行第一篇離歌巳盡沙頭玉夕照初翻浪底金自是晴鷗無六月半江雪片湧波心蕭蕭衰髪倚西風兩岸青山盡識儂東去西来縁底事祇應添得一龍鍾一江漲碧碧於藍健櫓鳴鵝舳正銜纔是過都空萬馬又驚倚岸閱千帆宵聲傳柝重城閉曉漏迷鐘古寺荒仰看繁星垂四野不知身世受炎涼一瓶一錫一團蒲到得今年一物無桑下忽興三宿念古人不食武昌魚葭葦延縁舞翠旌白頭吹浪又相迎攀轅亦作留行計莫道馮夷不世情昌黎久願列三王我亦曾親翰墨香惜别依依重囘首棠磯風月更思量赤壁江頭白羽揮鱖肥西塞酒同攜歸期應在初弦月家住康山西復西人生邂逅適相懽一曲髙歌行路難頻寄詩筩君勿厭種花持釣是閒官夜過夀昌風雲八字䕶城隅樓殿崔嵬想帝居曾侍金魚惟石馬幸因玉璽記銅魚千年鼓角聲猶壯四塞河山恨未祛麋鹿巳游人事改何人曾讀輔吴書望樊口懐陶士行温太真二首昔年老子恨婆娑未付其如印傳何吴苑關心春日少湘江回首莫雲多可無司馬親封鑰自是將軍老枕戈我亦新来了官事正輸一舸弄煙波太真行酒知何地渺莽遺基茂草深聲色加人何足計精神滿腹不同斟六奇自可掀三狡一正何妨讋百壬墮幘吐茵均此轍可憐枉用世儀心三江口過舟時方四鼓櫂觸收金柅釵蟲醉玉釭地鄰今七澤名襲古三江岷漾雖分派荆揚却異邦晨光猶未發早識白鷗雙赤壁周郎二十四年少盖世功名随一燎親提三萬走曹瞞不以敵勁恨兵少豫州失七巳膽折一日目明驚二妙最憐黄盖不知名吏士相從倚營嘯阿奴火攻本無策破竹自繇人不料貪降納侮理固宜泥淖華容㡬盡𠞰古来行師有絶地毋乃重貽千古笑鏃湛縦是差可認鼎峙詎關謀所召二喬春鎖何足言從此天光遂分耀我聞漢賊久染指奮纛揺牙噬江表八荒囊括豈復遺一蹙吴宫巳為沼當時乗勝下部騎考地當居楚南徼蒙衝逆鬭須上流揖冦那容越津要武昌霸基跬歩耳肯使國畿紛㦸旐坡仙訪古時寓意横槊雄姿誰與弔故將異地眩疑辭政恐因訛啓譏誚滄浪六月捲晴雪歴歴江山人物眇崩空亂石今㡬存彷彿棲巢尚驚鳥夜深刁斗聲四發星斗滿空羣籟悄便須喚起紫綺裘孤鶴南天楚江曉後江行十絶日日征帆上水風掀天雪浪駭魚龍不須檢校江行厯知過雲山第㡬重逺邨煙暝牛羊下近岸波澄鷗鷺閒一抹斜陽江似鏡天移小景向人間指㸃神鵶送客檣江山囘首鬰蒼蒼吴朝千載興亡地極目長淮恨更長擁騎年時憶往来舊時行處半莓苔山靈勒駕應頻笑又是江南勾當囘夕舂正是隔前谿江路行人猶未歸我笑卧龍成底事晨光儘欠踏熹微叫著漁郎急掉頭一聲别浦聴蓮謳山遥水逺應同趣我亦青帘問酒樓湓城巳近見匡廬風月煙雲自巻舒白鳥歸来閒似我向山深處認巢居官牌夾外少人煙商婦琵琶久斷弦司馬青衫不須泣江鷗對我正忻然西望沙津東秣陵湓江中道是歸程栁隂繫䌫人歸後頻有黄鸝三四聲人生最好是歸来六月火雲溶雪醅散髪晞風須一醉月明攜簟又凉臺初還故居元是廬山莫逆交宫亭西畔著衡茅盟鷗似怯經新浪怨鶴還知宿故巢一沼種蓮衣可製萬竿脫籜杖輕敲不須海若逌然笑乞與杯堂樂芥㘭集喜二首鵲噪庭前木蛛翻簷畔圍雙蓮瑞明月萬栁舞晴暉宿鶴迎風袂盟鷗認雪衣物情同一喜應為主人歸水面開新皺山容散宿顰松巢􅆐巳識花徑鹿初馴雲倦隨歸鳥風清似故人逢迎真不暇誰作近前嗔歸自鄂雙蓮生於後池偶作再寄紫微巋然匡廬山獨秀蓮花峰派為濂溪源下有愛蓮翁絶學嗣洙泗千載同清風書堂二池間浮翠籠輕紅居然不染塵湧出清泠中雪藕厲堅節一念窒以通朝巻而莫舒吸之碧玉筩潔凝月露潤妖鄙桃李穠食子味崖蜜擘房透香叢菰蒲儼不羣魚鳶間相從大哉君子操視此禔其躬我方賦歸来来策溪上筇家池忽驚見暗霞照秋空巳迎顥氣澂況復嘉瑞逢雙葩本共根殊質疑並鍾摘奇且熟玩比徳思廣充嘗聞古之人即物皆至公兩岐羙報上同穎還居東雙觡賦長卿竒木對終童善推仁義端脗合造化工後代煽淫靡世見了不同聨芳天泉池合歡華清宫駢花耀鱧湖十丈開華潼徒能資喪志誰與思念功嗟余困蒺藜坐此五技窮兹瑞何自来儆戒如倥侗孤直常易摧初戒先協恭競妍必競妒次戒毋苟容美祥不可恃又以戒其終恭惟天地心常比藥石攻名理倘未渝再拜師正蒙太行道太行羊腸坂九折雲黑風乾尺深雪堇泥道滑木葉寒轆轤車聲行復歇華山有馬久脫轅歸来牧野經㡬年一從倉箱事居積聊以知道煩長鞭前車巳覆覆道左天井關頭夜明火後車趨駕開井陘唱籌仍復催連營關山青艸春二月單軌一冬曾結轍鬃頽毛落雙膊髙引領皮穿眼流血去年搏手雙拳空今年三月甬道同可憐駑力不敢惜轅下亦覺鹽車通君恩天大示弗服桃野已甘偕觳觫感恩伏櫪飽秣芻猶為太行憂後車長門怨驚風不成雨行雲去無蹤妾生三十年著籍長門宫宫車轆轆春雷曉明星初熒綠雲擾增成丙舍争迎鑾惟有長門閉花鳥黄門開玉匙畫史圗蛾眉金鋪振瓊鑰玉秀生銅池朝陽纔囘金屋在轉盼不堪人事改入宫巳作鄭袖嗁出塞那知延夀賣花殘鳥語頻長門春復春花鳥巳驚老况復門内人東風動地夜来惡萬翠千紅繞簾幙當熊自有匪石心肯顧班姬秋扇薄長門勿輕怨視此篋中扇白華兮綠衣自古兮有之兩宋名賢小集巻三百五十七
