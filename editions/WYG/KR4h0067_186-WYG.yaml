body:
  text: 兩宋名賢小集巻一百八十六宋陳思編元陳世隆補雪溪詩集二幽居幽居寂無事晨起伴僧禪曉澹巖前月秋明水底天望鄉書斷雁問路客回船阻絶平生友清遊有夢傳别故人張孝先平生嘗嘆少陵詩豈謂殘生盡見之共脱干戈身偶在各懐鄉國語猶悲又尋芳草春風路猶聽孤舟夜雨時避地海山周萬里此行無處寄相思訪闗子開兄弟於餘杭懐先世舊契山嵇交契自當年重到同鄉各愴然百里山川清似舊兩家子弟老於前疎梅開處數枝玉小雨來時一段烟嵗晚不妨相㑹數溪頭尚趁有歸船項在廬山與故友可師為詩社嘗次韻和予詩云空中千尺墮桞絮溪上一旗開茗芽絶愛晴泥飜燕子未須風雨落梨花重江碧樹逺連雁刺水緑蒲深映沙想見方舟端取醉酒酣風帽任欹斜後三十年避地剡溪山中時可師委蛻亦二紀矣靈隠明上人追和此為贈感念存没淚落衣巾因用韻謝之昔訪廬山惠逺家尋春草木未萌芽自從桞折烟中色不寄梅開雪後花事往泪多添海水詩來恨滿筭河沙驚回三十年前夢放鶴峰頭日未斜溪上觀雪沙洲莽蒼水雲昏雪落寒溪鏡有痕山際疎鐘烟際寺林邊㣲徑水邊村天涯嵗月行將盡人世窮愁孰與論憶與鄒枚同賦詠人非事往但心存送史純夫歸餘姚霜晴九月交送子越東門同舟此水上再對波清渾聚散三十載惟此一意存邦國有大慶去承曠蕩恩我老百不堪視子猶弟昆新寒黄菊枝落照黄葉村慘愴欲别語零落未歸魂臨分吐情實衰境意彌敦黄州棲霞樓蘇翰林所賦小舟横截春江是也曽竑父罷郡畫為圖求詩銅雀不得鏁二喬春江亦夢携西子此樓縹緲想風流此恨纒綿在雲水洞庭葉下思湘君不獨陽臺雲雨神精誠感通若相遇夢境幻境皆成真黄州刺史清如鏡水光山色心同瑩牧之出守到元之誰解把詩聞萬乗圖成携得千里行孤帆趂落斜陽城江頭莫指挽鄧處離合古今同一情和明上人見贈西湖梅蘂暗香浮錫杖凌空過沃洲後㑹重尋人更老頽光不駐水争流夕陽天際青山出暝色烟中白鳥留此境只曽支遁賞剡溪今始得湯休六見月華虧又盈却來松下笑相迎事銷臈雪渾非舊人似寒梅獨有情香火舊縁生理足烟霞新志著書成明朝又向千峰去猶恐時人識姓名寄陳彦山送君憶昔上鼇山愁折江梅踏雪還别後重添十年老静中猶借半生閒文章千古心空在書史三冬手自刪嵗晚山中有琪樹傷心何日得同攀小立茅屋藤蘿外慿欄烟靄間亂蟬催暑去急雨帶秋還路入雙溪口門當四面山詩成題未有翰墨伴清閒舟中夜雪讀正卿教授近詩輙賦鄙句并以為别百年半羇棲輕與故山别回首千萬峰飛夢不可越弭棹濠上亭非卿愴時節朝號迥野風夜聴孤舟雪濕薪無煖熖燭泪共明滅癡坐増灑然何以慰清絶斯時咏君詩心抱益澄澈未見觀魚莊先得馭風列荆玉出此邦誰獻復誰刖山川漫竒麗文物久消歇君詞吐白虹神寳疑不没我欲􅆳餘思景行好句拙如違勾漏令未得丹砂訣萬里烟雲開揚舲及明發荆山自兹逺雲濤渺天末兩地見梅花相思不同折無題三月桞花飛東風繡香國挂影㺯春光飛瓊悵分缺雲輿返青霄翠浪翻天末閬苑桃李花莫使芳香歇緬想霞中人芙蕖艷秋色烟鸞吟碧空行雲不停刻何事寄紅埃悲聲調緑髪神觀洞太虚紫清注金格玉宸丹鳳檢詞章煥瓊笈誰執招真旗笙簫下空闕靈光湛法身生死本無别妙合造化機隂陽時出没欲識天中真寒江浸明月將卜山居寄懐山居香火伴殘經幽絶全家在畫屏黄葉村藏一溪碧白雲堆擁萬峰青安知遇酒分賢聖但可與人同醉醒萬事休心同白髮更須結託老人星除日得銅溪老人書除日相思輙寄詩流光不特我衰遲嵗窮滄海波濤急天冷空山鳥獸悲一氣先觀雲暖處百花猶避嵗寒枝迎年送臈須臾夢正是須彌不動時必明菴佛心猶日出何曽碍須彌散為普光明合作四威儀萬古止此日羣目盡見之普現一切水君自分渑淄髙垂大圓鏡君自存妍􅑦方寸無盡燈無處存思維髙禪聞妙道行作人天師維摩開丈室庵成更求詩衆説列山嶽吾以一理推萬古聲一㮣我初拙言詞至現莫如心舉念周四維心明乃本明盡埽棘與茨豈知都用晦隠顯兩不知大千在髪毫聖言不吾欺古漁父詞十二首漁父家風我所知家風要與道相宜不懐貪餌吞鈎意常似絲綸未下時雨中漁艇一聲歌夾㟁青林照碧波躍馬更誰思往事紅塵千丈奈人何萬里號風雪滿山黄蘆映靄水汪灣九衢朝馬愁泥滑不識魚翁興未閒風波穏處釣舟閒雲去諸山暝不還江面一峰何所似青銅鏡裏緑雲鬟千古髙人張志和浮家泛宅老烟波不應别有神仙境祗此滄江一釣蓑虞舜遺風逺可尋烟波一棹古猶今九疑莽蒼三湘濶盡是雲山韶頀音曽見三閭屈大夫强將清濁較賢愚如今更覺前言拙醒醉由來本不如風裊溪頭釣線多戱魚無奈巧依荷直須飄盡浮萍草盡放青天照碧波禹門三級浪干重變化騰飛豈有踪寄語魚蝦休上釣要看頭角是真龍得即歡忻失即憂死生輪轉暗相讎那知垂釣非真釣不在絲綸不在鈎船子禪師意未平萬波要喻境中情魚寒不食清池釣何處歸舟有月明波清百尺見游鱗水色天容自古新昨夜西江浴明月氷輪玉兎絶纎塵秀逺亭鏡似氷壼表裏清我來閒伴白雲行四山迤􅆔青圍野一水蜿蜒緑繞城試問春來觀秀色何如雨後聴泉聲昔人飛馭烟霞外落日空含萬古情送吕道師還天台結宇孤峰蘚徑危身閒鷗鳥信忘機水聲山色何今古物態人情果是非子踏白雲來問道我垂華髪自生輝赤城歸去松門晚萬里秋容上客衣早秋寄昔慧老且弔慈受老師之亡昔日禪河早預流老尋支許剡中遊一枝數粒同過夏萬壑千巖相映秋眼看珠沉滄海底心傷塔聳亂峰頭不須月落龍天泣萬古白雲無去留題洛神賦圖詩并序風雅頌為文章之正至屈原離騷兼文章正變而言之湘君湘夫人山鬼多及帝舜英皇以繫恨千古宋玉賈誼師其餘意作招魂賦鵩極死生憂傷怨懟之變亦兼正與變而為言耳其後李太白作逺别離亦云九疑連緜皆相似重瞳孤墳竟何是李當塗編次以此詩為謫仙文集第一篇亦以祖屈原悲英皇本意耳而韓退之作黄陵南海廟碑文章詞指非世間詩也盖平生周造化妙理已多至是方能發鬼神之情然後幽逺荒忽竒怪無餘藴於天地矣文章必能盡羇旅風霜山行水宿極其患難離别悲傷則真情乃見與夫男女之際鬼神之狀死生之變態幽顯表裏内外洞逹然後為至焉曹子建與七子並遊而獨能脱遺建安風格作洛神賦雖祖屈原而能激其餘波侵尋相及矣非託寓於婦人神仙亦安能至此也近得顧凱之所畫洛神賦圖撫本筆勢髙古精彩飛動與子建文章相表裏因賦一詩其後盖屈原賈誼子建其幽恨莫伸一也故文章能逹其所存以極窮古鴻荒之理學者可以辨是矣曹公文武俱絶倫傳與陳王賦洛神髙情寓託八荒外曽是親逢絶世人五官郎將莫輕怒椒房自是袁家婦聞道生時覆玉衣便是於今腰束素驚鴻翻然不重顧射虎深寃更凄楚不將降虜賜周公先識禍機楊徳祖此意明明可自知豈有神人來洛浦盡用平生八斗在七步那能説㣲步楚騷日月常爭光湘夫人後誇髙唐丹青盡冩鬼神趣筆端調出返魂香妙畫髙文盡天藝神理人心兩無異此情萬古恨茫茫且為陳王說餘意妾薄命并序夜讀齊梁諸集見多有此作因賦二篇繼其聲寒閨有静女十載念逺征命似絳綃薄身同朝路輕存心合懽綺待得機杼成從來君獨賞寜肯賣都城慿夢欲寄逺舊路春草生獨夜理瑶琴泪燭剪不明待誰相應節要自不勝情㑹有不眠者聽此斷腸聲少年輕逺行易發同爾汝紅顔望中老離恨尚如許妾身異金石更涉㡬寒署長天誰云廣不見收墮雨愁來津頭望信絶不得渡隣婦念幽獨艇子隔溪語落日下空江修烟淡晴渚流恨滿春風西飛數歸羽古意茅簷秘秀色從古歎不遭遊子去來返徒使寸心勞朝嘆江海深夜視星斗髙歸期約春風今己木葉凋一日兩回來但看門前潮臨海僧珂公出梅花詩和其韻漫天飛雪鬬梅英未有東風便有情竹裏藏春春不覺水邊見月月羞明神人自惜迷姑射天女何妨伴净名第一花中拈實相談禪說法大修行剡溪月下泛舟嵗殘清夜一溪澄更愛千峰霽月升天地髙低銀色界山川表裏玉壺氷裘單擁火宜無倦石響行舟恐不勝休説興來并興盡兹游今古亦何曽姜山通闍黎真骨歸塔以詩送之空門龍象道髙升坐使山川勝氣増天道不言成四運人間無處證三乗雲深尚有遊山客烟冷空餘禮塔僧一葦莫嗟成萬古幻身來往本何曽嵗杪道中巖風號萬木天意自悲傷野店逢殘嵗危峰半夕陽吾生猶道路此恨付杯觴正是凄凉極寒梅逗晚香望秋門對萬山深登臨老病侵牛羊隨野色草樹帶秋隂此景聊供望何人肯見尋猜鷗不用下我自信無心病中遥夜支頥坐春醪負十分碧天沉宿靄清月入㣲雲真妄怯多病翔潜喜不聞鞦韆人樂處十載愴離羣寄東山覺老紅泉碧嶂舊登臨來演真常契佛心漫道山林無獨往那知笙磬有同音堂前明月四時好山外白雲千古深此别松門無復見漁樵為伴老相侵剡溪王秀才畫子猷訪戴圖剡溪萬壑干巖景人境誰能識心境君畫山隂雪後船始悟前人發清興眼中百里舊山川荒林雪月縈寒烟料應興盡故無盡賔主不見寜非禪當年戯留一轉語不意丹青能盡覩更畫人琴已兩忘妙盡子猷真賞處雪溪觀雨晚雨亷纎正滿空萬峰都在暝雲中風雲變態何深淺坐看天施水墨工山中早秋蒼茫山口月西沉瀟洒新秋院落隂雨滴梧桐河漢淡夢中猶記少年心山居追凉松門東路有柴闗涼卧清宵夢亦閒更待海風來萬里一天露月滿空山秋容如畫羣峰縱復横孤烟收盡片雲輕天容常帶秋容净萬里碧天新雨晴送王道元運判致政歸潜皖好山如幽人深絶常避地潜峰獨呈露孤立信竒最髙擁一寒峰縹緲亂雲氣萬古招行人誰與賞心㑹我公實仙材崑閬失品次挽公青霞襟來作繡衣使終尋汗漫遊髙舉九峰外行色開畫圖秋空捲新霽造化為我娱神超物無累我窮知音稀與世久無味落葉掃不禁嵗月水東逝愁作送公詩出門更何詣贈言詞亦貧無以報髙誼野宿慎衣裘寒霜方夜墜送和斜川詩一首并序嵗後五日僕欲從西湖追和斜川詩是旦江子我居新市招張仲宗同遊後缺雨止亦和此詩見寄事之脗合有若此者昔白樂天游慈恩寺元㣲之在梁州同日夢其地各賦詩相寄議者謂相望千里而神㑹誠心流通無足怪者輙再和一篇為寄且識其異焉採藥游名山恐是韓伯休欵段下澤車久師馬少游兩公學真隠異世今同流遇害能鳴雁多猜不下鷗何如脫羈馽尋壑與經丘人生亦誤計獨醒無匹儔天地本虚静萬物自應酬隂陽驅意氣定能相勝不况復漆室女浪為魯國憂真妄兩非是湛然一無求山中梅花盛開戯作化工難逥天地春下遣天仙第一人前驅飛雪助幽絶千里隔盡埃與塵何心百卉擅獨秀寒入萬物無精神綽約肌膚瑩香玉借與東皇立花國開破天地發生心引出世間凡草木品流不數廣寒宫為嫌月姊長孀獨波上輕盈掌上身由來比並皆塵俗須知尤物到絶言從昔華詞吟不足溪回路轉一枝斜可惜天寒倚修竹窮途游子嵗華晚腸斷夜投山館宿古今幽怨不盡情更入凄涼笛中曲荒山偶賦梅花詩佇立花前香在衣傷心不忍别紅紫付與曉風零亂飛繫舟餘杭門訪西湖金輪寺參上人北郭望西湖㣲徑㡬尋尺澹與人意長雲寒正無色深尋幽禪居步轉蒼山側落葉不可紀遮盡山下石師方無定居我亦何所適四海漭無歸老矣山中客百年熟機縁還此共禪寂語罷今古分坐上有陳迹一笑視此生何事非戯劇開門納遥峰暮雨一江白兹游非世逢歸路晚蕭瑟積隂迷曉昏鐘聲報將夕送孫肖之還縉雲蓬蒿頻嵗掩柴闗再喜相逢一破顔游子年華紅葉老幽人風味白雲閒那知篋裏書成後猶作溪邊興盡還流落天涯俱避地念君更入萬重山送郭壽翁還廬陵共遭敵騎汝隂城十載相逢尚甲兵萬里鵷鴻自鶱舉九闗虎豹任縱横雨昏山逺行人恨日暮草長幽鳥聲只有别離心似舊亂來難得是交情送黄生還臨安舊事恍如前後身龍門四紀更情親茅廬驚歎見斯客天馬超騰感似人三徑草荒殘嵗雨一枝梅作渡江春莫言吳越方成别纔隔雲濤莫問津再和雪聲天上威儀世豈知六花寒露夜偏宜半空環珮朝元罷滿地珠璣按舞時簌簌初隨風更急蕭蕭却雜霰俱遲房公松竹分清俗除却天聲總未竒又作帝宴鈞天世豈知落花寒露夜偏宜房琯云天下之聲惟竹聲最清及聽松聲知竹聲更俗南巖悟禪老見於山中同烹玉糝羮我家峰頭最髙層落葉蒼崖不可登清坐與師烹玉糝千巖風雨一深燈即事住依溪口破殘春身伴渡頭零落雲更向空山拾黄葉姓名那有世人聞晚意山空寺古紫苔侵更喜漁樵不見尋坐對秋隂晚蕭瑟風吹敗葉入廊深與郭壽翁俱客錢塘壽翁歸吉州追餞至龍山白塔寺惜别悵然終日始登車而去既行旬日予得請廬山太平觀將歸隠浙東山中寄詩奉懐江邊孤寺舊曽經重枉驪駒當短亭落日催人心去住東風囬首泪飄零魂歸但覺楓林黒書就終期汗簡青予作名臣傳數十篇壽翁尤所稱愛歸隠我無冲斗氣相思時望少㣲星兩宋名賢小集巻一百八十六
