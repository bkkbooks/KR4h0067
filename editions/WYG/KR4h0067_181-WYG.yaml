body:
  text: 兩宋名賢小集巻一百八十一宋陳思編元陳世隆補網山集一林亦之字學可福清人自號網山山人月魚氏從學艾軒林光朝之門初艾軒講學于蒲之紅泉學者常數百人稱髙弟必曰網山艾軒卒網山繼其席從遊之衆無異艾軒也淳熙十二年卒有月魚集三巻肅翁林希逸為序古詩奉題林稚春丰菊花枕子歌故人所説菊花枕似把冰丸月下飲秋水一雙明炯炯數在青囊第一品狂風江上吹蒹葭此物往往得之嵇康阮籍家閉門讀書二十年眼睛損盡生空花建陽小作箸頭書殘更燈火亂蟲魚石渠文字大如斗場屋嵗月又不偶却來南山青草邊東西四至盡為菊花田手提長筐向山曲一下收拾三百斛昨者昏寐才起來解把簷頭小字讀乃知妙物通羣一作神仙一切藥裹應棄損奉酬稚春梅花行稚春云早梅花一枝大不凡新詩見餉却不曽寄花來因道此意以奉酬耳草堂梅花千萬枝新詩品題何太竒可憐一枝非凡羣賞心何人空自珍請與君談别花人如或見之當俯身西河一帶何蒼茫涓涓數枝臨水旁上有幽人眉骨横終日對花情意生花如秋月照芭蕉人似春風吹野苗人與花枝自與親一篇至人吟如新胸中若有一㸃塵縱對此花無精神平生不識市沽兒四更誦書長苦饑摩挲此腹遶疎籬笑折花枝花自知戲題稚春杜少陵詩集十年蕭蕭去武林槖中唯有謫仙吟君今失意還山窟少陵詩集如明月自怪平生每相似窮愁嗜好亦如許飯顆山頭舊相逢安得娟娟同處所故人語我明年冬或騎大馬長安中或倚書樓頭如蓬即見雙劒終然同我聞此語讙且劇視若狀貌如其筆兩目津津可終遁此物應藏月魚室月魚文字非時好已問莵裘吾將老緑烟亭下黄花時兩手抱取歸柴扉和李鹽倉諤欲遊龍卧山以海風大作不果往枉䝉龍卧篇如睹藤蘿境十年招隠士欲到此山頂坐石誦離騷掬水㺯清影無人同荷鉏長媿林下景昨者逢李侯一笑驩驩領為言有明月公事且暫屏騎驢學賈島捫蝨喚王猛雙鑣雲外來斜帽不須整夜投招提宿聽雨寒更永論文到昌黎説詩笑匡鼎悶人數日風何時發深省丁亥九月十六夜偕李鹽倉宿龍臥山中聽雨看月同時事也所謂魚與熊掌兼得之賦詩一篇以紀其事相喚此山來狂風吹我衣把酒桂花下山雲片段飛掩門雨初滴開門月還上倚樹看明月半山聞雨响人間有佳景詩句頗發越何曽似今夕聽雨還看月九月晦日登烽火山興來走上烽火山著足不定秋風寒四邊黄茅滑如雨低頭一看毛髪䜿㡬年要到紫菜鄉大練小練并東墻如今一時在眼旁白雲浮水天茫茫酒䦨更欲弔虎屋無端日脚相催促一奴魋髻一跛足逐我下山如野鹿見獨斯行叔綺子為赴春試一出江頭送别殊令感懷聊為巴闌行一首以道此意云爾巴䦨獨還嵗月深相送出門自沉吟十年交舊總如許狂歌一曲傷人心今人讀書如過客壺飡只向市頭索吾曹苦志膓㡬穿安得相逢不索莫念我生平㺯典墳六月北窗長閉門雕肝篆肺得一句旁人袖手評其文思量至此復一笑如何躍馬追年少我今聞説有場屋兩耳如聾怕聴得網山山下月魚亭就船買魚活煮羮何時挾冊此來歸議論不到吾縱横故人年紀今猶未正好欵門問知已時命相遭不用多或在半言并片紙老人校書紫雲樓相見或問吾因由為言索處海水頭蓬萊方丈不可到此心日夕徒生憂秋夜同章三十九弟次邠宿延慶山中紀遊一首芭蕉月上照窗扉屋裏老僧眠不知起來樹根飲一盞舉頭忽是三更時藤蘿一處一處好我亦持杯隨處坐山雞忽叫野鐘鳴滿地西風愁殺我古意深夜歩秋檐明月照石堦所憶不可見歡愛徒興懐我欲掛天帆長江風浪摧我欲跨緑耳蒼林烟雨回只有坐長想佳人安在哉何時覿來袂雙目炯炯開邑大夫范丈處義寵示廣陵餘事泠然誦之歴歴慘惻如在目中輙賦短篇紀所聞也嘗閲淮南圖蕭蕭草屋少人居及讀廣陵集惻惻我心欲垂泣吁嗟戀鄉國生死不肯去邊笳纔一動殺戮先此土可憐此土人父子無白頭不死於飢即死戰性命只在道旁溝更聞維揚有鬼市銅錢須㬰變為紙都縁白日殺人多所以寃魂有如是君俠壯志凌雲空青衫匹馬戎幕中當時轅門眼所見長歌短歌淚如綫少陵嶇﨑䕫峽路一切悲愁託詩句至今太史不足慿惟有此詩為可據紹興辛已淮楚功紛紛予奪或異同他年石渠訪遺事為説東陽有蔚宗范宰登瑞峯塔續䝉寵寄古篇輙次來韻平明眺逺目蒼波吐紅暾已瞻大鼇網復矚鸕鷀門宿酲雖巳解衫襟猶酒痕慿陵不可羈往往天欲捫却憶去年時舟役勞朝昏㓜婦帶桎梏嚼飯不敢吞今年復此役溪山恣討論為有陶元亮心胸如阜坤范宰見寄遊草堂誰謂漁鹽市之什輙同賦一篇不用元白唱酬之法誰謂漁鹽市乃枉大夫軒既登雲霞觀更尋薜蘿村松枝何夾道萱草况當門借問阿誰家此為故人園倚竹坐半日論詩到初更愧無捫虱姿敢辱輟鸞言勞勞青衫客莽莽紅塵奔所至有山水何曽解討論君侯食肉相杞菊為心魂一縣固多事終朝如山樊行旌遇佳勝呼賔羅芳尊有此幽寂趣從容以剸繁范宰同鄭簿公敏應尉振送戰船至海上招野人同遊賦得可月湖一篇奉呈可月湖邊送戰舸長嘯便欲凌清波好風吹帆如去馬䑕曹若可雙手把青天無雲水初漲一山兩山浮水上平生膽意少羈束叩舷長歌心益壯生平誦讀口啾啾何似一日觀滄流龎眉太史足重繭盡驅百怪歸筆頭羣公楚楚皆人物我亦自忘布衣拙詼諧莫續濟川君可無一詩配明一作年月丈人行答通平林簿丈人乃泉州人嘗客紅泉與艾軒論及樂律網山不知其姓名但稱丈人尊之也其後乃子又寄書于林宜季石笋之喻美之也祖龍一出羣儒怒滔滔稷下如抽縷樂以聲傳非文字千年闕斷無人補昔有大人壺山前紹興甲寅乙夘年定律不待參黍起瓦缶皆可成宫徵更言吹律隨隆汙百世不以一聲拘此法漢魏周隋無紅泉得之延坐隅一時河漢東西奔姓氏何為旅人門我欲栩栩還皇墳要以六琯為根原九簫鼓吹百物和羽衣狼籍漁陽戈須信樂能召太平非是太平為樂歌丈人宿草飛毿毿乾旋坤轉誰更堪忽有尺紙如春蠶遺音石笋天之南三更把書不成眠四更起坐霜月懸五更開門欲上馬至竟此人何山下挽章徽之妻盧氏蒿里歌蒿里曲長簫悲奈何短章嘆不足少年欵欵嫁夫婿今夜屋檐何處宿蒿里歌蒿里曲賀江宰濤生朝清秋八月月未弦河陽市上謳聲傳今年百姓杯飯足敢不祝公長命篇青衫白馬鳴琴初適逢吁嗟舞羣巫日維對案愁眉紆退食皇皇雙頰癯家雖貧困仰母慈村村樂業無逃逋况此一熟十年無東家西家禾滿車窮儒如儂四壁立亦有甌寠可讀書縣人安得此豐嵗實以善政吾非䛕昨者越上人苦飢公一主簿何能為目穿滄海告鄰糴所視身命半縷絲長風駕浪海波黒舟人各各面如墨尚據胡牀取紙筆為文憤怒罵風伯翩翩盛名日以起四海識公從此始總謂六鼇帶歸去何哉雙鳬更來此隂徳由來活人多龜齡鶴算定爾過况當竹下圍棋日繽紛百福連山河荆楚風俗八月初四日鄉人于竹下圍碁勝者獲福也奉酧監鎮梁丈所詠臈梅之什臘梅好好花枝閒官亭楚楚嵗事䦨思量窮冬損情思感激芳意生容顔孤標不是如許骨野落可能禁此寒誰信魚鹽屈詩客三更遶樹興未殘兩宋名賢小集巻一百八十一
