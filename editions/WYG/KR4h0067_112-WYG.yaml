body:
  text: 兩宋名賢小集巻一百十二宋陳思編元陳世隆補倚松老人詩集下次韻鑑碧軒當軒方鑑碧溶溶無事道人居此中弟子來參洗缽話朋遊舊識釣魚翁一奩深渌桃花雨數尺寒漪竹葉風箇處好懐誰共委俯看飛鳥過晴空上苑謙叔左丞求退老驥伏櫪志千里烈士暮年心不已不用悲歌擊唾壺尚挾平戎獻天子書成未上忽自悟便逐道人林莽去年來着脚古道場疾病魔人無屏處不遇我公如古人零落離披作風絮我公德量大如海太平天子待眞宰乞身莫待我公行早向千峰萬峰外送荘季裕宣教莊侯目如巖下電墮淚碑旁始相見松間經行倚松語袖有普賢眞行願季裕以行願品作小牓袖之隨處散貼春風昨夜忽言别楚兒把耒耕殘雪野人無以贈吾行山杏溪桃為君說韓升之主簿惠示㐮陽雜咏詩淳深高古吟諷不置輙用醉後書懐贈彦履韻以釋其意刮磨習氣如洗爵惟餘好古情未薄向來詩軸入松門便對屠門先大嚼吾儕事業如石田筆墨魔人妨夜眠如公萬巻暗不吐使者旁午誰見憐方今神武拓疆土超擢賢才固其所莫歎簿書官禄微黄鍾大吕生一黍次韻卿山主梅花歲事功成雪洗塵化工着意製清新遂教天下無雙色來作人間第一春未許一作辨調羮傅巖老聊從一作憑牽興杜陵人遥知月下遶千匝桃李成蹊未是頻王通判雪中來訪以頌謝之料峭嚴風雪滿山駞裘絮帽叩松關知公不減王子敬乘興何妨見戴還次韻關子開我初詿誤背簪纓君亦前生失念僧得意那知蟻旋磨及身方悟䑕侵藤髙才自合參廊廟朽質聊須活斗升已破小團盟異日速來相就鑿春氷用前韻答吕無求聰明彊健不聾丞時出高言欲作僧客至解衣揮玉麈詩成落筆掃溪藤園如靖節不難去座比維摩豈易升退食略無聲色累自磨煤麝冩陽氷青原臺詩為錢大任宣教作五馬胸中足丘壑駐車決遣有餘樂自言新廣青原臺不減滕王舊江閣滕王閣上當年路靜中懐抱時來去聞說青原比像間表裏江山便知處使車時此攜佳賓與人同樂不同羣倚欄自得新詩句矯首長懐古道人青原親見曹溪祖渠有兒孫住山谷問公何處見青原杳杳飛鴻掠雲去來書云此臺大略似滕王閣臺在廬陵望青原諸山青原即恩禅師道場豫章寳智上人持高子詩求和我客飛來峰一室聊自適關門不敢開怒風退六鷁敲門者為誰起我正禅寂稻麻竹葦中見此一英特手攜高子句按譜恣逰歴高子我舊遊伉俠不易得憶昔京城隅王郎古道直當時㑹今地爛漫存轍蹟翳君入社晚感事一嗟惜安待賦歸堂尋盟合琮璧潤屋軒詩層崖如立壁秀潤初欲溜下有癯道人異時妙基構為山不為屋豈待吉日戊軒成玉滿家不減朱門富松篁既崔錯雲霧亦臻凑霜威入松骨古滑咽泉竇谷風巻簷囘浩蕩金石奏騷騷烏夜啼鼎鼎雉朝雊時於藤蘿中便㨗一猿透客来坐胡牀紙帳巻輕皺兒童敬杖屨文史當爼豆微薰出小鼎長缾上虚甃此樂師一作君有餘何為尚奔走記我識師一作君初昂昂野鶴瘦風姿入清古氣象脫凡陋我遊山海間未獲一角獸如師能一作君亦幾何不落餘子後師一作君如佳少年氣出萬夫右平生千鈞弩要以一手彀雖未鬚眉蒼典刑已可候汲深非短綆善舞属長袖願君浚其源故道或可復功成歸北軒趺坐了昏晝待不愚入山未至天寒歲暮山骨冷一枝兩枝梅半開酌泉煮茗湯欲竭彌天道人猶未来江上秋江渺渺秋風急蘆花不飛露獨濕江頭倚杖不逢人鷺鷥飛上漁舟立送張師哲秀才出山己向塵籠透此身來尋擊竹悟人心人眠雲未出山去溪月松風可負君過漢東野菊秋深滿意黄一川禾黍擁人香懸知歲樂農無事已見茅簷壓酒嘗次韻吕居仁送李商老兼簡李去言兄弟諸同參五首歲月如翻江學道若農務道人競寸晷政以生死故耽耽鷺闖池落落鶴警露瞥然忽一作或中的優曇濯泥汚何當一作須一鼔作姑置管城開門對南山萬物盡昭告自是君不領豈是君不好諸人如驥子矯首萬里道援琴欲冩之促軫不能操請子亦一作試停手趺坐西南奥同參如用兵各出不㑹期一將夜破敵諸将或未知如何衞霍材局趣窺短籬軍儲有糧數歲月未易支惟兵不可宿早寄入塞詩角巾拂弹棊一作累丸承秋蜩運斤斵蠅翼當時未得妙豈暇日入息譬如河漫流難以一簣塞飲食男女間嬉笑中盗賊要須了一作理其原及此未曛黒李氏澤北海李公擇兒孫也富此明月珠諸郎皆可人共出堯舜途之子見我時抱負勤一作煩髯奴江頭一再見凛凛氣百夫贈一作餞子伊字門不類城旦書次韻靈隱小軒小軒容膝趣清深只有溪風夜月侵絡石靜移春後蔓凌霄危露雨中心松窗舊草秋蛇帖棐几誰賡雪子吟他日幽人問佳致茂林修竹似山隂閱舊詩軸見夏均父和晁之道次其韻寄伯容仲成均父諸友往者少年日所慕韓伯休渉世更百難得交多勝流當回時俗駕喘汗困萬牛晚看故曹耦半逝半乃侯侯者朱其輪逝者臥荒丘荒丘不足悲朱輪或可羞翻然乃自悟庶幾桑榆收朋儕競挽止一徃只掉頭我豈築室愚喋喋于道謀向来漢上行懸知計未優重念佛祖心獨往恐不酬細㸔叢林敝百孔如破裘出有造請惡入懐薪木憂雖云學道輩坦途多不由欲我獨挽之難成推陸舟歸來擁白雲草茅有前修誓不出山去三更林莽秋寄聲二三友興来過我不次韻李由義見贈之什兼簡若谷居仁行年本數竒閱世復癡絶巉然寒餓表但未朋友缺晚得二三子楚楚著行列家學有師法保身盡明哲堂皇建鐘磬戸牖照玉雪白晳采蘭手未負如意鐵由來石中璞不在苦分别當時偶一見頓使我心恱道喪古人逺君子或降節狐裘倘羔袖豈待跖與桀若人苟相乆可以輔衰拙歡喜奏微吟聊嗣登歌闋次韻劉時可將赴宣州幕我客汴之濵夢寐大刀頭幸逢劉伯倫衣冠少其流胡牀白羽扇語稳氣不浮異時果下馬髣髴遍九州每思張翰鱸為登王粲樓食貧節益苦異哉居拙謀宣州雖多賢禄仕恐未優長女嫁及時大兒婚可求長才不自獻澹與衆人儔君其吏隱歟吾亦滄海遊次韻謝公定時夏均父招諸客泛舟逰百花洲好事屢載酒扁舟每乗興况當秋氣清開我心若鏡風漪蹙寒緑日榦卜修影却從蒼翠中羡彼各飛泳翺翔數仭翼白小一寸命微物有至樂此理須自領君侯靜無譁敢以一言請人生百年爾飛電作光景試㸔楹間懸俯仰歲月永堂堂寇萊公祀事薦時餅吾徒豈不老啖蔗入佳境况兹詩酒習已自破清淨聊須明月來褰裳踏歸艇雨小霽登南寺閣登樓望四垂縮縮雨小休老木藤蔓活古殿金碧流浮雲捲豈盡落日不可留無人相與語鸜鵒漫啾啾送印大師參靈峰卿老四海無家一道人雲山未肯便安身冷泉亭畔腰包去芝草峯邉更問津乞石菖蒲香緑茸茸一寸根清泉白石共寒温道人好事能分我留取斕斑舊蘚㾗送通上人為長蘆行乞白蘋風作蓼花秋萬頃寒濤巻底流八百道人禪定起送君持缽上行舟偶成松下柴門閉緑苔只有蝴蝶雙飛來蜜蜂兩股大如繭應是前山花已開捫蝨新籬甕牖近山巔人言闞短垣聊須安虎落未免伐龍孫留路依松罅埋椿避石根從今有來客道得始開門和不愚兄四海歸來坐太平莫令華雨惱空生歸雲無事朝猶巻老馬休心夜不鳴勝處林泉九節杖閒中日月二升鐺曉來乞火打庵戸想見春風一夢驚次韻競上人好處從来自不傳少時喜樂似初禅為山何止不成簣掘井于今未及泉自了一身同昨夢頓麾萬事付蒼烟因師聊作逢場戯老馬為駒不受鞭示衆看花尚有餘春可盡歡何須終日遶䦨干倚松庵畔見春後人間春色不須看訪韜光庵主不遇紫蕨伸拳筍破梢栁花飛盡緑隂交道人閉戸不知處黄栗留鳴鵲在巢吕無求以詩堅同舟為嵩山之約次韻報之我窮走四方瑣瑣知交態吕卿晚定交槁質賴沾溉筆端有神竒胸次無疆界平生書畫船往往出光怪我非張孝廉招呼許同載顧我念嵩洛如痞思一噫况非西北㠶一枕千里快便當謀吉日恐負遊山債一云少室非庾嶺肯負衣缽債注云無求嘗許以懐禅衲衣見供故因以堅之兩宋名賢小集巻一百十二
