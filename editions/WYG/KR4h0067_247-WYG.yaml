body:
  text: 兩宋名賢小集卷二百四十七宋陳思編元陳世隆補翠㣲南征録六華岳嘲熱赤帝乗龍駕火車晴空燒㫁暮天霞流金爍石休相酷少皞看看催戍𤓰三友亭老松疎竹間梅英三友如何獨擅名應是枇杷并檜柏當時無力預同盟青樓贈别笛聲吹徹玉樓寒金鴨香銷更漏殘含淚欲揮羞不敢倩他銀燭向人彈枕上吟畫角梅花吸曉寒數聲清徹碧雲端誰知有客愁無寐一掛鄉心不奈酸重九破帽無情不受吹滿頭霜雪已如絲菊花笑我三年客風物撩人九日詩三楚膏腴已煨燼二江皮肉更瘡痍子卿三月無音信鴻雁南來何所之禱梅山許我登龍尚未還作詩更為謁梅山如何威惠推千載猶使英雄困八蠻神不提身歸虎帳鬼須擘口動龍顔聰明儻為扶宗社願借風雷頃刻間寄西山姓名乆不到西山覔便無風鼻漫酸天塹有花春信急地爐無火夜堂寒青燈昔記對牀卧白髪今羞把鏡看見説北歸常有雁一書無惜報平安再禱梅山梅山昔叩五通仙曾許英雄第一籖恰遇塵埃常擾擾如何泥濘尚淹淹若非推入高宗夢須是驅成太史占他日嵩高詠申甫一香先為大王拈怒題壯氣横秋面渥丹男兒未遇指休彈賣漿豈料周分國盗粟焉知漢築壇脛脡未甘纒俗鞅髑髏不信誤儒冠夜深踢起牀頭婢和淚挑燈把劔看寄范茂卿社風吹迸雨前枝正是施工北苑時小胯未封纔入盝短鎗初拆半含旗一盆臈雪分龍井萬杵春雷入鳯池見説貢餘山畔積小煎還肯換新詩題溪莊山擁青螺出粉牆水環銀帶挿溪莊一百五日雨翻浴三十六宫人鬭糚蜨翅拍花催舞袖鳯毛翻錦入詩囊新歡舊恨知多少且對東風醉幾場竒見紅牙催拍燕飛忙一片行雲遶畫堂睂黛蹙成逰子恨臉紅燒㫁故人腸榆錢不買千金笑栁帶何須百寳糚舞罷隔簾偷送目不知誰是楚襄王思故人太乙年來落冀并幾多豪傑未成名堯天日月計和玉胡地山川知耀卿盧六驅風能破屋陳三平水可傾城年來幕府勤延攬何事諸兄未有聲呈古洲老人衛霍勲名李杜才纔過四十也心灰俗塵趁少便披拂詩料空多難剪裁時事漫提睂便皺家懐未説眼先開朱簾更倩梅香挂要得銀蟾入座來訓小童飯罷令人喚小童敢煩提耳為開䝉芎茶不用焦湯㸃紙被還將豓火烘醉欲伴眠當倩月熱求揮汗合邀風他時我建清油幕亷汝封侯學衛公郊飲茅舍松棚隔小橋碧帘斜挂竹籬腰豬頭煮去和皮擘牛肉秤來帶骨燒村酒不圖邀客醉埜花復喜向人嬌歸舟不用撑明月只倩西風借晚潮西爽客子東南不著家主人北里恣豪奢夜深常倩月移竹春老不煩風埽花暮雨送凉歸枕簟夕陽留客賦煙霞何時執手䦨杆外同把功名誓鏌鎁斗齋八方無處著瞿曇百合中間寄一龕滿挹酒漿供里北平量風月借和南腰如可折豈徒五涎若果流何待三更喜小窗能就拱夜寒江静看山函呈楚南僧剛腸未肯報平安擬把功名一儋儋方向杏壇逃敗北却於蓮社得和南香同世事炎還涼茶類人情苦始甘大抵久長同佛法此心何處不瞿曇山居布作寛袍竹作冠蕭然萬慮不相闗數聲横笛煙霄外一箇閒人天地間若遇急流須勇退從教倦鳥不知遷百年富貴君休羡得似浮生半日閒呉伯叙太平官府不停囚求劍烏衣欲刻舟私筴是鷄難做鶴公庭得馬便成牛不疑若受千金謗膠鬲當貽萬世羞見説明公在蓮幕不知能鑑此寃不讀史史筆如衡須正持莫教浮誕出無稽已成帝業從烹父未得王師休殺妻秦逸號眠為抱虎劉狂名舞作聞鷄麟經削後無全筆磨玷吾當問白圭建安暮秋斜陽望㫁水平橋古栁蕭疎已半凋魚躍浪花翻水面雁拖烟練束林腰花時無鏹能追驥月夜有詩堪續貂回首故鄉多少恨亂山無數路迢迢三衢道中西風吹夢落青帘濁酒三杯路二千别岸舟行秋色裏故人家在夕陽邉囊中有藥難醫國竿上無鈎可釣賢見説近來書籍貴監唐川漢莫論錢秋望有懐片雲和雨巻西風綽盡遮䦨眼力雄逺水半連晴漢碧暮霞全借夕陽紅姓名未得聨諸子鬢髪皤然已一翁欲識翠㣲詩外意豈徒憂國願年豐送李子方亂雲推月上層樓樓上珠簾不下鈎雞翅拍開珠户鎖雁聲喚上木蘭舟黄花撚酒留人醉紅葉題詩倩水流李廣不侯人不笑笑他人作爛羊頭寄兩庠同舍昔年搥鼓叩天閽逺謫南州七度春大享有恩來北闕小囚無路脱東閩烏衣座滿民流血畫燭簾深案積塵見説九重宵旰慮長沙猶有少年人呈㳂漕宰長亭不作馬蹄迂一葉孤蓬入帝都星布闗津皆自放雷封纂節獨相拘可憐罔市千般有誰信虚舟一物無為祝琴堂早催發片帆連夜過姑蘇送詹仲通縣尉秋郊送行色執别臨清流風神掣回栁故故牽衣裘吟螿附草際催客登蘭舟問客何所之駕言京闕逰愚聞京闕間多難三春秋門外炙魚肉關内羅羊頭鼎却吠堯犬冠還楚沐猴和戎重輸費廊廟有隠憂賑荒少儲蓄郡國無良謀飛蝗蔽日月兆龜坼田疇君以經濟材抱負衝斗牛家傳醫國秘殊不諸子侔有用即隆平豈特為東周願君攄緒餘咳唾聞冕旒管領一世雄克復歸神州賤子忝知遇脱網將從逰相隨上凌烟也勝登瀛洲作詩告於君君其許之不寄大庾郭縣尉前年建安櫂始識韓荆州一見辱知遇許我常從游尋幽訪赤壁買笑陪青樓有酒即命駕夜飲忘觥籌雪香飄梅花歸駕仍遲留送君城北隅嵗事希一周告徳雖未乆有懐奚所投客來自錦溪知為藍田逰摳衣欲趨隅其奈風馬牛方圖拜尺紙文此不敏羞乃復三不緘獲戾于君侯謫客千典刑宜爾餐呉鈎幸不畀我死殘喘延俘囚搜索徧中外釋縛良無由始思鵾鵬翼庇我反手猶嘘燈拂毫楮尺素馳星流荷公三復還惻然添我憂許我京闕間與我為良謀於今秋復冬俟命猶置郵西風掠天宇魚雁俱沉浮未審恩波中許我共濟不我材襪線短願公廣甄收他日賓幕府鏖戰當焚舟公兮不我援復駕言焉求羣鷗一聲漁笛發中流驚起平沙萬㸃鷗去盡青天回欲集梨花無數落汀洲雪中有戯一夜風神揭海神盡將純素掩丹青四圍白壁成千嶂萬里紅塵没一星搭岸栁條横玉帶壓牆梅萼上銀屏好將今日平淮䇿説與當年李愬聴憂世寄清溪友人廟堂無計息干戈國士銜寃弔汨羅尺五指天均日月八千里地舊山河人無逺慮心徒切里有新喪巷不歌况是十年芹泮客倚䦨尤覺淚滂沱嘲曹掾友人世態年來日日新宦途澆薄更驚人闕期動徹連三政選調無疑費百緍是吏有囊盛短巻非財無藥療長貧參軍也勝陶彭澤且糶官糧醉幾巡囚中記貧英雄不遇不憂貧獄吏從教喚不譍煮飯只燒沽酒罐讀書權借守囚燈堪嗟世事危如卵無怪人情冷似氷勿謂功名成倖致志公終不是閒僧兩宋名賢小集巻二百四十七
