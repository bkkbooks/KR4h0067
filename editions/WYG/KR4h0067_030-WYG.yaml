body:
  text: 兩宋名賢小集巻三十宋陳思編元陳世隆補溪堂集謝逸字無逸臨川人布衣而名重縉紳於書無所不讀於文無所不能有韻之言尤超軼絶塵秉性峻潔生平不喜對書生山顛水湄多從衲子游朱世英守撫日以德行薦於朝意不欲行不得已詣之信宿而返從弟薖字㓜槃食貧嗜古樂志不仕自號竹友以詩文嫓美其兄時稱二謝吕居仁云無逸似康樂㓜槃似元暉眞足追配古人山谷讀其與老仲元詩大驚曰使在館閣晁張流也恨未識之耳一日惠洪過溪堂見無逸所居一室生涯如龎蘊少君方炊稚子宗野汲水無逸誦書掃除見師放帚大笑曰聊復爾耳相與飯菽作偈而還朱世英聞而和之東鄰有寗生者年二十餘以鏤刻佛像為業俄游京師因其役得將仕郎歸家日華裾細馬閭里聚觀弟子不懌者累月豈非傷無逸負出世之才年未五十一命不沾而殞曾寗工之不若乎噫唏不識天下之為寗工者比比也崇觀間欲求如二謝之高風勁節者當世有幾人哉溪堂竹友二集係門人所編長短句尤天然工妙今詩餘所載僅劍首一吷耳擬峴臺耿耿抱孤韻寂寂扄柴扉束書卧環堵交遊車馬稀風流佳公子妙齡秉天機邀予歩層臺目送孤鴻飛山影漾清𣲖翠色侵人衣漁浦晚烟暝霽雰蒙夕暉静言思叔子悵然澹忘歸坐有庖丁手奏刀心術㣲萬象含筆端縑素聊一揮古來勝達士歘如朝露晞吾人各勉力毋為鄒湛譏廣壽寺學道䕶心城養生戒眉斧静知世味薄老愜野僧語散步給孤園邀我會心侣塵清不眯眼境静可氷暑蓮社宗逺公竹溪仰巢父此道不異世今人豈媿古當念貧時交重勿棄如土正覺寺避暑訪禪客頃作城南遨秋風颯然來草木鳴蕭騷復起水東興兩槳搖輕舠何處可盤礴有寺臨江臯門户頗幽䆳野徑深蓬蒿升堂脱冠坐洗盞傾濁醪初筵談名理清言洗塵勞徐徐雜恢諧坦率真吾曺尚餘清净業詩成漫揮毫人生一瞬息逝水行滔滔歸與不秉燭樓頭霜月高飜經臺吾祖牧臨汝滯訟清公庭胥吏退鴈鶩踈簾掛寒㕔鼓角喚幽夢草色池塘青雙旗引五馬駕言出郊坰足躡雲端屐手展貝葉經税駕妙高臺几研陳軒櫺朱墨紛在眼梵字森如星臺傾人已寂聲名藹餘馨想公忘言處角掛山中􅀢明水寺城西三十里山林深且杳羣峰如連環縁厓一徑小土潤禾稼重地僻居民少老桂聳亭亭喬松高矯矯幽露泣溪毛清風搖緑篠朝來爽氣浮輕烟横木杪日煖天清明野雉鳴有鷕石澗𠻳寒泉泠泠瀉幽沼叢峩雙石門屢經樵火燎祇園煥觚稜十雉周牆繚掃地炷妙香房櫳深窈窕嗟予嶔﨑人平生百憂擾好古嗜簡編僻性樂魚鳥每逢山水佳耳聽眸子瞭况同佳士遊意氣溢雲表望逺視眈眈臨危憂悄悄險韻吟競病怪語作危了華鯨吼脩廊僧牕曙迷曉炊黍饌來牟土芝雜荓蓼他時子來歸伐木芟蘿蔦考室山之陽高明逺隘湫第恐戀君恩紫禁烟花繞送董元達讀書不作儒生酸躍馬西入金城闗塞垣苦寒風氣惡歸來靣皺鬚眉斑先皇召見延和殿議論慷慨天開顔謗書盈篋不復辯脱身來㸔江南山長江滚滚蛟龍怒扁舟此去何當還大梁城裏定相見玉川破屋應數間寄隠士先生一作處士骨相不封侯卜居但得林塘幽家藏玉唾幾千巻手校韋編三十秋相知四海孰青眼高卧一菴今白頭襄陽耆舊詢名德詢名徳一作節獨苦秖有龎公不入州東菴年少談王陋漢儒筆端萬字壓嚴徐昔為詞客鶯花繞今作禪僧水竹居賤子已捐干禄學故人休草絶交書春風縱棹逰蕭寺壯望淮山政憶渠南湖絶句丘湖奩鏡浄無氛地接西壇共一雲安得御風如列子更邀明月訪元君野情蕭散不便書老人無心賦子虚待借南湖雙艓子緑荷隂裏㸔遊魚碧瓦朱甍午景凉軟風翻袂送清香荷花也似知秋近故歛嬌容避夕陽吳家渡碧浪粼粼見淺沙丹楓林裏兩三家舟横渡口漁翁醉夢覺滿身蘆荻花北津渡竹籬茅舍掩柴扉衰草寒烟野逕迷只有白鷗無俗韻何年相伴老清溪王立之大裘軒小人拙生事三冬卧無帳忍寒東牕底坐待朝曦上徐徐晨光熈稍稍氣血暢薫然四體和恍若醉春釀此法秘勿傳不易車百兩君胡得此法開軒亦東向蘇公名大裘意豈在萬丈但觀名軒心人人如挾纊閨恨汲井浣我衣伐石固我墉塵埃不被體絶無人跡通洋洋西江水我車不敢渡夙駕豈不早早行畏多露行止既有義離合亦有時衆人豈無心不如我所之豫章别李元中宣德舊聞諸李隠龍眠伯時已老元中少一時作吏各天涯故人落落疎星曉西山影裏識君靣碧照章江眸子瞭向來問道𣺌多岐只今領畧歸元妙老鳯垂頭垂不語古木查牙噪春鳥身在幕府心江湖左胥右律但坐嘯第愁一葉釣漁舟不容七尺堂堂表我兮歸卧靈谷雲君應紫禁鶯花繞相思有夢到茅齋細雨青燈坐林杪聞徐師川自京師還豫章九衢塵裏無停輈若居陋巷不出遊滿城惡少弋鳬雁對靣故人風馬牛别後夢寒燈火夜歸來眼一作眠冷江湖秋馮驩老大食不飽起視八荒提蒯緱鐡柱觀豫章城南老子宫堦前一柱立積鐵云是旌陽役萬鬼夜半舁來老蛟穴挿定三江不沸騰切勿搖撼坤軸裂蒼苔包裹鱗皴皮我欲摩娑手屢掣旌陽挈家上天去只留千夫應門户西山高處風露寒兹事恍惚從誰語安得猛士若朱亥袖往南山擊猛虎社日雨桞重重葉風溪細細紋清歡惟煮茗美味只羮芹飲不遭田父歸無遺細君東臯農事動舉趾待耕耘梨花冷香消盡晚風吹脈脈無言對落暉舊日郊西千樹雪今隨蝴蝶作團飛翦翦輕風漠漠寒玉肌蕭索粉香殘一枝帶雨墻頭出一作去不用行人著眼㸔絶句弄晴數㸃梨梢雨門外畫橋寒食路杜鵑飛破草間烟蝴蝶惹殘花底霧門前楊桞暗沙汀雨濕東風未放晴㸃㸃落花春事晚青青芳草暮愁生滿城風雨近重陽滿城風雨近重陽無奈黄花惱意香雪浪翻天迷赤壁令人西望憶潘郎滿城風雨近重陽不見脩文地下郎想得武昌門外桞垂垂老葉半青黄滿城風雨近重陽安得斯人共一觴欲問小馮今健否雲中孤雁不成行桂花白雪凝酥㸃額黄薔薇清露濕衣裳西風掃盡狂蜂蝶獨伴天邊桂子香輕薄西風未辦霜夜揉黄雪作秋光吹殘六出猶餘四正似天花更著香觀蔡規畫山水圖蔡生老江南山水涵眼界揮洒若無心筆端生萬恠樹杪聳烟鬟雲端懸縞帶繫舟枯桞根茒屋臨清派埽壁挂高堂肅肅起清籟君名定不朽第恐縑素敗兩宋名賢小集巻三十
