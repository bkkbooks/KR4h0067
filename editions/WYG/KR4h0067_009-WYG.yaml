body:
  text: 兩宋名賢小集巻九宋陳思編元陳世隆補冦萊公集寇準字平仲華州下邽人太平興國中進士淳化五年參知政事真宗朝累官尚書右僕射集賢殿大學士同中書門下平章事封萊國公乾興初貶雷州司户徙衡州司馬卒仁宗時贈中書令諡忠愍有巴東集奉和御制中秋翫月歌戒井銅龍漏水平玉輪初滿物華清光連南極星輝正影泛中天帝宇明風來蘋末披輕霧香濕蘭叢浥零露絳河横度燦雲章靈鵲羣飛遶宫樹法久照兮慶昌時樂芳宴兮忘疲敷睿文兮玩澄景當嚴更兮漸永九門秘邃敞堯宸靄靄金波矚目頻進牘豈能抽鄙思賡歌深愧預朝倫奉聖㫖賦牡丹花時正言直館栽培終得近天家獨有芳名出衆花香逓煖風飄御座葉籠輕靄襯明霞縱吟宜把紅牋襞留賞惟張翠幄遮深覺侍臣千載幸許隨仙仗看穠華奉和御製南郊禮成荐降靈符昭瑞命交修盛則荐清衷朝真典理揚丕烈類帝圓壇報昊穹述職萬邦咸執玉來庭異域協占風禹功髙與天無極堯徳明如日正中福浸蒼生臻富夀澤流綿宇霈龎鴻粢盛豐潔神皆享金石和平政本通鬱鬱雲烟當晝麗熈熈景物共春融羣臣抃蹈瞻宸扆願比南山祝夀躬奉和御製真逰殿上梁敦崇妙本膺丕貺濬發鴻源示永年吉語密傳當乙夜粹儀秪覿擁非烟皇心翼翼精齊至祖徳綿綿道誨宣誕集純禧彰錫羡交修茂典表欽先爰稽大壯新瓊宇仰法殊庭設綺筵山積瓌材咸備矣神扶華棟見巍然元龜獻兆良辰協哲匠施勤庻藝全四柱如翬循寶勢觚稜削玉燦珠躔黼帷夙設宸居麗翠葆躬臨聖志䖍昭荅明靈陳盛㑹睿詞敷暢煥雲牋奉和御製郊外觀稼天苑清塵宿雨收翠華觀稼慶盈疇氣和玉燭成豐嵗露冷金莖凜素秋日麗鮮原平杳杳烟含嘉穀鬱油油共知省歛敦農事信史騰芳紀聖逰瑞慶園觀稼奉聖㫖次韵善苗棲畆昭靈貺禁苑鳴鑾值素秋歛籍神倉符禮數採詩良耜慶農收宴開雲幄皇慈洽日駐天衢睿賞留千載逢辰増嶽抃清塵叨從屬車逰應制太清樓觀書仙禁開書府純毫紀格言簡編包舜禹範圍總乾坤稽古崇邦教斯文闢聖門從逰觀奥秘何以報宸恩御製乃眷儲闈方崇學術錫郡書于册府勵至業于承華日命近班同觀盛事七言十韵詩一首奉聖㫖次韵景命昭彰佑徳基元儲敦裕協祥期寢門勤至嘗無怠學肆多聞詎有疑金玉騰音鏘睿律簡編申錫振良規河圖奥秘言誠訓藝圃優㳺善益資玉宇風清傳宻詔蓬山雲委錫芳㽔天顔不逺回宸眷肉味都忘聼寶辭燕翼貽謀欣教盛上庠隆道慶才竒叨逢華旦居黄閣久待宣逰近赤墀恩厚荐承三晝接力㣲寜致百工熈東闈疏問英猷逺聖慮乾乾更念兹御製慶先后升祔禮成七言六韵奉和天錫靈符興寶祚澤流綿宇福蒼生蒸蒸至孝咸歸厚翼翼精衷尚執盈順考漢儀彰道廣欽崇周道著恩明豆邉合享豐盛備管磬同和雅奏成愛景融輝昭善應非烟絢采協殊禎尊升茂典光惇史稽古鴻猷振帝紘應製賞花釣魚龍禁含佳氣鑾輿下建章碧波㣲蕩漾紅蕚竟芬芳玉斚春醪滿金波晝漏長逢時空竊抃萬宇正惟康和御製降聖莭秋殿霜凝當永夕靈場齋潔方無斁髙真諄誨昔親聞上帝休複今再覿鬱葱兮卿雲仙鶴兮不羣肅清兮采蓆神雀兮振翼香飄華燭焰亭亭風度翠簾聲厯厯嘉應紛綸寶運昌聖人功與天無極奉和御製奉祀述懷歌巍巍至徳充綿宇翼翼宸心臨兆庻覆育懐生動法天講求茂典皆師古協和神化踵唐堯彬蔚頌聲踰吉甫赫奕皇威振八荒清夷王度綏中土豐年朝野正懽康溢牒充圖福紀祥睿聖繼明恢大業禎符錫祚降穹蒼省方展寀宣邦職登岱銘功舉國章睢上埋牲專事地漢唐故實存聞記精靈昭感果潜通瑞應昭臻知所自飈羽光臨神告彰洪源肇啟仙逰暨瀨鄉舊壤闢珍詞欵謁齋莊敦睿意譙都奏牘達彤庭耆耋雲趍共瀝誠順考皇儀尊妙道再修盛莭狥輿情聲名文物當興運申命羣儒究禮經秩秩徳音咸布惠穰穰景福必求成㳟承閟祀為齋久企仰真風志克勤肅眷廟廊嘉荐備廣覃慶賜湛恩頻式揚丕烈心彌潔祗上鴻名道益伸将覩虞巡陪法從幸同鳬藻樂昌晨天安殿致齋國陽崇大報玉宇藻多儀散致尊王度懐柔祝帝禧儲精通合漠玩志協㣲夷律正風來逈宵長月上遲漏筒聲漸瀝陛㦸影流離夙戒羣倫序交懽百慮維星繁陳法仗雲密䕃平逵傳警鳴相動威容聲率祗天安殿酌獻聖運昭惟永髙真協降祥方嚴泰壇祀先荐釡山章典禮官無曠涓辰筮有常中天華闕秘象衮晬容莊宵迥星河粲風㣲羽衛揚獻酬靈契接陟降寶儀彰顧諟欽元命寅㳟達上蒼彌文輝竹帛備物儼蕭薌尊道宸心至登春雅俗康猶將奉齋潔禔福俟穰穰西垣致齋日因成一章呈二相公攝事修穹祀齋居近紫庭千門夏雨歇髙樹夕陽生更散掖垣静風來鐘漏清岩廊慚舊徳書殿愧羣英白髪将何補丹心忽自驚敢言陪邴魏三接奉承明瓊林苑應制鳯蹕出重城宸逰順物情檻花紅蕋盛苑樹緑隂成雨過池塘静風來殿閣清樂和堯酒滿千載慶昇平和御製祀后土臨晉迴清蹕靈壇備克禋荐誠祠后土求福為蒸民展義王猷逺推恩慶賜均千官陪漢祀萬國奉虞巡仗衛明初日郊原麗上春花飛函谷路栁暗九陽津宿莽深藏雉柔桑逺映人河流喧二陜山勢壯三秦簫鼓聞睢上旌旗過渭濵天清臨曠野地迥接重闉入鎬皇懽洽横汾睿藻新周南慙踵迹空想屬車塵兩宋名賢小集巻九
