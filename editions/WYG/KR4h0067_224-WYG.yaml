body:
  text: 兩宋名賢小集巻二百二十四宋陳思編元陳世隆補章泉詩集趙蕃字伯昌又作昌父宋宗室居玉山博學工文詞以曾祖䁑䕃補官直秘閣致仕蕃性寛平樂易而剛介不可奪甞受學于朱紫陽少喜作詩讀者以為有靖節之風江南文士赴都者多求其作得其片言隻字無不珍重學者稱為章泉先生所著有章泉集小園早歩今朝欣雨止天氣漸柔和籬落小桃破階除馴雀多占方移果樹帶土濯蔬科農務侵尋及吾寧久卧疴連雨夜窓連曉枕城郭與山林旱苦七八月雨欣三日霖殊勝建武榖更念櫟陽金斗食端何直胡為久滯滛雨望偶題漠漠青山雨霏霏白露煙詩材來逺近晝幅極中邉流落雖天外登臨頼目前浮生才幾日此地欲三年雨中不出呈斯逺兼示成甫湖外頻年客江東邇日歸欲知年事迫㸔取鬢毛非寄意雖梅栁闗心在蕨薇令予倒芒履須子叩柴扉嚴先軰詩紅梅次韻盡道梅花白能紅又一竒渾疑丹换骨不是酒侵肌㸔此敷腴色思儂少壯時盛年雖不再猶擬歳寒知分界舗愛直驛張安道因杉製名而驛之前有老梅一株不知安道何為捨彼而取此也杉是誰人種梅從何代栽腹空雷有擊根瘦土無培要是百年物曾經㡬客來直哉雖見録清矣可遺材憶梅縱乏幽人宅猶餘大樹祠帶山仍帶水宜飲亦宜詩勿待全開後當乘半放時昬昬郭隂務皎皎上朝曦榴花樹隂㸔已合榴朶見初明當夏豈無意避春真有情花雖後文杏實可待瓌橙病叟緣何喜留苔㸔落英送王子遵赴衡陽丞王郎妙人物獨歩尚江東昔尉既不醉今丞寧肯聾相依唇齒國忽去馬牛風清絶官曹外何年着我同螢火渾忘生朽質直擬慕光輝解燭書帷静能添列宿稀當風方自表帶雨怱成㣲變滅多無理榮枯㑹一歸蛺蝶不遂春風去仍當夏日長一雙還一隻能白或能黄戀戀不能已翩翩空自狂計功歸實用終自愧蜂房暖甚去綿衣誰道江南春有寒未經社日衣能單桑麻過雨日夜長桃李因風高下殘舊説中州政如此了知瘴氣不能干天公似憫斯民病故體淳熈詔令寛十一月五日晨起書呈葉德璋司法卧聞落葉疑飄雨起對空庭葢巻風正自摧頹同病鶴况堪吟諷類寒蟲怱思有客渾如我却念題詩不似公已分虀鹹終白首可因霜雪愧青銅次韻葉德璋見示窮冬未省見梅班故里何由報竹安歸意寧須卜以决衰顔休待鏡頻㸔交情謝子來今雨節物娱予後苦寒獨酌更憐終漫興不如骫骳得天歡上已朝來一雨快隂晴東郊百鳥間闗鳴愛風栁條不自惜蘸水桃花可憐生不見山隂蘭亭集况乃長安麗人行東西南北俱為客且送江頭返照明梅花平生欠汝哦詩債歳歳年年須要還未至臘時須訪問已過春月尚躋攀直從開後至落後不問山間與水間却笑淵明賦歸去庭柯目盼自怡顔全樹婆娑夥匪奢數枝纎瘦少尤佳春風上苑吾何沗落日孤村汝自嗟定論要為塵外物飽㸔寧是世間花不然山谷能詩老曷與山礬定等差頃與公擇讀東坡雪後北臺二詩歎其韻險而無窘歩甞約追和以見詩之難窮去冬適無雪正月二十日大雪因用前韻呈公擇細思不是冬無雪留待春風鬬冷嚴病骨未憂衣乏絮早餐寧歎食無鹹梅添鑿落依同色竹擁參差半入簷坐守地爐應不􅌅破牕頻見北山尖雪埋老屋無薪賣晨起謀炊自毁車覔飽預期千頃麥破慳先試一春花便營野屐尋茶户更約綈袍當酒家處士至今疑姓賈壁間但沒挂錢义蚤立寺門作春天隂晴無定姿隂雲未巻晴風吹青山表見花顔色綠水添增鷺羽儀郭外不知誰是主眼中今見我題詩人生何物非郵傳敢謂吾廬不在兹出郭踈籬樹樹李花雪野寺條條楊栁絲春風收雨雨收後白日變晴晴變時有餘不足無盡景補短截長何限詩煙霞痼疾句成癖老矣折肱真得醫晚晴殘風落日蟬亂鳴細履小園欣晚晴投林倦鳥分暝色滿地落葉無秋聲衛尉一錢曽不直阮郎㡬屐畢平生三十六中第一䇿脱却世故甘傭畊二月十日喜雨呈李純教授去非尉曹滄浪一夜起鳴雷雨陣因之續續來所病農家成久旱未論花事有新開書生狂妄常憂國聖代飄零少棄才儒館尉曹俱國士好為詩賦咏康哉雨後呈斯逺已是霜凝更雨濕春其漸起但無痕莫嗟草色有垂死定見梅花當返䰟小駐要須窮日日細尋無惜徧邨邨揩摩病眼從兹始併待君詩洗睡昬送趙成都二首蜀道當謀帥維城孰愈公夷陵䕶江左斜谷顧闗中北地紛豹虎南方簇蟻蠭守攻雖有異鎮撫不妨同不但元戎貴仍兼制使䧺深沉天與度簡敬學成功人士薫陶内兵民教訓中祗應先却榖寧復後文翁菊蔓菊伶俜不自持細香仍着野風吹少年踴躍豈復夢明日蕭條更自悲潭水解令胡廣壽夕英何補屈原饑我今漫學潯湯隱晚立寄懐空有詩懐玉山禪月詩僧古道塲山雄呉楚接華場踈通八磜蛟龍隱高竝雙峯虎豹藏雲母屏寒消瘴氣藍田璧潤吐虹光碧桃花落仙人去靜聼松風心自涼絶句紅葉連村雨黄花獨徑秋詩窮真到骨酒薄不禁愁哭蔡西山鵑呌春林復遞詩雁囘霜月忽傳悲蘭枯蕙死迷三楚雨暗雲昬礙九疑早嵗力辭公府檄暮年名與黨人碑嗚呼季子延陵墓不待鑱辭行可知䟦韓澗泉絶筆詩後周漢歴歴上下秦侯王將相史疊陳辱斯榮斯仁不仁桃源鹿門商山人南磵逺孫澗之濵所以三人入吟呻桃源本是畊農民鹿門商山抱經綸一世雖屈九原伸所以絶筆於獲麟我之擬賦非厥倫威公語我淚沾巾賦黄小園山居何謂雪名寮應同立積腰要為膏以潤不作睍而消園小鋤斯食書多腹不枵青雲附能顯況乃白雲招䟦劉溪翁韓家府詩後何人詠出韓家府是我建陽劉叔通盡道唐人工樂府罕能褒貶似渠工誰詠韓家府建陽劉叔通是為聞以戒斯可謂之風妄矣彼侂胄哀哉吾魏公向者歌頌者豈但劇秦雄兩宋名賢小集巻二百二十四
