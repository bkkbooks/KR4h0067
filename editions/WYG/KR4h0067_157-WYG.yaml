body:
  text: 兩宋名賢小集巻一百五十七宋陳思編元陳世隆補野處類藁巻下書僧房陸續流泉自成句來擁紅爐聽山雨道人更有深深處語曲如珠蟻絲度几硯無塵寒欲霧雕盤篆破孤螢吐味如嚼蠟那禁咀茶甘未回君莫去題蘆鴈屏征鴻坐何事天遣南北飛蕭然如旅人無情自相依孤葦吹欲折秋風不勝威㝠㝠一孤鶱空費弋者機寒聲落烟渚相應不我違嗟吾識此情手納空嘆欷安知丹青師落筆乃庶幾畫形孰不工畫意識者稀他時因吾句購此千金揮題臨賦軒蒼山圍岑寂下有一水奔閉户卧風雨束蒿翳籬藩寥哉祇樹人心逺忘世喧此身自蘧廬長物餘此軒鳥語幽夢斷香横經帙翻未成借路行自要窺潺湲逺師淵明意不媿靈徹魂月度了無迹風行偶成痕心境兩清妙尺喙何由吞賦詩安所取碧雲未足論何當揣朱絲窈𦕈絃我言答併安江師送米不見道人久天涯嵗云除朝來食指動忽接送米書念師折脚鐺五合未省餘雖無覆餗禍尚有乞食逋云何憐孤客日受飢火驅未曽貸監河矧肯索胡奴誰言千升意矯矯超萬夫嗟予事筆畊輕棄南畝鋤恩煩方外客此計良已疎何時事粗了歸葺五畝居生涯寄綿竹豈即非良圖不為泉壤蚓願學江湖魚陳德瑞饋新茶空山冥冥雲霧窗春風好夢攲殘缸朝來果得故人書㣲凸而么犀鍔雙貴人爭買百瓔珞此心兒女久已降坐觀市井起攘袂念之使我心紛龎領君此意九鼎重我雖有力安能扛何時來施三昧手慰我渴夢思長江次韻希旦喜雨驕陽挾酷暑何啻虎而翼高田土可簏況乃耕與植風伯真可訟雲合吹復拆那知下土民糟粕配橡實古佛栖巖隈旱沴豈我責應緣賢令尹閔雨丐法力積陰暝山谷流潤淒几格朝來賀客散置酒浣愁疾古詩成雲外險句動潛蟄旋看蓑笠出競喜溝澮溢誰言令與佛念我一何悉嗟吾困蒿藜最覺民可恤何當問牛喘免使訴魚失九闗虎豹守懷此欲安適誰哉此心同吾飽將何日古風二首寄汪明道紫蘭初茁芽深壑終自秀骯髒蕭艾中不來則誰咎兒曹逐紛華壯士保窮陋應知此詞同萬世無先後俗士白人眼從誰明此心不欲故人見訶我車轍深蕭然江上廬客卧詩書林得句不相寄誰賞氣駸駸建安道中吾生意行初不謀汎汎何啻波中鷗攜家來作閩海夢三年客食天南陬我先人廬在何許大江之左道阻修奉新家有手足愛隻身歸掃先梧楸旋當來此營斗粟南北顛倒無時休此心轉與世事左自作磨蟻將誰尤安知不滿達者笑窮達一戲如觀優咄哉吾語亦已墮且與造物同浮游書事呈元聲如愚起莘三兄隠吏朱墨暇飽眠北窗風時呼方外客逃暑尊酒中寂寞杜拾遺四壁口不供坐取盤餐款哀哉豈天窮何如平生友磁鐵間不容毎懷千里駕令作五斗逢吏行散鳬䳱楸局收鸞龍共話十年舊事往如飛蓬浮榮真一戲何者為窮通應須河漢語淨洗芥蔕胸僕夫適在門客醉尊亦空更為後日約及此芙蓉紅寄題起莘家義軒貞觀盛德後餘慶未渠央舊聞閩海家欲縱燕山芳教子嗣先訓開軒翼中堂地偏市朝逺几淨書簡香先生陳太丘飯糜百憂忘弟子俱羯末不聞觸屏僵一變豪俠窟遂成鄒魯鄉下車里門外他年看諸郎坐上行素髪詵詵立冠裳我詩自可絃請以侑壺觴梅花山深春未動沙淺水欲氷玉梅於此時靚粧畧無朋露蕊欲的皪月枝挂鬅鬙儼如江漢女可愛不可陵他年江南路曉粧犯嚴凝尋香烟雨中横斜插茅簦却數今幾日癡如秋後蠅北嶺桂欲空誰與扶一登聊分窺水影依我照字燈坐使惜花夢臨風脚騰騰昔如夢中螺今學桑下僧了知菩提長念起我何曽十一月十九日與仲猷大年綽中美中飲於南臺空山欲暝雲冥冥玉梅半開吾眼青此身垂欲走塵土聊復舉酒看崢嶸折腰向人不知恥故園可鋤在千里金昆石友一開眉珍重道人相料理楚江東岸先人廬竹君安否久無書歸歟何時應白首我若食言如此酒春社齋禁連雨不止賦呈夢得嵗豐農猶飢嵗惡何可説哀哉半菽氓罪嵗同一舌年時旱塵漲臈盡不見雪青皇忽雨我萬頃麥苗活令尹民父母溝壑思手挈祈年祓齋居有酒不忍設那知桃李徑狼籍香泥滑芳意一如此坐恐及鶗鴂郊原佇開晴出勞南畝饁秋成已在眼一醉宇宙豁更呼湔裙人勸此側帽客和公斜川詩磨石鑱嵗月次韻夢得見示長篇雉馴不因媒鳩煖自呼婦詩成桃李陰知是霹靂手簿書我亦厭丘壑渠自有却憐支離疏飽食得薪槱俗夫嘗世味甘苦半噦嘔知公超然處心跡兩無垢愁陰老芳物蟲鳥故相誘浪蕋費收拾柔條可結揉豈無我輩人一醉開笑口那知市門底客倦枕兩肘眼高可人稀命蹇亨運偶平生願執鞭見謂余小友細觀豈弟心宜在帝左右却來塵埃中寂寞對五栁鷇音藏鵠羽正待荆雞剖學政容窺譜問字當載酒虚名翻誤夢恐坐箕與斗言詩終不稱永媿賦瓊玖身閒書有味吏傲俗不親小窗據物表掃盡心眼塵令尹垂珠玉敲門喚行春作意向芳物吾車曽未巾愁陰入病骨鳩婦聲亦嗔㝠㝠三日雨桃李迹已陳空餘深枝間一一青子新穠芳殿春晩猶堪慰佳辰酴醿曉粧靚芍藥醉臉勻白萼簪嫋嫋風枝倒粼粼言當呼短舞抵掌回雙顰年來得相從稍覺安沉淪豈不挂俗事察公極清真眼中醉鄉路風味良獨醇流光不容玩尺璧何足珍漓俗益可厭願言勤問津牡丹酴醿各一首呈周宰珍藂壓朝露無人羞欲攲春風醉香骨綽約不自持誰憐曲肱人一笑遺穠姿不言意可了君醉當勿疑糚淡洗逾靚肌香薰不成皎然月露姿一笑午景晴聊移夢蝶牀相對户不扃誰令春雨暴睡起春縱横次韻夢得淺紅芍藥長句十日愁陰病不出卧看春歸無計惜詩翁遣送淮海春衰眼熨開雲霧拆胭脂注臉勻未遍肉紅借酒生春色了知造物著意深傾倒春工不餘力年來不顧溱洧女載酒非公復安適且將妙句寫餘妍欲立佳名付精識一春頗困歌湮沒回首紛華三太息願言乞與洗心方歸對爐香誦周易宿禪寂院夢中一葉揺江湖困睡不覺身籃輿眼明佛屋麗丹碧瓦鴟鐵鳳凌空虚疲民日者困苛索半作頳尾相濡魚鵜鶘數罟兩不置肯念竭澤明年無道人誰與辦此事斤琢千指開渠渠頗疑如幻三昧力上方手攬歸吾廬了知舌本法輪轉咄嗟檀施爭奔輸不辭割愛一念善誰謂嵗惡窮民愚書生袖手對溝壑力不能援心煩紆事無大小成者少談説治亂何區區調卑絃急誠齟齬鑿圓枘方尤濶疎古今罪嵗同一口撫掌一笑皆愚儒詩約范直夫遊萬葉寺觀瀑泉范侯隠下吏夙尚本丘園身投攫金市聚書以自藩炯然如孤月不受黄流渾要知句律工競病何足論我生羣末俗涇渭同一源同心無楚越傾葢如弟昆人生各有役不暇捧一尊風蒲挂南浦念欲東南奔對牀定何夕青燈照晤言懸知吟詩處千尺銀河翻次韻夢得見示之什居楚求齊音美惡不同土諠豗俗物華鮮復有佳處時後玉璧人商略窮萬古詩如粟牛戲誤得摩頂許望道渺逾逺浮生真暫寓忍持尺璧陰空作秋蟲語㣲言倘傾倒河漢濯肺腑向來説詩口自此行可杜送甌寧魏生赴武舉生後與金人戰有功戰沒于邯建安少年請纓客横槊賦詩兩無敵辭家去作入彀英氣拂天狼夜無迹廟堂尺箠鞭羌雛智名勇功付壮夫引弓没羽世自有敢聞上策當何如陳仲仁止止堂以我有限景逐彼無涯知失足踐畏途投身試危機舟車日奔覆定無丘與夷萬古踐此轍嗟我與誰歸仲仁古靜者懷璧照褐衣名途嘗一戲回首羞前非心如得坎水不受狂風吹功名憂不免當復定何之請觀本無作今復止者誰築堂市門側著書園不窺蓬藋深一丈圖書周四圍時有好事人載酒問所疑攫金奮敏手倚市誇妍姿回光時自照何者非吾師送志宏西上九州眼一㮣餘子真瑣瑣嶽立㟝嶁中喜此高岋峨如公吾輩人取友一到我揮毫賦垂天風雨巻蓬顆相期八表遊未覺夙心左解龜醉江閣酒面山月墮起瞻帝鄉雲感歎不成坐何須飛霞佩自辦凌風舸瀛洲渺溟渤萬里一掀簸緘詩寄天涯秉燭對新火那知市門仙斗禄事么麽空餘腸九迴上流何日果有懷舍弟逢年時歸婺源以詩督之水落天未霜君歸定何時相思如驚鵲中夜未安枝夢中見阿連鏘然詠新詩寤驚衰葉翻道是步屐移攬衣下中庭風露浩淼瀰遥知客衣薄歸來一何遲平生短檠燈相對忽解頥萬古一舒巻佳處良在兹是中及物心上與稷契期援古以自例自矢無乃癡夜叉叱九闕側足不敢窺坐令一寸心日抱二柄疑遲君商量此免得兒輩嗤况乃綠髪親倚門鬢欲絲狶膏非鳳喙車轄無可脂再拜夀杯分斑衣舞參差秋芳未云歇采采黄金㽔萬鍾不足樂古人豈我欺九月十七日夜度蔡道嶺宿彌勒院月出度松嶺露香非羽衣肅肅夜氣清蒼蒼烟徑㣲川光浴秋容蘿影挂夕輝氷輪碾空濶飛轍無因依擬掬星渚波恐觸天孫機偓佺何時見沆瀣聊獨揮未應青霞志即與素願違稍依塵外踪想此巖下扉清吟寫萬籟妙想絶百非不須河漢言盡解紛華圍飛仙亦戲劇𤣥學乃庶幾鰲山切丹極嵗晚行將歸游鄭圃城郭不去眼而得林壑娯低徊撫壯心欲吐無與俱鏗然一枝筇細磴半樵漁挽衣竟與飲不省誰為吾女貧苦難妍女貧苦難妍士貧苦難高了知論此者不識一世豪此身百斛鼎流俗欲手操寧當捨其中局促計所遭頗疑有若人骯髒栖蓬蒿考槃一丘壑光景不可韜斯人不我忘空復踰垣逃軒裳亦云華唾去如腥臊哀哉夷此子擾擾冠猿猱活無齊世心閔黙死滔滔朅來事斗禄俛仰身桔槹一官戲人間㡬何非餮饕誰言眷此情擲去輕秋毫區區欲驕士一哭嗟兒曹溪南梅花巉巉石徑鳴枯筇意行詰曲無西東心知幽壑梅已動一枝寄我曽未䝉清香横路忽驚顧氷蕊的皪蠻烟中有如佳人久去眼邂逅相得情何窮蔬畦壓霜翠羽亂已覺雪片栖丰茸嗟我過此來已晩攀條嚼蕊聊從容玉仙遊戲下塵世絶艷一洗汞鉛空不知閬苑在何許叱回風馭無匆匆溪寒沙淨迷俛仰坐待山月來朦朧豈無尊酒相暖熱錦裘起舞如驚鴻仇池老仙羽化人妙曲三疊餘仙風歸時醉倒不知一作成卧明日來此誰能同再和求首座道人昔曳匡廬筇五老負雪湓江東犯寒貪覓玉梅句雖有衲被何曽䝉歸來苦雨熟梅子巻裓深卧蠻烟中詩傳絶境忽入手置我鄉國情何窮十年不蹈江上路漠漠海氣昏貂茸異鄉嵗晚慰流落一笑賴此氷雪容嶠南絶唱誰敢和騎鯨人去塵寰空崑墟下視堪笑閔雕琢肝腎愁匆匆那知幽子雲雨上風斤玉斧修朣朧讀詩令我一回首杳若目送孤飛鴻何時晤語折鐺側坐聽萬籟號天風拈花特地兩顔解他時與子真參同奉酬令德寄示長句閒官屋舍如幽栖寒苦餘業償鹽虀忽聞鵲聲作破竹尺書入手誰所齎交游勝絶似公少矯矯鸞鳳依蒿藜青㝠側足在咫尺誰使狡獪捐其梯秋風溪上共尊酒擺落羈束忌畛畦紅裳起舞意未足缺月銜嶺星河低只今跌宕走塵土清夢往復無山蹊新詩驚怪爛盈幅筆力抝怒蟠虹蜺遥知盤礴小窗底得䘮已著一理齊此生同困造物戲未覺與世誰雲泥雖無絶唱連白雪頼有妙契如靈犀一笑從公豈無日挽袖相屬空玻璃不須俗物敗真賞但覓佳處同攀躋答康民見和梅花詩寒崦人家碧谿尾一樹江梅卧清泚仙姿不受白眼汙風斂天香瘴烟裏向來休沐偶無事惟我亦游二三子彎碕曲徑一攜手凍雀驚飛莫能委班荆勸客少延佇酌酒賦詩相料理多情入骨憐閔殊休倚横斜嚼氷蕊至今清夢挂殘月强作短歌傳素齒韻髙尚恨白難稱賴有君詩清且美天涯嵗晚感鄉物歸歟何時路千里枕樓一笛雪漫空回首江亭淚如洗上丁餘膰置酒招綽中德粲逢年我生無幾求畢願老葭菼誰今事斗禄飯糲羮不糝書生亦可憐㣲物有先感朝來食指動膰肉豐咀啖恭惟魯司寇道大長􅇄坎空餘祠千載不救陳蔡慘永言百世師願學吾豈敢當飢不忘歌既飽復何憾安能如王孫長物貯頥頷急呼講肆人一醉捨鉛槧相攜桃李徑歴亂蹴紅􅆴言强三尺喙氣溢一身膽平生超然處獨嗜逾昌歜詩成持徵君莫遺兒輩覽用綽中韻送正臣正臣欲歸隠而無資故廣其意以告識者華裾錦領烏紗幘氣葢當年五陵俠胸中磈礧不可平拂衣歸來抱長鋏軒然寄傲楸枰間長恨坐隠非雲山相逢笑我眷㣲粟我歸未可君何難世人錢作牛吼音誰能立談夀千金空令擁鼻誦招隠知君心在仙峯陰故山自歎無歸期作詩但擬淵明詞却愁他日林下信千里寄我惟當歸秋懷六首庭柯一葉飛風挾涼氣歸湛湛陂水清芙蕖脱紅衣非無岑寂士句法鈔元暉獨懷履霜戒德人貴知㣲真儒六經學文字聊解紛長孺棄諸侯漢庭相公孫兒口乳未乾妄作黒白分誰能領斯㑹事往風中雲導江自岷山源淺觴可濫下集大小川千丈水府暗策策井桐寒炯炯窗月淡後生抱竒志黄墨勤㸃勘市朝富危機匹馬死馮河何如狎鷗子烟雨同一波行藏各有趣不在相詆訶我師陋巷人千古冠四科穿堵超玉繩倒影夜窗寂火雲一洗空月露清欲滴幽人負疴卧起坐三歎息歸同對牀弟晤語永佳夕掩窗耿不寐道人亦無悰故山新稻香闕枯桐夢中信了了推枕聞西風少遲穉金壯歸善與子同逢年與德粲同之温陵謁大智禪師醫作四小詩送之丈室掩槐夏與君同卧疴平生莫逆人裹飯誰見過跰􅓷起鑑井萬古寂不波觀心要知是造物如吾何六年別故山松竹故無恙此身已天涯飄走復何向清源老醫師砭樓出投狀勿辭一往勤挹彼上池漲石梁跨壕山永與方壺久憑君持一盃往酬濟川手遥知相攜處溟渤浸箕斗作詩問大釣猶有斯人否山河我四大物我同一體誰為苦疾痒搔按不容擬多生抱此念耿耿未云巳那知知魚樂更有濠梁子與陳彦時㑹華嚴道人偶書屋頭烟雲屯屋下波濤諠團圞坐已久起扣丹霞門客至苦舌强目擊翻無言元龍湖海士懷哉夙契敦清坐鼎足峙妙語流潺湲君游華嚴海貝葉手自翻此心於身世鳥度空無痕笑吾流浪中久被業識吞讀書談古今綺語生禍根望道𣺌未見況乃躐其藩職卑困掣肘見溺不得援未知造物心頗復哀黎元近窺賢稷意未敢遽掩闗躬耕亦細事㑹要五畝園釋羇牛在牧駕鼓馬伏轅居然見優劣不比魚熊膰持問跏趺人一笑霜眉掀相攜妙峰頂暝色窺逺村解衣略輩行班坐搴芳蓀欲歸意未巳幽徑相與捫蒼崕出玉體不受瘴毒温願言同酌此我語庶不諼書栟櫚院璧側身西來度千山列仙仙去空孱顔斗升自殺應笑我何苦詰曲戲塵寰歸畊無田仕難合疑此二柄首尾間摩挲崕石三歎息我心安得如汝頑次志宏韻督成夀置酒歸耕食吾言回首媿江水方爭揚子席誰置穆生醴鄧模傾葢舊小寢蓺桃李走書約啗我涎迸齧脣齒朝來獨何事怒色劇染指雖㣲射鴻游顧有捩手鬼平生談天口得酒便鋒起年來病不觴但要謳貼耳真成畫蛇足足就酒空矣樊川吐怨句想見紫雲美何時咄嗟辦一醉吾亦擬噂沓聽羣兒口實爭笑鄙附集外詩寄題分繡閣新閣何隆隆經營自兹嵗其前山送青其下竹交翠景物日夕佳登臨春秋異治中公事暇領客共留憩四座歡相酧夀主珍重意向來蓬瀛上視此毋乃媿主稱客意好是事幸且置拄頰飽看山朝來殊爽致送制置使王剛中帥蜀上都門外垂楊陌葉葉經霜不堪折春光猶未到梅花何物當扳送行客路人驚問去者誰高牙大纛爭光輝君王應念蜀父老故輟侍臣來紫微明光起草文章手却聴元戎報刁斗回首翔鸞一夢中玉簫緩送成都酒邛郲九折何足驅慷慨功名真丈夫成都花錦君莫戀早晚歸凱持鈞樞車駕幸玉津園晚歸進詩五更猶自雨如麻無限都人仰翠華翻手作雲方悵望舉頭見日共驚嗟天公的有施生妙帝力堪同造物誇上苑春光無盡藏何須羯鼔更催花王龜齡王嘉叟木藴之同過小園用郡圃植花韻節到中和暖尚賖東風隨處起芳華自慙翳翳松三逕相對蕭蕭馬五花老去醉鄉為日月年來痼疾在烟霞午橋别墅歸公手早定淮西取白麻送楊簡遷國子博士楊君解墨綬去作國子師邑人十萬户遮道嬰兒啼曩嵗天旱苦赤地無餘遺饑殍千百輩上山爭採薇採薇有時盡詎能救長饑慨然顧自任舍我將告誰昩爽出㕔事日暮忘旋歸大家貯陳粟出糶不敢遲偷兒紛狗䑕鋤治如平時一意摩手撫如子得母慈明年麰麥登比屋無流移史牒載循吏于今親見之我亦受一㕓惜哉輕語離橋山未迄役酌餞疎酒巵聊述路人頌持作送君詩朝天菊但見荼䕷能上架那知甘菊解朝天亭亭秀出風烟上冷落東籬却可憐與葉晦叔同考校諸生鎖宿貢院作沈沈廣厦清如水市聲人聲不到耳一閒十日豈天賜慙媿紛紛白袍子相逢更得金玉人久矣眼中無此士連牀夜語不成寐往往鷄聲忽驚起是中差樂真難名昔者相過安得此但憐時節不相謀正墮清明寒食裏梨花已空海棠謝外間物色知餘㡬只恐風雨摧折之負此一春吾過矣謝公尋山飽閒暇應笑腐儒黏故紙錦囊得句應已多萬一相思頻寄似上清宫振䇿衝暮雲攜琴宿仙境松風生夜凉蘿月散秋影洞逺落猿聲溪清鳴鶴頂中宵夢仙翁乗車停翠嶺獅子身五色鸞鳳互相引上有朱幡幢金碧不可省風吹雲璈徧顧我忽而哂遺以丹篆文再拜豁心領明當謝浮榮飄然從結軫和朱子淵石柏詩海底靈根石效奇山經地志不曽知凝紅幻出珠千顆染紫裝成玉一枝鶴骨龍姿隨質見鸞棲鳳宿與香宜元戎高唱真難和愧我年來筆力衰宣瑣禁門深鎖寂無譁濃墨淋漓兩相麻唱徹五更天未曉一池月浸紫薇花兩宋名賢小集巻一百五十七
