body:
  text: 兩宋名賢小集卷一百十三宋陳思編元陳世隆補鄱陽集彭汝礪字器資饒州鄱陽人治平二年舉進士第一累遷監察御史裏行首陳十事指擿利害多人所難言者元豐初以館閣校勘為江西轉運判官數上疏論事元祐二年超為起居舎人權兵刑二部侍郎進權吏部尚書以寳文閣直學士知成都府未行又降待制知江州至郡數月以病去卒年五十四瓦鼔自新建令仲文得之客逰南昌歸歸我四瓦鼔渾完甄冶工質樸棑罌甒觸之散遺聲往往中商羽聲來殆天得不用詢有瞽野心愛不徹取之置林宇竹梢奏清風似喜佳物伍岸巾䇿笻枝共爾蠲毒暑世浮見此拙坐覺幽興聚丹楹惜異時蕢桴想淳古君年比余少能亦珍此否雪夜飲分題得雪字顛風夜號花木折平明堦前三尺雪誰家羌笛落早梅中夜南樓對明月苦寒厭厭祗夜飲朔風吹人毛髪縮公才奔放欲萬里應恨低囘受羈紲一巢安稳身自在生涯卻羡鳴鳩拙人生值遇行樂耳世事悠悠無可說偶有名酒須盡歡醉後嗚嗚呼耳熱君不見戍卒征南凱未旋戎衣雖厚冷如鐵寄友人漢上近多雨江頭應好風想君當此際掛席隨孤鴻翔龍壓大浪畫鷁凌長空男子四方志生時射桑蓬爾来何遲遲吾憂秪忡忡安得百頃田稍鄰五老峯早賦歸去來同為採芝翁讀史婁敬脫輓輅獨建金城安韓信出羈旅遽上將軍壇謀出萬乘驚名飛百夫歎丈夫松桂姿直氣虹霓蟠得時樹功業未謝婁與韓次韻堯民同年飛雪鱠長鯨浮蛆潑新酒故人不我過絶壁頻囘首北崗無斷絶參錯分燕豆觸目事漸新愴懐治平舊龍飛第一牓四百如蘭友勁氣沮金石髙文爛星斗我衰也乆矣彫落幾無有未去真厚顔欲歸猶掣肘盤根發餘刃想見敏㨗手江湖被郛郭雲霧生戸牖顧瞻良集易歎息幽期後吟到詩輙成吾窮乆箝口答同舎游凝池仙宫神靈之所宅樓閣倚天一千尺先生好逰猶挾册藜莧不慙吾鼎食凝祥池頭三月春腰金騎狨多貴人天邉五嶽烟霞闇海上三山雨露新蛺蝶能飛燕能舞鳳凰在雲鴻在渚仙人參鸞入雲霧寂寂不聞青鳥語洞天落晚日沈沈漁舟縹緲桃源深紅玉坐㸔花着子青雲行見葉成隂疾雷怒飛風雨急瘦馬不行歸斾濕投閒一日須一來歲時變化猶呼吸栽竹一生正能著幾屐曠達人稱阮遥集何可一日無此君風流我愛王參軍夏葛冬裘我便足由来世間無可欲但栽翠竹滿東林我日對之歌且吟送頴叔帥臨洮風如疾雷雹如芋積雪如丘擁道路蔣侯車馳挽不住見說西人復嘯聚目視隂山欲飛去蒋侯文如江海注一決萬里無盡處筆落在紙成雲霧氣吞雲夢八九數力轉丘山縳螭虎終日笑言公不怒三軍號令成樽爼夏虜膽落汗流泝邉人乃至歌五袴昔聞禁中得頗牧今見南陽稱召杜前席宣室疑已暮勒功燕然無可慕歸来徧作人間雨杕杜吾當為君賦彦衡約飲湖亭行不及赴主人欲畱客其意良已厚行子念于役奔命唯恐後張帆半夜起撇若驚蓬走盈盈水中蓮鬱鬱堤上栁相别不相見已行更囘首人生如朝露理固無可乆可為惟有徳萬一或不朽行也死後已庶猶無大咎君恩不勝報聊一報我友行西城我將行西城曲指計日月汝來今幾時已卜錢塘别我衰况多病苒苒髻已雪安能乆去汝漫自投羈紲田園苟可飯聲利非吾屑與汝歸去來相㸔至耆耋蒼茫尚無涘空復愁如結漢上謁劉執中塵土能汚人有如衣匪澣驅車出闉闍縱目盡江漢漁舟泛青雲瀟灑鴈為伴蘆花如飛雪時逐風散漫可憐獨清人憔悴行澤畔菊苗重陽黄菊花零落殆無有㣲陽動淵泉嫩葉出枯朽青青好顔色寂寂霜雪後物理如轉環人生豈能乆採葵古人採薇蕨我亦愛斯葵能隨朝陽傾不為秋露萎烹調戒中厨聊以燕母慈拔根取亷名未愧魯公儀途中和君時聞君欲脂車輾轉寐不安憂心頑如石百計不可寛鳴鳩祇在桑歸鴈乃雲端一瞻百歎息强飲終無歡寄君時四章章四句我脂我車陟彼高岡母也吾懐匪居或忘我帆我舟汎彼大江母也吾憂食匪或遑我池有魚亦可以羮何必鮪及魴叔兮其歸哉我田有菽苟可以食何必稻與粱叔兮其歸哉自吉泛舟入贑我行欲從車好風苦相招謂言困行役厭此道路遥駸駸四駱馬終日在岧嶤簿書更追隨精耗髪欲焦乃復汎栢舟錦幔蘭為橈是時春始和暖風秀陵苕彼栁已青青彼桃已夭夭王事敢不脩我飲歌且謡彼不知之者謂我士也驕不知非所知我兹以逍遥遊峴山去年冬雪少二月春始晴南逰峴首山東下石頭城揉藍染江水爛錦貼園英幽亭一杯酒不用千載名冬日道中作夜臥衾裯单不敢嗟體寒晨餐疏食微不敢歎腹饑重念饑寒民亦有甚我身我心苦嗟吁彼俗當何如長蘆阻風縱目江南路繫船惟上村長蘆雲作陣高栁石為根浪逐江風急潮連海水渾雪霜千雨散鉦鼔萬兵屯蒲藻魚逰處泥沙鳥篆㾗參差鄰畫舫咫尺想空門貝葉有秘語韋編無近言漫瞻雙去翼空飾兩朱轓好在彌天釋何如炙輠髠濁清羅酒斚南北㸔風幡敬信無非事精微詎可論孤忠天未棄尚合辱垂恩沐浴有感去垢如去邪不欲畱毫分髮不止一沐身不止三熏如何迷本原浴徳不自勤區區飬樲棘俯仰愧前聞宿金鈎館絶域三千里窮村五七家雲深無去鴈日暮有棲鴉霧擁雲垂野霜連月在沙夜長無復寐寂寞聼寒笳惠州霧暗山千叠氷寒水一涯風高天作雪日晚露迷沙居士身如夢行人驛是家青燈無意緒㸃㸃自成花和章承議通判來章近水班荆坐縁山拄杖行雲煙窺勝㮣風雨聼寒聲乆累維摩病多慙衞玠清波瀾終未息袞袞共勞生雲蓋寺詩唐淨圓禪師初自石霜來得乳蘿洞喜之將宅焉初至蛇蚖塞路矯然怒視師師以法語告蛇引去既宿而斃師為焚之旦視無遺燼有三泉出焉左者黒右者清中者白師既築室從者如歸市逮今遂為名刹舊日蛇蚖穴今時薝蔔林寒泉三井舊高閣五峯深翠竹娟娟老長松漠漠隂鳳凰池好在誰得老師心道中湖天冬不雪山地晚多風岸草猶全緑村花或自紅差池歲聿暮寂寞雨其濛南北隨蓬轉浮生寄寓中内鄉招提寺淫雨宿蕭寺白雲思楚山病催顔色老淚裛鬢毛斑流水終何事飛禽倦未還夢歸無别處鷲嶺鳳林關途中早起寄兄弟為惜庭闈别方驚道路難醉憐山月古病怯野風寒駐馬詢農耜臨溪問釣竿新詩如有得冩染寄歸翰送巖夫庭佐歸寕春雨傷行色秋風問後期欲迎黄鳥意更遺白華詩家塾求吾友親庭寄所思獨吟城壁晚如悟角聲悲接伴太傳離新館其兄迓於途使者乗軺至將軍走馬迎侏離何所語踴躍不勝情寓目鴻鴈澤傷心杕杜行天乎非有間我老獨無兄夜泊睦州桐江一水連銀漢千山擁古城客乘清夜息舟倚碧溪横皓月危峯影清風細浪聲嘔啞殊俗語惨淡異鄉情余十一月甲申以使來武岡坐茅茨之室逼閭閻之陋無故人往來之樂懐羈旅不足之情於是有遊古山之寺在縣西十五里而山水俊拔深秀亦有可愛者因畱置酒抵暮還驛而作是詩澹日沙村晚霜晴溪路遥蠻人瞻虎節田父看星軺使指勤咨問君恩費飬調畏途諳跋渉遺䇿問芻蕘臘近雲長暝春遲雪未消遠空低幕帟疊嶂露瓊瑶板屋誰家舎茅簷何處橋梅香浮逺水藤古上重霄細草眠黄犢巔崖落皂鵰兒童晴出牧婦女晚歸樵椎髻騎吹笛斑衣行踏謡封疆連五嶺習俗帶三苗狐䑕威溪老豺狼脫洞驕今當䝉潤澤乆已靜氛妖歌舞隨鄉地耕桑托聖朝威儀欣用夏姓氏恥稱傜僧至不千里寺名非一朝小亭浮草莽高閣出岧嶤泉細能沾潤峯危欲動揺㑹觀禪味足還見講花飄茶汎波無跡香深篆未消逺遊貪物象乆客厭塵囂子美詩千首淵明醉一瓢儻来淹白晝輕去恨連宵野色隨行李灘聲逐畫橈舄歸鳬漠漠旌旋雨蕭蕭淡月生昭曠青燈照寂寥歲時惟箭激江海秪萍漂洪井連廬阜蒲山近斗杓且從周夢去莫作楚辭招在合肥幕中有作幕府開雄盛朋逰望俊髦雙松鬬氷雪一鶚出蓬蒿春雨吟花蔕秋霜滿蟹螯山川畱翰墨天地入風騷感慨驚多變㣲生病一號酒巵餘寂淡詩筆惠英豪憂思生心腑塵埃上鬢毛簿書今日困道路此身勞小雨開濡滯清飈散鬱陶小亭山可見從此欲登高送劉器之待制知眞定府時平謀帥重侍從輟名卿龍種三千騎虬髯十萬名紅蓮王儉幕細栁亞夫營側道諸侯謁還鄉故老迎試詢三將宅應過五梁城漫樂潭園勝難忘魏闕情守株嗟我老仗鉞壮公行秪恐非朝夕君王召賈生和春城北春光未恣看已復見春深水漲千溪緑松低一路隂簿書淹世態雞黍亂鄉心莫廢清和飲枝頭李可沈和晚北園天氣非相逼東風已自歸樂遊終少及世事故多違桃杏春如在溪山暑尚微早期筌楫泛頻縱角觴飛和祖道國門外文淵子至東父餞席上贈别行李隨長道飄蓬笑賤官望雲瞻白日臨水㸔驚瀾鳥語如知節花開尚怯寒莫嫌春色淺畱到後園㸔陳師道教授示黄梅詩次韻呈正夫學士美色絶殊衆暗香時著人齊州終自别不比嶺頭春可但深宜晚須知巧耐寒北人渾未識秪作棣棠㸔大小沙陀二首南障古北口北控大沙陀土地稻粱少歲時霜雪多古来長用武今日許通和豈乏驃姚將君王悟止戈大小沙陀深没膝車不留蹤馬無跡曲折多途鳥亦惑自上髙岡認南北大風吹沙成瓦礫頭面瘡痍手皴坼層氷峩峩霜雪白狼顧鳥行愁覆溺一日不能行一驛吾聞治生莫如嗇和漢廣席上賦秀色霜滋重餘香露洽鮮鵠巢靈殻媚蟾窟夜珠圓丹橘非優貢蟠桃亦浪仙無嗟後林質未至大清天龍泉秋風入泉野吹散菊花芳萬里無人處千枝秖自香風流憶彭澤時節念重陽物意雖寥寂能忘酒一觴和君時余未至君時言有羣鵲集舊重千金諾元為五日期水清氷破玉巖潤石凝脂命駕不嫌遽舎車空悔遲多慙無道力有往鵲先知和君時弟韻流火退縮金盛强郊原日夜生寒凉梨垂栗皴橙柚香田家笑語炊黄粱山水秀澈揺秋光重巖細菊斑斑黄萬象呈露無遯藏時和歲豐辰亦良脂車與子遊上方吐論縱横氣軒昂書帙羅列圖畫張睥睨孔孟窺虞唐偃息道奥縁禪牀苒苒定㸔移星霜遊西山示同志我少及長從公逰我今老矣公白頭淵明彭澤不歸去太史周南方滯畱愛山興與精神聚形骸自笑縻珪組欲騎馬去陟彼砠空羡鴻飛在于渚西山苐一列洞天别有日月無歲年洪崖已成丹竈藥瑶池每賦白雲篇嘒嘒蟬噪竹枝露斑斑豹宿巔崖霧伯兮伯兮歸勿遽人間旱禾須霖雨秋雨辛勤開菊花春風取次生蘭芽我雖調公不敢易龍駒㑹去超邊沙使北有懐長年日戯老萊衣不忍此身終日違今日馬頭燕北去不堪頻望白雲飛白雲汝飛去何許悠悠㑹到江南路朔風吹淚灑大河直與波瀾競東注皇帝郊祀禮畢詣景靈恭謝次履中學士黎明駕出告熙成朝野人呼萬歲聲日上天門春意近雪殘宫瓦曉寒生六龍寵䕶随天仗三爵恩榮醉御觥德似丘山毫未報白頭知愧不知榮郊丘從駕今歲郊丘上始躬宿齋初出未央宫百年禮樂星辰爛萬國衣冠錦繡中精意與天相應接人心如水自流通聖時好作休成記今日誰為太史公和瑛師江湖日夜着東流水上乾坤一㸃浮隔浦雲山隨客歩近村花竹慰人愁同舟自有林宗在結社還須惠逺逰酒興正酣歸更懶坐看凉月上滄洲送宋文先輩夫子聲名二十年塵埃歎息欲華顛相如舊有凌雲賦靖節今無種秫田南國寂寥歸見鴈北風悲壮屢聞蝉思量世事真如幻合置窮愁頓酒邉萬安道中上下雞籠牛口灘灘頭濯濯雨聲寒氣蒸曉日雲無際波漾春風雪未乾落絮竝花浮逺水飛鷗隨鷺度驚湍扁舟稳泛滄浪逺珍重嚴陵一釣竿嘗約誼父同遊龍泉奔走失期故作是詩奉和原韻野寺幽幽隠翠嵐山川形埶盡束南吟隨野竹吾懐惬醉啜溪泉此意堪樂事難兼真可惜登高能賦亦曽諳遊從欲盡林間勝雨氣渾渾滿古潭送望之郎中提舉舒州靈仙觀江干逺别幾秋螢汴曲相逢眼更青余志自能同豹變弋人安得望鴻冥風流緑蟻千鍾酒香火黄庭一巻經秪恐諸公還薦鶚未容輕去老巖扃山林鶴瘦松枯不自禁窮愁千緒欲相侵山林誰識謝公意風月獨髙梁甫吟行視水㾗嗟不息靜㸔雲影愛無心懶隨塵土趨時態欲就絲桐丐古音暮雨暮雨忽隨江上舟寒風髣髴轉清秋興隨烟月成千首醉忤鶯花長四愁不繫可憐波上月忘機應喜海邉鷗一聲畫角吹魂夢散落淮天曉未收和張侍讀總翠亭城隅東北起危亭卧棟飛簷控地形萬井不藏平野緑一湖纔見逺山青春歸别圃低華幄雨歇寒蕪露翠屛日暮登臨望樓闕誤隨飛鳥下南溟㑹仙洞大松十里建旌旗曉日朝霞五色衣幽谷静聞猿一嘯白雲時見鶴雙飛花開洞府春長在人㑹瀛洲夜未歸家近武陵時入夢詩成更憶故人薇簡王大丞我㸔繁劇頻搔首君賦才名亦異常尚有閒襟尋水石更當佳句夢池塘松苖自合分高下鳬鶴天教有短長徐上青雲猶未晚可無音問及滄浪題醉心亭紅塵萬里困征鞍喜向幽亭一倚欄日夜水聲趨澗曲西南山色上雲端窗横古木秋容老檻逼蒼崖雨氣寒搜盡肺腸吟不就欲君親置畫圖㸔寄臧渾二月驅車出宋都轉頭即是十年餘可憐老大猶為客莫怪尋常不作書蠟屐阮孚人不㑹鱸魚張翰子何如寄聲莫汚青峯地留與先生作隠居至雄州寄諸弟并呈諸友馬頭今日過中都到得雄州更有書道路莫嗔音問少天寒沙漠鴈全疎和國信子育元韻雪餘稅馬立孱顔望盡南垂北際山一段黄雲凝不散野人說是瓦橋關二月已亥曉出成祀高禖淡雲斜日曉昏昏風物遲逥認故園竹葉宻藏林下寺桃花低映水邉村塵沙騎馬聼流溪淡薄春風却似秋坐憶洞庭波萬頃灘聲常在釣魚舟塵土㝠㝠二月風寥寥天外有歸鴻松隂想見芝山路隔浦溪花岸㟁紅景繁見和再用前韻馳寄魚飛鯨躍出波瀾獨立蓬萊縹緲間㑹有清詩寄蘆竹能無歸夢到溪山和執中及謝檢法三年不見洛陽花今日襄陽看轉嘉奔走簿書長似夢不知春已滿人家北風北望南淮雲更遮别離方覺路為賖深林青杏還争熟淺水紅蓮亦自花泊真州新河亭鬢毛垂雪欲毶毶道路風波老不堪繫䌫短亭聊自慰青山數㸃見江南蘆花風起蘆花散雪紛紛故着枯槎曉日曚曨照處十分認作梅花沙栁沙陀秖見塵土栁色如逢故人憶着千條萬葉金明馳道青春擬田園樂二首買田何須近郭作屋却要依山青松共我終始白鳥隨人往還山色依雲闇淡溪聲潄玉玲瓏孤笛醉吹明月扁舟卧釣秋風山村即事莫笑農家老酒尊豐年留客足雞豚山重水複疑無路栁暗花明又一村過虎北口雪餘天色更清明野店忽聞雞一聲地里山川從禹畫人情風俗近燕京漁陽父老常流涕燕頷将軍孰請纓容覆不分南與北方知聖徳與天平燕姬有女夭夭稱細娘真珠絡臂面塗黄南人見怪疑為瘴墨吏矜誇是佛装按西神脞說燕俗婦人有顔色者目為細娘面塗黄者謂為佛装巢燕初至一雙掠水燕来初萬㸃飛花社雨餘辛苦成來君莫破從來吾亦愛吾廬兩宋名賢小集卷一百十三
