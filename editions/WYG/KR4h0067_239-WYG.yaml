body:
  text: 兩宋名賢小集巻二百三十九宋陳思編元陳世隆補孝詩林同字子真號空齋處士福清人以世澤授官棄不仕元兵至福州監丞劉仝子糾義兵即其家置忠義局敵至同死之有孝詩一巻堯道之大原出扵天堯以是道傳之舜堯舜之道孝悌而已矣道原自天出堯以是相傳曰孝悌而已人人具此天舜大孝終身慕父母予扵大舜見之矣孩提知所愛妻子具而衰大孝終身慕予於舜見之禹禹傷先人之功而不成勞身焦思八年於外啓呱呱而泣予弗子惟荒度土功傷心九載績焦思八年中啟亦呱呱泣惟荒度土功湯葛伯不祀湯使亳衆往為之耕奉先思孝奉先思孝也不祀豈其情以至使亳衆而甘為葛耕文王朝於王季日三雞初鳴至寢門外問安否何如日中至及暮又至亦如之問安寢門外旦旦俟鷄鳴以至日中昃居常盡此誠武王文王有疾不脫冠帶而養文王再飯亦再飯疾間曰女何夢夢帝與九齡經言事父母所以事天明疾間加再飯夢中與九齡周公我之弗辟我無以告我先王辟馬鄭音避謂避居東都又東山周公東征我避故云辟東征是謂征先王猶可告豈為伐而行孔子子曰所求子以事父未能也事親良不易戰戰復兢兢學得如夫子猶言丘未能顔子謂子路曰去國則哭於墓而後行返其國不哭展墓而入返必展墓入去當哭墓行誰知顔氏子事死乃如生孟子初被慈母三遷之教長師孔子之孫子思如何年稍長汲汲子思師知是為兒日三遷感母慈右大聖大賢之孝十首契契以司徒教以人倫父子有親天性生雖具人倫教可無往哉親父子汝契作司徒元凱左傳季文子曰孝敬忠信為吉徳髙陽髙辛氏有才子謂之八元八凱當知元與凱不出孝而忠能舉十六相斯為舜大功孝已武丁之子莊子云人莫不欲其子之孝孝已憂而曾參悲子則欲其孝人皆有是心如何武丁聖却使子憂深微子微子之命曰爾惟恪慎克孝微子去之子曰殷有三仁焉豈計身封宋祇愁祀絶殷不惟稱克孝亦自首三仁泰伯季歴有聖子知太王欲立之逃奔子貢曰泰伯端委治呉仲雍斷髪文身為憐季有子逆探父傳賢斷髪文身事誣哉司馬遷康叔元惡大憝矧惟不孝不友子弗秖服厥父事大傷厥考心乃其刑兹無赦勿云服父事不敬亦無傷元惡與大憝邦刑自有常君陳惟爾令徳孝恭惟孝友于兄弟克施有政命汝尹兹東都敬哉為爾有令徳存心孝且恭推之施有政往矣尹兹東伯奇尹吉甫子履霜操云無衣兮兒寒無食兮兒飢兒罪兮當笞逐兒兮奚為無食又無衣逐兒安所之不辭履霜苦猶謂罪當笞晉文侯平王錫文侯秬鬯圭瓚曰汝克昭乃顯祖追孝于前文人若汝予嘉嘉汝故錫汝非將王展親克昭乃顯祖追孝爾文人衛武公年九十猶日警於國曰必朝夕以交戒我又孝子之身終孝子身終者非終父母身武公年九十戒我尚諄諄齊孝公伐魯展喜犒師曰豈其嗣世而棄命若先君何君必不然齊侯乃還豈其伐與國獨不念先君想得還師去難堪此語聞齊頃公晉侯欲質其母對曰若以匹敵則亦晉君之母也又漢太公事我母亦君母吾翁即若翁分羮何太忍請質可堪從申生姬泣曰賦由太子人謂太子子辭姬必有罪曰君老我又不樂乃縊死姬泣賊由子子辭必罪姬為憂君不樂寧死莫君知晉文公寺人披伐蒲公曰君父之命不校校者我讐也踰垣而走披斬其袪伐蒲君父命校者是吾讐披直寺人耳鉏霓信有謀秦康公晉文公甥渭陽詩云我見舅氏如母存焉又曰我送舅氏悠悠我思懐哉送舅氏曰至渭之陽念母如存意悠悠寄二章既醉君子孝子不匱永錫爾類其類維何室家之壼釐爾女士從以孫子若為錫爾類不獨善其身既念化家室還思遺子孫四牡使臣有功見知則說矣四牡騑騑豈不懐歸王事靡盬不遑將父懐歸將父母四牡苦騑騑是我心中事君從何亊知南陔孝子南陔孝子相戒以養也晉束晳補亡為養還相戒南陔昔有詩都盧這箇意焉用補亡為白華孝子白華孝子之潔白者也㢘恥有微缺須知孝未純白華何所似所似皎然身北山大夫役使不均已勞於王亊不得養其父母焉王事靡盬憂我父母非止不得養如憂父母何忍能不我念使我獨賢勞蓼莪孝子民人勞苦不得終養哀哀父母生我劬勞欲報之徳昊天㒺極莫遂終養志難酬㒺極恩哀哀父母句腸斷不堪聞妹土小子其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母勤耕藝黍稷逺賈服車牛奔走何為者心乎孝養憂老萊子年已七十父母猶存著斑斕之衣為嬰兒戲于親前七十已中壽人生似此稀絶憐老萊子猶自作兒嬉栁下惠三為魯士師曰何必去父母之邦忍於父母國去此欲何之所以栁下恵三為魯士師子思孔子喟然而歎請曰意子孫將忝祖乎伋每以不克負荷為大恐子忻然如何方喟歎乃爾復忻然念汝祖無忝知予道可傳閔子子曰孝哉閔子騫人不間於其父母昆弟之言又曾子母投杼事參寧殺人者三至尚踰垣歎息子閔子孝哉無間言有子其為人也孝悌而好作亂者未之有也凉州易亂課人誦孝經葢勲謂取怨其為人也孝好亂未之聞曾以是取怨無人語葢勲曾子有疾召門弟子曰啟予足啓予手而今而後吾知免夫小子全歸有明訓珍重恐傷膚小子啓手足吾今知免夫子路見孔子曰今由也累茵而坐列鼎而食願欲食藜藿為親負米不可得矣食藜殊列鼎負米異重茵不待今朝養傷哉昔日貧子㳺問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎犬馬何以别斯言似太深深言為飬者可不敬於心子夏既除喪而見孔子與之琴彈之而不成聲作而曰哀未㤀也為有心中事琴音自不和禮雖弗敢過哀若未㤀何子貢曰賜也願息於事親又曰大哉死乎君子息乎又大塊息我以死未須論大塊以死息乎人所願學賜也始惟息事親林放問禮之本子曰禮與其奢也寜儉喪與其易也寧戚故寧戚以儉㒺為易而奢致得千載下人稱問禮家樊遲問辨惑子曰一朝之忿忘其身以及其親非惑與當知一朝忿必不忍於人豈止身㤀却還應及乃親闕黨弟子闕黨之子弟㒺不分均有親者取多孝悌以化之也既漸夫子教㒺不有分均何復間多取齊言彼有親樂正子春侍親疾復加一飯則脫然疾愈復損一飯則脫然疾愈向非親在念念念每精專未必飯加損能令疾脫然公明宣學於曾子曰宣見夫子之親在叱咤不至犬馬宣說之學而未能也子於親在日叱咤不聞聲既曰見而說應無學未能孔子黨人孔子曰吾黨之直者子為父隠直在其中矣忍以證羊故而云我直躬那知為父隠直故在其中孟莊子孟莊子之孝其不改父之臣與父之政是難能也無改父之道直堪以孝稱若論莊子孝此真是難能孟懿子問孝子曰無違樊遲御子告曰生事之以禮死𦵏之以禮祭之以禮不復問無違祗應懿子知尚愁人不省以禮告樊遲孟武伯問孝子曰父母惟其疾之憂父母之愛子心乎惟疾憂可能不自愛而忍使親愁管仲曰吾嘗三戰三走鮑叔不以我為怯知吾有老母也戰敗不羞走誰為知我深叔知我有母亮我走時心晏子曰使吾父之黨無不樂生者使吾母之黨無不足衣食者母家合足食父族使安生睦黨可為孝能之為晏嬰晉君子民從征役不得養其父母父母何怙父母何嘗悠悠蒼天曷其有常何怙復何嘗銜悲問彼蒼蒼蒼不可問重使我心傷潁考叔留羮感鄭莊公母子如初見左傳茅焦諫始皇即虚左迎母見史記茅焦甘伏質考叔請留羮大隧如初樂咸陽虚左迎魏孝子役於大國陟彼屺兮瞻望母兮狄仁傑登山望雲曰吾親舍其下念母嗟陟屺思親徒望雲可憐魏孝子不比狄參軍衛七子凱風美七子能盡孝道以慰母心小弁小人之詩也何以言之曰怨㡬諫勞不怨明明載魯論未應小弁作得並凱風言石祁子石駘仲卒卜所以為後者曰沐浴佩玉則兆不沐浴佩玉石祁子兆執親之喪者可沐浴其身不待石祁兆知非佩玉人文氏子既除喪而越人弔待廟垂涕洟子㳺曰其庶㡬乎亡於禮者之禮也服除有弔者待廟至垂洟亡於禮之禮斯人其庶幾公叔戍請父諡於君君曰夫子不亦貞惠文乎故謂夫子貞惠文子若把夫子論無慚貞惠文不應其子戍至自請於君靈輒翳桑饑者趙宣子食之捨其半云欲遺母宣子使盡之而别具食與其母翳桑一餓者念念母之存賴有趙宣子能為别具飱葉公諸梁后臧從其母于呉不待而歸葉公終不正視隨母適異國先歸汝忍能致人不正視應是得人憎伍尚楚將殺其父奢慮二子為患曰以免其父召之彼仁必來尚歸死員奔呉此以父免召彼如仁必來員乎竟何益尚也最堪哀賈獲陳大夫鄭師入陳獲載其母妻奔逢陳侯下而授公車與妻扶母奔亦免扶母猶可免棄君安所之可能共載母忍不受君綏周紹趙王謂曰人有言子者曰父之孝子君之忠臣故寡人欲子之傅王子欲得忠臣者求之孝子門如何傳王子尚復待人言王孫賈母曰汝朝出晚歸則吾倚門而望今王走汝尚何歸賈募人殺淖齒為齊臣子者此日若無聞獨有王孫賈能知慰倚門扶蘇趙髙詐為書賜扶蘇死蒙恬疑之欲復請扶蘇曰父而賜子死尚安復請父賜子以死君侯安所疑忍哉指鹿相無復祖龍知丁蘭至孝刻木為母像事之如生蘭婦誤燒木母面應時髪落如割一靈長皎皎如月不離天要以純誠感非關刻像然韓伯瑜母杖不痛哀母力弱對母悲泣梁彦先使焦通觀其像通感悟盡孝母力今衰矣悲啼得杖輕流風存繪畵猶足感焦生酈竒與吕禄善周勃劫其父商使寄紿禄出游勃乃得入北軍直以劫父故䝉他賣友名閒將誅吕論非勃亦非平賈誼治安䇿曰借父耰鋤慮有徳色母取箕箒立而誶語誶言取箕箒徳色借耰鋤不是賈年少還能痛哭無馮唐以孝著為郎中署長文帝輦過問唐曰父老何自為郎知以孝行著還應不問唐可憐止輦問何自得為郎韋孟楚元王傳及王戊滛亂孟去位徙鄒作詩諷諫又曰既去禰祖惟懐惟顧去王猶諷諫懐祖重情傷誰識有韋孟人惟說穆王田叔景帝令按梁亊還曰有之無以梁事為問也太后食不甘味此憂在陛下勿以梁事問將遺太后憂若非叔長者誰為帝忠謀石建建為郎中令已老白首每歸洗沐即竊取父奮中裠親自浣滌不令父知服勞曽是孝那更委諸人建已老白首中帬滌必親董仲舒令州郡舉孝㢘自仲舒發之後為江都相漢有孝㢘舉誰知發自舒可憐三䇿罷却去相江都司馬遷父疾執手泣曰毋㤀吾所論著卒三嵗遷為太史著石室金匱之書悲哉執手泣論著謹毋㤀豈識遷他日能於石室藏嚴君平賣卜成都市與人子言必依於孝賣卜有深意何必避市喧若逢人子問依孝與之言霍去病縣吏仲儒私生以驃騎擊匈奴過平陽拜仲儒曰不知為大人遺體不蚤知此體元來托大人低頭拜縣吏誰擬霍將軍雋不疑為京兆尹每錄囚毋問多有平反即為喜笑故不疑嚴而不殘不疑固嚴吏如不順親何圖得母喜笑平反敢不多杜延年父周為御史大夫延年居父官府不敢當舊位坐卧皆易其處怪來御史府坐榻不如初曾是父坐處而為子敢居疏受廣之兄子廣謂受曰知足不辱豈如父子歸老故鄉乎受曰從大人議豈如吾父子歸老故鄉身一聽知足誨欣然從大人王陽為益州刺史行部至九折阪歎曰奉先人遺體奈何數乘此險遂以病去禮經稱孝子不服闇登危所以九折阪回車不敢馳貢禹上疏曰誖逆者貴於官故俗皆曰何以孝弟為今宜貴孝悌則天下自治安用孝與弟今人誖得官一聞陽在位自是合彈冠王式曰臣以詩朝夕授王至於忠臣孝子之篇未嘗不流涕反復為王陳誦也三百五篇内凡言忠孝人未嘗不流涕反復為王陳韋𤣥成兄𢎞前坐罪𤣥成當襲封知非父賢意乃佯狂後選為淮陽憲王傅淮陽誰可傳無以易𤣥成即汝佯狂意為王言事兄楚孝王詔曰王孝順仁慈之國以來二十餘年纖芥之過未嘗聞朕甚嘉之一自王之國于今二十年了無纖芥過都是孝慈然原涉廬墓三年大治冢舍表曰南陽阡人謂之原氏阡所當約于巳豈忍儉于先道立南陽表人呼原氏阡薛脩為臨菑令兄宣為丞相迎母脩留不遣邑令直微耳爭如相國榮可憐留母養不忍聽兄迎陰子方至孝臘月晨炊而竈神形見子方再拜受慶因祀以黄羊由是暴富祀灶令人富相傳陰子方安知由至孝非在薦黄羊揚子不可得而久者父母之謂也是故孝子愛日不可得而久其惟父母乎諄諄愛日語揚氏豈欺吾東海王彊母郭后廢彊戚戚不自安願備藩國贊曰遜而知廢為呉太伯史以太伯比斯評恐未真我知東海意不忍母他人鄧禹亊母至孝雲臺功臣之次立為第一功臣三十一劍佩靄雲臺第一人知否曾聞孝母來竇融少孤事母孝與隗囂書云為忠甚易璽書賜融謂欲三分鼎足宜以時定璽書來萬里鼎足許三分解道為忠易誰知以孝聞馬援戒子曰欲汝曹聞人過失如聞父母之名耳可得而聞口不可得而言也惡言出於口必至反其聲小子聞人過當如聞父名樊宏父重遺令所假貸民間數百萬悉焚削文􅆻債家聞而慚爭償之宏不受能捐數百萬不聽債家償要自父一語銘心不敢㤀耿國國當嗣父封上疏以父况愛少子霸因自陳讓封侯誰不願顧我獨何心為憶父所愛偏於少子深張湛望縣門步進曰父母之邦所宜盡禮或議其詐笑曰人皆詐惡我獨詐善下車父母國自重豈其輕謂我詐為善何憂被此名馮豹後母屢行毒害敬事愈謹疾之愈深每奏事伏省閣帝使黄門持被覆之中人持被覆尚得帝恩深子職竟何是終求慰母心孔奮奉母極求珍膳躬率妻子同甘菜茹為時人所笑以身處脂膏不能自潤甘同妻菜茹極奉母珍羞一任時人笑脂膏不自謀伏湛父理為當世名儒别自名學湛性孝友少傳父業教授數百人向來父學顯别自以家名不是能傳業如何著孝名鄭敬郅惲謂曰子將為伊吕乎巢許乎敬曰幸得奉墳墓雖不從政是亦為政㡬曽慕巢許非是薄伊周何忍的的去先人有墓丘古初郅惲為長沙太守長沙有孝子古初惲即以為首舉長沙有孝子姓字死猶香料得郡舉首他無人敢當江革負母逃難數為盜刼去輒求哀得免後歸鄉里每自為母輓車時稱巨孝挽車極勞苦逃賊最間闗太息江巨孝能為人所難蔡順拾葚黑者奉母母思順心動棄薪還伏母棺火越他舍母畏震雷輒還墓賊疑拾葚異母怪棄薪還雷震輒還冢火飛因入棺姜詩妻汲供母後時遣去遺母珍羞復還兒溺答母㳺學忽泉湧躍鯉供母膳日常供鯉鱠旦輒汲江流兒溺言㳺學妻還感珍羞郭巨恐母減食與其子欲埋之掘坑得金一釜上云天賜孝子郭巨官不得取為養寧埋子那知地有金如何有天賜且復怕官侵班固著幽通賦曰懿前哲之純淑兮咨孤矇之渺渺兮又作叙傳述班氏之先前烈知純淑孤踪愧渺矇果能筆敘傳不枉賦幽通劉平負母逃難恐弟絶類抱弟女棄巳子鄧伯道負弟子避賊縳其子於樹上弟類那容絶吾雛聽自生劉平端為母伯道特沽名郭基為京兆督郵班固薦於東平王蒼謂基孝行著于州里蒼納之豈伊東閣裏無似督郵賢直把孝行薦今人少孟堅㢘范年十五與客自蜀步負父喪歸京兆後為蜀守民歌曰平生無襦今五袴親喪徒步負萬里歴岷峨何事今人說惟知襦袴歌鄧彪少修孝行讓國于異母弟鳯顯宗高其節許焉又曹子建詩讓國異母弟如彪正自奇今人有同産煮豆且燃萁張歆歆守皋長有執父仇賊歆破械縱之遂棄官亡命范􅁮謂其報仇逃亡去官因脫囚為感戴天仇史氏乃失實却云逃執仇清河王慶上書曰乞以臣骸骨下從貴人於樊濯庶母子魂靈有所倚依乞以臣骸骨下從樊濯原生雖闕親養沒擬報私恩魯恭性至孝與母及弟丕俱居太學習魯詩為諸儒所稱學士多歸之可能來太學即得譽諸儒豈以習詩苦應云與母俱黄香亊父竭力致養暑則扇枕寒則以身温席京師號曰天下無雙江夏黄香冬月常温席炎天每扇牀如何漢天下只有一黄香樂恢父親為令所收恢年十一俯伏縣門晝夜號泣令矜之為出其父父今為令繫號泣不停聲彼令亦人耳而寧不我矜仲長統著論曰倘親有兼珍之膳豈羡夫入帝王之門以揚名立身哉羨入帝王門揚名與立身何如養親膳每日得兼珍薛苞父娶後妻憎苞出之苞號泣廬於舍外旦入洒埽嵗餘父母慚而還之所懼子不孝何愁父失慈涕流分出日天定感還時張霸年數嵗知孝讓舉動自然合禮人訝其小能如此曰我饒為之故字伯饒幼也知孝讓居然合禮儀休疑汝尚小須信我饒為竇章蓬户蔬食躬勤孝養講誦不輟時稱東觀為蓬萊山鄧康薦章為校書郎蔬食可堪貧勤哉孝養親蓬萊知不逺應是著斯人蘇不韋父謙為李暠掠死不韋掘暠父冢時譏其讐枯骨郭泰為優於伍員要使生者毒休譏枯骨讐看他郭泰論此似伍員優郭林宗性至孝范滂稱之曰隠不違親貞不絶俗天子不得臣諸侯不得友不願諸侯友那容天子臣貞乎寧絶俗隠也不違親蔡邕性至孝母嘗滯病三年邕自非寒暑變節未解襟帶者自非易寒暑未始解衣襟不謂母疾久三年惟一心楊震種藍養母諸生有助其種者輒拔去鄉里稱孝又不受金以畏四知尚自畏四知於親豈忍欺種藍有助者拔去不妨奇姜肱肱與弟俱為賊所刼將烹之肱曰季江父母所憐請殺巳季江復願代兄鼎鑊皆知避何心願代烹恐傷父母意不獨弟兄情陳元方事親至孝豫州刺史以孝聞天子為之圖像百城以厲風俗如何百城内一一畫元方勸孝賢刺史觀風職所當茅容字季偉郭林宗見其殺雞意謂為已設既乃獨奉母自以飯蔬與林宗食雞乃為母設蔬惟與客同賢哉茅季偉誤矣郭林宗范滂遭黨禍恐母流離不忍逃曰滂從父黄泉顧子曰欲汝為善則我不為惡寧將身塞禍不忍母流離我自不為惡黄泉今有辭鮑永亊後母至孝妻嘗母前叱狗永即去其妻禮經條七出叱狗不言焉一旦鮑妻去那知在母前仇覽為蒲亭長化陳元為孝子民歌曰父母何在在我庭化我鴟梟哺所生蒲亭一長耳何許得歌聲化為鴟梟類而今哺所生趙咨有孝行盜甞夜刼之咨恐母驚乃先至門迎謝盜慚奔賊來那可邇而敢以身迎身豈不知愛心乎恐母驚鄭康成家貧假田播殖以為親養時稱為純儒齊魯間宗之播殖為親養家貧至假田焉知後學者盡喚作儒先李曇養親樂道終身不仕名與徐孺子等海内列名五處士焉養親還樂道不仕至終身海内稱髙士非專鄉里人徐季登南州髙士徐孺子之子篤行孝弟服闋隠居不仕南州徐髙士姓字滿東都有子篤孝行終喪意隠居周燮有先人草廬結於東岡燮守之曰我不能追綺季處巢穴屢徵不起未能追綺季且復守東岡為有先廬在他山忍遁藏王修七嵗母以社日亡來嵗隣里社修感念母哀甚鄉里為之罷社去年今社日撫事倍酸辛罷社為兒泣鄉鄰定幾人徐庶辭先主曰老母見獲方寸亂矣王陵母曰為語陵毋以老妾故持二心不勝方寸亂豈暇二心持忠矣王陵將賢哉徐庶辭孟宗母冬月思笋宗入竹林哀泣筍為之生萬象死灰色千林號怒聲何人苦哀泣凍竹強抽萌顧悌仕吳為偏將軍每讀父書跪讀之每句應諾又孝子聴於無聲地逺隔親面惟憑一紙書句終輒應諾直是聽於無陸績六嵗見袁術懐橘墮地術曰陸郎作賓客而懐橘乎曰欲歸遺母術奇之陸郎作賓客懐橘欲何為遺母當然亊袁公乃爾奇李密祖母劉年九十六謂報劉之日短又言為人子者願為人兄事親之日長事親苦日短為子願為兄懇懇報劉語令人涕泗横和嶠王戎居䘮飲酒哀毁特甚嶠禮法自持不能踰戎劉毅謂嶠生孝戎死孝要以禮法論休言哀毁同但觀生和嶠定勝死王戎王裒讀書至蓼莪篇輒流涕門人為廢此篇廬墓悲號著柏樹樹為之枯悲哉生我句奈此念親何墓側有枯樹詩中無蓼莪荀何晉何曾荀顗俱有孝行傅𤣥稱之曰古稱曾閔今有荀何古稱有曾閔今復見荀何為孝一而已能行無甚髙王祥母冬月欲生魚祥解衣將剖氷雙魚躍出母命守丹李每風雨輒抱樹泣風李應難守冬魚未易求剖氷不辭凍抱樹不勝愁祖納性至孝少孤嘗自炊爨以養母視膳子之職何須自執炊閒將心比並合是手成持丁儀子陳壽覔千斛米為儀作傳子不與米朱文畧大遺魏收金請為父傳尚自不與米何堪大遺金丁儀為有子文略是誣親范宣十嵗嘗以刀傷手捧手改容人問痛耶曰受全之體而致毁傷不可處耳手直微傷耳如何忽改容不能全所受此痛政無窮戴逵子戴顒與兄勃並受琴於父逵父卒不忍奏與兄各造新弄并行於世戴琴妙一世二子得其聲不忍遺音奏各將新弄行趙至兒時從師受業聞父叱牛聲投書泣曰我小未能榮養使老父不免勤苦莫致兒榮養翻令父苦耕可憐癈書泣不忍叱牛聲陶侃每飲酒嘗歡有餘而限已竭佐吏等勸少進侃曰亡親曾見約故不敢踰陶公晏參佐限極每歡餘憶與亡親約淒然不敢踰桓冲小字買得郎母病須羊以解以身質羊後為江州刺史不辭身作質只為母須羊此日江州牧當年買得郎盛彦母失明婢伺彦出以蠐螬炙貽母彦抱母慟哭絶而復蘇母目豁即開既知為異物號泣絶還生未有蠐螬炙翻令母目明王延後母令冬月求魚不得杖之流血延叩氷哭有魚躍出母悟撫之如巳子酷矣杖流血奇哉魚躍氷能令母心悟不異已親生褚徳逸庾衮字叔褒鄰人褚徳逸善事其親至老而不倦衮見每拜之至老能無倦真為善事親叔褒非佞者何事拜鄰人王恱導之子有髙名事親色養諸子莫及導見之輒有喜色色養傾餘子高名重一時足為丞相喜豈計外人知許孜有孝行鴈雉棲其梁鹿虎擾其庭交頸同逰不相搏噬所居號孝順里能感猛鷙類都無搏噬心同逰至鹿虎共宿有鳩鷹卞壼壼拒蘇峻戰死二子昣旴相隨赴賊翟湯歎曰忠孝之道萃於一門父雖得死所兒豈得生存忠孝古難得於今萃一門皇甫諡遺令平生之物皆無自随惟齎孝經一巻馮亮遺戒手執孝經盡棄平生物惟齎一孝經死猶不㤀孝臨没苦丁寧郭原平以耕者於父母墓前裸袒為慢及貴買此田束帶垂泣躬自耕鑿忍向父母墓前頭裸袒耕農時每束帶猶自泣原平二王王銓學業不及弟錫而孝行齊焉時人稱為金昆玉友要以孝行舉寧將學業論錫無慙玉友銓可謂金昆樂頤之嘗病與母隔壁忍痛不為呻吟之聲齒被至碎恐母之哀巳也痛殊未易忍絶不一呻吟豈復知身疾惟愁戚母心何子平以俸米易粟麥曰尊老在東何心猶享白粲珍肴不可寄母則不受干祿本為養資身豈所安珍肴與白粲雖美若為餐解叔謙母病有老父遺丁公藤因失所在有童子持蚺蛇膽授顔含忽不見膽醫顔母疾藤療解親風忽不見童子俄然失老公王秀之遺令世人以僕妾直靈助哭當由喪主不能純至欲以多聲相亂耳一事真堪笑令人妾直靈都縁無至性徒欲亂多聲謝㬭年數嵗所生母微賤得疾畏驚一家尊卑感㬭至性咸為納屨行屏氣語一家感兒孝不欲使親驚盡作屏氣語咸為納屨行謝朏朏莊之子超宗鳯之子明帝嘗敇二人自鳯莊門入超宗趨往朏不肯入直以父名戲其為君命同朏能禮自守似是勝超宗古成詵以風教自任時韋髙慕阮籍為人居喪飲酒詵泣曰吾當手刃之禮豈為吾設如傷風教何不堪希阮籍直欲刃韋髙華寳八嵗晉末父戍長安謂曰須我還為汝冠後長安陷寶年至七十不昏冠憶父去時語爾來七十秋終焉不忍冠洒淚望秦州宗元卿祖母病元卿在逺輒心痛大病則大痛小病則小痛異哉宗子孝親疾逺闗心每念痛大小因知疾淺深劉苞事嫡母朱氏及所生母陳氏並扇席温枕扇席更温枕古人誰與同一心奉二母自是勝黄童劉靈哲母病夢神與藥驚覺得於枕間宋瓊母秋季思𤓰瓊夢見求之遂獲誰言夢想裏所見總空花靈哲枕間藥宋瓊秋季𤓰劉巘號正簡先生齊髙帝召問政道答曰政在孝經先生天下士偶迫詔書行勿謂無奇對惟言在孝經王僧孺五嵗初讀孝經謂授者曰我願常讀之孝經雖始教何但習於初欲得如兒願常常誦此書江泌痛不逮養親以菜心有生意不忍食所食惟老菜菜心且不食親意一何深為爾有生意存我不忍心庾道愍少失所生母尋至交州入一村中見一嫗負薪心動訪之乃其母也交州一村裏有嫗負薪行萬里庾道愍心知為所生張冲父遺命祭我必以鄉土所出後牧青冀常還呉國取果菜流涕薦焉未嘗無果菜何至取吳中祭我必土産遺言敢不共顧歡有孝行人有病者歡令取孝經着病人枕邊果愈枕邊何所有一巻仲尼居無處覓盧扁應當寶此書江淹採薪養母於樵所得貂蟬將鬻以供養母曰此汝休徴留之後果為侍中賣薪圖養母何許得貂蟬知在採薪處庸非吉兆然庾黔婁父在家病黔婁心驚即棄官歸醫云嘗糞可知美劇每取糞嘗之驚心巳云異嘗糞不妨難庾令何為者慿君着眼看庾域母好鶴唳域營求不怠忽雙鶴來下戴良自據地作驢鳴以娛母惜哉戴良誕賢矣庾域誠真能感鶴唳何至學驢鳴任昉父遥性重㯽榔昉終身不嘗曾晳嗜羊棗而曾子不忍食晳常嗜羊枣遥亦重㯽榔參至不忍食昉寧能獨嘗陸襄釋服猶若居憂終身蔬食布衣五十年又楊惲云送終有時而既憂居五十載陸子最堪悲惲獨非人子而云有既時褚翔有至行母病祈禱中夜聞空中彈指聲及旦疾愈謹母昧方寸是處有神明夜半為親禱空中彈指聲徐孝克每侍宴無所食噉帝後察其欲遺母敕自今孝克前饌並許將還自今所賜饌特敕許將還為爾心向母君前無所餐阮孝緒母病須生人參孝緒躬歴幽險累日忽見一鹿隨之至鹿滅處得參覓参不可得忽感鹿前行行到鹿滅處元來此地生袁君正數載父昻疾晝夜侍奉家人勸令暫臥居正曰官既未差眠亦不安家人勸我眠共説不眠難官既未得差眠時自不安皇侃性至孝日限誦孝經二十篇以擬觀世音經儒釋本同途遺經非爾殊未應普門品勝似仲尼居吉翂丹陽尹以其求代父命欲舉以純孝翂曰何待翂之薄因父買名一何其辱父身如何代子死乃其情尹待我何薄而將此買名吳明徹父未𦵏勤力耕種天旱苗枯明徹之田中仰天號訴苗更生秋大熟苗枯親未葬號泣日于田誰謂竟不雨而能獨有年徐份父陵疾篤份焚香涕跪誦孝經晝夜不息如是三日父疾豁然而愈父疾雖云篤如何豁爾平孝經惟泣誦晝夜不停聲雷紹少習騎射後辭母京師從學嘗讀書至人行莫大於孝感嘆還鄉里侍養行莫大於孝其如違養何只消一句字安用讀書多楊愔㓜喪母其舅源子恭與飲問誦詩曰誦至渭陽未愔便號泣渭陽曽讀未對飲偶言詩舅作此詩語兒那能不悲趙琰以國禁積四十年不得越闗葬二親於舊兆自痛恨惟食麥至絶鹽味禮稱親未葬喪服不除焉食麥㫁鹽味悲哉四十年㓂祖訓父母雖久亡猶於所處設幃帳嚴奉如平生曹孟徳銅雀遺令必如冦祖訓如不死其親孟徳空遺令丕乎真罪人王崇以孝稱風雹至崇田畔便止禾麥並無損落及越崇田風雹如初風雹忽止處禾麥獨依然料得天公意知為孝子田房景伯為清河守召不孝者觀己事母其人愧求去不許曰雖顔慙心未改親見房太守殷勤奉旨甘那能不心愧豈止是顔慙元子華母夜飲還大吐人謂中毒子華掬吐盡噉之母心乃安未必食有毒人言疑似間不辭噉母吐圖得母心寛劉獻之誨學者曰百行殊途要以孝為首倘不能然雖下帷躡屩竟何益乎百行孝為首諸人倘未知下帷空自苦躡屩竟何辭崔道固母賤諸兄逼其母持炙致賔前道固驚接謂客曰老親自執劬勞是誰迫我母持炙致諸賔驚起自接取云賔此老親于仲文九嵗周太祖問曰聞兒好讀書書有何事對曰資父事君忠孝而巳讀書無見處與不讀書同勿謂兒年小能知孝與忠李賢從師學或譏其業不進答曰豈能領徒授業至如忠孝之道實銘於心誰知學進處不在好為師好把銘心底分明説與伊李崇以父勲封侯泣下曰無勲於國㓜小封侯當報主恩恐不能終于孝養候封何爾泣兒㓜乃無勲恐莫終親養應將報主恩李自謙少孤未嘗飲酒食肉絶口殺害之言陸襄親沒終身不敢言殺害殺生非孝也人未必云然絶口殺害語君看自小年文中子汾水之曲有先人之敝廬在有田可以具饘粥彈琴著書不願仕也先人舊所理汾曲有田廬何意求聞逹彈琴自著書房𤣥齡以孝稱父彦謙謂曰人皆因禄冨我獨以官貧所遺子孫惟清白耳人皆因禄冨我獨以官貧佩父清白訓為唐第一人陳叔逹御前賜葡萄不食曰臣母病渴願欲以遺母帝喟然曰卿有母遺乎葡萄歸遺母所嗜固應思卿乃有母遺誰知此語悲韋陸韋承慶被後母笞弟嗣立解衣求代陸景融見兄蒙先被杖輒自楚悟母不悟以身諫惟恐失母慈景融常自楚嗣立每求笞狄仁傑求代鄭崇質使絶域以鄭母老疾宗元願以柳易播曰夢得親在堂狄請使絶域柳甘易播州為憐劉母在深恐鄭親憂崔元暐至孝母戒以從官有人來云貧乏是好消息冨足是惡消息若為從官好不異在家貧忍以惡消息而令戚我親李迥秀母氏庶賤妻崔氏嘗詈媵婢母聞之不樂迥秀即出其妻生我者為母無縁貴賤分不思罵婢語何可使親聞韋虚心父維為郎時蒔柳于庭及虛心居郎省對之輒斂容父居郎省日蒔柳向庭中對柳如對父那能不斂容歐陽道居喪詔奪哀每入朝徒跣及門夜直席藁以寢還家輒號慟夜直藉藁寢入朝徒跣行誰知迫明詔可惜欠陳情劉禕之相王府相帝謂曰卿家忠孝朕子賴以師矩兾蓬在麻不扶自直卿家著忠孝朕子賴師模蓬在麻中直多應不待扶韋景駿有母子相訟者景駿曰余少不天嘗自痛極爾幸有親而忘孝耶嘗抱㒺極痛嗟余少不天汝今幸有母不省汝何然張九齡至孝居父喪哀毁庭中木連理居母喪尤不勝哀有紫芝生坐側連理庭中木業生坐側芝未嘗聞孝感一一有兹奇顔真卿以孝稱禄山反獨真卿城守帝曰朕不識真卿何如人所為乃若此秖是見忠節何曾省孝誠唐宗休歎息猶未識真卿韓思復封長山縣伯明皇親題其墓曰有唐忠孝韓長山墓向來曹孟徳曾擬表征西那得忠孝字金書作墓題崔縱以母事其父嬖妾妾剛酷雖縱顯官而數笞詬縱率妻子承候顔色不懈直以母事妾衹云父所安可憐遭楚毒加意更承顔崔沔母亡受弔廬前賔客不至柩室曰平生非至親不入謁豈以存亡廢禮憶昨升堂拜何曾有雜賔事亡忍廢禮不復問疎親李乂兄弟孝謹至甚又俱以文章自名兄弟共為一編號李氏華萼集俱以文章顯無慙孝謹稱弟兄同一集華萼著嘉名裴子餘諡曰孝張説歎曰此諡可無愧矣直以孝為諡真無愧此心可憐張説歎知得子餘深李勉江西觀察使部人有為父病厭蠱者書勉姓名埋之勉曰是孝子也不誅不誅人厭己而恕子祈親賢哉李觀察今無復此人陽城語諸生曰學者所以學為忠孝諸生有不歸省者乎明日請歸者二十人學者學為孝諸生欠講名謁歸二十輩毋乃為陽城段秀實號孝童朱泚為逆以秀實失兵心恨憤遣騎迎秀實奪笏擊泚以死意其失兵久怏怏必吾從奪笏直前擊那知是孝童李晟少孤事母孝後平朱泚復京師贊曰身佩安危箇是一孤兒曾聞事母時身能幾許大却佩國安危元徳秀字紫芝家貧舉進士不忍去母左右自負母入京師進士能毋舉偏親可忍離紫芝亦良苦負母入京師穆寧戒子曰孝子事親養志為大我志直道而己苟枉道三牲五鼎非吾樂也倘非親所樂至枉道而行雖以三牲養難辭不孝名侯程廬墓哭泣無節侯知道七年程俱羅三年不止李華作二孝贊三年天下共何爾獨終身無處着深痛何心求過人李唐見肅宗抱㓜女謂唐曰吾念之卿勿怪也唐曰上皇思見陛下計亦如此吾念卿毋怪難􅍆膝下兒好將南内意説與肅宗知韓滉當列㦸以不欲壊父時門第而止不許增堂廡曰先君容焉我奉之而己謹勿第門壊那容堂廡增父猶足乎此我顧莫之承賈直言父道冲坐事賜鴆直言紿取鴆代飲迷而踣明日毒潰足出久乃蘇幾曾聞飲鴆有不隕其身那得獨全活天應知代親李景讓蔣伸酌酒曰有孝於家忠于國者飲此景讓起卒爵伸曰無宜于公既爾家能孝還于國盡忠誰宜舉斯爵知是莫如公韓愈答元稹書甄逢能顯其父俱當得書董生行云刺史不能薦天子不聞名未有人之孝而公不用情大書甄濟傳更作董生行柳宗元書先友于父碑隂皆當世聞人中説載隋唐名臣或云福疇所集乃翁定奇士先友盡斯人疇所知己故儀曹意轉新甄逢以父濟名不在國史欲詣京師自言元稹為移書韓愈又袁滋表贈濟官史書良為稹褒詔知因袁足使濟不朽何堪逢之言董召南讀書躬耕以養父母韓愈董生行云爵禄不及門惟有吏來徵租錢躬耕復樵漁養親還讀書不聞官賜帛惟見吏催租李興有至行柳子厚為作孝門銘曰引刃自向殘肌敗形羞膳奉進憂勞孝誠刲股如為孝還應載聖經莫明柳子意因甚取殘形何蕃事父母孝入太學嵗一歸父母不許二嵗亦不許凡五載慨然揖諸生去五載莫歸省雙親孰問安固云親有命不謂我何顔鄭潛曜母疾亟為書丐以身代母火書而神許二字獨不化翌日母愈願以身代母嘗焚上徹天若非神許我未必字依然裴敬彞母病醫許仁則躄不能乗敬彞自願為輿往迎仁親命懸醫手敢將親命輕為輿不辭往重母故身迎張志寛為里正忽詣縣稱母疾求歸曰母有疾志寛輒病令馳驗如言何忽省母病每因身病知可憐張里正尚得令君疑趙隠為相退朝侍養如布衣嘗侍母觀御宴隠率百官拜恩於庭回班候起居至今説花縣當日奉潘輿未必若趙母回班候起居路隋父泌陷虜隋尚嬰孺及長日夜號泣母吿以其貌酷類父終身不引鏡兒貌酷類父母知兒不知何堪引鏡照正復益兒悲李訥宰相楊收欲市訥冗舍以廣第訥叱曰先人舊廬為權貴優咲地耶先人敝廬在觸目百悲辛忍作優咲地圖娛權貴人許孝謹甫三嵗母病不飲乳有憂色或以珍餌悦之不食還以進母既不忍飲乳還能知奉親何曾自人教端是出天真柳玭戒子曰名門子孫稍有纎瑕十手争指生雖苟祿死何面目見祖先地下名門難為子纎瑕即辱身直須留面目他日見先人韋溫疾病召親屬賦父綬詩在室愧屋漏因泣曰今知汝身不負斯誠矣常恐愧屋漏追懷在室詩可憐忍死誦不負乃今知林攢為福唐尉棄官侍母疾廬墓降甘露詔立雙闕又表其廬時號闕下林家七閩獨莆郡雙闕鬱相望豈識林孝子曾來尉福唐右賢者之孝二百四十首釋迦欲入涅槃遣弟子昇天報母母至從棺湧出為説母子思情今日别離入般涅槃際拳拳報母知從棺更湧出為母説分離老子送孔子曰為人子者無以為己子之於父母毋以有其身老子𤣥虛祖諄諄此語人孝悌王有真人下降兖州孝子蘭公之家曰吾居斗中為孝悌王七星明歴歴萬古仰煌煌誰識斗宫内中居孝悌王目連拔母生天故世人以七月十五日設蘭盂會能將身入地拔取母生天嵗嵗蘭盂㑹今猶説目連許真君鄉舉孝㢘後得仙蘭公云傳孝道之宗為衆仙之長鄉以孝㢘舉仙為孝道宗謂予言不信君請問蘭公吳真君年七嵗夏月伏身父母牀下不驅蚊曰恐去己而噬親也何事不驅蚊癯然牀下身傷膚非所懼所懼去傷親六祖新州人常賣薪養母後傳五祖衣鉢新州在何處有箇養親人一旦成佛去那知昔賣薪睦州禪家呼為擔板漢每閉門自織蒲鞋以養母捨俗還將母禪闗晦迹深共呼擔板漢誰識織蒲心蘇仙公得仙道白日上昇留一空櫃與母曰若有所需敲櫃即得世傳蘇氏子白日去登仙念母留空櫃敲時即得錢寒山子每見人家烹宰羊豕即曰煮爾爺煮爾娘鍋裏爺娘語寒山太猛生不妨時着眼直是得人驚右仙佛之孝十首辟司徒妻齊師敗問曰君免乎鋭司徒免乎曰苟吾君與我父免可若何君父今安在諄諄免矣乎可憐齊女子不問辟司徒雍姬謂其母曰父與夫孰親其母曰父一而已胡可比也可憐姬告母父孰與夫親能置此一問未為愚婦人衛女父母終思歸寧而不可得毖彼泉水亦流于淇歸寧不可得何以冩吾憂不似肥泉水悠悠淇上流北宫女至老不嫁養父母趙后問齊使曰此女不朝何以王齊國子萬民妾身期不嫁至老養雙親何以趙威后殷勤問使人秋胡子妻薄其夫與道旁桑婦金不以奉母曰妾不忍見不孝不義之人妾面羞君面君心異妾心那能不念母却遺别人金趙津吏女簡子欲殺其父乞以身代簡子賢之欲以為夫人辭以親在倘得代父死誠非愛妾身不圖君聘妾向道有嚴親如姬公子無忌為如姬報其父仇如姬之欲為公子死無所辭底事能令妾為君死不辭不思君遣客報妾父讐時緹縈父淳于公有罪當刑縈上書乞没為官婢贖父罪文帝悲憐之詔除肉刑仁矣文皇詔悲哉少女書至今民受賜非但活淳于陳孝婦其夫逺戍囑曰吾若不歸汝善養我母夫死戍所竟不嫁終養姑妾昔與夫别夫曾共妾言忍能幸夫死不復願姑存東海孝婦事姑甚孝而姑女誣吿殺姑獄具竟論殺郡中枯旱三年如何殺一女能致旱三年婦孝無知者知之惟老天曹娥父旴為巫溺死不得屍娥亦自沉縣為立碑蔡邕題八字謂絶妙好辭上虞一巫女名乃至今垂端的由純孝非專在好辭孔融女七嵗父兄為曹操所殺女臨刑曰若死者有知得見父母豈非至願不憂身即死惟恐死無知倘得從父母寧非我所期梁夫人嬺訟父竦寃詔改殯恭懷后追封竦褒親愍侯仍徵還嬺母能返母萬里還榮父九原可憐帝有母亦自待人言宣文君父宋躬傳以周官曰汝可受之宋氏後傳授諸生號宣文君難把父書讀秪因手澤存遺言如可受忍使世無聞宛陵女子母夜為猛獸所取女攀母持獸行數里獸毛盡落置其母去異哉一女子獨抱母啼號非但脱虎口還能落獸毛盧元禮妻元禮卒事姑以孝聞詔號曰貞孝女宗貞孝諡己美何堪復女宗一朝下明詔千載被流風木蘭古樂府云阿爺無大兒木蘭無長兄願從千里馬從此替爺征謹勿悲生女均之有至情縈能贖父罪蘭亦替爺征鄭義宗妻盜夜刼其家冒刃立姑側為盜捽捶幾死竟不去抵死侍姑側寧知有妾身若懷白刃顧尚得謂之人李孝女安禄山亂被刼徙他州聞父喪從間道奔喪既至父己葬廬墓終身奔喪脱賊手廬墓至終身此大丈夫事誰云一婦人崔氏婦崔氏事姑孝姑病召長幼言我無以報婦但願婦子孫皆若婦孝姑今病且死頗愧婦恩深但願婦有子皆若婦用心右婦女之孝二十首東夷大連少連孔子曰大連少連善居喪東夷之子也大連少連者夫子筆之書誰謂東夷子而于喪善居若鞮單于匈奴謂孝曰若鞮稱若鞮單于王莽改匈奴單于為恭奴單于漢語雜番語堪嗤莽太愚安知若鞮字己是孝單于休屠王子金日磾降漢牧馬甘泉宫見母像泣拜後受遺詔輔政牧馬一王子如何却受遺多因漢宫裏泣拜畵閼氐西羌東吾以父滇吾降漢乃入居塞内謹愿自守循循秖自守何獨此羌然直以父在漢忍將身犯邊號吾章和二年將其母及種人八百户自塞外來降如何降塞下不復戀羌中既是能將母還應知向風百濟王扶餘義慈事親孝與兄弟友時號東海曾子夷方雖爾異天性本然同自昔聞曾子如今在海東扶桑國親喪七日不食設座為神像朝夕拜奠不食至七日能將禮自居既然嚴像設亦復奠朝脯吐谷渾葉延父為羌所刺葉延縛草為人射之母曰賊己屠膾矣何益父讐己屠膾射草復何為豈不念無益其如罔極悲回紇郭子儀單騎見虜傳呼曰令公來回紇驚拜曰果吾父也瞥爾驚吾父同然拜令公遙知恩義重却似與真同沙陀阿跌光進有至性居母喪三年不歸寢三年不歸寢至性切于親不信沙陀種還生如此人右外裔之孝十首烏嗸嗸林烏反哺其母靈烏噪何許反哺向中林人可不如鳥而無愛母心鶴鳴鶴在隂其子和之好是鶴鳴隂居然子和聲休云氣所感自是物之情燕雀子母共處於一屋之下相哺相樂也共母一屋下寧知屋欲然不須譏寡智相哺政堪憐虎狼虎狼父子相親何謂不仁仁之於父子也虎狼鷙獸也何乃謂之仁仁之於父子父子亦相親猿蜀鄧芝見猿抱於樹上引弩射中其母猿子為抜箭以木葉塞瘡不忍身逃箭知為母塞瘡人心有如此獸面本何常犬唐齊瓊家有犬常隠肉喉間出飼病母於頹垣瓊收養之瓊死犬亦不食而斃食肉隠兩頰飼母向頹垣終感主養母能將死報恩羊羔唐屠者王甲將刲一母羊忽失其刃尋覔次蹴起羊羔見所失刀藏腹下己分几上肉誰藏腹下刀安知羊不死乃復自羊羔豺獺下至禽獸豺獺有祭人而不如豺獺乎曾聞豺祭獸還見獺陳魚人苟不知祭能如豺獺乎蛇漢竇武母産武并産一蛇後母葬有大蛇出榛莽以頭擊柩流血有哀泣之容似有人傳訃來從榛莽中叩頭至流血垂泣有哀容青蚨水蟲子母不相離子母不相離何心辨鳩蚨忍能利銅臭不枉喚錢愚右禽獸昆蟲之孝十首兩宋名賢小集巻二百三十九
