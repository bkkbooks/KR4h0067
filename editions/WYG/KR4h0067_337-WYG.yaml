body:
  text: 兩宋名賢小集巻三百三十七宋陳思編元陳世隆補古梅吟藳一吳龍翰字式賢新安人咸淳元年領鄉薦授編校國史院實錄宋亡不仕築樓三層終日吟嘯其中樓前有古梅一樹即以自號曉發姑孰城鵑啼驚夢欹春枕花落迎風打曉窓攜杖攙先出城去角聲吹月墮寒江浙江姚樓觀水月翠滚玻璃萬頃秋長江又掛水晶毬水光月色梅邊客今夜㑹盟江上樓晚舟過臨平烟鐘舂起夕陽愁淼淼臨平春事幽惟有風蒲愛吟客岸邊繚亂綰行舟春晚留淮上淮山厯厯春雲淡淮水湯湯夜月輝此處杜鵑啼不到江南行客未成歸贈謁士一掬鄉心寒似月半生行跡過于雲春風滿擔詩千首是處青山留得君白紵詞吳宫煙水碧迢迢瓊樓十二凌青霄北方佳人顔如花素衣濯濯明朝霞雲母屏風珍珠箔香銷金鴨春寒薄璧月流光羅綺筵白紵舞殘月欲落君看月落夜潮平吳江濶兮越江深吳王醉兮越王醒嘉禾舟中天與東風便千錢買一舟嘉禾三月路隂木四山秋野色緘詩思鶻聲替客愁烟波渺無際是處可盟鷗嘉禾沈園景物何其異虛岩人力成清池沈鳥影髙樹落蟬聲花日樓臺麗香風簾幙輕我來一吟賞不惜買杯傾重陽客中愁裏重陽近他鄉酒易酤秋風詩鬢短寒夜客燈孤筍笠月穿破荷衣霜打枯有懐吟未就端不為催租柬劉後村先生四首天祿臞仙後代孫巍科幾世屬名門千年絶學追先聖四海真儒仰後村直向天邊扶日月只從筆底轉乾坤年來諸老凋零盡惟有靈光獨自存玻璃萬頃海天秋相國如居天上頭錦帳圍山丹荔熟銀梭織水子魚遊地靈自古稱多士人物當今列上流二季一翁家學在湄洲即是蜀眉州先生莆人二子能踵其學雪碗冰甌淬筆鋒篇篇琢出玉玲瓏鶴鳴逺岫千林曉鯨展洪濤萬里雄暮雪寒梅吟思外春風芳草夢魂中詩瓢行脚半天下多謝先生棒喝功騎却青鸞上禁林岩岩聲價重于金花磚日轉瓊箋暖蓮燭星歸玉漏沈翰墨挈来三昧手絲綸畫出九重心春風已築沙堤路天上虚星屬意深西湖曲十里風光煙水白嵯峨帝城紫霧隔笛聲吹㫁蒲葉風鷺飛界破青山色湖波鱗鱗織成縠翠蓋紅幢機上簇長安富兒美少年馬行紫陌香氣撲畫舫誰家窈窕娘半額鵝黄時樣糚玉手折花嬌無力花枝斜掛銀絲長隔花躊蹰意相屬稍稍談笑間餘香夕陽西下漢水逺無計問覓雙瓊璫巫山髙哉但入夢安得插翅飛其傍君不見呉姬采蓮自唱曲君王尚在舟中宿拜林和靖墓老鶴髙飛入白雲空餘殘照管孤墳清風千古鎮長在見著梅花如見君久客湖海買舟西還萬里煙波興渺然片心如在灞橋邉歸裝詩少不成擔自抝梅花凑滿船馮永之號冰壺工水墨丹青半生江海冰壺翁擔風荷雨七尺筇爛嚼扶桑紫金椹玉樓光徹十二重飽喫孤山白玉花一鑿九竅開玲瓏能鉟明月鑄雙眼故能搜索異景窺神功能穿星斗掛胸次故能神遊八極之鴻濛手撼煙雲出硯石酒酣奮筆驅雷風迴山轉海有力量頃刻鵝溪幻出白練之寒江碧玉之奇峯瀟湘洞庭忽在眼冷落煙竹蒼梧空碧天萬里渺無際但見隠隠孤飛鴻江門過雨涼如許木落瀟瀟秋滿浦月明何處起漁歌小艇人歸急揺櫓鷗沙漠漠洲渚昬無數寒鴉棲古渡景物變態雖無窮筆端有口一一吐研丹吮粉尤精奇直與王爵争毫釐寧肯没骨媚時好逸氣往往追徐熙一㸃春風㡬花卉化工權柄君所私獻之㹀牛韓幹馬滕王蛺蝶僧繇魚下筆衆妙各俱足開巻錯落千珠璣顧家層樓連天起俗士那敢窺藩籬嘔心抽思何自苦乃使肌骨化作枯松枝君不見梅邉有狂客風饕雪虐寧忍飢吟軀未老貌先老不覺兩鬢紛如絲靈金山觀金燈嵯峨靈金山峭壁偕天長㠝岏萬蒼翠無復敢頡頑登臨勞逺目久羈塵俗韁天風送笻屐此願今一償所喜侍老親贔屭升崇岡琪樹藹柔絲瑶艸超羣芳松聲入幽懐妙樂非笙簧好鳥相勸酬醉我林中觴我吟遊仙詩客和招隠章起舞沸懽笑人影亂夕陽何方阿堵女山北敞虚堂石池閟甘泉瓦爐騰妙香昔言山有靈金燈夜呈祥信哉華嚴經佛眉施白光澄公有妙力一笑通禪房詎知山石間而有金光藏崦嵫下朱景山氣相激楊若以色見佛于法參與商我生事迂濶咄咄顛復狂讀書獵千古浩氣凌八荒乃欲落鬚髮掬水曹溪傍吹以無孔笛例騎牛一場手擊混沌開有此硬脊梁指㸃生死根棒喝行諸方辛酉秋吳畫士寫神功名自有兜鍪輩榮辱寧甘蓑笠翁煩作田園秋興畫短簷斜日稻花風秋崖先生招飲荷葭塢席上賦詩相公潭水清于玉翠屏四面環書屋石梯齒齒登蒼崖老樹晴烟千頃緑好花對人無俗姿春色盈盈囿虛谷歸來庭院碧參差八窓玲瓏有修竹先生長嘯臨清流茱萸辛夷香滿洲浪呼迪輩偕春遊緑醅深注碧玉甌我醉起舞相勸酬願祝先生相業侔伊周運留侯帷幄之籌横萊公野水之舟莫負蒼生望安石東山髙卧凌清秋先生所居即相公潭京城寓居春日春城庭院栁風輕簾影玲瓏受曉晴紅日半窓吟夢覺咿啞墻外賣花聲宫人斜碧石重重鎖墓門蘭膏㸃火照黄昏春風幾度生芳艸還似君王舊日恩春夜隔江望揚州城煙抹蕪城熨不開夜深燈火照樓臺欲披紫綺過江去月冷滄洲待鶴來數年前有小詞微雨後落花天嬌態病懨懨怕人猜著是相思成日不開簾寳釵横蟬鬢亂院宇侍人歸盡緩移蓮步玉蘭前纎手掐花鈿月夜與客飲梅花下一姝歌前詞復出箋徴余新作月夜梅花下開樽誰主賔梅花嬌欲語讓我白頭人娉婷樓上女無乃花中神下樓欵懽笑莫惜抛千金纎纎出素手為我彈瑶琴自言諳古調妾心合君心感君纏綿意未彈先有情妾佩明月光妾衣雲霞輕共君驂白鳳一息超玉京君看天帝女嫁與牽牛星天河萬里長鵲橋嵗一陳安得河水乾夜夜長相親君能挽天河一洗八極塵宫詞舞罷霓裳寳髻垂桃花扇底暖風吹夜深内殿重開宴手撚燈花畫翠眉秋崖先生以紅石見寄彤霞鑠石玉晶瑩琢出羲之風字形却著寒松蒼石下研煙傳寫相牛經心逺堂飄飄謫仙子閉門逃世諠達哉柴桑翁心逺地乃偏羨公隠㕓市髙拍前人肩園林富花木景象羅春妍翠鳥鳴髙枚白魚游深淵魚鳥欣有託吾廬興悠然詩瓢貯烟雲茶鼎烹銀蟾有此佳絶處那訊名利鞭鵲尾聞妙香片心超九天淵然消萬慮流光緯三田乾坤任簸弄追蹤古偓佺持敬堂大哉紫陽箴誠為百世師心法故能傳心印幾能提明明道統燈于此接光輝端居儼帝臨暗室疑神窺立足千仭淵生怕傷髪膚兢兢一寸心炯炯冰雪壺脱帽藐王公無乃酒狂徒蹀􅗿漁陽鼓傲態逐刑誅我則持以敬譬如龍戀珠斷斷貓捕䑕綿綿雞哺雛守之戒勿閑意馬防馳驅層翠樓結樓書屋傍獨占林塘幽飛簷瞰寒碧照影虹霓浮層巒萬蒼翠峭屼生戈矛黛眉與螺髻故故含嬌羞此時樓中人片心隨白鷗風吹烏紗帽露滴紫綺裘白雲入我望逸興何悠悠沆瀣供晨飡酌以碧玉甌朝暾散朱景燕約十二樓願言追黄鶴致身八極游慷慨笛聲發渺渺淩滄洲春寒二月漫漫雪滿山羣芳空向雪中看幽亭酌酒先沈醉要為小園花餪寒凍吟座左插梅花座右横詩筆風雪墮寒肩先生方抱膝春興聞説春醪熟提壺喚客嘗乾坤一釀甕花氣百和香别呉中三年寄湖上一二知己麥秋天氣覺清和老盡春風庭下莎曉月荒山啼蜀帝夕陽髙樹咽齊娥三年寒我滄波約一夜思君白髪多世路不堪重著脚相期何地理漁蓑兩宋名賢小集巻三百三十七
