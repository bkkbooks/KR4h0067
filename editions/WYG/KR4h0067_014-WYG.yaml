body:
  text: 兩宋名賢小集巻十四宋陳思編元陳世隆補寇萊公集途中作秋逺楚雲端行侵苔蘚班愁腸不厭酒病眼豈逢山逺路有時到宦逰無處閒却思清渭北烟栁掩柴闗喜吉上人至喜師來訪我幽㑹興何長清論都無倦鄉愁頓欲忘疎林秋色暮虚閣水風凉久坐慵言别㣲陽下短牆書黄山館壁殘日住孤館遲遲行古臺大河連野去白鳥背城來離恨渾如結鄉心漸欲灰山花半寥落數㸃社前開巴東驛秋日晩望楚驛獨閒望山村秋暮天數峯横夕照孤笛起江船遣恨須言命𠖇心漸學禪遲遲未回首深谷暗含烟掩巻掩巻頻秋望無人共展眉殘陽留古樹白鳥下寒池簮組心還倦風騷志未衰登臨一長嘆還失渭川期巴束書事鄉思終日有孤淡厭琹樽衆木侵山徑寒江逼縣門浪沉灘見脊雨過壁生痕憔悴悲蘭蕙因思楚屈原池上秋書虚齋獨語復書空閒對林塘思少同霜葉聲乾飄夕照露荷香冷泣秋風時平偶作青衫吏心老渾如白髪翁昨夜渭川歸好夢一船烟雨打孤篷書懐寄郝監軍索居終日學忘機深嘆髙堂養獨遲自問江村紆墨綬何當烟浦坐魚磯梦迴渭水秦雲斷望盡巴山蜀魄飛好在多才郝夫子道孤俱未及輕肥南平驛心隨流水還鄉國身向青山上屈盤秋梦不成秋雨細西風一夜客亭寒悶書秋憶故鄉魂欲斷晩臨寒浦思如流歸來古屋寒燈暗能較騷人幾處愁秋寄江上吟僧掛錫在荆楚桂門無往還潮聲到古寺月色遍前山一雁驚幽思西風惨病顔何當重攜手髙步白雲閒江上晩望寒鐘來極浦古寺隔重岩斜日搘頥坐天涯落月㠶金陵懐古極目望吳甸野烟凝亂流夜來榆塞雁呌斷石城秋舊苑荒餘艸平川半古丘遲遲獨回首落日一蟬幽暮春感事春至又春暮閒心成古心花光隨雨薄草色共烟深粉蝶稀狂影黄鸝送好音餘芳留不得還共夕陽沉秋興窮秋九月西風髙疎林木落聲蕭騷出門長望無所適惟見空江生暮濤春日閒望有感水鄉春氣變新正風物光榮異帝城閒步偶尋芳艸色空林獨聽野鶯聲烟霞未得從幽興吟賞潜悲减舊情燕麥楊花自揺蕩不知離客困南征江上聞鷓鴣水村烟樹與雲平閒倚孤舟念逺行無奈鄉思倍寥落殘陽中有鷓鴣聲醉題榴花滿瓮撥寒醅痛飲能令百恨開大抵天真有髙趣騰騰須入醉鄉來和趙監丞春江送别孤舟東去水烟㣲久客那堪更送歸三月江頭春盡日片㠶輕絮共紛飛送李生二絶句愛君白髪無羇束命駕常為千里逰一夜春江又迴棹當時風雨滿汀洲晴色半和行色逺江頭别去欲何之數杯酒盡又南去正是落花春暮時與詩友㑹宿此夕南軒宿論詩萬慮忘苦吟秋信近寂坐漏聲長室静燈光暗桐疎露氣凉幽懐聊自遣山色漸蒼蒼南冠亭秋晩閒望南冠亭外淡江天久客登臨更浩然逺浦秋深翻白浪孤山日暮起蒼烟已嗟異國逢衰莭况復西風聽亂蟬倦鳥知還雖有意故林無奈隔秦川峽中春感二年窮峽外不見帝城春覽照知年老逢花感恨頻浮榮何足貴幽别轉難伸終憶歸清渭林泉卜舊鄰東歸再經峽中復命經三峽波瀾極目愁片雲生斷壁孤石礙中流道路連巴塞風烟接楚丘重來登望處因念昔年逰江上晩行秦川不得却歸耕奉詔年來在楚城孤寺殘鐘催夕照汀洲疎葦送秋聲西風獨起湖山思久客應知寂莫情野鶴漸無驚弋意對人孤立水烟平初秋即事古邑端居夏景移炎天經雨自收威蓮衰小渚秋光淡蟬噪平林夕照㣲冷句毎招江客和深心終約嶽雲歸晩來却近南亭立獨看沙鷗向浦飛蓮數柄疎荷出小池幽香深謝好風吹曉來秋氣凝清露似學湘妃怨九疑望都雨夜孤驛蕭條風雨夜夜深忩竹動秋聲離魂無睡難成梦却遶長廊獨自行成安秋望八月西風蟬噪時蕭蕭疎葉已辭枝烟村物景都無賴况是登臨有所思夏日晩凉㣲凉天氣似秋期風觸疎簾影自移逺望有時尋水寺孤吟終日對莎池笋梢成翠堆輕籜梅實翻黄壓嫩枝兀兀騰騰聊自遣此懐深謝野僧知輦下書懐身名長似梦家計盡蕭然旅宦逰梁苑歸心滿渭川郊原秋變色桑柘晚生烟願得長閒去何妨老一㕓冬日偶書户庭初過雪鳥雀亦聲稀天淡雲客結林寒日影㣲虚名何足道前是旋成非簮紱全忘念終須掃澗扉巴東縣齋秋書訟庭終日静琹鶴亦長閒晩樹生凉吹秋思在逺山水穿吟閣過苔遶印牀班幸有江雲看何須卜往還江行書事孤棹㳂流岸凝懐似舊逰朝雲生嶽頂斜月動江流賤莭難干世離心易感秋因思六朝事千古有遺愁月夜懐杜陵友生一忝軺車命三逢水國春重看漢浦日獨憶杜陵人旅宦違前計歸田失舊隣年來更多緒清淚滿衣巾贈僧重城須久住塵事日全無一葉驚秋信思山展舊圖貌同仙鶴痩心似片雲孤念吾浮名在還将静者殊楚江有弔悲風颯颯起長洲獨弔靈均恨莫收深岸自隨浮世變遺魂不逐大江流霜凄極浦幽蘭暮波動寒沙宿雁愁月落烟沉無處問數聲猿呌楚山秋秋雨懐友生江城秋雨歇孤坐役吟身草色荒三徑蟲聲滿四鄰邉鴻來已近庭葉落還頻對此空搔首無由面故人南亭初夜南亭望清吟露濕衣雨餘羣籟發天淡數聲稀秋氣又還至故園尚未歸虚堂愁重入燭白冷光㣲贈惠政上人惠政成安人也此詩碑在成安縣公祠西壁寥寥長日掩松關白首忘機古寺間香燼石房終曉講葉堆莎徑憶秋山澄泉心地清無染野鶴精神老更閒孤坐有誰同此意白雲空見渚禽還輦下春望獨向東門凝目望園林無處不啼鶯鄉心已似楊花亂歸路那堪野艸生紫陌盡應趨勝地紅塵誰肯愛閒名年來却羨滄江叟長在湖山聼浪聲題楊氏别野門巷枕江濆疑将俗境分湖山晴後見天籟静中聞徑僻苔空老林寒日漸曛髙懐無一事長嵗似孤雲再到鄴下有感漳濵勝地皆牢落晚嵗重來恨莫收極浦寺藏雲樹老故人門鏁雨苔秋烟霄得路輸時彦泉石忘機阻舊逰今日重思昔年事放懐惟上夕陽樓成安秋望有懐年加心地轉如灰書篋經旬亦懶開詩句偶吟皆感事文章無用獨傷才秋蟬殘韵揺疎樹夕照寒光下古臺閒遶岸莎看野水暗流紅葉不重回書懐寄唐工部不才曽忝吾君録紫殿科名志已酬孤立敢言逾素分髙吟深愧預清流西風獨見江蘺暮紅葉還思苑樹秋多謝名公知賤莭毎貽清句慰牢愁鄴中和崔遇著作虚室凝愁厭夜眠長吟静對欲凉天梦迴故國人空逺望㫁重城月再圓時泰未能抛組綬性孤終是憶林泉明朝奉詔遐方去何處烟江寄客船獨倚空樓畏景殘凝眸魂㫁楚雲端猿清好雜江聲聽山逺宜和霽色看鳥掠平蕪堪入畫風來危檻欲生寒蕭蕭前浦歸帆静落日長吟且凭欄漢上偶書謫仙唐室逰兹郡花下聽歌醉眼迷今日漢江烟樹静更無人唱白銅堤李白常有歌云日欲落峴山西逰客醉歸花下迷貴門小兒十四个手拽街事唱白銅堤舂陵聞雁蕭蕭疎葉下長亭雲淡秋空一雁經惟有此人偏恨望孤城獨上倚樓聽危欄秋盡偶來凭霜落秋山爽氣澄誰道衡陽無雁過數聲殘日下舂陵贈魏野隠士人間名利走塵埃惟子髙閒晦盛才欹枕夜風喧薜荔閉門春雨長莓苔詩題逺岫經年得僧戀幽軒繼日來却恐明君徵隠逸溪雲誰得共徘徊兩宋名賢小集巻十四
