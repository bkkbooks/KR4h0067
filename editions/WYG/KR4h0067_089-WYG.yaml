body:
  text: 兩宋名賢小集巻八十九宋陳思編元陳世隆補祖龍學集途次金陵逢同年沈五判官數載天涯别年來不定居扁舟忽相植孤抱信何如公幹猶多病春述孝先仍懶書自謂人生從坎􅇄客意且躊蹰淡薄市橋酒鮮肥江岸魚可來同飲食勿笑此蕭踈官况物態無端固盡諳自為俗吏欠清譚豈憂官况全蕭索秪畏人言足二三玉勒已辜尋曉陌錦鱗猶憶釣秋潭公餘自逺踈慵性從道嵇康七不堪哭鄲州孔給事二首出入多年侍紫宸封章頻上觸龍鱗杼投㡬見疑慈母檻折終聞記直臣闕里忽驚歌曳格洛陽那復見埋輪師門一慟盈襟淚痛為眀時惜正人聖孫家世嗣衣纓夫子當朝有令名許國志堅存亮直致君心切贊隆平眀庭抗䟽忠言在列郡班條惠化行不享永年兼大用終天遺恨負蒼生夏州叛羌虜奸誅軫聖憂出師十萬擁貔貅朝廷命將詩書府廊廟論兵帷幄籌舜后舞干期振旅漢臣投筆待封侯宣王六月存周雅願繼徽聲頌國猷寄澶州孫司理眀道二年同夏課四人兩舉盡登科孤寒惟子辛勤甚虚薄伊余忝竊多宦路驅馳今各自名場出處舊相過感今懷舊無憀頼不覺臨風發浩歌送孟湘虞部赴闕科名拾芥職三虞落落雄才與衆殊為政人驚今遂霸論兵自比古孫吳倚廬已見因心著公近居先大夫䘮哀毁過制結綬還陪辨色趨不似馮唐空白首漢皇今正渇嘉謨送劉進士遊邊朔風動地雪花眀去去從知指戍城場藿失縻千里驥食魚翻嗜五侯鯖征途望㫁河氷合旅館吟殘海月生且共淹留話離索一尊濁酒為君傾同年楊兄作尉僰道兼領勾稽之任賦七言四韻詩以送之縣城荒僻民居少吏事全稀似隠淪且喜桑郊接鄉樹莫嗟藍綬染京塵鸞姿豈合淹仇覧仙骨應難滯子真好在公餘頻寄問我方江上學垂綸宋嘉言雅善飛白一日書八字貺予因成長句謝之輕如游霧重如雲學到精㣲妙入神竒迹昔年傳堊帚髙名他日壓烏巾誇呈朋友防求副留敎兒孫恐失真天子清閒好揮翰似君須合侍嚴宸送韓尉員外㡬年獻賦向公車四十方為冉冉趨昔競寸隂終蹭蹬今貪斗粟尚踟蹰潘郎毛髩㸔將白陶令田園説已蕪官滿還歸省門下預應搔首重長吁題魏野園陕府曉日東郊如隠扉曈曈初日弄朱旗黄梢風舞先生栁紫頰霜殷鳥閑切赤黒色也左傳云左輪朱殷大谷梨粉艷清歌聞邃閣碧溪寒韻落幽池我來載酒山翁醉且喜秋香菊滿籬誚王安石乞分司西京避讒而去因以述懷割㫁攀縁宰相權憂危爭似我身全試觀竿上抛生體且擬波中戲釣船名利不求還獨樂是非莫辯祗髙眠何當對景幽堂坐更得閒吟度百年寄千乗劉殿丞求字人編千乘劉夫子髙名繼謫仙從居庇身邑已著字人編才入鍾嶸品文期鄭氏箋何當求副本長願播匏弦寄信安判官張秘校蓮幕從軍客逢山著録人才章過鮑謝交契敵雷陳婉婉謀謨暇翩翩書問頻徒知感髙義猶阻奉清塵泗水紀地復涵虚清疑顥氣俱東家遺敎逺夏后建功殊冷色平吞魯長波逈勝吳淮黄交滙處沾溉慶民謨沈康赴江西掾髙譽冠時英人皆倒屣迎失科材尚屈掌獄職仍輕滕閣登吟健吳山醉望清公餘如訪古一為問豐城張唐民下第東歸學古功非淺干時命尚屯拾青辜壯志垂白念慈親歸路天同逺生涯槖自貧知君謀道乆慎勿歎沈淪送人作尉臨潼年少文能老新曽射策來縱横傳古學慷慨濟時才黄綬官徒爾青雲志在哉他年歸㑹課遲子出塵埃書懷寄呈萊州張學士從作東齊吏經年寡往來朱顔隨日减青眼為山開學政慙能政論材信不材何人慰孤寂知己在蓬萊累辱書問兼貺詩筆故云萬太傅知惠州惠州君未到聽我送君吟去路九韶石鄰封八桂林下車秋色老望闕海雲深善政多餘暇無忘惠好音送新州陳式虞部大庾嶺南郡新興事若何還珠合浦近辟惡密香多主聖天如覆時平海不波更逢賢太守應有袴􅃭歌送蓮房與馬屯田問遺不必貴要之資闕如蓮房三百枚來掇亦云初持以侑尊酒甘香即有餘野老獻芹意今予其有諸題安成劉伯玉日新亭積善家餘慶日新亭可云詩書盈㡬有道藝喜時聞兒姪既登學晨昬在克勤欲知榮地力此便是青雲寄成都詩人謝希濤常聞游蜀客來説謝希濤氣禀江山秀名因翰墨髙新詩來句逺去嵗得詩三十首宻意念空勞拙句聊相贈應煩報錯刀感事東家木鐸德音逺西竺金人像教來禮樂不興王道絶吾民何日遂康哉題蔡州壺仙觀龍學四月八日游蔡人每嵗於是日來集此歡賞遊歌其觀在城北十里許有仙橋數十株亦名大木觀鸎老花殘過禁煙杖藜閒步到壺仙仙家本是無塵地别有風光一洞天費長房懸壺之地聚為九老自詠龍學因分司西京御史䑓與司馬温公九人為真率㑹謂之九老科名髙獻玉堦前厯任公卿四十年休道老夫無事業兩扶紅日上青天英宗皇帝即位龍學充皇帝即位契丹皇太后國信使神宗皇帝即位是時龍學為開封府大尹題蔡州東湖夕陽水底霞鋪錦清夜波心月湧金此是東湖最佳處無人來伴水仙吟咏繭兒千絲萬縷自經營本為藏身却誤身待得功成歸鼎鑊不知輕煖屬他人詠震山巖彭徴君釣䑓彭雲宜春人力學多通尤善講易隂陽圖緯無不精究注通元真經辭理深逺世所推重隠居不求聞達天寳中刺史李璟以其名聞上遣使者齊延丘以蒲輪徴之凡二往始至𤣥宗欲官之徴君辭焉堅乞歸鄉上元元年六月卒年六十三葬東原有釣䑓在震山之前本朝皇祐五年九月二十日休暇龍學與郡僚遊震山巖因以詠之震山離州東十里釣䑓本一巨石紹興己未季春雷轟石㫁閒作山城吏隠居敬君真逸寓漁磯䑓前巖畔清風在尚想煙波映芰衣和李泰伯題東湖樂游堂韻晴煙羃䍥淡湖光勢勝居然占一方拂水萬絲楊栁弱倚風千盖芰荷香縱游閒泛蘭舟穏半醉狂眠石席凉公退毎來須度日却疑身出利名鄉又和題宜春䑓異鄉何處散幽懷頼得城中百尺䑓還向天涯經嵗住那知春色為誰來雪消江上㸔梅發風暖衡陽有鴈回強擬登髙聊賦詠再三媿乏楚人才兩宋名賢小集巻八十九
