body:
  text: 兩宋名賢小集巻二百十二宋陳思編元陳世隆補豫章先生詩集羅從彦字仲素南劒州羅源人從龜山遊以累舉恩授惠州博羅縣主簿紹興初卒學者稱豫章先生淳祐間諡文質有集觀書有感靜處觀心塵不染閒中稽古意尤深周誠程敬因粗會奥理休從此外尋自警性地栽培恐易蕪是非理欲謹於初孔顔樂地非難造好讀誠明靜定書示書生知行蹊徑固非艱每在操存養性間此道悟來隨寓見一毫物欲敢相關顔樂齋山染嵐光帶日黄蕭然茆屋枕池塘自知寡與真堪笑賴有顔瓢一味長邀月臺矮作垣墻小作臺時邀明月寫襟懐夜深獨有長庚伴不許庸人取次來侗見先生出此詩嘗妄意云下兩句不甚渾然先生因改云也知隣鬬非吾事且把行藏付酒杯蓋作此數絶時正靖康間也門人李侗謹識送南劒王守歸三年政化被生民甘雨祥風溢劒津解組幡然賦歸去攀轅無計可留恂未把陽關三叠吟且將謬句寫離心千尋浩浩鐔溪水别後不知誰淺深勉李愿中五首愿中以書求道甚力作詩五首以勉其意然借視聽聾盲未知是否聖道由來自坦夷休迷佛學惑他岐死灰槁木渾無用縁置心官不肯思學道以思為上孟子曰心之官則思書曰思曰睿睿作聖惟狂克念作聖佛法一切反是不聞雞犬閙桑麻仁宅安居是我家耕種情田勤禮義眼前風物任繁華今古乾坤共一身安身須是且安民臨深履薄縁何事祇恐操心近矢人外吾聖人之學申韓佛老皆有書在決擇也彩筆畫空空不染利刀割水水無㾗人心但得如空水與物自然無怨恩吾道當無凝於物權門東徃絶行蹤一片閒雲過九峰不似在家貧亦好水邊林下養踈庸自述松菊相親莫厭頻紛紛人世只紅塵自憐寡與真堪笑賴有清風是故人題一缽菴可憐萱草信無憂誰謂幽蘭解結愁欲得寸田斷荆棘只消一作秖應長伴赤松遊挽吉溪吳助教二首室富真儒業門多長者車明經方教子得第己榮家性守仍知分天然不愛奢百年成古昔行路亦咨嗟新生誇躑躅舊德嘆凋零冷帶商岩月光凌處士星布衣難得禄白首易窮經追想今何在溪流對洞庭顔樂亭用陳黙堂韻平時仰止在高山要以亭名樂内顔顛倒一身渾是夢尋思百計不如閒心齋肯與塵汘染陋巷寧容俗徃還堅守簞瓢心不改恐流乞祭向墦間寄傲軒用陳黙堂韻自嗟踽踽復涼涼餬口安能仰四方目送歸鴻心自逺門堪羅雀日偏長家徒四壁樽仍緑侯户千頭橘又黄我醉欲眠卿且去肯隨俗客語羲皇濯纓亭用陳黙堂韻十載猶緇京洛塵歸歟那復厠朝紳君今談笑青油幕我但巍峩烏角巾江漢便從尼父濯衣冠寧羨屈原新欲賡孺子滄浪咏㑹意須還舍瑟人題靜亭鼎創新亭靜更幽四時景象鎮長留端如和氣衷談笑恍若春風中泳游排闥山併藍色重憑欄水擁壁光浮我來登賞無窮趣好把詩篇與唱酧送愿中行聖言天逺海潭潭獨在潛心久泳涵猥念百家非己好妄將一貫與君談賢如賜也才知二學若陳亢只得三此道悞來因自足郤隨鵬鳥話圖南再用韻送延年心源寂靜映寒潭每欲操存更養涵顧我日思攀劇論荷君時與得高談眼前舊識知多少物外深交没二三幸久相親頻握手遽成分别又東南和愿中岩桂幾樹芬芳檀與沉枝枝若占郄家林風搖己認飄殘菊日照渾疑綴散金仙窟移來成美景東堂分去結清隂我今不願蟾桂折待到蟾宫向上吟一作待到秋宵把酒吟題德士退居牛頭山頂鎖烟霞檐月松風即我家筏渡有情新活計袋空無物舊生涯己將黄葉分雙手郤攟白茅占一窊會得懶庸歸去路索然忘鳥更忘花賀田溪張公遷居華搆經營占地靈濃巒環合數峯青苟完公子方成室趨訓兒孫巳過庭豈止一時誇壯麗定知百世享安寧顧惟善頌非張老秖貢湯盤徃日銘和張公叙别良工創新第瀟洒伴洞府經營未畢工四面方興堵蛟龍忽夜徙空中震雷雨親舊賀於門主人迎孔户連喚鳳兒來藏書幾多部為我張廣筵酧賓酌以旅人謂主公賢敦樸嗤峻宇規模出心匠務卑由乃祖欲圖久安逸勿辭暫勞苦忠孝闡家門詩禮光族緒居室云苟完謙冲彌自處玉石不分别鶴雞為謾侣顧予局促輩鄉評少推許嘗逰莊嶽間喜作齊人語何幸天相之幡然交鄒魯早年欽大名馳書聊以序比來揖清風談笑揮玉麈見之名利盡久持豈無補素志己深酧青眼猶相與黙然湯盤頌未為傾肺腑何當惠古風錦繡施殘楮妙曲誠寡和取利憑斧柯兩宋名賢小集巻二百十二
