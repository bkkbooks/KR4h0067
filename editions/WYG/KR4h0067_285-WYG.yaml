body:
  text: 兩宋名賢小集巻二百八十五宋陳思編元陳世隆補葛無懷小集葛天民字無懷山隂人好學攻詩忽祝髪為僧更名義銛字朴翁其後仍返初服隠居錢唐湖上足不入城市日惟吟咏自樂有無懷小集春懷向晚一鳩鳴道人春睡足無處冩幽懷巡簷數修竹絶句夜雨漲波髙二尺失却搗衣平正石天明水落石依然老夫一夜空相憶㸔山我本田夫作比丘也知騎馬勝騎牛如今馬上㸔山色不似騎牛得自由寄楊誠齋參禪學詩無兩法死蛇解弄活鱍鱍氣正心空眼自髙吹毛不動全生殺生機熟語却不排近代獨有楊誠齋才名萬古付公論風月四時輸好懷知公别具頂門竅參得徹兮吟得到趙州禪在口皮邉淵明詩冩胷中妙用則致君堯舜前舎時便灌廬陵園六十四卦只兩畫三百五篇惟一言我與誠齋畧相識亦不知他好官職但知􅂸得忍飢七十年脊梁如鐵心如石不曾屈膝不皺眉不把文章做出詩玉川後身却不恠樂天冄世尤能竒隔千里兮共眀月何似寒灰相對撥公亦何須要我知我只欠公頭上髪醉書酒肆碧牀酒盎香拍浮呉姬粉醉不識愁黄金手揮博歌舞夜半春回楊栁樓竺澗梅龍脊橋邉鶴膝幽一枝斜亞水横流自從識破胡笳曲吹徹黄昏不解愁謝文思徐敬伯見訪半山徐敬伯薄宦在中都栁舎偷閒到村醪就近沽易添詩債負難得醉工夫却羡漁樵叟雖貧一事無即事春漲侵髙岸春雲裹亂山倒遷楊栁活斜倚桔橰閒世味老方淡花時晴最慳東風嗔嬾動故故撼柴闗重訪白石長安惟白石與我最相闗毎到難逢面翻思懶下山欲歸愁路逺小住待君還盡日㸔幽桂無人似我閒逹摩渡蘆像一言巳出駟難追頼得君王放過伊楊子江心杭折葦浪頭何似問頭危収白扁豆因得二首齒髪中年態丘園素隐心因栽白扁豆欲當紫團參箧筥収繁莢忩扉失茂隂蕭蕭簷外竹抱蔓替余吟古香無伴侣一榻共雲分磵水塘頭過樵欹枕上聞余生聊自適此意與誰論落葉如相慰時敲月下門仲春初二絶落梅如雪雨如麻最怕春寒是杏花病後不能涓滴飲可憐芳信到貧家初交二月草蒙茸隣里紛紛去折蓬栁下閉門非嬾出苦無筋力趂兒童湖上夜㱕陌上紅塵歇湖中翠靄生定鐘山寺逈新月夜船清蛙亂鳴方急鷗閒睡不驚兒曹知我到認得打門聲聞鳩蟄動猶寒在鳩鳴恰睡餘素傳鷹羽化多占鵲巢居報我晴何用憐渠拙自如年年偏感處風急杏花初迎燕咫尺春三月尋常百姓家為迎新燕入不下舊簾遮翅濕沾㣲雨泥香帶落花巢成雛長大相伴過年華玩蝶粉翅來何許春風卒未休衆芳皆舊識㣲雨是新愁鬭舞圍墻角貪香綴蕊頭與花俱不語相可自風流聞杜鵑望帝知何苦催歸不自禁竄身依樹密啼血染花深細雨離人淚逰絲蕩子心青山眀月夜老耳最知音湖上觀栁偶記龍泉先生勾春栁一絲之句感而有述㫁槎無葉又無枝得似勾春栁一絲不是盡船栖泊處白鷗飛下立多時嘗青梅疎影横斜處匆匆入夏㸔緑隂遮得暗青子結來酸因病全疎酒如癡猶凭䦨楊花無藉在風急正漫漫開井小圃新穿土中藏一丈空山腰泉脉透井口樹隂蒙洗藥先資用煎茶巳見功甘凉羞自薦汲許四隣同龍井龍䕶深潭草木昏㫁碑元祐典刑存蜀仙巳去吳僧少嶺上松篁亦㫁魂江上連天芳草兩漫漫贏得鷗邉野水寛花欲盡時風撲起栁綿無力䕶春寒望越懷親髙帝陵邉我故廬白雲慘淡帶蒼梧歸心政與江流動更著青山隔岸呼寄輔漢卿憶殺平生輔漢卿武夷山裏話寒更不知新嵗還家未白髪衝冠有㡬莖訪端叔提幹月趂潮頭上山隨柂尾行大江中夜滿雙櫓半空鳴鴈冷來無㡬鷗清睡不成平生師友地此夕最闗情山中題古墓冡荒無樹亦無碑土面磚㾗似灼龜壞道尚存翁仲守傳家知是子孫誰文成東海終難料欲錮南山最可悲要寄此情浮世去臨流説與落花知題謝耕道一犁春雨圖耿耿思田舎悠悠倚釣竿一犁歌短闋十口飯長安老覺驅馳倦生知稼穡難畫圖詩巻在留與後人看即事暮年居桞下終日閉柴門壁為題詩暗池因洗硯渾閒知真冨貴醉到古乾坤回首長安道無言只斷魂偶成始参龍象種終現馬牛身再整衝冠髻難㤀漉酒巾㪚花天上女撥草道中人寄語林和靖非翁不卜鄰竹此君别後稍添丁留得清風鎮户庭老鬢不禁霜㸃綴舊隣多似樹凋零一竿帯雪寒垂釣数畆連苔晝掩扄此話有誰堪委似㡬回無語向青青蓬居咏枇杷早誦相如賦知渠舊姓盧花香氷裏見風味藥中須細雨同梅熟清聲混樂呼山禽嗔老子拍竹䕶金珠元夕天街夜鼔徹雲霄一望星河影動搖佳節無如元夕盛老懐不似少年豪紅塵巷陌青絲鞚明月樓臺紫玉簫誰料南坡招野叟詩肩相對兩峰高簡道安相將除夜南風起鴈已聲聲向北飛驟暖應知為雪骨痩年終不似冬肥日來病可方開酒節下春回稍減衣正好伴公湖上去孤山觀裏看梅歸澗泉招飲次日乃生朝平生南磵古遺民初度招呼我輩人每聽謔談須絶倒極知老氣正輪囷杯盤滿座添燈火兒女成行勸主賔但願吾儕似梅栁年年相見一回新平居遣興隔籬人語自喧嘲𦂳閉苔扉不許敲談塵帶塵懸屋角牽牛承露上林梢投閒得計心常足擬古成編手自抄風雨欲來偏感處蟻先移穴鵲移巢桃花洞裏桃花自古初人間塵事幾乘除重來漁父難相覔前度劉郎未忍疎畫檝迎逢春女渡采符供奉嵗朝書嫣然自共幽篁語占盡風光奈得渠偶題緑樹何稠叠清風稍羡餘枕縈雲片片簾透雨疎疎修筧通泉壑殘碑出野鉏丘陵知幾變耕稼雜陶漁西湖泛舟入靈隱山晴嵐漠漠水溶溶落葉遮船翠盖重秋色盡為漁者占山光多向道人濃雲連合抱前村樹澗繞飛來小朶峰送罷夕陽迎素月樓臺高下自鳴鐘梅花寄逺含芳别隴頭塵沙漠漠去無休誰招青塚千年魄散作黄昏萬斛愁畫角霜清腸屢斷花光墨淡影空留年年最憶前村夜一段孤明雪亦羞幽居逺懐日與靜相宜山色窺簾澗撼扉野草自花聊獻笑重雲不雨漫垂衣人間事業難爭長睡裏工夫獨造㣲却怪䝉莊猶寐語夢為蝴蝶未忘機秋日湖西閒泛雨洗千峰曉波涵萬頃秋菱花開古鏡蓮葉度輕舟思逺人誰識身閒世不収望中時得句倚櫂雜吳謳郊園避暑有暑猶當避無憂可得忘竹疎身共痩湖近意先凉靜勝寜須奕幽酣不待觴還同殘夢樂炙背負朝陽小峰行樂却望北山霜高羣木落湖上數峰秋野笛歸牛徑烟蓑宿鷺州望中多隱約佳處小遲留百嵗無虚日能堪幾度㳺蝶黛拂雙眉粉襯毫翅烘晴日伴相遭戯勾穉子從花逺恐惹㳺絲莫鬭高栩栩倐來仍易散深深交舞為誰勞吴王花草膝王筆千載風流敵楚騷杏花陌上春泥苦未乾絳唇漸吐不禁寒海棠向晚教誰伴山㡌衝風每自看聲好最憐清曉賣味甘長記緑隂團年年過雨臙脂落時序闗心有幾般林間石摩挲只作釣磯看相伴秦翁且住山霜洗舊稜人共痩蘚侵孤韻鶴同閒因思樵牧分爭處已過唐虞揖遜間風月滿林時憩寂三生幽事夢中還小隱自題水拍荒籬外山攅落照邊鴉鴉乘犢去鴨鴨伴鷗眠思淡秋雲薄情高隴月圓武陵知避世初不為求仙夏日池上㣲波漾漾雨濛濛岸脚烟莎間水葓照影已無雙鬢緑闗心猶有一絲風鴛鴦對浴紅衣撲菡萏相親翠蓋籠醉舞夢吟皆勝處箇中非異亦非同孤山後冩望凭髙每歎昔人非空有羣峯礙落暉大雅風流誰舉似長安秋草又衰㣲寒花負約開猶孄幽鳥㤀機趂不飛來往半生堪記處西村燈火夜船歸小舟萬頃波中獨釣身短艙低屋舊絲綸自憐清夜歌明月誰共滄洲來白蘋梅花桃李麄疎合負荆嵗寒標格許誰并花中有道須稱最天下無香可鬭清倚竹向人如少訢臨流窺影更多情何當喚取湘纍起伴我空山茹落英孤山後舟中冩望水接遥空分外寛孤山月出静中看疑從弱水移圓嶠似共姮娥住廣寒秋雨秋風初過後荷花荷葉半凋殘西村数㸃歸鴉濕老子新題墨未乾酬畫上人石湖春望蕩蕩春風草木香茫茫澤國水雲長鶯來占桞為歌院蝶去㝷花作醉鄉閒與物情聊品藻老於文字孏㝷行望中别有闗情處㡬度朝湖村晚興殘霞伴孤鶩晚燒雜斜暉秋向詩中出人從畫裏歸桞塘雙漿急茆舍一燈㣲小􅖼穿籬入蒲篷正擁扉雪後雪中多日静湖上少人逰秃樹花為市斷槎鷗當舟一杯殘臘酒萬古夕陽愁冨貴非吾願葛天雲正浮冷蘂通幽信孤山欠㡬遭杯因寒更滿句到淡方髙雪滴晴簷雨松翻夜􅊤濤布衾雖似銕猶念早趨朝臘雪片片嘉平瑞無聲有耿光來雖成頃刻醸亦費商量天闊花無頼風休絮不狂孤山林處士魂在隴頭香和子舒冷泉夜坐亭空山盡入人静夜初分喬木隂遮月清泉影浸雲不題波上葉只採磵中芹澗水令人憶何當入郡聞宿裴庵一徑松杉逈成隂見日稀山晴僧盡出風暖燕交飛結子花抛樹䦨人犬䕶扉閒看山月上清坐更添衣荅趙紫芝九月東離嘉長安了嵗華未登揚子渡先訪葛翁家天作今朝雪燈開昨夜花一杯能强飲不必問丹砂簡趙紫芝紫芝雖漫仕五字巳專城清坐有仙􅇧苦吟無宦情嚢因詩句重分與酒杯輕所好煎茶外燒香過一生清明前四月泛湖繞岸堆青嶂逰船滿緑波樓臺臨水近楊桞占春多老去誰同調尊前且放歌韶華能㡬日隨棹巳新荷送薛子舒船官憶君江上去船重載書多學乃從吾好閒應喜客過薫風新緑樹明月舊滄波自古闗情處相思入詠歌訪紫芝回與子舒集君参唐句法親得浪仙衣薄宦因吟苦髙風與世違春寒留夜飲月黒借燈歸共隱知何日空山老蕨薇即事用天竺韻寒食少逢天氣佳十朝九日雨如麻新巢唯有燕生子小巷已無人賣花夏日曉荷承墜露晚岫障斜陽樹下池常䕃水邉風最凉蝉移驚鵲近鷺起得魚忙獨坐觀羣動閒消夏日長雜詩下竺山前打一遭丁寕門子看溪橋恐驚繞澗梅花落莫遣行人語笑髙雨中梅雨朝仍暮蓮塘夏似秋水髙侵樹脚屋漏滴人頭歇晝厨烟出占晴礎汗収羣山思㑹面扶病一登樓元夕元宵有月便無愁已是新年第一籌説與素娥從此去只須依様做中秋送薛子舒南渡今何似中流欲濟船雖慿人擊楫要若水行川竹木如山積桑田與海連吳宫猶可問白鳥暮推煙海邑青龍鎮船官野鶴身誰知貴公子却是苦吟人二陸多遺迹三髙屬近隣新篇因弔古時寄葛天民次紫芝韻欽羡私居好樓深夏必凉小忩通逺岫古木蔽斜陽露檻安花斛塵編滿竹牀如君清到骨只合静焚香小亭小亭終日對幽叢兀坐無言似定中蒼蘚静連湘竹紫緑隂深映蜀葵紅猫來戯捉穿花蝶雀下偷衘巻葉蟲斜照尚多髙桞少明年更欲種梧桐上已呈嚴叟時俗常談已㫁霜雨寒翻著絮衣裳花枝照眼堂堂去茗椀闗心故故香楊桞稍傳鶯割據茒茨敢望燕商量舊遊莫誦蘭亭語自覺中年易感傷荷葉浦中急雨捎荷分外奇珠璣狼籍錦紛披下塘六月闗心處西塞扁舟入手時却傍青蘆深處宿還思白石去年詩平生浩蕩烟波趣月淡風㣲只自知贈眇目道人説相道人只具一隻眼覿面全提格外機塵裏神仙誰做得歸來試舉問麻衣戊辰夏五過抱朴巖北窻隱隱透南薫老子前身是此君冷入魚腮池面雨静連禽語樹頭雲苔因覔句行來破石為觀空坐得温時事自多無耳聽長安雖近不曾聞元夕西陵橋觀月年頭半月雪漫漫飬就姮娥玉一團老子今宵奇絶處西陵橋上獨凭闌雨中郊外暖氣先回宿草根青青行可藉芳樽未須著意催花桞且為乾坤補燒㾗正月二日小巷春隂獨掩扉峭寒著盡過冬衣老來情緒無多子禁得梅花似雪飛正月二十七雨中過蘇堤一堤楊桞占春風桞外羣山細雨中人苦未晴渾不到只宜老眼看空濛清明日訪白石不值花薺懸燈桞挿簷老懐那復似􅄳甜畫船巳載先生去燕子無人自入簾送劉僧善行西望羣山碧入吳故人一笠片雲俱東風不㫁村村桞展盡陽闗送客圖湖堤晚歩照影憐寒水闗情祭夕陽雪天慳欠冷年近日添長好句誰相寄浮生各自忙有身聊頓放無事可思量懐天竺磵梅根在巖邊結枝從水際横此花殊近道凡木欠修行宻雪籠幽片踈篁倚痩莖那時香不淺憶我語無生桞下即事老桞中間野岸濵水清常照樹邉身白鷗黄鳥相㤀乆來徃如今不避人睡少睡少秋難曉吟多食愈貧南柯無近闕差盡夢中人湖上新秋十里荷風蓋盡傾城中憶殺水邉清催詩未用西湖雨且送新凉入帝城六月一日同姜白石泛湖六月西湖帯雨山小舟終日傍鷗間風煙如許闗情甚賔主相推下語難㡬㸃送君歸大雅一凉今夜滿長安江湖逺思知多少歸去風前冬倚䦨正月十二日夜姚江斷岸春風峭空江夜雨清蕭疎篷上㸃彷彿葉間聲今古雙眸冷乾坤一棹輕鬢從湖海白誰識謝郎情雨中獨酌平生寡合雖竭斗㡬曽自飲一杯酒不因風月與湖山更為松篁與花桞今夕何夕風雨來知儂渇肺生秋埃麹生三緘忽自薦請為風雨聊一開老夫呼前呼未了死生脱㡌傾懐抱風雨横斜入坐中賔主淋漓俱醉倒須㬰風止雨亦休主人送客凝雙眸葛天無懐不可状但覺兩耳風颼颼匆匆便是中秋節更與麴生替地説此夜寕容著雜賔一尊只辨澆明月水仙玉潤金寒窈窕身翩翩翠衲挽青春水晶宫裏成仙女香醉山中得道人朔雪㡬回埋不死南洲一出净無塵朴翁老矣誰同調相對無言意轉親兩宋名賢小集巻二百八十五
