body:
  text: 兩宋名賢小集巻二百八十二宋陳思編元陳世隆補可齋詩集李曽伯字長孺號可齋懐州人寓居嘉興寳祐中第進士天才卓絶儒而知兵宦轍遍天下所至得將士心仕至觀文殿學士贈少保開府儀同三司曽伯初與賈似道俱為閫帥邉境之事知無不言似道嫉之不竟其用有可齋類藁庚戌過浯溪讀中興碑峿山一何青浯水一何緑上有唐朝碑蒼崖與天矗清廟倣遺音靈武號實録其筆走風雷其文貴金玉曽經兩賢手足耀千載目後來紀名氏全鑱後且續豈無黄絹詞中寓白圭讀一詞不敢措我懼此碑辱雖然勿泥古詠嘆豈不足嶽將降甫申吾皇車攻復將墨東海水且汗南山竹勒功岱嵩頂豈曰清溪曲已亥題茅山玉晨觀烟雲作嶂松作關夜深迫人星斗寒分明巳在天上坐不可更作人間看須臾睡去復睡覺髣髴前身在巖壑洞門鎻鑰呼未譍時有天香暗飄落登郢州四望亭夐出烟塵表乾坤指顧中数峰連野迥一水與天通沙外迎孤鶩雲邉数亂鴻家山在何許心與大江東登閬州錦屏山乆識屏山靣今朝得勝逰橋梁横古渡樹影倒中流風定春檣度煙輕晚市収凭欄誰領觧一鷺㸃沙洲淮西幕自皂口入潁道間竟日百餘里相逢三数家平岡盡茅葦沃壌舊桑麻短樹巢歸燕荒城宿亂鴉興亡誰與問馬首夕陽斜小亭閒止草草家林適時時歩屐過跨流通略彴枕岸擬䍧牱牆外千竿竹亭隂数畆荷年豐遂閒止老境足婆娑招里巷諸友和韻小有家林適歸來已恨遲引杯懐楚舞飽飯和陶詩慷慨多新語綢繆半舊知夜深橋雪滑亟命短笻支出郊劭農口占小約賔僚集相招父老耕寺依青帯住人在翠帷行疊嶂堆春色㣲雲䕶午晴時康田里樂歸騎踏花輕禁烟前一日招幕屬小集林提幹有詩和韻草草登樓適英流邁昔賢詩篇長慶集人物永和年訪古冝聨社傷春又禁煙青帘家酒賤賸飲莫論錢桂林即事一日四時具從來五嶺然留連落花雨依約熟梅天瘴重常隨箔春深未脱綿新來那戒飲未夜已思眠月峡城樓雲羃前溪洞烟荒隔㟁城秋旗雜山色曉角帯江聲駐騎須邉静維舟待峡平掀髯聊徙倚一雁楚天横首夏而有秋意纔過清和候凄然感旅懐新蛩迎古砌落葉滿前堦葛葉夏落榴火春仍駐槐屯午自佳慿詩寄風土歸以語朋儕宿中洞梅老傲前嶺梅疎卧淺溪避風巢上鵲喚雨竹間鷄野迥夕猶牧田乾春未犁路遥人倦甚只向近林棲過衡陽晚宿雨後春寒力山前夕照斜身猶㝷壘燕聲雜宿林鴉過嶺尚十里隔春能㡬家母嫌茅店惡窻下有梅花將到永州宿村舍野宿孤村迥山行十里荒犢眠新草壌馬踏落梅香入眼春晴薄打頭風勢揚莫嗟登陟苦明日看瀟湘入清湘界漸近湘山境土風清且饒林巒接墟市水竹帯溪橋焙出新茶煮帘垂老酒招春和民氣樂㡬日是花朝寕國道間喜晴怪得虚簷寂溜聲起來雲淡月㣲明只消一夜西風力盡埽千山宿霧清農舍少酬終歳望客途擬過小春晴枝禽亦似欣欣意飛入煙林自在鳴利州登棧道足跡初來劒北州試登危棧瞰江流萬山西接地窮處一水東歸天盡頭欲訪崤函無健馬相忘楚漢付輕鷗丈夫要了中原事未及持竿老釣舟簡項仲宗㳺亭臯試從沙渚入荆城十里金堤掌様平曉露香留紅芰溼午風清逐白蘋生桞邉繋馬頻沽酒沙際呼魚旋作羹所欠直惟佳客耳明朝能暇輙偕行丙午九日將過陽羡偶成年年秋晚對風沙今近重陽喜在家自斷此生甘皓首能消㡬度看黄花閒身頗覺便笻竹醉態都忘脱㡌紗且問小舟溪上去飛鷗数㸃夕陽斜題宜興菴壁二首淳祐庚戌覃懐李曽伯因觀農來此得四十字是日㣲風扇和輕雲閣雨千峯翠滴四野緑秀枝禽對語春意駘蕩無極徜徉乆之緩轡而去賔佐四明史偉之廬陵曽垓眉山楊埏東嘉林拾三山卓炎于廬陵王真孫長沙胡盛盱江周子榮潼川楊牧之清湘滕處厚續至老龍昔未蛻嘗蟄此山中霖雨春疇足風雲夜壑空兩厓髙下倚一逕徃來通不願千金劑惟祈百穀豊遊千山觀有序河内李曽伯再牧桂之明年實開慶改元上命三衢柴士表視邉隘竣事將還夏六月二十一日約憲倉四明豐茝兵師江光朱廣用符離朱煥載酒千山觀訪招隐過仙奕感今懐昔風物固無恙也時火傘張空水花蘸碧相與徜徉其間清不受暑因得四十字并識諸石自從來嶺嶠豈暇訪湖山緹綺行邉了戎旗䕶戍閒相看羣玉外一笑六郎間囬首西風静何愁老漢關游桂林西山玉筍環星拱青螺帯霧披山為天下勝境占嶺南竒援筆難窮者慿闌盡目之不因無世累築室在於斯善權竒觀自從團結此山川便作人間小洞天佛母林深從古盛仙翁宅近至今傳青分三洞中開户白瀉雙巖下出泉我自有縁聊乞取萬松隂裏一牛眠兩宋名賢小集巻二百八十二
