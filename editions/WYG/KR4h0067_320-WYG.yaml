body:
  text: 兩宋名賢小集巻三百二十宋陳思編元陳世隆補學吟朱南杰古徐人官監鎮攝華亭事往來吴松間所與倡和俱一時知名者其詩似近樸直然率意處亦具㤀言自足之趣學吟藁一巻自䟦云非敢言詩􅂓以紀時固不止是惟録其可以示人者垂虹亭憑虛蝃蝀逼人寒中有危亭百尺寛天接水腰呈絶境風回帆脚漲狂瀾半篙落日吟將就一抹晴烟畫亦難不是酒杯今日窄直須邀月上䦨干舟中過平江蹤跡平生馬少游功名外物等虛舟不多飲酒常成醉自在吟詩秪解愁已幸一帆離錫邑更寛兩日到杭州曉来忽見盤門塔疑是西湖大佛頭楓橋灣酒家有楓橋千古壓波光之句用韻以紀所見楓橋酒味勝官坊隨分紅裙取次粧月照乍圓新氣象僧閒不減舊風光一横地勢橋分水兩岸人家競採桑惟有塔鈴太多管笑人来往自玎璫出嘉興舟出嘉禾五里城僧樓山塔互崢嶸酒旗密比隨風舞漁網横拖漾日晴畫舫貴人帆去穩翠衣遊女着来輕山歌已接長河堰到得臨平月又明過長河堰帆指長河風力微漁舟箇箇有魚歸一聲水際笛三弄幾處梅邊竹四圍桑伐逺揚􅁞事熟花消濃豓桞綿飛西河只在錢塘外又見孤山梅子肥同劉朋山遊湖邊作誰立西湖造化功峰分南北境相通四時風物絃歌裡兩岸人家圖畫中堤桞送迎忘爾汝棹聲来往自西東風波便作恩波看此樂君王與我同同陳明叔遊湖作四月湖邊冷若秋先賢堂下繫扁舟山頭積翠来新意波面飄紅憶舊游無奈楊花欺倦客已多荷葉護輕舟鷗邊誰道春歸了猶有一聲黄栗留和吴􅷋􅀈韻春囘筆底露潛機為怯高吟且遯肥又見牛鞭春到日羞披鶉結舊来衣雪隨着處分單厚梅不闗人自密稀歸計商量今始定樂哉心事看雲飛春日呈􅷋􅀈朝来慚愧又逢春總把官身換客身堤桞未歸新氣象忩梅猶帶舊精神村居牢落誰沽我吏醉清閒却笑人打叠故書排日去一尊隨意踏芳塵南園不與昔時同綿亘規模十里通萬石倚山如踞虎一亭跨水似垂虹虛堂舊占梅邊月曲徑新添竹外風詩料滿前吟不盡主人尊酒未應空壽實齋侍郎王先生崧高維嶽誦生申整頓乾坤屬舊臣天下安危關出處性中存養自真純便歸紫槖酬公論已草黄麻授正人天為皇家錫難老願將霖雨福斯民七夕呈坐間諸友時留平江宿和靖書院次日葉已鳴秋夜漸長年年織女會牛郎龍梭暫歇七襄駕雲袖輕飄百和香輸我晚涼和月飲任渠明發渡河忙要知工巧原無用樂得身閒拙不妨和吴梅庵同登白龍對月韻秋容滿目帶微寒帆穩蘭舟駕碧瀾照我湖光天共色襲人花氣露初乾笑談紅袖日中舞驚動蒼龍水底蟠最是一清無着處却慚狼籍草杯盤餞徐衍道知縣事業文章屬當家刃游餘地宰金沙挽囘凶歲作豐稔安集流民絶嘆嗟兩載秋霜威盗賊一犂春雨沃桑麻寛民實意言難盡勝種河陽滿縣花餞海鹽史後樂秦溪邑大號難治後樂三年以德為海濶有樓還舊觀堂深無日不新詩虛舟祗載来時物實惠常教去後思相業真傳公不忝蒼生况是望霖時朱知鎮戎服警盗不憚雪夜酒庫在鎮外不得與戲呈戎裝元不礙儒冠盗賊潛窺膽自寒金鼓聲聞三里外旌旗影庇四民安肯從協力多君子愧不同盟是酒官和氣釀成年可卜曉来喜見雪漫漫除夜懐劉朋山為坑司幹官失脚糟邱又一春歲除牢落頗闗情誰家不換桃符句比屋相聞爆竹聲舊友未知能鑄冶新年宜入孰陶成来朝無甚人交往樂得􅋜􅋜睡到明夜坐書懐挑燈看徹後村詩忽爾憧憧有所思不待人言知已錯要知分定盍如斯但求甘旨安無事浪説榮華自有時倒指新篘當已熟且煨閩芋一中之曉發嘉興府曉發嘉興府人家門未開閘闗船側過水漲堰平推濃緑暗官桞肥紅綻野梅城中簫鼓發知是使君回舟過吴江縣寺滿吴江縣鐘聲兩岸分買魚嫌少室沽酒欠文君平地橋邊浪無心嶺外雲篙人添德色為策過湖勲泊崇德堰未抵長河先從古縣過詩舟尋舊岸酒市鬻新歌傍水人家密依山僧寺多夷猶觀未足無奈月明何東新橋值雪間闗入帝鄉飛雪斷羈腸天地皆明白山川忽老蒼栁眉遮舊影梅額上新粧客裏急先務河邊問老航甲辰入京春深猶雪和吴嘯􅀈二首歲事客裏過今年祗去年甘貧長寂寂知已孰拳拳花豔卑崇幛江流美祖鞭家山芳意動野騎盍言還掀髯論時事莫問是邪非緑句池邊得青陽栁外歸夜深嫌薄酒春淺怯單衣門巷雪撩亂低頭且掩扉富民犯米四十字以喻之彼此有人心人心即訟庭初無深利害倒自費調停私意生荆棘公家有典刑落便宜是益座右可刋銘孤山觀梅費盡年年造化功精神全在雪霜中一枝映帶忩前月消得逋仙作主翁陳梅隱求詩早歲走江湖那堪又歲除隱梅非活計行李盍寧居自有珠璣集不攜朝貢書酬君無好語索笑謾躊躇林竹翁求䟦何物耐交情林翁竹借名霜寒不改操風動鎮長清袖裡森珠玉胷中富甲兵江湖莫相笑已播逸民聲書考戊申春人説宦途好元来是險途不親真利害難話細工夫下考初書一中心有愧無官卑何展布三載且糊塗劉直孺示拙逸詩編且命着語拙是愚中来逸與怠相比限界固分明差忒亦容易人心自有機天下本無事更參大學章終始一誠意尹樓岩留華亭風雷昨夜揭忩紗未信樓岩不憶家和靖山頭春未了莫因尋鶴負梅花攝事華亭歸舟口占挈来司市正花時補陋支傾費品題顧影自慙身是客片帆又逐曉風西延陵道中即事三絶筍輿取道自吴干東作村村喜一般已拜勸農田畯賜舊租何似放令寛人家密簇近溪旁舊袂青裙競採桑相喚相呼相嘆息繭絲歲歲為官忙小立青帘賣酒家味雖薄薄勝空茶今年春滿疎籬外數㸃輕紅出杏花題吴梅庵和靖索句圖童寒鶴冷雪霏霏正是先生得句時一段孤清圖不盡梅花從此厭人詩入京客懐醉殺也醒醒昨夜思家夢幾驚道阻且長無信息只將喜鵲騐安平横林遇雨斷當篙師到錫山片雲尼我竹林間短篷展轉渾無寐祗聽郵鈴去復還雨濕桅竿風颭帆不禁篷漏滴衣單蒼頭更説無眠處始信人生行路難自鎮入庫十二里皆山徑邢侯以馬相招道間口占問梅蹇驢突兀萬山間欲雨還晴雪又慳一路梅花尋不見多應開向小溪彎烟雨樓錦繡初開城角東規模綿亘境相通一亭舊占梅邊月兩徑新添竹外風山色有無烟變態湖光濃淡雨收功凭闌正好催歸去横笛數聲蘆葦中兩宋名賢小集巻三百二十
