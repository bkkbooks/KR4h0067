body:
  text: 兩宋名賢小集巻二百五十五宋陳思編元陳世隆補清獻集杜範字成之黄巖人㓜孤能􅋵志勵行從從祖南湖方山二先生學以承考亭朱夫子之傳嘉定中舉進士調金壇尉冄為􅄔州司法入為御史彈劾無所避與丞相鄭清之忤範復奏鄭之私人李鳴復等賄賂交結改起居郎範以前奏未見施行不拜命徑渡江歸授江東提㸃刑獄尋改浙西嘉熙二年改知寧國嵗飢捐俸發倉多所賑給四年還朝極言時事之失以吏部侍郎兼侍講尋同知樞密院事時鳴復亦在政府不屑與共事去之淳祐四年詔即家拜右丞相挺身當國年八旬竟薨于位贈少傅謚清獻事蹟具載國史所著有古律詩歌詞五巻襍文六巻奏藁十巻外制三巻進故事五巻經筵講義三巻夏夜雲月不見有感天色未清霽浮雲翳層空朦朧玉盤質髣髴擘絮中瓊宇本瑩徹一髪不可容胡為受掩葢萬象歸冥䝉誰能召風伯掃氛有餘功中天懸清光娟娟萬里同病中和東里寺中作陋質百不能補敗倚師友東里丈人行幸添巾履後君詩如秋霽峭絶森碧岫又如萬古壑潺湲瀉寒溜一手轉機軸四顧無匹偶明窻一披讀張膽不論斗願分有餘光屢辱自醉酒徂暑變新凉一氣分六九逼仄塵區間蒸鬱未改舊心逐林泉佳病滋面目醜起來强力貧寧敢繼富有募兵召募古來有今日何其艱文書急如雨取辦都保間百夫不當十一夫費千鐶恐彼嗜利徒無能禦國患老母與少婦蓬頭走江干挽之不得留悲泣聲徹天母曰我壮子婦曰我健夫衣裳破無補田園荒未鋤一朝棄我去饑寒我何如我欲従汝行生死同一隅抑恐惰軍氣累汝重汝辜今業己分離把袂略須臾拭淚為汝言汝亦無我虞戮力濟王功期為壯士模戊辰冬和湯南萬韻春初走京華秋杪歸舊廬簡編廢已乆開巻澀已疎誰能擊其䝉石田或可膄鴈山有佳士讀盡天下書足跡半九州不憚道里迂陋邦何足臨而亦來我居相從一樽酒未厭園中蔬笑談欣有合浩若縦壑魚人生惟所適所適各有途胸中茍不迷到處皆通衢簞瓢有真樂顔氏何其臞役役嗟我生未知終焉圖論交須論心所論在不渝願君示一語令我三反隅君無金玉音誦一束生芻丁丑别金壇劉漫塘黄綺避世翁萬乗輕商顔翻然爲羽翼國本安泰山出處義與比盛衰世相闗懐古誦考槃令人欲長歎崇山鬱嵯峩千章自交陰培塿植松柏斧斤日相尋物小固不容名大亦難任智哉甯夫子其愚非本心北風吹夏律草木塵沙昏枝葉曾未害根本難具論肉食謀何有家食徒殷勤誰能起東山掃翳扶朝暾川澤升為雨霈然周四郊有水行地中溉灌亦良勞勢力固有限戛哉加分毫為義分内耳誰言薄雲髙調章道之華于世非少補施之匪其宜文繡被泥土自昔重立言一語萬鈞弩誰其厭來者是非實千古女蘿去長松籍籍紛委地矇瞍辭詔相十步九顛躓弱昧慙陋質先生未終棄再拜願有聞服膺敢失墜人生玩嵗月世事變朝暮三年在門牆一日泣岐路窻前長新緑生意自呈露願君日强飯安排濟時具方山和篇再和韻殷勤里社間談笑文字㑹平生一樽酒無慮千百醉問梅窮澗岡樂事此其最風霜盡木未氷雪對户外誰其念岑寂自得以顛沛嵗寒二三友已不數蒼檜卓彼方山翁自許出行輩古心味𤣥酒于世百不嗜少小誦佳篇搜句亦奇偉年來乆不作吾黨㡬喪氣珠璧忽墮前疇昔曾夢寐三咏結束語坐令百感至來者恐未然往者非所計汗青㡬名節徒起千載喟張上舍送望水偶成小詩我家東南隅去海不踰咫招潮厭鮮美望水快珍脆朅來雙溪上河魚僅青鯉泥滓漬膚肉强食輒三噦此物從何來對之驚且喜雖然餒敗質尚餘江海味令人憶故鄉沽酒為一醉閒坐有感偶成古風簡劉㑹之髙吉父康司理虞夏㡬百載繼以周禮樂洋洋雅頌音後世誰能作井疆貧富均薄海詠康樂姬公同聖賢積累亦不薄宜其垂萬代整整守規矱寧知不數傳板蕩已非昨丘賦魯史書田疇鄭謗作滕君漫憂勤畢戰空唯諾盛古猶有憾此豈易商𣙜矧今千載後而欲强復剥州縣工罟穽黔黎惴溝壑世道日澆訛禁厲不可縛我嘗三太息浮雲翳碧落為貧走塵埃豈解拯民瘼州家輕任使千鈞委羸惡勞瘁敢自愛恐負此邦託仁政安在哉名是意已錯治道去泰甚此論東州確人言寛一分所望恕且約嗟哉斯人生日巧亦日削俗吏事朱墨暴吏事鞭朴我把七篇書人笑謂迂學誰與輸此懐濁浪渺垠堮良月遊水樂乆矣聞水樂邂逅作此遊林立攢萬石曲逕穿深幽谽谺開古洞下有清淺流惜哉非古音噴薄皆人謀流觴飲山緑風鬢吹颼颼欲歸興未盡携手湖上樓斜陽獻萬状浩以百目收白鳥去復還翩翩良自由我本山林人對此多慙憂嵗月不我與晏閒其可偷便合作歸計老矣安所投世事皆漫爾政恐空白頭送羅季能赴興國向來與君别忽忽二十年君兹厲素節我已羞華顛轉物有元機掃翳還青天羣耳共聳聴明詔方改元篤意召諸老髙爵升衆賢執麾不可挽問君胡為然一氣纔作新萬卉皆争妍雪霜誰謂無松栢良自堅操心不厭危知機常慮先承流恵疲民調俗暢新絃送日徒京塵班春勝著鞭顧我足尚繫羡君翮方翩數里已云隔千里其可前有懐空感惻何時解拘攣卓哉漫塘翁邈在雲山邊煩君招衡門為我致問偏萬牛應莫回世事如風鳶鴈蕩東南富山水傑氣鍾鴈峯巨靈排屭贔妙力開鴻濛斷崖據險絶峭壁凌寒空分形獻萬状轉盼無一同或疊如錦纈或鑄如青銅或前如舞鳯或却如飛鴻或伏如卧虎或矯如遊龍並如兄語弟差如兒隨翁鋭如筆露穎岐如剪開鋒二湫分大小百靈儼西東古語聊近似天巧難形容我乆埋世埃幸此扳天風應接費耳目磈磊羅心胸有僧本儒家伴我追雲蹤攀躋不知勞指引殊未窮胡然便語别問之以涕従為渠遊興盡生我歸意濃出計無艸艸回途復怱怱還此未了縁邂逅須有逢送夏肯父赴補之子問行李䇿足遊上都晚風吹客袂話别聊躊躇朝家渇多士璧水來英儒子志横四海亦復隨羣趨磨礪强國䇿他時獻嘉謨卓彼漫塘翁一壑老壮圖萬牛挽不前世事付長吁君欲訪隠所為問今何如雪中成十一韻入冬多癘氣陽淺月令暢隠雷聲間作萬蟄驚塞向數日凝重陰雲同寒威壯飛瓊徧天宇色界鋪寳藏前此亦屢白玉瑞此其創緘運孰主張一雪壓千瘴紛紛富家兒羔酒醇金帳誰思道丐者雙脚不堪餉顧我雖甚貧可挾尚有纊早起願年豐共飽拜天貺天意然不然獨立為楚愴中秋夜客退觀月漫成檻外不數丈深窻藏丘壑璧月懸中天玉露下叢薄尺水澄秋光龜魚共余樂所樂亦伊何飲水良自覺恍若歸故山灑然謝羈絡明發将何之塵埃又如昨行也誰使之有此一大錯幸保寸心在舉頭望碧落登山述懐扙淚别妻子登山望歸舟舟逺望不及巖溜鳴咿嚘重趼坐絶頂晚色忽已稠凄其杜宇聲問我胡為留撫襟獨浩歎淚下不可收三年足别離此涙良有由區區駒隙中為形役不休為形役尚可為人役何求淵明獨何人我乃如拘囚親老方倚門甘㫖誰供羞子㓜未知學擇師誰與謀鬼蜮閃光怪虎豹嘷昏幽世路委叢棘吾道若綴旈豈無知我者應謂我心憂和劉㑹之野堂韻艸艸春又過凄晦風雨夕三年烏傷夢不斷一區宅台山在何許空有塵滿屐英英江夏公老龍蟠古澤尋勝著幽宇搜奇列佳石疏懶不出門亦復為渠役酒酣對崔嵬寸管凌千尺念我蕭寺中逺贈煩走力隠几讀妙句緬懐賔主席何當謝吏網足躡堂上客詠芙蓉與菊花秋光濃欲滴結束東籬花糝糝紛㸃綴戢戢相參差淵明太好事言樂酌流霞誰云制頽齡為與霜争華映水開芙蓉麗色如春葩漫以拒為名青女不能加持此問淵明何乃吝齒牙門外風如箭黄落滿天涯送子謹叔古道日凋敝人心競險薄風雨晦朝暮平陸變清壑歸來尋故廬六窻静猶昨殷勤時拂拭埃塵易侵剥此地寛且明休哉有餘樂聚首日嬉戲何乃遽言别回首十年間坐令肝膽裂東陽古佳地先民有遺烈為我一問之山寒水清絶無以持贈君髙秋千里月送趙寛堂兩片南山雲偶爾連空飛一去向空谷一留伴殘暉招招漸江渡激激風吹衣仰頭有鴻鵠孰使心事違何時黄山畔把酒話昨非新秋大火西流日秋風戸到時斷痕依淺水疊翠别髙枝氣每隨時改人應共物萎百年同一夢身後欲何為和澧洲喜雨韻秋色在何許浮嵐疊翠間江清雙鳥渡天濶片雲閒雅量追文舉新詩壓子山更深聴逺溜哦詠答濺濺次鄭府判金字韻巇嶇來北固邂逅識南金未覺人間役欣同物外心燈花殘夜半桂子落秋深細聴朱絃曲寥寥大雅音和十九兄梅韻空谷寒花好荒村野路長有懐尋往事無語攪枯腸老氣猶無恙幽姿只自香喜君歌白雪茂對此新陽道旁見梅一樹棲殘雪不禁春夜霜香飄非寳篆粉褪壓時糚且合收餘白應難待晚黄自便籬落好榛棘不相妨途中官身驚昨夢山店是回程郡事闗新舊人心屬送迎塵衫纔幸脱野服要須成世路如川險歸途却自平有感棒檄來兹邑勞勞兩載餘親庭千載隔家信十分疎有婦聞多病諸兒盡廢書低簷秋雨滴㸃㸃正愁予舟早行将至三界偶成辭京塵漸逺入越思逾清雨壑溪方漲風帆去復輕天光浮水濶山色帶雲横更問鄉闗路從今尚㡬程再次前韻晨炊浮早渡午夜過錢清越國移舟便曹娥上堰輕人言三界近共指一山横古剡明朝到籃輿數去程厭見塵泥汩喜看沙水清魚攅隈日暖鷗去帖波輕寒渡人來少閒舟岸與横漫須催去槳溪曲不論程即事官喜文書少塵迷嵗月遷豈無車可出儻有約宜堅傍水尋疎影裁詩讀細篇孤山須竟日莫去買遊船水簾谷巨崖森四立谺洞露前簷鳥道穿危磴虬松奮老髯巖髙全似砌水小不成簾雖倦猶貪看中宵澗雨添又和鄭府判韻荆璞照耀非常珍天衢整步凌通津與人軒闢破畦畛滿懐拍拍無非春我如櫪驥異逺道志在千里身未到朅來此地尋文盟平生心事為傾倒飽徳醉義樂有餘况有蘭玉芬庭除諧笑云云殊未厭盤餐夜半勞兵厨依依此情那忍去自恨塵鞍難乆駐佇看飛詔自天來殿前賸作摩空賦再次沈節推送春韻子規泣訴春山頭芳草連天不盡愁紫陌遊人在何處空有顰眉人倚樓溪上悠悠棹木蘭溪邊落紅紛斑斑嗟哉片片逐流水新篁忽長千琅玕多少閒愁推不去欲問春歸杳無處少年知己負心期尊酒従今樂事稀新秋少昊行秋正疾驅灑然凉色已侵膚翠空碧水涵髙下淡靄蒼煙半有無風露已經生慘戚菰蒲且欲慰斯須誰将霜竹横雲外似有悲聲與恨俱繼和嚴君壁上韻山舍榱楹朽蠧餘朅來小圃作閒居推移寧免人間世灑落還同心地初鷗鷺齊盟忘物我薜蘿交翠映簪裾恭惟不負傳心印已把浮生付六如己巳登王峰亭二首與君攜手上巒坡多少塵襟盡剖磨一鳥横邊秋靄淡片雲歸處夕陽多潮來萬里翻明練山簇千峰列翠螺此地不堪歸去早佇看明月漲金波杖黎無事歴危坡一片清寒鏡面磨極目盡時知水濶置身危處見秋多此時不著登山屐到處還成測海螺遥想髙人閒物外祗應不與世同波次韻艸堂心事崔嵬日不如愁端叢起蔓難圖殘山剰水風聲怨落日微雲鴈影孤妙句聳聞驚昨夢寒窻細讀慰來蘇許身已在羲皇上降志猶能念昔吾又和鄭府判侯字韻野人漫學事王侯宦牒相従得俊遊著眼丹鉛常午夜轉頭萸菊已深秋㡬多陳迹成今古莫對清樽話去留自幸趨陪揮玉麈如今何止識荆州得雪稱賀馬上得五十六字昨夜同雲猶未合朝來一色變山河料應天上梅花早吹落人間栁絮多酒興自憐今老矣詩腸無奈此時何銀杯逐馬天階路何事閒江伴釣蓑次趙貴方九里松獨行韻道機已熟絶隄閑縦步來尋興裏山殘雪㸃衣消酒醉晚風吹鬢帶詩還妙年羡子歡踪足卑宦愁余樂事慳安得相従塵網外快将如意碎青珊和六十叔一絶夕陽有意為人留斜映寒江著小舟逺目遥岑無限意不須蕭瑟賦悲秋和趙山甫海棠春風得意酌霞觴翠袖寧禁白露霜欲向月宫收賸馥曉窻强理背時糚次沈節推送春韻二首佳人憔悴怯春衣日暮樓髙酒力微流水落花無限恨千聲杜宇况催歸一年春事逐飛蓬燕語千愁許未通水竹誰家深院落捲簾凖擬納薰風劉上舍携酒有詩和其韻數過流年轉矚中宦塵休更問窮通君詩喚我塵埃夢孤驛清燈一笑同怱怱嵗事又更新一氣初回萬木春獨有江梅殊不覺凛然氷雪照詩人偶題雪外亂山才約畧雨中平野更凄迷有人支枕篷窻底卧看羣牛渡野溪代菊對未有淵明先有我何人喚我作淵明東籬宛在南山下誰向秋風管落英和髙吉父麥隴吹風餅餌香桑畦映日繭絲光晚春好誦歸田賦問汝何為兩鬢霜空明洞在黄巖縣莫訝青山小山因洞得名仙人騎鶴去留蹟在空明送湯仲熊國正以直去國朔風剪木末碩果懸孤危冥冥邈飛鴻異哉聞鳴䲭暮雲結愁陰送君江之湄去者挽莫留留者良自悲何當謝塵鞅鼔枻相追隨兩宋名賢小集巻二百五十五
