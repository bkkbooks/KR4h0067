body:
  text: 兩宋名賢小集巻一百九十六宋陳思編元陳世隆補林泉結契一王質字景文號雪山鄆州人寓居興國軍紹興三十年進士孝宗朝為樞密院編修官出判荆南府奉祠山居有雪山集紹陶錄山友辭拖白練身全白嘴㣲紅尾長尤鮮白聲清簡又有拖紅練通體深紅拖白練拖白練蒼翠隂中玉一片翻枝倒葉露㣲茫風動樹鳴忽不見穿向北穿向南山藤野蔓何能纒嗚呼此友兮可解顔溪山繚繞多林巒青菜子身青綠頭烏腦後一線細白泉圍之聲清急多苦吟又謂之碧蒿青菜子青菜子林靜山空倐驚耳闇中娟妙度清圓東林吟罷西林起葉青青菜青青飛到山深聲轉清嗚呼此友兮相㑹心蕭騷野響住寒林泥滑滑身焦黄雜黒斑㸃如雞而小聲焦急多鳴則有隂雨在篁篠間故又號竹雞泥滑滑泥滑滑林雨林風交颯颯蒼皮翠莢啄鮮香樹外行人何時歇山有菓山有蔬楓脂松膠香有餘嗚呼此友分慰所須野草山花滿地鋪黄栗留身黄而光鮮嘴紅而眉黒聲清圓善啄細青蟲如云動便不喫你黄栗留黄栗留寂寂寞寞傳聲幽桃花吹隨杏花起重疊春岡春樹稠耳聞之心蕭然花飛花落溪潺湲嗚呼此友兮真忘言空山無人春亦寒提壺蘆身麻斑如鷂而小觜彎聲清重初稍緩已迺大激烈提壺蘆提壺蘆東呼西叫聲不孤荳䓻花繁葡萄疎野香野氣薫薫麄過相煩為我擕攅砂㸃漆光纍纍嗚呼此友分堅相期山樊亂蕋霑皴皮屈陸兒身黒觜足皆黄頭有髽張翅有兩白團如球斂翅則隠如云鬼叫聲清急多傍人呈巧語屈陸兒屈陸兒元無屈陸何呼為雜樹停隂雜花靜相招相喚無人知屈兮陸陸兮屈凌亂衝花花綷綷嗚呼此友兮莫相疑相伴空山深掩扉山和尚身灰褐而長腦觜俱黒聲濁圓間若誦牟尼號者旋雜他聲山和尚山和尚低叢之下髙林上深飛撩動聲梢梢穠翠參差不能障不蘭若不招提丁丁啼罷還棲棲嗚呼此友兮堪同栖鮮枝潤葉漫蒼陂啄木兒身間黒白腹深紅又一種身間青黄腹白觜如錐啄蠧自飽啄木兒啄木兒壁壁剥剥尋幽期山樊深淨眠睡熟樹聲忽鳴林葉飛輕蹙蹙重督督山風槭槭聲漉漉嗚呼此友兮誠相知樹林要深不要稀蘄州鬼身黒觜足俱白聲清急别一聲不􅁼蘄州鬼如云奚秋觜蘄州鬼蘄州鬼江南淮北隔江水淮山巉巉深又深鬼哭狼頭險無比爾且鳴我且睡花草薫人令人醉嗚呼此友兮願相逢谷煙溪霧深重重百舌兒身黒觜足皆黄他禽善鳴者輙效之俄頃作數種審聴知其為皆此禽百舌兒百舌兒發口及時莫過時栁色花香皆可掇林光水光皆足娱花治舌栁治舌吟咏山風共山月嗚呼此友兮相追隨樹嶺一聲春夢歸不如歸去身灰褐啼極則倒挂春殘多啄紅苞故吻如染血秋深則化為鷂不如歸去不如歸去花稠草繁何不住春山春林煙景暮山花慘悽無意緒溪可飲林可啄鼓翅甘香且為樂嗚呼此友兮勿渝約月明滿野松毬落山樂官身全褐能作歌音又能作拍彈音如喤囉者聲清軟性極從容山樂官山樂官自歌自和閒追歡杉風梧月都清圓松煙竹露仍團圞林為筦溪為絃深山飛鳴相拍彈嗚呼此友兮宜相諳樹香樹粉山􅆴􅆴畫眉兒身褐眉細長而烏觜白形聲皆妍類百舌能雜音而此又能為歌舞畫眉兒畫眉兒林下何須更畫眉莽莽蘿蔓迷東西聲髙聲低聲總竒非真畫即真畫林刺藤梢時一挂嗚呼此友兮長相陪樹杪聲來樹欲飛雪錢子身白如飛流黄而大尾長頭上一㸃深黒極鮮未暮即栖見燈火即死又號見燈滅雪錢子雪錢子非雪非錢但相似天清雲淨雪驚飛樹聲纔定溪聲起只愛雪不愛錢梨花影下月明前嗚呼此友兮豈相違重花沓葉戀山枝白頭翁身間青腦上一暈深團一㸃鮮白飛上下不横斜又號打線子白頭翁白頭翁咀嚼淺紫掐深紅樹枝翻翻超山狖樹葉駁駁雕山蟲不斜飛不倒挂一絲擲上一絲下嗚呼此友兮久相同半銜蘿月半杉風㜑餅焦身褐聲焦急㣲清無調作三語初如云㜑餅焦次云不與吃末云歸家無消息後兩聲若㣲於初聲㜑餅焦㜑餅焦深山無草奚多勞青林窈㝠卧輾轉綠樹蓊鬱飛趙遥脆枝弱韌枝强聞呼㜑餅不聞香嗚呼此友兮頻相招暮煙漠漠風瀟瀟脱却破袴身褐立即無聲飛迺鳴雌雄相應先曰脱却後隨曰破袴聲無間斷又如云燒香撥火稍急類脱却破袴脱却破袴脱却破袴空潤溟濛濕交股層層山草雜山花刈穫衣裳總無數燒杉香燒楓香菌桂蔓椒紛衆芳嗚呼此友兮毋吾踈寒巢幽夢頻相呼郭公身黒聲稍緩如呼郭公音頗重稍急且䌓如呼布榖音頗清烈餘聲如呼郭婆郭公郭公上田下田催野翁嬋媛蒼翠錯青紅汪汪活水聲交通蚤布榖蚤収榖稻花垂垂香撲撲嗚呼此友兮真相識麻坡荳坡晚隂濕山鷓鴣身青翅赤觜黒足青如雞而小臆前有白團㸃背間有紫色赤毛多鳴即有雨稍緩則如云行不得哥哥山鷓鴣山鷓鴣林深濃淡交榮枯鈎輈格磔半雲木山谷轉深聲轉孤沙易行泥難行蚤呼春暗回春明嗚呼此友兮同所歸石藤屢罥山人衣兩宋名賢小集巻一百九十六
