body:
  text: 兩宋名賢小集巻十二宋陳思編元陳世隆補冦萊公集雨中書事一雨起前浦霏㣲向暮秋誰方眠釣艇我獨在江樓山晦峰巒隠烟凝島嶼幽何當見晴旭一得泛迴舟夜懐寄友生遥夜獨無趣恍然思故交泉聲飛石壁星影落蘅臯志在難低俗情閒任獻嘲秋山雖入望猶不似鄉郊秋夜懷歸背忩寒燭影沉沉楚客鄉思欲不禁板閣漏殘人自逺水螢光淡夜方深牢愁聞雨眠疎屋歸梦隨雲徹故林憶着烟村舊風景柿紅時莭又鳴砧夏夜閒書雨濛村落野梅黄茅閣閒吟水氣凉幽鳥逺聲來獨樹小荷疎影占前塘閒心終不忘漁釣澹分真宜習老莊報國自知無世用烟蓑何日卧清漳秋興浩然追憶館殿幽致偶成長句寄徐休學士軺車南去詠江天閒憶羣賢倍黯然御水莎青孤立鷺宫槐烟冷數聲蟬石渠吏散簾風静鳯闕雲歸霽景鮮幽致不知何日共君思惟賦帝京篇宿江西寺獨宿西林夜凝然静擁袍巫雲秋暝峽楚月冷生濤莎敗蛩猶噪鄉遥夢亦勞霜風開落葉還欲續離騷聞杜宇曽為深寃無處雪長年江上哭青春平林雨歇殘陽後愁殺天涯去國人巴東寒食春雨蕭蕭寒食天逺行猶在楚江邉人思故國迷殘照鳥隔深花語斷烟薄宦未能酬壯莭良時空自感流年因循未學陶潜興長見孤雲倍黯然春晩書事春盡江天景寂寥思鄉還共楚雲遥林花經雨香猶在堤栁無風絮自飄水國獨慚臨縣邑烟郊争合負漁樵青梅時節遲歸計且逐餘芳殢酒瓢月下懐故人清夜月初滿蘚庭吟更幽梧桐疎影老蟋蟀亂聲秋舊國情何極空江思欲流故人今底處危坐獨凝愁和趙瀆監丞贈隠士不愛簮裾陪盛列終年深隠養天機静聞風雨眠漁艇閒稱林泉掛道衣門接水村多野色鶴當莎徑立殘暉髙吟幽賞無羈束始覺趨時事已非雨夜書事離人聼積雨滴滴動鄉心故國程猶逺重門夜正深氣昏濛燼燭巢冷語棲禽遥想江南岸餘花委故林歸州留别傅君楊栁如絲拂畫橋此中留語欲魂銷還愁别後巴東館獨聽空江半夜潮秋晚閒書吟情自覺都無趣况復離居感物華厭讀羣書尋野徑閒收落葉煮山茶燒殘寒菊花猶在霜過香橙味轉加因想前朝重搔首不堪秋思極長沙聞笛平野人歸後孤城日落時西風聞一笛惆悵憶桓伊縣齋春書十二韵縣幽無俗事公退只髙吟江到荆門闊山連蜀國深峽雲長映日蠻雨易成霖羣雀鳴春院飢猿呌夜岑庭荒多古木地僻見沙禽印鏁殘陽後人歸叠翠隂思鄉空索寞素分信浮沉樂静稀塵累甘閒負壯心衰容常懶櫛病髪豈勝簮寡欲慵求友防邪毎自箴澆風終恥合前事固難諶望斷天涯外離魂欲不禁予頃從穰下移涖河陽洎出中書復領分陜惟兹二鎮俯接洛都皆山河襟帶之地也毎凭髙極望思以詩句狀其物景久而方成四絶句書于河上亭壁堤草惹烟連緑野岸花經雨厭枝紅年來多病辜春醉惆悵河橋酒斾風蟬鳴日正樹隂濃避暑行吟獨杖笻却愛野風無定處水邉容易聳竒峰岸闊檣稀浪渺茫獨凭危檻思何長蕭蕭逺樹疎林外一半秋山帶夕陽暮天寥落凍雲垂倚望危亭欲下遲臨水數村誰畫得淺山寒雪未銷時秋夜懐洛下一上人逰宦忘機久心源亦自澄夜聼吳苑雨秋憶洛城僧木葉驚棲鳥寒忩暗静燈何時過竹院一得問三乘題花繁花昨夜香苞裂露裛風吹照野時能與離人添悵望一時留與子規啼春望書事因晴毎日向吟臺縱目山城景象開白鳥静投沙浦去落花閒逐野泉來客愁已被楊烟染春色難甘蜀魄催看即流芳無處問但將餘興滯黄醅秋日懐友生寂寂感離羣前期何足云人從秦嶺别蟬向楚江聞村送孤烟起山空白日曛更逢疎葉落愁緒轉紛紛春初夜書水國淹留嵗月空雲山東去阻千重欲令遥夜春愁薄須賴黄醅臘酒濃南浦有潮舂栅鏁西忩無睡怯嚴鐘誰家幾㸃畬田火疑是殘星掛逺峯江上古岸蕭蕭聞逺雁平蕪杳杳更斜暉空江極目望不盡楓葉半紅人未歸夜望南亭閒坐欲忘機望久前村島嶼㣲數㸃寒燈起烟浪江船應見夜漁歸送人客亭殘照裡歌闋獨南行芳艸無斷色離人多别情逺途方不極長笛更飛聲莫動鄉闗念徒令白髪生早春溪氷覺暖㣲涵碧山杏經春半吐紅不向此時􅂸一醉到頭無計奈春風寄漳川隠士志髙長説恥鳬趨嵗晏園林戀隠居陋巷自甘棲短褐侯門終不曳長裾夜吟雪屋宜搜句春結烟蓑老釣魚為我紅塵偶為吏近來還寄絶交書慵趨大厦戀山薇立志由來與世違溪上有時逢静釣雪中長日掩閒扉自知天爵髙人爵不愛朝衣换布衣我逐浮名任飄泊清泉難得共忘機題巴東寺寺在啼猿外門開古澗湄山深㣲有徑樹老半無枝望逺雲長暝談空日漸移恐朝金馬去還失白蓮期贈隠士夫子住東野經年不到城愛吟無俗趣貪静得閒名荒徑侵山影虚堂出燕聲我慚為俗吏泉石負幽情南亭晨望寄唐知郡夢覺偶晨起南軒還獨過曉光生逺樹露氣冷疎荷空白逰塵少風清静興多遥知江郡守幽趣在烟波殘月半夜沈清影宵殘猶伴吟已甘垂樹杪由得掛天心影淡潛虯媚光寒宿鳥侵誰家傷早别凝思共沈沈巴東有感長嵗天涯悲斷梗逢春無處不傷情那堪日落紅樓伴更聼蕭蕭杜宇聲首夏書事忩户經初雨風清野景饒閒庭猶戲蝶髙樹已鳴蜩世態貧中覺鄉思醉裡銷縱吟還獨步時復過溪橋和李逢同年水閣閒望務簡凭危檻凝然感物華孤林經野燒極浦見漁家灘急舟難渡山高日易斜明時如道在焉復痛懐沙塞上秋懐未識窮邉苦今逰信有之秋林殘照後開路獨行時磧逈風長急天寒雁渡遲離心已無賴更聼戍樓鼙送人歸呉忽憶湖山景㳂流興不窮孤舟将去夜絶塞已來鴻白髪前期近滄州舊業空明時方道在莫更學漁翁秋日江天物候潜衰變氣爽初疑夏景餘雨漬亂苔侵古壁風飄紅葉滿荒渠晚雲連嶽藏幽寺秋水澄江静見魚昔嵗一鳴無所恨緑槐金蕋任蕭疎寄贈笠澤處士笠澤漁人髙莭竒白頭猶自着蓑衣吟過竹院僧留宿釣罷烟江鶴伴歸花落砌邉春雨歇酒醒林際夕陽㣲中朝名士皆知已多説東來信亦稀栁曉帶輕烟間杏花晚凝深翠拂平沙長條别有風流處宻映錢塘蘇小家喜吉上人至鄴北至夔城三千里外程勞尋苦吟伴獨入亂山行楚水秋無際巴猿夜有聲逢師不能寐因話故鄉情兩宋名賢小集巻十二
