body:
  text: 兩宋名賢小集巻二百十六宋陳思編元陳世隆補洺水小集程珌字懷古休寜人都使澐十五世孫甫十歲有詠冰詩云莫言此物渾無用曾向滹沱渡漢兵識者竒之紹興四年擢進士授昌化簿應博學宏詞科除建康教授寧宗時改知富陽以薦除宗正簿尋直學士院理宗初兼侍讀除禮部尚書紹定改元乞祠外補除福建路招捕使累疏乞休以端明殿學士致仕卒珌以詞章稱當時世系本河北洺州自號洺水遺民有集三十巻三月十八鎻試童子侍具行巻蕭然無事成三十韻漫呈同省旬雨埋青㝠今晨浴新陽老紅墮萬刼稚綠羅千行葉碎青槐古條淨紫薇香去歲䕶篔簹今年巳蒼筤古史窗前竹萌余去年䕶之甚至今皆蒼竹矣翩翻鵲引雛伊優雀繞墻有象成熈愉對時多慨慷門外車馬喧省中日月長要之非大快大快在滄浪滄浪興何窮風帆十丈檣明日酌嚴君自嚴入徽浮丘蔚南翔浮丘飛升於徽之黄山快馬抺青山恍入萬松莊先廬山中多老人雪巓更眉龎持酒相勞苦兒童紛迎將小臥聼雪塢以下皆山中景物徐歩堆雲鄉玉界梅萬木烟海杉千章三峽桃源浪九夏氷巖霜危橋跨長虹曲水飛輕觴兩日足可周百年事難量送客出松闗壯楗設門旁揮手謝世人從今永相忘勉子姪外物不足恃翻覆百年間惟有萬巻書可以解我顔男兒貴立志逹人得大觀百川日夜流與海㑹波瀾丘陵安於卑寧復望泰山方當少年時髪齒未凋殘聖賢户庭闊人人可躋攀謹勿隨餘子碌碌走丘樊揭富陽孝子門去年何明正有女方笄年母病偕幼弟奉佛祈病蠲既蠲未全已剖肝代蘭荃今年盛力旺二子亦竒偉兄肝起母病弟復先割股人生貴男兒愧此簪笄女峩峩儒冠弁愧此田家子予謬為令長㝠愚化不宣彼真天性厚或以上澤覃勞之緡酒廪重為此詩篇揭之旌其門觀風盛采㫋既以勸邦人庶幾風普天送夏明叔歸建寧頃與君别時君頥未生髭忽忽二十年驚見紫髯竒相逢不相識眎刺乃得之尊酒出文巻芙蓉隂未移白露團虚簷素蟾墮寒池何為于此時與君又語離自言甘㫖急母失舊館期丈夫屬有志富貴無定姿願君勉自力上以慰親思明年寒鴈來殷勤竒書詞為報秋風高呉仙得桂枝送常世卿歸嘉興悔作唐山來山深交友絶相逢忽相得乍見乃乍别嗟此氷玉人寒梅踈帶雪胷㳄羅文奎筆底耀離纈朝家渴英雋結網仍高設行且收殊科勉哉嗣先烈一編忠義傳姦萌嘆先折千載懦夫魂脆骨變竒節識此呉中竒復幸拜前哲何異魯國人一朝獲雙玦晴雲起芝田東風催啼鴂慈庭有近書明朝動歸轍新抽草可茵㣲露花堪折相思復相思後夜天邉月讀史有感俗士貪芻豢喜充藜莧膓幽人樂清曠要湔塵土裳嗟予别松林呉砧九換霜困復不知歸念之汗如漿仲冬望日登四顧坡往哲有清言晉人未為逹此身既假合既㪚安用鍤大音不在絃琴亦安所設當時逃酒徒往往畏侵及豁哉桴海時風濤任興息哭呉范二姊逝者如斯乎翩翩北飛鴻鴻北來歲南人去亡囘蹤庚寅仲姊去庚辰伯姊空千里不一見血淚迸秋風自餘只一弟留守先人宫我巳日崦嵫安能久轉蓬束擔其歸與十載山之東輓朱侍郎卜宅從先壟駕言練日良飛葢騖元駟古柳被龍㡛按轡且徐驅聼歌薤露章憶昔朱峯仙浩刼思陶唐貂蟬換羽衣翩然來帝旁西車極岷峨南佩窺瀟湘高牙開桂林瑞節照襄陽多少經綸業春風㪚八荒歸來不言功低簪鴛鴦行一朝侍甘泉天渥方對敭堂堂山立姿九尺鬢眉蒼何為勇不留瑶宫去路長夫人有令德威鳯趣歸凰輪摩同入道未忍遽相忘春天𣺌無際春花堪㫁膓祇今楓林崗雙玉一時藏西南多甘棠日莫人淒涼風月三千篇爛爛光生香佳郎與快婿門户未渠央三者無一憾嗚呼公不亡輓致政吕通議營築未休臿曉夕留松區忽聆載輀車歸自杭與湖冷雨澁不晴山徑潬如塗間闗五百灘轉軸上雲衢純孝格𤣥穹安席若平鋪憶昔祖慈親六月暑方徂奠酒雖百壺練溪焦釡枯今日遡長風辛岨諒一如維公有賢稱靄然溢枌閭千金手不售其鍾後人乎天畀此石窌指顧即吾廬且復愆以平萬家守者居甚欲一引紱山寒阻前趨黄羅金紫峯送目但躊躇高宗皇帝寶訓終編錫賚進詩紅雲一朶金爐烟黄繖亭亭午漏傳龍牀猶御金華殿方進羣儒讀寳編編中並載神堯語三十六年真復古秪今安用讀遺書卓然巳復光前緒高皇當日濟艱難猶在經綸未備間今日山東河北地百年運去一朝還更有祖宗傳國璽琢于元祐隆平際玉光射日篆雲飛今日煌煌登寳几高皇一笑在天靈神孫今日再中興賜與千秋萬歲齡甲兵洗盡年豐登羣臣尚或呻佔畢㣲臣但拱㘭頭立芳筵華秩及龍媒亦拜聨翩自天錫更憶先朝徹講餘有臣曰軾感恩腴願對紫薇花影下試草招來贊普書今也梯航慕中夏無復更待招來者㣲臣但摩千丈松敬賡吉甫中興雅秘閣儒榮堂天狼騰騰照單于怒麛抗嶽于上都松漠城高沙萬里其下衍育多穹廬皇仁配天覆中㝢西垂北際杳無區七十年來軍事絶謀臣猛將皆丘墟兠鍪摧剥土氣蝕塞馬不鳴秋草枯祁連山下安穏臥歲將金帛自膏腴文儒申申武士墮先王奮臂一長吁當時顛末誰能記家有中原孤臣書吮血為墨膚為紙驚風吹到玉蜚除誠通精寤動乙覽天經地緯開廟謨手援神矛截河漢中天真人正握符蛇龍螭虎雜萬騎庸蜀荆楚從呉車皇旅如雷鐵嶂碎汴水沄沄汴風嘘尺檄夜傳三秦定侵田歸魯在須臾向來孽霧漲北極羲和一旦晴光舒頓紘提綱無虧闕澶漫萬里宣皇圖怖威報德永無畔施令酬功偏禆供上下兩間皆叶序天錫皇壽天齊驅炎精亦曜暢大鈞天佑皇業卑唐虞金石並奏告清廟圓壇紫氣靄堪輿丹門宣赦傳天下百家頌聲流康衢此時此書方策勲先王憂國榮有餘代上楊誠齋杜陵巳醉老坡仙生後百年恨不及那知開眼大江西突兀見公正冠幘凛然清風不可攀千載懦夫毛骨㮚暇時畧吐胷中雲坐使九霄成五色未辨執樂三千指不計酒材七百石落然收寳入丹田歸省廬阜千尋碧那知城裏住相如但信城東有太白一時餘子皆鷁退家有諸郎傳正脉世塵千刼都磨盡獨有詩緣𣺌亡極天欲留公在世間管領風月長為客彩鳯一鳴天地靜安得㣲吟容晚出巨止青山吞澤芥許投頑石博拱璧先丘宰木已參天幽碣未刋但惕夕魯山四絶先李文誼貫幽明光存殁先生匹素不可辜倘得烟雲生勃鬰化為匹錦授丘遲磨鈍為銛希萬一要是人貪常熟書非闗買菜復求益詎敢限字如昔聞小大當唯意所適庻幾挂在露寒堂琅然一讀意一釋不須㸃白鱠松鱸解衣臥聼歌赤壁辛亥冬交石阻風三日隂崖老虎殺氣驕一噫三日攪泬㵳日寒不熖雲飛逃乾坤蟻轉東南高疾勢巳作奔天濤餘咸猶捲少陵茅魚鱉怖死蛟龍號舟中性命如鴻毛起來危立大江臯白沙黄塵紛驛騷徐呼風伯入苹蒿指撝八極建六鰲翕張槖籥吾誰曹太平之風不鳴條登紫微崖富池大信江千里三日醉臥烟篷底曉來推篷登㫁岸因憶牧之呼屐齒九華隆隆閘天脊㣲雲低度參差是百喚牧之如不聞剥脱塵痕見文字今年十月天未霜木葉留露光嶷嶷興亡風流不可論蒼松怪石還如此我今與子陟層巔酌酒賦詩云樂只後來誰復是牧之斜陽歸路芙蓉水於潛崔丞四明人同年友也方此掉鞅百未一見而來書羅縷無非歸與語豈醉夢書邪三詩見寄亟占數語正之世人眼見真蓮少真蓮却在玻瓈沼浣花溪水入銀河何人更識月皎皎謫仙不見見梅粧荷稠搴作芙蓉裳黄龍乹葉何年墮維摩雨華昨夜芳真花真詩元在眼要須心地先清涼不然瀟湘水清寒磯月沙平水晚露低昂勸君休問張子房鑑湖十里藕花香天駟超河夜未央曷為自同太白光何時握手論行藏江東雲暮天何方太上虚皇黄庭經句法十篇壽趙帥今存其七太史占春纔五日東風昨夜傳消息斗邉一星下南極飭以貂蟬扶社稷更昌斯文開民則去冬曽説冬葅綠今年蓼甲春盤簇綵花金勝相輝屬五色斑衣佩蒼玉先奉庭幃千歲祝莫辭金醆十分斟邇日星郎寵數深庭前桂子更鮮新鰲頭早晚貼塗金公亦綠殿峩乘簪漢列土宇封同姓唐擢宗英持國柄我宋膺圖臨海鏡參天杞梓仙源盛蕭敷艾榮何足訂向也何幸識仙翁玉栗春明盛德容又常一再見河戎神情頴異機生鋒公家流慶無終窮明年天使九街馳御茗名薫宣玉詞更敕儀鸞餉壽巵我有新曲名紫芝㑹當獻之鳯凰池喬松落澗節輪囷詩書萬巻終經綸日華隔霧光難晨公獨知其墮凡塵何當一為問大鈞郊臺信筆江天欲雪未成雪推出雲頭照霜月此夕更長不可辜何時百萬入彩盧幾年長涎一車麯輸他獵奴飫生肉也須龍伯坐鰲頭却看沙磧臥鰕鰍玉堂晝値有懐萬松鷄籠峯下萬松山中有游民天地閒左架虹腰上元圃右騎鰲背度飛闗幽壑流泉噴三峽衮衮桃花翻浪雪兩山對峙錦屏開嫣紫肥紅仍炫白十里松風百哢琴丹書一枕臥殘春何人共結無生社冉冉青蜺下玉麟九華突兀匡廬禿幽深全似入盤谷懐山一夜鬢如霜晝作烟圖入洛陽玉境那容几骨汙急草天章訊歸路磨松琢石歌太平亦表㣲臣報國恩汲井溉田民亦勞止歌以相之短綆長缾高下飛老農雨汗紅淋漓夜來雨意巳垂垂一事不成風又吹决破玉龍太清池滿浸萬頃碧琉璃贈梅菴高座不知甚靣目當時喚作尸利密要須勿負此標題更向托茶山頂立伐千秋巨木竟梁梅堂二木盤根三千秋萬斧過之無敢眎今辰有梓號國工朋曹十數來睥睨為言此木難斤斧上有蟠龍下伏虎莫教驚動萬年枝掣電轟雷三日雨直須作法起南風號召百神同力扈昂昂頭角向梅堂五六鎮星來作輔坐令國勢鞏蘿圖萬歲千秋奉明主奉送季清赴山東幕府黄雲銜雪天模糊有客飄然出上都青絲絡馬銀兠鍪紅錦䩨弓金幞姑劍光壓匝照路隅帕首百騎前訶呼不知客本山澤臞今何為者意氣麄自言有將新孫呉我欲與之同力扶嗚呼滅敵豈難且病兵怯將自逃逋君不觀昔我藝祖造中區以兵為國垂洪模河北河東義勇徒二十四萬鼓應枹中興益振尺五符世忠淮左聚熊貙劉錡淮西貔虎俱上流岳飛彎天弧金陵張浚羆搏狐單于臺下雖寛誅采石山前已㫁顱邇來殘敵尚窺窬門内羣冦更睢盱遂乃朘剥及其膚豈止牛羊不求蒭我欲别幕飛於菟十萬一屯淮之區技閑器利整平居幟明鼓震蒐彼廬精神所折渾如無而況山東羣盜乎五符倘缺聼其虚十年且盡一賤租斬然圻畫勿牽渠他時混一更新圖偉哉玉帳得通儒君復碧油吐良謨凌烟豈一貂蟬與新舊句憶昔丙辰還親旁恰恰先春社三日社日侍親行交源紫蕨兒拳森玉立是日天明風氣柔入自交源茗源出迤􅆔又復至前山渉澗還家日將没慈親意在營一丘眷眷欲于近舎求當時議論悉未定那知今作汪潭游汪潭去家正五里百里來龍于此止至此七韻不記甚年作壬辰秋孟中浣日足下一叚龍止水亦止清潭窈無底寳劍秋空横秀峯春笋峙最愛了角羊艮木之印郷長生亥水來朝丙千古長長溪流不盡雍容冠佩紫薇垣壽星更出丙丁間神游既安復昆福賦此銘章皆實錄子時歌順數方來兮遡而上之洪荒今不必短兮古不必長地有時而𤣥兮天有時而黄知靡草之先秋兮又當知喬松之傲霜知滄溟之連山兮又當知太華之有長江朝云西暮云東兮豈期悉避乎陽光入濛汜浴虞淵兮又孰知其扶桑吾烏乎而折衷兮但當付萬化于茫茫郊祀慶成詩有序臣仰惟皇帝陛下躬上哲之性遵列聖之謨穆卜新陽昉嚴大報天地合饗祖宗並崇晴光映於祥光冬夜温於春夜燭花如綴蕭烟不揺頌聲流乎天衢英風薄乎榆塞臣待罪翰墨幸列侍祠懿鑠鴻休得所親暏謹撰慶成詩五章一章述大典也二章玉輅如青城也三章升圜丘也四章禮成也五章言天眷聖德並隆不巳也干冐天威俯伏惶懼粹右皆頻歲炎劉或異祠有唐方定制我宋遂因儀列聖馨明德皇穹答顯祺恭惟聖天子大典應昌期涓潔先原廟純忱歴太宫八神開列闕萬騎擁豐隆軌道清風肅洪頥䴡日紅康衢聼細語八彩更重瞳牙籖猶未進玉冕已先須峻級飛平歩端圭卻掖扶祥光匝霄極和氣滃天區福飲烟升巳儐神靄瑞符紫畤祗堂陛蒼龍奉駕回邉塵知電掃歲稔卜年開丹鳯覃天澤東朝奉玉杯樓前呼萬嵗砰隱動春雷謂聖惟能饗由心克致䖍天心今答聖聖意更祈天沖性猶勤德搜求愈任賢愚臣輸至懝端在賦甘泉丁亥閏五月十日囘自眞聖道坊車中記事列嶂羅屏合回泉玉帶環外容三肘密中著十洲寛天意驅蹲虎人心見聖蟾煩君招舊隱來此共潺湲書富陽普照院二首境勝由盤古聞名自謫仙一從江國後又到老坡年山頂烟仍紫樓頭月故圓繼今知幾刧風物更依然秪愛招提古那知俗更醇寺雖炎漢代人尚葛天民僧定都忘客林深自鏁春我來千載後更有後題人紅藥當堦翻校官試禁近烟光潤堦平日影喧黄麻方草罷紅葉正花翻蒨色浮春動清隂匝午繁心傾青𤨏客香滿紫㣲垣漏永文書靜天低雨露温人言有仙骨早晚拜明恩夜登釣石頗憶嚴君瀨還尋釣石緣鄰雞方呌月邉鴈恰書天句秀來仙白聲和應樂全展編真一快如放五湖船輓程給事戀闕葵心在懐山秀野寒華繁常侍媿草𨽻折衝難結綠紅輝碎懸藜夜色殘平生桑梓地雪涕景雲端輓汪給事抱大難傾槖隨時欲見田星災諸葛日齒少紫芝年魯國麟枯骨藍田玉祈瑄忍聞環珮響帝所待鈞天輓范端明諸老多淪謝惟公尚典刑謀謨闗社稷風采聳朝廷政路方虛席台躔遽折星幸哉芳史在寧用問丹青輓呉郎中志抗金堅厲材成玉粹温時哉非不遇命也更奚言季子風流逺呉公治行存敬亭無恙否愁絶暮雲昏輓程樞密二首厚德推吾黨脩名靄列紳明經魁别幙伏節聘殊鄰南嶠思良牧西樞失重臣龍原高冡在千古臥麒麟忠壯源尤逺新安盛莫偕千年瑶斗柄一夜玉樓階學業光文簡儀刑謝艮齋曉鐘傳恨處清淚落天涯輓宜人趙氏分冑天皇媛求嬪相國孫孝慈山上梓法度澗濵蘩鳯去簫沉響鸞空鏡掩痕家庭熏沐事千古説南軒輓徐提舉人品真豪爽天姿尚典刑晝簾深院宇奉斾擁郊坰雲子千艘白鹽烟萬竈青南州高士傳三嘆一彫零輓蔡祭酒孝友尊前哲詞章裕後生栢臺真御史槐市大司成騏驥風方力艅艎浪忽傾山寒丹旐急識者為沾纓輓曹監丞學𣺌千江水才雄百尺樓鳬飛思葉縣燕寢憶蘇州有感珠還浦無苛虎渡洲浦江天闊處缺月正如鈎威鳯方翔漢寒鵶已宿林平生惟好士無日不揮金駟牡頻催駕琵琶遽絶音山名昇白日回首一沾襟輓錢塘蔡令君少年思賈誼中壽憶賔王軍政存鍾阜民庸在括蒼馬蹄歸鳯闕車軸折羊腸喚起青油夢悲風攬白楊輓王柳州才華唐令尹名勝晉叅軍善政流汾水遺風襲縉雲寳釵當自合神劍不中分心折白巖路猿吟日未曛輓楊提舉風惨琳宫曉雲愁鐵甕春鴻㝠方避弋鱣集遽成塵金虎多遺愛銀莵愧後人尋思漢循吏竹帛逐時新五十六字庸以告未知野夫者寧須山澤論高平但要曾餐石決明三世擊鐘敲玉磬十年學劍斮銅釘倘知狐祖天邉去肯向蠻奴脚底行更許野夫尋上著十洲三島一宫城慶元丁巳十月奉親如臨安宿西菩寺表弟呉克仁俱焉二首熈寧相望百餘年又有人如古鐵頑日落尚憐今夕路月明無恙舊時山朱紅野實堆盤裏粉白詩牌滿壁間欲為慈顔供一笑更留數語任渠刪安車未向都門移且覽西菩一叚竒路入山腰須種樹泉流石齒莫開池重來坡老今誰是出世参寥不記時結束匆匆出門去白雲明月舊相知用朱經畧韻歸來南槖舊蕭蕭但有新詩照佩瑶峴首溪山歸㸃染湘天風月困吟嘲輕裘詩帥風流在岳牧詞臣意氣饒且說玉堂須翰手公當歸侍紫宸朝用丘樞密韻起自澄江應夢求天還河北百餘州嵩瀍處士歸羅致淮蔡竒謀入彀收午夜金陵瞻斗極千年𤣥昴滅旄頭㑹須再作中興厯還許諸生執筆不作堂六桂之東命之曰桂生取漢人招隱篇桂樹叢生之語也詩以記㡬年列植擅清芳今日標題始作堂逺向松岡分老䕃近於菊畹借寒香地雖未離人間世心已全然物外郷最好夜來清絶處飛霜帶月下南塘和費樞密登卞忠貞公墓底用荒村訪野墳青編相對儼如存當年但識清談樂今日方知節㮣尊千載腐儒空弔古幾章冷語自消魂便當僇力清河洛一洗新亭舊淚痕流觴西湖用范左史韻畫航同載若登仙却笑泥韉馬不前要識冷烟催糓雨須知澹日養花天千條翠柳隨風舞一樹夭桃照水妍須信人生行樂耳虚名那用世間傳雪北風傳信報登平白帝宸遊墮玉英月下草𤣥疑蜀客鼎邉得句失軒明莊嚴東閣若為好㸃綴南枝分外清惟恨蔡州城北水一池鵝鴨更無聲小憩許由亭厯數河南去乾坤一草亭一亭猶是累千古盡浮萍喬松風細吹吟鳯雷驚起蟄龍幾年臥空谷今日享真封嵗暮綵帖瑜糜濕屠蘇琥珀濃夕陽猶臘日午夜已春風三月三日度白際日望黄尖杪今登白際巓千山皆委地一臂獨驚天戊子正旦賀壽慈宮二首曙色浮丹栱春風煖禁街㣲瀾迷秀石纎草䕃新槐鳯駕回天仗鴛班集露門須臾趨魏闕杲日正中暾粥罷飯已茶三啜隅中粥一盂陶然詠皇化安用柬封書氷白日黄流漲渭城三更風急盡成氷莫言此物渾無用曾向滹沱渡漢兵甘將軍廟沙寒日薄水雲愁賊魏王呉一夜休自是英雄元不死至今猶占大江流晚發富池甘王樓下一帆風獵獵舟旗照日紅釃酒三江飲龍腹摩挲冠冕是誰功昭明太子宫千章喬木烟蒼蒼一帙遺文字字香梁鼎西沉何處問至今㦸手看興亡陳時栢陳未亡時栢已蒼風來歴歴説興亡世臣元不如喬木閲盡中原幾戰塲夜雨元機粗透古人胷每説匡來晚未工珍重芭蕉前夜雨為傳消息到墻東築徑入門一徑小紆囘百本芙蓉手自栽寄語後來須善䕶三年猶及見三開觀史有感紛紛賔客趨驃騎何事任安太樸踈却笑君非王太傳不容朝士不囘車别金陵官舎雙栢手自移時尺許長三年拂拂及宫牆願言勿負栽培力保此堅貞傲雪霜復朱教授某前雪䝉佳句再雪乃得為謝信矣相如之思遲也然亦遂為一叚公案詩成催雪豈無功今果裝嚴七寳公休説春花那解舞也教耳熱慰新豐送李侍郎安撫浙東二首通明殿上紫芝仙乞得閒身下九天今日都門臨祖處幾人驚嘆着鞭先夜來天闕望文昌移在藩臣斗極旁千尺濤江元不逺公當早晚對明光直廬閒賦二首一陪鸞鳯入仙臺四見薰風舞禁槐自笑平生無夢到那知今日以身來紫宸朝退曉光寒百吏奔曹一吏閒便可雲卿稱㪚秩奈何名籍尚人間雪霽玉堂曉眺當年銀界隔鯨江今日分明玉作堂不是瓊林宮樹密也應白虎接明光兩烥並花雙蓮合蘂更開花報道金鑾日未斜已草禁中新鳯詔趣君十日覲東華脩玉牒官閣子坐屏甚古詰吏亦不知曷始數語紀之摩詰何年留此筆至今雙壁猶􅍶崒老松掀甲作風雨亂石激流殷霹靂呉綃一幅苦無多中涵太華及黄河偶然乘風山下坐紫烟翠靄坐中過早入紫薇浥露翠條深㨗㨗靈禽振好音全似氷巖亭上坐四屏烟靄奏春禽直廬多暇新綠欎然信筆二絶朝絶倖恩除目少邉清妖祲檄書希飯餘摩腹閒行立一抹牆東新翠薇壁石方壺浸碧天依然全似太湖邉清風一夜生新興好把漁竿上釣船江山道中瀑布松風一壑逼人寒老石瑽瑽響碧端疑是銀河天不鎻㵼從雲際下人間梔花青琅削葉玉花鈿獨占炎皇第一天未羨氷桃垂夏後且㸔金子粲秋前朱生論天不知占得幾躔星閱盡人間聚㪚萍今日重來橋上望依然楊柳兩青青為釣臺作人道秋風長桂時天台㪚種未為遲如君筭到白榆窟揀取南來第一枝擁爐已甘灰冷竹窗前那意移來近繡氊惟有幽人一寒暑閉門高臥雪深天中秋無月常時斗暗猶閒事無月中秋可若何我欲梯雲千萬丈取光還月謝羲娥春帖輕烟薄霧鎻平川全似江南二月天昨夜溪頭新雨過分明洗出太平年程掌書二首夜來踏月過臨川水靣粼粼桂魄圓此際高人方熟寐難為一扣緑筠軒分明如夢縞𤣥衣傍月凌風自在飛夢覺出門都不見不知己上子陵磯此行專看釣石孟夏廿一東作秩然不見東耕四十年兹晨蓑笠去翩翩從今數過三蓂朔史筆當書大有篇五鼔夢中作覺而成之二首人生萬幻一釐輕須築銅駝萬里城莫道斜陽光不逺㫁霞收盡十分明當時千駟已無聞寧説牛羊上塜行同是博陵評古者肯令千載尚齦卿閏九十四午夜青衣海上還八年兩度雪封山如今一水平如鏡好釣桐江五百灘送松煤十九與葉秀才雲溪深處萬松林烟起晴天自作塵根向九華分結處與君同是墨仙人出南郊清甚春風吹屣到南園着酒塗酥花正繁更喜滿庭無俗物横塘踈竹渭南村輓太府丞知徽州韓公翊運勛臣第一家却于翰墨掇英華誰知忠孝千年事不逐春風落水花魯國夫人薤露歌並海名山萬叠開太慈太白等蓬萊自從齊國鋤雲後又見夫人駕鶴來兩宋名賢小集巻二百十六
