body:
  text: 兩宋名賢小集卷二百七十六宋陳思編元陳世隆補石屏續集四戴復古樓上觀山九陌黄塵沒馬頭人來人去幾時休誰家有酒身無事長對青山不下樓林下得月以木陰蔽遮為恨夏日思栽千樹林月明恨不掃繁陰眼前物物皆如此世事何能兩遂心越上青店候别楊休文千載江湖共此心老來相見怕分襟手搔白髮望君至車馬不來溪水深衡陽舟中蕭蕭風雨送行舟小泊垂楊古渡頭不忍緩行江上路落梅片片是詩愁村景簫皷迎神賽社筵藤枝揺曳打鞦韆坐中翁嫗鬢如雪也把山花插滿顛溪上山腰有路穿脩竹水面無橋涉淺沙夾岸人家盡農圃秋風吹老木棉花周子益年八十赴殿七十漁竿八十翁釣絲輕裊荻花風功名未遂英雄老人道磻溪即箇中抛却漁村老釣竿手遮西日上長安青衫著了尋歸路莫過羊裘七里灘觀捕黄雀披綿爭啄晚禾秋決起森然網扼喉一飽等閒輸性命知機萬不及沙鷗九日醉來風帽半欹斜幾度他鄉對菊花最苦酒徒星散後見人兒女倍思家贑州上清道院呈姚雪篷短山不礙逺山青無事燒香讀道經時把一杯非好飲客懐宜醉不宜醒無題憶聞春燕語雕梁又聽秋鴻叫斷腸一縷沈煙飛不過兩樓相對立斜陽到南昌呈宋原文伯仲一秋無便寄平安新雁聲聲報早寒昨夜檢衣開破篋去年家信把來看李敷文酌别席上口占客子明朝早問程尊前今夜若為情使君亦恐傷離别不使佳人唱渭城題梅嶺雲封東海邊來南海邊長亭三百路三千飄零到此成何事結得梅花一笑緑緑陰亭自唐時有之到今五百年盧肇二三公題詩之後吟聲寂寂久矣亭前古木不存緑陰之名殆成虚設今詩人李賈友山作尉於此實居此亭公事之暇與江山風景相應接境因人勝見於吟筆多矣友人石屏戴復古訪之相與周旋於亭上題四絶句以記曾來五百年前作此亭亭前古木緑陰清而今古木無存者賴有新亭襲舊名慘慘秋風吹客襟唐人遺迹宋人吟浮雲世事多遭變不獨此亭無緑陰千山横碧一溪清白鳥飛邊落照明吏散庭階一無事緑陰亭上又詩成正是國家多事秋渝川縣尉亦風流吟詩不廢公家事坐使孟郊輸一籌既别諸故舊獨黄希聲往曲江禀議未回不及語離别盡諸君不見君客愁多似海南雲一聲何處離羣雁那向江村靜處聞老年懐抱晚秋天欲去思君重黯然聞道歸來有消息江頭錯認幾人船寶覺僧房溪近泉聲在枕邊月移梅影到窻前水沈煙冷燈花落半夜酒醒人不眠題尹惟曉芙蓉翠羽圖何人妙筆起秋風吹破枝頭爛漫紅翠羽飛來又飛去一心祗在蓼花叢廬山馬上青松路徑白雲闗有客來尋半日閒十載灞橋驢子上爭如騎馬看廬山巾子山翠微閣雙峯直上與天參僧共白雲棲一庵今古詩人吟不盡好山無數滿江南贈饒叔虎談易論命多奇中中年多病早衰翁詩不能工枉受窮郊島五行君識否要知我命與渠同湖南漕李革夫被召乃丐歸浪説歸朝歸豫章新居萬栁百花旁何如表奏明光殿乞取東湖作醉鄉軒冕難遮兩鬢華官居雖好不如家一心懶上朝天馬要趁東風歸種花招山乃詩人劉叔儗故居朱清之得其地清之赴南宫中道而返就招山卜築不久亦去世半路袖回攀桂手一生方遂買山心要知此老風流處來向劉郎吟處吟有錢可買滄浪景無術能留夢幻身一段江山寄愁絶百年不見兩詩人清明傷感客中今日最傷心憶著家山松樹林白石岡頭聞杜宇對他人墓亦沾襟寄劉潜夫八斗文章用有餘數車聲譽滿江湖今年好獻南郊賦幕府文書有暇無兩宋名賢小集卷二百七十六
