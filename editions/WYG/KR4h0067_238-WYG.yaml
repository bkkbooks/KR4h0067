body:
  text: 兩宋名賢小集巻二百三十八宋陳思編元陳世隆補方是閒居士小藁劉學箕字習之屏山先生子翬之孫七者翁玶之子有方是閒居士小藁吾廬寓言五峯之山環吾廬五峯之水清溜渠山水可樂情可娯五畝之宅奠厥居清湖列嶂開坐隅白沙峩峨煙岫鋪崇山梅嶺豁望眼髙門堇阜聨襟裾况當春晚積雨餘緑褥翠疊青珊瑚桑麻滿路人意好鳴禽上下齊相呼迨今八月九月初楓林隔水紅凋疏秋場稻熟聴蓬樸小槽新釀傾真珠昨宵一雪飛璠璵逺山近山光凝酥羣峯突兀不敢覷銀壁照耀天鬼塗千金不須買畫圖丹青縱有畫不如風景萬態朝昏殊天成此畫人難摹蔬荒圃廢㡬朝夕一日築居天賜予四時逰觀心良舒考槃在阿歸來乎乃歌曰採於園兮籃有蔬釣於水兮筐有魚余之弗歡兮其誰之歡與又歌曰惠水清兮出有車芸香芬兮讀有書余之弗樂兮其誰之樂歟清湖白沙崇山梅嶺髙門䓰阜皆屋側山名石假山潭溪散人方是閒真山不愛愛假山呼童積疊山磊磈逺近便擁峯與蠻晴嵐滴翠明忩前清影掛壁方池邉色侵書帙日華薄丘壑坐上生雲煙雲煙收霏苔蘚緑山石傍頭更栽竹三竿兩竿韵不俗揺蕩青風凉意足方是閒人當此時以假像真人謂奇或來静對酌美酒或來晏坐哦新詩吟詩搜索縈心脾酒醉落魄精神癡吟詩飲酒且不可况復局上爭枯棋不如對山撫吟琴琴心三疊舞胎禽高山流水存至音古趣澹泊恱我心老泉三峯欄木材百年沈埋安在哉東坡仇池九華石只有佳篇傳入集此山亦猶今視昔與我同生亦同沒社日喜晴分韵得前字夜來急雨淙飛簷晚驚紅日輝潭川梨花有情朝露重栁帶無力春風顛傍簾新燕低拂掠入檻戲蝶相聨翩今晨天氣亦佳爾一春未見兹晴暄綠陰林下笑聲好簫鼓賽社祈豐年金穰屢豐豈不好米賤更苦人無錢太公九府法已弊楮幣印出私相權所司轉變無善䇿低昂用否難流傳縣官那更租稅急白紙不問黄榜蠲窮民非負實無有里正罰責殊可憐吾儂雖樂此日美釂白醉倒春風前却愁煙雨暗春晚米價頓長民憂煎寄靜菴天寒日短道路長白雲飛去知吾鄉大江之東渭之北念吾故人何可㤀别來楊栁春依依只今開到梅花香扁舟漫浪歸未得京塵海裏安行藏身名未立仰天笑牀頭夜夜鳴干將羨師物外無寵辱庭前柏樹常蒼蒼吁嗟急羽飛不到二千里外空相望五雲前墜滿室光報師之意無以將篇詩滚墨纔淋浪一聲雁過天南翔紫溪莊舍讀癸丑壁間舊題轉眼忽十八年同遊十不存一滋蘭弟亦作古人拂拭灑涕㡬不欲去因誦歐公詩云人昔共逰今有㡬樹猶如此我何堪為韵感懐成十四章庚午四月中澣維昔舊逰十有八春中閒往來合散風塵詞翰在壁瞻之愈新憶我仲弟𣺌然懐人其二吁嗟人生年不滿百天地囿形百代過客去日苦多來日苦窄我曷不樂慨念疇昔其三草角燈忩硯席是共春山朝吟秋堂夜誦棄背三年心骨沈痛㡬夜見君似夢非夢其四念昔童稚汎然若舟惟吾與君孤苦同修博文約禮匪遨匪逰子方盛年遽赴玉樓其五朱坦素壁醉墨漓淋虚堂重臨思古傷今文不忍誦盟不可尋即事即物􅋞淚痛心其六舊題墨妙龍蛇戸牖步驟歐虞摸倣顔栁醉裏百篇𡨕搜九有天胡奪吾張仲孝友其七屈指友于祗今存㡬自仲之去失此奇偉言不勝情心旌憤悱哀哉蒼天兩淚如洗其八團團庭柯清美無度今我來斯忽然老樹偃蹇輪囷剝蝕摧蠧朱顔蕣華詎得如故其九興念陳迹夢寐吾猶植杖風雩某水某丘日居月諸循環靡休迭爾遄邁曾不吾留其十憶自束髪兹焉寓居載思載瞻宛不異初極目遐眺清風穆如撫事懐人悲來感余其十一少生四方逰紫之水每有良朋見止遇止長哦伐木求友乎此樂以㤀憂云胡不喜其十二維親與朋雜然滿坐華屋連甍紅紫繁夥半世重逰霧迷煙鎖慨然撫膺謬悠老我其十三念昔考槃碩人之薖琴豆觴酒寤寐笑歌逝者弗返涕泗滂沱念彼不樂傷如之何其十四賢乎仲弟和樂且躭自我不見嵗籥換三百感交集憂心如惔山凝暮雲回首不堪插秧歌農夫戢戢清波闊秧稻茸茸森石髪父兒呼喚手拔齊千把萬把根連泥四更乘月躅隴陌曉煙漸散東方白歸來喫得飯一盂擔到田頭汗似珠蹲身擘叢種入土不問朝昏與亭午肌膚剝裂肉起皮烈日纔陰又風雨秋收幸值嵗稍豐穀賤無錢私債重連忙變轉了官賦霜雪凍餓愁苦窮吁嗟四民天地間服田力穡良獨艱寄言安坐西方輩汝飽不慚吾厚顔醉歌讀書求見古人心閉門不知青春深夜來東風掃浮陰曉光薄林生遥岑搜尋不覺出門去綠暗溪邉楊栁路詩章立願不復作會景那知自成句歸途晤語誰與從眼前物物俱春工崇桃積李事已晚牡丹正麗酴醿穠白茶照人氷雪同紅茶燒空猩血紅金沙雨晴翡翠積海棠露煙濕脂重急呼詩朋喚酒伴髙堂共泛琉璃鍾夜闌秉燭相對語漫道今人不如古古士放達醒者稀今人不飲徒自苦和韵忩燭銷殘轉寂寥柴門無復野僧敲偶來枕上吟詩就記向心頭欠筆抄鳴竹數聲疑雪片尋梅清夢到山㘭世情雲雨多飜覆誰是江湖耐久交白山茶白茶誠異品天賦玉玲瓏不作燒燈焰深明韞櫝功易容非世力幻質本春工皓皓知難汚塵飛漫自紅舟竹三章桂櫂兮蘭漿泝流兮㳂洄天迥兮空明湍激兮聲哀水落兮石出路轉兮溪回鷗飛兮山凈魚戲兮藻開淹留兮何為盍賦兮歸來其二扁舟兮容與浮雲兮舒巻波澄兮練横山秀兮屏展散髮兮平岡濯纓兮清淺皇皇兮何之路長兮悠緬蚤賦兮歸來迷途兮未逺其三容與兮扁舟長吟兮閒情白石兮離離秋雲兮霙霙我思兮光廬水潭兮山屏帳空兮鶴怨人去兮猿驚蚤賦兮歸來涉園兮欣欣鈆山廨宇題壁莫遣離愁相絆縈九州之外盡愁城酒頻挹注幽憂浣詩苦冥搜太瘦生漠漠草茵飛蛺蝶深深栁幄韵鸝鶊客懐未與成匆遽三沐三熏慰此情道閒池亭小酌一曲芳池萬柄荷逰鯈潛躍水揚波竹􅁝楹檻風偏細梅子江湖雨正多凡物遇時俱意得謂予不飲奈愁何暫來徙倚又還去猛拍欄杆浩浩歌太湖書懐清風起平湖白雲生㵎陰佳時慘不樂羈思苦難任客子熱中腸浩然懐故林仲夏倐已過艸木鬱蕭森萬物欣有託吾生何崎􅋂念昔嵗甫冠自許雙南金只今墮危塗不如煙際禽山水所素願利名非宿心何當返故廬嘯傲蒼崖深兩鬢豈長綠勿枉呉霜侵九月十八日夜夢賞春某氏園池賦春詞二首題柱芍藥花開日漸長小忩閒理舊笙篁憑誰為喚詩宗匠共賦留雲借月章其二樓下酴醿壓架香翠圏帷幄覆池塘桃花浪煖魚成陣人倚雕欄到夕陽古交行并敘予因雲莊李達先遂識漁隠陳惟定二公博學多材藝獲從之逰幸矣賦詩一篇以見意君居京江頭我住武夷曲平生風馬牛道路㡬重複會面情相親卜室欣相鄰傾葢一笑粲恍然如故人君家義聚五百指堂上怡怡奉甘旨收書萬巻不言貧撫䘏孤婺甚勤止我家㷀獨與君似自我之出誰料理嵗晚團欒未得歸感事捫膺但增恥知君念吾留客裏每見時能具羞七心吐肺肝所同然尊酒論文日終晷古靈故家好孫子披覿芝眉因識李博洽多聞世希比頃刻龍蛇飛剡紙我慙學術殊不逮二君二君愛予心良勤交逰情鍾固以類愧以蕭艾聨蘭薰常恐此時心易變作甘和醴欲君持此心淡若秋江水古人心交尚道義今人利交尚權勢古道于今何寂寥傷心不識古交意兩君姿質俱精金百煉不改色愈明兩君體性如美玉渾渾厚厚韞諸櫝上映亭亭巖上千嵗之孤松下方磊磊豐山百世之霜鐘松青不變四時色鐘鏗一朝振文物予何人哉得附驥勉勉誰敢自暴棄日暮長歌伐木篇三復詩人琢磨義蕭長公來訪示以諸公詩巻謂與予逰從之久不能一辭為贈頗相噍責予賦之不可辭之亦不可皆有說焉名章俊語前後相望無數次乎其間是覩西子之容面自增醜耳所不容却者予年十五時海山官丁受琴于長夫今予年四十與長夫有二十五年之舊辭之弗作其可乎因書數言生平不願為傭書亦不願作章句儒酒酣詩成吐素霓意氣凜凜吞千夫前年排雲叫閶闔出門一夜車四角去年海嶠席未温一舸乘潮又催缺大江之西日本東廬陵文物常稱雄決科嵗占十八九君當努力提詞鋒才高不用長歎息四海彌天豈無識壯年懐居亦何有著眼帶礪開胸臆巖巖柏府凌髙寒豪士傾蓋宜交歡我知屠龍不屠豬食馬政欲食馬肝呉姬壓酒飄香絮謫仙神逰歌白紵敬亭惟有孤雲閒欲雨人間亦飛去有所思憶昔美人初别時長亭兩岸栁依依今日美人天之涯美人美人胡不歸憶昔君别妾分破青鸞鏡破鏡如破心與妾表相憶相憶圖久深憶昔妾别君剪斷金鳯􅁫斷􅁫如斷腸贈君表相思相思圖久長一日一日復一日青鏡鸞孤􅁫鳯隻未必君相思能如妾相憶寒衣剪就欲寄君長安門外無行人雁聲半夜西風惡忩前一片梧桐落觀猿掛石攀雲日半斜亂山深處飽煙霞香林月滿僧歸去啼落春風㡬樹花失鶴頂上新成九轉丹缺花日日到春壇夜深飛上雲霄去華表月明風露寒宿大慈山悟真觀終南道士學彈琴門外松蘿鎖翠陰涉海八龍朝出洞隔山羣鹿夜歸林琪花過雨溪風澹玉樹籠煙壁月沈三十六壇鐘鼓寂雲璈聲接步虛音賦林景參梅嶼結廬分得雁山雲嶼上梅花是四鄰水月一天薌世界氷霜千古玉精神短檠夜雨西忩夢長鋏秋風北塞塵我亦煙波綸釣侣與君同作嵗寒人懐潘鄮屋洛陽纔解珮過眼忽秋分四海一明月千山共白雲雁煙迷曉樹蟲露濕香芹滿紙相思字臨風欲寄君呉江道上夜半扁舟出洞庭客帆初掛早潮平社風纔起海鷹至嵐露未收江鵠鳴吳岫亂雲擎古塔楚皋寒葉擁荒城垂虹橋外天連水無限别離生杜蘅登西樓懐湯損之楊栁飄飃春思長綠橋流水遶宫牆碧雲望斷空回首一半欄干無夕陽呉山雪霽九天宫闕春風滿陸地樓臺夜月寒鐵笛一聲吹雁落片雲不到玉欄干雙路王命馳驅不敢輕文書要覈去來情青山步步生幽意碧㵎悠悠趂逺程春淺禽聲猶自小泥酥馬蹟正宜晴地名見說名雙路便舍崎嶇就坦平寳際忩前睡香瑞錦窠應對錦郎誰將靈種到幽坊山深月冷梅花老壓盡羣英是此香石橋樓待當年立雪直齊腰宗旨流傳到石橋風急忩寒燈影逺疎梅無語夜香銷手筆華嚴梵笈新更開寶地接迷津一聲金磬人初靜月照空山草自春聞寺中曉鼓靈鼉一鼓振潮音征夢迢遥枕畔聞語斷頻伽天正曉松風吹散滿山雲跨水道間店舍總迢遥山深轉寂寥看鷗臨逺水下馬過危橋晴雪林間少春風野外饒此行為王事旅食任蕭條峮山鋪未說路行難山深分外寒晚村林隱寺春㵎石鳴灘薄宦曾無補勞生敢自安羽書雖較少備禦莫教寛杏塘境接江東界郵程是杏塘雨喧茅屋小泥滑草橋長曠野人稀少平田水𣺌茫半生逰歴地未若此荒涼四安焚惠藏殿記云曾經兵火不能焚法輪自轉刼火不能焚空中轉法輪風霜鴟殿古金碧貝函塵物本由成數人言不壊身却憐無問者遺蹟竟成陳上司諫曹先生聲名滿世重如山果見延登左掖班天子虛心求國是先生著手濟時艱要看出處諸公上只在精神一轉間前此極言雖引去安危理亂正相闗池萍一畨雨過一番多間挾晴風漲綠波栁絮吹殘逰蹟在謝池㸃㸃是陽和竹籬茅舍去相安誰與移根入畫欄儘道重簾妨暖日疎枝却得䕶春寒風標漫與萬花殊可有塵埃染得渠把住瓊枝相晤語只疑身在玉堂居和陸明叟了無閒事上眉纖一炷清香靜晝簾造化自從回暖律芬華頓覺轉窮簷輕風度栁春情薄細雨催花土脈黏所愧微官相束縛何因共訪酒家帘夜忩聽雨一炷夜香清挑燈聴雨聲雖然添客夢却可助詩情澤沁蘭心重泥酥笋角萌山行頻有約日日候晴明破榴蜂殻盈盈萬顆珠潤於瑪瑙浸氷壺吟心先自清如水嚼了寒霜骨更臞登應天塔雲級湧青冥金鰲載寶輪地髙心自逸天近足無塵圖畫千峰晚樓臺萬井春三生許元度曾此證前身鰻井在應天塔後羅漢堂舊聞有泉透海後為婦人所穢今枯涸矣下即濮邸園廟人言此井有靈源潮落潮生透海門陵谷未須窮變易朱牆裏是濮王園大能仁寺山門八百餘年戊戌秋震於風雨規模應甲刹殿閣擁金仙嵗歉炊煙絶城低野色連客僧皆散去主者獨安眠成毁難逃數山門八百年留滯何期踪跡又遲留行止於人自不由夢境固知空似蟻生涯却笑拙於鳩碧涵一鏡晴天濶翠擁千峰宿兩收從此公餘須杖屨未應草草度春休曉寒曲曲屏山憶夢中峭寒成陣入簾櫳宿香銷盡金猊冷一樹梅花却曉春晚思客思悠悠幸自安亦因吟事可相寛小忩過了㢘纖雨細與東風說晚寒用明叟韵併寓山行未成之意久客住蘭亭心同晉水清忘機盟宿鷺伐木聴雛鶯物亦知人意春寧有世情幽尋空作計一夜雨連明苦雨何期一雨成三日約客同行竟未能春到分時陰不解夜當深處氣猶凝簷低捲箔看飃灑礎潤添香散鬱蒸想見故園梅落盡和羮消息又堪憑雨中用雪坡韵無計酬春獨有詩倚欄終日候晴暉東風漸屬新桃李簾幕深􅅧燕子飛雪坡以雨阻山行有詩用以次韵為欲看山助眼明頻占鵲喜報新晴春光已過三之一塵世難逢四者并詩酒深情殊未適水蔬薄具亦頻更終來不似西湖好晴雨皆堪傍栁行月丹和鶴莊韵靈種飛來鶴頂紅誰云九轉有仙功廣庭曾侍東風晏留得霞杯照晚叢禹廟且要盡清歡須知一出難人因晴後喜春到水邉寛栁長官橋媚梅飄客袖寒荒祠存禹蹟得得又來看鏡湖一曲天與平湖老賀郎春波依舊染晴光可憐千載風流意付與租符曉夕忙用雪坡春色䪨纔出城門興便濃晴光野色兩俱融栁方染得三分綠桃已熏成一半紅山湧林巒荒寺隠湖分港汊小舟通相攜各自論年事㡬度春風一鬢蓬用梅溪鏡湖韵畎畝鏡中分滄波雜斷雲向來官裏賜今屬野人耘懐古天難問貪吟日易曛羽衣傳遺本起誦想餘芬天基瑞應宫舊毓聖地金碧擁瓊廬天開繞電區鳥流周室瑞蛇斷漢家符石井騰曦馭瑶壇布斗樞願將皇極福敷錫徧康衢送東蒲張應發歸永嘉客裏偶相逢襟懐亦偶同對梅吟夜月新栁間春風子勿言浮梗余方笑轉蓬歸程經雁蕩得句附郵筒碧桃月浸虚庭夜未央一枝靜對白雲鄉三生自結𤣥都約來伴疎梅到玉堂一春屢有陽明之約雨輒尼之將旋幙侍外舅來㳺邂逅二羽衣一能參上道一能知天丹竟日留話喜賦二解時清明日也㡬有行山約山靈早得知仙家寧易到塵世亦何為草潤非煙石花流止水池不晴還不雨正是賣餳時裂石未嘗闗毋將俗眼觀虛中原有愛造藴亦何難羽客能談道雲房識候丹只應仙有分風響步虚壇道間見桃李花東風到處競繁華不問窮櫩與大家垂栁􅁝中深院宇隔牆時有出來花古寺應天曾建塔又此結精廬釋氏縁何熟詩人念總疎壁荒遺盡水僧老學醫書咲我重來者經年不定居去年㸃木白洋僧居此寺奉和龜翁送别為説吟邉事曾陪讌笑頻自慚無韵者敢對有名人雨洗秦山曉波明鏡水春匆匆還别去芳草正如茵蕭山望城中遺漏見說天文變頻占太史臺但云星犯月不料火為災盡夜看煙滅逢人問訊來丹心勤戀闕東鄉極裴徊喚渡旋幙半載蓬萊地相攜只是詩心懐丹鳳去夢與白鷗隨俯仰俱無愧勤勞必有知歸舟平似掌天亦念孤危兩宋名賢小集巻二百三十八
