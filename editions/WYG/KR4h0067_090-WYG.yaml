body:
  text: 兩宋名賢小集巻九十宋陳思編元陳世隆補舒待制詩集舒亶字信道明州慈溪人也擢進士調臨海尉民有使酒逐其叔母者亶命執之不服即斬之投劾去王安石當國聞而竒之用為審官院主簿熙河路分畫界疆命亶馳徃于時洮隴新喋血亶即日引道至則示以朝廷威信夷人以肉置刀頭啗亶亶以口承之衆皆歡呼使還提舉兩浙常平召為太子中允御史裏行太學官受賂事聞神宗不悅亶奉詔驗治窮盡黨與加集賢校理與李定何正臣交論蘇軾作為歌詩譏訕時事軾坐貶黄州尋修起居注知諫院擢御史知雜上言郡邑不治監司得以按劾至中都官不治而御史顧不得行法誠使御史如監司人知所畏矣于是置六察官朝廷推行新法亶言役法不均責在提舉官神宗曰提舉官未可責也近臣僚有自陜右來者欲盡蠲免中下之民朕謂不然且中下之民多而上户少若中下盡免而取足上户則不均甚矣朝廷立法但欲均耳卿更可講求以聞遷給事中直學士院拜御史中丞上䟽論尚書省凡奏鈔法當置籍錄其事目今違法不錄既案奏乃謾以發厯為録目之籍亶以為大臣欺罔而尚書省取御史臺受事簿亦無錄目亦奏亶為欺罔又劾奏亶直學士院日違法請厨錢臺官朋蔽不言請付吏事下大理獄具當坐贓追兩官勒停哲宗即位授保康軍節度副使至徽宗即位起知無為軍復以言者罷久之知南康軍崇寧初辰州巒叛以直龍圖閣知荆南府亶選形勢得飛山福純坡建新城為控扼之要以功除龍圖閣待制卒年六十三仗錫山何人仗錫過千峰雨裏風烟轉不窮暗壑水聲清決決深巖花氣濕濛濛遥知雪嶺開亭近舊說雲鄉有路通自恨青鞵踏城郭仙游長在夢魂中阿育王山參天松柏綠陰陰古佛巖前一路深猿鳥不驚如有舊雲山相對自無心數泓寒水雲藏雨十里輕沙地布金杖屨更知非世境上方日日海潮音香山智度寺在慈溪縣龍䕶禪堂鉢雲籠古殿燈經窗僧待月茶井客敲氷驚鴈回峰影踈星壓墖櫺心清更無睡未讓省郎能空洞雲探月高齋客聚星霜分破窗白山獻隔簾青窺水知僧定占雲識地靈時時驚鶴夢木葉下危亭宿鷺亭雲過千溪月上時雪蘆霜葦冷相依正縁野性如僧癖肯為游魚下釣磯白雲山高低深淺逐陰晴一簇林巒畫不成誰道青山怕雲㸃白雲㸃處轉分明四山靣靣玉成圍只待閒雲去又歸更有小軒人不到落花狼籍㸃苔衣寶嚴寺四山烟雨收雙沼漾晴碧白鳥忽飛來㸃破簷前色雙乳泉石眼雙開白欲漫潺湲更傍碧琅玕地饒爽氣全無滓天借靈源兩不乾曉月自分雲外潤午茶誰鬬雪中寒孝先多睡相如渇始把清甘乞取㸔太白山千峰下視盡兒孫仙事寥寥不可聞長作人間三月雨請看膚寸嶺頭雲天童山日日青鞵踏白沙未應泛艇即靈槎雨溪清越鳴哀玉風蔓蜿蜒動暗蛇曉潤芝􅓕挑秀茁午香茶竈煑蒼芽玲瓏仙客知何在千古烟霞自一家明覺院不管霜毛不貸人一年舊了一年新山窗未曉聞山樂可是梅花漏洩春㫁橋閒下路横斜隔水人烟四五家雨後一枝紅帶雪風流不道有巖花小白山前大白山两山强坐屬僧閒何時卜築三椽地黃㡌青鞵日往還隠學山曾是談經一艸堂千年金碧欲飛颺頂峰有路青天近絶壑無塵赤日凉月底露驚猿鶴夢雲中風動薜蘿香芝􅓕茶竈平生念遥謝仙人白羽觴青山鳴雲過雨翠成堆天淡平湖一鑑開萬木號風韻絲竹千峰帶月上池臺静無俗駕金鋪地閒有高人玉滿盃聞道碧桃看欲發劉郎何事不歸來舊時劉誼翁有留題十里松行翠插天暗溪嫩艸尚芊綿笙歌自滿蕭郎宅琴鶴空隨賀老船未分舊游雲寂莫遥知歸夢蝶聫翩故郷幸好宜回首還見人間换一年鄞江地呑越絶海分深渺𣺌平流萬馬駸早晚渡船潮有信往來鷗鳥客無心寒空倒影千山動暖日澄波萬籟沉安用魚龍閒養鬛平時春雨自成霖春樂軒隔水巖花紅淺深花邊相對語幽禽管絃不到山間路誰㑹憑闌此日心大梅山萬壑聲中柏子烟高僧日日看雲眠當年象虎今何在千古寒堂一鐵鞭仙去人間地轉靈蛟龍合處谷風生誰知雲霧千峰頂長得青天霹靂聲流水山間無盡時登臨到處與心期世人只愛桃源好梅熟山間那得知雞犬同時亦上昇赤霄今日㡬人行我來正唱昇平曲不用山間變姓名虎跑泉在太白山天童寺之側一嘯風從空谷生直教平地作滄溟靈山不與江心比誰㑹茶仙補水經尊教寺竹砌縁寒渚松蹊藉綠苔樓臺隔林見花木帶雲開溪旱長流水峰青自隠雷月華㡬萬頃誰棹酒船來金峨山叱咤滄溟雪浪空鯨鯢騎去杳無蹤煉丹井上春蕭索知在蓬萊第㡬宫一作重五峰山何人縮地海東偏靈岳分來不記年㡬見彩雲爭照日直疑仙掌欲擎天依希故國松千尺迤􅆔前山石一拳四面開窗看不足老僧時立碧溪前灌頂山十里曾聞一嘯聲當年猿鶴想猶驚白雲不礙青天路嬴得重來擺手行萬松偃蹇揷雲根四面諸峰盡子孫日日飛烟雲霧斂不妨掌上看乾坤雷頂髙僧眼覷天只應風月是生縁那知坐作人間雨千丈巖頭一道泉月湖金碧樓臺閣暮烟彩虹雙影卧漪漣雲鋪物外無塵地月滿人間不夜天細栁千門惟畫舸華燈兩㟁度鳴絃清狂亦有黄冠客不負仙人載酒船十洲風籟韻笙簫疑有仙人燕碧桃影逼銀河星半墮氣呑月窟免爭豪九秋波浪沙鷗狎萬古功名釣艇高却恨何須明似鏡空令志士泣霜毛和太守劉户部珵十洲詩花嶼暖吹紅葉上青枝掠水風烟巧事持蜂蝶鸕鷀各芳意錦囊消得探春詩芳艸洲小雨如酥露乍晞嶼花汀栁自相依畫橋不礙尋春屨誰傍烟波拾翠歸栁汀困倚滄波綠動揺冷烟疎雨共蕭條誰將輕薄嬌春態强拂人頭向市橋竹嶼欲問葛陂安在哉端疑波底化龍來子猷此興君知否小徑何放巻竹開煙嶼漠漠寒蘆不見花暗藏鷗鷺啄晴沙暖風吹起渾無定半落僧窗半落槎芙蓉洲照水枝枝蜀錦囊年年澤國為誰芳朱顔自得西風意不管清秋昨夜霜菊花洲懶對陶家酒甕開東籬寂寞久風埃㑹湏結取登高客折上龍山醉帽來月島何人騎鶴上瀛洲清影明波正九秋吹罷玉笙端不見滿空桂子有誰收雪汀㸃栁糚梅不暇裁平波直擬涌瑶臺釣磯葦㟁知何許㡬誤漁舟夜半來松島亭亭古幹對滄浪雨細風飄吹老香晚嵗何人同寂莫水西我有讀書堂十洲閣綠玉手持尋五岳正應未識海邊洲倚欄花木參差見對㟁笙歌次第游烟霽多疑九峰曉波平全勝六鼇浮仙風坐隔紅塵路消得丹青咤北州翠巖山桃源深處一招提門對寒雲路繞溪長使千峰光景動未應洞裏老金雞玲瓏巖詭形迥與萬山殊空洞由來一物無直恐虚心自天意人間穿鑿枉工夫響石淵明休弄沒絃琴混沌中含太古音聞說㡬回風雨夜四山渾作老龍吟咏雪茅君失却三神鶴王母應添五色鱗草木未香花事動乾坤不夜月華新邨居水繞陂田竹繞籬榆錢落盡槿花稀夕陽牛背無人卧帶得寒鴉兩兩歸和石尉早梅二首霜林盡處碧溪傍小露檀心媚夕陽天下三春無正色人間一味有真香相思誰向風前寄趁早先從雪後芳朝夕催人頭欲白故園正在水雲鄉依然想見故山傍半倚垣陰半向陽短笛樓頭三弄夜前邨雪裏一枝香可能明月來同色不待東風己自芳幸免杜郎傷嵗暮莫辭吟對釣魚鄉太白山在明州何年杖錫此徘徊天上真官為我來芝圃鶴歸香火冷石碁空鎖舊花臺夢入天台天風吹散赤城霞染出連雲萬樹花誤入醉鄉迷去路旁人應笑却還家湖心寺吹落清香縹緲風樓臺彷彿水邊紅人間誰是丹青手畫取春湖細雨中兩宋名賢小集巻九十
