body:
  text: 兩宋名賢小集卷二百七十四宋陳思編元陳世隆補石屏續集二戴復古飲中布衣不換錦宫袍刺骨清寒氣自豪腹有别腸能貯酒天生左手慣持螯繩頭驥尾宜千里鶴在雞羣亦九臯賢似屈平宜獨醒不禁憔悴賦離騷靜齋張敏則舍人贈詩因用其韻為酬胷次詩書一𣲖清學如耕稼到秋成十年閉戸存吾道萬事無心逐世情葉落花開闗氣數山長水逺是功名摩挲老眼看新貴九鼎鴻毛孰重輕客遊不能鬱鬱窟中藏大笑出門遊四方與世周旋持酒盞觀人勝敗坐碁坊倒餐甘蔗入佳境盡著錦衣歸故鄉此志十年猶未遂倚樓心事楚天長新安寒食不擬今年到歙州要知行止豈人謀一百五日客懐惡三十六峯春雨愁老矣此身猶道路淒其歸夢繞松楸花瓢仙子無由見千里江山負逺遊烏聊山登覽抖擻囂塵上翠微傍溪寺上坐題詩忽聞啼鳥不知處細看好山無厭時風掃雲煙開逺景人攜香火謁荒祠客來千里登臨意説與時人未必知癖習平生癖習未全除虚事經心實事踈為惜落花慵掃地每看脩竹欲移居逢人共作亡何飲撥冗時觀未見書爭奈一貧隨我在思量不若把犂鋤趙升卿有官不肯為里居有賢聲訪之於深巷中深居陋巷不妨幽翠竹當門水滿溝每遇事來先學嬾欲為官去又還休田園自樂陶元亮鄉里多稱馬少游除却讀書無所好有時閒作北巖遊郎化城巖也括蒼石門瀑布一泊竹門觀瀑布明知是水却疑非亂抛雪玉從天下散作雲煙到地飛夜聽蕭蕭洗塵夢風吹細細濕人衣謝公蠟屐經行處聞有留題在翠微杜門自遣世事茫茫心事灰衆人爭處我驚回閉門不管花開落避俗惟通燕往來富貴在天求不得光陰轉地老相催平生任達陶元亮千載神交共一杯登快閣黄明府强使和山谷先生留題之韻未登快閣心先快紅日半簷秋雨晴宇宙無邊萬山立雲煙不動八窻明飛來一鶴天相近過盡千帆江自横借問金華老仙伯幾人無忝入詩盟秋日病餘桂子吹香風露深老夫吟了聽蟬吟秋來賸有湖山興病後全無涉世心詩苦積成雙白鬢酒豪輕用萬黄金平生意氣今如許獨抱傳家一破琴都中懐竹隠徐淵子直院手攜漫刺訪朝官爭似滄洲把釣竿萬事看從今日别九原叫起古人難菊花到死猶堪惜秋葉雖紅不耐觀多謝天公憐客意霜風未忍放深寒詠梅投所知留積之水林中作潔白無瑕美不嬌炯如珠玉粲林臯獨開殘臘與時背奄勝衆芳其格髙欲啓月中休種桂如何仙苑却栽桃不將品質分優劣痛飲花前讀楚騷簡陳叔方問病聞君卧病知何病醫者難從脉上尋自是讀書多損氣或縁憂國重驚心飽參妙理牀頭易細寫幽懐膝上琴蛇影無疑自無恙此方何止直千金衡山主簿朱行甫留度歳衡山之下湘江上風月留連去較遲四海弟兄多不遇一門父子兩相知梅邊竹外三杯酒歳尾年頭幾局碁羈旅宦遊俱是客細論心事共題詩家中作四海飄零似落花十年秋鬢帶霜華歸無駟馬空題柱敝盡貂裘忙到家觸目半成愁境界安心旋辦老生涯可憐持蟹持盃手小圃攜鋤學種𤓰蕭學易何季臯和作别詩佳甚再用前韻少年行脚白頭歸不負平生汗漫期望斷海山雲漠漠愁生江路草離離一篇王粲登樓賦幾首巴陵送别詩獨倚篷窻無意緒瓦盆傾酒憶金巵趙用甫提舉夢中得片雲不隔梅花月之句時被命入朝雪中送别用其一句補以成章一時議論動諸公有詔西來玉節東又見清朝更大化好趨丹陛奏孤忠片雲不隔梅花月一雪翻成栁絮風把酒莫辭今日醉明朝車馬去匆匆兩宋名賢小集卷二百七十四
