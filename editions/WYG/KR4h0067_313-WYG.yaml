body:
  text: 兩宋名賢小集巻三百十三宋陳思編元陳世隆補疎寮小集高似孫字續古餘姚人文虎子淳熙十一年進士厯官校書郎守處州有疎寮小集入餘杭縣明發遵西陸驅車月流光佳山迎車来知是古餘杭危樹露如雨平野日未陽支流滀清源弱羽無高翔人家叢灌下世載山水鄉扣門作午憇白飯羞文魴邂逅有足歡離合非其常主人不予鄙予留亦徜徉憇昌化民家晚程息勞轍白日流西輝水鳥得魚去耘夫荷鋤歸川原杳仟緜林野雜依霏一来扣竹館相邀入荆扉重巖吐清溜澄隂有殘馡曰予考此室十世相因依左右桑果足嵗時雞豚肥豐猶未至裕歉亦無能饑予聞良自愜欲謀北山薇有田當共畊有蠶當共衣車夫猝無情此志仍重違答李才翁素意杳難尋殘罏属晚隂花知西洛事鴈叫北人心客共艱難盡詩随老大深金陵書不到消息又沉沉宋江都研數寸清純玉不如入波陶髪冷蕭疎千金爛抵荆山鵲一璞深刳渭水魚墨帶花香臨近澗泓澄燈影了殘書從來端歙難優劣名下真成士不虚答宇文文學無能應俗苦皇皇詩不驚人筆事荒天下無山如飯顆人間有水自滄浪左杯右蟹一舟足早韭晚菘三畆強莫謂覺來亡可嗜逢人猶自覔花忙燕文貴山水圖道山堂上銜府畫展巻猶能記老燕十日何由辦水石千金乃可分江天楚湘兩岸風落木海嶽三秋鴈度川大山小山俱好隠江南夢去曲肱眠答武昌吴廣文平生不識武昌樓官栁青青好在否庾亮笛吹黄鵠月簡栖碑駁碧苔秋山横赤壁含情斷水出瞿塘快意流何處叫君同一醉並舟秦女擘箜篌丹砂歌謝胡史君恵砂牀宜州丹砂産暘谷不比辰谿攅箭鏃素霓深抱赤城霞斬猩半染于闐玉海日下照珊瑚紅化為姹女金芙蓉一從擘華分禹璞猶有絳炁埋雲峯鑄鼎泥壇有消息坐有光輝成五色淮南雞犬亦同升九轉真能生羽翼琵琶引人生聚散難為别何况匆匆作吴越梅梢帶雪下昭陽明朝便隔關山月長城不戰四夷平臣妾一死鴻毛輕回慿漢使報天子為妾奏此琵琶聲長安城中百萬户家家競學琵琶譜酸聲苦調少人知食雪天山憶蘇武西風吹霜鴈飛飛漢宫月照秋砧衣嫖姚已死甲兵老公主公主何時歸銅雀硯歌曹公夜讌凌雲臺一言􅆻濶含餘哀分香老伎各雲雨歌舞不盡埋蒿萊漠漠頺基鄴山下萬里煙雲無一瓦井榦樽酒自平生烏鵲飛南播遺雅老農墾雨開荒寒一礫千金苔未乾世人好奇不好近直比周簋仍商盤老璞渾渾殊質魯得水猶能發妍嫵更與人間作瓌古月明夜盗西陵土黄居中瀟湘圖歌天􅀈而雨斷兮作蒼梧九嶷之髙秋風行而川怒兮洩瀟湘洞庭之奔流樹不知名兮山抱複嶺沙不計程兮水趨他洲波作止兮蛟舞蛟蟄雲晦明兮猿呼猿愁原不可作兮蘭亦塵土賈傅歸漢兮鵩其何尤誰呼魚兮北澨有酒誰鼓枻兮南津有舟懐斯人兮杳靄千里目悵望兮吾其歸休寄吴鈐幹有偉千人傑能為萬里游挂帆春背鴈問澤夜驚鷗道路空留滯文章莫暗投九疑生兩過三峽帶寒流采藥青神觀題詩白帝樓乾坤供爛醉星斗照閒愁漢已歸蕭相天難壽武侯詞人頭欲雪壯士淚如秋中下猶須策西南夙倚籌有錢書盡買滅鹵志終酬猿破髙唐夢龍駲灔澦舟行人定安穏身近可歸不騎鸞引贈句曲山吴道士夜騎白鸞出琳闕三萬仙官鏘珮玦雲雷妥帖過剛風左推日丸右扶月一息瑤池翠水家阿母迎謁龍驅車青娥彈絲玉妃酒坼盡蟠桃紅玉花九天大人來問道太極之前天不老丹霞一炁玉樞宫寳笈繩金容探討井君沐浴波五色洞房光芒上奔日天上傳呼六丁直星斗離離礙鸞翼聚景園翠華不向苑中来可是年年惜露臺水際春風寒漠漠官梅却作野梅開四聖觀水明一色抱神州雨壓輕塵不敢浮山北山南人喚酒春前春後客凭樓射熊館暗花投扆下鵠池深栁拂舟白髪邦人能道舊君王曽奉上皇遊石楠自随野意訂山行香浸楠花白水生借得風来帆便飽隔溪新度一聲鶯木香下簾深與意商量無酒何如此夜長一樹木絲仙有分依然只作秘書香梅舍南舍北雪猶存山外斜陽不到門一夜冷香清入夢野梅千樹月明村紀夢翠峰嵯峨三十六寒泉落空響哀玉岩花石路勢縈行玉闌干䕶修筠緑雪髯老人負紫瓢金絲塵尾搖相招紅螺酌酒湛湛碧坐倚蒼石吹洞簫孤鶴來傳天上詔老人挽予偕一到飄飄髙舉凌青㝠直過罡風履黄道祥光樓閣倚崢嶸神虎守闕森衛兵雙闔朱扉忽微啟中有靈官来逺迎絳衣持斧立丹陛玉皇手中玉如意雲璈風瑟自宫商天聲清越非人世帝旁青童傳帝宣文華宫中呼謫仙謫仙顧予笑且言子宜急返来他年探懐贈我五色筆子當寳之慎勿失濃香氤氲迷帝所長揖老人下西廡身從日月上頭行俯視斗杓今子午雲氣相随步武生過耳但覺松風鳴覺来握筆紀佳夢月明樓鼔撾三更兩宋名賢小集巻三百十三
