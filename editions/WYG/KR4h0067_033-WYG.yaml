body:
  text: 兩宋名賢小集巻三十三宋陳思編元陳世隆補竹友集雨後秋山宿雲散層隂秀色還叠障如將螺子緑畫作長蛾様光浮竹木杪影落簷楹上何人妙盤礴淡墨冩屏嶂五絃豈須撫衆響亦清亮我病不出游素壁倚藤杖舉觴酹羣峰嵗晚一相訪種松清晨課僕奴遶舍誅蒿蓬身非郭槖駝學作種樹翁胡不種杞栁但種青青松念汝受命獨勁氣凌三冬明年見汝生何年矯蒼龍種徳亦吾願穆如松上風安知百載後無人思角弓麥隂行可頼不必荒茅中惟當䕶以棘養視如嬰童此法豈浪傳聞諸玉局公同董彥光陳妙音游安樂寺分韻著鞭蒼厓隂下馬古寺門老僧乞食去獨瞻無上尊相將二玉人盤礴共一罇境靜悟塵垢林香識蘭蓀何年缽羅老同訪花栁村鳥能貫珠歌花能折腰舞老人如鴻江識此真律吕擊節復長謡急觴猶插羽春風已趣裝行樂更幾許吾人但取醉何必浪自苦聞彥光田舍遇火幾焚其廪睡龍未覺山澤枯其誰濡幕待不虞炎官弭節飛亷怒小屋旋徹大屋塗鬱攸飛空百鳥噪煇赫照樹騰􅆐呼緑林灰燼一瞬耳況乃田父蝸牛廬天公似惜詩人癯約束風伯為回車百神救廩鳥工往不待綆缶澆焚如尚令太瘦逢飯顆幸未饑死同侏儒怪竒敢追陸渾韻弔賀不必叅元書作詩嘲誚共一笑逄人舉似應胡盧許巨源送笋君家遶屋青琅玕驚雷裂地千兵攢入山長鑱不汝赦日獲玉版登君盤有餘䑕壤幸分似憐我羮稀筯易寛厨人取給晝餔膳頓使齒頰生甘寒韭葅薤苗豈復數䏑美似覺無貒貛嘗聞幽士愛風竹忍嘬其子吾何觀願君養成四時葉他時犯雪同君看灌園春初韭爭妍秋末菘更好嗟我喜蔬食如人嗜羊棗何嘗厭滋味政自樂枯槁念彼蝡蠢蟲性命欲自保變相驚蜊異將糖嫌蟹躁故於園日涉蒔此可食艸邇來秋雨餘三畝凈如掃畦丁猶浸灌小甕亦自抱問許機事忘何如漢隂老題顧凱之醉道士圖虎頭癡絶自不癡丹青妙處手得之石巖戲畫㓜輿子酒狂更貎黄冠師一人坐睡真被酒二人杯杓不停手一人回面愁不釂二人直視開笑口上有醉墨書者誰翰林手題獨酌詩題詩真識醉時味畫圖如冩詩中意珍藏不換一斛珠李詩顧筆今世無題文與可畫竹我昔居西園手植竹數箇凛然如徳友節行不敢破朝吟玩霜枝夜聞蕭瑟清風吹一旦忽不見似覺塵土汚人衣朅來翠雲麓日惟見山不見竹雖云山氣日夕佳尚恐無竹令人俗昨得與可畫自掃塵壁掛門開風動之如枉故人駕對山看畫信不惡何人更覔揚州鶴寄孫子稷我家大馮君清詩跨隂何尤工婕妤怨不愧青草歌後生游其門玉石例琢磨是中知味少莫辨白黑鵞獨聞子孫子鏘然應鸞和君嘗喜其似謂可同臼科劍池佳山水清漣映嵯峨孫子居山間新詩日吟哦探囊肯投我百篇未為多論文定何時一醉金叵羅更嘗期皓首共理釣魚蓑登同樂亭飲泉何人愛斯泉結搆泉上屋空亭何所有冷氣宜三伏泠泠石甃淨須眉直可矚欲飲無樽罍挹彼纔盈掬何時近亭居更種亭畔菊日飲潭中甘庻用稽死録呉民載棄意堂此身聚沫無為強斧工伐性藥腐腸寸田蕪穢尺宅荒玉石落落不滿房黄婆居中補四方焦勞亦坐意所藏土如磽瘠草不芳令人槁項馘亦黄世人紛紛各膏肓我以妙語名斯堂期君得意觀濠梁從渠婪酣狠如羊君自放意無何鄉一洗痼疾生天光漆園發藥君得嘗次董彥光乞米韻董侯朝飢雷殷腹咄嗟無人羞豆粥杜陵太瘦縁作詩玉川辛勤坐憎俗細君截髪恐未暇有弟能令餉君粟不妨更就乞㯽榔他日金柈供一斛分韻招無逸兄得益字長懐烏衣游親姓何戚戚吾曹乃其後何不追往迹向來鴻鴈影曠若参商隔沉思不可見佇立久悽惻去年霜霰中送别衢路側今年冬風至猶未見顔色念我如楚囚欲往終未得倘能為我來不逺道里百要觀衡茅下有此座上客新釀秋已熟老菊寒尚折彌年心怫鬱可以一笑釋仍當戒後乘聯翩載三益翠雲分韻得禪字杖履信所適溪流忽濺濺行入武陵村偶入桃花源劃然見華屋佛界開青蓮怱怱伊蒲饌一餉腹果然同游得吾黨曠逹真能賢董何韻俱勝欲拍諸阮肩兩王亦豪舉一擲常萬錢周郎秀眉宇要是佳少年衆中兀坐子少味亦寡言困眠借僧榻自嘲邉腹便平時所懐人磊落星辰懸會合不易得兹游豈非天重來恐寡伴獨訪祖師禪寄李商老兼柬文若季弟有客春來傳尺書書詞字字敵瓊琚經時伏枕沉綿甚異縣論文消息疎物外高情想三鳯眼中何物當雙魚遥知小弟凄凉意騎省歸來正望廬晝卧二首書魔纔挽睡魔推鼻息俄驚吼怒雷夢到逍遥大庭館不堪簷外鳥驚回剥剥啄啄無俗客清清泠泠多好風一枕本無憂樂累何須游宦大槐宫青精飯三首霍山王鄧兩真隠駕鶴乗雲飛九天當時服餌定何物同飯青精三十年從來見説青精飯晚遇真人隠訣中長恨聞名不相識那知俚俗號烏桐南人雖號烏桐飯過熱翻成作淖糜太極真人方未試茅山道士寄何遲送酒與晏如居士二首南人釀酒詫深紅注瓦真成琥珀濃與藥相投莫宜此急分多病晏如翁此翁曾把春償酒醉插姚黄更乞花多病只今猶解飲細傾聊為遣生涯示李商老兄弟月夜宜披宫錦袍定知公軰豈蓬蒿文同修水波瀾闊人與廬山意氣高伯氏最於三虎怒凡兒何翅九牛毛相逢徑欲倒家釀莫厭尊前持蟹螯夏日游南湖麯塵裙與草爭緑象鼻筩勝瓊作盃可惜小舟横兩槳無人催送莫愁來咏金來禽林上離離金彈丸宜隨玉食薦金盤從來物以逺為貴酷愛閩中荔子丹書懐頼有書遮眼初無客就談身閒惟取醉髪短僅勝簮學僻令何用囊空寳不貪老師行駐錫凖擬問前三次李商老端字韻胷中磊磊夜光寒霹靂驚飛在舌端夢去幽尋遶山麓詩來喜色上門闌四時更運不停軌萬物並流皆病湍兩髩凋零壯心在忍窮懐抱若為寛招汪叔野夜語僧窻雪載塗别來夏木又扶踈兩牛鳴處地非遠萬竹隂邉吾所廬兒能竊聽從忘箄子盍徐行可當車莫訝南鄰狂處士掺撾傾坐一軒渠投贈通守陳虚中前驅負弩斾旌忙凛凛寒風挾曉霜人道姦藏有三穴公知民病極千瘡揺毫端是霹靂手抵几還驚鳬鶩行莫向琳宫坐閒冷太阿何事匣中藏晚晴步塘上漫蹈斜陽堤上行偶逢白叟問年登去年禾乾龜兆坼今年雨多禾耳生鳴鳩雲隂解盡却殘暉屋上鳴鳩喚婦歸不見池塘烟雨裏鴛鴦相並濕紅衣聞吕居仁病未差覔使寄問消渴文園苦病多蕭條子美卧江沱士窮不遇古如此天實欲為人謂何忠義名家忝申許文章秀氣望岷峨期君煉玉煮白石色比嬰童何啻過種竹闢地種修竹得方縁秘經成隂向北宇倒影落中庭直取内含素豈惟枝鬬青龍鍾玉川子猶擬抱添丁次韻季智伯寄茶報酒三斛歡伯風流可解憂疑君此外更無求揀芽投我真抛却不是能詩薛許州二生相逢妾換馬我今直成酒易茶腐腸銷膏亦可戒與子服霧餐朝霞君如張籍學古淡麗處往往凌隂何長句短章時寄我為君翻入竹枝歌懐鍾陵舊游五年二度過鍾陵馬上春風醉裏醒南浦江波迷眼緑東湖烟栁半天青從來地域歎卑薄怪底山川終炳靈又見徐家有高士他年重作䀻君亭湯泉泉在法水寺後亂泉如沸出灣環餘燠猶霑野寺間但與山僧洗塵垢還勝漲膩在驪山食蟹四首端為懐黄取醢烹豈縁多足恣旁横焚臍未用集䑕軰椎髓方嫌太瘦生分付厨人苦見嫌十臍元有九臍尖要知其中未必有輸與蛤蜊如蜜甜論功直與酒盃同何事生憎在水中不使落湯頻下箸終令骨醉耐春風有國嘗憂以味亡須知有毒味中藏誰能不累口腹事莫趨秋風啣稻芒以牛膽漬槐子送董之南二首雪霜無頼㸃君髩五十龍鍾成老翁急分槐實要腦滿佇見頭青雙頰紅解牛得膽大如斗投以元槐功更加來嵗青袍映緑髮不妨看盡九衢花送王坦夫由淮南入京王郎乗興上扁舟數遣書來冩我憂奏牘三千待金馬巻簾十里夢揚州桃花水漲理歸檝蓮葉盃香消客愁白髪倚門長望子細君應賦大刀頭游安樂寺陳妙音載酒遶郭尋春未見花不知春在梵王家林間新翠張裙幄席上殘紅當臉霞興逸持盃睨雲漢飲酣揮翰走龍蛇主人不是陳驚座投轄歸時日已斜兩宋名賢小集巻三十三
