body:
  text: 兩宋名賢小集巻一百十一宋陳思編元陳世隆補倚松老人詩集上饒節字德操撫州人曽布之客也性剛峻與布論不合因棄去祝髮為浮屠更名如璧自號倚松老人李太白畫歌先生之氣蓋天下當時流輩送百舎醉中咳唾落一作雨珠璣身後聲名滿夷夏青山木拱三百年今晨乃拜先生畫烏紗之巾白紵袍岸巾攘臂方出遨神逰八極氣自稳氷壺玉斗霜風髙嗚呼先生太絶倫仙風道骨語甚眞肅然可望不可親懸知野鶴非雞羣天寳之初天子逸先生辭去不肯屈采石江頭明月出鼓栧酣歌志願畢只今遺像粉墨間尚有英風爽毛骨宣州長史粉黛工誰令冩此人中龍細看筆意有俯仰妙處果在阿堵中人云此畫世莫比吴侯得之喜不寐意侯所愛豈徒爾亦惜眞才死泥滓先生朽骨如可起誰為獵之奉天子作為文章文聖世千秋萬古誦盛美再拜先生淚如洗振衣濯足吾徃矣送傅仲黙登第歸麻姑謝安中年不堪别况我與子本末同臨川古郡著名數麻姑耳在邦域中建昌舊属臨川與君同方復同術十年共度虀鹽日一身爛漫天地中萬里風霜今白髮南山之封木拱矣此身萬事相終始何知遲暮猶羈旅夜雨對牀輙三起君今先着祖生鞭我窮未辦買山錢君行啟我方寸亂抱琴長歌聲徹天西風蕭蕭木脫葉表裏家山落眉睫為誰淮南大小山雖在侯門不弹鋏石魚行贈靈壁張氏磬石山中石無主百里厚坤不承土土人出石如出金掘地及泉隧而取重重徹之如徹席凡材頑狠丘山積中藏一板金玉精定是陶鎔鬼神力黄鐘之律生于黍近代縱横不如古近世定樂或以縱黍累尺黍大而尺長或以横黍累尺黍細而尺短天生此材豈苟然伐而用之百獸舞師襄入海工不精且製嘉魚大小鳴大為王鮪施僧飯小為魴鰥依石屏君家二尾儻遺我要喚兒曹坐睡醒遇里人道及鄉閭事作詩寄謝無逸敝貂去國漫西東聞說一作閒想鄉閭夢寐中賈豎裹頭仍納婦驪駒将子又追風雲山何處非投老文史他年不療窮富貴可求吾亦願眼看餘子化王公次韻彭聖從秋興淡雲疎雨承秋早白露清風引夜長已見畢星朝北極似聞驍騎巻西涼隻雞還我田家味小鳳須君官焙香千古歩兵今逺矣属誰長嘯作鸞凰阿智歌吕卿諸子森如蝟不作一作汙世間兒女氣封胡羯末自行列麟鳳龜龍各異致小兒阿智有七齡衮袞似欲無諸兄疎眉秀目澹玉雪覆肝立壁開天庭自從諸兄授孝經淋漓筆墨有典刑客来推席儼在庭舉頭揮客客為驚吾知吕卿大源委黄河崑崙千萬里政令凢兒出其中不扶而直麻生蓬况如此雛落落自竒偉出門汗血當追風一作少九芻抺當追風山居雜頌三首溪邊小立聽溪聲日到溪心滾滾明獨木自横人不渡隔溪横犢轉頭鳴華嚴臺一作堂上平如掌自是逰人路不通要識普賢眞境一作法界亂山如浪湧一作白雲中數日春晴退水㾗落花如抱擁藤根過盡遊人渾不見人隨波浪下前村次韻米元章壯觀曉色村村澹春風樹樹穠八窗中夜月千里隔江峯酒道窮通樂詩原左右逢客來應下榻石銚煮長松息慮軒詩雨暗藤經屋春深草到門客來非問字鶴老不乘軒花氣翻詩思松聲撼醉魂呼兒换香鼎趺坐竟黄昏送梅郎一首梅郎可愛如蜀栁風流似是子真後抱器來賔太學堂五年自袖采蘭手來時落鴈揺虚弓汗血長鳴西北風自誓壊韓復蠧魏可憐一無咫尺功我亦數竒困蓬累玉山氷川失眼底永嘉堂上聞阿連墮食正冠為君起君今製衣作行具何以贈之白鷺羽殷勤持送重似人漠漠深藏飽魚蠧船頭逢逢奏曉鼔巻簾卧㸔春江雨到家春温鴈且北寄聲布㠶無急不鄰居遺湯沐浴都城甘水嗇于酒擔頭取飽得滿缶每憶江湖萬松底夜半酒醒挽石斗如今長卿不滿喉豈有温泉濯汗流岑岑背若負芒刺每向一飯懐千憂君家有酒金作欄轆轤可取不可殫大奴分遺足一斛洗我塵垢生羽翰人生生理易與耳輟洗為君起長歎送宿州晁祖禹簽判祖禹承謨簽宿三年郡事倚辦為多僚属士民莫不嗟惜其去節作小詩聊致意焉一見晁公子雍容前輩風規為俗吏外歩作古人中環佩千官合梯航九驛通空虚循吏傳誰為薦諸公從人覓山水扇二首少壮﨑嶇山水間短衣楚製略勝寒年來疲病歸期墮只乞君家便面看愛君才氣恥言兵欲倚詩書繼老成手裏林泉當付我恐妨抽板揖公卿書天源河上友人壁春色撩人不奈渠紅塵無處可飛鳬懸知桃李付流水來看垂楊十萬株次韻答陳考城袖裏楞伽非世書了知乾沒未殊途㑹攜他日已漫刺歸謁南山五大夫冬日書謝氏園壁瓦缶藏春土脉乾嫣香已謝菊花團履聲遶盡欄干曲肅肅松風作暮寒送同舎葛茂逺還浙東二首豈無强醉楊司業固有無錢鄭廣文三請未能勤問道一歸今日願從君隋河東下一千里僮僕未知行李勞聞道起苗今結子為君飽食賦離騷趙元違婦孕不育後數日其猶子生一女子二子皆有戚戚之色戯作此詩開之十年不見陳驚坐二子相逢心亦可高帝子孫果隆準杜陵先生豈欺我甘陵夫子孕不育世無元化操五毒乳醫袖手輙寤生不藥而喜神所福君家阿濟王湛之姪頥未髯頗恨生子不生男人間乆乏古烈女世上多歎吾兒凡應當有子問賢否弄璋弄瓦詩人口木蘭買馬替爺征班超嗣兄成漢表人生得此二子者安用癡兒閙昏曉况君各自富春秋有女如玉方好逑必欲商瞿有男子殷勤更問東家丘送彭淵才如北都武學如水馬盡日忙不進結交有神竒所得盡豪俊十年困三舎萬事劉兩鬢風流半零落吾道或拘窘彭侯南方來超妙一作意象有逺韻落落澗壑姿倒屣解吾慍胸中幾年讀正朔謹堯舜盤盂百家伎鉤致得幽藴一作初手探其藴夜半一商略氣與山嶽峻方君及衞霍自是老行陣崢嶸濟時術百未一見信自言窮達機黙與寒暑運功名蓋一作或偶然未暇以身徇偉哉君子勇一語破幽憤何時燈火底懐抱為吾盡賦王立之家四梅化工轡六龍風雷與推軌談笑却氷雪咄嗟辨桃李紛紛西園英轉眄即塡委獨餘四種梅氷玉自標置豈争滕薛長未與管晏比微風挽寒條草木競披靡蠟梅異一作妙天質芳香輩一作乾蘭芷蠟梅正如蠟為之樹絶不類梅其香正如蘭多葉美無度勝韻洗貪鄙紅梅拂一作傅曉粧深淺自有體單白亦閒淡冷艷照流水初如王謝郎雍容各簪履出處豈皆同一一竟可喜此花固不凡俗眼自多眯栽培或一遇得此輙遺彼君家獨兼有班壓萬紅紫况當春社前朝暾媚一作麗窗几我無筆五色為此了衆美安得九轉丹暫起萊陽吏寄曽伯容豈是從前蹤跡疎三年不送一行書襄山倘有陪鄰地為問洲中種木奴虞姬墓風悲月黒楚歌聞泣下虞兮夜未分千騎星飛向前死不知誰為閉荒墳用海印和尚韻和吳提刑逰山頌白崖老將臥遥岑苗裔分明祖少林遂有樂天來問道不妨黄蘗為傳心繩牀斜月坐秋晚石銚寒泉語夜深一枕竹風清未晚堂堂魚鼓現觀音答惇上人二首因君掩我强題詩却憶當年夢裏時不識江南好風景採蘋人唱鷓鴣辭少矜平子四愁詩晚學趙州十二時千里故人不解事書來猶記竹枝辭雨中同無求逰龜山勝相觀丈六金銅像歴諸小刹無求作詩紀事次其韻三首細雨無烟晝不開杖藜同訪古如來聲求色見無非道舉似時人一任猜芒鞋印雨渉泥行誰是官人誰是僧我已無心慕支遁君今寕復愧孫登剥啄敲門驚隙塵開門隨處得清新獨憐桂子花開處不見題詩病道人次韻劉無言遊法雲寺磨蟻迭左右鐵炭互俯仰歲月如牧馬快驟脫羈鞅方希草𤣥雄未羡畫眉敞劉侯啟予者險韻冩勝賞讀之令人醒居然見圖像我昔從此遊僧梵薦肸蠁撞鐘鳴木鯉破我顛倒想百年能幾許萬事苦鞅掌喪身聲利場齒角代犀象前輩曉星散後生春水長君看門外轍盛氣日来徃道人初不省禪寂異霄壤提琴冩我歎中夜發哀響龜山戯贈諧文章水母潭邉窣堵波下頭有箇老禪和蒲鞋舊一作異日曽供母寳夀平生不渡河衣鉢三千舊風景一作祗夜形模十二古頭陀是凡是聖人休問門外寒松巻薜蘿次韻答曽仲成二首曽侯果勝流折節事膏火年來何轉窮正以工詩坐可憐哭鬼句不救采薇餓平生九品禄團團螘旋磨歸來卜我鄰歩屧得相過劇談到理窟我義危欲堕世人富貴忙此樂渠不那春山正可尋我行公亦可我老不能世百念乆灰冷偶隨出山雲托跡暫人境偕問交遊人出處各形影其或李廣竒其或衛青幸如公不世才跬歩可臺省何為賦歸來欲近沃洲嶺夜半哦公詩月寒心怲怲次韻應銓詩誰飬山中雲館我雲中宇山深雪常潤出戸須芒屨可憐雲中人過我一飯去和劉仲高過虎溪絶句先生自得遊山體竹杖芒鞵手自提莫問山僧山裏路曽侯谿是舊時谿百舌多能百舌弄春晴解作春風百鳥聲獨立高林千尺上黄鸝無數不能鳴長老欲敲去竹枝透風作凉以頌上之寒梢展盡玉玲瓏細葉斜枝翠幾重何必敲開損高節此君元自有清風用韻自詠倚松一首庵外無人誰過前老松千丈獨參天煮茶春水漸過膝却虎短牆纔及肩已退晚雲歸浩浩未分芽菊競鮮鮮客來問我何時住笑指松枝數歲年凡木惟松枝一歲則長一層歴歴可數兩宋名賢小集巻一百十一
