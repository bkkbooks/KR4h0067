body:
  text: 兩宋名賢小集巻三百五十宋陳思編元陳世隆補瓜廬詩薛師石字景石永嘉人敷文待制弼之曽孫也磊落有大志多讀書通八陣八門之變善楷法尤工篆𨽻築廬㑹昌湖西題曰瓜廬與朋好日舉文㑹於世味澹無所羨年五十一卒瓜廬集其子峻所編嘉熈元年東閣趙汝回為序瓜廬近來有新趣買得薛能園疎壤延瓜蔓深鋤去草根花時長載酒月夜正開門最識田家樂辛勤更不言瓜廬至日即事西山起還伏揷入萬丈潭漁叟操桂棹樵歌過草庵年荒酒味薄天旱井泉甘不願丘園賁惟将易自參送趙幾道赴台州録事㕔前綆汲何從來清流海底通九垓天河地脈隠旋轉上中下井纏三台滿城桃花二仙種方廣金殿三門開一時㑹上幾許人若匪佛種應仙才于公徒知髙其閭豈識大化非胚胎今之送言暫相别詩規筆誨紛崔嵬傅説明星定入夢方朔跡穢空諧詼不昵不阿余與汝古交淡淡無嫌猜寄趙紫芝别後訪消息傳言一半虚前官已不就所向定何如苦雨厭羈思春風欺舊廬懷人閉門夕專擬寄來書㑹宿趙紫芝宅郊居無一事喜見友人來促席坐添火推窗立㸔梅論詩漏欲盡煮茗匣重開此夜思徐照墓松猶未栽贈達西堂却罷住山縁歸來又十年自知身是妄常道鉢休傳塔路修來直紗燈影處圓與吾相對坐語嘿盡通禪寄蔡任不見三百日問君消息多身閒詩有味水盡月無波琴裏懷孤竹書中寄永和遙憐一江隔何計得相過送趙紫芝入金陵幕為官亦僦居官况定何如昨夜交遊散滿湖秋雨疎此邦佳麗久舊吏拜參初喜是賢侯幕新年有薦書讀劉靖君碑儒生身上事皆成身外浮華亦甚輕種竹滿山門逕小挂冠當路樹枝横幾于顔子三生夀分得陶潛一字名何處今時見前輩只㸔碑語自清心漁父詞十載江湖不上船捲篷高卧月明天今夜泊杏花前只有笭箵當酒錢鄰家船上小姑兒相問如何是别離雙墮髻一彎眉愛殺紅鱗比目魚平明霧靄雨初晴兒子敲針作釣成香餌小繭絲輕釣得魚兒不識名繫船蘭沚鱠長鱸曲袷方袍忽訪吾神甚爽貌全枯莫是當年楚大夫春融水暖百花開獨棹扁舟過釣臺鷗與鷺莫相猜不是逃名不肯來夜來采石渡頭眠月下相逢李謫仙歌一曲别無言白鶴飛來雪滿船莫論輕重釣竿頭伴得船歸即便休酒味薄勝空甌事事何須著意求寄謝黄元信恵茶建溪金鋌直幾千余性所嗜已一偏尋常草卉不足進龍團鳳髓如珉堅長鬚健卒前月到手提菜器急取煎妻兒攅眉笑苦澁為言真味兹天然易牙去已久吾齒若貝編枵腸豈廢食睡省非壯年惜此餘香滯喉頰巡除吟咏聲諓諓詩成寄題建寜郡主茶官吏俱時賢合同緘印一時畢進奉飛馳爭春妍天子不敢甞薦以寝廟先定自褒嘉到屬郡趣君密邇玉爐煙一以此味沃天下邪魔驅掃無留連送子舒弟之官華亭執手難為别愁看去棹孤船官得閒散春晚過皇都書附海人便花添佳屋圖有時吟句穩還憶老兄無送張直翁之筠陽時平民事少詩句定能清况作江西去放教秋水聲山花香淡泊湘竹恨分明朝士多知爾慈溪舊有聲送趙端行廷對少寓期待之意甲科人亦有難得是家傳定入中朝局還支内府錢服青初解褐班後忽趨前獨謝歸廊幕詩成第一篇贈葛天民逃禪已得計易姓豈云非自説身如幻常人見亦希亭邊㸔荷葉樓上掛蓑衣幾夜蘇堤月隨君瘦影歸送廬次夔兼柬盧九秘書蔡邕初入直撰著幾時成所取友若此遥知人至清朝迴収疏稿夜語雜詩情愧我多年别相煩一寄聲挽陳叔望少年曽是魯諸生為立功名别路行嘗捉寳刀嚴漢陛再持符節領江城絶憐詩律雙金在不見林塘五栁成明日西山歸葬處踏青人散草初平送葉季重之官吳門君繼賢人業試官闔廬門但問要離墓莫看貞娘墳虎丘寺前生野草一花一葉皆麗好用心冷淡不嗜此自有詩禮長探討給旁餘閒庭廡空小輿應亦上垂虹橋邊風駛寄書便只看平安報乃翁吾漸空空易疎斥時亦摳衣侍函席春膏流滑儻寄将待冩續經藏屋壁寄趙叔魯相知言莫盡别後意如何命笑春氷薄愁因夜雨多全家寓京國無地著吟哦㑹得窮通理從余緝薜蘿酬劉子至寄來書一紙别後喜安和想見清髙極吟成秋思多山頭靈運立月下謫仙歌共是江湖客斜陽各曬蓑賦二十八字水滿溝塍不愁旱急催租税却憂貧家人苦不憐余拙雪袴氷衫要及晨紀夢曲夜夢佳人姱且長星冠霞帔雲衣裳雙眉淺淡畫春色兩耳炫燿垂珠璫組步逡巡倏相近世道人情不可問斂容正笑發一言不識巫山雲雨恨自從十五學仙經今年二十身骨清天上有籍昇其名長聲短聲歌紫瓊之章詞宛轉永與人間風調逺餘聲未竟鐘鼔鳴霧散烟収人不見水心先生恵顧瓜廬未成三徑已荒何勞動光生枉棹過數朶葵榴發深愧一池鷗鷺避前呵路通矮屋惟添草橋壓扁舟半沒河再見緇維訪漁父却無漁父聴清歌題南塘薛圃門對南塘水亂流竹根橘柢自成洲中間老子隠名姓只聴漁歌今白頭巾山兩峯爭起入雲層半屬虛空半屬僧斜日滿山人到少任蕃去後我來登送趙端行紛紛帝族貴欽兹神秀門永嘉分奕葉甚盛二枝蕃吾友天樂翁實惟游之孫身雖羈旅盡詩則騷雅存姪行有科第作尉期髙鶱是曰提刑後令問方騰喧大心欲圖南小枝不在言十年相聚首偉論孰敢援交比鮑叔知志許諸葛論分攜乃明發念我守故園君徃夫差國不遣呉水渾陸靜翫蟾彩江清烹鮈豚邑宰話鄉曲官廨如荒村昻藏信多暇時憶朋友樽窮達委天分守道無競奔㑹當春風吹梅實衆花繁挽徐道暉昌黎銘最好友朋更情深身沒復何憾家貧自不禁春山無死草夏木有清隂為鬼詩還別重來何處尋漁家小舟輕似葉曽不畏風濤自説磻溪好翻疑釣瀨髙晚來魚換酒歸去子持篙定是逃名者時聞歌楚騷梅雨梅雨潤兼旬暑月不知夏溪流三尺强舟人驚昨夜余家有瓜田蘋藻分揉藉魚蝦失憑依跳躍至􅇃下卑濕畏暮年扶策升臺榭難願方丈食互市物踊價四鄰各凄涼惟有酒可借五月藉新白咀嚼勝棗炙閉門人事絶向晚烏巾卸震雷壓不住神龍未遑暇或謂蛟為孽胡不寧爾舍旱澇政本農偏恵及間架皇天無所私未遽損禾稼一洗天下清作我聖人化謝陳水雲寄恵瓜廬字吾向村中住無人知姓名結廬難得就種樹幾時成扁榜龍蛇動飛簷燕雀驚自憐幽僻地因此亦敷榮和梅氏西澗韻此處宜新月開門亦向西近江潮有信初種樹猶低何日尋梅隠移船繫栁堤詩篇滿窗戸留壁待余題秋晚寄趙紫芝數日秋風冷丘園獨自身閒㸔籬下菊忽憶社中人苦詠肩常瘦移家債又新極知君淡漠十載得相親送王成叟先生訪丁子桓老懶無拘撿一年身耐貧還思溫嶺去别我苦吟人栁色行三日雩風浴暮春舊時同學友迎拜緑袍新和葛天民賈島文章懷素書得來讀罷巻還舒西湖栁下為君宅東海雲邊是我廬千里江山長若此一生心抱欲何如相思惟有加飡飯不暇逢人寄鯉魚戲贈趙天樂問隠當時意已深近來全廢是清吟一春只為風雷變盡日閒觀天地心聞道丹爐初候火能教瓦礫化成金果然成得知何用不似瓜廬種紫蔘孤山不到西湖今幾時十年雙鬢欲如絲難尋和靖題詩處空見梅花成老枝望夫石望夫一望幾千年蒼蘚何曽似翠鈿却是春深更風雨滿身吹淚使人憐喜翁巻歸我老寡儔侣年荒值冬迫膝下有啼寒缾中無儲積豈不輾轉思自欠經營䇿儒冠匪謬誤賦性素褊窄淵明疑夙世荷鋤心便適嗟余四友朋驚見三化魄一翁尚凄涼六帙困行役家貧病難愈詩苦髪全白昨來扣我門偶徃比鄰宅聞亟語倒屣已去歘無迹知君懷百憂雖出難久客從今幸安居况有舊泉石清晨過窮廬竟夕話疇昔逝者已云逺相期守枯瘠寄題趙十四知縣聴雪堂誰彈石上琴涓涓流水響主人性清曠靜夜逾幽想何心指蓬閬取近對秋蕩應有可人來烟蓑曳雙槳塔山和徐道暉壁間韻寺在一山頂江分兩岸田憑何發詩興題字古廊邊近地今埋骨閒人亦助錢昨宵留宿意不忍上歸船葉宰赴豐城君徃為官處江西冦已平獄閒空劍氣堂靜響琴聲有法催常税無私得衆情時方急賢路名定達公卿喜徐磯至榮滿自南歸曽過秦糸廬無心縁見道㑹面只如初詩好多人説官清得薦書紫門勞顧訪未覺四年疎送蒋肖韓岳陽有仙跡君去頗相宜已料官閒日多吟湘水師髙風琴斷裂白月酒漣漪無意求人薦惟應我自知懷趙紫芝日沈月上暝烟斜収拾漁竿恰到家為憶城南清瘦友寒宵夢裏見梅花至日遊湖此心全剥落今日一陽生自分安身計難逃素隠名貧中聞道徹閒裏作詩清别有求漁者笑余憂思盈自題半生作計在田廬習懶何曽好讀書誰却畫作古人様旁邊還是欠犁鋤送謝强學主建徳簿少年初試吏濯印富春亭水可清人骨山曽隠客星俸亷専養母政簡靜公庭守是賢侯子應㸔薦墨青寄題趙紫芝墓辛未聯詩别九年成恍惚大星墜地旋無光君身入土名不沒呉越之水相交流寂寞詩魂何處遊不聞孤鶴喚人醒空見梅花似人影無復東巖招謝客應住西湖伴和靖世上如今一句無一靈獨存勢欲孤我有生芻來未得只愁宿草易荒蕪贈奭上人何人養道得如君房接髙樓樓接雲山地栽梅寒蘂痩瓦爐留火夜香薫㸔經尋義心逾靜坐黙觀身耳不聞莫道門前是㕓市須知喧寂此中分哀徐致中亡友如今隔杳冥畫身只見病時形書窗閉久梅添潤花徑荒來草又青一巻詩編空就緒兩年良㑹覺凋零幾回行過深深巷不忍登堂不叩扃送薛詠病裏風光總虚擲岸花園桞雨中休無端好客隨春去送酒吟詩一併愁楊栁枝門前楊栁君莫折長于折處生兩枝兩枝難作一枝合一心分作兩心時惟有髙枝髙莫攀不堪攀處只堪㸔怪得樓頭畫眉婦春朝長自凭䦨干獨于髙處接陽和占得春風分外多須信繁華易披拆不如柔弱拂江河汴水堤邊薪可束永豐巷内緑成堆盛衰到底皆惆悵何不移根種馬嵬横參樓和老杜詩僻懶便幽處江湖深隠心地偏欣改觀樓豁喜初臨暖日低輕帽良朋接短襟潮聲全有韻帆影半回隂翠麓添重色鱸風出淺林嶼頭烟嶂逺沙觜浪痕深寂靜雲歸壑闌珊月迎參人家已鼾睡漁父尚謳吟造化由來久周迴忽見今愛他斜日照顛倒數山沈湖上勢利絶交初瞿然卧隠廬無營心淡泊見客禮生疏遊有漁樵伴㸔多佛老書春深草易長忘却倩人鉏宿瞿溪船泊溪西岸人家見晚舂疎星寒有雁村寺夜無鐘竹徑通新店茅柴煖病容農夫不相識問我欲何從送從善雲遊雁蕩天台去閒尋倚杖藤路邊應得句禪坐似無能頂笠偏愁雪山猿不畏僧倘逢清塞伴休願入傳燈多景樓跨漸連淮是潤州好山全對此江樓少年志氣慚霜鬢猶憶曽㸔打陣舟送法照論著天台教詩參在緯來閒行過蓬蓽相對坐莓苔講席虛前月重遊約後迴仍聞藏禊帖應許為吾開送子舒弟赴金陵兼柬宋君輔禄仕何方好金陵總莫如廟存元帝像家有二王書羽檄時方急文才用有餘功名収拾了歸食㑹昌魚送夏肯父霜晴雁蕩白五日計鄉程野燒明山店輕輿憩嶺平乞銘甘久客愛母起歸情孝極天為感師文早晚成挽林敬之閉門常讀易遯世意如何有酒可消悶無堦不種莎閒時尋舊友月夜歩新河我亦逃名者題碑愧爾多金賢良虚號賢良豈療饑短衣結袖意何為空攜痛哭能言䇿不遇勤求下詔時老去説詩猶有味寒來索酒莫教遲家貧身死知無計自有旁人為立碑學海樓和水心先生韻江口潮生夜語喧月殘惟有數星存更憑髙處觀空濶始悟乾坤是易門夜宿勝因寺有懷山中初寄隠野寺一天星路逺有如此客來應未能蛩催寒嫗緯蟬雜夜僧經忽憶忘形友㣲吟自剔燈趙成子早年名字諸公並惟有清聲獨至今辭却雙旌更何事自扶靈夀欲閒吟病來更作雲歸岫死矣猶如鶴在隂終始哀榮了無恨只愁塵鎖匣中琴送子文監草料場坐局何煩聴曉鷄豆萁苜蓿亦詩題好文不愛今人體色養寧嫌古署低翰苑舊交應顧訪相門新近事招攜嵗寒惟有君於我老去過從許杖藜寄雁蕩詩僧雁蕩峰前夜雨晴空房不住有蟬聲一身閒後髮難白五字吟來思極清少見出山多入定還于夏末起秋程何如更待黄花節顧我來遊計已成李白城野火燒殘竹數枝詩魂飄蕩定何之娟娟秋月照采石不在荒墳在水湄漁父二首偶來浦口芰荷香緑葉叢中睡一場須信至人無妄想不曽有夢見文王利薄每年隨分過避名不入愚溪路春深雨足釣絲長夜來又宿蓑衣步酬醼席上賦牡丹得日字粉淡與妖紅占盡陽和出春去在商量更費吟人筆此是洛陽花尚帶長安日持上使君墀寶缾分甲乙寄龍虎山道士孔野雲上清三十六院閣皆幽清漱齒泉新汲晞髮日始升自除燒墨竈晝夕誦黄庭所得異疇昔出山畏逢迎同當知非年寄詩聊寫情夜坐陳縕靈見訪清夜焚香篆閒㸔郊島詩自憐多冷淡誰足慰衰遲雪樹明忩紙缾梅落硯池君心亦無事相對坐移時送翁靈舒閒遊袖有新詩如美玉知君去意十分濃山行見草認靈藥午歇就隂依古松兩鬢已添蓬蔂色三年判作冷零蹤羇情夜後更愁絶深澗㫁猿溪寺鐘先寄郭子竒世道祗如此君心我得知先教栽菊在預作去官期夢覺秋風起行吟夜月遲懷人㡬十載欣有叩門時喜葉謙夫歸老思忽蕭爽親朋得意歸菊觴奉親夀栁色上儒衣宅旺㸔山勢門清有釣磯我來聊問字澹出月侵扉挽潘母獨翫隔㕔月凄涼三十年𦕈然儒素業飜以母儀傳生計無中有衰齡病後延誰為市貞石髙刻墓之前送趙主簿内地無烽火詩人入仕林定将詠物意移作愛民心晤語初同調分攜便不禁卜鄰曽有約久後得相尋送陳器之赴紹興初官郡古湖如鏡照人心膽清閒曹應事簡盡日讀書聲府主舊知舉同僚親弟兄人言宦遊樂難得比君榮哭周宗彞已嘆交情㸔漸少聞君怛化重傷神手栽寒竹惟添笋堂掩空山不見人舊説媾婚今且置新懷情悃向誰陳獨憐頭白曽參母清夜悲號血淚頻送項季約入城都幕閣書入兵幕束袖學戎装峽峭船侵月秋清猿嗛霜迂程㸔陣磧到處宿詩堂若比仲宣樂輸君髪未蒼送郭子竒永嘉官滿後歸處是仙居栁舞陶潛徑桃迎阮肇車名髙唐寺塔篋滿晉人書㸔步青雲上題緘寄隠廬送趙澤民赴酃縣髙人為令尹政事豈尋常炎月不避暑清風月自涼水流衡嶽色酒帶芷蘭香逺想濯纓暇思予有詠章大龍湫昔聞天下山衡嶽稱崇丘又聞天下水流漢為巨流古有山海經歴歴叙九州李唐三百載詩家一無留及觀酈道元此地亦不収不知諾矩那何事能窮搜我來𤣥妙境萬丈懸清秋石壁去無極百里彌道周雲氣冒羣岫龍宫深以幽輕輿巖壑底竟日涉溪遊隂晴異瞻矚逺近難搜鏤飄如飛素練粲若散琳璆風欣一潭雨佛坐四時秋喧呼勢益驟洶湧聲彌遒變化有如此溥博誰與儔吾謂神龍力豈翳神鬼謀稽首荷𤣥遇坐久勞雙眸一盃却嵐暑旋步轟雷稠以吾淡世慮歘起杞人愛何當騎天浪滿引躬斗牛㫁橋獨扶瘦杖欲經過為問髙僧意若何自倚神通能渡水却言佛法本無多寒山寺壤荘産盡為勢所奪余遊天台甚為普賢惜之陳約甫攝郡號不畏强禦者必能與寒山出氣寒山寺廢佛燈寒有客來遊欲住難夙世閭丘今攝郡不妨饒舌似豐干哭劉詠道案上韓文與杜詩小齋寒淡亦相宜人憐貧病憂無計自説文章樂未涯禮合古初山友哭祔從先世夕郎知生平直諒嗟何徃不是哀辭是誄辭送張直翁宰公詩句是騷人官舍況臨湘水濱衡嶽望中思策蹇滄浪清其欲垂綸長於一縣花開後獨訪三閭廟裏頻元亮何曽藉知己翻然出處自由身送王倅之興化梅溪好景委流徳至今存獨繼賢人業共推君子孫官清五字好州小二車尊所歴七閩郡從兹水不渾挽趙孺人余中表也幼小同羣戲年加各所之常疑艷花卉終是易離披夫壻新袍緑兒男半髪垂送歸嵩里道興我渭陽思趙叔魯端行胡像徳攜酒見顧一賢二公子枉駕瓜廬丘烹魚載美酒竟夕為我留評詩仍和曲舉白不計籌情忘覺歡暢禮厚愧莫酬今朝風雨横欲謝出無由挽徐左史左史聲名空復存如今徃事不堪論惟攄指佞當前陛已判身歸老故園驄馬引䘮寒有淚麒麟卧塚寂無言人生遇合萍相似何處分明怨與恩送鮑份父地僻官仍小兹行古迹多翟羅應失笑龎縕亦經過宦業知餘事宗風竟若何缺挽張彦父提舉七十童顔在翛然物外幽組衣藏蠧篋散服上漁舟此日移松葬前時為菊留山連象浦館誰記孟家遊淨光長老極能詩近住城中寺隂雲漬竹房雨多香篆久春去藥苗芳室裏從人問吟邊與世忘一身全是道頭白有何妨朱清之漈水日夜白之人信所宜隠于陶令酒甘謝郗詵枝江渡月偏滿家庭嵗有規不知君役後誰主菊花期送蒋肖韓赴弋陽弋水橋邊接長官水晶山色讓清寒共知彫敝今稱劇自倚亷勤道不難吏退早衙花谷靜鶴翔秋戺訟庭寛從來遇事無凝滯應只愛民勞寸丹送謹師謹師牢絆脚語别意茫茫入寺春隨杖當禪月滿牀多因新見解抛却舊篇章為我金山去鉗鎚問一場挽宋耆卿人如韞玊操如氷拾芥推棃世豈能案上有琴忘舊響墓頭無火續寒燈一官祗是幽閒過百行惟須健筆稱此曲調髙知者少朗吟喚得九原譍送髙郵周主簿兼呈陳居端遶縣重湖色難同主簿清雖云古郵置不似近邊城月落淮田濶風晴隋栁輕鄉人在曹職相答為詩情寄守上人歸閩省親從小服緇素三衣竟不長心空無物礙頂重有詩囊去與雲相似來期春未央家山指萱草㣲笑奉髙堂無題平生愛菊與梅俱菊比淵明梅似逋誰知此道今寥落愛菊愛梅人也無戊子七月十一日貧因㡬首詩閒髙一著棊瓜田嘗黙坐不願有人知兩宋名賢小集巻三百五十
