body:
  text: 兩宋名賢小集巻三百二十七宋陳思編元陳世隆補龍洲集下謁江華曽宰二首摳衣三十年前事曽以諸生傍絳紗一國所專吳白下雙鳬獨逺令江華時來館學總餘事老去衣冠懐古家共怪我門郊島外狂生尚有一劉义鬟鬢已皤非故我依然破帽老騎驢江邊游子斷腸句漢殿逐臣流涕書父母松楸三世塚弟兄桑梓百年居孤丘未死歸心切未有相如駟馬車寄湖州趙侍郎桑柘村村煙樹濃新秧刺水麥梳風舟行苕霅雙溪上人在蘇杭兩郡中鼓角麗聲相旦暮旌旗小隊間青紅主人夙有神仙骨合住水晶天上宫簡季文衰鬢蕭騷半欲絲尚能隨隊作兒嬉棊無殺意從人活琴有仁聲却自悲落魄陳平歸漢日中傷張禄入秦時諸公莫作狂夫看恐是英雄未可知贈劉叔擬招山不醉何勞飲無詩底用吟百年為客老一念愛鄉深草路青原淚煙波白鷺心班超歸未得愁見舊家林登清涼臺江南江北許多山到處登臨得凭䦨老木漸丹霜有信怒濤衝岸水生寒倦游半世烏三匝往事千年指一彈落日正西催上馬依依回首望長安蘄洲道中如箭隂風劈面吹雪花斜夾雨垂垂胸中自有平戎策路入蘄州冷不知觀三叠泉五老峯北嵳峩顛龍泉三叠來自天只因開闢便有此山雲蔽䕶經嵗年一朝何事失扃鐍樵者得之人共傳欲往從之人憚逺險溪絶壑窮攀縁初疑霜崩漏天谷翻若雲奔下巖宿散為風飛颺輕煙垂似銀絲貫珠玉隨風變態難盡名洞駭遊者心與目清寒侵袂心益爽清甘熨齒手屢掬我欲攬之作玉虹開似九丈錦屏風有若插碧金芙蓉笑騎揮斥凌太空窮源直到夭河東西湖西湖湖上山如畫二十年間曽客來飛絮滿城歸未得江南老却賀方回登昇元閣故基脚力倦矣曷少休侵晨更作昇元游眼中已不見二百四十尺之髙樓但見炊烟萬竈宿貔貅上有啼鴉噪鵲如泣訴下有藤蔓老樹根據枝相虯想其結締初匠石巧與造物侔栟栱不知幾大厦一木牽挽回萬牛山川退聽左右受約束日月烏兎早暮東西流阿房之旂矗立矮如㦸臨春結綺望仙三閣俱下頭盃埦塊潛培塿而已矣蹄涔洞庭芥為舟拄撑霄漢彈壓大千界下厯梁唐秦隋晉漢周一朝世故有翻覆禍結祝融回禄與鬱攸灰飛障天煙焰熾一火三月爛不收遂使觚稜化草莽丹艧成墟丘我聞至人侈儉初何心有茅一把葢頭便可留何必窮極土木事妖怪朘削赤子膏血斂以裒是故子劉子不仙不佛亦不侯視鸞臺鳳閣為蘧廬百萬買宅亦夢幻泡影漚江西豈無家白沙翠竹泉石幽小亭茅簷曝日搔背癢籬缺墻破手葺修如以天地為室廬日月行住坐卧得自由不為朱門是不為白屋羞有時騎馬千里游汗漫有時蛤蜊遽食龜殻秋彼昇元閣者亟成而復壊腸亦不能為之斷心亦不能為之憂造物何足云此身自贅疣譽堯毁桀未必公是非丘踞兩窖螻與蟻日斜諸公急下山我有斗酒歸去來兮相與勸酬舟中偶作日日拖舟上碧溪寒灘水淺草離離尺書雁斷嵗行盡五兩風輕帆去遲白鷺導吾如有志丹楓愁客亦何為闗頭安趂梅花約更著寛程五日期聿追菴題壁路轉羊腸曲山藏蝸角深樹多成䕃密水少亦悲吟露草重陽淚風花寒食心摩娑墓銘看久立讀碑隂同郭殿帥游鳳山亷纎小雨久于霉喜得新晴亦快哉五色波光麗鳷鵲千分雪氣繞蓬萊旌旗側畔宫牆轉戈㦸叢中武庫回走馬看花生怕晚果然桃李一山開郭殿帥邀游鳳山結束戰袍騎戰馬冠帶將軍宛如畫前呼小駐來美堂箭去弓鳴飛鳥下青林路轉入苕嶤湖亭海觀爭為髙誰知鳳舞龍飛外别有樓閣横雲霄回旋左右皆游厯人物江山兩英特風流標致梅嶺梅磊落胸襟石林石側身更上天上行好風吹下笑談聲山神川后領要束遁走虎豹藏蛟鯨摩挲苔蘚題詩去萬鼓聲中雜歌舞衆賔捧酒壽主人將軍自是擎天柱看山看水時一來錢塘吳越何小哉指㸃中原百城在功名逼人有機㑹感舊羅結同心栁帶青碧桃香裏寄將迎春風重到憑䦨處腸斷江樓不忍登自述二首扁舟送客出姑蘇晚泊吳江夜雨餘波浪稍平風力定青黄相間橘林疎匆忙旅館催行酒草率盃盤旋買魚我欲壁間書嵗月無人為上小行書精神凋耗鬢毛衰刼火光中穿幾回無可奈何教老去有時猛省忽愁來師崇道學原非偽客寄蘇州却類獃明日重陽又佳節得錢且醉菊花杯吳尉西亭二首襲桂行香徑朱䦨稍轉西水風飄石冷雲月墮簷低棊敗深杯罰詩豪健筆題舞忙釵鬢亂更為捧柔荑石板橋東閣軒窓如此華碧虚澄水鑑紅影浸霜花似串歌雲駐如泥醉帽斜但驚風露冷飄落怕還家寓東陽寺二首元帥東陽主今君我故人可憐九華客猶是一窮民古者狂狷士人間自在身化工都不管何地有陽春不學老無似艱難却飽諳逺從陶靖節來訪杜征南意到羮蓴適貧猶食薺甘惜無廬可卧尚遶鵲枝三游郭希吕石洞十九絶清曠筍輿咿啞來路轉此歇脚長風挾林下深意滿萬壑深秀蒼髯萬松官窈窕一徑開請回俗士駕切莫呵殿來書院力學如力耕動情爾自知便使書種多㑹有嵗稔時谷口水流自何許逺欲窮其源石梯苔蘚層微有屐齒痕月峽兩崖限東西裏有一帶天老蟾更多事駕月下潺湲桂壑叢叢萬横枝羅生雜松篁不似巖穴凶嵗晚正自香小爛柯游戲一彈棊嵗月隙駒過不如兩忘機石上跏趺坐傾月去去山轉深樹下亦淒冷時有月烏飛閒碎梧桐影閟雲仙宫已降勅雅有新遷除乞為此閤使雲物屢卷舒髙碧小山碧巉巖直上與天齊詩成欲磨崖藤蘿費攀躋石井銀牀遶周遭一規寒浸水試敲拄杖看恐觸蛟龍起壺天逆溪隨水行更上紫翠峯朱䦨忽飛閤映帶烟霞重玉佩借榻卧雲屋欹枕仔細聽誤疑鳴珂聲不知水泠泠飛雪山前大飛雪路有何處入䝉茸六花飛冷濺征衣濕笙鶴木末俯清軒獨立久延竚何人騎鶴來彷彿吹笙侣韜玉至寳不自獻韜藏亦英華餘香披草木秀擢幽巖花倚劍石壁自磨礲三歎用不久如去到人間為儂洗磨垢藥圃古文不可賣未覺賣藥非侵香荷鋤徑暮得芝术歸玉泉石礫沙沃盡悠悠潭影斜塵襟不忍濯為惜無玷瑕兩宋名賢小集巻三百二十七
