body:
  text: 兩宋名賢小集巻二百七十九宋陳思編元陳世隆補端平詩雋吳山仁王寺山寺慿髙夕未昬上皇曽此定乾坤甌閩㪚驛縁江島龕赭収潮入海門細雨亂花唐輦道深煙疎桞漢營屯何時汴水東流畔君返宸居臣故園庾樓欲望江山夜轉𡨕胡牀曽此對嘉賔傷心皓月長流水回首清風不見人花落雉樓横角暮草生鷗渚破船春歸程豈暇頻登覧分付羈愁與白蘋題豫章臺何日遺蹤鎻斷崗更誰曽望舊臺荒百年南渡頻秋雨一片西山㡬夕陽石礙老松欹徑險岸隨乾葦出江長斗間可是無佳氣又見飛烏繞去檣題滕王閣髙閣巍峩接水濵興亡纔問便傷神鳴鸞東閣知何處跨鶴西山别有人桞映落霞江渚暮草鋪斜日野田春羣鷗亦厭多悲感偏與忘機客最親送友人持節嶺南吳雲迢逓楚雲鮮從此南征路㡬千漢使五羊登嶺日魯經三豕渡河年榕穿白草飛蠻雨椒落黄芽起瘴烟待及戌𤓰多載石定無畨貨入歸船贈唐棲寺僧山門寂寞唐棲寺别去閒居又一年草暗暮田羣鴈逺花明春院一僧禅雲房夕磬浮清雨水殿寒燈宿細烟作得詩成無寄處㡬回遥認隔溪船連珠逺望披裘日㡬回可堪江上暮寒催雲飛曠野迎風斷雪灑長灘夾雨來馬踏野橋嘶破板烏迷村路立髙桅暫須移向疎籬泊遷就驚春一樹梅行吟獨行沙岸不相攜凖擬沿溪更渡溪藥蔓交加蟲上下桞花撩亂蝶髙低杖頭曉伴春雲石屐齒晴翻夜雨泥詩就隨時為人冩等閒抽盡錦中題秀野小作幽園傍宅開只須数畆占樓臺石移林屋秋雲至水帶松江暮雨來徑草㪚香迎過屐砌花分影䕃流盃人家園圃應無数不似君能日㡬回孫伯符墓下木葉蕭蕭暮草長夢魂曽斷九廻腸空聞綘帕離章水誰見黄旗入洛陽鴉噪暮園江阪迥龍盤春戌石城荒赤烏不識桑田變猶自悽悽守白楊天津橋裊裊朱欄倚細波緑雲相對間嵯峨中天車駕曽擒敵何日樓船定入河霽桞午隂隨岸逺露桃春色過墻多黄旗應適東南運已辨簫鐃九曲歌雨花臺細蘚桑莎𤨏舊堆昔年曽見異僧回如何天上飛靈雨不爲人間洗刼灰江接潮頭諸脉應地連崗勢一走來只今不假虚無事别是春風歌舞臺鳳凰臺一徑逶迤草自芳何為不復更翶翔應須舊國還宣武别有髙臺在建章白鷺背花㝷塔路赤烏衝桞集宫墻中興不比偏安事且對梧桐薦羽觴鳥衣巷日落凭欄感慨頻長干橋畔冷殘春桑田蕪没徒多事蘭玉叢生更㡬人風暖影翻花外燕雨多痕蝕草間鱗堪嗟羣從成功後不及鍾山一尉神石頭城㸃㸃凝烟望未収六朝遺跡遍荒丘自從綘闕雄江靣誰把朱泥染石頭崗斷曉榛雙阜虎岸長春草一灘鷗諸公多少新亭恨不是知心莫上樓浮逺横障瀰漫恃此丘長江東鶩轉湍流波間去海無多里沙際鋪淮輙数州風勢起花山郭暗潮聲侵樹野田浮無由望徹蒼茫外回首斜陽絶是愁送趙山臺赴江隂匆匆何事解朝衣甫為君王領一麾歴考近來成故事就遷長是未多時寒更夜徹防淮柝曉舶晴翻出海旗不乆赫蹏應已到只須畧賦練江詩岳陽樓凴髙望盡寂寥天與我閒情共渺然平展暮雲三百里積停春水二千年沙洲横渡荆江雨石塔遙分岳麓烟先我未聞飛劍術想須今度遇回仙西湖竹閣寺精舎蕭疎近水涼分明一徑緑沉槍就移山近湖皆隠放出樓髙寺倒藏春透露梢齊曲檻曉翻風籜過修墻長堤花盡人稀少來聼蝉聲伴夕陽採香徑繒甲如茶䕶此臺玉顔憔悴錦帆來一溪香草無蜂過千里空葭有鴈回響屧蘚埋丹蜴迹縷衣花變粉蛾灰誰知子夜歌殘日樹滿西山似緑苔七里瀬瞬息沿流七里遥感時回䌫木蘭橈髙臺未變陵兼谷故國頻更市與朝風㪚亂雲通去驛雨消殘雪助歸潮漁翁近亦無前輩一箇青銅不肯饒南樓懐古五首昔人有意乆經營極望寒蕪逺更平三國斾旌羣鵲㪚六朝樓閣一鳩鳴雪消晴嶂沉孤壘風打寒朝入廢城多少怨魂銷不盡草根燒斷又還生事乆銷沉只等閒好將深意逓相参舳艫宵遁誰思忖裠屐春遊自笑談西日瘴回迷漢沔北風波逆上江潭隔城方唱招䰟引一拍殷勤至再三茫茫迂曲度平川何處孤村近水邊烟䕶劉琮殘壁壘雨沉黄祖舊樓船寒沙細擁菰蘆地破隴斜耕苜蓿田見説去年秋潦後更無茅屋起炊煙幸際清時息五兵舌頑無處説縱横蟻書一夢難分别蝸角千年强鬬爭丹壁郵亭新蜀道白樓烽戌古邾城自知夜半徒興舞移遠寒雞不使鳴夕陽光退杳難慿欲問江鷗只怨憎得意舉帆燒北岸傷心流涕鎻西陵雪消蜀貨千檣下風送吳鹽萬斛増且趂一樽相暖熱自非乘醉莫來登山居春晚索居牢落動關心但覺匆匆歳月侵無夢不因憐書静有懐多是惜春深草香稚蝶銷胡粉花落蠻鶯變楚金最是不禁芳樹色能消㡬日又成隂庭下枯梅有感庭下同栽兩樹梅一株搖落一株開無縁春色相虧曲有分晴光亦徃來雲打枯枝愁漢驛雨翻雕鄂夢荆臺綺窻不斷横斜影猶有東風管碧苔㑹稽山衣冠從昔化文身峻嶽當天自有神秦帝刻碑三十載越王棲甲五千人江連雲氣分南紀海接星河近北辰必竟興亡誰可料但聞陵谷變飛塵甫里觀陸魯望故居天隨清調何人繼幸有荒村故宅存橘上蠧魚應屡變草間眠鴨尚能言池亭暮雪兼風起籬落春潮帶雨渾人啖菊苗終竟别屠沽猶自不登門陳武帝釣臺路纔容馬盡荒茅誰識仙人舊釣鼇流水不隨船影斷亂山猶帶弹痕髙春烟粉黒重生葑暮雨灰紅半拆桃今日故宫何處問東風應長對江濤贈雪林李和甫忽地相逢便觧顔況兼終日看青山精神摘桞哦詩際標度㝷梅集句間春淡野橋孤艇遠暮寒溪寺一鐘閒匆匆又作經旬别兩處東風各閉關道中有感逺程巳過經行處别有逶迤古道存寺已寂寥猶有殿水纔窮盡又逢村一林枯木人分路十里飛花客過門必竟悉依生處樂不知何事别家園黄溪匆匆寕不恨飄零轉更分岐過别汀世事總如迂曲路年華都付短長亭冡桃褪蘂無人色社櫟盤根作鬼形心自感傷人豈識回頭猶顧峴山青朱潭消㪚羈愁益垣然況當初暖欲晴天清溪苔滑重抄紙淺屋柴香正煮綿隔水殺雞祠社土過橋嘶馬入人煙今朝自覺難忘酒應更無人笑謫仙送人之漢上木落千山怨别離自知難駐馬行蹄上書季子窮歸洛獻賦荀卿老向齊驛店破旗秋雨細戍樓殘角夕陽低䄂藏祕䇿君門遠應望中原泣鼓鼙荻巷波眼沄沄浪復輕稍甦羈束過清明倩人覔路先㝷酒乆客懐鄉始見餳松下紫芽肥野菜竹間青葉帶山櫻自從一别齊安後直到今朝始聼鶯感事書劍悠悠屡變遷老諳多故始知天汗青毎愧抛長日髪白無由逐少年暮雨暗消江岸桞曉霜初透野池蓮此心懸解何須語人問惟應一指禅送遷客自謂别離難㑹面如何此地又相㝷徃來雲物他鄉意輕薄風塵乆客心夜雨泥塗三里郭夕陽烟火数家林送君好去加飡飯莫聼哀猿徹曉吟送人之京口競攜書劍去紛紛誰解登臨對日曛北道荆䕫一江下南朝徐兖二州分髙樓角曉鳴秋雨逺戍烽寒起暮雲莫把㝷常望𤓰歩恐驚邊鴈不堪聞留題唐棲寺僧房十日相留戀爲怯生寒未到家揷岸斷氷妨蕩槳入簷飛雪助煎茶香臺穴碎逃秋蟻古殿巢翻失暮鴉惟有溪梅最禁耐傍籬争發向陽花送白判官著書不就便相抛逺向㐮州謁故交里舍千頭無舊橘客程三脊有荒茅買魚村渡捐孤劍沽酒山城解敝袍雙鬢豈堪禁歳月眼看歸鳦又成巢中和節時節匆忙過隙駒可堪岑寂就船居不禁衰病慵耽酒無益閒交懶報書風暖暮田歸海燕雨甜春水上潮魚客中自是光隂速纔見新正又月初送人之荆門昔年此路逹王畿荒畬燒煙事巳非山向崤函空北望水隨江漢自東歸淒涼坂路征車逺寂寞郵亭候火稀遥想思鄉怨岐路杜鵑花發鷓鴣飛嚴陵釣臺晴江萬里緑波來惆悵君房去不回秦苑河山歸故國越鄉雲雨庇荒臺春風一道江蘺緑落日千峯杜宇哀欲訪釣船無處所野花如雪滿汀開遊道塲山遇雨飄然大作登臨想纔遇名山雨亦遊林尾亂聲猶問響枝頭殘滴未全収濯翻野竹從教軃衝落巖花放出流欲把姓名書石上㡬回粘筆又成休浣紗秋日五首衣裳單薄鬢蕭騒獨凭危欄首屢搔出壁亂雲分片段隔江飛雨見絲毫庭前斷續蛩爭響簷外輕便蝶鬬髙多少好山俱在眼愧無短屐共遊遨當前灘號西施磧對磧看秋得句清五色懸門秦一尉六經充棟漢諸生石叢細火團荒砌野蔓疎金出廢城目送浣紗人去後又聞街鼓報新晴長江淡淡樹疎疎掃却門庭即故居蟲入暗間頻促織螢穿虚筆屢翻書破除暮色惟荒菊薦送秋華有嫩蔬料得故園分社酒小苞青橘四腮鱸自慚尸素常多暇未放秋風變楚顔一夢别離抛白水三年端的守青山野雞避鶻遮雛去沙翮銜魚趂母還縱有亂愁消遣盡淡雲殘日共人間清溪樓閣暮沉沉不覺登臨夜欲深㡬處捲簾催酒笛誰家閉户搗衣砧一朝野霧三朝濕十日江天九日隂暗喜礙人公事少自來収拾送秋吟羅家洲對港近村俱有路扁舟倍覺徃來頻入秋破褐惟存線盡日収錢不滿緡逺岸冷沙銜墜葉淺灘寒水卧枯蘋未知行役何時斷縱使更深亦喚人送陳雲崖遊三衢吟得詩成若等閒為我開盡錦嚢班不專瘦島元和末要敵長城大厯間帆入亂潮隨漲水㡌衝殘雪度危山從今便少春㳺伴纔過新正可得還兩宋名賢小集巻二百七十九
