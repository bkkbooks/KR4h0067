body:
  text: 兩宋名賢小集巻三十九宋陳思編元陳世隆補范蜀公集范鎮字景仁華陽人居洛陽寶元元年舉進士為禮部第一累知制誥英宗立遷翰林學士神宗朝歴端明殿學士提舉崇福宫封蜀郡公卒諡忠文有集信相院慧燈行樂到蕭寺像殿何煌煌僧年過九十細話燈焰長方憶髫齔時初離父母鄉是時循舊迹晝夜不暫忘自事膏火來日就與月將始卒未嘗暗眉髪皆如霜禦風設絳紗求福兼異香寒村㑹織女借餘坐如匡陋巷苦志士鑿壁偷隣光太息日己暮百結忡心腸類此事億萬聊書成短章送程端明再鎮成都成都一都㑹千里帶坤維自昔公坐嘯至今人去思朝廷慎東注方面要安綏遂爾重藩屏因之職殿帷龍光出劍匣謳頌走江湄曉雪離都馭春風入境旗壺漿故父老竹馬舊童兒疊足相歡躍同心仰福禧邦人顧若此邑子更何其㑹講中和化重為樂職詩遊昭覺寺炎蒸無處避此地忽如寒松砌行無際石房禪自安鴛鴦秋沼漲蝙蝠晚庭寛登眺見田舎衡茅半不完淨衆寺新禪院金地西郊外一來煩惱攄凡逢似仙境鮮不屬僧居岸緑見翹鷺溪清無隠魚殘陽已周覽欲去幾躊躇武侯廟柏滿葉是清霜培根無沃土恥作秦皇松寧為馮異樹英靈自有風䕃蔚長如雨可憐青青姿不知人事古留題張少愚屋壁高隠郫城下平時仍徑還門開值冠葢簾巻為江山沛雨人間待浮雲天外閒泥封詔不起朝夕奉慈顔送羅勝卿同年提舉玉局觀匹馬西歸去知君得意偏人情重鄉里官職更神仙曉後無衙喏旬頭有俸錢何須駕白鶴辛苦上青天送羅郎中登管勾玉局觀五門門裏觀松檜日蕭疎道話忘心境仙歌作步虚壇場高突兀廊廡四紆餘世事多紛擾君心定了如韓太丞同守成都次韻盛府佳招貴嚴宸雅寄深輿題仲舉坐闕掛子牟心漢竹分新契潘花過舊隂當年百里驥方此試駸駸近境連桑陌先遊盛竹林併將懐舊意持作恵時心藻思春生筆清機月滿襟成風錦江曲迥上玉山岑春色草將深春寒栁未隂青天指行棧渌水蕩離襟後乗何為託前旌喻此心南枝倦飛翼凭為寄歸音仲遠龍圖見邀學射之遊先寄五十六言幾年魂夢寄西州春晚歸逢學射遊十里香風塵不動半山晴日雨初收指撝武弁呈飛騎次第紅粧數勝籌夾道綺羅瞻望處管絃旌斾擁遨頭和閻寺丞海雲寺春日金田驩且譁始因民俗好紛奢管絃齊奏喧聞野鶯燕高飛不在花雕檻凴時見城郭迴廊行處有烟霞方塘靈石從來信不獨當年太守誇登崇聖閣金地環迴半錦城累年斤斧不停聲遠村民舎烟未起滿寺僧筵鐘盡鳴欄檻高低資眺覽市廛言笑尚分明阿房昔日徒虚語壮麗應虧此畫楹和提刑海棠不知真宰是誰専生得韶光此樹偏吟筆偶遺工部意賦詞今識翰林權風翻翠幕晨香入霞照危墻夕影連移植上園如得地芳名應在紫薇先和成都呉仲庶見寄來韵嵗華今緩昔如流舊日樊籠可自由官事了時無盡極人生安處且閒休愚忠皎皎丹心老歸思綿綿兩鬢秋縱使海棠時節過急行須及浣花遊濯錦江深恵澤流西人都未究蹤由畊疇擁耒春還動織户鳴機夜不休講徳定應勞四子富民須合用千秋鳯凰臺上需賢久却恐龜城作蹔遊山横雙劔水雙流栖北巢南去未由三尺素琴彈浩浩一爐丹藥詠休休白巖霜重紅梨曉銀礫烟深紫芋秋毎夜夢魂歸處路只應明月見神遊題曹山人墅居橋外浣花溪水通山人高隠在其中一江絲竹喧天沸争及松篁半日風鷄鳴臺古人惟恃衆心城何事秦皇苦好兵本設函闗禁奸詐不知半夜有雞鳴上巖巖雨晴猶滴溪泉直復迂傾崕目眩轉亂石步﨑嶇成都觀牡丹自古成都勝開花不似今徑圍三尺大顔色幾重深未放香噴雪仍藏蕊散金要知空色論聊見主人心題静照堂堂構虚閒處師心静照中當門自流水滿院占清風趺坐通禪觀高談説性空那知人世上日月有樊籠次張寺丞園園林再到身猶健官職全抛夢乍醒惟有南山與君眼相逢不改舊時青馮允南遠貺佳作有舜律遠相通之句因次韵寄之盛旦真明聖平生伏至公遭逢不世出覆露與天同諒直誠多勉謀猷媿罔功后王明若日夷夏慶同風喜氣中兼外歡謠北至東敢圖嚴密禁擢處太清宫峻拔山形大高明地望雄起居無忘古坐卧只思忠論樂嗟淪廢求音扣寂空大和非隠伏至理自穹崇曖昧幽還顯尊卑降復隆使人思舞鳯如弋慕飛鴻世事安清謐人心處正中至醇當直詣精義故旁通本自闗瑶律還須撫素桐天材由聖作物理要人窮徃古為經始來今是攷終云為極微妙襟抱貯冲融斂聚隂陽氣窺觀造化工因君説樂事詩咏照光虹奉和馮允南二首小馬輕輿蜀道難身披裘褐頂峩冠己從林下幽人徃猶作朝中舊徳看漁釣喜歡新得侣道途瞻顧尚呼官多慚鄉友貽清唱天外鸞音與鳯翰常望鄉山憶翠微此來時節更春暉林間怨鶴久招隠花外啼鵑仍勸歸雲似隨人飛縹縹雨如先道灑霏霏迴思仕宦平生事六十三年始悟非送祖龍學擇之赴陜府酌飲贈别次歐陽永叔韵史君分陜惜别難緩聴長吟速行酒荆山北面黄河南千里封疆為己有徃來無窮西復東衮衮輪蹄利名走甘棠雖云勿翦伐未必從前不傷手當時遺愛安在哉賴有聲詩傳不朽擇之寸刃如新硎歴年何啻十有九胸中藴蓄富術業此行直欲古人偶近世只知厨傳為不顧虚名似箕斗寄言道路如采詩但問樵夫與田叟秋懐答司馬君實疇昔共登仕爾來三十秋常睎絲繩直竊恥䲭夷柔蹄涔學鉅海螘垤依崇丘行之不自疑親寡憎怨稠於今不亟去淪胥恐同流努力買良田遠追沮溺遊李才元寄示蜀中花圖牡丹名品衆特地盛于今西子含羞甚東君著意深障行施爛錦屋貯用黄金妾婢羣花卉那能不妬心望湖臺臺上望城下迢遥知幾尋湖光隠隠見多礙栁烟深萬艘潭私船官運鬭縱横殖貨交通繞近城燈火夜涼人未散古潭冝復萬艘名金蓮泉道侶殷勤鑿石渠金蓮泉胍入靈都暗穿竹徑仍清冷為我烹茶敵酪奴兩宋名賢小集巻三十九
