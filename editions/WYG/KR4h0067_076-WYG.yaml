body:
  text: 兩宋名賢小集巻七十六宋陳思編元陳世隆補安岳吟稿二送范百禄子功學士知諫院二首天庭高議破羣姦先帝曾將侍從班談笑一辭雙闕去縉紳遺恨十年間傾朝每憶劉蕡對側席纔聞賈誼還言貴逡巡非久計行看鳴玉上鼇山聖賢中道意何如歴歴樊川論諫書要在致君成徳業不當沽直徇名譽平生忠義傾心際後日經綸試手初得意古人多氣義彈冠應有舊簪裾和蒲安行題鮮于秀才山居羣峯屋背猿烏啼二江門前鷗鷺飛雅聞君居頗竒絶長恨不到心依依仙翁落拓少拘檢解舞石上凌秋輝整冠投袂或云起塵土一踏何時歸送梓漕李竦端臣赴闕道途去無窮嵗序嗟易改相知念逺别遇物增感慨悲歡勞寸心喣沫異江海南歸得嘉報迅棹若旋凱機穽觸不發神明怳猶在名因去愈重事雖晚可待去就勿自謀㝠㝠付真宰寄題合江知縣楊壽祺著作野亭野亭何處訪仙翁安樂風烟迥不同千里清泉來塞外四時佳景出山中抽身暫逐禽魚樂放意翻成筆硯工醉伴逍遥無計去鈎藤新熟荔支紅興州坐卧二仙莫道真心際混茫豈將生死係存亡已驂雲霧朝丹闕猶脱衣冠寄異鄉姓氏不傳靈秘録精神長在發圓光洪肩丘袂攀無及分向塵中到老忙答江安尉鮮于頌野翁寶峯首相聚錦屏袂一判音容阻良覿嵗月嗟易換我觀潼江曲君尉瀘水岸到處逢酒徒無人作詩伴南風洒襟袖佳句適我願汶蜀㡬萬里信息偶中斷三軒風雅會蕭條各分散孤吟少儔侣衆喙易嘲囋念君同所嗜户近聲可喚倡酬實相惓牽率豈辭憚亹亹郊籍心無為簿書亂和李曼修孺職方謝梓守張靖子立龍圖遊春飲酣起擊劍恥與豪俠遊雍容詩酒歡乃是神仙儔風騷固有靈造化陰為謀至音苟同調曠世不可求杜陵思江東洪厓揖浮丘自然風味殊豈特文章優嗟余萬事拙吟詠心久留自媿蘋藻微恐為王公羞晚遇清河公采蘭深林幽修孺素䝉益百贈無一酬邂逅相撫掌踉蹌容擡頭雖然再鼓衰且免三爵憂見蘭亭故事吾儒學以仕本代親禾麰然多志尚逺擲筆思封侯前時征南將驅馳出塞溝詩書非無助爵賞不見疇尚能解客嘲相歡蘋詠洲三術起商鞅一言貴馬周致身果有䇿何地無餘庥肯使韶濩音變作巴渝謳送蒲安行誠之秘丞興州僉判春郊散輕靄日出車馬動看君曉裝發送客尊酒重衆人别良易我别情靡共飛纓轉山曲延頸即成夢雖夢去奈何不夢存者多一言起相顧慷慨成笑歌清吟散泉石醉墨蟠雲蘿人生苦汲汲浩如長江波江波西南流君行方北輈林深足豺虎路廢空亭郵居處常山中出亦山中游不嗟吾道窮每為斯民憂憂民竟何為從事猶俛睂晚達十六七萬事懸難知但窮聖賢意莫賦離騷辭有得常寄我以慰朝夕思和任師中舟中見示經年雅音曠不聞客衣彼此俱紅塵六月赤日火照地仙舟艤在交河濱君年四十已顯宦去去榮路無涯津丈夫未死功業在但使道富何憂貧師中詩多言貧故云寄上潁昌范蜀公元祐二年大老歸真主前朝遺數公精神時一會出處道皆同起潞儀刑地煩温燮理功及觀光禄表深見古人風聘幣來何厚安車願不東光華膺政殿僶俛就祠宫論議高踰武文章逺繼雄退身無少憾憂國有餘忠几杖誠先覺衣冠為一空千齡重際遇二聖極優崇將相交遊盛朝廷禮數隆一星容處士四海望㝠鴻箕潁紛囂外岷峨氣象中楚詞清更適舜律逺相通公以古律定雅樂庭玉連城價孫枝百尺桐聖賢今日是河漢㡬時窮晚輩徒瞻仰先生蓋始終氷霜嚴皎潔塵滓坐消融信史知將貴聲詩恨不工東齊如見録光彩附垂虹春閒好景雖心賞多情半睡降春深蜂遶屋晴意鳥臨窻漸老依花徑無機付酒缸人生求適性何苦自樅樅即事二首閉户塵縁息忘機眼病除就閒因教子臨老更知書䆉稏風前稻婆娑雨後蔬窮中方得趣門外已巾車舊病花浮眼衰容雪到眉風塵憐客久筋力恨歸遲所得真如夢無厭固已癡不知縁盡處猶有㡬多時和蒲安行誠之見喜新受梓倅故國連芳草吾親在白雲榮歸慙主父虚語類終軍劍閣雖吟戀潼江亦喜聞惟愁良友别分手復何云寄潭州何正臣君表待制二首繡指初從劒外還文章開府冠羣仙忽聞五管傳邊警又出三湘領使權偃息湖山非久計翺翔鴻鵠待殊遷不同宣室因循召台輔明時屬少年高卑鵬鷃分難攀豈意相知邂逅間北海㡬時曽薦鶚愚公終日尚移山平生冺黙無他技一顧差池已厚顔猶有功名心尚在鑪錘當手待君還送梓憲胡揆少卿赴闕方求宫觀富貴一鼎味謂嘗須過食功名萬鈞器負趨少量力不勝苦爾體不厭傷爾臆誰能達涯涘百動靡一息古人去我逺獨公抱清識進退處以道始終完無隙車馬切嚴召江湖正遥憶賢達事如此貪懦猶且惑是豈時俗知聱牙相緘黙寄上范蜀公二首去就人兼衆美難侍郎高望肅衣冠每尋當世羣公議更在清流絶等看屈宋辭多誰傍國漢疎名重只休官求仁己得無餘憾自向青㝠著羽翰拱極星文動少微西南風物重光輝平生親友傾心望共慶功名畢手歸車馬歡聲傳里巷松楸佳氣雜烟霏長卿兒戲揚雄拙未足公前較是非曲細道中一溪流石色萬木聳山陰地僻有佳景眼明勞寸心墜猿猶挂壁驚鳥怱移林莫問去程逺行人方苦吟詠雪半夜風威壯今朝瑞雪呈徊翔如有待附著不勝輕叠叠雲篩下畨畨雨簇成雕鐫非衆巧融結似無精河漢潛欺沒乾坤欲混并漫空雖潔白觸處已縱横枯茂全糚出窪隆一概平參差相掩覆散亂或逢迎逺岫依稀失高松獨自榮光明通鬼穴肅殺下天兵揮霍偏隨馬憑凌或遶城威稜生劍㦸物色儼冠纓樓閣危將墮烏鳶禁不鳴巖封蹲豹起岸斷蟄龍驚地軸猶疑折林梢不易擎濃寒排瘴毒和氣入春耕雖學峨峨勢其如薄薄名暗消知地暖坐對覺神清交砑當門舞玲瓏照眼明味宜茶品試力與酒權争佳景誰能賞幽吟似有情開尊煩㸃綴喣筆為題評舊説三農慶量深一尺盈憂民心正切擊缶助歡聲寄上北京文侍郎四紀三朝㑹遇同陪京猶望節旄雄欲知元老經綸迹盡在生民鼓舞中漢府重歸黄閣相商山難訪紫芝翁陶鈞末士慚無報惟解聲詩冩至公和朱牧宣徳英游相聚日相歡休唱還家蜀道難為愛尊前文字飲不知門外雪霜寒酒酣依約羣仙夢談極飛揚巨海瀾從此追隨頻笑語莫教憔悴恥儒冠和題成都諸公唱和集諸公高詠蜀人編唱和春容近百篇厚重江山藏古氣軒翔鵰鶚在秋天不徒神物陰相䕶兼有風謡樂共傳誰謂開元新集好退之題後始完全瞿塘峽勝絶瞿塘險西陵古地形巴江深洞穴蜀主舊門庭王氣吞三峽神功出五丁斜長天一綫相對石雙屏瀑擊巖巒瘦雲蒸草木腥衆流趨灩澦逺意會滄溟顧盼如無地幽陰似有靈白鹽懸日月黒石鼓雷霆鑱鑿餘痕在高深巨勢停魚龍憑險怪烟霧鏁沈冥念昔窮探􅄨常言駭視聴波濤同激箭舟檝劇奔星倒挂傷猿足横飛羨鳥翎死生期一瞬出沒類浮萍葉上憑忠信胸中混醉醒人烟逢瀼岸語笑落沙汀瀝酒重灘下回頭萬仞青停橈詢故老借筆潤圖經二孟連稱帝三川恃建瓴關防雖鞏固基業旋飄零藝祖收長策神旗指不寜彦疇空死節曹翰首開扃五嶺劉歸國重湖馬就刑磨崕誰刻此逺續孟陽銘施州道上遇雪易下山中雪初寒塞上途郵燈催客起澗水雜猿呼密綴林驚秀輕䝉石變枯無人來冩取十幅李成圖寄新先輩蹇頎子長書記年少才華自不羣果然飛步出常倫漢廷大對無雙手聞子長累考中狀元蜀學巍科第四人吾蜀李公素楊元素王宣義與子長皆第二人也暫屈鵷鸞栖枳棘行看鵰鶚離風塵東川佳氣因相待共作榮歸晝錦春和楊壽祺承事見寄道屈文章價不低誤傳新句落天西忽聞命駕趨雲棧猶憶同舟上井溪争嘆科名淹奮發誰憐簿領困沈迷相逢且約嘉陵酒為洗關中數尺泥丁夘除夜庭罷驅儺戲門收爆竹盤酒香添臘味夜氣雜春寒嵗序張燈守人情遇節歡明朝五十八消息近休官送䕫漕王宗望蟠叟大夫赴闕君子不苟然每以中道居處身概有常為吏形其餘太原大夫公使蜀元豐初蜩螗沸清晝交道狼與狙公時於其間素藴唯所攄紛擾目不瞬開濟心自如蜀人恃以安至今芬名譽更駕漕三峽應手民瘼除適逢恵澤新禁網闊且疎攫噬化為麟奔馳不能車公無異他日法度方得疏均齊即人心簡易平徭書天邊促嚴召嵗晚巾歸輿老成坐廟堂收實攘浮虚有常豈易得得見將已歟行看步臺省自可風簪裾非才共封畧況舊游門閭贈行期有知知公當知余送利漕劉明復朝議中山元魏後數世十三傳皆在河南塟初從代北遷中書謀定䇿環雋字仲賢魏中書侍郎大理力扶顛坦字寛夫隋大理寺卿渝國乘機日政㑹封渝國公唐公起義年議高都尉識𤣥字深之太宗駙馬都尉名累侍郎賢奇天官侍郎死羅織獄原武輸期集東阿舊俗悛聚字文秀東阿令河陰才被詔藻茂實河陰令户部志繩愆符字端朝户部侍郎八子生中葉符有八子崇黽崇彛崇望崇魯崇纂􅀈玕珪崇黽字子長嶺南節度使崇望字希徒左僕射崇魯字郊文翰林學士三台共一躔洪洞城不下玕工侍政無前珪昭輔書儀集明宗禮意全太常卿中丞安出處藝祖首詳延學士清臺閣咸平起澗瀍斯文醇復古宏議自摧堅江漢源何巨公侯兆已圓信辭師魯誌佳氣尹樊阡秘監花儒將緱山酒地仙看公承逺構發迹向孤騫浩蕩窮經笥縱横信筆椽巾箱遺紫綬見譜伯仲襲青氊辨論多兵畧澄清累使權鳳鳴雄屏翰鶉首富刀泉詔自高臺下車隨北斗旋鵷鴻思舊侣嵩少望歸鞭師節頻輕伏戎腥未一湔朝綱今省户古道日經筵盡是徊翔地行承咫尺天門施唐棨㦸冠珥漢貂蟬閥閲誰如此功名盡勉旃慎無從子晉輕去戀伊川因公之志而云孑立棲遲久深知氣義然人情嘗嵗月物色自風烟士要文章别詩因譜第編碑陰如可附青玉為雕鐫和陳興州見寄音信易傳臨一水道途相去隔三州何時尊酒同為會無補篇章約共休鄉思豁從歸後少貪心宜向静中收此情惟有君知我不羨人間萬户侯和李獻甫雲頂舉首看山不到山每來留恨翠微間禪關但有經年約使傳終無一日閒春到栢林香渺渺雨餘巖漏瀉潺潺虎溪莫過虚邀客猿鶴鍾峯悵未還和王子巖南平道中寄示雨隨行色過重闉路有思歸送别人未省幾時趨北闕且同回首望西鄰嘗同在梓黄花漸近羞重見白酒猶期醉一巡三峽苦辛嘗欲遍置杯休要問澆醇木門早行白虎前峰數尺高露華蕭颯滿征袍只知眼底簿書静豈意山中車馬勞石夾雨餘重按轡草間風動幾横刀通途聞說無多地踴躍身輕意氣豪題范亦顔聖鄰同年集後聖鄰生西南豪傑如山東倜儻負竒節脱身起蒿蓬文章學西漢不作雕篆工東京太學士議論傾羣公高適遊大梁馬周隠新豐酒酣吐素蜺意氣横烟空翻身落州縣束手如兒童無人解秋隼摩天看飛沖黄鵠垂兩翅飲啄雞鶩籠始知命使然甘作㝠㝠終資陽數尺墳萬事隨秋風相從嘉祐初擊發每兒䝉死生雖云異坎坷畧已同然猶有子棄孤芳秀珍叢慷慨悲父書收拾塵土中蘭山四百首玉佩清玲瓏餘文隱圭璧夜氣如長虹古人身後名乃是不世功蜀士去不朽存者惟卿雄有能兼斯名昔否今始通聊書附篇末相與傳無窮開州盛山十二題宿雲亭基搆白石層風物青山圍野雲戀幽寂長遶軒窗飛梅嶺繁梅照溪谷蜂蝶殊未省巖風莫吹落留粧臘前景茶嶺新萌雨露濃嶺頭春未足縁雲採擷人争收火前緑流杯渠為愛泉石飲屢招賓朋游浮觴來不倚一水循環流隠月岫月從海上來清輝長礙山山前愛月人惟愛亭午間盤石磴數步即一息始知登山勞盤盤行徹時跡與心俱高故盧沼中虚得嘉名水清石環環天邊侍從人來照氷霜顔琵琶亭片石胡琴槽構亭事登臨考功閒中樂非好世俗音桃塢聞說舊桃塢嵗久無殘枝春信已不到猶有風騷知繡衣石榻御史來山中拂石常優游非人勿據兹恐為山人羞上士泉瓶為愛禪翁遊潄泉聴泉音何當酌清泠洗我塵垢心竹巖倒影蔽山骨引根出巖腹誰人萬仞間團團種青玉愛石堂并序熈寜八年七月安岳馮山允南至梓始踰月出篋中文字筆硯求置閒燕處得愛石堂乃前倅府事秘書丞嘉陽李堯俞所建而石無有也訪之得雙石筍于北垣下叢篠陰翳中上有王舍人克真八分書鄭祠部文寶玉箸篆皆自寫其銘記與詩也拂拭洗剔復歸于堂之中庭屋以版環以苦竹每公退次第取書巻畧畧誦讀倦則撫石看王鄭字法清風蕭然古氣襲人既而又得李記于西廡下噫竒石古字蓋無事于世俗之用雖時或見賞而廢棄常多豈物理固然因係之以詩刻于李之碑陰雙石非梓石厥功置者誰埋沒不知嵗復有賢者知王分逼漢邕鄭篆源秦斯今人竟未及墨本收清竒文字相稱古銘記兼以詩鐵畫隱石骨鬱屈蟠蛟螭李丞嗜竒古見石喜且悲耽耽建華屋落落刋豐碑爾來三十年堂在石已移幸未仆作橋上有車馬馳缺折從瓦礫叠為垣牆基一見叢篠間若與平生期清泉去塵垢始露金玉姿殷勤還兹堂如母逢厥兒對以古書巻環以秋竹枝勝舍結高義出處相與隨夷齊秉達節顛沛不少虧豈事燕處玩可為終身規嗟嗟石何有三賞百見欺好惡凡在人顯晦若有時官滿當捨去棄置無復疑聊書告神物為我當䕶持送趙悅道參政大資知越州二首乖崖威重兼之怒正獻純風重以和高世清名公取盡經邦餘事蜀霑多二江遺愛流長在雙劍銘功壁屢磨聞向蓬萊指歸路其如朝野共瞻何徒御紛紛擁劍關蜀人重是送公還欲知千里謳歌意半在百篇文字間風霰道途方過闕烟霞旌斾更尋山重來不負扁舟約賀老鑑湖春水閒兩宋名賢小集巻七十六
