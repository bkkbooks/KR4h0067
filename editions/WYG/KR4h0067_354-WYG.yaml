body:
  text: 兩宋名賢小集巻三百五十四宋陳思編元陳世隆補慵菴小集邵桂子字徳芳淳安人咸淳間以博學宏詞登進士教授處州國亡不仕娶華亭曹澤之女因家小蒸為斯文領袖者四十年八十二卒所著有脞談稿又作忍黙恕退四卦以自警子祖義孫亨貞俱有文名疏屋詩為曹雲西作草菜可食總名曰疏品題有圃疑當作譜樹藝有書衡縱町畦周繞屋廬繚以樊垣經以溝渠晨出抱甕夕歸荷鋤有蔓必薅有蝗必驅風披雨沐日暄露濡穉甲怒生嘉苖蔚敷芥薑杞菊韭薤蒜葫薇蕨藜藿瓜瓞匏瓠楮鷄桑鵞籜龍梭魚馬齒鹿角䑕尾虎鬚薯蕷蔓菁杜蘅蘼蕪茵陳莪蘿芄蘭茹藘赤莧銀茄翠荇墨菰酸漿辣䔯甘薺苦荼庖人調胹園丁拮据錡釡鬵煠筐筥貯儲椒橙内交鹺醢效劬以芼以湘可茹可葅維昔尼父𤓰祭齊如飲水曲肱其樂只且召南蘋藻韓奕笋蒲知味羡黄齩根歎胡葵蓼飫顒葱韭厭徐火芋明瓉山菌接輿庾郎三種石生一盂劉參玉版蘇傳冰壺巢字元脩鲋姓豆盧菘羔抱孫蹲鴟將雛絲滑露葵練浄土酥野薺餛飩水苔脯膴餅炊菠薐鮓釀苞蘆胡麻饙餾罌粟醍醐萍􅐽西晉蓴羮東吴芹擷泥坊藤采豐湖沼沚有蘩江漢有蔞岡有常枲洲有接余雁門天花黄河蘑菇大宛苜蓿太華芙蕖環滁野蓛盤谷山茹地饒所産天茁此徒菲葑是采口腹以娱落英未莎初篁未箊霜根旋挑露葉半舒烹泉石鼎養火地爐色炫匕箸香浮柈盂氣含土膏味逾天厨肥生華池響鳴輔車商顔饑解文園渇甦前招麴生後引酪奴饌非羶葷餉非苞苴園無羊踏壤有䑕餘彼哉肉食俎列豢芻心炙椎牛項臠割豬春羔秋麛冬鱻夏朐猩脣豹胎麋臡蟹胥緇裠解黿銀絲膾鱸羊尾截肪錦襖脫膚山殽雉兔澤羞雁鳬北饌潼酪南烹鼃蜍嗜䑕則鴟甘帶則蛆迺笑鄭老爛蒸瓠􅕧乃笑坡翁夢餐雞蘇屬厭饕餮飽死侏儒語以疏味能知否乎予雅嗜之日不可無乃顔兹屋羞供是須寧疏而癯毋肉而腴易牙司味敢告膳夫海蟾三足老蟇太隂精夜載阿姮朝帝庭澡形不假桂花露背負金輪浴滄溟騰騰躍起㡬萬尺癡腹一團露圓白睨目光射蛟宫寒海若天吴難遁跡腹中萬斛蝌蚪藏吐作列緯森光芒曉驂六龍駕羲馭騰踏未必輸飛黄餞魏州判鵬舉捜出指鑛遺其沙鄉疑是卿雲褒武皆蜀秀虎豹各自雄鬚牙兩京得人廣數路忍使丘中留子嗟不然題名百許輩無一顯者何謂耶我亦典學老從事試向座中尋孟嘉古柏行思人誰復念婆娑窟室崖隂未易磨四十圍間看溜雨三千年後數恒河不堪與世供狙械尚許遺民占鳥窠從此便名夫子樹匡人斤斧奈予何到夔門呈王待制手挈東風上水關鳯書迎日看新班五湖家世烏衣巷三峽樓臺赤甲山畫㦸門開春晝永卧龍帳穏海波間安危大計須公等天定應知即賜環兩宋名賢小集巻三百五十四
