body:
  text: 兩宋名賢小集巻一百九十二宋陳思編元陳世隆補方壺存稿二汪莘玉堂中賡任宫講希夷惠詩韻宫講先生句子香晦菴衣鉢有餘芳松篁性本參天直楊栁情仍庇地長自恨此身真逆旅不知何日更傳觴山人初自山中出還欲歸來水一方三月十九日過松江五絶在家毎憶松江好及到松江又憶家夢見樵青來竹裏笑將漁父挿桃花萬頃烟波短棹飛一雙鷗鳥弄斜暉如今頻作姑蘇客遥指當年舊釣磯煎茶徐讀散人傳對酒朗吟漁父詞除却月風同此意秪應烟雨暗相知薫風吹夢聴新蟬又向長橋艤釣船好剪吳松半江水袖歸三十六峯前笠澤千波擁洞庭望中七十二峯青待偕龍女乗雲去占取參天一畫屏訪楊湖州二首一道西江隔水雲夜瞻牛斗共天文聖之清必先夫子仁者勇須今使君天下山川居一半湖州風月占三分錦嚢幸許傳抄去預取蘭香手自薫苕溪霅溪風景好浙西浙東皆弗如處處堤邊種楊栁家家門外有芙蕖使君逺繼東坡事處士端宜耘老居聞道香名來一訪白鬚照水久躊躇過丹陽界中新豐市道過新豐沽酒樓不須濯足故相酬華山仙伯徐思看爭遣遊人識馬周馬周乃華山素靈仙官途中再詠金陵石頭城上望斜暉覽盡金陵寂寞歸嘆息青天如許大可無一箇鳳凰飛回至松江欲向江南採白蘋杜鵑啼後已無春洞庭龍女雲中降手把雙珠笑贈人深林茅屋隠漁樵時有扁舟過石橋誰把客星入圖畫曉風殘月伴吹簫曉次長河堰天清如水風月佳甚擊鼓行栁塘有狂士酒闌好擊鼓殷出黄金骨裏涙摻出白玉心中苦此苦知為何人家寒宵心事亂如麻岑牟肯戴紅槿帽蹀足不數漁陽撾翻手作春杏開早覆手秋風葉如掃開元天子是天公那知塵起長安道我今擊鼓一聲髙徹天擊鼓二聲深徹泉天上拂開白日路地𤨏掣斷如飛烟豺狼聞之腦門裂狐䑕粉碎臭滿穴惟有蒼鱗火鬛雙虬龍薾雲揈雷雨騷屑青天洗出古時青日月洗出古時明百榖草木催發生鸞鳯亦作簫韶鳴走上半空望五岳挿天截海蟠金城我皇無為人自寜此時方表鼓中聲寫作栁塘擊鼔行訪吳安撫竹洲憶昔見公十載前知公即日圖凌烟而今見公十載後豈意翻為竹洲叟黄金照日天門開夜叉安得生風雷龍文虎脊君當取有才不用當誰哉中原寢廟無消息塞上無人能殺賊君王此志二十秋四海看君閒不得到髙亭山望南北髙峰每汎西湖不忍還髙亭數疊出雲間如今回至髙亭路却望西湖數疊山日月蓮花歌余生平好觀日月之象欲詠歌其致者久矣因閲華嚴有蓮花日光明而玉川子又以黄鍾夜月為是白蓮浮出龍宫遂合而賦之為日月蓮花歌云偉哉天地間誰家兩枝蓮紅蓮一枝瓌子鮮白蓮一枝雪様妍兩花徑面各千里壓盡衆草無朱鉛不見賣花翁不知阿誰擔南躔又北躔不見採花蜂但見烏蟾兩㸃追過天津橋那邊有時雙暈更整整有時五彩尤戔戔有時露下花頭濕有時風起花頭偏五鳳銜入淵中淵六龍挿入天中天一入一上知何年至今絡繹如梭穿花斂作昬舒作晝世間未識春前後神農教民作耕耨唐侯指出兩花定節候唐侯司花方少年朝朝暮暮長與花周旋苟非其人子莫傳為花揀得花中仙姚家愛花故不俗花間自鼓薫風曲綵旗幻出芙蓉面晚來旗脚薫風轉此花不費一錢買付與後來司花作模楷青春飛過秋飛逥紅白芙蕖花自開曽見堯舜山河去也見漢唐池館來看花人逐年年改疇昔看花㡬人在惟有阿兄日珠姊月珠坐乗兩花撫四海程朝望送梅花昨夜燈前解一杯鄱陽主簿送春來只疑天地無清氣都在江頭一樹梅再用韻兩首長恨無人共一杯直知好友自天來淵明到死真成菊和靖平生却是梅接得南枝即按杯似和霜月帶將來自從驛使相逢後千載無人解寄梅重陽趙使君惠酒何嘗自覔王𢎞酒頗怪曾麾道濟粱處士固應髙一著江州太守味尤長寓清湖橋夜枕聞雨要識人間過去愁春宵風雨到湖樓如今此恨無分處應有知人在後頭寄潘倅霆夢魂何事練溪濵起自新春向晚春紅杏園林催百舌綠楊洲渚薦重唇一年好處是寒食三月水邊多麗人遥想使君行樂處牡丹如障草如茵夜坐有感前賢相遇是前程不見斯人莫誤行白面書生那解事只將文字住京城晚晴即事君平簾外雨霏霏寂寞何人識少㣲怪得湖邊天色好小舟爭載夕陽歸夏日西湖閒居十首十里湖山若見招栁堤荷蕩赤欄橋待他朝市人歸後獨泛扁舟吹玉簫急管繁絃樽爼間何人靜眼對湖山怪來水面無鷗鷺多在殘蒲落照灣每嘆西湖境未殊向來人物有還無紅蕖綠竹渾相得明月清風亦不孤晚風吹動碧琳寒初見花房露未乾誰道幽人無伴侣紅蕖萬朶竹千竿修竹祠堂曲水濵寒泉菊盞久埃塵道旁車馬無心到似我頻來有㡬人一曲波光徹太虚四垂碧漢罩湖魚游人眼被荷花礙不覺琉璃泡裏居露冷風清斗柄遷芙蕖零落謝家船都人正作黄粱夢獨占西湖明月天清夜湖心把酒杯花間風月共徘徊金鐘何事催天曉又恐游人相逐來醉把青荷當篛笠亂披紅芰作蓑衣漁翁家在蓬瀛上欲駕蓮舟一葉歸藕帶嚼來殊解渇荷香聞得亦忘飢幽人不趂槐花收得西湖㡬句詩潘别駕寄牡丹歌次韻别駕寄我新詩章賞花須賞花中王我誦此詩欲大叫山川靈氣未始亡憶昔少年健如虎兩脚不住尋竒芳何曽著眼看桃李天台洞口呼劉郎癡兒騃女意自得不肯隨我超凡常嵩山洛浦忽入夢秦人漢士俱堂堂仰天大笑不復道朱宫紫府森開張是自青春二三月姚家一樹真黄裳其餘牛家魏家種千紅萬碧羅新粧論花固是花中傑論人亦是人中祥不覺我醉花亦醉不覺花香人亦香氣髙已壓玉笥級骨硬肯羡金釵行授我以元君之雲篆沃我以王母之霞觴當時跳出生死窟自此踏倒利名塲懷洞庭兮悲瀟湘吟清風兮詠滄浪仙人擊節相屬和賤子起舞尤顛狂歴聘二十八列宿遍謁三十六上皇東風未斷薫風起江北吹落江南藏天葩何年到此土形貌雖減神猶昌濓溪先生誇富貴東坡老子憐忠良不如煎酥煮麫喫大勝三椀搜枯腸春懷十首太皥涵帝徳勾芒播皇心羣龍服蒼駕靈雨冒南岑淵魚自暖躍谷鳥相和吟桃花既夾道麥苖亦成林竹籬帶夕陽茅舎含清隂白蘋空騁望青楓第傷心况值聖明代聊以陶吾真寄言同懷子芳醪期共斟黄鸝占髙林蝴蜨戀芳草逹人能岸春兒女被春惱和風吹衣裳白日照懷抱天地為我園衆目一何小東皇行仲月南極現朱鳥虞帝被袗衣周王在靈沼於飛既覽徳於牣亦知道感此彌恨長冉冉以空老綠水遶北户白日挂南榮岑樓髙中天引領望咸京咸京望不見逺山與雲横鸞鳳邈何許燕雀巢朱甍谷風起將夕偃月哉生明童子焚妙香稚女彈神箏似非今世曲無乃古人情為言且勿彈吾疾方未平神遊何邊方夢到迷處所論世非秦漢辨地豈吳楚碧桃翳楊林翠霞䕃清渚鵾雞鳴花間鸞鶴將儔侣中有古玉堂日月光相貯似是重瞳君左右列二女我時再拜興帝復相爾汝蘧然形神開不得意所語青天夫何長白日又何促吹却㡬株花成此一村綠不嫌春已晚春晚愛不足誰能描晚春隠然在心曲我心如明鏡萬象相映燭我心如虚空萬物自磨觸斜陽紅欲滴逺水光可掬中有太古人歌聲出金玉夕陽下西崦明月出東方清波如有神喬木何蒼蒼簮玉待魏文趿履從思王奎壁不在天西園爛成章祥飇遶飛葢鴛鴦宿春塘絲竹壯髙㑹賔主無留觴憂生惜日短玩物貪夜長嵗寒不易得此道亦足臧夾鐘應和氣和氣到天中半為枝間綠半為水上紅杖策南野際鸛鶴摩蒼穹君子有本性不受外物攻那能學攀桂俯首嫦娥宫竦身躡倒景與子凌剛風參旗一以展欃槍避其鋒舉瓢酌雲漿歌詩謝鴻濛魚鼈好在川鳥獸好在山人皆好山水所好非一端君子抱仁智寓意山水間矧乃陽春月富貴相追攀靚裝散香風纎指撥清彈道旁起深羨有識獨長嘆我亦共春游所遇得正觀可與逹者悟難與昧者談日釀正天綠風酣麥正秋閒擕稚子輩眷言共春遊芒鞋過澗壑竹杖穿林丘東西隨所適語嘿頗自由亦有一樽酒父子相獻酬山花既含笑野草亦忘憂一輪漸隠隠半規尚悠悠歸路何所嘆古人可與謀曳杖登春䑓萬物含光輝天地豈不大孤雲獨無依我友在東海古屋弦湘妃昔醉芙蓉浦今掩桃李扉不見已三年何由㑹王畿贈子青玉案報我紫金鞿日暗牛羊下月明烏鵲飛有生共如此擾擾徒増欷感白髪一枕黄粱夢欲殘死生大海浪漫漫鬢邊白髪休除却時向忩前把鏡看湖上早秋偶興坐臥芙蓉花上頭清香長遶飯中浮金風玉露玻璃月併作詩人富貴秋夜興簟紋如水浸蟾光睡覺湖邊月半牀道是廣寒疑不是月中那得藕花香泛小舟入蓮蕩㣲雨即事水光如錦葉如烟㣲雨相從到洞天翠葢紅糚無處避一時挨入木蘭船偶題浮雲散盡月孤明月裏仙人影更清憶昔相逢不相識如今同坐復同行臘月雪後林下雪消添晚汲山中日出欠晨炊先生茅屋春尤早只有階前碧草知遷入新居後客至偶成開禧三年五月方壺客去偃雲牀槐栁隂隂日自長睡起不知天早晚問人山頂是斜陽題新安郡圃駐屐亭駐屐者取杜子美駐屐欲㣲香之句趙恭榮王典郡時創亭名駐屐後其子希逺守徽一新此亭潘别駕皆有詩遂賦先王昔牧紫陽城池邊駐屐荷花生先王今居帝青閣嵗嵗荷花自開落華榜髙垂四十年銀鈎鐡畫蛟龍纒公來對之不忍去如見先王在眼前願公子孫滿仙籍相繼此邦森畫㦸願君與國為柱石長使邦人歌駐屐雞雛癸夘孟夏初三日賦負清抱黄圓如彈崑崙磅礴幽未判母雞春日宿雞栖躬抱乾坤入烹煆翼之腹之氣自蒸有時踏轉令交貫矇矇如困當晝中惺惺無眠過夜半食時莫怪喚不譍凝然有在應難喚君不見隂陽氣足有超越恍恍惚惚生神觀數聲隔殻聞淳音一㸃懸胎脱幽贊母雞慣事徐啄開可憐毛羽良毰毸却思爾許若為活跧伏性命能低回啄粟飲水孰教之天機自動曽何疑三三兩兩旋母脚出入南北相追隨纍然多寡乍磊落倐然後先無定著乗閒疾數數不得往來旁午依前錯聞道輪迴少安泊謫仙那能被法縛秋山歸來酒新熟呼童烹雞色自若殺與不殺莫忖度請君注目寒江倚山閣中秋月五首今宵何處愜清遊震澤波心太華頭初出海中白紈扇到來天柱水晶毬兎蟾迸作雙輪現金火鎔成一鑑秋惟有飛仙知表裏入他宫殿又焉廋對月題詩過㡬人不知何句與渠親精神尤向水中活形狀直須天上真紫磨一輪開作屋桂花千朶斫為薪寒儒老矣心猶在誠念唐虞有野臣萬𣲖寒芒一道飛隂精盛處逺成圍抱回紅日浴東井横截碧天朝太㣲惟有中秋金正王復當子夜水生肥溶溶滿掬乾坤髓説向旁人是泄機吟詩競盡月精㣲自昔誰明造化機近作金波千道去逺成玉鑑一團飛陽魂滿處因乾父隂魄虧時是巽妃笠澤漁舟都不問醉中倒著綠蓑衣詩人長以月為心對月題詩隨淺深缺比作鈎圓作鑑白將如玉紫如金鍊丹道士綿綿守見性禪師了了吟今夜誰家殺風景聒天鼔吹到横參瑞粟歌君不見濟隂九穂禾又不見河南六岐麥何似新安海陽縣瑞粟一枝超簡冊嘉定四載六月中採來疑是東極東龍枝鳳冠雲蕖叢令人多力善走顔色紅六岐九穗何足道徑欲一醉敲金鐘趙君不敢留馳以告宰公宰公不敢留馳以告太守意甚忠嘉定聖人坐法宫聲色不邇心在農嘉定聖人與天通故産瑞粟昭年豐新安太守見此喜謂匪竒花異卉同銷金黄羅手自封再拜獻天門進入開天容吾聞粟有神其姓曰慶天吾聞粟字制其西曰金堅吾聞粟字釋葢取陽精相續如百川請君占所聞可以知開先我賀宰公宰公歸太守我歌賀太守太守歸我皇極天子大父母願見太平萬古萬萬古惟有貧儒多不知但願食粟長無飢贈祁門不老山髙法師鼇山萬仞峙璇霄上有髙真道寂寥跋足壯能軒物表洗心清不渾塵囂洞天别有風光異人世那知宇宙遥雲覆醮壇閒悄悄烟凝仙室靜蕭蕭步虚韻穏聴晨禮環珮聲連識晚朝飯啖青精顔色好詞歌白鶴利名消囊空阿堵縁辭寵匣蓄干將為斬妖折角巾多裁㲲布隠居衣盡屏鮫綃神遊汗漫趨蓬島禹步迴旋指斗杓九轉丹砂盈日月三千功行繼松喬密渠細石通泉竇斜挿踈籬䕶藥苖甕裏杳醪斟琥珀壁間修扇閣芭蕉蟠桃初熟人爭竊野菜初生手自挑花卉得時舒錦繡瓶湯娛客奏笙簫長松夭矯龍千尺嫩竹琳瑯玉萬條鳳翅亂峯森洞口羊腸㣲徑遶山腰牀眠癭木肱常曲兀坐文藤足屢翹衮衮騫河傾俊辯温温和璞琢孤標我慚未躍三春浪君去行看八月潮好把隂功拯存沒西歸宜早買吳舠春夏之交風雨彌旬耳目所觸即事十絶石橋南北碧桃香翠葉交柯水面涼終嵗方壺無一事春來也為種花忙不賦杜鵑三十秋今愁不比昔時愁杜鵑豈是傷春去為見春來啼不休淳熙癸夘之夏曽賦此夏雨春風窮管仲停雲營木老淵明斷紅池館無人到猶有黄鸝一兩聲野水平橋細浪生柴門草長斷人行園林霽後春如在燕雀鳴時夏正清即日南風清且㣲北窗心靜見天機林鶯母子聲相應野蜨雌雄性共飛春去江南水拍天經旬茅屋罕炊烟石墻頽毁板橋斷始覺貧家氣象全雷電隂晴共一簾殘春首夏境相兼閒尋稚笋今朝長靜數新荷昨夜添下簾讀易有深功一炷清香過日中赤帝元來協青帝南風初至似東風槐葉風清鶯哺子麥苖露濕雉尋媒道人不出方壺境坐見天時去又來簷前花放不忍折庭下草深仍懶鋤苦雨晴時春已盡可憐新月挂清虚兩宋名賢小集巻一百九十二
