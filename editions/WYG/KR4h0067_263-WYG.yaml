body:
  text: 兩宋名賢小集卷二百六十三宋陳思編元陳世隆補方泉詩集周文璞遊洞霄天柱青峩峩石筍危不墮晃晃銀雲收誰子開玉鎖崩騰放閘水煜爚入洞火神境偕靈休乃欲搜碎瑣媿此朽濁顔一得在無我致彼老鑄疑披褐迎路左逗留䕶鋃鐺被業盤礴臝玉􅙞付九虎遊宴升嶪硪為言子速去勤苦悔坎軻反樸招太和當免運刼禍慟哭出青松殘齡其或可題喻玉泉家亦可樂亭先生亭非伯夷築亭柱亦用秋山竹但令家有滿架書何慮妻兒少饘粥朝來相對亭上賓洙泗尺度羲皇人先生已死名不冺常與此亭作標準後來鄰觸閼伯怒僕夫預起池魚慮拆亭拆亭先拆柱有孫抱柱出煙去三十年餘復改觀有孫如此不待賛似魯靈光偶不全今人見此空三歎病後風燈露水雨茫然莫為歡華少壯年無病更須求藥物愛閒猶要覔緡錢此生身世揶揄裏末路光隂泣涕前快出囊中飡玉法白雲深處日高眠上冡蒸魚燔肉當好羞北面百拜如有求願身長健兒孫孫歲歲此日燒松楸紙錢灰盡淚不盡孤也雖在猶拘幽沄沄金葢山下水相逢直過龍灣頭送人歸苕溪古王祠廟桃花下愁苦看春又隔年今夜白蘋風更惡去時須傍采菱船歐陽琴歌嗚呼箇是文忠琴嗚呼此琴今尚存堂中圖書散失盡留得七絃傳子孫六言自書書在腹古錦梅花留不得嗣孫賢者能忍貧不向豪家愽珠玉初鼓如撼茂陵松鞏原流水青溶溶三宗龍衮在帝左曽把鈞天賜與公再鼓似播清潁水只將漱流肯洗耳曽蘇兩生招不來自冩新聲付兒子堯囚山舜放野自兹以下不平苦與君所得婦女謗此日一洗清萬古小儒昔誦五季傳頗訝春秋體微變今來再聽七絃琴南薫遺製喜復見浮雲流盡白日逃何用廣陵與離騷譜成只度歐家曲秋聲賦共廬山高琴有公題歸姑蘇舊巢巳是别人門梅自蕭疎栁自昬河北謗來須混俗江東讞就欲招魂故王未納耶溪女越相先尋澤國村懷古感今吟不盡一雙清淚滿醨樽晨起閉門不與俗人交元晏春秋日日抄清曉偶然隨鶴出野風吹折白櫻桃磵上小飲方坐愛蠲潔俯窺為囘縈汲汲雨露澤悠悠江海情引之灌蔬圃亦足發光晶陶然未須去於焉潜我名送道人歸華陽山中無酒禁處處有松醪旋汲泉炊飯多挑筍助庖天燈將出現野月未能高憶我初遊日先將石鼓敲寄茅山道友三絶伏事三茅過一生癡心不望羽車迎舊時手種黄龍子今解升雲入太清九錫碑亭日欲曛有人趺坐對爐薫慿誰傳語桓司馬句曲山中只白雲蘂珠宫女傍瑤屏自把韋編問姓名囘到人間無一事紫陽花下白雞鳴秋日孤山道院孤山有何好脩竹隱樓居人在秋雲杪香凝午醮餘芳林多落果靈沼少驚魚歸棹聞歌詠猶如學步虚寄韓磵泉滮窮冬孤陋只書癡肯為㓙荒强忍飢師友淵源似公者輿臺貧賤亦安之人來山縣猶須債雨映茅簷但要詩欲詣樓居無逸步要從老手化神奇訪梅二首起看重霧白漫漫畧見春風在樹間傍水出籬猶未快淡煙微雨又青山幽花墮在石根旁幾欲移將近草堂草草一樽聊爾爾跨驢歸去月荒涼呈鞏睡翁豐家本汶陽縣累世事耕蠶室廬既焚蕩飄零住江潭幼及識故老頗聞鄉里談最盛陽和時梨杏春酣酣岱宗富栝栢孔林存攙檀鄉閭鼎其中實號玉檐檐去年拜睡翁知是山堂孫淵流京洛舊尺度歐梅間昨夢返故里有翁作司南俚語馳寄之何以鑴冥頑石林蒼蒼一石林零散少存者分攜多子孫不勝落田野虚堂有天就乃在絶壁下存者寜非真散者亦已假相君久藏山逺客初繫馬幽玩埋莓苔孤蹢坐梧檟方咏兹游清未敢泥風雅絶句四首巾車初扣槿花籬物物來前總要詩一句坐來摸冩了兩鳩飛下老梅枝紗籠解散坐門畿生怕逢人索接䍦朝雨洒來山更凈舂聲恰好到芳池解呼威羽歸丹穴可縛單于獻漢宫四面八方籠不住許來分坐此山中隔林八十龎眉叟理竹疏泉過一生見說石林身健日把書只在石中行客中客中時序又匆匆孤坐初春小雨中弄水攀松去年事令人憶殺洞霄宫山樂官山樂官爾誰魂逃河入海俱奔奔伶倫梨園何可論山樂官予欲爾兮無言如有言為余歌雲門烏媒一自弋者簒冥飛亦云多庖犧網未收同類如予何已噤伐斧篇去去依女蘿和澗泉賦山楹共惟古至人用意事物表一丘漫摧殘八極自圍繞不勞日月運坐見歲時了魯夢久不作楚賦那遽曉既煩匠氏來誰謂此山小雲衣方分敷雲幹復夭矯沐浴抱歸藏樂甚憂悄悄重經洞霄曩既負幽討今敢萌遐心扶桑下陽馭砮磬浮空林瓊臺𣺌詄蕩蘂珮棲高深屢見仙驥舞遙聆元女吟如遂覩開闢那復憂崎崟抱關職貴重啓閉非所任靈飈掣虬户同此琅琅音願併翠綃水冩之朱絲琴大滌洞嵌空纔入泉潏潏隔几倒懸若錐立道士云是閭丘公入向華陽便門出岸幘岸幘坐亭臯休嗟命不遭通幽文似呪招隱句如騷日下桃花熱風低鶴背高真逰窮不盡只是酌芳醪翠蛟亭禹驅龍蛇不驅蛟依然跧此山之坳有時淵渟忽奔放如負山走如玉跑昔時萃渭正如此咨爾來者無空嘲寄題館娃即靈嵓寺突兀僧藍是館娃屧廊猶自隱晴霞清明但長離宫草精魄應棲野寺花白苧黄蕉迷鶴市紫蘭緑芷屬漁家思量種蠡成何事空使君王式怒蛙小寒食從來寒食多風雨不料窮鄉亦管絃壯歲心情悲昨夢異鄉時序感流年偶隨遊子來溪上因與棠梨立路邊從此堪悲轉憔悴隨羣同上釣魚船五月五日至京口囘囘望秦淮出語重煩喋凱風初酸辛靈雨更凄切疇昔之所經望見心已折粤從世態換轉見凡事别緡錢換仍艱旅飯雜砂屑坊市半頽毁物貨僅羅列鳴鳯斯下聞遺沴猶慘烈凌晨轉時序凃路已入浙景清雖快人忍作昌歜節身本無瑕疵反被讒口諜低翔就師友庶幾免摩滅清曠雖未能元暢差可悅如其守微言予將俟來哲贈蘇召叟句容縣古寺壁有道元筆晃晃纓絡軀𣺌𣺌烟霧質一堵最光怪未泥久湮鬱泥去墨亦盡慘淡意多失恨不還其人相隨急鞭抶毁棄加弗敬請論如漢律羅漢院塔影顛倒難致詰稗書誌海翻此理殊未必今居所歸路正向此中出况有弔古才仰天痛呼屈勿稱荒唐言析理資按述其餘傳播詠淋漓滿箱帙棲霞者悲壯茅洞者清逸珍題倘相命當第為甲乙半山寺野芳汀芷互幽妍相國風流亦未傳衮冕塵埃半山寺自相撑拄過年年跋鍾山賦二首丁年冩了鍾山賦舉向禪宫入定僧僧却為余言未好扶行同謁晉諸陵往在秦淮問六朝江樓祗有女吹簫昭陽太極無行路歲歲鵝黄上栁條過鳯山有感二首當年準凝作家林溪墅樓居意已深隱者自應尋别業鳯兮何肯負初心參差一段囊中玉激烈三更月下吟若不速來相就飲定行從此失知音秋蕪闕是草堂基惟有南隣盡得知辛苦置家將守冡告求廣地要穿池淨蓮巳付鄉僧掘慈竹從教墓客移雖向龍灣作耆舊此生寜没暫來時絶句二首臯伯通家鎖夕暉八年寒食盡歸期江鄉橘柚花如雪不許離人戴一枝入春便與僧為友紫萼黄英見坐禪昨日鄰翁催入社謝他只是說無錢辛未九月晦日遺體只母身哀哀勿重陳一貽泉壤憂兩見霜露晨繁霜與重露塗抹隨荆榛身即未殞滅强與松栢春遂於搖落中見此天地仁𤣥鳥巳辭社蓐收方降莘拭淚呼秋旻何由酬艱辛閒居日有幽事戲作竹暗僧窺户莎寒鶴上㕔壁懸陳處士屏貼少微星壘甓為蔬圃埋盆學蓼汀自知癡得計常用醉為醒野客兼稱僕幽禽代作伶浴鳬翻落磵鬭雀墮空庭算數推三甲防身召一丁案頭松葉響牆角柚花馨梵庋堆書笈醪罌隱粟缾茅茨隱煙雨雞犬也忘形苦錐歌寄澗泉我園秋果枝纍纍縹青紺黄夾相持役夫牧人記註之所佳尚者惟苦錐苦錐兩株結䝉密追惟丈人語天出遂欲供之作籩實他往返舍百無一乃被猿狙打都畢摧藏雎旴以自佚季冬初旬日恊吉寒風急霰俱洌栗自慚曩者信已失作歌獻焉効詼譎臘月八夜雨愁雲欲雪未成雪忽聞寒雨夜淋浪但知歲月墮寂寞不晤乾坤發艶陽天黒鬼車聲更大夜闌客枕夢初長明朝起視籬砌下草芽浥浥又囘黄送磵泉一自接道誼形容生輝光束情謝流宕捧詠増慚惶矯足時切闚雲海何頽唐長安賣藥市堇堇十載强復綴守藏史得近中書堂心計常自珍孰云失其防稽首謝衆去酹酒相扶將融風促緑䕃代謝日夜忙石澗流自湧玉山禾欲長安得便奮飛相從決高翔送薛子舒龍泉餞語餘便使借舡居津吏方抽木官人但載書朝通白矴石身近碧鯨魚一卷新文就臯禽亦自如晚菊亭亭砌下黄金花霜後顔色如矜誇元英摧挫百卉盡獨自照耀山人家湘纍晨餐不論數千歲高丘恐無女君不見天寶杜陵翁晚節常為少年侮誦哀江南賦高橋沙水涸臺城蔓草纒下有煩寃人誦此危苦篇我生楚臣後身在江楓前但見去魂逺不見歸魂還惟昔愛好詞細碎窮註箋中間多佚事他書亦不傳極欲補闕漏今方長棄捐重効嘈􅓐聲庶幾與周旋簡正字南仲白髮梁鴻學暮猿不辭引領望兄門久勞清夢相追逐猶喜遺經共討論數葉赤楓鳴客路一畦黄韭憶家園著書不就身何用每見飛塵恨滿軒重遊棲霞林麓已盡虎不見邇來流民所蹂踐殘僧自言昔遭變藏經埋象猶可唁流泉鳴悲雨摧殿滿嵓慈相沙汰厭白黑綴粘或壞面慧命弗絶如斷綫况我憂患經歴遍見此悲酸尚兢戰千聲萬聲走出門門外秋花泣餘泫出溪二月天景佳波清見魚蝦望中何所好溪女摘蘋花淺溪猶可涉素手花似雪隔港聞謳聲風來正相接過舊居遇隣家子述懷憶昔玉雪時最感鄰媪嫂剪羅作髮鬢添璣綴紋褓今囘遇孫枝面墨體枯槁念彼舊宅凶災釁失依保此生未還役况復念家道冷節返鄉閭江路見芳草奪恃罹荒饑連歲愁浩浩流離在山縣只有泉水好野櫻聚紫玟衒弄晴日杲半為烏雀盜半被奴婢討風霜必盡䕶盤飣如拱寶坐薦一琖春便是舒逺抱正字南仲祭詩昭陽作噩令愁雲凝上蒼我墮溪谷底鹵莽聞公喪哲人困中壽頗聞時若狂繼執邸吏符躑躅抽肝腸又聞斂魂魄玉色貌愈强環泣甚危苦精氣都不揚一朝委垕地千歲還天常峩冠謝成均射策何巍昻連踐中秘書檢校四庫藏象緯識校尉篇編嘉議郎麟遊夜閣黑鳯去旻霄黄惟初典郡學吐血謗可傷積壘高於山黨讞空銷亡故老解嘘枯新人工絶吭灼灼藻火衣可使綻作裳竟罷奉面對射策禆君王愧負臨軒思穹林摧棟梁往者流傳誣聖賢失隄防頽裂在眼前悽愴遙相望二紀獲敬事實亞衿珮行常竊季弟稱朽穢敢自將束教濡雨露采擷參差香雖罹顛沛憂夢寐敢自忘翻思說待對按述何微茫嗟此盛壯時傾耳殊匆忙但覺異香濁安知為死生髮櫛逮細碎羅列置篋箱前年日重九西歸舊臺城䝉索新句詠攣縮紙半張卷頭七字吟持以獻我兄稱許極銖兩逢人便増評出示鞏雒跋文字逾西京鼎器冩饕饕肉翅兩自長款曲彌日留振刷家苑翔池水正清潔碩果亂縱横斯時惜晼暮元袂欹秋陽徐步引升欄如訴後别殃命之返里廬慿藉蜚晚英讀書與析理旦旦拘限程爾搜嵩磵微乙亥事頗詳謹勿摹巻記眎此小傳成亦勿痛揀擇因筆為文章倚櫂望江浦披棒穿翳荒掊擊祛鬼野鄉志始竄更警策入心腹陡謂千駟輕誰子料承應纔開一籥嬴勅厨具節饌髹柈糕菊芳終席岌飛動漏下樓鼓鏜劃見暌孤占炎炎拖晶熒姬孔情可測一身行自當日斜亡集舍􅢗蛫亡妖祥國典嗇左丘地下收囘商師門錫休誄慟哭發幽榮膝抱倐怊悵薛譔方施行茂洪既慕綴彷彿日月光門户變化久咫尺未可量貧疢褁祭緩偶然值清明雨寒送魂來素筵見親情熟食侑介推覆桮嘷后皇諒此心靡他度幾下歆饗弔友人朱子大鼐居越上其屋為勢家所有與君昔並丹陽船形容憫愴俱可憐自說宅囿及百年藏三小山出雲煙土伯小廟自題扁持照清池分醜妍吁嗟先君方下世姪子賣牛相炒煎出尋方伯待救䕶與我密者纔萬錢是身災疢恐彫謝語未脫口吁皇天那知君今亦逝川洪崕白石夢杳然欲從他姓改受㕓鳴呼朱君無歸來歸來但見空屋椽入抱山骨於黄泉挽正字南仲四首千古應無恨諸公竟不能要令參溟滓端合罷飛騰白草傷麟野蒼山下馬陵有兒持手澤淚落照書燈卷舌空沈彩芸香亦蠧賢幾時噫鳯沼一旦感龍泉逺播雕題外高垂若木邊煎膠差不及遺碣瞑臺懸珠璧方輝耀菁華未寂寥極知身作祟何用食為妖犧象收儒廟簫笳咽市橋傷心紗帽冷三徑雨蕭蕭一自初聞報哀號向草堂相隨只兒子逺和有山獐土沃幽宫掩灰凝奠酒香孤身揮泣盡松栢便萎黄行歌四首雪壓門外土骨堆一畨兩番春始囘歸來但見鄰舍換老樹紅花如死灰商量千古有何事經營八紘非汝才乗除幻變既如此何不快呼鸚鵡桮天讒天讒光照户返舌轉枝啼更怒九霄跌蕩帝座高老我此身無告訴舍傍種園翁作鄰一方泉兮在中庭齊民書在泉有銘誓持團結為林坰春霏霏兮秋靡靡嘆息賞音人已死堪嗟玉屑綴空條可奈芳蕤逐流水融怡艶冶恨欲銷世間風雨何寂寥有誰肯為吹葬簫往和蟋蟀諧鴟鴞先秦古書世已稀國風雅頌聲又微彼美人兮在天路馬蜷局兮將安歸古人所懷巳汩汩今人所懷巳忽忽我亦東西南北人相逢且盡桮中物遣興山中雨更愁不是棄吾州懷母未能去訴鄰誰肯留茶人窮似虱藥户狹于舟一磵多深碧嘲吟尚自由孤山桃花二首天上仙人休擲火塵中道士莫燒香可憐絳雪渾無賴一簇千枝對草堂莫向蓬蒿恨不遭夢魂曽釣海山鼇當時不合輕仙事惆悵靈風滿碧桃送人之武夷二首精舍人歸入内臺遺基處處有芳埃小儒更合修壺史刋落乾魚說水苔終向名山度此生此生吟骨要猿擎洞宫終與人間别六六峯高削紫瓊秋晦有懷南仲正字懷人幾日惡况復值秋隂天亦容清調人難識素心他鄉誰饋肉永夜只聽琴高詠龍泉碣相從發至音贈孤山道士二首九霄象簡手中擎豈是閒人愛列卿洞裏石田春漠漠有田多與種黄精清夜古洞無猿嘯自覺尋行幽意微處士橋邊増悵望幾囘瓢酒對斜暉送友人至桐栢牛溪松黄堆碧波狂夫於此欲如何洞天春晚歸不得司馬悔橋芳草多送髯高謁方巖客舍窘積雨出門今始晴藥苗隨野飯燕子看山行大道白日晚閒汀緑芷生方巖相見了為謝草堂兄兩宋名賢小集卷二百六十三
