body:
  text: 兩宋名賢小集卷三宋陳思編元陳世隆補楊文公集送張蛻秀才許田流寓因相識嵗厯今移十二辰别墅已荒三徑草城中舊居常所還往自徙于外邑已蕪穢矣素衣猶化九衢塵懸瓢顔巷安貧久泣玉荆山失意頻莫向明時便招隱重來須醉杏園春次韻和翰林師學士贈倫上人新居之什一徑雨苔深新居雅稱心天花飄晝講池草伴春吟施食山禽下題門野客尋此中堪晏坐何必在雙林李殿丞知廣濟軍鈎盾從來司六尚上林尋見總三官頒條忽去憑熊軾賜對還曾近露盤民瘼乍求應有術天倫少别不成歡陶朱舊邑無多逺魏闕歸心且自寬章頻得解後之陜府謁洪嚴二從事是年閏十二月春幃猶隔閠逆旅苦栖遑忽爾遊分陜飄然出大梁食貧憂桂玉䇿蹇冒風霜杏苑歸期近棠郊去路長幕中逢舊友嵗晚在他鄉雞黍且相對休嗟鬢髮蒼路學士知河中府一麾新自海濱還又佩魚符入故關千里山河臨劇郡九天鴛鷺别通班樓經往聖回清蹕路接邊夷獻白環版籍素多田賦錯干戈初息羽書間從軍上客雕龍藻佐酒妖姬墮馬鬟更遣府公吟思發中條新霽碧孱顔即席賦得筆送宗人大著通判廣州著作蓬山局職司華袞褒已能成馬史何況夢江毫金徑雞搖距霜寒兔墮毛歸來批鳯詔弄翰莫辭勞職方彭員外惟節知韶州仙經舊得還丹訣郎位高分列宿光太守雙旌指南越使君千騎冠東方飲氷清白臨遐俗晝錦輝榮過故鄉曾是重華張樂地九韶聞處味應忘宗人大著令問通判廣州蘭臺大著作族派共關西南海分憂寄東門敘解㩦離城衝臘雪宿館聽晨雞畫鷁江波逺鳴騶嶺路迷陸梅香已盡越鳥暖初啼入境風生扇行春柳拂隄殺青前事在飲水古人齊卧理應多暇無忘寄尺題冬夕與諸公宴集賢梅學士西齋詩有序古者瀟湘之會實重故人西園之遊亦在清夜集賢梅君以神仙之胄處典籍之司佐地官之版圖居多暇日奉穆清之顧問出必危詞國家以西旅弗庭邊烽尚警欲得城郭之要領申命朝廷之俊賢難哉是行公中其選且有密旨未遑戒塗雖飭使者之車已辭會府之政杜門終日端居鮮歡遂用解榻開樽集寮宷于三署割鮮繼燭申宴樂于一時揮麈清談峩冠屢舞杯盤狼籍星漢傾頺因念夫飲酒者未嘗不始于治而卒于亂盍各吟咏以止喧譁于是迭出巨題互探難韻搆思如湧弄翰若飛至于斷章曾未移晷藻繡紛錯金石鏗鏘足以知周南變風誠二難之可繼鄭卿言志豈七子之足多顧子非才獲陪高位形之敘引深所厚顔云耳分得今夕何夕探得雲字今夕知何夕良交會以文燭花寒旋落漏滴逺稀聞酒面輕浮蟻歌喉細遏雲明河光未沒候管氣初分玉笛梅花怨金爐蕙草焚惟愁曙光發搔首歎離羣鄭工部陜西隨軍轉運西鄙欃槍未掃除營平慷慨請行初三軍粒食資心計一月星郵待捷書宣室喜聞延賈誼茂林久嘆滯相如謗言盈篋親曾見反間千金計豈疏遺愛道傍喧竹馬先聲塞外懾穹廬馮唐莫嘆淹郎署博望還欣擁使車隴右行收萬里地關中坐致九年儲牙籌羽檄皆吾事才藝飄飄兩有餘黃從事隨軍買符來赴調負羽去從軍五夜聞邊角三時看陳雲樽前還料敵楯上更樆文手筆人多許須銘竇憲勳聞李四光丞頻遊北園因有懷寄漢相沙隄連甲第石家金谷有名園雍容陌上臨卬騎瀲灩齋中北海樽過閠已驚春色早離城殊少俗塵喧無由一寄南窗傲相望迢迢西掖垣次韻和集賢李學士寒食即事之什九逵初旭滿輜軿寒食東風二月天陌上墊巾誰傲倪江邊解佩自嬋姢新糚幾處登牆見沈醉何人藉草眠豪俠追歡殊未足歸蹄躞蹀夕陽前和集賢李學士千字詩千仞溪何險千倉稻已收出騎千里馬醉典千金裘千年河誕聖千樹橘封侯千鍾不及亂千錢坐上頭妹壻黃補下第歸鄉家君早占無雙譽君即江夏之後鄉薦曾居第一流崑嶺本期爭片玉庖刀誰料失全牛風塵不染梁王苑煙水還依楚客舟應負男兒四方志故園歸去莫淹留黃覺東遊鄉關迢遞數千里場屋蹉跎二十年三獻猶垂卞和泪幾人先著祖生鞭風塵漫索長安米禾黍全荒負郭田關外賢豪遍投分趙囊回日滿金錢葉生歸縉雲出門西望長安笑抱璞來求善價沽惟罄囊裝買羣籍不持刺字謁當塗鱸魚漸熟思歸切羊酪初嘗得味無送子東歸重銷黯我曾三載守仙都慧初道人歸青州養親兼簡知州李太保晏坐禪林度幾秋忽思歸養指營丘遙知北海孔文舉應重江南湯惠休畏日流金征路逺長松偃蓋舊房幽庭闈晨夕供甘外高論彌天不易酬省中當直書懷呈諸同舍太微西掖鳳池邊阿閣凌空瓦起煙綵筆時批尺一詔直廬深在九重天早朝螭陛爐香近晝寢雞人漏唱傳只恐承明難久戀長安桂玉苦相煎王寺丞借西第避暑因有寄贈滕公甲第冠神州晝日青煙瓦上浮南榭薰風偏解愠北階萱草更忘憂朝回門閉人疑病雨過涼生景似秋角枕間眠支體適不知蝴蝶是莊周元道宗下第東遊元氏昆弟子姪五人舉進士舉宗文雅孰能陪須信菰蘆出美才失意不勞悲玉璞投知應得上金臺曉離村店侵殘月晝歇津亭避疾雷東道諸侯多重士融樽處處為君開李四赴歙州分直蓬丘未再期江東去去擁旌麾名通南省郎官籍卷續新安郡政詩好事者編前後太守所賦詩為三卷目之日新安郡政詩見行于世虎觀清風留汗簡鴒原高韻憶吹篪故人别後頻南望想見森森瓊樹枝豫以縉雲進士周啓明長書呈祕閣黃少卿黃頗歎重作詩六韻美之因次韻和酬縉雲江外郡封略古甌中早被唐虞化已傳鄒魯風剖符曾出守解榻值名公失意嗟場藿緘書附塞鴻擲金才少敵泣玉恨還同後夜蓬山宿知君必薦雄史館陳大丞知壽州忽佩魚符下玉京長安廄吏駕車迎淮安舊地餘風物太史新書見姓名弩矢前驅殊覺貴河梁執别豈勝情小山叢桂圖經古白馬驪駒道路榮鵬海三千須擊水隼旟四十且専城長淮月色秋宵好應助詩人思轉清錢大夫赴并州太原西北勤兵處地直雲中控定襄六月出師平玁狁九天選將下文昌車魚辟士應難得詩禮臨戎亦未妨緩急羽書須自草平安烽火鎮相望栁營稟畏將軍令毳幕懷來塞下羌清嘯肯饒劉越石長纓終係左賢王關山萬里邊塵靖亭館三冬朔雪狂笛怨梅花終度曲樽傾竹葉淺飛觴禦寒應覺重裘暖料敵懸憂兩鬢蒼只待今年破敵後徴歸論道坐巖廊次韻和表弟張湜秋霽之什輕颷習習起青蘋宿霧全開霽色新高閣晴曦射疏牖虛堂潤氣徹華茵墊餘巾角曾衝雨黴盡琴徽旋拂塵楚澤潦收湖水白歸舟遙憶洞庭人初秋夜坐明河如練出城隅朱火西流暑氣徂顧兔一輪浮月桂流螢數點入煙蕪迢迢宫漏傳銀箭淅淅天風下白榆岸幘微吟自忘寐披衣間起繞庭梧秋日有懷鄉國長安久客逢搖落不獨悲秋更憶鄉潘嶽二毛行欲變淵明三徑已應荒書裁尺素鴻難託夢繞重湖蝶自狂遊宦十年歸未得塵纓却悔濯滄浪閣門錢舍人知全州家傳吳越賢王後郡壓瀟湘最上遊三殿從來奉宸扆一麾今去典方州蟬吟高桞隋隄暮水漲平湖楚澤秋入境壺漿填候館上官鐃吹夾華輈山川遍歷騷人地宵旰遐方聖主憂應向桑郊停五馬青春太守本風流次韻和章頻下第書懷之什春闈三上敗垂成白雪清吟思轉清修竹園中曾獻賦慈恩塔下未題名禹門燒尾他年事楚客悲秋此日情道在不須憂晚達摶風九萬是前程七夕金壺漏滴正迢迢靈匹相從在此宵月魄嬋娟烏繞樹河流清淺鵲成橋雲輕天上榆花沒風細爐中麝炷飄寂寞堪憐觀津女無眠耿耿望青霄石硯磊磊澗中石成形本一拳墨池遺號古筆陳用功偏筆陳圖以硯水為城池得在燕臺側採從昆岫巔剖非藏趙璧鍊合補媧天偶得他山上來參絳帳前光榮登玉案揮灑助花箋注水蟾蜍滴題詩玳瑁筵如何班定逺發憤便輕捐大理趙寺丞世長知益州華陽縣帝選循良撫逺民由來百里應星辰征西蜀道聞猿苦祖帳西郊落葉頻莫為割雞輕邑宰須教叱馭效忠臣錦城自古繁華地好與風光作主人詠醉劉伶石五斗康成三百杯欹斜星辨側嵬峩玉山頺人語蜩螳沸天形㡩幕開應知是狂藥何不學顔回筆月兔湘筠巧製全何人大手稱如椽禁中鈴索夜批詔閣上藝香晝草玄墨妙三分慙入木華褒一字重編年史官遺直真堪畏千載獨持生殺權孫樵云史官持生殺之權于千百年後夜宴華堂高宴卜良宵賓客當筵半珥貂天轉玉繩星落落風傳銀箭漏迢迢連浮太白須判醉促駕鳴騶又趂朝月落烏啼人散後衣香數日未能銷張兗下第隨桂陽喬監使之湘中建溪曾共聽猿聲十載文場未䇿名流落只因孤劍在窮愁已有二毛生荆州暫去依劉表漢殿無由薦馬卿一路騷人舊山水登臨且莫動歸情庭榴得種從西域移根在帝鄉鮮葩猩染血美味蔗為漿入獻殊諸果敷榮後衆芳丹房高照日緑葉半凋霜釀酒扶南國扶南頓孫國人取石榴汁渟盆中數日成美酒題詩白侍郎白刑部詩云惟有安石榴當軒留寂寞濃陰兼茂實相對度炎涼水部何郎中知鄂州褒博衣冠漢大儒三千奏牘到宸居郎官趣騎歸華省女使焚香伴直廬出守新恩龜顧印趨朝舊路雉隨車便分符竹從鸞掖應有壺漿待隼旟賜對移時親斧扆隨行兼兩載圖書淮南落木搖鞭裡湓浦分風挂席初郡閣平窺漢陽樹盤飱頻薦武昌魚聚徒南郡傳經盛攜妓東山退食餘天闕九重懸夢想江關百戰見丘墟清曹祖德詩人後時寄新吟一起豫可久道人之歙州兼簡知郡李學士獨攜瓶錫新安去寒雨西風落葉頻江水淺深清見底山程高下險摧輪社中香火延開士肘後方書濟俗人鄉樹再尋南國路禪房空鎖帝城塵舊傳心印都忘念自有衣珠豈患貧四衆仰瞻誰見頂千家供應定分身宰官多結空門友外護須依守土臣想到臨川逢內史翻經相對一嚬伸內經有師于嚬伸三昧大理黃丞宗旦使潁州募民墾田詳刑新佐張廷尉出塞曾隨霍冠軍露版裁書頻倚馬甘泉獻賦舊凌雲幾瞻龍衮堯階側暫駕星軺汝水濆百萬提封周制復三千奏牘漢皇聞依蓮幕府遊從近聚米山川向背分回日受釐宣室對又應前席動吾君劉大丞仲宣歸華山坐事削籍詣闕自陳不報早年通籍蒼龍闕近日移家仙掌峯方朔上書殊未報平津開閣杳難逢騷人章句多懷古陶令田園且養慵近郭離筵黃葉滿舊山歸路白雲重洪崖餌术修丹竈叔夜援琴對酒鍾應待軟輪徴入覲受釐前席始從容表弟章廷評得象知邵武軍歸化縣幾年索米住京師新得東堂桂一枝宰邑絃歌循吏政還鄉雞黍故人期于公陰德知終大萬石家風喜不衰毛義動容初捧檄太丘積德舊刋碑得象大父嘗宰兹邑甚有遺愛甘棠二紀民猶愛苦蘗三年吏不欺比並述先正之德桑梓經過身晝錦庭闈扶侍鬢垂絲元方惠化傳遺鐸得象兄得一宰乾化今為鄰境令伯歡心應壽巵得象祖母年八十扶侍之任邦境中分同魯衛政聲相應似塤篪嘗思竹馬從遊日又見風鵬摶擊時執手勉君勤素業歸來更值鳳凰池次韻和李光丞見惠長縧之什貂裘已敝洛陽塵空有陶家漉酒巾雙闕金章奉朝請小齋紗帽養天真久持梵行稱居士猶掌王言作侍臣惠我長縧識君意欲教蓮社伴遺民秋雨有懷李寺丞潤氣先從柱礎知寒宵滴滴助秋悲桐圭繞樹多黃落苔錦緣階更碧滋爽徹衾裯慵就枕涼生箋管欲題詩高陽舊侣相思否此景誰同把酒巵王廷評臻知廬州舒城縣汝陰人潁水生賢自古竒西遊聲價滿京師梁園獻賦天將雪潘縣臨民鬢未絲南浦銷魂分袂處北堂獻壽捧觴時到官卧治成高趣終日清談吏不欺大理徐寺丞元榆知越州諸暨縣子山詞賦動南朝近佐名卿掌玉條治邑還持麈尾柄攜家便泛木蘭橈謝塘春晝偏多思潘鬢秋風苦未凋種秫公田供酩酊彈琴官舍助逍遙去程千里隨賓鴈宿館三更聽落潮聞道臨安有仙穴莫拋印綬採芝苖次韻和錢崇班見寄之什蘋末風輕不動塵承明朝罷見間身從容退食收芝檢迢遞驅車訪玉人酒貰十千那惜醉丹封六一已應真春塘麗句偏相寄傳誦朝來滿縉紳次韻和崇班再寄之什祖禰勤王國史褒傳家自有吕虔刀雄豪結客欺燕俠憀栗悲秋笑楚騷奕世勳名金穴貴出羣風格玉山高詩中敏手兼無敵射落霜雕釣得鰲盛京宰單州武成縣父豫任度支郎中弟元任屯田郎中子男印綬諸侯秩鄒魯閭閻太古風兔苑勝遊拋霰雪琴臺善政繼絲桐征途朔吹貂裘暖祖席清歌蟻酒空令弟嚴君俱應宿時瞻懸象向南宫次韻和并州錢大夫夕次豐州道中見寄漢將從天下妖氛值月殘孤煙戍樓迥密雪戰袍乾向暮三吹角臨風一據鞍邊城賴經略重取地圖看董溫其赴淮南幕工部王尚書知揚州嵗晏梁園密雪飛出關猶憶棄繻時屬鞬正是從軍樂插羽那憂草檄遲陪宴初筵揮玉柄從遊别墅騁金羈府公維揚有別墅焉只應偏啖牛心炙自此聲名漢殿知史館凌職方知廣州曾任嶺南轉運番禺出守重漢殿拜恩初華省郎官宿名山太史書剖符從瑣闥持節上軺車左顧金龜印前驅畫隼旟由來百越地曾督九年儲卉服要荒外棠陰惠愛餘齎裝天子賜封部島夷居羽檄招溪洞壺漿慰里閭國風今已變民瘼到應除江海思歸否蓬丘有直廬十二月十四日大雪就賜近臣宴飲即事向夕同雲布海涯豐年呈瑞在京華相如賦就梁王苑穆滿歌傳阿母家農畝三冬偏積潤朝衣六出旋成花天恩賜宴醉歸處幾里香街覆玉沙章琮赴廣州東莞簿抱璞曾三獻悲秋忽二毛十年嗟不調一命尚徒勞互市通蠻貨公田入海濤貪泉雖酌飲未肯染脂膏文慧大師歸蜀南宗傳法了漢殿賜衣新歸路峩睂雪舊房京洛塵天花飄講席海月照吟身誰結香燈社金門近貴臣大師即西樞給事空門之友也王中庸赴河南鞏縣尉春風祖席引香醪白馬驪駒草色袍官舍前臨兩京道居民半雜五陵豪卑飛碌碌猶棲棘餘地恢恢暫鼓刀捧檄初同昔人喜不應搔首嘆徒勞比部朱員外知東明縣比部以親老上言凡再宰是邑即其故里也宰邑承顔帝澤優春郊數舍躍驊騮絃歌平昔有遺愛桑梓依前訪舊遊鄉里歸時榮晝錦庭闈到日潔晨羞陶潛未省荒三徑班嗣何因樂一丘蘭長謝庭傳賦詠花開潘縣占風流薰爐綾被餘香馥省闥沈沈侍史愁咸平六年二月十八日扈從宸遊因成紀事二十二韻步輦下明光鳴鞘出未央屬車多載酒夾道競焚香雲管飄梅吹霓旌錯鳥章從臣沙苑馬衛士羽林槍玉輅天行健金壺晝漏長光風泛蘭蕙仙露拂旗常宿雨收林薄晨曦豔屋梁閭閻空里巷旄鉞隘康莊託乘奉珍使先驅執戟郎從橋初轉轂憑軾見垂裳暫駐時龍馭前驅戲馬場由來講武事所以服遐荒電影流機石鴉羣發大黃是日御講武臺觀放拋石及發連弩千鈞寧覺重七札豈曾妨卒勇如虓虎人觀若堵牆腰鞬晉元帥扈蹕漢諸王聊用誇邊地還聞讋鬼方回輿百里囿錫宴九霞觴射以騶虞節歌為白雪倡仙山鯨海上御苑斗城旁周鎬歡麀鹿虞韶集鳯凰瑶池春水渌猶誤濯滄浪僕射李公宅觀花燭孫閣相君和鼎貴秦樓愛壻坦牀賢東方千騎還居上南極三星正在天路入桃源花爛漫橋橫銀漢水漪漣乘龍擇對真無比月桂宫中第一仙竇詠從淮陽軍故尚書儀之子名題仙籍廣寒宫負羽從軍意氣雄萬石世家標國史孔璋書檄愈頭風狂翻竹箭春波急滿酌榴花别酒空腰佩吳鈎衣楚製栁堤千里躍青驄亷上人歸天台亷公與祕閣黃少卿相善舊住赤城華頂峯桂巖芝崦白雲重彌天曾共習鑿齒入洛因尋陸士龍寒燭伴吟經臘雪雨花開講過晨鐘浮漚一念歸心起本寺房前見偃松次韻和李寺丞見寄之什時宿齋太一寺丞逺致美膳雲章承詔祀高穹夜聽空歌宿絳宫正怯龜腸終日內忽傳鴈信五城中八珍伊鼎鹽梅味李君相門之後九夏堯厨萐莆風暄暑之辰頗甚馨潔苦恨齋居方慎獨朵頥大嚼與誰同次韻和右巡李端公見寄之什時立夏宿齋太一宫首夏修時祭齋居貴洗心神光浮漢畤薰吹發虞琴偃樹枝成蓋豐碑字有金祕文窺寶籙榮路厭朝簪捉塵思嘉話烹魚得好音回曕柏臺署佳氣九門深大理黃丞宗旦通判潁州曾隨征騎出蕭關又案公田汝水灣南畝萬箱增地利宗旦奉使汝陰募民墾田近千頃西清三刻對天顔一麾通守彤襜貴九棘評刑赤筆間閭里歡迎舊從事隨車雨氣自應還陳小著從易知邵武軍奏牘金門奉帝俞平明鸞省剖銅符北堂送喜應占鵲南國思歸不為鱸嵗月天涯鄉樹老煙波江上客帆孤會稽友壻堪羞死邑令今來負弩驅譯經總持大師致宗之泗上禮塔早傳心印得衣珠不學聲聞證有餘犀柄屢登三殿講琅函新譯五天書蓮華塔上焚香去竹箭波間解纜初隨順世緣無所住經行晏坐自如如歐陽使者監和州軍父以老病出為和州團練副使因上言求侍親乃有是命新剖牙璋出護軍使車歸養指江濆綵衣楚國老萊子白首長安萬石君虎眼波狂征棹急鱸魚鱠美壽杯醺東南極目無氛祲不假橫戈看陳雲胡小著克順知泉州惠安縣兼過南昌别墅平明束簡下蘭臺海縣鳴琴亦滯才厭冒風塵住京洛貪看雪浪架蓬萊楚江歸思鱸魚鱠隋岸離筵竹葉杯通德舊居旌闕在遼東鶴馭少徘徊故蘄州王刑部閣老挽歌五首東觀未絶筆西園俄解龜罷裁青鳳詔重入白雲司流落成三黜聨翩換一麾黃岡與滁上應立去思碑雞省曾三入鰲峰近十旬命書批鳳尾諫疏逆龍鱗按部朱轓逺悲秋素髮新茂陵終不起遺札滿埃塵近署罹官謗清淮綰郡章平生不佞佛晚嵗尚為郎得疾因卑濕為文足感傷才蒙宣室召奄忽歎云亡楚客離騷怨子牟江海心積憂偏損壽多病未妨吟野鳥俄窺舍甘棠己結陰郡中應罷市遺愛在人深奏藁應盈篋藏書復幾車門人誰漬酒天子想投瓜旅櫬關山闊銘旌道路賖趨庭有令子清白自傳家密直任學士知益州玉壘求賢牧金門輟近臣龍荒使傳逺雞省命書新殿柱題名久刀州入夢頻懸魚喧舊政前牧東川叱馭繼芳塵珠履平原客壺漿左蜀人北堂牽遠念南詔撫殊鄰宴榭峩睂雪歌筵濯錦春樂章傳辨士卜肆訪逋民幕府觴無算池塘思有神知誰預交辟空羡吐車茵休沐述懷寄祕閣錢少卿風號電笑雨平階紈素微涼暗入懷晝枕乍成園吏夢晨蔬聊學太常齋名慙引籍通丹地心愧移文刻翠崖大隱金門猶自適日親方朔聽詼諧晏殊奉禮歸寧垂髫婉孌便能文驥子蘭筋迥不羣南國生芻人比玉梁園修竹賦凌雲堵牆看試三公府反哺知干萬乘君賜告歸寧來别我亭臯木葉正紛紛送禪牀與樞密王左丞北祖安禪惟看淨毗耶升座更談空須知密勿萬機外常在瑜伽三昧中分得朝野多歡娛臯壤驚秋氣倉箱有嵗儲梁園從臣頌謝墅富人車休沐新頒詔珍符不絶書天心遊蠖濩民樂在華胥擊壤歡謡洽凝脂密網除行將封岱嶽持槖奉金輿胡馬嘶北風動地陰風徑連雲白草齊聞琴空仰秣踐雪憶歸蹄金埒心寧戀鹽車困欲嘶過關拖匹練渡水惜鄣泥五路鸞旗緩千金碣館迷羇魂重懷土不寐到晨雞金馬茂異紛綸集漢庭求賢詔在竹書青共趨金馬門前路誰識東方是嵗星冬夜香煙鼓絶暝煙深簷近孤缸射宿禽露井銀牀霜氣冷瑣窗珠網月華侵初沈逺籟聞疏漏旋拂流塵撫素琴坐久星河漸傾沒蕭蕭朔吹度平林集賢李金部知潁州汝陰名郡擁朱輪洛宅霜威尚襲人門籍尚通仙禁近書囊才補殿帷新金華入侍知非晚石柱題名又幾春莫戀桑郊停五馬蓬丘几席自生塵海印大師歸永嘉仁煦都城應供幾經秋海國歸心不少留雨雪片帆過北固煙霞丈室寄東甌千燈續焰知無盡一錫隨緣信自由更到石門題雅句碧雲從此掩湯休故樞密宋給事挽歌三首宸遊方扈從移病廢樞機步輦親臨問肩舁遽告歸忽聞號左轂旋見泣中闈城郢遺言切忠魂定有依六龍初展義七聖盡陪遊塞外狼煙起軍中羽檄稠漢帷方借筯莊壑忽沈舟不奈良臣死秦醫亦漫求永辭溫室地長别諫書帷玉恨埋黃壤星愁拆紫薇薤歌偏咽怨袞斂更光輝可恨岑文本遼陽不共歸受詔修書述懷感事三十韻太極垂裳日中原偃革初樓船秋發詠衡石夜程書好問虛前席徴賢走傳車蓬萊侔漢制煨燼訪秦餘紬繹資金匱規模出玉除紛綸開四部祕邃接千廬飫賜雙雞膳親回六尺輿華芝下閶闔白羽擁儲胥望氣成龍虎披文辨魯魚清光無咫尺玄覽亦躊躇羣彥揮鉛筆微生濫石渠嵇康真懶慢謝客本空疏講學情田埆談經腹笥虛月評依許劭文體慕相如雅飲歡娛洽清言鄙吝袪彌旬容出沐終日喜羣居撫己慙鳴玉歸田憶荷鋤池籠養魚鳥章服裹猿狙圜府愁尸祿天閽愧􅗓裾虛名同鄭璞散質類莊樗國士誰知我鄰家或侮豫放懷齊指馬屏息度羲舒寡婦宜憂緯三公亦灌蔬危心惟觳觫直道任籧篨往聖容巢許先儒美寧蘧晨趨歎勞止夕惕念歸歟秦痔疏杯酒顔瓢賴斗儲如諧曲肱卧猶可直鈎漁矯矯龜銜印翩翩隼畫旟一麾終遂志阮籍去騎驢兩宋名賢小集卷三
