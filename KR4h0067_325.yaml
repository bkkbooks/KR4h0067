body:
  text: 兩宋名賢小集巻三百二十五宋陳思編元陳世隆補龍洲集上劉過字改之泰和人自號龍洲道人宋南渡後以詩俠名湖海間陳亮陸游辛棄疾世稱人豪皆折氣岸與之交宰相周必大聞其名欲客之門下不就飲酒放豪如過潤州登多景樓有山外青山樓外景及斗酒彘肩風雨渡江之詞至今傳頌叩閽一書請光宗過宫辭意懇婉聲重一時嘗以書干用事者陳恢復方畧謂中原可一戰而取不聽以是落魄無所遇合晚年欲航海抵崑山友人潘友聞留之尋卒于崑山襄陽歌十年著脚走四方胡不歸來兮襄陽襄陽真是用武國上下吳國天中央銅鞮坊裏弓作市八邑田熟麥當糧一條路入秦隴去落日彷彿見太行風俗沈渾士竒傑嗚嗚酒後歌聲發歌曰人定兮勝天半壁久無閒嵗月買劍傾家貲市馬託生死科舉非不好行都兮萬里人言邊人盡粗材卧龍髙卧不肯來杜甫詩成米芾寫二三子亦英雄哉多景樓醉歌君不見七十二子從夫子儒雅强半魯國士二十八將佐中興英雄多是僰陽人丈夫生有四方志東欲入海西入秦安能齷齪守一隅白頭章句浙與閩醉游太白呼峨岷竒才劍客結楚荆不隨舉子紙上學六韜不學腐儒穿鑿注五經天長路逺何時到側身望兮涕霑巾村墅俗子有錢村亦樂秋田米熟歌牛角三家村墅無官方夜半呼盧笑聲謔尋思我輩不如君平生讀書復苦辛遭逢喪亂未得志長策短藳無由伸不如賣劍買牛去也學此翁村社住只愁夜半月明時得意無人和詩句寄孫竹隠先生隠一作湖竹湖之人英劇縣勇自試三年種桃李遺愛及僮稚咸欲父母之謂我公之子獨有督郵嫌見謂不事事瑕疵催科細欲以三尺治八月羈僦樓半年縻隠市小窓天日晴灑落自胸次抖擻舊塵埃楮札左右置寄傲㸃畫間揮染當游戲人賢世所希嗜好人共貴車馬閙填門載酒日紛至大書及豪放小草亦姿媚斂藏經綸業進此第一義玉板抄歌詩石碑刻圖記人家錦為軸髙壁垂至地襲藏軟工拙臨寫費同異爭如老劉子落魄一狂士半生不讀書頗能㑹其意寒泉驥馬飲平陸蛟龍起得非久憂憤于以發竒氣政使鐘鼎疎自足名一世毛錐久見絶一見尚能喜酒邊袖與詩不譽亦不忌有時奪之去箱篋餘故紙如持將軍誥屢博姑蘇醉答曹元章并序曹元章以謹畏喜義雅為鄉里所重縣官自令佐以來皆敬之疑若取友必慤莊之士乃如某者寔自放于禮法之外元章既不以狂棄之方且粉飾語言以媚無非議我者惜乎相知而未深也唐賀知章逆知開元末年之變託意鑑湖一曲以歸落魄四明自號狂客至相率李白劇譚痛飲呼為謫仙由今觀之豈不甚怪然黄冠錦袍屣棄爵祿與夫炙手權門推而不去者其人品孰賢否孔光張禹皆大儒平日託經自文當王氏墓木未拱之秋相與唯阿無骨鯁臣子氣自劉更生死天下公論之口皆藉而不敢肆鼎祚陸沈繫誰之罪吾觀天下齪齪之士滔滔皆是後世必有好予之狂者則又繫之詩其辭曰先生脩亷隅日日自敬畏老大寄杯酒狂亦非所諱酸鹹雖不同各自有正味切莫對癡人説夢其詞費呈徐直院二首當年今日誤承恩自倚容華託至尊門外游絲難駐目依然青草暗長門猿臂將軍戰不休當年部曲已封侯夜深忽夢燕山月猶幸君王晚更收呈王山父二首疎煙淡淡樹重重畧得西南有路通鍾板不鳴山寺靜閉門人在月明中辦得茅廬我便歸玉堂何處有梅枝嵗寒老樹猶荒寂㑹有臘殘春盡時王農丞舟中危檣髙占飛鵶字京淮兩路傳宣使面如玉盤腰有金見説京淮已無事儒生性命何足憐十年厭聞烽火連一朝悔禍亦不惡且願四海皆安眠贈經長老菜肚老人禪已飽憂人從吏作詩僧客來無處著歡喜一語不曽談葛藤送客剡溪送客山隂路春風馬蹄縱觀神禹穴深去子猷溪嫩草緑于染珍禽嬌已啼去程千萬里步步有雲梯方竹杖鶴骨風前痩龍姿雨後鮮鋒稜四面峻節操一生堅荷蓧行隨適看山倚最便從教方有礙終不效規圓遊古仙巖白蘋風裏步清秋來作靈巖古洞游笑倚飛雲訪仙迹夕陽無語伴人愁辭周益公丞相一曲歸歟浩浩歌世間無地不風波人從貧賤識者少事向艱難省處多紫塞將軍秋佩印玉堂學士夜鳴珂太平宰相不收拾老死山林無奈何謁郭馬帥千金買駿馬百城市蛾眉長安酒家樓揮洒驚人詩天子不得臣公卿氣吞之俯視兒女輩自詭男子竒誰知金陵都五年重來茲黒貂日以敝塵埃鬢成絲故人風雨散知已今為誰郭侯山西英而有熊豹姿巍峩西忠廟喬木人所思垂芳到雲仍大將奕世為兄弟各三衙父子步武隨萬户侯冠軍金印何纍纍雖然平戎策終鬱未得施方今羣雄擾似覺敵運衰強鄰軍其西國歩日以遲疆埸互彼此干戈極猖披盜賊毛蝟起斂民極刀錐父老思漢官壺漿徯王師吾君自神武妙算出籌帷收覽天下才尺寸不可遺機㑹一日來恢復此其時况如郭侯者禮賢正謙卑使之㑹雲龍列城歸指揮安知古中原不使同驅馳過也久淪落狂名諸公知然亦壯心胆志慕効驅馳脱靴奴將軍舉扇障元規有音世不賞詩酒聊自嬉霜風忽無情一夜徹吟肌髙卧百尺樓閉門無晨炊起視匣中劍依舊光陸離有恩或有報一死所不辭代壽韓平原二首衣鉢登庸復舊氊文王尚父趙平原自從慶厯到今日只説開禧初改元朝闢東齋廣東閣夜看南極照南園九霞觴舉先旬浹却領千官壽帝垣際㑹風雲振古難十年袖手且旁觀要令隣敵尊裴度必向東山起謝安一品千齡靈壽杖五公四世進賢冠功成裂地封留了却趂赤松盟未寒聞鶯東風扶日上花枝恰恰幽禽弄暖時百轉忽驚春夢破間闗石上話相思春日即事久客無人問所須小窓翻得逐癡愚黄昏以後酒三盞白日之間飯兩盂穀雨筍茶俱俊美條風菊杞盡甘肥先賢且謂可復踐況是生平山澤癯題潤州多景樓金山焦山相對起挹盡東流大江水一樓坐斷水中央收拾淮南數千里西風把酒閒來愁木葉盡脱人間秋煙塵茫茫路渺渺神京不見雙淚流君不見王勃才名今葢世當時未遇庸人爾琴書落魄豫章城滕王閣中悲帝子又不見李白才思真天然時人未省為謫仙一朝放浪金陵去鳳皇臺上望長安我今四海行將遍東厯蘇杭西漢沔第一江山最上頭天下無人獨登覽樓髙思逺愁緒多樓乎樓乎汝奈何安得李白與王勃名與此樓長突兀挂塔松窩十年南北走東西豪氣崢嶸老不衰快斬妖魔三尺劍朗吟風月五言詩山無福地我焉往神有靈丹世不知却恐松窩知此意一絲挂塔去何疑上袁蘇州三首骨秀如仙孕武夷故教手筆世宗師𨽻分唐漢諸家字句壓陳黄二子詩茂苑雨晴花發處洞庭霜重橘黄時塵埃俗吏那能比一段竒功自可知車馬城中早已忙子城内裏看星郎十州已茂圜扉草一炷初凝畫㦸香銅剖虎符新雨露玉持使節舊風霜明年櫻筍成時候不在烏臺即玉堂欲上姑蘇望虎丘小邦寧有此風流山川形勢今三輔人物英雄古列侯華屋鱗鱗冠葢里畫橋曲曲管絃樓金陵蜀郡俱疎逺除却皇都第一州謁京口張守二首末至諸人各已侯一麾猶此滯徐州誰知安石恐未免欲借寇君何可留遺愛與山同北固平生作計豈東周上方已聽尚書履聲在星辰最上頭危樓年少記登臨老矣重來力不禁風月欲談嫌許事山川不險似人心淡煙衰草鄉闗逺細雨黄花節序深雖有小詩行樂處世無知已為誰吟閒步山徑無人鳥篆沙杖藜閒看摘新茶錦綳委地筍翻籜黄玉滿林松帶花歸畊途窮百無成或許營莵裘依然大槐宫蟻穴夢封侯人生眠飯耳物外亦贅疣科名付諸公老矣我當休梅花五首人間不盡春來意恰則一枝清影疎更得和羮幾時在祇今風月尚新除香意惱人休不得荒林月裏夜相過花應笑客有底急客若不來花奈何凍雲垂垂雪欲落雨澀風慳如此寒分折南枝與君看老夫自要北枝看髙門拂日瓊為樹呼我不來那肯過不知此花有何好寒鄉日月用亡何寂無人語斷回程日落未落孤山横平湖水濶何許去傍竹邊松自好行盱眙行車徐行馬後馳天寒游子來盱眙功名邂逅未可知生平畢竟欲何為既不起草黄金閨又不侍宴白玉墀何不夜投將軍飛勸上征伐同驅馳滄海可鎮山可移男兒志氣當如斯安能生死困毛錐八韻作賦五字詩金牌郎君黄頭兒有眼不忍重見之志大才疎浩無期逢人舉似人笑嬉謂之癡人未必癡喚作竒士何能竒兩宋名賢小集巻三百二十五
