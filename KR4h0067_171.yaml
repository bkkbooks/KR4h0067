body:
  text: 兩宋名賢小集巻一百七十一宋陳思編元陳世隆補椒亭小集康與之字伯可嘉興人建炎中駕駐維揚與之上中興十䇿聲名大振宰相汪黄輩不能用及秦檜當國擢為䑓郎専應制善為樂府時以栁耆卿目之有詞五巻凡中興粉飾治具及慈寜歸養兩宫歡集必假伯可之歌咏嘗與檜對局格天閣下檜戲曰此卒渡河是爾將軍之疥癩伯可應曰今皇御極視公宰相如腹心檜大喜撤碁酣飲而罷檜死與之亦謫五羊名勝志云番禺縣玉虹洞之南曰聚龍岡宋嘉興人康與之流五羊時居此桯史載其在髙宗時與左璫狎適睿思殿有徽宗御畫扇上時持玩流涕璫偶下直竊擕至家而康適來留之燕飲出以示康康紿璫入取肴核輙泚筆書一絶於上即玉輦神遊之句也璫出見之大恐而康已醉無可奈何明日伺間叩頭請死上大怒亟取視之天顔頓霽但一慟而已題徽宗宸翰玉輦宸遊事已空尚餘奎藻繪春風年年花鳥無窮恨盡在蒼梧夕照中遊慧力寺在清江縣天涯芳草盡綠路旁栁絮爭飛啼鳥一聲春晚落花滿地人歸江上濃隂曉未開瘦笻支我上蒼苔春寒前日去已盡今日又從何處來僻居巷僻過從少柴門盡日闗鶯聲常在栁雲影不離山有道難言缺雖貧未厭閒川原煙四暝春思有無間鷺春暗汀洲杜若香風標公子白霓裳碧天片雪忽飛去何處人家水滿塘琵琶夜深琵琶聲似裂一曲霓裳一庭月曲終人影在西階困倚東風步揺折可惜簾幕重重下玉鈎隔簾春在栁梢頭東風著意相料理吹去楊花不自由鶴舒臺白雲深處路﨑嶇鶴去臺空景物殊山展翠屏連紫幕泉分清溜滴明珠道人秪問丹砂井隠客猶尋九節蒲試問葛仙仙去後至今遺蹟事如何招真詞并記自姑蘇出齊門沿而北望山如巨鼇盖常熟縣之虞山也邑去江不及一程陂湖畎澮之積自南至者傾馳㑹於江江河既應則迅瀾倒流二水相制移時而不能去山無竒谷惟荒墟白草醜石散亂陂陀迤邐而西有修竹横林隠見於兩山之間其中為招真菴元祐中道人申氏泰陵徐處士弟子也松林森茂亭宇簡寂如隠君子之居通州道士喻抱元増治之舊名竹林至是更以招真請記於僕乃歌招真之詞以系之曰白鶴巢兮丹井空蓬山杳兮煙霞濛陵谷變兮今古木葉下兮秋風飛仙去兮朝太㣲黄冠野服兮以遊以嬉飡霞臥月兮世不我違與世滌映兮天門可馳蒼龍嘷兮雲漫扉石泉冽兮山芋肥俯仰宇宙兮日月蔽虧靈秀回薄兮野芳呈姿山中之樂兮萬化莫移仙人不來兮隠者曷歸嚴陵懐古建武中興寳運開股肱俱是濟時才漢家鼎祚如磐石此老方圖拂袖來玉虹洞二首睡起踈簾一半開更無人迹過青苔須㬰蒼狗風前變雷雨驅潮出海來滿山一夜風篁響透屋三更月露寒自掩殘書推枕睡江湖秋夢水雲寛兩宋名賢小集巻一百七十一
