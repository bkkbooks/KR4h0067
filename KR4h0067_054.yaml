body:
  text: 兩宋名賢小集卷五十四宋陳思編元陳世隆補公是集四庶幾堂雨夜偃几作短夜摧微月流雲濕太空蕭蕭篩竹雨颯颯舞松風形影明燈裏歡娛隱几中吾衰儻未甚正復夢周公寄聖俞徘徊帝城裏獨詠有所思故人昔别此秋風今若茲流水去不已新鴻來有期寄聲可相及見慰天一涯離京後寄貢甫隱直哉生魄後一日雨中作清川如帶屢回環信宿猶居百里間敢恨淹留同杜渚正憐風雨似梁山月殘虛魄無由共雪映高樓不可攀却怪夢中翻識路化為蝴蝶一飛還壺公祠大樹若人既羽化伊樹亦千年委幹龍蛇蟄此樹枝反下入土中交陰孔翠鮮流光駒過隙浮世海成田信有壺中藥能移物外天真遊邈何許神理直茫然會見遼東鶴悲歌感市鄽壺公所居近市今此樹乃在郊外非漢時城邑也芷亭藉甚離騷後芬芳楚澤濱移根煩老圃比興得佳人秀色誰與玩清香不自珍吾廬故可愛況及物華春鼓角樓宴席周城百雉擁中軍阿閣三階麗白雲燕雀總知依盛德山河相與助雄文此樓府公作自為記輕裘緩帶居多暇旨酒嘉肴客易醺還識魏牟懷北闕正逢長日扇南薰奉天門觀流水流水回環縈雉堞亂山蒼翠擁層樓會將緑蟻消長日幸有高風送麥秋鼓角落日孤城閉高風暮角愁邊聲亂歸馬物色向清秋尚有單于怨仍傳出塞憂時平翻感激不語看層樓臨波亭緑楊芳草舊無蹊竹塢花源敵剡溪水影時翻高檻動天形略抱郡城低逢迎野興鷗雙下點綴春愁鶯亂啼宿雨楚山雲正滿高樓莫上使人迷春晚芳菲不少住白日定空長庭樹暗新緑春衣生晚涼悠悠向時節細細倒壺觴誰使風前絮來參醉後狂府公説牡丹盛開是日逼晚竟不及觀落日含明豔輕風襲暖香傳聞亂人意想見弄春光醉裏嵗空晏愁中夜未央異時驚麗絶秉燭正難忘夏日上府公紅芳過盡緑陰多索寞無如長日何午影遲留成藴暑薰風飄蕩作清和夢餘欲驗松生腹碁罷真如斧爛柯還想高吟酬美景訟庭岑寂長青莎府公有詩云高吟酬永晝痛飲嘆華年故及之寄襄陽舅氏龍圖虎符龍節鎮方州天祿先生尚黑頭南紀山川殊壯觀高陽賓客故風流沈碑幾處書遺愛非土他時更倚樓想咏五君誇屢薦為憑三鳥寄綢繆登東城樓時與李支使棋高樓望不極野興逺相隨宇宙一長嘯山川多所思薄寒才勝酒短景不禁碁俯仰哀羣動遼遼見爾為開竹下小徑招君章翠竹先無數蕭蕭一徑新陰繁催短日地僻斷飛塵磐石能容客幽禽不避人君能爛漫醉當及七賢真瑞竹雙幹同本因以瑞名聳節偶相望雪霜終不迷應將古人比孤竹有夷齊偃師驛觀先帝所植兩松及錢丞相壁記華封耆舊望車塵故以青松祝聖人雲去帝鄉桑變海舊枝重疊長龍鱗寄題歙州流杯池公子愛客意高山流水間清波無斷續翠斚自回還野興四時得棠陰終日間何當竹林賞醉耳聽潺潺涼夜疏雨洗明月清風生晚涼動搖星辰影泛淡河漢光螢變覺草腐蟲吟知境荒端憂易遽感不眠疑夜長墨竹羇遊念此君子墨慰幽人灑落不經思篬筤如出塵交加月下影濃淡霧中筠試作吳山想蕭蕭意亦真秋雨采蕭逼嵗晚飛雨度高雲暝色空窗見秋聲墜葉聞過雲低似滅逺岫望如分蟋蟀悲闕織輕絲競欲棼小孤山驚波觸南崖反怒射北壁蒼山相與排所謂小孤石蟠根萬仞淵聳角百丈碧祠堂豁精嚴行旅進粉澤或云婦女神肸蠁頗有迹吾知定名意似欲旌介特流俗失其真傳聞莫開釋居人私其利禍福妄損益競為媢妒説以誣聰明德先王秩山川禮典有廟食奈何媚于竈屈已忘正直吾欲為小孤作書解行客復恐不見從嗟哉世多惑雜詩效玉川體毁巢鳳不至竭澤龍不遊賢者有所歸得非龍鳳儔周公下白屋聖德被九州趙禹謝賓客漢朝以為優澆淳不相襲用舍何其繆苟徇一身利不為萬姓謀哀彼枤杜詩死生遺道周示張直溫築山必使高鑿井必使深百工戒淺近盛德羞浮沉焉有尺寸枝能棲垂天禽焉有升斗泉能容橫江鱘借兹喻物理足以開君心隘在容不足弱在力不任大道如路然固無古與今西楚楚割淮西自不輕元王賓客亦洪生重捐醴酒延高士末路翻亡五十城袁本初橫刀長揖紫庭中健者寧須屬董公郿塢然臍真假手始知天下有英雄周節推移曹州此君凡换五幕府珠履幕中客棲棲亦倦遊勞歌一長鋏歷聘五諸侯捧檄為親喜問津輕旅愁誰憐在陳士無友重悲秋澄心堂讀許渾以下諸詩許渾死後三百年長嘯空堂覽舊篇落日孤城曾不改曲池高榭復依然塵埃暫憩道路客文雅相追今昔賢魚躍鳥飛殊有意卜居仍欲近湖邊送楊景修祕郊歸武陵曾孫塵外仙手攜桂枝歸故山夸鄉始信一經是衣錦不須三組還蓬萊觀盡聊復爾枳棘棲鸞殊未然野人放蕩辱先進慙愧竹林諸阮間懷陳州舊居所種桐寄黃翁忽憶南軒樹春風空復來陳亡韶已矣孔老鳳悠哉不作溝中斷應隨爨下灰舊居阡陌並君到為徘徊月夜月出浮雲盡風生中夜清星辰競搖動河漢湛虛明老樹稀疏影驚禽斷續聲秋懷先已亂蟋蟀更宵征荷華水國非人境芙蕖五月秋亂香清宿醉濃豔破征愁魚戲都堪數鷗飛絶自由會須窮一賞詰曲任扁舟七月二日西風進庭樹天氣颯然秋山雨才成潤高雲淡不流平分感一葉遠興憶扁舟蟋蟀何須急羈人始欲留戲和同年時在薦福寺逃暑涓涓灑開襟細細風過雲催急雨落日淡秋空樹影經行熟泉聲笑語通少年興不淺寧與老人同送王子直還斤溝薄薄雲蔽日凄凄寒中人飛飛燕歸蟄漠漠鴈來賓送子獨無友悲秋空病身登山復臨水便覺二毛新重到謝氏園亭寄裴博士俊叔王主簿宗傑時裴往淮南王詣京師徘徊逺林下幽草為誰芳前日同遊客今朝俱異鄉東風雖淡蕩陳迹似凄涼何用江千里春心故易傷泥雨早朝雲氣卷舒東復西月華明晦曉兼迷正憐盛服坐假寐何處蒼蠅來誤雞高卧山林勞夢想出門冠帶混塗泥人間氣味故易厭豈若從容歸治畦送隱直辟青州幕府全齊七十城表海寄名卿開府馳羔鴈除書得俊英借籌心感激憑軾氣縱橫浩蕩軍中樂從容稷下生士由知已用祿以及親榮送别羞長鋏能無歸去聲和章伯鎮南上湘潭誰記初北還宣室受釐餘共憐賈傅才無敵真作揚雄老著書調笑羣騶飢欲死去來千騎樂何如洞庭木下鱸魚熟三歎新詩重起豫寄劉景烈前寄新詩未寄答移高陽關部署漢設重關斥塞垣詔移飛將護秋屯胡人無復窺南牧燕客時應祭北門清酒肥羊宴長日輕車精騎獵平原少年真得軍中樂沉復詩書盛討論賀司馬君實河濟川得龎公炭上府愛才天下聞兩君素出將軍門欲正大爐慰民望預排寒氣作春溫不煩束緼資遊説聊取優賢報國恩自笑野人卧窮巷負暄方擬獻天閽獨宿直舍談笑從容宫漏稀高軒去盡掩重扉風含玉宇霜威徑月墮窗疏燭影微周衛相望喧夕警爐香不斷護朝衣塵軀更作仙山峻旅夢端從江海歸送同年王殿丞知鄞縣同日大梁客共登青雲梯逢時方躍馬從政暫驅雞萬水會東海千巖開剡溪逺遊極壯觀肯為簿書迷奉同鄰幾詠雪侵旦滿城雪從天萬里風陰沈朝日變慘淡宿雲同徑渡胡沙逺羣飛海上空崩騰兼上下眩晃失西東帝所銀為闕河濱貝作宫瑶林高不及璧水濶無窮巨麗神仙境精微造化工霏花爭爛漫噴霧極溟濛掃灑埃塵豁包含物象充牛衣愁病客鶴髮似衰翁侵冒貂愈黑憑凌火似紅厲威深刻轢正色坦昭融妬舞多珍闕迷羣有斷鴻陽微怯頻復陰老恣驕雄蔀屋貧奢等輝窗書夜通嵗華驚朔易古老識年豐占賦慙賓右聞歌慕郢中間門徒自喜乘興力難崇再和鄰幾沍寒調暮節大雪冒神州氣象昏千里光芒混六幽渡前蚊過日隕曠葉驚秋煙素長誰引雲羅薄自浮勢輕低更起影亂去還留土石均仁覆珠璣共暗投圍城明組練格野亂旗旒模象羣形富牢籠衆險周履空諳曳縰騁望快登樓棲璧含珍帶裝簾耀寶鈎潤應河澤此甘豈井泉侔萬物紛同態繁陰慘共愁波聲增渤澥原色借來牟邀醉時闕雨欺貧屢灑裘驅除夏蟲盡排迮楚闕收人謝泥塗辱家成汗漫遊畫圖饒粉堊比興極歌謳積久風逾厲消遲嵗聿遒短材非子敵祕思為君抽高韻侵梁郢煩言不可酬直舍竹下殘雪二首阿閣三階敵井幹宫牆十仞逼雲端故留殘雪侵春事欲侔孤篁老嵗寒重疊空階委玉塵蕭疏碧篠凍浮筠地寒自稱孤高節不共陽林競早春送鼂殿丞僉判鄭州世德緇衣美天倫玉樹溫於君如舊識贈子欲奚言東里賢能宅成臯戰伐源從容訪耆舊遺迹尚多存送洛南周寺丞不知商洛道空慕紫芝歌從事老將至送君情獨多雙鳬尚方去駟馬故鄉過想見揮絃樂春風初扇和送邵武張學士待詔頻穿履承明厭直廬一麾從此去千騎上頭居嵗事畬田早風謡鴂舌餘班春急乘傳知不為鱸魚雨中北軒晚寢樹色禽聲相與間吾廬仍共一枝安浮雲蔽日綿綿雨積水嬰城慘慘寒還恐百芳從此歇不知后土幾時乾閉關高枕交遊絶一夢江湖意緒寬戲作仙家千載亦何長人世空驚日月忙洞裏桃花莫相笑劉郎今是老劉郎文章落筆有誰先坐上詩成海外傳明日帝京應紙貴開簾却扇有新編兩宋名賢小集卷五十四
