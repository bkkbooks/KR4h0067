body:
  text: 兩宋名賢小集卷三百三宋陳思編元陳世隆補秋江煙草張君彥發湖海豪士不喜為舉子學専意于詩每以賈島姚合為法所著僅成帙清深間雅宛有唐人風致至其得意警絶之句雜之兩人集內殆未易辨彥發思甚苦未嘗茍下一字每有所作必鎔鍊數日乃定揆其用力蓋倍於江西之學人必從事於此而後知其難且工彥發舊名奕字韓伯世為孟之河陽人嘉定戊寅仲冬八日古晉丁焴晦夫書寄趙紫芝獨遊非一事書札故應遲江上逢春日湖邊憶醉時有雲為我伴終日誦君詩百鳥鳴花樹聲聲在逺思得山中友人書近得山中信山中頗寂寥酒方收秫釀薪旋割茅燒破屋秋多雨平湖暗有潮不曽逢客至默坐過清霄春晚萬事吾今飛絮輕此身如燕又巢成暗思庾信家邊竹緑籜新添有幾莖夏日從陳宗之偶書偶成自從春去後少省出柴扉樹暗鴉巢隱簷空燕迹稀憶山憐有夢當暑詠無依案上書堆滿多應借得歸楚州落帆停鼓鸛湖頭兩度因循到楚州栁下人家嘗識面笑求新句寫粧樓江樓飲客鄰家貰酒尊斟酌共王孫老菜羮遲熟凍油燈屢昏夜寒人罷市坐久僕敲門隔岸歌明月月明江水渾遊蔣山練布作方袍因間偶出遨秋風城郭淨寒色樹林髙鹿守禪關老僧修佛殿勞再來思久住人世事如毛送蔡監丞赴髙郵城古似盤盂榮分刺史符夏新看藕葉夜久見蠙珠吏過朱方接山從邵伯無文遊遺迹在民俗易相爭送杜晦之兄弟歸閩秋來猶苦熱歸去莫貪程官寫新銜位詩傳舊姓名幾家村酒賤一路澗泉清想到鄉閭日爭看兩弟兄簡周宗聖曠野有芳芷近江無早鶯春詩定多少旬日又清明樹暗憐楊栁花開認橘橙相尋每乖阻夢裡亦愁生暮春日日雨霏霏開門無所知漫尋花發處已過絮飛時替紙蠶生遍修巢燕立危但催人老去羞作送春詩遊長干留寄聰公僧去尋芳草客來看落花就齋槃乞米借水鼎煎茶日炙春無色風吹天有沙欲回成再住此意問林鴉舟次湖口追憶任眀府重來又十年山水故悽然獨雁仍為侣雙鳬已作仙濁流分蜀派青色聚淮煙石上罾魚者猶言縣令賢慈母磯莫嫌舟逆上子細得看山衆草名難識孤花影自間避人鴈翅響經雨石文斑夜久江風冷神仙定往還寄别顔伯竒情深袂怕分豈不欲辭君轉柁方乘曉思山已隔雲菊當前路見鴈在半江聞把盞秋才好遙憐白鷺羣送宋謙父之清江因簡希亮吟詩夕陽裏相送上瀟灘前路逢梅處同誰倚棹看嵗窮風力緊江濶雁聲寒持此呈蘇季人生識面難髙郵送紫芝重逢又重别把盞更悽然明日帆開岸平湖水接天好詩應自作音佐狂夢與誰圎我欲來相趂揚州且住船逢王元任寂寞淮南道憑君獨記余始知元住此久悔不通書暮嶽留同眺寒房與借居共懷京邑燕已是二年餘李景文移居能詩留幕府借宅近南湖吏去少公事客來多釣徒雪為今夜雨梅發去年枝我爾同州住相過路不迂元日厯以寅為正風從艮位來桃符當壁寫竹户趂鐘開宿雨滋初茁長年老不材滿庭青柏葉惆悵獨持杯送胡道士歸康廬避世懷孤往為庵近五巒出無人作伴歸有寉相看老石苔衣淨深山瀑布寒自言猶養母應未得燒丹豫章别紫芝吟苦事俱廢拙深貧未除年來如旅燕秋至即移居古道行黃葉空囊貯素書一生江海恨惟子最知余子山寺迢遞前朝寺經過遂一遊白雲鴉樹曉黃葉鳳臺秋僧舉開山話人消在世愁殿廊經劫火已費十年修送郭道士之江州看盡山南景忽思山北逰屐過雲亦動琴罷月空留世上無非熱林間一似秋雖然乍相識别去也能愁彭蠡阻風寄城中故人欲行行未得纍日滯孤舟月照山皆近風吹水倒流地名人不識秋景客相愁憶爾惟成夢遙知獨倚樓留滯蕭條十日餘留滯别人居借史抄陳作黏碑學草書煙清數村曉月落一潭虛吾自欵秋色那堪樹木疏送翁十赴舉今年科詔下頗亦動山情丹竈留雲守書裝冒熱行卜知三命勝業賸一經明倘赴瓊林晏能詩舊有聲再送盛君之升州君與余皆懶余如君更貧今年再同夏兩鬢獨非春去棹孤山浪征衫西府塵似聞仍用武為算立功人再送丕父弟行兄出送有約共憑闌草木雨初過江湖路轉難同懷年各長重别酒無歡明日雙鐘下蒼崖應獨看移菊秋風籬落逺晨起自移栽稍覺微根損須遲數日開最清人愛重乍見蝶疑猜昔有陶元亮因兹歸去來贈沈莊可卷上芳名舊所知見君還恨識君遲數莖短髮沾霜白一葉扁舟觸浪危問遍菊名因作譜畫將蘭本要求詩向南郡邑多經過楚士能狂更有誰寄蘇希亮因何也識間名字遂托交遊索近詩想像獨吟應更苦分明此意似相知空林日短歸鴉早逺水寒多雁到遲安得爾來同度嵗傳聞畫筆最清竒送徐和卿之上饒江樹雜丹青江寒少得情亦知君去路多是水為程銜位猶書嶽遊從半作卿如逢二泉子因説野人名章泉澗泉皆居信山行偶作山行只杖藜歸逢寒日下山時與僧並立看紅樹忽有寉來栖樹枝送人歸南康我來方與廬山别爾去廬山是故鄉前日住山渾不覺如今山逺却思量舒州嵗暮窮冬日日愛天晴古寺門開絶送迎野鶴忽來橋上立小僧獨向水邊行過寒梅樹白全少入臘草芽青漸生又是舒州一年了怕看新厯動鄉情廣教寺即二喬故宅英雄居處終竒特幾度欲來今始能騎省文髙存古篆喬公樹朽長寒藤清流併繞三分澗翠竹相依住數僧沙鳥詎知千載恨日斜飛下立漁罾遊禪林寺寺置蕭梁曽識少今朝蘚磴始經過天低日落江湖逺煙冷風清竹樹多蟲引翠禽行壞屋馬驚白犬吠懸蘿一僧九十形容古巖下逢余忽浩歌漢東郡齋夕坐廬山鮮夏洪山去自到山邊葉已飄鴻雁影多憐塞近交朋書少覺身遙屢逰騎慣將軍馬不飲還封道士瓢心憶清吟更岑寂玉京誰與話寒宵遊智門寺寺即隋文帝故宅一間瓦屋荒山裏山路縈回夕照明祇有比邱頭雪白旋收經卷出相迎傳聞此地有龍飛佛殿殘磚刻鳳螭事去千年無問處寂寥衰草卧苔碑晝坐出門無所往獨自坐胡牀雨濯殘梅盡風吹百草長近邊人喜戰偶病客傳方不奈春愁密思君對酒觴兩宋名賢小集卷三百三
