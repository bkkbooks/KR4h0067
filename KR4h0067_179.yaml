body:
  text: 兩宋名賢小集巻一百七十九宋陳思編元陳世隆補香山詩集喻良能字叔竒義烏人與兄良倚同入太學同年登進士第初補廣徳府三獲强盜應賞格辭不受累遷國子監主簿進忠義傳起戰國王蠋終五代孫晟通一百九十人書凡二十巻乞頒之武學授之將帥孝宗嘉歎顧謂侍臣曰喻良能質實平正御書其名於屏間丁内艱服除以國子博士召兼工部郎官除太常丞兼舊職請外知處州尋奉祠歸以朝請大夫義烏縣開國男食邑三百户致仕營家圃曰磬湖日以觴咏自娛終焉鄉人慕之立石表其地曰郎官里所著有諸經講義香山集家帚編忠義傳兄良倚字伯壽卒官臨海丞有惠政所著唐論四巻詩文十巻策斷二巻文選補一巻悲夏畦悲夏畦南畆苖未長東臯草巳齊旋令嫗婦辦餉饁獨引丁男耘稗稊悲夏畦炎天炙背如爇雞渴來不得飲清溪寜知水榭氷山裏猶自頻嫌日未西媿陶淵明在彭澤到罷八十日雖營三徑資未穫公田秫珍重千金腰不為督郵折拂衣賦歸來何異自投劾我生本樗散山林允蟠蟄雖非淵明儔頗亦慕幽逸偶然得一第遂竊升斗秩未書藍田考已捧錦溪檄荒縣饒逋負催科費鞭抶强顔簿領間忽復彌數月心焉愧淵明俛首三歎息番江何時還哦松聊自適秋曉野步幽居邇郊原出户日己瞭閒擕一枝竹散步及秋曉寒烟引輕素澹澹縈木杪矯首矚層穹轉盼失飛鳥野潦淨荒陂驚飇泛枯篠世態徒營營此心殊了了佳處誰與論聊用付清醥題東林寺江湖大蘭若廬阜一東林砌繞琮琤水門羅翠碧岑煙雲千古色松檜四時隂岸幘銷塵慮凭䦨淨客心殿成神運力泉出虎跑音溪在思元亮堂荒憶醉吟圖傳三笑粲閣擁五杉森貝葉應難訪經臺已莫尋僧袈何代朽佛影㡬時沉晉輦黄埃久殷碑蒼蘚深不妨閒弔古誰復為沾襟香火惟蓮社傳流直到今書大洞僧壁招提閟林麓魚鼓白雲邊地僻疑無路山深别有天幽花充佛供好鳥伴僧禪何日征鞍暇還來借榻眠三月二十四日再到永裕陵扁舟投曉出重城春浪初肥緑滿汀竹裏㡬聲泥滑滑河邊千里草青青人家艾葉驚飛燕水面楊花入翠萍漸近昭陵佳氣集五雲松栢喜重經沿檄舟行五雲門畵舫朱簾曉出闗便風飛過㡬重灣路經僧舍漁村畔身在煙霏霧靄間驚浪沸晴輸逺浦亂雲施粉露崇山偶因王事從心賞詩句匆匆不暇刪遊下巗過松峭祠旁偃松因賦長句誰將秋色替雲峰萬里炎歊一洗空細雨復青池上草西風頓白鬢邊蓬聊同吾輩一作黨二三子來訪山中十八公更待夜深乗月到要看香霧共𠖇濛次韻伯壽兄見寄伯壽即名良倚江國踈梅吐玉英故園想見木欣榮二年鴻鴈碧雲濶千里江湖春水生苒苒池塘應入夢瀟瀟風雨若為情行看戲綵青萱發凖擬芳樽相對傾輦下言懐馬蹄重踏帝京塵七載江湖飽問津白髪有人疑甲子清齋無日不庚申不才詎敢誣明主厚禄那能羡故人乞得泮宫閩粤去未妨閒處著吾身題淵明祠堂宅邊雖有五栁樹歸去巳荒三徑園平生胸中羞五斗偶爾城市羡華軒盈樽濁酒自可漉得趣古琴那用絃欲知耿耿忠憤意甲子斷自永初年題歸宗寺寺因逸少曽為宅峰自秦王巳得名不獨山南稱㝡古故應江左號尤清路趨綘闕山梁嶮奩隠金輪石鏡明誰信塵埃倦遊客秋風還許杖藜行題開先寺二首少年魂夢到廬山今日身㳺鬢巳斑聊復揮毫吟紫翠未妨拄頰對孱顔遥看飛瀑三千丈近去責天咫尺間不為白雲頻屬意應留此地不知還壯觀端宜冠九州未應萬壑敢爭流盡將銀漢為懸瀑一洗紅塵變凛秋白雨亷纎飛迥野玉龍夭矯下靈湫廬山處處雖竒絶不到開先未是游鵞湖寺二首石鉛山縣舊名仁壽院以鵞湖山得今名長松夾道揺蒼煙十里絶似靈隠前不見素鵞青嶂裏空餘碧水白雲邊氛埃乍脱三千界瀟灑疑通十九泉五月人間正炎熱清涼一覺北窗眠水鳥飛來一問津璧宫珠塔便横塵疑是陳開基古佛留遺像直日竒峰列衆賔芋火擁殘知永夜霜鐘逓起響初晨川途渺𣺌驅塵駕回首林泉媿野人題齊山翠㣲亭山深雲氣多撥雲尋徑入但覺襟袖寒不知濃翠濕亦好園四詠亦好亭亦好茅亭小登臨意緒長清流依檻曲明月逐簷方磬湖未用他山錯寜須泗水浮衝風時激浪清韻亂鳴球釣磯不為貪赬鯉還應愛碧流風來花落餌雲破月沉鈎菊徑小徑三秋好西風百本黄但令頻泛酒日日是重陽秋日有懐仲文季直二弟㣲雲初月澹層城絡緯聲連促織清北鴈不來千里信西風還起故園情兩宋名賢小集巻一百七十九
