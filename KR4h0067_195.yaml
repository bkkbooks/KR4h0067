body:
  text: 兩宋名賢小集卷一百九十五宋陳思編元陳世隆補盧溪逸藁王庭圭字民瞻安福人貢太學時方禁士人説詩庭圭吟咏自若政和間進士調茶陵丞忤部使者遂拂衣歸潭帥留之不得嘗著論極言招安大盜之害洪帥李丞相綱竒其説未及用而去胡編修銓忤檜謫嶺表親交無敢通問庭圭獨往送以詩而語峻驚人有歐陽安永者上飛語告之檜怒令帥臣鞫坐以謗訕流夜郎夜郎帥長囚視之檜死許自便孝宗初召對詔曰粹然耆儒凛有真節除國子主簿不留乾道間召對又不留踰年又召對內殿蠲拜跪禮賜坐勞問庭圭固乞歸詔曰年九十而行義益固除直敷文閣所著有盧溪集易解六經講義論語講義庭圭學無不通尤邃於易先時獄興郡守議收公掾汪涓奮曰王君剛介一紙書招之必至他掾變色自請提禁卒捕之至則突入公家公談笑就逮家四壁立惟易解鐍篋中卒疑其貨也挈以去他日公嘆曰天厄吾書夜歸西園獨步清夜遊西園竹影亂秋月穹色湛虛明林光益竒絶人間睡方濃那知此時節坐觀象緯移領略風煙别沆瀣洗天宇一飲醒毛髮氣與南山髙青蒼助施設池塘收緑淨星斗轉空濶微雲點太清須臾亦自滅明朝問此境勝處不可説却恐雞三號開門走車轍遊貢遊洞竄身楚西極幽竒頗窮歷况此古道旁橫天竦蒼壁何年始開鑿工如鬼鑱刻飛空數百丈突出如鯨額那知風雨時雲雷非窟宅事迹墮渺茫探討失圖籍豈無髙世士於此煉金液不能久徘徊上馬空嘆息江亭侯施倅醇翁阻水漲作詩寄之夜雨漲溪碧天明望歸舟飛帆出木杪浩蕩兀中流洪崖仙人姿謂落滄海遊興盡却回棹待此霖潦收抱琴出竹迎倒披翠雲裘風濤正可久煙波生暮愁送謝夢叟昆仲之湘江蠟屐訪窮巷脂車戴曉星哦詩添些語望嶽插清冥烽火連蠻徼樓船壯洞庭瀟湘多夜雨羡爾對牀聽送客東門楊栁陌車騎散林垌草緑古今道馬嘶長短亭人歸天北闕使動斗南星送客何年了春蘋又滿汀春日遊鴿湖山風起羣木末花開兩壁香山深雲影變人靜鳥聲長紺殿橫崖起飛泉噴玉光扣門僧出定彈指下禪牀一作溪上送行裝送劉禹錫之官五羊南海千山外東風幾驛催嶺頭梅雨歇旗尾瘴煙開蠻徼無塵起中原有使來時應問消息會向日邊回郭教授南窗置酒觀競渡次坐客劉時舉韻一飲徑一石此風誰敢陪日移林影轉船劈浪紋開銀燭自相映玉山何用推廣文官獨冷賴此酒盈杯仙人春宴曲髙樓玉珮搖春風銀槽壓雨珍珠紅天留曉月十分魄飛光下照仙人宫瑶姬半醉撾鼉鼓綵鳳吹笙黃鶴舞雙成翠袖織藕絲麻姑行厨劈麟脯金盤燒蠟夜未央從妃進果蟠桃香坐上花開人未老他日重來花更好三千年後忽相逢再約羣仙醉蓬島觀駱元直經進江南形勢圖異時漢網踈天討健兒馬囓江南草石頭重戍豈無兵將軍不識丹陽道至今戰骨埋秋霜傷心不忍問耆老龍蟠虎踞昔何雄赤壁濡須在眼中潯陽江水射蛟處旌旗拂天來向東艨艟塞川不敢下昔人曽此破曹公橫江九道波翻屋試請輕兵渡淮曲夜入長安人不知應見畫圖心已熟他日將軍按此圖鼓行而西如破竹和劉美中尚書聽寶月彈桃源春曉何年鑿源開混茫桃花兩片吹紅香煙消逺浦生微陽漁舟誤行溪水長溪回岸轉山隙光疑有絳闕仙人房居民爭出羅酒漿花間笑語音琅琅抱琴釋子眉髮蒼響泉韻磬鳴長廊能談往事悲孟嘗昔時臺沼今耕桑又如勇士赴敵場坐令遊子思故鄉清猿抱木號鴻荒孤吟劃見丹鳳翔曲終待月西南廂重調十指初不忙如見古畫秦衣裳春天百鳥爭頡頏桃源歸來今已忘彈到落花空斷腸題羅疇老家明妃辭漢圖明妃辭漢出宫門豐容靚飾朝至尊至尊左右皆動色明妃欲語復吞咽三千蛾眉塞天閽帝獨不識王昭君顧影徘徊復良久尚冀君王一回首當時自倚絶世姿不將賂結毛延壽可憐朱網畫香車却來逺嫁呼韓邪不如歸州舊村女三幅羅裙兩髻丫陌上花開大堤暖細雨春風歸緩緩寧從禁籞落風沙長路漫漫碧雲斷忽看漢月臨氊裘淚濕彈絲錦臂鞲龍眠會作無聲句寫得當時一段愁送李亭仲赴荆南辟少年膽氣橫秋煙腰間櫑具森龍泉出門萬里探虎穴錦帶雕鞍明積雪洞庭木葉飛霜風將軍秉旄西擊戎旌旗戈甲照湖海欃槍欲滅髦頭空須君磨盾作露布插羽來奏明光宫麗人行讀大業拾遺作桃葉山前宫漏遲宫人傍輦持花枝君王喜慿絳仙立殿腳爭畫雙長眉欲把琵琶彈出塞結綺臨春時事改井邊忽見張麗華忍聽後庭歌一再早行羣雞鼓翼天欲光井上梧桐生微涼殘星爛爛或出沒初日淡淡開青蒼楚妃臺邊曉雲碧伏波廟前秋草黃騷人辛苦拾何物沅有芷兮今已香和韻胡敦實少年行酒酣坐待東方髙臂鷹走逐城南豪彎弓射殺白額虎醉騎歸馬雪花毛日暮黃雲動天色易水迷魂招不得莫學并州遊俠兒徒費黃金飾韉勒題劉端禮步芳橋橋上畫欄低壓水青龍影落芙蕖底欲渡芙蕖望翠微波面紅雲映屐齒洛浦清流古有神羅襪凌波生暗塵東昏戲作錦地茵金蓮襯步如花人而今此事墮渺莽但有荷花開蕩漾試穿茫屩踏風煙安用紫絲連步障送向豐之君家梁苑妙人物羯末封胡咸勃窣子今二十能綴文詩如陳馬雄馳突此去荆湖道路長要吟秋水動三湘歸時焦葉應黃落賸拾騷人春草香過劉美中新居亂碧峰頭水拍堤白沙寒竹淨柴扉晨光破霧千山出絶壁盤雲一鴈飛忩外煙霞舒錦綺坐中談笑落珠璣江邊野老逢人説待看追鋒入翠微缺題湘水清如碧玉環湘妃淚染竹痕斑此時遊宦非髙志何日抱琴歸故山鴈塔共題雙闕際馬蹄同下五雲間今朝憔悴荆湖外却望煙霄歎未還别葛德裕主簿官冷身間簿領稀時從物外赴襟期慿君少緩青絲鞚為我聊傾碧玉巵野寺石泉秋煮茗松窗雪屋夜論詩懸知别後東風近先寄寒梅第一枝和葛德裕别後用舊韻見寄渝川咫尺杳如期雞黍猶堪敕婦炊旋滴銀槽將進酒細傾金屈倒垂巵間為洛下諸生詠突過黃初數子詩阿吉想能騎竹馬鳳雛低映碧梧枝阿吉德裕子也次韻江正邦盧溪春水欲平堤滿徑蓬蒿竹掩扉齋館靜無塵土雜盤飱喜有藥苖肥君尋甘露峰前住人似山隂雪夜歸江海未應終寂寞鶴書將下釣璜磯正邦聞王師來駐辭歸禾山次韻以别潘才如海渺無堤肯顧衡茅竹裏扉間釣一溪春水緑尚容三寸白魚肥忽傳銅虎天邊下共探􅌐珠夜半歸此去煙塵猶未靜何時馬迹破苔磯送李成叔歸峽江兼簡蕭懋德平生未見嵇中散野鶴軒昻識季昆江表今無耆舊在中郎尚有典刑存螺川汗炙書千卷玉澗船歸酒一樽獨羡氷清蕭處士通家能入李膺門春日橫山堂有懷謝直夫用前韻解道澄江元有聲東山出處更關情髙吟正憶西堂夢妙語仍逢春草生沙尾斷篷垂釣逺峯頭晚日落船明不將車騎驚猿鶴巖谷猶傳此段清次韻黃元授見訪中興人物起紛紛應有竒才合致君仰視孰為真漢相夜行何識故將軍且騎駿馬天邊路莫話髙樓日暮雲年少功名方入手勒移休動北山文次韻胡觀光長慶寺早起曉天樓殿倚空虛尚見星辰落落踈鵲動髙林人起後馬嘶殘月客行初偶來作尉聊驅盜豈謂論功得謗書但使一方無犬吠即看黃紙下新除和曹溫如都監惠詩兩腳虛隨匹馬塵江湖嵗晚始謀身籬邊日醉陶元亮窗外夜呼祁孔賔倒著敝衣迎好客急搜竒句發陽春阿瞞豈但能橫槊文采風流世有人二月二日出郊日頭欲出未出時霧失江城兩腳微天忽作晴山卷幔雲猶含態石披衣煙村南北黃鸝語麥隴髙低紫燕飛誰似田家知此樂呼兒吹笛跨牛歸和劉端禮避地初歸見訪庭前喜鵲亂棲鴉知有鄰翁酒易賖老瓦盆隨田舍飲半溪雲入野人家莫將棘手迎西日來倚危欄詠落霞無奈醉歸燈火亂僕夫爭路向江沙和裴主簿九日欲上髙髙嶺路微踈林蔽日尚堪依楓江水冷天初靜桐井桑乾葉亂飛籬下採花人獨秀山頭落帽客何稀金壺倒盡重沽酒莫惜朝來更典衣次韻楊廷秀求近詩聞説學詩如學仙怪求詩思渺無邊自憐獨裹癡人骨豈意妄得麻姑鞭曽是千軍初入陳清于三峽夜流泉只今老鈍無新語楓落吳江恐誤傳楊文發自長沙相别忽來權邑惠詩次其韻公來權邑官妓逃亡略盡湘水東邊喚渡舟湘天欲暮使人愁豈期陶令來為縣應念龎公不入州索我題詩今老矣看君下筆幾時休論文把酒誠堪樂莫嘆樽前欠狄秋和劉喬卿雪詩紫極真人吹簫雪降則止柴門忽啓玉為關疑是新移海上山野寺僧居銀窟裏廣寒宫在月明間老農擊鼓迎豐嵗紫極吹簫近帝寰臘後東風將解凍已看峰頂露孱顔中夜起坐惜春亭月照酴醿清香郁然因成四韻袖手歸來避世塵酴醿坐對惜餘春靚粧不入市㕓眼幽韻只應丘壑人醉喚江梅君益友力移亭竹我比鄰天公著意憐詩客月色西窗一夜新謁魏彥成郎中病夫投老入城闉到處逢人説使君豈料騎驢衝大尹正須扛鼎識竒文池生春草何曽夢楓落吳江誤所聞更願兼收湖海士當今冀北馬空羣王主簿清暑閣褦襶趨程作熱官何如避暑得清安輕隂畫出三湘境爽氣能為六月寒自有薰風生屋角不須纎手捧氷盤欄干半倚紅塵外卧聽江聲瀉碧湍次韻常德府葛倅見寄武陵旌節控湘西通守仍兼把一麾玉帳靜談千里月銅符遙鎮五溪夷漂流欲識荆州面飢渴正如桑下兒仰止門牆訴羈旅窮愁那復有佳詞贈李子安窮居未有四立壁負郭兼無二頃田擬斸雲根結茅屋不知誰贈買山錢和鄭元清同遊殷仲堪讀書臺晉國衣冠掃地空漁歌長在水雲中倚欄欲問興亡事木末琉璃墜曉風次韻劉惠直梅花雪壓寒梢玉作容嶺頭相見又東風人間欲問春消息半在竹橋溪影中夜郎歸日答葛令惠詩七載投荒萬里餘交遊半作曉星踈門前梅栁換新葉忽得故人相問書贈寫真胡生誤著儒衣到骨窮兒童拍手笑衰翁釣魚艇子今無恙置我五湖煙雨中謁僧惠端不遇僧扉深倚碧巖隈何處看雲久未回日暮鳴鐘應不語嗔人馬迹涴蒼苔和答邦直惠愛如蘭正吐芽芳風吹落幾千家明年催直金鑾殿龍口飄香看百花和劉元弼見招玉壺沽酒挈青絲及取春風花發時便把一樽留客醉莫教紅雨洗殘枝步芳園密栽桃李礙車輪栁下風微不動塵已辦尋春蠟雙屐飛花滿地草如茵茉莉花纎雲抹盡日西流人在瑶池宴未休王母欲歸春滿路曉風吹下玉搔頭兩宋名賢小集卷一百九十五
