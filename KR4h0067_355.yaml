body:
  text: 兩宋名賢小集卷三百五十五宋陳思編元陳世隆補石堂集陳普字尚德閩之寧德人為恂齋韓氏門人韓出於慶元輔氏蓋考亭的派也宋亡後三辟為本省教授不起有石堂集擬古秋聲金氣流天空露瀼瀼素波合流月淫淫滿庭霜遙夜一美人寒閨自倣徨暗塵集凌波輕飈感鳴璫天性賦貞清動止中矩方世無夔夔子窈窕空英皇抱璞如臨淵日入不下堂時操㺯玉簫空中來鳯皇嵗月如流星髮變面欲黃服玉固雪膚絶意百兩將秋夜永如年四壁號寒蛩明月照樹葉白露啼青桐寒窗紫玉琴時變羽凌宫三彈不成調百憂鬱攻中東方有樂國開闢先柏皇鸞鳯為雞鶩麒麟為犬羊晨霞作朝食太和為酒漿土無干戈禍人各千年長下視禹九州有土皆戰場白日虎狼行青天蛟龍翔我欲為逺遊滄澥渺無梁何年夸娥氏移置天中央同根一株草時命嗟異遇風月芳香合兩地隔周楚爾生麟趾家朝夕沐玉露我在雲夢林百草相蒙妒白璧終不緇煢煢亦良苦和友人韻兒童恨芳草不識春長在簞瓢日晏如焉知顔樂改黃鶴雅入聽鶗鴂亦可罪混沌何曽死拱璧莫輕碎野馬恣流行逰絲無罣礙緬懷良友心不言默相對願為蛩駏交共話螻蟻戴望雲我愛山中雲杳藹起無迹晴風吹緑樹天節日巳尺悠揚幾片雲出岫度絶壁斂作蒼狗形舒為鵾鵬翼朝抹峨嵋青暮蘸滄海碧江南與江北蕩蕩恣所適何如雲中仙避囂隱幽寂採藥雲下林礪劒雲上石乘雲騎茅龍倚雲吹鐵笛我欲往從之飄然不可測壬辰日蝕憶昔度宗皇帝時十年十三日蝕之似道屭贔湖海曲天子宫庭耽樂嬉滿朝翕翕皆婦人禍來照鏡方畫眉北軍順流日食既兩國正爾爭雄雌興亡豈必皆有數百年以來士氣衰文臣髀肉不識馬武士驚魄怕見旗憑欄髙豁乾坤眼山晴緑雨收夕陽流水繞荒草白雲浮栁蔭小溪側樵歌古渡頭憑虛發清嘯安得仲宣樓德陽林梅麓太守挽章殷士皆周祼南音獨楚冠寢車人更怒負俎我為安義合雍容就名應久逺看梅花真鐵石耐得許多寒野燒雜沓平原起電紅慿陵勢欲逼青峰草茅不問新開甲蟄户尤憐乍啓封何暇胤侯分玉石略如伯益逐蛇龍際天逸德無人問獨倚髙樓到曉鐘懷古世事悠悠一轉頭斷雲荒草古今愁青山北去南河隔白日西飛東水流秦有金牛開劒閣楚無熊虎割鴻溝多情蕭寺峰前月幾夜蛩聲影半樓答友人雲作交逰山作賓道心為主自安貧柴門無鑰見同物竹帛有名終纍人緑水一潭澄靜性青山萬疊裹間身紛紛望拜馬蹄下不見胸中萬斛塵贈清叟行共君一夜話三生語正投機君又行溪栁效顰添别恨岸花和意送離程驚時莫問歸巢燕贈别愁聞求友鶯今夜夢中重聚首雞聲茅店巳三更秋日即事夜牀輾轉恨明遲曉髮梳寒倚竹扉樹影紙忩風作色蛩聲壁罅月流輝三杯緑酒窮年客滿篋紅塵隔嵗衣遙想白鷗江上路蓼花楓葉雨霏霏玉露金莖曉髮寒秋風仍作去年看蛩聲疏雨長為客雁影殘暉獨倚闌鐵硯窗櫺雲影淡丹楓溪曲水痕乾西風曽與黃花約擬掇繁英貰酒餐二尺書檠對影居西風吹雪上吟鬚雲邊月色人千里竹裏秋聲酒一壺客思邇來紅葉亂雁聲南去白雲孤季鷹自是知機者一念蓴鱸便到吳書餘飲水枕長肱四壁蛩聲訴不平月色滿窗詩骨冷露華方枕夢魂清西風嵗嵗長堤栁流水朝朝滄海情紅葉山深無雁過殘砧幾處搗愁聲逰絲閃閃挂虛簷翔集號寒華嶽尖白髮東來間點易烏衣歸去寂鈎簾三千客路飛楓葉四五人家賣酒簾魚笛水寒江上晚荒叢豆葉雨纎纎鼓瑟滿樓明月調雲和五十絃中急雨過彩鳯拂衣鳴翠竹素鱗鼓鬛出寒波淒涼楚客新愁斷清切湘靈舊怨多一曲更沉人已靜江頭雲挂緑嵯峨朱絃聲奏徹雲清有客沉吟倚柱聽遺響一時存楚曲斷魂千載寫湘靈珠隨明月生滄海船挾風波過洞庭絃索無言膠柱倒遙遙江上數峯青溪莊疇昔何來此青山與白鷗絮飛春不去潮返月頻留野步十首南雁數聲嘹唳西風雙鬢䰐鬖病葉夕陽滿樹斷雲殘雨歸岩瀟灑枯藤老履行行只復行行泥路野人屐迹石橋流水琴聲黃犢眼中荒草鷺鷥立處枯荷宦海風濤舟楫故山煙雨松蘿愁思冥鴻杳杳吟情敗葉紛紛歸去滿身溪雨醉眠半枕山雲白日長繩難繫青簾濁酒堪賒歸鶴蒼山雲際故人錦字天涯紅葉林風颯颯蒼苔徑雨班班人迹石邊流水樵歌鳥外青山流水數株殘栁西風兩岸蘆花荒草客愁逺道夕陽牛帶歸鴉按步緩尋幽草揚眉一望平林鳥影漁磯日暮豆花村屋秋深幾處漁樵石路數家雞犬柴門竈屋殘煙杳靄溪流淡月黃昏木葉西風古道稻花北壠新田流水美人何處夕陽荒草連天自哂曽騎白鶴上揚州頭上花枝秉燭逰尊酒邇來誰是伴白雲收盡數峯秋鬭雞走馬醉髙陽今日歸來兩鬢霜無限少年心上事半簾豆雨語寒螿古樹間雲獨抱琴琴聲寂靜樹雲深相如渴死文君老辜負題橋萬里心世事悠悠酒幾杯晴窗把鏡獨徘徊西風吹老梧桐樹仍送新霜兩鬢來寬博麻衣折角巾疏慵不是少年身白雲半枕山中午猶夢乘槎去問津邵武泰寧途間一路海棠萬騎連接出襄國諸姨撩亂上驪山道人不識紅粧面何事扶筇過此山歸鳥紫山青嶂盡如家負日衝煙復帶霞今古乾坤秋一幅幾畨歸鳥與棲鴉七夕但把凡身小品論寧須扣額問星辰女郎戀别淚如雨遑把金針度與人四皓長樂巵前露雪眉岩花亂笑出山時有人拍手瓜田裏來往青門總不知李廣李陵茂陵無奈太倉陳槐里家傳本助秦萬落千村荆杞滿隴西桃李亦成薪賈生落日長沙被鵩驚愁來強把死生輕洛陽才子多流涕太息沾襟過一生武帝商車不足算緡來桑孔咸陽悲茂才一撮茂陵無覔處建章門户至今開幾多愛子出蕭關山積缺沙骨未還好把望思臺上淚隨風北去灑隂山五十餘年四海波建元三載盡征和中央寸土才無血沃日澆天瓠子河荀彧亂離揀得一枝棲得道爭知却是迷曹操若逢諸葛亮暮年當作漢征西河濟泰山猶是漢匆匆把作賊關中久知天下無劉氏不料人間有孔融北地王諶何物譙周口似簧幾年漢帝手牽羊紛紛蜀土祀諸葛香火曽分北地王晉武帝杳杳羊車轉掖庭夕陽亭上北風腥紛紛羔羯趨河洛為見深宫竹葉青梁武帝戒捨工夫老未圓百雙雞子送殘年一生般若成何事贏得江頭載荻船以詩就葉洞春求畫蒲萄洞春豪傑士妙筆出瑰竒寫就大宛根可怪不可披此畫豈易得此手難再攜敢將有聲畫博君無聲詩贈葉洞春畫蒲萄引蔓牽藤寸管頭探驪剔蚌出風流三千龍女拋珠佩一箇儒生擁碧油莫是前生封即墨便堪作酒博涼州齊奴倘會清妍意免得紅裙逐翠樓兩宋名賢小集卷三百五十五
