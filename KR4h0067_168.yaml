body:
  text: 兩宋名賢小集巻一百六十八宋陳思編元陳世隆補梅谿詩集八銅陵阻風江入銅陵縣舟藏蘆葦間郵亭危壓浦佛屋陋依山月出烏將繞風高鴈欲還江山不貧處一覽見塵寰山有富覽亭離宣城天色陰晦望羣山不見樞公和詩見寄復用前韻聖恩猶未許投閒遙訪蘋洲栁與顔羿婦解將風送月麻姑莫遣雨遮山心游孤嶼題詩處名玷元樞薦墨間汪薦九人時某與焉旦夕公歸首台鼎高齋遺躅儻容攀讀喻叔奇游廬山詩前年我亦到廬山杖屨煙霞縹緲間萬里東歸如倦鳥不知飛過只知還路經湓浦歎怱怱不及從君訪逺公忽見廬山真面目在君二十一詩中十月晦日㑹凌季文沈徳和二尚書劉汝一大諫于六客堂夢寐思賢願與齊一麾來守浙江西星躔舊識尚書履凌為吏侍時某為司封郎玉府曽親太一藜劉為校書郎某忝同舍天遣門生依坐主某補戴公試解試皆沈主文心隨峽水注苕溪邦人異日談遺事名姓應同六客題晦日㑹于六客堂者十二人湖山清絶多佳士暇日壺觴得共攜堂上合成前後客詩中分得建除題不容閏位㕘卿月坐覺巫山在霅溪麟閣功名屬公輩老夫惟願把鋤犂寄當塗呉給事明可鄉校當年與薦蘋簫臺氣象自公新老成猶滯甘泉槖晚進叨乘刺史輪陸凱寄梅情愈重謝公夢草句尤神何時更作龍門客共話樽前見在身勞農峴山乘興㳺何山同行宋子飛沈虞卿霍從周范文質去秋游道場俯仰何山路林泉雖在眼未暇飛杖屨塵埃泊城市遙望隔煙霧春光忽已半播穀催農務欲作卞山行偶逢風伯怒肩輿出城南乘興訪幽趣山藏佛屋深迹躡陳朝故老松不記年修竹莫知數鳥鳴説法池花落在禪處書空何公堂木拱安定墓青山看未足回首日已暮小溪何處是歸誦謫仙句登清風樓呈通判宋子飛苕霅水㑹處樓高風快哉洲中白蘋動天半故人來穆入周臣頌雄勝楚客臺飄飄玉川子乘興上蓬萊時某得祠子飛攝郡事酌别是樓子飛亦將美解故章末及之蕭家渡渡頭問舟子此渡何名蕭舟子笑答我使君家匪遙豈不聞侍郎名徳重本朝屢為二千石兩至萬里橋渡旁乃其宅人亡木惟喬隂徳滿鄉閭嘉話傳漁樵江水流有盡姓名磨不消近同池號謝逺類江稱姚赧顔謝舟子講聞非一朝恨生晚且賤無繇際清標坡公不識范韓子思之僑敬瞻道徳門魂往不可招過蔡端明故居懐章南過蔡公鄉駐馬遙瞻數仞牆丹荔株株經品藻喬松葉葉惠清涼四賢詩出人増氣三諫章成國有光真是濟川三昧手清源游戲作虹梁送赴省諸子國朝人物盛温陵秋賦呦呦鹿食萍人倍平原門下士三十八人文聨韓愈榜中名丹墀何止三千字雲翼行看九萬程勸駕龍鍾老太守籃輿凖擬出郊迎諸公廷對甫邇復用前韻清源紫帽發英靈萬斛詞源水注溟遙想恩袍動草色定知喜氣徹天庭名高虎榜唐文傑人半雲臺漢列星累月笞兒㡬翁嫗夜深燈火督窮經提舶欲移厨過雲榭示詩次韻雨中前日過蘇端又欲移厨就稍寛古榭有風聊可共衰顔得酒定須丹謫仙醉後句尤勁東野老來詩更寒記取洛中真率㑹他年要作畫圖看贈第二人石察判起宗䇿冠諸儒已奏聞不妨居次避平津坐看萬石門闌大居萬石坊轉覺朋山氣象新黄巻更窮稽古力青雲莫負致君身試觀忠獻堂中像亦是當時第二人韓魏公生於泉南州宅故未有祠於典為闕郡圃有庵名大隱即之以祠八月戊子率同僚祀之天開我宋太平基紫府真人下應期河朔魁梧出真相泉南䓤鬱産奇兒夢符蚌腹生珠夜亊應台躔捧日時紫帽清源發光彩郡園深處立新祠陳提刑永仲以清名室志先徳也詩以美之名孝則龎公嘗有言我獨遺以清賢者於子孫所遺良不輕潁川老龍公落落前朝英帝命作南伯清徳如廣平宸翰一字褒不啻華袞榮是以自賢孫持節蜚英聲結廬桐城隅室以清為名仰不忝厥祖俯能規後生我來聚星地喜見此老成公清不自言藹然著卿評時焉訪其室鄙吝不敢萌如覿任棠水似濯滄浪纓願移清室風于以清寰瀛乞祠不允三十韻微臣守清源一嵗三乞祠俞音竟未拜感荷聖主慈臣家素賤貧仰禄救啼饑區區六年間手把四郡麾道途厭奔走囊槖無餘貲清源乃佳郡風俗不待移民淳簡獄訟士盛敦書詩地逺可藏拙禄厚足自資今嵗又豐登千里人熙熙臣豈不願仕求閒欲奚為自憐螻蟻生福薄命最奇入境身即病到官日呼醫痰􅂒每上交旋暈勢甚危藥試何止百灼艾無全肌臂疼如子美齒落如退之脚患栁州腫髪垂孟郊絲飲食日減少跬步須扶持殘喘雖尚延定非久逺期況臣糟糠妻葢棺將及朞旅櫬猶未還兒女晝夜悲臣今官滿考臣去有二宜孰謂九重逺天高而聴卑吾君不之告肝膽將誰披廟堂二三公誤辱平日知今不憐向隅恩復何時施願於黼扆前敷奏迫切詞天日臨在上臣言非敢欺解官食祠禄曲遂臣之私幽明俱受賜感極涕泗垂溝壑儻未填報國猶有時薛士昭寄新柑分贈知宗提舶知宗有詩次韻書後誰題字鄉人逺寄柑薦新思起孝知味戒生貪羅帕分猶未金門獻正堪命名聊别偽温柑號真柑在果獨稱甘他果非無甘者惟柑子以甘得名言最甘也白雪初盈樹黄金忽滿籃霜天欣始熟茅舍飽相諳客重開須請兒癡食更婪栁詩吟不厭謝賦讀常耽若蜜萍難比如拳栗有慙公家安定法想見日酣酣知宗柑詩用韻頗險予既和之復取所未用之韻續賦一首三十韻書閲揚州貢功觀禹化覃香苞分橘柚秋色動江潭李徳裕橘賦動江潭之秋色破暑花凝雪凌寒葉染藍金衣愛日照唐宰相賀柑子表云緑蔕含烟金衣爛日珠實碧波涵栁子厚詩何人摘實見垂珠未上諸侯記曽聞四皓談顔歡陸績母業世李衡男送客愈吟桂韓退之送桂州嚴大夫詩云家自種黄柑記時坡詠儋東坡作儋耳詩一年好處君須記正是橙黄橘緑時洞庭夸浙右温郡冠江南節物清霜重家山緑蔕含青黄出籬落朱緑耀林嵐栁子厚詩密林耀朱緑坡詩竹籬茅舍出青黄昔貢千金顆遙馳萬里函宣政間温州貢柑毎顆有一二千新宜薦寢廟香可供瞿曇䕫子那能比羅浮未許參予往在䕫府食黄柑味頗佳然不及温柑逺甚去冬至泉州始食羅浮柑又逺不及䕫子何人傳黄陸端類列非耼在品寧為四季直方第果實名柑子第四蒙恩或賜三李徳裕賦序上賜宰臣等朱橘各三枚鄉情寄初熟旅況憶幽探嘉拜親開盒珍藏淨洗甔甔瓦器也新柑貯以瓦器則久而不爛行將解印綬歸種當田蠶根向横陽覔温柑以平陽縣泥山為最泥尋斥鹵擔種柑宜鹹地荒蕪耘徑草封植伴溪楠不用千頭富聊資一餉湛茅齋闢杜甫仙井汲蘇耽神仙蘇耽鑿井種橘佳境妙餐蔗閒庭勝蒔苷苷甘草也醫家謂之國老栁子厚詩蒔藥閒庭延國老鴈行三峽荔奴視四明蚶欲繼花為譜歐公作牡丹譜應同栁駐驂歐公栁詩攀條莫惜駐征鞍禦偷籬著棘愁涷灌添泔泔米汁也鄉人冬月用以灌柑掩映青雲葉光華碧玉篸釀成浮甕蟻蒸辟蠧書蟫甘橘花蒸以為香可辟衣書之蠧䕶蔕期存乳柑欲致逺必以蠟塗其蔕留皮欲去痰皮能下氣醫家用以治痰恨無親可遺松慘白巖庵重修北樓十一月望日與郡僚同登因書十二韻我昔未作南諸侯雄文嘗閲龍虎歐泉山風物得大畧夢寐先已登兹樓到官正要訪遺迹忽見破屋城牆陬欲修不敢遽土木經嵗此志方能酬貢闈之餘材可辦農事之隙工乃鳩月逢建子飛破鏡酒呼從事來青州忽忽未暇衆賔集草草且與同僚游山川城郭壯哉郡清源紫帽明雙眸却驚雲榭在地底坐見日轂經簷頭西山端可柱頰視南海未用乘桴浮東瞻歸路興元亮北望魏闕心子牟揮毫欲續仲宣賦假日聊以銷吾憂諸公和詩復用前韻敧眠聴詩韓喜侯鋒難與爭劔鑄歐鈐齋淺陋無處著掛在縹緲之飛樓兹樓久欠詩酒味天遣我輩來遐陬塵埃聊用文字洗瓦礫遂獲瓊瑤酬賔朋未嘗合開燕老病欲登宜杖鳩清風酌别記霅水湖州有清風樓制勝領客思䕫州䕫州有制勝樓一江明月楚東醉饒州有鄱陽樓楚東閣范文正公詩云一江明月夜歸遲全家終日蓬萊游㑹稽有蓬萊閣予為幕客嘗挈家以游元微之詩云全家終日在樓臺南來不謂有此境四顧亦足窮吾眸朝看日出閩海嶠夜望斗插泉山頭端如虢郡風月送退之虢州北樓詩不比巴岳乾坤浮登臨懐古甫白適賦詠聨珠産鞏牟私心竊慕范文正後天下樂先其憂題徐致政菊坡圖名夀仁字子由南方有高士仁義偃王裔家山闢幽坡手取香草蓺秋至有黄華采采滿衣袂客來酒盈尊詩出語驚世無心學淵明偶與淵明契靜者年自長頽齡不須制高懐恥獨樂地逺人罕詣丹青寫佳境有目皆可睨吾家鮮鮮徑荒蕪屢經嵗儒冠誤此身掛之公得計石筍橋刺桐為城石為筍萬壑西來流不盡黄龍窟宅占中流呼吸風濤勢湍緊怒潮拍岸鳴霹靂淫潦滔天沒畦畛行人欲渡無翼飛魚腹蛟蜒吁可閔二三大士為時出目覩狂瀾心不忍小試閒居濟川手逺水孤舟冦忠愍亦有山僧願力深僧文繪等董其役解使邦人指倉囷五丁挽石投浩𣺌萬指硺山登􅀈嶙辛勤填海效精衛突兀横空飛海蜃趾牢千尺鮫人室䕶以兩旁獅子楯南通百粤比三呉擔負輿肩走騋牝論功不減商舟楫遺利宜書漢平凖莫將風月比揚州二十四橋真蠢蠢我時出郊春雨後鷺㸃沙汀颺鷹隼江亭矯首獨遐觀有客南來盃共引是日迓龔實之少憩江亭欲詠河梁擬蘇李頗類鑑湖逢元稹江山不逢賢太守袖手沈吟覺才窘況無鐵筆擬端明徒使時人笑蚯蚓繡衣屢約吾來游未遂堪嗟徳星隕鄉來嘗以記屬我固避勞辭慙不敏傳聞江欲飛棟初異論紛紛互矛盾世無剛者橋豈成名與萬安同不冺諸公餞别分韻得人字清源古名郡守土宜擇人何為不才者兩載乘朱輪政拙嵗多旱民愁眉日顰賴兹仁厚俗容我老病身乞祠竟不允易郡俄得鄰雅懐上冢願偶有還鄉因賓僚共呼酒肴䔩嘉且新展餞選士場語離庚伏辰清風屢吹衣暑雨微灑塵驪駒沸盈門雉鵡飛入脣我亦重惜别不辭勸酬頻諸君如神魚行奮六六鱗學士倍登瀛郡符同治秦我如倦蜚鳥野性難籠馴舊巢尋故山一枝老荆榛官居類郵傳誰能久相親但願各勉力相期作純臣贈陳體仁我來守清源徳星識二陳大陳如金玉一室清無塵厭世不肯留至今里稱仁儒先賀州守才氣超等倫胷中包古今筆下真有神唾手取甲科齒髪方青春聲名滿天下文字驚縉紳勞人暫州縣平步當要津蹉跎忽至今此志猶未伸真人奉香火蕭寺含悲辛講席延諸生黄巻訶古人異端斥佛老吾道鳴孟荀聊藉束脩禮少資囊槖貧我忝二千石二年牧斯民不能助玉川恥與韓公均贈我詩與文字字皆可珍寵褒恨太過感激難具論願公少自愛行矣當致身門下有高第廟堂手經綸房魏方得君詎肯忘河汾兩宋名賢小集巻一百六十八
