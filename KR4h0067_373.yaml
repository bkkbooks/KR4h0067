body:
  text: 兩宋名賢小集卷三百七十三宋陳思編元陳世隆補怡雲軒詩集姚孝錫字仲純豐縣人政和四年登進士調代州兵曹元兵入鴈門州將議以城降官屬投死無所孝錫卧牀大鼾略不為意旋以疾去官時年二十九家五臺善治生亭榭竹木奄有遊觀之勝賔客日盈其門州境歲飢出家所藏粟以賑貧乏鄉人德之中年後以家事付諸子放情山水詩酒娛樂自號曰醉軒年八十三乃終間居無客訪衰殘柴門盡日關耽書真是癖惜酒近成慳苔徑行搜句茅簷卧看山却嫌明鏡裏偏照鬢毛斑次韻秋興老畏年光速愁添旅夢多西風著梧竹歸思入煙波夜永慿詩遣顔衰得酒和故溪千樹栁誰復曬魚蓑謁滕茂實祠本朝蘇鄭共揚鑣不意芝蘭失後凋遺老祗今猶涕淚後生無復識風標西陘雁度霜前塞滹水樵爭日暮橋追想平生英偉魄凌雲一嘆豈能招次韻王無兢見寄客懷重寄仲宣樓白草黃雲塞上秋山色不隨塵世改水聲還抱故城流隙中畏境都堪玩鏡裏衰顔祗自羞多愧詩人苦相憶逺傳佳句弔清愁感白髮彈鋏慿誰聽客歌震雷那復化魚梭梳頭白雪驚新有障眼玄花比舊多鄉問阻兵猶隔絶羇懷慿酒暫消磨不須更問今朝客門外原無雀可羅溪橋早春輕黃未染栁梢勻連日溪風捲塞塵乍暖乍寒花信晚相呼相喚鳥聲頻少勤漫挾經綸策老懶空餘病患身追憶故園桃李樹年年紅紫為誰新登樓有懷老愧慿欄目力昏百年懷抱向誰論晴空雁起雲邊塞夕照人歸郭外村因憶昔逰驚迅晷暫將離恨付清樽誰人肯似邊居士逺駕朱輪過雀門歲晚懷舍弟少易成歡老易傷壯遊垂白未還鄉煙塵無復音書到魂夢猶疲道路長爆竹又驚新薦歲屠蘇空憶舊傳觴年年此日遙相憶鴻雁何時續斷腸題栁溪别墅雨霽風和不動塵栁邊擕酒賞晴春頻來溪鳥渾相識度水穿花不避人兩宋名賢小集卷三百七十三
