body:
  text: 兩宋名賢小集巻二百三十二宋陳思編元陳世隆補安晩堂詩集鄭清之冬節忤寒約客黙坐爇品字柴作五禽戲體中差小佳園丁以矮梅至如見東郭順子使人之意也稍欣然呵皸手凍筆占數語呈劉菊坡傳一笑少日愛花螽趯趯老去凍蠶已休織水村山郭一枝曉忽到窗前三歎息年年雪裏自作春揺手東皇不相識衣冠古岸綺季至介胄嶙峋亞夫色從來魏證真嫵媚要是廣平終鐵石月香水影兒女語千古詩腸描不得笑馮與可幻竹君相對無言面深墨再和雪毛舞風學喓趯凍落天孫碎雲織玉肌不粟彭祖方戲挾竒芬笑安息生憎萬花肯同調嗤㸃壽陽聊半識結根不向青桂宮絶交月姊無難色誰能柔此老强項朝暮隆隆轉媧石春風為媒嬾結子來訪苔痕娯夢得人間要覔爾許清語渠肉食乃無墨又滕六附暄墮寒力六花未辦天機織蘺菊老盡蘭始芽凌波仙子方踵息水邉亭亭逢玉人照眼縞衣如舊識氷霜相與厲貞操蝶蜂那能犯莊色聽渠吹笛作商聲正音滿地出金石菊坡為索孤山詩好句新從坐中得二君聨壁如長城笑整雲梯再攻墨牡丹嬌春醉無力艶紫妖紅錦城織鹿解銜花空誤唐楚以姬歸竟亡息何如野外挺孤操照水淵然有深識昻昻雪鬢顔眞卿何物女子稱國色主張繁華勿復言如對鴈門二千石語君欲識梅花面好向雲巖訪拾得語君欲作梅花詩磨盡蓮經大千墨菊坡筆挽千鈞力剪就氷綃出鮫織謫仙笑作揚州詩鵬賦消揺六月息市門聊學子眞隐下坐還從季野識清標自是孤山姿㜮眡唐家六宮色芒端琢句貌疎影竹邉着渠牛礪石枝横帶雪最佳處近水清寒月先得語梅政可兄涪翁凍雨浯溪打碑墨謝鄭廣文和韻春工漚絲呈功力紅日如梭萬花織愛花蕩子不愛命效死驪姬似荀息草木揺落天地閉賢哉梅也衆不識靈根九轉列仙品千古離騷作書色漲晴癡暖動山意攀翻健倒蒼苔石髙標底須雪後見清芬每向閒中得花前失喜廣文詩柿葉書成㸃新墨廣文出新意得梅之全花實根葉譜入秀句輒效反騷一章東風不借半分力老樹絲窠罥寒織虚枝生白獨也正夜氣歸根吹以息箇中灑灑無一塵無眼界至無意識居然暗發定慧香不取諸相了空色若與此花論相好是人如以木鎖石我嘗聞之老瞿曇無有少法為可得我詩當以無耳聽索梅一笑付繩墨再和青藜不解支脚力機杼微聞隔隣織暗香來處窮幽棲蹇驢﨑嶇牛喘息山中欲訪隐君子等閒未許李邕識同盟頗笑五大夫晚節汙秦有慙色摩挲寒玉古苔蘚從渠喚作荆山石雪中索隐非行怪自是花間着不得直須謫仙蘇二來溪藤快掃如鵶墨雪意賈寒欺酒力思婦嬾學廻文織屏山未合篆痕銷笑倩南枝陪燕息氷紈絳闕入纎手素臉殷拊未真識兒癡認作春風面剛道杏花欠顔色香浮紫帳夢欲醒影到窗紗月移石為梅着語將無同左袒孤山未為得呉都誇麗逸此士十年浪費老傖墨呉都賦桃松竹而不及梅和趙静樂梅韻伊祁作春私帝力司花女課千機織月四十五以為功化工何當停半息老梅偃蹇傲衆芳一錢輕視程不識和羮肯為媚竈計望林秪笑欲炙色莓苔被服當文繡氷雪定交過金石静樂先生大雅韻始信清名不虚得政須草聖傳新篇安得張顛首濡墨司寒駕天騁勢力凍合氷蠶不成織皮膚皸瘃雪滿衣眞人恬漠與道息一花挺出萬木僵其友松筠乃能識清香逺到惟徳馨素質自持無異色春風着意媚衆卉用物精多老傖石耄紅飛盡密房深佳處暗為蜂翅得誰知竹外一枝好千載垂芳在詩墨菊坡疊遣梅什忽惠蘭芽此變風也敢借前韻效楚詞一章以謝來辱霜雰雰兮風作力草變衰兮蛩罷織思秋蘭兮委蕭艾望郊丘兮聊止息悵佳人兮既逺紛吾美兮誰識忽有人兮好修遺予佩兮春色茁瓊芽兮九畹帶杜衡兮被石凛増氷兮峩峩杳光風兮驟得卜蘭居兮南坡拂余龜兮食墨和趙大監知宗韻萬里修程占學力色絲黄絹新組織只今下筆追二雅端如養氣閉干息公子何自知寒梅須知三長具精識亭亭玉雪瑞煙曉愛日香浮綵衣色自然雅韻出天姿芝蘭那肯羡元石我慙姱節對俚語炊沙鏤氷竟何得願君冩入遂錦堂冷蘂疎枝陪淡墨再和韻簡菊坡訪梅長與寒角力兩鬢絲絲尚堪織弔湘賦鵬强解事長沙少年空太息酷愛孤芳支嵗寒草木雖多嬾求識肥遁不為蒼帝臣白賁丘園義形色風饕雪虐眞養素笑枕溪流潄寒石請翻橘頌作梅賦倍覺風騷楚人得請翁試為决然疑謂余非是甘飲墨昨雖移韻於蘭然石鼎聨章不可亦不成也再賦一則語以殿衆作亦騷之亂詞云好惡移人信有力宮姬尚取崑崙織晋書織室崑崙奴事剛姿未必廣平愛皓首誰憐趙岐息夷車衡茝蓀芷荃富矣離騷誇博識靈均橘頌不及梅内白孰為有精色夫何卞玉楚見棄素瑩無乃碔砆石梅古賢人又何怨伯夷正是求仁得氏以墨胎端自汙請效公輸為削墨續詩愧無修綆力意緒中㫁軻母織棹頭吟坐欲成寐出吻非鳴方願息君詩愛梅筆不停四疊陽關人未識氷壺交映雪同調秋水為神月争色翛然未肯弟山礬介如何必化松石詩壇置韻百夷姓敵壘收功劇孟得須君為梅作佳傳問事𤣥冥煩史墨再和静樂夫君論事回天力斯文如貢厥篚織天葩瑞時來帝傍天香染衣未渠息因攜天上白琅玕散作天花天女識氷清誰似乃翁譽玉闕孩視寕馨色月中疎影射銀漢雪裏樛枝䕶槃石望林笑策蓋世勛萬戸侯封為公得吹徹樓頭畵角春十行朝拜睿思墨静樂用元韻為勸學之什再和士惟食志非食力於陵奚事親屨織静樂一門自師友簣進不為子貢息元仲季方從太丘海内人士俱願識案上惟作羽籥聲陸龜䝉室中定無鉏箒色申旦督課如園蔬子夜程書過衡石舉似翁嫗笞其兒教育英才笑安得文獻超羣王謝家韋布當磨鐵硯墨再和梅韻北窗夢覺呼一力曙鳥微聞絡緯織推窗宛見野梅面帶雨猶如看花息堅白雅佔南枝先淺紅留待北人識宮中自是憐玉奴天上何為愛藍色盧杞仙㳺事肯隨蘭芷媚屈宋獨立芙蓉笑丁石愧我聨篇蟻空旋羡君六博梟已得梅嬾作尉竟仙去拜官無用斜封墨再和勸學韻仕學優於服田力公儀之家廢葵織詩書為府道徳林樂在藏修洎㳺息濃薫班馬有餘香暗摸曹劉豈難識挿架牙籖映隙曛近竹芸編侵晩色諸生競詫邉腹笥正音如聞孔堂石從知車馬自稽古須信熊魚可兼得四科褒進惟尚賢欽想昌黎方讀墨和葺芷雪韻氷山鑿碎五丁力散作席花誰捆織射鵰人去飛燕寒擁衾内視方閉息能令赤鳯冒白羽夜半翾翻天際識白雲郷中助劇戲從以萬妃紛玉色鸞沼乍驚舞明鏡虎塩未見蓋危石乍離還合紛總總已定復飄如得得姑置是事先年豐有突不黔應笑墨夸父逐日有餘力驅萬白蜺飛練織連天照耀作夜明湧池培堆驚壤息竹髙已學搶頭勢梅近猶能半面識坡翁笑效六一翁八章聨翩韻聲色坡效歐公白戰體以聲色氣味富貴勢力韻作八章麻衣忽見蜉蝣陣硯池觀魚來紫石鄭谷秪解瘦寒句江上魚蓑正披得何如囊錦生縠紋兎園老筆陽春墨毛東堂兎園老筆生扇陽春墨葩不待㣲和再和雪韻司冬已窮造父力寒機墮指曉猶織長安貴人金屋嬌琉璃屏下方偃息楊國忠事穿窗入幕兒女笑喚作楊花元不識明珠照乘月午夜秋水連天雲一色翻縞新詩出退之撒塩戲語欺安石一寒最憐東郭士履穿踵决行不得自喜猶為孔子徒且學顔淵食炊墨適得滷蛤頗佳遣餉菊坡因記曽作蛤子詩有文身呉太伯緘口魯銅人之句戲綴前語代簡文身太伯甘斥鹵緘口銅人舌㣲吐借資墨客富濡沫鹵乃墨魚之沫骨醉脣香登燕爼半熟含酒老饕賦此翁僅可闖堂户班班雋永帶神液入室眞味翁未覩菊坡風裁黄豫章如食蝤蛑江揺柱盤餐盡廢太瘦生格逺調髙自清苦子蛤遣汝到眉按努力去為酒中虎諺稱海醋醎者為捉酒虎末下醎豉有何好猶侣蓴羮傲傖父海之介夫此小兒雞肋見笑楊徳祖前身誰作水解仙飛入珠宮飲甘露能令齒吻策餘烈一鼎松風潄寒乳閒中口占五絶眼欲觀書身欲眠斜拖黄巻曲肱邉不須身眼争然否試待醒來問孝先雨多愁麥又憂苗不雨還憂旱火驕憂國浪愁端是苦老天那肯病唐堯杏桃結子已成翁稚緑中間着耄紅階藥元來如許壽麥秋天氣露春工見說烏蜂不採花羣飛啄蜜喙如鴉雖然冗食眞堪汰笑語園丁且放衙春魚潮罷捉洋山數水罾船素手還海若想應饕更甚飽鮮無復到人間近海魚絶少到龍井寺竹門斜倚酒家帘石路髙低記水簾炙背老農驚傴僂乘肩癡女笑窺覘數羝人立攀籬落一蝶兒嬉掠繖簷款約朋從歸去路馬頭應有月纎纎春園古寺緑周遭一閣軒騰面勢髙爐篆得薌抽露穟石泉借茗作雲濤風流二老歸靈鷲筆墨千年續楚騷拙語留題罥珠壁暗中摸索愧劉曹底忙不肯訪禪林山寺何曽避客深竒石韻髙非令色老松皮脫見眞心簷牙徇鐸關幽事溪曲無絃出妙音拂拭少游碑好在姓名曽記落碑隂十里輕軒憩佛廬夢身差記蝶蘧蘧伊蒲巧作魚蝦樣矮筍新鑱繭粟株暫到欲陪僧夏静等閒生怕俗塵汙計然老去翻多事空挽西施向五湖孟童子中異科而還來訪余於行都賜第輒贈以詩在昔昌黎公序贈張童子獨出超等夷芳名駕青史君門藹世勲夐軼西平李宗社方同休彪炳見孩稚天庭挿犀角星眸炯秋水誦書如焦琴髙下涵角祉朱門共駭聼洗此筝笛耳老翁欲笞兒眼看拾青紫一朝聞九關賚予出周篚我朝晏與楊炳炳貴名起願子志逺大勤學踵前軌家尊我相知作詩贈歸騎兩宋名賢小集巻二百三十二
