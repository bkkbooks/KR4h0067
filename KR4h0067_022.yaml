body:
  text: 兩宋名賢小集卷二十二宋陳思編元陳世隆補夏英公雜詩夏竦字子喬江州德安人以父死事補官真宗朝舉賢良除光祿丞仁宗朝纍擢知制誥拜同中書門下平章事封英國公後改封鄭卒贈太師中書令諡文莊有集上元觀燈魚龍曼衍六街呈金鎖通宵啓玉京冉冉遊塵生輦道遲遲春箭入歌聲寶坊月皎龍燈淡紫館風微鶴焰平宴罷南端天欲曉回瞻河漢尚盈盈題江州琵琶亭流光過眼如車轂薄宦拘人似馬銜若遇琵琶應大笑何須掩淚濕青衫咏牡丹紅芳爭並蕚湘葉競駢枝彩鳯雙飛穩霞冠對舞遲應廷試殿上衮衣明日月硯中旗影動龍蛇縱橫禮樂三千字獨對丹墀日未斜青箱雜記云夏試制科廷對出楊徽之見其年少遽邀與語曰老夫他則不知唯喜吟咏願丐賢良一篇以卜他日之志夏欣然為書此作天台道中驅馬天台路悠悠漸向晨雲開忽見寺山盡偶逢人細雨疏篁長微煙古木春行行遙驛道落吹起輕塵石梁斷澗橫幽石蒼蒼古木隂敧危接山腹迢遞過雲心峭壁峙千仭飛流下萬尋秦人若驅策蓬島路非深觀藏珠敏手機心頗自安遮藏有路巧千般主公當面無因見只怕傍人冷眼看按詩話云丁晉公為玉清昭應宫使夏公為判官一日賜宴齋宫優人有雜手藏擫者丁請夏公賦詩詩云舞拂桃珠復吐丸遮藏巧使百千般主公端坐無由見却被傍人冷眼看再徙西都詠青雀寄張升諫院弱羽傷弓尚未完孤飛誰敢擬鴛鸞明珠自有千金價莫為遊人作彈丸贈術士張介南歸上公詩筆千金重時吕許公王沂公皆有詩逋客歸裝一舸輕莫到青山更招隱且留明哲為蒼生詠燕雀舉示胡旦燕雀紛紛出亂麻漢江西畔使君家空堂自恨無金彈任爾啾啾到日斜按詩話胡旦秋監性褊躁居襄陽夏英公常師事之及公貴達胡尚以故舊視公公出鎮襄陽時一造焉一日謂公曰讀書乎曰郡事少暇比只作得燕雀一詩因為誦之胡自是少戢廣農頌皇哉惟聖躬提天柄億兆歸心三農洽慶廣我田事肇修稼政乃置官民乃頒號令號令惟何分條建規恩斯懋斯流冗攸歸官名維何啓職庀司訓之導之播種維時民曰勤止服田力穡晝爾于耕宵爾無斁千耦偕飛百穀咸植既藝浮鹵越經封洫官曰蒞止糾力勸能痔我錢鎛疏我溝塍乃能灌溉爰相丘陵汙萊以闢遊惰用懲赫赫聖謀有作咸覩畎澮四溟井疆九土沃野萬里縱橫其畝擁耒成林灑流降雨陽春如膏原隰如鱗我稼既華六合生雲稻粱黍稷萬井龍文同我婦子或耨或耘八月其穫乃登爾稼滯穗棲原餘糧厭野盈溢京庾流衍方夏式歌且謠土金同價百姓足矣君孰不足三百之同九年之畜八蠟既通五禮咸穆藏財于民所寶惟穀君哉君哉樂事訓農炎帝之教后稷之功方我王度明而未融臣之頌之永矣無窮出守杭州寄執政二絶造化平分荷大鈞腰間新佩玉麒麟南湖不住栽桃李擬伴沙禽過十春海雁橋邊春水深略無塵土到花隂忘機不問人知否自有沙鷗信此心青雀青雀孤飛毛羽單卑棲豈敢害鵷鸞明珠自有千金價莫為他人作彈丸國清寺穿松渡雙澗宫殿五峯圍小院分寒水虛樓半落暉葉從金地下雲向玉京飛欲問西來意誰傳智者衣桐柏觀鳥道寒藤結洞門蒼蘚深樓臺在山半松檜出雲心土暖春長在峰高月易沈羽衣祠太乙香冷石壇隂赤城丹壁排空疊綵虹上真應此駐靈蹤煙沈曉日明孤頂雲破餘霞出半峰巖下法師曽伏虎洞中天子屢投龍他年翠蓋東巡狩玉牒終須受大封三井銘石罅山半三井如鑿圓不可窺深不可度亂澗四入飛流外落墮石不盈驕陽不涸冷激松檜碧混崖崿山靈所衛神物攸託簫鼓一鳴雷雨間作兩宋名賢小集卷二十二
