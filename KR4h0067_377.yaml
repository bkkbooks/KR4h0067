body:
  text: 兩宋名賢小集卷三百七十七宋陳思編元陳世隆補秋堂遺稿柴望字仲山文溪人倜儻有氣節往來都下名公卿俱客禮致之髙宗朝叩闕十上書議論抗直忤旨遂繫獄旋奉詔放還晚年山居杜門謝絶世緣惟以詩自娛云吳樵溪山居老子無家計蕭然屋數間頭邉惟白髮眼底是青山碁急鳥聲散琴低鶴睡間片雲長似伴朝去暮飛還送朱南山開蜀閫殿上傳宣內引官一封歷歷奏忠肝八千里路先聲至百萬都人夾道觀節度晉公新授鉞淮隂韓信舊登壇擎天正要中流柱莫擬人間蜀道難詔許出獄呈京尹節齋趙公臣子狂愚獻直言聖明寬大度如天十封應詔皆焚藁一片憂時秖似弦數象逢丁陽九厄元龜為鑑後千年今朝有旨從天下知召長沙到席前靈芝寺别祖席諸友落日寒城暮雨餘滿斟離酒意何如見妻還指張儀舌痛國誰憐賈誼書羸馬病僮旋雇債寺禽山獠亦欷歔長安可是深居處更向深山深處居富陽道中幾年只向長安去今日囊書被旨回馬首獨行秋葉落鱸魚時共菊花杯黃昏鐘動雁初下夜半月明潮正來我自不歸歸便得故園早晚早梅開和周居易見寄韻十年為客上長安人指氷山不會寒開口盡言投老易到頭只是挂冠難低棲屋宇居常穩巧小園池坐儘寬别有前溪魚可釣也須栽竹傍欄干夢傅説傅説為霖入夢中髙宗一念與天通後來亦有君王夢不是陽臺即月宫錢塘不記錢王建國年尚遺強弩射潮痕地回王氣歸吳分山挾潮聲出海門南渡幾年猶昨日西湖疏影自黃昏客來獨憑欄干處時聽漁歌過逺村越王勾踐墓秦望山頭自夕陽傷心誰復賦淒涼今人不見亡吳事故墓猶傳霸越鄉雨打亂花迷復道鳥翻黃葉下宫牆登臨莫向髙臺望煙樹中原正渺茫送馬太初之越一去山隂一冉溪如何還只任分攜雨無聊賴人無寐水又潺湲鳥又啼明日不知君上馬中宵誰與共聞雞去時應有蘭亭句為我臨池援筆題戒珠寺右軍宅蒼樹寒煙兩渺茫後來誰此弔興亡晉朝風物今流水蕭寺鐘聲幾夕陽話燕梁空春雨急愛鵝人去暮山長學書弟子知何在風過池塘墨尚香和王景陽越中寄别韻故人書只問平安分巳還山豈願官猿鶴不驚松徑夢貂蟬難換竹皮冠長安落葉秋深見故國斜陽雨後看莫道剡中吟不盡不成吟處亦停鞍西施十二金叉對對鋪三千粉黛膩如酥君王莫道六宫醜一箇西施已破吳范蠡五月菰蒲八月秋年年灑泪酹江頭伍胥忿怒三閭怨爭似鴟夷一釣舟金臺泊舟欲謀歸去計歸去更匆匆王化何時北江流日夜東片帆山共水竟夕雨和風時事只如此相催成老翁宿湖外懶入城中去來維栁下舟空江明月上殘雨夕陽收好景多歸夜他鄉易得秋倚梧吟不盡樽酒更登樓金山寺荻花蘆葉正珊珊山在長江寺在山門徑但從船出入僧房多住水中間江空落日斜猶照夜半秋潮去復還吟興未闌天欲曙一行斜雁起蒼灣鳯凰臺灑盡梧桐酒一杯興亡前事獨徘徊烏衣冉冉斜陽下白鷺茫茫江水來鳯去不知經幾載客來惟只見髙臺間于登眺成孤嘯五百年間王氣回石頭寺和王寧翁韻懷鄉弔古易傷心絶頂危亭共客臨朝市亂經兵火後山川轉覺樹雲深百年歌舞空臺沼六代豪華漫陸沈惟有亂鴉歸去晚夕陽無限暮城隂多景樓早被垂楊繫去舟五更潮落大江頭關河北望幾千里淮海南來第一樓昔日最多風景處今人偏動黍離愁煙沙􅐓洞翻蘋末欲倚西風問仲謀山隂蘭亭寂寂山隂事巳塵至今亭址尚嶙峋落花時節朝朝雨插栁人家處處春曲水自流寒食酒茂陵無復永和人昭陵繭紙今何在空有梅花點翠珉别故人便未成名也自歸不應猿鶴更猜疑冷看世事頻移局懶與仙人共奕碁南渡只今惟有酒西興臨别是誰詩行藏正要知時節却是時人未得知送葉若磯之金陵謁信菴一片斜陽落渡頭青袍烏帽獨登樓江流建業三千里山色淮南數百州都督正開羊祜府誰人得上李膺舟此行不為揚州鶴一字堪封萬户侯呈中書權直程滄洲玉旨傳宣夜直扉制麻侵晚進呈歸三槐龍影連青鎖千栁鶯聲度紫微袖惹爐香飄霧靄硯傳盤露映旌旗承恩更賜金蓮炬猶勝清光太乙藜富春嚴子陵祠桑田何處海漫漫耕壟傳聞建武間真主不緣符白水先生安可飯青山至今青草遺寒燒此日秋江起暮潺萬里崎嶇祠下路不知行役幾人間歸來歸計年來付酒杯任他猿鶴自相猜東家種竹西鄰看前日移花昨夜開鐘送夕陽歸草木風吹涼月上樓臺老來懶聽他家曲惟看柴門長緑苔長城漠漠沙場萬里遙千夫一日起臨洮若無道德為干櫓更是秦人築更髙沛中歌秦時日月漢山河家計今誰與仲多天子不知天下貴酒中惟唱沛中歌越山吳越山分兩岸青隔江帆影是西興江花亂落如紅雨雲樹髙低似畫屏錢氏古鄉迷輦道越王芳草上諸陵已知太乙臨吳分曉看祥烏夜看星雲夢紀生尚可稱皇帝韓信何妨作假王今日偽遊真是偽只因一躡誤髙皇塞下行贈韋士穎歸鄂渚上江陵謁閩相夫運帷幄籌草軍前檄毋但曰白面書生之未學也馬上撲鞭隨從軍樂後誦弔古戰場文使驚濤亂石相顧駭愕者此重食武昌魚後會公案長安二月春正濃長江二月風正急城頭楊栁雪絮飛道旁粘雨沈潦濕邯鄲誰家俠少年上馬意氣揮金鞭下馬掃筆大如椽興來一石未能醉劇飲數斗口流涎玉山趺倒扶未起金鞭留當酒家裏隔樓倣佛畫眉人相邀夜宿鴛鴦被睡魔不醒五更鐘笛聲吹斷相思淚嘐嘐鳴雞將渡關欲去未去踟蹰間道逢項莊把劍舞樓上美人歌玉環剨然掣電蛟龍怒便指南樓問歸路二千三百里更長爾僕衣糧我屝屨青衫著破不堪典典到青衫誰共語世上豈無此髯漢散財結客千千萬豈無燕昭萬黃金築作髙臺禮瓌彥秦坑漢罵不肯收自是一番遭薄賤唐人科舉更糊名天下英雄消阻盡生兒不學去封侯毛錐弄秃成霜鬢世無荆斬樊於期只今誰復是男兒我聞兵凶戰危事愁殺天上蚩尤旗人心永平易思亂中原塊土爭驅漢蔡人未下敵未誅機來一髮不容間三邉未即妖祲清天乎何時能洗兵送君不作斷腸客三客一騎君西征臨岐酌酒再三語今日君王自神武此行投筆事班超不必區區問兒女上流夜夜箭如雨下流炮火驚淮甸襄師重屯郢州北北師未解長江面勸君莫賦橫槊詩樓頭正要籌邉算軍前一著天下竒夜斬樓蘭無人知露布直到天子墀六宫歡動龍顔怡惟清象武獻太廟未央前殿稱玉巵搴旗斬將不足道運籌帷幄果為誰曰何功第一參次之噫吁嘻帝命我公歸衮衣長生武皇何事駕虛空金闕求仙路未通王母不來方士去茂陵可是廣寒宫寄徐編校近傳丹詔下彤墀夜鶴寒猿也自疑江上晚風終是急山中白日最相宜潮生潮滅鷗先見花落花開蝶未知懷玉山人如問我爛柯山下看圍碁重到都門效轆轤體兩年不作京華夢重到湖山事巳非栁外晚風寒夕節花開天氣雨晴時欄干獨憑鶯飛去簾幕低垂燕未歸欲托焦桐理心事滿庭芳草又斜暉蘇武十九年間不辱君論功何獨後諸臣若教倒數凌煙像也是當時第一人金陵秋赴别江壽翁憶向西風折翅歸每欣黃菊滿疏籬十書詣闕無知己千里離家有路岐嵗月易驚孤客夢文章難比少年時荻花蘆葉休淒怨自有新開竇桂枝子陵臺曽與劉郎共起居如何不肯受除書最憐人笑先生錯正好為官却釣魚昭陽殿禍水流來漢火亡白頭宫女恨昭陽至今人見飛來燕猶為君王暗斷腸竒氣樓此齋全占嵩髙勝更盡樓前第一竒芳草碧連天水處數峰青斷暮煙時山川不逐隂晴換宇宙間看嵗月移琴巳懶彈書懶讀一簾花影詠春遲髙齋晚望才是青山便卜鄰世情那得較紛紜霧連逺岫分為雨煙起人家去作雲栁色晴光扶檻入鶯聲人語隔窗聞髙齋獨卷重簾坐花落棊牀日未曛西湖年年栁眼青歸處門外遊人可自間天氣又晴晴又雨樓臺依寺寺依山酒邉歌拍穿花外船上簫聲落水間光景留連空自惜鷓鴣啼罷暮城關山居老來無一事僮與鶴相隨繞屋疏疏竹編墻短短籬起來花換影知去睡多時莫厭山居寂山人祗自宜客中夜雨離情先怯向邉州寒葉敲窗更報秋幾點攪殘千里夢一聲滴作兩鄉愁苦緣楊栁沾離席偶傍梧桐濺小樓惟有孤燈照明滅夜深無語攬重裘江心寺寺北金焦徹夜開一山恰似小蓬萊塔分兩岸波中影潮長三門石上苔遺老為言前日事上皇曽渡此江來中流滚滚英雄淚輸與髙僧入定回重題黃鶴樓自從崔皓題詩後更有何人弔禰衡芳草不知鸚鵡恨晴天惟見漢陽城樓頭月落酒方醒岸口風髙雁正鳴五百年前黃鶴去間尋鷗鷺結詩盟淝水想見西風對壘時目中先巳料安危淮淝百萬兵雖衆未抵東山一局碁除夕對梅青春無復駐年華幾度江梅暗憶家惆悵新愁添白髮鬢邉如雪映寒花别永嘉使君趙致軒一番出處計何如流泊中川不為魚落日淒涼秋老矣西風浩蕩客歸歟吟成白髮逢知巳費盡黃金買古書明發灞橋橋上路藉君帆力更吹噓蘄州别友客中逢客上夷陵輾轉淒涼睡不成無酒送君之逺道有誰吹角向江城白髮亂生人漸老青燈相對兩無情詰朝共發蘄州岸知到江山更幾程上忠齋丞相四首世事篙人一葉舟長歌短棹發中流今朝正得東風便才是西風便轉頭爛柯山下採樵民盡日觀碁局局新黑白兩般多著過後來一著要髙人江南江北路迢迢往事東風恨未消昨夜杜鵑啼不了始知春在洛陽橋九陌紅塵撲帽紗囊書幾度進官家近來不甚知時事只是栽桑不種花即事􅐓洞風塵莽未明天翻地覆劫將盈翠華海上知何似白首山中空自驚笑向鶯花非世界夢迷弓劍繞皇陵誰知薇蕨同杯酒為酹興亡終古靈和通判弟隨亨書感韻風沙萬里夢堪驚地老天荒只此情世上但知王蠋義人間惟有伯夷清堂前舊燕歸何處花外啼鵑月幾更莫話淒涼當日事劍歌泪盡血沾纓中秋待月用弟察推元彪韻待月南樓月不明百年虛負此宵情浮隂亂向空中起圓影偏從塞外清江國瀟瀟淒露氣山城處處動笳聲何人獨抱琵琶坐淚滴氷絃暗恨生兩宋名賢小集卷三百七十七
