body:
  text: 兩宋名賢小集卷三百一宋陳思編元陳世隆補檜庭吟稿葛起耕字君顧丹陽人詩有檜庭吟稿春懷過了花朝日漸遲相將又是禁煙時寒留栁葉凄迷處春在梨花寂寞枝牛角橫書孤壯志鹿門採藥誤幽期自憐白髮成何事説與啼鶯未必知姑蘇懷古闔廬城下水連天故國凄涼思惘然堤栁數行垂舞帶砌苔幾疊暈歌鈿了無麋鹿遊臺下秪有鳬鷖戲水邊往事如今銷歇盡斷霞殘照鎖寒煙記夢綺寮縹眇敞虛明鵠峙鸞停護碧城珠蕊一枝春共瘦玉環雙珮月同明曽題洛賦緘新意却拊湘絃寄逺情十二闌干風細細覺來依約記棋聲湖天霜曉十里平湖浸曉光玉鸞飛舞鏡中央也知青女催梳掠淡拂鉛華試靚粧暮春雜興盡闌目斷楚雲西芳草連天客思迷家在江南煙雨裏落花時節杜鵑啼紫椹纍纍綴碧桑林塘雨過緑生香荆扉晝掩蒼苔寂留得藝籖伴日長閉門花落又春深白紵歌殘對晚斟惆悵年來心緒惡一庭煙草緑沉沉蘭杜初芳湘水春鷓鴣啼處草如茵雙魚不寄蘅臯信空有燈花入夢頻燕子聲中日正長讀殘書卷亂堆牀夢回却愛西窗寂間看松花帶夕陽雨中夢故山冥冥細雨濕江城掩映書窗翳復明倦客一杯愁頓減故鄉千里夢初成金華洞口羊驚起石佛山頭鹿伴行石佛故里山名何日東歸溪上路一犁春緑帶雲耕疏櫺寒意沁疏櫺間階草尚青市朝人自醉泉石我常醒桂寫月標格蘭傳秋典刑何妨為老伴相與兩忘形初春感舊又是春生杜若洲慿欄回首總關愁雲橫楚峽縈新夢月泛吳波憶舊遊立馬醉題花外驛聞鶯笑倚桞邊樓如今萬事經心懶秪合長歌擬四休檄雪銀闕書飛急羽忙料應滕六奏虛皇要將閬苑蓬壺水幻作瓊林玉樹芳風約雲邊停鶴馭氷清月際舞霓裳鳯簫莫品凄涼調催老梅花枉斷腸和蘆洲劉子泉秋懷雨送秋歸鴈帶霜凝情無處寄詩狂一庭莎草蛩吟老萬里梅花鶴夢長德誼可踰鐘鼎貴聖賢不死簡編香邇來世道添悲梗不但摧車是太行贈燕鎮日雙棲向畫梁有時飛去為誰忙得泥趂暖添芹壘掠水因風貼栁塘語重唤回芳草夢舞輕遊遍落花看五陵年少傷春恨書繫紅絲擬寄將次子泉韻一聲鶗鴂又春休風簸榆錢滿地流燕子不知花落盡等間飛過栁邊樓月轉庭花玉一闌寶叉不卸待郎看丁香擬結相思夢無奈東風作社寒東歸遊倦歸來似長卿敝廬事事費經營掃除塵土虛堂潔拂拭窗櫺舊紙明徑菊已荒惟草長井花少汲覺苔生寒衣未辦西風急不奈鄰家機杼鳴除夕爆竹傳聲又嵗除流年不駐隙中駒屠蘇未足斟春酒餺飥先教促曉厨彩絢户庭更鬱壘歡傳院落競樗蒲老來樂事關心懶吟對梅花撚斷鬚秋寓都城次趙君瑞韻催破橙香薦蟹黃快斟新酒潤詩腸雁拖暝色橫秋水鴉帶寒聲噪夕陽萬事莫如花下醉百年渾似夢中狂登髙休負湖山約約買扁舟載艷粧次劉野泉韻自笑生隨雁影浮幾經楚尾與吳頭塞樓角送關山月湘驛砧敲嶽麓秋嵗月奔輪如走坂功名求劒記行舟即今安得如澠酒與汝同澆萬古愁安分凄煙淡靄鎖林扉又是秋光欲暮時蘋葉江湖風剪剪桂花庭院雨絲絲世情冷暖杯中酒人事輸贏局上棋安分得間間最好不須身外強尋思覽鏡覽鏡羞看鬢點霜若云勛業更堪傷已甘身向山中老安得名留海內香雅志擬聨髙士傳倦遊慵入少年場長吟酒醒慿闌處更聽秋砧答暮螀贈烏龍山圓上人笑把儒冠换墨衣深思富貴有危機參他龍象知今是還了鴛鴦悟昨非開鉢展單隨所寓打包持錫去如飛有人若問西來意正要髙談為發揮支頥氣數推移有盛衰老觀此理獨支頥閲人雲木能千載過眼風花只片時名利場中棋變幻是非窠裏浪傾危到頭輸與山中叟樂在耕鉏别不知淚誰奏琵琶知客歡啼珠泣玉使心酸感時多向英雄灑怨别還從粉黛彈每聽巴猿愁滴袂莫燒漢爉恐堆盤陽關一曲君休唱唱罷人間行路難小隱小隱山林習已成市朝聲利讓渠爭是非每向靜中見悔吝多從動處生且約蒼官陪竹友共邀歡伯訪梅兄嵗寒心事期相守一瞬榮枯任變更秋夜城笳吹下暮雲邊螢照書帷夜未眠遊子不堪征袖薄西風懶誦搗衣篇樓上樓上何人奏玉蕭數聲和月伴春宵斷腸唤起江南夢愁絶寒梅酒半銷宫詞銀漏踈風透玉屛碧梧枝上兩三更依稀似寫華清恨雲冷香銷夢不成兩宋名賢小集卷三百一
