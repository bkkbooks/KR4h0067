body:
  text: 兩宋名賢小集卷三百七十一宋陳思編元陳世隆補圖詩鄭思肖字憶翁號所南福州連江人太學上舍應博學宏詞科元兵南下叩閽上太后幼主疏辭切直忤當路不報遂客吳下寄食城南報國寺以終有錦錢集一百二十四圖詩集咸淳集中興集黃帝洞庭張樂圖天水相涵萬象清咸池真樂妙無垠大音豈在九霄外有意聽時却不聞堯民擊壤圖百姓相忘堯帝春耕田鑿井淡無情只今正是何年月日日月從東向生巢父洗耳圖萬事喧喧雜響中細參巢父意無窮須還半掬溪邊水方始教君耳不聾許由棄瓢圖天下搖頭不肯為恰如瓢挂老松枝許由不在箕山在千古髙風屬阿誰吕望垂釣圖八十老翁心尚孩渭濱癡坐弄徘徊當初若是逃名者誰要文王上釣來夷齊西山圖扣馬癡心諫不休既拚一死百無憂因何留得首陽在只説商家不説周老子度關圖紫氣東來壓萬山老聃吐舌笑開顔青牛車外天風闊搖動當年函谷關紀昌貫蝨悟射圖從來絶藝欲超倫何止彎弓用意深覷破微塵微極處忽開大地見紅心鍾子期聽琴圖一契髙山流水心形神空靜兩忘情似非父母所生耳聽見伯牙聲外聲伯牙絶絃圖終不求人更賞音只當仰面看山林一雙間手無聊賴滿地斜陽是此心榮啓期三樂圖生死悠悠付老天啓期三樂亦超然此身不得為男子空活人間九十年伯樂相馬圖冀北羣中不可留如龍走地絶無儔何勞伯樂一相顧抹過西風數百州莊子夢蝴蝶圖素來夢覺兩俱空開眼還如闔眼同蝶是莊周周是蝶百花無口罵春風輪扁諫讀書圖輪扁釋椎開口諫國君據坐展書開古人糟粕終枯淡誰醉天然滋味來卞和泣玉圖大璞中函天地精卞和抱出愈分明一番刖足一番哭哭殺世人無眼睛寧戚飯牛圖斯人豈是飯牛者浩歎空懷扣角悲説到漫漫長夜處南山白石也攢眉孺子濯纓圖秋影澄澄湛碧波濯纓人逺意如何臨風歌罷飄然去賣弄滄浪清處多葉公畫龍圖神物難傳變化時葉公眼外泄天機一從親見真頭角滿手風雲雷電飛孟嘗君度關圖狐白裘邊事若難孟嘗門下亦何顔若無意智翻身去半夜焉能度此關屈原九歌圖楚人念念愛清湘苦憶九歌頻斷腸只道此中皆楚國還於何處拜東皇屈原餐菊圖誰念三閭久陸沉飽霜猶是傲秋深年年吞吐説不得一見黃花一苦心范蠡扁舟圖烏喙無情奈若何功成只合理漁蓑躍身吳越興亡外一舸江湖風月多毛遂脫頴圖十九人中不數君當機勇辨獨超羣若非末後脫頴出爭得英風撥楚雲魯欹器圖此心安分即逍遙無欲何愁外境搖才有秋毫失中正一杯水亦不能消列子竊鈇圖宇宙茫茫盡坦途莫將得失自相辜胸中若有一些子天地山河俱竊鈇秋胡子圖郎歸猶未到家中艷語勾春妾面紅叵耐相逢不相識梅花那肯戀東風西施捧心圖蕩盡吳王醉後春化為顰笑艷精神當胸一點痛得别直是妖嬈惱殺人驪山老姥磨鐵杵欲作繡針圖欲化龜蛇生聖胎驪山微意孰能猜純鋼一塊都磨盡不信纎毫眼不開秦女吹簫圖弄玉飄飄仙女姿鳯凰低舞久相期簫中應有别一曲飛出青天影外吹湘靈鼓瑟圖霧質煙姿雪月心凌波無迹似多情試聽誰在湘江上髣佛秋風曲數聲毛女圖六國傾城輦入秦深花密栁鎖青春神仙自有長生路豈是阿房宫裏人徐福採藥圖仙藥長生不易求仙山可在海東頭祖龍滅盡諸侯後徐福却來贏一籌青門種瓜圖百二山河勢莫當咸陽誰付與髙皇盡嫌嬴政鮑魚臭爭慕邵平瓜圃香漢髙祖將韓信圖先入關中得計多彭城永是漢山河不操擒縱英雄手韓信何由肯倒戈張子房遇黃石公圖三度橋邉伺老仙始將兵法盡相傳不知躡足此一計還出書中第幾篇四皓圖曄曄紫芝巖石隈避秦有地似蓬萊可憐白髮坐不定又被漢朝呼出來周亞夫細栁營圖細栁營中作略殊寧容直入驟先驅不因一見入門訣文帝何曽識亞夫李廣射石虎圖怪石蹲身草莽中錯疑猛虎噴腥風何消重費將軍力只在當頭一箭功董仲舒不窺園圖西漢諸儒君最醇無人見面意應深三年盡力窺經史一旦看花了古今蘇武牧羊假寐圖十九年間墮渺茫飢來齧雪齒生香一心只夢飛歸國雙眼何曽看見羊蘇李泣别圖同為武帝一時人忠逆分違感慨深早信子卿歸漢去淚痕滴滴滴黃金司馬相如題柱圖初上升仙何慷慨重來衣錦頗從容男兒意氣當如此透過禹門方是龍張騫乘槎圖牛女宫中事若何親身曽得上天河逢人莫説支機石漏泄蒼蒼意已多翟公交情圖翟公冷語久逾新漢世交情古亦今不被死生貧賤轉此時方始見人心朱買臣賣柴圖年當五十始榮華覆水難收重嘆嗟豈信後來春色别滿柴擔上盡開花二疏東門祖帳圖昔日賢哉二大夫東門祖帳耀通衢太平時節獨先去闔國人知此意無嚴君平垂簾賣卜圖多是垂簾自養神僅能了日即安貧不離忠孝談元妙豈是尋常賣卜人王初平牧羊圖兄弟參商四十春金華山裏問斜曛相逢不是牧羊客白石顢頇冷笑君西王母蟠桃宴圖玄圃筵開物外春萬仙歡笑動精神蟠桃種子今猶在誰是三千年後人嚴子陵垂釣圖新莽紛紛未有涯桐江山水頗為嘉無心偶向一絲上釣得清風滿漢家袁安卧雪圖飛玉堆寒二丈過杜門僵卧養天和不愁屋外六花大但覺胸中清氣多髙鳯讀書漂麥圖癖愛詩書苦未休肯將俗事挂心頭等間痛快語言外那見雨來知麥流張天師飛升圖玉局曽經拜老君子孫今尚寶元文要知龍虎山前意但看空中數片雲王粲覆棊圖鴉鷺爭飛局局殊便生國手亦難圖未曽落子有一著王粲還能覆得無先主三顧草廬圖抱膝髙吟梁甫時卧龍致雨未為遲若無三顧草廬意剖出心肝賣與誰孔明出師表圖一身英氣射光芒北定中原事轉長落得兩篇出師表至今只是漢文章孔明成都八陳圖孔明抱義恥偏安不道中興事業難賴有石頭知落處任從人換入門看王祥剖氷圖母病杯羮意未諧解衣竟欲卧氷開有心直透清波下安得無魚躍出來王衍舉阿堵物圖口不言錢早不同何須相試苦相攻今朝叱去阿堵物一室玲瓏分外空竹林七賢圖清談何補晉江山誰與中原了歲寒惟有白雲三四片飛來自問古琅玕王子猷看竹圖秋沁徽之骨亦清翠光如水漾空明只圖一見此君靣誰更問人間姓名王子猷訪戴圖雪夜懷人泛剡溪造門而返是還非不曽相見猶相見滿載清風獨自歸阮籍醉眠酒家圖少婦當壚應怪人陶陶一覺了殘更無情不作如花想夢見醉鄉生月明劉伶荷鍤圖酒國韶光無際涯大人境界絶朋儕生來自有一方地何待醉終才始埋戴安道破琴圖獨抱洋洋太古心王門何苦欲相尋狂來寧可破琴去不許俗人聞此音畢卓甕間圖醉玉頽來欲化仙一窪和氣藹芳妍終宵自向華胥去吏部何曽甕下眠孫康映雪讀書圖孫康苦志惜居諸雪夜無燈興有餘冷地白光生破屋自然開眼見詩書張翰思蓴鱸圖名爵雖榮心最苦蓴鱸有味食無厭後來京洛風塵暗轉覺吳淞江水甜孫楚枕流潄石圖孫楚匆匆誤答時説來頗與事相違枕流潄石翻為妙活弄胸中倒一機庾亮登南樓圖老子情懷頗滑稽登樓恰喜月明時雖然於此興不淺且要諸人知不知周處除三害圖一朝周處奮英豪三害皆除豈憚勞若是不能降自已縱屠龍虎不為髙王羲之蘭亭圖猶記蘭亭三月三流觴曲水暢情酣分明一段永和意好向羲之筆外參桓伊三弄圖傾蓋相逢不問誰知音那肯露心機一聲吹破清秋影驚散間雲各自飛車武子聚螢讀書圖武子耽書不暫忘練囊終夜照凄涼讀來讀去東方白笑殺流螢數點光陸績懷橘遺母圖獨薦霜丸意不安誰供甘旨侍團欒驀然憶著娘生靣萬樹黃金盡喜歡吳隱之飲貪泉圖外物終難換肺腸隱之清介頓生狂便教飲盡貪泉水只覺通身白雪香郝隆曬腹書圖七夕庭中羅綺乾鄰家應是鄙儒冠文章滿腹無人識鋪與青天白日看陶淵明三徑圖老氣蒼寒松樹活間情幽淡菊花開一條古路無人走還且與誰相往來陶淵明對菊圖彭澤歸來老歲華東籬儘可了生涯誰知秋意凋零後最耐風霜有此花王孝伯痛飲讀離騷圖名士天生磊落才只耽痛飲罄樽罍誰傳一味解醒法歌斷離騷眼自開許真君飛升圖鐡柱遺蹤尚儼然五陵後必出羣仙當時諶姆説甚麼四十二人都上天孫登長嘯圖碧眼空空照九州阮公不是我同流劃然長嘯誰聽得獨有蘇門山點頭王烈餐石髓圖五百年方開此山寒光浮暖濕而乾明明正是洪濛髓只恐凡人不肯餐桃源圖長城徭役苦咨嗟澧水偷春隱歲華有耳不聞秦漢事眼前日日賞桃花爛柯圖日出樵柴日落歸幾年黑白夢紛飛看來直待斧柯爛始悟老仙棊外機延平躍劍圖白晝平津湧似雷盡驚靈物出塵埃倒翻三尺揮空去對舞雙龍破浪來陶𢎞景三層樓聽松風圖𢎞景岑樓插太清萬龍捲翠響泠泠此心不出三界看一片秋聲何處聽文選閣圖太子奢華能幾年盡將春夢付荒煙錯聽古調一兩拍空嗅斯文數百篇唐明皇遊月宫圖玉仗飛行馭太空須臾徑到廣寒宫三郎胸次無髙見落眼蟾蜍光影中李靖天瓢圖夢裏騎龍出八荒掃空熱惱作清涼不消數滴天瓢雨洗盡娑婆透骨香王勃滕王閣記圖王勃清才俊不禁爛鋪艷錦賞知音空餘髙閣青雲裏誰識落霞秋水心狄仁傑白雲親舍圖駐馬回頭眺碧空河陽在望去匆匆吾親雖舍白雲下豈出梁公一念中孟浩然歸隱圖明主憐才若賜官奔馳微祿負家山狂吟一首笑歸去滿路秋光上醉顔李太白硯靴圖斗酒未乾詩百篇篇篇竒氣走雲煙自從捧硯脫靴後笑看唐家萬里天杜子美茅屋為秋風所破歌圖雨捲風掀地欲沉浣花溪路似難尋數間茅屋苦饒舌説殺少陵憂國心杜子美騎驢圖飯顆山前花正妍飲愁為醉弄吟顛突然騎過草堂去夢拜杜鵑聲外天子美孔明廟古柏行圖諸葛甘棠歲月深霜皮黛色鬱沉沉尚垂清蔭蜀國裏一樹風霜千載心韓昌黎祭鰐魚圖朝奏空言暮逺途藍關飛雪漬衣裾豈期去國八千里此意猶能化鰐魚栁子厚賦寒江釣雪圖空玄影外渺孤舟不與漁翁意思侔萬頃風濤一天雪且看誰解下金鈎盧同煎茶圖月團片片吐蒼煙破帽籠頭手自煎七碗不妨都喫了恣開笑口罵羣仙陸龜蒙茶竈筆牀圖笠澤往來無定期煮茶垂釣醉吟詩一船清致終難畫不是散人應不知公孫大娘舞劍圖纎手生風攪晝寒好花翻影艷清歡試看不犯鋒鋩處舞碎晴空雪一團張果老倒騎驢圖云是堯時丙子生狂蹤怪迹恣幽情拗驢靣目不須看一任騎來顛倒行張志和漁父圖苕霅春深花滿溪一鈎翻動碧琉璃蓑衣篛笠儘有意不到斜風細雨知藍采和踏踏歌圖踏踏歌中天地開紅顔春樹莫相催藍袍轉破轉竒特别看仙人舞一回鍾吕傳道圖鍾吕喃喃手指空應談玄牝妙無窮都來造化只半句不在丹經文字中吕洞賔賣墨圖鍊就玄玄一塊金朝磨暮寫愈精神先生此墨初無價不識誰為買墨人沈東老遇吕洞賓圖東老忘懷相遇時洞賔爛醉以為期聊題不涉毫端句早被石榴皮得知巴山橘中圖剖破渾淪一殼寬二仙飛去已雲端須知橘裏封疆别莫作凡間勝負看中秋苦雨趙知微登天柱峯賞月圖人愛中秋月色同忽驚涼雨翳昏鐘如何只隔一重幕不見仙家天柱夆南柯蟻夢圖忘了堂堂六尺身鬼花生艷幻微春絶憐蟻窟無分曉迷盡古今多少人崔護覔水圖哭斷東風轉有情俄驚滿靣笑容新當時飲水今猶醉别是桃花半點春倩女離魂圖有心誰怕鐡為墻直透虛空未易量若問合離真偽事滿池緑水笑鴛鴦崔智韜虎妻圖佳人睡覺失青山惡毒心腸賣笑顔認得皮毛一歸去花枝無艷虎全斑玉川長鬚赤腳圖慣立煎茶屋角頭低眸頻候雪花浮一奴一婢亦作怪不為先生破屋愁陳摶睡圖五季干戈亂似麻慵將醒眼閲年華齁齁一覺華山裏誰問春開幾度花逋仙探梅圖雪壓咸平處士家凍雲鎖暝苦相遮欲知天上春消息只覔南枝第一花蘇東坡前赤壁賦圖泛舟赤壁痛銜杯孟德英豪安在哉何似江山風月妙不從自已外邉來李伯時所畫太一真人蓮葉舟圖天上真人妙出神聊乘蓮葉下南冥若人欲識空涼境但誦薰風一卷經無名氏巡簷數修竹圖四簷玉立碧重重終日相看眼亦空何啻數來千萬箇不知那箇弄清風兩宋名賢小集卷三百七十一
