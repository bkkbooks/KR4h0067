body:
  text: 兩宋名賢小集卷三百四十三宋陳思編元陳世隆補髙峯别集廖剛字用中南劒州順昌人崇寧五年進士紹興中歷官御史中丞工部尚書以徽猷閣直學士提舉亳州明道宫卒有髙峰集代祖父次韻酬羅君寶見寄公祖名不父名懋蕭條門巷陋于顔老去青春僅得間心畫傳家無計策手談留客漫機關靜思往事千年上俯歎勞生一夢間多謝光臨無别意為聞流水與髙山題楊子光雙溪閣倚天華棟俯長洲渺渺雙溪一檻秋匹馬問津迷去路亂帆分港競歸舟花飄兩洞紅交浪影落三山翠合流清夜嗚榔何處曲冷光平泛玉簾鈎和逸道春雪春雷未發春工淺春雪濛溶翳日華曉户玉樓迷舊燕晚村瓊樹點寒鴉籠金尚礙鶯穿柳覆錦猶妨蝶戀花憑仗東風吹更暖桃源端欲訪仙家題雙泉堂疊翠倚崢嶸森然衆木榮兩條寒玉迸一檻暑風清幽意慿分瀉微瀾更合成誰知闤闠裏扃户小蓬瀛題南墩鋪見説龍巖路猿啼今始聞深林埋宿霧髙嶺出層雲天去頭三尺崖垂足二分只愁雙目眩敢恃一杯醺捫歷泥增滑瘏痡日向曛長安九軌道誰識此艱勤和周材雪詩蠟雪緣何喜春工屬此興宿苗沾潤足盩氣滌除仍亂舞隨空逺輕黏徹體凝漫天飛滲玉極目皎鋪繒帶雨聲初急摶風勢轉增危簷飄邃幕疏屋灑寒燈瑟縮鴉棲怯跳梁犬力勝須臾平坎窞頃刻沒畦塍梅李看山木瓊瑤數塔層寢眠寧有道賦詠愧非能郭履愁離席孫窗但枕肱凍從金井水清挹玉壺氷銀闕何勞問雲臺取次登漁蓑真好畫栁絮足多稱栗冽驚殘嵗淒涼感舊朋戴君聊欲訪郢調忽難應綺席交銀竹清河映玉繩詩成陵鮑謝酒渴飲淄澠天朗醒孤鶴風髙激怒鵬齊宫初入夢曉鼓數聲鼟次韻當時長官院中三絶句栁嫩風吹緑花嬌雨妬香欲憑羲馭緩莫遣負韶光簷雀矜巢噪桑鳩喚婦鳴客愁饒餖飣牆外賣花聲畫舸便春漲驕驄惜漲泥歸知何所愜煙柳子陵溪還憩旅店茅軒茅軒有何好小駐客心寬始覺安居樂無如行路難題渚宫畫橋紅去卷蛾眉臺榭遺蹤草樹迷獨有天然無限意一池春水浴鳬鷖萼草春深緑更齊玉鞭何處選芳菲舊時錦繡叢􅋄蝶却傍疏籬野菜飛衢州試院次韻盛當時官長寵示絶句洗眼貪看幼婦詞玉人空遣暗相思憑誰為報歸期近趂得桃花爛漫時丙申春帖子土牛分盡彩泥香動地歡聲入夀觴倍覺今年春意好上元燈火鬭風光碧波樓下銀塘暖麗日亭前瑶草新和氣滿城催燕樂風流太守最宜春暖風漸緑池塘面和氣先薰草木心欲識春來何處好曲屏新稱畫堂深金裁寶勝翻珠髻雲染華箋貼繡楣庭户春歸何所覺暖風吹雪下瓊枝題蔡州栁莊浦雲垂曠野路漫漫策策秋聲作暮寒已分故園天樣逺不知何處是長安題白鳥寺西軒幽窗殘夢午聲雞犬吠人家草舍微惆悵十年無限事又聽啼鳥送春歸天竺寺野塘風細度香蓮碧澗雲深響玉泉從此西湖不須到淡煙寒月一家天題臨漳臺銀河一𣲖接天來碧玉千峯照眼開我欲乘槎訪仙去却疑身已在蓬萊畫棟岧嶤倚翠微玉簫聲斷紫煙飛慿闌萬里秋光老誰會長吟久未歸兩宋名賢小集卷三百四十三
