body:
  text: 兩宋名賢小集卷二百九十一宋陳思編元陳世隆補雲卧詩集吳汝式字伯成旴江人有雲卧詩集遣興弱齡性淡泊鄭圃吾其師及兹拙生事窮窘常經時無方可紆急何以宣中懷柴門蔽殘席咏書倦徘徊呼兒促觴至目玩天雲飛山鳥送新響日遲花露滋頽然醉欄下不省何如時雖非冨貴樂冨貴乃所非踈松碎明月密竹篩清風親友昔與别若謂行相從延企邈不及音容隨想生諒彼亦耿耿飛爽留空形援琴不能寐意乃多於聲晤言豈無偶眷眷詎可忘編蓬諧夙心尊古豈文義所得靡有言應酬聊爾耳室中無萊婦童弱偶成四圍欒豈無思逹此天亦蛻客來問長鬚新醅可篘未行行陟髙岡一顧俯煙水客去不肻留吾歸且休矣歲終呈一齋磊砢千文松清隂蔭林丘豈無棟梁用匠伯不見收匠伯恐未良棟梁終有求天風呼偃蓋五雲常為浮學道非學世韜精飬中和紆朱各自貴誰肻聆商歌皎皎大聖心吻然空自多著書後子雲千載應不磨酬玉汝磔穰畢春氣長嬴換新緑爽風吹涼光紉餌釣山淥鯈魚噀水香菰蒲削藍玊老景結清和心花委濠濮日暮雲倒飛苦雨濕茅屋竒哉五碎金青草眠黃犢天行貴葆真心骨逈凡俗一尺黃菊花秋風播芳馥遊石仙分韻得觀字間攏兩袖秋步入沖寂觀古樹老雲中仙居毁巖半是時零雨髙葉脫凄風亂怪禽走何忙澀水流不漫那知張郎仙譎幻敢懸斷雷書貯紅崖愚下浪傳贊符碑儻長靈鬼物豈歌喚尚云劍埋山安得急摧斷冷翁亦張徒精氣不知散死坐豫樟空鑿竅竸窺看何不葬山原不然棄江岸烏鳶與螻蟻豈食吾一貫獨流天地間萬古亘光燦神仙固渺茫此事良可惋忍哉偷狂兒更搗泥腹爛我來擬少休亭壓不敢玩黃冠四三人拙野只欲竄延坐無好言令我住涼館飯餘且縱觀逸興薄霄漢琴鳴著髙彈奕勝出竒算嘯咏壺隱樓撫事發長歎大書同人名聊欲紀逰玩隂霾淰輕寒日色倐昏晏倩人買村醪煮茗疊肴按清坐二更後一睡各鼻鼾曉來登巖頭棘路解羈絆劃開天盡寬逺景過飛翰幽藂摘新查窺險身發汗居然束歸裝重下西巖畔我思古之人豈只局窮閈觀海登太山深髙世間冠斯巖雖荒榛樂事實昭煥人心本然同今古未容判終當駕雲風髙蹈無畔岸作詩示兒童兹逰吾豈憚朅來嶺上朅來觀白雲翔鸞奮鶴浮天英斜開錦繡春樹滿溶溶半露遙山青忽然變現成蒼狗萬里長風鶴無有海龍塞氣不敢吹日照虛空無老時嶺上朅來㺯明月千里銀光寒不缺蝦蟆魍魎走死盡直數秋毫上金闕心如此月月如心嗒然獨據無絃琴騰騰轉空白日畫詩帶流星過南斗兩宋名賢小集卷二百九十一
