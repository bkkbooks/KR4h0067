body:
  text: 兩宋名賢小集卷一百六十七宋陳思編元陳世隆補梅溪詩集七遊卧龍山呈行可元章我輩逢山眼即青卧龍頂上喜同登圖留沙磧懷諸葛詩誦江濆憶少陵巫峽雲飛天一握瞿塘魚化浪三層俗謂瞿塘峽為龍門籃輿又向人間去回首林泉愧老僧題卧龍山觀音泉呈行可元章去嵗遊廬山社中觀白蓮不飲逺公酒聊酌聰明泉肩輿過武昌乘興西山巔巖乳飲菩薩詩篇誦蘇仙武昌西山有菩薩泉東坡名之夔州苦無井癭俗殊可憐竹筒喉不乾可浣不可煎日汲卧龍水屢賴擔夫肩所取都幾斛深慙未投錢前日招提遊入耳聲涓涓泓澄可照膽草木皆光妍却疑南陽人蟠蟄清泠淵慘淡會風雲滂沱霖普天源如少陵詞清入光芒篇餘波漲瞿塘洶涌吞百川何人著水經漏此不及編道人出新茗林間手新研共以夷齊心來結觀音緣至今清夜夢猶到幽亭邊交遊況離索回首成悽然元章移節西州何時鹿呦呦重訪山中禪僧言前日吾儕將至山中鹿嗚送元章改漕成都取友四十載普天半交遊蒹葭羣玉堂莫盛登瀛洲元章真國士未見心已投雅抱畎畝志共懷天下憂館閣育人材孰云専校讐慷慨論世事不見范尹歐疆場況如許寧不憂宗周精忠屹肝膽苦語驚冕旒君去最勇決我行尚遲留初别擬十載相逢忽三秋龍飛起元老江淮握貔貅禮羅得奇才我幕資良籌人事苦好違壯懷莫能酬去持夔州節遙泛瞿塘舟我亦來自鄱兹行豈人謀八陳觀壯圖三峽窺倒流訪君義勝堂顧我制勝樓如馬謁白帝卧龍尋武侯江亭覽月色園花賞春柔果分餘味甘蘭贈深林幽詩篇浩卷軸墨妙輝山丘氣薄文豔杜詞卑竹枝劉吏事容拙疏交情荷綢繆綸言下北闕繡衣使西州流錢豈君事易地曽何優何不班玉笋入告嘉謨猷巴子國最貧瘡痍民未瘳君去誰撫摩欲借嗟無由我已上詞章歸歟老田疇遲君還日邊寄書到東甌次韻韶美失舟閔書醫師籠參术良將枕戈矢儒生嗜底物書卷挂口齒劉侯西南來嵗月十首尾閉門閲古今過眼分亥豕異書照神藜奇字哭妖鬼許身如蠧魚文字共生死風流反得罪去國果誰恥仙舟載祕閣便腹貯名理江神亦世情逐客多不喜厄同焚書秦惡類滅邢燬沾濡遍箱篋痛惜到骨髓我初聞為驚終夜成坐起得君詩細讀罪已不罪水願言坐嘯餘書著子劉子餘干翁簿以豫去饒之日郡人斷橋見留畫圖賦詩見寄因次其韻我慕鄭子真躬耕老巖谷不慕蘇季子腰金詫宗族失腳落塵網回頭念幽獨向來鴛鴦行進退慚碌碌把麾鄱君國飲水清灣曲緬懷九賢人痛閔千里俗奉揚乏仁風黎庶困炎燠疇能政有成敢望諾無宿厚顔叨祿廩汗背擁旌纛命下忽夔門諸公孰推轂水陸三千里湖重嶺仍復至喜謁文忠秭歸懷李矗鄱人憐老守去類楚臣逐出門橋已斷擁道額爭蹙初無龔黃政濫繼秦侯躅仇香舊同僚别寄兩竿牘賦詩仍畫圖開卷宛在目清音滿于越餘韻到巴蜀我有二頃田荒蕪鴈山腹願畫歸去來芒鞋事耕育齒落用昌黎韻我來饒與夔三載墮兩齒懸知年非永早悟仕當已要須未落時猛效二疏止何為一再落不已良可恥慨然懷古人未有長不死因思年方少輩行多勝已顔紅齒牢潔往往同逝水吾雖況如許寧復老彭比覽鏡視顔色今昨不相似行年五十五萬事可休矣功名與富貴磨滅何足紀但願早還鄉俯育三百指婚嫁畢兒女松楸依怙恃弟兄飲真率故舊忘汝爾齒牙任搖脫肉食吾不視有身久為患無齒實堪喜始憂笑韓公可惜陋子美未必傷我心兹言聞栁子送喻令捫膝先生有鳳毛三年魚邑試牛刀要令人被絃歌化詎肯身辭州縣勞賢令首祠唐質肅詩篇時出楚風騷西歸更勉家傳學雲翼行看九萬高閻普州趙果舟中唱和以詩軸見寄酬以二首聨舟西上沸歡聲趙璧隋珠照坐明二客詞流三峽水百篇詩壓五言城廣文舊舍欣同掃閻嘗為夔府教官阿買奇兒況侍行果州二子皆善作字我以禮賓名客館雲安麴米待君傾燈結寒花鵲有聲書傳雙鯉眼增明人言盡是青雲士天遣相逢白帝城富貴有機端可畏山川非險莫辭行定知蜀道從今易東普南充蓋已傾至日寄二弟雲物書何處山城白帝旁鬢絲驚漸短日線喜初長江冷魚思復陽回鴈戀行小舟吾已具命下即還鄉連日鵲喜東歸之祥也詩寄二弟烏鵲枝頭竟日喧皇恩應許返丘園荒蕪賦就同元亮歡喜詩成異審言定有好音來象闕愧無遺愛在夔門寄書預報梅溪弟灑掃吾廬辦酒尊聞韶美侍郎易任廣漢帝眷甘泉舊綸恩換虎符神應馳北闕眼已見西湖漢有西湖霖雨思賢甚仙槎到漢無書梁形夢寐大厦待公扶閲報之夕夢韶美大書兄字於梁間臘日與同官小集八陳臺觀武侯新祠伏幾何時臘又逢天涯尊酒記遊從未於山下祠黃石且向江濆謁卧龍青眼共看官舍栁白頭相對雪天峯虎符願逐桃符換萬里歸心一片濃讀東坡詩東坡文章冠天下日月爭光薄風雅誰分宗派故謗傷蚍蜉撼樹不自量堂堂天人歐陽子引鞭遜避門下士天昌斯文大才出先生弟子俱第一天人詩如李謫仙此論最公誰不然詞無艱深非淺近章成韻盡意不盡味長何止飛鳥驚臆説紛紛幾元稹有言歐公詩味短者王介甫云行人舉頭飛鳥驚之句味亦甚長渾然天成無斧鑿二百年來無此作誰與爭先惟大蘇謫仙退之非過呼胸中萬卷古今有筆下一點塵埃無武庫森然富摛掞利鈍一從人點檢莫年海上詩更高和陶之詩又過陶地闢天開含萬彚少陵相逢亦應避北斗以南能幾人大江之西有異議日光玉潔一退之亦言能文不能詩碑淮頌聖十琴操生民清廟離騷詞舂容大篇騁豪怪韻到窘束尤瑰奇韓子於詩蓋餘事詩至韓子將何譏文章定價如金玉口為輕重専門學向來學者尊西昆詩無老杜文無韓淨掃書齋拂塵几瓣香敬為三夫子除日蝸舍三年别夔門兩嵗除盆雖具肴簌儺不是鄉閭櫪馬喧新集桃符換舊書何如杜陵老守嵗阿咸居甘露堂前有杏花一株在修竹之外殊有風味用昌黎韻桃李未吐梅英空杏花嫣然作小紅孤城絶塞地不惡一株綽有仙家風高枝半出修竹外醉臉略與江梅同夔州花木不多有封植嘉樹知誰功春光忽到刺史宅天氣正在中和中不同浪蘂落瘴霧自有甘露滋芳叢我來嵗律驚兩換歸興遙指吳江楓曲江往事何足夢願為老圃安我窮明年花開我何處小園數畝蕭臺東蒼蒼煙雨記巫峽酣酣詩句吟梅翁梅聖俞詩杏花酣酣春正明郡圃無海棠買數根植之少陵詩史有遺闕海棠名花輒湮沒孤芳千載逢蘇仙竹籬一笑嫣然發我從蜀錦亭邊來范文正公守鄱公種海棠于郡圃名亭曰蜀錦遙入蒼蒼煙雨窟綺霞曉抹神女肌香醪春醉明妃骨鮮鮮絲蘂垂更嫋點點燕脂勻未歇半含欲吐不勝情沐露梳風睡明月為開尊酒苦多病欲插一枝羞白髮照眼千株未觀蜀回首十年深憶越往在會稽訪諸名園海棠最盛何人好事呼名友姚魏不容矜閥閲曽端伯十花詞目海棠曰名友牡丹不與凝香有地何不植負郭無園何處謁不煩飛鵠銜子來自買芳根帶花掘明年髙堂來燕子想見繁紅映林樾栽花老守在何許鴈蕩山中采薇蕨憑誰為問花消息有夢遙驚山突兀自慙不是召伯棠那得詩人歌勿伐次韻林江州題高逺亭眼明廬阜翠橫空疑是雲頭屹夏峯遺迹君應懷聖治聖治峯在太平興國宫故家我亦念歸宗山南歸宗寺乃逸少舊遊遙瞻瀑水三千尺猶隔巫山十二重亭上主人髙更逺天然丘壑在心胸詩史堂荔枝歌君不見詩人以來一子美莫年流落在夔子賦詩三百六十篇西瀼東山客愁裏何人作堂畫遺像收拾光芒榜詩史堂前何有有荔枝樹猶未老熟獨遲世人貴早不貴晚儻非我輩誰賞之涪陵昔遭妃子汚萬顆包羞莫能訴瀘戎一經少陵擘至今傳誦輕紅句少陵傷時淚成血一點丹心不磨滅散成朱實滿炎方風味如詩兩奇絶樂天曽畫忠州圖自言香味人間無樂天詩云嚼疑天上味嗅異世間香君謨亦作閩中譜陳子聲名重南土何如詩史堂前株正是一飯孤忠餘人為世重物亦重端如丈人屋上烏巴圖閩譜合避路奚用品第分錙銖才先熟者如楊盧但可與之作前驅閩娘十八婢妾爾將軍大樹真傭奴我生四百餘年後來作先生遊處守登堂三歎荔正丹聊效栁人祠子厚安得先生今復生添賦夔州歌一首少陵有夔州歌十首要使荔枝之名長不朽嶽陽樓後樂先憂記飽觀兹樓今始得憑欄吐吞五水波濤濶出納三光境界寬黃帝樂聲喧廣宙湘君山影浸晴瀾江山何獨助張説收拾清詩上筆端過仙亭此處神仙幾度經老松枯朽稚松青如今想作天仙去不復飛吟過洞庭池之清溪如杭之西湖某歸自三峽維舟弄水亭南望齊山翠微在眼登譙樓望九華見一峯奇甚呈提舉李子長知郡趙富文城南風物似西湖萬里歸舟入畫圖光潔貯懷便弄水翠微照眼稱提壺浦無時節秋尤好池有精神貴可呼最是九華知客意倚天遙露一峯孤子長和詩復酬二首往嵗遙從彭蠡湖常山地閲武侯圖忽乘雪裏子猷棹欣對花間太白壺鴈宕寄書知有便天台采藥定相呼兩翁異日為鄰舍笑説江山大小孤君往東湖我左湖田園歸去亦良圖縱如傳説妙調鼎終羡淵明高引壺清峭臺中各陳迹翠微亭上偶歡呼江東江右從今後永夜月同千里孤子長招遊齊山路經秋浦上崔嵬不負孤舟萬里回峯比九華微具體山中有石洞疑三竺逺飛來勝窮巖石玲瓏地秀吸江湖浩渺杯先却紫微期一月菊花未放桂花開朱仲文和詩用齊山韻以酬蜀山同我上崔嵬峽水相隨共載回秋月迎人霅川去義風吹客浙江來山遊未盡無窮力酒興應嫌有限杯凖擬吳中作重九菊花休道不須開子長和汪樞密齊山詩復用前韻腐儒無用分投間吳蜀分符祗強顔去訪少陵三峽水來尋太白九華山小舟載酒清溪口健卒傳詩白浪間風伯相留作吟社願低筆力許追攀池陽阻風留十日舟楫何濡滯秋深風未西五旬從白帝十日尚清溪胸次澤吞楚眼中山見齊主人殊未厭壺榼屢提攜子長攜具至溪口復用前韻有客雙蓬鬢歸來灩澦西符分三竹使地見兩梅溪舟行梅溪豫家亦有梅溪舟遇先逢李杯行酒到齊他年石橋路歸去手應攜九華山九芙蓉自九天來太史南遊山未開仙境曽經謫仙眼佳名傑句兩崔嵬舟出清溪尚逆風觀山却得少從容浮雲不礙天邊眼放出神仙八九峯我在芙蓉山下家四年秋色隔天涯如今漸覺鄉山近己見芙蓉吐九華江南一嶽占青陽多少神仙此地藏聞説仙翁搗藥處鳥聲依舊克丁當山中有鳥啼聲日克丁當時人呼為葛仙翁搗藥處九華山下化成寺太白書堂高處開想見江山無此境故宜頭白懶歸來兩宋名賢小集卷一百六十七
