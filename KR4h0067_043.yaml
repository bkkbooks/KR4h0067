body:
  text: 兩宋名賢小集卷四十三宋陳思編元陳世隆補獨樂園稿二喜雨二首呈景仁侍郎兼獻大尹宣徽纍日增煩暑通宵結薄隂蒼茫變風色散漫作春霖野店垂柳重僧房緑篠深疏慵尤得趣閉户擁重衾漠漠春隂合爞爞旱氣收人心方有望時雨不須求豈獨老農喜仍令思客留洛城花未謝作意更同遊送史館任祠部顓河東轉使問望簮紳舊恩華雨露重圖書周內史汾澮晉全封秀發千尋望寒生百錬鋒歸時門有戟惜别更從容初六日四老會茰房迎令節菊蘂入芳筵華燭初長夜清霜未泠天悲風咽橫笛驟雨送繁絃聊附鄒枚客敢希園綺賢忝職諫垣日負憂思緬思雲夫處士老兄蕭然物外何樂如之因成浮槎詩寄獻以抒鄙懷秋水浮槎客漂如一葉輕鷗羣須仗信鯨口幾忘生耿耿天津闊滔滔海浪驚何時還故土懷糈問君平相國祁正獻杜公衍挽詞三首舟楫才猷大冰霜德操堅陶鈞成茂業書史樂高年瞻望簮紳共吁嗟館舍捐舉時無異論方信令名全釣玉吳臺舊誅茅梁苑新位登華衮貴家似布衣貧直道高當世清風遺後人千秋寒照目竹帛不棲塵先子同烏府知音誠皎然脫縗來拜伏撫首辱哀憐逮此泉扃掩空悲塵網牽無由懷酒絮灑涕望新阡病酒呈晉州李八丈身如五嶺炎蒸裏心似三江高浪中誰道醉鄉風土好舟車常願不相通和安之久雨秋霖逢甲子禾耳恐須生流俗幸無驗高田猶有成潤唯藜莠得爛與蕙蘭并早晚浮雲豁逍遙賦晚晴送趙殿丞象字子輿歸成都祀明堂禮畢子輿新升朝以恩官其父大理評事賜告歸寧得其除書以俱二三同舍為詩以紀其美僕得回字蜀棧錦衣來高堂綬笥開恩輝同日至喜色共春回駟馬過鄰社朝裾捧壽杯吾生無此樂空使寸心摧謝始平公以近詩一卷賜示皇家駿命承蒼穹蒸民之傑生維嵩聖賢會合若符契坐致四海登熙隆三階清平九鼎重指揮拱揖安華戌人情誰不樂將相往往皓首忘疲癃北平飲乳尚懷印千秋乘車猶入宫唯公致政年甫至耳目明利志氣充幡然脫去萬鍾祿羽儀高遠如翔鴻靈臺不復絓塵務至德恬淡含黃中英華純粹積不發事業轉為文字工大篇短韻間金石遠追吉甫流清風刻雕衆物非用意默與元化參神功應劉鮑謝事竒巧細瑣豈足誇才雄祼圭夷玉清廟器肯與環玦爭玲瓏絳帳生徒東閣客微官拘縶如樊籠言詩何敢望商賜幸得誦詠祛童蒙昏花病目不自惜服膺盥手書一通千金之産不可易子孫寶蓄傳無窮寄題傅欽之濟南别業縣郭遙相望修篁百畝餘林間清濟水門外太行車道勝隨宜足身間與世疏何時容命駕采蕨釣肥魚題致仕李太傅園亭漢家飛將種氣概耿清秋解去金貂貴來從洛社遊清商擁高宴華館帶長流可笑班超老﨑嶇萬里侯早春璿霄轉斗車春意逼梅花熟寐侵街鼓間情到酒家晴陽浮地末寒色斂天涯歸雁空餘迹朝來印浦沙秋日登觀信亭西風連夜雨草樹巳蕭條宿靄稍零落寒山更寂寥林紅猶帶日岸白欲生潮新鴈來何處離離天際遙謝胡文學九齡惠水牛圖二卷牛生天地間益物用最大其功配坤元象爻參衆卦血毛類上帝肸蠁景福介宗廟及賓客百禮無不在引來犁中田粒食蒸民賴服箱走四方竭力任重載昔聞戴叟筆圖寫窮纎介胡君繼其妙差肩立異代公卿仰名聲一觀不可丐如何散賤者遽有雙圖賚所嗟性顓愚雅不曉佳畫有如歌九韶鐘鼓樂聾瞶得之乃虛器無異居大蔡神物恐化去立召風雨怪雙圖雖卷還重貺敢不拜旬慮十七韻呈同舍府官無旬休慮問乃遊息詔書禁從詣還舍始朝食緩帶對藜羮下筯免促迫門前吏卒散却掃謝來客北軒有藤牀今晨始拂拭蓬髮亂宜梳霜髭間可摘開囊曬藥物發笥出書册菊畦親灌浸茶器自涓滌於時孟秋末天晴色紺碧林葉雖未零風聲己淅瀝神明還九重清氣襲百脈征夫解甲胄疲馬脫羈靮蜚鳥開樊籠跳魚出鼎鬲形骸盡我有不復為物役雖非久安逸幸得少頃適訟庭止敲撲咫尺異喧寂明朝不能然顧盼愁月夕新遷書齋頗為清曠偶書呈全董二秀才并示姪良富長夏暑候濁雲火高巑岏豈徒肌骨煩水港川流乾新居得南齋楹檻稍虛寬森羅對草樹曉暮清隂寒泛掃布几簟氣體粗可安圖書雖非多亦足備覽觀聖賢述事恭細大無不完高出萬古表遠窮四海端於中苟得趣自可忘寢餐况今有道世榖祿正可干朂哉二三子及時張羽翰力學致顯位拖玉簮華冠毋為玩博奕趣取一笑歡壯年不再來急景如流丸漁父楚岸橘花香扁舟泛渺茫短蓑衝密雨素髮淨秋霜煙外鳴榔逺波間擲線長無人識名姓擊楫入滄浪湖上村家萬頃寒煙外茅茨枕碧流楓林巢乳鶴沙漵亂鳴鷗漠漠菰蒲晚蒼蒼蘆荻秋欲過南浦去籬下出漁舟西湖佳麗三吳國湖光蕩日華魚驚動蘋葉燕喜掠楊花雲過山腰黑風驅雨腳斜煙波遙盡處髣佛見漁家放鸚鵡野性思歸久籠樊今始開雖知主恩厚何日肯重來酬邵堯夫見示安樂窩中打乖吟安樂窩中自在身猶嫌名字落紅塵醉吟終日不知老經史滿堂誰道貧長掩柴荆避寒暑只將花卉記冬春料非空處打乖客乃是清朝避世人和邠守宋度支迪來卜居與南園為鄰弱冠交遊鬢髮蒼飽諳官況好深藏間居共買一㕓地盡老常依數仭墻雖喜卜鄰同晏子却慚推宅異周郎何時稅此馮熊駕倚杖相迎立路傍太行象帝胚渾散愚公轍迹開橫行四極外蟠據九河隈岪鬱天門近崢嶸地軸回陽崖明草樹隂壑轉風雷波沓羣峯涌雲奔峭壁來猿巖垂磊落龍窟鬭喧豗噴雨驚湍灑跳星巨石頽平塗憂屐折跬步戒輪摧覆頂千春雪緣潭萬古苔谷盤容國士髓裂餌仙才晉市飛樵札燕郊落燒煤棊圖分冀野蟻壤認叢臺在昔王塗塞嘗聞霸略恢嚴關隂伏甲間道夜銜枚挾詐揮金斗貪功襲墨縗戰場空爝火京觀悉蒿萊險易曽何變興亡只可哀隆平方恃德襟帶自崔嵬次韻和鄰幾秋雨十六韻氣象殊朝夕興居錯晦明混元初不異霪雨浩無程墊隘寧天意咨嗟固物情曣㬈日暖也方有望薈蔚己隨生杲杲升還隱悽悽斷復行亂莎常被徑荒蘚已緣甍轍迹康莊絶潢汙壠畝平茅茨不足庇禾黍若為成蟋蟀頽垣泣蛜蝛壞竈盈乘時衆鴟舞得意怒蛙鳴牛馬誰分異蕭蘭巳混并居間猶叵度負重況遐征舟泊川無渚輪推路有坑轑羮愁病婦煬竈擁寒嬰災不妨明德神應格至誠淳光終下燭時藿久心傾觀僧室畫山水畫精禪室冷方暑久徘徊不盡林端雪長青石上苔心間對巖岫目淨失塵埃坐久清風至疑從翠澗來答師道對雪見寄直講陳洙隂風一夕驚曉雪滿都城氣覆千家白光連萬象清戀空飛不下弄態舞相縈歷亂看無定飄颻轉未成綴垣時缺剝壓竹乍敧傾細隙過無滯寒窗拂有聲園林勻結練觀閣巧雕瓊草木情先喜乾坤意亦榮營魂頓疏健病目暫虛明郢曲高誰和羞將叩缶并雪霽登普賢閣積雪明朝日山河坐可分嶄巖初解凍片段未歸雲濶望窮人境高尋俯雁羣開門枝鳥散玉絮墮紛紛歸田詩同年張聖輔嘗語及仕宦之多端因稱仲長子有言使我有良田美宅背山臨流適意極樂誠無事於此慨然感之作歸田詩五章秋水風波大嗟嗟未可遊漁樵自應樂圭組為誰憂直木知先伐明珠忌暗投果然鈎可曲不惜取封侯紱冕誠虛器簮裳悉畏塗觸機身未保好直道先孤甔石曾何有田園浪更無可能推兩耜沮溺共為徒聖哲雖云遠遺文幸未亡沉冥觀禮樂髣佛見虞黃雞黍延三徑琴書樂一堂逍遙名教內富貴亦微茫松菊陶潛宅蓬蒿仲蔚家行遊筇杖瘦嘯傲幅巾斜屋小疏茅覆門深亂栁遮村童迎客至竹帚掃桃花桑柘緑無際田間戴勝飛清醪迎社熟鳴雉向春肥執耒時將急銜杯日漸稀四鄰能共樂招飲莫相違夜坐春陽氣未勝重為隂所乘涔涔積雨闋慘慘餘寒增流雲鬱不開烈風尚憑陵夜闌閉户牖青暈生昏燈僮僕悉已眠几書久敧憑涉獵閲舊聞暫使心魂澄有如行役歸丘園恍重登又如遠别離邂逅逢友朋嗟嗟宦遊子何異魚入罾奪其性所樂強以所不能人生本不勞苦被外物繩坐愁清旦出文墨來相仍吏徒紛四集僕僕如秋蠅煩中劇沸鼎入骨真可憎安得插六翮適意高飛騰二月中旬慮問過景靈宫門始見花卉呈錢君倚賤生參府僚勉強踰半嵗終非性所好出入意如醉訟庭敲撲喧衆草絶生意不知有青春倐忽己改燧周章連日忙爛漫數宵睡軒窗岌飛舉風雨頗恣睢謂言芳華物狼籍應掃地今晨呼馬出歷獄問囚繫窈窕清宫深倉琅朱門閉廣殿肅層隂虛庭藹佳氣長楊委嫩緑老柏淨新翠薜荔垂蜿蜒竒石立贔屭壯大貌豁然愁憤開精神四面至事役難少留䇿馬去尚睇亦足慰無聊年華不都棄西臺詩二十四韻翰苑昔陪侍天光辱顧瞻寵雖承渙汗功不立毫纎山鹿纓頻頓鉛刀礪不銛拭花眸子缺撚雪頷髭添局影慚尸素胡顔處禁嚴辭盈雖免戾取少豈因亷定鼎分都異張官執法兼剡章愚懇盡出綍茂恩霑原憲非無栗胡威尚有縑求田近瀍洛買宅混閭閻地僻宜花卉兒勤付米鹽倦遊良足悔居吉不煩占裘葛膚無見囷倉飯屬饜僧居間可借野步靜無嫌行樂筇枝瘦延賓稻醴甜麥田泥試屐桑蔭帽低簷愛竹忙猶種貪書老未厭松煙溪石潤檀燼博山尖箋啓來慵拆衣冠脫怕拈紫毫斜倚架黃卷密垂籖涸轍猶蒙潤寒灰免附炎所憂資秩滿但願嵗時淹自是散無用非為智養恬聖朝英彥冨幸許一夫潛風隴首紅旌急樽前翠幕重林端翻遠剎花外轉疏鐘夜寂清機發春闌别意濃如何玉琴韻併欲在青松送吳仲庶知江寧江南佳麗地人物自風流青骨祠靈在黃旗王氣收衣冠餘舊俗歌頌樂賢侯正恐還朝速江山未遍遊兩宋名賢小集卷四十三
