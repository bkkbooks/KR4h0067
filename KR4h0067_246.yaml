body:
  text: 兩宋名賢小集卷二百四十六宋陳思編元陳世隆補翠微南征録五華嶽小春言懷桃李生香花滿溪南州十月尚襜衣春從酒甕榨將出秋在詩囊帶得歸弓射十分方破的棋高一著便爭機勸君莫作等間看毫髮差殊事已非春愁十日春愁不出門出門春事已消魂摘花掀帽倩人插索酒得杯和月吞啼鳥聲中近寒食落花隂裏又黃昏春來春去總休問往事悠悠付一樽呈徐商卿十年憂患謫東南萬事於心了不關病去只愁雙足軟老來且喜一身間人情無處便生怨天道有時猶好還大抵久長居富貴到頭天意亦須慳春逰有感上苑春工到海棠老夫隨分為春忙朱絃轉軫鶯催拍紅粉倚闌花鬭糚吾道幾時曽損益人心今日自炎涼願言相約花前醉一聽兒童號酒狂憂憂吾所謂果何憂憂國憂家卒未休坐法馬遷方去漢釋囚箕子未歸周西風萬籟聲聲恨夜雨踈桐點點愁有客不知吾所向却將米價問南州述懷我生胸次不塵埃不學兒曹剛自媒詩料雖慿風月製宦途還聽鬼神開十年教養闕功名念已灰安得金鑾有清問賈生何事未歸來套筒作箇咿􅀈贅項咽箇中和我萬愁牽一筒作柄簫無竅雙鐡為圜扇有圈身拜却疑人似犬手擎還類筆如椽從今節節能通氣安得常為積蓄錢春郊即事東風吹動綺羅塵翠蓋紅纓處處新蝶翅拍開千樹雪鶯聲催老十洲春人生有酒須行樂吏祿無階且食貧歸客不須籠畫燭醉和明月上雕輪雪天低江濶水連天上下周圍一色兼撲雀獵鷹翻白縞得鱸漁父指青簾馬拋玉勒瓏瑓落獅欠金鈴橘柚添得句莫嫌呵凍筆明年嵗事已堪占田家十絶十幅生綃一墨池盡收好景入屏幃會須少緩丹青筆更倩牧童橫笛歸農夫日炙面如煤絲婦繅成雪一堆早早安排了官稅莫教耆長上門催老農鋤水子收禾老婦攀機女擲梭苗絹已成空對喜納官還主外無多雞唱三聲天欲明安排飯碗與茶瓶良人猶怒催耕早自扯蓬窗看曉星緋袴青衫紫繫腰攬衣隨過水平橋雖然不識風流事也向人前學逞嬌村􅋙奮迅出籬笆欲吠還休喚可拏不是忘機太馴狎那回曾宿那人家畫睂無墨把燈燒豈識宫糚與翠翹堪笑東風也相謔暗牽裙帶纒人腰臠魚炊糝作荷包宿飯無湯暖酒燒放碗出門行一匝小溪新漲已平橋麥飯瓜虀及早催田夫雙眼望儂來油鹽不倩旁人帶日午癡兒猶未回拂曉呼兒去採樵囑妻早辦午炊燒日斜枵腹歸家看尚有生枝炙未焦驟雨牛尾烏雲潑濃墨牛頭風雨翻車軸怒濤頃刻捲沙灘十萬軍聲吼鳴瀑牧童家住溪西曲侵早騎牛牧溪北慌忙冒雨急渡溪雨勢驟晴山又緑别王泰之黃塵漫漫小峯路白石齒齒茗坑渡相亭南來第一程人煙蕭條嵗云暮故人小隱三家村約我旗亭聊一樽相逢此地復相别明朝懷抱同誰論江上雙舟催發前帆風飽江天濶後帆半出踈材闕後帆招手呼前帆畫鼓輕敲總催發前帆雪浪驚飛湍後帆舵尾披銀山前帆漸緩後帆急相傍俱入蘆花灘島嶼縈回斷還續沙尾夕陽明屬玉望中醉眼昏欲花誤作間窗小橫軸贈劉相士班超未侯漢誰識烏孫客韓信已王齊誰知長樂厄彼亦非異術忠諛分黑白直道世且違彼亦何足青自古勳業人把鏡惟自索顧我灑落資足可振翰翮如何汗馬秋英雄尚南謫祗應捻胎鬼手段不合格古括子劉子閲人幾千百一見麞鼠質便許正疆埸知子忠且諛愚固未暇擇萬一符子言亦可名簡册他時雙蹇驢與子訪黃石誚胡同巡嶽昔逰時卿兄嘗過弊廬捫心論事業耐久良非虛嶽今隸城旦氣象誠慘舒髠黥塞糞壤敢辱長者車嘗聞古人交窮逹無親疏富貴不相忘有終還有初與兄三載别無日不引裾中間喜一見欣慰云何如相去天一涯雲濤疏雁魚忽聞夙駕回喜色喧門閭相聞即相别厥意良躊躇嘗聞郢中人結客於樵漁又聞淮南王受德於刑餘嶽既不自撿失身墮籧篨壯士視一死其猶爾欷歔勢分已霄壤孤賤難相於願兄此召還巍然奉中除前巖與西閣談笑看連茹或遇趙可父為嶽聲起居薰風有良便當拜平安書題富沙廟丙寅七月晦富沙居民火延燒至平政橋煙熖環照定王之祠吏民俱禱旋獲反風之應環祠民屋悉為煨燼而祠之簷桷無一焦灼因感神之威靈而詩之平政橋頭火爍空富沙宫殿烈煙中地形難撲徒臨水天意能回遽反風十里爆雷驚客夢萬家全璧賴神功君王注意恢神武更乞威靈為保沖次翁正叔溪山勝逰之韻溪南風物照窗扉溪北蘭舟纜翠微雙槳碧雲苔草合一簾紅雨杏花飛只知有酒酬佳景却恨無繩繫落暉更約風流衆年少明朝依舊莫相違春郊即事東風吹不斷輪蹄處處鞦韆環珮飛剪翠弄糚歸髻掠亂紅翻錦上屏幃花應笑我春常醉燕解嘲人夜不歸莫怪逢春太娛樂人生能有幾芳菲悶題此心忠義出天資奴𨽻兒童莫強為燕雀不知鴻鵠志牛羊徒飾虎狼皮事當桀犬吠堯日書在塞鴻歸漢時拔劔問天天不語料天還愧負男兒呈陳平仲逹人安分樂平生不與隂陽造化爭漢節有人恭且止楚盤無客遂當行薦公地栗三杯酒分我天香一味羮大抵有施須有報木桃瓊玖愧詩評紙帳主人氷雪灑胸襟買宿銀城不計緍春草有詩皆白雪秋毫無夢到紅塵月娥好作雲間侣風伯不寒氷下人更喜五更窗外月梅梢分得一枝春兵兵貴先人斯奪人莫教間諜漏真情漢因有備胡終退秦為無人楚始爭卦向爻中分損益棋於局上定輸贏不知都督三邉者還肯江湖問一聲自訟我生素不事詼諧簷板方頭喚不回遇事豈容無正論濟時未必有長材頭雖五鼎不辭劔口恐三緘合用枚不是平生太剛介如何蹤迹尚塵埃紀事古今多少好英雄未必姦邪未必忠上黨鼎膏留地白長平坑血濺天紅三邉傳檄兵雖息二𣙜開場貨未通更願年豐富金帛飽裝駝駕為和戎過鄱陽湖北風翻雪鼓雷霆舟子停蘭亦斷魂看我金鱗三十六為君一躍上龍門兩宋名賢小集卷二百四十六
