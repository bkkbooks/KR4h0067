body:
  text: 兩宋名賢小集巻五十宋陳思編元陳世隆補東堂小集毛滂字澤民江山人東坡守杭毛為法曹秩滿辭去是夕東坡宴客有妓歌惜分飛詞問誰所作妓以毛法曹對東坡語坐客曰郡寮有詞人不及知某之罪也翼日折柬留連滂因此得名政和間守秀州風雅和恵吏民懷之有東堂集詠桂玉階桂影秋綽約天空為捲浮雲幕嬋娟醉眠水晶殿老蟾不守餘花落蒼苔忽生霜月裔仙芬淒冷真珠萼娟娟石畔為誰妍香霧著人清入膜夜深醉月寒相就荼蘼却作傷心瘦弄雲仙女淡紵衣烟裙不著鴛鴦繡眼中寒香誰同惜冷吟徑召梅花魄小蠻為洗玻璃杯晚來秋甕蒲桃碧響應山禱雨寄東坡靈意不肯休垂垂閣雲端餘暖蒸衣裘勢作墮指寒曛黄陰雲來俄忽急雨􅟎空階答檐語跳珠上闌干世尊儼無説凍坐誰為歡蕭條僧舍影癡兀依蒲團相照憐短檠坐恐膏油乾勞生竟何如嵗月如走丸七星在長劒細事何足彈尚想丘園人慙頰時一丹徘徊經屠門飽意只自謾顧惟揮牛刀庶足厭一餐不然學農圃趂此筋力完年豐得飽飯日晏眠茅菅咄嗟萬里空俯仰百嵗殫行止信流坎所遇隨足安勲名片紙薄天地如瓢簞離騷幸相逢濁酒聊自寛誰與談此心夜氣方漫漫絶牆過飢鼠翻倒争餘殘紅梅何處曾臨阿母池深將絳雪㸃寒枝東牆羞頰逢誰笑南國酡顔强自持下渚湖春渚連天濶春風夾岸香飛花渡水急垂栁向人長逺岫分蒼紫垂波映𣺌茫此身萍梗爾泊處即吾鄉碧玉潭水面平波一境空夜深明月照龍宫猿聲未響潭先響一樹花開二樹紅定光禪院曉出開霜阪飢烏啄麥畦山腰餘雪瘦天面冷雲低寒意梅花北禪心栢子西窻前借殘月照我渡前溪兩宋名賢小集巻五十
