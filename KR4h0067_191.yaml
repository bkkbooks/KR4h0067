body:
  text: 兩宋名賢小集卷一百九十宋陳思編元陳世隆補方壺存稿一汪莘字叔耕休寧人卓犖負俊才不屑習舉子業隱居黃山好讀易於諸子百家之書靡不研究嘉定間詔求直言莘三叩闕陳天變人事民窮吏汙之弊行師布陳之法不報時晦菴朱子召赴經筵莘致書言財不待先生而富兵不待先生而強惟主上父子之間諸公所不能濟者待先生而濟朱子深然之後徐二卿詣帥江東聞其履行髙潔將以遺逸薦未果晚年結廬栁塘自號方壺居士其詩造境生而出語險不拘繩墨法度自為方壺一家言水天月歌朝立寒溪東暮立寒溪西一到神頓領熟視眼更迷水光不見水但見青光無表裏天光不見天但見一片清煙涵無邊水中有天天不濕天中有水水不入天耶水耶墮渺茫只是天光與水光月來水天中水天裹月如不裹月去水天中水天鎖月如不鎖明月不來不去時琉璃泡中珠一顆先是水天莫分别更添月色更親切水色天色月色劈不開水光天光月光拈不來夢中酒渴不可忍一口吸下驪龍腮方壺自詠十首性靜無一物心生有物端曽將魂魄鍊不被鬼神瞞縱步地雖窄仰頭天自寬裁詩偏得偶遇卦只成單三萬六千刻四千三百時不思人事汨只怪嵗華馳拚命嘗因道忘家亦為詩幽懷聊自遣俗子莫令知生死何時了盈虛祗足傷誰能一刻靜大勝百年忙反已求中帝逢時説外王紛紛徒籍籍踽踽亦涼涼事體向晚境情懷非少年生平不得地至死亦由天坐背暑彌勝行膺寒愈堅願言過去苦莫與後來賢白晝常陪俗清宵得養魂幾時成草屋終日掩柴門事迫文方出身間道始尊世方懷祖逖吾已弔劉琨無象始無假有形斯有邪盈虛憐日月聚散笑煙霞一性亦無我五行何况他誰能離火宅吾與上牛車殘臘天垂老新春日始孩元君歸渾沌青帝出胚胎樓上獨倚處海邊相見來間思栽五栁怒欲拔三槐百嵗已過半隻身誰與偕得因微悟道失在太開懷且託山花宿時從水竹齋神回天上活骨付月中埋興發花開處情生葉落邊既為欣厭惑未脫死生纒鑿破心中月衝開頂上天俗儒應大笑古佛不曽傳誰和陽春曲仍操白雪音郊寒猶有骨島瘦未無心雲到散時看月當虧處尋可憐持玉尺終不度金針書十首後直寫胸中事誰拈紙上塵興來那暇懶得處不容厪行有鬼神覷詩防天地嗔歐蘇尋後輩郊島是前身羣玉堂即事真直院德秀招飲於羣玉堂自陳祕監武李祕閣道傳任侍講希夷而下有丁大著端祖宣校書繒曽侍郎從龍劉祭酒次臯凡八人當日相引臨池看金魚撫琴壺奕碧箋小紙吟詩誦賦諸公或誦余詩或誦余賦皆當日事也賦詩以紀一時之事併致懷歸之意蓬萊道山到者稀忽隨飈駕同來歸天橫閬野望不盡地絶瀛海如無依初得松門入蕭瑟漸繞苔徑穿芳菲竒花異卉不可識但覺春是人間非髙簷長廊白日靜朱簾緑幕清風微仰觀羣玉三大字始憶上帝書所儲赤圖緑牒文字古空桑孤竹音調希飲中八仙各灑落瓊林風月相光輝坐而投壺妙貫耳立而對奕工解圍吟詩誦賦清且永何事顧我頻歔欷君不見咸平景德時太平都在楊劉詩又不見慶厯元祐際後來誰與歐蘇繼只今延閣多才賢如玉在山珠在淵楊劉歐蘇未為老秦黃諸人俱少年有客野於孟東野更宜盧同作詩社碧箋小紙辱佳命青林紫筆令揮寫君山天酒澆枯腸吸盡一架酴醿香贈君千嵗白鹿健報我三尺金魚光羽陵蠧簡非我處老上龍庭欲飛去鳳臺南軒又招手第一內宅由來住東西南北身已老安得丹液還元腦碧桃洞口花亂飛留待歸來不須掃秋懷十首形骸欹仄面皮黃破屋三間號栁塘自大暑來真畏暑到微涼處便知涼四野秋風交敝廬時平不用藺相如有人來問生涯事指點蓑衣學釣魚秋雲無復似春濃天地何人到此窮斜日淡煙今古恨如何都付與孤鴻北渚風來禾葉秋洞庭波起夕陽收楚人臨水為誰立帝子隔煙相對愁自分為人類魯臯幾將心事泛吳舠手摶日月供宸筆揀盡金雞玉兔毫曽向瀟湘遇水仙倐來如月去如煙深林一笑聞山鬼余處幽篁不見天傷春未了又悲秋無復歡悰到酒舟茅屋半欹籬半倒伏羲一卷在牀頭玉露金風刮夜天疏桐缺月耿忩前十詩未盡窮愁志説與家僮汝自眠一帶青巒失舊青荻花楓葉夕陽明間思天上多官府自是幽人道未成虞帝周王不復生幾多豪傑應離明鳳凰覽遍真難合直至而今欠一聲别真直院西山去年來見公略以書自陳今年來見公知公意已親一見為我喜再見為我顰溫存到風雨檢點及米薪會我羣玉堂坐上皆偉人欲引野鶴姿軒昻出京塵公自哀其窮我豈有足珍但願公富貴何憂我賤貧過從兩三月意味十萬春將非前世緣更結來生因所恨難久留歸理青溪緡公亦厭承明請牧江海濵嗟我老於行東西足悲辛那宜種橘柚幸使守松筠次潘别駕韻野店溪橋栁色新千愁萬恨為何人殷勤織就黃金縷帶雨籠煙過一春潘别駕自祁門回白馬嘶風入紫陽使君一笑别壺觴秋原是處堪圖畫豆子花紅稻半黃遊南山山蹊黃葉從過滿石案蒼苔不用除壇上古松巖畔竹切須留伴老僧居壽髙內翰三首胸次包天燭九垓正須博大濟時材朝從碧落摶風角暮泛靈槎出斗魁别墅已將修竹隱朱門仍向鏡湖開如今且為蒼生起一取前賢氣焰回璞玉渾金表裏同心知言動有隂功一門人傑是龍種三世科名各繼宫華蓋共瞻天座北勾陳長扈帝垣中野人只待秋風起去向西湖作釣翁鶴立青松老令威佳辰山色倍清輝曽扶東壁排雲出幾跨蒼龍帶雨飛竹簟水風須得意玉堂春日即催歸願公與國為梁棟千載煌煌照太微送趙君十絶存八首皂蓋朱轓練水濵春生秋殺總精神須知愛士何曽泛屈指應無第二人醉把金鞭度緑楊軍民夾道笛聲長紅旗千面詩千首半雜風雲入建章荷花髙髙荷葉低夕陽初落畫橋西湖州士女來相接爭擁蘭舟入霅溪歸去苕溪理釣篷風清月白水精宫青蓮居士爭間得時答天書一兩通風雨黃昏自掩扉燈前時復一歔欷兒曹相問緣何事為道君侯早晚歸一榼村醪插别筵清風急雨送歸船望中未是湖州境便有吳歌唱採蓮練水至清無淺深使君何日再登臨請看江上千株栁盡是君民離别心有客胸藏太息書蕭蕭白髮不堪梳君王若問江東士莫只相憐誦子虛黃山髙新安黃山為吳越諸山之祖頃臨川孟侯在郡日怪余無黃山詩因賦此篇黃山髙哉巋然為江東之巨鎮兮壁立於兩浙之上遊摩天戛日以直上陽枝隂派盤數州四海不知雨根本行人但覺雲飛浮嘗試芒鞋竹杖逮乎其間兮一溪桃杏紅爛漫萬壑松柏寒颼颼懸崖絶磴可望不可到兮古木倒挂險更遒上有靈泉瀑布千萬道如銀河自天爭瀉而競注兮砯雷濺雪隱現穿林幽中有青鸞黃鶴千萬對雄唱雌和迭舞而交鳴兮深林自適復有雪白數點之猿猴山中自昔無厯日花開葉落成春秋殘英脫葉不知其所從來兮但見夫澗谷之間桃花如扇松花如纛竹葉如笠蓮葉如舟菖蒲九節餵白鹿靈芝三秀眠青牛人間三月春已暮洞中花卉春長留竒香異氣逐風去散落塵世誰能酬黃山髙哉雲際一峯尚可畫雲外一峯畫不得霜繒鋪了掉首休丹砂一峯燭天爭日月九龍一峯枝地張旗旒天都一峯傑出於三十六峯兮星斗森羅挂珠殿日月對展瓊瑶樓中有一人兮龍冠而鳳裘左容成兮右浮丘我時收却釣竿樵具作一束投諸曹阮溪中流浴余身兮湯泉風余袂兮帝所鼓隱隱兮管啾啾兮水精盤兮碧玉甌帝酌我兮勞我左右為余兮凝眸指余以南峯石壁記授余以紅鉛黑汞大丹頭黃山髙哉余將覽秀巢雲鍊其下坐令萬物不疵癘黍稷盈疇觀雪行仙人剪冰銀河邊仙風吹散花聮翩明星撩亂入我眼風緊一陳隨天旋如今誰卧剡溪雪如今誰訪山隂船古人氣韻不可見曉來對此空悠然簷前未覺眼界豁臨眺忽憶樓居仙若為留得數玉樹六月繞屋生清妍秋興間步水南因水北仍從山後復山前日歸海底龍方覺月到天心虎正眠天外涵天心廣大月中吐月性光明夜來飛上崑崙頂獨倚瓊樓嘯一聲一旦秋風起洛濵東歸聊復寄鱸蓴如今已在漁鄉住宜與清朝作散人水邊楊栁怯秋風憶昨杏花相映紅心地不隨時節變始知天下有英雄羅衣嫋嫋帶涼風人道秋空豈是空白日不知天上事衆星環拱紫微宫七尺經霜翠竹竿斬來石壁釣江湍絲頭垂下驪龍口掣得明珠似月寒秋天尤覺曉天清仰首看天俯首行不但長歌聲似鶴一身渾似鶴般輕訪孟守紫陽佳山水帝室雄垣藩桑柘若雲屯梨棗如星環邇來十四載有失漢詔寬坐令隴畝上面作百摺酸侯來自江西與物破險艱處處春風村家家秋月灣矧侯老儒術淵源起波瀾文盟後韓孟詩社前張樊賤子昔好學何理不仰鑽風雷繞腸胃日月懸肺肝宇宙在掌握鬼神露毫端身由疾惡病家以論事殫天門守九虎歸卧牛衣間誓欲滅此賊使天回正觀豫子欲趨趙聶生方入韓匕首忽電掣鐡椎已雷鑽世無伯牙手鍾子每長嘆世無子期耳伯牙淚空彈人生樂相知相知良亦難不知起胡越相知同嵗寒自侯之來矣願言識孔鸞秋風動心氣朔雲資瘧姦及此春日舒扶病猶蹣跚怪僕來何遲為僕留城關見侯亦何為明珠傾月團見僕亦何為伸此蛟龍蟠龜老殼愈堅鶴老頂益丹自恨身已老徒重鈍與頑終憶玉川子干謁非所安山不養伯齡伯齡不厭山除日寄黟山周尊師眼有神光射靄山不須更問列仙班道人四海都遊遍只有先生一個間東行途中有感一路桃花愁殺人栁塘茅屋正宜春春風不是不相識不遣春風養病身去昌化縣四十里留宿陳東魯南樓碧玉山中白玉溪武陵村落午時雞南樓一覺春宵雨夾路桃花送馬歸壽髙祕書萬壑千巖映翠霞越王城下競傳誇青天白日祕書舫乳燕鳴鳩內相家髙浪趣潮滄海直大鵬橫擊五雲斜自吹玉笛相為壽昨夜菖蒲吐紫花訪湯倅文者道之器詩者文之精世儒失本原謂以一技鳴僕昔頗好學不與時俗并始求為已事中有濟物情靜與古月俱動與秋陽行先聖此從容風流被後生身世兩相違淹留竟何成一丘聊自適萬化爭逢迎天地動根底動植陳性情日月顯處妙鬼神隱中明老佛既恍惚諸子亦縱橫興衰雜今古憂豫難悉平時買白玉板寫此朱絲聲似被天公嗔魑魅出見驚秋霜下黃葉春風自抽萌蘭花待春風深林含芳馨屬聞賢别駕古學兼韶韺仍聞吐佳句氣挾蘇州清今朝别柴扉匪敢投公卿臭味略相似長松與茯苓懷朱晦菴先生道在羲皇孰斷金至今出處合天心青山白雲有生路流水落花無足音世外太古日色靜洞中一片春風深自憐晚輩膺服久亦許杖履來相尋壽何尚書雪艇風帆去玉京故家猿鶴相歡迎九天氣母壺中足十月嬰兒頂上行曽問何修能至此但須無欲自然成夜來夢向山莊立一炷清香徹太清寄商察院飛卿年嘉定四秋竊伏西湖雪鬢催長歌聲斷鬼神哀青天有月無人看白帝行春待我來近水逺山俱冷淡敗荷孤葦尚低回今朝欲向青門道出到踈籬意已灰訪建康留守敬公太古明月服愛公九天寒露漿畏公龍泉太阿劍喜公斑虎花蛇囊月中含月作懷抱露表滴露生清涼風塵澒洞要英傑太平潤色須文章公昔荷槖侍紫皇公今握符坐建康綸巾羽扇夏日靜鳴鳩乳燕南風長青天有月來堂堂白鷺分水鳴湯湯城頭獨立是誰子身長七尺鬚眉蒼袖藏古劍咸陽市淚逐東風灑桃李一心只望金陵飛未到三更已千里北斗錯落垂寒光願公提起歸八荒刺人如影那見血激天孤竹和空桑謁真直院栁花滿路口占一絶見直院誦之三月天寒尚臘衣錢塘遊了嘆斜暉欲見蘇小無由見惹得楊花滿袖歸真直院招飲道士羣玉堂自陳祕監而下凡八人坐上賦絶句壓架春風十萬條護簷霜幹自蕭蕭一朝盡識羣賢面陡覺星辰共碧霄直院自言願所以相拯之意有非毫楮所可宣者歸途口占一絶為寄傾國佳人默怨天紅顔過了拜尊前世家大族多兄嫂獨得公姑分外憐訪曽侍郎青天蕩蕩摩青銅紫微將相環西東大鵬一擊九萬里兩翼不鼓乘長風大鵬飛到天門下天門無不聳觀者列星退步失光彩九虎低頭若凡馬有鳥決去搶榆枋望而不見空斷腸青天愈髙鵬愈逺豈不有意招八荒我舍新安來狂歌錢塘市上有無情之吳山下有傷心之江水春已暮人未歸平生不問鱖魚肥若教買得青山住飽食笋蕨歌春暉對月與念六弟談化作新月長眉清娟娟照茅舍坐有吾弟俱因得窮造化初嘆此箇月涵浙復涵灞終憶此箇月古夜復今夜日月天中行地下亦雙明天地在太虛一點如流萍水輪載以浮風輪吹不停地譬雞子黃天乃雞子清天半繞地下天半出地上星辰附天旋晝夜成俯仰吾嘗揮雷鞭騎龍日宫前整頓朝東皇拜手金烏旁日宫月宫留不住翻身透過天頂去雙手撥轉赤精毬山河萬象在裏頭此時見天不見地憶嘗閲盡世間事幾度穿入月之內幾度穿入天之外幾度天地劫火來只有太虛元不壞我自太虛觀世間釋迦老子皆等間兩宋名賢小集卷一百九十一
