body:
  text: 兩宋名賢小集卷三百六十一宋陳思編元陳世隆補六朝遺事雜詠楊修字貫失考新宫玉案金爐對御牀巋然應是魯靈光螭頭直上雙魚尾不讓西京舊柏梁靈和殿得地恩深雨露遍丹墀左右玉階前君王屬意君知否恰似風流美少年臺城六朝遺迹好山川宫闕灰寒草樹煙江令白頭歸故國多情合賦黍離篇石闕雙石巍巍慰眼青滿朝珍重佐公銘官城府寺俱灰燼翻使他人漫涕零衛玠臺年少才非洗馬才珠光碎後玉光埋江南第一風流者無復羊車過舊街九日臺甲光如水戟如霜御酒杯浮菊半黃東日西風滿天仗簫韶一部奏清商東冶亭忍淚相看酒共持一生心事幾人知年年折盡東亭栁此别綿綿無盡期三山亭滿目江山異洛陽北人懷土淚千行不如亡國中書令歸老新亭是故鄉儀賢堂兩兩鶉衣白髮翁講筵談柄坐生風昭明太子歡相得應與商山四皓同聽筝堂雁柱鸞絃十有三南山安石位巖巖逡巡奏罷金縢曲堂上沾襟嘆不凡蠶室摘繭抽絲女在機茅簷葦箔舊堂扉年年桑柘如雲緑翻織誰家錦地衣馳道路平如砥直如絃官栁千株拂翠煙玉勒金鑣天下駿急於奔電更加鞭齊雲觀上界笙歌下界聞縷金羅袖鬱金裙倚闌紅粉如花面不見巫山空慕雲層城觀秋星如彈月如梳宫妓香添乞巧爐萬縷千針同一意眼穿腸斷得知無秦淮一氣東南三斗牛祖龍空為子孫憂金陵地脈何曾斷不覺真人已姓劉直瀆晝役人功夜鬼功陽開隂闔幾時終不聞擲土江中語爭得盈流一水通橫塘早潮才過晚潮來一一軒窗照水開鑑面無塵風不動分明倒影見樓臺青溪傾城傾國兩妃嬪此地聞名不見人潛想舊時紅粉面落花風裏步香塵北渠金殿分來玉砌流黑龍河撒鳯池頭後庭花落恩波斷翻與南塘作御溝覆杯池金杯覆處舊池枯此後還曽一醉無東晉中興股肱力元皇也學管夷吾三巖石蘿蔓藤花嵗自添露痕還似雨痕沾莫將廢苑為間地猶可巖巖作具瞻半陽湖江南龍節水為鄉水不純陰有半陽一片湖光共深淺兩般泉脈異溫涼桃葉渡桃葉桃根栁岸頭獻之才調頗風流相看不語橫波急艇子翻成送莫愁麾扇渡旌旗爍石刃凝霜甲楯如龍人似狼羽扇一揮風偃草䇿勳多謝顧丹陽長命洲梁武慈悲不鼎烹蒙恩豢養亦虛名狐狸口腹應潛飽就死多于日放翁應潮井碧甃時時減復增山頭海面密相應古來泉脈誰穿過潮落潮生不暫澄天闕山牛頭天際碧凝嵐王導無稽示妄談若以逺山為上闕長安應合指終南白楊路殘枝敗葉幾霑春莫問栽培迹巳陳細雨斜風恨無力蕭蕭滿路更愁人射雉場外作禽荒內色荒三千紅粉日嚴糚潘妃縱有嫣然態不步金蓮到射場銅螭署挈壺傳箭逼天聰鑄出蟠螭巧範同何事腹中藏怪物人驚蝘蜓氣如虹焚衣街短頭金縷又珠胎煙緒香雲晝不開御路傍人皆歎息逡巡紅焰作青灰三斷石孫吳紀德舊刋碑埋沒蟠螭與伏龜惆悵石岡三斷在至今猶似鼎分時獨足臺鳥迹分明在帝臺管絃聲裏輒書來回頭一覺風流夢猶得朱門傍水開燕雀湖平湖岸側見髙墳萬土銜來燕雀羣鑑面無波天一色此中文藻似儲君洞玄觀葛玄功行滿三千白日驂鸞上碧天留得舊時壇宇在後人方信有神仙白都山駕鶴驂鸞自古聞策名仙籍是真君天邊舊迹無尋處滿目青山空白雲春澗手拖葛屨坐藜牀竹樹蕭然一水傍枕上白雲船下月卜鄰東澗勝東岡明慶寺翠壁如屏旱不枯一泓甘滑飲醍醐髙僧到此聞絲竹還有金鱗對躍無兩宋名賢小集卷三百六十一
