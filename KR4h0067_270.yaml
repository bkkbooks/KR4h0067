body:
  text: 兩宋名賢小集卷二百七十宋陳思編元陳世隆補白石道人詩薑夔字堯章鄱陽人工聲律慶元三年進樂書乞正雅樂詔令太常與議嫉之不果行居苕溪與白石洞天為鄰轉庵潘柳號之曰白石道人又畀以詩云世間官職似摴蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼時夔與黃景説齊名景説亦號白石人稱雙白石五言古詩奉别沔鄂親友以長歌意無極好為老夫聽為韻滔滔沔鄂留有靦三宿桑持鉢了白日事賤丸蛣蜣舍當去石友煙席淩江湘為君試歌商歌短意則長佳人魯山下謂楊大昌正之日弄清漢波促絃調寶瑟哀思感人多咬哇秦缶擊冷落郢客歌知音良不易如此粲者何英英白龍孫鄭仁舉次臯眉目古人氣拮據營數椽下簾草生砌文章作徑庭功用見造次無庸垂罄嗟遺安鹿門意詩人辛國士辛泌克清句法似阿駒别墅滄浪曲緑陰禽鳥呼頗參金粟眼漸造文字無兒輩例學語屋壁祝又作呼蒲盧山陰千載人揮灑照八極只今定武刻猶滯龍虎筆單侯出機杼單侯諱炳文豈是劍舞得餘波入竹石絶嘆咄咄逼異時之罘君在涅守白皓黃鐘欠牛鐸淋漓弔遺稿有子殊可人蔡逮堅吾子字武伯特未見此老客來請論文但道曲肱好中郎遊千霜曲髙復誰為龎翁趣無絃鄭伯功斫鼻春風桃花溪寒渌繞蒼翠何當從兩君放浪計幽事宦達羞故妻貧賤厭丘嫂上書雲雨迥還舍笋蕨老江臯鋤帶經決計恨不早士無五羖皮沒世抱枯稿伐木響虛牝我願友褐夫九關呀虎豹何時內髙祛黃鵠渺雲樹鸚鵡淡煙蕪倚杖得清賞洗心觀本初孤鴻度關山風霜摧翅翎影低白雲暮哀噭那忍聽士生有如此儲粟不滿瓶著書窮愁濱可續離騷經赤松圖山東隆準公未語心已解按劍堂下人成事汝應退非無帶礪約正爾有恩害平生三寸舌松間潄寒瀨雪中訪石湖雪矸如玊城偏師敢輕犯黃蘆陳野鶩我自將十萬三載渠未降北面石湖范先生霸越手定自一笑粲虞美人草夜闌浩歌起玊帳生悲風江東可千里棄妾蓬蒿中化石那解語作草猶可舞陌上望騅來翻愁不相顧花藏寺雲海亭望具區寺為張循王功德院茫茫復茫茫中有山蒼蒼大哉夫差國坐占天一方夫差醉蓮宫巨浪搖不醒越師何從來碎我玉萬頃年年亭上秋一笛千古愁誰能知許又作幾事飛下雙白鷗夏日寄朴翁時在靈隱風吹松樹枝懷吾松間友雲從北山來令吾屢回首山雲夜夜起山雨侵人衣遙知竹窗裏自吟新雨詩春日書懷九真何蒼蒼乃在清淡尾衡茒依草木念逺獨伯姊春來衆芳滋春去衆芳萎兄弟各天涯啼鴂見料理漢江出巨魚風雷入驅使安得挾吾輈西征二千里春雲驛路暗遊子眇歸程永懷故山下風雨悲松庭翁仲不解語幽鳥時時鳴人家插垂栁客裏又清明垂楊大别寺春草郎官湖家巷有石友合并不待呼瘦藤倚花樹花片藉玊壺老鄭談絶妙辛楊句敷腴平生子姚子貌古心甚儒時邀野僧語間與琴工俱酒闌興未了左轉城南隅大江圍楚碧煙水入玄虛留落不自恨唯嗟故人踈一月三見夢夢中相與娛日日潮風起悵望武昌一作陵魚武昌十萬家落日紫煙低亭亭頭陀塔髙處白鳥棲白鳥忽飛去春山空四圍南樓有佳人再召且再辭閉門課文史攖物深天機斯人不可致白鳥會來歸箜篌引箜篌且勿彈老大不可聽河邊風浪起亦作箜篌聲古人抱恨死今人抱恨生南鄰賣妻者秋夜難為情長安買歌舞半是良家婦主人雖愛憐賤妾那久住緣貧來賣身不緣觸夫怒日日登髙樓悵望宫南樹賦千巖曲水紅雨灑溪流下瀨仍小駐魚隊獵殘香故故作吞吐老子把一盞微風忽吹去李陵臺李陵歸不得髙築望鄉臺長安一萬里鴻雁隔年回望望雖不見時時一上來待千巖褰裳望洞庭眼過天一角初别未甚愁别久今始覺作箋非無筆寒雁不肯落蘆花待拿舟怪底北風惡若人金石心試問洞庭浪傳聞下巴陵瀝酒喜無恙我行丹楓林屢騁白蘋望烏鵲不可嗔論功當坐上呈徐通仲兼簡仲錫通仲與誠齋為鄉人近來赴調而誠齋去國又通仲久與千巖有苕霅之約而未至余挽通仲欲與同歸千巖故末章及之斯文準乾坤作者難屈指我從李郭遊知有徐孺子春風橘洲前白月太湖尾懷哉一作我來無期玉唾炯在紙去年識仲氏何啻空谷喜合并忽自天傾倒見底裏維君天下士竹箭東南美胡不在石渠諸公當料理千巖今林宗泉石助風軌示病一作疾不下堂有句髙八米此老筆硯交誠齋古元禮毫端灑秋露去國詞愈偉屬聞都門别回首即桑梓獨憐苕溪上垂榻俟行李煙波肯尋盟歸棹為君艤和轉菴丹桂韻野人復何知自謂山澤好來禆奉常議識笳鼓羽葆誰憐老垂垂却入鬧浩浩營巢猶是寓學圃何不早淮桂手所植漢甕躬自抱花開不忍出花落不忍掃佳客夜深來清尊月中倒一禪兩居士更約踐幽討昔遊詩夔蚤歲孤貧再走川陸數年以來始獲寧處秋日無謂追述舊遊可喜可愕者吟為五字古句時欲展閲自省生平不足以為詩也洞庭八百里玊盤盛水銀長虹忽照影大哉五色輪我舟渡其中晃晃驚吾神朝發黃陵祠暮至赤沙曲借問此何處滄灣三十六青蘆望不盡明月耿如燭灣灣無人家只就蘆邊宿放舟龍陽縣洞庭包五湖澧沅濱湘大江洶洶不得道茫茫將奈何篙師請小泊石矴沈泥沙是中大無岸強指葦與莎滯留三四晨大浪山嵯峨同舟總下淚自謂餵黿鼉白水日以長僅存青草芽轉盼又已沒但見千頃波此時羡白鳥飛入青山阿九山如馬首一一奔洞庭小舟過其下幸哉波浪平大風忽怒起我舟如葉輕或升千丈坡或落千丈坑回望九馬山正與大浪爭如飛鵝車炮亂打睢陽城又如白獅子山下跳猙獰須臾入别浦萬死得一生始知茵席濕盡覆杯中羮蕭蕭湘陰縣寂寂黃陵祠喬木蔭樓殿畫壁半傾欹蘆洲雨中淡漁網煙外歸重華不可見但見江鷗飛假令無恨事過此亦依依吾乘五板船將入沌河口大江風浪起夜黑不見手同行子周子渠膽大如斗長竿掙蘆席船作野馬走不知何所詣生死付之偶忽聞入草聲燈火亦稍有􅍻船遂登岸亟買野家酒天寒白馬渡漢川縣界落日山陽村是時無霜雪萬里風奔奔外旃吹已透內纊氷不溫吹馬馬欲倒吹笠任飛翻不見行路人但見草木蕃忽看野燒起火焰燒乾坤聲若震雷震勢若江湖吞虎豹走散亂麋鹿不足言夜投野店宿無壁亦無門此行值三厄幸得軀命存明發見老姊斗酒為招魂揚舲下大江日日風雨雪留滯鼇背洲十日不得發岸氷一尺厚刀劍觸舟楫岸雪一丈深屹如玉成堞同舟二三士頗壯不恐懾蒙氈開篷卧波裏任傾折晨興視氈上積雪何皎潔欲上不得梯欲留岸頻裂攀援始得上幸有人見接荒村三兩家寒苦衣食缺買豬祭波神入市路已絶如今得安坐間對妻兒説青草長沙境洞庭渺相連洞庭西北角雲邊更無邊後有白河沌渺莽里數千豈惟大盜窟神龍所盤旋白湖辛已歲忽墮死蜿蜒一鱗大如箕一髯大如椽白身青鬐鬛兩角上梢天半體卧沙上半體猶沈淵里正聞之官官使吏致虔作齋為禳禱觀者足闐闐斂席覆其體數里聞腥羶一夕雷雨過此物忽已遷遺迹陷成川中可行大船是年金亮至送死江之壖或云祖龍讖詭異非偶然近日山陽人采菱不知還望見三龍浮目若電火燃見龍多見尾少見四體全一龍已為異三者亦罕傳又因漁湖側水中忽生煙煙中一驢出繞身步蹁躚俄隨霹靂去欲語無由緣我聞語此事乘舟往觀焉徑往枯葭浦白鷺爭相先湖有劉備廟實司浩渺權徘徊無所見歸棹月明前昔遊洞源山先次白馬渡桃源縣界渡頭何清深鴻鵠在髙樹白馬亦洞天昔人有奇遇洞門不可見但聞水聲怒瞻彼羽人宅乃乘方船渡修廊夾五殿重閣映千樹規模象魏壯四合緑陰護山椒望五溪壺頭入指顧故宮在其北屋瓦帶松霧古杉晉時物中空野人住外圍四千尺內可十客聚我遊瞿仙館壇上表遺步却下八疊坡一亭衆妙具兩山抱澄潭老木枝幹互瞻前秀而迥坐久凛難駐桃源獨不見僻在南宫路山行轉深邃狙猿吟上下石竇出微涓令吾意猶豫昔聞漁舟子水際見洞戶今看去溪逺定自後人誤惆悵却歸來此遊不得屢於今二十年歷歷經行處昔遊衡山下看水入朱陵半空掃積雪萬萬玉花凝或如生綃挂或作薄霧橫紛紛虎豹吼往往蛟龍驚人語不相聞濺雹漂風纓有魚緣峭壁上上終不停此中有神物雷雨周八絃昔遊衡山上未曉入幽谷欲識所坐輿橫板挂兩竹狀如秋千垂髙下不傾覆登山九千丈中道多佛屋一峯髙一峯一峯秀林木仰看同來客木末見冠服髙堂石橋路尋常雲所宿下方雷雨時此上自晴旭紫蓋何突兀萬里在一目餘峯六七十僅如翠浪矗此有懶瓉巖大石庇樵牧下窺半崖花杯盂琢紅玊飛雲身畔過攬之不盈掬祝融最髙絶紫蓋不足録俯視同仰觀蒼蒼萬狀伏惟餘岣嶁峯南睇半空緑仿佛認瀟湘向嶽流屈曲髙處驚吾魂翻思宅平陸其東有雷穴靈異謹勿觸雲來綿世界雲去一峯獨僧窗或留罅雲入不可逐絶頂橫石渠仙人有遺躅山多金光草夜半如列燭靈藥不可尋吁嗟歸太速濠梁四無山坡陀亘長野吾披紫茸氈縱飲面無赭自矜意氣豪敢騎雪中馬行行逆風去初亦略霑灑疾風吹大片忽若亂飄瓦側身當其衝絲鞚袖中把重圍萬箭急馳突更叱吒酒力不支吾數里進一斚燎茅烘濕衣客有見留者徘徊望神州沈嘆英雄寡既離湖口縣未至落星灣舟中三兩程兩程見廬山廬山遮半天五老雲為冠朝看金疊疊暮看紫巉巉瀑布在山半倣佛認一斑廬山忽不見雲雨滿人間雪霽下揚子間望江上山山山如白玉日照金孱顔是時江水淨影落清鏡寒潮催庾信老雲送佛貍還萬古感心事惆悵垂楊灣衡山為真宫道士飲我酒共坐有何人山中白衣叟問叟家何在近住山洞口殷勤起見邀徐步入林藪雲深險怪黑石亂湍水吼尋源竹漸逺茅屋前如帚老烹茶味苦野啄琴形醜叟云司馬君學道此仙久屋東大盤石碁畫今尚有古木庇覆之清泉石根走因悲百年力汲汲成白首仙人固難值隱者亦可偶追惟恍如夢欲畫無好手附潘柳德久書昔遊詩後我行半天下未能到瀟湘君詩如畫圖歷歷記所嘗起我逺遊興其如鬢毛霜何以舒此懷轉軫弦清商又附韓淲仲止平生未踏洞庭野亦不曾登南嶽峯因君談舊遊恍如嘗相從江淮歷歷轉湘浦裘馬意氣傳邊峯吾嘗泛大江只見匡廬松乘風醉卧帆影底髙浪直濺嵐光濃日暮泊船時是夜方嚴冬雪花壓船船背重攬搖柂鼓聲如鐘當年意淺語不到無句可寫波濤樁君詩乃如許景物不易供盡歸一毫端狀若羣飛龍人問勝處貴著眼雖有此興無由逢錢塘山水亦自好奈何薄宦難從容南髙北髙一千丈潮頭日夜鳴靈蹤應有隱者為識賞青鞋布襪扶杖笻君無説彼我愧此急還詩卷心徒忪七言古詩送王孟玊歸山陰淮南雪落雲繞戍王郎鳴鞭獵狐兔問君本是山陰人何不扁舟剡溪去人生樂事將無同知君此心如太空只今去踏龍尾道也似寒江蓑笠翁鑑湖一曲荷花浦君不歸來花有語舊宅應添竹幾竿到家不覺秋如許十年雪裏看淮南聚米能作淮南山籌邊妙處須急吐正自不容修竹間人道長江無六月日光正射青蘆葉何以贈君濯炎熱雪即是詩詩是雪烏夜啼老烏棲棲飛且號晨來枝上啄楮桃楮桃已空楮葉死猶啄枯枝覔蟲蟻老烏賦分何其貪未啼已被鄰公嗔吁嗟老烏不自省墻頭屋上紛成羣吳中貴遊重鸚鵡千金致逺能言語花底紅絛鄭袖擎盤中碧果秦宫取天生靈物得人憐過者須來鸚鵡邊老烏事事無足録人間猶傳夜啼曲余居苕溪上與白石洞天為鄰潘德久字豫曰白石道人且以詩見畀其詞曰世間官職似摴蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼豫以長句報貺南山仙人何所食夜夜山中煮白石世人喚作白石仙一生費齒不費錢仙人食罷腹便便七十二峯生肺肝真祖只在南山南吾欲從之不憚逺無方煮石何由軟佳名錫我何敢辭但愁自此長苦飢囊中只有轉菴詩但當掬水三咽之轉菴德久自號云丁已七月望湖上書事白天碎碎如折綿黑天昧昧如陳玄白黑碎處青天出海月飛來光尚濕是夜太史奏月蝕三家各是爭算術或云七八或食既或云食晝不在夕上令御史登吳山下視海門監月出年來厯失無人修三家之説誰為優乍如破鏡光炯炯漸若小兒初食餅時方下令嚴禁銅鏡破何為東海東天邊有餅不可食聞説飢民滿淮北是鏡是餅且勿論須臾還我黃金盆金盆當空四山靜平波倒浸雲天影下連八表共此光上接銀河通一冷御史歸家太史眠人間不聞鐘鼓傳白石道人呼釣船一瓢欲酌湖中天荷葉擺頭君睡去西風急送敲窗句送陳敬甫十年所聞溢吾耳去年誦君書一紙古人三語得奇士況此磊落數百字相逢千巖萬壑裏有客如君請兄事才髙自古人所忌論髙不售反驚世好詩取客如劵契我無三者獨至是如君之貧不可避呼舟徑渡寒潮外生雲軒在山長與雲同儕出山憶雲雲不來千金買得太湖石數峯相對寒崔嵬朝來忽覺青苔濕靉靉如炊石間出白雲何處不相逢却怪年年枉相憶三郎胸中橫一丘在山出山雲與遊更呼白石老居士來倚雲根吟七字送項平甫倅池陽項侯聲名天宇窄與君俱是荆湖客向來相聞不相值長安城中乃相識論文要得文中天邯鄲學步終不然如君筆墨與性合妙處突過蘇李前我如切切秋蟲語自謂平生用心苦神凝或與元氣接屢舉似君君亦許西湖一曲古墻陰清坐論詩夜向深見謂人間有公等不知來者不如今乾坤雖大知者少君不見古人拙處今人巧我徂山林口挂壁如君合救狂瀾倒石渠春水緑泱泱閣下無人白日長萬里江湖入歸夢子雲不願校書郎九華山色梅根渡半日風帆即秋浦六條察吏安用許幸有千巖作詩侣書乞米帖後銀鈎鐵畫太師字從人乞米亦可憐五倉空虛胃神哭竟日悄悄無炊煙仙人留書説服氣道士辟穀期引年人生不食浪自苦獨不見子桑鼓琴十日雨契丹歌都下聞蕭總管自説其風土如此契丹家住雲沙中駕車如水馬若龍春來草色一萬里芍藥牡丹相間紅大胡牽車小胡舞彈胡琵琶調胡女一春浪蕩不歸家自有穹廬障風雨平沙軟草天鵝肥胡兒千騎曉打圍皂旗低昻圍漸急驚作羊角淩空飛海東健鶻健如許韝上風生看一舉萬里追奔未可知劃見紛紛落毛羽平章俊味天下無年年海上驅羣胡一鵝先得金百兩天使走送賢王廬天鵝之飛鐵為翼射生小兒空看得腹中驚怪有新薑元是江南經宿食禽言如曰哥哥君不見苕溪向南石鼓山鳥如鸜鵒啼其間土人相傳是阿弟千呼萬喚去復還身為獨雁失儔侣所愧脊令圖急難繞林哀哀訴明月夜闌月落潮聲咽天地濶逺兄不聞蒼崖下淚山竹裂豈無鴉舅與鵓姑人各有心非友于陟岡四顧空欷歔君不見江南望夫誰家子登山化石不得語次韻誠齋送僕往見石湖長句客來讀賦作雌霓平生未聞衡説詩省中詩人官事了狎鷗入夢心無機韻髙落落懸清月鏗鏘妙語春氷裂一自長安識子雲三嘆郢中無白雪范公蕭爽思出塵有客如此渠不貧堂堂五字作城守平章徑敵在君口二公句法妙萬夫西來囊中藏魯璵只今擊節烏棲曲不愧當年賀鑑湖五言律詩悼石湖三首身退詩仍健官髙病已侵江山平日眼花鳥暮年心九轉終無助三髙竟欲尊尚留巾墊角荒外有知音未作龍蛇夢驚聞露電身百年無此老千首屬何人安得公長健那知事轉新酸風憂國淚髙冢卧麒麟未定情鍾痛何堪更悼亡遺書知伏枕來弔只空堂雪裏評詩句梅邊按樂章沈思酒杯落天濶意茫茫題華亭錢參園池花裏藏仙宅簾邊駐客舟浦涵滄海潤雲接洞庭秋草木山山秀闌干處處幽機雲韜世業暇日此夷猶同朴翁登卧龍山龍尾回平野簷牙出翠微望山憐緑逺坐樹覺春歸草合平吳路鷗忘霸越機午涼松影亂白羽對禪衣坐上和約齋句入氷輪冷愁因玊宇開可無如此客猶恨不能杯好句長城立寒鴉結陳來箜篌莫停手拚却斷腸回出北關吳兒臨水宅四面見行舟蒲葉浸鵝項楊枝蘸馬頭年年人去國夜夜月窺樓傳語城中客功名半是愁答沈器之二首江漢乘流客乾坤不繫舟玊琴虛素月金劍落清秋野鹿知隨草飢鷹故上鞲風流大堤曲一唱使人愁涉逺身良苦登髙望欲迷試吟青玊案不是白銅鞮露下秋蟲怨風髙北馬嘶槎頭有新味人在太湖西菖蒲嶽麓溪毛秀湘濱玉水香靈苗憐徑直達節著芬芳豈謂盤盂小而忘臭味長拳山并勺水所至未能量范大參入覲頗愛鄙作以詩謝之問句石湖老如將月指標枯中説滋味髙處戒虛驕頗喜唐音近寧論漢道遙政聲今在耳萬樂聽簫韶小孫納婦慶事集朋親孫枝喜氣新欹雲停碧落舞雪眩青春暖日花君子清樽酒聖人一春行樂地不負牡丹辰七言律詩送朝天續集歸誠齋時在金陵翰墨場中老斫輪真能一筆掃千軍年年花月無間日處處山川怕見君箭在的中非爾力風行水上自成文先生只可三千首回施江東日暮雲張平甫哀挽將軍家勢出臞儒合上青雲作計踈吳下宅成花未種湖邊地吉草新鉏空嗟過隙催人世賴有提孩讀父書他日石羊芳草路弟兄來此一沾裾寄上張參政姑蘇臺下梅花樹應為調羮故早開燕寢休誇香霧重鴛行却望衮衣來前時甲第仍垂栁今度沙堤已種槐應念無枝夜飛鵲月寒風徑羽毛摧京口留别張思順伯勞飛燕苦為忙還憶東齋夜共牀别後無書非棄我春前會面却他鄉連宵為説經憂患異日相逢各老蒼更欲少留天不許曉風吹艇入垂楊次朴翁遊蘭亭韻亞字橋亭面面風六人同坐樹陰中松交歸路如留客石礙流杯故惱公山色最憐秦望緑野花只作晉時紅夕陽啼鳥人將散俯仰興懷自昔同右軍祠堂有杜鵑花兩株花極照灼次韻胡仲方因楊伯子見寄此去廬陵定幾程向來笻杖未經行懸知征棹雲邊集大有吟情雪裏生楚渡食萍應甚美舜祠吹玊直能清二君即日青冥上惟我春山帶雨耕仲方得萍鄉宰伯子得營道宰賀張肖翁參政太乙圖書客屢談已知上相出淮南銀臺日月非虛過金鼎功名得意參從此與人為雨露應憐有客卧雲嵐明朝起為蒼生賀旋著衣冠紫竹簮陳君玉以小集見歸用余還誠齋朝天續集韻作七字夔報貺筆陳無功汗左輪而今老去不能軍水邊白鳥間於吾窗外梅花疑是君欲向江湖行此話可無朋友托斯文新篇大是相料理因憶西山揚子雲寄田郎楚楚田郎亦大奇少年風味我曾知春風寒食誰相伴夜月梨花有所思剪燭屢呼金鑿落倚窗間品玊參差含情不擬逢人説鸚鵡能歌自作詞送王德和提舉淮泉京塵吹帽汗淋衣相見頻年只道歸省裏移文那得了家邊持節未為非煮乾碧海知誰用割盡黃雲尚告飢可得不為根本計秋風還是雁南飛寄時父遲君日日數歸程到得君歸我已行一路好山思共看半年有酒不同傾吾儕正坐清貧纍各自而今白髮生人物眇然須強飯天工應不負才名送李萬頃猛相思裏得君來正喜歡時却便回别路恐無青栁折到家應有小桃開起居五馬草堂上問訊千巖及阿灰張禕姪張曙小字阿灰兒女癡頑夫婦健漂零何日共尊罍次韻千巖雜謡平生中散七不堪玊麈時時伴燕談道士有神傳火棗故人無字入雲藍雨涼竹葉宜三酌日落荷花倚半酣極欲扁舟南蕩去冷鷗輕燕略相諳寄上鄭郎中梅根東望九華雲中有風流衣繡人石下一生勞夢想尊前數語倍情親節旄在道催歸漢花鳥留君且作春見説祥雲挾時雨故園松菊亦精神送左真州還長沙吳兒牽挽醉蓴鱸今日西歸略自如别路冷雲隨驛馬望鄉喬木記吾廬湘中花月偏憐酒淮左兒童待擁車凡吾舊遊君更歷橘洲相見訝無書乍涼寄朴翁前日松間步屧歸更將荷葉障秋暉如今城裏拋團扇應是山中試夾衣水有秋容蓮漸少樹含涼氣鳥慵飛炎天既懶趨城市從此尤須戀翠微呈方叔聱牙落魄一間官職事何曾見一斑不是論松須説劍若非尋壑即觀山間看落葉隨風去冷笑奔雲送雨還更有荆巖楊處士伴渠癡坐老花間夏日奉天台祿看天揮箑卧藤牀翠袖攜壺過酒漿蝟腹出波烹芰實裊蹄和露擘蓮房相呼時入雞豚社獨坐曾無雁騖行便是赤城真隱吏不須劉阮更相將冬夜不寐宵柝迢迢警睡魔靜思甘分老林坡忍飢但有嵇康懶扣角曾無寧戚歌不起妄心思世事只將間意養天和時人休説長生術學著長生事轉多間詠虛縻廪祿飲醇醪不狎文書不坐曹檢點花園為日課裒尋詩草計年勞仍將書册供慵卧時喚杯盤佐老叨感激大恩何以報惟祈聖夀與天髙負暄不是羲和德澤流寒鄉何處覔溫柔絶憐天上紅錦襖大勝人間紫綺裘旋掇胡牀隨影轉更攜詩卷與間謀天和妙處人誰會欲獻君王却自羞和陸放翁見寄遙知三徑長荒苔解組東歸亦快哉津岸紛紛羣鳥去船頭衮衮好山來平時佳客應相過勝日清樽想屢開若許詩篇數還往直須追挽古風回和陸放翁午庭風雨撼髙槐一洗城頭十丈埃老子坐間尋好句故人門外寄詩來徑鋒久服穿楊妙鈍思深慚擊鉢催清珮左符君未可要聽吟思發春雷寄汪尚書五十年間嘆濶疏相忘兩地復江湖書來筆底驚強健詩去吟邊想步趨好對青山看歌舞莫嫌紅粉笑髭鬚鳳毛已有哦松韻尚記金章舊範模五言絶句明妃詩同潘德久作三首明妃未嫁時滿宫妬娥眉一朝辭玉陛人人淚雙垂年年心隨雁日日穹廬中遙見沙上月忽憶建章宫身同漢使來不同漢使歸雖為胡中婦只著漢家衣古樂府三首裁衣贈所歡曲領再三安歡出無人試閨中自著看甚欲逐郎行畏人笑無媒日日東風起西家桃李開今我歌一曲曲終郎見留萬一不當意翻作平生羞與和甫時甫分題畫卷夔得剡溪圖枯槎啅乾鵲交臂失夫君奈此一尊酒憑髙空水雲東堂聨句金風涼夜深吹我蕭蕭髮起折丹桂枝驚落花上月趙雍和仲白石七言絶句寄俞子此郎都無子弟氣夜對黃妳籠青燈君今落腳墮鴛外欲往從之嘆未能郎罷才名今白髮佐州亦復坐窮邊甚欲出手相料理東南風髙難寄箋牛渚牛渚磯邊渺渺秋笛聲吹月下中流西風不識張京兆畫得蛾眉如許愁武康丞宅同朴翁詠牽牛青花緑葉上踈籬别有長條竹尾垂老覺淡粧差有味滿身秋露立多時朴公悼牽牛甚奇余亦作不見青青繞竹生西風籬落抱枯藤道人一任空花過愁殺山陰覔句僧過德清木末誰家縹渺亭畫堂臨水更虛明經過此處無相識塔下秋雲為我生溪上佳人看客舟舟中行客思悠悠煙波漸逺橋東去猶見闌干一點愁過湘陰寄千巖渺渺臨風思美人荻花楓葉帶離聲夜深吹笛移船去三十六灣秋月明雁圖萬里晴沙夕照西此心惟有斷雲知年年數盡秋風字想見江南搖落時除夜自石湖歸苕溪此詩録寄誠齋得報云所寄十詩有裁雲縫霧之妙思敲金戛玉之奇聲細草穿沙雪半銷吳宫煙冷水迢迢梅花竹裏無人見一夜吹香過石橋美人臺上昔歡娛今日空臺望五湖殘雪未融青草死苦無麋鹿過姑蘇黃帽傳呼睡不成投篙細細激流氷分明舊泊江南岸舟尾春風颭客燈千門列炬散林鴉兒女相思未到家應是不眠非守歲小窗春色入燈花三生定是陸天隨只向吳松作客歸已拚新年舟上過倩人和雪洗征衣沙尾風回一棹寒椒花今夕不登盤百年草草都如此自琢春詞剪燭看笠澤茫茫雁影微玊峯重疊護雲衣長橋寂寞春寒夜只有詩人一舸歸桑間篝火却宜蠶風土相傳我未諳但得明年少行役只裁白紵作春衫少小知名翰墨場十年心事只淒涼舊時曾作梅花賦研墨於今亦自香環玦隨波冷未銷古苔留雪卧墻腰誰家玉笛吹春怨看見鵝黃上栁條臨安旅次答蘇虞叟垂楊風雨小樓寒宋玉秋詞不忍看萬里青山無處隱可憐投老客長安姑蘇懷古夜暗歸雲繞柁牙江涵秋影鷺眠沙行人悵望蘇臺栁曾與吳王掃落花次德久韻籬落青青花倒垂避人黃鳥雨中飛西郊寂寞無車馬時有溪童賣菜歸次石湖書扇韻橋西一曲水通村岸閣浮萍緑有痕家住石湖人不到藕花多處别開門竹友為徐南卿作髮已星星帶已寬徐郎猶是客長安家山竹好無由看漫種庭前一兩竿世路蒼皇總是愁暮年須得小優遊如今漸覺知心少賸種青青伴白頭夀朴翁與師同月不同年歸墨歸儒各自緣想得山中無夀酒但攜茶到菊花前湖上寓居雜咏荷葉披披一浦涼青蘆奕奕夜吟商平生最識江湖味聽得秋聲憶故鄉湖上風恬月淡時卧看雲影入玻璃輕舟忽向窗前過搖動青蘆一兩枝秋風低結亂山愁千頃銀波凝不流堤畔畫船堤上馬緑楊風裏兩悠悠處處虛堂望眼寬荷花荷葉過闌干遊人去後無簫鼓白水青山生晚寒輦路垂楊兩行栽苑門秋水欲平階朝朝南望宫雲起白鳥一聲山下來微波衝得緑萍開數點青青粘石階緑葑自來還自去來時須載白鷗來布衣何用揖王公歸向蘆根濯軟紅自覺此心無一事小魚跳出緑萍中囊空萬字總空言露滴桐枝欲斷絃時事悠悠吾亦懶卧看秋水浸山煙苑墻曲曲栁冥冥人靜山空見一燈荷葉似雲香不斷小船搖曳入西陵處士風流不並時移家相近若依依夜涼一舸孤山下林黑草深螢火飛臨榻看山緑漲天角門長泊釣魚船而今漸欲拋塵事未了菟裘一悵然鈎窗不忍見南山下有三雛骨未寒惆悵古今同此味二陵風雨晉師還栁下軒窗枕水開畫船忽載故人來與君同過西城路却指煙波獨自回指點移舟著栁堤美人相顧復相攜上橋更覺秋香重花在西陵小苑西平甫見招不欲往老去無心聽管絃病來杯酒不相便人生難得秋前雨乞吾虛堂自在眠樓閣萬重秋雨裏峯巒四合暮潮邊鳳城今夕涼如水多少人家試管絃三髙祠越國霸來頭已白洛京歸後夢猶驚沈思只羡天隨子蓑笠寒江過一生過桐廬橫看山色仰看雲十幅風帆不藉人記取合江江畔樹他年此處好垂綸過垂虹自作新詞韻最嬌小紅低唱我吹簫曲終過盡松陵路回首煙波十四橋登烏石寺觀張魏公劉安成嶽武穆留題劉云侍兒意真奉命題記諸老凋零極可哀尚留名字厭崔嵬劉郎可是踈文墨幾點胭脂汚緑苔項里項里項王之里也在山陰西南二十餘里地多楊梅苔梅皆妙天下王性之賦項里楊梅云只令枝頭萬顆紅猶似咸陽三月火豫近得苔梅一枝古怪特甚為作七言舊國婆娑幾樹梅將軍逐鹿未歸來江東父老空相憶枝上年年長緑苔雪中六解塞草汀雲護玉鞍連天花落路漫漫如今却憶當時健下馬題詩不怕寒黃鶴磯邊晚渡時栁花風急片帆飛一聲長笛魚龍舞白浪如山不肯歸萬馬行空轉屋簷髙寒屢索酒杯添故人家住吳山上借得西湖自捲簾曾泛扁舟語石湖恍然坐我范寬圖天寒逺挂一行雁三十六峯生玉壺萬壑千巖一樣寒城中别有玉龍蟠舊人乘興扁舟處今日詩仙戴笠看沈香火裏笙簫合暖玉鞍邊雉兔空辦得煎茶有驕色先生只合作詩窮越中士女春遊秦山越樹兩依依間倚闌干看落暉楊栁梢頭春又暗玉簫聲裏夜遊歸送范仲訥往合肥三首壯志只便鞍馬上客夢長在江淮間誰能辛苦運河裏夜與商人爭往還我家曾住赤欄橋鄰里相顧不寂寥君若到時秋已半西風門巷栁蕭蕭小簾燈火屢題詩回首青山失後期未老劉郎定重到煩君説與故人知下菰城人家多在竹籬中楊栁踈踈尚帶風記得下菰城下路白雲依舊兩三峯平甫放三十二鷗於吳松余不及與盟橋下松陵緑浪橫來遲不與白鷗盟知君久對青山立飛盡梨花好句成蕭山歸心已逐晚雲輕又見越中長短亭十里水邊山下路桃花無數麥青青戊午春帖子晴窗日日擬雕蟲惆悵明時不易逢二十五絃人不識淡黃楊栁舞春風偶題阿八宫中酒未醒天風吹髮夜泠泠歸來只怕扶桑暖赤腳橫騎太一鯨陳日華侍兒讀書繹句尋章久未休花房日晏不梳頭誰教郎主能多事乞與冥冥千古愁女郎山漢陽縣西二十里不見郢中能賦客可憐負此女郎山氷魂寂寞無歸處獨宿鴛鴦沙水寒釣雪亭闌干風冷雪漫漫惆悵無人把釣竿時有官船橋畔過白鷗飛去落前灘緑萼梅黃雲承襪知何處招得氷魂付北枝金谷樓髙愁欲墮斷腸誰把玉龍吹次韻武伯楊栁風微約暮寒野禽容與只波間道人心性如天馬可愛青絲十二闌觀燈口號世間形象畫成燈烘火旋紗巧思生列肆又多看不遍遊人一一把燈行市樓歌鼓太喧譁燈若連珠照萬家太守令嚴君莫舞遊人空戴玉梅花遊人俱戴孟家蟬爭托星毬萬眼圓鬧裏傳呼大官去後車多少盡嬋娟花帽籠頭幾歲兒女兒學著內人衣燈前月下無歸路不到天明亦不歸好燈須買不論錢别有琉璃價百千都下貴人多預賞買時長在一陽前珠絡琉璃到地垂鳳頭銜帶玉交枝君王不賞無人進天竺堂深夜雨時紛紛鐵馬小回旋幻出曹公大戰年若使英雄知此事不教兒女戲燈前貴客鈎簾看御街市中珍品一時來簾前花架無行路不得金錢不肯回修內司人偏戲鼓輦宫營裏獨燒燈春風到處皆君賜金栁絲絲滿鳳城正好嬉遊天作魔翠裙無奈雨沾何御街暗裏無燈火處處但聞樓上歌陪張平甫遊禹廟鏡裏山林緑到天春風只在禹祠前一聲何處提壺鳥猛省紅塵二十年燈詞南陌東城盡舞兒畫金刺繡滿羅衣也知愛惜春遊夜舞落銀蟾不肯歸燈已闌珊月氣寒舞兒往往夜深還只因不盡婆娑意更向階心弄影看沙河雲合無行處惆悵來遊路已迷却入靜坊燈火室門門相似列蛾眉遊人歸後天街靜坊陌人家未閉門簾裏垂燈照樽俎坐中嬉笑覺春溫春詞六軍文武浩如雲花簇頭冠樣樣新惟有至尊渾不戴盡將春色賜羣臣萬數簮花滿御街聖人先自景靈回不知後面花多少但見紅雲冉冉來同恬朴翁過淨林廣福院四人松下共盤桓筆硯花壺石上安今日興懷同此味老仙留字在孱顔三髙祠見姑蘇志不貪名爵伐功勞勇退深虞後患遭甫里間居耕釣樂范張髙處陸猶髙于越亭松尾颼颼石浪寒靜聽蕃曲轉聲酸人間無此春風手應是江妃夜夜彈六言金神夜獵圖二首夜半金神羽獵奔走山川百靈雲氣旍旗未下颯然已入青冥後宫嬋娟玉女自鞚八尺飛龍兩兩鳴鞭爭導緑雲斜墜春風次韻鴛鴦梅晴日小溪沙暖春夢憐渠頸交只怕笛聲驚散費人月詠風嘲漠漠江南煙雨于飛似報初春折過女郎山下料應愁殺佳人馬上值牧兒馬背何如牛背短衣落日空山只麼身歸盤谷未須名滿人間兩宋名賢小集卷二百七十
