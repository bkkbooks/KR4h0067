body:
  text: 兩宋名賢小集巻九十六宋陳思編元陳世隆補陶邕州小集陶弼字商翁永州人以軍功補官兩知邕州善為詩山谷誌其墓許可之其詩尤善言風土蠟茶詩至五十韻事母孝謹少時嘗聚徒講授六經以奉甘㫖年三十乃從軍歴任郡縣並反側盗藪多所籌畫封境晏然每求去朝廷輒進官重任使遂老於桂林卒年六十有四所著詩文書奏十有八巻子通冠而死以兄之子同為通後兵器五代乏真主奸雄紛僭偽横磨濶刀劒白日相簒弑我宋皇太祖潛徳動天意神物既有歸乃即皇帝位不惠兆民樂不怒諸侯畏顛倒執玉帛奔走恐後至獨有隂山戎時時冦邊地天子赫斯怒大警巡澶衞射殺右賢王遂㫁匈奴臂狼心貼然服結好同昆弟卒閒喜夜歌將老貪春睡自此為太平恍逾三十嵗戎昊乗我間南馳賀蘭騎陽闗久夜開樞朽不可閉陣雲起秦雄殺氣横涇渭使臣股慄奏宰相嗔目議僉曰急發兵豎子坑甚易倉皇築邊壘未戰力先瘁逼邊開庫兵土蝕鋒鋩脆防秋採舊屯推轂謀新寄舊屯老且死少者無實藝良由不訓練手足迷擊刺新寄將家子從小生富貴六韜未嘗讀口但知肉味師復從中御進退由閽寺權輕號令冗兩戰無遺類曹公棄七軍晉人獲三帥吾兵自此喪有詔新其製此器不預設一旦從何致朝廷急郡縣郡縣急官吏官吏無他術下責蚩蚩輩耕牛拔筋角飛鳥脱翎翅簳截㑹稽空鐵烹堇山碎供億稍後期鞭扑異他罪愁氣擁太虚霽景晝冥晦我聞郭汾陽料敵多奇異單箠諭突厥畨酋膝雙墜又聞李西平臨戎有英氣身著紅錦袍懷光肝膽碎是知用兵術在人不在器君耳舜髙聴君目舜明視願採謀畧長勿倚干戈鋭公安縣門沿大堤入路趁淺莎行樹短雲根拔山窮地勢傾孤舟難泊岸逺水欲沈城半夜呼津口煙中荻火明送趙樞寺丞宰䖍化縣路入䖍雲去如何輕解攜人煙五嶺北星斗大江西暖雪梅花樹晴雷贛石溪青山欲無淚不奈鷓鴣啼出嶺題石灰舖馬渡嚴闗口生歸喜復嗟天文離巻舌人影背含沙江勢一再曲梅梢三四花登髙休問路雲際是吾家重到陽闗五管新多事輕車屢往還勤勞成白髮故舊是青山樹色纔分楚江聲未出蠻自慙迎候少無惠及孤鰥吟石守邊無一事江上得閒吟醉囈歌㣲出狂書墨不深潮痕沒髙岸月色透疎林此意無人解宵分淚滿襟東湖寧越佳山水東湖帶郡城月天髙寺影春雨一橋聲石上青蒲合沙中白鳥横天涯正寥落獨往若為情西湖寧越佳山水西湖似浙城桂多天竺子潮欠海門聲路向林梢轉天隨野色横從兹棲泊者無復渡江情題霞溪驛歌聲野色中人樂嵗時豐暑雨隂陽雜秋田早晚同嶺雲無烈日江樹足涼風自指香山語前村有路通登邕州南城臺江國家書少秋臺閒草生無人來逺渡盡日上髙城落照懸魚市孤燈起戍營東園故籬句又向酒中傾登崑崙臺落照古城隅邊風動隼旟久閒忘戰畧多病熟醫書白髮隨年短新情與世疎桃花春水起還釣舊溪魚茘枝五月南游渴欣逢茘枝丹殻勻仙鶴頂肉露水晶九色映離為火甘如木作酸枝繁空相染樹重欲成團赤蚌遺珠顆紅犀露角端爽能消内熱潤可濯中乾一簇氷蠶繭千苞火鳯冠隔瓤銀葉嫩透膜玉漿寒題陽朔縣舎石壁髙深遶縣衙不離牀袵自煙霞民耕紫芋為朝食僧煮黄精代晚茶瀑布聲中窺案牘女蘿陰裏勸桑麻欲知言偃絃歌化水墨屏風數百家天涯亭雨色絲絲風色驕天涯亭上覺魂消一家生意付秋瘴萬里歸心隨暮潮兵送逺人還海界吏申遷客入津橋山公對此聊酣飲怕見醒來兩鬢凋途次葉縣觀千葉桃花三月官桃滿上林花開千蕚費春心葉公城外襄河北一樹無人色更深登潮月亭渡頭人語知潮上下看南江東北流試引輕帆學歸去茶山溪淺却回舟過清湘嶺開蠻壤㫁此地下湘川綠水紋如染丹楓色欲然瘴消還愛酒兵解尚憂邊故里誰相訪孤帆出曉烟二妃廟溪上龍蛇屋蕭條帝女祠竹痕當日淚山色故人疑故服霞流綺新妝月獻眉楚民無水旱簫鼓謝神禧送臨桂令戴若納出廣五嶺生還少無辭酒滿觴共經邊冦事先出瘴烟鄉楚樹蟬聲早湖天日影涼此行休問路宫闕斗杓旁送桂林余靖侍郎移帥長沙戈船不用兵鼓角下湘靈草歇初春雨天迴奉使星江蓴波上紫楚木望中青欲轉湖湘去家山在洞庭送陽朔尉王翊還東海勞生如嶺水嶺盡忽分流草色湘中路潮聲海上洲少孤家有法宦薄鬢先秋我亦嗟貧病相期江漢遊寄陽朔上官凝明府嶺上一揮手蠻村花又疎閒思昨夜夢勝得舊年書地志烟嵐裏官資州縣初詩成好相寄江水接靈渠寄桂師趙待制一紙降書落天恩寵作州舊疆分海界新額上城樓古塞南唐詔荒祠蜀武侯前朝聲敎地自是北人愁寄陽朔尉輔臣將斧征蠻嵗儒官破賊初日邊呈瑞氣夜半得降書許國心非淺封侯望已疎相逢感秋病眷眷舊溪魚欄蠻山西去萬里山兹峯獨限蠻天生賊多計民賴汝為闗設險數州地防危一日間守邊須以道絶頂可躋攀永平塞道中叠嶂深千里窮邊今一隅北風家信息南斗客程途嶺勢頻開合猿聲乍有無過溪人語笑隔岸戍烟孤送吕濤典獄之梧州峽口蒼梧縣城依南斗魁江潭海潮上地熱火山來草沒嘉魚穴雲封拜表臺到應無獄訟豆蔲酒頻開容管一年勾漏守尋盡洞中天佛記盧藏用仙壇葛稚川醒心西驛水燒眼碧池蓮我豈無心事詩碑與酒泉自注郡有勾漏白石都嶠等山所謂三洞天也盧藏用大雲寺記石髙丈二尺西驛韋丹建閣下有石泉并記後唐李復作池植蓮數萬早登崑崙臺望戎兵北歸春風歸未得黙坐廢臺間居易終腸結安仁兩鬢斑蜂銜新蘂去燕引舊雛還帳下誰更戍旌旗出亂山南寧崑崙闗闗路下崑崙蠻封迤邐分春光偏著草雨意不離雲俗異君修徳時平將用文臨溪照綠水老鬢雪紛紛三公臺落成飲其上北原喬木外三將舊屯營草沒金鎚蹟山應玉管聲路隨闗地起江背瘴天傾異日誰相繼來書第四名那霸泉昔年觀地志此水出牂牁㫁岸深無底平流暗起波感恩來客少射影短狐多未老諸蠻在樓船空再過羅秀山尋山入羅秀旋結草堂居花露生瓶水松風落架書聞猿得句後見月出行初此夕雲林下無因夢使車㑹仙嵓寂寂長冥洞涓涓潄玉泉鳯簫聞夜半鶴馭認雲邊煮茗尋安老披蓑訪稚川於中得消息何用買山錢思明府明江㡬年來瘴外此夜宿溪中照枕殘雞月吹燈落葉風盧循猶偽國楊僕巳衰翁起戴寒星去前村燒影紅入桂林滿耳洋洋分嶺泉早秋時候晚涼天稻花斑白初經雨竹色青蒼薄帶烟安得孤臣能慮患不勞明主更憂邊東坡故老知誰在望我車塵若望仙桂林書事清羅江水碧連山城在山光水色間地近瘴烟人好酒路臨溪洞卒難闗心知禍福傭占鬼事熟安危笑議蠻却為林泉作詩苦三年贏得鬢絲還寄陽朔父老兩官三任五流年舊事人懷一惘然爵祿豈知緣武進姓名猶賴得詩傳萬雲亭北山藏日雙月橋東水接天為報崇賢諸父老宰君今悔把戎㫋再過陽朔寄人昔日儒衫今武車重來父老尚奔趨後人相繼皆清徳小吏回看半白鬚條敎漫為新楷法官資猶作舊稱呼里門不閉田疇闢好買丹青别畫圖謝桂林郡幕沈通惠詩五色飛鸞下桂林林間新客寄新吟才髙韓愈青羅帶義重張衡綠綺琴楚尾聲名先在耳嶺南章句晚知音逢人要指荷花幕銅柱西南煙靄深寄桂州張田經略五色溪州五寨城廣宣恩詔諭羣情開懷曉日重昏破下令春雷百蟄驚塞路風埃人戱馬隔雲烟火賊燒營廟堂有䇿今無用謝爾青頭百萬兵犀甲銀盔銅鼓兵周旋五十五屯營據鞍疾悶心無力横槊㣲吟尚有情卒冗不蒐秦鋭士官租還用魯儒生溪人重武輕文藝應笑擔書載酒行寄桂林歐陽咸寺丞溪藤杖勁節寒梢屈曲根虎牙龍鬛蟒蛇鱗採從黄鶴獨飛起寄與青山先退人髙閣倚吟留落月小園扶醉過殘春惟存一本自収拾即日溪邊躡後塵登邕州春野亭寄桂帥潘伯恭學士二紀看花瘴霧中野園今日又東風人心有感時時别春色無私處處同長笛一聲諸曲盡巨觥雙飲百愁空風清水暖羣魚上誰向荆溪下鈎筒寄茘浦林術明府諸蠻烽火照深溪同著儒衫事鼓鼙壯節己皆成皓首孤蹤猶未得丹梯鬱蒸草氣龍蛇舞昏黒空山鬼鳥啼十八人中存者六孰為霄漢孰為泥賔州閲武堂南嶠風雲久肅清壊溝殘壘號昇平官曹惟識簿書字民俗不知金鼓聲往嵗忽傳南詔檄近時方築伏波營安成太守深邊計菡萏花開閲水兵那霸泉路下牂牁水石間三分纔過二分山年光欲盡家猶逺嵐氣雖疎鬢已斑賔從笑談譏獨進兒曹音信喜生還南風一夜吹鄉夢數刻飛過五嶺闗龍州秀嶺路隨雲磴石梯行限隔華夷天意明自與大君為外屏何勞諸將作長城福民可拜三公爵夀聖能呼萬嵗聲海國未彊崖石老待誰來此勒功名思甘泉水寄通判景範梁屯田二井鑿通千佛塔七元流濟萬人家波心不動青天色井口常飛白雪花見釀宜成殘臘酒聴煎尤焙早春茶歸時覺久添新嵗羞向寒清照鬢華題芙蓉亭邊柝無聲獄訟疎芙蓉池上避金鳥民収果實充田賦匠寫空形入縣圖白鳥知機逺冠葢紫鱗貪餌落盤盂主人非為清香設愛此烟波似五湖膏澤峰石壁含天澤南山第一重旱時先出雨隂穴必藏龍雲影揺諸壑雷聲起半空滲成泉脈大滴出土膏濃溝洫施仁澤民誰帶戚容何當大滂沛盡活四方晨淪漪閣談笑淪漪閣藤花竹葉間易醒江上酒難畫雨中山屏障山名山愛陽朔平陸逼峰巒郡境尖中折人家缺處安丹竈山羽客朝元地遺壇古樹中煉成丹竈在騎去鶴巢空思柳堂羅池刺史寡塵緣畫㦸牆頭築望仙黄鶴與誰同一去碧桃無主又千年桂林青羅江水碧連山城在山光水色間莫道宜人惟桂郡驂鸞客至只思還題順應廟白崖山下古松青暫捲牙旗謁廟靈見説崑崙闗北畔曽將草木作形人茘浦鎁闗三任邊州六往還此時纔入莫鎁闗訪僧莫道無閒事手指青山口説山邕州南極諸蠻傲典刑斗門時復見飛星君王仁恕將軍老五十溪州六萬丁邕州城夜半孤城百尺臺亂蟲聲裏一樽開憂邊日遶南雲下戀闕心隨北斗迴鬱林鼓角樓去嵗同登畫角樓諸蠻未滅夜談兵五更將吏知人意吹作梅花塞外聲寄鬱林郡守姚道越裳濟海喜天晴五葉戈船不渡兵堯舜逺方皆樂國漢唐諸將本書生柑子堂子厚才名甲有唐謫官分得茘枝鄉羅池水盡黄柑死獨有空碑在畫堂靈巖溪僧過此説山公遊遍真仙洞府中乳石崖邊得靈草可能封裹寄衰翁仙影山月帶星冠映碧虚逺看雖有近還無瑶池玉女雙雙過遺下羣仙聚飲圖安城即事二首往嵗傳聞南詔檄近時方築伏波城安城太守知邊計菡萏花中閲水兵金鼓聲䦨劒㦸収使君回上雅歌樓樽前一闋清商曲銷盡窮邊萬里愁寄蘇州徐處士弁弁能畫山水平南無策鬢如霜七十峯前舊隠鄉相約祝融孤頂上借君吟筆畫瀟湘賓州仙影山月氅星冠七丈夫逺看雖有近還無瑶池侍女雙成道遺下羣仙聚影圖宜陽孤城溪洞裏聞說己堪哀蠻水如鮮血瘴天巳死灰吏憂民置毒巫幸鬼為灾缺寄渷州新守謝麟險盡天開溪路平詩書新將典新城三千戍卒今無㡬十萬屯田古未耕屬縣乞除防虎檻生蠻願獻採砂坑從兹預擬風塵息盡是仁威下斾旌桃樹正含芳酒正醅熙熙為爾醉春臺一花五出尚可飲何況重重叠叠開李春晝暖風薰翠幄暑天涼氣暗朱䦨主人肝膽無猜忌果下遊人但整冠李楊梅嶺北土寒無茘子人言形味似楊梅翠條丹實休相學不願紅塵一騎來滴露花九天瑞露滴成芽不是榆花即桂花星女月娥宫不鎖天風吹落野人家丁香萬枝千葉遞相親内結花心外結身草木至㣲猶有合悲哉父子與君臣桐老桐休斵為琴瑟樂部新翻格様清試聽琵琶采蓮曲一般絃上數般聲雞頭三伏池塘沸雞頭美可烹香囊聨錦破玉指剥珠明葉皺非蓮葢根甘似竹萌不應徒適口炎帝亦曽名過思明㡬年來瘴外此夜宿棲中照枕殘雞月吹燈落葉風盧循猶偽國楊僕己衰翁起載寒星去前村燒影紅閤皁萬仞天然皁閤形隂陽不似衆山青一區海上神仙宅數曲人間水墨屏華表鶴歸春谷響玉京龍起夜潭腥可憐張葛無人繼三級髙壇拂杳𡨕亷州石使君合浦來示我海濵石千巖秀掌上大者不盈尺洽浦還珠亭合浦還珠舊有亭使君方似古人清沙中蚌蛤胎常滿潭底蛟龍睡不驚贈章使君善戰無如新息侯漢兵纔度緑蘿州愛君挽我陶溪粟直到牂牁水口頭司馬錯北設長城陷敵塵更來勞役武陵民我疑洞裏栽桃者便是當年版築人辰州詔條符節古連今王澤漸濡豈不深賦役未行中國法謳歌猶帶逺人音採金户簇青莎岸射虎兵圍黄葉林寄語湖南灘上客預將忠信待浮沈缺璽書行絶域銅柱入中原草暖聞鳴鹿江清對飲猿何時一樽酒重入謝公軒白露驛一曲青谿一曲山鳥飛魚躍白雲間谿山豈要行人到自是行人到此間三山亭諸峯不及此三峰翠影多年路未通野老傳來無地主神仙留待與山翁琱弓射減虎狼迹長劍剪開荆棘叢吏引旌旗先險阻匠營樓閣出虚空藤蘿葉暗初無曰松桂枝新漸有風下瀨將軍㣲舉職安南都䕶逺輸忠商誇合浦珠胎賤民樂占城稻穀豐火炬影沈山岸北潮聲流過郡城東四時収印來無定終日開尊望不窮玉版淡魚千片白金膏鹽蟹一團紅雲臺志節悲歌外銅柱封疆醉眼中所借溪頭好厓石只書詩句不書功祝融峰曽到祝融峰頂上步隨明月宿禪闗夜深一陣打窻雨卧聴風雷在半山武陵曲臺風月徳山雲夢想中間有幾春臣葬江魚終愛楚民逃花洞不思秦五溪六月五溪邊溪深氣象偏晝陰疑雨後久冷覺秋先棧倚臨崖石竿通隔嶺泉缺木芙蓉孤芳託寒木一曉一番新春色不為主天香難動人丹楓見流落黄菊坐因循莫訝偏相愛衰遲似我身端研詩贈王欲端石如虵狀潤疑雲雨通觕官不識字好去伴詩翁銅雀研得自銅雀臺收晚稜角摧四方緑琉璃一片青玫瑰煉盡沙石滓陶成金玉胚題陽朔縣舍畬田過雨小溪渾逺近雲峰互吐吞殊俗易昏三里霧陽崖忽豁一家村桂花香裏尋僧寺榕葉陰中掩縣門井税未輸兵甲後心勤撫字且休論對花有感得莫一作意字欣欣失莫悲古今人事若花枝桃紅李白薔薇紫問著春風自不知紫薇花人言清禁紫薇花草詔紫薇花影傍山木不知官況别也隨紅白上東廊山茶淺為玉茗深都勝大白山茶小海紅名卉漫多朋援少年年身在雪霜中江南池館厭深紅零落空山煙雨中却是北人偏愛惜數枝和雪上屏風栁揚子江頭流水澌長安陌上逺風吹黄金瓔珞雪晴後碧玉瓏璁春盡時端的園林俱不及等閒臺榭便相宜思量也是多情物占與人間贈别離陶弼詩絶似晚唐宋文鑑選其二首䖍化縣云暖雪梅花墅晴雷贛石溪出嶺云天文離巻舌人影背含沙李洞喻鳬可相伯仲成都楊慎兩宋名賢小集巻九十六
