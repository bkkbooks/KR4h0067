body:
  text: 兩宋名賢小集卷一百五十一宋陳思編元陳世隆補栟櫚詩集鄧肅字志宏南劒沙縣人少警敏能文美風儀善談論李綱見而竒之相倡和為忘年交居父喪哀毁踰禮芝産其廬入太學所與遊皆天下名士時東南貢花石綱肅作詩十一章言守令搜求擾民用事者見之屏出學欽宗嗣位召對便殿補承務郎授鴻臚寺簿金人犯闕肅被命詣敵營留五十日而還張邦昌僭位肅義不屈奔赴南京擢左正言先是朝廷賜金國幣一千萬肅在其營密覘均與將士之數大約不過八萬人至是為上言之且言金人不足畏但其賞罰必信不假文字故人各用命朝廷則不然有同時立功而功又相等者或已轉數官或尚為布衣輕重上下只在吏手賞既不明誰肯自勸今當專立功賞一司使凡立功者得以自陳若功狀已明而賞不行或功同而賞有輕重先後者並置之法上從之朝廷受偽命者衆肅請分三等定罪上以肅在圍城中知其姓名令具奏肅言無所隱耿南仲嘗薦肅於欽宗肅言之不恤上嘉其直賜五品服范訥留守東京肅言訥出師兩河望風先遁訥遂罷內侍陳良弼肩輿至橫門外開封買入內女童肅連章論之時官吏多託故而去肅建議削其仕版而取其祿以給禁衛若夫先假指揮徑徙江湖者乞追付有司以正其罪因入對言敵人之巧在文書簡簡故速中國之患在文書煩煩故遲今兵戈未息豈可揖遜進退尚循無事之時欲乞限以旬日期於必至庶幾法嚴事簡賞罰之權不至濡滯肅在諫垣遇事感激不三月凡抗二十疏言皆切至上多採納會李綱罷肅奏論之觸執政怒送肅吏部罷歸居家紹興二年避寇福唐以疾卒分嵗餘臘羈人少共歡那堪飛雪集雲端四時欲盡三更漏六出翻成兩嵗寒壓損嶺梅殘艷薄敲殘亭竹碎聲乾公卿休掃黌堂下留與來朝執玉看別陳少卿平生杯酒百無憂四海風流説太丘據景筆端陵鮑謝當年門下得伊周那知避世嶔崎迹也許從公汗漫遊聞説片帆今又舉三山無處著人愁戲洪丞萬里歸來雲水鄉逢春得酒且倣皇好賢誰似雙松吏使我終時一石狂忽與高唐來鼠目却令朱户鎖梅糚先生取瑟吾知己安得從今不舉觴大雨夜夜陰雨如潑墨雨勢欲挽銀河竭春工十八落泥塗驟雨誰云不終日魏紫姚黃業已空嬉遊何足介心胸只恐年年禾黍地浸淫盡入陽侯宫憑誰為我呼少女掃空陰翳開天宇光風霽月暖層霄坐令六合同歌舞寒梅上李舍人窮山觸目紛茒葦此意昏昏誰可洗竹間橫破一枝梅對月嫣然耿寒水吟詩索酒滿高堂穿簾的皪射晶光世上羶葷來不到翦翦天風吹冷香人言百花睡未起獨冠羣芳差可喜珍重和羮自有期行事爭雄壓桃李題梅齋江邊蘆葦風颼颼東君一點破寒愁窗間疏影橫春瘦枕上冷香尋夢幽夜深竹折驚殘雪捲簾醉起千山月洗空肺腑龍麝腥落筆天香鬬清絶上先生夜馬踏殘月荷策來泮宫入門見先生語意何雍容短檠挑燈一千夜高談雄辨流胸中吾皇求士若飢渴那許先生久卧龍玉鞭斜指長安市小軒從此冷如水空留絳帳照孤燈窗外西風起寒葦龍興避難傍山怪石如蹲虎絶頂去天無尺五却披叢棘下山腰丹碧照空飛棟宇道人蓬户壓塵勞避世祗嫌山不髙那知行空老曼倩竊食當年王母桃松檜參天門晝閉碧玉擷蔬飯炊雪百年冷坐無車音一旦偕來真惡客當知喧寂豈殊觀出世何妨在世間能致吾人師作古龍興今日始開山送丹霞禪師山壓濃陰勢欲頽阿香推車振不開君來論詩風四起挽出羲和照九垓别居八年驚電掃霜髭已失童顔好逝者任從造物流吾人一笑初不老明朝飛錫過平津浩歌歸耕隴上雲巖竇不應藏一滴要須化作無邊春再用南齋韻謝沙溪清可啜逺山翠欲流翩然航一葦浩歌入蘆洲髙堂上木杪幽人事勝遊但足簞瓢樂不知天地秋我輩嗟無口冥摉空掉頭何如三才傑等是濟川舟開卷騰光怪天上卿雲浮阿雲又嗣音吾研不欲留平生浪詩名寒蟲號清幽已對狂道士從此敢吟不過霹靂灘門前又見馬如流兵革紛紛幾日休嶺似車盤方稅駕灘如霹靂更行舟豺狼敢侮乾坤大江海徒深蟣虱憂安得將壇登李郭挽回曦馭照神州諫花石綱十一章之七一章至四章已失皇帝之囿浩無涯日月所照同一家北連幽薊南交趾東極蟠木西流沙是中日月磨星斗下視羣山真培塿千年老木矯龍蛇天風夜作雷霆吼三月和風塞太空天涯海角競青紅不知花卉何近逺六合內外俱春容聖主胸襟包率土天賜園池乃如許坐觀塊石與根莖無乃卑凡不足數飽食官吏不深思務求新巧日孳孳不知均是囿中物遷逺而近蓋其私恭惟聖德髙舜禹一囿豈嘗分彼此世人用管妄窺天水陸馳驅煩赤子安得守令體宸衷不復區區踵前蹤但為君王安百姓天地一圃樂何窮咏桂雨過西風作晚涼連雲老翠入新黃清風一日來天闕世上龍涎不敢香西菴餞春傍水禪房半掩門乍晴簾幕捲黃昏風驅紅杏春何在酒入香肌玉自溫勿笑飢腸充笋蕨須將醉眼蓋乾坤杖頭更有百錢在明日還尋未到村寄朱韋齋歸帽納毫真得策要箋留帶計還疏公如買菜苦求益我已忘腰何用渠閉户羽衣聊自適推窗柿葉對人書帝都聲價君知否寄付新傳折檻朱兩宋名賢小集卷一百五十一
