body:
  text: 兩宋名賢小集巻九十七宋陳思編元陳世隆補龜山集上楊時字中立將樂人熙寜九年進士游二程之門歴知瀏陽餘杭蕭山三縣召為祕書郎欽宗朝兼國子祭酒髙宗朝除工部侍郎兼侍讀以龍圖閣直學士提舉洞霄宫卒諡文靖學者稱龜山先生有集此日不再得示同學此日不再得頹波注扶桑蹮蹮黄小羣毛髪忽己蒼願言媚學子共惜此日光術業貴及時勉之在青陽行己慎所之戒哉畏迷方舜跖善利間所差亦毫芒富貴如浮雲苟得非所臧貧賤豈吾羞逐物乃自戕胼胝奏艱食一瓢甘糟糠所逢義適然未殊行與藏斯人巳云没簡編有遺芳希顔亦顔徒要在用心剛譬猶適千里駕言勿徊徨驅馬日云逺誰謂阻且長末流學多岐倚門誦韓莊出入四寸間雕鑴事辭章學成欲何用奔趨利名場挾䇿博塞遊異趣均亡羊我懶心意衰撫事多遺忘念子方妙齡壯圖宜自强至寳在髙深不憚勤梯航茫茫定何求所得安能常萬物備吾身求得舍即亡雞犬猶知尋自棄良可傷欲為君子儒勿謂予言狂遣興嵩華千仞立不碍天地寛涇渭清濁流不離海波瀾人生過眼萬事役記憶細故真童顏嚴陵釣臺漢綱久陵遲國柄授權室中興得英主威明戒前失三公經邦手吏事困精覈功臣欲圗全猶不任以職矧兹故人分義敦天倫戚卓哉子陵心秉哲固前識投身豢名爵豈得枉尋尺萬鍾雖云富樊雉非予匹石瀨清旦泚蒼崕聳而直掲竿事幽尋釣水鮮可食羊裘禦冬温衮繡未云益三旌屠羊肆義在不吾易用舍各有趣髙風亘今昔書懐敝裘千里北風寒還憶簞瓢陋巷安位重金多非所慕直縁三釜慰親歡端午日悠悠南北各天涯欲望鄉闗眼已花憶得親庭誰共語應憐遊子未還家别游定夫黽勉吾將仕謀身力已分漆雕慙未信子夏又離羣慘淡交情重間闗道路勤至言宜逺寄孤陋願頻聞冬至日聞雷土圭日以南百年生有期新陽潜地脉慘慘羣隂㣲尚覺雲氣昏嚴颷弄寒威狂雷與驟兩奔逐如喧鼙百蟲誤驚蟄生理亦已虧向晚怒聲息霰雪交餘輝凌寒山驛孤持盃空自疑過金山環望荆吴折清江日夜流飛騰潮汐浪漂泊利名舟山湧鰲畨出樓嘘蜃氣浮僧窻千古意出没看輕漚過吴江天水相涵翠有餘玻璃萬頃接芳壺山浮晚照清如洗風逺飛帆細欲無漫叟未應甘皁櫪散人終欲傲江湖維舟况值鱸魚美鱠叠銀絲飫腹腴諸宫觀梅寄康侯欲驅殘臘變春風只有寒梅作選鋒莫把疎英輕鬬雪好藏清艷月明中勉謝自明少年力學志須强得失由來一夢長試問邯鄲欹枕客人間㡬度熟黄粱土屋土屋枕荒陂周回僅容席環堵異營窟猶遺古風質功雖勞版築身自有餘力依户鑿圓竇寒光度如璧户開迎温風冬墐可栖息胡為棟宇麗但免風雨阨安居自寛暇見者徒逼仄寄言鄰舍翁各自適汝適慎勿慕華屋澆漓非至徳酬林志寧君不見昔時卜年公折龜食墨瀍澗東伊流洛水環紫宫廣輪千里天地中真入一往不復見鼎湖弓劍空遺蹤隂陽所交風雨㑹和氣自古生英雄邇來百千嵗零落多竒窮鳴皋少室崢嶸倚天闕下有回淵萬仞蟠雙龍蒸雲結雨氣濛濛惟有蒼髯紫頷包𤣥珠時發光燄凌烟虹成周太平鬱餘䇿但令洙泗生清風羡君妙齡有仙骨乘槎暗與天潢通萬里不一息去若征孤鴻決開銀河浪分出一派懸秋空顧予山野姿未老心己慵謬從君子遊營道術偶同有如退之與東野自慙青蒿倚長松感君恵然抵山谷開談冰雪清吾胸髙堂黒髪顔如童未須念此心忡忡幸有山前清泉冷可酌與君啜甘茹草忘春冬入山行蒼崕峭立青天涯古徑蕪没㳂清溪深林四合晝亦暝寂寂惟有哀猿啼野人心形灰死如槁木山禽見之猶驚飛因嗟太古不可復我無機械胡相疑登桐君祠堂昔有隱者結廬子此人問其姓指桐樹示之故號桐君霜染溪楓葉葉丹翠鱗浮動汐波閒盤盤路轉千峰表冉冉雲扶兩腋間掠水輕鷗情自戲凌風飛燕暮爭還結盧姓氏無人㑹靜對庭隂一解顔巖松婆娑千尺倚巖巔隱隱虬姿拂逺烟尤喜地靈泉脉潤獨愁天闊晝隂偏孤根礙石盤彌固直榦凌霜老益堅臃腫不須逢匠伯散材終得盡天年和鄭商老下第雨餘新惹一畨愁展轉衾寒客思悠獻璞又添今日恨登科空負昔人羞林泉水石君先到京國風塵我尚留若為浮名苦憔悴前春行釣巨鰲頭潁昌西湖泛舟扁舟乘興漫追尋路轉河回入栁隂拂面落花春意盡避人幽鳥野情深慚無健思供吟筆賴有寒光映客心日落倚風歸棹急一鈎新月卧瑶芩春過鶯花無處尋移舟行近古城隂褰衣水上収殘片傾耳枝間覔好音山隔曲堤迷逺近魚跳文藻亂浮沈飄然自得江湖趣陡起歸與萬里心臘月見桃花脂臉輕勻作艷粧未應潔白似梅香夭紅不見凌霜操漫向春前取次芳過蘭溪紛紛朝市競秋毫江上霜風正怒號不問楊瀾與彭浪翩然東下日千艘枕上小智好自私小徳常自足自私開人賊自足心有目瑕瑜不相掩君子比良玉黙黙枕上思戒之在深篤雨寒天幕陰雲積蕭蕭雨正霪泥汚闗市寂水入御溝深破屋寒侵骨哀絃凍絶音更愁風力健瘦怯不能禁久不得家書􅀈彼晨風飛日暮歸鬱林游子尚何得但寄千里心庭闈斑白親憶念我亦深云何彼無耗徒役夢寐尋有如在空谷嵗久想足音竹篇一行書貴可抵萬金踟躇步前庭復坐口欲瘖淚墮不自知便覺盈衣襟人生本無待豈受外物侵歸當卧牛衣竹籜横荆簮藏春峽國華先生得幽谷于劍水之東去其所居僅一里餘負山之巔闢地西向為堂名曰詠歸堂堂下有亭曰老圃亭之前有跡穿數畦其南北有二茅亭南植梅數株名曰暗香北種紫竹數竿名曰虚心又其南有一石竇其下可容數人名曰容照巖合而名之藏春峽結廬東山阿屹然俯全閩下有黄龍淵浮光抱層雲彼美谷口翁杖䇿來往頻明月自為友顧影相為鄰擷芷佩芳蘭不與麋鹿羣虚堂發輝素黄巻日相親采薇芼晨羮弋鳧侑清樽曝日負巖竇為童浴溪濆㣲吟曳雙屐踏破青苔紋歸與自樂只此意將誰論㸃狂聖所與聊欲繼餘芬右詠歸堂昔君居隠鱗投竿拂珊瑚國華故居有隠鱗洞洞前有釣臺今來寓谷口結亭事春鋤亭下十餘畦蔚蔚富嘉蔬野果銜朱㽔蔓實垂青桴籬根有蹲鴟晨炊勝彫胡豈惟充君腹鄰里亦厭餘疏泉動地脈磽确成膏腴諒彼漢陰人假修匪吾徒避俗柴桑翁不復嘆荒蕪巻懷經綸手治平聲此一畝居知子非隠淪聊以寓壯圖人生出處分禮義安可踰兹謀異樊須甘事小人儒右老圃亭漫愁青女妒新糚巳有風傳處處香試問隠鱗溪上客欲將春色若為藏右暗香亭山横鼇背碧㠝岏亭對浮筠縹緲間拾遺記蓬萊山有浮筠之榦葉青莖蕭散誰為三徑佀祗應長共白雲閒右虚心亭清時投迹在嶔崟一穴晴光破晚隂刺草未容忘魏闕故應長有子牟心右容照巖山銜幽徑碧如環一壑風煙自往還不似武陵流水出殘紅那得到人間右藏春峽送丁季深烟含疎柳綠䝉茸杏頰桃英入眼紅邂逅興君逄臘雪飄零獨我過春風空愁轉轂音塵逺且寄離懐笑語中後夜月明人寂寂相思那復一樽同蘄州早起城頭雷動角聲哀似共行人怨落梅欲報晨炊梁未熟喚回殘夢眼驚開霜清暗覺貂裘冷月淡空令邑犬猜倚杖起肩風正慘紫㣲繚繞俯三台合江亭晚眺倚杖鈎簾兩氷間晴光飛彩上雕欄帆催畫鷁摶風去雪吐銛鋒作劍攅平野􅀈浮迷逺目晚溪潮漲失前灘騎鯨一往扶桑近休問人間行路難含雲晚歸寄真師每扣禪闗即晚歸塵中回首萬縁非不愁幼翳迷心地且聴潮音振祖衣歸路往來無别徑夜光清徹有餘輝虎溪舊社知重約陶令如今已息機題贈呉國華釣臺國華自作記不取嚴陵君不見釣璜溪上白髪翁一竿西去追㝠鴻田車同載非羆熊鷹揚烈飛如飄風又不見羊裘石瀬垂綸叟爽㮣凌天動星斗萬乘故人親訪求卧對鑾輿忍回首聖賢遇合自有時潔身亂倫非所知高風寥寥古已往較然得失知者誰君有釣臺臨橘水橘溪不與桐溪比收身欲攝渭老蹤笑撫長髯照清泚澄潭夜月秋光浮撇波短艇沿汀州長繩巨石不能繫飛帆片席歸蓬丘巨鈎沈餌牽九牛一鈎直掣金鼇頭脩鱗擺鬛浪山起雲鵬飛翻怱千里跨雲憑翼上青㝠一㸃孤光厠箕尾贈别蔡武子被誣得釋赴泉州録參君不見馬伏波後車薏苡珠璣多乂不見章臺秦璧非有疵相如謬使秦人疑匡章不孝通國非世無孟子知者誰惜君髙材兼衆美完徳從來速招毁含沙怒欲隂中之剛引涇流汙清泚輕雲捲盡天日明容光竅穴無潜形刮磨玉瑩氷雪凝楚人謾費塗丹青齊庭有鳥又不鳴會須一舉天衢亨北㝠歘起風雷驚脩鱗巨鬛隨波輕不須回首顧潜鯨好乗扶揺九萬里奮迅六翮飛南㝠送䖍守楚大夫象緯辰心次雄都水濁時經天浮瑞彩絶代出英姿厚徳千金璧虛懐萬頃陂霜蹄來漢苑雲翮上天池籍籍才猷美皇皇使即馳飛書騰衆吻横穽寘通逵剖竹章流逺還車蜀道巇除成都憲以臺章罷得䖍守秦庭徒被指趙璧本無玼黄霸初勤細裴公可範規惠流三那俗名掩四賢祠大厦資梁棟承祧頼鼎彛會須紆衮繡寧夕駐旌麾晝舸行空挽甘棠去㿽思烟波迎棹急江栁拂檣低賤士行藏拙參軍秩序卑生涯惟蠧簡事業付毛錐懶惰文園病伶仃曼倩飢自甘同跛鼈未忍舍靈龜朽質難雕繪餘生辱品題寒荄回暖律陰壑得晴曦終愧麞頭賤難酬國士知兩行淵客淚感激自沾頥縣齋書事寄張世賢朝衙羣吏集戢戢同隊魚暮衙羣吏散翩翩若驚鳧歸來坐虚室開編對璠璵啟户閴無人清風入吾廬持盃邀明月大嚼時與俱跰蹮歩松隂對影聊相娛嗟予懶惰乆濶略與世踈故人隔清湘懐抱何由舒為問魯山翁此意今何如歸雁天末驚風急江湖夜思長悲鳴愁絶塞接翼冐清霜澤岸多繒弋雲間乏稲粱茫然栖息地飲啄欲何傷感事世事浮雲薄勞生一夢長散材依櫟社幽意慕濠梁風激鷹鸇迅霜殘草木黄投閒如有約早晚問耕桑過闗山牢落闗山路年來倦徃還長隨流梗泛有愧白雲閒親逺江天外魂勞夢想間泫然遊子淚挹盡復汍瀾次䪨思睿見寄聖賢千古愧難攀力學方憂敢自閒顧我乆抛聲迹外慚君猶掛齒牙間平生計拙心長在解帯髙風志未還捧檄于今非得已漫勞魂夢遶溪山次䪨蔡武子書懐放形鋤色恐成光斵堊能令鼻不傷自信放魚真得計却憐挾策亦亡羊刃投有間多餘地語到無言輙自忘擾擾世紛何足問松忩終日獨徊徨感懐寄鄉友漫浪人間已十年簿書擾擾曰羈纒朱公漫有千金璧季子初無二頃田籬下蹲鴟餘晚實雲間紫鼈奮新拳淹留寸祿空囬首一望鄉闗一悵然贈致政楊孟堅宣徳孟堅歴三世不改官而諸弟子各有第宅故以楊陸為比子雲論薦有王音孟堅累為達官所薦陸賈年來老境侵自守一官歴三世退令諸子分千金平生器業成幽夢白首功名負壯心頼有新詩輕萬户未須投紱嘆堙沉廣文官冷竟誰憐空負才名四十年孟堅及第已四十年蕭散欲尋濠上侣飛揚還作酒中仙龍章繡紱榮何在鶴氅綸巾静自便遥憶瀬溪風物好勝逰應不愧斜川夜雨似聞踈雨打篷聲枕上悠揚夢半醒明日覺來渾不記隔船相語過前汀重經烏石鋪夾屋青松翠靄中去年經此亦匆匆重來烏石岡頭路依舊松聲帶曉風江上寒雲羃羃結秋隂月淡霜娥冷不禁更祝江波休蕩漾莫令清影碎浮金黄彦昭時思閣前有連理檜狐丘鎻千岑層閣跨雲起永懐霜露思時未薦醪醴敬宗貴收族蟄蟄神亦喜故令傲霜根駢枝𣸪連理黄侯渥洼種一躍不容擬慶源如歸墟萬壑自奔止終見君子鄉乃是鳴珂里江陵令張景常萬巻堂民生結䋲初異宇本同體誰令四目翁破肉作瘡痏龍龜出河洛兹理固天啟張侯瑚璉姿髙歩軼前軌買書費千金充屋未云已六經滀溟渤百家襍原委中流湧千波舉體惟一水參前真有趣萬古一憑几毫端吐竒芬溢目麗紈綺㣲言窺聖域妙應期得髓黙坐筌蹄忘斯文亦糠粃送蔡安禮眷言與君違寤寐念徃昔結歡自童稚分比膠投漆乖離成參商出没俱齊汨羲和鞭日御過眠飛鳥疾五載一相逢俯仰如昨日論情方繾綣念子又何適行矣不可留惝恍心若失人生惟所遇行止或使尼况復各宦遊聚散何可一嚶嚶黄鳥聲上下求其匹俛首聴遺音飄零淚横臆題愚齋結廬依林丘回峰爭盤紆下闞清池淵憑軒數游魚飛閣出雲表浮烟襲簪裾中有傲世士脱畧自謂愚髙義輕籝金貽謀有詩書青編富充宇散秩羅瓊琚鱗鱗壁間題一一露珊瑚嗟予久昏塞荒蹊少耘鋤昌黎已隔世將焉問夷塗道逢北山公荷鍤時與俱皎皎河曲叟朋儕共歔歔髙齋一來遊豁然心神舒籬東有餘址誰能薙榛蕪結茅可容席一瓢來此居寄謝陶彭澤何必愛吾廬童氏必大亭超遥武夷翁霞衣爛朝日作亭依雲根望壙兹焉息仙遊去不返孤立巳陳迹身雖𨽻編齊貽謀有遺則慶流終必大名亭以為識伊昔晉公堂三槐手親植扶踈滿庭陰貂蟬映圭璧黙視天人際召應齊律吕閭門容軒車兹里固可必終見童氏里鳴珂聲赫奕江上晚步鏡潭磨青空璧月浸江淥攬衣弄清泚炯炯月在掬冷然適我口肝膈貯冰玉流光頃百變一玩不可復歸來盡餘樽醉卧媚幽獨羲娥偶相憐嵗往如破竹餘生枕中付勿問黄粱熟寄湘鄉令張世賢身遊羿彀偶相逢安得初終若駏蛩道學未容窺閫奥吏師應許叩鄰封蕭條此意君誰問落拓㣲官我更慵盧白回旋真戲事傍觀無用氣填胸縣齋書事朱顏凋盡鬢䰐鬖世路低回老益慙偶影獨游聊自適談書不輟竟何堪神爐黙黙金徒踊螘蛭紛紛夢正酣誤把此身攖世網自纒徽纆信如蠶臨川驛偶成冉冉朝仍暮蕭條官舍幽閉門三尺雪觸物一虚舟蟲蠧生涯盡萍漂世事浮尚思方技學多病未能休晚泊遇雪向晚驚風急飄零雪滿坰氣升雲羃羃天逺月溟溟寒色終無賴豐年漫寄聲餔糟吾不慣强醉復還醒偶成天逺何須問勞生聴若何犂鉏三畆足栖息一枝多白雪寧堪冒清時只浪過好尋明月影醉舞自婆娑除夜感懐嵗律已云盡思家日日深二年為客恨千里倚門心節物羅樽俎兒童學語音眩然如在目恍惚夢難尋愛日乖予願親顏長在心逺遊仍換嵗華髪想盈簪永夜誰同席殘盃憶共斟相思空有淚揮洒滿衣襟次韵錢帳計駸駸羲馭定難羈過隙跳丸日夜馳但見光陰如掣電卻尋缺巳當朞飛黄汗血宜千里秋鶚乘風此一時芝草鳯凰真美瑞清明應有退之知和張倅行縣江浮叠巘弄清輝雲外㝠鴻江上歸擊目自多幽興在揮毫時見彩箋飛應愁零雨侵星駕好為援戈卻晚暉帝室正須調鼎鼐動移寄語不須譏㳂幹游光大示犀老山横杳靄有無中叠觀層臺一梵宫萬軸琅函方杜口數聲鳴鳥正談空溪雲抱影侵行屐香篆飛烟襲晚風薄宧羈人如接槢自慙來往苦匆匆王簿清輝亭黛染烟螺拂檻低抱城流水緑逶迤澄瀾碎影揺青鏡斜日沉暉隠半規坐上盈樽無俗客壁間照夜有新詩登臨巳動忘歸興況復清談足解頥寄長沙簿孫昭逺陽城衰晚拙催科闔寢空慚罪亦多祭竈請鄰君自適載醪祛惑我誰過猗猗庭有蘭堪佩寂寂門無雀可羅歸去好尋溪上侣為投纓紱換漁蓑安禮以宏詞見勉奉寄吏部文章世所珍終慙無補費精神浮名膚外増餘賛薄宧戈頭寄此身養志吾方同邴曼談書誰復問山賔自憐坐頃三遺矢衰晚那能用楚人秋晚偶成纎纎晚雨洗秋客庭樹蕭然䇿䇿風萬籟自鳴羣物外四時長在不言中坐臨流水襟懐冷卧對浮雲世慮空寂寞一㕓吾自適客嘲從更議揚雄臨川道士風雨離山驛㫁橋危欲顛去心奔逸驥行路上青天鴈序江湖樂雲歸島嶼連悠悠逺征客千里獨茫然旅舍書事出懶乖時尚支離與世殊饋漿驚禦㓂避虎愧陽居觸事紛難解忘形色易鋤不須修混沌機械本來無過清溪渡天濶江銜雨㝠㝠上客衣潭清魚可數沙晚鴈爭飛川谷留雲氣鵜鶘傍釣磯飄零滄海客欹倒一帆歸泛江至土坊萬頃江湖逺孤乘一葉船雁飛雲外字篷掩水中天波靜櫓聲息風㣲帆影偏回環聊注目浩蕩接清烟秋日有懐寄從弟表民丁伯父憂羈旅吾方困哀思汝正煩望雲愁雁序回首憶鴒原北圃蔬還盛東軒菊想繁飄零不相見沾灑獨忘言淮上獨酌亷繊晚雨洗輕塵天淡雲浮夜色新賴有麯生風味好不須邀月作三人緑隂亭上沙邊幽鳥傍清漪瀧下漁船逆浪歸身在輞川圖晝𠂻晴空惟欠雪花飛溪上悠揚春夢成幽興冷落溪光醒酒魂天濶雲浮遮不盡浪平風遇杳無痕兩宋名賢小集巻九十七
