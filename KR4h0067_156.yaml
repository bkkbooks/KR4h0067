body:
  text: 兩宋名賢小集卷一百五十六宋陳思編元陳世隆補野處類藁卷上洪邁字景盧鄱陽人皓季子紹興乙丑中博學宏詞科孝宗朝纍遷中書舍人兼侍讀直學士院拜翰林學士進煥章閣學士知紹興府以端明殿學士致仕卒贈光祿大夫諡文敏有野處類藁容齋五筆夷堅志萬首唐人絶句行于世秋日漫興二首江湖久客日思家坐覺微霜上鬢華節序又催秋後鴈風光爭發雨前花倦遊已夢莊生蝶不飲何憂廣客蛇怪底朝來衣袖薄一川白露下蒹葭一夕西風木葉飛畫梁落月淡餘輝銀燈夜照還家夢金剪親裁寄逺衣霜信早隨新鴈至素書深訝故人稀無因為謝東曹掾鱸熟蓴香莫便歸庚戌正月十四日同友人丁晉年王蔚之謁普照塔孤塔鶩霄漢晴影金碧眩重來得寓目歸枕尾殘汴緬懷何姓人哀禱傾淮甸是身如皎月有水著處現彈指遍大千何止數鄉縣惟應因緣地聊爾共流轉顛危悔勒馬善涉悟覔扇君看悔與悟只在一轉盼至人獨何心示此禍福變當知夙緣定莫作邪道見哀哉衆生愚積惡稔天譴云何一朝急賴此香火薦我來適燈夕寶蠟明邃殿還揩客眼塵重睹浮屠面朝來塔上鈴告我風色便平淮一回首岸容失蔥蒨曉過吳縣舟行有嚴程越國常曉發雙櫓兀殘夢起坐窺落月人家岸野水霧雨籠邃闥遙憐瑣窗人攲枕聽嘔軋陪餘杭張無垢先生飲先生結屋在人境門巷蕭蕭作氷冷紛紛入眼不入意坐客千言不相領叩關聞我倒屣迎重解舊榻塵埃生向來妙處久不吐一挽天漢崑崙傾共説别來經世事我言所向皆兒戲胸中磈礧不用澆便有清愁説無地士林師範六十翁先生合在伯仲中願言終賜指歸處為君敬作曽南豐於潛道中山行厭犖確理策扶攲危緑野三兩家一息知可期冉冉晴林端炊煙裊晴暉居民豐且樂恐是太古遺那知都邑間百索困鞭笞繁華今何有半作道旁羸度芙蓉嶺幽泉端為誰放溜雜琴築山深春未老泛泛亂蕊馥娟娟菖蒲花可玩不可觸靈根盤翠崕老作蛙蚓蹙褰裳踏下流濯此塵土足何當餌香節淨洗心眼肉餘功到方書萬卷不再讀晚嵗窮名山靈苗縱穿斸菖蒲服之通神令人聰明健記信州禪月臺上玉峯點寥廓霄漢疑可梯玉水環城陰灧灧方拍隄層臺擅二美吾策時一攜何當蠟我屐更欲照以犀塵勞不相赦竟類窮途迷吾生麋鹿爾不羡駕駱驪向來丘壑懷語發人所詆長安黑頭公玉勒朝金閨山林出戲言廣已無端倪誰收遮日手歸把耕雨犂紛紛塵土中等是舞甕雞頗聞山水間幽子飯藿藜行當踐此語絶境同攀躋送禪師往妙香寺元住雲溪道人捨幽居誰管溪上雲此身白雲耳遑暇南北分頗聞妙香山天花雨繽紜宴坐丈室間歷亂蒨衲紋山前路悠悠山後水沄沄應觀川途客念我奔走勤豈無香火緣他年往相羣飽食跛鐺飯稀摘幽澗芹當令枕花臺白社掩前薰坐睡坐久睡屢兀手失未了書清風脫然至心醒得我娛起看孤隙光了不移錙銖云何短夢中萬境生須臾嗟彼市朝子百巧營其軀安知非夢役過眼滅無餘至人有達觀那與世賢愚不須無言子同上崑崙墟遊山光寺寺藏兩山腹路轉百步陰登髙試病腳掬冷清煩襟敗壁龕石刻嵗月不可尋惟應查公石俯仰閲古今屋古囷枝挂摧頽力難任何當咄嗟辦嗣彼鐘梵音興衰豈關吾得酒且滿斟歸路有溪月攬之醒吾心送建州徐生人羈天地間誰非一浮萍泛然偶相值便有離合情君家武夷下歸路塵眼明我生愛山者夢寐秀色橫秋風送客去把手更心傾邇逢山中人為我寄此聲贈覺師覺師儒門秀脫屣世故早那知軒冕味夙悟心已稿惟餘章句習心境時相惱如人生於齊而即楚鄉老雖遭楚人咻微音或清好固無益生死亦未妨至道家山亦何有骯髒衣間窖叢林選佛場一擲想盆倒云何慰故居俯仰待華皓他年空手歸子語吾為老幸分曹溪水萬劫付一澡休寧村落間有竒石時彈子渦所出宜養石菖蒲程德藻許以餽我以詩督之君家緑溪上岸曲溪成渦渦間石無數水蹙相蕩磨誰嘗掬而戲一一印指螺我欲往取之擁此菖蒲窠石罌注新汲幽姿發清哦夫子許餉我往督書已多願言速寄與起此泉石痾效淵明人生本無事况我麋鹿姿一墮世網中永與林壑辭此行獨何事豈不為寒飢弱嵗慕古人頗覺世好卑那知齒髮邁終然此心違春風到山澤魚鳥亦知時我行何日休流目瞻長岐且用陶翁言一觴聊可揮酬馬退翁見示之什我家大江左江水日夜東遙瞻發源處乃在西南窮相望邈異境正北一水通故令我與子迹逺心自同我生寡所諧強顔紅塵中倦飛矯歸翮飢吟咽寒蛩獨欣得吾子萬慮一笑空時時出秀句醒我如風松當知山澤臞不鄙犀角豐彈冠實伊始此生各飛蓬卜鄰應未必即事聊從容戲答胡汝能吾生苦中狹與世枘鑿乖平生素心人耿耿不滿懷汝能伯始後遊世如嬰孩相逢握手語便作塤篪諧時時笑謂我如子患未涯執古以規今求合誠難哉涉世幸未逺子車尚可回我介足怨忌君通絶嫌猜不見山巨源雍容居鼎台不見嵇中散絶交自可哀賢愚心自了短韻共一咍謁吳公路許借論衡復留一日戲作幽獨不自得駕言款齋廬殷勤主人情投轄恐回車轄亦不須投此去將焉如惟憂酒錢盡使吾詩腸枯會合曽幾何可復自作疏更當留一夕帳中搜異書新秋幽人無與娛耳冷百不聞新米熟未知但覺市酒醇滄洲散秋色山水逾清新一醉不忍獨念我存故人道中得雨吾行田野間吁嗟連數村千山收宿雨溪作黃梅渾漸看風葉底一洗龜坼痕餘功被行客稍壓旱塵昏道中驕陽久自殺一雨蕩龜坼田夫夢亦好翻隴已幽咽朝來喜相晤一飽心已決翻翻風葉亂嫋嫋露芒出去年禾欲秀積潦滿秋澤今年豈堪旱束手就溝壑我生拙謀口藜藿甘如密向來真過計憂民豈吾職赤子天可憐嗟人獨何力何須事兒戲合沓來賀客稍欣新稻熟社酒行可覔當同扶路翁醉歸舞南陌無題前年溪上秋風時主人酒熟烹黃雞歸來醉倒睡便著父老喚起牛羊蹊先生一醉寧易得未辨身為貴人客征西將軍爾何人那用尊前驚墮幘朅來明月再經秋聞道軒名涎已流懸知得酒推不去此客有轄何須投今我正為奔走役空想題詩滿髙壁若逢落魄姓回人為問何時定相覔書窗對月天公自厭雨一夕開寒晴霜風淨曠野鴻落有餘聲飢鴉得林靜霽月素窗生慰開睡眼色一洗空花橫故人千里餘壺濁誰與傾遙知勸影杯共此通夕情今冬有竒事三見飛玉英明年溪上路誰餉雨中耕宿野人家夢裏滄波搖一葉覺時正受肩輿兀人家一宿晚可投新席稿梧香更滑霜前䆉稏收百畝稚子新能牧鵝鴨我生本是個中人挾策久矣猶能説度石棟嶺我行欲安適䇿馬踰山樊谷深不可瞬危磴爭猱猿坡陀兩山間寂歷三家村茅簷青裙婦蓬髮薪煙昏敲冷那可飲分我一掬溫郎樵晚未歸客至不與言不奉沙頭巵肯投栁下門作詩配國風行者式其藩用退之韻賦新霽春泥窘幽步苔上屐痕少新清一褰衣緑葉藏啼鳥方塘灧宿漲古鏡窺清曉華顛忽自笑綵羽墮驚矯瞻言雲中耕縹眇穹脊繞歸把東臯犂此念何日了送金確然歸弋陽昔我雲溪居送子雲溪濆重來問何如笑指溪上雲一别四周星坐此世故紛衰顔兩非昔華髮粲可耘我纒風樹悲終日無一欣子乃菽水憂尚此奔走勤對牀語未終懸知便離分霜風吹客袂別意如絲棼子歸葛陂上去路接鄉枌歸夢尚隨子何當歎離羣至節日建州會詹士元嗟豫身百憂佳節過倥偬客愁隨線增歸思與灰動當年從子日未覺百慮重髙堂繞牀呼一擲有餘勇那知客天涯相對寒骨聳嵗月曽幾何鬢緑今種種忍飢山藥煮附暖地爐擁深藏斷往還衰病脫拜拱興言望鄉關雲物方鬱滃空餘相屬意杯酒久不捧用前韻答翁子靜客心既岑寂節物亦倥偬幽籬菊初暗深壑梅已動古人微尺璧顧謂寸陰重欲從夫子遊掣肘愧不勇松髙節磊砢鶴老格清聳當知山澤臞誰笑將相種一官戲人間叢書以自擁微言聞緒餘三歎手輒拱青天本寥廓不受雲霧滃願言瞻清明茗碗不辭捧微雨端居身百憂况乃貧病俱天公頗相愛相愛雨我蔬藥區曉晴新日薄生意蘇衛生固未必一飽行可圖故園天一涯茒荆誰為鋤崢嶸嵗云晚此念當何如寄題叔父池亭一壑久藏勝數椽忽開亭方塘蔭瓦影淨見魴鯉行主人有嘉招轉柁失高城不知幾搖兀我舟上崢嶸尊酒酌芳醁園蔬煮柔青翩翩射鴨方一笑甜綵翎那知海陬姪斗粟忘歸耕餘生信萍梗歸夢識林坰漲水有回波故鄉豈無情一醉會有日因之濯我纓贈謝彥翔建安人九嵗異人與藥至今不食建安有梅子真升仙處我本世味薄寸田足自營年來荆棘盡稍有梨棗萌但恐骨相凡未敢希長生陳留達人後未齓犀角盈舊遊記三山幽夢徹九清邇來三十年但覺膏粱腥幽尋飯緑髓默卧誦黃庭顧我塵土中深慰夙心傾仙人吳門卒解後煩寄聲相期朝金闕鶴馭何時征考亭陳國器以家釀餉吾友人卓民表民表以飲豫香味色皆清絶不可名狀因為製名曰武夷仙露仍賦一首二年飲水閩中村忽見玉醴傾蠻尊涓涓醍醐灌熱腦耿耿沆瀣明朝暾旱塵久漲塵市暗渴夢欲挽江湖吞何人逺致雙鯉信知我來扣羅雀門不須邀月已清絶尚恐尉齒當微溫要從華池吸真液豈獨玄鬢薅愁根微茫已識投轄客蛾眉似返當壚魂竒功誰續伯倫頌妙意要與淵明論胸中我自有涇渭筆下君已傾崑崙詩成寄與約他日飲君與我空瓶盆久旱新嵗乃雨高田土可簏下田不受犂遺蝗憂插啄况乃麥未齊赤子天自憐溝壑忍見擠雨逐新嵗來停雲忽凄凄莫辭三日霖為作一尺泥汪汪既沒膝灧灧仍拍隄漸看蓑笠出笑語喧畛畦我欲與寓目父老同攀躋此身羣萬生擾擾舞甕雞曽亦無幾求脫粟配羮藜永言故隴耕老眼路凄迷好收斂手版鋤耰歸自攜春日與卓民表陳國器步出北郊灼灼桃吐華濯濯栁垂縷芳菲挽人出春力乃如許嗟佘閉門客佳節過不數不因可人呼那得幽步舉客如山陰勝詩作斜川語誰言一尊酒妙處合千古歸來讀殘書耿耿霜月苦空餘流落心三歎非吾土蔬飯蕨拳嬰兒手笋解籜龍蛻薦羞杞菊間來斸煙雨外嗟佘飯藜藿咽塞舟泝瀨朝來二尾魚一飯良已泰充腸我誠足染指客應慨平生食肉相蕭瑟何足賴王郎催牛炙韓老憶鯨鱠俠氣信雄夸戲語亦狡獪吾師曽顔子陋巷翳蓬艾執瓢不可從一取清泉潄戲贈吳知伯條侯得劇孟吳楚坐可馘我知無能為失此一敵國偉哉竒男子俠氣橫八極書生復何者骯髒老筆墨刺口論安危事往竟何益匹夫嘯空野驚塵一方塞區區空有意浩蕩洗鋒鏑何如吳王孫語輒面浮赤交遊得朱亥負販鄙膠鬲腰間鐵絲箭上鏃紫塞翮笑指蛇豕區滅此而後食諸公未備知欲薦恨無力明日我過君烹牛啖社客當書遊俠傳令子姓名白送僧空中世界紛河沙不知底處為天涯乾坤百億在指掌觸處與子同一家云何猶作去來想千里一跌毫釐差坐令契潤費星紀嶺雲欲寄山川遐撥眉相對此何日丈室淨掃餘天花詩毫辨舌久投閣萬竅寂歷風無譁為君遊戲出三昧妙處那復相聱牙往將妙響應空谷一任飛錫凌蒼霞兩宋名賢小集卷一百五十六
