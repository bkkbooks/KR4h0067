body:
  text: 兩宋名賢小集巻二百五十九宋陳思編元陳世隆補鶴山詩集魏了翁字華父號鶴山邛州蒲江人慶元五年進士理宗朝累官簽書樞密院事改資政殿學士福州安撫使卒贈太師諡文靖有鶴山集登萬象樓和計次陽韻塵纓羈我身對景慵著語青山喚倚欄壮氣臨潁汝層雲捲油幕萬嶺眇煙縷酒闌一横笛樓前葉似雨七夕南定樓飲同官誰将明星貼天宇州國宫垣象官府更将四七隨天旋常以昏中殷四序迢迢河漢衡秋旻前有蒼龍履𤣥武牽牛正向西南來左右兩旗北河鼓鼓星之側為天桴鼓上三星為織女何年人號天女孫便把牛郎擬夫婦不知此是天闗梁河漢之津有常度晦明伏見莫非教肯為文人給嘲侮班曺庾謝猶讆言世上兒曺更堪數臨風三誦大東詩須信辭章有今古閣學袁侍郎燮以朝鯉豢龍兩圖見寄索和物生宇宙間巨細統有宗鱗蟲三百餘厥長惟稱龍滃霧瀰六合神物閟千重維時赤鯉公坐制纎鱗窮纎鱗何足言什百來追蹤亦有横江鱗望洋喪其雄于于圉圉然等辨殊卑崇一鱖掉頭去恝然若将終三公不易介誰謂恵不恭魯生陋漢儀商皓嬰秦鋒行吾之所安匪以驚愚庸又如秦漢後俗學千載同卓哉無極論上配禹孟功吾言聊自警母誚惟少通右朝鯉乾坤包萬有納納百囊罟人位乎兩間利與害為禦一氣貫四時五風甘十雨神龍以為畜擾御不予侮河有背負圖庭無漦流女義理之不明人情自疑沮範圍吾職分往往苦違拒同室操戈鋋一身隔肺腑帝王豢龍意棄置那復取四靈非不霛有不得其所生息之相吹古今類如許古人體天意萬物我其主蟲莫知於龍拊循如士伍今何故無人亦足騐胸府聲和鳯來儀心平轡如組矧伊人中瑞治亂係嘿語欲入而閉門誰出不由户兹事闗人心作詩附農圃右豢龍贈畫工王三錫傳神氣質紛不齊四海無似人藉令貌相近氣有醇不醇善觀人品者儀貌與機神正邪眸子見善惡眉間分且如孔與虎二人自非倫而俱類孔子俗眼何昏昏古人有夢語便知為良臣又能記眉目曉然得其真此雖與神㑹難與淺者論王生歸為我試語司寇君此理充得去三代同此民遊上天竺風波滿平地世路繞羊腸急欲逃塵網遥登選佛場雲深午猶暝竹密夏生凉興逸忘歸去髙眠借石牀次韻知常徳袁尊固監丞送别細把行藏為子評只知盡分敢徼名出如有益殷三聘用不能行魯兩生此道古人如飲食後來竈婢或猜驚子雲亦號知書者猶把商山作採榮孔訓原無實對名只言為已與求人能知管仲不為諒便識殷賢都是仁義利兩途消處長古今一理屈中伸自従聖學寥寥後千百年誰信得真别來嵗月爾滔滔流落天涯忽此遭萬木辭榮秋意澹百川歸壑㟁容髙笑看海上兩蝸角閒秃山中千兎毫若向顔曾得消息直須奴僕命離騷夕陽舂處是吾家水繞山環路轉賖蹙蹙四方渾未定茫茫大化渺無涯歸來已恨十年晚老去一作却空嗟雙鬢華各願及時崇令徳萬鍾於我本何加題桃源圖伏勝髙堂書已出竇公制氏樂猶傳魯生力破秦儀陋商皓終扶漢鼎顛隠者寧無人禮義武陵匪獨我山川若将此地為真有亂我彞倫六百年題謝畊道一犁春雨圖牀頭夜雨滴到明邨南邨北春水生老婦携兒出門去老翁赤脚呵牛畊一雙不借挂木杪半破夫須衝曉行耕罷洗泥枕犢鼻卧看人間蠻觸争和靖州判官陳子從山水圖十首予遷靖州判官陳子從珪為鄰嘗從容出示靈竹僧不二山水圖其末有乃祖乃父十詩前賢風裁邈不可及取次原韻以識髙山景行之仰云彭蠡歸舟外物羈縶人無退亦無遂媿彼自由身朝發而夕至山堂曠望山堂有何觀四時互興歇萬物隨天根東生復西滅重湖汎月水月皆内景入秋倍清輝世無善觀者滔滔吾誰歸星灣晚酌士非耕釣者而從蓑笠翁人生貴適意莘渭亦時中雨後觀瀑澤氣蒸前山起自膚寸㣲競看千丈瀑不悟片雲飛松逕晚步松柏不受彫此亦易知耳須看竹有筠與竹相表裏谿上賦詩莫作流看谿天命無窮已詩人若知得千古可坐致林下避暑㪚髮避炎暑炎暑苦相尋云何對大賔不見汗霑襟載酒尋梅松竹貫寒暑而梅時往來不知復姤意隨人漫徘徊雪中訪友懐人得清晤此樂浩無期剡谿興盡返未喻伐木詩夏港僧舍迅商呼不來午汗如翻漿道人空萬縁邂逅賛公房虚室千世界圓滿一鉢囊碧雲䕶兠率白日耀普光蕭蕭蘆葦中著此清浄坊鑒師従西來一喝登慈航唾手舉慧刄斫斷煩惱韁邀我供煮餅心地陡清凉官焙破蒼璧桃笙漲寒江従師問究竞室西照殘陽寄題雅州胥園胥君欣然來錦囊背奚奴探囊發詩巻一一卿大夫未識胥園面詩巻自畫圖埽石卧竹影長鍤斸芋區胥君於此時林泉傲金朱懶予本丘壑誤被塵纓縛每逢漫浪友慚愧紅塵脚㑹當尋兹盟酧此一大錯禹穴禹穴無従一罅通禹陵元在亂山中飲泉窆石皆如舊誤却東遊太史公寄題鄒子震父梅屋陽和運一氣萬物生意回殿冬而魁春幽香先到梅華匪時世糚實有調鼎材主人約嵗寒結廬江之洄送張匠監忠恕以祕閣知贛州西南間氣忠獻公一生心事天與通才髙志廣無處著獨倚衡疑望闗洛九州風露方漫漫養回殘夢歸餘干唯将一念遺孫子長與世間立人紀宣公端明今在無我生不識慚非夫寧知中嵗遇行甫歴歴典刑猶祖父試従㣲處覘經綸中邊玉潔無纎塵大河滔滔恣羣飲逡巡獨惜障泥錦曉庭戒仗喑無聲掣纓振鬛時時鳴京師邸吏自相語張公立朝我良苦不知書疏何所言母一論奏人争傳好名之人能遜國而於豆羮見詞色反覆耐看不可瑕此事無素能然耶我從同朝一千日見公造次皆是物寄聲為賀贛州民朝廷為汝輟争臣卻須更問蕭太傅中朝外郡誰當慮塵外亭髙出雲端絶世喧碧天秋浄鏡無痕塵縁不向塵中見聊與遊人洗眼根天竺寺野塘風細度香蓮碧澗雲深響玉泉従此西湖不須到淡煙寒月一家天寳雲寺偶隨鷗鳥度寒溪寂寂禪闗半掩扉翠玉萬竿迎曉履欲憑風露濯塵衣馬祖巖去來踪蹟等遊塵誰向蘧廬覔道根巖穴故應無别異鐫題空有姓名存塵外亭林逺渾無鳥雀喧山青那覔燒霆痕三千眼界雲霄上十萬人家草樹根天竺山好山堆翠擁金蓮花屋籠雲傍石泉秋沼英蕖半開謝直須饒占一壺天兩宋名賢小集巻二百五十九
