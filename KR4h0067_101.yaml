  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0067_WYG_101-1a, image: WYG1363/WYG1363-0054a.png}
body:
  text: 兩宋名賢小集卷一百一宋陳思編元陳世隆補初寮小集王安中字履道陽曲人第進士政和中自大名主簿纍擢中書舍人翰林學士承旨出鎮燕山府召除檢校太保大名府尹兼北京留守司公事靖康初貶象州有初寮集許道寧松玉骨巑岏雪作頂清溪下舞蛟龍影忽驚發地扶屋極誰向天公乞刀尺道人逸氣天雲高韋偃畢宏皆坐超奔崕斷壑皆睥睨悲風激激星勞勞胡為乎挂卿髙堂之素壁許侯筆興萬牛敵坐來一氣回霜秋四顧滿堂皆古色老夫卜築寄雲松屢揖伯鸞攜敬通忽見婆娑眼中物使我嚼句生天風千章竒材卧澗底公獨區區悅其偽我知金石貫氷霜便與髯卿同一味君不見耳霞大士燒木佛此老胸中果何物戒壇院東坡枯木張嘉夫妙墨童子告以僧不在不可見作此示雪裏壁間枯木枝東坡戲作無聲詩霅川謫仙亦豪放酒闌為吐雲煙詞相傳秀色絶今古正如四月出盆絲老僧遮護不許見敲門遊客遭慢欺我來擬看亦乘興興盡却還君不嗤王摩詰釣魚圖我本江湖人市朝豈無心偶然墮世網如鳥思長林交視豈不多之子德我深賜沐有餘間一馬時相尋茒亭容膝耳九衢可窺臨挂壁出古圖驚笑靡自任筆墨粗可識佳處疑非今佳哉王摩詰風味我所欽自狀釣車圖葦間相拏音有如漾波遊一杜挾兩岑坐令黃塵中思落清江潯秦子詩思古清新間雄沈示我五字句月杵鳴秋砧回杯勸摩詰對畫手自斟我子髙趣子聆我微譬如影與形妙在同一隂我時坐其旁清風溢幽襟歸來步長廊缺月户半侵丹青已過鳥齒頰猶哦吟頻公有聲畫相我無絃琴次秦夷行觀老杜畫像韻寒折天吳圖飢糴太官栗拾遺官在朝何異老林麓英風想廉藺妙手傳顧陸蒙茸頭傾冠駊騀鐙脫作熊兒與阿假左右相扶逐生平經綸具悵望青蒲伏窮途付麴蘖放意謝羈束草堂幸無事君騎時見辱清吟動霄鶚逸艷驚魚目顧兹神眀意豈易丹青卜當時腰長鑱憔悴十指秃聲明乾坤破生事嵗月促但聞列仙癯豈見肉食墨企豫攀逸駕短步羞匍匐不能師廣袖乃爾好竒服嗜詩得雋永徐味自當肉不知褒公貴顧謂何郎俗窮通等夢幻思慮自棖觸苦吟只效尤呼盞進蟻緑題席大光所藏謝安石真小兒破賊書能置此貌恐非山澤癯東土登臨猶可狀新亭談笑若為摹雖疑太傅平生在不比司空少恨無只寫君真便相似向來曽見管夷吾新畫八賢閣像此地何從列姓名半因新國用輕刑江湖萬里知聞斷圖畫相看眼自青顔特約為范師厚作孔明坐嘯圖十大比丘像顔者以為聲訛不可不下一句窮顔妙畫今虎頭忽以武侯為范侯他日却寫十比丘下筆不數僧貫休作佛作相三昧遊在江在海兩浮漚丈夫心機入法流到處還渠第一籌題李伯時畫船子和尚等個魚兒久未逢滿船眀月一絲風離鈎三寸誰開口打落掀天白浪中一橈打省猶回首露布須收人與船不著釣絲牽老會却留戽斗付龍眠題顔持約畫四小景梧山暮雪一白空迷浩渺萬卷却立孱顔北渚曽遊帝子南巡更憶虞鰥荔浦久隂曽向荔支浦宿林紅間碧猶疑老矣少文欲卧咄哉王贊何如桂嶺秋晴海市當寒可出嶽雲正雨猶開故捲黃茅障盡為飛碧玉簪來梅村欲曉暗射霏霏逆鼻荒雞喔喔號村萬里客行憀栗玉顔破霧相溫題陽華岩圖元子説陽華巉岩不可家此招吾已諾不恨客天涯題陳去非王摩詰嘉陵圖江山已暗大同殿絃管猶喧凝碧池别寫嘉陵三百里右丞心事欲誰知祁陽成逸畫浯溪圖相示為作長句少文閲世老不出自畫雲山滿墻壁澄懷觀道追所厯坐覺琴聲隱金石我亦七年湖外客夢中猶泛湘江碧浯溪之圖喜新得身卧嶺南心嶺北憶嘗留語溪邊僧異時人讀唐中興説與此乃秦典刑三句入韻之罘銘今欲復作誰可令似有元結無真卿風煙慘淡萬古情不如且尋畫隱成李成山水五日十日一水石此言雖工蓋其迹請看天地開闢初豈鑄日魂鎔月魄忽然而成隨所寓衲護風雲元滿肚吐為千偈口瀾翻遊戲法中同一趣李侯落筆風煙起妙處欲回真宰意扁舟不動水粘天落日孤明山若椅斷猿吟挂青楓林澗松倒卧長十尋白鷗似作終老計浮雲知自何年隂由來神器完天力一抹江流吞萬磧寸量尺度但形摹畫史如山爾何得貴人費盡千黃金寶奩玉軸誰敢爭一聲常賣落公手世間得喪誰虧盈我生懶率便疏放只有幼輿岩石相他時真作畫中人倘辱書來問無恙題趙大年金碧山水圖王孫胸中楚七澤不學庸史誇水墨試開緹襲拂蛛絲半幅鵝溪射金碧余聞女媧煉石補天缺石破壓天天柱折五色墮地金嵯峨六鰲跨海吹銀波扶桑玉紅下天半貝闕珠宫紫雲滿桃花笑作十洲春劉郎此地聞雞犬繫我不從天津槎自閲妙畫徒驚嗟迷魂一夜飛蝴蝶覺來半破篷窗月觀僧舍山茶山僧手種兩山茶看到婆娑鬢已華應為客懷驚嵗抄先將春色照天涯緑裁犀甲層層葉紅染猩唇艷艷花凍頰如丹相映渥不辭衝雨踏泥沙兩宋名賢小集卷一百一
