body:
  text: 兩宋名賢小集卷一百三十八宋陳思編元陳世隆補梁溪集上李綱字伯紀邵武人登政和二年進士第宣和中歷尚書右丞髙宗即位拜右僕射兼中書侍郎卒諡忠定有梁溪集一百二十卷松江第四橋舟人云橋下有老蛟以後赴沙陽謫所作松江第四橋風雨不可過下有百尺蛟蜿蜒枕橋卧窟宅據要津口腹長飢餓每慿波濤勢能作舟楫禍安得佽飛手坐使神姦破往來永無虞時鼓清江柂雜興三首邑犬驚行客林烏啼曉霜山村雲冉冉澤國水茫茫移棹輕舟穩鈎簾野興長誰知因謫宦得向水雲鄉肅肅嵗華暮霏霏煙靄深輕氷依淺渚寒日映疏林故邑懷親日扁舟去國心凝眸無限景愁絶不成吟暮天來逺色行客尚貪行棹急浪花碎月高雲縷輕巢烏棲更起漁火暗還明獨寢不成夢夜寒聞雁聲韓賈退之守潮陽戚嗟見章表賈生赴長沙自廣託鵩鳥拘達言雖殊均為未能了今我謫龍津管庫素所曉粗令職事辦便覺溪山好燕坐一室間妄念悉除掃豈復計窮通端亦忘夀夭回觀古人心頗嘆二子小田家江村煙火逺茅屋兩三家斷岸垂衰栁疏篁隱細沙田疇賸粳稻網罟足魚蝦不識宦逰味見人還嘆嗟嘉禾道中遇夏侯子陽京華契濶已再冬扁舟野岸欣相逢天寒水逺飛霜風談笑坐覺回春容年踰七十兩頰紅真氣上泝泥丸宫剖符南海窺祝融欲求丹砂訪葛洪問豫執筆侍九重胡為謫墮溪山中迂愚久合親耕農君恩未報徒忡忡飄零孤迹隨斷蓬他日相憶看雲鴻初到臨平見山孤舟渺渺兩山間終日鈎簾只看山落日半銜霞未散疏林逺暝鳥初還淒涼離恨誰能寄浩蕩詩愁自莫刪賴有青山可人意與君相對且開顔小雨小雨晚初急暝雲深不收霏霏暗煙樹索索響篷舟山色增遙翠漁蓑生暮愁淒涼蘇季子寒覔敝貂裘靈隱宫我昔曽遊飛來峯白猿晝挂峯上松曄然靈光如彩虹鐘磬自響金仙宫宦遊漂泊西復東雖欲再到無由從帝居鈞天陋瀛蓬螭坳載筆侍重瞳逆鱗聊試摩神龍謫墮劒浦山重重征鞍來此尋舊蹤恍如夢落煙霞中寒泉幽石欣相逢門前池館虛含風一洗塵慮清心胸明朝南去隨征鴻惆悵勝遊回首空自哂自哂何為者南遊亦偶然未登離垢地端有散花天遇境聊為戲安心不離禪幽懷誰與共深炷一爐煙渡浙江理棹適桐江隨潮過魚浦山寒雪猶積江迥月初吐御氣凌煙霄乘槎渡星渚空濛老龍吟髣佛翠蛟舞境清人自愁夜靜氣尤古獨坐不成眠霜晴聽津鼓桐江行贈江致一少府放浪江湖乃吾樂羈束軒冕非所榮謫官去為劒浦吏鼓柂遂作桐江行艤舟浙岸候潮至百越微茫煙水外波橫天際海倒流噴雪驚雷聲震地須臾風軟潮已平片帆去逐飛鴻輕棹謳四起日西落暮天杳杳惟參橫江山蒼蒼負殘雪江水茫茫浸寒月誰云逐客苦淒涼今我斯遊最竒絶清晨弭棹桐君廬溪光山色世所無故人見我一笑粲殺雞為黍聊相娛嗟豫仕宦等逰戲斷梗飄蓬本無蒂但令景物供吟哦出處窮通何足計此行幽討殊未闌滿目亹亹皆雲山鷺飛魚躍石齒齒今夜且宿嚴陵灘偶題日照溪光碧起鱗溪頭雁鶩自成羣可憐獨鶴歸何處萬里相隨一片雲江南三咏江南竹霜霰嵗寒依舊緑誰向溪邊養籜龍滴露搖風一林玉江南梅昨夜溪頭玉雪開贈逺欲傳千里恨和煙為折一枝來江南客鬢髮蒼浪不可摘明時遷逐念前非一夜愁吟霜月白鵝湖昌長老詢豫來歷以詩答之休問西來意吾行日向南悽悽達磨讖歷歷善財參舊事已不憶新交寧易談維摩本無語非是學三緘趨真亭煙霞深處一亭間石磴縈紆紫翠間但覺峰巒勞顧揖不知身到武夷山遊仙溪一溪九曲貫羣峰演漾輕舠淺碧中杳如誤入武陵去落花流水山重重兜擔石仙人戲賭翠蛾眉空有花輿照夕暉雲月娟娟風嫋嫋尚疑玉質在簾幃學堂巖仙官讀徹蘂珠篇几案巖中自寂然崑閬圖書藏䇿府誰言孤陋解成仙船場巖仙艇何年插翠微雲篷煙棹尚依依凌虛欲鼓天邊柂喚取雙龍背負飛雞窠巖磔磔天雞啼曉煙仙家風景鎮芳妍自從綵翼飛仙後只有遺棲寄嶺巔仙機巖雲去仙機杼柚空報章何日已成功天孫織就煙霞錦吹落溪山夕照中折筍巖玉府鏘鏘玉筍林誰將移種翠巖隂斕斑猶帶當時籜照水籠煙幾百尋仙竹隂崖翠竹自檀欒瘦節疏枝特地寒雖未化龍歸洞府正宜和月掃天壇泛舟至晞真館遇雪行到清溪六曲頭森然峰岫照人幽雪花拂水輕輕舞石瀨依巖淺淺流不盡清光常在目未窮幽興且回舟追尋欲遍神仙窟須向他時卜再遊訪李道士誅茅獨占溪一曲時有白雲來伴宿自言身在此山中暮暮朝朝看不足記舊夢余今夏夢乘舟行亂石間四顧峯巒竒秀有如玉色者覺頗異之及謫官劒浦道武夷山小舟泝流水落石出遍覽勝概至晞真館雪作巖石皆白恍如舊遊然後信出處之分定而斯遊清絶已先兆於夢寐雖欲不到不可得也作小詩以紀其事清夢先曽到武夷玉峯積雪倍幽竒小舟遊罷尋歸路恰似翛然夢覺時題棲真館三十六韻武夷古洞天竒峯三十六一溪貫羣山清淺縈九曲溪邊列巖岫倒影浸寒緑翩如鸞鳯翔矯若虬龍蹙樓觀聳岧嶤屏幃互重復蛻仙骨遺金逰女肌削玉雞棲層巖巔船插斷崖腹學館存几案仙機餘杼柚嵐光瑩徹潭虹影挂飛瀑翠竹隂天池蒼苔封石屋繪禽頂長丹遺迹指如掬峨峨天柱峰幔亭連翠麓傳聞武夷君嘗此會仙俗飛橋幾千丈絶頂亘山足障以翠雲屏藉以紫霞褥瑶樽傾沆瀣玉豆脯麟鹿仙妃奏賔雲金鼓間絲竹酒酣歌夕暉歎息光景促曽孫誰復在往事空遺躅至今風月夜笙簫響虛谷地靈饒泉石山潤秀草木坐使七閩人蔭此仙靈福嗟豫真散材性愛山水酷仙經與地志名字久已熟薄宦方區區仙骨宜碌碌神遊先夢寐幽覿寄圖籙寧知因謫宦乃得厭所欲沿泝窮幽深應接勞耳目開襟豁懷抱壯觀慰幽獨却邀白雲歸伴此巖下宿夜寒夢魂清曉發輕裝速仙遊須再來何當謝羈束劍浦道中此去平津路匪遙嶺雲溪雨自蕭蕭山深瀉澗泉長響地暖凌寒草不凋放逐却教窮水石登臨因得狎漁樵誰憐澤畔人憔悴更把騷詞賦大招春詞余謫沙陽寓居興國佛祠寢西小軒春至梨花盛開玉雪可憐修篁嘉木幽禽百囀每晨坐讀書午睡初醒把酒寓目慨然感懷因成春詞以紀景物可以興可以怨庶幾乎詩人之旨覽者無誚焉幽禽百囀舌如簧院宇深深花木香飄泊傷春惟泥酒不知林外已斜陽誰使鳴禽自在啼感春端似惜芳時一枝暫寄休饒舌靜處須防挾彈兒桃花零落逐風飛地上紅多枝上稀春色陡然歸艷杏梢頭還欲衒芳菲梅花寒梅幾樹開前村靚糚綽約歸仙魂橫斜影落石溪淺皓潔色洗煙嵐昏幽香暗動松竹徑清格自羞桃李園窮冬萬里霜雪積獨得一點陽和溫氷姿最宜夜月白玉彩更炫朝霞暾明妃失意去朔漠阿嬌無寵扃長門芳容寂寂誰復顧雅意耿耿今何言天涯相對且相樂為爾吸盡黃金樽春雨春晚雨聲碎天深雲影低蕭蕭度逺岫脈脈漲前溪芳潤歸花蕾清寒作燕泥池塘夢生草碧色已凄迷春意春鳥窺緑忩踏落庭前花美人為之笑鬢腳風中斜不惜花踏殘只愁鳥驚去姹婭背人飛林深無覓處春晝書懷春院沉沉晝掩關坐看雲起面前山靜中圖史尤多味身外功名已厚顔匣硯細磨鸜鵒眼茶甌深泛鷓鴣斑簿書粗了無餘事更有何人似我間次韻志宏見示春雪長句百花爛漫如冶容頗訝陡然春色濃那知忽作三尺雪草木洗盡羣芳空六英飄舞片片好誰與刻削嗟神工溪山恍在玉壺裏樓觀飛出瑶臺中却憐極目皆皓素不復零落傷殘紅幽人栩栩應夢蝶落絮漠漠方黏蜂虛堂兀坐清入骨欲期汗漫遊鴻濛剡溪訪戴久寂寞安得一御泠然風年來端恐詩道窮幸子佳句時爭鋒客愁已劇更賦雪半夜吟苦天地白志宏以牡丹見戲呼牡丹為道州長詩以報之我昔驅車遊洛陽正值名圃開花王嫣然萬本鬬妍媚雕檻綽約羅紅糚風枝似響湘浦珮露苞如浴驪山湯乍驚照眼國色好更覺撲鼻春風香鞓紅檀點玉版白細葉次第舒幽房玉奴纎指尚餘捻鶴翎坐恐隨風翔就中品格最竒特共許魏紫並姚黃千金不惜買一醉少年渾欲花底狂歸來試作牡丹譜未服秉筆惟歐陽自從遊宦多感傷况此逺謫閩山傍諦觀世味如嚼蠟惜花未免猶膏肓亦知春色到庭戶不見此花如未嘗子於何處得一本贈我意厚誠難忘戲言劍浦此為最聊試呼作道州長化工雕刻無厚薄地氣培植非其鄉雖云單葉不入品無那富艷踰羣芳願言愛惜勿嘲笑且醉玉斝酬春光戒酒吾初不解飲涓滴莫下咽自從逰宦來稍稍頗稱善譬猶怯懦士習慣亦能戰作氣欲吞敵賈勇乃求殿迀愚嬰重釁飄泊旅異縣懷家路迢迢惜春花片片澆愁欲千鍾燕客卑九獻浩如鯨吸川無那浮壺箭歡然偶過量淺狹誠易見噎嘔九藏翻昏瞀兩目眩宿酲味猶惡纍日不欲膳吾生如浮漚急景若奔電學道貴清虛為文欲精練胡為事杯杓無乃廢筆硯先生一石醉待詔三升懸枕麯與藉糟自汙何足羡從今梁溪翁無復醉鄉願巖桂閩山氣候真不常浪蘂浮花渾欲狂團團巖桂著春雨擢秀不待秋風涼微舒嫩葉玉剪碧巧綴碎顆金排黃木如犀理自堅緻噴作十里旃檀香沙陽滿眼皆此樹安得白露零清商芳根端可伴真德他日移植梁溪傍志宏送巖桂並惠長篇求豫賦詩次韻答之我來閩嶺值春月坐見園林花競茁殷紅枝上破胭脂嫩白梢頭開玉雪平生苦吟緣愛竒對花豈忍都無詩愧將拙句寫天巧但把濁酒酬春暉邇來巖桂花尤好亂綴黃英向青昊非時似欲鬭羣芳草木無情亦相惱栟櫚送花來覓句端恐梁溪得歸去謫官且作九年期家在天涯那復顧何時萬里吹秋風清香伴此金芙蓉臨風一醉百憂散看子揮毫如彩虹寄內南遷道逺不相攜錦字還嗟雁到遲玉臂雲環同夜月繡屏金鴨獨香帷諸兒應解勤修習稚子遙憐弄喔咿何日得歸成隱志孟光舉案定齊眉戲成短歌從志宏求芍藥東風不隔沙陽僻嫩蘂濃花自春色栟櫚也是可憐人每送梁溪慰愁寂邇來芍藥已盛開供花未到吾須覓賦梅豈害廣平剛乞醯更覺微生直為將爛漫數枝紅伴我淋漓一丸墨志宏供勺藥且以詩來再賦前韻誰道心間緣地僻夢裏何嘗有空色小忩一枕覺來時燕語鶯啼春寂寂忽思春盡芍藥開賦詩試與幽人覔短篇才去花已來却愧詩詞太狂直嫣然數朵玉樓春何似江南稱落墨子美杜陵老布衣飢走半天下作詩千萬篇一一于教化是時唐室卑四海事戎馬愛君憂國心憤發幾悲吒孤忠無與施但以佳句寫風騷到屈宋麗則陵鮑謝筆端籠萬物天地入陶冶豈徒號詩史誠足繼風雅嗚呼詩人師萬世誰為亞太白謫仙乃天人薄遊人間世詞章號俊逸邁往有英氣明皇重其名召見如季綺萬乘尚僚友公卿何芥蒂脫靴使將軍故自非因醉乞身歸舊隱來去同一戲沈吟紫芝歌緬邈青霞志笑著宫錦袍江山聊傲睨肯從永王璘此事不須洗垂天賦大鵬端為真隱子神逰八極表捉月初不死六月十八日同陳興宗鄧成彥鄧志宏早會凝翠閣晚遊泛碧齋高閣凝空翠虛齋泛碧川七峯連秀色萬戶鎖青煙風物悲遊子登臨集衆賢伊蒲羅淨供香霧繚芳筵嗜酒陶元亮狂吟白樂天嫩菱披紫角新荔擘紅圓文字真清飲溪山結勝緣畫橋橫螮蝀繡嶺卧蜿蜒落日生氛靄移舟信泝沿星河光耿耿風露氣涓涓山吐三更月人逰半夜船亂螢行熠耀宿鷺立聨拳盡興忘歸棹銜杯約倒蓮乘槎疑犯漢御氣欲登仙但有詩千首何妨謫九年深慙二三子陪從亦蕭然十六日泛舟小雨破殘暑移舟佳致多煙嵐逺增翠雲水暮相和散綺霞依日搖金月委波勝遊非易得不飲欲如何次韻湖隂曲王敦舉兵明帝微行視其營壘由是樂府有湖隂曲而亡其辭溫庭筠製詞以補之東坡書以遺秦少遊客有出以示余者因效其體次韻和之繡鞍玉勒黃金鞭躍馬直入無王錢繞宫三匝人不識天風翻動旌旗鮮賊臣晝寢倉黃起夢裏陽烏光照水追風鐵騎去非遲真主那從賊中死寶鞍傳玩日淒淒行逺不聞天馬嘶千金安用試虎口將帥何如思鼓鞞西南大星寒有鋩晝衣繡衮垂平章九重宫殿鎖春色豈知萬里秦城長附唐溫庭筠詩祖龍黃鬚珊瑚鞭鐵驄金面青連錢虎髯拔劍欲成夢日壓賊營如血鮮海旗風急驚眠起甲重光搖照湖水蒼黃追騎從外歸參索妖星陳前死五陵愁碧春凄凄灞川玉馬空中嘶羽書如電入青瑣雪腕如捶摧畫鞞白裘天子金鍠鋩髙臨帝座回龍章吳波不動楚山晚花壓欄杆春晝長次韻東坡四時詩缺冬景玉欄花發惟愁落風捲栁綿穿繡幕繞池煙草碧成茵夾竹露桃紅破萼美人半醉軟香肌不語慿欄知恨誰莫把春愁自消損且唱樽前金縷衣深院沉沉清晝永畫屏玉枕氷肌冷轆轤驚起寶叉橫香篆浮煙簾幕靜翠眉不為捧心顰鬢亂粧殘約略勻情似楊花無定處可憐金谷墮樓人梧桐葉脫苔滋緑綺忩寂寂風敲竹笑將紅扇撲流螢戲剪碧荷裝寶屋深沉玉宇夜長扃風露凄凄可一庭步月清宵攜手處誰家笛作斷腸聲荔枝詞集句開元天子萬事足惟惜當年光景促昭陽殿裏第一人十幅紅綃圍夜玉夢中同躡鳯凰翎歸作霓裳羽衣曲沉香亭北倚闌干緩歌縵舞凝絲竹回眸一笑百媚生盡日君王看不足崩騰獻荔枝百馬死山谷一騎紅塵妃子笑媫妤傳詔才人索絳紗囊裏水精丸不是人間香味色漁陽鼙鼓動地來血汚逰魂歸不得明眸皓齒今何在金盤玉筯無消息漢主山河錦繡中三十六宫土花碧不見玉顔空死處淚痕血點垂胸臆松架敝以新枝易之日曛雨濯半飄零旋採虬枝蔭廣庭風動細香還泛泛露滋新葉更青青雖慚剪伐勞斤斧猶勝燒燃競爝螢涼夜蒼龍尚吟嘯坐看明月入重扃白鷺白鷺孤飛映碧峰皎如片雪落輕風徊翔意態雖容與心在清波寸鬛中次韻丹霞録示羅疇老唱和詩快哉善知識能以種種喻我今亦樂説漸修與頓悟頓如草木芽荄核已完具又如大明鏡色像悉呈露漸如雞哺雛羽翼勞覆護又如苗成實非一朝夕故邈然孤峰頂邂逅適相遇歷歷欲親之非是夢而寤却來共談説妙契那復􅘅精勤假修習即得無生趣清淨摩尼珠初無塵垢汙圓成一滴水豈殊千里霔妙藥須對治能起膏肓痼欲觀皎日輪當去漫天霧鐵輪頂上旋不復有驚怖劫火洞燃時自有安身處了兹一大事餘外復何顧庭前柏樹子古廟香爐去孤雲與野鶴何往不可寓返觀生死海便是涅槃路並化示全身達磨攜隻屨證道坐菩提降魔成露布乃知費千談不若行一步丹霞真道人願力極堅固眼從慧中得法乃佛親付匹馬與單鎗縱橫自馳騖願見緣未合臨風增景慕何以寫余懷繼此龍津句次韻和李太白感秋秋風從西來敲我庭下竹夜涼月窺樽清光如可掬風月豈故人萬里慰愁獨披衣從之遊更欲邀共宿泠然洗我心耿耿安用卜三十八年非庶以不逺復俯仰天地間平生皆可覆一醉夢還家黃粱猶未熟中秋望月次玉局翁韻二首明月如玉盤飛上青霄東徘徊斗牛間照我禪室中爽氣藹亭戶清光透簾櫳我雖不解飲敢辭玉樽空舉酒對明月起舞聊相從身世兩翛然如遊廣寒宫夜久風露冷草根吟候蟲咽咽不能已豈自鳴其窮天涯多霧雨好景誠難逢哦詩不成寢頗類魚噞喁皎皎月華白寥寥秋氣清念我方逺客步月庭中行風露感我心凄然入重扃誰家弄橫笛巧作斷腸聲獨酌一壺酒對此千里明人生但自適何必四者并醉眼視萬物擾擾如浮萍得喪何足道譬猶隂與晴節義重太山富貴鴻毛輕我心與明月照見萬古情又次韻中秋長句涼風吹空明月高清光萬里見秋毫銀雲櫛櫛方解駮河漢掩映如波濤須臾掃盡無多子天影悠悠碧於水氷輪正午久停鞭羣動寂然聲不起諦觀此月真跳丸山河倒影如蛇蟠桂花耿耿已澄潔秋氣泠泠增清寒前年望月都城汴只愁風雨中宵變一杯相屬有親情側耳歌樓聞鼓板今年望月沙陽山照我心如鐵石堅美人千里共明月遙聞閨中只獨看空庭步月更幽好白露漙漙濕煙草開編况讀古聖賢發憤忘憂不知老男兒本自甘賤貧富貴名傳能幾人題詩對月到日出錦囊何似龎眉客桃源行桃源之事世傳以為神仙非也以淵明之記考之特秦人避世者子孫相傳自成一區遂與世絶耳今閩中深山窮谷人迹所不到往往有民居田園水竹雞犬之音相聞禮俗淳古雖班白未嘗識官府者此與桃源何異感其事作詩以見其志武陵溪水流潺湲漁舟鼓枻迷泝沿溪窮路盡恍何處桃花爛漫蒸川原花間邑屋自連接雲外雞犬聲相喧衣裳不同俎豆古見客驚怪爭來前殺雞為黍持勸客借問世上今何年自從秦亂避徭役子孫居此因蟬聨不知漢祖以劍起况復魏晉稱戈鋋殷勤留客不肯住落花流水空依然淵明作記真好事詩人粉飾言神仙我觀閩境多如此峻溪絶嶺難攀緣其間往往有居者自富水竹饒田園耄倪不復識官府豈憚黠吏催租錢養生送死良自得終嵗飽食仍安眠何須更論神仙事只此便是桃花源秋思二首朝來秋色高西山有爽氣開軒逺相望自得靜中意那知宋玉悲肯灑楊朱淚逍遙天地間俯仰可無愧秋雲淡無依晶晶映寒日卷舒誰使之聚散在倐忽出岫本無心行空寧有躓功成歸何方妙用藏於密傳畫美人戲成美人顔色嬌如花鬢髮光翳朝陽鴉玉叉斜插翠眉蹙豈亦有恨來天涯畫工善畫無窮意故把雙眸剪秋水丹青幻出亦動人况復嫣然能啓齒年來居士心如灰草戶金鎚擊不開縱教天女來相試虛煩雲雨下陽臺傳畫忠義圖君臣以道合言出心莫逆膏澤下於民美化施無極中世此道衰言如水投石義士以死爭直諌或有益折檻制留今斷鞍事存昔當車血汚輪伏蒲涕霑席昭然貫日誠屹爾回天力誰將丹青手圖此忠義迹傳之置坐隅能使懦夫激斯人不復見壯哉古遺直得家信淮南飛蝗渡江入浙嵗事可憂感賦聞説飛蝗起自淮勢如風雨渡江來吾家嵗事何須慮只恐人言不是災乘泛碧齋至北溪口觀新橋與興宗志宏分題豫得泛字秋高氣倍清夜靜舟初泛露華皓如洗月色寒可鑑林巒與邑屋左右入軒檻晶熒星影搖􅍶崒山光蘸風微煙羃羃溪逺波湛湛端疑客乘槎坐使雲河犯觀梁且停橈戀月愁繫纜景幽費模寫思妙造古淡吾方久於此勝賞豈云暫願同二三子險韻時得探志宏得碧字以詩來次其韻明月照清溪影落千尋碧輕風皺微瀾蕩漾搖金色相攜理桂楫及此萬籟寂天空露氣寒棲鳥正縮瑟何人起秋思數弄月中笛坐使遷客情悽然感故國清逰得英俊勝賞飽泉石豈殊在吾家親戚款於側賦詩各言懷險韻對勍敵歸來氣未衰開匣看三尺凝翠閣晚望二首白蘋紅蓼滿汀洲浙浙西風古渡頭寒日無情又西下溪清不語只東流白雲點破亂山青影落寒溪晚更明誰謂天涯無雁到雍雍初聽兩三聲秋意蕭蕭南浦白雲秋楓葉蘆花相對愁何必仍窮千里目亂山凝翠滿溪樓得了翁書并寄石芝云其味初淡中苦已而發甘鮮有知此味者感而賦詩海日氣射蒼崕根石上生芝乾蘚文懸梯採掇資好事中有至味難為言豈惟食淡兼攻苦嚼蠟茹荼多欲吐清甘徐發齒頰間漱以寒泉如飲乳幽人贈我意已深一掬可比千黃金世間此味知者少往往既吐還追尋我欲持之獻君子自古至言多逆耳願於苦處辨忠良若待回甘真晚矣兩宋名賢小集卷一百三十八
