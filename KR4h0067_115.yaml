body:
  text: 兩宋名賢小集卷一百十五宋陳思編元陳世隆補玉澗小集李彭字商老南康軍建昌人公擇從孫有日涉園集夢訪友生少年結客長安城妄喜縱酒同章程支離老去一茅屋枕書卧聞長短更友生相望止百里寒夜寥閴無微聲夢中乘興輒見戴剡溪聊爾扁舟行覺來蘧蘧一榻上不用僮僕爭歡迎吹燈弄筆欲書寄忩前白月方亭亭都城元夜斜陽盡處蕩輕煙輦路東西入管絃五夜好春隨步暖一年明月打頭圓香塵掠粉翻羅帶密炬籠綃鬬玉鈿人影漸稀花露冷踏歌吹度曉雲邉翻經臺五千餘卷在高臺內史翻時蠟屐來夢斷池塘人不見年年春草緑成堆阻風雨封家市往時李成寫驟雨萬里古意毫端聚行人深藏鳥不度便覺非復鵝溪素龍眠老阮作陽關北風低草雲埋山行人客子兩愁絶未信葡萄能解顔兩郎了了解人意似是畫我封家市戲作新詩排晝睡忽有野雁鳴煙際題吕少馮聽雨堂碧澗寒侵屋幽雲夜度墻貪看山入座慣聽雨鳴廊苦乏隂鏗句聊登孺子牀非君無汲引寄傲學潛郎望西山懷駒父去嵗湖湘賦凛秋聞君江國大刀頭百年會靣知幾遇十事欲言還九休照眼遙岑落懷袖過眉拄杖立汀洲莫言青山淡吾慮誰料却能生許愁唐明皇夜遊圖開元御極垂衣裳登三咸五陵羲皇白環重譯銀甕出卜夜遨遊離未央香車鬬風秦與虢羅帕覆鞍真乘黃赭袍錯落綴北斗步輦優遊含鏤鍚寧王玉笛上霄漢御路花光爭月光汝陽羯鼓絹帽穩打徹參旗低建章太真霑醉玉欹側力士傳呼聲渺茫翠叉挂冠紅粉粧金貂貰酒白靣郎君臣玩狎樂莫比清禁喜聞宫漏長若令姚宋坐廟堂袖中諌疏神揚揚萬里橋邉行幸處後世龜鑑懷苞桑閻立本醉客圖酒有何好工作病頗怪此人喜中聖藏身麴蘖勝嵓幽寄愁天上呼不醒春風吹開玉東西月墮參橫斟酌之吐茵脫帽有妙理眩朱成碧渾忘歸右相丹青果馳譽幻藥調成疑笑語便覺微綃古意生似聞醉眠卿可去半生憂患復蕭條甕中肥遁何須邀一樽桑落對公等盡解平生藜莧嘲題駒父家江干秋老圖江風颼飀江水寒蘆洲雁下生微瀾漁翁夫婦不能語津吏醉倒船著灘其旁病夫坐箕踞持竿萬事那復顧懸知寧斷嬌兒乳不及冥鴻及飛鷺魏錬師四松畫軸四松在澗壑嵗晚乃更竒蕭然如黃綺傲岸不可追誰將談天口掉舌聊見移由來拂東絹寫此霜雪姿便有松上雨催我窗間詩翻思斸青冥採藥堪扶衰當年丹青手開闢造化隨既有圮下約子行何後期徐叔明校書篆筆竒古復作丹青為豫作漢江暮靄扇材極妙力求鄙句作此以贈曩時徐騎省篆古逼秦相後來得仍孫毫端溟渤壯能回頓挫姿丹青生意匠餘酣寫便靣萬里煙莾蒼何許捕魚郎落日蕩雙槳無勞剪吳松安用買疊嶂真欲老是間塵境孰非妄憐君俱入妙簡逺復清曠定為造物嗔覔句聊分謗題訪戴圖間庭秋草積滿砌蒼苔深忽向氷紈上聊窺訪戴心雪月俱皎皎風林互森森縱觀停艫處猶聞擊汰音終年剡溪曲何嘗返山隂徒言興已盡真妄誰能尋浮生圖畫耳慷慨為長吟兩宋名賢小集卷一百十五
