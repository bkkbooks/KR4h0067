body:
  text: 兩宋名賢小集卷一百五十二宋陳思編元陳世隆補撫松集吕願中字叔恭紹興中知靜江府環珠洞朝野樂升平園林窮勝討快雨洗塵埃秋山淨如掃遊魚聚江灣飢烏集木杪羣芳鬱崢嶸一水翠繚繞雲頭蒼狗變龍蛇亂夭矯巖洞真竒崛造物逞天巧近在堂奧間超然類三島暫舍簿書忙何時脫紛擾靜聽黃鸝鳴一聲還復悄纚維去咫尺涉步即幽窈新岸暗蒼苔喬木蔽蘿蔦山腹有遺祠隱然見華表筍輿訪崇臺空曠遊遐眺八桂困樵蘇歎息心為愀任侯三蜀秀氷壺湛春曉有藥駐朱顔可以長不老雄篇頃刻成舉座悉稱好戛玉副鳴球士夫善傳道五嶺類觀東一覽衆山小吕巖何興廢事固有前兆新詩刻翠珉異日可稽考玩珠紀勝遊聊復醉清醥遊東觀郊原同按轡杖屨陟青冥山色混林樾溪光照斗星螺峰髙插戟兔徑曲穿庭闕一聲逺千嵓特地青訪顔氏讀書巖洞口微雲恣卷舒石巖相對一蘧廬賦才晉宋多夷曠好景古今難貯儲茗碗已驚浮雪浪齋厨俄聽響鯨魚子雲識字終何用且讀人間未見書假守吕叔恭遊中隱巖無名洞坐客鄱陽朱國輔云此洞未有名因公而題欲名曰吕公巖豫未敢披襟而劉子思陳朝彥皆曰甚當戲書五十六字鑱於石壁間紹興甲戌季春七日護田緑水轉山樊滴翠羣峰列巨杉洞外僧藍侵斗漢澗邊人迹隔仙凡深深雲谷春常在寂寂松扉夜不緘此處得名爰自我要須題作吕公巖郡守吕叔恭以甲戌季春七日遊中隱岩山水膏肓之興未已後兩日再拉機宜劉子思監州朱國輔經屬陳朝彥同至新洞所見愈竒真所謂倒餐甘蔗聊書五十六字爽塏虛明小洞天巉巖垂乳類鋒銛薰風習習來三面夏雨蕭蕭欠一簷指顧羣山勞應接徘徊歸騎縱觀瞻門前緑水泓澄淨底處應須是谷簾華景洞斯洞名華景纍纍乳石懸虛崖疑月窟絶頂瞰江湍巖底金仙寺峰頭玉井蓮地形居衆外氣象偉無前徙杖觀初月歸輿觸暝煙蔽林排翠幄封徑簇花鈿爽致資清賞鐫題記昔年猿啼聲應谷雲破月侵筵策蹇追華駟鳴髇指墜鳶誰人能畫此為倩老龍眠北牖洞南窗聊寄傲北牖有涼風巖洞幽深處結茅容老翁嘉蓮洞羃羃煙雲鎖洞關旁開六户類連環芙蓉未是仙家瑞更約同登太華山朝陽洞半世觀山鬢已皤欲求釣艇老漁蓑杖藜又過煙霞洞聞説當年爛斧柯白雀洞洞中石燕可長生白雀何因浪得名無限好山難買得世間奚用孔方兄夕陽洞怪底浮屠不宿桑直搜巖竇意徜徉洞中日月未嘗老何事仙家有夕陽南華洞亂崖深峭水淙幽六夏來遊儼似秋安得蘧蘧一覺夢倚巖栩栩訪莊周假守睢陽吕願中叔恭機宜祥符劉襄子思通守鄱陽朱良弼國輔經屬建安陳廷傑朝彥因祈晴乘興遊中隱巖留題以記勝遊坎止流行但信緣嶠南風景異山川偶因乘興穿山腹始悟壺中別有天劉仙巖平湖小隊出郊墟盡日登臨據隼旟聞道仙人尸假去尚應猶學世間書題元巖崒嵂倚空蹲怪石輪囷夾道卧長松白龍應已沖天去巖竇巋然有故蹤兩宋名賢小集卷一百五十二
