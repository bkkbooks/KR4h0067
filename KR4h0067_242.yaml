body:
  text: 兩宋名賢小集巻二百四十二宋陳思編元陳世隆補翠㣲南征録一華岳字子西為武學生輕財好俠韓侂胄當國岳上書云云書奏侂胄大怒下大理貶建寧圜土中郡守傅伯成憐之命獄卒使出入毋繫伯成去又迕守李大異復寘獄侂胄誅放還復入學登第為殿前司官屬鬱不得志謀去丞相史彌逺事覺下臨安獄獄具坐議大臣當死寧宗知岳名欲生之彌逺曰是欲殺臣者竟杖死東市歸釣吟我生本是絲綸客嘗把絲綸釣王國膠庠雖識姚有虞載車未遇周西伯抱琴歸去古江邉江頭風月猶依然江風刮岸岸如削江月照人人未眠沙平浪静江天濶換酒捉魚魚潑剌有時醉椀和月吞有時醉棹和烟撥或唱歌或吹笛欵乃宫商人不識歌聲喚徹烟水寒笛聲清透雲霄碧不張帆任渠去去到雲山深處住雲山深處有畫圖添箇雲山畫圖侣不撥棹任渠流流入玻瓈影裏頭玻瓈影裏迸珠玉千斛萬斛誰能收倦時眠醉時舞漁家自有神仙府睡時蝴蝶夢莊周舞處鷗鳶奏韶武自舉歸釣吟清江漠漠烟沉沉雲藏萬壑暗水尾風吹孤月搖天心翠㣲父翠㣲父和我行歌進南浦畫橋流水抺晴烟殘照暮霞收宿雨水連天天似水一蓑活計誰能比楓葉飄霜鱸鱠香楊花飛雪河魨美也不學姜太公百年將至方非熊㑹須年少遇真主恢我諸夏車書同也不學嚴子陵雲臺不為魁殊勲中興只作釣臺侣胸中百萬知無兵我網不似漢漢網何太踈也曾漏却吞舟魚何當周宻如樞機直欲纎悉皆無遺我釣不似吕吕鈎何太直除却文王有誰識争如猛曲一彎腰牽取星珠并月璧魚膠寒齒折蒿剔蟹螯刺指和籠烹屠龍飪鼎口不美㫁鯨斫炙腸聊撑記夢溪泠泠鼓鼕鼕虚堂淅瀝生寒風寒風綽我夢魂去飛颺直上蓬萊宫蓬萊宫殿女如玉霓裳羽扇環簾櫳月娥留我宴珠翠玳筵間列花叢叢酒酣萬念羅心胸舉盃話别殊怱怱青鸞命駕下空濶一聲璫珮鳴丁東被衣起坐周四顧庭户悄悄無人蹤銀河萬里倒澄碧氷鑑半輪斜倚空横江孤鶴一聲唳喚起鄉心千萬重上韓平原君家勲業在盤盂莫把頭顱問钃鏤漢地不埋王莽骨唐天難庇禄山軀不隨召奭始求老便學孔明終托孤十廟英靈儼如在漫於宗社作穿窬清富樓楞伽心地有瞿曇清富名樓足可觀買斷江山詩料俗揭開風月畫圖寛都無一㸃紅塵到便作千雙白璧看我欲鞭驢快幽賞白鷗盟在不憂寒去年清富屢求詩今日凭䦨約翠㣲山帶野花堪入畫水環汀草欲成圍一園黄菊有餘食兩頃白雲無限衣説與塵寰守錢虜不勞魂夢到禪扉矮齋屋老塵生索椽低帳不縑炙燈烟染棟見客帽翻簷織壁慳三尺遮門㫁半簾吾身交九四控制萬愁兼容膝具體功非逺全軀恨已消安禪須促趺覔句敢成搖悔不身齊足時當事半腰行人只蒲伏何處得逍遙野飲呈祝山甫野景何須買山花不待培幕天分古木裀地得蒼苔酒上鶯調曲肴空鵲墮梅一壺隨所適何處問蓬萊題練省元壁腳債嗟猶欠心朋喜偶逢溪聲含客怒山色為誰濃古樹晴搖蓋殘蟬晚帶鐘莫辭一樽酒明日是呉儂讀漢史漢將假帝為真帝齊乞真王作假王大抵紀韓皆是信不知誰短又誰長寄王五四將仕季叔青天轟霹靂屈原平地溺波濤從教晉楚多戕賊二子何曽損一毫周田且謂曽占易商野何嘗識夢書假使二君無感召不成終老在樵漁出郭十客聨鑣出北門馬蹄剜盡碧苔痕從教管史占星聚且聴盃人和月吞我欲求仙問離坎君當隨佛整乾坤樽前忼慨休辭醉明日有懐誰共論有地都來一丈餘墾鋤元不費工夫匝牆先種竹三本遶檻却栽花數株風伯喚來煩解珮月娥邀得醉擕壺慿君試向蓬萊問還有神仙似我無送周魁昨夜霜風鼓萬兵今朝華節照邉庭人間元日是春日天上魁星為使星且向虎囊探尺寸却歸麟閣做丹青離觴不是延清夜明日異邦長短亭梅衰蘭枯荷了秋色幾向寒梢問消息溪橋交馬㫁腸時翠袖佳人日暮歸玉面亭亭漢宫様一見風流慰心賞寒標孤絶太無情誰為移春上玉京月華凄切霜華白夜半飄香度簾額寄聲横笛且休吹愁殺江南未歸客山水吟閩之山峨峨可以接穹蒼閩士孕其秀胸次尤難量閩之水滔滔可以燭妍醜閩士生其間其美不容口君不見周家社稷生甫申崧岳當年曽降神又不見千里秀氣鍾三蘇睂山草木皆焦枯我生恨不由河洛虚負三光并五嶽地靈人傑推江東人物風流兼磊落顧此閩之東自古多英雄求其為絶稱獨一忠穆公公今已即世後世誰可擬惟有詹仲通一人而已耳仲通何如人景星與鳳凰不隂亦不深山高兮水長二月二日即事春潮昨夜没平灘一雨催花色半含雁喚元宵歸塞北燕銜新社到江南無歡不必遊花籍有病何須置藥籃只把公忠答天地從教兒女閙冠簮登樓晚望六曲朱䦨瞰碧虚淡烟秋水接平蕪展開風月添詩料裝㸃江山歸畫圖舉足便堪馳駟馬折腰何必問雙鳬當年庾亮今還在定約樓前醉一壺訓爨婢十載膠庠莫怪窮旅囊安得有從容無錢休欠牛羊債有酒只將魚蠏供班頷昔嘗肥似燕沈腰今已瘦如蜂從今莫恣肥甘口只擷清蔬祭豢龍别藍詳道君在江東我水西君今北去我南歸竹孫和客凌風瘦梅子偏他得雨肥鶯囀好聲歸酒斝花分紅影上人衣相看莫作皺睂别期子秋高賦式㣲傷春初入京華菊薦香途中今已過春芳十年恰走萬餘里兩鬢幾乎一半霜却酒不禁春黯淡落花愁對月昏黄不堪夜半歸心切更被杜鵑啼㫁腸約叔叔真半間屋抵斗來大一箇身同山様高側坐斜眠俱不得煩君除去一牛毛戹堂有事留司馬凌閣無名問大宗我且盤桓君且去歸期千載約芙蓉題窗間陽貨不名真盜玉子張何事便書紳聖賢立論有㣲㫖精義當求妙入神浴龍藩地暖冬無雪十月風光似三月好風不動綺羅塵人在繡幃簾半揭酒腸拍索能回春春潮入面香熏熏香肌汗透披縠紋思得滄海驅埃氛銀鍋蠏眼生春雪銀瓢捾破鍋心月流霞傾入碧琅玕香霧氤氳雲半掇花藤織出金芙蕖烟青闕紫堆雲闕一聲璫珮簾鈎垂皂盤捧出雙明珠蠟花照入蘭湯閣珠璣體迸紅猊活鳳豁雲濤濯錦毛龍翻雪浪澆銀甲起拏裙霧圍春風臙巾抹出桃花紅香泉入齒潄寒玉吐作氷雪飛長空蒼頭急把春衫換腕玉輕穿雲一片出門兩腋生清風身在嫦娥廣寒殿嘲熱南方有神名祝融髪赭靣丹唇朱紅執鞭入海驅赤龍火車勒駕燒長空千驂萬乗如聨轡烈焰騰騰灼天地九霄烜赫皆甑蒸四海煎熬俱鼎沸流金爍石氣不通天下俱在紅爐中葛衫襟濕疑有雨羅紈柄折渾無風祝融祝融無太酷天道炎涼常反覆看看少昊催戍𤓰盡把涼飇散煩溽别子陳子丙寅三月三十日天子檄我南國行蒲劍欲飛春漲急栁綿才脱曉寒輕事非得已初何好物到不平終作聲自古英雄總多難落花何必怨清明河魨形容初不類魚鰕偏稱蘆蒿與荻芽觸物可憐空怒腹囓人無計漫聱牙子排金粟真堪畏乳溜玉酥何足誇從此烹鮮督庖吏只將鮎鱯假名他自嘆自嘆身謀我獨疎只貪風月恣歡娯盃盤遇客隨多寡囊底何時問有無萬里梯航無骨董十年牆屋有穿窬從今老去無他望緑綺一張醪一壺春日書懐紫褪紅消到海棠幾多逰俠為渠忙秋聲落盞鶯調曲春色惱人花鬭香羝乳雖能屈蘇武牛衣終不卧王章男兒多少英雄氣只對東風醉幾場兩宋名賢小集巻二百四十二
