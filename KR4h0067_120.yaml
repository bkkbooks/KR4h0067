body:
  text: 兩宋名賢小集卷一百二十宋陳思編元陳世隆補慶湖集卷上賀鑄字方回衛州人喜談當世事可否不少假借人以為近俠博學强記工語言深婉麗密如次組繡尤長於度曲掇拾人所棄遺少加櫽括皆為新奇嘗言吾筆端驅使李商隠温庭筠常奔命不暇諸公貴人多客致之苟所不欲見終不貶也初娶宗女𨽻籍右選監太原工作是時江淮間有米芾以魁岸奇譎知名二人每相遇瞋目抵掌論辨鋒起終日不能屈談者傳為口實元祐中換通直郎通判泗州又倅太平州竟以尚氣使酒不得美官悒悒不得志食祠禄退居吳下稍務引逺世故亦無復軒輕如平日家蔵書萬餘卷手自校讎所為詞章住往傳播人口黄庭堅自黔中還得其江南梅子之句以為似謝元暉自裒歌詞名東山樂府嘗自言知章之後且推本其初出王子慶忌以慶為姓居越所謂鏡湖者本慶湖也避漢安帝父清河王諱改為賀氏慶湖亦轉為鏡故鑄自號慶湖遺老有集二十卷叢臺歌按邯鄲縣譜叢臺趙武靈王築起地三百尺今故址猶十仞在縣中東北隅元豐辛酉七月同邑令濮人杜儼仲觀登杜先有此詩要余同賦累土三百尺流火二千年人生物數不相待摧頹故址秋風前武靈舊壠今安在禿樹無陰困樵采玉簫金鏡未銷沈幾見耕夫到城賣君不見叢臺全盛時綺羅成市遊春暉一從琱輦閉荒艸蕭散行雲無復歸招魂想像風流跡一作在晴華露蔓猶依稀登臨弔古將誰語城郭人民今是非一作縈紆棘逕撩人衣禾黍晚來貆貉肥層簷碧瓦碎平地夢作鴛鴦相伴飛一作逐伴飛彭城三咏元豐甲子余與彭城張仲謀父東萊寇昌朝元弼彭城陳師仲傳道臨城王適子立宋城王羾文舉采徐方陳迹分咏之余得戲馬臺斬蛇澤歌風臺三題即賦焉秦蛇已中斷劉項方龍戰叱咤沮風雲睢盱走霆電鴻溝一畫天地開楚王洗劒東歸來新都形勝控淮泗籠山絡谷營髙臺重瞳登覽何為者不知招賢知戲馬上如激矢下投丸蘭筋霜腕便回盤半夜悲歌騅不逝明日陰陵行路難騋牝三千歸漢苑粟豆尤聞蠧縣官君不見華山之陽古坰牧春風吹草年年緑右戲馬臺歌臺在郡城南君不聞泗濵昔日有亭長送徒咸陽失收掌澤中置酒飲相訣吾亦從兹犇芒碭陰風蕭蕭導者懼前有修蛇怒横路酒酣拔劒肯留行劃斷蜿蜒不回顧河明月出人踵來彼媪何寃號且哀謂遭赤帝屠吾子語竟莫知安在哉真人聞此自心許茫茫四海吾其主虎變龍飛十二年馘項梟英葢狐䑕半夜雄鋩飛上天幾見長陵一抔土右斬蛇澤歌澤在豐縣西二十里漢祖髙風百尺臺千年客土生蒿萊無窮人事水東去如故地形山四來江淮猶沸鯨鯢血八十一車枉歸轍白叟逢迎皆故人牢酒歡呼惜將别崤澠迢遥非我鄉死生此地烏能忘酒闌鳴筑動雲物青衿兒曹隨抑揚爾時可無股肱力端思猛士守四方君不聞淮陰就縳何慷慨解道鳥盡良弓蔵右歌風臺詞臺在沛縣郭内江南曲遊倡搴杜若别浦鴛鴦落向晚鯉魚風客檣千里泊當時桃葉是新聲千載長餘隔水情烏衣巷裏人誰在白鷺洲邊草自生和潘豳老漢上屬目白雲䝉山頭清川山下流芳洲采香女薄暮漾歸舟並蒂雙荷葉逢迎一障羞持情不得語大婦在髙樓雨餘晚望相應乳鳩鳴桑間返照平明津小舫度髙隴一牛耕林藪歸心健塵埃病骨輕屈騷魂爽在未許獨君清待曉朝謁天慶作望曉謁琳宫荒庭霧氣濃曽陪羽林仗如待景陽鐘薄宦情無幾勞生夢不容樵朋與漁伴他日會相從擬温飛卿露網朱甍上風簾翠幙前宿衾熏菡萏朝鏡拂漪漣津潤銷金筆香依撲粉綿度間雙陸子撥恨十三絃鸚鵡殷勤語旃檀委曲烟鮫綃乾玉筯魚鑰限金蓮團扇謌桃葉烏絲代杏牋朱門長窅窅白馬自翩翩難釣三珠樹徒抛七寶鞭酒闌應有待夢破即無縁信鵲新秋去孤蟾後夜圓浪言牆外地的是洞中仙題張氏白雲莊彭城張謀父居泗洲之東山耕田數百里中擇爽塏列樹松竹結茅其間牓曰白雲莊甲子九月置酒招余與寇陳王李子酒酣賦余得雲字江左陶徴士髙風昔所聞應慙五株栁難比一溪雲我有乘桴約君方植杖耘悠悠竟何得晚嵗盍同羣子規詞長江靡施山坡陀旅竹荒松䝉蔦蘿蠶初眠起風日暖梅弄黄時烟雨多山間有徑行逶迤倦客據鞍生睡魔奈爾思歸啼鳥何子規鳥不如歸去好誰家西北起髙樓幾為王孫怨芳草子規憐爾解歸飛我獨何心長不歸十年迹絶蘇門道夢裏舊遊知是非廣張衡四愁寄李譓夜如何其夜未央斗星燦兮河蒼凉明月入牖窺曲房候蟲刺促鳴我牀離憂歘來煎人腸緑琴在薦兮擬楚奏之沅湘朱弦濕露兮聲戾指而不揚我有所思兮在河之陽愛而不見兮衷難彌忘明璫玉案兮爾不我將緘誠結惠兮久莫汝償永如牛女兮南北相望西風蕭颯兮凌百草以殞黄蘭萎芰裂兮恐被服之不芳念汝玉立兮賤組繡之文章元節日厲兮奈慘慄之冰霜胡不乘白雲兮歸來乎帝鄉尚何所徯兮畢永嵗而彷徉故鄴按鄴都記漢建安十二年曹操滅袁氏始大築鄴當時京兆洛陽南陽許皆大都而鄴為之長操子丕代漢復定都洛陽此後僭竊更據鄴而未始殘破元魏孝文帝自代南巡駐蹕鄴下久之以南望枉人山北接柏人縣非善地遂去之河南將行挂飯􅎆於城樓上識者解之挂飯懸飯飱也豈待𤣥孫宅此乎至孝靜帝果為髙歡刼遷都鄴齊五主營建宫室規模壯麗逾前魏周武平齊焚撤略盡及楊堅克尉遲迥遂洿瀦之築京觀於葛屨山徙郡治安陽鄴猶為屬邑熙寧間始廢之戊午九月獨遊晚歸馬上賦魏武昔恢圖北平譚尚孽卜鄴築新都非徒為三穴將行遷鼎志遽有分香訣落日繐帷空奠終歌舞闋旋聞瀍洛上載起蒼龍闕四葉不歸東苔花馳道絶食槽䜟終驗挂飯期先決擾攘百年間累車尋覆轍山川氣象變朝市繁華歇白露復青蕪茫茫換時節陰風吹葛屨燐火走丘血木葉下西陵寒蟲助騷屑對酒庚申三月晦滏陽賦白駒不可駐尺璧非所珍獨挹盈樽酒悲歌送徂春歌闌酒亦盡回首跡已陳自笑十年仕尚迷沮溺津豈無濯纓水奈爾長路塵命也復何道今人猶昔人閒情紫苔生玉甃青窻隠夕曛佳人久不見翠被銷檀薫長巾拂緑綺上有三年塵聊彈别燕弄寄謝陽臺雲燭蛾雙雙一作鬼蛾來翩翩慕此堂上燭附炎竟何功自取焚如酷感彼萬動㣲保生在無欲不見青林蟬飲風聊自足送陳傳道攝官雙溝彌檝想登臨閒雲䕶日陰青蒲泗水濶古木漢祠深應醉盃中物誰聞澤畔吟禪坊養疴客輕别若為心遊滕縣時氏園池珍重西園主開門待子猷城隅樹交蔭樓下水通流鴝鵒鳴深竹蜻蜒駐小舟可能忘夢想塵土滿徐州自鄆還徐道中八月過新雨行雲弄晚凉山川乍明晦禾黍半青黄西去真何事東還非故鄉悠悠塵土裏無路不亡羊丙寅舟次宋城作水館雨邊村登臨奈斷魂黄花開小徑紅粉哭髙原舟檝逢新火松楸老故園斜陽一千里依約是蘇門苦竹村南馬上楚澤薫風後林臯夕照間漁船沿緑岸鳥道轉荒山久負盃中樂長偷馬上閒悠悠白門路何日杖藜還題諸葛谼田家壁地在烏江北八十里與江南石頭城相望晚度孔明谼林間訪老農行衝落葉徑坐聴隔江鐘後舍燈猶織前溪水自舂無多遊宦興卜隠幸相容詶桂林從叔江到三湘盡山圍八桂深龍蛇寒不蟄霧露晝多陰迢遞馳梅信殷勤訪竹林淮南風土美留滯亦何心懐寄潘孝本兼簡其子言春色先梅嶺秋深後桂林溪通五羊險雲近九疑陰無雁難逢信有猿能伴吟曉春酒自美應對阿戎斟宿黄葉嶺田家聚落荒山裏畬田嵗不登牛衣障隙雪鼠穴見隣燈愁入魚難瞑寒凝酒亦冰悵然歌白石持枕待晨興遊六合定山真如寺達摩初祖道塲隻履西歸逺何年此布金地寒蒼檜老嵗晏白雲陰燒隔溪冰斷樵穿徑雪深祖心無處問俗駕晚駸駸湯泉道中青石岡山下靈泉産藥苗山英如有待水落可相招蟬帶風移樹塵隨馬度橋颺鞭吟舊句歸路不知遥􅋈舟當一作當和江口利口待風累日懷寄感城中朋遊一葉寄津口怒濤安可乘朝風一作帆占酒斾夜爨乞漁燈牛渚逢新月秦淮想結冰故人他日夢歌吹滿金陵金陵懷寄歴陽王掾征虜亭邊路望夫山下舟長江不隔夢明月秪供愁促席歌塵斷閒窻醉墨留惜芳橋畔栁誰繫木蘭舟秦淮夜泊官一作宫栁動春條秦淮生暮潮樓臺見新月燈火上雙橋隔岸開朱箔臨風弄紫簫誰憐逺遊子心斾正揺揺辛未興龍節日懷歴陽王掾元胥昨嵗東溪口扁舟欲下江伴愁燈映幔欲睡月侵窗漫寄書連紙誰同酒一缸何當見之子聊使我心降秋夜聞雨晨興偶書故國心馳北扁舟計漫東寒生一夜雨病涉兩秋風落泊籬根葉幽憂屋角蟲何情悲節物聊自況衰翁題蘭陵王碑陰碑載王名肅字長恭北齊文襄之子按北史直書長恭而沒其名葢當時以字行而史失其詳爾王有武畧善撫士每得一瓜數李必分甘餌衆金墉城之戰免胄先登推功第一今蘭陵王曲即凱歌也為後主所忌得疾不治而卒以鴆薨碑陰刻王弟延宗一詩甚哀墓在滏陽西南十里道占其東夏潦所凑壠已半圯碑字大兼小𨽻法有古氣而不著書人名文乃盧思道也庚申九月十日賦齊室生武賢蘭陵類頗牧析𤓰饗虎士饜慰比粱肉金墉免胄戰破陣何神速樂府有遺聲當歌凱旋曲磐宗既不夀霸祚宜爾促十代六百年人間變陵谷荒塗接幽壠誰復禁樵牧窆石半攲摧鉤鋤斷鼇足蒼苔蝕瑑刻仰睇眩塵目操翰無愧辭千言不為辱人生妄區别共盡同草木何待雍門彈令君淚盈匊两宋名賢小集卷一百二十
