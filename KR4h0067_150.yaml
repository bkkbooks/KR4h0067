body:
  text: 兩宋名賢小集巻一百五十宋陳思編元陳世隆補盤洲集巻下次景裴席上韻桃李紛紛已半春海棠睡覺晚粧新龜巢剰有千般景瓊報渾無一㸃塵酒未舉杯風逐客詩方拈筆雨催人從今只揀晴和日草草杯盤勿厭頻枕上示景盧朱幡皂葢有行期暮景無情憯别離枕席半旬乖語笑急風吹雨淚垂垂南憩畨禺北抵燕片帆西上駐荆門平生不作東甌夢茘子丹時念灌園懷景盧菖蒲節近暑風高棠棣叢疏月影交清夜不曾空鶴帳浮生何幸老龜巢酒杯獨引今無侣書巻閒開共苦抄想得公堂鳬鶩退須懷西塢欠誅茒排悶數日雪兼雨凝寒懶舉頭出逰閒豹舄危坐索狐裘怕冷杯常執扶衰藥屢投滿園氷木稼天遣阿誰憂答裴弟棠棣成隂慰暮年困人春雪好長歎閉門終日詩頻和伏枕盈旬病未安已遣攜鋤移竹逕更思杖策整花欄飽聞氷下逰魚躍所恨雙溪一笑難辛㓜安稼軒濟時方略滿心胸卜築山城樂事重豈是求田謀萬頃聊因學圃問三農高牙暫借藩維重燕寢未須歸興濃且為君王開再造他年植杖得從容紅梅不謂天然白今同杏與桃玉肌添酒暈還是冠風騷草堂茸茸春草茁碧水映芳塘入夢無佳句看雲憶對牀溪簾雨過溪添緑橫瀾自在流水晶簾欲捲何處著銀鈎人面竹怪竒存法相姸醜出天真此君無二貌正是葛天民慈竹義居傳九世瑞物記三林何似同根竹春風一死生梁子正有詩謝牡丹及聚仙次其韻天教國色傲春華不肯爭先伍雜花西洛塵埃長太息召園今屬阿誰家癡坐林間類守株一年春事已無餘且須九曲添清漲灑掃椶亭進一盂玉蘂茸茸映四筵團欒如集飲中仙下方簇蝶非儔匹上比瓊花難並縁病中憶九曲新穿九曲望時霖水到渠成病已侵見説小舟穿栁岸那知清漲入桃林五旬藥裹長經眼幾日荷花復賞心夢裏亦知行樂處老來尤更惜光隂次韻景盧題龜巢拙速誰前勝巧遲新亭結罷得能奇細看逺水兼天淨可但中秋觀月宜出郭自欣三徑樂枕流今有幾人癡巢蓮千嵗同藏穴一笑泥塗曳尾龜流杯次日連雨次渭師韻入夏濃雲日夕昏舉頭烟雨暗前村風隨重客清葵扇月為佳人射翠樽依舊建瓴欹屋角幾畨攜杖失溪痕小枰己在紗忩下欲把明瓊看倒盆再答投老無能千慮昏歸田浸久使令村長因歩月成三影難得披雲共一樽水漲溪橋孤釣隠雨侵山徑洗靴痕寓公在此寧黔突㑹有容光照覆盆雨中排悶飯牛戴笠牧童昏安得斜陽過别村户外涎蝸行半壁牀頭渇䑕側空樽花殘鶯老渾無夢水到渠成不見痕天意未晴人未飲冢奴款曲辦籸盆用景盧諸公詩軸韻招監司太守淺白輕紅笑倚門何須雪夜憶前村韶光定入詩人句勝事難逢俗子言風振繡衣須命駕雲隨皂蓋欲窺園人生易老愁春老問栁尋花故事存景盧數日枕席復用前韻半載悠悠只閉門不知紅緑遍千村山川滿目供衰境桃李成蹊出怨言可惜花飛聊洗琖何期雨作阻行園車公不出須重講撿挍芳菲幽興存答太守謝牡丹華髪歸來不記春優㳺學圃傲江村已欣勝日臨千騎漫折香霞佐一樽對竹便當尋曲水藏花那肯效慈恩行厨若有真消息奔走畦丁急埽門謝洪慶善提刑遺法帖紛紛渇驥競秋蛇鐫鑱收拾俱名家吾宗尺牘擅天下年來野鶩維肩差庭前書帶凝寒緑架上牙籖富新軸中藏墨妙更竒竒長物不留沾賸馥生平小楷拘蠅頭豈知蠆尾與銀鉤從今已辦筆成塚學竒還許登門捧春思自聞郊外景多病負年光沐雨桃容膩尋春蝶興狂幽期知我背遲日為誰長一枕虚忩寂爐烟續舊香晚望古堞高亭暮登臨逺眺時菊房棲白露荷葢偃清漪遵渚歸鴻集投林缺悲闗情聊繪句獨立自遲逓客至閉闗聽剥啄有客款蓬蒿談壘萬人敵詞源八月濤園蔬供菜甲盤實飣毛桃冷淡琴書味由來屬我曹送人至姑蘇吳門千里役别話不堪聞暫發參商歎長懷星斗文菊叢黄彩亂槐路緑行分日冀書郵至冥鴻接暮春答林神童快覩終童英妙時蛩然銜袖出明璣家聲不詫大哉問文律何愁知者希益利鋒鋩臨大敵養成羽翼看高飛紅塵可厭忙車馬挹取西山爽氣歸瑞香花衮衮香毬次第開結根幽獨謝紛埃芳容妒入鴛鴦社異馥清傳錦綉堆睡裏魂交非是衍醒時心賞可無猜品題葢在春林右不是花王喜後來讀秦本記應侯一語幽宣后長信䝉辜徙萯陽秦室無親類梟獍借箕誶語亦其常侯生淮隂束手大江閒誰信功成頰舌間不惜鴻溝分二國太平今日得生還楚懷王武開謀詐却稱臣寃魄㳺魂尚在秦墓木蕭條塚猶濕流聞其子作昏姻讀戰國史折足黥徒未易欺簣中死士亦何為魏齊斷首龎涓死禍報由來不可知讀召公世家齊晉瓜分四國王嬴秦為吕芉為黄六雄當日皆新主獨有甘棠澤未亡穰侯推轂曽聞薦武安威伸三晉走荆蠻厠中犬彘圖攘奪猶道藏兵不出闗田單齊主輕忘在莒時鮮裘淄水遽相疑若無貂勃明勲業幾使功臣枉見夷長平一敗長平振古無趙邦臣主亦何愚當時已中馮亭計猶自區區遣鄭朱春申君珠履三千盡在門爭無國士解銜恩棘門難作無遺類死黨寧聞報李園酬李舉之象載凝華落筆工一時英妙盍居中交情耐久惟同味詩意求新更鑿空揮麈寧談阿堵物聨珠不數囁嚅翁文成間故雞林得復有聲名到海東次韻蔡聸明登巾山朝來爽氣冠曾丘急雨驚風正麥秋要得雲軒聊放目何妨松徑暫低頭多韁局促祗懷慙飄忽熈春月過三矯首白雲千里外此心無日不江南好句聨翩見未曾品題今日欠鍾嶸登臨自有江山助豈是胸中不得平夜飲藥寮次景思韻主人知我樂郊居藥圃嘉招走尺書笑語池邊欣促席醉歸林下却肩輿正聞雁過猨啼後更是風清月白初見説長安消息近却須高興謝鱸魚黃巖道中兩日黃巖縣紛然有慮侵乍聽幽鳥語復起故園心冒熱度峻嶺憚勞休茂林潮來知海近三島可能尋登寧和嶺初識寧和嶺有懷占夢時聞詩千里隔斷織九京悲草木應相記烟雲渾異宜西風襲懷抱淚睫不勝垂次韻酬丁致逺司户翰墨塲中識面初珠璣粲粲似相如盍參多士登臺省却掾諸曹親簿書白社不妨閒紙筆赤城更好命巾車寸心淟汨方茅塞快讀新詩得剪除賀子忱吏部抱膝菴主人蚤嵗抽華簮隠居時作梁父吟於今松忩在人境空有蕙帳留烟岑風來翠篠自搖玉秋著黃花仍散金拂拭塵埃記行役興來命酒還孤斟石道士妙聲堂泉溜古今同臨流萬慮空採芝歸絶嶂添竹映疎叢影漾高秋月聲宜深夜風真清長在耳何用撫孤桐仙壇院舊聞王子晉雲卧夜吹笙控鶴冲天去松風千古聲贈護閟昌老緩轡到禪扃高談得細聽茗花汎輕椀烟篆度虚櫺門外雲千嶺軒中水一瓶我來無好語留此待丹青寒巖寺峭壁插青㝠層巖覆化城空中清磬發幽處慧燈明萬瓦足雲氣四簷無雨聲豐干不饒舌此地孰知名曉發秦安驛林夢不能曉起行山徑迷小車驚宿鷺列炬誤鳴雞冷覺霜華重光瞻斗柄西金庭有佳處芳桂想幽棲次韻曾宏父探梅未開梅枝渾待雪山意漸呼風欲索簷間笑那憂徑外窮英詞窺玉潔拙句媿雷同只恐花開日綸言下法宫招曾宏父待雪欲把詩催雪先將酒送寒凍雲方作意㣲霰已開端目斷鄉城逺心驚嵗事闌擬同今日醉待取玉花看次韻范子芬雪中同訪曹功顯明朝春琯欲飛葭臘裏重看舞雪斜筆下百篇非事業樽前一醉即生涯初疑高栁枉吹絮却伴寒梅好放花踏凍不辭方駕逺閉門留客更誰家次韻蔡聸明雨中書懷梅雨冥冥晴復隂小軒終日起歸心自憐宦業初何補獨喜交情久益深憶缺㣲醺看錦瑟媿無好語比南金青山千里江南路它日郵籖幸見尋茅軒剪茅聊復爾歩屧欲何之風捲三重去危簷謢雀兒兩宋名賢小集巻一百五十
