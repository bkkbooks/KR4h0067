body:
  text: 兩宋名賢小集卷二百六十一宋陳思編元陳世隆補山居存藁陳必復字無咎號藥房閩人嘉定時卜居封禺山中結屋數椽題曰藥房吟所有山居存藁俱五七言律詩自為序山居接砌斜通徑緣籬矮結牆地卑蝸篆壁山暖蜜分房過雨林亭靜落花春晝長幽居差省事猶有課詩忙領客遊聞人氏省庵園半夜雨方住一春晴不常倚欄聽鳥語開户納花香庭暮竹隂淨池風水氣涼幾番吟未穩步月細平章搆得搆得數簷椽間身與靜便半簾花影碎一樹鳥聲圓吟苦瘦於舊春寒多似前閉門無客過心事付琴邊百五節獨遊苦無侣偶步到前川春水緑於染山花紅欲然冷煙寒食月小雨浴蠶天此去嬉遊少風光又一年贈林尚仁自號端隱溪邊著吟屋亦足老生涯洗硯渾池水敲碁落案花客來多載酒童去自煎茶愛爾丰標異逢人滿口誇舟中得催字出郭少晴日春隂欲釀梅岸痕新雨過島色曉雲開數鳥煙中落一帆天外來溪行正如畫頻報長年催客枕客枕偏饒睡春歸尚擁綿屋深燈易暈漏短夢難圓棲烏驚涼夜閙蛙喧雨天一聲柔櫓過何處上溪船歸自德清午隂雲弄日水漲浪侵磯小港漁舟聚深村酒戶稀牛間童自睡蠶熟客方歸隔岸人家近繅聲出翠微遊前溪西庵為愛僧居雅時來扣野扉沼清魚可數軒靜客忘歸修竹負牆立幽禽背水飛道人差不俗洗耳聽絃徽贈張駉自號牧隱乍見語相合苦吟心更親老於琴得趣隱與牧為鄰一夜簷花雨十年江樹春所交半湖海恨晚識斯人東野故居先生高隱地遺迹尚堪尋出郭秖疑近入村還覺深秋光淡平野暄色帶遙岑幾度祠邊過詩成不敢吟響應寺步屧窮幽討扶笻上碧尖山高秋易瘦瀑小雨方添寺老僧單少潭深廟祀嚴平生丘壑志愛此結茆簷宿龍山精舍偶貪禪宇靜襆被到深林夜榻僧同話寒簷客自吟窗明疑積雪樹黑怪常隂猶恨匆匆出丁寧約重尋僧房結廬修竹裏身外世緑輕滑几淨如拭小窗低更明夜深留佛火人靜聽鐘聲共撥罏灰坐跏趺對短檠山中書事天氣如春盎連朝未有霜數蟬嘶老木一鳥渡寒塘風竹寫晴影水花臨曉妝靜中觀物化此意等羲黃曉步清曉步幽徑庭蕪帶緑莎籬根惟有菊池面巳無荷高樹蟬聲急逺山寒色多小窗風日轉便覺似春和吳江道中葉老蠶登箔泥肥燕葺窠曉風帆腹飽夜雨柂梢峩久客交遊少一春行役多短篷終日坐煮茗且髙歌和客用韻麥風翻蝶夢花露濕蜂窠水濶浪痕帖雨晴雲氣峩酒功書下下詩料辦多多擬喚三高起豪吟雜短歌舟行崇德落日挂征帆西風客袂單燈明村店近船重水程寬蘆蓼作秋意汀洲生晚寒鐘聲煙外寺山色夢中看嘉禾境上聨疇岡勢斷缺岸浪痕垂野店茆柴酒人家槿樹籬逆風魚上少連雨稻開遲客路秋偏好歸程盡是詩寄石泉雲間明府叔容易成離索臨分重忍言夜船楊栁岸曉枕荻花村山雨斷雲腳溪風生浪痕懸知自公退懷抱欠同論異政人能説新吟客為傳一官清似水萬事信於天養鶴分厨料收書出俸錢晝庭少公事閉閣抱琴眠卧念相從樂杜門岑寂中曙窗報晴色寒葉語秋風别去詩難穩愁來酒易空相看才數驛好為寄書筒席上和林端隱韻雲壓簷花重溪禽濕不飛煙林生暝色雨砌上苔衣暮鼓深村急疏鐘逺寺微吟窗得新句寫向錦囊歸梅花瘦得冰肌骨亦清詩人於爾獨關情孤高不受塵埃涴潔白猶嫌縞練輕天下有花皆北面嵗寒惟雪可同盟當時只欠靈均識不與離騷寫姓名偶成繞屋栽梅亦可人最憐夏月緑隂清前村雨過山如洗深徑風來竹自鳴滌硯不嫌池水冷寫書愛傍午窗明近吟未許人知得且向梅邊隱姓名舟中效東坡用韻底事京塵踏軟紅又隨征棹過吳淞人家半在桑柘住春水忽迷蘆葦叢赤蟹白魚今稍稍紅櫻紫笋巳匆匆船窗盡日看山色多少好山供眼中兩宋名賢小集卷二百六十一
