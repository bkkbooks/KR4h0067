body:
  text: 兩宋名賢小集巻二百八十九宋陳思編元陳世隆補橘潭詩稿何應龍字子翔錢唐人嘉泰間進士曽知漢州橘潭詩稿一巻俱七言絶句春寒博山熏盡鷓鴣斑羅帯同心不忍看莫近欄干聽花雨樓髙無處着春寒客懷客懷處處不冝秋秋到梧桐動客愁想得故人無字到雁聲逺過夕陽樓冩情洒淚題春墨暈乾東風無便寄郎難青箱再展雲牋看蠧却相思字不完寄胡雪江借得官亭小似船六橋風月友三賢芙蓉未發荷花老一㸃詩情若個邉旅中示同軰與君同出已多時費盡黄金典盡衣只待春江烟浪煖小舟先趂白鷗歸清曉清曉輕傳一信風花添紅粉草添茸畫樓十二欄千曲春在珠簾第幾重笋泥中莫怪出頭遲厯盡氷霜祗自知昨夜震雷轟渭畆請君來此化龍枝過垂虹垂虹橋下水連天一帯青山落照邉三十六陂烟浦冷鷺鷥飛上釣魚船吳蠶正是吳蠶出火時交交窗外一禽啼溪西有葉髙難採遥見青裙上竹梯效香奩體雲幙重重雨未収嫩寒先到玉簾鈎一杯晚酒無人共羞帯雙花下小樓木犀露粟藏金一半開層層碧玉映樓臺西風昨夜吹香過人在欄干待月來夏日即事野土生烟草樹焦彤彤日脚火雲燒池邉自抝青荷葉分付山童盖藥苗題駱秀才葺故廬䟽家在西湖合澗橋短籬圍得數椽茅歸來頗費支撑力羞見春風燕子巢有别樓上佳人唱渭城樓前楊栁識離情一聲未是難聽處最是難聽第四聲春詞玉纎輕揭綉簾開行到花前淚滿腮正爾春心無處託一雙蝴蝶忽飛來有所思曽倚空屏唱栁枝一聲嬌逐暮雲低重來只見流鶯在立盡斜陽不肯啼小園池占方方十丈寛已栽花木四時看客來莫笑生涯薄窗外新添竹數竿為客初秋為客暮秋歸一擔輕嚢半是詩試問客情何處惡五更孤店酒醒時東風和徹詩篇得暫閒落梅香裡立欄干新栽白紵春衫薄猶怯東風一陣寒有所見不着畫羅金縷衣尋常打扮最相冝春風燕子樓前過飄落梨花雪一枝曉窗桃花落盡李花殘女伴相期看牡丹二十四畨花信後曉窗猶帯幾分寒居家居家到底勝居官啼鳥聲中畫掩關待得小園花落盡更須移酒對青山採蓮曲採蓮時節嬾匀粧日到波心撥棹忙莫向荷花深處去荷花深處有鴛鴦盆中四時木犀一樹婆娑月裡栽是誰移種下天來金英恰似清霄月一度圓時一度開相思二月春風楊栁青聞郎繫馬到長亭相思情味如中酒折盡梨花嗅不醒江上有感江上秋深客未歸荻花楓葉兩依依傷心最是長橋路落日西風一雁飛見梅雲遶前岡水遶村忽驚空谷有佳人天寒日暮吹香去盡是氷霜不是春舟中偶成黄㡌招呼急下船天明僅可過涵山朦朦一枕梅花夢猶在寒牕紙悵間題臨安僦樓過了燒燈望燕歸春寒剗地勒芳期杏花深巷無人賣細雨空簾盡日垂粉蝶宿粉棲香樂最深暫依芳草避春禽晚來風起還無定舞入梨花何處尋活計三間茅屋盖頭顱除却吟篇事事無擬把十年窮活計一時傾倒向江湖無愁世間惟我最無愁纔是無愁得自由午睡覺來門半掩一池春水看魚逰春隂宻雨流酥入翠苔春隂日日鏁樓臺女郎未有尋芳約辜負櫻桃一半開老翁八十昻藏一老翁得錢長是醉春風杏花村酒家家好莫向橋邉問牧童清明踏歌搥鼓近清明小雨霏霏欲弄晴喚起十年心上事春風樓下賣花聲杜鵑君若思歸可便歸故鄉祗在錦城西不知何事留君住却向空山日夜啼贈友人我向詩中為活計君於酒裡作生涯世間樂事惟詩酒各自風流占一家簾半窣香波䕶曲欄纈花紅映玉鈎閒曉來幾陣輕風過時見溪南罨畫山碧桃玉仙同駕玉鸞飛天上曽攀帯露枝一片不知何處落曉來流到湧金池芍藥金蘂絲頭茜染成五雲樓映玉盤傾謝郎一入中書後二十四橋空月明傷春荷葉初浮水上錢栁花飄盡岸頭綿不知春色歸何處欲向空山問杜鵑效無題體玉釵風斷扇雲深砌冷簾空月易沉流水落花無處問一年春事一年心兩宋名賢小集巻二百八十九
