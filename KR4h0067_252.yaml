body:
  text: 兩宋名賢小集卷二百五十二宋陳思編元陳世隆補竹齋詩集一裘萬頃字元量新建人淳熙十四年進士嘉定初除吏部架閣遷大理司直力丐外任添差江西撫幹卒有竹齋詩集行役宿霧鎖山椒落月桂林側崎嶇歷岡巒倣佛辨阡陌秋髙風露寒道逺時序迫安得歸故園篝燈理書册武陽渡一舟小如葉橫在波濤中紛紛川上人欲渡愁北風有帆天際來漸近葭葦叢寄聲與問訊恐是陶朱公宿佛頭塔孤村三四家籬下盡禾黍主人慣入市能作市井語開窗對竹山揖容延樽俎白雲忽在眼客淚墜如雨羅溪橋我來從西昌日日困塵土誰知羅溪橋淨若初過兩長松列左右清風奏宫羽薄暮舍籃輿扁舟渡溪去别友清宵月滿梁相思幾搔首不圖塵土中共得一尊酒人事好華甚隨復兩分手惟有管鮑心明明若箕斗次許秀才韻二首癡兒欲了事事竟莫之了崇朝弄朱墨校勘是與否徐觀雁鶩行大半落渠手敗羣雖已去考牧未有道拙工不量力自謂中了了髙談蓋一座衆可已獨否斯須臨斧斤便皆血兩手旁觀信善斫莫肯告以道病中聞伯量相訪寄之二首我屋修竹根身間境逾靜維摩今無心誰令示人病夕陽耿疏林影落莓苔徑佇立有所懷髙人倘乘興髙人在城郭應酬頗紛如憶我煙霞栖遺我一紙書雨餘窗户涼蛩聲滿階除相過有成言何時命巾車次范光伯泛江韻夫君陶阮徒俗子不能快屹然頺其中特立蓍甚介平生江湖樂欲去不得邁何當從君逰漁釣寄吾解蟻運知戰不能損檀氏所以亡吾愧與敵槐將何固封疆及此間暇時相與積乃倉不須更他騖富國兵自強次伯仁善利閣小室韻山林吾所廬夜月但對影焉知江上人一日了萬境褰裳步崇臺有室妍且靜徘徊不能去坐見四山暝見雪兀冥當語誰餉我一簷雪吾廬本來靜得此更清絶遙憐北海上往往已盈尺齧氊人在否毋凌漢臣節出門出門復入門吾行竟安之携書北窗下翻閲聊自怡有懷千載人掩卷還歔欷采采首陽薇戀戀商山芝一裘或終身欣然釣江湄斯人不可作斯道日湮微目前稻梁謀鳬鴈方齊飛青田寂無音嵗晚將疇依慎勿出門去塵埃染人衣菖蒲康廬入吾懷十畝馳夢魂踵門者何人遺余以芳蓀歡然得其趣如對五老言幽姿出巖谷常帶氷雪痕塵容為一洗兩目不復昏忽思三峽流褰衣涉潺湲因仍一寸石浸潤九節根人言可扶老嵗月須其蕃茲理諒不誣吾將從綺園宿田家竹亭我家西山嶺四壁皆此君朅來事奔馳日與茅葦親方思坡仙詩恐入俗士羣邀我宿者誰此君滿其門頎然千百夫一見若故人夜深清風來好音夢中聞呼童啓北窗為渠染爐芬夜坐薦福寺次王成之韻鞭鸞未暇相追逐且向祇園止君宿清談但得月華生窗户明明耿殘燭誰令泉石墮吾前洗盡人間絲與竹風帆明發君不留此樂只因吾所獨厭原山中曉行碧雞夜半聲啁哳喚起幽人步林樾秋髙風露著羣木無數寒花浥明月松篁一徑宛如畫石溜涓涓更清絶山嶺便好結茅廬莫待他年鬢成雪秋試示諸兒漠漠輕雲㺯寒影霏霏不雨生秋興黃槐開盡舉子心丹桂喜傳仙籍信竹齋雙手縮袖間坐看羣兒鏖一戰春風躍馬不為難此去無言日邊逺雨後秋事雨已畢秋容晴為妍新香浮䆉丫餘潤溢潺湲機杼蛩聲裏犁鋤鷺影邊吾生一何幸田里又豐年涼風涼風幾時動日暮已秋聲稍稍月華白紛紛林影清余懷元不惡世事巧相攖所願西成後邊頭息戍兵用鄭浮梁韻簡圜師杖履出蹊窄鐘魚佛界深寒梅殘屋角春薺老墻陰一水元無恙扁舟尚可尋煩師掬清溜為我洗塵心再用前韻古寺規模壯空山嵗月深春隨千樹緑雲拂一溪陰地僻人稀到官間我得尋歸來記清賞未覺負初心次黃存之韻客宦何時了官居又嵗餘歸心五湖夢病眼一牀書近作君能富新功我略無不妨賦逰獵會有薦相如暘谷偶成愛日祛愁霧微知散積陰一窗塵外趣萬竹嵗寒心士要崇清節吾將老故林抱琴聊一醉何用覓知音書率更西林碑苒苒老將至區區心已疲文章非世用字畫漫兒嬉廬阜多名剎隋人有斷碑驪黃雖易辨堂奧未容窺嵗晚送館人歸省不厭氷霜路衝寒辦一歸晨雞戒鞍馬春酒夀庭闈燈火知辛苦雲霄會奮飛相期紆緑綬非但戲斑衣題洪內翰爽榭霧閣雲窗天外安懸知幽趣勝人間簾櫳夜月浮銀海桃李春風醉玉山自笑紅塵無暇日浪憑清夢覓商顔如何飛佩隨君後細看匡廬紫翠斑次元德弟示從龍入學生兒雖小莫憐渠學問工夫在謹初今日從師良不惡地年閉户反成疏雙親未老身無事諸父能文家有書好與汝兄俱努力後生業裏試羣居次洪內相菊亭詩仙種菊未多時因菊名亭早有詩欲為寒花標晚節故將新句寄東籬平生未省翻三峽髙處那能贊一辭便得從容侍公側回頭已是十年遲次洪內相梅亭人間多是梅開後旋踵東籬事故常那得紅簾捲朱户細看素質傲清霜一生寄興雲山外幾度搔頭江路旁咫尺名園身未到夜窗羞對返魂香夜坐爐火篝燈孰與同此心吾欲付冥鴻茅簷已作涉旬雨蕙帳不禁連夜風一段清愁詩句裏十分寒事酒杯中溪雲未用安緋雪且聽梅花試小紅雪天花一夜泄春機飛墜人間片片奇有色有光欺栁絮無聲無臭點梅枝緃橫萬舞風回處表裏雙清月霽時此景惟詩可摹寫却憐老去不工詩寄髙菊澗謝惠詩集髙名如斗夜垂天無地追思每自憐正欲為君尋五老乃蒙因我到雙泉新詩妙絶開方就稚子攜時喜欲顛此去湖邊不多逺秋風當覓釣魚船寄元齡弟夜牀風雨夢到處東湖西山如接連安信喜隨烏雀後雅懷知寄白雲邊軒窗春動花夜滿圖史香浮墨色鮮箇裏詩書應未味不妨兼讀養生篇次元德弟寧逐春風上下狂懶從桃李借恩光只因朝市風波惡不似山林氣味長莫惜舉杯邀太白要看騎馬似知章南征他日如相憶詩句還須付革囊玉山道中時赴掌故之命麥田堆緑菜花黃一簇人家古道旁酒熱不妨邀里卷年豐贏得事農桑世情只説宦逰好客裏那知歸興長我有平生蓑笠在釣絲何日理斜陽端午上饒道中一春留滯在京華午日依前未到家細葛香羅素無望黃塵烏帽亦堪嗟爭舟野渡人如簇立馬郵亭日欲斜遙想塤箎獻親夀綵衣羅拜酌流霞臨安别余求之長安車蓋喜如雲邂逅惟君是故人風月滿懷情灑落珠璣撒紙句清新携來客裏一尊酒洗盡湖邊十里塵富貴功名丈夫事别離無用淚沾巾鄉人羅朝宗與兵部尚書京公有舊將往見之遇余于樂平因餞别四時成嵗秋云暮九月肅霜天漸寒有客褰裳涉鄱水逢人劇口話長安懸知欲聽星辰履厭見從來苜蓿盤姑舉一觴餞行色無魚長鋏切休彈餞吳長文司理用修持賢業教無欠七字為韻修平生不量力妄意希前修懵懵雖無見拳拳未敢休持狂瀾湧如此砥桂真誰為天意必有在吾身姑自持賢考亭無恙時從逰孰非賢嵗寒萬木凋松柏始傑然業聖賢去我逺何者名事業我欲到彼岸須君借舟楫教過從資直諒夫豈勢利交謂朋黨者誰仁人姑聽教無人生天地間離别安能無莫作兒女態相期到丈夫欠君姿正而剛名節非所欠臨岐贈一言惟有學不厭保福寺對橙菊有感平生愛菊陶彭澤清夜移橙杜草堂千載詩魂招不得獨留風味在僧房有感意行曾到夢江腰占得雙泉第一寮窗户還深鐘罄逺客塵都向靜中銷癸亥夜夢丙夜清眠正熟時夢魂飛去拜丹墀小臣乍得披肝膽感慨分明涕淚垂次洪內相十月桃韻三首千紅萬紫凋零盡安得枝頭數點紅疑是神人寫春色鎮長留影在屏風舊日驪山宫殿中玉妃無數舞衫紅只應歸去蓬萊後夢作寒花笑北風不須羯鼓促春工一樹霜邊取意紅寄語元明為收拾莫教人恨五更風次洪內相雙竹韻三首延平兩龍幾年卧􅘒爾化作寒枝雙春檜秋松皆敵國會須因壘一時降嬋娟兩枝翠可掬絶勝白璧南金雙留與先生作椽筆詩壇八面受人降管鮑交情真耐久夷齊意氣更無雙虛花滿眼風號怒一節青青終不降薦福寺次許師咏竹浮雲蹤迹任西東翰墨場中且用工時對此君哦七字也勝癡坐辨幡風次余仲庸松風閣韻十九首飛花數點兩初歇啼鳥一聲春正長讀罷黃庭了無事旋安銀葉試爐香古木陰陰六月涼幽花藉藉四時香絲桐清夜作三㺯明月入簾風拂牀爛漫花陰覆短牆花開時候日偏長道人不被春勾引到處惟聞薝葡香不見詩仙何遜來春風幾度早梅開竹籬茅舍自清絶未用移根東閣栽恰則梅邊春意萌困人天氣又清明爐熏茗碗北窗下卧聽綿蠻黃鳥聲已著遺經洗此心更尋流水濯吾襟經旬不涉溪邊路荇帶苔錢如許深霧閣雲窗先自幽水聲那更繞源流春深紅雨落桃徑晝永清風生茗甌楊栁陰中啼杜鵑梧桐枝上噪玄蟬篇章滿眼無人會贏得詩翁取意編紛紛眼底正爭馳我獨冥心絶五綦説與旁人俱不信故山惟有白雲知爭春桃李太匆匆隨手飄零逐曉風氷雪不侵塵不染可人惟有嵗寒松顔楊翰墨令誰解陶謝篇章古所無安得金丹換凡骨白頭深恐愧吾夫平池春去水溶溶人在笙歌一部中栁葉翻風羅帶緑荷花著雨錦衣紅簷間新燕幾時來簷外間花往嵗栽紅杏碧桃渾落盡緑陰低處結青梅淡月籠花花映忩好風吹竹竹浮香夢回何處一聲笛人靜山幽天正涼無所用心魚在沼居然生子燕成窠誰言春去花事歇萱草石榴情更多為憐風雨趣春回故著秋花到處栽蘭菊從來盛風味不妨環繞讀書齋白雲殊不作世態流水更似知人心溪邊濯足溪上坐樵笛一聲秋滿林坡谷遺書非復有向來一紙抵千金誰知懸腕與卧筆如用大都留此心俗書本作于湖樣野鶩家雞強自分王氏無人曾公死只今何處覓雲仍松齋秋吟驕陽赫赫轉秋陰便覺蕭然鬢影侵世事炎涼俄忽爾間來物理靜推尋宿翠巖寺呈李𢎞齋僉判匡廬勝處君曾到誰是淵明與逺公幸有和陶詩卷在好依蓮社此山中同李僉判山行午飯野店簷外羣蜂翂翂因成絶句脫略人間勢利場來尋泉石共徜徉飯餘間立茅簷外試問羣蜂有底忙寄永居士修叔求菴記翠琰新刋照眼明流傳何日到柴荆從今不恨論交晚我亦碑中有姓名脫山紙帳送宋居士剪裁不惜送君先要護髙人雪屋眠只恐鶴書催起去長留空帳北山巔題書院壁間碑天上真龍去不回世間凡馬漫爭馳少年氣習今猶在袖手時來省斷碑日出日出柴門尚懶開緑陰多處且徘徊槐花滿地無人掃半在牆根覆紫苔早作四首雨過長江浪拍城迢迢羲馭水中行旁人指點雲開處喜見青山一抹橫井梧飛葉送秋聲籬菊緘香待晚晴斗柄橫斜河欲沒數山青處亂鴉鳴北窗清冷不成眠風遞蛩聲到枕邊試喚兒童捲疏箔一簷花影月娟娟爐香清晚坐書帷竹擁藤牀日到遲自賦短章還自笑不知顔閔有何詩冬日早行黃昏月姊剪雲開夜半雷車載雨來晨起鈎簾望霄漢風花吹墮萬璚瑰午睡午窗春日影悠悠一覺清眠萬事休堪笑邯鄲槐里夢癡兒到老不回頭入京道中曝背露濕芳桃午未乾花時全似素秋寒征衫不敵東風力試上郵亭曝背看兩宋名賢小集卷二百五十二
