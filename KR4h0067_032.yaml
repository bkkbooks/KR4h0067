body:
  text: 兩宋名賢小集巻三十二宋陳思編元陳世隆補竹友集送董彥速游仙巖吾聞天竺峯聳若在天上峯前溪萬仭激石吼寒浪堂中老比丘碧眼照林莾徜徉君屢游局趣我思往此行何所求豈欲除二障聞呼試回頭未可踏折杖茅檐燕寂地山氣日夜爽不斬凌霄蕂君歸藤自長寄題雲卧庵閒居不事事枕簟信所便卧形先卧心心靜形晏然複壁非不完加以甃石堅其如方寸亂一夕嘗屢遷榮寵萃一門寕免百慮煎雖有水精屏何由得安眼章葉踏謡娘連臂在榻前何如山中人編茅卧山巔白雲宿簷間對鏡心自捐我亦遺垢氛曲肱寄林泉兹庵倘夀我一睡要經年初夏觀園中草木翠葉蕃夏初清隂勝花時閉闗軌長埽步屧園屢窺青青溪中蒲移植井之湄下有九節根服食可不迷往時手種桃只今與簷齊枝間有美實少日將成蹊採菊香滿䄡擷薺甘如飴籜龍露新緑椅梧長孫枝觀身要若蕉衛足當如葵節憐孤筠直惡戒蔓草滋天津白玉郎看花驚洛師吾人守環堵草木相娱嬉逍遥各自適慎勿相唐嗤次董彥速示輪老韻三首法涌僧中鸞孤絶翔千仭似聞天竺老續此燈無盡君游千峯山邂逅一笑哂當知絶諸惡如草已芟藴君如千里駒但欲見鞭影既明才越都未暮已燕境適楚或化轅空歎道里永是中皆坦途幽處試深省黄花散若金翠竹森如束此還有妙義機登同箭速可憐鈍根士每嗟力不足須知日月疾僅得羊胛熟食藕人憐淤泥上出此萬朶蓮須知淤泥中有藕大如椽本清凝氷雪末艷方嬋娟玲瓏衆竅通蚴蟉數節連甘寒固不數却暑暑所便髯奴來城市負籠至我前開緘尚帶泥未嚼先垂涎霍霍磨霜刃霤霤挹澗泉切玉墮冷冽已覺沉疴痊芰實鬬角紫雞頭剥珠圓秋盤薦此果頓使二物捐全此湼不緇餘品莫爭妍而能豁憂思令我心歡然竒功更耐老合作飛行仙翠雲道中觀穫代田誰為西漢議耐旱幸有占城禾揮鐮正見八月穫拾穗遥憐一老歌為言使君驅五馬北陌東阡餉耕者汝曹力穡更當勤慎勿惰游辜使君喜劉世基至作詩留之君家飛猿西我寄躍馬北躍馬望飛猿𣺌若千山隔十載一㑹面一年三寄書書中無剩語只有問何如去年秋風初君馬秣雲卧庵名鶴立望君來廻鞭不我過今年薫風後取道凌雲來山名解鞍愒我廬握手慰我懐胸中所藴藏言下皆傾倒挽留莫怱怱索去還草草堂有鶴髪母室有蓬首妻屋前虎豹怒屋後鼯鼪啼逺游縱未歸旅寓安得久三年勞夢魂一日接盃酒君歸太早計此樂未易辭人事雖好乖興盡當語離壯時須摩厲老矣但跛挈荃蘭本同芳霜雪有一節君識飛猿句我和躍馬詩他時兩相寄抑亦慰相思中秋示座客去年中秋時我病起復仆苦遭水帝子百計推不去牀前客問病草草壺觴具酬獻呼稚子應答煩老嫗今年幸强徤佳節欣㑹遇況有座上客蕭散如鷗鷺尊前清興發豈數飛蚊聚南山又朝隮晚雨細如霧難追阿連玩徒咏希逸賦隂晴天下同吾事亦何預不須淵有珠遑恤食無兔人無百中秋對月復㡬度幸逢外方交姑樂酒中趣君㸔清夜徂草上已多露春寒冉冉雲生嶺翻翻雨决渠畏寒戒墐戸惡濕問生魚始怯春衫薄俄驚團扇疎天憐憔悴骨莫遣峭風梳觀碁客憇茂林晚風生凉簟秋從横飛碎玉勝敗决中流北叟暫亡馬西風還覆舟誰能闗許事寓目且忘憂喜晴十日江村烟雨濛曉來初快日升東扶疎蕉葉展新緑寂寞榴花開晚紅得句又從山色裏發機渾在鳥聲中披衣出戸眄四野好在良苗懐晚風送和香與彥速二首侯莎新補蔚宗傳藿燥簷粘疑可憎試炷博山元不俗小奩分供在家僧窻間一炷結趺坐萬象森然應眼明不印香嚴薫未歇何妨人誚太憎生暮春久雨季月何多雨經旬不見山雲師工蔽塞羲馭久間闗水已澤中滿寒應天際還壊牆憂盜入只益髩毛斑晚春書事二首春來畏病不飲酒孤負山南山北花有客欵門驚剥啄無人追韻得車斜獨酬砌下二三子豈憶城南韋杜家不畏詩窮嫌水厄時時搜句煮新芽未曾留客十觴醉已是飛花三月時忽悟病來真老矣倘逢聖處亦中之眼前用意半乾沒世上忘形皆白癡誰似陶翁有名酒呼兒覔紙又題詩和陳虚中與吕少逸唱酬口號霏霏玉唾勝三語灧灔金荷傾十分簷外催詩疑有雨林間張幄豈須裙臨溪尚憶童時釣問俗仍寛柱後文珍重雨公新句麗落花倚草競紛紛螢火日出知何許宵行有底忙自疑縁寸草不敢近扶桑瑣碎豈堪數神竒安得長㣲風迹未掃更待九秋霜七夕書事燒燭留今夕啣盃憶故年風前失二士句裏問三𤣥隨分𤓰蔬設占星古老傳不須文乞巧只有直如絃朱濠州挽詞二首俊軼金閨彥風流粉署郎憂民形玉色治郡輟鵷行籍甚聞前席居然歎掩芒何人殺青簡惠政在濠梁公才真霹靂令徳故從容未錫九環帶俄傾千丈松清香銷燕寢遺札陋登封身後纍纍印紆青已二龍哭無逸兄三首久客思鄉社長歌去國門還家未偃息樹旐忽飛翻苦淚不勝滴悲懐誰與論平生急難處愁絶望鴒原文章不用世嵗忽值龍蛇遽使賢人隕長興志士嗟有兒纔句讀無地可桑麻頼有興元尹能賙孟氏家溪堂載酒地無復故人車敗壁龍衣委荒畦馬齒踈凄凉閉闗賦淪落廣㣲書但有清風在時時為掃除題干逢辰畫踏遍江南岸歸來試解衣誰言物外賞不與筆端為石帯蒼苔瘦風凋折葦稀令人清興發欲問釣魚磯戲咏石榴晚開二首靡靡江籬只喚愁眼前何物可忘憂楝花净盡緑隂滿纔見一枝安石榴無復幽姿淡淡粧胭脂深染薄羅裳芙蓉影裏避三舍石竹叢中許壇塲端午即事卯飲縁佳節昌陽薦一巵兒諮射團事妻誦賜衣詩懶檢三閭傳争纒五綵絲平生幾端午隨分作兒嬉書李元亮真牧堂賦後揮翰眼中元亮牧牛何處癯仙公澤如今不泯當家諸子俱賢題陳陽樹石二首寒藤骨數百尺枯木大七八圍挽取衛公竒石俱還數幅寒溪解冩枯松潤石陳陽筆意名家弟子蔡規今老古人王宰如何哭汪信民二首竟欲游梁苑聊甘食楚萍談經謝紈袴植髮愬槐庭㸔鏡髩毛改横空烟霧㝠誰評貞曜諡更謁退之銘徐穉生何陋袁宏軰豈知誰知十斛水中有百金魚肘見貧非病疽成憤不攄銘旌返南國寥落正愁予杞菊雨洗幽叢清客襟厨人採掇獨何心根苖扶老或名杖蓓蕾舒黄無數金絡緯䀨人長向井邊啼在宇丁寧戒授衣織素盡輸官事了秋來工女正投機倦夜山月斜臨帳山風細拂裳蕭蕭碧烟静炯炯白間凉境寂萬縁息心灰十慮亡無端催曙鳥底事厭宵長喜董之南歸乾鵲飛翻噪晚林阿南歸騎果駸駸青山黄綬霑新命白石清泉是素心金鑷多情洗雙髩葛巾從此避華簪來年往獻東廵頌今日聊為梁父吟懐祥首座師在羌廬西復東無心還似鳥飛空月鈎雲幕今何處禪板蒲團只眼中未悟竹間鳴瓦礫擬隨童子問鈴風前身倘是胡居士打破虛空對沼公兩宋名賢小集巻三十二
