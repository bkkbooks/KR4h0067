body:
  text: 兩宋名賢小集卷二百二十六宋陳思編元陳世隆補蕙菴詩稿何耕字道夫紹興中守蜀之嘉州有惠政與何逢原孫松壽宋誨號四循良民繪像祀之青羊宫一再官錦城咫尺望琳宫未始得得來正望役役中今朝弄晴雨䇿蹇隨春風頗愛意象古停驂小從容縹眇百尺臺突起凌半空慿欄俯修竹決皆明孤鴻信哉神仙宅不受塵垢蒙稽首五千言衆妙一以通靜觀萬物復豈假九轉功區區立訓詁亦哂河上公癡人慕羽化心外求鴻濛要附白鶴背往訪青羊蹤靈溪賦雙流郭信可隱居詩幽居定何如頗恨未見之主人向我言喜色融雙眉修篁流翠隂寒溪漾清漪領略非一狀幽妍發餘姿空濛雨亦佳瀲灔晴更竒豈惟二江獨意恐兩蜀稀主人信妙士得此固所宜天公閟好景授受各有時豈無多田翁偃蹇逝莫隨素交懷老蒲秀句紛珠璣安得招歸來為君賦清詩往者不可作後生欲何為龍淵門前大江河渺漫昔人飲牛水為乾水乾龍逝亦其理近在咫尺聊泥蟠魚蝦玩侮獱獺笑縱有靈怪誰當看德人問舍壓我境便爾築室相遮欄坐令異類皆屏伏恃有此耳差少安却紆朱紱去監郡遣我守舍良獨難昨來過門恍如夢龍致此語催歸鞍先生不信反不笑謂我饒舌狂豐干虛舟君不見江干車馬紛相送巨編峩峩船載重西南使者解官歸水淺著沙牽不動如君材具豈多得合待明光參法從何為淺瀨著虛舟頗笑胸中太空洞問君此意竟安在欲説向人誰與共山林鐘鼎本同轍繫岸截江隨所用八窗窅窅淨無塵一水泠泠清可弄何當抱被過君眠分破江天幽夜夢題龍華佛閣西川鑿山三大像突兀皆在江之湄修覺九頂見略盡獨此恨未贍客儀朅來勝地了疇昔輕軒瘦馬相追隨百尺金軀信雄傑三乘寶閣何瑰竒燃犀不用照幽鬼擊鼓自合趨馮夷前人開創願力廣下與舟楫扶傾危六月灘濤劇奔吼一分性命爭毫釐篙工落膽行者泣彈指乞活天人師人心狎水水多禍佛力在人人不知慈悲但作布施相江神雖怒將何為普通山距府東十數里青州禪師洪果道場也自龍華歸過之楝宇頽落僧徒鄙野良為可惜是夜雨大作因書所聞所見為長韻錦城之東山培塿突起伽藍壓山口入門氣象頗不凡在昔規模定非苟黃絹碑詞著眼看青州老衲知名久自披榛徑結茆屋不剪霜華散蓬首市門有女捧巾盥衣械無花生穢垢至今一轉鶺鴒語散作諸方獅子吼祖燈寂寞何人繼窣堵岧蕘惟鬼守法席草長深沒膝僧榻屋穿光見斗似聞占藉多衍沃合選名緇振頽朽我來不覺三歎息眼底盡空諸所有自開主席掃塵坌聊寄間眠憩奔走夢回中夜雨鳴簷卧聼東風寒入牖明朝散步轉山脊好語相呼聞野叟抽芒已見麥翻浪搗炒懸知香滿手須臾日影散林樾絢練春光被花柳僕夫催歸屢不應景物殊佳寧忍負出山騎馬更躊躇乘暇應須重載酒忘機臺太虛生微雲機事日夕繁兼忘豈不佳尚有忘者存稽首老龎翁妙處布一言請觀臺上月萬古無昭昏和光亭枯木倚寒巖三冬無暖氣逹人定汝笑胸中太涇渭不妨聲色海徑造佛祖地所以亦樂翁花前時一醉自合江亭過渡觀趙穆仲園亭喚舟芳草渡繫馬緑楊隂步入莓苔徑門開花竹林王孫隨蝶逺婺女隱雲深想見西南望悠悠空賞心春日聞道西樓下香風揚綺羅無錢沽酒得不醉奈愁何老去春緣薄慵來睡興多閉門終一枕亦不夢南柯寂寞城南寺三年寄索居折花修佛供持鉢乞僧餘竟日無車騎依時認鼓魚九衢塵一尺吾自有華胥門前無俗物城上亦竒觀花浪東流穩雲山西望寒身凌塵外逺目極意中寬最愛風標客晴沙理青紈萬里橋邊水朝宗去入吳衮衣新歷數神算舊規模四澥從心正諸公著力無際天東望眼渺渺但平蕪唇齒輔車勢坤維井絡方只宜花柳盛莫遣鳥魚忙隴麥無由食邊籌是可防出言還有禁忍淚下成行題龍華山寺傑閣山為佛精廬地布金水㴠空濶淨路繞翠微深鳥下窺齋鉢龍歸識梵音城中塵眯目那得此幽尋浮翠橋隔溪蒼翠各西東架竹為梁路始通缺月罅林凝淨緑斷霞明水抹殘紅芒鞋步步幽深處藜杖聲聲屈曲中回首忽驚橋已逺泠然身御圃田風寒碧亭憑欄日日俯清湍洗竹年年斬惡竿十頃玻璃秋色靜一林竿籟曉聲寒涼風有意生天末明月無邊照水端誰謂過清難久處愚溪元自不相安逺色閣小小樓居著散仙淵明真趣本幽然招呼雲月欄干曲顧揖江山柱杖前獨鳥倦歸翻落日誰家晨爨起炊煙根塵應接無留礙笑殺胡僧面壁禪龍華大像蓋冀國夫人所作因成二絶慧性元從戒定薰百花潭水洗僧裙箇中力量真超絶故老尚傳娘子軍生男箇箇欲如狼婦女軍中氣不揚試問爭功嗔目士幾人能敵浣花娘假山空庭幻出小嶙峋假外應須别有真只恐話頭成雨橛若為融攝主和賓蓮塘色香無比出西方何物妖狐號六郎手折一枝聊供佛前身定是老柴桑蘭坡蘭與高人臭味同含薰聊復待清風紛紛蕭艾無相笑爾輩敷榮轉眼空假文昌讀書臺假公曾此讀羣書讀破應須萬卷餘家禮一傳為雜爼稗官收拾附虞初隴麥漸漸滿意青只憂春旱起蟊螟當年人誦禱而雨合向兹山試乞靈兩宋名賢小集卷二百二十六
