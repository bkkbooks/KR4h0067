body:
  text: 兩宋名賢小集卷九十一宋陳思編元陳世隆補曲洧存稿朱辨字少章徽州婺源人建炎初授修武郎借吉州團練使副王倫使金通問被拘凡十九年紹興十三年始與洪皓張邵南歸易宣教郎直祕閣主管佑神觀卒有聘遊集輶軒唱和集曲洧舊聞風月堂詩話行世十七夜對月病骨懷風露愁懷厭甲兵人居絶域久月向此宵明輪仄初經漢光分半隱城遲遲不肯下應識異鄉情上已行行春向暮猶未見花枝晦朔中原隔風煙上已疑常令蘇節在莫作楚囚悲早晚鑾旗發吾歸敢恨遲客夜城月四更上忩風一室幽纎雲縈鴈塞重霧逼貂裘兵革何年息乾坤此夜愁殊鄉兩行淚騷屑灑清秋善長命作嵗除日立春土牛已著勸農鞭葦索仍專捕鬼權且喜春盤兼守嵗莫嗟臘酒易經年東風漸入江梅夢朔雪猶迷塞栁天元會眀朝定何處羈臣揮淚節旄前季任道編録濟陽公文章與僕鄙製合為一集且以雲館二星名之僕何人也乃使與公抗衡獨不慮公是非者紛紛於異日乎因作詩題集後俾知我心者不吾過也庚申六月丙辰江東朱辨書絶域山川飽所經客途嵗晚任飄零詞源未得窺三峽使節何容比二星蘿蔦施松慚弱質蒹葮倚玉怪殊形名齊李杜吾安敢千載諸公有汗青攄抱客滯殊方久山圍絶塞深秋風入橫笛夜月傍沾襟造膝他時語捐軀此日心飛霜滿明鏡髮短不勝簪寒食清明亦到客愁邊雙鬢星星秪自憐兵氣尚纒巢鳯閣節旄已落牧羊天紙錢灰入松楸夢餳粥香隨榆栁煙北向雁來寒霧隔音書不比上林傳戰代戰代何年定悲愁是處同黃雲縈晚塞白露下秋空魚躍深波月鳥啼落葉風誰知渡江夢一夜繞行宫劉善長出示李伯時畫馬圖俯首舉尾拳一蹄掣韁如嗅驕不嘶奚官聳肩兩足垂意貌自與造父齊雞目麟鬐鳯凰臆玉山禾逺未容食籋雲返電有餘地置之畫圖人豈識精神權竒孰可班當在白兔青雲間君知此馬從何來龍眠胸中十二間白髮白髮使車前煙波思渺然霜清穫稻日風急授衣天客館但愁坐釣舟誰醉眠乘槎會有便直到斗牛邊炕寢詩風土南北殊習尚非一躅出疆雖伏節入國暫同俗淹留嵗再殘朔雪滿崖谷禦冬貂裘弊一炕且跧伏西山石為薪黝色驚射目方熾絶可邇將盡還自續飛飛湧元雲焰焰積紅玉稍疑雷出地又似風薄木誰容鼠棲氷信是龍銜燭陽曦助喘息未害搖空腹惠氣生袴𥜗仍工展拳足豈惟脫膚鱗兼復平體粟負暄那用詫執熱定思沃收功在嵗寒較德比時燠雖餘炙手燔寧有爛額酷矧當凝氷辰炎帝獨回轂元冥真退聽祝融端可録嗟豫亦何者萬里歌黃鵠偃仰對忩扉妍暖謝衾褥壯懷羞竈媚晚悟笑突曲因思墮指人暴露苦皸瘃頻年未解甲蹈此鋒刃毒遙知革輅中旰食安豆粥陪臣將命來意懇誠亦篤有竒不能吐何術止南牧君心想更切臣罪何由贖此身雖自溫此志轉煩促論武貴止戈天必從人欲安得四海春永作蒼生福聊擬少陵翁秋風賦茅屋冬雨冬雨不成雪北風寒未深山藏千疊秀雲結四垂隂勢灑凌朝閣聲殘入夜衾端能洗兵甲足慰此時心南齊頻年行役夢庭闈陟岵常嗟腳力疲每訴酒巡嫌客惡力營官事笑兒癡雲山幸不持錢買花竹何妨帶雨移此味貴人元未識恐緣詩好被渠知送春風煙節物眼中稀三月人猶戀楮衣結就客愁雲片段喚回鄉夢雨霏微小桃山下花初見弱栁沙頭絮未飛把酒送春無别語羡君才到便成歸北人以松皮為菜豫初不知味虞侍郎分餉一小把因飯素授厨人與園蔬雜進珍美可喜因作一詩吾老似出家晚悟愧根鈍滋旨却羶葷禪悅要親近偉哉十八公兹道亦精進舍身奉刀几割體絶嗔恨鱗皴老龍皮鳴齒溢芳潤流膏為伏龜千載未須問便堪奴筍蕨詎肯友芝菌跏跌得一飽萬事皆可擯侍郎文懿後落落衆推俊淡然世味薄內典得所信香厨留淨供頻食不言頓晏然默不語草木雷音震得發於此公骨髓傳心印應憐持節人餉此為問訊欲將無上味為我洗塵坌食之不敢餘感激在方寸龍福寺煮東坡羮戲作山寺解塵鞅溪邊有微行手摘諸葛菜自煮東坡羮雖無錦繡腸亦飽風露清鈎簾坐捫腹落日千峯明元夕有感朔雪餘千里東風遍九州關河中土異撥火上元愁緑蟻嘗新釀青貂戀故裘紫姑無用卜世事正悠悠獨坐草凍慵抽碧桃癡懶暈紅黃雲猶漢野紫塞漫春風使節空留滯侯圭未會同階隂雪不掃獨坐數歸鴻秋夜秋夜雖漸永未抵客愁長秋月雖已圓不照寸心方將心貯此愁真作萬斛量為月憐此夜誰共千里光空令還家夢欲趂征鴻翔春隂關河迢遞繞黃沙慘慘隂風塞栁斜花帶露寒無戲蝶草連雲暗有藏鴉詩窮莫寫愁如海酒薄難將夢到家絶域東風竟何事秪應催我鬢邊華蘇子翼送黃精酒仙經何物堪却老較功無如太陽草龍銜雞銜名雖異莵公羊公事可考蘇君真是神仙裔橘井隂功貫穹昊雲笈書成數萬言銀闕珠宮用心早獨知此物有竒效福地名山為儲寶不憚林泉新斸掘斥去杵臼謝篩搗况從髙士論麴蘖更課公田收秫稻一朝靈液浮瓦盎三冬浩氣生襟袍且欣軟飽得澆腸漫説逆流工補腦眼碧那憂散黑花髮白故應還翠葆賈傅只嫌松醥陋劉墮敢誇桑落好直須五斗論解醒寧待三杯乃通道誰知萬里落旄人亦許匏尊自傾倒為君喚回雪窖春八載羈愁供一掃曼倩宜分此日桃安期莫詫他年棗何須更採石斛花已覺容顔不枯稿根連石室喜入夢句擬桐溪愧摛藻平生我亦愛書札朱髓緑腸勤探討幸君汲引成此志鶴駕駸駸望仙島吞腥啄腐非夙心嵗晚兹言良可保寒食絶域年華久衰顔淚點新每逢寒食節頻夢故鄉春草緑惟供恨花紅只笑人南轅定何日無地不風塵重九九日今何地寒深紫塞霜敢嫌蘆酒濁且對菊花嘗嵗月雙蓬鬢乾坤百戰場賜茰知未舉夢自識鴛行次韻子文秋興逸興常時有逢秋一倍多山長含楚雨天逺接吳波尋壑同元亮浮家伴志和釣竿行入手還著向來蓑兩宋名賢小集卷九十一
