body:
  text: 兩宋名賢小集卷一百十九宋陳思編元陳世隆補張章簡集張綱字彥正潤州丹陽人入太學屢試獲首選政和二年賜上舍及第特除太學正歷徽猷閣待制引年致仕會秦檜柄國綱卧家二十年檜死起為吏部侍郎兼侍讀後以資政殿學士知婺州尋致仕築亭池上扁曰歸喜自號華陽老人日與親舊遊息其間高宗幸建康召見行在孝宗登極召陪祀以老辭乾道二年卒年八十四綱歷事四朝正直自持多所建白華陽集四十卷其子堅所編章奏居多詩僅二百餘首赴喜雪御筵歸作喜雪排筵曉漏催玉人傳詔下天來香隨日轉蓬萊近花帶春回錦繡開一線新隂留鼓吹三登和氣入尊罍叨霑惠澤思歸美授簡梁園愧乏才次韻仲弼重九黃花白酒兩相逢把酒簪花對晚風千里故園雲水外三年歸路夢魂中自憐晼晚傷秋色誰解踈狂發醉紅寄語髯周頗知否此時情緒與君同感歎子蒼有詩見贈次韻奉呈隨緣到處是吾廬風雨飄颻敢定居異縣逢君如隔世七年怪我苦無書平生出處皆陳迹大半交遊已故墟愁絶不知尊酒盡醉歸兒女笑牽裾寄曽公袞用子蒼韻衰草連雲萬木風天高滅沒見孤鴻夕陽人散酒旗下逺浦船歸漁笛中兀兀松窗翻蠧簡垂垂蓬鬢颯霜叢自憐世味諳來慣已覺忘辛似蓼蟲亂後入城未復錢塘郡先收鐡甕城妖星隨月落殺氣逐參橫已築鯨鯢觀重新鼓角聲大江應好在流恨幾時平賦隨寬詔免恩浹大江浮人少餘新市城荒剩古丘瘡痍誰共理宵旰獨深憂莫上西樓望黃雲滿眼愁南洞即事紫綬金章八十三衰殘不稱舊官銜煩君寫作歸田老野服翛然坐碧巖次韻國衡古寺慿崇岡蒼煙蔭喬木欹斜屋鱗比繚繞墻帶束何人闢層軒延客寄遐矚醉賞菊坡下客意豈在菊念昔居此地名世盡儒服師曠賢多智蒼史聖重目臺成竟誰遊事去不容局梁王高帝孫名字亦不辱當時盛歌舞肯使後人逐陳迹今故存新池為誰緑感嘆世上事翻覆如轉燭請君聽鐘魚尚想吹紫玉次韻仲弼千里長懷北固樓客居顔巷不堪憂青熒坐看孤燈夜搖落初驚一葉秋已厭清談揮麈尾誰能細字寫蠅頭蓴鱸固是吾家事好約西風買釣舟次韻李傳道感事卧病何人為掃門墮霜黃葉任繽紛旋沽濁酒難禁醉厭數孤砧逺更聞冉冉生涯飄似夢悠悠心緒亂如雲幾時得遂江湖去野性終隨鷗鷺羣送春滿眼鶯花自在春送春情緒怯愁新鼓琴不用戴安道行酒却須溫太真晚嵗深交能有幾相逢爛醉莫辭貧新條更有明年在重與東風作主人歸鄉窮巷歸來已白頭結茅何必榜休休好山當户碧雲晚明月滿溪寒葦秋詩社縱添新句法醉鄉難覓舊交遊平生幸自無機械一棹夷猶去狎鷗用前韻愁來莫遣上眉頭著酒驅除醉即休未省一官堪送老已驚雙鬢不禁秋收心香火供清夢洗眼雲溪結勝遊喚取短篷乘晚興坐看煙浪沒輕鷗庚午三月十日遊茅山雨餘沙徑淨無泥策杖何妨過竹溪迎客野花隨處發勸沽幽鳥向人啼峰巒路轉攀蘿倦樓觀煙深望眼迷疑是武陵仙地隔坐來遐想舊桃蹊老夫辭榮里居行年八十酒間漫成拙句述意而已不以示外也莫笑尊前白髮翁曽騎竹馬戲元豐年彌八十癡頑在身荷三朝寵眷隆緑野敢將前哲比香山幸有老人同興來尚欲尋幽去收拾殘春杖屨中次韻王子飛跋石曼卿洛中題壁酒狂玩世芙蓉仙胸中落落太古全浮雲富貴不著眼肯復騰上誇鳶肩應怪元龍負豪氣獻書天子言十事騎驢一去不可追風月凄涼壁間字夀燭代人上鄭相生日凝香紅蠟大如椽華堂兩兩排金蓮漏澀銅壺寒夜永光搖翠幄爭春妍蘭膏芳苡何足道簾捲香風碧煙裊霜娥勿用拂麟鬚合就仙丹會難老我公身依日月光不假仙丹亦夀康煌煌神燭照天下光焰何止萬丈長世間爝火知無助想像丹輝爭欲賦可憐賤士老不才短檠見跋無佳句次韻酬彥逹浮榮過眼風脫葉鴛行無復清夢接柴門晝閉雀可羅寒日暉暉弄踈樾已種芳蘭滋九畹更遣胎仙舞三疊李侯壯志亦可人舉目萬里欲橫絶醉眼時看石稜紫吟鬢半作霜棘折方今聖主躬儉勤奏賦不須誇羽獵中興盛事要磨崖老於文字誰踰結願君勉力上扶搖渺渺雲海出飛楫莫隨鎩翮卧窮巷漫學啼螀弔寒月次韻彥逹對雪有感朔風捲地寒雲繁忽驚空花墮簷間逺山歷亂眼中失飛鳥滅沒天際還緬想端門萬官賀雲陛儼列鳴珮環豐年獻瑞天一笑聲動四海俱歡顔李侯人物妙天下何獨卧窮看屋山胸次氷壺自深瑩管中霧豹難窺班異時富貴恐不免詎忍空歌梁甫艱君看鴻鵠有高志一舉九萬誰能攀對月蓬鬢秋風老柴門轍迹踈誰同今夜月望絶故人書止酒愁元亮何心賦子虛得詩還喜誦習氣未全除夜雨夜雨妨清夢踈簷滴細聲幽懷無客語偶坐有琴橫水濶柴荆迥風高雁鶩驚感時思報主材薄愧平生日暮地偏車馬靜門閉水雲深野艇收晴網村舂續暮砧危腸逢酒怯病骨畏寒侵又見鴉歸盡誰歌一作𢋫梁甫吟月夜漁火前村近秋砧靜夜多山煙歸宿鳥水月動明波燭短催詩急樽空若客何抱愁眠不穩林影半牀過次韻彥逹折梅信步尋梅約欣逢亞雪枝春藏紅蕚小寒嗇暗香遲畫角傳新曲妝臺斂翠眉廣平心不動唯許筆端知嵗暮忽忽嵗云暮霏霏山雨頻鳥啼茅舍靜梅映竹籬新陋巷無深轍清酤有善鄰中原消息斷聊與醉鄉親次韻洪總領題花信亭得江樓誰為傳花信新亭破睡風春回芳意早客到賞心同酒盞搖江緑詩箋照座紅無由接歡宴危坐正書空次韻蘇晉翁見寄不見梁王舊吹臺年來愁眼向誰開求賢廊廟無虛日報國涓塵自乏才直指漫能迎櫑具永懷寧敢詠金罍相看鬢髮霜千丈自視文章水一杯晚嵗可憐神氣索故人猶寄好詩來追還正始真堪喜突過黃初豈易陪婉孌也知能度曲葡萄應已釀新醅何時東閣容驚坐一日那辭一百回戲題所見破睡輕風透碧紗寶叉聊插任欹斜欲尋女伴嬉逰去試問秋千有幾家次韻李道士觀南山柴門無事晝慵開杖屨誰曽得得來隔岸野花隨處發護巢幽鳥傍林回從丁世叔覓花栽老去看花能幾回旋移花樹著行栽君家封植滿煙霧分我一枝春色來兩宋名賢小集卷一百十九
