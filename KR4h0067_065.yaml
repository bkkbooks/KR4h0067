body:
  text: 兩宋名賢小集卷六十五宋陳思編元陳世隆補齊州吟稿曾鞏字子固建昌南豐人易占長子嘉祐二年進士調太平州司法參軍召為集賢校理出知福明等州神宗朝加史館修撰中書舍人卒有元豐類稿續稿外集西湖二十二日平生拙人事出走臨東藩紛此地獄地欣乘刀筆間漾舟明湖上清鏡照衰顔春風隨吾來掃盡氷雪頑花開滿北渚水緑到南山魚鳥自翔泳白雲時往還吾亦樂吾樂放懷天地間顧視彼誇者錙銖何足言百花堤如玉水中沙誰為北湖路久翳荒草根未承青霞步我為發其枉修營極幽趣髮直而砥平驊騮可馳騖周以百花林繁香泫清露間以緑楊隂芳風轉朝暮飛梁懸太虛嶢榭躡煙霧直通髙城顛海岱歸指顧為州乏長材幸嵗足粳稌與衆飽而嬉陶然無外慕寄子進弟憶子去家日南風始吹衣今來日未幾蠅蚊已羣飛思子兼晝夜何啻如渴飢喜聞逺客至手自排荆扉客送書一紙翰墨子所揮上言山居惡夢寐接庭闈次言服畎畝禾黍膴已肥其餘業文字頗測隱與微題詩在紙尾語老意不非我喜何所似大似客得歸我與子事親未飽藿與薇常苦去左右辛勤治鞍鞿子當何時反我眼日已睎應須畢秋刈相見慰依依蔡州蔡州昔人居遺堵不可尋青石久埋沒荒煙起空林昔人依劉表意氣傳至今廣路競朱轂深藏閟黃金構難琦琮間咎責積已深終貽覆宗纍苟得非所欽為惡理當爾足懲誇者心鵲山一峯孤起勢崔嵬秀色挼藍入酒杯靈藥已從清露得平湖長泛宿雲回翰林明月舟中過司馬虛亭竹外開我亦退公思蠟屐會看歸路送人來鵲山亭大亭孤起壓城顚屋角峩峩插紫煙濼水飛綃來野岸鵲山浮黛入晴天少陵騷雅今誰和東海風流世漫傳太守自吟還自笑歸時乘月尚留連環波亭水心還有拂雲堆日日應須把酒杯楊栁巧含煙景合芙蓉爭帶露華開城頭山色相圍出簷底波聲四面來誰信瀛洲未歸去兩州俱得小蓬萊芍藥廳小碧闌干四月天露紅煙紫不勝妍肻為雲住陽臺女恐逐風飛石室仙洧外送歸情放蕩省中番直勢拘攣何如蕭灑山城守淺酌清吟濟水邉水香亭臨池飛構鬱岧蕘櫺檻無風影自搖羣玉過林抽翠竹雙虹垂岸跨平橋煩依美藻魚爭餌清見寒沙水滿橈莫問荷花開幾曲但知行處異香飄靜化堂修簷䡾䡾背城隂行盡松篁一徑深好鳥自飛還自下白雲無事亦無心客來但飲平陽酒衙退當擕靖節琴世路人情方擾擾一遊須抵萬黃金仁風廳凛凛風生寄此堂塵埃消盡興何長朱絃鼓舞逢千載白羽吹揚慰一方已散浮雲滄海上更飛靈雨泰山旁誰知萬物心焦日獨對松筠四座涼霧凇園林初日靜無風霧凇花開處處同記得集英深殿裏舞人齊插玉籠𩮀百花臺煙波與客同尊酒風月全家上采舟莫問臺前花逺近試看何似武陵逰西樓海浪如雲去却回北風吹起數聲雷朱樓四面鈎疏箔卧看千山急雨來鶴林寺李涉所謂因過竹院逢僧話又得浮生半日間即此寺也昔人春盡強登山只肻逢僧半日間何似一樽乘興去醉中騎馬月中還鮑山雲中一點鮑山青東望能令兩眼明若道人心是矛戟山中那得叔牙城親舊書報京師盛聞治聲自知孤宦無材術誰道京師有政聲默坐海邉何計是白頭親在鳯凰城芙蓉橋雁翅橫連杜若洲碧闌干影在中流蓬萊日日逰人到誰道仙風解引舟凝香齋每覺西齋景最幽不知官是古諸矦一尊風月身無事千里耕桑嵗有秋雲水醒心鳴好鳥玉沙清耳潄寒流沈煙細細臨黃卷疑在香爐最上頭北渚亭四楹虛徹地無鄰斷送孤髙與使君午夜坐臨滄海日半天吟看泰山雲青徐氣接川原秀常碣風連草木薰莫笑一尊留戀久下階塵土便紛紛閲武堂五朝壞冶歸皇極萬里車書共太平胡馬不窺光祿塞漢家常𨽻羽林兵栁間自詫投壺樂桑下方安佩犢行髙枕四封無一事腐儒何幸偶專城閲武堂下新渠方渠新鑿北林開流水遙經畫閣來洗耳厭聞誇勢利濯纓羞去傍塵埃不憂待月供詩筆已欲看花泛酒杯却憶虎溪橋上過夜涼臨砌尚徘徊舜泉山麓舊耕迷故壟井幹餘汲見飛泉清涵廣陌能成雨冷浸平湖别有天南狩一時成往事重華千古似當年更應此水無休歇餘澤人間世世傳趵突泉一𣲖遙從玉水分暗來多灑歷山塵滋榮冬茹溫常早潤澤春茶味更真已覺路旁行似鑑最憐沙際涌如輪曽城齊魯封疆會况託娥英詫世人金絲泉玉甃常浮灝氣鮮金絲不定路南泉雲依美藻爭成縷月照靈漪巧上弦已繞渚花紅灼灼更縈沙竹翠涓涓無風到底塵埃盡界破氷霜一尺天北池小會笑語從容酒漫巡笙歌隨賞北池春波間鏤檻花迷眼沙際朱橋桞拂人金縷暗移泉澑急銀黃相合鳥聲新幸時無事須行樂物外乾坤一點塵峴山亭置酒石磴縈回入杳冥筠松髙下簇虛亭春歸野路梅初白雪盡沙田麥正青馬窟飛雲臨畫棟風林斜日照疏櫺長年酒量殊山簡却上籃輿恨獨醒北渚亭雨中振衣已出塵土外卷箔更當風雨間泉聲漸落石溝澗雲氣迥出金輿山寒沙漠漠鳥飛去野路悠悠人自還耕桑千里正無事况有樽酒聊開顔到郡一年薄材何幸擁朱軒竊食東封已一年隴上雨餘看麥秀桑間日永問蠶眠官名雖冗身無纍心事長間地自偏秪恐再期官滿去每來湖岸合留連冬夜即事印奩封罷閣鈴間喜有秋毫免素餐市粟易求倉廪實邑尨無警閭閻安香清一榻氍毹暖月淡千門霧凇寒聞説豐年從此始更回籠燭捲簾看齊寒甚夜氣如霧凝于木上旦視如雪日出飄滿階庭尤為可愛謂之霧凇諺曰霧凇重霧凇窮漢置飯甕以為豐年之兆郡樓滿眼青山更上樓偶擕間客此間逰飛花不盡隨風起野水無邉帶雨流懷舊有情惟社燕忘機相得更沙鷗黃金駟馬皆塵土莫靳當歡酒百甌郡齋即事二首畫戟森門寵誤蒙從來田舍一衰翁囷倉穰穰逢康嵗閭里恂恂有古風瞷氏宿姦投海外伏生新學始山東時大姦周高投海島而學校講説尚書依然自昔興王地長在南陽佳氣中滿軒山色長浮黛繞舍泉聲不受塵四境帶牛無事日兩衙封印自由身白羊酒熟初看雪黃杏花開欲探春總是濟南為郡樂更將詩興屬何人早起赴行香枕前聽盡小梅花起見中庭月未斜微破宿雲猶渡雁欲深煙桞已藏鴉井轤聲急催寒玉籠燭光繁秉絳紗行到市橋人語密馬頭依約對朝霞戲書集賢自笑文章少為郡誰言樂事多報答書題親筆硯逢迎使客樂笙歌一心了了無人語兩鬢蕭蕭奈老何還有不隨流俗處秋毫無纍損天和西湖二首左符千里走東方喜有西湖六月涼塞上馬歸終反復泰山鴟飽正飛揚懶宜魚鳥心常靜老覺詩書味更長佇到平橋初見日滿川風露紫荷香湖面平隨葦岸長碧天垂影入清光一川雨露荷花曉六月蓬瀛燕坐涼滄海桴浮成曠蕩明河槎上更微茫何須辛苦求人外自有仙鄉在水鄉西湖納涼問吾何處避炎蒸十頃西湖照眼明魚戲一篙新浪滿鳥啼千步緑隂成虹腰隱隱松橋出鷁首峩峩畫舫行最喜晚涼風月好紫荷香裏聽泉聲遊東山示客虞寄庵餘蘚徑通滿山臺殿出青紅難逢堆案文書少偶見憑欄笑語同梅粉巧含溪上雪桞黃微破日邉風從今凖擬頻行樂且伴樽前白髮翁離齊州後五首雲帆十幅順風行卧聽隨船白浪聲好在西湖波上月酒醒還對紙窗明畫船終日扒沙棹已去齊州一月程千里相隨是明月水西亭上一般行文犀剡剡穿林筍翠靨田田出水荷正是西亭銷暑日却將離恨寄煙波將家須向習池遊難放西湖十頃秋從此七橋風與月夢魂長到木蘭舟荷氣夜涼生枕席水聲秋醉入簾帷一帆千里空回首寂寞船窗秪自知寄齊州同官西湖一曲舞霓裳勸客花前白玉觴誰對七橋今夜月有情千里不相忘兩宋名賢小集卷六十五
