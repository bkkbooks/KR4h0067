body:
  text: 兩宋名賢小集巻二百八十七宋陳思編元陳世隆補薛嵎嵎字仲止號雲泉世家永嘉之亷邨負才不遇以詩聞於時所居曰漁邨有漁邨名自我之句題詠頗多晚年買山范灣營藏地有詩云不知筋力何年盡㸔到松杉㡬尺長佳句也山中吟疎拙本天性束書歸舊林世人皆失笑泉石自知心山柿紅猶澁池魚静亦沉於中觀物意吾道樂彌深題扶踈亭竹風晴雨雪天無趣不蕭然影過鄰家月根通石下泉長因終日㸔憶得故山眠物性今方㑹心虗莭自堅歳暮書懐園林春又近老態更無懽添歳兒童喜照貧燈火寒直心嗟道喪多事識才難已種梅千樹從今爛漫㸔賊中上人頑坐取貫休覔句如頑坐句嗜吟忠夜凍立雪此同機工若精靈聚毫端造化歸石牀趺半結荒徑葉頻飛客至應相訝無心聽扣扉賦陳子在瓢飲羡爾甘貧居陋巷遥知清德繼前修平時所樂從中得外物雖㣲不過求自枕曲肱安澹泊閒挑拄杖亦風流百千年内誰相望寂寞箕山一許由舟泊曹娥祠下身沒一朝事孝名垂至今江空夜濤泣日落霧天隂社祭陳蕭鼔蠻歌進寶琛予生無愧怍風浪不驚心旅中秋夜車馬日西東阮生途自窮三年辭舊國今日又秋風邉雁凄凉過池花寂寞紅邦人慣相識漸覺語音通送劉荆山束書入金闕憂國最情深天意有興廢人才無古今布衣萬言䟽孤劒一生心直道嗟難遇賈生終陸沉中秋家人玩月年年照離别今夕喜團圞不是人心異全勝昨夜看八荒同皎潔列宿讓清寒自有銀河路乗槎到不難古淡師然公逰方野僧攜錫别何處度殘春天地無窮事江湖自在身真心齊得道物貌異於人昔日安禪地深山虎亦馴天育道中除將吟巻外琴與鶴相隨問寺路猶逺入山僧未知鳥靈巢佛塔猿飲掛藤枝陵谷幾遷變道傍横古碑山中古松曽經雷斧劈上有鶻巢腥過客誰摽紙山精此托靈虬龍雲際頂龜鳥土中苓月夜境荒寂秋聲不可聽育王寺寺在衆山裏白雲深更深不知行樂意何似坐禪心䕶塔龍常在倚松僧獨吟渡江前賜字珍重到於今太白山觀雪二十里松聲千山雪未晴人當絶頂見吟到此時清大地球琳滿空林鳥雀驚老僧觀物化無滅亦無生天童寺佛界似仙居樓䑓出翠徴浙中山水最海内衲僧歸草樹有真意禽魚盡息機禪房無别事唯見白雲飛送潘進士春渚㣲茫碧草連千花飛盡桞飛綿孤雲野寉生遥思明月清風共一舡破褐還尋棲隠地空嚢唯乞送行篇先生自有修真訣不倚丹砂駐少年過村翁家白髪茅茨下耰鉏力未衰兒孫収滯穂鷄犬入寒籬俗朴人家善山深升税遲能言書舊事相問坐移時薛野鶴瘦形如寉頭如雪流浪江湖歳月深但是胷中有丘壑何分城市與山林漁父一笠一蓑衣空江雨霏霏得魚雖假餌於世本無機晚唱教兒和閒身盡醉歸滄浪猶未足長羡白鷗飛開爐莭賦閒身何所似丈室老維摩茅屋地爐小荒園樹葉多移牕就梅影晒草補漁蓑似此寧辭苦邉寒尚枕戈除夜苦雨華髪負滄洲星霜又一周未慿終夜雨能洗隔年愁池草起吟思樹禽栖屋頭空餘壯心在燈下看吳鈎呈楮溪主人一水傍通四五池竹亭茅榭亦相宜中間更着髙人住不到溪山無好詩寄公衮舍弟每恨世情薄相期情最深秋風一迴首明月兩關心寉病難為藥砂頑不化金余生百計拙耐可事清吟己亥大旱官催秋苗甚急立秋纔一日期㑹到林泉已悟征苗意曽吟喜雨篇飢鋤山草盡暍汲井泥堅聞道鄰州牧憂民夜不眠新築湖外草閣揮手紅塵吾老矣㫁堤流水草堂新幾年荆棘無行路一日雲山有主人未許園丁知姓字先從漁父問仁鄰謝他鷗鷺煙光裏飛去飛來伴隠淪山居簡飲氷友清溪槐逕二弟别後全無夢寄書安得頻誰憐獨徃意天弃苦吟人債長新年息貧欺漸老身入林知未宻猶與俗相親送友人之括蒼石門當半道想見泊舟時伴寉立終日就巖題幾詩近山秋易老問隠地偏冝我亦江湖去心期爾得知為張上翁賦松交之人梅竹操抱此歳寒心古道乆不作髙風獨在今無言欣意㑹肥遯愛山深我亦蕭閒者從君澗壑吟友人入京猿寉亦悲鳴家山莫浪輕千峯帯秋色一路獨吟情野水衝潮白孤雲趁月行遥憐歸夢斷七十二灘聲秋試下有感焦桐何處是知音猶向殘編惜寸隂此日便為終隠計青山已負十年心梅花獨對寒流潔野烏髙飛古木深萬古紅塵徒擾擾幾人頭上有朝簮哭薛元善兄弟寂寞一牎燈隨風㓕又明空堂連夜雨白髪哭兒聲樹色悲揺落交情隔死生唯應骨肉愛為鬼亦同行送松風僧淵中二公逰方無累雲相似悠悠天地間新秋生逺思此去未應還撼錫驚棲寉聽松思故山吟詩與説法同是一機關歸潔庵自此首至蓑衣歩為湖外别業四詠行藏自有意非命亦非時洗耳咲心褊折腰慚悟遲榮枯花上見寒暑鬢邉知獨立衡門下悠悠千古思漁村晚照舊逰憶得瀟湘路今喜煙波似舊時澤畔怕逢漁父問桃源已被世人知數家草市添新戸一樹寒鴉傍古祠蘭社香深洲渚濶小牎長日賦騷辭苜蓿軒取唐補闕苜蓿長闌干句好是春風長育天䦨干低䕶曉牕前園丁未必知吾事補闕清聲四百年蓑衣歩水浸石根冷風吹藤葉飛菰蒲秋影裏長趂釣船歸寄朱希仁兄弟咫尺不相見閉門唯苦吟聽殘寒夜雨灰盡壯年心身外一貧在燈前百慮深所欣交友義白首亦如今送僧自然過許峯知心逢豈易語别喜從容因得静中趣又尋雲外峯吟篇題在竹拄杖曲如松後㑹期難定來書勿厭重題中川張氏所居鷗鳥徃來處此翁廿隠論地因人物著名入郡圖新夜月情懐淡茅􅗔意態真髙風無識㧞老却採薇身松風閣地形連斗閣連雲松籟曾經佛祖聞永夜月明人到少海光山色自平分題仙巖玉桂花生在龍居最上層重重碎玉簇孤藤靈根舊説冝丹汞仙種元無到馬塍風過乍疑吹珮響日籠還似㸃酥凝三年刻楮成何事除却天工人不能和鴈來紅若將羣卉分髙下此種無因到畫欄寒蝶不知紅是葉飛來猶作野花看劉荆山漁屋客星沉沒釣䑓空千載風流獨此翁萬頃波心歌社若九霄雲外見冥鴻已將名字編漁户只有琴書在室中楊栁煙深杖藜出滿頭衰白任春風雲壁上人逰方歸亦是無心出不如歸意閒一身隨鐵錫十載住金山定石沾花雨清齋帯病顔常云迷覺路只在片言間友人以修錬逰方或傳其以此死者為賦是詩寉骨難汚世上塵西風惆悵瘞湖雲莫悲生死今朝隔須信仙凡此路分丹竈空遺鷄犬恨青山誰弔鹿麋羣蓬萊今古知何在秋草唯添處處坆李氏愛山樓境自吾心㑹於焉識所存鳥聲喧後寂樹色郭中村静夀備仁理乾坤悟易門白雲同此意相對亦無言黄蜀葵嬌黄無力趁芳菲待得秋風落葉飛空有丹心能就日年年憔悴對斜暉贈漁者幾度看山愧白鷗身名心事兩悠悠何如醉醒寒江上風捲蘆花雪滿頭真隠寺呈延上人塔光圓照室香炷讀經晨林下有清福塵中無悟人巖隂常候雨松色不知春青草何年墓標題界碣新茅屋茅舍竹椽短不勞朱堊施高無神鬼瞰貧與子孫冝近古意全朴當風势亦危梅花有幽致一樹隔疎籬胡賢良進史白首裒遺傳難甘閟一丘表成趨闕拜路左别家愁文字歸中秘科名異雜流當年韓吏部何自抱深憂秋夜宋希仁同吟松風閣有感相逢長日坐如癡瘦得吟肩聳過頥天意復生郊島在人心自逐古今移髙秋月色行松頂半夜山中讀楚辭此道若無千載後塵昏何處照妍􅑦寄羅浮楊天經居士羅浮峯對海壇峯只隔長江半里風君向西方了生死我於易象悟窮通數聲清梵空林下一幅漁罾落照中各各閉門無俯仰不相同處偶相同冬日雜言五首茅簷日出勝重裘飽飯看山倦即休識得个中真氣味自然無夢到封侯古藤荒草亂成堆自課園丁日日來只有梅花耐清苦霜風枝上犯寒開竹爐槁葉坐燒殘冷屋荒村夜更寒凍得形模龜様縮誰知方寸似天寛鶴唳柴門月過墻梅花如雪滿林香風光直許閒人占不耐閒人夜亦忙布被烘來煖似湯蒙頭髙卧未昏黄道人不是貪鼾睡省事門中第一方壽昌寺雁山紀逰七首野服掛僧單禪扉月未關桂香清近佛秋色老依山目盡遥峯出歩回流水閒相傳登蕩路數處可躋攀能仁寺過盡盤山險登臨意忽平殿燈揺佛影瀑布雜鐘聲湫濶龍居頂路迴峯換名曉行林日薄海氣接雲生大龍湫深冬雷未蟄雨雹半空飛乆立恠生眼迴看日變暉萬松聲不出尺蜃鬛猶威僧説分流濶長年無旱飢靈巖寺千巖崚骨露隨恠各生形目力到天盡心旌依佛寧夜鐘傳谷香石氣逼燈青崖腹獼猴住多年性亦靈浄明寺入寺嫌僧俗獨行松逕幽夜扉崖室寂齋磬鐵盂秋谷棧雲迷級石溪霜迸流維摩不語坐何日病能廖靈峯寺神功開地秘恠石盡為峯佛界虚空造龍居十二重晴瞳隨境役蟾兎及秋逢却憶謝靈運嶺頭迷去蹤寶冠靈雲二寺夜鐘寥閴逺相聞古佛青山自結隣片石挂空平可渡兩峯侵漢立如人雲歸蕩頂無多路僧住巖根老此身為憶龍湫重迴首來看瀑布獨逡巡劉荆山謁賈秋􅊤鬢絲千縷去衡寒酒放詩豪強自寛天下英䧺從古少人生遇合至今難婚姻債裏抛吟屋雨雪聲中起客单造物與君強徤在歸嚢知有暮年歡素上人圓鑑何須百鍊取晶熒大化非由巧力成所性本來無闕蝕認形却恐未分明寒泉深夜轆轤静素魄中天世界清到此萬緣皆了了笑他拂拭墯纒縈新春感懐五首新春風物舊山川老大情懐亦惘然桃樹不知秦世換落花流水自年年兒女添年暗自欣不知婚嫁逼儂身羮藜衣褐由天分莫負當初種德人自悔中年廢讀書餘生祗可業樵漁青山白屋笑歸去從吾髙眠百事踈新種黄精助晚粮生涯小小掘何妨春風吹鬢不重緑白日笑人長自忙多置田園占好官妻兒奴婢盡生歡貧家有子纔堪教身後窮愁且放寛送亷村宗人薛庭芝薛如晦還里老吾儒冠誤憐君亦固窮山川居壤異友愛所天同江渡乘潮濶霜林逐曉空永懐楸壠敬淹泊志難通郭外隠居自是山林士非因失志餘兒童知稼穡猿寉近詩書曙色浮滄海春風滿太虗固窮須學力不敢廢經鋤趙東郭倅越百指忍貧需逺次壯心銷盡鬢絲知身如韋素居常泰官被聲名折得遲束擔喜聞千里戍出山唯有十年詩蘭亭風月應須記人物依稀似晉時秋日書懐萬事榮枯一聚塵塵中誰是獨醒人壯無學力吟將退老入賢關路轉貧咋夜立秋凉到曉空齋對月静如賔首陽千載蕨薇綠唯有夷齊紀逸民為歸雲師賦野航遇坎與乗流誰能拾迹求即空皆是境大渡本無舟風浪隨機息乾坤任泡浮可憐迷岸者漂蕩幾時休夜坐課子姪㣲風弄孤燭蠶響泣將晨欲辦男兒事當為志氣人簞瓢非外樂韋布只身貧慎勿忘科第務求榮爾親賦王九山滄浪閣千年孺子吟誰㑹此時心方寸有涇渭煙波無古今水禽知雨候山氣愛秋深不盡凭欄意橈歌歸故林省試舟中闕下春光近囊金又一空霜風欺敗絮星斗隔踈蓬世道誰能挽妻孥見未同青燈對黄冊銷盡幾英䧺旅店早起半醒夢猶在擁衾無限情曉牕燈影淡山路雪吟清歳暮羡歸客囊空兼去程故書多廢理驚愧動心旌鮑靖之左藏挽詩一門期負荷太息此生終世道不如古君心誰與同官清餘槖在虞返故堂空作善寧須報悠悠付彼窮下第寸晷場中較尺尋榮親無路淚盈襟一貧誰過簞瓢巷百口難寛兒女心昨夢重圓知誤喜平生失計為工吟近來文體尤趨薄古道何由可語今為槐逕弟賦亦愛廬無私天地情物我豈殊形此事關方寸何人立户庭一琴調舜曲半壁冩西銘萬慮境常適誰能羡獨醒初夏過湖外别業郊原新緑喜初晴一曲湖光㶑灧明幾處樓䑓空鎻鑰百年人物盡丘塋好花自分隨春去惡木寧思擇地生獨念索居聞識寡夜牕長對讀書檠趙東閣奏院去國㠶逺浙江風蓴鱸趣一同無人持國是舉世咎詩窮身退山林重心怡學問充冥鴻離罾繳瞬息九霄空為迪上人賦寒猗山僧受修竹種此出囂塵霜雪不知苦歳時長自春定回閒坐石風過動吟身倘欲求歸止清虚即道真劉荆山過維揚再謁賈秋􅊤扉屨踐淮雪故人師帥歡燈前語疇昔時事又艱難陪宴平山曉尋梅古署寒却歸訪泉石珍重慰團欒山居述懐山瓢動瀑水一枕曲肱清未遇勤求日非沽隠逸名梅邉月在水寒夜酒如兵悟得乗除數貧中心自平本無師住甸陽山庵萬松圍坐石大海浴金輪不識入城路唯脩成佛身出生來虎子持呪拱山神何必工吟苦機鋒自絶塵冬蘭出林詎為晚知我歳寒心不入離騷怨來親氷雪吟衆芳歸槁壤獨榦長窮隂為有幽人致相看情倍深閒居雜興十首亦有入城路門前秋草長荷鉏書在手負鍤醉為卿雲渡溪流澁厨煙樹葉香為貧從儉約猶欠半年粮昔日黄金屋十年荆棘林浮生真亦假世事古猶今電隙無留景雲泉屬自心紛紛蝸角裏朝暮幾升沉鐵硯幾磨研依然螢雪邉薄才遺聖世無禄盡親年多病唯諳藥當寒不識綿素心期淡泊氷蘗誓能堅秋蟲隨響㓕振羽不知疲譬彼附炎士寧思失勢時垂竿動天象定䇿茹商芝投分諒非淺翻然弗可追閉户謝流俗青山獨自看淡交從古少冷面對人難農圃元非學神仙不在丹孤懷無别想回向此心觀四時俱槖籥一氣自迴旋誰謂春風力能專萬物權榮枯忘晦朔霜雪抱貞堅賦分有深淺殊非天道偏已是中年後何當絶悔尤漁樵非始志燈火企前修葉落秋容見巢傾寉貌愁詩窮安敢避天為拙人謀土木非吾事支東復拄西雨盈溝壅葉簷側礎沉泥䕶壁時編葦登樓恐折梯若無憂寇至終歳亦安棲近覺吟無趣權將俗累刪鶯花老眼倦風雨半春閒野服便粗褐紫扉暮掩山片雲尋處泊飛度竹簷間白髪天應棄春風吹不青神仙歸恍惚書傳出英靈周粟豈醫餓湘流難活醒迄今名字在百世仰芳馨潘懷古參學同吟四十過三四常恨詩衘欠一官人事中年多感慨仕途今日更艱難爐亭圍坐推前輩夜店單牀定薄寒最喜親庭佳闕近盡攜兒女入長安亷村族人命賦唐補闕薛公墓一自東宫吟苜蓿吁嗟直道竟難容精忠夙佇危邦慮明哲寧髙避世蹤踈傅有心辭漢陛甘盤無夢佐商宗寥寥千載聞風者引領猶能式墓松何處青山無白骨先生髙節死猶存古今人物一坏土閩浙詩書百世孫郷邑有祠尊徃哲樵芻知禁避荒垣斷碑殘碣堪摩拭慙愧年年宿草蕃潘南夫察院出臺郷人榮其歸拉余迎訪因賦七言囊封朝上暮身擠讒口何如萬目齊昔謂椒蘭試擇地今知蕭艾適同畦波濤不動中流砥風雨難瘖晦旦鷄自着漁蓑厭趨謁晨鐘欣出郭門西早起即事隔水鐘聲枕上聞城中人事已紛紛開門放寉溪邉去衝破閒堦一片雲電眸相士索詩築室漁村五六年湖光山色在吟邉道人不作閒人看浪説前程博酒錢林景雲叅學一門四世同堂樂門外傅呼釋褐歸自此髙車訪逰舊屏將呵從叩漁扉三冬晴暖春寒在千里詩書野意違又説攜琴捜逸譜休嫌古調按今徽王九山提刑於子城西舊宅累石作小阜見示五言因次韻奉呈幽懐隨所寓數石几窗前荆棘倘迷道山林空浩然雲生寧擇地龍去即為淵誰謂達觀士終當違市廛郭氏抗雲樓宴坐羣峯表太空無一塵青山獨徃意白首自由身放寉重霄濶凭欄萬木春紛紛荆棘裏跬歩亦逡巡郭氏遺經堂校讎存手澤肯構烱前光際此聖明代應無屋壁藏半窗分雪影羣蠹避芸香静想趨庭意居然師友傍徐太古主清江簿四靈詩體變江西玉笥峯青首入題舊隠乍違鷗鷺去新篇髙與簿書齊身閒自喜𤓰期逺俸薄還因楮價低撡别正逢寒食日洞庭春渌草凄凄漁村㑹諸友戯呈磯頭濯足動滄浪獨醒何曽與世妨盡冩騷經粘屋壁未逢漁父似瀟湘逺山不離煙雲色流水時聞蘭杜香製得荷衣恐驚俗對人稱是楚賢裝舟别徐太古主簿枌社過從乆新知盡不如素心非必仕此别遂成疎清苦辭藜藿寒暄慎起居川途修復阻相憶𦕈愁予悼張寺丞五馬歸來絶送迎全將漚泡視浮榮宅依林麓樓臺小門有詩書氣味清身後只如僧冷淡墓頭曽是手經營夫人扶疾秋牕下深夜看經帯哭聲瓢飲陳子在病後見寄次韻奉荅聞君卧病長於悒文㑹過從迹頓疎空對秋風驚節物無因杯酒具園蔬柴荆晝揜聽殘雨燈火凉生理故書一啓來緘拜佳什清泠如奉笑談餘棲褊絶句不學踰垣與閉門誅茅先卜逺人村釣魚磯在平如席坐對青山無一言兩宋名賢小集巻二百八十七
