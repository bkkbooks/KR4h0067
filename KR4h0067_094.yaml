body:
  text: 兩宋名賢小集卷九十四宋陳思編元陳世隆補姑溪詩集甘露堂歌炎天熇熇如湧湯使君置酒甘露堂無風但覺冷徹骨坐來髣佛飛青霜使君顧客指新榜天假此應來輝光八十里叟感盛事獻頌請名相激昂我非取専已上報堯仁舜智方當陽邇來瑞應發處處中臺第一彤雲章吾邦雖僻亦影響明德所祐真無疆已而轉眄欲受簡慙非叟比疇能當輒因勝遇強僶俯庶幾擊壤同揄揚吾君之澤不可象使君之惠何可忘才髙名重偶暫屈遺愛他日逾甘棠嗟豫落寞徒自感乍鳴乍已如寒螿安時逐境姑委化隨緣致力聊為鄉時逢載酒問難字未擬持箠操羣羊但知今日不易得縱不能飲須空觴次子椿同君俞三首倦途回首已無牛獨向田間涉半秋倚仗固知同失馬攀援猶恐昧操舟漸逢陌上相推醉尚有空中未下鷗可是道邊無葬地肯將身世曲如鈎西來不復見青牛問遍生涯兩鬢秋但受郢人夸鼻斫豈知蒙叟是腰舟柱頭寂寞千年鶴波面分明一點鷗不向虛中問消息磻溪終老但垂鈎隱隱山林似卧牛紛紛鐮擔喜逢秋虛名漫託三春柳實際須歸萬斛舟未信此生真野馬且將餘日寄江鷗﨑嶇精衛人空笑終恐長鯨上直鈎試郭底泉和韻午睡不覺久起坐獨捫腹眊矂相苦魔眩瞀遂為族永懷建溪春偶爾得藏畜品第雖非貂猶勝狗尾續虛堂無纎塵百轉紛擊築破碾頓愕眙屑紛隨輪蹙被褐而懷璧凡眼真褻瀆聊資定碗黑豈待無托緑久聞城西角有泉堪寒玉名因所居傳亷惠才可僕殷勤持小罌甘瑩來一掬蟹眼方轉旋色味相芬馥邇來棘荆生未易梨栗熟一啜便超騰庾愁空萬斛偶書風吹蘇小門前柳雨暗羅敷陌上桑遙想九江春色晚被花惱得少陵狂白鈐轄席上琵琶青海傳烽沙繞塞謀將櫜戈身不介却携紅袖弄煙月醉笑溪山窮物外文章聲名家世事投筆收功無十載天子幾嗟相見晚暫許南來聊曠快一時賔客多可人坐令五月如深春畫棟潭潭簾半捲濛濛香霧無纎塵雲披霞散爛紅緑滉漾無處投精神秦樓風輕雁初泊玉指如流乍前却捍撥當胸拍屢催一假風光來濩索雖無儀鳯與舞獸擊拊分明諧振躍緱嶺排空午夜涼杳杳鸞吟上寥廓逡巡舞袖回飛雪紅葺毯襯鴉頭襪落花飛絮互繽紛流星掣電爭明滅主人情不已下客歡正濃更邀婭姹持金鍾從來酒户落人後瀲灔不覺隨手空金張燕接平生慣照眼今朝真未見敢辭醉倒菊花偏只恐銀潢低曉箭鈞天一夢固依稀欲問桃源路已迷何時再到紅茸地更遣遊絲惹住伊和人臘日又聽村村臘鼓鳴年豐物阜慶清平星霜陡覺嵗華晚時序祗傷今古情裝景雪花飛點點催詩雲葉亂英英自慚伏臘尤多誤和語煩公仔細評再和仇粹夫曽寄氷綃十幅開竹間紅蘂燕銜來黃筌已厺風流盡忽見詩翁筆下催面面軒楹壓水開暑天端恐雪飛來氷肌玉骨元無汗更倩殷勤執板催和參寥過敝廬留宿因見寄之韻為謝及此仲春月頗欲謝逺步世味久已疏何憚魚生釡青隂合廣除似失北門路端知雞在塒未愧豹隱霧飄蕭方外逰繾綣慰遲暮共待清光來軟語坐良樹呼風破炎蒸扣齒却忘慮逡巡棲鳥驚不記衣上露臨分期屢來此樂復誰與自大乘將逰湯泉道中迢迢山路永漠漠曉風昏雨歇鳩呼婦年豐稻有孫旅懷悲暮齒野飯寄前村只恐今宵夢憑誰續斷魂覺老求詩江南江北久相望常負靈山一炷香會上拈花雖未笑坐中持鉢頓生光投針伎倆空諸有彈指莊嚴自一方何必湯池能滌垢入門心地已清涼答成都侍其純父用其韻鹿頭關下花深處竹馬曽尋綵衣路雖知梨栗是生涯人道風煙如鄠杜四十年來若斷橋問津無計冷蕭蕭一聞此語心先醉似向江邊笋自燒羡君材器森諸有寶帶垂腰今一叟未説常開壇上旗且須再遣雲中守從來别駕不謀身欲作蛾眉會裏人本是文殊親接引定應見處必逢君維揚會張曼老陳瑩中分韻得柳字我生固有地物物皆可口身行半天下薦飽無不有讀書恨未博每索多掣肘一逢可意人似對靈和柳老來益落莫永日類中酒北舟得二妙洗盡平生垢參軍欲陵春記室寒挂斗雍容送落日百衲為斗藪﨑嶇草載餘撇眼自妍醜真樂極胡越詎可論不朽昔人固欣慕僅欲操箕帚堂隍幾千仭未易窺户牖逡巡即千里轉盼百年久一笑且低回朱顔今皓首次韻邦老見貺髙風疇昔在煙霞末路芝蘭屬當家一句轉身元的確千條差路任紛華才疏意廣雖難契語欵情真特見加只恐平明便分手相看更待月西斜白鶴觀白鶴不復見荒臺煨燼餘昔時三茅君鶴駕常相於一嵗許一會此地為寄廬倐然自一境厯攬莫與俱兄弟兩羽人玉骨太古鬚燒丹云未暇彈琴聊自娛日佇駕鶴來夤緣參玉虛身世久已忘况復話里閭謝范守惠鵝玉翎紅觜小池中雙入筠籠寄病翁不是山隂親換得自慙書學久無工得常州感慈邦長老書求詩兼寄鄰老清晨得君書逺意來吳中開緘一見面頓覺百慮空書詞若蕭屑怪我情不通我豈逐物者君亦如冥鴻便當永相忘何計騧與驄聞君奮鈐槌喝下分華戎晚魚會千指一一麻中蓬朝參月破牖暮請燈在籠坐令萬折異沛然俱向東緣契乃如此想見圭璧叢胡為特垂手千里尋龎公龎公無伎倆只這是家風復知多聞師亦在兜率宫人間最勝處何必顔如童會當謝朝謁爛漫遊無窮真師自湯泉相送至石磧遂歸索詩為别流落不我棄如君能幾人寧辭迂驛路且喜慰情親蹭蹬還逢雨因循懶問津尤慙逺相送誰謂白頭新三家店主人勸飲早飲欲過午感此去路遙解衣酒家牀主人喜相招逡巡出餖飣勸我飲一瓢舉手謝殷勤宿酲猶未消報言雪滿野征轡相與聊何如酩酊去更可忘今朝年來頗解官徑欲隨所邀端愧兩槳迎未覺羣心搖偷薄日益窘妙論輕鴻毛何當受一㕓醉到同漁樵華陽洞天洞天名此山于此實第八東將秦嶽連西與岷峨軋磴道端可通足亦若相戞我欲踵其武苔徑特見滑屢試輒復却宛似物所遏周行半天下是等三四閲有無終可疑雷同慙小黠退之固頡頏桃源蓋強説卒謂武陵傳何殊眼著楔孔子亦獵較此理信難輟書長千僧房昨日方得書經年不相見書來必纍幅分明如見面雖同雨千花略不通一線誰云非吉祥便是金毛現雷塘行鞭長不能及馬腹有限生涯時苦促空使後人悲後人雷塘春草年年緑誰知秀色若可餐風光付與初憑肩力殫四海笑未巳眉黛一螺當幾錢君不見黃金棟梁回首蠧漠漠胡沙青冡暮么絃欲斷空自知千金漫買長門賦膏油續盡天須曉石土餘罍可長保就令並蒂永不分也應終恨雷塘草張聖行解官入京僚友餞别分韻勸酒得醇字密雪不著地朔風暖如春天公豈無心慰此東歸人吾人晚相投每見每更親踰年稻梁俱未覺旦暮頻欲識分淺深蕩蕩風中雲問其美如何表裏無淄磷深湛子雲默髙廣太丘真汲汲惜日短奄兹奉離樽莫辭十分斟酒薄情則醇庶幾一舉盡涇渭從此分萬里自只尺百嵗均埃塵行人定向適他年期問津題楊子儀虎圖秋隂報初寒慘慘日遽晚有客自宣城明爽叩昏懶手持兩巨軸六幅從而展披圖畫如生竟軸詩盡選平生説包鼎今日真到眼何止辨騧驪于焉識淄澠愛之不能已欲挂恨壁短猶冀逢他時更擬探深款次韻子椿金陵相會詩濛濛小雨落征帆漠漠煙雲逺近山屬意幾回真入夢欲來常恨澀如灣家程豈復嗟留滯物外何妨且往還便恐都人入圖畫却應難寫是髙間用聖行韻和呈幾仲牢落郊原正早秋書來起我頓風流絃歌韻裏識琴賤鴻鵠飛時逢奕秋極目煙雲來指顧何時談笑共沉浮文章落筆驚人眼新有聲名舊姓侯題韋深道寄傲軒南窗何似北窗涼寄傲來風各有方千古光輝如昨日一時收拾付新堂已驚盞裏醅初緑更覺籬邊菊漸黃就使主人官即顯此間髙興定難忘鮮于子駿用魯直見寄韻因以為謝雲間彼上人處汙能見垢咄咄向風雅入國知溫厚别來仰髙山霜風刮衰顔新詩解人頥調古不可攀練練瑚璉姿森森棟梁氣願學固有歸黯然由此起世味淡于蠟孤懷冷如氷十年問歸路歌舞懷西陵嵗晏感飄蓬老去委瓠落豈無杖頭錢斗酒不問濁尚平纍愈重欲去亦良難安得厠木鴈才與不才間遇君本有地悵我將焉宅遙遙遡家山一望幾千尺何須驚墮葉會當鑒攘雞風來北窗下此况誰為知得璉老莊僧書所報周悉且速東歸既愧其勤因述書語為謝仍約官滿就見故人書報新種畦東臯豆麥稻水西更添莊屋成小築誅茅剃草排沙泥栁插千本竹萬箇雞豚母子羣相携又倚前岡闢場圃更下南泊來鳬鷖兩年課役已似此數嵗漸可如山溪吾師報地適我與胸中瑩徹真琉璃一錢不取力為盡只得一飯仍雞棲我慙汨沒落陷穽眼前差路知幾蹊緬懷吾邦歸未得書來未讀先酸悽本無去來強縶縛亦非顛倒隨傾擠萬衆過眼即他物列鼎既飽均朝虀明年定作一村老非施委曲誰刀圭同熙績姪登有美堂雪晴時節臘窮天湖海光浮萬井煙勝概尚能驚老眼曠懷無復似當年難堪塞鴈終聨翼賴有龍駒特象賢已約一㕓須卜築不妨當此共遷延陶隱居書堂山雲自往來人事久蕭索誰為插小松記此常棲泊坡陀披淺麓窈窕帶逺壑著書方呻吟誰與會所樂鸞鳯耿莫追嵗月儼如昨隱約玉簫聲憔悴金匕藥風來萬籟奏一笑竟難約尚友徒此心相期在廖廓送孫叔靜浮雲無定著乍合還分離廓開萬里天好是無雲時我懷苦蕭屑多感不自持奈何情所親容易成南飛秦人雖愛寶睨柱誰瑕疵空能九賔賞終負連城歸此道固有命如君應未遲且從淮上遊霜濃蟹螯肥載取一樽酒里門相扶携笑語欲難背古人良可期開編若對面謔浪尤相冝皎皎澄漢月森森瓊樹枝燕地重郭隗吳兒輕陸機曉來猶薄露會見髙風披登山未還范景仁以詩見促次韻撲面煙霞曉更嘉偶隨黎杖訪仙家斜陽不見登山屐獨繞長溪折夜花危墻煙際聳層城潮落沙頭眼更明不覺歸舟犯牛斗天風吹下步虛聲腰痛醫者饋藥以酒為使命酒對燈欲飲不能我固不喜酒醉中賞獨賢不辭譏濩落袛恐負妖妍迹類懷沙悴心馳濁世翩空樽聊口誑繼晷漫膏然未分窮投魏長思夜刷燕蛇驚元有影蟻慕本無羶兀坐疑癡鶴忘形已蛻蟬滄溟雖可徑何意逐鯨鱣和州太守曽延之置酒鼓角樓樓臺煙樹接平蕪水墨丹青十幅圖認得黃山家住處雲中相對似相呼同趙德麟宿長河堰僧房德麟適相送至此且約明春再相會有詩見及次其韻涔涔一夜雨皎皎百年心嵗路無多日僧牀有剩衾長卿空滌器季子漫多金賴有綈袍舊春風定可尋毗陵西城樓感懷平臯已春風昨夜猶繁霜倦客驚節物逰子思故鄉樓髙白日促逺日空悲涼願言平生歡各在天一方遡逰不可從山川阻且長安得一樽酒咿啞共深堂孤懷昔蕭屑壯志猶激昂無由契玄旨尚期夢池塘蒼鷹在千里怒鬛存三湘寒鴉似相求依依度斜陽崇壽宫梁昭明太子修行之地鴻禧已不凡崇壽氣尤古經始天監謀餘力保大舉十圍人何在烏鵲尚如覩井泉翳荆棘像設半塵土視今猶視昔一笑才仰俯有愧所坐峯安得參鶴羽石磧朱希仲館榖甚勤因題壁間主人好客久聞名曽約江魚對酒烹邂逅相逢同一笑逡巡不覺到三更屠龍手假元非策畫虎工夫浪有聲便欲與君論卒嵗却憂舟子報潮平除夜小舟中雨不止而作雪寄德麟醉吟今何在寒燈倍黯然却應聽雨夢猶是散花天老境不自得客程誰我憐曉鐘催去路明日又新年兩宋名賢小集卷九十四
