body:
  text: 兩宋名賢小集巻七十二宋陳思編元陳世隆補蔡忠惠集二御筆賜字詩臣襄伏䝉皇帝陛下特降中使賜臣御書一軸其文曰御筆賜字君謨者臣孤賤逺人無大材藝陛下親灑宸翰推著經義俾臣佩誦以盡謨謀之道事高前古恩出非常臣感懼以還謹撰成古詩一首以敘遭遇干冒聖慈臣無任荷戴兢營之至皇華使者臨清晨手開寳軸香煤新沿名與字發深㫖宸毫灑落奎鈞文精神高逺照日月勢力雄健生風雲混然氣質不可寫乃知學到非天真緘藏自語價希代誰顧四壁嗟空貧臣聞帝舜優聖域臯陶大禹為其隣吁俞勑戒成典要垂覆後世如穹旻陛下仁明如舜禹豪英進用司鴻鈞臣襄材智最駕下豈有志業通經綸獨是丹誠抱忠樸嘗欲贊奏上古珍又聞孔子春秋法片言褒貶賢愚分考經内省不自稱但思至理書諸紳乾坤大施入洪化將圖報效無緣因誓心願竭謨謀義庶禆萬一唐虞君任山歸河東風俗憂思深在昔言汾絳之人隠其間白首甘陋巷畢力事詩書豈特專記誦編年作通紀起周迄炎宋甲子二十五迴環補遺空予聞春秋法尊王正一統維持生民綱樹立大邦棟上賢若㳺夏鳥獸於麟鳯三傳自名家講解或失中區區休預徒奔馳困羈鞚排闢侵異端寢久成蠧蟲仲淹著元經劉蕡比奴從去聖日彌逺斯言誰折衷猶勝女兒曹烟雲費嘲弄君于春秋學勤勞務包綜向時恥飛箝畫䇿尚擒縱羌秦負恩徳王師壓秦雍邉圉重瘡痍堪為賈生慟廟堂誅賊謀謂與天下共詔書入巖穴丐告嘉謀貢使者出河東輒以姓名送朅來逰京邑天門如可羾岧嶤雙浮雲下有千人䢇扳緣遂聲利激射苟禄俸蹭蹬不肯前撫心疑愈恐短翮無吹嘘微芳少培擁客舎逼隆冬蕭條殘雪凍悠悠晉溪上水石挂清夢長謡復西歸孤懐不偶衆身窮先節義物曲何時用美田隨意耕寒魚倣經種夜堂素琴横晩案青蔬供决然顧予别蕪音强吟諷持歸傳里閈亦足侑罍甕杭州訪吉祥璘上人追感蘇才翁同賞牡丹曽乘春飲遶花畦花底餘香入燕泥剪處佳人傳燭下歸時明月到雲西重來草樹驚秋色零落交情感舊題若使他年逢勝賞一觴知復共誰攜謝宋評事茘枝伏䝉評事宋文分貺家園丹茘世傳此樹已三百年黄巢兵過欲伐之時王氏主其樹其媪擁樹願并戮巢兵為之不伐今雖老矣實益滋繁味益甘滑真佳樹也因成短章用酬厚意齋館從容接燕申每臨佳樹走觥巡兵鋒却後知神物年壽高來况主人並賞昔聞思故友公嘗言陳太監方諫議及太卿並曽㑹賞分甘今喜奉慈親豈惟特祝公難老兼欲靈株比大椿福州堂下小欄花草多是手栽今已繁盛因賞花有所感悼愛花盡日傍花臺檢㸃當年手自栽前事已隨朝暮變舊叢空見淺深開山禽忽下還飛去溪雨纔收又復來只有春醪能遣恨無人欄畔共持杯登四徹亭偶爾尋幽上翠微逰人啼鳥似前期花間行印露霑紙山下放衙雲滿旗艷艷舞衣朝日處飄飄商櫓落潮時傳杯且與乗春醉身世悠然兩自遺和答孫推官久病新起見過錢塘之什病來安健賦詩誇甲子新移一嵗加吾道所存惟浩氣世緣何著但空花烟雲已過同歸鴈楊栁初藏並宿鴉便擬尋山逐幽趣春泥隨馬不須遮和偶登安濟亭津亭遙望草萋萋空曠清懐與物齊春水倒行潮欲上晩雲平壓日先低高城覽古人何在逺渡傷人客自迷好共山翁同出處不隨朝騎五門西和新燕燕燕何來處處喧新從海上振輕翰早飛不避春泥重並語應愁夜雨寒客舎暗窺吟筆健宴堂暗見酒杯乾雕梁信美多移主願爾將雛擇便安寒食西湖山前雨氣曉纔收水際風光翠欲流盡日旌旗停曲岸滿潭鉦鼓競飛舟浮來烟島疑相就引去山禽好自由歸騎不令歌吹歇萬枝燈燭度花樓羣玉殿賜宴臣䝉恩宣召再至龍圖閣觀書羣玉殿曲宴伏以數千年間無此盛事臣忝職翰墨榮遇非常謹賦拙詩一首備載本末上干聖覽無任戰越之至治道承炎厯皇基亘萬年深仁涵海嶽至徳著坤乾文物歸元首臣鄰悉巨賢蓼蕭思及下奕葉力追先昕色方羣進臚音忽四傳衣冠紛雜還臺殿鬱蟺蜎嘉祐七年十二月二十三日詔宰臣以下龍圖天章閣觀三聖御書寳字藏三聖瑤圖秘九天榮河祥氣徹昭漢曉光旋磊砢珠璣在峥嶸歲月遷家聲終卓越上意益恭䖍書觀開鋪首又幸寳文閣作飛白字召臣僚觀人賜一軸兼賜紙筆墨各有差宸毫落彩牋烟雲初不定鸞鳳互相鮮拜賜兼金重珍藏尺璧全人人皆自得事事獨超前睿藻敦風教賜御詩一首令羣臣次韻和進㝠捜出化權來從玉山府逺過栢梁篇迴馭臨高館賜宴羣玉殿推恩錫廣筵迷魂逰帝所休應動星躔申命嚴樽爼二十七日幸寳文閣召宰臣以下觀太宗㳺藝集瑞物十三種仍賜御書宴羣玉殿宣諭太平無事令羣臣盡醉新章被管絃千齡叨際㑹曕古絶夤緣大施難論報精神第祝延惟應歌盛美樂石可磨鐫陪尹子漸申安禮宿香山寺二月已强半尋春登石樓山光侵雨變草色到雲休歸鳥沈巖際行人過樹頭剥苔看石碣因火認漁舟漸夜灘聲怒憑虚屋勢浮乗閒聊自適觴詠屬吾流逰龍門香山寺彩閣縈林轉蒼崖隔水開龕明千像日波起一灘雷緑淺春前草香餘臘後梅背人驚鷺去將雨好風來雲氣隨衣袂嵐光入酒杯清逰知不屢欲下更徘徊登府店福昌山閣危磴通高閣登臨境迥清雲開千岫出雪霽一川明斷雁來孤影遥泉落細聲野烟依竹見溪樹與橋平已助騷人思空揺逺客情扁舟如可泛歴歴是江程登三鄉寺閣歴覽宜陽道披軒臨朔風地宜塵世外人在畫圖中巖曲疎鐘荅村前小彴通水烟寒更白山氣曉微紅逰宦真浮梗流年似轉蓬長懐無所寄盡日送歸鴻十日西湖晩歸清晨出閣又斜曛已見空枝嫩葉新争得山頭能閣曰且容湖上不歸春人隨百戱波翻海酒到三橋月滿身三橋乃西湖歸路月中飲於橋上只有牡丹纔半拆未知何處可娛賔和孫推官憶徑山逰三十年來浙右行徑山纔稱愛山情油幢𢥠𢥠絲杉翠五山盡植絲杉環珮涓涓石澗鳴遶寺流泉極峻只疑天上逼遥臨初覺地東傾分符不得重逰賞喝石巖邊記姓名舊有記鑴喝石巖和運使學士芍藥篇宻葉隂沈夏景新朱欄紅藥自為春香於蘭芷偏饒艷畫入縑綃未逼真已恨芳華難駐景可堪愁卧動經旬三年想愛須留戀不為江頭酒未醇伏承躬俟安輿出逰煙霞洞拙詞奉呈運使學士新晴特地入煙霞道並南山轉更賒幽磬過隣溪口寺衆雞鳴午野人家洞深垂溜先如雨石古籠藤亂放花潘岳小園猶作賦輕軒選勝樂無涯中秋夕獨坐望月萬里凄凝魄幽深在處通清流河漢盡寒入水雲空踰久方全白彌高適正中開書還自巻把酒復誰同泫葉漙宵露吹衣變暑風更看庭樹影漸過粉牆東自漁梁驛至衢州大雪有懐大雪迷空野征人尚逺行乾坤初一色盡夜忽通明有物皆遷白無塵頓覺清只看流水在却喜亂山平逐絮飄飄起投花㸃㸃輕玉樓天上出銀闕海中生舞極揺溶態聞餘淅瀝聲客罏何暇煖官酤未能醒薄吹消春凍新陽破曉晴更登分界嶺南望不勝情城南春會隂雲薄薄地無塵清曉城南集畫輪睢苑即時裁雪霰潁川連夜聚星辰山眉帖漢晴光擬鶯舌尋風碎語真芳草有情迷謝客落花無處問秦人樽前莫厭歌醒耳世上偏饒淚滿巾嘉意未闌繁盛減東皇底事惜殘春離錢塘迎潮小舸滿旗風迴首津亭暮靄中惆悵今宵歸去夢迢迢直至海門東嘉禾郡偶書盡道瑶池瓊樹新仙源尋到不逢人陳王也作驚鴻賦未必當時見洛神閣下晝眠急雨初收宫殿明紅薇花落暑風清忽傳午漏驚殘夢寂寂西軒喜鵲聲泰靈院書事二首檻外珍叢砌下泉祥符天子泰靈仙忽逢野老臨池水自剪殘花趂歲錢上元天仗欵琳房靈圃遥傳玉殿香要識年年桃李色不關春力是恩光泉州北藏院見初荷華初花纔過小荷身曉露霑紅㸃㸃勻莫為愁心偏倚重清江元有未歸人梨園小部梨園法部更置小部音聲三十餘人帝幸驪山楊貴妃生日命小部張樂長生殿因奏新曲未有名會南方進茘枝因名茘枝香傾宫晨起傅輕粧山殿生風夏日長小部新聲落天上無人知是茘枝香永叔示及聖俞酬答因奉和寄聖俞吾友多稱君思見寒附火氣温玉開籍才敏鏃加􅩮嘗於師魯書言詞屢及我乖疎久益新慕合迎已可奈何縻組綬無路動車輠近乃得百篇能詩今信果清寒水石舂怪險蛟螭鎖逺念烟鴻去呈妍露葩娜古人雖已矣風流未應墮束來勿後期山桃綴紅顆送胡武平出守吳興東南有佳士文高志清苦翩然請郡章入居使君府霅水生春瀾瑩靜沙可數霽日明旌旗長風送鐃鼓烟帆十丈船湖山一抔土橘嫩宴亭秋茶香齋閣午神歡所適宜動黙造幽覩應念懐鉛人垂頭證魚魯陪諸君會史館園名園霽宿雨春日正和柔花香泛草際竹影揺清流鳴禽自往還逰魚時沈浮出門市朝喧愛此林亭幽况陪君子讌飛斚更相酬亦有佳人攜艷歌清眉愁佳人足娱適逺思何夷猶故鄉去千里野堂臨溪頭夢寐别四載南望無時休王粲昔從軍登樓以鎖憂今予豈不然每到終遲留寄題滁州豐樂亭君為滁上守乘閒務幽尋羣從留山阿美望窮前林良讌追佳賞高亭曠遐臨烟雲無定姿水石惟清音静見魚鳥適遥聞雞犬深時節屢豐有民里無欺侵豈獨延衆物因茲託冲襟大筆每絶唱芳樽寜孤斟别日念已長來期詎能今安得凌風翰相從殫歲隂達觀亭峭峻釣龍石飛亭壓其端曠徹四無際因之名達觀扳雲躋大庭仙路何紆盤秋明澄逺緑署霽凝新寒城郭煙火稠水陸漁樵安偶暇按民俗適逰心意歡鳴絃俯清流對酒環蒼山重拂衣裾浄從帶石嵐還聖泉竭十餘年今者復溢俗傳熯則民安源流出何山湧涸兹有異湛然盈石泓餘波下金地清甘本無滓渴飲得真味端能發茶色博亦資農利矧兹民俗安湓溢尤可熹滿酌復擕歸良追曲肱意北苑十咏出東門向北苑路曉行東城隅光華著諸物溪漲浪花生山静鳥聲出稍稍見人烟川原正蒼鬱北苑蒼山走千里斗落分兩臂靈泉出地清嘉卉得天味入門脱世塵官曹真傲吏茶壠造化曽與私亦有意所加夜雨作春力朝雲䕶日華千萬碧玉枝戢戢抽靈芽採茶春衫逐紅旗散入青林下隂崖喜先至新苗漸盈把競攜筠籠歸更帯山雲寫造茶其年改造新茶十斤尤極精好被旨號為上品龍茶仍嵗貢之屑玉寸隂間摶金新範裏龍鳯茶八片為一斤上品龍茶每斤二十八片規呈月正圓勢動龍初起焙出香色全争誇火候是試茶兔毫紫甌新蠏眼清泉煮雪凍乍成花雲開未垂縷願爾池中波去作人間雨御井井常封鑰甚嚴山好水亦珍清切甘如醴珠幹音韓持方空玉甃見深底勿為先竭憂嚴扄有時啟龍塘泉水循除明中坻龍矯首振足化仙坡囘睛窺畫牖應當歲時早嘘吸雲雷走鳳池靈禽不世下刻像成羽翼但願醴泉飲豈復高梧息似有飛鳴心六合定何適修貢亭予自採掇時入山至貢畢清晨挂朝衣盥手署新茗騰虯守金鑰疾騎穿雲嶺修貢貴謹嚴作詩諭逺永憶丙子年春三月予解官漳州與弟君山西行至順昌富屯之間夾溪十里紅白薔薇盛開時與君山臨流飲而賦詩甲申夏四月二十日復來追悼君山之亡留詩屋梁以紓哀思清溪曲曲抱山斜遶溪十里薔薇花春風吹香襲人骨乾紅淡白相交加眼睛眩光未能視爛如赤日凌朝霞時有扁舟向中下共疑來處從仙家于時邀我臨流飲下踞大石盤犬牙平生意氣一快論屈指世務還驚嗟酒酣擘紙探彊韻胡塗醉字成亂鴉侵更把火入官舎下馬猶吟詩各誇何言花落悲人世只見溪流似歲華今年初夏我復至深叢翠艷餘孤葩山川故物依然在惟子别路幽明賒想像音容杳何許桂旗獵獵隨雲車悲來獨坐䕃芳樹涕淚揮洒霑黄沙行人怪我愛溪水那知此恨無邉涯寒食梨花小飲江南寒薄春常早花卉入春先自老嗟予衰病不及時出見池園半青草縱有餘葩在葉間行看落片隨風埽尋春已過索寞歸重憶歡娱歎懐抱雖然妖艷難再得但只逢花須醉倒二月中天寒食朝牆隈忽見梨花飄開門四顧粲然白傳催翠帟賔朋招長吟環遶不知數漸值明月臨清宵誰剪輕雲成碎蕊天留宻雪封枯條重重盡挂珠纓絡簌簌初呈簂歩揺傍花行酒發新唱滿座例舉黄金瓢西都姚黄高一尺揚州寳鬢分變翹幽香絶艷信尤物設欲致之千里遥壁門寫生亦名畫未免五彩塗鮫綃莫如此君慰人意相對一笑開無憀古來英豪多感激坐使緑鬢朱顔凋勸君且作梨花飲慎勿稱量别流品李山英以疾歸田客有言山英移書石守道者因摭取其略作詩以送之吾友守道氣剛勁醜邪扶直出天性意高身賤無所發胸中事事先後併襄嘗畏其太勇果願以中直為得正忽聞魯士李山英移書告之要力行曰今天下最急務邉頭戰守羌夷横異術紛囘蠧化原佞夫欺巧疪邦政生民失職餽斂繁勢若久旱方雩榮安得快雨洗長空萬物蕭森蒙大慶古人有以身殉言前者已僵後者更况值朝廷尚寛大苦諫兼容天子聖我疾不幸子可屬或列封章或廷諍勿學得路世俗兒軟語妖歌日酣醟乃知山英落落者支革雖疲心愈競予思物理似顛倒難用智愚凖衰盛賢豪既少遇又稀或老且困壯而病就令貴顯亦迍躓尤觸隂機石臨穽一思九歎起呼天何等官曹司是柄由來宰主都㝠㝠用舎惟時窮達命山英歸去亦何恨門外無塵春色净回看名宦似浮漚都把雄心付觴詠聖泉寺松徑徑中草不植青松冉冉門前道根柢堅牢顔色好鳴籟蕭森風雨生紫鱗開動龍蛇老天若有意别留種百年其下無纎草雷霆時遶雪霜重勁節支扶不顛倒野姿峭拔已背時肯要藤花彊纒抱南方赤夏苦蒸濕萬木無聲就僵槁忽經宻䕃少休息肌骨便驚秋氣早寄言匠者勿復顧留作清凉除熱惱送石昌言知宿州符離封城古云望扼控東南地形壯飛流金粟走車舟鎮壓奸雄宿兵仗昌言才思老臺閣聲名逺出風騷將倦直承明得守符詔書遣臨士民上萬家裁製須得宜譬若楩楠迎大匠京師從逰日月久送君酒酣益惆悵人生豈效雞鶩羣意在糠粱取甘養邊隅多故急賢材往往稠人拔公相吾儕有䇿空自竒皎皎丹衷亦誰亮欲隨戎馬僅勝衣强作文章還覆醬大都用置繫於時丈夫未死固難量觥巡巻到君勿辭行看岸下船頭放我今聨束若愁鷹注目青雲思逺颺一麾當復泛隋渠願君加數為公釀甲辰閏月初伏快雨凉風晝眠初覺庭前小欄花木各有意氣戲效柏梁體閏夏天氣熱燄烘崇朝快雨隨清風晝軒夢覺開前櫳畫欄花草意氣雄側枕遥問數異同如子微物煩化工盍各言爾之所從繁葩富艷生朱紅川海棠枯條大蕊千萬重絳桃修幹㸃綴赤日中蜀葵蠲去憂忿誰與功萱草採摘烹煮祛煩胸百合秋霜鉅實垂如甕木𤓰横柯逺引交加叢紅玫瑰葉抽緑劍黄端茸山薑直立開披泉貨通金錢疊遶翠羽翻虯龍薜茘誤入畦町非余公頃麻助滌渇肺思匪躬麥門冬物物自名詞不窮願當我意乃汝容負汝不飲慙衰翁和王學士水車星鳥正中春事茸農夫入田布嘉種田中白水極瀰漫鷺翅羣鶱魚鬛聳扶持水車倚塍畔翻翻龍脊起雙踵日在天中人在野脱粟未逢心益恐婦姑晩餉猶徳色童稚飼餘窺饁籠夏苗欲長苦焦枯又送微波上層隴傷哉作勞無早夜嵗終贏餘凡㡬桶音甬秦斛豐年遺秉尚盛歉一有不登皆散冗賦田無利從來逺索息嚴於供上俸富者不耕耕者飢役民𣙜枋雄豪總錢塘風俗本夸奢工商射利尤加勇丁男恃壯走長街僕奴意氣金銜駷方春逰女湖上行舉首惟愁釵挿重笑汝田家弄水車何不乗時作光寵仁宗皇帝輓詞二首聲教中原泰恩仁萬國臨憂勤符帝夢付與得天心簫吹凝寒氣雲山斂夕隂還期千載後歌頌莫知深儉勤追禹績恭讓體堯仁措枉朝多直除苛吏盡循尊儒恩禮異左戚賞刑均立子知天意超然即上賔開州園縱民逰樂二首風日朝來好園林雨後清魚㳺知水樂蝶戲見春晴草軟迷行迹花深隠笑聲觀民聊自適不用管絃迎節候近清明逰人已踏青挿花穿㦸户酤酒向旗亭日迥林光潤風迥海氣腥未知何處樂歸路已嚴扄夜雨病中久雨曽無度陽和漸向闌雜香生衆木濃翠入孤巒漏緩宵仍靜燈微曉更寒芳時猶卧病何日出城看太湖驛寄建州同年竇職方别驛臨溪曲清寒結曉隂灘聲生亂石急雨入閒林登第年華久相逢禮愛深茶山春物近那得共追尋逰靈峰院龍龕山天柱支南極蓬山壓巨鼇雲崩石道險潮落海門高客館聞鼉鼓秋風憶蠏螯凭欄望鄉樹千里楚江臯北園登高即事呈諸同僚江雲寒薄不成霜九月登高菊未黄飛鏑有聲弓得力小槽分溜酒初嘗秋容行見丹楓老客意難勝紫陌長時被召還都曽是禁園風物好故鄉時節可能忘重陽賜宴外園燕司封同年以詩見迎寄問閩州明使君十年蹉跌路岐分帳前約束承嚴節福州乃泉之轄案下文書接署雲隔政知福州北去最先趨畫㦸老來應免醉紅裙新編一覽空懐舊搔首孤吟日又曛人日立春舟行寄福州燕二司封清溪潮上送行船回望高城隔曉烟景色似看名畫展前過君家盡出名畫醉魂猶憶壽杯傳君家世傳壽杯行之侑觴春盤食菜思三九人日幡書頌百千南國逢君惟道舊後時何處笑今年過楊樂道宅西桃花盛開城隈遶舎似山家舎下新桃已放花無限幽香風正好不勝狂艷日初斜自憐馬上空愁望誰向尊前與醉誇京國難逢春氣味莫隨塵事度年華和楊龍圖蘆鴈屏何事高堂秋思生野蘆寒鴈畫工精風前挺立孤根老雲外相從去意輕不似丹青能借色若逢霜月定聞聲研桑心術多無取囘望江鄉計未成和楊龍圖麞猿屏畫莫難於工寫生麞猿移得上幽屏相逢平野初驚顧共逐薫風適性靈引子晝逰新草緑嘯羣時望故山青可憐官省沈迷處毎到中軒頓覺醒和吳省副北軒湖山之什誰於素壁寫江流雲樹疎疎映荻洲盡日清虚全却暑一川揺落似經秋暫逢名畫心猶在終向扁舟老去休只有逰鰷能自適莫懐香餌重遲留送程刑部出守洪州何事名郎出計臺鍾陵都會久須才江山不是人間有旗鼓初従日下來列郡五符歸總制故鄉三組少徘徊勿嗟南國多懐感寳氣還應徹斗魁送錢端明還京禁墀初别紫霄端故國生光里俗懽二世家聲聨將相百年廟貌儼衣冠躬臨州㦸迎門下每至州廨客次下馬人喜曽孫夾道觀石照老苔封舊迹錦溪喬木涕清瀾東趨越嶺興懐逺夕聴胥濤入夢寒江上馳心思魏闕日邉歸路指長安香深離渚花重叠凉滿行舟酒半䦨應念非才持虎契平時相繼侍金鑾度南澗隱隱飛橋隔野烟石磯西畔問漁船桃花盡日隨流水洞在清溪何處邉秋日城頭蔓草受新霜天外孤鴻叫夕陽送客懐情楓樹老著人襟袖菊花香玉仙池洞府花飛不减春輕雲成片玉成塵香軿縹緲知何在無限池頭再拜人逰九鯉湖何嶺巍峩欲挿天回頭人與白雲連桃花不㸃尋常路從此依稀度九仙兩宋名賢小集巻七十二
