body:
  text: 兩宋名賢小集巻一百四十九宋陳思編元陳世隆補盤洲集巻中謝景高兄惠魚蠏霜風激水蟹舍寒漁火獻俘清夜闌不烹五鼎若賖死使之骨醉尤加餐尺半之魚鱗六六同入糟丘隨小牘鼎來兼味口流涎可使盤中食無肉潯陽從事姿南金高山調古誰知音寧同娵隅作蠻語生憎郭索多躁心檐頭雪消春有意洗琖開尊宜一醉持螯頗憶左手同尺素不妨時遣使送唐左史紙墨黃山竒峯三十六聳壑壽松多節目真工曲突埽芳煤介圭拱璧陳𤣥玉浙河千里兹濫觴萬榖之皮搖氷霜肌理細膩色白晳蜀網剡藤難雁行使君來自岷峨麓曾賦客卿朝奏牘細字不作蠅頭書高文富有牛腰軸向來平歩第一螭勇退宛在番之湄陶泓毛穎幸旅進快冩元和聖徳詩次韻董伯魯讀破羣書有逺謀逢時便可動凝旒不辭巖邑千山險可作鈴齋十日留耕舌未容蠡測海歸心己夢蝶為周松門萬一逢佳友為説相如故倦逰次韻黃子餘惠雙井茶二首荻花風葉醉為鄉每憶臨分一鼎香枉費光隂驚老大略無治行媿循良歸心來徃雞豚社清思消磨雁鶩行且喜絃歌餘樂地好詩句句挾風霜峯橫萬仭臨雙井調䕶旗槍春怕深白雲有第鷹作爪黃粱無夢蝶何心聞名可信非虚語知味端如賞好音秖欠谷簾一杯水未能相就盍朋簮次韻程觀過山城寂寂簿書稀梅際春風一夜歸忽喜烹魚中有得恍然揮麈久相違折腰豈愛蘄州竹問漢須尋織女機竒絶黃山待佳句何時小雨濕征衣詹氏仁壽軒修竹林林貫四時龎眉扶杖到期頥子孫長憶當年事留取軒楹客賦詩闡陽驛二絶句略略春晴天亦慳雷驚雨作轉頭間浮雲又逐東風起不見前山出髻鬟觸石泉聲高下聞曾將兩耳洗埃塵相逢尊酒今誰侣細草青莎是故人次韻施徳初逰齊山詩塵誰復數齊梁小杜文章楚大邦曾為黃花酬九日至今陳迹擅三江新亭髙下依喬木逺岫參差進曲忩著履與君時茗飲後車何必酒盈缸花信亭解報花消息江邊有好風吹香四時别問訊幾人同梅塢難藏白桃蹊豈借紅但能長撿挍定不酒樽空次韻馬上偶成天遣祥風掃塞氛越疆軺傳禮儀新禦戎可鑒秦無䇿覘國誰夸鄭有人鳴鶴九臯聞徹響翔龍千載仰攀鱗垂鞭日日陪清話談笑成章泣鬼神寒食遇雨殊方遇寒食節物負年華小雨偏宜栁輕風未落花見餳如隔嶺對月共忘家俗重子推廟誰祠萬里沙次韻得保州老張瓦硯毛頴傳既成陶泓名不朽陳楮接武來論交篇籍囿千年銅雀臺瓦解淪坤厚何人澄其泥頗能彷彿否龍公天上人金蘭幸同臭結束萬里行聨翩五旬久清談落玉麈痛飲盡金斗咳唾璣珠粲揮翰不停手窮邊得佳硯可出老吕有瓦缶莫雷鳴龍尾羞牛後次韻楊花二首桃花開落不同時燕子銜泥相伴飛若向章臺問春色可無清淚濕征衣官路風輕落絮迷望中高下襍㳺絲糝氊擬雪春無際只有騷人早得知次韻中山雨後好雨連宵鳩喚晴曉行襟袂有餘清逺逰朔塞殊風景夢到東阡看火畊紅退桃溪三月晚緑添麥壠一川平纎塵不逐車輪起喜聽驅驢叱馬聲陳留聞鶯恰恰啼鶯馬上聴凝雲欲雨曉寒輕滿郊碧草皆春色祗欠山光與水聲南京道中密葉成隂行路寛鳩鳴鶯囀足開顔半塗泥滑夜來雨數片雲飛何處山薄暮每尋尊俎共殘春能伴節旄還塵襟好濯西湖水偷取禪房一日閒竒别景盧禹穴遺書不可尋坐看緑葉冄成林千巖競秀非吾土三徑就荒勞我心誰是周人思召伯今無老叟出山隂台堦穏上添花萼時倩來鴻續好音次韻景盧野處解嘲之什地偏不接市塵聲古木參天鶴唳清臺榭迥窮千里目詩章突過五言城花移瓊樹真無敵酒换金貂未足榮燈火歸時笙管作解嘲何事有歌行答景嚴向來戎馬沸邊聲曾出良籌助埽清六載倦逰潜楚澤一枝同折記欒城北門西府仍班綴後雁前鴻媿寵榮兩鬢星星吾老矣看君重上赤墀行送朱叔召歸吳中長憶吳中鳴櫓聲風高月上水波清臞菴掩映花成聚笠澤㣲茫烟若城十載相忘成夢想一帆此去喜歸榮老來無復蓴鱸㑹尚看驊騮得路行隆庭竹至四絶句憶昨分抄種樹書三荆今古美同株閒將草木供詩戲待把漁樵足畫圖竹里巧傳幽鳥語月臺高視客星移鄉園何幸三分鼎鳴鼓鏗鐘樂詠詩斑籜逺移湘岸種猫頭亦是渭川孫百金得諾金無恨千畝封侯不在言裝景松篁渾可喜忘機鷗鷺不相猜南忩情話有時盡喚取青州從事來答小隠惠山茶何處仙官萼緑華鞭鸞獨御五雲車來從月窟曾依桂分種盤洲不碍茶枝耐嵗寒犀换葉蕊藏朝霧錦羞花紅顔不逐東君老須著頻來鬬臉霞答小隠聞野處開尊遺我雙魚集棣華尚疑信馬誤隨車絲聲自是不如肉酒薄須知大勝茶翠袖明朝看倚竹蘭燈昨夜報開花飲闌獨歩曾臺月古堞危亭見綺霞園中觀種樹望中赤葉漬霜華林下徐行便當車好處見山仍見水興來呼酒不呼茶旋移朱橘添盧橘更揀紅花間白花出郭最欣塵事少飽看孤鶩逐飛霞答景盧咏道上新松落落喬松說九華逺移霜骨想專車淪脂此地能和藥結實殊方却入茶村女拾釵分翠葉野人敲粉聚黃花翛然一徑窮芝嶺曉見飛雲夕見霞野處送百結花盤屈枝仍墊葱青葉不稀雙銜疑鳯帶百結類鶉衣弱骨長連鎖輕腰孰解圍若教花自在應作綵雲飛和景嚴咏冬開木犀桂枝冬更好浪蕊到今稀雅韻催吟筆幽香傍舞衣月缺影風突百花圍倚䇿山亭暮寒鵶亦倦飛和景嚴約賞木犀簌簌蟾宫桂冬開自昔稀犀通一㸃骨密染六銖衣樽渌拚深酌爐紅漸可圍賞花宜卜晝莫待曉霞飛許倩遣舟送花栽雙舟十日渉長湖甆斛筠籃且百株可喜石榴初變白更驚玉茗不施朱臨風含笑勞花使映水分行擁木奴裝㸃園林娛杖屨好來一醉倒金壺侣鷗亭憩策新亭上波光入座來魚逰能自樂鷗狎肯相猜風爽塵襟豁雲深俗駕回尋盟須日渉未怕落霞催小隠芝草芝叢盈百見聞希不數嘉禾連理枝紫蓋堆雲光㸃漆金莖䝉露色凝脂一時競秀園林勝十載深藏天地知急辦軒楹尊瑞物泥封詔墨有來期紫薇花以六月至自溧陽在道已五十日今有花滿樹因示二弟六月炎天千里移不期繁蕋便盈枝向來渾是西垣客憶得看花草制時九日欲為雲松之集以病倦而輟半秋翻藥裹九日負雲松黃菊從他好清尊不我同零丁憐敗葉旁午羨逰蜂今古登臨恨雲迷五老峰景盧約賞朝天菊不克徃暮節真無分頭風秪自知朝天雖有菊向日不如葵久旱千株槁深秋百草萎吾哀亦相類飲興謝東籬觀園人接花植杖看園吏揮斥接果栽奪胎移造化類我借根荄一似雀為蛤能令桃作梅天工待人力信手便春來雪後逰盤洲書事斜川日月同行年過四逼衰翁縱情自洗和陶筆乗興誰開訪戴篷梅萼僅存難聚雪竹根未穏不禁風莫將野趣逢人説水上輕鷗西復東上元日圃中歸春風環栁岸夜雨失沙痕剰竹期新笋移花䕶舊根身閒貪獨樂舌在戒多言是處無燈火荒涼一上元次韻梁憲盤洲之集輕風吹雨稱行春丘壑盈懷我輩人照水軒忩如進艇穿花旌節屢移輪攜壺迭講三杯酒揮麈曾無一㸃塵明日兵㕑尋故事已教園吏拂華茵再和於越歸來三見春買山學圃狎漁人非嫌厚禄輕捐印所畏空餐詠伐輪時運可驚如過隙人生何苦不同塵明年此㑹誰重講唯把書郵問鼎茵次韻梁憲再集盤洲春風歩屧共優㳺自喜園廬匪拙謀羅列清樽資笑傲安排好語待賡酧茸茸香草裝三逕恰恰鳴禽想十洲玉節尋盟端不再便回天上近凝旒送吳逺澤赴南宫文壓秋闈擥桂華一鳴天陛穏乘槎歸來須踏盤洲路要看荷衣醉藕花九曲有感忽忽光隂轉駸駸華髪添迹陳三可歎心賞四難兼嵗三日挿栁欲教垂栁匝池臺尋覓長柯處處栽待得成隂身益老攀條能有幾番來朱叔召遺文官花不用風人怨緑衣身兼魏紫與潜緋司花直為文官地寧忍春葩一片飛解褐方聞上玉除寵光轉眼叠金朱大夫不博喬松貴加橘千頭也作奴次韻景盧賞梅曲塢梅藏白東皇解出竒不嫌歌板閙直與酒尊宜倚竹盟三友凌風粲一枝清標何水部千古説能詩三月十六日龜巢觀月渭師攜寵同賞後兩日大雨復作景盧有詩同其韻潛鱗故故上鈎遲翠袖憑闌自一竒半夜醉歸閒有趣一年春晝事多宜盍簪何憚冄三瀆覽鏡堪嗟六十癡巳辦尋盟臨斫鱠不將可否問蓍龜四月十三日流杯寄渭師今年無好雨曲水未勝杯誰伴山翁醉難令俗客陪青苔迎馬入緑栁送鶯來縱步濠梁上垂緡更樂哉流杯同景裴韻三春少雨未行觴槐影交加更漏長半夜水來山㵎滿四簷竹密酒樽涼新亭方作龜巢葉畫棟何妨燕語梁滿飲三觥拚一醉老來真個惜時光庚子山居採茶有感憶昔采茶時雨後山蹊濕鷹爪喜盈襜蟹眼思朝汲歸路取盤洲下吳行踪急珠汗透裳衣更换登梯級徙倚曲闌干鳴雁圓沙集晚景不勝春寒氣潛相襲詰旦傍粧臺歌側人扶立輿疾望醫來請煮青黏汁舉案念齊眉幻泡何嗟及重過故園門不忍攜筇入引領顧前丘空對旗槍泣兩宋名賢小集巻一百四十九
