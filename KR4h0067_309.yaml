body:
  text: 兩宋名賢小集巻三百九宋陳思編元陳世隆補漁溪詩藁江上江頭雲閣雨桞色與春深船發春風阻誰知客子心居閒富貴人所願貧賤不堪憂自有蘭蕙清非比蕭艾羞功名如露草飄瓦若虚舟千載倘相遇臯䕫及伊周茍使窮未達一壑營一丘出處謹吾節斯心已細籌古意無言情脈脈美人久相隔道阻修且長春草幾畨碧鳳釵冷鬢雲鸞鏡輕雲羃昔為比翼鳥今作孤飛翮愁絶寄郎衣腰痩裁宜窄春日即事羲馭舒徐日正遲園林已覺杏花稀半晴半雨春無凖燕怯輕寒不耐飛即事薄薄輕輕寒露雨微微颯颯早秋風小舟辦了松江去占取三高作釣翁賞月天淨無一雲地淨無一塵十六月圓滿皎皎白玉輪古今同此月照破世間人夜久方浴出露坐風滿襟清影入忩户聊足慰我心所欠一尊酒所乏一張琴如此好月色惜乎在海濵癡兒官事了空自疲精神不得賞新月酬酢相與頻今宵詩興動狂吟漁溪民獨對猶復爾况逢親共賔採蓮曲畫艇將歸笑語頻鴛鴦對對起還沈妾心先自懐郎苦怕嚼蓮心苦轉深靈隱回首得兩年曾入靈隱去一路看不足衣霑松上露白雲来相迎澗泉飛瀑素此景天下無遠勝廬山路種竹門前槐已長庭前草自生所欠園中竹多種渠幾莖此君真可愛非獨王猷情有時吟詠暇入園得閒行所幸筍萌出次第陰可成頃使神宇爽漸覺眼界清最是秋雨夜風来簌簌聲春暮寄友人日暖棃花雪風吹楊桞綿春踰三月半夢憶十年前詩借鶯聲和書無雁字傳東君還似舊吾鬢歎皤然即事吹落楊花春事了小池新緑雨添痕育蠶時節寒猶在村落人家半掩門初夏薔薇花已謝芍藥擬下坡午陰有嘉樹景序猶清和日得詩篇詠門無俗客過笋胎今歲少荷葉小池多春去餘旬日夏雲已嵳峩吾年嗟老矣身事笑蹉跎但欲卧白日幽岩捫青蘿已與心料理不必問如何次下竺僧韻朝市軟紅塵山林氣味深放懐隨野鶴過耳任春禽石澗鳴泉玉松釵墜日陰隱居無箇事存養讀書心江上小雨纔收日漸斜酒旗挿處兩三家江頭粧㸃秋来景半是蘆花半蓼花秋日芙蓉未拆桂香浮落日西風雁過樓一雨空階深夜滴十分秋是十分愁偶成吹来一葉報秋知玉露金風正及時戴了涼巾披野服桂花香裡看唐詩秋行吟西風𦂳兮葉脱枝寒露瀼兮菊遶籬蘆花白兮蓼滿湄雁聲急兮蛩轉悲樂吾淛兮殊興思况東淮兮落逺陲朝氣肅兮夜漏遲暮雲黯兮山色衰紛紛眯目黄埃吹艱闗千里徒驅馳窮猿投林任所之膏梁諸公那得知從今休被微官縛未若琴歌詩酒樂豈無手足懐我情當念行人多寂寞習氣習氣於詩却未除儘教人笑治生疎功名若到窮吟地雖是居貧富不如即事暑赫練襟汗欲流倩誰喚得一天秋無人共訂吟邊句獨有蟬聲呌樹頭平湖平湖一景堪圖畫舟子烟波去復歸舊日元真無覔處西山長見鷺鷥飛半塘因訪雲岩過半塘清明時候野花香小舟趁雨衝風去不及㝷僧到上方送人至松江西風蕭瑟入船忩送客離愁酒滿缸要記此時分袂處暮烟細雨過松江雨後雨後新晴日轉西桑間猶有拙鳩啼十分愁意無人管紅蓼黄蘆水滿溪紀愁可笑無詩紀四愁强將歡伯解吾憂夜長明月紗忩冷分得寒蛩一半秋和樂天初夏韻雨脚来山岫溪痕漲岸沙挿旗多酒户掛網盡漁家地出綳兒笋園收菜子花春歸鶯囀懶風急燕飛斜杯瀉青荷葉甌煎白玉茶孤村流水晚數㸃有歸鴉述已落落功名鬢久斑重遊京國又何顏早知寸禄榮家晚悔不當初便入山釣臺不受三公漢禄榮一絲風月許多清只將節義高千古豈釣人間利共名七夕有懐擘釵情緒思悠悠月下穿針嬾傍樓非獨雙星苦離别人間天上一般愁秋夜月華如水淨無塵千里相思總一心絡緯籬邊吟不徹做成秋意十分深賡采雪岩韻詩與梅花一樣清江湖久矣熟知名未容便理趨朝計行見相留入幕榮照座精神澄玊宇當官才刃壓金城星郎况是曾知已刮目英遊藻鑑明南蹌跧上人之平江青浦相逢恰二年今宵再會亦前縁詩囊和月横挑去穩泛楓橋夜半船夏日遣懐老大今無用吟詩了白頭百年如電影萬事付沙鷗性淡偏宜靜居貧動是愁人情難似舊門外水長流寓歸水激長江浪風傳遠寺鐘宦情秋意薄歸興客愁濃捲箔迎新雁喧籬厭舊蛩何時旋故里載酒挿芙蓉性拙性拙難為巧年来險屢經身閒詩漫賦心靜夢能靈富貴如朝露英雄幾曉星尋思世間事日影過中庭秋日即事宿有騷人興休教世俗知郊墟聊晚眺風月入秋宜愁極惟憑酒囊空却剰詩更長人不睡燈火可親時論詩大道本無體何在文字間易從先天畫詩自聖人刪流風傳益遠後作莫可扳推敲誰氏子一字不可閒兩宋名賢小集巻三百九
