body:
  text: 兩宋名賢小集巻三百六十二宋陳思編元陳世隆補蒙川詩集劉黻字聲伯號質翁樂清人淳祐中試入太學由學官試館職度宗朝累官吏部尚書端明殿學士擁二王入海及羅浮卒諡忠肅有蒙川集和文公感興詩六首至理根一初精微貫髙廣寄之形氣中今來齊古往衆曜列太虚環侍惟斗仰妙化變不測虚靈本常朗井坐識易陋簾窺學云㒺静玩感興篇剖陳如指掌仰觀復俯察上下融真機元氣無竒偶魚躍鳶自飛神聖奠中域動静心弗違天地斂諸躬照以日月輝遜志納衆有先慮周萬微胞與豈不夥游泳皇極歸立朝觀大節炳炳在行已李唐號多士屹立整頽紀前狄後有韓髙風世仰止孤忠翼王祚大論闢非禮老榦梃冬嶺明魄浸秋水均抱扶世勲心學宣殊軌黙觀羲聖書先天著復坤畫畫妙理具森列河圖文宇宙斡生意日月寧辭奔乘承著不息反躬性存存透彼名利闗洞此道義門用功不精密頻復何由敦詩道發金石世若壁聴訛正色落芻蕘一掬真意多衆竅本虚寂其如天籟何不悟康衢謠不識黍離歌禮樂節性情工夫貴深省愛親篤氷履酬世尚錦絅勿任忘與助一敬收衆騁威儀筋骸束趣味精神領相彼屋漏中森若指視炳窮達付天分靈光勿隨境和淵明貧士詩七首貧士何所營但知貧可依日月照不盡朝暮常分輝水淺魚自躍林寒鳥亦飛紛紛苦多求此景誰同歸石田秋不種難免良士飢飢本士之常獨抱嫠婦悲把書不釋手非志冕與軒昔有董仲舒三年不窺園道味歸肝脾遑䘏厨無烟家貧未為貧有書足可研寤寐千載心俗子難與言勿嘆師友寂日日親聖賢髙山與流水妙趣歸之琴吾愧學未成匪歎無知音但向胸中㑹無勞指下尋種菊或可茹得酒聊復斟窮達非所較動静一以欽發為琴之聲邈然天地心平生抱狷介深愧唾面婁蒿萊嘗閉門與世疎應酬奈何世患稔鯁鯁如馬周顛頓亦良苦饑羸非所憂皇路益以榛惡作寒蟬儔口禍渺無際困辱秪自求静觀松竹姿一塵無相干飲酒不求醉讀書非求官畦瘠多種菊采采亦可餐衣冠背時様筆硯同嵗寒但求聖賢心肯效兒女顔紛紛往來者笑我柴門關人生特寄耳何往非萍蓬世挾智反愚予謂拙乃工淵明有姱節高邁疏與龔大抵豪傑士所見事畧同簞瓢非謂貧軒冕豈真通儻不達至理冥霧將奚從扁舟溯江西忽抵梅花洲二忠儼遺像予愧非其儔肝膽照氷雪要亦狷者流言直不砭時掇禍貽親憂山禽似相盼往來疑勸酬閴坐生萬感矯首觀前修太玉洞聴琴無絃不成聲有絃多失真真聲在何所調和方寸春文操惜已逺孔壇嗟復陳所以桑濮響鄭衛波嬴秦詎知幽谷間迺聞太古淳游魚出寒水鳴鶴横霜旻休羨廣陵秘爾雅皆怡神過柘溪得西字晴雨春無定東風又轉西地肥桑眼大天暖麥鬚齊轡頓尋幽所舟行畏惡溪野禽如避客飛上半山啼朝廷求經明行修之士蜀人楊時發當其選以賤名薦或謂求之因紀此汲井綆懼絶植徳根懼斵繩樞守貧賤亘亘天境續防意如長城視身等良玉禰薦匪吾榮臧毁非吾辱清漏但勿欺人心勝明燭夜氣夜氣不盈掬浩然天地清風行石不動雲走月常明陋巷顔囘樂深山大舜耕此心無旦晝萬物自生生横浦有感風雨憂時夢不成忍將佞舌博功名學如谷永生何辱節似劉陶死亦榮蒼蘚無心同客静寒梅有眼照人清此邦風物多淳古曾識濂溪與二程賦望雲家山一萬三千里華髪雙親七十稀自許樸忠闗社稷誰知甘㫖誤庭幃萊根有味逢春早艸色無邊傍日暉總總白雲何處是夜寒結夢但東歸訪西湖東風吹客到西湖汀草沙禽半識吾若得數間茅屋在種梅花處伴林逋兩宋名賢小集巻三百六十二
