body:
  text: 兩宋名賢小集卷四十八宋陳思編元陳世隆補張都官集張先字子野烏程人康定進士知吳江縣詩格清麗尤長于樂府有雲破月來花弄影浮萍破處見山影隔墻送過鞦韆影之句時號張三影李公擇守吳興招子野輩集于郡圃為六客之會晚嵗優遊鄉里常放舟釣魚為樂仕至都官郎中年八十九卒西溪無相院積水涵虛上下清幾家門靜岸痕平浮萍破處見山影小艇歸時聞棹聲入郭僧尋塵裏去過橋人似鑑中行已慿暫雨添秋色莫放修林礙月生巢烏烏啼東南枝危巢雛五六心在安巢枝一日千往復脫網得羣食入口不入腹窮生俾反哺豈能報成育潤州甘露寺丞相高齋半草萊舊時風月滿亭臺地從日月生時見眼到江山盡處回三國是非一作興亡春夢斷六朝城闕野花開心隨潮水漫漫去流遍煙村半日來吳江春後銀魚霜後鱸逺人曽到合思吳欲圗江色不上筆靜覔鳥聲深在蘆落日未昏聞市散青天都淨見山孤牆南水漲虹垂影清夜澄光照太湖贈妓兜娘十載芳洲撫白蘋移舟弄水賞青春當時自倚青春力不信東風解誤人醉眠亭李行中築在松江醉翁家有醉眠亭為愛江堤亂草青不聽耳邊啼鳥亂任教風外雜花零飲酣未必過此舍樂甚應宜造大庭五栁北忩知此趣三閭南擬漫孤醒兩宋名賢小集卷四十八
  hash: sha256:d74ccac3bfb1b09b2d4d23471c5f07a4d1c2b3c5efcf9c6252313796a3eb149d
