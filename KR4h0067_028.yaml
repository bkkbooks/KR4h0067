body:
  text: 兩宋名賢小集卷二十八宋陳思編元陳世隆補蘇侍郎集蘇頌字子容南安人紳之子徙居丹陽慶厯二年進士神宗朝歷集賢院學士知開封府哲宗即位纍遷翰林學士拜右僕射兼中書門下侍郎罷為集禧觀使徽宗立進太子太保纍爵趙郡公卒贈司空魏國公有集挽老蘇先生觀國五千里成書一百篇人方期逺至天不與遐年事業逢知已文章有象賢未終三聖傳遺恨掩重泉常論平陵系吾宗代有人源流知所自道義更相親痛惜才高世齊咨涕滿巾又知餘慶逺二子志經綸題睢陽五老圖歸休謝事樂時間衣鉢承傳宰輔冠盛德舊曾親善政霑恩新賜立危桓堂堂嚴貌依龍袞粲粲文星荷月寒直筆當時修國史英豪邁古後來看坐久月初上高軒微雨過初夕涼風生兀坐正幽寂雲間月華明移榻向寒階遙望孤蟾清所思故人逺對此傷豫情和丘林二君會程坦之家天涯人未歸飄然江海上客心蓬任風歸路萍隨浪青雲少知己白日多罹謗著書見窮愁倚門知骯髒皇皇千名祿戚戚足羞讓豈特為身謀所懷慰親望昔人在困躓寧復論得喪吾徒抱道義豈不保趨嚮勉希一簞賢無慕千乘相卷舒各有時出處當自諒送朱郎中壽昌通判河中府弼詩詠凱風以成孝子志鄭人復君母傳稱能錫類中郎常有懷生不識所恃登朝雖厚祿當食每忘饋念昔鞠育勞嗟今出處異倚門豈不待兩求終莫致乳烏思反哺哀鳴自垂翅百草搖春暉寧無謝生意灑血向穹壤解組出臺寺馳驅咸雍郊歷訪經行地至行感神明精誠通夢寐悠悠大道傍親息忽相值紫綬拜北堂白頭歸長嗣悲欣敘契濶恍如隔生事四紀世路殊一朝版輿侍兹事昔未有聞者共驚喟帥守為之言詔趣還官次當年二千石寵名非所利仕或便鄉關安用竹符使蒲中母家近自屈為倅二受命慰慈顔騰裝愜歸思既徇報德心亦安效官智觴以萬壽薦衣成五綵戲無復興寒泉何須賦大隧令人及聖善孝慈兩不匱贈言述高風庶用激忠義次韻蔣頴叔同遊南屏見惠長篇青山橫莽蒼萬石出南麓古剎表耆闍高聲聳羣玉居惟擇岡巒近靡數松竹郡郭路非遙遊人舂不宿陟巘極躋攀循崖勞傴伏架筒引流泉跨嶺搆重屋講坐據妙峯禪堂對枯木幽尋難屢期將往誰能獨倘逢霜臺客暫住驄馬足聨步訪叢林終朝走郊牧相期方外遊頓忘河上曲夷路喜君騰高閣暫豫束更聽名理言俯愜心中欲況已證真常詎止齊寵辱願言挹清風可用警浮俗和蔣頴叔亳州矮檜檜生本修直此種特殊異高不盈尋文廣乃遍階砌短幹自堅強附枝交蔭翳森然葆羽欹隱若虬龍墜不知何代有本老色彌翠嘗聞古仙者應化在兹地手植有遺迹深根幾千嵗神靈應護持道宫存欵識自此物色繁因為圃人利封殖雖地宜屈蟠由巧智以彼凌雲姿還同蔽牛類拳曲如能壽輪囷不為器誰云矯生質終亦遺世纍詩伯一留題禪叢重增貴豈若榴柳然空傳草木記次韻君實內翰同遊范景仁東園鑾禁限沉深鼇頭雄贔屭主人出休沐秋色正明麗偶為東園遊便有中林思縱言得造適覽物增意氣風清濯煩襟日永忘歸轡朝野本無間簪組何用棄未必幽棲人識兹真樂地又和次中答莘老見招近甸無辭暫駐車吳門雖好隔重湖且嘗竹苑迎霜免休憶松江上釣鱸老見交朋尤眷戀醉吟風月好躊躇廣陵喜得賢賓客簪履光華勝玳珠次韻約諸君遊長干寺寺按郡東南僧嘗為我談初因晉大士來護古靈龕昔時有沙門惠逺至金陵長干獲古佛塔因於其地建佛剎後代廢撒至天禧中僧惟政乞重建佛寺俱蒙賜額歷世名空在重興德乃堪先朝賜新額此地建精藍億載扶皇統生民息戰函剎仍存故里龍復止深潭九級惟塗甓千梁盡架楠亭臺各軒豁巖谷更空谽殿角芝成玉殿柱嘗有芝草松梢露墜甘穴棲多禮鼠池怪集神蚺可愛臨岡曲何人結草菴欲來尋隱逸誰與共歡酣念往須勤到來詩有念往曾高枕之句登高已舊諳低頭小城市舉目遍村嵐靜境由兹達塵容却自慙常思真趣嚮可抑俗叨貪宇宙開懷適江山極望涵相邀幸多暇命駕即追參謝太傅杜相公惠吳柑任土吳邦果分甘故相庭纍纍朱實爛馥馥蜜筒馨玉液三重釀神丹九煉形盤中堆火齊案上鬭銅釘玩比韓嫣彈餐勝楚子萍瓊津融不竭塵慮滌還醒近鄙瓜稱瓝休誇李似瓶南樓今匪貴東望亦虛靈盛乃長洲苑傳之大禹經秋苞千樹富霜葉一林青薦味同飴露淪輝信景星租園輸稅賦守吏占官丁貢罷中都府供先緑野扄緘封重篚襲道里百郵亭想憶金華宴須傾縹甕醽同梨資可口與棗助延齡豈意殊方物頻沾俗吏廳食珍時有愧拜賜敢遑寧顧乏齊瑤報宜追戴帶銘永言難紀美應念漢侯鯖和胡俯學士紅絲桃京都花品豫嘗評夭桃僅有十數名含絲繁艷今始識鮮苞長蘂摽紅纓春晴日暖助顔色灼灼一片朝霞輕鮫綃剪碎旋裝綴虬鬚摘盡將紉縈因知化工巧難狀偏于草木呈瑞精又疑華燈九光爛蜂蝶不敢來窺爭江南萱草易滋殖維揚芍藥初種成此花皆有紅絲號恨不同時相合并君家數株發庭際愛玩常挂簾鈎瓊有客風流欲寄目主人喜笑張筵迎飛觴灑翰偏得意都緣尤物牽風情我雖多病不能飲猶思強舉花前觥和刁推官蓼花二首煙雨寒塘外蕭條廣隰中花逢秋至盛人愛水邊紅碎纈排霜葉纎蕤拂露叢尊罍不見賞留得伴溪翁蓮踈菊未破野豔獨敷榮濯水紅纓細鋪園步障平露寒偏發色風徑不催莖采掇聊供餌丹房助氣清宣甫以栟櫚茶刷見惠繼之以詩依韻奉和裝槖分餘具茶筒使拂塵製時工匪易得處賞尤頻常與輪槽並宜為焙匣珍齋中延客語供辦未應貧和蔡子直官局誠俱冷交盟信不寒風霜兩鬢白氷蘖一心丹未剖方州竹猶熏畫省蘭北宫陪論定應似漢丁桓和冬至紫蒙館書事泰畤迎長日殊方展慶杯關山厭沙磧星斗望昭回月共寒更永風隨協氣來欲知玉厯正候律應孳培贈同事閣使山路盡陂陀行人涉險多風頭沙磧暗日上雪霜和草淺鷹飛地氷流馬飲河平生畫圖見不料此經過同賦山寺都李花小樹扶踈若剪裁新英濃淡對山齋青紅相間垂羅帶華葉同開綴寶叉未必無言芳徑列須看成實翠珠排禪扄掩映情多感藥譜標題品最佳衆卉紛敷爭欲並三春顔色此難偕誰憐寂寞遊觀少便與移根向玉階和題李公麟陽關圖渭城悽咽不堪聽曾送征人萬里行今日玉關長不閉誰將舊曲變新聲三尺氷紈一絶詩翩翩車馬送行時尊前懷古間開卷看盡關山逺别離野翠堂郊原西與莽蒼連隔岸人家小徑穿滿目風光杳無際栁如山色草如煙西湖椒澤疏源勢不休繞城氷玉湛寒流鳬鷖容與菰蒲亂占得江湖一望秋兩宋名賢小集卷二十八
