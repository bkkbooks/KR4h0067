body:
  text: 兩宋名賢小集卷二百十七宋陳思編元陳世隆補桂巖吟稿朱晞顔字子囦新安人慶元中廣西漕使疊綵巖登越亭不到越亭久榴花今已紅江流寒㵼玉山色翠浮空百粵薰風裏三湘夕照中行藏仗忠信六合本同風朝陽洞湖上初驚八月秋嶺頭又見桂香浮巾車幾憶陶彭澤竹馬多慙郭細侯未遣靈泉還舊隱且同巖壑訪真遊一枰勝負人何在試問樵柯已爛否遊壺天觀泛舟過龍隱洞小酌至月上而歸浪道湘南是瘴鄉玉壺銀闕四時涼臥龍不起葭灰動愛日空驚繡縷長浮蟻且同佳節醉探梅不作少年狂暮歸慙愧山頭月照我駸駸兩鬢霜伏波嵓天斫神剜不記年洞中風景異塵寰江波蕩漾青羅帶崖石虛明碧玉環地接三山真迹在天連合浦寶珠還重來恍似乘槎到慚愧雲門夜不關彈丸山傷弓枉木漫猜嫌岩石稜稜彈樣圓雕鶚橫空秋凛凜鳬鷗渡水晚翩翩私心灰冷慵思繳蹇步塵勞不受鞭挾彈張弓付年少歸與趂取菊花天洞底石間得枯木一株花葉咸無而枝幹峭拔扣之鏗然有聲因成都句刻之岩石間天教海若效珍祥不與千林春競芳擲地遺音清戞玉凌雲直幹凛凝霜誰浮鯨海星槎到猶帶蟾宮月桂香冶葉浮光掃除盡堅高直欲共天長暇日過龍隱山有以千葉白梅獻者輒成鄙句素艷重重疊雪輕先春不怕雪霜凝人言五嶺地皆熱誰折一枝寒欲氷似笑踈花太孤瘦故教密葉擁千層湘南别有新春樣拚醉花前喚不譍慶元改元寒食日陪都運寺丞遊白龍洞時牡丹盛開小酌岩下夕陽西度並轡而歸小溪潄碧響潺潺路入龍宫杳靄間佳節漫添新白髮故人賴有舊青山花朝幾共湘南醉萍迹何年嶺北還歸路連鑣紅日晚多慙龍臥白雲間龍隱岩聖主龍飛已在天洞中猶有老龍眠便須吸盡西江水霈作商霖大有年韶音洞曾按薰絃天一方掃除民愠變清涼遺音凛凛猶聞耳不獨當年味可忘兩宋名賢小集卷二百十七
