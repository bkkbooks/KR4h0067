body:
  text: 兩宋名賢小集卷三百三十二宋陳思編元陳世隆補適安藏拙餘藳一武衍字朝宗汴人工詩名著寶慶間方萬里稱其詩情致亹亹多有可筆于丹青者所居有亭池竹木之勝命曰適安即以自號有藏拙餘藳二卷昔徐孝穆以魏收之文沈于江曰吾與魏公藏拙衍學詩三十年投質于宗工名勝者甚多藏拙之餘僅存此藳故云淳祐改元立冬日衍書秋夕過松陵月冷江空夜氣濃桂香飛下廣庭風不知何處神仙過鶴唳數聲煙靄中鶯柳外飛來恰弄聲瞥然流去一梭輕分明啼斷春愁處風不驚花午院情宫詞補遺梨花風動玉蘭香春色沈沈鎖建章惟有落紅官不禁儘教飛舞出宫牆牡丹春籞正穠華有旨今年不賞花剪落金盤三百朵內批分賜近臣家采桑曲粉光薄薄髻雲垂月滿湘籠獨步時女伴未來歸未得水邊間照插花枝道是蠶忙未是忙日長猶得事梳粧羅敷有語何曽解倚樹偷窺馬上郎虛星壇月下聞笙何人吹動玉笙攢天濶風髙桂殿寒聲軋五雲飛不去夜深和鶴落瑶壇宫思當時十五正嬌妍選入宫中二十年誰料祇今三十五舞鞾未踏玉階前書畫扇雙成午夜約飛瓊齊駕紅鸞看月明縹眇碧雲歸去曉洞天霜冷玉簫清贈苕上隱者夾溪槐栁緑雲堆轍迹何嘗到碧苔不種桃花緑底事恐因流水誤人來開元廣寒詞桂華珠殿水晶樓柘袖籠香一夜遊飛下銀橋人不覺月明三十六宫秋客去晉人冠子羽人衣客去移牀傍小池扇影不搖蘄竹淨藕花風裏看唐詩遊吳門同樂園疥池光亭壁呈使君張都承一城和氣萬花春金碧樓臺處處新太守不孤同樂意木蘭堂上看遊人春日舟中書所見翠峯斜倚側金翹羅帶縈紅罥碧桃應是春愁禁不得東風深院粉墻髙花外飛來夾膩香片雲誰遣下巫陽不須回首頻相顧彼此傷春易斷腸明妃曲中國無人北使輕六宫揮泪别傾城當時誰議誅延壽益重君王好色名馬上風沙亂鬢蟬氊鄉同地不同天琵琶何用彈聲怨出降烏孫更可憐聞角呈宗諭方蕙岩曉角吹愁客夢寒一聲聲落曲屏間吳兒可殺無風味老却梅花祗當間韓幹照夜白八尺􅀈龍雪到蹄阿瞞騎罷阿環騎絶憐千古房星魄不見明時見昔時振金欹玉出天間幾向驪宫驟月還脫使幹生天寶後畫圖那得到人間柳枝詞靈和殿裏最風流三月飛花雪御樓換得玉人眉樣巧一春渾不下簾鈎秋夕清泛弄月吹簫過石湖冷香搖蕩碧芙蕖貪尋舊日鷗邊宿露濕船頭數軸書老將幾回夢裏到邊陲馬上猶能磨戰旗彈泪對人偏愛説建炎隨駕渡江時春日湖上苑外垂楊閲四朝東風依舊緑條條當年盛事人猶説二殿龍舟泊畫橋折桐花上雨初乾寒食遊人盡出關一片湖邊春富貴斷橋船簇夕陽間飛鷁鳴鑣鼓吹喧繁華應勝渡江前吟梅處士今還在肯住孤山爾許年船裏歌聲去復還遊人樂在酒杯間爭如策蹇長隄上細看南山與北山宜永觀雨池上泠泠過雨聲緑荷風走萬珠明天公未欲從羣望作了晚涼俄便晴長橋夕月卷來滄海黃銀浪飛出層雲白玉團千古垂虹竒絶處獨憑三百赤闌干雙鷺誰驚雙鷺起蘋汀蹴裂玻璃細有聲飛入白雲渾不辨碧山橫處忽分明重訪西湖舊遊西風吹晚鳳城開桂子香中信馬來十載不行湖上路知它添了幾樓臺榴花蹙蹙生紅露滴珠薰風涼幌曉粧初折來戴朵頻拈看應訝羅裙色不如燕子燕子攙風入畫楹不知人傍緑窗行香泥驚落忽飛去却向桐華頂上鳴老宫人寶髻無光玉貌昏悲歌空感舊承恩君王喜問先朝事時許車兒到殿門侍輦觀花上苑春太皇宣索鳳笙頻如今猶記當時曲對譜間教小內人湖亭席上贈商素一曲春風已擅場淺顰低囀更傳觴令人憶殺香山老舊日玲瓏也姓商貴遊鈿車轆轆輾芳塵障步香移一片春花下玉盤行禁臠御前宣勸到湖濵次平山景一縷殘煙暝不收作成溪上十分秋空林落日西風急紅葉無詩水自流尋昔遊碧水青山舊路迷劉郎惆悵阮郎悲仙桃一别人間去洞裏春風自四時七夕金針插並玉搔頭月落河傾尚倚樓細認雙星還自感别離同是一般愁雁奴斷沙殘汐葑田枯寂厯寒煙卧雁奴飛起不知何處落數聲驀忽隔黃蘆阮客粉靨嬌春掌上輕玉琴聲裏見深情花邊臨别重回首猶恐絲絃説未明書吳江塔院水月疊疊滄波隔亂山白鷗飛去復飛還吟邊好思無多子祇在孤舟落照間九日倒盡鴟夷酒更沽西風吹興滿江湖客中賸喜身強健嵗嵗秋香看紫萸寄社友秉燭西園事已非更堪中酒落花時隔簾燕子偏饒舌不管春愁倦作詩立春蓼滴辛盤色鬭鮮已將春到酒尊前金幡不用吳娃祝自唱新詞插鬢邊孤山訪梅不遇簡知已結客尋春過舊隄雪香雲冷鎖雙扉隔墻應是梅花笑敝却貂裘尚未歸雪中登垂虹亭投箠江邊雪滿頭玉虹千尺要詩酬詩成上馬誰同説説似亭前兩白鷗兩宋名賢小集卷三百三十二
