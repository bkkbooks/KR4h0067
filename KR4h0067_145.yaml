body:
  text: 兩宋名賢小集巻一百四十五宋陳思編元陳世隆補于湖集巻中金沙堆廟有曰忠潔侯者屈大夫也感之賦詩伍君為濤頭妬婦名河津那知屈大夫亦作主水神我識大夫公自托腑肺親獨醒梗羣昏聚臭醜一薰瀝血摧心肝懐襄如不聞已矣無柰何質之雲中君天門開九重帝曰哀汝勤狹世非汝留賜汝班列真司命馳先驅太一諏吉辰翩然乘回風脱迹此水濵朱宫紫貝闕冠珮儼以珍宓妃與娥女修㓗充下陳至今幾千年玉顔凛如新楚人殊不知謂公果沈淪年年作端午兒戲公應嗔詠雪東皇攜春來屬車載霓裳回風作妙舞雜珮鳴珠璫千官玉笋班再拜稱瑶觴酒罷各分瑞圭宗粲琳琅浩蕩涵濡恩一笑徧八荒塵垢得湔洗焦枯亦輝光偉哉造化力天地為翕張功成了不居㫤日天中央賦沈商卿硯石渠東觀天尺五壁星下直圖書府琳琅寳鎮出三山浩瀚簡編照千古右文儲硯一百九鈿匣珠囊䕶瓊玖有時清夜發光怪諸儒縱觀容拜手一朝收跡歸故園瓦池葦管塗突烟夢尋清都故歴歴起凭書案空潸然眼明見此超萬石色如馬肝涵玉質白圭之玷尚可磨澁不拒筆滑留墨摩挲太息不自己呼兒汲水為湔洗天遺至寳瑞吾子要與詞林壯根柢子行飛鶱為帝須西清承明有佳謨収功翰墨倘乞我田間自抄種樹書任守作醮為民祈福先期而雪是日開霽紫府仙人自列真緑章封事更通神清塵已作連宵雪不夜潛回萬屋春玉節珠旛來浩蕩雲車風馬正紛綸步虚聲徹朝元路便挈荷囊款帝闉應菴退席蔣山寄居昭亭萬夀三請不得已而應輒贈長句兼簡蘇内翰尚書二首逍遥丘壑欲忘年忽作風蟬脱骨仙鍾阜卻從三昧火靈巖重要一燈傳極知掃迹終無䇿且與臨岐快着鞭莫作山林城市想從來大隱故居㕓不寄音書又隔年因師問訊玉堂仙碧油早覺儒為貴青海應無箭可傳憶昔絲綸催喚仗何如沙路聴鳴鞭生涯落寞公知否凖擬松江受一㕓徳慶范監州以子石硯寵假雖小而竒戲作二首曽侍虚皇玉案前夜書繭紙筆如椽莫嫌此石規模小一寸𤣥雲萬斛泉端溪別駕極風流白壁明珠不暗投笑我支牀已多許須君隱几更冥一作宜搜題朱元順梧溪圖去年過梧溪王事有期程夜半度湘水但見天上星平生中興碑夢入紫翠屏已辦北歸時十日窮攀登今朝復何朝忽此短軸横歴歴眼中見湘山無數青白雲着山腰樓閣秋氣明便欲扶短䇿下濯滄浪纓主人山水仙妙處心自評元順骨已冷千載交葢傾賞音寄幅紙益見忠孝情題詩疥公畫託我不朽名大雨呈同行諸公我船千斛初甚遲上灘下灘風薄之百夫撑挽才得過水淺舟大行無期同來賔客笑鈍滯一葉自買如鳬鷖瞥波急槳亂藻荇瞬息不見颷車馳忽然昨夜雷雨作墨雲頽山風捲壑龍門春漲魚鼈亂千渚宵明鬼神惡篷飛纜㫁泊不得客只一身無處着長年絶叫客驚起一浪先掀半船水囊衣漂盡到巾履一夜奔忙沙石裏我時甘寢殊不覺但怪颼颼風到耳起來呼酒自勞苦水滿凉生差可喜鄉來笑者今却悲人生淹速那能知明朝轉柁我船快喚客同船莫嫌隘和曽裘父韻送老人赴鎮江邊箭収聲江不波廬山髙處與天摩向來只作青蛙計此去無如紫詔何鯨起江濤煩翦拂經餘蓮社更磋磨文成本自籌帷幄不擬黥彭戰伐多以水仙花供都運判院二首十月西湖冰齒凉梅間松下小齋房幽芳靚色天為笑落莫南來也自香瘴土風雲那有此却疑姑射是前身冰肌玉骨誰消得付與霜臺衣繡人再和二首雪屋因君發妙思作歌可比漢芝房根塵已證清淨慧鼻觀仍薰知見香玉壺寒露映真色霧閣雲窻立半身可但凌波學仙子絶憐空谷有佳人寄題向彦績使君采菊堂使君天資髙夙昔事幽屏長懐𣺌丘壑餘習謝鍾鼎東籬羲皇人槁死骨已冷凄其千載後妙處一笑領髙堂娛白髮兄弟極整整不須南陽泉夀與日月等和總得居士康樂亭韻氣格稜層壓大千塵囂逺盡思翛然龍門不障洪河決喬木終隨故國顛栁下煅工真得道竹林酒友漫稱賢先生義㮣雲天薄千載參渠活句禪和仲欽題粉巖一麾縻我欠追從悵望千山紫翠重忽向郵筒得新句知君正在碧蓮峰昨日極暑今日極寒昨日火流金今日風折膠昨著疎布衣今衣敝緼袍赤帝與𤣥冥凛凛隔一宵聊將擁爐適换此揮箑勞冰炭欲盈懐炎涼不崇朝幻生過隙駒是身九牛毛等是一寒暑胡為自缺嘲萬法從心生心静境亦消悟此本來無綌絺同狐貂還當隠吾几試聴萬竅號仲欽寄民為重齋詩和答五首齋中寒日影瓏璁齋外參天十八公二十四州民樂否莫教一物怨途窮玉節南來兩使星埋輪折檻有家聲不嫌齋榜民為重去國當時一葉輕徳意丁寧到緑林都捐刀劍作齊民皇華入奏天顔喜趂得朝元第四春行邊使者幾時回寄我清風欲滿懐已把十詩鐫樂石為公滿意落新齋蠻烟瘴雨侵行李每向南雲有所思定自為民忘涉險請君細讀寄來詩初得愛巖髙巖劃天門仄徑通乳穴隈堆青螺髻嵽嵲白玉闕外有虎豹蹲中恐蛟蜃蟄東榮俯雷電西出挾日月萬壑生悲風六月不知熱但覺駭心目未易紀筆舌平生山水趣嶺海最竒絶洞府二十四未厭屐齒折晚乃得遊此餘地皆僕妾同來六七士嗜好頗相躡舉酒酹山神慰我久湮滅寄張真父舍人投分生平不數人憶陪文館笑談新資中冢樹看成拱荆府詩筒跡又陳已恨別離空嵗月那知邂逅亦參辰古來命駕須千里薄宦區區愧此身從珪老求竹東窻便種千竿竹凖擬清風六月凉傳語報恩珪長老相煩去作竹街坊與邵陽李守二子用東坡韻兩李有佳句冰雪灑肺肝清越石在懸圓熟珠走盤吾家十二樓下俯千仭湍誰掣白玉瑣借與二子看臨風度長篴瘴海為清寒卻立望九州隘陿非所安便欲馭長鯤九萬扶揺摶神山在吾牖弱水空瀰漫回首五十劫不費一指彈絶笑塵中年攝提與涒灘吴城阻風吴城山頭三日風白浪如屋雲埋空北來大舸氣勢雄車帆打鼓聲韸韸吾船正爾不得去跼促沙岸如鳬翁長年三老屢彈指六月何曽北風起由來官儂多齟齬世不汝諧神亦爾我愧此言呼使前順風逆風皆偶然皇天廣大豈有意相汝嗔喜庸非偏瓶中有粟囊有錢與汝飽飯姑留連中秋觀月齊雲樓用孫昌符韻玉宇無塵夜氣清銀河徹底素波明人應好月同千里身在髙樓近五城丹桂定知憐我老緑荷何惜為君傾建章鳷鵲當年夢便欲憑空上玉京偶得四月菊以奉提刑運使二首午隂籬落小徘徊底許清香鼻觀來定自霜臺風力峻故教霜菊暑中開金縷裁衣玉綴裳掃除障暑作秋香一杯擬做重陽賞更借西風一夜凉鄭儀寧送蓴菜我夢扁舟震澤風蓴羮到筯晚盤空那知嶺外炎蒸地也有青絲滿碧籠奉送李彥國還廬陵李生來嶺南自挾書一束食簞寄蕭寺矻矻晝夜讀餘子尚頭角文作翻手速小試不盡能他日真可卜里中老仙伯曽對玉堂宿髙節老彌厲名葢斗南北掖垣我畏友不愛萬鍾禄巻藏一丘下勲業所迫逐於歸問道要儲作饑嵗榖富貴偶然耳吾欲子金玉暑甚得雨與張文伯同登禪智寺老火陵穉金聚作三日熱舟行湘江上蒸煮到魚鼈黒雲起東北一震山石裂不知雨來處但見風捲葉銀河倚天㵼髙浪舞飛雪只聴打篷聲已覺凉意愜岸旁古佛屋樓殿頗嵽嵲不辭衝泥去一看雨腳闊吾宗紫巖客窮苦志不懾自吾來浯漢奔走已旬浹我懶久廢學愧子來挈挈相攜得偉觀為子熾然説願子領話頭吾今指標月過昭亭哭二弟墓陌上春風久已歸墓頭衰草正迷離白頭未抆三年淚黄壤長埋短世悲憶昔追遊常並轡只今獨往更題詩兩兒二弟俱㝠漠顧影伶俜欲語誰贈甘法曹此嶽仙人汗漫遊斯文曽到海邊州誰憐詩禮甘公子牢落青山向白頭丙戌七夕衡陽境獨游岸小寺七月暑中行道路萬里賖今夕已七夕我猶在天涯繫船蒼石根人影散晚沙上㟁是修竹仄徑如行虵茅屋四五間往昔佛所家經禪劫火盡舊觀初萌芽牆叠古瓦盆僧被破袈裟喜聞柱杖聲掃地自㸃茶何以為我娱冰雪汲井花一洗十日渴分凉到童髽盈盈牛女期不著雨洗車疎星銀漢動新月玉鈎斜更呼老奚官巻蘆作鳴笳莫驚潭中龍聊起棲樹鵶金沙堆玻璃盆中金作堆葯房桂棟中天開洞庭無底蛟蜃惡君不喚我那能來旁船守風四十日我行昨日到磊石山頭望君乞杯珓僮僕歡呼得頭擲二更南風轉旗腳打鼔開船報君徳君今清都豈其食聊須飽醉撑船儂明日依舊行南風贈邕州滕使君千騎東風白玉鑣十眉環坐紫檀槽安南都䕶來鰲禁建武將軍握豹韜瘴雨蠻烟驚鼓角朔雲邊雪滿旌旄夕烽不到甘泉殿尺一徵還近赭袍登七星山呈仲欽二首魁杓歴歴控雲嵐地闊天虚萬象涵不與天公管喉舌猶堪嶽立鎮湘南便驅匹馬出烟嵐聖主恩深若海涵却道幾重杯斚地載來恩醖過江南福巖丙戌七月行行山益髙所見益以竒煑茶南臺寺更上千級梯道傍古時松閲世心已灰不與嵗月競况受霜雪威路回聞鐘聲寳刹隱翠㣲排空冩金碧刓石著栱枅門前兜率橋劫火昔所遺神龍厭庳陋一炬然枯萁談笑舊觀還殿柱百尺圍老禪七十餘髙與此山齊大屋貯龍象空巖走金犀齋盂細細參正味無鹽醯頗聞三生藏中有萬寳齎佛牙舍利湧貝葉旁行稀剖蚌慈相尊破匣血縷飛稽首所願觀為洗往昔非卻尋上山路擬看浴日池急雨忽留人吾其少須之湖湘以竹車激水秔稻如雲書此能仁浣壁象龍喚不應竹龍起行雨聨綿十車輻伊軋百舟櫓轉此大法輪救汝旱嵗苦横江鎖巨石濺瀑叠城鼓神機日夜運甘澤髙下普老農用不知瞬息了千畆抱孫帶黄犢但看翠浪舞餘波及井臼舂玉飲酡乳江具誇七蹋足繭腰背僂此樂殊未知吾歸當教汝欲雪欲雪未雪天糢糊凍行沙尾鶬鴰呼北風刮耳立不住更騎鈍馬穿枯蘆兩生憐我意不舒江頭三日占檣鳥髙堂明朝置安輿買羊沽酒償勤渠夜讀五公楚東酬唱輒書其後呈龜齡同是清都紫府仙帝教彈壓楚山川奎躔錯落珠連緯嶽鎮苕嶤柱倚天宫羽在縣金奏合驊騮參隊寳花鮮平生我亦詩成癖悔却來遲不與編薦福觀何卿麒壁間詩對之悵然次前韻金華老子定臞仙翰墨文章編兩川遺跡已驚風落木髙名依舊日行天人間易得朱顔老寺壁空懸玉唾鮮欲繼二賢歌薤露嚴詩杜集儻同編再用韻作五公詩如公韓子定飛仙更喜門人老玉川莫厭詩筒頻度嶺即看侯弁去朝天飛龍位正雲霄近集鳳樓髙彩色鮮我欲扁舟君記否但教歸去雜民編蒙侍御丈再用韻作送行詩走筆和答迫放船不暇工也憶曽總領道山仙自挽狂瀾制百川廷䇿萬言功葢世臺評三上力回天楚東賸喜詩郵速天北催頒詔墨鮮我老江湖堪野史看公勲䇿手親編夀老迓使者以齋素不置餞二首火雲飛焰擾簷前淨滌齋㕑㡬不羶定自隨車有甘雨為言星使早如鞭藩府東行迓綉衣海雲山月照旌麾錦囊賸有新詩句寄與幽人莫遣遲贈黄司法吾友王升卿乃是天下士阿翁苦硬節御坐留諌紙辛勤教其子不但為科第一官法曹掾整整老須忌吾行桂嶺南所得但五子願渠自愛惜窮達初不計功名倘來耳期子以千嵗宵征畏暑倦長道呼童戒宵征三更渡前溪溪水清且鳴舟人自相喚炬火如疎星俯視亂石多仰見北斗横㣲㣲白露下磔磔宿鳥驚竹輿山林薄十里月漸明光彩散草木凉意侵冠纓泛湘江十日行湘江湘水清而温不療亭午渇却憶土井渾道傍古刹竿着屋髙樹根飛泉出山腹甘冷冰瓶盆何止解百憂一洒塵埃昏設供者誰與稽首兩足尊餘干趙公頤賢宗室也魏公題其堂曰養正且為作銘取易頤之義刻碑堂上予過之為賦詩眼裏紛紛不要同從教三徑滿蒿蓬肯來與子談周易此去何人識魏公家近星辰雙闕北身居烟浪五湖東清臺有日占雲氣一丈豐碑夜貫虹風洞山入烏蠻連越巂天開斗野對珠宫應憐嶺海長炎熱乞與清涼萬竅風秦城塹山堙谷北防胡南築堅城更逺圖桂海氷天塵不動那知壠上兩耕夫岸傍偶得木犀天公不求金富媪不復藏居然土同價散作草木芳英英園中葵一心傾太陽采采籬下菊令汝夀命康惟此木之犀更貯萬斛香雄姿傲霜雪鱗鱗森青蒼三賢鼎足立正色凛相望豈比桃李徒紅紫紛披猖聊息貪者心來上君子堂嵗晚從我遊寘汝兄弟行贈朱逺遊逺遊何方來峩峩古衣冠袖中三百篇貯月白玉盤溪清石瀨急雪凍銅壺乾有如山澤仙外瘠中氣完便合朱絃彈細着青瑶刋懐哉人未識飛步江風寒和張欽夫尋梅寒梅本無心適與春風期孤根擢嵗晚桃李更媢之取我碧玉壺薦此白雲枝故人不可寄耿耿空自竒故人隔湘江獨立知者稀采香正滋蘭忍饑不食薇拏舟許過我此約不可違江南烟雨村願與子俱歸鑑湖納凉鑑湖周圍三百里極目平湖清到底荷花嵗久生滿湖人來採蓮唱歌起賀家千頃水雲鄉六月荷花風最凉短楫輕舟來㫁續山横曉月正蒼蒼雞籠福地在歴陽將至豐城望一山宛然感之賦詩黄茅白葦徑才通忽見晴嵐掃翠空從吏只今俱蜑户仙山何許是雞籠逢人漸覺交游少問路仍行盜賊中自是麤才合麤使瘴鄉那得便途窮西湖岸草汀花對夕陽滿船新月夜鳴榔秋清菡萏紅干柄風靜琉璃白一方勸范東叔飲今代太史公四海范氏門斯文十世澤班班被諸孫我識叔西父白玉比潤温今來見令弟後氣百馬奔一第溷子耳勿愧而家尊臨分無多言更酌老瓦盆入清江界地名九段田沃壤百里黄雲際天他處未有也野水瀰漫欲漲川稻雲烘日更連天定無適粤千金槖可買臨江九段田黄犢眠邊髙樹䕃白雞啼處逺炊烟此中若許投簮紱便老鋤耰卜數椽寒光亭亭依三塔占清幽松竹環除翠欲流晚色晴開千嶂月波光冷浸一天秋瓊瑶影裏詩僧屋雲錦香中釣客舟風送不知何處笛雁聲驚起荻花洲兩宋名賢小集巻一百四十五
