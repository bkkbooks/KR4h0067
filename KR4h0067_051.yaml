body:
  text: 兩宋名賢小集巻五十一宋陳思編元陳世隆補公是集一劉敞字邍父袁州臨江人也舉進士甲科為大理評事通判蔡州召試遷直集賢院判尚書考功仁宗賜夏竦諡曰文正敞言竦之行邪而諡之以正不應法仁宗為更竦諡曰文莊同修起居注尋遷右正言知制誥奉使契丹敞博聞彊記素知敵山川道里敵人自古北至栁河回曲千餘里敞問曰自松亭趨栁河甚徑不數日可至中京何不道彼而道此敵人不虞敞知皆相顧驚愧曰誠如公言自通好以來置驛如此不敢易也時順州山中有異獸如馬而食虎豹敵不知名以問敞敞曰此所謂駮也為言其形狀聲音皆如所見敵人益嘆其博物使還求知揚州初狄青在兵府諸軍訛言藉藉每出小民輒聚觀仁宗不豫青益為都人所指敞將行言于仁宗曰陛下愛青不如出之以全終始今外説紛紛雖不足信要當無後憂寜負青無使負國仁宗頷之曰可語中書敞見三丞相謂曰向者天下有大憂今有大疑上體復平大憂去矣而大疑者尚存具以青事告之丞相唯唯敞既至州遺公卿書曰汲黯之忠不難于淮陽而眷眷于李息朝廷皆知為青發也京師犬水彗星見青出判陳州青去之夕而彗沒自揚徙鄆州糾察在京刑獄嘉祐四年祫享羣臣上尊號敞言尊號非古仁宗然之除翰林侍讀學士知永興軍召還翰林治平中判太常寺敞在永興得眩瞀疾求便郡英宗曰如劉敞者豈易得哉遂出知汝州改集賢院學士判西京留司御史臺卒年五十敞為人明白俊偉博學自信自六經諸子百氏至傳記小説無所不通為文敏贍在西掖時一日追封皇子公主九人敞將下直為之立馬却坐一揮九制文詞典雅各得其體在長安得先秦古器數十愛其款識文字奇古因以考知三代制度與先儒所説不同者所著春秋權衡説例意林總四十巻文集六十巻弟子記五巻七經小傳五巻弟攽子奉世魏京有序上二十年始建北京以章明先帝巡狩之徳以孝思於下于是野之處士或相與議曰蓋文王都豐武王都鎬豐鎬之問不能數百里文武之位不過侯伯而詩人乃以聖人之徳天子之事歌之有如聖朝徳位相侔述作相繼而無遹駿烝哉之詩此乃處士之罪非公卿之過也乃考聲譔詞以繼大雅垂之無窮其文曰皇作大都大都雄雄奄定北國四方來同皇曰卿士在昔聖考祇遹文武維慈幼老天監在上既有明徳乃命于下罔有不復匪允命之亦章慶之匪允服之亦保育之時維玁狁侮予之疆靡度靡虞跳呼以狂業業烝黎載震載驚侵魏及澶羣心不寜帝奮厥武百萬其士匪怒以棘于三千里如虎如貔如霆如雷靡有逺邇天子其來天子來止士增其喜孰偷其生以不奮興驅之渾渾攘之賁賁靡有輈張殱厥鯨鯤或獻其寶或請其命帝振于旅維時既定屹屹魏土山河之固匪山河之固維上帝伊祜既閟爾弓既櫜爾矛玁狁臣之四方是休皇曰卿士聖孝之徳允于孝思孝思維則爾眎于魏以作我都以赫厥靈俾後勿踰皇曰卿士維帝時功時亦維人維冦萊公爾敬爾止弼予于治期爾前人用迪爾事皇曰卿士維帝作武垂是萬年莫敢予侮泰山之封后土之禪予監若兹維天是眷翼翼魏土天子國之穆穆原廟聖人則之孰為彊暴來覯來覲俾讋于威于忠是訓顯顯天子孝徳自躬率是休烈覃之北戎河水東注昭哉禹績時萬斯年天子之徳閔雨有序臣伏見春首以來天久不雨厯官李用晦治大衍軌革太醫趙從古治黄帝六氣咸以為風旱嵗惡然陛下焦心勞意側躬修徳蕃樂損膳議獄宥過以迎導善氣爰及言事得罪者唐介杜樞之徒復特見甄序小大之臣莫不欣然人情恱則天氣和矣乃三月己巳日入而雨至扵庚午詩不云乎益之以霡霂既優既渥既霑既足生我百穀以此見聖人之徳與天地符言出而物應行發而神助雖水旱之占有常數者猶不能違之況其𦕈者乎竊觀詩書所載盛徳之君至誠動天之速未有及陛下者也臣不勝鼓舞之至謹撰閔雨詩一首十三章章六句投進以聞堪與絪緼一晦一明或沈而毁或亢而暘自古以然世習為常民生㝠㝠靡究靡知其幸而吉不幸而災猖狂妄行惟所遇之天命降監在我元聖兼覆慶裕四方既定維民之恤無所疵病伊年暮春旱久不雨人曰時哉厯有常數禹湯之賢莫能弗遇帝獨喟息是豈足言化育萬物若鎔以埏患在誠薄不能動天退而齋心淵黙以居鐘鼓不抎宴游不娛左右肅然一懷瞿瞿疏獄省刑與物更始内恕孔悲引咎在已爰及四海愚智咸喜追悟讜直褒進淹滯聲色無迕左序在位嬖習權近懾威屏氣己巳乃雨若有鬼神淒淒其風渰渰其雲自東徂西罄無不均匪震匪拔匪溢匪洩生我百穀區萌畢達以享以食小大胥悦天子之徳視雨之施肇自京師達於四裔無有蠻貊孚我君恵天子之政視雨之時養老長幼速哉熈熈更化易俗而民不知天子之慶視雨之積自天降康時萬時億睂壽無疆以靖四國古風子欲富矣何用為富農不若工工不若賈子欲貴矣何用為貴徳不若名名不若勢粹兮純兮三五之人兮終窶且貧兮孰知其珍兮懷歸操蟋蟀在堂嵗云除今我不樂鬱以䊸豈不懷歸畏簡書蟋蟀在堂嵗云逝今我不樂濡以滯豈不懷歸友朋畏曉至池上宿雨墜高葉薄雲麗朝陽園林澹澹秋庭户蕭蕭涼水淺魚拂鬱荷深鷺低昂幽懷欣自得佳賞契所望忽恐羣動作深林沸蜩螗金山廨院門前松響亂頭上壁上江圖流眼前松聲水響兩不辨似有疑非心悠然安得乘興浮輕船晚涼落日蔽崑崙微風起閶闔蟲聲語悽惻樹影翻離合蚤露結明灼圓蟾瑩塵匣浩歌始自放喟此區中狹金山東崖北望海門憑高仍一望北固何崔嵬地形束吳越江險通邛崍英雄既已矣壯觀空在哉寂寥寒潮上孤帆當檻來過聖俞讀其近文明日寄之昨日過君家雙瞳偶清刮非無俗塵累喜見秋陰豁住瑟請新聲瑶音邈超越神驚自束躅不為天寒發細雨小雨滿前軒濃陰不時巻隨風氣潛潤竟日化微泫池光慘澹昏摟色依微辨寒添夕景長坐逼秋容晚楚客歌泬寥吟懷孰云淺睢陽歌梁人猶未睢陽歌隋人水調能相和梁人池臺已平地隋人岸樹空嵯峨梁人隋人去如水水聲日夜流不已張巡廟前春草生里人尚識將軍名國讎已滅心不死憤氣半夜凌蒼㝠丈夫節義豈在小願為長劍刳長鯨移葦蕭蕭江上葦秋老叢已深悠悠文王死尚懼牛羊侵遷根汚潢池慰我江湖心清風日夕過白鷺時見臨疎響拂琴瑟緑華染衣襟處卑節不改習静情足欽炎輝已堪愛秋景坐可尋願及創明堂甘心辭故林秋霽讌北軒北軒屬秋霽曉見風葉零置觴命賓友環坐飛渌醽遇適輒獻笑放言豁中扃兀然不省睡起見天上星勉强相勸引我謡子宜聴幸無兵農憂稔嵗䝉休寜讀書業文外惟有醉勿醒世途若波濤富貴乃浮萍置之無可稱視彼鴻杳㝠屏上兩賢謝靈運謝公樂山水不以官爵間天機有所賦世路從爾訕上躡巉巗峰下弄清泠澗吾生慕如此敢避刺疎慢寜為塗中龜勿作蒿下鷃王子猷人生誰不如妄為世所束興來當自往興盡斯自復大雪暗溪路新晴月微燭去非之子慕返豈斯人辱優游便所適偃蹇媚幽獨寒林石屏風屏風畫山皆任暇寒林石屏自然者蒼紋紺脈亂交加短樹高枝自瀟灑觀者寜知畫與非但怪竒妙非人為又疑古苔著石瘦何得本末無纎遺桑田變海松栢死寒暑不及榮枯期佳哉大鈞育羣類埏鎔精巧無巨細天真道貌皆生成俗師筆墨那形似居人幽獨最相宜樸厚逺謝雕鏤姿城中雲母屏更好慎勿浪示豪家兒昨日風贈王舒昨日風今日雨門前泥坑昨夜土秋懷慘悽誰最多江南秀才洛下旅十年麻衣走南北飢寒不比倉中鼠悠悠暖日庇重雲舉頭看天不得語始聞鴈冬夜何漫漫北風扇悽惻始聞南飛羽稍稍過林側來賓無乃後恐非嵗時忒朔方稽常貢物性隨變易哀音一何厲路遠霜雪積就陽既云歸感義寜自黙何為堂上士撫劍重歎激貢甫在京口阻潮未渡向晦月消魄楚濤為之衰㘭堂無深涉客子緩歸期吟遶沙步濶眺賞秋山竒大川漲南島落日明西垂登高既易賦懷古誰難詩喟彼一帶阻積此三嵗思何當命海若利涉慰調飢冬雨偶作江上朝來雨城中起寒色淒淒濕塵土漠漠寂空碧築場看已晚及物悵無益苞蓍怨下泉客子長太息雨過前軒偶作江南羇客懷鄉墅晚起前軒對零雨清波滿目如鑑中遶岸高松十餘樹砌旁芳草似汀洲巉巗殿角飛紅樓沈光倒影入浪底宛是若耶溪上頭薄霧疎烟迷近遠水色誰能辨深淺忽驚謝去塵中游不知正自居京輦何人草服倚長松迴頭誤問釣魚翁眼前景致偶相向豈異仙術游壺中桐軒曉坐孤軒遶危桐颯颯聞閙雨驚起眼前除飛花亂如舞輕香密侵席晚景寒當户玉粉散游蜂珠華濺高宇紛紛緑苔上半已隨泥土邈彼丹穴鳥何年翥文羽芳時不可驟嵗晏聊容與贈梅聖俞耳聞梅聖俞及此將十載洛下聚英豪文華富如海聖俞昔與錢丞相歐陽公尹洙王復會洛中皆名士聲名動冠劍久合參朝宷何意幕中客新違江上宰聖俞以諸侯從事知建徳縣罷歸京師高材用雖晚大器終有在三公識者多薦拔可立待棲棲九衢裏塵土增厥殆相逢恨知晚乍似去貧餒鄰居幸見過沃此胸磥磈潘道士上清宫中老道士曾從先皇去封祀山頭候夜窺火輪汾上掊鉤出金耳雲成龍虎當翠華雨師前道清泥沙萬靈扶駕百神䕶雜沓仙侣堆雲霞黄衣羽客千有餘多能引説軒轅初漢庭儒生議迂濶天子自用申公書金繩玉䇿埋石壤神光夜見連空虚天心報貺神意喜白茅玉印旌其徒帷宫賜席接虎幄待之如賓盡誠慤中書秘術使之觀神動精揺易飛躍鼎湖龍去何超越日月茫茫自淹忽龍髯墮地秋草生人世霜華滿頭髮野人致枸杞青蒿味薄時共笑野人猶相高春回有餘暇餽我杞與蒿酌酒謝其意採之亦成勞城中多好事過半稱賢豪盃肴具五鼎珠玉輕一毛將之獻門下皆有千金褒何故背此計而反從吾曹淡泊從自樂膏薌未能叨性知老夫美頗欲耕東臯因閒有餘力從人觀芟薅登禪智寺上方贈同游諸公重岡抱城起青川帶野回舊都遷陵谷遺寺空池臺修竹入晻靄荒蹊轉崔嵬鳴禽畏人起故老驚客來置酒感興廢浩歌寄歡哀伊昔遊此人于今安在哉谷深春先覺地爽景後頽造適暇一笑願君盡餘杯蔣生有序廣陵蔣生死十四年矣尸猶温其妻與其女閉門守之未嘗與鄰里通水火或者疑其有道而杜君懿實之蓋嘗有自闕來者以書一封畀其家視之蔣生之跡也故俗以為仙因作五言贈君懿仙翁棄妻子往為壺中客玉棺竟未掩人世已成昔白雲無回期三徑滅餘跡猶傳有青鳥往往寄消息楊白花飛飛楊白花隨風渡江水江水來不極楊花去無已鵶啼淺深樹雪落千萬里春氣傷人心緜緜復如此烏夜啼城頭月出天正白衆烏驚飛啼夜色枝高風多露新滴畏聲惡影不能息愁人感之拔鳴琴拂絃成聲淚沾襟嗟爾雛生八九游不過東西臨白頭反哺無所恨拍山分飛獨何心庭前菊花翠葉金華刮眼明薄霜濃露倍多情誰人正苦山中醉借與繁香醒宿酲荒田行大農棄桑避征役小農挈家就兵籍良田茫茫少耕者秋來雨止生荆棘縣官募兵有著令募兵如足官胥慶從今無復官勸農還逐魚鹽作亡命雜詩齊有梁丘據晉有樂王鮒據能愛晏嬰鮒欲殘叔譽二臣嬖兩朝事君為恱豫景有尚賢志據逆以為助平失宥善心鮒乃速其去毋以據為賢易地則同趣丈夫處世間必有遇不遇豈無覺者乎正色君亦悟區區嬖幸徒何忍就朋附贈别長安妓蔡嬌玳筵銀燭徹宵明白玉佳人唱渭城更盡一杯須起舞闗河秋月不勝情朝乗朝乘日車出暮載星影還沈㝠朝暮中出入咫尺間已覺素志非更知人理艱小利専欲速大徳不踰閑兩宋名賢小集巻五十一
