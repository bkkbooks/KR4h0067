body:
  text: 兩宋名賢小集卷二百四十三宋陳思編元陳世隆補翠微南征録二華嶽宣城道中躍馬上宣城千山翠欲顰蕙風輕卷舌櫻雨細沾唇栁絮難驅臘榆錢不買春何如澆一斗爛醉石湖濱當途道中春晴不慷慨十日九清隂蝶宿花留粉鶯眠栁借金邊塵方障眼漢壁尚關心醒去愁無奈杯行滿滿斟夀昌道中山斷疑無路林開覺有村飢牛戀茅壠吠犬護柴門悶去詩千首愁來酒一樽明朝南去路懷抱與誰論過西溪路隨馬足難知數山疊魚鱗不記名隔岸青簾人不渡一溪流水暮潮生題蓮華壁間風外落花千萬片水邉啼鳥兩三聲無情驚起陽臺夢獨倚間窗看月明贈吕元玘周末見人歌采芑楚先聞客賦離騷胸中有氣不能吐空使虹霓萬大高釣鼇行北風浩蕩滄溟濶千萬軍聲夜潮聒翻空濁浪鼓雷霆舟子停蘭面如血龍門有客何峥獰怒目張膽殊不驚桅檣破浪裂津島直欲一舉空蛟鯨我之釣兮非世比新月為鈎索霞綺先物虹霓為釣竿却把鵾鵬作香餌欲垂未垂號鬼神星斗無光天地昏海靈乞命免生死一鈎連六酬銜恩我公萬里風煙伯度量汪汪寰海窄蟠胸高聳蓬萊山壯氣直吞雲夢澤恩波萬壑奔洪流風帆浪楫交觥籌金鱗照日巨如斗四海觸物無虛舟我生本是釣鼇客幾嵗灘頭望風色忽聞霹靂破崑崙便整絲綸駕航舶我今十犗迎公開會須舉手生風雷不然長嘯謝水府明月滿船歸去來上趙漕太山之巔有喬松凛凛千丈摩蒼空風雲有會直相際轟雷掣電蟠蛟龍盤根錯節真天種卿月郎星伴辰拱高風蕭瑟涕清泉桃李無言漫丘壟南宫仙桂饒天香南國蔽芾歌井棠大枝擎天作砥柱小枝駕海成虹梁六月無風天欲雨赤龍銜火燒空宇亭亭橫蓋指扶桑萬壑千崖冷無暑大椿可笑欺莊周便指千嵗為春秋使民若戰夏后社用汝當作商川舟自慚藤蔓纒林壑未遂鷦鷯一枝樂盤桓已喜跨高寒更借扶搖薦雕鶚我聞處士方綢繆三友簡在公寧留蒼姬已託大夫蔭赤子願陪丞相逰過文脊山百峯攢碧版橋西眼力增明步武遲紅映竹籬花笑客翠翻雲幕雨催詩蕡還及第吾何愧廣不封侯子未思凡物不齊皆有謂到頭忠義是男兒熱翠微家在大江東五月鞭驢入建中雲烈火車天欲雨汗淹香葛扇無風不求殿閣千間庇却喜巖泉一線通為汲滿盂清齒頰與君行盡夕陽紅有感十年憂患客江城雙鬢蕭蕭已不禁多病不逢醫國手感懷徒有濟時心西風吹夢夜寒悄黃葉滿階秋意深休笑當年杜陵老白頭今亦不勝簮悶中賡趙丞韻壯士不同兒女曹誰云賦性太粗豪一編韜略進擒虎十犗絲綸學釣鼇劍口不磨韓信血鼎心須刮食其膏英雄多少不平氣一夜朔風爭怒號秋宵有感滿目秋容拂畫圖敗荷衰栁接平蕪西風刮地鴈聲落寒月滿天人影孤木耳有才持紫槖楮皮無計換青蚨不知此去功名事還許封彛見也無過羊腸嶺拂面東風吹夕陽路蟠千折過羊腸山疑隨馬回回見花欲撩人故故香世路與誰分曲直人情於我自炎涼何當更上風煙上為把窮途問彼蒼宿橫溪橋夜宿橫溪煙霧間睂頭歸路萬山攢連天麥浪波千頃撲地楊花雪一團餘鏹不供春後醖夾衾猶怯夜來寒征夫莫怪車音澀自是愁多行路難初抵富沙芳草不隨春水緑連山猶帶夕陽明人生有酒且行樂休向河梁問子卿鞭鐙兩三千里路樓臺數十萬人家長虹不吸秋江水一夜扁舟懸雪花呈周及之貢元一頭却過六七嶺兩足幾乎百十斤恰喜故人能下榻檠窗樽酒細論文寧川冷渡峯回路轉六七里林靜鳥啼三四聲逰女不知行旅恨一茶留我話平生宿灌頭淡魚才煮醎魚熟白酒新篘紅酒香莫訝杯盤成草草一年忙處是蠶桑南浦水閣橋橫南浦虹千丈栁護西溪翠一行佳麗不知滋味惡插花臨水照紅糚次李信州七十韻挺挺萬人傑堂堂間世賢胸中兵千萬足下客三千揚賦希三嘆坡詩和百篇錦囊華似衮綵筆大如椽隨陸縱橫舌良平左右肩兩驂公子服四牡魯侯畋量濶滄溟岸胸蟠泰華巔紅壇歌魯杏白社結陶蓮遣幣通秦好求姻託鄭㜕匣藏須虎兕冠飾待貂蟬幖自龍頭奪書由雁足傳不侯嗤李廣求使短張騫食客希毛遂茶僧集大顛詩材親子建字法邁公權黃貉蒙金絡青驄勒寶韀代燕欺騎劫聘魯慢韓穿周室歌山甫齊人美仲連劍從豐水鑄碑向峴山鐫有頌褒唐太無詩刺衛宣檄堪傳代郡節可仗居延聽訟踈淹禁豐財剔冗員䇿從之反後鞭著祖生先孝有參而已忠如丘者焉春氷同皎潔秋月共嬋娟冡宰當鈞軸將軍事櫜鞬千官視標凖萬國倚陶甄多士圜冠帶諸侯執豆籩山期封泰岱石擬勒燕然禹甸期環轍堯氓願受㕓明堂歌赤紱清廟頌朱絃臺閣皆三益盤盂記十愆片言能息訟隻手可旋乾公昔嘗推轂吾今尚食饘聞雞效劉舞抱虎笑秦眠蘇子舌猶在邉韶腹尚便牛衣懷白璧虎節誓青氊飲馬量淝水屯兵料漢田鬢星飛洛汴血雨灑伊瀍尹五成湯就軻三孟母遷雲鋤翻楚嶠月纜繫秦川甕有扶頭酒厨無縮項鯿詞源慚子美詩社感庭堅水陸三千里炎涼二十年周田才廢井秦陌已開阡夜月琴三弄春風詩一聨自稱山宰相人號地神仙扣馬罹三尺平戎授一編鼠投當忌器魚得偶忘筌避地思無所滔天罪莫湔梁鴻方北謫賈鵩已東旋孫刖難謀魏樊誅莫救燕江天驅鳥雀淮地迅鷹鸇日守娵訾分星流太白躔瘡痍連四境煨燼極三邉淮浪夜翻雪邊塵晝起煙二陵歸培塿百闕自撫劉生几誰思祖逖鞭戍方興頡利役莫闕漫宫昔嘗遊泮扉今漫歎圜豈知醫國手變作闕楚客弓雖失秦人璧幸全宦途良可畏吏鞅不闕世變言難盡民頑令不悛一千新楮劵三百舊銅錢駟馬涎流地羣烏翼蔽天人心徒擾擾王道自平平衛女歌淇澳曹人思下泉窮途惟自愧當路有誰憐作俑宜無後追俘恐不前詩成何太喜舞袖欲蹁躚送倪尚書赴召守節如初未足觀毫釐終始實其艱鄭公勇却樞衡貴衛叔羞居荷槖班冷暖萬端炊飯頃是非一著奕棋間江湖無限孤高客拭目看公此召還宿嚴瀨遐想高風殊未涯檥舟夜訪子陵臺銜山西照情何限逝水東流夢不回雙漿未聞卿月過一尊先為客星開東都人物俱煨燼獨有先生迹未灰顯澤民廟生握藩旌死象黎澤民山下澤民溪蒼天九重開日月赤地千里興雲霓假寐商宗曽得説爵高韓信屢封齊英雄不入蒼生眼願借高風吹馬􅕭早春即事楊栁絲絲㺯淡黃怯寒燕子未歸梁曉迷芳草騅騣濕夜宿間花蝶翅香得句自慙非子美賞音猶恐誤中郎願言相約花前醉莫放春容過海棠早行述懷歸心夜半已飛揚喚僕吹燈促晚裝雞翅拍斜茅店月馬蹄剜破版橋霜二陵萬里埋荆棘十廟百年生稻梁安得有臣如祖逖慨然擊楫誓江長題易村路轉峯回覺有村數間栁屋瞰山隂午炊已飽翻匙玉臘醖仍拚挂杖金窮去作文和鬼送興來得句倩蟬吟一聲橫笛斜陽外吹起江湖萬里心秋晚獨步十分秋色著嵓桂幾陳晚涼催井桐自恨異鄉知遇少一尊相屬與誰同兩宋名賢小集卷二百四十三
