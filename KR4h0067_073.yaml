body:
  text: 兩宋名賢小集卷七十三宋陳思編元陳世隆補藜齋小集華鎮字安仁會稽人元豐二年進士官至朝奉大夫博古工詩文嘗輯會稽覽古詩幾百餘篇最稱精核傅嵩卿稱其詞格清麗興寄深逺足以垂觀來者今其書亦罕傳舊志乘中間有數首而已子初平亦登進士為太常博士有越中考古録雲門寺外勝迹諸詠王中令裔孫智永善𨽻草為世所重求者弗違戶外之人如市所居限頻為之毁以鐵固之時號鐵門限真草千字文十九年成一千通栁誠懸稱其書得家法世傳右軍蘭亭其迹弟子辨才尤加寶祕貞觀中求之不得至使蕭翼設竒而取之山中父老尚能道其事鐵限僧坊迹未移千通真草了無遺蘭亭墨迹何由見秪説蕭郎奉使時鄭相廟鄭公起樵風用郡守第五倫之薦致位三公與倫並列可謂盛矣祠宇之下至今猶有風朝南暮北鳴玉鏘金漢上公當年榮與舊君同故山廟食千秋後來往猶乘旦暮風秦望山秦始皇東巡登髙歷覽刻石紀功故曰秦望秦人兩世盡東遊輦輅曽臨到上頭睫在眼前終不見不知登望竟何求葛仙翁釣臺若耶溪葛仙翁投迹之地苔磯孤秀起于中潭環山千疊澄淵無底清光翠色上下相照迥然不類于人境謝客兒兄弟悅之日至其上更酬迭唱夕而忘歸聞説風流謝客兒鴒原相應日鳴飛仙翁遺迹雲深處擕手行吟送落暉五雲溪徐季海曰曽子不入勝母之閭吾豈泛若耶之溪由是目之為五雲今亦曰徐浩五雲發源于雲門其流達于樵風涇湖山之間此為竒絶萬壑千岩秀氣鍾鳴琴潄玉曉玲瓏瑞雲重疊中書館花浪騰稜相國風樵風涇鄭巨君名𢎞採薪若耶山中得仙人遺箭歸之而獲便風之報千載之下朝暮不渝碧山重疊水溶溶南北長來旦暮風岩壑會稽真勝絶樵蘇猶是漢三公鄭公泉鄭太尉𢎞若耶山居有美泉雅嗜其味嘗有疾藥石不能愈家人取山泉飲之即愈山泉非攻病之良藥其美不稱於三公之奉飲之而疾愈者常性素好不為富貴移也鄭公之所飬在富貴當何如哉溪上清泉玉色寒臨泉踏盡石苔斑為憐北闕乘軒客白首髙情在舊山城山其山中卑四髙宛如城堞吳伐越次查浦句踐保此拒吳又名越王城有佛眼泉洗馬池泉中産嘉魚越拒吳時吳意越之乏水以鹽魚為饋越取雙魚答之遂解圍去兵家制勝舊多門贈答雍容亦解紛緩報一雙文錦鯉坐歸十萬水犀軍鏡湖亦名鑑湖任昉述異記軒轅氏鑄鏡湖邊因得名或云黃帝獲寶鏡焉或又云本王逸少語山陰道上行如在鏡中逰故名水風不動清光合十里渾無一點瑕野客若尋湖上事不須臨水問荷花雙筍石在上虞縣釣臺山髙百餘丈若人冕而對峙者其巔有異花每杜鵑啼時開若霞錦神宗崩三年不榮髙宗崩花忽變白孝宗崩三年若枯既而復茂千尺相髙卓翠珉雨餘雲外露嶙峋鼎湖龍去蒼髯斷三載叢花不記春放馬澗在新昌縣支道林放馬之所或譏道人養馬不韻答曰貧道賞其神駿春草茸茸澗水清路人猶記昔時名金羈縱後雙蹄逸想見風前蹀躞聲虞國墅在餘姚羅壁山襟帶溪山大勢具體金谷郗太宰遍逰諸境棲情于此每至良辰携子逰憩後以司空臨郡遂卜居之山列翠屏圍碧落水流鳴管繞平田郗家池館蘿蕪沒金谷形容自渺一作宛然陳大夫宅在越城東南禮遜坊竹園巷之間漢大中大夫陳囂未貴時與紀伯為鄰伯竊囂藩地以自益囂見之不言益徙地與之伯慙亦歸所侵地其中乃為大路鴻嘉二年太守周君刻石表曰義里長簷路鄰里相歡起美談通衢髙栁碧鬖鬖至今風俗稱虞芮目擊岐周始自慙燕竹越人以其燕來時出筍甚美因以為名竹箭黃芽欲老時杏梁日暖燕初歸他林未聳千竿翠此地先抽一握肥孟橋橋南漢孟嘗宅也漢上還珠太守家小橋斜跨碧流沙清風不共門墻改長與寒泉起浪花兩宋名賢小集卷七十三
