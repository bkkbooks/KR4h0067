body:
  text: 兩宋名賢小集卷一百二十九宋陳思編元陳世隆補飄然集歐陽澈字徳明撫州崇仁人建炎初徒歩走行在伏闕上書請誅汪黄等與陳東俱死扵市紹興中贈祕閣修撰有飄然先生集醉中食鱠歌君不見秋風未發鱸正肥張翰思歸心欲飛又不見田文有客歌彈鋏為嘆無魚聲激烈水晶細鱠落金盤須信江南味中絶山谷曽名醒酒氷一筋未嘗延俗客助盤橙橘薦甘酸入口瓊瑶碎牙頰扶起嵇康頽玉山滌破樂天醉吟魄烹龍炮鳯未云珍䇿勲終是愧霜鱗江湖散人興不淺為羡此品常垂綸有時舉竿獲錦鯉玉屑花中拚爛醉笑他大嚼市㕓流浪説屠門能快意靈運池中蓄頗多揚鬐鼔鬛戲清波知我平生嗜此癖霜刀細縷紅玉搓典衣沽酒試轟飲纈紋入面春風和平生逸氣射牛斗功名未必常蹉跎醉来擊劍歌白雪閒愁萬斛俱消磨俗態翻雲仍覆雨世情炙手復張羅丈夫富貴當自致恥傍權門效女蘿雄圗自許羞俯仰請看毫端食鱠歌七夕後一日寄陳巨濟去年七夕待試臨川二三友從遊於巽溪閣江山氣象如在氷壺玉鑑中汝川勝㮣一目而盡酒酣興發舒牋㸃翰争賦新詩以攄逸氣今年七夕憂患沮䘮胸臆結束强追談笑㑹諸友飲於蘧軒眼對景物緬懷舊事愴然驚怛黎明欲遣人問巨濟動静戲作古詩以供捧腹髙楼昨夜西風轉耿耿銀河雲葉卷擎空皎月弄嬋娟領畧溪山堪指㸃秋光次第磨青銅一味清凉襲庭院遥知天外鵲橋成牛渚黄姑㑹佳燕凭髙翻憶鳯楼人慇懃乞巧陳芳奠可堪目斷心旌揺砌成幽恨無人展促樽欣得莫逆交脉脉閒愁憑理遣清狂舉白話平生午夜香然殘寳篆凄凉此際憶年時爛漫瓊楼興不淺重遊寥陽洞有感尋真曾到寥陽殿小立廊腰花影轉飛瓊仙子下瑶臺綽約雲鬟眼波剪水沉烟斷一簾秋醉睡海棠紅玉軟武陵歸去探年華揚州夢覺江波逺重来風物恰依然愛日融融素烟卷洞門寂歴鎖長春異木槎枒插天半霞衣苒苒媚東風緑鎖窓前重識面酒酣春笋理琵琶曲終依約含幽怨人間名利幾時休馬蹄不駐空留戀桃花流水古猶今回首碧雲人不見和答徳秀長句摩雲標格儒林秀濯濯美如春月栁毫顛文陣轟雷槌字勢龍蛇翻夭矯才名藉甚燭景星卓然可獨尊南斗締交雲路許攀鱗談我諄諄不離口層樓長記聳詩肩吟苦任渠嘲太瘦暗中輕擲道途人相視誰論報瓊玖强搜斐句答慇懃當恕人才有能否古詩寄游良臣兼簡陳國鎮􅐽鹽興淺知無策謝絶歸来事清白亂絲心緒尚紛如時對風簷獨捫虱㑹看稽古補前愆赤水遺珠不難索仰公學問日芳新磨礱幸偶謫仙人遥知議論到佳處眉間喜氣常津津我慚蹤跡浪萍梗欲親棐几嗟因循飛奴寥落絶問福渇心依約生埃塵以膠投漆貴耐久回光借燭期知貧情均骨肉非有素白玉琢成心始固莫學紛紛輕薄兒世情翻覆成雲雨登雲依舊髙嵯峨指掌江南勝㮣多佳眠風物未入夢疑泛靈槎遊絳河朅來乗興湏一徃飛觴爛醉横秋波譍門况有金閨彦筆驅麗景森吟哦悠悠此志遂何日款段相期踏雪過夢仙謡良臣拉僕醉於臨川巽溪閣江山勝㮣一目殆盡滿飲巨觴惟恐告竭酒酣興發猖狂不知所如遂爛遊花栁適有竒遇灑然非塵土之境醒而思之恍如夢覺噫浮生荏苒時一夢耳而於夢之中適有好夢焉豈容於黙黙作夢仙謡以紀其盛事云知其夢者試揮鳯藻以繼韻否寥陽洞口風烟好枯木槎枒插雲島重重金鎖遶婵娟滿地落花常不掃蕭郎聞説已乘鸞空餘九轉燒丹竈烟霞截斷絶非塵凡夫蹤跡無由到髙陽有客攜佳侶訪異尋幽豁襟抱瓊楼酒散恣歡遊誤入蓬壺如夢覺雲闗初叩閴無人松梢鶴唳如驚報須臾奓户迎者誰吳宫女児面凝脂指㸃蘭堂篆烟裊珠箔玲瓏窣地垂髙擎翠袖輕輕捲半露妖嬈素蓮臉嫣然一笑啟檀脣喚我躋堂語聲軟相随環坐一軒秋旋列杯盤供雅宴倚風仙蘂似有情競吐芳苞噴香逺朝雲一段下陽臺綽約標容塵世鮮黛眉輕拂逺山青明眸斜盼秋風剪蘭柔栁弱不禁風睡起芙蓉香體顫櫻桃緩啟歌貫珠夕陽花外流鶯囀曲終低語愈含情自訴芳心猶未展苞藏惟恐泄真香尋常嬌怯羞鶯燕為憐坐客俱多才拚羞試許求相見安然若有惜花情願丐錦章鐫琬琰温柔淑恵已無雙更聴斯言真絶艶放懐舉白不暫停酷嫌鸚鵡杯中淺醉玉頽山卧綺窓秋水一牀凝角簟悠颺好夢入巫峯洩洩溶溶興正濃遽然夢覺一何有㸃綴餘霞散眼封依約餘香散滿袂行雲縹緲已無蹤壺中天地古来有黙想風物遥應同我聞劉阮曾迷路武陵邂逅如花女靈丹咀嚼頓輕身脱洗紅塵已仙去又聞仙去有蕭防曾耦雙成飲玉漿一朝誤入華陽洞于飛終許學鸞凰仙凡異境無憑據每笑前聞但虚語豈意親逢事偶符始信人間有竒遇歸來燈火欲黄昏隠几無聊暗追慕濡毫始作夢仙謡端欲夢魂重黙悟寄周居安周郎辭氣帶烟霞凛凛秋霜嚼齒牙麈尾動思談吐屑筆頭遥想夢生花三年幸獲從遊款一别那知歳月賖逺欲飛奴傳翰墨顔筋栁骨儼秋蛇秋試下即事有感寄國鎮籬菊金英噴異香杜門岑絶獨持觴風掀脱葉横斜舞雲襯平林淺淡黄塞管有情増哽噎野花無緒伴凄凉不禁景物撩秋眼剩與新篇付錦囊戲促朝宗酒約雨収雲海湧金盆簾捲香絲破篆文小立不妨人解珮閒眠應有客書裙未饒靈運吟春草端憶長庚醉暮雲顧我從容尚無躁韓公何惜為三薰春日書事寂寂園林照日遲花梢經雨漫臙脂輕烟薄縠籠深塢細草援苴蘸小池暖力著人添醉聖韶華入眼逼詩脾賞心不惜千金價冷笑閭閻數米炊春霽繡出園林霽色新長郊芳草緑無垠日籠瑞氣輕浮幌風掠花芬暗襲人蝶慕竊香爭趂暖鶯思求友競啼春試将何物澆詩膽活火調湯濺玉塵臨溪弱栁栁弄嬌黄暖律催臨溪約畧笑殘梅鴨頭春水回環緑龜甲屏山掩映開媚日依依籠霧閣揺風裊裊拂烟桅柔絲恨不同攀折獨立江臯首重回原上晚歩聞笛有感一笛誰横透晚空傷懷真作鳥窺籠解龜换酒無知已拾穂行歌説屡豐沐雨秋山遮眼碧舞風霜葉㸃溪紅老農植杖來相問籍草髙談夕照中遣興示子賢安貧萬事祗随縁羞澀嚢空乏一錢濁酒難賖應有恨焦琴屡典已無絃飯盂抄雪惟求飽茗盌翻濤喜自煎錦里先生有詩巻破愁時誦兩三篇傅巖居士挽詞夢寐江湖僅十年桑榆投老逋林泉知人襟抱藏英鑒竒我風標喚謫僊妙論粲花今已矣遺編戞玉尚依然桐焦里巷知音少幾對雲齋欲斷絃渉傳巖有感簡朝宗招提清曠朅来逰潑墨嵐光眼界幽黄絹碑亡思子禮碧雲詩好憶湯休風簷目送書雲雁烟塢愁聞喚雨鳩銷爍睡魔澆洗盌桐窓拾得一枝秋陳欽芳時寓盤龍作詩寄之因紀吟咏之美凛凛氷霜嚼齒牙沈沈清夜詠簷花摩雲氣逸干星斗落紙詞妍帶綺霞醉掃麝煤奔渴驥困紆象管引秋蛇擬尋紅樹賡詩社却日揮戈不許斜讀傳巖居士舊詩軸有感黄鵠凌雲不可尋遺音流落感人心朱顔緑鬢留難駐明月清風古到今韞櫝有時驚卞璞絶絃無地置牙琴傳巖蕭瑟傷心處一局文楸鎖竹林朝宗見和復自韻謝之拾得佳篇李賀門鸞牋重録教諸孫清於月夕瀟湘水淡似清秋太華雲發藥例雖霑賸馥鈎深應寡與元文何時紅樹尋詩社琢句令傾㶑灔樽歸途遣興借朝宗韻簡敦仁緩著歸鞭水石鄉息鞍箕踞小橋傍烟滋竹葉雙叢玉秋著蘆花一㟁霜潑眼溪山増爽氣襲人蘭蕙破幽香擬提吟筆扛洪鼎反笑蚍蜉不自量自鵞橋復用前韻旗亭解轡詠江鄉屬玉雙飛緑澗傍水墨園林初過雨青黄橙橘未經霜鼎烹雲液澆膓爽甕潑春醅破鼻香回首漫驚烟水逺向来清味怯思量和顯道筠軒有作欲引秋聲竹旋移吟烟時一啟柴扉了無俗状到公眼每有清風襲客衣地癖不知炎暑老身閒潛覺道心㣲茫茫塵事俱臧榖羞偶閭閻較是非和世弼蓼花糚㸃千叢蘸碧流寜甘淡沱對清秋白蘋許共揺風細黄菊欣同占景幽羞泄異香招舞蝶獨施繁艶伴漁舟懵騰醉眼牽情處贏得凄凉一段愁謝人恵紫竹杖王猷珍重恵龍孫䇿險扶危價莫論爛醉懸錢過酒肆狂吟歩月打僧門虚心尚有凌雲操勁節元無染淚㾗寄語香山老居士朱藤從此未為尊和前韻紀登髙醉中景示世弼諸友芳晨秋興浩無涯結客凭髙酒旋賖送目喜觀雲縹緲狂歌誰顧帽攲斜笑他子美㸔茱實要學樊川揷菊花競説今年幸逢閏再期攜手躡烟霞和子賢對景有感次九日韻醉撥春雲一甕香潜欣積雨破秋陽燈龕宜入詩書府錢杖慵吟水色鄉忘慮不斑潘岳鬢養恬難斷廣平膓賞音誰謂無蕭頴時綴雄文弔戰塲世弼原上晚望和韻見寄因復之緑消暮靄滿空秋念逺凭髙隴上逰一片孤雲生逺岫𢾗聲哀雁落寒流風前無緒愁聞笛天際何人誤識舟歩月可尋岩下叟試将圎玉鎮神頭鳩杖吟行笑撥雲多疑賈島是前身名髙鄭谷耕烟叟樂過嚴灘釣月人俯聼鳴蛩争唧唧潛看宿鳥各親親田家有秫俱篘酒乘興何妨徧訪隣州學貴中庭上作漠漠隂凝水墨天雨絲成陣拂窻前千層叠巘籠輕靄一帶澄江鎖淡烟歸思似雲空散亂名蹤如葉尚留連當時錯笑悲風賦今日閒愁須黙然秋日居山振衣拂曉啟松扃月淡風清酒漸醒密竹含烟争滴翠幽蘭浥露逺聞馨清憐髙潔蝉嘶栁閒羡優㳺鹿食苹試枕碧流端洗耳白雲深處誦黄庭一抺輕烟鎖逺山眼前瀟灑脫塵寰投林宿鳥相呼喚出草飛螢自徃還吟擬停杯邀月飲醉蘄支枕伴雲閒因風拾得新詩句獨倚髙梧笑解顔寄良臣耳冷清談倐半年渴心如憶嶺頭泉自慙記迹多南北無復從逰學聖賢莫謂卑飛同斥鷃已全髙潔慕鳴蝉荒凉不厭幽居趣假道何妨試着鞭督徳秀還酒㑹緑鎖窻前聚首時戲弹圓玉偶輸機侑觴既欲攜紅袖送酒何妨遣白衣酩酊預期歸倒載從容端的話𤣥㣲揮戈直使頽陽却不計西風隐半歸臨川戲留友人山童澤涸欲金流小雨簾纎陡變秋河朔飲徒方快意鱸魚歸興不如休歌姝况有飛瓊侶結客當為擲果逰一曲陽闗腸斷盡未應聞此不遲留子賢和韻見酬次答之詩名浪得在盧前器識慙非叔度賢捉月笑他吟采石凌雲端欲賦甘泉發硎喜淬衝牛劍啟齒羞談使鬼錢平世未應徒爾爾行藏終與古人肩和子賢秋日晚望溪山潑墨水雲秋似綺餘霞次第収燦燦拒霜鋪蓼㟁雙雙屬玉舞蘋洲杳無錦字来憑雁擬滅機心試狎鷗望裏碧雲還又合數峰江上忍擡眸朝宗以詩贈行和酬二篇一以留别一以謝詩潄醪常共醉琳瑯魚目慙㳺漲海傍琴聼雅音彈碧玉鼎分靈劑煉𤣥霜纒腸錦繡篇章麗入室芝蘭燕寝香欲别未應徒爾爾鵬程萬里事難量鍛鍊新詩摘錦囊筆驅秀麗汝川傍氣横阿劍疑干斗韻入豐鐘必待霜遒勁狂揮毛頴疾淋漓醉掃麝煤香珠璣喜就鮫人乞収拾端期百斛量輕風破暖單衣初試輕寒退嫋嫋軟風襟袖快層樓髙捲酒旗斜綺陌亂飄花錦碎多情故把惱人腸楊栁隂中弄暗香解貂不惜换斗酒爛醉春光能幾塲杜宇啼紅蜜脾香滿青春暮寂寂空山聞杜宇啼紅泣緑怨東風錦城舊恨懐千古可堪腸斷對樽前雄圗未遂愁無邉頼有提壺勸我飲起舞從教落醉船喜雨北窓支枕夢初回風掠餘香特地來顛倒衣裳望池上荷花無語為誰開楊栁藏鴉菡萏香水亭風榭襲羅裳秋光正入詩人眼剩得餘篇付錦囊歸自臨川途中感物遇事寄秀美信馬沿堤懶着鞭不堪回首望臨川滿懐離恨如春夢愁聼林梢斷續蝉啾唧蛩吟旅况凄那堪孤枕酒醒時夢魂栩栩知何處依約幽軒話别離忩含月影夢初回一枕凄凉眼懶開幽恨閒愁本無種根苗不識是誰栽有寄懵騰醉眼漾嬌波心印潛通一捻多密寄斷腸雙麗曲遏雲須倩雪児歌和子賢途中暫停雙槳傍蘋洲磯上漁翁雪滿頭釣破烟波深得趣生來不識世間愁索寞襟懐不奈秋雕鐫佳句且忘憂行行恰過橋南路一片蘆花映碧流桐圭栁帶正凋疎匹馬區區倦逺途腸斷不堪回首處寒雲影裏雁聲孤和答國鎮十圍便腹卧邉先笑傲羲皇訪昔賢詔下好須同舊侣槐花香裏走連錢寄游良臣壮浪年來筆有神詩如開府頓清新暗中慎莫投珠璧道路無非按劍人文㑹何時聚徳星紫芝眉宇照人清錦韉並控尋春馬持酒憑花為解酲夏日出郊亭和晏尚書韻關闗啼鳥樹交隂雨過西城野色侵避暑誰能陪劇飲清歌自可滌煩襟稻花欲秀蟬初嘒菱蔓初長水正深知有江湖杳然意扁舟應得共追尋曉發吴城山風掃陽侯雪陣平雨催摩詰畵圖成氣吞浦溆重林盡秋著江湖去鳥明厚禄故人無一字長年三老伴餘生㑹須滿意開懐抱到眼廬山不世情兩宋名賢小集巻一百二十九
