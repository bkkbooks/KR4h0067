body:
  text: 兩宋名賢小集卷一百二十九宋陳思編元陳世隆補飄然集歐陽徹字德明撫州崇仁人建炎初徒步走行在伏闕上書請誅汪黃等與陳東俱死于市紹興中贈祕閣修撰有飄然先生集醉中食鱠歌君不見秋風未發鱸正肥張翰思歸心欲飛又不見田文有客歌彈鋏為嘆無魚聲激烈水晶細鱠落金盤須信江南味中絶山谷曽名醒酒氷一筋未嘗延俗客助盤橙橘薦甘酸入口瓊瑶碎牙頰扶起嵇康頽玉山滌破樂天醉吟魄烹龍炮鳯未云珍䇿勳終是愧霜鱗江湖散人興不淺為羡此品常垂綸有時舉竿獲錦鯉玉屑花中拚爛醉笑他大嚼市㕓流浪説屠門能快意靈運池中蓄頗多揚鬐鼓鬛戲清波知我平生嗜此癖霜刀細縷紅玉搓典衣沽酒試轟飲纈紋入面春風和平生逸氣射牛斗功名未必常蹉跎醉來擊劍歌白雪間愁萬斛俱消磨俗態翻雲仍覆雨世情炙手復張羅丈夫富貴當自致恥傍權門效女蘿雄圗自許羞俯仰請看毫端食鱠歌七夕後一日寄陳巨濟去年七夕待試臨川二三友從遊於巽溪閣江山氣象如在氷壺玉鑑中汝川勝概一目而盡酒酣興發舒箋點翰爭賦新詩以攄逸氣今年七夕憂患沮喪胸臆結束強追談笑會諸友飲於蘧軒眼對景物緬懷舊事愴然驚怛黎明欲遣人問巨濟動靜戲作古詩以供捧腹髙樓昨夜西風轉耿耿銀河雲葉卷擎空皎月弄嬋娟領略溪山堪指點秋光次第磨青銅一味清涼襲庭院遙知天外鵲橋成牛渚黃姑會佳燕憑髙翻憶鳯樓人殷勤乞巧陳芳奠可堪目斷心旌搖砌成幽恨無人展促樽欣得莫逆交脈脈間愁憑理遣清狂舉白話平生午夜香然殘寶篆凄涼此際憶年時爛漫瓊樓興不淺重遊寥陽洞有感尋真曾到寥陽殿小立廊腰花影轉飛瓊仙子下瑶臺綽約雲鬟眼波剪水沉煙斷一簾秋醉睡海棠紅玉軟武陵歸去探年華揚州夢覺江波逺重來風物恰依然愛日融融素煙卷洞門寂歷鎖長春異木槎丫插天半霞衣苒苒媚東風緑鎖窗前重識面酒酣春笋理琵琶曲終依約含幽怨人間名利幾時休馬蹄不駐空留戀桃花流水古猶今回首碧雲人不見和答德秀長句摩雲標格儒林秀濯濯美如春月栁毫顛文陳轟雷槌字勢龍蛇翻夭矯才名藉甚燭景星卓然可獨尊南斗締交雲路許攀鱗談我諄諄不離口層樓長記聳詩肩吟苦任渠嘲太瘦暗中輕擲道途人相視誰論報瓊玖強搜斐句答殷勤當恕人才有能否古詩寄遊良臣兼簡陳國鎮􅐽鹽興淺知無策謝絶歸來事清白亂絲心緒尚紛如時對風簷獨捫虱會看稽古補前愆赤水遺珠不難索仰公學問日芳新磨礱幸偶謫仙人遙知議論到佳處眉間喜氣常津津我慚蹤迹浪萍梗欲親棐几嗟因循飛奴寥落絶問福渴心依約生埃塵以膠投漆貴耐久回光借燭期知貧情均骨肉非有素白玉琢成心始固莫學紛紛輕薄兒世情翻覆成雲雨登雲依舊髙嵯峨指掌江南勝概多佳眠風物未入夢疑泛靈槎遊絳河朅來乘興須一往飛觴爛醉橫秋波譍門况有金閨彥筆驅麗景森吟哦悠悠此志遂何日款段相期踏雪過夢仙謡良臣拉僕醉於臨川巽溪閣江山勝概一目殆盡滿飲巨觴惟恐告竭酒酣興發猖狂不知所如遂爛遊花栁適有竒遇灑然非塵土之境醒而思之恍如夢覺噫浮生荏苒時一夢耳而於夢之中適有好夢焉豈容於默默作夢仙謡以紀其盛事云知其夢者試揮鳯藻以繼韻否寥陽洞口風煙好枯木槎丫插雲島重重金鎖繞嬋娟滿地落花常不掃蕭郎聞説已乘鸞空餘九轉燒丹竈煙霞截斷絶非塵凡夫蹤迹無由到髙陽有客攜佳侶訪異尋幽豁襟抱瓊樓酒散恣歡遊誤入蓬壺如夢覺雲關初叩閴無人松梢鶴唳如驚報須臾奓户迎者誰吳宫女兒面凝脂指點蘭堂篆煙裊珠箔玲瓏窣地垂髙擎翠袖輕輕捲半露妖嬈素蓮臉嫣然一笑啓檀脣喚我躋堂語聲軟相隨環坐一軒秋旋列杯盤供雅宴倚風仙蘂似有情競吐芳苞噴香逺朝雲一段下陽臺綽約標容塵世鮮黛眉輕拂逺山青明眸斜盼秋風剪蘭柔栁弱不禁風睡起芙蓉香體顫櫻桃緩啓歌貫珠夕陽花外流鶯囀曲終低語愈含情自訴芳心猶未展苞藏惟恐泄真香尋常嬌怯羞鶯燕為憐坐客俱多才拚羞試許求相見安然若有惜花情願丐錦章鐫琬琰溫柔淑惠已無雙更聽斯言真絶艷放懷舉白不暫停酷嫌鸚鵡杯中淺醉玉頽山卧綺窗秋水一牀凝角簟悠揚好夢入巫峯泄泄溶溶興正濃遽然夢覺一何有點綴餘霞散眼封依約餘香散滿袂行雲縹眇已無蹤壺中天地古來有默想風物遙應同我聞劉阮曾迷路武陵邂逅如花女靈丹咀嚼頓輕身脫洗紅塵已仙去又聞仙去有蕭防曾耦雙成飲玉漿一朝誤入華陽洞于飛終許學鸞凰仙凡異境無憑據每笑前聞但虛語豈意親逢事偶符始信人間有竒遇歸來燈火欲黃昏隱几無聊暗追慕濡毫始作夢仙謡端欲夢魂重默悟寄周居安周郎辭氣帶煙霞凛凛秋霜嚼齒牙麈尾動思談吐屑筆頭遙想夢生花三年幸獲從遊款一别那知歲月賖逺欲飛奴傳翰墨顔筋栁骨儼秋蛇秋試下即事有感寄國鎮籬菊金英噴異香杜門岑絶獨持觴風掀脫葉橫斜舞雲襯平林淺淡黃塞管有情增哽噎野花無緒伴凄涼不禁景物撩秋眼剩與新篇付錦囊戲促朝宗酒約雨收雲海湧金盆簾捲香絲破篆文小立不妨人解珮間眠應有客書裙未饒靈運吟春草端憶長庚醉暮雲顧我從容尚無躁韓公何惜為三薰春日書事寂寂園林照日遲花梢經雨漫胭脂輕煙薄縠籠深塢細草援苴蘸小池暖力著人添醉聖韶華入眼逼詩脾賞心不惜千金價冷笑閭閻數米炊春霽繡出園林霽色新長郊芳草緑無垠日籠瑞氣輕浮幌風掠花芬暗襲人蝶慕竊香爭趂暖鶯思求友競啼春試將何物澆詩膽活火調湯濺玉塵臨溪弱栁栁弄嬌黃暖律催臨溪約略笑殘梅鴨頭春水回環緑龜甲屏山掩映開媚日依依籠霧閣搖風裊裊拂煙桅柔絲恨不同攀折獨立江臯首重回原上晚步聞笛有感一笛誰橫透晚空傷懷真作鳥窺籠解龜换酒無知已拾穗行歌説屢豐沐雨秋山遮眼碧舞風霜葉點溪紅老農植杖來相問籍草髙談夕照中遣興示子賢安貧萬事祗隨緣羞澀囊空乏一錢濁酒難賖應有恨焦琴屢典已無絃飯盂抄雪惟求飽茗碗翻濤喜自煎錦里先生有詩卷破愁時誦兩三篇傅巖居士挽詞夢寐江湖僅十年桑榆投老逋林泉知人襟抱藏英鑒竒我風標喚謫仙妙論粲花今已矣遺編戞玉尚依然桐焦里巷知音少幾對雲齋欲斷絃涉傳巖有感簡朝宗招提清曠朅來逰潑墨嵐光眼界幽黃絹碑亡思子禮碧雲詩好憶湯休風簷目送書雲雁煙塢愁聞喚雨鳩銷爍睡魔澆洗碗桐窗拾得一枝秋陳欽芳時寓盤龍作詩寄之因紀吟咏之美凛凛氷霜嚼齒牙沈沈清夜詠簷花摩雲氣逸干星斗落紙詞妍帶綺霞醉掃麝煤奔渴驥困紆象管引秋蛇擬尋紅樹賡詩社却日揮戈不許斜讀傳巖居士舊詩軸有感黃鵠凌雲不可尋遺音流落感人心朱顔緑鬢留難駐明月清風古到今韞櫝有時驚卞璞絶絃無地置牙琴傳巖蕭瑟傷心處一局文楸鎖竹林朝宗見和復自韻謝之拾得佳篇李賀門鸞箋重録教諸孫清於月夕瀟湘水淡似清秋太華雲發藥例雖霑賸馥鈎深應寡與元文何時紅樹尋詩社琢句令傾瀲灔樽歸途遣興借朝宗韻簡敦仁緩著歸鞭水石鄉息鞍箕踞小橋傍煙滋竹葉雙叢玉秋著蘆花一岸霜潑眼溪山增爽氣襲人蘭蕙破幽香擬提吟筆扛洪鼎反笑蚍蜉不自量自鵝橋復用前韻旗亭解轡詠江鄉屬玉雙飛緑澗傍水墨園林初過雨青黃橙橘未經霜鼎烹雲液澆腸爽甕潑春醅破鼻香回首漫驚煙水逺向來清味怯思量和顯道筠軒有作欲引秋聲竹旋移吟煙時一啓柴扉了無俗狀到公眼每有清風襲客衣地癖不知炎暑老身間潛覺道心微茫茫塵事俱臧榖羞偶閭閻較是非和世弼蓼花糚點千叢蘸碧流寧甘淡沱對清秋白蘋許共搖風細黃菊欣同占景幽羞泄異香招舞蝶獨施繁艷伴漁舟懵騰醉眼牽情處贏得凄涼一段愁謝人惠紫竹杖王猷珍重惠龍孫䇿險扶危價莫論爛醉懸錢過酒肆狂吟步月打僧門虛心尚有凌雲操徑節元無染淚䀶寄語香山老居士朱藤從此未為尊和前韻紀登髙醉中景示世弼諸友芳晨秋興浩無涯結客憑髙酒旋賖送目喜觀雲縹眇狂歌誰顧帽攲斜笑他子美看茱實要學樊川插菊花競説今年幸逢閏再期攜手躡煙霞和子賢對景有感次九日韻醉撥春雲一甕香潛欣積雨破秋陽燈龕宜入詩書府錢杖慵吟水色鄉忘慮不斑潘嶽鬢養恬難斷廣平腸賞音誰謂無蕭頴時綴雄文弔戰場世弼原上晚望和韻見寄因復之緑消暮靄滿空秋念逺憑髙隴上逰一片孤雲生逺岫𢾗聲哀雁落寒流風前無緒愁聞笛天際何人誤識舟步月可尋岩下叟試將圎玉鎮神頭鳩杖吟行笑撥雲多疑賈島是前身名髙鄭谷耕煙叟樂過嚴灘釣月人俯聼鳴蛩爭唧唧潛看宿鳥各親親田家有秫俱篘酒乘興何妨遍訪鄰州學貴中庭上作漠漠隂凝水墨天雨絲成陳拂窗前千層疊巘籠輕靄一帶澄江鎖淡煙歸思似雲空散亂名蹤如葉尚留連當時錯笑悲風賦今日間愁須默然秋日居山振衣拂曉啓松扃月淡風清酒漸醒密竹含煙爭滴翠幽蘭浥露逺聞馨清憐髙潔蟬嘶栁間羡優遊鹿食蘋試枕碧流端洗耳白雲深處誦黃庭一抹輕煙鎖逺山眼前瀟灑脫塵寰投林宿鳥相呼喚出草飛螢自往還吟擬停杯邀月飲醉蘄支枕伴雲間因風拾得新詩句獨倚髙梧笑解顔寄良臣耳冷清談倐半年渴心如憶嶺頭泉自慙記迹多南北無復從逰學聖賢莫謂卑飛同斥鷃已全髙潔慕鳴蟬荒涼不厭幽居趣假道何妨試著鞭督德秀還酒會緑鎖窗前聚首時戲彈圓玉偶輸機侑觴既欲攜紅袖送酒何妨遣白衣酩酊預期歸倒載從容端的話玄微揮戈直使頽陽却不計西風隱半歸臨川戲留友人山童澤涸欲金流小雨簾纎陡變秋河朔飲徒方快意鱸魚歸興不如休歌姝况有飛瓊侶結客當為擲果逰一曲陽關腸斷盡未應聞此不遲留子賢和韻見酬次答之詩名浪得在盧前器識慙非叔度賢捉月笑他吟采石凌雲端欲賦甘泉發硎喜淬衝牛劍啓齒羞談使鬼錢平世未應徒爾爾行藏終與古人肩和子賢秋日晚望溪山潑墨水雲秋似綺餘霞次第收燦燦拒霜鋪蓼岸雙雙屬玉舞蘋洲杳無錦字來憑雁擬滅機心試狎鷗望裏碧雲還又合數峰江上忍擡眸朝宗以詩贈行和酬二篇一以留别一以謝詩潄醪常共醉琳琅魚目慙遊漲海傍琴聼雅音彈碧玉鼎分靈劑煉玄霜纒腸錦繡篇章麗入室芝蘭燕寢香欲别未應徒爾爾鵬程萬里事難量鍛鍊新詩摘錦囊筆驅秀麗汝川傍氣橫阿劍疑干斗韻入豐鐘必待霜遒徑狂揮毛頴疾淋漓醉掃麝煤香珠璣喜就鮫人乞收拾端期百斛量輕風破暖單衣初試輕寒退嫋嫋軟風襟袖快層樓髙捲酒旗斜綺陌亂飄花錦碎多情故把惱人腸楊栁隂中弄暗香解貂不惜换斗酒爛醉春光能幾場杜宇啼紅蜜脾香滿青春暮寂寂空山聞杜宇啼紅泣緑怨東風錦城舊恨懷千古可堪腸斷對樽前雄圗未遂愁無邉賴有提壺勸我飲起舞從教落醉船喜雨北窗支枕夢初回風掠餘香特地來顛倒衣裳望池上荷花無語為誰開楊栁藏鴉菡萏香水亭風榭襲羅裳秋光正入詩人眼剩得餘篇付錦囊歸自臨川途中感物遇事寄秀美信馬沿堤懶著鞭不堪回首望臨川滿懷離恨如春夢愁聼林梢斷續蟬啾唧蛩吟旅况凄那堪孤枕酒醒時夢魂栩栩知何處依約幽軒話别離忩含月影夢初回一枕凄涼眼懶開幽恨間愁本無種根苗不識是誰栽有寄懵騰醉眼漾嬌波心印潛通一捻多密寄斷腸雙麗曲遏雲須倩雪兒歌和子賢途中暫停雙槳傍蘋洲磯上漁翁雪滿頭釣破煙波深得趣生來不識世間愁索寞襟懷不奈秋雕鐫佳句且忘憂行行恰過橋南路一片蘆花映碧流桐圭栁帶正凋疏匹馬區區倦逺途腸斷不堪回首處寒雲影裏雁聲孤和答國鎮十圍便腹卧邉先笑傲羲皇訪昔賢詔下好須同舊侣槐花香裏走連錢寄遊良臣壯浪年來筆有神詩如開府頓清新暗中慎莫投珠璧道路無非按劍人文會何時聚德星紫芝眉宇照人清錦韉並控尋春馬持酒憑花為解酲夏日出郊亭和晏尚書韻關關啼鳥樹交隂雨過西城野色侵避暑誰能陪劇飲清歌自可滌煩襟稻花欲秀蟬初嘒菱蔓初長水正深知有江湖杳然意扁舟應得共追尋曉發吳城山風掃陽侯雪陳平雨催摩詰畫圖成氣吞浦溆重林盡秋著江湖去鳥明厚祿故人無一字長年三老伴餘生會須滿意開懷抱到眼廬山不世情兩宋名賢小集卷一百二十九
