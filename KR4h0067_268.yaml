body:
  text: 兩宋名賢小集卷二百六十八宋陳思編元陳世隆補雪坡小藁一羅與之字與甫一字北涯螺川人端平間累舉不第遂歸隠賦詩云古來至寶多横道何事荆山泣卞和亦自寫其不平也晚年潜心性命之學嘗作譚道衞生諸詩皆閲歴後見道語有雪坡小藁二巻短歌行金谷桃李叢畚鍤費培植寒氷猶未泮花葉已薿薿貞松生南山石老厥土瘠春回氣尚淺生意幾欲息東星本無私花根異形色曾謂天地功不及糞土力寄衣曲憶郎赴邊城幾彀秋砧月若無鴻雁飛生離即死别愁腸結欲斷邊衣猶未成寒窻剪刀落疑是劍環聲此身倘長在敢恨歸無日但願郎防邊似妾縫衣宻舟次赤壁呉王峴畔泛川流赤壁磯頭半日遊勝地空餘豪傑迹扁舟不載古今愁極知風景終無異莫念天時逝不留傷事傷懐長太息靜看江雨沒浮漚束擔束擔出荆扉征塵染敝衣人憐雙鬢改我悟半生非抱璞今誰訴知音古亦稀尋思無一可吾道欲安歸旅思荏苒秋光老空濃晚色奇霜嚴雀語澀風定燕飛遲旅思荒煙夜鄉心野水涯夢歸歸未得愁極秪顰眉送春正是風光欲别時可堪煙外雨絲絲怕看太白餘春賦嫌誦淵明止酒詩晝短擬教持蠟炬愁深悔不下書帷自知無計能遮道任作園林隔歳期黄鶴樓翬飛棟宇據城端車馬塵中得異觀雙眼莫供淮地濶一江不盡蜀波寒老仙横笛月亭午騷客懐鄉日欲殘獨撫遺蹤增慨慕徘徊不忍下層欄玉梁道中雜詠一别三㑹峯轉燭開半紀山根石上苔已沒舊履齒摩挲青青松彼樹猶如此睠言枕清流為洗囂塵耳清商泛西來剌剌滿林塢草木倐變衰柯葉不相顧昔時翳空雲今作連山雨菊花猶强項籬邊爭媚嫵片石能邀人想此兩足趼忽逢黄冠師對語白雲巘眼中景物饒恨我蓬蓽逺躊躇不忍去泉石尚可剪峭壁園莽蒼荒谿人削迹時聞蘆葦叢野鳥話岑寂浮生雖有涯幽討當無極御風獨長嘯此心謝機馽曉霜媒薄寒巖壑失故緑輕飇振槁葉唱徹陽闗曲秋光何足憐嗟此歳事促愁吟思無聊日沒西山麓泠泠澗底泉破碎山根翠苦欲留佳客曲折二十四我行無定止蠟屐信所詣偶來儵舍去乗興聊復爾支枕郁木山月色瑩如洗林幽枕席清景勝夢魂偉丁當鳥忽啼令我驚欲起金丹事可期永願供薪水乾坤掃陰霾晴色蔽幽谷山川薦秋容竒秀若可匵千巖寄一笻萬里付雙目行行翠煙中日與清景逐濛鴻玉梁境縹緲雲霞仙月壇白雲洞遺址空依然千年唯亂石蹲踞秋山煙徘徊莫可見酌盡丹井泉塵坌不可奈飄然入林坰稍覺道心勝漸至詩脾清靜極生孤愁耿耿難為情喧寂兩莫愜吾意何由平春殘林端啼鴂損年芳洞口空憐野水香人與落英兼寂寞蝶隨飛絮兩彷徨不因花事榮枯易未覺春工代謝忙却愛曉來風日映緑陰千丈漾横塘絶知羈旅日騷騷人間事若毛絶知操筆誤深羨把犂髙百歳纔能幾終朝强作勞虚名竟何益肯把換蒲萄登玉笥山役龍洞捫蘿入幽谷眼界益崢嶸石壁斷人跡泉流閒鳥鳴日髙雲未散秋晚草猶榮坐久無歸意悠然世念輕閒立曉來閒立小谿邊看徹遥峯入紫煙四壁儻堪供我隠一寒未至乞人憐功名不與樽前事時序寧知局上遷可笑區區當世事滿懐氷炭苦相煎下第西歸抛却銀袍製芰荷春風一曲紫芝歌古來至寶多横道何事荆山泣卞和才難濟世甘避世心不愁天惟樂天林下山間深宻處曲肱飲水興悠然江行阻風小市弭掉黄蘆外江雲遶柁牙寒深身軫粟風急浪生花日暮人收市年窮客念家倚蓬無可奈忍見後歸鴉遊春春濃無處不相宜草暖雲昬二月時蝶舞花梢風細細鶯啼栁底日遲遲摸將景物歸詩巻判得光陰付酒巵箇裏各隨人自得五陵豪俠豈能私始見雪後寒猶勁書窻怯暫開因沽江畔酒始見竹間梅歳月崢嶸去衰顔次第來誰能憂許事杖履且徘徊山行狂飇巻雨辨朝曦似與新時有㑹期秋水秋山秋草木渾將乞與數篇詩煙草淒迷露未晞一笻伴我立晴暉丹楓雖老猶多態散作漫山野蝶飛斾斾黄茒發眼明荒郊盡日絶人行誰知氣象蕭條處賸有山川可鼎烹槁葉忘身絶澗流蘆花揺手欲風休羨渠山鳥渾無事相對飛鳴草樹頭片雲輕度半巖陰巾履俄驚翠靄深澗底寒泉知客懶石根㶁㶁自長吟烏藤落手野煙開水秀山明入望來舊日經行曾著語試看石壁已莓苔盡日留連興未闌寒鵶背負夕陽還遥知今夜空窻夢只在江南水石間客裏客裏愁濃處秋宵月欲斜雁聲頻到枕蝶夢未還家世有多岐苦人因一念差遥思林下去蓑笠釣煙沙寄玉笥蕭髙士滴露謄真誥蕭然莫與羣新詩髙似月世念薄於雲俗走堪憐我閒眠極羨君唯餘緑綺韻惆悵未曾聞尋芳尋芳自控青絲鞚日煖煙濃春意重晚來被酒卧花陰流鶯喚醒東風夢桂花爛漫一夕敗於風雨呼童掃落英以供香事戲作古句小山涼風髙秋氣遶庭砌江南山水秀鍾此數叢桂亭亭蒼虬蟠磊磊粟玉綴薫染風露香擺脱脂粉媚芙蓉已無秋籬菊極羞媿幽芳蕙百畝香味亦瑣細孰知標格奇自取造物忌狂風扶怪雨族滅無噍類纔憐金作屋俄驚粟布地姿容就枯槁氣骨尚奇異如彼死諸葛凛凜有生意試炷博山火來參煙一燧喚我晴空喚我出柴扉山色留人倚落暉春意已隨流水去晚風忍挾亂花飛尋思樂事惟心在惆悵良辰與願違尚有扁舟可泛處江南水暖鱖魚肥客行客行困泥潦山堠不勝長就使雨㸃暴更令風力狂時危嫌店逺日暮覺程忙身世摧頽甚艱難已備嘗山居閒思雲散山月吐星稀山月髙相羊風露底望月誦離騷菡萏兒女態舂鋤金石交曉來微雨過涼思滿蒲梢雨作糟牀注秋生鱸鱠思巻簾了清景流水裊煙絲夢迴酒薄難成醉輕寒襲破衾夢迴孤客枕聽徹草蟲吟寂寞三秋夜淒涼一片心山林與朝市底處豁愁襟夏雨飄忽回風起差池髙鳥翔雲凝千嶺碧雨獻一天涼飽意歸田畝歡悰入醉鄉忽思素秋氣蕭瑟滿空堂輾轉郵亭徹夜聽秋聲輾轉藜牀直到明月白霜輕寒剪剪築成萬里客愁城寄企梅兄朱墨叢中不殫勞騞然聊試發硎刀得時行道官無小與物為春政自髙閒對崆峒餐秀色醉濡章貢助吟毫自憐無計相從去十八灘頭泛一舠中秋步月林閒一葉秋屏去三伏暑淒然風露清絺綌莫能禦炎涼相推移何為遽如許孰知秋已半今夕四十五幽人披襟來步此一庭月如渡滹沱水似泛山陰雪誰將羌管急間彼鄰杵切冉冉秋思生令人欲愁絶空山本無塵況復值良夜風清月色佳圭璧不當價徐行苔徑間小立林影下飄飄意欲仙舉手人世謝光陰若劈箭行樂常恐遲人生百歳客擾擾竟何為四美古難并千年調亦癡麯生不我棄邀月聊自怡景物與意㑹撚髯聲悲鳴一語得總持萬狀就使令以我詩思苦賞此秋月明今夕月明裏幾人同此情姑蘇道中滿眼菰蒲翠撲衣雙雙沙鳥漾斜暉閒愁一段如氷釋楊栁叢中出酒旂信步信步獨幽尋春山野霧深鳥啼如喚僕泉響似鳴琴日暖草爭秀風狂花不禁却嫌荒癖地無酒與春斟泛舟秋懐白露消磨暑丹楓㸃畫秋閒吟小山賦歸思大江流世盡營三窟人誰樂一丘篷窻有佳致月朗正風休木犀花金粟如來澗壑姿不隨桃李赴春期江南花品秋居最何況秋花中絶奇湯沐晴空顥露繁清香十里壓旃檀紗窻夢覺秋風度疑是儂家住廣寒秋影連蟾隠士攀渾無蜂蝶涴林間何人説與陶元亮未必東籬勝小山山行愁思日落煙欲横山寒翠將滴荒村渺愁人跬步觸四塞路遥兩髀酸頗恨身不翼舍䇿還悵然倦倚松下石明月印野水暮色進旅愁僕痡主亦疲心口相怨尤茅舍劣容膝弛儋聊小休㑹當理歸䇿甘彼窮山囚夜宿郁木福地徜徉明月間遐想仙風得五十六字騎氣乗雲事已灰娟娟野月照蒼苔自憐不及壇前石曾遇仙翁躡屐來淒涼風露濕人衣猶自踟躇未忍歸樹影忽來山月轉誤驚鶴翅似輪飛閒居遣懐日暮掩松闗悠然謝往還停盃因待月徙倚為看山貧悟道中樂醉偷忙裏閒耳根偏可意風澗響潺湲寂寥睡起和春倚小廊寂寥情緒滿斜陽園林已是花飛急簾幕爭禁燕語忙兩宋名賢小集巻二百六十八
