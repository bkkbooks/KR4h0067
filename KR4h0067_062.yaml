body:
  text: 兩宋名賢小集卷六十二宋陳思編元陳世隆補樂圃餘稿一朱長文字伯原其先越州剡人家吳郡嘉祐四年進士授祕書省校書郎改許州司户參軍充蘇州教授築室郡西表曰樂圃鄉人稱為樂圃先生紹聖間除祕書省正字兼樞密院編修卒有樂圃文集公堂置酒羣彥咸集作詩呈學中諸先輩且用敘别漢有郡文學儒宫所宗師稚圭雖欲滯鄧禹猶願為聖朝興庠序內外振新規嗟余介且拙性與丘壑宜青衫起泮水六月開辛夷經術聊辨惑文章非振竒羣英何濟濟屈就董生帷講習良可樂效學友相資但觀芹藻長不恤顔鬢哀忽傳太學命飛詔下天涯自省草茅賤豈稱廊廟知親友頗敦迫黽勉趨官期生平好古心或冀伸此時偶兹春奠畢將與諸生辭濁酒多如澠頒貺自守麾鄉飲久不講禮意猶可追髙閣矗丹檻公堂煥雲楣裒衣二百衆齒髮敘尊卑籩豆儼在列鵷鴻來有儀珍饔薦瑤觴雖醉尚肅祗式燕固云善有行尤愴離勉旃重勉旃修業戒荒嬉黼繡在德義金玉惟書詩豫章生拱把羣木共威㽔養之得其性自有凌雲枝又如甽澮流不息趨天池居鄉為閔參得志慕臯夔當令竹帛間炳炳令名垂蒙使君召預池光之會韋公池閣尚依然賔主於今不乏賢郡內欣逢兩耆舊尊前喜會四同年清談自可成珠玉真賞何須聽管弦燕罷旌旗搖暮靄蔡經寂寞别羣仙遊虎丘借前韻一丘雖小勢巉然自古登臨歷幾賢門惹白雲常盡日地藏靈劍不知年清歡相與隨雙斾幽趣誰能解七弦每月來遊存故事郡中依舊有詩仙次韻蒲左丞宗孟遊虎丘二首命相將來傅説舟愛山尋遍樂天遊先聲汶北安千里選勝吳西賁一丘靜見隴雲生峭壁寒知海氣入危樓鏘金佳句留蕭寺剡紙朝來貴此州蓬島竒峰水四環何年涌出向人間清池不測通滄海寶玉常存潤碧山曾致神仙留歎詠可令軒冕樂蕭間謝公方為蒼生起戀戀煙蘿日暮還次韻蒲左丞遊虎丘十首玉堂紫閣冠英流身作三公未白頭須向鳯凰池上浴豈容蕭散詠林丘掃石捫蘿向上行門前坐見白雲生應思夢得多佳趣獨宿樓中待月明地近峯低俗慣遊不知絶頂冠吳州從今合與名山等左轄題詩翠嶺頭羣山處處盡凌空未若竒峰隱寺中一見便知名不棄為傳佳句滿江東萬丈潭澄挾兩崕削成竒壁自天開龍泉一淬名應得不待秦皇發冡來層巒稍稍暮雲歸喬木森森衆鳥依再踏石花尋去路畫船十隻帶斜暉丘如蹲虎占吳西應得佳名故國時未必金精能變化空傳怪説使人疑海湧當年有舊山吳王侈葬倚層巒誰知國破丘陵在兄弟幽居屬二難乃王珣王珉舊宅西溪風月宜真賞東嶺煙霞稱苦吟他日黃扉勤論道秋風一夢到山林雲霞咫尺壓吳郊乘興斯須棹小舠欲往結廬嗟未得羡他何氏有三髙喜雪上太守築壇精禱意通神零雨先期澤此民驟作六花猶及臘更遲一日即回春飄然燕寢初驚密平疊髙樓漸喜勻千里山河忘險穢十門坊市絶埃塵謝庭賀宴凌晨集郢曲歌聲遇景新細入吟窗粘凍筆輕隨舞袖落華茵膠舟漸進危檣逺汲井彌甘短綆伸遍壅枮根蘇杞柳巧裝寒葉活松筠終朝訟息延嘉客幾度年豐逹紫宸力可回天消旱暵為霖豈獨傅巖人次韻朱牧樂圃宴有感竊祿都無簿領迷得錢邀客手頻擕春來佳景回三徑雪後晴波滿一溪嵗月易凋青鬢色塵埃難上白雲梯煩君枉駕慙荒索空種梧桐待鳯棲次韻彥書席上有作蒼煙寒水滿方塘插架排籖典籍場喜對七賢間把手希逢四皓醉飛觴林深迥出千齡幹圃中有千齡檜詩就俄成萬丈光逸興欲尋丁氏宅雲間老鶴共昻昻雪夕林亭小酌因成拙詩四十韻以貽坐客昔歐陽公與人詠雪先戒勿用梨梅練絮白舞鵝鶴等字今篇中輒守此戒但愧不工伏惟采覽極望鋪千頃平觀徹九霄縱橫隨物象合散委天飇灑竹聲微動粧松勢不搖庭空飛鳥影窗失逺山椒釣罷盈孤嶼行稀覆小橋爭光籠碧瓦騁巧綴柔條片片誰裁製團團似琢雕丘陵平坎險草木起枮焦皎潔那容染輕清祗自飄掬來便幼稚披去羡漁樵篷冷孤舟泊蹄輕逸驥驕危樓明皓皓虛室靜蕭蕭餘霰飛殘夜層冰結霽朝界疑華藏見境入洞天遙嚮晦終難掩居髙却晚銷潤滋甘井脈寒減暮江潮思婦啼紅袖征夫擁皂貂履穿愁踐足心悟任齊腰就映猶開卷頻烹愈病痟袁公當獨卧謝女尚能謠旋取茶鐺泛多收藥匕調任令埋蠟屐直欲鼓蘭橈掃處迷三徑吟餘凍一瓢因思良友至急命牧童邀池館增瀟灑杯盤奈寂寥壺中聞笑語物外覩風標真樂非弦管竒辭脫篆雕紅塵蕩滌盡宿酒等間消燭映凝膏淺香清切柏燒談圍終易解詩將可稱驍聞道羣賢集方從五馬招黃堂催盛燕緹幕會英僚海氣連平野巖光滿麗譙繽紛霑壽斚炫熀照華標劉白才名重枚鄒筆力超袴襦歌美政牟麥慶新苗畎畝深盈尺風雲會再宵賀聲周四境瑞奏逹中朝郡國仁風逺乾坤協氣饒年年書大有擊壤望唐堯奉謝司封使君晏公臨顧園居三首間臥林泉與世疏使君三度枉旌旟未陪徐稚升賔榻敢屈文侯軾敝廬暫擲魚竿絲半卷旋開新徑草全鋤悔無美酒拈巾漉難得金波欵緒餘未入柴扉即下車茅齋揮麈緩論書不知銅虎威權重豈責荷衣禮貌疏此日狂歌希魯望昔年能賦擬相如篋中殘稿如傳後雖枉朱幡亦不虛甘盤德業滿天區博學承家行有餘鳯翥頻觀先帝詔牙籖新補相君書晨羊不飲康衢靜夜犬無聲獄犴虛風績巳應推第一鼇峰深處列仙居次韻虎丘祖印大師秋日寄懷不愛紛華愛寂寥松風竹月共蕭蕭因隨野鶴過三徑每對江鷗洗一瓢無復塵埃沾短褐尚思煙水泛歸橈道人肯與羲之友飛錫重來莫待招重九與子通遊虎丘謁祖印大師三首絶境良辰少兩全搘笻莫倦到山巔清談己可忘樽俎真樂何勞聽管絃才子就題黃絹語高僧多諷碧雲篇孤舟欲去更回首天半樓臺生晚煙秋山寥曠景無涯執手憑欄到日斜地竦一丘容澗石天低四面納雲霞凌風劇飲從吹帽多病忘情懶插花深羡二難兄弟好共將巖壑占為家浮世誰知金石堅吟鬚俄頃見皤然登山未免懷千古泛菊相期保百年方外逸民猶有傳人間高爵豈如仙良辰盛燕多遺迹何似江南五柳賢彥和善談性理子文繼成偈句見要屬和謹次韻萬法都明一瞬中可憐情膜久相蒙浮雲映月元非暗病眼生花本是空斷想求真猶未悟將心覓佛轉相攻誰能吸盡曹溪水莫負當年祖道東彥和與子文相期卜鄰子文作詩以遺謹次韻仙才宜在道家山却學幽人欲閉關清燕曽陪明主問羣言巳助相君刪談圍莫敵書盈腹詩社相過酒滿顔聞道卜鄰同喜慰亦開荒徑待餘間次韻子文抱病幽居之作幾年綵筆擅詞場鬢髮相饒色更蒼千里舊聞稱驥騄九霄安得接鸞凰醉憑淨几拋烏帽間捲新詩置錦囊治世莫將公幹比松陵風物勝清漳好間不復愛輕肥病起神清與道宜藥竈夜寒新焰歇書窗晝寂竹隂移坦懷莫學窮途哭行己應無屋漏欺里巷遊從須勉強相逢猶記是童兒佳雨應祈因思昔年諸友作詩今再敘舊晏侯昔為州嵗旱慶霖雨夫君與方子吟思共清苦不才輒繼聲玉石愧同處賡酬自邦君歌詠遍幕府開編讀英辭風義恨修阻歷年屈指八閲守今巳五自晏易五守溫溫劉蘇州謂夢得揚仁美風土篇章極清新操行到淳古去年掌膠庠幸此廕德宇遇君來自西暫作臯橋旅謂公權並遊盍簪裾良宴陪樽俎辱顧眼俱青言詩多見與近當庚伏間不雨病禾黍田乾如龜裂藴溉勞逺取如惔沴氣生望嵗羣心沮園居雖間曠何處逃藴暑使君憂憫深雩祀以時舉精誠禱祠下若與神告語隨車油雲飛闔境膏澤溥稿苗興膴原涸轍通别浦萬輪水可汲千笠草務去秈禾與稏稻指期入我庾清暉登溪山餘潤滿林圃中吳垂白叟買酒相忭舞掃石邀良朋清風快談麈此時無一詩歡意何以敘朝家日隆平二聖保基緒施仁塞天淵敷政皆堯禹舊臣留旦奭新相拜房杜風和調舜琴俗厚空周圄銷變召太和協氣應律吕吾儕夙承學嘉慶幸親覩相期美康平復見頌多稌蘇學十題并序蘇學昔有十題曰泮池玲瓏石百幹黃楊公堂槐辛夷石楠龍頭檜蘸水檜鼎足松雙桐是也或云蘇子美命名然篇詠莫傳殆有其名而無其辭也豫頃至學中訪所謂十題者其存有六而龍頭檜蘸水檜鼎足松雙桐者亡矣蘇學故南園之地南園者錢元璙之所作也錢侯好治園林築山浚池植異木充其中未久歸於國朝百年承平之間萬物暢茂遂得其生厥後割南園之巽隅以為學舍遺墟餘木迄今猶有存者而建學之後繼有培植然間有為風霆之所偃拔卒𨽻之所摧毁甚可太息夫無則巳矣其存者當為之珍惜因取六物又益之以多幹柏並秀檜新杉泮山復為十題題各有詩以傳來者庶幾觀是詩而愛其物則勿翦勿伐騶虞之仁行葦之厚見於學校之間矣豈如孔明廟柏攄少陵之幽憤太清仙檜發曼卿之竒藻好事博雅為之嗣音元祐壬申正月十有四日泮池怪石鋪幽麓芳塘倚茂林冷光開玉鏡清影滌人心芹藻無傷性龜魚各就深泉源應不涸何必傅巖霖玲瓏石巨浪洗蒼玉一峰飛我前鑿開混沌竅窺見滄浪天洞敞延華月巖虛生翠煙幽軒相對久古意日翛然百幹黃楊寶幹多林美孤根一氣同春餘花淡薄雪裏葉青蔥蕃衍非人力堅剛稟化工寸枝裁玉軫可助舜南風公堂槐五紀栽培後三春長育中靈根盤故國密葉蔭儒宫患與般斤逺歌宜魯藻同先儒垂意逺期此出三公辛夷楚客曽留詠吳都獨擅竒風霆存老幹桃李避芳時名入文房夢功資妙手醫紫微顔色好光占鳯凰池石楠昔年曽玩賞移自碧山遙古幹磨文石寒枝尉翠綃雖殊楩梓用終免雪霜凋來者宜珍護毋令困採樵多幹柏古柏列重門連枝若弟昆參天分直幹得地共靈根月照龍蛇影風吹鐵石痕鸞凰期可宿香葉向春繁並秀檜盤根幾百齡合幹倚冥冥偃蹇雙虬聳聨翩兩蓋青紫鱗霜外躍紺葉雨餘馨左紐憑仙宇何如拱泮亭新杉弱植還生意凌冬見後凋尚低霑雨露更長拂雲霄庭月搖踈影簷風舞細條他年逢匠石寶棟壯天朝泮山山形拱泮宫林壑意無窮自得千巖秀無虧九仞功光延東嶺月清轉碧潭風官冷真相稱婆娑一釣翁佳雪應時呈司封使君三首蘇臺風雨久如期太守精誠不待祈萬廩更為來嵗計六花故就臘辰飛靜裝松桂仙枝老深壅芝蘭土脈肥衡泌棲遲墻仞逺為公何日賦緇衣炫晃天花著物新壺中萬景淨無塵光輝只欲饒寒士清潔尤宜比古人韋白吟時飄入硯鄒枚宴處舞回茵明年霄漢橫飛去應踏繁霙拜玉宸千里江山入郡樓憑欄乍喜密雲浮冷光交映天峯色餘潤遙隨笠澤流民疊袴襦看不厭客叢簪履賞應留野人乘興狂吟外引鶴披蓑上釣舟次韻司封使君新嵗喜雪玉燭均調應改元賢侯喜雪望堯天太守詩云王正首此書佳瑞三見元豐大有年暗聲撒竹南齋夜瑞彩連雲畫戟前千里湖山成洞府萬家觴詠展賔筵應憐陋巷袁安卧擁褐孤吟又過年次韻司封使君立春紀事碧瓦猶藏臘雪寒東杓初向斗旁觀雪垂華旦天京逺雉舞條風野老歡官栁嫩黃迎皂蓋園蔬新緑委金盤詩才例作姑蘇守一曲陽春喜嵗端次梅評事韻滿目紅塵泪眼深誰能世事總無心買松野老栽成徑覓竹山僧種滿林薄酒時斟資道氣好詩頻諷滌煩襟鳯雛光顧門庭喜應笑陶潛責子吟梅公書齋挂蓑笠釣輪船楫四物形於詩句豫為和之快楫輕輪笠與衣間將四物挂柴扉江頭夜雪好披去湖上春光宜棹歸靜處無憂嫌印綬貧中有味勝輕肥興來願借君無却渺渺煙波一葉飛英宗皇帝挽詞五首仁廟規模逺慈闈教愛隆承平萬世策臨御五年功玉鎖開天上金縢納匱中乘雲那復見陵柏起悲風英斷能承祖慈襟善繼仁詩書教宗室禮貌待元臣損己遲徽册欽天撤步茵昔年平水患盡力在斯民代邸推賢久甘盤授學精持盈周鼎重立長禹謨明仙館靈芝秀嚴祠宿潦平歷觀唐漢盛未若廟稱英鳯翣行將逺龍髯斷莫尋白雲留穆御黃屋豈堯心雖享天齡淺終成睿算深垂鴻須萬祀纍葉奉薑任有德三宗後無憂纍聖間鳯當金粟翥龍隔鼎湖攀玉几言猶在霓旌去不還園陵饒瑞氣東接永昭山次韻送毛正仲太傅赴召馬周起布衣一日見紫宸獻言中機會數嵗持衡鈞歎息慕前哲誰能繼清塵毛公東南美迥掩竹箭珍髙才與精識卓爾出天真論政明得失談兵到幾神天戈討梅山婉畫昔己伸一官遇賢守相與康吳民孰云芙蓉幕久臥五色麟聖君馭羣材功業圖日新旌麾牧頗用帷幄良平臻竒士求即至當世有偉人君今赴明詔亨會在此辰夕發碧江外秋過清淮津彤庭敞神麗文陛髙嶙峋良籌上意合深䇿廟謨親功名立少壯富貴逼此身我亦有志者卧疾松陵濵耰鋤代長鉞韋帶比華紳髙懷未遐棄荒徑枉朱輪纚纚聽君語懦夫氣益振病騮觀逸驥舉首嘶鳴頻尚期居要路回光及幽淪次韻公權子通唱酬詩四首春晚遣興春華急似曉天星誰得年年鬢髮青露濯淺深枝上錦風吹離合水中萍吟餘金谷香隨步書罷蘭亭酒欲醒擬把冽泉同一酌為君林下洗寒瓶閶門懷古九曲堙淪茂苑荒吳人誰復怨吳王莫言故國千秋逺知是仙家幾日長湖上只誇浮海相里中休笑效顰娘舊時芳徑今猶在但屬漁樵自採香春日旅懷身在塵勞未免憂傷春佇立碧江頭回腸只殢千鍾飲方寸那容萬斛愁懶看錦袍凌巨浪好乘黃犢傍髙丘池塘得句頻相示直把珠璣為暗投牡丹竒姿須賴接花工未必妖華恨洛中應是春皇偏與色却教仙女愧春風朱欄共約他年賞翠幄休嗟數日空誰就東吳為品第清晨仔細閲芳叢秋月乘興遊松江至垂虹亭登長橋夜泊南岸旦遊寧境院因成十絶呈君勉且寄子通綵衣幾度醉江濵今日重來泪滿巾惟有舊詩存屋壁豈知投老負垂綸前哲臨流猛拂衣身違憂患是先幾非才自合居間曠不泛五湖何處歸雲動檻中雙槳飛天圍林外月帆歸欄杆倚遍日云暮坐看丹霞生翠微人爭軒冕安在哉我愛煙霞歸去來魯望有靈還見笑更回城郭戀塵埃兩山映日磨蒼玉萬頃涵虛皺碧羅不會樂天猶近俗漫將絃管雜煙波長虹穩臥碧江心夢寐頻遊覺莫尋歡友相逢清絶處酣歌一夕抵千金漠漠秋煙羃故園沉沉暮色暝漁船月華未出詩翁逺樂事人間少十全銀潢倒㵼入滄溟身近魚龍夜不驚鳴櫓空飛孤鴈過漁燈照浦一星明僧舍蕭疏竹葦間開軒處處面雲山詩家不及禪家樂坐臥湖光百慮間江裏鱸肥味不羶江頭酒美滑如泉長橋為席雲為幕抵欠洪崖笑拍肩轉運少卿生日昔在章帝朝先君為名臣入陪儒林署出擁使者輪忠謨與休烈萬世永不泯惜哉未大任天意昌後人公生韞俊德磊落功絶倫深林有條梅不採自可珍外隅正以方中府粹且仁沛然施之事迅若般之斤自聨金閨彥頡頏三十春牙籌析經費龍節綏逺民朅來天之東威譽薄海垠羣情無遁照衆理日益勤吏徑皆敞闢弊根悉鋤耘惸惸舊鰥寡今也皆不貧闔部數百城膏澤一以均正月方再浹是日為生申東人競祝公百福叢於身同宗復荷德善禱久所陳況公方耆艾百行享明神俾公永且康筆端扶化鈞俾公熾而大膝下森華紳近得舉芳躅荆南侍郎前望伯虎塵朱虎先閥期益顯蹇品庶可親上運使陳兵部屈指西州當世英我公傑出久知名自從揚馬竒才後又得岷峨靈氣清剛者近仁今始見惠而知政古難并胸羅萬象縱橫有目悅羣情黑白明己借牙籌安右輔尚留金節壓東瀛片章持上雲霄動一檄飛前草木驚斷割劇繁如簡易鹼砭瘦瘠使豐盈此時阜俗資良策匪夕疇庸在老成竊愧衰姿毗太府幸逢雅量庇寒生欲祈隂施增仙算幾見蟠桃結子榮奉和司封使君春日回文之作佳景更同民共樂俊髦皆集盛飛觴花隨客醉還成句栁贈人行欲斷腸斜月上時霞散綺暖風來處寢凝香華年惜過須心惜富貴叢身逼鬢霜次韻司封使君和程給事通波隄上幾鞦韆花接遙山栁接天故里松楸霑雨露神都池苑隔雲煙耕桑交勸紅塵外羅綺分遊畫舫邊暫歇甘棠隨衆望不禁野岸更聞鵑次韻司封使君和陳給事寒食城外感事花如步障草如茵萬景繁華在此句金印誰來誇故里密章燔了賁慈親莫看白髮興千感好共朱轓醉一春俱是詩人兼富貴只疑元白是前身次韻司封使君和程給事勝地寬間舊卜鄰耆年得意闢髙門中吳晝錦如公少好作坊名賁故園程公次其地古雨亭在南園置為宅基久矣近嵗始成而未聞有坊名次韻司封使君和程給事越來溪三章溪色如藍照舳艫越王金璧獻姑蘇館娃宫裏長髙枕不覺行師到國都萬騎連雲照水犀旌旗倒影蔽長堤誰知數嵗干戈後不是吳溪是越溪忠魂自逐滄波去往恨空隨茂苑春若使吳王思後患屬鏤只合賜讒人送魏君致逺之吳興兼寄祝修中庠中今多才燦若荆岫玉琢磨觀粹美尤愛魏與祝二子幼相友共學橫山麓抱書來泮宫美質異碌碌文辭堪適用光瑩輕縑幅前年掇髙選麗賦人爭録吳興太守賢好善下白屋貽書勤聘禮掃榻待英躅伯樂過冀北所顧皆驥騄翩翩告别去舟泛苕溪渌南陔急親飬聊以奉水菽愧我不能留嗈嗈想鴻鵠良辰振六翮一舉聳羣目雲漢期髙翔稻粱非所欲吳門比月不雨司封使君深閔而精祈俄有嘉應謹吟成七言二首聊代謁賀賢守憂勞鬢欲霜通宵霡霂滿吳疆五湖水闊魚龍喜九曲塵清檜柏香九曲路自胥門外入姑蘇臺更入髙鄉多䆉稏雖當淺處泛艅艎為霖事業傳家世潤澤應難限一方一雨歡心幾萬家預期春稻博流霞低侵滬瀆田交岸今嵗低田早種松江東㵼海曰滬瀆也髙傍支山水滿車葉幄漫霑桃李實隄奩暗長芰荷花豐年闔境渾無事間把詩豪放兩衙兩宋名賢小集卷六十二
