body:
  text: 兩宋名賢小集卷三百七十八宋陳思編元陳世隆補王尚書遺稿王應麟字伯厚鄞人九嵗通六經父性嚴急每授題設巍坐命坐堂下刻燭以俟少緩輒訶譴之由是為文益敏捷淳祐元年舉進士時年十九從王野受學初調西安主簿及監平江倉與提舉浙西常平茶鹽徵賦弭亂俱有法又調揚州教授嘗以事舉子業者一切委棄制度典故漫不省乃閉門發憤誓以博學宏詞科自見假館閣書讀之寶祐四年中是科既而添差浙西安撫使幹辦公事帝御集賢殿策士欲易第七卷置其首應麟讀之乃頓首曰是卷古誼若龜鑑忠肝如鐵石臣敢為得士賀遂以第七卷為首選及唱名乃文天祥也纍遷太學録進武學博士屢疏言事與丞相丁大全忤遂罷職大全敗通判台州召為太常博士時湯文清公為少卿比屋而居朝夕講道論關洛濓閩江西之同異擢祕書郎俄兼沂靖惠王府教授彗星見應詔極論執政侍從臺諫之辜積私財行公田之害纍遷祕書少監兼侍讀會賈似道拜平章事因冬雷極言防姦邪總威福諸事似道斥逐之以祕閣修撰主管崇禧觀久之起知徽州其父嘗守是郡父老皆曰此清白太守子也摧豪右省租賦民大悅召為祕書監纍遷起居郎兼權吏部侍郎指陳成敗逆順之説時朝臣無以邉事言者及似道潰師江上授中書舍人兼直學士院即引疏陳十事進禮部侍郎日食應詔論答天戒五事陳備禦十策且請更封濟王竑大國表墓賜諡如請行尋轉尚書兼給事中核奏留夢炎用私人徐缺為御史疏再上不報出關俟命再奏仍不報遂東歸詔中使談純德以翰林學士召辭不赴家居二十年號深寧居士革厯來杜門著述甚富卒年七十有四鱉山進士袁鏞抗節死于此山家人投山下溺死者十有七人天柱不可折柱折不可撑九鼎不可覆鼎覆人莫扛袁公烈丈夫獨立東南方欲以一巳力代國相頡頑適遭宋祚移恥為不義戕奮然抱志起誓欲掃攙槍拔劍突前麾手回日月光敵勢愈猖獗山摧失忠良嗚呼絶倫志不得騁才長妻拏悉從溺枯骨誰為襄忠烈動天地遊魂為國殤山水倍堪悲抱恨徹穹蒼穹蒼幸一息庶幾紀星霜西風白楊路哀猿號崇岡解劍挂墓柏泣下沾衣裳惜哉時不利抽毫述悲傷天童寺十里青松接翠微梵王宫殿白雲飛鐘聲出岫客初到月色滿庭僧未歸偶有間情依淨土竟無塵慮瀆天機明朝尚有登髙興千仞岡頭一振衣望春山羣峯西南起還伏湖上丹丘立于獨神仙寓迹山水間不在幽深在清淑松潭水暖龍欲起蕙帳人空鶴自宿飛雲曉馭紫瓊車沆瀣宵涵白銀屋蓬萊之名不可思俗客須當避爾躅東錢湖湖草青青湖水平酒航西渡入空明月波夜靜銀浮鏡霞嶼春深錦作屏丞相祠前惟古柏讀書臺上但啼鶯年年謝豹花開日猶有遊人作伴行唐開成年墓志石元至元二十七年城中握蘭橋旁民家築室穿土得志石一片其文乃唐開成四年太原王夫人之墓志謂其曽祖王元浩在玄宗時拜諫議大夫左庶子慕巢由之志辭疾不就前宋尚書王應麟為詩以紀其事鴻濛肇開闢變嬗幾成毁寥寥斷竹歌瓦堲溯姚姒周墳典以族詎認青烏子公琴記咎繇邢山稱東里葛淯失之矯璠璵過于侈焉知宫夾墓莫識龜言水銅槃字十六銘自比于始延陵有孔篆烏寧半辭止漢甎猶簡朴石章寖華靡無愧惟有道媚俗多虛美七松談士良何以懲不軌載筆鮮南董襲浮謬藏否豈悟冢中人三百年不死婦名弗出閫古未有碑誄諡見春秋初志起典午氏簪蒿隱士妻芳刻垂千祀楊髙託不朽習之文中理或犯葵丘禁息國事何恥蛾眉為黃土磨滅更誰紀宰如比何人維邑之士女逸民孺仲裔冰雪濯紈綺采儷古鄞州儉勤終莫齒試問幾何年頗與銅人似雖微黃絹辭亦質而不俚丘夷池又平蓬顆今㕓市聚廬寒劫灰餘光輝泥滓曰德巢由儔閨曰萊鴻比我行松柏下勢榮朝菌爾隆碣牛礪角翁仲卧荆杞蘭艾均一塵玉珉同一燬孤竹夢泡然栁下壟孰是片石幸有傳詩以貽彤史兩宋名賢小集卷三百七十八
