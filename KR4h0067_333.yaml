body:
  text: 兩宋名賢小集巻三百三十三宋陳思編元陳世隆補適安藏拙餘藳二霜梧棲鳳枝頭數葉輕井邊籬落正闗情晚來縱有西風過一片秋聲作不成湖邊日日湖邊上小車要尋紅紫醉年華東風合與春紛理忍把輕寒痩杏花示䑨師不拘早晚過長橋要泊橋邊踏巨鼇無月色時方得睡有梅花處必停篙不逢水活魚休買纔見溪清米便淘到得旗亭須報我落帆相與醉村醪立秋夕水花香弄晚風清間立梧桐看月生夜漏向深秋始覺一天星濕露華明新雁塞月程程逺星河字字疎不眠沙外水恐濕足間書倦翮支風去悲聲落枕初秋清人易感政自不闗渠春曉山行馬上口占山深竹暗曉風輕幾樣幽禽錯雜鳴駐馬細聽渾不識就中惟識秭歸聲路轉前山復後山宿煙收盡薄生寒吟鞭忽指松稍月絶勝城中樓上看陽復一變陽爻七日初窓間測影弄徐徐不知曽未添宫線但覺多翻數葉書劉八窓見訪一夕即别五年苕上别别後愧相疎今夕知何夕憶渠俄見渠同持一杯酒勝寄百封書未及論心事曉風回蹇驢悼戴式之四海詩人説石屏一時知已盡公卿家傳衣鉢生無愧氣挾江湖老更清重感慨時多比興最瑰竒處是歌行九原不作空遺藳三些吟魂淚為傾嘗蒲萄壓架駢枝露顆圓水精落落照晴軒微酸自是江南種尚忍因渠説太原睡覺睡覺東風忽惘然起翻雲母續爐烟半醒不醉宿酲思欲雨又晴寒食天春草池塘詩夢裏梨花庭院酒尊前誰憐倦客長安市節物驚心憶舊年晴絲何處飛來繫碧空敲吟終日費形容搏桑老繭抽纎緯星殿殘機剪細茸驀忽帶歸簾外燕等閒惹住栁邊蜂風柔日薄樓臺晚一縷低垂力正慵謝曹東甽跋吟巻十年湖海仰師儒八斗衣傳子建餘袖裏有詩須印證句中無眼定趦趄吹香玉唾清如許刮膜金箆病已餘媪扇何曽求貴重等閒中得㑹稽書楓橋道中路接官河栁行斜蹇驢衝暑憇田家雨餘天迥雲生葉日午風輕稻放花襏襫已縣黄犢睡桔槔不動綠隂遮老翁相見如相識命坐藜牀自析𤓰郊居紀實既安能適復何疑小築重營即舊規狡兎反為三窟累鷦鷯終遂一枝期種成水際芙蓉徑鑿得亭前菡萏池客有可人尊有酒四時風月總相宜送外家通倅方澹菴風節傳清素名多為宦遊花封纔解綬芝檢趣監州等上持麾節歸來觀冕旒江南與江北底用説離愁松陵晚泊漭漭風濤外天隨底處尋碧雲千嶂暝紅樹九秋深故國荒城夢空江倦客心行藏那無計蓬月闖孤斟小游仙詞天風吹上碧嶙峋鸞鶴聲清草木薫金闕玉樓行欲遍却攜明月出紅雲寄湯伯起徙家城市去不為故人留種菊應無地觀山合起樓别來通訊少春酒作詩不池上雙檉緑孤吟我正愁次韻答菊莊湯伯起數弓蔬地一方池吾愛吾廬祇自知蘆碧補交楊栁缺檉紅攙上藕花遲翠隂圍合疑無日凉意蕭騷賸有詩君欲重來須更待嫩煙浮動晚晴時别燕寳墨烟雲邈金風庭户秋有誰堪作伴無計若為留謹勿沾鯨浪應須避蜃樓裁詩聊寄逺煩慰玉人愁西陵觀梅障霜筭日奪天機九月梅花賞玉㽔到了不知春意勝水邊風韻兩三枝山院小院清聲動碧梧颯然凉思滿籧篨年來懶結青鐙伴却課兒曹讀夜書夏日書事緩將琴軫巻將書誰信閒中事有餘約客論茶和水試課童移菊帶泥鉏竹櫳日午猶闗鶴水檻朝來自餧魚山薊已苗𤓰已蔓適安生計未全疎訪隠者居蘚隥披蘿入茅堂著竹遮緑看流去水紅惜落殘花蜀鳥啼春靜山童厭客譁細觀題壁者一一是誰家宫中詞睡餘羅袖印眉山行傍粧臺理墜鬟聖主憂勤排當少犀椎魚撥總成閒邊烽既息穡事告登歌以五十六字同和擊壤見説邊頭事已寧捷書復得壽春城從來方面多豪傑均與朝庭擊重輕棗寔雖紅休北顧稻花垂白近西成民無飢色添歡色氣象方纔似太平京口策應戍將歸營老矣猶征調新從淮上歸盡知邊境事曽解壽春圍腥血封刀匣黄沙漬鐵衣奏功均得賞沽酒醉斜暉枕邊枕邊清坐散餘酲慘淡西窓月半明燕子夢回簾未捲楝花風信曉寒輕癖賸欲收神省費心三生癡癖本來深典衣尋訪晉朝畫折簡借觀雷氏琴帖字逼真嘗細搨詩聯敲穏每長吟鏡中一笑成何事鬢影秋絲日見侵清明湖上榆火初傳禁漏殘滿城和氣在湖山接天楊栁風煙裏照水桃花圖畫間舊路人穿新路去長橋船出斷橋還吾皇應喜民胥樂嵗許西門入夜闗宿吕城舟中古堞遺蹤何處尋斷煙殘日意沈沈飛湍過閘風雷怒峭岸如山草木深燈火鄰船喧客枕江天漂梗碎鄉心明朝沽酒新豐市惆悵無人伴苦吟送客之潤赴時貴約折栁亭邊來問津江山先入夢來頻漕渠水足新逢雨客路風光恰是春莫論孫劉悲既往願言賔主樂相新曽留短絶題多景君到應須為拂塵送徐雲友歸行都落落竒男子長言走客塵白身無寸禄青眼欠髙人病為思詩苦貧緑立行真片雲留不住歸醉洛陽春伯氏自吳門來輦下再宿即别把酒論新事移牀問故山桑麻云已長親戚喜相安斷雁江湖外馳心夢寐間兩年三度别此别覺尤難劉後村被召銜上官雖顯吟邊興不衰細評南嶽稿逺過後山詩才大人多忌名髙上素知瓣香吾敢後幸見召還時送友人赴長沙酒官老楓殘月曉江濵送客歸來又送君愁滴離聲三叠淚眼穿行色萬重雲過湘應取離騷讀别邑終期課最聞莫為西班羞薄宦要思先世立殊勲杏花栁店春風酒斾斜紫綃團萼數枝花香肌元自多豐膩錯把梅花看作他北固亭口占以下四首寓京口作答湯菊莊兼簡分司鄭料院三生結得潤人縁巵酒時來煖客氊北固兒童雖不識也縁巾履過山前鶻山屹然孤立蘚痕青千古江湍洗不平蒼鶻飛來復飛去不知身為此山名甘露寺狠石二雄曽向此盤桓鼎立功名各未安留得坐時頑石在至今人尚説曹瞞月觀逺眺朝宗亭下浪㝠㝠何日尋觀瘞鶴銘更欲裹茶邀客去短篷敲火瀹中泠嵗在丁亥郊禋禮成上登門賜赦獲睹盛典恭成口號閭闔煌煌闢曉雲千官鵠立望嚴宸鶴書飛下珠簷峻雉扇分開玉座新山壽聲中團喜氣鈞天奏處隔香塵明王盛事民何幸三載恩寛四海春正元二日與菊莊湯伯起歸隠陳鴻甫泛舟湖上二首春雲漠漠雨疎疎小艇衝烟入畫圖除却淡妝濃抹句更將何語説西湖櫂轉逋山􅋈落暉春風深鎖恨依依松間一鶴俄飛起疑是先生出未歸送蕙坡趙富陽赴髙郵元幕見次相逢客裏便相歡握手真能出肺肝買得酒尊曽共酌帶來詩巻每容看舊聞遊宦多知已今喜公朝與好官一片淮雲千里月覲圭何日入長安蘆筍春風荻渚暗潮平紫緑尖新嫩茁生帶水掐來隨手脆櫂船歸去滿篝輕竹根稚子難專美澗底香芹可配羮風味祗應漁舍占玉盤空厭五侯鯖湖亭席上寒食梨花月新晴楊栁風愁融山色裏興極酒杯中緑髪日夜變青春今古同忍教行樂處容易夕陽紅哀魏方泉每見中吳士多稱太守賢一毫無暴政千里樂豐年心醉西樓月身飛北闕天那知人事異夢絶栁橋邊詔下催歸覲人傳便尹京班纔聯從橐庭忽舞銘旌玉樹悲中折金丹救莫生澤多唯乳子天道若無情寄吳德章簽判莫轉朱弦軫知音世不慳吟情清似水壯志屹于山自入鄉闗去相思雲樹間春風吹五葉早趂集英班書所懐閒拂塵中鏡猶憐壁上梭生平多坎壈知已半銷磨對酒成孤酌横琴寓九歌相思江水濶嵗晚客如何兩宋名賢小集巻三百三十三
