body:
  text: 兩宋名賢小集卷二百九十六宋陳思編元陳世隆補藝隱橫舟稿輪差祝聖所拈香瓣香來謁玉宸宫月在觚稜絳闕東轉向玉街西畔過朝天萬馬正匆匆幾度來遊幾賦詩又因將命到靈芝三呼祝了君王夀偷眼湖光立片時至日謁廟吳山見日初出曦龍浴海上扶桑雲表輝芒燭萬方史館繽紛書瑞色禁城奕昱鎖祥光從知繡線添紅影獨喜丹心向太陽節裏官間無一事諦觀易道靜焚香廨宇傍河倣佛家居合是清溪近處居在官却與在家如栁風拂岸時鳴櫓梅月橫窗夜讀書休問舟間無喚渡須知水到自成渠俸錢已足供薪粒比著簞瓢儘有餘月下憶梅花夜深寒月照窗紗忽憶林逋處士家鷗鷺正眠煙樹冷不知誰可伴梅花生朝報恩夜醮絳節翩翩七寶車謡歌飛上玉皇家鶴壇月冷天風靜開盡碧桃無限花菊潭賦小窗睡香次韻兀兀蒲團萬慮除定回寒月滿康廬幽香自有禪心會春不相知亦任渠夜聞城中簫鼓簫鼓喧天競看鐙都民應喜見升平芳心自不同年少細嚼梅花坐月明和東圃鄭震見寄薄宦來京洛相逢久更親丹心期為國白髮易催人月冷鳥驚夜霜明雞喚晨吟邊頻自感還染九衢塵題桃源圖山中與世不相關雞犬桑麻盡日間傍水桃花春爛漫誤傳消息到人間和菊潭玉泉韻不是靈源逺碧虛可容六六化龍魚講經人去前湖暝翻手為霖自有餘酬瓜疇趙爐夫投贈謀生百拙世無如嬴得心清剩讀書薄宦喜從京國路間身還似野人居濟川事業歸商傅獻賦聲名羡子虛嵗晚且留梅作伴吟邊月冷一枝疏仲字嵗晚書懷因次其韻終有徴書訪綺園心期獨向老天言物情已逐東風轉未必全歸野燒痕端平除夕宦逰來此亦隨緣過了新冬又餽年今夕桃符猶自寫明朝柏酒讓誰先但令世道皆平地此外身名任老天春與詩家如有意早傳清夢謝池邊嘉熙元日先春一日紀正元熙號初更氣候暄萬象光隨黃道轂千官班湊紫宸門梅迎霽色來窗底栁挽和風到水根但願時平年事好升沉有命不須論立春彩勝飄春上鬢蓬倚欄一笑問東風青青栁眼梅花面才染陽和便不同雨後道間見紅梅元都境界玉堂身輕裊湘裙步晚隂昨夜雨肥添酒暈紅情染得十分深盆梅白玉堂前樹誰移此地栽看教清意足唤得艷陽回舞片疑雲墮留香待月來只應標格好獨為嵗寒開春雪臘裏霏微未許多春來舞片却交加混成天地皆同色點染園林盡著花岸磧雲凝迷去鷺屋頭煙暖見飢鴉東風畢竟能融化不放寒澌氷去聲桞芽再雪投曉又翻飛春風亦被欺須知寒徹夜勝似臘殘時艷粉同梅落輕花替栁吹渾然成片玉凍合在前池題龍首圖變化成來體勢髙坐令幽思起雲濤春雷一鼓驚頭角碧海風輕衮絳桃落梅粉香消盡骨猶清望斷瑶臺轉有情便是百花無此分看看事業到和羮桃花武陵人去水橫陳獨向元都管領春日暖風輕塵撲面劉郎空老苦吟身宿接待寺梵境忽巍峩門前對市河有心𢎞誓願于此接經過郭近人聲雜簷髙雨氣多規模踰百載猶説喻彌陀宿龍泉寺有葛仙丹井既濟功成列左仙餘波猶作世間泉苔荒碧甃龍宫寂庭老梅花月在天橫瀆岸邊梅花方開雪染梅花倚道傍亭亭野水弄幽芳東風似賞孤髙意未許飄零一片香雙路王命馳驅不敢輕文書要核去來情青山步步生幽意碧澗悠悠趂逺程春淺禽聲猶自小泥酥馬迹正宜晴地名見説名雙路便舍﨑嶇就坦平實際窗前睡香瑞錦窠應對錦郎誰將靈種到幽坊山深月冷梅花老壓盡羣英是此香石橋接待當年立雪直齊腰宗旨流傳到石橋風急窗寒燈影逺疏梅無語夜薌銷手筆華嚴梵笈新更開寶地接迷津一聲金磬人初靜月照空山草自春聞寺中曉鼓靈鼉一鼓振潮音征夢迢遙枕畔聞語斷頻伽天正曉松風吹散滿山雲跨水道間店舍總迢遙山深轉寂寥看鷗臨逺水下馬過危橋晴雪林間少春風野外饒此行為王事旅食任蕭條峮山鋪未説路行難山深分外寒曉村林隱寺春澗石鳴灘薄宦曽無補勞生敢自安羽書今較少備禦莫教寬杏塘境接江東界郵程是杏塘雨喧茅屋小泥滑草橋長曠野人稀少平田水渺茫半生遊厯地未若此荒涼四安梵惠藏殿記云曽經兵火不能焚法輪自轉劫火不能焚空中轉法輪風霜鴟殿古金碧貝函塵物本由成數人言不壞身却憐無問者遺迹竟成陳上司諫曹先生聲名滿世重於山果見延登左掖班天子虛心求國是先生著手濟時艱要看出處諸公上只在精神一轉間前此極言雖引去安危理亂正相關池萍一畨雨過一畨多間挾晴風漲緑波桞絮吹殘遊迹在謝池點點是陽和分賦楊花曲字纎腰睡起芳情足誰道春風浪拘束日暮天涯細草多輕風誤入闌干曲雨吟園林緑盡合清和猶有餘寒在薄羅幾縷情風春别桞一庭苦雨夜鳴莎人於生處窮通定事到難時感悟多水上浮漚頻起滅看來物理總由他夜坐有感不為名所纍應是得安居客夢方知幻身謀反似疏風髙秋塞逺雨急夜窗虛猶望收來效頻翻舊讀書送黃溱遊金陵六朝多舊事誰與問江山我亦身重到材疏語竟慳燕歸秋巷靜鷺去晚洲間健筆無輕賦前賢轍可攀酬山月江與投贈帝里風光好隨緣適宦情却居城郭外不雜市㕓聲水國霜天冷梅庭夜月清正慚無雅韻敢説到詩名梅花竹籬茅舍本相安誰與移根入畫闌儘道重簾妨暖日疏枝却得護春寒風標敻與萬花殊可有塵埃染得渠把住瓊枝相晤語只疑身在玉堂居和陸明叟了無間事上眉纎一炷清薌靜畫簾造化自從回暖律芬華頓覺轉窮簷輕風度桞春情薄細雨催花土脈黏所愧微官相束縛何因共訪酒家簾夜窗聽雨一炷夜香清挑燈聽雨聲雖然添客夢却可助詩情澤沁蘭心重泥酥笋角萌山行頻有約日日候晴明破榴絳殼盈盈萬顆珠潤於瑪瑙浸氷壺吟心先自清如水嚼了寒霜骨更臞登應天塔雲級湧青冥金鰲載寶輪地髙心自逸天近足無塵圗畫千峯晚樓臺萬井春三生許元度曽此證前身鰻井在應天塔後羅漢堂舊聞有泉透海後為婦人所穢今枯涸矣下即濮邸園廟人言此井有靈源潮落潮生透海門陵谷未須窮變易朱牆裏是濮王園大能仁寺山門八百餘年戊戌秋震於風雨規模應甲剎殿閣擁金仙嵅歉炊煙絶城低野色連客僧皆散去主者獨安眠成毁難逃數山門八百年留滯何期蹤迹又遲留行止於人自不由夢境固知空似蟻生涯却笑拙如鳩碧涵一鏡晴天潤翠湧千峯宿雨收從此公餘須杖屨未應草草度春休曉寒曲曲屛山憶夢中峭寒成陳入簾櫳宿香消盡金猊冷一樹梅花怯曉風晚思客思悠悠幸自安亦因吟事可相寬小窗過了亷纎雨細與東風説晚寒用明叟韻併寓山行未成之意久客住蘭亭心同晉水清忘機盟宿鷺伐木聽雛鶯物亦知人意春寧有世情幽尋空作計一夜雨連明苦雨何期一雨成三日約客行山竟未能春到分時隂不解夜當深處氣猶凝簷低捲箔看飄灑礎潤添香散鬱蒸想見故園梅落盡和羮消息未堪慿雨中用雪坡韻無計酬春獨有詩倚欄終日候晴暉東風漸屬新桃李簾幕深深燕子飛雪坡以雨阻山行有詩因以次韻為欲看山助眼明頻占鵲喜報新晴春光已過三之一塵世難逢四者并詩酒深情殊未適肴蔬薄具亦頻更終來不似西湖好晴雨皆堪傍栁行月丹和鶴莊韻靈種飛來鶴頂紅誰云九轉有仙功廣庭曽侍東風宴留得霞杯照晚叢禹廟且要盡清歡須知一出難人因晴後喜春到水邊寬栁長官橋媚梅飄客袖寒荒祠存禹迹得得又來看鏡湖一曲天與平湖老賀郎春波依舊染晴光可憐千載風流意付與租符晚夕忙用雪坡春色韻才出城門興便濃晴光野色兩俱融栁方染得三分緑桃已重成一半紅山湧林巒荒寺隱湖分港汊小舟通相携各自論年事幾度春風上鬢蓬用梅溪鏡湖韻畎畝鏡中分滄波雜斷雲向來官裏賜今屬野人耘懷古天難問貪吟日易曛羽衣遺傳本起誦想餘芬天基瑞應宫金碧耀瓊廬天開繞電區烏流周室瑞蛇斷漢家符石井騰曦馭瑶壇布斗樞願將皇極福敷錫遍康衢送東浦張應發歸永嘉客裏偶相逢襟懷亦偶同對梅吟夜月折栁問春風子勿言浮梗余方笑轉蓬歸程驚雁蕩得句附郵筒碧桃月浸虛庭夜未央一枝靜對白雲鄉三生自結元都約來伴疏棋到玉堂一春屢有揚州之約雨輒尼之將旋幕侍外舅來遊邂逅二羽衣一能參上道一能知大丹竟日留話喜賦二解時清明日也幾有行山約山靈聖得知仙家寧易到塵世亦何為草潤非煙石花流止水池不晴還不雨正是賣餳時裂石未嘗關毋將俗眼觀虛中元有受造藴亦何難羽客能談道雲房識候丹只應仙有分風響步虛壇道間見桃李花東風到處競繁華不問窮欄與大家垂栁絲中深院宇隔墻時有出來花龍瑞宫側訪仙姑不值輕紅片片落桃花劉阮空迎紫鳯車石洞有天元不閉何須流水覓胡麻送妻叔歸括倉山此身元是客還作送行詩笑語如今度綢繆似舊時買船春載酒剪燭夜敲棊煙雨樓前景圖來慰所思出西門寄呈外舅姑自從依監宅不似昔時親義重難為别情同父更真一簫思去鳯雙璧倚靈椿只等中除報相迎輦路塵唐園內人朝陵此園供午頓幽居已似水中仙更有亭臺在屋邊擬作小圖難盡處一年兩駐內家船覺苑寺宋江淹舊宅今山門扁為江寺寺前橋驛驛中井皆以夢筆名酌水涼甚此是詞人宅名因後世傳驛中存廢井橋下駐歸船一夢空塵迹千年尚福田筆靈應賸馥試為酌清泉祗園寺許詢舊宅有戚公水應天曽建塔又此結精廬釋氏緣何熟詩人念總疏壁荒遺畫水僧老學醫書笑我重來者經年不定居奉和龜翁送别為説吟邊事曽陪宴笑頻自慙無韻者敢對有名人雨洗秦山曉波明鏡水春匆匆還别去芳草正如茵昨夜昨夜隂風刮地鳴亂敲窗紙夢魂驚壁寒剝落泥成片屋老漂搖瓦作聲野市霜明人迹險官河水冷客舟橫翻思帶甲眠戈者何幸吟身傍帝城兩宋名賢小集卷二百九十六
