body:
  text: 兩宋名賢小集巻三百五十二宋陳思編元陳世隆補裨幄集趙萬年南渡時從武科備戎行于襄陽屢著戰功有禆幄集臘月初三日敵人攻城以强弩射退獲捷四圍鉦鼔震天鳴敵騎平明盡逼城萬弩應絃因退走却疑城上有神兵正月初三至初五再攻焚其攻具敵兵大却鵞車虎砲與雲梯堪笑行軍巧用機大帥胸中攄妙算一時談笑盡灰飛臘八危家餉粥有感襄陽城外漲烟塵矢石叢中未死身不為主人供粥餉争知臘八是今辰二月三日登城郊外春色可人而敵騎未退平生春日不傷春今日逢春愁殺人觸目旌旗紛戰鬭無言桃李少精神可憐野興牽羈興不分紅塵雜塞塵直待元戎攘却後峴山無惜領嘉賓毁土山築土為山號距堙敵人癡計要攻城誰知壯士中宵出三月工夫一夜平十三日敵人勢蹙攜印來降屹若金湯不可攻軍中誰肯自投降勢窮方獻將軍印何似當初莫渡江徐招幹請喫鱖魚桐皮簷外桃花片片飛垂涎漢水鱖魚肥桐皮一作飢腸飽似得精兵解敵圍程機宜宅喫豆粥豆紅米白間青蔬彷彿來從香積厨異日大官還飽飫不應忘却在蔞蕪偶成一心憂國不憂家掠面黄塵帶晚沙郵傳不通音問隔家人夜夜卜燈花圍中墮馬傷足方愈牙痛累日敵騎塞東津迍邅困此身足傷方復步牙痛又搖齦忍見烟塵暗俄驚嵗事新籠鍾三十九碌碌度青春嵗暮嵗暮嗟為客那堪復被圍一心惟許國視死已如歸除夜除夜春牛吼開正兵騎多有謀思却敵休問命如何却敵凱歌吁嗟勍敵何猖狂引弓百萬侵吾疆首屠棗陽𢷬神馬窺伺長江欲葦航隆冬久晴江水涸直掲小樊厲源漳馬沈人溺相枕藉霜刃逼脅狼驅羊連營立栅三十里旌旗蔽野塵埃黄元戎忠赤過張許隔江獨對敵人語剖析大義面折之自比闗西偉男子敵人聞風雖縮頸業謂渡江無我禦四山列騎意洋洋擬欲一鼔下襄陽城頭四隅密分布整飭器具嚴隄防火油金汁羅砲座託久擂木森旗􅀈睥睨樓櫓排萬弩鏵車尅敵皆蹶張一朝步騎如雲集前摧草牛負土囊雲梯飛橋對樓聳虎炮鵞車數里長裹以犀革如帆幔木楯皮屋翼兩㫄鐵騎後推千百隊矢如蝟集攢鋒鋩楊栁隂中浮梁就三千敢勇忽推牆幾層列弩下如雨霹靈巨砲落穹蒼盡將攻械付烈焰如焮蛇豕燎豺狼騎者傾仆步者走傷者叫號立者僵軍中横尸徧原野或貫其腦斧其吭生擒首領數百人斃馬横屍盈戰塲未㡬採木空林藪旬月運土成髙岡噪聲裂地屋為震火焰燭天星無光誰知壯士中夜出人持炬馬列前行强弩义䥥迭相衛長鍬大钁聲琅琅黎明一炬為平地敵皆喪氣若有忘因風縱火烟焰猛拱手坐視摩痍瘡全軍震讋心膽碎却攜金印來投降從兹敵勢大摧沮自焚攻具燒營房甫逾江北復連營放牧盈野何駉駉脱鞍解甲馬下睡鼻中齁齁輥雷鳴豈知戰艦輕移岸急雨狂風亂櫓聲百鼔忽鳴萬弩發繼以飛砲歘流星人馬驚亂相蹂踐肉填溪谷厭羶腥穹廬遯去無遺跡捷書排日風飈急九重北顧正宵衣覽奏龍顔増喜色吁嗟李勣賢長城不假援兵敵早滅天書沓至賞元功渠渠温語褒忠烈方除戎團追徽省行且齋壇授節鉞命珪相印一時來聞道殿巖已虚席誰知帷幄進竒計裨贊尤多玉季力弟兄攜手上凌烟卓冠古今真殊絶我從武科備戎行先生置我賓僚列雖無涓埃裨海鎮同此死生冒矢石自愧文墨非所長妄意欲泚磨崖筆兩宋名賢小集巻三百五十二
