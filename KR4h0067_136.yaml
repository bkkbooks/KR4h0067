body:
  text: 兩宋名賢小集卷一百三十六宋陳思編元陳世隆補陳子髙遺稿陳克字子髙臨海人紹興中為敕令所刪定官自號赤城居士僑居金陵有天台集寧王進史圖上林風暖脊令飛玉帶花驄侍宴歸汗簡不知天上事至尊新納夀王妃善財參自在天善財得法猶兒子工巧仍參自在天若悟菩提同戲事不應縳律更枯禪題趙次張所藏賊頭子二首揚鞭指點萬貔貅打取盧龍十四州煩君為發祿山冢看我快飲月氏頭龍章鳯姿世不乏束手無奈于此缺丹青王會何須爾頸血淋漓送藁街畫梅花溪路模糊半山雪暗淡寒梅一枝月醉眸無處認氷姿兩袖香風更愁絶長恨飄零如楚雲夢中猶記好精神忽逢冷艷氷綃上歎息侯家占好春誤人吹裂柯亭笛豈有殘英落綺席始信夀陽人寫真不知江南近消息跋趙朝議江行初雪圖我本孤舟蓑笠翁雪崖煙樹一生中如今不向江湖去鬬艦旌旗照水紅雪岸圖大年貌得寒江雪鳬雁沙頭野彴微箇裏有詩誰會得情知不道一蓑歸江南山色筆間煙雨漫愁人不是溪山自在春一段江南好風景夕陽花塢淨無塵謝曹中甫惠著色山水抹胸曹郎富天巧發思綺紈間規模寶月團淺淡分眉山丹青綴錦樹金碧羅煙鬟爐峰香自湧楚雲杳難攀政冝林下風妙想非人寰飄蕭河官步羅抹陵九關我家老孟光刻畫非妖嫺繡鳯褐顛倒錦鯨棄榛菅忍將漫汗澤敗此修連姢緘藏寄書篆曉夢生斕斑題趙冝興萬里江山圖慘淡何人畫飄颻萬里心雲輕春樹暗日落暮江深細酌淵明酒仍彈子賤琴知公湖海氣對此益駸駸與叔易過石佛看宋大夫畫山水霜落石林江氣清隔江猶見暮山橫箇中只欠崔夫子滿帽秋風信馬行大年流水繞孤村圖少遊一覺揚州夢自作清歌自寫成流水寒鴉總堪畫細看疑有斷腸聲唐人畫牡丹圖二首重樓傑閣上煙霞戟帶飄飄護翠華侍女畨休春醉著不知野鹿犯宫花殘紅通白及時開不費君王羯鼓催玉笛重拈天一笑外邊蜂蝶等間來伯時四騎弱毫寸紙有餘地如見天間八尺龍坐想時危真致此兩軍旗鼓噪西風曹夫人牧羊圖日長永巷車音細插竹灑鹽紛妬恃美人零落涇水寒兩鬢風鬟一揮涕柔毛􅟲􅟲與人羣兒女恩怨徒紛紛洞房那復知許事但畫逺牧連空雲槲葉飄蕭晚風徑羖䍽相追寒鵲並短童何處沙草深族走羣飛各天性向來鞍馬曹將軍文采班班今尚存林下夫人更超絶新圖不作五花文觀錢德嘗書畫臨池競賞無心筆破産新酬沒骨花老子眼寒俱不識勞君煎點入香茶奉題董端明漁父醉鄉燒香圖十六首漁父七首處處晴沙著釣綸浴鳬飛鷺頗相親誰知夙昔風雲會只似尋常江海人鱠縷絲絲雪色魚碧筒香細到村沽江天此樂誰無分不問官家乞鑑湖君王獵罷載熊羆錫壤分茅合霸齊邑有魚鹽太多事翛然何似釣璜溪傾吳佐越早經綸朝市風波猛乞身不道五湖春浪急蓬忩還有捧心人志和漁隱古仙真霅水風流見後身蓑笠何須訪圖畫貂蟬凛凛在麒麟雷澤田漁翊聖明射蛟南幸見升平稍分天漢昭回象更和江湖欸乃聲風煙回首釣魚臺巾褐從容小殿開自是玉皇香案吏外邊休奏客星來醉鄉七首醉鄉天地誰開闢光景沖融古到今明月清風一長嘯杯中時見昔人心昔人愛酒復能詩阮籍陶潛蓋有之共道尚書兼此興超然異代忽同時斗酒百篇元祐初當時流輩已蕭疏閉門日飲身強健得見升平總不如子房帷幄贊神謀晚嵗疏封自占留代邸勛勞今絶口上恩仍與醉鄉侯脫靴神氣迥飄飄平日千鍾奉帝堯老子浮沉人不識酒壚爭席奈漁樵老瓦盆中旋潑醅陶然樂聖且銜杯只今痛飲誰能那寶器恩從天上來黃金細字勒杯巡魚水恩私晚更親但得賜田堪種秫向來浮議不關身燒香二首相如緑綺有新聲荀令熏爐非故情曲罷空山滿香霧飄然還上赤霄行琴心非佛亦非仙座下絃歌萬二千一瓣香中誰會得要須靈剎散花天題葉碩父畫卷二首扁舟欲向山隂去端為林泉作此行不獨卷中攜栗里還于句裏得淵明風煙幻出元暉畫林壑天然碩父詩只似無心雲出岫輪囷蕭索更多姿題張文潛畫帖此老從來馬如狗却笑蹇驢難朝天聊爾據鞍猶覔句想知行處似乘船官曹文書堆滿牀憒憒度日孤晝長安得如彼二三子抱琴挾䇿置我旁何伯言畫何子畫山心極苦不畫山林畫其趣不知此絹厚幾許隱隱深入疑有路去年持此干貴權數幅得官仍得錢平民常産賣有盡筆端有産無窮年而今束絹知何數不為水墨為襦袴我憐何子老更癡平民皆飽汝獨飢兩宋名賢小集卷一百三十六
