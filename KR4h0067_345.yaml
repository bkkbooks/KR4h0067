body:
  text: 兩宋名賢小集卷三百四十五宋陳思編元陳世隆補西塍稿宋伯仁字器之苕川人有雪巖集馬塍稿四十役役人間世齊頭四十年讀書雖未已作事易徒然宦業蕉中鹿生涯葉底蟬願逢時務好一榻醉時眠寓目暖風輕撥繡簾開放入雙雙紫燕來燕子似於人有舊細銜花片落糚臺晝景逢春漸漸長博山添爇半匙香梅花一片嬌無力自趂晴風過粉牆久雨暗數春來雨曽無兩日晴樹連山莫辨橋與水俱平閉户惟便懶逢人且問耕海棠花落盡憔悴幾流鶯訪髙菊澗可惜吳中不見君短篷空載一溪雲知君已到孤山下日日梅花酒半醺張監稅新居為愛灘頭只兩家也來隨分作生涯依山築屋先栽栁買地為園旋種花聊把功名循世態只憑詩酒度年華與梅一夜論心事石鼎茶乾月未斜尋孫花翁東風吹雨濕西湖未許蘇堤酒賸酤試向花翁問花訊不知花似去年無春雪不止春來雪意愈遲留又學飛綿過小樓暖逐東風雖易化猛如前月未容休鶯花消息孤詩課蠶麥生涯纍客愁莫道逺人多凍殺王師亦有在邊頭無事日日溪頭看好山塵囂無一可相關梅花未必能如我花謝花開未得間訪林可山可山無日不吟詩我欲論詩未有期幾次孤山明月下手挼梅蕊立多時簡施藝隱雪後東風作峭寒客懷零亂客眉攢杭州雖近西湖月寧似湖州把釣竿丁家村不滿十來家門閭半以柴日烘蘭入鼻風掠草侵鞋土酒融春興行歌放客懷何須買髙屋一一近天街再會夏石芝自與君相别駸駸已數年一緘書不寄千里夢徒然雨店花新長風櫺月幾圓嶺梅無恙否愁滿鬢絲邊舊同官張法曹熬波同看楚天秋多少艱難説未休今日共依湖栁住夢中猶怕踏歌頭雪後暖地難為雪春天易得晴落梅狂客意啼鳥故園聲愁樂從他事湖山寄此生願將身與世渾似栁稍輕一作一葉等相輕紙鷂㺯假如真舞碧空吹噓全在一絲風唯慙尺五天將近猶在兒童掌握中湖上新晴湖邊膏雨㺯晴時桃杏紅爭錦一機楊栁也如新及第向人爭舞緑羅衣晚春溪竹回文青山數里一溪橫片片花邊舞燕輕耕過水田新雨足晴天晚色栁風清悶甚􅙐醿開已殘窗户尚輕寒往事多成拙清尊強自寬對妻憐病久顧影易心酸更展淵明集從頭子細看雨中終日翻盆雨池亭晚更涼對琴思古意釃酒惜韶光緑漲便鷗懶殘花笑蝶忙髙田皆可插好與報君王妙智庵結屋古山巔源流未有年便非真隱者且喜得安然一作禪石洞同雲卧茶鐺對客煎我來聊小憩詩滿夕陽天嘲不識字難字逢人問村中一小兒璋麞寧易辨亥豕以堪疑鹵莽原非莽草莽莽字母黨切宿莽莽字音母切耕犁十二齊犁字耕田器音犁别是犂六時犂字牛駮文良脂切識丁何足道煮字不充飢村學究八九頑童一草廬土朱勤點七言書晚聽學長吹樵笛國子光生殆不如讀林可山西湖衣鉢梅花花下月黃昏獨自行歌掩竹門只道梅花全屬我不知和靖有仍孫寄樓雲卧雲卧西湖又幾年吟鞍多在酒罏邊定知今古皆春夢不把功名作去聲宿緣芳草滿汀山帶雨黃梅落地水連天相逢未識江南事且問何時理釣船村姑翠鬟雙妥未梳頭紡緯車邊坐欲羞幾度采桑歸較晚阿娘疑看落花愁底事蹉跎二八年嫁時裝著未周旋年年織得新絲絹又被家翁作稅錢寓西馬塍十畝荒林屋數間門通小艇水灣灣一作彎環人行路逺多嫌僻我得安居却稱間樽酒相忘霜後菊一時難盡雨中山何年脫下浮名事只與田翁賸往還羊角埂晚行葛裙蒲屨帽烏紗迤邐乘涼到水涯數寺晚鐘聲未歇滿身明月看梅花湖上一泓寒玉浸青山粧點樓臺夕照間歌管滿船春未懶惜無人伴白鷗間西湖晚歸一輪紅日倚青山只見湖光數里間聽得畫船人説道錢塘門外夜深關兩宋名賢小集卷三百四十五
