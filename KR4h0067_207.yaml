body:
  text: 兩宋名賢小集卷二百七宋陳思編元陳世隆補鄂州小集羅願字端良號存齋汝楫子以蔭補承務郎中乾道二年進士守鄂州有小集送新安守陳郎中赴闕浙水帶天邑於今如澗瀍言從發源處直到行闕前使君儀曹郎省闈早周旋一行領輔郡奏課十郡先是時新雨餘縱覽驚號蟬長河無六月解帶風中眠鳥羽動林莽馬門納雲煙村村老農出寒女一笑嫣共談兩嵗樂米糧不論錢今日見使君使君正當年還能持節來莫作長棄捐再拜不可留鼓聲催發船嗟我寄枌社弟兄辱知憐宦遊適四方從公倘非難農人實懷土欲見無由緣唯因足襦袴長説使君賢題賢女鋪在南康縣南許嫁女始字昔人良所欽此身有所屬安得強委禽嗟哉乃翁愚棄盟欲重尋死生還復合世謂遂初心誰知彼寒女義烈動芳襟頃來已一慙厚愧方在今正性不負物臨流殞千金我來弔藂祠目眩寒潭深凄涼一川上行客聞知音梁寺丞相見示過嶺新作凌晨登鬱孤南走韶陽道封疆有中畫山川本懷抱公行度塞嶺殘雪故未掃高情無南北反謂兹山小頃來我嘗遊亦覺山媚好前賢因逺謫我輩得幽討兩崖瞻欲眩數樹攀且繞想公哦新詩千騎轉林杪衙官候顔色約束軍聲悄韶陽古名郡四十專城早重華已干嵗蒼石在雲表魚龍舞幽壑遺韶蓋可考以兹供撫玩或可薦壽考公餘亦時飲未用絶芳醥行行布恩惠正直神所保送贑州守施司諫奉祠歸吳興去國二千里叱馭良已勤到官一百日啜菽念所欣使君豈常流早嵗承華勛螭首有故步天香帶餘熏時清省諫紙符竹亦再分屬者冦雖除遺民尚驚塵公來鈐江右喜氣感三軍下擔見施設果蘇雕瘵羣天姿夙已高况復勇所聞屬縣但期約訟庭無放紛村團不識吏處處飽羮芹生女戒勿怒減輸勸其耘惠術頗次第歸心已鄉枌小子謬從師頗嘗侍朝曛從容進逢掖慘淡立紅裙中坐要娛客所陳金石文行裝遂如此何以充棟棼人事與天意嗟子豈須云來携諫坡雨去開崆山雲多公能摧剛聖處已䇿勳行藏吾有命所願不忘君送辛殿撰自江西提刑移京西漕峨峨鬱孤臺下有十萬家喧呼隘城闕戀此明使車憶公初來時狂狡嘯以譁主將失節度玉音為咨嗟一朝出明郎繡衣對高牙持斧自天下荒山走茅乂光騰將星魄枉矢失驚蛇氛霧果盡廓十州再桑麻思令撰中祕天筆有褒嘉辛氏世多賢一姓古所誇太史任針闕伊川知亂華誰歟立軍門杖節來要遮亦有救折檻叩頭當殿衙英風雜文武公獨可肩差佩玦善斷割揮毫絶紛葩時時有縱舍惠利亦已遐京西故畿甸傍塞聞悲笳明時資餽餫豈減漢褒斜勿云易使耳重地控荆巴三節萃一握眷心良有加古來居此人愛國肯雄誇羊祜保至信陶公戒其奢安邊有成略此道未全賒公今有才氣功名安可涯願底湖海豪磨礱益無瑕凌煙果何晚猶有髮如鴉和汪伯虞求酒君不見菊潭之水飲可仙酒旗五星空在天此江縠紋更竒絶投以麴米清如泉分甘正擬供低唱要築糟臺須大匠詩人便欲醉千日歡伯僅堪陪一餉曰豫此樂未知之獨愛為瓶居井眉因君飲興亦浩蕩夢隨驂駕觴瑶池昔賢酒盡孤長吸大似竹枯還欲瀝明朝秀句傳滿城笑指空樽臥牆壁鹿鳴宴禮成貽解元諸友并呈通判寺簿兄及衆同官五首天意欲為雨川雲出相望明時攬俊乂所立固無方少小諷二南美此江漢鄉猥當興能職首闢較藝場羣儒悅寬簡浩蕩出文章方觀縱壑魚忽作摶風翔此去升禮闈旋當對殿廊忠言動明主家國有輝光鹿鳴首宵雅義取好賢深寥寥疑莫續工席有遺音詩言君臣間不以位相臨如禽食蘋水有酒方共斟從容陳所好亦復有鳴琴度使峩冠者洋洋動其心願言解子褐結綬貫華簮真心有相感千載豈殊今昔在馮當世起家冠倫魁天衢躍羣龍轉見絶足才馳譽塞四海致身近三台凄涼城東宅嵗晚就蒿萊古來用武地編簡委塵埃每見儒冠喜况逢賢路開祝君如馮公決科亦崔嵬終身可師法正復在軻回任子衆所許一鳴居上頭王高兩縣來選拔皆其尤里行張可貴月書蘇屢優向來丁與虞頗從别駕遊嗟我愛羣才不問薪與槱既為得者喜豈忘欲旁求鼓篋五百家安皆儒者流相期作鄒魯過是我何來士有未就駕郡守身勸之君觀漢詔中有此勤懇詞由來賢俊人出處每委蛇譬彼未嫁女深閨秀容姿施襟有所適婉孌終自持漢俗尚如此前世當可知勉哉䇿名者不但好爵糜君臣有明良行矣方自兹惟當秉高節長副此心期酬任察推惠石耳之作班嗣不借書劉棻真好事慙君輟漢簡畀我充口耳胡為有牽聨蒼石乃遭刵平生任公子百犗供釣餌坐令天壤間厭此江海味君今效清癯吾更覺軟美挾書擬從遊夢到沙頭上望梅亭南安軍未至庾嶺有亭名望梅兄端翔權軍事時所作節物重陽後風煙庾嶺頭休論梅子雨才度菊花秋翠壁堪橫絶幽亭勸小留謀生兄弟拙一一旁南州送雍州吳使君題輿才送日邊程便擁油幢鎮列城地望素高唐五管人才今似漢三明時清市駿非無意嵗宴逢花好寄聲太學英名湖海氣此行持論要平平次韻日涉園虛靜堂華堂清曠隔喧卑户外春殘緑滿枝好鳥窺簷時下啄有人燕坐獨支頥息齋世間誰號最間忙強健收身意自涼春去掃花時汲井客來剪韭旋炊粱丹桂軒丹枝近嵗出深宫合向嚴晨伴晚楓珍重幽軒無俗物月中根墢日邊紅茶巖巖下才經昨夜雷風爐瓦鼎一時來便將槐火煎嵓溜聽作松風萬壑回木瓜塢山中果樹略扶疏炎帝經中未盡書聞道木瓜紅勝頰露枝雲葉綴華琚奉寄交代通守王兄兼簡胡君二首籍甚王文度同儕意自親方舟能送我别駕苦勞人屬縣應如律山田向食新荷花開幾許老子舊凝神有客才相識乖離又許時不愁蓬轉逺獨恨蓋傾遲卑薄江南地青冥嵗晚期宦遊妨意氣直恐負君詩題汪氏尊已堂華屋成來有幾年名因耆舊里中傳未容極口稱臧否正欲虛心到聖賢室有圖書人自好門多車馬地還偏雍州健筆人爭誦姓字從今到日邊次韶楚覺先見贈奏事何能補帝聰流年早已付天公舊聞雙劒淪波底忽有三刀入夢中首出詩文為我賀多慚憂樂與人同如君孝友天應報飛鶴那應久在籠聞寺簿燕客因以酒蟹送似有詩見及次韻冠蓋追隨寂寞濱絶甘寬我未間身古來把酒持螯者便作風流一世人此物湖鄉價不論帶糟聊遣薦芳樽夢魂忽去浮清霅喚撥漁船傍馬門酬寺簿録示胡康侯戒明仲治郡遺訓别駕遊心到古初時將前輩警公餘異時治行傳青史名姓牽聨倘得書奉酬李叔勤知縣覓茉莉花栽長句郫令風流太史家早知茉莉有竒葩生嫌衆色空塵滓遍閲餘香見等差多謝珠璣來坐右好將根墢到天涯蜀江紅紫紛披後初看東南第一花次韻酬通判劉兄嶽陽樓見懷二首蓄納深無際憑臨勢易高青春關氣象白日散風濤有野張軒樂何人續楚騷古來川浸在間却漢隂槔魚龍掀舞後渺莽記空庭地帶三苗濶山傳二女靈客懷光水月詩筆妙丹青少作揚雄悔唯思草一經次韻和子澄春祠先生律詩質明悅洗動輕漪禮殿嵬嵬百世師仗几親瞻古人象陪祠頗雜漢宫儀詩書自可謀元帥俎豆何妨示小兒春服詠歸千古意只今童冠可無詩春社禮成借用寺簿釋奠詩韻呈諸同官素餐深覺愧漣漪后稷勾龍實吏師平土至今猶有賴配天在昔蓋多儀操豚底用勤巫祝餉黍行看媚婦兒海內和平頌聲作登歌還有載芟詩福州趙侍郎開城西古湖以溉田既成兾得致政丞相福公一臨於是有唱和之篇湖邊飛蓋欲誰同治行人思舊弱翁行樂未饒溱水女詠歸應有舞雩童閩山影浸煙雲動滄海潮連浦淑空欲識元侯疏鑿意君王勤儉正卑宫南方春早凍先融荷臿趨時小異同要使齊民如水利亦如前哲變文風四時境淨登臨美萬頃雲垂灌溉通嗟我一麾江漢上慨然歆嘆似南豐兩宋名賢小集卷二百七
