body:
  text: 兩宋名賢小集卷三百十六宋陳思編元陳世隆補雪篷藁姚鏞字希聲一字敬庵號雪篷剡溪人嘉定間舉進士為吉州判官以平寇論功不數年擢守章貢後因忤帥臣重貶衡陽自裒詩文題曰雪篷藁端平乙未自為序春日書懷柔風散原野百草搖春心叢薄曜陽彩嚶鳴調好音節物一以變萬感集素襟玄髮不常居華景無停陰胡為苦貧賤征塵翳瑶簮萱葉覆堂階荆花感晴林明當理星駕歸息清溪潯雜詩北風日以徑古道無人行陽坡樹已黃陰崖草猶青四時相代謝誰為此枯榮攬衣坐幽磴下有流泉聲聽之不成調挹之有餘清悠悠京洛塵汚人頭上纓春館山館四無鄰東風伴幽寂瓶花羞晚紅庭草衒春碧猿扳松樹枝鶴踏蒼苔色麾之不肯去聽讀麻衣易見趙章泉秉芳獨向章泉老四海兒童以字傳特詔難更高士服好詩多入賈人船行窩冷落熙寧後放鶴風流景祐前一代典型能幾見願從几杖閲耆年見袁蒙齋書説曾傳到剡中不圖今見古人風間生伊洛二三子安得龔黃十數公仁性未嘗離日用道心元自與人同潔齋衣鉢慈湖學願發精微一啓蒙懷雲泉頥山老枯吟世慮輕求道不求名病起春風過間居野草生遊山尋舊屐煮藥試新鐺别久空相憶疏鐘隔水鳴寄徑山敬溪翁心遠人間世燈傳國一禪靜中無劇暑詩外總間年挂錫雲生樹烹茶月落泉幾時歸去得再約剡溪船拜先君墓次第瞻山看水流夜臺中閟憶三秋新松成行如人長老鶴無言似我愁僧奉晨昏惟茗供兒悲霜露只蘋羞結廬終歲關心事怊悵鐘聲出暝樓送曄沖晦歸天竺西湖山下多奇石師去今遊乳竇峰遙想石臺登講罷野猿歸洞鶴歸松寓霅川王戴溪頭小隱仙漁翁引上霅溪船幾回倦釣思歸去又為蘋花住一年春夜曲金魚鎖合蘭缸小酒不支愁尋睡早梨花欲墜風更寒燕子不歸春自老流蘇護帳香雲結三十六簧清吹咽緘書欲寄湘水深城烏啼落花西月夜發漁浦為親從薄宦不復計修程斷浦迎潮别孤帆帶月行秋來江桞變夜久水煙生前路猶淹泊淒其賦遠行桐廬道中兩岸山如簇中流鎖翠微風帆逆水上江鶴背人飛野廟青楓樹人家白板扉嚴陵臺下過不敢浣塵衣頭陀菴衣緇髮可梳雲外卓菴居佛換新花供幡拈古碣書刪松容徑竹種茗間園蔬為應諸方供山房盡日虛出山雲陰漠漠雨瀟瀟坐兀歸輿野興遙石澗水流苔路滑竹籬秋去菊花焦誰將束緼求山火自立寒溪問板橋官事奔奔何日了倚松臨水羡漁樵題畫壁兩山灌木帶晴鴉泯泯春流漾浦沙隔岸小舟呼不應碧桃花外是誰家寄范中洲高隱就詩名中洲雅趣成几前修竹淨屋上落泉鳴柘圃春風織山田野火耕滿山薇蕨老客至足蔬萌野廟未知何王廟歲月日已非熏爐松柏煤畫壁苔蘚衣門空牧豎戲樹老山魈依田家社酒香紙窖生光輝懷范正夫愁霖滴禾黍秋暮滯雲莊但慮輸井稅不憂無積倉竹雞啼野塹飢鼠走山房不飲論文酒思君覺夜長宿護國寺觀晦翁先生題名滿樹棕花滿徑松解鞍才是暝樓鐘上方月白山雲靜看見東南一兩峯看了題名看跋文自憐不及晦翁門野僧惜打殘碑賣時共山猿洗墨痕寄沖晦欲答前春信西飛雁不逢應隨丹竈鶴同看白雲松花雨翻經石山鳴出定鐘何時尋舊住却説武夷峰訪中洲踏雨來敲桞下門荷香清透紫綃裙相逢未暇論奇字先向水邊看白雲賃宅及春遊帝里賃宅似吾家雨溜生新草風牀受落花病多添老懶慮淡遠紛華時與幽人遇燒香煮茗芽悼復石壁一死雖如蛻殺身真可哀僧危能仗義詩好更多才鶴怨蘭亭月雲消石壁苔舊時同社友寂寞載書來送僧去結茅堂霅水邊曉行持鉢落花天得松未用栽松本先買溪南舊石田王别駕訪天竺頥曅二師寶香熏徹碧蓮臺别駕尋僧日暮回聽雨齋前驚樹長浴雲池上看花開青山久不逢坡老元鶴親曾識辨才二老風流如昨日百年詩石未蒼苔廬陵贈異孤峰幾度雲間望鶴飛相逢猶喜及秋期明朝採藥青原洞好掬寒泉供祖師寄劉敏政一生貧樂鬢成絲前輩風流及見之道外無營偏愛畫靜中有趣只吟詩雲生茅屋湖山近秋滿荒園橘柚垂見説地幽人罕到自同妻子種江蘺自青原回訪敏政幾不相遇曉汲山泉洗硯回要看奇石立蒼苔騎驢應為尋詩出放鶴還知有客來一井清寒宜茗飲千林黃落獨梅開他時老圃如能學只乞山中橘本栽寄趙東野時以師檄撫定贑叛東野山人有晉風歸來三徑自栽松錦囊句好間中趣鉛鼎丹成靜處功無事杖藜隨野鶴有時隱几看晴峯長江近日風波惡莫向深淵下釣筒清晨間上鬱孤臺鼓咽譙樓角更哀病葉滿山難獨掃狂花一樹為誰開泉枯石井獅空吼雨暗荒池鳳不來欲向江東問仙老海風吹浪駕舟回送贑士謁前贑侯楊東山凝香句滿空同石靜向東山卧白雲夫子自能明易學衆人誰解識玄文空江短棹浮詩卷别岸飛花撲練裙到得帶圍春已過煮茶應共竹間分題東山贈何青霞詩後青霞道士來相見手閲東山詩一卷句裡明知山水心筆端照見煙霞面昨宵夢上寥陽殿仙官敕作青霞傳傳成不及卷中詩罰讀靈歌三百遍午興心間日日理黃庭四體和柔勝藥靈獨步小軒無一事老槐陰裡鶴梳翎兩宋名賢小集卷三百十六
