body:
  text: 兩宋名賢小集卷三百六宋陳思編元陳世隆補雪窗小稿張良臣字武子一字漢卿號雪窗其父自洪州避冦來四明因占籍鳥良臣為詩清刻髙潔尤長於絶句至舉子業非所能専隆興元年試南省魏文節公杞時為參詳攜其三䇿以見知舉張燾曰此文拙古必故人張武子所作使欲得士願以進燾許之撤試果良臣也杞晚居小溪日與良臣酬唱平生官止監左藏庫詩集十卷至咸淳間彌甥徐直諒裒刻於廣信郡晚步南城下冷雲堆屋晚仍春惘惘人行陌上昏飛去飛來沙上雁去年洲渚舊蘆根春詞佇闌無限楚時春罨岸風平緑自薰睡起盡簷雙語燕梨花留得夜來雲後至搴香復倚春潘嬙梳洗最輕盈南朝破後無詞客燕子桃花古石城芳草復芳草芳草復芳草有人孤倚樓明月復明月何處照離洲相見渺無期此恨詎相知日暮天寒吹屬玉蠻江豆䓻重重緑玉臺體一寸春霏拂綺寮蕙花江上雪初銷傷心燕子重來地無復人吹紫玉簫主人流落委荒墳燕子還來壞戟門惟有桃花古時月端端正正照啼痕曉行千山萬山星斗落一聲兩聲鐘磬清路入小橋和夢過豆花深處草蟲鳴陪天童覺禪師如蕪城風勒江雲雪未勻夢寒不到碧梅春破帆又指蕪城近漠漠平沙落雁頻失題栁暗旗亭不忍看臨江愁殺晉衣冠傷心明月揚州路十里珠簾蕙草寒示長蘆仁禪師叢叢竹雀閙人家農事春來漸有涯品字柴頭煨正暖不知風雪到梅花别特上人茂竹永和字院花天寶詩晴江入舟楫忍淚别僧持梅市道中連雨疏篷不耐關修眉如失更晴慳越王故國無人問艇子穿花自往還有懷山房每憶山房話夜深几前無主亦無賔老兵未領西來意斜倚屛風一欠伸西湖晚歸帖帖平湖印晚天踏歌遊女錦相牽鳯城半掩人爭路猶有鳴琴落後船書情奉寄蔣弋陽公五都一何綺歌管正繁會眷我友明月援情寫秋瀨何言異離復一飽困藜稗風雨墨如翳欲往徒自礙頽年去堂堂白髮新種種崎嶇造化久敗屨常決踵從來萬里意不料乘嶮恐鳴鶴略九臯未羡乘軒寵留題吳興投老菴白鷺悠悠去不還渚雲汀草一生間暮年不入西州路空倚梅花説住山送人遊姑蘇兒時吾亦寄君州細細聼君説舊遊處處緑波通酒巷女郎多在採菱舟雪後雪花竹屋未全消寒雀梢頭眼擘椒紙閣不煙梅自放底能踏濕渡溪橋九日書吕季慈室上池入寺見承平影落南州迹易陳手把黃花看新雁風煙愁殺舊京人感舊三十六陂春水緑四十九年人事非揚子江頭永嘉後吳儂蕩漿北人稀山房惠貓從來憐汝丈人烏端正銜蟬雪不如江海歸來聲繞膝定知分訴食無魚過臨平兒時曽憶此登臨細説窮途有述證四十九年蘧伯玉月明人靜過臨平過西溪罨畫層波蕙草荒冷雲客鴈兩回皇梅花到得吹成雪盡是清愁不是香贈英上人之秦賸肯迎張祿踏越何曽用計然元鼎事看蛙勝負大槐人與蟻相連酒熟濁醪初熟薦霜螯不擬寒山不廣騷清曉豆花籬下立竹梢獨與月爭髙遺家書家住鄱城小洞天經年烹鯉尚茫然幾回鵲喜無消息吹殺燈花獨自眠祝貓江上孤蓬雪壓時每懷寒夜暖相依從今休慣穿籬落取次懷春屢不歸偶題誰家池館靜蕭蕭斜倚朱門不敢敲一假好春藏不盡粉墻斜露杏花梢萱草雪色侵凌緑剪芽枝抽寒玉帶金葩北堂回首傷心處却復令人恨此花小破小破燕支鈿早梅雪雲平淡越江遲青山嵗夜行人少鴨鴨羣飛淺草時謝江尚書見訪黃葉聲中接錦韉添丁籬落怪相牽歸來賸欲從僧話正掩楞伽曝背眠夏夜恰則黃昏雨便晴青塘迤邐盡蛙鳴月明已在芭蕉上猶有殘簷點滴聲平旦平旦梅花破冷紅越香何限水流東陳平翠袖新年恨盡在吹香笑語中兩宋名賢小集卷三百六
