body:
  text: 兩宋名賢小集卷八十二宋陳思編元陳世隆補歸愚集葛立方字常之江隂人諡文康勝仲之子諡文定邲之父也天資髙邁博覽諸子百家言詩文信筆抒寫不加持擇與弟立象妹壻章道祖同登紹興戊午進士纍官吏部侍郎因忤時相罷去自號歸愚居士築堂三楹扁曰餘慶優遊以終老焉避地傷春六絶一年春事又瓓珊可惜芳菲愁裡看慎勿掃花供餵馬惱人秀色自堪餐洛陽宫闕半成灰草草花枝濺淚開國色天香消息斷粧臺誰奉紫金杯枯藤六尺步長阡客裏韶光絶可憐好著青楓重試火西陽三日突無煙碧羅天宇亂花稠搔首花隂只重愁頭上無貂堪換酒開箱賴有鷫鸘裘石門連日動征鼙花栁無情自繞溪回首故園今好在杜鵑花落子規啼菖葉青青杏蕊新牛耕白水一犂勻蒨裙窺愛踈籬晚不是沉香倚太真天寶三絶凝碧池頭絃管聲秋槐落葉若為情王維空咏朝天句誰似當年雷海青翠輦重登勤政樓紅桃依舊唱涼州但知玉笛傳佳曲不記鈴聲動客愁飄渺黃裙墮遊水瓓斑錦襪委嵬山臂環留得知何用羞殺新豐謝阿蠻攜家避地二首菟裘真可老飄寓失初心去去家山逺行行澤國深光隂三翼過情緒二毛侵何日干戈定鷗盟得再尋生身恨晼晚喪亂遺吾遭百嵗大槐過三年空谷逃平羌無上策醫國付羣豪老大傷篷轉相攜破濁醪鹹倉作呈叔能同官平生懶作子公書俯首銓曹一紀餘第有神馳招隱館久無夢到承眀廬文字真宜覆醬瓿技能只合服鹽車清才弗悟亦塵役早晚促君登石渠直孺叔用韻見贈再和為謝異時黌舍共翻書黃卷相從樂有餘十載乖離馳别夢半生飄蕩失吾廬飲江偶脫胡人馬並海欣逢長者車軟語蟬聫相勞苦羈遊情緒一浮渠次韻陳文仲小園邈在古城隂為愛寒葩杖履尋却笑蓬廬簷下客對花熟睡亦何心低枝垂蕊逗踈隂不學髯龍幹百尋此去江南知幾驛只今誰動故人心大人遊千金訪張仲宗以守舍不得侍行用仲宗韻二首古寺依煙艇一篙春水深石壇幡轉影玉殿磬流音客有張公子僧皆支道林行行雲水窟幽夢渺難尋聞道千金好幽人已奠居森森松繞寺汨汨水循渠旅泊未妨酒長飢猶著書謫仙詩酒地今尚指匡廬和叔才餉酒百事不挂眼一尊難暫忘伻來須酒聖客至引杯長桑落開新甕崑崙接舊觴鵝兒黃液重象鼻碧筒香銀海俄增量金嬰可配漿蟻浮甘瀲灔石飲見溫良世事紛忘去詩情合得嘗醉來庭宇眩醒後竹隂涼釀鄙平原縣鄰防吏部郎糟丘誠可老不用爾聲將次韻蔡仲平察院中秋素魄經秋分外眀桂枝濃傍蕊宫清人寰散影千山白愁絶村村砧杵鳴不是銀河隱半輪滿天散彩絶埃塵幽懷想得如羅隱耿耿相看似故人次韻仲平病間齋祠居士彈一指森羅萬象皆聊須三昧酒不奉八關齋雨罷簾初捲山迎榻自排蕭然忘世慮心境兩相諧次韻林梅卿吏部遊湖竟日關心朱墨間西湖好在且偷間光凌萬頃搖銀海興愜千鍾倒玉山未辦綵毫書側理只愁赤壁下烏蠻客兒忽墮池塘句格律都髙漢以還周元舉侍郎梅花次韻三首不隨羣卉艷陽天幾樹孤芳玉澗前萬樹偏宜髙士卧一枝奪得化工權憂虞莫問兵戈滿賞玩要須酒盞先雖是廣平心似鐡也應作賦詠蕃鮮山村疑有散花天五出瓊瑤忽滿前地僻聞香鮮韓夀漏深濡蠟照公權賞心共付尊中美索笑誰為席上先他日成隂子如綻不堪對酒割芳鮮怪底窮冬雪滿天一枝香艷媚尊前未應黑帝專司殺誰道青陽獨擅權冷伴素蟾斜弄影輕飛么鳯欲相先坐中人是王夷甫幽韻青標兩鬬鮮次韻洪慶善同飲道家賞梅陌上風光驚老眼簇新香韻惱騷人霜晴日淡虛庭裏玉骨幽貞不嫁春麝臍飄馥來踈蕊霜女將寒墮瘦枝數朵臘前舒冷艷催花羯鼓未應知寒葩脈脈畫堂新同是巡簷索笑人獨把幽姿伴氷雪舒花結蕊不關春立盡黃昏賞玊肌月華無語上踈枝絶憐熟睡含章畔無限花飛總不知遊衢州烏巨山乾眀寺烏巨山前談實諦江郎巖畔逗真機白虹示滅知何處去採山桃人不歸次韻劉卿任飲散感秋之作二首雲子登場賽鼓歡村南村北盡黃冠幾聲乾葉下碧甃數尺瘦山浮畫攔水落野橋魚網挂月懸煙浦鵲枝寒新秋愁絶他鄉客衣帶年來如沈寬華堂不料著野客草服底同章甫冠鷗外翠光清醉眼尊前爽氣動危欄霜沉紫荇玉奩濶風脫丹林煙髻寒百榼香醪消萬斛酒中跌宕賴君寬小酌招友時九日寶篋開緗葉香塵墮柘羅湯鳴簷雨細盞占隴雲多連日伊蒲塞今朝熱洛河春風入詩腹五字與君哦眼眀逢九日習氣自多生官冷有間趣花開無世情元囂何許是素滻第存名百嵗風狂士東籬且掇英前訪叔才旋蒙賜詩以貧不能留客為愧次韻一舸風帆放晚秋訪君幽巷卜淹留緑搖岸栁容如舞碧蘸溪毛美可羞喜見林宗歡欲絶久欽阿大語難休士貧雞黍無勞具謀食何如道可謀和道祖韻未落天狼未止戈誰能頻擊唾壺歌奕棊聊欲消憂耳飲酒無如作病何孫紹那憂鄉太逺退之莫嘆日無多菟裘已向菁山卜從此棲遲到髮皤大人築室將畢道祖亦作宅基治園作四詩示道祖習隱肯回駕求榮難著鞭有心營緑野無夢到凌煙盞斚花開裡簷楹鴈落邊氷清仍玉潤共此一山川篷轉欣初定泛金非我鄉買田無好畤共宅有清漳菱罷水天接春回花草香邗溝風月地恰悵隔參商兩地屹相向幽園早辟疆君方林上塢聞移梅栽于上塢作梅林甚盛吾亦沼橫洋鑿翠闢窗户入天棲棟梁東屯寒月夜老杜只茅堂世事只如許幽居試樂哉報安知楚竹索笑得江梅岸放平湖入窗邀逺岫來兩家車馬地莫遣染蒼苔次韻道祖書懷白雲深處縛柴荆一壑灣環似有情志氣已超名利外年華難與嵗時衡濁賢清聖時同酌上尾平頭得共評莫問鶴翎由喙拔此心久與白鷗盟次韻法觀送紅梅羅襪初凌一水間霜深應怯夜來寒含章簷下渾氷雪却要騷人帶醉看胡樞橫山堂鬱蔥佳氣渾如沐霧閣雲窗丹雘新玉碗金杯有微玷瑤林瓊樹無纎塵枕溪飽度看山日橫海小乖嬉水春上古乾坤隨處有素琴濁酒且關身雲夢胸中吞八九了無官事苦相關廟堂曽引五星縷巖壑今疏八節灘鳥織白雲機杼濶溪喧蒼石杵砧寒東山難戀山中相梅子枝頭正著酸朱甍碧瓦市塵逺繞舍泉啼山復橫勝處爭長渾僕妾亂來有此幾公卿已公茅屋實父子裴氏午橋真弟兄竟日倚欄天外眼世間軒冕一毫輕春過木濃山轉翠雨餘湍漲石添痕主人正自笏柱頰客子底容裾撤門好鳥傍人窺野核亂雲釋嶠落芳尊真成命駕輕千里李杜文章得細論天然平逺染百幅泚筆底須束絹傳窗户吐吞新日月風煙出沒舊山川白公築室地多少揚子草元文五千筋力尚堪驅使在異時重泛白蘋船連日灌畦􅀢菜廢作詩莫問新來額插犀了無魂夢到金閨平頭上尾慵搜句重後輕前且灌畦正自無人嘗鼎臠不知有客辨萍虀瘦郎三九同芻豢野薺從教施五溪送李元孟赴湖南漕屬君忽湘潭去斜陽馬首銜將無催白髮正坐此青衫暑雨驅魚嬋薰風入鱟帆南來衡嶽雁引領望書函踈慵間處著踈慵鮮鮮幽桂叢讀書聊竈北避世且墻東市駿卑蘇代求徴謝子公丹心阻閶闔欲付小心風題卧屏十八花姚黃抗旌汾浦根移白豎箔藍關花染紅欲識龍媒空萬馬宫袍黃挾御爐風八仙瑤林瓊樹非人世種得仙花雪作團后土祠邊還寂寞只今空對畫圖看榴花琴軫含房風力微盈盈脈脈度炎暉怪來一夜丹鬚拆杯酒新翻艷冶衣薔薇香風細細入東榮嫩刺柔條疊絳英飛下神霞緣底事剪來曽倩董雙成杜鵑雲昏水暖草萋萋空谷無人獨杖藜却憶西江石樓老送春花下子規啼牡丹北廊東院滿畦栽嫩紫輕紅次第開直與牆葵較多少二千里外一枝來山茶十月幽園開曉風層層絳蕊艷芳叢江南只慣收鷹爪誰願山前鶴頂紅梅花含章英落佳人睡却月香殘水部詩何似江南覔春信和香先得最南枝蜀葵傾心小圃陽初照束火中庭雨不霑裊娜腰支渾欲舞好令韓偓賦香奩杏花攜來仙種手親栽春閙枝頭滿意開正拂文君酒壚上莫教蜂蝶等間來酴醿玉骨檀心不肯粧牽絲引蔓過東墻正須把酒酬清艷莫待幽香閟枕囊海棠濯錦江邊雨露勻杜鵑啼血染香繒定緣佳處詩難貌可是無花開杜陵黃菊秋入重陽氣倍清東籬採菊眼偏眀杯中要作茱萸伴不是湘纍飱落英芍藥沉水飄香透藥塵紅燈爍爍一枝春鼠姑倚檻雖無賴未肯甘為侍近臣桃花細看裂錦又蒸霞黃師塔前江上花折得一枝眀老眼與兒洗面作容華苣霜密葉髙叢傲嵗寒殷紅膩緑映江干沉香亭畔無消息賴有霜前秋牡丹牽牛竹髙節本為青女伴牽牛勿誤配龍孫孔融天下無雙士並坐尊前對虎賁白菊天上新栽琪樹枝拖雲帶月下瑤墀須知正自真仙種豈是金鈿未染時不飲蒲團藜杖屋三間世故真成觸與蠻但有雲山供送目倘無尊酒亦開顔吳宫雪紵鶴翎散越地風荷象鼻灣老子何曽持入夢百年倐忽鬢毛班月蝕六月炎天氣鬱蒸懸空寶鏡沒埃塵長歌不見徘徊影並出初無齟齬輪麟鬬何因識星度鵲飛誰復見天津春秋不著誠非異母惑東家號素臣聞歌二絶初唱城闉雁影寒玉喉䆗窱軃雲簮小叢底處傳歌樣供奉梨園人姓南月眀如鏡酒如空響谷清聲出漢宫怪得中庭紅葉墮琉璃帳底唱回風􅋵葉舟凌巨浪訪道祖一牛鳴處是君家乘興煙篷蹴浪花銀浦流雲新得路人驚仙客在浮槎一頃煙波渺太空獨􅋵蓮葉破青銅炊煙不動無人迹底處求僧與二童春日野飲十載干戈僅脫身殘年重作太平民杯鐺有趣于中好花栁無情分外春不逺上元新甲子肯將短筆怨庚寅從教蕙帳驚猿鶴却欲重彈冠上塵余起官宫庠與道祖通判久聚乍散每有懷想作詩五十韻道二十餘年出處寄呈初拜清揚日菰城荻始芽家聲潢出渭駿氣馬生涯博識該三篋宏才記五車髙眀挈日月文彩炫雲霞結友方傾蓋連姻復附葭鳯軿銀燭映鸞扇彩雲遮去作南陽别俄成澤國賖復都先玉轡濉水會仙槎我止𨝍溝第君歸霅水崖扮關方馳擔毳幕忽鳴笳茂苑依城堞菁山隱􅀈谺林巒迷霧豹鼓吹只池蛙宇宙焦先室庖厨蔡樽茄旋聞剪蛇豕却共注魚蝦經笥精藍肄辭鋒試席誇棘闈排勝陳楓殿趂朝赮聫籍攀丹桂連名掇墨緺枕溪同擇勝築室共崇窊許邁通懸霤何君住若耶竒礓爭磊砢嘉卉鬬紛葩風入黃蘆浦煙橫白鷺沙鷁舟行棹短蟻酒酌尊汙覔句文詞競稱棊笑語譁山深陪杖屨林僻預瓜茶歌放卑王豹琴間鄙里巴朝遊趂奔鹿暮宴起棲鴉溪上方霏屑山隂遽及瓜殿訶紛候吏罄折擁晨衙踊躍良朋賀睢盱野老呀銅章輕擲置銀紱嗣榮加還與牛同皂寧嗟鳯在笯歸來齊靖節隱去類祁嘉鴆堇功名會膏梁釋梵家果因流菜葉倐爾認桃花杜口傷鳴雁持鈎出睡蛇少多臨濟捧生死祕魔義蔬食期羮芋遊心正倚麻一朝牽吏鞅瑣質濫京華宫邸便清佚官曹懼過差學無禆稚騃儒或變淫奢仰德勞心膂陳情費齒牙幸蒙魚網細數寄雁行斜凝望千巖阻何因兩槳拿身修誰琢伐詩病孰疵瑕縮地今無費移山昔見夸願憐魚自適莫惜馬頻撾驥尾終期附牛鳴幸不遐清標如會覿羇旅失悲嗟悃愊煩清縷凄涼倦絳紗聊須哦短句緘印錦溪砂奉祠太一鼕鼕鼛鼓不勤民幻出琳宫逺世塵風咽唄聲金殿邃日移幡影石壇新雲軿搖曳來三境霧帳凄迷妥十神堪笑茂陵成左計虛將棗脯侯秋春鄙意欲以春秋祭太一所用如雍畤物而加棗脯次韻陳廷藻户部西湖快目堂之集氷壺影裡集朋從三雅同傾共一中相與文楸看飛露不須舞袖覔驚鴻雲邊鳥道古來寺煙際漁舟何處翁竟日追歡難卜夜只緣身在省墻東周元舉待制挽歌詞