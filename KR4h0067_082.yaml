忙匆匆弛擔旋舂糧須知五鼓應還起早趂南窗一枕涼將至玉山蓐食轉前峯梅橫細雨中濤翻疑鷺翿泉急認松風山合秧畦窄林深屐路通怪來人語别不枉使江東過九坡在臨江軍道中行盡千山與萬山種情偏在此煙嵐海波神闕今饒六仙女巫峯尚欠三雨潤蒙條生翠滴雲封疊嶺淡煙涵却思九坂修梁地空使斯民命不堪罷職還家漢卿叔賜詩和韻爝火疇能補大眀漫陪朝請起晨興雖叨荷槖簮纓舊頗愧銓衡水鏡澄夜帳歸來驚怨鶴曉窗穴處縱癡蠅自知浮食辜君賜却擬扶藜換斗升題曲屏牡丹桃花不與春風别有因香苞長好四時新曲屏曽見西眀種疑有平泉會裏人一枝濃艷欲燒空誰畏門前手自封豈有落英飄曲檻與兒洗面作華容蒙恩除吏部侍郎子姪以詩相慶雞窗不夢筆頭花分合扶犁霅水涯禁掖俄膺九芝檢仙逹許侍五香車厚陵自昔多承寵曽伯祖嘉祐中為兵部侍郎徽廟於今倍有華伯父先人宣和間俱任大司成無似鵜梁譏不稱儒冠儒服可承家崔申之以詩為别蘇眀父郭逢叔各有和章謹復用韻二首露章瀝血上彤墀螻蟻雖微願弗違韞迹正慚髙士傳離羣却恐小人歸身同元豹霧中隱目送孤鴻天際飛丹竈素書今好在臨風憶子話精微見逺亭邊送落暉菁山挽我惜暌違連年走俗為貪仕一日投間恐富歸谷水為官輕似紙苕溪轉棹疾于飛羽觴捧劍無人問悵望如今束廣微具上人以詩相别復和之定回不解人間世千傾堂前又飽參仙裏未須求七七禪中聊共説三三逺師今日宜同社彌勒他年可共龕不見生公講經處至今花雨落毿毿朱丞相赴宣州四十韻天祐於皇宋時生柱石賢餘光承祖禰秀氣稟山川應物心如水臨機直似弦孔書窮竹簡羲易玩韋編記問諸儒竦聲華六合傳虎闈書考異蟾窟姓名先文卷驚嚴助經師拜鄭虔刋讐飽黃卷遷擢冠青錢稠疊膺神貺澄清出使旃陪都佐留鑰東道握兵權慘淡邉塵靜低回漢節堅肅陳鵝鸛整直擬蠮螉平潛拔淮隂幟爭加祖逖鞭力遮江國路生沮朔陲煙氣概青雲上忠誠紫蓋邊龍飛逢履位蛇輔喜差肩遭際風雲會夤緣雨露偏紫荷躋法從碧落耀卿聫揆事紛紜貫論文仔細研北扉鄰浴殿夜直履花磚將略驚頗牧綸言燦許燕覆袍分蜀錦歸燭爛金蓮左轄精搜選中原付幹旋鳯池邦本正虎帳國威全七校兵屯壯三吳節制專金甌升揆席玉鉉煥台躔治欲追三五時方會半千外臣驚虎拜內地掃妖纒智洗虞淵日忠扶杞國天朝廷終不改宗社復安然宰路連三入官榮笑九遷和戎頻魏絳遣使屢張騫功紀旗常外忠居甲令前兩儀歸燮理萬化入陶甄少戅卑周勃傷苛小薛宣暫迷商野夢來泛霅溪船偃息聊三輔蕃宣表十連敬亭青鬱鬱涇水碧漣漣衮繡看于邁鋒車佇式遄黃麻重拜相又見中興年張千里以詩送郃姪銓試用其韻眀堂一柱已扶顛下詔猶求桷與椽言並玉巵猶閣筆鑒同金鏡共持銓驪珠魚目難齊價嫫母西施孰是妍勉矣一鳴驚衆彥莫將梔蠟誤長鞭旅次二首山行確犖趂雲程食寢無多但有名作夢方成雞喚起加餐未竟馬催行風吹栁葉山頭影雨迸溪泉谷口聲差喜太平行路穩依然六幕自澄清視印宜春一月過寧知平地起風波未成黔突真如傳俄復脂車去似梭雖快徴君還北牗却思太守類南柯流行坎止何須問似覺間中所得多滄浪亭滄浪亭下水連溪影倒虛簷鳯翅齊髙樹迎風迷酒市小樓聽雨響秋鼙魚舟點點依蘋渚雁齒依依跨栁堤舊日滄浪元不變何妨居士手重題大雄寺陳朝檜俗謂倒植檜老檜盤拏古殿春空庭坐閲幾朝曛根株橫裂可尋蟻枝葉倒垂猶拂雲求福端同木居士寺僧云村民祈禱頗驗出靈莫效栁將軍黃奴己見韓擒虎獨有兹村貸斧斤兩宋名賢小集卷八十二
