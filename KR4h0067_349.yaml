body:
  text: 兩宋名賢小集巻三百四十九宋陳思編元陳世隆補四明吟藳吴潛字毅夫宣州寧國人嘉定十年舉進士第一出入朝省不常兩知慶元府兼沿海制置使勛徳最著浙東人士至今誦之為人剛直敢言其所疏奏及與宰相論辯忠憤激烈皆人所不敢聞者先以忤時相罷奉祠既而賈似道銜之不已安置循州乃除其私人劉宗申知循州屬以黄祖之事百計殺之潛預知死日語人曰吾將逝矣夜必風雷大作已而果然四鼔開霽撰表作詩頌端坐而逝循人咨嗟悲慟焉鎮海樓賈山深處古明州新有江南客倚樓鳯闕天連便望日蛟門海晏不驚秋頭顱已迫殘年景身口聊為卒嵗謀蕭颯西風吹敗葉滿眶清淚自難收占春亭桃花㡬片隔牆飛獨自危樓徙倚時目送斷鴻雲外没東風吹淚落天涯翠山勸農小隊旌旗上翠巖松風十里鎖禪闗水深水淺髙低澗春澹春濃逺近山鄉思猛隨蒼鳥去客心暫與白雲閒天公已是多情煞時把淋頭雨放慳聞同官㑹碧沚碧沚堂前瞷水官只應喚作玉壺看頗聞秩秩玳筵展莫遣匆匆銀燭殘酒付别腸寧怕窄詩由廣舌不憂乾老夫孤坐三更月欲往從之良獨難萬頃蟾光浩不收花汀竹嶼思悠悠黄公所隱知何地賀監宜歸乞此洲良夜最佳惟午夜今秋偏好是中秋舉盃洒露月同吸仰面青天可問不張學士故居春來物物攪愁腸排遣惟應閙醉鄉無奈督郵風味惡桃花流水願分嘗天寧長老新齋堂請轉語慧公幻出一齋堂巨棟危梁壓十方更有心堂無量濶濶中别有好思量秋風歎四首長鯨海上來壯士田間起登城復何悲禾稼秋風裏誰將訟風伯謂天懲雨師天閽幾萬里瞶瞶安得知軍書督戰急縣吏催租還力盡將何訴浮雲深九闗嘗聞海客談白浪海風惡秪是欺舴艋那見摧蛟鱷題舒蓼瞻嘯圃獨吟圖二首丹厓白雲往來絶㟁流潮吞吐我所思兮何人莽悠悠兮太古江口寒潮自至山間明月誰招自可歸來坐嘯何須世上折腰聴琴客周信民彈秋泉二首雁湖龍井久知名總入君家匣裏清客舎試彈三兩曲恍疑飛沫濺塵纓故里泉聲不可聞攜琴相約鮑參軍山瓢只繫經行處落葉空山好覔君陸宣公祠凜凜清規百世師功名僅見奉天時忠謀任起姦邪忌感泣寧無士卒思落日桑榆存舊蹟西風蘆葦䕶荒祠忠宣流落何遺恨留得良方與後醫錢塘江三首江頭風雨㺯輕寒小艇輕蓑把釣竿日暮滄浪歌漸逺延縁應自避塵冠扁舟東下白雲鄉一水牽愁萬里長多謝白鷗閒不去知余機事近來忘秋光漠漠草青青日落江流雁下汀世路風波今始半為余遥謝草堂靈兩宋名賢小集巻三百四十九
