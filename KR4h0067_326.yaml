body:
  text: 兩宋名賢小集巻三百二十六宋陳思編元陳世隆補龍洲集中上范祕監二首郡大當塗古分符得少蓬威如烏府在令與繡衣同鈴閣紬書外花村賣劍中少需撫摩意來作玉堂翁疇昔經行路黄山更一過天涯知已少嵗晚客愁多路斷車生角冰堅水不波使君森畫㦸聞此意如何和危府教三首先生場屋文之虎氣攝狐貍自不知老去莫嫌官尚冷灞橋風月要新詩天上羣仙臺望居芹宫未是辱泥塗莫邪變化須臾事一㸃一鎔金在爐行脚諸方履厯深似和禪子寄叢林試拈朝報一轉寤以道觀之無損心上劉知州二首㦸外梅花角有聲使君心與日華明郡當采石今衝要船在烏江罷戰爭酒賤人家歌袴飲地寛客子帶刀耕太平官府無公事見説香凝燕寢兵草樹荒煙晚葉枯又尋短棹泛焦湖場經古戰心欲折客老諸侯飢更驅去國寂寥從白眼籌邊謀畫看鴻儒袖詩來謁公應記曽就襄陽厠坐隅春日即事薄雲籠日䕶初晴沙岸朝來春水生閒傍柳堤騎馬去一鞭春色柳絲輕賞心亭何人將我來此游白鷺那知客有愁如子矜持山玉立似予迂濶水盤洲塵襟抖擻風雲入石刻摩挲嵗月流惆悵謫仙鸞馭逺離離别恨黯難收清溪閣次胡仲芳韻瓊樹枝新梅蘂迸與君攜手清溪問舊來俠客歌舞場何似詩人風雪逕溪邊傑閣髙崚層左右華屋連雲甍依稀王謝鳴珂里彷彿秦箏雲母屏古來繁華各衰歇只有不磨惟璧月小船何處載愁來哀怨一聲吹笛裂從軍樂蛟龍寳劍鸊鵜刀黄金絡馬花盤袍臂弓腰矢出門去百戰未怕臯蘭鏖酒酣縱獵自足快詩成横槊人稱豪但期處死得其所一死政自輕鴻毛將軍三箭定天山丞相五月入不毛生前封侯死廟食雲臺突兀秋山髙書生如魚蠧書冊辛苦雕篆真徒勞兒時鼓篋走京國漸老一第猶未叨自嗟賦命如紙薄始信從軍古云樂次劉啟之韻豪結交游三十年暮年識子海霜邊江西析派詩同社鴻寳傳家子已仙無用白鬚甘我老有才青眼望誰憐譬如飄泊湓城下篁竹蕭疎無管絃送術士一性圓明俱是佛四方落魄總成仙逢人只可少説話賣術不須多覔錢退一步行安樂法道三箇好喜歡縁老夫亦欲挑包去若要相尋在酒邊寄王巽伯朋從紛如雲愈覺居索甚肺肝百憂集五夜不安枕長恐鐵石心化作萋其錦日暮懐佳人霜風悄寒凜遊清潭吕資益蟠谷十絶清潭一潭清淨久無泥潭岸無泥石更竒擬待月明垂釣去前溪雨足怕龍歸蟠谷逶迤路逐驚蛇去轉盼不知身已髙雪積萬層山四合碧油幢外有旌旄飲緑野花紅白倚巖開只可臨風自一杯謹莫放教公子見恐攜窈窕入山來掇羮老子垂垂秋露下九月空林天氣寒黄花剰開且勿剪留得一枝煙雨看初秋香不求知色正清清于九畹見飄零山中若有離騷伴痛飲我知勝獨醒潄玉濕雲將雨過溪東石澀灘鳴水勢雄忽作晚晴秋更好月來林外透玲瓏含暉帝所森嚴寂不喧九闗虎豹守天門何人奏事含風殿日晏鳴珂下紫煙香徑一花帶蘂香氣滿何况叢生樹兩行風露益髙秋雨足請君來此撼琳琅谷菴穹廬架屋石崚􅜤香火西風只一僧日晚課經猶未了閉門先㸃佛前燈碧蓮峯前山崛起青蓮色浄埽晴空如葉開若擬空花猶未了空中安得有峯來春歸百花開盡到荼䕷一片春心又欲歸可恨東風留不得漫教啼鳥怨斜暉村店二首林深路轉午雞啼知有人家住隔溪一鳥閙紅春欲動酒帘正在杏花西溪邊猶棹酒船回冷水灣頭兩意開一路有詩吟不得當初悔不共君來紅酒歌呈西京劉郎中立義桃花為麯杏為蘖酒醖仙方得心法大槽迸裂猩血流小槽夜雨真珠滴峴山之北古襄陽春風爛漫草花香乗軺誰為部使者金閨通藉尚書郎兒樣愛民真父母十萬人家感恩厚鵝兒不酌宜城黄流霞造此江南酒輪蹄日日行樂同琥珀瀲灔琉璃鍾珊瑚枝下貴公子人面日色相映紅䦨干十二開簾幙腰鼓轟雷奏仙樂翠翹金鳳大隄倡玉纎捧勸羅衣薄人生百感能幾何海棠花開春較多有貂可解換一斗醉到天曉待作麽贈陳時可交游半世已公卿猶抱遺經對短檠負米過于扛鼎重選官難似上竿行百年母子相依命一片忠帎誰為明煙火小樓風雨夜嵗寒時得話平生贈宗友中吳喜遇同宗友貌古髯疎亦志髙金玉圖書皆長物六經之外有離騷與青原正菴老倦行老矣徧東南識後青原識正菴無法更求身外説有禪應向意中㕘春風遶寺雨花墜石鼎烹茶泉味甘暫脱塵囂聊税駕與君相對欵清談柬能仁禮老幻身到處是空虚習氣依然未埽除柏子樹邊尋祖意旃檀林下伴僧居三千世界初無礙十二時辰得自如牛糞火堆煨芋熟時時拾得懶殘餘弋陽渡車聲盡日滑黄泥怕聽空桑呌竹雞風雨不知春早晚栁條拖緑半江垂游靈巖風露淒然八月秋痩藤扶我到山頭僧居突兀飛鴻上人跡依稀似鹿游舊事已空流水在閒情都付落花休越王未是真嘗胆計出嬋娟事可羞憶鄂渚我離鄂渚已十年吳兒越女空華鮮不知上游古形勢四十餘萬兵籌邊中原地與荆襄近烈士烈兮猛士猛澤連雲夢寒竹圍城樓武昌曉排陣書生豈無一策竒叩閽擊鼓天不知却思仙人白玉笛匡牀醉倚南樓吹貂蟬兜牟兩岑寂若耶溪畔還作客空餘萬鶴舊題詩醉筆顛狂驚李白寄沈仲居二首十年鉛槧鬢絲秋獨抱成書四海游三國諸人應夢覺一畨公案又從頭萬死中原百戰爭流芳遺臭各垂名思量陳壽已饒舌又費先生幾管城遊古山信步作幽討有菴如此深佛燈明老屋秋日淡疎林柏樹祖師意松楸老子心十年棄墳墓洒淚一悲吟喜雨呈吳按察使君人物舊烏臺天聽雖髙力挽回湖水欲平江已退秋田未旱雨先來雲隨黄鶴想何許風滿南樓亦快哉凉意入秋清似畫月巖知有桂花開平氏書院雪屋彈琴泛作聲寂無人語紙窓明倦游識破諸縁妄心與梅花一處清送王簡卿歸天台二首枚數人才難倒指有如公者又東歸班行失士國輕重道路不言心是非載酒青山隨處飲談詩玉塵為誰揮歸期趂得東風早莫放梅花一片飛千巖萬壑天台路一日分為兩日程事可語人酬對易面無慚色去留輕放開筆下閒風月收斂胷中舊甲丘世事看來忙不得百年到手是功名六合道中十年曽記此來游有策中原一戰收蒲栁易凋嫌勢去金湯無用卒和休悲風彷彿鳴刀斗缺月參差照敵樓廟食封侯何日事不堪老馬又滁州湖口阻風冒雪衝霜已十程狂風又敢戹吾行無人説向江神道莫待明年却世情舟中下水南風不覺難我舟不動穏如山東西日月尋常事變化雲煙頃刻間沙鳥似驚皆退避林巒如畫亦渾閒歸期只欲長安近屈指何時到此闗寄吕英父二首清明蕭散坐才疎收拾窮愁卻著書詩筆有神通寐夢丰標不俗更清癯黄花細雨鼉江路落日西風處士廬抖擻塵埃舊時帽不妨覔句倒騎驢秋到家山冷不知但驚風路入新詩低頭欲拜無東野滿耳惟聞説項斯骨格昂藏雲鶴痩吟哦悽斷雪猿悲文章已得真消息三十科名已是遲題東林爾自貪癡不肯閒江南多少好青山老夫為不愛官職買得狂名滿世間書僧寺壁緑楊染水濃如畫天氣欲晴風自和二月杏花猶未放一春分外覺寒多贈侯戎江淮萬里以詩行此老胸中有甲兵何止據鞍猶矍鑠試教落筆便縱横逢時有用真才出知已不遭儒者輕若見英雄今馬帥為言劉子尚狂生幽居對面滄浪可濯纓不思汎艇出春城浮沈枌社何人重俯仰茅簷是事輕玉蘂連屏寒徙倚蒲萄上架月縱横江湖老矣無他願只欲清隂便得成夢覺夢回斜日轉花隂時有黄鸝送好音髙卧草廬人不識東風啼鳥獨知心過垂虹訪江仲冕一作姑蘇送王武岡不值訪汪仲冕席上口占嚴城夜出鼔鼕鼕畫鷁三更不見蹤何必披雲尋樂廣真成避雨識茅容蘚花似雪玲瓏白臘酒如春琥珀濃若使世間無我輩老夫何處不窮冬觀白鷺洲風濤一聲雷鼓快風威頃刻衝濤没釣磯行客曉看銀漢落陽侯驚起玉山飛蛟龍使爾爭先化鷗鷺茫然失所依安得長竿入我手翩然東海釣鼇歸上周益公二首游戲公孤了歸來不愛名昌黎前進士司馬老先生有節花宜晚無波水自平翳雲遮不得南極益精明早被儒冠誤依稀老更侵科名數行淚岐路一生心自借亡猿木誰憐躍冶金使無鍾鼎志何地可山林除夜寄盧申之見説盧夫子詩成手自書雪便金帳暖雲壓玉川居椒葉儲名酒萍虀薦野蔬夜寒褌犢鼻應念馬相如兩宋名賢小集巻三百二十六
