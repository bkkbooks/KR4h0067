body:
  text: 兩宋名賢小集卷二百二十一宋陳思編元陳世隆補退菴遺集吳淵字道父寧國人嘉定七年進士纍官江東安撫使行宫留守兼屯田使拜參知政事封金陵侯有退菴遺集早朝步葛元哲韻萬井蒼涼欲曙天禁鐘聲斷佩聲聯雲浮玉輦霞裾降風動金蓮寶炬燃四國龍飛清穆世羣工虎拜太平年吾王不惓宵衣念國祚遙知永永傳九日百年王事漫勞形客裏逢時迹類萍無酒可添元老興任人浪笑阮宣醒荆湖城壁連鉦鼓河朔黎元陷寇庭久擁旌旄愧無補敢將衰朽歎飄零登南城江城一眺思悠悠平楚蒼然野水流衰草寒煙梅老墓敗垣斜日謝公樓江山有恨英雄老天地無私草木秋萬古興亡俱是夢丈夫何者為身謀遊青山謝朓宅在焉碧嶂千層鎮一州十年前記作斯遊因看紅杏行停轡為濯清泉坐解裘怪石巉岩蹲虎豹老松偃蹇臥龍虬轉高轉有無窮景杖履何妨絶頂頭風流千載憶玄暉此日登臨不覺疲看取眼前都是句如何身後不留詩須知小飲徜徉日正是高吟寥泬時可惜出山終不免空留翠岫與清漪橫碧堂十一年如一欠伸今朝又得快登臨半城楊柳春風滿四野桑麻雨露深檻外翠峰重入眼樽前白髮遂驚心感今懷昔慿闌處不覺崦嵫日已沈用前韻每來登眺便眉伸高處蒼穹儼若臨投老光隂隨日晚思歸情緒與秋深鷺飛沙際明人目雁滿江頭動客心北望淮淝何處是晚來煙霧正沈沈官梅亭疇昔花前屢舉觴重來鬢髮已蒼蒼未容籬菊成歸隱且向官梅作醉鄉每約松篁堅歲晚肯隨桃李競春芳東風二月無珍惜片片霏霏雪自香宿㽔亭三首正到春歸惱客腸荼䕷架上發孤芳劉伶嗜酒名為酒薛女餐香肌亦香人已今朝衰鬢髮花猶昔日淡梳粧十年陳迹渾如夢徒倚闌干到夕陽東皇為代是南熏醖釀成花逈出塵盡洗嬌紅春態度獨呈雅素雪精神牽衣弱蔓如留客入枕清香更惱人月下星前曾醉插肯容煩暑到冠巾園丁編竹亦勤哉老蔓纎條費剪裁杳杳翠雲深作洞霏霏香雪簇成堆玉虬飛下盤千尺金爵擕將飲百杯説與此花狼籍後園林杖屨亦稀來揮塵堂二首老守重來何所為築成臺榭鑿成池緑深夜雨龜魚逺紅壓春風鶯燕遲民樂軒墀偏少訟官間園圃自多詩鳯團啜罷投衾枕夢覺花間日影移戀宿懷安物我齊況兼兩世四持麾可憐園內樂成日却被宫中捉去時李郭詩篇懷舊迹歐梅歌舞悵新知多應日後清宵夢頻到姑溪溪水湄送杜尚書赴行在龍德剛中道學優洛中夫子爾同流暫離天府安邉閫又屬軺車返帝州萬里長城唐李績百年勳業漢留侯明朝回首秋江上泰華巖巖天際頭冬雨坐來雜霰灑隆冬痛飲那禁觱發風却憶西樞承旨日冒寒猶立大明宫高氏小景地白天寒凍裂裘何人乘艇下中流披圖孟浪不相識疑是當年王子猷峨眉山在采石見寰宇志一帶天分南北限兩眉煙鎖古今愁缺附詩餘念奴嬌牛渚我來牛渚聊登眺客裏襟懷如豁誰著危亭當此處占斷古今愁絶江勢鯨奔山形虎踞天險非人設向來舟艦曾破風浪千疊追念照水燃犀男兒當似此英雄豪傑嵗月匆匆留不住鬢已星星堪鑷雲黯江天煙昏淮地正是斷魂時節欄干捶碎酒狂忠憤俱發水調歌頭杏太白已仙去詩骨此山藏胸中錦繡如屋都乞與東皇碎剪杏花千樹濃抹胭脂萬點妖艷斷人腸曉露沐春色晴日漲風光孤村路途休暇共徜徉酒旗斜處一簇幾紅糚暫息江頭烽火無奈鬢邊霜雪聊復放疏狂倚俟玉壺竭未肯寶鞭揚沁園春夀弟相國喜我新歸逢戎初度關情更深正晝掩柴扉我尋隱遁曉舒愧府戎正經綸白石清泉紫樞黃閣同氣何妨出處分休嘲笑儘弟為宰相兄作間人南國借我登臨都不怕近前丞相嗔但曳履扶笻堪憐獨步攜壺載酒每歎孤斟七帙開顔六旬屈指風雨對牀頻上心殷勤祝道何時回首及早抽身兩宋名賢小集卷二百二十一
