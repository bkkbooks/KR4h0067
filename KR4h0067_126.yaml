body:
  text: 兩宋名賢小集卷一百二十六宋陳思編元陳世隆補沈中允詩集沈括字存中湖州人嘉祐中進士累官龍圖學士博學洽聞凡律樂醫卜諸家皆有論著嘗使契丹圖其山川風俗上之元祐間謫知秀州卒栁志収入流寓今仍之望海樓雨聲林外盡秋色望中添落日挂疎栁逺江横暮簷好風疑有意隨葉故爭簾為問樓中客胡為盡日淹夜登金山樓臺兩岸水相連江北江南鏡裏天蘆管玉蕭齊候送一聲飛㫁月如烟登北固樓丞相髙齋半草莱舊時風雨滿亭臺地從日月生時見天到江心盡處回三國是非春夢㫁六朝城闕野花開心隨潮水漫漫去流遍烟村半日來花山寺經旬飄雨喜新晴病馬新晴取次行老態只應隨日至春心無意與花爭山川滿目浮烟合樓閣侵天暮靄横嗟我有身無處用强攜尊酒入崢嶸姑孰溪二首豹堂春水緑泱泱謝市雲深栁線長睡熟不知潮信過船頭晚雨打菰蔣新晴渡口百花香石子池頭鴨弄黄捲幔夕陽留不住好風將雨過梅塘蛾眉亭雙峰秀出兩眉彎翠黛依然鑑影間終日含顰緣底事祗應長對望夫山秀州秋日草滿池塘霜送梅林疏野色近樓臺天圍故越侵雲盡潮上孤城帶月回客夢冷隨楓葉㫁秋心低逐雁聲來流年又喜經重九可意黄花是處開歎老為覔少年心不得當時感舊已潸然情懐此日君休問又老當時二十年鄜延凱歌五首先取山西十二州別分牙將打衙頭回看秦塞低如馬漸見黄河直北流天威畧地過黄河萬里羌人盡漢歌莫堰横山倒流水從教西水作恩波馬尾胡琴隨漢車曲聲猶自怒單于彎弓莫射雲中雁歸雁如今不寄書靈武西涼不用圍畨家總待納王師城中半是闗西種猶有當時軋吃兒旗隊渾如錦繡堆銀裝劍背打回回先教淨掃安西路待向河源飲馬來江南曲新秋拂水無行跡夜夜隨潮過江北西風卷雨上半天渡口㣲凉含曉碧城頭鼓響日腳垂天際籠烟鏁山色髙樓索莫臨長陌黄竹一聲無北客時平田若少人耕惟有蘆花滿江白兩宋名賢小集卷一百二十六
