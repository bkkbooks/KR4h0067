body:
  text: 兩宋名賢小集卷七十五宋陳思編元陳世隆補安嶽吟稿一馮山字允南蜀之普州人初名獻能嘉祐二年進士熙寧末為祕書丞通判梓州終祠部郎中有安嶽集春意賞花不須折一折春思闌飲酒不必醉一醉無餘歡相知共清賞所屬聊孤彈朝繁坐臨池暮惜行繞欄醒醉無異趣開落同一觀鄰花隔牆悲憔悴枝葉單鄰翁貪酩酊疾起春向殘但知芳菲意常作悠久看送鼎倅陳安仁虞部峨峨陽山民資以仁僭陽欺天不需不神而乞于民泱泱沅江城繄以寧橫流漬川不畜不靈將坎于城暴政殘俗劇于懷襄猾胥擾民甚于凶荒借公後時吾民幾亡舞公入城若旱而雨若霖而晴頌公之還孰靈沅江孰神陽山和程之才正輔感遇天理貴自然枉直各有病人情隨所得是非本無定此身寄軒冕心與萬物競低回就銜䇿跳踢落機穽巧求固為纍矯枉亦過正持之有原本出處一以靜所守以吾道所安以吾命不驟窮馬力決不暴虎性富貴偶而已勿使憂喜並感遇難我知無言為心聽郊外杖僻走世喧吟靜追古意解巾卧柔碧虛懷揖爽氣漏竹日腳紅出亭山尖翠偷間興未足遲遲動歸轡城南散雪郊外風含晴霧中日江流淺可渡潺湲弄幽石長堤塵未動遊子念逺適行止慎厥初輪蹄有遺迹和果倅趙袞良弼平江亭牛峰絶頂凌雲閣形勝潼江照開廓涪水臺中隱几菴坐對西山橫碧落頃嘗登覽放懷抱鈎挂軒窗卷帷幕氣酣景熟狀不起一片風騷情索寞充城纍身倦未出無事門庭可羅雀翠筠五瑞掃塵土澄照清風易椽薄平江最好最後到隱几凌雲僅依約屏坐主人局間散長句森森邀我作漳濱病起吟魂耗中散慵來筆鋒弱鏗金入木將奈何手把新篇空愧怍寄高梁守勾輔元北按經時出南歸計日趨幽花明澗水細雨潤春途就歇開新醖催行趁早晡故人休問吏相見且歡娛小溪尉丘君父母年皆九十康強精明尚能讀書挫針如五六十嵗人相繼受恩命某固未嘗見也亦未嘗聞也因作詩遺丘君且以傳諸士大夫如果未嘗見聞則宜相與樂道其美而形于歌頌云人間夫婦老難期九十俱全古亦稀滄海蟠桃看結子碧梧棲鳳久忘歸君恩黃髮頒新誥兒戲青衫著彩衣一尉三公無此樂百年琴瑟在庭闈寄題希元承詔堂希元惠詩因次其韻鸑鷟峰前舊隱亭仙翁曾此被弓旌雲山每恨未能到松桂向人如有情公自有詩云庭下松桂栽清陰從此始共把清尊慙北海更聽餘論學南榮何須酩酊為真賞歸袖瓊瑰已自盈壽春穆東美有節亭淮上仙翁倚嵗寒繞亭間種碧琅玕林泉莫恨歸時晚風月偏宜靜處看為愛蕭森從葉密欲令蕃衍放根蟠階庭已見清隂合更長龍孫百十竿和鄧內翰遊烏奴寺萬險初離峽三程未到關相歡才把酒偷暇更尋山古意登臨外人生笑語間一茶遊興盡簫鼓欲催還和新成都知府鄧潤甫溫伯內翰道中見寄與鄧奉節交承畫舸秋離峽長江水齧隄郡樓高送别客袂慘分暌前後聲難繼升沈分不齊私心嘗有待得意幸相攜千里聞鳴鳳三年倦割雞一哀纒性命萬事錯端倪英俊聨翩起清華直上躋平生依筆研俯首失鋤犁同嗜餐秋菊忘言病夏畦精粗分玉石去住即雲泥近列多鵷鷺誰人享駃騠徊翔趨鳳閣隱約駕雞栖訓誥資溫潤衣冠出品題風流清憲府威望肅朝閨戲彩江湖樂觀濤嵗月稽還朝垂拱北易帥華陽西舊德傾中外歡謡浹庶黎忽聞旌棨近頓解簿書迷一笑何勝喜高談為少低長篇追杜老餘論及曹溪把酒聽新闋尋山傍小蹊欹斜行疊嶂空曠上危梯拾掇留尊俎蕭踈愧糗藜故人難會遇壯士合悲啼物理紛無定年華去可悽王師行解甲盟府重盤圭劍外聲文鐸關中息戰鼙時清數相見寧望胯金犀鄰家婦鄰家婦一貧復一富舅姑愛憎苦不常憎貧愛冨多心腸富婦初嫁時身上曄曄生輝光舅姑好財不好義婦道無復較短長不如貧婦巧且勤巧能養家勤養親君不見古來烈女傳往往多是貧中人鄰家婦一為烏一為梟貧婦慈孝富婦驕和徐之才浮萍瀟灑春容靜飄搖水性柔根從何處起身任此中浮得地輕依託隨波旋去留潢汚深不采溟渤望空悠花蕊看還落蕉心久未抽豈如經夜雨便欲障江流晚入吳歌唱晴邀漢女遊翠連芳草渡寒映緑楊樓碎剪神工巧平鋪澤國幽微軀烏足道浪迹更誰收踏破間行鷺衝開暖上鰌但知能委順何用校稀稠漫欲通河漢寧虞踐馬牛迸從菱芡密如把芰荷揉寂寂苔成陳紛紛芥作舟屈騷遺故事湛賦壯前猷蛙躍沾雙股龜行蔽兩眸聨居如有守逺近亦無求别浦千重恨吟塘萬點愁生涯隨所寓細域浩難籌野色宜茶竈仙姿泛酒甌清芬傳澗沚餘思滿汀洲暗與蓴絲結多為荇帶鈎豈専嬉雁鶩自可覆蛟虬助賞名園側含情古道周遡洄差勝概汩沒尚憐漚赴急如趨市逢枯類轉溝吉祥興霸業美薦格神休為愛常青眼難題幾白頭新篇盈巨軸牽強豈能侔與陳萬石千首詩兼百首文宗韓之子拾遺孫吾鄉此道嗟幾絶先世餘風喜僅存三變聲名徒自惜平生襟抱向誰論相知惟有貧相見撥置窮愁付酒尊送韓存寶閣使君常慷慨論兵機喜見韓侯定逺歸將略無窮雖世出秋毫不犯似君稀封侯氣骨青春在報主功名白日飛齷齪簿書何所戀擬投儒服換戎衣李待制寄僧詩有歇定之語兼聞有岷峨之遊因作詩以寄之二首無心宜與物相期既歇須行似不疑出處休將人事説功名多在老成時胸中白練何妨潔足下青雲豈自知好取聖賢權進退莫教輕重失毫釐春遊遊盡欲尋山杖屨岷峨只等間但放高懷窮物外不知清譽滿人間經年緑野嘗沈醉幾日香峯暫往還自笑塵轅盤未得逍遙無路一追攀求劉忱明復龍圖畫山水晉唐諸公重小筆高價直與才名俱然多華丹少泉石清格往往人間無至今百存無一二存者真偽難分區營丘李成稱絶迹峰巖秀拔非常模穆之灑落亦其亞玉堂屏上瀟湘圗董屈許范凡數輩隱隱俗氣藏肌膚乃知山水係絶品筆墨造化非功夫要之文章之緒餘世上真巧歸吾儒益昌臺府少文字見性文空談毗盧龍門雪景生坐隅山潛水奧爭奔趨倚空直幹鬬孤聳緣險古道盤縈紆擁衲禪僧對寂寞攜琴朝士來﨑嶇主人肆筆聊自娛新言默與天機符公家清白傳數世經濟滿腹氷霜壺一言不用輒掉臂五年蜀使甘馳驅時將素毫寫胸臆寧復意外分精粗復古雖清尚許格復古詩道寧格疑其學許也與可亦壯非燕徒文與可學燕穆之然未至也豈如公思脫羈束破碎嵩華傾江湖窮冬從公熟窺看愛重不覺聲嗟呼靈峯北苑助蕭爽雪不到地聲號枯平生好畫已成癖寧借不喜臨與摹出公門下欠公筆有類客海遺明珠願公乘興一揮灑束絹數幅光芬敷異時解組還故廬皎潔將伴林泉軀灩澦堆巨石當江衝江水皆倒還夏秋水石鬭怒浪高于山長年欲下峽防石如防姦乘流一無備拳石皆險艱獨使灩澦誇千載不可刪岑公洞武龍南浦南秀拔異衆山下有巖洞幽嵌虛隱玄關岑公江陵來一寓不復還養神脫塵滓百嵗如童顔至今遺像存寂寞空幢幡老柏壯人氣清泉繞回環暫為物外遊偷向壺中間叟其靜者歟深藏厭喧煩或將避擾攘甘此石穴艱不虞身後聞敻若高難攀萬事皆偶爾多在功名間溫湯寺溫湯氣如蒸冷泉寒於氷並流不相入洶湧爭奔騰佛廬煥金碧法地何時興二泉灑其間回環清且澄維舟愛古柏磴道垂千層殿堂絶纎埃瀟灑嚴香燈敲欄施魚食弄水搖懸藤一掬洗病眼再潄祛煩膺逺訪豈憚勞勝遊誠可矜送李才元待制二首直道﨑嶇出禁林江湖長有愛君心五年漢法更張際千里潼江惠澤深天下鵷鴻方得侣道旁桃李正垂陰邦人不用留行色滿斾薰風入舜琴為掾初逢幕府開便將清望屬非才重來門下經年後始見天邊促召回況有平生餘事業此行高步脫風埃孤蹤已作溝中斷休費工夫為剪裁和苖子居新缺道中閬水兼山鬭曉光星軺親按古村鄉臨江麥隴煙雲翠夾道林花錦繡香使旨天邊勞按察人情車下見歡康東風相伴行寬詔敢問年來鬢髮蒼寄題榮守岑象求巖起太博清富樓南樂太守傳詩郵詩題清富城西樓樓中風物略已盡行欲模詠難為酬憐公謫官不纍意如與萬象同優遊扁舟隨分與山水好景散漫無人收昔人知宴不知賞俗氣未斷煙雲羞凌雲把酒獨長嘯嵗久此地才風流公帆南國走欲遍聳秀浩蕩皆窮搜歸來耳目殊未厭尚恐勝概遺遐幽九疑巖洞識元叟三湘泉石封栁侯名賢到處適所遇非事筆硯搜林丘五年留梓恣登覽百剎照水江環州得公新篇似相約正上兜率吟清秋塵中嗜好屑可鄙恨不徑往追公遊他時三老期一笑愛間豈是平生謀和周正孺遊醴泉寺蠶叢衰遲猶有少年心十里名藍共訪尋抹緑郊原逢雨後殘粧桃李覺春深譁喧歌舞隨流俗瀟灑溪山憶故林一醉不辭繁上酒簿書回首費光陰和鄧溫伯一首不獨高文耀世竒曾將宏議振天維誰人才術能爭手自古功名貴及時暫别鵷鴻蓬海上少留旌斾蜀江陲西州筆硯雖衰落會有中和樂職辭送程嗣恭正基提刑赴闕從來貴閥多豪俊失在矜持驕與泰白屋寒門亦有人往往窮愁損英概得時舊恩報不暇安能與語功名會驊騮擺首倦銜䇿一蹶中途為傷駃簮纓重要畎畝壯所養既完發亦大磨礱寶刀挫圭璧更向天資才術外正基太師丞相後學博文清古冠帶天機不露驥盤櫪雲氣雖升蜃沈海平生胸中未一出萬事食間宜少待語默機巧孟軻盜顔色睢盱次山丐世故未能以身殉家聲欲傳道猶在逺别相知試一言不是向人歌慷慨桐軒幽軒處清奧前有雙桐起婆娑勢初合修聳意未己葉分竹巖路根漬石沼水秋聲動素琴曉影覆齋几主人相對樂性靜窮物理純音藏未兆孤幹直不倚安得千仞禽來哉共棲止竹軒翠筠清人心愈少愈可愛風騷靜中得一室處以泰北軒隱吟几復與此君對泯默追古意蕭森散秋籟淡薄世鮮味俯仰誰與會七賢非吾徒心猶有名在寄題宇文之邵南止亭公南九亭名止止亭不妄作名何為羣公賦詠得深趣清絶正與斯人宜鋪張止義到無説使吾下筆先遲疑聖賢出處無定轍俯仰輕重爭毫釐云行非行止非止由賜狂病淵騫癡公南少年負才術試仕吐出胸中奇一言齟齬便投袂自道豈欲求人知公卿文章強且起舉首謝絶無還期傳家萬卷書史樂負郭五里松楸悲岷峨嘉景照硯席事攪輒醉醒仍詩有時日晏卧不動鬱鬱經濟藏肝脾太師竹洞枕溫洛龍圖藥圃臨清伊二公止迹不止道力與名教相扶持今君所處近伊洛道在不必分高卑文章自可敵行事荀孟皆我知為誰亭非俗亭止非止人物不到西南欺間宴亭徹頂造間宴據欄俯山齋軒窗蔽修竹磴道懸蒼崖登臨快雙目應接煩虛懷羣峯病擁閼次第隨天開物色無定姿變化紛難裁高吟絶儔侣但攜清尊偕物理醉可一逍遙付齊諧西縣道中漢水引我行梁山邀我坐山水已清絶舂容碧相和下馬取酒飲梅飄酒中墮日落醉不去青茸草間卧寶峯亭益昌萬山間寶峯秀惟獨使臺俯山下氣象互盤覆鬱勃尚南走回環已西屬古城削千仞危棧轉幾曲錦繡紛上領琅玕翠搖腹亭榭何參差逺覽意尚局絶頂躋寶峰超然脫羈束城市截唾落二江可手掬重關固天險大道不停轂古意劇滿眼人事傷轉足主人始經構高蹈非絶俗幽懷卷雲霧長嘯動巖谷鳥雀爭晚林冥冥有鴻鵠寸步異出處虛心見榮辱屈將經濟才分繼騷雅躅語默固可傳誰為寶峰録巴子臺忠州早渡鳴玉橋竟登巴子臺雲林擁磅礴磴道窮縈回古寺不足觀猶有南軒開浩蕩橫深溝逶迤環覆杯古人去我逺萬事隨塵埃赤穴何渺茫青山但崔嵬聞名不知實此意空悠哉乍到輒復還石滑倦去來苟能厭耳目未免窮筋骸和湖州文同與可學士見寄聞乞湖州去交親不與謀京塵收馬足汴水放船頭試茗春歸渚題詩月滿樓散人吟不盡苕霅一溪秋過永泰文與可宅因寄數程奔走倦征車喜見蓬仙舊隱居秀氣峯嵐排户牖清風樓閣鎖圖書一從高步東山起重見深秋少室虛無計墨君堂上看林間猿鶴共躊躇讀劉賓客外集七言常愛中山好百首猶存外集多大約晚年知性命一時清韻入中和森張劍戟雖無敵隱約瑕疵惜未磨三繞花欄俱讀盡杜陵回首鬱嵯峨和子駿郎中清江道中繚繞川原又載馳人情風物共依依膠舟野水涸將盡捲雨嶺雲寒不飛豈憚長途勞使傳尚尋清景扣禪扉前山次第看梅發剩帶新年春色歸送滿夷行秀才赴太學漢唐諸儒經術淺事業不及文章多六經意義失原本次第疏鑿成江河聖朝羣公盡禹力注海一道橫流波淵源太學得至寶洗出光耀猶鐫磨聖朝德業貴簡易一氣自在生中和針醫馬蹄鑿渾沌或恐純粹成雕訛君方茂年已知道歸涉浩渺登嵯峨置身爵祿慶賞外人迹斷處逢丘軻八陳迹永安宫前瀼西磧萬流峽口爭奔激秋濤卷地裂山谷水落依然陳圖出陳形聚拳六十四傳是武侯親手迹斯人管蕭豈足道身在巴東心漢室從容所遇皆法制浩蕩胸中萬分一陰機暗與天地合壯氣曾將鬼神役至今千載矻不動渺莽幾深難致詰豈徒豪傑重嘆賞應有神靈常護惜廟偏裸裎七壯士酒炙紛紛走巫覡萬事顛倒皆偶然卧龍無處沾餘瀝和子駿郎中文臺地接松枝絶塞邊星居人户種畬田語音高亢關中俗風物蕭疏劍外天一失羈縻生保障十分流運費刀泉閭閻漫作封侯計幾輩伻圖到上前兩宋名賢小集卷七十五
