body:
  text: 兩宋名賢小集巻八十六宋陳思編元陳世隆補袓龍學集祖無擇字擇之上蔡人進士高第累官直集賢院出知袁州入為龍圖閣學士權知開封府進學士知鄭杭二州神宗朝知通進銀臺司知明州坐事謫忠正軍節度副使移知信陽軍卒有煥斗集書高辛氏廟平昔敘星辰元功祀事分因人列官紀行道亞皇墳高躅追顓頊徽聲壓放勲淳風今不競帝典世無聞陵古森喬木祠新際逺氛樵蘇當季運血食屬明君開寶六年勅建是廟舊壤資餘廕遺黎薦苾芬春秋奏簫鼓疑是大英文依韻和登州推官張同年之梁山峻極乾蒼蒼班移自混茫勢臨坤軸斷根入海濤殭屹立踰千仞孤標冠四荒興雲山近泰浴日出連暘絶憤於斯勝煩襟到此涼山經終寂寂祀典漫煌煌山海經不載此山秦祠八神五曰陽即此山也巖黒驪龍睡煙清朱鳳翔藏書陋羣玉中瑟小空桑空桑山材中琴瑟禹載無遺跡秦碑有舊章乘輿留直上鞭石宛居傍在昔初遷鼎當時異省方縱心師誕妄恃力逞彊梁儒學微言絶神仙怪説彰錫符尊徳水留䜟著吾裳豈念思王度惟期至帝鄉齎男何杳杳秩祝自琅琅詎得三山藥翻同一國狂八神寜爾福二世果斯亡始禍聞陳涉遺書見子長龍興成大定虎噬免交攘往事真塗炭寒心劇刺芒自從兹滅國誰復此祠陽寃毒疑淪髓凋殘競沐瘡鑒宜觀夏后道合慕陶唐聖世踰三代明君掩百王朝廷隆盛禮簡冊耀休光運契千齡統歌喧八達莊古今稱治理夷夏共瞻望洪化周無外羣生洽太康東民休望幸端拱徳芬芳和御製賞花釣魚時為中書舍人禁篽春深御幄開鳴鞘曉出五雲來花含瑞色三霄露酒湛晴光萬壽杯香餌得魚波滉漾仙音儀鳯日徘徊微臣叨竊逢宸幸垂槖甘泉此從陪九日陪舊㕘政蔡侍郎宴潁州西湖秋晚西湖勝㮣多台軒來此駐鳴珂沙鷗散去驚絲竹煙栁低垂間綺羅亂擲金錢和露菊狂摇鈿扉倚風荷下僚幸接曹尊末率爾翻成擊箸歌讀王元之後集題於巻末其集三巻皆出黄州後所作詩提筆㡬回書誥命剖符長是守方州未能抗表分司去五閒詩又題云何當婚嫁了抗表請分司終老為郎謫宦休歌舞懶呼寒食節寒食讌郡客詩云歌舞懶呼筵上妓饑寒慙見獄中囚醉吟孤坐月波樓月波樓詠酌獨酌詩云孤吟獨酌送殘春坐久樓邊白鳥馴文章獨步成何事太宗嘗日王禹偁文章獨步異日垂名不朽空有離騷寄隠憂寄獻闕下一二知己公道當朝絶比倫因憑培養變孤根纔衝霰雪游梁苑便逐風雷化禹門南郡已甘抛絳帳東州何幸佐朱旛心懷象魏自江海兩地悠悠欲斷魂歴城郡治凝波亭濟州耽耽層宇俯清漣山色波光曉共鮮形勝争雄齊十二風流素盛客三千鋪舒栁影眠鷗渚欺壓蓮香載妓船公退每來須度日塵纓未濯媿潺湲留題泰山孫復先生新居築室新成日觀前亂雲重叠稱高眠人逢捫蝨驚旁若衆望乘駒詠賁然名理静談誰捉麈古書閒校自磨鉛行聞天子東巡狩羽葆親臨此禮賢試筆濟南通守欲㡬年最課無成媿古賢却為簿書抛筆硯每思樵釣負林泉浮名自信雖徒爾薄俸相拘且勉旃已共妻孥約生計㑹須搔首賦歸田監丞蕭君見貽嘉句仍恵芳醪强率鄙詞輒繼高韻聊資哂爾深媿斐然遲日和風婉婉春感時情思浩無津煩君遠寄中山酒顧我方為洛社人濡筆便思題素扇當尊難惜吐芳茵己欽才妙兼懷恵相遇文塲願捧輪寄泰山孫復先生心與白雲閒五十秋風鬢不斑自有清名滿天下更無塵跡到人間逍遥樂外非攸好貪懦聞風合厚顔不待高吟賦招隠見收餘俸滿青山蕭五監丞新作堂成名曰知雄且賦彫章題之屋壁勉率蕪惡以繼高韻况堂佳號塵游外題壁新吟藻思春撲素自持師老氏清醒常戒鑒靈均窮通一致由知命仁智相須合入神因覽君師我顔厚不能假日樂天真題三教圓通堂其堂在蔡州開元寺内龍學時知制誥師本佛之徒潛心老與儒一堂何所像三教此焉俱香火長相續丹青久不渝高賢旌好亊二記聳龜趺馬上讀韓吏部集驅羸倦逺征尺箠亦慵擎却得開編看仍教縱轡行儒推文暢行詩許孟郊鳴盡日既遺味渾如挹太羮至齊五月兩院獄空喜而成咏厭預鈴齋議欣聞獄犴空三章用舊制五月紹遺風止繫垂衣治非干别駕功惟期四海内刑措與周同眂役于清偶書四韻寄示幕中賓客經旬一水湄風土化緇衣豈敢嗟于役何當賦式微雲山晴特秀花木暖相輝期子同攜手春游事勿違齋中邸書事軍壘無多事朝晡且放衙吏人如野鹿公署似僧家京信因求藥賓懽為鬬茶忘懷塵俗外枕籍祗南華羌先生廟先生高世跡舊隠白雲深結宇知何代遺祠直至今地分壇杏影門接社蓮陰我亦希風者終朝託玉岑贈廬山崇勝珂長老珂也僧中秀曹溪得祖衣雲泉聊適性缾錫遂忘歸九月秋風老千山暮雨霏我來陪静話相對兩無機送承澤上人歸寜富沙五老峯前見過從一嵗餘還將隨客棹歸去侍親輿乞食江雲際閒吟臘雪初秪應清夜夢時復到荒廬酬江西運使齊工部見寄龍坂彌年别長兹仰道風夢曾瞻使節喜忽得詩筒詞藻春林秀恩私地鎮崇因將示知者傳誦滿江東游韶石純音何寂寞秀色自崔嵬巖草遺簫在溪禽學鳳來余希探禹穴人似畏軒臺登眺秋風裏煩襟盡日開秋曉寓目梧桐冷墜秦宫井沆瀣光浮漢苑槃倚杵逺天垂六幕照梁初日上三竿鴛鴦水宿雲飛無定期雄雌兩兩鎮相隨到頭不會天何意却使人生有别離後池新栁客來莫怪寡心情俗吏喧嘩不喜聽多感後池楊栁眼一回相對一回青歴城春日對酒數尺游絲拂面來數枝紅杏向人開眼前信美非吾土且勸春風酒一杯戲别申申堂翠栁和煙籠碧沼紅芳如火照芳鄰主公欲去寜無戀倚翠隈紅屬後人汴水即事波狂如箭雨如絲汎汎扁舟瞥鳥飛睡起啞啞乍鳴櫓却思村舍聴鄰機題袁州東湖盧肇石袁山之陽秀水側草覆遺基誰氏宅昔云子發其姓盧往以文章名籍籍宅中舊物何所存惟有嶙峋一區石闊纔三尺高倍尋久卧塵沙羣瓦礫余心好異因獨往下馬環觀聊拂拭地表可見十二三已足怪駭動魂魄呼工運鍤塹其旁挽以長絙百夫力雜然鼓譟登大車恍爾如䝉巨靈擘選置東吳最佳處四面澄波暎天碧倚空突兀無與鄰頓覺亭臺增氣色彎環幽竇莫敢窺恐有乖龍飛霹靂余嘗南游到陽朔衆峰矗矗春筍植捫蘿踏蘚窮之遍若此竒觀曾未識郡人奔走來如雲故老驚視復唧唧乃言此石遇真賞屈指于今年二百沈埋曠代誰爾珍一日光價逾荆璧嗟余束髪大夫後區區志尚惟孤直十年再謫非不窮猶慕堅絶無改易如何故老不我愚感物再三形嘆息石不能言人有言勿使他時重湮阨和李泰伯送春絶句九十日春今日盡送春何況我先知後期應在經殘臘重探梅開雪裏枝憶昨相逢甲午年與君同賦送春篇等閒又見春風老更捧新吟一惘然萬樹紅芳落漸稀浮榮能得幾多時孤根未識陽和力春去春來兩不知袁州慶豐堂十閒詠皇祐五年十月二十一日吏散鈴齋掩閒眠到日斜無端是春夢容易繞京華鄭聲良可厭閒抱七絲琴欲識調絃意理人先理心年長身多病閒抄已試方未甘先犬馬畢命報恩光青山日相對閒看白雲生誰謂無心出中含濟物情曉按三盃後閒烹北苑茶色香俱絶品雪泛滿甌花扁舟賓客少閒作道家裝跡静心還静逍遥覺日長雨霽輕埃息閒吟面曲池游鱗時對擲雙破碧漣漪朝來因試筆閒答故交書莫怪音塵絶吾心與世疎漸老無功業閒思惜壯年桑榆如有待猶可勒燕然晴軒足清趣閒與鶴開籠寄語北山侣無驚蕙帳空兩宋名賢小集巻八十六
