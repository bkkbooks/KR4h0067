body:
  text: 兩宋名賢小集卷八十六宋陳思編元陳世隆補袓龍學集祖無擇字擇之上蔡人進士高第纍官直集賢院出知袁州入為龍圖閣學士權知開封府進學士知鄭杭二州神宗朝知通進銀臺司知明州坐事謫忠正軍節度副使移知信陽軍卒有煥斗集書高辛氏廟平昔敘星辰元功祀事分因人列官紀行道亞皇墳高躅追顓頊徽聲壓放勳淳風今不競帝典世無聞陵古森喬木祠新際逺氛樵蘇當季運血食屬明君開寶六年敕建是廟舊壤資餘廕遺黎薦苾芬春秋奏簫鼓疑是大英文依韻和登州推官張同年之梁山峻極乾蒼蒼班移自混茫勢臨坤軸斷根入海濤殭屹立踰千仞孤標冠四荒興雲山近泰浴日出連暘絶憤於斯勝煩襟到此涼山經終寂寂祀典漫煌煌山海經不載此山秦祠八神五曰陽即此山也巖黑驪龍睡煙清朱鳳翔藏書陋羣玉中瑟小空桑空桑山材中琴瑟禹載無遺迹秦碑有舊章乘輿留直上鞭石宛居傍在昔初遷鼎當時異省方縱心師誕妄恃力逞強梁儒學微言絶神仙怪説彰錫符尊德水留讖著吾裳豈念思王度惟期至帝鄉齎男何杳杳秩祝自琅琅詎得三山藥翻同一國狂八神寧爾福二世果斯亡始禍聞陳涉遺書見子長龍興成大定虎噬免交攘往事真塗炭寒心劇刺芒自從兹滅國誰復此祠陽寃毒疑淪髓凋殘競沐瘡鑒宜觀夏后道合慕陶唐聖世踰三代明君掩百王朝廷隆盛禮簡册耀休光運契千齡統歌喧八達莊古今稱治理夷夏共瞻望洪化周無外羣生洽太康東民休望幸端拱德芬芳和御製賞花釣魚時為中書舍人禁篽春深御幄開鳴鞘曉出五雲來花含瑞色三霄露酒湛晴光萬壽杯香餌得魚波滉漾仙音儀鳯日徘徊微臣叨竊逢宸幸垂槖甘泉此從陪九日陪舊參政蔡侍郎宴潁州西湖秋晚西湖勝概多台軒來此駐鳴珂沙鷗散去驚絲竹煙栁低垂間綺羅亂擲金錢和露菊狂搖鈿扉倚風荷下僚幸接曹尊末率爾翻成擊箸歌讀王元之後集題於卷末其集三卷皆出黃州後所作詩提筆幾回書誥命剖符長是守方州未能抗表分司去五間詩又題云何當婚嫁了抗表請分司終老為郎謫宦休歌舞懶呼寒食節寒食宴郡客詩云歌舞懶呼筵上妓飢寒慙見獄中囚醉吟孤坐月波樓月波樓詠酌獨酌詩云孤吟獨酌送殘春坐久樓邊白鳥馴文章獨步成何事太宗嘗日王禹稱文章獨步異日垂名不朽空有離騷寄隱憂寄獻闕下一二知己公道當朝絶比倫因憑培養變孤根才衝霰雪遊梁苑便逐風雷化禹門南郡已甘拋絳帳東州何幸佐朱幡心懷象魏自江海兩地悠悠欲斷魂歷城郡治凝波亭濟州耽耽層宇俯清漣山色波光曉共鮮形勝爭雄齊十二風流素盛客三千鋪舒栁影眠鷗渚欺壓蓮香載妓船公退每來須度日塵纓未濯愧潺湲留題泰山孫復先生新居築室新成日觀前亂雲重疊稱高眠人逢捫蝨驚旁若衆望乘駒詠賁然名理靜談誰捉麈古書間校自磨鉛行聞天子東巡狩羽葆親臨此禮賢試筆濟南通守欲幾年最課無成愧古賢却為簿書拋筆硯每思樵釣負林泉浮名自信雖徒爾薄俸相拘且勉旃已共妻孥約生計會須搔首賦歸田監丞蕭君見貽嘉句仍惠芳醪強率鄙詞輒繼高韻聊資哂爾深愧斐然遲日和風婉婉春感時情思浩無津煩君遠寄中山酒顧我方為洛社人濡筆便思題素扇當尊難惜吐芳茵己欽才妙兼懷惠相遇文場願捧輪寄泰山孫復先生心與白雲間五十秋風鬢不斑自有清名滿天下更無塵迹到人間逍遙樂外非攸好貪懦聞風合厚顔不待高吟賦招隱見收餘俸滿青山蕭五監丞新作堂成名曰知雄且賦雕章題之屋壁勉率蕪惡以繼高韻况堂佳號塵遊外題壁新吟藻思春撲素自持師老氏清醒常戒鑒靈均窮通一致由知命仁智相須合入神因覽君師我顔厚不能假日樂天真題三教圓通堂其堂在蔡州開元寺內龍學時知制誥師本佛之徒潛心老與儒一堂何所像三教此焉俱香火長相續丹青久不渝高賢旌好事二記聳龜趺馬上讀韓吏部集驅羸倦逺征尺箠亦慵擎却得開編看仍教縱轡行儒推文暢行詩許孟郊鳴盡日既遺味渾如挹太羮至齊五月兩院獄空喜而成咏厭預鈴齋議欣聞獄犴空三章用舊制五月紹遺風止繫垂衣治非干别駕功惟期四海內刑措與周同眂役于清偶書四韻寄示幕中賓客經旬一水湄風土化緇衣豈敢嗟于役何當賦式微雲山晴特秀花木暖相輝期子同攜手春遊事勿違齋中邸書事軍壘無多事朝晡且放衙吏人如野鹿公署似僧家京信因求藥賓歡為鬬茶忘懷塵俗外枕籍祗南華羌先生廟先生高世迹舊隱白雲深結宇知何代遺祠直至今地分壇杏影門接社蓮陰我亦希風者終朝託玉岑贈廬山崇勝珂長老珂也僧中秀曹溪得祖衣雲泉聊適性瓶錫遂忘歸九月秋風老千山暮雨霏我來陪靜話相對兩無機送承澤上人歸寧富沙五老峯前見過從一嵗餘還將隨客棹歸去侍親輿乞食江雲際間吟臘雪初秪應清夜夢時復到荒廬酬江西運使齊工部見寄龍坂彌年别長兹仰道風夢曾瞻使節喜忽得詩筒詞藻春林秀恩私地鎮崇因將示知者傳誦滿江東遊韶石純音何寂寞秀色自崔嵬巖草遺簫在溪禽學鳳來余希探禹穴人似畏軒臺登眺秋風裏煩襟盡日開秋曉寓目梧桐冷墜秦宫井沆瀣光浮漢苑槃倚杵逺天垂六幕照梁初日上三竿鴛鴦水宿雲飛無定期雄雌兩兩鎮相隨到頭不會天何意却使人生有别離後池新栁客來莫怪寡心情俗吏喧譁不喜聽多感後池楊栁眼一回相對一回青歷城春日對酒數尺遊絲拂面來數枝紅杏向人開眼前信美非吾土且勸春風酒一杯戲别申申堂翠栁和煙籠碧沼紅芳如火照芳鄰主公欲去寧無戀倚翠隈紅屬後人汴水即事波狂如箭雨如絲泛泛扁舟瞥鳥飛睡起啞啞乍鳴櫓却思村舍聽鄰機題袁州東湖盧肇石袁山之陽秀水側草覆遺基誰氏宅昔云子發其姓盧往以文章名籍籍宅中舊物何所存惟有嶙峋一區石闊才三尺高倍尋久卧塵沙羣瓦礫余心好異因獨往下馬環觀聊拂拭地表可見十二三已足怪駭動魂魄呼工運鍤塹其旁挽以長絙百夫力雜然鼓譟登大車恍爾如蒙巨靈擘選置東吳最佳處四面澄波映天碧倚空突兀無與鄰頓覺亭臺增氣色彎環幽竇莫敢窺恐有乖龍飛霹靂余嘗南遊到陽朔衆峰矗矗春筍植捫蘿踏蘚窮之遍若此竒觀曾未識郡人奔走來如雲故老驚視復唧唧乃言此石遇真賞屈指于今年二百沈埋曠代誰爾珍一日光價逾荆璧嗟余束髮大夫後區區志尚惟孤直十年再謫非不窮猶慕堅絶無改易如何故老不我愚感物再三形嘆息石不能言人有言勿使他時重湮厄和李泰伯送春絶句九十日春今日盡送春何況我先知後期應在經殘臘重探梅開雪裏枝憶昨相逢甲午年與君同賦送春篇等間又見春風老更捧新吟一惘然萬樹紅芳落漸稀浮榮能得幾多時孤根未識陽和力春去春來兩不知袁州慶豐堂十間詠皇祐五年十月二十一日吏散鈴齋掩間眠到日斜無端是春夢容易繞京華鄭聲良可厭間抱七絲琴欲識調絃意理人先理心年長身多病間抄已試方未甘先犬馬畢命報恩光青山日相對間看白雲生誰謂無心出中含濟物情曉按三杯後間烹北苑茶色香俱絶品雪泛滿甌花扁舟賓客少間作道家裝迹靜心還靜逍遙覺日長雨霽輕埃息間吟面曲池遊鱗時對擲雙破碧漣漪朝來因試筆間答故交書莫怪音塵絶吾心與世疏漸老無功業間思惜壯年桑榆如有待猶可勒燕然晴軒足清趣間與鶴開籠寄語北山侣無驚蕙帳空兩宋名賢小集卷八十六
