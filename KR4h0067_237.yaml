body:
  text: 兩宋名賢小集巻二百三十七宋陳思編元陳世隆補延月樓詩稿李若川字子至紹興中江南東路轉運判官乾道初以吏部尚書使金三韻雜咏七首礎潤濕欲雨月暈知有風大哉天地理機熟潛可通念彼在世人心隠無由窮斯人異好惡是非汨真情鵞有翅莫飛蛇無足能行世事亦如此未可一概評足隨意以行目惟心所視若必待使之動行即相戾是故造自然斯為理之至鷺白固非珍鴉黑亦匪貴使其色相反人皆競稱瑞世情惟尚奇在理則為蔽足安咫尺地臨險生憂危世故日紛擾逐物心難持心定境亦定禍福安能移一氣有清濁二儀成覆載魚鳥各飛潛草木異榮敗不齊乃至齊造化所以大瞽者不視色聾者不聴聲觀其動作間視聽由心生一心苟有蔽耳目絶聰明途中阻雨髙雲無急雨飛灑如絲輕幽人動羈思冒雨登歸程風來曉煙亂雲破春山明眷言憩荒館我懐有餘情壺中載濁酒飲罷還自傾酒盡興不盡闗關山鳥鳴夜泊富陽弭節富春㟁江潮侵夜生扁舟人未寐風動菰蒲聲羣物漸以息客懐有餘清開篷坐深夜月在雲間明逺眺江水濶仰視天河横念此復何極曠然千古情恨阻心中侣濁醪相與傾理舟為客始逾月迢迢若經年晝永空館寂古木參雲煙我生聞道淺未能超世縁念此方寸地憂來相縈纒今晨動幽興沙岸泊歸船㟁逺望不極歸思隨長川獨酌兀坐起往念新愁忽來侵鬱鬱不自怡開尊獨盈斟舉杯對孤影浩蕩生幽襟百慮遂消散無復縈我心修篁爾何情風中來清音不覺日已晏四面山沈沉超遥醉中適頽然㤀古今染翰記所寓音屬自成吟村社歌清曉鼕鼕鳴社鼓前村後村走兒女田家醵錢共賽神謝神時晴復時雨案有一作具肴酒爐有香老巫禱祝躬案傍願得年年被神福秋宜稻穀春宜桑人淳禮簡酒無數歌笑喧闐日將暮田翁攲側醉歸來山頭明月山前路蠶婦詞舍前舍後桑成林鉏墾不放青草侵東風滿條新葉大村家愛此輕黄金日暖春蠶大眠起戢戢盈箱齊若指看蠶新婦夜不眠蠶老登山滿家喜阿姑嗔辦噪連遲小姑已催修織機殺雞沽酒賽神福今嵗不怕寒無衣兩宋名賢小集巻二百三十七
