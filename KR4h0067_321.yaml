body:
  text: 兩宋名賢小集卷三百二十一宋陳思編元陳世隆補臞翁詩集敖陶孫字器之號臞翁長樂人淳熙庚子貢入太學慶元間韓托胄用事丞相趙汝愚以謫死陶孫作甲寅行以哀之醉中題三元樓壁托胄知遣人舁壁去捕陶孫甚急遂逃匿江湖間托胄事敗復出登嘉定間進士授通州海門簿教授漳州辟酒所幹官厯奉議郎主管華州西嶽卒年七十四有臞翁集二卷以入定大士太乙真人像送莞晦叔真人與大士蘭菊而異芳坐卧得定力銅眼鐵脊梁是中有佳趣山海俱茫茫或時現神妙塵迹生怪光云何得此本有僧吳下狂飲酒不計斗禇無一絲藏興來高閉門落筆如追亡走送臞菴室洗心一爐香盤陀旃林闊枕藉玉井涼蒙頭帔衲古遮眼經論長不知幾陵谷睡穩坐不僵君家定吉夢二士相迎將辟除寒具油靜展垂中堂會當同一龕寒泉薦空觴夜忩搖茶煙駝褐依繩牀楊枝灑寥閴藜杖輝森芒與君六根靜讀書到虞唐寄福清翅山舅陳夢實路岐引人不作長野梅官栁禪風光看山看水入詩眼歲月不覺髮眉蒼請從丈人開肺腸身非石人忘故鄉五年江湖枕書睡夢隨南雲落翁堂亦知行坐歌白頭池南隱几浴鳧雙鰥孤肯復有羈旅石塘破寺魂悲涼毛錐不補萬事裂存者各在天一方善和里第知幾易遼東城郭空相望平生何用酷似舅政似嫫母顰施嬙兒時拊頭祝文章祗今未入崔蔡行三年一書願見貰骨肉滿縣愁難當屋頭荼䕷定過墻滿忩日色文書香眼前欠甥頗念否我亦口挂蠔山旁煩將歸意示泉石小待錦衣漫俗粧送林伯農還鹿角山今我不樂遊四方夙昔已具浮海航十年點化鷗心性一生正坐虎文章海山未必盡佳處往與蛋子收漁梁夢中了了説吳楚山川如掌今羊腸讀書南鄰索檳榔原頭汙邪豚酒香何時攝衣上公堂蛤蜊含漿魚尾黃客從南來勤寄將洗竹簡諸公同賦舍東修竹密如櫛一日洗淨清風來脫巾解帶坐寒碧置觴露飲始此回平林遠靄開圖畫西望羣山如過馬詩翁意落帆影外孤村結廬對瀟灑百年奇事笑談成向來無此蒼龍聲間身一笑直錢萬剜粉劖青留姓名用韻謝竹主人陳元仰戴巾褦襶令我汗日暮佳人期不來陳郎揖人不下榻青山白雲喚得回手開十畝蕭郎畫箇裏何妨繫吾馬食單得涼清可啜毳褐分陰翠如灑搖金戛玉真天成夢搗風前茶臼聲一川窈窕荷萬柄野翁得此甘辭名竹間新闢一地可坐十客用前韻刻竹上竹君得姓起何代渭川鼻祖兹雲來主人好事富千埒日報平安知幾回平生好山仍好畫意匠經營學盤馬别裁斗地規摩圍自汲清池行播灑一杯壽君三徑成請君靜聽風來聲醉眠煮得石根爛以次平章身與名謝葉司理徐知縣見貽之什二公乞入社書生自是鑽簡蠧淨業還從竹背來新詩細字行茂密驚蛇起草盤蛟回是身政欠虎頭畫望山氣如還櫪馬翛然君子六千人不受湘靈清淚灑竹林定交業已成北忩讀書咿唔聲金魚玉帶不汝却社中未厭山王名一日復一日一日復一日來如赴海波今晨我無糧未卜晡夕過辛苦幸一飽知復有明何平生實愚暗慮淺憂則多雀鼠偷太倉田野蜚螟蛾至尊尚旰食邊防望投戈我欲瀝血訴官府多譴呵進退羝觸藩屈鬱鵬在羅壯心一不遂六龍奄蹉跎所以憂世人散髮歸巖阿長生儻可學吾其駐羲娥放船桞邊放船試南風陽溪荷花能豔紅一川雲錦步不盡我舟正在繁香中午天無雲青脈脈枕舷哀歌醉脫幘更將緑葉穿碧筒欲臣屈巵奴大白風前一笑玉塵橫蜻蜓側翅潛魚驚騎馬貴人多內熱此歡勿語長安城須臾客醉船亦醉信流一抹西村外翁嫗負墻樵牧奔拾薪供茶初不記還家鼻息撼四鄰閬風接夢疑非真清遊何時記三人臞菴與弟拙鄉陳次韻謝李祕校常州無錫縣詩人大雅熄自鄶續絃久無人中間翰墨場名字俱已湮江山亦何助東海真揚塵我笑李夫子瓶無半合陳人書兩俱亡何用語逼真作詩來起豫欲卜二仲鄰依然送鴻目衮衮天機新莫欺鬢眉蒼持護應有神狗鬚侯舞陽羝角相平津皇天信平分萬物各得春但願閲世心孤特凛箭筠日者鶴飛書江漢起隱淪三物論鄉國六藝程成均秋風入帝間錯落騅駓驎君曾讀詔否却枕方欠伸勿驚作詩靣酒纈吹微鱗唾手澆衰陋一返姚姒純稽古不無力政復昌其身他時玉堂夢與問三生因盟我良不難欲託孫子親贄君以黃耳附書莫辭頻再拜賦斷章水石俱磷磷此韻字義見詩晉揚之水箋次韻馮孔武雪中簡聞人簿乞炭君不見朱門煌煌多近臣豹胎煮爢蠟為薪庭中盛設潑寒戲炙手欲近還嗔人誰知曝背茅簷下欲獻要是山林真兒童抑搔皮肉軟日輪過中方欠伸懸鶉結駟兩相笑百年俱成一窖塵先生自是冷官樣要看入火紅麒麟撚鬚自作詠雪句祕思早與相如親蒲團擁裘結僧坐别有絺綌君南鄰願回六龍照后土施與萬國無邊春屑瓊鏤玉入肺腑拍手一笑未吾貧乞炭於馮孔武再用前韻君不見元光河決愁從臣天子有詔皆負薪當時實炭知幾畚下與魚鱉爭生人孰知木黔善制水火出木盡全其真一朝入火縱粉骨曲身得暖龍蛇伸成虧等作萬世計肯與畨僧推劫塵我欲詼諧與作傳上繼毛頴追獲麟日燒崑崙十挺指惜哉黔也非我親窮朝破竈鬱煙燼青唇黑腕羞比鄰誰能輿致送暖熱坐使有腳歌陽春將軍羔酒空作夢十年未有今年貧思古人思古人思古人古人皎皎若日月我欲剖棺斫出古人心惟見蒼苔漫白骨請陳古人心君勿駭客言古人惟一真可使風俗皆還淳殺雞不及林宗炊黍不候龎公雪中安道興適盡坐上公榮尊已空呼酒徑勸君欲眠即遣客嵇康巨源不為絶戴崇彭宣本相得徐庶失老母密如元德不能奪之臣嚴陵薄宦情狎如文叔不能止之客包胥伍員不失其為友羊祜陸抗不害其為敵我有蒸壺安事隱語我但食韭安用多種割肉元知方朔真拏金豈即劉義勇古人心事有如此何至顏色相媚奉道衰僢仁義世亂生姦雄君知臧否不挂口正慮匕首揕其胸我生恐無用我死知無聞作書預與兒輩訣葬時定覔要離墳贈墨工陳伯升古墨法變今百年雪齋乃能幻神藥杜乂膚清衛玠神眼明再見老陳作墨如人意隨短長用之不盡渠解笑須君筆端馭龍蛇他日始信入木妙僕以紹熙壬子中夏二十五日始躋風篁討龍井遂至廣福謁三賢像閲舊碑追觀一代風流為賦此詩適月林依公留設茗供因書以遺之他日能為我揭詩板於壁間使示來者亦山中之一助也龍井寺有辨才師趙清獻蘇文忠塑像奇石爛橫道兹山信多姿江湖釃兩股一泓乃孤危相傳龍所家或恐神護持腥風轉霮䨴陰崖立淋漓惜無緯蕭勇探此抱寶癡山僧作層障慘淡生幽思何為金錯影顛倒眩俗兒坐來百念失蒼官導前馳招提果深登屐痕恍前期咄哉少肉山著此高觀師端能致遨頭絶唱相娛嬉過溪亦何事相送了不疑渠能縛禪律因來數鬚眉我愛秦郎記字壓頭陀碑月林只夜夜人物自一時賢愚盡蟻封來者吾得知佳人珮明月贈俞德章佳人珮明月笑語含春姿手握幽蘭叢照影清漢湄少年冶遊子行樂方及時折苕戲相贈玉色頩自持歸來種白璧日漚文錦絲加幣欲聘君常恐歲月遲終然不可諧翕剡聽所之願言遺薌澤逺慰千里思六月內喜雨詩時寓崑山縣東禪寺西齋炎天亦靳雨特地費雷將隱隱來何久飛飛勢稍揚初從霑塊潤忽作建瓴忙稚子拋書出臞禪解縛狂苗滋應秀穎風過忽溫涼蛛網掀三靣蟲書漫數行衾箱開歲事恩澤到詩章怨暑移今昨煩疴覺在亡青蓮開紺宇白苧舞雕墻隻影還晡暮驚心重渺茫思惟大火聚回向六時香脫略時流輩周旋古佛場身才六丈足舌乃大千長此理憑誰詰何方更舉揚鼠愁燈崛壁鴉睨鐵琅璫生理何聊賴斯文重激昂盛時追少壯故步失尋常政爾蓬心薆依然貝葉光再次徐先輩二首淺聞懲闕漏小學到凡將始制初龍遁流風漸鳥揚汔今緗帙富益我手抄忙半世真書癖衰年忽酒狂壯懷邀汗漫奇服問厖涼身許羲皇上名卑崔蔡行知心屐幾兩闕計木千章湖海堪流滯陳劉略喪亡每思辭北闕直欲老東墻度嶺官憔悴藏山計杳茫尚方何日舄侍女幾時香斂板豫行役懷鉛子舉場翅垂雖一眚腹果自三長孰使多為纍還成少不揚忽驚投暗璧曾是獻明璫閲世肱三折論文首一昂結歡慚季札抗對敢元常他日聯詩社前羞李杜光身是韓康伯名慚許子將居然屯澤閉何得巽風揚憶昔求詩甚端成刻燭忙出喉真自苦舞手或成狂楊桞偏歌雨葡萄肯博涼羣兒哀齒舊諸武讓顏行禹穴魚龍陳天門虎豹章陰符空獨佩祕論未應亡自築揚雄宅誰窺宋玉墻鄉英殊磊磊俗物自茫茫祓厲三精劍寧神百藴香諾交那復社取醉莫論場高節看徐稚妍詞伏仲長泥蟠雖汩沒韝掣會飛揚列屋多齊趙華榱間璧璫從渠誇富豔試與校低昂邱喙徒三尺公才可百常素交風雨盡雪涕魯靈光畢叔兹可掃園賞牡丹衣冠塞繁都茂苑非夙昔雙鋪俯行渠文簡相公宅是家固多賢滿篋載春秋中有數畝園頗復修風流新亭著高穩佳木行清幽客來必置醴井蛙挾其輈張燈看落花意作長門愁小却得一欣凍壁纒蛟虬先朝補天手翰墨皆共遊再拜閲帝書局促虞褚歐平生實好古兩武布九州恍然駕閬風坐我曲池頭竹間是茶煙松風助颼颼梅實亦登盤按行感良儔櫪馬喧午枕土毛擷晨羞似聞屋東偏萬指食鋤耰行當賣書籍買鄰託羊求與公行灌園第一營瓜疇四月二十三日始設酒禁試東坡羮一杯其味甚真覺麴糵中殊無寸功也食已得三詩今日忽感悟閉門謝麯生未危却二孺不戰仇三彭掊擊北海尊嚌量東坡羮尚恨薄滋味未能免虧成我欲燕元和默坐朝上京坐待梨棗熟小試升天行評詩要平淡此語吾不然大千自有舌何用長短篇謂是天送句端正落我前旋聞口吻鳴頗益心腸煎少陵耽句佳欲以一死捐是中有真意靖節羞獨賢去夏苦多雨勢若無炎官今晨迫重午香黍仍膠去聲盤天機杳難測人言亦多端祗今原上田立苗未妨寒但願含穎時借日開迷漫蟪蛄爾何知喣喣啼夜闌兩宋名賢小集卷三百二十一
