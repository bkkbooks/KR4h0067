body:
  text: 兩宋名賢小集卷二百三宋陳思編元陳世隆補北山集三程俱九月九日夜夢王元規詰旦其弟元矩適相訪感而有作故人入幽夢仿佛平生懷心知九泉隔意氣慘不開哦詩不成章惝恍誰能裁曰此蕭異士寧當沒黃埃清晨客在門乃自烏衣來典型見難弟共歎一息乖幽明不可詰此夢何為哉回觀南園道微徑已蒿萊卜築西塢出處初漫浪淹留失佳時時英盡珠璞寧復見誰差一去四十年伏櫪久已疲幸此嵗時暮穿雲弄清漪窈窕煙䲧中蒼隂晝森垂兹焉寄茒屋橫仄任所宜谷口翳杉竹柴門畏人知誰言一丘壑倘與汗漫期寄茭湖江仲長柔急澗無止水秋蘭無故叢别來今幾年坐閲毗嵐峯交親半鬼録生者仍衰窮及兹過君家樽酒一笑同知我厭鼙鼓煩君韻絲桐相攜步林壑暫覺萬慮空樗社寄莊叟醉鄉著無功醒來百憂集尚寐期無聰晨起梳頭髮白且稀有感余髮已種種我懷亦依依風林無安巢寒日無餘輝束髮隨官牒前言服良規豈唯會計當自詭牛羊肥妄獻北闕書墅芹安足希一挂邪士籍徒嗟寸誠微惓惓畎畝志正作禍患機羈危不如人行行向知非世變不可糾兵塵暗王畿真人起白水帝命式九圍誤沐宣室召白頭侍經幃誰言螢爝光敢近白日暉誰言草木萌敢試雷霆威野馬立仗下軒昻妄鳴嘶棄之老牛皂無復瞻龍墀天公了無私與奪適所宜時方急功名巽懦安所施士方貴才辨安用鈍訥為常人與善士何異於愚癡譬之救焚溺珮玉行逶迤棄捐乃其理刺天看羣飛幸非高明室百鬼浪見窺自從伏嵁巗風淫得偏痱有足不得行有手不得持每思林野娛濟勝憂無期堆豗不得往如驥縶且鞿如盲不忘視如寒不忘衣如痿不忘起如羈不忘歸但願老窮健長甘北山薇豈復理鬚鬢峩冠待晨曦自仲嘉云亡未始見夢舟行夜入吳興境有夢如平生感賦四首江子隘斯世翛然向方蓬一朝成千古寤寐不復通夜入霅溪境胡然見幽夢髙標何所似俯仰風中松談笑如平生炯炯雙方瞳去年經行地陳迹亦已空故應玄真老相與遊無窮諸人久不死而使武子先斯言太癡絶愛忍無乃偏言看雅正情播在三百篇秦人哀三良百身寧可捐相鼠有深刺嗟哉胡不遄此豈惑者歟加膝墜諸淵乃知孫楚狂未必非公言世以勢論士君誠不如人揚揚乘軒者志滿氣甚振外見七尺軀中有萬斛塵鑿枘固難入梟鸞豈相倫炙手苟可熱行路為雷陳高栖冷如鐵骨肉不得親誰能獨無死榮辱久乃真皇天非無知伯道固有後百年能復幾僅比一昏晝久知彭籛夭不及殤子夀向來簞瓢生廟食至今侑東陵雖飽死千載有餘臭梟蕃得刳腸苕折漫遺鷇試當問玄夫此理或可究初到書局以萬七千錢得一老馬盲右目戲作古句自嘲蹄間三尋汗流赭九逵雷雹爭飛灑我窮那得逞追風正擬虺尵行果下平生畏途飽經歷夜半臨深無取者故應造物巧相戲却比盲人騎瞎馬李南知音當促步廣漢騰嘲不相假執鞭良稱塞翁兒並轡聊從杜陵夏厖然病顙豈其類老矣問途那可捨徑煩一夫事刷秣似桂薪芻不盈把向來伯厚亦安在結駟雞栖同土苴他年東去把撩風縱爾逍遙汴東野朝無斁將之録示近詩有和其兄以道説之詩次韻以致區區兼簡以道談詩如談禪練性如練墨壯心悟龜毛少作豈蛇足平生甚元龍未信今伯玉十年得投間高卧謝寵辱定知貧勝富固自平為福著書著名山會使山鬼哭結廬近三休為米時一出猶嫌佛場選肯問燕臺築俗人難與言鏡髢遺盲秃前年客長安正覓三釡粟塵中一傾蓋爽氣岷峨緑别來更﨑􅋂寡陋嗟我獨塵埃篋中書有手不暇觸次韻寄謝公表韓公朝請世人如鰂魚自蔽翻吐墨猩熊亦何罪不衛唇與足要當時木雁安問定石玉向來休休翁老去稱耐辱迹高名自汙卒享清淨福肯為接輿生叩木妄歌哭韓公早聞道垢濁久已出終成九層臺不棄一簣築長安列戟第桐影將缺秃寧辭治中輿且食祠宫粟胸中荆棘盡華髮當更緑抗塵我何容勇退公所獨何如善藏刀聊放虛舟觸和葉翰林送李從事賞音真兩難邂逅多契濶一朝間容刀三嵗歌采葛古人抱修能初不露錐末誠令處囊中談笑堪式遏豈無識玉人顧恐鑠金奪遂令緇衣好斂迹裁自脫畫蛇杯已疏志鵠躬遽撥徒嗟湖海上髮白齒牙豁懷公劇梅林念至失焦渴臨風賦新謡憂思不可掇自寬吟戲效白樂天體武陵謫九年下惠仕三已或窘如拘囚或了無愠喜吾生憂患餘年或及耆指偏痱未全安抱病更五祀進為心已灰棄置甘如薺坐狂合投間佚老宜知止向令身安健不過如是耳每思古窮人我幸亦多矣照鄰嬰惡疾羈卧空山裏纒綿竟不堪抱恨赴潁水文昌兩目盲無復見天地簡編既長辭遊覽永無冀吾今雖抱病蹇曳非頓委時時扶杖行積步可數里校之卧牀席欲坐不能起雖扶不能行懸絶安可比時從親故談亦不廢書史右臂故依然運筆亦持匕籃輿時出遊初不廢牢醴况無他證候色脈苦無異詳觀動息間倘有全安理侍祠了無庸竊祿愧索米借居浮屠宫非村亦非市廷堂甚爽塏高屋敞窗几郊林接溪水眼界頗清美嘗聞天地間禍福更伏倚藉令衰蹇身終老只如此何須苦嗟咨未必非受祉形如支離疏飽食逸終世目盲如宋人全生免徭使平生歎逺遊今我在桑梓田園接家山區處及耘耔平生困鞅掌今我恬無事寢興縱所如出處不違已病來益尊生對境空相似永無貪欲過稍習衛生旨不為六賊牽豈受三彭毁人言病壓身往往延壽紀大鈞默乘除萬一理如是安全固自佳蹇廢亦可爾死生猶寤寐况此一支體細思安否間相去亦無幾如何不釋然萬事付疑始旅舍寫懷半世江湖寄此身氷壺何意及陽春離騷痛飲非良士欵段還鄉亦善人病木作花真強胋長魚沉陸恐擁鱗清時英俊如麻葦敢歎長年甑有塵酬葉翰林喜某除官東觀氷谷難通杜曲天淺聞那識絳人年揮斤始免從輪扁操牘寧堪佐史遷正恐商樊譏浪士可令齊魯歎無傳笭箵挂壁空回首林有新枝竹長鞭列宿羅胸妙補天巨鼇峰頂號耆年致君舊擬唐虞上去國徒驚嵗月遷夢筆絲綸建瓴下憩棠膏澤置郵傳平生頃倒燕臺意可使英豪慕執鞭送葉善卷致仕歸吳衛尉新除蓋次公便拋簮紱向江東秋鱸正與蓴絲美夜鶴休驚蕙帳空滿腹詩書原未試會心林壑與誰同自憐華髮無歸處慚愧冥冥物外鴻和同舍雪晴即事雪消晴沼漲微波一局文楸比爛柯塵外清霄三島近日邊春色五雲多不妨窈窕耽書癖時遣旗槍戰睡魔洶涌詩情何所似九龍雷動伐靈鼉和同舍上元迎駕起居瓊構浮空錦作山五門遙北望金鑾燭龍飛度崑丘曉玉斧修成寶鑑寒便覺氷荷回暖律恍疑雲翼傅靈丸都人喜色瞻鸞蓋更擬交光雪未殘車駕幸祕書省口號端門清蹕隱修廊麟省新開接建章六玉虬飛黃道穩五芝華竦赭袍光風生凡腋天顔近春入仙洲晝漏長拭日訓詞成飽德共瞻雲日仰陶唐清塵膏雨浹人寰金殿晴開瑞霧間帝座騰輝臨壁府飇輪紆景接蓬山龍鸞初識昭回迹麀鹿驚隨侍從班再拜逡巡戴君賜却迎天仗欵賢關和田龍圖升之登秋宴口號赭黃高拱玉霄間金殿祥麟九色班湛露恩濃開鎬宴大風歌奏仰龍顔自驚垂老拋農畝浪逐羣仙欵帝關銀甕白環方紀瑞汗青修竹盡南山矍鑠仍堪將相間壯猷却與虎臣班來詩云坐于諸軍團練使之後公車獻賦城南杜郎省興嗟北地顔合殿千官瞻黼扆中天雙闕敞瓊關彤庭拜舞嵩三呼延閣干雲真道山林德祖有詩寄光祿蔣卿夢錫階及送諸博士駿發終篇皆見及次韻寄懷閉門那復賦三都傳世何妨強著書東海遺榮行路歎南山歸隱故人疏向平婚嫁無餘纍摩詰身心即淨居六十挂冠雖早計絶勝銜索泣枯魚金華玉府九天開夜誦何人薦逸才太學諸生終莫挽長沙賢傅幾時來别離傳恨空魚素嵗月如飛逐管灰亦欲相追老湖海稽山肯放酒船回和江子我端友雨腳初收曉霧開青鞋布襪好追陪幽人無事長相見佳句有時還自來白業誰能超石壁朱顔亦任發春醅憂來忽憶燕南信安得鄉關老萬回别後有懷子我追用巾字韻作寄漉酒空峩五栁巾一觴相屬念情親玉川奴婢今猶昔錦里田園老更貧氷洞清泉誰共酌風篁幽徑好尋春開年晴暖須歸去還向江湖覓故人叔問録示樂天篘字韻余和以簡叔問槽滴真珠不用篘塵飛華棟發清謳時危尚想承平態勝會那從戰鬭求戰鬭求見世説桓南部挾彈之事遺物方將期汗漫苦心何必志窮愁憑君賸作消憂計痛飲狂歌爛漫遊致政程承議挽詞手種庭槐擢幹長誰知種德久彌芳錦懷荷槖看榮養命服思書被寵章合浦珠還增氣象延平劍合動光芒新阡鬱鬱車千兩慶善哀榮動故鄉太守富樞密見示題趙叔問回光庵詩次韻奉和因敘比蒙屈顧郊居愧謝之意千騎雙旌間緑沉草堂無徑辱幽尋應憐范叔窮愁甚更覺文翁德化深泌飲衡門聊記老高山流水舊知心朝來拭目窺新句入木鏘金比道林又和呈叔問湖海當年共陸沉山林投老得追尋清溪宛轉千山靜喬木隂森一徑深法界含容居士室菴基堅固祖師心山王終恐歸廊廟回首清遊漢竹林用韻述懷故交離合異升沉枉直寧當問尺尋伏櫪疲驂千里暮當關彪虎九門深炎涼殊態看浮俗衰病交侵失壯心一壑一丘真自足野麋終是樂長林送莊大夫綽赴鄂州守字季裕白首同經本命年君臨方面我歸田應無衛尉一錢直空羡漆園三十篇季裕著本草蒙求三卷頗工麟閣功名應未晚羊腸岐路莫爭先西歸不待三年最肯訪柴門瀫水邊某召伏蒙宫使資政左丞以某末疾漸平寵貺新詩仰荷眷私欽誦不足謹依韻扳和四首少敘盛德仍述鄙懷伏惟采覽如公真似太山雲膚寸崇朝四海聞出處要同周四友聲名何減漢三君詞源笑唾三冬學妙旨深明六藝文要是天孫機杼手莫將雲錦並纎紋典訓文章見白麻經綸才術乂王家如何袖手千岩裏却傍臨溪一徑斜憂國丹心知益壯濟時素業復誰加何當樂壽亭前路杖履優逰閲嵗華載酒何人過子雲閉關蘭若斷知聞分無粳秫資三徑豈有篇章詠五君親故易成南浦别漁樵時寄北山文懸知倚市傾城態應笑寒窗刺繡紋充庭英俊劇蓬麻迂蠢無庸合卧家錦里煙塵終不到玉川思慮本無斜山東何啻三年别霜鬢潛驚一半加會見中興平四海要看元凱佐重華叔問覽北山小集用葉左丞韻辱惠佳篇推與過情良深愧集次韻奉酬過眼紛紛夢電雲羡君強識與多聞風流千載鑑湖老博極羣書都水君顧我衰懷無復理空餘夙習寄微文深慙推借逾涯甚偶爾真同禦木紋衡門相望接桑麻人識城南處士家老罷應難誇競病詩狂時復賦車斜韋遍閲世時時絶班劍看人嵗嵗加徒把鉛槧消永日強分竒正與英華鄭希尹大夫會吳中諸老惟方子通不至余作詩呈希尹黑頭新貴擁朱輪文會耆英久不聞博識猶多漢郎吏敦詩仍有晉將軍一作悃愊無華漢郎吏詩書執禮晉將軍河流曲曲靈光異芝蓋莖莖瑞氣芬是日九人坐想城東隱君子無心間似嶺頭雲龍圖閣待制傅公挽詞四首北地休竒績東閩出雋儒文明知世異才德應時需臺閣咨純正朝廷重楷模九原如可作素業上唐虞置醴王門重和羮帝意深方酬稽古力未展濟時心履道端由户繩身異直尋如何天不憖注想動宸襟龍駕初從代羊裘首訪齊但聞還舊物已足慰羣黎綸綍王言大蓍龜國論稽空留吾黨恨桃李信成蹊曳杖空成歎騎箕去莫追桑隂曽未改棠茇有餘悲笳鼓千山路龜螭萬古碑登門慙蠢陋何以報深知黃修中大夫挽詞少日無雙譽中年嘆數竒音徽叔度比治迹次公為羔雁徒三至牛雞不兩飛空令吳楚地阡陌有餘思曠度中無纍懷才竟莫伸入朝誰不達出宰一何頻吏隱琳宫冷郎潛素髮新話言猶可想攬拂涕沾巾日日日日長川去行行萬化新回思幾年事已似隔生人章甫寧資越連城漫入秦應知依內寶肯混隙中塵山近山近雲多態身間夢亦幽紙窗先得曉布被最知秋海眼來隂冷雲根逗暗流結茒容我卜投老為君留看鏡看鏡恍如夢今余猶昔余身經幾墮甑迹寄一蘧廬仙客有遐怨昔人以鶴為仙客鷗為間客孔兄為近書塵纓與蕙帳兩事欲何居舟行過吳江有感二首陳迹端如幻羈懷只自驚十年窮不死四海寄餘生蒲栁成衰質枌榆憶舊耕重吟五湖句慷慨動幽情栖棘空回首飛鳬竟折腰只今隨泛宅敢復歎沉僚行路終難拗迷魂不可招山川良自昔恍似鶴歸遼喜雨呈鄭高郵赤地無遺蘖懸知一嵗空乖龍忽解事死虎亦爭功時高郵用厭勝法以虎骨投龍潭中至是乃雨土燥財沾塊人安未轉蓬翻思㵼東海何計請天公田畝膏腴濶河流脈絡通邦人依豈弟指日望登豐江仲嘉書稱去長山靈真洞半里許得林壑殊勝豫記昔過謝原道中亂峰峭壁間竹樹薈翳今仲嘉所稱得非此耶因寄百二十字聞説靈真路旁開小洞天蒼巒閟清境陸地接飛仙壁立驚猿挂松枯老蔓纒攢空永亭石潄壑定林泉煙磴盤三徑玄窗屬五便武陵迷魏漢妙喜斷山川勝絶端如此經營欲老焉烹魚幾折屐命駕擬加鞭易秃三千杖寧辭四萬錢把茅應早計拱木歎流年鴻鵠須塵外鵷鸞自古邊人生各有在雅志共超然避冦還舍亂定還三徑隂隂夏木初驚弦無固志巢幕且安居晏坐心如地尋幽步當車經丘仍窈窕繞屋正扶疏摶黍空懷友提壺或起豫老來無住著聊復愛吾廬苦雨積潦徹厚地油雲成漏天乘舟迷晚市懸釡鬱晨煙卉服幾三沐蘧廬亦九遷何由問白日直恐墊黃泉天道終持滿皇心劇救然多應洗兵馬且復奠山川浩浩收溟漲穰穰浹帝廛燮調知努力延頸待豐年避冦儀真北固山頭豎白旗西津渡口僕姑飛將軍笑引三千騎洗馬鵝翎間道歸茅茨低小對青山準擬餘年向此間南望青山是黃鶴欲憑黃鶴寄書還贈别吳忱宣德并敘豫客都城邂逅河南吳誠伯偕寓興國僧舍其為人樂善嗜學練熟世故徙居蘄春適再世耳而蘄春人至都下者無賢不肖必來問訊其廬所傾下往往知名士故舊有以急告隨所厚薄賙之誠伯自言尉光山時捕得強盜十許人賞應第一等獄具部送府盜親戚望哭道旁或扶老攜幼號戀不忍聞誠伯顧盜非素猾賊為人害者一旦迫飢寒適為盜乃陷重辟耳因以盜還送縣稍緩其獄久之皆得不死賞固不論也凡此過世俗逺甚今兹同寓僧舍者至數十人乃獨見親厚者抑又何也豫調官東歸誠伯從豫索詩為别匆匆不暇還家作此寄之吳公河南守薦士得賈生偉兹天下士何止千人英吳公失名字功業曖不明要非萬頃陂莫著橫海鯨當時好賢意豈愧勃與嬰蔽賢如面牆自使兩目盲好賢如力穡穰穰五穀成至今餘慶在望著河南城如君豈其裔樂善莫與京高門二千石世德故可評平生周旋士往往凌青冥作史今十年讀書不求名向來光山尉何異古所稱嗟哉士營已寧使我負人聊須借汝頭一用朱吾輪今君乃能爾所棄如毛塵故知古賢世尚見風俗淳伊豫一畸士落落良可憎折腰務求合俗眼竟不青憧憧九衢內邂逅蓋一傾何從乃知我頓有交舊情相隨若形影出語見肺膺長安速化地頓鈍終無營中宵起歸思襆被東南征投林無擇巢促步無安行寧嫌蕞爾邑要是衆不爭紛紛同舍客聚散而不停毛子去山邑哦詩對峥嶸想見簿領間炯如九秋鷹毛世高倜深州戢羽翮題輿重廬陵胸中若懸鑑圭角不自呈上官閎中恢石老故逰倦飄蕭數星星崇山古惡地無乃煩笞榜音彭石興宗振有子慤有時名早死程翁頗専默兩版晝夜扃時時繫烏帽匹馬挾二黥安知剎那間一卧不復興程興之其餘復誰在誰與交忘形去駕雖結轍來檣競揚舲懷君尚留寓京塵染裾纓其誰念久要佐子飛且鳴况君緇衣後世故飽所更會當力推挽橫絶非階升却顧五湖上有人方耦耕戲題畫卷五載京塵白鬢鬚丹青遐想寄衡巫如今掃迹長林下却對真山看畫圖胸中雲夢本無窮合是人間老畫工常恨無因繼三絶倩人拈筆寫胸中答和江子我長江滚滚葉蕭蕭心與虛空自寂寥過眼文書風度穴迎秋衾枕帶忘腰楖栗橫擔入亂山恍如黃鶴倦飛還不妨步屧時來往山北城南一望間駐蹕揚州以提點刑獄公廨為尚書省禮部在西北隅卷書樓下甲戌年豫嘗寓止焉今寓直其下有感三入南宫更白頭夜寒持被卷書樓那知趼足半天下投老浮山省舊逰得趙叔問衢婺道中書作寄田中有秫醉淵明石上無禾養伯齡聳澗蒼根終鬱鬱掃雲歸翼會冥冥避喧人境心隨逺入夢家山眼共青嵗晚定知成二老深慙招隱苦丁寧和王給事易簡殿試舉人五首切雲冠辨拱長生匝地英髦集紫清共喜草茅承帝問欲傾塵霧贊皇明飄飄六翮鳴臯意浩浩三眠食葉聲正學讜言應不乏松筠肯為四時更右試進士北上寧嗟老此生長年終得似河清良金熟錬精英在古劍磨光星斗明伏櫪向來猶壯志據鞍他日想騰聲當時誰出災川右充選何勞固請更右試時奏名射䇿兼收燕頷生不須文檄似常清驚弦隼鵠從容下聚米山川指顧明豈但執戈堪武衛還應舞羽繼仁聲汾陽千古知誰匹怪底揮旌不浪更郭子儀舉異等麾幟不更事見李光弼傳右試武士金闈人靜月華生玉宇風微曉露清深拱北辰三素逺靜看東壁幾星明嬙嫫豈易窺軒鑑韶濩那容奏鄭聲聞説壺天春日永恍疑鼇戴欲畨更右考校萬里煙霄羽翼生肉飛安用潄華清緋頭黃尾何勞記紫籍青書故自明香撲賜袍迷草色風傳宫漏出花聲麒麟一一充間廄千里那聞駕屢更九章云勒騏驥而更駕兮造父為我操之右唱名和答江彥文送行長句醉裏求名苦不情翛然誰信萬緣輕却觀塵境端如夢更喜幽栖得此生遊客乍歸寒雀噪山人還去曉猿驚會當蠟屐同幽討無限青山照眼明贈行新句比陽春朝奏當年竦縉紳素業異時應有待玄談高處亦無倫平生骯髒皆華首閲世﨑嶇信損神只恐鶴書還赴隴未容公作獨醒人丁巳九日攜酒邀叔問登通道樓而江彥文寄玉友適至因用往嵗吳下九日韻涼秋風動正清華極目高樓不見花老境固知無樂事醉鄉聊欲寄生涯銀鈎逺寄清桐滑玉液親題赤印斜笑引壺觴成一醉歌筵遙想鬢堆鴉彥丈是日有盛集和趙子雍遊石園長嘯西風一散襟重隂疏影靜相臨水通笠澤秋容淨竹種元池野思深石磴掃雲留晚步松蹊隨鶴盡幽尋舊遊回首成春夢太息憑誰寫寸心和翁祕監彥深喜絶句四首朝來喜氣溢層霄只聽封人共祝堯密雪正應歌九扈疾雷先已破三苗時初殄睦冦即看新緑歸千畝還見陳紅積九年便覺雨暘如有意不須花草苦爭妍九重誠意格天關一夜風回萬壽山銀闕璚臺迷逺近真疑羣玉接蕭間風鈴相語紙窗鳴瑟縮飢鴉凍不驚却憶剡中高興盡雪消江草喚愁生試端溪古硯偶書二首白首重來只厚顔有懷端欲向人傳語言相對都無味色在蜚鴻落照邊人生當復幾兩屐我飲寧須三百杯破硯猶堪磨老境醉拈椽筆掃霜煤會稽旅舍言懷北山之北寄柴扉茅屋參差倚翠微老罷那知還作客春深無奈苦思歸淹留恐復荒三徑潦倒寧堪扈六飛乘鶴雙鳬作底事不應容易裂荷衣次韻江子我見寄長句泥行且作龜藏穴霧隱初微豹一斑豈有高標如冠玉况無談舌解連環一登文石趨宣室三竊蟠桃向道山早晚共尋雞黍約林泉猶得半生間戲呈叔問野寺蕭條獨掩扉了無才術赴時危未成鴻鵠舉千里且比鷦鷯足一枝短髮望秋如葉落壯懷因病與年衰何時負郭通三徑鳩杖相將醉習池與叔問預約繼九老之會九老當年四美并韓溫千載接儀型世間天爵兼人爵雲外台星聚德星白髮篸花看更好碧山環座眼偏青相期勉繼耆英會留與衢城作畫屏彥章屢顧郊居作詩敘謝骯髒衰頺嵗月侵氷墟誰復顧山林閭閻揖讓潛夫老車騎雍容重客臨表裏絲綸曽濫吹推揚巴俚久知音時來解帶揮談麈正始微言得重尋子在棭垣彥章在翰林故有表裏絲綸句兩宋名賢小集卷二百三
