body:
  text: 兩宋名賢小集卷三百四十一宋陳思編元陳世隆補古梅吟藳五拜李謫仙墓先生放曠士浩氣吞洪濛蓬池與紫閣軒蓋繹相從經營紫河車破費十載功金鼎馴烏兔炎炎丹光紅一擊混沌破落地尋無蹤神仙有水解戲劇驚愚蒙當年遺劍履一鍤秋雲封我亦鑽玄學此心良劵同朅來薦泉菊紫騎疑相逢儼如真面目曉月印寒空登采石望夫石良人戍楚竟蹉跎極目天涯嵗月多賴有江流是知已有聲似和扊扅歌登和州八公山昔年周師俘敵于此有碑屹其上萬姓叢居一彈丸八公何在路漫漫中原北望已塵暗邊地秋來又棗丹獵獵隂風征骨亂茫茫夜月鬼聲寒老兵指點生擒處峴首殘碑帶淚看哭趙信菴二首祥雲中屹祝融峯秀出全材一巨公銀管曽提修國史金戈幾出策邊功九秋健羽橫空鶚萬里威聲當道熊談國為前冀國後汗青千古玉玲瓏麟符玉策總兵權手托江淮半壁天大節有關宗社裏深謀常畫廟堂先三朝已表蟬冠像八帙終逢雞夢年不獨羊公碑尚在萬民墮淚滴湘煙秋日綿溪萬頃寒潭鏡面平數聲征雁呌霜晴滿林落葉秋風老山路黃昏人少行哭秋崖先生三首氣節昂斯世先生千載人可憐成白首猶只到朱輪茅取羣狙怒雪逢越犬狺方離羅織辱身世已成塵歐蘇喚不起文印屬秋崖大雅非常調正音不類俳寒江濯文思明月鏤吟懷傳業有楊晏遺書冢墓埋昔年經盼目此日罷從遊尤許為上足敢令出一頭聖涯窺浩蕩學海探深幽一瓣南豐後他師不復求吳越歸秋晚湖海歸來晚園荒菊幾叢秋山吟骨瘦霜葉醉顔紅弔影寒溪曲懷人落月中青燈滋味永不用哭途窮座中咏蟬分韻得飢字兩翼才乾殼已離便升喬木最髙枝銀牀落葉秋風裏金掌盤欹曉露時斷續翻成無調曲悲涼做出苦吟詩前身應是夷齊輩髙卧西山自忍飢春晚野步尋花籬下蝶牽引酌酒林間鳥勸酬山色不隨春態老笛聲自起夕陽愁寓感周家敦八政姬旦衡何平秦家尚竒法四海怨商君鳳鳥時一鳴梟鳥時一鳴一鳴以為周一鳴以為秦法重滅爾族德重潤爾身天帝厭殺伐勿使傷陽春離怨楊栁如少年春風吹得老朝為白雪花暮為浮萍草明月照妾夫夜夜關山道明月分半光照妾顔色好空閨一十年芳容秋葉稿寶馬嘶妾夫歸對鏡畫眉雙淚垂前日夫誤妾今日妾誤夫妾貌不如夫去時故人見寄韻青年鐵硯亦曽磨壯不如人可奈何松菊猶存陶令徑煙雲不礙邵公窩吟廊緩步看修竹醉石髙眠枕緑莎一笠一蓑吾事足江湖浩蕩白鷗波樓居狂吟并引新安梅翁吳龍翰學陶隱居作樓三層平生多好書故作丹壁多好睡故作壺天多好遊故作明月滄波多好玄虛故作與汗漫期蓋其胸中有數千卷書眼中有美少年不能好世俗之好而能好其所好如魚飲水冷暖自知然則知梅翁者誰乎故自描寫其趣云茅齋梅著市㕓間長與青山面目慳突兀小樓初結就竹牀石枕卧看山樓間丹壁富藏書誤學相如賣子虛何不買牛勤教子邵平瓜地要人鋤覓得樓中一覺眠將身化蝶入壺天平生睡債何時足春在梅花紙帳邊湖海真成萬里遊寒風吹破黑貂裘歸來卧占樓千尺夢落滄波明月舟汗漫相期欲控鯨龜樓粗可寄間身天教吳猛親常健乞與商山九斛塵振衣千仞興悠哉一日看山十二回胸次誰人有丘壑便容攜酒上樓來四山如畫不勝竒朝暮煙雲都是詩樓上吟聲穿碧落天公罰我鬢成絲胸次玲瓏著九垓政須時復興崔巍樓髙手可捫星斗移掇天河入酒杯諸方參遍一枯藤苦節期傳夜半燈𢎞景登樓持棒喝不容人上第三層偃月爐深紫氣浮紅鉛黑汞大丹頭梅翁欲挹浮丘訣專為黃山作此樓附録古梅賦并序余家有古梅突兀富饒之旁枝幹連理而茂先曽伯叔大父聯武巍科曽大父嘗作連理梅賦以見意余詩人也與梅為膠漆交梅而至古標格愈不凡敬依韻扁吾窩因為之賦其詞曰欣故園之古梅兮燦珊瑚之寶樹懸瑶臺之明月兮的皪瓊花玲瓏玉蕊矧鶼比翼乎鐵幹兮乃連理而薦瑞顧此槎牙兮其仰斯逆其偃斯醉其髙斯達其低斯跂鶴膝崢嶸􅋀􅋀交峙蛟背突兀奔騰之勢或橫枝照水如紉蘭之湘纍或半樹粘雪如飱氊之漢使或荒山衝寒孤根回暖如采薇孤竹君之二子烈士慷慨羈臣憔悴茹鐵筋骨鏤冰腸胃乃導引其形軀兮如霧擁而雲垂如鴻飛而虎踞故能曜其夜鶴之骨而枯其秋蟬之蛻也若余者與伊納交廬其旁詔弟讀書對親奉觴呼吸清寒咽嚼清香而庶幾瀉吟筆之琳琅者乎兩宋名賢小集卷三百四十一
