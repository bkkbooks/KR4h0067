body:
  text: 兩宋名賢小集卷一百二十五宋陳思編元陳世隆補艇齋小集曽季貍字裘父文定公弟宰之曽孫也再舉進士不第師事韓子蒼吕居仁又與朱晦翁張南軒書問往復南軒被召季貍戒其不當談兵且勸以范文正忠宣父子為法郡守張孝祥樞密劉珙薦於朝皆謝不起吕東萊數稱其學有淵源南軒有探古書盈室憂時雪滿顛汪應辰有四海曽裘父之句其為時賢稱服如此自號艇齋著論語訓解陸務觀序其集曰文詞簡逺讀之者遺聲利㝠得喪如見東郭順子悠然意消然可傳之作尚不止此遺珠棄璧識者嘆焉羅漢石吾聞大幻師種種示方便雖於土石中神力亦周遍君看此翠琅乃有羅漢面殷勤作禮相形質皆可辨初觀頂相殊次觀雙足現僧袍如輕綃風舉勢轉旋得非方廣尊影落此石片千年磨不盡若堅金百煉我來一瞻敬贊歎未曽見摩挲諦玩久欲去反留戀叮嚀善守䕶尊者俱神變㑹當清夜闌神光照金殿靈谷山舊聞伯子記巳得靈谷名隠然望此舟竒勝稱山靈懸崖瀉瀑布如髙屋建瓴喬松數千丈下有千嵗苓仄足行鳥道勢欲摶青㝠仙事雖渺茫幽討未忘情髙秋八月後擇勝來經行黄冠兩三人淡然亦忘形煙霞到几席爽氣來戸庭瘦筇閒指㸃老瓦同注傾慚非換鵝手不敢臨黄庭或可聨石鼎未必讓彌明重陽無十日黄菊漸向榮佳哉此天氣一笑未易營但願脚力健年年此尋盟躍馬泉山靈從何來崩騰躍萬馬初疑夫差軍水犀光照夜又疑閼於戰聲撼武安馬森然毛骨竦舌拄不能下對此神驂姿可以一戰霸五星泉五星耀寒芒直射入九淵化為石泉眠位置相聨綿相映璧月夜上下爭珠連星光本遊空著地今何然得非泉石癖如我老不悛宿正覺寺正覺江邊寺風煙罨畫然庭羅合抱樹門泊釣魚船暮雨凉初過中秋月正圓無人來共賞獨自占江天白水寺暫假僧房憩炎蒸覺頓忘誰知六月雨巳似九秋凉石徑苔痕滑稻花田水香鳴蟬休聒耳容我此徜徉苦竹行碧草送春晚綠陰迎夏凉輕風揺細麥淺水出新秧嵗月催人老田園引興長一㕓如可辦吾亦學耕桑金石臺江上岧嶤百尺臺摩挲塵跡但徘徊不辭濁酒三杯醉坐對晴空萬里開楚澤風烟隨處好仙家桃李有誰栽黄花過了梅花發待我扶藜得復來南湖葛巾藜杖興何長為愛南湖六月凉雨在山頭作雲氣風來水面散荷香登臨稍喜市聲逺徙倚猶嫌歸興忙後日重來攜枕簟不妨午夢到斜陽積翠樓手捫霄漢摘天星脚踏丹梯最上層須信神仙足官府能令雞犬亦飛昇少日便懷丘壑情看山看水飽曽經如今積翠樓頭望看盡江南未了青西隠寺彷彿兒時住此間重來不記舊山川却因坐久僧相問細數如今二十年疎山道中村深谷鳥近人鳴暮靄收時雨又晴極目春山隨處好笋輿穿盡綠陰行苦竹舟行船頭觸處浪花生船尾隨人山影行一水到家能幾許順流東下片時程危全楓祠香火頽然寄梵宫精英不與衆禪同臨川千古人心在猶説當年保障功疎山來往疎山四十年主人與客兩華顛此心不改澄河見往事休論過鳥然無復仙舟遺跡在空餘矮叔一燈傳危亭獨上窮登眺古木蒼藤繞暮煙楊源寺落日郊原獨杖藜偶尋蕭寺坐移時下臨稻壟如棋局細數僧房似蜜脾風裏長松能逺韻霜餘殘菊尚多姿因吟竹院詩人語笑我勞生力已疲疎山江南九月未飛霜木葉蕭蕭巳半黄行遍疎山山下路滿山唯有桂花香垍湖潭畔呼舟渡苦竹林邊策杖回衣濕為穿山雨過手香因折野梅來草封支徑路欲斷雨洗野花山更寒西嶺東岡烟漠漠南溪北澗水潺潺鳴玉泉何人邀我來白晝朝鈞天千官正雜㳫佩有蒼玉懸衝牙互擊觸逺韻聲泠然律吕相應和宫徴更相宣應笑居鄛人玉斗空碎捐兩宋名賢小集卷一百二十五
