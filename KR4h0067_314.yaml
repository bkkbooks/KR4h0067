body:
  text: 兩宋名賢小集巻三百十四宋陳思編元陳世隆補菊磵小集髙翥字九萬餘姚人有菊磵小集春日即事人間閒日月春後乍晴隂半夜雨聲急一溪流水深鳥啼花自發詩就客能吟短策西湖路幽芳信意尋送别老去情懐怕别離年来不作送行詩人前舉似終難信問著垂楊便可知春日北山二首人縁白石泝清溪手剥蒼苔認舊題春色滿山歸不去折桐花裡畫眉啼挿花吹笛兩山中桃李尊前日日同待得馬頭飛絮滿更来沽酒看殘紅僧房夜坐萬枝松裏一篝燈知是山房第㡬層静夜數聲清磬響上方應有誦經僧訪諸葛鍊師不遇青銅留著布囊中去謁人間小卧龍乆欲共君謀一醉有錢却又不相逢雜興二首新分菊本自鋤山手縛枯藤作矮闌比似著書空用力種花猶得一年看二十年前欲住山不禁寂寞掩柴關如今寂寞禁當得欲掩柴關又却難秋日田父辭二首啄黍黄雞沒骨肥繞籬緑橘綴枝垂新釀酒旋裁衣正是婚男嫁女時少婦挼藍旋染裙大兒敲葛自漿巾新摘摘笑欣欣相喚相呼看賽神孤山雪後雪後騎驢行步遲孤山何似灞橋時近来行軰無和靖見説梅花不要詩天台曹園蔡嶺桑麻地曹家桃李莊溪流春水滑梅度晚風香竹屋解留客筍輿休僦裝平生看花法不作蜜蜂忙西湖春雪小艇沿湖看雪飛正當騎馬踏春時是誰乞與楊花舞先占東風一月期閒居雜興三首開門遣蠻童買花供銅佛春風隨花来為我一披拂風和花氣清下簾休放出囘施佛因果供此老詩骨㸃燈酌春酒襞紙題小詩讀盡列仙傳引調學語兒自飲復自笑不覺春漏遲且了今日事明日還任之杜鵑休忉忉布穀休聒聒無田不須耕無家自能活行蔵莫非時造化安可奪更放心地寛出門行路濶春日湖上乘興行新路凝情獨老翁馬蹄春草上人影夕陽中飛絮沿湖白殘花染浪紅晚歸雲氣合雙槳破空濛春懐江南春盡尚春寒添盡征衣獨掩關日暮酒醒聞謝豹所歡多在水雲間過臨平征帆一似白鷗輕起掲船篷看晚晴梅子著花霜壓岸自披風帽過臨平古廟古廟依喬木開門對淺沙短籬紅槿樹深徑碧苔花屋破香煙濕庭空日脚斜山寒無賽鼓鳴噪集神鴉古寺山路荒凉出小亭土牆辨駁帶枮藤欹斜古殿三尊佛黯淡寒篝一㸃燈碣石半磨天寳寺禪房空老政和僧頭陀禮拜迎人説門外浮屠欠兩層小居結屋離黄道開門對白沙一莊千古月三徑四時花客至旋沽酒身閒自煮茶相聞蟲鳥外不復聽喧譁秋日三首旋買扁舟載一翁片帆吹下夕陽東西風欲織江頭錦催染秋林葉葉紅庭草銜秋自短長悲風傳響答寒螿豆花自解通鄰好引蔓殷勤達過牆獨客飄然物外遊江南江北總宜秋芭蕉昨夜縁何事和雨和風作許愁松溪廟廟自何年立門深晝不扃寒藤扶壊壁秋草帶疎櫺溪接東西碧山分逺近青老巫逢客至漫説有神靈蓮實膩玉肌膚碧玉房纍纍波靣趂紅芳坐忘佛土三生夢来結人間一夜凉青子綻時仙掌濕緑苞分處蜜脾香尊前笑摘醻風露猶記西湖古栁旁無題二首獨展羅衾無夢成寳香薰徹轉愁生癡心不願郎思妾只願郎今厭客情風竹蕭蕭淡月明孤眠真個可憐生不知昨夜相思夢去到伊行更㡬更秋興數聲新雁夜初長曉起開門衣袂凉籬菊褪黄秋興懶瓦溝纔試一痕霜秋晚即事江頭楓葉舞低囘催得濃雲頃刻開萬里碧天紅日晚數聲新雁送寒来毋自欺齋夜宴毋自欺齋清更嚴齋中人物斗之南七朝宰相得瞻仰四海詩人交笑譚古調喜聴琴再弄深杯休惜酒重添玉堂今夜無宣喚且與江湖作小㕘曉出黄山寺曉上籃輿出寳坊野塘山路盡春光試穿松影登平陸已覺鐘聲在上方草色溪流髙下碧菜花楊栁淺深黄杖藜切莫匆匆去有伴行春不要忙育王寺曉策烏藤上育王入山随處得徜徉碑頭龍䕶先皇字塔下魚懸外國香遍謁僧房嘗苦茗閒聴杜媪説毫光山深日短行難盡僧遣頭陀辦客牀春日湖上清波門外放船時盡日輕寒戀客衣花下笑聲人共語栁邊牆影燕初飛曉風不定棠梨痩夜雨相連薺麥肥最憶故山春更好夜来先遣夢魂歸黄居士山房浮利浮名心已灰三間茅屋白雲堆先生自釀松精酒侍女能持藤癭杯養鹿曉随原草去放猿時摘野花来近聞身口渾無累槲葉青黄繞宅栽育王寺精籃遊厯地景物自情親鶴引登山客僧迎禮墖人名花千佛供喬木萬夫身碑刻東坡作重来為拂塵送春韶光催去本無情祇為東君去住輕雖欲遲留芳草夢如何禁得杜鵑聲桐花快落春風老梅子微酸晚雨晴從此嬉遊時節少不須日日報詩成秋山散步乍晴沙路軟於塵新著芒鞵更可人誰道秋山不宜客桂花多處勝行春即事秋来髙處不宜登閒却西樓最上層讀罷黄庭忩戸曉自敲清磬上香燈烏鎮普静寺寂寞梁朝寺深廊十數間碑存知殿古香冷覺僧殘斷岸舟横浦平坡樹補山休文知好在依舊帶圍寛渡錢塘小立晴江上潮生落照邊晚花低映水春草暗迷煙燕子飛官驛鷗羣引客船關情南浦别相對獨依然七夕一枕新凉供醉眠覺来風物已凄然山雲帶雨重重合宫樹鳴秋葉葉顛滿進一杯酬好節休看兩鬢換流年雙星囘施癡兒等容我長齋繡佛前荆棘中見梅花荆棘叢中數㸃春春雲態度月精神依然竹屋茅簷下靚女盈盈不嫁人感春人事日紛紛不知春已分問梅成緑葉看杏落紅雲燕向晴空語蛙從夜静聞感時傷老大孤坐對爐熏送劉允叔主簿歸山中浮利浮名挽不来故山歸去恰春囘馬蘭旋摘和松鬻枸杞新生傍菊栽庭樹夜留山鳥宿洞門蚤為野雲開明年我亦天台去相伴芒鞵蹋古苔江居曉詠家住清江江上村江雲山影自平分㡬囘早起開門看不見青山見白雲題二小姬扇二首慶娘顰翠眉春痩怯羅衣笑問采花蝶如何成對飛湘湘未識羞獨坐抱箜篌貪學耆婆舞擡身拜部頭小樓雨中雲浮江雨暗獨客苦淹留白髪羞明鏡青山對小樓酒功書下下心事付悠悠安得并州剪從頭剪斷愁首夏漾漾池塘碧染衣隂隂草樹緑成圍江村寂寞春歸後一㸃楊花不見飛寄方巖緑髪仙人山澤癯出游入息㡬曽拘種花甚少四時有諫草不多千古無閲世眼高磨日月好賢名重滿江湖行蔵到得無心處鐘鼎山林豈異途自賦蝸角蠅頭總是虛何須留戀市朝居老於親戚情當密貧與公卿分合疎小徑草荒元種菊故山塵滿舊抄書㡬時歸去重料理嘯月眠雲得自如蕺山登高醉眼横斜看菊枝又成客裏過佳期去年行路猶持酒今日登髙懶賦詩老淚怕從衣袖見閒情但有帽櫩知阿髯故國才歸得嵗嵗須来舉一卮戍婦吟二首將身託戰争世事百無情相對生離别渾如落葉輕辭家出戍邊北望隔青煙怕作沙塲夢秋宵不敢眠憶西湖西湖春二月結客少年遊駿馬黄金勒長身紫綺裘愛花論擔買嗜酒滿船浮兩載縁何事台州又越州小樓雨中長安市上僦樓居閒裡身心儘自如十日雨聲春對酒一忩燈影夜觀書茶經未展愁先醒藥録才看病已除所欠短簷晴影好折桐花月共扶疎喜鄉友来蕭蕭春夜雨有客渡江来世事攅眉説鄉談信口開曉肴供苦筍時果薦青梅甚欲澆離恨呼燈撥酒醅春寒料峭東風破客衣春寒不比臘前時絶憐墻角櫻桃樹全似梅花雪後枝昌國縣普濟寺小亭鯨海中流地龍峯小洞天亭高先得月樹老乆忘年大士居鄰境閒僧指便船若為風浪息更結補陀縁登九華樓高閣臨江可契心興來時得一登臨山雲浦樹重重合野水汀蒲日日深鴉背夕陽供晚哺蟬迎凉吹試秋吟倚欄盡見諸峯出如對風流李翰林趙仲莊都鈴山居一官難換北山薇結屋栽花度四時果熟不妨禽摘盡酒香惟恐客来遲小蘋低唱花間曲阿廣髙吟李下詩客乆辦心分半隠尚嫌風骨欠仙姿船户盡將家具載輕舟來往長江春復秋三世兒孫居舵尾四方知識㑹沙頭老翁曉起占風信少婦濃粧照水流自笑此生飄泊甚愛渠生理付浮悠歸寓舍門前流水碧粼粼嵗晚歸来亦可人梅欲開時多是雨草纔生處便成春嬌兒對靣兩癡絶老子關情一欠伸快取竹篘篘濁酒舉杯先為洗京塵重游無量院佛屋欹斜老翠微小軒猶記昔游時江雲帶雨凉生竹野水迎潮暗入籬門外風波僧自識山中朝暮客曽知眼明素壁關情乆十載纔能寫此詩春霽積雨才收雲盡歸長安一色碧琉璃日移簾影臨書案風颭瓶花落硯池巢燕學飛猶戀母籠雞得食旋呼兒眼看景物關情甚喜為新晴賦此詩嵗除登窄蕚山精舍蕭寺經行無盡情倚闌長是眼増明谿因宿雨十分急山為凝寒一味清竹外飛花随晚吹樹頭幽鳥試春聲重來又是明年事臨出門猶欵欵行張氏曲江一曲澄江兩派分滿山修竹緑齊雲樓忩風月侵帆腹小徑煙霞隠屐痕白鷺夜依花影宿清猿時共櫓聲聞主人與客心如水同倚闌干得細論春情四首樓頭上馬苦匆匆百計相留無計從正好看花郎却去江邊春色為誰濃天涯海角水雲寛人在吴頭楚尾間彈徹箜篌難寄恨海棠庭院獨凭欄深院沈沈照落暉寳香熏徹舊時衣一春行樂誰為伴羞見花前蛱蝶飛鬥草歸来上玉階香泥微涴合歡鞋全籌贏得無人賞依舊春愁自滿懐晚春即事輕煙終日鏁樓臺細雨絲絲半濕苔杜宇一聲青嶂外谿流時送落花来蕺山戒珠寺葉葉東風吹客衣昌安寺裡晚遊時欹斜竹屋羲之宅磨滅經幢率府碑佛化是誰留實相鵞亡猶自見方池逢僧小作煎茶供畧問源流笑不知冬日即事江上凝冰斂水痕門前殘雪綴溪雲杖藜獨立梅梢月成就清寒到十分訪銛朴翁不遇二首亂花飛絮趁長髯来訪西湖竹裏菴行盡白雲三十里詩人又在白雲南乗興尋僧入翠微山中無限野薔薇主人不見從誰賞折得繁枝自挿歸聚景園口號二首淺碧池塘連路口淡黄楊栁䕶簷牙舊時嵗嵗春風裏長見君王出看花竹影參差臨斷岸花隂寂厯浸清流遊人難到闌干角盡日垂楊蓋御舟恭跋思陵宸翰拓本巻後淡黄越紙打殘碑盡是先皇御賜詩白髮内人和淚讀為曽親見寫詩時山行即事二首落盡桐花春已休過墻新竹籜初抽山行步步黄泥滑小立溪橋聴雨鳩巻地東風晚更狂櫻桃吹子落泥墻谿雲自為催詩黑忙煞條桑窈窕娘寄林徵君老無閒事上雙眉問著窮通盡不知兩鶴忽飛因客到一牛方病得妻醫案頭㡬巻隂功録壁上諸家勸世詩見説今年翁八十鬢邊才有數莖絲曉行跨馬登長路聞雞度逺關水光斜漾月雲影倒埋山人迹霜橋外禽聲煙樹間自慙林下客清夢未曽還三峯廢寺荒陵依約舊山門秋草離離故迹存雙瀑有聲傳宿雨一龕無地住閒雲蝸沿壊壁丹青古龜負殘碑字畫昏三歎廢興誰可問亂雅鳴噪自成羣下塘日出移船日又斜蘆根時復見人家水鄉占得秋多少岸岸紅雲是蓼花行淮老翁八十鬢如絲手縛黄蘆作短籬勸客莫嗔無凳坐去年今日是流移蘭亭老来渾不愛春遊来到蘭亭爛熳秋亭下水非當日曲山前竹似舊時修二三客子因懐古八百餘年續勝流試與山靈論往事不知還肯㸃頭不贈丁子植撫幹幕府歸来赴調時清聲籍籍滿京師真如白璧蔵奇石判得黄金博斷碑覔宅先尋籠雀地買盆權作養魚池客中髙致猶如此明日還山樂可知天章寺地勝秋清人欲仙倚闌時節月初圓不知寺在煙霞表但覺身臨星斗邊寳墨舊歸天上去高名今向世間傳登臨莫作匆匆㑹去後重来又㡬年天衣寺萬壑千巖非浪聞十峯雙澗不須論袈裟旋化空王服宫觀曽招帝子魂山向馬頭囬禹穴谿分燕尾入雲門秋行既了登臨願草草題詩對緑尊毅齋鄭秘書道山領客羣玉堂前春晝隂主人領客步清深上方圖畫無真贋東壁詩書有古今手轉玉璣看測日指揮金井試為霖山翁不作蓬莱夢但願時来洗此心元日長憶兒時二老傍元正嵗嵗有風光攙先禮數修人事著好衣裳侍酒觴囘首不堪追日月感情空歎換星霜尚期我老如親老却看兒童作節忙重五日懐舊獨守空庭日欲晡滿斟濁酒不須沽白頭兄弟三年别青眼交游一字無醉看葵榴懐舊事饞思櫻笋夢吾廬向時癡絶今愁絶自讀離騷些老夫贈鄱陽程克已見説鄱陽有老程與人懐抱亦分明一千里外未識靣二十年間長慕名因聴酒邊談舊事便從客裏定交情他時我老君猶健海内相逢即弟兄初聞雷聲二月寒猶在春雲濕未開灑忩終夜雨發軔數聲雷薺麥緑生腦棠梨紅折腮西湖花事動從此日徘徊靈巖寺天柱峯髙逼太清靈巖端足擅高名人間有石皆奴僕天下無山可弟兄樵徑雲深多虎跡清溪風暖盡猿聲客身元是山林種見此如何不動情秋夜小屏相對兩眉攅長夜迢迢不肯殘䑕向燈前窺坐卧人從夢裏説悲歡故山無計行秋晚客路從誰守嵗寒獨得濁醪相慰藉酒腸猶喜十分寛寄王仲彛仲彛留三衢乆不歸省因以箴之别君三見雁南飛夢裏相逢覺又非書去不知何日到人来先問㡬時歸正堪燈火親書巻莫遣塵埃染客衣二老倚門知已乆交情于此亦依依李將自小在行伍得官因用兵籌邊頭髪竪入陣骨毛輕戰馬惜如命寳刀都有名酒酣常罵坐嫌客話昇平無錫縣春日吴楚新岐路江湖舊散人放船来古縣沽酒供閒身花卸一村雨鳥啼千樹春野塘風捲地無復見芳塵常熟縣破山寺古樹滄浪外精藍縹緲間木枯曽閲世龍老解分山鳥道秋迷跡禪房晝掩關詩成遊子去流水自潺潺曹娥浦泊舟夜宿曹娥浦停舟是㡬更聞鐘知寺近聴櫓信潮生風向沙頭起天從舵尾明夢囘無意緒兩岸杜鵑聲拜林和靖墓玉幽香骨老雲根占斷孤山水月村薦菊泉清涵竹影種梅地冷帶苔痕生前已自全名節身後從誰問子孫惟是年年寒食日游人来與酹清樽多景樓一帶青山欲盡頭精藍深處著危樓下無餘地容車馬上有重檐接斗牛鴉落野田長趂晚雁沈沙渚最宜秋江南好景從来少北望空多故國愁賞心亭江亭如倚釣魚磯靣靣雲櫩勢欲飛西望汀洲振白鷺東連巷陌接烏衣六朝更代人何在千古興亡事總非客子猶憐風景好倚欄長是欲忘歸夜過馬當山獨載詩書趁野航自憐飄泊度時光殘年准擬登牛首連夜匆忙過馬當古廟荒寒江浸影斷崖淒慘石凝霜壯懐未分甘衰老回首長淮恨更長送方巖先生忠言厯厯未曽行盡載圖書出帝城餘子但知才可忌先生當以去為榮門闌竹石關心乆部曲溪山照眼明長笑歸歟莫惆悵浙江風定自潮平清明日南北山頭多墓田清明祭掃各紛然紙灰飛作白蝴蝶淚血染成紅杜鵑日落狐狸眠塚上夜歸兒女拜燈前人生有酒須當醉一滴何曽到九泉感懐漂泊南州又過年恰如杜子客鄜川酒堪度日難為醉詩怕傷時未可傳店舍無煙兵火後街坊有月試燈前荒凉古驛聞吹笛老淚縱横落枕邊秋夜老去驚秋白髪添不禁凉吹逼疎簾樓髙幸自蛩聲逺争奈梧桐又傍櫩下塘河河水新添三尺高河邊蘆葦有龜巢波流夜夜飄漁箔空㸃籃燈照樹梢兩宋名賢小集巻三百十四
