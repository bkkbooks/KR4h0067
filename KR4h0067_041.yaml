body:
  text: 兩宋名賢小集巻四十一宋陳思編元陳世隆補劉忠肅集劉摰字莘老渤海人少舉進士禮部奏名第一遂中甲科知南宫縣徙江陵府觀察推官用韓琦薦除館閣為監察御史裏行是時仁宗勵精求治摰感恩遇因上疏言時事未幾責監衡州鹽倉僉書應天府判官元豐初為集賢校理知大宗正丞開封府推官遷右司郎中以事免黜知滑州哲宗即位為吏部郎中改秘書少監擢侍御史奏論蔡確之罪又言經義之弊有司莫能辨請雜用詩賦取士復賢良方正科罷常平免役法引朱光庭王巖叟為言官拜御史中丞遷門下侍郎元祐六年拜右僕射兼中書侍郎移知青州紹聖初落職降知黄州分司南京居四年責鼎州團練使新州安置卒于貶所年六十八時章惇蔡卞誣造元祐諸人事不己以邢恕為御史中丞用其言欲誅摰及梁燾王巖叟等以為摰有廢立之意遂起同文館獄用蔡京等雜治卒無佐騐㑹摰卒乃已元符三年復中大夫旋改觀文殿大學士大中大夫贈少師諡忠肅老子畫像敝周僿于文老子談大道仁義己末流禮法固行潦虚無抱𤣥珠清浄為至寳剖斗息羣競死聖止大盜謂可憑斯民狂瀾復既倒不知世大變萬偽火就燥欲以區區言反俗入羲昊渾淪五千言道徳何浩浩漢常求其説施用未深造衣食己有滋煩苛己能埽惜哉衰世士學術失探討流而為刑名慘礉極枯槁但見多申韓舉皆罪黄老聖人無常師有善取輿皂問禮固有然誰謂孔徒小遺貌知是非君無論醜好孫少卿鹿頭山詩并畫圖二首誅茒搜險旋尋真聞説仙巖一日新佳境留連應有待先時登覽豈無人披榛好石來如召隨手清泉應若神不獨山中興勝事幾多風愛在邦民使君真愛鹿頭山圖畫歌吟去為傳塵世那知武陵事時人爭誦永嘉篇行春游醉嘗勞夢按部登臨又隔年有客平生志林壑坐憐雙眼隔雲烟易元吉畫猿槲林秋葉青玉繁枝間倒挂秋山猿古面睢盱露瘦月氄毛勻膩舒𤣥雲老猿顧子稍留滯小猿引臂勞攀援坐疑跳擲避人去髣髴悲笑生壁間巴山楚峽幾千里寒巖數丈移秋軒𣺌然獨起林壑志平生願得與彼羣吾知畫者古有説神鬼為易犬馬難物之有象衆所識難以偽筆淆其真傳聞易生近己死此筆遂絶無幾存安得千金買遺紙真偽當與識者論兩宋名賢小集巻四十一
