body:
  text: 兩宋名賢小集卷一百四十三宋陳思編元陳世隆補宗忠簡詩集宗澤字汝霖婺州義鳥人元祐六年進士靖康元年知磁州勤王兵起康王以澤為副元帥建炎間纍遷延康殿學士京城留守兼開封尹連結諸路義兵方尅日渡河力請上還京為黃潛善汪伯彥所沮憂憤疽發背卒贈觀文殿學士諡忠簡有序東上辭松楸一首八年坐親黨泯伏長安城甘心傍松楸申我兒子情閉戶慨岩廊讀書笑金籝力田固為政課童乃司兵深病骨相寒不蒙軒冕榮維天臨萬邦搜羅世豪英我友挽出之大人今繼明古無忠孝全泣涕去丘塋為翁大門閭翻然以東征感時有序勍敵長驅京邑阽危此忠臣義士痛心疾首勤王報國之秋也而宰臣遷家郡守踰垣縉紳士大夫陸竄水奔使人主嬰孤城以自守無一犯難者事小定矣而上書獻䇿之人亦未有慨然以東者世道之衰一至此乎太息之餘以詩自道卿士辱多壘天王憤蒙塵御戎要虓將謀國須雋臣百戰取封侯未必亡其身懷姦廢忠義胡顔以為人吁嗟世道衰大僇加搢紳平居事奔競梁汴分雲屯一旦國步艱四迸如星繁輔相已擇栖守令仍踰藩冠蓋陸西竄舳艫水南奔鄙夫用慨然䇿馬趨修門勤王羞尺柄悟主期片言時來倘雲龍峩冠拜臨軒逶迤上玉除造膝伸元元措世于泰寧歸來守丘樊曉渡小雨疏風轉薄寒駝裘貂帽過秦關道逢一澗兵徒涉赤脛相扶獨厚顔華隂道中三首煙遮晃白初疑雪日映斕斑却是花馬渡急流行小崦栁絲如織映一作隱人家菅茒作屋細一作幾家居雲雒風簾路不紆坡側杏花溪畔栁分明摩詰網川圖寧王畫作金盆鴿韓愈詩誇玉井蓮瓦缶泥泓村落小亂茅羣雀不堪傳雨晴渡關二首燕北靜風塵河南濯我兵風雲朝會合天地晝清明泣涕收橫潰焦枯賴發生不辭關路逺辛苦向都城蕩滌真成快氛霾不敢隂萬花恩澤了二麥寵光深地勢瞻仙掌河源識帝心馬頭迎霽色詩句日邊尋道逢散遣之卒云講和退師無所用之矣輒以二十六句道胸臆翁擁麾幢我為兒剽聞竊睹皆兵機其中襲擊不容瞬颷行電掣猶逶迤敵人長驅越大河天下震驚觀闕危肉食之謀殊未臧我憤切骨其誰知慨然奏疏金馬門力陳盟賂損國威嚴尤下䇿尤可笑朝錯上書亦奚為道路荆棘初剪除花如步障吾東之八年閉户尺蠖屈一旦渡關匹馬馳行行側身聽奏捷忽聞募士詔遣歸濃書大墨榜教詔曰敵悔過今退師羽檄向來召貔虎乃詠出車歌杕杜櫜兵銷刃兵猶怒却把鉏犂農歌舞君王神武今藝祖爾如不歸汚我斧又賦一律罷兵洵上䇿試問可誠然竟棄三軍力空拋半壁天上林無旅雁絶域有啼鵑羞見龍泉劍飛光牛斗前至洛都人士女各紛華列肆飛樓事事嘉政恐皇都無此致萬家流水一城花華下千巖層出亂雲飛失我平生洞府期夜據征鞍不交睫舉頭彈指睡希夷過潼關一雨崤函底風沙放我過嶽神猶假借官吏莫誰何塹斷思航渡城堅戒石摩一夫工墨守寧怯萬夫多道逢鄉人笑僕騶馬之瘦生笑長裾曳仍羞下澤奔據鞍非馬援叱馭豈王尊汗血能觀國的盧終感恩莫欺騶馬瘦揮䇿詣金門盤豆鋪南李翁園李翁卧亭午春深掩柴荆忽聞風雨響疑是勤王兵題趙園瑶瑛夾侍梅臺琴瑟自鳴松島山中野服相羊足以亡憂遣老鑿池智有泉源種木胸無芥蒂螭頭吐水涓涓端是銀潢一派馬上口占龍興虎視詫周秦王氣東遊作汴京隂祝巨靈移此險大河為塹嶽為城早發繖幄垂垂馬踏沙水長山逺路多花眼中形勢胸中䇿緩步除行靜不譁謁華嶽楊賜嶽所挺嚴武金天晶二子為時出顧我非炳靈維嶽鎮四方氣秀天骨青嶻嶭立千仞力能産公卿降神詠嵩髙讖緯仍反經取象到執圭譎怪如洞冥平生笑窮竒立語心自驚我質培塿耳胸中固崢嶸誰言華嶽髙我山摩玉京是中所包藏丹碧參瑰瓊平居蟄雲雷飛雨溢四溟此豈真有之落筆紛縱橫發我文物祕象渠膏澤傾太華屹不搖我山身載行兩宋名賢小集卷一百四十三
