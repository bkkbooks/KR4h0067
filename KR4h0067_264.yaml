body:
  text: 兩宋名賢小集卷二百六十四宋陳思編元陳世隆補方泉詩集周文璞瞿塘神君歌黃衫紗帽佳少年炯然餓虎窮山淵不居秦鹿祖龍畔卻走碧雞金馬邊左手斜執巨靈鑿右手敬抱禹貢篇離堆順流已受命一下不打天吳鞭有時挾彈莫表雲有時蹴踘春風前有時却自著絳帕走入藥市尋神仙為人定似李太白學道定似葛稚川孫翁走避乖崖叟遣僕送畫不取錢神君廟食與畫像千古萬古當流傳我昔夢上神君殿偶值蓬萊衆真晏洛陽開盡姚黃花銅駝陌上難相見清明日書事蒼辨一如楚執圭思想越吟身自低澗水又如古智士縱橫流轉多滑稽雜花半開巳倐落如怨曠女離深閨幽禽自呼復相命如譴鬼魄傷窮棲而我自是不羈者行行踏破青萋萋今回蕩槳苕霅溪與野老輩相扶携園池亭野遊歷遍自對蜀錦傾偏提興闌佺走歸弟舍同沃浮蟻烹村雞百五之浚最寥閴獨過趙灣西更西野夫不知時節換但要熟醉如春泥雲根雲從會稽生旦旦見伯禹聽讀山海經成龍不成虎禹命雲歸歟可向蕺山去昻昻王內史睂牢照今古常來此盤旋深藏無處所王孫江海人雲根自棲翥招邀玉葉來以石為伴侣既從衣上浮只就茶裡煮不入晉家池肯作秦望雨笑爾一文郎不學世間語吳傖哦五字坎壈酸澀苦併送山中人約束雲下取聽琴向人欲抱舜文絃可晒書生不值錢彈出履霜空作惡一林風露巳鳴蟬寄友人流落他鄉鎩羽翰半年寧復記悲歡夜傳樓鼓思城角朝見江船念客鞍不恨形骸老閭里遂令唇舌滿長安寄聲好在文章友目送春風自倚欄雨雨意遽如許雲容亦可憐聲聲總斷續滴滴更勻圓道院燒香地山房焙畫天故園無恙否潤色到瓜田陰山陰山祠下月如霜不為吟猿斷殺腸折得燈花無處賞帶枝分與棹船郎新亭諸君收淚巳無言煙外中原草色昏老子歸來坐廊廟短轅車上欲消魂法寶寺細竹千竿殿影斜龍顏曽此著袈裟寺樓杳杳鐘聲度疑有宫娥出晚花戒壇相君孫女小乘僧身入祗園佛律行三級戒壇秋色冷箇中螻蟻亦長生桓野王畫像胡牀三弄清溪笛歎息欷歔太極筝怊悵斯人風味減江花江草不勝情玉晨觀二首野荀衝泉出山花避石開余方有公事不為等間來羽扇臨元寺霓衣上醮壇尤枝松葉冷千葉杏花殘寒食有感三首生平參道術師事太茅翁持鑰開金匱焚香立玉童黃麟來地上朱鯉出江中今在桁楊畔依依睡晚風清明好時節傲吏小詩家失意因流水傷心為落花人歸知市肆日落見山斜明日三義路村醪亦自佳亭午步江臯誰云命不遭愛風吹蛺蝶怕雨爛櫻桃鑽火烹新乳槌門覔小槽年今奇事少塵滿舊征袍桂偶向花邊立懸如病已瘳小山今夜月團樹滿庭秋清露霑叢底斜河在上頭須臾香更好還與碧雲浮自笑自笑蕭條甚微吟坐到昏江風來掃地山鳥見開門茶面龍頭縮花稍犢鼻溫一從杯酒少不復過深村檇李道中二首吹徹鵝笙醉碧桃古城斜日泛輕􅊑此行憶著經行處緑樹黃桑一樣髙臥龍山下聽吟松細雨清明似夢中栁蔭朱欄三百尺渴烏猶自泣春風梅梁歌文命殿角東北左上有梅梁鐵交鍊傳聞舊時枝葉生木質麟身無不可有時匹練離朱栱歸帶濕萍光欲動低頭下吸菲嶺泉奮髯直入陽明洞旁觀但怪香火濃頃刻即令風雨送爾不見飢烏啄鼓來饋食走入嵩髙化為石機祥禍福儻或是陰陽幻變誰能測玉筍觀挂白玉梁含元追下流血柱異事茍逄博物問後來那得詳其故卷丹雲凝素霧玉蕭九成奠雕爼登歌升降只仰俯嗚呼梅梁忽飛去題闕女騎燕山雪花一尺飛闕人闕女夜打圍海東青過流沙西黃頭郎主獨自歸創殘狐懸氊車疲憊鷹犬聞笳悲君不見自從在晉納書款白溝河漘作邊面東陽道中野店梢頭起竈煙江雲弄色半晴天暗泉繞砌喧人語逺燒侵林照客韉晚日未收雞上樹春風欲度鳥耘田布帆無恙歸心穩才到家山又迫年鳳門泉石根兩眼北流泉乳竇潛通御井邊飄出宫花人不識又沿衰草下山前寒食曲今年寒食好天色遊人踏青行不極尋山不憚千里逺往往啼號濕松柏一杯才酬墳上土祇就墳前便歌舞故鄉自有懊惱聲插腰羊皮小畨鼓吁嗟悲歡一餉間但恨死人不能語君不見北客紛紛俱落南先冡盡被黑塵漫影堂逄節具飲食魂魄夜行溪谷山賞春二首滿酌黃封都市酒斜簮縹帶御園花半酣更乞跳珠水獨對風爐自煮茶賞春社裡鼓逢逢尚恨聲同調不同我亦明朝苦無事更來吹笛亂山中春懷棠梨未落栁絲長料望幽人作斷腸已自不堪田父飲更能從入少年場山連莽莽荒陂白門掩蕭蕭野日黃想得故園踈雨外樽前催拍社韋娘暮雨暮雨瀟瀟郎不歸尊前誰憶舊歌詞望夫烏臼濃於染葉葉驚秋恨欲飛即事二首樂使金花鼓蠻衣紫金鞍番官船過界驛吏報平安龍護朝元閣鶴棲封禪臺中原垂白叟只望羽書來題堯章新成山堂早將心事付漁樵苦被幽人苦見招多種竹將挑笋喫旋栽松待斫柴燒壁間古畫身都碎架上枯琴尾半焦猶有在山窮活計仙經盈卷一村瓢題盧中之贏綱圖昔日三郎騎爾祖廟食太山可辛苦後來﨑嶇蜀棧間棄置龍媒𣸪親汝深山古木雪漫漫陰途十步九步艱綱頭呪囑勿損折要爾助軍身補官贈相士丁日宣張公謂余可神仙薛顛謂余可英傑丁生謂二皆無成世間安有此奇絶麒麟閣上冠貂蟬龍虎鼎內治大丹興來一笑掃長空回首巳自升雲端何如只向松江渡楊栁影邊茅屋住臥看蒼虬挾白雲卷取秋濤過江去弔黥卒吾作窮奇白下囚汝披短褐從吾遊蔣侯廟畔沽春酒周處臺邊送客舟械欲破時應日慘命將絶處亦天愁江陵栁大如知此對著官軍輒淚流楊孟博挽詞向來洛下老書生今見諸生更老成不復秀才趨試院已題文學上銘旌泛觀今古人亡恨只有英雄命莫爭來弔不聞妻子哭依然認作讀書聲贈隱者袁三栁大劉草八長到先生卜肆邊便拜逸妻為嫂氏更沽春酒作家筵山公馬在何須爾林屋丹成亦偶然獨此老身無籍賴為他人擲卦爻錢劍客行燕雲王氣著柘黃仁人烈士集太行已聞泣涕拜明詔共挾金輿歸太梁安得山人一雙劍走入雲中看不見人間夜半風雨時逺人首奏延和殿我生四十無所成荆淮河漢為知音丈夫志在仁義耳麟閣貂冠非本心功成劍化兩龍去我亦變名入煙霧此時再拜康山人九霄客星在何處書事説戰猶能聽聞尸不忍過役人愁似鬼病馬瘦於駝甚欲參經緯其誰出揣摩中原有遺老亡奈檄書何見泗州降者才月降闕便守邊大家齊數中興年姑蘇寺裡相逢處為爾呻吟一悵然感興七言三首寥寥古意少人傳莫為薰琴只五絃夫子縱心方學易我曹何意便談元神馳洙泗身將老望斷沅湘眼欲穿月白風清如此夜阿郎不肯上鈞天在家莫羡出家僧擾擾營營竟未曽相國舟中龍奪劍山人琴畔鬼吹燈從來不肯尋真訣更自無心學大乘漢室諸公鳴玉佩也須還我一枝藤夜夜推敲學苦吟一如鍛鍊假黃金石間真隱何時出地下狂魂無處尋獨鶴尚知長袖舞哀猿空作斷腸音故墟杞菊今何似桂落小山春水深題天童全老天童寶樓閣銅釘敞朱扉一老燒香後諸禪乞食歸天聽塗毒鼓神捧苾芻衣説了村夫偈依然入翠微送人之金陵江山不逐寒潮晚陵墓猶含古木春君入臺城須訪問箇中定有六朝人送逸人歸茅洞三君乘白鵠各在一山椒子去穿茅洞人方采藥苗花連雲氣近松轉水程遙想得尋幽侣空歌散午朝中秋日遊能仁北寺兩剎輕雲漠漠煙漫漫杖藜扶行不作難無量壽佛像最古未曽有經碑亦殘秋花泫露顏色好客子著雨衣裳單題詩寫寄莓苔壁勿使他人相對看贈虎邱僧道輝遊天台二首世讃碑文换穹龜上緑苔琵琶不可聽樓閣更堪哀竹動禪僧入梅香凍雀回開函翻內典日晚未歸來少小郎精勤參禪復著文香薰滬瀆像茶酹武丘墳入足山猿見吟詩海鶴聞幽情正迢遞又拜石橋雲西湖即事間看浮鳩棲曲清倦隨奔鹿上荒陵松門雨過長廊靜一架藤花供病僧宫人斜魂魄凄涼掩暮塵野花山葉自精神年年中使頭邊過暗裏相看似路人上強寺方池流水碧溶溶怊悵靈蛇不易逢門外行人常立看一株唐末半枯松太湖太湖我汚地茂苑我林莽橘柚我堆盤鱸魚我登爼區區為蘋花移去溪上住終當賦歸歟來此臥煙雨寫懷二首吾聞唐諸僧往往多人傑有携至嵓廊可並夔稷契偉哉寒山子拾菜衣百結其文似離騷但自寫木葉往時陸荆門自是天下雄徒隸解散盡何處尋樊翁遂令一世士默默逃虛空至今大堤上葉葉皆春風九溪十八澗九溪十八澗冷見帝青苔洗足僧書石臨泉客放杯案頭松葉響身畔野花開百六辭歌吹清遊始一回弔辨才二首讀了碑文讀祭詩冷看遺像立多時郎當嶺上生雲處山鳥山花憶老師坡使參寥滴奠茶定將老淚濕煙霞誰知走入靈山隊又對間人説法華西湖小隱先帝何曽寵幸臣家園籍沒幾經春一丘賜與嬋娟魄教主西湖似洛神麯坊麯坊才盡上湖船笑問雲山欠酒錢兩行栁絲黃不斷不知身在御園邊壽星寺聞子規二首子規欲歸歸未得啼向錢王壽星石明月血盡人不知只怪曉山深似碧莫向空山惱病僧莫雲臺殿異鄉人多時不識巴江路守著濃花哭過春分夢泉偷得兩泓清問他猿鳥喫上下泉邊身上下牀上客相對各相忘山中小花白隱者居密竹緣坡便當籬野泉入户自成池牀頭一卷麻衣易更有寒山拾得詩逸士墳魂歸魄散兩逍遙小小丘亭慰寂寥守墓未須藝宿草白蟾方護紫芝苗夏日偶題溪友相呼上釣舟藕花菱葉思悠悠好詩已在前山寺寫過參寥石井頭謝頤師見過雲卷道者方晝睡有僧奚為入桑杞惠然相過窮壑底共談儒流佛宗旨二家之風亦頽靡吹而揚之誰為起寒灰煨芋香透紙呼童就鄰一賒米作糜煮菜相料理吾窮於世無比擬殷勤相覔有吾子漫書七字聊送君往供天嬪泣山鬼望茅山六言三首羽衣藥叟歡迎手執蘭花共行從此十年不調可能久視長生昔年唱采芝歌已老頭顱奈何不見飊輪碾處白雲出沒常多蔣家兄弟清古著書元相推宗搏土劃沙戲劇穿岡度嶺從容寄山中道友三首玉函捧上五雲堆著意通幽此一回三十年來增悵望更無人上望仙臺匆匆山信寄來時中有黃庭七字詩已死華顛無覔處幾回吹斷王參差憶得尋山復出山緑楊時候暮春間至今只有遊仙夢長與春風自往還初營鳳山香草參差種幽花逐漸移既添醒酒石須著放生池春在年年好山來處處奇吹簫吾不解長嘯却相宜梅谷香焰雲頭玉雪身緩行微咏岸烏巾始從谷裏看修行却向水邊逢麗人客子去時方得月嶺猿啼後便傷神鳳凰欲下簫聲緊狼籍瀛川萬斛塵法華小隱偃蓋著地臥清瑤傍渠走散入流觴臺轉若珠曲九淙淙不知休還赴石鯨口灣濃合巨澗橫橋傍蒲栁來看暮春餘衆緑濃似酒摩娑蘇陳刻愈覺嵗月久寺僧愛光焰捧送貴侯有至今星散居各自開户牖自棄眠雲身誰復釣月手夕陽令我歸為爾重搔首既離洞霄遇雨却寄道友凡骨何堪得再行渴心欲要謁通明驚聞竹樹連山雨疑有風雷㩧地聲鹿啖黃精知嵗久人逄青箬便神清重來只要齊盂飯副似堂堂枸杞羮題曹武帝削瓜圖阿瞞瓜分姿見之垂髻中此心既弗又此道安可洪漢祚既墜地餘子方困窮仁義儻自唱厯數豈不同挾令及宫閫殺士延奴童至今弔古徒哀痛殊未終實以已逼仄遂令彼長雄畫圖出後世略見經營工想其鼎峙勢亦天誘其𠂻此章弗徒歌聊以禆國風題蔡武伯所收荆公硯獸靣三腳莽回互中有滲液美無度當時曽出富國疏老子平生用心處如聞四海失枝梧可憾諸公欠調護帝謨商頌周六典刻畫聲形勞解詁下令文字與風騷一一相輝炫緗素誰令天子遽如許可是石也能無預陳元同歸蔣山路亦使髙流野僧覷若為持入定林中應有明雲入天柱吾鄉風流蔡夫子匣而藏之閟垂露君不見公卿後進陸象山作祠堂記餘千言直欲百世俟聖賢惜哉不得銘此硯使我失意心惘然歸别墅幽棲久不到猿鶴擅藤蘿叢篠生將遍流泉咽更多鄰翁新釀熟野寺暮鐘和亦有經行者來觀倚杖歌早起佛香才了换儒巾身是人間自在身一路野花清養目半溝流水靜怡神雨宿山中留連如有情蕙帳極空明晚粥知泉味昏鐘度雨聲稍容鄰叟睡莫放曉猿驚剩欲剜苔蘚應當寫姓名再遊九溪昔年九溪十八澗今度見之逾清真靜依落落石路晚間繞寂寂山家春可憐潺湲似留客更覺曲折能隨人得得杖藜來盡日野棠山杏亦精神偶題海氣江聲相與浮今時帝里舊杭州西湖寺裡多金碧自厭穠華不肯遊送人之官嚴陵如君風貌又精神自令拖紳近紫宸平地有心開洞穴十年無俸著間身巳看青舫垂垂去須憶緋袍灧灧春若向元英臺下過為言亦是學詩人與辨山道士飲采茗歸來日未斜更携苦菜入仙家後園同坐梧桐樹仰看紅桃落澗花不欺齋陳兄榜名不欺齋不欺本自誠中來晚周洙泗漢伊雒中間此道寒如灰不欺齋中一尊酒兄乎此意差耐久真情往往到僮僕何況親知與朋友君不見湯脫胡桃一語失此是迂翁年少日陳兄再拜吾事畢兩宋名賢小集卷二百六十四
