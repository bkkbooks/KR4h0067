body:
  text: 兩宋名賢小集卷十五宋陳思編元陳世隆補寇萊公集荆南秋望西風吹户牖獨自客荆蠻積水浮秋漢微陽淡逺山蟬稀疏葉盡雨歇片雲間何日忘簮紱深居石室間江上送别浪疊春江逺樹微落花風雨共凄凄愁人此際腸須斷况是登臨更送歸送人往嶺表炎光君此去旅恨杳何窮海樹瘴煙黑蠻村山路中秋日栁衰蟬噪寒煙沒地迥山遙暮雨收宛是昔年秋氣味只添多病與離愁留題洛北羅漢閣地髙閣迥宜間望望盡雲山首懶回林下野僧應笑我半年旌斾四曽來判都省懷感昔為學士掌三銓屈指年光三十年秋雨滴階桐已老白頭重到倍依然余手植桐樹在省有朽者輦下春日雨餘宫闕麗春隂三月花光照上林誰倚青樓望歸騎日斜南陌栁煙深南宫齋宿靜思陜城東閣竹南宫向夕景彌清風竹蕭然動逺情憶到陜城東閣伴拂忩敲砌送寒聲途次方城方城舊路四曽過此度偏饒悵望多獨倚客亭思逺事南陽何異夢南柯經栁州永興驛昔擁雙旌在斗城今朝孤館語同名天遙秦樹無因見極目空饒悵望情臨海驛夏日嶺外炎蒸當盛暑雨餘新館覺微涼最憐夏木青隂合時有鶯聲似故鄉海康西館有懷風露凄清西館靜悄然懷舊一長歎海雲銷盡金波冷半夜無人獨倚欄長安春日淡淡春雲薄似羅灞橋楊栁拂煙波夕陽樓上山重疊未抵愁春一倍多病中書多病將經嵗逢迎故不能書惟看藥録客只待醫僧壯志銷如雪幽懷冷似氷郡齋風雨後無睡對寒燈長安春書務間公府都無事騎吏前驅引馬行雨霽晚街官栁色日長春寺講鐘聲雲山已有終南秀泉石猶思洛下清聞道曲江新水滿欲攜歌管出重城宫詞長門秋夜雨忩下滴寒聲悔不先辭輦應無别恨生栁絲翠最宜經宿雨絮飛爭忍逐香塵簾垂獨院無人處一樹風搖日午春杜陵燕有情還至花無主亂開杜陵人不見夜月自徘徊左馮寺樓間望間思至道年中事獨倚左馮城外樓目斷平臯人不見暮天無際水悠悠偶書往事都如夢流年只斷魂不堪春盡日細雨欲黃昏途次鄧州南陽西去見遺基駐馬平郊逺樹微自笑平生無所著不如山鳥解思歸春雨漠漠霏霏著栁條輕寒爭信杏花嬌江南二月如煙細誰正春愁在麗譙感舊常思密勿待甘泉丹地翺翔獨少年重到文昌倍惆悵秋風霜鬢共蕭然途次三絶秋風故關路蟬噪日斜時有客驅征馬茫茫天一涯大澤荒草濶行人心慘悽邉雲時斷續流水自東西沙闊戍樓迥風髙邉日清遲遲驅匹馬何處問歸程冬日偶成正是旅愁悲逺宦况逢邉塞向殘年輪蹄影絶冬深路鳥雀聲稀雪後天探騎經旬無使客戍樓終日有烽煙病來無復拈樽酒獨自虛忩盡日眠九日郡公出逰郊外余方卧郡齋聽水因記一絶呈諸官菊老東籬人病酒西風黃葉滿荒田不知今日登髙興何似虛堂聽水眠春日偶成栁岸花塘慵獨賞閉門春盡阻間逰少年多故心先老却被人疑似白頭送溫尚書入洛蕭蕭紅葉馬前飛又送王孫晝錦歸却到舊逰應悵望故溪水蘚滿魚磯小韓店昔從鄴下逰梁苑孤店曽經十數回嵗月暗移人事改白頭重到小韓來虛堂虛堂寂寂草蟲鳴欹枕難忘是舊情斜月半軒疏樹影夜深風露更凄清憶樊川間思舊逰都似夢别來秦樹又西東髙秋最憶樊川景稻穗初黃桕葉紅東忩徙倚東忩夜未明悄然幽館獨凝情燈搖古壁秋蟲怨露下疏林宿鶴驚道在任從時態薄年加潛覺睡魂輕待酬北闕君恩了歸聽水泉落石聲九日不飲雲淡長空日欲斜水邉衰栁噪寒鴉病來不飲空凄感獨繞東籬詠菊花和人春莫流年賦分長多感盡日長思立短亭猶謝海棠花始發似留春色向凋零又昔曽過洛浦遺恨寫蒼苔往事詩空在春深我獨來早行嚴鐘將報曙逰子己登途野火時明滅殘星似有無兩宋名賢小集卷十五
