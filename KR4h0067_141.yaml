body:
  text: 兩宋名賢小集卷一百四十一宋陳思編元陳世隆補環碧亭詩集沈晦字元用錢塘人舉宣和狀元御試䇿題舉子不能條對晦精通象數一揮千言祐陵于聞喜宴上以御詩寵之除著作郎金人攻汴從肅王出質後得還為給事中髙宗將召為中書舍人有論其布衣時事帝曰頃在金營見其慷慨士人細行豈足為終身纍耶然卒出知平江乞以建康太平鎮江池鄂五郡兵連衡守江與韓世忠掎角金必不敢渡召募敢戰練習期年京口可成強藩趙鼎稱其激昻卒不果用進徽猷閣直閣學士終知鄆州題獨秀山老鶴下遙天昻昻在林表霜毛臨野人逸氣秋天杳矯矯顔始安不受冠帶繞清真自嵇阮一醉萬事了讀書空谷中生芻白駒皎長哦吾君詠極目送飛鳥竹溪寒流穿清閟支徑入翠微山深古木合林靜珍禽飛居人本避世遊客亦忘機歸路晚煙暝新月照柴扉遊松陽百仞山山頭白雲如擘絮竹雞無聲鳩喚婦團團朝日在林梢寒日梨花溪口路一峰獨秀橫溪隂青林倒影千丈深上有白龍蟄幽洞嵗旱往往能為霖如今寂寞空山裏古屋荒壇冷紅紫會看前度種花人他年來作巢居子竹􅬃嶺九月亂山中﨑嶇處處同溪流因雨漲木葉著霜紅人迹千巖絶松聲萬壑空尋幽自可問不復歎途窮松陽上方山居五首月斜樹影穿窗入雨過山泉繞舍鳴野寺中宵人不睡蒲團布衲悟無生山中寒早野隂薄慘慘黃昏欲雨時市逺無人與沽酒地爐松火自燒梨天畔羣峰一草亭半溪煙雨花冥冥老翁投老得此景日與溪山同醉醒此生真與世相忘投老生涯寄上方洗足關門枕書睡連山松檜雨浪浪學道空山水月深丹成初試馬蹄金猶餘一勺丹泉水洗盡人間名利心兩宋名賢小集卷一百四十一
