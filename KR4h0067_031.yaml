body:
  text: 兩宋名賢小集卷三十一宋陳思編元陳世隆補竹友集謝薖字幼槃自號竹友臨川人與兄無逸並以詩文稱時號二謝吕本中嘗云無逸詩似康樂幼槃詩似玄暉蓋未敢有所優劣也賦陳虛中振芳堂青腰按節臨天關幻成圭璧驚人寰一朝忽起枯稿想墮作人間氷雪顔國香端擬避清絶鳯車安得窺幽間雪中長疑肌起粟挽住直恐乘風還風流别乘似何遜哦詩興健排江山華堂燒燈呼客醉况引玉頰依雕闌廣平題賦工婉媚杜陵索句愁飛翻小人徑欲悟香寂何當步繞橫斜間雙蓮閣水芝凝露披芳塘淺粧濃畫爭煌煌其間艷異不世出連芳並蒂知何祥有如一座兩殊色盈盈植立漢昭陽九回沉水不須沐風梳露洗皆生香公如瑤林映紅粉粲然一笑傾澄觴故開華閣挂銀榜大篇金薤垂琳琅吾聞草木正瑞世萐莆扇暑芝生房須煩丹青顧陸手貌取絶艷歸明光三益齋元龍湖海豪蓋代聲籍籍只今觀耳孫才皆萬夫敵叔兮美無度伯也古遺直當年種玉翁什襲裹雙璧期公垂天雲佐郡試戢翼尚聞柴桑徑引領望三益嘗聞築燕臺千里走樂劇市骨捐千金廄乘盡虎迹公乃真好事屣履見逢掖定知子輿輩一笑皆莫逆顔魯公祠堂上皇御宇無長䇿牧羊奴子孤恩澤銀莬分印屬兒曹二十餘州齊陷賊常山死守平原拒公家兄弟聲名白平原白首立班行忠義凛凛真嚴霜厯事四朝惟一節當年舌舐中丞血豈知丞相面如藍貌雖夷易心巉巖老臣何罪死虎口到今誰為祛其銜臨風志士長悲吒矧瞻遺像嚴祠下未能立草迎送詞一奠椒漿淚盈把十八學士寫真圖虬髯少年龍鳯姿手提一劍平九維瀛洲學士十八輩如雕虎嘯清風隨到今丰姿傅粉繪皎如琪木恭瓊枝秦王功髙蓋天下脫略世故容小疵數公不語意有在敬宗流輩曽何知倘收王魏文學館事如辰嬴當早諫美哉貞觀猶有憾獨向衆像一長嘆靜寄齋觀文忠公墨迹董何呼我顛倒裳杖藜階西過王郎郎君好事初舉觴平頭奴子舁兩囊開視文書浩搶攘其間粳秕煩播揚忽驚墨妙筵有光問誰所書曰歐陽而我盥手方取將覽之三過神色揚反嗟從來見未嘗字體遒媚筆意剛公為文章軋子長立朝義氣凛秋霜借如春蚓縈行行亦當珍之十襲藏况公字畫乃如此銀鈎金繩粲繭紙公嘗臨池墨池水尚言如船逆風使後來誰評新麗體出公一頭子蘇子與諸友汲同樂泉烹黃蘗新芽尋山擬三餐放箸欣一飽汲泉泣銅瓶落磑碎鷹爪長為山中遊頗與世俗拗矧此好古胸茗碗得搜攪風生覺泠泠袪滯亦稍稍夜深可無睡澄潭數參昴讀吕居仁詩吾宗宣城守詩壓顔鮑輩其間警拔句江練與霞綺居仁相家子斂退若寒士學道期日損哦詩亦能事自言得活法尚恐宣城未今晨開草堂書帙亂無次探囊得君詩疾讀過三四淺詩如蜜甜中邉本無二好詩初無竒把玩久彌麗有如菴摩勒苦盡得甘味敖侯南州傑論文極根柢讀君詩卷終曰此有見地期君髙無上二謝以平視要當掣鯨魚豈但看翡翠王坦夫靜寄齋狙猴在深山騰踔不少停大龜藏神屋縮首都無營冥觀靜躁異洞見萬物情吾聞子王子總角遊帝城歸來鬢猶緑閉關慕淵明曲肱北窗下風聲肅泠泠夢覺忽驚起猶疑車轂鳴齋居屏萬慮乃以靜寄名是中得其趣君門可長扄倘知定能應子冠猶可纓鏡似靜故明水以靜故平兹言置座右可配崔瑗銘示何之忱往年君别去上馬愁凜冽今年見君面揮汗驚執熱吾曺雪點鬢忽忽值晚莭云何會心侣乃作如許别昨朝聞扣門梳髮不暇結開門問無恙欲語聲屢咽君家嬌小女可念真玉雪朝嬉繞君傍忽作泡幻滅念我溪堂老誰能續此絶嗟哉溪澗毛瑣細不容擷相逢顔未開苦語心已折吾人要解事視世一蟻垤共將煩惱緣一付廣長舌君歸數過我不厭酒屢設人生浪自苦豈不愧前哲哭董彥孚川流日夜去逝者乃如此平時所知人強半今為鬼頃者哭豫兄淚積垢未洗寧知少日間俄又哭董子憶昨招君談時維六月朏君方以病告一卧不復起啓手無别言慟哭長已矣初君在童丱警敏無與比讀書五行下大父嘗竊喜謂當寄門户竟以韋布死死生事亦大誰能獨免耳願沾甘露味倘悟無生理嵗將除因誦前賢粲字韻詩慨然有感次其韻請彥光同賦蓋豫與彥光皆年三十九矣舂糧適百里九十居其半駸駸入老境競起末路歎在世無他能聊以滑稽玩所嗟金石交契闊或星散詩憶西堂語酒藉南鄰伴共為終年醉莫歌何時旦文書漫遮眼插架復盈案四愁不堪擬九歌僅能亂發春只數日故態期頮盥寧知性本慵矧復肉亦緩人猶樂新故事止仍舊貫酸寒益生窮斂退韓子懦惜哉連城珍不變三日炭玉人可見求何暇定舍館退藏亟聞道飲水知冷暖更當崇明德不愧三英粲復用前韻示內嘗聞藁砧詞破鏡喻月半為期望夫還顧影興婦歎乃知同室處一笑日可玩所悲孩抱中聚沫何易散嘹然惟一雛單棲苦無伴撫枕中夜吁不寐常達旦藜羮具一杯日舉夫隨案還勝在板屋秖使心曲亂小鬟雖稿項聊可奉櫛盥每觀績麻手捷急真不緩娉婷或階禍今古同一貫頗知食薇清凛凛可立懦仍甘作詩窮烏銀似喻炭行看春日暄婦事勤繭館所求亦不奢勿遣兒號暖布衾幸無恙不换角枕粲集菴摩勒園觀李伯時畫陽關圖以不能捨餘習偶被世人知為韻得人字賦六言摩詰句中有眼龍眠筆下通神佳篇與畫張本短紙為詩寫真渭城偶落吾手小圃傳觀衆賔坐上宴如居士暗中摸索離人次韻董彥速送珍上座還漳江阿師身小膽能大文字曽追權可遊珍云曽從權可二詩僧也尋山紅葉半旬雨過我黃花三徑秋隨處龎公雖有偈它年支遁恐難酬經行若箇門風是聞説漳江似趙州招李成德妙年英偉定楩柟老夫如樗百不堪黍飯莫孤元伯約山夫豈有德公談棊無多算愧三北詩要重論窺二南只恐尋芳嗟較晚夜來風蕊落毿毿採金櫻子三月花如簷蔔香霜中採實似金黃煎成風味亦不淺潤色猶煩顧建康讀何易于傳吏皆愁死自焚詔農正勤耕身挽船墨綬紛紛滿天下不知誰拍此渠肩讀嚴子陵祠堂記羊裘不見釣臺傾山到臺邉分外青天上故人新黼黻身前萬事一笭箵章侯筆法遍秦相范子文章原易經圖畫名臣久磨滅此碑千古粲繁星觀漁二首腹腴端可飽新歡栁貫霜鱗照眼寒莫惜寶刀煩玉腕要看飛雪下金盤活我波間雙鯉魚待傳千里故人書嬌娥莫道留君掃怕捲珠簾總不如潘邠老嘗作詩云滿城風雨近重陽邠老亡後無逸兄用此句足成四篇今兹重陽不數日風雨不止凄然有懷作二絶句念泉下二人不再作不覺流涕覆面也地下修文兩玉人清詩傳世墨猶新却因風雨重陽近獨立蒼茫淚一巾阿兄溫潤玉介道我友淡薄朱絲絃只疑蟬蛻遊人世醉插茱茰若箇邉隱居清時甘小隱卜築在山阿家有傳蠶室機如踏浪婆間看醉貓畫羞作扣牛歌不出又三月柴門生薜蘿秋日登擬峴臺二首步上溪邉百尺臺斬新秋色正傷懷千屏翳繞碧雲合一字傾欹鴻鴈來徘徊欣與賞心同讀遍碑詞字字工共歎黃壚封白壁一時悲淚灑秋風秋暑秋暑不可奈秋風殊未來何時疏畫扇無處覔涼臺誰謂月離畢空驚山殷雷愁聞老農語南畝半黃埃寄汪信民二首泮水傳經老蓬山佐箸才宦遊思引去祿養可歸來要路眼誰白浮雲心自灰少年馬何駛君馬獨虺隤繫纜苻離日君行殊未歸寄書問亳社有夢向江西不見揮犀柄頓驚響馬蹄殷勤具雞黍多謝德公妻喜董彥速自仙嵓歸鉢囊髙挂同僧夏逺寄嵓間一把茅地僻狙猴長作伴食貧蕨筍不充庖瘦藤拄下萬峰頂野鶴來歸千嵗巢檢點篋中詩幾首蒼頭時遣為君抄莫莫堂新竹僻寂漏茅屋蕭梢新竹枝徑迷人不到蔭密鳥還知緑色匆匆換薰風細細吹即看柯葉老不受嵗寒欺夏夜對月掃月追涼清夜分是間風露别乾坤山林繚繞地多籟雲漢昭回天不言平野極瞻南紀濶稀星遙拱北辰尊時平萬里無兵革靜愛雞鳴犬吠村煎罌粟湯二首萬粒勻圓剖罌子作湯如蜜味尤宜中年強飯却丹石安用咄嗟成淖麋松黃浮碗色蒸栗初味餘甘如苦荼粉粟為湯兩竒絶甚甘純白勝醍醐問劉世基疾君如寒涕懶瓚師如何久苦造化兒清漳嬰疾古所歎淋雨裹飯今其誰探囊苦乏萬金藥厯眼疇為三世醫他年上疏恐不免細君莫念眠牛衣蔡師直畫山水研屏二首畫翁元勝斫輪扁喻子丹青如有神平逺還堪助詩思故疑摩詰是前身淡墨江山作小屏碧紗煙裏護寒泓蟾蜍寫盡看倒影身在山隂佳處行和李智伯病中書事四首多病過嗟蒲栁弱故交聞似曙星疏逢人休問金箆術殺簡宜翻石室書訓釋雖工非世好風流未減已形枯固知商也真無罪豈謂穹穹不可呼應知露肘貧堪忍只有哦詩興未疏莫遣木蘭當户織須煩阿買八分書老來頓驚詩筆退愁生惟怕酒腸枯尊前學得新翻曲早晚揮杯幸見呼兩宋名賢小集卷三十一
