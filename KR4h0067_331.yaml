body:
  text: 兩宋名賢小集巻三百三十一宋陳思編元陳世隆補東齋小集陳鑒之字剛父初名璟三山人嘉定時游京師與倪守齋善守齋官新安鑒之偕焉集中喜雨歌玉湖書院諸詩俱為守齋而作也有東齋小集一巻送鄭嚴州四首之悌諸賢適江海梧竹孤鳳唫願言正王度祈招嗣清音亦為膠西董反慰及物心未可賦柏舟天眷宗社深父老迎使君舟楫桐江波那知使君心一片煙雨蓑杖藜對客星清風雙嵯峨沙鷗公故人應為小婆娑嚴山少平田嚴俗稀惰民書生坐黄堂肯詫硎刃新定以清淨化坐嘯物自春緑野人荷鉏使君聊岸中善端誰獨無所化有蘭鮑時客拜牀下孺子似可教山川頓脩阻心折東去棹徘徊隄柳春帆腹風欲飽遣興踏遍苕谿石梅花又滿林山川春入望宇宙月知心一紀别鄉井八年無雁音危巢老松頂日暮有歸禽會稽秋日觀山荒塍間流水蠧葉風颼颼前山與幽人亭亭共清秋逺近日明晦隠見雲去留木末一叟歸犬鳴茅舍幽憶昔典午東劍佩森名流勝地慰逺懐兹焉久綢繆漁磯與樵徑今有斯人不池石老苔髪空餘蠃蚌游世有古今異郢歌聊自酬醉眼時摩挲此山即前脩過吳江垂虹四年别淼淼來夢境今晨整芒屨栁風吹鬢影春光徹重淵蛟困渌波靜逺帆有無處小立為徐領浩歌翁自得白髪亂垂頸一室世誰如三萬六千頃平生卜隣意此際味差永翁肯平分與吾其辦漁艇暮登蓬萊閣危䦨散湮鬱已暮亦登臨鼓角孤城月山川萬古心鸛栖松霧重鷗卧渚煙深客子終何托婆娑且醉吟秋晚痩盡芙蓉菊又殘客游懐抱更登山秋光老矣歸何處只在愁人雙鬢間晚登京口倅㕔富覽二首窮途逢偉觀小閣江萬里薄暮岸幅巾寒煙四山起天河注平淮斗柄卧蘆葦欲返還少留燈青客船尾孫劉昔虎視鐵騎如風雷白水列蒼嶂今馬侑予杯功名詫一時空雲暫崔嵬衲子真英雄一龕老巖隈古詩四首奉寄陳宗之兼簡敖臞翁雌雄烏一色烈焰玉石分子桑十日雨英概君摩雲塵尾失羇思襟裾蘭茝芬是豈如蟨驉書圃同鉏雲君隠萬人海嘯咏足勝流我墮寂寞濵嵌巖一笻秋蟠鬱向誰吐天圍蘆荻洲劈箭客帆去何日回我舟甘㫖娛母顔雍雍春滿室咿啞索梨棗諸兒事遶膝波明再茁桐露滌清吟筆人生如此足富貴刀頭蜜亭亭㑹山閣四面秋澄鮮盤礴一代英披衣俯飛鳶邇來幾星聚清尊壓雲煙九轉得青訣分惠母獨仙西湖晚望過雨長隄葱翠濕小橋人靜支笻立一縷竿頭顫霜鯽風動青蒲見蓑笠京口江閣和友人韻良辰仍我輩斗酒大江邊小閣納萬里一帆來九天世塵黄鵠外詩興白鷗前地勝吾衰矣長懐李謫仙題鄭承事所作蕙蘭三首蘭如君子蕙如士此評我得之涪翁有餘不足姑勿論畢竟清幽氣類同托迹不辭嚴谷深異于蕭艾亦何心清風披拂自多事斜日澹雲香滿林鄭君欲與蘭寫真心神暗與蘭俱春詩家三昧正如此境融意㑹今何人晚凉湖邊放步暑氣湖山薄晚風巾袂凉蟬鳴便栁䕃鷺立領荷香大舸鼓聲逺小軒茶味長獨游元更好細細踏斜陽有感淋雨何人記採桑朱門車馬漲塵黄百年友誼須英概晝虎何妨效季良月下見桂花欣然㑹心賦二十八字萬卉千葩春事足一巖桂自壯秋光清泠風露月侵午天上人間相對香同劉叔泰放步湖邊入靈芝寺坐依光良久叔春誦坡仙好把西湖比西子之句予因賦古風一首劉郎喚我出勝處意所便輕寒栁桃風濃澹杉檜煙僧廬自生香步遶古佛前依光偶不扃坐數禽聮翩平林度清磬遥隄簇歸船湖山露真態鷗㸃溶溶天形容幾吟筆剛道妝抺妍莫作西子者正如姑射仙相知喜值予微笑生清漣探梅驢蹇飇寒獵帽羣吟肩山聳酒微醺彎彎竹徑霏霏雪小小溪橋澹澹雲忽邂逅時真得侣向空濛處細飄芬回天力量知誰似笑挽春來首策勲再到京口問訊金焦亡恙否雙鼇依舊據寒流墖邊浪戰嵌巖石木末雲扶縹緲樓楓葉蓼花新醉雨山容容鬢兩添秋海天一鏡舟如豆忘却塵緇季子裘與客夜飲蠟燭有花客請賦之圓蒲促坐話情真蠟炬能花似有神畢竟蜂鬚膏馥在酒邊依舊十分春蔣實齋出示孟浩然畫像因賦二絶吟鞭遥指鹿門歸水色山光件件詩縮項鯿魚元自好當年應悔識王維誦詩縱不忤龍顔榮貴無過是好官未必一僮隨痩馬千年傳得畫圖看送方粹仲適㑹稽正好鑪亭語夜分朔風征帽浙江濆天低雁帶參差樹山逺舟横黯澹雲龜解不妨時換酒鯨呿元自妙為文千巖萬壑心如水二尺檠邊剰著勲到三聖廟坐池亭久之記以四十字倦踏軟塵陌琳宫取次行紅桃窺瀲灎翠栁立虚明眼底得詩料耳根猶市聲黄冠邀啜茗猶有舊交情同潘孔時飲惣宜園孔時出寳晉數帖呼道人吹簫次日有詩予用韻荅之六橋秋新宜醉吟舉杯共聽巖鶴音危亭三面立老竹寳晉數帖清人心凉蟬不敢喧夕曛洞簫聲繞山腰雲揺揺歸艇水紋裂山紫天青河漢白想君獨立對空濶一鷺毛寒藕花月包家山和潘孔時危䦨納納萬里天此景不作西子妍荒蹊斗折喬木末小亭棊布層崖巔陽侯作意娛我醉潮頭百尺來樽前游蜂低迴殢花露一鳥急去拖林煙年來祇可作橘隠四人聊學商山仙送陳仁叔之越生世可無友吾友得仁叔行已嚴尺度色夷氣清穆蠅頭觀世態塵尾露心曲大江渺愁人風欲飽帆腹重陽兩日是不共一杯菊吾儕跡浮萍同是客京轂作計俱出此正爾未免俗倘有廩可指一笑如魯肅寒窓共短檠何用戒征軸所以窮杜陵恨欠突兀屋波寒淨沙石露重老林木莫言衣帶水後㑹殊未卜越山君舊游我亦曽寄目邇來平安否細與問脩竹寄題長溪楊恥齋梅樓樓乃其先世讀書之所乃翁愛書書滿樓萬軸插架堪汗牛乃翁愛梅梅遶樓千年老幹如蒼虯梅䕶羣書俗塵絶書對梅梢滋味别有時掩巻靜倚䦨簷角一枝擎澹月雁行編簡相從久筆硯收功竟無負後登進士第右科兒孫登樓凜生敬謂此梅花乃先友一新丹艧煥枅栱黄巻依然對姬孔汲泉不是灌梅花培養君家讀書種袍香青紫雲路同盛事何翅繼乃翁後來應有跨竈者百花頭上文正公吾知乃翁好梅意不獨區區為名第霜飇天地慘無色誰得東皇第一義惟梅氣稟獨超卓首送春風入書幄對之心地悟理學此是天民尹先覺春晚野步容易老春工扶藜趂好風蛙跳蒲細細燕没絮濛濛沽酒爾可醉有懐誰與同長松古鬚鬛無語對繁紅客新安賦喜雨歌呈守齋倪使君艮田正要雨肥緑火傘張空驅日轂枝頭忽作少女風轉眼排檐萬銀竹為新安民殊可憐挿空亂巘無多田雨纔終日水半壁方晴又望霓横天是邦若要宜稼穡好似嬰兒調乳食祗今田甫渴甘澍賢侯憂民見顔色鼓聲坎坎神來臨不歆牲酒歆侯心土神汪王甚靈使君禱之即雨睡龍蘇醒聽約束挐攫雲霧層厓隂澗泉將涸兮亂流嘉頴欲槁兮光浮田翁戴笠兒跨牛欣欣相對歌賢侯爭言一雨神所賜非侯何以䝉神休天惠賢侯福吾土長是五日一風兮十日一雨守齋和張倅古巖詩予用韻賦三絶呈守齋天然石屋兩三僧趺坐寒雲几上生想見瓦鑪煙斷處一函經對萬松清貳車林下喜逢僧眼底千峯逸興生五馬未游心已到吟牋零亂岫雲清澹泊賢侯似衲僧功深心地棗梨生畫堂歌舞聊娛客客退依然禪榻清題問政山予方外兄德誨為新安太守于郡之東山築屋以居方外號為問政山房憑軾邦君侈盡熊却來問政翠厓翁祇應兄念真元子不是堂無齊葢公千載棣華垂盛事兩叢慈竹亦清風跨鸞時過宣平老明月簫聲在半空守齋示予游問政山和陳廣文詩予用韻呈守齋小隊名山訪古歸雪雲石解聽招麾瓊瑶千嶂插空濶珠璧一詩爭崛竒興逸聊兹游赤石民安何待化潢池妓圍如畫心如水鬒髪從渠映玉碑夏夜鵲影翻髙樹螢光出淺莎牆低天宇濶樓小月明多清吹徐徐至微雲緩緩過欲談無與共黙坐養天和題陳景説詩藳後今人宗晚唐琢句亦清好碧海掣長鯨君慕杜陵老月明孤嶼雲一鶴唳清夜和之以君詩竹牖寒燈下倚馬揮萬言跨驢哦一字遲速不須論紉雲看竒思和守齋户部家居書懐抽身龍尾外一壑本來心書巻竹隂潤筆牀花氣侵耿光増魏笏雅趣寓陶琴隠几時捜句忘言兀似瘖同倪元公善之納凉壽芳沿堦草軟翠流長境靜蒲荷覺更香清坐小亭叢竹近暫停團扇受風凉和友人題唐明皇楊太真對奕圖風流陣退却圍棊心醉妖妍落子遲還記行兵南詔否輸贏應不到雙眉京口甘露寺登眺吹帽海風鴉背起馮夷知我酒微醺樓臺氣壓金焦浪鐘鼓聲飛淮浙雲戈甲虎爭餘塊石榛蕪鼪嘯幾斜曛山僧不管興亡事清坐閒披貝葉文陪守齋至玉湖書院作天垂大溪碧近樹齊逺山水氣涵野色縹緲亭數間維昔文節公孤標凜羣姦飄然兩屐齒雲岩遍躋攀此地足佳致差不逺市闤壽峯文節次子顧而喜築屋娛親顔吳興富臺樹往往攜歌鬟公獨抱書來小舟破潺湲花澹水紋麗烏啼人意閒讀易發妙藴不惟評馬班公有易訓馬班異辭著述五百巻星芒照人寰天街幾繡鞍蹀躞趨豹闗河來砥柱立一老菰蒲灣守齋文節第四子今右曹郎中領客游秋風韻枯菅我誦壁間文徙倚蘚石斑德人不可見月白漁舟還題嚴子陵釣臺渭濵一叟髪垂素西伯與之無雅故幡然為捨釣魚竿八極風雲生指顧先生少與文叔游眼看日角與炎劉胡為掉頭不肯住垂綸依舊披羊裘周文虚已師賢哲光武規模欠宏濶三公清坐臺閣尊先生回首桐江月桐江月色無古今白波蒼嶂幽人心題村學圖田父龍鍾雪色髯送兒來學尚腰鎌先生莫厭村醪薄醴酒雖醲有楚鉗畢履和惠端硯余以大歙硯報之佐以一詩履和惠端硯玉質馬肝色我有大硯卧蠶紋元是新安龍尾石持以答佳貺聊爾見此心極知不是雙南金未足報君緑綺琴我得履和硯清潤如履和天然粹德非琢磨秋江印月平不波匣上有秋月澄輝四字君得剛甫硯朴鈍若剛甫不能輕捷隨人後黙黙寒窓守愚魯端硯入手喜有餘展開古帖聊學書大硯知君不負渠墨池飛出北溟魚畢善作大字兩宋名賢小集巻三百三十一
