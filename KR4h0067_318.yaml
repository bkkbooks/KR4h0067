body:
  text: 兩宋名賢小集卷三百十八宋陳思編元陳世隆補靜佳乙稿庚戌壽意一先生江涵秋水碧潭潭飲馬單于不敢南宥密老臣功第一緝熙天子歲登三身扶紫極星辰在手拆黃封雨露甘見説年來淮尾漲漢庭可要百曹參反招隱木末徑微微誰敲白板扉緩行松葉滑小摘藥苗稀山色自今古塵寰多是非昂昂千歲鶴便肯傍人飛太極圖動靜無端畫一圈分明劈破又渾全日光漏得先天意鑽入書忩箇箇圓觀化看見青蟲作蝶時不知蝶是此身非牀頭為有南華卷午枕酣來忽夢飛蛬一蛬何唧唧吟落兒童心只在竹籬外篝燈無處尋春晚有感坐對吳山酒間同越客吟月明人渡淺花暗鳥啼深往事空流水還丹未化金不堪春又晚惆悵百年心送僧蘋洲遊醉李師今遊醉李自刺釣船篙地説三吳勝人夸二陸豪草黃工女績波白課丁熬近海寒應早霜毛怯剃刀有歎與老本無期相尋天一涯履承雙足繭帽裹半頭絲路近行猶歇鄉遙夢豈知酒酣增意氣忽憶少年時子規自身歸未得却勸别人歸思婦心中事征夫淚滿衣蜀天知近遠江樹間稠稀幸自安雙翼誰教不奮飛老將不把雕刀賣曾隨夜斫營老年猶善飯壯日想能兵上馬身仍健看鴻眼更明戰多人不信枉指箭瘢呈登眺破帽任風吹天知髮已絲大江留禹迹老樹見秦時北際山如礪南溟水似池夜涼無夢到久矣歎吾衰梨山廟無處著詩名梨山萬古青人間留此像天上作何星祝史祠神醉騷人謁夢醒當時青紫楦曾有許精靈惜花留春春不住春去落花隨枉自收殘片何堪綴舊枝輪蹄前日約蜂蝶一年期代謝由來事誰能作許悲桃源官罷藝居以唐詩拙作贈别自作還相送唐詩結伴來歸裝攜此重笑口為君開蓮上巢難穩桃邊艇却回空餘吟卷在沙鳥莫驚猜元日堂上聚周親相看又一春吾年方覺老童子儼成人婪尾屠蘇酒從頭鬱壘神何須千歲上即此是新陳昭慶寺幽尋得勝趣城市幾人能古桞深中磬長廊盡處燈畫龍聽説法塑佛看齋僧别寺經行遍兹遊昔未曾苕溪維舟古祠下野飯就魚羮坐聽篙人説行逢牽路平居民難問姓溪鴨自呼名天目無由到沿洄更幾程雪中僧虛舟來雪中聞犬吠清卧起來遲開户千山白逢僧一個緇言從風絮裏憶得雨花時寒舍無秪待煎茶且説詩湖蕩雙橈入天影野葑緑全交魚唼垂絲桞鷗眠折葉茭行人沿岸曲落日挂林梢歸去嚴城隔僧門尚可敲六和塔三百有餘年潮頭不敢顛孤尖標白浪層級上青天鈴隔山僧唄燈通海客船老來登眺眼不道步難前題邱方仲月林阿姊種婆娑秋風奈若何人間千樹少天上一枝多安得仙槎客攜將玉斧柯和根都斫却還我舊山河贈日者烏兔走雙丸誰將手控摶短長三萬日好醜百千般數遠談何易天高問却難送君尋富貴我命不中看旅館僕行方請息旅館復相招小市三家聚前村五里遙茅柴侵熟飲松葉帶生燒猶有斜陽在行吟忽斷橋嚴衢道中草白三丫路苔青五里牌長年車馬客幾兩利名鞋斗糴隨時貴方言到處乖近山樵有主童稚拾松叉舟到梅雨暴漲夜月離于畢篙師可奈何帆穿風減半江闊雨添多側岸無牽路中流有旋渦平生柂樓底得在桞梢過對酒莫信樵人説秦時有樹存青天浮渤海白日走崑崙為有愁千斛時須酒一尊提壺亦相勸花下緑陰繁客路閨閣空相憶那知客路艱背人前去鳥迎靣逺來山夜泊孤燈悄晨裝片月彎猿聲不知處杳杳白雲間送人之武昌秋風吹落葉君作武昌遊只道從軍樂那知别路愁寒暄楚岫色日夜漢江流大閫多珠履無為彈蒯緱舊遊兩峯多少寺分日去遨遊山翠橫天目湖光浴佛頭花朝騎馬醉月夜傍船謳一被微官縛重來不自由挽藝居不得來書久那知是古人近吟丞相喜往事諫官嗔身死留名在堂空著影新平生聞笛感為此一沾巾溪寺背人沙鳥一行斜喚客桐魚幾疊撾誤向山中參白足不知頭上著烏紗煮茶煙暖浮新竹洗鉢泉香帶落花過夏功勞眠與食誰能展卷看楞伽暮春姚黃魏紫惱人看羅襪成塵俯仰間蜀魄聲乾花有血湘靈淚盡竹無斑年光冉冉趨雙鬢暮雨霏霏失四山老裏情懷天地窄莫教一日酒杯間少年遊紫陌尋芳愛馬遲一春能得幾晴時海棠露重衣全透楊桞風微帽半欹大白引浮銀鑿落小紅吹徹玉參差人生行樂須年少莫等星星滿鏡絲次韻橋亭禊事圮上還成集禊亭杉松自古草仍新彩虹卧飲流杯水白鷺飛迎入座賔俯仰已成今昔事東西更看往來人聚蚊金谷皆安在若見吾徒合主臣次庸齋先生韻贈黃隆中醒眼隆中閲逝川茅茨為屋竹為椽吟成梁父時當隱炊熟邯鄲客正眠漢土一抔無處覔白墳三尺有人憐君歸欲作千年計只合躬耕一寸田聽白雲寺清師琴古寺沈沈晝日長泠然清響發僧房昭君别去顏如玉蘇武歸來髮已霜山水無端言爾志炭冰何事置吾腸老來却愛虛簷外雨滴梧桐一味涼送李敬則之升揚江北江南一葉舟憑將往事問東流錦帆月冷瓊花夜綺閣風高玉樹秋杜牧三生開笑口劉郎五絶掉吟頭淮山眼見詩人慣高築詩壇汗漫遊次韻池上暮雨濕遍闌干欲倚休手中團扇漸知秋細聲合作簷間溜大點漂成水面漚小小竹忩醒倦鶴疏疏荷屋冷棲鷗漁翁蓑笠隨身在立到黃昏釣未收書忩夏日南風伊軋語忩扉團扇無功白日遲長恨老來方學易自從春去不吟詩蟲絲有力縈琴索蛀粉無聲點墨池偶出門前行數步石榴花過已多時贈西蜀馮道士峨眉山月照清溪中有方瞳一羽衣拄杖經行天下半丹砂乞與世人稀千年城郭空歸鶴萬里山河自落暉安得與君遊汗漫乘槎一問女星機次韻李黃州江淮偉觀檻前卷箔見晴峰夏口武昌西復東三國六朝襟帶地孤城四水鼓鼙中女墻夜送淮山月老樹秋生夢澤風君作此堂心萬里應憐世上少英雄示醫卜逢松崖我生八月十五夜清淺斜河浸月華顧兔搗殘千歲藥牽牛引動半天槎自拋蓬海傳方處曾過成都賣卜家今日相逢圓昨夢一杯松下醉流霞陳令君增誠齋三三徑為十二徑次韻四家三徑各風流今古悠悠貉一邱拍甕新篘浮臘膩繞堤老桞弄春柔日邊黃紙催人去霞外青山聽鶴留若問西疇蓑笠事合還陶令一孤舟次韻野水花朝之集睡起名園百舌嬌一年春事託今朝鞦韆庭院紅三徑舴艋池塘緑半腰苔色染青吟屐蠟花風吹暖敝裘貂主人自欠西湖債管領風光是客邀和秋房題半湖樓二首天目飛來第幾峰岑前著屋貯虛空濕雲低亞鈎闌角缺月斜窺户牖中一水東西添桞岸兩山南北欠樵風住家欲作千年計頃刻陰晴便不同四明仙客此樓居畢竟西湖壓鑑湖曾謂家童欺賀老不如沙鶴認林逋蒲根釣水知深淺桞外行人乍有無此景天公厭多取只分一半與吾徒栽松道者像手便笻杖冷腳厭芒鞋緊兩袖吹松風東岡復西嶺吳歌鴈影江潭底秋聲浦溆間吳兒歌一曲月子幾回彎草蟲便靣蝶舞蜂歌倦蜻蜓看未休誰知織婦意方夏已思秋意行橋我行且奚適興盡忽自返倒影射清漪回光在橋板塵外塵飛不到處山色入芒屨乘興一長吟回頭已忘句鴻鴻飛九天上人在平地望塵土與青雲其間能幾丈聽雪瓦溝初瑟瑟隱几坐虛白良久却無聲門前深幾尺東災東災足時雨離離半青黃田家不待穫小摘炊新香畫舫畫舫茭中出青山樹上斜浪醒孤客酒塵蓋萬人家溪村櫸桞正當官道漁舟偏繫柴門今年春水深淺看取層層岸痕雨洗山光緑淨波涵天影清空草際自浮鵝鴨桞陰分坐兒童漁翁漁翁家在何許慣宿蘆花不歸昨夜江村欲雪百錢買得蓑衣揚州金陵王氣水東流流到東淮古岸頭夜半一聲天上曲錦帆天子下揚州七夕兒女穿針夜向分樓頭月落尚爐熏憑誰為覔機邊石留取支牀卧白雲野望帝青八萬四千里更著修眉一兩尖古往今來愁得盡不教我輩送愁添題李秋堂盟鷗集相逢已恨十年遲買酒湖山一夜詩明日送春仍送客桞花風揚鬢絲絲航海地角與天倪茫茫何處期星回析木次日挂扶桑枝沈石尋孤嶼浮針辨四維飄然一桴意持此欲安之橋西雲淡風微日未低瘦藤扶到小橋西林花過雨相爭發谷鳥無人自在啼淮客長淮萬里秋風客獨上高樓望秋色説與南人未必聽神州只在闌干北調宜州冷官不赴瘴海南邊路淺深客愁不待嶺猿吟無人喚得涪翁起分我桄榔橄欖陰辛亥二月望祭齋宮因遊甘園山入湖光碧四圍棋枰零落葑田稀蒲芽短短鴛鴦冷惟有漁師幾網歸朝霏作雨連天濕春氣熏人到骨香四望水亭無正靣有花多處背湖光海棠陰下小徘徊屐齒深深一徑苔忽聽銅鉦花外近園丁説是主人來老眼看花興未厭不知頭上雨廉纎流鶯浪語春風恨誰拗花枝插帽簷公事相妨一半春今朝才得自由身眼中領略能多少細雨斜風便妬人曉眺鳥飛欲盡暮煙橫一笛西風萬里晴山外有山青不見微雲映出却分明次意一先生仙霞壁間韻回首仙源隔彩霞叢祠攫肉有飢鴉正元朝士重來晚不見桃花見菜花宜春臺是長沙定王子築定王米換長安土北望長安日幾回更有築臺歸未得憑高却望定王臺送李秋堂赴京口酒人客懷正賴春相與苦欲留春天不許送君一舸下南徐落花起舞流鶯語鮫人浴出扶桑繭天女染作紅雲段君從何處得錦機借與人間為樣看青杏園深暖漏長桞綿如雪撲酒缸吳姬道字未端正當罏學唱新番腔貔貅百萬張頥仰都將鐵甕盛春釀有客高談四座傾主人合坐諸侯上日邊此别各南北君頥始髭我衰白何以贈之折桞條千絲萬絲心搖搖讀黃玉溪湯婆傳君不見湯家阿泉驪山陰出入宫掖承恩深只留妃子脂粉氣不暖少陵如鐵衾又不見湯家阿池紫塞上沈香霧擁將軍帳天寒十指墮弓刀底用空言如挾纊何如韓時老湯婆冬則飲湯惟腹皤形模混沌婦女笑閉塞其兑藏天和老生門前十日雪兩腳凍皴眠不得斷無蠻素搆心兵賴有婆兮相暖熱夫人竹氏青玲瓏炎炎幾時奈秋風婆恥居下常熱中毋棄憔悴以禦冬得黃太史五字詩厥孫傳之尤滑稽霜風蕭蕭歲年晚吾喜湯婆有完傳挽周伯弜今日忽不樂散行湖水濵有懷天下士遽作夢中人醉語驚天地狂歌哭鬼神九原如可贖那不百其身贈續藝誰謂藝居死餘香解返魂六丁將不去孤子續猶存科斗三生債蟫魚再世寃向來詩作祟揮涕對人言滄浪風月我登滄浪亭復歌滄浪曲歌竟復長歌杳杳山水緑天風吹散髮山月照濯足為謝獨醒人漁家酒初熟有懷鷲山次僧芳庭韻一塔與雲齊尋僧路不迷小舟沙鳥外疏磬夕陽西古樹含雲亞春橋覆水低鷲峰飛不去夜夜子規啼栁臨水送將歸春風折贈時而今三丈樹元是手中枝鷗林魚秋江上鷗鳥來相隨蕩槳思驚起雲天碧四垂天竺分韻得芳字縹渺白雲鄉天風吹曉涼人尋水源至路入樹隂長晝靜聞晴哢春餘拾澗芳余心忽有得欲語又還忘兩宋名賢小集卷三百十八
