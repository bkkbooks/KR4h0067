body:
  text: 兩宋名賢小集卷二百六十六宋陳思編元陳世隆補露香拾藁黃大受字德容自號露香居士南豐石門人嘉定間以詩雄江西秉姿簡重言動舉止俱以禮義自持嘗遣其子載從烏州李守約學朱子之學後仕于鄞著政聲有露香拾藁春日田家三首凜寒陵熙春誰為禦其侮酸風吹積雪濃雲灑飛雨農夫荷耒耜俶載耕斥鹵為其有身纍寧免自辛苦妻兒送中飯凍凌強欲吐晚歸極困倦倒睡帶泥土朝來天光開紅紫新媚嫵南園踏青人日暮猶歌舞二月祭社時相呼過前林磨刀向豬羊穴地安釡鬵老幼相後先再拜整衣襟釃酒卜筊㺽庶知神靈歆得吉共稱好足慰今年心祭餘就廣坐不問富與貧所會雖里閭亦有連親姻持殽相遺獻聊以通殷勤共説天氣佳晴暖宜蠶春但願雨水勻秋熟還相親酒酣歸路暄桑柘影在身傾欹半人扶大笑亦大嗔勿謂濁世中而無羲皇民清明百草春家家上丘墓南鄰去年冬禍痛及翁嫗酒殽羅新阡蹙額見追慕舊時細君墳望見泪已注紙錢風飄飄世用此文具其間無紙者已無子孫故有紙與無紙百步五十步偶成髙唐作夢時宋王乃得見那知賦説夢夢外雲雨怨此賦苟不作應無列女傳蕨薇生山巔長不踰蓬蒿松柏生澗底嵗久還干霄稟質自不同托身奚必髙緑草何自來蔓延滿中庭前朝方芟夷兹視忽已盈竹間幽蘭花數回移乃成讀四皓傳白雲茫茫歌紫芝人間無路瞻龍睂太子介使招忽往髙祖問省心先知翁生商山名八極此時不出漢事危敢惜雙足惜漢鼎非私劉氏私黔黎欠呵千年橘中棊華陰墮驢者為誰老蹇行朔風狂驚岷峨流帝敕雲螭藩四州頷珠千載化老蹇一變為四鐍川鍵蠺叢簸弄幾回翻欲捲全蜀淪腥膻瞿塘下連滄海脈愁積溟漲孛鼇極臣氷呼天天不聞快斥金翅清江氛連環不解萬古鐵陽侯依舊千江月紫庭登奏尤其元西州之功不補愆清源血食天地久其於氷兮亦何有有勸清源君戒殺君曰非我意出水間守蹇數萬鬼以示之昭潭寄內人不接安書動隔年二千里外極懸懸老親強健知勤饌諸子癡頑恐費鞭幸有田園堪卒嵗使知詩禮可無錢客中亦有風流罪長伴梅花對月眠由洞庭入五田一汀紅糝蓼花天滴滴清寒曉露圓回首洞庭山半點傷心桂嶺路三千詩魂夜寄青林月漁唱聲回緑樹煙却笑陶朱不如我吾無西子與同船油口夜飲醉臥一室及覺三鼓矣秋夜新冷雨濕蟲鳴展轉不能成寐于是浩然有歸志一榻翛然著醉濃沈沈清夜大槐宫夢回作惡酒氣重枕上不眠歸興濃點滴落階添悶雨清哀繞壁訴寒蟲計行良未成端緒何處髙樓撞曉鐘沙頭秋晚霜風吹凍玉池氷留滯周南尚未行病久故園千里夢夜寒孤舍一枝燈愁緣南國歸舟影心斷黃蘆落雁聲老劍已間頭已白祇堪吟咏課歸程竹虛心懷明月徑節挺玉立豈是外春風春風無處入宿嶽陽張漕書堂雲低風轉冷黯黯起秋陰薄暮細雨過小忩寒氣侵關山千里夢骨肉十年心病意兼歸意攢睂寫萬金亷泉一泓落古寺三赤開方池懷山決瀆後爍石流金時君看此亷泉不增亦不虧炯炯玉色透燦燦金沙輝朅來臨古寺石銚行相隨呼童試春芽活火烹新奇一咽利喉吻再啜心神怡冷然清風來玉液通華池憶我心地初與水同一幾心泉本無事何必希夷齊曰泉已強名況復有是非一笑付自然貪亷吾不知寧化白水磜甲子春雪瀑從天下餘流亦建瓴雙崖秋氣逼九地殷雷聲虎穴山川險蛟延草木腥負鹺由此徑異日不堪行晚步扇小葛衣輕風清草露平水聲逢石怒煙景近山明喚犢牛回顧驚人犬倒行耨夫方到屋月已屋頭生荆州人種秧擊缶於田問以樂農者嗚呼其猶有先王之世之遺意歟鼓聲響答缶聲喧歌笑聲多日易昏尚有樂農遺意在要知此地近中原呈魯齋提刑伯散盡黃金與客休田園不為子孫謀白頭更自嫌多纍尚有瀟湘萬卷樓江行萬里圖雪山西來接海白天之所以限南北誰人胸裏著輿圖揮斥荆吳入綃墨濃濃淡淡兩岸山煙波瀰茫江面寬水空漠漠鳥飛絶漸看漸逺天漫漫客舟泝流先後去風帆飽腹如飛舞有時小艇絶波來不知何處橫江渡鍾山隱隱開金陵雨花臺前留玉京汀洲過處小孤出垂楊緑引潯陽城蘄黃紫翠互卷舒武昌樓臺半明滅周郎赤壁杳難憑洞庭寒煙濛孤月西江耿耿沙籀清三十六灣斜照明黃陵廣深楚山濶九疑削成黏天青我來展軸驚快覩恍然對面水仙府片時行盡江南天弔古何勞出門去南巡真人忘郤歸軒轅龍去渺難追咸池曲絶誰奏樂風雨啼痕滿竹枝六朝虎士工設險蹴踏滄波當揮劍血流不惜惜江流肯放飛埃過天塹濫觴曾聞蕩雍丘楫聲若為空悠悠江聲至今恨不盡枉白萬古英雄頭兩階干羽古虞后八公草木今健否長安正在碧雲邊斜日西風重回首梅川呈同舟遊仲發時中流失舟故云投晚鍾公渡急湍急流送我轉千盤羣犀戲俗江含石飢雁悲鳴櫓下灘吟骨欲投魚腹葬夢魂那許蝶身安可憐八尺奇男子不作當年跛足看遣載入閩從李守約考亭髙弟説烏洲小子何妨作逺遊問學再三勤講貫立身第一在操修機心僅可文章用邪説毋從釋老求更做程文須典實年來華藻近輕浮即事路轉欹橋曲陰陰石磴低紫藤藟碧樹紅葉繡清溪草露明侵徑秋香暗刺衣前灘水聲好欲趂釣魚磯織女蟲灝氣逼昆河佳期匝眼過草間聞織急天上想寒多燭裏頻挑錦邊頭冷枕戈終宵弄機杼奈此月明何早作星光欲沒曉光連霞暈紅浮一角天乾盡小園花上露日痕恰恰到窗前歸來近日多騷客吾衰不可追松間哦魯頌花下看唐詩好鳥山深語寒蟬日暮悲此聲長叶律新句總堪疑公安市人屋井底揀與江堤平大江壓堤來浩浩勢欲傾古堤騰長蛇獨與江爭衡積流增巨漲飄突萬馬驚油河與之合盤渦沸淜騰折旋聲洶湧吞汲翻長鯨微茫隔村岸百尺崩沙頳中流有行舟來往如飛蠅巨風推銀山性命鴻毛輕設險護東南天巧如揭繩用武莫若荆豪雄所交爭玄德欲興劉於焉深經營坐據此要湍進退窺敵情時事一厄塞拂衣開西扃至今聞西偏城治餘丘陵湯湯橫乎前何畏百萬兵善衛保其吭坐待其師崩更能用吾長談笑取其贏何者非神機用之須人英機略失所用山川無常形休兵不敢論凄咽含餘情中秋舟次沙津去年中秋月照我入桂城今年中秋月送吾到江陵桂林二千八百里城邊買船發春水瀟湘六月寒如氷洞庭湖中秋氣生峽江西來雪波急片帆帶雨煙中濕朔雁不來蘆葦秋風林淅瀝生人愁反思前年風露好月入金樽醉將倒如今飄落千萬山煙波瀰漫幾時還露香堂中千百甕玉瓶取醉風吹夢今宵弦管閙繁華燈火沙頭一萬家爭似詩翁弄江月微吟還自汲江花鬱孤臺髙日欲暝晚眺眼增明疊嶂羅雲樹雙流抱粉城低浮煙萬棟清送月三更尚約秋吟夜江聲帶雨聽病起煮藥爐邊過一春瘦骸唯與病相親雨多藥褁易生暈潤透巾紗懶拂塵枕上最宜思過眚靜中倒得養精神不辭小現維摩詰只恐今無問病人枝江九日簡周宰日車不照出郊車門外天陰雲尚粗青州未有居士供白衣知是誰家奴江山有恨橫飢眼茱菊無情對臥壺贏得間關吟苦句定無人敢喚催租公安寓館夜立觀前用載韻翛翛一古觀我到夜何其仙磬吟風殿幽人汲露池星沈螢聚水月倒懸籬四起鐘聲亂凌風欲化肌秋夜讀書青燈敞虗堂微風動衣襟兀坐耽陳編起觀星河沈古人豈可見所希見其心終然發氷歎不寐鳴牀琴梅自見梅開後相看不暫離只因愁落去不忍看繁時佳實羮堪味遺音角可期牡丹専冨貴春盡却空枝兩宋名賢小集卷二百六十六
