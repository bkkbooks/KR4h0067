body:
  text: 兩宋名賢小集卷三百七十五宋陳思編元陳世隆補彝齋集趙孟堅字子固海鹽人宋宗室也寶慶初登進士第入元隱居不仕兄子昻嘗往候之登堂良久絶不與見既去急呼童取水洗其坐處其為人孤介如此書畫亦大有名里中康節庵畫墨梅求詩因述本末以示之逃禪祖花光得其韻度之清麗節庵紹逃禪得其蕭散之布置回觀玉面而鼠鬚已見工夫較精緻雙枝倒作鹿角曲生意由來端若爾所傳正統諒未絶捨此的傳皆偽耳僧花工之工則粗夢良意到工則未女中却有鮑夫人能守師繩不輕墜可憐聞名不識面云有江西陸公濟季衡粗醜惡拙祖弊到雪篷濫觴矣所恨二王無巨法多少東鄰擬西子是中有趣豈不傳要以眼力求其旨踢鬚正七萼則三點眼名椒梢鼠尾枝分三疊墨濃淡花有正背多般蕊夫君固已悟筌蹄重説偈言吾亦贅誰家屏障得君畫更以吾詩跋其底康不領此詩又有許梅谷者仍求再賦長律濃寫花枝淡寫梢鱗皴老幹墨微焦筆頭三踢攢成瓣珠暈一圓工點椒粧綴蜂鬚擬笑靨穩拖鼠尾施長條盡吹花側風初急猶帶枝頭雪未消松竹襯時明掩映水波浮處見飄颻黃昏時候朦朧月清淺溪山長短橋閙裏相挨如有意靜中背立似無聊筆端的皪明非畫軸上縱橫不是描頓覺坐來春盎盎因思行過雨瀟瀟從頭總是湯楊法拚下工夫豈一朝王翠巖寫竹求詩古畫畫物無定形隨物賦形皆逼真其次祖述有師繩如印印泥隨前人尚疑屋下重作屋參以新意意乃足晉魏而來幾百年羲獻斷絃誰解續何况髙束李杜編江湖競賣新詩讀願君種取渭川一千畝飽飯逍遙步捫腹風晴煙雨盡入君心胸吐出毫端自森肅題水仙自欣分得櫧山色地近錢塘易買花堆案文書雖鞅掌簪瓶金玉且奢華酒邊已愛香風度燭下猶憐舞影斜礬弟梅兄來次第攙春熱閙令君家夜泊法忍寺秋泊禪扉夜清吟入興頻風生水鱗甲雲放月精神禪有機鋒祕詩無句法新舊題尋不見吹遍壁間塵題墨蘭圖六月衡湘暑氣蒸幽香一噴氷人清曽將移入浙西種一歲才華一兩莖兩宋名賢小集卷三百七十五
