body:
  text: 兩宋名賢小集卷四十九宋陳思編元陳世隆補富鄭公集富弼字彥國河南人天聖八年舉茂材異等纍擢知制誥歷同中書門下平章事封鄭國公進昭文殿大學士監修國史進司徒薨贈太尉諡文忠涵虛閣畫閣高連百雉城涵虛應不愧標名門前栁色兼旗色座上琴聲雜佩聲肯羡五湖歸范蠡未饒三徑隱淵明我來恰值初晴後山影波光分外清定州閲古堂天下十八道惟河北最重河北三十六州軍就其中又析大名府定州真定府高陽關為四路惟定州最要定為一路治所實天下要重之最知是州者兼本路兵馬都部署居則治民出則治兵非夫文武才全望傾于時者不能安疆埸屏王室也然自國初已來專以武臣帥諸路慶厯七年甘陵妖賊據城叛河北妖黨相搖以謀應卒驕將愞人心大震天子悟始議選儒臣帥四路以督諸將乃起知鄆州資政殿學士給事中昌黎韓公帥真定以遏亂萌明年春賊誅人安既而夏大雨河決商胡東北入于海河北災人復不寧流徙失業者咸四出不翅千里僵殍滿道天子恤然且虞他姦遂以公帥定定既要重天下宿兵素多屬傷殘之後官民枵困征賦逃無幾而兵不少減兵襲舊幸歉益驕以悍公夙夜裁整以威以懷兵之驕不從令者捽其首惡斬以徇略為條教餘怗怗就約不敢譁于室至有調發者逺而彌戢如公親臨已而招集逋亡四流爭還如啼孩奔父母惟恐其後至則充然各得其欲農無廢隴賦有餘粒不旁誅橫斂而上下足堙漏補罅一面完固公既擊強梗之兵又育雕瘵之民左行斧鉞右哺飲食亂者畢治亡者畢存禮法政教向之人所不得聞者今漸濡酣飫無不貫徹自是邊人革其耳目新其肝腸優為而樂從故人易治而功成速也又明年秋天子圖公之功詔加大學士公先嘗表其志幸終三年不願急易也至天子抑騎召而使即以授姑遂公請亦以慰斯人愛公之心也公惕寵處官雖無事未嘗輒自豫念兵與民之急宜無過者矧臨要重之路憂虞所繫凡是經畫不可以無法乃擇取歷代賢守良將總若干人行事創大屋以類相次繪于周壁榜之曰閲古堂蓋欲閲古之人所為而為之法也噫公雅文傑武自當視乎古人且天下方遲公入輔以致太平若其安疆埸屏王室豈庸考古而後能哉實公沖然不自有其有而歸乎古人也其懸知來者不師繪事而公是師也雖然蹈古搜善惠人警已公之意謂其至矣乎公郵問索詩因粗序所致之旨以志其始而示于後詩曰朔方之兵徑于九土尤徑而要粵惟定武兵徑在馭用則羆虎失馭而徑驕不可舉曰保曰貝閉壁連阻武爵新守束手就虜皇帝曰噫汝武曷取有敝必革以儒于撫公來帥定始以威怒有兵悍橫一用于斧連營怛之膽栗腰傴既懼而教如餔如乳以刺以射以鉦以鼓無一不若師師旅旅列城自刺靡不和附陰沴為梗降此大雨大河破泄在河之滸民被黜墊田入莽汚流離蕩析不得其所公戚曰吁豫敢寧處乃大招來乃大保聚乃營帛粟寒衣飢茹民歸而安水下孰禦強弱死生由公復慮曰義曰仁震肅春煦合和蒸天天順以序公境獨稔爰麥爰黍公俗獨樂夫耕婦杼人雖曰康公亦奚豫謂此一方民與兵具務劇任重稽古其裕人皆謂公與古為伍公文化民公武禦侮何思古人公不自許遂擇竒匠繪于堂宇列其行事指掌可數前有古人在我門户後有來者依我牆堵斯堂勿壞有堂有故堂之不存來者曷睹宏乎煥乎千載是矩題范希文手書伯夷頌墨迹夷清韓頌古皆無更得高平小楷書舊相嘉篇題卷後蘇家能事復何如睢陽五老圖休官致政老年間廟堂嘗享著袍冠調和鼎鼐施霖雨燮理陰陽佐武桓念國不忘先世烈歸鄉豈念舊廬寒我輩若從親炙授儀容如在使人看過邵堯夫先生先生自衛客西畿樂道安間絶世機再命初筵終不起獨甘窮巷寂無依貫穿百代嘗探一作窮古吟咏千篇亦造微珍重相知忽相訪醉和風雨夜深歸答鄭州祖龍圖見寄原韻坐擁雙旌甫浚郊總戎曾未屬鍵櫜千金寡妙方移疾二府交修敢憚勞處世機牙都不競攝生權柄急須操他時病起君恩報始信林泉屬我曹留守太尉相公就居為耆年之會承命賦詩時以守司徒致仕年七十九西洛古帝都衣冠走集地豈惟名利場驟為耆德會大尹吾舊相曠懷輕富貴日與退老遊臺閣并省寺豫慙最衰老亦許預其次遂欲肖儀容爛然彤繪事閩嶠訪精華鮫綃布絶藝令復崇宴衎聊以示慈惠幽居近銅駝荒敝仍湫庳塞路移君庖盈車載春醴獻酬互相趣歡處不知止商嶺有四翁晉林惟七子較我集諸賢盛衰何逺爾兹事實可矜傳之足千祀兩宋名賢小集卷四十九
