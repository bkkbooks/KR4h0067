body:
  text: 兩宋名賢小集卷六十宋陳思編元陳世隆補杏花村集唐詢字彥猷錢唐人天聖中賜進士及第除工部員外郎擢起居注知制誥出知杭蘇青三州拜翰林學士卒贈禮部侍郎有集崑山昔有人如此兹山得美名岩扃鎖積翠谷水斷餘聲喬木今無在髙臺久已傾如何嵩嶽什獨咏甫侯生華亭谷深谷彌千里松陵比合流岸平迷晝野人至競方舟日照方諸泣風迎弱荇浮平波無限逺極目漲清秋附梅堯臣和斷岸三百里瀠帶松江流深非桃花源自有漁者舟間意見飛鳥日共泛觥籌何當驂鯨去一去幾千秋柘湖世歷秦亡逺湖連大海濵柘山標觀望玉女見威神渺渺旁無地滔滔孰問津何年化魚鱉髣佛歷陽人山堂偶書在處煙雲早晚生自疑呼吸氣皆靈十年夢寐江山裏今見江山入户庭養魚池異代人亡久滮池即舊居未移當日地無復故時魚蒲藻依稀在風波浩蕩餘水濵如可問一為訪庭除附梅堯臣和來觀瑁湖水乃是陸生居春塘草幾變誰膾此中魚莫容科斗應亦有魯工餘不隨蛟龍飛神鱉未可除三女岡淑女云亡久哀丘尚著名九原誰可作千載或如生青骨何時化荒榛此地平空餘圖牒在不復啓佳城顧亭林平林標大道曾是野王居舊里風煙變荒原草樹疏湖波空上下里閈己丘墟往事將誰語凄涼六代餘陸機宅故址舊堞傳遺址悠然歷祀深人無令威至門異下邽針谷水當年溜崑山昔日隂魯堂那復見絲竹若為尋秦皇馳道秦德衰千祀江濵道不修相傳大隄在曾是翠華逰玉趾如將見金椎豈復留悵然尋舊迹蔓草蔽郊丘為杭州送客舟中山雨霏微不滿空畫船來往疾輕鴻誰知獨卧珠簾裏一榻無塵四面風寒穴泉絶頂干雲峻寒泉與穴平還同帝臺味不學隴頭聲夜雨遙源漲秋風皓氣清誰云蔗漿美絶可析朝酲附梅堯臣和山頭寒穴泉淨若鏡面平尉齒敲氷冷貯瓶微玉聲傍有野鹿迹上啼林鳥清何由一往挹况復病方酲兩宋名賢小集卷六十
