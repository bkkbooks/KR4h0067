body:
  text: 兩宋名賢小集巻三百七十宋陳思編元陳世隆補農歌續集戴昺字景明號東埜石屏之從孫嘉定己夘登第授贑州法曹參軍有東埜農歌集莫悲秋傷春非貞女悲秋非烈士時運自循環我心如止水剝固復之機榮乃悴之始未識天地妙胡為浪悲喜鷃蓬或數仭鵬圖或萬里大小何必齊䝉莊未窮理次黄叔粲茶隠倡酧之什美人隠于茶性與茶不異苦澁知餘甘淡薄見真嗜自隨世俱昏寧墮衆所棄靈雨濕山腴迅雷起龍睡野草未敢花春芽早呈瑞鬭茗須占一焙火不落二趣深同誰參雋永時自試葱薑勿容溷𤓰廬定非類標名寓𤣥思㣲吟冩清致成我君子交從彼俗定恚嚼芳憩泉石包貢免郵置遼遼玉川翁千載共風味夏肻甫曉山亭開櫺納晨光隠几挹寒翠以我胸中真㑹彼景外意孰因夜息存孰使晝梏累念慮方清明體認貴切至峩峩成九仞進進基一簣朂哉亭中人涵養玉其粹巻書意何如顔回坐忘地春日偕兄弟侍屏翁遊晉原分得外字因集句而成春雨晴亦佳適與賞心㑹初日照髙林幽泥化輕壒步屧隨春風始覺天宇大牽懐到空山逍遥白雲外青松夾路生童童狀車盖清川帶華薄隂壑生虚籟性達形迹忘傲然脱冠帶薄暮方來歸月光揺淺瀬唐李涉有山中五無可奈何詩戯用其體作秋日四章無奈秋風何怒號振林木著我井上桐一夜失寒緑莫作揺落悲妙理在觀復無奈秋月何錬魄金氣精炯炯一輪滿天地氷壺清照我方寸景表裏同光明無奈秋山何萬叠淺深碧起來樓上㸔朝爽浮几席稜稜正自髙更養靜夀徳無奈秋水何悠悠蕩輕槳上下天一碧顛倒涵萬象願從雙白鷗生涯寄浩蕩青陽梅先舒伯虞為其尊人索靜閒軒詩人心元至虚天下本無事舉世役于形擾擾誰蹔置先生自超俗涵養老逾粹妙契無名翁深造靜閒味壺中貯日月胷次納天地婆娑閲四序物物見春意林花髙下紅庭草淺深翠一笑扶瘦笻行吟散㣲醉壬子立夏日同郡博士黄次䕫遊江東太白釣臺因成古詩併呈偕行諸友翰林天酒星謫墮人間世豪氣𦕈乾坤浪迹寄湖海峩峩江祖山片石峙西澨醉狂御風來踞坐髙傲睨一絲聊戲垂意得在魚外青天畫屏句妙越無塵界至今五百年春虹絢暗彩我來訪遺蹤躡屐捫薜荔錦苔剥冰霜彷彿題字在屬時春夏交微雨弄輕霽同遊俱嘉朋笑語各傾葢雲木團晝隂松風奏天籟勝踐心已愜酣歌意彌快欲招臺上魂舉爵酹清泚今昔自殊時欣感諒一契詩成冩蒼壁存否非所記長嘯下歸舟驚湍飛送栧梳頭自歎短髪如冬霜一朝白一朝又如深秋栁槁葉迎風凋白者不冄黒短者不復牢羲娥疾馳驥乾坤虚懸瓢人生寄其間泛泛波上泡百歲一大夢倐忽已隔宵胡不適所適而乃隨滔滔富貴撇眼電榮華過耳飆木散故得壽龜靈徒自焦甘拙自安吉役智滋勞忉所以柴桑人不肻折此腰上立齋先生十首以有官居鼎鼐無地起樓臺為韻形弱能使强脉病能使壽醫和肘後方䄂手若無有緑野歸晉公洛社閒迂叟此意誰得知可以久則久羸牛指為驥鳴梟認為鸞彼欲欺一世自亂耳目官吾直不能枉吾方竟誰刓何妨寄楚澤餐菊紉秋蘭蔚蔚空明山古號仙人居神秀發虹氣瑞應真璠璵潔白外難汙堅剛中不枯勿逐䑕璞價韞匵姑藏諸支厦資寸莛涉江寄孤艇弗顧勝弗勝乃諉幸不幸舜華朝暮期蒼松歲年迥從渠寶康瓠我自有岑鼎君子如真金真金剛不改小人如浮雲瞬目多變態隨世良獨難殉道乃無悔近日崔菊坡堅卧辭鼎鼐薫蕕不同性涇渭不同趨由來區以别那使强合汙老耼守道徳韓非事刑誅二人共一傳能信千古無多金建華屋一堂容百客立齋有㕔事不覺旋馬窄僻于蕭相居隘甚晏子宅鬼神瞰髙明吉祥上虚白靈巖一片雲曽為作雨起風吹還故山松筠澹相倚秋髙霜露寒酒熱鱸魚美少寛憂世懐㣲醉有妙理否泰闗世運進退非人謀尼父雖皇皇不為無理留用則巨川楫舍則野渡舟行藏兩付之獨倚百尺樓小草有逺志埋沒同蒿萊風霜坐相欺冉冉成枯荄我公下白屋意重黄金臺儻借伯樂顧未信終駑駘雜言三首衆芳以春榮萬葉以秋肅造物持其權兒戲恣翻覆亭亭山上松蕭蕭澗邊竹超然榮肅中正色閲寒燠提壺勸我飲布穀催我耕我酒缾已罄我田草正生荷鋤理荒穢及時新雨晴秋來刈吾秫庶得兩遂情遥翮凌丹霄潜鱗縱深壑天分安所適翔泳同一樂短吟五七字薄酒三四酌浩氣與春風相從滿寥廓孤桐行孤桐結根倚崕石俯瞰清溪照虚碧枝葉扶踈朱夏寒上有翔鸞舊棲迹風霜冉冉歲月深老柯半朽蒼皮蝕其中素抱金玉聲以暗投人人不識人不識多苦心樵夫斤斧莫相尋寧教枯死倒澗壑不從㸑下求知音書初考得考雖多幸無功祗自嫌但求官速滿不道老同添卑拙翔蓬鷃艱辛上竹鮎黄花寒更好三嗅憶陶潜侍屏翁客遊雪山分得生字雪峰峰頂寺來此定詩盟山瀑分雲影松風亂雨聲眼明春樹緑心惺曉鐘清未好言歸去塵中事又生豈潛弟平逺圖卜築占寛閒修篁老樹間八窗開宇宙一室貯雲山野曠行人少天遥去鳥還悠然㑹心處妙語徹𤣥闗謝趙山臺見訪寂寞海東頭殷勤貴客舟如何經歲約祗作數宵留清玩分行篋髙吟壓小樓更須謀再㑹同醉菊花秋臘前見蘭花蘭叢纔一幹獨向臘前開托䕃偏宜竹先春不讓梅韻從幽處見香自静中來便欲紉芳佩靈均喚不回次韻屏翁詠梅芳信基花事東君思亦竒横枝踈蓓蕾半樹老丰姿心共寒霜苦香唯夜月知最憐清夢覺踈影竹窗時次韻屏翁觀梅晚寒籬落外一見一畨新喚覺羣芳夢先鍾萬古春冷香冝醉寢真色任煙隣更喜連朝雪飛花為辟塵項冝父涉趣園四面山迴合中間百畝畦入門唯見竹遶屋半栽梅果熟霜前樹魚肥雨後溪秋來饒景物斟酌費詩材小酌㑹芳分得隂字暇日頻相顧清風舊竹林功名春後夢吟咏老來心世事隨流水年芳付緑隂悠然千古意閒理斷紋琴玉峰登眺得初字玉峯竒絶處短䇿步﨑嶇海近潮聲壯山空樹影踈吟情危眺外飲興薄寒初數㸃新來雁髙飛不羡渠小樓扁山海圖鄭安道酒邊有詩因次韻等閒成小集危眺豁幽情四面畫圖出一襟天地清晚雲山晻靄夜月海空明自有兹樓景輸君第一評次韻屏翁新元聚拜履端來聚拜和氣洽昌辰蕃洽如今日栽培豈一人詩書延澤潤忠厚續長春相祝無多語年新徳又新屏翁領諸孫小集亦龍弟野亭君玉即席有詩次韻結屋新亭好登臨雅興長心融八窗白塵隔九衢黄泛菊金英碎嘗粳玉顆香更期梅著蕊來賞小春光江濵晚霽十里平沙路人行晚霽間水光涵逺樹雲影度空山吹浪江豚怒摩霄野鶴閒漁翁醉吹笛小艇泊前灣池州一城方九里宛在水中坻額掲顔公寺碑傳杜牧詩昔年稱上郡今日逼邊陲莫望長江北天寒風正悲有永嘉薛君自號雲屋來池陽以詩見貽用韻答之清晨聞剝啄喜得薛能詩風月一囊錦江湖兩鬢絲寒城吹角夜孤館擁衾時誰㑹吟心苦梅花是舊知有方叔材用余和薛雲屋韻見貽次韻奉酧江湖前輩盡何敢易言詩䑕璞元非玉蛛羅不是絲池塘生草處風雪跨驢時此是真吟境從來幾箇知立春前五日得雪雪作春前瑞銀城擁萬家太婆頭欲白九子頂先華壓麥嘉培本封梅惜損花家童解人意燒鼎問烹茶金陵懐古尚聞深巷語烏衣無復髙臺彩鳯儀棟宇半欹元帝廟香煙争奉誌公祠六朝興廢千年夢獨客登臨萬古悲莫上鍾山望淮北西風禾黍更離離自况多貲徒作守錢奴伏臘無憂更有餘世路本夷何自險人情太宻反成踈非圖報施方為善豈為功名始讀書門外良田堪種秫自牽黄犢試犂鉏初遊方巖山圖志舊嘗㸔紀載杖藜今得遍經行漁翁化石幾年釣仙客有田何世畊千尺枯崖蜕龍骨一簾飛瀑撼雷聲相傳逸少曽來此惜不鐫巖記姓名牡丹萬巧千竒費剪裁瓊瑶錦繡簇成堆世間妖女輪回魄天上仙姬降謫胎笑臉倚風嬌欲語醉顔酣日困難擡東君若使先春放羞殺羣花不敢開喜有秋去年已作填溝計誰料今年見有秋天意乗除元自定人生伏臘漫多憂滿盆淅玉休論價成斛量金不計籌最是野夫懽喜處春風百甕繞牀頭次君玉弟聞新雁霜風颯颯荻花洲避北趨南巧自謀倦翮飛殘千里月寒聲催老一天秋乍教騷客驚詩夢莫為征夫寄别愁汝度塞垣應未久新來烟燧已沈不次韻東渠兄觀梅詩眼非梅不可遮三葩五蕊便堪嘉痩如飯顆逢工部老似磻溪卧子牙水影月香參衆妙弟酧兄倡自成家快篘新醖同清賞莫待枝頭爛漫花甘窮自甘窮處更何疑坎止流行信所之不學昌黎驅五鬼肯隨子厚罵三尸堂堂白髪欺人出耿耿青燈獨已知細嚼黄花香滿齒清風千古一東籬送彭希聖姊夫赴三山民曹槐笏緑衫初作吏要須立脚自亷勤閭閻疾苦冝加意厫􅂒竒贏莫與聞少啖荔枝防美疢多栽茉莉挹清芬公餘覧徧佳山水倘有詩篇寄海雲如京至西興阻風雨月將圓夜出鄉關纔到西興月又殘老去問名先已嬾近來行路覺尤難雲烟漠漠吳山暗風雨瀟瀟浙水寒識破人生真逆旅此身何處不堪安七夕感興二首家家懽笑迓星期我輩相邀只酒巵矯俗何須標犢鼻甘愚不解候蛛絲新秋光彩月來處半夜清凉風起時一曲玉簫塵外意此音除是鶴仙知相傳牛女起何時無奈人間事轉癡青鳥蟠桃方士信金釵鈿合逆胡基一杯記節圖成醉萬感因秋却易悲遺恨古今流不盡銀潢耿耿接天池次劉叔子總幹夜坐感秋韻秋風逺客歎飄零滿鏡吳霜故故明酒盞論心踈舊約詩筒到眼快新評短檠伴我夜深靜長笛何人月下横步遶空庭吟未竟隔林鸜鵒又傳更代簡約諸同官探梅信是摶沙放手開渇心空想細論杯等閒不見便逾月如此相從能幾回舊雨已過重九菊新詩冝探小春梅騎驢索句真顔面要向清溪洗出來燒燈夕宋明府自置酒見招席上復賦詩因次韻定詩盟并致别意苦用吟心續祖燈得君印證愈分明一聆此日鷄窗話盡洗前時蚓竅聲颺栁輕風寒忽暖催花小雨濕還晴眼前總是詩光景可惜明朝又逺行效宫詞體楊栁萬絲堆怨緒丁香百結鎻愁腸小桃先得東皇寵莫妬東風過海棠讀陳元龍傳九州四海沸如湯問舍求田策最良豪氣到頭成底事未容欺客卧髙牀嚴子陵赤伏君王訪舊遊冨春男子只羊裘一竿本為逃名去何意虚名上釣鈎竹林避暑自抱桃笙過竹林濃隂一片直千金清眠晝晚無人喚時有風鳴石上琴方岩山有仙人田項宜父家其下于屋之西偏築亭䟽沼雜蒔花木為娛奉夀母之地即以名之自著懐仙雜詠百有一首名勝留題亦多未免皆泥乎神仙之説來徴余吟余謂神仙之事深言之則似誕今諸賢所賦無復餘藴使余更下注脚不愈誕乎且人生一世茍能超然達觀惟適之安斯人中之仙巳豈必十洲三島間之謂哉因即此意賦十章築亭䟽沼隔塵埃白白朱朱次第栽人面春風俱不老板輿日日㸔花來緑蘿翳翳結髙林烟吐霞吞一徑深半夜松凉鶴先睡滿山明月自横琴一澗寒泉九節菖釀泉為酒洌仍香玉巵捧處慈顔喜眉壽方岩共久長有時山洞拾荆薪應過真仙對奕春多少胷中髙著處儘教饒盡世間人秋池清曉濯𤣥雲鸜眼輝涵紫玉文細字黄庭應冩就莫将容易博鵞羣桑竹森森遶屋邊美池清泚浸良田桃源只在桃溪上不信壺中别有天晚菘早韭各隨時霜薤青青間露葵甘脆日堪供小摘不須他覔養神芝紫錦囊緘五岳形白書黒紙秘黄庭何如琴几焚香坐細讀包犧一巻經自傍青牛種早秔炊来玉雪滿盆香休論服日餐霞事只此延年第一方阡陌縱横尚宛然知他耕耨是何年果然絶粒能輕舉底事仙人亦有田兩宋名賢小集巻三百七十
