body:
  text: 兩宋名賢小集卷三百七十宋陳思編元陳世隆補農歌續集戴昺字景明號東野石屏之從孫嘉定己卯登第授贑州法曹參軍有東野農歌集莫悲秋傷春非貞女悲秋非烈士時運自循環我心如止水剝固復之機榮乃悴之始未識天地妙胡為浪悲喜鷃蓬或數仭鵬圖或萬里大小何必齊蒙莊未窮理次黃叔粲茶隱倡酬之什美人隱于茶性與茶不異苦澀知餘甘淡薄見真嗜自隨世俱昏寧墮衆所棄靈雨濕山腴迅雷起龍睡野草未敢花春芽早呈瑞鬭茗須占一焙火不落二趣深同誰參雋永時自試蔥薑勿容溷瓜廬定非類標名寓玄思微吟寫清致成我君子交從彼俗定恚嚼芳憩泉石包貢免郵置遼遼玉川翁千載共風味夏肻甫曉山亭開櫺納晨光隱几挹寒翠以我胸中真會彼景外意孰因夜息存孰使晝梏纍念慮方清明體認貴切至峩峩成九仞進進基一簣朂哉亭中人涵養玉其粹卷書意何如顔回坐忘地春日偕兄弟侍屏翁遊晉原分得外字因集句而成春雨晴亦佳適與賞心會初日照髙林幽泥化輕壒步屧隨春風始覺天宇大牽懷到空山逍遙白雲外青松夾路生童童狀車蓋清川帶華薄隂壑生虛籟性達形迹忘傲然脫冠帶薄暮方來歸月光搖淺瀨唐李涉有山中五無可奈何詩戲用其體作秋日四章無奈秋風何怒號振林木著我井上桐一夜失寒緑莫作搖落悲妙理在觀復無奈秋月何錬魄金氣精炯炯一輪滿天地氷壺清照我方寸景表裏同光明無奈秋山何萬疊淺深碧起來樓上看朝爽浮几席稜稜正自髙更養靜夀德無奈秋水何悠悠蕩輕槳上下天一碧顛倒涵萬象願從雙白鷗生涯寄浩蕩青陽梅先舒伯虞為其尊人索靜間軒詩人心元至虛天下本無事舉世役于形擾擾誰暫置先生自超俗涵養老逾粹妙契無名翁深造靜間味壺中貯日月胸次納天地婆娑閲四序物物見春意林花髙下紅庭草淺深翠一笑扶瘦笻行吟散微醉壬子立夏日同郡博士黃次夔遊江東太白釣臺因成古詩併呈偕行諸友翰林天酒星謫墮人間世豪氣眇乾坤浪迹寄湖海峩峩江祖山片石峙西澨醉狂御風來踞坐髙傲睨一絲聊戲垂意得在魚外青天畫屏句妙越無塵界至今五百年春虹絢暗彩我來訪遺蹤躡屐捫薜荔錦苔剝冰霜倣佛題字在屬時春夏交微雨弄輕霽同遊俱嘉朋笑語各傾蓋雲木團晝隂松風奏天籟勝踐心已愜酣歌意彌快欲招臺上魂舉爵酹清泚今昔自殊時欣感諒一契詩成寫蒼壁存否非所記長嘯下歸舟驚湍飛送栧梳頭自歎短髮如冬霜一朝白一朝又如深秋栁稿葉迎風凋白者不冉黑短者不復牢羲娥疾馳驥乾坤虛懸瓢人生寄其間泛泛波上泡百歲一大夢倐忽已隔宵胡不適所適而乃隨滔滔富貴撇眼電榮華過耳飆木散故得壽龜靈徒自焦甘拙自安吉役智滋勞忉所以柴桑人不肻折此腰上立齋先生十首以有官居鼎鼐無地起樓臺為韻形弱能使強脈病能使壽醫和肘後方袖手若無有緑野歸晉公洛社間迂叟此意誰得知可以久則久羸牛指為驥鳴梟認為鸞彼欲欺一世自亂耳目官吾直不能枉吾方竟誰刓何妨寄楚澤餐菊紉秋蘭蔚蔚空明山古號仙人居神秀發虹氣瑞應真璠璵潔白外難汙堅剛中不枯勿逐鼠璞價韞櫝姑藏諸支厦資寸莛涉江寄孤艇弗顧勝弗勝乃諉幸不幸舜華朝暮期蒼松歲年迥從渠寶康瓠我自有岑鼎君子如真金真金剛不改小人如浮雲瞬目多變態隨世良獨難殉道乃無悔近日崔菊坡堅卧辭鼎鼐薰蕕不同性涇渭不同趨由來區以别那使強合汙老聃守道德韓非事刑誅二人共一傳能信千古無多金建華屋一堂容百客立齋有廳事不覺旋馬窄僻于蕭相居隘甚晏子宅鬼神瞰髙明吉祥上虛白靈巖一片雲曽為作雨起風吹還故山松筠淡相倚秋髙霜露寒酒熱鱸魚美少寬憂世懷微醉有妙理否泰關世運進退非人謀尼父雖皇皇不為無理留用則巨川楫舍則野渡舟行藏兩付之獨倚百尺樓小草有逺志埋沒同蒿萊風霜坐相欺冉冉成枯荄我公下白屋意重黃金臺儻借伯樂顧未信終駑駘雜言三首衆芳以春榮萬葉以秋肅造物持其權兒戲恣翻覆亭亭山上松蕭蕭澗邊竹超然榮肅中正色閲寒燠提壺勸我飲布穀催我耕我酒瓶已罄我田草正生荷鋤理荒穢及時新雨晴秋來刈吾秫庶得兩遂情遙翮凌丹霄潛鱗縱深壑天分安所適翔泳同一樂短吟五七字薄酒三四酌浩氣與春風相從滿寥廓孤桐行孤桐結根倚崕石俯瞰清溪照虛碧枝葉扶踈朱夏寒上有翔鸞舊棲迹風霜冉冉歲月深老柯半朽蒼皮蝕其中素抱金玉聲以暗投人人不識人不識多苦心樵夫斤斧莫相尋寧教枯死倒澗壑不從㸑下求知音書初考得考雖多幸無功祗自嫌但求官速滿不道老同添卑拙翔蓬鷃艱辛上竹鮎黃花寒更好三嗅憶陶潛侍屏翁客遊雪山分得生字雪峰峰頂寺來此定詩盟山瀑分雲影松風亂雨聲眼明春樹緑心惺曉鐘清未好言歸去塵中事又生豈潛弟平逺圖卜築占寬間修篁老樹間八窗開宇宙一室貯雲山野曠行人少天遙去鳥還悠然會心處妙語徹玄關謝趙山臺見訪寂寞海東頭殷勤貴客舟如何經歲約祗作數宵留清玩分行篋髙吟壓小樓更須謀再會同醉菊花秋臘前見蘭花蘭叢才一幹獨向臘前開托蔭偏宜竹先春不讓梅韻從幽處見香自靜中來便欲紉芳佩靈均喚不回次韻屏翁詠梅芳信基花事東君思亦竒橫枝踈蓓蕾半樹老丰姿心共寒霜苦香唯夜月知最憐清夢覺踈影竹窗時次韻屏翁觀梅晚寒籬落外一見一畨新喚覺羣芳夢先鍾萬古春冷香冝醉寢真色任煙鄰更喜連朝雪飛花為辟塵項冝父涉趣園四面山回合中間百畝畦入門唯見竹繞屋半栽梅果熟霜前樹魚肥雨後溪秋來饒景物斟酌費詩材小酌會芳分得隂字暇日頻相顧清風舊竹林功名春後夢吟咏老來心世事隨流水年芳付緑隂悠然千古意間理斷紋琴玉峰登眺得初字玉峯竒絶處短䇿步﨑嶇海近潮聲壯山空樹影踈吟情危眺外飲興薄寒初數點新來雁髙飛不羡渠小樓扁山海圖鄭安道酒邊有詩因次韻等間成小集危眺豁幽情四面畫圖出一襟天地清晚雲山暗靄夜月海空明自有兹樓景輸君第一評次韻屏翁新元聚拜履端來聚拜和氣洽昌辰蕃洽如今日栽培豈一人詩書延澤潤忠厚續長春相祝無多語年新德又新屏翁領諸孫小集亦龍弟野亭君玉即席有詩次韻結屋新亭好登臨雅興長心融八窗白塵隔九衢黃泛菊金英碎嘗粳玉顆香更期梅著蕊來賞小春光江濵晚霽十里平沙路人行晚霽間水光涵逺樹雲影度空山吹浪江豚怒摩霄野鶴間漁翁醉吹笛小艇泊前灣池州一城方九里宛在水中坻額揭顔公寺碑傳杜牧詩昔年稱上郡今日逼邊陲莫望長江北天寒風正悲有永嘉薛君自號雲屋來池陽以詩見貽用韻答之清晨聞剝啄喜得薛能詩風月一囊錦江湖兩鬢絲寒城吹角夜孤館擁衾時誰會吟心苦梅花是舊知有方叔材用余和薛雲屋韻見貽次韻奉酬江湖前輩盡何敢易言詩鼠璞元非玉蛛羅不是絲池塘生草處風雪跨驢時此是真吟境從來幾箇知立春前五日得雪雪作春前瑞銀城擁萬家太婆頭欲白九子頂先華壓麥嘉培本封梅惜損花家童解人意燒鼎問烹茶金陵懷古尚聞深巷語烏衣無復髙臺彩鳯儀棟宇半欹元帝廟香煙爭奉志公祠六朝興廢千年夢獨客登臨萬古悲莫上鍾山望淮北西風禾黍更離離自况多資徒作守錢奴伏臘無憂更有餘世路本夷何自險人情太密反成踈非圖報施方為善豈為功名始讀書門外良田堪種秫自牽黃犢試犂鉏初遊方巖山圖志舊嘗看紀載杖藜今得遍經行漁翁化石幾年釣仙客有田何世耕千尺枯崖蛻龍骨一簾飛瀑撼雷聲相傳逸少曽來此惜不鐫巖記姓名牡丹萬巧千竒費剪裁瓊瑶錦繡簇成堆世間妖女輪回魄天上仙姬降謫胎笑臉倚風嬌欲語醉顔酣日困難擡東君若使先春放羞殺羣花不敢開喜有秋去年已作填溝計誰料今年見有秋天意乘除元自定人生伏臘漫多憂滿盆淅玉休論價成斛量金不計籌最是野夫歡喜處春風百甕繞牀頭次君玉弟聞新雁霜風颯颯荻花洲避北趨南巧自謀倦翮飛殘千里月寒聲催老一天秋乍教騷客驚詩夢莫為征夫寄别愁汝度塞垣應未久新來煙燧已沈不次韻東渠兄觀梅詩眼非梅不可遮三葩五蕊便堪嘉瘦如飯顆逢工部老似磻溪卧子牙水影月香參衆妙弟酬兄倡自成家快篘新醖同清賞莫待枝頭爛漫花甘窮自甘窮處更何疑坎止流行信所之不學昌黎驅五鬼肯隨子厚罵三尸堂堂白髮欺人出耿耿青燈獨已知細嚼黃花香滿齒清風千古一東籬送彭希聖姊夫赴三山民曹槐笏緑衫初作吏要須立腳自亷勤閭閻疾苦冝加意厫􅂒竒贏莫與聞少啖荔枝防美疢多栽茉莉挹清芬公餘覽遍佳山水倘有詩篇寄海雲如京至西興阻風雨月將圓夜出鄉關才到西興月又殘老去問名先已懶近來行路覺尤難雲煙漠漠吳山暗風雨瀟瀟浙水寒識破人生真逆旅此身何處不堪安七夕感興二首家家歡笑迓星期我輩相邀只酒巵矯俗何須標犢鼻甘愚不解候蛛絲新秋光彩月來處半夜清涼風起時一曲玉簫塵外意此音除是鶴仙知相傳牛女起何時無奈人間事轉癡青鳥蟠桃方士信金叉鈿合逆胡基一杯記節圖成醉萬感因秋却易悲遺恨古今流不盡銀潢耿耿接天池次劉叔子總幹夜坐感秋韻秋風逺客歎飄零滿鏡吳霜故故明酒盞論心踈舊約詩筒到眼快新評短檠伴我夜深靜長笛何人月下橫步繞空庭吟未竟隔林鸜鵒又傳更代簡約諸同官探梅信是摶沙放手開渴心空想細論杯等間不見便逾月如此相從能幾回舊雨已過重九菊新詩冝探小春梅騎驢索句真顔面要向清溪洗出來燒燈夕宋明府自置酒見招席上復賦詩因次韻定詩盟并致别意苦用吟心續祖燈得君印證愈分明一聆此日雞窗話盡洗前時蚓竅聲揚栁輕風寒忽暖催花小雨濕還晴眼前總是詩光景可惜明朝又逺行效宫詞體楊栁萬絲堆怨緒丁香百結鎖愁腸小桃先得東皇寵莫妬東風過海棠讀陳元龍傳九州四海沸如湯問舍求田策最良豪氣到頭成底事未容欺客卧髙牀嚴子陵赤伏君王訪舊遊冨春男子只羊裘一竿本為逃名去何意虛名上釣鈎竹林避暑自抱桃笙過竹林濃隂一片直千金清眠晝晚無人喚時有風鳴石上琴方岩山有仙人田項宜父家其下于屋之西偏築亭疏沼雜蒔花木為娛奉夀母之地即以名之自著懷仙雜詠百有一首名勝留題亦多未免皆泥乎神仙之説來徴余吟余謂神仙之事深言之則似誕今諸賢所賦無復餘藴使余更下注腳不愈誕乎且人生一世茍能超然達觀惟適之安斯人中之仙巳豈必十洲三島間之謂哉因即此意賦十章築亭疏沼隔塵埃白白朱朱次第栽人面春風俱不老板輿日日看花來緑蘿翳翳結髙林煙吐霞吞一徑深半夜松涼鶴先睡滿山明月自橫琴一澗寒泉九節菖釀泉為酒洌仍香玉巵捧處慈顔喜眉壽方岩共久長有時山洞拾荆薪應過真仙對奕春多少胸中髙著處儘教饒盡世間人秋池清曉濯玄雲鸜眼輝涵紫玉文細字黃庭應寫就莫將容易博鵝羣桑竹森森繞屋邊美池清泚浸良田桃源只在桃溪上不信壺中别有天晚菘早韭各隨時霜薤青青間露葵甘脆日堪供小摘不須他覔養神芝紫錦囊緘五嶽形白書黑紙祕黃庭何如琴几焚香坐細讀包犧一卷經自傍青牛種早粳炊來玉雪滿盆香休論服日餐霞事只此延年第一方阡陌縱橫尚宛然知他耕耨是何年果然絶粒能輕舉底事仙人亦有田兩宋名賢小集卷三百七十
