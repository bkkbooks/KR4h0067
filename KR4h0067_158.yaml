body:
  text: 兩宋名賢小集卷一百五十八宋陳思編元陳世隆補椒亭小集李光字泰發上虞人崇寧五年進士纍官司勳貟外郎欽宗擢右司諫高宗朝進吏部尚書除參知政事因爭和議安置瓊州移昌化軍卒追復資政殿學士諡莊簡越州雙鴈道中雙鴈鄉𨽻餘姚縣晚潮落盡水涓涓栁老秧齊過禁煙十里人家雞犬靜竹扉斜掩護蠶眠戲贈伴送使臣公在政府與秦檜議論不合為中司所擊送藤州安置差密院使臣送之日日孤村對落暉蠻煙深處忍分離追攀重見蔡明逺贖罪難逢郭子儀南渡每憂鳶共墮北轅應許鴈相隨馬蹄慣踏關山路他日看來又送誰昭真宫在貴溪縣造物閟靈境靈山隱仙躅丹成自飛升何用駕鸞鵠舉手金沙嶺片石聊寄足至今鎖煙扉氣象鍾清淑井池丹藥就千載湛寒緑我來春雨餘溢水漲幽谷琤琤落環珮細細響琴築黃冠六七輩一一道機熟余師本緇流遊走遍四瀆初明大乘禪鋒辨誰敢觸升堂猛虎跪諸方狐鼠伏晚乃思長生師許𨽻寶籙時登玉虛殿叨迎御輿服俯仰能幾時世事有反覆蕭然坐空巖復理舊松竹却談京洛夢感慨氣填腹人生夢幻耳何必苦拘束期師謝冠裳復見真面目國慶寺在上虞東山永夜金莖下九天郊坰風物正凄然百年寶地空蕭瑟十里青山一作天自接連局上笑談棋易勝坐中竒險句難聯定回老衲應相問淨社何時到白蓮裘氏義門夫何于會稽卓然有裘氏同居六百年相聚三千指昔賢欽義方列奏聞天子恩詔保門閭光華映閭里百官渡在上虞百官市口曉雨微茫水接天隔江茅店有炊煙杖藜獨步沙頭路記得當時趕渡船客星山在餘姚縣子陵古真隱逸氣橫九州平生江海志自比巢與由鴻飛本冥冥肯為稻粱謀虛屈萬乘顧枉煩物色求貽書誚君房預作要領憂舜江子邑里子去踰千秋高山無古今大江日東流人物浪淘盡英名至今留當年漁釣地陳迹餘荒丘嚴公堂餘姚令徐端禮建徐侯有佳政百里安田疇作堂名嚴公懷賢慕前修時來對江山一尊更獻酬我豈隱淪歟三黜今白頭年來賸得間忘機狎羣鷗結茅牟湖傍一竿幸可投篛笠青蓑衣生涯寄扁舟嚴子定不死吾將從之遊懷三峯樓一川花栁擁雕欄濃緑浮空四面山便欲移家來住此不將名姓落人間智林寺在常熟縣李墓村扁舟來訪小叢林花木通幽院落深旋拂胡牀成午夢間持貝葉動秋吟竹聲瑟瑟生虛籟山意峩峩入素琴更喜老綱能會事手攜爐銚自相尋兩宋名賢小集卷一百五十八
