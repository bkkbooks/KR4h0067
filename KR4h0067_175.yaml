body:
  text: 兩宋名賢小集巻一百七十五宋陳思編元陳世隆補澗泉吟藁韓琥字仲止元吉之子有髙節從仕不久即歸信上嘉定中卒有澗泉集五月十日嘉定十三年片月生林白沿流澗亦明幽人方獨夜山寺有㣲行野處偏宜夏貧家不厭晴薫風吹老鬢腐草見飛螢七月水石雲山裏歸來巳九秋隔城如淺近隣寺始深幽慧逺逢修靜文淵説少游徑荒殊不埽風葉上牽牛地僻稀人跡重林日自虚鳥飛晨氣外蟬噪晚涼初餘潤從侵履浮埃倦整書樵漁時上下閉户又何居木末芙蓉起亭亭緑且青墻猶承片瓦窗不礙踈櫺次第花擎葢縱横葉展屏石丁誰主者仙豈待沈𠖇擁砌叢生菊何闗老意多澆花驚易燥耘草喜成科枕腊猶宜睡餐香豈待哦淵明藏不盡滿把尚婆娑雨多極涼冷焉知三伏雨巳作九秋風木葉涼應脫禾苖潤必豐地偏山吐月橋斷水浮空雞犬隣家外魚蝦小市中晚雨可愛燈火涼秋夜空山雨到簷吹聲初甚少落勢近頻添籬菊叢叢潤畦蔬種種沾沈思仍靜聽香鼎伴書籖聞雨涼意可掬秋聲連夜起秋意雨來時睡覺風生屋涼須水到池交遊稀自好出入嬾方宜只被章泉誤書題又寄詩晚春幽破踈畦送晚春水流山盡見閒身行吟散去風光好熟睡醒來雨氣新木筆豈無濃意態石楠終是淡精神鶯聲圓處鵑聲急景物芳菲不負人辛巳正月十三日南山春雪未全消路並浮梁步石橋深緑漸歸髙栁葉淺紅初上小梅梢峭寒寺院鐘聲起昏暮人家燭影揺一夜東風吹酒醒夢回花月是元宵寒食曉色猶濛淡淡烟花間行過小橋邊人家寒食當晴日野老春遊近午天吹盡海棠無步障開成山栁有堆綿呼兒覔友尋隣伴看却邨農又下田九日破曉擕兒姪上前山竚立佳甚懐玉鏡臺開逺晴靈溪葛水去無聲園荒不礙慿髙立徑側何須委曲行露氣已濃清可掬日華初出畫難成閒居九日依辰至舉俗何為亦愛名風雨中誦潘邠老詩滿城風雨近重陽獨上吳山看大江一作大荒老眼昏花忘逺近壯心軒豁任行藏從來野色供吟興是處秋光合斷腸今古騷人乃如許暮潮聲捲入蒼茫探梅簡㸃山前梅蕋痕花雖未放巳銷魂縱饒老幹摧幽谷也勝緐華倚市門泠落不成欺嵗晚陽和且可待春温清香一噴紅梢滿却月凌風未易論梅花今年全未作梅詩與向花前浪品題不分雪霜摧折盡尚須天日照臨之靜看冷蘂無人㑹閒繞孤根只自知猶有幽禽解鳴語為予醻酢殆移時肯同桃李强攙春自占空山野水濵老氣却因髙樹得清姿不待數花新本來淡雅難從俗縱入紛華巳絶塵最愛夜深霜重處冷風吹起月精神春山看紅梅年年常得醉君家今日紅梅正著花㸃綴初非桃有艷横斜寜與李爭華依然竹外并林下况復山巔興水涯步繞孤根香更在髙懐無惜共流霞澗上臈梅香甚照眼花枝是臈梅香傳小樹為誰開㺯隂欲雪山常暝破曉終風水漫洄鳥語春聲喧復靜鴻飛寒影去還來數間敗屋浮橋外何苦無吟不舉杯梅下雖得霜濃春自濃野梅無處不為容半依古渡迷芳草猶占荒山對古松綽約花房宜戲蝶崔嵬枝幹若游龍角巾一幅支笻久不覺烟中有寺鐘澗東臨風飲梅花尚未全放一樹獨佳殘雪餘寒二月來澗東猶是欲開梅夕陽影澹初尋句流水聲清更把杯取友喚鄰相頌略破荒尋勝獨徘徊誰能折向南枝醉一陣寒香撲麝煤探梅探梅山路一杯停日淡風㣲逺靄生莫問古來尋古話只知春近愛春情㡬枝冷蕊吟方見一㸃踈花畫不成我挾兩兒同二友老來酒外更何營中秋呈潘徳父一年明月在中秋數日隂雲不奈愁忽喜新晴轉書室極知清夜照歌樓醉當㺯影如坡老詩就撞鐘憶貫休千里故人應若此吾生常好更何求書姜堯章昔遊詩後平生未踏洞庭野一不曽登南嶽峯因君談舊遊恍如常相從江淮歴歴轉湘浦裘馬意氣傳邊烽吾嘗汎大江只見匡廬松乘風醉卧帆影底髙浪直濺嵐光濃日暮泊船時是夜方嚴冬雪花壓船船背重纜揺柂鼓聲如鐘當年意淺語不到無句可寫波濤舂君詩乃如許景物不易供盡歸一毫端狀若孤飛龍人間勝處貴著眼雖有此興無由逢錢塘山水亦自好奈何薄宦難從容南髙北髙一千丈潮頭日夜鳴靈蹤應有隠者為識賞青鞵布襪時扶笻君無詫彼我媿此急還詩巻心徒忪懐古近城人語雜深山人語少重露滴煙嵐野水見魚鳥稲粱豐稔外耕鑿願温飽所以桃源人不與外人道往來是日月變動是寒暑伏臘雖不周爾且對妻子遙知風塵表萬象互吞吐所以鹿門人江左不得取少壯既奚為老矣復難强紫芝未必仙采之亦可餉耆耄八九十道可無俯仰所以商山人辭漢寜獨一作復往兩宋名賢小集巻一百七十五
