body:
  text: 兩宋名賢小集卷二十九宋陳思編元陳世隆補魚樂軒吟稿張維字仲欽延平人隆興中通判建康府事乾道中廣西經略安撫使太守馬太卿會六老於南園賢侯美化行南國華髮欣欣奉宴娛政績已聞同水薤恩輝遂喜及桑榆休言身外榮名好但恐人間此會無他日定知傳好事丹青寧羡洛中圗庭鶴戢翼盤桓傍小庭不無清夜夢煙汀靜翹月色一團素間啄苔錢數點青終日稻梁聊自足滿前雞鶩漫相形已隨秋意歸詩筆更與幽栖上畫屏玉蝴蝶花雪朵中間蓓蕾齊驟開尤覺繡工遲品高多説瓊花似曲妙誰將玉笛吹散舞不休零晚樹團飛無定撼風枝漆園如有須為夢若在藍田種更宜歸燕社燕秋歸何處鄉羣雛齊老稻青黃猶能時暫栖庭樹漸覺稀踈度苑墻已任風庭下簾幕却隨煙艇過瀟湘前村認得安巢所應免差池揀杏梁聞砧遙野空林砧杵聲淺沙栖鴈自相鳴西風送響暝色靜久客感秋鄉思生何處征人移塞帳即時新月落江城不知今夜搗衣曲欲寫秋閨多少情宿後陳莊臘凍初開苕水清煙村逺客漫吟行灘頭斜日鳬鷖隊枕上西風鼓角聲一棹寒燈隨夜釣滿犂膏雨趂春耕誰言五福仍須富九十年餘樂太平貧女蒿簮掠鬢布裁衣水鑑雖明亦懶窺數畝秋禾滿家食一機官帛幾梭絲物為貴寶天應與花有秋香春不知多少年來豪族女總教時樣畫蛾眉孤帆江心雲破處遙見去帆孤浪濶疑升漢風高若泛湖依微過逺嶼倣佛落平蕪莫問乘舟客利名同一途送丁遜秀才赴舉鵬去天池衆翼隨風雲高處約先飛青袍賜宴出關近帶去瓊林春色歸西湖再開和劉頴韻不賢那得似長城偶息潢池盜弄兵靜沼何妨無事飲幽尋聊寄所居名千山倒影河新復兩洞回波景旋生紀事還須武陵筆亭成唯擬看題榮題張公洞年來行樂與民同探穴追蹤太史公幽洞初開名易著蒼崖新刻句難工風驅俗駕松扉外雲鎖仙丹石室中付與山僧司管鑰勿教勝地草蒙戎登七星山列岫凌虛滃翠嵐瀧泓澄徹七星涵巖瞻好向西湖著飛去何妨自嶺南兩宋名賢小集卷二十九
