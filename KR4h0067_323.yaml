body:
  text: 兩宋名賢小集卷三百二十三宋陳思編元陳世隆補張泗州集張公庠字元善皇祐元年進士有泗州集郡齋宴坐為州容散誕真慰野人情摵膝禪初悟搖頭句未成試香秋院靜鬬墨午忩明已有東歸計柴扉掩姓名晚春途中一年春事又成空擁鼻微吟半醉中夾路桃花風雨過馬蹄無處避殘紅宫詞曉霧溟濛似有無半殘紅燭動金鋪黃鶯不語梨花上錯認徐熙舊畫圖四部韶音進玉巵千官傾望柘黃衣舞頭再拜金階逺畫鼓連催卷隊歸二月猶寒未有雷江梅才謝小桃開宫娥不放珠簾下待得東風送燕來盡道今來花信遲凌晨宫女探春歸寒梅一朵金盤小已有清香拂御衣過苑中官排辦時江梅初綻兩三枝春寒呵手晨粧罷簾外人催送駕遲再坐千官花滿頭御香煙上紫雲樓萬人同向青霄望鼓笛聲中度彩毬後苑宸遊炎日長宫中強半坐回廊鵁鶄鸂鶒銀塘靜楊桞梧桐水殿香萬字闌干菊半開更憐清露點莓苔仙韶使副呈新譜得旨重陽侍宴來清旦宫中候上番銀潢輕淡玉鈎殘山茶破蕚江梅發盡倚朱闌不避寒上番宫女捲簾時閃閃寒鴉拂曉啼才著赭袍催進輦紫宸門外報班齊銀漢橫斜近建章九重深靜閉蘭房六更未覺晨光動自是仙家日月長萱草初長花未開共知青帝領春回珠簾捲上瓊鈎穩不礙薰風滿殿來太皥祠壇數級紅青旗搖曵日朦朧人間未覺東風至先入宜春小苑中西苑春深奉翠華朱闌千萬護珍葩不如直上紅樓去盡見瓊林十里花碧瓦鴛鴦勢欲飛禁門深靜日遲遲玉簫吹遍新傳譜坐看黃鸝數換枝月華浮動上階稜侍宴歸來掩繡屏子夜酒醒蘭燭暗碧紗忩外度流螢宴起昭陽索輦時爐香偏上赭黃衣金門玉砌明如書宫女三千把燭歸夾城西畔半毬場彩仗彎彎人對行一樣驊騮三百匹金羈更伴緑遊韁兩宋名賢小集卷三百二十三
