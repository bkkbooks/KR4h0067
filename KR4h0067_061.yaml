body:
  text: 兩宋名賢小集巻六十一宋陳思編元陳世隆補王校理集王安國字平甫安禮弟神宗召試賜第為祕閣校理吕惠卿連鄭俠獄奪官卒有集夏日獨居竹苗敷夏隂蘿蔓蔽朝亮感此節物佳百骸適無恙委蛇投廣厦蕭瑟絶遺響稍酬一作讐簡編餘俄得冠裾放身雖勢利中心隨絃歌尚黙然想聖賢游世無得喪抱闗秉翟間未分棄冗長人生適意難聊各安所鄉平居絺綌散薫風平居觸事慵古今饒得失義命孰違從水鳥迎秋舫山花映夕舂故鄉圖畫見生死生死一作垂老愧塵容池上春日一池春水緑於苔水上花枝間竹開芳草有時依舊長文禽無事等閒來年顔近老空多感風雅含情愧不才獨有前人脩禊在荒亭終日此徘徊一作獨有浴沂遺想在使人終日此徘徊春隂似雨非晴意思深宿酲牽率臥春隂若憐燕子寒相並生怕梨花晚不禁薄薄簾帷欺欲透遥遥歌管壓來沉北園南陌狂無數祗有芳菲㑹此心假寐計較平生分閉闗偶然容得近人寰春風池沼魚兒戯暮雨樓臺燕子閒假寐塵侵黄巻上行吟花墜緑苔間了無一事撩方寸自是頹齡令鬢斑苦熱出門無路避飛沙長夏那堪暑氣加永晝火雲空爍石華堂冰水未沉瓜月明葱嶺千秋雪風靜天河八月槎終借羽翰乘興往煩冤誰此戀生涯繚垣繚垣烏鵲近人飛簾外曈曈日上遲檜作寒聲風過夜梅含春意雪殘時古今無物為真樂出處何心更詭隨寄語年華聊一笑未應長負醉鄉期遊廬山宿棲賢寺古屋蕭蕭臥不周披裘起坐興綢繆千山月午乾坤晝一壑泉鳴風雨秋跡入塵中慚有累心期物外欲何求明朝松路須惆悵忍更無詩向此遊杭州呈勝之遊觀須知此地佳紛紛人物敵京華林巒臘雪千巖水城郭春風二月花彩舫笙歌吹落日畫樓燈燭映殘霞如君援筆宜摹寫付與塵埃北客誇金明池霓旌逺逺拂樓船滿地春風錦繡筵三島路深遊閬苑九霞觴滿奏鈞天仗歸金闕浮雲外人望池臺落日邊最引平生江海趣波瀾一段草如煙贈三靈程道人三靈山下新安水瀟灑人間畫不如收得市朝忙日月歸來田里老樵漁君能知命忘機久我愧於時觸事疎從此卜隣同笑傲何須强著解嘲書和魏道輔雨中見示移病憛憛久雨中鳴騶時聽六街東一作龍忽吟佳客詩消暑逺勝前人檄愈風海運我殊慚斥鷃陸沉君合伴翔鴻更酬珠玉思談笑裹飯何須厭屢空雨意柱礎霑濡雨意成翩翩鳥雀隔簾鳴侵尋爽氣來欹枕想像滄波去濯纓己識古今無得䘮秪須彼我不相迎囅然一笑呼歸騎聊更飛毫戲友生黄梅花熈寜五年壬子館中作是時但題曰黄梅花未有蠟梅之號至元祐蘇黄在朝始定名曰蠟梅蓋王才元園中花也庾嶺開時媚雪霜梁園春色占中央未容鶯過毛先類己覺蜂歸蠟有香弄月似浮金屑水飄風如舞麴塵場何人剰著栽培力太液池邊想菊裳送李子儀知明州兒童劇戲甬東天小别侵尋二十年海岸樓臺青嶂外人家簫鼔白鷗邊哀容愁問州民事勝㮣欣逢太守賢為我剰題瀟灑句遥聞鳯詔待詩仙送烏子山給事赴揚州都人供帳國門東淮海兵符節制中青𤨏論思虚夜月朱幡游衍值秋風侯嗟誰在思張仲民喜重臨得次公内外忘懐能自適何時談笑一樽同送徳之提刑郎中赴廣西天扶開寳至熈寜和氣薰蒸瘴癘停五管閭閻如按堵六朝仁聖喜祥刑欲推恩澤求膚使果見謀猷簡大庭嗟我白頭甘抱槧看君歸日上青㝠送文淵使君郎中赴當塗看花金谷屢銜盃先後歸時出處乖朝日衣冠辭魏闕春風旗鼔過秦淮談間咸慶連雲屋事外歡娛付水齋回首未成東下計可無書札冩離懐金山同正之吉甫㑹宿作寄城中二三子寺壓蒼厓勢欲傾歡然西度為誰興雲隨草樹縈層岫江浸樓臺㸃萬燈坐久不知身寂寞夢回猶覺氣軒騰思君城郭塵埃滿相逐尋閒亦未能此詩第四句佳然終被乃兄壓倒平甫自和有云檻外風吹前渡語江邊影落萬山燈半空月上方清徹萬里潮來自沸騰又較親切西湖春日爭得才如杜牧之試來湖上輙題詩春烟寺院敲茶鼔夕照樓臺卓酒旗濃吐雜芳薫巘崿濕飛雙翠破漣漪人間幸有蓑兼笠且上漁舟作釣師中夏朝晡廣厦坐欹斜稍覺炎天氣象加紫玉簫攢湘竹笋赤霜袍爛海一作石榴花悠悠物外身無事擾擾人閒智有涯五鼎一瓢何必問且慿詩句度年華雨餘雨餘宫闕映秋旻漠漠槐花水上新夜有蝭蟧催節物蝭蟧蟬也咅提勞朝無沆瀣助精神形如槁木聊依世名若浮煙底徇人莫笑長吟銷短景故園回首隔參辰得雨青天赤日水如湯車馬飛塵百尺長望嵗人人憂旱魃舞雩旦旦待商羊清衷凌物回天鍳膏澤乗時助嵗穰自有股肱歌盛徳芻蕘誰敢僭揄揚次韻景文雪中見寄未能談笑破愁城猶幸都無俗事攖載酒何人過揚子評詩今日得鍾嶸杜門落漠塵埃隔掃逕侵尋霰雪生誰向梁園能授簡看君文格出天成雪意雪意悠悠底未成年華促促尚誰驚浮雲稍助春來暗薄日遲回午後明靜見游塵侵蘚迹忽聞落葉掃堦聲此時俯僂無酬酢世諦吾心棄不爭憶梅花禁街人語絶諠譁庭下㣲吟斗柄斜萬里雲容今霰雪一陽泉脉動萌芽頓忘人世蓬心累巳任天年葆鬢加早晚翩然青雀舫滿江春色看梅花梅花醉筆題詩紫界墻梅花零落撲衣裳天香又雜杯中渌春色還驚鬢上蒼渉世何妨為白璧流年未必抵黄粱一吟起我平生志今古冥冥出處忘郊外野曠天寒氣象嘉浮雲濃淡日初斜澤中雨漲無鳴鶻荷下波翻有怒蛙簫鼔殘聲來帝闕漁樵歸徑見人家塵簪羞把黄花插不耐飛蓬鬬鬢華宋匪躬太祝先輩示及劉貢父伯仲三人同年登第之詩因奉一篇六朝文物事當竒閥閲如今舉世推射策人爭看三虎薦書吾早識孤羆集英曉日臚傳後瓊苑春風宴喜時共羨絲綸歸世掌還看驂隔鳯凰池同器之過金山奉寄兼呈潛道憶同支遁宿􅋂崟不負平生壯觀心北固山隨三楚盡中泠水入九江深紛紛落月揺牕影杳杳歸舟送梵音東去何時來蠟屐天邊爽氣夢相尋紀夢按詩話平甫熈寜癸丑嵗宿崇文院夢人邀至海上見宫殿甚盛其中作樂簫鼔之伎甚衆其宫曰靈芝邀平甫俱往有人在側呼曰時未至且令去他時迎之恍然而覺時禁中己鳴鐘平甫頗自負作詩紀之後四年卒萬頃波濤木葉飛笙簫一作嵯峨宫殿號靈芝揮毫不似人間世長樂鐘聲夢覺時滕王閣感懐滕王平昔好追遊髙閣依然枕碧流勝地幾經興廢事夕陽偏照古今愁城中樹碧千家市天際人歸一葉舟極目煙波吟不盡西山重疊亂雲浮讀魏世家亹亹談先王古今誰有得施為雖緒餘要在情不匿嗟彼三代後淪胥入戰國翟璜聞一言僶俛慙李克論材稱權衡輕重無物惑吾心能如此乃可任人責夏日獨居晳晳池沼鯈緑萍隨下上黳黳堂廡燕白晝容俛仰顧我亦晏如環廬花藥長無材助太平得地幸閒曠稍渉千古書日覺神明王乗閒盼物情自適忘外奬涵濡覆載仁誰廢魚麗唱黄塵洮隴戍黑霧荆衡饟奔波喝道邊畢命營邊障吾此獨何為飛潛樂能饗何時聞解嚴慰彼西南望當使少陵翁得見廉頗將堂上有遺羶堂上有遺羶堂下無聚蟻但知嗜欲求不必風雨至客方笑營營貪得故無幾安知萬類中趨舍忘彼己天乎顧人寰等是一時戲受形巨細分阽危後先爾浸淫蚍蜉生穴柱從此始莊生亦知言信矣當棄智兩宋名賢小集巻六十一
