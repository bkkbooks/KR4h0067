body:
  text: 兩宋名賢小集卷一百三十七宋陳思編元陳世隆補拙齋别集王失名字子思行履無考德清宰俞居安自畫淵明圖門無車馬喧徑有松菊隂前窗面清泚後户依嶔岑就使世俗工猶足寫幽深況今令尹賢洞照先哲心出處異軌轍丘壑同胸襟豫知淡筆墨良似無絃琴先生如明月瑩潔照古今形模或能寫光彩詎可臨寥寥千古意當向筆下尋人心去典午朝柄歸卯金豈無康濟心且賦歸來吟天生卓犖姿豈是甘山林當今急英賢四海待商霖勉哉就功名枯稿不足欽表兄丁行之俾豫作山水一軸秃髮管城書不中麝煤滿硯隨輕濃煙雲變怪本無定丹青故匪能形容解衣盤礴無人久妙迹于今復何有揮毫要使真宰泣嘆息初非癡絶手遼東有人丁令威去家得仙今暫歸上界繁華異丘壑安得長林大麓長追隨聫翩大軸要豫寫敲氷不在鵝溪下吾既不能為喬松直幹摩蒼天又不能為小童一線飛紙鳶萬里江山入平逺喚取畫師閻立本江侯邀豫作山水書以贈之江侯樂山水誓卜山水居遊戲天目道箬帽跨蹇驢村童習識之拍手笑且呼行行不之顧心與山水俱于兹且幾年所得應有餘云何不知厭要豫寫諸圖昔者少壯日戲墨謾妻奴今衰眼目暗筆研久已疏書來不得謝督迫疇敢徐圖成不自識濃淡恣所如雲深霧莫測中恐藏於菟人生孰非幻作觀隨有無江侯樂山水何考其真歟作詩調江侯江侯其曉諸觀畢勿遽棄醬瓿尚可糊何源秀才為豫畫山水圖覔詩孤峰特立何巉巉勢與霄漢光相參左蟠右列分嶺岫儼若至尊朝子男怪余蝸室不函丈欲有異境超塵凡素縑挂壁故妥帖平地作此千嵌岩雲蒸霧結深莫測長林大麓亂不芟想當變怪蟄龍虎中有窟穴誰能探將崩未崩江石動欲去不去風滿帆山坳林闕見天際隱釣萬里橫煙嵐嗟豫質性素山野視此丘壑心益耽斗升之粟真秣莝野馬垂耳就轡銜西山爽氣日在望吏卒侍側嚴若監青鞋布襪棄不著誰令自苦披青衫頗羞漁父駐短棹似笑大夫新被讒寄言鳥獸倘可侣吾將從汝棲林巒戲畫古松真清齋前輪囷復離竒不柏亦不栗吾廬非夏社嘉樹伊誰植刳心謝吹噓強骨餘霹靂峥嶸歷風霜偃蹇豈朝夕客從何方來一覩心眼惑怪此蒼蛟龍落寞依屋壁不知造物工輸寫入筆力輕明絶纎埃冥晦滴濃墨皮堅散鱗甲葉老櫕矛戟古工缺不師揮掃恣淋瀝槃礴醉且狂詎識韋與畢雖云不造極要自出胸臆當知後凋操不在翰墨迹地瘠山骨出天低雲氣逼俯仰輒有礙巨幹那能直翻令棟梁姿鬱屈自局蹐安得少陵絹一掃二千尺會看十八公高壓三品石戲畫松柏壁間窮山數家聚宦況若羈旅氷廳晝日永眇眇誰與語眷彼蒼髯生結友得新甫奮筆寫瑰姿雙虬見墻堵飽霜柯葉老積石皮骨古上有雲垂天慘淡閣寒雨下有溪漱石犖確絶埃土材竒生長艱根瘦卓立苦交柯寒相依雷陳共然許分幹或相避亷藺馴兩虎信非同根生要是嵗寒侣衆木猥連林噲等何足伍君看桃與李穠麗相媚嫵情態能幾時紛紛可堪數兩宋名賢小集卷一百三十七
