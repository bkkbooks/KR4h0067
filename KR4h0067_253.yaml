body:
  text: 兩宋名賢小集巻二百五十三宋陳思編元陳世隆補竹齋詩集二裘萬頃送詩僧如師西遊向來詩壇上權奇聲籍籍君雖後兩翁而已分半席主人龍門髙宜有如此客横行翰墨塲往往一當百挾是今西遊吐談取雙璧要須早歸來成就法王宅從人覓墨梅熏爐束詩魂茗椀驅睡思掩闗寂無營翰墨自娛戲山寒溪正清月淡雪初霽横斜兩三枝見說可人意天機如胸中出手特餘事何時剪氷紈來對病居士睡起疾去得安卧寒宵不知長鄰鷄忽聞聲曙色侵我牀人生孰無營晨興固其常奈何以一身投之百憂塲吾方休吾心與世長相忘適逢希夷翁授我枕中方意行到華胥日昃猶徜徉回觀一世人擾擾良可傷誰能従我遊要須留春皇讀邸報紛紛天下事翻覆良難期不知杳冥中主張者云誰工拙判兩途人謀豈容施得非欲平治機緘遂潛移目前三四公並用無一遺毋嫌滯一州民實邦之基向來番江頭親見國子師徳行淵與騫千載如同時斯人使臨民兒不賴母慈人言致泰和須索登皋䕫位崇澤斯均否則失所宜天乎倘人従何時可臻兹次伯量贈别詩韻我生既駑下且復寡見聞時時警其愚姻黨賴有君自慚苶且疲不足張此軍君乃不我棄歡然與同羣願學如之何此志良已勤坐未知方所得失不足云人生所好異其力用是分詞章末技耳安能嫓皇墳而况字書學兀兀纂説文曷若鞭吾心或有汗馬勲請益恨未能别君大江濆長吟昌黎詩安得身登雲老農歎霜畊氷在趾雨種泥沒膝旱魃忽為虐耕種漫勞力去年幸一稔今嵗免艱食細聴老農語令我三歎息但願從此去龍骨長挂壁大田多黍稌髙廪若山積或云穀大豐則恐錢鎛嗇夏租星火急處此未有䇿細民一錢稅往往亦追索穀賤反傷農此語傳自昔語客但勿憂新絲尚堪質十二月大雨一冬都無五日寒赤日杲杲后土乾水官丐歸帝弗語詰朝不雨吾戮汝斯須便放大瓢傾一洗萬里塵埃清不妨更作夜深雪桑榆之功尚堪說燈下偶次前韻北風吹雨夜正寒北窻吟詩舌欲乾千辛萬苦浪如許飯顆山頭誰著汝何如一尊隨意傾酒酣不問濁與清明朝縦有三尺雪灞陵詩句無容說别敬叔筆硯君無間氷霜嵗又除諸生得模範六藝共畊鋤松菊淵明宅蓬蒿仲蔚居相望倘相憶時寄數行書贈畫工綵筆三生夢春蓮萬葉花笑人為市道隨分足生涯山路浄如水溪流淺見沙能來良不惡看我傲煙霞次胡伯仁韻山長飛鳥急江濶去帆微唱晚㡬漁笛憑髙一釣磯従君濯氷雪滿䄂得珠璣三嘆不能已歸來吟夕暉書晁文元道院集華屋金狨座雕鞍駟馬車才堪誇世俗早已落丘墟此病乆沈痼無人解掃除千年子晁子道院有遺書送范二丈入藍田書院二首今代崔斯立才髙不負丞君方為重客人謂得良朋敏捷朝千字辛勤夜一燈明年冠秋試萬里看飛騰君在淳熙日常師陸監丞今為後死者樂有逺來朋此道未墜地他時要續燈病夫力不足拱立看騫騰夜坐再用前韻二首洪井今真隠長沙昔漫丞餘生得巖壑拙宦愧交朋飯菜渾忘肉囊螢足代燈詩來夜将半雲際月騰騰家有輞川集人如王右丞琴書多暇日觴詠盡髙朋擬脱雲山履來分夜案燈新詩要傳寫病眼任懵騰送胡仲立入京昔對延英日諸公嘆勿如敢言天下事不負案頭書此去朝雙闕懸知有異殊榮途方著脚未用曳長裾次施真人韻素鞸方多難丹砂倘一逢勿疑蕉覆鹿㑹見竹成龍澗水逺仍潔巖花幽更濃行行望仙宇知在最髙峰暘谷偶成竹近頗欣衣袂爽苔深常惜履痕侵夜燈四壁圖書影曉日一牀花木陰載酒只今誰好事絶絃従昔為知音區區外物成何用慎勿縁渠愁此心入京道中風雨因賦此遂退休新築書堂壁未乾馬蹄催我上長安兒時只道為官好老去方知行路難千里闗山千里念一畨風雨一畨寒何如静坐茅齋下翠竹蒼梧子細看閒居閒居最與性相便勤即繙書懶即眠終日閉門真省事有時面壁似耽禪大椿嵗籥祈親夀斷簡生涯聴子傳待問洪崖覔丹訣白雲深處引寒泉松花開竹笋茂喜而詠之繁花密笋暮春時粧㸃園林一段奇金粉生香風細細斑衣留潤露垂垂品髙宜入神仙藥節勁終全氷雪姿笑彼杏桃兒女態漫争艷冶媚山岐睡起書懷時諸公相勉再出北窻終日廢書眠一枕清風值萬錢雲度茅簷輕冉冉泉生石砌净涓涓不嫌雨脚花間注要聴秋聲屋外傳三徑初成吾欲老幕中何用泛紅蓮有感時與李洪齋有約去年今日西歸客曝背茅簷又一冬嵗月催人雖迅速簡編于我却從容知名焉用詩千首養病聊須酒一鍾早晚杖藜修水去故人有約許相従用前韻謝伯量過訪山中勝逰千里笑談中雪片梅花正仲冬肯向蓆門尋孺子更能草具重茅容春風頓覺生寒谷夜榻惟愁聴曉鐘半世坡梅門下客乃今何幸得過従送胡仲衡憶昔樵江一見君喜君吃吃喜談文别來嵗月今如許書裏工夫想得勤近世起家多白屋㡬人馳志在青雲穡齋已踏賢闗路更有諸孫䇿異勲喜范光伯相過章江東下㡬灣洄誰伴臞仙夜探梅離别不禁詩社冷遭逢莫放酒船回氷霜滿眼嵗将換花栁轉頭春又來安得飛騰九宵外鞭鸞笞鳯日相陪懐范光伯再用前韻梅邊流水碧洄洄都把相思付折梅十載不禁雙淚落一尊期慰九腸回驚殘蝶夢鵲空喜望斷馬蹄人不來咫尺雲山尚如此天涯聊解得追陪次光伯韻竹逕當年手自開只今無處著莓苔絶憐此地過從少賴有髙人時復來籬下乆霜猶有菊水邊近臘正多梅我方眷眷三年别君莫怱怱一夕回錢塘次孫教南韻簿領歸來得泮宫一時衮衮任諸公市朝競逐利名走草木誰為臭味同霅水不妨披宿霧蓬山正要挹清風塵埃不得従君後豈但他時愧兩翁次朱震逺韻芳池緑水自生肥上有軒窻隠翠微花竹舊嘗開小徑門闌今又啟重扉直須閶闔排雲去要看長安躍馬歸詞賦合魁天下士春光端不負劉煇善利閣次伯仁所題趙子良畫四首箜篌君鄉來分明寄江樹想君詩成時夢作白鷗去平生交友間吾情葢屢岸區區稻梁謀君亦逐鴻鴈風簷手君詩心跡已清絶何當更長吟坐對澄江雪扁舟兩漁翁清唱發日暮安得如鴟夷相與五湖去自驚俗塵易汚人胸次須自潔君看四明老氷壺浸秋月題蘇希亮壁石梁渡山澗上有秦人居嵗寒不種桃汲泉灌佳蔬兀坐有感息綿綿而不絶心了了以常明静室我方燕坐旁人喚作修行次伯仁過道旁田家韻桃源千載鎖烟雲若輩安知古有秦恐是呉興沈東老一尊聊復醉詩人即事二首門前溪水欲平堤漫著漁竿淺處垂晴雨每闗憂國念豐凶端欲問人知春時耕種夏時耘七月農夫始食新此去田家常要雨雨多元自不妨人秋數聲牧笛日将晚一曲樵歌山更幽解帶盤桓小溪上坐看紅葉汎清流乆雨園林清樾浄無塵池沼黄流去有聲不用飛花來㸃綴但須霽日為澄清上元憶大梵明燈二首經年不到豫章城燈火遥聞鼓吹聲却憶秋屏臺上寺綘紗青玉㡬長明突兀招提枕古城夜深鐘磬寂無聲坐馳燈火笙歌地知有何人一㸃明秋日即事斷鴈聲邊小雨來菊花强半卧蒼苔乍寒天氣雖宜酒冷淡無心把酒盃九日籬落黄花尚自無白衣猶未到吾廬莫令此日負佳節為展淵明采菊圖松齋秋咏次黄存之韻七首少年有䇿志平戎心事今來一老翁蜀客款門茶未了旁人又說棗兒紅西風黄葉掃空庭舞鶴翩翩墮雪翎一陣清風通鼻觀木犀庭下讀騷經牽牛挂蔓上東籬氣肅清商雨過時人意若隨天意好秋光又到菊花枝閉門思古感傷今每有詩來黙契心紙上不須論巧拙堯夫只是静中吟閒中無辱亦無榮案上圖書有課程静對秋花香黙黙晚風休送亂蟬鳴據梧杖䇿事紛然樓上看山對晚眠縦是樓無山色逺只如小米畫雲煙無事縈心晝掩扉松風度曲入琴徽登髙老矣興猶在塞上秋風戰馬肥次仲庸初冬即事二首常嵗霜天分外晴一溪如練浸氷輪今年風雨寧無夜誰與溪梅作小春君家秋實洞庭種小子持來獨未黄莫作蘇州書後夢只今正欠滿林霜雪中戲元徳元齡二弟二首在昔梅花猶有賦如今冰柱亦無詩吾衰不作池塘夢春草生時子合知袖間出手不應遲栁絮漁蓑總是詩二妙得君真所喜一寒如吾有誰知再韻寄元齡弟二首季也東歸何太遲伯兮西望屢吟詩茅簷夜卧雪深尺人在蓬窻知不知小舟閒繫在江湄滿眼瓊瑶定有詩詩似其人人似雪只應清處恐人知雪中再示徳齡二弟三首只道園林春未歸風前一夜栁花飛東皇自是繁華主不用𤣥冥薦玉妃平生蓑笠慣衝寒長憶江湖把釣竿昨夜北窻聞雪作夢魂飛到子陵灘青青窻外㡬修篁也學宫梅巧樣粧說與恵連須著句雪邊春色到池塘再用韻三首亂飄窻户重重積巧入簾櫳細細飛想見釣天張樂處瓊蕤瀲灧到千妃蕙帳一冬毎苦寒夢回長是日三竿那知今夜剡溪路月淡扁舟水滿灘鳯臺仙姊掩銀篁歸去瑶池試晚粧剰粉殘脂無處著化為風絮滿池塘再用韻三首無人低唱兩三巵一任瓊瑶滿眼飛羅襪暗塵應洗盡月明吾欲看江妃憶昔騎驢犯曉寒酒旗隨處認長竿灞陵物物皆詩句不用牽船八節灘眼前脩潔獨脩篁屢倩東風洗曉粧學舞腰肢困珠玉可憐官栁在寒塘再用韻三首梨花月淡珠簾捲栁絮風輕粉蝶飛官漏無聲窻欲曙霓裳催舞廣寒妃雪裏鷗盟元未寒小舟南浦著漁竿眼明似共月千里衣冷欲迷雲一灘疎梅元自映疎篁誰把瓊瑶特地粧雪後園林應更好却輸和靖在錢塘次元徳弟韻䟦扈飛揚使我驚鐵中雙鏃自錚錚陳橋舊将今無用一任於菟繞屋行余従元徳弟借到西廊書齋朝夕其間今二年矣戲作病僧寮且賦三絶雖有圖書伴寂寥不妨題作病僧寮蒲團竹椅南窻下一炷爐香百念消華髮蒼顔一病僧向來文史頗闗情只縁世網無由脱遂學枯禪度此生朝來寮外望西山正在雲煙縹緲間既欲與山為保社不妨身世似雲閒再咏三首病僧行脚歸來後萬事無心每閉寮日射竹窻風葉亂烟凝香鼎篆紋消厭趨朝市元無夢慣處山林似有情圓覺楞嚴俱不解維摩會下一書生無心對客煨黄􅍦有意看雲傍白鷴終日區區㺯文墨笑他齊已與髙閒寄元齡弟五首餘生端合老吾廬心地全然與世疎安得數椽西嶺下自行溪水灌園蔬莫怪窮年不入州載書前已㑹盟鷗市朝畢竟多塵事且傍溪山静處留俯仰人間又一年即今科詔下天邊功名萬一來相逼試向榮途小著鞭少年妄作功名想說著長安喜欲狂多病年來怕奔走却思雲壑置籐牀一室蕭然百事無崇朝趺坐對熏爐岫雲舒巻元無礙贏得從容養病軀兩宋名賢小集巻二百五十三
