body:
  text: 兩宋名賢小集卷五十八宋陳思編元陳世隆補安樂窩吟邵雍字堯夫衛州人也刻厲為學夜不枕席者數年有王豫者以師自居聞雍學易召而欲教之雍往見豫與語三日蹶然起拜雍嘗適吳楚過秦魯客梁晉而歸徙居于洛士人道洛者必過其廬與人言必依于孝悌忠信樂道人之善不及其惡故賢不肖無不親之其學自天地運化隂陽消長皆以數推之逆知其變世無能曉之者而雍內以自樂浩如也初舉遺逸試將作監主簿熙寧初以為潁州團練推官與常秩同召而雍卒不起居洛三十年而卒年六十七贈著作郎諡曰康節有書十二卷曰皇極經世詩二十篇曰擊壤集子伯溫皇極經世一元吟天地如蓋軫覆載何高極日月如磨蟻往來無休息上下之嵗年其數難窺測且以一元言其理尚可識一十有二萬九千餘六百中間三千年迄今之陳迹治亂與廢興著見于方册吾能一貫之皆如身所歷和祖擇之吾家職分是雲山不見雲山不解顔逰興亦難分日限夢魂都不到人間煙嵐欲極無涯樂軒冕何嘗有暫間洛社交朋屢思約幾時曾得略衣攀謝擇之惠詩思深骨髓為慈親義重丘山是故人歸過洛陽舊逰地白雲收得薜蘿身觀物詩地以靜而方天以動而圓既正方圎體還明動靜權靜久必成潤動極遂成然潤則水體具然則火用全水體以器受火用以薪傳體在天地後用起天地先睢陽五老圗政事渾如春夢間人情囂薄惡儒冠四朝遺烈承平日兩世觀風樹大桓經濟安民心不晦保全傳嗣骨無寒乾元恰似諸公意符節還同一揆看復封詩冬至子之半天心無改移一陽方動處萬物未生時玄酒味方淡大音聲正希此言如不信更請問庖羲天道吟天道不難知人情未易窺雖聞言語處更看作為時隱几功夫大揮戈事業卑春秋懶乘興出用小車兒莫春吟林下居常睡起遲那堪車馬近來稀春深晝永簾垂地庭院無風花自飛間吟忽忽間拈筆時時樂性靈何嘗無對景未始便忘情句會飄然得詩因偶爾成天機難狀處一點自分明觀物萬物備吾身身貧道未貧觀時見物理主敬得天真心爽星辰夜情欣草木春自憐斫喪後能作太平人仁術在昔賢君子存心每欲仁求端徒有術及物豈無因惻隱來何自虛明覺處真擴充徒此念福澤遍斯民入井倉皇際牽牛觳觫辰向來看楚越今日備吾身聞善決江河大舜深山日襟靈保太和一言分善利萬里決江河可欲非由外惟聰不在他勇如爭赴壑進豈待盈科學海功難並防川患亦多何人親祖述耳順肯同波秋日間來無事不從容睡起東忩日已紅萬物靜觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不淫貧賤樂男兒到此是豪雄龍門道中物理人情自可明何嘗戚戚向平生卷舒在我有成算用舍隨時無定名滿目雲山俱是樂一毫榮辱不須驚侯門見説深如海三十年前掉臂行史畫吟史筆善記事畫筆善狀物狀物與記事二者各得一詩史善記意詩畫善狀情狀情與記意二者皆得精狀情不狀物記意不記事形容出造化想像成天地體用自此分鬼神無敢異詩者豈于此史畫而已矣詩畫吟畫筆善狀物長于運丹青丹青入巧思萬物無遁形詩筆善狀物長于運丹誠丹誠入秀句萬物無遁情詩者人之志言者心之聲志因言以發聲因律而成多識于鳥獸豈止毛與翎多識于草木豈止枝與莖不有風雅頌何由知功名不有賦比興何由知廢興觀朝廷盛事壯社稷威靈有湯武締構無幽厲攲傾知得之艱難肯失之驕矜去巨蠧姦邪進不世賢能摘隂陽粹美索天地精英藉江山清潤揭日月光榮收之為民極著之為國經播之於金石奏之於大廷感之以人心告之以神明人神之胥恱此所謂和羮既有虞舜歌豈無皋陶賡既有仲尼刪豈無季札聽必欲樂天下舍詩安足憑得吾之緒餘自可致升平寄祖擇之三十年交舊相逢各白頭海壖曽共飲洛社又同遊脫屣風波地開懷松桂秋兩眉從此後應不著間愁首尾吟三首堯夫非是愛吟詩詩是堯夫可愛時寶鑑造形難隱髮鸞刀迎刃豈容絲風埃若不求侵路塵土何由上得衣欲論誠明是難事堯夫非是愛吟詩堯夫非是愛吟詩詩是堯夫不強時事到強為須涉迹人能知止是先幾面前自有好田地天下豈無半路岐省力事多人不做堯夫非是愛吟詩堯夫非是愛吟詩詩是堯夫喜老時明著衣冠為士子高談仁義是男兒敢于世上明開眼肯向人間浪皺眉六十七年無事客堯夫非是愛吟詩安樂窩中自貽物如善得終為美事到巧圗安有公不作風波于世上自無氷炭到胸中災殃秋葉霜前墜富貴春花雨後紅造化分明人莫會枯榮消得幾何功月到梧桐上吟月到梧桐上風來楊栁邊院深人復靜此景共誰言清夜吟月到天心處風來水面時一般清意味料得少人知天津橋晚步芝蓋久稀疏莫雲空坱圠千年舊都城一片間宫闕禁籞尚連延觚稜猶􅏭嵲橋勢橫雌霓隄形偃初月瀍澗崖已深漢唐時未歇危亭獨坐人浪把興亡閲天春園內鄉有園名天春春時桃李如彩雲邑民攜觴連帟幕或歌或舞同欣欣縣令春間意自若直謂前世無古人牡丹百品紅與紫華而不實徒紛紜兼隱亭兼隱詫來書于時特起豫民淳無訟聽縣僻類山居簿領杯盤外官聨談笑餘不知當此際傍邑更誰如伊川向晚驅車出上陽初程便宿水雲鄉更聞數弄神仙曲始信壺中日月長錦屏山錦屏山映一川霞桃李爭妍二月花試向宜陽髙處望故宫翻作野人家逰黃澗堪嗟五霸爭周燼可笑三分拾漢餘得似不才間處坐平時雲水繞衣裾疊石溪縱轡來逰疊石溪斷崖還合與雲齊飛泉亦有留人意肯負他年到此栖九龍泉九潭冷浸崖根黑數峰高入雲衢碧逰人屏氣不敢言長恐雷霆奮于側水邊靜坐天將暮猶自盤桓未成去馬上回頭更一觀雲煙更隔無重數晚步天津次日有詩溪翁昨晚步天津搔首橋邊佇立頻洛水但聞催去棹西風惟解促行人山川慘淡籠寒雨樓觀參差鎖暮春此境更堪蕭爽會欲霜時候雁來賔自題安樂窩安樂窩中弄舊編舊編將絶又重聨燈前燭下三千日水畔花間二十年有主山河難占籍無爭風月任收權間吟間咏人休問此箇功夫世不傳洛下園池洛下園池不閉門洞天休用别尋春縱逰只合輸間客遍入何嘗問主人更小亭欄花正好儘荒臺榭景才真虛名誤了無涯事未必虛名總到身安樂窩中詩一編安樂窩中詩一編自歌自咏自怡然陶鎔水石間勛業銓擇風花靜事權意去乍乘千里馬興來初上九重天歡時更改二三字醉後吟哦五七篇直恐心通雲外月反疑身是洞中仙銀河洶湧翻晴浪玉樹嵖岈生紫煙萬物有情皆可狀百骸無病不能蠲命題偶被神相助得句偏為人所傳肯讓貴家十部樂寧慚富室一囊錢若條此過知何限且喜臺官獨未言福昌遇雨雲勢移峯緩泉聲度竹遲此時無限意惟有翠禽知觀陳希夷先生真及墨迹絶句三首未見希夷真未見希夷迹徒聞希夷名希夷心未識既見希夷迹復見希夷真始知今與古天下常有人希夷真可觀希夷墨可傳希夷心一片不可得而言黃河誰言為利多于害我為長渾未始清西至崑崙東到海其間多少不平聲題范忠獻公真吟范邵居洛陽希夷居華山陳邵為逸人忠獻為顯官邵在范之後陳在范之前三人貌相類兩人名相連和司馬溫公韻二絶冠蓋紛華塞九衢聲名相軋在前呼獨君都不將為事始信人間有丈夫風背河聲近亦微斜陽淡泊隔雲衣一雙白鷺在山外將下沙頭却背飛和溫公見候詩韻君家梁上年時燕過社今年尚未回為闕誤君凝望久萬花深處小車來觀易一物其來有一身一身還有一乾坤能知萬物備于我肯把三才别立根天向一中分體用人于心上起經綸天人焉有兩般事道不虛行只在人觀書吁嗟四代帝王權盡入區區一舊編或讓或爭三萬里相因相革二千年唐虞事業誰能繼湯武功夫世莫傳時既不同人又異仲尼惡能不潸然觀詩愛君難得似當時曲盡人情莫若詩無雅豈明王教化有風方識國興衰知音未莫吳公子潤色曾經魯仲尼三百五篇天下事後人誰敢更譏非觀春秋堂堂王室寄空名天下無時不戰爭滅國伐人唯恐後尋盟報役未曾寧晉齊命令炎如火文武鎡基冷似氷惟有感麟心一片萬年千載若丹青插花吟頭上花枝照酒巵酒巵中有好花枝身輕兩世太平日眼見四朝全盛時况復筋骸粗康健那堪時節正芳菲酒涵花影紅光溜爭忍花前不醉歸洛陽春八首之一四方景好無如洛一嵗花竒莫若春景好花竒精妙處又能分付與間人冬至吟何者謂之幾天根理極微今年初盡處明日未來時此際易得意其間難下辭人能知此意何事不能知間吟自古禦戎無上䇿惟慿仁義是中原王師問罪固能道天子蒙塵爭忍言二晉亂亡成茂草三君屈辱落陳編公閭延廣何人也始信興邦亦一言題淮隂廟十首一身作亂宜從戮三族全夷似少恩漢道是時初雜霸蕭何王佐殆非尊據立大功非不智復貪王爵似專愚造成四百年炎漢才得安寧反受誅生身既得逢真主立事何須作假王誰謂禍胎從此始不宜回首怨髙皇一時韓信為良犬千古蕭何作霸臣彼此並干名教罪罪猶不逮謂斯人韓信事劉元不叛蕭何惑主竟生疑當初若聽蒯通語高祖功名未可知雖則有才兼有智存亡進退處非真五湖依舊煙波在范蠡無人繼後塵若非韓信難除項不得蕭何莫制韓天下須知無一手苟非髙祖用蕭難漢家基定議功勳異姓封王有五人不是淮隂最雄傑敢教根固又生秦韓信恃功前慮寡漢王負德尚權安幽囚必欲擒來斬固要加諸甚不難若履暴榮須暴辱既經多喜必多憂功成能讓封王印世世長為列土侯兩宋名賢小集卷五十八
