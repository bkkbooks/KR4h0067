body:
  text: 兩宋名賢小集卷六十九宋陳思編元陳世隆補杜祁公托稿杜衍字世昌山隂人登進士甲科歷官至集賢殿大學士兼樞密使進太子太師封祁國公卒年八十贈司徒諡正獻咏蓮鑿破蒼苔漲作池芰荷分得緑參差曉開一朵煙波上似畫真妃出浴時雨中荷花翠蓋佳人臨水立檀粉不勻香汗濕一陳風來碧浪翻珍珠零落難收拾睢陽五老圖杜衍八十嵗王煥九十嵗畢世昌九十四馮平八十七朱貫八十八五人四百有餘嵗俱稱分曹與挂冠天地至仁難補報林泉幽致許盤桓花朝月夕隨時樂雪鬢霜髯滿座寒若也睢陽為故事何妨列向畫圖看附諸老詩王渙渙一作煥禮部侍郎分曹歸政養耆年李下何由更整冠賢相賦詩同笑傲聖君優詔許盤桓龎眉老叟俱稱壽凌雪喬松豈畏寒屈指五人齊五福鄉人須作二疏看畢世昌司農卿菲才最忝竊高年分務由來近挂冠敢造巨賢論軌躅幸依都府得盤桓篇章奉和慙風雅眷待優隆荷嵗寒儻許衰顔參盛列願憑繪事永傳看朱貫兵部郎中各還朝政遇堯年鶴髮俱宜頂道冠乍到林泉能放曠全拋簪紱尚盤桓君恩至重如天覆相座時親畏地寒九老且無元老貴莫將西洛一般看馮平駕部郎中詔恩分務許幽間肯借留都獬豸冠名宦倘來空擾攘丘園歸去好盤桓醉遊春圃煙霞暖吟聽秋潭水石寒退傅况兼為隱伴紅塵那復舉頭看鄉有好事者出君謨行草八分書數幅中有梅聖俞詩一首用成拙句以識二分莆田筆健與文豪尤愛南山縣詠髙欲使英辭長潤石每逄佳句即揮毫清如韶濩諧音律逸似鸞皇振羽毛羲獻有靈應悵望當時不見此風騷寶林寺後改為應天寺天寧寺光孝寺在越州府城中懷無絆外緣間深掩禪扉客到難勝景可曾飛錫去好山多秪捲簾看晝升講座天花落夜步吟軒海月殘今日逢師堪論道歸心愁思一時寬新居感詠無似老且病惟恐歸田遲一旦得引年九天還聽卑尚霑二品祿俾盡百年期恩深淪骨髓感極橫涕洟始營菟裘地來向濉水湄城隅最窮僻匠者寧求竒卜築悉由已軒牖亦隨宜外以蔽風雨內以安妻兒燕雀莫羣噪鷦鷯才一枝因念古聖賢名為千古垂何嘗廣居室儉為後人師亞聖樂簞食寢丘無立錐文缺防勢奪去病恥家為文園四壁立鄭公小殿移伊余具員者適會承平時無術毗萬務無才撫四夷為郡亦齪齪勞心徒孜孜保身已天幸拊已宜自知開卷顔間厚復懼來者嗤朂哉知止足清白猶可追幽居即事寂寂復寂寂告老間居日徑草髙於人林鳥熟如客黃卷不釋手清風常滿室內顧平生心無過此時適逺蒙運使度支以資政范公所寄黃素小字韓文公伯夷頌許昌文公淮西富公題詩於後才翁復綴雅什兼寄長安晏公公亦有作衍久兹休退人事僅廢不意雅故未遺悉以副本為貺俾愚繼之對此怔忪既感且愧率成拙句奉呈敢言亦驥之乘聊為續貂之比耳希文健筆鈔韓文文為首陽山下人寧止一言旌義士欲教萬古勸忠臣頌聲益與英聲逺事迹還隨墨迹新當世宗工復題咏尤冝率土盡書紳林下書懷從政區區到白頭一生寧肯顧恩仇雙鳬乘雁常深愧野馬黃牛亦過憂豈是林泉堪佚老只緣蒲桞不禁秋始終幸會承平日樂聖唯能擊壤謳和孫圭祕丞老來楷法不如初試向間齋習草書落筆何曾見飛動雕章早已過吹噓兩宋名賢小集卷六十九
