body:
  text: 兩宋名賢小集巻六十九宋陳思編元陳世隆補杜祁公摭稿杜衍字世昌山隂人登進士甲科歴官至集賢殿大學士兼樞宻使進太子太師封祁國公卒年八十贈司徒諡正獻咏蓮鑿破蒼苔漲作池芰荷分得緑參差曉開一朶煙波上似畫眞妃出浴時雨中荷花翠盖佳人臨水立檀粉不勻香汗濕一陣風來碧浪翻珍珠零落難收拾睢陽五老圖杜衍八十嵗王煥九十嵗畢世昌九十四馮平八十七朱貫八十八五人四百有餘嵗俱稱分曹與掛冠天地至仁難補報林泉幽致許盤桓花朝月夕隨時樂雪鬢霜髯滿座寒若也睢陽為故事何妨列向畫圖看附諸老詩王渙渙一作煥禮部侍郎分曹歸政養耆年李下何由更整冠賢相賦詩同笑傲聖君優詔許盤桓龎眉老叟俱稱壽凌雪喬松豈畏寒屈指五人齊五福鄉人須作二䟽看畢世昌司農卿菲才最忝竊高年分務由來近掛冠敢造鉅賢論軌躅幸依都府得盤桓篇章奉和慙風雅眷待優隆荷嵗寒儻許衰顔參盛列願憑繪事永傳看朱貫兵部郎中各還朝政遇堯年鶴髪俱宜頂道冠乍到林泉能放曠全抛簪紱尚盤桓君恩至重如天覆相座時親畏地寒九老且無元老貴莫將西洛一般看馮平駕部郎中詔恩分務許幽閒肯借留都獬豸冠名宦倘來空擾攘丘園歸去好盤桓醉遊春圃煙霞煖吟聴秋潭水石寒退傅况兼為隱伴紅塵那復舉頭看鄉有好事者出君謨行草八分書數幅中有梅聖俞詩一首用成拙句以識二分莆田筆健與文豪尤愛南山縣詠髙欲使英辭長潤石毎逄佳句即揮毫清如韶濩諧音律逸似鸞皇振羽毛羲獻有靈應悵望當時不見此風騷寳林寺後改為應天寺天寧寺光孝寺在越州府城中懐無絆外緣閒深掩禪扉客到難勝景可曾飛錫去好山多秪捲簾看晝升講座天花落夜歩吟軒海月殘今日逢師堪論道歸心愁思一時寛新居感詠無似老且病惟恐歸田遲一旦得引年九天還聴卑尚霑二品禄俾盡百年期恩深淪骨髓感極横涕洟始營菟裘地來向濉水湄城隅最窮僻匠者寧求竒卜築悉由已軒牖亦隨宜外以蔽風雨内以安妻兒燕雀莫羣噪鷦鷯才一枝因念古聖賢名為千古垂何嘗廣居室儉為後人師亞聖樂簞食寢丘無立錐文缺防勢奪去病恥家為文園四壁立鄭公小殿移伊余具員者適㑹承平時無術毗萬務無才撫四夷為郡亦齪齪勞心徒孜孜保身已天幸拊已宜自知開巻顔間厚復懼來者嗤朂哉知止足清白猶可追幽居即事寂寂復寂寂告老閒居日徑草髙於人林鳥熟如客黄巻不釋手清風常滿室内顧平生心無過此時適逺䝉運使度支以資政范公所寄黄素小字韓文公伯夷頌許昌文公淮西富公題詩於後才翁復綴雅什兼寄長安晏公公亦有作衍久兹休退人事僅廢不意雅故未遺悉以副本為貺俾愚繼之對此怔忪既感且愧率成拙句奉呈敢言亦驥之乗聊為續貂之比耳希文健筆鈔韓文文為首陽山下人寧止一言旌義士欲教萬古勸忠臣頌聲益與英聲逺事跡還隨墨跡新當世宗工復題咏尤冝率土盡書紳林下書懐從政區區到白頭一生寧肯顧恩仇雙鳬乗雁常深愧野馬黄牛亦過憂豈是林泉堪佚老只緣蒲桞不禁秋始終幸會承平日樂聖唯能擊壤謳和孫珪秘丞老來楷法不如初試向閒齋習草書落筆何曾見飛動彫章早已過吹嘘兩宋名賢小集巻六十九
