body:
  text: 兩宋名賢小集卷一百八十八宋陳思編元陳世隆補捫膝稿喻汝礪字迪孺蜀之仁壽人第進士靖康中官祠部員外郎金人議立偽楚汝礪不為屈遂歸隱於邛山之陽自號捫膝先生有捫膝稿遊海雲山渺渺天宇初便復有此山清晨及兹遊遐想百代前來者幾何人當時各為歡淑質揚妙舞哀絲遞清彈樂事坐如昨芳嵗已屢殫向來所遊人落葉不復還迥然散逺目感之為長嘆竹林遙舊所鵲巢豈昔眠念誰常久存而不任所緣破涕聊一怡山川却萋妍未知後世事誰復當來旋過府學遂謁文翁堂緑荻負幽隱髙槐泛輕涼各誇一時好披風互低昂詎知五月中微隂忽催黃我行魯侯宫獨謁文翁堂若人骨已朽道在斯不忘遂令蜀文章照耀日月旁世事俱腐臭斯文真久長靡顔能幾時蕭條翳墟荒富貴豈不好千載同一場三嘆過泮宫撫已涕自滂清晚坐四天王院杳杳天宇涼月墜星亦稀朝暉下簷隙逺色開林扉寂坐無物役隱几或在斯曠焉耳目清擬覺形神歸溷世迹若近抱沖心獨微故殿經幾年何人所摹規當時亦姱嫮作者良已罷快意取一好於身亮何私不知壯觀地徒使來者悲坐頃又成昔日安知今是非登正法宫塔踈雨洗空濶髙標插青冥携笻一來登長嘯謝所攖清香翔逺江丹氣舒翠岷雪嶺浮夏白澥雲亦逺青孤花裊危芳初篁羅新榮手容五十里颯沓為我陳陵坻漭變遷物狀幾屈信念往思自逺感來意彌臻傷哉千里心嗟爾百代人胡為軫其德戚戚勞所營吾請以此辭歸來巖下耕遊西臺院暑雪軒觀石鏡城中苦伊欎兹軒獨髙鶱連甍動參差錯畦橫阡眠雪嶠正孤峙若與我周旋逺翠浮蕩漾輕鷗下聮軒密竹罥幽徑新蒲淡清漣初遊愜餘懷既久幽念攢慨彼泉下人灼灼夸令顔忽然墜榛莽窈窕不可援一鏡空復情况乃塊石頑哀哉彼愚子婉孌情所牽差勝茂陵公更咏方士言遊嚴真觀支機石而壁有記古鼎丹茅事古木共幽意長廊亦晏如於焉詠逍遙且復散衣裾塵慮颯已空道心頗閎舒不知度世人去此嵗幾徂云何有丹砂尚爾留庭隅支機亦悠哉誰復訂有無我知此公意慨彼元鼎初繼之五鳳問斯民斃刀鋸聊欲謝世網􅘒以道自娛抱獨理自會曠懷遺所拘初匪逃世人而世自我疏含默念斯人起我憂患餘謁諸葛廟孤雲何其髙明月不可繫灼灼抱此心與世自涇渭適來從所歡感亂亦歔欷咨惟今之人竊國未云耻匕首入吳市秋風動燕水區區袁與曹等是刺客耳而我於其間秉義不敢墜哀音回衝飇清義動幽邃天心固難亮吾獨信所履溶溶日間雲漠漠苔點砌飢鼯墜蒼瓦淡薄公所憩靜然相英姿孤懷亦差慰謁江瀆廟坤軸東南傾大江日夜注前驅下荆巫餘濤略吳楚任勢不期勞得意緣所遇水也初無營神哉亮誰主芳蘭沉清華碧草舒翠縷晨鵠戲野岸春鳬集深渚均是得所安而神豈私汝古來幾精魂捨此迷所處淫遊不知還沙村失煙樹而我後千載悠然在江滸抱嗇貴無競矜名忌多取冥冥罨岸風淫淫打船雨舞雪窺洪濤開蘋渡前浦再拜謝神貺聊復隨所住子雲墨池讀書豈不好憂憤還自兹書中見古人隱閔惻餘思遇險理有激尋分意多隨娟娟感姱容戚戚念幽棲曽是無間然孰焉愜所宜覽之不自聊悵然起遙悲不如撥置之濁酒聊一持先王頗多事斯心昧前知亦復坐竒字慘然亡所歸晚泛浣花遂宿草堂扣橈泛澄虛濯流睇幽芳晚霙襯竒樹夕霏媚踈篁歸鳥亦暫間夜魄動初涼忽焉衆星微天髙月舒光昔也杜陵子淡然此茅堂客至酒自斟句得意已忘云何常念飢零落在道旁古來技入神一飯豈所望吾輩天所窮慨歌淚霑裳遊琴臺臯朔語類俳上頗倡優之嚴吾數預事慘凛失所棲眷言彼姝子深情結幽期浩露泛酒甕輕雲思琴徽撫絃視八荒頗覺秦岫低紛紛漢諸子悟解良獨遲一朝不自保頸血霑裳衣公豈不炯戒慮禍蓋已微汚已迥前識達生邁天倪濶哉昭曠情豈屑後代嗤草堂詩燦燦詩翁錦里西只緣詩好遂窮棲竹鋪冷色雲連寺桞漾晴絲鳥過溪凝怨不禁關樹暗駐情應恨蜀山低離人苦怕春歸盡可忍紅英半著泥間把煙光次第陳岷峨風物見精神翻成錦繡千般樣供與江山幾處春深屋長河元老大蛾眉曼睩却逡巡從公乞取無邊手免作詩中半箇人從教日日敞忩扉嫌怕風光入眼遲剩買芒鞋供看竹趂乘春雨去裁榿苦無賔客僧來後薄有生涯鶴下時聞道鄰翁酒初熟新篘一酌莫相遺逺嶼曲洲縱復橫沙邊繁鳥弄簫笙一軒簷冷松隂合十里林香藥草生路轉斷楂逢石坐風移深一作密竹見僧行晚來沖抱更清曠時有幽人帶月耕亂後飄零歇此身風光無賴更清新客懷易感酒添病詩思苦慳花減春南枝北枝鶯舌巧前村後村雨腳勻暫借溪邊老為客花心桞眼莫撩人朝元閣邊瑶草芳惟君之故遙相望人歸後雁關塞阻思入南鳬離夢長懸知同心兩相憶剩欲共看千里光金輿玉輦不復見腸斷華清雲樹蒼竹外清疏侵碧溪溪邊竹淡煙雨霏間看雪嶺題詩罷醉散西郊信馬歸霄漢直愁雙闕迥夢魂長著五陵飛故園秀木又春色只恐歸去池臺非錦宮城西春草芳杜陵客子憂思長浴晴晚樹淡浮緑卧水幽花深度香交情憫憫言燕阻舊國迤迤雲山蒼白蘋洲渚落日晚明邊正銜歸鴈行浣花四月天氣和綵舟翠旗樂莫過離人千里起遙怨緩棹一曲浮靈波惠風曇曇泛蘅杜流雲演演逾關河終然有懷春復夏歸去灞滻眠汀莎題周昉美人拜月圖東風原自無消息獨捲珠簾望春色風驚紅葉墮珊珊夢斷行雲泣殘月挹挹柔情不自持此心端被月先知窺忩入户如相伴應是嬌娥慣别離兩宋名賢小集卷一百八十八
