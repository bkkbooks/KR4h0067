body:
  text: 兩宋名賢小集卷六十八宋陳思編元陳世隆補五桃軒集夏倪字均父蘄州人英公之孫宣和中自府曹左官祈陽監酒有逺遊堂集題宗室永年畫犬圖公子朝回玉宸裏戲弄丹青歌扇底興來貌寫到濃氂拳尾如搖欲投胔豐顱闊腋偉骨相縱逸未饒盧鵲駛庭除夜間春尚寒屈藏短喙眠朝暾其一狺狺口若吠欲前却立客在門俗言犬馬最難畫衆所共識誰面謾非如鬼物隱幽眇反覆醜好懸毫端紛紛衆史坐嘆息筆仗突兀不可扳乃知心匠本神授以心運手不作難我家敗屋依破垣偷兒踏瓦驚夜眠四壁雖如長卿第舊物猶存子敬氊就君乞取挂墻壁端能警我窺窬客跋聚蟻圖紛然蟲臂蟻爭環付與髙人一解顔不待南柯婚宦畢始知身寄大槐間和王子飛題李伯時畫列子御風圖道師形氣合於無八極超搖得自如知我御風風御我長袪獵獵自乘虛次韻題歸去來圖階亭午景負槐隂空齋初罷戲五禽沔州太守致音問啓讀乃有歸來吟先生抱道肯乞憐凛凛有面方如田何能為此五斗粟折腰鄉里小兒前顧視銅章等涕吐賦歸唾詞如涌泉龍眠居士歎豪逸想像明窗戲拈筆翕忽英姿來筆下如恐超起將羽化吁嗟能事詎可疇一見公詩如見畫惜哉道逺莫可致強欲賡酬抽鄙思韻絶難追神易倦使我空然汗顔面他日從公會借觀錦囊捧出春筍寒次韻漢陽蔡守題陽關圖君不見季子敝盡黑貂裘一生車轍環九州使之負郭有二頃未必肯相六國侯此郎亦復何為者浪自出入不肯休東風夾道羅供帳倚馬欲行那得上緑尊翠勺浩縱橫四坐哀歌互酬倡隂雲漠漠天四垂行子多著短後衣金羈滴瀝鳴翠弭負屩蹶倒從盧兒漁舟微茫出浦溆逺山無數迎修眉傾曦馱醉出關去縱有離愁渠得知長安春色濃如酒乃向斯時别親友可憐兒女浪苦辛奔走功名逮華首濁醪百榼胸崔嵬暮色慘慘羇鴻哀羊腸鳥道天尺五爾獨胡為來此哉水有蛟龍獰口眼陸有兕虎潛岩隈嗟爾遊子不顧返冨貴有時終自來兩宋名賢小集卷六十八
