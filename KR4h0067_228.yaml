body:
  text: 兩宋名賢小集巻二百二十八宋陳思編元陳世隆補野谷詩集趙汝燧字明翁汴都人寜宗初登進士第授館職開禧丁卯被劾去官嘉定中起為鎮江筦𣙜分司筦𣙜舊用武目時更以文臣邑最之人汝燧預焉嘗蓄東坡書少陵夏夜歎蜀人趙子雲畫李杜像及古琴一張命曰三珍出入每攜以自隨有野谷詩集六巻荆渚書懷明鏡明於月白髮白於雪月照雪轉添使我心斷絶連年事行役曾不須臾歇陟岡脚雙繭凌湖舟一葉五覿君山面洪濤漲天濶重倚南樓欄逺雁逐雲滅西風落破帽龍山酬九節揺鞭荆門去䝉泉弄清潔遊觀固不惡奔走計則拙眼指數千里意行遂休轍困翮墮渚宫因循入覊紲天涯寒苦早袖穿手龜裂村酤酒力薄連釂耳方熱矯首飛白雲杳杳望呉越儒冠信誤身鑄盡六州鐵小山寺披霧入野寺寒林響西風誰遣僧出迎山鳥為我通染衣松露香照眼巖花紅聊此息塵慮歸騎毋悤悤題王才叔南館南館著隱士幽爽似僧舍島紅野花繁岸緑垂楊亞人行鳥不驚客至鶴先迓林深自無暑月到更疑夜傾樽對聖賢飛筆追鮑謝興來即散䇿無時不得暇晚晴與何尹登水亭簡張丞溪流兩岸秋日落千山暮一亭壓其間登覽洗萬慮胸襟富丘壑方領此幽趣擲餌來潛鱗圍碁驚過鷺酒壺展逸興漁唱續逺浦安得哦松來撚髭同覓句訪隱者不遇兩腋乘西風送我上髙岑竹根一泉通石徑萬木森中有隱者居敗屋莓苔侵山空人不見雲滿挂壁琴兩鶴出候我逢迎啄衣襟應酬久頗厭走避不可尋誰伴山下去明月升高林翁媪歎早疑是旱曦赫空歳不熟炊甑飛塵煮薄粥翁媪饑雷常轉腹大兒嗷嗷小兒哭愁死未死此何時縣官賦不遺毫釐科胥督欠烈星火詬言我已遭榜笞壯丁偷身出走避病婦抱子訴下淚掉頭不恤爾有無多寡但照帖中字盤雞豈能供大嚼杯酒安足直一醉瀝血祈哀容貸納拍案邀求仍痛詈百請幸聽去須臾衝夜搥門誰叫呼後胥復持朱書急急符預借明年一年租耕織歎春催農工動阡陌耕犁紛紜牛背血種時已徧復耘耔久晴渴雨車聲發徃来邏視曉夕忙香穗垂頭秋登場一年辛苦今幸熟壯兒健婦爭掃倉官負私負一作債索交至勺合不留但糠粃我腹不飽飽他人終日茅簷愁餓死詩中不見織婦意似别有一首而遺之荆門行開禧丁卯被檄一相視荆門闗隘去年曾問荆門途雞鳴犬吠民耕鋤揺鞭重來意慘淡前日井邑今丘墟雲昏雨澁初堆碧四野荒荒人跡疎深山扶攜皆露處骨肉蕩没况室廬老農無力倚林卧少定舉首來向余官人且坐待儂説未説涕泗先横裾老夫老豈識兵革忽見逺近皆賊奴懸崖絶壁魚貫進飛鳥下上爭馳驅吾軍非是無身手未鼓棄甲先奔趨時平廩帛官不計戰勝爵賞官不辜進怯鋒鏑退焚掠賊既難堪堪汝乎歸來未暇正其罪官有金幣還招呼老夫莫曉軍旅事但聞敗䘐聲嗟吁我聽其言為蹙額含悽獨下西山隅金蓮似恨殺氣繞䝉泉未洗血水枯九秋半破明月夕照我孤憤行繞壁天子嘗膽方仄席微臣敢作楚囚泣秋風一劍樓蘭國古劍歌洞庭湖漁人得古劍於網中張倅得之以遺予時開禧丁卯春館於岳陽樓邊事方急洞庭吞天天無風月印一鏡星涵空波心千尺光五色漁人嘖嘖疑垂虹睨而視之寂不見舉網下罩追竒蹤須臾雷轟怒濤吼鼓蕩六合天溟濛所得非魚亦非龍炯然三尺貫當中肉銷骨立精氣融鏗鍧其聲韜其鋒越砥稍稍加磨礲壯士見之肝膽雄雷煥已死不可起有誰解識斗間紫人疑龍泉或太阿萬古凡劍空一洗倚樓西北望邊城連月亘天烽火明隱憂枕上思請纓夜半躍鞘牀頭鳴夢中見告若有神吾價豈但直百鈞一作金吾勇豈但敵一人知君素有擊楫中流心誓當助君報國萬里靖烽塵去婦詞入得良人門自誓終此身掃室擁箕帚進盥躬盤巾采桑趨壠首薦蘋潔澗濵十年盡婦道惟恐堂上嗔上和下睦本無事一旦小姑恣萋菲浸潤既深貝錦成不棄不出譖不已良人繾綣心自知父母之命安敢違舉頭天邊指缺月暫缺須有團圓時君不聞章臺長條依舊垂樂昌半鏡還復歸瑶娥曲一二三四月如眉積累如梳截半規玉斧晝夜修不徹修伐疑當作成團鏡當空垂十眉有様列象几梳裁春氷鏡涵水瑶娥睡起拂菱花埽黛揷鬢雲繞指斂袂亭亭天上糚環珮隱體璆琳鏘驂鸞跨鶴舞仙譜子登彈璈飛瓊簧天風颼飀冷到骨銀河澎浪濺羅襪一輪千古廣寒深折盡桂花應白髪斷腸曲凭欄日日望歸騶書來又報瀟湘遊巻書黙坐淚如雨彈向花上花潛愁想郎快意揚州鶴風光何地非行樂妾腸寸斷郎豈知獨步苔階空聽鵲風撼碧紗夜牕深弄針燈下無心情蜀羅一段絨五色看定鴛鴦繡不成妾貎留春春要去糚鏡孤鸞無力舞轆轤吚啞殘夢驚曉嘶似是郎馬聲巻簾無人簾再下遣童水東占打瓦征婦歎蓮浴雙鴛鴦梧棲雙鳯凰雙舞蝶度牆雙飛燕歸梁倚欄人顰翠忍涙心暗傷閉戸簾幃悄孤燈耿空房欲睡睡未得獨坐理絲簧彈吹不成調征夫天一方寄逺曲君馬踏邊塵繡幃妾一身仰天無過雁俯水無游鱗酒難獨自酌蟻樽空浮春食亦不知味駝峯徒薦珍憶昔送君君已醉醉言更戍一年事兜鍪北去幾寒暑兩地肝腸摧萬里别來容貎似舊無寄去衣裳知到未折柳絲絲紫塞心對花片片青春淚夜聞琴瑟鼓鄰家人皆齊眉老年華不忍恨君翻自恨長吁矯首天之涯幾度虛傳歸信息愛聽乾鵲怕聽鴉孤枕有時髣髴夢中見覺來霜角咽梅花短歌行赤龍駕輪飛上天倐東倐西晝夜旋流光萬古去不返少壯翻手成華顛閬風層城羽衣仙方瞳緑髮耕芝田玉樓貯春春不老蟠桃一熟三千年我欲訪仙弱水隔住世奈此急景煎茫然無計相留連打屏萬事不放在眼前左杯右蟹拍浮百斛船漁父四時曲春霽江浮春新水肥鱗鱗鴨緑東風微波心上下舴艋滑釣車香餌巻落暉纎鱗噞喁錦穿柳半留賣錢半换酒爛醉茅簷紅杏家折花簪髮把兩手沙岸尋芳青驄嘶彈絲吹竹挾蛾眉笑指漁父何寂寞漁父掉頭我自樂夏烟溪流碧浸炎空滌濯袢延蒹葭風大港小港凉世界隔堤荷蕩香到篷儂家生長舟一葉豈識人間半㸃熱青笠緑蓑山雨來雨過波平夜撑月水亭避暑冰玉肌枕設珊瑚簟琉璃笑指漁父何辛苦漁父掉頭渾不顧秋新雁銜秋訪水涯分屯洲渚傍蘆花停橈相釣結溪社來徃無嫌同一家酒酣把笛吹村曲聲曳蘭花入山腹釣竿到手萬事輕孰是孰非孰榮辱江樓邀月粉黛濃簧璈嘈雜徹桂宫笑指漁父何冷落漁父掉頭我豈錯冬六花坼凍雲糢糊釣鈎空擲寒無魚繫舟枯柳歸茅舍撥火煨薪擁地爐賖鄰一榼醅醱玉老稚分霑春囘谷重來解纜放夜筒横風打向别港宿溪館對雪歌妓圍釡出駝峯酒羔兒笑指漁父何憔悴漁父掉頭但稱醉飲通幽園典却上身鷫鸘裘買酒領客尋清遊欲洗胸襟塵萬斛快上青雲展秋眸晴沙翳天風動地挈壺巻席移通幽一奩鏡凈清可掬千竿玉立塵不留拒霜兩岸花爛漫紅蓼錯雜爭開秋人生適意未易得癡兒了事何時休陶寫豈必在絲竹山有鳴禽水游鯈酒酣題蕉競新句景物辟易困雕鎪一梳凉月揷空碧樓頭暮角催歸騶雙桂餘葩尚堪摘便道肯訪勿剪不贈隱居遶屋垂垂柳當軒小小江買漁尋晚釣浮蟻倒春缸山近雲侵座月來柳映牕隱居誰似子不羡鹿門龎倚樓蒹葭秋色晚百尺倚江樓日暗烟藏寺風髙浪拍舟歸雲投逺嶺饑雁叫滄洲心事非年少塵埃白盡頭舟中繫纜停征棹斜陽古渡頭風霜先逺客天地獨扁舟水鳥衝開浪汀鴻占斷秋在家貧亦好何用出林丘夏日普信寺江閣到此全無暑虛欄千里風看飛雲渡水聽落石鳴空日月忙烏兎春秋遞燕鴻一生塵裏過烟艇羡漁翁過寳雲寺訪密師寺纔二三里曳杖且徐行晴塔松梢見風鐘嶺半鳴樵夫分道過僧子就房迎竹有千竿立塵無一㸃生信步午牕方睡起信步過東畦穴徙蟻知雨巢穿燕補泥路坍連草没果重壓枝低村婦抱兒子籠邊教喚雞送彦東還湘湘南多爽處羡子片帆還秋影清涵水烟痕淡著山蘭風香楚珮竹淚冷湘斑見説誅茆地江頭只教閒宿方家店昏暮方投宿敢嫌茅屋低池深月易入林密鳥爭棲買酒春篘甕求蔬夜摘畦路長莫貪睡囑僕早聽雞暮行江上江天詩眼濶沙岸暮扶藜風怒來帆卸林昏宿鳥迷問魚前港有沽酒小童攜夜客留同飲添杯剪韭畦遣興愁來無可奈散䇿小橋東影轉松隨日香殘花怯風烟霞詩興裏天地酒杯中本是江湖客生涯付釣篷次莊過荆渚以詩寄之澤國遥千里風帆隔兩州醉行沙市月吟破渚宫秋魚歎馮驩鋏貂殘季子裘人傳君入蜀無事早歸休劉簿約遊廖園名園新整頓尊酒約追隨春晚花飛少牆髙蝶度遲注湯童煖酒拍案客爭棋寂寞鞦韆索無人盡日垂秋夜懷歸鄉里千山月塵埃兩鬢星秋聲雖是爽客耳不堪聽多淚風前燭孤眀竹外螢吟蛩更無賴終夜幾曾停宿古寺黄昏投寺宿古屋瞰荒江村酒沽春甕山房耿夜缸灘髙聲撼枕月落影收牕僧老人皆翫樓鐘曉未撞舟中離家俄十日千里獨衰翁篷響過雲雨帆開逆水風新沙增岸脚小港隱蘆叢客思難消遣黄昏月一弓東村晴久全無雨溪乾半是沙風横分雁陣日轉趣蜂衙地僻草埋徑籬摧菊卧花橋西一林竹瀟洒兩三家醴陵道中入得湖南界皆嫌堠子長烟巖松葉暗風陌稻花香橋斷人迂路車鳴水巻塘宿程雖不逺木杪已斜陽日融日融風力軟曳杖獨逍遥蜂去花心靜鶯遷柳影揺一年春易老兩鬢雪難消客至時留飲無縁特地招范園避暑六月暑如炊追凉此地宜棹舟荷柄颭坐石竹陰移籌貫壺雙耳鼎烹茶一旗小童供筆硯醉客競賡詩常山道中寒謝春纔展悤怱二月中筭來晴幾日多是雨兼風烟草迷春碧山桃夾竹紅浮名能役我䇿馬幾回東夏夜今夕暑差甚芒鞋階下迎除燈簷月上却扇竹風生病骨坐難久靜吟詩易成夜凉思睡去樓鼓已三更乍晴日色今朝稳園林二月中池塘展暗緑桃杏鬭春紅犯險升高徑扶衰藉小童黄鸝怕人見飛過野橋東江閣夜小閣臨江迥疎簾帶霧鉤雲鴻遥影滅灘月碎光流詩思偏宜夜衰髯不耐秋漁燈三兩㸃隱隱荻花洲聞舟中笛横笛秋篷底銜山夕照殘孤音起水面餘韻到雲端吹怨蘆聲慘含凄雁影寒有人江閣上斂翠憑闌干過曹家渡數篙撑過渡雨後水添肥山橘青迷樹野花香襲衣哀鴻悽逺客鬭雀墮斜暉童稚喧林壟牛羊箇箇歸早征店雞一唱接疎鐘起整行裝尚夢中沙路踏殘征馬月柳隄啼斷曉鶯風水肥渡險添舟子岸没途窮問牧童千里鄉人逢陌上片時握手各西東縱步久雨厭人妨野步幾時便得此畨晴到橋喚僕來相助過寺逢僧約共行籬落一團飛蛺蜨汀洲數㸃立鵁鶄農家竹裏深深住風度茅簷紡織聲題合江亭石鼓山頭一小亭乾坤萬里眼雙明雖因刺史能尋勝不遇昌黎豈得名衡嶽雲開天洗碧蒸江湘合水爭清書巖莫辨當時字空積塵泥野草生昌黎有題合江亭寄刺史鄒君詩末有願書岩上石勿使塵泥涴之句崇真觀東軒東軒水面枕山阿左右雲烟濕翠蘿風度鶴聲聞逺壑日移松影轉前坡愁來獨靠清尊遣老去休憎白髪多道士罷琴揮醉筆詩成自喚小童哦黄幹見約小飲就宿病後何人慰寂寥長鬚持簡忽相招溪山見説為樓爽杖履寜辭去郭遥柳絮一天晴舞雪松聲十里夜聞潮談詩直到疎鐘動酒困頻將茗椀澆懷亨父兩年隻影瀟湘去料想塵埃白髮侵久雨千山秋得意西風一雁客闗心或於夢裏陪談笑每向人前問信音憶昔賡詩岩桂下花開今日歎孤斟題㑹稽用林帥侍韻東越乾坤到眼邊亂雲連壑草迷川五更城落千岩月萬頃湖開一鏡天鼓角聲殘秦望曉樓臺影濕卧龍烟舊時太史登臨處每想風流為慨然登樓地卑梅雨濕氣壓篆烟低孰是披襟處高樓百尺梯苦吟幾度燈花落苦吟難便成寒牕明月滿樓上打三更尋勝老子攜笻杖小童挑酒壺徧尋泉石勝引路倩樵夫傷春飛蝶捎風絮鳴禽戀午簷不知春去未但見柳陰添半夜坐久香消篆更長燭屢花一輪觀浴兎兩部聽鳴蛙山寺樹暗常疑夜山多易得雲撞鐘最深處嶺外不曾聞題莊舍壁水深荷較晚地僻草偏多佇立風前聽樵夫隔隴歌後圃澆花惟要早芟草不知名新竹生來巧南塘補數莖秋夜秋到情懷惡美人天一方夜深牕轉月夢斷角吹霜夢回春意已深寒未了夢回斗帳房櫳悄五更五㸃殘月消山鳥一聲先破曉倚䦨倚䦨有恨無人説暮角吹梅寒聲咽急風巻雨過鴻驚吐下蘆花一枝雪兩宋名賢小集巻二百二十八
