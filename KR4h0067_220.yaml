body:
  text: 兩宋名賢小集卷二百二十宋陳思編元陳世隆補勉齋先生集黃幹字直卿閩縣人父瑀高宗時御史以篤行直道著聞幹師朱晦翁晦翁嘗曰直卿志堅思苦與之處甚有益遂以女妻之晦翁臨殁出所著書授幹曰吾道之託在此幹初監嘉興石門酒稅歷官臨川漢陽安慶皆有善政在位者忌其聲譽羣起擠之歸里弟子日盛稱勉齋先生諡文肅石門吳越天下富京畿遊俠鄉隴畝盡膏腴第宅皆侯王世言蘇湖熟霑溉及四方自我來石門觸日何淒涼清晨開務門有酒誰復嘗纍纍挈妻子汲汲求糟粳父老稱近年十載常八荒聚落成丘墟少壯爭逃亡崇德憫雨四首檣頭五雨搖空飛船頭百丈牽何遲數篙塘水清可涉故鄉千里歸何時塘中龍骨高數層龜坼田中縱復橫青裙箬笠倚車臥但有空車無水聲牛女盈盈河漢傍清風肅肅吹羅裳朱門逹旦聽歌曲莫遣濃隂蔽夜涼老夫年老百不悲夜聽羣兒聲吾伊呼童握手長太息不見儂家數口飢喜雨四首用前韻莫愁塵土壓天飛六月栽禾未是遲待得麥麻收拾後通宵好雨定何時雲霓天外起層層畢月相隨徹夜橫費得天公能幾力數州愁苦變歌聲睡覺歌聲古道傍有人終夜攬衣裳牀頭斗酒聊自酌不為書窗一夜涼山中書生休浪悲燮調自有臯與伊清香一瓣來天竺更把民飢作已飢答曾伯玉借長編白露下百草迅商薄修林幽人起長歎感此節物深攬衣自徘徊撫劔還悲吟丈夫各有志莫作兒女心涉逺當疾趨畏影須就隂願言理輕車去上南山岑九日早發桃枝嶺登山豈不樂况此風露清排簷夜雨滴詰旦天空明歡然金石交要我林泉盟支笻趂汗漫勇往不計程一水何縈紆千峰鬱崢嶸仰視臨雲馳俯聼幽壑鳴班荆得所適斗酒聊共傾人生會有纍聚散如浮萍今晨諧勝逰異日難忘情意愜各賦詩庶以紀此行道間觀瀑布行行益以逺愜此心期幽一徑險復夷千林密相樛回首天際山矗靣懸飛流銀潢倚石壁玉龍下山湫光搖日璀璨勢激風颼飀可望不可親神往形獨留眷言桃枝山久懷卜築謀豈無一日間努力窮冥搜侍文公飲浮翠用劉叔通韻涼風振幽壑隂雲翳前山高懷勵清秋適意林莽間煙橫萬家井水淨雙溪灣徙倚暮忘歸人境相與間逰子獨何為千里方言還陪此杖屨逰忘彼道路艱心期更他歲依嵓結柴關與胡伯復白露下百草玄雲翳崇岡逰子暮何之倐若孤雁翔朝發長沙渚夕息湘山陽飛鳴念儔侣慷慨增悲傷故人懷我深逺寄金玉章開緘且疾讀慰此飢渴腸是時日中火朔風掃枯黃歲月能幾何臯蘭結微霜脂車䇿良馬日暮道正長徒僕審驅馳前途畏榛荒劣質若難任白雲懷故鄉南山一舍隔矯首空西望送章元德司理罷官歸永嘉送君北門坂遙望東甌路峩峩白鶴嶺渺渺飛鸞渡上有虎豹嘷下有蛟龍怒車馬堅且長維楫夙已具褰裳涉其險萬怪不足懼世路劇羊腸皎皎誠易汙但能心無愧窮逹安所遇毋為婉孌者暫蹶輒驚顧生平麋鹿姿處世歎多忤胡為展良覿握手便如故高懷發針石正論諧韶濩情親復告别欲語誰與晤乾坤一逆旅日月雙脫兔寒儒守蓬蓽白首困章句期君以逺大庶足慰遲暮慶元己未冬至前二日訪林公度至栗山翌日同訪吳必大林季亨容之偕行愛其溪山池亭之勝為之賦詩篝火下修嶺褰衣涉清川夜投故人廬洞壑藏真仙一水逺縈紆兩山對蜿蜒但見煙雲深不識車馬喧主人敬客至杯酒羅堂前諸孫競勸酬烹羊雜雞鮮同來二三友妙語爭春妍此會良獨難逹旦不復眠雞鳴秉獨逰到君新池邉中有讀書堂藏書更精研把筆紀名姓徘徊悵無緣天明驅車去去上層岡顛回首三歎息安得數畝田結茅與君鄰嘯傲終殘年過翠微古寺殘僧少孤村碧樹圍明朝山下路愁絶望煙歸兩宋名賢小集卷二百二十
