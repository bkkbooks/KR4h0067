body:
  text: 兩宋名賢小集卷一百八十九宋陳思編元陳世隆補竹溪集李彌遜字似之蘇州吳縣人登大觀二年進士第調單州司户政和間纍官起居郎以封事剴切貶知廬山縣改奉嵩山祠靖康元年召為衛尉少卿紹興七年遷起居郎自貶後二十餘年復居是職直前論事鯁切如初時秦檜秉政主和議彌遜力爭之因是落職退居十餘年紹興二十三年卒髙宗詔復敷文閣待制有竹溪詩集十卷自毗陵與兄弟避地南來約為連江之歸中余各以事留遂成獨往念兹離亂易於隔絶作詩兵塵暗中原大駕巡江都春風遂南渡百辟咸奔趨衣冠困陵暴川陸紛舟輿微生本萍寄寧復安吾廬褰裳犯深險顛仆妻與孥懷恩痛未報無路先貔貙岩穴多遺賢天網固亦疏驊騮懼捐棄未數十駕駑銜悲望君門忍作永訣圖扁舟兄及弟去指東海隅夜榜亞修舳曉帆趂橫蒲如何忽參商行止分半途怡怡風月夕來若同隊魚慘慘霜露秋去如獨翔鳬嵗晏道路長雙影誰與俱但憂赤眉間能致黃耳無青燈攪寒夢起坐中腸枯載歌鶺鴒詩引淚零襟裾同天隱少章遊嵩山懷元明秦公我輩士早踏翰墨場萬言若投石十年猶枯囊苦欲泛江海有親在髙堂牢落京華春門無一壺漿長鞭䇿瘦馬送我古道旁憐我值險艱赤心寫摧傷鏗鏘五字句勢與雕鵬翔感此坐矯首星星鬢成蒼西風小搖落雨洗煙嵐光嶂曉露孤秀野隂棲暗芳更携鮑謝流履盡千岩霜搜竒得幽深訪古到渺茫月落潭影空清吟殊未央緬懷紫芝宇百憂繞廽腸三嘆已晡食十起中夜牀雲埋長安日魂夢不敢驤茂苑富山水結廬余所嘗我欲放船下卜鄰俯滄浪耦耕種秫田共掃三徑荒頭白青山裏長歌樂嵗觴承天寺宿雨洗蒼骨峰巒發新秀尋遊躡竒蹤騰踏衆山囿層林鎖巗隈突兀見危構空髙望浮圖靜勝逼靈鷲我來風雨秋白露欲昏晝但聞百川赴鳴玉㵼寒竇嶽示閟嵲峨路絶不得簉攀緣仰脅息坐石俯長溜帶露摘山芎披榛覔仙酎山光晚逾清雲壑若相授終期爛漫遊陽鳥欲回咮更約十日留之子緩蹄輳法王東菴吾宗丘壑資耿耿抱幽獨結構祇洹家縈廽轉岩腹前川布黃金合嶂來蒼玉步出覺華天乘凌眩生目雲間起層林林際懸髙屋斷砌滴踈泉微蹤隱深木堂空貝葉昏苔盛半階緑朱幡久不來哀猿響秋谷五松寺秋風吹客衣去路倚天碧躋攀一何苦正坐愛山癖人言五松下曽是瞿曇宅至今梧竹隂列屋棲禪寂塵纓得暫解俗駕聊可息怡顔岩間樹洗耳泉上石孤雲共往還窈窕去無迹道人粲忍流獨步少林席客來了不言碧眼照庭柏希聲出鐘梵妙意生墻壁寒灰暗青燈偶坐遂終夕歸來人境空缺月挂山額次韻仲輔山中之作崖隂坐清暝目為山光注妙意不可名悠然與心晤疏泉石中鳴落葉衣上住冷風起虛籟還向無中去三生聽鐘魚偶共來時步佛屋倚秋風團團兩桂樹却疑此境中曽是經行處碧霄泉山根出清泉云自九天落風潮帶江腥天黑魚龍泊何當寸雲敷一灑遍寥廓滄浪勿復歌吾纓久已濯秋居雜咏青春背我去白日不我謀霜飇驚草木寒威戒衣裘寓形復幾時四序忽一周世路復劍戟中懷孕螟蟊營營事長久頽齡如置郵丘園倘未卜怡恱心自休窮秋雜花逺眷此霜下傑明金委珞瓔寶璐綴環玦依依風遞蘭皓皓日穿雪若無夭冶姿不受衆目悅銜觴泛其英攬之腸為結誰能踵髙門持以浣中熱公園十畝餘日涉亦成趣浮隂未全收晴沙已勝步杖藜相與行童稚雜冠履枯魚泳微瀾悴菊飲晞露欣物各有時撫懷偶軒慮安得三徑餘誅茒種瓜芋晞陽軒山髙竹柏隂得之近亭午兹軒揖朝暾精色快先覩濛濛勒花春十日九風雨羲和為返斾照我衣上縷眩然九陽遊誰云在環堵次韻明甫西園之什莫作原上紅寧為徑中緑多花必早凋依依不如竹一枝寄他林翛然傲華屋填飢飯秋英借健膏石斛坐斷百懶身無心問雞足暇日約諸友生飯于石泉以講居貧之䇿樞密富丈欣然肯顧賔至者七人次方得順和貧士韻人賦一章崔嵬孔明柏結隂衆所依移根天衢上曽撫日月暉如何去大厦却繞烏鵲飛終當煩萬牛挽取廊廟歸鄭公澤既逺何以慰調飢公其踵前修一洗貧士悲嵗戊戌秋舟行宿泗間有持小石售於市者取而視之其大可置掌握峯巒鬱然若巖竇澗壑水落月吐雲影渺冥若近若逺皆有自然之勢乃有千錢購之而為之名曰羣玉峰曰水岩曰遙岑曰碧澗置諸座隅卧與之對且余少時南遊匡廬升紫霄以瞰九江東沿洙泗登泰山而徜徉大伾道鄴歷趙及燕而還今年責官羅城當走蜀問山於蜀人馮濟川每至佳處耳傾心受恨不能一日千里也繼改命不得往遂自鄭適洛以窮隋洧兩河之源歷覽二室之趣方將踰淮浮江自放於世猶念深山大澤不能與有足者皆至偶於圖畫對之未嘗不慨然興懷今一旦得是數山坐眺四方之勝豈不幸歟吾將寓形其間而與之俯仰上下不知我之在丘壑丘壑之在我也好事者將以余為過耶姑從而為之辭羣玉峯五城十二樓髙下聳寒玉天空開翠微不受塵土觸半生嗟環轅萬事驚轉轂寄語山中人為占一峰緑水月巗明泉落岩隈滿月挂山額踈星淡河漢下與水光白了然心境空炯炯照真宅鴻鳴夜更清欲卧已終夕遙岑宿雨洗空濶出此方寸岑聮綿翠光浮妙巧不可尋飛雲去未返慰我千里心誰為具徽絃有酒聊自斟碧澗蒼崖髙鬱盤下有千仭傾當時捐珮侶寄此琤琮聲坐石風露晚心與秋月明滄浪若可濯毋負冠上纓宿揚州城外舟行繞城郭缺月疏林杪窈窕一溪深微茫衆星小忘言對詩書適意親魚鳥幸此絶紛華行歌閲昏曉和少章喜晴日暮馬行疾峯巒過眼頻雨階長苦夜晴谷若逢春風月起歸恨江天思故人機心渾已盡惟有白頭新發光林寺朝發光林寺﨑嶇渡復攀摳衣緣翠隰側足下蒼頑急雨欲平澗斷雲時見山秪應超勝地行路不知艱久雨阻遊昭亭浪迹隨方寄窮途觸事諳雨逢春甲子江滿地東南客鬢霜前落詩情酒外酣上方愁獨往黎杖許同參琴溪竹色千畦靜溪光一鑑開巖隈宿風雨人迹老莓苔控鯉定何在騎鯨今不來空餘泉上月與我共徘徊春日雜咏春到陵陽市人家泊翠微南烹甘入筯北户暖生衣花暗昭亭寺魚肥句水磯樂遊須結社倒著接㒿歸幽棲足春事晴日苦相催屐齒穿沙穩笻鬚礙竹回光風初轉蕙殘雪欲欺梅自是經過少柴門日日開役役炎涼態悠悠道路賒情懷知老大夢幻閲紛華攪思雲邊樹供愁雨外花生涯書一束到處即為家二月忽已破一春強半過提壺工喚客布榖巧當歌得酒先愁盡惜花翻恨多逢辰不為樂明日復如何早入昭亭與同遊散步山中自樵徑至水濵路窮還僧舍飯散䇿春岡曉樵蘇一徑長鈎衣藤挂石斷路水浮塘山靜竹生韻池清蘭自香禪房得深憩魚鼓正鳴廊再遊龍潭密霧開深徑幽竒得再行水光沉樹色人語亂泉聲仙去山客寂龍遊雨陳輕誰能築雲室千古共凄情池亭待月輕雷不成雨風砌旋榰牀山亂雲行曲樓髙月路長柴門非故國戎馬尚他鄉笳鼓悲清暝關河思不忘散䇿散䇿北岡路牛羊歸徑深水窮人小立山靜客微吟點點稻花雨團團榕葉隂田翁罷爭席明日共幽尋次韻曽德明司理留題西山兼柬蘇宰層軒無礙石支徑曲穿林竹密催山暮松搖亂客吟琴書虛室冷鐘鼓淨坊深誰謂溪波逺能來杜與岑夏日與妙現老堂二公晚步江臯露坐月下夜分乃歸胡牀興不淺未肯庾公賢山意知秋近江聲到寺前夜涼新雨後月色正愁邊可惜江南夢青燈照不眠贈别竹西王彥升居士參軍四壁生秋草鬢毛不似心已老終隨煙霞學巢由一室安能事除掃竹西舊説青雲客詩思長留意無極塵埃不見襄陽山賴有斯人吐消息赤心照日青眼明與君一見輸生平君去摩天學孤鳳我今飲海盤長鯨雲車馳兮風馬休呼兒乞取千金裘明朝有句道不得黃葉滿庭無恨秋行路難江心蟠石蒼虬立山激江流浪頭急風昏月暗魚龍愁電掣雲奔鬼神入船頭星斗天為低夜潮生寒洲渚移鳴舷鼓枻驚楚子危檣逺纜號吳兒篙師咄咄自相語明朝扁舟繫何許半月江行十日風寸步家山隔秦楚黃衫年少金雕鞍日髙華屋春夢殘插花走馬咸陽道世上空嗟行路難嵗後三日與羅叔共二邵似表弟席上分梅花年後多韻得多字春風一夜如鳴鼉殘香暗粉驚辭柯新春三日駒隙過花前百罰寧辭多男兒莫遣兩鬢皤舉觴不飲理則那酒酣不用吳姬歌短鬚尚足供吟哦坐中鮑謝偕隂何語如韶濩參鳴珂鏗鏘入耳痊沉疴豈獨使我衰顔􅋳我今官間得婆娑遲明更上梅花坡虞仲通判以溪聲名軒約同賦山根出泉㵼鳴玉上有蒼崕擎佛屋無風水石自撞觸不盡潮音發寒谷宰官豈是雲間陸舊識南泉生處熟當軒大榜與名目平地重翻偃溪曲曲中時轉三妙語一一聲音談佛祖喧豗噫視十方鼓萬壑風雷送煙雨此聲不屬間中取六鑿相攘竟誰主後來紛紛何足數五乳峯頭曽賺舉山翁有耳百不聞團蒲曲几窮朝昏何時沿溪掬寒緑掃葉煎茶睡初足客誦故人劉立道梅花詩有懷用其韻以寄之桑柘如錢栁如雪南村北村欲早月老翁飯飽摩腹行白鷗自隨間喚鐵攀花正恨顔色乾哦公七言毛骨寒惜花不似愛詩苦即遣愁海回狂瀾公今為郎尚黑髮仕路不應嗟歇滅江國官間來雁多莫使故人書斷絶春風步馬芳蘭臯思君哀鴻獨求曹幾時懷抱相對盡桂漿酌斗供詩豪遊龍潭秦山破碎天上來女媧仙去空崔嵬中懸鳴玉二千尺下有百仭青銅開羣龍變化出噓吸雨暗雲昏鬼神入我來坐石秋水問雲影扶疏落空濕浮丘容城不可俟摩挲青壁著名字兩翁下遊會有時訪我鍾陸五松寺次韻碩夫池亭賞蓮胡牀麈尾揮長柄風和入座花容靚乍開還合晚照中修竹佳人倚春暝此間此景樂最深世路好惡君酌斟下車何必笑馮婦投杼未免疑曽參江山信美來者稀淵明獨與漁父違誰云寧食艾三斗不如杯行莫停手黎道人自長沙入閩邂逅見之論易頗有所得自言居醴陵山中有田廬食魚種竹可以卒嵗作取足庵義方室優遊其間藏書教子甚樂也遽還求詩贈之兩腳不踏咸陽塵兩眼不逐瀟湘春胸中乾坤照萬古竒偶縱橫何足數閉門有竹食有魚遺子有田家有書一生可了心自足世上紛紛漫榮辱山行遇雨滄溟四乾青虬立碧雲摩霄髙嶫岋六丁夜挽天河傾石骨無塵露蒼濕長風吹雨不成絲飛鞚衝山帶煙入羲和回馭還青冥布榖催耕喚春急獨宿昭亭山寺山寒六月飛霜雪樓殿夜深鐘鼓歇琅玕無風萬戟間屋角明河挂天闕龍牙七尺玉壺氷炯炯神清夢不成可憐幽絶無人共卧看雲頭璧月生與公序避暑石盎方晝欲寢聞林間禽鳴甚樂因得小詩云一林啼鳥不知名應怪山翁此地行化蝶與莊俱是夢遊魚知我久忘情胸中丘壑真餘事世上功名畏後生但得盈樽供自酌何妨人境卧淵明春近風日漸佳與似表弟開小户縱步後庭圍爐人散長寒煤暖日還催墐戶開春近郊原思夢蝶雪殘池館見真梅客愁宛轉凌雙鬢嵗律侵尋寄一杯試繞小闌尋翠甲履痕猶占舊蒼苔雲門道中晚步層林疊巘暗東西山轉江回路更迷望與遊雲奔落日步隨流水赴前溪樵歸野燒孤煙盡牛卧春犂小麥低獨繞輞川圗畫裏醉扶黃髮杖青藜渡橫溪百尺滄浪兩岸沙肩輿徒涉步欹斜溪聲猶帶夜來雨山色漸分雲外霞岸曲斷林開鳥道水邊疏竹近人家塵埃何處尋真境試逐寒流認落花次韻學士兄富陽道中長江送客靜波瀾路入回溪第一灣石瀨橫陳潮力減風檣圜轉櫓聲間驅除方寸無窮事領略平生未識山自笑疏慵似中散正宜寥落水雲間訪雪峯真歇禪師紅塵白髮不相投來就僧房借板頭大士法中龍象貴老翁心外水雲浮長蘆江靜千山月枯木岩寒一葉秋别後相逢重著語牧童橫笛倒騎牛次韻錢申伯山堂之咏淨坊秋色老蒼顔簷額飛雲細可攀客夢偶隨疏雨斷僧遊常帶暮鐘還似聞遺錫藏銀地親見髙人住土山愁絶寒江歸去路亂峯青處望雙鬟和錢申伯遊東山聖泉偶脫塵中一夢闌欲窮幽事遍尋山靜憐人境雞蟲擾老愜僧忩枕簟間十里秋香隨屐齒四更山月上簾顔登臨物色催詩興未信天於我輩慳初到連江和林公曄先輩投老身名信陸沉空將白髮寄遙岑賦詩未敢師彭澤抱甕真堪友漢隂江面飛橋誇壯麗山腰卧石閟幽深公才清絶參竒觀慰我長年去國心和陳穎仲題劉鞠祠山繞平湖緑四邊兩翁遺澤到今傳蘋風引釣魚隨艇榖雨催耕水拍田敗壁丹青悲落日荒庭紳笏想流年桐鄉不廢春秋祀簫鼓雞豚久更虔和穎仲山行即事平蕪新緑占封圻橫路遊絲網落暉山徑人稀藏窈窕禪扉春盡老芳菲緩行照水知魚樂隨意穿花見蝶飛二子舁籃今夜月龍鍾猶勝杖藜歸暇日遊石門用前韻曉御欲隨風腳來報晴鳥鵲入簷催松幢竹蓋寶坊近石壁雲關塵境回山氣得春濃勝酒花光帶月冷過梅却收眼力尋歸路惜取餘青莫浪開久雨榕根敗屋兩三椽客徑無人老更便地近東南多澤國霖逢甲子少豐年徑須酣飲六十日安用取禾三百㕓待得雲頭風力健梅花如雪月初圓德甫知丞過筠莊溪亭為待月之會戲呈席上諸友載酒何人過子雲傳呼雞犬亦驚奔門無車馬苔侵徑坐近池臺竹覆尊好月邀人留晚照疾雷催雨過前村獨醒楚子真多事共醉愚溪百尺渾自連江赴守鄱陽黃原道中作海角三年一夢成北來重聽偃溪聲凝雲帶雨留愁住茂樹隨山送客行粳稻沿崖畦上下茅茨枕谷路縱橫莫從馬腹消雙髀此地真堪老此生舟中對月悠悠逐隊寄舟車與世真成一夢蘧苦憶曉更鼉報鼓喜逢秋逺雁橫書江山似與詩人助水月應知靜者如投老得歸隨處樂獨醒尤笑楚三閭留别傅才孺壯嵗追隨鬢已蒼誰將勳業問行藏憐公錯莫雞羣鶴顧我凌兢虎質羊敗栁亦工喧暮雨寒花直欲膩秋霜更謀濁酒窮清夜明日山深木葉黃再用葉碩夫韻一丘一壑半生中旁舍小兒今老翁歸來賦就晚徑緑醉時歌罷春燈紅壯心欲盡孤雲薄昨夢不留寒月空茗碗粥盂能事畢四三朝暮付狙公題福唐郡國清閟亭公餘自種南階竹好事風流今未聞但得七人來結友何須千畝比封君風梢不定微藏日雨葉初乾薄帶雲自是甘棠人愛惜不憂寒谷遇樵斤五言醉帽迎風落春衣徑日斜花梢藏密路隱約見山家白玉千株暗青雲一徑斜從來少車馬恐是阿環家遊梅坡席上雜酬風約疏梅蘸石泉山涵弱栁借厨煙竹籬茅屋傾尊酒坐看銀鈎上晚川次韻學士兄秋初何日刀頭水石間婆娑猶得一官間杖藜早晚尋幽處望斷秋空不見山次韻林仲和筠莊疊疊重重兩岸山鈎簾秀色上琅玕孤亭四壁面煙雨人與白鷗分暮寒題趙幹江行初雪圖瓜步西頭水拍天白鷗波上寄長年箇中認得江南手十里黃蘆雪夜船次韻郎中弟見寄筠溪岸上千竿竹夢想猶疑玉笋班只欠吾家小居士杖藜風雨亦來還兩宋名賢小集卷一百八十九
