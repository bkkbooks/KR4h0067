body:
  text: 兩宋名賢小集巻七十四宋陳思編元陳世隆補三徑集蔣之竒字穎叔宜興人嘉祐二年進士哲宗朝累擢翰林學士徽宗朝拜同知樞宻院事除觀文殿學士出知杭州提舉靈仙觀卒入黨籍有集逰朝陽巖遂登西亭朝陽巖在瀟江之西去治城不逺唐永泰二年元次山為道州刺史避兵至零陵訪而得之因其東嚮遂名朝陽方是時結有盛名於世故永之守丞獨孤愐竇泌為之剪荆棘建茅閣結又為之銘與歌其後栁子厚繼為之詩予以子厚詩考之正所謂西亭者也復為亭而系之以詩昔逰不在逺幽岩臨治城嶔岑俯瀟碧庨豁延陽明緣澗可徑入滑路偪仄行泉源何自來涓涓玉鏘鳴疑穿雲雷窟尚帶魚龍腥寒江净瀉鏡怪石坐開屏幽鳥馴可羅潛蛟深莫罾梯險接層棧冠巔葺危亭俯睨極𤣥窗仰攀窮青㝠蹇曠出物表高虚挹𤣥英惜哉非吾土不得憩此生舊業寄陽羨故園依晉陵秋風滆湖白春色頤山青一從紳笏去遂使猿鶴驚迂疎暗時機孱瑣叨官榮謫棄分所宜醜惡顔已盈人生詎有幾世累吾方輕願言解羇紲上疏還簪纓寜居召魂魄恬養休性情紛華屏外慕沖澹岩中扃窮年侔農圃畢志先疇耕澹巖零陵水石天下聞澹山之勝難具論初從崖口入地底始見殿閣開重門乃知兹洞最殊絶洞中金碧開祇園寛平可容萬人坐仰視有若覆盎盆虚明最宜朝日照隂晦常有黒雲屯盤虬夭矯垂乳下巨獸突兀巨石蹲香木一株在岩壁人跡峭絶不可捫呀然雙穴露天半籠絡萬象將并吞只疑七竅混沌在五竅㤀失兩竅存神竒遺跡未冺滅至今猶有斧鑿痕雲牀石屏極隈隩昔有居士常潛蟠避秦不出號徴君美名遂入賢水源咸通曽為二蛇窟元暢演法蛇輒奔從茲其中建佛刹棲隠不復聞世喧惜哉此景久埋沒但與釋子安枯禪次山子厚愛山水探索幽隠窮晨昏朝陽迫迮若就狴石角禿鬝如遭髠豪篇矜誇過其實稱譽珉石為璵璠環觀珍寳欲掩有不到勝處天所慳嗟予至此駭未覩不暇稱讀徒驚歎恨無雄文壓竒怪好事略與二子班蕪詞願勒岩石上勿使嵗久字滅漫寄題三瑞堂好在廬陵守年來强健無一麾新佩印三瑞更為圖善政傳江右飛書到海隅緬懐烏府舊何日笑談俱萍鄉即事地接長沙近鄉名自古聞毛山千嶂雪玉女一堆雲拱木扶霄上飛泉觸石分霜風萍實老目斷楚江濆琴高臺懐古高士遺臺曲澗東俯臨百丈之飛虹雲巻雲舒絶壁下花開花落空潭中丹砂鍊去山俱寂赤鯉騎歸路不通嘆息往來車馬客幾人忙處問琴公白面山在池州府西南山石如傅粉故名白面峯巒碧玉堆故人卜築在巖隈難尋荀鶴舊逰宅尚有昭明古釣臺滿檻名花紅勝錦一溪流水緑如苔七閩千里倦逰客兩眼眵昏向此開寄米元章京城汨沒興如何歸棹翩翩返薜蘿盡室生涯寄京口滿牀圖籍鎖巖阿六朝人物風流盡千古江山北固多為借文殊方丈地中間容箇病維摩逰化城寺級級躋攀險肩輿若上天雲端開净刹峰頂見平田水石清無價烟霞翠滿前高僧卜居此意欲斷塵緣和秘䦣曝書會詩宴豆追儒雅簪纓盛禮容中天開壁府左海見鼇峰汗簡陳三館緗圖煥九重紫微才思敏十吏筆能供六和寺金魚池全體若金銀深藏如自珍應知貪餌者畢竟是凡鱗隱居南莊耕春煙一壟釣月水千尋未荒三徑菊不負此生心蒼玉洞在長汀縣蒼玉門徑濶白雲庭院深鄞江一丈水清可照人心鷲峰院在汀州府南山前十里入青蒼猿鳥聲中建道場日轉竹隂侵閣冷水流花片過門香燕窠石墨窩化石鎖煙苔岩上茆空煙又開塵刼一聲清磬裏至今猶有燕飛來重湖閣宫亭彭蠡接揚瀾浩蕩横空六月寒試問風波何似險老僧只管倚闌干水西示劉尉役役塵埃倦客情偶逢佳處得閒行憑君為把如椽筆便向蒼崖記姓名涇溪蕩漾溪沙深淺間羣山囘抱翠連環扁舟便欲乗流去直下山門六刺灘附余良肱和詩畫舸夷猶紫翠間暮雲如掃月如環三山六刺須臾過恰似嚴陵七里灘過幙溪憶左難當幙山孤秀幙溪清玉鑑光寒映翠屏今古寥寥何可問難當遺事在圖經劉遺民釣臺最愛仙人卧白雲一竿來此釣紅鱗我今不學磻溪叟行作宗雷社裏人春帖子昧旦求衣向曉雞蓬萊仗下日將西花添漏鼓三聲逺柳映春旗一色齊琴高臺懐古來至涇川十里餘嶄然怪石翠凌虚自慚不是神仙骨空羨琴高控鯉魚嘉禾驛旴江清淺見逰鱗百尺飛橋跨碧津行過水南看更好風光駘蕩百花春孤嶺鮫綃剪下碧雙垂歸挹清流背紫微北向更登孤嶺去此身還傍白雲飛兩宋名賢小集巻七十四
