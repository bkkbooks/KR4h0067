body:
  text: 兩宋名賢小集卷一百四十七宋陳思編元陳世隆補嶽忠武托藁嶽飛字鵬舉相州湯陰人宣和間應真定宣撫幕纍立戰功南渡歷少保河南北諸路招討使進樞密副使封武昌郡開國公罷為萬夀觀使為秦檜所陷殞大理寺獄淳熙六年賜諡武穆嘉定四年追封鄂王淳祐六年改諡忠武有集從駕遊西內應制詩敕報遊西內春光靄上林花團千朵錦栁燃萬條金燕繞龍旗舞鶯隨鳯輦吟君王即天地化育一仁心題翠巖寺秋風江上駐王師暫向雲山躡翠微忠義必期清塞水功名真欲鎮邊圻山林嘯聚何勞取沙漠塵飛定破機行復三關迎二聖坐看席捲盡擒歸巍石山龍居寺巍石山前寺林泉勝復幽紫金諸佛像白雪老僧頭潭水寒生月松風夜帶秋我來屬龍語為雨濟民憂遊金山第一泉頭過幾日黃花猶待客重來男兒有意扶中國不斬樓蘭不易回題池州翠微亭經年塵土滿征衣嬴得尋芳上翠微好水好山觀未足馬蹄催趁月明歸送紫巖張先生北伐號令風霆迅天聲動北陬長驅渡河洛直搗向燕幽痛飲黃龍府鏖兵木葉樓歸來報明主恢復舊神州華嚴院手扶竹杖訪黃龍舊穴空遺虎子蹤雲鎖斷巖無覔處半山松竹撼秋風寄浮屠慧海湓浦廬山幾度秋長江萬折向東流男兒立志扶王室聖主専師赴國讎功業要刋燕石上歸休終伴赤松遊丁寧寄與東林老蓮社從今著力修池州翠光亭愛此倚闌干誰同寓目間輕陰弄晴日暮色隱空山巖樹蕭騷外征帆杳靄間吾雖江上老心羡白雲關題新淦蕭寺壁碑膽氣堂堂貫斗牛試將大節報君仇斬除元惡還車駕不用登壇萬户侯過張溪贈張完無心買酒謁青春對鏡空嗟白髮新花下少年應笑我垂垂羸馬訪髙人乩上詩臨安西溪軍寨子弟請紫姑神王降乩書此宛然平日真迹經略中原二十秋功多過少未全酬丹心似石今誰訴空有遊魂遍九州歸赴行在過上竺寺偶題敵騎犯京闕駐蹕大江南二帝雙魂杳孤臣百戰酣兵威空朔漠法力仗瞿曇恢復山河日捐軀分亦甘兩宋名賢小集卷一百四十七
