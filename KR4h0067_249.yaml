body:
  text: 兩宋名賢小集卷二百四十九宋陳思編元陳世隆補翠微南征録八華嶽熱中呈楚南僧炎帝執鞭驅赤龍火車萬乘燒長空長空萬里俱藴隆流金爍石天地同我來亭亭日當午欲避驕暘竟無所願求一灑楊栁枝化作東閩萬家雨送春留春無計奈春何九十過眼如飛梭三分二分風雨爾十日九日愁悶呵風前飛絮正無數雨後落花全不多爭如買酒速相就君自起舞吾能歌僧畫萬景峯前老禪叔搜羅風月歸岩谷胸中有句吐無聲寫作生綃三四幅賀趙法曹紅日轉簷花飛鳴一聲鵲鵲翅未離簷有客拽鈴索呼童急啓户問客意何若客聞笑而言法曹參計鑰因知鵲之鳴報我良不惡知我門下人一鍵聊相託如公材器大末掾豈能縛咫尺蓬萊宫左右芙蓉幕直入鳯凰池更上麒麟閣賤子無所需願作揚州鶴矮齋雜咏二十首東風吹恨上睂頭兩岸桃花瞰碧流一片紅雲飛不起斷霞殘照落汀洲夢回斜月挂林端酒力初消怯夜寒何處客舟猶未泊一聲柔櫓過前灘無肉鸕鷀入水頻雙童聨網立沙濱問渠掃得魚多少才可為羮了一人聨翩屐齒破苔痕醉裏觥籌不計陳來日不須關太史五星今返聚甌閩投宿茅亭得夜涼鷓斑搖落奏篔簹青簮擊破寒窗紙漏得山花一線香曉鐘捶動巨鼇堂枕上春雷一夜轟應是金鱗三十六化龍頭角逞峥嶸一聲殘角送黃昏獨倚欄杆空斷魂竹影掃階塵不動自挨明月閉柴門萬事關心兩鬢秋栁灰何用苦文羞無情霜雪催年少間似青山猶白頭梅梢弄粉做新晴積雪殘雲沒一星只把眼前春事卜麥坡已作佛頭青十年南國嘆徘徊一片鄉心撥不開應是西湖花栁問風流何事未歸家紫騮回首客思歸萬里家山蝶夢迷問宿暮山林下邸夜深生怕杜鵑啼長天萬里掃清秋宿霧朝雲去不留向曉殘星猶未落一盤棋子倩誰收前回風疹遍身紅布褐因燒艷火烘兩腿熱瘡今又發休將紙被把頭蒙一曲漁歌古渡頭幾多鷗鷺起汀洲西風吹散瑤池雪點破長天萬里秋朔風號木作嚴霜錦被重重凍欲僵夜半腳跟疑已割夢魂安到得高堂獨自清間獨自忙杳無人迹到蕭牆眠時不用呼童僕自有清風為拂牀秋波春水照殘霞恨雨愁雲嚲髻鴉飛上領襟隨得去妾身安得似楊花東風吹恨入青樓滿目春容總是愁楊栁織成絲萬縷慿誰裁作翠茸裘閩南十月已春回無限風光暗裏催桃李海棠俱鬭艷誰云梅是百花魁桃溪噴火栁拖煙如豆青梅已半酸燕子怯春歸未得一簾風雨杏花寒懷九江友人浪泊西風萬壑秋幾多香餌落金鈎無魚可釣渾間事留得絲綸在即休禱富沙十年蹤迹淖泥沙為炷靈香禱富沙萬里無由詣霜闕一書聊欲為星槎解驂許我來齊晏釋縛從君問左車他日橫飛上麟閣行祠當為建京華謝劉判院細軸濃雲寄矮齋蒲團和氣忽驚回一牀浪捲芙蓉皺十幅香重綿繡開不怕夜寒侵斗帳却愁春夢到陽臺感恩未作瓊瑤報先把新詩寄小梅寄苕溪故人昔年分袂霅江東繫馬花梢撲亂紅解珮送行情怏怏舉杯言别恨匆匆中人以上誰知我北斗以南惟有公此去東閩有良便一書無惜慰羈窮不禱不炷靈香不誦經筄杯籖榜總欺人窮通只合從天地禍福何須問鬼神命到死時生莫幸事當直處曲還伸從今若問開先事桃李無言二月春送提舉陳工部溪風拂拂卷征衣溪上攀轅恨馬遲蝗不入閩今已矣碑無留峴古求之泉如送客聲猶咽燭昧留人淚漫垂願速長沙還賈誼為公江上斬鯨鯢即事欲行未去兩紛拏何事回天力未加九牧誰為十羊主百冠當念一人髽肘邉有石心雖切腰下無錢手漫乂千里有人逢伯樂為言龍種尚盤車呈陳信之老來百計總無成當路時官懶問名國事只將心事比今人難作古人評蒼頭笑我樽無佐白髮欺人鑷又生惟有建溪知客意過灘時作不平鳴寄江子岡和夜封書上子岡别來化日又舒長只知電燭兩經月不覺星毛半欲霜竹葉照人凝盞滑梅花撩客透籬香知他詩債曽償未料得尋春日日忙書太乙編年卷尾年來太乙犯咸池三式編年事可疑西北膏腴從脯臘東南皮肉恐瘡痍堯天日月期無已北地煙雲嵗有之更向江湖問同志中原何日是歸期怒成舌端豪氣吐長虹四海一身無處容不向北山求剌虎便從南海學屠龍鼎須劉闢方成器劍到魏齊那是鋒欲把不平朝玉帝夢魂飛上祝融峯楮衾霜風剪水作闕織出吳綾不用梭十幅曉雲藏處士一牀秋水浸嫦娥直疑天上無青女却信人間有睡魔更向屏山畫梅竹紅塵還有此風麼勉趙法曹銀潢河海浸崆洞君獨軒昂萬派中北鄙虎牢今子産東山狼跋古周公固知魯衛封同姓合向燕秦䇿異功我欲誓江同擊楫中流無惜伴英雄獄中責廷尉重門有路透泉關便合摳衣問比干愧我直言難媚竈從渠怒髮自衝冠烏臺有月身何及犴獄無天淚漫彈自恨不逢包孝肅此身那許報平安吾巾不是不冠儒曽被儒冠幾誤豫鐡硯不磨天地軸毛錐難復帝王居當時衛霍無傳祕却恨韓曹不著書堪笑蒼生無眼力不知豪傑在樵漁酒歌嘗聞子美清江曲日典春衣耽美祿又聞太白遊長安市上熏熏醉眠熟風流國裏太平時處處紅樓漾酒旗王孫公子恣行樂繁絃脆管相追隨誰知寥落天涯客笠頂清風秋挑月芒鞋踏遍山水雄奮身欲入黃金闕方嗟蕭索向西園刮面寒風雨漲天回頭忽喜黑衣至急破紅泥傾數船雖無皓齒歌金縷也掃新詩狂欲舞兒童拍手笑攔街應怪吳儂喜如許長江波浪卷銀山去去仍悲道路難只慿一醉進未得更借高風吹片帆琴月浸虛堂夜氣清起聽萬籟寂無聲輕輕拂動匣面塵玉笋不彈風自鳴村居莫怪村居僻村居亦可嘉僕羸腰帶父婢倩鬢簮花歌罷蛙催樂酒闌蜂報衙門前少車馬慚愧五侯家宣城道中恰則杏花天轉頭過禁煙燕歸才數日蠶起又三眠少智慚樗里多材憶孟堅功名且隨分無苦自咨煎過新豐市懷古路出橫江去虛堂立道偏雨聲楊栁外風色杏花前有淚沾詩宿無歌述酒仙采江千古恨號認向誰傳買舟浦城畏路逢危路尋舟得小舟始云為得計終乃復添憂艙狹難伸足篷低怎舉頭十圍無處著踘促向中流憩妙因寺蕭寺寒山外﨑嶇一徑幽斷雲迎客入曲水護堤流木石四時古軒窗五月秋午煩聊小憩拂石為支頭再繼前韻俗塵方倥傯得得訪清幽煙練闕抹山屏翠欲流松筠掃日月藤蔓懸春秋物外有餘樂吾生空白頭兩宋名賢小集卷二百四十九
