body:
  text: 兩宋名賢小集卷三百八十宋陳思編元陳世隆補待清軒遺稿潘音字聲甫天台人宋季躬耕不仕築室南洲山中詔徵天下遺逸亷訪使檄贊之行固辭有待清軒遺稿采芝歌四首曄曄紫芝在彼髙岡于以采之可以充腸唐虞往矣吾身可藏峻宇雕墻未或不亡富貴之畏人兮不若貧賤之徜徉曄曄紫芝在彼幽谷願言采之可以充腹唐虞往矣吾生未卜髙牙大纛其額也蹙富貴之畏人兮不若貧賤之戩穀曄曄紫芝在彼層巒于以采之可以常餐唐虞往矣吾將誰干佩玉鳴鸞其生易殘富貴之畏人兮不若貧賤之身安曄曄紫芝生彼白石願言采之可以終夕唐虞往矣吾將安索隋珠趙璧寧保無失富貴之畏人兮不若貧賤之自適有所思中心有所思蹙損雙蛾眉美人竟長往使我嘆離居寂寞就孤枕強眠誰得知夜深清露重飛夢欲何之覺來日遲遲分照上羅帷糚臺理雲鬢種種盡成絲逺遊聖人久不作大道將巳矣吾生既無之惟有幸夕死殷勤謝良友逺涉西江水方從草廬公共究鵝湖旨紛紛朱陸議竊幸窺端倪奈何執德偏一聘翻然起春秋嚴內外乾坤定冠履西蜀巳空亭箕山仍洗耳迢迢返岩阿惟當隨鹿豕論學吾生愧不學學須明吾志軒冕豈不榮此身寧自棄魯叟重成仁孟軻貴取義尚然周可栗況乃秦未帝東海薄連城首陽藐千駟萬古為綱常殺身何足避讀石子重先生輯略吳越逺中原斯文久寥落季子巳邈如言偃亦渺若千載萃頁元石城倡絶學遊楊出程門論議紛灼爍先生咀其華用傳此輯略言深旨斯逺施博守則約餘生愧顓蒙遺言仰光覺大道闢荆蓁天性啓槖籥誠身須固執擇善無蹖駁孔門授受宗誰云盡糟粕讀黃宣獻公注疏偉哉黃宣獻讀書盈萬卷正色動岩廊抗疏回霄漢雅志薄紛華幽情耽散玩白首窮簡編頻年下帷幔折衷孔鄭言兼採程朱傳諸經咸有疏殊條盡同貫我幸讀典謨更得觀象彖三百與三千恨正窺其半聖賢傳心訣帝王經世案昭回儼日星鄭紫那能亂景行篇吾道久不南於越矧荒裔千載竟寥寥誰能談六藝卓哉石城翁三孰開里第二程遊其間談道析巨細矇瞶始窺斑飲食才知味民也揚其波􅗐也探其祕師師羡家承濟濟多澤麗正直俞長公髙明黃叔子注書析牛毛辭榮輕敝屣吾宗晴窗翁孤標揚晚嵗默默躬行身侃侃斯道衛朝陽聽鳯鳴九臯聞鶴唳嗟豫生不辰斯文已墜地孑居空山阿逺謝人間世髙山仰諸賢寤寐為擁篲庶幾啓豫思夕死一徼惠山中寄友人我來卧白雲潭影清華髮經嵗無稻粱侵晨采薇蕨峯頭天籟鳴隴上樵歌發還擬醉濁醪與君弄山月反北山嘲四首達人知進退曲士豈同謀盡使藏身去誰當為國憂煙霞成痼癖聲價藉巢由虎嘯雄心在胡為鶴唳愁雲壑藏真客金門寄迹仙神遊招隱賦興致考槃篇麋鹿耽豐草龍蛇起大川由來枯稿輩長往不知旋一自著荷衣襟期與世違荒唐髙士傳偃蹇北山薇欹枕聞寒瀑衡門嘆落暉臨文每相誚猶爾未忘機橫議還應熄孤標未可親負薪生德色帶索竟驕人髙蹈箕山上潛蹤潁水濵韋編有明訓苦節若為論友人夜宿雲山多樂事叢桂共君攀别去十年久歸來兩鬢斑倚窗邀素月把酒慰離顔醉後松堂卧濤聲落枕間喜雨祝融嚴號令萬物瘁紅爐甘雨時還降蒼生氣欲蘇隴頭饒黍稷澗畔長雕胡獨有夷齊老恆飢色自腴春暮門徑鎖煙霞春深山色嘉焚香清晝永把酒緑隂斜燕雀銜梅豆蜘蛛網栁花塵埃渾不到疑是武陵家久雨蕭蕭風雨後四望盡波瀾川湧蛟龍鬭雲低鳥鵲寒楚王愁枕簟湘女泣琅玕煙火孤村絶流離未有餐南洲丁氏草堂仙客栖真處衡門枕曲流地偏三島接天迥萬山浮匣劍星霜久函書洞壑幽忘機對鷗鳥華髮老滄洲石佛寺步入迦林徑森嚴梵宇開洪濛承覺運石壁現如來法相元難壞雲衣不用裁九年長面此早巳出塵埃答揭公名徯斯羡爾聲聞著慙豫志慮消空將鳥迹字逺寄鹿門樵白雪應難和青山未可招從兹採芝去不惜路迢迢遊石梁空濛岩岫轉絶徑石梁懸半壁留雲壑長虹挂玉川采真移杖履覽勝拂嵐煙此際塵凡隔桃花滿洞天悼楊侍郎屈指漢遺老如君復幾何鳯池冠劍近鈴閣典章多國巳成禾黍人還隱薜蘿那堪川上水東逝乏回波過黃宣獻公故居翩翩黃叔度早已擅鴻名元老揚休色中朝曳履聲風煙接閭里瓜葛自親情萬卷書何在空堂鳥鵲驚避暑避暑青山裏炎涼迥不同層崖消雪水髙壑振松風尚可儔韓衆何妨謝祝融回看車馬客煙火市塵中返照晚眺豁沖襟芒鞋渡石林山明殘照在水淨落霞深白髮求三彖頽年望五禽欲歌梁父句寂寞不成音積雪萬山堆積雪一望浩漫漫漫道陽春曲應愁朔漠寒袁安門外色蘇武海邉餐千古俱搖落令人每自嘆尋梅雪凍層巔石膚裂萬壑寒飇吹不歇懸思隴上一枝梅嵗杪空山逞竒絶呼童䇿蹇漫尋春玉蕊初開丰采新天涯有客長相憶折得寒香寄逺人山居阻雨霏霏風雨暗郊原有客含凄獨掩門山鬼嘯雲移峭壁毒龍將海漫孤村愁來自灑青楓淚戰罷誰招絶漠魂繭足空齋無一語不因岑寂怨黃昏東溪水漲積雨經時苦自長東溪迥首意淒涼連山巨浪飛春雪數點驚鷗下夕陽神女含情愁洛浦美人揮淚灑瀟湘欲尋舟楫無由渡咫尺天涯共渺茫中秋無月翛然杖履步層臺為望嬋娟海嶠來秋半正當華月滿雲深不見廣寒開久拚良夜愁中度却恨流光暗裏催濁酒那堪酬節序倚風長嘯轉生哀登樓秋望木落霜清雁影流偶來長嘯獨登樓笳鳴薄暮寒鴉集劍倚遙空紫電流萬里邊塵連大漠一樽漢月醉髙秋深閨少婦思征戍何處聞砧不動愁雁岩一派清漪景色偏洪濛鑿破碧雲巔排空瀑布長飛雪競秀竒峯直插天玉女鏡中鬟影亂真人掌上露華鮮霜髙雁陳衝寒度未得音書海曲傳月夜有懷碧天如洗月團圞有客興懷意渺漫古木煙消烏鵲繞空山露滴桂枝寒緘書絶塞人何在搔首秋霜鬢巳殘坐聽寒蛩渾不寐夜深無語獨憑欄曉起銅壺曉滴漏迢迢坐倚空山四望遙霞彩薰蒸星象斂嵐煙擁護石梁髙襟披左袒心猶壯目極中原恨未消懶向鏡中看白髮巳拚蹤迹混漁樵真覺寺訪蔡上人為尋支遁扣禪關趺坐觀空出宇寰淨土無塵勞白拂天花如雨落青山龍皈寶座香雲滿鴿繞經臺佛日間誰謂陶潛偏嗜酒從今蓮社未應還龎德公髙士遺蹤尚可尋襄陽城外閟幽林久知軒冕浮榮薄巳卜耕鋤樂趣深麟閣不圖丘壑相鹿門應逐白雲深千秋事與人俱往滿目松楸帶夕隂題淵明對菊圖當時陶令拂衣回坐見南山逸興催襟度自宜黃菊侣酒樽時有白衣來賦成倦鳥斜陽度書法麟經甲子開千古髙風那可挹翩翩大雅出羣才讀嶽武穆傳萬里浮雲入望隂千山落日正沈沈當朝自餒中興志出塞徒勞上將心臣子終天仇未復姦邪設險計殊深惟餘一篋精忠傳揮淚頻看不自禁悼文丞相回首中原已陸沈捐軀朔漠氣蕭森恐吹餘燼成炎漢未許黃冠返故林社稷忽生千古色綱常無忝百年心總拚清骨縈荒草不復風沙掩素襟觀稼欲粟何處耕欲帛何處桑縱使甘凍餒偷生良自傷遊天姥懷李白崔嵬天姥振滄洲李白當年夢裏遊一自煙霞歸綵筆山靈長倚碧空愁題許由棄瓢圖自是清流謝帝堯潁川洗耳絶塵囂放勳事業今安在仍羡當年一棄瓢聞鵑子規聲切月輪斜起望諸陵憶漢家婦女尋芳渾不解鬢雲爭插杜鵑花兩宋名賢小集卷三百八十
