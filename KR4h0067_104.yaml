body:
  text: 兩宋名賢小集卷一百四宋陳思編元陳世隆補紫薇集簡范信中詩人例窮君不然畫堂繡户羅嬋娟當時乘醉出三峽至今妙句留西川底事新來多退縮梅花滿眼看未熟便期載酒約來冬似要惡詩相抵觸曉來寒凛似中原君忍閉門清晝眠我病猶能相追逐知君心期總不俗但攜二妙喚諸公一醉落花吾亦足再簡范信中益謙呈張仲宗昨日之遊樂不樂主人愛客客不惡梅花逺近遍川谷雨凍風揉未全落明日之遊復何如城南城北梅更多對酒我不飲把盞君當歌酒肉雖勤主人費且幸我黨頻相過梅花縱落君莫歎與君同往海南岸花開花落都幾時君醉我醒人得知相逢一笑俱有詩如何不飲令君嗤連得夏三十一翼兄弟范十五仲容趙十七頴達書相與甚勤作詩寄之間居病亦侵世務每絶念猶憐二三子從我久未厭書來不改昨意苦辭亦贍問我來何時期我早會面我行但謀食欲去復未便要當相就居同止山水縣讀我所傳書亦足滿素願開卷忽有得如飲醇酒釅吾聞古志士學也蓋有慚欲升夫子堂不摘屈宋艷倒籬望青天豈必在窺覘他時倘從容此語子可驗送錢子虛撫幹役洪州赴新任二首君不求時用居然如病夫經過閲嵗月相伴走江湖白玉終無玷寒松保不枯同官多勝士總為致區區老矣吾無用歸歟子未宜端能出竒䇿略為濟斯時悶有書托眼間須笏拄頥西山有爽氣當報故人知問乾元圭老問訊乾元老江頭幾日回還應艤船待不作御風來漫有經旬别頻思一笑開庭前荔子熟尚要著詩催謝宇文漳州送茶暑氣侵人病逾劇空堂坐調出入息漳州太守送茶來玉圭小鳳俱無敵太守憐我病無語故遣此茶相勞苦千金一瓶君未許百金一盞如潑乳其他鬬芽未足數下視紛紛等塵土病夫未飲病先愈坐覺爽氣生肺腑城中車馬閙如雨更有藥善如君否謝楊紹祖惠玉友我來閩中居中熱久斷酒端居苦無事神氣思內守故人憐我病小缸送玉友極知此不凡嶺海見未有感君意則重納約况自牖欣然洗盞嘗不待捧素手空杯貯玉色一洗市沽醜坐令百疾去敢復望升斗從今破酒戒可以入道不聽雨日數歸期似有期故園無語説相思芭蕉葉上三更雨正是愁人睡覺時末利香如含笑全然勝韻比酴醾似更髙所恨海濵出太逺初無名字入風騷夜涼早起尋李貽季陸慶長所惠詩有作夜長忌隂晴忽聽簷雨寂空房閉重門涼氣通枕席欣然欲攬被如覔舊相識那知庚伏內得此睡通夕起尋兩君詩令我生氣力成溪長桃李已自除荆棘逺遊得數士舍此百無益挑燈視皮膚不願蚊咬赤因之不復寐為子增歎息聞大倫與三曽二范聚學并寄夏二十一四首我思臨川居欲往意未慊每懷三千子嵗月多荏苒後生慎所習正是絲在染未須極軒昻且須就收斂舉動思古人此志豈不逺才雖有髙下事亦要強勉願為江海深莫作盆盎淺世人爭錙銖未語色已變居然面頸赤自處亦已賤寧知烈士胸渠自有志願一介不妄取萬鍾我亦倦古人有伯夷名冠太史傳見人輒有求所以百慮非但能守簞瓢何事不可為愚夫飽欲死志士固長飢出門萬里塗其亦慎所之莫惜一日勤而忘終身憂農夫力耕作其必嵗有秋目前不鹵莽久亦有倍收小年不努力長大復何求别林氏兄弟二年住閩嶺所閲足青紫那知萬衆中得此數君子相從不我厭但覺嵗月駛髙論脫時俗如風濯煩暑出處雖未同氣味固相似人生有低昻所畏為物使要當啜英華不必計渣滓他年肯相尋在彼不在此將去福州委曲隨人久未甘倐然午枕睡方酣功名到此終無分身世從來百不堪為已功夫今粗曉住山活計久相諳他時不用求三徑投老才須住一菴初秋涼風驚木葉意欲作深秋客病渾如昨囊空却自由因間得飲酒端坐勝封侯寄語平生友當能為我謀嚴州九日坐上贈胡明仲常子正今年得交舊九日會嚴州城角風雲暮天涯景色秋功名有長鋏行李付扁舟苦恨三年别聊因一笑留病添文字懶老耻稻粱謀活世須公等吾生便可休贈了老前年見公滄海上法令堂堂萬騎將今年見公浙河東猶是當時舊老翁送行更有天童老騏驥齊驅獵霜草野狐射牛膽欲破不但獨噴羣鳥倒我衰且病百念絶便得從公不為早忘情遁迹亦未是言與不言俱一掃世人擾擾不歸家公行問渠有何好將發金陵奉懷張彥實老矣君何往翩然我欲歸文章晚未用嵗月事多違江接鄱陽路風吹遊子衣不應蘧伯玉獨悟昔年非孫首之短堂孫郎囊空意且滿自謂身長才則短以短名堂堂未成長短是非俱不管嚴州一見鬢蒼浪贈我新詩如夜光何時到君短堂上更話如今歸興長朱成伯秀野堂客愁固多岐我懷亦蕭散連年尋故人見子二水岸官居少間暇嵗月忽已換有堂名秀野未入俗眼看得名自君子可當清淨觀未能熟桃李且自飽藜莧荒涼城一隅初不越門限脫身少年場念此已熟爛嗟豫老病侵閲世蓋多難相逢默無語自足洗憂患窮冬足雨雪近市乏薪炭時來正堂堂尚得一笑粲次秀亭韻舟車來往閙回環今日陪公得暫間漸喜著身人迹外勝如隨衆馬蹄間縈紆細數溪頭路蒼翠遙看雨後山正恐朝廷須舊物不容常此面孱顔舟行至桐廬乘舟待潮發一日到桐廬物色寒初甚溪山畫不如往來真是夢親舊不須書猶賸鴟夷在時容託後車示兒忍窮吾有味雕句汝無功客舍囂塵裡春隨浩蕩中初無買山費直與住菴同更想顔回宅簞瓢亦屢空嚴州春曉居間病常嬰出郭春已老微雨淨新緑轉覺原野好故人各漂散頗恨來不早尚有壁間詩猶堪寫懷抱將適三衢而七弟欲往臨安臨行作詩奉送弟要題詩别人還勸我留如何南去路更送北行舟處事須逺略擇交當廣求秋風理歸棹為我上衢州擬古樂府髙堂陳八音同聽不同樂狂飈送鴻鵠萬里翔寥廓一去三十年事事非前約當時緑綺琴塵埃無處著時節非不久此意但如昨將往城南觀音寺阻雨未果野寺他年别溪山浪作秋初涼頗宜出小雨故妨遊僧老渾無念田荒近不收猶思五更懴清切似蠻謳求趙表之墨超然堂中墨如戟支撑宗門渠有力參得諸方一味禪以此示人人不識病夫見之喜折屐便欲投詩恐無益主人不吝是家風會見琅琅送圭璧陋巷陋巷客自稀短日寒未到感君時一來得以慰懷抱論文有根柢落筆清且奧如歌五絃琴促軫有餘操黃花開正繁薄酒可相勞請君尋此盟妙處同一造聞蔡九弟十四弟到行在苦懷我表弟别久費相思愛客能忘酒長貧不廢詩每蒙高士喜終少貴人知試問遊吳興何如在蜀時窮臘有懷氷霜到窮臘伏枕久亦倦思公如和風咫尺未得見人生無賢愚各自有志願但得所趣同公固不我賤何須肱九折始見金百鍊平安望中原棲息各異縣尚欲從公遊衰年保窮健贈人堅卧因循欲過冬故人無復馬牛風得君好句能忘病笑我長飢不諱窮清夢肯嫌齋舍冷破囊常伴酒杯空新正所願長窮健剩作歌詩凖備公夜坐所至留連不計程兩年堅卧厭南征荒城日短溪山靜野寺人稀鸛鶴鳴藥裹向人間自好文書到眼病猶明較量定力差精進夜夜蒲團坐五更簡李巽伯愛酒舊無敵能詩新有聲荒城時過我長句屢尋盟往事十年夢生涯三尺檠却憐陶靖節著意賦間情官間贈人自喜間官不計年月叨微俸勝歸田藥囊往往充詩藁米劵時時當酒錢忍病作勞吾不厭對人無語子差賢不須更見盧溪老會得安心即是禪病中得舍弟信頻通婺女訊兼得會稽書嵗月呻吟裡文章因睡餘百年判憔悴萬里付迂疏尚欲身強健相從得定居寄米希真幕下諸侯老微言衆不聽祗應有餘論時復注前經郡古疏還逺官間任醉醒主人鵝可換更為寫黃庭山城雨山城雨雪繁春氣來不早思君如和風未見意已好時蒙枉車騎笑語得傾倒我能知子賢子亦憐我老舊友半鬼録在者迹已掃慨然念平生令人惡懷抱相從飽吃飯此計或未保東遊有前約預恐别草草豈無一言贈妙句寫默藁出户仰髙山猶堪慰枯稿即事經旬困炮煮今夕有微風市井囂塵外溪山嘯傲中秋涼亦不逺吾道恐終窮凖擬閩中士今年一笑同宿昔宿昔尚煩暑平生悲逺遊長貧不貰酒雖健懶登樓晚節勞千慮經年走數州新涼事事好只是迫防秋謝人送詩堅坐少愈樂欲行還滯淫時蒙七字句可慰十年心嵗晚日晷短天寒霜雪侵主人不厭客敢避酒杯深寄京口使君使君鎮京口隱若一長城詩律有同社溪山聊主盟囂塵不挂念鷗鳥自忘情曾記貧交否衰頽判此生再贈婺女勝京口公來嵗已秋間雲出山寺好月挂星樓往事付清話故人多倦遊十年浪奔走今日為公留贈友子來已冬深僅得數夕欵寒窗聽談道未厭白日短從來不飲酒萬事付茗碗别去今幾日荒階月猶滿遊山世味日可厭兹遊那得忘稻田疏宿雨木葉犯新霜潦倒交遊在追隨氣味長僧窗有靜供茗碗侑爐香江梅江梅消息未真傳微露芳心几杖前不信氷霜能作惡要令桃李便爭先斜枝似帶千峯雪冷艷偷回二月天凖擬從君出城去竹輿仍勝百花韉夜深歸家聞鄰家小兒讀書可喜有作還家更寒三鼓餘鄰家小兒猶讀書王侯將相乃無種紈袴綺繻寧似渠北風颼颼霜被草聽汝讀書聲轉好莫言翁媪惜膏油有兒如此可無憂雪窮巷無人對雪小詩自可逃禪看取一年三白喜歡共入新年堅坐正宜養病開門便當幽尋一夜雪深一尺與誰取酒同斟報渾菴春草仰生活春暉常照臨不知欲報德何以見此心江漢有時竭此心無淺深魏氏有令德傳家非獨今結菴在山阿日瞻松柏林仁風被逺邇猛獸不敢侵今子守直道意往無﨑􅋂遂令此鄉人得聞金玉音我行時序晚回望西山岑延頸長太息聊為純孝吟雪夜破屋除燈雪自明案頭無用讀書檠老慵已慣跏趺坐昏夢尤便松竹吟知有故人來問道久無佳興與尋盟明年更有閩山興但辦行纒莫計程周仲固尚論齋周侯不出何所為閉門讀書心自知簞瓢陋巷君不厭讀書萬卷能忘飢上參羲皇下秦漢采取英華飢脫腕是非榮辱姑置之忽若乘船到彼岸古人之學有傳授君生寂寞千載後問君何以識古人袖手無言坐清晝以此讀書為尚友是事渺茫人信否人信不信君不問松柏固難生培塿朝來落葉滿荒城青山照人溪水橫往來車馬作塵土想君深夜讀書聲重陽前一日作涼風策策傍江城道路猶寬逺去程秋晚情懷常索莫夜長更漏轉分明未償臍腹三年艾不負膏油二尺檠明日黃花一尊酒苦思親舊與同傾送曽𢎞甫知黃州才過清明日更長竹輿頻出度浮梁雨侵田水連溪白春入山花帶密香數有故人相勞苦不嫌俗事且窮忙今年尚有湖湘興不待秋風便促裝謙上人清湍亭道人結菴殊未就先起小亭山左右不將溪水濯塵埃且以清湍為客夀雲煙映靄作春濃草木堅枯辦秋瘦客來相對兩無語豈有浮辭問時候一生行腳如夢覺天意似於君獨厚我今留滯未得往想像此亭如故舊再三伸紙誦清詩已勝開尊飲醇酎上人録寄彥禮彥沖原仲諸公題詩簞瓢可樂不淡泊蘭菊重生足滋茂他時有暇更分題此遊未落諸公後送詹慥秀才子今來幾時嵗月忽已晚今當别我去道里初不逺冡山霜正濃馬草寒更短何以奉親歡一笑和氣滿邇來遊學士已見如子罕讀書要躬行俗事不厭簡故鄉多耆儒歸日正可欵時能寄餘論尚足起我懶兩州多便人自可數往反靜軒紛紛逐人行擾擾與事競不知一世間能得幾人靜公今默無語種種以靜勝人來漫相接事至聊復應開軒道院旁足以補我病日髙公事散轉與靜相稱千載師蓋公此理久已證爐煙裊暗窗松聲韻鐘磬簿書勿勤來公方在禪定秋窗遣興十首造物何繁敷雜然呈萬變潛飛愜會心顯藏亦遞見人生事機巧雕鑿失性善碌碌塵寰事輪環走精電蕭散眄庭柯商意集微霰晴枝颭小鳥啁啾振毛羽涼颷墮寒花靜中有真趣倚檻看浮雲隨時成散聚世變無常境心定自安遇棐几雜圖書幽事能畢具朝擁羣書坐所樂常自足聖賢重出處理本無偏曲志行道合尊安貧未為辱壓架富卷帙縱情無踡局窮達各有時此意當勉朂東園有喬木翳翳凌霄漢嵗月變虬枝雨露滋霜幹濃隂蔭書屋伴我同昏旦根株視百草秋風已萎爛良材際時用未忍付樵㸑抱璞淪巖阿失懷亦自寶豈無用世心遇合貴得道連城重白珩聲價先傾倒瑕瑜混沙礫莫訝荆山老會當遊勳華兀圭贊熙皡旦奭久不作依然三代民一善孚萬端不難風俗淳上士貴抱負修已在立身進退各有據宇宙任屈伸願言勵厥修學以答君親門外一渠水清清自泠泠濯纓偕素侣鬚髮無遁形春風起層波鵾化失南溟縠紋亂星斗泥沙混窅冥澄清當有志天地還虛靈知者尚明察不為物理宥吾儒任學術精力事研究至人邈難繼得亦瞪乎後庸盲終溟漠全天亦自厚大化無殊途何事朴與秀寒氣生户牖草木變輕黃南郊詢秋畦豐稔薦滌場八口娛妻孥溫飽樂嵗康簞瓢亦自得憂樂各相忘所以常欣欣安問無儲糧我生事柔翰中懷異好尚瀟灑逼嵇阮功成薄瑜亮白衣本山人置身豈疏放途逢醉尉呵未具封侯相亭亭千仞松當破萬里浪次韻錢遜叔泛舟虹橋半篙春漲緑平溪二月江城草色齊舟比蜉蝣千頃外身同􅦐鷃一枝栖野橋栁線斜風軟曲檻花光夕照低却訝探驪人不至清樽畫舫倩分題春暮渡江霽色春江上滄茫一棹通水隨天地濶山入畫圖工薄靄凝新碧輕風墮亂紅片帆迎返照疊嶂路疑窮渡鶯湖至溪上即事宿霧重隂傍晚桴日斜風定渡鶯湖陂塘浩渺水光濶煙寺中流島嶼孤滿眼波濤迷客泛一行雁影帶雲徂到來荒舍未岑寂寒樹依依閙晚烏絡繹蕭蕭遍里門支機嘉事自天孫七襄曉織憐花譜百室春梭饜夕餐誰檢吳闕嵗月猶飛楚縠照軍屯摻摻女手還持作佳麗江南第一論湖水安瀾似鏡明昔年曽向鏡中行侵晨浥露來花市落日流風倚醉楹俯仰繁華餘暮色蕭條高寄但秋聲應知節序猶遷轉撫劍如何教未平紀棲賢山讀書遲日欣欣山景妍攜琴吟咏翠微前行厨燒筍粉鋪色髙閣看梅雪白天午罷拋書曳短杖雨來擁卷聽幽泉一春灑落韶光足他日芳懷得復然秋日康山東歸整楫凌晨問所之鄉園迢遞水東遲歸舟但信溪紅蓼别夢還牽山翠眉安穩秋風三徑竹躊躇行李一囊詩解維猶有留題處瓜葛縈懷不自持中秋雨雲初霽放晴空乍捲珠簾望月宫夜靜笙簧何處發玉樓猶記月明中泱泱秋水荻蘆輕徙倚樓頭待月明紅燭燒殘白墮醒秋風颯颯獨關情長嘯夜泊春煙失晚樹柔櫓翠峰眉野徑尋山暗艤舟問路岐敲詩吟入甕點字黑前池把酒懷前哲蕭條一夕思月夜間步聞笛挑燈讀易後乘月到溪前野犬聲如豹秋蟲吟似蟬光寒人意靜影淡物情妍更聞村笛逺幽意曲中傳遊石筍菴石筍殊峰精舍幽瘦笻踏向碧雲遊天然青茁層崖裡玉版參來點石頭夏夜宿乳竇峰峭壁凌空靄氣浮山泉滴茗暗香流炎雲不到氷心靜好句峰前一簟秋兩宋名賢小集卷一百四
