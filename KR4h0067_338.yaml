body:
  text: 兩宋名賢小集卷三百三十八宋陳思編元陳世隆補古梅吟藳二壽鄉衮訥齋先生三首華衮褒榮御墨鮮堂堂劍珮在凌煙十三相後功為最五百年間遺有傳落落甘霖施后土岩岩巨石補青天太平有策安排了浯水清風崖可鐫世態浮雲無定形先生緑野竟留情詎知寶祐老臣在又見金陵新法行洛邑幾時歸赤舄東山再起答蒼生不堪局面遲一著願祝薇垣星更明時丁大全當國當年河嶽已儲神理亂分明關一身瑞應麟書知孔子恩光鳳詔見庚申世臣喬木蒼蒼日驛使梅花嵗嵗春笑指紫陽山作壽會看重慶喜尤新先生生于庚申之冬感興四首多病頻辭客無人自掩扉斸松供藥火葺葉補漁衣日月雙丸疾乾坤一粟微不須求外道悟此是玄機野興在漁艇風潮不憚勞苔生肥石骨水落瘦溪毛霜重稻粱熟天清雁字髙醉餘歌古調人事析秋毫閉門逃俗客攜酒過禪關竈古茶煙斷殘碑雨蘚瘢秋僧行影瘦夜鶴病翎寒片月隨人到孤琴對佛彈百事謀何拙一間夢亦清定交毛穎子結怨孔方兄鶴影雲煙瘦蟬聲風露輕寸心虛白久蛻骨待丹成金陵寓樓居樓中有酒客身間約住孤雲共往還搖落碧桃春欲去倚闌無語看鐘山過涇邑水西縣尹先伯祖嘗為邑簿領耆儒有識者客裏身無事乘間過水西清波明白鷺緑樹帶黃鸝酤酒道旁飲吟詩石上題邑中逢故舊坐定説環溪南陵道中迫暮投茅店四圍率敗籬令僕夫環卧故山三百里歸路正羊腸密樹標茅店荒池界竹墻僕眠如鹿伏我倦背龜藏素志非南阮丈夫掃八荒泊蕪湖縣古邑蒼江曲鱗鱗華屋橫酒樓歌妓集漁市販夫行野濶雲無勢江流月有聲橋邊詩思繞譙鼓更分明庚申冬壽秋崖先生瑞宿當年降世間祁山深處著仙壇梅開冰壑珊瑚瘦岸聳暗空碧玉寒清氣胚成龜鶴相丹田煉就虎龍蟠待教鬚鬢渾如雪恰寫耆英與世看九日秋雨梧桐退老時寒城九日正霏霏功名不直三杯酒世事直如一局棊頭且插教黃菊滿手今莫負紫螯肥壯懷無復登臨恨破帽西風一任吹春晚郊行芒鞋竹杖出柴關檢校園林腳不間翠幄初張花結局錦棚未解筍排班煙波鷗鷺春風外桑柘牛羊夕照間野興不須邀客共一尊白酒對黃山秋日遊竹會寺修竹隂隂古道場誰憐兵火地荒涼晚山俱似佛頭緑秋草不如僧髮長白酒莫辭今日醉黃花仍作去年香禪翁留客殷勤甚相對藤牀話夕陽子陵釣臺峭壁千尋屹曉寒何年人插釣魚竿煙霞不受衣冠涴天地那如蓑笠寬幸有同肩黃屋貴不妨伸腳白雲端能令漢室亦增重可作巢由一例看夜泊富陽片帆東去一鷗輕消得天公十日晴新酒一樽詩幾首故鄉千里月初更煙收山翠揩摩淨風軟江波尉貼平苦是狂懷費消遣船頭吹笛到天明别厲制使何日林間理故書客中嵗月只蘧廬糴糧半給梅花鶴燒葉餘分雪後驢蝶夢悠揚家國逺雁行零落弟兄疏寒花到了自蕭索不是東風不管渠天目道中天目峯前小駐驂長松夾道碧䰐鬖客懷寂寞秋般淡醉態朦朧午正酣山色儼如嚴父面鳥聲還勝俗人談何年來此種芝术乞與道人雲一龕春雪一雪滿天地三春景更妍鶴梳瓊羽落蝶舞粉衣翩嫩栁飄新絮殘梅補落鈿東風初解凍洗手破輕煙嚴灘對月憶雪壺亡弟卯君看月此徘徊今來月明君不來安得清光刀剪破為分一半到泉臺婺源道中憩午二首小息吟身古木隂詩情羞澀錦囊輕風煙不受人收拾擔閣行山半日程滿路黃塵人往還黃塵點汚幾青山便投山店睡過午要放詩魂出世間濯足五溪城東風吹水緑鱗鱗小漱清寒入齒齦萬里流邊濯雙足恐行五嶺涴晴雲登會稽山越上今為客息肩春樹林啼鵑歸夢斷落日旅愁深詩紀一編史琴傳千古心會須重過此禹穴一登臨春日吳中照人芳樹遲遲日吹面垂楊拂拂風客思一笻攜不盡鳥聲多在落花中嘉禾書所見翠幕重重護曉寒窗間金鴨篆煙殘芳情不采間花草獨倚闌干看牡丹荷花四絶一機蜀錦著紗籠不放纎塵到水宫但覺曉寒金掌重仙人危立白雲中右露醉臉潮紅嬌欲眠玉幢移影蓋嬋娟一奩晴色開明鏡暖尉金爐起碧煙右日颯颯涼生水國秋可憐無計解花愁飄然一葉隨流水付與真人駕作舟右風寒聲敲破玉琳琅綰斷鴛鴦雙夢長幾斛明珠收不起巧粘翡翠絡紅糚右雨俠客行擊築復擊築欲歌雙淚橫寶刀重如命命如鴻毛輕烏棲曲風敲玉鉤蝦鬚垂寒烏棲月萬年枝香薰翠被春宵永玉臂曲作珊瑚枝散髮玲瓏忩户午晴時散髮林間自一奇鳥睡香奩花影動蟬吟涼境栁隂移髙山流水琴三弄明月清風酒一巵要是閉門防俗客莫令到眼敗吾詩讀嶽武穆王傳鬼域為妖天地昏將軍那可一朝存泰山頽喻哲人死東海旱為孝婦寃當日主和甘下䇿到今無計復中原清風凜凜一編史拭盡英雄幾淚痕行春次俞兄韻二首幾日春愁不出行園林又是了清明春風桃李一場夢夜月江山千古情吟倚長松伺鶴到坐臨釣石看雲生此懷不解自拈出漫譜離騷入笛聲多謝春風相此行馬啼千里夕陽明故人楊柳正年少知已青山舊日情思滿天涯芳草逺望窮江際暮雲生同來佳客自不俗相對松隂聽瀑聲淳熙丙申二月晦翁歸婺源先曽大夫因隨杖屨遂挂名于弟子之列乃以所著書説以求正晦翁可之又嘗投書論易甚詳龍翰不學緇玷家聲因讀遺文有作數語亦所以自勉云吾祖曽師雲谷仙讀書直下悟諦筌道參太極本無極易論先天與後天緑遍春風忩外草香浮夜月沼中蓮派分一勺濓溪水道統綿綿萬古傳再過孤山一函鶴骨已塵埃空築孤山碧玉臺添種紅蓮千萬朵梅花從此不須開兩宋名賢小集卷三百三十八
