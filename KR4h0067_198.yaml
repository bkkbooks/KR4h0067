body:
  text: 兩宋名賢小集巻一百九十八宋陳思編元陳世隆補林泉結契三王質山友續辭枸杞花紅紫實紅葉青春苖可食清甘人呼甜菜得名甚多最佳為仙人杖西王母杖我取友兮得枸杞石陂花頭犬聲起霏霏細雨雜斜陽半濕半乾留春水仙人杖王母杖所思兮何可曠野鶯慫惥野花旺黄精花青白子白葉青春苖可食甘腴人呼筆菜根尤美生肥土或如柑瘠土小亦如橘多啖可飽我取友兮得黄精竹葉荳花交野隂人不圖仙只圖飽鴉鵲窠凋龍爪零白可擷青可捋所思兮何由掇半巖斜陽溪影潑山藥花白莖紫葉青根可食極美人呼靈藷取之嘿則獲稱謂則無得相傳為靈我取友兮得山藥蝶花開盡鈴子落㡬日風吹黄不成藷根藷子多少靈猿父上􅏈子下所思兮安可捨一重空巖一重野甘菊花黄莖紫葉青春苖可食甘香尤宜茶莖青者氣㣲帶濇人號苦意不堪食我取友兮得甘菊髙叢低葉貯清馥石盂幡曬乳花飛錯落紛敷間寒綠入顧渚入䝉山所思兮何可捐椿兒桂子爭芳鮮牛蒡花褐莖如芋殻如栗實如葡萄苖莖皆可食人呼牛菜又號䑕黏子我取友兮得牛蒡稠叢捷䑕走不上深山誰㐲又誰牽唇麄舌皴膝頭壯實雖惡食不惡所思兮奚可却梧岡竹墩隔沙礫石耳色面黒背紫柔薄生深巖危壁餘木耳地耳皆珍我取友兮得石耳石壁崚嶒下無底非脾非腎非肝腸馬齒馬牙銜不起耳無是耳無非所思兮何可遺石笋石花滋不脂合蕈色黒為楮蕈最珍白蕈紫蕈各隨樹而生又茭蕈竹蕈梭蕈蘆蕈類甚多産於卑濕地亦多美我取友兮得合蕈山深樹底風不進彈子團圞敷未敷飛􅚦騰猿毋口麄藤花迷荳花肥所思兮焉可違溪山撩亂將安歸槐芽花黄葉青春芽可食或兎目䑕耳不堪食餘棗芽皂芽櫧芽初嫰皆可食我取友兮得槐芽繚陂灌業饒襍花纔茁嫰莢抽枯椏涎流山鵲并山鴉膠著䖟房著蠊所思兮安可芟碧蘚冷淘思露寒蔊頭色褐葉青堅瘦生深山峻壁極辛亦帶㣲苦稍傷大烈縷蘆菔雜之皆可食我取友兮得蔊頭猛嚏烈香驚伏虯石羊石蛇齧不得彈蟹燕蠶何可偷常風寒常雪寒所思兮奚可堪隂崖湧沫號飛湍山姑花白莖葉皆青木防風春芽可食餘天門冬芽萆薢芽芎芽地黄芽牛膝芽皆可食又號赤脚娘我取友兮得山姑春雨春風沙土蘇山麄屨綻不皴脚祗恐义頭罥花落拜頻婆揖菜娘所思兮豈可忘苦楝風髙須索防兩宋名賢小集巻一百九十八
