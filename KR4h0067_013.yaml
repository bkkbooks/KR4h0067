body:
  text: 兩宋名賢小集卷十三宋陳思編元陳世隆補寇萊公集早秋二絶年光苒苒暗推移坐惜流年感舊期獨聽早蟬秋色裡潘安初見二毛時一聽早蟬響坐悲芳嵗闌新秋空索寞前事但心酸秋日武關道中行塵漠漠起西風來往征軒似轉蓬駐馬幾多愁思苦亂蟬衰栁武關中早春日暖經水泮潛回律管春初驚栁色重漸見草茅新樽酒留歡少雲溪入夢頻惟應五侯地行樂及芳晨書山館壁秋作西南使千林覆去程四時無日影終夜有猿聲路入雲溪過人穿鳥道行不堪孤驛望風雨動鄉情送趙主簿之任惠安蕭蕭征騎立長亭遙指天涯萬里程尊酒欲闌人欲别夕陽絲管盡離聲秋氣凜然庭木將墜道謙上人有南征之役賦詩祖行洪府多佳致師今欲此行寒山連楚逺白浪浸吳平煙雨經秋迥霜鴻入夜鳴到時春未暮間聽鷓鴣聲酒醉勝逰惟晏是良圖何必凄凄獨向隅深院酒醒春日晚只聞芳樹語提壺南陽春日水滿池塘花繞城日斜南陌暖風輕千門栁色春煙淡獨依髙樓聞暮鶯春日長安故宛有懷唐室空城有舊基荒涼長使後人悲遙村日暖花空發廢苑春深栁自垂事著簡編猶可念景隨陵谷更何疑入梁朝士無多在誰向秋風詠黍離送人逰邉逺行當嵗暮水繞路難分匹馬陽關外邉聲落日聞惜花深謝暖風傳馥郁長憂夜雨暗催殘黃昏欲放笙歌散更繞朱欄仔細看微涼髙梧深密間幽篁乳燕聲稀夏日長獨坐水亭風滿袖世間清景是微涼帝城秋壁登臨秋向盡千里見王畿過雨山逾翠經霜菊漸稀平原夕靄起髙樹宿禽歸一望關河道空令詠式微禁中偶書所懷呈內翰同年同院二學士朝回內省中默坐對西風秋色澄寒沼朝陽上古桐龍墀慚近侍魚浦憶疏蓬會待酬恩了煙蓑伴釣翁新秋孤吟繞桐砌時莭又西風悵望新秋在歡娛往事空栁條微減翠蓼穗已飄紅正是多傷感仍將别恨中春書年長追逰興漸凋况兼巴峽景蕭蕭間齋為謝楊花到時拂殘書慰寂寥秋日晚晴池上作雨歇南山積翠明淡雲消盡逺天晴漪漣不動秋塘靜獨拄寒笻繞岸行夏日離心杳杳思遲遲深院無人栁自垂日暮長廊聞燕語春寒微雨麥秋時留題郡樓千里關河一望間登臨長到夕陽還欲驅征斾歸朝去更倚髙樓看暮山青州西樓雨中間坐海上秋添寂寞清萬家煙樹暝重城蕭蕭細雨遙天暮獨向空樓聞笛聲中書秋日有懷青社舊逰因書一首掖垣秋色生雞樹忽憶青丘感舊情曽倚西樓吟暮雨數峯寒碧繞髙城贈寶上人重城蕭寺雖留滯野鶴由來性本間寒磬終宵鳴竹院虛忩盡日對秋山旋移怪石資吟賞應有孤雲共往還自笑紅塵成底事幽期長是負松關雨夜許氏第會宿各賦四韻雨夜銷煩暑林塘向夕幽庭虛惟欠月冷樹欲生秋河北嗟新别樽前念舊逰若非逢勝會何以解離憂水閣夜望書懷水閣中宵動寥寥起逺思秋風生折葦星彩動清漪白社孤前約青雲少舊知苦吟空自嘆風雅道猶疑離京作致君才業本無能懸闕情懷老不勝欲過龍津重回首朣朧初上月觚􅀈洛陽道中感懷文陛初辭咫尺顔思深猶綴補臣班漢庭舊友雕零盡獨擁雙旌入武關初到長安書懷荐承丹詔撫雕殘適值年豐萬井安舊職尚兼黃閣貴前驅新擁碧幢寒靜憐風竹經宵聽老愛山雲盡日看魂夢不知關塞外有時猶得到金鑾逰花岩寺寺對南山積翠濃水村鷗鷺下遙空層樓望盡樊川景恨不憑欄煙雨中寄京兆向相公九萬鵬霄振翼時與君同折月中枝試思淳化持衡者得到如今更有誰和向相公見寄玉殿登科四十年當時交一作僚友盡英賢嵗寒惟有君兼我頭白猶持將相權送轉運梅學士進邉郡四首悵飲惜離羣窮邉去路分雪深山館夜孤雁背燈聞絶塞程方逺窮隂嵗欲殘石城歸夢斷隴月照人寒水逺沉來信山長疊去愁夜深關月白休憑驛邉樓夙駕巡邉徼歸程隔亂山長安草木麗春苑待君還春晝偶書白晝偶成芳草夢起來幽興有誰知風簾不動黃鸝語坐見庭花日影移秋夜懷歸渭水苔磯阻舊逰夢回空館却凝愁一聲江笛巴雲暝半夜山風楚橘秋星落古池孤影動燈遙疏壁冷光幽遲明不寐空搔首蹤迹何由得狎鷗憶洛陽金谷春來栁自黃曉煙晴日映宫牆不堪花下聽歌處却向長安憶洛陽古歌云金谷園中栁春來似舞腰誰堪風景好獨上洛陽橋長安春望感懷灞岸春波逺秦州暮雨微憑髙正愁絶煙樹更斜暉春晝午畫花隂靜春風數蝶飛坐來生逺思深院燕初歸岐下秋書碧樹微涼露氣清感愁懷舊獨含情西樓月下明如水只欠桓伊一笛聲憶岐下小池長憶西園清夜景酒闌無伴獨臨池可憐隴月三更白誰見紅蕖露滴時岐下西園秋日書事務簡羣吏散披襟幽興長松筠經晚莭蘭菊有清香水淨澄秋色山髙見夕陽身間心自泰何必濯滄浪秋懷輕雲不動日微隂髙樹無風秋色深獨聼暮蟬臨水坐十年林壑阻歸心秋自古名髙衆毁歸只應身退是知幾林風驚斷西忩夢一夜秋聲憶翠微冬日北齋寒風颯颯響庭槐愛日明忩生北齋間憶故山歸未得舊逰時展認雲崖秋齋霽景有誰同逺望秋懷無奈只悲歌雲收逺嶠凝嵐翠雨歇空庭敗葉多洛陽有懷岐山舊逰緑鬢年來已漸雕舊逰芳草路迢迢山橫逺翠疑歌黛栁拂輕梢認舞腰秦甸夢回空有恨洛城吟斷獨無憀斜陽更上髙樓望但覺離情一倍饒憶岐下舊逰二年岐下假諸侯事簡民安選勝逰花寺水村時駐馬暮天秋雪獨登樓靜眠鈴閣聞羌笛間酌松醪引越甌别後幾回空有恨葉飛蟬噪動離愁無題金甲珠襦鎖繡扄杜城殘月葬娥英春風侯館花如雪空有鶯傳度曲聲秋日登後樓逺山重疊故關遙公退乘間上麗譙今日登臨秋思苦雨荷風葉共蕭蕭早春星紀周天運微陽氣侯新郊原初度臘梅栁暗驚春故國無書久孤峯入夢頻年加自多感况復送歸人南陽夏日緑楊隂密覆回廊深院垂簾晝景長人靜獨聞幽鳥語風來時有異花香世間寵辱皆嘗遍身外聲名豈足量聞讀南華真味理片心惟有許蒙莊夏日書懷庭樹隂隂夏景遲間房愁對暮簾垂因思往嵗陪天仗正是瑶池賜宴時兩宋名賢小集卷十三
