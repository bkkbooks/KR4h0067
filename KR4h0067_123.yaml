body:
  text: 兩宋名賢小集卷一百二十三宋陳思編元陳世隆補崧坪小稿李維字仲方肥鄉人門下侍郎平章事沆弟雍熈二年進士召試中書知制誥為翰林學士歴工部尚書栁州觀察使有集二十卷休沐端居有懐希聖銀闕琳房視草餘龍門岑寂斷軒車彩毫閒試金壺墨青案時看玉字書王令風流希謝傅子雲詞賦敵相如瓊枝不見蕭齋晚蕙草烟㣲度綺疏直夜繚垣嶤闕慶雲深畫燭熏爐對擁衾三殿夜籖傳漏箭九秋霜籟入風琴階前槁葉驚寒雨天際孤鴻答迥砧攲枕便成魚鳥夢豈知名路有機心寄田錫舍人當年心計此心知忽忽逢人亦自疑枉是憂公生白髪有何長略謝清時林僧巳怪抽身晚朝侣猶嫌到闕遲多喜通規識幽抱路遥無處寄相思歸越東舊隠别秦中知巳客亭楊栁葉初殘歌咽秋空慘别顔吟愛好峰歸越路醉衝寒雨出秦關烟蘿庭户重棲倚漁浦人家舊往還縱使功名無分得免教心在怨尤間再㑹傅逸人分别知心意不輕幾年曾是愴離情㣲風吹雨雁初下落葉滿堦蟲正鳴燈静若嫌論劔略簟凉頻喜轉琴聲從來共約雲泉老肯向人間占好名貽傅逸人少年名節動人羣避俗身居積水濆幾為典衣留逺客半來歌枕看閒雲門連酒舍青苔滑路近沙汀白鳥分誰道無情活黎庻數篇新製詠南薫郊居寄朝中知己年來流水壊平田客徑窮愁自可憐汀葦亂揺寒夜雨沙鷗閒弄夕陽天狂嫌濁酒難成醉冷笑清詩不直錢碧落故人知我否幾回相億上漁船王左丞新菊青氊前席暇歸沐興何長北第秋将晚東籬菊正芳幽叢霏薄霧桂色豔輕霜己近黄金印兼臨白玉堂甘疑掩萍實秀肯讓芝房有佞還應指無憂可要忘蘂浮丞相酒氣馥令君香好固松椿壽仙經識秘方霜月銀牀葉暗飄霜月夜迢迢寒極犀難辟憂多酒漫消荀爐殘更換湘瑟罷仍調誰道河流淺盈盈萬里遙兩宋名賢小集卷一百二十三
