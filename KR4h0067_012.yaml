body:
  text: 兩宋名賢小集卷十二宋陳思編元陳世隆補冦萊公集雨中書事一雨起前浦霏微向暮秋誰方眠釣艇我獨在江樓山晦峰巒隱煙凝島嶼幽何當見晴旭一得泛回舟夜懷寄友生遙夜獨無趣恍然思故交泉聲飛石壁星影落蘅臯志在難低俗情間任獻嘲秋山雖入望猶不似鄉郊秋夜懷歸背忩寒燭影沉沉楚客鄉思欲不禁板閣漏殘人自逺水螢光淡夜方深牢愁聞雨眠疏屋歸夢隨雲徹故林憶著煙村舊風景柿紅時莭又鳴砧夏夜間書雨濛村落野梅黃茅閣間吟水氣涼幽鳥逺聲來獨樹小荷疏影占前塘間心終不忘漁釣淡分真宜習老莊報國自知無世用煙蓑何日卧清漳秋興浩然追憶館殿幽致偶成長句寄徐休學士軺車南去詠江天間憶羣賢倍黯然御水莎青孤立鷺宫槐煙冷數聲蟬石渠吏散簾風靜鳯闕雲歸霽景鮮幽致不知何日共君思惟賦帝京篇宿江西寺獨宿西林夜凝然靜擁袍巫雲秋暝峽楚月冷生濤莎敗蛩猶噪鄉遙夢亦勞霜風開落葉還欲續離騷聞杜宇曽為深寃無處雪長年江上哭青春平林雨歇殘陽後愁殺天涯去國人巴東寒食春雨蕭蕭寒食天逺行猶在楚江邉人思故國迷殘照鳥隔深花語斷煙薄宦未能酬壯莭良時空自感流年因循未學陶潛興長見孤雲倍黯然春晚書事春盡江天景寂寥思鄉還共楚雲遙林花經雨香猶在堤栁無風絮自飄水國獨慚臨縣邑煙郊爭合負漁樵青梅時節遲歸計且逐餘芳殢酒瓢月下懷故人清夜月初滿蘚庭吟更幽梧桐疏影老蟋蟀亂聲秋舊國情何極空江思欲流故人今底處危坐獨凝愁和趙瀆監丞贈隱士不愛簮裾陪盛列終年深隱養天機靜聞風雨眠漁艇間稱林泉挂道衣門接水村多野色鶴當莎徑立殘暉髙吟幽賞無羈束始覺趨時事已非雨夜書事離人聼積雨滴滴動鄉心故國程猶逺重門夜正深氣昏濛燼燭巢冷語棲禽遙想江南岸餘花委故林歸州留别傅君楊栁如絲拂畫橋此中留語欲魂銷還愁别後巴東館獨聽空江半夜潮秋晚間書吟情自覺都無趣况復離居感物華厭讀羣書尋野徑間收落葉煮山茶燒殘寒菊花猶在霜過香橙味轉加因想前朝重搔首不堪秋思極長沙聞笛平野人歸後孤城日落時西風聞一笛惆悵憶桓伊縣齋春書十二韻縣幽無俗事公退只髙吟江到荆門闊山連蜀國深峽雲長映日蠻雨易成霖羣雀鳴春院飢猿呌夜岑庭荒多古木地僻見沙禽印鎖殘陽後人歸疊翠隂思鄉空索寞素分信浮沉樂靜稀塵纍甘間負壯心衰容常懶櫛病髮豈勝簮寡欲慵求友防邪每自針澆風終恥合前事固難諶望斷天涯外離魂欲不禁豫頃從穰下移涖河陽洎出中書復領分陜惟兹二鎮俯接洛都皆山河襟帶之地也每憑髙極望思以詩句狀其物景久而方成四絶句書于河上亭壁堤草惹煙連緑野岸花經雨厭枝紅年來多病辜春醉惆悵河橋酒斾風蟬鳴日正樹隂濃避暑行吟獨杖笻却愛野風無定處水邉容易聳竒峰岸闊檣稀浪渺茫獨憑危檻思何長蕭蕭逺樹疏林外一半秋山帶夕陽暮天寥落凍雲垂倚望危亭欲下遲臨水數村誰畫得淺山寒雪未銷時秋夜懷洛下一上人逰宦忘機久心源亦自澄夜聼吳苑雨秋憶洛城僧木葉驚棲鳥寒忩暗靜燈何時過竹院一得問三乘題花繁花昨夜香苞裂露裛風吹照野時能與離人添悵望一時留與子規啼春望書事因晴每日向吟臺縱目山城景象開白鳥靜投沙浦去落花間逐野泉來客愁已被楊煙染春色難甘蜀魄催看即流芳無處問但將餘興滯黃醅秋日懷友生寂寂感離羣前期何足云人從秦嶺别蟬向楚江聞村送孤煙起山空白日曛更逢疏葉落愁緒轉紛紛春初夜書水國淹留嵗月空雲山東去阻千重欲令遙夜春愁薄須賴黃醅臘酒濃南浦有潮舂柵鎖西忩無睡怯嚴鐘誰家幾點畬田火疑是殘星挂逺峯江上古岸蕭蕭聞逺雁平蕪杳杳更斜暉空江極目望不盡楓葉半紅人未歸夜望南亭間坐欲忘機望久前村島嶼微數點寒燈起煙浪江船應見夜漁歸送人客亭殘照裡歌闋獨南行芳草無斷色離人多别情逺途方不極長笛更飛聲莫動鄉關念徒令白髮生早春溪氷覺暖微涵碧山杏經春半吐紅不向此時拚一醉到頭無計奈春風寄漳川隱士志髙長説恥鳬趨嵗晏園林戀隱居陋巷自甘棲短褐侯門終不曳長裾夜吟雪屋宜搜句春結煙蓑老釣魚為我紅塵偶為吏近來還寄絶交書慵趨大厦戀山薇立志由來與世違溪上有時逢靜釣雪中長日掩間扉自知天爵髙人爵不愛朝衣换布衣我逐浮名任飄泊清泉難得共忘機題巴東寺寺在啼猿外門開古澗湄山深微有徑樹老半無枝望逺雲長暝談空日漸移恐朝金馬去還失白蓮期贈隱士夫子住東野經年不到城愛吟無俗趣貪靜得間名荒徑侵山影虛堂出燕聲我慚為俗吏泉石負幽情南亭晨望寄唐知郡夢覺偶晨起南軒還獨過曉光生逺樹露氣冷疏荷空白逰塵少風清靜興多遙知江郡守幽趣在煙波殘月半夜沈清影宵殘猶伴吟已甘垂樹杪由得挂天心影淡潛虯媚光寒宿鳥侵誰家傷早别凝思共沈沈巴東有感長嵗天涯悲斷梗逢春無處不傷情那堪日落紅樓伴更聼蕭蕭杜宇聲首夏書事忩户經初雨風清野景饒間庭猶戲蝶髙樹已鳴蜩世態貧中覺鄉思醉裡銷縱吟還獨步時復過溪橋和李逢同年水閣間望務簡憑危檻凝然感物華孤林經野燒極浦見漁家灘急舟難渡山高日易斜明時如道在焉復痛懷沙塞上秋懷未識窮邉苦今逰信有之秋林殘照後開路獨行時磧逈風長急天寒雁渡遲離心已無賴更聼戍樓鼙送人歸吳忽憶湖山景沿流興不窮孤舟將去夜絶塞已來鴻白髮前期近滄州舊業空明時方道在莫更學漁翁秋日江天物候潛衰變氣爽初疑夏景餘雨漬亂苔侵古壁風飄紅葉滿荒渠晚雲連嶽藏幽寺秋水澄江靜見魚昔嵗一鳴無所恨緑槐金蕊任蕭疏寄贈笠澤處士笠澤漁人髙莭竒白頭猶自著蓑衣吟過竹院僧留宿釣罷煙江鶴伴歸花落砌邉春雨歇酒醒林際夕陽微中朝名士皆知已多説東來信亦稀栁曉帶輕煙間杏花晚凝深翠拂平沙長條别有風流處密映錢塘蘇小家喜吉上人至鄴北至夔城三千里外程勞尋苦吟伴獨入亂山行楚水秋無際巴猿夜有聲逢師不能寐因話故鄉情兩宋名賢小集卷十二
