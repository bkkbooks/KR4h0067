body:
  text: 兩宋名賢小集巻二百九十三宋陳思編元陳世隆補順適堂吟稿前集葉茵字景文笠澤人與徐璣林洪相倡和江湖間詩人也不慕榮利蕭閒自放所居草堂三楹牓曰順適取少陵洗然順所適之句翛然有遺世之想焉吟稿五巻閒雅似仲先清矯似和靖豈其志趣相契故口吻亦合邪古意悠悠澗邊人濺濺澗中水水流無返時人生流水耳偶成春隂晴復隂因物悟浮生杜宇鄉心重楊花世事輕知非蘧伯玉覺是晋淵明此意誰人㑹騎牛話偶耕蘇隄南北山圍翡翠隄隄邊緑漲軟琉璃參差臺榭無餘地雜遝輪蹄了四時楊栁又多前日樹梅花秪少近人詩停篙不看春風面閒伴漁翁理釣絲野望白水沿堤䕶緑苗鷄鳴犬卧栁邊橋數家雖不成村落一夢何曽到市朝次潘紫岩虎丘韻潭深劍氣銷樹痩嵐光薄石壇古即今藤花開又落晋士已結廬呉市猶舞鶴沉吟發幽懷人世舟藏壑别韓菊山結廬甫里隣顧瞻誰與遊掩荆樂魚鳥握管成樵謳有客賞兹趣栁下時停舟自締十年契投簮不願侯一朝過我别匪伊趨東州敢問何為爾讀書松竹幽輦母逺之官漫作升斗謀執手話勞役揮杯忘獻酬離懷聿云悲重來如此不何當羽厥身千里雲悠悠上下相追逐赤城少延留其中有玉人而可為我儔此志不可得迢迢水東流載言渉征途途修暑氣遒紾絺自金玉脂車裹糧餱我將植佳菊長對南山秋曲水流觴以下十詠題水竹墅蘭亭飲者徒因物寓天理著眼静中觀坎止流行耳峭壁寒潭百丈崖懸立一泓流緑漪品題無好語摹冩冷泉詩安樂窩受用十二時不離方寸地門外自風波行之以無事野堂風來無市聲景物占深静鷗狎堂上翁時來㸃天鏡竹風水月造物無盡藏散在林泉中結亭相周旋人與萬境空廣寒世界鼻祖舊游地留得老桂香有能培植之此香傳諸郎盟鷗同此江湖心有盟非知已我亦畏機人莫入驚波裏得春橋䇿驢風雪中東君獻詩料花驚非故吾聊復索花笑賞心橋沿堤過竹所履聲驚龜魚人生適意耳何必駟馬車尋源橋蹀躞水窮處雞犬非人間褰裳不用渉迤邐逃秦山愛閒亭僧舍苔深雨徑寒花落逕斕斑此處無名利誰人肯往還性慵綦局廢坐乆茗甌閒禪觀非難事休官學住山江湖偉觀此地舊寒碧留題䕶竹君窓虚不礙月壁老易生雲一水東西隔兩山南北分未堪低著眼世事正紛紛何氏書堂晋何楷讀書之地因名何山千嵗松隂䕶一亭風來猶帶讀書聲雖無芳史摹勲業自有青山説姓名客撫豐碑苔剥落春歸暗徑草生成幾年訪古謀清隱好借虚簷著短檠天平山謁范文正祠登白雪亭為謁先儒馬鬛塋倚藤得得上天平直疑寺外崚嶒石猶是胷中數萬兵松障四開心目快山泉一軟骨毛清坐間恰動思親念隱隱白雲何處生次林和靖先生梅韻世上羣芳未敢妍獨將春色占南園生來清質十分痩肯受紅塵一㸃昬東閣詩成應動興西湖仙去漫招魂便須結客陪花笑勾引幽香入酒尊蟠松靈巖寺草堂之前舊有蟠松尤古一畮清隂覆客衣相逢疑是草堂時隱然錯節盤根勢欠者昻霄聳壑姿天遣蟄龍蟠石窟人攀巢鶻俯霜枝百年培植今誰屬何待嵗寒然後知松本潘氏之物今歸於鄭寄所思淅淅竹下風活活橋畔水蕭蕭掩柴荆去去隱君子夙夜勞我思之徳洵且美瞻彼南山阿有桂發叢蕊奮手折其榮懷袖香盈只願為靈鵲飛逓聲入君耳春去幾陣紅侵野草一團緑染庭槐夢裏未知春去翩翩蝴蝶飛來歸途春來天氣半隂晴那更奔馳一月程又恐花時成草草還家挿桞佐清明山行青山不識我姓氏我亦不識青山名飛來白鳥似相識對我對山三兩聲次出郊韻支籐乗興入春郊梅壓疎籬亞竹梢剰喜此行詩有料吟來渾不費推敲生日口占舉室相先起五更為翁誕日夀金觥癡兒未識翁年甲五十年前今夜生時五十一酒邊次趙東閣韻竹褪粉痕新銷磨九十春中年真宰性上古太平人有夢詩將聖無愁酒不神静看紅紫路翻覆幾囬程友人自淮至别子若為乆于心終不忘一杯評舊雨兩鬢對新霜客裏春行早愁邊夜坐長明時成擯棄無語及淮鄉霅城愛向其中艤短篷眼前景物縂玲瓏神仙窟宅垂楊裏圖畫溪山落照中甚是繁華輸俠少也湏幽勝屬衰翁世間風月無如此賣鶴來謀地一弓次中秋不見月韻五分秋色到銀河應是蟾蜍浴細波握手相期千里共舉頭無奈片雲何愁邊幸自逢歡伯清處何須著艶娥未可來宵倦遊賞光輝依舊向人多雨中梅竛竮竹外枝啼糚凌曉霰東皇不主盟對人作此面即事竹暗筍無數江晴水有痕田蛙喧麥隴野犬卧柴門過溪筍輿軋軋亂山中籬落桃花潑眼紅小駐渡頭呼艇子一溪淺緑漾晴風白髪半世持竿笠澤濵鬢邊留得幾莖春近來白髪無公道暗把黒頭饒貴人泊舟溪口萬栁隂中繫客船桑條如竹葉如錢大姑小婦挑甘薺揺手烏兒正二眠賦順適堂取少陵洗然順所適之句暗觸少陵機茅居峙竹扉安時貧亦樂聞道詠而歸鳬鶴從長短鳶魚自躍飛吾猶臧穀耳夷跖是耶非除夜立春别嵗傳佳話論文憶舊盟黄柑凝臈釀爆竹帶春聲節序有終始兒童争送迎此身強健在列炬到天明梅疎影幾黄昏明明野水濵未風先信息無雪更精神一白見直色萬紅隨後塵自來花下飲肺腑盡生春晋子生日今朝阿晋紀桑弧郎罷持杯勉讀書斷莫繞家覓梨栗更須為國習耘鉏義方授汝心還愧隂徳于予計肯疎學取老莱如許夀年年綵袖拜庭除自和壯士須張燕角弧男兒須誦聖人書譬如田叟祈多稼未有春時不荷鉏分内功名從早晚腹中學問怕空疎老夫猶記昌黎語潢潦朝盈夕已除又有感一雁雲間落勁弧經秋不見寄來書人情自昔如翻紙世道從今甚借鉏塵夢隍中知得䘮爵羅門外看親疎嵗寒獨有梅花月香影年年到户除别可山松江之左可漁可農古樹隂隂碧波溶溶子契予好携家而從載笑載語乃棹輕篷㝠訪前修天隨室邇中心孔嘉奚居奚止有熏自南景物清美槐栁于前煩歊潜弭我有㫖酒與子酌之既醉且舞且歌而詩陶然樂只厥情怡怡一日舍去豈不念兹客懷先秋與言欲别屢止屢辭行計已决送子于舟期我乎雪敬哉前邁于時炎熱惆悵若失延佇長津復面猶賖奈何夕晨豈無他友白首如新念子實繁融融天真北山有梅南山有雲下有猿鶴中有隱居千里命駕余敢不厪乃志必獲載歌斯文止庵驛路施茶時事艱難路嶮巇得來名利亦何為趙州茶罷速歸去莫待鐘鳴漏盡時讀釣臺集萬仞山頭放一絲争吟好句計當時能詩若不能垂釣秪恐先生不愛詩遊西洞庭山漫遊三十載屐齒暈蒼苔兩地無多里一生能幾回洞深龍未蟄丹熟竈無灰已覺忘身世松梢有鶴來山行未了行春債因哦遣興詩寒多啼鳥噤路滑蹇驢遲乆雨紅辭樹深林緑授枝驚心衰朽日容易過花時入山到來非俗境一片隱心生晚露沈山色春禽和水聲逢人多古貌對語率真情同在無懷世爐薫荅聖明蟬桞外聲殘日未殘棲身未穩擇枝安不須過有螳螂慮黄雀從傍冷眼看螢自明自㓕度方池熠熠飛來去覺遲入坐㸃衣情分熟納交元在讀書時蛬壁間吟不待秋時吟苦中宵動客悲勸汝不須催婦織家家五月賣新絲酷暑動息汗流珠無風可滌除炎威獄下吏生意鼎中魚席地杯氷水扄門謝客車因思遊宦者曽未憶家居秋至節序暗催移清商漸届期旅懷蛬早計凉信栁先知萬事到雙鬢餘生消幾詩最憐梁上燕巢穩又歸時苦雨農事正紛紛天時異所聞舉頭方見日翻手又為雲茅舍蛙分部槐庭蟻失羣裁成憂國疏齋沐告吾君出郊多謝天公佐好晴只今載酒作郊行飛花戀客閒中意逺笛迎春景外聲已把物情歸幻相且將足力趁浮生南堂辦得休休計燕雀充庭亦賀成謝朱宜中𨽻字𨽻法如公有典型拙中藏巧混天成因觀體製超前軰旋闢軒牕乞扁名氣象晋人遒且勁源流漢刻古而清得來喜對兒曹語一字千金勝滿籝鱸膾圉圉洞庭隂西風苦不情墮罾雲葉亂落刄雪花明列爼移桃菊香韲搗桂橙四腮傳雅詠巨口竊嘉名誤上仙翁釣羞陪虜使觥甘膄殊机肉鮮脆厭侯鯖銀鯽將同調絲蓴乆共盟秪縁鄉味重自覺宦情輕風度偏宜酒頭顱尚可羮謫仙空汗漫何處膾長鯨竹夫人風神林下秀寵數夢中新假使不如肉爭知見似人茗奴甘謝事黄妳喜論親凛凜百年操從教進退頻王夫人神情散朗有林下風氣晉傳城下小菴水縁城詰曲水際暗桑麻籬落深村路閭閻處士家烟篁黏半籜風栁颺輕花隨喜跏跌坐香寒月影斜棹雪放船中流天糢糊淅淅霎霎鳴茭蘆萬頃刹那成玉壺柔艪蕩漾歌吳歈老漁直前相招呼骨相子猷洵且都其人豈是斯人徒相顧而笑掀虬鬚汝為汝兮吾非吾剡溪風景今何如誰能為人作畫圖予方奮臂持竿獨釣于江湖夀藏十韻門限何須鐵因為淺近謀假令長富貴消得幾春秋夀固縁心地人誰肯首丘未能忘後慮是亦慕前修繭室名猶在魚山志可求廻岡許埋骨吉兆協眠牛懶作化臺號何妨引客遊不愁飽螻蟻最喜近松楸物變終于盡吾生行且休年年春色裏洗勺聽溪流澠水燕談王樵自號贅世翁預卜為窌名繭室曺植登魚山有終焉之嘆遂營為墓唐史姚崇孫朂自為夀藏于萬安山剟土為臺曰化臺唐司空圖預為塚棺引客逰壙中賦詩酌酒莊子曰在上為烏鳶食在下為蝼蟻食田父吟去年積潦苦無収今嵗逢人説有秋未擬香秔供一飽􅭜􅭜新草葢簷頭又夜登車桁畫耘秧怕説風傷與水傷厯盡艱辛雙鬢白今秋方覺稻花香又老天應是念農夫萬頃黄雲著地鋪有穀未為兒女計半償私債半官租又記得年時竈不烟土倉今畨遶門邊已占此後無憂色緑遍村前菜麥田又逢逢社鼔佐豐年酒熟那逢釀雪天擘橘煮雞償一醉布衾烘暖抱孫眠林可山至梅花山底伴雲閒漫逐閒雲出故山君慰我思君莫去一詩先遣白雲還雜興兀兀北窓下嘈嘈林間鳴聲各奏小大諒亦隨其形倐然氣肅烈一夕俱沉㝠試語塵中士細聽秋蟲聲又七十云古稀予年三之二來景殊無多那復就枯瘁窘歩驚畏途無心慨時事何以怡餘生一日委一醉兩宋名賢小集巻二百九十三
