body:
  text: 兩宋名賢小集卷四十二宋陳思編元陳世隆補獨樂園稿一司馬光字君實夏縣人以父蔭入官年二十登寶元初進士龎籍薦除館閣校理英宗朝進龍圖閣直學士神宗朝加資政殿學士退居洛陽凡十五年田夫野老皆知為司馬相公自稱迂叟著迂書四十一篇元祐元年拜尚書左僕射是年九月薨年六十八賜諡文正徽宗初蔡京議光入姦黨碑令石工安民鐫字辭曰民愚不知立碑之意但如司馬相公謂之姦邪民不忍刻也怒欲加罪泣曰被役不敢辭乞免鐫安民二字於石末恐得罪於後世聞者愧之建炎中配饗哲宗廟文集八十卷自為編次以授子康康殁朝以道得而藏之中更禁錮南渡後謝克家劉嶠始鏤版以傳焉出都日塗中成賤生習山野愚陋出於骨雖為冠帶拘性非樊籠物揚鞭出都門曠若解徽紼亂絲是時天風惡靈沼波蕩汨龍鬛互騫騰鷗羣遠浮沒川原寖疏豁煙火稍蕭瑟草木雖未榮春態先髣佛桑稀林己斜栁弱條可屈蛛絲罥罟也晴陽鼠土壅新窟徐驅款段馬放轡不呵咄與爾同逍遙紅塵免蓬勃和王勝之十二月十五日朝退馬上作瓦溝微白雪光清闕角初紅海日騰塵息長街千騎入鞘鳴深殿六龍升雲巖有客空回首圭蓽何人尚曲肱自笑鯫生章綬縛不容逃去正如罾送崔尉堯封之官巢縣弱嵗家淮南常愛風土美悠然送君行思逐高秋起巢湖映微寒照眼正清泚低昂蹙荷芡明滅縈葭葦銀花鱠肥魚玉粒炊香米居人自豐樂不與他鄉比況得良吏來倍復蒙嘉祉君為太學生氣格己英偉登科如拾遺舉步欻千里毋嫌位尚微觀政此為始尊公久場屋上國困泥滓豈不重相離念子勉為理當令佳譽新煜煜滿人耳高堂雖在遠聞之足為喜何必羞三牲然後稱甘旨送守哲歸廬山哲公金陵來神韻自孤秀京華三十春高節愈幽茂烜赫公卿門道路日奔走自非趣尚合一息不相就慷慨賢豪士波溢千金富疏飯苟有餘秋毫未嘗受囂呶喧譁也不可變堅白如瓊琇居然尚愁寂終厭塵土臭忽思香爐雲薈蔚冠孤岫振衣尋昔遊煙霞宛如舊絡木藤蔓長攫爪持也石松根瘦瀑泉響夜壑乳管添春竇茅茨蔭方丈宴坐度春晝几席雨竒花階除馴猛獸方知物外樂回視人寰陋慎勿露聲光愚迷將輻湊遊噴玉潭二首其日大風驚風動地起遊客望山行若待佳辰去應無好事名萬木吼窮谷駑駘屹不前猶勝望塵客佇立九衢邉夜發長垣長塗暑氣劇永日卧郵亭晝伏如牆鼠宵行似野螢歇鞍沙月白拂面栁風醒歷歷瞻雲漢誰為二使星同舍會飲金明沼上書事日華駘蕩金明春波光淨緑生魚鱗煙深草青遊人少道路苦無車馬塵石渠諸君職事簡載酒擷花畏花晚浮舟逐勝任所之箕踞狂歌叩舷板眼花耳熱氣愈豪擲杯擊案聲嗷嗷驚沙颯颯繞洲渚魚龍遷去避我曹人生大料無百嵗貴賤賢愚同一致在家殽䔩餘幾何一日風光不宜棄呈范景仁劍山中斷融為川清江雙流鬱回旋溝塍田畦也阡陌燦如繡香粳紫芋皆良田池靈物秀氣淑美由來滚滚生英賢朝家文明所及遠於今臺閣猶蟬聨獵纓鳴佩走聲望出入金馬如雲煙奈何應辰獨坎壈坎壈屯蹇不得志也華髮未得離賔筵璵璠懸黎己為寶結緑劍名豈得偏棄捐願君彈冠自重惜邑人行誦子虛篇正月三日與廣淵同出南薰門分趨齋宫塗中成並轡出都門蔥蘢日欲昕野寒餘宿雪樹暗濕春雲稍望郊宫近先愁馬首分一朝猶戀戀可復久離羣和王道粹垂拱早朝王范二直閣班列在前戲成小詩霽日扶霜仗祥煙覆曉班帝居回北斗天闕竦南山紫殿鵷鸞肅金門虎豹環蓬萊兩仙伯迥立白雲間夏日西齋書事榴花映葉未全開槐影沉沉雨勢來小院地偏人不到滿庭鳥迹印蒼苔寒食南宫夜飲積旬留省署容易度春華芳草踏青晚長楸行樂賒雲疏時送雨風細暗飛花直有黃金百無因過酒家同張聖民過楊之美聽琵琶女奴彈啄木曲觀諸公所贈歌明日投此為謝坐曹據案心目疲出門上馬行何之闕然久不見之美率意共往初無期正逢攬轡欲有適為我却解連環羈間軒適足容數客夏木初繁有佳色呼兒取次具杯盤青眼相逢喜無極檀槽錦帶小青娥妙質何須誇綺羅按絃運撥驚四座當今老手誰能過彈為幽鳥啄寒木園林颯颯風雨和啄長爪短躍更上丁丁取蠧何其多曲終拂羽忽飛去不覺酒盡朱顔酡己聞啄木曲又觀啄木歌雄文更復值絶藝有如天際傾長河今朝壯觀誠極樂去時將奈寂寞何歸來解帶豁胸腹坐踞胡牀仰看屋從今三日不洗耳耳內泠泠有殘曲人間何物號冨貴紆紫懷金盡虛器如君自處真得䇿身外百愁都擲置太學餐錢月幾何客來取酒同醒醉晚秋洛中思歸東園不利不名空去國雁飛葉落未歸來秋風肯待主人至籬下黃花隨意開相國魏忠獻韓公琦挽辭三首瀛海訏謨定宗祧指顧安鴻勳柱石壯徑節雪霜寒翼亮三朝久初終一德完如何未黃髮壟柏己丸丸愛物威容悴憂公宿疹加孤忠貫白日美志掩丹霞行路皆惆悵聞風悉嘆嗟英靈覲宗祖猶想佑皇家惻怛動旒扆鴻臚葬老臣簫鐃振淦口紼翣隘漳濵久大英名在哀榮異禮陳豐碑紀遺烈長泣鄴城人古松摧頽巖壑間磊落得天頑香葉低漸水餘根倒挂山白猿窺子落黃鵠認巢還不久應為石莓苔舊己班黃柑黃金綴縹蒂搖落楚江涯采取杯盤勝羞將橘柚偕時移香不變物遠味尤佳欲種滄洲樹何年此意諧栁溪對雪春風不勝雪散漫度龍沙密映緣溪栁爭飛亂眼花鴟夷賖美酒油壁繫輕車塞下芳菲晚聊將當物華曉思二首束帶朝尚早蓬門未脫扃短籬潛落月老樹帶孤星隱几貂裘黑開編竹簡青子雲非執戟何以得窮經盡日少間暇中宵夢亦勞符移空浩浩榜楚鎮謷謷敢説今求郡翻思昔坐曹羡君乘五馬東去一何高奉同運使陳殿丞知儉字公廙惜洛陽牡丹為霜氣所損名花多種欲紛敷一夕霜風非所虞節物偶然何足道人情遺恨不能無飄颻健筆詩千首惆悵東風酒百壺縱使前春滿朱檻使車那復滯西都和王秀才虞仲字道齊以光始自陜右遊山歸復將登少室為詩見寄瘦馬飄颻屢往還疲勞専為訪名山須知筋力行將老漸恐峯巒不可攀蠟屐早能尋勝概彈冠悔更落塵寰幸依賢者為東道大得逍遙水石間和景仁西湖泛舟滿船歌吹拂春灣天外晴霞水底斑誰信飛觴臨綺席獨能回首望青山東門車馬匆匆别西洛風煙處處間疊石溪頭應更好却輸野叟坐林間贈邵堯夫家雖在城闕蕭瑟似荒郊遠去利名窟自稱安樂巢雲歸白石洞鶴立碧松梢得喪非我事何須更解嘲和楊郎中秋月秋氣平分夜沉隂乍散天窺林初淡薄照席忽孤圓冷入詩毫健光浮醉辨偏嘉賔勿輕去桂影正娟娟柏梯寺鑿石開溪峻登崖置閣危笑談空谷應步武白雲隨衆壑如翻浪鄰州若布棊何當遂棲隱身世兩相遺新買疊石溪莊再用前韻招景仁一溪清水珮聲寒兩岸莓苔錦繡斑三徑誰來卜鄰舍千峯我己作家山鹿裘藜杖偏宜老紫陌紅塵不稱間早挈琴書遠相就放歌爛醉白雲間送峽州陳亷祕丞三首宜都賢太守治迹古人齊虎負衆子去鳯環羣鳥棲行增潁川秩别降武都泥正恐還朝速春林未子規郡府猿聲外旌旗鳥道邉樓髙出楚塞煙霽識巴船襦袴嗟來暮簮紳惜外遷皇仁矜遠俗非謂意疏賢地險三巴口江流百折蟠騶珂通峽響門戟照秋寒翠壁虎牙石素花狼尾灘孫劉置柵處細為寫圖看送趙書記衆之官華州車馬西城外遙遙未有塵辭梁猶帶雪過洛漸生春幕府斜依嶽關山曲抱秦曩時謨畫拙不必笑前人和王勝之雪霽借馬入局偶書勝之家本公侯貴弱冠英才己驚世雒陽多士誰敢倫千古比肩惟賈誼昔遭絳灌深切齒奔走十年為下吏近方抆拭出泥塗稍學和光匿鋒鋭會計之官豈足為黽勉簿書聊自庇王城九衢臘月尾風雪數朝窮恣睢櫪間款段疲且病借馬於人亦疲曳揚鞭掣轡趨省庭刺蹙不前泥沒鼻慨然遂有勞者歌滿紙雄文歘軒輊人生榮遇有早晚視此錙銖勿關意況君卓犖高出羣異日青雲終自致鮮車大蓋擁驊騮莫忘今朝乘小駟正月二十四日夜雪疊瓦浮輕雪參差粉畫難苦欺初變栁故壓未生蘭夜色微分白春容不受寒即為花卉奪猶得暫供看苦雨積雨欲侵甸朝晡漫不分蒼涼微露日慘淡己生雲地半成泥滓天應厭垢氛時聞度蒼鴰空外自為羣始平公新作雙樗庵命光為詩間氣生王佐多才秉國鈞棟隆憑杞梓節徑仰松筠底績承平業遺榮壽考身結廬依散木退讓樂天真送鄭推官戡赴邠州二首形體邠公國旌旗漢將壇秦雲低落日塞樹怯春寒草檄無留思投壺不勝歡還應笑黃卷寂寂守儒官百榼行春樂千弓從獵豪苦吟邊月冷飛鏑野風高竒䇿鞭殊俗長纓繫不毛輸君躍馬貴一等著青袍敵騎作歸計聖朝方寢兵時聞候火入非復塞塵驚秋嶺無南牧春田恣北耕休窮西海路辛苦學甘英上元書懷老去春無味年年覺病添酒因脾積斷燈為目痾嫌勢位非其好紛華己久厭惟餘讀書樂暖日坐前簷和白都官序見贈齒疏鬢白兩眸昏萬事無堪老病身脫粟猶霑太倉祿法官仍忝外臺臣直緣迂僻求間地豈是孤高慕古人英俊滿朝皆稷契太山何必一飛塵兩宋名賢小集卷四十二
