body:
  text: 兩宋名賢小集卷二百五十八宋陳思編元陳世隆補西山先生詩集三真德秀夀外舅楊開國大中大夫漢千户子男一位周諸侯人生到此不易得况復寶帶懸精鏐雖然三者皆外物達人睨視如雲浮天公最嗇是眉夀七十從來已稀有堂堂玉立仙遊翁嵗比磻溪未華首碧瞳射人雙鏡懸曉窗貝葉聲琅然問渠那得許強健陰功久在朱陵編願翁遨嬉更千嵗做盡人間方便事却乘白鶴御丹鸞直上紫清朝玉帝贈旴江張平仲希季去聖既云逺至理日以冥言道指虛玄語性雜精靈正傳久蕪沒異學得魁橫卓哉周程張磊磈三代英妙藴發天地微言昭日星後來紫陽翁抑又集大成煌煌八書訓謂論孟大學中庸太極西銘易詩也凛凜萬世程學者生此時坦然有規繩但患舍康莊自趨柴與荆張君江西來頗嘗得師承敝衣雖懸鶉猛志欲掣鯨袖出文一編其辭峻而清此士不易得歸歟更研精勿受俗學變而為寵辱驚貧者士之常未合寧躬耕髙門謹勿謁養此氣峥嶸不見商歌人洋洋金石聲送王子文宰昭武樵川古樂國誰遣生榛菅往事忍復言念之輒長歎子往字其人寄任良亦艱傷哉周餘民十室九孤鰥深心察苛癢摩手蘇痍瘢願加百倍功勿作常時觀熒熒匣中龍爛爛巖下電紛綸揮霍間坐子百千變雖然事幾微易矚亦易眩誤從快處生理向靜中現健決要安徐聰明貴韜斂潛齋有愚言或可代針砭百鍊或繞指粹白俄成緇有初諒非難其難在終之道心眇絲粟易為羣物移不有精一功誰能勝惟危子今如玉雪瑩潔亡少疵願言保令德嵗晏以為期堂堂先太史一節貫初終况有夀母賢切切惟教忠承家諒匪易負任丘山崇可不日汲汲仰希前哲蹤敬義兩夾持師友交磨礲餘事作詩人母顓鎪句工平時州縣間上下意苦異善書肘或掣有志奚由遂子今得所從展布有餘地兩賢更勠力萬物應吐氣相期召杜功奕奕照采世不須峴首碑自有樵川志贈夏宗禹夏君宗禹示余以陰符悟真講義嘉歎之餘為賦二絶虎頭自合取侯封好為明時立雋功做了玉關班定逺却陪芝嶺夏黃公丹經千卷浩如林妙訣無多底處尋但要靈臺常似水自然元海會生金贈葉子仁上饒葉子仁為人推算􅗺占往往如破的嵗乙酉豫方在從班子仁以書來勸補外甚力未幾果去國進退得喪豫定如此子仁之術亦奇矣哉兹來過豫衡茅為賦小詩三絶因以自釋云易象推占妙入神勸人忠孝更諄諄只今誰似君平術惟有南陽賣卜人子仁每推論五行輒以善道勉人如孝弟忠信清心寡欲等語未嘗不懇切言之故豫以為有君平之風花正紛紅俄駭緑月才挂璧又沈鈎世間萬事都如此莫遣雙眉浪自愁知天焉用尤臧氏有命何須主瘠環若向此中能照破許君已透利名關贈徐碧鑑人言得罪為狂疏若論疏狂罪不無亦既自呵還自笑只緣骨相合﨑嶇論命豈能修造化相形那解脫頭顱知君藻鑑真超絶試問窮通改得無浦城勸糶陽和二月春草木皆生意那知田野間斯人極憔悴殷勤問由來父老各長喟富室不憐貧千倉盡封閉只圖價日髙弗念民已弊去年值飢荒自分無噍類幸哉活至今且復遇豐嵗庶幾一餉樂養育謝天地豈期新春來米穀更翔責況又絶市無縱有濕且碎何由充飢腸何由飽孥纍恨不死荒年免復見憂畏我聞父老言痛切貫心肺行行至平洲景象頓殊異白粲玉不如一升才十四問誰長者家作此利益事父老合掌言子文姓陳氏起家本儒生疇昔樂賑施憶昨艱食時巨室爭謀利米斗三百餘獨收七十二三都數千口受彼更生惠開庫質敝衣假此賙貧匱取本不取息所活豈勝計我曺非此翁久作溝中胔吁嗟薄俗中乃有此髙義吾邦賢使君愛民均幼稚一聞平糶家褒賞無不至或與旌門閭埔城沈氏或與錫金幣獨有潁川翁寵光未之被故作行路謡庶徴鈴齋遂且俾殖利徒聞風默知愧並生穹壤間與我皆同氣富者盍憐貧有如兄恤弟惻隱仁之端人人均有是頑然鐵石心何異患風痺不仁而多財聚易散亦易惟有種德家福祿可長世不聞眉山蘇盛美光傳記賣田救年荒生子為國器即三蘇父子也近世三山黃長者家喜賑施子朴為己丑大魁不見南浦毛一惟利是嗜積穀幸年荒生子遭黥𨽻天道極昭明勿作幽逺視誰歟為斯謡西山真隱吏挹仙亭漢宫葦篋兒呱呱濟南梓柱陰扶疏富平家人正偷樂安昌帝師工獻諛子真東南一尉耳黃綬凄涼百僚底手持短疏叩天閽義激丹衷淚橫眥翩然一朝竟拂衣愛君無路空依依人傳九江已仙去吳門再見是邪非神仙茫茫那可測上帝從來賞忠直天上果有驂鸞人合領羣真朝北極自從舉手謝世間千年白鶴何時還玉簫聲斷杉檜冷秖餘丹竈留空山谷口之孫古闕使亭斸青冥挹仙袂耿耿應懷貫日忠飄飄豈羡凌雲氣我未快讀華星篇清徹毛骨風泠然何當結茅最髙頂一榻容我分雲煙題黃君貧樂齋飯疏飲水復何求道在胸中百不憂參取章泉克齋句底須樓上更安樓贈張童子虎頭燕頷及鳶肩自笑都無一事全惟有數條瓜樣骨尚堪山澤作臞仙如瓜骨出人倫書聞君早號張童子顧我初非韓退之可惜浪拋洙泗業只看風鑑學希夷贈邵邦傑邵邦傑妙絲桐之技又善寫神西山翁嘉之為賦絶句五寸管能摹造化七絃琴解寫人心平生不作麒麟夢且聽髙山流水音夀楊和父誕日娛親始是榮如君慶事世難并名園春滿三三徑眉夀天開九九齡帝渥頻霑新誥紫雙親即日兩膺封誥文階重煥舊氊青玉杯從此年年把笑勸樽前兩福星贈梓潼袁君西歸君辭萬里蜀東遊海之壖所挾大易數自謂探幽玄縱橫布籌算妙若蓍之圓殷勤扣其説得數須得全人生穹壤間其孰司陶甄短長辨鳬鶴百一分夔蚿造物初何必賦受自爾偏數有饒與乏定命誰能遷理則無虧盈一性各渾然顔跖偶夀夭堯桀非愚賢緬懷樂正子聖門得真傳全生必全歸此語星日懸豫生故多奇榮枯聽諸天獨有任道心未死須乾乾君提空囊至又復垂槖旋豐嘗卜而來所遇非昔泉術工用乃拙為子笑且憐矢詩苦不多聊壓瞿塘船會三山十二縣宰皇皇造化鈞槖籥生萬彚林林滿穹壤異體實同氣痛癢本相關彼已當一視矧惟守令職休戚我焉寄盍推若保心眷焉撫孩稚橫目事征求往往學頑痺牀剝膚已侵鷹擊毛盡摰但期已豐腴遑恤彼憔悴近來二十年貪風日滋熾蒲萄得涼州西園鬨成市環瞻郡邑間大半皆汚吏民窮盜乃起原野厭枯胔哀哉羅禍徒念之輒揮涕天地忽開張清飇掃氛曀我乃於此時擁旄忝為帥顧慙老儒生蹇拙乏長技同官為僚友努力圖共濟惟閩古大都星羅邑十二豈無良大夫與我同厥志要如羔羊直委蛇自無愧勿為碩鼠貪躑躅乃多畏上方明黜陟我亦公舉刺民言即豐碑令聞疾郵置黃堂一巵酒殷勤抒至意慎勿多酌余憂心正如醉遊鼓山六月二日偕潛夫參謀諸友遊鼓山餘湧泉亭明旦登天風海濤坐白雲亭追懷昔遊愴然有感偶成拙詩奉呈并簡住山明師嚴宸有追詔趣上太守符疲民未蘇醒還顧空躊躇來尋靈源盟喜與佳客俱始酌清冷泉一浣丹墨汙超然煩溽中著身在氷壺遲明陟危亭雲濤渺空虛煙霏倐開闔峰巒時有無偉哉此絶觀雄壓東南隅蒼崖萬仭立四面環瓊琚翠木巧蔽虧亭午清陰敷令人淡忘歸似到真華胥憶昨泛蓮日選勝邀朋徒摩挲巖上刻慨仰趙與朱舉觴酹且盟一節期終初重來三十年恍如隔朝晡並遊四五人存者獨清癯有懷子陳子感嘆為欷歔子抱明月終我方長塗趨顛踣懼不免警省當何如願言祝同社著力相携扶禪伯亦可人新結峯頂廬老我故倦遊軒冕非所娛會須脫塵鞿來依懶殘居夀陳宰昉花種河陽未十旬和薰四境蚤如春試看條教頻頻下字字無非育物仁為民一念徹淵泉蔬茹餘旬始籲天嵗事豐登鄰寇熄乃知感應鼓桴然贈吳景雲昭武吳景雲善篆工刻為余作小印數枚奇妙可喜因有感為賦二首錕鋙切玉爛成泥妙手鐫銅亦似之若會此機來學道石槃木鑽有通時腰間爭佩印纍纍真印從來少得知不向聖傳中有省黃金斗大亦何為送曺晉伯令尹之官須江壯哉縣誰遣莽成墟舊觀嗟難復罷民苦未紓手摩應切切鞭算盍徐徐賴有賢邦伯當令子志攄此邑吾鄰境嘗聞歎恨深有田盡增稅無楮可為衾願布中和政母懷忿疾心歸田當有日好聽宓生琴兩宋名賢小集卷二百五十八
