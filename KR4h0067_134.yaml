body:
  text: 兩宋名賢小集卷一百三十四宋陳思編元陳世隆補苕溪詩集上劉一止字行簡歸安人七嵗能屬文試太學有司欲舉八行一止曰行者士之常不就宣和三年登進士第為祕書郎遷監察御史封駁不避權貴紹興中進敷文閣直學士致仕卒過新開湖呈無言兄御史整整斜斜村舍居十十五五沙中鳬潛魚釣影水深淺髙栁著行煙有無天濶雲低過平楚己覺淮音近吳語淮南米賤好留儂正恐不歸心更苦盧駿元憲使寄示會稽競秀閣識舟亭二詩為各賦一首蔥蘢秀擁秦山落盡日春風吹嶺腳朝來領略到窗几誰遣虛空出阿閣南臺御史去天近身與孤雲生兩角古語孤雲兩角去天一握胸中摸索千丈強更恐并吞有衡霍海門山邊初落潮西興渡口沙痕髙渺渺目亂翻雲濤心識不語迎歸撓江亭晚日風蕭騷軋鴉鳴櫓相向搖平頭雁落沙沒腰舟人底處尋青招宿溪口一首溪聲來天邊風水共豪縱夜氣劇奔馬侵曉不能控書生有情癡詠雪寧忍凍胡為枕寒流故遣不成夢次韻無言兄卜築二首求田問舍豈徒為晚悟前言不我欺地占玉杯初應卜門臨苕水宛分支鄉關怪客歸何早聖主思賢出不遲磊落胸中三萬字不應無意拯時危石枕方牀緑浪藤清談散帶似懷冰蔬盤尚雜水中蟹羽翣莫揮瓜上蠅五斗為貧真世業一㕓歸隱豈人能冥鴻萬里今何慕應笑飢飛側翅鶯賦建安林尚能家追逺堂一首履霜存永慕風樹寄悲惋古來孝子心百嵗常輾轉雞豚逮親存適意寧一臠他時轂千乘泣涕顔有靦生世苟如此豈得但理遣所以奉嘗事自竭叵不勉尚能七閩秀器識頗凝逺求官自束髮捧檄恨晼晚歸懷追養勤作堂近山巘欲招九原魂髣佛此息偃牛羊家自腯菘韭傍可剪春秋及時祀情物兩俱腆遂令里間兒艱詫知禮典孰先如此堂孰孝如此囝從今大而門至行神所戩宋景文公之孫景雲得玉龜印有忠孝侯印四字示詩次其韻寶器傳家寧浪出漢爵通侯二千石懸知忠孝萃公門寸印便應輕尺璧虎頭飛去通神畫未免誑欺涉嘲罵餘不左顧非偶然渭水得璜天或者公門次第生輝光一一詞鋒如劍鋩龜玉正憐俱在手莫放柙中蒼兕吼和巒嶅三子寒食少天色五字霧雨昏不醒東風曉能酸我食日不足寧憂三日寒去年今日時桃李半狼籍能隨里門兒買餳作寒食人言二月時霏雨生樹杪天色何時光要向寒食少江南舟軋鴉江北馬連翩經春不能賞誰云不關天春風未渠央花草有矜色酴醿會傾城牡丹欲傾國次韻徐立之朝議除夜無酒二首功名本是誤成蠅伎倆何勞更鏤冰竹屋紙窗風攄幕可憐挑盡讀書燈平生豪氣忍難除尚憶咸陽五白呼詩似少陵唯欠酒可能客舍事全無入靈隱寺石泉苔徑午隂涼手擷山花辨色香度嶺穿松心未厭好間翻為愛山忙次韻九日二首懷紱欣臨栁惲州據牀寧羡庾公樓雲橫浦溆無重數花繞岩巒最上頭詩遣羊何聊共和語驚陶謝未知休自緣風物撩人意不為間情作許愁蒲團趺坐冷如秋品鼓聲傳出郡樓聲一作風閲世夢中知是夢説禪頭上更安頭邦君化得俱吟咏居士年應賦莫休只恐官梅能動興從渠江草喚人愁次韻春日書懷一首水面紅雲次第鋪東君未肯向人疏興髙碧嶂千尋外春在黃堂一笑餘只怕玉醅浮盞斚不嫌花片落襟裾公歸行侍甘泉宴留得新詩錦不如贈别歸安周縣丞二首自我居里間連牆絶來去匪我敢杜門客實莫我顧頽然坐空廬習懶己成痼惟有一束書遮眼慰遲暮周郎來何許文字得我怖淵源笑鯢桓采色隱豹霧追隨古汀洲山色入幽步詩文互徴逐酒肉及時具如我衆棄餘君意獨何慕入蘭不知芳逐臭無乃誤君亦忘機人足迹亂鷗鷺堂前種白蓮心境涵淨土觀空本無説目物自吐露往來忘時節相對兩如寓屈指説去官始憶三年住輾然同一笑嵗月真脫兔我不記前三更問末後句庭前百箇竹眼見三隕籜不知如許久己復束行槖君初先住想晚去亦不惡官身等出家隨牒即行腳笑傲雲煙間何適非至樂嗟我獨奈何生理自窘縳四十三年非醖造此大錯從今便止止萬事付莫莫張公留衣鉢緑蓑與青蒻會當老扁舟相與同啐啄更看後五日放過前一著和族兄無言題能仁寺當雲軒一首緑樹新回合斜窗舊邃深壺觴如栗里嵗月似山隂半世懷清隱何年得此心借牀眠不熟酒力橫相侵次韻子我得俸一首祠官資薄俸肥遁要清貧載酒久無客乞醯惟有鄰廣文寧厭肉方朔漫長身莫遣陳萇到先生甑尚塵風氣東南異風氣東南異隂晴早晚間日光時透隙雲影半遮山掃徑殘紅盡開窗緑蔭還寄聲桑苧友幽興合相關緑暗山前路緑暗山前路桑柔宛宛垂稻秧分隴後蠶繭下山時白日繅車急中宵織婦悲老年官賦了不長一絇絲題楊吉老知軍玉輝亭二首向來風月清雄地今日升平將相家自啓窗扉放山入使君聊欲傲雲霞世間寧有清如許買斷嵐煙入樽俎我來乘此玉輝寒要上峰頭呵佛祖次韻方允迪祕監步月感懷一首伊昔苕水濱詩酒相迎送紅蕖三百頃天遣作妙供于今幾何時喜懼不同夢驚心風月夕怨笛有殘弄所嘆老侵尋不愧官冗從當時季孟間衆識長離鳯寧知天一角復此尊酒共文章自千古習氣無乃重詩如朝陽鳴一一律吕中從遊二三駿蹀躞不受鞚阿威有家學落筆競豪縱傷時復懷舊一笑得再慟公等俱勉旃如我堪底用允迪以羊膏瀹茗飲吕景實景實有詩歎賞僕意未然輒次元韻精金不受叉釧辱瑞草何曽取膏馥乳花粥茗名己非薦以羊肪何太俗山林鐘鼎異天性難遣華腴偶窮獨森森正味苦且嚴玉質無瑕誰敢戮君家饌林多錯本讀罷流涎誰枯吻故令茗碗變腥羶逺想黃封雪花醖呼酪為奴逢彼怒自昔爭雄巧相缺我寧不飲信我説獨喜君詩有神助君不見穆家兄弟故可人概以骨鯁恐異趣將如京師和方時敏機宜十二辰歌一首羣兒鼠竊均有遇老矣自知牛後誤成功未解聞兩虎援翰徒勞秃千兔佩書昻首何龍鍾靈蛇光怪蟠心胸馬頭二千悲逺道羊角萬里無髙風秦歌嗚嗚楚猴舞一笑何如共雞黍謀身狗苟君勿嗤聊戲墨豬書韻語昔人論書云瘦為形枯肥為墨豬謝吳興守李端明致酒一首時寓德清孔愈廟邊溪水長石壁巖下飛泉香居士住此幾寒暑只見四山青又黃大梅山法常禪師隱居餘姚南梅子真故棲有僧尋柱杖迷路至庵前問師住此多少時師云只見四山青又黃今年春雨摧麥芒六月稻穟乾欲僵煩公焦勞坐黃堂何不趣公歸贊襄為時開閣隂與陽不令此憂遺君王我居有如坐甑內四顧怫鬱不得驤公欲令我蘇肺腸白衣致酒甚沛缺瓶粟未空陶氏倉得酒且到王生鄉更招山前老漫郎謂沈次律渠家四柄荷可觴次韻建安劉彥沖學士寄茶一首寒溪日漱枯腸潔自志窮愁慚陋劣故人不愛北苑春更遣清甘嚅吻頰只今相望如參商武夷孤絶雲蒼茫底事坐閲百鳥翔要借玉川風兩腋髙飛令我墮君傍觀大龍湫一首峰頭雁何在井底龍不出吐作玉虹流倒挂二千尺落澗勢初緩漸聽轉山急噀面飛雨過著衣晨霧濕造物等幻戲此地真絶特勿言王事勞遇勝得小立慙愧大尊者幾載面青壁山髙不礙見泉聲不妨寂酬王元勃舍人方智善學士求余作墨竹一首余所居似賢堂蓋先伯祖端為竹製名今竹與故榜皆亡因敘此意堂名似賢人似竹瘦節孤髙照崕谷百年人與竹俱化尚有諸孫來借宿家風愛竹餘底事至今十飯九不肉惟應説食誑枯腸更寫寒梢媚幽獨王郎散帶談清虛為竹造門顔不忸玄英炯炯貌臞甚門倚江干千箇緑兩家人物總風流石壁山前煙雨秋豈唯千首輕萬户胸中世襲瀟灑侯我乃癡絶非靈絶憐此霜根貫金鐵短綃淡墨持似公更聽哦詩聲激烈訪石林葉少藴觀文二首卿雲覆其上草木爭鮮新竹露先參差晴羲破蕭晨萬石紛拱揖靜默自主賓是中有老仙雲霞煥精神朝暮林壑間搜抉出怪缺風攲青篛笠雨墊烏角巾山靈指相謂箇是夔龍身如何輕世纍蕭散意許真了知衮衣貴未若巖石親功名乃唾餘道德受咨詢我來追步趨且復結勝因劇談到羲軒愧此真天人夔龍在丘壑神物發幽祕森然萬瓊瑰參錯分位置踞地猛獸伏拏空孤鳥厲先後相長雄突怒疑攫噬各以竒自列寧謂我獨嗜羊酪非不珍蓴羮有至味鄭公信骨鯁我但見嫵媚種竹被崕巒惡木不得地荃蘭偏九畹薉草慘無類造化初何心被物自殊志那知此巖傍閲世等如寄願言賦丹青逺近同一視次韻王柱史題密印師寮一首巖下風輕進竹涼道人身共翠梢長飢腸欲和春泉響鼻觀先參煮菜香何處人間有癡黠不將身外較間忙鄰家柱史哦詩夜未厭敲門月到牆兩宋名賢小集卷一百三十四
