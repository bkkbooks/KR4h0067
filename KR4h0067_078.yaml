body:
  text: 兩宋名賢小集巻七十八宋陳思編元陳世隆補許文定集許將字沖元閩縣人嘉祐中舉進士第一歐陽修讀其文曰王沂公輩人也累官知制誥不試而除實神宗特命士論榮之契丹以重兵壓境求代地將奉命徃館客索地將隨語折之又與肄射將發先破的上聞之甚悦遂有意大用之矣進翰林學士權知開封府㑹治太學虞藩獄釋諸生無罪者蔡確陷之逮御史府踰月方解黜知惲州故事每上元張燈吏必籍舊為盗者繫獄將曰是絶其自新之路也悉縱遣之召為兵部侍郎屢上言兵事悉中機宜熙寜中西方用兵上遣近侍問兵馬之數將立具奏明日上問樞臣不能對也將身兼數器雅為上知紹聖初拜門下平章事章惇蔡卞方日夜求元祐諸人罪欲舉漢唐故事大行誅殛將諫曰本朝治道所以逺過漢唐未嘗輒戮大臣也哲宗乃止惇卞又欲發司馬光墓上以問將將又曰發人之墓恐非盛徳事上嘉納其言將仕三朝寵榮無替當時小人知其陰庇元祐諸君子誣以他事出知河南府屢丐致仕奉祠卒諡文定成都運司西園亭詩十首高牙負北郭芳園路西轉鳥鳴戀故木蘭茁歸新畹坐延花景深行倚笻枝軟翳然思林木會心不在逺朱堂俯玉溪玉溪清且幽從公暫偃息撫景空夷猶浮雲冠圓島白日回方流抵此有光碧何必崑崙洲重樓起城陰乘高望四極列峰横青天飛雪千里積疑是空素山冬夏海中白莫怪頻東向上有思歸客海棠冠蜀花此軒花尤冠紅雲簇蘂細渌水照葉嫩倚糚宫粉聚叠綺霞光散雨淚㸃春風應懷上林怨蜀地山四維益州平如掌纍臺鬱臨風坐看月宵上稍出叢木末始發衆籟爽兹焉暫遊目一覽天地廣闌干竇溜長䆗窱空埃静修林密總翠盡得錦城景雲舒青青色風散騷騷影未為夜行人共此晝夜永引泉注清渠潺潺潄寒玉側出閬風遲驟驚江雨速飛瀨乍揚白樛木細涵緑晝夜聲不止肯效楚人哭茅茨以為菴環顧蕭然虚内樂苟自足容人即有餘旁依修竹密上翳青松株勿言此中陋中有君子居飛閣出方池修竹見空莽低臨花塢近平覺春波長返景澄餘暉夕陰帶浮爽從容觀魚樂不減游濠上翩然溝上亭左右相映帶修柟列翠幄長松偃高蓋地褊景逾寛處約志彌泰誰知坐嘯問心遊萬物外遊東山和程大卿師孟東山十里復溪流逺客時時騁望愁泉近榴花深洞口亭開獅子舊峯頭一州旂色天邊出三館芸香海上留南北共歌公所憩獨嗟無計共英游東山碧巖亭舊室曾留古岸邊新亭同賞碧巖前日生獅子峰頭樹烟伴榴花洞口泉黄葉入秋山出地白雲臨曉海乘天飄然踪跡今何定别去江湖又一年兩宋名賢小集巻七十八
