body:
  text: 兩宋名賢小集卷三百四十二宋陳思編元陳世隆補雪林刪餘張至龍字季靈建安人博經史工文章一時江湖詩人多與倡和與靜佳朱繼芳居同建安生亦同歲投契尤篤至龍寄懷詩有借箸數同庚是也其詩用意逺而語亦清峭雪林刪餘一卷寶祐三年自為序雪林其自號云宿靈巖樹杪鍾樓出半層佛牀黠鼠弄殘燈五更石上僧猶定頭滿青霜喚不譍登東山懷朱靜佳布石行山澗雲封竹洞名照池傳古貌借箸數同庚禽鬬巢幾覆蛛間網半成冬深猶見菊還憶晉淵明塞上曲匣裏干將午夜鳴碧油幢下夢魂驚沙場磷火風吹起半在骷髏眼底明紫微閣贈凌丹士風林葉葉帶新寒已譜虀鹽客味酸兔抱粟眠傳道石鹿銜花上拜章壇沿崖取水和冰嚼掃壁題詩當畫看盡日玄房無俗話山鐘敲月上欄干送境山僧逰雪峰海風迎杖錫半是往來程故國往來熟空門宿食清舊房雲借住早路月同行象骨最髙處師今履是平齊雲寺雨疏分點下略彴界橫塘接竹通生水搴蘿補壞墻字塗窗眼黑香染佛衣黃未晚螢先出蕭然兩畫廊化龍閣鎸滿留題屋柱間風吹醉面不知寒漁舟撑出垂楊岸驚鷺銜魚過别灘弔蝶數日偎紅氣力慵化成長夢别春風却憐蟻為埋香玉舁入殘花土穴中寄胡竹洲野菜生根土亦香寒林晴久漏春陽山臨古畫開當戶蝸學臨書篆滿墻密竹旋刪嫌礙月青柑遲摘待經霜兒童間取池頭水剜破琉璃玉一方題白沙驛霧裏峰頭薄似巾路逢水後誤行人山泉釀酒力偏重石銚煎茶味最真燕不傳家猶教子梅才有月便生仁枕邊學夢人方悟未到鐘聲夢更頻贈劉介菴一心憂道不開眉懶扣黃扉謁故知有纍祗因難棄鶴無疑何用苦求龜常厨飲食夷齊輩晚筆文章漢魏時冷笑富家錢塞屋蘭亭誰更有真碑馬升菴惠鞠苗稅得鄰東地一方旋栽黃鞠待重陽春晨摘落青苗葉挼作秋花氣味香東林寺滿院香風乍熟楂援孫抱子坐枯槎科頭不慣迎賔客自折芙蓉供釋迦李梅澗雪夜留飲擁爐收案牘市逺隔喧譁妓唱新填曲僮分旋碾茶花枝承雪重燭焰受風斜僦屋為官舍更深酒更賖宿易沖妙道院松髮經寒亂不梳夜來風減屋茆疏吟邊凍指僵如鐵袖裏枯笻畫雪書朱柏巖約南歸思聞秋管悲猶未定歸期吟咏窮邊長艱難老後知水寒魚上少月暗雁來遲不作膏粱夢長令一劍隨橫峰感事石角多情挽布衣候蟲送響出林微文章首面超時好字學偏傍徇俗非緑水被風吹作白密花因雨打教稀歸鴉路熟知巢近直望松林盡翅飛答黃芳洲抱膝書樓望太清一生心事月同明因過鄰寺分茶供間取髙僧史傳評餞翁丹山發南浦鳴鳩語燕近清明栁絮風輕殃水平一帶春流多斷岸盡緣倒樹當篙行點史水草山光各自春間常謹坐百城身忠言似藥偏醫國好句如金不療貧王伯興亡難諱史彭殤壽夭不由人感來莫計更深淺秖見蒼頭換燭頻採蓮曲荷葉籠頭學道情花妝那似妾妝清雙雙頭向猶交頸翻笑鴛鴦不老成拗落圓房響釧金背人細數子藏深不嫌到手多尖刺秖怕傷人有苦心子期臺拾葉題詩愧不才袖遮微日上層臺山僧分我松隂坐隔岸花香渡水來武夷山九折蒼江轉葦航花間流水自宫商巖開天線登無路殿鎖仙金拜有光曝背龜從平石上避人猿向險枝藏斷橋盍有重紅日狂欲乘風和魏王擬韓偓體一聲阿鵲顫鸞雙學調新詞未得腔拜了夜香即喚睡旋收針線背銀釭題隱者壁寒著麻衣餒食薇樂山清興只琴知蜘蛛圓網當中立蜂徙新厨出外飛山脊倚天無改日草根埋雪有青時莫言鴻雁多相背去去來來共一機雨中過陸家園斜搭鞦韆窗半扃行人屐送隔墻聲羣花相倚啼妝面苦不催晴怨懶鶯寄苕川故人千古長情秖翠岑休談點石化黃金秋來國事方嘗膽病後禪機忽上心老眼看書嫌字細乾喉飲酒喜杯深幾迥空檢斑衣篋望斷白雲天外隂晚窗風約鍾聲落耳根歸鴉點點不成羣前山野燒青煙起散滿空中作暮雲喜楊琴隱至世塗多不平擇地度吾生風靜花遲落雲移月倒行自鈔間作改客借古琴評凡事虛空裏何勞苦著情寄寶林僧磨折英雄輩無停日月梭達人愁夢少明主直言多藥試單方驗碑評近本訛吟成無愛者寄與病僧哦巴嶺處處柴門掩半邉鶯啼緑樹隔炊煙竹梯間倚柔桑畔定是人家蠶正眠楚郎西臺省鞠鞠胎絲蕊未曽成百種藂中半忘名試檢記花牌字看春籬醉墨欠分明槎稿形冷度幾晨昏不受東風一點恩却有仙人求作伴浪遊星渚到天門古别離扶上花驄酒半醺望沈鞭影暗消魂離情恐被行人覺背拂菱花補淚痕峽口峽深猶有路泉逺不知源禽學鄉談語山填野燒痕晚風樵笛塢春日酒旗村茆舍人耕暇鳬雛浴水渾北津獨立長橋喜近城半闌斜日又催行船過别浦波痕沒堠立當塗里界明古木雲邉僧住處落花風裏鳥啼聲青山莫道渾無事自與行人管送迎江常菴出武尼厭居京洛説行時袖裏青蛇上武尼仙為寫真供御覽天憐病眼召神醫江中白石看龍斫洞裏蒼松帶鶴移無事出山衣屨溼滿城風雨鞠花時晚步寄劉徵齋縱橫屐齒印蒼苔夢筆山髙翠作堆日帶晚光歸海去風傳秋信下天來竹開小路通螢過松守空巢待鶴回蚋甕乾坤還自樂何須金屋玉樓臺簡勝上人林深嵐氣重一犬吠寒煙髙思天雲外新房柏樹邉愛蒲尋石種惜茗濾泉煎昔建如來殿老於師一年演雅十章麒麟感世出鳳凰覽德至人茍常見之應不指為瑞櫩蛛巧輕網林鳩拙營巢孰知拙反勝網壞巢獨牢鶴食野人田燕栖公子堂野情飢亦樂依人難久長猩猩殞機穽鸚鵡瑣金籠言笑適為纍緘默斯保躬蠶飽辦絲課蜂忙供蜜工役役為人勞衣食還自空鵲鳴人共憐烏鳴人共嫉祇因聲妍媸何心報凶吉江鱗行比目沙鴛睡交頸不知山兔寒清夜顧蟾影飢鷹健搏兔饞鷺勤哺魚各為口腹纍不聞有騶虞犬眠蒼玉地貓卧香綺叢倘無鼠與盜貓犬命亦窮墨魚黑覆形火螢明照身拙於用顯晦蹤迹從自陳寓興十首孤燈照長夜膏盡燈影滅劃見忩户間鮮鮮有明月日夜江水流下海水不止孰謂流去者不是海中水東日照瓦霜西向界餘白莫言日不到日光來未及遲日上深夜新蟬不終夕何如月團時通宵照無極種菊一百叢九月開盈枝莫言無好花好花開較遲庭前無繁植疏竹附梅坡雖然無巨蔭明月飛來多草蟲設細網纎細不可見日日朝露中羣白草間見髙風吹秋霜庭前百草死誰知草有根昨夜東風起夏月灌菊根見花在秋日先時不施工臨花已何及十年插栁枝今與髙樹齊垂條緣春風上有流鶯啼梅花十詠梅梢根清條不肥影落明月地凄凄欲寒時胚腪已生矣菩蕾歷歷銜冰霜綴作珠的皪香色俱渾然花中之大極欲開凝成姑射姿幽潔世所獨春近迫芳心羞澀破唇玉半開五出梢敷露不愛塵目愛鮮鮮著精神獨於此時最全開昨夜東風多花神莫之禦玉立對幽人十分盡情吐欲謝垂垂雪中枝暗裏度香逺忽動調羮機黏枝花力軟半謝旋隨瓊霙飛繞我茆屋角結子意漸濃豈為羌管落全謝冰花不留丁收香盡藏白一朝作陳人遜與桃李出小實青青長朱裳小摘胞不墮勾欺如豆微中懷仁巳大大實圓碧日益肥磊落壓枝重雖然苦味酸酸中藏大用兩宋名賢小集卷三百四十二
