body:
  text: 兩宋名賢小集巻二十四宋陳思編元陳世隆補西州猥稿宋祁字子京與兄庠同試禮部會諒隂止奏名以祁為第一庠第三章獻太后曰弟可先兄乎乃擢庠第一而寘祁第十累遷翰林學士命脩唐書書成進工部尚書踰月拜翰林學士承㫖復除羣牧使卒年六十四祁將終自為誌銘戒其子勿請諡其後張方平言祁應得諡賜諡景文九日藥市作陽九恊嘉神期人始多暇五藥會廣㕓遊肩閙相駕靈品羅賈區仙芬冐煙舍擷露來山阿斸煙去巖罅係道雜提攜盈䄡更薦藉乗時物無賤投乏利能射饔芩互作主參齊交相假曹植謹贋令韓康無二價西南歳多癘卑濕連春夏佳劑止刀圭千金厚相謝刺史主求瘼萬室繫吾化顧賴惡石功捫衿重慚唶思賢閣圖余真愧而成詠沗中二千石罷去輙圖真揆余本完士早蒙善養仁執笏班華位飛綏待邃宸如何金紫服乃裹丘壑身西南一面重朅來駕朱輪牽拙歳再期初無德在民形象安足紀崖畧聊自陳質陋眸子瞭志泰眉宇伸謂誰彼其子而傳阿堵神爵里三十八赫赫多名臣瞻前謝前哲垂後慚後人蜀地海棠繁媚有思加膩幹豐條苒弱可愛北方所未見諸公作詩流播西人余素好玩不能自黙然所道皆在前人陳跡中如國風申章亦無愧云蜀國天餘煦珍葩地所宜濃芳不隠葉併艷欲燃枝襞綵分羣蕚均霞㸃萬蕤淺深雙絶態啼笑兩妍姿絳節排煙竦丹缸落帶垂迴文錦官日傳信到邊遲海㯶哆熾風葉張囷皴雨皮厚叢橑列葢端攅旄注旗首物以稀見珍材縁怪忘醜枇杷有果産西裔作花凌早寒樹繁碧玉葉柯叠黄金丸上都不可寄咀味獨長歎答朱公綽牡丹珍蘤分清賞飛郵附翠籠蹄金㸃鬢密璋玉鏤跗紅香惜持來逺春應摘後空玩詩仍把酒恨不與君同贈楞嚴舒公上人丈室錦城隈庭閒地徧苔飯從香積取花續少林開講晝經殘葉禪宵獨委煤無嫌一時學要是暮雲才將歸二首逺假西南守三逢梅桞新衰令宦情薄老惜歳華頻郫釀工銷日巴禽巧喚春離家何所恨雁後作歸人雲棧短長亭今兹重作經卭崍叱殘馭蜀分使回星旅鬢雙垂雪羈懷一泛萍驪駒在門久此曲若為聽長安道中悵然作三輔古風煙征驂悵未前山園蓬顆外宫室黍離邊樹老經唐日碑殘刻漢年便須真隕涕不待雍門絃興亡作今古事徃始堪悲宫破黄山在城空北斗移走岡寒兔隠啼戍暮鴉饑灞岸重回首惟餘王粲詩過惠崇舊居雖昧平生契懷賢要可傷生涯與薪盡法意共燈長遺畫空觀貎殘詩孰補亡神期通一語無乃困津梁僑居公宇静寥寥居然俗意銷屐間誰記齒帶適自忘腰畆首秋殘穫城西日暮樵比來行樂慣隨意度溪橋春晏宴北園天意歇餘芳人間日始長落花風觀閣睡鴨雨池塘稍倦持螯手猶殘藍尾觴春歸無所預羈客自回腸臘後晚望寒日繫難定鳴笳㺯已休凍崖初辨馬昏谷自量牛漢樹臨闗密隴泉出塞流登高能賦未風物古堯州贈清逸魏閒處士奕世依巖石褒恩下帝庭姓名高士傳父子少㣲星池溜遙通澗家林近帶坰分明詔書意天極賜鴻㝠答勸農李淵宗嘉州江行見寄嘉月嘉州路軻峩接部船山圍杜宇國江入夜郎天霽引溪流望凉供水閣眠愧君舟楫意遂欲濟長川中秋新霽壕水初滿自城東隅泛舟回謝公命賦齋舫談經後官池載酒行斜陽鳥外落新月樹端生演漾思江浦夷猶遶郡城東轅有遺恨日想物華清再遊海雲寺作十里雲邊寺重驅千騎來天形欹野盡江勢釀山回園柰濃成幄樓鐘近殷雷斜陽歸鞅促飛葢冐輕埃題信相院黙菴對言方有黙因黙乃名庵庵留黙不遣一物遂為三龜掃泥中㾗正恐力弗堪自問呵黙者了然成妄談渡湘江春過瀟湘渡真觀八景圖雲藏岳麓寺江入洞庭湖晴日花争發豐年酒易沽長沙十萬户遊女似京都城隅晚意寥寥天意晚稍覺并閭閒水落呈全嶼雲生失半山牛羊樵路暗燈火客舟還暝思輸鳬鵠歸飛沆漭間夏日陪提刑彭學士登周襄王故城聊隨漢使者一止周王城片雨北郊晦殘陽西嶺明野禽呼自别香草問無名誰復黍離詠但多箕潁情東晉倉卒浮江日聲明建號初羣臣讓禁臠上宰製單綀氣鋭開桁戰心歡折屐書纎兒競撞壞不念好家居余昔遊雲臺觀謁希夷先生陳摶祠堂緬想其人今追作此詩仙館三峰下年華百歳中夢休孤蝶往蜕在一蟬空蘂笈㣲言秘宵晨浩氣通丹遺䑛後鼎林遣御餘風市霧沈荒白飡霞委暗紅峨眉有歸約飛步與誰同懷古眺望城闉聊屬眺千古恨悠悠夏享空臺毁韓亡故社留廟祠旌頴鳯溪水識巢牛春色依林動晨煙傍戍浮庌騶閒自集田鶴呌相求町篠夤縁密川葭靃靡柔櫟虚迷鄭鄙隗路隔軒遊感昔如吾輩曾經幾斛愁詠史古有容容福人譏齪齪員生貪巧作奏死戒直如弦欲重高門地非論媚竈天詩書大儒冡絲竹後堂㫋東閣飜芻馬西園竊瘞錢道謀誰執咎户選不因賢朱鼓成妖日羌雛入賀年須防反室詔終取闔門憐異日讒成錦先時黙似蟬空貽後人歎流涕掩青編覽蜀宫故城作國破江山老人亡岸谷摧鴛飛今日屋鹿聚向時臺故苑猶霏雪荒池但刦灰頳遺糊處壤闔記數殘枚恨月窺林下悲風覔隴來依城狐獨速失厦鷰裴回廢社纔存樹隂垣自上苔有情惟杜宇長為故王哀集海雲鴻慶院地勝祠仍古春餘物徧華山雲時抱石佛雨不萎花嶺挾樓梯峻巖牽殿墄斜淙谿雜環珮怪蔓走龍蛇供坐僧飛鉢香園客戲沙吾遊真草草深意屬青霞次韻和季長學士正月二十八日出郊見寄之什雅俗傳祠日年華重宴辰初陽澹江霧小雨破街塵客葢浮輕吹齋刀儼後陳林芳催兔目原色换龍鱗壤路歌聲雜褠倡舞叠新持杯徧酬客惟欠眼中人十日宴江瀆亭節去歡猶在賓來賞更延悠揚初短日凄緊乍寒天霽沼元非漲秋花自少妍蟻留新獻酎蕙續不殘煙戲鰋衝餘藻遊龜避折蓮流芳真可惜從此遂凋年潄玉齋前雜卉皆龍圖王至之所植各賦一章凡得八物或賞或否亦應乎至之之意歟遂寫寄至之萱草脩莖無附葉繁蕚攅莛首每欲問詩人定得忘憂否淡紅石榴移植自西南色淺無媚質不競灼灼華而效離離實芍藥有名見鄭風今賞異疇日采花當采根可能治民疾蜀葵紅白相嗣繁色鈍香亦淺相對庭户間俗尚焉能免竹脩脩稍出類辭卑不肯叢有節天容直無心道與空菊纎莖寒始密秀葉晚逾滋芳意君須識羣葩搖落時芭蕉不枝惟葉茂無幹信中空所以免摧折為依君子風官下東泊驂驔一駐車騩雲芣木澹扶踈風經禦㓂仙遊外野識禆諶草創餘潁谷寒煙仍井邑時門殘日但丘墟兩都大道過從盛不稱支離佩左魚兄長莒公赴鎮道出西苑作詩有長楊獵近寒熊吼太液歌餘瑞鵠飛語驚邁予輙作一篇寶樓斜倚闕西天北轉樓隂壓素漣白雪久殘梁複道黄頭間一作空守漢樓船塵輕未損朝來霧樹暖才容臘外煙弭節不妨饒悵戀待歌魚藻記他年寄題相臺太尉韓公晝錦堂瑞節前驅晝錦身堂成署榜示州民遷鶯賀燕聨翩集嘉樹甘棠次第春漳岸夕波通沼溜魏臺暾日㺯梁塵君㸔千古青編上得意如公有幾人寒食假中作九門烟樹蔽春㕓小雨初晴撥一作潑火前草色引開盤馬地簫聲催暖賣餳天縈絲早絮輕無著㺯袖和風細可憐鰲署侍臣貪出沭珉穈珠餡愧頒宣把酒歌管嘈嘈月露前且將身世付酡然漫誇鼷䑕機頭箭不識醯雞甕外天青史有人譏巧宦黄金無術治流年君看醉趣兼醒趣始覺靈均更可憐余既到郡有詔仍脩唐書寄局中諸僚一章通奏領州麾詔許殘書得自隨吾黨成章真小子官中了事是癡兒昏眸視久花争亂倦手搔餘雪半垂所願弟兄皆傑筆劉生當見汗青期真定述事莫嫌屯壘是邊州試聽山河説上遊帳下文書三幕府馬前鞾靺五諸侯王藩故社經涂國俠窟餘風解服仇四十年來民緩帶使君何事不輕裘擬杜子美峽中意天入虗樓倚百層四方遙謝此登臨驚風借壑為寒籟落日容雲作暝隂峴井北抛王粲宅楚衣南逐女嬃砧十年不識長安道九籥宸開紫氣深春宴行樂家園園芿初乾小雨泥飲壺遊屐况親攜身輕早蝶千回舞技癢新禽百種啼乗飲草茵侵坐軟畏風桃綬向林低陽暉自有留人意銜照高樓未遽西落花墜素翻紅各自傷青樓煙雨忍相㤀將飛更作迴風舞已落猶成半面妝滄海客歸珠迸淚章臺人去骨遺香可能無意傳雙蝶盡付芳心與蜜房將到都先獻樞密太尉相公再試州旟騐不才却將憔悴到中臺相車問罷同牛喘大厦成時與燕來今日謀猷須丙魏他年賓客但鄒枚西園聞道餘春在尚及花前㶑艷杯和致政燕侍郎舟中寄晏尚書異時仙閣對三休頓首辭榮動邃旒疏廣故僚供祖帳鴟夷盡室付歸舟側堦生玉懷歡宴列壁圖山代逺遊新句漸高塵累少紫芝巖曲要相求送越州陸學士梅天霞破候旗乾鄉樹依然越絶間挾策當年逢掖去懷章此日繡衣還亭餘内史浮觴水路入仙人取箭山牛酒盛誇先墅宴不妨春詔得親班成都風物繁雄古奥區十年傖父巧論都雲藏海客星間石花識文君酒處壚兩劔作闗屏對繞二江聨派練平鋪此時全盛超西漢還有淵雲杼頌無二月十八日席上方憶季長未還不同斯樂欲作詩寄之會使者來已有新章今牽聨成篇拜呈上煙壓西郊雨壓津滿城歌吹為芳辰江形左右衣留帶桞色高低麹與塵暖逼園花迎望密曉催林鳥每啼新知君貪擁光華節未肯樽前共惜春九日宴射佳節憑高駐綵旗亭臯霧罷轉晨曦堋間羽集號猿後臺外塵飛戲馬時芳菊治疴争汎蘂丹茰辟惡徧傳枝明年此會知何處醉玉頹山不用辭程密學知益州墀塗晝對别堯蓂細札芝泥襲綬馨三蜀舊臺呼輻寵十連新府夢刀靈雲梯霽日明鈎棧雨閣蒼苔蝕劔銘只恐廉𥜗歌未厭熒煌歸應六符星重陽不見菊蜀地秋高未擬寒翠苞如粒露華乾重陽已過君休恨留取金英晚節㸔僑居抱病苦憂幽都城困倦游身抛秃翁板言入稗家流世路風波惡天涯日月遒危心正無泊時底喻窮愁入壬辰新歲五十為衰始仍餘五歲衰雙眸不明鑒殘鬢已紛絲銅虎雖頻剖荷囊信濫持何須依老格先作故山期罷學士出守還拜承㫖十八年前玷玉堂當時緑鬢今蒼蒼傷禽縱奮愁創重廐馬雖還笑齒長薫罷山爐飄暗燼潄餘銅椀冰寒漿須慚清切鑾坡地不是吾人得擅塲西樓夕望炎氛隨日入岑寂坐遙帷倦鶩昏投浦驚蟬夜去枝桂花兼月破槎影帶星移珍重牕風好羲人即此時尹學士自濠梁移倅秦州于役三年逺論兵兩鬢班不辭征虜辟要作破羌還楯墨應圜熟兜烽報未閒浮舠背淮服盤馬入秦闗遂閣讐書筆仍餘聚米山憶君他夕恨遙向隴雲間陪謝紫㣲晚泛積雨漲秋壕輕舟共此遨菰蒲歛鋩鍔蓮芡熟櫜韜岸静魚跳月林喧鳥避篙歸時興不淺風物正蕭騷移病還臺凡閲半歲乃愈始到家園視園夫治畦植花因成自歎卧治無功賜告回驟叨鳴履上中臺壺丘天壤非真死蒙叟軒裳是儻來經灌旱蔬扶隴出失刊園蘂犯簷開此身踈拙真丘壑不是當年王佐才吳中友人惠蟹秋水江南紫蟹生寄來千里佐吳羮楚人欲使衷留甲齊客何妨死願烹下筯未休資快嚼持螯有味散朝腥定知不作蟛蜞悞曾厠西都博士名送趙御史仲禮之任南臺并柬兼善達公經歴元載王公用道孔公二御史天子龍沙拜法官議郎新戴辟邪冠曉辭漠北氷霜重秋到江南草樹寒諫䟽頻煩明主聽題詩長共故人㸔應憐閭里誅求急尚布朝廷禮意寛幕下風清鳴一鶚臺端雪霽見雙鸞寥寥渡海三冬翮煜煜凌空五色翰晉代新亭蒼蘚合梁朝舊寺土花殘石城慷慨悲袁粲别墅風流憶謝安千里憑高麾繡斧幾回攬轡並銀鞍諍臣事業須公等努力明時匪素餐海棠薄暝霞烘爛平明露濕鮮長衾繡作地密帳錦為天木芙蓉皓露浸湘蘂光風獵絳英緐霜不可拒切勿受空名江南江北樹秋至僅成叢向晚誰争艷酡顔淺作紅月季花羣花各分榮此花冠時序聊披淺深艷不易冬春慮真宰竟何言予將造形悟詠棣棠潘賦幽芳在周詩榮蕚傳佛輪千幅細公帶萬釘圓詠牡丹壓枝高下錦攅蕊淺深霞叠綵晞陽媚鮮蘆照露斜詠酴醿來自蠶叢國香傳弱水神析酲疑破鼻併豔欲留春黄葵黄葵貴麗不夭饒一朶新晴松下高還是爾英臨黼座朦朧曉日照天袍詠橙故鄉寒食荼䕷發百合香醲邸舍深漂泊江南春欲盡山橙彷彿慰人心過摩訶池十頃誰家舊鑿池池平樹盡但迴堤清塵滿道君知否半是當年濁水泥和賈相公覽杜工部北征篇唐家六葉太平罷宫豔醉骨恬無憂孽虜詬天翠華出糢糊戰血腥九州乾瘡坤痍四海破白日殺氣寒颼飀少陵背賊走行在採梠拾橡填飢喉眼前亂離不忍見作詩感慨陳大猷北征之篇辭最切讀者心隕如搖輈莫肯念亂小雅怨自然流涕袁安愁才高位下言不入憤氣鬱屈蟠長虬今日奔亾匪天作向來顛倒皆廟謀忠骸佞骨相撑拄一燎同燼悲崑丘相君覽古慨前事追美子美真詩流前王不見後王見願以此語詒千秋遣吏視諸公塋樹回有感三首文正王丞相兩朝推巨德萬務罄斯猷漢日左右手堯年忠孝侯名言天下滿故事省中留宸篆旌碑首刊文又幾秋文靖吕丞相慶厯公三入邊烽搖太平啖金真間敵撓酒不寒盟上印情雖切然髭疾遽輕惜哉天弗愸宸幄淚先横宣獻宋公昔去勸明辟俄歸參大鈞公孫未及相諸葛已傷神名待天淵蔽文争日月新英魂同玉樹不向土中春咏漢史朱雲英氣凛生風濵死危言悟帝聰殿檻不脩旌直諫安昌依舊漢三公寄浄名菴僧長吉二首故人詩未報恨恨復經年夢去長江路心知寶所天身依巖桂老詩與暮雲傳無奈纓緌累猶乖方外縁名高身愈隠孤錫倚巖扄園布黄金地臺藏白馬經菴雲吞暝燭澗月㵼虚瓶坐想谿橋路莓苔又幾青九日食餻颷館輕霜拂曙袍糗餈花飲鬬分曺劉郎不敢題糕字空負詩中一世豪兩宋名賢小集巻二十四
