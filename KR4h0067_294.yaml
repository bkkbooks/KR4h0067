body:
  text: 兩宋名賢小集巻二百九十四宋陳思編元陳世隆補順適堂吟稿續集垂虹亭東西耕釣窟左右利名津倚遍䦨干曲知幾有幾人鱸鄉道院田可耕兮圃可蔬幾年夢不到亨衢山林受用琴書鶴天地交遊風月吾事變無涯人老矣死生有命汝知乎客來時復一杯酒畫作鱸鄉醉隱圖送徐兄訪陳宰投老持竿桞外邨尺書乆不抵修門料應下榻從容日自説通家好子孫山行舍棹入山村山深樹自繁短歌田舍樂長揖野人尊苔老雲生石松髙月闖門不聞名利語太古一乾坤瀟湘八景圗平沙雁落江風飄塵白如練征翰逺赴蘆花岸寒霧昏昏漁火明欲飛不飛行陣亂相從萬里多﨑嶇呼嗚警察夜有奴衡陽路杳速歸去未可容易來江湖逺浦歸帆水天㝠㝠日催暮輕蒲飽風疾飛羽囘頭遥指舟前灣浪急篷歌下柔艪稠楊枯桑深處村老妻挾兒環在門蓴羮香滑茅柴熟對語别時應斷魂山市晴嵐嵓麓新霽浮紫烟幾家鷄犬喧一鄽憧憧人得蠅頭利不了青帘酤酒錢松隂散亂日易暝風光漸入牛羊徑赬肩赤脚分途歸野唱樵歌動幽聽江天暮雪癡雲貼水天四垂寒鴉凍雀無樹棲紛紛萬頃水花亂光眩銀海迷東西中有輕舠移斷浦玉笠瓊蓑一漁父鼔枻而歌歌豐年田家有麥無愁苦洞庭秋月長波𣺌𣺌七百里蒹葭颯颯西風起玉輪碾出琉璃宮碧落空明無表裏幾峯森列青崔嵬不知人世皆塵埃夜深絲竹逓清響疑是楚王曽歸來瀟湘夜雨雲氣浮江天已夕江樹號風飛雨廹凄凉正則賦懷沙疑與漁翁分半席一聲暧乃隔中流打篷淅霎添旅愁土膏動脉曉色媚農將有事於西疇劉言史瀟湘詩閒歌曖乃深峽裡烟寺晚鐘冥濛一秣籠峥嶸峥嶸深處傳鐘聲溪横古搓低欲折隱約前村通去程萬里征夫不知宿數盡飛鴉棲古木輸與鐘邊三四僧枯藤挑雲歸佛屋漁村夕照家家傍水開柴扉緑楊影裏沈斜暉妻炊黄粱子掛網獨枕莓苔眠釣磯得魚博錢平生志世間寵辱不能累路近桃源多喬孫定知秦晋興亡事古意逝波不可廻白鳥不可馴古人成感慨今人猶古人又境空納風月心逺辭埃塵終日窮目力得景亡天真次韻生涯老布衾清處更清吟舊事即新夢今人非古心意行雙謝屐道在一陶琴誰解無名利其中有淺深次池亭韻慿虚結草亭占得古來清睡債茶驅遣詩情酒發明梅撑拳石痩蘆障一䦨平未盡逍遥意重尋枕簟盟秀實長子玉麟朞晬門左蓬弧喜事新四朝先佛慶生辰嶢嶢已露峙頭玉表表因名繫角麟鼻祖同庚光後葉夘君著瑞定前身我來摩頂為兒夀一嵗從今百嵗春琉璃砲燈有魚體製先天太極圖燈籠真是水晶無逺看玉兔光中磈近得驪龍頷下珠一熖空明疑火燧寸波静定即氷壺㳺魚且作沉潜計鱗甲成時入五湖張中亷知洋州人號水晶燈籠㓜弟墓下庵扁看雲用少陵句春到棣無色風來松亦悲細看雲起處不復雁歸時憶汝九京隔嗟予兩鬢衰寥寥今古意獨許杜陵知室人墓下楚愴埋香地卿須念藁砧齊眉中道决同穴百年心刀尺凝餘澤松梧帶老隂可能如饁婦相對白頭吟次孫花翁韻湖海幾年經論交豈偶然坐間尊島佛客裏識坡仙解使狂心服還羞懶腹便拈來唐句法尤入小乗禪范蠡吳江三髙祠越敢吞吳皆范子後來廟食太湖濵邦人豈是忘仇怨要勉呉臣似越臣張翰膾鱸元不動鄉思拂袖西風已見幾江上如今來往客但言鱸膾不言歸陸龜䝉江湖蕭散樂平生夜課圖書日課耕一叚高風猶凛凛逢人肯説鴨呼名文公談苑謂相傳陸龜䝉多智數狡獪有内飬自長安使杭州舟出舍下童奴驅羣鴨出内飬彈其一折頸龜䝉遽從舍出大呼云此緑頭鴨有異名善人言適將獻狀本州貢天子今持此死鴨以詣官内飬少長宫禁不知外事甚驚駭厚以金帛遺之龜䝉乃止因徐問龜䝉曰此鴨何言龜䝉曰自呼其名巧㨗多類此予嘗觀其傳誦其文矣龜䝉字魯望居甫里著吳興實録四十巻笠澤叢書四集以髙士召不至躬自畚鍤品茶評水不與流俗交升舟則蓬席束書筆牀釣具往來江湖間謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人清風素節凜凜千古因疑談苑所傳之過况予所居視甫里無一舍逺其地荒僻眇在松江之東去驛程猶有數十里使者無由過之自武宗至昭宗凡六十三載未嘗遣内飬使杭州揆之地里考之唐紀信其為誣豈談苑别有所據云欲别欲别哽無語蘸酒評歸期潮汐有朝莫即心無轉移次韻懶作千年調偷閒得幾回吟壇元不峻俗駕可曽來蘚碧墻隂合榴紅屋角開枕肱真樂在飲水當傳杯夜坐偶成蓴鱸江上鄉穩處著虚堂却埽百念息貪吟萬景忙螢淚風户牖蛙閙雨池塘夢熟田家事牛衣趂蒔秧次月蝕韻起來搔首夜如何瞥見蝦蟇影裏過幸自十分懸素魄豈應一息駐妖魔光清於水塵難滓色白如圭玷可磨休誦玉川艱險句終篇此興為元和次弔屈原韻為憐舉世不曽醒放浪形骸澤畔行㑹得危言危行意佐成濯足濯纓名義無可去縁同姓心亦何求要獨清今日龍舟雖古意吳人未必楚人情笑靨花簇簇瓊瑶屑花神㸃綴工似知吟興動滿面是春風涵空閣靈岩寺浪説涵空未是空一䦨羅列几巃嵸世人若問空中景此景從來是夢中草堂幾年蝸蚓占山扉喚轉風光似舊時從此禪門多事在篆香重課少陵詩琴堂片石隣空掌様平吳兒曽此御瑶琴琴中腔調誰人識獨有顰妃是賞音洗粧池離宫脂粉尚渟香人去僧來嵗月長鐘磬㕨成功徳水根塵洗盡水清凉卓筆峰天平寺疑是飛來天柱峯一尖秀出白雲中料應宰相書成後留得殘毫倚半空一片峰十丈蒼珪似削齊摩挲信是古來碑不刋二范忠勞績合冩諸賢唱詠詩頭陀巖舊説頭陀坐石巔披肩壞衲不知年空巖賸得頭陀號啼鳥枯松也解禪一線泉銀潢萬丈下嵯峨想是天孫掛玉梭休道此泉絲様小涓涓將見作江河次韻時清歎陸沈楚澤伴漁吟探索聖賢語發明天地心無機棊少看有趣樹多隂坐上皆知已賡酬夜向深春曉紅紫雨離披風光别壯時世情楊絮覺心事杜鵑知屋角漁連井林梢菊障籬幸無塵役役倚檻數晴絲又春色漸昏昏那逢日帶曛落花紅一尺新筍緑三分憶友盟留石尋詩思入雲風光到田舍痩䇿看耕耘自遣偶對格蟻夢功名覺即休駒隂嵗月去難留傷今不復并三樂擬古猶堪續四愁松下抱琴塵外境雨餘蒔藥栁邊洲老來莫問浮生事醉後同為造物遊順適堂甫里相望江盡頭得隣而隱了浮休落花流水元無礙野鶴孤雲儘自由順裏委心彭澤賦適時乗興剡溪舟區區世上分蠻觸對客忘言茗一甌曹娥廟孝本當為事時人或不然娥兮知此理命也委之天五日抱屍出千年作史傳英靈猶耿耿有慊莫登舡憶弟支藤來海嶠骨肉海西邊對月成千里舉頭同一天更沈寒戍角歌急晚潮船孤雁知人意聲聲落枕前相逢相逢疑舊識敲火自煎茶盛欲為留計其如未是家東西分地脉南北兩天涯别後思君處空齊䜟燭花自感未險先藜杖逢亭便小留今畨已非昔後去可能逰又倦聽花鄉曲狂歌侠士行年華與心事醉裏自分明山居古木環池竹數竿疎籬補菊屋三間白雲不放紅塵入無怪山人懶出山元夕一簇蓮燈亦可觀隔墻簫鼔二更殘平生未識繁華事旋借宣和國史看省墓隴上松杉手自移至今苔蘚半寒枝夢中不記重泉隔猶學兒童戲綵時梅霜月相摩漏二更書窓伴我一枝横自矜前輩持清白妬紫嬌紅總後生虎神生長古林丘擒來鐵繫囚休憐文變豹尚覺氣吞牛檻穽終難脱咆哮亦可休山中藜藿少君合早為謀崇道叔慶七十寄意南豐一瓣香願公耆艾熾而昌厯經七甲鬢浮緑帶錫萬釘眉映黄疑是函關逢老子巋然魯國有靈光隂功更説燕山桂留與詩人作義方栁禁烟霧風月翠緑眉舞八字態度脂韋不自持對人無柰小腰肢好於彭澤歸來日痩似章臺别去時隱隱輪蹄端不惡深深亭榭最相宜流鶯百囀春光老擬折柔條寄所思可山冩梅放出東風手叚冩成江路枝梢君復無聲句法要與廣平解嘲信歩九十日春未老兩三畨醉如泥行遍菜畦麥隴未饒十里蘇隄嚴子陵祠横足齁齁夢御牀秪將故舊視君王意嫌漢室乾坤小歸占嚴江日月長獨繭絲頭忘寵辱生芻庭上閲興亡留題多是功名士也為留題姓字香獨繭絲出列子叅選有感元是江湖瀟散客誰將幽夢落南柯十年不調幸然好一着纔差悟處多肯使北山馳鶴信且隨西舍唱漁歌野人自喜無彈繳却恐金章羡緑蓑春晚閉户蠶新浴開簾燕早歸何曽春欲去自是物華非又蝴蝶夢中意杜鵑聲外愁問春春不語栁絮暗汀洲詩僧同住西州一水濵東州勝處始逢君詩成又逐行雲去後日相思抵看雲偶成留得春風趂馬蹄日長無事緑楊隄菜花籬落誰家酒緩轡長歌過小溪西湖湘桃深處五陵家隄栁隂中百寶車多是問桃尋栁去近來山下少梅花憶友蕭蕭簷角雨冉冉雨中舟年老難於别春寒重却愁風牕亂書葉塵壁暗燈篝夜半無來雁披衣對小樓次韻疎牕小博山牕外鳥關關占得江湖隱佐成天地閒簷牙叢篠碧墻隙兩鳩斑癡坐不知晚漁蓬倦釣還次賦順適堂萬巻藏書抵萬金翛然軒宇絶塵侵順時不作榮枯想適意元無勝負心蒲石疎簾真道院柏香净几小叢林四時剰有閒風月醒裏尋題醉裏吟有所思仰天有所思心逺目苦短西風驅殘雲千里月華滿阿育王寺舍利塔粒粟懸懸左角鐘幾年鎮壓𣑽王宫要知八萬四千所元在尋常一念中佛現紫金歸勝地僧誇烏石墜虚空毫光起處無人見明月堂前玉几東舍利八萬四千所舍利在塔左角金鐘内有八珠利勝地佛紫金身育王擎塔行虚空有弟子墜地變為烏石今猶人形明月堂在塔之後玉几山在塔之東山居朝踏山根雲暮歸雲中扉野鳥始驚避今焉情依依異哉海山鷗猜疑未忘機兩宋名賢小集巻二百九十四
