body:
  text: 兩宋名賢小集卷二十七宋陳思撰元陳世隆補珠溪集李師中字誠之應天楚丘人也其父緯為涇原路都監屯鎮戎軍以邊事獲譴師中上書辨父無罪時吕夷簡為相詰問不屈夷簡怒以為非布衣所宣言對曰師中所言父事也士大夫稱之師中舉進士知洛川縣民有罪妨其農時者必遣歸令農隙自詣吏令當下者榜于門或召父老論之租稅皆先期而集龎籍為樞密副使薦其才召對轉太子中允知敷政縣權經略司屬官提點廣西西路刑獄遷直史館知鳯翔府拜天章閣待制河東都轉運使知瀛州師中言時政闕失大自稱薦又乞召司馬光蘇軾等復置左右遂和州團練副使安置徙單州復分司南京提舉太極觀卒年六十六師中為人落落有氣節所至必設條教勸民務農官吏不煩而事舉然好為大言以故不容於時云龍隱巖春波飽微緑斗柄涵虛明方舟貫岩腹鵝鸛相酬鳴仰窺穹窿頂宛轉百怪呈僅餘鱗甲碎不見頭角獰下闖清冷淵演迤萬頃澄但同魚鳥參勿遣蛟龍驚抉苔撫竒篆倚棹看題名三將標殊勛自與山不傾誰與贅小築政恐山靈嗔南洞更幽絶仙佛依崢嶸太虛可為室豈復資欒楹乳泉助茗碗中有外雪清何須驂鸞去此即白玉京鼎來不速客抱琴忽逢迎愛此無絃曲岩溜同一聲為君洗塵耳喚我詩魂醒祗恐白衣至好句亡由成留題龍隱嵓過江緣磴尋溪垠隱然絶壁天開門傳云此處昔龍隱陰岩凛凛猶疑存風雲已與時變會苔蘚尚迹初潛痕嗟余出處不自重過事輕發難為神遞中得先之兄書取雍欽宜栁歸約十二月到此年節已近未聞來朝寄奉我在灕江上君行瘴海潯因勞南去夢暫望北歸心别後年華改新來雨露深慿欄望書信一字抵千金逺宦良多感新來更可悲春隨斗柄動人自海邊歸僕馬疲勞甚郊原雨水時經旬不得信憑檻又吟詩題太空子隱居可道非常道真空本不空荒郊自生草間地又栽松無欲更何慮有為終必窮風雲上天去老子信猶龍送桂州安撫余靖侍郎還京詔從東海付南麾戎乘前驅上將威異俗已傳吾父至斯文更咏我公歸嵗時職貢還朱紱晝日恩光賜衮衣昔往今來亦何速長亭楊栁尚依依拜命南來得老臣肅將廟略制妖氛淮西將吏尊儒帥并土兒童認使君新賜錦衣光照日舊行棠樹茂如雲應憐孤宦潮陽守憔悴無人與上聞和李明叔理定道中幽居日日數歸程已寫華嚴兩帙經門外初寒江氣白嶺頭多雨曉痕青曽逢飯顆嘲山笠應載鴟夷笑井瓶客土相思空引望天涯風景似新亭過嚴關有感大抵孤忠報國難古今共是一長嘆玉關還路春無緑定逺歸來鬢已斑四年嶺外得生還自顧無功但愧顔欲識君恩至深處嚴關便是玉門關龍隱岩軒冕儻來仍假借功名難立更因循非才不繫蒼生望收取林泉自在身贈韓逈未衰前已得懸車骨立清風八十餘松竹最宜貧宅舍江山遍照白髭鬚客有寫真者見豫因以三詩贈之嗟豫少也賤到老尚無功方寸浮名外流年兩鬢中對鏡猶慙愧圗寫若為容文命力能平水土阿衡功亦格皇天形容不上麒麟閣當日君臣任自然難逢古鑑明忠腹長似騷人帶病容幾向清溪曽照見萬尋岩壑一青松送唐介進退韻孤忠自許衆不與獨立敢言人所難去國一身輕似葉高名千古重於山並逰英俊顔何厚未死姦諛骨已寒天為吾君扶社稷肯教夫子不生還穎國龎公挽詞獨立無朋但任真不持身勢掩君親若將坤體論臣道公是朝廷第一人麥積山路入青松翠靄間斜陽倒影入溪灣此中猿鶴休相笑謝傅東歸自有山天目山隆按海陵東南薑堰北有天目山古地鉢福地陶隱居云地鉢臨江東是也東晉道士王冶隱居於此後白日飛升非吾杭之天目也壞壁摩娑少舊題高情應怪賞音稀煙霞正自無今古雲水從教逺是非丹井金龍藏洞府杞叢花犬蕩霞扉登臨未學神仙事老樹間看獨鳥歸兩宋名賢小集卷二十七
