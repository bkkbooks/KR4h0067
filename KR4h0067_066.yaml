body:
  text: 兩宋名賢小集卷六十六宋陳思編元陳世隆補映雪齋集孫抗字和叔黟人少孤力學寄食浮屠山中步行偕書數百里升樓誦之而去其階數年遂博極羣書為文操筆數百千言始同學究出身歷官後登進士甲科知潯州改作廟學召吏民子弟秀者親據案講説文藝未幾旁州土皆來學擢監察御史言事不顧利害子適邈迪適遇適從王荆公遊年十四論議著書已驚人登第後終永州軍事推官邈嘗為縣令荆公亦稱其好學能文自迪以下及孫略皆登進士第北牖洞舊駐東方騎因題北牖名來須風作御去認斗為城日氣晚方到雲收寒易生豫心匪遊衍拱北振華纓白雀洞禽貴羽毛潔地憐岩壑幽名非華隂凍景似秀林秋不覩音塵繼空驚嵗月遒何如潁川鳯千古冠緹油南華洞峭徑入蒼煙他山盡一拳上盤朱鳥翼中寓漆園仙清可擕壺賞涼堪拂石眠九疑生接境曽此按薰絃朝陽洞險絶信天開春蘿蔭古苔不愁雲影閉先得日光來片石充棊局涼坡遞酒杯東風偏著意草木爛成堆嘉蓮洞地應連海眼終古蓄寒泉四列青蒼壁雙開菡蓞蓮已嗟真賞去猶訝昔香傳未愧東林下霜葩社衆賢夕陽洞塵寰雖未逺皓氣覺偏滋日落鳥歸去秋髙風徑時吟餘下天籟坐久凛氷肌信是棲幽境涼蟾照履綦棲霞洞寬踰城闕峻瑶魁萬壑吟風四壁苔不獨雲霞可招隱溪流長送落花來兩宋名賢小集卷六十六
