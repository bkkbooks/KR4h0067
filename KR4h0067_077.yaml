body:
  text: 兩宋名賢小集巻七十七宋陳思編元陳世隆補潘邠老小集潘大臨字邠老齊安人有柯山集次弟大觀字仲達亦入江西派其詩不傳吳熈老所藏風雨圖我遊匡山夏將杪赤日青天萬山繞忽然風雨動地來震氣果雷離電遶一川煙靄失東西萬里乾坤錯昏曉香罏高峰危欲墮石門細路人心𠞰江翻那聞得計魚木拔豈有安巢鳥須㬰雲過雨脚收依舊晴暉著叢篠羣山歴歴在眼前恰似憑高日方曉誰將此景入畫圖數幅生綃盤礴了吳丞此畫絶代無張公此詩古來少讀詩觀畫興未窮北牕風涼退自公使君意消三伏中未可鞭箠催青銅贈張聖言畫柯山圖我昔騎鯨游九州上扣天關望冕旒羣公侍旁好顔色將順帝㫖成剛柔抱持日月不自獻䝉茸塵土歸家丘結茅竹間今休已炎暑避舍清飇留屋頭清溪鳴晝夜當户古木蔽馬牛蒼頭盧兒從高蓋傳呼不到門巷幽兩公忘言兒袖手驅除睡魔須茶甌誰傳此意到旁郡解衣槃礴煩張侯張侯落筆妙天下未墜學士之風流欲見柯山入畫圖丹青知君百不憂黄公不肯直南省一麾已具東南舟請君援筆待公至畫我迎公竹陰裏題張聖言畫四時景物我到淮南幾見春一身蓑笠蔽煙雨桃花林裏有人家疑是柯山最深處成陰衆木與天參日暮風雨地軸翻曽向廬山問行李石門西路接僧垣荻花索索水津津日落空山開霽新松下有人摩詰似與渠烟火作比鄰雲䝉山頭雪翻空飛鳥繞樹困號風關山淮水失微路酒爐曽借衰顔紅題陳徳秀畫四季枕屏圖五首亂山深處碧波流隔岸垂楊繫小舟無數桃花伴春夢夢中還作武陵遊茒簷竹閣枕迴溪栁外平橋拍水低在藻白魚知鷺下穿林黄雀覺蟬嘶錦樹連雲爛不收山河風景一畨秋老夫枕簟便涼夜不比新亭去國愁江樹溟濛雪暗天似聞寒雁破昏烟相思此夜堪乘興試問漁翁覔釣船好景入詩皆可畫未知陳子畫中詩疑公便是褚季野正爾不言行四時題趙承逺所藏大年畫平逺二首吳頭楚尾散花洲天濶波雲恰下鷗帝子胸中有江漢故能風露筆端秋將軍心眼到滄洲木脱波生一夜秋想得筆端鳬雁足又添鸂鶒起沙頭江夏别魯直送之宜州翰墨精神全魏漢文章波瀾似春秋可是中州著不得江南已逺更宜州兩宋名賢小集巻七十七
