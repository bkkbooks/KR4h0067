body:
  text: 兩宋名賢小集卷一百八十二宋陳思編元陳世隆補網山集二林亦之律詩答稚春送瘞鶴銘烹魚蒙尺牘瘞鶴有殘碑老去無他好朝來愜所思幽懷增感激妙處自傾欹喜劇還生嘆如今愛者誰答稚春所寄詩卷不見幾多日詩篇句句新沉吟堪膾炙塗抹更精神世俗難知巳文章却解貧竹窗休苦思思苦轉愁人夏循矩先生挽詞歎息青燈下偏旁古字通讀殘五車去贏得一生窮末俗輕前輩何人念此翁傷心舊時宅颯颯巳如空草堂同爨呈稚春雲錦堂前花作堆尋幽養靜屬吾儕髙髙下下黃柑樹曲曲斜斜碧草階數點逺山如越縣一條寒水似秦淮龎公父子能留客我亦三年忘客懷奉酬監倉李丈金橘銀魚之什為有風流賀季真道齋從此往來頻錦囊牙軸詩千卷金橘銀魚酒一巡見我每呼蓮社客看君還是竹林人有時夜話寒更盡明日相逢語又新挽林伯謨幽情千木外巧思百花前好事如吾子傷心嘆早年桃溪親意恱薤曲里人憐半夜悲笳起涼天野月懸九月登龍卧山缺亥九月同李監倉宿龍卧山越三年復與二曹叔姪海陽章尉為此遊而監倉巳沒矣今兹九月二曹并海陽又不可見首尾凡八年有是存沒對酒悲慨情見乎詞復此雲山飲吁嗟空自勞三回看杞菊兩度難蓬蒿昨者惟傷李如今更憶曹海陽真俊逸一等野墳髙九月逰龍卧山留一夕明日值雨坐超上人房偶題野興更周遭應遲問大刀山房逢雨好人意與秋髙多謝烹鮮乳還令厭濁醪重來須纍少欵欵聽蕭騷古龍曹孺人挽詞林髙舉母寒原何處哭下馬欲銷魂白日數行淚黃柑十里村傳家猶綬墨聘婦盡朱門似此何多恨空漚不要論嵗晚樓書懷儺鼓逄逄起江邊嵗又除我詩猶古木髙枕尚僧居腳垢時忘洗頭蓬月懶梳自應塵事少非我故耽書秋試歸訪緑煙亭竹徑縈紆去相逢情若何江從木杪去秋向菊邊多漫有風濤想如今嵗月過唯於交舊裏聽取碧雲歌去當作見挽郭孺人林牧之母國子先生宅相傳此母賢一哀孤燭下再拜十年前舐犢貪書卷飛鸞慰暮年夕陽聊寓曲終要到新阡陳文煥秀才所宅近市憑樓一望西山宛然墮几桉中縣之豪雋唱酬不下數十百篇野人後來承聽許不必似韻故為之賦一首西山簷外見何必鹿門行近晚市聲合疏簾野意生終朝如此好初月更多情却愧才華鈍三年句不成縣學東軒莫道東軒惡朝來意欲迷平田飛白鳥髙木叫黃鸝林闕孤峯出簷低逺樹齊雖然有佳趣那似海門西挽丹井陳子白母二首哀曲梧桐夜何年苜蓿盤敬夫前輩重好客婦人難十月明朝盡孤墳落日寒鹿門吹出黍此意竟長嘆嫁娶比鄰近門庭古木幽藁砧舊相好蘭玉久從遊雙鶴來何處孤鸞不到頭通家丘嫂行愁涕白雲浮陶侃母憂常有二客來弔不哭而退化為雙鶴沖天而去時人異之江上敗絮滄江上柴門落日中論文誰與共覔句不須工壯思如秋葉搔頭似老翁﨑嶇村浦路敢自説豪雄陪范明府與諸同官飲新亭是夕以莞爾榜之因賦此詩把燭新亭下迂踈一作踈狂聊爾歌酒緣人品勝官要野情多燕豆客俱好漁竿人亦過誰知武城笑深自惜蹉跎瑞峯院夜語奉酬鄭簿百級上層巒呼鐙同所歡瓷杯真有道行李似無官妙語勝熊掌踈才愧鶡冠古人相見意不作酒肴看江樓陪范長官宴自警一篇戲呈鄭主簿幾回過海上此日暫躊躇未盡尊前酒還奔使者車官人無少暇賤子敢安居一畝芭蕉圃如今要自鋤奉送范宰秩滿還東陽語違今幾日猶更向層巒一作戀征鞍情自緣君子吾非送長官衝寒去程逺惜别賦詩難政拙為留愛留將識者看挽松林林巖叟誰學陶朱去梅花古戍旁平生疏几杖哀曲損肝腸稚子青襟雋東牀緑袖長四更笳鼓動月白水茫茫翁丈柔中同姪昭文相訪留兩日既别贈以詩委巷無過客明燈迎此翁歡欣屐齒折羞澀酒瓶空燒芋隨家法論詩到國風胡牀煮清棗更擬故人同挽楊嚴州母生長大夫宅來歸御史門吾兒天下寶此母里人尊九嶺三江外孤雲片月村同鄉無見日他國賦招魂網山二首風濤生長處土地屬東隅樹樹懸魚網村村吹鷓鴣酒旗孤嶼見書卷一山無欲趂雞豚社深慚身業儒屋舍髙低住比鄰活計同一作衣裳結束同笭箵嫌月白螃蟹要霜紅吠犬隨村落賣魚成老翁地鹹耕種少海熟抵年豐前此和李倉詩序某欲于網山下結茅為屋空乏之人徒然有此念耳新詩餉我便催促為此行且以網川鹿門為同日事令人轉有終焉之想今欲且畫網山圖挂于西壁下篇詩斗酒日遊其間此便可以呼網山處士也買山一件徐問之未晚耳宜人姚氏挽詞余倅之母别駕歸來日連年哭九原白頭如此母丹旐只諸孫燈火檳榔市簫笳梅子村比鄰惱鵝鴨還阻弔幽魂續夢中所見兩句長劒歌明月吳門一夜過紅樓何處是為説馬蘭坡辛卯嵗應舉過西峽渡白鹿山頭雲欲頽峽門灘下水如雷錦囊破裂元無用席帽􅋂﨑還更來我自未能逃世俗人誰便解脫塵埃扁舟且趂牛羊渡莫問如今第幾回寄精嚴谷堂惟頥老宿二十年欲訪谷堂觀筆法因循去未得偶逢水西客沉吟久之因寄此詩隔浦娟娟古佛廬幾回欲去更踟蹰敢誇栁氏元和腳要問隋僧智果書見説交情多雋逹每慚識面尚生踈山頭紅葉知無限可許間人暫寓居挽林義夫母孟母何曽憾生前錦軸橫東征鳳毛好西府玉昆榮貝葉忘言處金牀寫水聲十年堂上客一曲是悲鳴寄范都廂南去封題久不聞北來數數聽寒暄聮鑣太守三千首擊柝長安十二門飛觀凌空天子國輕帆半日女兒村淵明好趣紫桑近官職髙卑一作低未要論西都賦曰立十二之通門奉陪嚴陵史君楊校書興宗囊山夜話一别數月欲乍見不可得因寄此詩庚子十月作鄉廛一語竟何曽却向他州逢李膺白馬千山緣矍相先生之喪史君來弔往返數十程故有此句朱幡四海有嚴陵鵝湖猶記通宵雨虎石還同半夜燈素髮相看才兩度不知再見幾時能楊校書云要得一書藏石室為緣新説自金陵挽方士登女傷心來赴日各各為一作淚沾衣慈母夜長訣郎君客未歸短山長笛慘青草素旗飛料得楚人些連篇説斷機清逺尉林昭逺孔章挽詞一宦辭南海蕭然百念枯里閭稱長者門巷似窮儒死日分明去生年爾汝無傷心哀鼓動寒月野園孤秋試後再寄林井伯方國三年一合圍園門屢戰定髙飛人如我友無青眼天豈斯文厭紫微苦縣老聃終遁去敬亭小謝未須歸丈夫謀宦非身計荔子山前有綵衣送井伯赴上庠紫微巷口送征鞍白社村前豆葉丹一賦雕蟲如桂水井伯曽作桂林賦千山羸馬上長安短檠巳自甘投老健筆胡為未得官鳳閣起家緣六館州人更欲祝東巒井伯自號束巒子得舍弟行可云之鹽官病後書荷花開盡蓼花紅逰子今年秋又窮千里病眠鴻雁影一書愁殺月魚翁天寒好處豫煨芋日落何山汝轉蓬名利不成作歸計先生巳老海門東舍弟客臨平慿誰為問鶺鴒原燈火三更隕淚痕天逺未知萍梗迹書來説在藕花村年華似汝寧為未場屋如吾巳懶言璧水井伯時為國子生故人今北去短長門户好同論吳僧道潛詩云風蒲獵獵㺯輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲故詩人以名其地如栁惲云汀洲生白蘋日暮江南春後人因號白蘋洲借册井伯吉貝城邊寄此身一作冬復春故鄉歸少異鄉親蜀無儋石雄何苦浴有書船孟不貧緑水孤村何處客白頭雙闕老門人令狐冒雪成圖畫還一作可許渠儂續一作接後塵迎仙致政王修職衛挽詞晦德香泉下秋風知一作今幾回襟懷如阮達門閥自唐來立馬曽交語寒蛩重一哀生前雙錦軸亦足慰蒼苔挽王司業定未作鵬飛萬里程一時英俊巳錚錚只應傲雪凌雲氣合得驚天動地名明月酒杯如李白暮年官職似陽城秋風癸亥古祠下多少行人淚眼盈韓退之癸亥年守潮本朝陳文忠堯佐及黃魁並以是年出守故此郡有三癸亥祠憶浮家洞萬竹蒼蒼烏鳥啼一江渺渺薜蘿西幽懷動處蘭初長好句來時月巳低年嵗却從為客盡家書長是倩人題踈鐘日落孤村立秋燕梁空歸思迷寄表弟章由之為理曲堆屋廬苦來為客竟何為宅舍荒村誰與治别墅雖無輞川畫生涯堪入杜陵詩身如燕子年年去家似漁舟處處移丹井西頭曲堆下更煩嵗晚定踈籬送林子方祕書枅赴廣東提舉乘軺嶺上丈人回奉使天南學士來萬里家聲蠻子洞一門旌節越王臺驛辭懶口初逢菊界入潮州定折梅莫怪襄陽負韓約藝香又好賜環催次韻奉酬致仕通直吳七丈上元所寄之什空齋自合冷如灰何物龍鍾似不才日日讀書無處用年年作客幾時回君為諧老先生行我在當初最後來可忍殘春對耆老不擕斗酒去相陪挽戴少美晦之父黃石人一聲哀管水邊聞忽憶秋風留月軒洛下書生來問字襄陽耆舊亦過門遊梁無限通宵話訪戴如今何處村縱使鸞封到幽壠白雲荒草不堪論次韻致政吳丈悅之和林縣丞褒丹桂非時之什青山湖上宅丹桂月邊枝菊蘂元同日桐花却並時籠鵝翁不俗蠟鳳子多竒須信三秋好先從數月期藍田一廳壁黃卷五男兒問禮當年事芹宫未頌僖次韻奉酬林仲雨年去又來三月強詩成未了寸心狂巳無精力能穿鵠尚有頭顱可牧羊老柏縱教逢嵗晚幽蘭本不為人香東膠待補猶堪戰莫道今無識繞梁仲雨次韻云萬事不成嘆畫虎一官那得似驅羊挽陳伯順夫婦晴春相一作一見未多時忽嘆霜蕪雪屋非僵瑟樓前方悼往吹簫臺下竟同歸讀書歷歷向秋樹織錦悠悠空曉機須信人間伉儷重缺死日不相違謝林守元仲架艾軒先生祠堂雙闕巳嗟秋草邊兩楹誰作麥堆前幸奉皂蓋行春日如見紅泉講道年工部先生天下士莆陽太守大夫賢斯文直待斯文出千載名聲與共傳林守詩云原上卧龍無起日柱頭化鶴見何年再用前韻和林守清詠重重畫戟邊芳題短短竹籬前政如美稷西河日詩到黃初正始年滕國已歌慈父愛韓門更感使君賢銅魚好句關風教巴嶺𢋫酬只浪傳挽陳仲罕母橘林霜後欲寒天一作黃柑時候欲寒天多記陶家作客年碧水青山如昨日白雲紅旐是新阡鳲鳩七子母思重寡鵠孤巢婦德賢最苦哀簫老松下漫漫瞿麥雪平田洞簫賦孤巢寡鵠娛優乎其下奉寄雲安安撫寶文少卿林黃中栗泥封欵欵下青冥却許麾幢換使軿夔子城頭開幕府杜陵詩卷作圖經十年去國未還國萬里長亭更短亭可信明時好人物亂猿啼處是州廳滕王閣懷古奉呈撫州别駕兼簡户曹城連帝子閣西頭水繞南昌故郡流山短天長鷗鷺小夜深雲淨月星浮淡臺墓暗竹根古孺子亭荒荷葉秋漠漠滄江無了日哦詩莫苦替人愁江西試罷還故里八月二十九日過飛猿嶺連日遇雨萬里﨑嶇愁不禁飛猿更聽雨淋淋剩將暑藥涼無用未著秋衣寒巳深刻鵠雕蟲成底事牧羊餧鴨負初心還家漸近病漸好得句自題時自吟挽稚春母鄭氏他誰天外哭聲長有客歸程何太忙同㸑情親如五服升堂義重比諸郎昔人澆薤蒸梨事即我浮家泛宅旁嘆息白頭陶母意中秋三日轉凄涼秋試罷重九過滄峽野濶村歸如暮鴉路沿溪曲似春蛇不諳水土愁多病一作屢眠野館愁為客忽聽鄉談喜近家一帶青山將屋繞數行一作莖緑竹倚門斜年年逆旅逢重九今嵗須看籬下花同安撫趙子直汝愚餞朱晦菴於懷安二首得重字祖帳寒梅白未空已看新葉緑重重八州鉞斧送行客十里旌旗繞暮峯北斗獨髙韓吏部南州爭慕郭林宗一時賔主俱豪傑敢道招要到野農武夷長想蕙蘭蹤螺渚幸修桑梓恭詩造本情天下誦學傳正統世儒宗三山過客日無數四海聞人此一逢官燭行行送歸路半村無月海雲重挽蔡以之母鄰母悲秋長短聲客窗聞此夢魂驚新鄉誰共雞豚社先世由來香火情薤曲縱教如宋玉里喪終是愧陳平傷心起望秋雲亂愁斷千山幾日程别莆陽史君林宗丞二首下筆翩翩如史君年過五十始朱輪蜀山久託無家客滕國曽為負耒人先任福倅脫印忽聞過我里攀轅尤更甚州民乍晴乍雨黃梅道好聽泥封下紫宸扶羸十日候行期瓜葉初生荷滿池别袖難禁須進酒離情未足更題詩飛鸞渡口還家後老鼠梯前到闕時士論民謡如皎日甘泉直上豈容遲别林黃中帥湖南清秋緩轡馬如雲論定忠邪白黑分湘水傳呼新刺史霸陵改觀舊將軍平生孤節人難到自此一畨名愈聞定有詔書催入覲不勞下擔楚江濆代上陳給事峴二首謝安舊宅翠雲環復見新墻月樣彎市近豈容三島客樓居須向九仙山去天尚鬱金門步計日催歸玉筍班好與衣冠添盛事一門三府照人寰雲錦軒楹蘭玉階暫從仙仗下蓬萊良辰歌館聲聲起明月粧樓夜夜開天上李藩批敇手蜀中嚴武總戎才曽知成都可教問舍悠然去即下紅泥促召回暫還網山井伯以詩送别次韻暫著芒鞋歸故丘新詩吟罷恍如秋麥堆去後惟君勝荔子紅時送客愁好句合教吾北面生平長恨海東頭如今别袂應須惜一日能留便少留兩宋名賢小集卷一百八十二
