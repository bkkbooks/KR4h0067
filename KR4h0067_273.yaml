body:
  text: 兩宋名賢小集卷二百七十三宋陳思編元陳世隆補石屏續集一戴復古字式之天台黃巖人居南塘石屏山因自號焉負奇尚氣慷慨不羈少孤痛父東臯子遺言收拾殘稿遂篤志於詩從雪巢林景思竹隱徐淵子講明句法復登放翁之門而詩益進南遊甌閩北窺吳越逾梅嶺窮桂林上會稽絶重江浮彭蠡泛洞庭望匡廬五老九疑諸峯然後放於淮泗歸老委羽之下遊歷既廣聞見益多為學益髙深而奧密以詩鳴江湖間五十年客行河水東客行河水東客行河水西客行河水南客行河水北行行無已時朱顔變老色至人棲一方庭戶羅八極保心如止水不受萬物役有道肥其軀故能適所息鳳鳴有吉凶鵲叫令人喜鴉噪令人憎人心自分别吉凶屬禽聲舜時有鳳鳴文王時亦鳴漢時鳳亦鳴六朝時亦鳴鳳鳴有吉凶人不仔細聽江南新體王建有此體别張誠子郎船江下泊妾家樓上住朝朝暮暮間上下兩相顧相顧不相親風波愁殺人感寓四首采薇人固髙飲露蟬遂清謀兹一粒粟舉世共營營營營亦多塗中有虧與盈陋巷一簞食朱門九鼎烹窮達各有命繄誰主權衡吾生未可必秋風白髮生蛛網羃虛簷一飽羅羣飛寒蠶囓枯桑一身終繭絲物物巧生理我生拙奚為貂裘日已敝石田歲長飢一貧已到骨一氣儻未衰舉目送飛鴻悠悠知我誰夜雨挾秋風摵摵撼庭樹浮生堪幾秋青鬢忽已素鉛刀刲九牛䇿蹇望長路所操莽無奇自好徒自誤改絃調新聲履道易故步收功在桑榆其敢忽遲暮紅紫委路塵緑樹有嘉色刳心晚聞道玩物若有得青春坐銷歇方兹見真實人生到中年胡不保明德秋風墮庭梧棲鳳去無迹矯首碧雲端一語三歎息頻酌淮河水有客遊濠梁頻酌淮河水東南水多鹹不如此水美春風吹緑波鬱鬱中原氣莫向北岸汲中有英雄淚刈麥行腰鐮上隴刈黃雲東家西家麥滿門前村寡婦拾滯穗饘粥有餘炊餅餌我聞淮南麥最多麥田今歲屯干戈飽飯不知征戰苦生長此方真樂土元宵雨窮人不謀歡元夜如常時晴雨均寂寞蚤與一睡期朱門粲燈火歌舞臨酒池酒闌歡不足九街恣遊嬉前呵驚市人簫鼓逐後隨片雲頭上黑翻得失意歸鄂渚張唐卿周嘉仲送别武昌江頭人送别楊栁秋來不堪折漢陽門外望南樓昨日不知今日愁英雄握手新相識人情正好成南北酒闌人散最關情一雁西飛楚天碧詰燕去年汝來巢我屋梁間汙泥髙一尺啄腥拋穢不汝厭生長羣雛我護惜家貧惠愛不及人自謂于汝獨有力不望汝如靈蛇銜寶珠雀獻金環來報德春風期汝一相顧對語茅簷慰岑寂如何今年來于我絶蹤迹一貪簾幕畫堂間便視吾廬為棄物寄趙鼎臣學如劉子政不使校書天祿閣文如李太白不使待詔金鑾殿倚樓終日看廬山贏得虛名聞九縣才忌太髙心忌太清平平穩穩為公為卿騏驥可羈乃歸帝間麟鳳莫測為瑞人間人間為瑞徒能好騏驥可羈終逺到歲寒心事幾人知手把梅花供一笑阿奇晬日窮居少生涯養子如種穀寸苗方在手想像秋禾熟吾兒天所惠骨相頗豐碩娟娟懷抱中一歲至周日願汝無災害長大庶可必十歲聰明開二十早奮發胸蟠三萬卷手握五色筆䇿勳文字場致君以儒術不然學孫吳從橫萬人敵為國取中原闢地去冥北他年汝成就料我頭已白光華照老眼甘旨不可缺為子必純孝為臣必正直以我期望心一日必一祝勿謂癡小兒茫然無知識胎教尚有聞斯言豈無益松江舟中四首荷葉浦時有不測末句故及之夜聽楓橋鐘曉汲松江水客行信匆匆少住亦可喜且食鱖魚肥莫問鱸魚美垂虹五百步太湖三萬頃除却嶽陽樓天下無此景范蠡挾西施功名付煙艇秋風吹客衣歸興浩難寫寒林噪晚鴉紅日墮平野篙師解人意𣟵棹酒旗下扁舟乃官差舟子吾語汝汝為我作勞吾亦不汝負好向上塘行莫過荷葉浦漁父詞二首漁父飲不須錢栁枝斜貫錦鱗鮮換酒却歸船漁父醉釣竿間栁下呼兒牢繫船髙眠風月天觀陸士龍作顧彥先婦答夫二首有感次韻北風吹歲暮空閨獨棲止夙興淚盈掬夕息夢十里妾生胡不辰失身從蕩子嚼蘗苦我心餐氷噤我齒離異奚足悲險澀可勝紀寄書西飛雁反復話終始鼠璞竊美名冠玉假外觀良人誇意氣下妾愁歲晏念君始行邁雪嶺梅初粲春風桃已紅光陰等飛彈相思果如何金環寬玉腕昔為連理枝今作摶沙散惜哉牛與女脈脈阻河漢特棲良獨難守堅祗自讃雙劍幾時合寄聲問華煥勿聽五羊歌富貴忘貧賤栗齋鞏仲至以元結文集為贈尋常被酒時歸則急投枕為愛次山文今夜醉忘寢偉哉浯溪碑千載氣凛凛舂陵賊退篇少陵猶斂袵文章自一家其意則古甚太羮遺五味純素薄文錦聱牙不同俗斯人異所稟君君望堯舜人人欲倉廪古道不可行時對窪樽飲杜甫祠嗚呼杜少陵醉卧春江漲文章萬丈光不隨枯骨葬平生稷契心致君堯舜上時兮弗我與屹然抱微尚干戈奔走蹤道路飢寒狀草中辨君臣筆端咏將相髙吟比興體力救風雅喪如史數千篇才氣一何壯到今五百年如公尚無恙麒麟守髙阡貂蟬入畫像一死不幾時聲迹兩塵莽何如耒陽江頭三尺荒草墳名如日月光天壤琵琶亭潯陽江頭秋月明黃蘆葉底秋風聲銀龍行酒送歸客丈夫不為兒女情隔船琵琶自愁思何預江州司馬事為渠感激作歌行一篇六百一十字白樂天白樂天平生多為達者語到此胡為不釋然弗堪謫宦便歸去廬山故接柴桑路不尋黃菊伴淵明忍泣青衫對商婦送李來賓君作來賓宰聽我説來賓蠻俗無王化當為行化人有民無租賦租賦出商旅逐利遭重征商旅亦良苦能放一分寬可減十分怨不愛資囊橐但愛了支遣民窮賴撫摩官貧俸不多但得百姓安俸薄其奈何勿謂朝廷逺官職易遷轉律身貴廉勤御事要明斷自縣辟為州指日為太守須知早歸來瘴鄉不可久題姚雪蓬使君所藏蘇野塘畫髙者為山坳者為壑為煙為雲渺渺漠漠水鳥樹林人家聚落騎者何之舟者未泊三尺紙上萬象交錯天機自然神驚鬼愕嗚呼此吾之故人野塘蘇元龍之墨迹中有石屏老淚痕又為野塘添一筆章泉二老歌在昔商山傳四皓又聞香山圖九老異鄉異姓適同時爭如章泉一家兄弟登期頤章泉之上兩山下有地可宫田可稼伯也仲也蚤休官季也相約歸林泉名動京師耕谷口山中有詩天下傳一生得間兼得夀皓首龎眉世稀有竹隱先生八十三定庵居士七十九客從逺方來亦是六十叟手把一枝梅奉勸兩翁酒問翁何以致遐齡請翁細説吾細聽不燒丹不學仙五行有長數天所稟賦焉人生一氣統四體衆人斫喪吾能全要知養心無他術日多喫飯夜獨眠承翁見教謝翁去兩翁殷勤留我住是夜醉眠苔竹軒夢見山靈向我言翁之所説皆不然兩翁盛德合乎天天與遐齡五百年毗陵呈王君保使君二首姑蘇道士天酒星醉筆寫出雙龍形墨迹從橫奪造化蜿蜒滿壁令人驚一龍翻身出雲表口吞八極滄溟小手弄寶珠珠欲飛握入掌中拳五爪一龍排山山為開頭角與石爭崔嵬波濤怒起接雲氣不向九霄行兩來萬物焦枯天作旱兩雄壁隱寧非懶真龍不用只畫圖猛拍闌干寄三歎右天慶觀畫龍自題姑蘇羽士李懷仁醉筆何人筆端有許力捲來一片瀟湘碧摩挲老眼看不真怪是層波湧虛壁天慶觀中雙黑龍物色雖殊妙處同能將此水畜彼龍方知畫手有神通龍兮水兮終會遇天下蒼生待霖雨右太平寺畫水南嶽南雲縹眇連蒼穹七十二峯朝祝融凌空棟宇赤帝宅修廊翼翼生寒風朝家遣使嚴祀典御香當殿開宸封願福四海扶九重干戈永息年屢豐五嶽今惟見南嶽北望乾坤雙淚落玉華洞憶昨遊桂林巖洞甲天下奇奇怪怪生妙不可模寫玉華東西巖具體而微者神工巧穿鑿石壁生孔罅玲瓏透風月宜冬復宜夏中有補陀仙坐斷此蕭灑空山茅葦區無地可稅駕舉目忽此逢心駭見希詫題詩愧未能斯人亦無暇祝二嚴僕本山野人漁樵共居處小年學父詩用心亦良苦搜索空虛腹綴緝艱辛語糊口走四方白頭無伴侣前年得嚴粲今年得嚴羽我自得二嚴牛鐸諧鐘吕粲也苦吟身束之以簮組遍參百家體終乃師杜甫羽也天姿髙不肯事科舉風雅與騷些歷歷在肺腑持論傷太髙與世或齟齬長歌激古風自立一門戶二嚴我所敬二嚴亦我與我老歸故山殘年能幾許平生五百篇無人為之主零落天地間未必似塵土再拜祝二嚴為我收拾取懷家三首白髮出門來三見梅花謝客路有歲年歸心無晝夜強言不思家對人作意氣惟有布被頭見我思家淚三年寄百書幾書到我屋昨夜夢中歸及見老妻哭兩宋名賢小集卷二百七十三
