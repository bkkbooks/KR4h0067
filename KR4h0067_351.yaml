body:
  text: 兩宋名賢小集卷三百五十一宋陳思編元陳世隆補林湖遺藳髙鵬飛字南仲餘姚人有林湖遺藳次王元吉詠梅約略陽和動琯灰南枝已冠百花魁莫教隴驛攜春去且向羅浮喚夢回玉骨風標自仙種鐵腸賦詠漫多才只應賸結青青子調鼎功夫看後來窗軒一窗開永晝萬象出天成風力欺楊絮雷聲喚笋萌愁多春不願病起眼猶明最喜今朝雨川原是暮耕過王氏雲莊十里雲莊路東風信杖藜好花連夜發幽鳥傍人啼香宇禪心冷山容醉眼迷老僧春睡處明月映樓西孤吟世景雲來去人情水淺深塵埃從滿眼交友欲知心山簡豈愛酒陶潛元解琴對人不敢語仰面數歸禽深夜風雨有懷故人心馳流水髙山外身在落花啼鳥中滴得愁濃紅杏雨吹教夢斷碧梧風垂堂逺愧千金子掃地空憐一畝宫兩朵燈花伴孤獨清歡那得玉人同首夏千里辭家不作難歸來春事總闌珊久留午夢梅黃雨重索冬衣麥秀寒百箔老蠶鋪雪乳一庭新竹長琅玕此時正喜民財阜野草間花任自殘湖上舟載間雲穩湖光蕩碧天笑看沙上鳥終日伴雛眠深夜獨步思兄南伯舉杯叩門則卧矣緑柳橋邊古道橫乾坤寂寂夜三更月窺門處君髙卧露濕衣時夜獨行杯酒孰同驅俗意天風時下步虛聲明朝世界塵依舊試挽銀河一洗清丈亭渡阻風捲地西風翻巨浪小舟仍泊夜來灣行沽攜榼雖無酒卧看開篷幸有山原草正肥黃犢飽汀蘋未老白鷗間平生遇險須知止眼對江神一解顔湖上好景難逢奈老何十年此地絶經過山如得意晚猶碧雨亦知愁秋更多造化從渠旋磨蟻利名笑汝撲燈蛾湖邊直欲呼船去更共漁人挂緑蓑晚興風靜湖光一鑑浮青山四顧淡舒秋松隂滿徑歸來晚醉看巖花笑白頭夜渡鄞江睡起開篷月在沙晚江山影動龍蛇詩成索筆無人應酒盡囊空何處賒船去船來數聲櫓江南江北幾人家星娥定怪歸來晚從此西風欲泛槎南溪聞説南溪好肩車帶雨來澗泉鳴細石松木倚蒼苔雲笑人情薄山隨客語回黃花幽意足知復為誰開次靜海令蓋晞之食蟹吳中郭索聲價髙草泥足上生青毛越中海市喧兒曹白蟹厭飲霜前螯新豐逆旅酒濯足齊國相君飯脫粟當時珍味無所需吳越土宜俱碌碌復遊鄞江欲叩山扉汲野泉支筇且駐栁隂邊苦無平地休穿屐待有輕風却放船孤笛吹開雲裏月一竿撑破水中天舟人相戒低聲語沙上恐驚鷗鷺眠次孫燭湖秋夜有感忽作清宵夢非關世纍長月隨花影轉水照木隂涼浴露千峰碧梳風兩鬢蒼明朝須洗耳秋意過寒螿舟中木落山髙秋去後犬驚人語夜深時小舟滿載離愁重惟有孤鳴寒雁知一水分流無限曲兩山村對不知名漁翁夜半歸南陌認作中流擊楫聲秋晚斷雲送歸雁斜陽明晚楓西風灑雙鬢醉倚危闌東兩宋名賢小集卷三百五十一
