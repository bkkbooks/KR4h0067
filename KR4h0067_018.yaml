body:
  text: 兩宋名賢小集巻十八宋陳思編元陳世隆補皇雅尹洙字師魯河南人天聖二年進士知伊陽縣召試為館閣校勘累遷右司諫知渭州兼領涇原路經畧公事坐貶卒有河南集天監受命也自梁至於周兵難不息宋受命統一萬方焉天監下民亂靡有定甚武且仁祚厥真聖仁實懐徠武以執競匪䖍匪劉拯我大命自昔外禪日經月營令以挾制政以隂傾帝初治兵志勤於征奄受神器匪謀而成淮潞弗䖍卒汙叛迹戎輅戒嚴皇威有赫彼冦詿民吾勇其百殄厥渠魁貸其反側帝朝法宫左右宗公忮夫悍士以雍以容爾居爾室爾工爾農既息既養天子之功一作惟天子功天監四章章八句西師征蜀也王用西師岷梁弗賔匪曰負固實交晉人予訓予誓合我将臣正厥有罪無庸傷民矯矯虎士載摧其壁于嗟孟侯亦果其䇿迎師而降靡抗鋒鏑豈獨身謀完是宗國蜀都既平將臣失律此衆悍驕彼民危慄當塗呌呶合萬為一匪懐則威帝心是恤帝曰将臣予嘉乃庸廢命毒民爾弗有終邦典用疑惟罪惟功靡殛而削協于厥中帝曰孟侯受封于楚淑斾琱戈備物異數俾爾族姻及乃文武服在皇庭靡不有序蜀民呼歌天子威靈保我者封暴我者刑匪功是和匪弱是陵天子惠民疇敢不承西師六章章八句耆武受俘也命将伐南海平金陵俘二王以獻耆武定功時惟二方淮服其義海南遂荒孰孱而盭孰暴而猖自底不譓乃終滅亡帝戒二俘用一作同即爾誅予惟民無辜休息是圖時其輯矣寜威獨夫帝嗟汙邦久罹于兵或暴下以征或敷虐以刑予命中興協于國經民服徳音室家以寜耆武三章二章八句一章六句憲古令守臣也削其附庸以强帝室焉帝懐永圖治古是憲四方守臣惟屏惟翰在昔艱難弗惠訓典跨都連城髙牙以建有土有民肆乃征繕以息以容終焉叛渙凡今帥臣狃厥聞見匪革亂源曷清多難帝告庶邦式是典懿元侯顯父戚臣宗支正乃封圻予一人是毗凡曰附城罔爾俾之畜兵厚賦靡爾得私毋凶而國作福作威天子有命疇敢不秪子孫承承惟萬世規憲古二章章十六句大鹵王師討晉罪也冀州之疆粤惟大鹵俗忮而尃地阨而固協比幽都蕩揺邉圉三垂既夷兇威弗沮帝御六師百萬貔虎剪其附庸至于城下鋒鏑始交梯衝如舞蠢爾孱王請附降伍我士奮揚願究吾武皇帝曰吁念彼黎庶匪鯨匪鯢復為王士晉郊既平九區以寜陳功太廟告假威靈在昔武王於商觀兵維我藝祖亦既一作勤于征匪貸晉罪俟厥貫盈聖作聖繼巍巍相承皇矣二后功莫與京大鹵二章一章二十二句一章十四句帝籍修故典也躬耕以勸農焉帝籍于郊典儀具陳務農以訓供祀以勤祀在于誠暨厥庶民千甸有制飭哉惟寅帝賚髙年式宴且喜種種黄髪族立而議我生艱難暴亂以繼耳狃金鼓目狎戎器皇其我圖親講農事有子有孫力田孝悌鼓舞至仁薰焉如醉帝籍二章一章八句一章十四句庶工任賢也帝咨庶工疇其輔予俊乂以登厥勞乃圖匪忘舊勲匪賢勿俞巍巍衮台盛徳以居任賢伊何昌言是庸勉告爾猷罔恤乃躬豈無狷辭怫于予衷予不爾疵爾無面從始時從官戎容揚揚今帝左右儒冠煌煌朝廷以尊文物典章得人之盛奕世重光庻工三章章八句帝制北方請盟也帝制萬邦罔有弗賔蠻夷戎狄羈而弗臣威格三方稽顙獻珎單于革心願交使人帝謀公卿列侯庻校咸曰彼心暴戾隂狡既擾我疆復利我寶無若利兵襲其還道皇曰有衆予實念兹戰無必勝矧其歸師借曰大獲疇能盡之俾益餘醜毒我朔陲乃俞其盟北州以綏在漢世宗抗威北戎暴農筭商經用弗充中土震騷漢南始空降及後世猶稱厥功於穆聖老徳無與偕匪勤於兵北人遂來逮是三紀逺俗以懐生民休息鳴呼仁哉帝制五章四章八句一章十句皇治恤刑也帝仁于用刑在位者以寛恤為治焉皇底其治欽哉惟刑在疑而宥罔察為明愛怒弗肆孰為重輕毋一弗辜惟典之平前世理官倚法以刻匪彼為仇盖曰任職今之蔽獄務正其辟鑒于前人繄我仁徳皇徳在仁寖而成風公侯卿士靡不率從麛卵萌生咸保厥終不鄙其天樂哉融融皇治三章章八句太平封祀告成功也噫太平無象兮世烏得而知維盛徳可迹兮其封祀之儀東岱宗兮西汾睢禮上帝兮賔地祇皇有征兮吾民以嬉皇有祈兮吾民是私天敷佑兮俾皇之釐億世永寜兮無疆之基太平一章章八句兩宋名賢小集巻十八
