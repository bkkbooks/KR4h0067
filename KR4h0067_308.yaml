body:
  text: 兩宋名賢小集巻三百八宋陳思編元陳世隆補漁溪詩藁泉亭步入侵雲嶺亭高路恰平池邊幽樹占水底細沙明無友詩難詠逢僧話轉清此中真勝地林寂鳥無聲夏晝輕揺羽扇着輕紗閒汲清泉自煮茶縁是夏来無甚雨小池猶未有荷花楓橋寺湖水相連月照天鴈聲嘹嚦攪人眠昔人曾到楓橋宿石岸旁邊繫小船秋千吾今兩鬢已成絲每每逢春獨自悲最恨秋千無力上風流不比少年時早春客裏匆匆二月春梅花開後桞爭新西湖不待清明到早有㝷芳拾翠人寄懐一畨舊事總成空莫使相思夢裏逢惆悵陽臺雲共雨陽臺今隔幾千重夏中即事青青梅子已添肥犢角新抽晚笋遲茶罷日長消睡處案頭一巻樂天詩看先叔祖青松居士倉使詩儒冠毎笑拙身謀春日因何挂玉留南浦未思芳草恨西湖正為落梅愁四靈去矣今如在諸老蕭然事已休衣鉢青松誰繼續家雞還復可搜求軍中請衣諸營今日請春衣積沓如山競捧歸曾念雪中兵墮指戍邊鐵甲正防圍海棠海棠嫋嫋弄胭脂雨入枝頭睡正宜最是高人有遺恨杜陵因甚却無詩居官幸喜居官事不多庭空吏散雀堪羅近来轉覺詩朋少誰肯高軒為我過心事落落功名鬢早斑蹉跎心事十年間看来只合歸湖上魚釣叢中盡日閒垂虹松江一景是虹橋欲約騷人釣巨鰲吴越封疆知幾夢古今人物壯三高雪天斫鱠莎烟冷秋月漁歌劍氣豪收拾琉璃千萬頃盡為醽醁汲波濤臘八前四日天氣晴和又作陰老来畏冷自難禁餘霙待伴留痕在殊動騷人訪戴心湖上閒步一畨雨過一畨春芒竹閒行踏軟塵城裏不知春色早湖邊楊桞已撩人新竹傍墻穿過鄰家竹愛護新篁數十竿剪伐莫令僮僕輩老夫日日要来看松江香飄菡蓞短篷中水色山光一様同行止又非人所料今年兩度上垂虹虎丘突兀浮圖挿翠微吴王事迹總成非寺僧未晚山門閉不放閒雲一片飛秋詠吟軸捲還開行歌興盡回買花澆換葉開徑埽蒼苔巾學涼紗樣衣從薄苧裁潘郎羞鬢白多是為秋来秋夜秋夜多愁思虚堂風露涼觀書燈可近欲睡漏初長蛩響頻催織螢飛爍有光雨梢忩外過散入稻花香寄陳芸居生長京華地衣冠東晉人書中塵不到筆下句通神江海知名日池塘幾夢春精神長似舊芸藁愈清新冷泉亭欲訪飛来景湖頭賃小船白雲侵嶺下翠樹傍泉邊入寺人須到深林影自圓山居相去近夜坐學參禪春晚湖上花事已成休都人懶出遊水添烟浪濶山帶夕陽愁栁樹鳴黄鳥沙隄卧白鷗不辭歸路遠何必買扁舟春詠盡日看詩只掩扉出門細雨怕沾衣杏花已露胭脂色燕子如何却未歸苔錢庭砌方圓出化均何須抵死論錢神貧家阿堵新添富買斷西湖風月春買魚蘆花荷葉晚秋天雁影横斜逺水連頻喚買魚人不譍偷忙撑入怕官船即事東君無處不繁華一雨纔晴意便佳客舎山梅開遍了從今懶買擔頭花送春作惡情懐是别離老夫嬾作送春詩東君歸去無蹤跡試問垂楊便可知春歸青青結子在梅梢方見春来夏已交認得主人雙燕子香泥銜去理新巢晴天氣淑濃如酒引得狂蜂路亦迷獨立闌干凝望處賣花人在畫橋西閒中花飛春減燕雛飛葉葉成陰障翠圍囊裏酒錢消鑠盡滿船贏得載詩歸江頭漁浦山邊白鷺飛西興渡口夕陽微等閒更上層樓望貪看江潮不肯歸口占園林緑暗又紅稀蜀鳥啼山笋蕨肥春夏一畨交篆早綿衣脱了換單衣吟詩漁溪僻好只吟詩此意還須識者知自古島郊貧徹骨詩逢窮處始為奇社日今朝社日寒猶力燕子還尋五桞家宰肉不沾吾分薄强斟聾酒度年華喜雨上别大參爰立為霖仰望深今朝一雨慰蒼生經綸久柬君心在燮理還同天道亨愛國慮勤寛玉帶籌邊謀逺捍金城我公勲業難摹寫但見皇家慶太平寓京二首一官濩落笑如初只合空山去讀書不稼不漁無活計謾將名氏玷公車車馬滔滔厭軟紅湖邊秋意屬西風木犀初放荷花老買箇船兒學釣翁春日即事春入侯家春事深日長庭院又沈沈客中不耐如絲雨攪起思家寸寸心春光滿目是湖頭水碧琉璃拍岸流憶着去年桃葉渡相思無限使人愁丙午七夕後一日晚抵松江塔下到得垂虹廹暮烟前村雨暗莫行船幸然得與僧人熟借得終宵客位眠客中情况少人知正值鐘聲約束時清坐更無人共話挑燈来看菊潭詩兩宋名賢小集巻三百八
