body:
  text: 兩宋名賢小集卷二百七十一宋陳思編元陳世隆補梅屋吟鄒登龍字震父臨江人隱居不仕結屋於邑之西郊種梅繞之自號梅屋有孤山處士之遺風焉吟藁一卷劉後村戴石屏真西山咸稱之關山月行人十年歸不得夜上戍樓看明月樓中星斗連太白樓外關山雁飛絶雁飛絶歸不得鏡裏青娥怨離别前年出幽燕明月何團圓去年上祁連明月復嬋娟月明照我長枕戈邊塵未靜將奈何憑誰寄書問嫦娥征衲不來霜霰多從軍行年少良家子投身事西北金鳴鬬馬嘶蕭蕭短兵發夜戰祁連山斷甲濺腥血番部帶箭降番前連陳沒勒功紀燕然椎鼓歸漢闕結客少年場并兒任氣俠年少肝膽雄錦臂金彈丸銀鞍玉花驄腰插三尺劍手開二石弓輕生重大義一戰朔庭空斬取戎王頭提奏甘泉宫秋夜長曲碧簾挂雨秋容老寂寞江城暝煙草流蘇帳冷屏山低密炬香消睡常早夢驚離緒牽愁入翠被寒侵淚花濕思美人兮天一方烏啼月落西風急青樓曲青樓女兒十五六翠掠雲鬟妙裝束千金學舞拜部頭新來教得涼州曲錦韉少年被花腦醉把金叉換香草西風樓前秋雁飛舞衣狼籍花顛倒採蓮曲平湖渺渺蓮風清花開映日紅糚明一雙􅗌渤忽飛去為驚花底蘭橈鳴蘭橈蕩漾誰家女雲妥髻鬟黛眉嫵采采荷花滿袖香花深忘却來時路江南春玲瓏樓閣江城晚楊栁絲絲凝碧煙飛燕不歸春滿地百花香裏聽啼鵑長門怨怨殺宫門不忍開無情孤月暗蒼苔而今痛惜珊瑚枕曾是君王賜御來巫山髙巫山巃嵸巫峽曲一十二峯淺凝緑老猿化石懸巔崖矗矗陵雲掃壇竹九靈少女列仙從佩玉鳴鸞乘綵鳳飛魂步魄歸瑶宫紫簫吹斷荆王夢雪霽梅月曲羌玄圃兮玉英蹇氷輪兮太清綺縞袂兮誰子粲一笑兮傾城倚橫吹兮寄哀思攬幽香兮補騷情遊仙人命如朝露夀非金石堅安得傅六翮飄飄凌紫煙夕夢一道士羽衣何翩躚邀我與之去同上扶桑巔道遇青童君授以東華篇讀之三百遍忽若骨已仙道士復謂我玄訣未可傳賜我以瓊漿飲之享遐年明發寂無覩孤鶴翔九天詠懷洪河相綿纏真宅良可卜蒼松蔭長蹊叢梅馥四屋過亭白水飛流鳴潄寒玉遊目俯靈景抱杖委繁俗長吟暢幽懷理琴展清曲豈不企凌厲而乃傷局促吉士抗遐蹤幽人聚靈族步出城東門步出城東門與子各執手遙望冢纍纍悲風發隴首長松自青青枯根帶骨朽人生如朝露嘉命那可久世無王子喬何訣以固夀感慨徒悲傷歡言且飲酒山上有白雲山上有白雲浮陰翳陽光亭亭颯繽紛出岫髙飛翔飛翔長在望逺匪千里隔莫以秋風來吹散無蹤迹秋夜懷菊山沈莊可涼風動金旻奄忽寒節至百卉俱萎垂梧桐亦飄墜明月入我牖輾轉不能寐顧影重傷心思君長下淚歲晚懷愚齋趙叔愚壺山宋謙父忽忽歲將暮烈烈北風涼霏霏雨素雪皎皎南枝芳慘慘念良友煢煢在他鄉盈盈一水隔迢迢道路長悠悠無信音戚戚重感傷翩翩化鶴去一去與同翔月洲李賈友山捧檄來淦訪我梅下示教禁體物語詠梅佳句今歲梅開月洲仙去追和元韻感此良友庭前有寄樹幽豔發南柯寂寂衆芳歇綿綿生意多孤根依嶺表髙節委巖阿清友今何在悠悠空逝波和竹里蘇材叔見梅懷友韻徘徊江路側何以慰相思陽彩來寒樹貞姿倚暮籬飄零懷逺道遼索負芳時佇立幽吟苦餘懷將訴誰西郊梅開懷吟軒周獻父仲冬寒氣盛玄雲停故陰嘉樹厲清節孤芳潔素心幽幽熒歲落皎皎隔塵侵折寄無來使山川迥且深滕閣懷古憑髙獨展眺風葉亂鳴秋鸞舞自空閣漁歌尚晚舟卷簾山歷歷倚檻水悠悠月出江城暮淒涼萬古愁寄雲林楊少雲自衡之桂問訊楊夫子經年客異鄉南浮湘水逺西望楚天長五嶺梅花發孤亭草色荒白雲遙滿目曷久住炎方寄呈後村劉編修衆作紛紛算噪蟬先生中律更鈎玄如開元有二三子自晚唐來數百年人競寶藏南嶽藁商留金易後村編儻令舐鼎隨雞犬凡骨從今或可仙戴式之來訪惠召屏山集詩翁聲價滿江湖肯訪西郊隱者居瘦似杜陵常戴笠狂如賈島少騎驢但存一路征行稿安用諸公介紹書篇易百金寧不售全編遺我定交初江居獨作幽居計江邊屋數間水流天自在心逺地寬間鉏月栽梅樹移雲疊石山白鷗盟欲結倚杖看潺湲溪村兀兀小橋西人家住繞溪雲山當戶入竹樹出簷齊風急花初盡春深鶯亂啼稻畦新雨足稚子亦鉏犂題杜少陵草堂圖背郭好林塘誅茅作草堂因吟白鴉谷為卜碧雞坊籠竹如煙淨江梅帶雪香四松經喪亂閲世幾風霜遊玉笥山玉笥凌空後天都詔吏仙荒壇深覆草峭壁響流泉石洞隨龍蟄金丹許鶴傳夜深搗藥鳥啼破翠微煙入投龍洞行入投龍洞青青見竹竿暮雲生道樹夜月滿仙壇枯蘚沿崖古長松繞澗寒三生清淨福獨此愧黃冠上慧力寺今代空王宅前朝處士家牛車為象藏鹿苑發龍華松密風生樹江空月在沙闍黎飯鐘後邀我試新茶寄蒼山曾子實東湖從此别嘉會邈無期望逺音書阻思君歲月馳春雲山隔斷秋雨雁歸遲欲見崆洞使梅花寄一枝幽事間攜小斧刪梅樹自縛枯藤補菊籬燒柏子香讀周易滴荷花露寫唐詩遊仰山寺施地開金剎神因結佛緣怪松盤獺徑古木護龍淵雲裹春山亂禽啼夜月圓路遙歸不得好借上方眠宫詞內人倚遍玉樓東曉色間雲臘雪融羯鼓一聲花盡拆三郎自喚作天公梅花約臂金寒拓綺疏搔頭玉重壓香酥含章簷下新妝額試啓菱花得似無送表兄趙奏院赴南外知宗御屏往往題名字朝路彬彬藹薦書天許留中監邸奏日求補外得堂除暫煩龍種司瑶籍行立鴛班侍玉輿丙枕或思前夜席庚郵寧肯後鋒車王氏山居聞道山居好林深逺俗情茶煙薰壁暗蘿月射窗明學稼修禾譜栽花識藥名無人覺幽隱為有讀書聲送雲巢曾校勘赴召髙卧雲巢久雲生處士衣忽聞頒詔札推入侍經幃朝野名雖盛山林志莫違好歸清澗隱富貴有危機水亭闌檻玲瓏直又橫半臨池水著新亭擬招鷺宿栽添葦怕礙魚行掠去萍五月藕花千樣錦四時山色一般青有間來此尋幽賞莫看人間淡墨屏趙承逺雲聞道幽居好棲雲結數椽庭深關竹雨衣潤染茶煙嵐氣生朝壁湍聲入夜弦半山飛動意未得痼林泉兩宋名賢小集卷二百七十一
