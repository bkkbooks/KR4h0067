body:
  text: 兩宋名賢小集卷一百九十九宋陳思編元陳世隆補林泉結契四王質水友續辭蓮子花紅或白房莖葉皆青子外黃中白清脆可食老有餘味我取友兮得蓮子月白風清影斜水煙消露飛香愈茂風標宜夜不宜晝薏青青菂白白所思兮將焉歇中坻阻躋不可越藕條花紅白葉青根白而圓長方初生脆嫩堪滋羮尤冝咀嚼吳人欲肥根髠葉朔人號光旁希見之稱我取友兮得藕條花近可招逺可撩龜魚到底亦不見但見紅開乃碧凋風漾漾露漙斯所思兮焉可移光旁聊見幽并兒雞頭花紫苞莖葉皆青子外緑中白甘韌莖亦美又號鴻頭我取友兮得雞頭漪瀾汪洸不肯流雞棲鴈棲卑不飛鴈或浮水雞何為溪無魚沙無蝨所思兮安有畢濕沙暗蟲聲唧唧菱角花黃白子外緑中白四角或兩角紫者皮薄而肌厚尤佳又號水栗我取友兮得菱角碎葉參差水瀺灂重重疊疊庶相倏雖見噞喁不可捉收簧袋收簧絲所思兮宜相資擦莎挨樹秋蟬啼水粽花白莖紫苞青子如栗根如粽根莖皆可食春採莖秋採根我取友兮得水粽結花甚輕結根重竹筒揀葉瀟湘餘隨風凌亂飄江湖藤籠間漏篼間所思兮奚可慳蘆岸槿籬門早􅗚水芽兒色黃葉青狀如嬰兒可食味如黃精人呼水黃精我取友兮得水芽荷花為娘藕為爺不聞兒聲聞水聲短崎長溆鳴奔沙霜欲飛水欲歸所思兮不忍欺東坡南蕩秋風稀慈菰花白葉青根外黃中白狀如大蒜可食葉如車前者為山慈菰我取友兮得慈菰秋風才沒藏淺莎并州剪刀聊藉姑剪得間花間子踈燕搖尾龍掀鬚所思兮可與娛秋波索索秋聲孤水芹花白根亦白可食葉似芎藭色赤為荻芹又號水英我取友兮得水芹深青淺緑鬖鬖勻半沉半浮輕去來溪毛石髮相毰毸健魚赤弱魚碧所思兮不勝積踈煙淡川淨如拭水蓴花黃白子紫莖赤葉柔滑可食為絲蓴色似紫菜者為石蓴冬為豬蓴龜蓴古稱茒我取友兮得水蓴黃黃白白花深深美髯得非龍子孫秋風不退香涎痕東魯思東吳思所思兮宜相詒草木溪山今是非兩宋名賢小集卷一百九十九
