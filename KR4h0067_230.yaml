body:
  text: 兩宋名賢小集卷二百三十宋陳思編元陳世隆補安晚堂詩集鄭清之字德源初名燮字文叔鄞人少從樓昉學能文為樓鑰所稱賞登嘉定十七年進士教士峽州帥趙方嚴重斳許可視清之獨隆重命其二子范葵出拜且掖清之無答拜曰他日願以二子相纍湖北茶商羣聚暴橫清之白總領何炳曰此輩精悍宜籍為兵緩急可用炳從之號曰茶商軍後用果有賴遷國子學録丞相史彌逺密語之曰皇子不堪負荷聞後沂邸者甚賢君善訓迪之事成彌逺坐即君坐也言出於彌逺口入君耳若一語泄皆族矣即除清之魏惠憲王府教授俄兼太學博士寧宗崩彌逺入定策詔旨皆清之所定理宗即位纍遷參知政事及同知樞密院事彌逺卒命清之為右相兼樞密使帝時親總庶政清之亦慨然以天下為己任召還真德秀魏了翁崔與之李埴徐僑趙汝談尤焴遊似洪咨夔王遂李宗勉杜範徐清叟袁甫李韶時號小元祐又旌異遺逸劉宰趙蕃輩端平三年以雷變請祠嘉熙二年封申國公四年賜御書輔德明謨之閣賜楮十萬緍為築室乃日與賔客門生尚羊山水間淳祐四年進封衛國公五年進封越國公拜少師賜第西湖之漁莊進讀仁皇寶訓謂仁祖之仁厚發為英明故能修明紀綱而無寬弛不振之患孝祖之英明本於仁厚故能涵養士氣而無矯厲峭刻之習蓋仁厚英明二者相須帝褒諭之七年以太傅右丞相兼樞密使帝以邊事為憂時趙葵以樞密使視師陳韡以知樞密帥湖廣清之力主之科降辟置無留難於是泗水渦口木庫之戰皆捷諸路虧鹽執其事者破家以償清之核其罣誤者悉蠲之全活甚衆又進十龜元吉針帝命史官書焉卒引薦趙葵使居右相帝從之葵亦不果來兩拜太師辭閣門給扶掖二人再賜玉帶以疾纍乞罷政拜太傳保寧軍節度使充醴泉觀使進封齊國公致仕卒特贈尚書令追封魏郡王諡忠定默坐觀成洹河見水老如新此見云何别妄真心本佛心須作佛境皆塵境莫隨塵空中花果浮生眼夢裏悲歡現在身萬事盧胡喫茶去不知誰主更誰賔低頭莫莫更休休老去浮沉一敝舟病惱幻軀天惡劇醉尋熟睡我先籌眼前勤惰書開闔窗下陰晴雨散收假使莊生夢為蝶也應貸粟監河侯睡魔勾引鶴投林書債中拋筆似瘖尚有烏髭贏白髮擬尋朱汞養黃金寸機解起千疆畝一息能藏萬古今塵世何人是知已推窗明月正當心追記覺際偶成我到家山雪尚飛看看寒食展歸期花開無酒蝶貽笑春盡不吟鶯有辭窗下竹君陪晤對手中杖子共追隨間來自唱無生曲井底泥蛇舞柘枝靜極磨甎豈解成明鏡打坐如何作佛身靜閙頭頭須認著暑中冰凍雪中春燈薪小草虛心不染塵傳燈會上屢焚身光明一點元無盡漫結空花作好春臂疼醫令灼艾戲成幻體當如泡影觀法身清淨本堅完四千八萬陀羅臂艾炷教君何處安食豆莢西風摵摵草蟲鳴萬莢叢中詫瑞蓂煮啖快輸兒女吻燃萁不忍尚堆青臂疼自砭雲長鑿骨未為竒斷臂亭亭對祖師萬法從心當自省箇中冷暖有誰知有感子思問學惟誠意孟氏工夫只反身定慧妙明何處覔要知儒釋共天真秋色佳甚未能一到覺際像景漫賦二絶秋光淡薄有無間掠水斜風雨腳斑試向菰蒲深處望嫩黃一點荇花間藕花萬柄斂春粧賸駐霜荷葺芰裳水路想通漁艇入我來月下要鳴榔感風悶坐戲成六言一首示雲岑夢覺無兩莊子是非只一東坡顔淵簞食為樂啓期帶索行歌魯侯不遇天也伯寮其如命何世事如碁新局人生落葉辭柯誰人見張平叔何處覔藍采和且服單方妙藥般若波羅蜜多秋成風雨垂垂金穎賀秋成去逐狂風一羽輕何事天工惡戲劇眼前翻覆見虧盈雨後間坐偶成秋霖得曉晴景色似郊坰山向間中碧雲從闕處青簷牙留宿溜木杪挂疏星一枕便高卧清風入暑櫺兀坐夜聽寒蛩曉聽蟬梧桐疏雨晚秋天空齋抱膝元無事半是癡憨半是禪香山老惠兩貓殺活禪機本自由順行逆用總先籌伽黎親抱貍奴送管是南泉是趙州香山貓食粥梵宫新遣兩貍奴晨粥飢餐食肉如料是伊蒲三昧熟未知繞膝許無魚冬瓜剪剪黃花夜後春霜皮露葉護長身生來籠統君休笑腹裏能容數百人茄子青紫皮膚類宰官光圓頭惱作僧看如何緇俗偏同嗜入口元來總一般贈李相士未遇公卿儘好看會將碧眼照人寒邯鄲夢覺君休問試卜何時可挂冠七月初五日城中大風雨颶風超海撼官城吹斷銀河徹曉傾瓦陳飛翻千鵠起履聲旁午萬蛙鳴駢肩重足人如醉湧溜奔雲氣未平誰與箋天如帝律毒龍斥去鎖東瀛聞覺際被風寄頔老古德把茅惟蓋頭颶風飄屋等虛舟矮窗猶有蒲團滑也勝牀頭滚雪毬督覺際蒔菜秋後從來數晚菘自鋤稀甲幾多叢莫辭榾榾頻攜甕準擬清饞玉糝翁偶記賦王昭君漫録之因覽詩話中賦昭君者命意多溺於情遂出此作伐國曽聞用女戎忍留妖麗漢宫中如知褒姒貽周患須信巫臣為楚忠青冢不遺芳草恨白溝那得戰塵空解攜尤物柔強國延夀當年合議功八月初五夢桃杏枝上皆小蘂頃刻間一花先開既而次第皆拆色殊紅鮮可愛夢中為賦一詩天孫紅錦淺深栽為惜方苞未肯開爭奈東風披拂甚枝頭次第吐香腮贈談命陳總屬彈鋏朱門歲月過生涯安樂遍行窩談天有口機關别處世無心笑語多自是君平忠孝在其如曼倩滑稽何一帆又作鴟夷去遙想江湖聽踏歌八月上弦夕輕風尉貼晚雲開為放中秋半月來待得月圓多值雨不如今夕共樽罍覺際間坐紀所見蛛網雨中時恤緯蜂屯衙後自嬰城竹根得土筍爭長紙隙受風窗善鳴食蛤戲成滿殼濡潮汐因沙産海漘文身吳太伯緘口魯銅人雀化宜分雋蛙烹肯擬倫蛙大者名風蛤試呈叨賦手半熟酒含津督覺際植花桂後秋蘭解出竒幽香元不許春知移根好向他山覔承受風光到竹籬兄弟梅礬是水仙曝根向暖種宜先銀臺金盞惟須酒不可無渠對雪天催覺際植芥淡交耐久最宜蔬風味清嚴莫芥如沃壤深畦須早計雪中滿擬飫冰葅觀書連日脾胃不快因觀書遂喜食肝脾何藥解清虛不用參苓不㕮咀一種單方無授受明窗端坐只觀書夜雨依風急雨墊秋清疏數無時總有聲最是可憐雲裏月幾畨陰翳幾畨明睡起戲筆范蠡功成便五湖鴟夷未了復陶朱爭如終老嚴陵釣千古清名一事無謝天童老秋蘭楚畹春曾泛曉光直留雅艷到虹藏山中不把一枝到世外那聞千佛香秋色追隨入慧光肯攜幽卉問行藏深林未省炎涼態來為間人特地香緑葉青青音菁帶紫光經有紫金光聚拈來笑處沒遮藏密圓應具楞嚴偈非木非空出妙香夜雨不睡浮沉世事付洪喬敧枕迢迢度永宵雨細無聲簷溜滴香殘有燼篆煙銷翻盆碩鼠全欺暗繞鬢飛蚊始作嬌老去易驚寒暑變幾多今夕又明朝少日無歡老易愁鶯花過眼一春休清虛未解窮聃釋情思誰能更孔周白醉暫煩簷送暖蒼顔惟恐鏡包羞爭如一點天然物不共浮生作去留育王老禪屢惠佳茗比又攜日鑄為餉因言久則味失師授以焙藏之法必有以專之笑謂非力所及漫成拙語解嘲録以為謝曾讀茶經如讀律一物不備茶不出未論煮瀹應節度第一收藏在堅密摘鮮封裹須焙芳濕蒸為冦防侵疆朝屯莫蒙要微火九轉溫養如丹房育王老慧老茶事新授祕訣乃如此幾畨惠我先春芽朅來細問茶何似我初謂師茶絶竒十日之後如飲糜頗疑緇俗果異撰良楛輒為居所移吾言未終師絶叫為茶傳法恨不早綺疏應合有司存料理如前毋草草對師大笑面欲闕三年宰相食無鮭長鬚赤腳供井臼荒寒正賴山人家扊扅炊盡闕吼何曽敲雪春雲走不如時扣趙州門侍者可人長摸首竹下見蘭竹下幽香秪自知孤髙終近嵗寒姿垂楊漫舞多嬌態倚賴東風得幾時小軒偶成齋餘宴坐息深深萬法皆間境會心輕浪颭荷珠溜玉晴曦穿竹翠籠金岸頭舟楫人歸語檻外菰蒲鳥去音漫説陶車并謝屐如如不動勝登臨舊冬得蔞蒿數十根植之舍傍今春遂可採擷輒持羾黃堂拙語先之聊發一笑蔞蒿見録爾雅篇族譜系出荆楚壖居人採擷不論錢橫道躪轢如車前物有貴賤所遇然雞壅氶苓以常言世間何有正味焉嗜芰昌歜性所便冰壺先生齏甕傳敢驕玉食輕膏羶天隨酷謂杞菊賢一賦金石聲相宣玉糝羹芋稱蘇仙天上酥酡能比肩憶昔客授湘湖偏乍逢此蒿日流涎嚼寒冰玉香滿咽甘滑琉璃鳴貝編糅以豚膏軟如綿脆甘豐膩潔且鮮天花石耳羞爭妍木雞退飛山之巔笑渠芽蕨成兒拳岸視橰圃眉宇軒七葅五菜誰敢先獨能兄事玉版禪一别楚産知幾年孤根朅來植鄞川春苗出吐含曉煙援條小摘喜欲癲故人千里方言還調芼酌之雙觥船枯腸慰滿藜莧緣食芹而美不敢專遣送兵厨羞俎籩噴飯一笑篔簹邊太史報彗星沒老彗妖芒欲爇天王良見迫為收鞭紫微一夜璣衡轉甘雨祥風到野田和趙從道賦菜畦春富貴多生菜氣粥魚僧味菜還知好色登戲學挑根和露煮正堪摘稻配香蒸見誠齋詩芝田不減商山樂蔬食誰言孔色矜孔子見老聃云云去而驕志與矜色蒲筍秪應維䔩美鏤鍚何必羡韓膺送林教授行戊戌九月玉壺仙骨産蓬萊客授京璜雋武開曾向西山傳墨印魯直墨以傳千古文章之印好遊東觀籋蘭臺青雲直上輕餘子黑髮誰量未易才側耳韶簫充雅奏願同觀樂詫州來石鼎煎茶午夢醒羊腸怕聽繞車聲剡舟忽至驚安道漢使新招别子卿交誼從君知絶俗凋年如我最關情鸞凰先路為時瑞肯卜筳篿訴獨清兩宋名賢小集卷二百三十
