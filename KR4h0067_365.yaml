body:
  text: 兩宋名賢小集巻三百六十五宋陳思編元陳世隆補説劒集吕定字仲安新昌人歴殿前都指麾有説劒集懐古我昔遊海上東望三神山風波㡬萬里蒼茫雲靄間魚龍自掀舞天空日月閒神仙渺無跡徐福去不還空餘蓬萊閣千載留人寰追和蘇子贍遊峽山寺韻山迥寳華閣水遶金鎖灣塵慮頓焉息于兹開我顔疎鐘日夕動老僧林下還天風吹白雲悠悠滿松闗歸猿有餘悲月明嘯空山仙人自何來翺翔八極間手把玉芙蓉吟笑鏘珮環歌罷忽飛去千峰堆翠鬟赴京太白樓前雨乍収畫船撾鼓上皇州肯因離别牽愁思要把勲名事壯遊千里關河旗帶月一天星斗劒横秋胷中賸有安邊䇿此去應當獻冕旒奉天門朝賀曉日初臨萬嵗山寳幢華盖列朝班九重天上來仙樂五色雲中識聖顔深殿捲簾香霧裊近臣傳制珮聲還嵩呼齊祝恩如海散作陽和滿世間調兵年少談兵膽氣豪折衝千里豈辭勞旌旗影動秋風瑟鼓角聲回夜月髙紅錦裁鞍新試馬黄金裝帶舊懸刀臨征自信軍容盛五色團花繡戰袍扈駕八月秋髙戰馬肥觀兵郊外振天威一聲鳯吹迎鸞馭五色龍文雜袞衣劒㦸横空金氣肅旌旗映日綵雲飛令嚴星火諸軍奮直斬單于塞上歸班師紫塞囘來雪正晴王師百萬擁連營馬嘶大地山河壯旂捲長空日月明龍虎臺髙千嶂聳鳯皇城近五雲生聖顔有喜天心順中外歡聞奏凱聲登東岳山海内名山孰與齊清風掖我上丹梯鵬程九萬扶搖近世界三千指顧低瀑挂天門驚霹靂雨蒸日觀出虹霓太平㑹見東封盛玉簡金書煥紫泥雪夜漠漠同雲徧海涯曉風寒逼緑窗紗飛揚鱗甲三千界糚㸃樓臺百萬家何處妙歌金帳酒誰人清對玉梅花便應石鼎融氷水烏帽籠頭自煮茶望岱岳岱宗東望鬱嵯峨萬丈仙橋鳥外過秦樹千年空老大漢碑終古不消磨天壇夜静乘星斗石磴春深長薜蘿記得舊遊曾載酒頽然峰頂放長歌望嶧山極目東山秀色濃紫霄千葉醉芙蓉題詩尚記仙人洞飛珮曾過玉女峰樹老孤桐秋露下碑殘古篆暮雲封何時再醉天門月卧聴清風萬壑松登彭城樓項王臺上白雲秋亞夫墳前草樹稠山色不隨人事改水聲長近戍城流空餘夜月龍神廟無復春風燕子樓楚漢興亡俱土壤不須懐古重夷猶戲馬臺據鞍揮指八千兵昔日中原㡬戰争追鹿已無秦社稷逝騅方嘆楚歌聲英雄事往人何在寂寞臺空艸自生回首雲山青矗矗黄流依舊遶彭城夜宿甓社湖湖光如鏡迥無山耿耿銀河路可攀萬象不移天地外一塵能到水雲間月明孤嶼森樓閣夜静飛仙過珮環借問盂城何處是微微燈火緑楊灣金陵旅夜一雨皇都萬象明東風嬌囀上林鶯火烟亭館春多少鐘鼓樓臺夜㡬更枕上故園蝴蝶夢枝頭斜月杜鵑聲銀牋欲寫長相憶滾滾江流不盡情過小孤山八月靈槎溯海門翠雲臺上醉芳樽峰頭樓閣相髙下水底魚龍自吐吞萬古青天留玉柱五更紅日湧金盆宦遊不盡登臨興欲洗蒼苔頌聖恩登翠雲臺一柱中流亦壯哉分明世上有蓬萊簾開廬阜層層出船汎岷山滾滾來夜冷神龍蟠水府天青仙珮下瑤臺閒將玉管吹明月勾引翩翩彩鳯迴遊匡廬山欲向匡廬觀瀑布便從彭蠡驟樓船一聲長嘯來丹壑千丈飛流下碧天洞裏樓臺無嵗月雲中鷄犬有神仙憑誰呼起巢松者醉擁宫袍對酒眠度大庾嶺鑿破鴻濛一竅通至今傳説九齡功天垂瘴雨蠻烟外路入炎荒火樹中萬里闗河瞻北極兩行旌斾過南雄鷓鴣聲裏端陽近榕樹青青荔子紅過峡山寺峽江江上峽山寺落日峰巒翠作堆雲擁半空樓殿出天然一幅畫圖開仙人採藥和光洞釋子翻經化樂臺顧我紅塵車馬客題詩無暇掃蒼苔登越王臺海上荒臺草樹平登臨不盡古人情白雲萬里懐親舎紅日中天望帝京百粤山川秋歴落山城樓閣晚峥嶸醉來徙倚欄干曲聴徹西風畫角聲浴日亭和蘇學士韻危亭突兀倚青山坐對扶桑碧海灣紫霧欲生龍伯廟洪濤先涌虎門闗光搖宇宙花生眼影動闌干酒上顔遥望蓬萊宫闕曉一輪飛挂碧雲間遊海珠寺何年神物抱珠遊遺向滄浪第一洲五色化成金世界六鼇擎出寳香樓光涵蛟室星辰動影落龍宫日月浮萬古團團天地裏磬聲敲出海門秋登廣城樓三尺龍泉事逺遊越王臺上望南州一天雨過千山曉萬里風來五月秋江郭樓臺蠻客市海門烟日蜑家舟臨戎不有安邊策應愧常何薦馬周謁金華寺六祖法堂坐閲人間㡬百年雙趺渾似後來禪空空明鏡臺前地寂寂紅塵境外天風動法林從虎過雲生咒鉢解龍眠至今月到層樓上應共祥光午夜圓兩宋名賢小集巻三百六十五
