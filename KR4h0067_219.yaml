body:
  text: 兩宋名賢小集卷二百十九宋陳思編元陳世隆補東萊集吕祖謙字伯恭尚書右丞好問之孫倉部郎大器之子上公文靖公夷簡居壽州至右丞從駕南渡始居金華祖謙登隆興元年進士復中博學宏詞科纍除直祕閣著作郎國史院編修卒有東萊太史集送宋子華通判長沙騷人故悲秋九辨播三楚宋公舊題壁文彩照潭府千載得君侯遙遙接華譜還當初秋天又進湖湘櫓當家多勝事此役可兼取江山日日新似若相勞苦木脫獻羣峰雲生失前浦况待别乘權光華動徒旅元戎下分庭百吏羣趨廡後車載仁風習習被南土預知潢池盜無復驚枹鼓正當勸賣劍不必禁挾弩入獻有訏謨論賞駢圭組臨分一杯酒不為離愁舉送丘宗卿博士出守嘉禾檇李國西門道里去天咫訟庭人摩肩客館舟銜尾涼燠變須臾風俗怵駭視心平理自見周道本如砥堂下萬休戚堂上一笑嚬是心苟不存對靣越與秦豚魚尚可孚况此能言民君看津頭栁葉葉皆相親奮髯疾抵几解衣徐探雛古來多快士氣吞兩輪朱簿書尚沒人迎筆風摧枯自許豐不豪歲晏終何如折肱稱良醫識病猶身傷開府事如麻豈盡昔所嘗平生老農圃易置復難忘麥黃要經雪橘黃要經霜城樓城峻先迎月簾踈不隔風棋聲傳下界雁影沒長空島嶼秋光裏樓臺海氣中登臨胡待晚雨外夕陽紅野步石梁俯清流苔髮胡可數茆簷春晝長寂寂亭隂午鳥啼花徑深風絮浩無主幽人不可覿棋聲時出户鞏采若府推母錢夫人挽章內助名推冠名成父子間中原遺俗盡舊族素風還石窖天開邑宫門日綴班光華竟何許夕照在西山王龜齡詹事挽章語老收聲盡佳城又到公蒼天那可問吾道竟成窮旌卷莆田雨簫橫霅浦風今年襟上淚三哭萬夫雄太史交旃際元戎卷甲秋先鳴驚衆寐孤憤厭羣咻羽翼新鴻鵠聲華舊斗牛斷橋無恙否落月照寒流魏元履國録挽章麻衣見天子拜疏不知休落落山林氣拳拳畎畝憂極知千載遇政用一身酬繞舍閩溪水朝宗日夜流羣公祖疏傳多士送陽城短棹非前約長亭及此行深留移白日緒語只蒼生會綺山陽賦鄰人笛未橫題歸庵雲壁開蒼峽風林捲翠濤諸松皆老大一嶂獨孤高發興雖公等尋逰許我曹秋光端可賦不是楚人騷王通直挽章近來南國塜半是北人墳異縣誰憐我同鄉又失君深居傳雅尚堅坐挹清芬日落長安第三槐拂暮雲興同館逰張氏園分韻得日字出日厭囂塵入門倦占畢駕言城北園滯思頓消釋方池環修篁廣陌衛行栗先雪梅已苞後霜草猶拙上躋極高明旁穿復深密主人真喜事秀句屢盈帙招呼文字飲及此三餘日山林與鐘鼎零茂本非匹斯逰豈偶然書板記甲乙寄章冠之章侯平生一詩囊酬風酢月遍四方浩歌姑熟酒淋浪醉呼太白同舉觴遂登浮玉臨渺茫江濤挾筆益怒張沙頭倚檣樂未央興闌忽上秋浦航門前槐花日夜黃閉門琢詩聲繞梁白袍紛紛渠自忙飄然邂逅非所望自言久厭世鎖韁合眼已夢廬山蒼君材甚碩氣方剛身雖欲隱文則彰江湖故人半朝行左推右挽摩天翔而我戢翼甘催藏不能與俗相迎將徑當行前掃山房俟君功成還故鄉却駕柴車迎路傍送柳嚴州解官趨朝一葉初秋已趣裝璽書頻下駐歸艎少留北闕三年最多借西州半歲強身外寵榮元自薄眼前凋瘵故難忘書囊知有朝天草豈是中和樂職章蘇仁仲計議挽章幽棲略具便休官帝遣蒲輪喚不還大似文元居道院又如白傳過香山夢回帷幄青冥上醉墜風波浩蕩間向使胸中有勞辱那能八十鬢毛斑登門疇昔奉從容婺越之間一水通今日江東無賀老去年牀下拜龎公舊來議論多遺落新出傳聞或異同已矣從誰判真贋汗青連屋未施功向運使挽章戟衣翻户映庭槐使節州符未展才文獻定知丞相似淵源還自洛陽來異端惑世深於蠱古學違時冷若灰從此湖人識喪禮凛然治命手親裁何茂恭母王夫人挽章南陽人物盛諸何壽母皤然樂事多堂下無憂萱弄色天邉有信桂交柯黃金籝滿經方重白玉樓成恨未磨空誦安仁舊時賦版輿零落故山阿次韻葉丞相陳尚書逰南園樂事良辰古所難三分春色一分寬潤花雨過紅裙濕倚竹風斜翠袖寒自有南堂誰舉白可無東絹為施丹兩翁醉墨曾題品便作平泉草木看送喻叔竒通判會稽鳴騶前日餞出使推鼓今日送作州會稽别駕官尚薄道傍羡者何其稠版輿有親餘九十東南之美供甘柔先春鑄芽入午啜破臘箭茁充晨羞况復詩壇執牛耳所至風月相獻酬千巗萬壑遍題品會有采者人名遒賀車駕幸祕書省麟臺高柳識雕輿共記中興幸省初黃道再傳天子蹕青編重入史臣書需雲下際君恩盛晨露高張樂節舒若寫鴻猷參大雅定非周鼓頌畋漁紫清丹極與天鄰闔闢乾坤繫笑嚬獨為斯文回一顧坐令吾道重千鈞先生舊物參差見列聖明謨次第陳墨客區區感榮遇豈知深意在彛倫西興道中鳬鶩迎船似有情隨波故起緑粼粼野花照水開無主誰信春歸已兩旬桑麻張主不知春常恐鶯花太斷魂東岸紅霞西岸柳却將影色為平分春日短短菰蒲緑未齊汀洲水暖雁行低柳隂小艇無人管自送流花下别溪一川曉色鷺分去兩岸煙光鶯喚來徑欲卜居從釣叟垂楊缺處竹門開簷鐸無聲鳥語稀徑深鐘梵出花遲日長遍繞溪南寺未信東風屬酒旗曉春風絮流花一任渠北窗高臥緑隂初閉門春色間中老為謝平生董仲舒逰絲遊絲浩蕩醉春光倚賴微風故故長幾度鶯聲留欲住又隨飛絮過東牆祭酒芮公既殁四年門人吕某始以詩哭之少年把筆逐班揚咳唾珠璣落四方歲晚寒忩渾忘却瓦爐香細雨聲長聞人有善已伸眉倒廪傾囷更不疑菶菶萋萋竟何許卷阿空老鳯凰枝先生墓木已成圍弟子摧頺晝掩扉大雪繁霜心境寂有時清夢尚摳衣送朱叔賜赴閩中幕府止戈堂上履聲間飛蓋相追杳靄間君到定知難入眼倚天灊霍是家山路逄十客九青襟半是同窗舊弟兄最憶市橋燈火靜巷南巷北讀書聲題劉氏緑映亭涼葉翻翻不受塵芒鞋藤杖及清晨開忩小放前溪入澄緑光中獨岸巾鷺浴魚跳石鏡屏搖青浮碧太鮮明牆東種得隂成幄隔葉看來覺有情夜宿浦城魚梁徐刪定子出示林謙之挽其父二詩時謙之方按刑廣東有懷次韻五年不説空山雨今夜魚梁著釣船為問故人今健否桄榔葉暗瘴江邉何叔京挽章傾蓋黃亭夜翛然淵壑姿倚天惟直幹到地絶傍枝亹亹今何許悠悠只自知寒碑卧風雨千載有深期咏杏花江梅已過杏花初尚怯春寒看蘂踈待得重來幾枝在半隨蝴蝶半蜂鬚恭和御製秋日幸祕書省近體詩麟閣龍旗日月長中興再見赭袍光仰觀焜耀人文盛始識扶持德意長功利從今卑管晏浮華自昔陋盧王願將實學酬天造敢效明河織女襄挽汪端明異時憂世士歎息恨才難每見公身健猶今我意寬雕零竟何極合復豈無端此理終難解天風大隧寒四海膺門峻親承二紀中論交由父祖受學自兒童山嶽千尋上江湖萬折東微言藏肺腑欲吐與誰同挽蕭祭酒摩揣誠斯薄雕鐫質亦消平生但真朴直上絶枝條氛霧終澄霽丘山亦動搖朝陽舊時鳯聲入舞簫韶兩宋名賢小集卷二百十九
