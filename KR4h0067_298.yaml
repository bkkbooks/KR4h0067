body:
  text: 兩宋名賢小集卷二百九十八宋陳思編元陳世隆補竹莊小稿胡仲參字希道清源人負才遊京師所與交俱一時知名士嘉定間赴試不售浪迹數年終蹇遇合乃寄情山水以自放詩有竹莊小稿一卷宫怨淚粉羞臨寶鑑前淡糚爭似舊嬋娟一言曽忤君王意間在長門十九年寄竹院方丈孚師江湖嵗月易消磨振錫歸來鬢欲皤性懶吟編多散逸門間俗客少經過虛簷破處懸蛛網落葉空中見鳥窠一片師心誰會得半窗竹影緑婆娑郊行暮歸吟罷歸來興欲狂重城半掩傍昏黃鐘聲搖動山靈答月魄未髙人影長竹葉淺斟杯量窄桂花滿插帽簷香不妨竟日酬心賞才到明朝事又忙偶得欲問梅花信山寒去未能靜思天外句坐對夜深燈戒酒頻添衲煎茶旋鑿氷月殘霜又落無復叩門僧醜婦吟君不見漢殿丹青未漫滅馬上琵琶向誰説又不見華清舞破霓裳衣凌波竟墮嵬山血從來艷色多纍身妾貌雖醜心自悅幽閨到老無人知白髮如絲鏡如鐵晚雨勃姑鴉舅呌樓西春色隂晴景不齊濃墨四垂收未起湖邊一片夕陽低端午千年流水去滔滔此日人來弔汨羅江上畫船無買處閉門風雨讀離騷山中作村居便野性况復是清秋為愛山間好因成旬日留林深喧鳥雀露重滴松楸昨夜新寒入篝燈覆敝裘入京第一程六載館杭州重來訪舊遊山中才過雨客裏又驚秋嵐氣蒸衣濕泉聲激石流功名苦行役羞見渡驚鷗道中早發未曉催行色微吟獨據鞍露垂星影濕月淡水光寒犬吠知村近雞鳴覺夜殘親闈在何許誰念客衣單秋晚泛湖載酒湖邊買小舟水光山色解人愁短籬寂寂菊花晚兩岸蕭蕭楊桞秋落日波間收戲鼓暮煙林外出歌樓倚闌長嘯西風裏驚起前汀雙白鷗試後書懷踏遍天涯路春三秋又三文章與時背言語對人慙湖海氣何餒山林分未甘間僧時過我揮麈共元談夜坐偶成一字吟難穩沉沉夜向闌燈明妨短夢衣薄犯新寒千里家山逺三年客路難明朝有佳便尺紙報平安送諸葛春卿還里扁舟分袂出湖濵我向吳中君向閩自笑吟身猶是客却來逺道送行人家山會友慿傳語旅舍逢詩為拂塵天北天南相憶處梅花毋惜一枝春得家書手剝鱗緘細細看北堂垂白喜平安為憐客裏多霜雪寄得衣來正及寒雪晴泛湖雪後湖清淺令人心眼開林疏知寺近氷合礙舟回寒色欺吟鬢斜陽入酒杯山行已清絶况復是尋梅春晚見山茶花一枝獨開荼䕷開盡見山茶血色嬌春帶雨斜莫是今年逢閏月東風吹到背時花山中口占三首四野平田春水肥前山隱隱帶殘暉千林晚色無人共時有樵翁獨自歸躑躅花開野色濃和風甘雨卧叢叢城中只買零枝看那似山頭滿樹紅飯罷呼僮旋煮茶碁枰詩卷小生涯從今厭踏紅塵路多在山間少在家夜坐即事午夜空庭寂心間坐亦忘竹間風動靜雲裏月行藏驚鵲出幽樹寒螿語廢廊甌茶聊當酒清氣入詩腸題墨梅竹洗盡丹青料清髙絶點埃數竿無韻竹一樹不香梅與可今已矣補之安在哉千年好風致喚上筆頭來聽雨聽盡燈前細雨聲聲聲總是别離情何時斷得間煩惱一任芭蕉滴到明夜坐與伯氏葦航對牀閲江湖詩偶成一首對牀因話弟兄情話到山林世念輕几上江湖詩一卷窗前燈火夜三更茶經未展神先爽香片才燒味較清吟罷忽聞樵角動石橋霜曉有人行薄暮薄暮抱幽獨無言倚小樓日沉千樹晚風起一天秋警枕團新夢寒衣帶舊愁秪因吟太苦餘病未全瘳山行石磴手難攀林深去復還人行啼鳥外僧住白雲間野興平秋水吟魂繞暮山馬頭風作惡潘鬢任闌珊月夜聽琴效漁父辭風入古松成節奏泉奔幽磴響琮琤琴中彈意不彈聲猛拂朱絃燈熖落細敲玉版夢魂清啼烏枝上月三更寒中偶題煙對紅爐暖香凝繡被溫老天有秋意寒不到朱門枕上得句寄潛君升無奈蓬窗雪打聲夢魂才穩又還驚枕衾如許猶嫌冷多少閭閻睡不成留宿陳氏書齋因訪吟朋到竹居春寒䇿䇿動窗虛幾畨好雨偏留客一盞清燈共讀書徐孺舊曽親下榻陳遵見説好投車與君靜夜評心事萬斛間愁盡掃除遊白后山觀音寺緑隂深處石橋橫才入山門意便清林下一僧無箇事時來倚樹聽泉聲與生上人久住深山裏相忘物外形逢人出好語入定掩殘經古字碑成軸名詩榜作屛欲知祖師意柏樹在中庭雨中愁坐黃昏掩客扉風翻霜葉滿庭飛孤燈挑到寒更盡猶有行人帶雨歸讀嶽鄂王行實飛鵠來何意英雄此日生山河張膽氣宇宙載風聲一片堂中紙千年身後名至今墳上水猶作不平鳴和林梅􅋯西淙瀑布圖韻瀑駛驚風雨危懸峭壁前臨流清客耳入夜攪幽眠旁是龍為廟髙疑山有仙一塵飛不到長似九秋天喜郭希范自上庠歸馬蹄明日是君家千里歸來傍節華幾夜深閨寒寂寂有人和淚卜燈花用伯氏韻東梅􅋯榾柮爐前坐夜深寒侵窗户月西沉冥搜天地無窮趣寫盡江湖一片心霜葉落邊添客思梅花瘦處動髙吟訪居欲問推敲訣擬把清樽共細斟東竹院孚老别來旬日許又過一分春因感塵中事空慚物外人吟清便境靜語苦見情真近况知何似篇詩得細論送梅􅋯還三山十年湖海上此日值梅兄一見才傾蓋相逢又問程新編聨盡卷清話入詩評從此雲山别因風時寄聲題雪舟雲心二友吟卷君詩何所似絶似晚唐詩寫出春雲狀融成白雪詞百篇多態度二妙一襟期與我為三友他年題品誰清明杯酒濃澆壠上春東風吹起紙灰塵可堪腸斷中原路草掩荒丘不見人寄黃雲心竹屋少行迹閉門春晝長天時半晴濕人意共炎涼苔蘚侵階緑荼䕷壓架香冥搜尋杖屨不為看花忙采桑女葉滿筐箱花滿簮低頭微笑出桑隂後來若有秋胡子説與黃金必動心過永春縣距城才百里世路更難平碣石唐人墓桃源晉地名危譙依嶽勢荒市帶溪聲往日罹兵火頽垣蔓草生墟田墟田依澗水入夏未栽禾不是春耕晚山中寒氣多閨中詞寫就相思字燈前帶淚看欲緘還未忍少待淚痕乾聽盡芭蕉雨愁人夜不眠慿誰將此意為妾到郎邊早發早發六七里前途曙未分漁舟依岸立水碓隔溪聞獨樹支殘月空山半白雲清晨那可駐日出又如焚無題露重濕征衣風急翻紗帽山下灌園人倚鋤看馬過過界首幾重嶺隔幾重灣路入濛濛煙雨間獨立溪橋重回首前頭已是劍州山思家夜夢到山居回頭千里餘屢傳歸去信不得寄來書小徑應添笋荒畦欠理蔬客程頻得雨田里事何如漁梁嶺禹廟古今陳迹幾興亡閩嶺何因祀夏王莫是當年平水日曽驅魚鱉渡漁梁陵上釣臺後身為功名役因思隱者賢只行山後路羞過釣臺前西湖會上和趙靖軒韻不著人間半點愁每於勝處一憑樓吟邊只欠林和靖坐上追思馬少遊暈臉芙蕖酣薄暮低眉楊栁拂新秋酒闌拍掌狂歌舞自是忘機可狎鷗秋意梧葉飄殘客夢驚擁衾危坐到天明片心除是眉頭識萬感都從念腳生江上鱸肥銷旅况樓前鴈過帶邊聲挑燈無語間商略謀國謀家底計成還趙靖軒冷卷借得君詩在案頭篝燈夜夜看銀鈎苦吟暗數秋更盡何處笛聲人倚樓重陽漫浪江湖已十霜一秋強半又重陽可憐白日渾間度偶對黃花覺自傷客舍題詩書感遇市樓沽酒慰凄涼登髙不為酬心賞直欲憑闌望故鄉夜來聞曽性之丘君就二友隔樓吟聲不絶以詩柬之月下歸來深閉門衾寒時倩博山溫隔樓忽聽吟聲苦引得清愁入夢魂問性之病莫向推敲苦用心聞君病裏亦沉吟書燈挑盡無人共藥鼎煎殘到夜深霜後菊花方寂寂臘前梅事又駸駸相看咫尺如千里幾度逢人問信音過千頃寺訪谷隱老别久交情淡重來似舊時人生雲聚散世事月盈虧茶具權行酒禪牀借看詩漫天多雪意預約探梅期性之尋梅歸來有詩因感一絶處士廬前門徑深僅留佳句與人吟孤山近日無行路踈影暗香何處尋枕上偶成客樓蕭索抱愁眠雁過聲聲到枕邊念腳動如魚撥剌吟身寒似鷺聨拳匣中幸有劉琨劍囊裏猶餘老杜錢忽憶西山山下路夜深霜露滴松阡夾河中有矮道人自住小舟持咒為生人莫不異之者道人神貌方雙鬢欲垂肩坐席容三尺浮家住一船餋生慿拂果持鉢信人緣早泊稿梁下蓬頭起白煙寄懶庵天寒日短道路長白雲飛處知吾鄉大江之東渭之北念我故人何可忘别來楊栁眷依依只今開到梅花香扁舟漫浪歸未得京塵海裏安行藏身名未立仰天笑牀頭夜夜鳴千將音鏘羡師物外無寵辱庭前柏樹常蒼蒼音書鱗羽久不到幾千里外空相望五雲前墜滿室光報師之意無以將篇詩濃墨才淋浪一聲鴈過天際翔偶得挑燈伴寒夜兀坐竹罏邊赤腳知吟苦時將山茗煎和性之見寄韻窗燭銷殘轉寂寥柴門無復野僧敲偶來枕上吟詩就記向心頭欠筆抄鳴竹數聲疑雪片尋梅清夢到山坳世情雲雨多翻覆誰是江湖耐久交遊山中世途平處起波瀾輸與髙僧占好山竹塵直為揮俗具槿籬虛設掩塵關林泉有分酬清供瓶錫無人伴此間擺脫名韁須早計半生猶得住雲間寒夜作生計尚茫茫微吟思故鄉羈愁消不盡寒夜未為長門掩梅花月禽翻竹葉霜挑燈裁錦字明發有歸航讀秦記萬雉雲邊萬馬屯築來直欲障飛塵誰知斬木為干者只是長城裏面人雪凝雲商作雪頃刻滿天涯片片疏還密霏霏整復斜映窗疑月影著地似楊花四望渾同色微茫認點鴉用馮深居韻題莆陽章氏環翠樓百尺危梯渺海寰闌干十二盡青山煙光濃淡藏多景野水周遭匝四環勝地只宜騷客住老天未放主人間慿誰説與九仙道方丈移來在此間書懷呈曽性之覽鏡歎頭顱梅花一樣􅋯病因吟後有愁到醉邊無心事歸梁燕年華過隙駒世途難著腳况復是江湖和伯氏春雨中韻癡寒脈脈壓晴莎春漸三分景未和待得濃隂收拾後花邊春色已無多兩隄楊栁拂新亭怪底遊人懶踏青手撚梨花成小立半窗湖水雨冥冥寄梅􅋯别去忽經旬春風閲二分幾畨吟對雨獨自暗思君客裏加頻病愁邊駭近聞倚闌商不得心自亂於雲和伯氏包山觀桃花韻因訪桃花到嶺根御林春色此平分千株未數栽唐觀一幅猶堪畫晉源仙在雲門無處覔人行風外有香聞笙簫隱隱宫城隔立盡黃昏更斷魂蕭山望城中遺見説天文變頻占太史臺但云星犯月不料火為災盡夜看煙滅逢人問訊來丹心勤戀闕東向極裴回兩宋名賢小集卷二百九十八
