body:
  text: 兩宋名賢小集巻二百八十八宋陳思編元陳世隆補雲泉詩蕩頂重逰鴈山分得六題髙平餘十里湖湗落中間此地可耕鑿長年迷草菅一庵猶有路四望忽無山道者了經課慰余登陟艱龍鼻水怪極生真想飢㓙禱請勤半身鱗甲具一勺𣺌瀰分應谷聲如鬼飛空石碍雲精誠隨寓在亦以感通聞天聦洞天聽本非耳形容獨費吟豈伊穿鑿力能探杳冥心混沌開中竅空虚納衆音下臨千仭儉當暑骨毛森水簾谷石壁斧修痕風泉斷續聞琉璃光閃日空洞濕飛雲妙出神功造源從湫底分誰能為鈎起深處謁龍君照膽潭彼我俱澄澈中涵理趣深㳺鯈具龍體幽洞通潭心影動猿揺樹沙明日耀金片巖經霹靂痕鑿到於今五老峯巖前看不足化此石為身憶昔白頭者於中第幾人相逢應失笑乆立豈迷津勿厭薜蘿宻癡容免俗嗔哭瓢飲陳子在案頭螢火㪚惆悵夜吟魂路暗重泉逈堂空半影存命無藜藿冨書獨鬼神尊猿寉聲聲怨愁人不可言蟬蜕塵埃外閒身樂未涯山林天豈靳修短數難移吟硯誰濡墨空瓢想桂枝深衣古賢貌猶覬夢來時每恨去城逺畨畨語别難論交置䟽數盡醉就團欒事徃遽成感松彫不待寒尚餘親翰墨収淚再三看寢食難忘置心懷故友情花枝封蠟寄詩遞出門迎忍聽偏親哭相期嗣子成乗除理終定人事未容輕月海逺上人逰方過靈隐一㸃靈光在月生滄海深此中難着語何處可相尋野寺齋無定窮冬日易隂聽松行九里却坐冷泉吟漁村雜句十首莫論塵土與煙霞収拾襟懐即我家絮􅀈蒙頭霜月下水村深夜看梅花非智非愚浪着鞭前程倒指事茫然臨流一洗巢由耳獨立斜陽認釣船盡醉茅柴得自由蘆花飛雪滿人頭蓑衣碎葉重重補聽雨吟風卒未休青山如主復如賓相對無言意自真富貴不應忘此味從來世上少閒人月下門開不用敲渡頭長繫木蘭橈盤飱市逺從真率㑹宿何妨屢卜霄澤畔行行歌楚騷一襟忠憤付湘濤難教舉世無醒者莫羡漁翁活計高三五人家住一灣近城無路去來難溪邉自結同吟友松栢青青到歳寒野水㣲茫路欲迷重重沙渚自髙低鷺鷥飛過無心泊直入殘陽樹杪棲猿寉何曽肯受羈偶來亭畔立多時物情未到忘機地歩歩行行只是疑白雲相頋尚依依十載江湖負宿知時事未容輕所學山中依舊只吟詩普覺院登上人房老梅擅名滋乆昔四靈與其先師道公方公逰賦詠盈紙距今三世矣余每至其所輙徘徊不忍去登亦對坐不倦有前軰之風槐逕弟拉同逰者賦詩因用其韻俾登藏之庶不愧昔日爾年年心與雪霜期一㸃寒生古樹枝昨夜故人相問訊隔牕無月坐移時四靈歿後誰知已惟有清香滿舊枝頭白山僧猶愛客為曽親見老師時感興簟瓢吾道在此樂語人難遺却形骸累始知天地寛逺山不辨樹髙屋易生寒數夜雪風急編蘆壁未完新年換桃符桃符頻換句維新休對春風訴舊貧近日兒童談道學幾時徴詔及閒人山田収薄官輸在樹雪吹殘曙色真慨昔巢由老巖穴終身擊壤作堯民漁村雜句十首再和前韻晴空萬里㪚餘霞一葉漁舟稳似家學道未能全寡欲水邉隙地亦栽花蘭菊分畦筍作鞭南山相對意悠然城中有路何曽入只許蒼頭趂釣船此身閒却有來由白髪中年已上頭莫道無官無可弃從今放下一齊休獨作漁樵最上賔土風淳朴物情真鮑家兄弟皆和樂林子詩豪膽壓人林鮑皆漁村鄰舍巡簷修竹晚風敲古寺僧歸月下撓童子閉門無一事只須清坐過中宵㣲吟朗詠足風騷切莫危言試怒濤雲本無心泉自潔不因作意立名髙生涯小小落溪灣妻子知時不説難畢竟直鈎為計拙晚來無酒可銷寒暝色和煙四望迷仰眠牛背覺天低村翁遥指笙歌處此地魚沉鳥不栖雉入樊籠馬受覊低頭猶怕欠趨時人心到此無真識未必人疑先自疑歳寒無物可相依惟有梅花似故知名世何曽在科甲西湖處士只吟詩春晴泛湖平湖新漲緑沙觜浄涵波芳草思無際春風情最多移舟動山影止樂聽魚歌得意唯鴻鵠髙飛避網羅呈井南劉主簿何處井南居青山遶屋廬竹生從礙路泉響不驚魚有道貌亦古淡交情似踈慈親更彌壽堂上歩徐徐春半春半數風雨水村増曉寒不辭蓑笠重自覺起居安隔霧山疑失占晴礎未乾可憐桃與李無語受摧殘太古元西堂過萬壽謁位山肇淮海禪師并簡老子舊知已江湖獨爾思此行逢作者送别若為辭風雨過春半詩書滯海涯心心倘相印亦足慰衰遲憶汪氏山亭舊逰并簡因山為址屋無多中有幽人衣薜蘿自擷溪毛充野腹頻敲牛角和漁歌舟車相過情難數姓氏長留石可磨遥想對牀風雨際一燈終夜照吟哦古淡然老得帖徃長蘆不受却歸松風舊寺次社中韻拄杖挑雲上半肩尋幽重到舊栖禪浮生多故成南北白髪相驚開歲年房閉松聲難辨雨山連海脉暗通泉自從勇却長蘆請猿寉終宵亦稳眠佺上人逰方燕鴻來去盡蕭索此時心杖錫投何寺風霜别故林夜牀煨葉火朝谷應樵音徃徃長松下看山坐獨吟送宋飲冰過四明郡齋元戎招士重親臨喜遂詩書萬里心乍免客愁供帳具暫停逰事㦸門深秋空矯首瞻魁彩夜燭慿花聽鴈音從此文名滄海濶好風三日到鷄林憶昔曽登太白巔閒雲留我石林眠集詩刪失顯猶記人事乖違嵗屢遷極羡故交㳺汗漫不禁離思對嬋娟山中乏致兼金餽形迹相忘二十年松風隆首座住雲際禪院山門開望海鐘鼔動魚龍人具慈悲相秋生寂寞容隨身唯一鉢留偈别雙松後夜橋西月支笻失所從入京逢故人長貧復羈旅共爽十年歡在世誰無累如君事獨難僦居隣火後多病卧春殘縱决歸山計煙蘿不療寒下第歸故園扁舟搖蕩水心村幾度煙波入夢魂猿鶴認名聽號令樵漁執禮叙寒温浮生多事景逾促自古求人道不尊莫為窮途妨曠達定應束帛賁丘園山中依然木石居造物任乗除時事今休問山中計不疎泉聲増雨後禽語變春初吟得詩名世終身甘荷鋤山居十首深澗㳺羣魚髙樹鳴幽禽山中白日長同此逍遥心脱粳香可炊濁酒聊自斟過兹非所求孰為升與沉隂􅊤生暮寒白雲如炊烟麋鹿不識人時復近吾前青松三四株石牀在其邉意思清且閒可以終餘年名利能移人智者為之愚厯觀古英䧺鮮或全其軀幸逃世網牽園綺真吾徒勿令千載下嘆惜斯人無前村雨脚収斜陽掛髙樹老翁牽牛歸頗亦有幽趣山風響茅屋崖月導芒屨平生江湖心於此謝馳騖龍居洞雲深飛泉㵼石壁不聞耳邉喧但覺心境寂冨貴由他人得失俱抱戚孰能全其天山中樗與櫟午睡不覺長童子入城迴地爐㪚㣲煙煨芋已成灰獨酌無佳賓梅花為吾開須臾山月髙頋影空徘徊木落山轉空景駛寒亦早百草無愠容低頭就枯槁形生腹形化安用置懐抱千古丘跖分所論非壽夭古調今誰彈至樂非外假淵明愛無絃此意知者寡放鶴未歸來時倚長松下旁親彼何人笑我衣裳野老妻倦縫紉痴兒厭藜藿一貧誰復言多累吾已錯山半雲可耕山下泉可鑿軒冕亦倘來豈得長如昨柴門長日關不碍溪水流桃花樹難尋悵望迴輕舟雖無武陵原事與昔人侔已矣勿復言白首安吾丘亷村薛庭芝訴貧於余余亦貧不能周之贈以是詩兩窮相值愁無計同是開元補闕孫百世清風於此在莫將貧悴對人言素上人逰方山深不可見一錫又雲飛梵澤通方語林霜㸃衲衣神閒生境寂思苦入吟㣲寒月空相照何人夜扣扉送蓑衣與陳子淵漫成口號莎草為衣葉葉新已知難上貴官身野人相贈無他意從使心親迹更親自君之出矣三首自君之出矣淚對花枝洒風牎挑夜燈心在無油㵼自君之出矣荏苒度寒燠譬彼雙鯉魚書辭長在腹自君之出矣抱此離恨情春蠶不作絲纒綿過一生松風閣越僧一書記索賦二絶何處笙簫起半空滿山斜日動蛟龍老僧無語凭欄乆過盡白雲千萬重月泉月色泉聲境自真有身終不惹埃塵山中受用祗如此住者知為澹泊人為鄭菊山賦斗室居然真樂地跬歩亦徜徉大噐何曽局修程未易量中天應躔象吾道即宫墻萬斛泉源在非徒志秕糠松阜弟於寶成寺祖墓之側營剏别業為賦得閒亭詩取又得浮生半日閒之句陟巘心已清復此風雨蔽髙人疏鑿餘理道頗超詣卜築諧素志緇侶欣共濟修竹尚無恙巢鶴亦數世空山嵐欲滴近水石可憇春睡朝旭升夜語孤燭繼髙扁出林麓先壠記苗裔嚴鐘警晨昏羣岫羅扈衛身同野鹿逰跡許巢父嫓蝸角自為雄蟻磨卒至斃靡懐半日羡詎識終老計吾廬並漁村興徃輙鼓枻野衣裁芰荷敗屋粘薜荔川陸阻㑹靣歲月迅流逝茲情不可忘淡交慎勿替及時畢婚嫁即事無芥蔕相從丘􅊤真永使心迹契泉石聞斯言庻以當盟誓項大著挽詩恥為恩門屈寧辭御史遷力陳歸老䟽自盡讀書年秘府神逰地浮榮夢覺前世間真不死未必屬蒼天劉荆山歸自維揚新榮漁屋退居漫道歸來晚閒中日最長漁翁尊齒序容子效戎裝野水涵秋霽風荷動夕陽十年畢婚嫁亦勝為人忙定菴逺山主修持功行滿不堕刼中塵龍象西天邃杉松夘塔新臘髙同軰盡歛簿小師貧生㓕理無二交深獨愴神哭槐逕弟孤僻由天性看山獨展眉豈無身後慮猶課病中詩泉石寧非祟蒼旻不可知平生唯愛菊増我九秋悲林氏梅巖古意元從澹泊來雲根香雪㸃磯苔静觀造化春長在不是氷霜凍得開半影落池涵潔白一峯無路接塵埃逋仙家世君端的只恐清吟未易陪王九山挽詩古史無完傳清風獨可模從誰問出處舉世比泥塗氣直於時忤身榮與道俱士林為重惜揮淚奠生芻修行過衲子蔬飲幾昏晨自草休官疏猶嫌在世身片雲先塚近寒月萬松鄰為鬼還應别平生有善因俗論鄙迂儒公胡獨受欺焦桐方入調夜鵲忽驚枝心事將誰許身名負已知九原如可作白首誓為期逢舊友生交逰半零落身在復長貧對語寒燈盡相看白髮新兵興無樂土市近少閒人遥憶桃源路鳥啼花自春和清溪可居壁問韻松風相對掩重關何止浮生半日閒此是仙家真境界蓬萊猶在有無間日日虚廊歩百迴吟邉時有可人來西湖處士詩名世老向孤山亦為梅林景雲令祖夫妻隨其子各居同日𦵏真誥巖前舊築居夫妻雙化是仙期至今耕隴桑麻地全似桃源晋宋時窀穸同晨符吉卜親朋分夜别靈帷詩書孫子名方盛錦誥重恩日未遲康氏端齋於焉能取友人已兩無偏立行有如此前修宜比肩吟情近風雅胷次着林泉愧吾全迂僻交逰又十年陳子淵台州添倅髙志愛官閒來從玉筍班離家買湖石開印對中山風月添新句朋逰記舊顔桃花元有約猥賤未能扳潘氏梅所種梅營數椽四壁但蕭然清帯山林氣香來筆硯邉雲深天向晚人立鶴趨前余亦歲寒者相從恰暮年近買山范灣自營藏地與亡弟草塘君及外家墓塋悉可跂望感事述情繼有是作因縁還是范灣邉乾巽峯髙四應全千古青山逢具眼數莖秋鬢近衰年倒騎黄犢循來路貪看行龍下逺田慙愧鄰翁為指説傳聞此地産英賢外家後事凄凉甚老婦思親哭最哀今日青山苗吾在他年寒食望甥來極知造物成吾志可但精靈慰夜臺惆悵昔時原上路獨餘宿草見春回草塘相望隔重雲愧吾為兄蚤哭君少日對吟聽夜雨老來無計撫孤墳泉臺冥漠唯増感人事安排已十分莫待他年推吉應如今友愛最先聞敢慕昔賢居曠達分甘吟骨寄山阿劉伶常備隨身鍤陶令曽為自挽歌未必浮生於此悟筭來忙處為人多北邙原上堪回首莫枉心情用太過十萬買山渾可事放教身死骨猶香不知筋力何年盡看到杉松幾尺長管郭豈能謀冨貴詩書元是著興亡采薇歌在無人識千載清風獨首陽分明來日已無幾還似叅禪未透時吟骨縱清難免死黄精多啖亦充飢題詩遣得山精去近俗偏將古墓夷合眼便為泉下鬼此身康濟莫冝遲大有公卿弗似吾一枝藤上挂胡蘆旋疏苔石通崖溜自祝山神保鶴雛休羡銘旗題極品試將槐樹植三株依然此事慿隂德從古幽明理不殊贏得青山終老看閒身受用不須多風霜落木時將暮功業無心鏡懶磨道士共聨石鼎句村童能和草庵歌盖棺一事安排了肯信光隂去似梭山中百事且休聞也莫參禪莫錬神纒樹古藤無了日隨風亂葉豈由身閒來景物吟方到静處工夫識始真想得大槐宫裏夢日髙猶有未醒人依然且作住庵看茆屋三間辨不難户外莫容千駟馬客牀唯置兩蒲團深林藏虎風長怒短木支門睡自安西北干戈猶未已偶逢樂土度衰殘髙新甫雲崖歩歩危機死不知白雲深處最平夷猿啼鶴唳非無意纔近髙人便入詩悼薜君載衣被唯綀褐長閒未覺貧將何折君壽不盡百年身竹樹多於屋禽魚近得人生無世情戀寧復怨蒼旻石牕通上人南逰并謁劉後村所師郊與島知巳又應難羽檄邉烽急風霜歳事殘出家忘路逺度海識天寛文暢浮屠者當時亦慕韓君成弟清溪孺子歌猶在滄浪可濯纓流來如玉㓗止處似心平魚避飛鳬影荷添落雨聲詩書源更逺千古嫓交情哭中師雪崕衆裡知心少唯師是故人臨終書未荅昨夜夢全真鶴唳渾如哭花開不似春近逢同住者得問病元因霽雪亭千樹玉成林逺香清可尋幾疑安道在直得老逋吟逈與春風異唯冝盡日隂塵中無此景羡爾弃華簮方氏墓廬扁曰白雲飛處諸峰互隠蔽一望一増悲觸目易成感思親無盡時松扉隂似雨翁仲立如癡出岫亦何意悠然自不知漁村偶顯莫道柴門窄斷無車馬聲苦吟成集少乆病見人生花落寒猶在春隂雨未成漁村名自我鷗鷺勿相輕唐補闕清風亭去國遺忠藎朝盤托諷深因知潔巳意亦是愛君心貌像意全古子孫貧至今清風如可繼媿土巳埋沉寄珂雪屋積雪覆茅屋僧居清更清浮生千刼盡長日一燈明野鳥呼能下山靈避不行舊時江月住時聽誦經聲賦山雲姪偶耡取谷雨晴時偶自耡句扶犂人所賤何苦事耕耘生意未終息雨聲曽厭聞詩書長在手畚鍤豈勞君秪恐青雲上能將此志分還甘泉沈氏詩巻之人吾畏友相望水東西筆下山林趣詩中五十題讀書長閉户自奉只羹藜名字他年出雙松應共齊萬象亭年年此地駐吟鞍十萬人家指掌寛天上星辰依舊逺山中松桂不知寒月生滄海一輪静雲泊䦨干片影殘見説亭基從古在擬將圖志試尋看朱氏雲􅊤舒巻悠悠付太空居然丘壑共胷中人生知已終難必世上無心自不同片石若浮龍在水逺峯欲露樹吟風羡君隠處有如此想見詩成字字工本無師與槐逕弟交逰二十年矣古人謂百篇詩盡和一盞酒須分余於二公亦云槐逕既歿本無編其徃來之詩號曰雲林酬唱僣述鄙句奉呈中年為此别悲動故交情案上林雲巻山中風木聲夢回驚復喜詩在死如生幾畨西交路逢師獨自行宣氏梅邉自入孤山詠梅花最識詩喜逢吟苦友共此歲寒期曙色雪初霽暗香春未知前村風景别秪是愛茅茨畊樂躬畊樂道真吾事三聘看來未是榮時尚可為君更悟何妨藜藿度殘生王民山惠詩民山名字出朋軰獨推先不奉寒暄問於今四十年傳來詩似錦倐去歩如仙自古山林士無營貌亦賢漁村即事維舟古渡頭四望是汀洲水濶唯冝夏荷枯不礙秋困歸牛背稳曉汲井雲浮獨坐愁無似多畨為月留潘氏可軒可人居此地稱此可軒名力學倘無倦終身集大成言辭寓深淺權度要分明體認工夫到何妨緩作程青藜閣為林景雲賦九斗峯前太乙臨星辰亦鍳此時心樓髙不礙光芒入坐乆忽驚風露深千古聖賢書裡見吾身學問性中尋夜窗勤苦追先哲名字何分昔與今追惜永嘉前政知縣趙大猷時景定改元興言民父恩猶在何故年來盡不如清節苦於為士日歸裝輕似到官初月明徃事尋思遍燈下懐人音問疎矯首天朝除目到放教田里得安居髙氏石雲取賈島移石動雲根句閬仙曽得句月下自推敲以此幽閒趣長為淡泊交水寒梅照影霜滑鳥歸巢余亦同懐者從君結把茅清醒獨懐忠憤赴湘中舉國昏昏志不同漁父笑君君亦笑烟波相望各東西囊螢山中不羡青藜貴清夢何曽到石渠裁得練嚢連夜喜兒童也學裹衣裙殘星數㸃照科斗此事分明屬後生記得年時頭未雪夜牕不覺又三更謝松岡姪惠詩韋布名猶盛詩書不負人每過臨水宅長想釣魚身思苦詩難和歲寒交始真迺翁憐病乆余病復兼貧邵氏悦心堂擾擾利名役鬢髭霜雪侵要知充此性即是悦吾心有道境常裕無營味最深紛華安肯羡出見更酣沈别鶴見説瀛洲萬里程相思猶覬下青冥已歸天上神仙籍不就人間飲啄腥昨夜月明如失友故園籠在且休扄鄰家亦有雛堪待丹頂㣲㣲振薄翎冬日野歩樹上有禽啼似春聲髙聲下亦何心幽人拄杖移時立句句詩中是苦吟山中梅花詩人魂在梅花上不比垂楊管别離野鶴聲聲聲漸逺定應飛報月明知已有梅花未有詩青山相對動愁眉山翁只在山中住花落花開摠不知山中長日山中坐白雲應笑人浮生塵未脱至老趣難真身在影猶贅年豐家自貧莫將吟事廢栁色已知春漁父詞七首蘭芷流來水亦香滿汀鷗鷺動斜陽聲欵乃間鳴榔儂家只住岸西旁翁嫗齊眉婦亦賢小姑顔貌正笄年頭髮亂䯻鬟偏愛把花枝立柂前湘妃淚染竹㾗斑風雨連朝下釣難春浪急石磯寒買得茅柴味亦酸滿湖飛雪攪長空急起呼兒上短篷蓑笠具畫圖同鐵笛聲長曲未終離騷讀罷怨聲聲曽向江邉問屈平醒還醉醉還醒笑指滄浪可濯纓白髪鬔鬆不記年扁舟泊在荻花邉天上月水中天夜夜烟波得意眠只有青山可卜鄰妻兒語笑意全真休識字莫嫌貧方是安閒第一人漁村逺望因思槐逕弟同逰之樂滿山殘雪滿溪雲唯有沙鷗獨見親徃事不堪頻入夢吟篇無數更愁人扁舟欲渡同誰載破衲蒙頭近六旬尚擬來生因可結凄涼何處問蒼旻閒居言懐老子從來不為名放教心地到和平庭前草色知春近牕外梅花終夜明紙帳夢回移月影石溪流斷失灘聲吟邉莫問紅塵事只住茅􅗔亦自清挽陳運管安人孫氏舅家如母在慟哭淚沾襟平日經聲斷茲晨佛力深墓廬猶手構梱則是夫箴山上半慈竹從知契夙心君譽病愈相訪有誰憐我老賢弟獨知心月夜空相憶梅花都未吟愁因失鶴致貧為買山深連日勤過訪新篘得共斟還寓樂姪詩巻吾詩吟未了今爾亦工吟筆下心思苦書中理趣深青燈冝逺到白日易西沉多謝憐衰疾連朝獨見臨園中莫道趨時拙書中樂未涯荷鋤依樹歇聨句笑人遲仙去井猶在年荒草不衰近來筋力减累失看花期賈鹿巖不是長江𣲖因何亦好吟從知世味淡自覺野情深科舉無名字案頭唯古今新銘為讀盡可惜老山林山中遇雨草荒泥磴滑老病厭扶持雨逐雲先後路隨山險夷天寒禽自浴屋漏榻頻移吟事愁無緒梅花意亦悲山居有感無忮復無求山林終自由雪飛猶欠積雲住欲相留朋友疏因數功名喜亦憂休休亭記在此是死前休湖外泛雪雨雪連朝意未休支笻難歩最髙樓梅花不識春風面野水相平古渡頭船上看山無屋礙塵中閲世似漚浮一生窮苦縁詩僻莫把詩窮認作愁病中感興風霜歲又除藜杖歩徐徐兒軰憂無藥牀頭喜有書背因曝日暖交為訴貧踈天定由人事不如深閉廬憶稽師奥觀梅并貴行弟歿後之思不到稽師今幾春凄涼匹馬去無因同逰人葬梅花下應笑花開不見人守歲五首兒軰呼盧不計錢地爐圍坐笑聲喧老夫自筭吟邉事栽竹移花近百篇明日焚香叩九關六旬修未到清閒莫憐身在塵中老雪後騎驢亦看山鶴雛添歲頂㣲紅想見瀛洲路亦通昨夜柴門長半掩三更敲盡呌歸籠新歲纔餘七日粮燈前猶自笑人忙茅簷霜下寒衣薄爇盡蒹葭夜更長平日過從乏貴逰更來湖上棹扁舟除將兒女年年􅕥鄰舍相逢坐即休梅枝山雲惠二物贈吾江南一朶春獨清滋味自相親只愁月下推敲拙難與梅花作主人畫竹跬歩園林種亦難渭川還有幾千竿山雲遺吾氷綃軸得與梅花相對看漁村有感小牕長日苦吟聲獨倚䦨干看晚晴居士莫疑貧可弃春風不為病相輕梅邉紙帳重重影壁上離騷字字清鷗鷺徃來情更熟只消此地度殘生兩宋名賢小集巻二百八十八
