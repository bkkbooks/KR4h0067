body:
  text: 兩宋名賢小集巻六宋陳思編元陳世隆補訥齋小集王操字正美江南處士太平興國時上南郊頌授太子洗馬仕至殿中丞送人南歸相送當揺落孤舟泛渺瀰去帆看己逺臨水立多時别浦寒鴻下空山夜鶴移他年重會面冷鬢共成絲喜故人至地僻無賓侣柴門晝始開谿山寒葉落江國故人來話舊驚霜鬢論詩滯酒杯相留喜同宿不寐曙光回上李昉相公弱冠登龍入粉闈少年清貴古來稀袖中詔草朝天去頭上宫花侍宴歸卓筆玉堂寒漏逈捲簾池館水禽飛三台位近猶多遜閒聴秋霖憶翠微朝苑優游數十春文章敵手更無人對敡旒冕如僚友下直門䦨似隱淪倚檻白雲供醉望搘笻黄葉落吟身年來得意知難絶大半門生作侍臣洛陽春帝里山河景莫裁就中春色似先來暖融殘雪當時盡花得東風一夜開艷日綺羅香上苑沸天簫皷動瑶臺芳心只恐煙花暮閒立高樓望幾回村家野景村家好柴籬夾樹身牧童眠向日山犬吠隨人地僻鄉音别年豐酒味醇風光吟有興桑麥暖逢春塞上無定河邊路風高雪灑春沙平寛似海鵰逺立如人絶域居中土多年息戰塵邊城吹暮角久客自悲辛遊邊上佩劍游邊地悲風捲敗莎鵰飢窺壞塚馬渇嗅氷河塞濶人煙絶春深霰雪多蕃戎如畫看散騎立高坡并州道中從軍無住計近臘塞門行風劈面疑裂凍粘髭有聲太陽過午暗暮雪照人明馬上聞吹角依依認漢城贈劉將軍三十懸鈎事聖朝功名常愛霍嫖姚錦衣香重花垂足玉帶光寒雪遶腰秣馬暖思秦地草弦弓秋憶雁門鵰清時閒却英雄興醉聴笙歌擲酒瓢黄葵奉使隴右至石濠驛作昔年南國看黄葵雲鬢金釵向後垂今日林疑容籬落下秋風寂寞兩三枝句馬揺金勒嘶村墅人搶花毬落野田寒食彩牋分捲碧雲薄蠟燭對燒紅淚乾夜宴兩宋名賢小集巻六
