body:
  text: 兩宋名賢小集巻三百二十四宋陳思編元陳世隆補看雲小集黄文雷字希聲旴江人有看雲小集讀史感興人為五行精二氣相循環陽明發天秀隠約超龍蟠如何椒蘭芳苦厄蕭艾繁良玉必火浴利刃因嵐刓大鈞雖無垠嶽降亦甚難空山有大木琅玕葉敷腴未至更摧落豈復潤朽株東西四百載天明拱黄圖哀哀李杜死諸賢亦淪胥庸蜀及初燃大厦終難扶長懐追爽鳩誰復來此居典午固薄德南風扇羣汚癡兒各翻覆血刃起相屠老羝作人語海上生羊魚山東二百州白日紛逃逋更擅年代足文皇受乾符泰少否則長豈亦天意歟斷鼇幾何年八極儼不動當是有樞紐鐵網落纎空偷兒睨斗柄赤手掣天棟愁殺地上人覆壓萬古痛書生見事淺十算九不中豈徒書生罪要與六籍共子雲譏神仙仙人輕薄俗軒冕既非榮刀鋸况多辱惟能小萬物是以超五欲栖瓊得輕安鏤玉記華馥一詠太始音靈芝悟前夙山謫未可遺裁書繫鶴足仙栖固多名世但知蓬萊九州復九州廣大莫可該翩翩牧鶴童巧笑如嬰孩授我紫元章歸路玉笛哀蒼寒不可覔但有清風來偪反寧久居浮生多塵埃和陶志士方進身恨不以羽飛束縛歸山岡竟為人所悲白楊夜蕭蕭顧此何足依百嵗㑹有盡智愚同所歸奈此後之人未老形已衰有酒不暇飲而恐心事違林表有宿靄谷鳥相啾喧聽此心煩勞啟窓西南偏天氣總未佳白雲生隴山欲訪雲門人雨至或未還撥灰書且住首肯心中言黄河一再清似是上古時風雅久已降後來無文辭清風日淪落世道皆如兹工華不工實此話我所疑文章有心印昔人端不欺但恨智者少吾亦少卑之上有碧松林下有白石道中有學仙人自號古松老蛻身千嵗餘坐息如木橋面目劇嚴冷但道空虚好袖出天甲書意色輕鴻寳此老誠可人吾欲從師表牧牛上陽坡角掛上下經吳童歌且謡㫖趣皆混成東西兩山間飽見日月更歸來松隂凉夕陽滿前庭黄葉從風翻蕭颯草際鳴再拜謝天公賦此小人情次陳剛父見簡韻我居深山中細哦求友篇邂逅潮海濵得比璧一聯山立古先民期君能拍肩茫茫宇宙心楚楚東南賢讀書知姓名心死非貌敬昭回不在山中天揭西柄空山三木榻緑滿風雨徑嵗寒無忘我細意匡山詠呦呦苹野春我友二三子歸山睡初足澗壑秋風起一瓣無盡香黄雲繞書几别吟極雋永形魂清九耳玉壺即事雨過條風著柳芽淡黄淺緑嫩如花陂湖漾漾初侵路蜂蝶紛紛各理家帶鄗園林仙苑近送春船舫繡簾遮芸窓倦倚何山翠暖靄輕籠日脚斜自廣今古紛紛孰控搏太平方寸豁憂端後千年去人何似外九州來天自寛風雨南山飛霹靂江湖北斗掛闌干要知元命真消息滄海神龍自屈蟠近報入春風雨惡情懐談柄誰資近報來比嵗時聞通國信新年又説建行臺難言鐵冶飛灰燼易見銅駝出草萊羌管夜吹梅落盡倚牆撩亂野花開青青塞草始知春又見平林棗頰頳地起天津流枉矢鳥飛淮甸覆行塵漆城按堵寧辭䕃石馬霑溝㑹有神千古淮陽無處覔不知藏質是何人嵗晚歸自臨川半世生羣盜窮年見亂離出門偏念母挾策欲干誰雪重人蹤絶山寒火氣低平時來往地滿目盡憂疑無恙北去初無恙傳疑路不通戈鋋亭障密牓牘訓辭工落日鳥飛急空山花自紅若為能詛盜桑已斗星中題醉僧圖僧之飲酒地獄咫尺此僧飲酒天龍辟易僧之飲酒背面抵諱此僧飲酒口角觱沸披毛帶角即不理倒堦卧路而已矣一生般若幾杯湯箇是逃禪真法子不憂兜率不著渠只憂兜率無酒沽臨行自謗不羞恥至今留與人畫圖畫圖得龍眠畫形兼畫意君看阿堵中如如元不死是卧是死誰得知手中尚記攜䲭夷翻河倒海不救渴安得餘瀝留于斯我觀此僧面孔真滑稽醉中定解草聖并賦詩當其幕天席地時惜無人以筆墨隨紛紛散聖今何為賴有一醉留其竒君不見夜雨閉門難學柳下惠又不見背水置陣古來惟有韓將軍南紀南紀霑王澤涵濡已百年故應逢小刼何得怨蒼天舊觀寧無日浮生自可憐永懐千古事感慨淚漣漣南豐道中五首此縣聞天下披圖且萬家螭頭餘佛屋鹿角卧江沙好與蘇凋瘵誰令息歎嗟春風多少意殘竹映松花此亦勸農者畬田半入雲龍蛇因爾雜玉石故難分日月無私照江山未返魂茅茨倦行李何自戒重門此路通南國于今人少行遺民依廟住曠野用鋤耕古木刀痕熟空山鬼火驚猶聞宿師處倉猝又招兵想見承平日兹為富庶鄉門庭存位置井臼隔垣墻草市宜區種空村又夕陽誰歟真致此盜賊已天亡大村三百輩同此就天誅鋭欲取禾耳那知暴骨乎雲疑鵝鸛陣風想虎狼都掩骼行春令母令長媚狐曉行一水來不極兩山青欲連夜雨瀑初漲曉行路難縁此寧有人跡四顧風竹喧渡橋復何歸倚崖桃初然晚立獨游得荒溪晚意與心㑹水聲逺纔聞山色靜可對鳥語林塘邊犬吠籬落外柴門未須闗月在東峯背古石長沙郡齋贔屭窓前石參差類虎螭秋時蘚可剥嵗晏竹相宜要自山川至那知陵谷移摩挲羣玉痩風助馬王悲石頭懐古長江日浩浩跂予望淮南禹畫足廣輪王氣分殽函朝市一以建蟠踞誠匪慚中躔風塵擾六龍此停驂衣冠幸有地喙息賴未殱豈惟時賢力要是天險參頗聞京洛墟不救狐兎饞厭道故有道往悔寧非貪前登石頭路得共北客譚新秋帶歸鴻落日隨征帆弔古意未厭鼓鐘已酣酣金陵即事東菴遺像宿塵埃追想雞聲午夢回只與鍾山増九鼎當時何似早歸來千年陳迹故難尋向北山根識定林丘壑獨來差可意斷無人影古松隂唐晉諸人骨已磨龍蟠虎踞自山河可憐不共羊曇見奈此秦淮落照何王謝風流自一時長干古巷記烏衣尋常百姓幾畨換那有當年燕子飛西城圖大哉天地間品類不可齊誰為好事人貌此西城西松花瑣碎沙草肥是間可牧羊千蹄可憐羣鹿正走險或爾剥割衣其皮啜湩樹樺尚有理穴𩕳插齒吁何為吾聞中原全盛時重譯萬里朝京師懐方象胥飭乃事幻人詭伎傳雕題煌煌烈祖鑒古作宅京營洛分瀍伊太行以南孟門左其間氣象何雄奇豈知一旦盡荆棘荒城落日羣狐啼吁嗟東都尚如此玉門之外那得知還君此圖雙涕洟願賦周官王㑹詩二喬圖翔龍下巻江東土孫郎初得喬家女喬家本自重曹瞞隻雞斗酒空酸楚衿情正用留阿瑜尚得人間稱肺腑百年王氣竟鎖沈妙寫丹青嬌欲語香閨搦管寄何書並蒂芙蓉按花譜那知不是未嫁時本末無從勘前史詞人多事管閒愁銅雀紛紛底歌舞儘强被髪向黄罏只與東阿傳洛浦昭君行自石季倫始賦昭君曲以後作者浸多不容措手每恨沿襲之悞作漢初和親意著脉非也又按竟寧元年呼韓邪既壻漢氏其年五月宫車晏駕矣因併正之不惟祛詞人之失亦以解昭君于地下云君不見未央前殿羅九賔漢皇南面呼韓臣無人作歌繼大雅至今遺恨悲昭君内殿春閒鬭馮傅掖庭新花隔煙霧票姚枉奪燕支山玉顔竟上氊車去人生流落那得知不應畫史嫌蛾眉癡心只恐琵琶語歸夢空隨鴻雁飛穹廬隨分薄梳洗世間禍福還相倚上流厭人能幾時後來燕啄皇孫死野狐落中髙臺傾宫人斜邊曲畤平千秋萬嵗總如此誰似青塚年年青次黄存之東臯韻蓺木東臯下新榮渭水涯錦機分箔閙青子亞枝斜犢角初生筍龍鬚正引𤓰汲清雙玉井留客品嘗茶抱膝東臯下春風又草廬海仙將可見溪友未宜疎楷著祈年疏閒箋種樹書西山頮煙雨容易長嘉蔬負耒東臯下溝塍稻秫分汗邪爭一溉臺笠事重耘豳雅春稱壽秦謡嵗勞勤無功虚作傳農績未如君挾冊東臯下從人笑未𤣥傳真秧馬帖參透牧牛篇列岫窓前月平湖塢外煙似䝉稽古力鍾鼎豈其然冬郊冬郊見初晴空林夕陽軟歸牛無人驅欲涉行轉緩新霽明雪山更喜鵲爭喚絶勝門外人流冗及嵗亂楚語嵗晏為亂送故履霜著餘悲送故或古風幸㑹草木長土脉驗隠隆共惟青鳥仙倘亦知吾窮落日起秀色軍峯在雲中上天池寺蟠際均衡嶽千峯獨出羣鯤鵬從水擊翼軫驗天文曠野風行雨層霄日貫雲僧言興廢事因念福王勲始從平地望宛在九霄中不意身能到平生心併空江淮通好雨日月㑹剛風三伏凉如水蟠拏想白龍今古無窮恨山林只自豪雲行地欲盡風立天相髙靈草如堪餌浮生計可逃人間何擾擾萬里一秋毫往年因讀岳王傳嘗為之賦今過東林睹其遺象感而申頌之將軍英爽冠人豪眼底山河累寳刀青女䕶香天亦悞黒龍飲渭數何逃當時僧説松楸犯今日人推閥閲髙珍重王孫方鼎貴莫將歌舞替征袍欲壊長城豈自由江人重唱白符鳩熏天富貴還須盡從古忠良類若仇獄吏但能書牘背相公休欲割鴻溝書生志念閒無用長想朱雲地下游長歌君不見游塵著空生九州人在中間懸兩眸楊花化萍無根蒂風消水長東西流江南下濕人易老過盡嵗年還草草長留白日照人間榆柳浮生轉枯槁毬紋帶遶千花黄青娥攅眉眉細長莫言一尊千萬壽乃翁身命屬渠手長安城中鬼笑人水底紙錢能不朽今人不見古人心古人不見今人事天上若無長生人即是古人都盡死金鳬銀雁滿江湖神光夜夜開黄壚年經月緯三百巻平生欲作何人書古人云去留不得我些古人三太息今人莫詫山石牢更後十年人不識觀化屋角有蜘蛛結網大如箕有來者蜻蜓飛飛墮其圍嗟汝水之生爬沙自足嬉忽然凌空游蜂蠆避路馳一朝嬰禍羅羽翼安所施蜘蛛雖未出狼狽已可期我欲救起汝正坐手足疲噫吁嚱悲弗悲蜘蛛亦有黄雀隨百蟲相殘人不管人兮食人天豈知挽程孺人汪起潛内有煒遵彤管無嫌各紫樞清心能敏悟雅性謝驕舒奉語期鸞彩傳經囑鳳雛妙年仙格迅琬琰不勝書兩宋名賢小集巻三百二十四
