body:
  text: 兩宋名賢小集卷一百七十八宋陳思編元陳世隆補艮齋詩集謝諤字昌國臨江軍人紹興末尉樂安去姦蠧施德政凡有益於民者言於令行之縣多盜條二十䇿於漕司大要使其相糾而以信賞隨之盜果解諤博學工文詞有名當世號艮齋有艮齋文集清常寺佛廬塵不到客枕夢頻驚淅淅山風響纎纎隙月明煙雲春漸暖鐘磬曉逾清蹤迹奔馳裏飄浮愧此生龍回院堂殿塵埃外軒櫺紫翠中憑欄千嶂雨欹枕半窗風得意何妨僻尋幽豈易窮分張間草木一一見春工玉山觀微明燈火夜堂幽聽徹絲桐萬慮休骨冷魂清眠不得竹風蕭瑟滿庭秋鼇溪數版小橋橫晚晴兩行古木弄春榮不知多少夜來雨水到岸頭渾欲平藹藹煙雲望眼昏亂紅翻徑緑遮門一聲啼鳥在何處山外人家桑柘村追和邵祭酒柬吕太學艱難方見救時在一介儒生為國哀六豕姦雄千古恨二龍奔馭幾時回道州自分填溝壑天詔何須賁草萊我識先生心似鐡宸章莫更苦相催復朱晦菴笑指長沙擅閫來向吾鄉假途一段忙中説話無非孔孟工夫兩宋名賢小集卷一百七十八
