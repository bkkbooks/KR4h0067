body:
  text: 兩宋名賢小集卷二百八十一宋陳思編元陳世隆補蒙泉詩藁李濤字養源臨川人有蒙泉詩藁南山南山思美人也彼美人兮在南山之陽豈不爾思道阻且長彼美人兮在南山之側我不見兮寤寐思服彼美人兮悠悠我思何以豫之瓊瑰玉珮南山三章章四句登髙丘而望逺海登髙丘望逺海萬里長城今何在坐使神州竟陸沉夷甫諸人合葅醢望逺海登髙丘知我者謂我心憂不知我者謂我何求歸枕蓬萊潄弱水大觀宇􅨚真蜉蝣讀阮籍詠懷十七首人生天地間如花開春時遇晴即欣榮遇雨還離披晴雨由上蒼汝花何悲為顯允阮嗣宗放逹世所推憂思獨傷心作為十七詩感慨懷辛酸似未逹天理既好王子喬又惡輕薄子善善又惡惡好生而惡死如何得徴稱口不挂臧否處事處事無心萬象春任渠逆境自橫陳籠中無療家貧藥門外有催詩債人酒盞濶踈瓶久卧文書散亂案多塵生前冨貴非吾願肯學癡人問大鈞詩社中有赴補者有詩千首可成名萬户侯封亦可輕自是髙標凌富貴肯隨餘子逐恩榮君遊壁水甘芳餌僕為銓衡上玉京水鏡蘭坡各求第詩盟似未十分清新年開義館教族屬子姪作詩勉之日與聖賢居其中樂有餘但存三寸舌讀盡五車書學問勝金璧功名特土苴先當分義利毋作小人儒蘭坡過省俯隨韁鎖就科名可笑蘭坡未苦清不管北山怨猿鶴竟從南海掣鰲鯨賞延於世愧在我思濟斯民同此情軒冕倘來來則受未來猶可以詩鳴詩友作涉江采芙蓉獨撥鄙思亦成一首涉江采芙蓉江水濕吾衣厲揭不憚煩將以遺所思所思不我見持此將安歸野花逞姿媚衆好紛莫違此物何足嘆但傷愛者稀春晝回文一首茶餅嚼時香透齒水沉燒處碧凝煙紗窗閉著猶慵起極困新晴乍雨天贈染花徐仲湘頃刻花開奕葉光花間竒字兆災祥神仙幻術從來有昔日韓湘今仲湘雜詩十首今取其四滔滔東流水赴海無歸期亭亭在轉日今兹復來兹人生寄天地百年七十稀思慮復營營恐為逹者嗤燕雀賀厦屋蟲蟻暮腥羶野花引飛蝶古木來嘶蟬秋天百蟲吟春天百禽喧翟公真暗事喜愠見色言明主不棄士我自志山林爵服豈無華才踈力難任鳥向深山棲魚向深淵沉吾亦愛吾廬髙歌復微吟深巖有老翁龎眉鬚鬢雪夜半呼吾名授我微妙訣字畫古籀樣體勢訛復缺雙眫忽炯炯須臾竟披閲至今得其傳心會口難説琴書琴書隨分足生涯只灌園畦亦自佳行狀是劉斯立記門風似杜少陵家添詩人瘦因中酒解睡魔圍只上茶無事出門覔詩料巡簷指點數梅花寄范稅院倚衡清敏當年宰寶唐至今遺愛在甘棠稅苗有例分三等史卒無因下六鄉時異事殊民尚憶人亡政息事堪傷如今白納重催吏也坐先生對越堂次韻平野王子厚登相山不及相過兒童傳好語王子去求仙我住亦只邇君胡不惠然相望百里外一别五年前會聚渾間事鷺鷗盟要堅題袁恭父神心精舍山川城郭同一形市人鴉鵲同一聲吾身本自備萬物萬物何有非吾身此心虛徹公則明事至能應物能名君不見神心精舍袁主人叱吒風雷呵鬼神僧本均乞蒙泉稿均號翛然近聞甘子説僧裡有翛然詩學貫休體心參馬祖禪箇中真有得名下豈虛傳索我蒙泉稿因風寄此篇題盱江王章甫梅境仙伯當年亭植梅當今天子題品來梅花是我丈人行見梅不賦梅應咍王君結廬在梅境日與梅兄相追陪吟詩些起逋仙魂索笑醉銜工部杯吾聞梅乃萬木母桃為奴婢李輿臺一陽生子萬物始梅花獨先羣卉開一隂生午萬物成梅實獨先羣花胎華實先天天不違梅之時義大矣哉紛紛餘子不知本祗説百花頭上魁此語聞之梅亭翁録以贈君君勿推為廣夀長老文傑説嵩溪偈隔江招手見髙亭來謁嵩溪聼水聲縱是逺公今不出也須強起送淵明為能仁長老本端説無學偈十二時中六不收了然無一事為頭禪河既寂無由浪此岸已離那用舟塵世榮枯真幻夢涅槃生死是浮漚要知無學用工處十二時中六不收三月十六日西湖聞杜鵑才上蘇堤聞杜鵑杜鵑怪我在天邉平生不作功名想今日胡為富貴牽辟穀未能那廢食買山所欲尚無錢但須兩事略如意便占白雲深處眠訪林龍發車馬喧闐桃李村誰人復識老梅尊時中只有梅亭姪來訪西湖處士孫兩宋名賢小集卷二百八十一
