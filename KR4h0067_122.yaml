body:
  text: 兩宋名賢小集卷一百二十二宋陳思編元陳世隆補慶湖集卷下遊雲龍張氏山居雲龍山距彭城郭南三里郡人張天驥聖塗築亭於西麓元豐初郡守睂山蘇公屢登燕於此亭下畜二鶴因以放鶴名亭復為之記亭下有小屋曰蘇齋壁間榜睂山所留二詩及畫大枯株亦公醉筆也亭上一徑至山腹有石如礱治者公復題三十許字記戊午仲冬雪後與二三子攜惠山泉烹鳯團此巖下張即鑱之壬戌秋余初至徐張惠然見臨繼相招為山中逰昔聞張逸民卜築雲龍山東望結遐想喜得彭城官一語定襟契宛如平生歡招攜屬休沐投此蘿薜間女僕候門巷青袿雙翠鬟蘇齋軒户明餅火焚椒蘭寶墨鬼神護清詩冰玉寒森然拱簷霤架石排琅玕東趨放鶴亭燈道披茅菅指顧百村落炊煙林莽間日腳灑平陸兩山如斷環凄風振脫葉坐怯衣裘單引領紫霄極飄颻如可干緬懷睂山公五馬來逰盤興酣一本作酣興走顛筆蒼崖即鑱刋午年仲冬月雪野雲彌漫掃石坐舒嘯惠然烹鳯團當時詫盛集千古陋逵安俯仰迹遂陳斯人久泥蟠我來後千日逸躅何由攀仰懷勝事往俯遵塵路還山英能不辱時款白雲關登黃樓有懷蘇眉山登黃樓望黃州黃州望不見樓下水東流水流何可留浮雲更悠悠傷心澤畔客憔悴楚蘭秋燕子樓城據山川勝千年為故都高樓臨汳水楊栁蔭芙蕖唐室中多故將軍老鎮徐毬場朝戲馬玉帳夜投壺白雪徴清唱黃金得緑珠春風樓上宴三日極歡娛紅粉夢魂散白楊兵火餘已亡雕夏燕空有穴墻狐曲徑擁黃葉西風時掃除來客晚登覽傍徨思壯圖荆榛閉銅雀麋鹿逰姑蘇陳迹豈足道舊歡何日無朱欄開酒𣙜寶勒迎官奴醉袖舞鴝鵒艷聲歌鷓鴣遲留故時月桂影來座隅上已後一日登快哉亭作上已信嘉辰流觴傳舊俗良逰悵不遂吏局方有屬東風吹曉雨萬竅嘷林麓疑有泊舟人狂歌河女曲逾朝始澄霽物色如新沐城角趨危亭登臨慰幽獨三月二十日逰南臺感賦晴春六十日不與酒杯親吏事豈無間風雨復兼旬始作南城逰時物固已陳掃迹桃與李濃緑迷荆榛登高暫消遣引目清泗濵向田有交徑俯城皆要津得意屬禽魚愛兹意共馴顧余千里客一官猶患貧履綦集座隅萊蕪滿甑塵山園有芳蘭幽珮手自紉長哦白雲謡遐想紫陽真去矣南昌尉庶幾乎若人艤舟秦淮雪中訪侍其瑀北風破雨初成雪齋舫篷窗吹紙裂籃舁􅀈冷訪圓廬得把一杯聊耳熱人生自適待何時矧君與我皆衰遲會待晴天暖風日杖藜同赴北山期留别僧訥冗從西班誰比數牛僧馬醫猶爾汝詩解窮人未必工苦調酸聲效梁父滎陽道人方外交謂我有言追屈騷驪珠不惜彈黃雀狗尾何堪聯黑貂秦淮潮上扁舟發後日相思一書札千里同風了了然人間無處無明月題漢陽招真亭大别山嶺清沔尾飛亭岧嶤帶雲起清狂使君初燕喜拍手招呼黃鶴子元津煉出太陽酥手葺胎髮蒙頭顱每誇久落北酆籍豈意齎恨歸黃壚越客登臨興何有愁不能言病妨酒殘陽雲夢窅然深尚欲開襟吞八九羽駕飄颻安在哉使君餘迹已塵埃但見庾令樓橫煙樹杪角聲催月渡江來送鄂州刑獄掾王懋元功罷官還海陵兼簡金陵和上人暖雲芳草橫塘路送客何之官鄂渚江臯暑淫氣如蒸别來何事還海陵海陵鄂渚非我土每後君來先我去人事根蒂本悠悠况指滄波是舟路君方少健我衰遲局蹙轅間不自持因行寄聲雁門逺歲暮敢忘林下期和張謀父逰石佛山觀魏太武書按南北史彭城圖經魏太平真君十一年太武南侵至瓜步築宫駐蹕聲言欲渡江宋人患之遣使請婚饋百牢以犒師明年春旋師渡淮復留連徐方再旬始北去今彭城南五里固山鑱佛高十許丈東北百步有大盤石攲枕小溪劃然四字曰阿彌陀佛皆徑尺餘特陀佛兩字為逸筆結之其長倍尋下落溪中蓋當時太武以鐵箠畫是字非刋刻也乙丑秋張謀父摹墨本見惠兼賦一詩要余屬和焉中夏惜屯否代邦天所開鴻圖屬太武不世英雄才南洗洛陽血西蕩長安灰氊車十萬乘略地驅風雷一葦濟長淮築宫瓜步隈東鄰拜牢餼走使為婚媒雲旗即歸路覽勝此裴􅏆俯揮鐵馬鞭頑石同竒瓌劃成四大字屹粟隂虹摧淪精入崖壑怒氣羞蟠回茫茫六百年風雨生莓苔偉迹寖銷泯威靈安在哉君為訪古遊賦詩追七哀人生誰不爾零落同塵埃感懷寄二三知舊人生七十稀行年今已半事功貴及時遲暮復何算嗟吾夙夜疚失怙在童丱詩禮思有聞飄颻辭祖貫慈親念衰緒卒卒營婚宦名姓係西班星霜亟徂換未築黃金臺長歌白石爛豈無同心契相望眇雲漢擬南梁慧侃法師獨杵搗衣嶧陽桐杵鳴蓮嶽石砧平待誰相應節要自不勝情吹衣風稍急弔影月微明會有不眠客聼此斷腸聲擬阮步兵夜中不寐夜久不成夢張燈開故書清霜屛雲物片月來庭除良時悵難再不與佳人俱掩卷長太息望子城之隅遊雍丘燕溪分韻作捨轡步平緑解襟俯清池微風度修竹瑟瑟生淪漪黎華照晴影暖雪正紛披把酒久沈想况與玉人期留侯廟下作文成念韓痛破産伺強秦千金募健士椎斷屬車塵東去變名姓浮遊淮泗濱忍耻奉遺履得書何老人十年風雲會赤帝資經綸鴻門禍端結一言即解紛英彭既合縱楚項提孤軍偉哉借箸談豎儒無復陳分疆餌兩將來若從龍雲釋怨俾侯印謀銷蛇豕羣定都天府國推功歸奉春四老落吾術拂巾辭隱淪東朝羽翼就楚調徙悲辛出處能事畢致君終乞身豈眷萬户封僅與蕭酇均淮隂敗晚節顧亦非吾倫願訪赤松子逍遙雲漢津嚴祠鎮川湄餘澤及斯民祗應終萬古黃石共威神遊金陵雨花臺臺在城之西南蓋生公講堂故址也南即石子岡登覽盡江南之勝迢迢朱雀航飛蓋共陵越東風石子岡芳草微徑絶生公法堂在清夜貯明月回認城郭逰春華爛晴雪長煙動江隩微雲起山脅連檣去遲回白鳥屢明滅題香社寺平疴湯泉驪山御湯殿歲久玉蓮傾誰謂大江北有泉溫且清相傳白雲竇中閟丹砂英澡濯浹肌骨沈疴亟能平豈特滌吾足徑當潔吾纓築廬俯源上涵泳鳬鷗輕非復罣塵網御風朝玉京賦詩投楚澤用弔懷沙生宿寶泉山慧日寺日久思不遑驅車更之東回蹊出蒙密解䘧迎長風風從何許來歷歷江南鐘頓轡阿蘭若虛庭月正中流螢逗深竹白鳥巢青松華燈耿翠箔瑶花擢春叢絶境美清夜恍非塵界逢惜無一樽酒幸與之子同明發即南北浮生兩飛篷曉度黃葉嶺東谷懷寄金陵王居士間叟嶺在烏江北八十里戊辰七月十六日自寶泉慧日寺之茅塘村路經此隂谷不寓暑松風朝露零乳溪逗緑篠琴築聲泠泠老石漬金碧窅然沈列星酌此石上泉餌彼松下苓條歘振飛步豈徒制頽齡何須歷五嶽即蹈神人庭顧余方有役俗駕不敢停寄音采真子預卜白雲扃遏胡城烏江縣譜昔石虎南侵晉相王𨗳築此壘以遏之狂胡昔慿凌濶步長淮外去此百雉城萬甲屯要害時平一登望江山互襟帶想像文獻公清風宛如在采石磯瀕江兩磯相對相傳李太白嘗隱東磯上故址存焉東西采石磯山水兩清絶漁舠與商舶今古幾沿越飄颻翰林主長笑弄明月難訪物外遊飛雲眇天末百福寺即唐詩人張司業籍故居籍繪像今存文昌西郭居修竹閉環堵琴樽不復存青蓮開梵宇塵紛晦遺像粉繪才可覩拜奠愧無言長哦古樂府遊金山輕舠放中􅍽岸逺春風壯楫師俯仰呼天水爭簸蕩吾方扣其舷聊𢋫小海唱梢回即東麓側磴聯屨杖危剎表層巔疲筋躡牽強斜廊繚復殿魚脊分背向放目四垠寬秋毫入吾望侵雲鐵甕壘崛起無緣傍映日海門山不蒂滄波上吾雖百石吏平昔有微尚俄得金仙徒剪蘿開岫幌誓投桑榆年浮玉翁自况感庭棗昔來花纂纂遽許實離離西風會搖落行復見空枝歲物感流駛事功傷暮遲咄彼身後名前人端自欺書殫南山竹奄奄定何知賢哉張生翰千載與心期寄題粟亭少陵昔避地幽棲鳯皇川始願獲其所賦詩此終焉眷彼美林麓蔭膏腴上田陽坡饒埀珠隂谷繁玉延長鑱勤采斸服食攀飛仙兵祲奪和氣力耕無善年林坰開氷雪旬浹斷庖煙嗚呼歌七章暮節西南遷環堵久蕪沒斯亭名尚傳茂宰愴懷古增崇殊過前雕甍揭長簾下容十客筵嫩嵐隔春叢清竹鳴夏蟬風月有高興寫之武城弦狂客屬尫廢駑筋難強鞭何暇逺登覽但哦鯨海篇尚苦八口纍依稀同曩賢餘齡寄幻境未斷東西緣江淮米價平一舸去悠然幸此豐歲樂浮遊吾所便異時訪陳躅復使後人憐寄題潯陽周氏濓溪草堂周本江華人名敦頥字茂叔仕至尚書郎纍使嶺表中年投節退居湓城之南溪上因名濓溪以自况二子壽字元翁燾字次元相踵第進士丙子五月余艤舟漢陽始與元翁相際求余賦此詩濓溪之水清未足擢公纓平生抱苦節成就此溪名長嘯置符傳孤雲歸思輕溪頭四壁居溪下百畝耕量汲奉晨盥課樵共夕烹稀逢杖屨遊但聽絃歌聲為客開三徑傳家惟一經雙珠先照乘合璧價連城被褐有餘樂問縑無隱情昔仰名父子今推難弟兄不應文範絅遽謂公慙卿勒詩高崖石敢告後代生斗峴山馬上西來投䇿倦躋攀晚葉寒華一徑間盡日間雲不留雨斜陽還照隔江山渡冷水澗投宿萬歲嶺蕭蕭黃葉下清溝白鳥飛來故少留今夜行人短亭宿小窗風雨夢漁舟同張漢求宿升小院西寮僧闔窗扉學畫船青熒燈火對牀眠北風帶雪披簷竹渾似瀟湘夜泊天快哉亭朝寓目風起喜舒曠徑趨城上樓初暘動禾黍積雨失汀洲水牯負鴝鵒山樞懸栝蔞坐慙真隱子物我兩悠悠送畢平仲西上吟鞭西指鳯皇州好趂華年訪昔遊新樣春衫裁白紵舊題醉墨滿青樓鳴蛙雨細生梅潤揚燕風高報麥秋須念江邉桃葉女定從今日望歸舟望夫石亭亭思婦石下閲幾人代蕩子長不歸山椒久相待微雲蔭髮彩初月輝蛾黛秋雨疊苔衣春風舞蘿帶宛然姑射子矯首塵冥外陳迹遂無窮佳期從莫再脫如魯秋氏妄結桑下愛玉質委淵淵一作泥沙悠悠復安在溪上屬目白雲蒙山頭清川山下流芳洲采香女薄暮漾歸舟並蒂雙荷葉逢迎一障羞持情不得語大婦在高樓茅塘馬上北圖忽忽負當年回羡農家過我賢水落陂塘秋日薄仰眠牛背看青天題宋林寺破氷泉脈潄籬根壞衲遙疑挂樹猿蠟屐舊痕尋不見東風先為我開門長安在何許二首長安在何許疑在青天上矯首遡西風浮雲斷人望長安在何許疑在白日下裴徊天一隅華月生新夜題關路逢僧圖蹇驢烏帽禪客落日黃塵故關巳悔棄繻昔去更逢挈履今還題秋水蘆雁塞南秋水陂塘蘆葉蕭蕭半黃直北飛來鴻雁端疑箇是瀟湘題梅花雪雀春雪霏霏晚梅抱枝寒雀毰毸隴下有人腸斷為銜芳信東來題鳴琴召鶴圖結茅百尺荒臺杖藜一徑莓苔謝絶雞羣老鶴不應端為琴來題巫山圖巫山傳美女秀色發朝雲絢麗不可挹飄颻去無痕楚夢一夕後蒼山秋復春目斷腸亦斷往來今古人兩宋名賢小集卷一百二十二
