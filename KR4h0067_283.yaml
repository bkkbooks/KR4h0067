body:
  text: 兩宋名賢小集巻二百八十三宋陳思編元陳世隆補招山小集劉仙倫一名儗字叔儗廬陵人詩名聞海内先後與劉過並稱所著有招山小集中秋有懐吾廬有寒梅老幹秋風多上有雙棲烏夜月聼我歌一别三載强梅影應婆娑鳥今來不來奈此明月何梅樹歎誰將和羮姿植彼江之墳老葉纔脱柯生意覺巳欣寒流帯孤標淡月寄一痕莫作揺落看下有春風根水楓歎楓葉不耐冷露下燕支紅無復戀本枝䇿䇿隨驚風鄉來樹頭蝉去盡不見蹤日落秋水寒哀哀呌征鴻得蟹無酒水鄉秋晚得白蟹望斷碧雲無酒家此意淒涼何所似淵明醒眼對黄花盱江道中過雨青山啼杜鵑池塘水滿柳飛綿田家正是忙時節女採桑歸男下田有懐二小姪殊鄉憶諸孫觸緒成歎嗟阿獰早失父㷀㷀垂兩髽巳知陟岵悲啼哭聲啞啞阿贛㓜豐下出入常隨爺别時俱學書落紙翻老鴉倒指今三年為學當日佳應解對我兄言叔不還家何時重抱持課書賞梨揸看渠俱成人憐我雙鬢華侍我兄弟醉㑹當相扶义贈曽相士大曽兩眼如磨銅坐上一顧凡馬空發天機緘被天惡老死不遇悲途窮小曽短小眼如鶻冷地看人看入骨誰云輪扁不傳心獅子還生獅子窟倒拖拄杖行九州平生慣識公與侯得錢送家飬老母衣袂惨淡行嚢羞我慵百事不入耳休説功名老無味他年相伴竹溪頭同採芙蓉渡秋水西林㽞題路入康廬西復西翠煙生處着招提山僧幾軰雪垂領水鳥数聲雲漏溪莫對青山談世事且㝷粉壁看留題禅房夜卧衣裳冷夢破鐘聲落月低盱江驛舍中有婦人書一憶字筆勢頗姿媚游子明王相之皆題詩其後率余同賦陽臺雨歇行雲杳天濶鴻稀春悄悄鸂鶒孤眠怨芳草夜夜相思何日了妾非無聲不敢啼妾非無淚不敢垂柔情欺損青黛眉夢魂暗逐蝴蝶飛春風着人𤨏窻緑緑窻書字寄心曲細看香翰婉且柔中有閒愁千萬斛向隅棄筆惆悵時此情黙黙誰得知無縁相見空相憶不如當日休相識盱江道中屈曲清江繞徑斜緑隂深處隠人家嵐昏山色未還觀水落漲㾗猶在沙麥熟村村喧水碓蠶成處處響繅車馬頭忽覺清香近路轉橋南有野花輓萬知丞大䇿雄文屢決科可憐身世竟蹉跎韋編絶後門長閉衫色青時鬢巳皤楚澤風烟間簿領藍田松竹飽吟哦詩魂今夜誰招得奈此西山暮雨何哀青樓曲東風吹衣樓百尺青錢喚酒春壺碧樓中女兒顔如花欄干徙倚春無力翻騰舊曲偷宫商顧曲豈怕周家郎態濃意逺淡梳掠依約風韻追韋娘樽前時復度芳眄長恐秋波落金盞自言流落小民家似恨相逢成太晚吁嗟緑綺琴絃絶無知音行雲忽何處十二巫山深巫山深兮君不來春無色兮意徘徊夕陽下兮猿呌哀可憐宋玉空多才送徐淵子知縣二首君作西昌宰人如太史賢化行黄犢外心在白鷗邉訟理無公事官清祗俸錢篷窻載書畫頗似米家船城郭春寒夜郵亭小泊時相逢一樽酒共説十年詩風雨成輕别江山莽後期著鞭從此去早到鳯凰池過嘉興惆悵嘉興路三年㡬度經航船連夜發更鼓隔城聼落月低烟樹秋風冷露螢客懐容易感宜醉不宜醒陳惟定得蜀墨一笏于觀音老僧磨試竒甚落刀中分賦此為贈吾聞蜀道如天髙寸歩千嶮愁猿猱蒼官老據岷峨上誰肆斬伐焚其膏坐刲長鯨割其白丁當萬杵舂成膠甄陶出此数寸玉山靈河伯俱呼號蜀人寳之夜光發六丁竊取潜逋迯龎眉老僧抄化得要與秪樹供題抄却憐南澗詩壇豪贈之為染霜兎毫欲令拍肩李供奉脫靴醉換紅錦袍梅坡覓句心切切沈著無處安推敲陳元嫌我窮到骨隨世冷煖成絶交賢哉南澗得此寳中分肯落并州刀得之欲顛喜欲舞助我詩思來滔滔自臨清流洗破研赤脚不怕風霜饕歸來小試病風手𤣥雲渰渰生烟濤未能接武居螭坳萬古一筆定貶褒為君且費千幅紙鴉兒大字書離騷熊師生朝南極星明夜未央將軍初度近重陽平生忠義心如鐡今日棲遲鬢㸃霜沙漠草凋胡馬健玉關秋老角弓强朝廷緩急須公出更看黄花晚節香以騎驢鍾馗送秦先之髯鍾矍鑠老據鞍曽入大内見阿瞞幞頭垂脚藍綬敝不知班簿為何官天寒嵗晚日云暮霜風吹驢耳卓竪老臧負笠衣裳单反袂掩口趾穿屦蓽門我恐難㽞君収巻送似秦將軍將軍文事有武傋眉骨自是凌烟人汝當訶䕶謹厥職勿但縮頭徒掛壁將軍來嵗在殿巖豐汝牲醪作除夕秋夜長曲秋夜長秋月明愁人不成眠搔首行中庭天髙氣肅萬籟息銀林凍損寒露零碧梧已蕭條棲鳥中夜驚枯荷倒秋水夜氣氷流螢銅壺悲咽漏下澁深閨何處鳴寒砧亦有朱門人環坐圍娉婷玉觴催喚酒銀甲紛弹箏衣篝龍腦熏綉被珊瑚枕煖愁鷄聲秋夜長秋月明此時㡬人知此情魏塘道中霜葉紅于染寒溪湛若澄㡬聲歸雁急数㸃暮山青淺盞頻斟酒長塗小作程萬縁天已定得䘮一毫輕題惠崇鷺鷥清霜着木髙桞枯驚風獵獵吹寒蘆蘆根敗蓼色惨澹沙觜無復菰與蒲風標皎皎四公子來從西雝有閒思肝腸澡濯秋水清雲衣不受泥土滓偶得一飽即自如鵬飛萬里何關渠出離風波岸上立豈只臨淵常羡魚惠也小景稱獨歩那知冩生尤得趣傍邉謹勿生機心恐即長鳴過溪去江亭晚望痩笻支我碧波彎小倚危亭取次閒斷雨挾雲歸嶺嶠怒濤推月出雲間猿啼逺樹家何處雁斷西風鬢欲斑歸計未成秋又老浩然無語對南山仲立於枕上和余韻夜半得句敲問喚余予乃攝衣而起相與對語於野航橋上殊為勝絶因再用前韻夜半詩壇喜觧圍楚天雲淡玉䋲低撞鐘自得興不淺泣鬼初成人未知踏月過橋驚鶴睡犯霜對語伴烏啼蕭條此意興重見絶勝圍紅醉玉巵李泰伯祠堂城西泰伯舊祠堂碧蘚斕斑草樹香曩昔功名雲樣薄後來文字日爭光蒼髯冉冉猶含怒辯口瘖瘖尚帯霜若使先生居戰國不知何道處齊梁送陳維定維定有伏闕上書之意因以箴之二首征衫結束賦歸歟出得樊籠氣便舒爲福定知因失馬浩歌元不嘆無魚江湖是處堪垂釣虎豹當關莫上書食肉宜憂我何預問津恐復遇長沮傾葢相逢二紀前六囘相見兩華顛詩成神鬼皆遭役命薄文章不值錢北事如斯居可去西齋重到我凄然他年卜築如相覔更約西山暮雨邉寄蕭彦毓蕭郎門巷近何如想見青青長碧梧樓外青山無恙否琴中流水有知無他年歸槖惟詩巻别後春風滿酒罏望斷碧雲無過鴈夕陽歸鳥沒平蕪張漕仲隆快目樓天上張公百尺樓眼髙四海氣横秋秪愁笑語驚閶闔不管闌干犯斗牛逺水拍天迷釣艇秋風萬里入貂裘面前不着淮山礙望到中原天盡頭寄韓平叔二首相從車轍半江西同歴悲歡共險夷孺子亭前春繫馬庾公樓下夜聞雞放懐呼酒長歌日促膝挑燈細語時暗憶淒涼多少事此情不語有誰知淡烟秋水白漫漫夜别江亭劍氣寒千里思君愁月色有時無語倚闌干倡酬詩巻應無恙耐乆交情過後看他日歸舟無俗客撑篷容我話辛酸臨川報恩寺與涂子載陳惟定分韻得丹字杏花枝上雨初乾梵宇苔深碧瓦寒三客燈前共湖海五言詩裏定金蘭殘年短髪因愁白多病衰顔借酒丹後夜相思月千里不堪獨自倚䦨干騮馬行憶昔初見騮馬歸主人愛馬過愛兒丁寕圉人謹相視一夜十起芻秣之長年煮料雜以豆按時飼馬欲馬肥爬梳剔抉去疥癢裂鼻灌藥煩獸醫膘成十箇料花出加以膏沐膏其皮青絲絡頭鞍䪌好鋈金作鐙光陸離主人愛馬馬戀豆牽來顧主時驕嘶口才三齒力方壮未老保主常乗騎淮南忽然有馬至骨骼比此尤雄竒騧黄鐡脊豹其脚雲鬃霧鬛風披披刺頭齒䣛過若電脫兎犇鹿何由追主人意却在新馬衆口共譽無一違停燈在廐潔水草恰似騮馬初來時騮馬在傍意惨淡雖未見斥頭巳垂嗚呼騮馬勿用悲自古世事皆如斯幽王昔日娶申后既得褒姒后寵衰楚王宫中棄前魚紅䄂嗚咽流涕洟人心改變在頃刻嗚呼騮馬勿用悲嗚呼騮馬勿用悲淮南無日無馬來寄朱濟仲家在三千里人來天盡頭角聲連夜月草色帯邉秋妻子仍多病音書缺寄郵歸心與寒鴈先已過𤓰洲兩宋名賢小集巻二百八十三
