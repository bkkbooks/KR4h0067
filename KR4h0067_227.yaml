body:
  text: 兩宋名賢小集巻二百二十七宋陳思編元陳世隆補菊坡集崔與之字正子廣州增城人紹熙四年進士理宗朝累除廣東安撫使拜參知政事右丞相致仕卒累封南海郡開國公諡清獻有菊坡集夀邕州趙守大夏開朱明物態豐且碩薫絃發新奏生意轉無極間氣清而和融結賦有徳碧梧挺幽榦曠度漫九澤富哉學古胸仁義供服食渾璞希世珍外温而内直驊騮開道路聲光日斯赫九闗通籍初南來墜雙舄片心清徹底杯水餞泥軾京兆入幕賔去天不盈尺佳最入聰纊行行陟文石邕為五管雄地控西南域專梱難其人弄印無以易袖却經綸手天邊樹牙㦸猩獠叢篁中深棲而屏息夜月照銅柱警囊聲寂寂邊人解帶卧危地成樂國屏風御墨鮮早晚來召驛愧我樸􅈪才潦霧甘逺役題坐遇知已孤根費培植嵩高生申旦好語諠井陌碧油寒雲端阻莫陪賀客歌咏淇澳詩清修如圭璧他年玉班頭蒼髯而赤黻柴秘書分符章貢同舍餞别用蔡君謨世間萬事皆塵土留取功名久逺看之句分韻賦詩得世字玉立蓬山巔聲望髙一世清秋玉壺露耿耿無纎翳中流屹砥柱愈激而愈厲平生學古胸非謂資生計中邊事方殷命脉實闗係憂世危明王誰流洛陽涕直諫逆披鱗言言皆獻替胡為厭承明退飛勇且鋭有山鬱而孤雄踞虎頭勢民貧困科擾椎剥已無藝猩獠叢篁中跳梁無虛歳弄印無以易要起百年弊西風吹馬耳新涼雨初霽尺札聞先聲逺氓已懷惠旌旗簇小隊畫㦸森兵衛一方覆盂安中原誰共濟顧我亦漫仕空山老松桂勌海作歸夢乞身尚濡滯着鞭公已先脂秣以相繼送䕫門丁帥赴召議論方前席功名早上坡去帆瓜蔓水遺愛竹枝歌同志星辰少孤愁暮雨多倚風窮望眼碧色淼平莎送范漕赴召獨汲千尋綆惟開八面牕相逢俱氣許未語已心降分鎮中邊蜀歸途内外江禁林風雨夜應念鹿門龎送時漕大卿淮西簡法卿月高華照楚墟澄清雅意見登車星分屯壘雲中戍風引艅艎塞下儲十二聚民行惠政三千議獄謹刑書最聲炫赫流聰纊聖詔今朝下玉除十年宦海任飄零豈料高華伴使星落魄半生頭已白爬沙一見眼長青天涯明月方依樹淮上長風忽散萍别後誰能效兒女不堪官柳暗長亭張進武善風鑒謂余豸骨日聳非晚入臺求詩贈之熒熒碧眼照人寒一别重逢歳又殘老去但求閒處樂君來猶作向時看誰將伏豸夸顱骨我有盟鷗託肺肝坎止流行隨所遇何須求夢到邯郫揚州官滿辭后土題玉立亭天上人間一樹花五年於此駐高牙不隨紅藥矜春色為愛霜筠耐歳華四塞風沉天籟寂空庭月冷市塵賖臨行更致平安祝一炷清香十萬家嘉定甲戌正月以金部郎分閫東淮正當金棄巢南奔之時不願往以君命不敢辭首尾五年而不得代戊寅臈月以少蓬召而病且衰矣自知不堪世用決意南歸舟次豫章三疏乞閒而不得請幡然東下艤棹南康重湖閣夜夢人告之曰死於廬山之下覺而識其事並以小詩謝山神未到廬山日日陰斜風細雨亂雲深移舟夜壑人間世荷鍤春郊物外心要把封疆安社稷誰教軒冕换山林殷勤招隱知深意五老朝來露玉簪寄黄州趙别駕庚辰入蜀舟次黄岡適趙倅竒夫沿檄行邊不遇以詩寄之銅梁玉壘碧雲端尺舸西風兩鬢殘世道多岐今已慣人生一見古來難丈夫不作謀身計巧匠那能袖手看月白風清雪堂夢銀波萬頃卧龍寒兩宋名賢小集巻二百二十七
