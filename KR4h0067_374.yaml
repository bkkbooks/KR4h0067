body:
  text: 兩宋名賢小集卷三百七十四宋陳思編元陳世隆補棣華館小集楊甲字鼎卿重慶昌州人大觀時遊京師頗有聲望嘗仕於蜀旋以事去官寓居靈泉山中有棣華館小集一巻出東郭見山二年不見山見之喜不休舉手三揖之山逺不頷頭疑我墮塵土已與俗同儔稍稍望雲脚下見八九丘近前與之笑顔色漸和柔迎我以松風與我相獻醻憐我不識路導以溪水流豈其終愛余為此世所仇一官最下䇿包裹辱與羞百年在平地亦有一日憂誰能無饑渇往與青山謀合江汎舟莫踏街頭塵寧飲城東水江頭汎船去葦間問漁子岸深魚有家鳬鴈在中沚得酒可以歌得樹可以檥年年舟中客顔色不相似風波無前期遊者亦如此短篙醉時策逺山卧後几老我不耐醒日落西風起遊長松寺宿石門僧舎得露字疾風吹輕衣駕我雲脊路人間一回首驚絶不敢顧鳥投虚無底淼淼不知處蜂窠螘丘垤與世同所騖試㸔一蒼茫誰有不平慮尚憐野僧屋佛面荒苔蠧斷崕劃呀吻洶洶水石怒我來得竒觀拄杖叩巖樹青山有驕色斯客不能句平生二三子慰我一相遇娟娟松間月幽絶亦可度夜闌更小語風逼遺響去酌君無多酒繼以木蘭露宿安靜觀青山轉龍脊矯首西南天上有仙人祠臺殿飛後前下見雲雨興樹色暗平川仙人兩黄鵠乍去無歸年向來道上履人著幾何錢一朝聞羽化悵望空流涎却揮囊中金瓦礫來投捐巖巖化金碧香火通雲煙人間萬事爾旦暮有愚賢而况争奪場轉手分媸妍仙人一回首破壠與荒阡紛紛不足道哀此區中縁石泉瀉幽潔意寂不肯喧夜聞松風涼起坐心寥然與客逰滄浪亭霧回林蒼黄漲落水寒碧西郊好風景曉霽千里色相從二三子埽灑溪上石主人信愛客沽酒炊玉粒揮觴一再行弄此竹間日跳波醉中舞野唱寒外急牛羊歸匆匆鳬雁來一一頺然寄天放不受世褊迫永懐堂中翁回首千歲跡豈無獨往願乃為饑凍逼霜空洞庭野天濶雲夢澤欲窮扶桑枝尚挂滄澥席何當從兹去旦暮生羽翼靈泉道中荒鷄不知林落日明鴉背山行曲折盡稍出喬木外前峰近相向秃缺不可盖泉石微斷續渚澤亦多派牛羊深墟落稚子翳蓬艾稻秧碧剡剡遮隴無疆界今年田大有飽飯我亦快猶慙食無功舉箸再三餲何當磨腰鐮助爾芟䄺稗寒食遊學射山疾風吹沙天茫茫日落未落原野黄山空無人石碌碌路長馬饑石齧足荒臺古林翳雲族何人刳嵓縛層屋當時萬騎填山谷至今拾寳多遺鏃故園山川愁逺目人世悲歡風雨速凌髙舉酒天為蹙手攀嵓樹叩雲木何人唱我悽凉曲興亡一眼冥冥緑埜水平蕪飛鴈鶩臘日逰梅壟得樹字年年㸔梅水西路白頭溪翁眼如故重來攀髯老不死我亦風埃憶歸去酒酣百恠入我腸夜半恍惚與龍遇醉騎一尾天上歸陳迹江頭不知處梅花勸汝一杯酒千歲寒凝真旦暮欲將老大傲風雪穴蟻窠蟲已無數成都萬事更竒古石笋猶疑卿相墓孔明廟前柏千尺神物翛翛泣幽樹它時滅壊亦同歸人生誰能一長顧庚寅再遊霜郊馬頭鞭影西欲尋逺梅無舊蹊但聞艸木皆有香未到巳識花前谿艤舟登岸入梅處竹樹烟靄茆茨低百年死樹蟲蘚暗鱗甲漠漠僵横霓老翁鼻祖頭雪白下見兒女方勝筓數株無力已仆地強起放春花滿畦瘦龍夭矯欲仙去脊尾一半埋沙泥雷公幾時獵幽蟄夜半刀斧來刳刲野人往往多再拜疑有鬼物慿其栖問樵訪牧不知歲齠齔已見今旄倪故人同遊六七輩或似醉阮林中嵇繞樹覔花不識路東邊犬吠西號鷄榼中但有酒清濁寒具野擔勤提携誰言猶是蜀梅菀破丘斷壠山蒿藜種花滿地作痴計隨手變化空塵㙠只餘老樹香不滅力戰風雨猶堅犀何時江村一曲路與子共賦歸來兮靈泉山中小縣相籠合濛濛數百家果蔬争晚市樵牧亂晴沙落日平江迥青山細路賖偶居無事在隨意問桑麻野色山圍盡風煙更可憐客情牛鐸外農事藕花前聚汲松根井寛愁石底泉寧須計升斗詩興亦超然勝地仙靈宅㣲官也謫居焚香他日夢隱几向來書小睡便山雨長齋稱野蔬逢人問無恙滿意説樵漁日下溪林薄芊芊肅晚暉閉門成石隱小水亦生肥醉著谿藤杖歸來木葉衣狂歌有虎兕吾道只應非何處長松寺雨花雲外臺山從百曲轉路入九闗回老檜成龍盡殘柯借鶴來人間斤斧亂風壑夜聲哀靈泉山上晚望野曠樹還亂林深烟更㣲天隨殘日盡雲掣斷山飛玉壘風烟濶秦城艸木非慿髙無限事今夜客沾衣逺目昏難盡青山濶展圍眼花隨處亂雲樹一時飛秋至客愁逺路難心事違更憐人北望不見鴈南歸登待鶴亭横峯亂嶺如奔蛇前者欲起後驅呵危亭獨立一回首天罅雲隙皆收羅手攀落日意不盡目送孤鴻愁更多秋風衣裳客未冷我欲飲酒君當何謁朱真人祠一濯巖下溪再拜巖中庭清風肅然來吹我衣上腥仙人芙蓉冠乗月下雲軿山空雜珮響静夜朝百靈寂寥古壇外但見斗與星青山無行跡霧雨空冥冥兩宋名賢小集巻三百七十四
