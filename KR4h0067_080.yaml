body:
  text: 兩宋名賢小集巻八十宋陳思編元陳世隆補青山集郭祥正字功父當塗人母夢李白而生少有詩聲梅堯臣方擅名一時見而歎曰真白後身也登進士熈寧中知武岡縣保信軍節度判官為王安石所詆旋以殿中丞致仕後復起判汀州有政聲公餘與郡守陳軒觴詠酬酢又知端州棄去隠於縣之青山題所居曰醉吟菴著有青山集百嵗王姥自云平生未嘗服藥不服丹砂不養真老來天與健精神自憐五十頭垂雪始見人間百嵗人代刺訪厯陽孫守公素月洗晴江秋愈清扁舟西渡厯陽城漁翁贄見無羔雁滿䄂盈襟皆月眀遊仙四首漠漠出寒霧悠悠趨太清珠樓被重綃靈花紛素馨青衣捧緑章磨丹書姓名為我横玉笛一奏雌龍聲非塵復非烟氲氲散紫清乃知泠風御翛翛恣遊行忽逢黄金闕云是玉帝京逍遥侍御者不假精鋭兵澡心華池液熏手玉樓香一披寳神經衆真共來翔七言詠良遇至音迭琅琅珍重衞夫人行草記瑤章仙家無四時瑤草常芬芳五岳倐來爾玉鞭驅鳯皇得道迭相度不聞嫉賢良所以心無邪人人自年長春日獨酌三首桃花不觧飲向我如情親迎風更低昻狂殺對酒人桃無十日花人無百嵗身竟須醒復醉不負花上春平生最嗜酒况復就花飲眀月正照人吳姬安得寢更起盡餘杯擊碎珊瑚枕㡬日待春光春光易衰歇流年信宻移誰能保肌髪何須秉蠟炬今夕值眀月但願海變酒拍浮長出没歸來歸去來蓬山有仙闕懐友二首夕陽在窗户凉氣何處來微風汎庭柯蕭蕭厯空階抱琴一寫之氷霜濺孤懷但惜對樽酌而無良友偕聊將幽獨思滔滔寄長淮晚坐庭樹下凉颸經我懷亦有樽中物佳人殊未來佳人隔重城誰復為之儕瞻雲雲行天步月月滿階想聞誦聲作崩騰㵼江淮東湖東湖北溆水相通千里荷花半白紅冷艶已能消酷暑暗香時復散清風欲眠别浦無漁艇且倚踈欄學釣翁雲起仙庭飛晚雨洒然身世出塵籠贈子中修撰承眀厭直下天來聊寄招亭小謝才珠迸玉盤詩得句月騰金浪酒盈杯江城未許民心借京國顒瞻召節回試問行年俱乙亥固應憐我困蒿萊子中修撰叠嶂樓致酒重山複水碧相連勝地欣逢太守賢欲倒樽罍秋色裏故邀賓客畫圖邊丹青迥壓王摩詰騷雅仍兼白樂天莫戀宣城風物美玉堂提取筆如椽次韵陳思道見送之什誰聼袁宏夜半吟一時傾盖便知心疲駑自信難追驥秀木從來忌出林巧匠旁觀應縮手眀珠所得已盈衿嶺頭孤唱思君和著月梅花似縷金六祖大湧泉金鐶一卓透曹溪禪祖心傳上上機流出山腰蒼兕吼涌開池面碧綃飛應同霖雨能蘓旱莫比滄浪只濯衣不願夕陽催我去要隨幽鳥帶雲歸江亭江亭孤坐乆野望眼偏眀映日浮雲薄揺風細栁輕出墻新笋熟拍岸晚潮生遣僕沽春酒幽歡取次成幽居春晚堪行樂幽居獨閉門忘形付詩酒吾道委乾坤壞壁蝸涎亂殘經䑕跡翻交遊今已絶孤坐欲何言水花水畔花饒笑歌枝映小亭日光烘欲醉江色冷還醒淺白渾迷鷺殘紅尚襯萍幽人頗蕭索此地要頻經王元常家蔵鍾隠畫三害圖老鍾筆法何竒古三害精靈一圖聚周生自握蒼精龍白額長蛟甘喪沮危橋跨水壓波濤巨木翻風暝烟霧挺然獨徃知忘軀敢謂誅邪天地助三日生還動閭里千載遺蹤存絹素薄蝕已更人仰之自古賢豪遺細故何獨今人無此人已覺丹青有深趣江南印璽尚如新國破蒼茫畫誰付一圖分裂蔵三家離合悠悠嵗時度只今皆屬丞相孫挂向髙堂邀客顧倐然風雲駕霹靂雨來平地銀潢注珍綈收蔵巻不徹直恐變化復入江湖去謝鍾離中散惠草書丈人行草天下無體兼衆善精神俱少年㺯翰今懸車一幅不博千眀珠墨池翻瀾化鯨魚老木半折傾藤枯霜天一陣來雁鶩荒陂數㸃眠鷗鳬換鵞瘞鶴雖已矣折釵劔舞成須臾心通造物乃神速伯英懷素真其徒邇來作我醉吟賛寳藏二妙歸江湖要將垂法數百載摩挲青玉親傳摹文人善吟仍善奕名譽豈止專能書名譽豈止專能書皎如皓雪盈氷壺溪岸溪岸逢春暮柔條儘意攀輕鷗翔近渚好鳥響空山小艇長欹側孤雲自徃還逺遊成底事白首憶鄉闗客問來時麥未吐今見秀盈畦投穽還遭石登雲孰有梯爾䜛徒似錦吾醉只如泥行止無勞問空山杜宇啼松風夜寂松風度魂清客枕寒琴聲傳不盡詩句寫應難驟雨傾瑤砌真珠落玉盤隱居如可訪吾欲跨翔鸞寓館一徑松隂合重門院落深客來聽鵲喜春過惜鶯吟風月時經檻塵埃不到襟黄庭㸔在手白雪任盈簮深夜四天垂翠碧一水湛星辰寂寞殊方夜漂流片葉身帝鄉勞夢想客路只風塵鐘鼔還催曉深慙釣渭濱石室後遊七星山色碧離離山下空巖世所希不獨霧深知豹隠有時水長見龍歸方牀瑩潔仙人座文石縱横織女機旋剔蒼苔辨陳迹李邕詞翰亦依稀留湯主簿小飲窮荒得見故人稀話舊還驚嵗月飛君有兒孫能力學我無金谷可言歸靈仙觀裏黄柑熟宋石江頭白蟹肥北望何時同此樂暫留行棹莫相違次韵陳文思見寄星灣髙㑹豈能忘萬丈離愁寸寸量東閣賦梅攄錦繡南山射虎凛氷霜功名未得封千户耕鑿何由共一鄉春蕨秋鱸味偏美時聼社鼓醉淋浪次韵林辨之長官送别之什十年相識跡非踈今日江亭歎别車牢落名聲䜛謗後支離形影瘴氛餘從來仕路誰能捨却返家園欲自如烟浪一舟無長物罷官只似到官初謝洪甫黄安中尚書惠雙泉二首北風遮莫阻歸舟公有雙泉慰客愁玉斗貯來雲尚凍金焦傾處蟻爭浮黄花遙想東籬畔白浪正翻南浦頭醉魄忽成蝴蝶夢却尋春色到皇州北風變冷水歸瀯南浦扁舟未得行孤雁叫雲詩膽碎怒濤舂岸客魂驚誰陪髙論應懸榻想有雄詞欲膾鯨病骨支離難強起尚䝉樽酒慰餘生和敦復留題池州㺯水亭我寄江南隠數為㺯水遊讀君㺯水篇感慨攀巢由赤脚踏雲雨投竿玩河洲鷗鳥不見猜飛舞相應酧誰傾百斛珠跳躑無復收一發海客秘爛副貧家求李杜縮光焰王謝慙風流開巻起予興飄欲乗桴浮如觀秋浦圖晚景入兩眸愛之不能捨饑魚適吞鈎嘗置几案間出没窺嵓幽一别㡬何時嵗月已十周跡滯若匣劍綉澀不可抽何當隨君車吟哦與君侔謝胡丞寄錫泉十瓶憐我酷嗜茗逺分名山泉兹山固多錫泉味甘尤偏幸遇佳客便十缸附輕船開缸潄清冷不待同茗煎想君民事休時時造泉邊入碾龍鳯碎浮甌乳花圓一啜未能止七杯誇玉川兩腋生清風飛逐蓬萊仙江心與谷口校之孰為妍欲報吾子惠仍思陸生賢答魏椽招飲我欲招魏子小山嘗白醪月華雖未滿已覺秋風髙何物侑樽酌肥鱸并蟹螯一飲洗百憂軒冕稍可逃此語未及發辱君先見要乃知志趣同盍簮皆後僚亦應喚舞娥紅雲欲飛飄不然避謗傷淡話傾漁樵期歸一酩酊世事如芭蕉和陳椽效陶齋君欲效陶潜超然異冷趣開齋即吾廬欣欣同所慕潜魚不羣遊栖鳥不返顧無意亦無我何思復何慮遂超羲皇上日夕自休裕百年能㡬何不知嵗云莫終當隨白雲悠悠北山去送楊伯玉還京伯玉𢎞農侯頎頎真丈夫首雖峩武弁滿腹藏詩書三年監部兵一日云觧符考之閭井言公亷卒如初未嘗害一物縱捨乃有餘我方卧空屋坦跣與世踈感君數相過晨坐定及晡新詩并美酒問遺無時無老境重可惜逺别復何如羡君五福全客官奚拘拘子孫既禄仕京城富園閭精神趂強健優遊早懸車祝君可以歸為君吟歸與訪林居士門無車馬緑生苔今日軒窗為我開邂逅同為方外客得攜笻杖等閒來白蓮禪師北軒家風清白世相傳自小能吟晚好禪瀟洒一軒無長物荔枝茶品冩遺篇齋公長老卧雲軒雲本無心師亦閒閒身聊卧白雲間白雲不滅身長在時徃香䑓請供還睡起睡覺紗厨酒尚醺老來詩句怯題春冥搜一夜添華髪不認青銅鑑裏人仲春櫻桃下同許損之小飲因以贈之君不見古人悲歌愁殺人一片花飛減却春徑須沽取就花飲暫時爛醉陶天真借令黄金大于斗豈買人間百年夀但願青春永不歸更得滄溟化濃酒朝酌弗乾暮傾弗竭東向扶桑採日枝西入瑶池浴眀月梧桐三尺安足弹重華去矣薫風寒夷齊耻食首陽粟屈子徒佩瀟湘蘭噫吁千古賢與愚同歸一死胡為乎共君極飲旦爛醉指㸃世路皆虛無許損之爾為我滿斟我為爾髙吟相逢莫恨晚結交貴知心坐㸔南山一片霧忽成千里萬里之春隂左蠡亭重九夕同東美玩月勸酒平生㸔月無今宵一亭危在山之椒下瞰揚瀾連左蠡白琉璃地覆鮫綃欲披錦袍搥鼓過世無賀老誰相和屈原憔悴湘水濱夷齊自守西山餓且來登髙望眀月拂拂霜風濯煩熱身心都在清凉宫一㸃無塵光皎潔與君同遊執君手况逢令節當重九不憂短髪還吹帽頭上有巾先漉酒飲醇酒望眀月我歸姑孰溪君赴黄金闕眀年此㑹知誰健細㸔茱萸莫輕别西山謠寄潘延之先生男兒無成羈薄禄日月相推猶轉轂誰向生前悟此生西山山人挂冠速買田築室臨西山時來石上横琴弹千古萬古治亂事一曲兩曲頓挫松風寒門前禾熟醖美酒故人車馬留盤桓榮亦不足貴辱亦不我干但願青山緑水兩不變醉醒自得窮觀玩名落人間非所欲閉門且喜辭憂患君不見李太白朝為酒家仙暮作金鑾客醉裏題詩宫妾扶自謂遇君今古無一朝䜛言入君耳夜郎逺謫吟魂孤到死空言竟何補何如道行及妻子西山人孰可比晴空矯矯孤雲飛欲徃扳援無路岐贈陳懶散懶散翁何怪竒形容磊落似元亮情性孤髙如伯夷靈䑓瑩澈軒轅鏡妍醜莫辨毫與釐生涯只寄一壺酒萬事掉頭予亦知或乘爛醉説儒佛風雲座上騰蛟螭顯晦自任不可測頭角變化將有時驚人一鳴冲天一飛豈能齪齪事小隠堯舜君臣方有為嬾散勿懶散石渠金馬須翁馳和倪敦復觀梅二首聞説觀梅借燭光今宵為我更開觴月來枝上氷生艶風過梢頭玉有香羌笛㡬聲傳舊曲菱花一夜照繁粧坐中老杜凌何遜索酒題詩思欲狂江月江梅鬬冷光就梅臨月舉瑤觴素娥未許風搖影青帝寧容蝶採香迢逓一聲羌笛怨輕盈千㸃玉人粧出塵標格情多少東閣曽令杜甫狂題方處士巻尾子陵獨徃已千年處士重來把一竿治亂不同非我計文章聊許後人㸔璞中美玉誰彫琢潭底神龍㑹屈盤七世有孫方遇主風流長在㵼驚湍重陽懷厯陽孫公素太守重陽應與客登臨隔水無縁預盍簮濁瓮撥醅初汎蟻佳人纎手鬭挼金南來縱有鷄山賞北望頻興魏闕心安得快風吹我去勇提椽筆伴君吟公素送酒復次前韻和答惨别城東秋未深相思白髪已盈簮逺分酒味須頹玉正是秋香欲散金潤澤生民公有志浮沉末路我無心扁舟眀發穿南斗聊學滄浪漁父吟送賈眀叔侍御守宣直節忠言乆不聞堂堂今見賈生孫老姦去位朝廷正聖母憐才德業尊句水曉光塵不染敬山秋色玉無痕北樓把酒頻邀客紫詔傳呼下國門碧溪亭山光與溪色一碧㵼雲中倚檻乆未去更聽松上風月安得妙畫師畫取眀月夜將期月暗時展向松窗下自釋二首去日不可追來日已無多衰頹復自念遷謝當奈何賢達并愚賤百嵗同消磨不如詠觴酌徘徊盼庭柯流翠自成幄好風時經過憎愛理兼忘虛淡神所和運盡即隨盡葬骨南山坡遭時如堯舜擊壤歡且歌歸田尚叨禄天寵固已多敢復邀長年萬景隨流波有酒即觴酌風日眷清和俯悲秦晉士含饑避干戈題化城寺新公清風亭用李白原韵唐時升老亭剪棘今重開南瞻峨嵋闕北峙凌歊䑓新公將家子為僧亦多才譬彼獨鶴唳安用羣鷄猜或彈玉軫琴傾耳濯纎埃清風不知處冷冽時時來吹雲雲窈窕吹月月徘徊幽人許共賞渇心咀珍梅了然得真味塵魔自崩推令姪人豪杰書名駭奔雷其姪冲雅善書禪談屢終乆茗酌無餘杯還歌太白篇事徃良可哀古今倘同轍浩氣不寒灰追和李白姑孰十詠姑孰溪源從丹湖來奔流朝北極雙橋跨長虹千艘濟民食月華動清曉岸栁揺行色文王未出獵垂竿人莫識丹陽湖湖光際長天永日微風止菱歌一舟去雪陣羣鷗起荷香迷近逺秋色瑩表裏試問賀季真何如鏡湖水謝公宅山腰存廢址昔是元暉宅林藏幽鳥聲月㺯野棠白髙賢百年盡遺事千古積此興欲誰論摩挲問磐石凌歊䑓髙䑓築千尋勝景供逺目雲烟䕶城郭吳楚接川陸不知歌舞散雌鳯叫空竹鬼火照殘碑應有精靈讀栢公井環宫鑿九井井深泉不竭舊甃缺瓊瑶新苔荒嵗月重吟太白題興自相公發我欲喚嫦娥團圓伴澄澈慈姆竹一種碧琅玕攢根繞蒼島濃隂不透日宻幄得春早笙隨緱氏仙釣入磻溪好欲識化龍蛇唯應雪霜保望夫山登髙望天涯化石與君别秋鬢霜露深春山薜蘿發旅雁只空飛悲咽長不絶行客歸去來芳心可休歇牛渚磯長江㵼危磯雷怒安可向烟雲忽藏月鯨鯢互噴浪朱衣吐犀火丹青豈能狀引杯聊醉吟徑卧巨鼇上靈墟山仙人赴金闕靈墟躡髙路空見白雲飛想乘黄鶴去月冷步虚壇苔深煉丹處塵寰欲何為光隂等閒度天門山巨靈擘蒼山勢分金闕對月引曉嵐交江翻寒影碎雙鳬落人間千㠶出天外我欲往髙吟凌虚踏煙靄送錢朝請還䑓銓選相逢弱冠前竹符分得各皤然開樽且喜君尤健問舍應輸我最先北上有心思報國南來無物載歸船氷清世澤源流大須享人間五福全蕪隂北寺檜軒青幢碧盖儼天成翠色濛濛滴畫楹禪客自陪千嵗老遊人時把一樽傾耻隨桃李春風短奪得松篁夜氣清安有鬼仙提巨筆不容左紐獨傳名病中先寄慎宰閻公達承議松檟相望孰俊名髙才暫屈浚蒲城公庭寂寂無留訟四野熈熈有讓耕未作鹽梅調鼎鼐且鏗金玉直蓬瀛病骸尚阻趨東閣懷抱思君為一傾陪朱行中龍圖飲澄惠院二首寒烟淡日滿滄洲䑓榭相通一徑幽志欲吞吳嗟隔水力能存魏宻藏舟紙窗趂曉開黄巻蒲葉涵春付白鷗千載廢興何可問一樽濁酒更遲留島嶼回環水遶堤碧蘆青荇宻相依凌風戰艦知何處落日遊人尚未歸細細佛香時入座雙雙沙鳥静忘機使君自是蓬萊客倚遍䦨干戀翠微小池白鷺白鷺白如銀窺魚意思馴此中無彈弋莫厭徃來頻兩宋名賢小集巻八十
