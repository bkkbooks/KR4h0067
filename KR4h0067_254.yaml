body:
  text: 兩宋名賢小集卷二百五十四宋陳思編元陳世隆補竹齋詩集三裘萬頃送范光伯北行玄冥將歸休勾芒已促裝江邊疏栁青江上寒梅香有客當此時中流駕風檣欲學太史公窮汶泗沅湘吾聞帝王州雄麗幾錢塘疇昔駐大龍至今繪未央鷺洲橫渺瀰鳯臺摩青蒼名山與大川往往遙相望是間或小留不妨日徜徉平生學屠龍袖手五字章兹逢賢主人定知奏宫商追李逐杜陵相與升其堂要令千萬篇金薤垂琳琅秋風鴻雁來因之東南翔寫君磊落胸慰我離别腸安樂窩示元德弟二首往時病僧寮今為安樂窩昔病而今安所得良已多百年直須臾一丘且婆娑倦翼栖茂林潛鱗渺重波方欣隨所願豈復知其他朝來啓南窗羣山鬱嵳峩上有無心雲乘風逺相過却觀聲利場紛紛正橫戈到頭蠻與觸勝屓能幾何曷若休我心考槃依澗阿孟夏草木繁雨餘氣清和四壁環斷碑經史宿星羅幅巾坐胡牀翛然自吟哦因之成此詩要使兒童歌清泉出石竇白雲卧山窩淋淫乍開霽原野歡聲多君廬近西峰其下林婆娑解衣坐磐石持竿釣清波主人忘機心鷗鳥亦無他東魯與南郭泰山等峨峨周人何人哉自許不啻過一朝離草堂山英遂橫戈折轅不得還如此俗駕何仰視前修翁鉛刀比太阿余弟山林人心平氣自和歡然樂簟瓢笑彼葷羶羅好書不厭觀佳句時一哦煩賡紫芝曲為我醉時歌題余仲祥松齋芳妍桃李場紛趨􅘒成蹊長松坐偃蹇遂爾不見知平生異時人不與俗轉移蕭然塵埃中擅此丘壑奇窗空境逾清四壁風來吹抱琴揖蒼髯喜氣掀兩眉臭味既與同相親不相違真期閲嵗寒可但忘調飢斯正如乃翁佳處更過之直比千尺幹歷落不受羈只恐大厦成梁棟各有施出處初何心山靈勿疑渠贈拂雲主人十年作計須種木一日不可使無竹道人于此得三昧緑霧中間著蒼玉拂雲誰為名其居我亦同心雲卷舒相期直覔飛霞佩不用重拈種樹書次余主簿仲庸梅韻春醪欲氷木欲折急雨風吹不成雪玉妃夜墮廣寒宫開作寒花賽清絶未須千樹種山巔且要幾枝橫水邊暗香疏影尚無恙憑誰喚作西湖仙不妨琢句更馳送一洗十年塵土夢鐵心元不為渠回眼底珠璣聊簸㺯偶成松徑煩風掃柴門為雨扃行携道人集坐對敬齋銘好事心常記間談耳不聽觀空為時誤無異醉初醒老屋老屋久欹側隨宜聊拄撑吾今且共住緣盡會須行雨打從教壞風搖不用驚世間虛幻相聚散本無情留淺沙故山豈不好蕭寺亦堪居作意多成礙無心始自如鐘魚飽香積枕簟熟華胥但惜詩成後旁無阿買書寄題喻髙士淡軒世事邯鄲枕生涯老子書能知淡中味雅稱竹間居石徑排雲入霜根帶月鋤紛華不到眼贏得玩清虛晚步日落欲閉户風清聊杖藜千山猶帶雨一徑已無泥㶁㶁水聲急悠悠雲影低催歸緣底事著意傍人啼榮姪試周汝生方滿嵗伯髮已星星桑苧甘投老蘭蓀喜向榮席間無一印帷下有諸經莫學魚兒戲來年快聚螢次王成之韻誰遣氷魂照夕陽搖搖一任北風涼眼前共有幾多蕊鼻觀胡為如此香佳實會須歸列鼎孤標已自壓羣芳鴻毫我欲從君賦未害平生鐵石腸兀坐有感忘言編簡倦三復適意絲桐聊再行已共白雲論久要更尋青鳥問長生按行泉石苔侵履披拂松篁露濕纓此事洪崖我知舊歸歟端合與同盟有感正爾雙泉憶舊逰排江聞又有歸舟誰能不作千年調夢斷真成萬事休傾蓋向東情莫逆生芻無計淚空流重雲已失鵾鵬影愁絶滄浪一白鷗送張髙安入京青衫十載蟾宫客黑綬三年鳯嶺頭循吏聲名陽武今故家風味富平侯江邊休嘆雙鳬去天上行看一網收入簉鵷班立仙仗莫忘回首顧沙鷗用黃子益韻二首青衫日日困塵沙安用浮名與世誇已過半生真是夢未荒三徑且還家恨無沉水紆香穗喜有寒泉瀹茗花袖却西歸遮日手園林幽處看桑麻睡起忙然思慮少病餘猶覺應酬艱招搖風月聊須竹收拾雲煙幸有山但要世緣隨手斷莫憂詩債幾時還追奔富貴非吾事且占林泉一味間寄劉擇之新居成西風吹雁過我廬特地傳君一紙書九載不須論舊事萬金良喜得新居春回院落花侵座雨過池塘水繞除我欲退之門下去却愁無處覔金魚題懷秀堂莫教滿地長莓苔杖履從今日日來曲徑隨要松巷轉柴門須對石橋開牆頭花木因時種案上圖書任意堆幸有林泉可投老忍將雙腳踏塵埃竹齋述事夢魂驚斷眇難續卧聽竹裏風冷冷寒蛩爭鳴繞四壁缺月半墮橫疏櫺平生細字髮欲白午夜短檠燈尚青稻粱作計吾不願願學滄海鴻飛冥大雪次前韻五首雨師風伯妙天機幻出乾坤一段奇曉對青山渾似畫夜看黃卷可忘飢金貂換酒非吾事鐵甲屯邊正此時漠北殘魂應凍死書生猶賦采薇詩天孫雲裏散支機飛墜人間分外奇勾引芳樽留客醉栽培玉粒療民飢幅巾籬落尋梅處一舸江湖釣月時妙處惟詩可摹寫却憐老去不工詩誰扶天女下氷機剪水成花片片奇影落池塘波不動寒侵鷗鷺色皆飢縱橫萬舞風回處表裏雙清月霽時浪戰未能無寸鐵對人羞誦醉翁詩伊人元不墮危機踏凍衝寒正自竒只怪飛花無處避都忘炊玉有時飢月明剡水回舟夜嵗暮梁園作賦時一段風流誰得似只今王謝却能詩誰知天巧出元機但怪飛璚過眼奇瞑立風枝寒雀倦愁吟水谷曉猿飢蘆花洲渚月明夜栁絮池塘春暮時此景人間不長有寫真傳影正須詩題小桃源半月池邊倚瘦藤望仙臺上岸烏巾塵埃一點不到地花木四時長是春載酒豈無好事者爛柯應有著碁人請君更種桃千樹凖擬漁郎來問津次伯仁善利閣看經堂中鐘磬鳴看經堂外水雲清山連逺渚鳥飛急風入輕帆舟去平煙樹不妨留夕照塵纓正欲濯寒泓憑誰為我問造物乞與少陵常眼明挽霞溪髙縣丞二首少年挾䇿上金鑾三拜郎官鬢未班不説知音在霄漢但知投老向雲山栁絲陰裏陶潛樂花錦香中潘嶽間逝者不堪人事異洪崖亭下水潺潺公家元在洪崖宅自是洪崖向上人嗜酒一生真簡淡風標八表更精神紛紛偶厭人間事去去歸尋洞裏春朱紱只今無覔處但餘佳句鎮長新九齡弟寄悲秋四詩因次不到青雲志未休近來何事却悲秋短檠雙目元無恙快讀詩書莫浪愁圖書繞屋未為貧想見長吟日閉門西社諸公久寥落不知招得幾人魂幸看平生古戰場不妨髙卧到羲皇一朝冀北空凡馬須信驊騮道路長支離病骨怯初寒眼底清愁更萬端勉和新詩寄鴻雁江城夜月覔君看余既得烏石岡西望葛壇在雲霄中相去雖逺山勢不斷林木歷歷可數異時乞靈仙翁不難矣喜而成詩寄葛壇主人東西知隔幾牛鳴山勢綿綿若引繩待向岡邊結茒屋幅巾遙禮夜壇燈寄張仲符時得烏石岡地二首今人那似古人賢一鍤隨身日醉眠此老有靈應笑我區區常費買山錢寸田尺地可長久此訣劉郎却未傳他日馭風蓬島去漫留陳迹在山巔次敬叔韻二首玉鑑氷壺一段清鐵中誰與鬭錚錚眼看萬里雲霄路不信驊騮地上行别我新詩有許清玉聲金韻兩琮琤筆端定有翻三峽乞與餘波賦贈行次李司直韻二首老來方欲卧林泉一躡紅塵只自憐己與山靈有成説秋風歸騎急加鞭清虛絶迹竟何為自笑平生頗好之正路倘非君得似冥行未免用多岐别胡仲立次敬子伯量二丈韻二首修水相望無百里從來人物勝西昌𢎞齋自是朝陽鳯伯仲行看接翼翔乾枯如我真何用漫結蒲團竹椅緣緘口向人無一語此燈他日遣誰傳次余求之坐間所賦地僻不聞車馬閙官間但覺屋廬深擺除詩債寂無事一炷爐香觀此心酬余求之二首枕中久已黃梁熟鏡裏徒教白髮垂但得漁樵分半席此生何必要人知雨後輕窗無一塵窗前松竹更清新不妨踏遍莓苔地遺我青鞋有故人錢仲庸主簿入京三首風帆轉眼即長安好在交逰半達官既有王陽知貢禹不妨乘興一彈冠孤山梅蕊正開時杖屨還須訪水湄莫遣氷魂嘆牢落只令和靖自吟詩野梅官栁只供愁空倚鄱江百尺樓待倩天邊幾鴻雁為傳消息到皇州别曺教授三首一嵗與君三别離盍簪此去定何時梅花未必堪相寄待倩郵筒寄小詩從渠栁色自青青莫為行人賦渭城只恐南牆舊時竹誤隨風雨作離聲江花岸栁太多情長逐春風管送迎我亦思歸歸未得夜窗愁聽杜鵑聲次吳長文見寄時有衡山之役夜半詩成欲寄君夢魂飛渡楚江津怡怡前日如兄弟今作東西南北人次吳司理見貽二絶韻未全得喪日悲歡內樂知誰夢見顔君看上池無限水不將涓滴到人間湛然胸次幸清明忍看人間勢利輕我輩相知端有道未應膠漆付雷陳寄題真愛堂三首終南佳處暫栖遲堪笑唐朝左拾遺渠但借山為捷徑山中滋味豈曾知真實愛山今有誰此心猿鶴亦難欺看來却是朱居士不愧昌黎五字詩築堂誰不要看山往往襟期了不關欲識此翁髙絶處一心長在白雲間安樂窩三首天闕飛來三大字雲山留住一間身老仙駕鶴蓬萊去丹竈而今屬後人孤山嘗試一登臨歸夢紛然繞故林箇是平生安樂處清泉白石總關心生來嵗晚寄南窗燕坐常聞御墨香却笑到天亭上客日將茗粥攪枯腸有感二首絶憐修竹知人意更愛雙泉不世情回首舊逰渾似夢却因多難悟無生三四知音總道山荷鉏吾獨在田間人言病驥猶堪秣伏櫪何心十二間髙安别蘇野塘三首獨立每憐陶靖節北窗終日傲羲皇如今我亦無儕輩逺把心期付野塘胸中泉石真成癖紙上雲煙總是詩分我魚舟三四箇故山歸去弄漣漪交蓋才傾便話離絶憐立馬送君時梅花未必堪相寄待倩郵筒寄小詩題希亮畫晚牧歸來月在山夜深茒舍不勝寒栖烏欲動催翁超快傍煙汀把釣竿題昭君圖紛紛爭賂毛延夀今日丹青竟不傳萬事無過真實處後人贏得寫嬋娟題老梧畫卷四首中興以前作山水只説李成與郭熙誰知淳熙有此老健筆不減巨然師吏隱三年楚水頭每隨鳬雁􅍻扁舟歸來喜色驚鄰里分得瀟湘一片秋何處移來一川竹空濛煙霧襲人衣其間應有葛陂杖時出林稍帶雨飛謖謖風前荷葉枯搖搖霜後蓼花疏舂鋤舊有江湖約數輩相依正要渠窗前古槐二首密葉繁陰畫不成捲簾雙眼為渠明人間炎熱無來處贏得軒窗分外清去嵗西湖避暑來藕花無數眼慵開而今歸卧洪崕側看盡飛泉看古槐題針得羮字韻一寸堅剛鐵琢成綺羅叢裏度平生看時稚子敲成釣釣得魚兒便作羮題箋六七葉廬秋雨裏兩三箇雁夕陽邊青天萬里渾無礙衝破寒潭一抹煙簡瑄上人千里歸來覔故林朱絃雖在少知音春風玉几山前路忍負平生一片心簡瑄上人借楞嚴經石室雲山鎮日扃午雞啼處睡初醒案頭尚有爐熏在試讀楞嚴一卷經題瑄上人隱室閩浙相望兩道場上人曾竈室中香直須了却舊公案莫向空山便隱藏題破塵讀經所試為衆生破一塵出經為筏度滄溟持渠到岸無驚畏復破微塵納此經兩宋名賢小集卷二百五十四
