body:
  text: 兩宋名賢小集卷二百八十四宋陳思編元陳世隆補庸齋小集沈説字惟肖龍泉人寧宗時為仁福邑尉晚年卧病不出營别墅以居田衣山履不入城府故其詩有云蚤辦山中計吾今省俗緣又云江湖成夢事投老屬山林有庸齋小集其詩一洗濃厚肥腯而出以清淺之筆時有雋永句令人尋味不厭立秋昨日午時秋西風夜轉頭吹來溪外兩藏却樹間樓暝帶棲雅色涼催客燕愁一樽吟未了衰鬢早颼颼仁福道中山徑少曽平人煙隔隴青淺流分石渡低樹礙輿行稅籍全編户村童半壯丁我來官此地三度究民情偶成讀罷黃庭一卷經磬殘煙冷夜壇清月明何處人開户驚起松梢睡鶴鳴征途桂管三千里征人一寸心自從登驛路幾見換鄉音古樹春隂薄寒塘野水深渴行呼得酒瓦碗不辭斟暮春燕翼初乾渌滿池桑隂收盡麥黃時一年春事又成夢幾日愁懷欲廢詩料理病身嘗藥遍揩摩睡眼看書遲翛然獨倚闌千立花下貍奴卧弄兒紙衾三首碎搗霜藤月下砧清泉㵼出簟紋勻老翁採菊歸來晚剪得山南半段雲繭面新乾帶露柔春回斗帳伴吟愁殘年已辦蒙頭過風雪從教打戍樓一幅新裁碧澗冰野人留客宿雲層山房却好松醪熟夜半無眠話葛藤春詞水漲寒溝栁又隂小窗風度一聲禽若將離緒縈春事片片飛花是客心送何𣙜院之官金陵分司陪宰掾賜勑帶朝銜見説成行李無因别去帆秋風石城路夜月雨花巖料有驚人句鴻邉寄短函溪樓心逺俗塵隔樓髙野興多稻花黃雀雨山影白鷗波灘澀推船上橋危挽客過日斜欄倚遍無句奈愁何寄張永堂浙江風浪濶夢不落吟邉書到知何日君歸想隔年才髙朝士重命拙故人憐早辦山中計吾今省俗緣煙浦煙浦殘雅舞夕陽風枝病葉似初霜眼中秋色十分淨沙外寒流一線長溪女得魚烹碎白田家收榖晒新黃偶尋野趣歸來晚草際螢花點點光渠流岸石濕黏萍一渠流水清每來疑雨過少立見魚行樹隔炎歊逺橋分午影平主人契幽事客到出相迎安石嶺茅屋雞聲勘夜分杖藜挑月帶餘醺不知身在孤峯頂回首人家盡白雲縉雲道中去作京華客離家此月前問程恰中道類日近殘年山雨易成雪村雲疑是煙僕行愁不進添乞去聲酒漿錢次韻立方何園春事覺垂垂春行似後期草根花片積人語鳥聲隨酒病因過量碁輸為好竒欲歸愁路逺月色若為私次韻永堂鶯聲未改春葉底一蟬新幻境老無夢醉鄉詩有神整巾因把鏡懶語怕逢人似此衰遲者勞君料理頻古樹古樹被青蘚蟠溪作卧龍窮冬不蔽日入夏却生風枝少禽難托根空蟻聚封幸為斤斧棄得老雪霜中買舟租得舟如葉低低半搭蓬僅堪容野客還喜反漁翁溯水斜分浪懸崖送鬭風去程應不計且泊槿花叢明融盆池二首涼入湘簾影半開小窗午枕夢初回蕭踈數葉秋菰上也解聲聲報雨來老瓦盆深漾細萍雨多流却半爿青夜涼偶出庭心看缺處光涵三兩星聽雨耳根聽不歇滴滴冷於秋疑是山翁醉巖前枕瀑流晚春白頭何計是生涯日日樽前卧落花緑滿池塘無一夢夜來風雨過誰家贈段琴我琴未絃時渾然心與耳自從識開指反為琴所使清風千古曲雪澗敲寒玉誰能繼此音蒼梧泣修竹食梅兒時摘青梅葉底尋彈丸所恨襟袖窄不憚頰舌穿我年不自覺以我齒尚完嘗新試一薦喉棘眉光攢豈味不悅口豈老難強餐人生煎百憂算梅未為酸秋詞雨放涼飈晚復晴小窗人亦共秋清月華網在蛛絲上錯認踈簾挂水晶閨詞二首密幄香燒錦瑟橫佳人半醉覺寒輕忽思塞下新畨曲彈作黃蘆孤堆聲冬事侵尋渾未知隔鄰聽得理寒衣驚心步出庭西曲日影斜斜木葉飛馮公嶺曉上馮公嶺艱難見客情雨和殘葉落身逐亂雲行野店山腰出秋泉石罅生若將世途比此路更為平山中秋興山户少曾扄居貧易得清秋衣和月卧溪茗襟雲烹學字書紅葉看騷些落英從他頭早白心事總和平别墅野舍清溪曲連茅接樹隂呼童鄰錯應貰酒婦同斟落照收殘雨寒煙出寸岑江湖成夢事投老屬山林次韻古愚立冬日觀鞠間繞籬頭看菊莎深黃淺紫自窠窠清於簷蔔香尢耐韻比倚蘭色更多九節翻疑今日是一樽未覺晚秋過從教白髮須簮遍且任當筵作笑歌竹色竹色留清睡薰風晝一簾懶因人事少病覺老顔添聞檻臨昏鏡齊書補墜籖晚蟬聲欲斷新月到虗簷曉色曉色闌干外修然一欠伸雨中無過鳥煙際有行人樹濕清隂重沙坍潦漲新慿誰借蓑笠整釣傍溪鄰薌溪途中天風吹落日秋色上遙岑倦客未投館棲鴉已滿林妻孥非逺别歲月易驚心市酒不成醉新蛩助我吟雪凍項縮如龜茅簷賦雪詩冷於初下日好是未消時樹重高枝折窗明曉色遲忽思溪上路擬借蹇驢騎遊真巖一徑入松林真巖峭莫尋山空泉自落日出地長隂鶴去仙臺淨丹成古井深殘碑看未了屋角囀幽禽送周堂長歸慈溪寄何贊府慈溪隔楚雲問下接鴻鱗因送還鄉客重懷涖邑人海明看出日山曉倦行春料得雙松下吟成瘦鶴身遊化雲山入門松作徑步步接秋隂山帶孤城起雲歸古殿深隔池聞鶴唳倚樹看僧吟笑指煎茶處青煙出竹林題黃止菴詩集燈前幾寒夜編得近詩成對客時許看歸囊喜帶行風高霜鶻健未落澗秋清吟到無吟處蕭蕭白髮生釣臺山東江流起素湍羊裘立盡暮雲寒早知釣餌成虗設多却當時一釣竿西湖獨步平湖開霽色寒碧照空心小立背橋影緩行隨桞隂幾年勞逺夢到日記曽吟荷蕩成菱地蕭蕭秋意深送何水竹需次入剡易齋赴浙漕弟兄聮騎出秋色赴行裝慈水瓜應熟孤山挂又香對牀村店寂起飯曉燈涼到日分吳越江流兩岸長南坡不以科目自纍而以風雅自鳴請余為賦鳯銜科詔出祥雲底事儒林有逸民四海聲名難著我一坡風月正宜人鏡留白髮非遮俗家釀黃柑可接春只許詩朋自來往素袍青履華陽巾雞鳴雞鳴霜葉下月在紙窗寒客路千家曉山居一枕安秫收催歲釀韭種接春盤縱有少年夢其如心事闌寄永堂落日照江東思君訊便風棲遲定何處約莫過殘冬小隱時曾到安書久未通自憐心易老盤屈似寒松送觀過免舉赴省樽酒逢臘近行李獨西征事厯風霜慣春回雨露生一經家自學千佛世題名昨夜瞻奎宿寒茫萬丈明茅簷茅簷夜雪曉開晴自洗寒衣漉澗清如此過冬何不可梅花休笑鬢星星冬半歲逢冬欲半心事更迢迢細雨寒窗閉孤燈長夜挑逺書如夢寫新酒帶愁澆明日有幽興尋梅到石橋挽鮑監鎮一紙辟書馳華年發軔時排雲何不到殞露遽如斯幼子未知父偏親反哭兒有書來謁些忍淚看埋碑送何仲逺適越因之官霅水樽酒沙頭緑漲波事歡其奈别愁何去程想憩蘭亭竹到日須看霅浦荷年少莫嫌官職小名高却怕薦書多臘前擬作孤山夢還許扁舟載雪過簡桞濬卿一别竟三年相看事宛然旋添新算髮猶聳舊吟肩紅日征途外黃花喜氣邊不須勞記問姓字有人傳算一作蒜秋溪迎月步秋溪蘆長與樹齊水光連漢近夜氣壓山低岸隔呼漁渡林踈見烏棲酒微風力徑歸袖冷凄凄兩宋名賢小集卷二百八十四
