body:
  text: 兩宋名賢小集巻三百五十六宋陳思編元陳世隆補古遺小集韓性同字伯循别號古遺與陳石堂同里而及其門入元不仕岳王墓妖星隳地芒角赤龍劍悲吼風蕭瑟中原王氣挽不回將軍一死鴻毛擲秦家小兒真戲劇播㺯造化揺樞極指讐為親忠且逆隻手上遮天眼碧九重茫茫隔天日無由下燭臣愚直臣愚萬死不足惜國恥未湔猶憤激古墳埋寃血空瀝西風年年土花蝕我恐精忠埋不得白日英魂土中泣請將衰骨斵苔痕獻作吾皇補天石翠屏霽雪寒林静對展翠屏六花糚㸃風景清四山簇簇瓊瑶樹恍然照映芝蘭庭寒生晴光色爍爍含輝照耀銀海明巉岩石化崑山玉負暄猿猱出深谷可憐不老山白頭梅萼藏春暗香馥紫陽留䜟歌翠寒中有玉人在其間道傳前聖發未發教開来學難亦難豁然胸次冰雪釋白照紅日上團團蓬萊飛峯海上神山名自昔来去隨潮無定迹天人俯覽念虚浮六鰲頂戴窮神力羣仙貝闕蕊珠宫多種瑶芝瓊草碧依然根著不堅牢飛入石堂作南壁螺紋蠣迹石龍存雲氣随潮時雨濕仙風䬃爽生羽翰招納霓裳羽衣客試登絶頂望五湖髙樓洞天纔咫尺藥爐灰冷多登真九轉丹成人未識雲間鶴迹託来篇王鄧真人久相憶碁盤仙迹唐山絶頂碁盤石戲局流傳名自昔殷勤細問白髪翁云是仙人曽對奕苔封石磴不敢移竹引清風時拂拭箇中黒白子不留想是仙童為收拾又不聞樵採之人王子質邂逅仙人執手談贏輸未决藏機密貪看柯爛不知時少憩山中方七日誰識囊中日月長歸来塵世無相識雙柱擎天白鶴岩嶤枕江曲接岫連峰衍林麓石堂峻峭萬山雄擁翠亭亭多喬木雙撑石柱峙東南勢力擎天名不俗鍾英特産棟梁材不墜簮纓美如玉左接蓬莱右洞天峰前水帶縈九曲依然幻出武陵源擬就峰傍新卜築鶴歸錯認華表存應笑世人枉追逐兩宋名賢小集巻三百五十六
