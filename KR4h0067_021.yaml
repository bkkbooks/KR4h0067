body:
  text: 兩宋名賢小集巻二十一宋陳思編元陳世隆補草堂集書逸人俞大中屋壁羡君還似我居處傍林泉洗硯魚呑墨烹茶鶴避烟閒惟歌聖代老不恨流年每到論詩外慵多對榻眠送文兆上人南歸油油成獨自誰滯復誰催住笑雲無定歸嫌水不迴瓶惟添瀑布杖只卓莓苔如此真行脚餘堪我靜咍述懷東郊魏仲先生計且隨縁任嬾自掃地更貧誰怨天有名閒富貴無事小神仙不覺流光速身將半百年和宗人用見寄兀坐幾忘形柴門夜不扄稔憐丞相雨瑞愛老人星妻識琴材料童諳鶴性靈逺山延頸望踈竹枕肱聽祖業存圭竇年支有茯苓閒身寄精舍狂跡在旗亭飬藥依丹訣嘗茶騐水經何時得相見靜話向松庭送進士孫磻赴舉半生飬鈍向棠郊此去深宜奪錦標莫嘆遷鶯方出谷即㸔一鶴迥冲霄送詩吟恨氷生硯别酒攜從雪濯瓢驢蹇童羸山路險他時貴不㤀今朝送王闢太傳赴闕呈劉正言吟坐俱頭白分攜重愴情才堪親帝座貧不似官行曉霧迷山徑秋霖破驛程惟應劉小諌到闕喜相迎酬和提刑王國博見寄兼謝惠竹簟召伯城邊勞夢想滕王閣上動詩心閒思巳隔江山逺老别䢷堪歳月深三徑出稀青草合雙眸望久墨花侵翻嗟珍簟雖蒙寄早晚同將坐卧吟寄贈西川御史薛端公益州同理劉大著陜路運使臧殿院梓州提刑唐察院四賢同在兩川時不獨民間鬬察㣲蜀魄血流啼亦少巴猨腸斷呌應稀文君酒㫖停紅斾神女雲從惹繡衣雪盡沈寃題盡景齊㸔詔向十州歸送薛奎殿院赴闕謫監陜郡滯賢才清雪忻將紫詔開緩步未親龍扆去迴車願擁隼旟來辭家得得過山徑送合迢迢到栢臺秋霽山川行色好乗驄䇿蹇恨難陪薛殿院將赴闕先歸絳臺迎覲不妨赴詔暫歸寧躍馬惟消兩大程七十嚴君千萬里綵衣爭似繡衣榮謝孫大諫惠茶盧仝曾謝諫官茶枉作長歌任過誇爭似君今相惠者分從京口送村家贈華山何學士致仕累表乞眠雲明君始許君三峯同鶴住半俸與僧分益壽藥難得朝元香自焚承家多令子冠葢世紛紛依韻和馮亞見贈君向城中住淳風想獨還相逢多解夢不見少開顔期約同尋藥商量共買山羡余庭際石重疊蘚㾗斑贈薛田察院兼呈劉大著居喪貧御史家近亦難歸却恐詔起復如何贖繡衣僕夫潜去盡親友頓來稀惟有劉東觀時時扣掩扉寄贈河中孫大諫兼簡劉大著李瀆處士暫出皇州路不賖莫同夢得動容嗟雙旌况鎮重華國五府猶為大尹家劉曜卿方知屬邑李長源舊寄生涯劉煜字曜卿李瀆字長源相逢應是星頻聚豈獨河山勢可誇和詶孫大諫見訪之什冬日開門忽似春溫顔和氣接如親貴能尚故尋村叟醉誤猶呼作舍人茜斾穿林行蘚上椹袍拂石坐溪濱仍留雅詠酧雖晚每㸔長先整角巾送賈注歸蜀將為千名入帝都却言歸隠蜀鄉閭水抛丹桂辭京輦深入青山待板輿囊裡幾般仙藥草杖頭數巻道經書相門親友欣相羡富貴終難復舊居長安龍圖陳學士寵示重陽日翠㣲樓上見覽拙詩之作兼蒙寄翠㣲樓長樂亭二記各述一絶紀而謝之京兆重陽大尹家翠㣲樓上賞黄花秦娥應是停歌吹㸔我詩狂到日斜翠㣲樓斗城誰建翠㣲樓富貴陳家小狀頭和記從今為四絶鳯毛玉筯與銀鈎長樂亭長安長樂古來坡新創離亭景致多從此祖筵休别唱記中自有斷腸歌和夏臺知縣李尚賢殿直見贈咫尺縣前山陽城舊掩闗兩衙公務靜三載使星閒雲入司房暗苔侵界石斑曾為攀桂客多謝訪林間送王專著作之任犀蒲西川宰字選清强東觀修文輟佐郎濯錦江邊趨郡府浣花溪上問封疆半年訟必消民境數月歌應徹帝鄉百里舊聞風物好公餘遙想入篇章送張子臯推官赴闕閒想何人得似君泛蓮難滯五侯門風清自是神仙客雅淡誰知將相孫寒籟忍堪飄别曲秋霖那更洒離魂青春漸上青雲去後會應難向水村次韻和酧洛下宋京見寄聲名獨步向西都主將風騷敵亞夫龜洛泛應隨釣叟龍門遊想領生徒公車未召身猶散相府深知道豈孤可惜春時還不見眼前花卉漫芬敷知府石太尉閒抱瑤琴榮臨圭竇燒笋供膳刻竹題名因成二絶紀而謝之分茅人忽到茅齋踏破溪邊萬㸃苔却恐歌鐘喧靜境隨軒只背古琴來笋就林燒厭八珍烟為翠幕草為茵功臣名姓留何處自把金刀刻翠筠池上閒詠㣲物滿池塘閒㸔向夕陽草蟲腰盡細水鳥嘴多長科斗漁翁字芙蓉野客裳詩成堪寫處蓮葉碧牋香送縣宰王希之闕下到任預憂替替歸貧類初離情似芳草逺道逐征車遺愛還留記行裝只擔書將來好官職願載此間除寄唐異山人不見琴書友相思二十秋能消幾度别便是一生休未得雲迎步還應雪滿頭何時各攜杖竟去㑹嵩丘送王祕丞赴闕詔下儒中選將臣衆推何處避君恩圖書官職人間美斧鉞威權閫外尊蘭省交朋迎敵願棠郊寒士送消魂功成佇聽居藩翰肯憶漁樵在水村和薛田察院咏雪三首林間踏去宜沽酒石上收來好煮茶除却子猷當此景高情偏憶戴逵家七字空吟六出花與君無酒只烹茶門前俱絶行蹤跡還似袁安卧在家密壓溪雲入户斜照開睡眼不須茶誰言落處無偏黨牽率詩家壯酒家送趙推官赴王太尉辟命舊友敦詩將邊城辟去初坐籌銷劍㦸行李减琴書戎帳應先遁屯田想未鋤蕭闗迎有騎瀚海食無魚家道寧思慮軍容紀慘舒唱籌戎幕静登眺戍樓虚馬飲沙河濁蟬鳴隴樹踈佇㸔歸闕日官向粉闈除新栽葦臨砌復臨流栽初尚未稠長因帶風雨逺似在汀洲静閣宜紅蓼閒樓稱白鷗前春應更好江上夢潜休送王太博出鎮桂林主上求人鎮大藩桂林雖逺莫嗟嘆薛能嘉樹非真命韓愈朝陽是謫官甘雨將沾蠻草潤仁風先掃瘴烟殘龍鍾不得相隨去願寄州圖枕石㸔謝何學士王專推官王道士同見訪閒離錦帳戴紗巾誰送東郊訪隠淪舊在幕中珠履客新遊門下羽衣人掃苔雖是開三徑采薇何由致八珍太史應還憐纒次郎官星犯客星頻經嵩陽廢觀因有戲題嵩陽多廢觀欲騐少碑文地屬村夫子苔漫石老君草生泉更浸松老燒猶焚欲問神仙事悠悠空白雲送馮介迎覲離聲無管絃空把指頻彈唯子猶為客何人不作官前程貧豈易後會老期難想拜高堂下麻衣淚始乾送無用上人歸中條迢遞中條寺秋尋㤀險途履蹤臨水有錫影入雲無像閣分秦樹經牕見舜都我曺題壁處閒㸔想躊踟秋夜與陳孟話别草堂燈暗雨蕭蕭欲話分攜重欝陶何事琴中猶怨切凄凉調裏鼓離騷寄盩厔知縣解且著作盩厔樂天初任地此時君又繼多才閒應時到遊仙寺石上題詩拂緑苔兩宋名賢小集巻二十一
