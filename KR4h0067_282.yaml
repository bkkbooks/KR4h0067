body:
  text: 兩宋名賢小集卷二百八十二宋陳思編元陳世隆補可齋詩集李曽伯字長孺號可齋懷州人寓居嘉興寶祐中第進士天才卓絶儒而知兵宦轍遍天下所至得將士心仕至觀文殿學士贈少保開府儀同三司曽伯初與賈似道俱為閫帥邉境之事知無不言似道嫉之不竟其用有可齋類藁庚戌過浯溪讀中興碑峿山一何青浯水一何緑上有唐朝碑蒼崖與天矗清廟倣遺音靈武號實録其筆走風雷其文貴金玉曽經兩賢手足耀千載目後來紀名氏全鑱後且續豈無黃絹詞中寓白圭讀一詞不敢措我懼此碑辱雖然勿泥古詠嘆豈不足嶽將降甫申吾皇車攻復將墨東海水且汗南山竹勒功岱嵩頂豈曰清溪曲已亥題茅山玉晨觀煙雲作嶂松作關夜深迫人星斗寒分明巳在天上坐不可更作人間看須臾睡去復睡覺髣佛前身在巖壑洞門鎖鑰呼未譍時有天香暗飄落登郢州四望亭敻出煙塵表乾坤指顧中數峰連野迥一水與天通沙外迎孤鶩雲邉數亂鴻家山在何許心與大江東登閬州錦屏山久識屏山靣今朝得勝逰橋梁橫古渡樹影倒中流風定春檣度煙輕晚市收憑欄誰領解一鷺點沙洲淮西幕自皂口入潁道間竟日百餘里相逢三數家平岡盡茅葦沃壤舊桑麻短樹巢歸燕荒城宿亂鴉興亡誰與問馬首夕陽斜小亭間止草草家林適時時步屐過跨流通略彴枕岸擬牂牱牆外千竿竹亭隂數畝荷年豐遂間止老境足婆娑招里巷諸友和韻小有家林適歸來已恨遲引杯懷楚舞飽飯和陶詩慷慨多新語綢繆半舊知夜深橋雪滑亟命短笻支出郊劭農口占小約賔僚集相招父老耕寺依青帶住人在翠帷行疊嶂堆春色微雲護午晴時康田里樂歸騎踏花輕禁煙前一日招幕屬小集林提幹有詩和韻草草登樓適英流邁昔賢詩篇長慶集人物永和年訪古冝聨社傷春又禁煙青簾家酒賤賸飲莫論錢桂林即事一日四時具從來五嶺然留連落花雨依約熟梅天瘴重常隨箔春深未脫綿新來那戒飲未夜已思眠月峽城樓雲羃前溪洞煙荒隔岸城秋旗雜山色曉角帶江聲駐騎須邉靜維舟待峽平掀髯聊徙倚一雁楚天橫首夏而有秋意才過清和候凄然感旅懷新蛩迎古砌落葉滿前階葛葉夏落榴火春仍駐槐屯午自佳慿詩寄風土歸以語朋儕宿中洞梅老傲前嶺梅疏卧淺溪避風巢上鵲喚雨竹間雞野迥夕猶牧田乾春未犁路遙人倦甚只向近林棲過衡陽晚宿雨後春寒力山前夕照斜身猶尋壘燕聲雜宿林鴉過嶺尚十里隔春能幾家母嫌茅店惡窗下有梅花將到永州宿村舍野宿孤村迥山行十里荒犢眠新草壤馬踏落梅香入眼春晴薄打頭風勢揚莫嗟登陟苦明日看瀟湘入清湘界漸近湘山境土風清且饒林巒接墟市水竹帶溪橋焙出新茶煮簾垂老酒招春和民氣樂幾日是花朝寧國道間喜晴怪得虛簷寂溜聲起來雲淡月微明只消一夜西風力盡掃千山宿霧清農舍少酬終歲望客途擬過小春晴枝禽亦似欣欣意飛入煙林自在鳴利州登棧道足迹初來劒北州試登危棧瞰江流萬山西接地窮處一水東歸天盡頭欲訪崤函無健馬相忘楚漢付輕鷗丈夫要了中原事未及持竿老釣舟簡項仲宗遊亭臯試從沙渚入荆城十里金堤掌樣平曉露香留紅芰溼午風清逐白蘋生桞邉繫馬頻沽酒沙際呼魚旋作羹所欠直惟佳客耳明朝能暇輒偕行丙午九日將過陽羡偶成年年秋晚對風沙今近重陽喜在家自斷此生甘皓首能消幾度看黃花間身頗覺便笻竹醉態都忘脫帽紗且問小舟溪上去飛鷗數點夕陽斜題宜興菴壁二首淳祐庚戌覃懷李曽伯因觀農來此得四十字是日微風扇和輕雲閣雨千峯翠滴四野緑秀枝禽對語春意駘蕩無極徜徉久之緩轡而去賔佐四明史偉之廬陵曽垓眉山楊埏東嘉林拾三山卓炎于廬陵王真孫長沙胡盛盱江周子榮潼川楊牧之清湘滕處厚續至老龍昔未蛻嘗蟄此山中霖雨春疇足風雲夜壑空兩崖髙下倚一徑往來通不願千金劑惟祈百穀豐遊千山觀有序河內李曽伯再牧桂之明年實開慶改元上命三衢柴士表視邉隘竣事將還夏六月二十一日約憲倉四明豐茝兵師江光朱廣用符離朱煥載酒千山觀訪招隱過仙奕感今懷昔風物固無恙也時火傘張空水花蘸碧相與徜徉其間清不受暑因得四十字并識諸石自從來嶺嶠豈暇訪湖山緹綺行邉了戎旗護戍間相看羣玉外一笑六郎間回首西風靜何愁老漢關遊桂林西山玉筍環星拱青螺帶霧披山為天下勝境占嶺南竒援筆難窮者慿闌盡目之不因無世纍築室在於斯善權竒觀自從團結此山川便作人間小洞天佛母林深從古盛仙翁宅近至今傳青分三洞中開户白瀉雙巖下出泉我自有緣聊乞取萬松隂裏一牛眠兩宋名賢小集卷二百八十二
