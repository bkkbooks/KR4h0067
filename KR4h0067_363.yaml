body:
  text: 兩宋名賢小集卷三百六十三宋陳思編元陳世隆補藤齋小集劉迎字無黨東萊人初以廕試部掾大定十三年用薦書對䇿為當時第一明年登進士第除豳王府記室改太子司經顯宗特親重之二十年從駕涼陘以疾卒章宗即位録舊學之勞賜其子國樞進士第無黨自號無諍居士有詩文樂府號山林長語詔國學刋行雲中君圖衣若新沐蘭湯薰靈巫拜舞方迎神恍然相見帝者服九歌昔詠雲中君畫史亦可人妙入造化域羽衣玉塵美且間此意不知何處得空明倐忽紛溟濛胡為眷眷臨夀宫飄然來下復逺舉想像決去隨飛龍祠空人散秋蕭瑟落日猿聲喚秋色湘天極目青茫茫憑高一望無南北梁忠信平逺山水憶昔西遊大梁苑玉堂門閉花隂晚壁間曽見郭熙畫江南秋山小平逺别來南北今十年塵埃滿目不見山烏靴席帽動千里只慣馬蹄車轍間明窗短幅來何處亂點依稀涴寒具煥然神明頓還我似向白玉堂中住濛濛煙靄樹老蒼上方棲閣山夕陽一千頃碧照秋色三十六峰凝曉光懸崕髙居誰氏宅縹眇危欄飲青樾定知枕石髙卧人常笑騎驢逺遊客當時畫史在上方想見泉石成膏肓獨將妙意寄毫楮我愧雨立隨諸郎此行真成幾州錯區區世路風波惡還家特作發願文伴我山中老猿鶴連日雪惡用聚星堂雪詩韻朔風朝來放雲葉紛紛吹落龍沙雪山河大地同一如變化須臾亦竒絶參天松頂老猶強搶地竹頭低欲折亂飄書帙愛窗明狂入地爐驚火滅重衾方擁膚尚裂凍筆將書肘先掣未容衰白點鬢華只許醉紅生面纈何人清唱墮梁塵有客髙吟霏鋸屑昔賢句法今尚在故事歷劫誰能説是中勝處公會無一粒靈丹工點鐡題十眉圖寶箱拂塵金􅘫膝周昉丹青見真筆春風曾憶賦妖嬈人共畫圗成十一燭奴香底花光凝錚錚鐡響聞三更車聲雷動不通語眼態波橫空送情蠻雲盤鶴遼天濶犀玉依依對書札人生何處不相逢還醉武陵溪上月郭熙秋山平逺用東坡韻槐花忙過舉子間舊遊憶在夷門山玉堂會見郭熙畫拂拭縑素塵埃間楚天極目江天逺楓林渡頭秋思晚煙中一葉認扁舟雨外數峰橫翠巘淮安客宦踰三霜雲夢澤連襄漢陽平生獨不見寫本慣飲山緑餐湖光老來思歸真日日夢想林泉對華髮丹青安得此一流畫我橫筇水中石海上潮蹙三山島煙橫萬里沙蜃樓春作市鼉鼓暮催衙一曲水仙操片帆漁父家安期定何處試問棗如瓜秋郊秋水四五尺暮山三兩峰浮雲白毫相落日紫金容蓑笠前村笛樓臺古寺鐘殷勤小平逺圖畫憶渠儂代人憶舊緩步素絲障微吟紫綺裘醉便風側帽歌愛月明樓犀軸題春恨銅荷滴夜愁風流十年夢燈火漫揚州題雪浦人歸圖亂目寶花雨過眉班竹筇拏音迎畫鷁喜態動烏龍水鏡千江月風琴萬壑松遙知永今夕情話得從容彥美生朝壯日里閭俠臂彎雙角弓繡韉紅匼匝貂袖紫蒙茸雲態自蒼狗玉輝猶白虹為君占夀骨綽起有清風車轣轆馬虺隤牛觳觫山行縈紆車轣轆路傍指點是官人老矣一翁雙鬢白汝牛幸可耕汝馬幸可騎有此可載琴書歸胡為奔走東西道白髮刁騷被人笑沙漫漫沙漫漫草斑斑南山北山相對看我行乃在山之間行人仰不見飛鳥樹木足知邊塞少沙漫漫草斑斑我行欲趂西風還僕夫汝莫愁衣單我但著衣思汝寒寄題安嵓起官舍北溟一軒髙占鳯麟洲要作人間汗漫遊海閣風煙自朝暮洞天日月幾春秋夢魂欲拂三花樹生計聊隨一葉舟待我丹城訪君去閬風佳處卜菟裘莫州道中楓林葉葉墮霜紅天末晴華一鏡空野曠微聞烏鳥樂草寒時見馬牛風人生險阻艱難裏世事悲歌感慨中白髮孀親倚門處夢魂千里付歸鴻和人七夕韻今古良宵此會同望窮雲物有無中人間鈿合三山隔天上靈槎一水通鳷鵲樓空紈扇月鴛鴦機冷苧蘿風不須更乞蛛絲巧久矣人生百巧窮題吳彥髙詩集後片雲蹤迹任飄然南北東西共一天萬里山川悲故國十年風雪老窮邊名髙兾北無全馬詩到西江别是禪頗憶米家書畫否夢魂應逐過江船代王簿上梁孟容副公二首妙年椽筆賦長楊一日聲名滿四方天上風流青瑣客人間嘉慶緑衣郎錦囊看讀金花誥畫戟間凝燕寢香預恐政髙趨急詔海沂無計駐王祥自笑微官馬骨髙十年霜鬢雪刁騷長林豐草未適性尖帽短靴安得豪名宦真同一雞肋簿書空束兩牛腰故園清興湖山裏歸去經營一把茅清明前十日作雨餘天氣動朝寒寒食都來數日間羯鼓催開小桃李畫屏圍出好溪山塵埃老我真堪笑風物撩人欲破慳梅雪已殘春半過一尊何處與公間聞丘文晚集慶夀作詩戲之桃李欲開風雨多花時猶得屢經過緩聽一曲玉連瑣滿泛十分金卷荷紅燭影紗聞喚馬翠羅承襪見凌波杜陵老矣孤春事奈此詩愁惱亂何明日復會客普照繼呈此詩去及瓜不數日矣室中呼起散花天來伴維摩到處禪百刻篆香消晝永一畨花雨伴春妍雲山真欲追聱叟風腋何妨借玉川他日相思共明月舊遊因説禁煙前觀古作者梅詩戲成一章翠袖佳人修竹傍風姿綽約破湖光靜中慣識形神影妙處誰知色味香觀想有靈通水月孤音無伴挾氷霜故人愁絶今何許煙雨霏霏子半黃上施內翰十年不見建安公草木依然臭味同賴有酒樽煩北海可無香瓣禮南豐天墀禮樂三千字海國鵾鵬九萬風正以髙軒肯相過免教書客感秋蓬聞彥美服藥以詩問訊耳邊塵事且無喧聽我歸耕郭外村賤子自藏蝸殼舍故人誰並雀羅門書窗共作三年計尊酒相逢一笑溫不信家山不堪隱仇池今在古銅盆次劉元直韻二首秋來何事憶歸頻正以家無妬婦津未許桂枝招隱士不妨桃葉贈行人夢魂歷歷千山逺客宦悠悠五斗貧犀筯鸞刀許何日歸來舉業得紛綸半年歸夢别離間只有音書雁足還羅幕翠橫秋掩冉玉壺紅濕淚斕斑天明不作霧非霧月破可憐山復山準擬春風對眉膴一尊相對洗愁顔和曹次仲韻因以自感自笑區區學道難未容香火訪名山因循憂患餘生裏收斂光茫窘步間白社祝公今日始丹丘容我幾時還相從願結翻經會共過壺中日月間陪諸友登三山亭半濠清淺芰荷雕落日登臨未寂寥山色逼秋渾作市海聲迎暮欲吞潮沙頭白鳥疑相熟木末青旗若見招不似常時對官府可無間話及漁樵次韻夜雨澥山何處是蓬瀛節物催人意自驚客裏厭逢今舊雨夢餘愁聽短長更故園頗覺歸期緩老境難堪末段清想得詩成正蕭瑟竹窗燈火夜微明題歸去圖筆端竒處發天藏事逺懷人涕泗滂餘子風流追魏晉上人談笑自羲皇折腰五斗幾錢直去國十年三徑荒安得一堂重寫照為公挂酒瀉蕉黃寄題孔德通東園花木隂隂一畝宫平生髙興與誰同樽罍北海無虛日鄉里東家有故風先業固知衣鉢在大門應惜槖奩空襄陽耆舊今誰識尚喜風流見阿戎昌邑道中屋角雞號夜向晨客牀相對話悲辛流離僅脫噲等伍老大空為濟上人却掃欲安無事貴纍人猶説立錐貧故山鄰里今安否歸去同尋笋蕨春題仲山枝巢鏡中青鬢入霜皤嵗月從教落魄過物理不容人過分生涯休歎我無多百年竟似蠅鑽紙萬事終同鼠飲河秪恐徐公宿緣在東風時夢海棠窠過關渡水圖短車無復駕青牛散䇿方來對白鷗煙水從容許君獨暫須分我一船秋河橋桃李香中八九家青旗髙挂緑楊斜晚來風色渡頭急滿地蕭蕭楊白花兩宋名賢小集卷三百六十三
