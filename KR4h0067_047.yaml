body:
  text: 兩宋名賢小集卷四十七宋陳思編元陳世隆補獨樂園稿六吳沖卿直舍閻士安畫墨竹歌閻生畫竹舊所聞望中一見遙可分伊豫不甚曉佳畫猶愛氣骨高出羣狂枝怒葉凌絹素勢若飛動爭紛紜蟠根數節出地底上有百年蒼蘚紋森然直幹忽孤聳意恐出屋排浮雲秋風颯颯生左右耳目灑落遺塵氛乃知良工自神解昧者傲習徒艱勤子猷昔者得收玩不患終朝無此君苦寒行窮冬北上太行嶺霰雪糾結風崢嶸熊潛豹伏飛鳥絶一徑僅可通人行僮飢馬羸石鐙滑戰栗流汗皆成氷妻愁兒號強相逐萬險歷盡方到并并州從來號慘烈今日乃信非虛名隂煙若霧朝不散旭日不復能精明跨鞍攬轡趨上府髮拳鬚磔指欲零炭爐炙硯湯涉筆重復畫字終難成誰言醇醪能獨立壺腹迸裂無由傾石脂裝火近不爇蓬勃氣入頭顱腥仰慚鴻雁得自適隨陽南去何冥冥又慚燕鳥識時節巖穴足以潛微形我來蓋欲報恩分契闊非徇利與榮古人有為知巳死只恐凍骨埋邊庭中朝貴人豈念我重裘厚履飄華纓傳聞北地更寒極不知彼民何以生蘇才翁子美有贈扶溝白鶴觀黃道士詩記于屋壁嵗久漫滅今縣宰周同年得完本于民間抵豫求詩潦倒黃冠無足論白頭嗜酒住荒村狂名偶為留詩著陳迹仍因好事存金石鏘洋虛殿寂龍蛇灑落古牆昏飛黃滅沒浮雲外瘦馬何能望駿奔和吳仲庶寄吳英比部安道之子壯年致政歸隱蘄春負米承親願己賖遭母憂服除遂致仕恥隨雞鶩逐泥沙一朝投紱真高士萬卷藏書舊世家齒髮未衰非藥物山林不返為雲霞龎眉尚有郎潛者徇祿憂生真可嗟聞范景仁遷居許昌為詩寄之天衢名利場塵泥繼朝昏况兹辭榮久厭苦車馬喧慨然忽高舉翩若黃鵠翻朝賣城西宅暮理南行轅回首豈無懷眷眷望國門想象解裝初完美未可論縱橫置老屋缺剝周短垣臧獲念去故炊㸑假罌盆幼稚喜就新階庭走諸孫幸有克家子生事不日溫許昌昔名都于今亦雄藩先賢雖己逺風迹凛猶存况復多巨公分義素所敦丞相辭黃閣學士乘朱轓青雲同禁省白首會山樊潩水湛寒光盡眼清心魂華堂臨曲渚畫舫承十樽高談金石諧逸筆風雨奔得朋誠多歡孤陋未可爰時當惠好音獨樂慰荒園和范景仁緱氏别後見寄求決樂議雖用其韻而不依次蓋以景仁才力高逸步驟絶羣非駑拙所能追故也至樂存要眇失易求之難昔從周道衰疇人曠其官聲律久無師文字多缺漫仁皇閔崩壞黃庭集危冠紛紜鬬筆舌異論誰能殫或欲徇陳迹竅厚潛鎪剜或欲立私意妄取舊史刋古今互齟齬大抵皆欺讕景仁信其説墨守不可干賤子欲面從誰與換膽肝必求此議決深谷為崇巒何如兩置之試就中和看天地育萬物生成適暄寒聖人保四海皇極致阜安樂理亦如此炳煥猶朱丹嘽緩與噍殺折衷遺兩端兹道苟不由芒刃難嬰髖魯樂最為備雍徹施三桓齊韶猶隸習太公避陳完唐民聽伴侣不復含悲酸乃知樂有源鐘鼓皆波瀾昨者清明初榆火始改鑽景仁從許來傾都咸聚觀諸公競邀迓非獨惜春殘議樂不復對晝夕且窮歡來時桃李穠去日芍藥闌三旬只須臾駛若阪上丸轘轅逢雨别恍惝歸騎單東西步步逺回首祝加餐仍冀勉中和心廣體自胖贈太師文公挽辭三首汾晉地形美古今多巨賢况承勳烈後宜有慶靈傳著位登朝右聲華出衆先起家從此始圭組遂蟬聨美化流民物薰然遺愛多樂公當日社邵父至今歌庭有三鱣集門容駟馬過欲知餘慶在公鼎格平和夏屋封何處山田有卧牛蟠根走伊水回首負嵩丘忠孝家風備哀榮禮秩優寵驚舞宸翰萬古照松椒樞密太傅文恭胡公宿挽辭二首行冠鄉人品文為學者師黃裳藴厚德玉律儼清規大節人難奪嘉謨世莫如儀刑不可見遺烈滿豐碑徘徊逰內禁密勿贊鴻樞隂德加民物清明服士夫天方遺一老星忽隕三吳疑從龍髯去乘雲在帝都英宗時方上仙緱山引王子吹笙去不還當時舊物唯緱山山深樹老藏遺廟春月秋風空自間轘轅左界連商雒碧瓦朱欄露華薄經時掩户庭草深永晝無人澗花落徘徊未下日將西遙望嵩陽煙景微鶴馭飄颻向何許林間空見白雲飛和王介甫明妃曲胡騶上馬唱胡歌錦車己駕白槖駝明妃揮淚辭漢主漢主傷心知奈何宫門銅環雙獸面回首何時復來見自嗟不若住巫山布袖蒿簮嫁鄉縣萬里寒沙草木稀居延塞外使人歸舊來相識更無物只有雲邊秋雁飛愁坐泠泠調四絃曲終掩面向胡夫侍兒不解漢家語指下哀聲猶可傳傳遍胡人到中土萬一他年流樂府妾身生死知不歸妾意終期寤人主目前美醜良易知咫尺掖庭猶可欺君不見白頭蕭太傅被讒仰藥更無疑初到洛中書懷四十餘年西復東勞生薄宦等飛蓬所存舊業惟清白不負明君有朴忠早避喧煩真得䇿未逢危辱好收功太平觸處農桑滿贏得閭閻鶴髮翁和邵堯夫秋霽登石閣飛簷危檻出林端王屋蒿丘咫尺間獨愛高明遊佛閣豈知憂喜滿塵寰目窮莽蒼纎毫盡身得逍遙萬象間暇日登臨無厭數悲風殘葉巳珊珊先生冬夏俱不出同鮮于子駿題和樂亭春禽弄朝晴秋蟲吟雨夕風和振蘭芳露寒滋菊色萬物苟得所隨時各有適矧伊人最靈胡為長戚戚聖人垂大訓燦爛著芳册至樂和無聲大禮簡無迹心專守中庸身不蹈邪僻造次常在前須臾不離側窮通雖百變何往不自得兹亭聊寓名樂和在胸臆送向防禦經知陳州千騎去翩翩專城尚少年韋平家好學隂馬世稱賢官用才能進恩非雨露偏想聞河潤逺封畛帝畿連張子厚先生哀辭名載先生負材氣弱冠逰窮邊麻衣揖巨公決䇿期萬全謂言叛羌背坐可執而鞭意趣小參差萬金莫留連中年更折節六籍事精研羲農訖周孔上下皆貫穿造次循繩墨儒行無少愆師道久廢缺模範幾無傳先生力振起不絶尚聨綿教人學雖博要以禮為先庶幾百世後復都三王前釋老此尤熾羣倫將蕩然先生論性命指示令知天聲光動京師名卿爭薦延置之石渠閣豈徒修簡編丞相正自用立有榮枯權先生不可屈去之歸卧堅孤嫠聚滿室糊口耕無田欣欣茹藜藿皆不思肥鮮近應詔書起尋取病告還舊廬不能到丹旐風翩翩人生會歸盡但問愚與賢借令陽虎壽詎足驕顔淵况於朱紫貴飄忽如雲煙豈若有清名高出太白巔門人俱經帶雪涕會松阡厚終信為美繼志仍須専讀經守舊學勿為利祿遷好禮效古人勿為時俗牽修內勿修外執中勿執偏當令洙泗風郁郁滿秦川先生儻有知無憾歸重泉觀試騎射閶闔風正清觚稜日初媚材雄集便殿玉座親臨視三河俠少兒初識天子貴天山汗血留蹀躞全鐶轡揚鞭秋雲高顧盼有餘鋭縈回勢可觀罄控動如志毫釐應心目審固參身臂鳴絃電雹驚寸的氷瓦碎龍顔薄笑春喜色連旁侍旦為徒步人暮作彯纓使揚揚出九門親友生意氣須知天地德慎勿忘所自黠羌猶旅拒獫狁方繁熾求為忠義臣無負搜羅意藏珠石疊石溪東山下有墜石卸九徑二尺餘其崖上脫處猶存水齧東山根土色渥如丹危峯忽摧脫半崖卸石丸隂陽昔融結神化不可原初疑偓佺養靈藥魑魅觴之無故落又疑蛟龍伏巨卵雷電擊之從此毈卵不孚也或者女媧補天餘却下青冥遺耳珠不然盤古戲為樂聊取天弧彈朱雀物理萬狀終難知巧心推求徒自疲不如引客坐石上好竒且醉手中巵華嚴真師以詩見貺聊成二章紀其趣尚知足隨緣處處安一身溫飽不為難禪房窄小才容榻此外從他世界寬素髮青眸七十餘未嘗逰學只安居旁無几杖身輕健應為身間得自如六十寄景仁從來好與天爭力困竭方知已力微見事晚于蘧伯玉今知五十九年非和子美二貧詩君子尚仁義寶用為身資其人苟不賢冨饒亦胡為所以回憲徒不厭糟與藜當時萬金産令名傳者誰子美初解褐為吏長河湄月得數斛祿僅足供饘糜謂言家無寶不必修籓籬囊衣不自暖乃為偷意窺穿墉入其室探取無纎遺從事借之帶同列乞其衣日髙服未具不敢踰門畿蕭條四壁寒獨立空自嗤援毫揮幅紙書作二貧詩上言運命邅溫飫無時期下嗟職事勞舊學日以隳乃知賢者心不獨憂寒飢壈坎雖益多志業終無衰我實甚貧者視君猶白圭行年三十餘碌碌無他竒庇身太學官朝夕惟鹽虀讀君二貧作我事借君詞君誠士林秀不免青衫卑滿腹豈無才抱蓄未有施不用固為小用之活蒸藜如君有此富豈必藏珠璣財貧非道貧已矣何嗟咨送薯蕷苗與興宗客從魏都來貽我山薯實散之膏土間春苗比如櫛吾家庭户狹樹藝苦其密危根遞扶戴怒牙猶拂鬱興言念伊人好嗜與我一家蓄桐君書喜觀汜氏述雖為簮帶拘雅尚林樊逸分獻取其誠豈容羞薄物况聞知藥者餌此等苓术願益君子年康直體無疾散誕得寬壤繁大宜無日蕭條新蔓抽苯䔿草叢生也故叢茁入冬霜霰嚴葉落苗可出伸如猿臂長拳若熊膰腯拾木㸑銅鼎相期聚書室云誰得其徒溪茶與山栗間居故人通貴絶相過門外真堪置雀羅我已幽慵僮更懶雨來春草一番多兩宋名賢小集卷四十七
