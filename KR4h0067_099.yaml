body:
  text: 兩宋名賢小集巻九十九宋陳思編元陳世隆補龜山集下岳陽書事洞庭水落洲渚出叠翠疏峰逺烟沒重樓百尺壓髙城畫棟沉沉倚天闕湖光上下天水融中以日月分西東氣凌雲夢吞八九欲與溟渤爭雌雄澄瀾無風雨新霽一日萬頃磨青銅琉璃夜影貯星漢騎鯨已在銀河中湘妃帝子昔何許但有林壑青浮空君山世傳湘君居于此因以得名蒼梧雲深不可見遺恨千古嗟何窮須臾晦㝠忽異色風怒濤翻際天黒乘陵瀨壑走魑魅渟滀百怪誰能測忽看舟子玩行險更欲飛帆借風力安得晴雲萬里開依舊寒光浸虚碧南康值雨廬山卧龍庵有劉道人自云百餘嵗碧眼不粒食惟食栢飲水每客至必先知之欲往見之不果故并記之平沙漲雪清江濆水花照日紅生鱗軒然五老出城表雕玉萬仞窺長身雲巾星弁覆華頂飛泉潄瀑垂天紳平生未識廬山面碧巘横雲望中見江頭一夜雨銜天奔浪號風作悲健朝來淤泥沒牛馬咫尺坐論千里逺芒鞋拄杖掛塵屋神馬尻輪歘飛轉卧龍庵前碧眼翁日飲山淥餐溪松神融氣合八荒外此心炯炯宜先通未須勤移却俗駕㑹應一洗塵寰空寄言歸侍壺丘子他日未游當御風游武夷是日泛小舟至鷄窠岩還游冲佑觀函闗崎嶔走秦鹿天下並逐爭羣雄抉雲翻空鰲足折黔黎竄伏如寒蛩武夷山深水清泚避世猶有髙人蹤龍泓東注海波涌嶺有投龍池世傳與海通玉女翠擁秋雲鬆玉女峰赤霄真骨寫虛壁通泉凡筆慙非工魏王峯前有畫鶴蔵舟浮梁跨絶壑山間有小橋橋西有一小舟皆人跡不可到隠見似與天潢通當時雞犬不復見窠巖依舊烟霞籠我來秋杪月既望尚有幽菊埋榛叢天容洗淨雨新霽雲幕四巻清無風掀篷進棹窮異境注目想見流殘紅回船杖履躡幽徑松竹窈窕環琳宫翠琬温辭耀華衮褒詔有石刻金榜大字纒交龍自憐病骨掛塵網幔亭髙㑹何由逢解衣歸卧玉瑣碎仰看明月穿疎篷謝詹司業送酒鄭公負才名流落四十年髙視隘八荒天寒坐無氊忘形賴司業時與送酒錢嗟予樗櫟材臃腫世所捐云何附青雲拜賜追前賢開壺對青樽内愧顏靦然公乎廊廟姿直幹上參天袨服羣娃宫不虞妬爭妍驊騮誤一蹶萬里終騰騫朝燕暮刷越駑馬安能先玉瑩本無瑕寧須事磨鐫宣室久虚席兹行定詳延陋儒氣填臆感慨聊自宣辱惠不知報强歌成短篇戲贈詹安世喜談兵慕耿弇之為人故有虎牙之句綵舟駐閶門初與子相識長空翥秋隼爽氣横八極摛辭鏤圭璋吐論森劍㦸鄧侯不願仕志在書竹帛長纓係單于落落藴奇策氣吞流沙外意無燕然北虎牙有餘勇戎寇非强敵㑹當朔風勁伏鉞控鳴鏑老大慙衰謝見子徒感激平生謬經綸此意已寥寂信哉功名㑹事道古難必窮通付時命未足為悦戚餘生如鼴䑕滿腹㣲分畢行矣脱簪纓翛然適吾適安世乃司業之子年少未受官隠几上天不殞霜萬木正鮮澤青蒿與長松各挺嵗寒節朔風吹沙寒髙嶺凍積雪萬木已摧落長松獨清潔人生無艱危君子竟何别隠几試澄思行蔵易差轍留别富宣徳富侯荆山姿落落混燕石鐫磨經世故不磷乃天質軒裳儻來寄既去寜須戚驊騮走長坂一跌未為失秦庭謬瑕疵睨柱終完璧君子有逺懷亊道先器識千鈞等鴻毛始見烏獲力行矣各勉㫋他時賴三益别西齋諸友浮雲如積酥凉颷勁絃疾溶溶𣺌天末飄忽易相失懸弧四方志匏繫非予匹平生結歡久始願膠投漆别離傷素懷此身任萍迹遣懷君子雖自嚴至潔宜若汙昭昭揭日月所向將蝟如天地一穽中逼仄身亦孤游世在虚已浩蕩與時俱靈府有天游環中真道樞元豐壬戌嵗暮書事閩陬地力盡種萟被山谷涵濡一雨潤鬰鬰原野綠春風忽云徂舒景變炎燠凉颷動地軸揫歛何神速坐愁林巒空俯視萬木脱凝霜借風力摧折到松竹嗟余閉門人感此亦愁蹙幽庭有萱草采采不盈掬如聞糟牀注取醉須百斛沉酣樂時運天闗不須觸萬物一芻狗蒼蒼自髙目緑漪軒開池傍清軒環除種蘭芷虚明淡星漢踈影薦鳬履君乎試憑軒鑑此亭下水盪風生㣲瀾風定還泚泚悠然得真趣吉祥來止止迂疎堂終南有捷徑屈蠖終當伸君獨恥不蹜安得與世親結廬寄人寰獨柱寜問津形影廢酬贈相忘誰與隣寄謝漠陰叟抱甕良非真鄱陽湖觀打魚秋髙水初落鱗介滿沙脊浩如太倉粟寜復數以粒紛紛漁舟子疑若俛可拾横湖沉密網脫漏百無十蟲鰕雜魴鯉駢首吐㣲濕小人利口實刀機汙鱗鬛鯤鯨亦狼狽風雨移窟宅玉淵有神祠變化在嘘吸胡寜飽羶香忍視萬魚急幽潛不足恃感嘆百憂集寄謝漆園吏於計未為得送嚴尉世路久艱棘青㝠翳妖氛孤鳥叢祠中豺虎填城闉君能摘姦伏竭澤無潛鱗勿云功未酬屈蠖終當伸飛黄架輕車一躍窮無垠檢田尋崙上層崗隨衝出髙原烟火一里餘雞犬遥相聞瘠壤僅容席訟牒徒紛綸齊魏兩蝸角況復三家村舉世競毫末薄俗寜足論吾衰過元亮欲辨已忘言送向和卿還京江湖多秋風惝恍夜不眠念子將北歸起視明星懸君平翠虯姿聳身蒼梧淵髙步隘八區凌風上青天妙質藴荆璞寜須事磨鐫贈言以為别妄意追前賢聖言乃常珍含咀真味全奇辭暫時好過眼如飛烟潔身忘廉潔觸物宜虚船吾方病羸苶市藥還自憐明日隔長陂相望空惘然向和卿覽余詩見贈次韵奉酬杜陵頭白長昏昏海圖舊繡冬不温更遭惡卧布衾裂盡室受凍憂黎元詩人窮愁自古爾豈若種萟依青門嗟予老懶世不用窮巷久雨無髙軒蟲鳴烏噪感時節婺不恤緯羞前言殘章斷簡棄不録自愧潢潦無根源君胡衮字富褒飾三復妙語將誰論知君獨負青雲器欲使飢者名長存贈程舍人近侍入閩路公溪上鶴髪翁眼光照日顏如童龎睂垂鬢有仙骨駢集五福天所鍾螭頭暫輟三長手杖節扶輿入閩嶠弧南一夜晶輝浮海隅草木俱榮耀朱金拜後古所稀繡紱全勝衣綵衣玉觴薦夀須珍奇更待蟠桃結子時言溪早起短日催征轡聴雞踏曉霜逺山頻入望薄酒漫搜腸湘浦蓴絲滑吳淞鱠縷長何時一踈放把釣卧滄浪漢坂舟行曲岸通幽徑踈籬映竹斜塢深蔵吠犬林薄露人家石瀨魚偏美鄰村酒易賖秪應雲水富自是一生涯席太君輓辭賢配無前古傳家有子賢四靈來薦瑞一鶚已摩天蒿里迷長夜悲笳慘暮烟蕭蕭原上路猶想駕雲軿禀粹猗蘭秀來嬪洛水濵一窺識公輔三徙得儒真畫翣流雲氣松阡卧石麟哀榮今日事誰復繼前塵湘君祠烏䑕荒庭暮秋花覆短牆蒼梧雲不斷湘水意何長澤岸蒹葭緑籬根草樹黄蕭蕭竹間淚千古一悲傷新湖夜行平湖淨無瀾天容水中煥浮舟跨雲行冉冉躐星漢烟昏山光淡桅動林鴉散夜深宿荒陂獨與雁為伴哀鴻哀鴻當苦饑悲鳴垂其翼朔漠曉霜寒江湖晚烟羃乾坤一網罟髙飛亦何益日暮無與羣驚風暗缺荆州書事千里瀕江地可毛結廬何必故山椒載醪不過斜川路飲水誰同陋巷瓢勿問雞蟲閒得失但知鵬鷃各逍遥黄塵滿眼僧窻靜坐對風花意已消天寧節祥開若水射瑶光淑氣先春景自長玉陛風閒飛綵綬獸爐烟暖襲珠囊雲門羽鶴儀仙仗天上蟠桃薦夀觴已見晶輝環帝座定應長照鼎宫傍閒居書事虚庭幽草翠相環黙坐頹然草色閒玩意詩書千古近放懷天地一身閒踈窻風度聊欹枕永巷人稀獨掩闗誰信紅塵隨處淨不論城郭與青山直舍大風書事寄循道枕書無寐首空搔萬竅噓風正怒號雪意浮空迷逺目月林梳影見秋毫幽庭所藉惟荒草妙理應須付濁醪誰念維舟江上客落帆千里壓雲濤和席季成遊金鑾寺朱甍碧瓦照孤城杖屨翛然野色清縠捲水風輕蕩漾珠翻荷雨自虧盈勝遊已覺非人境妙語寜須是玉英願借金箆聊括目不容幻翳有纎塵送王充道遊三茅廬阜荆吳相望各天涯千里柴車鹿自隨觧轡定應春盡日及歸宜待鶴來時三茅中峯每嵗八月十七日有鶴至充道當候見物乃可回聖賢莫負樽中渌日月長為物外遲若過匡廬訪真隠卧龍庵下有期頥卧龍庵有劉道人人言百嵗夀春日有懷諸友憑几無聊晝掩扉芬芬晴氣減春衣隔簾相應鶯初語背日連飛鴈北歸莫逆交遊千里别逺來音信兩年稀追尋舊事成幽夢觸物心行事事非望湖樓晚眺斜日侵簾上玉鈎簷花飛動錦文浮湖光瀉出千峯秀天影融成十里秋翠鷸翻風窺淺水片雲隨意入滄洲留連更待東窻月注目晴空獨倚樓次韻晁以道誰能載酒尋元亮共寄無何作醉鄉便好收身事農圃不須驚世露文章壺中日月春長在塞上烟塵客自忙千里同風無逺近未分秦隴與瀟湘和錢濟明遊官園虚舟觸物本無意看花得句慙非才名園古寺尋春色不暈勿鄙雙魚鰓是日與濟明遍遊諸平詩院觀雙魚花抵暮至官園木奴千頭比封户秋實付與江風催因思萬㸃愁人處何似洞庭金作堆蘇子美詩洞庭柑熟客分金寄題環翠樓記云唐君作此樓以奉親方壺七萬神鼇連瓊臺縹緲居靈仙鯨翻海運成桑田異境誰使夸娥遷銛風四面蒼圭圓巨靈巧以青瑶鐫揉風洗雨淨娟娟脩眉浮空秀爭妍清溪回旋瀉幽泉下有澄瀾湛洄淵繡楣雕欄欲飛翻凌切漢道摩星躔恍如直跨須彌巔瑠璃凝光圍四天喜君妙齡謝世喧萱堂慈顏白盈顛兒童牽衣戲蹁蹮優哉此樂誰與先嗟予昔以三釡懸投身世網百慮煎今乎老矣誠可憐狙猿何用簪纓纒子雲終須守一㕓誅茅結屋纔數椽薜衣雜佩紉蘭荃手披白蟫玩青編春暉不報常欿然雖有至樂安能全晚雨斷霞明滅天日黝雨意晴暉爭好醜浮雲冉冉無定姿白衣忽變如蒼狗悲風激烈河漢翻雨脚如麻飛霰寒山深氣腥豺虎亂乾坤四合誰云寛將溪溪上野客懶成癖怯寒手攣面如墨把盃强吞僵立歌閉門獨愁天已黒贈醫者鄧獻匡雲容方黯黯夜色正蒼蒼空羨南歸翼幽懐増感傷過漢江西極鰲足折東南地維傾衆流競趨下汹汹歸滄溟誰能跨明河挽此經天行世難乘槎翁此意終㝠㝠過吳江天水相涵翠有餘玻璃萬頃接方壺山浮晚照清如洗風逺飛帆細欲無漫叟未應甘皂櫪散人終欲傲江湖維舟況值鱸魚美鱠叠銀絲飫腹腴南歸書事浪漫人間壓客塵衡門長憶鎖榆枌忘言擬盡輪人妙陳迹慵尋史籀文萬里功名心獨冷一㕓耕鑿力能勤舊遊欲問南歸趣寂寞吾今過子雲寸碧軒隠隠遥山列畫屏簷間寸碧與雲平低回席上遺簪露彷彿墻東翠黛横虛景逺涵千里色晚暉仍借一溪清春風景物知多少可稱收身樂此生冬早書事窈㝠誰為宰爐鎚榮謝唯知嵗序催臘日未經梅已綻春風尚逺凍先開愁無潤澤歸芳樹獨有餘寒著死荄收盡浮雲天愈淨夜深猶起望三台齒落書懷身上蕭條事事空齒牙衰落勝衰翁渴心尚欠冰凌解病骨長思藥力攻文几倦親塵土暗斷編慵理蠧魚封南牀穏卧陶公宅枕上悠揚一榻風縣齋書事簿書投老豈身謀朱墨紛紛晚即休平世功名歸社稷一瓢我欲慕巢由一去人間二十年空餘飛雪上華顛清時最有求田樂未愧陳登榻上眠身名于我兩悠悠形影相忘懶贈酬擬把一竿滄海去漫然清世一虚舟醴陵丁君洋洋亭依蒲泳藻兩相忘宛有江湖氣味長凭檻脩然真得計秪應幽興在濠梁安西聞捷鷹揚塞外得非熊萬里金城一箭通玉帳投壺隨燕豆坐看飛將縳驍戎將軍新擁節旄閒紫塞雲浮豹尾斑白首邊城休悵望馬蹄未出玉門闗雅歌不待來天馬謝質今應閉玉門早勒勲名上彞鼎放回春色滿乾坤直舍書事鱗鱗池面水初生萍底青蛙自在鳴誰使幽庭當鼓吹雨餘時聴作新聲登峴首阻雨羊公風績幾經秋獨遶龜蚨為少留欲問荆人尋舊事一江清泚自東流江浮雲影抱層欄雲外青山一水間盡日倚欄看不足杖藜欲去更回還江風江雨上雕欄庭樹蕭蕭景自閒向晚㣲雲遮不盡好山渾在有無間庭前古木已經秋天外行雲暝不收倚杖却尋山下路一川風雨濕征輈春早雲天羃羃漏㣲光踈懶惟添睡思長枕上隔籬聞鳥語半殘春夢更悠揚此身如幻病何傷白日無人景自長寄傲南窻容膝地時時飛夢到羲皇過簷赫日晝如燔睡轉庭陰始一反縱有諸人來問疾毘耶居士已忘言寄形一榻日蘧然倚杖支頥髻指天莫逆過門無子祀時來鑑井自跰􅓷古椿朝菌已忘言貧病寜須更問天石彈不妨隨物化自求鴞炙自應便鄒公輓辭一伏青蒲上三年漳海濵泉甘不出戸公謫南方所居無水庭中怱湧甘泉客醉豈無神公在謫所忽有醉客言公將歸翌日赦至果得歸報國心長在知恩志未伸公所居一名知恩追懷垂絶語空有淚盈巾舊徳今誰在彫零已不多雲天開日月陸海自風波空嘆與齡夢難留曳杖歌生平濟川意無處問施羅冬曉著瓦霜華冷暝空曉霧均氣昏難見日風過易生塵洗硯冰紋破憑爐火色春莫嫌寒尚薄雨雪更愁人兩宋名賢小集巻九十九
