body:
  text: 兩宋名賢小集卷二百九十七宋陳思編元陳世隆補雅林小稿王琮字宗玉錢塘人積學敦行以孝友稱徽宗初登進士第宣和中任大宗正丞提舉永興軍路常平靖康初除左司郎中厯官兩浙江東漕副直龍圖閣以病奉祠紹興間嘗避地居括遂家焉北山訪僧晚歸吟僧山北住又買過湖船半日得間話一生無此緣波光映酒興竹色帶茶煙歸路斜陽裏徐行聽亂蟬蓬萊柯山倅圖一棹三萬里何修入窈深水痕涵雨意巖影帶秋隂雖愧無仙骨終能長道心古人殊錯計空向海中尋讀書樓作近來間過日幽事頗相關逺樹開晴晝歸雲當晚山官情隨處薄詩稿逐時刪骨若無仙分何因住此間哭潘令河陽桃李樹惆悵不逢春官為吟詩折家因好客貧故山歸去逺遺像挂來真誰向江頭哭共鄉三數人三巖間携一壺酒來對雪巖斟秋老瀑飛瘦石寒雲宿深坐無僧共話行有鶴隨琴此處儘不俗令人生隱心題獨醒小亭東嘉酒舍豫所創退食多留此翛然一散襟涼從曉來覺秋向雨中深牆竹侵山色簷茅雜桞隂有誰能載酒過我共幽尋挽何耐軒調度如儒素相門中所難一心惟好佛半世懶求官星近緹屛落墳依宰木寒遺恩滿溪麓魚鳥亦辛酸客裏有懷徐太古近來真倦客怕踏軟塵紅獨向一樓坐靜觀諸境空官河添夜雨宰樹帶秋風還憶能吟者襟期何日同與劉天遊伯仲夜話霅中戲贈水亭新得月坐對白蘋洲共説一夜話惜無多日留手抄詩許借口誦咒如流最羡同吟處對牀風雨秋秋夜有懷醉書十韻秋風從何來颯颯入窗牖殘燈耿不寐照我容顔厚故園豈不佳亦頗興懷否黃金桂百樹碧玉池十畝猿鶴響空山亭臺映疏栁觥籌雜野䔩筆硯得佳友愁無彈鵲句雋有持螯手人生行樂耳功名有時有點檢屐幾兩土苴米五斗浩然歸去來萬事不如酒城西即事清曉離家去路遙絶憐寒景太蕭條松深漸覺風聲急雲動還知雪意消沙觜客擔魚種賣山頭人拾樹枝燒梅花多處誰家酒斜舞青簾隔小橋次韻項君玉惠然乘興訪幽栖細雨冥冥濕杖藜七尺身強於鶴瘦一生心不向人低日尋靈藥行寒麓時有新詩付小奚欲解貂金同一醉酒罏聞只在前溪答友人秋山曽是共登臨感慨蘭亭後視今炎熱不過能炙手笑談未必到知心前言衮衮風波去後約寥寥嵗月深室邇豈應人自逺酒盟詩社要重尋京華病中自移藥鼎在牀頭桂玉令人分外愁因病始知歸計好雖貧不向俗人謀僧曽帶雨來看脈僕為傷風懶上樓賴有壁間新買畫寒燈相對兩山秋客南徐一首秋來客裏幾蹉跎醉鉠惟堪浩浩歌盛世未應知己少諸公自是閲人多潮生瓜步風猶急苔滿浯溪石欠磨憶昔祖生忠憤後更無一楫是如何次韻徐獻可兼别重巽誰憐范叔戀袍寒猶有徐卿二子看大率率中多物忤相知知到此心難最憐風雪分吟筆安得江山共倚闌後夜小窗懷素帖挑燈應憶我同觀代辟客送總卿歸吳使星卿月照淮壖百萬貔貅飽據鞍出處豈無公論在規模應有後人看半年水驛衣猶濕一紙天箋墨未乾事與心違知已異折梅花到嵗云寒鄴中書懷苦無宦况莫來休羞見傍人説宦逰九十日秋蛩共語兩三夜雨鴈供愁腐紅只有虛名在堅白難將實意酬驛路梅花歸正好苦無宦况莫來休喜趙君甫赴班西臺自是舊相知來了為山一簣虧入幕雖無多日在焚書已是十年遲金閨接武人爭羡玉牒能文世所竒此去錦鄉才兩宿仙茅緑景正堪詩題多景樓秋滿闌干曉共慿殘煙衰草最關情西風吹起江心浪猶作當時擊楫聲漢荆王墓廟在京口府治落落廟􅀈摹瘞鶴隂隂宰木宿神鴉可憐寶劍凌雲氣散作金燈滿地花獨醒午坐小槽停溜務廳間幕府文書省却難竟日徘徊無俗意祗因竹外有秋山旅興經年客食向京華懶對春風秪憶家覺道近來全俗了略無一語及梅花客中從厚祿故人乞米范甑欲塵貧亦甚陶腰未折計何如小窗獨對蕭蕭雨臨得唐人乞米書舟過孤山寂寞梅花處士墳竹圍巖腳一泉深偷瞻翠輦曽遊處水鑰年年護緑隂祕省金魚池落葉闌干小立時諸公慨想到腰圍但知官餅堪為餌不識人間有釣磯觀潮旗彩斜飛一命輕舟人却立萬舟迎不應當日將軍事猶到如今氣未平獻可約逰北山阻雨共約湖邊喚短蓬曉來何事雨兼風山林只合間人到不入時官眼界中立春有懷十千呼酒醉長安猶記年時客裏歡有約南山南畔去只挑野菜當春盤兩宋名賢小集卷二百九十七
