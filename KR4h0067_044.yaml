body:
  text: 兩宋名賢小集卷四十四宋陳思編元陳世隆補獨樂園稿三潞公遊龍門光以室家病不獲參陪獻詩十六韻旌節擁憑熊逶迤向鑿龍順成過社蠟閉塞令行冬雪壟痕猶濕梅林思己濃傳呼空谷應前導白雲逢飛蓋多邀客停車數問農禹功雙壁斷佛劫萬龕重絶頂標孤剎疏林透遠鐘氣蒸泉郁郁冰綻水溶溶藥閣低臨渚茅庵背倚峯凍醪資野酌寒筍佐晨饔公作藥寮潞公菴臨伊庵皆在龍門碁局移依石茶爐坐蔭松醉醒皆衆共小大盡公從顧以私恩纍難追勝賞蹤原思初不病叔夜亦非慵稽古慙經笥摛華怯筆鋒會須參後乘異日待從容和史誠之謝送張明叔梅臺三種梅花别後相驚兩鬢霜可憐梅蘂為誰芳臺頭日暖分三色林下風清共一香正爛漫時遊不足忽離披去樂難常殷勤手折遙相贈不欲花前獨舉觴去春與景仁同至河陽謁晦叔館於府之後園既去晦叔名其館禮賢夢得作詩以紀其事光雖愧其名亦作詩以紀之蓬飛匏繫十餘年並蔭華榱出偶然郭隗金臺雖見禮華歆龍尾豈能賢浮雲世味間尤薄寒柏交情老更堅明日河梁即分首人生樂事信難全和吳辨叔知鳯翔見寄岐陽府舍始相逢四十餘春屈指中昔日布衣今露冕當時小吏亦衰翁醉吟久作藏身計條教應多及物功惟是綵衣難再著長林極目起悲風釣魚有感野釣披榛竹梧桐半死身那堪衰病意更作獨遊人送章伯鎮知湖州江外饒佳郡吳興天下稀蓴羮紫絲滑鱸膾雪花肥星斗寒相照煙波碧四圍栁侯還作牧草樹轉清輝送李秀才元知廣安軍歸成都覲省皂蓋五驊騮今來異昔遊簞壺交里舍鐃吹下瀛洲壽酒行當舉歸鞭不可留春光久相待先在錦江頭寄題李舍人偉蒲中新齋隴上家聲勇氣殊邊庭卧鼓欲安居非同王翦私求宅更似甘寧晚好書劍倚寒窗風淅瀝門無雜客栁蕭疏蒲州風土平生愛為問旁鄰地有餘李花嘉李繁相倚園林淡泊春齊紈剪衣薄吳紵下機新色與晴光亂香和露氣勻望中皆玉樹環堵不為貧秋夜城上調秋角煙間發暝鐘風枝搖宿鳥霜草覆寒蛩久負觀書樂端愁束帶恭暫因羣吏散還得遂幽慵坐船使君張皂蓋高宴碧湖心苒蒻牽菱蔓夷猶泊栁隂晚風侵坐冷春浪沒篙深倒載歸何晚波間夕照沉和陳殿丞芍藥化工餘巧惜春殘更發濃香繼牡丹禪點藏心殷勝纈異芳迎鼻酷如蘭瓊樓窈窕仙家宅雲葉低垂醉裏冠纈子樓子冠子醉西施皆芍藥名品自有殊功存藥録不當獨取鄭詩看陪始平公燕栁溪溪光不動栁風輕玉帳森沉擁萬兵鷗入煙中間自舞魚翻波面喜相迎樓船下視晴天碧鼓吹前驅遠陌清桃李歸時應盛發薰然和氣滿春城宜甫東樓晚詩賔主俱歡醉高樓迥倚空形忘羈檢外酒散笑談中晚市煙初白秋園葉半紅登臨不厭數朝夕是寒風寄揚州侯都監仲倫木落淮南樹秋風日夜高月臨揚子渡雪卷廣陵濤不得同蕭散何因破鬱陶空憑尺書速未解夢魂勞夏夜溽暑鬱不開矗矗雲萬疊長風卷地來涷雨不濡葉雖無潤物功涼冷得所愜須臾號怒息清月照壁頰小冠簮短髮衣裾輕獵獵敧傾依曲几暫爾蘇疲苶疲貌坐久不思眠草間微露浥早春戲作呈范景仁閏餘春意早卉木先有思嚶嚶羣鳥翔東西各求寄伊豫忝諫垣動息抱憂悸衮職曠不補言責真可畏況復禁過從陋巷若囚繫茅茨庇風雨偏隘無餘地時於壞垣隙歷歷生新薺君侯乃比鄰跬步難自致常思去嵗初西軒習歌吹座客皆故人歡笑無拘忌平生不喜酒是日成爛醉豈言長揖歸良會難再值東風忽復來時華一何駛叢竹固無恙夭桃作花未朝廷正清明詎肯容竊位何當遂廢放歡飲還自恣武成致齋奉酬吳沖卿寺丞太學宿直見寄二首廣文冝直太常齋咫尺無從盡素懷不及春風得隨意夜深容易過天街雪後餘冰尚綴簷月華霜氣入疏簾難堪瓊玉驚心骨坐覺清寒幾倍添司徒開府韓國富公弼挽辭四首天祐休明祚時生雋傑臣賢科首多士宰府澤生民煥爛三台正沖融四海春欲知甄冶力試問白頭人漠北驕無信漁陽廣聚兵移書侮中國決意背齊盟直氣輕軺入英辭勍敵驚四方烽火滅宇縣復升平大吕功名重鴻毛軒冕輕間居客愈盛暫出市皆傾溟海涵容大龍門謁見榮謙光儼在目慟哭望佳城杖履還私第精誠在本朝愛君老不懈憂國沒方昭東閣秋牢落西芒夜寂寥只因忠亮志氣運不能消聶著作三舅謫官長沙作耐辱亭書來索詩少連善降志無恤能忍詬兹亭名耐辱締構自吾舅樽前湘水清席下湘山秀於焉忘榮枯終日醉醇酎攻愁若攻敵避喧如避冦困久理須通非徒保無咎中秋夜始平公命與考校諸君置酒賦詩月華秋色兩鮮新萬里澄空不受塵兔濯素毫騰浩露桂飄香實下飛輪光侵酒面寒無力清入詩毫健有神坐客何須辭醉倒相君應不惜重茵二月三十日與同舍宴李氏園晚歸馬上賦門前蹀躞金羈滿座上連翩玉斚飛數尺遊絲留客醉一行垂栁送人歸同邀勝友時難得重到名園花巳稀莫惜芳辰賸行樂無端風雨橫相違和子淵元夕緹室重飛玉琯灰物華全與斗杓回依依殘臘無情别歷歷新春轉眼來強取酒巵浮翠柏懶開粽葉覔楊梅男兒努力平生志肯使功名落草萊和吳省副中覆字仲庭梅花半開招憑繇張司封飲伯玉字公達帝鄉春色嶺頭梅高壓年華犯雪開正與嘉賔思共醉不須芳物重相催從軍貯酒傳呼出側辨簮花倒載回風雨難期王事劇未知休沐幾旬來秋雨蕭條聞宗聖案伎應之飲酒詩呈甫宜寒風細雨未晴天密似輕塵薄似煙一室獨吟圖史亂四鄰高會綺羅鮮鴈飛斜柱絲隨指蟹薦新螯酒滿船自笑不歌仍不飲昏昏只解枕肱眠八月十七日夜省直紀事呈同舍窮秋直省舍大雨吁可畏九河翻層空入夜愈恣睢置牀東壁根時有塗塈墜颯颯勢將摧怵惕不成寐中宵抱衾立呼燭久方至徙之近西偏裯帳不能備飛蚊胡不仁忍此加啄噬避煩只深藏悒悒面蒙被須臾漏轉急枕褥亦沾漬雖欲起何之室中無燥地展轉遂達旦耿耿負憂悸因思閭井民糊口仰執技束手己連旬妻兒日憔悴囊錢與盎米薪木同時匱敗衣不足準摶手坐相視豫今幸己多敢不自知愧無謀忝肉食念爾但增欷泣餘聲亦作唏廣韻啼也和聶之美重遊東郡躍馬津亭未幾何宦遊容易十年過飄颻空似隨流梗寂寞猶為挂壁梭西嶺應餘當日翠南湖真減幾分波之美云南浦比舊水涸過半輸君尚得飛征蓋重向春園聽舊歌和范景仁西圻野老西郊廣路浮壤黃上天雨泣寒雲蒼鸞旗闟戟紛暗靄扈從威神歸帝鄉田家老父眉睫白杖藜匍匐泣路旁且云生逢至仁主蠲租罷役嵗為常蠶收百箔桑蔽野麻麥相望無邊疆去年翠華出賽雨錦繡緡絲墟里光拜迎六馬負縑帛孫扶嫗接歸揚揚自分謳歌畢餘景一朝縞素安可防哀聲澒洞徹四極草木滲淡顔色傷螻蟻衰齡不足贖淚如飛雪空霑裳河縈洛貫嵩峯足泉底環瀛日月長羡門己閉屬車返軛上空瞻金鳯凰和宋復古小園書事飽食復間眠風清雨霽天葉深時墜果岸曲乍藏蓮波面秋光淨林梢夕照鮮東家近亦富滿地布苔錢和王介甫烘蝨天生萬物名品夥嗟爾為生至么麼依人自活反食人性喜伏藏便垢涴晨朝生子暮生孫不日蕃滋逾萬箇透疏緣隙巧百端通夕爬搔不能卧我歸彼出疲奔命備北驚南厭搜邏所擒至少所失多捨置薰燒無術奈加之炭上猶宴然相顧未知亡族禍大者洋洋迷所適奔走未停身己墮細者懦怯但深潛乾死縫中誰復課黑者抱髮亦憂疑逃入幧頭默相賀腥煙騰起遠襲人袖擁鼻端時一唾初雖決意終自咎致爾殱夷非爾過吾家篋笥本自貧況復為人苦慵惰體生鱗甲未能浴衣不離身成垢破朽繒壞絮為淵藪如麥如麻寖肥大虛腸不免須侵人肯學夷齊甘死餓醯酸蚋聚理固然爾輩披攘我當坐但思努力自潔清羣蝨皆當遠邇播華屋篇時視役河上寄郡中諸同舍涼風淨掃雲無迹海月未生星歷歷貝聨珠貫拱北辰三五縱橫此何夕重樓疊榭出秋空鳷鵲露寒連桂宫瑶井迥臨丹闕外玉繩斜挂瑣窗中征人遠别空閨悄鐘漏蕭疏天不曉碧紗展轉無復眠卧視寒光度華沼漢家賢將戍臨洮結髮從軍今二毛誰憐身老心猶壯深入長占太白高豐城古劍沉淪久匣中夜半雙龍吼乃知神物不自藏紫氣依稀見牛斗有客離居望所親遙知清夜會荀陳隄繇未息無由去不及浮槎河畔人和邵堯夫年老逢春年老逢春春莫咍朱顔不肯似春回酒因多病無心醉花不解愁隨意開荒徑倦遊從碧草空庭慵掃自蒼苔相逢談笑猶能在坐待牽車陌上來再和邵堯夫年老逢春年老逢春猶解狂行歌南陌上東岡晴雲高鳥各自得白日遊絲相與長草色無情迷眼緑花林多思襲人香吾儕幸免簮裾纍痛飲間吟樂未央又和來韻年老逢春無用驚對花弄筆眼猶明不嫌貧舍舊來燕喚起醉眠何處鶯一僕相隨巾幅出羣童聚首小車行人間萬事都捐去莫遣胸中氣不平兩宋名賢小集卷四十四
