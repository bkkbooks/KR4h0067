body:
  text: 兩宋名賢小集卷一百六十二宋陳思編元陳世隆補梅溪詩集二林知常惠白酒六尊仍示酒法作十韻謝之老去生涯付杯酒種秫辛勤三百畝東臯遺法嗟失傳蜜汁􅐽漿不通口邇來軟飽經月無豈有清歡對朋友百錢強就村媪醉終夜蔬腸作雷吼先生祗把文字耕妙意能施杜康手憐我新愁餘萬斛那更澆腸無五斗分惠青州六從事祕法兼蒙傳肘後便同北海歌不空免似東坡歎烏有嗟豫偃蹇老更叨感激故人情意厚會須續遣白衣來籬畔黃花欲重九九日飲酒會趣堂者十九人老者與焉既醒念不可以無詩因用贈林知常韻示諸友我似揚雄貧嗜酒筆作耕犂紙為畝辛勤耕植三十年往往糟醨罕濡口今年九日甕盎空誰饌先生荷諸友衰顔迎醉生嫩紅饞腹隨餐失飢吼菊花不上老人頭酒盞聊傳此時手文字飲韓嘉數子禮法拘髠惟一斗哀翁興盡輒先歸不待杯盤狼藉後坐客高談驚四鄰吾鄉已在無何有明朝黃花亦不惡俗眼無端自疏厚酒醒聊記坐中人有似平原凡十九陳元佐和詩贈以前韻無功懶仕由堪酒故向東臯事田畝自慚耕稼非老農嵗入何曽給糊口通功易事愧無術漫闢書齋會鄉友出技慙如鼯鼠窮説法強為獅子吼交遊漸覺不在眼老拙自知當縮手陳生慷慨真可人文似良金瞻如斗論交何止十年前耐久遙期十年後把酒殷勤問黃菊十年故舊寧多有士窮要使節義敦不見韓公稱子厚北窗捉筆書惡詩醉中戲贈陳三九周仲翔和詩贈以前韻與子十年同把酒貧賤未能離隴畝今年依舊對黃花會意何由笑開口老來鍾愛有三兒邇嵗從師得吾友祝螟方擬為螺飛舐犢俄驚作牛吼幼兒已作一覺夢大匠徒施兩年手乙子沈疴賴營牧再生豈止由南斗嗟豫屯厄世所棄急難誰肯相先後論交最喜子善終報德深慙我無有猶憐甲乙二孺子莫景於渠意加厚煩君為吾嚴誨之毋惜鞭笞九十九陳獻可宋孝先萬孝傑夏伯虎和詩復用前韻凖擬重陽會詩酒手種菊花凡數畝佳節相逢俱可人一一篇章堪適口揚庭醖藉更清新陳晉宋間人顔謝友愛鄉詞源浩萬斛宋下筆驚人風雨吼季梁蕭灑詩如人飄然自是風騷手萬用之年少富文墨夏日出珠璣不論斗誠叔思深希仲逸齊驅未識誰先後老朽那能敵年少胸中空洞嗟無有張我三軍得數子造物遺豫非不厚明年秋戰豈無人雲夢定須吞八九九日把酒十九人和詩者數人而已今已後期不復追索許以來年九日還用前韻發一笑勸君須飲文字酒勸君耕耨心中畝飲非文字猶聚蚊心田不耕棘生口登高佳節豈易得況此相逢皆勝友談傾坐上冰玉清興生筆下波濤吼我亦逢場聊戲劇韻語殊非三昧手試投瓦礫已成堆辱報驪珠未盈斗和之者寡豈陽春高才料恥居王後嗟我窮愁無以遣酒債詩篇行處有與兹飲會類平原逃我詩盟幾高厚如今並許隔年還直須日月逢重九宋孝先示讀自寬集復用前韻老去悲秋強自寬少陵九日詩也豫老境失幼子逢秋益悲凡所以強自寬者一寓於詩也録自中秋以前古律詩數十篇目曰自寬集淵明酷愛尊中酒季子貧無負郭畝我生薄與二子同俯仰人間亦緣口一室蕭然僅容膝毛穎陶泓自相友會心終日雌聲讀排悶有時粗氣吼感秋詩集名自寬雕琢更慙非妙手篇章不工如子固聲名敢望星之斗宋生輒作過情語十韻殷勤為跋後譽之韓栁誰敢當意古語奇吾豈有何如操矛時入室針我膏肓乃相厚牀頭周易深且神毋惜往來論六九再用前韻述懷并簡諸友太白徉狂喜杯酒陳登豪氣恥求畝揮毫爛吐風月篇濟世高談霸王口古人可作誰與歸白也吾師登可友萬言窗下杯水冷百尺樓頭鼻聲吼丈夫未遇聊爾耳肯向權門思炙手淨掃一室安吾貧晝閲詩書夜星斗休論生天與作佛靈運甘居丈人後吾儕慎勿慕富貴鳴鼓定須攻冉有但願相從文字樂交情合向窮中厚倚看前席坐間人平步登瀛參二九鄭遜志胡叔成謝鵬劉敦信萬廓塢一唯和詩復用前韻前日中秋一壺酒交朋解散歸南畝把杯邀月止三人中有客來從谷口鄭首登詩壇出險語張我孤軍真畏友重陽佳句更竒絶西風猛向松關吼中庸伯始遙遙胄胡穎然作賦吟詩手謝客篇章似春草分得家傳才一斗謝句法天然自圓熟長慶詩豪今有後劉妙齡能作老成語必大奇兒亦希有萬塢郡太守司馬孫文與其人兩溫厚塢我與數子無薰蕕文字相從十常九九日會飲豫為唱首自和凡數篇皆因事敘情爾未作重九詩也今再和一篇每句用事而不見姓名末聨外餘皆略存對偶必有能和之者獨坐東籬歎無酒種秫西疇故盈畝菊花叢畔來白衣桑落杯中付饞口汝南風俗有故事龍山宴集多佳友靜聞彭澤三徑香遙想藍田雙澗吼順時習射馬嘶風隨俗登山囊繫手慈恩塔冷舊衣冠戲馬臺空古刁斗三嗅馨香感慨中細看茱萸酩酊後應制賦詩人孰在坐湖聨句今還有明朝見花心已别此日登高意宜厚日月並應節物嘉獨恨今年無閏九過盤山宿旅邸一嶺迢迢十里賖行人半日踏煙霞青山遮莫盤千匝歸夢何曽不到家宿浮橋落日丹丘下西江十里西浮橋通古道逆旅傍清溪夜靜水聲細曉陰山色迷吾鄉在何處天逺白雲低西征紹興建元二十二良月壬午時丁未王家辭弟遊帝都出門滿眼思親淚鶺鴒送我過原隰朋友攜尊宿蕭寺朝離黃塘惜分别莫宿青山嗟獨自初心滿擬遊鴈山行止非人輒乖異黃巖留連越三宿故舊過從日沈醉鄭生伴我千里行近世人無此風義皇華亭上一回首陡覺眉頭起鄉思西江十里浮橋邊把酒登樓吟擁鼻山行初逢建子月入眼梅花已春意前觀三渡覺非舊下視兩灘真可畏渡頭仙人還笑我髭鬚如棘猶名利欲入天台觀石橋行來匆匆未能遂途中邂逅張老丞廷玉十五年前樂清尉自嗟吾非沈謝輩面目從來苦難記飛泉枕上夢成魔達旦思家何曽睡細雨濛濛入關嶺旅邸重尋舊題字雨腳微收過天姥洗出峯巒疊蒼翠劉阮祠荒土猶赤溪山真是神仙地道傍石現小金仙傳舍荒涼誰廢置柘溪竹染兒女痕石嶺松含棟梁器路入南明觀石佛樓閣岧嶤更深邃八年行役兩來遊岩上題詩記前事乘興剡溪尋故人久别相逢雜悲喜義風吹水送行舟越國江山滿瞻視十四嵗娥孝且烈三百里湖明更媚千巖競秀壑爭流終日貪看趣遙寄西興渡口聲如雷銀浪崔嵬魄驚悸江神為我風色平天闕煌煌瞻象魏賢關訪舊話酸辛更食􅐽鹽舊滋味學官欲以職事留自愧非才力辭避觀臺雲物端可書宫線初長日南至龍山僦舍觀大禮儀伏森然典文備人臣貴盛古今無秦公父子俱為使景靈告謝樂聲回鵷鷺花枝侈君賜西遊連日覩天顔和氣氤氲散憔悴嵗云莫矣却歸來捉筆書為于役志周德逺植瑞香於窗前戲成一絶主人貪睡為貪香花植窗前意味長見説有時魂夢裏化為蝴蝶繞花旁海棠欲與春爭媚嫣然一笑芳雨中如有恨疑是為無香白若遇水以小舟從石門渡勢危甚因書數語示圖南文卿時八月二日也歸途阻秋潦溪漲不可涉迂從石門渡未見心已怯壯哉龍伯宫幽據鴈山脅巖如峙城壁南北本相接衆流欲朝宗天為開岌嶪泓澄潭百尺臲卼舟一葉吾生何自輕內顧無可挾所賴二友生千里同負笈忠信儻可仗免作飛鳥帖來歸從剡溪山水頗涉獵石齧天台舟浪拍臨海楫可曽如此境令我魂震懾連年作行客川塗但取捷不因風雨暴誰瞰逺步屧兹渡雖云惡觀覽意亦愜漫賦石門篇添入剡遊篋孟甲孟乙好蓄古錢因示以詩世人多好錢今汝獨好古書中閲平凖壁上按圖譜廣拾漢五銖逺及周九府惜哉生我家此物罕曽覩百中時得一喜笑見眉宇所蓄雖不多其志頗可取閭閻富家子繞牀堆阿堵一字不識丁碌碌何足數更宜移此力典墳讀三五縱未到聖賢定可過乃父東園小閣丹粉一新昌齡有詩次韻小園小閣無奇新但喜有酒堪娛賔西疇種秫可自釀不用勤買拋青春月明星稀烏擇木吾愛吾廬堪寓目須知主父五鼎珍不似王猷數竿竹丈夫未遇當安貧帶經且作鋤園人詩酒過從老兄弟一笑可破雙眉顰見説西園相繼闢好將因果同栽植子孫清白世相傳莫同阮氏分南北夢齡得男老者喜甚湯餅會中出詩以賀梅溪佳氣夜蔥蔥果得奇兒應夢熊湯餅笑歡良不淺桑弧時節稍相同豫以十月二十八日生猶子以二十九日生喜將老眼看猶子首出新詩賀乃翁從此吾門如謝傳芝蘭玉樹滿庭中次濟上人韻老來未厭短檠光又集青襟就故鄉却荷道人能具眼不同時輩有他腸心傳潛澗源流别首出新詩意味長我亦筆頭為佛事未應中國異西方浴佛無雨俗言浴佛天必雨今年浴佛天愈晴招提鐘磬集梵侣世尊塵埃思一清紛然膜拜口誦偈舉頭看天紅日明或云天意與佛拗老行者云天與佛打拗不放雨師龍伯行天雖不雨佛亦浴誤此億萬蒼生情廟堂何人職調燮勸天與佛無使爭沛然一雨四方足億萬蒼生俱沐浴題郭莊路南山有井名黃花我卜别業臨其涯酌泉漱石思往事天遺景與名俱嘉東籬種菊隱君子悠然凝望南山賖兹人高躅已千古三徑蕪沒堪咨嗟我生本抱丘壑尚誤涉塵世爭浮蝸十年太學志未遂歸來隴畝躬桑麻草莊新築亦不惡青山逺近光交加會須移住效杜老終賦歸去師陶家新涼入郊九日近西風漸欲吹烏紗龍山風俗有故事撩我清興凌煙霞度鴈山鴈山五經眼兹行尤可觀初冬天氣佳鴈歸山未寒有日照幽谷無雲翳層巒入境見祥雲祥雲峯振衣登馬鞍馬鞍嶺瀑水飛玉龍兩龍湫羽旗導翔鸞展旗峯翔鸞峯石柱屹天外天柱峯卓筆書雲端卓筆峯靈峯觀石室杖履穿巑岏山禽知我來好音若相歡登羅漢洞有鳥鳴絶頂聲極可愛羣峯列春笋丹青狀尤難靈峯新創丹青閣行色愧匆匆更約他時看臘日與守約同舍賞梅西湖西湖處士安在哉湖山如舊梅花開見花如見處士面神清骨冷無纎埃不將時節較早晚風味自是花中魁暗香和月入佳句壓盡今古無詩才武林深處景益勝十里眼界多瓊瑰北枝貪睡南枝醒杖履得得才出來旅中兹遊殊不惡況有佳友銜清杯手折林間一枝雪頭上帶得新春回同舍再約賞梅用前韻梅溪野人真野哉老眼長為寒梅開朅來西湖探春色濡毫一洗胸襟埃却將梅花比和靖花與人物俱奇魁同行二十五佳客一一盡是離騷才新詩一出花價長粳粃桃李奴玫瑰湖山已稿處士骨風月未厭吾儕來欣聞好事約重賞凖擬餐玉嘗春杯預辦長箋收白雪載取十里清香回興化簿葉思文吾鄉老先生也比沿檄見訪既别寄詩二十八韻次韻以酬莫年初仕塗暇日但書䇿儒生餘氣習筆端事揮斥政學兩疏謬篇章稍沈溺楚東會詩豪酬唱奏金石逢場爭出奇遇險或遭厄忽泝三峽流遙經數州驛廬山看未足巫峯過尤惜西郊祠卧龍東屯弔詩伯飛飛猶倦鳥秋風送歸翮同行得嘉友鏖戰交鋒鏑弛擔白蘋洲天日去咫尺忠誼懷魯公霸業悲項籍湖州設廳舊祠項籍奉詔還故鄉齒落肌瘦瘠涕泗拜松楸荒蕪翦荆棘心期樂田里誓不綰銅墨槖雖無陸金歸幸全趙璧陛下忽誤恩泉南又分職入閩如入蜀枯腸復冥索腰緣病減圍髮為悲添白風仰秦君高節慕薑相直惡語誰流傳同僚誤刋刻吾鄉老先生吏事以儒飾新篇似庭燎逺寄針我癖把酒欲細論何時再沿檄陽春七十首光豔萬丈射招邀屈原魂收召子厚魄驚開老病眼喜見墨妙迹願公倡斯文用夏變蠻貊近世作詩文者多溺於異端之學正顔郎先生痛革其弊兩宋名賢小集卷一百六十二
