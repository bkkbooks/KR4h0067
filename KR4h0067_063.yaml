body:
  text: 兩宋名賢小集巻六十三宋陳思編元陳世隆補樂圃餘稿二少章過吳門寵示淳夫子贍唱和并惠山寄少游之什俾余繼作輙次二公韻以寄之懐友對華月身如匏繫何遥聆金玉音悵望江湖波憂來誦三篇調飢餉嘉禾蘇范天下賢閲士嵗月多憐君似蘭芷長育瑤山阿良工得寳璧韞櫝加琢磨發為驚人語九曲傾洪河蟠蛇寄短章浩蕩冩長謌一官得武林萬景盡包羅又如弹響泉餘韻清且和藉湜師韓文其則在伐柯俯視枳棘間翔鸞豈蹉跎聖朝頌聲作周雝與商那二公且大用豈得歸岷沱仲春上丁知府金部躬率寮寀釋奠於先聖既而升公堂命學官講書竊惟中庸之篇自安定先生嘗以是為誨人閲嵗既乆嗣音者稀某孤陋無似竊慕前哲其啓講也今龍閣黄公嘗臨之其終講也金部使君又臨之郡儒在列咸與榮觀輙成五言律詩二十韻叙謝天意紹斯文成書在聖孫一篇窮妙理萬古誦㣲言美行敷華業精誠固本根並明參日月幽贊極乾坤奥義誰鑽仰眞儒善討論謂安定先生也披雲觀泰華行水自崑崙庠序非才處詩書素志敦崇朝羞侍席暇日廢窺園辨惑開羣聴潛心到大原意將追往哲學豈為專門盛府連稱治耆英繼典藩始終臨講席前後枉髙軒全帳羅金鼎盈庭倒玉樽旌旗來有慶衿佩寂無喧士識師資貴民知道義尊僖公史官頌鄭校相君存芹藻歡欣意陵阿長育恩中材多杞梓寳器列瑤琨五紀登朝盛羣英著籍繁美哉文正學遺澤洽元元海賈千艘萬貨集江邉争較錐刀逐利遷生理幸逃魚腹餒夢魂猶怕駕樓船陸寳山陸家山色隠平蕪文彩如虹照碧虚痛爾臨刑思鶴唳輸他謝病食鱸魚江浦一川吐納五湖深海裏三山何處尋料得䲭夷從此去古來烟水秪如今知府司封見和喜雨詩次韻陳謝天意分明應魯雩髙壇晨拜紫袍濡禽窺舊井寒泉長魚泳新荷涸轍蘇敏政有餘閒利刃清詩無纇擲靈珠夏畦䝉潤秋臯稔顔巷銷憂卒嵗娛送榮子楊齋郎茹蔬酌水度清晨自是浮生潔静身好事頻過三徑晚愛閒惜别五湖春品泉暗識南泠味鍳茗多藏北苑真且著青袍居膝下少年未羨折腰人次韻公權燈花蘭膏未耗結花新花自無情喜在人生向輕籠先得地開從細焰别裝春飛蛾雖繞光難掩夢蝶初廻色尚匀更待玉堂清夜直賜來蓮燭影相鄰次韻俞子文南軒雨後農疇巳種圃畦青髙卧丘園自放情客少不嫌三徑濕年豐休歎一瓢清殘鶯喜向風前囀病鶴猶能月下鳴千載令名如有得莫愁軒冕老無成次韻俞子文感事我曽折桂向蟾宮君有文章似彩虹運蹇未酬今日願笑歌猶得故鄉同不才甘作耕巖叟有志宜為結駟翁窮達由來都是夢幾人曽是黒頭公送知府滕光禄榜登龍虎亞掄魁一紀横飛長憲䑓謨議軒昂開日月辭章雄偉鼔風雷朝端巳慶明良㑹廟論咸推將相才一跌雲衢成老大幾遷方面笑邅廻致君事業㸔霜鬢經國風猷付玉杯驅弩屢驚園令出引章還喜買臣來展墳乍覺青松長視學追懐絳帳開榮滿江山増氣象仁霑里閈舞兒鮐齊雲晚詠難留白白傅將去蘇有齊雲樓晚望作緑野新居欲繼裴淮海巨藩雖重寄傅巖須起作鹽梅送曹縣丞入京忠義家聲乆夫君更美才吏民愁既去交友約重來君有居吳之意别岫浮雲逺征㠶曉月開棣花同郡府眷戀共銜杯次韻司封使君和推官早梅山茶二首嫩跗黏絳蠟輕朶挿珠鈿雪裏心偏苦花中達最先玉階香馥郁烟埜蕊聨娟託植雖然别黄金子並圓柏葉元同翠桃顔未比紅留芳占春月弄蕋耐秋風自稱階庭玩休煩帘幕籠佳篇補韋白流品重吳中挽邵相母華屋辭榮飬佳城合舊封浮生無定相衆善有餘踪家盛金籝在山長玉案重浮圖傳勝事寳殿壯天峯次韻楊彛甫見成甫装裱舊書之什儒者須㸔萬巻書古人精博固難如殘編莫惜装池費舊迹堪憐繕冩初輕撥蠧蟲文未損平齊緗帙架無虚白頭更且窮經藝誰道忘筌便得魚次韻公權庾中成詠坐局偷閒歩小橋風随秋月過軒蕭愁多萬斛量難盡飲欠千鍾困易銷笠澤狂歌方繼陸海門髙隠莫如焦昔時委吏猶堪處誰道倉公厭寂寥喜公權仲逢垂訪髙軒相約訪柴闗瀟灑如君會合難雨徑偕行穿履濕風亭乆佇袷衣寒百忙好向閒中息萬動宜當静處㸔公暇再來應不倦東籬金菊未凋殘曉坐朋雲齋懐公紹曉來乗興歩髙岡便就幽齋作醉鄉隣寺樓䑓分兩面一家池館得中央南坡嫩橘寒傾日北牖疎筠小帯霜更待怪松擎積雪莫辭訪戴舉瑤觴詠齋偶書呈子通無隠夙志在蕭閒獲此遯幽跡喬林無冬春蒼靄異晨夕旁窺疑好峰俯瞰驚峭壁浩然溪山興盡在陶潛宅杖藜行水邉萍際湛空碧良魚不輕遊弱羽猶自惜吟髭不禁霜曉鑑見早白古人巳深歎信是林園客遣累假禪鋒陶情任詩格寄聲招友人來㸔亭前柏青龍江上偶書兩絶呈無逸監潮滿溝塍稲滿田暑天不雨自豐年海商有貨官無擾㳺子争來就一廛巻碇初來海客船脱身鯨浪見吳天千㠶總約秋風至應助闗征額外錢挽張虞卿一卧東吳七十春區區南北笑鄉人盛開黌舍招英俊敞闢華堂待縉紳婉婉重孫勝彩服煌煌兩壻擁朱輪銘旌巳去空回首通德門前舊是鄰梅評事擕詩過訪欲求属和因次其韻築室尋幽處惟求水竹鄰心安何必貴累少莫如貧石裏求竒古花中悟道新不須多轍迹猿鶴自為賔次韻蘇文饒見貽之什閒釣松陵閲嵗多家林終日對煙蘿茹芝深隠慚商皓獻璧求知笑卞和静送征鴻雲外翼冷㸔老桂月中柯洛陽年少材驚俗車馬猶從陋巷過次韻樞言龍圖得請洞霄之作二首世間如幻此生浮寜典仙祠不典州決勝金城勲烈茂宣風玉壘治聲優逺移遁迹無嘶馬舊得調元問喘牛耆俊如公宜大用行聞召節越蘭舟平生氣節薄青雲不任機心只任真金為散多虚越槖衣從洗浄逺京塵吟随野鶴滄洲晚醉賞鶯花茂苑春仰止髙山同里閈掃門羞未效前人次韻公紹賀崇静之賜金紫二首北窗二紀傲羲皇節比淵明事更光共喜遐齡垂紫綬莫嫌猛退棄銅章文房句就心常佚藥鼎功成夀轉長七品官階三品服滿斟醁醑醉春陽乆脱朝衣襲野裳親逢盛旦日重光耕田鑿井堯民事垂組懐黄漢服章諸老相歡陶聖治兩宮遥祝與天長謫仙才調今誰是首解金龜燕夕陽次韻徐中散丙寅三月見訪之什數年解綬隠林扉乗興頻來訪習池老似樂天兼少病官如叔夜又能詩身閒幸與耆英接學淺虚䝉國士知白雪佳章難復繼策駑追驥自嫌疲祖母生日挺生賢德對耆英嵗物皆新淑氣清年至八旬人巳少子為四品世稱榮紫泥屢捧門多慶華髪雖凋體益輕欲比遐齡何所似蟠桃結實老仙京奉送中散使君提舉崇禧觀方面威名乆朝端聞望隆需章祈玉陛寳詔與琳宮睿奬均勞逸髙情保始終他年黄髪老清世紫芝翁迹放風波外心安夢幻中身輕随夀鶴目極送㝠鴻祖帳羣公集啼嬰萬俗同何縁留召父無路達堯聰誇里金龜重榮光宻印崇髙堂羅爼豆幽徑剗嵩蓬趂健歌歸去因閒味道沖謝庭長有慶越槖任令空醉帽欹華月吟髭動好風翠虬喬木老錦帳海棠紅平昔髙軒過深嗟陋巷窮嘘枯言不絶推轂賜嘗䝉載酒要彭澤名卿表鄭公量材如㫁木荷德重維崧耆俊方圖任明廷正納忠劇藩如擇將猶恐起宗工詠齋三絶泰伯祠邉舊圃開半栽蔬果半池䑓閒門不放紅塵入門裏清流自在來塵冠寂寞更休弹車轍荒蕪晝掩闗一片清暉長在眼多情惟有四飛山非山非寺且優游尚有塵縁未自由巖下結廬應更好石門西去近松楸次韻李子功留别之作采蘭無復飬嬰此終天悲家空弱妹長恐失桃夭時翠蔓倚長松之子得所隨銜杯欵相待摻袂傷暫離洞庭春風髙楊桞渌江湄柴門歸獨掩桂楫暮何之眷眷厚有餘佳什猶見貽散帙渴精論言詩佇良規惜哉片㠶去快若駟馬馳東臯多樂事歸計勿遲遲次韻司封使君和練推官再詠山茶珍木何年種繁花滿舊枝開從殘雪裏盛過牡丹時對日心全展凌風幹不欹藥階如賦詠欠此尚相思次韻練定公權垂訪樂圃之什隠圃甚蕭條驅車豈惮勞境從前代勝岡對逺山髙林曉猿抽臂池秋鶴浴毛興來頻就醉竒句僕離騷判府曹宣徽生日二首星杓指未月増弦神選良時恊半千恭儉動増長樂意潔清能紹兾王賢緩垂相印淹公論堅請州符避劇權四十擁旄非不貴更㸔黄髮珥貂蝉盛世髙門福兩全星辰粹氣萃為賢釣璜韜略傳三世齋鉞風稜積十年隂德在人宜夀考清才脱畧恐神仙寒儒欲繼崧髙頌不獨生申但美宣郡牧李侍郎生日二首柱史仙翁舊柏枝生賢左右太平基居留成就昭陵後賜誥從容故里時籌策乆為當世重勲勞方受兩宮知欲祈天賜公眉夀更過芳蓮葉上龜當年弧矢設門䦨英氣鍾於曲阜間名覆金甌新品地香盤宻印舊家山腰邊龜紐光華動膝下龍駒禮法閑五福俱全難企及流霞為夀日開顔賀林承務還吳門朱顔充賦早蒼鬢拜恩歸烟水鶺鴒聚霜穹鴻鴈飛傳經金恥富下筆玉藏輝貴任毋嫌晚天門受賜衣謝虎丘祖印相訪支嶺髙風逺杼山佳句稀雲巗有開士詩理到精㣲不知蓬戸隘未勌金鐶飛忘形任譚笑敷衽評是非近師宣城老逺慕蘇州韋我亦有吟癖古人思與歸願聞碧雲篇所得如珠璣漁樵未晚出乗興叩禅扉謁郭道冲唐師德登䑓偶作衝寒歩郊原烟水照林薄雲餘山色佳浦溆潮未落静可釣綸垂清欲塵纓濯相逢兩俊友辭義富金雘擕手登髙䑓談笑有真樂寸眸周逺近幽思勝寥廓逝將飛片㠶直到洞庭脚縶維阻並遊搔首向城郭挽林少卿夀考安榮遇聖朝早成門戸自勤勞閨中萊婦皆華髮膝下荀龍盡綵袍堂有金籝身更約案披玉簡道尤髙人間厚福終歸盡漲海難停一夜濤歸隠橋新成偶題三絶句書呈同志幽居處處映烟蘿歸隠橋邊月色多蟾桂有情憐病叟清光終夕照酣歌挂却簪纓裏幅巾清流遶合㫁紅塵小橋何用通來往猶為凝冬病渉人逢人尚説開松徑送客應休過筆溪此橋下臨筆溪林下有誰頻肯顧春深好聽子規啼閏月丙子判府相公被制命升使弼越六月癸夘公誕生之辰某謹齋潔為詩二章拜獻左右雖辭句蕪陋不足奉揚盛德姑以述惓惓之誠武德隂功積在民既生太姒復生申手提將鉞雖三世身到台衡始二人膝下龍駒環夀斚日邊奉使捧恩綸沙堤築就朱衣引富有青春尚四旬宣制初聞下玉墀又逢盛事恊熊羆青霄靈昴凝祥乆紫府蟠桃結實竒飬志増添龜鶴算避權辭遜鳯凰池從今若校中書考屈指當如郭子儀元厚之少保生日四紀勲勞動冕旒倦趨黄閣傍滄洲名如白傅身尤貴才繼㣲之德並優千載神龜巢葉穏九霄老鳯帯雛游蓬來水淺公猶健輝照東南對斗牛寄和晏守二年懐郡印八度到柴扉曾未陪珠履頻煩友布衣水邊孤鶴睡天際片雲歸拜德知何日烟霞戀翠㣲春秋終講伏䝉知府諫議臨視學舍燕勞諸生謹成小詩叙謝泰山先生乆㝠㝠世把春秋束髙閣腐儒隠居三十年獨玩遺經思筆削濫叨師席媿匪才曰演㣲言更嵗籥欲遵廣路視堂奥誓闢浮雲窺碧落兹辰講解告終篇敢屈邦君親視學邦君舊是補衮才忠論嘉謨動宸幄宻為福澤徧寰瀛暫得麾符出京洛愛民如子不忍傷政用中和屏威虐深惟教本在庠序力助儒風止奸惡羣材倘得就長育百堵何為惮興作耽耽黌舍盡脩嚴翼翼公堂驟清廓已欣華構將落成肯枉雙旌率寮幕清晨初謁二公祠重道嚴師致恭恪更忘煩暑臨講席自降威容聴揚搉羜肥酒釃宴諸生金印煌煌對襃博傳聞長㓜相告語争誦詩書親教約歡聲四出屏隂沴雲霧俄收日華爍乆雨是日喜晴文翁化蜀士皆成魯矦修泮民思樂自慙傳道竟何補禄食充飢免藜藿幸逢賢守喜承流喜與吳人醉優渥和公權秋暑奉懐誰謂雲中句能移江上峯清飇隨玉楮爽氣襲塵容劇暑嬰多病嘉招恨未從眷言相與意深荷故情濃鄉校叨㣲禄家鄰傍舊峯散人那適用逋客拙為容良友幸不棄華軒時肯從蚤秋須命駕荷葉露華濃華亭吳江道中偶作十絶人聞出鶴只雲間相合仙經得亦難塵外應多隨逸客未教流俗等閒㸔舟去舟來閲古今夢中憂樂累人深慿將一匊松江水未洗塵纓且洗心白日歸來皆有意平生事了最為難可憐萬頃烟波色只属天隨醉眼㸔千古䲭夷節獨髙脱遺富貴一鴻毛館娃宮女曾亡國豈獨相擕泛海濤妖華傾國豈無情忍復顰眉見越兵若使將軍猶好色安能三徙更成名賢哲多為貴勢拘人人空道愛江湖誰將五鼎盈前食肯換秋風一箸鱸烟暝重湖日欲明輕篷遥遞浦前聲良魚好入深淵去不為鳴榔取次驚川上飛橋處處横幾回經此閲平生碧蘆蕭瑟風前韻一似家林散雪聲吹散青雲見好峯家林祗在此山東寄聲猿鶴休悲怨蕙帳今宵遂不空獨當家責性難堪五女同孤巳嫁三更待人間了塵事别尋雲外結茅菴挽黄朝散二首持心平厚勝澆浮仕路徊翔四十秋政事毎於談笑辦交親多向急難收命由真宰隨窮達身在勞生任去留舊治昔年應畫像龎眉聞訃泪先流江湖嘗佩左符歸一卧漳濵素願違平日華旌過里巷此時丹旐下巖扉羣峯拱揖開新穴萬木森羅長舊圍佇㸔于門驅駟馬想應丘隴亦光輝答人見慶除博士幅巾短褐對江雲閒把羣經自討論魯泮未能開後學虞庠豈稱講㣲言羸駒乆絶騰驤望病木猶霑化育恩蔣徑雖荒陶菊在徘徊惟恐去吳門元少保生日二首孟夏堯蓂六葉殘來從仙府瑞人寰幾年彩鳯池中浴此日神龜葉上閒七老相懽非將相二疏髙宴欠湖山羡公退自台衡地長在烟霞縹緲間體貎方隆避政樞歸來衮繡耀東吳騎鯨才格從天禀化鶴風姿與衆殊經國文章縈睿想濟民德澤感神扶堂邊三夀髙千丈依舊扁舟泛五湖程給事新第朱門不鎻走朱輪東省仙材晝錦人石上雲卿林屋曉花頭露重洛陽春謝公戰罷烏巾静裴令吟髙緑野新他日南園真可乞滿池烟水正相鄰光禄生日卿士方森棘侯邦屢建旂才鋒周物理智燭見神機夀逺眉毫秀身康鬢雪稀翠筠髙挺節古柏暗増圍雲陛朝升對銅符夕佩歸灌苖潛致茂針瘼坐令肥召杜名方重松喬志所希非才學詩禮多幸奉庭闈葉載神龜穏雛隨彩鳯飛晨昏趨膝下永著老萊衣判府蒲左丞寵贈佳篇謹次韻髙文大册耀天衢新句鏘金擲隠居廊廟方將歸輔弼江湖猶復念耕漁百城草木知威望一代賢能入薦書近日東南多節士既旌吳子又褒徐次韻公權喜太守再留不為機巧不求新坦坦襟懐任道真揭節二方隂布德兮符千里别生春兒童共喜重迎伋父老相懽許借恂池閣逍遥無一事清風挹座轉江蘋近承南康朝請使君寵訪林圃小酌至夜公權特惠篇什次韻栝柏森森覆小䑓凌風采菊共衘杯東籬寂寞陶翁醉連騎繽紛衛相來放浪五湖慙釣客均調玉燭仰璇魁秋河夜半簷前轉誰泛仙槎去復廽奉陪太守及諸公游虎丘何必㐮陽孟浩然苦吟自可繼前賢虎丘合去十二度熊軾再游三百年雲閣為君追舊額飛雲閣本齊雲樓今追之霓裳從古播朱弦此行不減唐人樂暢飲惟無八酒仙光禄生日舜廷新遣牧漢寺舊名卿致主丹心在憂民素髮生鷲峰仙桂老猿澗古松清金簡傳真理期頥體更輕次韻司封使君和練推官春望目極江湖近心存象魏遥未調金鼎餗新泛玉觴椒賦為慿欄得憂從散帙消髙才方謝守輕舉羡王喬桃結千年蕊松抽百尺條天涯舟一葉風送逸漁樵求笻杖霜筠來自蜀山遥天骨輕清素節髙我若得之如佩玉君應輟此似秋毫求虎丘竹勁節難同衆草㸔深根更入白雲蟠園廬種此多餘地為向西南斸數竿兩宋名賢小集巻六十三
