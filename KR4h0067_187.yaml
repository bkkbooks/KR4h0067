body:
  text: 兩宋名賢小集卷一百八十七宋陳思編元陳世隆補雪溪詩集三王銍縉雲縣仙都山黃帝祠宇我渡溪水尋花村羣峰勢若萬馬奔酣酣春色雪初霽靄靄野氣山猶昏瓊樓金闕滌地盡松柏半帶斤斧痕要還清淨掃塵俗一炬劫火安得焚行人鞠躬下馬拜仙都妙理吾能言威神可畏凛如在有臺今亦祠軒轅當年垂衣正南面制作取盡乾與坤鑿開鴻荒肇人紀首為區宇立本根風后力牧來聮翩神機開闢施無垠初傳聞道廣成子後乃密契中缺君功髙德大不可擬幾與造物分遺恩遙遙唐虞建炎運萬年天子兼神孫至人御世用常道飛升輕舉安足論爰作一氣生萬物奈何已把天人分伏羲八卦畫已破女媧欲補理亦繁飄然獨返紫清去却斂造化歸全渾廟中仙石表今古屹立霄壤爭推尊鼎湖可望不可見意令後世難攀援頂中玄宫號泥丸自然有路朝天閽此身內外神氣合俯仰自造生死門默運四時無詭異試觀日月誰吐吞祗今湖邊送風雨草木吹動旗與幡飄落十丈紅菡萏碧溪下插玻璃盆馬蹄車轍不須有雖迷襄野道自存嵓泉夜發百谷響洞庭樂聲猶可聞山川古色藏妙意誰與開滌明根源我談希夷返淳朴不假辨説波濤翻明覺山中始梅花戲呈妙明老急晷馳輪嵗將歇我更荒村轉氷轍凝嚴萬物凍無姿水墨陂塘葭葦折是誰背向此間來破萼梅花伴幽絶遙山誰恨天作愁淡畫眉峰半明滅清香自滿不因風玉色素髙非鬬雪竹籬凝睇一凄涼沙水澄鮮兩明潔天仙謫自廣寒宫定與桂娥新作别尚憐孀獨各相望多情與照黃昏月從來耐冷月中人一任北風吹石裂漫勞粉鏡學糚遲欲寫氷膚畫工拙千古無人識嵗寒獨有廣平心似鐵我因花意拂埃塵尚恐人傳向城闕詩成火暖夜堂深地爐細與山僧説皮日休曰宋廣平鐡心石腸乃作梅賦有徐庾風格豫謂梅花髙絶非廣平一等人物不足以賦詠明師見和梅詩再用舊韻兼奉送還福唐斫輪妙手聲名歇誰信出門猶合轍後來世外有髙禪凛凛蘭摧并玉折久將生死付八還不數圖書號三絶詩來乃與梅爭妍獺髓補痕紅未滅那知一夜卷東風開盡寒枝千點雪漢宫婕妤體自香月裏飛仙長玉潔白頭對鏡憶年少每到花開重離别愛花取醉惜夜闌春戀盈盈花上月人歸吹恨落關山恨極欲吹羌笛裂何况東溪蔓草寒學士猶嗤顔謝拙還驚詩律張吾軍鏖戰愧非求嚼鐵歸舟滿載萬珠璣莫顯神龍藏貝闕明朝詩逐暮潮還餘意慿師筆端説師舉東溪可上人詩句法似之送謝景思假太常少卿奉祀溫州太廟先至三衢省覲神遊眇邈海邊城捧詔躬祠盛此行九代衣冠漢原廟百年禮樂魯諸生東山世德聲名早南省仙班氣象清曉雨都門携錦誥路人更羡綵衣榮八月十四日送葉子謙自會稽之遊江觀湖歸閩傾蓋論交意已傾斷絃重續喜君聽山川妙意藏千古天地神機在六經朝夕事皆翻覆手古今情寄短長亭濤江君往觀秋注萬頃漲溟無淺汀夜坐夜久燈花自吐紅嵗華已盡尚飄蓬身遊百越風波外路入千山雨雪中失馬舊知無得喪拂龜那更問窮通懶將今古從頭數幾度邯鄲夢不同送僧秀遊海上諸山丈室凝塵鎖寂寥飄然更打衲僧包春風正滿碧溪水落日偏宜紅杏梢身外誰非追日杖法中我是續絃膠雲山煙海雖深廣未抵安棲一把茅陸左丞夫人鄭氏挽詞四首家學開皇紀淑聲通德門內朝班早貴中壼譽尤尊聞説百年事扶携兩世孫從夫得丈伯萬古姓名存寒日明丹旐流塵暗綵衣那知長夜去無復逝川歸方士言終誤神丹事已非出門尋弔客惟有鶴雙飛軒冕三從盛門庭五福優凄涼孝子泪悲慟故山秋楊子新阡啓班昭舊史留空堂對萱草無復更忘憂貌毁欒欒棘傷心蓼蓼莪斷機慈訓在懷橘孝思多露草寒沾泪雲山翠涌波悲風感行路楚挽不成歌同賦梅花十二題半開一枝開破一年春鬬蘂稠花總後塵却恨無媒憐獨夜月偷清影向何人清晨曉色宜春露蘂鮮玉人斜插鬭清妍新花更映新糚面無限風光在鬢邊風前清香自滿不因風花氣迷人處處同祗與吹開又吹落春愁已在笛聲中月下樽前舊厭繁多態雪裏曽嫌淡少情何似天容開夜色數枝寒玉轉輕盈雪後枝留清雪色難分似向殘糚試粉痕恨滿前村花落處萬重煙靄逺連雲雨中水泛殘香不可尋更堪煙雨鎖花心祗知賜浴恩波重未識和戎怨泪深水邊雪後濃濃嫩水通滿枝煙雨暗春風試看照影橫斜處渾似靚粧清鏡中竹外枝上淡煙籠白雪此君髙節助清真要知謝女姿容别林下孤標迥出塵江村竹籬茅屋江郊路未肯鬬糚城市間小朵飄零水風晚又隨殘月落關山山館窮途遊子年華晚折贈無人信手題留戀清香忍回首五更立馬斷橋西薄暮寒欺雪勒未逢春照影今宵借月魂可惜孤山吟已盡後來幽絶幾黃昏欲謝零落斜枝雪未乾且垂薄暮護春寒大都榮悴人情别我為殘英特倚欄遊東陽涵碧亭劉夢得所賦詩也明日過中興寺遊覽終日記所見我遊東陽城隱侯昔所治山川無古今城邑有存廢夢寐涵碧亭草間得遺記飛流落天明噴灑寒玉碎停車風雪中豈特生秋意李杜到韓劉崢嶸相品次景因真賞見遺句細吟味假蓋上前峰提携有兒稚明朝春開晴步到中興寺山僧引客遊佳處相指示羣峰四抱圍浮煙生暖翠唐年故刺史宅作布金地報以遺姓存猶盛邑中厲唐刺史厲日新捨宅為禪寺今邑中有後嗣存焉寶月生旁邑應真傳絶藝峩峩畫三佛張吳意態儷氣象隨世低病鶻無猛鷙碑隂筆縱橫才翁雄近世疑是蘇耽鶴去家已千嵗懷土一來歸故盡華表字寺有貫休畫三大佛及蘇才翁記墨上方有重閣景與衆山會一酌玻璃泉碧色劍鋩淬小叢相思樹紅蘂粲丹荔僧言此芳根草木獨靈異上枝花盡開下實方委墜開落俟相見終始周一嵗不同桃與李華實若相避愧師論應實未辨該實際山寒足力疲蕙帳聊假寐交錯拂衣巾紅緑映裙袂雖非維摩室天女亦遊戲起濯古銅壺凛凛存往製滌手焚妙香剩與洗塵滓欹枕聽松風為我勤解穢幽尋欲黃昏小圃春物麗落日在前峰駘蕩東君醉宫娥失翠鈿搖蕩誰復制風起落花多翩然如墜珥植杖久裴回羇旅得少慰恨無昔人語剖析發幽祕明朝漫回首長塗方聳轡綿綿芳草多天涯亂愁思賦得隔樹見秋燈隔樹見秋燈青熒更可愛半籠宜葉踈微透嫌杖礙深誤暗蟲投靜窺棲羽在望疑簾中暮吟惜攔干外月到冷光幽風來孤影碎山客遙夜歸耿耿如相待舟行扶病訪王文孺曜菴且蒙賜佳章次韻為别西風過雨冷孤雲客路衰骸與病親煙渚好橫今夜笛雲林還憶舊時人凌空丹藥傅巖客近有遊客蓋吕公也遺文孺長句及神丹照水紅蓮賦洛神老泪數行傷别蓋自憐無可更霑巾九月二十七日與客遊龍山野服芒鞋步步同天寒猶薄客情濃身如萍水同千里路入煙蘿更幾重滄海清江共今古黃花寒葉雜秋冬暝雲自與千峰合送我歸鞍寺寺鐘雪作望剡溪玉樓瓊樹曉煙披擁衲開門四望迷清曠世人誰似我雪中更到子猷溪雜興效阮步兵松巔負殘雪髙映寒日暉衝風忽飄墜勢若從天飛庭虛四散入凌亂侵人衣衣重不忍拂恐與清景違援琴弄太古聲淡節亦稀衆笑已獨賞恍然迷自非乃知絶絃意千載同依依倚樓曲天邊皎月凝清光圓缺不如人意長夜來嫦娥和月落清曉鏡裏看新糚此情同生復同死君似欄干要堪倚髙樓風送管絃聲腸斷五陵年少子書謝文靖東山圖謝文靖東山圖今會稽東小江之上有東山存焉絶頂下臨江海蓋萬里雲境也僕觀文靖初渡浙江樂會稽佳山水與王右軍許詢支遁孫綽李充遊則東山在會稽是矣僕嘗宿其上題詩僧壁云山晴山雨古今恨潮落潮生朝暮情我識前人舊時意寒巖一夜聽江聲今觀斯圖併書之為一笑之地耳紹興十二年二月丁邜書山如出繭眉溪似縈風帶雅意樂溪山安用携粉黛煙雲無定姿姝麗有真態謝公經世心遇物何顯晦鐘鼎與山林生處初一概均分四海間如我常安泰臨難無喜懼與人共憂愛百年但影徂千載猶心在風流不可追超然八荒外次韻率行之見投因以賦别素空零玉露碧梧墮金井周年不待人去我如斷梗歸翼懶飛翔老驥倦馳騁山空風月滿人戀松桂影窮方屢厄陳喜動初入郢文豪獲勝遊羇思發深省周原富十箱漢儀重九鼎王謝樂江海巢由本箕潁談深光明藏遊遍妙峰頂頌橘悲屈平賦梅思宋璟炎涼梁上燕喜怒坎中黽千年六龍轡此謂日轡也萬事一魚艇居人望歸騎暝色暗前嶺淺學字識丁美穴魚知丙書隨新雁行慰心常炯炯寒夜淡月新霜似舊時更憐秋興夜遲遲夢回一枕凄涼恨帳外青燈不得知蒙蔡藏用惠古風一軸歎仰不足輒賦病桐詩為謝戚深而詞衷耳老境憂患集坐受衰病侵山林成獨往樽酒惟孤斟萬事信已矣滅迹棲松岑對鏡未免愁寒雲生嶽隂斯時瓊瑶贈無以報兼金酬之病桐詩嘆息成永吟風霜入枯枿螻蟻穿病心艷艷上林樹已朽難寄林幽人識㸑下取作緑綺琴拂拭延妙聲泠泠朱絲繩淳風散已久世為多窪淫一弄清風還三古盡可尋自然俯仰中山水見髙深同心齊取捨何嘆異古今永言遇真賞山海有知音除夜一嵗盡今夕既往那可追疏梅吐幽艷輕氷釋寒澌新陳自相代長作萬古悲亦復強取醉椒盤雜兒嬉天回萬物春除盡羣隂卑地除衆枯稿從今作華滋一除不可復緑髮成鬢絲此是有盡處那知無盡時凡所未除者所願皆除之晚景安分守幻身絶思維生死我所明聖賢我所師優遊觀變物翼戢仍鮮差山嶽惟塵爾寸心不可移浩歌坐達曉自信何用疑樓頭畫角聲已逐東風吹寄和邢子屑孫屑之始春見寄東風初到亂山頭無數殘梅雨未收何待傷春對晴景暝雲橫盡古今愁海山雪後海天寬羣玉參差萬里寒巖谷無人共清夜倚欄獨向月中看山林老去萬緣休只有情鍾舊輩流芳草無窮山四向斷腸人在最髙樓元日雪布和舊重王正月嘉祥元日初逢雪飄入椒觴氣更蘇積滿玉蒲水已怯嵗厯今才第一行三百六十完未缺故使重窺混沌時太素山川始融結但聞南陌流歡聲懶將西佛論初劫九門想淂千官期髙聳岧嶤白銀闕事隱東林夜宿年靜灑僧忩更幽絶草堂人去空舊賞夢入江山半明滅秪今縱橫天上來勢壓丘陵動溟渤映山更倚百尺樓始見天工盛施設朴嘗謂雪宜映泰山髙樓自上觀之明日東風掃玉塵輸與寒梅亂花發壯觀新年意氣張天巧空竒吾語拙送嘉魚周尉大門志與古人謀萬卷詩書第一流文采聲華今有繼死生契濶獨相求天回涼色偏宜月地近潮聲先帶秋此别頻書訪存沒老人曽見綵衣遊送無相祖老真骨歸塔去來一念等孤雲雙履西歸道更尊落葉滿山新塔就雨花盈几故經存風流罷放林間鶴月冷空啼嶺上猿白髮未為生死别寒溪猶繞舊松門寄南巖悟禪師雪後千峰玉刻成瓊瑶寒照寺樓明遙知禪老開忩坐指點煙村看晚晴憶廬阜寄機上人憶在柬林學後禪月中清響聽風泉不須更作廬山夢魚鳥相忘二十年上方松間清月佛前燈庵在孤峰更上層犬吠一聲秋意靜敲門時有夜歸僧向伯恭薌林詩楚人喻香草可佩復可食靈均楚同姓放逐去其國皎皎忠良心惕惕懼讒賊偏舟下滄浪魂迷招不得至今芳洲上寂寞少春色我公異於是聲譽超八極挽公青霞裾接武紫鸞翼真契慕湘纍論心不論迹我是衆薌林澡身而浴德同心等崇蘭直節逾蒼柏登善味芝术去惡鋤枳棘荀令十里香揚雄一區宅君臣相唯諾品題來藻飾日光萬丈長衆薌馥芳澤况了大因緣功名皆戲劇手擎妙喜國心湛水精域諸天衆薌雲旃檀雜薝蔔登門三十年嵗晚仍作客誦公薌林詩心境為澄徹雖非歌商頌聲亦出金石會稽楊梅雄天下其佳者皆出項里相傳項羽鄉里也驗圖志信然戲作楊梅詩供作者一笑耳越山楊梅最珍美人傑地靈生項里江東廟食憶至今應緣似舜重瞳子南方炎威無時窮落在故鄉草木中請看枝頭萬點火猶是咸陽三月紅摧剛作柔隨物轉婦人之仁仍可見風姿和味説難名顔色與香收易變炎炎夏日簾影垂拈汚玉筍明瓠犀映出越女天下白壓例驪山生荔枝金鼎奪胎尤出類萬人口腹非其對外丹須要內丹成任君對樹連園買雪晴間渡西溪雪後孤村一段煙晴光逺射玉山川酒旗隔岸招間客猶上西溪渡口船送郭上人遊九巖殘菊孤花留暮秋勞師問路亂山頭九巖只望孤雲去舒卷和雲得自由泉聲娟娟山月半巖明樓殿霜重夜氣清誰把玉琴來寫取松風吹斷夜泉聲詩送韓簡伯學官於臨浦呈勸其重修西子祠昔遊臨浦春正濃小江縈委如無窮花浮干林錦繡幄舟揚萬頃玻璃風西施故鄉擅佳麗會稽秀氣藏華穠是時山晴見真色落日西南千萬峰今情不盡古情在恨疊晚糚眉暈重恨應但知傾國貌無人能説亡吳功倘非絶態蕩君意姑蘇臺下猶歌鐘功成未甘歸范蠡素衣故國寧相從韓嘗作文辨無范蠡携西子事文公之孫重瑞世衮繡門户推八龍官間援毫來弔古溪山頓為開愁容謫仙亦賦綄紗石至今翠綃不停織浴池邀伴下瑶池霑汚越女天下白山頂有西子浴池風流昭洗待名流有德於人當血食紅心草葬舊金叉黃陵廟成新石刻露裾瓊佩無消息怨魄凄魂招不得一杯流木奠江蘺苧羅山前已秋色上巳日送韓簡伯門户荀陳士論僉却隨王謝老江南一官傲世妨才命萬事承家任苦甘漁艇我將還舊隱僧忩誰與對清談落花風雨西陵渡佳節可憐三月三登育王所示現塔贈卿璉與三上人危岫戴寶塔亭亭起虛空金鐸韻廣樂日夜鏘天風氣清逼雲漢興逸追鸞鴻嘉有三禪子超曠棲禪宫相追不憚逺幽致惟我同興盡歸一默人逐歸雲東平軒架絶􅊤上與絶頂通滄溟忽破碎百川競朝宗斜陽無逺近山亂髙低紅四表倐明晦變化安可窮夜深風雨來隂氣誇驕雄響劇百谷咽靜夜一氣融明發石路乾清韻生寒松苕溪僧妙詢於其所居淨域開小軒十笏間靜求為永名僕以陶靖節乘流遇坎之語榜曰乘遇亦足以觸所遇而安不然雖無名可矣一性本為真返為羣物迷境淨皆徑山心清即苕溪啓扉回臨湖湖寬覺天低花木春艷艷松竹涼凄凄慿欄快神襟永與塵事睽歸船動菰蒲興斷殘霞西浮煙暝自起待得衆羽棲貯空諸佛心妙理何端倪乘流與遇坎萬有皆筌蹄聊陳淵明意斧藻粲幽題豈有明月珠祗照濁水泥期我老中林滅迹為圃畦况得大開士賦詠自攀躋禪深有根源句圓無角圭乃知文字工自與造化齊次韻梅花廣寒宫裏自無倫不秪塵中第一人絶態乍辭天上舊清香更占世間新煙愁月恨迎回臘日暖風遲俗却春且對流年覔新意橫斜踈影句皆春兩宋名賢小集卷一百八十七
