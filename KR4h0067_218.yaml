body:
  text: 兩宋名賢小集巻二百十八宋陳思編元陳世隆補文惠詩集徐經孫字仲立初名子柔豐城人寳慶二年進士授瀏陽主簿潭守俾部牙契錢至州有告者曰朝廷方下令須行十七界㑹令若此錢皆用㑹小須則幸而獲大利矣經孫曰此錢取諸保司出諸公庫吾納㑹而私取其錢外欺其民能欺其心奚可哉詰旦悉以所部錢上之其人驚服有愧色辟永興令知臨武縣通判潭州帥陳韡雅相知事必咨而後行秩滿由豐儲倉提官進權轄國子博士兼資善堂直講為監察御史劾京尹厲文翁言偽而辯䟽入留中宣諭至再即日出闗上遣使追之不及進直寳章閣福建提㸃刑獄號稱平允歲餘陞安撫使召為秘書監兼太子諭德經孫為安撫時韡家居門人故吏有撓法者不得逞相與揺撼至是韡起家判本郡懐私逞忿無復交承之禮即日劾奏通判削其秩經孫造朝具白其政府事上聞帝大怒諭宰執曰陳韡老謬至此宜亟罷之於是經孫再詣政府言某韡門生也前日之白公事也苟韡以是得罪人謂我何請之不置俾自乞閑明通判無罪識者韙之遷宗正少卿起居舍人起居郎入奏君人者當守理欲之界限遷刑部侍郎兼給事中陞太子左庻子太子詹事輔導東宫者三年敷陳經義隨事啓廸太子入侍必以其所講聞悉奏之帝未甞不稱善景定三年春雷詔求直言經孫對曰三數年來言論者以靖共為主有懐者以譁訏為戒忠讜之氣鬱不得行上帝降監假雷以鳴切中時弊時公田法行經孫條其利害忤丞相賈似道拜翰林學士知制誥未踰月諷御史舒有開奏免罷歸授湖南安撫使知潭州不拜授端明殿大學士閒居十年卒贈金紫光禄大夫經孫所薦陳茂濓為公田官分司嘉興聞經孫去國曰我不可以負徐公遂以親老謝歸終身不起題施山觀音閣閣道連雲棧簷牙覆竹隂南來天馬渡北落水龍吟林鳥疑譚偈田花欲布金凭欄觀下界洞見逺公心病中有感習懶多成病旬餘久覆杯帳中聞燕語瓶裏㸔花開醫已肱三折愁來腸九廻何時得踈㪚屐齒印蒼苔贈曽司户君家螺江頭我家劍江邉千載㑹相望飲水同一川朅來古梅開相識春風前高義軋層漢清談響幽泉努力効徃哲勿為時俗牽和黎丞梅闗嶺峭壁接高天閒雲淡横嶺稍便僧房靜未覺官曺冷風月兩閒人山川一佳境誰歟共兹樂老仙白垂領丙戌年新春偶成新年十許日才有一篇詩郷思風中亂春心雨裏知病縁衰驟至懶與睡相宜暗想泉溪上杜鵑啼故枝小英石峰舊作英巗隱今為庾嶠行雖然一拳許有此數峰青崷崪驚凡目堅剛悖世情墨郷相指似只尺是蓬瀛送大庾黎丞客懐秋易惡送客更當秋薄宦相從久孤征肯暫留酒輕離思重目短大江流黄菊聊持贈寒香晚不羞月夜赴郡㑹歸鞭轉不成寐觸事感懐庾山高入雲章水清見骨山高晚宜梅水清寒浸月美人天一方雲煙妙空濶帯月簮梅花獨起舞殘雪覺溪八景今存其三雷奔石壁間瀑㵼洞門側蜿蜒乘洪濤變化莫可測龍門春浪山圍古寺隂曙隔鯨音發悠揚三四聲喚上東林月隆福晚鍾飄瀟鷗鷺羣浙瀝菰蒲晚雲㫁山月明新泉落前澗驟塘暮雨雜興梅花亦何竒偏得幽人愛清寒風雪夜一枝靜相對自贊夏端甫所繪眞老我不堪位置歸來久溷漁樵忽然珠玉在側見之令人意消出朝賦歸來好歸來好籬下菊花應未老晚香猶可薦清樽淵明醉後和衣倒歸來好一入山林跡如掃杜門謝客免愆尤几净窗明讀莊老恭賀御製詩多士新彈禹貢冠對天忠切動龍顔臚傳聲徹頒袍笏燕喜筵開肅佩環樂奏簫韶成廣内詩成奎璧照人間㣲臣捧詔慚踈拙祗抱傳宣拜賜還福州即景一别居諸歳月增遙聞此景畫難能潮田種稻重收榖石路逢人半是僧城裏三山千簇寺夜間雙塔百枝燈常年六月東山裏地湧寒泉潄齒冰長孫敏學授承務郎辛勤埸屋一書生六巻時文漫䇿名身事兩朝奚所補恩覃五世亦何榮前人慶澤宜豐報兩軰官曺詎可輕移孝為忠斯不負更須勤學紹家聲送仲時弟江闗千里隔山川有弟能來慰眼前方喜雁行隨處樂可堪蟾影别時圓暑行勿亟宜強飯湍激多驚莫問船歸到家山相勞苦團欒却是菊花天乙丑三月十二夜夢得家有園池樂壽康之句覺而足成効邵康節作首尾吟家有園池樂壽康閒中日月覺偏長睡餘携杖逰花圃飯後呼童給鶴糧堆案縱横書數册隨盤歡喜酒盈觴客來問我渾無事家有園池樂壽康兩宋名賢小集巻二百十八
