body:
  text: 兩宋名賢小集巻三百四十七宋陳思編元陳世隆補西塍續藳宋伯仁三安居窮通豈在苦勞神且作安居嬾散人買地種花多種竹煑茶邀客也邀隣求名豈識書三上得興無過醉一巡喜得滿園收芋栗杜陵應未笑全貧有感窗户清清半掩門小兒揩淚立黄昬㡬多心事無人問獨看梅花月半痕聴琴静夜聴鳴琴秋風動幽谷何為鍾子期千古無人續褚先生先生邂逅龍亭日多少雲仍滿世間千古典謨文獨記九流毫髪事相闗代庖阿堵名尤重製甲防邊職未閒只與道人為鶴悵始能清夢繞湖山嵗旦己亥嘉熙三年居閒無賀客早起只如常桃板隨人換梅花隔嵗香春風囘笑語雲氣卜農穰栢酒何勞勸心平夀自長五老儒將農漁女壯年期佐漢中興豈謂蟠龍睡不醒可惜滿牀廷對稾白頭翻緑疑是録道家經老儒髀肉豐腴鬢髪疎將軍健飯待何如七禽不了中原事羞讀君王問勞書老將齒髪俱無背已駝雨耕摩破㡬青蓑髙皇慶夀推恩語暗讀全文忘不多老農短髪衰髯一棹船白頭波浪㡬掀天兒孫各占蘆花佳網得鱸魚即酒錢老漁著破箱中欲嫁衣翠顰何止只憂葵春來偷摘斑斑髪淚濕菱花只自知老女逺訪友人不值留集句一絶寒食花枝插滿頭范成大長亭搔首晚悠悠鄭毅夫灞陵女子無人識王竒别是天涯一段愁陸游寄征夫待君君未歸寄書書不去寄書書可去有意殊難語深夜彈琵琶思君在何處知君在何處不禁春事已闌珊東風吹起楊花絮東風吹落楊花絮客樓戲集唐人句門掩楊枝一夜風社牧之自憐羇客尚飄蓬李山甫不堪吟罷東囘首僧朋來鳥傍巖花戲晚紅杜荀鶴贈僧了性雖然年紀小胷次已江湖貝葉連宵看梅花一様臞記詩誠敢許戒酒恐應無好向蘇堤上行行掐數珠醉中登樓明主何嘗棄浩然杯中有物且隋縁倚樓心事誰消遣一㸃飛禽落釣船嘲燕年來乳燕亦堪羞不學楊花得自由飛過㡬家門户去直須尋見最髙樓瓶梅南枝斜插古軍持痩影參差落硯池莫道人家窗户暖等閒忘却隴頭時春半春到巳多時遊人替衲衣栁眠鶯喚醒花痩雨添肥官事癡能了人情久巳非一貧能自守贏得掩柴扉散愁四首著意功名四十年栁花空滿鬢絲邊男兒無補朝廷事有媿飢餐困即眠小樓呼酒揖青山翠碧瓏璁一笑間山若有情應問我如何猶似野人閒清貧如水儘無妨只願伊周立廟堂扶起太平千載脈且隨農父樂耕桑旋買犂鋤學種田一聲長嘯霅溪邊微茫白水山如畫好箇江南萬里天午睡午夢驚囘筍簟涼坦夷襟度即瀟湘詩髙自與梅花好食淡方知菜味長事説萬端多畫虎人無一念不亡羊滿頭飛絮春零亂莫笑狂夫老更狂酒邊一醉復一醉陶陶醉未休何傷於日月知我者春秋萬事難追昔千金不解愁白鷗飛浩蕩此興屬漁舟小舟晚賞荷花囘文天浮月影水浮天路繞山頭樹繞烟船小小行人意適藕花新索酒杯傳清明插柳清明是處插垂楊院宇深深緑草藏心地不為塵俗累不簪楊柳也何妨晚春風甃殘花滿地紅别離樽俎漫匆匆春光未肯收心一作純收去却在荼䕷細影中緑隂隂裏惜韶華自縛筠捎掃落花可笑游人心未嬾杜鵑啼處撥琵琶清和詩債還無足家園亦倦看客遊宜致仕午睡當之官舌笑張儀在心慿達摩安清和天氣好應免夾衣寒久坐久坐如忘世松窗日未斜營巢鵶噪樹作去聲夢蝶眠花易課推三畫醫方録數家瓶笙聲未絶更㸃土山茶戲作青梅黄盡雨無多柳影重重午日過忽聴隔籬人語笑採蓮船一作艇子上新河玉泉寺金魚金鱗韜隠已多時寺壁重泥又有詩龍若久懐霖雨志不應蟠一小方池僻居居僻恬無事開軒挹晚晴雨耽雲脚重風約燕身輕有子争棃栗無朋問死生毎憂人載酒剥啄打門聲倦吟競病推敲欲嘔心何如危坐憩桐隂新蟬咽咽知人意學我年來抱膝吟云云休將閒耳聴云云只作深居耳不聞素志肯隋時節改清貧難計利名分忘情茒屋無非燕著脚青山獨是雲試問急流誰勇退故園同看木欣欣愁愁懐難盡疑是畫亦難詩惟有流鶯暗得知我亦無言鶯不語栁邊相看立多時蓼花秋到梧桐我未宜蓼花何事已先知朝來數㸃西風雨喜見深紅四五枝嬾嬾嬾復嬾嬾一作嬾嬾嬾復嬾而今嬾更疑此身聊復爾萬事欲何之尚覺瓢為贅奚煩鍤自隋客來眠正熟帬幅任題詩書座左天地一籧廬吾身自巻舒翁能從失馬子亦豈知魚謹獨甘居漏安貧且飯疏昨非今未是寧不賦歸歟書座右蠻觸小功名須教一念輕受恩知報飯臨事貴懲羮夀域惟仁宅心田以道耕泰然忘物我無使狎鷗驚涼不擬西風一頓涼看看涼近木穉香人家未得征夫信蚤有砧聲却雁行荷花緑盖半篙新雨紅香一㸃清風天賦本根似玉濓溪以道心同扇師璋今有㡬家同名重蒲葵價亦穹髹柄但誇千縷骨不知曽未掩東風中秋月只與閒時月一般寧知今夕最團欒竹邊借柄還如扇花下傳杯可當盤野兔易忘終夜夢林烏未許一枝安人生㡬箇中秋節那得都將笑眼看席上有舉東坡集歸去來字成詩十首雨中戲續一首傲去欲何求歸來已倦遊琴詩聊自笑丘壑復相留問菊時攜酒乘風或棹舟樂天良有以心事老田疇漁父吟小舟如鴈許穩穩下波一作陂心蓑笠㡬風雨江山無古今清歌鳴短棹紅葉滿疎林一醉不知世前村月未沉秋風秋風巻秋葉秋思滿秋天骨立山如削聲低鴈欲眠客愁無暇日農事喜豐年説著鱸蓴事歸心滿釣船聴雨涷雨瀟瀟未肯晴灑窗聲似煮茶聲山童酤得鄰家酒炒栗爐頭獨自傾村田樂打稻天如二月天滿邨和氣樂豐年田翁爛醉身如舞兩箇兒童䇿上船問梅癡風袞袞送寒來竹裏人家總未開唯有老巖心事苦痩筇敲雪問梅腮山下山下六七里山前八九家家家清到骨只賣水仙花落葉捲地西風促雨來掃除黄葉滿蒼苔垂楊蚤有青青眼只礙梅花未放開梅蘭清標同插古軍持清似西山凍餒時嚼蕊㺯香無説處屈平和靖亦何之佳人歌淡傅粉淺畫眉鬢邊休插桃花枝白面郎君馬如箭囘頭再盼情依依文君未識相如面朱絃聲裏猶相戀風流勝事千古傳寧知文君當時深處深庭院臨邛亦免王孫怨佳人佳人休捲簾門外落花春正甜繡牀午困語聲寂博山漸冷香頻添佳人憶佳人吁今人安得人人思秋胡黄金不認真丈夫醜女歌梳風楊栁笑沐雨杏花羞看看三十餘不敢下糚樓待媒媒不來對娘娘共哭何時王右軍來坦東牀腹君不見西施絶色天下缺能使麋鹿走吳宫玉環一笑百媚生能使漁陽鞞鼔驚𤣥宗無鹽無鹽形貌惡當時一段議論千古生清風美婦未必美所美貌徒美醜婦未必醜所醜行不醜醜妻惡妻夀乃翁何須能勸羊羔酒曹娥謝趙菊莊相訪江城潮汎小砂磧纜行舟挈酒尋詩好披心話客愁雲歸山欲暝風急雨如秋可惜相逢處匆匆不少留值雨吳陵兩月雨畱連來問瓊花落砌邊市酒未消狂客恨塞鴻先作嫩寒天只憂松下無三徑不管囊中欠一錢揚子江頭風正急未知何日買歸船寄舊友男兒未遇總英雄漂飯非憐計已窮鮑叔但能知管仲孔明猶必拜龎公秋江萍梗人何處夜月梅花夢亦同借問選詩編㡬許元暉瀟散漸唐風題象山縣棲霞觀應真亭簡住持張羽士杜鵑聲裏立東風山色應憐鬢巳蓬二麥曉寒新雨後一年春事落花中醉斟浮蟻邀仙客笑揖飛鷗問釣翁簷外萬竿君子竹虚心能得幾人同村莊即事青旗獵獵又村莊仙景還他是故鄉叟有七旬頭未白山無重數葉初黄稻畦明月家家酒茅屋清歌處處霜晚菊一籬秋欲老客懐牢落愧重陽别朱冷官客中奔走易蹉跎學館癡留月又過橙蟹醉斟知己重蓴鱸鄉話益人多吳陵今夜三更月霅水明朝一棹歌船在白蘋亭下過有無傳語曬漁蓑邊頭老馬解下韁繩便欲眠絶無筋力可勝鞭霜蹄徧識淮南地夜草猶吞塞北烟怕逐綵旗排偃月寧思金鐙趂朝天華山自有安身處試問將軍任㡬年夜過烏鎮望極模糊古樹林灣灣溪港似難尋荻蘆花重霜初下桑柘隂移月未沈恨别情懐雖戀酒送衣時節怕聞砧夜行船上山歌意説盡還家一片心簡張寄翁秀才徽外琴聲局外棋此心能得㡬人知縱横漫説三千字陶寫須吟百一詩秋到蓼花蟬噪後雨敲荷葉釣歸時西湖儘著張公子莫把吟篷月共移呈菊坡先生陳樞使但知猿鶴伴閒居不覺憂時鬢已疎對客怕一作懶言今日事挑燈重讀少年書樓迎山色詩堪畫門對梅花月共鋤相業累興明主意先生只恐自躊躇駕鶴林吳尚書赴召隆興鸞翔芝蕳下溪堂醉夢驚囘午正涼寵報帝俞催宰相宜將州紱召文章蘋花襟袖宫花近詩草簾櫳諫草香大化一新多吉士巻阿歴歴告成王苦風督鹺課甚迫僕僕馳驅夢不安猥哉誰恤買鹺官星臺閣住春來俸雨意翻成夜半寒人可與言能㡬輩事難區處更多般桃花一日多開盡插滿銅瓶亦倦看秋雨簡劉主簿秋到天涯未兩旬西風無日不霖霪數行新鴈千門曉十幅輕帆萬里心薄宦只宜聞早去長淮未許作狂吟江南誰倚闌干曲丹桂香中酒自斟呈留耕先生王侍郎夜雨篝燈夢未閒十年殊愧屋頭山喜聞鐺脚濤聲起不憚吟髭霜様斑漁釣醉歌人所願功名心事國相闗辟書笑倒梅邊鶴盡在先生指顧間寄題臨江王實齋司户百花洲錦囊詩句識花洲何日清江得醉遊百畆故園重缺四賢遺像愈風流香浮紅樹春應早雪壓寒梅月想留我有煙波漁具了一作在一絲風底願維舟夜坐栢香煙裏瀹山茶窮似燒丹道士家窗紙暫明寒月上一肱清夢入梅花秋田小立兩間茅屋是誰家淺水汀洲舞荻花牧笛數聲紅日晚自慚身似客天涯兀坐對坐清清一穗香悄無人語日徧長硯盤數㸃梅花片暗引游蜂度粉牆晚涼兩兩蟬聲送夕陽竹隂移緑上蕂牀黄昬急雨無多子喜得今宵夢亦涼夏日二首泓泓圓碧漾新荷獵獵斜風顫緑莎農事正忙三月後野田齊唱插秧歌數㸃沙鷗掠野塘雨聲初歇水微茫橋邊十里荷花蕩輸與漁人卧晚涼兩宋名賢小集巻三百四十七
