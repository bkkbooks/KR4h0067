body:
  text: 兩宋名賢小集卷三百三十四宋陳思編元陳世隆補北窗詩藳余觀復字中行旴江人有北窗詩藳讀柴桑集遊心太古初得向萬物表平生一樽酒寂寞三徑小有琴不張絃正以知音少伊豫挹殘芳道心炯相照北窗清夢長山間自啼鳥吾欲問先生天濶白雲杳咏懷山容洗眼青江光照肌白翻枝鵲查查抱葉蟬嘖嘖蒹葭搖風聲梧桐淡秋色草木了無能隂陽互相激人于大化中真成逆旅客藏舟夜半移不假賁育力塵網罩入紘貪夫受羅織蹇豫丘壑娑一室頗安適荒尋縱竒懷清詭弔塵迹風搖泛海槎雨澀登山屐世逺事荒唐文髙興寥閴渺渺孤征鴻一舉振六翮此意人莫知獨宿巖扉寂寄伯成昔别青梅酸今來黃葉墮葉墮卻歸根窗隙見駒過大巧亦自然小智空瑣瑣一言取封侯千金賈竒禍達人知倚伏去就無不可天公亦何為妙用正在我風雅不可復趨巧世代然君看黃初語已減河梁篇神思透溟涬至寶辭雕鐫儻欲剩著語不如寂無言梅花引耨銀雲鋤璧月裁得寒花寄愁絶陽和一點來天根春滿江南誰漏泄珊瑚作樹玉為膚沈水薰香檀吐屑野橋橫寒澗潔斜梢舞破屋角煙老樹壓殘墻角雪風流不肯王謝儔孤髙尚笑夷齊劣蕭然與俗最無緣此話難明向誰説絶愛西湖君暗香浮動月黃昏亦愛東坡老竹外一枝斜更好二仙去矣花寂寥著語壓花花不倒誰能淡筆傳其真誰能楚語招其魂參橫月落興未丫三呌花神聞不聞花影搖搖情默默冷透吟脾醒醉魄問渠桃李豈知春西抹東塗受春役自然香無色色譙樓角動霜初飛蕭寺鐘鳴天欲白披衣繞遍樹頭行判斷人間風月國梅花羣卉皆輿𨽻孤標真聖賢乾坤清不徹風月興無邊生意春常在貞心晚更堅騷經雖不載已入二南篇山居即事密竹環茅舍應無俗士過睡濃嫌日出坐久厭塵多鬭雀翻危葉飢鵝唼短莎世塗真九曲奔走欲如何梅花自是孤芳集大成紅紅白白漫爭名天邊差有雪堪亞世上更無花敢清筆到華光空幻相句如和靖藹遺聲一枝勾引窗前月冷淡相看太古情次韻春日日淡風輕養物華老天將此付詩家人情巧似營巢燕春意忙于赴壑蛇寂寞蘭亭空有感淒涼金谷竟誰誇絶憐狂甚樊川社枉殺吟情豆蔲花次韻稻簇殷紅竹迸青風驚簷玉一時明晚來幽趣無人解流水聲中看月行步繞步繞蒼苔自咏詩吟情惟有澗泉知山猿忽地來偷果攀斷庭前烏桕枝木犀盤盤老桂樹金屑黃􅀢鬆孕此無盡香襲襲乘西風幽人為延佇古意滋無窮王孫招不來西郊草蒙茸欲以遺逺者道阻嗟難從愛之不忍替檻之寄房櫳夢魂恍而清夜半超鴻濛常恐芳氣歇我恨何時終兩宋名賢小集卷三百三十四
