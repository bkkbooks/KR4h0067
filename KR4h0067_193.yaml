body:
  text: 兩宋名賢小集卷一百九十三宋陳思編元陳世隆補方壺存稿三汪莘題汪侍郎仲宗北山道院北門之宅可忘歸北山之山天下稀自非君身有仙骨安得蓬壺閬苑相因依長松巨柏氣象古紅鸞白鳳交橫飛翔風萬里促冬日金橘干樹爭光輝樞密曽孫侍御子天資酷與前人似只今四十未為老不選娥眉壓閭里道院夜長霜月白豪氣猶餘好賔客早晚春歸花亂發蝶舞鶯啼亦傷魄此言聊戲爾時事端可惜大兒只求上上考次兒只用平平䇿敵運已衰當謝絶西戎方強又須索北山主人那得間袖中三尺青蛇斑有客不知其所往嵗暮江頭雪三尺春晚曉來雨初晴天宇淨如拭隔籬見花栁春氣亂五色東君渾不管但為間者得我方獵鵾鵬溟南復溟北佛書載兜率天有內院道書有赤城朱忩乃帝一內宅因述所聞結髮師心內院行紫雲門闕碧霞城一聲霹靂衝天響萬點星辰匝地明鼎裏金丹能虎變牀頭鐡杖帶龍腥極知富貴非吾事玉簡珠繒有姓名自去秋疾作正月尚未全愈曉枕有懷插栁栽花便滿林午天蜂蝶曉天禽老來病損渾無力報答春光只有心寒食節有感江南兒女尚多情為愛芳晨載酒行幸自不知惆悵事鳥啼花落是清明寒食原頭杜宇聲誰家勾起古今情紙錢燒罷人歸後一樹梨花凍月明贈張漢卿徐侍郎在宜春一寓張漢卿朝夕相周旋侍郎起九江帥金陵移豫章皆挾以俱余訪侍郎于豫章與之同處西齋其氣貌如古劍客而得其心真道人也頗有歸興余故作此詩以贈之相伴留侯訪赤松碧桃花下醉融融玉龍嘶罷還家曉月照蓬萊第一峰昌化縣西廣福寺前嶺上有古松一株甚竒每過其下徘徊不能去今夏五月過之始賦一絶虎攫龍跧數百秋灘聲長繞半天流老僧不與人間事獨立門前一點頭孟秋朔日天台劉允叔和叔鄉人陳思敬餞飲錢塘門外雙青樓上西湖日日可尋芳樓上憑欄意未忘斫取荷花三萬朵作他貧女嫁衣裳臘日晚過楊村寫望萬里溪光一望穿潛魚世界白鷗天若為移得溪光去落日茅齋相對眠立春日山行連山殘雪獻年華翠黛千層蹙浪花天上畫屏描不得懶移皮屐下鄰家籬隂籬隂雙蝶趂春暉輕展新黃試舞衣點草撲花如得意因何相逐背人飛仲春溪行即事竹外夭桃分外明一枝折得繞溪行春風誰道全無主蝴蝶飛來花上爭栁枝詞繅出絲煙輕裊裊掃成雪帚重垂垂風流舉世無過栁總合殷勤把一枝暮春二十八夜枕上有懷邇來尤覺光隂速晝夜分明似水流却是光隂無變動漫教浮世有春秋茅簷環走兩金輪二十九番楊栁春回首半生無覔處秖應留得見前身陋居五詠首篇用太白過汪氏别業之韻景風院昔年浮丘人池館藏一丘天門騎鹿仙浩氣壓女牛朅來木正落歌動林塘幽至今五月花憔悴因郎羞底處牽白犢超然對清流景風故隨車為我回涼秋池館文室明松窗水竹相因依盧橘冬已花日出黃蜂飛愛此禪房幽不踏市朝機時觀彼蒼意常與人願違彼蒼不可會青山又斜暉竹澗散髮篁竹中濯足寒澗流太陽正徘徊心與爽氣遊活活走龍鱗鏘鏘韻天球于焉種荷花遙剪西湖秋亦思百頃緑薰風木蘭舟青鳥飛還來白魚沉更浮竹澗魚鳥家益覺吾廬幽蔣徑穿渠帶幽徑列竹依清流中有好鳥鳴暮鎖星辰稠北風攪雪花更覺龍鳳遒東皇憐嵗寒丹白如飛流細履或得得長歌亦悠悠顧為非蔣卿何以致羊裘月臺呼匠琢山骨臨水起月臺一槃古月色竹影涼毰􅂒竹影如掃月月色掃不開居然廣寒宫桂枝苦低回便欲招謫仙娥眉送瓊杯娥眉見梅花思君弄青梅中原行懷古漢家中原一百州故老南望空悠悠問君邊塵何足道坐守畫地如窮愁不共戴天是此讐生不殺賊死不休諸公但能安身計更無一點英雄氣遂令多士皆沉醉絶口不復言時事恭惟我君天勇智皎日平生復讐志秋色平場千萬騎望裏亭亭黃屋至六軍拜手呼萬嵗報恩便欲無生意西風蕭瑟天無雲引領嶓冢愁黃曛白衣不得見天子道人何得愁朱門可憐涇渭胸中分願起沔陽死諸葛作我大宋飛將軍季夏之末鵑聲不已念爾殘春啼不休若為春夏抱春愁亦知春去年年事憶似前時春盡頭閏十一月東行臘月立春夜秀州船場橋玩月甲辰正月草四日出都城草七日曉行即事鴉聲欲斷雉聲起栁眼已青桑眼黃故鄉春事正如許春事只緣思故鄉乙已暮春初六日晚對新月春來風雨耿黃昏初見青青月一痕憶自消魂南浦後不禁描出向前村中元夜興東院長廊約二更風雷送雨正冥冥忽看電掣金蛇過照出青天一點青緑隂緑隂窗底蔚藍光習習清風入座涼五月人間同此意故知彭澤到羲皇開禧元年四月自中都挈家還鄉寓居城南十二月遷居栁溪上其夜大雪初二日蓋宰來訪約過縣齋為一日欵深夜而歸賦此出郭已超俗住溪尤近真青天素知我白雪便隨人守道何妨賤藏書不盡貧長懷社中友共發甕頭春世事偏宜假吾生只認真少知行路惡老愛在家貧寧接古時鬼怕逢今世人澗松方臥雪野草亦爭春羣處那相合單棲正自如好言天外事懶讀世間書指直筆難把唇濡硯屢噓傾壺有餘瀝窺甕得殘菹每恨投南鵲尤憐向北枝雖蒙今士笑恐有後人思運火解朝凍咽津充夜飢不來溪上住那得雪中詩徹骨寒誰覺回骸暖自醒直須人悄悄方得物亭亭性伏涵三極心間燭萬靈有僧肥擁腫怪我瘦竛竮脫命市朝隘側身桑梓深山含首陽色水帶汨羅音中夜不能寐萬端都上心鄰雞猶未動沙鳥已相尋茅屋凍將壓柴扉寒不開交朋幾竿竹兄弟數枝梅渡口月初出沙頭人正回客居殊自在嵗事亦相催朱減顔逾皺霜添鬢却新文章應捨我富貴不如人照破生前物思窮死後神謂宜休仕漢何必只逃秦積雪滴還凍斜陽隂復明千峰濃淡碧一水淺深清醫卜猶真祿樵漁亦美名人皆云有命我獨得無生築室深山裏開門古澗邊月髙猿子叫日晏虎兒眠帶雪挑黃菜敲冰取碧泉不知居士樂空受俗人憐感秋年年不是要悲秋秋氣愁人不自由誰見江南魂斷處瀟湘帝子在眉頭戊申六月聞晦菴先生除兵部侍郎韓范諸公各一時賢豪久速係安危從來功業知難就未敢先賡慶厯詩八月間書案假寐戲作四海春風曲肱裏出入鼻端雲一縷不知案上清露珠漏泄傅巖夢中雨壬子嵗雲峰寫望西極層雲最上層碧雲峰著白雲稜六龍頂佩斜陽下恰似青紗一點燈三月謝吳子文為我歸途怯晚風解袍添我意何窮念君夜度青松嶺亦恐寒侵氣體中訪吳安撫命賦詩竹洲中有靜香亭長堤靜觀齋舞雩亭鳳麟敢謂皇家無如公自合應時須何為返駕竹洲隱只與髙堂素壁成畫圖一麾淮海重拜敕老人在南子在北稱家菽水歡有餘每日乃得見顔色大兒三十心力到租稅免教官吏逼小兒十五天資敏火耕水耨云未克竹林茅屋漫讀書我正不蒙稽古力請言竹洲勝蕖篠相因依紅蕖未妨晚色靜翠篠解過涼隂稀漁童樵青足驅使夜深醉和風雨歸夢中突兀長堤橫忽覺單騎遊邊城擒王已決千里外邯鄲一枕空崢嶸間來靜觀宛殊昨却憐蒲團坐日落偶見始畫天地心從此鳶飛共魚躍向來天地本來間獵夫見鹿不見山不然堤下寒流自太古何人曽作沂水看前日從公洲上語茯苓期我能同煮未容只作竹洲翁屬聞漢詔求伊吕遊甘露寺扁舟京口意躊躇北固峯頭淚滿裾聞道昔時兵可用未知今日事何如傷心南渡英雄盡屈指中原嵗月踈待見太平心始足不妨歸去老樵漁甲寅西歸江行春懷十首江行二月正清新無主桃花不戀春老去情懷甚年少少年未解惜芳辰薄晚東風一片巾波光挾日戰龍鱗尋思來往成何事只向人間得此人一層山口一溪斜偃臥東風戀日華莫把江行生旅思他年憶此勝還家香韉繡軛急朝昏李陌桃蹊不盡樽滿席落花人睡起始知春興屬柴門間來此意本翛然一點清愁出意邊亦似東君無定準乍晴乍雨惱花天塞空春意總分明桃李無言却混成剛被幽禽知此意風前拈出兩三聲二月湖山把酒中呼猿洞口水涵空醉來剝盡新花蘂百疊生紅未見風白晝春光緑染衣東風千里挂帆歸竹籬紅白花相映只聽雞聲在翠微西湖楊栁欲棲烏遙想溪山似畫圖二月到家寒食近未消春境憶西湖繞屋桃花可得追迎門猶有海棠枝牡丹未放酴醿小併入青梅煮酒時竹洲見寄次韻朱宫瓦缶鳴汙澤黃鐘屏古來會通籍作者能籖整翁如食橄欖但願回味永只今竹洲上伏臘仰公廩玩彼易外象付此卦中影遙知踈桐下缺月見深省我來如征鴻愛此沙洲冷他年直紫薇夢斷青絲綆舊遊倘入念折簡肯相命新詩蒙剪拂為憐伍噲等駕言擕雙榼卜日問三徑預約青樽月雲頭開金餅又敘謝竹翁惡俗客屢舉却塵扇云何一見我捉手形深眷坐呼蘭溪酒即取大白勸階前抱關卒為我顔色變解榻經兩眠天寒恐冰霰主意厚且真惜别如挽牽握手紫竹杖眩轉含飛電端作臨水送沙溪清練練還家甫席暖書到驚一縣特遣贈行詩水剪梨花片且約二三子同煮竹洲麵豈意古人事乃復今日見理髮敘心曲所屬加餐飯無事覺晝長明窗試筆硯慶元五年休寧權縣鄭丞吳山寺勸農次韻駿馬輕衫拂曉塵野塘春水縠紋生心知沮溺無尋處猶把津頭問耦耕鳳凰城裏舊徘徊村裏吳山躍馬來也有旗亭沽酒處可憐桃栁向人開八月十一夜作文起夜興點墨揮毫勢始停起來耳目共時醒一窗月色元無響四壁蟲聲不見形辛酉正月初八日入郡赴髙校書之約二十二日出西郊即事竹籬茅屋兩三家白晝青春自嵗華碧縠水邊搓栁線緑羅天畔繡桃花感秋五首秋水無塵浸碧虛風前一葉故飛飛瀟湘帝子何時降立盡斜陽未肯歸間佩仙瓢到栁汀栁邊一點酒旗星斜陽欲落無人惜空有煙林作畫屏天文栁星邊有酒旗行到籬邊菊已黃相逢不改舊時香自憐失意秋風後猶為寒花一舉觴不須龜筮此生休死去無心更出頭莫説竹籬茅屋事丹楓一樹正悲秋獨步荒山日欲昏數聲乾葦過遊魂重岡復澗穿難盡恍惚隨人月一痕夜興倚天長劍為誰收欲獻君王鎮九州世事漫隨紅日下壯心空逐碧江流鴈橫西塞偏愁客菊綻東籬始當秋抖擻向來塵土夢便提蓑笠上漁舟梧竹亭人家有園種花栁君家有園種梧竹花栁只引蜂蝶來梧竹能招鸞鳳宿昨君飲我池上亭亭邊梧竹深冥冥鎪風鏤月已足玩滴雨灑雪尤堪聽君不見梧君昔在岐山上開花與鳳作屏障又不見竹君昔在渭水陽結實與鳳充糇糧岐山渭水地差逺頗覺老鳳勞往返成周已去漢唐空梧亦無根竹無本君家甲第連朱扉碧梧翠竹相因依千年老鳳嘆何在一旦下集增光輝梧君竹君喜相遇鳳兮鳳兮君且住老鳳回頭謝二君吾方髙舉青天去淳熙壬寅仲夏大雨寫望一朵烏雲起天末倐忽長驅半天濶雲頭到處急雨來雨腳錯落飛河魁吹以南箕更豪橫打窗噴壁催吟咏恰驚瓦上碎珠跳已快簷前銀竹映平生不識南箕狀且看平疇翻翠浪恍然立我三湘間欲著扁舟相跌宕風回雨霽天地新良苖斗覺添精神天意更看七八月明年無處可打蕨時飢民競打蕨根食之壬戌嵗春懷病起南臯二月時鏡中樗散鬢成絲不因雀噪簷間樹春雪春晴總不知抱病衡門與藥親苦無筋力尚精神東風日夜開桃李不為人間失意人四月十二日擕家如錢塘二十二日過湖至九里松船埠頭秦家安泊凡住百日八月還家仲冬題金德恭東園昔年曽訪此林坰今日重來倍有情道在山中人不會竹風柏日總分明再到半近煙村半近城東園花木鎖柴荆我來獨對南山立始信陶潛兩眼明野趣亭晚唐多處士林亭足娛嬉吾鄉盛儒冠何圖可棲遲貧者有不能富者有不為我窮不出門出門復坐馳此事我所嘆無地容蛟螭聞君築小亭幽懷正在兹况復扁野趣未見已伸眉示我野趣詩一軸邀我共賦野趣詩我思其義浸宏濶操筆引紙頻嗟咨古今何人得野趣野趣不許凡人窺見君所賦我已會賦我所見君勿嗤請從大庭栗陸葛天起一片野趣無髙卑居不懸金玉出不建旄旗衣不繪龍鳳食不羅鼎彛人家忘貧亦忘富鄰里何盛仍何衰蒼顔白髮各自足山圍水繞忘所之堯舜禮樂民始慕湯武干戈民始疑窮奢極侈到秦漢沉酣骨髓終陳隋遂令舉世不復野村夫俚婦爭夸毗我觀宇宙間野趣元不移散殊零落遍處處收拾聚集當時時多年如客棄不采一朝有主來如期君看上下數千載不多古迹存餘基乃知作者豈俗士後有繼者須英竒地野背城市屋野堆茅茨草野沒荒徑竹野成踈籬春野暗桑柘緑野一尺肥秋野明稼穡紫穗三尺垂禽野不在籠魚野不在池公卿幸不到雞犬亦自如使我頭得野散髮迎涼颸使我腳得野赤腳濯寒漪爐野燃生薪器野執素瓷行野昻老鶴坐野蹲孤羆語野從已出笑野非他隨一盂野飯既不缺一杯野菜尤相宜一樽野酒罕儔侣只可自飯還自釃善惡吾不言禍福吾不為黜陟吾不聞理亂吾不知一野萬事野其野不可追天地不能野不合文理爭峩巍日月不能野不合照耀光陸離崑崙瀛洲不能野不合琳琅金碧相撑支不知此心孰賦與一塊太朴元不虧野于萬象不可飾野于萬事不可醫君不見荷鋤歷山豈非野後來袗衣鼓琴大風雅荷鋤有莘豈非野後來相湯鳴條金鼓從天下荷鋤南陽豈非野要與管仲作同社荷鋤栗里豈非野要作荆軻何如者嗟此四野人野趣不獲真嗟豫有野趣山水長相親動與麋鹿遊靜與木石鄰北方久已失天討周王憤起如有神羽林鐡騎疾風雨赤幟皂纛摩星辰千金日費豈所憚旱蛇六翼又足顰安得邦伯皆結輩磊落參錯急保民我有五色線補衮衮可新我有五色石補天天可春野詩不中貴人讀野畫不入貴人目朝廷不用野人來自有野雲相伴宿陸機桑賦緑葉興而盈天大業拾遺七年九月太原郡獻禾穗長三尺五寸芒穗皆紫也兩宋名賢小集卷一百九十三
