body:
  text: 兩宋名賢小集巻三百四十六宋陳思編元陳世隆補海陵稿宋伯仁二簡吴荆溪薄宦從來錯寧容著意求自慚千里夢空作去聲一畨愁笑我人如昨知心兩未休荆溪清徹底願泊釣魚舟學館閒題據見定時俱是足苦思量處便成癡請君打退閒煩惱啜粥烹茶細和詩答林巡檢惠詩客久情懐惡逢人懶説詩不堪秋到後將近燕來時敧枕皆歸夢同心只舊知淵明籬下菊誰伴傲霜枝秋花鳯兒花雜雁來紅更有鷄冠㺯紫茸可笑倚闌人醉後只將青眼看芙蓉早秋囘文秋天一餉晚風涼笑語人傳早稻香樓上醉時簾半捲愁添客鬢兩蒼蒼别友人集唐人句菊花村晚雁來天僧朋來同住蘭舟未十年許渾今日送君須盡醉賈至離人獨上洞庭船李頻對菊少有惺惺得到頭此心何苦懶方收五湖烟雨常如昔一捻功名自不由世事莫將真箇看客程難作舊時留人間豈少淵明缺見着黄花便合羞累字戲作解愁吟簡舊同寮愁知不空白頭心事驚秋歸興滿滄洲貂蟬雖出兜鍪功名有愧黒貂裘夷齊與盜跖縦荒丘無非蘧蘧栩栩夢莊周空教笑倒江上烟雨汀鷗一琴一劒一童一鶴一茶甌自不須苦苦髙卧元龍百尺樓着眼看翻雲覆雨處豪傑總成羞牙旗金甲蹇驢破帽窮通一任前修五湖千萬傾明月則儘可棹歌横釣舟蘇州有感秋意滿姑蘇扁舟憶五湖鈴聲邊報急帆影客心孤野港青如染途山澹欲無英雄應念我時事滿銀鬚棋亂鵶飛鷺勢縱横對面機心豈易萌一著錯時都是錯寧無冷眼看輸嬴水邊聞雁集四靈句蘆花新有雁徐靈暉四面水連天徐靈淵清净非人世趙靈秀吾詩詠不全翁靈舒嘲醉者李白日斟三百盞醉時寧記脱朝靴一千八百萬杯酒百嵗消磨未是多村又是江南割稻天家家兒女笑相牽芙蓉占㫁清溪水獨許漁人醉艤船離維揚不為鱸魚憶故鄉只縁心事近重陽鬢絲添得三分白空被黄花笑一塲維揚萬花園趙制使經理細栁營基鎖緑苔萬花新種小亭臺芙蓉喜見江南客故向西風一夜開雨中逺望山匝濃雲水匝天秋容黯淡荻花邊瀟湘八景誰收去留下波心小釣船勸僧還鄉六言世事無過爾爾禪心只好休休江上數峰如削西風不礙歸舟舟中九日已得重陽未到家短篷根底憶黄花烏紗不為西風舞空與同舟説孟嘉登海陵城淮楚年年一望秋西風慣識古譙樓金湯城壁休清野玉帳英雄未白頭霜草萬家人冷落凍雲千疊雁綢繆中原無計堪修整且對屯兵説近愁出陸吴陵咫尺是維揚徒步方知去路長漁屋試霜蘆葉老酒家留客豆花香秋光淺淡人同痩雁影參差我共忙僕子莫嗟行李重擔頭强半舊詩囊瓜州阻風狂風未許放歸船借得僧房半榻眠落雁影收帆脚外怒濤聲到枕頭邊黄蘆葉底秋將老白羽書中病未痊傳語將軍多著力揚州不比舊家年焦山簡主僧無庵輕搖風槳過焦山山色相留半日閒萬頃月波秋雨後一篝燈翠夕陽間城依鐵甕心猶壯酒對金峰鬢已斑願得淮西來好語吸江亭下且怡顔瓊花莫訝重栽聚八仙㡬經邊警亦堪憐珠簾十里春狼籍且把天香作舊年兩宋名賢小集巻三百四十六
