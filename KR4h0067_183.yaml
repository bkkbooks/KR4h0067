body:
  text: 兩宋名賢小集巻一百八十三宋陳思編元陳世隆補網山集三林亦之絶句春晚招石門陳居士淼㳺麥斜巖破新茶因讀南華齊物論二首叫破殘花深處眠麥斜巖下畢逋前須㬰汲井開茶供讀盡南華齊物篇好好輕衫清晝便短鉏欲乞此來田只應荷蕢無青髪且漫春風二十年續夢中所見兩句長劍歌明月吳門一夜過紅樓何處是為説馬蘭坡記九月二十五夜夢中作藥圃幽人徑桃源處士居嵗時雖屢改蹤跡尚如初艾軒先生侍郎挽詞四首典刑還似魯人初四海衣冠歸坐隅涕落寒蕪嗟不見月明蠏井白雲孤菖蒲對客尚從容明日紅泉夢巳空縱是千年有豪傑六經人物在斯翁繡衣曽出黄梅嶺金印還游紅藥堦勲業至今人道説幽懐長是在空齋黄柑時候曲堆村長憶籃輿到蓽門恰是今年去年日野螢衰草弔黄昏延慶寫真賛二首住山頭欲白何爾太揶榆却厭舊時面丹青别換模秋雨秋山夜縱縱自横横平生無罪過不合去為僧范公彌誕之辰輙述閭巷語為邑大夫壽且俟採詩者錦樓壽曲未須吹且聽江邊老婦詞但願年年好官長一如官長在官時同范長官鄭主簿送戰船奉酬應尉相送長江風浪輕尉仙真自好心情四更明月宿何處魚骨山前第一程挽青龍陳公次膺四首明月青燈合浦村北人惟此讀書園竇家風義人牢落多少衡門欲斷魂誰解題封忠敬堂長安白髪紫㣲郎斯名似不縁渠作却最闗渠淚數行胡為春渚夢初回却是行舟恰到來數盡長亭過閩嶺夕陽愁殺落花䑓欲哭芻靈何日時長江望斷涕沾衣夜香樓下如重到鶴叫三更人已非君嘗以合浦書堂謁名于艾軒老人老人目之為忠敬堂葢取武城之人其待先生如此忠敬也斯名不縁我而生實以丈人視此事為無媿色夜香樓落花䑓謂君之東園也挽鮑待用明之父四首一經教子巳青裾况又行年七十餘恰好遭逢身却死北風門外只長嘘去年一笑荔枝園今嵗重來是墓門縱有青青舊時樹已看斜日照黄昏寒村夜雨斷人煙却有纍纍哭野田一飯誰能弔衰草似君此事至今傳讀盡東牀一巻書不妨蹤跡向來踈劍津紅帳為門户想得多多送𦵏車光澤朱君諱賡字師言或字少裘挽詞四首諸老蕭蕭似巻塵不堪再見素旌新白頭縣尉笭箵浦夜雨寒窗是舊人長記前回過我廬艱難步履喚兒扶莫將馬箠敲門去寒水無人野渡孤為官長者得聲名唯諾公堂如父兄欲作汝南耆舊傳不須多語盡平生迺翁飛旐過前村一婦隨車一在門何處人家有三柩髑髏山下合消魂題長樂縣靈峯寺望日亭庚子十月十六日作雲母江邊有草亭分明見得日頭生一村籬落更何處此巳無天只水聲題嚴子陵釣䑓莫向金門傲冕旒歸來却要著羊裘乾坤不是劉文叔那得長竿釣白頭林井伯母生日口占由來此母如吾母再拜一巵復一巵最好年年作生日碧蘭黄菊與同時挽趙路分丞相汝愚之父三首二月餘干花草春天遥莫問謫仙墳長簫不要吹哀些愁殺江東日暮雲苦學聲名聞縉紳傳家况復有麒麟漢廷玉牒先多士數盡慈恩只一人每誇愛子對人言東觀同游有艾軒我向築場聞此語斂襟西望轉銷魂挽林校尉紹老三首落日平田何處村竹墻繚繞是髙門莫言雞黍未相識一聽悲歌自斷魂白浪漫天眼自驚吳兒一見欲飛鳴何人為述膠西事十萬樓船有姓名華屋共言清淨想長途還作去來縁念君隂徳有如此何事春風却短年挽林少朋三首海陽四十弟屢約為海棠之集斯人不可見而公亦云亡因賦此詩不覺澘然而悼之年年二月看花時野笛小園長短吹誰道今年看花日鞦韆門外鼓聲悲聞説當年歌鹿鳴黄花八月牡丹生何人為續夷堅志好向橋東問姓名㡬回欲去醉花旁此事如今轉渺茫不獨哦詩弔金谷更令掩袂憶劉郎淑人生日口占方朔曽為老侍郎麻姑來降紫雲香壽杯今日逢長至欵欵長年此日長挽余倅父子鳳二首廬陵别駕有慈闈到處官亭見彩衣總為青山能送老不知黄壤却同歸誰唱雙棺薤曲悲前聲未斷後聲隨人間父子情何恨可忍長簫逐個吹挽盧氏母二首為語歌鈴過野田不須淚眼更懸懸人間催促如風葉誰是平頭八十年小徑幽幽竹遶門閨樓終日總無言若教誦得維摩句應媿平生費討論哭故人曹十九秘校叔明海陽四十弟自潮州送歸柩未有哭詩故人于海陽為甥舅也沉吟感泣因併以弔之二首海陽天外巳傷懷海陽章闢之白水墻頭轉自哀却是人生難得好兩年只見哭聲來泪眼才乾更哭君殘陽破寺起愁雲故人海上能多少巳見江南有兩墳重陽次日登城山城山飲罷冷侵衣潮上重來月滿巵未愛疎籬黄菊日最憐秋水白雲時挽小練林承事文炳父二首薤歌纔唱巳堪嗟莫道生平隔海涯曽向網山圖上見蛇門東去是君家生前莫問劉郎浦死後還看孟母鄰遥想芻靈穿海出浪頭如屋自愁人挽曹不占二首年年除暮即相呼夜語如君不可無為報嵗寒同社客今年不要作柴爐有時街上斷人行猶見敲門訪子雲一種傷心向誰語夜䦨燈火只思君挽鄭氏母二首片片花飛上已村誰將雙淚哭寒原明朝况是初三日好把流杯為續魂畫樓最好緑波前萱草還看白髪仙更説列卿太常老吁嗟一曲與人傳重過紅泉憶昔嘈嘈來拜經秋燈秋雨苦吟聲如今秋雨秋燈夜大半當年猶未生挽曹廷輔二首里巷相聞長者聲春風更有女蘿情殷勤為作愁腸曲白日西頹月又生緑水白鷗三月天哀簫長短使人憐草鞋踏雨同歸去此事如今十五年挽盧助教質扶二首山中香火今誰在那聴殘春薤曲新第一傷心惟此老父時諸客巳無人毗耶鈔軸五千巻凈几焚香心自閒蠟燭燒殘春夢斷逢逢哀鼓弔空山秋日題漠漠騷騷如巻砂當門枯木見巢鴉秋林最怕風吹盡一直愁心無樹遮方提舉公美挽詞馬上姿容向朔風吁嗟不見夕陽紅長江自小為鄰舍昨日歸來無此翁挽路横林少皋十年騎馬畫橋歸長記朱樓傍水湄今日悲吟想君屋一如騎馬十年時九日下水口黄花時候苦思鄉急水還家一日强莫道南風打頭上客船揺櫓作重陽挽鄭唐仲三閭未死巳招魂却是狂夫不要論誰肯將身縁問道十年臥病菊花村草堂老人和仲平頭七十宴客緑烟亭輙賦口號一章以為草堂之壽今年七十多青紫莫把仙翁一例看再拜尊前為翁舞草堂最好是無官兩宋名賢小集巻一百八十三
