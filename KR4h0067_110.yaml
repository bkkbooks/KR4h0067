body:
  text: 兩宋名賢小集卷一百十宋陳思編元陳世隆補蘿軒外集晏殊字同叔臨川人七歲能屬文景德初以神童召試賜進士出身纍擢知制誥翰林學士慶厯中拜集賢殿學士同中書門下平章事兼樞密院使出知永興軍徙河南以疾歸京師留侍經筵卒贈司空兼侍中諡元獻有臨川集紫微集和王校勘中夏東園東園何所樂所樂非塵事野竹亂無行幽花晚多思間窺魚尾赤暗辨蜂腰細樹影密遮牀藤梢狂罥袂潘蔬足登膳陶秫徑取醉幸獲我汝交都忘今昔世歡言捧瑶佩願以疏麻繼列子有力命王充論衡有命祿極言必定之致覽之有感大鈞播羣物零茂歸自然默定既有初不為智力遷禦寇𨗳其流仲任𣲖其源智愚信自我通塞當由天宰世曰皋伊迷邦有顔原吾道誠一概彼途鍾百端卷之入纎毫舒之盈八埏進退得其宜夸榮非所先朝聞可夕隕吾奉聖師言巢父井稟生值堯年率性在龎厚安巢一枝上豈曰鶉居陋潁波人洗耳曽不汚牛口諒兹耕耒暇鑿飲隈林藪含飴鼓其腹帝力豫何有遂令千載外此地存遺甃泓然逼喬木宛若棲塒舊鄉人揭題榜行旅諧瞻覯我來觀古迹愕立徘徊久凄其望清風不獲見師友願言斟一勺拭面洗心垢翹勤慕高躅感慨陳巵酒思齊胡可望庶以寬庸瞀夙駕恨長途憑高重回首奉和御製後苑海棠太液波才緑靈和絮未飄霞文光啓旦珠琲密封條積潤涵仙露濃英奪海綃九陽資造化天意屬喬繇海棠杳靄何驚目鮮姸欲蕩魂而人無限思當晝不勝繁浩露晴方浥遊蜂暖更喧只應春有意留贈子山園和樞密侍郎因看海棠憶禁苑此花最盛青瑣曽留盼珍叢宛未移幸分霖雨潤猶見艷陽姿岸幘來朱檻攀條憶綘蕤能令人愛樹不獨召南詩假中示判官張寺丞王校勘元已清明假未開小園幽徑獨徘徊春寒不定斑斑雨宿醉難禁灔灔杯無可奈何花落去似曽相識燕歸來公先得上句王琪為對下句遊梁賦客多風味莫惜青錢萬選才安昌侯蓮勺移家近七遷魯儒章句世相傳關中沃壤通涇渭堂上繁多疑誤逐管絃身服儒衣同蔡義日將巵酒對彭宣高墳丈五陽陵外千古朱雲氣凛然海棠輕盈千結亂櫻藂占得年芳近碧櫳逐處間勻高下蕚幾畨分破淺深紅煙晴始覺香纓疑誤綻目極猶疑蠟蒂融數夕朱闌未飄落再三珍重石尤風題睢陽五老圖道明回詔樂清間便向中朝脫冕冠百日秉樞登相府千年青史表旌桓泰運正隆嫌氣熱乾綱初整畏氷寒逍遙唱和多高致儀象霜風俾後看初秋宿直綘河星斗夜闌干禁署沈沈閉九關上帝册書羣玉府仙人宫闕巨鼇山涼蟾影度秋隂薄促漏聲來夜唱間擁鼻吟多欲愁絶嚴鐘凄斷樹烏邉送凌侍郎歸鄉一作送林侍郎還知宣州江南藩郡古宣城碧落神仙擁使旌津吏戒船東下穩縣僚負弩晝歸榮江山謝守高吟地風月朱公故里情曽預漢庭三獨坐府中誰敢伴飛觥寓意油壁香車不再逢峽雲無迹任西東梨花院落溶溶月栁絮池塘淡淡風幾日寂寥中酒後一畨蕭索禁煙中魚書欲寄何由達水逺山長處處同春隂十二重環閟洞房愔愔危樹俯回塘風迷戲蝶間無緒露裛幽花冷自香綺席醉吟銷桂酌玉臺愁作澀銀篁梅青麥緑江城路更與登高望楚鄉賦得秋雨點滴行雲覆院牆飄蕭微影度回塘秦聲未覺朱絃潤楚夢先知薤葉涼野水有波增淡碧霜林無韻濕疏黃螢稀燕寂高窗暮正是西風玉漏長涵虛閣水有支流樹有孫重重門巷挂朱軒三君雅範標人望千里澄波隔世喧西對戶庭徐孺宅密傳鐘梵給孤園欲知嗣續無窮勝兩兩榮歸漢使幡海棠二首濯錦江頭樹移根藥砌中只應春有意偏與半粧紅昔聞逰客話芳菲濯錦江頭幾萬枝縱使許昌詩筆健可能終古絶姸辭咏鳳仙花九苞顔色春意動丹穴威儀秀氣攢題品直須名最上昂昂驤首倚朱欄雪中平臺千里渴商霖內史憂民望最深衣上六花非所好畝間盈尺是吾心金柅園臨川樓上柅園中十五年前此會同一曲清歌滿樽酒人生何處不相逢詠上竿伎題中書壁百尺竿頭裊裊身腳騰跟挂一作倒駭傍人漢隂有叟君知否抱甕區區亦未貧日鑄茶稽山新茗緑如煙靜挈筠籠一作都藍煮惠泉莫向人前殺風景更攜醪醑醉花前轉運度支得青州資政黃素書韓吏部伯夷頌許昌相公以詩跋尾遂為七言因而寄及謹用拙篇紀咏首陽垂範逺吏部屬辭深染翰著嘉尚系言光德音褒崇亘千祀精妙極雙金題詠益珍祕用昭賢彥心西垣榴花山木有佳實托根清禁中歲芳搖落盡獨自向炎風盂蘭盆紅白薇英落朱黃槿艷殘家人愁溽暑計日望盂蘭崇因寺捲簾山色眼前見入夜濤聲枕上聞苔徑雨餘堆落葉石樓風靜鎖寒雲附録詩話數則晏元獻善評詩嘗云老覺腰金重慵便枕玉涼未是富貴語不如笙歌歸院落燈火下樓臺此善言富貴者也人皆以為知言歸田録公有題新昌石氏山齋句云書仙十閣壯儒宫靈越山川寶藝雄又與張臨川云籬邉菊秀先生醉桑下雛嬌稚子仁又送張明州云騷客登山知有助秦源雞犬更相聞公有與客飲紅梅花下詩曰若更遲開三二月北人應作杏花看客曰公詩固佳待北俗何淺也公笑曰顧傖父安得不然一坐絶倒宋莒公見晏公佳句輒書于齋壁如無可奈何花落去似曽相識燕歸來靜尋啄木藏身處間看逰絲到地時樓臺冷落收燈夜門巷蕭條掃雪天已定復搖春水色似紅如白野棠花之類後人多不可及青箱雜記韓子蒼嘗與吕居仁間論前輩所作上元詩居仁曰晏元獻云樓臺冷落收燈夜門巷清虛掃雪天最佳直是説得出不可及後見吕郎中有詩云江城氣候猶含雪草市人家已挂燈豈用晏意耶公有送人知洪州詩云千斗氣沈龍已化置芻人去榻猶懸孫少述栽竹詩曰更起粉牆高百尺莫令牆外俗人看晏臨淄曰何用粉牆高百尺任教牆外俗人看處士之節宰相之量各言其志句氷從太液池邉動栁向靈和殿裏看間思北闕銀宫畔誰架丹山白鳳凰玉女雕瓊蕊仙禽自疑是白菊衣喚得梅蕊要同韻羞殺梨花不敢香醉輕浮世事老重故鄉人若教花有語却解使人愁東陽詩骨瘦南浦别魂銷謬道忠心比芳草不知讒舌起椒蘭几銘小飯防噎跬步防跌中有角墊衣存袂缺惟忠與孝則罔摧折兩宋名賢小集卷一百十
