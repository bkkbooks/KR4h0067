body:
  text: 兩宋名賢小集卷三百六十宋陳思編元陳世隆補玉楮詩藁嶽珂排灣遇風對岸即彭澤舊縣二首隱約山藏霧砰􅗟地起雷黑風吹海立白雨過江來齊樂正應爾沛兒安在哉雌雄誰與辨試上楚王臺岸上蘆搖首門前栁折腰千年已陳迹四海又驚颷宿翳何當淨髙風幸未遙柴桑那可見身世且漂搖發排灣過小孤彭郎祠下遂宿馬當山小孤磯彭郎中納百谷吞三江江流澎湃不可當勢比折木傾銀潢渴龍一支走馬當宛然天驥初騰驤回韁矗立江中央西從岷峨暨睢漳南派五湖通三湘後先奔走爭回翔前驅怒氣軒且昻倐然過此意洋洋儼然天子朝明堂坐受萬國來氐羌五瑞咸輯圭與璋拜舞軒陛心俱降我聞乾坤融結盤古開混茫流峙異勢分輿方巍巍神禹治水平懷襄底乂一意先荆楊此山緑字元弗詳脫略丘垤登毫芒後人考古徒縑緗未覩此石天經地紀之維綱君不見古馬當今馬當記牒雖漏處有常上焉柱天植極扶三光下焉立地作鎮安八荒磅礴杳靄排穹蒼削平澒洞壓鴻龎星羅碁布髙蓋張百靈臣伏絶影藏坐使四海順流終古無濫觴噫唏偉特那可量我欲用世取所長便當提作朱亥神椎椎獝狂北絶大漢梟名王何空更度金浮梁一拯墊溺躋康莊連山疊阜化囷倉盡飽萬姓飢火腸持此報上歌如岡遍開夀域同畛疆自今永永三十六萬嵗淳古比九皇山岧岧兮江湯湯過鴈汊駢集千艘岸喧拏百里聲黃旗優士賈白奪困商程吳楚方憂蹙耕桑漫計贏坐觀還一笑關市古無征入蕪湖港過吉祥寺昔時曽訪後山松天道那令霸業窮夾岸人觀新太守擁門僧認舊詩翁隱磯漫指六朝事魯港嘗淹五宿風從此片帆湖際去只應日在瑞雲東黃池易取日中市陶居天下衝南琛下甌粵西旅輯巴庸四顧斷登壟萬家塿聚蜂寢丘端不類何以汙吾封銀堰舊説金為土今聞銀灌城古人真作事後世只虛名籌策雖曽立厫倉竟未成道旁雖築室吾欲誦坁京三塔寺寒光亭張于湖書詞寺柱吳毅夫命名後軒二首竹裏逢僧院殘碑不記年鴈題三崒堵龍化兩魁躔寶正號應紀元豐墨尚鮮寒光定何似誰放五湖船雲煙千嶂逺風月四時新笠澤昔魯望鏡湖今季真何時脫塵絆來此寄垂綸一艇葦間宿寒光長是鄰淹中水淺輿從下水肩舟二首揚塵驚淺瀨平陸比通津絶臏正扛鼎化身如轉輪未輿譏代畜不守愧懸鶉誰借商巖手一篙煙水春水面平如砥湖心淺不波駕肩同作楫袖手莫談河不見成橋散空傳度磧駝勞生正應爾空愧白鷗莎去嵗五月二十八日發雲錦亭以六月旦謁富池而行是夜始望見廬山今嵗以此日正在湖淹中念嵗月之倏忽驚道塗之勞勩回首感歎二首雲錦亭前夕照紅興唐寺下曉聞鐘傷心楚水又經嵗回首吳雲知幾重萬里同盟秪鷗鷺三江嘯浪憶魚龍如今且對湖光裏八九重開夢澤胸去年今日富池頭浩蕩風煙卷雪樓湖海百年雙鬢老荆揚兩地一萍浮河斜左界流清夜雲密西郊望有秋通塞隨時何必問明朝又放溧陽舟玉唾壺古來玉唾壺歌罷壺為缺憂時一片心常惜志士烈鸊鵜瑩出昆吾刀截肪溫潤如切膏悲歌聲動行雲髙何愛一闋稱世豪馬生兾州北未省能伏櫪骨拳鬃秃刓四蹄鳯膺赭汗人不知夕陽芳草顧影嘶猶憶振鬛天山西可憐嵗華暮萬里瑤池路鹽車轆轆踰太行夜囓枯草晝服箱上天振䇿無王良徒有此志今未忘荆山韞明月良工斫不徹抱璞昔三刖曾泣卞和血既斫復毁不可磨尊前對酒聽浩歌唾壺雖缺璞更多騏驥不生奈老何中橋二首過了平湖又小溪却從蕪徑訪多岐如何江上乘風鷁化作泥中曳尾龜誰遣旌旟行沮洳定知鼓吹宅漣漪中橋咫尺未由到且作吳兒玩水嬉澤國何村不著橋中橋跬步即雲霄青簾望市雷鳴腹黃帽推船水沒腰六月彤雲搖旱火一湖清浪捲晴飇平生未慣舟行陸鐡石心腸也合消泥行終日至晡始抵中橋六絶終日泥行足半胝中橋望見已多時一篙不得風漪力早被青簾望得知平川煙草碧如煙曲摺琉璃翡翠田一水分明度舟楫如何平陸却推船農家未補眼前瘡却種湖田作早糧别浦誰家夜鳴櫓踐殘一半不成秧兩岸黃菌半跬深薅餘短髮更傷心莫疑一點無生意盡是田家眼內針歷盡清灣日已晡斷虹吹浪過平湖兒癡不識中橋影問道前山有雨無到得中橋一徑斜岸傍沽酒兩三家長年醉卧桑隂下鼓吹猶煩兩岸蛙夜宿橋岸裊纜宿前灣平蕪泱漭間舫移星在户岸迥斗藏山淺瀨不勝揭浮生何日間夜深聞過櫓知是溧陽還問道宜興二首買田陽羡説東坡想見溪山勝槩多曽是中營誇繡帽尚傳遺廟鎖雕戈斬蛟義槩人猶記化蝠仙蹤事易訛我欲問津先訪古古靈題迹試摩挲宜興張公洞洞刻古靈題迹客有為子言古靈後乃仙去者末句故云粹儀夾紵盛花鈿人説先朝祀玉仙菴盡有溪春不老煉丹無竈古空傳乞靈賸擬羞蘋藻養性何妨學汞鉛書閣蒼龍應不逺為君重寫白雲篇天申宫夾紵玉仙聖母章聖禱祠之地遇順風身世飄搖似轉蓬歷湖經淹任西東凌波小試檜松楫宿露飽親葭葦篷兩岸居然驚脫一帆從此迅冥鴻到頭天意君須會吾道區區端未窮楊梅淹歷三家市梅垂萬顆酸烽池看火樹嶁室試金丹風露盈籃重氷霜透齒寒他楊應不類留與子雲看道中思廬山廬山三百里巨浸壓宫亭勢接九江滙峰連萬古青淵源開道術哤幻雜仙靈厚地蟠竒秀雄標動杳冥濃嵐晨歷歷流水夜泠泠雪擁瓊瑤障花繁錦繡屏吾居嘗靜對親處異空聆瀑布手自酌斜川身所經龍淵敲短䇿鳥道絶危陘正派尊涵泳髙山有典刑朅來三涉徑知閲幾周星白傅松猶在陶潛菊未零堅髙思並轍今古共忘形便擬安圭竇終期老澗坰忽嚴大君詔言駕小侯軿一别門垂栁重觀階換蓂出山羞小草浮海又流萍頗覺登山屐翻成泛宅舲回頭看豹霧望眼隔鸞汀縱抱知還志何時振倦翎寄胡教二首西風送我溧陽溪終日蓬窗秪有詩黃筏未妨牀著筆青緺不管鬢成絲雁隨去訊勞君問鷗憶同盟尚我隨想見歸舟不多日一樽牛渚訪秋期潯陽江上無氊客别後音書杳未通蕉鹿定應憐左計蓴鱸端是待西風漫懷離思人猶逺欲寓吟情句未工朝列鵷鸞問消息一箋莫靳寄詩筒寄髙建寧尚書二首鶴書幾到闔閭城見説君王憶姓名衡嶽雲間傳諫草考亭月冷欠文盟不從金馬登丞輔却托銅菟煩客卿天意未應無定據管教吾道致升平已分耕畦老一犂天風吹夢入姑溪誰憐北垞騎牛背又踏東華放馬蹄槐緑不妨穿禁漏棗紅便覺動邊鼙歸途願請平戎策政恐曹裝趂詔泥張公洞二首祚絶千齡運名標二代仙鵲鳴應徙地蝠化已先天風洞疑無底丹爐信有緣秪應巖下奕為我一跫然驢迹驚初踐鷹盤若有靈石橋通道户金鑰鎖硃庭滴乳看成像登臺仍刻銘更憐國山寺真欲比云亭望北關門萬里雲開瑞日明雕甍遙接九重城觚連丹鳯紅雲繞關度青牛紫氣迎新第千門俱改觀舊溪二紀漫關情今宵且向橋頭宿又聽鼕鼕打六更六月二十一日內引賜對緝熙殿玉音宣問漏下數刻將退賜金幣香茗有差既而御筆除長地官將指八路復賜一札兼鎮姑熟敬紀感遇以昭恩榮四首曲廊青瑣午隂遲一朵紅雲擁緝熙便座詢猷親帝問近璫承詔引朝儀小臣曽是鵷鴻舊夙幸還瞻龍鳯姿出殿陛郎驚漏下兩行簾月影參差二紀身陪獻納班今朝始得拜金鑾裊蹄范鑄分天馥鮫織開奩薦月團奎璧近霑琅鈕濕斗牛直射寶光寒糜捐雖有平生志自覺君恩報稱難曽窺遺志辨中朝更帖驍遊八座貂空有丹心酬雨露詎應赤腳踏煙霄人繇汲汲知堯舜我豈區區事管蕭不是鸞臺勤再詔狂言何以發芻蕘殿上恭承清問俾條陳鹺茗利病以聞辭不獲乃奉詔詳見奏藁單軺從此歷湖隂自愧便蕃聖澤深贈䇿不煩秦士歎埋輪聊見漢臣心主憂未解誠知辱民瘵猶思力不任表語拳拳懷美報用中聊以當虞針謝御札表狂妄冇云惟克用中是名報上此真忱也中秋夜宿旌德觀無月滿看金盆湧碧流西湖從古愜中秋清班正是重闉隔塵鞅難從近甸遊自是四并偏我靳從知一笑豈人謀望霓得月良非急且願西風送雨休水樂洞天下水樂洞今歸四姓家臺池間日月泉石痼煙霞誰挈遊人榼還尋奉使槎明朝重回首清夢隔京華趙山二絶驅車結束趂晨暾水樂簾前共一尊二十二年如掣電軟紅依舊暗修門江南間殺老尚書自是承平一絶無送客折腰書脫腕試從駝巘看登塗洞霄宫岧嶤樓觀鎖新宫十里清溪一徑松金榜奎章紅日照石崖仙影白雲封香殘半掩凝塵榻路轉猶聞隔澗鐘四牡經行真不枉玉淵初識洞霄龍九月八日桐川道中二絶斷雲輕素折山腰山下人家野水橋小隊旌旗空獵獵不教間趂酒旗招依稀九日明朝是三徑情知不到家隨分秋光關節物桐川道上看黃花是日迎送之車屬道戲成老仗相如節佳時負酒尊人誰羞夾轂我自愧乘軒塵土欺貂褎功名付犢褌令君休負矢豫不詫王孫夢尚留三橋旅邸天上歸來打六更夢回搔首正瞢騰玉霜初上三更月絳綵猶明九市燈聲徹銅魚催漏箭影斜金雀在觚稜帝鄉東望重回首佳氣何時到五陵當塗勸駕詩禮行鳴鹿盛侯邦企慕才因既見降詔下淄川今第一才如成紀古無雙雷聲龍化標應奪筆力牛回鼎易扛老守殷勤折津栁相期鼓吹渡春江鹿鳴宴中走筆呈林教授三級催龍浪朋來盛鹿賓淵源識餘潤騰達已通津融帳知方盛陸莊應未貧成功豈無日况復值詞人碧雲亭晚眺二首間步碧雲亭寒郊㺯晚晴牛羊分暝色禽鳥有春聲城栁風猶徑溪梅氷共清屋梁正殘照西望憶長庚嵗華方冉冉耕畝自間間日落青楓浦雲平白苧山夜城嚴警柝昏鼓動層關風露汀州冷驚鴻自往還閏月之臘詔賜銀合臘藥三首驛使錦連乾傳宣下九天緘題瞻賜璽走送聽鳴鞭意溢兼金外恩從玉陛前更憐戍邊客一騎入秦川式賜十一種分馳數百程虎符多俊傑貂帽比恩榮老矣何能役居然添此名聖情天樣濶美報誓餘生無功應自念有賜合先嘗病作餘生纍恩頒上劑良願覘齊國證小效越人方采菲儻留意須先元氣防兩宋名賢小集卷三百六十
