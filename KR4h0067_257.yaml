body:
  text: 兩宋名賢小集巻二百五十七宋陳思編元陳世隆補西山先生詩集二真徳秀志道生日為詩勉之我聞洙泗言惟仁静而夀汝欲綿修齡斯義盍深究越從開闢來新故更禪受巍巍獨山嶽屹立鎮宇宙其體固而安其形慱而垕噓呵雲霧興涵煦艸木茂皆由一静功變化生萬有千古無動揺兩儀等悠久吁嗟人心危六鑿互攻鬭眇焉方寸微怵彼羣物誘擾擾無寧期得不易衰朽汝今志於學一念貴操守天真浚其源人偽窒其竇冶容命之斧妖聲性之寇腊毒由厚味亂徳本醇酎當如禦讐敵豈但惡惡臭斂然肅襟靈神物森左右融融湛虚明役役息紛揉還吾性之仁萬善此其首但存達徳三可卜與齡九不勝玉女心持用薦杯酒題全氏三桂堂唐人重科甲儗以折桂榮一登羣仙籍不美千佛經終全嵗寒姿乃比秋香清咄彼牛李輩伊優至公卿迨今齒其人名字猶臊腥卓哉劉户曹直氣霜稜稜一朝脱淡墨千古揚芬馨雞峰有名家奕葉彯儒纓庭中三嘉樹屹立長􅀈􅀈西風正揺落翠葆黄金英勁節松可友孤芳梅謂兄丁寧命誌郎我豈貪浮名愛此臭味同故以書吾楹爾曺方懋學志取宫袍青要須勉植立毋但希騰凌已大外物小道充人爵輕當如燕山竇義方垂世評勿效東堂詵射䇿矜虛聲懿哉君斯言可折末俗醒刻詩堂之楣式觀全氏興夀楊龢父迅雷地中藏當此沍寒日積陰排層空初陽露㣲茁而曰天地心於此見機括良由勢方升猶木吐牙枿培㙲勿使傷怒長焉可遏此理之在人善端實初發熒熒火将燃涓涓泉欲達吁嗟道心㣲物欲易攻奪差之一毫芒相去舜與桀要須二者間明辨與精察見義勇必為欲如矢之决去惡凛勿疑剖如刃之割坐令人偽消但覺天機活四時無非春八荒皆在闥喜君生兹辰聊為演此法願祝君夀長勿嫌吾詩拙舞鶴亭歌舞鶴亭空亭無鶴何為名亦如西山賦招鶴無鶴可招也不惡何必𤣥裳縞袖二八真娉婷想像標致便足使人毛骨清仙翁好鶴非徒爾鶴徳從來比君子坡仙自謂吾不如今翁與坡豈其殊蒼苔白石有餘樂一似簞瓢甘澹泊笑殺飛鳶太不靈貪腥嗜腐譁然争九臯一唳醒人耳又如片言之善應千里更笑荒林老木終日號畢逋說吉說凶誰聴渠仙翁愛鶴愛其徳我讀翁詩三歎息便好從翁痛飲醉倒斯亭邊振袂起舞學胎仙和趙章泉天教一老立堂堂步武媻姍盡未妨元始故家典刑在北方正學𣲖流長新恩已煥青藜照舊徳行詢黄髮良多謝寄詩勤問訊自憐疎懶似嵇康送永嘉陳有輝永嘉陳君有輝潛心易學許以所著示余余未及請而君歸矣拙詩贈行且堅再㑹之約云深山讀易如康節白首談𤣥似子雲肯學時流誇末技却於聖處䇿奇勲二圖君已窺㣲指十翼吾方媿淺聞君聞水心葉公言十翼非孔子作嘗質疑於某晚學不敢㫁其是否故云得意春風重過我緑波清夜話羲文送吳定夫西歸吾衰倦對客晤語惟青山修竹引清風時為掩柴闗今晨何人來踏破莓苔斑驚顧復自喜不妨伴虛閒世情重聲利榮途足趨走夫君獨何為經年闖林藪東尋金壇翁南訪玉峰叟借問兩􅋯仙來時輕健否慈湖老仙伯乗雲賔帝鄉念之每汍瀾風味不可忘其門多英特清文照縑緗為我朂諸賢佐道當自强君槖中有趙元道袁廣㣲錢子是陳和仲諸君之文故云麻源在何許茫茫白雲端悽其一布裘何以禦風寒歸來有餘師興盡當知還便好斸空谷賸種青琅玕詠仁程子精㣲談穀種謝公近似喻桃仁要須精别性情異方識其言親未親題隠者蘇翁事迹蘇翁雲卿廣漢人隠東湖上魏公為相使帥漕挹其來一夕遯去不知所之魏公孤忠如孔明赤手能支天柱傾蘇公髙節如子陵寸膠解使黄河清等是世間少不得問津耦耕各其適後人未可輕雌黄兩翁之心秋月白巻中有詩譏魏公不足與有為者故云題湖山清隠西湖南山和靖廬西山東湖清隠居皇天従來具老眼勝地不肯栖凡夫眼中四時風月景胷次萬古皇王書夫君豈是終隠者要學川雲時巻舒新橋行紹定戊子長至後九日南浦新橋舉梁其明日縣尹宋侯之夀旦也輒賦新行以為侯夀去年夀君時清溪無梁涉者危今年夀居時長虹卧波指可期珍材逺林天發隠文石象玉神效奇蛟龜為橋頃刻就又似仙伯工娛嬉官自憂民民自樂此事更屬無窮思要須移此濟川手棟我王國無傾欹従今南浦渌波上惠澤千春同𣺌瀰題黄氏貧樂齋濓洛相傳無别法孔顔樂處要精求須憑實學工夫到莫作閒談想像休道鄉曾舉龍門話認作元闗透悟機儒佛差殊真𦕈忽請君參取是耶非閒吟閒中意趣定何如静把陳編自巻舒希聖希賢真事業潛天潛地細工夫林泉有分吾生足鐘鼎無心世味疎政使一貧真到骨不妨陋巷樂顔癯浄豁持鉢求度為說偈言一真不昧人中佛五戒俱全俗裏僧必待方袍與圓頂維摩龎老又何曾浄豁讀罷白予曰如此則不須受度矣遂說偈云青編讀後方為士黄牒頒時始是官不拜皇朝真爵命要行所學也應難余謂解讀青編便無黄牒亦得浄豁志在求度只得恁麽主張併為書之以勸施者贈小鐵面王相士君以鐵面名自謂相人無軟語我亦鐵心人不把窮通來問汝獨有一事欲叩君學海無底難窮尋㡬時鐵拳透鐵壁直窺千年賢聖心贈岳相師余方與友人劉定甫論西銘而岳相師來索詩遂直書以贈平生慣讀横渠銘不讀許負天綱書窮通歡戚若有二天之玉女元非殊但應内省無所疚何必從君問休咎北窻燕坐寂無言時聴幽禽􅀈晴晝七峯行為外舅夀有崇南岳之五峯倚天壁立雲濛鴻我嘗振衣峯頂立頗似吾鄉好峯七七峯五峯小大雖不齊氣象峍兀實似之牛首峩峩峙雙闕蕉領楊梅兩奇絶南臺林磵佛世界百丈煙霞龍洞穴仙人冠劍端且凝仙源萬疊秋空横仙源謂余婆山以仙遊山水之所自出故立今名以正此山之稱謂縈青繚白望不斷好似衡山山下青曏來秀孕兩宗工謂文荘與文公也文章節操為世雄百年山川久寂歴人物今有仙游翁翁才古干将翁目巖下電千牛解剥刄有餘萬象妍媸鏡中現可持龍虎節可運玉帳夀才髙驚衆世弗售秖令遺愛留丹丘丹丘遺愛人人誇經界寛租恵最多后王嘉之錫異夢使汝有子登巍科翁夀當萬千翁年纔八十視昔殷大夫僅乃十之一渭川出處付何心獨探元闗深更深舞鶴山前春色好静對七峯長不老題李立父髙逺樓君家百尺樓近在環堵室室處豈不佳暑溽厭煩鬱著脚躡層梯心眼便超軼好風天外來佳月雲端出清明湛空濶洞視了纎悉豈徒快登臨抑可騐學術大哉天地心昭然本如日世人庳且隘動以私見窒未能脱塵凡底處識㣲密羡君有斯樓發以静春筆知崇與禮卑二義貫於一燭理要髙明履道貴平實庶㡬足目俱不但窺彷彿工夫妙方寸豈假身外物此境未昭融此屋空突兀君看希聖徒陋巷暗蓬蓽以青氊與志道衝寒暫行役遺汝以青氊要識夜眠處當如親膝前易曰無有師保如臨父母凊温供子識清白保家傳小令多堪法母顓字畫妍獻之父子忠孝大節多可法字其末爾賀外舅轉官黄山桃李閙春風曾見先生化育中經界力行師孟子井田有意復周公㡬年凋俗成佳邑一旦新綸賞舊功明主已知材智美渭川行起釣璜翁夀楊龢父夀日将何勸夀巵不妨拈出去年詩大生皆自㣲陽起百善端従一念基身欲寧時須主静㡬纔動處要先知老來自笑無新句那得仙翁一解頥兩宋名賢小集巻二百五十七
