body:
  text: 兩宋名賢小集巻一百七十四宋陳思編元陳世隆補太倉􅲤米集二讀涪翁黔南詩作阿香名字本無雙流落真成竄夜郎蚤嵗浪言腸似錦只今空復鬢成霜名傳故國猶驚座詩入涪川尚滿囊天為少陵増秀句故教遷客上瞿塘次韻元亢和邦師喜其歸自錢塘道人青眼為君開前度劉郎今又來白雨飽催湖上句紅粧誰把醉時杯籬邊採菊山千叠渡口呼船溪九迴便恐横翔到蓬閣試尋林下小徘徊趙丞家野堂近喜崔斯立新成背郭堂傍崖深置産喚客小飛觴稍遣花經眼頻移竹過墻官清公事少夢熟鳥聲長藤倚樛枝瘦芸翻亂葉香騎曹休問馬聱叟漫為郎丘壑胸中事乾坤醉處鄉人間一遊戲出處兩相忘次韻元素野步金堤不復上蹣跚矍鑠何勞强據鞍從我泥中甘蠖屈看他髙處作鵬摶錦江春色能供醉濠上遊魚亦可觀聞有平沙邀晚步定随明月下林端姑谿書報錄近作因寄宣毫越簡五雲書札何時得古錦詩囊久未傾急遣能言管城子仍煩解事褚先生飽霜穴兎秋方健照雪溪藤搗更精南雁去時人尚逺雙魚欲到眼先明次韻王次卿喜别元亢登第劉郎才思似春閒文在阿房季孟間盡把胸中著雲夢還從筆底看波瀾吾無富貴詢唐舉人説科名汙次山馳馬行看歸故物舞衣先喜慰親顔奉酧韋深道見寄盖世功名豈不佳韋郎心事本烟霞秋風自老千章木春雨誰分一部蛙夜鶴正愁雲出岫鱸魚㑹遣客思家從君細意論幽恨凖擬應須到落花韋深道和詩且以書堅扁舟之約僕以禁烟歸埽丘墓未暇先寄此詩闕然不見十年餘借屋新來共一湖已向雙魚逢尺素更因五字得明珠子猷心欲隨烟棹摩詰居應似畫圖㑹待龎公歸上冡便求奴飯馬青芻次韻章季長題石魚研屏蒼崕百丈懸江濵江潭下躍吞舟鱗戲將雙影倒挂崖石上妙絶始信陽侯神短屏誰為琢山骨與君一障西風塵世間百怪那可解清詩宛轉聊窮因問誰幻出水底石棹尾鼔鬛波粼粼固應鳳咮與龍尾明窓淨几長相親君家機雲好兄弟兩山對峙髙嶙峋為貧聊試漆園吏手版挂頬心看雲要收江湖入几席釣竿拂水垂風綸誰當為我語石魚莫愛浪翻月白千頃江鎔銀但願玉堂常伴直對此風流千載人次韻何丈即席春風無力栁嫣然花欲爭春作意妍坐上詩成雲態度樽前人鬬玉嬋娟鳳簫初暖參差竹檀板逺催大小絃惡客正應妨作樂主人渾似孟公賢次韻子容池亭晚思二首便到青雲尚黒頭有亭莫賦二宜休如君豈是池中物要趂官閒作浪遊漫叟江頭閒日月輞川圖畫小池亭謝郎春草有新句付與老人雙眼青次韻次卿林下行歌十首風吹蘇小門前栁雨暗羅敷陌上桑遥想錦江春色暖被花惱得少陵狂聞道君家隠鹿門竹籬茅屋寄江村龎公事業無多子只有平安遺子孫事向閒中種種休春來林下興還幽上山雙屐與誰著挂杖百錢時獨遊郡郭東邊是草堂巖花時雜澗花香愁從把酒杯中少日向讀書窗下長愁多應怪獨醒人心事全慿麴米春醉後逢花堪一笑狂來曵杖却成真身世無營䇿㝡良年來幽事不多忙飯牛欲起方朝露種豆纔歸又夕陽賣酒罾魚只數家卜隣元在水之涯扁舟定向桃源去斜日紅飛兩岸花人情危甚劍頭炊未可雲鵬笑一枝冠冕窟中元不到雲山堆裏復誰知得酒固應聊獨飲有田何苦不親鉏客來深巷聞雞犬便是淵明歸後居勃窣蹣跚不上隄却來林下小徘徊已知修竹有千畆更為桃花求百栽夜讀艾子書其尾萬里投荒海一隅八年蜑子與同居可憐金殿鑾坡日渾在蠻烟瘴雨餘竒怪誰書方朔傳滑稽空著子長書不知平日經綸意晚作兒曹一笑娛婁黥菴納凉婁黥無骨可封王生事全慿藥一囊閉户翻經頭已白開門延客酒初嘗竹從春後知無數花自山來别有香未有數椽容我老聊分一榻借君涼次韻元杰暑中書事劉郎家世盡名卿晚嵗憐君尚帶經道在莫嫌榆歴歴詩髙何媿草青青杜門不出人應笑與世相違吾獨醒誰與林塘共清夜緑荷時照兩三螢次韻春卿逰黄蘗道塲長安多貴人被服縈寳帶名字垂鼎彛功勲壓嵩岱一懐上蔡悲樂事鍾吾輩知君汗漫逰食蛤據龜背若君哭痴兒洋洋飛大盖梯空瞰千山閲此烟雨態山空亦何有長松䬃㣲籟聊將身世夢淨洗佛祖戒行樂要及時幸此無藉在只今况豐年禾黍已斾斾狂風不鳴條積雨不破塊賞心失幽期噬臍有餘悔曉猿倘未驚斯逰君弗怪便當買薄田往抱躬耕耒次韻次卿約尋梅二絶擬摘寒梢一㸃春佩囊無句久生塵尋花㑹得王郎意應為江梅似玉人想得瑶林玉樹春髙標元自出風塵殷勤欲共梅花笑却恐梅花解笑人東墻橘將熟催以長句木奴嫋嫋半垂墻故惱幽人苦未忙雨細不妨無緑顆簾踈時與可憐香誰將磊落黄金顆為付甘酸白雪囊只有天公真解事便須先借滿林霜雪中過慶老方丈雲滿江天雪意酣擁爐聊復聴巴談老人不出真藏六來客何勞説後三已借團蒲揺短夢更澆春餅薦餘甘此生試向閒中看何止人間七不堪次韻同舒天用和元夜三絶舒郎人物是清流不解葡萄得一州郡守無燈亦行樂也隨賔客上江樓亂離燈火不成春月下歸時有㡬人吾老尚堪陪一笑世間無似此閒身逰騎歸來尚半酣一杯誰與甕頭柑小窗夢斷龕燈在影落踈梅月上菴次韻春卿尋梅霜梅槁立清江濆誰當為挽歸來魂青鞋醉踏江沙路玉蕤簮帽驚王孫臨風想見花有語此郎詞賦如文園花開無情落亦易聞香當欵知誰門怕看落地白雪滿便恐綴枝青子繁温風明月不易得繞樹莫放花黄昏知君共醉有佳客此意歸來誰與論煩君問花花無恙尚堪一笑同清樽次韻草堂主人雨中十首反鎻衡門誰復開草堂殊不見兵埃雄風斜巻雲頭去雌霓横遮兩脚回有家憐我無鄉地好事知君不世情借得小窗安淨榻卧聽風雨入荷聲虎頭山下元無路龍骨溪邊尚有窗風裏荷花吹不倒雨中鸂鶒自成雙少年結客不思家酒椀春衫白苧麻今日江邨烟雨裏兵戈滿地鬢雙華滿溪烟雨濕芙蕖綠葉紅花錦不殊聞説宛西橋畔宅小園無地不荒蕪醉裏青春挽不留眼前戈甲㡬時休溪邊兩細花吹盡隴上風寒麥又秋亂來嵗月總如流頭白江村不奈愁老罷此身何處著尚堪同倚雨中樓含桃熟後鶯還語栁絮飛時燕亦忙風物但隨時節好不知人意自凄凉浴鳬飛鷺下横塘花過鶯歸草自長恰似碧雞坊口望浣花溪上一茒堂避地偷生只閉門不堪搔首對醨樽行歌野哭江頭路雨葉風花總斷魂次韻常元明西坑見寄西坑只在亂山間尋得仇池十九泉有句能催千嶂雨無人共釣一川烟送詹伯尹丞涇邑西溪寒食栁花飛正是琴髙欲到時薄祿僅酬三釜志新篇莫負兩松詩催科未辦何妨拙作吏能清不用知髙論平生期活國一方疲瘵看君醫題馮尉緑淨堂不種平池玉井蓮巻簾堂下水如煙溶溶自漲晴江緑脈脈還通暗谷泉誰道馮唐今白首始知梅福是真仙客來莫唾青銅面要看蟾光上下天明皇羯鼓圖禁籞鶯聲外天袍擁御黄曲名翻荔子春色繞沉香白雨花奴手風鬃舞馬牀向來歌吹地何處是漁陽同仲共兄弟訪趙行可行可置酒倚杖山頭寺維舟栁下堤莫催金騕褭且醉玉東西亂後兵猶滿風驚鳥未栖看君飛動意兩目在鯨鯢初夏絮飛長陌又春餘綠滿菖蒲夏巳初雙蝶不來花蔌蔌一鶯時到樹踈踈平生懶作折楊曲萬事可占長栁書只有故山真耐久伴人閒處作踟蹰凌歊晚眺故鄉南望㡬時回落日登臨眼自開倚杖獨看飛鳥去開窗忽擁大江來傷心不見姑溪老抱病聊尋宋武臺嵗晚無人弔遺跡壁間詩在半灰埃環翠亭客意常隨倦鳥還翠屏空夢小孱顔更將臨老雙愁眼來看平生未見山西子為誰顰逺黛湘娥何事結烟鬟千巖萬壑無人處便是輞川圖畫間睡起有感日長誰復欵幽扉睡到斜陽恰盡時缺月要圓雲未肯青春欲老絮先知天於我輩元無分夢比人間更不疑門外故人千嶂逺燈前華髪萬絲垂次韻伯逺春雪風寒欲下欺春雪天近先垂壓地雲堆得樓頭成玉色吹來水面作波紋慿陵暖日竟何事調䕶新花誰解紛温詔始聞如挾纊九重應復念三軍題趙周賔家夜獵圖翰林作醉石偶似蒼於莬龍眠見之笑為作匹馬彎雕弧云是將軍出夜獵上有仇池行草書雲沙蒼茫日欲下道逢伏虎南山隅心知是虎不是石雙弦急控皆盧胡明朝白羽飲頑石摩娑欲盡金僕姑君不見賜累千金新垣平連佩六印欒將軍致君大略豈在爾封侯細事不到君先生言語妙天下瘴海七年皮肉皴邂逅英物數蘇季曹蜍如生亦如死龍眠有眼識天人異世同成一竒事君當什襲勿漫摹此人此畫人間無水西璧間見吕居仁絶句次其韻秋霜落後題詩處醉墨淋漓苦未乾不見窮愁孟東野亂峰空鏁一溪寒侯元進賦待鳳堂佳句見邀同作見説封君竹風姿飽嵗寒㑹看雙鸑鷟飛下碧琅玕惡鳥良復厭閒花吹自殘絶知門可欵夢對小檀欒燕欲來巢亂後烏衣巷巳空擬尋茅舍伴衰翁戲將雛去春風裏銜得泥歸暮雨中炙手不嫌門户冷傍人知獻語言工明年記取來時節應是桃花滿院紅次韻元進寒食感事寒食江天雨㺯晴夕陽花草一川明持杯欲下他鄉泪上冡寜無故國情漸喜三春逢禁火㑹須五斗解朝酲知君屢作東萊夢吾亦飄零歎此生次韻元進病中書懐一竿烟雨釣羊裘稍負初心只自羞擬學倦飛雙去鳥可憐無定一虚舟未成大隠是小隠為用人謀更鬼謀君有胸中經濟策不須猶説二宜休次韻元進書事七尺看君玉作山倦遊莫賦鳥知還大椿本是八千嵗天馬終縻十二閑笑我生涯真草草知公人物未班班他時一枕江南夢猶記相從水石間次韻元素見寄吾曹心事寄㣲言此意難從世俗論妙句己先醒醉夢尺書何止到寒温因緣只睡心情懶習氣惟書眼力昏知有草廬能避地滿村烟雨一柴門小蔡許借徐詩未至馬中未必無驊騮人中豈可無曹劉龍媒西來㡬萬里異士一出三千秋李白坐詩竄夜郎退之論佛流潮州天公可笑無老眼兩翁憔悴令人愁平生四海黄太史長庚配月何曽死西江自是南國紀公有髙名正如此人言此老酷似舅坐上拈花獨公喜分得西江一派流萬古正須公一洗吾老耽詩空瘠臞起死鍼肓正要渠子豈有意能起予書來并寄囊中珠兩宋名賢小集巻一百七十四
