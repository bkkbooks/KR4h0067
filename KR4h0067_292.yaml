body:
  text: 兩宋名賢小集巻二百九十二宋陳思編元陳世隆補鷗渚微吟趙崇鉘字元治開封人為都昌令都昌屬江右僻邑故書事詩有山雲欲到地街鼔又催衙風𦂳魚休市官貧飯帶沙之句有鷗渚微吟一巻調漁者山明松雪水明沙一曲清溪著釣槎我已浮湛君漫浪漫煎我水試君茶頗愛頗愛樂天齊物我夢隨吟賞洛中橋桃花細馬載楊栁半靣春潮紅未消食化海食多詭心豢食令人魯山中食薺人齒冷肺腸苦青陽青陽滿芳㽔流連度丘園眄睞不忍折恐傷造物恩夜坐自炷芳蕭讀道書元文豁落走龍魚松梢露色掛北斗一夜風前學歩虚尋真夕對春雲弄月黄金絲春山草木皆仙姿松根對坐日西夕羣峯當前立青壁鏗鏗虚壑含古音静聽宛是商山吟洞石微開月當户剪水氷絃心手語有贈别意參差遶碧欄外頭斜月逼人寒鈎簾恐礙雙棲鵲乍可桃花隔霧看簡雲卧憶君心事如流水流向江頭作暮潮想得潮平沙有雪自鏗鐵片和吹簫空城雀空城雀黄口黄啾啾空城無人種禾黍飲啄飛鳴由得汝山間山囘霧氣濕生意鞠碎隱石道苔蘚春松花鬰金粉東風東風吹梅梢飄揺泣香雪下有野草根嶄然競時節野園野園對客無杯勺共坐茅欄理釣車片月漸低風露冷隔簾山鬼嘯梨花至後愔愔雲氣繞江城至後寒輕詎可憑兩日南風將雪信牀前蝙蝠夜翻燈大孤大孤溶溶决眼青小孤江色春㝠㝠隔江淮壖幾千里枯荻蕭掺朔風起佳人何在遥相望我無羽翼從君翔為君暗整真珠裳緑蘅翠芷參差香壯節亭二松壯節亭前野碧滋髯龍飛去忽經時秪應黄犢蒼藤路尚有清泉白石知東風吹桃花東風吹桃花花光射春林相看各媚娬艶冶揺人心憇蝶下新緑游魚上清潯百年一湏㬰㝠觀契飛沉曉起雨漂窗紙濕成瑕風壓甆瓶卧枕沙曉起無悰餳粥冷自添新水救梨花江上清露初生紅蓼秋爽風先到木蘭舟釣絲不捲波浪穩夢入蘆花數白鷗仙思水殿風清急景斜靈君初下五雲車碧羅寶扇雙題字記是誰人詠落花麻姑擗麟不肯食飛猿嶺上餐松實月冷天空涵曙光露色凝烟白如蜜東溪夜泊雪滿汀州風滿林霽光空徹夜深深推篷却受梅花月自嘖横簫調楚吟甕天康廬天户㕔東偏本呉西山遺址不見甕天人但見石上字誰能負甕去奪我寥天思甕破奚有餘甕在奚不足吟作甕天辭摩挲石苔緑雜興潮平烟歛月明髙霽雨涵空見羽毛我自無能君了了檣竿獨倚調離騷日日西風坐石苔手捫蒼壁倚雲開却來平地觀空色不信碧雲天際來都昌書事世事可無酒春藤還有花山雲欲到地街鼔又催衙風𦂳魚休市官貧飯帶沙天機不得問暮色欲棲鴉丫頭巖烟雨斑斕石蘚春墜雲誰夢寶花顰行人總被虚名誤到得傾城又誤人月巖玉丹仙蜕馭能翰更作琉璃世界看大地山河渾忘却漫依桂樹舞青鸞次壁間韻雨又入簾風又斜東風吹客客思家浣紗西去誰家子青絹圔裙挿杏花山月溪風兩自由紫蘭緑桂等離憂狂歌鬰鬰成何事一片夕陽蘆荻秋海棠開盡故清寒漠漠梨花暮色閒酒滿緑樽愁滿酒醉凭枕障認巫山半髧嬋娟垂兩鴉驚潮微隱寶簮斜客愁正自遊絲亂莫帶叙頭百結花往體積雪乆不解下有希世珍志士緼袍間苦心終不伸安得白日光能照清夜顰皓彩青雲端飛光落溟渤渾河與清沚同受明月魄勿以清濁分天光本無隔志士惜流光游子念長道流光如奔霆長路漫浩浩饑人忽夢飽百憂悉傾倒真妄安足論榮名以為寶松下松梢凉露警孤鶴潭靣北風蟠老蛟蛟老涎腥波浪惡獨吟碎月㸔松梢癸卯除夕客中膝下傳觴事已非瓣香千里隔庭闈摧心逺憶新阡上寂寂低松雪乍晞數日數日東風欺病骨侵凌晚色作輕寒客來坐乆無談柄共看游絲上井欄梅新陽斡坤軸枯朽皆光榮稜層氷雪中復見天地精姑射神所為伯夷聖之清太白抱轗軻靈均擁芳馨是予心魂間不受纎芥縈獨立萬花先皎皎非近名溪流鑑寒柯游風吹落英山明霧氣濕月落參旗横羣虚妙音發一洗萬慮輕紛紛兒女姿慙愧東風情狹斜呉姬凌寒吹玉笛手彊誤作遲遲聲却來抛眼調行客中有二月東風情東風二月楊花滿伯勞朝啼芳思亂狹斜繡轂易為愁邂逅相逢莫腸斷破褐生松鬰寒灰破褐出殘絮童兒不耐煩微吟起身去湖中汀蒲獵獵起凉颸碧藕香中獨立時機事兩忘吾䘮我扁舟吟過水仙祠新堤淡烟蓑草雨絲絲小醉微吟倒接籬吟到水西雲影北莞然一笑已無詩書事東鄰老翁寒不寐百結懸鶉抆悲涕自云子孫學灌田不識江湖與風水大兒里胥縛送州小兒逃遁卒未休老夫忍饑特未死犁耙典盡春無牛身為王民合徭役運米操舟操不得江湖風水未足愁檝䘮檣傾誤人國答碧山欲種梅花無古根手移蘭茁上甆盆却憂逼仄傷蘭性自下清招為返魂答維溪維溪挿架三千軸葺茝紉蘭得自娛㑹湏握手論活法静看碧水生元珠學詩神仙不可學願學長不死學詩如學仙吞霞潔塵滓渚花流水香烟霏暮山紫凉颸入修竹一笑鳴緑綺雀短翅斒斕貝花紫逐日飛行曉霜裏秪知觜爪求自肥肥甘累人心弗知天寒日暮向何處前路多山慎勿去呉兒織網連素空一落牢籠腥血紅南内已剪諸郎百慮輕驕兒長大又生獰秪愁南内無歸日南内歸來萬古情兩宋名賢小集巻二百九十二
