body:
  text: 兩宋名賢小集卷五十五宋陳思編元陳世隆補公是集五月夜獨酌涼月被雲涵碧霄暫憐塵宇斷塵囂露飛向樹光明滅風度疏星影亂搖驚鵲似投人處息暗蟲無恨嵗華凋短歌薄酒清輝裏百感先秋不自聊詠亭前箭竹冉冉東南美託根那在慈鳯凰不可待嵗月方屢移非復山林意空餘霜霰姿清風有時至獨與幽人期五月望日赴紫宸謁待旦假寐半夜北風天反寒倒衣驚問紫宸班雲容不辨隂晴際月色猶迷爽晦間獨聽鳴雞識鍾漏正憐殘夢失江山濯纓簮筆初無補空愧紛紛數往還月夜期江梅兩君不至聞在李二審言家飲日入更灑掃翛然庭檻空酒杯落明月白羽來清風佳興自不淺幽人無與同徘徊卧林下重露溼蘭叢和直儒夜涼急雨逐雲過微風吹月生寥寥天宇濶粲粲葛衣輕展轉漏將永昭回河正橫秋槎舊有信忽憶泛滄瀛同持國過江十新作池塘亭築榭因髙栁疏泉激淺沙登臨容展席遊泛足浮槎露碗涵醇醴氷盤餉美瓜愛君難興盡未醉惜還家菡萏千枝發池塘五月秋香繁初過雨影密欲藏舟魚躍知人樂鷗飛為客留江湖未成往愧此意悠悠吏隱由來事郊居故自宜池臺隨意定泉石象天為珍樹移時語清風竟日碁市朝情久厭野老不相疑和永叔禁中對月珠宫銀闕閟金鑾獨得清輝盡日看冷奪雪霜深刺骨瑩分毫髮凛衝冠通中夢覺爐香斷方底封餘玉滴乾佳句密傳天上景世人空仰白雲端又和憶幽谷早聞幽谷未曾窺翠碧清泉入夢思到眼惜無名手畫醒心欣得醉翁詩種花舊比甘棠樹刻石今成峴首碑使我一麾從此逝勝遊當不減君時駕幸飛山教場閲武侍宴冬令三農畢時巡萬乘行川原分壁壘貔虎望麾旌王氣雲成殿天光日繞營風隨鼓桴急塵絶馬蹄輕發石機投短抨絃火激明響振摧烈缺影墮落欃槍令下疑霜肅恩加挾纊平搴旗輕俯仰奪槊妙縱橫壯士前歌勇儒生從觀榮炙行烽燧舉觴溢海濤傾清道遙傳警鳴鞭夕向城欲知威略逺區外讋天聲北軒手種竹兩竿近輒有甘露降其上作示同舍秋來手種竹憔悴不成林從此雪霜晚空驚孤直心如何沾瑞露似欲慰窮隂珠華粲將墜玉色潤還深含春乍荏苒戴日尚蕭森元澤非人力樵蘇無見侵劉永年部署清宴堂文丞相為作之漢廷謀帥用詩書丞相今來握虎符帳下偏禆皆緩帶軍中談笑亦投壺故開廣榭宜高會自有清泉入座隅三輔衣冠獻謡俗五陵豪俠壯規摹椎牛灑酒捐長日急管哀絃舞艷姝射取天狼作乾豆莫推衛霍擅西都送李留後守東平少壯去人如水流似君那作侍祠矦高談每及功名際出守真寬聖主憂麾下百城包海岱道傍千騎擁貔貅家聲時論俱輝赫世將寧為好畤羞十二月二日十月黃河氷未澌栁條若若草離離寒蛩逐馬聲相續都似江南秋半時朝謁信武殿二首旌旗千里自天來投䇿黃河餘馬回聖主緝兵方外服東巡日觀望蓬萊天下安危寄老臣幄中談笑靜邊塵丹青未備雲臺像微管猶悲道路人魏文帝江水由來一帶橫魏文何事畏疑城不應天意分南北自是無人敢請纓武皇武皇英氣古無儔解道平城遺朕憂汗血龍媒十八萬單于臺下獵清秋楊無敵廟在古北口其下水西流西流不返日滔滔隴上猶歌七尺刀慟哭應知賈誼意世人生死兩鴻毛自入北界候迓者供帳每進益恭少嘗至契丹者皆云異他日示陳副使希元和親雖復用諸儒聖德由來感格殊天子今成大父行胸奴自號兒單于候人守燎𨽻圉馬渤海西道奚前驅塞外始知漢使貴留犂堯酒直區區隂山隂山天下險鳥道日稜層抱石千年樹懸崖萬丈氷悲歌愁倚劍側步怯扶繩更覺長安逺朝光午未升鐡漿館稍出盧龍塞回看萬壑青曠原開磧口别道入松亭此館以南屬奚山溪深險以北屬契丹稍平衍漸近磧矣别一道自松亭關入幽州甚徑易常祕不欲漢使知獵馬寒隨草奚車夕戴星忽悲田子泰寂寞向千齡奚人以車帳為生晝夜移徙富公老人臧用自雲本京師兵士咸平中沒番五十餘年矣白髮衰翁雙涕零曾隨諸將戰咸平一捐北鄙迷歸路却問中華似隔生思報漢恩身已朽耻埋泉壤死無名今朝縱觀非他意得見官儀眼自眀麃子嶺帳館寄隱直離腸易感嵗華催更席龍沙望紫臺持節不眠宵自永聽笳無事淚空摧扁舟何處山隂雪驛使他年嶺上梅欲寄一書愁已亂天邊應候客星回寄書甌脫逢歸驛作書慿寄聲那知夢識路先入大梁城留别永叔回車欲度幕南庭此地那知眼解青老覺鬢毛俱種種醉看風物盡冥冥平時慟哭休論事逺别悲歌更忍聽且共春風同入塞憶君時計短長亭逢范景仁李審言二諫議怪來原隰滿光華不意相從天一涯久别班荆情未易少留空蓋日傾斜山連木葉千峯雪地逼龍城萬里沙深愧壯心輕逺適自嫌憔悴聽悲笳過中京走馬上平安奏狀驅車終嵗極河源庭在潢水北自云天潢也狀奏今朝叩帝閽目斷白雲浮魏闕心先飛騎向中原揣摩詎試衡人術感激空銜國士恩猶使胸奴戴黃屋南歸慙弔陸生魂朱橋鹿兒館前朱橋栁映潭忽見似江南風物依然是登臨昔所諳犬聲寒隔水山氣晚成嵐留恨無人境幽竒不盡探十二月二十七日宿栁河聞永叔是日宿松山作七言寄之自栁河直路趨松山不過三百里然諱不肯言漢使常自東道更白隰長興折行西北屈曲千餘里乃與直路合自此稍西南出古北口矣相望不容三日行多岐無奈百長亭欲知河栁春來緑正似松山雪後晴檀州正月二日窮谷回看盡孤城平望遙自古北口山至都盡市聲衙日集此州衙日市集海蓋午時消每旦海氣如霧至午消盡土人謂之海蓋冠帶才通漢山川更入遼春風解氷雪最覺馬蹄驕紅玉誰家女燕中記見四首紅玉誰家女雙瞳如水流映花看漢使不覺墜搔頭紅玉誰家女明艷奪青春羞人不得語含笑却成顰翠霞金縷衣獨立翳斜暉無奈春風蕩吹人只欲飛春風能吹衣不能解人意使我為朝雲與君從此逝冀州正月十六日飲席月缺雪殘雲亂飛千燈相照續長輝寒欺短夜禁杯酒春入東風試舞衣老惜佳辰經嵗得醉驚陳迹出門非漁陽鼓節尤悲壯知我新從萬里歸雪後城上雪後原野曠春生風氣和靄靄林表色輝輝地上波形開境逾靜望逺意更多年華適可玩不醉將謂何登平山堂寄永叔內翰蕪城逺地隔人寰盡借朝陽萬疊山江氣橫朝飛鳥外嵐光平墮酒杯間主人寄賞來何暮遊子消憂醉不還無限秋風桂枝老淮王仙去更能攀和貢甫遊禪智寺崇岡斗上半浮雲行繞芳叢日已曛蒙頂川原眼中見揚州歌吹竹西聞荒王重壁臺先毁古佛雙林火亦焚會看旃檀重滿地莫悲麋鹿向成羣后土廟瓊花廟吏云近嵗開花絶少比舊憔悴繁香簇簇三株樹冷艷飄飄六出霙移植天中來幾日欲看憔悴老江城無雙亭觀瓊花贈聖氏東風萬木競紛華天下無雙獨此花那有雪霙凌暖日不為琪樹隔流沙祠成寂寂春空老江雨冥冥日易斜仙品國香俱妙絶少傾高興盡流霞四月見梅花作臘前芳樹暑前開笑憶周南摽有梅玉色還如雪中見天香不減嶺頭來黃鶯未識休頻顧粉蝶初逢亦自猜應與靈芝共三秀碧城瑶圃隔塵埃送張奕進士歸廣德省親南北旅遊三十年相逢依舊孝亷船千鍾不洎今吾老羡爾歸安二頃田園人獻芍藥淮海由來草木夭春工殊復自嬌嬈始知隋苑多佳麗未覺吳宫久寂寥氷雪肌膚明綽約雲霞衣服潤飄蕭一枝漫取堪誰贈老去風情不自聊雨後回文緑水池光冷青苔砌色寒竹深啼鳥亂庭暗落花殘轉運沈郎中歸和州墨墅堂寶軸牙籖三萬餘中園華宇廕清渠風流復見郊居賦榮觀歸乘使者車俯仰江山樂無有優遊文籍昔誰如何當去此從君語盡得平生未見書城樓新晴強人意步上西城樓雲煙開井邑綺繡錯田疇離離麥就熟翳翳桑尚柔懷歸感初服覽物悵淹留得貢父巢縣書云阻風别離常作惡衰老異他時望望風波苦悠悠兒女悲江空人迹絶天迥鳥飛遲若復無雙鯉何由慰我思雨中聞鐘踈鐘不隔雨迢遞入重城倦客未能寐歸鳥初不驚霏微隨暮色颯沓隱秋聲簾幕鮮風起明朝應早晴喜晴寄彥猷積隂向十日不見江南山何意浮雲盡依然庭户間芳草晚已歇瑶華初可攀故人在逺道悵望凋朱顔與楊十二延平同登城東門緑樹浮萍合青山畫障開登臨共今古壯觀雜歡哀長日消碁局微風強酒杯浮雲滿西北容易雨飛來城下種竹今春極有佳笋環城密篠舊檀欒春笋新成幾萬竿池上龍蛇驚蟄起軍中矛戟繞營看鳥啼窈窕千重碧風過蕭森五月寒緩帶輕裘客自暇履綦多向此林端兩宋名賢小集卷五十五
