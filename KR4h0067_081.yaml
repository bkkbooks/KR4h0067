body:
  text: 兩宋名賢小集卷八十一宋陳思編元陳世隆補青山集山中吟山中吟白日長碧霄泉暖菖蒲香仙翁勸我採為食登髙遂覺足力強登髙望逺逺思發春風浩浩天茫茫美人一别隔滄海青鳥寄與雙眀璫青鳥東飛亦不返草色緑縟雲徜徉草色幾回緑雲飛無故鄉魂迷夢斷竟何在山中吟白日長山中樂尋山佳興發一夜渡江月首到廬江元放家水洞清光數毫髮愛之便欲久棲息又聞靈仙之境敞金闕清風吹我衣不覺過皖溪危梁千步玉虹卧松行十里青龍歸煙霞繞腳變眀晦忽見殿閣鋪琉璃重簷却在雲漢上倚欄俯視白日低虛庭自作簫籟響屋角更無飛鳥飛霓旙重重蔽真馭仿佛遙見星文垂長廊紗籠絶筆畫老龜穩載青瑤碑更逢逍遙不死客齒清髮翠桃花肌蕭臺可到亦非逺雲間况有白鹿騎細窺絶景輒大笑吾曹何事塵中為安得良田三百畝可以飽我妻與兒長年只在名山裏萬事紛紛都不知賞蓮濯濯水中華香艷勝蘋藻英英泥中根潔素常自保房實又堪食無一不為好乃知金仙經譬喻肆論討遊焉集賓僚賞咏固宜早一朝霜颷至莖葉變枯稿抑亦如佳人妍媚忽衰老顧盼豈復憐棄置不足道幽懷向君開芳樽為傾倒木末誰能搴愁煙起孤島雙泉軒贈太平守梁正叔開池得雙泉因泉構華屋池中種菱荇池上列花竹與春蘸新紅遇風搖淨緑輕鷗自飛舞纎鱗隨出縮操舟往江海端憂龍蜃觸卷衣入山林而防虎狼欲豈如一憑欄俯仰快心目朝吟吟有餘暮醉醉不足雙泉長涓涓比公享天祿公歸民懷公聼我雙泉曲淮南韓魏公新祠新祠重見舊風標儀鳯無聲立紫霄富貴榮華垂四紀功名事迹冠三朝月移簾影燈長在春散庭隂木未喬何獨斯民懷惠愛帝詞天篆刻琨瑶韶州唐張文獻公祠堂文獻頎頎學問該可憐為相遇嫌猜當年致主陳金鏡後世空祠見鐡胎武水直疑龍卧久韶山時想鶴歸來我朝繼有襄公出誰道南方乏美材南豐道中前溪淡淡日落後山靄靄雲歸桃花不知客恨一片飛上征衣感懷寄泉守陳君舉大夫柴門永日泪沾巾事與心違漸失真家住江南幾萬里身留海上已三春眀時枉作銜寃客皓首翻為哭子人多謝泉州賢府主數將書札問悲辛攜茶訪徐彥醇助教蓬蓽蕭然一畝宫生涯四壁有清風鄉閭髙行終無玷場屋遺才誤至公書卷五車心盡記年華八十耳猶聰滿杯雪液聊分酌别後音塵豈易通白蓮院觀蔡君謨遺迹盤屈龍蛇未奮身老禪當日亦知人來趨蓮幕文章客去作金鑾侍從臣物外論交終不泯壁間題字尚如新年年楊栁春先緑誰復多情與望春開元禪寺三寺參差見剎竿東塔天王開元三寺相鄰開元形勝據龍蟠樓臺影落青霄險鐘磬聲傳碧澗寒物物有緣香供盛塵塵無礙法筵寬欲隨大士披華藏北斗容身不亦難小閣夜眺白日塵寰憂思深夜登危閣解煩襟空江雲盡月涵璧絶壑風生松奏琴佳客不來分坐賞濁謬誰為此時斟疏鐘輒莫催清曉吾欲憑欄更一吟南山晚步即題王祖聖南澗樓清斯亭雨過南山紫翠深團團仙露灑衣襟碧雲影裏寒猿嘯玉澗聲中怨鶴吟期赴前林同茗酌倦投盤石揀蘿隂憑誰寄語謝康樂安用披榛故逺尋平昔朱衣駕兩轓髙樓歸隱卧雲泉文章未許矜盤谷水墨無勞畫輞川春日半晴花照地秋風入夜鴈連天燒丹辟穀非吾事能逺塵寰即是仙松徑松溪溪水深水光澄碧倒松隂浮杯可酌劉伶酒坐石仍彈靖節琴無數輕鷗隨出處幾畨佳客伴登臨自嗟羅網何時脫往濯塵纓為一吟贈武平許令昔拜先翁滙水濱存亡回首幾經春鳯毛今喜為花縣鶴髮誰嗟困客塵篋有贈篇長取讀心藏遺德尚如新源源世澤來無盡桂籍傳家己四人次韻無逸長老秋居見寄榕樹蕭蕭一徑深門庭秋盡紫苔侵能依幻質尋元覺默運真悲拔衆沈有想願分香界飯忘言求出世間心旃檀漫把壚中爇無盡無邊結寶隂追和紫霞翁紀夢二首乘雲親到紫皇家不是人間舊物華四座散香春結蓋一墀栽玉曉生花入盤仙李皆含露出鼎騠金尚帶砂偶對吟箋追昔事猶疑鸞鳯數行斜笑上蓬萊第一山蔥蒼半落有無間金雲璧月夜何永王殿珠樓人盡間五嶽已能超險路九天從此造元關回頭為問桃源客底事雞鳴便欲還傷春二首臘月花開盡中春不見花栁隂空拂地草色漫平沙客路心常折僧窗鬢自華故鄉何處是瘴海暗天涯春雨時時暗春花眼未經生涯隨過鳥世態委浮萍瘴霧何由避蠻歌不忍聼誰家有醇酒吾欲醉兼醒獨醒野性惟憐酒無聊遂獨醒風塵雙白鬢天地一青萍鵬鳥寧須賦離騷未是經回頭付陳迹終欲醉冥冥邸報立法新三省論材只數公簿書期會正風俗見聞同民物瘡痍後朝廷氣概中不才思獻賦天路恐難通自遣骨相殊屯賤無官只有階平生萍梗遇兩鬢雪霜排去國腸空斷求田心未諧新交莫相笑中立一枝柴雨過雨過添幽事褰裳步暖沙竹梢含淨霧藤刺罥輕槎鸂鶒雙隨浪蜻蜓對覔花老夫詩思愜頗覺日沉車屏迹屏迹已恨晚疲軀今自由百年無七十一日有千憂覔酒開青眼憑詩遣白頭莫言賓客少池上兩三鷗入承天觀飄飄飛蓋入仙山樓閣初逢碧靄間為問蟠桃今熟未客來一食欲忘還雲舒雲卷曉風涼千尺松梢鶴唳長昨夜月宫飄桂子至今樓殿帶天香出觀沈沈樓殿五雲藏草木長春水石香一榻可能容我住桃源迷路笑漁郎呈同行黎東美朝散風日蕭蕭暑氣無櫓聲相逐轉江湖西山廬阜青如淀應有新詩入畫圖儲溪懷亡友秋風入夜透征衣點點漁燈各自歸投老重來江上泊廬山如舊故人非入萬杉翠靄紛紛蔽一嵓何年人種萬株杉天翁已許虬龍卧匠石不勞斤斧劖出萬杉禪庭欲别更遲遲猶戀涼風灑客衣無力便分青嶂住滿懷空帶白雲歸無客病久人情厭經旬客不來簾因風力卷門待月華開栁上新蟬咽城頭暮角哀勞生隨物化孰免葬蒿萊農事三嵗悲農事官倉亦已貧敕書雖赦獄恩澤未蘇民南國供輸大中宵涕泗頻一心隨草木無復念沈淪野望暑雨收殘候秋雲結薄隂山光翠兼紫水影淨還深竹密羣鴉入天空一雁沉興來白首衰颯愧儒林謝蔣頴叔惠澄心堂紙李氏三世皆名書古今筆法誰能如澄心堂中畜妙紙敲氷搗楮唯恐粗當時文物稱第一教敕往往親涵濡赫然真龍躍中國僣迹甘就雷霆誅論功行賞盡金玉唯有此物多贏餘流傳既久乃珍絶一軸不換千眀珠樂安御史輒寄我二十五幅無纎汚却疑織女秋夜醉素段割裂天所須又如美玉才出璞瑩采射目爭陽烏握管未得二王法寶紙漫對眀窗鋪廷圭煤麝銅雀瓦氣象幽雅尤相於坐思厚貺欲為報纍旬安得論錙銖况君才力似韓愈盡當返贈誅姦諛謝餘干陸宰惠李廷圭墨集仙昔與文忠遊文采聲名喧九州鯤鵬未化忽踏翼地老天荒雲海幽篋中嘗祕上賜墨仁宗所賜李廷圭墨紫金泥印雙脊虯名題廷圭姓氏李此物未省何年留紋如堅犀刮不動鏗鏗觸硯蒼煙浮蜀箋灑落黑勝漆欲論所直真難酬麟兒字法肖家學珍綈寶匣深藏收并力截斷輒分我始信眀珠今暗投嗟豫吟筆久已閣辨舌倒卷剛腸柔書陳北闕上印紱志樂南畝親鋤耰得君賜墨竟何用捧玩反覆增豫羞况君髮緑眸子瑩才業自副朝庭求研磨麝煤染諌草扶掖世病蒼生瘳名成功遂取上笏世閥光焰垂千秋莫如老鈍默將死再拜謝貺長江頭謝王公濟節推惠硯歙溪之仙洗山骨一輪琢出秋潭月摩挲清潤無纎痕不學寒光有時缺玉川輒莫愛蝦蟇縱爾觜吻何由齧隂天著手泉脈生三伏臨之失去聲炎熱又如眀鏡當晴窗對面森森數毛髮端江品格直頑賤鄴臺片段多皴裂中山有客先得之獬豸峩冠為忠血竄身南過洞庭湖覆舟幾葬蛟龍穴君今贈我誠謂何自愧間官非補闕松煙和漆法廷圭玉兔長毫妙諸葛敲氷搗楮出烏田四物收藏豈虛設乾坤俯仰存赤心誅貶姦諛佑臣節獨刊五傳扶春秋肻趂時文校工拙更衰更老心更堅與硯相將不倉卒謝厯陽王守惠新釀卓犖英才厯陽守年來不得音書久隔江知我巖户寒赤泥封送兵厨酒碧玉為壺黃金斗雪樹雲峰作賔友為君一醉歌陽春空山霹靂龍蛇走只愁君返紫皇家西望連雲漫搔首石門澗啓閉何人見湍流一澗分仙家無路入空鎖石樓雲白沙泉幽泉出白沙流傍野僧家欲試甘香味須烹石鼎茶搗衣清秋送殘暑隔屋忽聞砧逺震星河夜遙興關塞心欲知針縷密即是泪痕深他日功成後逢人寄好音秋笛清秋聞笛弄獨立露沾衣天外雲留住水中龍未歸悠揚聲益苦感激思何微不似前春聽梅花片片飛題畢文簡公撰李太白碑隂清風無根長不死太白髙名亦如此何人謂是王佐才文簡雄詞㵼秋水賢孫出守鐫長碑碑成字字生光輝寵承妃子己萌亂翩然鳯鳥來非時出林秀木衆欲殺納官贖命何其危畫船載酒酌眀月不著漁蓑披錦衣醉眠天地即衾枕至今荒塜人疑之丈夫闔棺事未定後三百嵗方逢知知太白文簡公不誇能詩與飲酒惜其浩氣突兀藏心胸青山老碧洗秋色姑溪濯緑涵春容太白不見碑可見螭盤龜載傳無窮舟經池州先寄夏寺丞去年收帆貴池口聞君髙歌撞玉斗今朝至自大湖南五溪新事為君談一年往返七千里鄉國生還真可喜君家白醪應已熟正好登山賞黃菊寄獻荆州鄭毅夫李白不愛萬户侯但願一識韓荆州荆州太守古來好至今文采傳風流鄭公詞賦天下絶殿前落筆鏗琳球相如嚴謹反枯澀宋玉爛漫鄰倡優卓然風格出天造氷盤洗露銀蟾秋麻衣脫去未十載寶犀飾帶魚懸鈎道行言聼遇眀主皂蓋朱幡寧久留渚宫風物最蕭灑酒滿金罍誰獻酬公嘗愛我似李白恨不即往從公遊醉看舞袖卷眀月夜聼長笛臨髙樓詞源感激㵼江海筆陳頓挫排戈矛駑駘蹇蹶固已困勉之尚欲追驊騮一朝公歸坐廊廟致君事業如伊周門闌從衛愈嚴密是時願見應無由行當投印佩長劍夢魂已附西江舟靜眀軒道人得道萬緣灰欄下幽花手自栽終日開軒無客到清風時引竹聲來再送賈眀叔侍御宣城重見謝元暉只恐斯民不久依為報聖眀容諌諍南牀虛位待公歸宗公香瑩軒酴醾洞口作新軒香瑩佳名自此傳要是釀為光祿酒醉來騎鶴上青天素質曽將蘭麝熏開軒有意待遊人請看一架晴空雪又勝桃源洞裏春藏雲寺酌泉不到藏雲四十年寺名重換屋新遷清泠不變當時味只有庭心一眼泉逹觀臺黃魯直名之二首戴氏山頭一席平集仙椽筆寫臺名長江自與天為鏡不用風雲變晦眀髙臺千尺俯江干達觀寧論眼界寬但見青山圍逺水不知何處是長安承天院清輝閣一軒誰與寫清輝地近城闉却少知只待中秋深夜看玉蟾低蘸碧琉璃逢東林舊僧寶陀巖下種松篁舊客欣逢煮术湯憶著東林攜手處十年添得兩眉霜柴門水落煙村迥柴門四五家晚風回斷雁寒雨側幽花世事紛無己人生自有涯鯨鼇真可釣吾興欲乘槎謝君儀寄新茶北苑藏和氣生成絶品茶豈宜分旅館只合在仙家點處成雲蕊看時變雪花淋浪得新句又勝玉川誇排悶呈元輿交態非今薄人情自古難弊裘甘我老雄劔請君彈魂逐雲峰斷心依酒海寬百年能幾許日月似跳丸登清音亭二首已别城樓景還登樹杪亭地髙鄰北斗山逺接南溟蟾影依雲斷樵歌隔浦聼客愁安用遣此處可忘形薄暮杳何適髙髙登古亭地無南國瘴簾卷半空星石瘦長人立潭空皓雪停短才吟不就終欲付丹青舟經彭澤謁靖節祠彭澤江邊邑蕭踈靖節祠煙昏鹿皮畫草暗菊花籬詠德今千載言歸彼一時男兒要出處此道幾人知英州煙雨樓江路分韶廣城樓壓郡東妓歌星漢上客醉水雲中潑墨天涵暝鋪綃月映空登臨逢此景不復念途窮端門肆赦藹藹端門紫氣濃卷簾蘭麝散和風星環帝座天澄碧繖映龍顔日透紅寶扇參差移仗裏金雞綽約下雲中恩覃草木先春力萬嵗歡聲合國同追和李白登金陵鳯皇臺二首綵鳯何年此地遊髙臺千古自風流寒煙淡淡籠城郭寶器時時出塜丘舴艋競歸芳草渡鷺鷀羣舞碧蘆洲重華不返簫韶斷落日秦淮添客愁髙臺不見鳯凰遊望望青天入海流舞罷翠娥同去國戰殘白骨尚盈丘風搖落日催行棹潮卷新沙換故洲結綺臨春無覔處年年芳草向人愁和薑伯輝見贈醉吟畫詩蒼崖一萬丈中㵼白玉泉飛鳥度不得而我長攀緣洗盡心地垢吟成元化篇更復有何物一尊當我前忽逢薑伯輝爽量涵氷淵開談了無迹所得全于天便欲脫青衫泛我江東船結交要終始相忘復頽然徑呼妙手畫秋江霜景全氷輪正卓午照影無陂偏誰能騎蹇驢世路空流連咄哉可以往揮手從飛仙庭竹眷此庭中竹羅生橫十尋踈踈挺髙節密密敷清隂好風每相過流塵詎能侵其下無蔓草其旁多秀林結根自得所非髙亦非深誰復採笙簫玉宇思和音兩宋名賢小集卷八十一
