body:
  text: 兩宋名賢小集卷六十四宋陳思編元陳世隆補公非集劉攽字貢父與兄敞同舉慶厯六年進士歷祕書少監出知蔡州召拜中書舍人卒弟子私諡曰公非先生有集春草春草綿綿不可名水邉原上亂抽榮似嫌車馬繁華處才入城門不見生今古路出門道路多縱橫不可測我今欲逺行須問曾行客徐徐問路人借問青松側客曰今何往答之逰京國客乃指要路而言行有益古路雖大道不如今路直但行今人路猶如假羽翼彼客别我去獨自躊躇立為見今古路信乃無苦忒今路足輪蹄古路多荆棘欲行今人路恐背古人迹欲行古人路今人笑迂僻又擬不出門奈何飢寒逼哀哀此時路悠悠蒼天色不避今人嫌路須行古陌古陌雖然逺且保無蹶失勉哉自勉哉前去難為適不獲見楊朱萬古凝愁魄上書行仕不至二千石賈不至五百萬此事夸者憂而非志士歎君不見下邳少年受書起幄中運籌制千里功成不受二萬戶拂衣歸從赤松子君不見計倪半策誅強吳鴟夷扁舟逰五湖三致千金不自擅至今籍籍宗陶朱大賢富貴不為己心事邈與常人殊逢時致身如反手雲蒸龍變無時無君勿憂上書獻賦稱賢豪刺繡倚市相矜髙丈夫昔曾笑徒勞啇賈旦旦爭錐刀絶句青苔滿地初晴後緑樹無人晝夢餘惟有南風舊相識徑開門戶又翻書芍藥又見公是集跗萼晴相照芳香暖競飄波翻蜀地錦霞萃赤城標萱花種萱不種蘭自謂憂可忘緑葉何萋萋春愁更茫茫葵花白露清風吹八月紫蘭紅藥共凄涼黃花冷淡無人看獨自傾心向太陽鳯仙手植中庭地分破紫蘭畹緑葉紛映階紅芳爛盈眼輝輝丹穴禽矯矯翅翎展逐伯強詞寶元二年余羇旅淮南醫來言曰今兹嵗多疾疫余因作文以逐伯強伯強厲也能為疫者故逐之皇皇上天兮浩浩后土厥生孔繁兮其施甚溥陶陶仲夏兮草木蕃廡鳥獸孳息兮我民樂胥我民孔靈兮上帝是仁天子聖兮百工日新上無粃政兮下無悖人鄰里具集兮樂哉欣欣伯強何為兮孰畀以政反世五福兮持極其令我民不怡兮既爽其盛白黑眩瞀兮孰察其正為夀反天兮謂康反病仁義無益兮苟且為幸嗟爾伯強兮其獨何心絶世和氣兮俾民不任上天孔仁兮大德曰生天不可長罔兮民不可久侵天誅誠加兮安所避雷公驅兮風伯逝嗟爾伯強兮何所詣南有蠻兮為寇為逋西羌戎兮恃艱自虞天子孔仁兮靡焉畢屠伯強往兮代天伐誅嗟中國兮不可久留子不去兮顛倒思豫五色菊屢聞白雪題詩句飽見黃花泛酒杯豈是一枝能五色相隨次第雪中開咏荼䕷二首明紅暗紫競芳菲送盡東風不自知占得餘香慰愁眼百芳無得似荼䕷瓊林殿側玉釣欄雪覆新花四月寒密影酡容千客坐柔條何處萬龍蟠桃花小樓西望那人家出屋香梢幾樹花只恐東風能作惡亂紅如雨墮窗紗松一株青玉立千葉緑雲委亭亭五丈餘髙意猶未已山僧年九十清淨老不死自云手種時一粒青桐子詠史自古邊功緣底事多因嬖幸欲封侯不如直與黃金印惜取沙場萬髑髏送劉長官桂州府掌機宜桂林風物舊宜人雪片梅花五嶺春心喜大江流瘴霧眼看南極異星辰軍中羽檄時無警徼外明珠日獻珍酒量問君能幾許越猿蠻鳥易傷神送潤州裴如晦桞隂深碧黃鸝語川水平堤鷗鳥舞送君臨流眼暫明愛此虛涼少塵土何况連檣一月行吳山楚水相逢迎稻花吹雨香不絶蘆葉搖風聲正清北固樓臺似圖畫廣陵欲渡聞潮生縹壺盈前京口酒紅斾相隨北府兵少年投䇿當為樂晚嵗甘棠空涕零望君鴻飛不可攀白頭方出玉門關獨向天涯共明月猶應夢裏借千山題館中壁璧門金闕倚天開五見宮花落井槐明日扁舟滄海去却從雲氣望蓬萊兩宋名賢小集卷六十四
