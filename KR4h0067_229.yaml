body:
  text: 兩宋名賢小集巻二百二十九宋陳思編元陳世隆補東閣吟稿趙汝回字幾道永嘉人太宗八世孫嘉定七年進士終主管進奏院杜子墅留别有朋不貴數道合意自親早知離别難㑹覿豈厭頻青燈書閣下細語交情真酌此武陽泉饌彼松江鱗公庖復有攜得非知我貧如何不我醉明日隔征塵漁父衡嶽早來雨湘江増緑波小舟浮似屋香草結為蓑水定見魚影夜清聞櫂歌悠悠百年夢醒少醉時多送李寅歸里憐君竟不偶每亊與心違南雪嵗將暮西江帆獨歸停薪待官米借宅共僧扉吾老慙為吏相期尋釣磯東山堂謝守登臨地今為博士居由來好山水常得近詩書洞與衡嶽接泉分玉井餘年年為吟事春草不教鋤呈水心先生鶴骨雖癯髪未斑秋風鷗鷺共翛閒芙蓉夾徑纔通馬楊桞沿池不礙山外稿定於何日上中興只在十年間榖城片石無人識胡騎堂堂出漢關鴈山木葉新時雨亦晴山中少駐不妨程童嫌路峻頻癡坐僧喜岩幽每促行草蕩春深無鴈到松林月上有猿聲石屏一帯三千丈可惜題詩又不成山中即事白日荒荒過不知荼䕷開了覺春歸山家賣笋櫻桃熟河水生萍柳絮飛久雨一晴螢火出閏年三月杜鵑稀沉沉松竹烟嵐冷慙愧髙僧借袷衣峨眉山廨褐衣蔬食苦吟身肌骨雖清鬢雪新栗里未營三畝宅桃源已過一年春也知官職難癡望化得妻兒不誶貧别寫新詩寄鄉友峨眉山下獨閒人宿羅溪山鷲嶺東游霽景微碧桃花外一鶯飛樵夫不斫垂潭樹知有僧人掛搭衣二月十九日客去關門讀莊老燈花熠熠春蟲小氷雪未消雷雨來長安三月行人少兩宋名賢小集巻二百二十九
