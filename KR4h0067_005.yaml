body:
  text: 兩宋名賢小集卷五宋陳思編元陳世隆補廣平别集宋白字太素一字素臣大名人建隆二年進士甲科為翰林學士歷刑部尚書集賢學士判院事以兵部尚書致仕卒贈左僕射諡文安有廣平集一百卷宫詞一百首并序六録二十首宫中詞名家詩集有之皆誇帝室之輝華敘王遊之壯觀抉彤庭金屋之祕道龍舟鳳輦之嬉然而萬乘天高九重淵邃禁衛嚴肅乘輿至尊亦非臣子所能知所宜言也至于觀往迹以緣情採新聲而結意鼓舞升平之化揄揚嘉瑞之徴于以示針規于以續騷雅麗以有則樂而不淫則與夫瑶池粉黛之詞玉臺閨房之怨不猶愈乎是可以鏘絲簧炳緗素使陳王三閣狎客包羞漢后六宫美人傳誦者矣援筆一唱因成百篇傳今則思繼頌聲述古則庶幾風諷大雅君子其將莞然詞曰千官朝擁五門前一路春風蠟燭煙宫漏乍停班已定紫雲開處望堯天萬國車書一太平宫花無數管絃聲近臣入奏新祥瑞昨夜黃河徹底清律管飛灰報早春壽陽梅淡落香裀詞臣競進新詩入俊思無過白舍人十二樓前御栁垂九重城裏百花時宣州恰進紅絲毯便遣宫娥舞柘枝彤庭立仗雪初銷仙樂空懸宴百寮齊指終南稱萬壽逺平香案碧岧嶤樓前宣赦掣金雞大禮新成彩仗歸萬嵗聲高天地喜慶雲飛上袞龍衣飛煙縹眇拂樓臺才捲珠簾雉扇開春滿天顔兩睂喜玉關新有捷書來繡鞍新轡飾玫瑰隨駕堤邊試馬回苑蕙香輕沙路濕玉蹄粘得落花來後苑秋晴侍獵歸淡妝宫女盡戎衣數中供奉誰精熟斜勒驕驄掠草飛春雪輕輕灑露盤真珠箔外玉構欄仙妃未起宫娃小錯報西樓曉月寒春宵宫女著春綃鈴索無風自動搖晝下珠簾猧子睡紅蕉窠下對芭蕉微雲點月漢宫秋水殿疏螢黑處流鳯管不調慵進曲却排銀燭夜藏鈎竹宫春祀望神仙百和香高雜絳煙中夜上元來玉座五雲隨鳳駕珠軿天子今朝就食遲延英徴得逸人歸靈臺監裏知嘉瑞隔月先曾奏少微御製新成喜雪篇六宫傳寫滿香箋金鑾殿女曾偷和不敢將圼萬乘前金堂曲宴夜厭厭仙樂聲清御酒黏不用司宫排蠟燭海人新貢夜明簾雪梅初謝小桃芳院院鶯啼報海棠昨日司花新奉敕後園差使結丁香紅箋一幅卷明霞纎手題詩寄大家檀口微吟繞廊柱濛濛春雨濕梨花水心高殿接蘭塘才拂龍鬚一簟涼瑟瑟枕函雲母帳氷盤仙果近人香春封東嶽罷泥金羽衛還宫禁籞深昨日祥風來入律侍臣朝進五弦琴萬方琛贄泛雲濤來慶星樞電彩高宴罷樂聲移别殿對花重換赭紅袍年來春早過新豐只向宫池祭玉龍一片香雲千里雨樊川杜曲繡重重魚龍百戲閙嘈嘈戲罷珠樓日色高移入芳林排小宴赤瑛盤裏進櫻桃寒食宫中也禁煙鬱金堂北畫鞦韆梨花明月皆如雪時送清香到酒前玉管金筝入夜調今宵靈匹下青霄穿針鬬巧香煙濕樓閣層層拂彩橋殿角風琴細韻移燭臺春幸翰林時三更向盡諸宫閉猶在金鑾夜賦詩狂吟八韻送英公暫歸故鄉遷殯二親十八般書四海傳長安話别己多年今來帝里重相見轉覺師心更自然下筆入神皆得法出言成句盡通玄花時乘興先行樂月下忘機靜坐禪到處僧伽爭識面滿朝英俊贈佳篇長沙母葬彰純孝八水人思有善緣衡嶽醉投秋雨寺漢江吟渡夕陽船前期指在春三月回首東風好著鞭兩宋名賢小集卷五
