body:
  text: 兩宋名賢小集巻三百十九宋陳思編元陳世隆補抱拙小藁趙希㯝字誼父汴人寳慶間頗著詩聲與菏澤李龏相倡和龏甚推許之有抱拙小藁一巻天屋歌為盧洪賦霞扃雲牖高窿穹八荒四野垂簾櫳羲璘勃窣行西東芒芒塵世如飛蓬玉川公子乗清風飄然據作吟詩宫穿心出脅千萬語呌開閶闔驚蒼龍銀河瀉入北斗柄醉來擲下琉璃鍾仙人王喬作鄰伍憑軒共笑噓長虹旌陽㧞宅想亦在千年萬歲都鴻濛君不見阿房結綺今何許刼灰一丈漫秋雨次韻李鶴田德真寄遠長安日下浮雲生故人久作西南行漚邊兩載音訊絶鬢絲應與秋風爭蒼苔冉冉荒茅屋愁来忍把離騷讀驚鴻剛自墮邊聲碧嶂那堪遮遠目青雲高處期翺翔去人歲月今堂堂吴鈎拂拭霜雪冷龍光飛躍秋天涼思君一夜離心折東樓又送無情月道民金氏居碧港雖通邑紅塵不到門桑麻唐杜曲雞犬晉桃源山遠雲千㸃天寛月一軒居人非隱者吾欲呌東園竹閣古寺因人重清風尚可尋斜陽明晚閣老竹暗秋林兠率西歸久香山北望深登臨成感慨烟月獨知心游臨平乾洞水涸兩洞深如許神龍此奠居山空仙去久路嶮客来疎風雨千崖暗雲烟四壁虛自揩岩石蘚閒把姓名書雪不是春風桞因何絮客衫一雲同萬里半夜失千岩征馬寒蹤印飢烏凍吻緘江心一片白知有暮歸帆送詩僧隆痩岩五載京華客山中坐得牢禪心天竺石吟思浙江濤入派名隨重游方步轉高秋風吹錫逺相憶讀離騷送自牧黄監鎮之官四安桃花春浪急催上霅溪船湖海稱佳士功名負壯年政平民易感詩好客爭傳别後加餐飯因風寄一箋秋夕霄虛白露漙木葉下危闌月澹鐘聲曉燈青劍影寒人心山莽莽世事海漫漫何日塵氛净西風望眼寛中秋白露漙空萬葉飛生香渾在桂花枝一千里月正圓夜九十日秋纔半時湓浦風流元亮興鄜州牢落少陵詩不妨吟盡蟾蜍影此别分明隔歲期送李鶴田東遊後還鄉劍倚梅花鶴夢醒東遊吟骨帶秋清台山路杳神仙跡楚國書来母子情半榻烟霞應有約一笻風雪且兼程丁寧及早催行李莫待西湖草色平江湖偉觀華屋巋然占上方一尊同此寄相羊江潮翻海暮天闊湖水拍隄春草長莽莽越山凝紫翠揺揺蘇桞間青黄歸鴻影裏闌干晚囘首中州入渺茫送譙岩趙日休歸蜀烟塵渺渺暗魚鳧有客翩然赴上都乞得玉宸新翰墨要還琳宇舊規模十年蠲賦綸恩重萬里歸程劍影孤他日青城公案了紫雲深處勘陰符春雪飛下瑶天整復斜一畨餘凍損芳華荒荒月曉三千界漠漠烟寒十萬家桞外且疑先着絮梅邊渾似後開花東風吹作巴江水浩蕩龍濤赴海涯秋懐次韻雨歇空階淨緑苔西風涼氣滿樓臺鴻飛遠渚知初至燕别明年約早来秋色秪今同世態時文何意悮人才停雲影裏頻搔首閒把新吟取次裁春暮薄薄寒侵酒靣和可憐春事委流波兩堤楊桞東風老一曲池塘夜雨多花落鶯聲還在否桑空𧖟事又如何壯心不逐流年去倚劍青天發浩歌寄黄溪雲十年成遠別幾度上高樓風遞江南信雲消渭北愁春心驚海燕曉夢入溪鷗何日西忩燭相看説舊遊九日懐友江蟹初肥天欲霜暮雲紅樹寫秋光西風攜手登臨地今日黄花兩處香釣者河豚荻笋春風老鱸鱠蓴絲秋水寒多少侯門天樣闊算來何似釣船寛過臨平市井蕭條景物非居人猶號永和隄春山十里斜陽樹漠漠殘紅杜宇啼吴道士釣雲澹溪溪上一竿絲牽動閒雲片片飛折盡桞條穿不得荷衣裹向碧山歸次雪林李龏苕溪寄耒之韻雲散烟收渺渺秋蛩聲四壁起新愁西風萬里乾坤眼不到斜陽十二樓風梧聲裏萬家秋一片吟心不着愁夜半酒醒銀燭冷月移涼夢過西樓賦墨雁圖分得宿雁漠漠秋汀起晚烟半欹寒影立風前月明應有蘆花夢飛遍江湖萬里天次蕭水崖梅花韻冰姿瓊骨淨無瑕竹外溪邊處士家若使牡丹開得早有誰風雪看梅花湧月僧樓百尺闌干古櫟林亂山如浪翠痕深冰輪飛上光猶濕照破西来一片心秋夕西風梳髪冷颼颼半醉微吟獨倚樓一片舊時南浦月清光猶印别離愁半枕小忩幽夢蝶數聲何處寄書鴻闗山千里人歸晚腸斷烟林一笛風春遊夢冷繁華金谷園春深葵麥暗朱門東風日日吹花急紅雨蒼苔淚幾痕蝶懶鶯喑欲暮春更兼風雨别愁新天涯草色深如此憶得淮南有故人湖中曲長眉桞葉交青條玉花嬌面垂雲髫湖波藍色春寥寥大隄新曲干銀霄翠絲絡馬金褭騕香風隨步烟飛飄芳亭深杳傳金貂一笑嫣然輕百綃歡娱未了日晷短城鼓吚吚續復斷鳴鞭夜月入雞闗碧山皎皎水潺潺春陰曲東風吹寒雲九有凍龍迷海亂飛走雨脚斜拖入遥阜碧草浮烟滿隄口春皇妙運造化手解使江山失妍醜冷色禁持萬花桞紅紫未張春織愁愁春織心心呦呦為花訴寃天聽否晴曦赫赫重陰剖夢裏桃源拚載酒兩宋名賢小集巻三百十九
