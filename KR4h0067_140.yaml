body:
  text: 兩宋名賢小集巻一百四十宋陳思編元陳世隆補尹和靖集尹焞字彦明河南人父林官至虞部員外郎焞師事伊川以徳行聞靖康初召至京懇辭還山賜號和靖處士金人陷洛闔門被害焞死復甦避劉豫聘奔蜀止于涪紹興中召為崇政殿説書後遷禮部侍郎兼侍講所著有論語解及門人問答過种明逸故居題絶句少年妄意學經綸老矣空餘此一身面似髑髅頭似雪却来巖谷繼前塵自秦入蜀道中絶句三首緑隂深處竹籬遮也有紅花映白花却憶故鄉卿相第不及張三李四家曉来雨過槐隂潤午霽風揺麥浪寒自愧此身徒擾擾未知何處可偷安南枝北枝春事休啼鶯乳燕也含愁朝来囘首頻惆悵身過秦川最盡頭亡姑墓銘詩嗟夫人之生兮一氣凝乎混茫變而之死兮去不知其何鄉唯懿徳之在人兮愈乆而不忘歸安此室兮其千萬年無壊傷避賊至商山絶句西来㡬被雪霜埋鴻鴈嗷嗷莫强猜今朝始踏商山路髙視浮雲任去来附録挽和靖先生詩呂徳元往在伊川學他時洙泗傳從来有高第未覺䘮前賢繆列三千士於今二十年山頽與梁壊淚盡㑹稽前四海尊師席斯文特未衰何其兩楹夢遽使哲人萎閬水從容意稽山疾病時勤勤付斯道矢死奉成規垂老朝三聘生平食一簟絶知斯道在遺恨得時難廟謹先師祀書傳後代看形容銘墓石三發喟然嘆曽班朝請提宫凛凛河南已百年維公髙行繼前賢早施絳帳崇師席晚入金華侍講筵斯道未傳今逝矣彼蒼難問竟茫然囘思昨日論交地不見牙籖列簡編道直心無愧師嚴貌有威上方虚席待公怱掛冠歸王室懐元老天星掩少㣲簮紳竟相弔奚獨我心悲髙閌司業身占河南第一功力行篤信守家風淵源漫説斯文䘮深切今知此道東七日夢楹終有待三年築室恨無從嵩伊千古温淳氣收入稽山鑑影中謁和靖先生虎丘祠堂詩李道傳陵陽人涵飬當用敬進學在致知如車去隻輪跬歩不可之夫子受師説惟敬實所持升堂逺易簀參倚日在斯遺言落人間取論極研幾是心要收斂中不容毫釐大學著明法格物乃階梯放心苟不收窮格將安為古人貴為已末習多外馳豈無實踐者兹焉當孰歸晚生拜遺像敷袵跪陳詞願言予服膺没齒終不渝兩宋名賢小集巻一百四十
