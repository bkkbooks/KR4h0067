body:
  text: 兩宋名賢小集卷一百二十一宋陳思編元陳世隆補慶湖集卷中冬夜寓直庚申十月滏陽賦落月半侵屋蛩聲寒到牀羇人不堪此夢後夜仍長結衣出庭户河漢正蒼凉浮陰暝四野來雁不知行陳物悲暮節畏途懷故鄉十年泥滓賤馳驅厭路傍豈不志事功鬢毛攬朝霜素尚竟誰許行歌追楚狂冠氏送武欽之安陽黄金絡征轡之子待明發樽酒少遲留禪林見凉月歌鬟結蛾黛怨此佳期濶去去栁堤風青蟬催白髪寄杜邯鄲余寓居魏之冠氏杜仲觀以詩相招屬大河北徙莫知其津竟不果赴但賦此答之窮巷厭多雨頹垣藜藿生蜩螗飽風露晏景一何清坐指嵗芳歇羈人心骨驚所懷不可見東州聞政聲三年但絃歌百里稱神明風月動髙興詩章時一鳴天葩落健筆直與春工爭渾河失故渠怒水方縱横難慿束葦濟跬步萬里程夢想不知逺笑談何可并賴有西飛翰尺紙緘馳情除夜歎京師賦示周沆壯髪忽種種年華今復窮客懷少安適況乃京塵中病肺厭斟酌疲筋謝過從閒坊税老屋車馬無來蹤日俸纔百錢鹽􅐽猶不供夜榻覆龍具晨炊熏馬通出門欲貸乞羞汗難為容安得一扁舟浮家乘興東江山比深隠終老為田翁春秧二頃苗秋穫期百鍾稚子課樵汲壯妻兼織舂行歌滄浪清卧快柴桑風神明養内觀憂患無旁攻有客聞此言誚余何不衷兹行果勇決誰攬㝠㝠鴻安知禄籍間去就如樊籠㣲尚良自信所悲君不同寄杜仲觀中春雨收霽與子登叢臺形勝宛然在太行西北來無情百尺土千載未摧頹四顧發悲嘯凄風振頥頦凌髙氣象變似不容徘徊下出破禪刹斷碑生紫苔嚴公賦懷古復使後人哀西㝷王氏園一徑趨城隈老竹未萌笋繁花如雪開惠然美少年逸躅欣攀陪小謝羅醼豆開簾按俳詼招呼縹緲人晚鏡摧糚梅水調唱金縷雲罍浮玉醅傾腸敢惜醉忘著接䍦回明日遂分首舊遊安在哉西風吹去雁尺紙為君裁謝米雍丘元章見過今古兩妙令雍丘與太丘當時稱道廣後日想風流吏鼾庭陰午農歌野色秋吾非荀氏老愧爾徳星留龜山晚泊春候半寒温維舟淮上村長林補山罅青草際潮痕久厭浮家役重招去國魂禪房欲舒寫煙雨促黄昏舟發金陵望歴陽作尚識歴陽道依然西照間風煙古磧戍林麓楚王山隔水一凝佇當年數往還誰知躍馬客衰病再投閒郎官湖按李白詩序云乾元嵗流夜郎遇故人尚書郎張謂使夏口沔州杜太守漢陽王令觴于江城之南湖張公四望超然請白標之嘉名白因號之郎官湖席上文士輔翼岑靖以為知言今所謂郎官湖者占郡城之北束手於两山間縱廣百許歩固不足四望而超然也已知其非是且郡南瀕江之人持南唐時地券尚指郎官湖為鄰葢湖為江水所并而去城里餘猶有洲渚隠然未泯乃湖之故防也余丙子五月舟次沔陽求訪遺老始得其詳因賦此詩志之當年賢守令載酒沔南遊凉月呈新霽明湖涵素秋郎官夏口使仙客夜郎囚促膝青螭舫連觴紫綺裘髙驩隨雨散餘躅想風流芳草失青履滄波浮白鷗江吞百頃盡石刻一篇留宜有沈碑者前懷陵谷憂題寶泉官舍壁寶泉監在夏郡城東三里黄鵠山之陰偶著强名字非才但鑄金不妨稱外監況復住山陰勝日聊披卷清風故解衿餘生偷禄隠何者是升沈江夏寓興風與檣烏便儂先塞雁來山經七澤斷潮自九江回漁父猶知隠騷人枉衒才朋遊正相逺梅信為誰開雨晴西郊寓目城中厭雨過清和偶出西郊野意多蠶簇趁晴初摘繭麥場經潤欲生蛾營巢黄鳥啼深樹引犢青牛飲暮河老圃念人留佇久挽衣沽酒願相過寄周文清周時流寓海陵丁已八月趙郡賦節物驚心不我留故人相望海邊州芰荷老盡池臺晚鴻雁來多雲漢秋誰共清樽尋樂事獨將長幅寫離憂明年芳草青門道好試青衫伴俠遊冠氏寺居書懷古刹荒凉晝掩門鳴雞吠犬接西村窻前自記曽歸夢樓外誰招欲斷魂漫賦新詩題琬琰少逢佳客佩蘭蓀更堪愁肺經春病負爾商歌酒一樽題彭城張氏放鶴亭亭有石刻蘇睂山製文唐之陽春亭故址在徐城之東薛能尚書有詩見集中壬戌九月賦曽見君家亭上碑東望風月動閒思昔曽卜築如相待今遂登臨是不期萬頃白雲山缺處一庭黄葉雨來時許昌應負重泉恨當日陽春枉賦詩臨汳亭送客還馬上作衮衮塵埃與願違可堪持酒送將歸壯心已服駑駘老羈思常先朔雁飛十口無厭太倉粟四鄰分采故山薇何時偃卧柴桑里自訟淵明昨日非病後登快哉亭經雨清蟬得意鳴征塵斷處見歸程病來把酒不知厭夢後倚樓無限情鴉帶斜陽投古刹草將野色入荒城故園又負黄昏約但覺秋風髪上生送李宗古録事謝病南歸十旬病免謝雞羣收得閒身付白雲南浦少留離别賦北山相負勒移文松舟桂檝曉將發菰葉鱸魚秋未分異日有懷長笑客西飛燕子一相聞題永城縣園水亭詰曲池塘碧玉流禊亭孤占小汀洲長紉座上芳蘭珮不繫簷前畫鷁舟好泛羽觴修舊事為書繭紙記清遊季真待得東還日初見紅蕖十畝秋罷大匠屬為淮南行何處經行特惘然津頭曽送木蘭船桃花春水生前夜楊栁秋風憶故年驛路尺書疑斷絶官倉斗米愧留連飄颻復作江湖計後此長安是日邊同王克慎宿清凉寺兼示和上人六代風流不可尋石頭勝㮣古猶今疎鐘答饗江山迥野鳥忘機松竹深借問白雲誰卜築擬要明月共登臨終投逸少興公社蔬粥麻衣事道林與張歴陽追懷從禽之樂因賦宜秋門外養鷹坊好草陂頭射雉場油幕氊廬張野飲錦袍貂帽結絨裝興䦨落日黄塵斷夢後西風白髪長誰念江湖獨流寓此情難話與漁郎歴陽姥磯下馬上有懷京都遊好楚澤初冬正穫田孤鴻欲下却飜然人烟隠約青山郭雲物離披小雪天送别盃盤猶昨日勞生鞍馬遂窮年故人多在金閨籍誰念心如寸斷絃烏江東鄉往還馬上作黄塵隨馬染征衣十里江臯送客暉廢井草荒鼃黽怒下田沙漲芋魁肥解纓拂樹弄清淺横榻掃雲飛翠㣲人生事事不如意終日念歸何日歸題定山寺法逺上人壁支郎風味喜相親乘興來尋雪後春夾徑竹陰疑礙馬隔江山色似招人豈無暇日容髙卧如有閒田願卜隣預約東城二三子嵗時相過莫辭頻宿芥塘佛祠壁間得魏湘畢平仲張士宗回所留字皆吾故人也庚午三月賦青青䵃麥欲抽芒浩蕩東風晚更狂㣲徑斷橋尋古寺短籬髙樹隔横塘開門未掃楊花雨待曉先燒栢子香底許暫忘行役倦故人題字滿長廊上已晚泊龜山作薄暮東風不滿帆遲遲未忍去淮南故園猶在北山北佳節可憐三月三蘭葉自供遊女佩芸編聊對故人談洛橋車騎相望客曽為吳兒幾許慙寄清凉和上人南國風流百不存石頭今是給孤園山連雉堞斜侵路潮送漁舟自到門方丈定容居士病貝多應待客兒翻懸知後日逢迎際桃李春風兩不言潘豳老出十數詩皆有懷蘇儋州者因賦人煙寂絶鬼門闗更指儋州杳莽間三四月交天漏雨東南地盡水浮山依迷春草鴒原失響像秋風鶴馭還回羡河陽賢父子雪堂曽伴十年閒答致仕吳朝請潛登黄鶴樓見招城隅黄鶴莫登臨端使悲翁動楚吟日下長安人共逺天圍夢澤嵗方陰北風欲雪雁飛急南渚始冰魚伏深誰似草堂安穏客下帷隠几不求心二月二日席上賦仲宣何遽向荆州謝惠連須更少留二日舊傳挑菜節一杯聊解負薪憂向人草樹有佳色帶郭江山皆勝遊載酒賦詩從此始他年耆老話風流髙郵舟中對雪天涯晚嵗客無歡擁鼻㣲吟行路難三楚浮程波淼淼五陵歸夢雪漫漫園授簡心猶壯剡曲拏舟興久闌病骨支離仍禁酒漁蓑重緝待春寒廣陵茱萸灣晚泊冷雲抛雪未成花過埭東風凍著沙荻浦漁歸初下雁楓橋市散只啼鴉舊聞南國饒春事行見東風換物華老病心情亦何有藥囊詩卷是生涯清燕堂雀聲嘖嘖燕飛飛在得殘紅一兩枝睡思乍來還乍去日長披卷下簾時初見白髪示内安能屈指計封侯西日東風見白頭信是色身非我有若論身外更悠悠西城馬上燭冷塵消過上元晴明風日栁初繁偷閒偶出西城陌喜見青山似故園再遊西城栁條破眼已堪攀鷺下城隅水一灣後日重來寒食近杏花林外見青山晚泊㑹亭此日苻離復捨舟馬蹄塵土入徐州只應明月曽相識伴我時登燕子樓楊栁枝詞楊栁東風盡日吹柔條應自不禁持都門三月傷心地强半青青贈别離汴下晚歸隋渠經雪已流冰乘興東遊恐未能試問何人知夜永一樽相伴小窻燈過曹氏園馬上作香風細細出重墻不見繁枝已斷腸知有何人卷簾箔卧看零落滿斜陽重賦京居暮感興怒風狂雨信悠悠收拾春華不少留秪有栁綿吹未盡墻陰落泊伴人愁兩宋名賢小集卷一百二十一
