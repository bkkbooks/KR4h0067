body:
  text: 兩宋名賢小集卷二百三十六宋陳思編元陳世隆補介軒詩集趙汝談字履常號南塘太宗八世孫居餘杭淳熙十一年進士纍官至西外中正理宗時歷給事中權刑部尚書卒諡文懿南湖每憶西湖上青簾舊作蓮非賣酒亭栁條魚頰翠花片馬蹄馨寒食經行路晴窗入夢屏因循春又晚風絮攪空冥靈谷靈谷神仙宅言歸肆目新山光逺如畫秋色老于人世事棊爭劫人心海變塵功成思范蠡湖上一間身翠蛟亭和鞏豐韻幽亭枕蒼峽雲竇通曲水百折如建瓴㶁㶁鳴不止客來一抽鑰白霧噀岩底歘翕千丈蛟拏空翠濤起天開混沌竅日洗盤古髓諒匪畜池鱗多應化雷尾馮陵氣易壯怖蕩辭難侈日假金洞光景逾瑶池泚誰云逰方外巧異淄塵裏坡仙頗年數覿面猶尺咫采句貴自然鞏言良是已琁題豁靈界篆出蕃君里物生亦倚數有形必有靡道人亦多事浮念何時死余生嗜泉藪痼習牽研几太息動靜機于何寄真理醉倒和滄浪煩君更詳此附趙彥假和詩天下名洞天有山必有水餘杭山水窟神仙所棲止仙人乘雲去玉蛟留潭底至今雷雨夕蛟睡時驚起爪劈巖石裂石罅滴乳髓涓涓泉流出半垂白鳯尾風來琴築響月照纓絡侈曲折納深池徹底清且泚築亭當澗衝木石相表裏翠壁潤含煙層峯去天咫道人幻出奇指顧猶未已忽驅蛟走鬬瞬息八百里怒氣挾奔霆草木為披靡兒童驚振掉面若稿灰死達人本大觀談笑自隱几須臾羣動息靜坐窮物理水石本無心相激一至此附趙汝讜和詩衆峯抱蒼龍蛟屈翠蛟水放之兩崖間奔洶不得止濤瀾生席上雷雹轉石底恍疑天柱搖將拔陰洞起蘇公雄氣壓詩骨得仙髓指麾驅鯤鯨赫變動其尾紛紛下土人蟻蛭自封侈聚觀目精眩筆墜汗流泚坐令空谷嘯聲徹霄漢裏君來松根吟仙者相去咫老蛟破鎖去餘怒猶未已決開澗千丈散作霧五里今年溪湖乾草莽生意靡寸泉落山苗靈鑰起垂死遺吾雲子飯報汝青玉几野人尋泉竇筒壞方復理泓然山巔池冬夏常若此逰洞霄宫好間謝塵事來作名山逰策杖西澗曲乞漿東家丘大滌古洞天仙人此藏修至今翠箬下半夜丹光浮山中舊相識置酒為淹留日移雲窗午水滴空牀秋授我長生方揮麈談玄幽我髮亦已白赤霄莽何求業緣苦未斷一笑風引舟回首青天長身名兩悠悠翠蛟亭我生宿有山水癖乘風直到匡廬脊匡廬之水懸百仞天下谷簾名第一尋幽偶訪大滌洞絶壁飛流動寒碧忽如翠蛟出亂壑勢與廬匡亦相較敲空倒影搖寒星却疑夜半銀河傾大滌山洞霄宫此亭此水幾徘徊舊觀今新老眼開行險不盈還一笑窮源未得且頻來湯年間亦旱禱雨禹步乃能冬起雷戲語聊貽道門舊髙明了後復何猜環錦亭在臨安縣余氏園與子鄉鄰信有年故王遺事到今傳爽鳩邑改風煙在散騎園分水竹偏髙架插書供夜讀滿堂戲綵敵春妍相如可是區區者戲筆題詩亦偶然兩宋名賢小集卷二百三十六
