body:
  text: 兩宋名賢小集巻八十五宋陳思編元陳世隆補無為子小集楊傑字次公無為人也少有名於時舉進士元豐中官太常者連數任一時禮文之事傑與討論嘗奏請四后升袝以為孝惠賀后淑徳尹后章懐潘后皆祖宗首納之后而孝章宋后嘗母儀天下升祔之禮久而未講謂宜因慈聖光獻崇配之日升四后神主祔於祖宗祏室斷天下之大疑正宗廟之大法由是四后始得升祔元祐中為禮部員外郎出知潤州除兩浙提㸃刑獄卒年七十傑自號無為子有文集十五巻行於世題吹衣亭馬上衣彩涴塵土歛板權門腰傴僂冷風天上呼不來厚顔如甲汗如雨星郎髙韻凌雲煙天籟喚歸酌流泉人間熱惱醺不到亭上鶴衣飄欲仙君方醉樂人愁絶何如御此登天闕叩天借取衣上風吹下九州作春色勿去艸勿去艸艸無惡若此世俗俗浮薄君不見長安公卿家公卿盛時客如麻公卿去後門無車惟有芳艸年年加又不見千里萬里江湖濵觸目萋萋無故人惟有芳艸隨車輪一日還舊居門前艸先除艸於主人實無負主人於艸宜何如勿去艸艸無惡若此世俗俗浮薄二妃廟黄陵二妃廟客過動愁顔湘水有時盡帝車何日還血斑千畝竹魂斷九嶷山欲問蒼梧事白雲生棟間贈傳神歐陽价國手曽煩寫幾回無人髣髴醉顔開青銅鑑裏尋常見不謂今從筆下來玉泉白雲山下泉幾年石中韞但見玉色明孰能究其本西山仙蹟巖功鍊三千滿手持白玉珪出塵舉天步踏石上雲梯物外蹤長在人間路自迷只因從此去曽過越王溪玉隆萬夀宫竹標溪澗蠲民瘼劍擊蛟龍救水災四十日升金闕去半千年後玉函開丹藏井底人難得栢䕃壇心手自栽一叚彩雲天外至山翁疑是錦堆來梅壇天下人心愛至公天心還與世人同自生羽翼三清去不獨丹砂九轉功漢代變名逰越國道家遺像並蕭公石壇正是飛昇處老鶴一聲松檜風今古錙銖較是非不依仙域欲何依三千世界紅塵滿十二真人白日飛新塜但驚生野艸短笻誰解扣巖扉逰山須得潘居士尋徧雲泉始得歸雙泉南泉甘滑北泉清竹引潺湲遶殿楹分𣲖銅龍穿石過兩泓寒月隔堂明金沙自是藏金穴玉馬長遺噴玉聲曽倚欄杆一欹枕夢回疑不在重城施肩吾書堂玉京髙謝黄金榜石室來乘白鹿車山後暗通天寶洞眼前便是地仙家時聞清夜雪中犬回視紅塵井底蛙五百年前人未死芭蕉源上鎖煙霞靈山繁川靈鷲山山頂駕老屋初從曲徑登叠石盤巖腹景逐軒楹轉雲烟炫逰目憶昔心上人欲往怯洄洑前人漲白沙環流作平陸昨夜暑雨暴髙低或成谷感物鑒江水江水清可掬莫驚秋霜飛能换髩邉緑我有紫陽丹晶明大如粟服之能長生千載一時轂凌歊臺大明七年暮冬月宋武南巡立雙闕鑾輿先幸凌歊臺雲中簫鼓轟春雷六龍一去杳無迹山花野艸空相憶翠羽鳴鞭來不來景陵芳艸年年碧碧霄峰巖深映碧蘿金鬛弄寒波莫念江湖好江湖風浪多謝公約惠墨竹圖幽人噴墨冩成竹變化琅玕作元玉公約贈我兩大幅不比丹青尺艸木六月都城苦炎燠車馬紛紛正馳逐曲臺官冷晝掩闗浄掃虚堂展霜軸簾間忽有㣲風來不動纎枝清滿屋憶得扁舟載雪時曽寄㑹稽江上宿横望山陶家舊宅寄山坳七百年前此結􅛄太尉雙碑遺字晦先生五井暗泉交野僧拂石為牀坐童子穿氷作磬敲巖下清音誰解聴古聲長在老松梢金地院大厯年中茅結宇禪翁瓶錫久曽留飛泉堂下雨長滴偃石道傍雲不收野鳥歸來羣木晚老猿啼罷一山秋世人多事頭多白底事情閒亦白頭逰北山今古忙忙利禄閒幾人能此扣松闗猿驚鶴怨不知處虎踞龍蟠空見山芳艸路隨流水逺老僧心共白雲閒淮南舊隠抛離久一誦移文一媿顔廬山五笑之一我笑陶彭澤聞鐘暗皺睂籃輿急回去已是出山遲仙都山有路入仙都何人到鼎湖秋風夜來急吹落碧蓮無題老子出闗圖贈錢穆父待制秘藏函谷闗中子将獻蓬萊閣上仙願得鬚眉如此老却教龜鶴羨長年吳興明月樓時為吳興太守江南地暖少嚴風九月炎凉正得中溪上玉樓樓上月清光合作水晶宫静隠寺五嶺碧崔嵬雲深隔世埃寺從梁氏建僧自梵天來錫井三泉迸松門十里開如今渡江者見説不浮杯書寶山寺壁片帆曽渡謝家洲屈指于今十九秋沙鳥重歸迷戰島釣磯空在憶浮健蒼顔白髪生新感疎竹清風伴雋逰借問蓬萊江上月停杯還記故人不秀溪寒食十里喧闐錦繡川鞦韆人健趂飛鳶花明栁暗丹青國薄日濃雲水墨天逰女踐成芳艸徑畫船衝散碧溪煙武陵漫説桃源好屈指如今幾百年龍鼻井漏盡雞號厭夜行年來小器溢瓶甖棄官縱未歸東海罷郡猶能作水衡幻色将空眼先暗勝逰無礙脚殊輕空煩逺致龍淵水寜復臨池似伯英咏南山諸勝風篁嶺㣲風揺琅玕蕭瑟嶺一道萬帚掃晴空纎塵不可到龍井崖下一泓泉窈奥不可測有時靈氣生散作人間澤歸隠橋道人從此歸影不入㕓市端坐笑浮雲往來太多事滌心沼縱有狂風生未嘗險浪起何當招世人來此鑒清泚獅子峯岩風壯威猛晴雷隠哮吼無心露爪牙百獸自奔走薩埵石解虎錫常閒飼虎石常在亡軀度有情清風幾千載潮音堂潮來音普聞潮平音亦歇孰若此山堂潮音未嘗絶訥齊天道竟何言四序自流轉廼知毗耶翁雖黙真大辨冲泉不汲泉不盈愈汲泉愈清湛然有常徳隨氣利羣生寂室白雲隔塵喧虚堂太岑寂寒盡春自來鶯啼報消息照閣幽人無適莫乘興登髙閣夜月鎖雲林春花繡巖壑閒堂趙公歸休年訪師翠㣲間始知浮世上白日兩人閒方圓菴地方不中矩天圓不中規方圓菴裏叟髙趣有誰知逰大滌山大滌洞天玉為室真官典校長生籍青山九鎖閟仙源老盡碧桃人不識祖龍求仙徒用力駕海欲驅山下石神人倚柱不與行㽞得巖前隠山迹和程大卿雨中登物華樓澤國連朝雨春山半夜雷登樓寒食近隔岸畫屏開沙鳥飛還止漁舟去復來年年南浦艸相伴緑波迴玉晨觀左紐檜華陽山裏千株檜玉晨殿前一左紐虬枝龍榦向朝曦勢與搏桑鬬長久亳州渦水大清宫老子手植才數九一檜正與此樹同蒂固根深應不朽信知福地有靈木栽種曽經上真手君不見龍從火裏出虎向水中生生理尚左不尚右又不見天輪左旋不休止日月五星如磨蟻左紐檜藴至理上士體之能不死題陳令壁地勝華胥國風清令尹家酒闌寒食夜月上海棠花徐賢亭偶成湖外青山在湖邉人不歸古今無問處幽鳥下漁磯送陳令歸無為楚水漾輕碧楚花飛亂紅故人故鄉去半雨半晴中野寺澤國春風老襍花間芳艸門前車馬稀竹葉無人掃滴滴泉巖谷連天嶺杉松徹象山路從雲外入人自海邉還遥碧亭幽鳥無心去又還迢迢湖水出東闗暮雲㽞戀不飛動添得一重山外山太白桃花潭桃花潭似武陵溪太白仙舟去路迷岸上踏歌人不見年年空有鷓鴣啼逰白雲山醉題僧壁買得青山不用錢金沙門外草綿綿黄梅老令醉欲倒擬借白雲今夜眠山房枕上作十里溪源尋未見忽逢茅屋白雲堆竹牀紙帳睡心穏無奈野猿驚覺來天台三賢堂豐干從來清浄土鼎足聖賢聚騎虎歸故鄉世人猶未悟寒山家住天台寺雲巖萬丈潭本來人不識饒舌是豐年拾得拾得元無姓山前拾得來常攜一敝箒不是掃塵埃妙蓮閣天台有新閣勝地近塔廟影浸碧琉璃沿洄去山嶠蓮生汚泥中白日有明竅花實相表裏光色互炳曜處空不染水烈火豈其燎寶藏諸如來端坐演法要青目付上士不待舉花笑芬香初洞達宿病已能療净土記珍色機感願力召三時有開發一本常寂照不讀智者書豈知此蓮妙琉璃軒在諸暨上省院西軒一泓水瑩淨碧琉璃天人舉目視中有魚龍知不知瑞竹悟老種蓮東林聞説好林泉社㑹荒涼幾百年靈物孰知崔氏竹方池新種逺公蓮華嚴頓浄三千界廬阜重招十八賢應笑陶潛又歸去白雲幽鳥伴歸田禪月真堂童子依師蘭水濵聲名真是碧雲人定中傳得阿羅漢十六身中第幾身崔仲岳隠居松江以丹白黒飾舟曰鶴舟括蒼周子韶無為楊次公治平三年夏六月㑹仲岳於繁昌蓬萊亭勉其罷鶴舟以應書席上聫句送之且就飛龍牓休登白鶴舟子韶隴書方勸駕閬苑莫回頭次公丹頂歸滄海霜翎擲素秋子韶海鵬期變化仙驥任沈浮次公煙月閒三島功名重五侯須知馳鳯詔便是釣鰲鈎子韶已得衝天便無思擊漿逰次公楚醪鏗逸韻湘瑟助㝠搜南浦成春别北山空夜愁九臯聞象魏一葉寄汀洲次公世氣騎風虎機心走海鷗子韶昔年嗟鶂過今日並麟逰次公八月仙槎駛千齡聖運優市朝真大隠箕潁漫清流子韶鼓枻嗤漁父乘槎笑仲由片帆從此巻舊氅亦應留次公冠佩重華國鶯花四皓樓雄文髙雁塔大醉憶蓬丘子韶勲若書青史幢須建碧油蘭橈好重舉乘取上揚州次公兩宋名賢小集巻八十五
