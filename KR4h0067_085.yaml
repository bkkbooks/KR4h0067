body:
  text: 兩宋名賢小集卷八十五宋陳思編元陳世隆補無為子小集楊傑字次公無為人也少有名於時舉進士元豐中官太常者連數任一時禮文之事傑與討論嘗奏請四后升袝以為孝惠賀后淑德尹后章懷潘后皆祖宗首納之后而孝章宋后嘗母儀天下升祔之禮久而未講謂宜因慈聖光獻崇配之日升四后神主祔於祖宗祏室斷天下之大疑正宗廟之大法由是四后始得升祔元祐中為禮部員外郎出知潤州除兩浙提點刑獄卒年七十傑自號無為子有文集十五卷行於世題吹衣亭馬上衣彩涴塵土斂板權門腰傴僂冷風天上呼不來厚顔如甲汗如雨星郎髙韻凌雲煙天籟喚歸酌流泉人間熱惱醺不到亭上鶴衣飄欲仙君方醉樂人愁絶何如御此登天闕叩天借取衣上風吹下九州作春色勿去草勿去草草無惡若此世俗俗浮薄君不見長安公卿家公卿盛時客如麻公卿去後門無車惟有芳草年年加又不見千里萬里江湖濵觸目萋萋無故人惟有芳草隨車輪一日還舊居門前草先除草於主人實無負主人於草宜何如勿去草草無惡若此世俗俗浮薄二妃廟黃陵二妃廟客過動愁顔湘水有時盡帝車何日還血斑千畝竹魂斷九嶷山欲問蒼梧事白雲生棟間贈傳神歐陽價國手曽煩寫幾回無人髣佛醉顔開青銅鑑裏尋常見不謂今從筆下來玉泉白雲山下泉幾年石中韞但見玉色明孰能究其本西山仙迹巖功鍊三千滿手持白玉圭出塵舉天步踏石上雲梯物外蹤長在人間路自迷只因從此去曽過越王溪玉隆萬夀宫竹標溪澗蠲民瘼劍擊蛟龍救水災四十日升金闕去半千年後玉函開丹藏井底人難得柏蔭壇心手自栽一假彩雲天外至山翁疑是錦堆來梅壇天下人心愛至公天心還與世人同自生羽翼三清去不獨丹砂九轉功漢代變名逰越國道家遺像並蕭公石壇正是飛升處老鶴一聲松檜風今古錙銖較是非不依仙域欲何依三千世界紅塵滿十二真人白日飛新塜但驚生野草短笻誰解扣巖扉逰山須得潘居士尋遍雲泉始得歸雙泉南泉甘滑北泉清竹引潺湲繞殿楹分𣲖銅龍穿石過兩泓寒月隔堂明金沙自是藏金穴玉馬長遺噴玉聲曽倚欄杆一欹枕夢回疑不在重城施肩吾書堂玉京髙謝黃金榜石室來乘白鹿車山後暗通天寶洞眼前便是地仙家時聞清夜雪中犬回視紅塵井底蛙五百年前人未死芭蕉源上鎖煙霞靈山繁川靈鷲山山頂駕老屋初從曲徑登疊石盤巖腹景逐軒楹轉雲煙炫逰目憶昔心上人欲往怯洄洑前人漲白沙環流作平陸昨夜暑雨暴髙低或成谷感物鑒江水江水清可掬莫驚秋霜飛能换鬢邉緑我有紫陽丹晶明大如粟服之能長生千載一時轂凌歊臺大明七年暮冬月宋武南巡立雙闕鑾輿先幸凌歊臺雲中簫鼓轟春雷六龍一去杳無迹山花野草空相憶翠羽鳴鞭來不來景陵芳草年年碧碧霄峰巖深映碧蘿金鬛弄寒波莫念江湖好江湖風浪多謝公約惠墨竹圖幽人噴墨寫成竹變化琅玕作元玉公約贈我兩大幅不比丹青尺草木六月都城苦炎燠車馬紛紛正馳逐曲臺官冷晝掩關淨掃虛堂展霜軸簾間忽有微風來不動纎枝清滿屋憶得扁舟載雪時曽寄會稽江上宿橫望山陶家舊宅寄山坳七百年前此結􅛄太尉雙碑遺字晦先生五井暗泉交野僧拂石為牀坐童子穿氷作磬敲巖下清音誰解聽古聲長在老松梢金地院大厯年中茅結宇禪翁瓶錫久曽留飛泉堂下雨長滴偃石道傍雲不收野鳥歸來羣木晚老猿啼罷一山秋世人多事頭多白底事情間亦白頭逰北山今古忙忙利祿間幾人能此扣松關猿驚鶴怨不知處虎踞龍蟠空見山芳草路隨流水逺老僧心共白雲間淮南舊隱拋離久一誦移文一愧顔廬山五笑之一我笑陶彭澤聞鐘暗皺睂籃輿急回去已是出山遲仙都山有路入仙都何人到鼎湖秋風夜來急吹落碧蓮無題老子出關圖贈錢穆父待制祕藏函谷關中子將獻蓬萊閣上仙願得鬚眉如此老却教龜鶴羡長年吳興明月樓時為吳興太守江南地暖少嚴風九月炎涼正得中溪上玉樓樓上月清光合作水晶宫靜隱寺五嶺碧崔嵬雲深隔世埃寺從梁氏建僧自梵天來錫井三泉迸松門十里開如今渡江者見説不浮杯書寶山寺壁片帆曽渡謝家洲屈指于今十九秋沙鳥重歸迷戰島釣磯空在憶浮健蒼顔白髮生新感疏竹清風伴雋逰借問蓬萊江上月停杯還記故人不秀溪寒食十里喧闐錦繡川鞦韆人健趂飛鳶花明栁暗丹青國薄日濃雲水墨天逰女踐成芳草徑畫船衝散碧溪煙武陵漫説桃源好屈指如今幾百年龍鼻井漏盡雞號厭夜行年來小器溢瓶罌棄官縱未歸東海罷郡猶能作水衡幻色將空眼先暗勝逰無礙腳殊輕空煩逺致龍淵水寧復臨池似伯英咏南山諸勝風篁嶺微風搖琅玕蕭瑟嶺一道萬帚掃晴空纎塵不可到龍井崖下一泓泉窈奧不可測有時靈氣生散作人間澤歸隱橋道人從此歸影不入㕓市端坐笑浮雲往來太多事滌心沼縱有狂風生未嘗險浪起何當招世人來此鑒清泚獅子峯岩風壯威猛晴雷隱哮吼無心露爪牙百獸自奔走薩埵石解虎錫常間飼虎石常在亡軀度有情清風幾千載潮音堂潮來音普聞潮平音亦歇孰若此山堂潮音未嘗絶訥齊天道竟何言四序自流轉乃知毗耶翁雖默真大辨沖泉不汲泉不盈愈汲泉愈清湛然有常德隨氣利羣生寂室白雲隔塵喧虛堂太岑寂寒盡春自來鶯啼報消息照閣幽人無適莫乘興登髙閣夜月鎖雲林春花繡巖壑間堂趙公歸休年訪師翠微間始知浮世上白日兩人間方圓菴地方不中矩天圓不中規方圓菴裏叟髙趣有誰知逰大滌山大滌洞天玉為室真官典校長生籍青山九鎖閟仙源老盡碧桃人不識祖龍求仙徒用力駕海欲驅山下石神人倚柱不與行留得巖前隱山迹和程大卿雨中登物華樓澤國連朝雨春山半夜雷登樓寒食近隔岸畫屏開沙鳥飛還止漁舟去復來年年南浦草相伴緑波回玉晨觀左紐檜華陽山裏千株檜玉晨殿前一左紐虬枝龍幹向朝曦勢與搏桑鬬長久亳州渦水大清宫老子手植才數九一檜正與此樹同蒂固根深應不朽信知福地有靈木栽種曽經上真手君不見龍從火裏出虎向水中生生理尚左不尚右又不見天輪左旋不休止日月五星如磨蟻左紐檜藴至理上士體之能不死題陳令壁地勝華胥國風清令尹家酒闌寒食夜月上海棠花徐賢亭偶成湖外青山在湖邉人不歸古今無問處幽鳥下漁磯送陳令歸無為楚水漾輕碧楚花飛亂紅故人故鄉去半雨半晴中野寺澤國春風老雜花間芳草門前車馬稀竹葉無人掃滴滴泉巖谷連天嶺杉松徹象山路從雲外入人自海邉還遙碧亭幽鳥無心去又還迢迢湖水出東關暮雲留戀不飛動添得一重山外山太白桃花潭桃花潭似武陵溪太白仙舟去路迷岸上踏歌人不見年年空有鷓鴣啼逰白雲山醉題僧壁買得青山不用錢金沙門外草綿綿黃梅老令醉欲倒擬借白雲今夜眠山房枕上作十里溪源尋未見忽逢茅屋白雲堆竹牀紙帳睡心穩無奈野猿驚覺來天台三賢堂豐干從來清淨土鼎足聖賢聚騎虎歸故鄉世人猶未悟寒山家住天台寺雲巖萬丈潭本來人不識饒舌是豐年拾得拾得元無姓山前拾得來常攜一敝帚不是掃塵埃妙蓮閣天台有新閣勝地近塔廟影浸碧琉璃沿洄去山嶠蓮生汚泥中白日有明竅花實相表裏光色互炳曜處空不染水烈火豈其燎寶藏諸如來端坐演法要青目付上士不待舉花笑芬香初洞達宿病已能療淨土記珍色機感願力召三時有開發一本常寂照不讀智者書豈知此蓮妙琉璃軒在諸暨上省院西軒一泓水瑩淨碧琉璃天人舉目視中有魚龍知不知瑞竹悟老種蓮東林聞説好林泉社會荒涼幾百年靈物孰知崔氏竹方池新種逺公蓮華嚴頓淨三千界廬阜重招十八賢應笑陶潛又歸去白雲幽鳥伴歸田禪月真堂童子依師蘭水濵聲名真是碧雲人定中傳得阿羅漢十六身中第幾身崔仲嶽隱居松江以丹白黑飾舟曰鶴舟括蒼周子韶無為楊次公治平三年夏六月會仲嶽於繁昌蓬萊亭勉其罷鶴舟以應書席上聫句送之且就飛龍榜休登白鶴舟子韶隴書方勸駕閬苑莫回頭次公丹頂歸滄海霜翎擲素秋子韶海鵬期變化仙驥任沈浮次公煙月間三島功名重五侯須知馳鳯詔便是釣鰲鈎子韶已得衝天便無思擊漿逰次公楚醪鏗逸韻湘瑟助冥搜南浦成春别北山空夜愁九臯聞象魏一葉寄汀洲次公世氣騎風虎機心走海鷗子韶昔年嗟鶂過今日並麟逰次公八月仙槎駛千齡聖運優市朝真大隱箕潁漫清流子韶鼓枻嗤漁父乘槎笑仲由片帆從此卷舊氅亦應留次公冠佩重華國鶯花四皓樓雄文髙雁塔大醉憶蓬丘子韶勳若書青史幢須建碧油蘭橈好重舉乘取上揚州次公兩宋名賢小集卷八十五
