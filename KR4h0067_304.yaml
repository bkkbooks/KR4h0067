body:
  text: 兩宋名賢小集卷三百四宋陳思編元陳世隆補學詩初藁王同祖字與之號花洲金華人淳祐中建康府通判次改添差沿江制置司機宜文字有學詩初集京城元夕以下係丙申作鼓吹喧喧月色新天街燈火夜通晨玉皇不賜傳柑宴散與千門萬户春湖上長安三月又三日繡轂狨鞍富貴家笙鼓喧天蘭棹穩賣花聲裏夕陽斜偶出城來日未西百花叢底草凄凄遊人過盡歸來晚行遍蘇公十里堤送客千金難買是心知誰遣相新又語違楊栁若知行客恨不教飛絮撲春衣太乙宫即事金殿重重閉不開盤窠蒼柏兩行栽角門東畔瞻宸几仙杖曽迎翠輦來緑隂密處著危亭佳氣蔥蔥王武林一片紅塵飛不入杜鵑啼處白雲深山後有亭乃武林山夜步內門靜夜孤燈人未眠等間行過內門前一聲唱徹連珠喏皇城夜間唱連珠喏碧月朱闌緑栁邊時事感懷壯心如鐵氣填膺萬里中原尚塞塵一枕西風兩行淚封疆誰是死綏人羽書昨夜下長安鐵騎駸駸犯蜀關愁殺閨中年少婦朝朝空望戍夫還襄州蹀血荆州亂千里金湯狐兔慿未定樊城關已死漢民何日見中興蜀又交侵淮又危江湖風浪拂潢池時江右有寇警連朝雲氣濃於墨想是英雄血戰時晚秋世變無窮客恨長欄干遍倚怕斜陽滿籬黃菊無心看付與遊蜂自在忙明堂觀禮十三首尚書省觀涖誓中辛㫝吉建齋壇宰相前期誓百官尊祖敬宗天子孝儀文莫作等間看端門觀習肆赦儀百官常服拱端門丹鳳銜書下九昏宰相近前宣授了齊班舞蹈謝君恩兩邊黃幕護朱簷中貴當頭候捲簾扶起金雞爭搶取要教天表庶民瞻車駕宿太廟金甲重矛兩內臣階前對立氣英英巡更場內知誰問聽得傳呼宰相名車駕回太廟瑞靄祥雲傍曉開九重法駕太宫回一聲靜蹕千官肅衛士傳呼御座來天街夜步風不停雲月更清千門繡幕笑歌聲御營巡檢無拘束走馬天街夜逹明內前青帷朱簴栁隂旁玉磬金鍾列兩行輦路旋天泥細細雞竿揭處瑞雲黃和寧門觀駕星斗中天夜向晨寸雲不點月華明六飛過盡燈如晝宫漏遲遲報五更肆赦九重夙夜畏天威何事晴明一夕非不放明堂大朝賀盡拋坊樂獨行歸上以天雨免朝賀及迎樂觀景靈宫恭謝聖皇宗祀懷多福恭謝回來看帶花柷敔笙鏞齊合奏舉頭更見日光華時積隂初霽膳羞進徹靜無譁宰執齋宫坐賜茶不比常朝添覆奏常朝除目覆奏而后出劄惟齋宫免報來除目十餘家回龍橋望駕回龍橋上望龍顔毅采英英瞻仰難須信吾皇自神武何憂中國不尊安兩行衛士錦宫袍萬嵗聲長徹九臯過盡羽旄風細細彩雲不動御爐髙晚秋登樓獨上危樓望落暉昏鴉歸處逺煙微湖光洗得秋容淨爭奈江南雁又飛讀罷黃庭倦倚樓亂雲挾雨過湖頭年來無復登臨思間橪黃花送暮秋觀雨蕭蕭疏雨逐斜風三兩歸鴉暮靄中看到菊花無可看一年秋事又成空送劉方石歸旴江嵗云暮矣始成行珍重劉公半月程四海干戈風物改亂離時節别離輕昨日新聞未忍聽憂時嬴得鬢毛星歸休髙卧西江上秖恐川原草木腥與月船周君話别明日須知子逺行一燈對話過三更離魂已逐歌聲斷清夢空隨夜雨生鴨爐煙冷夜窗寒著盡冬衣尚怯單忽憶故人千里别雁賫芳恨度扶欄霜風一夜霜風動地寒塞垣火未報平安嫦娥亦帶傷心色為照征人尚抱鞍夜坐獨對寒燈客夢孤數聲征雁下平蕪古今多少難言事笑指梅花解語無坐到中宵未忍眠祇今身世兩茫然悲歡轉眼俱陳迹休對寒燈説舊年寒夜匝地隂風黯淡天怯寒時候秖宜眠氊裘羔酒非吾事自碾新茶和雪煎風收雲捲月當天獨立中庭思悄然市井不知邊塞事嗚嗚鼓樂吹新年寄詩人憶君夜夜看燈花暗數歸期未到家兒女團圞生計足還知邊塞走風沙恰回午枕自華胥忽得周郎一紙書江上春風能幾日莫教門外栁蕭疏周留詩為别有歸去門前栽栁樹逢春先緑向陽枝之句觀錫宴宣勸中使傳宣內裏來輔臣拜飲九霞杯君王萬嵗三邊靜夀域先從塞北開湖上早行錢塘門外買湖船霧氣沖雲水接天只有蘇堤金線栁半籠早日半籠煙隂夕恰好晴明天又隂霜風如劍二毛侵淮城夜雪深多少不見擒吳奏捷音嵗晚即事矻矻窮年漫逐名不知七日换新正困人天氣濃于酒賴有梅花唤眼醒元日以下係丁酉作一夜東風換斗杓千門曉色雪初消君王已奏平淮雅猶自謙沖免會朝時以邊事免大朝會雲集衣冠拜紫宸榻前除目報來真君恩先到宫門栁占得人間第一春觀宰相早朝五更三點內門開御路傳呼宰相來天子未明思政理退朝常是過辰牌用唐人進退格春社廉纎霧雨四山昏寂寂柴簷半掩門客裏不知今日社偶過野廟見分膰雨意春愁如織雨如麻倦倚吟窗拾落花坐不忍眠心似醉悠悠身世在天涯曀曀重隂晝不分歸鴉林裏認黃昏人間春信知多少但覺春寒入夢魂內前兩桁重楊護九重翠眉羞畫舊隋宫柔條似怕君恩重低拂朱欄舞曉風麗正門開曉色鮮萬絲緑栁御溝邊禁中恐有題紅怨不放涓流出內前小立小立危樓望眼遙晚煙淡處見湖橋梅花落盡寒猶力留得東風候栁條湖上湖頭春水千丈碧湖堤嫋栁不盈尺唱歌女兒棹船回驚起沙鷗對對立廟山道中蕭蕭疏雨點孤蓬舟子招呼語順風小麥青青春却半一聲江上看田翁春日雜興迢迢清夜靜無譁月色千門噪亂鴉吳山月明則羣鴉噪坐久忽驚寒力重不知殘雪在梅花粉墻紅杏半離披春滿人間花自知幽鳥不言如有思等間飛上海棠枝輕寒漠漠雨霏霏春院人間半掩扉風力不知多幾許出門只見杏花飛百花時莭燕鶯忙盡日如年懶課香午枕夢回人悄悄一聲啼鳥傍斜陽清明過了栁花飛簾外萋萋草正肥喚起惜春情緒處空山殘月杜鵑啼嚴陵舟中萬水千山霽色新臨風一葦捷于神羊裘灘下休停棹聞説狂奴解笑人郊行牧牛童子坐田頭􅎥草簮花兩兩謳路繞青山山繞澗殘蟬夕照淡於秋火雲散盡晚風涼曲澗流空草自長蠶箔成絲秧貼水數聲布榖為誰忙午窗破午幽禽驚客夢隔窗疏雨喚離愁浮雲得喪知何益早悟莊周蝶夢休獨行終日長廊獨自行幻身未信一絲輕自家心緒忡忡急枉恨鄰牆搗練聲初秋晚趂涼颸上小樓忽看梧葉早驚秋悲懷無奈狂風雨數盡歸鴉懶轉頭晚登層樓已下四首往金陵鎖試作西風吹我上層樓千載興亡逝水流數點鴉歸江浦晚一聲雁過塞垣秋天津橋橋在行宫前昔人謂山如洛邑水如瀍澗因以名之行闕千重鎖暮煙山如洛邑水如瀍黃塵障斷中原路忍立橋頭聽杜鵑晚出升州門晚驅羸馬出東城過盡山岡路却平村店夜深人語靜隔墻風遞暗潮聲京口晚風來候過淮舟間上南徐多景樓落日寒城伴荒草江南人指是瓜洲道間晚景斷橋流水涵虛碧逺岸空山鎖晚青勒馬為看溪畔景森森古木暗長汀題鄭雲谷梅窗匆匆嵗月為誰忙靜倚梅窗到夕陽老菊不知秋已去晚風時送短籬香愛梅來訪小春花間卧雲房避俗譁喚醒昏昏塵世夢旋移石鼎煮新茶嵗晚雜興撥盡寒灰恨轉添不知片雪點疏簾梅花帳冷爐煙歇架上黃庭信手拈時勢危棋局轉低丈夫有志竟何為優遊輸與田家樂問著朝廷事不知雨雪霏霏嵗又除鯉庭目斷數行書銷金帳下羊羔酒便學粗人也不如夏日金陵制幕即事以下係戊戌以後作五更三點造轅門了却文書日欲昏出入戴星吾豈憚要須一飯不忘恩早來留得氣清明吏棒軍書課日程秉燭攙先書押了間欹涼枕數殘更荷花池畔竹涼牀一枕間消夏日長燎過水沈天正午旋移小艇採蓮房幕府人才不在多同寅難得是恭和一堂賔主春風裏剩有功夫到切磋入夏邉鋒漸報安不妨拄笏共觀山西風易把江濤湧整暇規摹肯放間郡圃觀白蓮翠蓋亭亭映玉裳臨風綽約暗飄香六郎正被繁華困不愛濃粧愛淡粧嬌羞處子臨粧後淡淨佳人出浴時無語倚闌如有恨生嫌別岸汚胭脂掩晝嬌春斂恨濃蓮苞欲實又成空都緣不肯為雲雨開落非關一夜風採菱人散夕陽收冷落西溪風露頭飛入白鷗花一色暗香來處月如鈎泰華根株本一同何分白白與紅紅半池只怕霜風倒輸與蒼頭百丈松秋日金陵制幕書事幕府秋來事更多夜深猶是擬諸窠制閫諸案大則曰房小則曰窠蓋倣朝廷之制平安號火新來急鐵騎連宵已渡河點盡官軍點到民三千新遣殿司兵流離更講關防䇿預結強丁戍列營流民強壯預為未然慮置勇士一軍團結之哨馬紛紛一水間渡頭分戍要防姦可憐生計漁舟者官給旗牌禁往還諸渡遣官戍之以為禁姦之防至於漁舟亦自官給黃牌黑旗以考驗元帥謙謙盡下情麟堂垂晚更延賔遇風盡是同舟客肯把秦人視越人明朝玉帳過江邉騎卒行營一日先出得公庭天向夜通宵人散起家錢元帥江行騎卒遣幕中通夜散起家錢於諸營秋閨西風昨夜到庭梧曉看窗前一葉無秋月照人眠不得等間拈弄繡工夫滿目凄涼只自知間將心事寄琴徽無情梁上雙雙燕帶取秋光一半歸入秋情思可曾歡深鎖朱扉怯捲簾書几無人塵不掃一鈞蛛網挂牙籖江南賈客去忘歸撲面邉塵自在飛想得那邉寒較早夜來密地剪征衣零露瀼瀼夜氣浮嫩寒差力五更頭鄰雞啼破交加夢冷浸梧桐月一鈎冬日金陵制幕書事督制堂堂兩重臣駐師移府夾江濵資糧扉屨多多辦更有舟車乞與鄰將督制兩閫移屯江岸應援淮城東閫亦自維揚提兵會合軍需等物多本司貸之官軍聞説定廬州破敵功成一滴油一滴油弩名智勇功名付元凱王三錫命到康候此詩為合肥作敵以重兵二十萬圍城者四十餘日制帥杜公於援兵未至前不動聲色而破之父子俱奏雋功受上賞城中守將方投死陳面將軍已賣降版築紛紛成底事那知靠後是長江此詩為滁州作敵圍滁城幾兩月守臣陳廣極力挫之敵已有退志會援師築城於江壖未進廣中傷死有內變敵遂入而城亡矣薄晚官軍得勝歸家家户户挂旌旗陳前紀律明于日師入城來半不知此詩為往來過軍作三五同寮出幕遲公餘終日意怡怡歸來又被梅花惱撥冗銅彛插數枝右七言絶句百首同祖少作也少作不止是離體凡數百未敢録姑録此百篇為初稿非録詩也録其事也詩因事而作事由詩而著不然少作何敢傳哉同祖自髫齓侍家君宦遊弱冠入金陵幕府目所觸意所感寓於詩詩不足録事不可廢此初藁所以出也孔子曰小子何莫學夫詩又曰非求益者也欲速成者也同祖慕聖門學詩之訓將以求益而非敢蹈欲速之戒遂以學詩名其篇嘉熙庚子月正元日金華王同祖書於建安郡齋兩宋名賢小集卷三百四
