body:
  text: 兩宋名賢小集卷九十八宋陳思編元陳世隆補龜山集中􅖍山衡湘側南二千里清淑之氣常蜿蟺丹砂玉石氣所感融結萬狀非磨鐫窮深荒蹊異岱畎不逢禹迹經棄捐苔封土蝕誰復問嶙峋僵卧當市㕓龜山老叟見之喜鳩徙輦置羅前軒岧嶢孤峰露仙掌有一石如掌屹若太華青摩天傾崕斷壑坐中見蔥蒨似玉生雲煙初疑祖龍未死日浮梁擬跨咸池淵神號鬼怒驅不前捶擊刓磷成枅圈又疑巨人出龍伯揭竿來自崑崙巔連鰲合負雲濤翻蓬壼簸蕩留平川繄豫竟日倚欄檻矯首便欲追靈仙虎輪神馬自足駕已覺兩腋風泠然瓊臺浮遊與世隔醉傲笑拊洪崖肩山間草木即靈餌含英茹實資長年悠悠廣息變今古坐看溟渤成桑田寄練子安教授憶昨吾子客上都我獨奔走天南隅各年未壯已多纍誤投世綱身攣拘飄零今日偶相值乃復咫尺不得與子俱人生委質金在爐大冶鼓鑄誰號呼惟愁踆踆走塵土舊業已廢成荒蕪惜君高才卓犖與世畸雄文灑落珠陸離雷驚電赫轉坤軸風號浪擊飛天池珊瑚挺幹滄海竭騏驎趨軼不可羈經綸有道世莫知櫝中良璧始自竒君不見扶藜隘巷蓬蓽居裋褐甕牖桑為樞擁門軒蓋何所慕藜羮自飽非癯如又不見揚雄寂寞守太玄棄捐覆瓿真可憐折腰小吏昔所耻田園須賦歸來篇終當結屋蒼崖巔期子相與臨清泉投簮解帶謝人世拂塵披蠧親遺編松皴檜老生青煙雨餘風弄鳴哀絃低回野興真有意浮名鸛雀過吾前結歡膠漆常連連從遊鹿豕終長年送富朝奉還闕紹榮字國華君不見慶厯承平道如砥馳車八荒同一軌邊人鴟張怒螳臂百萬雲屯若封豕又不見朔方橫流漲天起腐麥蛾飛木生耳扶攜道路雜老幼操瓢溝中半為鬼關河日夜刁斗驚嫚書乘駟來渝平兵間持節得英傑談笑坐使羈長纓青社環城萬區屋發廪分曹具饘粥飢羸枯頰陡生光叢塜不聞新鬼哭臧孫有後天匪親閭門容車何足論朅來濉上見猶子雄姿宛有典刑存驊騮已度渥窪水朝燕暮越應千里行看玉勒駕鑾輿濯足瑶池從此始寄遊定夫憶昨相逢鳯山址駒隙駸駸餘半紀君趨烏府近清光陸海驚濤漲天起雲帆大舸半摧溺艤岸得全誠偶爾我時捧檄赴京渚放浪江湖一浮蟻談書考古老無用哺啜糟醨咀粳粃東歸雖復有民社為米折腰良可耻市朝紛紛真羿彀朔幹燕弧不容擬投身中地竟誰兔未信棘端能捍矢重樓百尺卧玄德問舍求田不須鄙早歲結鄰初有約齒豁頭童今老矣築田預想傍田廬負耒耦耕何日始過錢塘江迎潮銀潢翻空際天白鯤怒鵬鶱海波擊湧雲噫氣聲怒號萬馬馳車隨霹靂低昻上下如桔橰頃刻性命輕鴻毛賫囊負笈有夷路一日何事常千舠因思羊腸盤九坂攀援蜀道愁狖猱人生觸處有萬險豈必此地多風濤願言夷險不須問莫負對酒持霜螯和潭倅張朝請行縣言懷夾道旌麾動隂霾萬里開霜迎威令肅春逐馬蹄來幽壑光初滿寒荄暖自回仰窺嵩華質曾未施纎埃又用前韻和早梅二首楚國春歸早寒梅處處開月和清艷冷天與靚粧來東閣詩魂動南枝歲律回蕭然氷雪態無處覔輕埃星使經行處梅花忽已開只疑春信早先擁使旌來嫩蕚紅初破寒柯緑未回凌霜半含月皎皎絶纎埃感事邉徼無虞日王師討弗庭收功誇廟算行險毒生靈川谷旌麾暗風塵戰血腥寂寥歸馬日目斷華陽坰虎士氷河側日聞刁斗驚氣吞沙漠盡風蕩賊巢傾關塞長年戍邉塵幾日清太平陳朽冨一旅百夫耕席上别蔡安禮豫方赴調安禮赴慱羅仕故里相看眼暫明一尊聊此話平生杜陵蚤被微官縳元亮今為世網攖長路關山吾北去春風梅嶺子南征結鄰莫負當時約早晚滄浪共濯纓次韻安禮見寄末俗相看老尚新交遊千里更誰親蕭條身世聊安分迂濶行藏懶徇人宦路競羞關柝吏勞生誰息利名身我慚抱甕無機械幽興惟思水石濱冬寒兩齒忽覺動搖因成書懷未年三十髮先雕歲晚俄驚兩齒搖都為踈慵成計拙直緣衰病覺形焦連經宿雨重裘冷旋煮藜羮野興饒擺脫塵樊猶未得不堪回首問漁樵書懷駸駸塵土久方還直道謀身力愈難靖節每嗟纓世網漫郎何意出人間風驚駭浪潛鱗伏竹隱灣磯翠羽間好去杖藜穿蠟屐伴雲隨月弄潺湲汴上天上行雲曳白衣半銜晴日在林扉盤花落雁驚還起啄食飢烏走不飛榆莢青錢飄已盡月堤流水漭相圍征途處處塵隨眼多病長年與世違陳留書事烏檣風纜欲飛翾拍岸驚濤挽不前曲浦漲沙仍積凍踈林斜日自生煙﨑嶔道路真堪笑放浪江湖已判年一枕晝眠無好夢空慙邉老腹便便感事桑麻腴地想榛荆騎士西來劍戟腥藜藿陋儒心更鄙但思干羽舞虞廷藍田溪上夾籬桃李趁溪斜淺淺清流映落花欲問武陵源上路度雲穿石認胡麻白公草堂爐峰裊裊曉煙輕雲入屏幃一枕清高興自應無世纍獨於妾馬未忘情久旱農郊阡陌起黃塵望斷天涯絶點雲踈懶無情訟風伯幽窗時讀退之文過七里瀨拂雲高雁倚風摶下視平湖萬里寬搔首扁舟又東去錢塘江上看波瀾豫自長沙還植蘭竹於東西軒調官京師逾年而歸蘭竹皆衰悴感而成詩柴桑衰晚愛吾廬三徑歸來手自鋤但得叔卿長飽飯不妨孝若老談書蘭因採佩枝先瘁竹為凌霜葉自踈留骨廟堂寧曳尾魯門無用祀爰居和李倅遊武夷濃淡煙鬟半雨一作雨半晴溪光初借晚霞明鰲頭湧出三峰秀三層峰最為秀拔天漢融成一鑑清魏王峰頭有天鑒池枌社有誰藏舊牒賓雲無處問遺聲幔亭寂寞仙何在勾漏丹砂早晚成荆州書事江湖泛泛一虗舟去作人間浪漫遊歲晚光隂雲冉冉畏途風雨日浮浮萬鍾信是樊中雉一棹聊同水上鷗投老虀鹽成底事慿誰為種橘千頭觀獵貂裘白馬誰家子擁戟弦弧囊徑矢褰身欲與鳥爭飛觸起塵埃雲四起長繩驅逐狐兔驚驕鷹掣臂流雙晴飛揚雲間電光閃旋復草際無遺生鷙腸久厭鮮肥餌顧盼方能伺人意但矜鼎爼有餘甘貪飱誰憐殄生類安得淑氣回嚴秋徐令用拙同鳴鳩林間百鳥恣孶乳雖欲擊搏知無由寄范正甫時討西夏羈窮莫厭如牢圈從古功名出屠販男兒不負懸弧心馬革裹尸猶足願君不見準隂寄食飢貧叟一作竊爪寄食淮隂叟胯下英風亦何有逢時吐氣雷電奔金印纍纍大如斗玉門晝夜羽檄驚脾腉欲塹天都城叩關虎士欎餘怒科頭奮戰如雕鷹君從壯年藴竒䇿未冝縮首藏柴荆昔人投筆真豪英慨然萬里終成名南山白額雖欲老百獸遭之猶裂腦吳子正招飲時權酒局不赴作詩戲之寒爐火冷浮青煙徑風刮靣如戈鋋凝隂不動天欲雪竟日兀兀成拘攣廣文才名四十年天寒坐客猶無氊參軍官小技能薄寂寞冷坐誠冝然望形杜老偶相覔傳呼歌舞開華筵嗟豫簡書固可畏不得對飲簷花前漫有糟漿逆人鼻汝陽口角空流涎可能更似蘇司業只與時時送酒錢勉懷紛紛于我未忘情踈懶多應捨怨憎便好世間師栁惠不須巖下問孫登梭山候潮十一日潮起信是日潮小不到向晚牛羊沙岸歸落帆煙浦候潮時誰言江上須忠信潮到于今自失期徐郎廟古廟靈場枕碧巔松楸依約鎖風煙羽毛一去無消息隨落人間幾百年送陳幾叟南歸連墻東郭倦追尋高卧毗邪老病侵自愧屠龍真拙技漫令吾子費千金霾風霪雨濕征裾隔雨棲臺半有無南去定逢韓閣老歸愚當見問夷塗是時幾叟過四明見了翁幾年夢想到親闈身逐行雲萬里飛苕水未殊沂上樂春風無負舞雩歸初授餘杭和陳瑩中了齋自警六絶畫前有易方知易厯上求玄恐未玄白首紛如成底事蠧魚徒自老青編八荒同宇混車書一視那知更有渠慿軾自應由砥道徑蹊無處問歸歟行藏須信執中難時措應容道屢遷一目全牛無肯綮騞然投刃用方安造次欲安嗟孰是參前無物若為書蕭條此意人誰問興廢由來命也歟聖賢事業學須強俚耳由來笑折揚詭遇得禽非我願但知無有是吾鄉盈科日進幾時休到海方能止衆流只恐逹多狂未改坐馳還愛鏡中頭間居書事輕風拂拂撼孤柳庭户蕭然一室清隔葉蟬鳴微欲斷又聞餘韻續殘聲送席二伊川壻摳衣丈席想多聞高節應能與俗分不用卑飛入幽谷定知喬木在青雲寄遊定夫綘帷燕侍每從容一聼微言萬慮空却愧猶懸三釡樂未能終此挹清風蕭條清頴一茅廬魂夢長懷與子俱五里橋西楊栁路可能鞭馬復來無含雲寺書事六絶獸駭禽鳴蘙蔚中難將此意問鴻蒙縈回小徑蒼苔滑故屨從今恐不通北山山下一漁翁形解心凝骨已融支枕睡餘人寂寂一軒明月滿窗風山前咫尺市朝賖垣屋蕭條似隱家過客不須攜鼓吹野塘終日有鳴蛙夾屋青松長數圍午風搖影舞僛僛幽禽葉底鳴相應時曳殘聲過别枝竹間幽徑草成圍藜杖穿雲翠滿衣石上坐忘驚覺晚山前明月伴人歸蝶夢輕揚一室空夢回誰識此身同窗前月冷松隂碎一枕溪聲半夜風荷花照眼紅雲鬬晚霞重重青蓋半傾斜會須直跨三千仞移取峰頭十丈花冝春溪斜斜踈栁照清漪藉藉殘紅自滿蹊刺眼藤梢牽不斷欲尋流水路還迷冝春道上艷杏夭挑日日稀空餘淑氣尚遲遲誰人為作留春計莫放風花自在飛過豐城清江渺渺緑浮天慱物無人繼昔賢應有斗間靈氣在誰能更與斸龍泉瀏陽五咏洄淵浩蕩白鷗飛老懶時來坐釣磯岸幘行人聊自適不應憔悴似湘螺右渭水簾捲晴空獨倚攔𡨕鴻點點有無間秋風注目無人會時與白雲相對間右歸鴻閣芙蓉雕盡蕙蘭芳杖屨翛然一漫郎鳬鶴短長寧復問但知鵬鷃兩相忘右飛鷃亭柔條踈蔓緑交加煙鎖雲涵去路賖繡紱貂纓無處問空餘雞犬兩三家右相公堂聖童去後水雲間陳迹難尋草木間獨有微言傳野史洞天寂寂在人寰右洞陽孫思邈修真所荆州隅作鄭公嵇阮流野性本麋鹿平生傲羲皇白首就羈束天寒客無氊官冷飯不足顧豫支離人攘臂受餘粟江魚尾盈尺飽食勝粱肉荆山富樵蘇丈室有餘燠頑疏愧前哲所得踰往躅談經追時好俯仰負愧忸流光逝不反愁鬢日改緑世道劫火燃不爐乃良玉晚交定難恃雲雨手翻覆官居真蘧廬束擔聊託宿求田意雖鄙此計正冝速歸尋谷口耕勝賣成都卜坐想帶經鋤倚耒聽布榖送鄭季常赴太學正驅車出西城眷言與君違北顧臨康衢問子將焉之赤驥度渥窪終當飲瑶池成都九軌道一躍不可追浮塵暗荆棘捷徑行多迷長風戰秋林零露沾人衣青松不改柯期子清霜時次韻何吉老遊金鑾寺榮名嗟何為病木自生癭彭殤一夢覺烏用論久頃寄身淵明廬翛然在人境衛生鄙樊雉放浪任流梗相忘到形影世纍不須屏銼針聊自營寧復事干請負暄有餘燠蓬鬢亂埀頸客來坐無氊誰顧廣文冷忽聞過我門冠屨不暇整邀我招提遊並轡相與騁僧關叩禪寂未語心已領並遊皆韓徒辭刃淬鋒頴多聞富如坻吾方拾遺秉顧慚管窺陋未覩豹文炳謬追俊遊後如渴得甘井願從借金箆為割眼生眚鼻端堊漫久妙質愧非郢𢋫酬困詩律恐坐杜陵㾪相攜上層岡出户畏深穽每虞參也魯蹞步輒三省遲回月初上雲間挂金餅昏雞鳴相呼更覺林逾靜湖光湛星漢渺渺天水永歸蹊暗塵土回首失清景角聲下譙門歸步怯修嶺晚市人迹稀青燈耿踈影金鑾有退之題名故有韓徒之句題詩長老璧維摩病士意超然邉腹便便但晝眠共説平時忙底事烹茶煮藥過殘年出尉氏隔村殘雪㺯輕風日射晴光玉縷紅桃杏渾如梅欲綻直疑身在故園中感事權門車馬日紛紛寂寞多應笑子雲玄白定知非世尚解嘲那復強云云過廬山遇雨江風吹雨逐人來行過山前首重回絶頂隔雲看不見石稜崖角獨崔嵬送趙循道赴都講鳯山欎崔嵬下有千頃陂南陵鳯皇山大農陂溉田千頃峻極不可攀浮光亘長鬐晦冥滴風雨澄淡含瓌竒呼吸入君懷萬態羅心脾吐辭麗金艧煥若星斗埀朅來荆渚遊紅蕖照清漪故宫久零落一灑增余揮惇族貴老成堯言下丹墀浮驂駕雲帆眷然成仳離長裾曵王門豈比困鹽虀驊騮踏長板萬里誰能羈送胡康候使湖南北溟有潛鱗其廣數千里揚鬐厲東海泛泛等浮蟻百川競奔注漫不見涯涘寄之天地間大澤礨空耳胡候荆山姿妙質久礱砥飛聲動旒冕持節照湘水功名與時會事道從此始驊騮駕輕車夷路道九軌朝燕暮騰越快意未為喜聖門學須強一簣虧可耻擴之天地寬於道乃云邇為士貴𢎞毅無忘味斯旨寄題趙貫道後樂亭亭在沂州新泰縣叢祠有狐鳴羣雛滿東州彬彬齊魯郊不復論軻丘鼓刀販繒翁衮衮封公侯風流日凋弊世久俗益偷昔時帶經人輟耕仍佩牛椎埋盡行盜閭里更相讎趙子尉平陽始止惟民憂百花爛成圍幽禽哢春柔問子胡不樂我心殊未休威明揉強梗驕鷹化為鳩買犢解吳鈎束身自鋤耰田廬户無樞長物并不收結亭自樂只開編玩前修誰云酸寒吏憂樂非身謀乃知君子懷與世異沉浮嗟豫一漫叟放浪猶虗舟舞雩有清風遺迹今在不君乎此去矣欲往將誰儔寄言春服成尚覬一來遊泗上聞將閉汴口淮口平沙漲檣烏向日斜微雲變蒼狗輕浪蹙浮花風徑回飛雁林喧集暝鴉河流應未閉遲我到京華鬢蓬凋欲盡岸幘任欹斜瘦怯重裘重慵看細字花凍雲穿曉日晴樹繞飛鴉老大驚遲暮飄零惜歲華聞道河流閉逢人每問津天高雲羃羃風細水鱗鱗未種江陵橘空思千里蓴且邀明月伴相對解綸巾出京旅泊驚秋意塵沙變客衣明星爛河漢殘月暗簾帷風栁斜斜轉雲帆片片飛窮愁添别病衰晚意多違東林道上間步寂寞蓮塘七百秋溪雲庭月兩悠悠我來欲問林間道萬疉松聲自唱酬百年陳迹水溶溶尚憶高人寄此中晉代衣冠誰復在虎溪長有白蓮風碧眼龎眉老比丘雲根高卧語難酬蕭然丈室無人問一炷爐峰頂上浮江上夜行赴荆南道水壺瀲灧接天浮月色雲光寸寸秋不用乘槎厲東海一江星漢擁行舟過石首謁縣官回有作萬事紛紛醉即休無功可作酒泉侯誰能載取千缸去且向舟中打拍浮偶成緑鬢漸驚老境催更憐衰晚困低徊但知周道平如砥莫問瞿唐灧澦堆兩宋名賢小集卷九十八
