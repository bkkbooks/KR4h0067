body:
  text: 兩宋名賢小集卷二百七十二宋陳思編元陳世隆補心游摘藁劉翼字躔父福唐人有心游摘藁題心游樓一自浮光抵玉融東林山曲世為農前場歳計禾麻麥後圃年深竹荔松博我多聞千載史喚人深省五更鐘不消更㑹楞嚴語面面披雲挹曉峯心游樓即事禪坐寧離此意行何所如稻粱詩七月果木賦閒居活水嘗新茗顛風落舊書無才甘用拙不是隠樵漁癸夘十月同林子宜拜掃先師樂軒墓因和南谷寺壁閒韻秋風颯颯已華顛男女猶賖嫁娶錢問道西軒空有夢繙經南谷恐無縁登墳薦酒徒為爾對佛拈花亦偶然回首白雲無叫處青山長在淚痕邊答林昌宗詩筌韻經鋤小暇弄詩筌老去仍知黙是禪滄海移舟盡琴趣雖然終不似無絃題東臯詩巻雪竹霜松不老身儘教後進笑陳人相逢亦有吟詩客誰似先生語意真書情蕭踈逺市囂山窟雜魚樵窮鬼乗吾拙錢神挾汝驕世途自巘嶮真性本逍遥尚想榮期樂綸巾傲漢貂夜意平生萬事水東流獨有多情是風癢夜長無寐月窺牀擁被孤吟起遐想伯言見和拙作以漢𨽻書之謝以七韻李潮善八分求歌杜陵叟有人和我詩半紙餘科斗風雲生其懐劍㦸出其手石經中郎蔡新様元和栁元常文不傳退之書何有待我農隙時載筆隨君後袖手眼亦明聊與之飲酒偶見官舍梅花作天然標格自蕭踈底用松篁水月俱但是梅花皆可愛何闗東閣與西湖輓敖儀仲半面春風已有情别來重見眼終青空齋夜雨十年後一醉黄花叫不醒對坐茶甌日兩迴胷懐真率向人開茶甌對客如前度不見先生杖履來晝倚籃輿餞一杯殷勤别語到簾幃那知此夜成長往書屋無人月掩扉書中有種復何愁酒興詩狂卒未休莫唱横塘斷腸句不堪斜日獨登樓儀仲有題心游樓詞送二子從子宜讀書三代讀書無寸功又將此法教兒童旁人笑我背時好不背旁人背樂翁山寺聽雨問道論詩也一宗燒柴煨芋佛家風要知真樂人間少聽雨空山破寺中戲和劉雪巢題壁韻劉有不知何處有唐詩之句吟懐只怕俗塵迷若慕唐人也自癡要識性情根極處請觀三百五篇詩題平逺軒呈竹溪玉堂溪堂闢小軒此景絶可愛蔡松道東邊千載典型在髙低萬頃田面勢溪向背生綃一幅寛晴雨不盡態中有謫仙人來尋莘野耒畎畝雖不忘知進不如退乾坤入醉眼風月出吟喙我非人境游亭在人境内心平水不波見逺山無礙時攜琰石遊間以劉白輩僕忝老諸生來扣佛三昧題簡上人西亭詩文後真如非字義綺語道之疵未見西亭作長為北礀欺晚因僧媚逺初實客從曦多少才名士沈淪世不知夢呈樂軒先生既覺不失一字録呈竹溪玉堂不見仙翁四十春幸然丘隴在比鄰當年四海從游者報佛深恩有幾人艾軒先生工部侍郎文節林公一傳為網山林先生諱亦之字學可再傳為樂軒林先生諱藻字元潔皆有集行世竹溪樂軒之嫡子也兩宋名賢小集卷二百七十二
