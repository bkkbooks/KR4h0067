  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0067_WYG_035-1a, image: WYG1362/WYG1362-0561a.png}
body:
  text: 雨宋名賢小集卷三十五宋陳思編元陳世隆補竹友集李成德作二筆几以其一見遺云得樣於郤子中家并示長句輒次其韻奉酬琴不安絃製竒古可憐不入文房譜鼠鬚龍尾玉蟾蜍與汝俱成會心侣誰能好事為品題端效廣微亡輒補謫仙傳樣桂林家以暗投人吾竊取我書太俗如墨豬下慙羅趙何足數蒙公厚貺試臨池一字不成如畫虎欲報初無青玉案哦詩況乏驚人語淨鋪滑薄待君來慎莫踟蹰畏今雨李成德復用前韻見貽亦次韻奉和蔡家筆法擅今古楷書尤誇荔支譜後來誰筆最神通要與渠伊為伴侣只今書學貴瘦硬弟子闕員誰可補君持此几要投人字畫不工那得取小人俗書如俗馬骨少肉多今不數當君此贈恐不堪大似無功饗鹽虎新詩繼作恐難如只賞君房妙言語嗟豫老矣亦懶書留與兒曹寫時雨次韻郤子中所藏筆几聞君文史三冬足家居未奏三千牘明窗棐几淨無塵筆研清幽真不俗小琴承臂筆縱橫章草真行隨所欲家藏敝帚將何用時人尚作千金畜此物雖竒君不惜似把隋珠當魚目小童傳觀許見貽與君杯酒初相屬吾詩戲作異香山唐衢雖見何由哭見公真玩為君賦銅鉢聲終字盈幅朱端甫以畫牛一紙遺李成德成德以示豫為賦長韻畫牛蹄角四十八禇生塵昏僅可閲頭頭露地各逍遙不愁牽車喘見月舐筆和墨誰氏子定自道人非畫史把鼻牽回得真牧信手摹成妙如此朱公自是老斫輪不惜是牛持贈君願君成誦石鞏語更將此畫同參取次韻李成德謝人惠墨牛君不見八百里誇王氏駮常敕家童瑩蹄角綺𥜗紈袴競奢豪卧席不安愁禍作何如傳寶墨牛圖不飾青黃如素朴向來竒畫購千金宜在蘭臺天祿閣兩牛方鬬未雌雄或奔而從或小却其餘三四亦殊絶或如虎卧鶴俯啄滕王蛺蝶東丹馬嘉陵山水青田鶴如將優劣比人材長文何必慙文若人言愛畫亦一癖被野牛羊何用貌是家持論果非耶煩君試謂評其略午日今晨定何祥桃栁各映戶粉團高氣薰鵝炙椒葉覆朝餐隨土風杯酒晚來具綵絲纒祭筒畫楫誇競渡楚人哀怨情正以屈子故當年夢魚腹蓋坐入宫妬榮華一時好放逐千載慕得失吾不知持杯自欣豫成德不面逾月僕以病暑未能出謁輒和所寄藳字韻詩奉寄兼東子中門前蓬藋無人掃客去牆隂藜莧老我家城北君城南相憶何其挂懷抱不聞叔寶方外談澄也何因令絶倒知君不作避暑飲閉門亦深荒徑草鈎章棘句日哦吟玉軸牙籖時探討邇來聞草鹿脯帖盛湘十日虛蘋藻摻摻丸藥恐不免俗客縱譏何足道恨我猶嫌褦襶嘲不敢熱行惟夢到君取竒功翰墨林筆陳可掃龍駒島願言不學司馬公萬事蓬人盡稱好我詩燕石初不如浪欲珍為夜光寶殘暑促裝行造請曉來涼氣迎秋早定邀鄰舍廣文公同聽誦詩傾腹藁碧筒君不見韓潮州銀作飲盞誇工倕鐫花鏤葉太瑣碎何言豪士亦爾為又不見六一翁嘗吟鸚鵡紅螺詩華堂一釂豈不樂清歌勸酒須蛾眉吾儕山人寧有此競折圓荷為飲器細傾初作露珠圓滿引忽驚雲液碎鼻中寂寂聞妙香舌本徐徐識真味採蓮當殽花當妓豈有登臨百金費安得城西十頃塘水光容裔暑氣涼時引碧筒如象鼻仍看翠蓋立霓裳感白髮吾年昔始冠已有一髮白作賦數百言嘲罵等戲劇只今尋舊作一字不復憶恍然如夢寐了不見往迹但有鬢間絲冉冉如堪織南方地平濕壯嵗多老色行年四十二鬢鬒那容惜洗蘇將拔白諱老嗟何益一染復星星此語寄阿客人生光景促倐忽如敲石詩成亦寐語感歎初無得後應不識今今已不識昔秋日登鳴玉亭山路秋陽何赫赫山亭凄冷多秋色豈惟醒耳玉淙琤照眼光寒如練白舊聞瀑布垂雲間恍疑銀河墮天關西望香爐不得往箇中元有小廬山次董彥爭韻兼柬之南大門江南英詩名重當時兒時得其藁同輩爭誦之不及拜諸門常恨生若遲只今諸孫子籍甚皆能詩大篇每投我孰非黃絹辭我詩不成句落筆為衆嗤如人食土炭嗜好終不移君何獨賞味與衆直異馳相望巷南北不面令我思歌聲亦若哭此意誰當知阿大一門傑相為塵外期風流竹林會應許仲容隨次韻之南讀彥光詩有作君家父子俱能詩天遣淑鳥鳴春時文窮扺掌定不免齊竽不學君何疑平生説詩喙三尺只今偃蹇成期期願君高處古無上抑以自警無邪思有懷覺範上人道人心與貌俱古哦詩不復效等伍清疑仙掌露華墜新似秋空玉鈎吐要將餘事付風騷已悟玄機窺佛祖泐潭老子乳於莵果在叢林嘯風雨何當掃室祗樹圜夜看金盆聽軟語我雖不是龎德公懶駕柴車入城府公如歸結白蓮社留我山邉一㕓許次韻彥光睡起病目蝶夢遊揚卧碧紗知君不賞玉叉斜夢回起坐有佳思亂觸牙籖書五車黑蠅著眼君勿嗟學道乃得青蓮華商略此言當過我樵青竹裏為煎茶喜汪叔野見過大汪權竒汗血駒小汪連翩鸑鷟雛垂頭未遇伯樂顧覽輝將下朝陽梧豈知青衫埋朽壤更令斑鬢困泥塗喜君翩翩過我廬握手借問今何如若云難遂白髮志朅來翻作青襟徒急呼歡伯置座側解顏談笑聊相娛語及阿兄平日事往往屑涕長欷歔怪君長不滿六尺高談似是膽滿軀且寬是事飲此醑逢人但作口囁嚅留君住騎勿驅明朝酒盡為君酤更闌月落起浩歎四面宿鳥聲相呼玉茗花二首佳園昨夜變春容清曉驚開玉一叢素質定欺雲液白淺糚差退鶴翎紅似聞金谷初無種欲畫鵝溪恐未工底事餘花避三舍孤高元有使君風謂魯公也騷人浪説麻源谷本在風流刺史家直與瑶林共高徹可須梅影鬬橫斜芳尊莫待紅糚賞幽艷長令烈士嗟憑仗邉鸞折枝手應宜展幛玉鴉義漫成年來任運學騰騰愛酒還同醉李僧痛飲亡何緣客至時穿不借繞村行簷間燕雀新聲好門外池塘春水生曉起坐窗無一事捲書南望見高稜飲酒示座客身前不吝作蟲臂身後何須留豹皮劬勞母氏生育我造化小兒經紀之牙籌在手彼為得塊石支頭吾所師偶逢名酒輒徑醉兒童拍手云公癡和李智伯金石臺不見舊題之作二首瘞鶴書蹤逸少齊華陽長使後人迷姓名不得芙蓉手何用全牛捧硯題復憶高人張季鷹每將杯酒勝榮名登臨叔子緣何事湮滅無聞一愴情悼亡三首舊聞林下趣既見即心降月冷同秋夢燈寒對夜窗孰知身是幻深念涕如江仰歎朝飛雉微禽亦有雙三公吾豈敢曾為忍飢寒擬聽笭箵雨潛悲苜蓿槃煙雲昏璧月霜露殞香蘭佇立東風泣忘情良獨難去作三秋隔來歸二載餘臨風還念汝傷女更憐渠憔悴衣圍減漂零鬢髮踈吾今多病久誰付茂陵書呈無逸兄漢儒章句文勝質魯國衣冠實愧名但遣詩書長在眼可令聲利苦關情咄嗟茗飲有時辦夢想溪堂何日成舟泊寒沙卧明月此期終欲與君盟示舍弟蕭然環堵獨何有自謂過人惟一丘野性定為滄海客妙齡須寄道山遊江寒沙靜鶺鴒晚雲濶天低鴻鴈秋休歎烏衣成往事一尊相對且忘憂寄桃鄰居士桃鄰野客無消息寄食招提豈定居倘有龎公知德操何須程鄭識相如食魚他日勞彈鋏舐痔今人剩得車流落生涯俱寂寞因風時遣一行書寄無逸四首三足祥烏曾集冠平生菽水奉親歡從今五鼎應無補不可奈何君自寬聞説潘郎窘食貧何年會面慰艱勤北風如有齊安便為報相思頻夢君故園風物長如舊松柏參天六月涼岑寂北窗風雨夜獨吟詩句繞胡牀浩蕩漳江瀉碧漪西山清絶助新詩好因歸鴈傳佳句要見羊何共和之觀李伯時陽關圖二首坐對丹青傷别離淚和朝雨想頻揮道邉垂栁年年在看盡行人長不歸春草春波傷底事青青栁色最消魂龍眼自有離家恨貌得陽關煙雨昏秋興雨隔千山暮風驚一葉秋朱顔傷露槿青眼賴沙鷗畏酒遊揚夢因詩點染愁有懷誰與語多病獨登樓聽曹道士彈琴二首淡泊絲絃誰與聽試開塵匣寫幽情琴中自有無窮怨彈出離騷意外聲小窗踈箔列仙家彈盡遺音晚景斜賀老當年定場屋虛將妙曲付琵琶兩宋名賢小集卷三十五
