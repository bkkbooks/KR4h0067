body:
  text: 兩宋名賢小集卷二百三十五宋陳思編元陳世隆補安晚堂詩集鄭清之謝徐德夫右司和御製賜詩直道何曽較尺尋昔賢垂範到斯今臯謨勉勉歌元首説誨年年沃朕心幸遇千齡開聖治頃塵三事愧宵針奎文衣被真難報盥誦新詩愛助深朅來林下破天慳要使明詩見一間齒屐印苔春縱步頸壺蒸粟晚加餐夢魂飛到味書閣德夫家有味書閣世路牢封函谷關翻笑醉翁猶未醉黃金白鬢詫腰環和林治中雪詩五首擘天滕六勇如貔移下瓊臺撲凸竒老盡青山真是幻從渠白戰更無詩馮欄且喜明雙目嘶騎寧愁到十眉謂撒戍也坡詩長安畫手開十眉云云中有漁陽胡騎嘶羔酒不妨敲竹韻園林正好樂清時兒嬉犯凍搦文貔怒眥張脣狀崛竒圖得形模規婦笑絶憐冷落賦翁詩幕談多暇堪娛目喜色排寒為上眉頗念袁安正髙卧拙柴煨芋了年時鹽虎模糊懵豹貔玉峰髙並自多竒春光北苑供花事夜入西淮奏雅詩銀闕勢增開雉尾賀班香近列蛾眉看君來嵗𢋫酬筆移在儀曹進表時白旄麾編牧郊貔羽扇分飛更出竒凍裂弓鍪元濟縳嚙殘氈毳子卿詩蘆花夜月凝湓口梅玉春風侈蜀眉坡雪詩有玉梅春之句一幅溪藤知幾返鏤氷冷語不驚時貙貗甝佛貃貛貔見爾雅釋獸連文獵騎漫山伏正竒瘃手草成熊館賦羣驅闕入兔苴詩獸奔駭類淮肥口狐媚歡摧虢國眉滕六倚渠真誤事大寒不出是知時因會來詩再𢋫元韻組練橫陳壯士貔想因舞羽去窮奇千山白髮存公道十日清吟費老詩待伴易銷春有腳交光最勝曰如眉只愁無著梅花處東絹平章付伯時續詩之寵依韻以謝莫搜險韻續貒貔雲景須知雪後竒日絢寒光糚淨界梅將真色薦新詩試敲折竹煎茶舌旋覔遙岑出黛眉油幕輸君談笑樂聖杯正是一中時村邉以湯婆樣惠示與詩俱來依元韻惠中秀外更清便婭姹嬌羞二八年無奈畏塗生袵席寧教寒夜折氷綿遣來績嫗知君狀擬伴涪翁到曉天只恐甎花陶學士風流未了續膠緣再和村邉解嘲間身惟向靜中便莫景侵尋絳縣年未解真精昏默默且觀玄牝息綿綿溫柔鄉裏誰能老冷淡生涯别有天笑撫腳婆為法喜漆園何必問經緣緣督以為經暖足番君老更便摩挲笑問阿婆年聊吟夜月移花影肯向春風逐栁綿自有散花居丈室何妨姹女共壺天鉛華列屋諸君事乞與寒梅了世緣造化真機動靜便誰云巧智可同年藍田日暖煙生玉閩嶠霜濃木有綿萬象為春皆是物一花不實豈其天吾身太極元同運陽長隂消在所緣和葺芷筍詩我貧每笑齊之斶晚食雖甘未忘肉梅肥尚餘風折緑溟涬餐英命騷僕藩籬别彼羝羊觸送似玉堂如楚束惡詩聊賦徐凝瀑妙句飛來潄鳴玉曽無導吏隨賈餗坐遣跛奚委葵菽茁芽勤視緣坡竹期飫伯仁空洞腹書腸膏腥士之辱得魚不敢餉羊續要知菜味勝山谷步趨強顔髮曲局盤有美茹無不足陋矣王芻箋衛澳贈許石田為僧平明對鏡良獨難子能脫屣彈指間戲視此身如髦蠻冠巾擺落逃繻關千金強弩一笑彎萬錢買盡江南山厭渠世路車輪殷赤腳健倒苔痕斑參寥佛印若是班江湖風月不汝慳汝狂方醒衆所歡我獨見之為三歎辨詰孔釋何可刪白雲深處輸君間和敬禪師茶偈飯罷茶來手接時箇中日日是真機建溪顧渚君休問冷暖如魚只自知睡龍纒繞墨甜時捧喝金提落鈍機管取一毆先著到三更日出有誰知魚鼓才休客至時摸頭元是最先機不須吸盡西江水一滴曹溪味便知贈育王堪笑翁問訊瞿曇老比丘靈山何似雪山頭笑翁底事正堪笑面似靴皮笑未休蔬圃活計園蔬日日新杜陵差慰婦長貧旱薑水芋年時熟春薤秋菘意味真畦甕賸分三伏雨露根常占百花晨荷鋤未省勤耕稼猶愧師門學圃人和林倅賦郡守隨車雨旌車勤雨拂參旗大士圓通現白衣爐穟輕煙方先路雷門急令已宣威為霖賸作西成計書嵗誰云大有稀賢守劬躬民國念食言應笑魯臣肥和白雪老禪二偈閲盡恆河水上波聲塵何似泡漚多還師拍板鉗鎚後更唱誰家别調歌簷鐸吟風月半凹黃金布地欠誅茅三更日出真光景大好欽身正笠包靈隱慧上人惠詩為古風以贈貫休齊已唐世人當時逸氣凌簮紳聲名亹亹逼甫白幽蘭直與梅爭春誰知北面石霜老服勤杖屨皆終身二公所得當蓋世英詞傑句風中塵至今傳者以詩重妙處反為詩所湮弄翰戲墨雖佛事炊沙作糗成飢嗔不欲詩工與字巧緒餘能奪道之真心宗一了萬法具辨才飛轉陶家輪君不見阿難多聞及辨慧咒語要敵摩伽神天育二老禪惠示經佛偈答以十詩二老毫端一滴曹喚醒寱語沒忉忉更無慧可安身處作莫當時立得牢餘塵明極強分離菩薩如來是阿誰既道本來無一物將何芥子納須彌龍宫海藏自分明搕𢶍灘頭一任傾因果若還終不昧政須防作野狐鳴書經猶有遮箇在畫佛何曽夢見來玲石玉峰雷雨過梅花昨夜一枝開三經已是太多羅州去休休更問婆箇裏幸然無一事何須終日把甎磨四十劫來間坐休忽拋長舌閙籃頭若言面壁為心法瞿老還輸第一籌懵懂維摩不二門略無遺囑付兒孫普賢若匪剛饒舌此事如何更吐吞老闕無聖亦無言驀指虛空喚作禪掌血條痕無著處教誰白地患青顛般柴運水老龎禪佛法無多在蜜邉闕汝將來還與汝因師交闕更團圓生老年來病已深灸瘢著艾復難禁六根四大原無有何處求師下一針鄭德言親覩洛伽觀音相遂依所見繪畫朝夕嚴奉且求贊語敬題其旁具足圓通性一念本昭徹佛我與信心是三無差别凡人未見聖如渴以何説佛身忽現前如水印秋月心精自開遮見根匪優劣念中有大士珠瓔百寶結補陀洛伽相自在猶日揭是名為正觀倒想作竒絶稽首圓通尊兹念無起滅非相亦非念不盈復不闕唯然觀自在無眼耳鼻舌拙偈調偃溪上人昌黎先生入山裏大顛牢把數珠子松下經函著淨瓶照管習之翻却水丞郎滿擔江西禪行行勘辨撩天鼻偃溪爛嚼雪窗紙換却舌頭别參起雪窗董寺丞將指平讞安晚來訪因舉似偃溪為下一則語佛法方當惡劇時偃溪笑裏袖鉗鎚不教管領千雲衲打徹頭關更問誰簡雪窗董寺丞世路機心去兔迒雪窗一縷不遮藏薾雲梯月真遊戲茅舍何曽外玉堂聖賢事業在心槃禹稷顔回豈異觀世故波瀾同起滅姓名千古要清寒山間大風雨晝夜不止聞松聲撼牀戲成拙語漫録呈葺芷參溪顛風橫雨窮山秋樵青弛擔車停輈松聲撼空吼萬牛轟豗勢欲傾不周晨雞扼吭音且愁百鳥何敢相喧啾恍疑趙壁環諸侯呼聲動地鏘弓矛又疑變化鵾鵬儔垂天鼓翼南溟陬或者挽翻河漢流電飛霆擊龍蛇虯不然火烈陸渾丘天跳地踔啼熊猴狂吞狠吐山裂鳩大音奔騰怒相投夢中驚回仙枕遊分明夜宿浙江頭三更潮水掀柁樓蒼茫起坐擁黃紬觸屏喚作錢塘舟此身端坐巖之幽如何兩耳不自由乃與喧寂為沉浮影蛇石虎以妄求世間萬事浪喜憂大學能定心逸休疾雷破柱方夷猶真須浩養師孟鄒風止韻作商聲謳和復岫賡酬之什勝地來休沐山程懶忌前草堂新杜曲詩格舊臨川客乘干珠履翁琴百澗泉參尋幽路滑空想石頭禪大雅千巖秀清標萬玉前醉扶有宗武屬和得師川境勝堪鋤月詩香可釀泉竹林風度在枯坐笑僧禪書西湖雷峰講主草書寶慶丁􅕀閏夏余以職事出郊歸塗午漏下逋暑於雷峰老師肅客乃二十年前所識雲上人也因索草書縱觀成古風十韻以贈雲師一生耽聖草銀鐵蟠空覷天巧老來逸氣未全平筆底鋒芒猶一掃開關勇士爭赴敵劍戟弓戈奮相繚睡龍決起求頷珠劃木㧓巖紛怒爪風雷喧豗撼坤軸飛電交橫印清沼忽然天宇變空澄千丈孤峰立寒峭張顛驚號智永泣剝筋椎髓為君飽恨豫不習草書訣九轉枯腸秪自攪雲師雲師汝誠能春蚓秋蛇幾時了何如認取主人翁破衲蒙頭紙窗曉送王伯厚入廣五行在天地惟水明且清如何南中泉乃獨以貪名水號墨與弱淖汩稱濁涇彼皆有其實所以得此聲山川日秀發九疑羅翠屏扶輿産清淑丹砂銀石英有泉出其間泠然堪濯纓政坐貪夫纍土炭涴玉氷桓山以魋故至今人羞稱栁子愚其溪百世相因仍有如此白水好貪豈其情我欲招夷齊闕之南山汀一洗萬古貪涌雪歸東溟夫君素潔已贈以貪泉銘送繼一郭處士聖君如堯舜豈無巢與由計然亦何慕五湖一扁舟之人久不作側席思巖幽嘗聞鹿何君清芬徹凝旒闕重華錫嘉號見一光林丘誰謂雅道息競風日悠悠脫冠挂神武有士歸東州笑將金閨籍猛博處士裘鈞天為開顔曰此夷逸儔大書繼一字虹光屬奎婁宸章軼麟衮正聲出天球清名奬靜退下視古素侯睿謨廣先憲姱節追前修况今輯衆雋丞弼登虞周明時樂間暇出處自不侔赤城宅仙子登陸方蓬洲君歸訪司馬坐忘春與秋方瞳照緑髮戲轉黃河流煙霞肅通客隱者應輟耰欸乃輔行色春風生柁樓兩宋名賢小集卷二百三十五
