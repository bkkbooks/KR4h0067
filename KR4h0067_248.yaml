body:
  text: 兩宋名賢小集巻二百四十八宋陳思編元陳世隆補翠㣲南征録七華岳上詹仲通縣尉二首松竹不著花宻葉徒如帚紅梅不著葉寒花綴枯朽獨有龍焙茶花葉秀而耦氷霜著羣木凍死十八九惟此百草靈名可綴三友春雷迸雀舌夜雨滴龍口皆萌哺啜心誰假栽培手惟有秦端明識之在蒿䔩移根入北苑金碧煥星斗夸作龍鳳團封成獻元后問花何以報牙舌丼鼎臼他時子復生為公滌煩垢西風捲荷衣被破不成幅清霜折蕙囊冽冽已成蓿如何獨東籬黄華笑寒菊物之有盛衰循環若推轂世事良亦然亦豈物所欲金鈿鎔落日零露洒寒玉人皆惜芳菲誰復念幽獨惟有陶淵明殷勤費培沃簮花從帽落撚酒醉商陸從此擅秋芳美桂非同録問花何以報剪首薦􅌬醁他時更粉軀為公明眯目月巖六丁一鑿空雲烟滿窟勒馬驅神僊氷輪推出月中月玉斧劈開天外天便把嫦娥騎綵鳯却呼羽客烹銀蟾更邀王母瑤池酒今夜廣寒同醉眠九日木落西風黄葉飛子卿無信雁來遲凄凉自笑劉思父忼慨難追杜牧之歸興十分濃似酒愁腸一縷亂如絲慿君細把茱萸問此㑹明年健有誰戯呈趙可父少年場屋擅詞鋒審讞無私只奉公夜月蘭宫無宿曜秋霜蓮幕有春風明堂難毁周公制鄉校猶存子産功文徳自來能服逺更煩劉向為和戎挽呉夫人夫人少師孫女居蜀適王氏卒年十六葬于舒仙姑之山驂鸞不是厭塵凡王母瑤池促駕還家在兩三千里外人生一十六年間好隨神女逰舒水難伴文君歸蜀山試向仙源問消息桃花零落水潺潺岩桂落英淨埽庭堦襯落英西風吹恨入蓬瀛人從紫麝囊中過馬踏黄金屑上行眠醉不須鋪錦褥研香還解作珠纓宫娥未許填溝壑收拾流酥浸玉罌牢城述懐江外音書久不來重城昏鼓又相催眼前螢掣簷前電耳底蚊轟屋底雷乃事類棋方入局此心如火已成灰慿君試問呉元白老冠東川回未回重午虎眼龍鬚午未乾楚臣遺淚尚潸潸梅天有雨金丸重麥地無風翠浪閒蒲解梟風豈梟賊符能驅祟不驅姦一樽菖酒呼天問何事男兒鬢漸斑書堂遇雨風叠雲成片溝槎水作層濕書移案避添硯就簷承瓦擊聲疑雹牕低暗欲燈須臾西漏日晴意慢闕勝南浦客邸南浦半月雨溪流暗没沙㫁橋虹散綺拍岸雪飛花孤館客無夢短篷人未家何如擁紅日照我上筠車借景樓朱箔鈎新月平䦨架落霞百錢呼酒炙四壁聴笙笳翠映誰家竹香飄何處花功名未歸我且此寄生涯舂夫秕糠粒粒裹真珠玉杵舂來白有餘待問嫦姮借金鼎等閒令汝作蟾蜍花村問宿花村喜有餘已拚花下倩人扶牧童不見枝頭杏空向青帘問有無夜宿花村不見花數間茅屋瞰溪沙山翁不是通名姓幾誤河陽令尹家午枕三盃未醒復三盃醉眼朦朧劈不開急辦籐牀并竹枕要隨蝴蝶到蓬萊香篆擊覆雕盤一擊開星星㣲火自徘徊還同物理人間事歴盡﨑嶇心始灰有觸述懐英雄還要識英雄不識英雄總是空投鼠在人當忌器見鴻非我獨彎弓情從忠佞分輕重事戒恩威戾始終説與翠㣲休截截三緘從此更須工岩桂西風吹老碧蓮房萬壑風流折麝囊漫與籬花争曉色肯教盆蕙壓秋芳月中有女曾分種世上無花敢鬭香要識仙根迥然别一枝開傍郄家牆偶成一别京華近十年此心無日不悠然嗅梅得句天然巧把酒開懐地自偏鐡硯不須兵十萬銅盤何用客三千功名自有風雲㑹不遇風雲每自煎寄王士貴畫橋相送百花春轉眼孤鴻逐㫁雲别後有誰能顧我客中無日不思君風前花影常興念月下桐聲乆不聞見説近來多好况一書無惜寄云云發書與幼弟及坦齋風烟世事不堪聴勿謂封侯勝白丁老眼隔年新舊厯歸心連夜短長亭一聲蜀鳥驚蝴蝶十幅蠻花寄鶺鴒更向坦齋夫子道近來雙鬢已星星寄王清之封書漢上寄清之却恐清之漢上歸千里漫懐明月共寸心常伴白雲飛湘妃有淚能斑竹周士無心戀采薇安得一緘飛海嶠與兄聨轡上淮淝感應王祠如神正直䕶縲囚當代公卿總合羞疏紙未燒謀已遂爐香方爇病先瘳乞靈屢假三更寐釋縛當封萬户侯待得有勲書竹帛一封當為薦宸旒寄張舍人萬寃無計就亨衢三尺金科漫巻舒公不戴星馳駟馬民將指日就枯魚黄堂宴妓不加意丹陛慮囚空有書見説羣烏廣瞻聴如何公論尚躊躇新市雜咏十首雲鬟烟鬢縷雙鴉一搦宫腰栁帶花試問行雲何處覓畫橋東畔是奴家翠翹佯醉倩人扶約我文君賣酒壚解珮向人陪笑問一盃容妾佐樽無恰把青荷插髻鵶嗔人偷眼過窗紗一盤珠翠俱抛擲却向枝頭摘杏花遲遲蓮漏不相催亭館無人午夜開風欲捲簾花影動夢魂疑是故人來小橋相見便相親猶帶西湖陌上塵欲買一樽聊欵曲歸遲還怕小蠻嗔不帶冠兒不插花過門佯把扇兒遮嗔人貪數天邉雁失記回頭喚喫茶青衫搵淚向人啼妾本秦樓浪子妻流落南州歸不得青樓今在畫橋西一年不訪李紅娘今日過門意已忘嘶入畫橋東畔路紫騮猶記舊垂楊花牋得得寄瀛洲約我今宵特地留好笑蒼頭迷去路緑楊無處認青樓朱門粉壁謫仙家栁外鞦韆襯落霞一澗碧雲流不去木蘭舟繫木蘭花嘲賀將仕二首花何太喜誰能賦葉是良媒解寄詩但覺人間傳盛事不知天上集佳期吾身西圜拘猶少君腹東牀坦已多我欲屠牛窮建節君從歡讌小登科冬晴臈月南州不類冬梨花飄粉小桃紅未曽飛動遙山雪早有春三二月風夢謫仙夢駕白雲參謫仙謫仙留賦白雲篇醉將隻手拏虹筆便扯青霄作綵箋呈毛南仲暮宿東溪一草堂倦和衣履卧胡牀夢隨鸞去遼天濶夜到鷄鳴剗地長早起不煩禽屢喚多憂誰謂草能忘清閒却媿毛南仲醉卧西窗一枕涼除夜二首纔辱東皇造化工便隨飛鵲報簾櫳人間狴犴知無所天上蓬萊還有宫酒色半澄春後緑蠟花全折夜來紅從今泰道能連茹願駕蒼蟠躍震風呉鈎不是怒鯨鯢夜半劉琨屢舞鷄十載載春㳺太學二年年夜宿圜狴楚盤未必資毛遂周粟如何飽叔齊塵世功名倘來爾無言桃李自成蹊呈富大卿司晨未曉報龍樓昨夜中天貫索流石父不逢齊國相馬遷空作漢家囚銅壺滴碎短長夢鈴索拽翻新舊愁安得君王賜歸騎一廛投老大江頭雪中呈劉子沖朔風捲水入天衢剪作飛花散六虚竹本無聲縁葉宻梅因有影怕花疎路從玉鑑上頭過家在氷壺裏面居欲作一詩撩謝女不知為况近何如再還建上舊居門外梅花拔復栽回時春去去春回兒童拍手應相笑歸去賈生今又來兩宋名賢小集巻二百四十八
