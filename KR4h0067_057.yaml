body:
  text: 兩宋名賢小集巻五十七宋陳思編元陳世隆補漫園小藁王琪字自君玉岐公珪之從弟也兒童時能為歌詩第進士調江都主簿上時務十二事仁宗嘉之歴修起居注鹽鐵判官判户部勾院知制誥會奉使契丹因感疾還上介誣其詐謫信州團練副使久之以龍圗閣待制知潤州徙知江寜先是府多火災或託以鬼神人不敢救琪召戒邏者作賞捕之法未幾姦人誅之火患遂息復知制誥加樞密直學士知鄧州徙揚州入判太常寺又出知杭州復為揚州潤州以禮部侍郎致仕卒年七十二琪性孤介不與時合數臨東南名鎮政尚簡静每疾俗吏飾厨傳以沽名譽故待賔客頗濶畧間造飛語起謗終不自恤葬扵真州詔發真陽卒䕶其窆葢異數也秋日白鷺亭向夕有感白鷺敞西軒檐宇窮爽塏千峯若連環翠色不可解是時天宇曠六幕無纎靄金斗熨秋江素練横衣帯乾坤清且斂氣象朝昏改蘆花作雪風飛舞來滄海九霄汀鷺起萬里檣烏快月上三山頭鳥没横塘外蒼茫洲渚寥錯落星斗大開尊屏絲竹披襟向蕭籟余生本江湖偃蹇欣所會清興雖自廢苦嗜亦吾累魚龍慿夜濤四面忽滂湃安得燃犀燈煌煌發水怪咏玉蘂花玉蘂生禁林地崇姿亦貴散漫隂谷中蓬茨復何異清芬信幽逺素彩非妖麗蒼煙蔽山日瓊瑶為之晦嵗久自扶疎岩深愈凝邃請觀唐相吟俗眼無輕視九曲池越調隋家曲當年亦九成哀音已亡國廢沼尚留名儀鳯終沉影鳴蛙秪沸聲凄凉不可問落日背蕪城金陵賞心亭千里秦淮在玉壺江山清麗壯吳都昔人已化遼天鶴舊畵難尋卧雪圗冉冉流年去京國蕭蕭華髪老江湖􅋊蟬不會登臨意又噪西風入座隅吳中曉寒曲大澤穹天莽同色碧瓦閶門曉花白石岩左右斷行人洞庭一夜氷千尺曾持漢節單于壘北風如刀割人耳知憐凍足苦雙摧一生不向遐方履慿誰贈我紫衣裘中吳風土清且柔令嚴氣正天地肅長歌白苧臨寒流玉蘭酒熟金醅溢太白連雲尚殊闕書忩半掩晝始開幾日紅梅斷消息清輝殿觀唐明皇山水石字歌皇家四葉恢聖功天臨日燭清華戎漢條静治洽柔教老心稽古開神聰有唐英主稱好文仙毫灑落驅風雲壯哉山水有竒字煥乎八法存翠珉自從棄置咸陽道蘚駮煙滋委宫草天開神賛會休辰甄收再作皇居寳如何淪棄三百春迎逢睿鑒來紫宸奎鈎粲粲光華動羣玉森森氣象新丹籞春妍瑞靄深文梁藻棟結芳林鴻翔鳯翥徑方丈杯流泉湧䝉親臨鯫臣榮幸從金輿鉤婉魂驚拭目初多慙攬筆非清藻唯慶千齡際帝圗無絃琴寂寞之淳音其為樂至深應嫌鼓腹者獨自撫絃琴答永叔問班班疎雨寒無定皎皎圎蟾望欲闌應在浮雲儘深處更慿絲竹一催㸔紅梅館娃宫裏舊精神粉瘦瓊寒露蕋新園吏無端偷折去鳯城從此有雙身兩宋名賢小集巻五十七
