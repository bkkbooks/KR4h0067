body:
  text: 兩宋名賢小集巻九十三宋陳思編元陳世隆補姑溪詩集李之儀字端叔滄州無棣人元豐中登進士從蘇軾於定州幕府厯樞密院編脩官通判原州元符中監内香藥庫御史石豫劾其不可以任詔勒停徽宗初提舉河東常平坐為范純仁作遺表編管太平遂居姑孰自號姑溪老農久之詔知唐州終朝請大夫有姑溪前後集合編二十巻送李仲益赴豪梁司户炯然五府不受塵深山大澤猛虎蹲豫章千尺若可抉滄溟萬里疑平吞秋天一鶚禰正平人物南川龎士元莫詠豪梁好風月當知猿臂出吾門晚歩汴堤始見春色次夜與蔡彦規鄭希仁同飲進奏官舍昧日行河堤柳色緑如埽只疑晚烟罩寒林細㸔始知春已到春來本不與我期病中蹉却春來時塵埃雨過風不起但見紅紫咄咄陵髙枝年年見春隨分喜今年見春略無意泊然相遇等幻化况是客愁如夢裏前年隨春入都門去年探春海上村今年作客還到此萬里漂浮誰與論故人邂逅羅酒樽白髮相逢情更親身世﨑嶇有底急終日裂臍如歸雲倚門㡬夜環連夢勃窣稚子行逡廵扁舟早晚東南奔車馬紛紛愁殺人藏雲山居鳥語晚更好山風秋轉凉心閑日自永簟冷夢尤長赤薦新春稻清添舊䕃香此身歸有地去路尚何方雨後山尤好秋來方此時心清覺老健歩懶欲歸遲林響驚鼷䑕風閑呌畫眉善人吾豈敢去此尚何之題張約之長春閣江山信美亦人同寒暑隨時興易窮寓意果能超物境養花長欲占春風何須戸外屨常滿自樂尊中酒不空可笑道人猶有恨一畨紅盡一畨紅後圃鵓鳩呼婦天欲雨杏子退花鸎未雛庭前已覺緑半毯波面忽有紅雙鳬芳物戀客不忍去主人好賢誰復如㑹應百歳享此樂何妨畫作重屏圖謁李太白祠愛君獨酌板橋句想君不向嵇山時千載風流同一轍孤墳數尺埋蒿藜文章誤人豈當日聲名雖好終何為譬之花卉自開落又如時鳥啼髙低行吟漫葬江魚腹鵩來空賦予何之君不見吾腰恥為小兒折或車或棹聊為期又不見嬴顛劉蹶不到耳採花摘實相維持春寒漠漠青山路厚顔已覺歸來遲一㕓尚冀容此老與君朽骨分東西宿大乘贈初燈倦游知止未知還平日生涯只在山金碧喜逢雲外境文章重見管中斑篆烟縈曉留無寐寶鐸吟風笑不閒他日歸棲雖有地勝遊終寄夢魂間宿青山坊君錫館置甚欵時方興玗命駕追彭澤開懐得士龍殘寒偏惱客小雨未妨農已幸同歸轍何勞更賃舂川原如故里疑是舊栽松謝陳無已相訪下直來天祿柴荆故逺求論心日恨短歸路雨何憂紅葉繽紛晚黃花爛漫秋㑹須尋此况擊節再相酬書長千僧房異日延禪地今朝選佛塲真身瘞堅固層級韻琅璫雨灑家家潤燈傳處處光曽將一則語要路截諸方賞心亭賞心亭角倚欄干虎住龍蹲自屈蟠無復埋金銷勝氣空餘飛鷺識前灘百年名在人何處萬里潮平雨送寒㡬向後庭更白紵不堪殘照下魚竿次韻東坡還自嶺南憑陵嵗月固難堪食蘖多來味却甘時雨纔聞徧中外卧龍相繼起東南天邊鶴駕瞻仙袂雲裏詩牋帯海嵐重見門生應不識雪髯霜鬢雨毿毿題歩雲亭昨夜風高蟬半咽起來知是白露節玉面少年窄袖衫袖裏新詩似氷雪㡬日炎炎如甑中今朝忽覺超樊籠不惟氣候已八月更得氷雪開心胷謝公山人詩筆竒問君何縁得此詩報我我欲歩雲去山人許我因留題君作斯亭㡬許高擬推皓魄飜銀濤誰謂姮娥落君手坐遣山人詩思勞君不見梅老句出天地窄曽謂山人真太白采石月下憶相逢笑披錦袍弄明月十年明月歸謫仙姮娥豈得在君邊何妨邀取山人去卒嵗扶携醉笑間題山堂二年江南客對面不見山負我愛山心兀兀塵埃間一聞説山心便喜欲挿修翰遽飛起君家乃是山中居永日青山同徙倚流泉涓涓薜蘿暗明月時時窺枕簟三伏清霜帯雪來不㫁烟雲擁欄檻只恐居山興易䦨萬壑波濤翻等閒知有心期難得否憑君借與畫圖看濟上閒居閉閣焚香萬慮澄莫云身似打包僧功名了未榮三事理性容先契一燈丹竈鶴歸休炷火茶甌客訪旋敲氷倦來却有登臨興上徹層樓最上層次韻參寥杜孝錫君不見深山窮谷千丈潭懸崖絶壁倒挂松雷霆雨電有時一洒遍八極繁霜雪霽能邀夜月來高穹又不見江頭龜手洴澼絖裂地得侯終有逢長安大雪㡬千尺高卧不愧衣玲瓏揖人而相若反掌登天有路非難通天之可上勢或便得相乃在須臾中朝冠貂蟬暮徽纆曲肱何在三千鐘方東遽北安足究豈異海舶隨狂風舞雩而詠吾與㸃坐中客滿誰知融屹屹杜夫子靈芝翳深叢百年轉盻皆腐朽且將逸駕聊與同我慙圭觚刺人眼空向霜天望飛鴻宿采石江聲隱隱風前恨鴈陣喧喧枕畔愁更覺孤衾如潑水始知今夜宿山頭昨日偶到北觀䝉君俞元載元發明叔惠然見過勝日欣相得曠懐誰與同如何四君子肯顧一衰翁林杪收殘雨簷牙逓好風歸時不須問更待月如弓和錦繡亭漂泊生涯寄一萍勝逰長記錦花亭山來已訝天能巧春到方知地更靈雖許登臨追曵尾却應顔色未忘形何妨共保千年約白㡌回頭笑管寧送陳瑩中及第歸洪州七月江南秋已到江水如天魚尾掉處處團橘欲黄時家家門前艤歸棹西山佳氣徹青雲潘郎門巷如深春陳家有兒新及第就著恩袍歸拜親為報行人洗眼看養兒如此誰不羡願兒不要重科第事業功名他日貴送鄭彦莊酌君白玉杯送君正黄梅長安風沙眯人眼君行暫詣黄金䑓劇辛巳老樂毅去荆棘平地多龍媒九重深沉四海逺快便誰許叅雲雷黄金䑓髙不易上并州雄節㡬塵埃當時勲業皎白日餘風表表皆雄才龍晴豕腹實異相肝膈上下羅瓊瑰丹青萬物大門壻妙論爾汝無嫌猜同時舒巻一門盛將見烈火生寒灰十年卑飛不足歎青雲自此亨途開我暫追隨極天末有酒取醉長追陪離亭雨足緑蔽眼健㠶危挂寒風催黄金䑓不知幾千尺勸君窣衣直上首莫回時和嵗豐亦足被君賜何須逺過青山隈走筆贈報寧老半山老人筆如椽落筆直欲拏雲烟東亭右軍不復見龍跳虎卧誰争先姑溪六月汗流水邂逅清風頓如洗他時問法到山前應許神光得吾髓次韻俞希賢大暑家居寄天寧二老静退陶彭澤風流支道林論歡雖暫阻投分本來深客舍汗如洗僧軒雲正隂莫因俗眼礙終負勝逰心無題邂逅俱青眼招携媿白頭穿林猶畏日坐石忽驚秋不作﨑嶇倦㡬成汗漫逰臨分懐杜老月湧大江流歩武高低外生涯夢寐中不知三徑足信是一生窮觸目如逢舊隨縁似有功便應叅羽翼何異注魚蟲軒廡千尋碧江山一抺紅㣲吟接僚友健啖趂羣童戀别猶能暫論懽昔已通更憑將此况逺問霅溪翁傳子昌歸興州嘉陵江水接天流州據江流最上㳺惜昔練衣隨䟦馬而今白髪任虚舟慶門譽望聞來久塞路殷勤得暫酬見説明朝却西去長亭揮手恨無由次韻題隱居巖隱居何必在山巖境界全歸指顧間能把軒裳為外物便應風月勝酡顔地連紫禁千重䆳石繞清泉五色斑從此夢魂猶可到定知衰廢不容攀送馮子莊赴秦州將官述其督詩之語以廣篇首我詩易得君休嘆君節難攀我自知問㑹但嗟歸有日奏功方看獨先時簫笳部曲催驕馬綿繡山川入綵旗莫訝黄金偏滿手平生慷慨是男兒離宣城倦客登舟際江城欲暮時恨長山自逺心速棹歸遲村市明魚火嚴城起鼓鼙詩成真有助新月上天涯送芝老江頭春色已可掬風雨惱人常不足筆力俱來紙上春墻外落紅争蓛蓛忽然别我下廬山蓮社風流指顧間為我寄聲陶五柳少留佳處共追攀贈劉九思山人我行亦偶然君來定何謂風髙浪如山聞者亦已畏而君從一葉過我乃特地郵亭六日俱臨别尤自媿朝出纔辨色夜歸或霑醉殘燈不見人待我獨昬睡語欵多破顔情極㡬屑涕屈指再相從便作新井計我擔既弛肩君駕亦方稅不覺渉四年俛仰纔一喟每見意每加終始不少替顧匪求名頑豈不懐此義凡生等飄蓬何物非委蛻為我謝故人隨方聊自慰次韻子椿見寄一逢佳節一消魂青徹江山綠滿園又把鋤犂聊自遣却嗟身世獨難論三鍾竊幸資三徑九奏時猶夢九門勝處何能偏見憶便應佳思襲香蓀次韻子椿同關聖源吳思道贈董無求有懐米元章海嶽仙人不我期碧雲幽恨獨心知坐間優孟已難别筆下羊欣更出竒自是人才空立異當知臣叔本非癡重輕到了存公議揮扇何勞強執葵過蒲池寺謁田承君蕭寺經行舊騷人趣尚幽從來不妄許相見苦為愁税駕終何地乗桴可共舟感君詩有味老去復誰求夜行鞏洛道上夜久露華重寒鴉不肯棲月推銀海上斗過玉繩西風脫林衣瘦山擎雲㡌低流螢三四㸃趂隊過前溪題厯陽天慶觀自然菴一日復一日新年即舊年本來無欠少強自起攀縁妙悟通三境清風寄七絃昇騰如未果且作地行仙送宣上人逰方七軸蓮經誦已通定將何事作家風當知法界重重意盡在雲逰歩歩中金臂見時猶是妄玉毫光處未為功路頭全記文殊指須著工夫子細窮題繁川徐氏孝嚴亭欒欒欲報恩嵗月猶過隙常恐寸草暉終負陽和力萬鍾非所養所重在以色庶㡬參與騫不獨暮今昔千尋用或短乃未及咫尺哀哉過隙心淚盡墳草碧坐見食亦覩幽明固無隔烝嘗雖其時要是未為得詩書聖人事力久真自積巻舒豈他人悲孝均我職尚容表龜跌過者必此式長江㑹生塵德澤何可極題白紵山回見黄梅雨後天烟林常在笑談邊早時欲到不自果今日初來端有縁無復新聲傳玉齒空餘殘照滿金田不知誰是雲霞侣聊揖髙風一悵然吕吉甫第乃謝鎮西故居中間常為佛刹而雙檜則舊物也劉夢得有詩因賦其韻故國悲凉古木竒勢分庭下蔚相差霜根半露出林虎畫影全舒破賊旗寶界曽廻鋪地色節旄還映挿雲枝劉郎風韻知難敵儒帥端能表異時戯子㣲兼次韻陳君俞寄題蘭臯和風暖日作霜天冰雪相投豈偶然特枉新詩詠塵迹便同佳趣賞當年學優曼倩三冬足才過荆州十部賢為問醉衾應好在莫教癡望似蠶眠次韻真師移植新竹錦棚方有託粉面轉相疑漸露陵雲節㣲分弄月枝高僧開檻賞野客帯砧移只恐成龍去空來欵此時贈吕煥紅爐歡坐臘燈長豫借春風發艷粧流水落花無限好却應雙鬢恨劉郎李去言相别二年忽得書知在吳中答書偶成宦路相逢一笑休共知身世兩虚舟楚才有用誰青眼趙將無功枉白頭㑹見姓名通北闕何妨風韻冠南州求田接武如鳬鶩只欠元龍百尺樓寄耀州畢九造物于我終何功寓形宇宙一粟同由粟而形則可物自形而我如飄風我初與子未束髪長我一嵗今皆翁間闗世故憂愁集悔不相向但盲聾邇來夢寐亦渾噩無異舩皷撾鼕鼕逢塲作戯固聊爾隨縁應責疇能充邊城氛埃蔽天赤春物豈暇尋青紅頗知别來甚相得共玩雙翠臨雕籠酒䦨起舞屢脫㡌笑指落月如懸銅何當容我作鼎足未易歸馬催匆匆喜客泉取逕輙林莽得地三尺餘名曰喜客泉客至如湧珠初驚一穗起逡巡周四隅酌之甘勝醖瀹茗尤敷腴物理不可詰感嘆常躊躇于焉知福地未易世眼拘雨中自𤓰歩謁寶覺遂約逰黄社寶覺遽有儀真之行雨後獨往夜分方到泥滑路􅮟乗歩相半夢寢東南逰金山居第一泊船瓜州口風雨繫黒日冐雨訪老胡翛然出羅蓽壁間十弟子云是王維筆生者今何在别有一丈室相期同過之佳思久披拂差池成獨往敢惮泥没膝投鞭望横參露重衣如溼方諸湛漏魄指顧盡纎悉目眩神為清壺氷蕩肝膈亹亹相問勞軟語皆中律頗怪不預知有似驚暴客權牙薦爐紅柔脆脩林茁老淚感陸生明盤皎霜橘木魚動曉堂寒星耿南畢百年驚枯槁平日膠在漆幅巾行此時嵗暮悲蟋蟀正旦日大雪過秀州城外聞樂神踏歌打鼓嵗除夜雪一寸許便覺新年喜氣多大觀元年第一日一番勝事信可歌歌不已鼓聲起漫壟連村如市裏更願雪深一尺餘收了去年三尺水宿滴水巖懐趙徳麟和壁間韻瀑水㵼靈竇鏗鏘韶濩音樹深猿嘯月山迥鳥歸林一曲廣陵㪚再歌梁父吟天邊有鴻雁莫寄此時心迎暉閣霜風吹我衣日短歸路長放懐即可家何適非吾鄉稍聞東南隅勝致寓一方超然世外人鷄黍隨低昂簷甍闢無際户牖延初光孰云日月久但知嵗時康每逢㑹心處萬境不得藏何當駕修翰飛雲共回翔淋漓非所期逺目聊倘徉庶㡬蠏眼白打出鵞兒黃張君好藏茶多能識土人嵗入貢必迂路以致其新故名聞江上次韻陳君俞携酒見過野人欣莫逆君子戒多上幸爾違朝市聊復圖蕙帳薄田幾負郭山水分背向巾車俯秋成舒嘯㑹隨仗吾友真可人輕舟數相訪投懐失枯槁達意信揺蕩時哉固難得觸境沉波浪謂我來嵗寒種種不少創杯盤挽氣類論辨極户量敢辭屢舉白自喜老彌壯回頭易陳迹傾倒乃惆悵樂事須勉㫋何適非醖釀兩宋名賢小集巻九十三
