body:
  text: 兩宋名賢小集卷二十宋陳思編元陳世隆補草堂集詠竹杯珓子誰識破筠根還同一氣分吉凶終在我翻覆漫勞君酒欲祈先酹香臨擲更焚吾嘗學丘禱懶把祝云云喜懷古上人見訪隔嶺僧來宿間同倚石樓漏聲過半夜月色近中秋雅道元須到權門險莫遊此心方共識明日更相留村居述懷布褐楮皮冠朝昏信自然眼明山雨後髮亂晚風前鶴病生間惱僧來廢靜眠自知慵懶性至死豈能悛上知府鮑少卿五福三朝客同年想少存立功從太祖卧理見曾孫易進同仁政難休為帝恩權臨二陜重官處九卿尊煙翠甘棠樹風清畫戟門四民潛遂意百吏動驚魂不病輕丹竈無愁鄙酒尊出衙清道路在宅素盤餐上馬身猶健看書眼未昏獄空時擁斾多謝到山村懷寄河中表兄李徴君蒲津棠樹兩間人我恐虛名帝亦聞三世往還為近戚一時遞互喚徴君雖同閉户辭丹詔尚阻連牀卧白雲苦恨中條鎮相隔老來離使轉紛紛送鮑太監赴闕紫詔徴黃下碧虛棠郊人送去何如深疑我后尊三老未許伊川學二疏到想煙霞侵几杖行愁花雨滴圖書歸期野客難陪從空有吟魂逐後車依韻和長安龍圖陳學士登熙熙臺之什二首鶉野龍圖陳學士迎秋登眺稱英竒一聲玉管風流處百尺金臺雨霽時雲近上清爭縹眇山連太白鬬參差碧紗他日愁多少籠得園園寺寺詩臺號熙熙倚半空新秋景少與春同朱衣吏列登臨處百二河山一望中謝大著劉煜寄惠玉箋皎潔分明如我鬢卷舒方正似君心三千里外情多少一幅真堪值萬金送王國博赴江南提刑聖主憂民意過于君自憂一麾常自選八使更親求車馬皆新賜江山半舊遊蠻斿飄後騎水弩下先舟貧愛憐吾道寬思雪楚囚莫忘相送處村店凍溪頭陪留臺李學士筵上賦得文石酒杯得杯字知自何山得磨礲作酒杯斟疑五色動醉認一拳開窪似泉舂出䀶如蘚漬來主人心朴素愛惜過瓊瑰貽司馬池年少老成人林間訪我頻文雖如貌古道不似家貧題柱寧慚祖甘時不為身鼇山將首冠莫嘆尚沈淪寄贈洛下達三藏曾攜瓶錫到靈山古寺歸來洛水邊新譯經文傳北闕舊遊詩句在西天爐中香想十方試籠裡燈應數世傳别有空門難繼處宋尚書序本師編寄長安孫紫微帶掌絲綸出鎮時樂天當日未如之九遷官職光鷗鷺百二山河壯虎貔漢殿舊題司馬賦秦樓新唱舍人詩相思大欲相尋處酒户如何敵酒巵依韻和益州同理劉大著喜與運使薛端公相見之什錦川風物似蓬丘運使詩流壓大流五色雲中題寺觀四時花裏按軍州棠交野客空遙羡蘭省才郎稱共遊縱使謫仙今復出難陪唱和却應愁依韻和酬晦上人見題所居陋巷西鄰召伯祠入城流水透踈籬雨來石室琴先覺春去松庭鶴不知薜荔交加侵甕牖莓苔斑駁繞盆池草堂近日尤增價添得湯休二首詩送王田宰青石縣田字伯元陶潛但植當門桞潘嶽惟栽滿縣花爭似伯元青石去教民先只種桑麻書三門開化院琳師房四邊浪打山疑動寺在半空山頂頭繞檻門窗多晝掩應嫌坐卧見沈舟送王祕丞利通倅閬州想到行仁政民間豈復言寃思雪蜀魄哀欲弔巴猿山水州城僻煙嵐徑路昏遙思上事日正值海棠溫暮春郊居懷李安草屋松篁杪寒多市井間嚴風生北户愛日落南山下第人何處棲林鳥自還琴樽雖在側難以解愁顔送王大博知榮州莫嘆迢迢逺帝京且憐叱馭繼家聲歌鐘竟出棠郊送鼓角應過劍閣迎棕葉帶風驚玉勒梅花和雪照紅旌下車遙想無餘事政譽遙同在陜城依韻和李安見寄三舉休嗟尚陸沈獻書巳得帝知音燒殘灰燼香分玉披盡泥沙始見金思苦任成潘嶽鬢道窮莫動孟軻心公車再召應非晚踈懶尤難卜訪尋劉煜大著忽惠雅章喜懼交集輒增二咏聊以贈酬東觀劉郎一古儒等間簡帖類經書論交不棄如雲客並馬常容似雪驢蝴蝶夢魂知有據鳯凰詔命想無虛翻愁旦暮西垣去難伴王維宿直廬送薛階迎靳察院知心人去野人孤猶賴時時見鳯雛病裏鳯雛辭又去老身縱健不如無又次前韻兼乞鶴君去華亭鶴又殂眼前空見衆禽雛欲憑轉乞為間伴許史多情許我無咸陽道中作渭水凍無波終南翠色多雨臨殘照霽客向故城過驚雁逺猶呌牧童寒不歌心愁人不會謂我欲如何送孫狀元監丞赴闕詔命雖殊異行裝亦等間蓬壺如得路藜杖似歸山赴約過松嶺辭家到竹關從兹位清峻野客轉難攀暮秋懷王專臧奎王衢三從事舊友各西東間思興莫窮盡居花幕下獨在竹林中白屋貧雖異清宵夢想同吟餘遙望處寒雨正濛濛送石太尉移鎮許昌厭居棠樹逺京師新自飛章白玉墀許郡虎符依口得涼州龍節逐身移離聲銀字調家樂行李金函鎖御詩想到即徵歸密地金波亭上不多時送司馬池歸夏臺芳草垂楊弄色初中山酒好想躊躇他時駟馬乘如祖莫忘今朝跨蹇驢雪行溪南一向幾多垂欲咏終難比並伊應似彤庭將御試麻衣羣見折腰時哭岐賁從事君喪重堪悲才高位竟卑寄孤偏屬我知巳更求誰祭德宜修廟傳名不在碑何人與為傳願録野人詩送懷古上人遊錢塘正當搖落日忽憶向江天猿避經行路鷗隨入定船袖攜詩卷重杖揭鉢囊偏約我湖心寺相尋結白蓮悼鶴誰折仙禽足經旬至枉終讐宜天與報恨使我難窮風月猶疑慘園林頓覺空殷勤親起塜只在草堂東送王國博赴江南提刑三首江南按察去如何詔敕雖然密賜多不斷仙舟來往處狎鷗載鶴聽漁歌江南刑省致時和十郡應從宴樂多自有山迎兼水送清音不斷勝清歌江南大半舊經過君稱心多我恨多好景阻陪遊賞處空縈老病動悲歌送李安赴舉野客獲何陳賢侯首薦人俗流寧肯餞良璞不嫌貧棠樹離偏曉函關過巳頻花時好消息佇聽向溪濱醍醐鳥解題兼解酌啼處靜堪聽林下雖沽酒人間最獨醒石泉窺認甕花露飲為瓶翻笑耽杯者還應損性靈寄贈知洋州李澤屯田一種分符命最優翠微深處是洋州白雲繞坐疑山相紅斾隨行表郡侯禪定僧宜陪靜話音聲鳥稱伴間遊更輸屬邑錢希聖四季花前共唱酬三門與臧奎推官聫句題東樓二陜三門境奎江城想未勝野早衙連廟鼓奎夜市雜船燈野乞任多朝士奎忘歸有海僧野東樓仍更好奎欲去又同登野兩宋名賢小集卷二十
