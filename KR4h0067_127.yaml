body:
  text: 兩宋名賢小集卷一百二十七宋陳思編元陳世隆補李方叔遺稿李廌字方叔陽翟人少以文字見知於蘇軾元祐初軾知舉意在必得廌以魁多士及考章援程文以為廌無疑遂以為魁既折號悵然出院廌竟無成而卒有濟南集觀呉正獻真次公不許畫麒麟孝宣妙選知名臣拜公之像想風度乃是雲臺子顔之文孫元豐天子建原廟玉宇萬棟臨端門累朝名臣儼冠劍列聖御坐開乾坤修廊祕殿鎖春色髣髴音容皆駿奔相君相業皆炳炳旂常彛鼎定書勛儀形在殁侍神考英氣噩噩凝天閽嗣皇方思服缺美欲考辟公觀烈文君傳兹圖落人世世人遂得知瑜璠吾知袁公固有後能平楚獄竟無寃召公甘棠猶不伐衛武之徳誰能諼君不見温公之像滿人間願廣此圖令並傳燕龍圖臨深圖燕穆之昔作履薄臨深二圖履薄已進呈仁皇而臨深逸二首下看飛流入碧深崖蒼潭黒徃登臨戰兢欲示為邦慎可見忠臣納諫心須知筆諫似誠懸馳譽丹青詎等閒嗟爾畫師閻立本一生虚老寸毫間王摩詰曲江春遊圖咸雍山川互王霸涇渭為隍城塹華曲江臺沼備豫進祗與畫師供入畫長安城西山萬重昆明烟浪繞新宫新蒲細桞春風裏萬户千門佳氣中我生不及開元時猶喜此圖今見之蒼莽烟綃横短幅眼中終南倒溪渌傾城士女巷無人三月三時曲江曲老稚妍媸賤或貴來者攜壷歸者醉筆端造化有能事各有人人樂游意如今此地空塵迹石鯨縱在如銅狄宜春五作更蕭條無復缺中得遺甓我願吾生明六符不蹈漢唐耳目娛池籞假民任畋漁無令畫師為畫圖書侍兒小瑩帬帶旋剪香羅列地垂嬌紅嫩綠寫珠璣花前欲作重重結繫定春光不放歸驪山歌君門如天深九重君王如帝坐法宫人生難處是安穩何為來此驪山中複道連雲接金闕横觀隱隱横翠紅林深谷暗迷八駿朝東暮西勞六龍六龍西幸峩眉棧悲風便入華清院霓裳蕭散羽衣空麋鹿來遊墟市變我上朝元春半老滿地落花人不掃羯鼓樓髙挂夕陽長生殿古生青草可憐呉楚兩醯雞築臺未就已堪悲長陽五柞漢幸免江都樓成隋自迷由來流連多喪徳宴安鴆毒因奢惑三風十愆古所戒不必驪山可亡國文選樓申轅應楚聘鄒枚適梁苑藩侯喜賔客賢賢易鷹犬黄綺遊漢庭羽翼矰邀逺秦府十八公攀附名益顯昭明衆才子文囿俾蒐選髙齋切浮雲雉堞俯清巘尚應愧兩一作河間筆削非大典兩宋名賢小集卷一百二十七
