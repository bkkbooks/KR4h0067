body:
  text: 兩宋名賢小集卷七十九宋陳思編元陳世隆補石曼卿集石延年字曼卿先幽州人晉以幽州遺契丹其祖舉族南走家宋城延年跌宕任氣節為文徑健於詩最工且善書真宗録二舉進士以為三班奉職延年恥不就張知白數竒之曰母老乃擇祿耶延年不得己就命厯太子中允同判登聞鼓院嘗上言天下不識戰三十餘年請為二邊之備不報及元昊反始思其言召見稍用其説延年喜劇飲嘗與劉潛造王氏酒樓對飲終日不交一言王氏怪其飲多以為非常人益奉美酒希果二人飲啜自若至夕無酒色相揖而去眀日都下傳王氏酒樓有二仙來飲己知劉石也延年雖酣放若不可攖以世務然與人論天下事是非無不當年四十八卒官其一子當時有釋惟儼祕演者並工詞章負氣節隱於浮屠與延年友善歐陽修當稱為竒男子云瀑布飛勢挂嶽頂無時向此傾此句一作明珠萬斛傾玉虹垂地色銀漢落天聲萬丈寒雲濕干巖暑氣清滄浪何足羡就此濯塵纓咏春一氣回元運恩含萬物深隂陽造端數一作造化首天地發生心有信來還逝無私古到今和風激遺暢南轉入薰琴曹太尉西征仁者雖無敵王師尚有征獨乘金廏馬都領鐡林兵肅氣關河暮屯煙部落晴旗光秋燒合甲色夜江橫士喜擊中鼓軍疑聞後鉦無私乃時雨不殺是天聲濯濯前誰拒堂堂彼自傾寒踰博望塞春宴隗囂城外使戎心伏旁資帝道平公還如畫像為贊學班生贈劉潛歸陶丘丈夫未大用身與仁義間可宜更聚散風塵摧厥顔君今歸柯澤路出梁宋間芒碭有吾廬親老待我還羡子先諧願思親頭鬢斑韶光苦不再溝水長潺湲金鄉張氏園亭亭館連城敵謝家四時園色鬬眀霞窗迎西渭封侯竹地接東陵隱士瓜樂意相關禽對語生香不斷樹交花縱遊會約無留事醉待參橫月落斜秋夕北樓秋霽露華清帶水月眀天色白連河夜闌澄景生微動瑟瑟層颸上下波小桃生色深紅綬帶長宫簾間在井欄香母家升上瑶池品先得春風半面粧送人遊杬激激霜風吹黑貂男兒醉别氣飄飄五湖載酒期吳客六代成詩倍楚橋水荇漸青含晚意江雲初白向春嬌前秋亦擬錢塘去共看龍山八月潮春日樓上水樹春煙重庭花午影圓人邊無限地鳥外有餘天春隂寒食少天色春風多栁花倚樓心目亂不覺見棲鴉榴花王母庭前親見栽張騫偷得下天來誰家巧婦殘針線一撮生紅尉不開贈劉潛歸陶丘春老有時回人老不再少草自有時榮髮白不再好人生不如春髮生不如草可堪送别春草前青春未老人先老偶成力振前文覺道孤恥同流輩論榮枯動非仁義何如靜得見機關不似無孔孟也應輕管晏臯夔未必失唐虞侯王重問吾何有且自低心混世儒首陽夷齊在孟津諫伐紂而死于首陽其山在蒲乃舜都也豈非二子之意何古人之所不思哉遜國同來訪聖謨適觀爭國誓師徒恥生湯武干戈日寧死唐虞揖讓區大義充身安是餓清魂有所未應無始終天地亡前後名骨雖雙此行孤寄尹魯師平陽會中代作十年一夢花空委依舊河山損桃李鴈聲北去燕南飛髙樓日日春風裏眉黛石州山對起嬌波淚落糚如洗汾河不斷天南流天色無情淡如水按古今詩話曼卿死後數年關永言夢曼卿曰延年平生作詩多矣嘗以為平陽代寄篇最得意而世人少稱之能令余此詩傳於世者在永言耳永言乃增其詞度為迷仙引曲於是人爭歌之他日夢曼卿致謝焉題趙平叔豹隱堂在漣水郡熊非清渭逢何暮龍卧南陽去不還追美二公今郡守蔚然惟在立談間登第後被黜戲作無才且作三班借請俸爭如録事參從此免稱鄉貢進且須走馬東西南按詩話曼卿登第有人訟科場事覆落者數人曼卿在焉方興國寺剋期畢集追所賜敕牒餘人皆泣而起獨曼卿解靴還使人露體戴幞頭笑語終席次日放黜者例授三班借職戲作此詩大抵皆縮下語耳過內官孫可久别業賦贈南北占河潤幽深在禁城疊山知逺意辭俸買間名閉戶斷蛛網折花移鳥聲誰人識髙趣朝野石渠生再咏小桃本分桃花寒食前小桃長是上春天二喬二趙俱傾國女弟嬌強意自先古松直氣森森恥屈盤鐵衣生澀紫鱗乾影搖千尺龍蛇動聲撼半天風雨寒蒼蘚靜緣離石上緑蘿髙附入雲端報言帝座掄才者便作明堂一柱看籌筆驛詩漢室虧皇象乾坤未即寧姦臣與逆子搖嶽復翻溟權表分江域曹袁鬬夏坰虎奔咸逐逐龍卧獨冥冥從衆非無術欺孤乃不經惟思恢正道直起復炎靈管樂韜方略關徐駭觀聽一言俄拜至三顧已忘形南既清蠻土東期赤魏庭出師功自著治國志誰銘歷劫兵如水臨機䇿若瓴舉聲將漬敵橫勢欲逾陘仲達恥巾幗辛毗嚴壁扃可煩親細務遽見墮長星戰地悲陵谷來賢賞德刑意中流水逺愁外舊山青想像音徽在侵尋毛骨醒遲留慕英氣沈歎撫青萍兩宋名賢小集卷七十九
