body:
  text: 兩宋名賢小集巻十一宋陳思編元陳世隆補寇萊公集春日登樓懐歸髙樓聊引望杳杳一川平逺水無人渡孤舟盡日横荒村生斷靄深樹語流鶯舊葉通清渭沉思忽自驚秋思秋氣動天地恍然情未窮故園應墜葉昨夜又西風白草侵危堞寒濤接逺空耆頥當此景無語夕陽中再歸秦川阮路何方盡西歸興未勞河流經陜狹山色入秦髙返照明秋壘孤村接暮濤還如丁令至故里滿蓬蒿秋夜獨思勉詩友西風驚萬木危坐思悠哉故國經年别秋鴻半夜來人應多棄善天豈不憐才休學嚴夫子荒凉老釣臺長安書事一從洛邑移秦甸三見東郊綻早梅蓮府晝閒鈴閣閉栁營春暖射堂開齋壇首冠慙諸將相印兼營接上台何事燕公輕仗鉞却言方閫是麄才重陽登髙偶作務閒留上客佳莭值重陽㫖酒浮仙菊清歌遶畫梁髙城明落日疎樹覺㣲霜且盡登臨興餘懽尚未忘塞上春風千里動榆塞雪方休晩角鼓聲起交河氷未流征人臨迥磧歸雁别滄洲吾欲思投筆期封定逺侯寓居有懷時年十四疎林頻落葉孤僻繼離騷獨坐聞鴻逺閒吟見月髙梦迴更自永思苦夜何勞寂寂西郊内披衣聴海濤重到進公院五年重到支公院物態人情盡不同惟有寒檉暗秋色依然蟬噪夕陽中野步幽景恣追尋遲遲傍栁隂静思非世務孤立是閒心村逈遥峰出溪明返照侵片沙招野步白鷺伴髙吟積雨迴塘漲㣲晴叠翠深春鳩鳴古寺烟草入平林迸笋行無定飛花勢不禁凝然客亭上鄉思獨沉沉秋日原上蕭蕭古原上景物感離腸逺嶠收殘雨寒林帶夕陽溪聲迷竹韵野色濕秋光吟罷還西望平沙起雁行江上晩望懐所知遲遲迷逺信閒立大江隅逰子在何處秋風吹五湖潮迴沙鳥聚岸闊釣船孤歸去還堪嘆田園半已蕪秦中感懐寄江上知己念子隔江海浩然時已秋蟬鳴闗外樹人在水邉樓髪白猶搜句時清尚旅逰遥思當永夜不寐向孤舟水村即事虛齋臨逺水吟釣度朝晡葦㟁秋聲合莎亭鶴影孤片雲藏叠巚野燒起寒蕪獨步時吟望離人隔五湖暮秋感興苒苒前期逺窮途一可傷有時聞落葉不語立殘陽塞草秋先白溪沙晩更光那堪望天末燕雁又成行秋夜感興寄呉順之耿耿不成寐楚鄉經暮秋故人遥海嶠寒月滿江樓閉户生蒼蘚安閒到白頭如何太平日獨不出汀洲夜坐有懐寄張士遜清秋吟更僻况復古亭間少夢蟲聲碎無風樹影閒月華澄曲沼霜氣滿空山不見張夫子何人共往還送人下第歸吳鶯老計還失負書歸故鄉杏園無近路澤國有髙堂白鳥迷幽浦寒猿呌夕陽離懐休墮淚春草正茫茫秋訪江上友人所居苔石半寥落坐來思逺愁故人應罷釣寒葉自驚秋村隔平沙暝江和暮靄流徘徊不能去此去有扁舟冬夜旅思年少嗟羇旅烟宵未進能江樓千里月雪屋一龕燈逺信憑邉雁孤吟寄嶽僧爐灰愁擁坐硯水半成氷貽趙州府夫君何感命十載困風塵薄宦須流落孤吟更苦辛山寒泉易凍邉近草難春珍重常招隠慙非孟子卿春日懷張曙時年十六不見張夫子岩花幾度新久閒空賦命逺别更傷春雨艇秋天末烟蓑隠渭濵應嗟年未冠已作異鄉人初夏雨中緑樹新隂暗井桐雜英當砌墜疎紅重門寂寂經初夏盡日垂簾細雨中感興寄蓮嶽一二詩禪友西風傷逺别前計竟成非芳草此時暮故山何日歸禪應同雅道貧合長天機翻憶雲溪伴無聊對落暉贈隠士夫子才名重貧居志未勞吟當寒夜苦閒到白頭髙心地通禪寂田園近海濤不知千載後誰更續離騷湖上作極目望南浦望中生逺思雁沉芳艸渡燒斷夕陽陂嵗月寒萍梗江山念别離泊餘清夜夢暫與白雲期有懐秦川春婉娩漢水路迢遥不待凭危檻離魂已暗銷送李生歸秦中酒闌還執手之子擬歸秦風雪過殘嵗山川近早春久逰詩思苦逺别栁條新後㑹知何日空餘淚滿巾書懐寄韋山萬里不闗慮孤吟役此生風騷中㫖趣山水裏心情衆木彫寒色空江噴暮聲終期謁君子同遶緑苔行閒夜圍碁作歸山終未遂折桂復何時且共江人釣松軒雪夜碁紙鳶碧落秋方静騰空力尚㣲清風如可托終共白雲飛春雨散亂縈花塢空濛暗栁堤望迴腸已斷何處更鶯啼夜坐懐故友西風起窮巷衆木又彫零蕙浦月華白竹忩燈影青故人難重見鄰笛不堪聽行傍秋池上孤吟對逺星南陽道上各賦玉蝴蝶花一絶堪賞東君造化竒妝成蝴蝶滿纎枝粉融輕翅攅香蘂疑是尋芳未去時鄴北旅中懷友人浮世多塵事悠悠難定期夢闌懐逺夜秋盡望鄉時道在應無悶風澆自業詩何嘗歸釣渚搘肘一沉思弔任瓘處士一生長抱恨終亦是貧居遺信留孤鶴營墳賣古書竹齋無俗物秋圃有寒蔬福善何言昧超然望太虚秋懐落日流不住黙然空淚零敗莎侵陋巷疎葉滿閒庭有趣窮風雅無機敵杳𠖇浮榮安足戀歸去亂山青送友生下第南歸頻頻退禮闈此去欲忘機霄漢貧難達江湖老獨歸程遥秋浪叠村暝夜燈㣲應便為儒者翻悲古業非邉城春望獨望原西路離襟倍黯然青山遮故國絶塞度新年風聚沙迷岸烟開燒滿川歸心正無際驃騎莫留連草獨步髙原上依依動所思無人尋蕙徑落日滿江湄楚澤晴芳處秦川晚翠時此中興廢事千古復誰知送左眉州之任分官離法署承命守眉州山館鄰孤寺春程過亂流江雲長映日蜀魄似悲秋到郡揚清政遺黎病必瘳楚江夜懐西風生逺水蕭颯度吟臺明月夜還滿故人秋未來寒蛩啼暗壁敗葉下蒼苔誰念空江外年年首重迴春日書懷曽讀前書笑古今恥隨流俗共浮沉終期直道扶元化敢為虚名役片心黙坐野禽啼晝景閉門官栁長春隂世間事事須先退不待霜毛漸滿簮離京日作離歌豈忍樽前聽别恨無由醉裏消余久不飲故有是句惟有梦魂歸此闕不知京洛路迢遥夜泊江上嵗莫峽中村維舟古樹根羣峰初落日夜後獨聞猿流水自無盡客愁那可論平明離楚岸迢逓指吳門新蟬寂寂宫槐雨乍晴髙枝㣲帶夕陽明臨風忽起悲秋思獨聼新蟬第一聲寄獻廣南許虞部南國江山五十州星郎從此播芳猷詩窮雅道皆清唱官重名曹未白頭望斷蠻村烟樹逺吟殘嶺月海風秋三年政滿迎丹詔諫署重膺仄席求送吉上人新鴻并落葉正逐朔風飛此地仍分首何山是所歸問程雲棧逺宿館雨燈㣲莫恨天涯别重尋志未違秋夕書懐官路時風漸識情一悲前計逺愁生深秋寒氣侵燈影半夜疎林起雨聲縣印終年拘吏役烟蓑何日避浮名窮通休問巢蓮骨大抵無徒是至清春郊閒行風騷髙處謝知音公退何妨縱野吟弱栁不能牽别恨片雲應念識閒心沙平古岸春潮急門掩殘陽暮艸深凝望江臯動幽興數聲鐘磬出西林兩宋名賢小集巻十一
