body:
  text: 兩宋名賢小集卷十一宋陳思編元陳世隆補寇萊公集春日登樓懷歸髙樓聊引望杳杳一川平逺水無人渡孤舟盡日橫荒村生斷靄深樹語流鶯舊葉通清渭沉思忽自驚秋思秋氣動天地恍然情未窮故園應墜葉昨夜又西風白草侵危堞寒濤接逺空耆頥當此景無語夕陽中再歸秦川阮路何方盡西歸興未勞河流經陜狹山色入秦髙返照明秋壘孤村接暮濤還如丁令至故里滿蓬蒿秋夜獨思勉詩友西風驚萬木危坐思悠哉故國經年别秋鴻半夜來人應多棄善天豈不憐才休學嚴夫子荒涼老釣臺長安書事一從洛邑移秦甸三見東郊綻早梅蓮府晝間鈴閣閉栁營春暖射堂開齋壇首冠慙諸將相印兼營接上台何事燕公輕仗鉞却言方閫是粗才重陽登髙偶作務間留上客佳莭值重陽旨酒浮仙菊清歌繞畫梁髙城明落日疏樹覺微霜且盡登臨興餘歡尚未忘塞上春風千里動榆塞雪方休晚角鼓聲起交河氷未流征人臨迥磧歸雁别滄洲吾欲思投筆期封定逺侯寓居有懷時年十四疏林頻落葉孤僻繼離騷獨坐聞鴻逺間吟見月髙夢回更自永思苦夜何勞寂寂西郊內披衣聽海濤重到進公院五年重到支公院物態人情盡不同惟有寒柳暗秋色依然蟬噪夕陽中野步幽景恣追尋遲遲傍栁隂靜思非世務孤立是間心村逈遙峰出溪明返照侵片沙招野步白鷺伴髙吟積雨回塘漲微晴疊翠深春鳩鳴古寺煙草入平林迸笋行無定飛花勢不禁凝然客亭上鄉思獨沉沉秋日原上蕭蕭古原上景物感離腸逺嶠收殘雨寒林帶夕陽溪聲迷竹韻野色濕秋光吟罷還西望平沙起雁行江上晚望懷所知遲遲迷逺信間立大江隅逰子在何處秋風吹五湖潮回沙鳥聚岸闊釣船孤歸去還堪嘆田園半已蕪秦中感懷寄江上知己念子隔江海浩然時已秋蟬鳴關外樹人在水邉樓髮白猶搜句時清尚旅逰遙思當永夜不寐向孤舟水村即事虛齋臨逺水吟釣度朝晡葦岸秋聲合莎亭鶴影孤片雲藏疊巚野燒起寒蕪獨步時吟望離人隔五湖暮秋感興苒苒前期逺窮途一可傷有時聞落葉不語立殘陽塞草秋先白溪沙晚更光那堪望天末燕雁又成行秋夜感興寄吳順之耿耿不成寐楚鄉經暮秋故人遙海嶠寒月滿江樓閉户生蒼蘚安間到白頭如何太平日獨不出汀洲夜坐有懷寄張士遜清秋吟更僻况復古亭間少夢蟲聲碎無風樹影間月華澄曲沼霜氣滿空山不見張夫子何人共往還送人下第歸吳鶯老計還失負書歸故鄉杏園無近路澤國有髙堂白鳥迷幽浦寒猿呌夕陽離懷休墮淚春草正茫茫秋訪江上友人所居苔石半寥落坐來思逺愁故人應罷釣寒葉自驚秋村隔平沙暝江和暮靄流徘徊不能去此去有扁舟冬夜旅思年少嗟羇旅煙宵未進能江樓千里月雪屋一龕燈逺信憑邉雁孤吟寄嶽僧爐灰愁擁坐硯水半成氷貽趙州府夫君何感命十載困風塵薄宦須流落孤吟更苦辛山寒泉易凍邉近草難春珍重常招隱慙非孟子卿春日懷張曙時年十六不見張夫子岩花幾度新久間空賦命逺别更傷春雨艇秋天末煙蓑隱渭濵應嗟年未冠已作異鄉人初夏雨中緑樹新隂暗井桐雜英當砌墜疏紅重門寂寂經初夏盡日垂簾細雨中感興寄蓮嶽一二詩禪友西風傷逺别前計竟成非芳草此時暮故山何日歸禪應同雅道貧合長天機翻憶雲溪伴無聊對落暉贈隱士夫子才名重貧居志未勞吟當寒夜苦間到白頭髙心地通禪寂田園近海濤不知千載後誰更續離騷湖上作極目望南浦望中生逺思雁沉芳草渡燒斷夕陽陂嵗月寒萍梗江山念别離泊餘清夜夢暫與白雲期有懷秦川春婉娩漢水路迢遙不待憑危檻離魂已暗銷送李生歸秦中酒闌還執手之子擬歸秦風雪過殘嵗山川近早春久逰詩思苦逺别栁條新後會知何日空餘淚滿巾書懷寄韋山萬里不關慮孤吟役此生風騷中旨趣山水裏心情衆木雕寒色空江噴暮聲終期謁君子同繞緑苔行間夜圍碁作歸山終未遂折桂復何時且共江人釣松軒雪夜碁紙鳶碧落秋方靜騰空力尚微清風如可托終共白雲飛春雨散亂縈花塢空濛暗栁堤望回腸已斷何處更鶯啼夜坐懷故友西風起窮巷衆木又雕零蕙浦月華白竹忩燈影青故人難重見鄰笛不堪聽行傍秋池上孤吟對逺星南陽道上各賦玉蝴蝶花一絶堪賞東君造化竒妝成蝴蝶滿纎枝粉融輕翅攢香蘂疑是尋芳未去時鄴北旅中懷友人浮世多塵事悠悠難定期夢闌懷逺夜秋盡望鄉時道在應無悶風澆自業詩何嘗歸釣渚搘肘一沉思弔任瓘處士一生長抱恨終亦是貧居遺信留孤鶴營墳賣古書竹齋無俗物秋圃有寒蔬福善何言昧超然望太虛秋懷落日流不住默然空淚零敗莎侵陋巷疏葉滿間庭有趣窮風雅無機敵杳冥浮榮安足戀歸去亂山青送友生下第南歸頻頻退禮闈此去欲忘機霄漢貧難達江湖老獨歸程遙秋浪疊村暝夜燈微應便為儒者翻悲古業非邉城春望獨望原西路離襟倍黯然青山遮故國絶塞度新年風聚沙迷岸煙開燒滿川歸心正無際驃騎莫留連草獨步髙原上依依動所思無人尋蕙徑落日滿江湄楚澤晴芳處秦川晚翠時此中興廢事千古復誰知送左眉州之任分官離法署承命守眉州山館鄰孤寺春程過亂流江雲長映日蜀魄似悲秋到郡揚清政遺黎病必瘳楚江夜懷西風生逺水蕭颯度吟臺明月夜還滿故人秋未來寒蛩啼暗壁敗葉下蒼苔誰念空江外年年首重回春日書懷曽讀前書笑古今恥隨流俗共浮沉終期直道扶元化敢為虛名役片心默坐野禽啼晝景閉門官栁長春隂世間事事須先退不待霜毛漸滿簮離京日作離歌豈忍樽前聽别恨無由醉裏消余久不飲故有是句惟有夢魂歸此闕不知京洛路迢遙夜泊江上嵗莫峽中村維舟古樹根羣峰初落日夜後獨聞猿流水自無盡客愁那可論平明離楚岸迢遞指吳門新蟬寂寂宫槐雨乍晴髙枝微帶夕陽明臨風忽起悲秋思獨聼新蟬第一聲寄獻廣南許虞部南國江山五十州星郎從此播芳猷詩窮雅道皆清唱官重名曹未白頭望斷蠻村煙樹逺吟殘嶺月海風秋三年政滿迎丹詔諫署重膺仄席求送吉上人新鴻并落葉正逐朔風飛此地仍分首何山是所歸問程雲棧逺宿館雨燈微莫恨天涯别重尋志未違秋夕書懷官路時風漸識情一悲前計逺愁生深秋寒氣侵燈影半夜疏林起雨聲縣印終年拘吏役煙蓑何日避浮名窮通休問巢蓮骨大抵無徒是至清春郊間行風騷髙處謝知音公退何妨縱野吟弱栁不能牽别恨片雲應念識間心沙平古岸春潮急門掩殘陽暮草深凝望江臯動幽興數聲鐘磬出西林兩宋名賢小集卷十一
