body:
  text: 兩宋名賢小集卷一百二十四宋陳思編元陳世隆補石羊山房集鄭剛中字亨仲楘州金華人紹興二年進士累除祕書少監出為四川宣撫使為秦檜所忌罷謫桂陽軍徙封州卒檜死復原官諡忠愍有北山集南陔詩并序南陔補亡也念劬勞之恩重痛逮事之無日故作是詩以慕焉陟彼南陔有風惟薫曷念劬勞華髪盈巾彼髪之華尚可剪也嗟嗟吾親不可見也陟彼南陔其薫逺兮慨我功名今亦晚兮功名之晚尚可為也嗟嗟吾親不可追也彼居之子庭闈休休愛日之念胡勿省脩曕彼禽鳥亦哺其母養而弗驩于老奚取敬爾身矣懌其親矣逮其暮矣云何吁矣梅花玉骨透花寒氷壺清露滴暗香驚返魂移自芝蘭側殷勤置書几粲粲百態出徘徊欲與語奈此雪霜色高標邈難親欲疎還不得箇中須有詩苦覓不到筆要須明月來託之問姑射脩脩窗前蘆脩脩窗前蘆孤瘦倚青玉心虚知夜凉風葉亂相觸使我入幽夢如在江湖宿方兹困炎曦愛爾眼中緑奈何柔脆姿行犯秋霜肅霏霏霜露中芰荷等摧覆大抵無勁節不及歲寒竹讀坡詩公詩如春風著物便新好春風常自然初不費雕巧又如荆山玉不問多與少𫝊流落人間皆作希世寳吾獨恨造物生我殊不早不得拜堂下朝夕事灑掃追攀邈難及清淚出幽抱書齋夏日五月困暑溼衆謂如蒸炊惟我坐幽堂心志適所怡開窗面西山野水平清池芰荷間蘆葦秀色相因依幽禽䕃嘉木水鳥時翻飛文書任探討風静香如絲此殆有至樂難令俗子知晚邨暑雨霽餘飛翻溝水鳴玉半規入嵐霧平疇愈新緑時有牧歸牛一笛過山曲吾廬附幽深四面䕃修竹埀雲下林梢驚鳥自争宿夜色迫書卷呼童具燈燭宿長安閘口天寒雲氣隂地濶江岸敞鼓動風勢狂掀簸浪頭長單䋲纜扁舟避雨宿深港上有阿蘭若危鈴作孤響一夜魂夢寒鄉國勞逺想清霜作朝晴舟師動帆槳即事夏木埀嘉䕃中夜㣲雨集晨興渉西園爽氣衣外入側身過幽林葉上見餘濕菰蒲暗池塘有鷺如玉立樂哉吾此居時平足堪葺丁未四月與李叔佩還錢塘道浦江井坑嶺賦此詩扁舟絶驚濤芒履陟修嶺躋攀雖小勞窈窕豈人境巨石開雙關有道細如綆其中漸寛虚濶歩隨所逞古木埀嘉䕃一覆餘里頃寂寂艷山花沉沉晦龍井時有飛泉落噴薄珠玉冷毛骨皆清凉反顧發深省麋鹿聞人聲駭去山之頂春禽正對哢决起不留影豈知道上翁甚愛幽獨景如何䝉鄙外一笑不相領負負出前山遲疑夢初醒暑雨結廬在深寂芳簷䕃松蘿天晴風日温時有燕雀過今兹夏暑雨衡門可張羅永嘆復自慰幽興吾亦多臘月三日義烏道上寄潘義榮天風生暮寒一夜新雪積遲明兀箯輿亂入山逕窄茅簷兩三家雞犬不見跡冬令頃弗嚴草木僭春色愆陽入桃杏弄暖浪蘂坼肅然變霜威犯者輒衰息獨餘山上松不動與寒敵十丈偉標致四面風淅瀝時于翠葉中碎挂瓊玉白忘我道路歎但覺心忘懌擁鼻作孤吟清思浩無極對月再用韻團團滿庭月冷浸霜華重何人萬里外與此孤光共摩雲度征鴻天濶目難送三杯見妙理一静服羣動陶然夜氣中可以觀幻夢乆雨二首録一首山嵐變濃雲地氣洩冬熱急雨春風顛十日聲不絶舍中流水入墻外古溝咽塊然簷下雀状若木雞拙我亦類襌定癡坐萬慮歇厨兵忽相報謂己糝藜蕨隨縁就一飽再看栢香爇清明前風雨兼旬城外桃李無在者書室中有酴醾一瓶置之甚乆盖風雨所不及也為賦五韵素質吐孤芳柔條敷瘦緑誰将刻楮手作此數㽔玉園林烟雨多百卉飛簌簌小室偶深静花意猶清淑置之硯席間鼻觀常芬馥茉莉嶺上老梅樹歲晚等凡木霜風吹枯枝曾有花如玉茉莉抱何性犯此炎暑酷琢玉再為花承以敷膄緑憐渠一種香徧歴寒與燠時于寂黙中至意㣲相屬鼻觀既得趣就枕便清熟夢中見靈均九畹皆芬馥焚香五月黄梅爛書潤幽齋濕栢子探枯花松脂得明粒覆火紙灰深古鼎孤烟立翛然便假寐萬慮無相及不知此何參透頂衆妙入處静動始定惟虚道乃集心清杜老句高韻不容襲餘馨夢中殘密雨窗前急偶題軒前有修竹穿紙入窗􅎉清風動揺之壁間影縱横軒後有修竹山花依以生幽芳吐孤艷不與翠色争愚翁坐其間萬事蠢不萌不識動與静但覺懐抱清千古媿張籍眼明心自盲静獨飲酒或濡首作詩防嘔心疾走欲避影不如常處隂階前享眀月但鼔無絃琴清風倘相過付之修竹林一静服羣動萬縁寧我侵郡治西㕔錦被花不為治架每花開覆地而紅或縁他木以升予分其本植草亭之東家僮相與栽木于地高七尺許上布圓竹復破竹交加之外出四簷如屋之状通小窗側户以窺視而出入餘皆花地下置一榻一几可以獨酌作詩以記之云栽花傍庭砌立木為花屋小户虚一偏横窗置其腹分竹接柔蔓尺寸引鈎曲春工直解事夜雨頻澆沃枝條日滋榮滿架籠新緑紅淺暗香深揖遜薔薇服此花名錦被覆我四圍足比之公孫布豈不堪華縟自慙流落人尚此享癡福我欲飲其中亂影交􅙩醁擁被即長謡傲枕眠清熟又欲效王勃醉處先磨墨引此略覆面腸胃成機軸染筆起臨風定作花芬馥王勃每醉先磨墨數升引被覆面覺乃為文大暑竹下獨酌新竹日以密竹葉日以繁參差四窗外小大皆琅玕隆暑方盛氣勢欲焚山樊脩然此君子不容至其間清風如可人亦復怡我顔黄昏開竹杪放入月一彎緑隂隨合之碎玉光斕斑我舉大榼酒欲與風月懽清風不我留月亦無一言獨酌徑就醉夢凉天地寛閨怨詩三首幽思春風亂擬向琴中説徽寒錦薦高未鼓絃中絶尚有無絃韻或可奏明月堦前望水輪去去不停轍薄命如妾何秋風河漢濶無心事鉛黛采采菊金黄徘徊欲寄逺雲夢連瀟湘豈不懐君子念之不敢忘西鄰擊神鼓東鄰閙笙簧三嗅籬邉英淚落秋風香晨光入幽户手織回文書聞古有雙鯉為人致區區書成立江邉天寒渺無魚㣲懐既莫致慘黛何有舒歸來更無語悵望庭花疎正月十一夜燈開雙花鈆杯壓短檠清膏沃虚草炯炯孤焰瘦吐此雙花好誰為夜氣温暗坐春風巧碎剪朝霞紅縁以金粟小或云兩玉蟲飛來抱釵杪美人輕燎之要看火中寳我聞家道和可以感穹昊門闌将有喜每事吉先兆而我方朽衰負戾落南嶠胡為今夕光熠熠似相報無乃天地慈四海施洪造陽和隨根性溥為脱枯槁吾其得歸與頂戴君恩老平字梅花詩江梅非凡根先春花南枝玲瓏皆瑶英雕鐫誰為之天高孤芳寒風來幽香埀朝暾晞霜華蘭膏塗真妃移之當疎簾吟腸清相宜吾将讒花神妖紅徒紛披何如令江梅芬芳無休時終愁芝蘭嗔侵渠名聲衰寒食江鄉時節逢寒食花落未将春减色嶺南能有幾多花寒食臨之埽春迹花多花少非我事春去春來亦堪惜柴門風雨小庭寒無奈池塘烟草碧欲将詩句慰窮愁眼中萬象皆相識欣然應接巳無暇都為老來無筆力夜聞雨聲賦古風時趙使祈雨之翼日也山齋道人夢魂清夢中細響忽可聼三峽流泉出幽隠萬蠶食此春葉晴又疑相如夜病渇蟹眼亂沸石鼎鳴呼童起視果安在云是西簷甘雨傾於時火流祗三日田兆正作龜縱横昨朝太守拜壇下五龍奉命雲雷驚小兒放散蜥蜴去神鼔罷擊巫舞停田翁翻溝出賸水婦子田邉笑相迎商量今歳多釀酒是間指日當雲平山齋一飽想無慮摩腹卧看秋風生寄贈張叔靖堂堂張矦好眉宇照人氷玉無塵土憶初邂逅共杯盤姓字未通心已許參商别後各天涯屈指流年不勝數何如䇿馬忽東來扣我柴扉叙寒暑相親顔色愈敷腴不俗胸懐細傾吐使我頻歲飢渇心如飲甘泉餉腵脯吾生寒苦衆所知眼高無人人不與技窮漸覺蒲栁衰進取一途方首䑕有心斸土治田園束手抽身事農圃荷鉏今亦粗成趣頗有嘉蔬待春雨所恨松根長茯苓僻寂無人堪共煑安得溪霜素月高促膝與公長夜語宣和壬寅仲冬二十六日留别臨川陳泰頴江南浙東千里遥雁聚沙汀無定跡偶然握手如平生袛恐前身已相識不然安得一覊旅披露煩君出金石我今漂泊又西去草草分衿實堪惜孤舟漾水如輕葉何處烟村倚灘磧明朝横枕清浪頭夢破霜風正相憶故居北山三十里憶得舊書堂小徑通蔬圃新醅壓酒牀晚凉荷葉嫩細雨菊花香此夢今何許隨縁又一方栽竹信縁移老竹觸暑種𤓰根小雨回生意蒼苔覆劚痕影還隨舊葉凉巳到清尊相對如佳友何妨盡閉門哦詩怕醉還思醉哦詩未得詩過雲飛雨急斜照晚凉遲嫩緑開荷葉新紅入荔枝躊躇搔短髪倚檻立多時重五異鄉逢午節卧病此衰翁竹筍迸新紫榴花開小紅山深人寂寂氣潤雨濛濛煑酒無尋處菖蒲在水中闌暑闌暑秋郊暮前山瘴霧中猿猱都下飲鳥雀未歸叢弄影試新月披襟招好風銀潢向何夕零露濕梧桐春晝深村春晝永事事不相關花少蝶蜂瘦水清鷗鷺閒柏香薰紙帳竹枕傍屏山付與翛然夢樂哉天地間寒意嶺南霜不結風勁是霜時日落晚花瘦山空流水悲棲鴉尋樹早凍蟻下牕遲季子家何在衣單知不知幽趣十二首録二首幽趣無人㑹閒居我自知筍尖穿落葉花蕊挂游絲寒在蜂來少風斜燕不遲老夫無定力破戒為題詩幽趣無人㑹雲依逺岫行寒塘時撥剌古木屢敲鏗壁殻拖涎鈍花飛度粉輕山泉煑石鼎孤啜不勝情早過烏龍嶺烏龍嶺上萬峰巒疑是羊腸九曲盤山麓吐雲人世逺松梢滴露客衣寒驅馳寸禄意寜樂蕪没小園心未安早願車攻歌復古不須埀老挂衣冠庚申二月二十二日宿齋省中齋所深嚴客過難逼人書債未須還簷遮暖日桃夭瘦鳥踏風枝竹影閒細細乳花新茗椀霏霏香霧小爐山滿庭斜月無公吏祇似東陽田舍間譚勝仲卿有冊賓禮成新句用韻和呈寳函重鎖環金密册櫝雙盤帶錦斜長樂春風迎母后未央和氣集皇家簾埀禁衛収黄繖禮畢天仙下玉花班退笙鏞猶在耳五絃歌舞未須誇仙人山塞至日戍兵列栅守空倉俯瞰嘉陵萬仞江山下不知傳鼓角天邉時見引旌幢歲寒木落鳥穿屋晝静簾埀雲繞窗教罷諸營無一事錦腰催拍照金缸寒食偶書楚鄉孤坐掩重扉素髪荒唐酒一巵眼闇乆因書卷得心闌全自世縁知臨流問米方終日踏雪尋梅是幾時欲上高樓望呉越無邉烟雨正埀埀有客問予每日何事客退賦此杜門管得酒瓶乾餘事誰能著眼看髣髴殘春幽夢斷冥濛細雨落花寒林梢寺隠孤鐘晚水外人喧社飲歡萬里一身聊爾爾此身惟覺上恩寛初春古人書卷慢翻尋齒髪蕭疎歲月侵萬里家山孤枕夢滿城風雨五更心䝉茸軟草涵空翠寂歴初花弄曉隂燕子未來寒意重數峰圓瘦入雲深初夏春物闌珊逐曉風芰荷敧角草茸茸野梅結子疎枝重老竹生孫翠影濃煑酒情懐還是客異鄉歌笑且相從醺然就枕皆佳處醉夢何妨度曉鐘出江净練已欣平似熨更因雨過助清深何人孤笛穿雲杪野岸歸舟入樹隂鷗鳥慣看遷客面江山偏識老夫心半鈎小捲黄昏月欲得清詩箇裏尋和方景南乍晴闌暑知秋近淮濆氣已清風雷驚夜雨鐘鼓報新晴霧散槐庭曉雲開魏闕明馬行朝露稳人喜積情傾初鳥方争出殘蟬莫亂鳴小窗偏得睡更待晚凉生擬送楊栁久戍思賢日中興入覲時旌旗生喜氣梅蘂動寒枝報國心偏苦安邉計自奇一軍常北出萬騎絶南窺結軌聞修好櫜弓謹退師浩歌蔵戰甲雅拜習朝儀天近雷風迅雲深雨露滋告庭行有命祖載敢無詩雪意留金勒歌聲寄玉巵明年秋秫賤釀酒約歸期春到村居好四絶春到邨居好茅簷日漸長杯深新酒滑焙煖早茶香春到邨居好園林興味長蠶貪桑葉出蜂趂蜜脾忙春到邨居好枯腸飽可圗筍尖将露角麥秀欲生鬚春到邨居好清明欲禁烟亂紅桃下雨輕白栁飛綿陜西戲成二絶録一首出門上馬雖云一作所樂乍見秋風亦念家何日隋隄霜後路亂飛揄栁踏平沙早行風栁驚霜日夜飄客程中夜馬蕭蕭據鞍髣髴如殘夢曉月一鈎猶未消頳肩攜擔又催程寸許孤燈照壁青破縣殘更誤傳曉馬行十里見明星靈壁驛有方公美少卿留題戲和于壁君把使旌臨洛水我參樞幕過潼關秋風想見吹歸渡先看淮南第一山雨過雲壓江邉草樹低麥揺秋色望中迷却知向晚有晴意雨過一聲村落鷄懐山居二絶春淺酒寒人密坐花深雨細蝶移枝十年未解作歸計此恨故園鶯自知披叢尋得晚花瘦帶雨剪來春韭香憶把餘醺付松枕明朝春夢不勝長夜燭花蠟炬香光照夜紅垂垂簾幙静無風金盤五寸花成穗可但釵頭綴玉蟲無題池塘好處烟迷栁簾幙昏時雨過山燕子不知春有恨銜将花片入梁間即事小徑客來穿竹入草亭凉到枕書眠鳥呼人笑荔枝熟如此封州巳二年渡胡源口暫出箯輿上小航眼明重喜見江鄉夢魂孤寄浪頭宿一夜隨潮入富陽即事暮春景物稱山家屋角團團緑葉遮薄晚㣲雲疎過雨一番小麥顫輕花枕上聞秋雨被麄骨老夢魂清月暗窗昏烏鵲驚茅屋不知疎雨過但聞高樹作寒聲嚴陵懐古一舉無心為六鼇萬鍾於我亦毫毛客星不到雲臺上莫訝先生索價高客惠賓州竹簟甚佳取退之鄭羣贈簟詩讀之數過成古風云卷送風漪光八尺竹新漸作琉璃色世人貴耳便賤目那知不低蘄州笛年來媿汗常浹膚夏日自嫌汙枕席有時追誦法曹句悵恨宗人不多得山齋置榻容一身君惠清凉到心骨門前客至莫見嗔老子解衣喧鼻息元信自潯州遣人恵以明徹氷壺名酒作二十八言謝之是翁明徹一塵無養就江心秋月孤自舊相從杯酒裏豈惟今日見氷壺絶覽亭目力所臨皆在下亭名絶覽未為叨大都心地當如此此外應知更有高兩宋名賢小集卷一百二十四
