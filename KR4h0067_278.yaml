body:
  text: 兩宋名賢小集卷二百七十八宋陳思編元陳世隆補端平詩雋金壇觀金壇深僻觀鐘磬少人聞山果猿偷墮庭莎鹿卧分木髙猶帶雪石冷不生雲正爇黃連炷相從拜老君晚登黃鶴樓戚戚登臨地淒淒欲暮天相看數株桞不聼一聲蟬山冷雲生絮江空月上弦無緣捨塵事間對白鷗眠施潭歸程風強阻春色有如無上水千帆健中流一矴孤雨衝尋屋燕雲背立檣烏盡説明朝順江行舊有圖山行盡日羣山裏知行夢幾重竹深春寺磬灘急午溪舂殘旭猶雙塔晴雲只半峰豈無仙隱者恨不少從容野橋日暮野橋邉都歸醉客船數竿沙際日一片水中天影落衝煙鳥聲移帶雨蟬殆非人境得江月又初圓送姚希聲令弟歸剡中客程何太急嵐月半雲分想暫歸天姥還來伴使君曉吟千嶂雪春思一江雲若再經過此囊詩可得聞秋屏好山多變態排列在簷楹平尉澄江練橫鋪列嶂屏石煙寒繞寺山雨暗離汀有意攜溪枕眠看直到醒同李雪林飲山村本來無飲興偶此到溪灘屋角懸雙瓠船頭繫一竿塔髙風便響橋峻雨隨乾莫怕城門閉行歸亦不難送惟德上人還黿溪為愛林間寺幽間少是非因拋華門業來著稻田衣石蕨衝雲細山蔬膩雨肥禪居安穩後更莫啓柴扉甲申歲解官歸故居有以書相問者近慿笻竹枤處處作生涯獨採傍溪藥自看臨水花愛雲因北望對日任西斜惟有雙蝴蝶相隨直到家送惠嵩上人住西山蘭若孤雲無定迹又入亂山居既息禪機穩從教世網疏曉香嵓屋像寒咒石潭魚待我尋詩境看君坐隱廬石塘水陸盡經過地暄晴更和鳥聲臨水近人影向橋多細雪傾殘橘輕氷脆立荷少為鹽米計聼徹竹枝歌病起幽園撿校病起無情緒池邉日幾回蟲聲低覆草螺殼細生苔暑退蘆將變秋殘蓼續開久消環繞迹全若未嘗來雙林寺杳杳雙林路林深不易登寺幽憐宿鳥地僻喜間僧靜徹垂梁板寒銷背壁燈水邉人忽笑猿落過溪藤送僧歸舊隱自言歸去後只在故山邊紗帽臨溪盥銅瓶傍水禪晝間松塔雨春盡草堂煙何故相拋拾沉浮逐世緣水清堂偶成數杯恬淡酒相就等間傾得失徒多感行藏任濁清晝間風有味春盡雨無聲但惜新栽桞相呼欠一鶯酬李達可歸心終自遂何必戀虗聲轉覺青衫惡誰憐白髮生掃花山石瘦洗藥野泉清應有忘機者時來伴我行寄杜北山一曲小湖濵幽居不厭貧坐容禪子憩家就麯生鄰簷竹侵燈衆蘺花落竈頻幾時吟得句寄與豫章人寄鶴林智福上人深山髙頂寺黃鶴舊曽留鶴去無蹤迹山僧幾白頭鳥間齋鼓靜猿嘯佛燈幽宿約何時踐題詩向瀑流幽居漫成二首便入空山住休慵漢省書薄雲翻藥畚斜日送柴車遠業松花膩生涯薤葉疏抱琴誰共聼一尾石間魚乍歸無定業蕭索帶村居神樹當中朽人家著外疏藻痕千漂絮花影一牀書何必為真隱相安便有餘鹿苑寺分半作民棲猶藏一曲溪鵲窺蓮葉座僧占菜花畦白蠧魚銷粉青乾獸剝泥幸留唐刻在相伴峻廊題馬鞍寺水國何年寺蕭條野渡邊僧驅田雀倦神抱海犀眠細網垂秋屋殘燈泊暝船數家枯桞下猶有舊人煙野賽客心懷避忌地險自多神楓葉藏山魅松根抱石人鶻翻蒼黑趐魚曝赤斑鱗未必知風候惟聞酹酒頻題逸人壁深僻人稀到天然野意成荷衝崩岸出草入廢泉生曝木充山貨抽茶當地征未須尋伴侣時有自來鶯送蔣雲啓之湘中出門岐路分願往不辭勤螢影侵湘月蟬聲隔楚雲頻燒霜後籜多飯雨中蕡若過黃陵廟椒漿奠小君送僧妙通遊平江萬壽故鄉離幾日何處躡秋陵梵葉牀頭樹唐衣壁面僧雨花粘舊錫風籜掃寒簦新偈期相寄呵彈破小乘酬杜八同宿西山蘭若西山龍井路俱有舊行蹤待得城中暇重期石上逢冷霜粘破屐落月帶殘鐘擬踐相鄰約煩君買一峯菩提廢寺野寺孤僧住當春亦掩扉曉鐘三板去昏杵一盂歸古屋垂山棐幽窗飬石韋未容行客憩荒樹雨鳩飛天申宫蘇文忠畫像大澤沾荒裔靈山識老臣微茫雲外迹衰病瘴中身濕草寒碑夕晴花午殿春髙簷風雨斷猶避六丁神誓節渡髣佛經行地還尋古渡邊山禽多白練溪藥間黃連漢漠將晴雨迢迢欲暝煙恍然驚夢醒二十有三年白羊路隔一重溪山深客易危驛亭惟有額官堠盡無碑竹挂黃身虺林香白面狸得船爭欲渡先奔槿花籬送人遊邊平世絶邊籌憐君古塞遊誰聼蒯緱劍虛敝黑貂裘宵柝鳴荒戌寒烽起廢樓到應先弔古慟哭峴山頭春暮登黃鶴樓欲盡殘春酒登臨事巳違聼殘懷舊笛添盡禦寒衣鳥向青山沒人來赤壁稀最憐城側樹無可作花飛為僧曇芳賦草堂把詩從我者多是剡中僧結屋何山塢當門幾樹藤地寒常帶雪溪峻不留氷贈爾新吟去歸題木葉層江臯送别把酒對汀洲相看發去舟迎風一分手驚浪幾翻頭暗花消淚楓寒葉弄愁恐猶回首望終夕憑髙樓送胡宗原還臺山故里杉松表歸程筍薤初杯多常失飯囊罄只留書海墨收秦氣山糧捨禹餘古來仙隱者多在赤城居千金寺十載他鄉别春歸逐浪層晚晴沙市鼓夜雨石橋燈帆仄催乾葦衣寒脆薄繒舊時來往寺惆悵不逢僧留别唐棲雲泉上人水宿唐棲寺何緣更浹旬千山今日路三歲異鄉人小殿眠身佛空廊折臂神歸時重作禮又拂一畨塵天章寺前小樓客懷依古寺曲水茂林邊俯聼澗鳴石靜看山出煙傍花清晚潄對竹冷春眠深羡溪僧樂幽居動嵗年野望春日晚荒荒平沙極渺茫樓欹三面水城卧數條岡白草吳京甸黃桑楚戰場長江俱不問一片㵼斜陽楓橋寒山寺江楓吟詠工幽寺冷遺蹤不改前朝路猶聞半夜鐘地涼汀月皎村迥水煙濃試問誰曽見惟應獨有松送黃同甫人生各有安出易欲歸難古道春泥重孤城暮雪寒酒鋒精似將詩業逺於官野穀如堪飽從君借鶡冠應潭林崦遞相遮分居兩岸沙地征兼橘柚土物半桑麻水白來如蝀山黃去若蛇往年曽泊此叢竹數人家招鄭服之歸心同一路況復在新年夢著登山屐間隨渡水船宿蒿迷舊隴春葑起間田卧醉天池上知君在我先靈竺寺有孟宗祠不因純孝者古寺若為安壁彩蝸遊遍爐香鼠踏殘鐘聲嘶破挺幡影颭危竿尚恐冬生笋時來竹外看齊安早眺二首昔日干戈地淒涼古塞情軍同民雜戍州與縣分城野曠孤鴻絶沙寒一騎行十年生息後人尚怯論兵隂隂城壘靜極望不飛塵草色橫江暮鶯聲出塞春清時應洗甲來歲又逢辛惆悵經過處都非往昔人村市細簇人家住中分破石崖竹門開店屋草市夾橋街水别東流漢山橫北過淮並船頻借問同買出江柴贈僧仲寶月溪幽棲深絶地靜夜獨宜僧上下兩輪玉中間一片氷影收懸罟索光息過船燈獨坐觀心了無由更小乘題夏肯父曉山圖旦旦自天成中全一氣清漸分平與峻俄轉晦為明竹閉鋪沙影松涵出谷聲機心都不動穩看日初生孫季蕃故居笑語失詼諧人誰不愴懷夢殘秋雨寺魂散夕陽街缺竈粘煎藥乾爐積燎柴風流何必葬便擁菊花埋題東麓歸自房陵一年辛苦後收聚若為豐攝職全無吏攜家僅有童乳舂花下管漆溜葉間筒自此嬉遊地應須且浙中兩宋名賢小集卷二百七十八
