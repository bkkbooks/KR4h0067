body:
  text: 兩宋名賢小集卷三百十五宋陳思編元陳世隆補西麓詩藁陳允平字衡仲又字君衡號西麓鄞縣人才高學博一時名公卿皆傾倒試上舍不遇放情山水往來吳淞淮泗間倚聲之作推為特絶嘗著石湖漁唱詞元初以人才徵至北都不受官放還秦鸞曲盈盈白玉鈿裊裊黃金縷拍拍水晶奩皎皎珊瑚樹簾前雙燕飛門外桃花雨無處説相思羞對秦鸞舞登吳山登高一展眺宫樹鬱嵯峨樓閣春風滿東南王氣多青天行日月大地布山河桞色沙堤路時聞響玉珂明皇按樂圖日日霓裳宴綵樓三千歌粉侍宸旒樂聲縹眇梨園夜仙夢迢遙桂殿秋翠袖半籠金約臂寶叉斜墜玉搔頭不知舞到弓彎處一拍春風一拍愁鄂王墓鄂王墓在栖霞嶺一片忠魂萬古存鏡裏赤心懸日月劍邊英氣塞乾坤蒼苔雨暗龍蛇壁老樹煙凝虎豹幡獨倚東風揮客淚不堪回首望中原賀伯父大資休致不戀清時白玉璫便將身世寄滄浪三朝元老黃樞閣四海間人緑野堂楚楚菁蘭秋帶雨蕭蕭寒菊晚宜霜擬成東甬耆英社賸樂壺天日月長送中上人遊天台師作天台去長亭復短亭焚香參祖塔振錫動山靈石罅移菖歜松根斸茯苓何時白雲下相與話青冥寄王尊師綵雲繚繞七香車洞裏神仙煉紫霞華表鶴歸春寂寂東風落盡碧桃花過田家村南啼布穀村北響繅車隔浦賣魚市傍橋沽酒家野花朝日暖溪桞背風斜又過東鄰去東鄰採菊芽秋暮登太白飄飄短褐袍倚杖立金鼇橋束溪流急樹增山勢高白雲連海嶠黃葉滿亭臯落日西風惡塵埃兩鬢毛雪樓臺萬瓦玉鱗鱗遮盡人間富與貧可笑世間剛道冷不知片片是陽春觀奕象棋陳勢頻分合機鋒互應酬馬飛關塞月炮落漢天秋不問知心友翻成敵靣讐誰能勞勝負獨立大江頭香奩體小院薰風滿間庭白晝長蜻蜓楊桞岸鸂鶒芰荷塘雲合朱簷卸山高翠閣涼蔓滋青薜荔芽長紫良薑簾幕深深地闌干曲曲廊淡煙瑶草細流水碧桃香幡影重門靜苔痕小篆荒螭盤丹鼎雪龍吸露臺漿琴古翻新調笙沈靜舊簧雨聲犀角枕月色象牙牀掌上雙鸚鵡屏間兩鳳凰石函藏寶劍金鑰啓瑶箱扇雉團清影奩鴛試曉粧霞綃衣窄索雲錦佩玎璫鬢攏金蟬矗叉橫玉燕翔袂飄天水碧裙濺鬱金黃太液簫初遠蓬壺漏未央流星飛碧落零雨下銀潢去去人千里迢迢天一方斷腸春洛浦殘夢夜瀟湘江南謡桞絮飛時話别離梅花開後待郎歸梅花開後無消息更待明年桞絮飛歎鏡詞憶妾初嫁時金屋藏窈窕忽見長安人鬻鏡長安道明月掌上寒團團復皎皎千金買得歸惜之如重寶奩開雙鳳飛帶結青鸞裊當時照妾顏妾顏正年少如今照妾顏妾顏羞已老對鏡頻歎嗟掩鏡徒懊惱不恨妾嫁遲惟恨妾生早此恨空綿綿天涯滿芳草君不見長江逝水無逆流歲去年來多白頭登招寶山宇宙初開闢何神立此山中流天柱石大地海門關浪惡蛟龍怒雲深虎豹間潮期與日月千古一循環秋夜遊東墅雲壓高空雁陳低江城厯厯草離離樓臺秋淡玊簫逺簾幕夜寒銅漏遲明月鷺鷥菱葉浦西風蟋蟀豆花籬一尊酒盡銀河落猶有殘鐘出古祠侍謝立齋小酌湖樓風捲珠簾客珮淸杜鵑啼老送春聲水浮亭館花間出船載笙歌桞外行千里夕陽歸夢逺六橋飛絮馬蹄輕闌干倚遍暮天闊煙樹一鈎新月生題李丹壺壁間乘海上槎來訪謫仙家風逆磬聲短日低幡影斜猿攀高樹果蜂採半巖花誰在丹臺上三更煉紫霞謁烏龍廟斷碑猶記唐時事山氣陰沈暗緑苔松木已逾千歲壽香煙知化幾爐灰廊深無月鬼神過殿古有雲風雨來曲曲九溪春水落子陵灘下復東回即事重重簾幕燕翩翩塵鎖朱樓十四絃榆火漸催寒食節海棠花畔縛秋千春詞楊桞春風三月三畫橋芳草碧纎纎一雙燕子歸來後十二紅樓捲繡簾春遊曲長安二月春風裏千紅陌上香塵起都人歡呼去踏青馬如遊龍車如水兩兩三三爭買花青樓酒旗三百家長安酒貴人未醉岸頭芳草日半斜誰家女子嬌似玉約莫青春十五六鬱金羅帶蘇合香琵琶自度相思曲相思曲聲斷續斷續回文不堪讀回文斷續有續時離腸寸斷無續期春閨怨妾家住在湘江曲門枕湘江春水緑年年長是暮春時兩岸垂楊啼布穀自君話别湘江頭獨上層樓彈箜篌蛾眉不掃逺山碧滿堤芳草春正愁舉頭不見君但見湘江雲江雲散復聚妾心空如熏舉頭不見君但見湘江水江水去復回妾顏為誰美湘江雲湘江水雲水悠悠何日已舉頭望君君未歸門前楊桞空依依野人家繞江生杜若滿地長辛夷剪草塗新壁褰藤縛舊籬瓦瓶春貯酒土竈夜蒸藜獨步歸來晚東臯雨一犂遊陽明洞天萬木陰沈鎖石門煙霞深處近崑崙洞簫聲接玉臺磬寶蓋影搖金殿幡湘浦有龍雲氣濕越山無鶴露華昏靈芝采盡歸何處溪上白蘋花正繁哭樓梅麓白玉樓成去作文祗從西棘挂朝冠生來病苦相如渴沒後人知范叔寒野店春間沽酒榼溪堂月冷釣魚竿梅花麓上誰彈淚歲歲東風吹不乾宫詞三十六宫春漏長隔簾時送御樓香倚籠盡日教鸚鵡為我君前説斷腸無題間拈紅葉欲題詩待得詩成又懶題心事不隨流水去月明人在赤闌西題胡月山吟屋蘇公堤上路日日課新吟流水行花影斜陽卧桞陰斷橋春聽樂矮屋夜鳴琴皎皎山門月如君一片心有所思憶昔美人初别時長亭兩岸桞依依今日美人天之涯美人美人胡不歸憶昔君别妾分破青鸞鏡破鏡如破心與妾表相憶相憶圖久深憶昔妾别君剪斷金鳳叉斷叉如斷腸贈君表相思相思圖久深一日一日復一日青鏡鸞孤叉鳳隻未必君相思能如妾相憶寒衣剪就欲寄君長安門外無行人雁聲半夜西風惡忩前一片梧桐落觀猿挂石攀雲日半斜亂山深處飽煙霞香林月滿僧歸去啼落春風幾樹花失鶴頂上新成九轉丹銜花日日到詩壇夜深飛上雲霄去華表月明風露寒宿大慈山晤真觀終南道士學彈琴門外松蘿鎖翠陰瀕海八龍朝出洞隔山羣鹿夜歸林琪花過雨金風淡玉樹籠煙璧月沈三十六壇鐘鼓寂雲璈聲接步虛音寄翁賔暘厯厯長途謁魯侯征塵寧復戀貂裘江城露冷霜初滑梅谷冰消水欲流夜月觀書徐稚榻春風聽月仲宣樓料君頻作西湖夢曾憶孤山有舊遊下第懷樓壽百尺丹梯擬共登共登天上最高層南山有霧空藏豹北海無雲可化鵬勳業十年塵裏鏡詩書萬卷雨前燈桃花開盡不歸去又逐春風過武陵别何橘潭駐馬赤闌橋餘寒著桞條舟車富陽路風雨浙江潮惜别津亭暮思歸故國遙臨行莫惆悵回日定花朝有感軟紅塵裏度韶華楊桞橋邊舊酒家燕子不歸春漸老東風開盡刺桐花暮春桞外宫鶯囀晚寒萬花開盡正春殘沈香亭北闌干曲獨抱琵琶看牡丹終日終日懷人憑曲闌餘陰未放客衣單祇緣二月風光淡别作一般天氣看梅粉有香銷夜雨桞絲無力受春寒間情漠漠難拘管自逐輕鷗下急灘過釣臺作雙臺屹屹幾春秋千古高風一釣鈎越嶺有雲山北障桐江無浪水東流雪深黃葉埋寒虎煙暖青莎卧白鷗漢業已隨宫樹老月明常到客星樓春閨寂寞梨花院落間逺山愁入兩眉彎黃金絡索珊瑚墜獨立春風教白鷳倚樓金虬熏盡鷓鴣斑獨上層樓倚畫闌滿院梨花香寂寞隔簾風雨正春寒嚴陵郡舍花飛不上班水落白雲灣簾捲千重樹忩開四面山鼓聲魚市近旗影訟庭間滿目皆吟思殘陽縹眇間西興西興潮半落漁浦日初昏嶽靣雲收腳沙頭浪積痕樓鐘鳴野寺船鼓入江村回首長安路歸心幾斷魂曹娥廟漢碣嵯峨幾百秋曲墳遺廟越山頭潮聲侵帳鳳屏冷雲氣繞臺鸞鏡愁孝節稜稜雙檜立哀魂渺渺一江流椒觴載奠靈風起知我懷親送逺舟梁湖道上東風酒斾斜浦口第三家谷鳥鳴春樹沙鷗起暮沙故鄉山漸近曲岸桞初芽客路歸心切孤帆帶暮霞閨情間拈花片貼紗忩繡幕斜飛燕子雙細數歸期相次近倚樓日日望春江梅梁堰廟近雲濤觀山遙翠欲重祗因溪上木便是洞中龍堰折潮歸海樓迎浪答鐘斷碑荒蘚合終古載靈蹤虎邱即事西風劍佩輕獨立妙高亭山吐巖頭月江涵水面星石奔蒼虎勢樹結老龍形何處吹簫客扁舟過洞庭青龍渡頭天闊雁飛飛松江鱸正肥桞風欺客帽松露濕僧衣塔影隨潮沒鐘聲隔岸微不堪回首處何日可東歸仲冬南樓野望繡幕香溫生暮寒淡煙漠漠水漫漫吟殘庾嶺梅千樹夢繞湘江竹萬竿風捲亂鴉棲古塔雪迷孤雁落前灘一聲玉笛人何所更上南樓獨倚闌夜泊停舟野渡頭客路恨悠悠葉落風千樹鐘殘月半樓蘆花雙過雁莎草獨眠鷗山鬼燒青火飛來照髑髏梨花流鶯偷入未央宫望斷昭陽信不通寂寞雨聲寒食夜一枝香淚泣東風賦林景參梅嶼結廬分得雁山雲嶼上梅花是四鄰水月一天薌世界冰霜千古玉精神短檠夜雨西忩夢長鋏秋風北塞塵我亦煙波綸釣侣與君同作歲寒人懷潘鄮屋洛陽才解珮過眼忽秋分四海一明月千山共白雲雁煙迷曉樹蟲露濕香芹滿紙相思字臨風欲寄君吳江道上夜半扁舟出洞庭客帆初挂早潮平社風才起海鷹至嵐露未收江鵲鳴吳岫亂雲擎古塔楚臯寒葉擁荒城垂虹橋外天連水無限别離生杜蘅登西樓懷湯損之楊桞飄飄春思長緑橋流水繞宫墻碧雲望斷空回首一半闌干無夕陽吳山雪霽九天宫闕春風滿陸地樓臺夜月寒鐵笛一聲吹雁落片雲不到玉闌干后土廟塵擁粧臺翡翠翹瓊花開盡玉魂銷崑崙山上天風落二十四橋吹洞簫湖上流水斷橋邊笙歌擁畫船日酣花半醉春困桞三眠策杖登雲洞觀魚上玉泉鳳城歸去晚山鎖萬重煙西湖暮春雲山疊疊樹重重浙水迢遙客夢中啼鴂數聲春去日落花滿地夜來風松關鶴立吟壇靜竹院僧眠丈室空明日馬蹄何處所夕陽芳草畫橋東山房軒忩四靣開風送海雲來一陳催花雨數聲驚蟄雷蝸蹊明石凳蟻陳繞山臺此際衣偏濕熏籠著麝煤馬塍道上間拖瘦竹笻獨步馬塍東鳥影青山外春愁碧樹中麥潮風化蝶櫻熟雨生蟲莫過溪頭去溪頭多落紅遊仙曲中秋月正明夜半飛紫瓊拂袖天上去攬衣朝太清縹眇黃金闕迢遙白玉京離離百寶幢裊裊九華旌簫韶起碧落散花飄羣英翺翔鸞鶴舞清徹雲璈聲凌凌九霄寒風露薄青冥弱水三萬里仙路渺蓬瀛不赴瑶池宴相約董雙成吹笙騎鳳皇飛上芙蓉城戍婦梧桐葉落雁歸時見説沙場未解圍夜夜燈前做針線倩誰邊上寄寒衣秋過姚江釣磯莎草離離碧樹間祗疑曾是子陵灘槿花籬落蟲聲碎蘆葉汀洲雁陳寒江上浪平潮正熟渡頭人去月初殘夜深不管蛟龍睡獨對西風把釣竿己酉秋留鶴江有感賔鴻幾過澱山湖夜夜西風轉轆轤苜蓿草衰江館靜枇杷葉老石泉枯曲終明月間歌扇病去寒灰滿藥爐客夢不堪千里遠故園籬菊正荒蕪經馮將軍墓同山半白雲此地葬將軍香火空遺像朝廷紀舊勳鐵衣懸古塔金􅀈鎮荒墳一澗清泠水年年生紫芹江村草舍蔬畦繞柴門竹徑通斷雲遮落日細雨濕斜風野艾抽花碧山茄帶葉紅煙深南浦逺難認楚江楓江館野望江邊雁過秋江上暮雲愁嶺曲山回轉潮回水逆流亂莎行石蟹殘荻卧沙鷗黯淡三更月何人獨倚樓暮秋遊虎邱寂寞虛廊暗草萊天風繚繞寶華臺江空露冷蛟龍伏殿古雲深鸛鵲來山館老松褰緑蔓石壇芳桂落蒼苔寒鐘敲斷楓橋月半夜禪僧入定回小樓寒空漠漠起愁雲玉笛吹殘正斷魂寂寞小樓簾半捲雁煙蛩雨又黃昏侍趙别駕宴壽樂堂别駕移尊宴草堂四軒簾幕捲斜陽芰荷香滿鴛鴦宿楊桞陰濃翡翠藏風過水亭秋尚熱月侵山閣夜偏涼更闌酒盡不知去坐看曉星飛玉潢留鶴江有感抱玉歸來淚滿襟世間無計覔知音此生雖有噬臍悔到死終無嘗膽心伏櫪馬思雲路遠避鈎魚隱石潭深故人若問淞江客自採芙蓉學楚吟送吳松溪過淮鐵硯毛錐未䇿功又攜琴劍過臨卭荆山有玊鳴朝鳳滄海無珠走夜龍浦口月來僧館榻渡頭霜落客船鐘自君别後知音少空憶雁山溪上松送趙知縣歸天台自是中朝柱石材西風塵土暗蒿萊河陽縣裏花初放彭澤門前桞未栽凖擬鳴珂來鳳沼徘徊抱玉下烏臺明朝琴鶴歸何處三徑故園多緑苔姑蘇館楚岫高低接太行吳江渺漠下滄浪秋城霜滿葦花白夜館月寒莎草黃芳苑鹿臺初解珮故宫鸞閣尚鳴璫五湖一葉扁舟去十二西樓幾夕陽雲間洞天門掩青松間緑槐一畨圖畫自天開朝霞煉藥黃金井夜月吹笙白玉臺樹老有枝皆薜荔地間無處不莓苔數聲野鶴驚殘夢疑是神仙入洞來採桑行妾本秦羅敷家住曲江曲門前楊桞青春風啼布穀樹頭桑初芽家家蠶始浴相呼出採桑採桑如採玊屈曲回高枝攀條剪柔緑朝晴採桑南暮雨採桑北採得桑歸遲小姑怨相促陌上綺羅人問妾眉何蹙妾恨妾自知問妾何所欲消磨三十春漸喜蠶上簇七日收得繭百斤十日繅成絲兩束一絲一線工織成羅與縠百人共辛勤一人衣不足舉頭忽見桑葉黃低頭垂淚羞布對燭忽憶巴山夜西􅐼風雨寒自憐清影獨誰識寸心丹草長花猶在香銷淚不乾海棠貪睡去惆悵五更殘春曉曉風獵獵捲芭蕉簾幕深深燕子巢十二畫闌都倚遍一雙蝴蝶上花梢侍趙開府夜宴賸陪華珮醉蟠桃楊桞飄飄拂午橋夜月樓臺行錦障春風簾幕拂紅綃歌傳杏苑黃金縷樂奏梨園紫玉簫銀漏滴殘珠履散踏花歸去路迢遙雷峰少憩倚塔看明月寒光度玉繩曲隄藏小艇疏桞見孤燈水竹映苔石巖花緣澗藤香雲吹散後猿鶴伴高僧錢塘旅舍雲山千萬疊身事恨悠悠客鬢秋風急鄉心夜雨愁蛩鳴鄰寺壁雁過隔湖樓目送千帆逺長江空自流避暑避暑入林扃同僧坐竹亭鳥飛晴地影龍挂雨天形掃葉鋪椰簟臨流注石瓶更無塵迹到日落夢初醒山中吟平生獨愛山日日頻躋攀自得山中趣結廬萬山間山西茂林麓中有盤旋谷飄飄雙鳳凰飛立山上玉日出華山陽月出廬山岡巫山雲漠漠雁山煙蒼蒼東望泰嶽松西望蒼梧竹知心侣樵漁忘情友麋鹿山深春亦寒野鳥聲綿蠻山花隨處發香風吹幽蘭夏日飛火雲枕簟訪深僻坐此松竹林冰泉漱寒石西風涼蕭蕭雁過秋空高時有巖桂發落葉飛長臯三冬氣凛冽獨立千崖雪橫斜溪上梅影落溪橋月身在此山中間情薄太空行歌白雲裏白雲連崆洞朝餐山上霞暮採山下藥安得山中人共跨山頭鶴兩宋名賢小集卷三百十五
