body:
  text: 兩宋名賢小集卷一百二十八宋陳思編元陳世隆補傅忠肅公集傅察字公晦孟州濟原人也從曽祖曰堯俞有傳察為人端重有特操舉進士蔡京欲妻以子察力拒之為青州司法參軍歴永平溜川丞久之除太常博士遷吏部員外郎宣和七年接伴金使時金人巳渝盟察至燕山聞斡里雅布兵至金人曰見太子當拜察曰太子雖貴人臣也當以賓禮見何拜為斡里雅布曰汝主失信吾興師南向海上之盟不可恃也察曰皇帝與金國講好信使往來項背相望何謂失信太子干盟而動意何所為乎敵左右但使拜白刃如林察曰死則死耳豈有俱人臣而輒拜者或抑猝使伏地察植立衣冠顛倒始終不屈斡里雅布曰爾乃不拜我耶麾令去察知不免謂其下曰彼脅我以拜我義不辱我死必矣我父母老素鍾念我聞之必大戚若等得脫幸記我言以告我親知我死國稍解其無窮之悲也左右盡泣既次燕山遂見殺年三十七聞者哀之贈徽猷閣待制用亷夫韻招諸友登清㣲束帶縛吏事發狂中憤興世情多面朋噂沓惡背憎緬懐數君子皎皎瑩壺氷披雲見顔色翠光露鋒稜忘形到坦率高論破炎蒸藹然嘉譽在映我獨無稱文場屢交鏑師老畏侵陵况復時雨過綠苗覆千塍便當共臨晀此興那可勝孤亭枕蓆住下有寒潭澄仰看霞綺散坐待月華升嘲咏縱歡謔明朝期再登㢘夫有㑹當歸去來之句復次前韻少小尚竒偉長年病莫興折腰仕五斗詎敢論好憎居然畏罪苦局如履春氷每懐鷹隼翮韝上看鋒稜追隨縉紳後糠覈雜肴烝泮宫天下士藉甚得儒稱巍巍衆峯上跛足豈易陵朝廷重薦延拔茅餘空塍公孫富經術非子誰能勝坐見萬頃波甖缶汲逾澄沛然下膏澤蓊若朝雲升勿云歡留滯青史他年登次韻㢘夫登清㣲二首蝸舍不容膝煩敲局寢興豈惟倦束帶絺綌猶云憎清微跨城角窣兀疑凝冰深池暮黯黯逺岫朝稜稜往嵗與申子賓朋日雲烝遂令棟宇陋顧盼流名稱先生今詩伯氣欲青雲陵鏘然出佳句椒蘭布畦塍邀我避暑遊意重愧難勝何缺神明自清澄嗟彼浮名者此亭豈易升踟蹰恐缺時攝衣請先登大火氣方熾新金伏未興茅屋若卑陋藴毒空自憎流汗常被體滌煩屢飲氷那堪青蠅輩鼓翅作威稜薫風爍炎日沸鼎助薪蒸每思謀爽塏地溢舊無稱高亭枕城隈粉堞勢騰陵清水繞其足茂林瞰田塍此間有異趣躋攀弗能勝佳招適我願坐覺神魂澄何當卜隣舍與子朝夕升飄然忘世累長嘯效孫登次韻祝㢘夫登高樓膏雨潤四野草木蘇中乾駕言共臨眺凌雲陟層盤華宇蔭曦日潯暑隨風䦨清談無俗好茶果有餘歡撥置簿領煩憩此簟席安悠然得佳趣可以寄簮冠耳目去局促心體自廣胖何如斂手版觸熱事上官晚來纎藹霽矯首欣遐歡一見沒天外千林杳雲端西山有爽氣淺緑浮㠝岏翻疑圖畫裏未覺雲夣寛蕭蕭林間蟬己如咽暮寒直恐霜露至歸歟可忘餐同七兄寄二李昔我在淇水二陸皆少年伯也氣軒昻丹鶴唳青田季方文章士摛花桃李妍力學乃未已有如火始然相見一傾葢便誦膠漆堅笑語玉麈折登臨蠟屐穿時時出秀句灑若沈疴痊爾來踰十嵗自當冠貂蟬胡為茅屋下寂寞尚草𤣥方今明堂構收拾棟與椽安得刷羽翮吹嘘送上天此志儻不遂何用空言傳不如李翰林沉醉自稱仙不如陶彭澤歸來謝塵縁但解琴中趣何妨甕下眠富貴草頭露名譽空中烟子意竟何如余心方寂然願求真實語莫作猾頭禪夏日登清㣲亭永日留煩暑斯樓得屢登向來如異境高處若無憑逺岫生雲直輕風蹙浪層試取金掌露更接玉壺氷抵掌賓朋盛題詩氣象増望窮遺恨在我欲醉時升清㣲亭分韻得空字縹緲千層外縈紆一經通飛甍明落日巨棟掛斜紅當晀資公退招邀得調同九天開浩蕩萬衆入牢寵水色連暗碧雲容借晚空清來庾公興快挹楚王風缺側金罍倒樓昏畫角終明朝車馬客陡覺厭塵紅大暑同蔣明亞叟熙載夜登清㣲亭土潤伏新金陽歊困亭午曦御駐征驂朱光㣲厚土鳥雀噪堦除蛙蚓鳴草莽簿領抗塵容茅簷芘環堵蜂蠆亂繩牀蚊蟁隠雷鼓棕拂徒爾為青蠅敢予侮避喧空百慮對食但三吐舉箑未搖風揮汗己成雨那能整冠巾誰復對賔主豈惟眩生花坐覺氣如縷南方有高樓兀然蔽華宇摳衣倦躋攀䇿杖愁傴僂俄頃叩雲端飄蕭開洞府新凉䬃爾來舊暑脱然愈清池涌波瀾疎星穿牖户夜氣襲氷霜月明粲珪組烏鵲倦飛還遊魚渚可數珍果走金盤清談揮玉麈羣籟正囂囂幽夢方相栩何當食瓊漿一夕生毛羽夜登清㣲亭雲隂掩翳東北有雨少頃月出皎然復次前韻融融暑未䦨悄悄夜方午命駕聊叩門尋幽得兹土俯矚但蒼茫前瞻何鹵莽萬籟正虚無羣生各安堵蟬嘯雜笙簫蛙鳴當鐘鼓鳬舄政參差詼諧懼狎侮豈惟冠蓋傾己覺肝膽吐坐久隠奔雷天邉垂密雨疎木列賓朋衆峯自臣主螢火落明星爐烟裊青縷那能缺酒杯所欣曕徳宇高歌屢激昂笑喜或俛僂蕭䬃濯塵襟清虚湛靈府快如仙爪爬灑若頭風愈須㬰出金盤照耀開玉户映浪雜瓊瑰穿簾間璧組斯逰豈前謀後㑹難逆數歡餘岸綸巾語約揮松麈可能伴雞栖亦復隨蝶栩廣寒㑹可升試為刷翎羽次晁之道韻翰林詩百篇發興自斗酒同遊八仙中七者顔己厚邇來數百年斯人那復有風流東城晁四海蔚稱首之子乃其豪異代得密友滿腹貯詩書妙意寓醪酎政使譽日新位卑未為醜亭亭澗底松不如園中栁芝菌冠衆芳其出未枯朽叫閽問大鈞得致君側否送承祖赴定州幕府中山控北陲强弩號百萬單于銜國恩方且事逃遁謀帥得真儒不煩一戰頓風流本江左亹亹有餘論幕府極妙選參謀不容遜藉甚丞相孫凌雲氣豪健所懐社稷計嘗願竊有獻蹭蹬三十年羈旅頗自困因人作逺遊實亦乖素願談笑青油幕聊復可排悶嗟余謬不學塵根苦遲鈍一官聨事久矜式每自勸但覺有不如未見有寸進公亦不吾厭叩擊愧煩溷念當為逺别悵然亦多恨時方苦炎蒸行矣蘄强飯伯時往河東戲與亷夫分韻道相思之意三首日月劇跳丸暫别亦已久青山繚層巔道里阻且右今晨登南樓㑹此同志友思公聊北望竚立但搔首秋風八月天霽色明朝牖軒車何時來遲爾一杯酒朝氛霽西山晚日明薈蔚遙憐太行上陟巘眩可畏王侯眇小夫中盤凌雲氣端如車公賢談笑出真誹胡為久﨑嶇使我重吁欷王事有程期来歸懼其未之子何磊落本是青雲才委翅蓬蒿下黧面垂䯱䰄卜鄰與我遊肝膽向人開酒酣遺世累謔浪絶嫌猜西風换煩燠四野無纎埃方當共臨眺公兮胡不來題毛彦謨容膝軒夫子負異才端若㑹稽笴平生懐剛腸於世少許可文詞類激昻議論恥媕娿高名三十年坐此常坎軻同時英俊流往往步青瑣歸來樂簞瓢琳宫得安坐小軒僅容膝陋巷生堀堁惟餘豪俠氣屢折每不挫却眠利名場終身繫韁鎖生雖華屋居死我翳蓬顆固知宇宙間所有終非我但當清我心餘事等么麽次七兄韻蝸舍蓆為門清風無所扇閒視纔半尋起行空百轉對食不下喉流汗常被面矧復鳬鷺行摘尾抱大卷余方有公事汝輩宜罷遣賴此伯仲賢縱談逞雄辯時時雜博奕豈不賢遊燕呼奴取具來據榻聊一戰初如兩軍交整陣咸伺便俄頃鋒刃集解紛在一箭或喜而拊掌或駭而色變或旁睨而審或當局而眩剥剥伐木聲離離衆星見勝負既已分反奩若收電却尋文字觀觸物本無戀覔句屢吟哦誦詩乍游衍百謫勿相聞從渠書我殿晚登清㣲亭次祝教授韻雉堞亭亭倚翠微高樓裊裊弄清暉共邀佳客扶筇杖驟喜凉風振羽衣過雨山川顔色好投林鳥雀噪聲稀月搖翠浪明珠碎雲滿金波破鏡飛雄辯琅琅如落屑新詩句句似連璣自憐怪僻耽幽寂却恨匆匆便賦歸送朱熙載改官還鄉陶唐名臣有朱虎揖遜夔夷尊文祖後來傑出漢雲孫折楹當時誰敢侮煌煌聖代見斯人凜凜遺風振千古乘牛不數魯家俠衣錦何妨買臣窶十年牢落困膠庠五斗栖遲尚環堵惟餘豪氣自不除傾葢向人肝膽吐忽然結束事征鞍軒軒氣色浮眉宇謂予倚門親久待况復楓宸拜明主朝廷公卿重薦延鶱騰一鶚生毛羽髙義如君世所稀早據要路思裨補芝堂𢎞度負土忘晨夕空腸未忍進一溢伯㑹隆冬不衣帛野火燎原天雨澤當時廬側産靈芝盛事至今光史冊王家兄弟皆英豪藉藉聲華若連璧高文奥學乃餘事一門躬行如萬石孝思他日徹蒼旻血淚垂頤灑枯栢雖云草木但有生始信幽明本無隔煌煌二秀發坤祥小大髙低紫與白搢紳駭歎絶前聞老稚提攜溢阡陌争言圖舄獻修門坐見恩榮来絡繹公獨掩耳更悲啼吾忍貨名於窀穸豈知採摘付兒童大勝籝金滿千鎰方當孝治軼唐虞八行求賢常側席公雖韞匵畏人知定有新詩振奇蹟雪九首都城十日雪庭户皓己盈呼兒試輕掃留伴小窻明天公亦戲人竒幻驚倐忽朝來簷霤間一一綴明月晚風掃連氛客被増夜峭明朝赴看燭更把崑山照高堂連夜賞蛾眉映珠櫳誰憐閉門客衣穿履亦空黒雲埋日車厚雪鎮坤軸行路勿匆匆包藏恐深谷忽驚陋巷間踏作瓊瑤迹坐聞郢中歌妙句壓元白春雷忽隐隐春雪復紛紛農夫戒及澤荷鍤已成雲撒鹽乍可擬刻楮竟難成研辭覷天巧應復召羣生盈尺兆嘉祥三登賀亨泰我雖無寸田一飯猶足賴次韻杜無逸西園獨坐九絶句南浦送㣲波西山來逺緑日暮獨盤旋慨焉撫孤竹前輩不可見古道邈難尋何時赤松子相與歸山陰折腰為五斗我已愧淵明共赴東林約悵然懐友生虚齋篆爐烟兀然得禪寂雖有錦繡腸畫餅安可食亭亭澗底松幹凌雲霜孤既無鸞鳯翔鳥雀來喧呼一世競榮利紛若空中花蚤作田園計人生㑹有涯身遊闤闠間心在孤雲杪譬如登太山頗覺天下小外慕亦無已及身良有餘乘流如可迹韞匵豈藏諸聖徳覆天下歡然萬物春北窗㣲笑傲似是羲皇人題張季良適性齋揚雄家無甔石儲閉門作賦擬相如鄴侯插架多異事牙籖萬軸呑石渠吾友張子斯人徒嗜好醎酸與衆殊被褐懐寶老不癯收拾萬卷以自娛伹願生為蠧書魚咀嚼英華味道腴揮毫落紙驚羣儒佳處往往凌子虚網羅秦漢包唐虞上下干載歸指呼自言此樂世所無不羡潭潭卿相居方今清廟收璠璵肯使滄海遺明珠高明他日播天衢行看旌帛來庭除任伯仲時徳升用均父韻送徳父守菑川邀余同賦妙齡擢秀如黄童藉甚詞林振古風瀾翻千載常在口磊落萬卷獨蟠胷不將龜筮論從逆獨向詩書有髙識琳宮乞得十年閒可但新詩勝疇昔一麾自出治東萊洗眼㸔公手重拭疲民安堵身暫休黠吏垂頭聲不出人言功效真卓爾歸近髙堂渾舍喜喜公才氣更難量致君要著巖廊裏秋雲漠漠向空飛颯颯凉風生桂枝馬蹄又踏東川去盤水洋洋可樂飢我今作吏愧無補夢寐林泉那得歸㑹抽手版付丞相却掃庭闈戯綵衣卜鄰儻許依仁里與子艱難共生死釣竿伴我訪滄溟沮如定無三尺鯉送傅倅五首洺之水兮其流舒舒公之來兮朱服熊車士元展驥仲舉題輿公之來兮民斯樂胥洺之水兮其流洋洋公之化兮春雨秋陽袴襦頌洽禾黍嵗穰公之化兮民期悅康洺之水兮其流瀰瀰公之去兮旌旗旖旎父老攀轅縉紳方軌公之去兮瞻望徙倚洺之水兮其流洩洩公之徳兮此邦所愒吏遵其畫人懐其惠公之徳兮久而無替洺之水兮其流活活公之名兮兹其彌達翔於朝著鶱於省闥公之名兮莫我敢遏贈朱令中泮宫折桂陪英彦彈冠接宷寮志連秦壁固論鄙楚師恌逸驥終難縶翔鸞詎可邀緬懐巖下士終得夢中宵吏隠亭㑹集招㩦共到習家池雲水為裳芰製衣魚戲輕船浮枕簟鷗隨落日下汀磯岸巾已得杯中趣横吹如從天外飛野性每来應未厭驪駒寜復賦言歸尉治吏隠亭三首公餘吏隠剏新亭野濶雲低疊素屏風動荷花翻偃葢日搖波影散疎星望窮南畝千重緑坐久西山數㸃青更待晚凉蟬亂噪與君散䇿試同聴一畨新雨洗華亭四面晴天倚翠屏並秀採蓮舒嫩臉孤飛白鷺帶殘星披襟驟覺登仙樂倚檻猶疑倒影青横笛晚來聲更好龍吟泓下亦時聴十五伯以詩見贈因次韻為謝蕭然顔巷復誰堪竟日潛心到五三載酒未妨從靖節圍棋端不羡羊曇逢人傾倒羣兒笑落筆縱横四座慙舊學青箱知未替更將新律付諸男次韻申泮宫直宿早秋四首新秋爽氣溢長空絃誦低昻月映櫳濟濟青衿成魯變洋洋泮水詠洙風羣儒篆刻空章句百氏紛紜賴折中何日拔才空兾北如今高譽滿山東皎皎清波滿四空疎林散影㺯朦朧援毫欲賦陽臺夢振袂欣乗玉宇風己覺素秋來席上却疑仙景落壺中凌雲未許攀仙桂卧看氷輪沒漢東一方明月落長空萬里餘輝鏁玉櫳蟬韻啾啾來逺木槐雲裊裊弄清風共邀載酒陶彭澤走訪談經戴侍中景物蕭然無限思靚糚應許過牆東泮宫深閉絳帷空遙想佳人照綺櫳閒倚畫屏憐永夜懶搖紈扇引凉風直疑令史歸天上猶想陽臺入夢中展轉覺來無一亊日搖槐影過窗東又次申教授直宿三首皎皎虚堂帶月清金風入律露華明潘郎遇直生秋興韓子長歌憶短檠驚鵲繞枝巢未穏幽蟲臨砌隠餘聲却嫌詩思撩歸夢數盡高城長短更擾擾浮名絆此生相逢樽酒眼還明君如俊鶻方搏翮我似彎弓不受檠弱植幸容依玉樹新詩嘗喜擲金聲他時㑹致青雲上莫厭卑棲嵗屢更秋堂襆被有餘清驟喜秋光潑眼明簾外月華篩碎玉牀頭螢大當長檠豈嫌唧唧秋蟲響還聴琅琅弦誦聲善教尚煩留滯席朝恩未許便歸更同工曹至臨洛道中禾黍蔚然喜而有作呈朱令甘雨初勻嵗事時冥冥造物本無私緑雲捲地薫風細翠浪翻天曉露滋巳見郊原深沒馬預欣場圃積如坻從來令尹憂民切短句聊憑一解頥方量牧地次韻工曹王亞叟朝廷庶事備成康郡邑承風底亊忙要使幅員無曠土始知兾北有留良疎狂似我徒勞耳術業如君易量奔走幸容陪笑語每觀醉墨屢琳琅杜無逸留别次韻三首薫蒸和氣浹豐年羸老欣聞詔令宣疾惡如讎知勁節清言有味樂推賢却嫌松菊荒三徑故乞絲綸下九天欲識邦人思厚徳四郊草木亦依然汪汪萬頃浸清波千里旁漸惠澤多化比宋均方渡虎瑞同黄霸自生禾盤根治劇觀游刃破膽投姦去宿疴己有謳吟喧井邑更傳佳句似陰何一官塞北似飄蓬邂逅威嚴霽弱翁他日若陪林下客亦能把釣待秋風無逸用前韻見謝復次韻藉藉聲名自妙年優優惠化詠來宣寧誇衣錦光前牒便擬揮金繼昔賢秀句屢同歌白雪高標猶幸視青天自慚不得陪騶御空想餘風尚凜然一麾聊復散餘波才比淮陰益辦多千里宣威憺夏日三年種徳斂秋禾如綸忽聴頒新渥勿藥還欣已舊疴却恐九重思治行蒲輪他日竟如何鵬飛初不礙蒿蓬自擬歸休慕仲翁况有仙姿標洞府泠然禦冦己乘風和鮑守次韻林徳祖十四首南宫三日仕非輕湖海歸來一草亭譽襲芝蘭方冉冉節高松柏獨青青仁風巳播袁宏扇素尚行須毛玠屏豈待期年歸報政人占此地有台星莊周蝴蝶夢魂輕盤谷山家有舊亭下筆未能工嫓白折腰何敢望紆青思魚此日空彈鋏誤墨他年㸃畫屏寂寞草𤣥繩户閉猶堪歸伴少㣲星五月黄塵去傳輕褰裳幾處宿郵亭共知何日輸心赤公詩有報國身輕之句莫歎㣲霜㸃鬢青公詩有白頭之歎每傍重霄求寳劒欲令新木作枯屏流傳䞉有風騷句遥想羣公若㑹星思分千里賞猶輕好建精思李柏亭日映氷壺融皎潔風臨玉樹發䓤青高名競慕蒲葵扇雅操寧施刻鏤屏夢得惠連春草句虚傳李白是金星氣葢千人一羽輕九霄丹鶴唳華亭姓名巳入金甌覆留滯休嗟銀印青彩筆掞天摛麗藻高標挿地見長屏鹽梅他日從人望商説何功比列星聖代勤民豈外輕聲名今已播邉亭風搖鈴閣終晨静雨鎖棠陰滿地青賜表殊功宜冕服榮分從吏亦題屏如公學問留閒郡東璧何人應二星十年塵土坐才輕五斗猶堪佐縣亭鼎貴敢歆新綬紫途窮唯有舊氊青己甘終作輪囷木未忍翻同屈曲屏猶喜膺門被容接常瞻郎位蔚堂星銀鈎落紙彩毫輕醉寫新詩入禁亭學擅儒宗窮壼奥文摛墨妙炳丹青親承零露如金掌密蔽衝風似寶屏雅意未須嗟出守宵衣方念庶民星九萬鵬程舉翮輕蚤年高譽滿江亭曽分蘭省趨墀赤行從荷囊拜瑣青雅度最宜鏘玉佩精忠不用録沉屏欲令行部襜帷去要使人争識景星久嗟留滯厭叢輕桃李無言向野亭展驥始應流汗赤登龍早見出藍青三餘共對賢人酒四野欣瞻别駕屏何日蒲輪趨召節便看兩兩映魁星半刺同流寄未輕勤勞每念離鄉亭高懐不羡貂蟬貴麗句還酬玉案青字買千金休擇筆才兼三絶好書屏獨慙後學波瀾狹明月舒空映小星淮陰當日少年輕官舍渾如寄旅亭十載凄凉甘組緑三冬諷誦伴燈青才非徐孺慙懸榻諂異陳咸豈觸屏獨幸親逢陶謝手每觀一字並華星佐縣三年敢意輕掾曹還許暫平亭齒延屢醉争扶白嗣響非工愧取青自此浮鷗容海浪幸同馴鹿傍車屏從今已恐終更去悵望參商是别星使軺問俗書輪輕五馬張筵駐驛亭他日恩榮封詔紫佇看蹇諤伏蒲青才能並賜龍文劍勲業同分雲母屏太史已書賢者聚荀陳此地仰華星沈和仲過郡鮑欽止固留飲宴七月二十五日登舟暫來征騎出闍闉却棹扁舟下小津颯颯西風如送客蕭蕭晚雨欲留人一年蹤跡無停日千里羈遊又逺親為問篙師從此去定知幾日到東秦野宿沂水秋風揚短棹穿林落日繫孤舟心清乍喜離囂俗野曠翻疑動旅愁歸雁高飛雲杳杳幽蟲夜語草悠悠此間景物君知否即是瀟湘一片秋晚發理棹頻看谿水分岸移不覺轉孤村漁翁醉卧灘沙穏樵子行歌草樹昏白鷺成行低欲落清蟬無數㫁還聞須將野色并秋色都付詩魂與醉魂過濼次衡元度韻山雲漠漠水溟溟千里拿舟似葉輕乍喜晚光偏照耀却嫌秋色太分明疑人鷗鳥看來熱殢客荷花望處平佳景直須乘興入蚤催風伯送吾行再阻風次衡元度韻阻風三日不舂糧浪逆篙横未到莊碧水預知饒夜月青山已復下殘陽每吟秋興空多渡欲賦西征細作行行止定非臧氏力艱難險阻自須嘗次韻烹茶四首移種疑從紫府仙世間凡草䕶芊眠味高石密甘居下效捷靈芝愧在前玉缺並標官焙印月團猶帶御爐烟年來海宇皆知缺却笑神農未解煎劉夢得茶歌炎帝雖嘗未解煎吏隠從人號孄仙一甌常及日高眠要令萬卷澆胷次便覺三山到眼前客至不須樽有酒家貧肯厭突無烟清泉近在南山麓珍味殊勝渭水煎白樂天有渭水煎來始覺珍之句不但蠲煩起醉仙能令古莽失多眠見列子春風乍拂千巖上曉雨初霑百草前絳縷繾嚢包紫璧杜牧之詩牙香紫璧裁玉塵凝盌照清烟李郢詩有玉塵煎出照碧霞今人嗤㸃前人拙未肯須依古法煎徐鉉詩任道時新物須依古法煎仰望羣公若㑹仙貪論茗飲未安眠冥搜往往遊塵外得句時時在枕前夜漏嘔吟清徹骨晴窗揮染净無烟中秋風月佳晨近應把雲腴對竹煎季衛公詩㧓吟對竹煎槐堂二首慇勤當日植文槐志在經綸世豈知古栢空傳武侯廟甘棠争誦召公詩頽簷共惜成陳迹夏屋初欣敞舊規豈但一時追盛事高名從此看雙垂鬱鬱庭柯已百年相傳勿翦豈徒然曽棲鸞鳯枝條聳直傍雲霄雨露偏彩制乍驚増昔構佳名還喜契台躔故知異日思遺愛争指新堂説二賢季良寵示牡丹長句謹賦三首一見竒葩潑眼明兩州風物寄争新十家京洛供長日萬朶東秦照暮春諦視尚疑傾國女醉吟猶付謫仙人定知不是無情物為有真香暗度頻僕家近洛陽而常官青社故云紫檀刻蘂香初吐紅粉勻葩色正新孤艷最宜㣲帶雨衆芳誰復與争春無端應恨風驚葉不醉却宜花笑人從此徑須連夜賞遶欄百匝未為頻如酥小雨壓芳塵曲檻重來花更新莫怪東風鍾共美獨將仙種殿餘春愧非阿母池邉客喜見陽臺夢裏人猶恨此生輸蛺蝶偷香抱蘂往來頻題毛彦謨容膝軒缺意未疎歸來端為憶吾廬縱談衮衮皆忘倦豪氣飄飄尚不除賴有一經如長孺休嫌四壁似相如小窗宴坐無餘事門外頻聴長者車次毛彦謨韻平生貴異不謀身率道恂恂范伯孫巷有青衿來問道家無赤腳可應門抗章曽叩蒼龍闕讜議終開白獸見説晚聞多妙教悠悠浮世更堪論南溪㑹集傳聞公退集羣英共指殘春到野亭高栁半天成翠幄遙峯挿地作長屏應憐曠寂囂塵絶更覺蕭疎梅象泠顧我阻陪車馬客空吟河畔草青青淡蕩春溪帯晚城勝遊此地繼蘭亭風搖波面瑠璃簟雨洗山光翡翠屏舉酒莫辭歸酩酊垂綸聊復向清泠㑹須踏月重追賞要看林烟共罩青次韻任伯仲和均父詩數子聲華久絶塵更將詩律鬬清新爛如曉日鋪紅錦穆若薫風泛緑蘋王謝由來多大手誦任伯仲詩何劉那得比斯人語均父從今海内流傳徧在處常應䕶鬼神九日次韻邢子友側身西望涕占翰黄菊丹萸又滿欄徧挿定應憐我逺從遊誰復盡親歡年過騎省悲秋易貧似司空乞酒難何日故園鳴雁侣醉歸松竹挂衣冠司空圖九日詩黄菊斯開乞酒難孟浩然詩烟紅鋪藻翰松竹挂衣冠贈毛謨彦二首相逢晚歲莫情疎徑欲連墻卜並居苦學羡君詩有味困窮憐我食無餘從容杯酒頻揮麈斗擻塵埃喜振裾問道談言更轉漏故應回首萬縁虚歎息朝廷記憶疎未聞平子賦閒居窮經豈但論糟粕樂道寜能逐腐餘已覺烟霞親几杖不教塵土汙簮裾客來强起談名理寂莫茅齋盡日虚馬上作心逐輕波去身隨匹馬歸據鞍揮淚盡回首一依依夣覺日永不可過夜凉愁更多蟬聲明晚月孤枕夢如何思家一别遽如許歸期可奈何無心戀明月有淚寄流波七月十一夜凉風驟至即事書懐三絶句凉飈此夕何佳哉萬里朱炎去不來吹入離人多少恨却將魂夢到陽臺蕭蕭初覺淡雲輕颯颯如聞轉樹聲收拾光輝渾在眼應如騎省賦初成窗外時聞一葉落槐隂驚起幾蟬鳴秋風定是多情物解作離腸欲㫁聲七月十六夜對月空捲天髙鳥鵲飛滿庭槐影轉風枝可憐秋色誰分付正是安仁作賦時牡丹三首侍中宅畔千餘朶興慶池邉四五枝何似城南王處士滿園無數鬬新竒無奈狂風日日摧東君欲去復徘徊應縁衆卉羞相並故遣妖姿最後開半醉西施暈晚糚天香一夜染衣裳躊蹰欲畫無窮意筆法何人繼趙昌聞有遊蔡氏園看牡丹詩戲作一絶呈季良車騎雍容駐道傍小園尋勝見花王應知異日傳佳句處處人稱黄四娘海棠二首恰恰清明昨夜過海棠幽獨占春多杜陵不是無心賦才薄難工奈若何欲識東君用意工故將殘葉襯輕紅可憐雨洗胭脂濕只怕風吹翠幄空兩宋名賢小集卷一百二十八
