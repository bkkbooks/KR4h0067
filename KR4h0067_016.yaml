body:
  text: 兩宋名賢小集巻十六宋陳思編元陳世隆補咸平集田錫字表聖嘉州洪雅人太平興國三年進士累官左拾遺直史館為河北轉運副使擢右諫議大夫史館修撰卒贈工部尚書有咸平集江南曲三首金蟬飾緑雲細靨蘂黄新南浦解清珮西谿采白蘋宻竹花深映湖山日欲曛春腸已知斷脉脉兩難親吳艷若芙蓉乘舟弄湖水照影不知休雲鬟墜簮珥含笑忽迴頭見人羞欲死歸去入花谿棹濺鴛鴦起金陵王氣銷六朝墮霸業白雲千古恨空江照樓堞虎丘羅蔓艸姑蘇委楓葉懐賢思伍員靈濤浩難涉晚雲曲髙唐晚風欲生雨空山啼猿風嘯虎巻雲數片留南浦自與鴛鴦共飛舞倚柱吟暮春惨惨黄昏雨零落櫻桃斜掩户未張燈火簾幕深樓閣巢寒聞燕語昔時常説長安好而今厭走長安道蘇秦辨説長卿才自笑功名何不早人悄悄倚柱時情脉脉無人知憐春惜逺情不盡斜雨兼花闇濕衣紫雲曲沉沉鸞殿垂珠箔祥烟瑞氣含樓閣三十六宫明月中夜静無風花自落寶屏珠帳一夢時靈仙初降趨丹墀烟衣霞綬赤瑛珮鈞天樂部前参差合奏鏗鏘向金屋云是仙鄉紫雲曲朱弦逺召舜湘靈鳯管應呼秦弄玉天漢星流夜既闌露零珠樹彤庭寒芙蓉枕上夢初覺猶聞庭際聲珊珊上曉五音十二律仙曲記時心厯厯金線龍頭紅玉笛新聲吹得雲飄逸應是䕫襄樂府魂翻得雅音聞至尊俾與霓裳羽衣曲逓相奏向梨花園春洲謡衣鮫綃兮美人采白蘋兮水濵裊羽翅兮為飾步羅襪兮生塵綿綿兮逺道萋萋兮芳草逺山眉兮淡掃短歌行曉月蒼蒼向煙滅朝陽燄燄明丹闕杜鵑催促躑躅開鶗鴂已鳴芳草歇芳春苦不為君留古人勸君秉燭逰願與喬松弄雲月紫泥仙海鸞凰洲擬古裳溪出精金百鍊無餘滓鑄得芙蓉劒靈輝若秋水陸可斷兕犀隂亦驚神鬼照物雙影寒中霄靈氣紫有時風雨至欲作龍蛇起海酒與陵肉寶燭延竒士歡飲取傳觀英圖各相視吐氣成虹蜺将平不平事大笑荆軻輩卒如兒女子中山魏公子志意邈難儔朝吸沆瀣清逺與𡨕鴻逰風髙江浪惡雲黄海樹秋青山對獨酌明月在孤舟心常懸象魏迹若参公侯縱横致君術思一伸良籌逰子中夜心功名忽嗟暮黒貂空上書甘泉方獻賦白日驚壯齒青雲有英顧收采苟不時珊瑚亦生蠧玉樹香不滅栁帶柔堪結惠然貞婦心皎若上天雪羅幕生春風珠簾鑒秋月滄海燕又歸尺書何斷絶萱花不須折安足忘君憂青銅莫頻覽邉令驚鬢秋謝安壯未仕定逺晚封侯功名俱磊落時來豈自由楚畹種芳蘭發生逢早春萌芽初戢戢枝葉何莘莘幽叢秋既老芳氣冬彌薰馨香當還風罨藹來襲人百年莫相妬從之為爾鄰深林莫葢藏芬然亦自伸花雨雨裏飛花片片紅雨㣲花亂轉𡨕濛川原何處連天艸簾幕無人半日風寂寞劉楨新病後淒迷莊舄苦吟中可堪更是黄昏景燕冷鶯寒恨想同憶梅花三年不見逺江梅長到梅花把酒杯似共故人千里别空思近臘數枝開心隨曉月經鄉渚夢與春雲傍釣臺金蘂瓊花風雪景凴誰圖畫入蓬萊和太素春晝風幡輕細翠悠颺樓閣春寒水滿塘栁絮㣲烟吟思足梨花朧月睡魂香江山似畫憐湘浦魚筍嘗新憶華陽早是春隂已無賴可堪中酒惡情腸贈朱道士憶昔長安道與君初相識宻雲滿天來不見南山色美酒斗十千一醉情歡極胷中雲夢澤眼底髙陽客狂呼月華人撫弄雲和瑟揮鞭過渭川館第相留連朝兼杏花露暮接楊栁烟流輝今六稔交情益相審忽忽披吾文如截機頭錦余本生天涯散金常破家東方上書志髙欲凌丹霞安能常刺促雀啄秋田粟海路共天遥鸞凰自相逐御溝春半桃花水初下一溝澄緑光如砑夾道官城數里中静聴潺湲明月夜千門萬户建章宫金鎖横門溝暗通三月花飛若零雨水流何處咽香紅送春花霏霏栁依依留春不住送春歸何處堪圖畫春盡江南日暮時黄鸝啼多芳艸逺青梅子重楊花飛人生三萬六千日與君復有明年期紅樹秋來佳樹色堪攀紅葉沿溪復映山半露寺樓深崦裏宻籠漁舍夕陽閒吟看揺落堆金井醉賞扶疎對玉顔水國却疑春野秀似花幽鳥正闗闗秋夜有懐寄副翰宋白舍人秋風蕭瑟北山椒賴有琴樽遣寂寥書幌静憐斜月鑒忩燈寒帶落花桃久辭知己來江國少寄音書過海潮因憶玉堂今夜直建章宫漏正迢迢風筝白蘋洲暖春風生畫樓檻迥銀筝鳴鏗鏘節奏急復慢宫中一部天樂聲三十六宫深䆗窱繡楣藻井光相照十三絃上千般聲朝靄㣲吟暮烟嘯夜來親奉月中聞繁絃促莭何紛紜碎如鸞鈴與珂珮巫山隊仗迎湘君晚來金屋愁㣲雨風細筝聲不全舉依稀嬪妾怕人知啾啾切切私相語洪纎斷續何所拘鳯凰對著飛鸞孤梧桐枝邉泊未穏琅玕節上鳴相呼有時方奏俄中絶宫商斗頓如刀截杏花露重鴛鴦寒空見如霜滿庭月有時半日全無風一一暮天樓閣紅惟聞鳥雀啄弦上暖珠寒玉何玲瓏清音朝朝與暮暮誤聲不管周郎顧秪嫌雅鄭交奏時寶鐸丁東暗相妬暇日偶題年來吟鬢己星星烏石溪邉葉又零簾下孤燈删艸奏窗前叠嶂讀茶經瘴鄉怕襲山嵐毒野艇嫌衝水霧腥天末豈忘歸去意白雲掩映數峯青郡中遣意寄友人溪雲澹澹浪悠悠十二州中最小州花落喜過流水寺月明嬾下看潮樓藥欄梅潤秋重换碁局松隂夜不收吟寄故人如借問釣魚磯在海西頭題天竺寺三月楊花樸馬飛聫鑣來欵白雲扉湖邉鐘磬含清籟樹杪樓臺靄翠㣲野景留人狂欲住春光啼鳥勸思歸萋萋芳艸重回首十里松門照落暉兩宋名賢小集巻十六
